- en: Convergence in Functional Approximation
  id: totrans-218
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 函数逼近中的收敛性
- en: Let’s start exploring convergence by looking at an example. As shown in Figure
    [5-10](#Fig10), let’s consider a two-state transition as part of some MDP. Let’s
    assume you will use function approximation with the value of the first state being
    *w* and the value of the second state being 2*w*. Note that *w* is a single number
    and not a vector.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从查看一个示例开始探索收敛性。如图 [5-10](#Fig10) 所示，让我们考虑一个两状态转移作为某个马尔可夫决策过程（MDP）的一部分。假设你将使用函数逼近，其中第一个状态的价值为
    *w*，第二个状态的价值为 2*w*。请注意，*w* 是一个单独的数字，而不是一个向量。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig10_HTML.jpg)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig10_HTML.jpg)'
- en: A diagram represents a circle for w, which leads to a circle of 2 w for a two
    step transition under functional approximation.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 一个表示 w 的圆圈图，在函数逼近下，对于两步转移，导致 2*w* 的圆圈。
- en: Figure 5-10
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-10
- en: Two-step transition under functional approximation
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 函数逼近下的两步转移
- en: Assume that *w* = 10 and the agent transitions from the first state to the second
    state—that is, from the state with the value 10 to the state with the value 20\.
    This example also assumes that the transition from the first state to the second
    state is the only possible transition in the first state, and the reward for this
    transition is zero every time. Let the learning rate be *α* = 0.1.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 *w* = 10，并且智能体从第一个状态转移到第二个状态——即从价值为 10 的状态转移到价值为 20 的状态。这个例子还假设从第一个状态到第二个状态的转移是第一个状态中唯一可能的转移，并且每次转移的奖励为零。设学习率
    *α* = 0.1。
- en: Let’s now apply Equation [5-14](#Equ14) to the first state in Figure [5-10](#Fig10).
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将方程 [5-14](#Equ14) 应用到图 [5-10](#Fig10) 中的第一个状态。
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\left[{R}_{t+1}+\gamma .{V}_t\left({s}^{\prime
    };w\right)-{V}_t\left(s;w\right)\right].x(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equk.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![权重更新方程](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equk.png)'
- en: 'Now substitute the values. Substitute *α* = 0.1, which is what you have assumed,
    *R*[*t* + 1] = 0 which is also the assumption. The state values are given in Figure
    [5-10](#Fig10)—next state *V*[*t*](*s*^′; *w*) = 2*w*[*t*], current state value
    *V*[*t*](*s*; *w*) = *w*[*t*]. The state feature vector is one dimensional and
    has a value of 1—that is, *x*(*s*) = ∇[*w*]*V*[*t*](*s*; *w*) = 1\. With all these
    substitutions, you get:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 现在代入数值。代入 *α* = 0.1，这是你假设的，*R*[*t* + 1] = 0，这也是假设。状态价值在图 [5-10](#Fig10) 中给出——下一个状态
    *V*[*t*](*s*^′; *w*) = 2*w*[*t*]，当前状态价值 *V*[*t*](*s*; *w*) = *w*[*t*]。状态特征向量是一维的，其值为
    1——即 *x*(*s*) = ∇[*w*]*V*[*t*](*s*; *w*) = 1。所有这些替换后，你得到：
- en: '![$$ {w}_{t+1}={w}_t+0.1\cdotp \left[0+\gamma \cdotp 2\ {w}_t-{w}_t\right].1
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equl.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![权重更新方程](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equl.png)'
- en: 'For example:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: '![$$ {w}_{t+1}={w}_t+0.1\cdotp {\mathrm{w}}_{\mathrm{t}}\cdotp \left(2\upgamma
    -1\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equm.png)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![状态转移方程](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equm.png)'
- en: 'Now assume that γ is close to 1, and the current weight *w*[*t*] is 10\. The
    updated weight will look like this:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 现在假设 γ 接近 1，当前权重 *w*[*t*] 是 10。更新的权重将如下所示：
- en: '![$$ {w}_{t+1}=10+0.1\cdotp 10\cdotp \left(2-1\right)=11 $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equn.png)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![权重更新方程](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equn.png)'
- en: Actually, as long as (2γ − 1) > 0, every update will lead to the divergence
    of weight *w*. It goes to show that function approximation can cause divergence.
    This is because of the value generalization where updating the value of a given
    state also updates the value of nearby or related states. There are three angles
    to the instability issue as listed.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，只要 (2γ - 1) > 0，每次更新都会导致权重 *w* 的发散。这表明函数逼近可能导致发散。这是因为值泛化，即更新给定状态的价值也会更新附近或相关状态的价值。不稳定问题可以从以下三个方面来考虑。
- en: '*Function approximation*: A way to generalize for a very large state space
    using a model with the number of parameters smaller than the total number of possible
    states.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*函数逼近*：使用参数数量小于可能状态总数量的模型来对非常大的状态空间进行泛化的方法。'
- en: '*Bootstrapping*: Forming target values using estimates of state values, for
    example, in TD(0) the target being the estimate *R*[*t* + 1] + γ · *V*[*t*](*s*^′;
    *w*)'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*自举法*：使用状态价值的估计来形成目标值，例如，在 TD(0) 中，目标值是估计 *R*[*t* + 1] + γ · *V*[*t*](*s*^′;
    *w*)。'
- en: '*Off-policy learning*: Training the agent using a behavior policy but learning
    a different optimal policy.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*离策略学习*：使用行为策略训练智能体，但学习不同的最优策略。'
- en: The presence of these three components together significantly increases the
    chances of divergence even in a simple prediction/estimation scenario. The control
    and optimization problems are even more complex to analyze. It has also been shown
    that instability can be avoided as long as all three are not present together.
    That begs the question, could you drop any of the three and assess the impact
    of such a drop?
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个组件同时存在显著增加了在简单预测/估计场景中发散的可能性。控制和优化问题分析起来更加复杂。也已经证明，只要这三个组件不同时存在，就可以避免不稳定性。这引发了一个问题，你是否可以去掉这三个中的任何一个，并评估这种去掉的影响？
- en: Function approximation, especially using neural networks, has made RL practical
    for large real-world problems. Other alternatives are not practical. Bootstrapping
    has made the process sample efficient. The alternative of forming targets by watching
    the whole episode, while feasible, is not very practical. Off-policy learning
    can be replaced with on-policy, but again for RL to become close to the way humans
    learn, you need off-policy to learn about some problem/situation by exploring
    another, similar problem. Therefore, there are no easy answers to this. You cannot
    drop any of the three requirements with low impact. That’s the theoretical side.
    In practice, most of the time, algorithms converge with some careful monitoring
    and tweaking—such as use of replay buffers, learning rates, and ideas like double
    Q-learning. Chapters [6](502835_2_En_6_Chapter.xhtml) and [7](502835_2_En_7_Chapter.xhtml)
    discuss some of these practical tweaks in the context of DQN.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: While training, it is important to periodically evaluate the agent and plot
    the curve of the return per episode. If it shows wild fluctuations, it is an indication
    that training is unstable. Remember that it will almost never be a smooth curve,
    but it should also not be wildly fluctuating.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Temporal Difference Learning
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The semi-gradient TD learning with the update equation shown in Equation [5-9](#Equ9)
    does not follow a true gradient. While taking the gradient of a loss function,
    you kept the estimate of the target—that is, *R*[*t* + 1] + γ · *V*[*t*](*s*^′;
    *w*), constant. It did not appear in the derivative with respect to the weight
    *w*. The real Bellman error is *R*[*t* + 1] + γ · *V*[*t*](*s*^′; *w*) − *V*[*t*](*s*;
    *w*), and the derivative of it ideally should have had gradient terms for both
    *V*[*t*](*s*^′; *w*) and *V*[*t*](*s*; *w*).
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: There is a variation of this known as *gradient temporal difference learning*
    that follows the true gradient and offers convergence in all the cases of table
    lookup, linear and nonlinear functional approximation, and both the under on-policy
    and off-policy methods. Adding this to the mix of algorithms, Table [5-1](#Tab1)
    can be modified as shown in Table [5-2](#Tab2). I do not go into the mathematical
    proof of it in this book because the focus of the book is on the practical implementations
    of the algorithms.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Table 5-2
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: Convergence of Prediction/Estimation Algorithms
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: '| Policy Type | Algorithm | Table Lookup | Linear | Nonlinear |'
  id: totrans-245
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-246
  prefs: []
  type: TYPE_TB
- en: '| On-policy | MCTD(0)TD(λ)Gradient TD | YYYY | YYYY | YNNY |'
  id: totrans-247
  prefs: []
  type: TYPE_TB
- en: '| Off-policy | MCTD(0)TD(λ)Gradient TD | YYYY | YNNY | YNNY |'
  id: totrans-248
  prefs: []
  type: TYPE_TB
- en: Continuing further, Table [5-3](#Tab3) lists the convergence of control algorithms.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: Table 5-3
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: Convergence of Control Algorithms
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: '| Algorithm | Table Lookup | Linear | Nonlinear |'
  id: totrans-252
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  id: totrans-253
  prefs: []
  type: TYPE_TB
- en: '| MC control | Y | (Y) | N |'
  id: totrans-254
  prefs: []
  type: TYPE_TB
- en: '| On Policy TD (SARSA) | Y | (Y) | N |'
  id: totrans-255
  prefs: []
  type: TYPE_TB
- en: '| Off policy Q-Learning | Y | N | N |'
  id: totrans-256
  prefs: []
  type: TYPE_TB
- en: '| Gradient Q-Learning | Y | Y | N |'
  id: totrans-257
  prefs: []
  type: TYPE_TB
- en: (Y) fluctuates around the near-optimal value function. The guarantee of convergence
    is off in all nonlinear cases.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: (Y) 围绕近最优值函数波动。在所有非线性情况下，收敛的保证都不成立。
- en: Batch Methods (DQN)
  id: totrans-259
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批量方法（DQN）
- en: 'Up to now, the chapter has been focusing on algorithms that were incremental—that
    is, you sampled transition and then using the values you updated the weight vector
    *w* with the help of stochastic gradient descent. But this approach is not sample
    efficient. You discard a sample after using it only once. However, with nonlinear
    function approximation, especially with neural networks, you need multiple passes
    over the network to make the network weights converge to true values. Further,
    in many real-life scenarios like robotics, you need sample efficiency on two counts:
    neural networks with the slow convergence and hence the need for multiple passes,
    and generating samples in real life being very slow. In this section on batch
    reinforcement methods, I take you through the use of batch methods specifically
    with Deep Q Networks, which are the deep neural network version of the off-policy
    Q-learning.'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，本章一直关注增量算法——也就是说，你采样转换，然后使用这些值在随机梯度下降的帮助下更新权重向量 *w*。但是这种方法并不高效。你只用了一次就丢弃了一个样本。然而，使用非线性函数逼近，特别是使用神经网络，你需要多次遍历网络才能使网络权重收敛到真实值。此外，在许多现实场景中，如机器人技术，你需要从两个方面提高样本效率：神经网络收敛速度慢，因此需要多次遍历，以及在实际生活中生成样本非常缓慢。在本节关于批量强化方法中，我将向您介绍使用批量方法，特别是与深度Q网络（Deep
    Q Networks）的结合，这是离策略Q学习的深度神经网络版本。
- en: 'Like before, you estimate the state value using function approximation as shown
    in Equation [5-1](#Equ1): ![$$ \hat{v}\left(s,w\right)\approx {v}_{\pi }(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq26.png).'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，你使用函数逼近估计状态值，如方程 [5-1](#Equ1) 所示：![$$ \hat{v}\left(s,w\right)\approx {v}_{\pi
    }(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq26.png)。
- en: Consider that you somehow know the actual state value *v*[π](*s*), and you are
    trying to learn the weight vector *w* to arrive at a good estimate ![$$ \hat{v}\left(s,w\right)\approx
    {v}_{\pi }(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq27.png).
    You collect a batch of experiences.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到你以某种方式知道实际状态值 *v*[π](*s*)，你正在尝试学习权重向量 *w* 以达到良好的估计 ![$$ \hat{v}\left(s,w\right)\approx
    {v}_{\pi }(s) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq27.png)。你收集一批经验。
- en: '![$$ D=\left\{&lt;{s}_1,{v}_1^{\pi }&gt;,&lt;{s}_2,{v}_2^{\pi }&gt;,\dots .,&lt;{s}_T,{v}_T^{\pi
    }&gt;\right\} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equo.png)'
  id: totrans-263
  prefs: []
  type: TYPE_IMG
  zh: '![经验集](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equo.png)'
- en: You then form a least squares loss as the average of the difference between
    the true value and the estimate and then carry out gradient descent to minimize
    error. You use a mini-batch gradient descent to take a sample of past experiences
    and use that to move the weight vector using a learning rate α.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你将最小二乘损失作为真实值与估计值之间差异的平均值，然后执行梯度下降以最小化误差。你使用小批量梯度下降来采样过去的经验，并使用学习率 α 移动权重向量。
- en: '![$$ LS(w)={E}_D\left[{\left({v}_{\pi }(s)-\hat{v}\left(s;w\right)\right)}^2\right]
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equp.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equp.png)'
- en: 'Then approximate the expectation as the mean of the samples:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 然后近似期望为样本的平均值：
- en: '![$$ LS(w)=\frac{1}{N}\sum \limits_{i=1}^N{\left({v}_{\pi}\left({s}_i\right)-\hat{v}\left({s}_i;w\right)\right)}^2
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ22.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ22.png)'
- en: (5-22)
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: (5-22)
- en: Taking gradient of *LS*(*w*) with respect to *w* and using the negative gradient
    to adjust *w*, you get the weight update Equation [5-23](#Equ23). Note that it
    is similar to Equation [5-7](#Equ7)
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 对 *LS*(*w*) 关于 *w* 求梯度，并使用负梯度来调整 *w*，你得到权重更新方程 [5-23](#Equ23)。请注意，它与方程 [5-7](#Equ7)
    类似。
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\kern0.5em \frac{1}{N}\sum \limits_{i=1}^N\left[{v}_{\pi}\left({s}_i\right)-\hat{v}\left({s}_i;w\right)\right].{\nabla}_w\
    \hat{v}\left({s}_i;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ23.png)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![状态转移方程](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ23.png)'
- en: (5-23)
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: (5-23)
- en: As before, you can move from state values *v*(*s*; *w*) to state-action values
    *q*(*s*, *a*; *w*) and carry out a similar update with q-values. To remind the
    readers once more, the purpose of moving from state values to state-action values
    is to be able to find the optimal policy for a given state. As you have q-values
    for all possible actions in a state, you can choose the optimal action in that
    state, do so for all states and then again carry out the estimation/prediction
    of q-values followed by optimal action selection. Keep repeating these until some
    kind of convergence of policy and q-values.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，您可以从状态值 *v*(*s*; *w*) 移动到状态-动作值 *q*(*s*, *a*; *w*)，并对 q 值进行类似的更新。为了再次提醒读者，从状态值移动到状态-动作值的目的在于能够找到给定状态的最优策略。由于您拥有该状态下所有可能动作的
    q 值，您可以选择该状态下的最优动作，对所有状态都这样做，然后再次进行 q 值的估计/预测以及最优动作的选择。重复这些操作，直到策略和 q 值达到某种收敛。
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\kern0.5em \frac{1}{N}\sum \limits_{i=1}^N\left[{q}_{\pi}\left({s}_i,{a}_i\right)-\hat{q}\left({s}_i,{a}_i;w\right)\right].{\nabla}_w\
    \hat{q}\left({s}_i,{a}_i;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ24.png)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .\kern0.5em \frac{1}{N}\sum \limits_{i=1}^N\left[{q}_{\pi}\left({s}_i,{a}_i\right)-\hat{q}\left({s}_i,{a}_i;w\right)\right].{\nabla}_w\
    \hat{q}\left({s}_i,{a}_i;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ24.png)'
- en: (5-24)
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: (5-24)
- en: 'If you remember from past derivations, you do not know the true value functions,
    *v*[π](*s*[*i*]) or *q*[π](*s*[*i*], *a*[*i*]). As before, you replace the true
    values with the estimates using either the MC or TD approach. Let’s now look at
    a flavor of this called DQN, the deep learning version of Q-learning shown in
    Chapter [4](502835_2_En_4_Chapter.xhtml). In DQN, an off-policy algorithm, you
    sample the current state *s*, take a step *a* as per the current behavior policy,
    and an ϵ-greedy policy using current q-values. You observe the reward *r* and
    next state *s*^′. You use ![$$ \underset{a^{\prime }}{\max}\hat{q}\left({s}^{''},\bullet;
    w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq28.png)
    for all actions *a*^′ possible in the state *s*^′ to form the target. This is
    shown here:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还记得过去的推导，您不知道真正的值函数，*v*[π](*s*[*i*]) 或 *q*[π](*s*[*i*], *a*[*i*])。和以前一样，您使用
    MC 或 TD 方法用估计值替换真实值。现在让我们看看这种方法的变体，称为 DQN，这是在第 [4](502835_2_En_4_Chapter.xhtml)
    章节中展示的 Q-learning 的深度学习版本。在 DQN 中，一个离策略算法，您采样当前状态 *s*，根据当前行为策略采取一步 *a*，并使用当前 q
    值的 ϵ-greedy 策略。您观察到奖励 *r* 和下一个状态 *s*^′。您使用 ![$$ \underset{a^{\prime }}{\max}\hat{q}\left({s}^{'},\bullet;
    w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq28.png)
    来形成目标，该目标在状态 *s*^′ 中对所有可能的动作 *a*^′ 进行了最大化。这在此处展示：
- en: '![$$ {q}_{\uppi}\left({s}_i,{a}_i\right)={r}_i+\underset{a''}{\max}\hat{q}\left({s}_i^{\prime
    },{a}_i^{\prime };{w}_t^{-}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equq.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}_{\uppi}\left({s}_i,{a}_i\right)={r}_i+\underset{a''}{\max}\hat{q}\left({s}_i^{\prime
    },{a}_i^{\prime };{w}_t^{-}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equq.png)'
- en: 'Here you have used a different weight vector ![$$ {w}_t^{-} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq29.png)
    to calculate the estimate of the target. Essentially, you have two networks, one
    called *online* with weights *w*, which is being updated as per Equation [5-24](#Equ24),
    and a second similar network called *target network* but with a copy of the weight
    called *w*^−. Weight vector *w*^− is updated less frequently, say after every
    100 updates of online network weight *w*. This approach keeps the target network
    constant and allows you to use the machinery of supervised learning. Also note
    that the subscript *i* denotes the sample in the mini-batch and *t* denotes the
    index at which weights are updated. The final update equation with all this put
    together can be written as follows:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，您使用了一个不同的权重向量 ![$$ {w}_t^{-} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq29.png)
    来计算目标估计。本质上，您有两个网络，一个称为 *在线* 网络带有权重 *w*，它根据方程 [5-24](#Equ24) 进行更新，另一个类似的网络称为 *目标网络*，但带有名为
    *w*^− 的权重副本。权重向量 *w*^− 的更新频率较低，例如，在在线网络权重 *w* 更新后的每 100 次更新。这种方法使目标网络保持不变，并允许您使用监督学习的机制。此外，请注意，下标
    *i* 表示迷你批次的样本，而 *t* 表示权重更新的索引。将所有这些放在一起，最终的更新方程可以写成以下形式：
- en: '![$$ {w}_{t+1}={w}_t+\alpha .\kern0.5em \frac{1}{N}\sum \limits_{i=1}^N\left[{r}_i+\gamma
    {\mathit{\max}}_{a_i^{\prime }}\overset{\sim }{q}\left({s}_i^{\prime },{a}_i^{\prime
    };{w_t}^{-}\right)-\hat{q}\left({s}_i,{a}_i;{w}_t\right)\right].{\nabla}_{w_t}\
    \hat{q}\left({s}_i,{a}_i;{w}_t\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ25.png)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{t+1}={w}_t+\alpha .\kern0.5em \frac{1}{N}\sum \limits_{i=1}^N\left[{r}_i+\gamma
    {\mathit{\max}}_{a_i^{\prime }}\overset{\sim }{q}\left({s}_i^{\prime },{a}_i^{\prime
    };{w_t}^{-}\right)-\hat{q}\left({s}_i,{a}_i;{w}_t\right)\right].{\nabla}_{w_t}\
    \hat{q}\left({s}_i,{a}_i;{w}_t\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ25.png)'
- en: (5-25)
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: (5-25)
- en: This equation looks very daunting. Let’s unpack it. The expression ![$$ {r}_i+\gamma\
    {\mathit{\max}}_{a_i^{\prime }}\overset{\sim }{q}\left({s}_i^{\prime },{a}_i^{\prime
    };{w_t}^{-}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq30.png)
    is the target value for *q*(*s*[*i*], *a*[*i*]) and is formed using a different
    neural network with weights ![$$ {w}_t^{-} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq31.png).
    The current q-value estimate is given by ![$$ \hat{q}\left({s}_i,{a}_i;{w}_t\right),
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq32.png) which
    is done using a network with weights *w*[*t*]. You calculate the error by subtracting
    current estimate from the target and then multiply this with the gradient of current
    estimate—that is, ![$$ {\nabla}_{w_t}\ \hat{q}\left({s}_i,{a}_i;{w}_t\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq33.png).
    This is then averaged over all the *N* samples and added to current weight *w*[*t*]
    using learning rate α. To collect the samples, you run the agent through the environment
    using the *ε*-greedy policy and collect experiences in a buffer called replay
    buffer *D*.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 这个方程看起来非常令人畏惧。让我们来分解它。表达式 ![$$ {r}_i+\gamma\ {\mathit{\max}}_{a_i^{\prime }}\overset{\sim
    }{q}\left({s}_i^{\prime },{a}_i^{\prime };{w_t}^{-}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq30.png)
    是 *q*(*s*[*i*], *a*[*i*]) 的目标值，并且使用具有权重 ![$$ {w}_t^{-} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq31.png)
    的不同神经网络形成。当前的q值估计由 ![$$ \hat{q}\left({s}_i,{a}_i;{w}_t\right), $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq32.png)
    给出，这是使用权重 *w*[*t*] 的网络完成的。你通过从当前估计中减去目标并乘以当前估计的梯度来计算误差——即 ![$$ {\nabla}_{w_t}\
    \hat{q}\left({s}_i,{a}_i;{w}_t\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq33.png)。然后，将这个误差平均到所有的
    *N* 个样本上，并使用学习率 α 添加到当前的权重 *w*[*t*] 上。为了收集样本，你使用 *ε*-贪婪策略运行智能体通过环境，并在称为重放缓冲区 *D*
    的缓冲区中收集经验。
- en: You also update target network weights ![$$ {w}_t^{-} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq34.png)
    once in a while (say after every 100 batch updates of *w*[*t*]). You use the updated
    q-values with ϵ-exploration to add more experiences to the replay buffer and carry
    out the whole cycle once again. This in essence is the DQN approach. There is
    a lot more to say about this in the next chapter, which is completely devoted
    to DQN and its variants. For now, I leave the topic here and move on.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 你也会偶尔更新目标网络权重 ![$$ {w}_t^{-} $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq34.png)（比如说在每次
    *w*[*t*] 的100个批量更新之后）。你使用更新的q值和 ϵ-探索来向重放缓冲区添加更多经验，并再次完成整个周期。这本质上就是DQN方法。关于这一点，下一章将有更多内容，它完全致力于DQN及其变体。现在，我将这个话题留在这里，继续前进。
- en: Linear Least Squares Method
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性最小二乘法
- en: Experience replay as used in the batch method finds the least square solution,
    minimizing the error between the target as estimated using TD or MC and the current
    value function estimate. However, it takes many iterations to converge. However,
    if you use linear function approximation for value function ![$$ \hat{v}\left(s;w\right)=x{(s)}^Tw
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq35.png) for prediction
    and ![$$ \hat{q}\left(s,a;w\right)=x{\left(s,a\right)}^Tw $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq36.png)
    for control, you can find the least square solution directly. Let’s look at the
    prediction first.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 批量方法中使用的经验回放找到最小二乘解，最小化使用TD或MC估计的目标值与当前价值函数估计之间的误差。然而，它需要许多迭代才能收敛。然而，如果你使用线性函数逼近价值函数
    ![$$ \hat{v}\left(s;w\right)=x{(s)}^Tw $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq35.png)
    进行预测和 ![$$ \hat{q}\left(s,a;w\right)=x{\left(s,a\right)}^Tw $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq36.png)
    进行控制，你可以直接找到最小二乘解。我们先来看预测部分。
- en: 'Start with Equation [5-22](#Equ22) and substituting ![$$ \hat{v}\left(s;w\right)=x{(s)}^Tw
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq37.png), you
    get this:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 从方程 [5-22](#Equ22) 开始，并代入 ![$$ \hat{v}\left(s;w\right)=x{(s)}^Tw $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq37.png)，你得到这个：
- en: '![$$ LS(w)=\frac{1}{N}\sum \limits_{i=1}^N{\left({v}_{\pi}\left({s}_i\right)-x{\left({s}_i\right)}^T.w\right)}^2
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equr.png)'
  id: totrans-285
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equr.png)'
- en: 'Taking gradient of *LS*(*w*) with respect to *w* and setting it to zero, you
    get the following:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 对LS(*w*)关于 *w* 求梯度并将其设为零，得到以下结果：
- en: '![$$ \sum \limits_{i=1}^Nx\left({s}_i\right)\ {v}_{\pi}\left({s}_i\right)=\sum
    \limits_{i=1}^Nx\left({s}_i\right).x{\left({s}_i\right)}^T\ w $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equs.png)'
  id: totrans-287
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equs.png)'
- en: 'Solving for *w* gives the following:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 求解 *w* 得到以下结果：
- en: '![$$ w={\left(\sum \limits_{i=1}^Nx\left({s}_i\right).x{\left({s}_i\right)}^T\
    \right)}^{-1}\sum \limits_{i=1}^Nx\left({s}_i\right)\ {v}_{\pi}\left({s}_i\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ26.png)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equ26.png)'
- en: (5-26)
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: (5-26)
- en: The previous solution involves the inversion of a *NxN* matrix that requires
    *O*(*N*³) computations. However, using Shermann-Morrison, you can solve this in
    *O*(*N*²) time. As before, you do not know the true value *v*[π](*s*[*i*]). You
    replace the true value with its estimate using MC, TD(0), or TD(*λ*) estimates
    giving you linear least square MC (LSMC), LSTD, or LSTD(*λ*) prediction algorithms.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的解涉及到一个 *NxN* 矩阵的求逆，需要 *O*(*N*³) 次计算。然而，使用Sherman-Morrison，你可以在 *O*(*N*²)
    时间内解决这个问题。和之前一样，你不知道真正的值 *v*[π](*s*[*i*])。你用MC、TD(0)或TD(*λ*)的估计值来代替真实值，从而得到线性最小二乘MC（LSMC）、LSTD或LSTD(*λ*)预测算法。
- en: 'LSMC: *v*[*π*](*s*[*i*]) ≈ *G*[*i*]'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 'LSMC: *v*[*π*](*s*[*i*]) ≈ *G*[*i*]'
- en: 'LSTD: ![$$ {v}_{\pi}\left({s}_i\right)\approx R+\gamma\ \hat{v}\left({s}_i^{\prime
    };w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq38.png)'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 'LSTD: ![$$ {v}_{\pi}\left({s}_i\right)\approx R+\gamma\ \hat{v}\left({s}_i^{\prime
    };w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq38.png)'
- en: 'LSTD(λ): *v*[*π*](*s*[*i*]) ≈ *G*[*i*]^(*λ*)'
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 'LSTD(λ): *v*[*π*](*s*[*i*]) ≈ *G*[*i*]^(*λ*)'
- en: All these prediction algorithms have good convergence both for off-policy and
    on-policy.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些预测算法在离策略和在线策略下都具有良好的收敛性。
- en: Moving ahead, you extend the analysis to control using the q-value linear function
    approximation and GPI where the previous approach is used for the q-value prediction,
    followed by the greedy q-value maximization in the policy improvement step. This
    is known as *linear least square policy iteration* (LSPI). You iterate through
    these cycles of prediction followed by improvement until the policy converges—that
    is, until the weights converge. The final result of linear least square Q-learning
    (LSPI) is shown here, without going through the derivation.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的分析中，你将分析扩展到使用q值线性函数近似和GPI进行控制，其中之前的方法用于q值预测，然后在策略改进步骤中进行贪婪q值最大化。这被称为*线性最小二乘策略迭代*（LSPI）。你将迭代这些预测和改进的周期，直到策略收敛——也就是说，直到权重收敛。线性最小二乘Q学习（LSPI）的最终结果在此处展示，省略了推导过程。
- en: 'Here is the prediction step:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是预测步骤：
- en: '![$$ w={\left(\sum \limits_{i=1}^N\;x\left({s}_i,{a}_i\right).{\left(x\left({s}_i,{a}_i\right)+\gamma
    \kern0.33em x\left({s}_i^{\prime },\pi \left({s}_i^{\prime}\right)\right)\right)}^T\kern0.33em
    \right)}^{-1}\sum \limits_{i=1}^N\;x\left({s}_i,{a}_i\right)\kern0.33em {r}_i
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equt.png)'
  id: totrans-298
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equt.png)'
- en: where (*i*) is the *i*^(*th*) sample (![$$ {s}_i,{a}_i,{r}_i,{s}_i^{\prime }
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq39.png)) from
    experience replay *D* and ![$$ \uppi \left({s}_i^{\prime}\right)=\arg \underset{a^{'}}{\max}\hat{q}\left({s}_i^{\prime
    },{a}_i^{\prime };w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq40.png)
    —that is, the action with maximum q-value in state *s*^′.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 (*i*) 是第 *i* 个样本 (![经验回放](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq39.png))
    来自经验回放 *D*，以及 ![$$ \uppi \left({s}_i^{\prime}\right)=\arg \underset{a^{'}}{\max}\hat{q}\left({s}_i^{\prime
    },{a}_i^{\prime };w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq40.png)
    ——即状态 *s*^′ 中的最大q值动作。
- en: 'And here is the control step:'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是控制步骤：
- en: '![$$ \uppi \left({s}_i^{\prime}\right)=\arg \underset{a''}{\max}\hat{q}\left({s}_i^{\prime
    },{a}_i^{\prime };{w}^{\mathrm{updated}}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equu.png)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \uppi \left({s}_i^{\prime}\right)=\arg \underset{a''}{\max}\hat{q}\left({s}_i^{\prime
    },{a}_i^{\prime };{w}^{\mathrm{updated}}\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_Equu.png)'
- en: In the control step, for each state *s*, you change the policy that maximizes
    the q-value after the weight update *w* carried out in the previous prediction
    step.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 在控制步骤中，对于每个状态 *s*，你改变在之前的预测步骤中进行的权重更新 *w* 后最大化 q 值的策略。
- en: As you move farther into the book, the function approximation of either state
    values *v*(*s*), state-action values *q*(*s*, *a*) and policy π(*s*| *a*) will
    be based on some kind of neural network model. The training of these is governed
    by use of deep learning frameworks like PyTorch, TensorFlow, or JAX. In this edition
    of the book, I largely focus on PyTorch, which has gained significant traction
    since the first edition of this book. PyTorch and its related ecosystem of libraries
    is dominating at the moment. For completeness’ sake, I do cover TensorFlow variants
    occasionally. To prepare you, the next section is a quick introduction to these
    underlying deep learning frameworks.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你进一步阅读本书，状态值 *v*(*s*)、状态动作值 *q*(*s*, *a*) 和策略 π(*s*| *a*) 的函数逼近将基于某种神经网络模型。这些模型的训练由使用深度学习框架如
    PyTorch、TensorFlow 或 JAX 来管理。在本版书中，我主要关注 PyTorch，自从本书的第一版以来，它已经获得了显著的吸引力。PyTorch
    及其相关的库生态系统目前占据主导地位。为了完整性，我偶尔也会涵盖 TensorFlow 变体。为了让你做好准备，下一节是对这些底层深度学习框架的快速介绍。
- en: Deep Learning Libraries
  id: totrans-304
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习库
- en: Previous sections in the chapter showed that, to use the function approximation
    approach, you need to have an efficient way to calculate the derivatives of state-value
    function ![$$ {\nabla}_w\hat{v}\left(s;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq41.png)
    or the action-value function ![$$ {\nabla}_w\hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq42.png).
    If you are using neural networks, you use back-propagation to calculate these
    derivatives at each layer of the network. This is where libraries like PyTorch
    and TensorFlow come into the picture. Similar to the NumPy library, they also
    carry out vector/matrix computations in an efficient manner. Further, these are
    highly optimized to handle tensors (arrays with more than two dimensions), both
    using CPU and GPUs.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 本章前面的部分展示了，为了使用函数逼近方法，你需要有一种有效的方式来计算状态值函数 ![$$ {\nabla}_w\hat{v}\left(s;w\right)
    $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq41.png) 或动作值函数
    ![$$ {\nabla}_w\hat{q}\left(s,a;w\right) $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq42.png)
    的导数。如果你使用神经网络，你将使用反向传播来计算网络每一层的这些导数。这就是像 PyTorch 和 TensorFlow 这样的库发挥作用的地方。与 NumPy
    库类似，它们也以高效的方式执行向量/矩阵计算。此外，这些库高度优化以处理张量（超过两个维度的数组），既使用 CPU 也使用 GPU。
- en: In neural networks, you need to be able to back-propagate to calculate the gradients
    of error with respect to the weights of layers at all levels. Both these libraries
    are highly abstracted and optimized to handle this for you behind the scenes.
    You just need to build the forward computation, taking input through all the computations
    to give the final output. The libraries keep track of the computation graph and
    allow you to carry out the gradient update to weights with just one function call.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 在神经网络中，你需要能够反向传播以计算所有层权重相对于误差的梯度。这两个库都高度抽象并优化，以在幕后为你处理这些操作。你只需要构建正向计算，通过所有计算输入以给出最终输出。这些库会跟踪计算图，并允许你通过一个函数调用进行权重梯度的更新。
- en: This section takes you through the popular frameworks such as PyTorch, PyTorch
    Lightning, and TensorFlow. It is introductory level coverage. If you are familiar
    with these libraries, you can skip this section. Also, if you are interested in
    diving deep into the topic, you’d do well to take up further studies after getting
    the basic introduction. You can refer to the resources on the Internet for more
    details.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将带您了解流行的框架，如 PyTorch、PyTorch Lightning 和 TensorFlow。这是入门级别的覆盖。如果你熟悉这些库，你可以跳过这一节。此外，如果你对深入研究这个主题感兴趣，在获得基本介绍后，你最好进行进一步的学习。你可以参考互联网上的资源以获取更多详细信息。
- en: PyTorch
  id: totrans-308
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PyTorch
- en: PyTorch is a framework that allows manipulation of tensors using constructs
    like NumPy. In addition, it has modules to allow auto differentiation to carry
    out back-propagation, which forms the backbone of training a neural network.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch 是一个框架，允许使用类似 NumPy 的构造操作张量。此外，它还包含模块，允许自动微分执行反向传播，这是训练神经网络的核心。
- en: What Are Neural Networks
  id: totrans-310
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 什么是神经网络
- en: Deep learning is based on artificial neural networks, which are made up of neurons.
    A neuron takes inputs, calculates the weighted sum, and then passes the sum through
    some kind of nonlinear function *f*(*h*) (called the activation function), as
    shown in Figure [5-11](#Fig11).
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习基于人工神经网络，神经网络由神经元组成。神经元接收输入，计算加权求和，然后将求和通过某种非线性函数 *f*(*h*)（称为激活函数）传递，如图
    [5-11](#Fig11) 所示。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig11_HTML.jpg)'
  id: totrans-312
  prefs: []
  type: TYPE_IMG
  zh: '![神经网络图](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig11_HTML.jpg)'
- en: A neural network diagram. 3 input nodes of x 1, x 2, and 1 lead to a node of
    summation through w 1, w 2, and b. The node for summation leads to a mode of h,
    followed by a node of f of h, and ends with an output of y.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络图。输入层有 x 1、x 2 和 1 三个节点，通过 w 1、w 2 和 b 连接到求和节点。求和节点连接到 h 模式，然后是 h 的 f 节点，最后输出
    y。
- en: Figure 5-11
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-11
- en: A neuron in a neural network
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络中的神经元
- en: The training in deep learning refers to finding the weight vector [*w*[1], *w*[2],
    *b*] using back-propagation. Of course, the neural network model is composed of
    billions of such neurons grouped into layers and many such layers are stacked
    together. The arrangement of the neural network layers has many varieties, giving
    rise to architectures such as CNN (Convolutional Neural Networks), RNN (Recurrent
    Neural Networks), and in last few years to the transformers architecture. The
    world of large language models (LLMs) is dominated by transformers at its core
    and comprises tens and hundreds of billions of weight parameters.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习中的训练是指使用反向传播找到权重向量 [*w*[1], *w*[2], *b*]。当然，神经网络模型由数十亿个这样的神经元组成，这些神经元被分组到层中，并且许多这样的层堆叠在一起。神经网络层的排列有许多种类，产生了如
    CNN（卷积神经网络）、RNN（循环神经网络）等架构。在最近几年，transformers 架构也应运而生。大型语言模型（LLMs）的核心由 transformers
    控制，并包含数十亿甚至数百亿个权重参数。
- en: A basic level architecture is comprised of simple layers, with all neurons from
    the previous layers connected to all the neurons of the current layer. This formation
    is called a *linear dense layer architecture*, as shown in Figure [5-12](#Fig12).
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 基础级别的架构由简单的层组成，前一层中的所有神经元都与当前层的所有神经元相连。这种结构被称为 *线性密集层架构*，如图 [5-12](#Fig12) 所示。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig12_HTML.jpg)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![基础架构图](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig12_HTML.jpg)'
- en: A diagram of a neural network. 16 numbers of nodes in the input layer pass through
    different layers and render an output node in the hidden layer.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络图。输入层有 16 个节点，通过不同层传递，并在隐藏层生成一个输出节点。
- en: Figure 5-12
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-12
- en: A simple, fully connected neural network
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的全连接神经网络
- en: You can take the MNIST image dataset and train a PyTorch model to predict the
    digit based on the grayscale image that’s 24x24 pixels. Accordingly, the input
    layer will have 768 inputs translating to flattened 24x24 image. The output will
    have ten units, which will produce the probability that input image is a “1” or
    “2” and so on. The complete code of end-to-end PyTorch training is given in the
    Python notebook called `5.c-Intro-to-pytorch.ipynb`.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用 MNIST 图像数据集，并训练一个 PyTorch 模型来根据 24x24 像素的灰度图像预测数字。因此，输入层将有 768 个输入，对应于展平的
    24x24 图像。输出将有十个单元，这将产生输入图像是“1”或“2”等的概率。完整的端到端 PyTorch 训练代码在名为 `5.c-Intro-to-pytorch.ipynb`
    的 Python 笔记本中给出。
- en: Several hidden layers take 768 dimensional inputs to the first 192 units and
    then to the 128 units, with the final output layer taking 128 units to 10 units.
    You create the model in PyTorch by extending the PyTorch `Model` class and implementing
    the forward method to take input image vector and output a ten-dimensional output
    vector. Listing [5-8](#PC8) shows the code that creates this network in PyTorch.
    The `__init__` function defines the layers of the network using the PyTorch supplied
    `Linear` layer module. The `forward` function implements the flow of input tensor
    through the network, outputting the ten-dimensional output vector. It returns
    the raw score, which is converted into probability in the `predict` function with
    the help of a `softmax` function. The `predict` function is just for convenience.
    It is not required. The only two things that are required are defining the layers
    of the network in `init` and implementing the `forward` function.
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 几个隐藏层将768维的输入传递到前192个单元，然后传递到128个单元，最终输出层将128个单元传递到10个单元。你通过扩展PyTorch的`Model`类并实现前向方法来创建PyTorch模型，该方法接受输入图像向量和输出一个十维输出向量。列表[5-8](#PC8)展示了在PyTorch中创建此网络的代码。`__init__`函数使用PyTorch提供的`Linear`层模块定义网络的层。`forward`函数实现了输入张量通过网络的流动，输出十维输出向量。它返回原始分数，该分数在`predict`函数中通过`softmax`函数的帮助转换为概率。`predict`函数只是为了方便，不是必需的。所需做的只有两件事：在`init`中定义网络的层，并实现`forward`函数。
- en: '[PRE7]'
  id: totrans-324
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: You load the `MNIST` dataset and prepare `dataloaders` to supply images in batches
    to the training code, as shown in Listing [5-9](#PC9). It consists of use of three
    high-level functions—`transforms` transforms the images and does things like normalization
    and conversion of image to PyTorch tensors, `datasets` downloads the dataset locally
    and then wraps the downloaded dataset into a `DataLoader`, which supplies images
    to the rest of the code in batches. These are highly optimized functions with
    many parameters to tweak the behavior based on the specific need. You can read
    more about these in the PyTorch documentation.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 你加载`MNIST`数据集并准备`dataloaders`，以便将图像按批次提供给训练代码，如列表[5-9](#PC9)所示。它包括使用三个高级函数——`transforms`将图像转换为PyTorch张量并进行归一化等操作，`datasets`在本地下载数据集并将其包装到`DataLoader`中，该`DataLoader`按批次向代码的其余部分提供图像。这些函数高度优化，具有许多参数，可以根据特定需求调整行为。你可以在PyTorch文档中了解更多关于这些函数的信息。
- en: '[PRE8]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Training with Back-Propagation
  id: totrans-327
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用反向传播进行训练
- en: After having defined the model and prepared the data, the next step is to train
    the model. This involves first defining the optimizer that will be used to keep
    track of gradients during back-propagation and the code to adjust the weights
    on the neural network. Adam is a very popular optimizer with advanced and adaptive
    capabilities to adjust the training step α as training progresses. There are many
    more optimizers. Optimizer design is a big field of research on its own. You also
    define a loss function, which must be minimized as part of training the network.
    Listing [5-10](#PC10) shows the code for these steps. This is then followed by
    the training code, in which you go over the training data in batches, calculate
    the loss function value, and use the optimizer to do a back-propagation, adjusting
    the weights.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义模型和准备数据之后，下一步是训练模型。这包括首先定义用于在反向传播过程中跟踪梯度的优化器以及调整神经网络权重的代码。Adam是一个非常流行的优化器，它具有先进的自适应能力，可以调整随着训练进展的训练步长α。还有许多其他的优化器。优化器设计是独立的一个研究领域。你还需要定义一个损失函数，这是网络训练的一部分。列表[5-10](#PC10)展示了这些步骤的代码。然后是训练代码，其中你按批次遍历训练数据，计算损失函数值，并使用优化器进行反向传播，调整权重。
- en: '[PRE9]'
  id: totrans-329
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Once the model is trained, you can pass a new image and observe the probability
    distribution of the model’s prediction. I created a custom function called `view_classification`
    for the same. To pass images through the network and observe the outcome, you
    need a short three-line code, as shown in Listing [5-11](#PC11).
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦模型训练完成，你可以传递一个新的图像并观察模型预测的概率分布。我为此创建了一个名为`view_classification`的自定义函数。要通过网络传递图像并观察结果，你需要一段简短的三个代码行，如列表[5-11](#PC11)所示。
- en: '[PRE10]'
  id: totrans-331
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The output of passing an image of 4 is shown in Figure [5-13](#Fig13).
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 通过传递4的图像输出的结果如图[5-13](#Fig13)所示。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig13_HTML.jpg)'
  id: totrans-333
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig13_HTML.jpg)'
- en: A processed simulation image of number 4 and a horizontal bar chart labeled
    probability. The highest value of 0.90 is obtained by the bar at 4\. Values are
    estimated.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 数字4的处理模拟图像和标注为概率的水平条形图。条形图在4的位置获得了最高的0.90值。数值是估算的。
- en: Figure 5-13
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-13
- en: Prediction of trained model on input image of the “4” digit
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入图像为“4”数字的已训练模型上的预测
- en: In summary, the steps involved are 1) designing the model based on the problem
    and keeping specific input size and output size in mind; 2) preparing the training
    data; 3) defining the loss function and optimizer and finally; 4) the training
    code to train the model. You will be following these steps in increasing complex
    ways depending on the need of the agent learning algorithm in question.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: '总结来说，涉及的步骤包括：1）根据问题和考虑特定的输入大小和输出大小来设计模型；2）准备训练数据；3）定义损失函数和优化器；最后；4）训练模型的代码。你将根据所讨论的代理学习算法的需求，以递增复杂的方式遵循这些步骤。 '
- en: PyTorch Lightning
  id: totrans-338
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PyTorch Lightning
- en: PyTorch Lightning is a library written to speed up model development and training
    in PyTorch. PyTorch Lightning is the deep learning framework with “batteries included”
    for professional AI researchers and machine learning engineers who need maximal
    flexibility while super-charging performance at scale.
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch Lightning是一个编写来加速PyTorch中模型开发和训练的库。PyTorch Lightning是一个为需要最大灵活性和在规模上超级提升性能的专业AI研究人员和机器学习工程师提供的“包含电池”的深度学习框架。
- en: Lightning organizes PyTorch code to remove boilerplate code and unlock scalability.
    While doing so, it still offers full flexibility to try any idea without the boilerplate.
    It helps you focus on the core parts of your model training and provides you with
    a standard way to organize your code.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: Lightning组织PyTorch代码以移除样板代码并解锁可扩展性。在这样做的同时，它仍然提供了尝试任何想法的完全灵活性，而不需要样板代码。它帮助你专注于模型训练的核心部分，并提供了一种组织代码的标准方式。
- en: Most of the code will remain the same as you saw in the raw PyTorch notebook.
    The code to prepare data loaders is the same as before. You first create a network
    model in PyTorch like before. Just for variety, I have used another shorter version
    to create the neural network, this time using the `nn.Sequential` class from PyTorch,
    as shown in Listing [5-12](#PC12). The complete code for end-to-end training using
    PyTorch Lightning is given in the `5.d-Intro-to-pytorch-lighning.ipynb` notebook.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 大部分代码将与你在原始PyTorch笔记本中看到的一样。准备数据加载器的代码与之前相同。你首先在PyTorch中创建一个网络模型，就像之前一样。为了多样化，我使用了另一个更短的版本来创建神经网络，这次使用了PyTorch的`nn.Sequential`类，如列表[5-12](#PC12)所示。使用PyTorch
    Lightning进行端到端训练的完整代码在`5.d-Intro-to-pytorch-lighning.ipynb`笔记本中给出。
- en: '[PRE11]'
  id: totrans-342
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: When using PyTorch Lightning, you create a lightning model by extending the
    `pl.LightningModule` and implementing specific functions. This removes the need
    for the long boilerplate code you have for training when using pure PyTorch without
    Lightning. In this case, as shown in Listing [5-13](#PC13), you create a `LightningModule`
    called `MNISTClassifier`. In the `__init__` function, you initialize the model
    defined in Listing [5-12](#PC12). Next, you define the `training_step` function,
    which takes a batch of input training data, passes it through the model, and calculates
    the loss, which needs to be minimized. This function must return the loss which
    will be used by the optimizer to calculate the gradients during back-propagation.
    You then use `self.log` to log the results, which under the hood uses TensorBoard
    to log. You also have the choice to forward logging data to “weights and biases”
    or such other logging and experimentation services. Next, you implement a `test_step`
    which largely mimics the `training_step` producing metrics that you want to track
    during model performance evaluation. The last function you define is `configure_optimizers`
    to define the optimizer that will be used during back-propagation of gradients
    during the training phase.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用PyTorch Lightning时，您通过扩展`pl.LightningModule`并实现特定函数来创建一个lightning模型。这消除了在使用不带Lightning的纯PyTorch进行训练时需要的大量样板代码的需求。在这种情况下，如图表[5-13](#PC13)所示，您创建了一个名为`MNISTClassifier`的`LightningModule`。在`__init__`函数中，您初始化了列表[5-12](#PC12)中定义的模型。接下来，您定义了`training_step`函数，该函数接收一批输入训练数据，将其通过模型传递，并计算需要最小化的损失。此函数必须返回损失，该损失将由优化器在反向传播期间用于计算梯度。然后您使用`self.log`来记录结果，这底层使用TensorBoard进行记录。您还可以选择将日志数据前向传递到“weights
    and biases”或其他类似的日志和实验服务。接下来，您实现一个`test_step`，它主要模仿`training_step`，生成您在模型性能评估期间想要跟踪的指标。您定义的最后一个函数是`configure_optimizers`，用于定义在训练阶段反向传播梯度期间将使用的优化器。
- en: '[PRE12]'
  id: totrans-344
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: With PyTorch Lightning, once the Lightning module is defined, it requires one
    line of code to run the training code. There is no need to load data in a loop
    and run the backward step manually in the code. Listing [5-14](#PC14) shows the
    training code you need to execute to train the model. You just need to define
    a `trainer` and call the `fit` method on it by passing the `PyTorchLightning`
    module defined earlier and the `dataloaders` to it.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 使用PyTorch Lightning，一旦定义了Lightning模块，只需一行代码即可运行训练代码。无需在代码中循环加载数据并手动运行反向步骤。列表[5-14](#PC14)显示了您需要执行的训练代码以训练模型。您只需定义一个`trainer`，并通过传递之前定义的`PyTorchLightning`模块和`dataloaders`来调用其`fit`方法。
- en: '[PRE13]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The prediction code using the trained model remains the same as in PyTorch.
    Figure [5-14](#Fig14) shows the performance of the trained model for one sample
    of input.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 使用训练好的模型进行预测的代码与PyTorch中相同。图[5-14](#Fig14)显示了训练模型对一个输入样本的性能。
- en: '![](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig14_HTML.jpg)'
  id: totrans-348
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_5_Chapter/502835_2_En_5_Fig14_HTML.jpg)'
- en: A processed simulation image of number 5 and a horizontal bar chart labeled
    probability. The highest value of 0.90 is obtained by the bar at 5\. Values are
    estimated.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 数字5的加工模拟图像和标注为概率的水平条形图。条形图在5的位置获得了最高的0.90值。数值是估算的。
- en: Figure 5-14
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-14
- en: Prediction of a trained model on input image of a“5” digit
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 对一个“5”数字输入图像的训练模型预测
- en: As you can see, the use of PyTorch Lightning helps reduce the boilerplate code
    overhead.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，使用PyTorch Lightning有助于减少样板代码的开销。
- en: TensorFlow
  id: totrans-353
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow
- en: TensorFlow also largely follows the same pattern as PyTorch. It has its own
    set of data loaders, model building patterns, loss and optimizer definitions,
    and training loops. I’ll do a quick dive. The end-to-end training using TensorFlow
    is given in the `5.e-Intro-to-tensorflow.ipynb` notebook. Listing [5-15](#PC15)
    shows the code for downloading and creating the MNIST dataset under TensorFlow.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow在很大程度上遵循与PyTorch相同的模式。它有一套自己的数据加载器、模型构建模式、损失和优化器定义以及训练循环。我将快速介绍。TensorFlow的端到端训练可以在`5.e-Intro-to-tensorflow.ipynb`笔记本中找到。列表[5-15](#PC15)显示了在TensorFlow下下载和创建MNIST数据集的代码。
- en: '[PRE14]'
  id: totrans-355
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: As with PyTorch, you define the neural network model using the `tf.keras.model.Sequential`
    class, as shown in Listing [5-16](#PC16). It also gives the code for remaining
    steps—that is, defining the loss function as well as tying the model with the
    optimizer and loss function using the `model.compile` function call. Finally,
    like PyTorch Lightning, you use `model.fit` to train the model using the training
    data.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 与 PyTorch 类似，你使用 `tf.keras.model.Sequential` 类定义神经网络模型，如列表 [5-16](#PC16) 所示。它还提供了剩余步骤的代码——即定义损失函数以及使用
    `model.compile` 函数调用将模型与优化器和损失函数绑定。最后，像 PyTorch Lightning 一样，你使用 `model.fit` 来使用训练数据训练模型。
- en: '[PRE15]'
  id: totrans-357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The code to evaluate the output of the trained model on a sample image is shown
    in Listing [5-17](#PC17). It is largely the same as what you saw in the case of
    PyTorch.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 评估训练模型在样本图像上输出的代码显示在列表 [5-17](#PC17) 中。它与你在 PyTorch 的情况中看到的大致相同。
- en: '[PRE16]'
  id: totrans-359
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Like PyTorch or PyTorch Lightning, the model’s accuracy is very high after training.
    The probability distribution of the model’s output in a sample image mimics the
    kind of values you see in Figures [5-13](#Fig13) and [5-14](#Fig14).
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 与 PyTorch 或 PyTorch Lightning 类似，模型在训练后准确性非常高。模型在样本图像中的输出概率分布模仿你在图 [5-13](#Fig13)
    和 [5-14](#Fig14) 中看到的值。
- en: This completes the introduction of the popular three frameworks. There are many
    more that are emerging, such as JAX, FastAI, Glueon from AWS, Microsoft, and so
    on. I will stick to PyTorch most of the time and may occasionally show some sample
    code using TensorFlow.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了对流行三个框架的介绍。还有许多正在出现的框架，例如 JAX、FastAI、AWS、Microsoft 的 Glueon 等等。我大部分时间会坚持使用
    PyTorch，偶尔也会展示一些使用 TensorFlow 的示例代码。
- en: Summary
  id: totrans-362
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, the primary focus was to look at the use of function approximation
    for very large or continuous state spaces that cannot be handled using the approach
    of table-based learning that you saw in previous chapters.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，主要关注的是查看函数逼近在非常大或连续的状态空间中的应用，这些状态空间无法使用你在前几章中看到的基于表的学习方法来处理。
- en: The chapter talked about what it means to carry out optimization with function
    approximation. I also showed how the concepts of training in supervised learning,
    training a model to produce values close to targets, can be applied in reinforcement
    learning. The chapter emphasized the need for the proper handling due to moving
    targets and the sample interdependence that is present in RL.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了使用函数逼近进行优化意味着什么。我还展示了监督学习中的训练概念，即训练模型产生接近目标的值，如何在强化学习中应用。本章强调了由于移动目标和强化学习（RL）中存在的样本相互依赖性，需要适当处理。
- en: You then looked at various strategies of functional approximation, including
    linear and nonlinear ones. I also demonstrated that table-based methods are just
    special cases of linear approximation. This was followed by a detailed discussion
    of incremental methods for prediction and control. You saw these being applied
    to the mountain car for build training agents using *n*-step SARSA and SARSA(*λ*).
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你看到了各种函数逼近策略，包括线性和非线性。我还演示了基于表的方 法只是线性逼近的特殊情况。随后，对预测和控制增量方法进行了详细讨论。你看到了这些方法被应用于山车，用于构建使用
    *n*-步 SARSA 和 SARSA(*λ*) 的训练代理。
- en: Next, the chapter talked about batch methods in general and explored the complete
    derivation of the update rule for DQN, a popular algorithm from the family of
    batch methods. You then looked at linear least squares methods for prediction
    and control. Along the way, I kept highlighting the convergence issues in general
    as well as convergence in the specific methods being discussed.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，本章讨论了批量方法的一般情况，并探讨了批量方法家族中流行的 DQN（深度Q网络）算法的更新规则的完整推导。然后，你看到了用于预测和控制的最小二乘法。在这个过程中，我一直在强调一般收敛问题以及所讨论的具体方法的收敛性。
- en: I concluded the chapter with a brief introduction to deep learning frameworks
    like PyTorch, PyTorch Lightning, and TensorFlow.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 我以对 PyTorch、PyTorch Lightning 和 TensorFlow 等深度学习框架的简要介绍结束了这一章。
