  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [5-2](#PC2) 所示，`get_active_features` 函数接受 *S* 和离散输入动作 *A* 的连续二维值作为输入，以返回瓦片编码的
    `active_feature` *x*(*S*, *A*)——即对于给定的 (*S*, *A*) 激活的二进制瓦片特征。`q_predict` 函数也接受
    (*S*, *A*) 作为输入，并返回估计值 ![$$ \hat{q}\left(S,A;w\right)=x{\left(S,A\right)}^T\cdotp
    w $$](../images/502835_2_En_5_Chapter/502835_2_En_5_Chapter_TeX_IEq24.png)。它内部调用
    `get_active_features` 以首先获取特征，并与权重向量执行点积。
- en: '[PRE1]'
  id: totrans-187
  prefs: []
