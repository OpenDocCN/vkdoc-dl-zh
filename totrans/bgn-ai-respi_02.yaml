- en: 2. Basic AI Concepts
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, I introduce and explore the fundamental concepts that are crucial
    to AI.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: It is very important to closely study these concepts to gain an appreciation
    and understanding of how AI functions at its most rudimentary level. It would
    indeed be difficult to proceed with more advanced AI projects without first doing
    this initial study. I only cover the concepts necessary to understand the projects
    in this book. Let’s start with some foundational concept discussions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Boolean Algebra
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Boolean algebra was created by George Boole in 1847\. It is an [algebra](https://en.wikipedia.org/wiki/Abstract_algebra)
    in which variable values are the [truth values](https://en.wikipedia.org/wiki/Truth_value)—true
    and false, often denoted as 1 and 0, respectively. There are a few very basic
    Boolean operations, which are frequently used in AI expressions. These operations
    are listed for variables A and B, as follows:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: A AND B
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A OR B
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: NEGATE A
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: NEGATE B
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The expression A AND B may also be represented by A * B where the * symbol represents
    the AND’ing operation. It is not a true analog to the general multiplication symbol
    used in ordinary algebra, but it is close enough that most people use it interchangeably.
    Similarly, the expression A OR B can be represented by A + B, where the same observation
    holds true for the normal + symbol used in regular algebra. You will shortly see
    that there is a situation where 1 + 1 = 1 in Boolean algebra, but obviously is
    not true in non-Boolean algebra. The NEGATE or complement operation is unary,
    meaning it only uses one operand or variable; whereas AND and OR are binary, requiring
    two logical variables. The NEGATE operation has a formal symbol (¬), but it is
    not widely used in programs. Instead, a bar placed over the symbol is commonly
    used in most in logical expressions, which is the one that I use.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Table [2-1](#Tab1) shows the output resulting from various A and B inputs for
    the operations I just mentioned. Note that I use the variable C to represent the
    output.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-1.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Basic Boolean Operations
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '| Operation | Input Variables | Output Variable |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
- en: '|   | A | B | C |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
- en: '| A * B | 0 | 0 | 0 |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
- en: '| A * B | 1 | 0 | 0 |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
- en: '| A * B | 0 | 1 | 0 |'
  id: totrans-18
  prefs: []
  type: TYPE_TB
- en: '| A * B | 1 | 1 | 1 |'
  id: totrans-19
  prefs: []
  type: TYPE_TB
- en: '| A + B | 0 | 0 | 0 |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
- en: '| A + B | 1 | 0 | 1 |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
- en: '| A + B | 0 | 1 | 1 |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
- en: '| A + B | 1 | 1 | 1 |'
  id: totrans-23
  prefs: []
  type: TYPE_TB
- en: '| Ā | 0 | - | 1 |'
  id: totrans-24
  prefs: []
  type: TYPE_TB
- en: '| Ā | 1 | - | 0 |'
  id: totrans-25
  prefs: []
  type: TYPE_TB
- en: 'Logical symbols can easily be arranged to form both simple and complex Boolean
    algebraic expressions. For instance, the AND’ing operation may be expressed as
    follows:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{C}=\mathrm{A}*\mathrm{B} $$](A436848_1_En_2_Chapter_Equa.gif)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: It should not be hard to realize that far more complex expressions can be created
    by using more than two variables and combined using these basic operations. However,
    the important point to understand is that eventually all expressions resolve to
    a true or false, 1 or 0 output.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'There are also three secondary operations used in Boolean algebra:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: EXCLUSIVE OR
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MATERIAL IMPLICATION
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: EQUIVALENCE
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I use two of these three operations in inference discussion (material implication
    and equivalence), but I do not specifically call them out by their Boolean algebra
    names. In AI, there is a lot of overlap among the different subfields that go
    into overall AI technology; hence, it is not unusual to use concepts present in
    one subfield that uses a specific name that also exists in another subfield with
    a different name or reference. This differentiation should not bother you as long
    as you grasp the underlying concepts.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Some Additional Boolean Laws
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is also important that you understand some more basic Boolean algebra laws,
    because they are used at various times to combine logical expressions used in
    many of the chapters. They are briefly described here.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: 'This is an example of De Morgan’s law:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overline{\left(\mathrm{A}\ *\ \mathrm{B}\right)}=\overline{\mathrm{A}}\
    *\ \overline{\mathrm{B}} $$](A436848_1_En_2_Chapter_Equb.gif)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: '![$$ \overline{\left(\mathrm{A} + \mathrm{B}\right)}=\overline{\mathrm{A}}\
    *\ \overline{\mathrm{B}} $$](A436848_1_En_2_Chapter_Equc.gif)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: 'This is an example of associativity:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left(\mathrm{A}\kern0.5em *\kern0.5em \mathrm{B}\right)\kern0.5em *\kern0.5em
    \mathrm{C}\kern0.5em =\kern0.5em \mathrm{A}\kern0.5em *\kern0.5em \left(\mathrm{B}\kern0.5em
    *\kern0.5em \mathrm{C}\right) $$](A436848_1_En_2_Chapter_Equd.gif)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: '![$$ \left(\mathrm{A}+\mathrm{B}\right)+\mathrm{C}=\mathrm{A}+\left(\mathrm{B}+\mathrm{C}\right)
    $$](A436848_1_En_2_Chapter_Eque.gif)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
- en: 'This is an example of commutativity:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{A}\ *\ \mathrm{B} = \mathrm{B}\ *\ \mathrm{A} $$](A436848_1_En_2_Chapter_Equf.gif)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: '![$$ \mathrm{A} + \mathrm{B} = \mathrm{B} + \mathrm{A} $$](A436848_1_En_2_Chapter_Equg.gif)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
- en: 'This is an example of distributivity:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{A}\kern0.5em *\kern0.75em \left(\mathrm{B} + \mathrm{C}\right)
    = \left(\mathrm{A}\kern0.5em *\kern0.5em \mathrm{B}\right)+\left(\mathrm{A}\kern0.5em
    *\kern0.5em \mathrm{C}\right) $$](A436848_1_En_2_Chapter_Equh.gif)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
- en: '![$$ \mathrm{A}+\left(\mathrm{B}\kern0.5em *\kern0.5em \mathrm{C}\right)\kern0.5em
    =\kern0.5em \left(\mathrm{A}+\mathrm{B}\right)*\ \left(\mathrm{A}+\mathrm{C}\right)
    $$](A436848_1_En_2_Chapter_Equi.gif)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
- en: Inference
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Inference is part of the reasoning process introduced in Chapter [1](A436848_1_En_1_Chapter.html).
    This reasoning process consists of moving from an initial premise or statement
    of fact to a logical conclusion. Inference is ordinarily divided into three categories.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'Deduction: The derivation of a logical conclusion based on premises known or
    assumed to be true using the laws and rules of logic.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Induction: Making a universal conclusion based upon specific premises.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Abduction: Reduction of premises to the optimal explanation.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I use the inference deduction category for the following discussion, as it is
    the best fit for the topic of expert systems, which is introduced shortly.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'There is a Latin phrase, modus ponens, which means “the way that affirms by
    affirming.” It represents the fundamental rule for deductive inference. Using
    logic terms, this rule may be stated as “P [implies](https://en.wikipedia.org/wiki/Material_conditional)
    Q, and P is asserted to be true, so therefore Q must be true.” This rule dates
    to antiquity and has been used by logicians throughout the ages, up to and including
    the modern era. The rule may be broken into two sections. The first is a conditional
    claim that is traditionally stated in the form of if … then. The second part is
    the consequent of the conditional claim; that is, the logical statement following
    the then. The conditional claim for the general rule consists of two premises:
    that P implies Q and P is true. P is also known as the antecedent of the conditional
    claim. The consequent is obviously Q is true. The application of this simple modus
    ponens rule in AI is known as forward chaining, which is a key element in expert
    systems. I discuss it in the next section.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Expert Systems
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An expert system is a computer program designed to use facts present in a specific
    problem domain. It then develops conclusions about those facts in a way analogous
    to a human expert reasoning with the same facts and reaching similar conclusions.
    Such a program or expert system would need access to all the facts in the domain,
    as well as be programmed with a set of rules that a human expert would follow
    regarding those facts and drawing conclusions from the same facts. Sometimes this
    expert system is known as a rules-based or knowledge-based system.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: 'The first, large-scale expert system able to perform at a human-expert level
    was named MYCIN. It was used as an intelligent aide for doctors in their diagnosis
    of blood-borne infections. MYCIN incorporated about 450 rules. It was capable
    of creating correct diagnoses on a level comparable to an inexperienced doctor.
    The set of rules used in MYCIN was created based on interviews with a large number
    of experts in the field, who in turn relied on their own experiences and knowledge.
    To a large extent, the rules captured real-world data and knowledge beyond what
    was in medical textbooks and standard procedures. The rules used in MYCIN were
    in the same format I introduced earlier:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The following is an example:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Incidentally, septicemia is a very serious blood-borne illness and must be treated
    immediately.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: The conditional claim, which I will now simply shorten to the word condition
    may be complex by combining it with other conditions using the logical operators
    introduced in the Boolean algebra section. I will also use the word conclusion
    instead of consequent, because it is more commonly used in expert system design.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are some general formats for complex rules:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: if (condition1 and condition2) then (conclusion)
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if (condition1 or condition2) then (conclusion)
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: if ((condition1 or condition2) and condition3) then (conclusion)
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is not hard to imagine that the MYCIN rules created were fairly complex,
    based upon the problem domain and all the variables or conditions present in that
    domain. The tools and techniques developed for MYCIN were later used in other
    expert systems.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 想象MYCIN规则创建的复杂性并不困难，这些规则基于问题域以及该域中所有变量或条件。为MYCIN开发的工具和技术后来被用于其他专家系统。
- en: Would there ever be a case where different conclusions could be reached given
    the same set of facts or conditions? The answer is definitely yes, and that is
    where conflict resolution enters the picture.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 是否有可能在给定相同的事实或条件下得出不同的结论？答案是肯定的，这就是冲突解决介入的地方。
- en: Conflict Resolution
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 冲突解决
- en: Conflict results when rules are applied using the given conditions, and several
    different conclusions are created, but only one conclusion is required. This conflict
    must somehow be resolved. The conflict resolution answer can be provided in several
    ways, as described in the following list.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用给定条件应用规则时，会创建多个不同的结论，但只需要一个结论。这种冲突必须以某种方式解决。冲突解决的答案可以以以下列表中描述的几种方式提供。
- en: 'Highest rule priority: Every rule in the expert system is assigned a priority
    or a number. The conclusion reached by the highest priority rule is the one selected.
    There also must be some sort of tiebreaker procedure in these situations.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最高规则优先级：专家系统中的每个规则都分配了一个优先级或数字。由最高优先级规则得出的结论是选中的结论。在这些情况下，也必须有一些决断程序。
- en: 'Highest condition priority: Every condition in the expert system is assigned
    a priority or number. The conclusion reached by a rule that contains the highest
    priority condition(s) is the one selected. There also must be some sort of tiebreaker
    procedure in these situations.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最高条件优先级：专家系统中的每个条件都分配了一个优先级或数字。包含最高优先级条件（s）的规则得出的结论是选中的结论。在这些情况下，也必须有一些决断程序。
- en: 'Most specific priority: The conclusion created by the rule that used the most
    conditions is the one selected.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最具体优先级：使用最多条件的规则创建的结论是选中的结论。
- en: 'Recent priority: The most recent conclusion created by a rule created is the
    one selected.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 近期优先级：由规则创建的最新结论是选中的结论。
- en: 'Context-specific priority: The expert system rules are divided into groups
    of which only one to a few are active or used at any given time. A selected conclusion
    must be generated from one of the active rule groups.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文特定优先级：专家系统规则被分为组，其中只有一组到几组在任何给定时间处于活动状态或被使用。必须从活动规则组中生成一个选定的结论。
- en: Deciding which conflict resolution approach to employ really depends upon the
    nature of the expert system. It very well might require applying different approaches
    and evaluating which one performs the best. And, of course, there is always the
    default decision to not use any conflict resolution and simply present all conclusions
    to the human users and let them decide.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 决定采用哪种冲突解决方法实际上取决于专家系统的性质。它可能确实需要应用不同的方法并评估哪种方法表现最好。当然，始终有默认决策，即不使用任何冲突解决方法，直接向人类用户展示所有结论并让他们决定。
- en: Rules may also be combined in a hierarchical manner to create a “reasoned” approach
    that reflects how a human expert would function with a given set of conditions.
    The following example should help clarify how rule combinations function. I chose
    to use a phantom quarterback (QB) playing in the National Football League (NFL)
    as my virtual expert. Suppose the situation is that the QB’s team is at a third
    down, with seven yards to gain for a first down. It is a reasonable conclusion
    that an expert QB would be selecting a pass play to gain the needed yardage, because
    a seven-yard run gain on a third down has a low probability of success, at least
    in the NFL.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 规则也可以以分层的方式组合，以创建一个“推理”方法，反映人类专家在给定条件下如何运作。以下示例应有助于阐明规则组合是如何工作的。我选择使用一个在美式橄榄球联盟（NFL）中比赛的虚拟四分卫（QB）作为我的虚拟专家。假设情况是四分卫的球队处于三档，需要七码才能获得一档。一个合理的结论是，专家四分卫会选择传球来获得所需的码数，因为在三档时跑七码获得成功的概率很低，至少在NFL中是这样。
- en: The QB’s next concern is the defense’s setup, because it materially affects
    the pass type selected. The pass type may also be changed if the QB detects that
    the defense will likely blitz, meaning they are sending one or two additional
    pass rushers to stop the QB. Blitzing almost always places the defense in a one-on-one
    or man-to-man coverage, increasing the probability of a successful pass play.
    An actual blitz would normally have the QB try a long yardage pass play. When
    a blitz is shown but not executed, the QB often tries for a shorter screen pass
    play, which normally results in a short yardage gain.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 四分卫的下一个关注点是防守方的布局，因为它实质上影响了选择的传球类型。如果四分卫发现防守方可能会发动快速进攻，即他们发送一个或两个额外的冲传手来阻止四分卫，传球类型也可能改变。快速进攻几乎总是将防守方置于一对一或人盯人防守，从而增加了成功传球的可能性。实际的快速进攻通常会让四分卫尝试长距离传球进攻。当显示快速进攻但未执行时，四分卫通常会尝试短距离屏幕传球进攻，这通常会导致短距离的推进。
- en: The scenario that I just described can be divided into planning and action phases.
    The planning phase starts when the team’s lineup against each other. The action
    phase starts when the offense’s center snaps the football to the QB. These two
    phases translate into layers when a hierarchical rule structure is generated.
    The following is a reasonable set of hierarchical rules for this football scenario.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚才描述的场景可以分为计划和行动两个阶段。计划阶段开始于队伍之间的阵容排列。行动阶段开始于进攻方的中锋将足球传给四分卫。这两个阶段在生成分层规则结构时转化为层次。以下是为这个足球场景制定的一组合理的分层规则。
- en: 'The following are the layer 1 rules:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一层1的规则：
- en: '[PRE2]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'These are the layer 2 rules:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是二层2的规则：
- en: '[PRE3]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: These rules are obviously simplified, because in reality, the QB has other options,
    depending on his own athletic abilities—such as holding on to the football and
    trying to run for a first down on his own. The rules shown in layer 1 are independent
    of each other, while the rules shown in layer 2 are totally dependent, meaning
    that either one will be executed or “fired,” but never both. Finally, the rule
    set is dynamic in the sense that the conditions are not determined until moments
    before any rules are fired. This differs sharply from most routine expert systems,
    where the conditions are fixed and completely available before being applied to
    the rule set.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这些规则显然是简化的，因为在现实中，四分卫有其他选择，这取决于他自己的运动能力——例如，他可以抓住足球并试图通过自己的努力获得第一次进攻机会。第1层显示的规则是相互独立的，而第2层显示的规则是完全依赖的，这意味着要么执行其中一个，要么“触发”，但永远不会同时执行两个。最后，规则集是动态的，因为条件直到触发任何规则之前的瞬间才确定。这与大多数常规专家系统形成鲜明对比，在应用规则集之前，条件是固定的并且完全可用。
- en: Backward Chaining
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反向链
- en: The process of firing rules to generate conclusions, which in turn are then
    used as conditions in following rules, is forward chaining. Forward chaining is
    the normal way expert systems work. However, it is sometimes very useful and important
    to begin with the conclusions and try to deduce which conditions were needed to
    produce that end-point conclusion. This process is known as backward chaining,
    which is often used to verify that the systems work as intended and to ensure
    that improper or “wrong” conclusions are never reached. Such verification is especially
    important in expert systems that are employed in safety critical systems, such
    as control systems used in land, sea, or air vehicles.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 触发规则以生成结论的过程，这些结论随后又作为后续规则的条件被使用，称为正向链。正向链是专家系统正常工作的方式。然而，有时从结论开始，并试图推断出产生该最终结论所需的条件，这非常有用且重要。这个过程被称为反向链，通常用于验证系统按预期工作，并确保不会得出不适当或“错误”的结论。这种验证在用于安全关键系统的专家系统中尤为重要，例如在陆地、海洋或空中车辆中使用的控制系统。
- en: Backward chaining can also be used to determine if any more rules need to be
    developed to prevent untended or strange conclusions from being reached by using
    a specific set of input conditions.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 反向链也可以用来确定是否需要开发更多规则，以防止通过特定的输入条件得出未预料或奇怪的结论。
- en: At this point, you should have a sufficient amount of background information
    to tackle a beginning AI project using a Raspberry Pi. This project entails installing
    the SWI Prolog language on a Raspberry Pi, and subsequently using it to make queries
    from a small knowledge base. But first, a few words about the Raspberry Pi configuration
    used to work with Prolog.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Raspberry Pi Configuration
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I connected to a Raspberry Pi running in a standalone setup using a headless
    or SSH connection. My client computer is a MacBook Pro, which I use for all my
    manuscript production. It also allowed me to easily capture screenshots of the
    terminal window controlling the Raspberry Pi. I find this connection type to be
    very efficient; it allows me full access to the Raspberry Pi and to all the files
    on my Mac. Everything displayed in the terminal window can be duplicated in a
    monitor connected directly to the Raspberry Pi, if this is the way you choose
    to run your own system. Of course, file manipulation on the Raspberry Pi has to
    be done through a command line, rather than through drag/drop/click—as is the
    case on a Mac.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to SWI Prolog
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The AI language Prolog was initially created by mix of Scottish, French, and
    Canadian researchers from the 1960s to the early 1970s. It has been around a long
    time, considering how quickly modern computer languages are generated. Originally,
    the project’s purpose was to make deductions from French text extracted through
    automated means. This effort involved natural language processing, development
    of computer algorithms, and logical analysis. The name Prolog comes from a combination
    of three French words: PROgrammation en LOGique.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Prolog is considered a declarative programming language because it uses a set
    of facts and rules called a knowledge base. A Prolog user can address queries
    or questions to the knowledge base , which are knowns as goals. Prolog responds
    with an answer to the goal(s ) using logical deduction, as discussed in the inference
    section. Often, the answer is simply true or false, but it could be numerical,
    or even textual, depending upon how the goal was expressed.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Prolog is also considered a symbolic language, totally devoid of any connection
    to hardware or specific implementations. Prolog is often used by people with minimal
    computer knowledge, due to its level of abstraction. Most users do not need any
    prior computer programming experience to effectively use Prolog—at least at its
    most basic levels, as you will shortly experience.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'From its start, Prolog was considered by the AI community as a shining example
    of what could be achieved by using symbols with AI. The language is essentially
    reasoning and logical processes, with the concepts of thinking and intelligence.
    While fairly simple from the outset, Prolog has become increasing complex as researchers
    add additional features and capabilities to the language. In my humble opinion,
    this has been both good and bad for the promotion of the language. Once quite
    simple and attractive to non-AI users, it has become quite complex and daunting
    to beginners in AI. However, do not fear: I keep things quite straightforward
    in the following Prolog demonstrations. However, be aware that you are only seeing
    the very tip of the “iceberg” when it comes to Prolog’s capabilities.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 从一开始，Prolog 就被 AI 社区视为使用符号实现 AI 的一个光辉典范。这种语言本质上是一种推理和逻辑过程，包含思考和智能的概念。虽然一开始相当简单，但随着研究人员向语言中添加更多功能和能力，Prolog
    变得越来越复杂。在我看来，这对语言的推广既有好的一面也有不好的一面。曾经对非 AI 用户来说既简单又吸引人，但现在对 AI 初学者来说既复杂又令人畏惧。然而，不要害怕：在接下来的
    Prolog 演示中，我会尽量保持简单明了。然而，请注意，你所看到的只是 Prolog 能力的“冰山一角”。
- en: The computational power necessary to run Prolog has changed dramatically from
    the 1970s, when the equivalent of a supercomputer was necessary, compared to today,
    when a $35 single-board computer can easily and more quickly process Prolog queries.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 运行 Prolog 所需的计算能力与 20 世纪 70 年代相比发生了巨大变化，当时需要超级计算机，而如今，35 美元的单板计算机可以轻松且快速地处理
    Prolog 查询。
- en: Installing Prolog on a Raspberry Pi
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Raspberry Pi 上安装 Prolog
- en: The following instructions enable you to install a very capable and useful Prolog
    version, named SWI Prolog, on a Raspberry Pi. SWI is the acronym for social science
    informatics, as expressed in the Dutch language. SWI Prolog’s website is at [`www.swi-prolog.org`](http://www.swi-prolog.org)
    . I urge you to take a look at this site because it contains a lot of useful tutorials
    and other key data.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 以下说明将帮助你在一个 Raspberry Pi 上安装一个非常强大且有用的 Prolog 版本，名为 SWI Prolog。SWI 是荷兰语中表示社会科学信息学的缩写。SWI
    Prolog 的网站是 [www.swi-prolog.org](http://www.swi-prolog.org) 。我强烈建议你查看这个网站，因为它包含了许多有用的教程和其他关键数据。
- en: To start the SWI Prolog installation, you first need to update your Raspian
    distribution. I assume that most readers are using the latest distribution, named
    Jessie, which was available from the Raspberry Pi Foundation at the time this
    book was written.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始安装 SWI Prolog，你首先需要更新你的 Raspian 分发版。我假设大多数读者都在使用最新的分发版，名为 Jessie，这是在撰写本书时
    Raspberry Pi 基金会提供的。
- en: 'The first command you need to execute is the one that updates the Rasperry
    Pi Linux distribution:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要执行的第一条命令是更新 Raspberry Pi Linux 分发版：
- en: '[PRE4]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The update should only take a few minutes to complete. Afterward, you are ready
    to install SWI Prolog. Enter the following:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 更新操作只需几分钟即可完成。之后，你就可以准备安装 SWI Prolog。输入以下内容：
- en: '[PRE5]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This command installs the SWI Prolog language along with all the required dependencies
    necessary for it to run on a Raspberry Pi. This installation takes several minutes
    or longer, depending on the Raspberry Pi model that you are using.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 此命令安装 SWI Prolog 语言以及它在 Raspberry Pi 上运行所需的所有依赖项。这个安装过程可能需要几分钟或更长时间，具体取决于你使用的
    Raspberry Pi 型号。
- en: 'To test if you had a successful installation, simply enter the following:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试安装是否成功，只需输入以下内容：
- en: '[PRE6]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'You should see the following text appear on the monitor:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该在监视器上看到以下文本：
- en: '[PRE7]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The prompt is `?-`, which means that Prolog is awaiting your input. Assuming
    that you see this opening screen, you are set to start experimenting with Prolog,
    which is the subject of the next section.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 提示符是 `?-`，这意味着 Prolog 正在等待你的输入。假设你看到了这个启动屏幕，你就可以开始尝试使用 Prolog 了，这是下一节的主题。
- en: Initial Prolog Demonstration
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初始 Prolog 演示
- en: As I stated, you need a knowledge base to query Prolog. The knowledge base I
    use comes straight from a SWI Prolog tutorial that is located on their website.
    This knowledge base concerns the sun, planets, and a moon. The knowledge base
    is just a text file that should be put in the Raspberry Pi’s home directory. I
    created this text file using the default nano editor. I highly recommend that
    you also use nano; however, you certainly could use other text editors if you
    so desire. You should not use Microsoft Word or similar powerful word editors
    unless you ensure that all hidden formatting is excluded from the text file. Any
    hidden formatting causes the Prolog program to generate an error, so you would
    not be able to use that knowledge base.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: The following is a listing of the knowledge base, which is named `satellites.pl`,
    and located in the `pi` directory.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'There are a few things that you should know about this knowledge base. Comments
    are started these symbols: `%%`. Comments are for human readers; they are ignored
    by the Prolog interpreter. Case counts in the file (meaning `x` and `X`) are not
    the same symbol. Facts and rules are always terminated with a period `''.''`.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'You must use the `consult` command to force Prolog to use a knowledge base.
    In this situation, the command is with the name of the knowledge base without
    the `.pl` extension as the command argument:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'This is a shorthand version of the `consult` command:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'You can now start making queries, or setting goals, once the knowledge base
    is in place. The following is a simple query that asks if the Earth is a satellite
    of the sun:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The Prolog response is true because one of the facts in the knowledge base is
    that the Earth orbits the sun, and one of the rules is that a satellite is defined
    as any symbol that orbits the sun. Of course, the symbol used for this rule is
    the text “`earth`”. Figure [2-1](#Fig1) shows five queries that involve satellites,
    planets, and a moon.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig1_HTML.jpg](A436848_1_En_2_Fig1_HTML.jpg)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Prolog knowledge base queries
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Technically, moons also orbit the sun because their planets orbit the sun, but
    that can quickly become confusing, so it is left to the reader to ponder. Notice
    also that a `halt`. command is the last of the interactive Prolog entries shown
    in Figure [2-1](#Fig1). This command causes Prolog to stop and return control
    to the default operating system (OS) prompt.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: It should be obvious that many additional facts can be added to the knowledge
    base to encompass more of the solar system. Additional rules can also be easily
    added to cover behaviors other than determining planet, satellite, and moon status.
    This flexibility is one of the inherent powers that Prolog possesses to handle
    more complex and comprehensive knowledge bases.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: It should now also be obvious that through its knowledge bases, Prolog is a
    natural way to implement an expert system. One such system is thoroughly examined
    in the chapter devoted to expert systems. Now it is time to shift focus to discuss
    the approach fuzzy logic takes with AI.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Fuzzy Logic
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I start this section with the obvious point that there is nothing fuzzy or imprecise
    with the theory behind fuzzy logic (FL), which is so named because it goes well
    beyond a core concept in traditional logic that a statement is either true or
    false (also called a binary decision). In FL, a statement can be partially true
    or false. There can also be probabilities attached to a statement, such as There
    is a 60 percent chance that the statement is true. FL reflects reality in the
    sense that human beings not only make binary decisions but also decide things
    based on gradations. When you adjust the temperature in your shower, it is not
    just hot or cold but more likely warm or slightly cool. When driving, you likely
    adjust the speed of your car to the nominal traffic flow, which could easily be
    a little above the posted limit; you are not just speeding or stopped. These decisions—based
    on magnitude or gradations—are all around us. FL helps capture this decision making
    within AI. The following example should shed more light on what FL is and how
    it functions.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Example of FL
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s go back to the shower example to illustrate how FL works. I’ll start
    with some extreme ranges for the water temperature: the coldest it can be is 50°F
    and the hottest is 150°F. The total temperature range is a convenient 100°F, which
    I arranged to ease the calculations. Of course, either extreme would not be acceptable
    for normal showers. Now let’s take a percentage of the range and see what happens.
    Let’s say that the shower temperature is set at 40% of the range. That would make
    the actual shower temperature a cozy 90°F, well within the comfort zone of most
    people. This simple method of relating a percentage to an actual temperature is
    the start of a process called fuzzification, where real-world conditions are associated
    with FL values, or temperatures to percentages in this case. The following set
    of conditions applies to the fuzzification of the shower temperature example :'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: 50°F becomes 0%, 60°F becomes 10%, and so forth, until 150°F becomes 100%
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every 1°F difference is precisely 1% within the extremes
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It is also very easy to create a simple equation relating percentages with
    temperatures:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Percentage = (T – 50) where T is °F and in the range 50 to 150.
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once a real-world value has been fuzzified, it can then be passed on to a set
    of rules to be evaluated. These rules are exactly the same as I described in the
    expert system discussion, which only reinforces the integration of various technologies
    within AI. These FL models are sometimes called fuzzy inference systems.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: 'However, the general modus ponens form of if (condition) then (conclusion)
    must be modified a bit to accommodate FL. What this means is that the following
    rules might apply in a traditional logic arrangement:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一般形式的如果（条件）那么（结论）必须稍作修改以适应FL。这意味着以下规则可能在传统的逻辑安排中适用：
- en: '[PRE12]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'They can be replaced with a simpler FL compatible rule:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 它们可以用一个更简单的与FL兼容的规则来替换：
- en: '[PRE13]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: But wait a moment! At first glance, this rule makes no sense. It seems to say
    if the water is hot, turn on the water heater. That is because you are thinking
    about it in the traditional sense of either true/false or on/off. Now, rethink
    the condition about water is hot from not being either true or false, but to a
    fuzzified percentage value ranging from 0 to 100%, and you should start to realize
    that the conclusion part of turn on water heater also changes to a percentage,
    but in reverse manner. For instance, if the water is hot condition is only 10%
    true, then the turn on water heater conclusion might be 90% of its maximum value,
    and the water heater would be working at nearly maximum capacity. However, if
    the water is hot condition is 90% true, then the turn on water heater conclusion
    might be 10% of its maximum value, and the water heater would essentially be turned
    off. It does take a bit of effort to realign your thinking regarding FL and how
    it is applied within a rules system, but I guarantee it is well worth the effort.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等！乍一看，这个规则似乎没有意义。它似乎在说如果水是热的，就打开热水器。这是因为你在用传统意义上的真/假或开/关来思考。现在，重新思考一下关于水是否热的条件，不是从真或假的角度出发，而是将其视为一个从0到100%的模糊百分比值。你应该开始意识到，打开热水器的结论部分也变成了一个百分比，但方向相反。例如，如果水是热的状态只有10%为真，那么打开热水器的结论可能是其最大值的90%，热水器将几乎以最大容量运行。然而，如果水是热的状态有90%为真，那么打开热水器的结论可能是其最大值的10%，热水器实际上会被关闭。确实需要一点努力来重新调整你对FL及其在规则系统中的应用方式的思考，但我保证这是值得的。
- en: 'Rules may be combined in a similar way that was shown in the expert systems
    discussion. Let’s suppose that the hot water heating system has been installed
    in an energy distribution grid where there are different kilowatt-hour (kw-hr)
    usage rates for different times during the day. There could be a modified rule
    that accounts for the different energy utility costs, such as the following:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 规则可以以类似于专家系统讨论中所示的方式组合。假设热水加热系统已经安装在一个能源分配网格中，该网格在一天中的不同时间有不同的千瓦时（kw-hr）使用率。可能有一个考虑不同能源成本（如下所示）的修改规则：
- en: '[PRE14]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Now, what is the combined conditional value given that the fuzzified water temperature
    has been assigned a value of 45% and the fuzzified energy cost is valued at 58%?
    It turns out that under FL rule construction, the minimum percentage is carried
    forward when an `and` operator is used in the conditional expression. In this
    example, that value is 45%. In a similar manner, the maximum percentage is carried
    forward when an `or` operator is used in a conditional expression. You might be
    wondering what the final fuzzified value is in a complex expression that includes
    both `and` and `or` operators. The answer is that the final `and` minimum value
    is used because the `and` operator takes precedence over the `or` operator per
    the laws of logical combination, as described earlier in this chapter.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设模糊化的水温被分配了45%的值，而模糊化的能源成本被评估为58%，那么综合的条件值是多少？结果是，在FL规则构建中，当在条件表达式中使用`and`运算符时，最小百分比被传递下去。在这个例子中，这个值是45%。以类似的方式，当在条件表达式中使用`or`运算符时，最大百分比被传递下去。你可能想知道在一个包含`and`和`or`运算符的复杂表达式中，最终的模糊化值是什么。答案是，最终使用`and`最小值，因为根据逻辑组合的规则，`and`运算符比`or`运算符具有优先级，如本章前面所述。
- en: Defuzzification
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模糊化
- en: Defuzzification is the process in which the numerical conclusions from multiple
    rules are combined to produce a final, overall resultant value. The simplest and
    most straightforward procedure is simply to average all the conclusions to produce
    a single number. This approach would be fine if all the rules had equal importance,
    but that is often not the case. Importance assigned to a rule is done through
    a weighting factor; for example, suppose there are four rules, each weighted with
    different values, as shown in Table [2-2](#Tab2).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-2.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: Weighted Rules Example
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '| Rule No. | Weighting | Conclusion Value | Conclusion Value * Weight |'
  id: totrans-149
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  id: totrans-150
  prefs: []
  type: TYPE_TB
- en: '| 1 | 2 | 74 | 148 |'
  id: totrans-151
  prefs: []
  type: TYPE_TB
- en: '| 2 | 4 | 37 | 148 |'
  id: totrans-152
  prefs: []
  type: TYPE_TB
- en: '| 3 | 6 | 50 | 300 |'
  id: totrans-153
  prefs: []
  type: TYPE_TB
- en: '| 4 | 8 | 22 | 176 |'
  id: totrans-154
  prefs: []
  type: TYPE_TB
- en: 'The combined or defuzzified value is equal to the sum of all the conclusion
    values, multiplied by the respective rule weights, divided by the sum of all the
    rule weights. This is shown in the following:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: Defuzzified value = (148 + 148 + 300 + 176)/(2 + 4 + 6 + 8) = 772/20 = 38.6
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: This defuzzified value is also known as the weighted average.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: Conflict resolution is often not an issue with FL rules application because
    the weighting values invoke a prioritization to the rules.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: I demonstrate a comprehensive FL example in Chapter [5](A436848_1_En_5_Chapter.html),
    at which point I also introduce the concept of fuzzy sets with regard to the specific
    FL project. I felt it would make more sense if you saw a fuzzy set applied to
    a real-word example, rather than read an abstract discussion. Let’s now turn our
    attention to the problem-solving area .
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: Problem Solving
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Up until this point in the AI discussion, all the various questions/decisions
    regarding the problem domain have been carefully detailed in a comprehensive set
    of rules. That is not the case when it comes to the general topic of problem solving.
    Consider the classic example of knowing your starting and finishing points in
    your car’s GPS system. There are usually many ways to travel between two points,
    excluding the trivial case of going between two points on an isolated, desert
    highway. This is the type of problem that AI is very good at solving, often in
    a fast and efficient manner.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s set up a scenario to examine the various facets of how to solve this
    problem. Consider a road trip between Boston and New York City. There are a variety
    of ways to make this trip. There are many paths between Boston and New York, because
    it is a heavily populated corridor with many towns and cities between the two
    locations. There will be some common-sense guidelines applied, including that
    any town or city on the path may be visited only once in a trip. It would not
    make much sense to repeatedly loop through a specific town or city during a trip.
    The key realistic points to consider in making the trip’s path selections are
    the costs that are manifested: travel time, path length, fuel costs, tolls and
    traffic density, which are actual or anticipated delays. These costs are often
    dependent because a longer path will increase fuel expenses, but not necessarily
    travel time because an alternate path could use a super highway, on which the
    car maintains a higher consistent speed, as compared to traveling through backroads
    and going through many small towns. But, a super highway can be congested, reducing
    overall speed, and there may even be tolls to add to the misery.'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设定一个场景来检查解决这个问题的各种方面。考虑从波士顿到纽约市的公路旅行。有各种方式可以完成这次旅行。由于这是一个人口众多的走廊，两个地点之间有许多城镇和城市，因此从波士顿到纽约的路径有很多。将应用一些常识性指南，包括在旅行中任何城镇或城市只能访问一次。在旅行中反复循环通过特定的城镇或城市并没有太多意义。在做出旅行路径选择时需要考虑的关键现实因素是显现的成本：旅行时间、路径长度、燃油成本、通行费和交通密度，这些是实际或预期的延误。这些成本往往是相互依赖的，因为较长的路径会增加燃油费用，但并不一定增加旅行时间，因为另一条路径可能使用高速公路，汽车可以保持更高的恒定速度，与通过乡村道路和经过许多小城镇相比。但是，高速公路可能会拥堵，降低整体速度，甚至可能需要缴纳通行费，这会加剧痛苦。
- en: The first approach in determining the optimal path is called the breadth-first
    search.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 确定最佳路径的第一种方法被称为广度优先搜索。
- en: Breadth-First Search
  id: totrans-164
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 广度优先搜索
- en: The breadth-first approach starts by considering all possible paths between
    Boston and New York City, and computing and accumulating the total costs incurred
    while progressing through the various paths. This brute-force approach is both
    time-consuming and memory intensive because the computer must keep track of all
    the costs for perhaps thousands of paths before deciding on the optimal one. Of
    course, the algorithm might streamline the search by automatically excluding all
    secondary roads and sticking solely to the interstate highways. The typical cost
    that most modern vehicle GPS systems optimize is path length, but not always.
    Sometimes minimizing the travel time is a priority goal; it all depends upon the
    requirements given to the GPS system’s software developers. There are other ways
    to conduct a path search.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 广度优先方法首先考虑波士顿和纽约市之间所有可能的路径，并在通过各种路径前进的过程中计算和累计总成本。这种蛮力方法既耗时又占用内存，因为计算机必须在决定最佳路径之前跟踪数千条路径的成本。当然，算法可能会通过自动排除所有次要道路，仅坚持州际高速公路来简化搜索。大多数现代车辆GPS系统优化的典型成本是路径长度，但并不总是这样。有时，最小化旅行时间是优先目标；这完全取决于提供给GPS系统软件开发者的要求。还有其他进行路径搜索的方法。
- en: Depth-First Search
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度优先搜索
- en: In a depth-first search, one path is followed from start to finish, and its
    total cost is calculated. Then, another path is followed and its cost is calculated.
    Next, the two costs are compared and the more expensive one is rejected. Then,
    another path is considered and a cost comparison is done. This process continues
    until all possible paths have been considered. This approach minimizes memory
    requirements because only the most recent and least expensive path is retained.
    The real problem with this type of search is that it can take a long time to complete
    computationally, especially if there is a poor choice made for the first path.
    Search algorithms often only slightly change an initial path and then compute
    its cost. It doesn’t take much imagination to recognize that it could take a long
    time before a good path is finally discovered.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度优先搜索中，从起点到终点遵循一条路径，并计算其总成本。然后，遵循另一条路径并计算其成本。接下来，比较这两个成本，并拒绝成本较高的路径。然后，考虑另一条路径并进行成本比较。这个过程一直持续到考虑了所有可能的路径。这种方法最小化了内存需求，因为只保留最近和成本最低的路径。这种搜索类型真正的难题是它可能需要很长时间才能完成计算，尤其是在第一次路径选择不佳的情况下。搜索算法通常只对初始路径进行轻微的修改，然后计算其成本。不需要太多想象力就能认识到，找到一条好路径可能需要很长时间。
- en: The next search improves a lot on this search approach.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Depth-Limited Search
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The depth-limited search is much like the depth-first search, except only a
    limited number of towns and cities are selected before a cost is determined. The
    cost comparison is made when the selection number is reached and the least expensive
    path is retained. This approach is based on the realistic assumption that if the
    path starts out less expensive than a competing path, it most likely remains so.
    No path search algorithms that I am aware of search in broadly different directions
    to unexpectedly increase the cost by including a path with a radical detour from
    the preferred direction. Selecting the appropriate depth number is the main concern
    with this algorithm. Too few, and you could easily miss the optimal path, but
    with too many, it starts resembling the depth-first search in terms of computational
    load. A depth limit of 10 to 12 is reasonable.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: Bidirectional Search
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The bidirectional search is a variant of the depth-limited search designed
    to greatly improve on the latter’s computational efficiency. The path examined
    in a bidirectional search is first split in two, with two searches then conducted:
    one in the backward direction to the start point and other in the forward direction
    toward the finish point. These two new bifurcated search paths are both depth-limited,
    so only a preselected number of towns and cities will be transverse. Cost comparisons
    are made in the same manner done in the depth-limited search, in which the least
    expensive path is retained. The thought process behind this search algorithm is
    that splitting a path and examining two sections is a more efficient approach
    in quickly determining the lower cost path. It also eliminates the issue with
    a poor initial path selection that is present in a regular depth-limited search.'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: Other Problem-Solving Examples
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are many other situations where path searching can be applied. Solving
    a maze is one excellent example, in which a bidirectional path search makes short
    work of negotiating even the most complex maze. Search algorithms can even be
    applied to a Rubik’s Cube solution, where the ultimate goal is to change each
    of the cube’s side to a solid color.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: Playing a game of chess is completely different from the path-search-problem
    domain. This is because there is an intelligent opponent in the game, who is actively
    countering moves and whose goal is to ultimately achieve a checkmate position.
    This new dynamic is not present in a traveler’s path search problem, where all
    the path routes are static and unchanging. In chess, a computer cannot simply
    examine all the future available moves, because they are dependent on the next
    move that the opponent makes—and the number of potential moves is literally astronomical.
    Instead, the computer is set up to incorporate deep machine learning, which is
    a portion of the next section’s discussion.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning
  id: totrans-176
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Machine learning was first defined in 1959 by MIT professor Arthur Samuel, a
    recognized pioneer in both computer science and artificial intelligence. Professor
    Samuel stated in part, “machine learning as a field of study that gives computers
    the ability to learn without being explicitly programmed.” What he was essentially
    driving at is that computers can be programmed with algorithms that can learn
    from input data and then make consequent predictions based on that same data.
    This means that learning algorithms can be completely divorced from any preprogrammed
    or static algorithms and be free to make data-driven decisions or predictions
    by building models based on the input data.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning is used in a many modern applications, including e-mail spam
    filters, optical character recognition (OCR) , textual search engines, computer
    vision, and more.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: Implementing machine learning may be easier than you realize if you consider
    an expert system. In a traditional expert system, there are a series of rules
    generated by interviewing experts, which are then “fired” using input conditions.
    What if a machine could take one or more of those rules and slightly modify them,
    and subsequently try to use the conclusions generated by the modified rules? If
    the new modified rules improved upon the final conclusion, then they would be
    retained and perhaps awarded with somewhat higher priorities than older rules,
    similar to what is done with conflict resolution. On the other hand, if the conclusions
    reached using the modified rules were less optimal, then they would be rejected
    and replaced with additional new rule modifications. If this was a continual process,
    could it not be said that the computer is indeed learning? Answering this type
    of question has been somewhat of a contentious area within the AI community.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: There are a variety of ways to implement machine learning. I discuss a few of
    them in the following sections. However, I think it would be prudent to review
    some fundamental concepts (prediction and classification) regarding learning,
    as it will be applied in this area.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: Prediction
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Prediction is how you determine a new output value using specific input with
    a model that relates the output to the input. Perhaps the simplest predictor is
    a sloped straight line going through the origin of an x-y graph. This is easily
    modeled by the following equation and is shown graphically in Figure [2-2](#Fig2).
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig2_HTML.jpg](A436848_1_En_2_Fig2_HTML.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: Graph of ![$$ y = 2x $$](A436848_1_En_2_Chapter_IEq1.gif)
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: There are a several hidden constraints using this predictor. First, is the allowed
    range of input values. In Figure [2-2](#Fig2), there are five output values plotted
    that match the five corresponding input values ranging between 0 and 10\. Normally,
    you could assume that the input values were not restricted to this same range,
    but models in the real world could have restrictions, such as only non-negative
    numbers are allowed. In addition, while the equation is linear within the plotted
    zone, there is no guarantee that a real-world model wouldn’t become non-linear
    if input values exceeded a certain value.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: As you have probably determined from the brief introduction, useful prediction
    is only as good as the model employed in the prediction. Realistic models are
    typically much more complex than a simple straight-line equation, because modeling
    real-world behavior is a complex matter. Now it is time to consider classification,
    which is as equally important as prediction.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: Classification
  id: totrans-188
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I begin the classification discussion by stating a hypothetical situation where
    it is import to classify a select species of mushroom. Note, the mushrooms discussed
    are pure fiction, so any mycologists (fungi experts) in my readership need not
    respond. Assume there are two mushroom types: one delicious and non-poisonous,
    and the other poisonous and obviously inedible. They look almost identical; however,
    the edible variety is larger and less dense, whereas the poisonous variety is
    smaller and denser. There are two parameters or input values used to classify
    these mushroom types: weight in grams and the crown (or cap) circumference in
    millimetres (mm). Density is a derived parameter, which can be determined, if
    needed, from the two basic measurements of weight and circumference. Figure [2-3](#Fig3)
    is an x-y scatter plot of a selection of both mushroom types.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig3_HTML.jpg](A436848_1_En_2_Fig3_HTML.jpg)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: Mushroom scatter plot
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [2-3](#Fig3), I encircled all the data points for both mushroom types,
    and I placed a sloped dividing line, labeled classification line. This line clearly
    divides the two groups, as you can easily see, but the problem remains as to how
    to best analytically determine the diving line. The line equation is precisely
    the same form shown in Figure [2-1](#Fig1), with a generalized form of
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y = mx $$](A436848_1_En_2_Chapter_Equj.gif)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
- en: where m is the slope. Let’s try m = 2 for an initial value and see what happens.
    Figure [2-4](#Fig4) shows the result.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig4_HTML.jpg](A436848_1_En_2_Fig4_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: Scatter plot with classification line y = 2x
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: Clearly, this is not a satisfactory result, as both data point clusters are
    on the same side of the line, which proves that this particular choice for m cannot
    serve as a useful classifier. What is needed is a precise way of determining m
    other than using a blind manual trial-and-error approach. This approach is the
    start of a machine learning process.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: I first need to establish what is known as a training data set, which will be
    used to assess how well the classifier function works. This data is simply a data
    point from each cluster, as shown in Table [2-3](#Tab3).
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
- en: Table 2-3.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: Training Data
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: '| Data Point # | Grams (x) | mm (y) | Mushroom type |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  id: totrans-204
  prefs: []
  type: TYPE_TB
- en: '| 1 | 15 | 50 | poisonous |'
  id: totrans-205
  prefs: []
  type: TYPE_TB
- en: '| 2 | 8 | 100 | edible |'
  id: totrans-206
  prefs: []
  type: TYPE_TB
- en: Substituting the x value for data point 1 into the equation ![$$ y = 2x $$](A436848_1_En_2_Chapter_IEq2.gif)
    yields a value of 30 for y instead of 100, which is the true or target value.
    The difference of +20 is known as the error value. It must be minimized to achieve
    a workable classifier. Increasing the classifier line slope is the only way to
    minimize the error. Let's use the symbol ∆ to represent a change in the slope,
    € for the error, and y [ t ] for the desired target value. The error thus becomes
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\textsf{C}\hspace{-1.7ex}{=}} ={y}_t-y $$](A436848_1_En_2_Chapter_Equk.gif)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
- en: 'Expand the preceding equation with the assumption that ∆ assumes a value that
    allows y [t] to be reached yields the following:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\textsf{C}\hspace{-1.7ex}{=}} ={y}_t-y=\left(m+\varDelta \right)x-mx
    $$](A436848_1_En_2_Chapter_Equl.gif)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
- en: 'Expanding and collecting terms yields the following:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\textsf{C}\hspace{-1.7ex}{=}} ={y}_t-y=mx+\varDelta x-mx $$](A436848_1_En_2_Chapter_Equm.gif)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\textsf{C}\hspace{-1.7ex}{=}} ={y}_t-y=\varDelta x $$](A436848_1_En_2_Chapter_Equn.gif)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
- en: The very simple final expression for the error term is simply the Δ value times
    the input value, which makes complete sense if you reflect on it for a while.
    Rearranging the last equation and solving for Δ yields
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varDelta ={\textsf{C}\hspace{-1.7ex}{=}} /\mathrm{x} $$](A436848_1_En_2_Chapter_Equo.gif)'
  id: totrans-215
  prefs: []
  type: TYPE_IMG
- en: Plugging in the initial trial values yields a Δ value of
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varDelta =20/15=1.3333 $$](A436848_1_En_2_Chapter_Equp.gif)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
- en: The new value for m is now 1.3333 + 2, or 1.3333, and the revised classifier
    line equation is consequently
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y = 3.3333x $$](A436848_1_En_2_Chapter_Equq.gif)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
- en: Plugging in the previous value for the x training value, or 15, now yields the
    desired target value of 50\. Figure [2-5](#Fig5) shows the revised classifier
    line on the scatter plot.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig5_HTML.jpg](A436848_1_En_2_Fig5_HTML.jpg)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: Revised classifier line y = 3.3333x
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: Further Classification
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While the revised classifier line has improved the classification somewhat there
    are still poisonous mushrooms data points either on or above the line, which still
    makes this classifier line unsatisfactory.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s use data point number 2 with this revised classifier line and see
    what results. Using the value x = 8 yields a y value of 26.664\. Now, the actual
    y data point value is 100, which means that € = 100 – 26.664 = 73.336\. A newly
    revised m value can be calculated as follows:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ m = 73.336/8 + 3.333 = 12.5 $$](A436848_1_En_2_Chapter_Equr.gif)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
- en: Plugging in the training value x, which is 8, now yields the desired target
    value of 50\. Figure [2-6](#Fig6) shows the newly revised classifier line on the
    scatter plot.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig6_HTML.jpg](A436848_1_En_2_Fig6_HTML.jpg)'
  id: totrans-229
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: Revised classifier line y = 12.5x
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: 'While this newly revised classifier line does separate all the edible mushrooms
    from the poisonous ones, it is unsatisfactory: there could still be some edible
    mushrooms falsely rejected because they fell slightly below the line. Now there
    exists a larger problem, however, because all the training points have been exhausted.
    If I went back and reused the previous point number 1, it would return to the
    ![$$ y = 3.3333x. $$](A436848_1_En_2_Chapter_IEq3.gif) classifier line. This is
    because the procedure does not consider the effects of any previous data points;
    that is, there is no memory. A way around this is to introduce the concept of
    a learning rate that moderates the revisions so that they do not jump to the extremes,
    which is what is happening at present.'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: 'The standard symbol used in AI for learning rate is η (the Greek letter Eta).
    The learning rate is a simple multiplier used in the equation for Δ:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \varDelta =\upeta {\textsf{C}\hspace{-1.7ex}{=}} /\mathrm{x} $$](A436848_1_En_2_Chapter_Equs.gif)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
- en: Setting η = 0.5 is a reasonable start, if only one-half the update is applied.
    For the initial data point, the new Δ = 0.5 * 1.333 = 0.667\. The new classifier
    line is therefore y = 2.667x. I am not going to show the scatter plot line for
    this change, but suffice it to say, it is slightly worse than the original revision.
    That’s OK because the next revision should be considerably better.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: For data point 2, the new classifier line is y = 6.25x, using the new η learning
    rate. Figure [2-7](#Fig7) shows the resulting scatter plot for this new classifier
    line.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig7_HTML.jpg](A436848_1_En_2_Fig7_HTML.jpg)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
- en: Figure 2-7.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: Revised classifier line y = 6.25x
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-7](#Fig7) reveals an excellent classifier line that properly separates
    the two mushroom types, minimizing the likelihood of a false classification.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: It is now time to introduce the very fundamental concept of a neural network,
    which is essential for implementing practical machine learning.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: Neural Networks
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of neural networks can be traced back to a 1943 research article
    by McCulloch and Pitts, which focused on neurocomputing. I first mentioned these
    pioneering researchers in Chapter [1](A436848_1_En_1_Chapter.html). This article
    shows that simple neural networks could, in principle, compute any arithmetic
    or logical function. To understand a neural network, you must understand the key
    element in a biological neural network, which is the neuron. Figure [2-8](#Fig8)
    is a diagram of a human neuron.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig8_HTML.jpg](A436848_1_En_2_Fig8_HTML.jpg)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
- en: Figure 2-8.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: 'Diagram of a human neuron (Source: Wikipedia)'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-9](#Fig9) is a sketch of pigeon brain neurons , created in 1899 by
    Spanish neuroscientist [Santiago Ramón y Cajal](https://en.wikipedia.org/wiki/Santiago_Ram%C3%B3n_y_Cajal).
    Dendrites and terminals are clearly shown in the figure.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-9](#Fig9)是1899年由西班牙神经科学家[Santiago Ramón y Cajal](https://en.wikipedia.org/wiki/Santiago_Ram%C3%B3n_y_Cajal)绘制的鸽脑神经元草图。图中清晰地展示了树突和端点。
- en: '![A436848_1_En_2_Fig9_HTML.jpg](A436848_1_En_2_Fig9_HTML.jpg)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_2_Fig9_HTML.jpg](A436848_1_En_2_Fig9_HTML.jpg)'
- en: Figure 2-9.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-9.
- en: 'Pigeon brain neurons sketch (Source: Wikipedia)'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 鸽脑神经元草图（来源：维基百科）
- en: The question now becomes Why is the human brain so much more capable of successfully
    undertaking intelligent tasks when compared to modern computers? One answer is
    that a mature human brain is estimated to have over 100 billion neurons. The precise
    functioning is still unknown. To get an idea of the inherent capabilities of such
    a large number of neurons, you can simply consider the capabilities of a simple
    earthworm, which has only 302 neurons, yet is still capable of doing tasks that
    would baffle large-scale computers.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题变成了：与现代计算机相比，为什么人脑在成功执行智能任务方面具有如此大的能力？一个答案是，一个成熟的人脑估计有超过1000亿个神经元。其精确功能仍然未知。为了了解如此大量神经元固有的能力，你可以简单地考虑一种简单的蚯蚓，它只有302个神经元，但仍能完成让大规模计算机困惑的任务。
- en: Examining how a single neuron functions helps explain how a network of them
    can be created to solve AI problems. The output signal from a neuron can either
    cause an excitation or an inhibition to a neuron immediately connected to it.
    When a neuron sends an excitation signal to the connected neuron, it is added
    to all the other inputs that neuron is concurrently receiving, and when the combined
    excitation of all the inputs reaches a preset level or threshold, that neuron
    will fire. The firing does not depend on the level of any given input; it only
    matters that the threshold be exceeded to initiate a firing. Figure [2-10](#Fig10)
    shows a time trace of a typical neuron electrical signal.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 检查单个神经元的运作方式有助于解释如何创建一个神经网络来解决人工智能问题。一个神经元的输出信号可以引起与其直接相连的神经元的兴奋或抑制。当一个神经元向连接的神经元发送兴奋信号时，它会被添加到该神经元同时接收的所有其他输入中，当所有输入的兴奋总和达到预设的水平或阈值时，该神经元就会放电。放电并不依赖于任何给定输入的水平；重要的是阈值被超过以启动放电。图[2-10](#Fig10)显示了典型神经元电信号的时序轨迹。
- en: '![A436848_1_En_2_Fig10_HTML.jpg](A436848_1_En_2_Fig10_HTML.jpg)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_2_Fig10_HTML.jpg](A436848_1_En_2_Fig10_HTML.jpg)'
- en: Figure 2-10.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-10.
- en: Firing neuron time trace
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 神经元放电时间轨迹
- en: As you can see in Figure [2-10](#Fig10), the peak voltage is only 40 millivolts
    and total pulse time duration is approximately 3 milliseconds (ms). Most neurons
    have one axon, so the delay between stimulus input and excitation output in a
    given neuron is only 3 ms. It is interesting to try to relate this to human reaction
    time. The fastest human reaction time ever verified is 101 ms, with the average
    being approximately 215 ms. This is the total time that it takes to progress from
    a sensory input, such as sight, to a motor actuation, such as a mouse click. Assume
    that it takes 10 ms to send a signal from the eyes to the appropriate neurons
    in the brain; perhaps 20 ms to send a nerve signal from the neurons controlling
    finger-muscle action and 40 ms for muscle activation itself. This leaves about
    145 ms for total brain-processing time. That time duration limits the longest
    chain of neurons to about 14 to 15 in length. That number implies there must be
    a huge number of short parallel neuron chains interoperating to accomplish the
    tasks of interpreting a visual signal, recalling the appropriate action to take,
    and then sending nerve control signals to the fingers to do a mouse click. And
    all of these tasks are done dynamically while still doing the background autonomic
    things necessary to stay alive.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: The neuron’s excitation action can be roughly modeled by using a step function,
    as shown in Figure [2-11](#Fig11).
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig11_HTML.jpg](A436848_1_En_2_Fig11_HTML.jpg)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: Step function
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: In nature, nothing is ever as sharp and defined as a step function, especially
    for biological functions. AI researchers have adopted the sigmoid function as
    more realistically modeling the neuron threshold function. Figure [2-12](#Fig12)
    shows the sigmoid function.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig12_HTML.jpg](A436848_1_En_2_Fig12_HTML.jpg)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
- en: Figure 2-12.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
- en: Sigmoid function
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: The sigmoid function analytic expression is
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y = 1/\Big(1 + {e}^{-x} $$](A436848_1_En_2_Chapter_IEq4.gif), where e
    = math constant 2.71828…'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: When x = 0, then y = 0.5, which is the y axis intercept for the sigmoid function.
    This function is used as the threshold function for our neuron model. Consider
    Figure [2-13](#Fig13) a very basic neuron model with three inputs (x1, x2, and
    x3) and one output (y).
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig13_HTML.jpg](A436848_1_En_2_Fig13_HTML.jpg)'
  id: totrans-268
  prefs: []
  type: TYPE_IMG
- en: Figure 2-13.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
- en: Basic three-input neuron model
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: The basic model is useful, but it is not the complete answer because neurons
    must be connected to a network to function as a learning entity. Figure [2-14](#Fig14)
    shows a simple neural network made up of three neuron layers, labeled input, hidden,
    and output, respectively.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_2_Fig14_HTML.jpg](A436848_1_En_2_Fig14_HTML.jpg)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
- en: Figure 2-14.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
- en: Example neural network
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
- en: The next obvious question is How does this network learn? The easiest way is
    to adjust the weights of the connections. This means adjusting the amplitude or
    strength from an output to an input. Thus, a high weight means a given connection
    is emphasized more, whereas a low weight is de-emphasized. Figure [2-15](#Fig15)
    shows weights assigned to each of the neuron, or node, connections. They are shown
    as w[n,m], where n is the source node number and m is the destination node number.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个显而易见的问题是这个网络是如何学习的？最简单的方法是调整连接的权重。这意味着调整从输出到输入的幅度或强度。因此，高权重意味着给定的连接被强调得更多，而低权重则被弱化。图
    [2-15](#Fig15) 展示了分配给每个神经元或节点连接的权重。它们表示为 w[n,m]，其中 n 是源节点编号，m 是目标节点编号。
- en: '![A436848_1_En_2_Fig15_HTML.jpg](A436848_1_En_2_Fig15_HTML.jpg)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![A436848_1_En_2_Fig15_HTML.jpg](A436848_1_En_2_Fig15_HTML.jpg)'
- en: Figure 2-15.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-15.
- en: Neural network with weighted interconnections
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 带有权重互连的神经网络
- en: At this point, I defer any further discussion until the neural network chapter,
    in which I assign actual weights and demonstrate an actual learning system. The
    primary purpose of the discussion to this point is to prepare you for the neural
    network implementation.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我将推迟进一步的讨论，直到神经网络章节，在那里我将分配实际的权重并展示一个实际的学习系统。到目前为止，讨论的主要目的是为您准备神经网络实现。
- en: Shallow Learning vs. Deep Learning
  id: totrans-280
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 浅层学习与深层学习
- en: You may have heard the terms shallow and deep applied to machine learning. The
    term shallow seems to imply that somewhat trivial and lightweight learning is
    going on, whereas deep implies the opposite. In actuality, shallow learning and
    deep learning are only subjective adjectives applied to neural networks, based
    upon the number of layers implemented in the network. There really isn’t a formal
    definition separating shallow from deep learning, because the effectiveness of
    a particular neural network is determined by many factors, one of which is the
    number of layers in the network. The point in stating this is because I am not
    really worried about whether a particular neural network is classified as shallow
    or deep, but I am concerned about its effectiveness in performing at the desired
    requirements and standards.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经听说过浅层和深层被应用于机器学习的术语。术语浅层似乎暗示着某种微不足道且轻量级的学习正在进行，而深层则意味着相反。实际上，浅层学习和深层学习只是主观形容词，用于描述神经网络，基于网络中实现的层数。实际上并没有一个正式的定义来区分浅层和深层学习，因为特定神经网络的效率由许多因素决定，其中之一是网络中的层数。提出这个观点的原因是因为我并不真正关心特定的神经网络被归类为浅层还是深层，但我关心它在满足期望的要求和标准方面的有效性。
- en: Evolutionary Computing
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进化计算
- en: There is a rapidly evolving AI field called evolutionary computing. It is inspired
    by the theory of biological evolution, but uses algorithms grounded on population-based
    trial-and-error problem solvers. In turn, these problem solvers use metaheuristic
    techniques, meaning they rely on statistical and probabilistic approaches rather
    than strict deterministic, analytical techniques. In broad terms, an evolutionary
    computing problem starts with an initial set of candidate solutions, which are
    subsequently tested for optimality. If they are found to be suboptimal, the solutions
    are altered by only a small random amount and then retested. Every new generation
    of candidate solutions is improved by removing the less desired solutions determined
    from the previous generation. A biological analog is when a population is subjected
    to natural selection and mutations. This results in the population gradually evolving
    to increase overall fitness to meet environmental conditions. For evolutionary
    computing, the analogous process is to optimize the algorithm’s pre-selected fitness
    function. In fact, evolutionary computation is sometimes used by researchers in
    [evolutionary biology](https://en.wikipedia.org/wiki/Evolutionary_biology) for
    experimental procedures to study common processes.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: Evolutionary computing can be used in other AI areas. If you recall, I alluded
    to an evolutionary computing approach when I stated that a machine could take
    one or more of those rules and slightly modify them, and subsequently try to use
    the conclusions generated by the modified rules. It would likely be a difficult
    but solvable problem to create a candidate set of expert rules subjected to the
    evolutionary screening process.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
- en: A very popular subset of evolutionary computing is known as genetic algorithms,
    which I briefly introduce in the next section.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: Genetic Algorithms
  id: totrans-286
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A genetic algorithm (GA) starts with a population of candidate solutions, as
    mentioned in the evolutionary computing introduction. These solutions in the GA
    jargon are called individuals, creatures, or phenotypes . They are used in an
    optimization procedure to find improved solutions. Every candidate solution has
    a set of properties known as chromosomes, or genotypes , which can be altered
    or mutated. It is also traditional to represent candidate solutions as a string
    of binary digits, 1s and 0s. The evolutionary process follows, where every individual
    in a randomly generated candidate solution is evaluated regarding fitness. The
    more “fit” individuals are stochastically selected from the population. Those
    individuals’ genomes are further modified to form the next generation. This next
    generation is then iteratively used in the GA until one of two things happens.
    First, the maximum number of iterations is reached and the process is terminated,
    whether or not an optimal solution is found. Second, a satisfactory fitness level
    is achieved prior to reaching the maximum iteration limit.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
- en: A typical GA requires
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
- en: A genetic representation compatible with the problem domain
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与问题域兼容的遗传表示
- en: A fitness function that can effectively evaluate the solution
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够有效评估解决方案的适应度函数
- en: Binary digits, or bits, are the most common way candidate solutions are generated.
    There are other forms and structures, but using bits seems by far the most popular
    way that GA is done in modern AI. Usually, there is a fixed size to the bit string,
    which makes it easy to perform what are known as crossover operations. These operations,
    along with others, are imperative to complete the generational modifications and
    mutations.
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 二进制数字，或位（bits），是生成候选解决方案最常见的方式。还有其他形式和结构，但使用位似乎是现代人工智能中遗传算法最流行的做法。通常，位串有一个固定的大小，这使得执行所谓的交叉操作变得容易。这些操作以及其他操作对于完成代际修改和突变是必不可少的。
- en: If this explanation is as clear as mud, do not be dismayed. I assure you that
    a GA demonstration in a later chapter will clarify this subject to the point where
    you may even wish to experiment with some GA algorithms. Readers who wish to further
    explore GA may go to [`https://intelligence.org`](https://intelligence.org) to
    read some interesting articles.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这个解释像泥一样不清楚，请不要沮丧。我向你保证，在后面的章节中会有一个遗传算法的演示，这将使这个主题变得清晰，甚至可能让你想尝试一些遗传算法。希望进一步探索遗传算法的读者可以访问[`https://intelligence.org`](https://intelligence.org)阅读一些有趣的文章。
- en: 'This introduction to GA brings this basic AI concepts chapter to an end. You
    should already feel somewhat prepared to take on the demonstrations and projects
    presented in the remaining chapters. But be forewarned: there is new AI material
    presented in the project chapters, because it is simply impossible to cover it
    all in one chapter.'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 这本关于遗传算法的介绍将基本人工智能概念章节结束。你应该已经准备好接受剩余章节中展示的演示和项目。但请提前警告：项目章节中会介绍新的AI材料，因为在一个章节中涵盖所有内容是不可能的。
- en: Summary
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: 'The primary purpose of this chapter was to introduce and discuss some basic
    AI concepts that will be demonstrated in the project chapters. I began with a
    brief overview of Boolean logic and associated logical operations, as these are
    frequently used in AI expressions. The remainder of the chapter provided an overview
    of the following:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的主要目的是介绍和讨论一些将在项目章节中演示的基本人工智能概念。我从一个关于布尔逻辑及其相关逻辑操作的简要概述开始，因为这些在人工智能表达中经常被使用。本章的其余部分提供了以下内容的概述：
- en: Inference, expert systems, and conflict resolution as it pertains to implementing
    an expert system
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理、专家系统和与实现专家系统相关的冲突解决
- en: The installation of SWI Prolog on a Raspberry Pi
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在树莓派上安装SWI Prolog
- en: A Prolog demo, which is my program of choice to implement an expert system when
    required for a project
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个Prolog演示，这是我选择的项目中实现专家系统的程序
- en: A simple example of fuzzy logic to help clarify the underlying concepts
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个简单的模糊逻辑示例，以帮助阐明基本概念
- en: A series of sections on machine learning
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一系列关于机器学习的章节
- en: Neural networks (NN), which are modeled after biological brain neurons
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络（NN），它们模仿生物大脑神经元
- en: Evolutionary computing that features genetic algorithms
  id: totrans-302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征遗传算法的进化计算
