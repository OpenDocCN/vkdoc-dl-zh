  type: TYPE_NORMAL
- en: A Prolog demo, which is my program of choice to implement an expert system when
    required for a project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A simple example of fuzzy logic to help clarify the underlying concepts
  prefs:
