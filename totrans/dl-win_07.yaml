- en: 7. Transfer Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7. 转移学习
- en: We saw how exceptionally well deep learning models performed when applied to
    computer vision and classification tasks. Our LeNet model with the MNIST and Fashion-MNIST
    datasets was able to achieve 90%–99% accuracy under a very reasonable amount of
    training time. We have also seen how the ImageNet models have achieved record-breaking
    accuracy levels in more complex datasets.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到深度学习模型在应用于计算机视觉和分类任务时表现得非常出色。我们的LeNet模型在MNIST和Fashion-MNIST数据集上能够以非常合理的训练时间达到90%–99%的准确率。我们也看到了ImageNet模型在更复杂的数据集中实现了创纪录的准确率水平。
- en: Now you might be eager to try out what we learned on a more complex and practical
    classification task. But what should we consider when we are going to train our
    own image classification model with our own categories from scratch?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你可能急于尝试将我们学到的知识应用到更复杂、更实际的分类任务中。但当我们打算从零开始训练自己的图像分类模型时，我们应该考虑哪些因素？
- en: The Problem with Little Data
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 少量数据的问题
- en: If you attempted to build such a system, you might find that building a classifications
    system from scratch—even with deep learning—is not an easy task. To get sufficient
    accuracy from your model, without overfitting, would require a lot of training
    data. The ImageNet has millions of data samples, which is why the models trained
    on them perform so well. But for us to find or build a training dataset of that
    level for the classification task we plan on building would be practically infeasible.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你尝试构建这样的系统，你可能会发现从头开始构建分类系统——即使使用深度学习——也不是一件容易的事情。要获得模型足够的准确度而不过拟合，需要大量的训练数据。ImageNet有数百万个数据样本，这就是为什么在这些数据上训练的模型表现如此之好。但对我们来说，为了找到或构建一个用于我们计划构建的分类任务的同等水平的训练数据集，实际上是不切实际的。
- en: The problem with having a small dataset to train a model is that when the model
    sees the same few samples repeatedly through its training epochs, it tends to
    overfit to those specific samples. And not having a large enough validation dataset
    makes matters worse.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 使用小数据集训练模型的问题在于，当模型在训练过程中反复看到相同的几个样本时，它往往会过拟合到这些特定的样本。而且没有足够大的验证数据集会使问题变得更糟。
- en: But do we really need that much of data to get an image classification model
    working? What can we do with a little amount of data?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们真的需要那么多的数据来让图像分类模型工作吗？我们用少量数据能做些什么？
- en: One method we can try is the use of data augmentation.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以尝试的一种方法是使用数据增强。
- en: Using Data Augmentation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用数据增强
- en: 'The idea of augmenting the data is simple: we perform random transformations
    and normalization on the input data so that the model being trained never sees
    the same input twice.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 增强数据的思想很简单：我们对输入数据进行随机变换和归一化，这样正在训练的模型永远不会看到相同的输入两次。
- en: When working with limited amounts of training data, this method can significantly
    reduce the chance of the model overfitting.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理有限数量的训练数据时，这种方法可以显著减少模型过拟合的机会。
- en: But performing such transformations to our input data manually would be a tedious
    task, which is why TensorFlow/Keras has built-in functions to help with just that.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但手动对输入数据进行这样的变换将是一项繁琐的任务，这就是为什么TensorFlow/Keras内置了帮助完成这项任务的函数。
- en: The Image Preprocessing package of tf.keras has the ImageDataGenerator function,
    which can be configured to perform the random transformations and the normalization
    of input images, as needed. This ImageDataGenerator can then be coupled with the
    `flow()` and `flow_from_directory()` functions to automatically load the data,
    apply the augmentations, and feed into the model.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: tf.keras的图像预处理包中包含ImageDataGenerator函数，该函数可以根据需要配置以执行输入图像的随机变换和归一化。然后，可以将这个ImageDataGenerator与`flow()`和`flow_from_directory()`函数结合使用，以自动加载数据、应用增强并输入到模型中。
- en: Note
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: When using the ImageDataGenerator of tf.keras the output of it will be the augmented
    dataset. Therefore, when using an ImageDataGenerator to feed the data to a model,
    the model will only see the augmented dataset. This is the recommended way that
    will work for many situations. There are other techniques that combine the augmented
    dataset with the original dataset, but they are used less commonly.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用tf.keras的ImageDataGenerator时，其输出将是增强数据集。因此，当使用ImageDataGenerator向模型提供数据时，模型将只看到增强数据集。这是许多情况下推荐的方法。还有其他技术将增强数据集与原始数据集结合，但它们使用得较少。
- en: Let us write a small script to see the data augmentation capabilities of ImageDataGenerator.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们编写一个小脚本来看看ImageDataGenerator的数据增强功能。
- en: We will use the following as our input image (Figure [7-1](#Fig1)). Create a
    directory named data at the same place as the script and place this input image
    in there. Also create a subdirectory named augmented inside this data directory.
    This will be where the augmented images that are generated will be saved.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下图像作为我们的输入图像（图 [7-1](#Fig1)）。在脚本相同的目录下创建一个名为 data 的目录，并将此输入图像放在其中。同时，在数据目录内创建一个名为
    augmented 的子目录。生成的增强图像将被保存在这里。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig1_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig1_HTML.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig1_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig1_HTML.jpg)'
- en: Figure 7-1
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-1
- en: The input image bird.jpg
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 输入图像 bird.jpg
- en: 'We will then use the following script to load the image, run data augmentations
    using ImageDataGenerator on it 20 times, and save the resulting augmented images:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下脚本加载图像，对它使用 ImageDataGenerator 进行 20 次数据增强，并将生成的增强图像保存：
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Here, we have used the following parameters for our augmentations:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们为我们的增强使用了以下参数：
- en: '**rotation_range:** the range (degrees) within which to apply random rotations
    to the images.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**rotation_range:** 应用随机旋转的图像的范围（度数）。'
- en: '**width_shift_range:** the range within which to apply random horizontal shifts.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**width_shift_range:** 应用随机水平平移的范围。'
- en: '**height_shift_range:** the range within which to apply random vertical shifts.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**height_shift_range:** 应用随机垂直平移的范围。'
- en: '**shear_range:** the range within which to apply random shearing transformations.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**shear_range:** 应用随机剪切变换的范围。'
- en: '**zoom_range:** the range within which to apply random zooming to the images.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**zoom_range:** 应用随机缩放的图像的范围。'
- en: '**horizontal_flip:** whether to apply random horizontal flips to the images.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**horizontal_flip:** 是否对图像应用随机水平翻转。'
- en: '**fill_mode=‘nearest’:** the method of which the newly created pixels are filled.
    Specifying as nearest will fill the new pixels with the same values as the nearest
    pixels of the input image.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**fill_mode=''nearest’**：新创建的像素填充的方法。指定为 nearest 将使用输入图像最近的像素值填充新像素。'
- en: The ImageDataGenerator has several more parameters for augmentations. You can
    read about them in the official documentation page.^([1](#Fn1))
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: ImageDataGenerator 有更多用于增强的参数。您可以在官方文档页面中了解它们.^([1](#Fn1))
- en: The `flow()` function of the ImageDataGenerator is able to take in the input
    images, apply the augmentations we defined, and produce batches of augmented data
    indefinitely on a loop. While in this example we only have one input image, the
    `flow()` function is really meant to be used with batches of images.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: ImageDataGenerator 的 `flow()` 函数能够接收输入图像，应用我们定义的增强，并在循环中无限期地产生增强数据的批次。虽然在这个例子中我们只有一个输入图像，但
    `flow()` 函数实际上是为了与图像批次一起使用。
- en: 'The resulting augmented images are saved into the `data/augmented` directory
    , and would look something like this (Figure [7-2](#Fig2)):'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 生成的增强图像被保存在 `data/augmented` 目录中，看起来可能像这样（图 [7-2](#Fig2)）：
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig2_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig2_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig2_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig2_HTML.jpg)'
- en: Figure 7-2
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-2
- en: Some of the augmented images
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一些增强图像
- en: By using data augmentations like these, we should be able to reduce the chance
    of a deep learning model overfitting when training on a small dataset.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用这样的数据增强，我们应该能够在小数据集上训练深度学习模型时减少过拟合的风险。
- en: Build an Image Classification Model with Data Augmentation
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用数据增强构建图像分类模型
- en: With our understanding of data augmentations, let us apply it to building a
    practical model.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们对数据增强的理解基础上，让我们将其应用于构建一个实用的模型。
- en: But first, we will need an image dataset. For this we will use a bird image
    dataset from Kaggle.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，我们需要一个图像数据集。为此，我们将使用 Kaggle 上的鸟类图像数据集。
- en: Kaggle is a community of data scientists and machine learning enthusiasts, and
    lets you find and publish datasets, experiment and build models in Jupyter notebook
    environments, and participate in data science and machine learning competitions.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Kaggle 是一个数据科学家和机器学习爱好者的社区，让您可以找到并发布数据集，在 Jupyter notebook 环境中进行实验和构建模型，并参与数据科学和机器学习竞赛。
- en: In the vast catalog of datasets of Kaggle, we will use the 225 Bird Species
    dataset.^([2](#Fn2)) The dataset is about 1.4GB is size and is downloadable as
    a zip file (Figure [7-3](#Fig3)).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Kaggle 的庞大数据集目录中，我们将使用 225 种鸟类数据集.^([2](#Fn2)) 该数据集大小约为 1.4GB，可以下载为 zip 文件（图
    [7-3](#Fig3)）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig3_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig3_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
- en: Figure 7-3
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: The 225 Bird Species dataset from Kaggle
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: This dataset, as with many other datasets in Kaggle, is actively maintained.
    While there are images of 225 bird species at the time of this writing, more species
    and categories may have been added to this dataset by the time you read this.
    You can also select any other dataset with a similar structure.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'Once downloaded, you can extract the contents of the zip file. In the extracted
    directory, you will get 4 subdirectories: consolidated, train, test, and valid
    (Figure [7-4](#Fig4)).'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig4_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig4_HTML.jpg)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Figure 7-4
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: The extracted dataset
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: The consolidated directory contains the full dataset, organized into subdirectories
    for each specie/category. The train, test, and valid subdirectories contain the
    same dataset split into train, test, and validation sets with the same subdirectory
    structure.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'For our experiment, initially we will only select 10 of the categories from
    the 225\. We will select the following 10 as a start:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: ALBATROSS
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BANANAQUIT
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: BLACK-THROATED SPARROW
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: COCKATOO
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DARK EYED JUNCO
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: D-ARNAUDS BARBET
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GOLDEN PHEASANT
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: HOUSE FINCH
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ROBIN
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SORA
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: These 10 categories were selected because they contain different number of samples
    for each category. We will see how that affects the training accuracy and how
    to overcome its negative effects.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'Create a new directory named data and create two subdirectories named train
    and validation inside it. Copy over the directories of the preceding selected
    categories from the train and valid directories of the extracted dataset to the
    train and validation directories you have created. The final directory structure
    should be like this (Figure [7-5](#Fig5)):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig5_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig5_HTML.jpg)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: Figure 7-5
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: The directory structure of the dataset
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: When creating the directory structure, make sure that the subdirectory structure
    of the validation directory is same as that of the train directory.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Let us start our bird classification model with data augmentation by staring
    a new code file. We will name it `bird_classify_augmented.py`.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'We will start with importing the necessary packages:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'We then define our utility function to graph the training history using Matplotlib:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Then, we define some parameters for the training:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 224x224 pixels is one of the standard sizes used in large-scale image classification
    models such as ImageNet. We also use it here, as it allows us some flexibility
    later.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: 'To use automatic data augmentations with our model training we need to define
    data generator functions, like we did on our previous data augmentation example.
    Using data generators gives us the added advantage of being able to use the `flow_from_directory()`
    function , which loads the data from our directory structure as well as provide
    category labels using the subdirectory names. Here, we define two data generators:
    one for training and one for validation:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 要在我们的模型训练中使用自动数据增强，我们需要定义数据生成器函数，就像我们在之前的数据增强示例中所做的那样。使用数据生成器给我们带来了额外的优势，即能够使用`flow_from_directory()`函数，该函数从我们的目录结构中加载数据，并使用子目录名称提供类别标签。在这里，我们定义了两个数据生成器：一个用于训练，一个用于验证：
- en: '[PRE4]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: As we are building a multiclass image classification model, the class_mode is
    set to categorical.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在构建一个多类图像分类模型，class_mode 设置为分类模式。
- en: The <generator>.filenames contains all the filenames of the training set. By
    getting its length, we can get the size of the training set.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '`<generator>.filenames` 包含训练集的所有文件名。通过获取其长度，我们可以得到训练集的大小。'
- en: Likewise, <generator>.class_indices is the map/dictionary for the class names
    and their indexes. Getting its length gives us the number of classes.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，`<generator>.class_indices` 是类别名称及其索引的映射/字典。获取其长度给我们提供了类别的数量。
- en: 'We use these values to calculate the required training and validation steps:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用这些值来计算所需的训练和验证步骤：
- en: '[PRE5]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Now, we can define our model:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以定义我们的模型：
- en: '[PRE6]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This is a slightly deeper model than our LeNet model, but uses the same concepts.
    This uses three sets of CONV => RELU => POOL layers. Followed by a dense layer
    and a softmax classifier.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个比我们的LeNet模型稍深一些的模型，但使用了相同的概念。它使用三组 CONV => RELU => POOL 层。之后是一个密集层和一个softmax分类器。
- en: Once we have the model structure defined, we can compile it and run the training.
    The `model.fit()` function accepts data generators just like it accepts arrays
    of training data (as well as several other data formats).^([3](#Fn3))
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们定义了模型结构，我们就可以编译它并运行训练。`model.fit()`函数接受数据生成器，就像它接受训练数据的数组（以及几种其他数据格式）一样。[3](#Fn3)
- en: '[PRE7]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'After the training step, we can save the trained model, evaluate it, and graph
    the training history using the function we defined at the start:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 训练步骤完成后，我们可以保存训练好的模型，评估它，并使用我们在开始时定义的函数绘制训练历史：
- en: '[PRE8]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: If we run this code now, we should be getting as accuracy value somewhere between
    70% and 85%. The accuracy you will be getting can vary due to the randomness of
    the applied data augmentations as well as the dataset being extremely small. For
    an example, in the following instance we have achieved 82% accuracy (Figure [7-6](#Fig6)).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们现在运行这段代码，我们应该得到一个介于70%到85%之间的准确率值。你得到的准确率可能会因为应用的数据增强的随机性以及数据集极其小而有所不同。例如，在下面的实例中，我们达到了82%的准确率（图[7-6](#Fig6)）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig6_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig6_HTML.jpg)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig6_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig6_HTML.jpg)'
- en: Figure 7-6
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-6
- en: The accuracy of the model using data augmentations
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数据增强的模型准确率
- en: If we look at the training history graph, we can see that the accuracy and the
    loss curves have plateaued (Figure [7-7](#Fig7)).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们查看训练历史图，我们可以看到准确率和损失曲线已经达到平台期（图[7-7](#Fig7)）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig7_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig7_HTML.jpg)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig7_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig7_HTML.jpg)'
- en: Figure 7-7
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-7
- en: The training history graph of the model using data augmentations
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 使用数据增强的模型训练历史图
- en: This usually indicates that the model cannot go further without more data. You
    may also note that the validation accuracy is higher than training accuracy. This
    is also usually an indication of insufficient data.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常表明模型在没有更多数据的情况下无法进一步发展。你也许还会注意到验证准确率高于训练准确率。这通常也是一个数据不足的迹象。
- en: While an accuracy of 82% is not terrible, it is clear that to achieve a better
    accuracy with the given data, we would need to use more advanced techniques.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然82%的准确率并不糟糕，但很明显，为了使用给定数据达到更好的准确率，我们需要使用更高级的技术。
- en: Bottleneck Features
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 瓶颈特征
- en: Should we accept the 82% accuracy that we achieved, or give up on attempting
    to build our own bird image classifier?
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该接受我们达到的82%准确率，还是放弃尝试构建我们自己的鸟类图像分类器？
- en: No. Because deep learning has a solution.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 不。因为深度学习有解决方案。
- en: Deep learning supports an immensely useful technique called *transfer learning*
    . This means that you can take a pretrained deep learning model— trained on a
    large-scale dataset such as ImageNet—and repurpose it to handle an entirely different
    problem. Since the model has already learned certain features from a large dataset
    (think back to hierarchical feature learning), it would be able to use those features
    as a base to learn the new classification problem we present it with.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习支持一种极其有用的技术，称为**迁移学习**。这意味着你可以使用一个预训练的深度学习模型——在大型数据集（如ImageNet）上训练的模型——并将其重新用于处理完全不同的任务。由于该模型已经从大型数据集中学习到某些特征（回想一下层次特征学习），它将能够使用这些特征作为基础来学习我们向其展示的新分类问题。
- en: The basic technique to get transfer learning working is to get a pretrained
    model (with the trained model weights loaded) and remove the final fully connected
    layers from that model. We then use the remaining portion of the model as a feature
    extractor for our smaller dataset. These extracted features are called *bottleneck
    features* , which are the last activation maps prior to the fully connected layers
    in the original model. We then train a small model with fully connected layers
    on top of those extracted bottleneck features to get the classes we need as outputs
    for our new classification task. This workflow is shown in Figure [7-8](#Fig8).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 使迁移学习生效的基本技术是获取一个预训练模型（加载了训练模型权重）并从该模型中移除最终的完全连接层。然后，我们将模型的剩余部分用作我们较小数据集的特征提取器。这些提取的特征被称为**瓶颈特征**，是原始模型中完全连接层之前的最后激活图。然后，我们在这些提取的瓶颈特征之上训练一个小型模型，并添加完全连接层，以获得我们新分类任务所需的输出类别。此工作流程如图[7-8](#Fig8)所示。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig8_HTML.png](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig8_HTML.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig8_HTML.png](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig8_HTML.png)'
- en: Figure 7-8
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-8
- en: How bottleneck feature extraction works
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 瓶颈特征提取的工作原理
- en: As transfer learning is one of the heavily used techniques in building deep
    learning models, frameworks such as TensorFlow and Keras provides methods to simplify
    implementing it. TensorFlow and Keras have many of the ImageNet models built in
    with their trained weights. Their built-in implementations also provide utility
    functions to remove the original top layers and to build new models around them
    for transfer learning.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 由于迁移学习是构建深度学习模型中广泛使用的技术之一，因此像TensorFlow和Keras这样的框架提供了简化其实施的方法。TensorFlow和Keras内置了许多带有其训练权重的ImageNet模型。它们内置的实现还提供了实用函数来移除原始顶层，并围绕它们构建新的模型以进行迁移学习。
- en: Using Bottleneck Features with a Pretrained VGG16 Model
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用预训练的VGG16模型和瓶颈特征
- en: Let us utilize bottleneck features in our bird image classification model.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在我们的鸟类图像分类模型中利用瓶颈特征。
- en: We shall use the VGG16 model, with its ImageNet trained weights, as our base
    model. You can learn more about the VGG16 model and other ImageNet models in Appendix
    1.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用带有其ImageNet训练权重的VGG16模型作为我们的基础模型。你可以在附录1中了解更多关于VGG16模型和其他ImageNet模型的信息。
- en: 'To train our bird image classifier using bottleneck features we will use the
    following steps:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用瓶颈特征训练我们的鸟类图像分类器，我们将采取以下步骤：
- en: Create a base model using one of the built-in pretrained ImageNet models without
    its final dense layers. We will use the VGG16 model for our example.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用内置的预训练ImageNet模型之一创建一个基础模型，不包含其最终的密集层。我们将使用VGG16模型作为我们的示例。
- en: Define a set of new dense layers for classification (which we will refer to
    as the top model) and create a new model by combining the base model and the top
    model.
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义一组新的密集层用于分类（我们将其称为顶层）并通过结合基础模型和顶层创建一个新的模型。
- en: “Freeze” the layers of the base model. That is, the weights of the layers in
    the base model will not be trained, as we do not want to destroy the features
    already learned by the base model when it was trained on the ImageNet dataset.
    This allows the base model to reuse those learnings and output the activations—the
    bottleneck features—to the new dense layers we have added on top.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “冻结”基础模型的层。也就是说，基础模型中层的权重将不会进行训练，因为我们不希望在基础模型在ImageNet数据集上训练时破坏其已经学习到的特征。这允许基础模型重用这些学习，并将激活——瓶颈特征——输出到我们添加在上面的新密集层。
- en: Train the resulting new model with our new categories.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用我们的新类别训练所得的新模型。
- en: 'Let us start our bird classification model using bottleneck features by starting
    a new code file, which we will name bird_classify_bottleneck.py, and importing
    the necessary packages:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过启动一个新的代码文件来开始使用瓶颈特征进行鸟类分类模型，我们将该文件命名为 bird_classify_bottleneck.py，并导入必要的包：
- en: '[PRE9]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Like before, we will define our utility functions:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 和之前一样，我们将定义我们的效用函数：
- en: '[PRE10]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The training parameters and data generator definitions would also be the same
    as before :'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 训练参数和数据生成器定义也将与之前相同：
- en: '[PRE11]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Next, we will define the base model. We will load the VGG16 model with its
    ImageNet weights, but without the top dense layers, by using the `include_top=False`
    parameter:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将定义基础模型。我们将使用 `include_top=False` 参数加载带有 ImageNet 权重的 VGG16 模型，但不包括顶层密集层：
- en: '[PRE12]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'We then define the top model, which is the dense layers and the final classification
    layer:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们定义顶层模型，即密集层和最终的分类层：
- en: '[PRE13]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Once both base and the top models are defined, we combine them into a single
    model:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了基础模型和顶层模型，我们将它们组合成一个单一模型：
- en: '[PRE14]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'We then set the layers of the base model nontrainable and compile the model.
    The compiling of the model should only be done after the layers are marked as
    nontrainable:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将基础模型的层设置为不可训练，并编译模型。模型的编译应该在标记层为不可训练之后进行：
- en: '[PRE15]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Finally, we run the training, save the model, evaluate, and graph the training
    history:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们运行训练，保存模型，评估，并绘制训练历史图：
- en: '[PRE16]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Let us now run the training and see how the bottleneck model compares against
    the simple model from before.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们运行训练，看看瓶颈模型与之前的简单模型相比如何。
- en: The accuracy has increased to 94% (Figure [7-9](#Fig9)).
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率已提高到 94%（图 [7-9](#Fig9)）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig9_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig9_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig9_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig9_HTML.jpg)'
- en: Figure 7-9
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-9
- en: The accuracy of the model using bottleneck features
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 使用瓶颈特征的模型准确率
- en: The training history graph also shows the improvements. The characteristics
    of insufficient data which was there before are now gone (Figure [7-10](#Fig10)).
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 训练历史图也显示了改进。之前存在的数据不足的特征现在消失了（图 [7-10](#Fig10)）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig10_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig10_HTML.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig10_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig10_HTML.jpg)'
- en: Figure 7-10
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-10
- en: The training history graph of the model using bottleneck features
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 使用瓶颈特征的模型训练历史图
- en: Using the bottleneck features, we were able to increase our accuracy on the
    same dataset from 82% to 94%.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 使用瓶颈特征，我们能够将同一数据集上的准确率从 82% 提高到 94%。
- en: But can we do better?
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们能做得更好吗？
- en: Going Further with Model Fine-tuning
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 进一步使用模型微调
- en: Getting an accuracy of 94% is great. But we have seen deep learning models achieve
    far more impressive results.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 获得准确率为 94% 是很棒的。但我们已经看到深度学习模型实现了更加令人印象深刻的成果。
- en: So, how can we improve our results further?
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何进一步提高我们的结果呢？
- en: What we did when using bottleneck features was to take a deep learning model—the
    VGG16 model in our case—which was already trained using a large dataset—the ImageNet
    dataset in our case—and used the bottleneck features from it to train a set of
    dense layers to classify our data into the categories we want. And we did get
    good results from it.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们使用瓶颈特征时，我们做的是使用一个已经使用大型数据集（在我们的案例中是 ImageNet 数据集）进行训练的深度学习模型——VGG16 模型，并使用其中的瓶颈特征来训练一组密集层，以便将我们的数据分类到我们想要的类别中。我们确实从中得到了很好的结果。
- en: But how well our data will be classified in this method still depends on how
    well the bottleneck features of the pretrained model can represent our categories.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，我们数据在这个方法中的分类效果仍然取决于预训练模型的瓶颈特征能否很好地代表我们的类别。
- en: As ImageNet has been trained with millions of images representing 1,000 categories,
    it does have a good generalization of features. In our case, as the original 1,000
    categories contained some bird image categories as well, the model was able to
    adapt to our new categories quite well. But it is still limited by its training
    for the original 1,000 categories, which are not exactly the categories we want.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 ImageNet 已经使用代表 1,000 个类别的数百万张图像进行训练，它确实具有很好的特征泛化能力。在我们的案例中，由于原始的 1,000 个类别中包含一些鸟类图像类别，模型能够很好地适应我们的新类别。但它仍然受限于对原始
    1,000 个类别的训练，而这些类别并不是我们想要的。
- en: This is the reason why our accuracy got limited to 94%.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我们的准确率被限制在 94% 的原因。
- en: But what if we take that pretrained model, and teach it a little bit about the
    categories we want?
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们取那个预训练模型，并教它一些我们想要的类别呢？
- en: This is where the idea of model fine-tuning comes from.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是模型微调想法的来源。
- en: In model fine-tuning, we take a trained model, and retrain the top-level classifier
    and the last few convolutional layers using an extremely small learning rate.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型微调中，我们取一个训练好的模型，并使用一个非常小的学习率重新训练顶级分类器和最后几个卷积层。
- en: We still freeze the lower level convolutional layers as before, so that they
    will not be retrained when we fine-tune. This would preserve the general, less
    abstract features learned by these layers, and would prevent the entire model
    from overfitting.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然冻结了之前冻结的下层卷积层，这样在微调时它们就不会被重新训练。这将保留这些层学习到的通用、不太抽象的特征，并防止整个模型过拟合。
- en: The workflow for fine-tuning is shown in Figure [7-11](#Fig11).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 微调的工作流程如图 [7-11](#Fig11) 所示。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig11_HTML.png](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig11_HTML.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig11_HTML.png](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig11_HTML.png)'
- en: Figure 7-11
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-11
- en: The concept of model fine-tuning
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 模型微调的概念
- en: 'To fine-tune our model, we will use the following steps:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 为了微调我们的模型，我们将采取以下步骤：
- en: Define the base model (with the pretrained weights) and the top model as before.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义与之前相同的基础模型（带有预训练权重）和顶级模型。
- en: Train the entire model using the bottleneck features as we did in the earlier
    section.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用我们在早期章节中使用的瓶颈特征重新训练整个模型。
- en: “Un-freeze” the last convolution block of the base model, that is, allow it
    to be trained.
  id: totrans-165
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “解冻”基础模型的最后一个卷积块，即允许它被训练。
- en: Train the entire model again with an extremely small learning rate.
  id: totrans-166
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 再次使用一个非常小的学习率训练整个模型。
- en: When fine-tuning a model, you should always start with an already trained model.
    If we attempt to fine-tune the model while the top model we added is still untrained,
    because of the initial weights of those layers it will be randomly initialized,
    it would potentially disrupt the already learned features of the base model due
    to back propagation. As the limited data we have would be insufficient to fulfil
    the high learning capacity of such a model (remember that the ImageNet models
    are capable of learning from millions of training samples with thousands of categories),
    it would most definitely cause the model to overfit.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 当微调一个模型时，你应该始终从一个已经训练好的模型开始。如果我们尝试在添加的顶级模型仍然未训练的情况下微调模型，由于这些层的初始权重是随机初始化的，它可能会因为反向传播而破坏基础模型已经学习到的特征。由于我们有限的数据不足以满足这样一个模型的高学习容量（记住，ImageNet
    模型能够从数百万个训练样本和数千个类别中学习），这肯定会引起模型过拟合。
- en: Also, when fine-tuning, we would need to use an extremely small learning rate—such
    as 0.0001—typically using the SGD optimizer. Using an adaptive learning rate optimizer
    such as RMSProp could potentially mess up the already learned features of the
    model.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，在微调时，我们需要使用一个非常小的学习率——例如 0.0001——通常使用 SGD 优化器。使用如 RMSProp 这样的自适应学习率优化器可能会破坏模型已经学习到的特征。
- en: Fine-tuning our VGG16 Model
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微调我们的 VGG16 模型
- en: Let us add fine-tuning to our bird image classification model.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将微调添加到我们的鸟类图像分类模型中。
- en: We will start a new code file, which we will name as bird_classify_finetune.py.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将开始一个新的代码文件，我们将将其命名为 bird_classify_finetune.py。
- en: 'As we need to start with a trained model for fine-tuning, the first part of
    the code is nearly the same as we did for training with bottleneck features. The
    only difference is at line 91, where we save the `class_indices` dictionary to
    a file. This file will become useful in the later sections:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们需要从一个训练好的模型开始微调，代码的第一部分几乎与我们在使用瓶颈特征进行训练时所做的相同。唯一的区别是在第 91 行，我们将 `class_indices`
    字典保存到一个文件中。这个文件将在后面的章节中变得很有用：
- en: '[PRE17]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Once we have the trained model, we will define the parameters for the fine-tuning,
    as well as resetting our data generators so that we can reuse them. We are setting
    the number of epochs to fine-tune as 25:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了训练好的模型，我们将定义微调的参数，以及重置我们的数据生成器，这样我们就可以重用它们。我们将微调的轮数设置为 25：
- en: '[PRE18]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'We will then un-freeze the layers from the last convolutional block of the
    base model to the classification layers. All other layers in the base model will
    remain frozen:'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将解冻基础模型从最后一个卷积块到分类层的所有层。基础模型中的其他所有层将保持冻结状态：
- en: '[PRE19]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'We then recompile the model, to make the modifications take effect, as well
    as define the SGD optimizer with the low learning rate:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们重新编译模型，以使修改生效，并定义具有低学习率的SGD优化器：
- en: '[PRE20]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Finally, we run the training, evaluating, and graphing the training history:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们运行训练、评估和绘图训练历史：
- en: '[PRE21]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Here, we are saving the final trained and fine-tuned model as `bird_classify_finetune.h5`.
    Keep this file, along with the `class_indices.npy` file we saved earlier in the
    code, as they will be needed for the later sections.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将最终训练和微调好的模型保存为`bird_classify_finetune.h5`。请保留此文件以及之前在代码中保存的`class_indices.npy`文件，因为它们将在后面的章节中需要。
- en: 'Let us see how our fine-tuned model performs: our accuracy has increased to
    98% (Figure [7-12](#Fig12)).'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们的微调模型的表现：我们的准确度已提高到98%（图7-12）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig12_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig12_HTML.jpg)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig12_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig12_HTML.jpg)'
- en: Figure 7-12
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-12。
- en: The accuracy of the fine-tuned model
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 微调模型的准确度。
- en: The graph for the fine-tuning looks good also (Figure [7-13](#Fig13)).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 微调的图形看起来也很好（图7-13）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig13_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig13_HTML.jpg)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig13_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig13_HTML.jpg)'
- en: Figure 7-13
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-13。
- en: The history graph of fine-tuning the model
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 模型微调的历史图。
- en: With 98% accuracy, we have achieved nearly the limit of what we can do with
    a tiny dataset.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以98%的准确度，几乎达到了使用小数据集所能做到的极限。
- en: Making Predictions Using Our Models
  id: totrans-192
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用我们的模型进行预测。
- en: We now have a trained model with an excellent accuracy. Now we should look at
    how we can use it to make predictions and classify images.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有一个准确度极高的训练模型。现在我们应该看看我们如何使用它来进行预测和图像分类。
- en: 'Recall that in our fine-tuning code we saved 2 files from the code: the class
    label dictionary and the trained model file. We can now use those 2 files to rebuild
    the entire trained model without having to redefine the model structure.'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在我们的微调代码中，我们保存了两个文件：类别标签字典和训练好的模型文件。现在我们可以使用这两个文件来重建整个训练好的模型，而无需重新定义模型结构。
- en: Let us start a new code file. We will name it bird_classify_predict.py.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始一个新的代码文件。我们将将其命名为bird_classify_predict.py。
- en: 'We will first import the necessary packages and define the path to the test
    image, as well as the image size parameters:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先导入必要的包，并定义测试图像的路径以及图像大小参数：
- en: '[PRE22]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: We then load the saved model and the class label dictionary.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们加载保存的模型和类别标签字典。
- en: '[PRE23]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'We then load and preprocess the image:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们加载并预处理图像：
- en: '[PRE24]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: 'Then, we run the preprocessed image data through the loaded model, decode the
    predictions, and print the predicted class as well as the confidence to the console:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将预处理后的图像数据通过加载的模型，解码预测结果，并将预测类别以及置信度打印到控制台：
- en: '[PRE25]'
  id: totrans-203
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Finally, we use OpenCV to load and display the image, with the label and confidence
    overlaid on top of it:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们使用OpenCV加载并显示图像，并在其上叠加标签和置信度：
- en: '[PRE26]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Running the prediction code, we would get a result like this (Figure [7-14](#Fig14)).
    As expected, based on the validation accuracy we got, the confidence for the prediction
    is 99+%.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 运行预测代码，我们会得到这样的结果（图7-14）。如预期的那样，基于我们得到的验证准确度，预测的置信度为99%以上。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig14_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig14_HTML.jpg)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig14_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig14_HTML.jpg)'
- en: Figure 7-14
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-14。
- en: Model prediction and confidence for an image of an albatross
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 飞行信天翁图像的模型预测和置信度。
- en: Following are few more examples of the results (Figures [7-15](#Fig15) and [7-16](#Fig16)).
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些结果的更多示例（图7-15和图7-16）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig16_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig16_HTML.jpg)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig16_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig16_HTML.jpg)'
- en: Figure 7-16
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-16。
- en: Model prediction and confidence for an image of a robin
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 鹦鹉图像的模型预测和置信度。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig15_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig15_HTML.jpg)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig15_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig15_HTML.jpg)'
- en: Figure 7-15
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-15。
- en: Model prediction and confidence for an image of a d-arnauds barbet
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 鹦哥鸫图像的模型预测和置信度。
- en: 'Trying out a Deeper Model: InceptionV3'
  id: totrans-217
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 尝试更深的模型：InceptionV3
- en: So far, we have only attempted to run our training on the 10 classes we have
    selected from the full bird image dataset at the start of the chapter.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只尝试在章节开头从完整的鸟类图像数据集中选择的 10 个类别上运行我们的训练。
- en: What if we need to attempt to build a model for 50, 100, or the full 225 classes
    of the dataset?
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们需要尝试为数据集的 50、100 或完整的 225 个类别构建模型呢？
- en: All the transfer learning techniques we have learned here—bottleneck features,
    finetuning—as well as data augmentation can be applied to a larger set of classes
    as well.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里学到的所有迁移学习技术——瓶颈特征、微调——以及数据增强也可以应用于更大的类别集。
- en: So far, we have only attempted them with the VGG16 model. When working with
    larger sets of classes and larger datasets, it is better to try out different
    pretrained models as the base to find the most optimal model structure.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只尝试了 VGG16 模型。当处理更大的类别集和更大的数据集时，尝试不同的预训练模型作为基础以找到最优化模型结构会更好。
- en: Here, we will look at how we can apply the same concepts with the InceptionV3
    ImageNet model.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将探讨如何将相同的概念应用于 InceptionV3 ImageNet 模型。
- en: Along with using the InceptionV3 model, we will see how we can mitigate the
    data imbalance of our selected dataset as well.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 除了使用 InceptionV3 模型外，我们还将看到如何减轻我们所选数据集的数据不平衡问题。
- en: If you recall, when we selected the 10 classes from the full dataset, we selected
    them in a way that some of the classes we selected have higher number of samples
    than others. This is a common problem with real-world datasets that we get to
    deal with.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您还记得，当我们从完整的数据集中选择 10 个类别时，我们以某种方式选择了它们，其中一些类别的样本数量比其他类别多。这是我们在处理现实世界数据集时常见的问题。
- en: When there are large discrepancies in the number of samples presented to a model,
    it may get more familiar with the features of the classes with the higher number
    of samples and may undermine the features of less represented classes.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型接收到的样本数量存在较大差异时，它可能会更熟悉样本数量较多的类别的特征，并可能削弱较少代表类别的特征。
- en: One way to mitigate this by calculating a weight value for each class based
    on the number of samples they have (giving higher weights to classes with less
    number of samples) and pass that weight mapping to the model being trained. This
    allows to model to properly learn features of the classes with less samples.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 一种减轻方法是通过根据每个类别的样本数量计算权重值（为样本数量较少的类别赋予更高的权重）并将该权重映射传递给正在训练的模型。这允许模型正确地学习样本数量较少的类别的特征。
- en: We will see how this can be achieved when going through the following code for
    InceptionV3\. But keep in mind that this technique can be used with any model.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们查看以下 InceptionV3 的代码时，我们将看到如何实现这一点。但请记住，这种技术可以用于任何模型。
- en: 'We will start our new code, which we will name `bird_classify_inceptionV3.py`
    , by importing the necessary packages:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将开始我们的新代码，我们将将其命名为 `bird_classify_inceptionV3.py`，通过导入必要的包：
- en: '[PRE27]'
  id: totrans-229
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Here, we have imported the InceptionV3 model from the built-in models instead
    of the VGG16 model we used earlier.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们已从内置模型中导入 InceptionV3 模型，而不是之前使用的 VGG16 模型。
- en: 'We will define our usual utility function to graph the training history:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将定义我们常用的效用函数来绘制训练历史：
- en: '[PRE28]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'We will then define a new utility function to calculate the class weights:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将定义一个新的效用函数来计算类别权重：
- en: '[PRE29]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: 'When called, this function will return a mapping of class weights that looks
    like the following (Figure [7-17](#Fig17)):'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 当被调用时，此函数将返回一个类似于以下映射的类别权重（图 [7-17](#Fig17)）：
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig17_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig17_HTML.jpg)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig17_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig17_HTML.jpg)'
- en: Figure 7-17
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7-17
- en: The calculated class weights
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 计算出的类别权重
- en: 'We then define our training parameters and generators, as before:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们定义我们的训练参数和生成器，就像之前一样：
- en: '[PRE30]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'We load the class weights using the function defined earlier by passing the
    path to the training directory:'
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用之前定义的函数通过传递训练目录的路径来加载类别权重：
- en: '[PRE31]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: 'When creating the base model, we will be using InceptionV3 instead of VGG16:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建基础模型时，我们将使用 InceptionV3 而不是 VGG16：
- en: '[PRE32]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'The code for defining the top model and compilation remains unchanged:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 定义顶级模型和编译的代码保持不变：
- en: '[PRE33]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'At the model training step, we pass the class weights calculated earlier into
    the `class_weight` parameter of the `model.fit()` function :'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型训练步骤中，我们将之前计算的类别权重传递给 `model.fit()` 函数的 `class_weight` 参数：
- en: '[PRE34]'
  id: totrans-248
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: 'As before, the trained model is saved and evaluated, and the fine-tuning step
    begins:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，训练好的模型被保存并评估，然后开始微调步骤：
- en: '[PRE35]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'When fine-tuning InceptionV3, the number of layers to freeze is different than
    VGG16\. We will be freezing up to the 249th layer instead of the 15th layer:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 当微调InceptionV3时，冻结的层数与VGG16不同。我们将冻结到第249层而不是第15层：
- en: '[PRE36]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: 'The model is then recompiled, trained and fine-tuned, evaluated, and saved.
    Here also the class weights are passed to `model.fit()`:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 模型随后被重新编译、训练和微调、评估，并保存。这里也将类别权重传递给`model.fit()`：
- en: '[PRE37]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: If we run this for the same 10 classes as before, we will see nearly similar
    results as before (Figure [7-18](#Fig18) and [7-19](#Fig19)).
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们像之前一样运行这10个类别，我们将看到几乎与之前相似的结果（图[7-18](#Fig18)和[7-19](#Fig19)）。
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig19_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig19_HTML.jpg)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig19_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig19_HTML.jpg)'
- en: Figure 7-19
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-19
- en: The training history graph of the fine-tuned InceptionV3 model
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 微调后的InceptionV3模型的训练历史图
- en: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig18_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig18_HTML.jpg)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![../images/502073_1_En_7_Chapter/502073_1_En_7_Fig18_HTML.jpg](../images/502073_1_En_7_Chapter/502073_1_En_7_Fig18_HTML.jpg)'
- en: Figure 7-18
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图7-18
- en: The accuracy of the fine-tuned InceptionV3 model
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 微调后的InceptionV3模型的准确率
- en: However, you will start to see the improvements when you apply this model to
    larger number of classes or larger datasets.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当你将此模型应用于更多类别或更大的数据集时，你将开始看到改进。
- en: You can now try applying this to the full 225 Bird Species dataset.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以尝试将其应用于完整的225种鸟类物种数据集。
