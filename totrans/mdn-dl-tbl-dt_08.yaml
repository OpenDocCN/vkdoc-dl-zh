- en: We see that the first few words in the sequence are strongly attended to, along
    with certain relevant segments in the middle.
  prefs: []
  type: TYPE_NORMAL
- en: We can also use a native Keras multi-head attention approach (Listing [6-18](#PC18),
    Figure [6-38](#Fig38)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig38_HTML.png)'
  prefs: []
