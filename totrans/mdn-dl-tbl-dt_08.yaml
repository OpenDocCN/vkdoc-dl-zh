  prefs: []
  type: TYPE_NORMAL
- en: We can also replace the single attention mechanism for multi-head attention
    (Listing [6-20](#PC20), Figure [6-47](#Fig47)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig47_HTML.png)'
  prefs: []
