  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到序列中前几个单词的注意力很强，以及中间的一些相关段。
- en: We can also use a native Keras multi-head attention approach (Listing [6-18](#PC18),
    Figure [6-38](#Fig38)).
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用原生 Keras 多头注意力方法（列表 [6-18](#PC18)，图 [6-38](#Fig38)）。
