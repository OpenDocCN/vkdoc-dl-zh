- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Direct Tabular Attention Modeling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chapters [4](525591_1_En_4_Chapter.xhtml) and [5](525591_1_En_5_Chapter.xhtml)
    have introduced methods that, to most readers, seem foreign and unnatural. Even
    as we, the authors, try to demonstrate their empirical validity and offer conceptual
    models to understand them, we, too, understand that convolutions and recurrent
    layers just intuitively or fundamentally don’t fit “naturally” with tabular data,
    and that this is unsettling. Tabular data does not natively possess contiguous
    semantics, whereas convolutions and recurrent layers operate on the assumption
    that inputted data possesses contiguous semantics.
  prefs: []
  type: TYPE_NORMAL
- en: Attention, however, shows to be a very natural mechanism for tabular data. Recall
    from the beginning of this chapter that attention addresses problems in the restrictive
    sequential reading of natural language data. Rephrased, attention frees natural
    language data from its contiguous semantics by offering a more direct way to relate
    between cross-sequence/temporal dependencies in the sequence. Attention operates
    upon an “anti-contiguous semantics” and can be applied to any input, sequential
    or not, to model non-contiguous dependencies. (Of course, it can be adapted with
    appendages like causal masking to support modeling of contiguous dependency.)
    Due to this, it is no surprise that one dominant trend in deep-learning-for-tabular-data
    research is dedicated toward attention and transformer architectures. (See the
    last section of this chapter for a discussion of several such models.)
  prefs: []
  type: TYPE_NORMAL
- en: We’ll begin by creating an input head and reshaping the input into two dimensions
    (Listing [6-21](#PC21)). This is necessary for applying attention layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Next, we’ll build a sample “attention block” (Listing [6-22](#PC22)). We begin
    by applying two fully connected layers. If a fully connected layer with *r* nodes
    is applied to inputs with shape (*p*, *q*), the result has shape (*p*, *r*). A
    dense mapping is learned for each “slice” along the first axis. Afterward, we
    apply Luong-style self-attention with scaling, perform layer normalization, and
    return.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: We can stack the attention blocks like such (Listing [6-23](#PC23)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: Note that the first layer applied to the inputs is a fully connected dense layer;
    this can be thought of as an embedding that transforms the input of shape (*n*[features],
    1) into shape (*n*[features], *d*[embed]). All following fully connected layers
    process the vectors corresponding to each feature independently, while each attention
    mechanism forces cross-relationships between the features. The information resulting
    from two attention blocks is flattened into a single vector and projected into
    the output space. The full sample architecture adapted for the Forest Cover dataset
    is shown in Figure [6-48](#Fig48).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig48_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the structure of a synthetic dataset to stack the attentional
    blocks. It flows as input 1, reshape, dense, dense 1, attention, layer normalization,
    dense 2, dense 3, attention 1, layer normalization 1, flatten, dense 4, and dense
    5 elements.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-48
  prefs: []
  type: TYPE_NORMAL
- en: Diagram for the architecture defined in Listing [6-23](#PC23)
  prefs: []
  type: TYPE_NORMAL
- en: Alternatively, we can use multi-head self-attention, modifying our attention
    block code appropriately (Listing [6-24](#PC24)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Note that if we wanted to do something like Luong-style attention but derive
    different keys and queries (and/or values) from a shared vector, this would just
    be a case of multi-head attention with one head!
  prefs: []
  type: TYPE_NORMAL
- en: 'Incorporating attention mechanisms into your tabular model is generally straightforward
    and effective. You can add, for example, the following features: residual connections,
    multiple parallel multi-head attention branches, applying convolutions and/or
    recurrent layers along the per-feature dimension to extract additional features,
    and/or incorporating attention into direct recurrent modeling techniques proposed
    in Chapter [5](525591_1_En_5_Chapter.xhtml), among others.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, see the AutoInt model (Figure [6-49](#Fig49)) proposed by Weiping
    Song et al. in the paper “AutoInt: Automatic Feature Interaction Learning via
    Self-Attentive Neural Networks.”^([8](#Fn8)) This centerpiece of this relatively
    simple architecture is a multi-head self-attention layer with a residual connection
    and performs exceptionally well on click-through rate (CTR) prediction problems.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig49_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the architecture of the Auto Int model. It consists of 4
    layers, input, embedding, interacting, and output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-49
  prefs: []
  type: TYPE_NORMAL
- en: AutoInt model diagram. From Weiping Song et al.
  prefs: []
  type: TYPE_NORMAL
- en: Attention-Based Tabular Modeling Research
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is a significant body of research applying attention to tabular data.
    As discussed previously, the attention mechanism is a very natural mechanism to
    select for different components of an input information stream. This section discusses
    four such papers from recent research in-depth and provides guidance on implementing
    the model or using an existing implementation. We will formalize each model using
    the authors’ notation for relevant variables, operations, and functions. This
    is essential to developing a concrete understanding of how the model operates,
    but – as a cautionary note – does tend to vary between papers.
  prefs: []
  type: TYPE_NORMAL
- en: TabTransformer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The TabTransformer model, introduced by Xin Huang et al. 2020 in the paper
    “TabTransformer: Tabular Data Modeling Using Contextual Embeddings,”^([9](#Fn9))
    is a relatively straightforward application of transformer/attention-based blocks
    to tabular data.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tabular datasets are generally comprised of just two types of features: categorical
    and continuous. Following the paper’s notation, let *m* be the number of categorical
    features, and let *c* be the number of continuous variables. The set of categorical
    features is thus *x*[cat] ≔ {*x*[1], *x*[2], ..., *x*[*m*]}, and the set of continuous
    features is *x*[cont] ∈ *ℝ*^c. Continuous features are rich with information that
    can often successfully be mapped to new spaces by neural networks. We can correspondingly
    think of continuous features as lacking in “potential information,” in the same
    way that a fast-moving ball has less potential energy than a slow-moving ball.
    Because continuous features span over a wider domain of values, relationships
    between specific values can be more easily worked out.'
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, categorical features suffer from a dearth of information,
    but therefore have high potential information. Each specific class in a categorical
    feature can be associated with some collection of attributes, which becomes useful
    when interpreted with respect to other features, categorical and continuous. In
    natural language processing, embeddings map specific class values to a continuous
    vector; the categorical “feature” at each timestep in the case of language has
    *V* total classes, where *V* is the vocabulary size. Correspondingly, classical
    machine learning algorithms that perform well on mixed-type tabular datasets construct
    implicit “embeddings” for classes in a categorical feature too. Suppose a node
    in a decision tree goes one way if the grade level is ten or higher. This is a
    rough equivalent to defining some attribute in an embedding vector that maps inputs
    with values 10, 11, and 12 close in one region and all other inputs close in another
    region; density in these regions is then “read” and combined with other information
    from this implicitly constructed embedding to form a prediction. However, such
    implicit “embeddings” aren’t explicit or specific, limited in precision by the
    node conditions.
  prefs: []
  type: TYPE_NORMAL
- en: We can generate *column embeddings* for each column in *x*[cat]. Let *d* be
    the dimensionality of the embedding space. For each column in *x*[cat], we maintain
    a trainable embedding lookup in which each unique value in that column corresponds
    to a *d*-length vector. To accommodate missing values, you can also generate an
    additional embedding to handle the n/a case.
  prefs: []
  type: TYPE_NORMAL
- en: 'After embedding the categorical features through column embedding, we have
    a (*m*, *d*)-shaped tensor. This is passed through a transformer block *N* times:
    the transformer block here is comprised of a standard multi-head attention mechanism
    followed by a feed-forward layer, with residual connections and layer normalization
    after each. Each transformer block produces what Huang et al. term “contextual
    embeddings”: that is, embeddings are not just created relative to other classes
    in a single categorical feature but related across/in context of all other features.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig50_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the architecture of the Tab transformer. It flows as column
    embedding with 2 transformer blocks and layer normalization, which are then followed
    by concatenation, multi-layer perception, and loss.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-50
  prefs: []
  type: TYPE_NORMAL
- en: The TabTransformer architecture. From Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: After repeated processing by the transformer block stack, the resulting (*n*,
    *d*)-shaped contextual embedding tensor is flattened/lined end-to-end into a vector
    with length *n* · *d* and concatenated with layer-normalized continuous features,
    such that the resulting concatenated vector has shape *n* · *d* + *c*. This vector
    contains rich computed contextual information, which is passed into a standard
    feed-forward network/multilayer perceptron into an output. The TabTransformer’s
    architecture (displayed in full in Figure [6-50](#Fig50)) can be summarized as
    a standard multilayer perceptron model with transformer-based contextualization
    of the categorical features.
  prefs: []
  type: TYPE_NORMAL
- en: 'TabTransformer pretrains the categorical embeddings and the transformer stack
    with two types of self-supervised pretraining: masked language modeling (MLM)
    (Figure [6-51](#Fig51)) and replaced token detection (RTD) (Figure [6-52](#Fig52)).
    In BERT-style masked language modeling pretraining, certain columns in the input
    are randomly masked, and the objective is to predict the replaced column values.
    Replaced token detection is a variation in which the values in certain columns
    are scrambled or otherwise tampered and the objective is to identify which columns
    have been altered and which have not. Both tasks require embeddings and the contextual
    processing transformer layers to learn important relationships in an unsupervised
    manner.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig52_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 tables depict replaced token detection. Table 1 has 4 rows and 5 columns.
    Table 2 has 4 rows and 2 columns. Table 1 leads to table 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-52
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of the replaced token detection
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig51_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 tables depict masked language modeling. Tables 1 and 2 have 4 rows and 5 columns.
    Table 1 leads to table 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-51
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of the masked language modeling task
  prefs: []
  type: TYPE_NORMAL
- en: The authors of the TabTransformer paper benchmark their model against a collection
    of 15 datasets. They use a hidden embedding dimension of 32, six transformer blocks,
    and eight attention heads in each block. The authors find that TabTransformer
    outperforms a baseline multilayer perceptron in almost all cases, albeit with
    a generally marginal improvement. Note that TabTransformer is really just an MLP
    fitted with a transformer-based categorical feature contextual embedding learner,
    however, so the improvement gains can be attributed just to this mechanism. Moreover,
    TabTransformer outperforms other deep learning models designed for tabular datasets
    and approaches the performance of a hyperparameter-optimized Gradient Boosting
    Decision Tree (GBDT) (Tables [6-4](#Tab4) and [6-5](#Tab5)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-5
  prefs: []
  type: TYPE_NORMAL
- en: Mean dataset performance of TabTransformer against other models. Percentages
    in AUC accuracy. From Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fige_HTML.jpg)A table
    of 2 columns and 7 rows. The column headers are model name, mean A U C percentage.
    |'
  prefs: []
  type: TYPE_TB
- en: Table 6-4
  prefs: []
  type: TYPE_NORMAL
- en: Performance of TabTransformer against a baseline MLP on several datasets. Percentages
    in AUC accuracy. From Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figd_HTML.gif)A table
    of 4 columns and 15 rows. The column headers are dataset, baseline M L P, tab
    transfer, and gain percentage. |'
  prefs: []
  type: TYPE_TB
- en: One advantage of the TabTransformer model beyond its demonstrated improvement
    in performance is interpretability. Because the model explicitly learns embeddings
    associated with each unique class value in each categorical feature, the learned
    embeddings can be analyzed and interpreted to understand how the model is making
    decisions. The authors perform a t-SNE reduction on the embeddings derived for
    the Bank Marketing dataset and find that “semantically similar classes are close
    with each other and form clusters in the embedding space” (Figure [6-53](#Fig53)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig53_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 3 scatterplots of t- S N E axis 2 versus t- S N E axis 1 depict the classes
    in embedding space. Scatterplot 1, class clusters are between 0 and 20\. Scatterplot
    2, class clusters are between 0 and 10\. Scatterplot 3, class clusters are between
    negative 10 and 0.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-53
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of category embeddings reduced in low-dimensional space. From
    Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: To demonstrate the richness of the embeddings, the authors train linear models
    on the contextual embeddings for each categorical feature outputted at each of
    the successive transformer blocks and show that the derived features, even before
    the first application of the transformer block, are enough to reach at least 90%
    of the accuracy obtained by the complete TabTransformer model (Figure [6-54](#Fig54)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig54_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of normalized accuracy versus layers. There are 6 increasing lines
    and 3 dots categorized into 3 datasets, bank marketing, adult, and Q S A R bio.
    Bank marketing dot, (6, 0.76). Adult dot, (6, 0.94). Q S A R bio dot, (6, 0.90).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-54
  prefs: []
  type: TYPE_NORMAL
- en: Three different datasets (Bank Marketing, Adult Census, and QSAR) are shown
    – the performance of a regression model trained on the attended features after
    the nth layer. From Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: Another primary advantage Huang et al. highlight is robustness to noisy and
    missing data, which tree-based methods often have comparatively more difficulty
    dealing with. The TabTransformer model performs better than a baseline MLP by
    a significant margin for both data noise (Figure [6-55](#Fig55)) and data deletion
    (missing data) attacks (Figure [6-56](#Fig56)). TabTransformer can withhold an
    impressively high proportion of the original performance at no corruption at high
    levels of noise and missing data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig56_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of normalized accuracy versus missing data rate percent. There
    are 6 decreasing lines categorized into 3 datasets, 1995 income, online shoppers,
    and blastchar for tab transformer and M L P models.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-56
  prefs: []
  type: TYPE_NORMAL
- en: Degradation of performance relative to a model trained on uncorrupted data from
    different levels of data corruption via missing data. From Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig55_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph of normalized accuracy versus noisy rate percent. There are 6 decreasing
    lines categorized into 3 datasets, 1995 income, online shoppers, and blastchar
    for tab transformer and M L P models.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-55
  prefs: []
  type: TYPE_NORMAL
- en: Degradation of performance relative to a model trained on uncorrupted data from
    different levels of data corruption via data noise. From Huang et al.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, TabTransformer also lends itself nicely to self-supervised pretraining
    and has been shown to be one of the more promising architectures for self-supervised
    tabular learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'The TabTransformer architecture is relatively straightforward to build “from
    scratch” using Keras layers and is a good exercise. We’ll begin by defining the
    following key configuration parameters for our architecture (Listing [6-25](#PC25)):'
  prefs: []
  type: TYPE_NORMAL
- en: '`NUM_CONT_FEATS`: The number of continuous features'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NUM_CAT_FEATS`: The number of categorical features'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NUM_UNIQUE_CLASSES`: A list of the number of unique classes in each category.
    Should have the same length as the number of categorical features'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`EMBEDDING_DIM`: The dimensionality of the embedding (i.e., the vector associated
    with each unique class in each categorical feature)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NUM_HEADS`: The number of heads in each multi-head attention mechanism'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`KEY_DIM`: The dimension to project the key and query to in the multi-head
    attention layer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`NUM_TRANSFORMERS`: The number of transformer blocks to stack'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`FF_HIDDEN_DIM`: The number of hidden units in the feed-forward component of
    the transformer block before projecting into the dimension of the embedding dimension'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`MLP_LAYERS`: The number of hidden feed-forward layers in the multilayer perceptron
    component at the end of the TabTransformer model'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`MLP_HIDDEN`: The number of units in each hidden layer in the multilayer perceptron
    component at the end of the TabTransformer model'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`OUT_DIM`: The dimensionality of the output'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`OUT_ACTIVATION`: The activation function to use in the output'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s begin by defining the inputs (Listing [6-26](#PC26)). The continuous
    feature input head is straightforward: we define an input head that accepts a
    vector of length `NUM_CONT_FEATS` and apply layer normalization. Because we need
    to generate a unique embedding scheme for each categorical feature, we create
    a list of input heads corresponding to each categorical feature. We correspondingly
    generate embeddings that link from each categorical feature input head and associate
    with an `EMBEDDING_DIM`-sized vector. The vocabulary size for each embedding layer
    is provided to us in `NUM_UNIQUE_CLASSES`. Each embedding at this point will yield
    a tensor of shape (batch size, 1, `EMBEDDING_DIM`). We want to “link” up the embeddings
    for each of the categorical features, so we concatenate upon the second axis (axis
    1 with zero-based indexing) to yield a grouped embedding tensor of shape (batch
    size, `NUM_CAT_FEATS`, `EMBEDDING_DIM`). Note that this tensor shape resembles
    that of natural language sequences, which have tensor shape (batch size, sequence
    length, embedding dimension). In this case, we do not assume that the categorical
    features in axis 1 are arranged sequentially, which works fine with transformer
    blocks.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: Because we will stack several transformer blocks together, it’s useful to define
    a function that performs the block linkage for us (Listing [6-27](#PC27)). We
    begin by computing multi-head self-attention with tensors from the input layer.
    To form a residual connection, we add the result of self-attention with the original
    input. (Note that the result of self-attention is the same as the input shape
    by default, although you can specify the output to be projected to a different
    dimension.) We apply layer normalization, followed by two feed-forward layers.
    Another residual connection is built between the output of layer normalization
    and the output of the feed-forward component of the transformer block. The result
    is normalized again and returned.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: We can apply this transformer block several times (Listing [6-28](#PC28)). The
    output tensor still has shape (batch size, `NUM_CAT_FEATS`, `EMBEDDING_DIM`),
    but each of the embeddings is now contextualized with respect to the other categorical
    features. We flatten the result into a batch of vectors with shape (batch size,
    `NUM_CAT_FEATS` × `EMBEDDING_DIM`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: The contextual embeddings can be concatenated with the normalized continuous
    variables and fed into the multilayer perceptron (Listing [6-29](#PC29)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: To build the graph into a model, we collect all the inputs and call `keras.models.Model`
    to connect the inputs to the output (Listing [6-30](#PC30), Figure [6-57](#Fig57)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig57_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the structure of the tab transformer model. It includes
    input heads, transformer block, stacking of transformer together operations, and
    M L P layers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-57
  prefs: []
  type: TYPE_NORMAL
- en: The custom TabTransformer model defined in Listings [6-26](#PC26) to [6-30](#PC30)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: For the purposes of cleaner visualization and to adhere to good implementation
    practice, we can use a compartmentalized design to define the transformer block
    as a separate submodel (Listing [6-31](#PC31)). Rather than returning the output
    tensor, we construct a new submodel with a unique name (submodels in the same
    graph must have unique names).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: The code to define the TabTransformer model is largely the same (Listing [6-32](#PC32);
    transformer block, Figure [6-58](#Fig58); TabTransformer architecture, Figure
    [6-59](#Fig59)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig59_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the tab transformer model with 5 compartmentalized transformer
    blocks design. The other elements are 4 input layers, 4 embedding layers, concatenate,
    cont feats, flatten, layer normalization, concatenate 1, and dense 12, 13, 14,
    15, and 16.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-59
  prefs: []
  type: TYPE_NORMAL
- en: The TabTransformer model in Keras with compartmentalized transformer blocks
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig58_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the structure of the transformer block. It flows as input
    6, multi-head attention 5, add 10, layer normalization 11, dense 10, dense 11,
    add 1, and layer normalization 12.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-58
  prefs: []
  type: TYPE_NORMAL
- en: The transformer block
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Let’s demonstrate the application of such a model to the Ames Housing dataset,
    which we have encountered previously. The Ames Housing dataset has many categorical
    features and is a great mixed-type tabular dataset to build models for. We will
    begin by reading the data, scaling the target, and determining which features
    are categorical and which are continuous (Listing [6-33](#PC33)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: Because the embeddings require all class information to be label-/ordinal-encoded
    as integers beginning from 0, we will use scikit-learn’s `OrdinalEncoder` to appropriately
    transform all categorical features (Listing [6-34](#PC34)). We will also cast
    all continuous features as float32 to avoid type issues later on.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: After preprocessing is completed, we perform train-validation split (Listing
    [6-35](#PC35)). It is important we perform encoding beforehand such that we do
    not run the risk of encountering classes that have not been associated with an
    integer by the encoder because it was not seen during training. Because we are
    just applying a simple ordinal encoder, this does not warrant data leakage.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: You can also use the from-scratch TabTransformer model we built, but the community
    also has many great implementations. Cahid Arda has implemented TabTransformer
    in Keras, which can be directly accessed within-notebook with the following (Listing
    [6-36](#PC36)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: We can import the `TabTransformer` model and specify desired configuration parameters
    and use the `get_X_from_features` utility function to prepare the inputs for the
    model (Listing [6-37](#PC37)). This separates the continuous features form the
    categorical features and dices up each of the categorical features into individual
    items. The complete set of continuous features and each categorical feature are
    placed into a list, which is accepted by the multi-head TabTransformer model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: The result is a Keras model that can be compiled and fitted (Listing [6-38](#PC38)).
    Note that because the model is custom-defined, it lacks certain functionalities
    like visualization. You can view the source code yourself at [https://​github.​com/​CahidArda/​tab-transformer-keras](https://github.com/CahidArda/tab-transformer-keras)`.`
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: TabTransformer is an extraordinarily versatile architecture, and there’s a lot
    to explore with. You could use Hyperopt to perform hyperoptimization on the key
    structural hyperparameters, since there aren’t very many. Another idea is to use
    transformer blocks to jointly process the categorical and continuous features
    by learning “embeddings” for the continuous features too (“embeddings” in the
    sense of projecting into a space with the embedding dimension). This could allow
    contextual embeddings to be contextualized not just with respect to other categorical
    features but the entire width of the dataset. (Indeed, this is the approach adopted
    by a later paper we will cover, SAINT.)
  prefs: []
  type: TYPE_NORMAL
- en: TabNet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The TabNet architecture, introduced by Sercan O. Arik and Tomas Pfister from
    Google Cloud AI in the paper “TabNet: Attentive Interpretable Tabular Learning”
    in 2019,^([10](#Fn10)) is another popular deep learning model for tabular data.
    It is considerably more complex than TabTransformer but shares many fundamental
    similarities. The fundamental paradigm of TabNet is that decision-making is done
    in a series of sequential steps; at each step, the model reasons which features
    to process with input from the progress derived by previous timesteps (Figure
    [6-60](#Fig60)). Each of the steps uses an attention-like mask to select for certain
    desired features – hence “*attentive* tabular learning.” The reasoning from each
    timestep is then aggregated to produce a final output.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig60_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the working of TabNet architecture. The input features are
    categorized into professional occupation-related and investment related and then
    processed. Based on the aggregate information, the output is predicted.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-60
  prefs: []
  type: TYPE_NORMAL
- en: Schematic for feature selection and reasoning from a tabular data row instance
    across multiple decision steps. From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us formalize our understanding of the TabNet model with the authors’ notation.
    There are *B* samples in each batch, and each row contains *D* features (i.e.,
    each batch contains *B D*-dimensional vectors). We thus have that the features
    ***f*** ∈ *ℝ*^(*B* × *D*). Let *N*[steps] be the number of decision steps; the
    outputs of the *i*th input are passed into the *i* + 1th step. For each timestep
    *i*, the model holds a unique learnable mask ***M***[*i*] ∈ *ℝ*^(*B* × *D*). The
    mask operates multiplicatively; ***M***[*i*] · ***f*** represents the masked results.
    Values in ***M***[*i*] range between 0 and 1, and selection is ensured as *sparse*:
    most features will have either a comparatively high probability or a near-zero
    probability such that during multiplication the latter are masked. The masks are
    calculated as a function of the *prior scale term* ***P***[*i* − 1] and the processed
    features (i.e., output) of the previous step ***a***[*i* − 1]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \boldsymbol{M}\left[i\right]=\textrm{sparsemax}\left(\boldsymbol{P}\left[i-1\right]\cdot
    {h}_i\left(\boldsymbol{a}\left[i-1\right]\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: In this calculation *h*[*i*] is a mapping function parametrized by a feed-forward
    layer architecture. This function helps to “reinterpret” or “prepare” the previous
    step’s output for interaction with the prior scale term.
  prefs: []
  type: TYPE_NORMAL
- en: 'The prior scale term ***P***[*i* − 1] represents how much a feature has been
    previously attended to. Given some relaxation parameter *γ*, the prior scale term
    is calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \boldsymbol{P}\left[i\right]=\prod \limits_{j=1}^i\left(\gamma -\boldsymbol{M}\left[j\right]\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: Consider γ = 1\. Say that the mask value for some feature at the first timestep
    value is 1 – that is, the feature was selected for processing. The prior scale
    term ***P***[1] for that feature then evaluates to *γ* − ***M***[1] = 1 − 1 = 0\.
    Note that because the mask ***M***[*i*] is calculated as a product of the prior
    scale term, that particular feature will be zeroed out and not selected in the
    following timestep. Moreover, this prevents usage in any of the later timesteps,
    since ∏*x* = 0 for some series *x* if 0 ∈ *x*. Similarly, this forces features
    that were not previously used to be used. Of course, the softmax mechanism is
    softer, but the prior scale mechanism still acts as a force to ensure most relevant
    features “get a shot in the spotlight,” so to speak. The first prior scale term
    ***P***[0] is initialized to all-ones (i.e., ***P***[0] ≔ 1^(*B* × *D*)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig61_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the architecture of an attentive transformer. It includes
    F C, B N, x, sparsemax, and prior scales.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-61
  prefs: []
  type: TYPE_NORMAL
- en: Attentive transformer architecture. From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: This component of the TabNet architecture is the *attentive transformer* (Figure
    [6-61](#Fig61)). It generates a mask to determine which features to select in
    an attention-like manner from the output features of the previous timestep (or,
    for the first step, from the input features) and prior scale scoring. Arik and
    Pfister describe such a mask as performing “soft selection of the salient features.”
    “Through sparse selection of the most salient features,” the authors write, “the
    learning capacity of a decision step is not wasted on irrelevant ones, and thus
    the model becomes more parameter efficient.” Such adaptable masks are a philosophical
    and pragmatic advantage over decision tree–like feature selection, which is “hard”
    and nonadaptable/static.
  prefs: []
  type: TYPE_NORMAL
- en: At each step *i*, after feature selection via learned masks, the selected features
    are passed through a feature transformer *F*[*i*] (Figure [6-62](#Fig62)). We
    split the output of the feature transformer to collect the decision step output
    ![$$ \boldsymbol{d}\left[i\right]\in {\mathbb{R}}^{B\times {N}_d} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq3.png)
    for some dimensionality *N*[*d*] and information for the next step ![$$ \boldsymbol{a}\left[i\right]\in
    {\mathbb{R}}^{B\times {N}_a} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq4.png)
    for some dimensionality *N*[*a*]. (Both dimensions are preset.)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\boldsymbol{d}\left[i\right],\boldsymbol{a}\left[i\right]\right]={F}_i\left(\boldsymbol{M}\left[i\right]\cdot
    \boldsymbol{f}\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In terms of specific architecture, the feature transformer contains a shared
    and independent component. Let a *block* refer to the following stack: fully connected
    layer, batch normalization, gated linear unit activation (GLU). (The gated linear
    unit activation was introduced by Dauphin et al. (2015) as GLU(*a*, *b*) = *a* ⊗ *σ*(*b*),
    which intuitively forces selection of units in *a* along the gate *b*. GLU can
    be used as an activation function on a single vector when *a* and *b* represent
    halves of the vector.) A feature transformer consists of four blocks, with normed
    residual connections around the latter three. The first two blocks are universally
    shared across all decision steps, whereas the last two are unique to each decision
    step. Sharing half of the feature transformer universally across all steps helps
    to speed up training, improve parameter efficiency, and improve learning robustness.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig62_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the structure of the feature transformer. The structure
    has 2 blocks. Both blocks have F C, B N, G L U elements along with a root of 0.5
    in shared across decision steps block and 2, root of 0.5 values in decision step
    dependent block.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-62
  prefs: []
  type: TYPE_NORMAL
- en: Feature transformer model. From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: 'To aggregate across all decision outputs, TabNet takes the sum of ReLUs across
    the decision outputs ***d*** for all time steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {d}_{\textrm{out}}=\sum \limits_{i=1}^{N_{\textrm{steps}}}\textrm{ReLU}\left(\boldsymbol{d}\left[\textbf{i}\right]\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: This joint output is passed through a final linear mapping layer to obtain the
    true output ***W***[**final**]***d***[**out**]**,** with final activations (e.g.,
    softmax) applied appropriately on a context-dependent basis. This final aggregation
    step is reminiscent of *DenseNet*-style residual connections (see Chapter [4](525591_1_En_4_Chapter.xhtml)),
    in which each layer is connected to residual connections from all previous anchor
    points. In a similar way, the final output of the TabNet model is a sum of the
    outputs of all the steps, such that later steps must modulate/correct for/”keep
    in mind” the influence of previous steps.
  prefs: []
  type: TYPE_NORMAL
- en: 'The feature selection masks offer value for interpreting TabNet’s decision-making
    process. If ***M***[***q,j***][*i*] = 0, then the *j*th feature of the *q*th sample
    had no contribution to the decision at step *i*. However, different steps themselves
    differ in their contribution to the final output. The authors propose the following
    formula for the function *η*[*q*][*i*], which gives the aggregate decision contribution
    on the output of the *q*th sample at the *i*th decision step:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\eta}_q\left[i\right]=\sum \limits_{c=1}^{N_d}\textrm{ReLU}\left({\boldsymbol{d}}_{\textrm{q},\textrm{c}}\left[i\right]\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The *η* function provides us a way to scale the decision mask at each decision
    step to weight each mask by that step’s relevance to the output. Arik and Pfister
    articulate the following aggregate-level feature importance mask (with an introduced
    placeholder variable *j* to iterate over columns):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\boldsymbol{M}}_{\textbf{agg}-\boldsymbol{q},\boldsymbol{j}}=\frac{\sum
    \limits_{\boldsymbol{i}=\textbf{1}}^{N_{\textrm{steps}}}{\eta}_q\left[i\right]{\boldsymbol{M}}_{\boldsymbol{q},\boldsymbol{j}}\left[i\right]}{\sum
    \limits_{j=1}^D\sum \limits_{\boldsymbol{i}=\textbf{1}}^{N_{\textrm{steps}}}{\eta}_q\left[i\right]{\boldsymbol{M}}_{\boldsymbol{q},\boldsymbol{j}}\left[i\right]}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This formula is quite intuitive: it returns the weighted sum of the masks,
    normalized such that the sum of the feature importance masks across all features
    for a sample is 1.'
  prefs: []
  type: TYPE_NORMAL
- en: The complete architecture is visualized in Figure [6-63](#Fig63). The input
    features are passed through an initial feature transformer and then into the first
    step. At each step, the attentive transformer generates the feature selection
    mask from the previous step’s carry-through output (i.e., ***a***[*i* − 1]) and
    is applied in multiplicative fashion to the original input features. The selected
    features are passed through the feature transformer; part of the output is passed
    into the next step (as ***a***[*i*]) and the other as the decision output (***d***[*i*]).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig63_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the working of the TabNet model across several steps.
    The inputs are passed to the feature transformer and then into the first step.
    The step includes an attentive transformer, mask, feature transformer, split,
    and Re L U. The output is passed to the next step.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-63
  prefs: []
  type: TYPE_NORMAL
- en: Complete schematic of the TabNet model architecture across several steps. This
    diagram also shows the collection of the masks for feature attribution at the
    bottom (leading to “feature attributes”). Don’t be confused by these – these are
    no part of the formal supervised model, which is optimized during training. They
    represent information flows used for explainability in the prediction phase. From
    Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: 'TabNet, like TabTransformer, also uses an unsupervised/self-supervised pretraining
    scheme (Figure [6-65](#Fig65)). The authors create a *TabNet decoder* (Figure
    [6-64](#Fig64)), which is comprised of several feature transformers arranged in
    a similar multistep fashion with fully connected layers at each decision step;
    the summed decision outputs are used to obtain the reconstructed features. The
    pretraining task is to predict masked feature columns. A binary mask for the batch
    is generated: *S* ∈ {0, 1}^(*B* × *D*). The encoder accepts the input (1 − *S*) · ***f*****,**
    and the decoder predicts *S* · ***f***. After this pretraining task, the decoder
    is detached, and the decision-making output is used in replacement for supervised
    fine-tuning (Figure [6-64](#Fig64)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig65_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 flowcharts depict a two-stage training scheme of the TabNet model. Unsupervised
    pre-training, a table with some missing data, TabNet encoder, TabNet decoder,
    and a table with data that were missing. Supervised fine-tuning, a table with
    complete data, TabNet encoder, decision-making, and a table with 1 column of data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-65
  prefs: []
  type: TYPE_NORMAL
- en: The TabNet two-stage training scheme. From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig64_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the architecture of the TabNet decoder. The encoded
    representation is passed to the feature transformer of steps 1, 2, and so on and
    then into F C. The concatenated data outputs the reconstructed features.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-64
  prefs: []
  type: TYPE_NORMAL
- en: The decoder architecture, which accepts the encoded representation and outputs
    the reconstructed features. From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: The authors evaluate TabNet on a wide variety of synthetic and “natural” datasets;
    they find that TabNet performs competitively and sometimes better than the best
    tree-based and DNN-based tabular models (Tables [6-6](#Tab6) through [6-11](#Tab11)).
    On synthetic datasets, TabNet performs near the top, with a significantly reduced
    parameter size (26–31k compared with 101k for INVASE and 43k for other deep learning
    methods).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-11
  prefs: []
  type: TYPE_NORMAL
- en: Performance on the Rossmann Store Sales dataset (Kaggle 2019). From Arik and
    Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figk_HTML.jpg)A table
    of 2 columns and 5 rows. The column headers model, and test M S E. |'
  prefs: []
  type: TYPE_TB
- en: Table 6-10
  prefs: []
  type: TYPE_NORMAL
- en: Performance on the Higgs Boson dataset (Dua and Graff 2017). From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figj_HTML.jpg)A table
    of 3 columns and 7 rows. The column headers model, test accuracy percentage, and
    model size. |'
  prefs: []
  type: TYPE_TB
- en: Table 6-9
  prefs: []
  type: TYPE_NORMAL
- en: Performance on the Sarcos dataset (Vijayakumar and Schaal 2000). From Arik and
    Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| ![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figi_HTML.gif)A table of
    3 columns and 8 rows. The column headers model, test M S E, and model size. |'
  prefs: []
  type: TYPE_TB
- en: Table 6-8
  prefs: []
  type: TYPE_NORMAL
- en: Performance on the Poker Hand dataset (Dua and Graff 2017). From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figh_HTML.jpg)A table
    of 2 columns and 8 rows. The column headers are model, and test accuracy percentage.
    |'
  prefs: []
  type: TYPE_TB
- en: Table 6-7
  prefs: []
  type: TYPE_NORMAL
- en: Performance on the Forest Cover dataset (Dua and Graff 2017). From Arik and
    Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figg_HTML.gif)A table
    with 2 columns and 5 rows. The column headers are model, and test accuracy percentage.
    |'
  prefs: []
  type: TYPE_TB
- en: Table 6-6
  prefs: []
  type: TYPE_NORMAL
- en: Performance on a synthetic dataset pack (Chen 2018). From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figf_HTML.gif)A table
    with 2 columns and 7 rows. Column 2 is subdivided into 6 sub-columns titled s
    y n 1, s y n 2, s y n 3, s y n 4, s y n 5, and s y n 6\. The row headers are no
    selection, tree, lasso- regularized, L 2 X, I N V A S E, global, and TabNet. |'
  prefs: []
  type: TYPE_TB
- en: Moreover, TabNet offers somewhat similar yet different interpretations for feature
    interpretability (Table [6-12](#Tab12)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-12
  prefs: []
  type: TYPE_NORMAL
- en: Comparison of feature importance rankings by different methods. From Arik and
    Pfister
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figl_HTML.jpg)A table
    of 5 columns and 12 rows. The column header are feature, S H A P, skater, X G
    B booster, and TabNet. |'
  prefs: []
  type: TYPE_TB
- en: It should be noted, moreover, that TabNet shares many architectural and conceptual
    similarities with tree-based models. The set of sequence operations provides a
    decision tree–like decision scaffold and is capable of representing decision tree–style
    feature space separations (Figure [6-66](#Fig66)). The authors note that the attention-like
    mechanism allows for a softer, adaptive version of tree node separation criteria.
    Moreover, the sequential stacking nature of the TabNet model is conceptually similar
    to stacking and boosting in tree models, in which units learn with/from/around
    the previous unit’s output.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig66_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of TabNet architecture represented as a decision tree&#x2013;like
    decision scaffold.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-66
  prefs: []
  type: TYPE_NORMAL
- en: Schematic of how the TabNet architecture can be used to represent decision tree–like
    logical decision-making. From Arik and Pfister
  prefs: []
  type: TYPE_NORMAL
- en: Another advantage of TabNet (and all deep learning for tabular data models)
    is its ability to be trained on unlabeled data. Due to the confluence of several
    mechanisms like sparsity, masking, and timestep-independent shared weights, TabNet
    is one of the lightest and most powerful recent tabular deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: 'Because TabNet comes from Google Cloud AI, the codebase (model code available
    at [https://​github.​com/​google-research/​google-research/​blob/​master/​tabnet/​tabnet_​model.​py](https://github.com/google-research/google-research/blob/master/tabnet/tabnet_model.py))
    is written in TensorFlow and should be somewhat readable. We will use a modified
    version in proper Keras by Somshubra Majumdar, which comes with additional conveniences
    and utilities. You can see the implementation here: [https://​github.​com/​titu1994/​tf-TabNet/​blob/​master/​tabnet/​tabnet.​py](https://github.com/titu1994/tf-TabNet/blob/master/tabnet/tabnet.py).
    The code is available as a library in pip; its PyPI page is [https://​pypi.​org/​project/​tabnet/​](https://pypi.org/project/tabnet/),
    and it can be installed with `pip install tabnet`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The `tabnet` library comes with two output-fitted models: `TabNetClassifier`
    and `TabNetRegressor` for classification and regression problems, respectively.
    Both share the same `TabNet` base model architecture but use different output
    activations (as one can confirm by looking at the source code). At the minimum,
    you need to specify the number of input features and the number of output classes.
    Moreover, you can specify the feature dimension `feature_dim` (this is *N*[*a*]),
    the output dimension `output_dim` (this is *N*[*d*]), the number of decision steps
    `num_decision_steps` (this is *N*[steps]), the relaxation factor `relaxation_factor`
    (this is *γ*), and a sparsity coefficient `sparsity_coefficient` to control the
    severity of adherence toward sparsity, among additional parameters (Listing [6-39](#PC39).)'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: We can compile and fit as a standard Keras model (Listing [6-40](#PC40)). Use
    large batch sizes for TabNet – even as high as 10–15% of the total dataset size,
    if memory permits. Since this implementation does not support self-supervised
    learning easily, it may take an extended period of training to acclimate to the
    labels. While self-supervised learning helps, training directly on labels usually
    yields competitive results too. Implementing self-supervised pretraining is not
    difficult and can be built from the existing source code building blocks.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: For technical TensorFlow reasons, to easily obtain the values for the feature
    selection masks, we need to pass the desired dataset through the model. We do
    not need to save the outputs; the point of this command is to force the model
    to run in eager execution mode. From there, we can collect the masks (a list of
    tensors in raw original form) and access the data in NumPy arrays (Listing [6-41](#PC41)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: There are *N*[steps] − 1 feature selection maps (plotted by Listing [6-42](#PC42),
    Figure [6-67](#Fig67)). Note that this particular model reasons from individual
    “key” features in the first few steps and then progressively incorporates input
    from other features in later steps to further inform the decision-making procedure.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67a_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 7 heatmaps of samples versus columns depict mask values for layers 1 to 7\.
    Each heatmap includes 54 samples. The heatmaps are color-based using scales with
    different ranges.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67b_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67c_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67d_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67e_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67f_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67g_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6-67
  prefs: []
  type: TYPE_NORMAL
- en: The features attended to at each iteration of a TabNet block (arranged along
    the x-axis) for several samples (arranged along the y-axis)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: We can similarly access the aggregate feature mask, which informs us of the
    individual feature contributions to the output weighed across decision steps for
    all samples in the submitted dataset (Listing [6-43](#PC43), Figure [6-68](#Fig68)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig68_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap of samples versus columns depicts an aggregate feature mask. It includes
    54 samples. The heatmap is colored based on a scale ranging from 0.0 to 0.65.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-68
  prefs: []
  type: TYPE_NORMAL
- en: Plotting the aggregate feature mask across several examples
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: In sum, TabNet employs an attention-based feature selection mechanism, which
    forces sequential reasoning and processing of features in similar fashion to tree
    ensembles, with the advantage of interpretability.
  prefs: []
  type: TYPE_NORMAL
- en: SAINT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Self-Attention and Intersample Attention Transformer (SAINT) is a recent
    model, introduced by Gowthami Somepalli et al. from the University of Maryland
    and Capital One Machine Learning in the 2021 paper “SAINT: Improved Neural Networks
    for Tabular Data via Row Attention and Contrastive Pre-Training.”^([11](#Fn11))
    SAINT’s novel contribution is the introduction of *intersample attention*, which
    allows rows to relate to one another in attentive fashion, as opposed to standard
    column-wise attention.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us conceptualize SAINT using the authors’ notation (slightly adapted for
    clarity). Let *D* ≔ ![$$ D:= {\left\{{x}_i,{y}_i\right\}}_{i=1}^m $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq5.png):
    the dataset *D* contains *m* pairs of an *n* − 1-dimensional feature vector (*x*[*i*])
    and the associated label *y*[*i*]. The true dataset contains *n* features; a classification
    `[CLS]` token is added as an additional feature: ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots,
    {f}_i^{n-1}\right\} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq6.png),
    where ![$$ {f}_i^j $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq7.png)
    represents the value of the *j*th feature of the *i*th sample. The `[CLS]` token
    serves as a “blank feature.” SAINT embeds each feature into *d*-dimensional space
    independently, like TabTransformer. Unlike TabTransformer, SAINT embeds all features
    – categorical and continuous – whereas TabTransformer selectively embeds categorical
    features. The embedding layer is denoted by *E* and applies different embedding
    functions to different categorical features. The `[CLS]` token is embedded as
    if it were a feature. Its relevance will become clearer when the complete architecture
    is laid out.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Like TabTransformer and TabNet, SAINT’s primary architectural body is comprised
    of *L* attention-based steps. Each step consists of a self-attention transformer
    block, followed by an intersample attention transformer block. The self-attention
    block is identical to the one used in the Vaswani et al. original transformer
    paper: a multi-head self-attention (MSA) layer followed by feed-forward (FF) layers
    with a Gaussian Error Linear Unit (GELU) activation. Moreover, let MISA be the
    multi-head intersample self-attention layer (this mechanism will be explained
    more in-depth later), LN be the layer normalization layer, and *b* be the batch
    size. Both MSA and MISA have residual connections following. A step ![$$ {S}_k^q
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq8.png) at step
    *q* for a sample index *k* can be accordingly formulated as follows with intermediates
    ![$$ {z}_k^{q,1} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq9.png),
    ![$$ {z}_k^{q,2} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq10.png),
    and ![$$ {z}_k^{q,3} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq11.png)
    for notational convenience:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {z}_k^{q,1}= LN\left( MSA\left({S}_{q-1}\right)\right)+{S}_{q-1} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equl.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {z}_k^{q,2}= LN\left({FF}_1\left({z}_i^{q,1}\right)\right)+{z}_k^{q,1}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equm.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {z}_k^{q,3}= LN\left(\textrm{MISA}\left({\left\{{z}_i^{q,2}\right\}}_{i=1}^b\right)\right)+{z}_k^{q,2}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equn.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {S}_k^q= LN\left({FF}_2\left({z}_k^{q,3}\right)\right)+{z}_k^{q,3} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equo.png)'
  prefs: []
  type: TYPE_IMG
- en: Moreover, we have ![$$ {S}_k^0=E\left({x}_k\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq12.png)
    such that the inputs to ![$$ {S}_k^1 $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq13.png)are
    the embeddings generated for that sample. Note that to compute the multi-head
    intersample self-attention layer, we need to compare derived self-attention features
    across all samples within the batch.
  prefs: []
  type: TYPE_NORMAL
- en: The complete architecture is visualized in Figure [6-69](#Fig69).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig69_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the transformer block of S A I N T. It flows as embedded
    inputs of a batch, transformer with intersample attention and self-attention blocks,
    and contextual representations of a batch.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-69
  prefs: []
  type: TYPE_NORMAL
- en: The complete SAINT transformer block. From Somepalli et al.
  prefs: []
  type: TYPE_NORMAL
- en: To make the final prediction on a supervised problem, the embedding corresponding
    to the `[CLS]` token from the last step (![$$ {S}_0^L $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq14.png),
    assuming that the `[CLS]` token corresponds to the first feature index) is extracted
    and passed through a simple multilayer perceptron into the output. After training,
    the `[CLS]` feature embedding will have been informed via several steps of cross-feature
    and cross-sample attending. This is a clever trick to force information into a
    low-dimensional single embedding (as opposed to concatenating embeddings for every
    feature TabTransformer-style, which has a significantly larger dimensionality).
  prefs: []
  type: TYPE_NORMAL
- en: To understand the multi-head intersample self-attention mechanism, we will begin
    by reformalizing the standard multi-head self-attention mechanism (Figure [6-70](#Fig70)).
    Let *a* be the attention matrix and *a*[*i*, *j*] indicate the attention score
    between the query derived from the *i*th feature and the key derived from the
    *j*th feature. *a* is an *n* × *n* matrix, with self-attention scores computed
    between embeddings corresponding toelements in ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots,
    {f}_i^{n-1}\right)\Big\} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq15.png).
    The *i*th value of the output is ![$$ \sum \limits_{j=0}^{n-1}{a}_{i,j}\ast {v}_i
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq16.png), where
    *v*[*i*] is the value vector derived from the *i*th feature. This is repeated
    with multiple heads (i.e., multiple keys, queries, and values are derived from
    each of the features).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig70_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the multi-head self-attention mechanism. It includes
    4 E of dot layers. Each has query-key-value elements. The aggregate features outputs
    as layer normalization and residual.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-70
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of inter-feature attention (standard attention). From Somepalli
    et al.
  prefs: []
  type: TYPE_NORMAL
- en: 'Multi-head intersample self-attention (Figure [6-71](#Fig71)) is a “mega self-attention”
    across a batch. Rather than operating on embeddings corresponding to the collection
    of features ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots, {f}_i^{n-1}\right\}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq17.png), it operates
    on a batch of samples {*x*[1], *x*[2], ..., *x*[*b*]}. The embeddings for each
    of the features within each sample are concatenated with each other, independent
    of sample. Key, query, and value vectors are derived from these concatenated embeddings
    such that there are as many (*K*, *Q*, *V*) sets as there are attention heads
    per sample. Then, we apply attention in standard form: let *a* be a *b* × *b*
    attention matrix and *a*[*i*, *j*] indicate the attention score between the query
    derived from the concatenated embedding corresponding to *x*[*i*] and the key
    derived from the concatenated embedding corresponding to *x*[*j*]. To obtain the
    final output, the *i*th value is given by![$$ \sum \limits_1^b{a}_{i,j}\ast {v}_i
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq18.png), where
    *v*[*i*] is the value vector derived from the concatenated embedding corresponding
    to *x*[*i*].'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig71_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the multi-head intersample self-attention mechanism.
    It includes 3 sets of 4 E of dot layers and then concatenated. Each concatenated
    layer has query-key-value elements. The aggregate features outputs as layer normalization
    and residual.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-71
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of intersample attention. From Somepalli et al.
  prefs: []
  type: TYPE_NORMAL
- en: Like most deep learning approaches to tabular data, SAINT is pretrained with
    a self-supervised training task. Rather than using BERT/masked language model–style
    pretraining tasks, like TabTransformer’s replaced token detection pretraining
    task, SAINT uses contrastive learning. Contrastive learning is a training paradigm
    in which the goal is not to strictly learn an associated target given an input,
    but rather to identify shared or different attributes (i.e., to “compare and *contrast*”)
    between a set of inputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'SAINT’s pretraining task is as follows. For each sample *x*[*i*], generate
    a corrupted version *x*[*i*]^′. This is done using the CutMix augmentation, which
    uses the following calculation given a randomly selected sample *x*[*a*] and a
    binary mask vector sampled from a Bernoulli distribution ***m***:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {x}_i^{\prime }={x}_i\bigotimes m+{x}_a\bigotimes \left(1-\boldsymbol{m}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equp.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We will embed *x*[*i*] to obtain *p*[*i*] = *E*(*x*[*i*]). Then, we will generate
    a corrupted embedding, given the mix-up parameter *α* and another randomly selected
    sample *x*[*b*]:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {p}_i^{\prime }=\alpha \ast E\left({x}_i^{\prime}\right)+\left(1-\alpha
    \right)\ast E\left({x}_b^{\prime}\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equq.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Now, we have four sets of data: *x*[*i*], the original untouched sample; *x*[*i*]^′,
    the corrupted sample; *p*[*i*], the original untouched embedding; and *p*[*i*]^′,
    the corrupted embedding. We can pass the two embeddings through the SAINT model,
    which we will denote with a bold ***S*** (the compositing of all individual steps),
    to obtain ***S***(*p*[*i*]) and ![$$ \boldsymbol{S}\left({p}_i^{\prime}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq19.png). To reduce
    the dimensionality of these representations, we pass these through an additional
    MLP *g*[1] and *g*[2] to obtain *g*[1](***S***(*p*[*i*])) and ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq20.png). We can
    use this to calculate the *contrastive loss*, for some temperature parameter *τ*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Contrastive}\ \textrm{Loss}=-\sum \limits_{i=1}^m\log \left(\frac{\exp
    \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)}{\tau}\right)}{\sum
    \limits_{k=1}^m\exp \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_k^{\prime}\right)\right)}{\tau}\right)}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equr.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s break down this formula. The temperature parameter, logarithm, and exponentials
    can be more or less ignored since they do not affect the principal dynamics of
    the expression. We can rough-handedly “simplify” it as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ -\sum \limits_{i=1}^m\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)}{\sum \limits_{k=1}^m\left({g}_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_k^{\prime}\right)\right)\right)} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equs.png)'
  prefs: []
  type: TYPE_IMG
- en: It becomes more readable in this form. In the numerator, we are comparing the
    representation derived from the clean input with the representation derived from
    the corrupted version of that same input. In the denominator, we are summing the
    interaction between the representation derived from the clean input and the representation
    derived from the corrupted version of every element in the dataset. (Recall the
    authors denote an un-bolded *m* as the length of the dataset.) The dot product
    of some vector ![$$ \overrightarrow{a} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq21.png)
    and another vector ![$$ \overrightarrow{b} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq22.png)
    is maximized when ![$$ \overrightarrow{a}=\overrightarrow{b} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq23.png),
    holding one of the vectors fixed. In ideal conditions, *g*[1](***S***(*p*[*i*]))
    and ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq24.png)
    will be very close since they both fundamentally derive from the same sample,
    even if one is corrupted. In this case, the numerator will be large, and the overall
    term will evaluate to a high value relative to if *g*[1](***S***(*p*[*i*])) and
    ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq25.png)
    were farther apart. We sum all such values across all items in the dataset. Because
    we want to minimize the loss, we negate the summation.
  prefs: []
  type: TYPE_NORMAL
- en: We can think of the entire SAINT architecture ***S*** as a giant embedding machine;
    the contrastive loss incentivizes intelligently mapped embeddings, which place
    close points physically close together in the embedding space.
  prefs: []
  type: TYPE_NORMAL
- en: 'The authors also introduce a denoising loss, in which the objective is to decode
    the original input *x*[*i*] from the representation derived from the corrupted
    embedding, ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq26.png).
    A unique multilayer perceptron model is constructed for each individual feature
    to perform the “denoising.” The loss ![$$ {\mathcal{L}}_j $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq27.png),
    which is binary cross-entropy for categorical features and Mean Squared Error
    for continuous features, is taken between the original input and the derived representation.
    This is summed across all features (*n* total features) and across all samples
    (*m* total samples) and then scaled by *λ*[pt] such that it is on an appropriate
    magnitude relative to the contrastive loss:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Denoising}\ \textrm{Loss}={\lambda}_{\textrm{pt}}\sum \limits_{i=1}^m\sum
    \limits_{j=1}^n{\mathcal{L}}_j\left({MLP}_{\textrm{j}}\left({g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)\right),{x}_i\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equt.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The overall training loss is the sum of the contrastive and denoising losses:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\mathcal{L}}_{\textrm{pretraining}}=\textrm{Contrastive}\ \textrm{Loss}+\textrm{Denoising}\
    \textrm{Loss} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equu.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {\mathcal{L}}_{\textrm{pretraining}}=-\sum \limits_{i=1}^m\log \left(\frac{\exp
    \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)}{\tau}\right)}{\sum
    \limits_{k=1}^m\exp \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_k^{\prime}\right)\right)}{\tau}\right)}\right)+{\lambda}_{\textrm{pt}}\sum
    \limits_{i=1}^m\sum \limits_{j=1}^n{\mathcal{L}}_j\left({MLP}_{\textrm{j}}\left({g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)\right),{x}_i\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equv.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Then, as previously mentioned, the model is fine-tuned in a supervised learning
    regime; the embeddingcorresponding to the [CLS] token at the last step ![$$ {S}_0^L
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq28.png) is passed
    into an MLP with a single hidden layer to obtain the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\mathcal{L}}_{\textrm{fine}-\textrm{tuning}}=\sum \limits_{i=1}^m BCE\left({y}_i,
    MLP\left(\boldsymbol{S}\left(E\left({x}_i\right)\right)\right)\right)\Big) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equw.png)'
  prefs: []
  type: TYPE_IMG
- en: The complete SAINT training pipeline is visualized in Figure [6-72](#Fig72).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig72_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A two-part illustration depicts the working of self-supervised pre-training
    and supervised fine-tuning schemes of S A I N T, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-72
  prefs: []
  type: TYPE_NORMAL
- en: 'The complete SAINT training pipeline and architectures employed. For notation:
    a bold ***S***(...) indicates the complete SAINT pipeline (i.e., the compositing
    of the all steps together), and *r*[*i*] is the output of ***S***(...). From Somepalli
    et al.'
  prefs: []
  type: TYPE_NORMAL
- en: Somepalli et al. evaluate three versions of SAINT (standard SAINT; SAINT-s,
    with only self-attention; SAINT-i, with only intersample attention) across 16
    datasets and demonstrate improved performance over other tree-based and deep learning
    tabular data models (Table [6-13](#Tab13)). Note that SAINT-s is more or less
    identical to the original Vaswani et al. transformer block but applied to tabular
    data. We see that intersample attention helps provide improvement over just self-attention
    in a large number of datasets, however.
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-13
  prefs: []
  type: TYPE_NORMAL
- en: Mean AUROC
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figm_HTML.gif)2 tables.
    Table 1 has 12 rows and 3 columns. Column 2 has 9 sub-columns. Table 2 has 12
    rows. and 2 columns. Column 2 has 7 sub-columns. |'
  prefs: []
  type: TYPE_TB
- en: Moreover, the authors find that SAINT is highly robust to significant data corruption
    and that changing the batch size has little effect on the performance, assuming
    a minimum batch size of 32\. This suggests that just a “critical mass” of samples
    in a batch is required for effective comparison and cross-sample comparison.
  prefs: []
  type: TYPE_NORMAL
- en: The attention maps of the layers can be interpreted to understand how the model
    makes decisions (Figure [6-73](#Fig73)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig73_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A four-part heatmap depicts the sample inputs and self-attention scores of the
    layers. The input heatmap is comparatively brighter than the self-attention score
    heatmap.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-73
  prefs: []
  type: TYPE_NORMAL
- en: 'Left column: sample inputs, reshaped into two dimensions. Right: self-attention
    scores, selected and reshaped into two dimensions. From Somepalli et al.'
  prefs: []
  type: TYPE_NORMAL
- en: However, SAINT is unique because we can also understand how the network makes
    decisions for a particular sample based on other examples. On MNIST, the network
    tends to heavily consult a set of exemplars (Figure [6-74](#Fig74)), perhaps because
    they are difficult-to-classify examples with high information value. However,
    intersample attention grids are more varying on the more complex Volkert dataset
    (Figure [6-75](#Fig75)). The authors speculate that intersample attention density
    rises with dataset complexity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig75_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 heatmap of points in batch versus attended to depict S A I N T and S A I N
    T-i on Volkert dataset. Each heatmap has 20 rows and 20 columns. The cells are
    shaded in different colors.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-75
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: intersample attention for SAINT. Right: intersample attention for SAINT-i.
    On Volkert dataset. From Somepalli et al.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig74_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 heatmap of points in batch versus attended to depict S A I N T and S A I N
    T-i on M N I S T dataset. Each heatmap has 20 rows and 20 columns. The cells are
    shaded in different colors.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-74
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: intersample attention for SAINT. Right: intersample attention for SAINT-i.
    On MNIST dataset. From Somepalli et al.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The paper’s authors have implemented SAINT in PyTorch, which is available on
    the official repository here: [https://​github.​com/​somepago/​saint](https://github.com/somepago/saint).
    As of our knowledge, there exists no readily available Keras or TensorFlow implementation.
    However, Somepalli et al.’s implementation is user-friendly and directly accessible
    via the command line without knowledge of PyTorch.'
  prefs: []
  type: TYPE_NORMAL
- en: Begin by cloning the repository and creating and activating the provided environment
    (Listing [6-44](#PC44)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: In the current implementation, the model directly pulls data from OpenML – a
    data platform with the advantage of concretely defined and standardized (in the
    organizational, not the statistical, sense) features, labels, and other data attributes.
    Navigate to [www.​openml.​org/​](https://www.openml.org/) to browse existing datasets
    or to upload and create your own. Importantly, each dataset page has a numerical
    integer ID, which we will provide as a flag to identify the dataset we desire
    to train on. The Forest Cover dataset, for instance, has the OpenML ID `180` (Figure
    [6-76](#Fig76)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig76_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the open M L website depicts the forest cover dataset. It has
    download, edit, j son, and x m l options.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-76
  prefs: []
  type: TYPE_NORMAL
- en: The Forest Cover dataset on OpenML
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you’ve obtained the OpenML ID, you can initiate the training process:
    `python train.py --dset_id 180 --task multiclass`. The dataset ID and task are
    the only two required flags; you can also specify parameters like the number of
    attention heads, whether to use pretraining, the embedding size, and so on. See
    the repository’s README for more information. Note that the repository maintainers,
    as of the time of this writing, have verified the code only for Linux. You may
    run into problems on other operating systems.'
  prefs: []
  type: TYPE_NORMAL
- en: ARM-Net
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'ARM-Net, introduced by Shaofeng Cai et al. in 2021 in the paper “ARM-Net: Adaptive
    Relation Modeling Network for Structured Data,”^([12](#Fn12)) employs a unique
    architecture that could be described as more “involved” than the previously discussed
    attention-based architectures. Rather than using the standard attention mechanism
    as a transformation method for abstractly attending to different relevant features
    (and samples, in the case of SAINT), ARM-Net uses attention to help explicitly
    compute information-rich cross-features in a tabular dataset, which can be used
    for a supervised task. ARM-Net is structured in three modules: a preprocessing
    module, an adaptive relation modeling module, and a prediction module.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us begin by formalizing the preprocessing module with the authors’ notation.
    Let *m* be the number of features in the dataset and let the input vector *x* = [*x*[1],
    *x*[2], ..., *x*[*m*]]. Each feature is mapped to an embedding: *E* = [*e*[1],
    *e*[2], ..., *e*[*m*]]. Categorical features are mapped via an embedding lookup,
    and continuous features are transformed via linear transformation. Let *n*[*e*]
    be the embedding dimension.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The key transformation mechanism of the adaptive relation modeling module is
    the exponential neuron. For some interaction weight matrix *w*, we can compute
    the *i*th element of the exponential neuron output *y* given the embeddings set
    *e* as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}_i=\exp \left(\sum \limits_{j=1}^m{w}_{i,j}{e}_j\right)=\exp {\left({e}_1\right)}^{w_{i,1}}\bigotimes
    \exp {\left({e}_2\right)}^{w_{i,2}}\bigotimes \dots \bigotimes \exp {\left({e}_2\right)}^{w_{i,m}}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equx.png)'
  prefs: []
  type: TYPE_IMG
- en: The interaction weight matrix determines the influence each embedding has on
    the output – like in a standard artificial neural network neuron – but operates
    in exponential space, as opposed to the additive-multiplicative dynamics of standard
    neurons.
  prefs: []
  type: TYPE_NORMAL
- en: 'To obtain the interaction weight matrix *w*, the adaptive relation modeling
    module uses multi-head gated attention. When determining the value of the *i*th
    neuron *y*[*i*], we need to obtain relevant power term weightings: *w*[*i*] = [*w*[*i*,
    1], *w*[*i*, 2], ..., *w*[*i*, *m*]]. Let *v*[*i*] ∈ *ℝ*^(*m*) be the (learnable)
    weight value vector associated with the *i*th neuron, which encodes the attentiveness
    to the embeddings for each of the *m* features. Let ![$$ {q}_i\in {\mathbb{R}}^{n_e}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq29.png) be the
    query vector associated with the *i*th neuron, which is used along with the embeddings
    to dynamically generate the *bilinear attention alignment score*, calculated as
    follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\phi}_{att}\left({q}_i,{e}_j\right)={q}_i^{\textrm{T}}{W}_{att}{e}_j
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equy.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \tilde{z}_{i,j}={\phi}_{att}\left({q}_i,{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equz.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {z}_i=\alpha \textrm{entmax}\left(\tilde{z}_i\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equaa.png)'
  prefs: []
  type: TYPE_IMG
- en: Here, ![$$ {W}_{att}\in {\mathbb{R}}^{n_e\times {n}_e} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq30.png)
    is a weight matrix for bilinear attention. The shared bilinear attention function
    *ϕ*[att](*q*[*i*], *e*[*j*]) is calculated by performing a product between the
    query vector, the bilinear attention weight matrix, and the embedding. The transposed
    query has shape (1, *n*[*e*]); the product between this and the (*n*[*e*], *n*[*e*])-shaped
    weight matrix yields a (1, *n*[*e*])-shaped matrix; the product between this matrix
    and the (*n*[*e*], 1)-shaped embedding matrix yields a (1, 1)-shaped result (i.e.,
    a scalar). Thus, ![$$ \tilde{z}_{i,j} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq31.png)
    stores the attention score between the query vector of the *i*th neuron and the
    embedding corresponding to the *j*th feature. Thus, ![$$ \tilde{z}_i\in {\mathbb{R}}^m
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq32.png); that
    is, ![$$ \tilde{z}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq33.png)
    has length *m* – representing the attention scores between the *i*th exponential
    neuron and each of the *m* features. We compute the true embedding scores by applying
    the *α*entmax (sparse softmax) function to obtain *z*[*i*]. The sparse softmax
    function – as used previously in other tabular attention architectures in various
    modified forms – encourages sparsity by pushing smaller values to zero while preserving
    the signature softmax one-sum property.^([13](#Fn13))
  prefs: []
  type: TYPE_NORMAL
- en: 'We can therefore calculate the interaction weights as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_i={z}_i\bigotimes {v}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equad.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Because *z*[*i*] ∈ *ℝ*^(*m*) and *v*[*i*] ∈ *ℝ*^(*m*), we have that *w*[*i*] ∈ *ℝ*^(*m*).
    This is the gate-like nature of the mechanism: *z*[*i*] serves as the “gate” determining
    which elements in *v*[*i*] “can pass” (i.e., as relevant for downstream tasks).
    This weight, informed by relevant features, is then used to “program” the behavior
    of the exponential neurons.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We can reexpress the calculation for the *i*th exponential neuron more completely
    as follows, given the learned “atomics” *q*[*i*], *W*[att], and *v*[*i*] and the
    embeddings *e*:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}_i=\exp \left(\sum \limits_{j=1}^m{\left(\alpha \textrm{entmax}\left({q}_i^{\textrm{T}}{W}_{att}{e}_j\right)\bigotimes
    {v}_i\right)}_j{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equae.png)'
  prefs: []
  type: TYPE_IMG
- en: The authors adopt a multi-head version of this system. Let *K* be the number
    of heads and *o* be the number of exponential neurons. ![$$ {q}_i^{(k)} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq34.png)
    denotes the *k*th query key for the *i*th neuron, and likewise ![$$ {v}_i^{(k)}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq35.png) denotes
    the *k*th value key for the *i*th neuron. Note that *W*[att] is shared across
    heads. From each of the heads, we can derive a final output of the adaptive relation
    modeling module ***Y***, which is the concatenation of the outputs from each of
    the heads. (In this context, *a* ***⊕*** *b* refers to vector concatenation.)
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {y}_i^{(k)}=\exp \left(\sum \limits_{j=1}^m{\left(\alpha \textrm{entmax}\left({q_i^{(k)}}^{\textrm{T}}{W}_{att}{e}_j\right)\bigotimes
    {v}_i^{(k)}\right)}_j{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equaf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {Y}^{(k)}=\left[{y}_1^{(k)},{y}_2^{(k)},\dots, {y}_o^{(k)}\right] $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equag.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \boldsymbol{Y}={Y}^{(1)}\oplus {Y}^{(2)}\oplus \dots \oplus {Y}^{(K)}\Big\}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equah.png)'
  prefs: []
  type: TYPE_IMG
- en: The complete adaptive relation modeling module is displayed in Figure [6-77](#Fig77).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig77_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the working of the adaptive relation modeling module. It
    flows as input embedding, multi-head bilinear attention alignment, sparse softmax,
    recalibration weight computation, shared interaction weight matrix, exponential
    transformation, and output interaction terms.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-77
  prefs: []
  type: TYPE_NORMAL
- en: Adaptive relation modeling module architecture. From Cai et al.
  prefs: []
  type: TYPE_NORMAL
- en: 'We have ![$$ \boldsymbol{Y}\in {\mathbb{R}}^{K\cdot o\cdot {n}_e} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq36.png);
    the prediction module uses a multilayer perceptron to project this vector into
    the final desired output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y}= MLP\left(\boldsymbol{Y}\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equai.png)'
  prefs: []
  type: TYPE_IMG
- en: The complete ARM-Net architecture is displayed in Figure [6-78](#Fig78).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig78_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the working of the A R M-net model divided into 3 modules,
    preprocessing, adaptive relation modeling, and prediction. It flows as input embedding,
    exponential transformation, interaction terms, multilayer perception, relational
    representation, and prediction task.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-78
  prefs: []
  type: TYPE_NORMAL
- en: Complete ARM-Net architecture. From Cai et al.
  prefs: []
  type: TYPE_NORMAL
- en: Overall, the ARM-Net architecture takes a more involved design toward modeling
    tabular data. Rather than openly applying attention in large-scale blocks and
    employing strategies like self-supervised pretraining, like previously discussed
    work, ARM-Net is highly “strict” about how attention mechanisms are utilized.
    ARM-Net explicitly models cross-features between embeddings using exponential
    neurons and dynamically determines how such modeling is performed using a multi-head
    attention mechanism. This “stringent” architecture ensures high parameter efficiency,
    as information flow is explicitly directed rather than set open and expected to
    be fully learned (e.g., through expensive self-supervised learning campaigns).
    Moreover, like previous work, the attention weights can be interpreted to understand
    how the model makes predictions on any sample.
  prefs: []
  type: TYPE_NORMAL
- en: Cai et al. apply ARM-Net to several large benchmark tabular datasets and find
    the ARM-Net performs competitively with other deep tabular models with a reasonable
    parameter size (Table [6-14](#Tab14)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-14
  prefs: []
  type: TYPE_NORMAL
- en: Performance of ARM-NET and ARM-Net+ (ARM-Net ensembled with a standard DNN)
    against other varieties of models on five benchmark models from different contexts
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fign_HTML.gif)A table
    of 19 rows and 7 columns. Columns 3 to 7 are each subdivided into 2 sub-columns
    titled A U C and param. |'
  prefs: []
  type: TYPE_TB
- en: The authors provide the official repository at [https://​github.​com/​nusdbsystem/​ARM-Net](https://github.com/nusdbsystem/ARM-Net).
    It is, like SAINT, also written in PyTorch with no easily findable Keras or TensorFlow
    reimplementation. After cloning and installing dependencies, you can view examples
    of command-line scripts in `ARM-Net/run.sh`, where you can control the model architecture,
    training parameters, and the dataset used.
  prefs: []
  type: TYPE_NORMAL
- en: Key Points
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter discussed the attention mechanism, its usage in transformer models,
    and the application of attention-based models for language, multimodal, and tabular
    context data.
  prefs: []
  type: TYPE_NORMAL
- en: Attention mechanisms allow for direct, explicit modeling of the dependencies
    between two sequences by associating every timestep pair with an attention score
    indicating the relevance of the cross-timestep dependency. This helps address
    signal propagation and dependency forgetting problems in recurrent models, which
    can hinder performance on advanced sequence-to-sequence tasks even with upgrades
    like long-term memory states and bidirectionality. Models like the Google Neural
    Machine Translation model (Wu et al. 2016) employed large LSTM stack encoders
    and decoders with attention mechanisms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The transformer architecture (Vaswani et al. 2017) demonstrated that one could
    build successful sequence-to-sequence models without recurrent models, relying
    only upon attention as the core mechanism modeling sequence dependencies. Vaswani
    et al. use multi-head attention, in which multiple versions of the value, key,
    and query key are derived via linear layers; attention is computed between each
    value-key-query combination and concatenated and then mapped linearly to an output.
    This theoretically allows for multiple representations of the value, key, and
    query to be learned and processed. The transformer architecture uses self-attention
    in the encoder and decoder layers and cross-attention between the encoder and
    the decoder in autoregressive decoding. Later transformer-based models like BERT
    (Devlin et al. 2019) demonstrate that transformer models can significantly benefit
    from self-supervised pretraining, like masked language modeling and next sentence
    recognition tasks. Most all modern natural language models are transformers or
    heavily inspired by transformers. Some researchers (Merity 2019) express skepticism
    for the research craze around transformer models, demonstrating that much more
    sustainable and lightweight models can obtain good performance and advocating
    for greater valuing of reproducibility.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Keras offers three native flavors of attention: Luong-style dot product attention
    with `L.Attention()`, Bahdanau-style additive attention with `L.AdditiveAttention()`,
    and Vaswani-style multi-head attention with `L.MultiHeadAttention`. By passing
    the `return_attention_scores=True` argument into the call of any of these layers,
    you can also collect the attention scores yielded in any one pass. This allows
    you to interpret how the particular layer attends to certain timesteps.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can build attention layers into recurrent models for text and into recurrent
    heads for multi-head multimodal models to improve how text is modeled in relationship
    to tabular data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can directly apply attention layers to embedded tabular data. This is a
    natural way to compute interactions between different features in the dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a significant body of work applying attention-based deep learning models
    to tabular data. We covered four research papers in this chapter exemplifying
    work in the area.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: TabTransformer (Huang et al. 2020) embeds categorical features and applies a
    transformer block, which consists of a multi-head attention layer followed by
    a feed-forward layer with residual connections and layer normalization after each,
    several times. The derived features are concatenated with layer-normalized continuous
    features and processed with a standard MLP.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: TabNet (Arik and Pfister 2019) uses a similar multi-step decision model; at
    each step, the model “selects” a certain subset of features using an attention-like
    mechanism and then processes the features with several feed-forward layers and
    residual connections. TabNet employs self-supervised pretraining; certain values
    in the input are randomly masked, and TabNet must reconstruct the masked values.
    After the pretraining task, the TabNet decoder is discarded and replaced with
    a decision-making module, which can be used for fine-tuning.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: SAINT (Somepalli et al. 2021) uses a multi-step architecture; each step consists
    of a standard transformer-like block followed by an intersample attention block.
    The intersample attention block computes relationships between samples, as opposed
    to computing relationships between features or timestamps of inputs. This allows
    the model to explicitly reason about information relative to other samples in
    its batch and in turn is informative from an explainability perspective.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The ARM-Net model (Cai et al. 2021) does not use a transformer-like architecture,
    but rather uses attention mechanisms to control the behavior of novel exponential
    neurons, which allow for very direct learning of explicit interactions between
    features.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The next chapter will explore work in tree-based deep learning models, the other
    significant body of modern research on deep learning for tabular data.
  prefs: []
  type: TYPE_NORMAL
