- en: 6. Applying Attention to Tabular Data
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*A wealth of information creates a poverty of attention.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Herbert A. Simon, Political Scientist, Economist, and Early AI Pioneer
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Compared with the feed-forward, convolutional, and recurrent mechanisms discussed
    in Chapters [3](525591_1_En_3_Chapter.xhtml), [4](525591_1_En_4_Chapter.xhtml),
    and [5](525591_1_En_5_Chapter.xhtml), the attention mechanism has been popular
    in deep learning for a very short amount of time. Despite the brevity of its existence,
    it has become the basis of modern natural language processing models. Moreover,
    it is a very natural mechanism to compute relationships not just between tokens
    in a language sequence but also between features in a tabular dataset – which
    is why a significant body of recent work on deep learning tabular data methods
    centers on attention.
  prefs: []
  type: TYPE_NORMAL
- en: We will begin by contextualizing the attention mechanism in the original context
    it was introduced and developed in – natural language. Then, we will implement
    attention in Keras, both “from scratch” and using natively available layers, and
    demonstrate its behavior on synthetic datasets for the purpose of understanding.
    Afterward, we will show how attention can be integrated with recurrent language
    and multimodal models explored in Chapter [5](525591_1_En_5_Chapter.xhtml) and
    be applied directly to tabular datasets. Lastly, we will cover the design behind
    four tabular deep learning models in recent research – TabTransformer, TabNet,
    SAINT, and ARM-Net.
  prefs: []
  type: TYPE_NORMAL
- en: Attention Mechanism Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will track the meteoric rise of the attention mechanism
    from its role as a sequence aligner situated within a recurrent model to becoming
    the basis of near all modern language models. Along the way, we’ll gain valuable
    theoretical knowledge about how the attention mechanism operates and why it is
    a natural idea to apply to tabular data.
  prefs: []
  type: TYPE_NORMAL
- en: The Attention Mechanism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The attention mechanism as is now popular in deep learning was introduced by
    Bahdanau, Cho, and Bengio in 2015^([1](#Fn1)) to address the problem of dependency
    forgetting in large language translation tasks. Consider a translation problem
    of some sequence *x* to *y*: {*x*[0], *x*[1], ..., *x*[*n* − 1]} → {*y*[0], *y*[1],
    ..., *y*[*n* − 1]} (Figure [6-1](#Fig1)). Say *y*[*n* − 1] depends heavily on
    *x*[0]; that is, the last output relies heavily on the first input. Because the
    hidden state is pushed through the cell at each timestep in a vanilla recurrent
    cell, the signal becomes lost and diluted. Long Short-Term Memory networks help
    to address this problem by adding an additional cell state channel, which allows
    signals to travel across longer sequences less impeded. But say *y*[0] depends
    heavily on *x*[*n* − 1]; that is, the first output relies heavily on the last
    input. (Such long-range dependencies are common in language.) We cannot “look
    ahead” because the recurrent mechanism proceeds sequentially along the sequence.
    Bidirectional models address this by reading both forward and backward.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of a text sequence with 5 inputs and 5 outputs depicts long-term
    dependencies. At each timestep, the R N N cell is pushed. The last output, y 4,
    relies on the first input, x 0.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-1
  prefs: []
  type: TYPE_NORMAL
- en: Examples of long-term dependencies in text sequences
  prefs: []
  type: TYPE_NORMAL
- en: 'However, it’s still read sequentially in either direction: what if some output
    token *y*[*k*] depends jointly on *x*[0] and *x*[*n* − 1] and some other output
    token *y*[*j*] depends jointly on *x*[1] and *x*[*n* − 2]? Will the signals from
    *x*[0] and *x*[*n* − 1] be able to “reach” the prediction of *y*[*k*] while also
    “carrying” the signals from *x*[1] and *x*[*n* − 2] to *y*[*j*]? What if we have
    a dual dependency where the decision for one timestep is dependent on the decision
    for another timestep, which is itself dependent on the original timestep (Figure
    [6-2](#Fig2))?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of a text sequence with 5 inputs and 5 outputs depicts convoluted
    dependencies. At each timestep, the R N N cell is pushed.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-2
  prefs: []
  type: TYPE_NORMAL
- en: Examples of even more convoluted dependencies in text sequences
  prefs: []
  type: TYPE_NORMAL
- en: We see that there is an underlying problem of long-range dependencies, which
    is not quite captured by recurrent models, even with their cell state and bidirectional
    upgrades. There are always uncovered dependency cases that cannot be reconciled
    with. Fundamentally, the problem of keeping track of dependencies is still being
    solved sequentially. This makes it difficult to keep track of the myriad of complex
    short and long intersequence dependencies that determine the meaning and significance
    of a sequence. Thus, we often observe dependency forgetting and relatively suboptimal
    performance on advanced sequence-to-sequence tasks in recurrent models.
  prefs: []
  type: TYPE_NORMAL
- en: The idea behind attention, in a nutshell, is to directly model dependency relationships
    between timesteps without the hinderance of a necessarily sequential processing
    directionality (Figure [6-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table of 5 rows and 6 columns depict the timesteps. All cells are shaded from
    light to dark.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-3
  prefs: []
  type: TYPE_NORMAL
- en: Visual representation of how an attention mechanism computes attention scores
    between timesteps of two sequences
  prefs: []
  type: TYPE_NORMAL
- en: 'Sequence-to-sequence modeling tasks prior to the introduction of the attention
    mechanism by Bahdanau et al. used an encoder-decoder structure, in which a recurrent
    stack encoder encodes the input sequence and a recurrent decoder “interprets”
    the encoding into the novel output sequence domain (Figure [6-4](#Fig4)). Bahdanau
    et al. apply attention to such an encoder-decoder recurrent structure as follows.
    The encoder outputs a hidden state *h*[*i*] at every timestep *i* (think `return_sequences=True`).
    We can generate a *context vector* for the output at some timestep *t* as a weighted
    sum of each of the hidden states (across all the timesteps):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {c}_t=\sum \limits_{i=0}^{n-1}{\alpha}_{t,i}{h}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: The weight *α*[*t*, *i*] is the *alignment score*. This score is learned by
    another feed-forward neural network with a single hidden layer and represents
    how important each hidden state is to predicting the output at that timestep.
    Rephrased, the alignment score measures how much the input at time *i* represented
    by the encoder hidden state *h*[*i*] “matches” or “is relevant to” the output
    at time *t*, *y*[*t*], represented by the decoder hidden state *s*[*t*]. The alignment-score-computing
    network takes in the current decoder hidden state timestep *s*[*t*] concatenated
    with the current encoder hidden state timestep *h*[*i*] to compute the score.
    This generates a grid-like set of scores (like in Figure [6-3](#Fig3)), in which
    we obtain a dependency score for every combination of input and output timesteps.
    The context vector, which is jointly informed by all relevant parts of the hidden
    state sequence, is then passed into the decoder at the appropriate timestep to
    make a prediction.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 attention matrices depict a French timestep and English translation. Both
    matrices have 14 columns and 14 rows.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-5
  prefs: []
  type: TYPE_NORMAL
- en: Attention matrices between a French timestep and the English translation. Note
    the correspondence “alignment” between relevant words – hence “learning alignment.”
    For instance, in French “zone économique europe énne” is aligned with “European
    Economic Area” in a nondirect way. From Bahdanau et al.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the encoder-decoder structure depicts the mechanism of aligning
    relevant timesteps with a hidden state.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-4
  prefs: []
  type: TYPE_NORMAL
- en: Demonstration of how an attention mechanism can be used to align relevant timesteps
    with hidden states of the bidirectional recurrent layer. From Bahdanau et al.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, there are alternative modes of deriving alignment scores. Dot product
    attention (introduced by Luong et al. in 2015) calculates the score simply as
    the dot product between the decoder hidden state *s*[*t*] and the encoder hidden
    state *h*[*i*]: ![$$ \textrm{score}\left({s}_t,{h}_i\right)={s}_t^T{h}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq1.png).
    This removes the need to learn alignment scores with another feed-forward network
    but requires the encoder and decoder hidden states to be already “calibrated”
    in relation to each other such that the dot product makes “sense.” Dot product
    attention has the same theoretical complexity as additive attention, but the former
    is faster in practice due to matrix multiplication execution optimization and
    is more commonly used. The scaled dot product (introduced by Vaswani et al. in
    2017) adds a scaling factor: ![$$ \textrm{score}\left({s}_t,{h}_i\right)=\left({s}_t^T{h}_i\right)/\sqrt{n}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq2.png), where
    *n* is the length of the hidden state. This scaling is a technical trick that
    allows for smaller gradients to pass through the softmax function, which is applied
    to the score set after calculation.'
  prefs: []
  type: TYPE_NORMAL
- en: The Google Neural Machine Translation (GNMT) paper, published in 2016 by Wu
    et al.,^([2](#Fn2)) uses a recurrent encoder-decoder architecture with Bahdanau-style
    attention to perform translation (Figure [6-6](#Fig6)). The encoder and decoder
    architectures are composed of eight LSTMs each to “capture subtle irregularities
    in the source and target languages.”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the Google Neural Machine Translation structure that includes
    an encoder-decoder architecture. The encoder and decoder have 8 L S T M layers
    each.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-6
  prefs: []
  type: TYPE_NORMAL
- en: The GNMT system. From Wu et al.
  prefs: []
  type: TYPE_NORMAL
- en: Wu et al. made some modifications to the LSTM layers. To encourage greater gradient
    flow, GNMT uses residual LSTMs rather than conventional stacked LSTMs (Figure
    [6-7](#Fig7)). Residual LSTMs add the original input at some timestep to the corresponding
    hidden state output, such that the hidden state models the difference between
    the input and the desired output rather than the output itself. (This can be implemented
    in Keras by applying `keras.layers.Add` to the original input and the hidden state
    sequence output.)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 illustrations depict the structures of conventional stacked L S T M and residual
    L S T M. The structures include input, hidden state, and output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-7
  prefs: []
  type: TYPE_NORMAL
- en: A standard LSTM (left) and an LSTM with residual connections (right). From Wu
    et al.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, Wu et al. used bidirectional LSTMs for the first layer of the encoder
    to maximize the context given to the later layers (Figure [6-8](#Fig8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the structure of a bidirectional L S T M layer. The
    structure includes input, a bidirectional bottom layer, concat, L S T M, and output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-8
  prefs: []
  type: TYPE_NORMAL
- en: A bidirectional LSTM layer. From Wu et al.
  prefs: []
  type: TYPE_NORMAL
- en: The Transformer Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In 2017 the infamously titled “Attention Is All You Need” paper by Vaswani et
    al.^([3](#Fn3)) introduced the transformer architecture, which dominates work
    in sequence-to-sequence problems today. While the attention mechanism developed
    as a method to improve dependency modeling in recurrent models, the transformer
    model shows that one can use only attention mechanisms to model language, without
    any usage of recurrent layers. By repeatedly stacking a novel and more powerful
    spin on attention – multi-head attention – the transformer architecture more freely
    models cross-text relationships and content.
  prefs: []
  type: TYPE_NORMAL
- en: 'Rather than accepting a decoder hidden state and an encoder hidden state Bahdanau-style,
    the transformer interprets the attention mechanism as a query-key-value “lookup”:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{Attention}\left(Q,K,V\right)=\textrm{softmax}\left(\frac{Q{K}^T}{\surd
    n}\right)V $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Think of the key-value pair as elements stored in an abstract database: if
    the query “matches” with the key, it “unlocks” the desired key for later usage.
    Of course, this is taking place in continuous space rather than a formal, rigidly
    segmented database. The query and key interact with each other to determine which
    areas of the value *V* to attend to. For some index *i* in each vector, the attention
    score is maximized by the product of the *i*th element of the query and the *i*th
    element of the key. This correspondingly controls for how important (how attended
    to) the *i*th element of the value is. The interaction between the query and the
    key is a scaled version of Luong-style dot product attention.'
  prefs: []
  type: TYPE_NORMAL
- en: Attention can be reappropriated as *self-attention* by deriving the query, key,
    and value from the same vector. Self-attention is a method to compute correlations
    or dependencies between any token in a sequence and other tokens in the same sequence,
    rather than between tokens in different sequences (like an input and target language
    for translation tasks). Self-attention is a crucial mechanism in the transformer
    architecture introduced by Vaswani et al., all successive transformer models,
    and attention-based deep learning approaches to tabular data.
  prefs: []
  type: TYPE_NORMAL
- en: To allow for multiple different areas and modes of attention, the multi-head
    attention mechanism allows for multiple different “versions” of the query-key-vector
    set to be learned via fully connected layers; each “version” is passed through
    a scaled dot product attention mechanism, concatenated, and “compressed” by a
    linear layer into an output (Figure [6-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the layers of scaled dot product attention and multi-head
    attention mechanisms with query-key-value elements.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-9
  prefs: []
  type: TYPE_NORMAL
- en: Scaled dot product attention (left) vs. multi-head attention (right). From Vaswani
    et al.
  prefs: []
  type: TYPE_NORMAL
- en: It is quite impressive to observe that the basis of the transformer model really
    is “just,” if we accept a bit of reductionism for cognitive clarity, a complex
    series of fully connected layers arranged in intricate, self-interactive ways.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Although we may refer to the query, key, and value as “vectors,” in practice
    the vectors are bundled into matrices and computed together. For clarity of understanding,
    you can think of the operations as happening on vectors, though.
  prefs: []
  type: TYPE_NORMAL
- en: 'The attention mechanism here is a generic structure for computing an interaction
    between three inputs and can be used in different ways. The transformer architecture
    uses multi-head attention three different ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Encoder-decoder attention*: Queries are derived from the previous decoder
    layer. The keys and values are derived from the encoder output. The decoder therefore
    attends to relevant positions in the encoder sequence by manipulating the query.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Encoder self-attention*: Keys, values, and queries all come from the output
    of the previous layer in the encoder; each position in the encoder has “access”
    to all positions in the previous layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Decoder self-attention*: Keys, values, and queries all come from all previous
    positions of the decoder.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now, we can understand the complete transformer architecture proposed by Vaswani
    et al. (Figure [6-10](#Fig10)). We begin by adding the positional encoding vector
    to the input encoding, which is calculated as follows for the timestep pos given
    the model’s embedding dimensionality *d*[model] at the *i*th element in the positional
    encoding vector:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {PE}_{\left( pos,i\right)}=\left\{\begin{array}{c}\sin \left(\frac{pos}{10,{000}^{\frac{2i}{d_{\textrm{model}}}}}\right),\kern0.5em
    \operatorname{mod}\left(i,2\right)=0\\ {}\cos \left(\frac{pos}{10,{000}^{\frac{2i}{d_{\textrm{model}}}}}\right),\kern0.5em
    \operatorname{mod}\left(i,2\right)=1\end{array}\right. $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: This input sequence is then passed through a series of *N* transformer encoder
    blocks. Each block is comprised of a multi-head self-attention mechanism followed
    by a feed-forward layer set with residual connections and layer normalization
    following each. Layer normalization normalizes all the values in the same layer
    (as opposed to batch normalization, which normalizes all the values for a particular
    node across all samples in the batch).
  prefs: []
  type: TYPE_NORMAL
- en: In the decoding component of the model, the current output sequence (beginning
    with the start token) is passed into the transformer decoder block. The transformer
    decoder block passes the current output sequence into a masked multi-head self-attention
    mechanism. The masking here prevents past timesteps to attend to future timesteps
    by zeroing out the relevant attention timesteps. Another multi-head attention
    mechanism operates both on the encoder outputs and the output of the masked multi-head
    attention mechanism (thus performing cross-attention rather than self-attention).
    The result is processed with feed-forward layers. This decoder block is repeated
    *N* times to produce an output. The decoder is autoregressive, meaning that the
    output is then concatenated to the output sequence as the input for the next step.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the working of the transformer architecture. It includes
    input embedding, output embedding, a series of N transformer encoder blocks, linear,
    and softmax layers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-10
  prefs: []
  type: TYPE_NORMAL
- en: The complete transformer architecture. From Vaswani et al.
  prefs: []
  type: TYPE_NORMAL
- en: The transformer architecture surpassed the performance of existing dominant
    models at a fraction of the training cost, which generally used recurrent, convolutional,
    and “primitive” attention-based designs on a variety of tasks, including language
    translation, part-of-speech tagging, and other sequence-to-sequence problems (Table
    [6-1](#Tab1)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-1
  prefs: []
  type: TYPE_NORMAL
- en: Performance of the transformer model on a German-English and French-English
    translation dataset. Lower is better for the BLEU (Bilingual Evaluation Understudy)
    metric. From Vaswani et al.
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figa_HTML.gif)A table
    of 10 rows and 3 columns. Columns 2 and 3 are each subdivided into 2 sub-columns
    titled E N-D E and E N-F R. |'
  prefs: []
  type: TYPE_TB
- en: BERT and Pretraining Language Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The next major development in natural language modeling was the BERT model,
    introduced by Jacob Devlin et al. from Google in the 2019 paper “BERT: Pre-training
    of Deep Bidirectional Transformers for Language Understanding.”^([4](#Fn4)) The
    authors use a transformer-like architecture for their base BERT model, with 12
    layers, a hidden size of 768, and 12 attention heads totaling 110 million parameters.
    BERT-Large has double the number of layers, a hidden size of 1024, and 16 attention
    heads totaling 340 million parameters.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It is worth noting that the BERT architecture uses the GELU (Gaussian Error
    Linear Unit) activation rather than the standard ReLU activation. Most modern
    language transformers, including some attention-based deep tabular models we will
    cover later in this chapter, use GELU. For some input *x*, GELU is defined as
    *x* multiplied by the probability that some value drawn from a unit normal distribution
    is larger than *x*^([5](#Fn5)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \textrm{GELU}(x)= xP\left(X\le x\right),X\sim N\left(0,1\right)=0.5x\left(1+\frac{2}{\sqrt{\pi
    }}{\int}_0^{\frac{x}{\sqrt{2}}}{e}^{-{t}^2} dt\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ \approx 0.5x\left(1+\tanh \left(\sqrt{\frac{2}{\pi }}\left(x+0.44715{x}^3\right)\right)\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: In practice, it is a rounded version of ReLU (Figure [6-11](#Fig11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph depicts the G E L U activation. An exponentially increasing line
    begins at (negative 5, 0.0), and goes through (negative 0.5, negative 0.5), to
    (3, 3.0) approximately.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-11
  prefs: []
  type: TYPE_NORMAL
- en: The GELU activation function
  prefs: []
  type: TYPE_NORMAL
- en: In this sense, it is conceptually similar to the swish activation,^([6](#Fn6))
    which is defined as *x* · *σ*(*x*) and also possesses a “dip” slightly left of
    *x* = 0 on a ReLU “backbone” (Figure [6-12](#Fig12)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig12_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A line graph depicts G E L U and swish activations. The lines for G E L U and
    swish follow exponentially increasing trends. All values are estimated. G E L
    U, (negative 5, 0.0), (negative 0.5, 0.1), (3, 3.0). Swish, (negative 5, 0.0),
    (negative 1, negative 0.3), (3, 2.9).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-12
  prefs: []
  type: TYPE_NORMAL
- en: The GELU activation plotted against the similar swish activation
  prefs: []
  type: TYPE_NORMAL
- en: The key contribution of the BERT paper is in introducing pretraining schemes
    and demonstrating the power of transfer learning in a natural language context
    (Figure [6-13](#Fig13)). While the architectures used for pretraining and fine-tuning
    toward the actual desired task are very similar or even identical (after adapting
    I/O sizes), pretraining improves the efficiency and power of the model during
    fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig13_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration depicts the pre-training and fine-tuning schemes of B E R T.
    Pre-tuning includes unlabeled masked sentences. Fine-tuning includes 3 layers
    of questions and paragraphs.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-13
  prefs: []
  type: TYPE_NORMAL
- en: Pretraining with BERT followed by downstream fine-tuning tasks. From Devlin
    et al.
  prefs: []
  type: TYPE_NORMAL
- en: 'Any supervised task must have inputs and labels; it turns out that – in the
    paradigm of self-supervised learning – we can derive our labels from our inputs
    by corrupting the input and training the model to undo or correct for said corruption,
    in the process learning important information about the structure of the input
    in a label-cheap (free), unsupervised fashion. Devlin et al. introduce two such
    pretraining tasks: masked language modeling (MLM) and next sentence prediction
    (NSP).'
  prefs: []
  type: TYPE_NORMAL
- en: In masked language modeling, a certain percentage of the input – 15% in the
    paper – is masked with a `[MASK]` token, and the model is trained to predict the
    masked tokens. The objective of such a pretraining task is to encourage the development
    of deep bidirectional representations since the model must parse the entire structure
    on both sides of the masked tokens to have any chance at accurately inferring
    the true token.
  prefs: []
  type: TYPE_NORMAL
- en: In next sentence prediction, the model is presented with two sentences and trained
    to predict whether the second follows from the first or not in the complete text
    passage that the sentences were derived from. This forces the model to not only
    develop cross-token semantic understandings but also learn about semantic continuity
    across sentences.
  prefs: []
  type: TYPE_NORMAL
- en: Devlin et al. find that both BERT and BERT-Large outperform competitors on the
    GLUE (General Language Understanding Evaluation) benchmark tasks (Table [6-2](#Tab2)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Performance of BERT on various datasets in the GLUE collection. MNLI: Multi-genre
    Natural Language Inference. QQP: Quora Question Pairs. QNLI: Question Natural
    Language Inference. SST-2: Stanford Sentiment Treebank. CoLA: Corpus of Linguistic
    Acceptability. STS-B: Semantic Textual Similarity Benchmark. MRPC: Microsoft Research
    Paraphrase Corpus. RTE: Recognizing Textual Entailment'
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figb_HTML.gif)A table
    of 10 columns and 5 rows. |'
  prefs: []
  type: TYPE_TB
- en: 'More or less all modern language models are transformers or take strong inspiration
    from transformer architectures; it is not within the scope of the book to further
    discuss them, but some important ones are curated in the following for the interested
    reader:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Improving Language Understanding by Generative Pre-Training,” Alec Radford
    et al. 2018*: Introduces the GPT architecture and proposes a self-supervised pretraining
    framework similar to that of BERT.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Improving Language Understanding by Generative Pre-Training,” Alec Radford
    et al. 2019*: Introduces the GPT-2 architecture and demonstrates zero-shot task
    transfer properties.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Language Models Are Few-Shot Learners,” Tom B. Brown et al. 2020*: Introduces
    the GPT-3 architecture; engages in intense discussion of zero- and few-shot model
    properties; mentions societal impact, fairness, and bias implications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Zero-Shot Text to Image Generation,” Aditya Ramesh et al. 2021*: Introduces
    the DALL-E architecture, a modified version of GPT-3 that can be used to generate
    images form text descriptions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“LaMDA: Language Models for Dialog Applications,” Romal Thoppilan et al. 2022*:
    Introduces the LaMDA model family for conversational dialog. LaMDA has been a
    recent subject of extreme controversy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Taking a Step Back
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'However, we should not neglect that transformers are not the be-all and end-all
    of language modeling, even though it most certainly seems that way given the present
    state of research in natural language processing. Stephen Merity’s 2019 independent
    research paper “Single Headed Attention RNN: Stop Thinking With Your Head”^([7](#Fn7))
    is simultaneously an empirical, philosophical, technical, and deeply comedic skepticism
    of the modern transformers craze. Only Merity’s writing can speak for itself as
    well as it does; the paper’s full abstract is reprinted in the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The leading approaches in language modeling are all obsessed with TV shows
    of my youth – namely Transformers and Sesame Street. Transformers this, Transformers
    that, and over here a bonfire worth of GPU-TPU-neuromorphic wafer scale silicon.
    We opt for the lazy path of old and proven techniques with a fancy crypto inspired
    acronym: the Single Headed Attention RNN (SHA-RNN). The author’s lone goal is
    to show that the entire field might have evolved a different direction if we had
    instead been obsessed with a slightly different acronym and slightly different
    result. We take a previously strong language model based only on boring LSTMs
    and get it to within a stone’s throw of a stone’s throw of state-of-the-art byte
    level language model results on enwik8\. This work has undergone no intensive
    hyperparameter optimization and lived entirely on a commodity desktop machine
    that made the author’s small studio apartment far too warm in the midst of a San
    Franciscan summer. The final results are achievable in plus or minus 24 hours
    on a single GPU as the author is impatient. The attention mechanism is also readily
    extended to large contexts with minimal computation. Take that Sesame Street.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Driven by the success of the transformer model introduced by Vaswani et al.
    in 2017, recurrent models have been condemned to a slow death in the research
    community. Merity argues that modern large language models – which seem to be
    an arms race to scale up models orders of magnitude larger than the previous state-of-the-art
    – lack the power of reproducibility and therefore sustainability and potentially
    efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: To demonstrate the power of small architectures, Merity proposes the Single
    Headed Attention RNN (SHA-RNN) architecture. SHA-RNN (Figure [6-14](#Fig14)) applies
    an LSTM, followed by a single-headed dot product self-attention mechanism (Figure
    [6-15](#Fig15)) and a “Boom” layer, both with residual connections. A dense layer
    is applied only to the query key, and all other operations are all unparametrized.
    The “Boom” layer maps a vector from *ℝ*^(1024) to *ℝ*^(4096) and then back down
    to *ℝ*^(1024) (boom!). The first mapping is performed with a dense layer, whereas
    the second is performed parameter-free by summing up adjacent blocks of four elements
    in a 1D-pooling-style gesture. The SHA-RNN model can be applied to an embedded
    input as many times as desired and passed through a softmax layer in the last
    iteration. This architecture’s intentional parametrically and computationally
    conservative design makes it feasible to train relatively quickly on relatively
    unadvanced computational resources. The author, for instance, writes that he trains
    the model on a single NVIDIA Titan V GPU.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig15_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the attention mechanism in S H A - R N N. It includes query,
    key, and value elements that derive a single output.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-15
  prefs: []
  type: TYPE_NORMAL
- en: The attention mechanism used in the SHA-RNN block. From Merity
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig14_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the architecture of single Headed Attention R N N. It includes
    L S T M, an attention mechanism, and a boom layer.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-14
  prefs: []
  type: TYPE_NORMAL
- en: The SHA-RNN block. From Merity
  prefs: []
  type: TYPE_NORMAL
- en: We see that SHA-RNN outperforms other similarly sized and larger models (Table
    [6-3](#Tab3)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-3
  prefs: []
  type: TYPE_NORMAL
- en: Performance (bits per character) of different-sized SHA-RNN/LSTM models compared
    with other models on the enwiki dataset. From Merity
  prefs: []
  type: TYPE_NORMAL
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figc_HTML.gif)A table
    of 5 columns and 13 rows depicts the performance of different models. The column
    headers are model, heads, valid, test, and params. |'
  prefs: []
  type: TYPE_TB
- en: 'The paper argues not for the *uselessness* of transformer models, but rather
    encourages greater healthy skepticism and valuing of efficiency in modern deep
    learning research culture:'
  prefs: []
  type: TYPE_NORMAL
- en: Perhaps we were too quick to throw away the past era of models simply due to
    a new flurry of progress. Perhaps we’re too committed to our existing stepping
    stones to backtrack and instead find ourselves locked to a given path.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the next sections, we will focus on implementing attention-based approaches
    to language, multimodal, and tabular contexts.
  prefs: []
  type: TYPE_NORMAL
- en: Working with Attention
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here, we’ll explore different ways to use attention in Keras: a simple custom
    model of Bahdanau attention, different forms of native Keras attention, and using
    attention in sequence-to-sequence problems.'
  prefs: []
  type: TYPE_NORMAL
- en: Simple Custom Bahdanau Attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We’ll begin by implementing a custom Bahdanau-style attention layer with Keras.
    The exact code here is adapted with modifications from Jason Brownlee. This layer
    accepts a set of hidden outputs (the output of a recurrent layer with `return_sequences=True`)
    and computes a form of self-attention. Because we are not applying this in an
    encoder-decoder context, it resembles Bahdanau-style self-attention for a single
    decoder timestep. It is one of the several dozen prominent flavors of attention
    that can be used in a variety of contexts. This particular flavor abides by the
    following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig16_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 3 tables depict the dot product multiplication, x, dot, W = x dot W. Input x
    has 4 rows and 5 columns. Weight W has 4 rows and 2 columns. x dot W has 4 rows
    of x and 2 columns of W.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-16
  prefs: []
  type: TYPE_NORMAL
- en: Dot product between the input matrix and the weight matrix
  prefs: []
  type: TYPE_NORMAL
- en: Take in an input *x* with shape (*s*, *h*) for some sequence length *s* and
    hidden state length *h*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Perform dot product multiplication between *x* and *W*, a learned weight matrix
    with shape (*h*, 1). The result is a matrix/vector of shape (*s*, 1) (Figure [6-16](#Fig16)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig17_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 3 tables depict the addition of bias to dot product, x dot W, +, b = x dot W
    + b. x dot W has 4 rows and 2 columns. b has 4 rows and 2 columns. x dot W + b
    has 4 rows and 2 columns.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-17
  prefs: []
  type: TYPE_NORMAL
- en: Adding the bias to the dot product between the input matrix and the weight matrix
  prefs: []
  type: TYPE_NORMAL
- en: Add a bias *b* of shape (*s*, 1) (Figure [6-17](#Fig17)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig18_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 4 tables. z has 4 rows and 2 columns. z vector has 4 rows and 1 column. The
    sigma of z vector has 4 rows and 1 column. Alpha has 4 rows and 2 columns. 3 arrows
    flow between the 4 tables.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-18
  prefs: []
  type: TYPE_NORMAL
- en: Let *z* =  *tanh* (*x* · *W* + *b*). Dimension squeezing followed by the application
    of softmax (represented as *σ*), followed by a dimension expansion. We obtain
    a matrix of attention scores as a result
  prefs: []
  type: TYPE_NORMAL
- en: Apply the hyperbolic tangent activation to the result. This result represents
    the result of processing by a neural network with one hidden layer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Squeeze the second dimension of the matrix such that it becomes a vector of
    length *s*.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Apply softmax to the vector such that the elements sum to 1\. This *s*-length
    vector stores the scores corresponding to each of the hidden states at every timestep.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Expand the squeezed dimension such that the *s*-length vector becomes a matrix
    of shape (*s*, 1). This matrix stores the alpha values, or the scores (Figure
    [6-18](#Fig18)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig19_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 3 tables depict x times alpha = x prime. x has 4 rows and 5 columns. Alpha has
    4 rows and 2 columns. x prime has 4 rows and 5 columns.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-19
  prefs: []
  type: TYPE_NORMAL
- en: Multiplying the inputs by the attention scores to produce the attended scores
  prefs: []
  type: TYPE_NORMAL
- en: Multiply the score at each timestep *s*[*t*] by the corresponding hidden state
    *x*[*t*]. The result is a hidden state sequence weighted by the derived scores
    (Figure [6-19](#Fig19)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig20_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 tables. Table 1 titled x prime has 4 rows and 5 columns. Table 2 has 1 row
    and 4 columns. 4 arrows from table 1, columns 2 to 4 connect the 4 columns of
    table 2, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-20
  prefs: []
  type: TYPE_NORMAL
- en: Summing to produce the output aggregate attended features
  prefs: []
  type: TYPE_NORMAL
- en: Sum across the timesteps such that the result is a single “weighted sum hidden
    state.” This “aggregate hidden state” is informed appropriately by the hidden
    states at all timesteps from the sequence (Figure [6-20](#Fig20)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To build a custom layer (Listing [6-1](#PC1)), we inherit from `keras.layers.Layer`.
    To provide shape information relevant for constructing a graph before training,
    we provide a `build` function that allows Keras to “lazily” build necessary parameters
    through `.add_weight()`. When we apply the layer with `call()`, we simply return
    the weighted sum of the input. The weights are the alpha values/scores, computed
    in `get_alpha`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s construct a synthetic task: given a ten-element sequence of length-8
    normally distributed random vectors, predict the sum of the seventh and ninth
    vectors (Listing [6-2](#PC2)). None of the other timesteps are relevant to predicting
    the label.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: One architecture used to model this synthetic problem is a double-GRU stack
    followed by the custom attention mechanism (Listing [6-3](#PC3), Figure [6-21](#Fig21)).
    The output is a vector (recall the weighted sum of hidden states); we will simply
    process it with additional feed-forward layers into an output. Note than an alternative
    is to use `L.RepeatVector` to construct a series of these vectors and apply additional
    recurrent layers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig21_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A flowchart depicts the structure of a synthetic dataset. The flow is as follows:
    input, g r u, g r u 1, attention, dense, dense 1, and dense 2 elements.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-21
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of the architecture created in Listing [6-3](#PC3)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The model obtains very good training and validation performance after several
    hundred epochs of training. We can construct a submodel to derive the output of
    the second recurrent layer and then pass this output into the custom attention
    layer’s `.get_alpha()` method to derive the weightage/score for the hidden state
    at each timestep (Listing [6-4](#PC4), Figure [6-22](#Fig22)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig22_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A bar chart of alpha values versus time step. The data are as follows: (0,
    0.045), (1, 0.045), (2, 0.045), (3, 0.045), (4, 0.045), (5, 0.045), (6, 0.33),
    (7, 0.045), (8, 0.33), and (9, 0.045).'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-22
  prefs: []
  type: TYPE_NORMAL
- en: Attention scores averaged across the entire input set
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We see very clearly that the seventh and ninth elements have significantly higher
    weightage than their counterparts in the input sequence. The attention mechanism
    allows the network to conveniently extract important components of the timestep
    without the burden of sequential navigation.
  prefs: []
  type: TYPE_NORMAL
- en: Native Keras Attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Keras offers two “base” implementations of attention: Luong-style dot product
    attention (the most commonly used form) and additive attention (Bahdanau-style,
    less often used).'
  prefs: []
  type: TYPE_NORMAL
- en: '`keras.layers.Attention`: Performs Luong-style dot product attention. Parameters:
    `use_scale=True` creates an additional trainable scalar variable to scale the
    attention scores. This enables the attention scores to reach larger ranges after
    being passed through softmax. `score_mode` must be set to `‘dot’` (default) or
    `‘concat’`. The former uses the dot product between the query and key vectors;
    the latter uses the hyperbolic tangent of the concatenation of the query and key
    vectors (this resembles Bahdanau-style attention, but without the learned alpha
    values). `dropout` must be set to a float between 0 (default) and 1; this indicates
    the proportion of attention scores to drop. Adding dropout forces the attention
    mechanism to develop more robust forms of broad attention, which are not overly
    dependent on specific elements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`keras.layers.AdditiveAttention`: Performs Bahdanau-style additive attention.
    The query and key are added together, passed through a hyperbolic tangent, and
    summed across the last axis. The Keras implementation does not use trainable weights
    and biases to learn the alpha values. Parameters: `use_scale=True` creates an
    additional trainable scalar variable to scale the attention scores. `dropout`
    must be set to a float between 0 (default) and 1 and indicates the proportion
    of attention scores to drop.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To demonstrate usage, let’s create a more complex synthetic task. Rather than
    compositing the output as a sum of individual selected timesteps of the input,
    we derive it as a weighted sum of all timesteps in the input (Listing [6-5](#PC5)).
    The weight for some timestep *t* will be calculated as 4 · *σ*(*x* − 5) · *σ*(5 − *x*),
    where *σ* is the sigmoid function (Figure [6-23](#Fig23)). This is a shifted and
    scaled version of the derivative of the sigmoid function, which is given by *σ*(*x*) · *σ*(−*x*).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig23_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A bar chart depicts the weights of the timesteps. The data are as follows:
    (0, 0.02), (1, 0.08), (2, 0.23), (3, 0.5), (4, 0.9), (5, 0.9), (6, 0.5), (7, 0.23),
    (8, 0.08), and (9, 0.02).'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-23
  prefs: []
  type: TYPE_NORMAL
- en: Weightages determined by 4 · *σ*(*x* − 5) · *σ*(5 − *x*) in the shape of a quasi-normal
    distribution
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Let us construct the model architecture (Figure [6-24](#Fig24)). After extracting
    relevant features with a bidirectional LSTM, we will perform self-attention with
    scaled Luong-style dot product attention by passing in the output of the first
    LSTM as both the query and the key in a list (Listing [6-6](#PC6)). If the value
    is not provided, it is assumed that the key and the value are the same. In this
    case, the query, key, and value are all the same. The output of the attention
    mechanism is passed through another LSTM.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig24_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow chart of the structure of a synthetic dataset using l s t m. It flows
    as input 1, bidirectional L S T M, attention, l s t m 1, dense, dense 1, and dense
    2 elements.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-24
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of the architecture created in Listing [6-6](#PC6)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: When calling an attention layer, we can collect the attention scores by passing
    `return_attention_scores=True` in addition to the inputs. We can rebuild parts
    of the model into a submodel to collect the outputted attention scores (Listing
    [6-7](#PC7)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: A more convenient way to collect the attention scores if you don’t have philosophical
    issues with leaving “open variables” is to replace `attended = L.Attention(...)`
    with `attended, scores = L.Attention(return_attention_scores=True, ...)` and construct
    the submodel as `submodel = keras.models.Model(inputs=inp, outputs=scores)` directly.
  prefs: []
  type: TYPE_NORMAL
- en: The attention scores have shape (number of samples, length of query sequence,
    length of value/key sequence). The resulting matrix visualizes which timesteps
    self-attend to other timesteps (Listing [6-8](#PC8), Figure [6-25](#Fig25)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig25_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap depicts a self-attention matrix for a bidirectional dot product with
    10 columns and 10 rows. The cells are colored from light to dark. The color gradient
    is diagonal from top left to right bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-25
  prefs: []
  type: TYPE_NORMAL
- en: Self-attention matrix from a bidirectional model with dot product attention
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: As we expect, the general direction of the self-attention proceeds along the
    identity diagonal; that is, a timestep *t* generally attends to timesteps near
    *t*. The largest attention values by magnitude (indicated visually by brightness/whiteness)
    appear at *t* ∈ [4, 5] and decay as *t* increases or decreases, which matches
    the weight of each timestep on the output vector.
  prefs: []
  type: TYPE_NORMAL
- en: We can change to additive attention by changing `L.Attention` in Listing [6-6](#PC6)
    to `L.AdditiveAttention`. The resulting self-attention matrix for such a model
    trained on this dataset looks as follows (Figure [6-26](#Fig26)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig26_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap depicts a self-attention matrix for bidirectional additive attention
    with 10 columns and 10 rows. The cells are colored from light to dark. The color
    gradient is vertical in the middle.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-26
  prefs: []
  type: TYPE_NORMAL
- en: Self-attention matrix from a bidirectional model with additive attention
  prefs: []
  type: TYPE_NORMAL
- en: Note that the resulting self-attention matrix derived from additive attention
    is significantly more vertical than that of Luong-style attention. The attention
    scores are generally independent of the query (the “*y*-axis”) and heavily dependent
    on the key (the “*x*-axis”).
  prefs: []
  type: TYPE_NORMAL
- en: We see that additive attention has learned attention representations, which
    are completely independent of the query value. The key alone is enough to determine
    how the mechanism attends to the value. Given the simplicity of this problem,
    such behavior is possible. Nevertheless, we note that the attention mechanism
    still attends to the middle timesteps of the key the highest, with decaying attention
    scores toward the beginning and ending timesteps. While additive attention and
    dot product attention obtain similarly near-perfect scores, their attention feature
    maps are quite different.
  prefs: []
  type: TYPE_NORMAL
- en: 'As another experiment, let’s remove the bidirectionality of the first encoder
    layer and observe the effect on the attention maps. The dot product attention
    feature map (Figure [6-27](#Fig27)) demonstrates “skew” toward later timesteps,
    as if wind was blowing southeast and pushing the magnitude of attention values
    in that direction. The highest attention score is no longer distributed equally
    in the [4, 5] × [4, 5] timestep grid, but rather squarely at (5, 5) – the later
    end of the peak weight timestep region. This makes sense: without bidirectionality,
    it is still possible for later timesteps to “look back” but not for earlier timesteps
    to “look forward.”'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig27_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap depicts a self-attention matrix for a unidirectional dot product with
    10 columns and 10 rows. The cells are colored from light to dark. The color gradient
    is diagonal from top left to right bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-27
  prefs: []
  type: TYPE_NORMAL
- en: Self-attention matrix from a unidirectional model with dot product attention
  prefs: []
  type: TYPE_NORMAL
- en: We observe a similar shifted phenomenon when removing bidirectionality from
    a model fitted with an additive attention mechanism (Figure [6-28](#Fig28)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig28_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A heatmap depicts a self-attention matrix for unidirectional additive attention
    with 10 columns and 10 rows. The cells are colored from light to dark. The color
    gradient is vertical in the middle.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-28
  prefs: []
  type: TYPE_NORMAL
- en: Self-attention matrix from a unidirectional model with additive attention
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s adapt our problem once again to experiment with multi-head attention:
    rather than weighting with a single-humped distribution, we will use a double-humped
    distribution formed by adding symmetrically shifted single-humped distributions.
    Let *σ*^′(*x*) = *σ*(*x*) · *σ*(−*x*); the weight at timestep *x* is given by
    *w*(*x*) = 4 · (*σ*^′(*x* − 2) + *σ*^′(*x* − 8)) (Listing [6-9](#PC9), Figure
    [6-29](#Fig29)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig29_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A bar chart of the weights of the timesteps. The following data are approximated.
    (0, 0.41), (1, 0.81), (2, 1.0), (3, 0.7), (4, 0.4), (5, 0.4), (6, 0.7), (7, 1.0),
    (8, 0.81), and (9, 0.41).
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-29
  prefs: []
  type: TYPE_NORMAL
- en: Weightages determined by 4 · (*σ*^′(*x* − 2) + *σ*^′(*x* − 8)) in the shape
    of a quasi-normal distribution
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: To use multi-head attention in Keras, specify the number of heads and the dimension
    of the inputted key (Listing [6-10](#PC10)). When calling the attention layer
    to link it as part of the graph, pass in the query and key as separate parameters
    rather than as elements in a bundled list (like with `L.AdditiveAttention` and
    `L.Attention`). `value_dim` is set to `key_dim` by default. Key dim is how many
    dimensions it is projected into by the dense layer. You can specify a key, too,
    if desired.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The derived scores in this case have shape (number of samples, number of heads,
    sequence length, sequence length). We can plot them (Listing [6-11](#PC11)) to
    interpret how the model attends to the sequences (Figure [6-30](#Fig30)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig30_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 4 heatmaps depict the attention scores of the multi-head attention model. Each
    matrix has 10 columns and 10 rows and the cells are in different colors.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-30
  prefs: []
  type: TYPE_NORMAL
- en: Each of the four attention scores for a sample on a multi-head attention model
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Attention in Sequence-to-Sequence Tasks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Lastly, we will also demonstrate the usage of the Keras attention mechanism
    in its original context of sequence-to-sequence problems, Bahdanau-style. Consider
    the following seq2seq problem, in which the *i*th timestep of the target sequence
    is the sum of the *i* + 4th, *i* + 5th, and *i* + 6th timesteps of the input sequence
    (Listing [6-12](#PC12)). (The original input sequence is a randomly generated
    sequence of vectors.)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: We will encode the input with two LSTM layers, the first with bidirectionality.
    The output of the encoder is passed into the decoder. We compute the result of
    attention between the decoder hidden states (the query) and the encoder output/hidden
    states (the key *and* value) to determine which elements of the encoder are relevant
    to attend to. The decoder output is concatenated with the attention mechanism
    output. For each timestep in the resulting sequence, we project this concatenated
    vector into an output with a fully connected layer using `L.TimeDistributed` (Listing
    [6-13](#PC13), Figure [6-31](#Fig31)). Time-distributed wrappers apply the same
    layer across multiple time slices, such that we can project the concatenation
    of the decoder output and the attended encodings into the output “vocabulary.”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig31_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart of the structure of a synthetic dataset using bidirectional l s
    t m. It flows as input 1, bidirectional l s t m, l s t m 1, l s t m 2, attention,
    concatenate, and time-distributed dense elements.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-31
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of the architecture created in Listing [6-13](#PC13)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: We can visualize the learned attention scores for some samples as follows (Listing
    [6-14](#PC14), Figure [6-32](#Fig32)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig32_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 4 heatmaps depict the attention scores of the multi-head attention model. Each
    matrix has 10 columns and 10 rows and the cells are in different colors. Each
    graph plots 2 strands of slanting lines.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-32
  prefs: []
  type: TYPE_NORMAL
- en: Four attention score matrices for a single sample, derived from different heads
    of the same attention layer
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Note that our model learns a pretty cool pattern indicative of the true derivation
    of the output sequence. At the first timestep of the query (representing the output
    sequence, the first row of the attention grid), the mechanism attends roughly
    to the region between the fourth and sixth timesteps of the key (representing
    the input sequence). At the second timestep, the attended region shifts over;
    as we proceed along the temporal dimension of the query, the attended region wraps
    around.
  prefs: []
  type: TYPE_NORMAL
- en: You can use this sort of design to solve sequence-to-sequence problems, as well
    as in creative ways to solve sequence-to-vector or multimodal sequence-and-tabular-to-*x*
    problems. For instance, you can build a multitask autoencoder design (see Chapter
    [8](525591_1_En_8_Chapter.xhtml)), which both uses a sequence-to-sequence backbone
    and has an additional output connecting from the encoder output and/or attended
    encoder output.
  prefs: []
  type: TYPE_NORMAL
- en: Improving Natural Language Models with Attention
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Attention was built for and continues to dominate language modeling. In Chapter
    [5](525591_1_En_5_Chapter.xhtml), we built and trained recurrent text models.
    We can, in some cases, improve these models by adding attention mechanisms. (Note
    that the success of applying attention directly to non-seq2seq text problems is
    somewhat limited and case-dependent.)
  prefs: []
  type: TYPE_NORMAL
- en: We will apply attention to a straightforward text-to-vector problem on the TripAdvisor
    Hotel Reviews dataset. This dataset contains hotel reviews collected from the
    review platform TripAdvisor with the associated 1–5 rating. The objective is to
    predict the rating given the review text (Listing [6-15](#PC15), Figure [6-33](#Fig33)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig33_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A table of 5 rows and 3 columns depict hotel reviews and ratings.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-33
  prefs: []
  type: TYPE_NORMAL
- en: Head of the TripAdvisor reviews dataset
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Let’s begin by creating a model with the custom attention mechanism implemented
    in the first subsection of the previous section (Listing [6-16](#PC16), Figure
    [6-34](#Fig34)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig34_HTML.png)'
  prefs: []
