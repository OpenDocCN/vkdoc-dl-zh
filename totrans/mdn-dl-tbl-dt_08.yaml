- en: Diagram for the architecture defined in Listing [6-18](#PC18)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: The attention masks can similarly be visualized (Figure [6-39](#Fig39)). We
    observe that the attention mechanism here is learning a lot of cross-sequence
    dependency/relationships. Particularly, note that adjectives and the nouns they
    refer to (e.g., “place,” “paradise,” “fabulous,” etc.) have high self-attention,
    whereas unrelated components have low self-attention scores. This self-attention
    matrix demonstrates a lot of verticality/horizontality, meaning that certain words
    have consistent semantic relevance across the entire sequence.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig39_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A large heatmap depicts a self-attention matrix with 64 rows and 64 columns.
    Each cell is shaded in different colors.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-39
  prefs: []
  type: TYPE_NORMAL
- en: Large self-attention matrix derived from an attention-based model
  prefs: []
  type: TYPE_NORMAL
- en: By improving recurrent language models, we can also improve the modeling capability
    of multimodal models. Improved text modeling not only allows us to better model
    the relationship between the text input and the output for multimodal problems
    but also allows us to better model the tabular input by interpreting it with improved
    characterization from the text input.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s return to the stock news and forecasting multimodal dataset discussed
    in Chapter [5](525591_1_En_5_Chapter.xhtml). We can modify the text reading component
    by adding a shared attention mechanism and training appropriately (Listing [6-19](#PC19),
    Figure [6-40](#Fig40)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig40_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flowchart depicts the structure of a synthetic dataset using a multi-head
    multimodal model. It includes 3 input layers, embedding, bidirectional l s t m,
    attention, l s t m 1, concatenate, dense, concatenate 1, dense 1, dense 2, dense
    3, stock, c o n v 1 d, g r u, and g r u 1 elements.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-40
  prefs: []
  type: TYPE_NORMAL
- en: Diagram of the architecture created in Listing [6-19](#PC19)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Training with attention also provides us strong interpretability into how the
    model is making its decision. When observing the attention feature maps, we observe
    that a small set of keywords are strongly relevant for prediction (Figures [6-41](#Fig41)
    to Figure [6-46](#Fig46)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig46_HTML.png)'
