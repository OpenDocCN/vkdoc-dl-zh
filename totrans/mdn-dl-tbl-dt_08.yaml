  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 使用多头注意力模型的合成数据集结构的流程图。它按以下顺序流动：输入 1、嵌入、双向 g r u、多头注意力、l s t m、l s t m 1、dense、dense
    1 和 dense 2 元素。
- en: Figure 6-38
  id: totrans-291
