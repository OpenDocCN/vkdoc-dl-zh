  id: totrans-530
  prefs: []
  type: TYPE_TB
  zh: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figl_HTML.jpg)一个包含5列和12行的表格。列标题是特征、S
    H A P、skater、X G B booster和TabNet。|'
- en: It should be noted, moreover, that TabNet shares many architectural and conceptual
    similarities with tree-based models. The set of sequence operations provides a
    decision tree–like decision scaffold and is capable of representing decision tree–style
    feature space separations (Figure [6-66](#Fig66)). The authors note that the attention-like
    mechanism allows for a softer, adaptive version of tree node separation criteria.
    Moreover, the sequential stacking nature of the TabNet model is conceptually similar
    to stacking and boosting in tree models, in which units learn with/from/around
    the previous unit’s output.
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还应注意的是，TabNet与基于树的模型在架构和概念上有很多相似之处。序列操作集提供了一种类似于决策树的决策框架，能够表示决策树风格的特征空间分离（图[6-66](#Fig66)）。作者指出，类似于注意力的机制允许实现更柔和、自适应的树节点分离标准。此外，TabNet模型序列堆叠的本质与树模型中的堆叠和提升在概念上是相似的，其中单元通过前一个单元的输出进行学习。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig66_HTML.png)'
  id: totrans-532
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig66_HTML.png)'
- en: An illustration of TabNet architecture represented as a decision tree&#x2013;like
    decision scaffold.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: TabNet架构作为类似于决策树的决策框架的表示图。
- en: Figure 6-66
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-66
- en: Schematic of how the TabNet architecture can be used to represent decision tree–like
    logical decision-making. From Arik and Pfister
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: TabNet架构如何表示类似于决策树的逻辑决策的示意图。来自Arik和Pfister
- en: Another advantage of TabNet (and all deep learning for tabular data models)
    is its ability to be trained on unlabeled data. Due to the confluence of several
    mechanisms like sparsity, masking, and timestep-independent shared weights, TabNet
    is one of the lightest and most powerful recent tabular deep learning models.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: TabNet（以及所有用于表格数据的深度学习模型）的另一个优点是它能够在未标记的数据上进行训练。由于稀疏性、掩码和时间步长无关共享权重等机制的汇聚，TabNet是最近最轻便且最强大的表格深度学习模型之一。
- en: 'Because TabNet comes from Google Cloud AI, the codebase (model code available
    at [https://​github.​com/​google-research/​google-research/​blob/​master/​tabnet/​tabnet_​model.​py](https://github.com/google-research/google-research/blob/master/tabnet/tabnet_model.py))
    is written in TensorFlow and should be somewhat readable. We will use a modified
    version in proper Keras by Somshubra Majumdar, which comes with additional conveniences
    and utilities. You can see the implementation here: [https://​github.​com/​titu1994/​tf-TabNet/​blob/​master/​tabnet/​tabnet.​py](https://github.com/titu1994/tf-TabNet/blob/master/tabnet/tabnet.py).
    The code is available as a library in pip; its PyPI page is [https://​pypi.​org/​project/​tabnet/​](https://pypi.org/project/tabnet/),
    and it can be installed with `pip install tabnet`.'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 TabNet 来自 Google Cloud AI，所以代码库（可在 [https://github.com/google-research/google-research/blob/master/tabnet/tabnet_model.py](https://github.com/google-research/google-research/blob/master/tabnet/tabnet_model.py)
    获取模型代码）是用 TensorFlow 编写的，应该相对容易阅读。我们将使用 Somshubra Majumdar 修改的版本，在正确的 Keras 中提供了额外的便利和实用工具。您可以在以下链接中查看实现：[https://github.com/titu1994/tf-TabNet/blob/master/tabnet/tabnet.py](https://github.com/titu1994/tf-TabNet/blob/master/tabnet/tabnet.py)。该代码作为库在
    pip 中可用；其 PyPI 页面是 [https://pypi.org/project/tabnet/](https://pypi.org/project/tabnet/)，并且可以使用
    `pip install tabnet` 进行安装。
- en: 'The `tabnet` library comes with two output-fitted models: `TabNetClassifier`
    and `TabNetRegressor` for classification and regression problems, respectively.
    Both share the same `TabNet` base model architecture but use different output
    activations (as one can confirm by looking at the source code). At the minimum,
    you need to specify the number of input features and the number of output classes.
    Moreover, you can specify the feature dimension `feature_dim` (this is *N*[*a*]),
    the output dimension `output_dim` (this is *N*[*d*]), the number of decision steps
    `num_decision_steps` (this is *N*[steps]), the relaxation factor `relaxation_factor`
    (this is *γ*), and a sparsity coefficient `sparsity_coefficient` to control the
    severity of adherence toward sparsity, among additional parameters (Listing [6-39](#PC39).)'
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: '`tabnet` 库包含两个输出适配的模型：`TabNetClassifier` 和 `TabNetRegressor`，分别用于分类和回归问题。这两个模型共享相同的
    `TabNet` 基础模型架构，但使用不同的输出激活（如通过查看源代码可以确认）。至少，您需要指定输入特征的数量和输出类的数量。此外，您还可以指定特征维度
    `feature_dim`（这是 *N*[*a*]），输出维度 `output_dim`（这是 *N*[*d*]），决策步骤的数量 `num_decision_steps`（这是
    *N*[steps]），松弛因子 `relaxation_factor`（这是 *γ*），以及一个稀疏系数 `sparsity_coefficient` 来控制对稀疏性的遵守程度，以及其他参数（见代码清单
    [6-39](#PC39)）。'
- en: '[PRE38]'
  id: totrans-539
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: We can compile and fit as a standard Keras model (Listing [6-40](#PC40)). Use
    large batch sizes for TabNet – even as high as 10–15% of the total dataset size,
    if memory permits. Since this implementation does not support self-supervised
    learning easily, it may take an extended period of training to acclimate to the
    labels. While self-supervised learning helps, training directly on labels usually
    yields competitive results too. Implementing self-supervised pretraining is not
    difficult and can be built from the existing source code building blocks.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将 TabNet 编译并拟合为一个标准的 Keras 模型（见代码清单 [6-40](#PC40)）。对于 TabNet，可以使用较大的批量大小——如果内存允许，甚至可以达到总数据集大小的
    10-15%。由于这种实现不支持轻松进行自监督学习，因此可能需要较长的训练时间来适应标签。虽然自监督学习有帮助，但直接在标签上进行训练通常也能得到有竞争力的结果。实现自监督预训练并不困难，并且可以从现有的源代码构建块中构建。
- en: '[PRE39]'
  id: totrans-541
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: For technical TensorFlow reasons, to easily obtain the values for the feature
    selection masks, we need to pass the desired dataset through the model. We do
    not need to save the outputs; the point of this command is to force the model
    to run in eager execution mode. From there, we can collect the masks (a list of
    tensors in raw original form) and access the data in NumPy arrays (Listing [6-41](#PC41)).
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 由于技术上的 TensorFlow 原因，为了轻松获取特征选择掩码的值，我们需要将所需的数据库通过模型传递。我们不需要保存输出；这个命令的目的是强制模型以
    eager 执行模式运行。从那里，我们可以收集掩码（原始形式下的张量列表）并访问 NumPy 数组中的数据（见代码清单 [6-41](#PC41)）。
- en: '[PRE40]'
  id: totrans-543
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: There are *N*[steps] − 1 feature selection maps (plotted by Listing [6-42](#PC42),
    Figure [6-67](#Fig67)). Note that this particular model reasons from individual
    “key” features in the first few steps and then progressively incorporates input
    from other features in later steps to further inform the decision-making procedure.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 有 *N*[steps] - 1 个特征选择图（由代码清单 [6-42](#PC42) 和图 [6-67](#Fig67) 绘制）。请注意，这个特定的模型在前几步中从单个“关键”特征进行推理，然后在后续步骤中逐步结合其他特征输入，以进一步告知决策过程。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67a_HTML.png)'
  id: totrans-545
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67a_HTML.png)'
- en: 7 heatmaps of samples versus columns depict mask values for layers 1 to 7\.
    Each heatmap includes 54 samples. The heatmaps are color-based using scales with
    different ranges.
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 7个样本与列的热图描绘了第1层到第7层的掩码值。每个热图包含54个样本。热图使用不同范围的比例进行颜色编码。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67b_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67c_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67d_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67e_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67f_HTML.png)![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67g_HTML.png)'
  id: totrans-547
  prefs: []
  type: TYPE_IMG
  zh: '![图6-67b](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67b_HTML.png)![图6-67c](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67c_HTML.png)![图6-67d](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67d_HTML.png)![图6-67e](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67e_HTML.png)![图6-67f](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67f_HTML.png)![图6-67g](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig67g_HTML.png)'
- en: Figure 6-67
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-67
- en: The features attended to at each iteration of a TabNet block (arranged along
    the x-axis) for several samples (arranged along the y-axis)
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: TabNet块在每个迭代中关注的特征（沿x轴排列）对于几个样本（沿y轴排列）
- en: '[PRE41]'
  id: totrans-550
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: We can similarly access the aggregate feature mask, which informs us of the
    individual feature contributions to the output weighed across decision steps for
    all samples in the submitted dataset (Listing [6-43](#PC43), Figure [6-68](#Fig68)).
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以类似地访问聚合特征掩码，它告诉我们提交数据集中所有样本在决策步骤中对输出贡献的个体特征（如列表[6-43](#PC43)，图[6-68](#Fig68)所示）。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig68_HTML.png)'
  id: totrans-552
  prefs: []
  type: TYPE_IMG
  zh: '![图6-68](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig68_HTML.png)'
- en: A heatmap of samples versus columns depicts an aggregate feature mask. It includes
    54 samples. The heatmap is colored based on a scale ranging from 0.0 to 0.65.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 样本与列的热图描绘了一个聚合特征掩码。它包括54个样本。热图基于从0.0到0.65的范围进行着色。
- en: Figure 6-68
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-68
- en: Plotting the aggregate feature mask across several examples
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 在多个示例中绘制聚合特征掩码
- en: '[PRE42]'
  id: totrans-556
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: In sum, TabNet employs an attention-based feature selection mechanism, which
    forces sequential reasoning and processing of features in similar fashion to tree
    ensembles, with the advantage of interpretability.
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，TabNet采用基于注意力的特征选择机制，这强制进行顺序推理和处理特征，类似于树集成，具有可解释性的优势。
- en: SAINT
  id: totrans-558
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SAINT
- en: 'The Self-Attention and Intersample Attention Transformer (SAINT) is a recent
    model, introduced by Gowthami Somepalli et al. from the University of Maryland
    and Capital One Machine Learning in the 2021 paper “SAINT: Improved Neural Networks
    for Tabular Data via Row Attention and Contrastive Pre-Training.”^([11](#Fn11))
    SAINT’s novel contribution is the introduction of *intersample attention*, which
    allows rows to relate to one another in attentive fashion, as opposed to standard
    column-wise attention.'
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: '自注意力与跨样本注意力Transformer（SAINT）是一个近期提出的模型，由马里兰大学和Capital One机器学习团队的Gowthami Somepalli等人于2021年的论文“SAINT:
    Improved Neural Networks for Tabular Data via Row Attention and Contrastive Pre-Training.”中提出。^([11](#Fn11))
    SAINT的创新之处在于引入了*跨样本注意力*，这使得行能够以注意力的方式相互关联，而不是像标准列注意力那样。'
- en: 'Let us conceptualize SAINT using the authors’ notation (slightly adapted for
    clarity). Let *D* ≔ ![$$ D:= {\left\{{x}_i,{y}_i\right\}}_{i=1}^m $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq5.png):
    the dataset *D* contains *m* pairs of an *n* − 1-dimensional feature vector (*x*[*i*])
    and the associated label *y*[*i*]. The true dataset contains *n* features; a classification
    `[CLS]` token is added as an additional feature: ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots,
    {f}_i^{n-1}\right\} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq6.png),
    where ![$$ {f}_i^j $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq7.png)
    represents the value of the *j*th feature of the *i*th sample. The `[CLS]` token
    serves as a “blank feature.” SAINT embeds each feature into *d*-dimensional space
    independently, like TabTransformer. Unlike TabTransformer, SAINT embeds all features
    – categorical and continuous – whereas TabTransformer selectively embeds categorical
    features. The embedding layer is denoted by *E* and applies different embedding
    functions to different categorical features. The `[CLS]` token is embedded as
    if it were a feature. Its relevance will become clearer when the complete architecture
    is laid out.'
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用作者的概念（为了清晰起见略有调整）来构想 SAINT。令 *D* ≔ ![$$ D:= {\left\{{x}_i,{y}_i\right\}}_{i=1}^m
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq5.png)：数据集 *D*
    包含 *m* 对 *n* - 1 维特征向量 (*x*[*i*]) 和相关的标签 *y*[*i*]。真实数据集包含 *n* 个特征；添加了一个分类 `[CLS]`
    标记作为额外的特征：![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots, {f}_i^{n-1}\right\}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq6.png)，其中 ![$$
    {f}_i^j $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq7.png)
    表示第 *i* 个样本的第 *j* 个特征值。`[CLS]` 标记作为“空白特征”。SAINT 独立地将每个特征嵌入到 *d*-维空间中，就像 TabTransformer。与
    TabTransformer 不同，SAINT 将所有特征（分类和连续）都嵌入，而 TabTransformer 只选择性地嵌入分类特征。嵌入层表示为 *E*
    并对不同的分类特征应用不同的嵌入函数。`[CLS]` 标记被嵌入，就像它是一个特征一样。当完整架构展开时，其相关性将变得更加清晰。
- en: 'Like TabTransformer and TabNet, SAINT’s primary architectural body is comprised
    of *L* attention-based steps. Each step consists of a self-attention transformer
    block, followed by an intersample attention transformer block. The self-attention
    block is identical to the one used in the Vaswani et al. original transformer
    paper: a multi-head self-attention (MSA) layer followed by feed-forward (FF) layers
    with a Gaussian Error Linear Unit (GELU) activation. Moreover, let MISA be the
    multi-head intersample self-attention layer (this mechanism will be explained
    more in-depth later), LN be the layer normalization layer, and *b* be the batch
    size. Both MSA and MISA have residual connections following. A step ![$$ {S}_k^q
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq8.png) at step
    *q* for a sample index *k* can be accordingly formulated as follows with intermediates
    ![$$ {z}_k^{q,1} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq9.png),
    ![$$ {z}_k^{q,2} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq10.png),
    and ![$$ {z}_k^{q,3} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq11.png)
    for notational convenience:'
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 与 TabTransformer 和 TabNet 类似，SAINT 的主要架构体由 *L* 个基于注意力的步骤组成。每个步骤包括一个自注意力变换器块，随后是一个跨样本注意力变换器块。自注意力块与
    Vaswani 等人原始变换器论文中使用的是相同的：一个多头自注意力 (MSA) 层后跟前馈 (FF) 层，并使用高斯误差线性单元 (GELU) 激活。此外，令
    MISA 为多头跨样本自注意力层（此机制将在后面进行更深入的说明），LN 为层归一化层，*b* 为批量大小。MSA 和 MISA 都有后续的残差连接。对于样本索引
    *k* 在步骤 *q* 的一个步骤 ![$$ {S}_k^q $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq8.png)，可以相应地以下列形式表示，其中包含中间变量
    ![$$ {z}_k^{q,1} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq9.png)，![$$
    {z}_k^{q,2} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq10.png)，和
    ![$$ {z}_k^{q,3} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq11.png)
    以便记号方便：
- en: '![$$ {z}_k^{q,1}= LN\left( MSA\left({S}_{q-1}\right)\right)+{S}_{q-1} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equl.png)'
  id: totrans-562
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ {z}_k^{q,1}= LN\left( MSA\left({S}_{q-1}\right)\right)+{S}_{q-1} \right](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equl.png)'
- en: '![$$ {z}_k^{q,2}= LN\left({FF}_1\left({z}_i^{q,1}\right)\right)+{z}_k^{q,1}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equm.png)'
  id: totrans-563
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ {z}_k^{q,2}= LN\left({FF}_1\left({z}_i^{q,1}\right)\right)+{z}_k^{q,1}
    \right](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equm.png)'
- en: '![$$ {z}_k^{q,3}= LN\left(\textrm{MISA}\left({\left\{{z}_i^{q,2}\right\}}_{i=1}^b\right)\right)+{z}_k^{q,2}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equn.png)'
  id: totrans-564
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ {z}_k^{q,3}= LN\left(\textrm{MISA}\left({\left\{{z}_i^{q,2}\right\}}_{i=1}^b\right)\right)+{z}_k^{q,2}
    \right](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equn.png)'
- en: '![$$ {S}_k^q= LN\left({FF}_2\left({z}_k^{q,3}\right)\right)+{z}_k^{q,3} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equo.png)'
  id: totrans-565
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {S}_k^q= LN\left({FF}_2\left({z}_k^{q,3}\right)\right)+{z}_k^{q,3} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equo.png)'
- en: Moreover, we have ![$$ {S}_k^0=E\left({x}_k\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq12.png)
    such that the inputs to ![$$ {S}_k^1 $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq13.png)are
    the embeddings generated for that sample. Note that to compute the multi-head
    intersample self-attention layer, we need to compare derived self-attention features
    across all samples within the batch.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们有 ![$$ {S}_k^0=E\left({x}_k\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq12.png)
    这样，![$$ {S}_k^1 $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq13.png)
    的输入是为此样本生成的嵌入。请注意，为了计算多头跨样本自注意力层，我们需要比较批次内所有样本的派生自注意力特征。
- en: The complete architecture is visualized in Figure [6-69](#Fig69).
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的架构在图[6-69](#Fig69)中可视化。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig69_HTML.jpg)'
  id: totrans-568
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig69_HTML.jpg)'
- en: A flowchart depicts the transformer block of S A I N T. It flows as embedded
    inputs of a batch, transformer with intersample attention and self-attention blocks,
    and contextual representations of a batch.
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图展示了 S A I N T 的 Transformer 模块。它包括一个批次的嵌入输入、具有跨样本注意力和自注意力模块的 Transformer，以及批次的上下文表示。
- en: Figure 6-69
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-69
- en: The complete SAINT transformer block. From Somepalli et al.
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的 SAINT Transformer 模块。来自 Somepalli 等人。
- en: To make the final prediction on a supervised problem, the embedding corresponding
    to the `[CLS]` token from the last step (![$$ {S}_0^L $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq14.png),
    assuming that the `[CLS]` token corresponds to the first feature index) is extracted
    and passed through a simple multilayer perceptron into the output. After training,
    the `[CLS]` feature embedding will have been informed via several steps of cross-feature
    and cross-sample attending. This is a clever trick to force information into a
    low-dimensional single embedding (as opposed to concatenating embeddings for every
    feature TabTransformer-style, which has a significantly larger dimensionality).
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在监督问题上做出最终预测，从最后一步的 `[CLS]` 标记对应的嵌入（![$$ {S}_0^L $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq14.png)，假设
    `[CLS]` 标记对应于第一个特征索引）中提取出来，并通过一个简单的多层感知器传递到输出。经过训练后，`[CLS]` 特征嵌入将通过跨特征和跨样本注意力的多个步骤得到信息。这是一个巧妙的方法，将信息强制输入到一个低维的单个嵌入中（而不是像
    TabTransformer 风格那样连接每个特征的嵌入，这会显著增加维度性）。
- en: To understand the multi-head intersample self-attention mechanism, we will begin
    by reformalizing the standard multi-head self-attention mechanism (Figure [6-70](#Fig70)).
    Let *a* be the attention matrix and *a*[*i*, *j*] indicate the attention score
    between the query derived from the *i*th feature and the key derived from the
    *j*th feature. *a* is an *n* × *n* matrix, with self-attention scores computed
    between embeddings corresponding toelements in ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots,
    {f}_i^{n-1}\right)\Big\} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq15.png).
    The *i*th value of the output is ![$$ \sum \limits_{j=0}^{n-1}{a}_{i,j}\ast {v}_i
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq16.png), where
    *v*[*i*] is the value vector derived from the *i*th feature. This is repeated
    with multiple heads (i.e., multiple keys, queries, and values are derived from
    each of the features).
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解多头跨样本自注意力机制，我们首先将重新定义标准的多头自注意力机制（图[6-70](#Fig70)）。令 *a* 为注意力矩阵，*a*[*i*, *j*]
    表示由第 *i* 个特征派生出的查询与由第 *j* 个特征派生出的键之间的注意力分数。*a* 是一个 *n* × *n* 矩阵，其中自注意力分数是在对应于
    ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots, {f}_i^{n-1}\right)\Big\}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq15.png) 的嵌入之间计算的。输出值的第
    *i* 个是 ![$$ \sum \limits_{j=0}^{n-1}{a}_{i,j}\ast {v}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq16.png)，其中
    *v*[*i*] 是由第 *i* 个特征派生的值向量。这通过多个头（即，从每个特征中派生出多个键、查询和值）重复进行。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig70_HTML.png)'
  id: totrans-574
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig70_HTML.png)'
- en: An illustration depicts the multi-head self-attention mechanism. It includes
    4 E of dot layers. Each has query-key-value elements. The aggregate features outputs
    as layer normalization and residual.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了多头自注意力机制。它包括 4 个点层。每个层都有查询-键-值元素。聚合特征作为层归一化和残差输出。
- en: Figure 6-70
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-70
- en: Visualization of inter-feature attention (standard attention). From Somepalli
    et al.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: inter-feature attention（标准注意力）的可视化。来自 Somepalli 等人。
- en: 'Multi-head intersample self-attention (Figure [6-71](#Fig71)) is a “mega self-attention”
    across a batch. Rather than operating on embeddings corresponding to the collection
    of features ![$$ {x}_i=\left\{\left[ CLS\right],{f}_i^1,{f}_i^2,\dots, {f}_i^{n-1}\right\}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq17.png), it operates
    on a batch of samples {*x*[1], *x*[2], ..., *x*[*b*]}. The embeddings for each
    of the features within each sample are concatenated with each other, independent
    of sample. Key, query, and value vectors are derived from these concatenated embeddings
    such that there are as many (*K*, *Q*, *V*) sets as there are attention heads
    per sample. Then, we apply attention in standard form: let *a* be a *b* × *b*
    attention matrix and *a*[*i*, *j*] indicate the attention score between the query
    derived from the concatenated embedding corresponding to *x*[*i*] and the key
    derived from the concatenated embedding corresponding to *x*[*j*]. To obtain the
    final output, the *i*th value is given by![$$ \sum \limits_1^b{a}_{i,j}\ast {v}_i
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq18.png), where
    *v*[*i*] is the value vector derived from the concatenated embedding corresponding
    to *x*[*i*].'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 多头 intersample 自注意力（图 [6-71](#Fig71)）是在一个批次中的“超级自注意力”。它不是在对应于特征集合 ![$$ {x}_i=\left\{\left[
    CLS\right],{f}_i^1,{f}_i^2,\dots, {f}_i^{n-1}\right\} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq17.png)
    的嵌入上进行操作，而是在一个样本批次 {*x*[1], *x*[2], ..., *x*[*b*]} 上进行操作。每个样本中每个特征的嵌入相互拼接，独立于样本。键、查询和值向量是从这些拼接嵌入中导出的，使得每个样本的注意力头数与
    (*K*, *Q*, *V*) 集合的数量相同。然后，我们以标准形式应用注意力：令 *a* 为一个 *b* × *b* 的注意力矩阵，*a*[*i*, *j*]
    表示从对应于 *x*[*i*] 的拼接嵌入中得到的查询与从对应于 *x*[*j*] 的拼接嵌入中得到的键之间的注意力分数。为了获得最终输出，第 *i* 个值由以下公式给出！[$$
    \sum \limits_1^b{a}_{i,j}\ast {v}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq18.png)，其中
    *v*[*i*] 是从对应于 *x*[*i*] 的拼接嵌入中导出的值向量。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig71_HTML.png)'
  id: totrans-579
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig71_HTML.png)'
- en: An illustration depicts the multi-head intersample self-attention mechanism.
    It includes 3 sets of 4 E of dot layers and then concatenated. Each concatenated
    layer has query-key-value elements. The aggregate features outputs as layer normalization
    and residual.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了多头 intersample 自注意力机制。它包括 3 组 4 个点层，然后进行拼接。每个拼接层都有查询-键-值元素。聚合特征以层归一化和残差的形式输出。
- en: Figure 6-71
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-71
- en: Visualization of intersample attention. From Somepalli et al.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: intersample attention 的可视化。来自 Somepalli 等人。
- en: Like most deep learning approaches to tabular data, SAINT is pretrained with
    a self-supervised training task. Rather than using BERT/masked language model–style
    pretraining tasks, like TabTransformer’s replaced token detection pretraining
    task, SAINT uses contrastive learning. Contrastive learning is a training paradigm
    in which the goal is not to strictly learn an associated target given an input,
    but rather to identify shared or different attributes (i.e., to “compare and *contrast*”)
    between a set of inputs.
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 与大多数针对表格数据的深度学习方法一样，SAINT 使用自监督训练任务进行预训练。与 TabTransformer 的替换标记检测预训练任务等 BERT/masked
    language model 风格的预训练任务不同，SAINT 使用对比学习。对比学习是一种训练范式，其目标不是在给定输入的情况下严格学习一个关联的目标，而是识别一组输入之间的共享或不同属性（即“比较和
    *对比*”）。
- en: 'SAINT’s pretraining task is as follows. For each sample *x*[*i*], generate
    a corrupted version *x*[*i*]^′. This is done using the CutMix augmentation, which
    uses the following calculation given a randomly selected sample *x*[*a*] and a
    binary mask vector sampled from a Bernoulli distribution ***m***:'
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: SAINT 的预训练任务如下。对于每个样本 *x*[*i*]，生成一个损坏版本 *x*[*i*]^′。这是通过使用 CutMix 增强方法完成的，该方法使用以下计算，给定一个随机选择的样本
    *x*[*a*] 和从伯努利分布 ***m*** 中采样的二进制掩码向量：
- en: '![$$ {x}_i^{\prime }={x}_i\bigotimes m+{x}_a\bigotimes \left(1-\boldsymbol{m}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equp.png)'
  id: totrans-585
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {x}_i^{\prime }={x}_i\bigotimes m+{x}_a\bigotimes \left(1-\boldsymbol{m}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equp.png)'
- en: 'We will embed *x*[*i*] to obtain *p*[*i*] = *E*(*x*[*i*]). Then, we will generate
    a corrupted embedding, given the mix-up parameter *α* and another randomly selected
    sample *x*[*b*]:'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将嵌入 *x*[*i*] 以获得 *p*[*i*] = *E*(*x*[*i*])。然后，我们将根据混合参数 *α* 和另一个随机选择的样本 *x*[*b*]
    生成一个损坏的嵌入：
- en: '![$$ {p}_i^{\prime }=\alpha \ast E\left({x}_i^{\prime}\right)+\left(1-\alpha
    \right)\ast E\left({x}_b^{\prime}\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equq.png)'
  id: totrans-587
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equq.png)'
- en: 'Now, we have four sets of data: *x*[*i*], the original untouched sample; *x*[*i*]^′,
    the corrupted sample; *p*[*i*], the original untouched embedding; and *p*[*i*]^′,
    the corrupted embedding. We can pass the two embeddings through the SAINT model,
    which we will denote with a bold ***S*** (the compositing of all individual steps),
    to obtain ***S***(*p*[*i*]) and ![$$ \boldsymbol{S}\left({p}_i^{\prime}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq19.png). To reduce
    the dimensionality of these representations, we pass these through an additional
    MLP *g*[1] and *g*[2] to obtain *g*[1](***S***(*p*[*i*])) and ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq20.png). We can
    use this to calculate the *contrastive loss*, for some temperature parameter *τ*:'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们拥有四组数据：*x*[*i*]，原始未受损害的样本；*x*[*i*]^′，损坏的样本；*p*[*i*]，原始未受损害的嵌入；以及 *p*[*i*]^′，损坏的嵌入。我们可以将这两个嵌入通过SAINT模型（我们将用粗体***S***表示，代表所有单个步骤的组合）传递，以获得***S***(*p*[*i*])和![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq19.png)。为了降低这些表示的维度，我们通过一个额外的MLP
    *g*[1] 和 *g*[2] 传递这些表示，以获得 *g*[1](***S***(*p*[*i*])) 和 ![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq20.png)。我们可以使用这些来计算*对比损失*，对于某个温度参数
    *τ*：
- en: '![$$ \textrm{Contrastive}\ \textrm{Loss}=-\sum \limits_{i=1}^m\log \left(\frac{\exp
    \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)}{\tau}\right)}{\sum
    \limits_{k=1}^m\exp \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_k^{\prime}\right)\right)}{\tau}\right)}\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equr.png)'
  id: totrans-589
  prefs: []
  type: TYPE_IMG
  zh: '![对比损失](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equr.png)'
- en: 'Let’s break down this formula. The temperature parameter, logarithm, and exponentials
    can be more or less ignored since they do not affect the principal dynamics of
    the expression. We can rough-handedly “simplify” it as follows:'
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解这个公式。温度参数、对数和指数可以或多或少忽略，因为它们不影响表达式的本质动态。我们可以粗略地“简化”如下：
- en: '![$$ -\sum \limits_{i=1}^m\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)}{\sum \limits_{k=1}^m\left({g}_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_k^{\prime}\right)\right)\right)} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equs.png)'
  id: totrans-591
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equs.png)'
- en: It becomes more readable in this form. In the numerator, we are comparing the
    representation derived from the clean input with the representation derived from
    the corrupted version of that same input. In the denominator, we are summing the
    interaction between the representation derived from the clean input and the representation
    derived from the corrupted version of every element in the dataset. (Recall the
    authors denote an un-bolded *m* as the length of the dataset.) The dot product
    of some vector ![$$ \overrightarrow{a} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq21.png)
    and another vector ![$$ \overrightarrow{b} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq22.png)
    is maximized when ![$$ \overrightarrow{a}=\overrightarrow{b} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq23.png),
    holding one of the vectors fixed. In ideal conditions, *g*[1](***S***(*p*[*i*]))
    and ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq24.png)
    will be very close since they both fundamentally derive from the same sample,
    even if one is corrupted. In this case, the numerator will be large, and the overall
    term will evaluate to a high value relative to if *g*[1](***S***(*p*[*i*])) and
    ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq25.png)
    were farther apart. We sum all such values across all items in the dataset. Because
    we want to minimize the loss, we negate the summation.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 这种形式下更易于阅读。在分子中，我们比较的是从干净输入中得到的表示与从相同输入的损坏版本中得到的表示。在分母中，我们是对从干净输入中得到的表示与从数据集中每个元素的损坏版本中得到的表示之间的交互进行求和。（回想一下，作者用未加粗的*m*表示数据集的长度。）当两个向量**a**和**b**相等时，向量**a**和**b**的点积最大，其中一个向量保持固定。在理想条件下，*g*[1](***S***(*p*[*i*]))和**g2**(*S*(*p*[*i*]))将非常接近，因为它们都从根本上来自相同的样本，即使其中一个被损坏。在这种情况下，分子将很大，相对于如果*g*[1](***S***(*p*[*i*]))和**g2**(*S*(*p*[*i*]))相距更远，整体项将评估为高值。我们将在数据集中的所有项目上求和所有这样的值。因为我们想最小化损失，所以我们取负值。
- en: We can think of the entire SAINT architecture ***S*** as a giant embedding machine;
    the contrastive loss incentivizes intelligently mapped embeddings, which place
    close points physically close together in the embedding space.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将整个SAINT架构的**S**部分视为一个巨大的嵌入机；对比损失激励智能映射的嵌入，使得在嵌入空间中物理上接近的点彼此靠近。
- en: 'The authors also introduce a denoising loss, in which the objective is to decode
    the original input *x*[*i*] from the representation derived from the corrupted
    embedding, ![$$ {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq26.png).
    A unique multilayer perceptron model is constructed for each individual feature
    to perform the “denoising.” The loss ![$$ {\mathcal{L}}_j $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq27.png),
    which is binary cross-entropy for categorical features and Mean Squared Error
    for continuous features, is taken between the original input and the derived representation.
    This is summed across all features (*n* total features) and across all samples
    (*m* total samples) and then scaled by *λ*[pt] such that it is on an appropriate
    magnitude relative to the contrastive loss:'
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 作者还引入了一种去噪损失，其目标是解码原始输入*x*[*i*]从损坏嵌入得到的表示**g2**(*S*(*p*[*i*]))。为每个单独的特征构建了一个独特的多层感知器模型来执行“去噪”。损失**Lj**，对于分类特征是二元交叉熵，对于连续特征是均方误差，是在原始输入和导出的表示之间计算的。这将在所有特征（*n*个总特征）和所有样本（*m*个总样本）上求和，然后乘以*λ*[pt]，以便相对于对比损失具有适当的量级：
- en: '![$$ \textrm{Denoising}\ \textrm{Loss}={\lambda}_{\textrm{pt}}\sum \limits_{i=1}^m\sum
    \limits_{j=1}^n{\mathcal{L}}_j\left({MLP}_{\textrm{j}}\left({g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)\right),{x}_i\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equt.png)'
  id: totrans-595
  prefs: []
  type: TYPE_IMG
  zh: '![去噪损失](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equt.png)'
- en: 'The overall training loss is the sum of the contrastive and denoising losses:'
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 总体训练损失是对比损失和去噪损失的加和：
- en: '![$$ {\mathcal{L}}_{\textrm{pretraining}}=\textrm{Contrastive}\ \textrm{Loss}+\textrm{Denoising}\
    \textrm{Loss} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equu.png)'
  id: totrans-597
  prefs: []
  type: TYPE_IMG
  zh: '![预训练损失](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equu.png)'
- en: '![$$ {\mathcal{L}}_{\textrm{pretraining}}=-\sum \limits_{i=1}^m\log \left(\frac{\exp
    \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot {g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)}{\tau}\right)}{\sum
    \limits_{k=1}^m\exp \left(\frac{g_1\left(\boldsymbol{S}\left({p}_i\right)\right)\cdot
    {g}_2\left(\boldsymbol{S}\left({p}_k^{\prime}\right)\right)}{\tau}\right)}\right)+{\lambda}_{\textrm{pt}}\sum
    \limits_{i=1}^m\sum \limits_{j=1}^n{\mathcal{L}}_j\left({MLP}_{\textrm{j}}\left({g}_2\left(\boldsymbol{S}\left({p}_i^{\prime}\right)\right)\right),{x}_i\right)
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equv.png)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
  zh: '![预训练损失](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equv.png)'
- en: 'Then, as previously mentioned, the model is fine-tuned in a supervised learning
    regime; the embeddingcorresponding to the [CLS] token at the last step ![$$ {S}_0^L
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq28.png) is passed
    into an MLP with a single hidden layer to obtain the output:'
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，如前所述，模型在监督学习环境中进行微调；在最后一步对应的 [CLS] 标记的嵌入 ![$$ {S}_0^L $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq28.png)
    被传递到一个单隐藏层的 MLP 中以获得输出：
- en: '![$$ {\mathcal{L}}_{\textrm{fine}-\textrm{tuning}}=\sum \limits_{i=1}^m BCE\left({y}_i,
    MLP\left(\boldsymbol{S}\left(E\left({x}_i\right)\right)\right)\right)\Big) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equw.png)'
  id: totrans-600
  prefs: []
  type: TYPE_IMG
  zh: '![微调损失](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equw.png)'
- en: The complete SAINT training pipeline is visualized in Figure [6-72](#Fig72).
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的 SAINT 训练流程在图 [6-72](#Fig72) 中可视化。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig72_HTML.jpg)'
  id: totrans-602
  prefs: []
  type: TYPE_IMG
  zh: '![图 6-72](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig72_HTML.jpg)'
- en: A two-part illustration depicts the working of self-supervised pre-training
    and supervised fine-tuning schemes of S A I N T, respectively.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅两部分的插图分别展示了 S A I N T 的自监督预训练和监督微调方案的工作原理。
- en: Figure 6-72
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-72
- en: 'The complete SAINT training pipeline and architectures employed. For notation:
    a bold ***S***(...) indicates the complete SAINT pipeline (i.e., the compositing
    of the all steps together), and *r*[*i*] is the output of ***S***(...). From Somepalli
    et al.'
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的 SAINT 训练流程和使用的架构。对于符号：粗体 ***S***(...) 表示完整的 SAINT 流程（即所有步骤的组合），*r*[*i*]
    是 ***S***(...) 的输出。来自 Somepalli 等人。
- en: Somepalli et al. evaluate three versions of SAINT (standard SAINT; SAINT-s,
    with only self-attention; SAINT-i, with only intersample attention) across 16
    datasets and demonstrate improved performance over other tree-based and deep learning
    tabular data models (Table [6-13](#Tab13)). Note that SAINT-s is more or less
    identical to the original Vaswani et al. transformer block but applied to tabular
    data. We see that intersample attention helps provide improvement over just self-attention
    in a large number of datasets, however.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: Somepalli 等人评估了 SAINT 的三个版本（标准 SAINT；仅使用自注意力机制的 SAINT-s；仅使用跨样本注意力机制的 SAINT-i）在
    16 个数据集上的表现，并证明了其相对于其他基于树和深度学习的表格数据模型的性能提升（表 [6-13](#Tab13)）。请注意，SAINT-s 与 Vaswani
    等人原始的 transformer 块大致相同，但应用于表格数据。然而，我们发现跨样本注意力在大量数据集上帮助提供了仅使用自注意力机制所不能提供的改进。
- en: Table 6-13
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 表 6-13
- en: Mean AUROC
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 平均 AUROC
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figm_HTML.gif)2 tables.
    Table 1 has 12 rows and 3 columns. Column 2 has 9 sub-columns. Table 2 has 12
    rows. and 2 columns. Column 2 has 7 sub-columns. |'
  id: totrans-609
  prefs: []
  type: TYPE_TB
  zh: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Figm_HTML.gif)2个表格。表1有12行和3列。第2列有9个子列。表2有12行和2列。第2列有7个子列。|'
- en: Moreover, the authors find that SAINT is highly robust to significant data corruption
    and that changing the batch size has little effect on the performance, assuming
    a minimum batch size of 32\. This suggests that just a “critical mass” of samples
    in a batch is required for effective comparison and cross-sample comparison.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，作者发现SAINT对数据严重损坏具有高度鲁棒性，并且假设最小批量为32的情况下，改变批量大小的效果很小。这表明只需要一个“临界质量”的样本批次就能有效地进行比较和跨样本比较。
- en: The attention maps of the layers can be interpreted to understand how the model
    makes decisions (Figure [6-73](#Fig73)).
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 层的注意力图可以解释为理解模型如何做出决策（图[6-73](#Fig73)）。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig73_HTML.jpg)'
  id: totrans-612
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig73_HTML.jpg)'
- en: A four-part heatmap depicts the sample inputs and self-attention scores of the
    layers. The input heatmap is comparatively brighter than the self-attention score
    heatmap.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 一个四部分的热力图描绘了层的样本输入和自注意力分数。输入热力图相对于自注意力分数热力图来说更亮。
- en: Figure 6-73
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-73
- en: 'Left column: sample inputs, reshaped into two dimensions. Right: self-attention
    scores, selected and reshaped into two dimensions. From Somepalli et al.'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 左列：样本输入，重塑为二维。右：自注意力分数，选择并重塑为二维。来自Somepalli等人。
- en: However, SAINT is unique because we can also understand how the network makes
    decisions for a particular sample based on other examples. On MNIST, the network
    tends to heavily consult a set of exemplars (Figure [6-74](#Fig74)), perhaps because
    they are difficult-to-classify examples with high information value. However,
    intersample attention grids are more varying on the more complex Volkert dataset
    (Figure [6-75](#Fig75)). The authors speculate that intersample attention density
    rises with dataset complexity.
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，SAINT是独特的，因为我们还可以根据其他示例理解网络如何为特定样本做出决策。在MNIST上，网络倾向于大量咨询一组示例（图[6-74](#Fig74)），可能是因为它们是难以分类的示例，具有高信息价值。然而，在更复杂的Volkert数据集上，样本间注意力网格变化更多（图[6-75](#Fig75)）。作者推测，样本间注意力密度随着数据集复杂性的增加而增加。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig75_HTML.png)'
  id: totrans-617
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig75_HTML.png)'
- en: 2 heatmap of points in batch versus attended to depict S A I N T and S A I N
    T-i on Volkert dataset. Each heatmap has 20 rows and 20 columns. The cells are
    shaded in different colors.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 在Volkert数据集上，2个热力图展示了批量中的点与被关注的点，以描绘S A I N T和S A I N T-i。每个热力图有20行和20列。单元格以不同的颜色着色。
- en: Figure 6-75
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-75
- en: 'Left: intersample attention for SAINT. Right: intersample attention for SAINT-i.
    On Volkert dataset. From Somepalli et al.'
  id: totrans-620
  prefs: []
  type: TYPE_NORMAL
  zh: 左：SAINT的样本间注意力。右：SAINT-i的样本间注意力。在Volkert数据集上。来自Somepalli等人。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig74_HTML.png)'
  id: totrans-621
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig74_HTML.png)'
- en: 2 heatmap of points in batch versus attended to depict S A I N T and S A I N
    T-i on M N I S T dataset. Each heatmap has 20 rows and 20 columns. The cells are
    shaded in different colors.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 在MNIST数据集上，2个热力图展示了批量中的点与被关注的点，以描绘S A I N T和S A I N T-i。每个热力图有20行和20列。单元格以不同的颜色着色。
- en: Figure 6-74
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-74
- en: 'Left: intersample attention for SAINT. Right: intersample attention for SAINT-i.
    On MNIST dataset. From Somepalli et al.'
  id: totrans-624
  prefs: []
  type: TYPE_NORMAL
  zh: 左：SAINT的样本间注意力。右：SAINT-i的样本间注意力。在MNIST数据集上。来自Somepalli等人。
- en: 'The paper’s authors have implemented SAINT in PyTorch, which is available on
    the official repository here: [https://​github.​com/​somepago/​saint](https://github.com/somepago/saint).
    As of our knowledge, there exists no readily available Keras or TensorFlow implementation.
    However, Somepalli et al.’s implementation is user-friendly and directly accessible
    via the command line without knowledge of PyTorch.'
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 论文的作者已经在PyTorch中实现了SAINT，可在官方仓库中找到：[https://github.com/somepago/saint](https://github.com/somepago/saint)。据我们所知，目前还没有现成的Keras或TensorFlow实现。然而，Somepalli等人的实现用户友好，并且可以通过命令行直接访问，无需了解PyTorch。
- en: Begin by cloning the repository and creating and activating the provided environment
    (Listing [6-44](#PC44)).
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，通过克隆存储库并创建和激活提供的环境（列表[6-44](#PC44)）开始。
- en: '[PRE43]'
  id: totrans-627
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: In the current implementation, the model directly pulls data from OpenML – a
    data platform with the advantage of concretely defined and standardized (in the
    organizational, not the statistical, sense) features, labels, and other data attributes.
    Navigate to [www.​openml.​org/​](https://www.openml.org/) to browse existing datasets
    or to upload and create your own. Importantly, each dataset page has a numerical
    integer ID, which we will provide as a flag to identify the dataset we desire
    to train on. The Forest Cover dataset, for instance, has the OpenML ID `180` (Figure
    [6-76](#Fig76)).
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 在当前实现中，模型直接从 OpenML - 一个具有具体定义和标准化（在组织意义上，而非统计意义上）的特征、标签和其他数据属性优势的数据平台中提取数据。导航至
    [www.openml.org/](https://www.openml.org/) 浏览现有数据集或上传并创建自己的数据集。重要的是，每个数据集页面都有一个数值整数
    ID，我们将提供该 ID 作为标志来识别我们希望训练的数据集。例如，森林覆盖数据集的 OpenML ID 为 `180`（图 [6-76](#Fig76)）。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig76_HTML.png)'
  id: totrans-629
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig76_HTML.png)'
- en: A screenshot of the open M L website depicts the forest cover dataset. It has
    download, edit, j son, and x m l options.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 一张 open ML 网站的截图显示了森林覆盖数据集。它有下载、编辑、json 和 xml 选项。
- en: Figure 6-76
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-76
- en: The Forest Cover dataset on OpenML
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: OpenML 上的森林覆盖数据集
- en: 'Once you’ve obtained the OpenML ID, you can initiate the training process:
    `python train.py --dset_id 180 --task multiclass`. The dataset ID and task are
    the only two required flags; you can also specify parameters like the number of
    attention heads, whether to use pretraining, the embedding size, and so on. See
    the repository’s README for more information. Note that the repository maintainers,
    as of the time of this writing, have verified the code only for Linux. You may
    run into problems on other operating systems.'
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你获得了 OpenML ID，你就可以启动训练过程：`python train.py --dset_id 180 --task multiclass`。数据集
    ID 和任务是唯一两个必需的标志；你也可以指定参数，如注意力头的数量、是否使用预训练、嵌入大小等。有关更多信息，请参阅存储库的 README 文件。请注意，截至本文撰写时，存储库维护者仅验证了
    Linux 上的代码。你可能在其他操作系统上遇到问题。
- en: ARM-Net
  id: totrans-634
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ARM-Net
- en: 'ARM-Net, introduced by Shaofeng Cai et al. in 2021 in the paper “ARM-Net: Adaptive
    Relation Modeling Network for Structured Data,”^([12](#Fn12)) employs a unique
    architecture that could be described as more “involved” than the previously discussed
    attention-based architectures. Rather than using the standard attention mechanism
    as a transformation method for abstractly attending to different relevant features
    (and samples, in the case of SAINT), ARM-Net uses attention to help explicitly
    compute information-rich cross-features in a tabular dataset, which can be used
    for a supervised task. ARM-Net is structured in three modules: a preprocessing
    module, an adaptive relation modeling module, and a prediction module.'
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: ARM-Net，由蔡少锋等人在 2021 年发表的论文“ARM-Net：结构化数据的自适应关系建模网络”中提出，采用了一种独特的架构，可以描述为比之前讨论的基于注意力的架构更为“复杂”。ARM-Net
    不是使用标准的注意力机制作为抽象关注不同相关特征（在 SAINT 的情况下，还包括样本）的转换方法，而是使用注意力来帮助显式计算表格数据集中信息丰富的交叉特征，这些特征可用于监督任务。ARM-Net
    由三个模块组成：预处理模块、自适应关系建模模块和预测模块。
- en: 'Let us begin by formalizing the preprocessing module with the authors’ notation.
    Let *m* be the number of features in the dataset and let the input vector *x* = [*x*[1],
    *x*[2], ..., *x*[*m*]]. Each feature is mapped to an embedding: *E* = [*e*[1],
    *e*[2], ..., *e*[*m*]]. Categorical features are mapped via an embedding lookup,
    and continuous features are transformed via linear transformation. Let *n*[*e*]
    be the embedding dimension.'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先用作者的符号正式化预处理模块。设 *m* 为数据集中的特征数量，设输入向量 *x* = [*x*[1], *x*[2], ..., *x*[*m*]]。每个特征都映射到一个嵌入：*E*
    = [*e*[1], *e*[2], ..., *e*[*m*]]。分类特征通过嵌入查找映射，连续特征通过线性变换转换。设 *n*[*e*] 为嵌入维度。
- en: 'The key transformation mechanism of the adaptive relation modeling module is
    the exponential neuron. For some interaction weight matrix *w*, we can compute
    the *i*th element of the exponential neuron output *y* given the embeddings set
    *e* as follows:'
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应关系建模模块的关键转换机制是指数神经元。对于某些交互权重矩阵 *w*，我们可以根据嵌入集 *e* 计算指数神经元输出 *y* 的第 *i* 个元素，如下所示：
- en: '![$$ {y}_i=\exp \left(\sum \limits_{j=1}^m{w}_{i,j}{e}_j\right)=\exp {\left({e}_1\right)}^{w_{i,1}}\bigotimes
    \exp {\left({e}_2\right)}^{w_{i,2}}\bigotimes \dots \bigotimes \exp {\left({e}_2\right)}^{w_{i,m}}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equx.png)'
  id: totrans-638
  prefs: []
  type: TYPE_IMG
  zh: '![ \( y_i=\exp \left(\sum \limits_{j=1}^m{w}_{i,j}e_j\right)=\exp \left({e}_1\right)^{w_{i,1}}\bigotimes
    \exp \left({e}_2\right)^{w_{i,2}}\bigotimes \dots \bigotimes \exp \left({e}_m\right)^{w_{i,m}}
    \) ](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equx.png)'
- en: The interaction weight matrix determines the influence each embedding has on
    the output – like in a standard artificial neural network neuron – but operates
    in exponential space, as opposed to the additive-multiplicative dynamics of standard
    neurons.
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 交互权重矩阵决定了每个嵌入对输出的影响——类似于标准人工神经网络中的神经元——但它在指数空间中操作，而不是标准神经元的加法-乘法动态。
- en: 'To obtain the interaction weight matrix *w*, the adaptive relation modeling
    module uses multi-head gated attention. When determining the value of the *i*th
    neuron *y*[*i*], we need to obtain relevant power term weightings: *w*[*i*] = [*w*[*i*,
    1], *w*[*i*, 2], ..., *w*[*i*, *m*]]. Let *v*[*i*] ∈ *ℝ*^(*m*) be the (learnable)
    weight value vector associated with the *i*th neuron, which encodes the attentiveness
    to the embeddings for each of the *m* features. Let ![$$ {q}_i\in {\mathbb{R}}^{n_e}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq29.png) be the
    query vector associated with the *i*th neuron, which is used along with the embeddings
    to dynamically generate the *bilinear attention alignment score*, calculated as
    follows:'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获得交互权重矩阵 *w*，自适应关系建模模块使用多头门控注意力机制。在确定第 *i* 个神经元 *y*[*i*] 的值时，我们需要获得相关的幂项权重：*w*[*i*]
    = [*w*[*i*, 1], *w*[*i*, 2], ..., *w*[*i*, *m*]]。设 *v*[*i*] ∈ *ℝ*^(*m*) 为与第 *i*
    个神经元关联的（可学习的）权重值向量，它编码了对于每个 *m* 个特征的嵌入的注意力。设 ![$$ q_i\in {\mathbb{R}}^{n_e} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq29.png)
    为与第 *i* 个神经元关联的查询向量，它与嵌入一起动态生成双线性注意力对齐分数，计算如下：
- en: '![$$ {\phi}_{att}\left({q}_i,{e}_j\right)={q}_i^{\textrm{T}}{W}_{att}{e}_j
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equy.png)'
  id: totrans-641
  prefs: []
  type: TYPE_IMG
  zh: '![ \( \phi_{att}(q_i,e_j)=q_i^{\text{T}}W_{att}e_j \) ](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equy.png)'
- en: '![$$ \tilde{z}_{i,j}={\phi}_{att}\left({q}_i,{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equz.png)'
  id: totrans-642
  prefs: []
  type: TYPE_IMG
  zh: '![ \( \tilde{z}_{i,j}=\phi_{att}(q_i,e_j) \) ](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equz.png)'
- en: '![$$ {z}_i=\alpha \textrm{entmax}\left(\tilde{z}_i\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equaa.png)'
  id: totrans-643
  prefs: []
  type: TYPE_IMG
  zh: '![ \( z_i=\alpha \text{entmax}(\tilde{z}_i) \) ](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equaa.png)'
- en: Here, ![$$ {W}_{att}\in {\mathbb{R}}^{n_e\times {n}_e} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq30.png)
    is a weight matrix for bilinear attention. The shared bilinear attention function
    *ϕ*[att](*q*[*i*], *e*[*j*]) is calculated by performing a product between the
    query vector, the bilinear attention weight matrix, and the embedding. The transposed
    query has shape (1, *n*[*e*]); the product between this and the (*n*[*e*], *n*[*e*])-shaped
    weight matrix yields a (1, *n*[*e*])-shaped matrix; the product between this matrix
    and the (*n*[*e*], 1)-shaped embedding matrix yields a (1, 1)-shaped result (i.e.,
    a scalar). Thus, ![$$ \tilde{z}_{i,j} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq31.png)
    stores the attention score between the query vector of the *i*th neuron and the
    embedding corresponding to the *j*th feature. Thus, ![$$ \tilde{z}_i\in {\mathbb{R}}^m
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq32.png); that
    is, ![$$ \tilde{z}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq33.png)
    has length *m* – representing the attention scores between the *i*th exponential
    neuron and each of the *m* features. We compute the true embedding scores by applying
    the *α*entmax (sparse softmax) function to obtain *z*[*i*]. The sparse softmax
    function – as used previously in other tabular attention architectures in various
    modified forms – encourages sparsity by pushing smaller values to zero while preserving
    the signature softmax one-sum property.^([13](#Fn13))
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，![$$ {W}_{att}\in {\mathbb{R}}^{n_e\times {n}_e} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq30.png)
    是双线性注意力的权重矩阵。共享的双线性注意力函数 *ϕ*[att](*q*[*i*], *e*[*j*]) 通过执行查询向量、双线性注意力权重矩阵和嵌入之间的乘积来计算。转置的查询具有形状
    (1, *n*[*e*])；这个与 (*n*[*e*], *n*[*e*])-形状的权重矩阵的乘积产生一个 (1, *n*[*e*])-形状的矩阵；这个矩阵与
    (*n*[*e*], 1)-形状的嵌入矩阵的乘积产生一个 (1, 1)-形状的结果（即，一个标量）。因此，![$$ \tilde{z}_{i,j} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq31.png)
    存储了第 *i* 个神经元的查询向量和第 *j* 个特征的嵌入之间的注意力分数。因此，![$$ \tilde{z}_i\in {\mathbb{R}}^m
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq32.png)；也就是说，![$$
    \tilde{z}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq33.png)
    的长度为 *m* – 代表了第 *i* 个指数神经元与每个 *m* 个特征之间的注意力分数。我们通过应用 *α*entmax（稀疏softmax）函数来计算真实的嵌入分数，以获得
    *z*[*i*]。稀疏softmax函数 – 如先前在其他表格注意力架构的各种修改形式中所用 – 通过将较小的值推向零来鼓励稀疏性，同时保留softmax的签名一和性质.^([13](#Fn13))
- en: 'We can therefore calculate the interaction weights as follows:'
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以如下计算交互权重：
- en: '![$$ {w}_i={z}_i\bigotimes {v}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equad.png)'
  id: totrans-646
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_i={z}_i\bigotimes {v}_i $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equad.png)'
- en: 'Because *z*[*i*] ∈ *ℝ*^(*m*) and *v*[*i*] ∈ *ℝ*^(*m*), we have that *w*[*i*] ∈ *ℝ*^(*m*).
    This is the gate-like nature of the mechanism: *z*[*i*] serves as the “gate” determining
    which elements in *v*[*i*] “can pass” (i.e., as relevant for downstream tasks).
    This weight, informed by relevant features, is then used to “program” the behavior
    of the exponential neurons.'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 *z*[*i*] ∈ *ℝ*^(*m*) 和 *v*[*i*] ∈ *ℝ*^(*m*), 我们有 *w*[*i*] ∈ *ℝ*^(*m*). 这就是机制的门控特性：*z*[*i*]
    作为“门”来决定 *v*[*i*] 中的哪些元素“可以通行”（即，对于下游任务相关）。这个权重，由相关特征所指导，然后被用来“编程”指数神经元的行为了。
- en: 'We can reexpress the calculation for the *i*th exponential neuron more completely
    as follows, given the learned “atomics” *q*[*i*], *W*[att], and *v*[*i*] and the
    embeddings *e*:'
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 给定学习的“原子”*q*[*i*]，*W*[att]，*v*[*i*] 和嵌入 *e*，我们可以更完整地重新表达第 *i* 个指数神经元的计算如下：
- en: '![$$ {y}_i=\exp \left(\sum \limits_{j=1}^m{\left(\alpha \textrm{entmax}\left({q}_i^{\textrm{T}}{W}_{att}{e}_j\right)\bigotimes
    {v}_i\right)}_j{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equae.png)'
  id: totrans-649
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {y}_i=\exp \left(\sum \limits_{j=1}^m{\left(\alpha \textrm{entmax}\left({q}_i^{\textrm{T}}{W}_{att}{e}_j\right)\bigotimes
    {v}_i\right)}_j{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equae.png)'
- en: The authors adopt a multi-head version of this system. Let *K* be the number
    of heads and *o* be the number of exponential neurons. ![$$ {q}_i^{(k)} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq34.png)
    denotes the *k*th query key for the *i*th neuron, and likewise ![$$ {v}_i^{(k)}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq35.png) denotes
    the *k*th value key for the *i*th neuron. Note that *W*[att] is shared across
    heads. From each of the heads, we can derive a final output of the adaptive relation
    modeling module ***Y***, which is the concatenation of the outputs from each of
    the heads. (In this context, *a* ***⊕*** *b* refers to vector concatenation.)
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: 作者采用了该系统的多头版本。设 *K* 为头数，*o* 为指数神经元的数量。![查询键](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq34.png)
    表示第 *i* 个神经元的第 *k* 个查询键，同样![值键](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq35.png)
    表示第 *i* 个神经元的第 *k* 个值键。注意 *W*[att] 在所有头之间是共享的。从每个头中，我们可以得到自适应关系建模模块的最终输出 ***Y***，它是每个头输出拼接的结果。（在此上下文中，*a* ***⊕*** *b*
    表示向量拼接。）
- en: '![$$ {y}_i^{(k)}=\exp \left(\sum \limits_{j=1}^m{\left(\alpha \textrm{entmax}\left({q_i^{(k)}}^{\textrm{T}}{W}_{att}{e}_j\right)\bigotimes
    {v}_i^{(k)}\right)}_j{e}_j\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equaf.png)'
  id: totrans-651
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equaf.png)'
- en: '![$$ {Y}^{(k)}=\left[{y}_1^{(k)},{y}_2^{(k)},\dots, {y}_o^{(k)}\right] $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equag.png)'
  id: totrans-652
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equag.png)'
- en: '![$$ \boldsymbol{Y}={Y}^{(1)}\oplus {Y}^{(2)}\oplus \dots \oplus {Y}^{(K)}\Big\}
    $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equah.png)'
  id: totrans-653
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equah.png)'
- en: The complete adaptive relation modeling module is displayed in Figure [6-77](#Fig77).
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的自适应关系建模模块在图 [6-77](#Fig77) 中展示。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig77_HTML.png)'
  id: totrans-655
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig77_HTML.png)'
- en: A flowchart depicts the working of the adaptive relation modeling module. It
    flows as input embedding, multi-head bilinear attention alignment, sparse softmax,
    recalibration weight computation, shared interaction weight matrix, exponential
    transformation, and output interaction terms.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图展示了自适应关系建模模块的运作。流程包括输入嵌入、多头双线性注意力对齐、稀疏 softmax、重新校准权重计算、共享交互权重矩阵、指数变换和输出交互项。
- en: Figure 6-77
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-77
- en: Adaptive relation modeling module architecture. From Cai et al.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应关系建模模块架构。来自蔡等人。
- en: 'We have ![$$ \boldsymbol{Y}\in {\mathbb{R}}^{K\cdot o\cdot {n}_e} $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq36.png);
    the prediction module uses a multilayer perceptron to project this vector into
    the final desired output:'
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有 ![向量Y](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_IEq36.png)
    属于 ${\mathbb{R}}^{K\cdot o\cdot {n}_e}$；预测模块使用多层感知器将此向量投影到最终的期望输出：
- en: '![$$ \hat{y}= MLP\left(\boldsymbol{Y}\right) $$](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equai.png)'
  id: totrans-660
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/525591_1_En_6_Chapter/525591_1_En_6_Chapter_TeX_Equai.png)'
- en: The complete ARM-Net architecture is displayed in Figure [6-78](#Fig78).
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的 ARM-Net 架构在图 [6-78](#Fig78) 中展示。
- en: '![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig78_HTML.png)'
  id: totrans-662
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/525591_1_En_6_Chapter/525591_1_En_6_Fig78_HTML.png)'
- en: A flowchart depicts the working of the A R M-net model divided into 3 modules,
    preprocessing, adaptive relation modeling, and prediction. It flows as input embedding,
    exponential transformation, interaction terms, multilayer perception, relational
    representation, and prediction task.
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图展示了 A R M-net 模型的运作，分为 3 个模块：预处理、自适应关系建模和预测。流程包括输入嵌入、指数变换、交互项、多层感知、关系表示和预测任务。
- en: Figure 6-78
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-78
- en: Complete ARM-Net architecture. From Cai et al.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的 ARM-Net 架构。来自蔡等人。
- en: Overall, the ARM-Net architecture takes a more involved design toward modeling
    tabular data. Rather than openly applying attention in large-scale blocks and
    employing strategies like self-supervised pretraining, like previously discussed
    work, ARM-Net is highly “strict” about how attention mechanisms are utilized.
    ARM-Net explicitly models cross-features between embeddings using exponential
    neurons and dynamically determines how such modeling is performed using a multi-head
    attention mechanism. This “stringent” architecture ensures high parameter efficiency,
    as information flow is explicitly directed rather than set open and expected to
    be fully learned (e.g., through expensive self-supervised learning campaigns).
    Moreover, like previous work, the attention weights can be interpreted to understand
    how the model makes predictions on any sample.
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，ARM-Net架构在建模表格数据方面采用了更复杂的设计。它不像之前讨论的工作那样，在大型块中公开应用注意力机制并采用诸如自监督预训练等策略，ARM-Net对如何利用注意力机制非常“严格”。ARM-Net明确使用指数神经元来建模嵌入之间的交叉特征，并使用多头注意力机制动态确定如何执行此类建模。这种“严格”的架构确保了高参数效率，因为信息流被明确地引导，而不是开放并期望完全学习（例如，通过昂贵的自监督学习活动）。此外，像之前的工作一样，注意力权重可以解释以了解模型如何对任何样本进行预测。
- en: Cai et al. apply ARM-Net to several large benchmark tabular datasets and find
    the ARM-Net performs competitively with other deep tabular models with a reasonable
    parameter size (Table [6-14](#Tab14)).
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: Cai等人将ARM-Net应用于几个大型基准表格数据集，并发现ARM-Net在具有合理参数大小的条件下与其他深度表格模型具有竞争力（见表[6-14](#Tab14)）。
- en: Table 6-14
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 表6-14
- en: Performance of ARM-NET and ARM-Net+ (ARM-Net ensembled with a standard DNN)
    against other varieties of models on five benchmark models from different contexts
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: ARM-NET和ARM-Net+（ARM-Net与标准DNN的集成）在五个不同上下文基准模型上的性能与其他模型品种的比较
- en: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fign_HTML.gif)A table
    of 19 rows and 7 columns. Columns 3 to 7 are each subdivided into 2 sub-columns
    titled A U C and param. |'
  id: totrans-670
  prefs: []
  type: TYPE_TB
  zh: '| -![](../images/525591_1_En_6_Chapter/525591_1_En_6_Fign_HTML.gif)一个19行7列的表格。第3列到第7列各自细分为2个子列，标题为A
    U C和param. |'
- en: The authors provide the official repository at [https://​github.​com/​nusdbsystem/​ARM-Net](https://github.com/nusdbsystem/ARM-Net).
    It is, like SAINT, also written in PyTorch with no easily findable Keras or TensorFlow
    reimplementation. After cloning and installing dependencies, you can view examples
    of command-line scripts in `ARM-Net/run.sh`, where you can control the model architecture,
    training parameters, and the dataset used.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供了官方仓库[https://github.com/nusdbsystem/ARM-Net](https://github.com/nusdbsystem/ARM-Net)。它和SAINT一样，也是用PyTorch编写的，没有容易找到的Keras或TensorFlow重实现。克隆并安装依赖项后，您可以在`ARM-Net/run.sh`中查看命令行脚本的示例，在那里您可以控制模型架构、训练参数和使用的数据集。
- en: Key Points
  id: totrans-672
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: This chapter discussed the attention mechanism, its usage in transformer models,
    and the application of attention-based models for language, multimodal, and tabular
    context data.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了注意力机制，其在Transformer模型中的应用，以及基于注意力机制的语言、多模态和表格上下文数据的建模应用。
- en: Attention mechanisms allow for direct, explicit modeling of the dependencies
    between two sequences by associating every timestep pair with an attention score
    indicating the relevance of the cross-timestep dependency. This helps address
    signal propagation and dependency forgetting problems in recurrent models, which
    can hinder performance on advanced sequence-to-sequence tasks even with upgrades
    like long-term memory states and bidirectionality. Models like the Google Neural
    Machine Translation model (Wu et al. 2016) employed large LSTM stack encoders
    and decoders with attention mechanisms.
  id: totrans-674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意力机制允许通过将每个时间步对与一个表示跨时间步依赖相关性的注意力分数相关联，直接、明确地建模两个序列之间的依赖关系。这有助于解决循环模型中的信号传播和依赖遗忘问题，这些问题可能会阻碍高级序列到序列任务的表现，即使有长期记忆状态和双向性等升级。例如，Google神经机器翻译模型（Wu等人，2016年）采用了具有注意力机制的大型LSTM堆栈编码器和解码器。
- en: The transformer architecture (Vaswani et al. 2017) demonstrated that one could
    build successful sequence-to-sequence models without recurrent models, relying
    only upon attention as the core mechanism modeling sequence dependencies. Vaswani
    et al. use multi-head attention, in which multiple versions of the value, key,
    and query key are derived via linear layers; attention is computed between each
    value-key-query combination and concatenated and then mapped linearly to an output.
    This theoretically allows for multiple representations of the value, key, and
    query to be learned and processed. The transformer architecture uses self-attention
    in the encoder and decoder layers and cross-attention between the encoder and
    the decoder in autoregressive decoding. Later transformer-based models like BERT
    (Devlin et al. 2019) demonstrate that transformer models can significantly benefit
    from self-supervised pretraining, like masked language modeling and next sentence
    recognition tasks. Most all modern natural language models are transformers or
    heavily inspired by transformers. Some researchers (Merity 2019) express skepticism
    for the research craze around transformer models, demonstrating that much more
    sustainable and lightweight models can obtain good performance and advocating
    for greater valuing of reproducibility.
  id: totrans-675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变换器架构（Vaswani 等人，2017年）证明了可以不使用循环模型构建成功的序列到序列模型，仅依靠注意力作为核心机制来建模序列依赖关系。Vaswani
    等人使用了多头注意力，其中通过线性层导出多个版本的值、键和查询键；在每个值-键-查询组合之间计算注意力，然后将结果拼接并线性映射到输出。这从理论上允许学习并处理值、键和查询的多个表示。变换器架构在编码器和解码器层中使用自注意力，在自回归解码中使用编码器和解码器之间的交叉注意力。后来的基于变换器的模型，如
    BERT（Devlin 等人，2019年）表明，变换器模型可以从自监督预训练中受益，例如掩码语言建模和下一句识别任务。几乎所有现代自然语言模型都是变换器或深受变换器启发。一些研究人员（Merity
    2019年）对围绕变换器模型的研究热潮表示怀疑，证明了许多更可持续和轻量级的模型也能获得良好的性能，并倡导更加重视可重复性。
- en: 'Keras offers three native flavors of attention: Luong-style dot product attention
    with `L.Attention()`, Bahdanau-style additive attention with `L.AdditiveAttention()`,
    and Vaswani-style multi-head attention with `L.MultiHeadAttention`. By passing
    the `return_attention_scores=True` argument into the call of any of these layers,
    you can also collect the attention scores yielded in any one pass. This allows
    you to interpret how the particular layer attends to certain timesteps.'
  id: totrans-676
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Keras 提供了三种原生的注意力类型：Luong 风格的点积注意力 `L.Attention()`，Bahdanau 风格的加性注意力 `L.AdditiveAttention()`，以及
    Vaswani 风格的多头注意力 `L.MultiHeadAttention`。通过将 `return_attention_scores=True` 参数传递给这些层的调用，你还可以收集在任何一次传递中产生的注意力分数。这允许你解释特定层如何关注某些时间步。
- en: You can build attention layers into recurrent models for text and into recurrent
    heads for multi-head multimodal models to improve how text is modeled in relationship
    to tabular data.
  id: totrans-677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以将注意力层构建到文本的循环模型中，或者构建到多模态模型的循环头中，以改进文本与表格数据之间的关系建模。
- en: You can directly apply attention layers to embedded tabular data. This is a
    natural way to compute interactions between different features in the dataset.
  id: totrans-678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以直接将注意力层应用于嵌入的表格数据。这是计算数据集中不同特征之间交互的一种自然方式。
- en: There is a significant body of work applying attention-based deep learning models
    to tabular data. We covered four research papers in this chapter exemplifying
    work in the area.
  id: totrans-679
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在表格数据上应用基于注意力的深度学习模型的工作量相当可观。本章我们介绍了该领域四个研究论文，以例证该领域的研究成果。
- en: TabTransformer (Huang et al. 2020) embeds categorical features and applies a
    transformer block, which consists of a multi-head attention layer followed by
    a feed-forward layer with residual connections and layer normalization after each,
    several times. The derived features are concatenated with layer-normalized continuous
    features and processed with a standard MLP.
  id: totrans-680
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: TabTransformer（Huang 等人，2020年）将分类特征嵌入，并应用变换器块，该块由多个多头注意力层组成，每个层后面跟着一个具有残差连接和层归一化的前馈层，多次重复。导出的特征与层归一化的连续特征拼接，并使用标准的多层感知器（MLP）进行处理。
- en: TabNet (Arik and Pfister 2019) uses a similar multi-step decision model; at
    each step, the model “selects” a certain subset of features using an attention-like
    mechanism and then processes the features with several feed-forward layers and
    residual connections. TabNet employs self-supervised pretraining; certain values
    in the input are randomly masked, and TabNet must reconstruct the masked values.
    After the pretraining task, the TabNet decoder is discarded and replaced with
    a decision-making module, which can be used for fine-tuning.
  id: totrans-681
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: TabNet（Arik和Pfister，2019年）使用一个类似的多步骤决策模型；在每一步中，模型使用类似注意力的机制“选择”一定子集的特征，然后使用几个前馈层和残差连接处理这些特征。TabNet采用自监督预训练；输入中的某些值被随机掩码，TabNet必须重建这些掩码的值。在预训练任务之后，TabNet解码器被丢弃，并替换为一个决策模块，该模块可用于微调。
- en: SAINT (Somepalli et al. 2021) uses a multi-step architecture; each step consists
    of a standard transformer-like block followed by an intersample attention block.
    The intersample attention block computes relationships between samples, as opposed
    to computing relationships between features or timestamps of inputs. This allows
    the model to explicitly reason about information relative to other samples in
    its batch and in turn is informative from an explainability perspective.
  id: totrans-682
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: SAINT（Somepalli等人，2021年）使用一个多步骤架构；每个步骤由一个标准的类似transformer的块后跟一个样本间注意力块组成。样本间注意力块计算样本之间的关系，而不是计算输入特征或时间戳之间的关系。这使得模型能够明确地推理其批次中相对于其他样本的信息，从而在可解释性方面具有信息性。
- en: The ARM-Net model (Cai et al. 2021) does not use a transformer-like architecture,
    but rather uses attention mechanisms to control the behavior of novel exponential
    neurons, which allow for very direct learning of explicit interactions between
    features.
  id: totrans-683
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: ARM-Net模型（Cai等人，2021年）不使用类似transformer的架构，而是使用注意力机制来控制新型指数神经元的行怍，这允许非常直接地学习特征之间的显式交互。
- en: The next chapter will explore work in tree-based deep learning models, the other
    significant body of modern research on deep learning for tabular data.
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 下一章将探讨基于树型深度学习模型的研究工作，这是现代关于表格数据深度学习的另一项重要研究内容。
