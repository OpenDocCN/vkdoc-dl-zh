- en: '[PRE15]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: We can use a submodel to obtain the attention scores for some input and visualize
    the scores at each timestep (Listing [6-17](#PC17), Figures [6-35](#Fig35) to
    [6-37](#Fig37)).
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用子模型来获取某些输入的注意力分数，并在每个时间步长可视化这些分数（列表 [6-17](#PC17)，图 [6-35](#Fig35) 到 [6-37](#Fig37)）。
