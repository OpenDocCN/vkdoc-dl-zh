- en: '[PRE14]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Let’s begin by creating a model with the custom attention mechanism implemented
    in the first subsection of the previous section (Listing [6-16](#PC16), Figure
