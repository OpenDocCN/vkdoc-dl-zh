- en: 10. Logistic Regression from Scratch
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 从零开始实现逻辑回归
- en: In Chapter [2](463356_1_En_2_Chapter.xhtml), we developed a logistic regression
    model for binary classification with one neuron and applied it to two digits of
    the MNIST dataset. The actual Python code for the computational graph construction
    was just ten lines of code (excluding the part that performs the training of the
    model; review Chapter [2](463356_1_En_2_Chapter.xhtml), if you don’t remember
    what we did there).
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [2](463356_1_En_2_Chapter.xhtml) 章中，我们开发了一个具有一个神经元的逻辑回归模型，并将其应用于 MNIST 数据集的两个数字。构建计算图的实际
    Python 代码只有十行（不包括执行模型训练的部分；如果你不记得我们在那里做了什么，请回顾第 [2](463356_1_En_2_Chapter.xhtml)
    章节）。
- en: '[PRE0]'
  id: totrans-2
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This code is very compact and very quick to write. There is really a lot going
    on behind the scenes that you don’t see with this Python code. TensorFlow does
    a lot of things in the background that you may not be aware of. It will be very
    instructive to try to develop this exact model completely from scratch, mathematically
    and in Python, without using TensorFlow, to observe what is really going on. The
    next sections lay out the entire mathematical formulation required, and its implementation
    in Python (with just `numpy`). The goal is to build a model that we can train
    for binary classification.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码非常紧凑，编写起来也非常快。实际上，在幕后有很多你看不见的事情。TensorFlow 在幕后做了很多你可能不知道的事情。尝试完全从零开始，在数学和
    Python 中开发这个模型，不使用 TensorFlow，以观察真正发生的事情，这将非常有教育意义。接下来的几节将列出所需的整个数学公式，以及其在 Python
    中的实现（仅使用 `numpy`）。目标是构建一个我们可以用于二元分类的模型。
- en: I will not spend too much time on the notation or the ideas behind the mathematics,
    because you have seen these several times in previous chapters. The discussion
    of dataset preparation will also be very brief, as it has already been described
    in Chapter [2](463356_1_En_2_Chapter.xhtml).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会在符号或数学背后的思想上花费太多时间，因为你在前面的章节中已经见过这些内容好几次了。数据集准备部分的讨论也将非常简短，因为它已经在第 [2](463356_1_En_2_Chapter.xhtml)
    章中描述过了。
- en: I will not go through all the Python code line by line, because, if you read
    the previous chapters, you should have quite a good grasp of the practices and
    ideas used here. There are no real new concepts; you have already seen almost
    everything. Consider this chapter as a reference, to learn how to implement a
    logistic model completely from scratch. I strongly suggest that you try to understand
    all the mathematics and implement it in Python once. It is very instructive and
    will teach you a lot about debugging, about how important it is to write good
    code, and how comfortable libraries such as TensorFlow are.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会逐行解释所有的 Python 代码，因为如果你阅读了前面的章节，你应该已经对这里使用的实践和思想有了相当好的掌握。这里没有真正的新的概念；你几乎已经看到了所有内容。将这一章视为一个参考，学习如何从头开始实现一个逻辑模型。我强烈建议你尝试理解所有的数学，并在
    Python 中实现它一次。这将非常有教育意义，并会教会你很多关于调试的知识，以及编写好代码的重要性，以及像 TensorFlow 这样的库是如何方便的。
- en: Mathematics Behind Logistic Regression
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 逻辑回归背后的数学
- en: Let’s start with some notation and a reminder of what we are going to do. Our
    prediction will be a variable ![$$ \widehat{y} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq1.png)
    that can only be 0 or 1\. (We will indicate with 0 and 1 the two classes we are
    trying to predict.)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一些符号和将要做什么的提醒开始。我们的预测将是一个变量 ![$$ \widehat{y} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq1.png)，它只能为
    0 或 1。（我们将用 0 和 1 来表示我们试图预测的两个类别。）
- en: '![$$ Prediction\to \widehat{y}\in \left\{0,1\right\} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equa.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![$$ 预测 \to \widehat{y} \in \{0,1\} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equa.png)'
- en: What our method will give as output, or as a prediction, will be the probability
    of ![$$ \widehat{y} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq2.png)
    being 1, given the input case *x*. Or, in a more mathematical form,
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法将作为输出或预测给出的是，在输入案例 *x* 的条件下，![$$ \widehat{y} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq2.png)
    为 1 的概率。或者，用更数学的形式来说，
- en: '![$$ \widehat{y}=P\left(y=1|x\right) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equb.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \widehat{y}=P\left(y=1|x\right) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equb.png)'
- en: We will then define an input observation to be of class 1, if ![$$ \widehat{y}\ge
    0.5, $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq3.png)
    and of class 0, if ![$$ \widehat{y}&lt;0.5 $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq4.png).
    As we have in Chapter [2](463356_1_En_2_Chapter.xhtml) (see Figure [2-2](463356_1_En_2_Chapter.xhtml#Fig2)),
    we will consider *n*[*x*] inputs and one neuron with the sigmoid (indicated with
    *σ*) activation function . Our neuron output ![$$ \widehat{y} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq5.png)
    can be easily written for observation *i* as
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\widehat{y}}^{\left[i\right]}=\sigma \left({z}^{\left[i\right]}\right)=\sigma
    \left({\boldsymbol{w}}^T{\boldsymbol{x}}^{\left[i\right]}+b\right)=\sigma \left({w}_1{x}_1^{\left[i\right]}+{w}_2{x}_2^{\left[i\right]}+\dots
    +{w}_{n_x}{x}_{n_x}^{\left[i\right]}+b\right) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equc.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
- en: To find the best weights and bias , we will minimize the cost function that
    is written here for one observation
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \mathrm{\mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)=-\left({y}^{\left[i\right]}\log
    {\widehat{y}}^{\left[i\right]}+\left(1-{y}^{\left[i\right]}\right)\log \left(1-{\widehat{y}}^{\left[i\right]}\right)\right)
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equd.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: where, with *y*, we have indicated our labels. We will use the gradient descent
    algorithm, as described in Chapter [2](463356_1_En_2_Chapter.xhtml), so we will
    need the partial derivatives of our cost function with respect to the weights
    and the bias. You will remember that at iteration *n* + 1 (we will indicate here
    the iteration with an index in square brackets as subscript), we will update our
    weights from iteration *n* with the equations
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '!['
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: $$ {w}_{j,\left[n+1\right]}={w}_{j,\left[n\right]}-\gamma \frac{\partial \mathcal{L}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {w}_j} $$
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Eque.png)'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: and, for the bias,
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '!['
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: $$ {b}_{\left[n+1\right]}={b}_{j,\left[n\right]}-\gamma \frac{\partial \mathcal{L}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    b} $$
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equf.png)'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: where *γ* is the learning rate. The derivatives are not so complicated and can
    be calculated easily with the chain rule
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\mathrm{\partial \mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {w}_j}=\frac{\mathrm{\partial \mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {\widehat{y}}^{\left[i\right]}}\frac{d{\widehat{y}}^{\left[i\right]}}{d{z}^{\left[i\right]}}\frac{\partial
    {z}^{\left[i\right]}}{\partial {w}_j} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equg.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: as can *b*
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\mathrm{\partial \mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    b}=\frac{\mathrm{\partial \mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {\widehat{y}}^{\left[i\right]}}\frac{d{\widehat{y}}^{\left[i\right]}}{d{z}^{\left[i\right]}}\frac{\partial
    {z}^{\left[i\right]}}{\partial b} $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equh.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: Now, calculating the derivatives, you can verify that
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\mathrm{\partial \mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {\widehat{y}}^{\left[i\right]}}=-\frac{y^{\left[i\right]}}{{\widehat{y}}^{\left[i\right]}}+\frac{1-{y}^{\left[i\right]}}{1-{\widehat{y}}^{\left[i\right]}}
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equi.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{d{\widehat{y}}^{\left[i\right]}}{d{z}^{\left[i\right]}}={\widehat{y}}^{\left[i\right]}\left(1-{\widehat{y}}^{\left[i\right]}\right)
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equj.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial {z}^{\left[i\right]}}{\partial {w}_j}={x}_j^{\left[i\right]}
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equk.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: '![$$ \frac{\partial {z}^{\left[i\right]}}{\partial b}=1 $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equl.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
- en: When we put all this together, we get
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '!['
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: $$ {w}_{j,\left[n+1\right]}={w}_{j,\left[n\right]}-\gamma \frac{\partial \mathcal{L}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {w}_j}={w}_{j,\left[n\right]}-\gamma \left(1-{\widehat{y}}^{\left[i\right]}\right){x}_j^{\left[i\right]}
    $$
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equm.png)'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma \frac{\mathrm{\partial
    \mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    b}={b}_{j,\left[n\right]}-\gamma \left(1-{\widehat{y}}^{\left[i\right]}\right)
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equn.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: These equations are valid only for one training case; therefore, as we have
    already done, let’s generalize them to many training cases, remembering that we
    define our cost function *J* for many observations as
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ J\left(\boldsymbol{w},b\right)\kern0.6em =\frac{1}{m}\sum \limits_{i=1}^m\mathrm{\mathcal{L}}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equo.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: where, as usual, we have indicated the number of observations with *m*. The
    bold ***w*** is simply a vector of all the weights ![$$ \boldsymbol{w}=\left({w}_1,{w}_2,\dots,
    {w}_{n_x}\right) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_IEq6.png).
    We will also need our beloved matrix formalism here (which you have seen several
    times in previous chapters)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Z={W}^TX+B $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equp.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: where we have indicated with *B* a matrix of dimensions (1, *n*[*x*]) (to make
    it consistent with the notation we are using now here) and with all elements equal
    to *b* (in Python, we will not have to define it, because broadcasting will take
    care of it for us). *X* will contain our observations and features and have dimensions
    (*n*[*x*], *m*) (observations on columns, features on rows), and *W*^(*T*) will
    be the transpose of the matrix containing all the weights, which, in our cases,
    has the dimensions (1, *n*[*x*]), because it is transposed. Our neuron output
    in matrix form will be
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 其中我们用*B*表示一个维度为(1, *n*[*x*])的矩阵（为了与我们现在使用的符号保持一致），并且所有元素都等于*b*（在Python中，我们不需要定义它，因为广播机制会为我们处理它）。*X*将包含我们的观察和特征，并具有(*n*[*x*],
    *m*)的维度（观察在列上，特征在行上），而*W*^(*T*)将是包含所有权重的矩阵的转置，在我们的情况下，它具有(1, *n*[*x*])的维度，因为它已经被转置。我们的神经元输出以矩阵形式将是
- en: '![$$ \widehat{Y}=\sigma (Z) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equq.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![sigmoid函数的输出公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equq.png)'
- en: where the sigmoid function acts element by element. The equations for the partial
    derivatives now become
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 其中sigmoid函数是逐元素作用的。偏导数的方程现在变为
- en: '![$$ \frac{\partial J\left(w,b\right)}{\partial {w}_j}=\frac{1}{m}\sum \limits_{i=1}^m\frac{\partial
    \mathcal{L}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    {w}_j}=\frac{1}{m}\sum \limits_{i=1}^m\frac{\partial \mathcal{L}\left({\widehat{y}}^{\left[i\right]},\kern0.375em
    {y}^{\left[i\right]}\right)}{\partial {\widehat{y}}^{\left[i\right]}}\frac{d{\widehat{y}}^{\left[i\right]}}{d{z}^{\left[i\right]}}\frac{\partial
    {z}^{\left[i\right]}}{\partial {w}_j}=\frac{1}{m}\sum \limits_{i=1}^m\left(1-{\widehat{y}}^{\left[i\right]}\right){x}_j^{\left[i\right]}
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equr.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![关于w_j的偏导数公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equr.png)'
- en: and for *b*
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对于*b*
- en: '![$$ \frac{\partial J\left(w,b\right)}{\partial b}=\frac{1}{m}\sum \limits_{i=1}^m\frac{\partial
    \mathcal{L}\left({\widehat{y}}^{\left[i\right]},{y}^{\left[i\right]}\right)}{\partial
    b}=\frac{1}{m}\sum \limits_{i=1}^m\frac{\partial \mathcal{L}\left({\widehat{y}}^{\left[i\right]},\kern0.375em
    {y}^{\left[i\right]}\right)}{\partial {\widehat{y}}^{\left[i\right]}}\frac{d{\widehat{y}}^{\left[i\right]}}{d{z}^{\left[i\right]}}\frac{\partial
    {z}^{\left[i\right]}}{\partial b}=\frac{1}{m}\sum \limits_{i=1}^m\left(1-{\widehat{y}}^{\left[i\right]}\right)
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equs.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![关于b的偏导数公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equs.png)'
- en: These equations can be written in matrix form (where ∇[***w***] indicates the
    gradient with respect to ***w***) as
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方程可以写成矩阵形式（其中∇[***w***]表示相对于***w***的梯度）如下
- en: '![$$ {\nabla}_{\boldsymbol{w}}J\left(\boldsymbol{w},b\right)=\frac{1}{m}X{\left(\widehat{Y}-Y\right)}^T
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equt.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降算法中的梯度计算公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equt.png)'
- en: and for *b*,
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于*b*，
- en: '![$$ \frac{\partial J\left(\boldsymbol{w},b\right)}{\partial b}=\frac{1}{m}\sum
    \limits_{i=1}^m\left({\widehat{Y}}_i-{Y}_i\right) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equu.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![关于b的偏导数公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equu.png)'
- en: Finally, the equation we need to implement for the gradient descent algorithm
    is
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要实现用于梯度下降算法的方程是
- en: '![$$ {\boldsymbol{w}}_{\left[n+1\right]}={\boldsymbol{w}}_{\left[n\right]}-\gamma
    \frac{1}{m}X{\left(\widehat{Y}-Y\right)}^T $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equv.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![权重更新公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equv.png)'
- en: and for *b*,
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于*b*，
- en: '![$$ {b}_{\left[n+1\right]}={b}_{\left[n\right]}-\gamma \frac{1}{m}\sum \limits_{i=1}^m\left({\widehat{Y}}_i-{Y}_i\right)
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equw.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![权重更新公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equw.png)'
- en: 'At this point, you should already have gained a completely new appreciation
    of TensorFlow. The library does all this for you in the background, and, more
    important, all automatically. Remember: We are dealing here with just one neuron.
    You can easily see how complicated it can get when you want to calculate the same
    equations for networks with many layers and neurons, or for something as a convolutional
    or recurrent neural network.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你应该已经完全重新评价了 TensorFlow。库在后台为你做了所有这些，更重要的是，所有这些都是自动完成的。记住：我们在这里处理的是一个神经元。你可以很容易地看到，当你想要计算多层和神经元网络的相同方程式，或者对于卷积或循环神经网络这样的东西时，它会变得多么复杂。
- en: We now have all the mathematics we need to implement logistic regression completely
    from scratch. Let’s move on to some Python.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经有了从头实现逻辑回归所需的所有数学知识。让我们继续使用 Python。
- en: Python Implementation
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python 实现
- en: Let’s start importing the necessary libraries.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从导入必要的库开始。
- en: '[PRE1]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Note that we don’t import TensorFlow. We will not need it here. Let’s write
    a function for the sigmoid activation function `sigmoid(z)`.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们没有导入 TensorFlow。我们在这里不需要它。让我们编写一个用于 sigmoid 激活函数 `sigmoid(z)` 的函数。
- en: '[PRE2]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We will also require a function to initialize the weights. In this basic case,
    we can simply initialize everything with zeros. Logistic regression will work
    anyway.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还需要一个初始化权重的函数。在这个基本案例中，我们可以简单地用零初始化一切。逻辑回归仍然可以工作。
- en: '[PRE3]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Then we must implement the following equations, which we have calculated in
    the previous section:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们必须实现以下方程，这些方程我们在上一节中已经计算过：
- en: '![$$ {\nabla}_{\boldsymbol{w}}J\left(\boldsymbol{w},b\right)=\frac{1}{m}X{\left(\widehat{Y}-Y\right)}^T
    $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equx.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![梯度下降公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equx.png)'
- en: and
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: '![$$ \frac{\partial J\left(\boldsymbol{w},b\right)}{\partial b}=\frac{1}{m}\sum
    \limits_{i=1}^m\left({\widehat{Y}}_i-{Y}_i\right) $$](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equy.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/463356_1_En_10_Chapter/463356_1_En_10_Chapter_TeX_Equy.png)'
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now we need the function that will update the weights.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要更新权重的函数。
- en: '[PRE5]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The next function , `predict()`, creates a matrix of dimensions (1, *m*) that
    contains the predictions of the model given the inputs ***w*** and *b*.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个函数 `predict()` 创建一个维度为 (1, *m*) 的矩阵，包含模型根据输入 ***w*** 和 *b* 的预测。
- en: '[PRE6]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Finally, let’s put everything together in the `model()` function.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，让我们在 `model()` 函数中将所有东西组合起来。
- en: '[PRE7]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Test of the Model
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型测试
- en: After building the model, we must see what results it can achieve with some
    data. In the next section, I will first prepare the dataset we have already used
    in Chapter [2](463356_1_En_2_Chapter.xhtml), the two digits one and two from the
    MNIST dataset, and then train our neuron on the dataset and check what results
    we get.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建模型后，我们必须看看它用一些数据能取得什么结果。在下一节中，我将首先准备我们在第 [2](463356_1_En_2_Chapter.xhtml)
    章中已经使用过的数据集，即 MNIST 数据集中的两个数字一和二，然后在我们训练的数据集上训练神经元，并检查我们得到的结果。
- en: Dataset Preparation
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集准备
- en: 'As an optimizing metric, we chose accuracy, so let’s see what value we can
    reach with our model. We will use the same dataset as in Chapter [2](463356_1_En_2_Chapter.xhtml):
    a subset of the MNIST dataset consisting of the digits one and two. Here, you
    can find the code to get the data without explanation, because we have already
    dissected it extensively in Chapter [2](463356_1_En_2_Chapter.xhtml).'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 作为优化指标，我们选择了准确率，那么让我们看看我们的模型能达到什么值。我们将使用与第 [2](463356_1_En_2_Chapter.xhtml)
    章相同的数据库：MNIST 数据集的一个子集，包含数字一和二。在这里，你可以找到获取数据的代码，因为没有解释，因为我们已经在第 [2](463356_1_En_2_Chapter.xhtml)
    章中对其进行了广泛的剖析。
- en: 'The code we require is the following:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要的代码如下：
- en: '[PRE8]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Because we loaded all images in one block, we must create a dev and a train
    dataset (the split being 80% train and 20% dev), as follows:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们一次性加载了所有图像，我们必须创建一个开发和训练数据集（分割为 80% 的训练和 20% 的开发），如下所示：
- en: '[PRE9]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: As usual, we normalize the inputs,
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如同往常，我们对输入进行归一化，
- en: '[PRE10]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: bring the matrices in the right format,
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 将矩阵转换为正确的格式，
- en: '[PRE11]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: and define some constants.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 并定义一些常数。
- en: '[PRE12]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now let’s shift our labels (remember this from Chapter [2](463356_1_En_2_Chapter.xhtml)?).
    We have here 1 and 2, and we need 0 and 1.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们改变我们的标签（记得在第二章[2](463356_1_En_2_Chapter.xhtml)中提到的这一点吗？）。这里我们有1和2，我们需要0和1。
- en: '[PRE13]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Running the Test
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行测试
- en: Finally, we can test the model with the call
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以通过调用
- en: '[PRE14]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Although your numbers may vary, you should get an output similar to the following,
    in which I have omitted a few iterations for space reasons:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然你的数字可能不同，但你应该得到一个类似于以下输出的结果，我因为空间原因省略了一些迭代：
- en: '[PRE15]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Not so bad for a result.^([1](#Fn1))
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个结果来说，还算不错.^([1](#Fn1))
- en: Conclusion
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'You should really try to understand all the steps I have outlined in this chapter,
    to understand how much is done for you by a library. Remember: We have here an
    incredibly simple model with just one neuron. Theoretically, you could write all
    the equations for more complex network architectures, but this would be very difficult
    and extremely error-prone. TensorFlow calculates all the derivatives for you,
    regardless of the complexity of the network. In case you are interested in learning
    what TensorFlow can do, I suggest you read the official documentation, available
    at [`https://goo.gl/E5DpHK`](https://goo.gl/E5DpHK) .'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你真的应该尝试理解我在本章中概述的所有步骤，以了解库为你做了多少工作。记住：我们这里有一个极其简单的模型，只有一个神经元。理论上，你可以为更复杂的网络架构写出所有方程，但这会非常困难，并且极易出错。TensorFlow会为你计算所有导数，无论网络的复杂程度如何。如果你对了解TensorFlow能做什么感兴趣，我建议你阅读官方文档，可在[`https://goo.gl/E5DpHK`](https://goo.gl/E5DpHK)找到。
- en: Note
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: You should now appreciate a library such as TensorFlow and realize how much
    is going on in the background when you use it. You should also be aware of the
    complexity of the calculations and the importance of understanding the details
    of the algorithm and how these are implemented, to optimize and debug your models.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该能够欣赏像TensorFlow这样的库，并意识到当你使用它时在后台发生了多少事情。你也应该意识到计算的复杂性以及理解算法的细节和实现方式的重要性，以便优化和调试你的模型。
