- en: 1. Computational Graphs and TensorFlow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 计算图和 TensorFlow
- en: Before we delve into the extended examples later in this book, you will require
    a Python environment and a working knowledge of TensorFlow. Therefore, this chapter
    will show you how to install a Python environment ready to run the code in this
    book. Once that’s in place, I’ll cover the basics of the TensorFlow machine-learning
    library.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨本书后面的扩展示例之前，您需要准备一个 Python 环境并对 TensorFlow 有一定的了解。因此，本章将向您展示如何安装一个可以运行本书代码的
    Python 环境。一旦设置好，我将介绍 TensorFlow 机器学习库的基础知识。
- en: How to Set Up Your Python Environment
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何设置您的 Python 环境
- en: All the code in this book was developed with the Python distribution Anaconda
    and Jupyter notebooks. To set up Anaconda, first download and install it for your
    operating system. (I used Windows 10, but the code is not dependent on this system.
    Feel free to use a version for Mac, if you prefer.) You may retrieve Anaconda
    by accessing [`https://anaconda.org/`](https://anaconda.org/) .
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本书中的所有代码都是使用 Anaconda Python 发行版和 Jupyter 笔记本开发的。要设置 Anaconda，首先为您的操作系统下载并安装它。（我使用了
    Windows 10，但代码并不依赖于这个系统。如果您愿意，可以使用 Mac 版本。）您可以通过访问 [https://anaconda.org/](https://anaconda.org/)
    来获取 Anaconda。
- en: On the right side of the web page, you will find a Download Anaconda link, as
    shown in Figure [1-1](#Fig1) (top right).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在网页的右侧，您将找到一个下载 Anaconda 的链接，如图 [1-1](#Fig1)（右上角所示）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig1_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig1_HTML.jpg)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig1_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig1_HTML.jpg)'
- en: Figure 1-1
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: On the Anaconda web site, at the top right of the page, you will find a link
    to download the required software
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Anaconda 网站上，您可以在页面右上角找到一个下载所需软件的链接
- en: Simply follow the instructions to install it. When you start it after the installation,
    you will be presented with the screen shown in Figure [1-2](#Fig2). In case you
    don’t see this screen, simply click the Home link on the navigation pane at left.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地按照说明进行安装。安装完成后启动它，您将看到图 [1-2](#Fig2) 中所示的屏幕。如果您没有看到这个屏幕，只需在左侧导航面板上点击“主页”链接。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig2_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig2_HTML.jpg)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig2_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig2_HTML.jpg)'
- en: Figure 1-2
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: The screen you see when you start Anaconda
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 启动 Anaconda 时您看到的屏幕
- en: Python packages (like NumPy) are updated regularly and very often. It can happen
    that a new version of a package makes your code stop working. Functions are deprecated
    and removed, and new ones are added. To solve this problem, in Anaconda, you can
    create what is called an environment. This is basically a container that holds
    a specific Python version and specific versions of the packages you decide to
    install. With this, you can have a container for Python 2.7 and NumPy 1.10 and
    another with Python 3.6 and NumPy 1.13, for example. You may have to work with
    existing code that has been developed with Python 2.7, and, therefore, you must
    have a container with the right Python version. But, at the same time, it may
    be that you require Python 3.6 for your projects. With containers, you can ensure
    all this at the same time. Sometimes different packages conflict with each other,
    so you must be careful and avoid installing all packages you find interesting
    in your environment, especially if you are developing packages under a deadline.
    Nothing is worse than discovering that your code is no longer working, and you
    don’t know why.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: Python 包（如 NumPy）会定期更新，而且非常频繁。可能会发生新版本的包使您的代码停止工作。函数被弃用和移除，新的函数被添加。为了解决这个问题，在
    Anaconda 中，您可以创建一个所谓的环境。这基本上是一个容器，它包含您决定安装的特定 Python 版本和特定版本的包。有了这个，您可以为 Python
    2.7 和 NumPy 1.10 创建一个容器，例如，还可以为 Python 3.6 和 NumPy 1.13 创建另一个容器。您可能需要使用用 Python
    2.7 开发的现有代码，因此您必须有一个包含正确 Python 版本的容器。但是，同时，您可能还需要 Python 3.6 来进行您的项目。使用容器，您可以确保所有这些同时进行。有时不同的包之间可能会发生冲突，因此您必须小心，避免在环境中安装所有您感兴趣的包，尤其是如果您在截止日期下开发包的话。没有什么比发现您的代码不再工作，而且您不知道为什么更糟糕的了。
- en: Note
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: 'When you define an environment, try to install only the packages you really
    need, and pay attention when you update them, to make sure that any upgrade does
    not break your code. (Remember: Functions are deprecated, removed, added, or frequently
    changed.) Check the documentation of updates before upgrading, and do so only
    if you really need the updated features.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当您定义一个环境时，尽量只安装您真正需要的包，并且在更新它们时请注意，以确保任何升级都不会破坏您的代码。（记住：函数可能会被弃用、删除、添加或频繁更改。）在升级之前检查更新文档，并且只有在您确实需要更新的功能时才进行升级。
- en: 'You can create an environment from the command line, using the `conda` command
    , but to get an environment up and running for our code, everything can be done
    from the graphical interface. This is the method I will explain here, because
    it is the easiest. I suggest that you read the following page on the Anaconda
    documentation, to understand in detail how to work within its environment: [`https://conda.io/docs/user-guide/tasks/manage-environments.html`](https://conda.io/docs/user-guide/tasks/manage-environments.html)
    .'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以从命令行使用 `conda` 命令创建一个环境，但为了使环境为我们的代码运行起来，所有操作都可以通过图形界面完成。这就是我将在这里解释的方法，因为它是最简单的。我建议您阅读Anaconda文档中的以下页面，以详细了解如何在环境中工作：[`https://conda.io/docs/user-guide/tasks/manage-environments.html`](https://conda.io/docs/user-guide/tasks/manage-environments.html)。
- en: Creating an Environment
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建环境
- en: Let’s get started. First, click the Environments link (the one that has a small
    icon representing a box) from the left navigation panel (Figure [1-3](#Fig3)).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。首先，从左侧导航面板（图 [1-3](#Fig3)）中点击环境链接（带有表示盒子的图标的小图标）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig3_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig3_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig3_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig3_HTML.jpg)'
- en: Figure 1-3
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-3
- en: To create a new environment, you first must go into the Environments section
    of the application, by clicking the related link from the left navigation pane
    (indicated in the figure by a black rectangle)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个新环境，您首先必须通过点击左侧导航面板中的相关链接（图中的黑色矩形所示）进入应用程序的环境部分。
- en: Then click the Create button in the middle navigation pane (as indicated in
    Figure [1-4](#Fig4)).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然后点击中间导航面板中的创建按钮（如图 [1-4](#Fig4) 所示）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig4_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig4_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig4_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig4_HTML.jpg)'
- en: Figure 1-4
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-4
- en: To create a new environment, you must click the Create button (indicated with
    a plus sign) from the middle navigation pane. In the figure, a red arrow indicates
    the location of the button.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个新的环境，您必须从中间导航面板中点击创建按钮（在图中用红色箭头指示按钮的位置）。
- en: When you click the Create button, a small window will pop up (see in Figure
    [1-5](#Fig5)).
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当您点击创建按钮时，会弹出一个小的窗口（见图 [1-5](#Fig5)）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig5_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig5_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig5_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig5_HTML.jpg)'
- en: Figure 1-5
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-5
- en: The window you will see when you click the Create button indicated in Figure
    [1-4](#Fig4)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当您点击图 [1-4](#Fig4) 中指示的创建按钮时，您将看到的窗口
- en: You can choose any name. In this book, I used the name *tensorflow*. As soon
    as you type a name, the Create button becomes active (and green). Click it and
    wait a few minutes until all the necessary packages are installed. Sometimes,
    you may get a pop-up window telling you that a new version of Anaconda is available
    and asking if you want to upgrade. Feel free to click yes. Follow the on-screen
    instructions until Anaconda navigator starts again, in the event you received
    this message and clicked yes.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以选择任何名称。在这本书中，我使用了名称 *tensorflow*。一旦您输入一个名称，创建按钮就会变为激活状态（并且是绿色的）。点击它，等待几分钟，直到所有必要的包都安装完成。有时，您可能会收到一个弹出窗口，告诉您Anaconda有一个新版本可用，并询问您是否想要升级。请随意点击“是”。按照屏幕上的说明操作，直到Anaconda导航器再次启动，如果您收到此消息并点击了“是”。
- en: 'We are not done yet. Click again the Environments link on the left navigation
    pane (as shown in Figure [1-3](#Fig3)), then click the name of the newly created
    environment. If you’ve followed the instructions until now, you should see an
    environment named “tensorflow.” After a few seconds, you will see on the right
    panel a list of all installed Python packages that you will have at your disposal
    in the environment. Now we must install some additional packages: NumPy, matplotlib,
    TensorFlow, and Jupyter. To do this, first select Not installed from the drop-down
    menu , as illustrated in Figure [1-6](#Fig6).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还没有完成。再次点击左侧导航面板上的“环境”链接（如图 [1-3](#Fig3) 所示），然后点击新创建的环境名称。如果您到目前为止都遵循了指示，您应该看到一个名为“tensorflow”的环境。几秒钟后，您将在右侧面板看到一个列表，其中包含您将在环境中可用的所有已安装的
    Python 包。现在我们必须安装一些额外的包：NumPy、matplotlib、TensorFlow 和 Jupyter。为此，首先从下拉菜单中选择“未安装”，如图
    [1-6](#Fig6) 所示。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig6_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig6_HTML.jpg)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig6_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig6_HTML.jpg)'
- en: Figure 1-6
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-6
- en: Selecting the Not installed value from the drop-down menu
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择“未安装”值
- en: Next, in the Search Packages field, type the package name you want to install
    (Figure [1-7](#Fig7) shows that `numpy` has been selected).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在“搜索包”字段中输入您想要安装的包名（图 [1-7](#Fig7) 显示已选择了 `numpy`）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig7_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig7_HTML.jpg)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig7_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig7_HTML.jpg)'
- en: Figure 1-7
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-7
- en: Type “numpy” in the search field, to include it in the package repository
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在搜索字段中输入“numpy”，以便将其包含在包存储库中
- en: Anaconda navigator will automatically show you all packages that have the word
    *numpy* in the title or in the description. Click the small square to the left
    of the name of the package that has the name *numpy*. It will become a small downward-pointing
    arrow (indicating that it is marked for installation). Then you can click the
    green Apply button at the lower right corner of the interface (see Figure [1-8](#Fig8)).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda 导航器将自动显示所有标题或描述中包含单词 *numpy* 的包。点击名称为 *numpy* 的包名称左侧的小方块。它将变成一个小向下箭头（表示已标记为安装）。然后您可以在界面的右下角点击绿色的“应用”按钮（见图
    [1-8](#Fig8)）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig8_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig8_HTML.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig8_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig8_HTML.jpg)'
- en: Figure 1-8
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-8
- en: After you have selected the `numpy` package for installation, click the green
    Apply button. The button is at the lower right of the interface.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在您选择了要安装的 `numpy` 包之后，点击界面右下角的绿色“应用”按钮。按钮位于界面底部右侧。
- en: Anaconda navigator is smart enough to determine if other packages are needed
    by `numpy`. You may get an additional window asking if it is OK to install the
    additional packages . Just click Apply. Figure [1-9](#Fig9) shows what this window
    looks like.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: Anaconda 导航器足够智能，可以确定 `numpy` 是否需要其他包。您可能会得到一个额外的窗口，询问是否可以安装附加包。只需点击“应用”。图 [1-9](#Fig9)
    显示了这个窗口的外观。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig9_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig9_HTML.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig9_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig9_HTML.jpg)'
- en: Figure 1-9
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-9
- en: When installing a package, the Anaconda navigator will check if what you want
    to install depends on other packages that are not installed. In such a case, it
    will suggest that you install the missing (but necessary) packages from an additional
    window. In our case, 52 additional packages were required by the NumPy library
    on a newly installed system. Simply click Apply to install all of them.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在安装一个包时，Anaconda 导航器会检查您想要安装的包是否依赖于尚未安装的其他包。在这种情况下，它将建议您从额外的窗口中安装缺失的（但必需的）包。在我们的例子中，新安装的系统需要
    NumPy 库的 52 个附加包。只需点击“应用”即可安装所有这些包。
- en: You must install the following packages to be able to run the code in this book.
    (I added within parentheses the versions I used for testing the code in this book;
    subsequent versions are fine.)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须安装以下包才能运行本书中的代码。（我在括号中添加了我在本书中测试代码时使用的版本；后续版本也可以。）
- en: '`numpy` (1.13.3): For doing numerical calculations'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`numpy` (1.13.3)：用于进行数值计算'
- en: '`matplotlib` (2.1.1): To produce nice plots, as the ones you will see in this
    book'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`matplotlib` (2.1.1)：为了生成漂亮的图表，就像您将在本书中看到的那样'
- en: '`scikit-learn` (0.19.1): This package contains all the libraries related to
    machine learning and that we use, for example, to load datasets.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`scikit-learn`（0.19.1）：此包包含所有与机器学习相关的库，我们使用这些库，例如，来加载数据集。'
- en: '`jupyter` (1.0.0): To be able to use the Jupyter notebooks'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`jupyter`（1.0.0）：为了能够使用Jupyter笔记本'
- en: Installing TensorFlow
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安装TensorFlow
- en: 'Installing TensorFlow is slightly more complex. The best way to do this is
    to follow the instructions given by the TensorFlow team, available at the following
    address: [`www.tensorflow.org/install/`](http://www.tensorflow.org/install/) .'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 安装TensorFlow稍微复杂一些。最好的方法是遵循TensorFlow团队提供的说明，这些说明可在以下地址找到：[`www.tensorflow.org/install/`](http://www.tensorflow.org/install/)。
- en: On this page, click your operating system, and you will receive all the information
    you need. I will provide here instructions for Windows, but the same can be done
    using a macOS or Ubuntu (Linux) system. The installation with Anaconda is not
    officially supported but works perfectly (it is community supported) and is the
    easiest way to get up and running and check the code in this book. For more advanced
    applications, you may want to consider other installation options. (For that,
    you will have to check the TensorFlow web site.) To begin, go to the Start menu
    in Windows and type “anaconda.” Under Apps, you should see the Anaconda Prompt
    item, as in Figure [1-10](#Fig10).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在此页面上，点击您的操作系统，您将获得所需的所有信息。我将在此提供Windows的说明，但同样可以使用macOS或Ubuntu（Linux）系统完成。使用Anaconda的安装不受官方支持，但运行完美（由社区支持）并且是启动和运行以及检查本书中代码的最简单方法。对于更高级的应用，您可能需要考虑其他安装选项。（为此，您需要检查TensorFlow网站。）首先，在Windows的开始菜单中输入“anaconda”。在“应用”下，您应该看到Anaconda
    Prompt项，如图[1-10](#Fig10)所示。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig10_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig10_HTML.jpg)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig10_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig10_HTML.jpg)'
- en: Figure 1-10
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-10
- en: 'If you type “anaconda” in the Start menu search field in Windows 10, you should
    see at least two entries: Anaconda Navigator, where you created the TensorFlow
    environment, and Anaconda Prompt'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在Windows 10的开始菜单搜索字段中输入“anaconda”，您应该至少看到两个条目：Anaconda Navigator，您在其中创建了TensorFlow环境，以及Anaconda
    Prompt。
- en: Start the Anaconda Prompt. A command line interface should appear (see Figure
    [1-11](#Fig11)). The difference between this and the simple `cmd.exe` command
    prompt is that here, all the Anaconda commands are recognized, without setting
    up any Windows environment variable.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 启动Anaconda Prompt。应该会出现一个命令行界面（见图[1-11](#Fig11)）。与简单的`cmd.exe`命令提示符不同的是，在这里，所有Anaconda命令都被识别，无需设置任何Windows环境变量。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig11_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig11_HTML.jpg)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig11_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig11_HTML.jpg)'
- en: Figure 1-11
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-11
- en: This is what you should see when you select Anaconda Prompt. Note that the user
    name will be different. You will see not `umber` (my username) but your username.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 选择Anaconda Prompt时，您应该看到的是这个。请注意，用户名将不同。您将看到不是`umber`（我的用户名）而是您的用户名。
- en: 'At the command prompt , you first must activate your new “tensorflow” environment.
    This is necessary to let the Python installation know in which environment you
    want to install TensorFlow. To do this, simply type the following command: `activate
    tensorflow`. Your prompt should change to this: `(tensorflow) C:\Users\umber>`.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在命令提示符中，您首先必须激活您的新“tensorflow”环境。这是必要的，以便让Python安装知道您想在哪个环境中安装TensorFlow。为此，只需输入以下命令：`activate
    tensorflow`。您的提示符应更改为：`(tensorflow) C:\Users\umber>`。
- en: 'Remember: Your username will be different (you will see not umber in your prompt
    but your username). I will assume here that you will install the standard TensorFlow
    version that uses only the CPU (and not the GPU) version. Just type the following
    command: `pip install --ignore-installed --upgrade tensorflow`.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：您的用户名将不同（您在提示中看到的不是数字，而是用户名）。在此，我将假设您将安装仅使用CPU（而不是GPU）的标准TensorFlow版本。只需输入以下命令：`pip
    install --ignore-installed --upgrade tensorflow`。
- en: Now let the system install all the necessary packages. This may take a few minutes
    (depending on several factors, such as your computer speed or your Internet connection).
    You should not receive any error message. Congratulations! Now you have an environment
    in which you can run code using TensorFlow.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让系统安装所有必要的包。这可能需要几分钟（取决于多个因素，例如您的计算机速度或您的互联网连接）。您不应收到任何错误消息。恭喜！现在您有一个可以在其中使用TensorFlow运行代码的环境。
- en: Jupyter Notebooks
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Jupyter Notebooks
- en: 'The last step to be able to type code and let it run is to start a Jupyter
    notebook. The Jupyter notebook can be described (according to the official web
    site) as follows:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 能够输入代码并运行的最后一步是启动Jupyter笔记本。Jupyter笔记本可以（根据官方网站的描述）描述如下：
- en: '*The Jupyter Notebook is an open-source web application that allows you to
    create and share documents that contain live code, equations, visualizations and
    narrative text. Uses include: data cleaning and transformation, numerical simulation,
    statistical modeling, data visualization, machine learning, and much more.*'
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*Jupyter Notebook是一个开源的Web应用程序，它允许你创建和分享包含实时代码、方程、可视化以及叙述性文本的文档。其用途包括：数据清洗和转换、数值模拟、统计建模、数据可视化、机器学习等。*'
- en: It is widely used in the machine learning community, and it is a good idea to
    learn how to use it. Check the Jupyter project web site at [`http://jupyter.org/`](http://jupyter.org/)
    .
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 它在机器学习社区中得到了广泛的应用，学习如何使用它是件好事。请检查[`http://jupyter.org/`](http://jupyter.org/)上的Jupyter项目网站。
- en: 'This site is very instructive and includes many examples of what is possible.
    All the code you find in this book has been developed and tested using Jupyter
    notebooks. I assume that you already have some experience with this web-based
    development environment. In case you need a refresher, I suggest you check the
    documentation you can find on the Jupyter project web site at the following address:
    [`http://jupyter.org/documentation.html`](http://jupyter.org/documentation.html)
    .'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 该网站非常具有指导性，并包含了许多可能的示例。本书中找到的所有代码都是使用Jupyter笔记本开发和测试的。我假设你已经对这个基于Web的开发环境有一些经验。如果你需要复习，我建议你查看以下地址上Jupyter项目网站上的文档：[`http://jupyter.org/documentation.html`](http://jupyter.org/documentation.html)。
- en: To start a notebook in your new environment, you must go back to Anaconda navigator
    in the Environments section (see Figure [1-3](#Fig3)). Click the triangle to the
    right of your “tensorflow” environment (in case you have used a different name,
    you will have to click the triangle to the right of your new environment), as
    shown in Figure [1-12](#Fig12). Then click Open with Jupyter Notebook.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 要在你的新环境中启动笔记本，你必须回到Anaconda导航器中的“环境”部分（见图[1-3](#Fig3)）。点击“tensorflow”环境右侧的三角形（如果你使用了不同的名称，你必须点击新环境右侧的三角形），如图[1-12](#Fig12)所示。然后点击“使用Jupyter
    Notebook打开”。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig12_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig12_HTML.jpg)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig12_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig12_HTML.jpg)'
- en: Figure 1-12
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-12
- en: To start a Jupyter notebook in your new environment, click the triangle to the
    right of the “tensorflow” environment name and click Open with Jupyter Notebook
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 要在你的新环境中启动Jupyter笔记本，点击“tensorflow”环境名称右侧的三角形，然后点击“使用Jupyter Notebook打开”。
- en: Your browser will start with a list of all the folders you have in your user
    folder. (If you are using Windows, this is usually located under `c:\Users\<YOUR
    USER NAME>`, within which you must substitute `<YOUR USER NAME>` with your username.)
    From there, you should navigate to a folder where you want to save your notebook
    files and from which you can create a new notebook by clicking the New button,
    as illustrated in Figure [1-13](#Fig13).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 浏览器将启动一个列表，显示你用户文件夹中的所有文件夹。（如果你使用的是Windows，通常位于`c:\Users\<YOUR USER NAME>`下，其中你必须将`<YOUR
    USER NAME>`替换为你的用户名。）从那里，你应该导航到你想要保存笔记本文件的文件夹，并从该文件夹创建一个新的笔记本，点击“新建”按钮，如图[1-13](#Fig13)所示。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig13_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig13_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig13_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig13_HTML.jpg)'
- en: Figure 1-13
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-13
- en: To create a new notebook, click the New button located at the top-right corner
    of the page and select Python 3
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建一个新的笔记本，点击页面右上角的“新建”按钮，并选择Python 3。
- en: A new page will open that should look like the one in Figure [1-14](#Fig14).
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 将会打开一个新页面，它应该看起来像图[1-14](#Fig14)中的那样。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig14_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig14_HTML.jpg)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig14_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig14_HTML.jpg)'
- en: Figure 1-14
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-14
- en: When you create an empty notebook, an empty page will open that should look
    like this one
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 当你创建一个空白的笔记本时，将打开一个空白的页面，它应该看起来像这样。
- en: For example, you can type the following code in the first “cell” (the rectangular
    box in which you can type).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以在第一个“单元”中输入以下代码（你可以输入的矩形框）。
- en: '[PRE0]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To evaluate the code , simply press Shift+Enter, and you should see the result
    (3) immediately (Figure [1-15](#Fig15)).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 要评估代码，只需按 Shift+Enter，您应该会立即看到结果（3）（图 [1-15](#Fig15)）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig15_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig15_HTML.jpg)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig15_HTML.jpg](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig15_HTML.jpg)'
- en: Figure 1-15
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-15
- en: After typing some code in the cell, pressing Shift+Enter will evaluate the code
    in the cell
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在单元格中输入一些代码后，按 Shift+Enter 将评估单元格中的代码
- en: The preceding code gives the result of `a+b`, that is, `3`. A new empty cell
    for you to type in is automatically created after the result is given. For more
    information on how to add comments, equations, inline plots, and much more, I
    suggest that you visit the Jupyter web site and check the documentation provided.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码给出了`a+b`的结果，即`3`。在给出结果后，会自动为你创建一个新空单元格用于输入。有关如何添加注释、方程、内联图表等更多信息，我建议您访问
    Jupyter 网站，并查看提供的文档。
- en: Note
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: 'In case you forget the folder your notebook is in, you can check the URL of
    the page. For example, in my case, I have `http://localhost:8888/notebooks/Documents/Data%20Science/Projects/Applied%20advanced%20deep%20learning%20(book)/chapter%201/AADL%20-%20Chapter%201%20-%20Introduction.ipynb`.
    You will notice that the URL is simply a concatenation of the folders in which
    the notebook is located, separated by a forward slash. A `%20` character simply
    means a space. In this case, my notebook is in the folder: `Documents/Data Science/Projects/…`
    and so forth. I often work with several notebooks at the same time, and it is
    useful to know where each notebook is located in case you forget (I sometimes
    do).'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您忘记了笔记本所在的文件夹，您可以检查页面的 URL。例如，在我的情况下，我有 `http://localhost:8888/notebooks/Documents/Data%20Science/Projects/Applied%20advanced%20deep%20learning%20(book)/chapter%201/AADL%20-%20Chapter%201%20-%20Introduction.ipynb`。您会注意到
    URL 只是笔记本所在文件夹的简单连接，由正斜杠分隔。一个 `%20` 字符简单地表示一个空格。在这种情况下，我的笔记本位于文件夹：`Documents/Data
    Science/Projects/…` 等等。我经常同时使用几个笔记本，知道每个笔记本的位置很有用，以防您忘记（我有时会忘记）。
- en: Basic Introduction to TensorFlow
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 基本介绍
- en: Before starting to use TensorFlow, you must understand the philosophy behind
    it. The library is heavily based on the concept of computational graphs, and unless
    you understand how those work, you cannot understand how to use the library. I
    will give you a quick introduction to computational graphs and show you how to
    implement simple calculations with TensorFlow. At the end of the next section,
    you should understand how the library works and how we will use it in this book.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始使用 TensorFlow 之前，您必须理解其背后的哲学。该库高度基于计算图的概念，除非您理解这些是如何工作的，否则您无法理解如何使用该库。我将为您快速介绍计算图，并展示如何使用
    TensorFlow 实现简单的计算。在下一节的末尾，您应该理解库的工作原理以及我们将在本书中如何使用它。
- en: Computational Graphs
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算图
- en: 'To understand how TensorFlow works, you must understand what a computational
    graph is. A computational graph is a graph in which each node corresponds to an
    operation or a variable. Variables can feed their values into operations, and
    operations can feed their results into other operations. Usually, nodes are plotted
    as a circle (or ellipsis), with variable names or operations inside, and when
    one node’s value is the input to another node, an arrow goes from one to another.
    The simplest graph that can exist is simply one with a single node that is simply
    a variable. (Remember: A node can be a variable or an operation.) The graph in
    Figure [1-16](#Fig16) simply computes the value of the variable *x*.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解 TensorFlow 的工作原理，您必须理解什么是计算图。计算图是一个图，其中每个节点对应一个操作或一个变量。变量可以将它们的值输入到操作中，而操作可以将它们的输出结果输入到其他操作中。通常，节点被绘制为一个圆圈（或省略号），其中包含变量名或操作，当一个节点的值是另一个节点的输入时，从一端指向另一端有一条箭头。可以存在的最简单的图只是一个包含单个节点的图，该节点只是一个变量。（记住：节点可以是变量或操作。）图
    [1-16](#Fig16) 简单地计算了变量 *x* 的值。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig16_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig16_HTML.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig16_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig16_HTML.png)'
- en: Figure 1-16
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-16
- en: The simplest graph that we can build, showing a simple variable
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以构建的最简单的图，显示了一个简单的变量
- en: 'Not very interesting! Now let’s consider something slightly more complex, such
    as the sum of two variables *x* and *y*: *z* = *x* + *y*. It can be done as in
    the following graph (Figure [1-17](#Fig17)):'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 没那么有趣！现在让我们考虑一个稍微复杂一点的情况，比如两个变量 *x* 和 *y* 的和：*z* = *x* + *y*。它可以像以下图（图 [1-17](#Fig17)）那样完成：
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig17_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig17_HTML.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig17_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig17_HTML.png)'
- en: Figure 1-17
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-17
- en: A basic computational graph for the sum of two variables
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 两个变量的和的基本计算图
- en: The nodes at the left of Figure [1-17](#Fig17) (the ones with *x* and *y* inside)
    are variables, while the bigger node indicates the sum of the two variables. The
    arrows show that the two variables, *x* and *y*, are inputs to the third node.
    The graph should be read (and computed) in topological order, which means that
    you should follow the arrows that will indicate in which order you have to compute
    the different nodes. The arrow will also tell you the dependencies between the
    nodes. To evaluate *z*, you first must evaluate *x* and *y*. We can also say that
    the node that performs the sum is dependent on the input nodes.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [1-17](#Fig17) 左侧的节点（包含 *x* 和 *y* 的节点）是变量，而较大的节点表示两个变量的和。箭头显示变量 *x* 和 *y*
    是第三个节点的输入。图应按拓扑顺序阅读（和计算），这意味着你应该遵循箭头来指示计算不同节点的顺序。箭头还会告诉你节点之间的依赖关系。要评估 *z*，你首先必须评估
    *x* 和 *y*。我们也可以说执行求和的节点依赖于输入节点。
- en: An important aspect to understand is that such a graph only defines the operations
    (in this case, the sum) to perform on two input values (in this case, *x* and
    *y*) to obtain a result (in this case, *z*). It basically defines the “how.” You
    must assign values to the input *x* and *y* and then perform the sum to obtain
    *z*. The graph will give you a result only when you evaluate all the nodes.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 一个重要的理解方面是，这样的图只定义了对两个输入值（在这种情况下，*x* 和 *y*）执行的操作（在这种情况下，求和）以获得一个结果（在这种情况下，*z*）。它基本上定义了“如何”。你必须为输入
    *x* 和 *y* 分配值，然后执行求和以获得 *z*。只有当你评估所有节点时，图才会给出结果。
- en: Note
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: In this book, I will refer to the “construction” phase of a graph, when defining
    what each node is doing, and the “evaluation” phase, when we will actually evaluate
    the related operations.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，我将指代图的“构建”阶段，即定义每个节点的作用，以及“评估”阶段，即我们实际评估相关操作的时候。
- en: 'This is a very important aspect to understand. Note that the input variables
    do not need to be real numbers. They can be matrices, vectors, and so on. (We
    will mostly use matrices in this book.) A slightly more complex example can be
    found in Figure [1-18](#Fig18) and uses a graph to calculate the quantity *A*(*x* + *y*),
    given three input quantities: *x*,  *y*, and *A*.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常重要的理解方面。请注意，输入变量不需要是实数。它们可以是矩阵、向量等等。（本书中我们主要使用矩阵。）一个稍微复杂一点的例子可以在图 [1-18](#Fig18)
    中找到，它使用一个图来计算三个输入量：*x*、*y* 和 *A* 给定的量 *A*(*x* + *y*)。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig18_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig18_HTML.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig18_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig18_HTML.png)'
- en: Figure 1-18
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-18
- en: '*A computational graph to calculate the quantity* *A*(*x* + *y*), *given three
    input quantities: x*, *y*, *and A*'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '*计算量* *A*(*x* + *y*)的*计算图，给定三个输入量：*x*、*y* 和 *A*'
- en: We can evaluate this graph by assigning values to the input nodes (in this case,
    *x*, *y*, and *A*) and evaluate the nodes through the graph. For example, if you
    consider the graph in Figure [1-18](#Fig18) and assign the values *x* = 1, *y* = 3,
    and *A* = 5, we will get the result *b* = 20 (as plotted in Figure [1-19](#Fig19)).
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过为输入节点（在这种情况下，*x*、*y* 和 *A*）分配值并通过图评估节点来评估这个图。例如，如果你考虑图 [1-18](#Fig18)
    并将值 *x* = 1、*y* = 3 和 *A* = 5 分配给它们，我们将得到结果 *b* = 20（如图 [1-19](#Fig19) 所示）。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig19_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig19_HTML.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig19_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig19_HTML.png)'
- en: Figure 1-19
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-19
- en: To evaluate the graph in Figure [1-18](#Fig18), we must assign values to the
    input nodes x, y, and A and then evaluate the nodes through the graph
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 要评估图 [1-18](#Fig18)，我们必须为输入节点 x、y 和 A 分配值，然后通过图评估节点
- en: 'A neural network is basically a very complicated computational graph, in which
    each neuron is composed by several nodes in the graph that feed its output to
    a certain number of other neurons, until a certain output is reached. In the next
    section, we will build the simplest neural network of all: one with a single neuron.
    Even with such a simple network, we will be able to do some pretty fun stuff.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络基本上是一个非常复杂的计算图，其中每个神经元由图中的一些节点组成，这些节点将它们的输出馈送到一定数量的其他神经元，直到达到某个输出。在下一节中，我们将构建最简单的神经网络：只有一个神经元的网络。即使这样的简单网络，我们也能做一些相当有趣的事情。
- en: '`TensorFlow` allows you to build very complicated computational graphs very
    easily. And by construction, it separates their evaluation from the construction.
    (Remember that to compute a result, you must assign values and evaluate all the
    nodes.) In the next sections, I will show you how this works: how to build computational
    graphs and how to evaluate them.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '`TensorFlow` 允许你非常容易地构建非常复杂的计算图。并且通过构造，它将它们的评估与构建分离。（记住，为了计算结果，你必须分配值并评估所有节点。）在下一节中，我将向你展示它是如何工作的：如何构建计算图以及如何评估它们。'
- en: Note
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Remember that `tensorflow` first builds a computational graph (in the so-called
    construction phase) but does not automatically evaluate it. The library keeps
    the two steps separate, so that you can compute your graph several times with
    different inputs, for example.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，`tensorflow` 首先构建一个计算图（在所谓的构建阶段），但不会自动评估它。库将这两个步骤分开，这样你就可以用不同的输入多次计算你的图，例如。
- en: Tensors
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 张量
- en: 'The basic unit of data handled by t`ensorflow` is—try to guess from its name—a
    tensor. A tensor is simply a collection of primitive types (such as, for example,
    floating numbers) shaped as an *n*-dimensional array. Here are some examples (with
    relative Python definitions) of tensors:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '`tensorflow` 处理数据的基本单位——从其名称中尝试猜测——是一个张量。张量简单地是一个原始类型（例如，浮点数）的集合，形状为一个 *n*-维数组。以下是一些张量的示例（带有相应的
    Python 定义）：'
- en: 1 → a scalar
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1 → 一个标量
- en: '[1,2,3] → a vector'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[1,2,3] → 一个向量'
- en: '[[1,2,3], [4,5,6]] → a matrix or a two-dimensional array'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[[1,2,3], [4,5,6]] → 一个矩阵或一个二维数组'
- en: A tensor has a static type and dynamic dimensions. You cannot change its type
    while evaluating it, but the dimensions can be changed dynamically before evaluating
    it. (Basically, you declare the tensors without specifying some of the dimensions,
    and `tensorflow` will infer the dimensions from the input values.) Usually, one
    talks about the rank of a tensor, which is simply the number of dimensions of
    the tensor (whereas a scalar is intended to have a rank of 0). Table [1-1](#Tab1)
    may help in understanding what the different ranks of tensors are.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 张量有一个静态类型和动态维度。在评估时你不能改变它的类型，但在评估之前可以动态地改变它的维度。（基本上，你声明张量时不指定一些维度，`tensorflow`
    将从输入值中推断维度。）通常，人们会谈论张量的秩，它简单地是张量的维度数（而标量被期望具有0阶）。表 [1-1](#Tab1) 可能有助于理解张量的不同秩是什么。
- en: Table 1-1
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1-1
- en: Examples of Tensors with Ranks 0, 1, 2, and 3
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 0阶、1阶、2阶和3阶张量的示例
- en: '| Rank | Mathematical Entity | Python Example |'
  id: totrans-125
  prefs: []
  type: TYPE_TB
  zh: '| 秩 | 数学实体 | Python 示例 |'
- en: '| --- | --- | --- |'
  id: totrans-126
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 0 | Scalar (for example, length or weight) | L=30 |'
  id: totrans-127
  prefs: []
  type: TYPE_TB
  zh: '| 0 | 标量（例如，长度或重量） | L=30 |'
- en: '| 1 | A vector (for example, the speed of an object in a two-dimensional plane)
    | S=[10.2,12.6] |'
  id: totrans-128
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 一个向量（例如，一个物体在二维平面上的速度）| S=[10.2,12.6] |'
- en: '| 2 | A matrix | M=[[23.2, 44.2], [12.2, 55.6]] |'
  id: totrans-129
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 矩阵 | M=[[23.2, 44.2], [12.2, 55.6]] |'
- en: '| 3 | A 3D matrix (with three dimensions) | C = [[[1],[2]],[[3],[4]], [[5],
    [6]]] |'
  id: totrans-130
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 3D 矩阵（有三个维度） | C = [[[1],[2]],[[3],[4]], [[5], [6]]] |'
- en: 'Supposing you import `tensorflow` with the statement `import tensorflow as
    tf`, the basic object, a tensor, is the class `tf.tensor`. A `tf.tensor` has two
    properties:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你使用语句 `import tensorflow as tf` 导入 `tensorflow`，基本对象，张量，是 `tf.tensor` 类。一个
    `tf.tensor` 有两个属性：
- en: data type (for example, float32)
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据类型（例如，float32）
- en: shape (for example, [2,3], meaning a tensor with two rows and three columns)
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 形状（例如，[2,3]，表示一个有两行三列的张量）
- en: An important aspect is that each element of a tensor always has the same data
    type, while the shape need not be defined at declaration time. (This will be clearer
    in the practical examples in the next chapters.) The main types of tensors (there
    are more) that we will see in this book are
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 一个重要的方面是张量的每个元素总是具有相同的数据类型，而形状在声明时不必定义。（这将在下一章的实践示例中更加清晰。）本书中我们将看到的张量主要类型（还有更多）包括：
- en: '`tf.Variable`'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tf.Variable`'
- en: '`tf.constant`'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tf.constant`'
- en: '`tf.placeholder`'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tf.placeholder`'
- en: The `tf.constant` and the `tf.placeholder` values are, during a single-session
    run (more on that later), immutable. Once they have a value, they will not change.
    For example, a `tf.placeholder` could contain the dataset you want to use for
    training your neural network. Once assigned, it will not change during the evaluation
    phase. A `tf.Variable` could contain the weights of your neural networks. They
    will change during training, to find their optimal values for your specific problem.
    Finally, a `tf.constant` will never change. I will show you in the next section
    how to use the three different types of tensors and what aspect you should consider
    when developing your models.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在单次会话运行期间（关于这一点稍后会有更多说明），`tf.constant` 和 `tf.placeholder` 的值是不可变的。一旦它们有了值，就不会改变。例如，一个
    `tf.placeholder` 可能包含你想要用于训练神经网络的训练数据集。一旦分配，它将在评估阶段保持不变。一个 `tf.Variable` 可能包含你神经网络的权重。它们将在训练过程中改变，以找到针对你特定问题的最优值。最后，`tf.constant`
    永远不会改变。我将在下一节中向你展示如何使用三种不同类型的张量，以及你在开发模型时应考虑哪些方面。
- en: Creating and Running a Computational Graph
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建和运行计算图
- en: Let’s start using `tensorflow` to create a computational graph.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始使用 `tensorflow` 创建一个计算图。
- en: Note
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: 'Remember: We always keep the construction phase (when we define what a graph
    should do) and its evaluation (when we perform the calculations) separate. `tensorflow`
    follows the same philosophy: first you construct a graph, and then you evaluate
    it.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：我们始终将构建阶段（我们定义图应该做什么的阶段）和其评估（我们执行计算的阶段）分开。`tensorflow` 遵循相同的理念：首先构建一个图，然后评估它。
- en: 'Let’s consider something very easy: the sum of two tensors'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个非常简单的事情：两个张量的和
- en: '![$$ {x}_1+{x}_2 $$](../images/463356_1_En_1_Chapter/463356_1_En_1_Chapter_TeX_Equa.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {x}_1+{x}_2 $$](../images/463356_1_En_1_Chapter/463356_1_En_1_Chapter_TeX_Equa.png)'
- en: that can be calculated with the computational graph depicted in Figure [1-20](#Fig20).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过图 [1-20](#Fig20) 所示的计算图来计算。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig20_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig20_HTML.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig20_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig20_HTML.png)'
- en: Figure 1-20
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-20
- en: The computational graph for the sum of two tensors
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 两个张量之和的计算图
- en: Computational Graph with tf.constant
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 tf.constant 的计算图
- en: 'As discussed, first we must create this computational graph with `tensorflow`.
    (Remember: We begin with the construction phase.) Let’s start using the `tf.constant`
    tensor type. We need three nodes: two for the input variables and one for the
    sum. This can be achieved with the following code:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，首先我们必须使用 `tensorflow` 创建这个计算图。（记住：我们是从构建阶段开始的。）让我们开始使用 `tf.constant` 张量类型。我们需要三个节点：两个用于输入变量，一个用于求和。这可以通过以下代码实现：
- en: '[PRE1]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The preceding code creates the computational graph in Figure [1-20](#Fig20)
    and, at the same time, tells `tensorflow` that `x1` should have the value `1`
    (the value in the parentheses in the declaration), and `x2` should have the value
    `2`. Now, to evaluate the code, we must create what `tensorflow` calls a session
    (wherein an actual evaluation can take place), and then we can ask the session
    class to run our graph with the following code:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码创建了图 [1-20](#Fig20) 中的计算图，并且同时告诉 `tensorflow`，`x1` 应该具有括号中声明的值 `1`，而 `x2`
    应该具有值 `2`。现在，为了评估代码，我们必须创建 `tensorflow` 所称的会话（其中可以进行实际评估），然后我们可以要求会话类使用以下代码运行我们的图：
- en: '[PRE2]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This will simply give you the evaluated result of `z` that is, as expected,
    `3`. This version of the code is rather simple and does not require much, but
    it is not very flexible. `x1` and `x2` are fixed and cannot be changed during
    the evaluation, for example.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这将简单地给出 `z` 的评估结果，正如预期的那样，是 `3`。这个版本的代码相当简单，不需要太多，但它不够灵活。例如，`x1` 和 `x2` 是固定的，在评估期间不能改变。
- en: Note
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: In `TensorFlow`, you first must create a computational graph, then create a
    session, and finally run your graph. These three steps must always be followed
    to evaluate your graph.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `TensorFlow` 中，你必须首先创建一个计算图，然后创建一个会话，最后运行你的图。这三个步骤必须始终遵循以评估你的图。
- en: 'Remember: You can also ask `tensorflow` to evaluate only an intermediate step.
    For example, you might want to evaluate `x1` (not very interesting, but there
    are many cases in which it will be useful, for example, when you want to evaluate
    your graph and, at the same time, the accuracy and the cost function of a model),
    as follows: `sess.run(x1)`.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 记住：你也可以要求 `tensorflow` 只评估一个中间步骤。例如，你可能想评估 `x1`（不太有趣，但有许多情况下它将非常有用，例如，当你想评估你的图，同时评估模型的准确性和损失函数时），如下所示：`sess.run(x1)`。
- en: You will get the result 1, as expected (you expected that, right?). At the end,
    remember to close the session with `sess.close()` to free up used resources.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 你将得到预期的结果 1（你预期到了，对吧？）。最后，记得使用 `sess.close()` 关闭会话以释放使用的资源。
- en: Computational Graph with tf.Variable
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 tf.Variable 的计算图
- en: The same computational graph (the one in Figure [1-20](#Fig20)) can be created
    with variables, but that requires a bit more work. Let’s re-create our computational
    graph.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的计算图（如图 [1-20](#Fig20) 所示）可以用变量创建，但这需要更多的工作。让我们重新创建我们的计算图。
- en: '[PRE3]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We want to initialize the variables with the values `1` and `2`, as before.^([1](#Fn1))
    The problem is that when you run the graph, as we did before, with the code
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望用之前的值 `1` 和 `2` 初始化变量，正如之前所做的那样.^([1](#Fn1)) 问题在于当你像之前那样运行图时，使用以下代码
- en: '[PRE4]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'you will receive an error message. It is a very long error message, but near
    the end, you will find the following message:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 你将收到一个错误消息。这是一个非常长的错误消息，但接近结尾时，你会找到以下消息：
- en: '[PRE5]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'This occurs because `tensorflow` does not automatically initialize the variables.
    To do this, you could use this approach:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这发生是因为 `tensorflow` 并没有自动初始化变量。为了做到这一点，你可以使用以下方法：
- en: '[PRE6]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This works now without errors. Line `sess.run(x1.initializer)` will initialize
    the variable `x1` with the value `1`, and the line `sess.run(x2.initializer)`
    will initialize the variable `x2` with the value `2`. But this is rather cumbersome.
    (You don’t want to write a line for each variable you need to initialize.) A much
    better approach is to add a node to your computational graph that has the goal
    of initializing all the variables you define in your graph with the code
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 现在它没有错误地工作了。行 `sess.run(x1.initializer)` 将用值 `1` 初始化变量 `x1`，而行 `sess.run(x2.initializer)`
    将用值 `2` 初始化变量 `x2`。但这相当繁琐。（你不想为每个需要初始化的变量写一行代码。）一个更好的方法是向你的计算图中添加一个节点，其目的是用以下代码初始化你在图中定义的所有变量
- en: '[PRE7]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: and then again create and run your session , running this node (`init`) before
    evaluating `z`.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 然后再创建并运行你的会话，在评估 `z` 之前先运行这个节点（`init`）。
- en: '[PRE8]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This will work and give you the result `3`, as you would expect.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 这将按预期工作，并给出结果 `3`。
- en: Note
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: When working with variables, remember always to add a global initializer (`tf.global_variables_initializer()`)
    and run the node in your session at the beginning, before any other evaluation.
    We will see in many examples during the book how this works.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用变量时，请始终记得添加一个全局初始化器（`tf.global_variables_initializer()`），并在会话中运行节点，在评估任何其他内容之前。在本书的许多示例中，我们将看到这是如何工作的。
- en: Computational Graph with tf.placeholder
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 tf.placeholder 的计算图
- en: Let’s declare `x1` and `x2` as placeholders.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们声明 `x1` 和 `x2` 为占位符。
- en: '[PRE9]'
  id: totrans-177
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Note that I have not provided any value in the declaration.^([2](#Fn2)) We will
    have to assign a value to `x1` and `x2` at evaluation time. That is the main difference
    between placeholders and the other two tensor types. The sum, then, is given again
    by
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我在声明中并没有提供任何值.^([2](#Fn2)) 我们将在评估时给 `x1` 和 `x2` 赋值。这就是占位符与其他两种张量类型的主要区别。然后，总和再次由
- en: '[PRE10]'
  id: totrans-179
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Note that if you try to see what is in `z` using, for example, `print(z)`, you
    will get
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果你尝试使用例如 `print(z)` 来查看 `z` 中的内容，你会得到
- en: '[PRE11]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Why this strange result? First, we have not given `tensorflow` the values for
    `x1` and `x2` and, second, `TensorFlow` has not yet run any calculation. Remember:
    Graph construction and evaluation are separate steps. Now let’s create a session
    in `TensorFlow`, as before.'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么会有这个奇怪的结果？首先，我们没有给 `tensorflow` 提供 `x1` 和 `x2` 的值，其次，`TensorFlow` 还没有运行任何计算。记住：图构建和评估是独立的步骤。现在让我们在
    `TensorFlow` 中创建一个会话，就像之前一样。
- en: '[PRE12]'
  id: totrans-183
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now we can run the actual calculation, but to do that, we must first have a
    way of assigning values to the two inputs `x1` and `x2`. This can be achieved
    by using a Python dictionary that contains all the placeholders’ names as keys
    and assign to them values. In this example, we assign to `x1` the value `1` and
    to `x2` the value `2`.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以运行实际的计算，但要做到这一点，我们首先必须有一种方法来为两个输入`x1`和`x2`分配值。这可以通过使用一个包含所有占位符名称作为键的Python字典来实现，并将值分配给它们。在这个例子中，我们将`1`的值分配给`x1`，将`2`的值分配给`x2`。
- en: '[PRE13]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Feeding this code to the `TensorFlow` session can be done with the following
    command:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 将此代码输入到`TensorFlow`会话中可以使用以下命令：
- en: '[PRE14]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'You finally get the result you expected: `3`. Note that `tensorflow` is rather
    smart and can handle more complicated inputs. Let’s redefine our placeholder to
    be able to use arrays with two elements. (Here, we report the entire code, to
    make it easier to follow the example.)'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 你最终得到了预期的结果：`3`。请注意，`tensorflow`相当智能，可以处理更复杂的输入。让我们重新定义我们的占位符，以便能够使用包含两个元素的数组。（在这里，我们报告整个代码，以便更容易地跟随示例。）
- en: '[PRE15]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: This time, you will get an array with two elements as output.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这一次，你会得到一个包含两个元素的数组作为输出。
- en: '[PRE16]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Remember that `x1=[1,5]` and `x2=[1,1]` meaning that `z=x1+x2=[1,5]+[1,1]=[2,6]`,
    because the sum is done element by element.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 记住`x1=[1,5]`和`x2=[1,1]`意味着`z=x1+x2=[1,5]+[1,1]=[2,6]`，因为求和是逐元素进行的。
- en: 'To summarize, here are some guidelines on when to use which tensor type:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，以下是一些关于何时使用哪种张量类型的指南：
- en: Use `tf.placeholder` for entities that will not change at each evaluation phase.
    Usually, those are input values or parameters that you want to keep fixed during
    the evaluation but may change with each run. (You will see several examples later
    in the book.) Examples include input dataset, learning rate, etc.
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于在每个评估阶段不会改变的实体，请使用`tf.placeholder`。通常，这些是输入值或参数，你希望在评估期间保持固定，但可能随着每次运行而改变。（你将在本书后面的内容中看到几个例子。）包括输入数据集、学习率等。
- en: Use `tf.Variable` for entities that will change during the calculation, for
    example, the weights of our neural networks, as you will see later in the book.
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于在计算过程中会改变的实体，请使用`tf.Variable`，例如，你将在本书后面的内容中看到的神经网络权重。
- en: Use `tf.constant` for entities that will never change, for example, fix values
    in your model that you don’t want to change anymore.
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于永远不会改变的实体，请使用`tf.constant`，例如，在模型中固定那些你不再想更改的值。
- en: 'Figure [1-21](#Fig21) depicts a slightly more complex example: the computational
    graph for the calculation *x*[1]*w*[1] + *x*[2]*w*[2].'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图[1-21](#Fig21)展示了稍微复杂一些的例子：计算*x*[1]*w*[1] + *x*[2]*w*[2]的计算图。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig21_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig21_HTML.png)'
  id: totrans-198
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig21_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig21_HTML.png)'
- en: Figure 1-21
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-21
- en: The computational graph for the calculation x[1]w[1] + x[2]w[2]
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 计算x[1]w[1] + x[2]w[2]的计算图
- en: 'In this case, I defined *x*[1], *x*[2], *w*[1], and *w*[2] as placeholders
    (they will be our inputs) containing scalars (remember: when defining placeholders,
    you must always pass the dimensions as second input parameters, in this case,
    the `1`).'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我将*x*[1]、*x*[2]、*w*[1]和*w*[2]定义为占位符（它们将是我们的输入），包含标量（记住：在定义占位符时，你必须始终传递维度作为第二个输入参数，在这种情况下，是`1`）。
- en: '[PRE17]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Running the calculations means simply (as before) defining the dictionary containing
    the input values, creating a session, and then running it.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 运行计算简单地说（就像之前一样）是定义包含输入值的字典，创建一个会话，然后运行它。
- en: '[PRE18]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: 'As expected, you will get the following result:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，你会得到以下结果：
- en: '[PRE19]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: This is simply 1 × 2 + 3 × 4 = 2 + 12 = 14 (remember that we have fed the values
    `1`, `2`, `3`, and `4` in `feed_dict`, in the previous step). In the Chapter [2](463356_1_En_2_Chapter.xhtml),
    we will draw the computational graph for a single neuron and apply what we have
    learned in this chapter to a very practical case. Using that graph, we will be
    able to do linear and logistic regression on a real dataset. As always, remember
    to close the session with `sess.close()` when you are done.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是1×2 + 3×4 = 2 + 12 = 14（记住，我们在上一步的`feed_dict`中输入了值`1`、`2`、`3`和`4`）。在第[2](463356_1_En_2_Chapter.xhtml)章中，我们将绘制单个神经元的计算图，并将本章学到的知识应用到一个非常实际的案例中。使用该图，我们能够在真实数据集上进行线性回归和逻辑回归。一如既往，记得在完成后使用`sess.close()`关闭会话。
- en: Note
  id: totrans-208
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: In `TensorFlow`, it can happen that the same piece of code runs several times,
    and you can end up with a computational graph with multiple copies of the same
    node. A very common way of avoiding such a problem is to run the code `tf.reset_default_graph()`
    before the code that constructs the graph. Note that if you separate your construction
    code from your evaluation code appropriately, you should be able to avoid such
    problems. We will see later in the book in many examples how this is working.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `TensorFlow` 中，可能会发生相同代码运行多次的情况，你最终可能会得到一个包含相同节点多个副本的计算图。避免这种问题的一个非常常见的方法是在构建图的代码之前运行代码
    `tf.reset_default_graph()`。请注意，如果你适当地将你的构建代码与你的评估代码分开，你应该能够避免这种问题。我们将在本书后面的许多示例中看到这一点是如何工作的。
- en: Differences Between run and eval
  id: totrans-210
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: run 和 eval 的区别
- en: If you look at blogs and books, you may find two ways of evaluating a computational
    graph with `tensorflow`. The one we have used up to now is `sess.run()`, in which
    the function wants as argument the name of the node you want to evaluate. We have
    chosen this method because it has a nice advantage. To understand it, consider
    the following code (the same you have seen previously)
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你查看博客和书籍，你可能会发现两种使用 `tensorflow` 评估计算图的方法。我们到目前为止使用的是 `sess.run()`，其中该函数需要作为参数传入你想要评估的节点的名称。我们选择这种方法是因为它有一个很好的优点。为了理解它，考虑以下代码（你之前已经见过）
- en: '[PRE20]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'This will only give you the evaluated node z, but you can also evaluate several
    nodes at the same time, using the following code:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 这只会给你评估后的节点 z，但你也可以同时评估多个节点，使用以下代码：
- en: '[PRE21]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This will give you
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 这将给你
- en: '[PRE22]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: And that is very useful, as will become clear in the next section about the
    life cycle of a node. Additionally, evaluating many nodes at the same time will
    make your code shorter and more readable.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 这非常有用，这一点将在下一节关于节点生命周期的内容中变得清晰。此外，同时评估多个节点将使你的代码更短、更易读。
- en: The second method of evaluating a node in a graph is to use the `eval()` call.
    This code
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在图中评估一个节点的第二种方法是使用 `eval()` 调用。此代码
- en: '[PRE23]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: will evaluate `z`. But this time, you must explicitly tell `TensorFlow` which
    session you want to use (you may have several defined). This is not very practical,
    and I prefer to use the `run()` method to get several results at the same time
    (for example, the cost function, accuracy, and F1 score). There is also a performance
    reason to prefer the first method, as explained in the next section.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 将评估 `z`。但这次，你必须明确告诉 `TensorFlow` 你想要使用哪个会话（你可能已经定义了多个）。这并不太实用，我更喜欢使用 `run()`
    方法同时获取多个结果（例如，损失函数、准确率和 F1 分数）。还有其他性能原因更喜欢第一种方法，这将在下一节中解释。
- en: Dependencies Between Nodes
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 节点之间的依赖关系
- en: 'As I mentioned before, `TensorFlow` evaluates a graph in topological order,
    which means that when you ask it to evaluate a node, it automatically determines
    all the nodes that are required to evaluate what you are asking and evaluate them
    first. The problem is that `TensorFlow` might evaluate some nodes multiple times.
    Consider the following code, for example:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前提到的，`TensorFlow` 以拓扑顺序评估图，这意味着当你要求它评估一个节点时，它会自动确定所有需要评估以评估你所请求的内容的节点，并首先评估它们。问题是
    `TensorFlow` 可能会多次评估某些节点。例如，考虑以下代码：
- en: '[PRE24]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: This code will build and evaluate the computational graph in Figure [1-22](#Fig22).
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码将构建并评估图 [1-22](#Fig22) 中的计算图。
- en: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig22_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig22_HTML.png)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463356_1_En_1_Chapter/463356_1_En_1_Fig22_HTML.png](../images/463356_1_En_1_Chapter/463356_1_En_1_Fig22_HTML.png)'
- en: Figure 1-22
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-22
- en: The computational graph that the code cited at the beginning of the section
    builds
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 该节开头引用的代码构建的计算图
- en: As you can see, *z* and *y* both depend from *x*. The problem with the code
    as we have written, is that `TensorFlow` will not reuse the result of the previous
    evaluation of *c* and *x*. This means that it will evaluate the node for *x* one
    time when evaluating *z* and again when evaluating *y*. In this case, for example,
    using the code `yy, zz = sess.run([y,z])` will evaluate *y* and *z* in one run,
    and *x* only once.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，*z* 和 *y* 都依赖于 *x*。我们编写的代码存在的问题是，`TensorFlow` 不会重用 *c* 和 *x* 上一次评估的结果。这意味着当评估
    *z* 时，它将只对 *x* 进行一次评估，而当评估 *y* 时，它将再次对 *x* 进行评估。在这种情况下，例如，使用代码 `yy, zz = sess.run([y,z])`
    将在一次运行中评估 *y* 和 *z*，而 *x* 只评估一次。
- en: Tips on How to Create and Close a Session
  id: totrans-229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建和关闭会话的技巧
- en: I showed you how to create a session with the template
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 我向您展示了如何使用模板创建会话
- en: '[PRE25]'
  id: totrans-231
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'At the end, you should always close a session, to free up used resources. The
    syntax is quite easy:'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你应该始终关闭会话，以释放使用的资源。语法相当简单：
- en: '[PRE26]'
  id: totrans-233
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Keep in mind that the moment you close the session, you cannot evaluate anything
    else. You must create a new session and perform your evaluation again. In a Jupyter
    environment, this method has the advantage of allowing you to split your evaluation
    code in several cells and then close the session at the very end. But it is useful
    to know that there is a slightly more compact way of opening and using a session
    , using the following template:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，一旦关闭会话，你就无法评估任何其他内容。你必须创建一个新的会话并再次进行评估。在 Jupyter 环境中，这种方法的优势在于允许你将评估代码拆分到多个单元格中，然后在最后关闭会话。但了解有一种稍微紧凑一些的方式来打开和使用会话，可以使用以下模板：
- en: '[PRE27]'
  id: totrans-235
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: For example, the code
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下代码
- en: '[PRE28]'
  id: totrans-237
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: from the previous section could have been written as
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 上一节中的内容可以写成
- en: '[PRE29]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: In this case, the session would automatically be closed at the end of the `with`
    clause. Using this method makes using `eval()` easier. For example, the code
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，会话将在 `with` 语句结束时自动关闭。使用这种方法使使用 `eval()` 更加容易。例如，以下代码
- en: '[PRE30]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: will look like this with the `with` clause
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `with` 语句时，它将看起来像这样
- en: '[PRE31]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: There are some cases in which the explicit declaration of the session is preferred.
    For example, it is rather common to write a function that performs the actual
    graph evaluation and that returns the session, so that additional evaluation (for
    example, of the accuracy or similar metrics) can be done after the main training
    has finished. In this case, you cannot use the second version, because it would
    close the session immediately after finishing the evaluation, therefore making
    additional evaluations with the session results impossible.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 有一些情况下，显式声明会话是首选的。例如，编写一个执行实际图评估并返回会话的函数是很常见的，这样就可以在主要训练完成后进行额外的评估（例如，准确度或其他类似指标）。在这种情况下，你不能使用第二种版本，因为它会在评估完成后立即关闭会话，因此使得使用会话结果进行额外评估变得不可能。
- en: Note
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: If you are working in an interactive environment such as Jupyter notebooks and
    you want to split your evaluation code on multiple notebook cells, it is easier
    to declare the session as `sess = tf.Session()`, perform the calculations needed,
    and then, at the end, close it. In this way, you can intercalate evaluations,
    graphs, and text. In case you are writing code that will not be interactive, it
    is sometimes preferable (and less error-prone) to use the second version, to make
    sure that the session is closed at the end. Additionally, with the second method,
    you don’t have to specify the session when using the `eval()` method.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在一个交互式环境，如 Jupyter 笔记本中工作，并且想在多个笔记本单元格中拆分你的评估代码，将 `sess = tf.Session()` 声明会话、执行所需的计算，然后在最后关闭它会更简单。这样，你可以交替评估、图表和文本。如果你正在编写不会交互的代码，有时使用第二种版本更可取（且更不容易出错），以确保会话在最后关闭。此外，使用第二种方法，在使用
    `eval()` 方法时，你不需要指定会话。
- en: The material covered in this chapter should give you all you need to build your
    neural networks with `tensorflow`. What I explained here is by no means complete
    or exhaustive. You should really take some time and go on the official TensorFlow
    web site and study the tutorials and other materials there.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 本章涵盖的材料应该为你构建使用 `tensorflow` 的神经网络提供所有你需要的内容。我在这里解释的绝对不是完整或详尽的。你应该真的花些时间，访问官方
    TensorFlow 网站，并研究那里的教程和其他材料。
- en: Note
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: In this book I use a *lazy programming approach*. That means that I explain
    only what I want you to understand, nothing more. The reason is that I want you
    to focus on the learning goals for each chapter, and I don’t want you to be distracted
    by the complexity that lies behind the methods or the programming functions. Once
    you understand what I am trying to explain, you should invest some time and dive
    deeper into the methods and libraries, using the official documentation.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我使用了一种*懒惰的编程方法*。这意味着我只解释我想让你理解的内容，没有更多。原因是我想让你专注于每一章的学习目标，我不想让你被方法或编程函数背后的复杂性所分散。一旦你理解了我试图解释的内容，你应该投入一些时间，深入到方法和库中，使用官方文档。
