  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还评估了训练集和开发集上的准确率，并将这些值返回给调用者。这样我们就可以为隐藏层中神经元数量的几个值运行循环，并得到准确率。请注意，这次函数有一个额外的输入参数：`number_neurons`。我们需要将这个数字传递给构建模型的函数。
- en: 'Let’s suppose we choose the following parameters: mini-batch size = 50, we
    train for 100 epochs, learning rate *λ* = 0.001, and we build our model with 15
    neurons in the hidden layer.'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们选择了以下参数：批量大小 = 50，训练100个周期，学习率 *λ* = 0.001，并在隐藏层中使用15个神经元构建我们的模型。
- en: We then run the model
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们运行模型
- en: '[PRE32]'
  id: totrans-344
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: For the train dataset, we get 0.8549 and for the dev dataset, we get 0.8396
    accuracy. Can we do better? Well, we can surely do a grid search to start with
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 对于训练集，我们得到0.8549的准确率，对于开发集，我们得到0.8396的准确率。我们能做得更好吗？嗯，我们可以从网格搜索开始
- en: '[PRE33]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Keep in mind that this will take a lot of time. 3000 neurons is a large number,
    so be warned in case you want to try. We will get the results shown in Table [6-1](#Tab1).
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 请记住，这将会花费很多时间。3000个神经元是一个很大的数字，所以如果你想要尝试，请提前警告。我们将得到表[6-1](#Tab1)中所示的结果。
