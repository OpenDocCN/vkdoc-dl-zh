- en: 6. Hyper-Parameter Tuning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 超参数调优
- en: Hyper-parameters can be loosely defined as parameters that do not change during
    training. For example, the number of layers in an FFNN, the number of neurons
    in each layer, activation functions, learning rate,^([1](#Fn1)) and so on.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 超参数可以松散地定义为在训练过程中不发生变化的参数。例如，FFNN中的层数、每层的神经元数量、激活函数、学习率^([1](#Fn1))等等。
- en: 'This chapter looks at the problem of finding the best hyper-parameters to get
    the best results from your models. Doing this is called hyper-parameter tuning.
    We first describe what a black-box optimization problem is, and how those classes
    of problems relate to hyper-parameter tuning. We look at the three most common
    methods for tackling those kinds of problems: *grid search, random search,* and
    *Bayesian optimization*. You will learn, with examples, which one works in which
    conditions. At the end of the chapter, you will see how you can use those techniques
    to tune a deep model with a real-world dataset (the Zalando dataset). The goal
    of this chapter is not to give you an overview of all possible Python libraries
    that can help you with hyper-parameter tuning, but at the end of the chapter,
    you should know what hyper-parameter tuning is, why it’s important, and how it
    works, at least in its most fundamental form.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章探讨了寻找最佳超参数以从模型中获得最佳结果的问题。进行这一过程被称为超参数调优。我们首先描述什么是黑盒优化问题，以及这些类别的问题如何与超参数调优相关。我们探讨了处理这类问题的三种最常见方法：*网格搜索、随机搜索*和*贝叶斯优化*。通过示例，你将了解在什么条件下哪种方法有效。本章结束时，你将看到如何使用这些技术使用真实世界数据集（Zalando数据集）来调整深度模型。本章的目标不是给你一个所有可能的Python库的概述，以帮助你进行超参数调优，但到本章结束时，你应该知道什么是超参数调优，为什么它很重要，以及它是如何工作的，至少在其最基本的形式上。
- en: Black-Box Optimization
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 黑盒优化
- en: 'The problem of hyper-parameter tuning is just a subclass of a much more general
    type of problems: *black****-****box optimization****s***. A black-box function
    *f*(*x*)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 超参数调优的问题只是更一般类型问题的一个子类：*黑盒优化*。一个黑盒函数 *f*(*x*) 是一个
- en: '![$$ f(x):{\mathbb{R}}^n\to \mathbb{R} $$](../images/463356_2_En_6_Chapter/463356_2_En_6_Chapter_TeX_Equa.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![f(x):{\mathbb{R}}^n\to \mathbb{R}](../images/463356_2_En_6_Chapter/463356_2_En_6_Chapter_TeX_Equa.png)'
- en: 'is a function whose analytic form is unknown. A black-box function can be evaluated
    to obtain its value for all values of *x* on which it’s defined, but no other
    information, such as its gradient, can be obtained. Generally, we talk about the
    global optimization of a black-box function (sometimes called a black-box problem)
    when we try to find the maximum or minimum of *f*(*x*) given certain constraints.
    Here are some examples of these kinds of problems:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 是一个解析形式未知的函数。黑盒函数可以评估以获得其定义的所有 *x* 值的值，但无法获得其他信息，如梯度。通常，当我们试图在给定某些约束的情况下找到 *f*(*x*)
    的最大值或最小值时，我们谈论黑盒函数的全局优化（有时称为黑盒问题）。以下是一些这类问题的例子：
- en: Finding the hyper-parameter for a given machine learning model that maximizes
    the chosen optimizing metric
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找给定机器学习模型的最佳超参数，以最大化所选优化指标
- en: Finding a maximum or minimum of a function, which can only be evaluated numerically
    or with code that we cannot look at. In some industry contexts, there is legacy
    code that is very complicated, and there are some functions that must be maximized
    based on its outcome.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找一个函数的最大值或最小值，这个函数只能通过数值或我们无法查看的代码来评估。在某些行业环境中，存在非常复杂的遗留代码，有一些函数必须基于其结果进行最大化。
- en: Finding the best place to drill for oil. Your function is how much oil you can
    find, and your *x* is your location.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 寻找最佳的石油钻探地点。你的函数是你能找到多少石油，而你的 *x* 是你的位置。
- en: Finding the best combination of parameters for situations that are too complex
    to model, such as when launching a rocket in space. How do you optimize the amount
    of fuel, the diameter of each stage of the rocket, the precise trajectory, and
    so on.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在难以建模的情况下寻找最佳参数组合，例如在太空中发射火箭时。如何优化燃料量、火箭每个阶段的直径、精确轨迹等等。
- en: 'This is a very fascinating class of problems that has produced smart solutions.
    We will look at three of them: grid search, random search, and Bayesian optimization.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常迷人的问题类别，它产生了智能的解决方案。我们将探讨其中的三个：网格搜索、随机搜索和贝叶斯优化。
- en: Why is finding the best hyper-parameters for neural networks a black-box problem?
    Since we cannot calculate information like the gradients of our network output
    with respect to the hyper-parameters (for example, the number of layers in an
    FFNN), especially when using complex optimizers or custom functions, we need other
    approaches to find the best hyper-parameters that maximize the chosen optimizing
    metric. Note that if we could have the gradients, we could use an algorithm such
    as gradient descent to find the maximum or minimum.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么寻找神经网络最佳超参数是一个黑盒问题？因为我们无法计算网络输出相对于超参数的信息，例如FFNN中的层数，尤其是在使用复杂优化器或自定义函数时。我们需要其他方法来找到最佳超参数，以最大化选择的优化指标。请注意，如果我们能获得梯度，我们可以使用梯度下降等算法来找到最大值或最小值。
- en: Note
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Our black-box function *f* will be our neural network model (including things
    like the optimizer, cost function form, etc.) which gives as output our optimizing
    metric, given the hyper-parameters as input. In this case, *x* will be the array
    containing the hyper-parameters.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的黑盒函数 *f* 将是我们的神经网络模型（包括优化器、成本函数形式等），它以超参数作为输入，输出我们的优化指标。在这种情况下，*x* 将是包含超参数的数组。
- en: 'The problem may seem quite trivial, so why not try all the possibilities? Well,
    this may be possible in the examples we have looked at in the past chapters, but
    if you are working on a problem and training your model takes a week, this may
    present a challenge. Since typically you will have several hyper-parameters, trying
    all possibilities will not be feasible. Let’s look at an example to understand
    it better. Let’s suppose we are training a model of a neural network with several
    layers. We may decide to consider the following hyper-parameters to see which
    combination works best:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 问题可能看起来相当简单，为什么不尝试所有可能性呢？好吧，这可能在我们在过去章节中看到的例子中是可能的，但如果你正在处理一个问题，并且训练模型需要一周时间，这可能是一个挑战。由于通常你会有几个超参数，尝试所有可能性将不可行。让我们通过一个例子来更好地理解它。假设我们正在训练一个具有多个层的神经网络模型。我们可能决定考虑以下超参数，以查看哪种组合效果最好：
- en: 'Learning rate: Let’s suppose we want to try the values *n* · 10^(−4) for *n* = 1,
    …, 10² (100 values)'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习率：假设我们想尝试 *n* · 10^(−4) 的值，其中 *n* = 1, …, 10²（100个值）
- en: 'Regularization parameter: 0, 0.1, 0.2, 0.3, 0.4, and 0.5 (six values)'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正则化参数：0，0.1，0.2，0.3，0.4和0.5（六个值）
- en: 'Choice of optimizer: GD, RMSProp, or Adam (three values)'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化器选择：GD，RMSProp或Adam（三个值）
- en: 'Number of hidden layers: 1, 2, 3, 5, and 10 (five values)'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏层数量：1，2，3，5和10（五个值）
- en: 'Number of neurons in the hidden layers: 100, 200, and 300 (three values)'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隐藏层中的神经元数量：100，200和300（三个值）
- en: Consider that you will need to train your network
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑你将需要训练你的网络
- en: '![$$ 100\times 6\times 3\times 5\times 3=27000 $$](../images/463356_2_En_6_Chapter/463356_2_En_6_Chapter_TeX_Equb.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![100×6×3×5×3=27000](../images/463356_2_En_6_Chapter/463356_2_En_6_Chapter_TeX_Equb.png)'
- en: times if you want to test all possible combinations. If your training takes
    five minutes, you will need 13.4 weeks of computing time. If the training takes
    hours or days, it becomes impossible. If the training takes one day for example,
    you will need 73.9 years to try all the possibilities. Most of the hyper-parameter
    choices will come from experience; for example, you can safely always use Adam,
    since it’s the better optimizer out there (in almost all cases). But you will
    not be able to avoid trying to tune other parameters like the number of hidden
    layers or the learning rate. You can reduce the number of combinations you need
    with experience (as with the optimizer), or with some smart algorithms, as you
    see later in this chapter.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想测试所有可能的组合。如果你的训练需要五分钟，你将需要13.4周的计算时间。如果训练需要数小时或数天，这变得不可能。如果训练需要一天，例如，你需要73.9年才能尝试所有可能性。大多数超参数的选择将来自经验；例如，你可以安全地始终使用Adam，因为它是更好的优化器（在几乎所有情况下）。但你将无法避免尝试调整其他参数，如隐藏层的数量或学习率。你可以通过经验（就像优化器一样）或一些聪明的算法来减少你需要组合的数量，正如你将在本章后面看到的。
- en: Notes on Black-Box Functions
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于黑盒函数的注意事项
- en: 'Black-box functions are usually classified into two main classes:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 黑盒函数通常分为两大类：
- en: '**Cheap functions** : Functions that can be evaluated thousands of times'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**廉价函数**：可以评估数千次的函数'
- en: '**Costly functions** : Functions that can only be evaluated a few times, usually
    fewer than 100 times'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**昂贵函数**：通常只能评估几次的函数，通常少于100次'
- en: If the black-box function is cheap then the choice of the optimization method
    is not critical. For example, we can evaluate the gradient with respect to the
    *x* numerically, or simply search the maximum by evaluating the functions on a
    large number of points. If the function is costly, we need much smarter approaches.
    One of these is *Bayesian optimization,* which we discuss later in this chapter
    to give you an idea on how those methods work and how complex they are.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果黑盒函数成本低，那么优化方法的选择并不关键。例如，我们可以通过数值计算来评估与*x*相关的梯度，或者简单地通过在大量点上评估函数来搜索最大值。如果函数成本高，我们需要更智能的方法。其中之一是*贝叶斯优化*，我们将在本章后面讨论，以给你一个关于这些方法如何工作以及它们复杂性的概念。
- en: Note
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Neural networks are almost always, especially in the deep learning world, costly
    functions.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络几乎总是，尤其是在深度学习领域，是成本较高的函数。
- en: For costly functions we need to find methods that solve our problem with the
    smallest number of evaluation possible.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于成本较高的函数，我们需要找到用尽可能少的评估次数解决问题的方法。
- en: The Problem of Hyper-Parameter Tuning
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超参数调整问题
- en: 'Before looking at how we can find the best hyper-parameters, we need to quickly
    go back to neural networks and discuss what can we tune in deep models. Typically,
    when talking about hyper-parameters, beginners think only of numerical parameters,
    such as the learning rate or regularization parameter, for example. Remember that
    the following can also be varied to see if you can get better results:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们探讨如何找到最佳超参数之前，我们需要快速回顾一下神经网络，并讨论在深度模型中我们可以调整什么。通常，当谈到超参数时，初学者只会想到数值参数，例如学习率或正则化参数。记住，以下也可以调整以查看是否能得到更好的结果：
- en: '**Number of epochs:** Sometimes simply training your network longer will give
    you better results.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练轮数**：有时简单地延长网络的训练时间会得到更好的结果。'
- en: '**Choice of optimizer:** You can try choosing a different optimizer. If you
    are using plain gradient descent, you may try Adam and see if you get better results.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化器的选择**：你可以尝试选择不同的优化器。如果你使用的是普通梯度下降，你可以尝试Adam，看看是否能得到更好的结果。'
- en: '**Varying the regularization method:** As discussed previously, there are several
    ways of applying regularization. Varying the method may well be worth trying.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正则化方法的选择**：如前所述，有几种应用正则化的方法。尝试不同的方法可能值得尝试。'
- en: '**Choice of activation function:** Although the activation function used in
    the past chapters for neurons in hidden layers was ReLU, others may work a lot
    better. Trying for example sigmoid or Swish may help you get better results.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**激活函数的选择**：尽管过去章节中用于隐藏层神经元的激活函数是ReLU，但其他函数可能效果更好。例如尝试sigmoid或Swish可能会帮助你获得更好的结果。'
- en: '**Number of layers and number of neurons in each layer:** Try different configurations.
    Try layers with different numbers of neurons for example.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**层数和每层的神经元数量**：尝试不同的配置。例如尝试具有不同神经元数量的层。'
- en: '**Learning rate decay methods:** Try different learning rate decay methods
    (if you are not using optimizers that do this already).'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学习率衰减方法**：尝试不同的学习率衰减方法（如果你没有使用已经具备这种功能的优化器）。'
- en: '**Mini-batch size:** Vary the size of the mini-batches. When you have a small
    amount of data you can use batch gradient descent. When you have a lot of data,
    mini-batches are more efficient.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小批量大小**：调整小批量的大小。当你有少量数据时，可以使用批量梯度下降。当你有大量数据时，小批量更有效率。'
- en: Weight initialization methods.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 权重初始化方法。
- en: 'Let’s classify the parameters we can tune in our models in the following three
    categories:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将我们可以在模型中调整的参数分为以下三个类别：
- en: 'Parameters that are continuous real numbers, or in other words, that can assume
    any value. Examples: learning rate and regularization parameter.'
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参数是连续的实数，换句话说，可以假设任何值。例如：学习率和正则化参数。
- en: 'Parameters that are discrete but can theoretically assume an infinite number
    of values. Examples: number of hidden layers, number of neurons in each layer,
    or number of epochs.'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参数是离散的，但理论上可以假设无限多个值。例如：隐藏层的数量、每层的神经元数量或训练轮数。
- en: 'Parameters that are discrete and can only assume a finite number of possibilities.
    Examples: optimizer, activation function, and learning rate decay method.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 参数是离散的，只能假设有限的可能值。例如：优化器、激活函数和学习率衰减方法。
- en: For category 3 there is not much to do except try all the possibilities. They
    typically will change the model completely and it’s impossible to model their
    effect, therefore making a test the only possibility. This is also the category
    where experience may help the most. It’s widely known that the Adam optimizer
    is almost always the best choice, so you may concentrate your efforts somewhere
    else at the beginning. For categories 1 and 2, it’s a bit more difficult, and
    you need to use some smart approaches to find the best values.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对于类别 3，除了尝试所有可能性之外，没有太多可做的事情。它们通常会完全改变模型，因此无法模拟它们的影响，因此测试成为唯一的选择。这也是经验可能最有帮助的类别。众所周知，Adam
    优化器几乎是最佳选择，因此您可以在一开始就将精力集中在其他地方。对于类别 1 和 2，这要困难一些，您需要使用一些智能方法来找到最佳值。
- en: Sample Black-Box Problem
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 样本黑盒问题
- en: To try our hands at solving a black-box problem, let’s create a “fake” black-box
    problem. Find the maximum of the function *f*(*x*) given by the formula
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了尝试解决一个黑盒问题，让我们创建一个“假”的黑盒问题。给定公式，找到函数 *f*(*x*) 的最大值
- en: '![$$ {\displaystyle \begin{array}{l}g(x)=\cos \frac{x}{4}-\sin \frac{x}{4}-\frac{5}{2}\cos
    \frac{x}{2}+\frac{1}{2}\sin \frac{x}{2}\\ {}h(x)=-\cos \frac{x}{3}-\sin \frac{x}{3}-\frac{5}{2}\cos
    \frac{2}{3}x+\frac{1}{2}\sin \frac{2}{3}x\\ {}f(x)=10+g(x)+\frac{1}{2}h(x)\end{array}}
    $$](../images/463356_2_En_6_Chapter/463356_2_En_6_Chapter_TeX_Equc.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}g(x)=\cos \frac{x}{4}-\sin \frac{x}{4}-\frac{5}{2}\cos
    \frac{x}{2}+\frac{1}{2}\sin \frac{x}{2}\\ {}h(x)=-\cos \frac{x}{3}-\sin \frac{x}{3}-\frac{5}{2}\cos
    \frac{2}{3}x+\frac{1}{2}\sin \frac{2}{3}x\\ {}f(x)=10+g(x)+\frac{1}{2}h(x)\end{array}}
    $$](../images/463356_2_En_6_Chapter/463356_2_En_6_Chapter_TeX_Equc.png)'
- en: pretending not to know the formula itself. The formula will let you see the
    results, but let’s pretend they are unknown. You may wonder why we use such a
    complicated formula. We wanted to have something with a few maxima and minima
    to show how the methods work on a non-trivial example. *f*(*x*) can be implemented
    in Python with the code
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 假装不知道公式本身。公式将让您看到结果，但让我们假装它们是未知的。您可能会想知道为什么我们使用如此复杂的公式。我们想要有一个具有几个极大值和极小值的函数，以展示方法在非平凡示例上的工作方式。*f*(*x*)
    可以使用以下 Python 代码实现
