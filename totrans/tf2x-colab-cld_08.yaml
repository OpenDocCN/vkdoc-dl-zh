- en: Configure Checkpoints
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With a RNN, we want to save what the model learns at each time step. One way
    to do this is to save the checkpoints that hold this information with a callback
    method. **Checkpoints** capture the exact value of all TensorFlow parameters (or
    tf.Variable.objects) used by a model.
  prefs: []
  type: TYPE_NORMAL
- en: Listing [8-4](#PC30) saves checkpoints so we can recall what the RNN has learned.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: Train the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Train the model for ten epochs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: We can add more epochs to improve performance. We tell the model to save checkpoints
    with *checkpoint_callback*.
  prefs: []
  type: TYPE_NORMAL
