  type: TYPE_PRE
- en: The new shape is (1, 4). The *1* dimension indicates batch size of 1\. The *4*
    dimension indicates the length of start_string. Experiment with the starting string
    to see generation of different texts.
  prefs: []
  type: TYPE_NORMAL
