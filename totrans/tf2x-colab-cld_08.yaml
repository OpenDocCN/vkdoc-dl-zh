  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 显示语料库开头的文本：
- en: '[PRE3]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Since we start from the beginning, it is pretty easy to verify. But verifying
    the end takes a bit more work.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们从开头开始，验证起来相当容易。但验证结尾需要更多的工作。
- en: 'Get the length of the corpus:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 获取语料库的长度：
- en: '[PRE4]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now, we know where the corpus ends.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们知道语料库在哪里结束了。
- en: 'With a bit of trial and error, we can display the famous quote from the end:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 通过一些尝试和错误，我们可以显示结尾的著名引言：
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'If you want to explore other online books for NLP, a great place to start is
    *Project Gutenberg* at the following URL: [`www.gutenberg.org/`](http://www.gutenberg.org/).'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想探索其他在线 NLP 书籍，一个很好的起点是以下 URL 的 *Project Gutenberg*：[`www.gutenberg.org/`](http://www.gutenberg.org/)。
- en: Create Vocabulary
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建词汇表
- en: Since our goal is to generate text with a character-level model, we train the
    model to predict the next character in a sequence. We can then repeatedly call
    the model to generate longer sequences of text.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的目标是使用字符级模型生成文本，我们训练模型来预测序列中的下一个字符。然后我们可以反复调用模型来生成更长的文本序列。
- en: 'Create a vocabulary of unique characters contained in the corpus:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 创建包含在语料库中的唯一字符的词汇表：
- en: '[PRE6]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We have a vocabulary of 74 unique characters stored in *vocab*.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在 *vocab* 中存储了 74 个唯一字符。
- en: Vectorize the Text
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 向量化文本
- en: Algorithms process numbers, not text. So we must devise a numerical representation
    of the corpus. An easy solution is to vectorize the text. **Text vectorization**
    is the process of converting text into numerical representation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 算法处理的是数字，而不是文本。因此，我们必须设计语料库的数值表示。一个简单的解决方案是将文本向量化。**文本向量化**是将文本转换为数值表示的过程。
- en: Let’s start by creating dictionary *int_map* to hold integer mappings of unique
    characters. Next, create numpy array *char_map* to hold character mappings of
    each integer representation. The numpy array allows us to translate encoded integer
    mappings back into their character representations. Once we vectorize the corpus,
    we can build the input pipeline for TensorFlow consumption.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们创建一个名为 *int_map* 的字典来存储唯一字符的整数字典映射。接下来，创建一个名为 *char_map* 的 numpy 数组来存储每个整数字符映射。numpy
    数组允许我们将编码后的整数字典映射转换回它们的字符表示。一旦我们将语料库向量化，我们就可以为 TensorFlow 构建输入管道。
- en: Create Integer Mappings
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建整数字典映射
- en: 'Create the dictionary:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 创建字典：
- en: '[PRE7]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We use dictionary comprehension to create *int_map*, which holds integer mappings
    for the corpus. **Dictionary comprehension** is a method for creating dictionaries
    using simple expressions. A dictionary comprehension takes the form *{key: value
    for (key, value) in iterable}*. In our case, the key is a unique character in
    the corpus, and the value is the integer mapping of the unique character. So integer
    *45* represents the letter *a*.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '我们使用字典推导式创建 *int_map*，它包含语料库的整数字典映射。**字典推导式**是使用简单表达式创建字典的方法。字典推导式的形式为 *{key:
    value for (key, value) in iterable}*。在我们的情况下，键是语料库中的唯一字符，值是唯一字符的整数字典映射。因此，整数 *45*
    代表字母 *a*。'
- en: Create Character Mappings
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建字符映射
- en: 'Create the numpy array that holds character mappings:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 创建包含字符映射的 numpy 数组：
- en: '[PRE8]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: It looks like our mappings work.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来我们的映射是有效的。
- en: Map a Sequence
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 映射序列
- en: Map a sequence as shown in Listing [8-1](#PC10).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [8-1](#PC10) 映射一个序列。
- en: '[PRE9]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Sequence hello world is vectorized with *int_map* and translated back into the
    original sequence with *char_map*.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 序列 "hello world" 使用 *int_map* 向量化，并使用 *char_map* 转换回原始序列。
- en: Vectorize the Corpus
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 向量化语料库
- en: 'Now that we have our mapping algorithms, we are ready to vectorize the corpus:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了映射算法，我们准备向量化语料库：
- en: '[PRE10]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Numpy array *encoded* holds the vectorized corpus. We display 20 integer mappings
    and their character equivalents to verify that all is well.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Numpy 数组 *encoded* 存储了向量化后的语料库。我们显示20个整数映射及其字符等效项，以验证一切正常。
- en: Predict the Next Character
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测下一个字符
- en: In a RNN, there are multiple activations on each neuron because of its built-in
    feedback loops. A **time step** is a single activation on a neuron. At each time
    step during training, our goal is to predict the next probable character given
    a character or sequence of characters. So input to the model must be a sequence
    of characters. But the sequence of characters must be constructed to work with
    our model.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在 RNN 中，由于内置的反馈循环，每个神经元都有多个激活。**时间步**是指一个神经元的单个激活。在训练的每个时间步，我们的目标是根据一个或一系列字符预测下一个可能的字符。因此，输入到模型中的必须是字符序列。但是，字符序列必须构建成与我们的模型兼容。
- en: Create Training Input Sequences
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建训练输入序列
- en: To create training instances, we divide the encoded corpus into input sequences.
    Each input sequence contains *seq_length* characters from the corpus. The *seq_length*
    is the maximum-length sentence we want for a single input sequence in characters.
    We break the corpus into equal-length sequences for better performance.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 为了创建训练实例，我们将编码后的语料库划分为输入序列。每个输入序列包含语料库中的 *seq_length* 个字符。*seq_length* 是我们希望单个输入序列中字符的最大长度。我们将语料库划分为等长序列以提高性能。
- en: For each input sequence, the sample contains the input sequence, and the corresponding
    target contains the input sequence shifted one character to the right. Targets
    are created this way because we are trying to predict the next character in a
    sequence. So we break the text into chunks of *seq_length + 1*.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个输入序列，样本包含输入序列，相应的目标包含向右移动一个字符的输入序列。目标是这样创建的，因为我们试图预测序列中的下一个字符。因此，我们将文本划分为
    *seq_length + 1* 的块。
- en: 'Begin by converting the encoded corpus into TensorFlow tensors:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 首先将编码后的语料库转换为 TensorFlow 张量：
- en: '[PRE11]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Display Samples
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示样本
- en: 'Display some samples from the training dataset:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 显示训练数据集的一些样本：
- en: '[PRE12]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We convert the integer representations of each character back to their character
    state with the *char_map* array created earlier.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用之前创建的 *char_map* 数组将每个字符的整数表示转换回其字符状态。
- en: Batch Sequences
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 批量序列
- en: 'Create batched sequences:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 创建批量序列：
- en: '[PRE13]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The batch method lets us easily convert individual characters to sequences of
    the desired size. Use the parameter *drop_remainder=True* to ensure that all batches
    are the same size.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 批量方法使我们能够轻松地将单个字符转换为所需大小的序列。使用参数 *drop_remainder=True* 确保所有批次大小相同。
- en: 'Display the first batch:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 显示第一个批次：
- en: '[PRE14]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Batch size is *101* to account for the target set.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 批量大小为 *101*，以考虑目标集。
- en: Note
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Each target is represented by shifting the input sequence one character to the
    right.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 每个目标通过将输入序列向右移动一个字符来表示。
- en: Create Samples and Targets
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建样本和目标
- en: 'Build a function that creates sample and target sets:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个创建样本和目标集的函数：
- en: '[PRE15]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The function shifts an input sequence by *1* to form the sample and target texts
    for each batch. So each sample contains the first 100 characters, and each target
    contains the second character up to the 101st character.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 函数将输入序列向右移动**1**个字符，以形成每个批次的样本和目标文本。因此，每个样本包含前100个字符，每个目标包含从第二个字符到第101个字符。
- en: 'Create the dataset:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据集：
- en: '[PRE16]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Map the function onto *sequences* to create a dataset composed of the desired
    sample and target sets.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 将函数映射到**序列**上，以创建由所需样本和目标集组成的语料库。
- en: 'Display the sample and target from the first input sequence:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 显示第一个输入序列的样本和目标：
- en: '[PRE17]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: As desired, the target is one character ahead of the sample so the algorithm
    can learn from the target how to predict the next character.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如所需，目标比样本提前一个字符，这样算法就可以从目标中学习如何预测下一个字符。
- en: Time Step Prediction
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间步预测
- en: Let’s look at the first five time steps from the sample and target sets as shown
    in Listing [8-2](#PC19).
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们查看样本和目标集的前五个时间步，如列表 [8-2](#PC19) 所示。
- en: '[PRE18]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Each index of the sample and target vectors is processed as a single time step.
    That is, each character processed in a sample and target is a time step. So, for
    the input at time step 0, the model receives the index (input_idx) for *A* and
    tries to predict the index for *a space* as the next character. At the next time
    step, the model repeats the same process. But the RNN model considers the context
    of the previous step in addition to the current input character. The output verifies
    that the sample and target sets were created properly.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 样本和目标向量的每个索引都作为一个单独的时间步处理。也就是说，样本和目标中处理的每个字符都是一个时间步。因此，对于时间步0的输入，模型接收*A*的索引（input_idx），并试图预测下一个字符*空格*的索引。在下一个时间步，模型重复相同的过程。但RNN模型除了当前输入字符外，还考虑了前一步的上下文。输出验证样本和目标集已正确创建。
- en: Create Training Batches
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建训练批次
- en: The dataset is already split into manageable text sequences. But we need to
    shuffle the data and pack it into batches before feeding it to the model.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集已经分割成可管理的文本序列。但在将数据馈送到模型之前，我们需要打乱数据并将其打包成批次。
- en: 'Set batch and buffer sizes:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 设置批量和缓冲区大小：
- en: '[PRE19]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Shuffle, batch, cache, and prefetch:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 打乱、批处理、缓存和预取：
- en: '[PRE20]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: TensorFlow data is designed to work with infinite sequences. So it doesn’t attempt
    to shuffle the entire sequence in memory. Instead, it maintains a buffer where
    it shuffles elements. We set *BUFFER_SIZE=10000* to give TensorFlow a fairly large
    buffer size, but not too big that we cause memory issues. We see that our dataset
    contains training samples and targets with batch sizes of 64 and sequence lengths
    of 100.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow数据设计用于处理无限序列。因此，它不会尝试在内存中打乱整个序列。相反，它维护一个缓冲区，其中打乱元素。我们将*BUFFER_SIZE*设置为10000，以给TensorFlow一个相当大的缓冲区大小，但不是太大，以免引起内存问题。我们注意到我们的数据集包含64个批量大小的训练样本和100个序列长度的目标。
- en: Build the Model
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: Begin by initializing some important variables. We set *vocab_size* to the number
    of unique characters in the corpus. We set *embedding dimension* to 256\. **Word
    embedding** is a learning technique in NLP where words or phrases from the vocabulary
    are mapped to vectors of real numbers.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 首先初始化一些重要的变量。我们将*vocab_size*设置为语料库中唯一字符的数量。我们将*嵌入维度*设置为256。**词嵌入**是NLP中的一种学习技术，其中词汇表中的单词或短语被映射到实数向量。
- en: In practice, we use word embedding vectors with dimensions between 50 and 500\.
    We use 256 because we believe it is a nice compromise between processing time
    and performance. Increasing the number of word embeddings provides better performance.
    But higher embedding dimensions are computationally expensive. We set *rnn_units*
    to 1024, which represents the number of neurons output from a layer.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我们使用维度在50到500之间的词嵌入向量。我们使用256，因为我们认为它在处理时间和性能之间是一个很好的折衷。增加词嵌入的数量可以提供更好的性能。但更高的嵌入维度计算成本更高。我们将*rnn_units*设置为1024，这代表从一层输出的神经元数量。
- en: 'Initialize variables:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化变量：
- en: '[PRE21]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Create the model as shown in Listing [8-3](#PC23).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表[8-3](#PC23)创建模型。
- en: '[PRE22]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: The first layer is an embedding layer with vocabulary size, embedding dimensions,
    and input shape of the batch as inputs. The output from the embedding layer feeds
    into the second layer, which is a GRU layer with 1024 neurons (identified by the
    *rnn_units* parameter). To retain what was learned at this layer, we set *return_sequences=True*
    and *stateful=True*. We also tell the GRU layer to draw samples from a uniform
    distribution by setting *recurrent_initializer='glorot_uniform'*. The output from
    the GRU layer feeds into the final dense layer with vocabulary size as input.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层是一个嵌入层，其输入为词汇大小、嵌入维度和批次的输入形状。嵌入层的输出连接到第二层，即一个具有1024个神经元（由*rnn_units*参数标识）的GRU层。为了保留在此层学到的内容，我们设置*return_sequences=True*和*stateful=True*。我们还告诉GRU层通过设置*recurrent_initializer='glorot_uniform'*从均匀分布中抽取样本。GRU层的输出连接到最终密集层，其输入为词汇大小。
- en: '**Gated recurrent units** (GRUs) are a gating mechanism in RNNs that are similar
    to a long short-term memory (LSTM) with a forget gate, but have fewer parameters
    than a LSTM and lack an output gate.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '**门控循环单元**（GRUs）是RNN中的一个门控机制，与具有遗忘门的长期短期记忆（LSTM）类似，但参数比LSTM少，并且没有输出门。'
- en: 'For a deep discussion of GRUs, consult the following URL: [`https://arxiv.org/ftp/arxiv/papers/1701/1701.05923.pdf`](https://arxiv.org/ftp/arxiv/papers/1701/1701.05923.pdf).'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 深入讨论GRUs，请参考以下URL：[`https://arxiv.org/ftp/arxiv/papers/1701/1701.05923.pdf`](https://arxiv.org/ftp/arxiv/papers/1701/1701.05923.pdf)。
- en: Display Model Summary
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 显示模型摘要
- en: 'Inspect the model:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE23]'
  id: totrans-140
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The first layer is an embedding. So calculate the number of learnable parameters
    by multiplying vocabulary size of 74 by embedding dimension of 256 for a total
    of 18,944.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层是一个嵌入层。因此，通过将74个词汇大小乘以256个嵌入维度，计算出可学习参数的数量，总共为18,944。
- en: 'The second layer is a GRU. The number of learnable parameters is thereby based
    on the formula *3* `×` *(n*^(*2*) `×` *mn + 2n)* where *m* is the input dimension
    and *n* is the output dimension. Multiply by *3* because there are three sets
    of operations for a GRU that require weight matrices of these sizes. Multiply
    *n* by *2* because of the feedback loops of a RNN. So we get 3,938,304 learnable
    parameters. Here’s how we break down the result:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层是一个GRU层。可学习参数的数量基于公式 *3* `×` *(n*^(*2*) `×` *mn + 2n)*，其中 *m* 是输入维度，*n* 是输出维度。乘以
    *3* 是因为GRU有三个操作集，需要这些大小的权重矩阵。将 *n* 乘以 *2* 是因为RNN的反馈循环。因此，我们得到3,938,304个可学习参数。以下是结果分解：
- en: '* 3 `×` (1024² + 1024 `×` 256 + 2 `×` 1024)'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3 `×` (1024² + 1024 `×` 256 + 2 `×` 1024)'
- en: '* 3 `×` (1048576 + 262144 + 2048)'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3 `×` (1048576 + 262144 + 2048)'
- en: '* 3 `×` 1312768'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3 `×` 1312768'
- en: '* 3,938,304'
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '* 3,938,304'
- en: As we can see, calculating learnable parameters for the second layer is pretty
    complex. So let’s break it down logically. A GRU layer is a feedforward layer
    with feedback loops. Learnable parameters for a feedforward network are calculated
    by multiplying output from the previous layer (256 neurons) with neurons at the
    current layer (1024 neurons). With a feedforward network, we also have to account
    for the 1024 neurons at this layer. But we multiply the 1024 neurons at this layer
    by 2 because of the feedback mechanism of a RNN. Finally, the current layer’s
    1024 neurons are fed back resulting in 1024² learnable parameters. A GRU uses
    three sets of operations (hidden state, reset gate, and update gate) requiring
    weight matrices, so we multiply the learnable parameters by 3.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，计算第二层的可学习参数相当复杂。所以让我们逻辑地分解它。GRU层是一个具有反馈循环的前馈层。前馈网络的可学习参数通过将前一层的输出（256个神经元）与当前层的神经元（1024个神经元）相乘来计算。在前馈网络中，我们还需要考虑当前层的1024个神经元。但由于RNN的反馈机制，我们将当前层的1024个神经元乘以2。最后，当前层的1024个神经元被反馈，产生1024²个可学习参数。GRU使用三组操作（隐藏状态、重置门和更新门），需要这些大小的权重矩阵，因此我们将可学习参数乘以3。
- en: The third layer is dense. So calculate the number of learnable parameters by
    multiplying output dimension of 74 by input dimension of 1,024 and adding 74 to
    account for the number of neurons at this layer for a total of 75,850.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层是密集层。因此，通过将输出维度74乘以输入维度1024，并加上74以计算该层的神经元数量，总共为75,850。
- en: Check Output Shape
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查输出形状
- en: 'Display the shape of the first batch in the dataset:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据集中第一个批次的形状：
- en: '[PRE24]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The first batch has *batch_size* of *64*, *sequence_length* of *100*, and *vocab_size*
    of *74* as expected. Notice that the model summary output shape from the dense
    layer is (64, None, 74). The sequence length is not included because the model
    can be run on inputs of any length.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个批次具有预期的 *batch_size* 为 *64*，*sequence_length* 为 *100*，*vocab_size* 为 *74*。请注意，密集层的模型摘要输出形状为
    (64, None, 74)。序列长度没有包括，因为模型可以在任何长度的输入上运行。
- en: Calculate Loss
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算损失
- en: We sample from the output distribution to predict character indices. The output
    distribution is defined by the logits over our character vocabulary. A **logit**
    is a probability value between 0 and 1 and negative infinity and infinity derived
    from a logit function. Simply, a logit is a prediction. The logit function is
    an inverse to the sigmoid function as it limits values between 0 and 1 across
    the Y-axis rather than the X-axis. Since our model returns logits, we need to
    set the *from_logits* flag to calculate loss.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从输出分布中采样以预测字符索引。输出分布由字符词汇上的logits定义。**logit** 是一个介于0和1之间，以及负无穷和正无穷的值，由logit函数导出。简单来说，logit是一个预测。logit函数是sigmoid函数的逆函数，因为它限制了Y轴上的值在0到1之间，而不是X轴。由于我们的模型返回logits，我们需要设置
    *from_logits* 标志来计算损失。
- en: 'Build a function to calculate loss:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个计算损失的函数：
- en: '[PRE25]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Invoke the function:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE26]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: The model expects a 3D tensor consisting of batch size, sequence length, and
    vocabulary size.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型期望一个由批大小、序列长度和词汇大小组成的3D张量。
- en: 'Let’s see if the shape is correct:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看形状是否正确：
- en: '[PRE27]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Great! The prediction shape is as expected with batch size of 64, sequence length
    of 100, and vocabulary size of 74\. We also display the average loss from the
    pretrained model.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！预测形状符合预期，批大小为64，序列长度为100，词汇大小为74。我们还显示了预训练模型的平均损失。
- en: Compile the Model
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile the model:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 编译模型：
- en: '[PRE28]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Configure Checkpoints
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置检查点
- en: With a RNN, we want to save what the model learns at each time step. One way
    to do this is to save the checkpoints that hold this information with a callback
    method. **Checkpoints** capture the exact value of all TensorFlow parameters (or
    tf.Variable.objects) used by a model.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 使用RNN，我们希望保存模型在每个时间步学到的内容。一种方法是通过回调方法保存包含此信息的检查点。**检查点**捕获模型使用的所有TensorFlow参数（或tf.Variable.objects）的确切值。
- en: Listing [8-4](#PC30) saves checkpoints so we can recall what the RNN has learned.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[8-4](#PC30)保存了检查点，这样我们就可以回忆起RNN学到了什么。
- en: '[PRE29]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Train the Model
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train the model for ten epochs:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型10个epoch：
- en: '[PRE30]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: We can add more epochs to improve performance. We tell the model to save checkpoints
    with *checkpoint_callback*.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以添加更多的epoch来提高性能。我们告诉模型使用*checkpoint_callback*来保存检查点。
- en: Rebuild the Model for Text Creation
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为文本创建重建模型
- en: 'Now that we have a trained RNN, we rebuild the model to predict one character
    at a time. We rebuild in three steps:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经训练了一个RNN，我们重新构建模型以一次预测一个字符。我们分三步进行重建：
- en: Restore weights from checkpoints.
  id: totrans-176
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从检查点恢复权重。
- en: Rebuild with batch size of 1.
  id: totrans-177
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以1个批处理大小重建。
- en: Load weights and reshape the model to ensure tensors with batch size of 1.
  id: totrans-178
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加载权重并将模型重塑以确保具有1个批处理大小的张量。
- en: Restore Weights from Checkpoints
  id: totrans-179
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 从检查点恢复权重
- en: Restore weights from checkpoints established during training. We restore checkpoints
    to obtain what the RNN learned at each time step.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 从训练期间建立的检查点恢复权重。我们恢复检查点以获取RNN在每个时间步学到的内容。
- en: 'Restore:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 恢复：
- en: '[PRE31]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Rebuild with Batch Size of 1
  id: totrans-183
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 以1个批处理大小重建
- en: Since we constructed our sequences to look ahead one character, we predict one
    character at a time. Because of the way the RNN state is passed from time step
    to time step, the model only accepts a fixed batch size once it is built.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们构建的序列是向前看一个字符，所以我们一次预测一个字符。由于RNN状态是从时间步到时间步传递的，一旦构建完成，模型只能接受一个固定的批处理大小。
- en: Rebuild the model with batch size of 1 (instead of 64) as shown in Listing [8-5](#PC33).
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表[8-5](#PC33)所示，以1个批处理大小重建模型（而不是64）。
- en: '[PRE32]'
  id: totrans-186
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Load Weights and Reshape
  id: totrans-187
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 加载权重和重塑
- en: 'Load the weights saved from the trained RNN and reshape the model to ensure
    that tensors have a batch size of 1:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 加载从训练的RNN保存的权重并将模型重塑以确保张量具有1个批处理大小：
- en: '[PRE33]'
  id: totrans-189
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Model Summary
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE34]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Notice that the first parameter for output shapes is 1 indicating that batch
    size was changed as expected.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，输出形状的第一个参数为1，表示批处理大小已按预期更改。
- en: Create Components to Generate Text
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建生成文本的组件
- en: To create new text, create a function and initialize a set of variables to feed
    to the function. To prepare the starting string for TensorFlow consumption, vectorize
    and reshape it before passing it to the function.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建新的文本，创建一个函数并初始化一组变量以供函数使用。为了准备TensorFlow使用的起始字符串，在传递给函数之前对其进行矢量化并重塑。
- en: Create the Function
  id: totrans-196
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 创建函数
- en: Create the text generation function as shown in Listing [8-6](#PC36).
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表[8-6](#PC36)所示的文本生成函数。
- en: '[PRE35]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: The function accepts the model, vectorized starting string, temperature, and
    original starting string. It begins by initializing a list to hold the new text
    created and resetting the states of the model. The function continues by iterating
    *n* times (the number of characters we wish to create).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 函数接受模型、矢量化起始字符串、温度和原始起始字符串。它首先初始化一个列表来保存创建的新文本并重置模型的各个状态。函数继续通过迭代*n*次（我们希望创建的字符数）。
- en: '**Temperature** is a hyperparameter of neural networks used to control the
    randomness of predictions by scaling the logits before applying softmax activation.
    A bit more simply, temperature represents how much to divide the logits by before
    computing softmax activation.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '**温度**是神经网络的一个超参数，用于通过在应用softmax激活之前缩放logits来控制预测的随机性。更简单地说，温度表示在计算softmax激活之前将logits除以多少。'
- en: During iteration, the function models the encoded starting string and places
    the result in *predictions*. It then removes the extra *1* dimension so it can
    divide the contents of *predictions* by the *temperature*. The next task of the
    function is to use a categorical distribution to predict the next character returned
    by the model. The function needs to add the *1* dimension back so that it can
    pass the predicted character as the next input to the model along with the previous
    hidden state. Newly generated characters are appended to the *new_text* array.
    The process repeats until the loop is extinguished.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在迭代过程中，该函数对编码后的起始字符串进行建模，并将结果放入 *predictions*。然后它移除额外的 *1* 维度，以便可以将 *predictions*
    的内容除以 *temperature*。函数的下一个任务是使用分类分布来预测模型返回的下一个字符。函数需要将 *1* 维度添加回去，以便可以将预测的字符作为下一个输入传递给模型，同时带上之前的隐藏状态。新生成的字符被附加到
    *new_text* 数组中。这个过程会重复进行，直到循环结束。
- en: Initialize Variables
  id: totrans-202
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 初始化变量
- en: 'Initialize the variables:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 初始化变量：
- en: '[PRE36]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Set *n* to the number of characters we wish to create. Continue by setting the
    temperature and the starting string. Low temperatures result in more predictable
    text, while higher temperatures result in more surprising text. You can experiment
    to find the best setting. You can also experiment with the starting string. We
    chose *Tale* because we know that the corpus contains the name.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 将 *n* 设置为我们希望创建的字符数。接着设置温度和起始字符串。低温会导致文本更加可预测，而高温会导致文本更加令人惊讶。你可以尝试找到最佳设置。你也可以尝试不同的起始字符串。我们选择
    *Tale* 是因为我们知道语料库中包含这个名字。
- en: Vectorize and Reshape the Starting String
  id: totrans-206
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 向量化并重新塑形起始字符串
- en: Vectorize the starting string because the model only recognizes numbers. Reshape
    the vectorized starting string for TensorFlow consumption. That is, add the 1
    dimension to the starting string so that the model can process it. Display shapes
    to verify that all is well.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 向量化起始字符串，因为模型只识别数字。重新塑形向量化后的起始字符串以供 TensorFlow 使用。也就是说，向起始字符串添加 1 维度，以便模型可以处理它。显示形状以验证一切正常。
- en: Vectorize the starting string and reshape it for TensorFlow consumption as shown
    in Listing [8-7](#PC38).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 将起始字符串向量化并重新塑形以供 TensorFlow 使用，如列表 [8-7](#PC38) 所示。
- en: '[PRE37]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: The new shape is (1, 4). The *1* dimension indicates batch size of 1\. The *4*
    dimension indicates the length of start_string. Experiment with the starting string
    to see generation of different texts.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 新形状是 (1, 4)。*1* 维度表示批处理大小为 1。*4* 维度表示 start_string 的长度。通过尝试不同的起始字符串来观察不同文本的生成。
- en: Create New Text
  id: totrans-211
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建新文本
- en: 'Plant random seeds and invoke the function:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 设置随机种子并调用函数：
- en: '[PRE38]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Wow! Although the sentences are nonsensical, the model creates actual sentences.
    If you think about it, what we just did was amazing. The model ingested a corpus
    and was able to learn from it.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！尽管句子毫无意义，但模型确实创造了实际的句子。如果你仔细想想，我们刚才所做的是多么令人惊叹。模型吞噬了一个语料库，并能够从中学习。
