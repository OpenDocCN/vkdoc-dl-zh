- en: Create Components to Generate Text
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To create new text, create a function and initialize a set of variables to feed
    to the function. To prepare the starting string for TensorFlow consumption, vectorize
    and reshape it before passing it to the function.
  prefs: []
  type: TYPE_NORMAL
- en: Create the Function
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Create the text generation function as shown in Listing [8-6](#PC36).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: The function accepts the model, vectorized starting string, temperature, and
    original starting string. It begins by initializing a list to hold the new text
    created and resetting the states of the model. The function continues by iterating
    *n* times (the number of characters we wish to create).
  prefs: []
  type: TYPE_NORMAL
- en: '**Temperature** is a hyperparameter of neural networks used to control the
    randomness of predictions by scaling the logits before applying softmax activation.
    A bit more simply, temperature represents how much to divide the logits by before
    computing softmax activation.'
  prefs: []
  type: TYPE_NORMAL
- en: During iteration, the function models the encoded starting string and places
    the result in *predictions*. It then removes the extra *1* dimension so it can
    divide the contents of *predictions* by the *temperature*. The next task of the
    function is to use a categorical distribution to predict the next character returned
    by the model. The function needs to add the *1* dimension back so that it can
    pass the predicted character as the next input to the model along with the previous
    hidden state. Newly generated characters are appended to the *new_text* array.
    The process repeats until the loop is extinguished.
  prefs: []
  type: TYPE_NORMAL
- en: Initialize Variables
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Initialize the variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: Set *n* to the number of characters we wish to create. Continue by setting the
    temperature and the starting string. Low temperatures result in more predictable
    text, while higher temperatures result in more surprising text. You can experiment
    to find the best setting. You can also experiment with the starting string. We
    chose *Tale* because we know that the corpus contains the name.
  prefs: []
  type: TYPE_NORMAL
- en: Vectorize and Reshape the Starting String
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Vectorize the starting string because the model only recognizes numbers. Reshape
    the vectorized starting string for TensorFlow consumption. That is, add the 1
    dimension to the starting string so that the model can process it. Display shapes
    to verify that all is well.
  prefs: []
  type: TYPE_NORMAL
