- en: 8. Automated Text Generation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Feedforward neural nets are generally great for classification and regression
    problems. CNNs are great for complex image classification. But activations for
    feedforward nets and CNNs flow only in one direction, from the input layers to
    the output layer. Since signals flow in only one direction, feedforward and convolutional
    nets are not ideal if patterns in data change over time. So we need a different
    network architecture to work with data impacted by time.
  prefs: []
  type: TYPE_NORMAL
- en: A **recurrent neural network** (RNN) looks a lot like a feedforward neural network,
    but it also has connections pointing backward. That is, output from one layer
    can act as input back into another layer earlier in the network. The capability
    of one layer to inform another layer earlier in the network means that a RNN has
    a built-in feedback loop mechanism that allows it to act as a forecasting engine.
    So RNNs are great as forecasters because they naturally work well as data changes
    with time.
  prefs: []
  type: TYPE_NORMAL
- en: A RNN remembers the past, and its decisions are influenced by what it has learned
    from the past. Feedforward and convolutional networks only remember what they
    learn during training. For example, a feedforward image classifier learns what
    an image looks like during training and then uses that knowledge to classify other
    images in production. While RNNs learn similarly during training, they also remember
    what they learned so they can make good decisions as data changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  prefs: []
  type: TYPE_NORMAL
- en: Natural Language Processing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A fascinating advancement in machine learning is the ability to teach a machine
    how to understand human communication. The area of machine learning that concentrates
    on understanding how humans communicate is natural language processing. **Natural
    language processing** (NLP) is a field in machine learning concentrating on the
    ability of a computer to understand, analyze, manipulate, and potentially generate
    human language. RNNs are a very important variant of neural networks used heavily
    for NLP.
  prefs: []
  type: TYPE_NORMAL
- en: RNNs are great for NLP because their standard input is a word instead of the
    entire sample taken as standard input by sequential nets like feedforward and
    convolutional networks. So RNNs have the flexibility to work with varying lengths
    of sentences, which cannot be achieved by sequential neural networks because of
    their fixed structure. RNNs can also share features learned across different positions
    of text because of their flexible structure.
  prefs: []
  type: TYPE_NORMAL
- en: The feedback looping ability of a RNN allows it to parse each word of a sentence
    and run an activation on it. The activation value from the word can then be fed
    back to the layer that is parsing the sentence. So the activation value informs
    the sentence of what was learned from each word! And the cycle continues for each
    word until the network understands the sentence. In machine learning speak, a
    RNN treats each word of a sentence as a separate input occurring at a particular
    time ‘t’ and uses the activation value for this input ‘t-1’ as feedback to the
    original sentence.
  prefs: []
  type: TYPE_NORMAL
