- en: Read the Corpus into Memory
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将语料库读入内存
- en: In NLP, a text document is often referred to as a corpus. A **corpus** is a
    collection of written texts, especially the entire works of a particular author
    or a body of writing on a particular subject.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在 NLP 中，一个文本文档通常被称为语料库。**语料库**是一组书面文本，特别是特定作者的全部作品或特定主题的写作集合。
- en: Note
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: All code is based on the *processed* version of the text file.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 所有代码都是基于文本文件的 *处理* 版本。
- en: 'Read corpus into memory:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 将语料库读入内存：
- en: '[PRE2]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Verify Corpus
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 验证语料库
