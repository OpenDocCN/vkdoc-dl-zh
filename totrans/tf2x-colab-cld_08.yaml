- en: Generating Text with a RNN
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As noted, RNNs are commonly used for natural language tasks. Typically, we can
    model natural language tasks by character or word. We begin by building a *character-level*
    model that generates text. In the next chapter, we build a word-level model that
    predicts sentiment.
  prefs: []
  type: TYPE_NORMAL
