- en: 7. Navigation, SLAM, and Goals
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, our intrepid rover will explore the Egyptian catacombs. Any
    autonomous rover needs to know where it is in its environment; i.e., its current
    position. That way, the rover can travel from one location to the next without
    user input. To do this, the rover must construct an internal map of its environment
    as it travels. This chapter introduces the simultaneous localization and mapping
    (SLAM) algorithm. SLAM generates maps from navigation data, such as the odometry
    data from the rover’s wheel encoders and the laser range data from the LiDAR sensor.
  prefs: []
  type: TYPE_NORMAL
- en: Objectives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following are the objectives required for successful completion of this
    chapter:'
  prefs: []
  type: TYPE_NORMAL
- en: Mission types
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tracking local and global location in an environment (odometry)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Correcting our travel (control theory)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simultaneous Localization and Mapping (SLAM)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To create an autonomous rover, the rover must know its position and orientation
    in the environment.
  prefs: []
  type: TYPE_NORMAL
- en: Mission Types
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There exist three types of rover missions: complete coverage, goal directed,
    and exploratory. We will discuss **complete coverage** missions later. The **goal-directed**
    mission goes from Point A (initial) to Point G (goal). The goal can be a simple
    straight-line path (A connects directly to G) or a segmented path that traverses
    through other waypoints (A→B→C→…→G). The intermediate waypoints can be preplanned
    or discovered autonomously.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The **exploratory** mission discovers features of the environment and places
    them on internal local and global maps. These features can be walls, doorways,
    objects, holes in the ground, etc. Creating this internal global map is necessary
    so as to plan future missions with optimal paths. An exploratory mission can be
    one of three sub-types: one-point or two-point missions, and resource discovery.'
  prefs: []
  type: TYPE_NORMAL
- en: The one-point mission gives the rover a starting position from which to “map”
    the entire environment and to which it should return. This mission type would
    be in a new environment, such as moving to a new house and randomly exploring
    the entire neighborhood.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The two-point mission provides the rover with its starting and final or goal
    positions. We can assume the final position is in an unexplored location on the
    intermediate map. The two-point mission does not have to explore the unknown environment
    thoroughly, just enough to get to the final goal. After moving into our new home,
    we know the address of the school we will attend, so we explore the route to learn
    about landmarks. Maybe there are some road closures, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Our third—exploratory—mission is a one-point mission with a goal resource. Assuming
    no GPS, we might explore to find a pizza shop when we move into our new house.
    We do not know where the pizza shop is. We are just exploring the neighborhood
    until we find one.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Odometry
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Odometry estimates the change in position based on wheel sensor data. The odometry
    is calculated using the (simulated) rover’s wheel encoder. Think of putting a
    playing card on your bicycle as a kid as an analogy. Each time the card struck
    a spoke, a click was heard. If we know the original position of the bicycle and
    how many clicks were generated, we could calculate the new location of the bicycle
    (assuming the trip was a straight line). We know this because we know how many
    spokes (18) the wheel has and the circumference (36 inches). So, each click translates
    to “move forward two inches.”
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, we can calculate the bicycle’s speed by the frequency of the clicks.
    Of course, the assumption that the bicycle is going in a straight line is relatively
    strong, and this also does not take into account any skidding or sliding, etc.
    The odometry gives us an approximation of our current position! The shorter the
    trip, the better the approximation.
  prefs: []
  type: TYPE_NORMAL
- en: This position approximation process is how the wheel encoder works. The rover’s
    odometry is calculated by counting each “click” of the wheels to approximate the
    rover’s speed, direction, and location. The distance-traveled calculation is accurate
    as long as the simulated rover travels in a straight line (no turns). A more sophisticated
    odometry algorithm combines linear (forward and backward) and angular (turning
    left or right) acceleration to calculate the rover’s velocity and position. We
    can also use the inertial measurement unit (IMU) sensor to make more accurate
    calculations. Unfortunately, the calculations will still become increasingly erroneous
    over time and distance due to round-off errors, and we cannot correct this without
    updating our location from external sources.
  prefs: []
  type: TYPE_NORMAL
- en: 'Navigation, SLAM, and pathfinding algorithms use odometry’s calculated position.
    The position is its location and its orientation, known as its **pose**. The degrees
    of freedom (DoF) is the number of dimensions necessary to describe the complete
    pose of our rover. For example, an airplane has six DoF because it can move in
    three dimensions <x,y,z> and rotate in three dimensions <r,p,y>, where r,p,y stands
    for roll, pitch, and yaw. Similarly, in the rover’s URDF Xacro files, the initial
    position and orientation six DoF is given as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, odometry is used in both local and global maps. The **local** map tells
    the rover its location based on the starting position. The **global** map places
    our rover within the environment for visualization by an external viewer such
    as the RViz environment.
  prefs: []
  type: TYPE_NORMAL
- en: Rover’s Local Navigation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Our rover can travel from one location to the next in an environment, handling
    obstacles blocking its path based on the odometry calculations. As mentioned earlier,
    there are two coordinate systems for the rover’s navigation: local and global.
    The local navigation is the internal understanding of the rover that can sense
    nearby objects. The rover’s local sensing capability means the rover will know
    that it started at location (0,0) facing north; it is currently at (1,3) facing
    east and senses an object at (1,5). We will explore global navigation later.'
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, if the rover keeps moving east, it may collide with an obstacle—it
    could be a wall or a stand-alone object. The local goal is to avoid the obstacle.
    To avoid the obstacle, we can 1) stop, 2) turn left/right, and 3) move forward
    into an unblocked area, OR we can turn as we move into an unblocked area. The
    first solution is easiest to implement, but it slows our rover’s exploration.
    Conveniently, Robotic Operating System (ROS) has plug-ins to assist in controlling
    the rover, so we do not have to understand the physics.
  prefs: []
  type: TYPE_NORMAL
- en: Rover’s Global Navigation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us assume that we are on a two-point exploratory mission. Global navigation
    is finding a path between two points located somewhere in the environment. Finding
    the route between these two points requires generating a global map of the domain.
    As the rover explores, we use odometry to calculate its location. We simply convert
    from the local coordinate system to the global coordinate system and draw our
    rover avatar at that location. Furthermore, sensor data populates the map with
    object outlines, such as walls and obstacles. After creating this map, future
    goal-directed missions can preplan the shortest path between the two points.
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, it is evident that errors in calculating the rover’s location from
    the odometry can have significant repercussions on the global map rendering. Knowing
    where the rover is in the environment allows us to create accurate maps on exploratory
    missions and optimal paths on goal-directed, planned missions.
  prefs: []
  type: TYPE_NORMAL
- en: Odometry can be used for short durations with no real consequences to the rover’s
    position and pose. However, odometry’s uncertainty in determining the precise
    location and pose of the rover can be bothersome. This uncertainty is especially
    problematic when exploring in an uncertain environment for a long time. To help
    reduce these issues of uncertainty with missions of longer duration, we update
    our global maps on every mission. This reinforcement of object location can boost
    confidence in the global map’s construction. Furthermore, an object’s permanent
    location lets us assign position tags. To reset the odometry settings, we can
    use the object’s permanent position tag as an external “verified” location.
  prefs: []
  type: TYPE_NORMAL
- en: Getting the Rover Heading (Orientation)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To develop a more adaptable sense-and-avoid algorithm, we need to know our rover’s
    direction. To achieve this, the `/odom` topic provides our AI rover’s heading
    sensor data to the `Twist()` function. Recall that `Twist()` gets the new desired
    heading and rotates the rover iteratively from its current heading to its desired
    heading. Then `Twist()` passes the data through the `/cmd_vel` topic to control
    the angular velocities of each wheel. As mentioned in Chapter [6](494112_1_En_6_Chapter.xhtml),
    these controls allow the AI rover to escape tight corners and enclosed areas.
    Now the AI rover can avoid obstacles without external steering.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We have started to create a rover that is autonomous—i.e., it can steer itself
    without human intervention. The self-driving appears “intelligent” to an outside
    observer, and this means the rover has just evolved to an artificially intelligent
    rover, or AI rover. Henceforth, *rover* and *AI rover* are synonymous.
  prefs: []
  type: TYPE_NORMAL
- en: Create a `rotateRobotOdom.py` script in the `catkin_ws/src` directory. This
    script retrieves orientation data from the `/odom` topic (Listing [7-1](#PC2)).
    This data lets the rover know what its heading is.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Most of the script should be familiar, but a few lines need to be explained.
    The code updates the roll, pitch, and yaw of the AI rover as it travels and rotates.
    Only the yaw values change since the environment is modeled as a flat, two-dimensional
    surface. We will test this script by using the keyboard-controlled `teleop_twist_keyboard.py`
    program.
  prefs: []
  type: TYPE_NORMAL
- en: 'In Line 6, we face “North” by setting the roll, pitch, and yaw values to zero
    at the start of the mission. Lines 7–14 define the `get_rotation` function. The
    argument to this function is from the navigation `msg`; in quaternion coordinates:
    [x, y, z, w]. Do not worry about quaternion coordinates because Line 12 converts
    them to Euler coordinates. Line 15 registers the `rotateRobotOdom` node with ROS
    to subscribe and publish messages; i.e., `get_rotation` is now a **callback**
    function. A callback function is an “infinite loop” that publishes its results
    to subscribers at specific intervals. Line 17 links the *`/odom Odometry` topic
    to the `get_rotation` callback function. Any object subscribing to the `Odometry`
    topic will receive the latest `get_rotation` message. Line 19 specifies that the
    messages will be published every second. Lines 20–23 are our “infinite loop,”
    which returns the current orientation every second in quaternions [x, y, z, w].'
  prefs: []
  type: TYPE_NORMAL
- en: Executing the rotateRobotOdom.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Execute the following Linux terminal commands to compile and run in terminal
    1:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'After success, execute the following Linux terminal commands in terminal 2:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: After executing `ai_rover_cat.launch` and `rotateRobotOdom.py`, you will see
    the AI rover in the Gazebo with a scrolling list of radians in the terminal. We
    see that the initial direction that the AI rover faces is approximately zero radians.
    Figure [7-1](#Fig1) shows our initial heading, and all future headings will be
    based upon this original orientation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_7_Chapter/494112_1_En_7_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A number reads 0.00884617479721.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: The initial orientation angle of around 0 radians for AI rover
  prefs: []
  type: TYPE_NORMAL
- en: 'If we want to control the rover with the keyboard, we must execute the `teleops_twist_keyboard.py`
    ROS node. We can do this with the following terminal commands in terminal 3:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Using the “j” and “l” keys, turn the rover and take note of the values displayed
    in terminal 2\. These numbers reflect the orientation of the rover in radians.
  prefs: []
  type: TYPE_NORMAL
- en: Revisiting our **exploratory** mission, let us imagine that our rover is moving
    forward when the sensors detect an object. The sensing of the object is the feedback.
    Continuing forward would be wrong because we would crash, so we have to change
    the rover’s direction—issue new commands. To avoid the object, we can turn left
    into an unblocked, unexplored area; turn right into an unblocked, unexplored location;
    or turn around and retreat to an earlier point with unexplored regions. This last
    option recognizes that we hit a dead end and that further exploration is futile.
  prefs: []
  type: TYPE_NORMAL
- en: It is crucial to verify that the rover’s orientation on the screen is correct.
    Zero radians should look like the rover is pointing “North” (up) on the screen.
    From now on, if we command the AI rover to turn (yaw), we should see the radians
    change (Figure [7-2](#Fig2)), and the rover’s orientation will change on the screen.
    In the background, our command is converted into independent commands for each
    wheel. In response, after processing the command, each wheel publishes its current
    position and yaw via a wheel encoder. Each encoder type is inaccurate, but it
    is accurate enough for our system. So, our rover’s pose is calculated from the
    wheel positions.
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [7-2](#Fig2), we changed the orientation of the rover to ~0.16 radians
    with the manual controls (j, k, l). We can see that we have now successfully tested,
    verified, and validated that the odometry and orientation of the AI rover are
    indeed correct.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_7_Chapter/494112_1_En_7_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the terminal with the data of rover orientation and a g-map
    as the visual representation of the orientation. The visual representation is
    on the left and the terminal with data is on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Changes of the yaw orientation in radians. Orientation is 0.16 radians and is
    facing south–southeast (SSE)
  prefs: []
  type: TYPE_NORMAL
- en: Control Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Control theory is simply a feedback loop (Figure [7-3](#Fig3)); i.e., we do
    something, then look around to see how things have changed because of what we
    did. If the result is good, we continue doing it. If the result is wrong, we adjust
    and “correct” what we are doing wrong. For example, we start our rover one-point
    exploratory mission by moving forward. As long as the sensors detect nothing in
    front, we continue to move forward. However, once any of our sensors (LiDAR, radar,
    camera) detect an obstacle in our path, we change the AI rover’s course to avoid
    the obstacle and explore further.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_7_Chapter/494112_1_En_7_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A schematic of a simple feedback loop. The controller, brain sends commands
    to the controlled object and receives feedback from the controlled object.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-3
  prefs: []
  type: TYPE_NORMAL
- en: Simple feedback loop
  prefs: []
  type: TYPE_NORMAL
- en: Autonomous Navigation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Figure [7-4](#Fig4) uses a simple Unified Modeling Language (UML) statechart
    to model navigation and control logic for our one-point exploration mission; i.e.,
    we have no goal location or resource. We are just trying to create a map. The
    UML statechart models the three states (`GO_STRAIGHT`, `STOP`, and `TURN`). A
    limited number of state transitions (obstacle, no obstacle) will represent the
    navigation’s dynamic behavior. If the rover is going straight and there are no
    obstacles in its path, it will keep going straight. However, if a sensor detects
    an obstacle, it will stop and then turn. While it is turning, if there is still
    an obstacle in its path, it will keep turning. When there is a clear (and unexplored)
    path, it will resume going forward down that unexplored path. Not shown in this
    diagram is what happens when no new unexplored paths are available. One option
    is to maintain a set of visited waypoints, retrace the path back to a previous
    point with unexplored paths, and resume exploring from that point.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_7_Chapter/494112_1_En_7_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A circular loop for navigation statechart. The steps are as follows. No obstacles,
    go straight; obstacle, stop; obstacle, turn; no obstacle, go straight.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-4
  prefs: []
  type: TYPE_NORMAL
- en: Navigation statechart
  prefs: []
  type: TYPE_NORMAL
- en: From a programming perspective, the three states must update odometry data.
    Later, we will also use the states to update our internal map. We will review
    these concepts for autonomous navigation toward the end of this chapter. At the
    end of this chapter, we will review the following behaviors that the rover can
    accomplish when exploring the environment.
  prefs: []
  type: TYPE_NORMAL
- en: '**GO_STRAIGHT:** The rover starts or continues going in its current direction,
    continuously updating its position <x,y,z> [z never changes]. Roll, pitch, and
    yaw <r,p,y> are not changed. If it detects an obstacle, it stops.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**STOP:** Upon entering the `STOP` state, we add this location <x>to the visited
    waypoint list. (If we have external location references, this is the time to correct
    odometry location errors.) We now transition to the</x> `TURN` state.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**TURN:** The rover changes its heading to “look” in a direction not explored,
    updating the yaw <r,p,y> [roll and pitch do not change], but the position <x,y,z>
    stays the same. While turning, we look for unobstructed, unexplored paths. When
    we find an unobstructed, unexplored path, we store the direction as exploring
    and return to the `GO_STRAIGHT` state. If there are no unexplored paths, we backtrack
    to a previous waypoint and continue exploring from there.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We will leave to you what modifications are necessary for uneven terrain; i.e.,
    changes to <z> and <r,p>.
  prefs: []
  type: TYPE_NORMAL
- en: In our statechart, we chose to ignore tracking of waypoints visited. As we will
    soon see, each state in the statechart directly maps to functions in our SLAM
    results in the navigational stack and the `move_base` process.
  prefs: []
  type: TYPE_NORMAL
- en: Simultaneous Localization and Mapping (SLAM)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We use SLAM for two reasons: to generate a map and to locate the rover (and
    objects) in the generated map. Mapping occurs during an exploration mission. The
    rover will have to sense and avoid detected objects during the map generation,
    such as walls, columns, etc. After generating the map, the rover can traverse
    “optimal paths” that avoid all objects. The second reason to use SLAM means locating
    the rover relative to other objects in the environment. The final generated map
    will have a “global” coordinate system that the rover’s “local” coordinate system
    can overlay.'
  prefs: []
  type: TYPE_NORMAL
- en: SLAM maps can be dynamic and evolve, but we will initially assume the environment
    is static and flat (no holes) so as to understand the SLAM algorithm better. When
    dynamic, moving objects are introduced, the map will need to change over time.
    The map will have to categorize objects as permanent or transitory. Our understanding
    means that the generated map is “final” and complete.
  prefs: []
  type: TYPE_NORMAL
- en: SLAM’s exploratory algorithm (exploratory mission), called Adaptive Monte Carlo
    Library (AMCL), allows our AI rover to explore its environment. A Monte Carlo
    method randomly chooses a direction to turn toward, like rolling dice or spinning
    a roulette wheel. If the selected random direction becomes obstructed, it “rolls
    again.” The SLAM algorithm creates the initial map by randomly wandering around
    the environment. As it explores, it fills in the map with a tentative solution
    with objects (walls, stationary objects). It “gains confidence” in the map's structure
    as it continues its exploration. Initially, the generated map will not detect
    holes in the floor, such as stairs. Since the GoPiGo has a simple proximity sensor,
    we can repurpose it to detect holes in front of the rover. We will add that sensor
    script later.
  prefs: []
  type: TYPE_NORMAL
- en: One of the cool things about SLAM is generating paths to backtrack based on
    the *partially* generated map. SLAM tracks “decision points”—i.e., locations the
    rover turned—as the rover explores. If the rover arrives at a dead end—i.e., all
    directions from that decision-point location have been explored—SLAM will generate
    a path back to a previous decision-point location to begin exploring again. If
    that last location is now fully explored, it will backtrack further, and so on.
    This implies that SLAM will track how completely explored each decision-point
    location is. Once all decision-point locations are thoroughly investigated, the
    mapping process for the environment is completed. This completed exploration does
    not mean that the rover touched every spot in the environment.
  prefs: []
  type: TYPE_NORMAL
- en: Now we have enough information to perform goal-oriented missions. Given the
    rover’s initial location and the goal point, SLAM can generate intermediate waypoints
    to define the path the rover should traverse. Assuming the explored area is a
    flat environment, the rover follows the path.
  prefs: []
  type: TYPE_NORMAL
- en: Installing SLAM and Associated Libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Installing SLAM libraries will look complicated, but it is not. Essentially,
    we install SLAM libraries and libraries that use SLAM. The essential library is
    gMapping; most other SLAM libraries call upon it. There are many types of SLAM
    libraries. We are using OpenSLAM, and you can read about it at [`https://OpenSLAM.org`](https://openslam.org).
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenSLAM’s `slam_gmapping` library supplies the required ROS interface wrapper
    between the sensors, ROS, and the gMapping software. The `slam_gmapping` provides
    a 2D grid map (similar to developing the floorplan on grid paper). The gMapping
    library has two data sources: odometry and LiDAR. The odometry data provides localization
    (context) to the gMapping library; i.e., the rover’s current location based on
    its starting point. The LiDAR gives object-detection data relative to the current
    rover location. Thus, `slam_gmapping` transforms each LiDAR scan into the odometry
    transform (TF) frame of the AI rover. Therefore, as the AI rover moves and explores,
    we see each LiDAR scan update the map details.'
  prefs: []
  type: TYPE_NORMAL
- en: 'We must install the Noetic ROS openslam’s `gMapping` package and related support
    packages. The support packages include sensor, exploration, image processing,
    and transformation ROS packages. To do this, we must enter the following commands
    in a Linux terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
