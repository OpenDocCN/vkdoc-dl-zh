- en: If we have our rover correctly imported into RViz, we should also see the Gazebo
    world that the rover is exploring. To do this, we must go to the Display options
    in RViz and select the Add button located to the bottom left of the Display options.
    Click on the Add button and add the Map display option. We then go to the Map
    display properties and set our topic to `/map`. We will now visualize the gray-colored
    map generated by the `slam_gmapping` ROS node, the raw image from the RGB camera
