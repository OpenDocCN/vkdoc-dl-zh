  type: TYPE_NORMAL
  zh: 请导航到您的 Linux 主目录，并通过在 Terminator 中运行以下终端命令打开 `.bashrc` 文件：
- en: '[PRE5]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
