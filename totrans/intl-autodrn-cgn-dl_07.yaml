- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Now, launch the `slam_gmapping` map builder in a separate terminal. The `ros.org
    gmapping_demo.launch` was modified to more closely align with our environment
    and rover. The source code is in the **“Modified gmapping_demo.launch File”**
