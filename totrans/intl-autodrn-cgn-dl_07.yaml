  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The slam_gmapping Launch File
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The `slam_gmapping` ROS node processes sensor data and generates a map while
    the rover explores its environment. The gMapping file has several parameters that
    we can set in the launch file. Most of these we do not modify; underlined parameters
    have changed:'
  prefs: []
  type: TYPE_NORMAL
- en: '**base_frame (default: “base_link”):** This is the frame’s name attached to
    the rover’s mobile base.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**map_frame (default: “map”):** This is the frame’s name attached to the map.
    This is also the name of the topic we use in RViz.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**odom_frame (default: “odom”):** The frame’s name of the odometry system.
    We set the odometry system for the rover’s physical differential-wheel-drive encoder
    or Gazebo-simulated plug-in drive.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**map_update_interval (default: 5.0):** Wait time (in seconds) until the next
    map update. This number is important since a shorter wait-time duration could
    cause system degradation of the rover or simulation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**maxRange (float):** Sets the maximum range of the laser. Set this value to
    the real-world range of the LiDAR.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**maxUrange (default: 80.0):** Sets the maximum usable range of the laser.
    The laser beams will be stopped at this range of distance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**minimumScore (default: 0.0):** Sets the minimum score (distance from an object)
    to have an accurate laser reading.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**xmin** **(default: -100.0, set: -20):** The minimum x-range of the map. Set
    xmin as close as possible to the actual total x-range of the environment that
    the rover will explore, which in our case is 40 meters. So we will set xmin to
    ˗20 and xmax to 20 meters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ymin** **(default: -100.0, set: -20):** The minimum y-range of the map.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**xmax** **(default: 100.0, , set: 20):** The maximum x-range of the map.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ymax** **(default: 100.0, set: 20):** The maximum y-range of the map.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**delta** **(default: 0.05, set: -0.01):** Resolution of the map.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**linearUpdate** **(default: 1.0, set: 0.5):** The required linear distance
    in the (x-direction) that the rover must move to process laser readings.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**angularUpdate** **(default: 0.5, set: 0.436):** The required angular distance
    the rover must move to process laser readings.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**temporalUpdate (default: -1.0):** Wait time (seconds) between laser readings.
    If this value is ˗1.0, it turns off this function, i.e., continuous.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**particles** **(default: 30, set: 80):** Number of filter particles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**resampleThreshold** **(default: xx, set: 0.5):** The sensor data frequency
    in seconds.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: We need to ensure that we shut down the previously launched `slam_gmapping`
    node by pressing CTRL+C on the same terminal before every simulation.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing slam_gmapping Package
  prefs:
