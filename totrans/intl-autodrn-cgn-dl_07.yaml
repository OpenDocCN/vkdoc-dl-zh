  type: TYPE_NORMAL
- en: 'We must organize our SLAM processing software into ROS packages. We will now
    create an ROS `ai_rover_navigation` package. This particular package will contain
    a mixture of code (e.g., ROS nodes), data, libraries, images, documentation, and
    so forth. Every SLAM program will be included in an ROS package. An ROS package
    aims to provide proper functionality and encourage the reuse of `gmapping_demo.launch`
    for other ROS systems in the rover. Use the following terminal commands to create
    the `ai_rover_navigation` package:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'The package has three dependencies: `std_msgs`, `roscpp`, and `rospy`. The
    `std_msgs` are common data types that have been predefined in ROS. In ROS 1, the
    ROS libraries are two independent libraries written in C++ (`roscpp`) and Python
    (`rospy`). Both libraries do NOT have the same functionality and are not equivalent!
    The SLAM and ROS libraries depend on both of these libraries.'
  prefs: []
  type: TYPE_NORMAL
