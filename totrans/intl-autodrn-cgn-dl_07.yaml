- en: '![](../images/494112_1_En_7_Chapter/494112_1_En_7_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of a rover, highlighted by a red box in a Gazebo environment.
  prefs: []
