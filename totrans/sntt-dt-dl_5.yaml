- en: Since these functions, make_friedman, equations are predetermined, no changes
    can be made in the equation. So, how we are going to generate data when we have
    our equation? In this case, we use the symbolic regression library. In the symbolic
    regression library, any equation of the data can be determined, then synthetic
    data can be produced easily.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这些函数，如 `make_friedman` 和方程是预定的，因此无法在方程中进行更改。那么，当我们有我们的方程时，我们如何生成数据？在这种情况下，我们使用符号回归库。在符号回归库中，可以确定数据的任何方程，然后可以轻松地生成合成数据。
- en: The gen_regression_symbolic() function is used to create the synthetic data.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `gen_regression_symbolic()` 函数创建合成数据。
- en: 'Our symbolic expression is:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的表达式是：
- en: '![$$ 2{x}_1-\frac{x_2^2}{5}+15\ast \mathit{\cos}\left({x}_3\right)+ noise $$](../images/534235_1_En_5_Chapter/534235_1_En_5_Chapter_TeX_Equd.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![$$ 2{x}_1-\frac{x_2^2}{5}+15\ast \mathit{\cos}\left({x}_3\right)+ noise $$](../images/534235_1_En_5_Chapter/534235_1_En_5_Chapter_TeX_Equd.png)'
- en: gen_regression_symbolic() is a function that runs under the SymPy library. You
    can also use direct code, which is shown in [`https://github.com/tirthajyoti/Synthetic-data-gen/blob/master/Notebooks/Symbolic%20regression%20classification%20generator.ipynb`](https://github.com/tirthajyoti/Synthetic-data-gen/blob/master/Notebooks/Symbolic%2520regression%2520classification%2520generator.ipynb).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '`gen_regression_symbolic()` 是在 SymPy 库下运行的一个函数。您也可以使用直接代码，代码如下所示：[`https://github.com/tirthajyoti/Synthetic-data-gen/blob/master/Notebooks/Symbolic%20regression%20classification%20generator.ipynb`](https://github.com/tirthajyoti/Synthetic-data-gen/blob/master/Notebooks/Symbolic%2520regression%2520classification%2520generator.ipynb)。'
