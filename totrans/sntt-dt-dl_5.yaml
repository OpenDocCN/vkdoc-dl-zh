- en: Summary
  id: totrans-295
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned about how to generate synthetic data using Python.
    You also learned about how to use Gaussian noise to generate synthetic data for
    regression problems. Additionally, you learned about how to use Friedman functions
    and symbolic regression to generate synthetic data for classification and clustering
    problems. Finally, you learned about how to use GANs to generate tabular synthetic
    data.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了如何使用 Python 生成合成数据。你还学习了如何使用高斯噪声为回归问题生成合成数据。此外，你学习了如何使用弗里德曼函数和符号回归为分类和聚类问题生成合成数据。最后，你学习了如何使用
    GANs 生成表格合成数据。
