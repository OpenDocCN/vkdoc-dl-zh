- en: 5. Synthetic Data Generation with Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 使用Python进行合成数据生成
- en: In this chapter, we will explore how to generate synthetic data for regression,
    classification, and clustering problems using Python. First, we will discuss how
    to generate synthetic data from a known distribution. Next, we will apply Gaussian
    noise to a regression model. Then, we will discuss how to generate synthetic data
    for classification and clustering problems using the Friedman functions and symbolic
    regression. Finally, we will generate synthetic data for tabular data using GANs.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨如何使用Python生成用于回归、分类和聚类问题的合成数据。首先，我们将讨论如何从已知分布生成合成数据。接下来，我们将对回归模型应用高斯噪声。然后，我们将讨论如何使用弗里德曼函数和符号回归生成用于分类和聚类问题的合成数据。最后，我们将使用生成对抗网络（GANs）生成用于表格数据的合成数据。
- en: Data Generation with Know Distribution
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用已知分布进行数据生成
- en: The synthetic data was generated by a computer program that followed a specific
    set of rules or conditions. The rules were designed to create data that would
    have the same statistical properties as the original data set but would not contain
    any actual information about the original data set. The generated data set would
    be used to test various data analysis methods without the risk of revealing any
    confidential information.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这些合成数据是由遵循一组特定规则或条件的计算机程序生成的。这些规则旨在创建具有与原始数据集相同统计特性的数据，但不会包含任何有关原始数据集的实际信息。生成的数据集将用于测试各种数据分析方法，而不会泄露任何机密信息。
- en: We can generate synthetic data that conforms to a known distribution in several
    ways. One way is to use a parametric model that specifies the functional form
    of the underlying distribution, such as a normal distribution. We can then generate
    data points from this parametric model that will have the same distribution as
    the underlying data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过几种方式生成符合已知分布的合成数据。一种方式是使用参数模型，该模型指定了底层分布的函数形式，例如正态分布。然后，我们可以从这个参数模型生成数据点，这些数据点将具有与底层数据相同的分布。
- en: Another way to generate synthetic data with a known distribution is to use a
    non-parametric model, such as kernel density estimation. This approach does not
    require us to specify the functional form of the underlying distribution but rather
    estimates it from the data itself. This can be useful when the underlying distribution
    is not well-understood, or when we don’t have enough data to accurately specify
    a parametric model.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种生成具有已知分布的合成数据的方法是使用非参数模型，例如核密度估计。这种方法不需要我们指定底层分布的函数形式，而是从数据本身估计它。当底层分布不太清楚或我们没有足够的数据来准确指定参数模型时，这可能很有用。
- en: Once we have generated our synthetic data, we can then use it for any purpose
    that we would use real data, such as training machine learning models or performing
    statistical analysis.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们生成了我们的合成数据，我们就可以将其用于任何我们本可以使用真实数据的目的，例如训练机器学习模型或执行统计分析。
- en: All samples will generate based on the distribution with given parameters. We
    have different distributions, such that Normal, Uniform, Triangular, Binomial,
    Chi-square, Laplace, and of them parameters.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 所有样本都将基于给定的参数分布生成。我们有不同的分布，如正态、均匀、三角、二项、卡方、拉普拉斯，以及它们的参数。
