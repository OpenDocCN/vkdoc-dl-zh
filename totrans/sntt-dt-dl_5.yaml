- en: Friedman Functions and Symbolic Regression
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 弗里德曼函数与符号回归
- en: Friedman functions are a type of mathematical function used in statistics and
    regression analysis. They are named after statistician Milton Friedman, who introduced
    them in his work on nonlinear regression.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 弗里德曼函数是一种在统计学和回归分析中使用的数学函数。它们以统计学家米尔顿·弗里德曼的名字命名，他在非线性回归的研究中引入了它们。
- en: Friedman functions are used to model data that are not linearly related. That
    is, the data cannot be modeled using a straight line. Instead, the data are modeled
    using a curved line. Friedman functions are often used in symbolic regression.
    Symbolic regression is a type of machine learning that automatically finds mathematical
    equations that best describe a data set. Friedman functions are particularly well
    suited for symbolic regression because they can model data that are not linearly
    related. This is important because many real-world data sets are not linearly
    related.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 弗里德曼函数用于模拟非线性相关的数据。也就是说，数据不能使用直线进行模拟。相反，数据使用曲线进行模拟。弗里德曼函数常用于符号回归。符号回归是一种机器学习方法，它自动找到最佳描述数据集的数学方程。弗里德曼函数非常适合符号回归，因为它们可以模拟非线性相关的数据。这很重要，因为许多现实世界的数据集是非线性相关的。
- en: The use of Friedman functions in symbolic regression is very effective in synthetic
    data sets. Friedman functions are also used in other types of machine learning,
    such as support- vector machines and artificial neural networks. Also, the use
    of Friedman functions in machine learning is an active area of ​​research.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: Friedman functions are particularly well suited for data that are “noisy” or
    have many outliers. This is because they are less sensitive to small changes in
    the data than other functions, such as polynomials. Friedman functions can be
    used to model a wide variety of data, including financial data, scientific data,
    and even data from social media.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: 'When can we generate the data set by using the know function such that Friedman?
    There are 3 different Friedman data generation formulas. Those are:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: make_friedman1() function is generate data with at least 5 input parameters.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y(x)=10\ast \sin \left(\pi {x}_0{x}_1\right)+20{\left({x}_2-0.5\right)}^2+10{x}_3+5{x}_4+
    noise $$](../images/534235_1_En_5_Chapter/534235_1_En_5_Chapter_TeX_Equa.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
- en: make_friedman2() function is generate data that has 4 input dimensions.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y(x)=\sqrt{\left({x}_0^2+{x}_1{x}_2-\frac{1}{{\left({x}_1{x}_3\right)}^2}\right)}+
    noise $$](../images/534235_1_En_5_Chapter/534235_1_En_5_Chapter_TeX_Equb.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: make_friedman3() function is generate data that has also 4 dimensions.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y(x)=\arctan \left(\frac{x_1{x}_2-\frac{1}{x_1{x}_3}}{x_0}\right)+ noise
    $$](../images/534235_1_En_5_Chapter/534235_1_En_5_Chapter_TeX_Equc.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
- en: Data set has been created by using these functions.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
