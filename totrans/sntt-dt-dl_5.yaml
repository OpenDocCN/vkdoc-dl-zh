- en: Generation Tabular Synthetic Data by Applying GANs
  id: totrans-243
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过应用 GANs 生成表格合成数据
- en: GANs can be used to generate synthetic data for any type of data, including
    images, text, and tabular data. When generating synthetic data, GANs can be used
    to control for various factors, such as class imbalance, to make the synthetic
    data more realistic.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: GANs 可以用于生成任何类型的数据的合成数据，包括图像、文本和表格数据。在生成合成数据时，GANs 可以用于控制各种因素，例如类别不平衡，使合成数据更加真实。
- en: One advantage of using GANs to generate synthetic data is that it can be used
    to create data that is not available. For example, if there is a dataset of images
    of cats and dogs, but there are no images of rabbits, a GAN could be used to generate
    synthetic images of rabbits. Another advantage of using GANs to generate synthetic
    data is that it can be used to protect the privacy of real data. For example,
    if a dataset contains sensitive information, such as medical records, a GAN could
    be used to generate synthetic data that is similar to the real data but does not
    contain any sensitive information.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GAN生成合成数据的一个优点是可以用来创建不可获得的数据。例如，如果有一个猫和狗的图像数据集，但没有兔子的图像，可以使用GAN生成兔子的合成图像。使用GAN生成合成数据的另一个优点是可以用来保护真实数据的隐私。例如，如果数据集包含敏感信息，如医疗记录，可以使用GAN生成与真实数据相似但不含任何敏感信息的合成数据。
- en: There are also some disadvantages of using GANs to generate synthetic data.
    There are a few disadvantages of using GANs to generate synthetic data. First,
    GANs can be difficult to train. Second, GANs can be slow to generate data. Third,
    GANs can sometimes generate data that does not look realistic. Despite these disadvantages,
    GANs are a powerful tool for generating synthetic data. GANs are a promising approach
    for generating synthetic data for a variety of applications.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GAN生成合成数据也有一些缺点。使用GAN生成合成数据有几个缺点。首先，GAN可能难以训练。其次，GAN生成数据可能较慢。第三，GAN有时会生成看起来不真实的数据。尽管有这些缺点，GAN仍然是生成合成数据的有力工具。GAN是生成合成数据用于各种应用的很有前景的方法。
- en: Tabular Synthetic data is generated by applying GANs. The wine quality data set is
    taken from Kaggle public data set. However, the “quality” data set were analyzed
    under two groups 0 and 1, in which the quality value is 3 or 4 or 5, then “quality”
    becomes 0, if the quality value is 6, or 7, then “quality” becomes 1\. Firstly,
    the accuracy rate was checked by applying a random forest classification method
    to a real data set.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 表格合成数据是通过应用GAN生成的。葡萄酒质量数据集来自Kaggle公共数据集。然而，“质量”数据集在两组0和1下进行分析，其中质量值是3、4或5，则“质量”变为0；如果质量值是6或7，则“质量”变为1。首先，通过应用随机森林分类方法对真实数据集进行检查准确率。
- en: Added the following libraries in addition to the Numpy, pandas, and matplotlib
    libraries
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 除了Numpy、pandas和matplotlib库之外，还添加了以下库。
- en: '[PRE33]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: The accuracy of the wine quality model, based on Random Forest Classification,
    is 0.76\. This result will be compared with the model that we trained from generated
    fake data in the following.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 基于随机森林分类的葡萄酒质量模型准确率为0.76。这个结果将在以下部分与从生成伪造数据中训练的模型进行比较。
- en: Synthetic data Generation
  id: totrans-251
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 合成数据生成
- en: The training process of a GAN involves the generator and discriminator networks
    competing against each other to generate realistic data samples. The generator
    network tries to generate data samples that are realistic enough to fool the discriminator
    network, while the discriminator network tries to distinguish between real and
    generated data samples. The competition between the two networks drives the training
    process and ultimately results in the generator netwotk being able to generate
    realistic data samples.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: GAN的训练过程涉及生成器和判别器网络相互竞争以生成真实数据样本。生成器网络试图生成足够真实的数据样本以欺骗判别器网络，而判别器网络则试图区分真实和生成数据样本。两个网络之间的竞争推动了训练过程，并最终导致生成器网络能够生成真实数据样本。
- en: There are many applications for GANs, such as image generation, video generation,
    and text generation. GANs have also been used for more practical applications
    such as generating realistic images of faces, generating synthetic medical images,
    and creating new products.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: GAN有许多应用，如图像生成、视频生成和文本生成。GAN还被用于更实际的应用，例如生成逼真的面部图像、生成合成医学图像以及创建新产品。
- en: GANs had two main parts, one is the generation the other one is discrimination.
    The following functions are used for GANs fake data generation [[1](#Par102)].
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: GAN有两个主要部分，一个是生成，另一个是判别。以下函数用于GAN的伪造数据生成 [[1](#Par102)]。
- en: '[PRE34]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: The definition of the discrimination functionis below.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 判别函数的定义如下。
- en: '[PRE35]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: After running the generator and discriminator functions, the GANs function consisting
    of these functions can be created. The generating GAN model is recalculated each
    time according to the batch function.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 运行生成器和判别器函数后，可以创建由这些函数组成的 GANs。生成 GAN 模型每次根据批处理函数重新计算。
- en: '[PRE36]'
