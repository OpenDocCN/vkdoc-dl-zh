- en: 5. Hyperparameter Tuning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 超参数调整
- en: Introduction
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: In the previous chapters, we have discussed the architecture of Neural Networks,
    the gradient descent algorithm, backpropagation, and various optimization algorithms
    along with how to split the data for training and testing. We have also explored
    the effect of activation functions on the performance of the model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们讨论了神经网络的结构、梯度下降算法、反向传播以及各种优化算法，以及如何划分数据用于训练和测试。我们还探讨了激活函数对模型性能的影响。
- en: The performance of the model, measured during training, does not tell us much
    about how it is going to perform during testing. For this, we generally find the
    performance of the trained model on the validation set. If the performance on
    the validation set is not up to the mark or less than that in the training, we
    change the values of the hyperparameters to handle this situation. This is called
    hyperparameter tuning.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中测量的模型性能并不能告诉我们它在测试过程中将如何表现。为此，我们通常找到训练模型在验证集上的性能。如果验证集上的性能没有达到标准或低于训练，我们就改变超参数的值来处理这种情况。这被称为超参数调整。
- en: 'Effectively, we try to reduce the variance of the model by setting the hyperparameters.
    In this chapter, we begin with revisiting the concepts of bias and variance and
    then move to hyperparameters of various architectures in Deep Learning. We will
    see the effect of these hyperparameters on a Deep Neural Network (DNN) in the
    next sections. The variation of performance with the values of hyperparameters
    in the case of a Convolutional Neural Network (CNN) and sequence models are discussed
    in the following chapters. The chapter has been organized as follows. Section
    “Bias–Variance Revisited” of this chapter revisits bias and variance. Section
    “Hyperparameter Tuning” discusses the hyperparameters of DNN, CNN, sequence models,
    and autoencoders, respectively. The next section, “Experiments: Hyperparameter
    Tuning,” presents some of the experiments to empirically establish the above points
    and the last section concludes.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，我们试图通过设置超参数来减少模型的方差。在本章中，我们首先回顾偏差和方差的概念，然后转向深度学习各种架构的超参数。我们将在下一节中看到这些超参数对深度神经网络（DNN）的影响。在下一章中，将讨论卷积神经网络（CNN）和序列模型中超参数值的变化对性能的影响。本章的组织结构如下。本章的“偏差-方差重访”部分回顾了偏差和方差。下一部分“超参数调整”讨论了DNN、CNN、序列模型和自编码器的超参数。下一节“实验：超参数调整”展示了某些实验，以经验性地确立上述观点，最后一节得出结论。
- en: Bias–Variance Revisited
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 偏差-方差重访
- en: 'Assume that there are ten points lying on a sinusoidal curve as shown in Figure
    [5-1](#Fig1). However, there is no way to know the underlying curve; we can only
    see the points. We start fitting the following degree curves on these points:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 假设有十个点位于图[5-1](#Fig1)所示的正弦曲线上。然而，我们无法知道其下方的曲线；我们只能看到这些点。我们开始将这些以下度数的曲线拟合到这些点上：
- en: '![](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig1_HTML.jpg)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig1_HTML.jpg)'
- en: Figure 5-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1
- en: Sinusoidal curve
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 正弦曲线
- en: Degree 0
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第0度
- en: Degree 1
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1度
- en: …
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: Degree 3
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3度
- en: So fitting a curve having degree 1 (line) is the same as developing a linear
    regression model that will find out a line having the least squared distance from
    all the points (Figure [5-2](#Fig2)). Likewise, nonlinear regression can create
    better fits on the training data. For the above points, a degree 3 curve may result
    in a better fit (Figure [5-3](#Fig3)), and a degree 10 curve may result in best
    fit (Figure [5-4](#Fig4)).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，拟合一个1次度（直线）的曲线与开发一个线性回归模型是相同的，该模型将找到所有点之间距离平方和最小的直线（图[5-2](#Fig2)）。同样，非线性回归可以在训练数据上创建更好的拟合。对于上述点，3次曲线可能得到更好的拟合（图[5-3](#Fig3)），而10次曲线可能得到最佳拟合（图[5-4](#Fig4)）。
- en: '![](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig4_HTML.jpg)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig4_HTML.jpg)'
- en: Figure 5-4
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-4
- en: Fitting a degree 10 curve to the given points
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 将10次曲线拟合到给定的点
- en: '![](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig3_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig3_HTML.jpg)'
- en: Figure 5-3
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-3
- en: Fitting a degree 3 curve to the given points
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 将3次曲线拟合到给定的点
- en: '![](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig2_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/611710_1_En_5_Chapter/611710_1_En_5_Fig2_HTML.jpg)'
- en: Figure 5-2
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-2
- en: Fitting a line to the given points
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 将直线拟合到给定的点
- en: Though we have been able to fit all the given points using a curve of a higher
    degree, the problem starts here. This is because fitting the given data (training
    set) is not the goal. The goal is to design a model that is able to extract the
    underlying structure of the given distribution to handle the unseen data points.
    Therefore, in the case of a curve having degree 1, both the test and the train
    error will be high. The model will not be able to fit either the train data or
    the test data. In the case of degree 2, the model may not produce a very large
    error with the unseen data. However, in the case of a nonlinear regression with
    degree 10, the training error can be very low, but the test error can be very
    large. So a line of best fit becomes the case of underfitting, and a curve of
    degree 10 will be a case of overfitting.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们能够使用更高次方的曲线拟合所有给定的点，但问题从这里开始。这是因为拟合给定数据（训练集）不是目标。目标是设计一个能够提取给定分布的潜在结构以处理未见数据点的模型。因此，在曲线为一次方的情况下，测试和训练误差都会很高。模型将无法拟合训练数据或测试数据。在二次方的情况下，模型可能不会对未见数据产生很大的误差。然而，在十次方的非线性回归中，训练误差可以非常低，但测试误差可以非常大。因此，最佳拟合线成为欠拟合的情况，而十次方的曲线将成为过拟合的情况。
- en: Tip
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: '***Overfitting:*** *If the training error is very low and the test error is
    very large, then the model is said to overfit.*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '***过拟合：*** *如果训练误差非常低，而测试误差非常大，那么模型就被说成是过拟合。*'
- en: '***Underfitting:*** *If the training error is high and so is the test error
    like in the case of linear regression, this is called underfitting.*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '***欠拟合：*** *如果训练误差很高，测试误差也很高，就像线性回归的情况一样，这被称为欠拟合。*'
- en: In the first case (degree 1), we assumed a straight line would be able to fit
    the train data and predict the test data. We do not know the underlying curve,
    and hence we assumed that the points lie on a line (of best fit), and we would
    be able to find the value of y for an unseen value of x. In our example, our hypotheses
    were incorrect as a straight line cannot fit all points lying on a sinusoidal
    curve. This is called bias.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一种情况（一次方）中，我们假设一条直线能够拟合训练数据并预测测试数据。我们不知道潜在的曲线，因此我们假设这些点位于一条线（最佳拟合线）上，我们就能找到对于未知的x值的y值。在我们的例子中，我们的假设是错误的，因为直线不能拟合所有位于正弦曲线上的点。这被称为偏差。
- en: Bias
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差
- en: The average prediction of a good Machine Learning model should be as close to
    the ground truth as possible. This difference is referred to as bias.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一个好的机器学习模型的平均预测应该尽可能接近真实值。这种差异被称为偏差。
- en: 'Bias can be perceived as the ability of the underlying model to predict values.
    The formal definition of bias is as follows:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 偏差可以理解为潜在模型预测值的能力。偏差的正式定义如下：
- en: '![$$ Bias=E\left[{f}^{\prime }(x)-f(x)\right], $$](../images/611710_1_En_5_Chapter/611710_1_En_5_Chapter_TeX_Equa.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Bias=E\left[{f}^{\prime }(x)-f(x)\right], $$](../images/611710_1_En_5_Chapter/611710_1_En_5_Chapter_TeX_Equa.png)'
- en: where *f*^′(*x*) is the average predicted value of the model and *f*(*x*) is
    the underlying function. High bias indicates the inability of the model to fit
    the training data. One of the reasons for this may be an oversimplified model.
    High bias leads to a higher error rate both with the train and the test set.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *f*^′(*x*) 是模型的平均预测值，*f*(*x*) 是潜在函数。高偏差表示模型无法拟合训练数据。可能的原因之一是模型过于简化。高偏差导致训练集和测试集的错误率都较高。
- en: Variance
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 方差
- en: The **variance** of a model signifies its ability to adjust to a given dataset.
    This variability is referred to as variance.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的**方差**表示其调整给定数据集的能力。这种可变性被称为方差。
- en: 'The formal definition of variance is as follows:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 方差的正式定义如下：
- en: '![$$ Variance=E{\left[{f}^{\prime }(x)-f(x)\right]}^2\. $$](../images/611710_1_En_5_Chapter/611710_1_En_5_Chapter_TeX_Equb.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Variance=E{\left[{f}^{\prime }(x)-f(x)\right]}^2\. $$](../images/611710_1_En_5_Chapter/611710_1_En_5_Chapter_TeX_Equb.png)'
- en: Hyperparameter Tuning
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超参数调整
- en: Hyperparameter tuning will partially help us deal with the problems discussed
    in the last section. This section presents some of the most important hyperparameters
    of four types of networks, namely, DNN, CNN, sequence models, and autoencoders.
    We begin with discussing the hyperparameters of DNN as shown in Table [5-1](#Tab1).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 超参数调整将部分帮助我们处理上一节中讨论的问题。本节将介绍四种类型网络中最重要的一些超参数，即深度神经网络（DNN）、卷积神经网络（CNN）、序列模型和自编码器。我们首先讨论深度神经网络（DNN）的超参数，如表[5-1](#Tab1)所示。
- en: Table 5-1
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 表5-1
- en: Hyperparameters of DNN
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络（DNN）的超参数
- en: '| Network | Image | Hyperparameters | Description |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 网络 | 图像 | 超参数 | 描述 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Deep Neural Network | ![](../images/611710_1_En_5_Chapter/611710_1_En_5_Figa_HTML.jpg)
    | Number of hidden layers | • The Deep Neural Network must have at least one hidden
    layer except for the input layer and the output.• If the number of layers is too
    large, the learning will be slow (vanishing gradient).• At times, depth is required
    to extract the hierarchy of features. |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 深度神经网络 | ![](../images/611710_1_En_5_Chapter/611710_1_En_5_Figa_HTML.jpg)
    | 隐藏层数量 | • 深度神经网络必须至少有一个隐藏层，除了输入层和输出层。• 如果层数太多，学习会变慢（梯度消失）。• 有时，深度是提取特征层次所必需的。
    |'
- en: '| Number of neurons in each hidden layer | If the number of hidden layers in
    a network is fewer and the number of neurons in that layer is more, then we generally
    prefer to increase the number of layers by a small amount and reduce the number
    of neurons in each layer. |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| 每个隐藏层中的神经元数量 | 如果网络中的隐藏层数较少且该层的神经元数量较多，那么我们通常更倾向于通过少量增加层数来减少每层的神经元数量。 |'
- en: '| Learning rate | • The learning rate controls the step size of the gradient
    descent update.• A lower learning rate results in more time to reach optimal value.•
    A higher learning rate may lead to skipping the optimal value in the loss landscape.
    |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| 学习率 | • 学习率控制梯度下降更新的步长。• 较低的学习率会导致需要更多时间才能达到最优值。• 较高的学习率可能会导致在损失景观中跳过最优值。
    |'
- en: '| Batch size | The batch size indicates the number of samples processed before
    the model parameters are updated. |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| 批大小 | 批大小表示在更新模型参数之前处理的样本数量。 |'
- en: '| Number of epochs | The epoch denotes the number of times the entire dataset
    is passed through the network |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| 训练轮数 | 轮次表示整个数据集通过网络的次数 |'
- en: '| Optimizer | The selection of the algorithm used to update weights affects
    the recital of the model. Some of the famous optimizers are as follows:• SGD•
    Momentum• RMSprop• Adam |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| 优化器 | 选择用于更新权重的算法会影响模型的性能。以下是一些著名的优化器：• SGD• 动量• RMSprop• Adam |'
- en: '| Loss function | The metric used to evaluate the performance of the model.
    |'
  id: totrans-50
  prefs: []
  type: TYPE_TB
  zh: '| 损失函数 | 用于评估模型性能的指标。 |'
- en: '| Activation function | “An activation, or activation function, for a neural
    network is defined as the mapping of the input to the output via a nonlinear transform
    function at each ‘node,’ which is simply a locus of computation within the net”
    [[1](#CR1)]. |'
  id: totrans-51
  prefs: []
  type: TYPE_TB
  zh: '| 激活函数 | “神经网络中的激活，或激活函数，定义为通过每个‘节点’的非线性变换函数将输入映射到输出的映射，节点只是网络中的计算点” [[1](#CR1)]。
    |'
- en: '| Regularization | “Regularization trades a marginal decrease in training accuracy
    for an increase in generalizability” [[2](#CR2)]. |'
  id: totrans-52
  prefs: []
  type: TYPE_TB
  zh: '| 正则化 | “正则化以略微降低训练精度为代价，以增加泛化能力” [[2](#CR2)]。 |'
- en: '|   |   | Dropout rate | The dropout rate denotes the fraction of the units
    to drop during training. |'
  id: totrans-53
  prefs: []
  type: TYPE_TB
  zh: '|   |   | Dropout 率 | Dropout 率表示在训练期间丢弃的单元比例。 |'
- en: In Chapters [6](611710_1_En_6_Chapter.xhtml) and [7](611710_1_En_7_Chapter.xhtml)
    CNN is presented, which handles the task related to imaging data gracefully. The
    hyperparameters of this network are presented in Table [5-2](#Tab2).
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [6](611710_1_En_6_Chapter.xhtml) 和 [7](611710_1_En_7_Chapter.xhtml) 章中介绍了卷积神经网络（CNN），它优雅地处理与成像数据相关的任务。该网络的超参数在表
    [5-2](#Tab2) 中展示。
- en: Table 5-2
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-2
- en: Hyperparameters of CNN
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: CNN 的超参数
- en: '| Network | Image | Hyperparameters | Description |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
  zh: '| 网络 | 图像 | 超参数 | 描述 |'
- en: '| --- | --- | --- | --- |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Convolutional Neural Networks | ![](../images/611710_1_En_5_Chapter/611710_1_En_5_Figb_HTML.jpg)
    | Number of filters | The number of filters represents the number of convolutional
    filters in each layer. |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
  zh: '| 卷积神经网络 | ![](../images/611710_1_En_5_Chapter/611710_1_En_5_Figb_HTML.jpg)
    | 滤波器数量 | 滤波器数量表示每层的卷积滤波器数量。 |'
- en: '| Filter size | The filter size corresponds to the dimensions of the convolutional
    filters, such as 3 × 3, 5 × 5, etc. |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
  zh: '| 滤波器大小 | 滤波器大小对应于卷积滤波器的维度，例如 3 × 3、5 × 5 等。 |'
- en: '| Stride | The stride signifies the step size of the filter during convolution.
    |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 步长 | 步长表示卷积过程中滤波器的步长。 |'
- en: '| Padding | The padding represents whether and how the input is padded, for
    example, valid or same. |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| 填充 | 填充表示输入是否填充以及如何填充，例如，有效或相同。 |'
- en: '| Pooling size | The pooling size is the dimensions of the pooling operation,
    for example, 2 × 2 and so on. |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| 池化大小 | 池化大小是池化操作的维度，例如，2 × 2 等。 |'
- en: '| Pooling type | The type of pooling operation, for example, max pooling, average
    pooling, etc. |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| 池化类型 | 池化操作的类型，例如，最大池化、平均池化等。 |'
- en: '| Dropout rate | The dropout rate denotes the fraction of the units to drop
    during training. |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
