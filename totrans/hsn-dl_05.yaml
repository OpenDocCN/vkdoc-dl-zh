- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep Learning architectures are expected to perform well in the training as
    well as the test data. If the model does not perform well on the training data,
    we may need to revisit our assumptions regarding the data and the model that we
    are designing. If the model performs well on the training data but does not work
    well with the unseen data, then hyperparameter tuning may help us. This chapter
    discusses some important hyperparameters and their importance.
  prefs: []
  type: TYPE_NORMAL
- en: This discussion will also continue in the following chapters, as hyperparameter
    tuning is needed in CNNs, sequence models, and autoencoders as well. The reader
    is expected to attempt the exercise to get hold of the concept before moving forward.
  prefs: []
  type: TYPE_NORMAL
