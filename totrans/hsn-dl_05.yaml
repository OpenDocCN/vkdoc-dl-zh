- en: Conclusion
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Deep Learning architectures are expected to perform well in the training as
    well as the test data. If the model does not perform well on the training data,
    we may need to revisit our assumptions regarding the data and the model that we
    are designing. If the model performs well on the training data but does not work
    well with the unseen data, then hyperparameter tuning may help us. This chapter
    discusses some important hyperparameters and their importance.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习架构在训练数据和测试数据上预期表现良好。如果模型在训练数据上表现不佳，我们可能需要重新审视我们对数据和所设计模型假设的看法。如果模型在训练数据上表现良好，但在未见过的数据上表现不佳，那么超参数调整可能有助于我们。本章讨论了一些重要的超参数及其重要性。
- en: This discussion will also continue in the following chapters, as hyperparameter
    tuning is needed in CNNs, sequence models, and autoencoders as well. The reader
    is expected to attempt the exercise to get hold of the concept before moving forward.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 此讨论将在以下章节中继续，因为CNN、序列模型和自动编码器也需要超参数调整。读者预计在继续前进之前尝试练习以掌握该概念。
- en: Exercises
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 练习
- en: Multiple-Choice Questions
  id: totrans-138
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多项选择题
- en: A Deep Neural Network must have at least one
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深度神经网络必须至少有一个
- en: Output layer
  id: totrans-140
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输出层
- en: Input layer
  id: totrans-141
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 输入层
- en: Hidden layer
  id: totrans-142
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层
- en: Dropout layer
  id: totrans-143
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: Dropout层
- en: If the number of layers in a Neural Network is too large, what problem might
    occur?
  id: totrans-144
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果神经网络的层数太多，可能会出现什么问题？
- en: Faster learning
  id: totrans-145
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加速学习
- en: Overfitting
  id: totrans-146
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过拟合
- en: Vanishing gradient
  id: totrans-147
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梯度消失
- en: Exploding gradient
  id: totrans-148
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梯度爆炸
- en: Why is some depth required in a Neural Network?
  id: totrans-149
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么神经网络需要一定的深度？
- en: To increase the training time
  id: totrans-150
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了增加训练时间
- en: To decrease the complexity
  id: totrans-151
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了降低复杂性
- en: To extract the hierarchy of features
  id: totrans-152
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了提取特征层次结构
- en: To reduce training time
  id: totrans-153
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了减少训练时间
- en: If the number of hidden layers is fewer and the number of neurons in each layer
    is high, what is generally preferred?
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果隐藏层的数量较少且每层的神经元数量较高，通常更倾向于什么？
- en: Increase the number of layers and reduce the number of neurons in each layer.
  id: totrans-155
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 增加层数并减少每层的神经元数量。
- en: Decrease the number of layers and increase the number of neurons in each layer.
  id: totrans-156
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 减少层数并增加每层的神经元数量。
- en: Keep the number of layers and neurons the same.
  id: totrans-157
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保持层数和神经元数量不变。
- en: Increase both the number of layers and neurons.
  id: totrans-158
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 同时增加层数和神经元数量。
- en: What does the learning rate control in gradient descent?
  id: totrans-159
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 学习率在梯度下降中控制什么？
- en: Batch size
  id: totrans-160
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批处理大小
- en: Step size of the gradient descent update
  id: totrans-161
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 梯度下降更新的步长
- en: Number of epochs
  id: totrans-162
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 迭代次数
- en: Number of hidden layers
  id: totrans-163
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 隐藏层的数量
- en: A lower learning rate results in which of the following?
  id: totrans-164
  prefs:
