- en: 'Experiments: Hyperparameter Tuning'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section presents an empirical analysis demonstrating the effect of hyperparameters
    on the performance of the model.
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem:** To classify the MNIST dataset'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data:** The MNIST dataset consists of 60,000 training images and 10,000 test
    images of handwritten digits (0`–`9).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Architecture:** Six different architectures (fully connected neural networks)
    are implemented with different numbers of hidden layers and numbers of neurons
    in each layer. The experiments also show the effect of variation in learning rate
    on the performance and the loss.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The models implemented in Listing [5-1](#PC1) are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: (512,)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: (256,)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: (128,)
