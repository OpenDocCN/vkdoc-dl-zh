- en: '**Boston Housing** is a dataset derived from information collected by the US
    Census Service concerning housing in the area of Boston, Massachusetts. It was
    obtained from the StatLib archive ([`http://lib.stat.cmu.edu/datasets/boston`](http://lib.stat.cmu.edu/datasets/boston))
