    this layer. We get parameters of 832 by multiplying 64 neurons at this layer by
    12 features and adding 64 neurons at this layer.
  prefs: []
  type: TYPE_NORMAL
- en: Output shape of the second layer is (None, 64) because we have 64 neurons at
    this layer. We get parameters of 4,160 by multiplying 64 neurons at this layer
    by 64 neurons from the previous layer and adding 64 at this layer.
