  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: Inspect the Model
  id: totrans-239
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检查模型
- en: 'Summary:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要：
- en: '[PRE66]'
  id: totrans-241
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: Output shape of the first layer is (None, 64) because we have 64 neurons at
    this layer. We get parameters of 640 by multiplying 64 neurons at this layer by
    9 features and adding 64 neurons at this layer.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层的输出形状是 (None, 64)，因为我们在这层有 64 个神经元。通过将这层的 64 个神经元乘以 9 个特征并加上这层的 64 个神经元，我们得到
    640 个参数。
- en: Output shape of the second layer is (None, 64) because we have 64 neurons at
    this layer. We get parameters of 4,160 by multiplying 64 neurons at this layer
    by 64 neurons from the previous layer and adding 64 at this layer.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层的输出形状是 (None, 64)，因为我们在这层有 64 个神经元。通过将这层的 64 个神经元乘以前一层的 64 个神经元并加上这层的 64
    个神经元，我们得到 4,160 个参数。
- en: Output shape of the third layer is (None, 1) because we have one target. We
    get parameters of 65 by adding 64 neurons from the previous layer to 1 neuron
    at this layer.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层的输出形状是 (None, 1)，因为我们有一个目标。通过将前一层 64 个神经元加上这层 1 个神经元，我们得到 65 个参数。
