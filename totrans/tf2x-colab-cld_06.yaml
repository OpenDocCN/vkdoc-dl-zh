  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: If we don’t have a lot of training data, one technique to avoid overfitting
    is to create a small network with few hidden layers. We do just that!
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们没有大量的训练数据，一种避免过拟合的技术是创建一个具有少量隐藏层的简单网络。我们正是这样做的！
- en: The 64-neuron input layer accommodates our 12 input features. We have one hidden
    layer with 64 neurons. The output layer has one neuron because we are using regression
    with one target.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 64神经元输入层可以容纳我们的12个输入特征。我们有一个包含64个神经元的隐藏层。输出层有一个神经元，因为我们使用回归并且有一个目标。
- en: Create a model as shown in Listing [6-4](#PC21).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表[6-4](#PC21)所示的模型。
- en: '[PRE20]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Model Summary
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE21]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Output shape of the first layer is (None, 64) because we have 64 neurons at
    this layer. We get parameters of 832 by multiplying 64 neurons at this layer by
    12 features and adding 64 neurons at this layer.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层的输出形状为（None，64），因为我们在这个层有64个神经元。通过将这个层的64个神经元乘以12个特征并加上这个层的64个神经元，我们得到832个参数。
- en: Output shape of the second layer is (None, 64) because we have 64 neurons at
    this layer. We get parameters of 4,160 by multiplying 64 neurons at this layer
    by 64 neurons from the previous layer and adding 64 at this layer.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层的输出形状为（None，64），因为我们在这个层有64个神经元。通过将这个层的64个神经元乘以前一层的64个神经元并加上这个层的64个神经元，我们得到4,160个参数。
- en: Output shape of the third layer is (None, 1) because we have one target. We
    get parameters of 65 by adding 64 neurons from the previous layer to 1 neuron
    at this layer.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层的输出形状为（None，1），因为我们有一个目标。通过将前一层64个神经元加到这一层的1个神经元上，我们得到65个参数。
- en: Compile the Model
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE22]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Mean squared error (MSE) is a common loss function used for regression problems.
    Mean absolute error (MAE) and RMSE are also commonly used metrics. With some experimentation,
    we found that optimizer *RMSProp* performed pretty well with this dataset. RMSProp
    is an algorithm used for full-batch optimization. It tries to solve the problem
    that gradients may vary widely in magnitude by only using the sign of the gradient,
    which guarantees that all weight updates are of the same size.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 均方误差（MSE）是用于回归问题的一种常见损失函数。平均绝对误差（MAE）和RMSE也是常用的指标。经过一些实验，我们发现优化器*RMSProp*在这个数据集上表现相当不错。RMSProp是一种用于全批量优化的算法。它试图通过仅使用梯度的符号来解决梯度幅度可能差异很大的问题，这保证了所有权重更新的大小相同。
- en: Train the Model
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train the model for 50 epochs:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 训练模型50个周期：
- en: '[PRE23]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
