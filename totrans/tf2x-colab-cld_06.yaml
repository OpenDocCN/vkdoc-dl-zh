  type: TYPE_NORMAL
  zh: 可视化训练
- en: Create variable *hist* to hold the model’s history as a pandas dataframe. Create
    another variable *hist[‘epoch’]* to hold epoch history. Display the last five
    rows to get an idea about performance.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 创建变量*hist*来保存模型的记录作为一个pandas数据框。创建另一个变量*hist[‘epoch’]*来保存周期历史。显示最后五行以了解性能。
- en: 'Here’s the code:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是代码：
- en: '[PRE24]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Build the plots as shown in Listing [6-5](#PC26).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表[6-5](#PC26)所示构建图表。
- en: '[PRE25]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Since the validation error is worse than the train error, the model is overfitting.
    What can we do? The first step is to estimate when performance begins to degrade.
    From the visualizations, can you see when this happens?
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 由于验证误差比训练误差更差，模型正在过拟合。我们能做什么？第一步是估计性能开始下降的时间。从可视化中，你能看到什么时候发生这种情况吗？
- en: Early Stopping
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提前停止
- en: With classification, our goal is to maximize accuracy. Of course, we also want
    to minimize loss. With regression, our goal is to minimize MSE or one of the other
    common error metrics. From the visualizations, we see that our model is overfitting
    because validation error is higher than training error. We also see that once
    training error and validation error cross, performance begins to degrade.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类中，我们的目标是最大化准确率。当然，我们还想最小化损失。在回归中，我们的目标是最小化MSE或其他常见的误差指标。从可视化中，我们看到我们的模型正在过拟合，因为验证误差高于训练误差。我们还看到，一旦训练误差和验证误差交叉，性能开始下降。
- en: There is one simple tuning experiment we can run to make this model more useful.
    We can stop the model when training and validation errors are very close to each
    other. This technique is called early stopping. **Early stopping** is a widely
    used approach that stops training at the point when performance on a validation
    dataset starts to degrade.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以运行一个简单的调整实验来使这个模型更有用。我们可以在训练和验证误差非常接近时停止模型。这种技术称为提前停止。**提前停止**是一种广泛使用的方法，它会在验证数据集上的性能开始下降时停止训练。
- en: Let’s modify our training experiment to automatically stop training when the
    validation score doesn’t improve. We use an *EarlyStopping* callback that tests
    a training condition for every epoch. When performance starts to degrade, training
    is automatically stopped.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们修改我们的训练实验，以便在验证分数没有提高时自动停止训练。我们使用一个 *EarlyStopping* 回调，它为每个epoch测试训练条件。当性能开始下降时，训练会自动停止。
- en: All we need to do is update the fit method and retrain as shown in Listing [6-6](#PC27).
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要做的只是更新拟合方法，并按列表 [6-6](#PC27) 所示重新训练。
- en: '[PRE26]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Instead of allowing the algorithm to automatically early stop, we can add some
    control. Just include a parameter that forces the model to continue to a point
    that gives us the best performance. The *patience* parameter can be set to a given
    number of epochs after which training will be stopped if there is no improvement.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是让算法自动提前停止，我们可以添加一些控制。只需包含一个参数，强制模型继续到一个给我们最佳性能的点。*耐心*参数可以设置为一个给定的epoch数，在此之后如果没有改进，训练将停止。
- en: Let’s try this and see what happens as shown in Listing [6-7](#PC28).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们试试看会发生什么，如列表 [6-7](#PC28) 所示。
- en: '[PRE27]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Experiment with the patience parameter to find better results.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调整耐心参数来寻找更好的结果。
- en: 'Let’s visualize:'
  id: totrans-125
