- en: Since the validation error is worse than the train error, the model is overfitting.
    What can we do? The first step is to estimate when performance begins to degrade.
    From the visualizations, can you see when this happens?
  prefs: []
  type: TYPE_NORMAL
- en: Early Stopping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With classification, our goal is to maximize accuracy. Of course, we also want
    to minimize loss. With regression, our goal is to minimize MSE or one of the other
    common error metrics. From the visualizations, we see that our model is overfitting
    because validation error is higher than training error. We also see that once
    training error and validation error cross, performance begins to degrade.
  prefs: []
  type: TYPE_NORMAL
- en: There is one simple tuning experiment we can run to make this model more useful.
    We can stop the model when training and validation errors are very close to each
    other. This technique is called early stopping. **Early stopping** is a widely
    used approach that stops training at the point when performance on a validation
    dataset starts to degrade.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s modify our training experiment to automatically stop training when the
    validation score doesn’t improve. We use an *EarlyStopping* callback that tests
    a training condition for every epoch. When performance starts to degrade, training
    is automatically stopped.
  prefs: []
  type: TYPE_NORMAL
- en: All we need to do is update the fit method and retrain as shown in Listing [6-6](#PC27).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Instead of allowing the algorithm to automatically early stop, we can add some
    control. Just include a parameter that forces the model to continue to a point
    that gives us the best performance. The *patience* parameter can be set to a given
    number of epochs after which training will be stopped if there is no improvement.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s try this and see what happens as shown in Listing [6-7](#PC28).
