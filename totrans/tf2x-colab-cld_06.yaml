  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: PTRATIO – 城镇的学生-教师比例
- en: LSTAT – % lower status of the population
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: LSTAT – 人口中低阶层比例
- en: The target is
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是
- en: MEDV – Median value of owner-occupied homes in $1000s
  id: totrans-32
  prefs:
