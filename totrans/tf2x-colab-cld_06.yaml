  prefs: []
  type: TYPE_NORMAL
  zh: '**波士顿住房**是一个从美国人口普查局收集的有关马萨诸塞州波士顿地区住房信息的数据集。它来自StatLib档案([`http://lib.stat.cmu.edu/datasets/boston`](http://lib.stat.cmu.edu/datasets/boston))，并在机器学习文献中被广泛用作算法的基准。该数据集规模较小，只有506个案例。'
