  zh: 将分类列转换为数值
- en: Machine learning algorithms can only train numeric data. So we must convert
    any non-numeric feature. The *Origin* column is categorical, not numeric. To remedy,
    one solution is to encode the data as one-hot. **One-hot encoding** is a process
    that converts categorical data into a numeric form for machine learning algorithm
    consumption.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习算法只能训练数值数据。因此，我们必须将任何非数值特征转换为数值。*Origin* 列是分类的，不是数值的。为了解决这个问题，一个解决方案是将数据编码为独热编码。**独热编码**是一个将分类数据转换为数值形式以供机器学习算法消费的过程。
- en: We start by slicing off the Origin feature column from the original dataframe
    into its own dataframe. We then use this dataframe as a template to build a new
    feature column in the original dataframe for each category from the original Origin
    feature.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先从原始数据框中切分出“来源”特征列到其自己的数据框中。然后我们使用这个数据框作为模板，在原始数据框的每个类别中为原始“来源”特征构建一个新的特征列。
- en: 'Create a copy of the dataframe:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据框的副本：
- en: '[PRE54]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Define one-hot encoded feature columns for US, Europe, and Japanese cars:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 定义美国、欧洲和日本汽车的独热编码特征列：
- en: '[PRE55]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: For *US* origin, we assign *1.0 0.0 0.0*. For *Europe* origin, we assign *0.0
    1.0 0.0*. For *Japan* origin, we assign *0.0 0.0 1.0*. So we replace the Origin
    feature with three one-hot encoded features.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 *US* 来源，我们分配 *1.0 0.0 0.0*。对于 *Europe* 来源，我们分配 *0.0 1.0 0.0*。对于 *Japan* 来源，我们分配
    *0.0 0.0 1.0*。因此，我们将“来源”特征替换为三个独热编码特征。
- en: 'Alternatively, we can one-hot encode with pandas. Start by creating a copy
    of the dataframe:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以使用 pandas 进行独热编码。首先创建数据框的副本：
- en: '[PRE56]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: 'One-hot encode:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 独热编码：
- en: '[PRE57]'
  id: totrans-216
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: 'Drop the original column:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 删除原始列：
- en: '[PRE58]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: 'Join the encoded column to the dataframe:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 将编码列添加到数据框中：
- en: '[PRE59]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: Slice Extraneous Data
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 切片多余数据
- en: 'Since the name of each car has no impact on any predictions we might want to
    make, we can tuck it away into its own dataframe in case we want to revisit it
    in the future:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每辆车的名称对我们可能想要做出的任何预测都没有影响，我们可以将其放入自己的数据框中，以便将来回顾：
- en: '[PRE60]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: If an exception occurs, the *Car* column has already been removed. You can run
    this piece of code several times with no impact to results.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 如果发生异常，*Car* 列已经删除。你可以多次运行这段代码，而不会对结果产生影响。
- en: 'Verify:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 验证：
- en: '[PRE61]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: Create Features and Labels
  id: totrans-227
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建特征和标签
- en: Our goal is to predict miles per gallon for cars in this dataset. So the target
    is *MPG*, and the features are the remaining feature columns.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目的是预测数据集中汽车的每加仑英里数。因此，目标是 *MPG*，特征是剩余的特征列。
- en: Create feature and target sets as shown in Listing [6-13](#PC63).
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 按照列表 [6-13](#PC63) 创建特征和目标集。
