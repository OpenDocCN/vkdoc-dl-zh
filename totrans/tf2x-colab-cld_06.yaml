- en: 6. Regression
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '**Regression** is a supervised learning method for predicting a continuous
    output of an event based on the relationship between variables (or features) obtained
    from a dataset. A **continuous** outcome is a real value such as an integer or
    floating-point value often quantified as amounts and sizes. Regression is a widely
    popular type of deep learning modeling.'
  prefs: []
  type: TYPE_NORMAL
- en: Since regression predicts a quantity, performance is measured error in those
    predictions. Regression performance can be measured in many ways. But the most
    common are mean squared error (MSE), mean absolute error (MAE), and root mean
    squared error (RMSE).
  prefs: []
  type: TYPE_NORMAL
- en: '*MSE* is one of the most commonly used metrics. However, it is least useful
    when a single bad prediction would ruin the entire model’s predicting abilities.
    That is, when the dataset contains a lot of noise. It is most useful when the
    dataset contains outliers or unexpected values. Unexpected values are those that
    are too high or too low.'
  prefs: []
  type: TYPE_NORMAL
- en: '*MAE* is not very sensitive to outliers in comparison to MSE since it doesn’t
    punish huge errors. It is typically used when performance is measured on continuous
    variable data. It provides a linear value that averages the weighted individual
    differences equally.'
  prefs: []
  type: TYPE_NORMAL
- en: '*RMSE* errors are squared before they are averaged. As such, RMSE assigns a
    higher weight to larger errors. So RMSE is much more useful when large errors
    are present and they drastically affect the model’s performance. A benefit of
    RMSE is that units of error score are the same as the predicted value.'
  prefs: []
  type: TYPE_NORMAL
- en: We thoroughly work through the famous *Boston Housing* dataset. We demonstrate
