- en: Remove Bad Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Boston dataset has some inherent bad data. What is wrong with the data?
    Prices of homes are capped at $50,000 because the Census Service censored the
    data. They decided to set the maximum value of the price variable to 50,000 USD,
    so no price can go beyond that value.
  prefs: []
  type: TYPE_NORMAL
- en: What do we do? While maybe not ideal, we can remove data with prices at or above
    50,000 USD. This is not ideal because we may be removing perfectly good data,
    but there is no way to know this. Another reason is because the dataset is so
    small to begin with. Neural nets are meant to perform at their best with larger
    datasets.
  prefs: []
  type: TYPE_NORMAL
