  type: TYPE_NORMAL
- en: Machine learning algorithms can only train numeric data. So we must convert
    any non-numeric feature. The *Origin* column is categorical, not numeric. To remedy,
    one solution is to encode the data as one-hot. **One-hot encoding** is a process
    that converts categorical data into a numeric form for machine learning algorithm
    consumption.
  prefs: []
  type: TYPE_NORMAL
- en: We start by slicing off the Origin feature column from the original dataframe
    into its own dataframe. We then use this dataframe as a template to build a new
    feature column in the original dataframe for each category from the original Origin
    feature.
