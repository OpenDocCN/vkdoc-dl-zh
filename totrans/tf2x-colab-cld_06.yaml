- en: With image data, we scale by dividing each element by 255.0 to ensure that each
    input parameter (a pixel, in our case) has a similar data distribution. However,
    features represented by continuous values are scaled differently. We scale continuous
    data to have a mean (μ) of 0 and standard deviation (σ) of 1\. Symbol μ is pronounced
    mu, and symbol σ is pronounced sigma. A sigma of 1 is called unit variance.
  prefs: []
  type: TYPE_NORMAL
