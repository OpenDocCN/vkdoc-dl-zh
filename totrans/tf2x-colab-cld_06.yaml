- en: '**Boston Housing** is a dataset derived from information collected by the US
    Census Service concerning housing in the area of Boston, Massachusetts. It was
    obtained from the StatLib archive ([`http://lib.stat.cmu.edu/datasets/boston`](http://lib.stat.cmu.edu/datasets/boston))
    and has been used extensively throughout the machine learning literature to benchmark
    algorithms. The dataset is small in size with only 506 cases.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The name of this dataset is *boston* . It contains 12 features and 1 outcome
    (or target). The features are as follows:'
