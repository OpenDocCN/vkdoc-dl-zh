- en: 7. Convolutional Neural Networks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: With feedforward neural networks, we achieved good training performance with
    MNIST and Fashion-MNIST datasets. But images in these datasets are simple and
    centered within the input space that contains them. That is, they are centered
    within the pixel matrix that holds them. **Input space** is all the possible inputs
    to a model.
  prefs: []
  type: TYPE_NORMAL
- en: Feedforward neural networks are very good at identifying patterns. So, if images
    occupy the same position within their input space, feedforward nets can quickly
    and effectively identify image patterns. And, if images are simple in terms of
    number of image pixels, patterns emerge more easily. But, if images don’t occupy
    the same positions in their input spaces, feedforward nets have great difficulty
    identifying patterns and thereby perform horribly! So we need a different model
    to work with these types of images.
  prefs: []
  type: TYPE_NORMAL
- en: We can train complex and off-center images with convolutional neural networks
    and get good results. A **convolutional neural network** (CNN or ConvNet) is a
    class of deep neural networks most commonly applied to visual imagery analysis.
    CNNs are inspired by their resemblance to biological processes in that the connectivity
    between neurons resembles the organization of the visual cortex in humans.
  prefs: []
  type: TYPE_NORMAL
- en: A CNN works differently than a feedforward network because it treats data as
    spatial. Instead of neurons being connected to every neuron in the previous layer,
    they are instead *only* connected to neurons close to them, and all have the same
    weight. The simplification in the connections means that the network upholds the
    spatial aspect of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Suppose the image is a profile of a child’s face. A CNN doesn’t think the child’s
    eye is repeated all over the image. It can efficiently locate the child’s eye
    in the image because of the filtering process it undertakes.
  prefs: []
  type: TYPE_NORMAL
- en: A CNN processes an image dataset by assigning importance to various elements
    in each image, which enables it to differentiate between images. Importance is
    calibrated with learnable weights and biases. Preprocessing is much lower when
    compared to other classification algorithms because a CNN has the ability to learn
    how to adjust its filters during training.
  prefs: []
  type: TYPE_NORMAL
- en: The core building block of a CNN is the convolutional layer. A **convolutional
    layer** contains a series of filters that transform an input image by extracting
    features into feature maps for consumption by the next layer in the network. The
    transformation convolves the image with a set of learnable filters (or convolutional
    kernels) that have a small receptive field.
  prefs: []
  type: TYPE_NORMAL
- en: '**Convolution** preserves the relationship between pixels by learning image
    features using small squares of input data. A **convolutional kernel** is a filter
    used on a *subset* of the pixel values of an input image. So a convolutional kernel
    is one of the small squares of input data that learns image features. A **receptive
    field** is the part of an image where a convolutional kernel operates at a given
    point in time. *Feature maps* of a CNN capture the result of applying convolutional
    kernels to an input image. So individual neurons respond to stimuli *only* in
    a restricted region of the receptive field (or visual field).'
  prefs: []
  type: TYPE_NORMAL
- en: Whew! Simply, a convolutional kernel is a small matrix with its height and width
    smaller than the image to be convolved. During training, the kernel slides across
    the entire height and width of the input image, and the dot product of the kernel
    and the image is computed at every spatial position of the image. These computations
    create feature maps as output. So the entire image is convolved by a convolutional
    kernel! Such convolution is the key to the efficiency of a CNN because the filtering
    process allows it to adjust filter parameters during training.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by discussing the CNN architecture. We start with some sample images
    to help you understand the type of data we are working with. We continue by building
    a complete CNN experiment. We work with the famous *cifar10* dataset. This dataset
    contains 60,000 images created to allow deep learning aficionados to create and
    test deep learning models. We demonstrate how to load the data, build the input
    pipeline, and model the data. We also show you how to make predictions.
  prefs: []
  type: TYPE_NORMAL
