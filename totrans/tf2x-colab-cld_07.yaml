- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: We build the input pipeline by shuffling train data, batching, scaling, caching,
    and prefetching. We scale images by mapping with a lambda function. Adding the
    *cache* method increases performance on a TFDS because data is read and written
    only once rather than during each epoch. Adding the *prefetch* method is a good
    idea because it adds efficiency to the batching process. That is, while our training
    algorithm is working on one batch, TensorFlow is working on the dataset in parallel
    to get the next batch ready. So prefetch can dramatically improve training performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Verify that train and test sets are created correctly:'
