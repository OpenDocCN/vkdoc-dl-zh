- en: Splitting the Dataset into Training and Test Sets
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据集分割为训练集和测试集
- en: A core practice in machine learning is to split the dataset into different partitions
    for training and testing. Scikit-learn has a convenient method to assist in that
    process called **train_test_split(X, y, test_size=0.25)** , where **X** is the
    design matrix or dataset of predictors and **y** is the target variable. The split
    size is controlled using the attribute **test_size**. By default, test_size is
    set to 25% of the dataset size. It is standard practice to shuffle the dataset
    before splitting by setting the attribute **shuffle=True**.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Preprocessing the Data for Model Fitting
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before a dataset is trained or fitted with a machine learning model, it necessarily
    undergoes some vital transformations. These transformations have a huge effect
    on the performance of the learning model. Transformations in Scikit-learn have
    a **fit()** and **transform()** method, or a **fit_transform()** method.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the use case, the **fit()** method can be used to learn the parameters
    of the dataset, while the **transform()** method applies the data transform based
    on the learned parameters to the same dataset and also to the test or validation
    datasets before modeling. Also, the **fit_transform()** method can be used to
    learn and apply the transformation to the same dataset in a one-off fashion. Data
    transformation packages are found in the **sklearn.preprocessing** package.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: This section will cover some critical transformation for numeric and categorical
    variables. They include
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Data rescaling
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standardization
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Normalization
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Binarization
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encoding categorical variables
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Input missing data
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating higher-order polynomial features
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data Rescaling
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is often the case that the features of the dataset contain data with different
    scales. In other words, the data in column A can be in the range of 1–5, while
    the data in column B is in the range of 1000–9000\. This different scale for units
    of observations in the same dataset can have an adverse effect for certain machine
    learning models, especially when minimizing the cost function of the algorithm
    because it shrinks the function space and makes it difficult for an optimization
    algorithm like gradient descent to find the global minimum.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: When performing data rescaling, usually the attributes are rescaled with the
    range of 0 and 1\. Data rescaling is implemented in Scikit-learn using the **MinMaxScaler**
    module. Let’s see an example.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Standardization
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Linear machine learning algorithms such as linear regression and logistic regression
    make an assumption that the observations of the dataset are normally distributed
    with a mean of 0 and standard deviation of 1\. However, this is often not the
    case with real-world datasets as features are often skewed with differing means
    and standard deviations.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Applying the technique of standardization to the datasets transforms the features
    into a standard Gaussian (or normal) distribution with a mean of 0 and standard
    deviation of 1\. Scikit-learn implements data standardization in the **StandardScaler**
    module. Let’s look at an example.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 将标准化技术应用于数据集将特征转换为具有均值为0和标准差为1的标准高斯（或正态）分布。Scikit-learn在**StandardScaler**模块中实现了数据标准化。让我们看看一个例子。
- en: '[PRE4]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Normalization
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 归一化
- en: Data normalization involves transforming the observations in the dataset so
    that it has a unit norm or has magnitude or length of 1\. The length of a vector
    is the square root of the sum of squares of the vector elements. A unit vector
    (or unit norm) is obtained by dividing the vector by its length. Normalizing the
    dataset is particularly useful in scenarios where the dataset is sparse (i.e.,
    a large number of observations are zeros) and also has differing scales. Normalization
    in Scikit-learn is implemented in the **Normalizer** module.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 数据归一化涉及将数据集中的观测值转换为单位范数或具有大小或长度为1。向量的长度是向量元素平方和的平方根。通过将向量除以其长度，可以得到一个单位向量（或单位范数）。在Scikit-learn中，归一化是通过**Normalizer**模块实现的。
- en: '[PRE5]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Binarization
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 二值化
- en: Binarization is a transformation technique for converting a dataset into binary
    values by setting a cutoff or threshold. All values above the threshold are set
    to 1, while those below are set to 0\. This technique is useful for converting
    a dataset of probabilities into integer values or in transforming a feature to
    reflect some categorization. Scikit-learn implements binarization with the **Binarizer**
    module.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 二值化是将数据集转换为二进制值的一种转换技术，通过设置一个截止值或阈值。所有高于阈值的值被设置为1，而低于阈值的值被设置为0。这种技术在将概率数据集转换为整数值或转换特征以反映某些分类时非常有用。Scikit-learn使用**Binarizer**模块实现二值化。
- en: '[PRE6]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Encoding Categorical Variables
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编码分类变量
- en: Most machine learning algorithms do not compute with non-numerical or categorical
    variables. Hence, encoding categorical variables is the technique for converting
    non-numerical features with labels into a numerical representation for use in
    machine learning modeling. Scikit-learn provides modules for encoding categorical
    variables including the **LabelEncoder** for encoding labels as integers, **OneHotEncoder**
    for converting categorical features into a matrix of integers, and **LabelBinarizer**
    for creating a one-hot encoding of target labels.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数机器学习算法不使用非数值或分类变量进行计算。因此，将分类变量编码成技术是将带有标签的非数值特征转换为数值表示，以便在机器学习建模中使用。Scikit-learn提供了用于编码分类变量的模块，包括将标签编码为整数的**LabelEncoder**，将分类特征转换为整数矩阵的**OneHotEncoder**，以及创建目标标签的一热编码的**LabelBinarizer**。
- en: '**LabelEncoder** is typically used on the target variable to transform a vector
    of hashable categories (or labels) into an integer representation by encoding
    label with values between 0 and the number of categories minus 1\. This is further
    illustrated in Figure [18-1](#Fig1).'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**LabelEncoder**通常用于目标变量，通过将可哈希的类别（或标签）向量编码为介于0和类别数量减1之间的值，将其转换为整数表示。这进一步在图[18-1](#Fig1)中进行了说明。'
- en: '![../images/463852_1_En_18_Chapter/463852_1_En_18_Fig1_HTML.jpg](../images/463852_1_En_18_Chapter/463852_1_En_18_Fig1_HTML.jpg)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_18_Chapter/463852_1_En_18_Fig1_HTML.jpg](../images/463852_1_En_18_Chapter/463852_1_En_18_Fig1_HTML.jpg)'
- en: Figure 18-1
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-1
- en: LabelEncoder
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: LabelEncoder
- en: Let’s see an example of **LabelEncoder**.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看**LabelEncoder**的一个例子。
- en: '[PRE7]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**OneHotEncoder** is used to transform a categorical feature variable in a
    matrix of integers. This matrix is a sparse matrix with each column corresponding
    to one possible value of a category. This is further illustrated in Figure [18-2](#Fig2).'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**OneHotEncoder**用于将分类特征变量转换为整数矩阵。这个矩阵是一个稀疏矩阵，每一列对应于一个类别的可能值。这进一步在图[18-2](#Fig2)中进行了说明。'
- en: '![../images/463852_1_En_18_Chapter/463852_1_En_18_Fig2_HTML.jpg](../images/463852_1_En_18_Chapter/463852_1_En_18_Fig2_HTML.jpg)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_18_Chapter/463852_1_En_18_Fig2_HTML.jpg](../images/463852_1_En_18_Chapter/463852_1_En_18_Fig2_HTML.jpg)'
- en: Figure 18-2
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图18-2
- en: OneHotEncoder
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: OneHotEncoder
- en: Let’s see an example of **OneHotEncoder** .
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看**OneHotEncoder**的一个例子。
- en: '[PRE8]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Input Missing Data
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输入缺失数据
- en: It is often the case that a dataset contains several missing observations. Scikit-learn
    implements the **Imputer** module for completing missing values.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，数据集中包含多个缺失观测值。Scikit-learn实现了**Imputer**模块来填充缺失值。
- en: '[PRE9]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Generating Higher-Order Polynomial Features
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成高阶多项式特征
- en: Scikit-learn has a module called PolynomialFeatures for generating a new dataset
    containing high-order polynomial and interaction features based off the features
    in the original dataset. For example, if the original dataset has two dimensions
    [a, b], the second-degree polynomial transformation of the features will result
    in [1, a, b, *a*², ab, *b*²].
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn有一个名为PolynomialFeatures的模块，用于生成一个新的数据集，该数据集包含基于原始数据集中特征的高阶多项式和交互特征。例如，如果原始数据集有两个维度[a,
    b]，则特征的第二阶多项式变换将产生[1, a, b, *a*², ab, *b*²]。
- en: '[PRE10]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Machine Learning Algorithms
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习算法
- en: This chapter provides an introduction to working with the Scikit-learn library
    for implementing machine learning algorithms.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了使用Scikit-learn库实现机器学习算法的入门。
- en: In the next chapters, we’ll implement supervised and unsupervised machine learning
    models using Scikit-learn. Scikit-learn provides a consistent set of methods,
    which are the **fit()** method for fitting models to the training dataset and
    the **predict()** method for using the fitted parameters to make a prediction
    on the test dataset. The examples are geared at explaining working with Scikit-learn;
    hence, we are not so keen on the performance of the model.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将使用Scikit-learn实现监督学习和无监督机器学习模型。Scikit-learn提供了一套一致的方法，其中**fit()**方法用于将模型拟合到训练数据集，而**predict()**方法用于使用拟合的参数在测试数据集上进行预测。示例旨在解释如何使用Scikit-learn；因此，我们并不那么关注模型的性能。
- en: 19. Linear Regression
  id: totrans-82
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 19. 线性回归
- en: The fundamental idea behind the linear regression algorithm is that it assumes
    a linear relationship between the features of the dataset. As a result of the
    pre-defined structure that is imposed on the parameters of the model, it is also
    called a parametric learning algorithm. Linear regression is used to predict targets
    that contain real values. As we will see later in Chapter [20](463852_1_En_20_Chapter.xhtml)
    on logistic regression, the linear regression model is not adequate to deal with
    learning problems whose targets are categorical.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归算法背后的基本思想是它假设数据集的特征之间存在线性关系。由于模型参数上施加的预定义结构，它也被称为参数化学习算法。线性回归用于预测包含实数值的目标。正如我们将在第[20](463852_1_En_20_Chapter.xhtml)章关于逻辑回归中看到的，线性回归模型不足以处理目标为分类的学习问题。
- en: The Regression Model
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 回归模型
- en: In linear regression, the prevailing assumption is that the target variable
    (i.e., the unit that we want to predict) can be modeled as a linear combination
    of the features.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在线性回归中，普遍的假设是目标变量（即我们想要预测的单位）可以建模为特征的线性组合。
- en: A linear combination is simply the addition of a certain number of vectors that
    are scaled (or adjusted) by some arbitrary constant. A vector is a mathematical
    construct for representing a set of numbers.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 线性组合仅仅是若干个向量的加和，这些向量被某个任意常数缩放（或调整）。向量是表示一组数字的数学结构。
- en: For example, let us assume a randomly generated dataset consisting of two features
    and a target variable. The dataset has 50 observations (see Figure [19-1](#Fig1)).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们假设一个由两个特征和一个目标变量组成的随机生成数据集。该数据集有50个观测值（见图[19-1](#Fig1)）。
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig1_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig1_HTML.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig1_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig1_HTML.jpg)'
- en: Figure 19-1
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图19-1
- en: Sample dataset
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 样本数据集
- en: The vectors of this dataset are
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集的向量是
- en: '![$$ x1=\left[40\ 31\ 81\ 57\dots 66\ \right],\kern1em x2=\left[73\ 59\ 18\
    69\dots 20\ \right],\kern1em y=\left[105\ 145\ 128\ 116\dots 144\ \right] $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equa.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![$$ x1=\left[40\ 31\ 81\ 57\dots 66\ \right],\kern1em x2=\left[73\ 59\ 18\
    69\dots 20\ \right],\kern1em y=\left[105\ 145\ 128\ 116\dots 144\ \right] $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equa.png)'
- en: In a linear regression model, every feature has an assigned “weight.” We can
    say that the weight parameterizes each feature in the dataset. The weights in
    the dataset are adjusted to take on values that capture the underlying relationship
    between the features that optimally approximate the target variable. The linear
    regression model is formally written as
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在线性回归模型中，每个特征都有一个分配的“权重”。我们可以这样说，权重参数化数据集中的每个特征。数据集中的权重被调整以获得值，这些值能够捕捉特征之间的基本关系，并最佳地近似目标变量。线性回归模型形式上表示为
- en: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_2+\dots +{\theta}_n{x}_n
    $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equb.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_2+\dots +{\theta}_n{x}_n
    $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equb.png)'
- en: where
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '![$$ \hat{y} $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_IEq1.png)
    (pronounced y-hat) is the approximate value of the output *y* that we want to
    predict.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![$$ \hat{y} $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_IEq1.png)
    (发音为 y-hat) 是我们想要预测的输出 *y* 的近似值。'
- en: '*θ*[*i*], where *i* = {1, 2, …*n*}, is the weight assigned to each feature
    in the dataset. The notation *n* is the size of features of the dataset.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*θ*[*i*]，其中 *i* = {1, 2, …*n*}，是分配给数据集中每个特征的权重。符号 *n* 是数据集特征的大小。'
- en: '*θ*[0] represents the “bias” term.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*θ*[0] 代表“偏差”项。'
- en: A Visual Representation of Linear Regression
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 线性回归的视觉表示
- en: To provide more intuition, let us draw a 2-D plot of the first feature *x*[1]
    and the target variable *y* of the dataset with all 50 records. We are using just
    one feature in this illustration because it is easier to visualize with a 2-D
    scatter plot (see Figure [19-2](#Fig2)).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供更多的直观理解，让我们绘制一个二维图，展示数据集的第一个特征 *x*[1] 和目标变量 *y* 的所有 50 条记录。在这个示例中，我们只使用一个特征，因为用二维散点图可视化更容易（见图
    [19-2](#Fig2)）。
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig2_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig2_HTML.jpg)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig2_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig2_HTML.jpg)'
- en: Figure 19-2
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图 19-2
- en: '*Scatter plot of x* [1] *(on the x axis) and y (on the y axis)*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '*x* 的散点图 [1] *(位于 x 轴上) 和 y (位于 y 轴上)*'
- en: The goal of the linear model is to find a line that gives the best approximation
    or best fit to the data points. When found, this line will look like something
    in Figure [19-3](#Fig3). The line of best fit is known as the regression line.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 线性模型的目标是找到一个线，它给出数据点的最佳近似或最佳拟合。当找到时，这条线将类似于图 [19-3](#Fig3) 中的某物。最佳拟合线被称为回归线。
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig3_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig3_HTML.jpg)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig3_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig3_HTML.jpg)'
- en: Figure 19-3
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图 19-3
- en: '*Scatter plot of x* [1] *(on the x axis) and y (on the y axis) with regression
    line*'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '*x* 的散点图 [1] *(位于 x 轴上) 和 y (位于 y 轴上) 的回归线*'
- en: Finding the Regression Line – How Do We Optimize the Parameters of the Linear
    Model?
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 寻找回归线 – 我们如何优化线性模型的参数？
- en: To find the regression line, we need to define the cost function, which is also
    called the loss function. Remember that the cost in machine learning is the error
    measure that the learning algorithm minimizes. We can also define the cost as
    the penalty when the model outputs an incorrect prediction.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找到回归线，我们需要定义成本函数，这也可以称为损失函数。记住，在机器学习中，成本是学习算法最小化的误差度量。我们也可以将成本定义为模型输出错误预测时的惩罚。
- en: In the case of the linear regression model, the cost function is defined as
    half the sum of the squared difference between the predicted value and the actual
    value. The linear regression cost function is called the ***squared error cost
    function*** and is written as
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在线性回归模型的情况下，成本函数定义为预测值和实际值之间平方差的和的一半。线性回归成本函数被称为 ***平方误差成本函数***，其表示为
- en: '![$$ C\left(\theta \right)=\frac{1}{2}\sum {\left(\hat{y}-y\right)}^2 $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equc.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C\left(\theta \right)=\frac{1}{2}\sum {\left(\hat{y}-y\right)}^2 $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equc.png)'
- en: To put it more simply, the closer the approximate value of the target variable
    ![$$ \hat{y} $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_IEq2.png)
    is to the actual variable *y*, the lower our cost and the better our model.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 更简单地说，目标变量的近似值 ![$$ \hat{y} $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_IEq2.png)
    越接近实际变量 *y*，我们的成本就越低，我们的模型就越好。
- en: Having defined the cost function, an optimization algorithm such as gradient
    descent is used to minimize the cost *C*(*θ*) by updating the weights of the linear
    regression model.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了成本函数后，可以使用梯度下降等优化算法通过更新线性回归模型的权重来最小化成本 *C*(*θ*)。
- en: How Do We Interpret the Linear Regression Model?
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们如何解释线性回归模型？
- en: In machine learning, the focus of linear regression differs slightly from traditional
    statistics. In statistics, the goal of a regression model is to understand the
    relationships between the features and targets by interpreting p-values, whereas
    in machine learning, the goal of the linear regression model is to predict the
    targets given new samples.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，线性回归的关注点与传统统计学略有不同。在统计学中，回归模型的目标是通过解释p值来理解特征与目标之间的关系，而在机器学习中，线性回归模型的目标是根据新的样本预测目标。
- en: Figure [19-4](#Fig4) shows a regression model with a line of best fit that optimizes
    the squared difference between the data features and the targets. This difference
    is also called the residuals (shown as the purple vertical lines in Figure [19-4](#Fig4)).
    What we care about in a linear regression model is to minimize the error between
    the predicted labels and the actual labels in the dataset.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图[19-4](#Fig4)显示了一个回归模型，其最佳拟合线优化了数据特征与目标之间的平方差。这个差异也称为残差（在图[19-4](#Fig4)中以紫色垂直线表示）。在线性回归模型中，我们关注的是最小化预测标签与数据集中实际标签之间的误差。
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig4_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig4_HTML.jpg)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig4_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig4_HTML.jpg)'
- en: Figure 19-4
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图19-4
- en: Linear regression model showing residuals
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 展示残差的线性回归模型
- en: If all the points in Figure [19-4](#Fig4) entirely fall on the predicted regression
    line, then the error will be 0\. In interpreting the regression model, we want
    the error measure to be as low as possible.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如果图[19-4](#Fig4)中的所有点完全落在预测的回归线上，则误差将为0。在解释回归模型时，我们希望误差度量尽可能低。
- en: However, our emphasis is to obtain a low error measure when we evaluate our
    model on the test dataset. Recall that the test of learning is when a model can
    generalize to examples that it was not exposed to during training.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们的重点是当我们在测试数据集上评估我们的模型时，获得一个低误差度量。回想一下，学习的测试是在模型可以推广到训练期间未接触到的示例时。
- en: Linear Regression with Scikit-learn
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Scikit-learn进行线性回归
- en: In this example, we will implement a linear regression model with Scikit-learn.
    The model will predict house prices from the Boston house-prices dataset. The
    dataset contains 506 observations and 13 features.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将使用Scikit-learn实现一个线性回归模型。该模型将根据波士顿房价数据集预测房价。该数据集包含506个观测值和13个特征。
- en: 'We begin by importing the following packages:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先导入以下包：
- en: '[PRE11]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: In the preceding code, using the `train_test_split()` function, the dataset
    is split into training and testing sets. The linear regression algorithm is applied
    to the training dataset to find the optimal values that parameterize the weights
    of the model. The model is evaluated by calling the `.predict()` function on the
    test set.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码中，使用`train_test_split()`函数将数据集分为训练集和测试集。将线性回归算法应用于训练数据集以找到参数化模型权重的最优值。通过在测试集上调用`.predict()`函数来评估模型。
- en: The error of the model is evaluated using the RMSE error metric (discussed in
    Chapter [14](463852_1_En_14_Chapter.xhtml)).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的误差使用RMSE误差度量（在第[14](463852_1_En_14_Chapter.xhtml)章中讨论）进行评估。
- en: Adapting to Non-linearity
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 适应非线性
- en: Although linear regression has the premise that the underlying structure of
    the dataset features is linear, this is, however, not the case for most datasets.
    It is nevertheless possible to adapt linear regression to fit or build a model
    for non-linear datasets. This process of adding non-linearity to linear models
    is called ***polynomial regression***.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然线性回归的前提是数据集特征的潜在结构是线性的，但对于大多数数据集来说，情况并非如此。尽管如此，仍然可以将线性回归适应于拟合或为非线性数据集建立模型。将非线性添加到线性模型中的这个过程称为**多项式回归**。
- en: Polynomial regression fits a non-linear relationship to the data by adding higher-order
    polynomial terms of existing data features as new features in the dataset. More
    of this is visualized in Figure [19-5](#Fig5).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 多项式回归通过在数据集中添加现有数据特征的更高阶多项式项作为新特征来拟合数据中的非线性关系。更多内容在图[19-5](#Fig5)中展示。
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig5_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig5_HTML.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig5_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig5_HTML.jpg)'
- en: Figure 19-5
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图19-5
- en: Adding polynomial features to the dataset
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 向数据集中添加多项式特征
- en: It is important to note that from a statistical point of view, when approximating
    the optimal values of the weights to minimize the model, the underlying assumption
    of the interactions of the parameters is linear. Non-linear regression models
    may tend to overfit the data, but this can be mitigated by adding regularization
    to the model. Here is a formal example of the polynomial regression model.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，从统计学的角度来看，在逼近最小化模型的最优权重值时，参数交互的基本假设是线性的。非线性回归模型可能会过度拟合数据，但可以通过向模型添加正则化来缓解这一点。以下是一个多项式回归模型的正式示例。
- en: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_1^2+{\theta}_3{x}_2+{\theta}_4{x}_2^2+\dots
    +{\theta}_n{x}_n+{\theta}_n{x}_n^2 $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equd.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equd.png)'
- en: An illustration of polynomial regression is shown in Figure [19-6](#Fig6).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 多项式回归的示意图如图 [19-6](#Fig6) 所示。
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig6_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig6_HTML.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig6_HTML.jpg)'
- en: Figure 19-6
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图 19-6
- en: Fitting a non-linear model with polynomial regression
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 使用多项式回归拟合非线性模型
- en: Higher-Order Linear Regression with Scikit-learn
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Scikit-learn 进行高阶线性回归
- en: In this example, we will create higher-order polynomials from the dataset features
    in hope of fitting a more flexible model that may better capture the variance
    in the dataset. As seen in Chapter [18](463852_1_En_18_Chapter.xhtml), we will
    use the PolynomialFeatures method to create these higher-order polynomial and
    interaction features. The following code example is similar to the previous code
    example except where it extends the feature matrix with higher-order features.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将从数据集特征中创建高阶多项式，希望拟合一个更灵活的模型，可能更好地捕捉数据集中的方差。如第 [18](463852_1_En_18_Chapter.xhtml)
    章所述，我们将使用 PolynomialFeatures 方法来创建这些高阶多项式和交互特征。以下代码示例与之前的代码示例类似，除了它通过添加高阶特征扩展了特征矩阵。
- en: '[PRE12]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: From the example, we can observe a slight improvement in the error score of
    the model with added higher-order features. This result is similar to what may
    most likely be observed in practice. It is rare to find datasets from real-world
    events where the features have a perfectly underlying linear structure. So adding
    higher-order terms is most likely to improve the model performance. But we must
    watch out to avoid overfitting the model.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 从示例中，我们可以观察到添加了高阶特征后模型误差分数的轻微改善。这个结果与实践中可能观察到的结果相似。在现实世界中，很难找到特征具有完美线性结构的真实事件数据集。因此，添加高阶项最有可能提高模型性能。但我们必须注意避免过度拟合模型。
- en: Improving the Performance of a Linear Regression Model
  id: totrans-144
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高线性回归模型的表现
- en: The following techniques are options that can be explored to improve the performance
    of a linear regression model.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些可以探索的选项，以提高线性回归模型的表现。
- en: '**In the case of Bias (i.e., poor MSE on training data)**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**在偏差的情况下（即训练数据上的 MSE 较差**）'
- en: Perform feature selection to reduce the parameter space. Feature selection is
    the process of eliminating variables that do not contribute to learning the prediction
    model. There are various automatic methods for feature selection with linear regression.
    A couple of them are backward selection, forward propagation, and stepwise regression.
    Features can also be pruned manually by systematically going through each feature
    in the dataset and determining its relevance to the learning problem.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行特征选择以减少参数空间。特征选择是消除对学习预测模型没有贡献的变量的过程。对于线性回归，有各种自动特征选择方法。其中一些是向后选择、前向传播和逐步回归。特征也可以通过系统地遍历数据集中的每个特征并确定其与学习问题的相关性来手动剪枝。
- en: Remove features with high correlation. Correlation occurs when two predictor
    features are strongly dependent on one another. Empirically, highly correlated
    features in the datasets may hurt the model accuracy.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移除具有高相关性的特征。当两个预测特征强烈依赖于彼此时，就会发生相关性。经验上，数据集中的高度相关特征可能会损害模型精度。
- en: Use higher-order features. A more flexible fit may better capture the variance
    in the dataset.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用高阶特征。更灵活的拟合可能更好地捕捉数据集中的方差。
- en: Rescale your data before training. Unscaled features negatively affect the prediction
    quality of a regression model. Because of the different feature scales in multi-dimensional
    space, it becomes difficult for the model to find the optimal weights that capture
    the learning problem. As mentioned in Chapter [16](463852_1_En_16_Chapter.xhtml),
    gradient descent performs better with feature scaling.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练之前重新缩放你的数据。未缩放的特征会负面影响回归模型的预测质量。由于多维空间中特征的不同尺度，模型难以找到捕获学习问题的最佳权重。如第 [16](463852_1_En_16_Chapter.xhtml)
    章所述，梯度下降在特征缩放时表现更好。
- en: In a rare case, we may need to collect more data. However, this is potentially
    costly.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在罕见的情况下，我们可能需要收集更多的数据。然而，这可能是成本高昂的。
- en: '**In the case of variance (i.e., the MSE is good when evaluated on training
    data, but poor on the test data)**'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: '**在方差的情况下（即，当在训练数据上评估时均方误差（MSE）很好，但在测试数据上很差）**'
- en: A standard practice, in this case, is to apply regularization (more on this
    in Chapter [21](463852_1_En_21_Chapter.xhtml)) to the regression model. This can
    do a good job at preventing overfitting.
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这种情况下，一个标准的做法是对回归模型应用正则化（关于这一点将在第 [21](463852_1_En_21_Chapter.xhtml) 章中详细介绍）。这可以很好地防止过拟合。
- en: This chapter provides an overview on the linear regression machine learning
    algorithm for learning real-valued targets. Also, the chapter provided practical
    steps for implementing linear regression models with Scikit-learn. In the next
    chapter, we will examine logistic regression for learning classification problems.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 本章概述了用于学习实值目标的线性回归机器学习算法。此外，本章还提供了使用 Scikit-learn 实现线性回归模型的实际步骤。在下一章中，我们将检查逻辑回归以学习分类问题。
- en: 20. Logistic Regression
  id: totrans-155
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 20. 逻辑回归
- en: Logistic regression is a supervised machine learning algorithm developed for
    learning classification problems. A classification learning problem is when the
    target variable is categorical. The goal of logistic regression is to map a function
    from the features of the dataset to the targets to predict the probability that
    a new example belongs to one of the target classes. Figure [20-1](#Fig1) is an
    example of a dataset with categorical targets.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归是一种用于学习分类问题的监督机器学习算法。当目标变量是分类变量时，就出现了分类学习问题。逻辑回归的目标是从数据集的特征映射到一个函数，以预测新示例属于目标类中的一个的概率。图
    [20-1](#Fig1) 是一个具有分类目标的数据集的示例。
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig1_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig1_HTML.jpg)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig1_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig1_HTML.jpg)'
- en: Figure 20-1
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图 20-1
- en: Dataset with qualitative variables as output
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 以定性变量作为输出的数据集
- en: Why Logistic Regression?
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择逻辑回归？
- en: To develop our understanding of classification with logistic regression and
    why linear regression is unsuitable for learning categorical outputs, let us consider
    a binary or two-class classification problem. The dataset illustrated in Figure
    [20-2](#Fig2) has the output *y* (i.e., eye disease) = {disease, no-disease} is
    an example of dataset with binary targets.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让我们更好地理解使用逻辑回归进行分类以及为什么线性回归不适合学习分类输出，让我们考虑一个二元或双类分类问题。图 [20-2](#Fig2) 中所示的数据集的输出
    *y*（即，眼部疾病）= {疾病，无疾病} 是具有二元目标的数据集的示例。
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig2_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig2_HTML.jpg)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig2_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig2_HTML.jpg)'
- en: Figure 20-2
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图 20-2
- en: Two-class classification problem
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 双类分类问题
- en: From the illustration in Figure [20-3](#Fig3), the linear regression algorithm
    is susceptible to plot inaccurate decision boundaries especially in the presence
    of outliers (as seen toward the far right of the graph in Figure [20-3](#Fig3)).
    Moreover, the linear regression model will be looking to learn a real-valued output,
    whereas a classification learning problem predicts the class membership of an
    observation using probability estimates.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 从图 [20-3](#Fig3) 的插图可以看出，线性回归算法容易受到不准确的决策边界的影响，尤其是在存在异常值的情况下（如图 [20-3](#Fig3)
    图的右侧所示）。此外，线性回归模型将试图学习一个实值输出，而分类学习问题则是使用概率估计来预测观察值的类别成员。
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig3_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig3_HTML.jpg)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig3_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig3_HTML.jpg)'
- en: Figure 20-3
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图 20-3
- en: Linear regression on a classification dataset
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类数据集上的线性回归
- en: Introducing the Logit or Sigmoid Model
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 介绍对数或S型模型
- en: The logistic function, also known as the logit or the sigmoid function, is responsible
    for constraining the output of the cost function so that it becomes a probability
    output between 0 and 1\. The sigmoid function is formally written as
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 对数逻辑函数，也称为逻辑函数或S型函数，负责约束损失函数的输出，使其成为介于0和1之间的概率输出。S型函数的正式表示为
- en: '![$$ h(t)=\frac{1}{1+{e}^{-t}} $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equa.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equa.png)'
- en: 'The logistic regression model is formally similar to the linear regression
    model except that it is acted upon by the sigmoid model. The following is the
    formal representation:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归模型在形式上与线性回归模型相似，不同之处在于它受到S型模型的作用。以下是其正式表示：
- en: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_2+\dots +{\theta}_n{x}_n
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equb.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equb.png)'
- en: '![$$ h\left(\hat{y}\right)=\frac{1}{1+{e}^{-\hat{y}}} $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equc.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equc.png)'
- en: where 0 ≤ *h*(*t*) ≤ 1\. The sigmoid function is graphically shown in Figure
    [20-4](#Fig4).
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 0 ≤ *h*(*t*) ≤ 1。S型函数在图[20-4](#Fig4)中进行了图形表示。
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig4_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig4_HTML.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig4_HTML.jpg)'
- en: Figure 20-4
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图20-4
- en: Logistic function
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑函数
- en: The sigmoid function, which looks like an *S* curve, rises from 0 and plateaus
    at 1\. From the sigmoid function shown in Figure [20-4](#Fig4), as ![$$ \hat{y}
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_IEq1.png) increases
    to positive infinity, the sigmoid output gets closer to 1, and as *t* decreases
    toward negative infinity, the sigmoid function outputs 0.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: S型函数，看起来像S曲线，从0开始上升并在1处平稳。从图[20-4](#Fig4)中显示的S型函数来看，当![公式](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_IEq1.png)增加到正无穷大时，S型输出接近1，而当*t*减小到负无穷大时，S型函数输出0。
- en: Training the Logistic Regression Model
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练逻辑回归模型
- en: The logistic regression cost function is formally written as
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归损失函数的正式表示为
- en: '![$$ Cost\left(h(t),y\right)=\Big\{-\mathit{\log}\left(h(t)\right)\  if\ y=1-\mathit{\log}\left(1-h(t)\right)\  if\
    y=0 $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equd.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equd.png)'
- en: The cost function also known as ***log-loss*** is set up in this form to output
    the penalty of the algorithm if the model predicts a wrong class. To give more
    intuition, take, for example, a plot of − *log* (*h*(*t*)) when *y* = 1 in Figure
    [20-5](#Fig5).
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 损失函数也称为***log-loss***，以这种形式设置，以输出模型预测错误类别时算法的惩罚。为了提供更多的直观理解，以图[20-5](#Fig5)中*y*
    = 1时- *log* (*h*(*t*))的图像为例。
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig5_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig5_HTML.jpg)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig5_HTML.jpg)'
- en: Figure 20-5
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图20-5
- en: Plot of *h*(*t*) when *y* = 1
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '*h*(*t*)当*y* = 1时的图像'
- en: In Figure [20-5](#Fig5), if the algorithm correctly predicts that the target
    is 1, then the cost tends toward 0\. However, if the algorithm *h*(*t*) predicts
    incorrectly the target as 0, then the cost on the model grows exponentially large.
    The converse is the case with the plot of − *log* (1 − *h*(*t*)) when y = 0.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[20-5](#Fig5)中，如果算法正确预测目标为1，则损失趋向于0。然而，如果算法*h*(*t*)错误地将目标预测为0，则模型上的损失呈指数级增长。相反，当y
    = 0时，- *log* (1 - *h*(*t*))的图像也是如此。
- en: The logistic model is optimized using gradient descent to find the optimal values
    of the parameter *θ* that minimizes the cost function to predict the class with
    the highest probability estimate.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑模型使用梯度下降法进行优化，以找到参数*θ*的最优值，从而最小化损失函数以预测具有最高概率估计的类别。
- en: Multi-class Classification/Multinomial Logistic Regression
  id: totrans-189
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多类分类/多项式逻辑回归
- en: In multi-class or multinomial logistic regression, the labels of the dataset
    contain more than 2 classes. The multinomial logistic regression setup (i.e.,
    the cost function and optimization procedure) is structurally similar to logistic
    regression; the only difference is that the output of logistic regression is 2
    classes, while multinomial has greater than 2 classes (see Figure [20-6](#Fig6)).
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 在多类别或多项式逻辑回归中，数据集的标签包含超过 2 个类别。多项式逻辑回归设置（即成本函数和优化过程）在结构上与逻辑回归相似；唯一的区别是逻辑回归的输出是
    2 个类别，而多项式有超过 2 个类别（见图 [20-6](#Fig6)）。
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig6_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig6_HTML.jpg)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig6_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig6_HTML.jpg)'
- en: Figure 20-6
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 图 20-6
- en: An illustration of multinomial regression
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 多项式回归的示意图
- en: In Figure [20-6](#Fig6), the multi-class logistic regression builds a one-vs.-rest
    classifier to construct decision boundaries for the different class memberships.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [20-6](#Fig6) 中，多类别逻辑回归构建一个一对一分类器来构建不同类别成员的决策边界。
- en: At this point, we introduce a critical function in machine learning called the
    softmax function. The softmax function is used to compute the probability that
    an instance belongs to one of the *K* classes when *K* > 2\. We will see the softmax
    function show up again when we discuss (artificial) neural networks.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们介绍机器学习中的一个关键函数，称为 softmax 函数。当 *K* > 2 时，softmax 函数用于计算一个实例属于 *K* 个类别之一的概率。当我们讨论
    (人工) 神经网络时，我们还将看到 softmax 函数再次出现。
- en: In order to build a classification model with *k* classes, the multinomial logistic
    model is formally defined as
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建一个具有 *k* 个类别的分类模型，多项式逻辑模型正式定义为
- en: '![$$ \hat{y}(k)={\theta}_0^k+{\theta}_1^k{x}_1+{\theta}_2^k{x}_2+\dots +{\theta}_n^k{x}_n
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Eque.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![ŷ(k)=θ_0^k+θ_1^k*x_1+θ_2^k*x_2+…+θ_n^k*x_n](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Eque.png)'
- en: The preceding model takes into consideration the parameters for the k different
    classes.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的模型考虑了 k 个不同类别的参数。
- en: The softmax function is formally written as
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 软最大化函数正式表示为
- en: '![$$ p(k)=\sigma {\left(\hat{y}(k)\right)}_i=\frac{e^{\hat{y}{(k)}_i}}{\sum_{j=1}^K{e}^{\hat{y}\hat{(k)_j}\Big({k}_j}}
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equf.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
  zh: '![p(k)=σ(ŷ(k))_i=e^(ŷ(k)_i)/(∑_{j=1}^K{e}^(ŷ^(k)_j*{k}_j)](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equf.png)'
- en: where
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '*i* = {1, …, *K*} classes.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*i* = {1, …, *K*} 类。'
- en: '![$$ \sigma {\left(\hat{y}(k)\right)}_i $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_IEq2.png)
    outputs the probability estimates that an example in the training dataset belongs
    to one of the *K* classes.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '![σ(ŷ(k))_i](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_IEq2.png)
    输出训练数据集中一个示例属于 *K* 个类别之一的概率估计。'
- en: The cost function for learning the class labels in a multinomial logistic regression
    model is called the ***cross-entropy*** cost function. Gradient descent is used
    to find the optimal values of the parameter *θ* that will minimize the cost function
    to ***predict the class with the highest probability estimate accurately***.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在多项式逻辑回归模型中学习类别标签的成本函数称为 ***交叉熵*** 成本函数。使用梯度下降法找到参数 *θ* 的最优值，以最小化成本函数并 ***准确预测具有最高概率估计的类别***。
- en: Logistic Regression with Scikit-learn
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Scikit-learn 的逻辑回归
- en: In this example, we will implement a multi-class logistic regression model with
    Scikit-learn. The model will predict the three species of flowers from the Iris
    dataset. The dataset contains 150 observations and 4 features. For this example,
    we use the accuracy metric and confusion matrix to access the model’s performance.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 在本例中，我们将使用 Scikit-learn 实现一个多类别逻辑回归模型。该模型将预测来自 Iris 数据集的三种花卉种类。该数据集包含 150 个观测值和
    4 个特征。对于此示例，我们使用准确率指标和混淆矩阵来评估模型性能。
- en: '[PRE13]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Take note of the following in the preceding code block:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 注意以下代码块中的以下内容：
- en: The logistic regression model is initialized by calling the method LogisticRegression(solver=‘lbfgs’,
    multi_class=‘ovr’). The attribute ‘multi_class’ is set to ‘ovr’ to create a one-vs.-rest
    classifier.
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过调用 LogisticRegression(solver=‘lbfgs’, multi_class=‘ovr’). 方法初始化逻辑回归模型。将属性
    ‘multi_class’ 设置为 ‘ovr’ 以创建一个一对一分类器。
- en: The confusion matrix for a multi-class learning problem uses the `multilabel_confusion_matrix’
    to calculate classwise confusion matrices where the labels are binned in a one-vs.-rest
    manner. As an example, the first matrix is interpreted as the difference between
    the actual and predicted targets for class 1 against other classes.
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多类学习问题的混淆矩阵使用`multilabel_confusion_matrix`来计算按类别划分的混淆矩阵，其中标签以一对一的方式分组。例如，第一个矩阵表示实际目标和预测目标之间对于类别1与其他类别的差异。
- en: Optimizing the Logistic Regression Model
  id: totrans-211
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化逻辑回归模型
- en: This section surveys a few techniques to consider in optimizing/improving the
    performance of logistic regression models.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 本节概述了一些优化/改进逻辑回归模型性能的技术。
- en: '**In the case of Bias (i.e., when the accuracy is poor with training data)**'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: '**在偏差的情况下（即，当训练数据的准确性较差时**）'
- en: Remove highly correlated features. Logistic regression is susceptible to degraded
    performance when highly correlated features are present in the dataset.
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移除高度相关的特征。当数据集中存在高度相关的特征时，逻辑回归容易降低性能。
- en: Logistic regression will benefit from standardizing the predictors by applying
    feature scaling.
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过应用特征缩放标准化预测变量，逻辑回归将受益。
- en: Good feature engineering to remove redundant features or recombine features
    based on intuition into the learning problem can improve the classification model.
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 良好的特征工程，如去除冗余特征或根据直觉将特征重组到学习问题中，可以提高分类模型。
- en: Applying log transforms to normalize the dataset can boost logistic regression
    classification accuracy.
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用对数变换以归一化数据集可以提高逻辑回归分类的准确性。
- en: '**In the case of variance (i.e., when the accuracy is good with training data,
    but poor on test data)**'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '**在方差的情况下（即，当训练数据的准确性较好，但测试数据较差时**）'
- en: Applying regularization (more on this in Chapter [21](463852_1_En_21_Chapter.xhtml))
    is a good technique to prevent overfitting.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 应用正则化（更多内容请见第[21](463852_1_En_21_Chapter.xhtml)章）是防止过拟合的好方法。
- en: This chapter provides a brief overview of logistic regression for building classification
    models. The chapter includes practical steps for implementing a logistic regression
    classifier with Scikit-learn. In the next chapter, we will examine the concept
    of applying regularization to linear models to mitigate the problem of overfitting.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 本章简要概述了逻辑回归，用于构建分类模型。本章包括使用Scikit-learn实现逻辑回归分类器的实际步骤。在下一章中，我们将探讨将正则化应用于线性模型以减轻过拟合问题的概念。
- en: 21. Regularization for Linear Models
  id: totrans-221
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 21. 线性模型的正则化
- en: Regularization is the technique of adding a parameter, *λ*, to the loss function
    of a learning algorithm to improve its ability to generalize to new examples by
    reducing overfitting. The role of the extra regularization parameter is to shrink
    or to minimize the measure of the weights (or parameters) of the other features
    in the model.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化是一种向学习算法的损失函数添加参数*λ*的技术，通过减少过拟合来提高其对新示例泛化的能力。额外正则化参数的作用是缩小或最小化模型中其他特征（或参数）的权重度量。
- en: Regularization is applied to linear models such as polynomial linear regression
    and logistic regression which are susceptible to overfitting when high-order polynomial
    features are added to the set of features.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 正则化应用于线性模型，如多项式线性回归和逻辑回归，当将高阶多项式特征添加到特征集时，这些模型容易过拟合。
- en: How Does Regularization Work
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正则化是如何工作的
- en: During model building, the regularization parameter *λ* is calibrated to determine
    how much the magnitude of other features in the model is adjusted when training
    the model. The higher the value of the regularization, the more the magnitude
    of the feature weights is reduced.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型构建过程中，正则化参数*λ*被校准以确定在训练模型时其他特征的幅度调整程度。正则化的值越高，特征权重的幅度减少就越多。
- en: If the regularization parameter is set too close to zero, it reduces the regularization
    effect on the feature weights of the model. At zero, the penalty the regularization
    term imposes is virtually non-existent, and the model is as if the regularization
    term was never present.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 如果正则化参数设置得太接近零，它会减少模型特征权重上的正则化效果。在零时，正则化项施加的惩罚几乎不存在，模型就像正则化项从未存在过一样。
- en: Effects of Regularization on Bias vs. Variance
  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正则化对偏差与方差的影响
- en: The higher the value of *λ* (i.e., the regularization parameter), the more restricted
    the coefficients (or weights) of the cost function. Hence, if the value of *λ*
    is high, the model can result in a learning bias (i.e., it underfits the dataset).
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '*λ*的值（即正则化参数）越高，成本函数的系数（或权重）受到的限制就越大。因此，如果*λ*的值很高，模型可能导致学习偏差（即它对数据集欠拟合）。'
- en: However, if the value of *λ* approaches zero, the regularization parameter has
    negligible effects on the model, hence resulting in overfitting the model. Regularization
    is an important technique and should be used when injecting polynomial features
    into linear or logistic regression classifiers to learn non-linear relationships.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果*λ*的值接近零，正则化参数对模型的影响可以忽略不计，从而导致模型过拟合。正则化是一项重要的技术，当将多项式特征注入线性或逻辑回归分类器以学习非线性关系时应该使用它。
- en: Applying Regularization to Models with Scikit-learn
  id: totrans-230
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Scikit-learn对模型应用正则化
- en: The technique of adding a penalty to restrain the values of the parameters of
    the model is also known as Ridge regression or Tikhonov regularization. In this
    section we will build a linear and logistic regression model with regularization.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 向模型参数值添加惩罚以限制其值的技术也称为岭回归或Tikhonov正则化。在本节中，我们将构建一个带有正则化的线性回归和逻辑回归模型。
- en: Linear Regression with Regularization
  id: totrans-232
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带正则化的线性回归
- en: This code block is similar to the polynomial linear regression example in Chapter
    [19](463852_1_En_19_Chapter.xhtml). The model will predict house prices from the
    Boston house-prices dataset. However, this model includes regularization.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码块与第[19](463852_1_En_19_Chapter.xhtml)章中的多项式线性回归示例类似。该模型将从波士顿房价数据集中预测房价。然而，此模型包括正则化。
- en: '[PRE14]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Take note of the following:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 注意以下内容：
- en: The method Ridge(alpha=1.0) initializes a linear regression model with regularization,
    where the attribute ‘alpha’ controls the magnitude of the regularization parameter.
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方法Ridge(alpha=1.0)初始化了一个带有正则化的线性回归模型，其中属性‘alpha’控制正则化参数的大小。
- en: Logistic Regression with Regularization
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带正则化的逻辑回归
- en: This code block here is also similar to the example in Chapter [20](463852_1_En_20_Chapter.xhtml)
    on logistic regression. The model will predict the three species of flowers from
    the Iris dataset. The addition to this code segment is the inclusion of a regularization
    term to the logistic model using the ‘RidgeClassifier’ package.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码块与第[20](463852_1_En_20_Chapter.xhtml)章中关于逻辑回归的示例类似。该模型将从Iris数据集中预测三种花卉。此代码段增加的部分是将正则化项包含到逻辑模型中，使用的是‘RidgeClassifier’包。
- en: '[PRE15]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: In the preceding code block, logistic regression with regularization is implemented
    by the method ‘RidgeClassifier()’. The reduced accuracy observed in this example
    when regularization is applied to logistic regression is because the algorithm
    is restricting the values of the model parameters to prevent high variance on
    a dataset that is fairly simplistic and already has high accuracy on test samples
    without regularization.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的代码块中，通过‘RidgeClassifier()’方法实现了带正则化的逻辑回归。当正则化应用于逻辑回归时，在此示例中观察到的精度降低是因为算法正在限制模型参数的值，以防止在数据集上产生高方差。该数据集相对简单，且在未进行正则化的测试样本上已经具有较高的精度。
- en: This chapter discusses the role of regularization in linear models like linear
    and logistic regression. Other forms of regularization exist for other model types
    such as early stopping for neural networks (to be discussed later in Chapter [34](463852_1_En_34_Chapter.xhtml)).
    Regularization is an important technique when designing machine learning models.
    The next chapter will discuss and implement another important machine learning
    algorithm known as support vector machines.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 本章讨论了正则化在线性模型（如线性回归和逻辑回归）中的作用。对于其他模型类型，如神经网络中的提前停止（将在第[34](463852_1_En_34_Chapter.xhtml)章中讨论），也存在其他形式的正则化。设计机器学习模型时，正则化是一项重要的技术。下一章将讨论并实现另一个重要的机器学习算法，即支持向量机。
- en: 22. Support Vector Machines
  id: totrans-242
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 22. 支持向量机
- en: Support vector machine (SVM) is a machine learning algorithm for learning classification
    and regression models. To build intuition, we will consider the case of learning
    a classification model with SVM. Given a dataset with two target classes that
    are linearly separable, it turns out that there exists an infinite number of lines
    that can discriminate between the two classes (see Figure [22-1](#Fig1)). The
    goal of the SVM is to find the best line that separates the two classes. In higher
    dimensions, this line is called a hyperplane.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 支持向量机（SVM）是一种用于学习分类和回归模型的机器学习算法。为了建立直观理解，我们将考虑使用 SVM 学习分类模型的情况。给定一个包含两个线性可分的目标类别的数据集，实际上存在无限多条线可以区分这两个类别（参见图
    [22-1](#Fig1)）。SVM 的目标是找到最佳的分隔线。在更高维度的空间中，这条线被称为超平面。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig1_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig1_HTML.jpg)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig1_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig1_HTML.jpg)'
- en: Figure 22-1
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 图 22-1
- en: Infinite set of discriminants
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 无穷多的判别线
- en: What Is a Hyperplane?
  id: totrans-247
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是超平面？
- en: A hyperplane is a line or more technically called a discriminant that separates
    two classes in n-dimensional space. When a hyperplane is drawn in 2-D space, it
    is called a line. In 3-D space, it is called a plane, and in dimensions greater
    than 3, the discriminant is called a hyperplane (see Figure [22-2](#Fig2)). For
    any n-dimensional world, we have n-1 hyperplanes.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 超平面是在 n 维空间中分隔两个类别的线或更技术性地称为判别线。当在二维空间中绘制超平面时，它被称为线。在三维空间中，它被称为平面，在维度大于 3 的情况下，判别线被称为超平面（参见图
    [22-2](#Fig2)）。对于任何 n 维世界，我们都有 n-1 个超平面。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig2_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig2_HTML.jpg)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig2_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig2_HTML.jpg)'
- en: Figure 22-2
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 图 22-2
- en: 'Left: A hyperplane in 2-D is a line. Right: A hyperplane in 3-D is a plane.
    For dimension greater than 3, visualization becomes difficult.'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 左：二维空间中的超平面是一条线。右：三维空间中的超平面是一个平面。对于维度大于 3 的情况，可视化变得困难。
- en: Finding the Optimal Hyperplane
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 寻找最优超平面
- en: The best hyperplane that linearly separates two classes is identified as the
    line lying at the largest margin from the nearest vectors at the boundary of the
    two classes.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 线性分隔两个类别的最佳超平面被识别为位于两个类别边界最近向量最大间隔处的线。
- en: In Figure [22-3](#Fig3), we observe that the best hyperplane is the line at
    the exact center of the two classes and constitutes the largest margin between
    both classes. Hence, this optimal hyperplane is also known as the largest margin
    classifier.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [22-3](#Fig3) 中，我们可以观察到最佳超平面是位于两个类别正中心的线，并构成了两个类别之间最大的间隔。因此，这个最优超平面也被称为最大间隔分类器。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig3_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig3_HTML.jpg)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig3_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig3_HTML.jpg)'
- en: Figure 22-3
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 图 22-3
- en: The largest margin classifier
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 最大间隔分类器
- en: The boundary points of the respective classes which are known as the support
    vectors are essential in finding the optimal hyperplane. The support vectors are
    illustrated in Figure [22-4](#Fig4). The boundary points are called support vectors
    because they are used to determine the maximum distance between the class they
    belong to and the discriminant function separating the classes.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 各个类别的边界点，也称为支持向量，对于找到最优超平面至关重要。支持向量在图 [22-4](#Fig4) 中展示。边界点被称为支持向量，因为它们被用来确定它们所属的类别与分离类别的判别函数之间的最大距离。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig4_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig4_HTML.jpg)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig4_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig4_HTML.jpg)'
- en: Figure 22-4
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图 22-4
- en: Support vectors
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 支持向量
- en: The mathematical formulation for finding the margin and consequently the hyperplane
    that maximizes the margin is beyond the scope of this book, but suffice to say
    this technique involves the Lagrange multiplier.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找间隔和随之而来的最大化间隔的超平面的数学公式超出了本书的范围，但可以简单地说，这种技术涉及拉格朗日乘数。
- en: The Support Vector Classifier
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持向量分类器
- en: In the real world, it is difficult to find data points that are precisely linearly
    separable and for which exists a large margin hyperplane. In Figure [22-5](#Fig5),
    the left image represents the data points for two classes in a dataset. Observe
    that there readily exists a linear separator between those two classes. Now, suppose
    we have an additional point from class 1 adjusted in such a way that it is much
    closer to class 2, we see that this point upsets the location of the hyperplane
    as seen in the right image of Figure [22-5](#Fig5). This reveals the sensitivity
    of the hyperplane to an additional data point that may result in a very narrow
    margin.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，很难找到精确线性可分的数据点，并且存在一个大的边界超平面。在图[22-5](#Fig5)的左侧图像中，表示了数据集中两个类别的数据点。观察可以发现，这两个类别之间已经存在一个明显的线性分离器。现在，假设我们有一个来自类别1的额外点，调整得使其与类别2非常接近，我们看到这个点扰乱了图[22-5](#Fig5)右侧图像中超平面的位置。这揭示了超平面对额外数据点的敏感性，可能导致非常狭窄的边界。
- en: This sensitivity to data samples has significant drawbacks, the first being
    that the distance between the support vectors and the hyperplane reflects the
    confidence in the classification accuracy. Also, the drastic change in the position
    of the hyperplane due to a single additional point shows that the classifier is
    susceptible to high variability and can overfit the training data.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对数据样本的敏感性有显著的缺点，首先是支持向量与超平面之间的距离反映了分类精度的置信度。此外，由于一个额外的点而导致超平面位置的剧烈变化表明，分类器容易受到高变异性影响，并且可能过度拟合训练数据。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig5_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig5_HTML.jpg)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig5_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig5_HTML.jpg)'
- en: Figure 22-5
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-5
- en: 'Left: A linearly separable data distribution with a large margin. Right: The
    data point distribution makes it more difficult to find a large margin classifier
    that linearly separates the two classes'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 左：具有大边界的线性可分数据分布。右：数据点分布使得找到线性分离两个类别的具有大边界的分类器更加困难
- en: The goal of the support vector classifier is to find a hyperplane that nearly
    discriminates between the two classes. This technique is also called a soft margin.
    A soft margin is tuned to ignore a degree of error when finding the separating
    hyperplane. This concept of a soft margin is how we generalize the support vector
    classifier to find a hyperplane in datasets that are not readily linearly separable.
    The margin is called soft because some examples are purposefully misclassified.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 支持向量机的目标是找到一个几乎可以区分两个类别的超平面。这种技术也被称为软边界。软边界在寻找分离超平面时会忽略一定程度的误差。软边界的这个概念是我们将支持向量机推广到寻找在数据集中不易线性分离的超平面的方法。边界被称为软边界，因为一些示例被故意错误分类。
- en: In such cases, as outlined in Figure [22-5](#Fig5), a soft margin classifier
    is preferred as it is more insensitive to individual data points and overall will
    have a better chance of generalizing to new examples. Howbeit, this might misclassify
    a couple of examples while training, but this is overall beneficial to the quality
    of the classifier as it generalizes to new samples.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，如图[22-5](#Fig5)所示，软边界分类器更受欢迎，因为它对单个数据点不太敏感，并且总体上更有可能推广到新的示例。尽管如此，在训练过程中可能会错误分类几个示例，但这总体上对分类器的质量是有益的，因为它可以推广到新的样本。
- en: Again, the margin is called soft because some examples are allowed to violate
    the margin or even be misclassified by the hyperplane to preserve overall generalizability.
    This is illustrated in Figure [22-6](#Fig6).
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，边界被称为软边界，因为允许一些示例违反边界，甚至被超平面错误分类，以保持整体的可推广性。这如图[22-6](#Fig6)所示。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig6_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig6_HTML.jpg)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig6_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig6_HTML.jpg)'
- en: Figure 22-6
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-6
- en: 'Left: An example of a soft margin with points allowed to violate the margin.
    Right: An example with some points intentionally misclassified.'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 左：允许点违反边界的软边界示例。右：一些点故意被错误分类的示例。
- en: The C Parameter
  id: totrans-275
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: C参数
- en: The C parameter is the hyper-parameter that is responsible for controlling the
    degree of violations to the margins or the number of intentionally misclassified
    points allowed by the support vector classifier. The C hyper-parameter is a non-negative
    real number. When this C parameter is set to 0, the classifier becomes the large
    margin classifier.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: C参数是负责控制对边界违规程度或支持向量分类器允许的故意误分类点数的超参数。C超参数是一个非负实数。当这个C参数设置为0时，分类器变为大边界分类器。
- en: In a soft margin classifier, the C parameter is tuned by adjusting its values
    to control the tolerance of the margin. With larger values of C, the classifier
    margins become wider and more tolerant to violations and misclassifications. However,
    with smaller values of C, the margins become narrower and are less tolerant of
    violations and misclassified points.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 在软边界分类器中，通过调整C参数的值来调整其容忍度。C值越大，分类器的边界越宽，对违规和误分类的容忍度越高。然而，C值越小，边界越窄，对违规和误分类点的容忍度越低。
- en: Observe that the C hyper-parameter is vital for regulating the bias/variance
    trade-off of the support vector classifier. The higher the value of C, our classifier
    is more prone to variability in the data points and can under-simplify the learning
    problem. Also, if C is set closer to zero, it results in a much narrower margin,
    and this can overfit the classifier, leading to high variance – and this will
    likely fail to generalize to new examples (see Figure [22-7](#Fig7)).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到C超参数对于调节支持向量分类器的偏差/方差权衡至关重要。C的值越高，我们的分类器对数据点的变化越敏感，可能导致学习问题过于简化。此外，如果C设置得更接近零，会导致边界非常窄，这可能导致分类器过拟合，导致高方差——这可能导致无法推广到新的示例（见图[22-7](#Fig7)）。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig7_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig7_HTML.jpg)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig7_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig7_HTML.jpg)'
- en: Figure 22-7
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-7
- en: 'Left: Higher values of C result in wider margins with more tolerance. Right:
    Lower values of C result in narrower margins with less tolerance'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 左：C值越高，边界越宽，容忍度越高。右：C值越低，边界越窄，容忍度越低
- en: Multi-class Classification
  id: totrans-282
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多类分类
- en: Previously, we have used the SVC to build a discriminant classifier for binary
    classes. What happens when we have more than two classes of outputs in the dataset,
    which is often the case in practice? The SVM can be extended for classifying k
    classes within a dataset, where k > 2\. This extension is, however, not trivial
    with the SVM. There exist two standard approaches for addressing this problem.
    The first is the one-vs.-one (OVO) multi-class classification, while the other
    is the one-vs.-all (OVA) or one-vs.rest (OVR) multi-class classification technique.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 之前，我们使用SVC为二进制类别构建了判别分类器。当数据集中有超过两个类别的输出时，这种情况在实践中很常见，会发生什么？SVM可以扩展到对数据集中的k个类别进行分类，其中k
    > 2。然而，这种扩展对于SVM来说并不简单。存在两种标准方法来解决这个问题。第一种是一对一（OVO）多类分类，而另一种是一对全（OVA）或一对剩余（OVR）多类分类技术。
- en: One-vs.-One (OVO)
  id: totrans-284
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一对一（OVO）
- en: In the one-vs.-one approach, when the number of classes, k, is greater than
    2, the algorithm constructs “k combination 2”, ![$$ \left(\frac{k}{2}\right) $$](../images/463852_1_En_22_Chapter/463852_1_En_22_Chapter_TeX_IEq1.png)
    classifiers, where each classifier is for a pair of classes. So if we have 10
    classes in our dataset, a total of 45 classifiers is constructed or trained for
    every pair of classes. This is illustrated with four classes in Figure [22-8](#Fig8).
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在一对一方法中，当类别数k大于2时，算法构建“k组合2”，即$$ \left(\frac{k}{2}\right) $$分类器，其中每个分类器对应一对类别。因此，如果我们数据集中有10个类别，总共将构建或训练45个分类器，用于每对类别的分类。这如图[22-8](#Fig8)所示。
- en: After training, the classifiers are evaluated by comparing examples from the
    test set against each of the ![$$ \left(\frac{k}{2}\right) $$](../images/463852_1_En_22_Chapter/463852_1_En_22_Chapter_TeX_IEq2.png)classifiers.
    The predicted class is then determined by choosing the highest number of times
    an example is assigned to a particular class.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 训练后，通过将测试集中的示例与每个$$ \left(\frac{k}{2}\right) $$分类器进行比较来评估分类器。然后通过选择示例被分配到特定类别的最高次数来确定预测类别。
- en: The one-vs.-one multi-class technique can potentially lead to a large number
    of constructed classifiers and hence can result in slower processing time. Conversely,
    the classifiers are more robust to class imbalances when training each classifier.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 一对多（One-vs.-one）多类技术可能会导致大量构建的分类器，从而可能导致处理时间变慢。相反，当训练每个分类器时，分类器对类别不平衡更加鲁棒。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig8_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig8_HTML.jpg)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig8_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig8_HTML.jpg)'
- en: Figure 22-8
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-8
- en: Suppose we have four classes in the dataset labeled A to D, this will result
    in six different classifiers
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们在数据集中有四个类别，标记为A到D，这将导致六个不同的分类器
- en: One-vs.-All (OVA)
  id: totrans-291
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一对全（One-vs.-All，OVA）
- en: The one-vs.-all method for fitting an SVM to a multi-classification problem
    where the number of classes k is greater than 2 consists of fitting each k class
    against the remaining k – 1 classes. Suppose we have ten classes, each of the
    classes will be classified against the remaining nine classes. This example is
    illustrated with four classes in Figure [22-9](#Fig9).
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 将SVM拟合到多分类问题（其中类别数k大于2）的一对全方法包括将每个k类与剩余的k-1类进行拟合。假设我们有十个类别，每个类别都将与剩余的九个类别进行分类。这个例子在图[22-9](#Fig9)中用四个类别进行了说明。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig9_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig9_HTML.jpg)'
  id: totrans-293
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig9_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig9_HTML.jpg)'
- en: Figure 22-9
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-9
- en: Given four classes in a dataset, we construct four classifiers, with each class
    fitted against the rest
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个数据集中的四个类别，我们构建四个分类器，每个类别都与剩余的类别进行拟合
- en: The classifiers are evaluated by comparing a test example to each fitted classifier.
    The classifier for which the margin of the hyperplane is the largest is chosen
    as the predicted classification target because the classifier margin size is indicative
    of high confidence of class membership.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将测试示例与每个拟合的分类器进行比较来评估分类器。选择具有最大超平面边缘的分类器作为预测分类目标，因为分类器边缘的大小可以指示类别成员的高置信度。
- en: 'The Kernel Trick: Fitting Non-linear Decision Boundaries'
  id: totrans-297
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 核技巧：拟合非线性决策边界
- en: Non-linear datasets occur more often than not in real world scenarios.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界场景中，非线性数据集比比皆是。
- en: Technically speaking, the name support vector machine is when a support vector
    classifier is used with a non-linear kernel to learn non-linear decision boundaries.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术上讲，支持向量机这个名字是在使用支持向量分类器并带有非线性核来学习非线性决策边界时使用的。
- en: SVM uses an essential technique for extending the feature space of a dataset
    to construct a non-linear classifier. This technique is called kernel and is popularly
    known as the kernel trick. Figure [22-10](#Fig10) illustrates the kernel trick
    as an extra dimension is added to the feature space.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: SVM使用一种扩展数据集特征空间以构建非线性分类器的关键技术。这种技术被称为核，通常被称为核技巧。图[22-10](#Fig10)展示了在特征空间中添加一个额外维度时核技巧的示例。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig10_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig10_HTML.jpg)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig10_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig10_HTML.jpg)'
- en: Figure 22-10
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-10
- en: 'Left: Linear discriminant to non-linear data. Right: By using the kernel trick,
    we can linearly separate a non-linear dataset by adding an extra dimension to
    the feature space.'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 左：线性判别到非线性数据。右：通过使用核技巧，我们可以通过向特征空间添加一个额外维度来线性地分离非线性数据集。
- en: Adding Polynomial Features
  id: totrans-304
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加多项式特征
- en: The feature space of the dataset can be extended by adding higher-order polynomial
    terms or interaction terms. For example, instead of training the classifier with
    linear features, we can add polynomial features or add interaction terms to our
    model.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集的特征空间可以通过添加高阶多项式项或交互项来扩展。例如，我们不是用线性特征来训练分类器，而是可以添加多项式特征或向我们的模型中添加交互项。
- en: Depending on the dimensions of the dataset, the combinations for extending the
    feature space can quickly become unmanageable, and this can easily lead to a model
    that overfits the test set and also become expensive to compute with a larger
    feature space.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 根据数据集的维度，扩展特征空间的组合可能会迅速变得难以管理，这可能导致模型过度拟合测试集，并且使用更大的特征空间进行计算也会变得昂贵。
- en: Kernels
  id: totrans-307
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 核
- en: Kernel is a mathematical procedure for extending the feature space of a dataset
    to learn non-linear decision boundaries between different classes. The mathematical
    details of kernels are beyond the scope of this text. Suffice to say that a kernel
    can be seen as a mathematical function that captures similarity between data samples.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 核是扩展数据集特征空间的一种数学过程，用于学习不同类别之间的非线性决策边界。核的数学细节超出了本文的范围。简单来说，核可以被视为一个数学函数，它捕捉数据样本之间的相似性。
- en: Linear Kernel
  id: totrans-309
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性核
- en: The support vector classifier is the same as a linear kernel. It is also known
    as a linear kernel because the feature space of the support vector classifier
    is linear.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 支持向量分类器与线性核相同。它也被称为线性核，因为支持向量分类器的特征空间是线性的。
- en: Polynomial Kernel
  id: totrans-311
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 多项式核
- en: The kernel can also be expressed as a polynomial. With this, a support vector
    classifier is trained on higher-dimensional polynomial features without manually
    adding an exponential number of polynomial features to the dataset. Adding a polynomial
    kernel to the support vector classifier enables the classifier to learn a non-linear
    decision boundary.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 核也可以表示为多项式。通过这种方式，支持向量分类器在更高维度的多项式特征上训练，而无需手动向数据集添加指数级数量的多项式特征。将多项式核添加到支持向量分类器中，使分类器能够学习非线性决策边界。
- en: Radial Basis Function or the Radial Kernel
  id: totrans-313
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 径向基函数或径向核
- en: The radial basis function or radial kernel is another non-linear kernel that
    enables the support vector classifier to learn a non-linear decision boundary.
    The radial kernel is similar to adding multiple similarity features to the space.
    For the radial basis function, a hyper-parameter called gamma, *γ*, is used to
    control the flexibility of the non-linear decision boundary. The smaller the gamma
    value, the less complex (or flexible) the non-linear discriminant becomes, but
    a larger value for gamma leads to a more flexible and sophisticated decision boundary
    that tightly fits the non-linearity in the data, which can inadvertently lead
    to overfitting. This is illustrated in Figure [22-11](#Fig11). RBF is a popular
    kernel option used in practice.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 径向基函数或径向核是另一种非线性核，它使支持向量分类器能够学习非线性决策边界。径向核类似于向空间添加多个相似性特征。对于径向基函数，一个称为gamma的超参数，*γ*，用于控制非线性决策边界的灵活性。gamma值越小，非线性判别函数越简单（或灵活），但gamma值较大则导致更灵活和复杂的决策边界，这可以紧密地拟合数据中的非线性，但可能导致过度拟合。这如图[22-11](#Fig11)所示。RBF是实践中常用的核选项。
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig11_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig11_HTML.jpg)'
  id: totrans-315
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig11_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig11_HTML.jpg)'
- en: Figure 22-11
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 图22-11
- en: 'An illustration of adjusting the radial basis function *γ* parameter, together
    with the C parameter of the support vector classifier to fit a non-linear decision
    boundary. Left: RBF kernel with C = 1 and *γ* = 10^(−3). Right: RBF kernel with
    C = 1 and *γ* = 10^(−5).'
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 调整径向基函数*γ*参数以及支持向量分类器的C参数以拟合非线性决策边界的示意图。左：C = 1和*γ* = 10^(-3)的RBF核。右：C = 1和*γ*
    = 10^(-5)的RBF核。
- en: When using the radial kernel with the support vector classifier, the values
    of C and gamma are hyper-parameters that are tuned to find an appropriate level
    of model flexibility that generalizes to new examples when deployed.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用支持向量分类器的径向核时，C和gamma的值是超参数，这些参数被调整以找到适当的模型灵活性水平，以便在部署时推广到新的示例。
- en: In practice, a linear kernel or support vector classifier sometimes surprisingly
    performs well when used to map a function to non-linear data. This observation
    follows Occam’s razor which suggests that it is advantageous to select the simplest
    hypothesis to solve a problem in the presence of more complex options.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，线性核或支持向量分类器有时出人意料地表现良好，当用于将函数映射到非线性数据时。这一观察遵循奥卡姆剃刀原则，该原则建议在存在更复杂选项的情况下，选择最简单的假设来解决问题是具有优势的。
- en: Also, with regard to choosing the best set of C and gamma, *γ*, to avoid overfitting,
    a grid search is used to explore a range of values for the hyper-parameters and
    come up with the combination that performs best on test data. The grid search
    is used in conjunction with cross-validation approaches. However, the grid search
    procedure can be potentially computationally expensive.
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，关于选择最佳C和γ（*γ*）的集合以避免过拟合，使用网格搜索来探索超参数的值范围，并找出在测试数据上表现最佳的组合。网格搜索与交叉验证方法结合使用。然而，网格搜索过程可能具有潜在的计算成本。
- en: Support vector machines perform well with high-dimensional data. However, they
    are preferred for small or medium-sized datasets. For humongous datasets, SVMs
    become computationally infeasible. Another limitation is that the performance
    of SVMs is known to plateau at some point, even when there exist large training
    samples. This is one of the motivations and advantages of deep neural networks.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 支持向量机在高维数据上表现良好。然而，它们更适合小型或中型数据集。对于庞大的数据集，SVM在计算上变得不可行。另一个限制是，SVM的性能已知在某个点上趋于平稳，即使存在大量的训练样本。这是深度神经网络的一个动机和优势。
- en: Support Vector Machines with Scikit-learn
  id: totrans-322
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Scikit-learn的支持向量机
- en: In Scikit-learn, **SVC** is the SVM package for classification, while **SVR**
    is the SVM package for regression. The attribute ‘gamma’ in both the SVC and SVR
    methods controls the flexibility of the decision boundary, and the default kernel
    is the radial basis function (rbf).
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 在Scikit-learn中，**SVC**是用于分类的支持向量机包，而**SVR**是用于回归的支持向量机包。SVC和SVR方法中的‘gamma’属性控制决策边界的灵活性，默认核是径向基函数（rbf）。
- en: SVM for Classification
  id: totrans-324
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 支持向量机分类
- en: In this code example, we will build an SVM classification model to predict the
    three species of flowers from the Iris dataset.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个SVM分类模型，用于从Iris数据集预测三种花卉物种。
- en: '[PRE16]'
  id: totrans-326
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: SVM for Regression
  id: totrans-327
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 支持向量机回归
- en: In this code example, we will build an SVM regression model to predict house
    prices from the Boston house-prices dataset.
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个SVM回归模型，用于从波士顿房价数据集预测房价。
- en: '[PRE17]'
  id: totrans-329
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: In this chapter, we surveyed the support vector machine algorithm and its implementation
    with Scikit-learn. In the next chapter, we will discuss on ensemble methods that
    combine outputs of multiple classifiers or weak learners to build better prediction
    models.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们概述了支持向量机算法及其使用Scikit-learn的实现。在下一章中，我们将讨论集成方法，这些方法结合了多个分类器或弱学习器的输出，以构建更好的预测模型。
- en: 23. Ensemble Methods
  id: totrans-331
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 23. 集成方法
- en: Ensemble learning is a technique that combines the output of multiple classifiers
    also called weak learners to build a more robust prediction model. Ensemble methods
    work by combining a group of classifiers (or models) to get an enhanced prediction
    accuracy. The idea behind an “ensemble” is that the performance from the average
    of a group of classifiers will be better than each classifier on its own. So each
    classifier is called a “weak” learner.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 集成学习是一种技术，它结合了多个分类器（也称为弱学习器）的输出，以构建一个更鲁棒的预测模型。集成方法通过结合一组分类器（或模型）来提高预测准确度。集成背后的想法是，一组分类器的平均性能将优于每个分类器单独的性能。因此，每个分类器被称为“弱”学习器。
- en: Ensemble learners are usually high-performing algorithms for both classification
    and regression tasks and are mostly competition-winning algorithms. Examples of
    ensemble learning algorithms are Random Forest (RF) and Stochastic Gradient Boosting
    (SGB). We will motivate our discussion of ensemble methods by first discussing
    decision trees because ensemble classifiers such as RF and SGB are built by combining
    several decision tree classifiers.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 集成学习器通常是用于分类和回归任务的高性能算法，并且大多是竞赛获胜的算法。集成学习算法的例子包括随机森林（RF）和随机梯度提升（SGB）。我们将通过首先讨论决策树来激发我们对集成方法的讨论，因为RF和SGB等集成分类器是通过结合多个决策树分类器构建的。
- en: Decision Trees
  id: totrans-334
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 决策树
- en: Decision trees, more popularly known as classification and regression trees
    (CART), can be visualized as a graph or flowchart of decisions. A branch connects
    the nodes in the graph, the last node of the graph is called a terminal node,
    and the topmost node is called the root. As seen in Figure [23-1](#Fig1), when
    constructing a decision tree, the root is at the top, while the branches connect
    nodes at lower layers until the terminal node.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树，更通俗地称为分类和回归树（CART），可以可视化为决策的图形或流程图。图中的分支连接节点，图中的最后一个节点称为终端节点，最顶部的节点称为根节点。如图[23-1](#Fig1)所示，在构建决策树时，根节点位于顶部，而分支连接较低层的节点，直到终端节点。
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig1_HTML.jpg](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig1_HTML.jpg)'
  id: totrans-336
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig1_HTML.jpg](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig1_HTML.jpg)'
- en: Figure 23-1
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 图23-1
- en: Illustration of a decision tree
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 决策树的示意图
- en: On Regression and Classification with CART
  id: totrans-339
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关于使用CART进行回归和分类
- en: A classification or regression tree is built by randomly splitting the set of
    attributes of the given dataset into distinct regions. The data points that fall
    within a particular region are used to form the predictor from the means of the
    targets in the regression case and the highest occurring class in the classification
    setting.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 分类或回归树是通过将给定数据集的属性集随机分割成不同的区域来构建的。落在特定区域内的数据点用于形成预测器，在回归情况下使用目标值的平均值，在分类设置中使用最常出现的类别。
- en: Thus, if an unseen observation or test data falls within a region, the mean
    or modal class is used to predict the output for regression and classification
    problems, respectively. In regression trees, the output variable is continuous,
    whereas in classification trees, the output variable is categorical. The terminal
    node of a regression tree takes the average of the samples in that region, while
    the terminal node of a classification tree is the highest occurring class in that
    area.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果一个未见过的观测值或测试数据落在某个区域，则使用均值或模态类别来预测回归和分类问题的输出。在回归树中，输出变量是连续的，而在分类树中，输出变量是分类的。回归树的终端节点取该区域样本的平均值，而分类树的终端节点是该区域最常出现的类别。
- en: The process of splitting the features of the dataset into regions is by a greedy
    algorithm called recursive binary splitting. This strategy works by continuously
    dividing the feature space into two new branches or regions until a stopping criterion
    is reached.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集的特征分割成区域的过程是通过一种称为递归二分分割的贪婪算法来实现的。这种策略通过不断地将特征空间分割成两个新的分支或区域，直到达到停止标准。
- en: Growing a Regression Tree
  id: totrans-343
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回归树的生成
- en: In regression trees, the recursive binary splitting technique is used to divide
    a particular feature in the dataset into two regions. The splitting is carried
    out by choosing a value of the feature that minimizes the regression error measure.
    This step is done for all the predictors in the dataset by finding a value that
    reduces the squared error of the final tree. This process is repeated continuously
    for every sub-tree or sub-region until a stopping criterion is reached. For example,
    we can stop the algorithm when no region contains less than ten observations.
    An example of a tree resulting from the splitting of a feature space into six
    regions is shown in Figure [23-2](#Fig2).
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 在回归树中，使用递归二分分割技术将数据集中的特定特征分割成两个区域。分割是通过选择一个使回归误差度量最小的特征值来进行的。这一步骤通过对所有预测器找到减少最终树平方误差的值来完成。这个过程会持续对每个子树或子区域重复进行，直到达到停止标准。例如，我们可以当没有区域包含少于十个观测值时停止算法。一个将特征空间分割成六个区域的树的例子如图[23-2](#Fig2)所示。
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig2_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig2_HTML.png)'
  id: totrans-345
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig2_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig2_HTML.png)'
- en: Figure 23-2
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 图23-2
- en: 'Left: An example of splitting a 2-D dataset into sub-trees/regions using the
    recursive binary splitting technique. Right: The resulting tree from the partitioning
    on the left.'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 左：使用递归二分分割技术将二维数据集分割成子树/区域的示例。右：左侧分区后的结果树。
- en: Growing a Classification Tree
  id: totrans-348
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类树的生成
- en: Growing a classification tree is very similar to the regression tree setting
    described in Figure [23-2](#Fig2). The difference here is that the error measure
    to minimize is no longer the squared error, but the misclassification error. This
    is because a classification tree is for predicting a qualitative response, where
    a data point is assigned to a particular region based on the modal value or the
    highest occurring class in that region.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 构建分类树与图[23-2](#Fig2)中描述的回归树设置非常相似。这里的区别在于要最小化的误差度量不再是平方误差，而是误分类误差。这是因为分类树是用来预测定性响应的，其中数据点根据该区域的众数值或该区域中最常出现的类别被分配到特定区域。
- en: Two algorithms for selecting which value to use for splitting the feature space
    in a classification setting are the Gini index and entropy; further discussions
    on these are beyond the scope of this chapter.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类设置中，用于选择用于分割特征空间的值的两种算法是基尼指数和熵；对这些内容的进一步讨论超出了本章的范围。
- en: Tree Pruning
  id: totrans-351
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 树剪枝
- en: Tree pruning is a technique for dealing with model overfitting when growing
    trees. Fully grown trees have a high tendency to overfit with high variances when
    applied to unseen samples.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 树剪枝是一种处理在生长树时模型过拟合的技术。完全成型的树在应用于未见过的样本时，往往具有高方差和过拟合的高倾向。
- en: Pruning involves growing a large tree and then pruning or clipping it to create
    a sub-tree. By doing so, we can have a full picture of the tree performance and
    then select a sub-tree that results in a minimized error measure on the test dataset.
    The technique for selecting the best sub-tree is called the cost complexity pruning
    or the weakest link pruning.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 剪枝涉及先生长一棵大树，然后对其进行修剪或剪裁以创建子树。通过这样做，我们可以全面了解树的表现，然后选择一个在测试数据集上导致最小化误差测量的子树。选择最佳子树的技术称为成本复杂度剪枝或最弱连接剪枝。
- en: Strengths and Weaknesses of CART
  id: totrans-354
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CART的优缺点
- en: One of the significant advantages of CART models is that they perform well on
    linear and non-linear datasets. Moreover, CART models implicitly take care of
    feature selection and work well with high-dimensional datasets.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: CART模型的一个显著优点是它们在线性和非线性数据集上表现良好。此外，CART模型隐式地处理特征选择，并且与高维数据集配合良好。
- en: On the flip side, CART models can very easily overfit the dataset and fail to
    generalize to new examples. This downside is mitigated by aggregating a large
    number of decision trees in techniques like Random forests and boosting ensemble
    algorithms.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，CART模型很容易过拟合数据集，并且无法推广到新的例子。这种缺点通过在随机森林和提升集成算法等技术中聚合大量决策树来减轻。
- en: CART with Scikit-learn
  id: totrans-357
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用Scikit-learn的CART
- en: In this section, we will implement a classification and regression decision
    tree classifier with Scikit-learn.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用Scikit-learn实现一个分类和回归决策树分类器。
- en: Classification Tree with Scikit-learn
  id: totrans-359
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Scikit-learn的分类树
- en: In this code example, we will build a classification decision tree classifier
    to predict the species of flowers from the Iris dataset.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个分类决策树分类器，用于从Iris数据集预测花的种类。
- en: '[PRE18]'
  id: totrans-361
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Regression Tree with Scikit-learn
  id: totrans-362
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 使用Scikit-learn的回归树
- en: In this code example, we will build a regression decision tree classifier to
    predict house prices from the Boston house-prices dataset.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个回归决策树分类器，用于从波士顿房价数据集预测房价。
- en: '[PRE19]'
  id: totrans-364
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Random Forests
  id: totrans-365
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随机森林
- en: Random forest is a robust machine learning algorithm and is often the algorithm
    of choice for many classification and regression problems. It is a popular algorithm
    in machine learning competitions.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林是一种稳健的机器学习算法，并且通常是许多分类和回归问题的首选算法。它是机器学习竞赛中的一种流行算法。
- en: Random forest builds an ensemble classifier from a combination of several decision
    tree classifiers. This does an excellent job of reducing the variance that may
    be found in a single decision tree classifier.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林通过组合多个决策树分类器构建一个集成分类器。这出色地减少了单个决策树分类器中可能存在的方差。
- en: Random forest is an improvement on the bagging ensemble algorithm (also known
    as bootstrap aggregation) which involves creating a large number of fully grown
    decision trees by repeatedly selecting random samples from the training dataset
    (also called bootstrapping). The result of these trees is then averaged to smoothen
    out the variance.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林是对袋装集成算法（也称为自助聚集）的改进，该算法通过反复从训练数据集（也称为自助聚集）中选择随机样本来创建大量完全成型的决策树。然后对这些树的结果进行平均以平滑方差。
- en: Random forest improves this bagging procedure by using only a subset of the
    features or attributes in the training dataset on each tree split. In doing this,
    Random forest creates trees whose average is more robust and less prone to high
    variances.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 随机森林通过在每个树分裂时仅使用训练数据集的特征或属性的一个子集来改进这种袋装过程。通过这样做，随机森林创建了平均更稳健且方差较低的树。
- en: Observe that the principal distinction between bagging and Random forests is
    the choice of features when splitting the feature space or when building the tree.
    Bagging makes use of the entire features in the dataset, whereas Random forest
    imposes a constraint on the number of features and uses only a subset of features
    on each tree split to reduce the correlation of each sub-tree. Empirically, the
    size of features for each tree split using Random forests is the square root of
    the original number of predictors.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到袋装和随机森林之间的主要区别在于分割特征空间或构建树时选择特征的选择。袋装使用数据集中的所有特征，而随机森林对特征数量施加约束，并在每个树分裂时仅使用特征的一个子集来减少每个子树的关联性。经验上，使用随机森林进行每个树分裂的特征大小是原始预测因子数量的平方根。
- en: Making Predictions with Random Forests
  id: totrans-371
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用随机森林进行预测
- en: In order to make a prediction using Random forest, the test example is passed
    through each trained decision tree. For the regression case, a prediction is made
    for a new example by taking the average of the outputs of the different trees.
    In the case of classification problems, the prediction is the class with the most
    votes from all other trees in the forest. This is best illustrated in Figure [23-3](#Fig3).
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用随机森林进行预测，测试示例将通过每个训练好的决策树。对于回归情况，通过取不同树的输出的平均值来对新示例进行预测。在分类问题的情况下，预测是森林中所有其他树投票最多的类别。这最好在图[23-3](#Fig3)中说明。
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig3_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig3_HTML.png)'
  id: totrans-373
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig3_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig3_HTML.png)'
- en: Figure 23-3
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 图23-3
- en: Take a majority vote to determine the final class in the classification case
    and the average of the values in each tree to determine the predicted value in
    the regression case
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 在分类情况下，通过多数投票来确定最终类别，在回归情况下，通过确定每个树中的值的平均值来确定预测值。
- en: Random Forests with Scikit-learn
  id: totrans-376
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用Scikit-learn的随机森林
- en: This section will implement Random forests with Scikit-learn for both regression
    and classification use cases.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将使用Scikit-learn实现随机森林，用于回归和分类用例。
- en: Random Forests for Classification
  id: totrans-378
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 用于分类的随机森林
- en: In this code example, we will build a Random forest classification model to
    predict the species of flowers from the Iris dataset.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个随机森林分类模型，用于从Iris数据集中预测花的种类。
- en: '[PRE20]'
  id: totrans-380
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Random Forests for Regression
  id: totrans-381
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 用于回归的随机森林
- en: In this code example, we will build a Random forest regression model to predict
    house prices from the Boston house-prices dataset.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个随机森林回归模型，用于从波士顿房价数据集中预测房价。
- en: '[PRE21]'
  id: totrans-383
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Stochastic Gradient Boosting (SGB)
  id: totrans-384
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 随机梯度提升（SGB）
- en: Boosting involves growing trees in succession using knowledge from the residuals
    of the previously grown tree. In this case, each successive tree works to improve
    the model of the previous tree by boosting the areas in which the previous tree
    did not perform so well without affecting the areas of high performance. By doing
    this, we iteratively create a model that reduces the residual variance when generalizing
    to test examples. Boosting is illustrated in Figure [23-4](#Fig4).
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 提升涉及使用先前生长的树的残差知识连续生长树。在这种情况下，每个后续树都致力于通过提升先前树未表现良好的区域来改进先前树的模型，而不影响表现良好的区域。通过这样做，我们迭代创建一个模型，该模型在推广到测试示例时减少了残差方差。提升在图[23-4](#Fig4)中说明。
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig4_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig4_HTML.png)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig4_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig4_HTML.png)'
- en: Figure 23-4
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 图23-4
- en: An illustration of boosting
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 提升的示意图
- en: Gradient boosting evaluates the difference of the residuals for each tree and
    then uses that information to determine how to split the feature space in the
    successive tree.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度提升评估每个树的残差差异，然后使用该信息来确定如何在前一个树中分割特征空间。
- en: Gradient boosting employs a pseudo-gradient in computing the residuals. This
    gradient is the direction of quickest improvement to the loss function. The residual
    variance is minimized as the gradient moves in the direction of steepest descent.
    This movement is the same as the stochastic gradient descent algorithm discussed
    in Chapter [16](463852_1_En_16_Chapter.xhtml).
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度提升在计算残差时使用伪梯度。这个梯度是损失函数最快改进的方向。随着梯度向最陡下降方向移动，残差方差最小化。这种移动与第[16](463852_1_En_16_Chapter.xhtml)章中讨论的随机梯度下降算法相同。
- en: Tree Depth/Number of Trees
  id: totrans-391
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 树深度/树的数量
- en: Gradient boosting can be controlled by choosing the tree depth as a hyper-parameter
    to the model. In practice, a tree depth of 1 performs well, as each tree consists
    of just a single split. Also, the number of trees can affect the model accuracy,
    because gradient boosting can overfit if the number of successive trees is vast.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 通过选择树深度作为模型的超参数来控制梯度提升。在实践中，树深度为1表现良好，因为每棵树只包含一个分割。此外，树的数量也会影响模型精度，因为梯度提升如果连续树的数量很大，可能会导致过拟合。
- en: Shrinkage
  id: totrans-393
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 收敛
- en: 'The shrinkage hyper-parameter *λ* controls the learning rate of the gradient
    boosting model. An arbitrarily small value of *λ* may necessitate a larger number
    of trees to obtain a good model performance. However, with a small shrinkage size
    and tree depth *d* = 1, the residuals slowly improve by creating more varied trees
    to improve the worst performing areas of the model. Rule of thumb: shrinkage size
    is 0.01 or 0.001.'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 收敛超参数*λ*控制梯度提升模型的 学习率。任意小的*λ*值可能需要更多的树来获得良好的模型性能。然而，在小的收敛大小和树深度*d* = 1的情况下，通过创建更多样化的树来改善模型表现最差的区域，残差会逐渐改善。经验法则：收敛大小为0.01或0.001。
- en: Stochastic Gradient Boosting with Scikit-learn
  id: totrans-395
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Scikit-learn中的随机梯度提升
- en: This section will implement SGB with Scikit-learn for both regression and classification
    use cases.
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将使用Scikit-learn实现SGB，用于回归和分类用例。
- en: SGB for Classification
  id: totrans-397
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: SGB分类
- en: In this code example , we will build a SGB classification model to predict the
    species of flowers from the Iris dataset.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个SGB分类模型，用于从鸢尾花数据集中预测花的种类。
- en: '[PRE22]'
  id: totrans-399
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: SGB for Regression
  id: totrans-400
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: SGB回归
- en: In this code example , we will build a SGB regression model to predict house
    prices from the Boston house-prices dataset.
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个SGB回归模型，用于从波士顿房价数据集中预测房价。
- en: '[PRE23]'
  id: totrans-402
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: XGBoost (Extreme Gradient Boosting)
  id: totrans-403
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: XGBoost（极端梯度提升）
- en: XGBoost which is short for Extreme Gradient Boosting makes a couple of computational
    and algorithmic modifications to the stochastic gradient boosting algorithm. This
    enhanced algorithm is a favorite in machine learning practice due to its speed
    and has been the winning algorithm in many machine learning competitions. Let’s
    go through some of the modifications made by the XGBoost algorithm.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: XGBoost，即极端梯度提升，对随机梯度提升算法进行了一些计算和算法上的修改。这种增强算法在机器学习实践中非常受欢迎，因其速度而著称，并且在许多机器学习竞赛中都是获胜算法。让我们来看看XGBoost算法所做的修改。
- en: 'Parallel training: XGBoost supports parallel training over multiple cores.
    This has made XGBoost extremely fast compared to other machine learning algorithms.'
  id: totrans-405
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 并行训练：XGBoost支持在多个核心上并行训练。这使得XGBoost与其他机器学习算法相比速度极快。
- en: 'Out of core computation: XGBoost facilitates training from data not loaded
    into memory. This feature is a huge advantage when you’re dealing with large datasets
    that may not necessarily fit into the RAM of the computer.'
  id: totrans-406
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 核外计算：XGBoost便于从未加载到内存中的数据训练。当你处理可能无法适应计算机RAM的大型数据集时，这个特性是一个巨大的优势。
- en: 'Sparse data optimization: XGBoost is optimized to handle and speed up computation
    with sparse matrices. Sparse matrices contain lots of zeros in its cells.'
  id: totrans-407
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 稀疏数据优化：XGBoost经过优化，可以处理和加速稀疏矩阵的计算。稀疏矩阵在其单元格中包含大量零。
- en: XGBoost with Scikit-learn
  id: totrans-408
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: XGBoost与Scikit-learn
- en: This section will implement XGBoost with Scikit-learn for both regression and
    classification use cases.
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将使用Scikit-learn实现XGBoost，用于回归和分类用例。
- en: XGBoost for Classification
  id: totrans-410
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: XGBoost分类
- en: In this code example, we will build a XGBoost classification model to predict
    the species of flowers from the Iris dataset.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个XGBoost分类模型，用于从鸢尾花数据集中预测花的种类。
- en: '[PRE24]'
  id: totrans-412
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: XGBoost for Regression
  id: totrans-413
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: XGBoost回归
- en: In this code example, we will build a XGBoost regression model to predict house
    prices from the Boston house-prices dataset.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 在本代码示例中，我们将构建一个XGBoost回归模型，用于从波士顿房价数据集中预测房价。
- en: '[PRE25]'
  id: totrans-415
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: In this chapter, we surveyed and implemented ensemble machine learning algorithms
    that combine weak decision tree learners to create a strong classifier for learning
    regression and classification problems. In the next chapter, we will discuss more
    techniques for implementing supervised machine learning models with Scikit-learn.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
- en: 24. More Supervised Machine Learning Techniques with Scikit-learn
  id: totrans-417
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter will cover using Scikit-learn to implement machine learning models
    using techniques such as
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
- en: Feature engineering
  id: totrans-419
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Resampling methods
  id: totrans-420
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model evaluation methods
  id: totrans-421
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pipelines for streamlining machine learning workflows
  id: totrans-422
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Techniques for model tuning
  id: totrans-423
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature Engineering
  id: totrans-424
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature engineering is the process of systematically choosing the set of features
    in the dataset that are useful and relevant to the learning problem. It is often
    the case that irrelevant features negatively affect the performance of the model.
    This section will review some techniques implemented in Scikit-learn for selecting
    relevant features from a dataset. The techniques surveyed include
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
- en: Statistical tests to select the best *k* features using the **SelectKBest**
    module
  id: totrans-426
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recursive feature elimination (RFE) to recursively remove irrelevant features
    from the dataset
  id: totrans-427
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Principal component analysis to select the components that account for the variation
    in the dataset
  id: totrans-428
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature importances using ensembled or tree classifiers
  id: totrans-429
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Statistical Tests to Select the Best ***k*** Features Using the SelectKBest
    Module
  id: totrans-430
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following list is a selection of statistical tests to use with **SelectKBest**.
    The choice depends if the dataset target variable is numerical or categorical:'
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
- en: ANOVA F-value, **f_classif** (classification)
  id: totrans-432
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chi-squared stats of non-negative features, **chi2** (classification)
  id: totrans-433
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: F-value, **f_regression** (regression)
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mutual information for a continuous target, **mutual_info_regression** (regression)
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s see an example using chi-squared test to select the best variables.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-437
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: From the test scores, the top 3 important features in the dataset are ranked
    from feature 3 to 4 to 1 and to 2 in order. The data scientist can choose to drop
    the second column and observe the effect on the model performance.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
- en: We can transform the dataset to subset only the important features.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  id: totrans-440
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: The result drops the second column of the dataset.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
- en: Recursive Feature Elimination (RFE)
  id: totrans-442
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: RFE is used together with a learning model to recursively select the desired
    number of top performing features.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use RFE with **LinearRegression**.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-445
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: From the result, the 4th, 5th, 6th, 8th, 11th, and 13th features are the top
    6 features in the Boston dataset .
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
- en: Feature Importances
  id: totrans-447
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tree-based or ensemble methods in Scikit-learn have a **feature_importances_**
    attribute which can be used to drop irrelevant features in the dataset using the
    **SelectFromModel** module contained in the **sklearn.feature_selection** package.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
- en: Let’s used the ensemble method **AdaBoostClassifier** in this example.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-450
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Resampling Methods
  id: totrans-451
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Resampling methods are a set of techniques that involve selecting a subset of
    the available dataset, training on that data subset, and using the remainder of
    the data to evaluate the trained model. Let’s review the techniques for resampling
    using Scikit-learn. This section covers
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
- en: k-Fold cross-validation
  id: totrans-453
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leave-one-out cross-validation
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: k-Fold Cross-Validation
  id: totrans-455
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In k-fold cross validation , the dataset is divided into k-parts or folds. The
    model is trained using *k* − 1 folds and evaluated on the remaining kth fold.
    This process is repeated k-times so that each fold can serve as a test set. At
    the end of the process, k-fold averages the result and reports a mean score with
    a standard deviation. Scikit-learn implements K-fold CV in the module **KFold**.
    The module **cross_val_score** is used to evaluate the cross-validation score
    using the splitting strategy, which is **KFold** in this case.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of this using the k-nearest neighbors (kNN) classification
    algorithm. When initializing **KFold**, it is standard practice to shuffle the
    data before splitting.
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  id: totrans-458
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Leave-One-Out Cross-Validation (LOOCV)
  id: totrans-459
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In LOOCV just one example is assigned to the test set, and the model is trained
    on the remainder of the dataset. This process is repeated for all the examples
    in the dataset. This process is repeated until all the examples in the dataset
    have been used for evaluating the model.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  id: totrans-461
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Model Evaluation
  id: totrans-462
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter has already used a couple of evaluation metrics for assessing the
    quality of the fitted models. In this section, we survey a couple of other metrics
    for regression and classification use cases and how to implement them using Scikit-learn.
    For each metric, we show how to use them as stand-alone implementations, as well
    as together with cross-validation using the **cross_val_score** method.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
- en: What we’ll cover here includes
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
- en: Regression evaluation metrics
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
- en: 'Mean squared error (MSE): The average sum of squared difference between the
    predicted label, ŷ, and the true label, y. A score of 0 indicates a perfect prediction
    without errors.'
  id: totrans-466
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mean absolute error (MAE): The average absolute difference between the predicted
    label, ŷ, and the true label, y. A score of 0 indicates a perfect prediction without
    errors.'
  id: totrans-467
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'R²: The amount of variance or variability in the dataset explained by the model.
    The score of 1 means that the model perfectly captures the variability in the
    dataset.'
  id: totrans-468
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classification evaluation metrics
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
- en: 'Accuracy: Is the ratio of correct predictions to the total number of predictions.
    The bigger the accuracy, the better the model.'
  id: totrans-470
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Logarithmic loss (a.k.a logistic loss or cross-entropy loss): Is the probability
    that an observation is correctly assigned to a class label. By minimizing the
    log-loss, conversely, the accuracy is maximized. So with this metric, values closer
    to zero are good.'
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Area under the ROC curve (AUC-ROC): Used in the binary classification case.
    Implementation is not provided, but very similar in style to the others.'
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Confusion matrix: More intuitive in the binary classification case. Implementation
    is not provided, but very similar in style to the others.'
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混淆矩阵：在二元分类情况下更直观。未提供实现，但风格与其它类似。
- en: 'Classification report: It returns a text report of the main classification
    metrics.'
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类报告：返回主要分类指标的文本报告。
- en: Regression Evaluation Metrics
  id: totrans-475
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回归评估指标
- en: The following code is an example of regression evaluation metrics implemented
    stand-alone.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码是一个独立实现的回归评估指标的示例。
- en: '[PRE32]'
  id: totrans-477
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: The following code is an example of regression evaluation metrics implemented
    with cross-validation. The MSE and MAE metrics for cross-validation are implemented
    with the sign inverted. The simple way to interpret this is to have it in mind
    that the closer the values are to zero, the better the model.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码是一个使用交叉验证实现的回归评估指标的示例。交叉验证中的MSE和MAE指标实现了符号反转。简单来说，就是越接近零，模型越好。
- en: '[PRE33]'
  id: totrans-479
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Classification Evaluation Metrics
  id: totrans-480
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类评估指标
- en: The following code is an example of classification evaluation metrics implemented
    stand-alone.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码是一个独立实现的分类评估指标的示例。
- en: '[PRE34]'
  id: totrans-482
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Let’s see an example of classification evaluation metrics implemented with cross-validation.
    Evaluation metrics for log-loss using cross-validation is implemented with the
    sign inverted. The simple way to interpret this is to have it in mind that the
    closer the values are to zero, the better the model.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个使用交叉验证实现的分类评估指标的示例。使用交叉验证实现的log-loss评估指标也实现了符号反转。简单来说，就是越接近零，模型越好。
- en: '[PRE35]'
  id: totrans-484
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: 'Pipelines: Streamlining Machine Learning Workflows'
  id: totrans-485
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 管道：简化机器学习工作流程
- en: The concept of pipelines in Scikit-learn is a compelling tool for chaining a
    bunch of operations together to form a tidy process flow of data transforms from
    one state to another. The operations that constitute a pipeline can be any of
    Scikit-learn’s transformers (i.e., modules with a **fit** and **transform** method,
    or a **fit_transform** method) or classifiers (i.e., modules with a **fit** and
    **predict** method, or a **fit_predict** method). Classifiers are also called
    predictors.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn中的管道概念是将一系列操作链接在一起以形成整洁的数据转换流程的强大工具。构成管道的操作可以是Scikit-learn的任何转换器（即具有**fit**和**transform**方法或**fit_transform**方法的模块）或分类器（即具有**fit**和**predict**方法或**fit_predict**方法的模块）。分类器也称为预测器。
- en: For a typical machine learning workflow, the steps taken may involve cleaning
    the data, feature engineering, scaling the dataset, and then fitting a model.
    Pipelines can be used in this case to chain these operations together into a coherent
    workflow. They have the advantage of providing a convenient and consistent interface
    for calling at once a sequence of operations.
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 对于典型的机器学习工作流程，所采取的步骤可能包括数据清理、特征工程、缩放数据集，然后拟合模型。在这种情况下，可以使用管道将这些操作链接成一个连贯的工作流程。它们的优势在于提供了一个方便且一致的接口，可以一次性调用一系列操作。
- en: These transformers or predictors are collectively called estimators in Scikit-learn
    terminology. In the last two paragraphs, we called them operations.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 这些转换器或预测器在Scikit-learn术语中统称为估计器。在最后两段中，我们称它们为操作。
- en: Another advantage of pipelines is that it safeguards against accidentally fitting
    a transform on the entire dataset and thereby leaking statistics influenced by
    the test data to the machine learning model while training. For example, if a
    standardizer is fitted on the whole dataset, the test set will be compromised
    because the test observations have contributed in estimating the mean and standard
    deviation for scaling the training set before fitting the model.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 管道的另一个优点是它可以防止意外地将转换应用于整个数据集，从而在训练过程中将受测试数据影响的统计信息泄露到机器学习模型中。例如，如果标准化器在整个数据集上拟合，则测试集将受到影响，因为测试观测值在估计用于缩放训练集的均值和标准差时已经做出了贡献。
- en: Finally, only the last step of the pipeline can be a classifier or predictor.
    All the stages of the pipeline must contain a **transform** method except the
    final stage, which can be a transformer or a classifier.
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，管道的最后一步只能是一个分类器或预测器。除了最后一步，管道的所有阶段都必须包含一个**transform**方法，最后一步可以是转换器或分类器。
- en: To begin using Scikit-learn pipelines, first import
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用Scikit-learn管道，首先导入
- en: '[PRE36]'
  id: totrans-492
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Let’s see some examples of working with Pipelines in Scikit-learn. In the following
    example, we’ll apply a scaling transform to standardize our dataset and then use
    a support vector classifier to train the model.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 Scikit-learn 中使用 Pipeline 的几个示例。在下面的示例中，我们将应用缩放转换来标准化我们的数据集，然后使用支持向量机分类器来训练模型。
- en: '[PRE37]'
  id: totrans-494
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Pipelines Using make_pipeline
  id: totrans-495
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 make_pipeline 的 Pipeline
- en: Another method for building machine learning pipelines is by using the **make_pipeline**
    method . For the next example, we use PCA to select the best six features and
    reduce the dimensionality of the dataset, and then we’ll fit the model using Random
    forests for regression.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 构建机器学习 Pipeline 的另一种方法是使用 **make_pipeline** 方法。在下一个示例中，我们使用 PCA 来选择最佳六个特征并降低数据集的维度，然后我们将使用随机森林进行回归来拟合模型。
- en: '[PRE38]'
  id: totrans-497
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: Pipelines Using FeatureUnion
  id: totrans-498
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 FeatureUnion 的 Pipeline
- en: Scikit-learn provides a module for merging the output of several transformers
    called **feature_union** . It does this by fitting each transformer independently
    to the dataset, and then their respective outputs are combined to form a transformed
    dataset for training the model.
  id: totrans-499
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn 提供了一个名为 **feature_union** 的模块，用于合并多个转换器的输出。它通过独立地将每个转换器拟合到数据集，然后将各自的输出组合起来形成一个用于训练模型的转换数据集来实现这一点。
- en: FeatureUnion works in the same way as a Pipeline, and in many ways can be thought
    of as a means of building complex pipelines within a Pipeline.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: FeatureUnion 的工作方式与 Pipeline 相同，在许多方面可以将其视为在 Pipeline 内构建复杂 Pipeline 的手段。
- en: Let’s see an example using FeatureUnion. Here, we will combine the output of
    recursive feature elimination (RFE) and PCA for feature engineering, and then
    we’ll apply the Stochastic Gradient Boosting (SGB) ensemble model for regression
    to train the model.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过使用 FeatureUnion 的示例来查看。在这里，我们将结合递归特征消除 (RFE) 和 PCA 的输出进行特征工程，然后我们将应用随机梯度提升
    (SGB) 集成模型进行回归以训练模型。
- en: '[PRE39]'
  id: totrans-502
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Model Tuning
  id: totrans-503
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型调优
- en: Each machine learning model has a set of options or configurations that can
    be tuned to optimize the model when fitting to data. These configurations are
    called **hyper-parameters** . Hence, for each hyper-parameter, there exist a range
    of values that can be chosen. Taking into consideration the number of hyper-parameters
    that an algorithm has, the entire space can become exponentially large and infeasible
    to explore all of them. Scikit-learn provides two convenient modules for searching
    through the hyper-parameter space of an algorithm to find the best values for
    each hyper-parameter that optimizes the model.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 每个机器学习模型都有一组选项或配置，可以在拟合数据时调整以优化模型。这些配置被称为 **超参数**。因此，对于每个超参数，都存在一个可以选择的值范围。考虑到算法拥有的超参数数量，整个空间可以呈指数级增长，探索所有这些值变得不可行。Scikit-learn
    提供了两个方便的模块，用于搜索算法的超参数空间，以找到每个超参数的最佳值，从而优化模型。
- en: These modules are the
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模块是
- en: Grid search
  id: totrans-506
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网格搜索
- en: Randomized search
  id: totrans-507
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随机搜索
- en: Grid Search
  id: totrans-508
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网格搜索
- en: Grid search comprehensively explores all the specified hyper-parameter values
    for an estimator. It is implemented using the **GridSearchCV** module. Let’s see
    an example using the Random forest for regression. The hyper-parameters we’ll
    search over are
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 网格搜索全面探索了估计器指定的所有超参数值。它使用 **GridSearchCV** 模块实现。让我们通过使用随机森林进行回归的示例来查看。我们将搜索以下超参数：
- en: The number of trees in the forest, **n_estimators**
  id: totrans-510
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 森林中的树的数量，**n_estimators**
- en: The maximum depth of the tree, **max_depth**
  id: totrans-511
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 树的最大深度，**max_depth**
- en: The minimum number of samples required to split an internal node, **min_samples_leaf**
  id: totrans-512
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分裂内部节点所需的最小样本数，**min_samples_leaf**
- en: '[PRE40]'
  id: totrans-513
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: Randomized Search
  id: totrans-514
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机搜索
- en: As opposed to grid search, not all the provided hyper-parameter values are evaluated,
    but rather a determined number of hyper-parameter values are sampled from a random
    uniform distribution. The number of hyper-parameter values that can be evaluated
    is determined by the **n_iter** attribute of the **RandomizedSearchCV** module.
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 与网格搜索不同，并非所有提供的超参数值都会被评估，而是从随机均匀分布中采样确定数量的超参数值。可以评估的超参数值的数量由 **RandomizedSearchCV**
    模块的 **n_iter** 属性确定。
- en: In this example, we will use the same scenario as in the grid search case.
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，我们将使用与网格搜索案例相同的场景。
- en: '[PRE41]'
  id: totrans-517
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: This chapter further explored using Scikit-learn to incorporate other machine
    learning techniques such as feature selection and resampling methods to develop
    a more robust machine learning method. In the next chapter, we will examine our
    first unsupervised machine learning method, clustering, and its implementation
    with Scikit-learn.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 本章进一步探讨了使用 Scikit-learn 集成其他机器学习技术，如特征选择和重采样方法，以开发更稳健的机器学习方法。在下一章中，我们将检查我们的第一个无监督机器学习方法，聚类，以及使用
    Scikit-learn 的实现。
- en: 25. Clustering
  id: totrans-519
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 25. 聚类
- en: Clustering is an unsupervised machine learning technique for grouping homogeneous
    data points into partitions called clusters. In the example dataset illustrated
    in Figure [25-1](#Fig1), suppose we have a set of *n* points and 2 features. A
    clustering algorithm can be applied to determine the number of distinct subclasses
    or groups among the data samples.
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: 聚类是一种无监督的机器学习技术，用于将同质数据点分组到称为聚类的分区中。如图 [25-1](#Fig1) 所示的示例数据集中，假设我们有一组 *n* 个点和
    2 个特征。可以将聚类算法应用于确定数据样本中不同子类或组之间的数量。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig1_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig1_HTML.jpg)'
  id: totrans-521
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig1_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig1_HTML.jpg)'
- en: Figure 25-1
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25-1
- en: An illustration of clustering in a 2-D space
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 2 维空间中聚类的示意图
- en: Clustering a 2-D dataset as seen in Figure [25-1](#Fig1) is relatively trivial.
    The real challenge arises when we have to perform clustering in higher-dimensional
    spaces. The question now is how do we ascertain or find out if a set of points
    are similar or if a set of points should be in the same group? In this section,
    we would cover two essential types of clustering algorithms known as k-means clustering
    and hierarchical clustering.
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [25-1](#Fig1) 所示，对二维数据集进行聚类相对简单。真正的挑战出现在我们需要在更高维度的空间中进行聚类时。现在的问题是，我们如何确定或找出点集是否相似，或者点集是否应该属于同一组？在本节中，我们将介绍两种基本的聚类算法，即
    k-means 聚类和层次聚类。
- en: '*K*-means clustering is used when the number of anticipated distinct classes
    or sub-groups is known in advance. In hierarchical clustering, the exact number
    of clusters is not known, and the algorithm is tasked to find the optimal number
    of heterogeneous sub-groups in the dataset.'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 当预先知道预期的不同类别或子组的数量时，使用 *K*-means 聚类。在层次聚类中，确切的聚类数量是未知的，算法的任务是在数据集中找到最佳数量的异质子组。
- en: '*K*-Means Clustering'
  id: totrans-526
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '*K*-Means 聚类'
- en: k-Means clustering is one of the most famous and widely used clustering algorithms
    in practice. It works by using a distance measurement (most commonly the Euclidean
    distance) to iteratively assign data points in a hyperspace to a set of non-overlapping
    clusters.
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: k-Means 聚类是实践中最著名且最广泛使用的聚类算法之一。它通过使用距离度量（最常见的是欧几里得距离）来迭代地将超空间中的数据点分配到一组非重叠的聚类中。
- en: In *K*-means, the anticipated number of clusters, *K*, is chosen at the onset.
    The clusters are initialized by arbitrarily selecting at random one of the data
    points as an initial cluster for each *K*. The algorithm now works by iteratively
    assigning each point in the space to the cluster centroid that it is nearest to
    using the distance measurement.
  id: totrans-528
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *K*-means 中，预期的聚类数量 *K* 在一开始就被选定。聚类通过任意选择数据点中的一个作为每个 *K* 的初始聚类来初始化。算法现在通过迭代地将空间中的每个点分配到最近的聚类质心，使用距离度量来完成工作。
- en: After all the points have been assigned to their closest cluster point, the
    cluster centroid is adjusted to find a new center among the points in the cluster.
    This process is repeated until the algorithm converges, that is, when the cluster
    centroids stabilize and points do not readily swap clusters after every reassignment.
    These steps are illustrated in Figure [25-2](#Fig2).
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有点都被分配到它们最近的聚类点之后，聚类质心被调整以在聚类中的点之间找到新的中心。这个过程会重复进行，直到算法收敛，即聚类质心稳定，点在每次重新分配后不会轻易交换聚类。这些步骤在图
    [25-2](#Fig2) 中进行了说明。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig2_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig2_HTML.jpg)'
  id: totrans-530
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig2_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig2_HTML.jpg)'
- en: Figure 25-2
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25-2
- en: 'An illustration of k-means clustering with *k* = 2\. Top left: Randomly pick
    a point for each *k*. Top right: Iteratively assign each point to its closest
    cluster centroid. Bottom: Update the cluster centroids for each of the *k* clusters.
    Typically, we repeat the iterative assignment of all the points and update the
    cluster centroid until the algorithm resolves in a stable clustering.'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 当 *k* = 2 时的 k-means 聚类示例。左上角：随机为每个 *k* 选择一个点。右上角：迭代地将每个点分配到最近的聚类质心。底部：更新每个
    *k* 聚类的聚类质心。通常，我们重复迭代分配所有点并更新聚类质心，直到算法在稳定的聚类中收敛。
- en: Considerations for Selecting *K*
  id: totrans-533
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选择 *K* 的注意事项
- en: There’s really no way of telling the number of clusters in a dataset from the
    onset. The best way of selecting *k* is to try out different values of *K* to
    see what works best in creating distinct clusters.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 真的没有方法可以从一开始就确定数据集中聚类的数量。选择 *k* 的最佳方法是通过尝试不同的 *K* 值，看看哪个值在创建不同的聚类中效果最好。
- en: Another strategy, which is widely employed in practice, is to compute the average
    distance of the points in the cluster to the cluster centroid for all clusters.
    This estimate is plotted on a graph as we progressively increase the value of
    *K*. We observe that as *K* increases, the distance of points from the centroid
    of its cluster gradually reduces, and the generated curve resembles the elbow
    of an arm. From practice, we choose the value of *K* just after the elbow as the
    best *K* value for that dataset. This method is called the elbow method for selecting
    *K* as is illustrated in Figure [25-3](#Fig3).
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种在实践中广泛应用的策略是计算所有聚类中点到聚类质心的平均距离。随着我们逐渐增加 *K* 的值，这个估计值被绘制在图表上。我们观察到，随着 *K*
    的增加，点与其聚类质心的距离逐渐减小，生成的曲线类似于手臂的肘部。从实践中，我们在肘部之后选择 *K* 的值作为该数据集的最佳 *K* 值。这种方法被称为选择
    *K* 的肘部方法，如图 [25-3](#Fig3) 所示。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig3_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig3_HTML.jpg)'
  id: totrans-536
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig3_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig3_HTML.jpg)'
- en: Figure 25-3
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25-3
- en: The elbow method for choosing the best value of k
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 选择最佳 k 值的肘部方法
- en: Considerations for Assigning the Initial *K* Points
  id: totrans-539
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分配初始 *K* 点的注意事项
- en: The points that determine the initial value of *K* are important in finding
    a good set of clusters. By selecting the point for *K* at random, two or more
    points may reside in the same cluster, and this will invariably lead to sub-par
    results. To mitigate this from occurring, we can employ more sophisticated approaches
    to selecting the value of *K*. A common strategy is to randomly select the first
    *K* point and then select the next point as the point that is farthest from the
    first chosen point. This strategy is repeated until all *K* points have been selected.
    Another approach is to run hierarchical clustering on a sub-sample of the dataset
    (this is because hierarchical clustering is a computationally expensive algorithm)
    and use the number of clusters after cutting off the dendrogram as the value of
    *K*.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 确定初始 *K* 值的点对于找到一组好的聚类非常重要。通过随机选择 *K* 的点，两个或多个点可能位于同一个聚类中，这不可避免地会导致结果不佳。为了减轻这种情况，我们可以采用更复杂的方法来选择
    *K* 的值。一种常见的策略是随机选择第一个 *K* 点，然后选择下一个点作为与第一个选定点距离最远的点。重复此策略，直到所有 *K* 点都被选中。另一种方法是运行数据集子样本的层次聚类（这是因为层次聚类是一个计算成本较高的算法），并使用截断树状图后的聚类数量作为
    *K* 的值。
- en: K-Means Clustering with Scikit-learn
  id: totrans-541
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Scikit-learn 的 K-Means 聚类
- en: This example implements K-means clustering with Scikit-learn. Since this is
    an unsupervised learning use case, we use just the features of the Iris dataset
    to cluster the observations into labels.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例实现了使用 Scikit-learn 的 K-means 聚类。由于这是一个无监督学习用例，我们仅使用 Iris 数据集的特征来将观测值聚类到标签中。
- en: '[PRE42]'
  id: totrans-543
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: The code to plot the clustered labels and the cluster centers should be executed
    in the same notebook. The plot of clusters made by the K-means algorithm is shown
    in Figure [25-4](#Fig4).
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 绘制聚类标签和聚类中心的代码应在同一笔记本中执行。K-means 算法制作的聚类图如图 [25-4](#Fig4) 所示。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig4_HTML.png](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig4_HTML.png)'
  id: totrans-545
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig4_HTML.png](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig4_HTML.png)'
- en: Figure 25-4
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25-4
- en: Plot of K-means clusters and their cluster centers
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: K-means 聚类及其聚类中心的图示
- en: Hierarchical Clustering
  id: totrans-548
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层次聚类
- en: Hierarchical clustering is another clustering algorithm for finding homogeneous
    sub-groups or classes within a dataset. However, as opposed to *k*-means, we do
    not need to make an a priori assumption of the number of clusters in the dataset
    before running the algorithm.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 层次聚类是另一种聚类算法，用于在数据集中找到同质子组或类别。然而，与 *k*-均值不同，我们在运行算法之前不需要对数据集中簇的数量做出先验假设。
- en: The two main techniques for performing hierarchical clustering are
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 执行层次聚类的两种主要技术是
- en: Bottom-up or agglomerative
  id: totrans-551
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自底向上或聚合
- en: Top-down or divisive
  id: totrans-552
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自顶向下或分裂
- en: In the bottom-up or agglomerative method, each data point is initially designated
    as a cluster. Clusters are iteratively combined based on homogeneity that is determined
    by some distance measure. On the other hand, the divisive or top-down approach
    starts with a cluster and subsequently splits into homogeneous sub-groups.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 在自底向上或聚合方法中，每个数据点最初被指定为一个簇。簇根据某些距离度量的同质性迭代合并。另一方面，自顶向下或分裂方法从簇开始，然后分裂成同质的小组。
- en: Hierarchical clustering creates a tree-like representation of the partitioning
    called a dendrogram. A dendrogram is drawn somewhat similar to a binary tree with
    the root at the top and the leaves at the bottom. The leaf on the dendrogram represents
    a data sample. The dendrogram is constructed by iteratively combining the leaves
    based on homogeneity to form clusters moving up the tree. An illustration of hierarchical
    clustering is shown in Figure [25-5](#Fig5).
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 层次聚类创建了一个树状结构来表示分区，称为树状图。树状图绘制得类似于二叉树，根在上，叶在下。树状图上的叶代表一个数据样本。树状图是通过迭代地将叶根据同质性合并来形成簇，簇向上移动树。层次聚类的示意图见图
    [25-5](#Fig5)。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig5_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig5_HTML.jpg)'
  id: totrans-555
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig5_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig5_HTML.jpg)'
- en: Figure 25-5
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25-5
- en: 'An illustration of hierarchical clustering of data points in a 2-D feature
    space. Left: The spatial representation of points in 2-D space. Right: A hierarchical
    cluster of points represented by a dendrogram.'
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 在二维特征空间中数据点的层次聚类示意图。左：二维空间中点的空间表示。右：由树状图表示的点层次簇。
- en: How Are Clusters Formed
  id: totrans-558
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 簇是如何形成的
- en: Clusters are formed by computing the nearness between each pair of data points.
    The notion of nearness is most popularly calculated using the Euclidean distance
    measure. Beginning at the leaves of the dendrogram, we iteratively combine those
    data points that are closer to one another in the multi-dimensional vector space
    until all the homogeneous points are placed into a single group or cluster.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
  zh: 簇是通过计算每对数据点之间的接近度来形成的。接近度的概念最常用欧几里得距离度来计算。从树状图的叶开始，我们迭代地将多维向量空间中彼此更接近的数据点合并，直到所有同质点都被放入一个单独的组或簇中。
- en: The Euclidean distance is used to compute the nearness between *n* data points.
    After each pair of data points has combined to form a cluster, the new cluster
    pairs are then pulled into groups going up the tree, with the tree branch or dendrogram
    height reflecting the dissimilarity between the clusters.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 欧几里得距离用于计算 *n* 个数据点之间的接近度。在每对数据点合并形成一个簇之后，新的簇对随后被拉入树中的组，树分支或树状图的高度反映了簇之间的相似度。
- en: Dissimilarity computes how different each cluster of data is from one another.
    The notion of dissimilarity between two clusters or groups is described in terms
    of *linkage*. Four types of linkage exist for grouping clusters in hierarchical
    clustering. They are centroid, complete, average, and single.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 相似度计算每个数据簇彼此之间的差异程度。两个簇或组之间的相似度概念用 *连接* 来描述。在层次聚类中，有四种类型的连接用于分组簇。它们是质心、完全、平均和单点。
- en: The centroid linkage computes the dissimilarity between two clusters using the
    geometric centroid of the clusters. The complete linkage uses the two farthest
    data points between the two clusters to compute the dissimilarity (see Figure
    [25-6](#Fig6)).
  id: totrans-562
  prefs: []
  type: TYPE_NORMAL
  zh: 质心连接法通过计算两个簇的几何质心来衡量它们之间的相似度。完全连接法使用两个簇之间最远的两个数据点来计算相似度（见图 [25-6](#Fig6)）。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig6_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig6_HTML.jpg)'
  id: totrans-563
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig6_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig6_HTML.jpg)'
- en: Figure 25-6
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 图 25-6
- en: Complete linkage
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 完全连接
- en: The average linkage finds the means of points within the pair of clusters and
    uses that new artificial point to calculate the dissimilarity (see Figure [25-7](#Fig7)).
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 平均链接法找到簇对内点的平均值，并使用这个新的人造点来计算相似度（见图[25-7](#Fig7)）。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig7_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig7_HTML.jpg)'
  id: totrans-567
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig7_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig7_HTML.jpg)'
- en: Figure 25-7
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 图25-7
- en: Average linkage
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 平均链接
- en: The single linkage uses the closest data point between the cluster pairs to
    compute the dissimilarity measure (see Figure [25-8](#Fig8)).
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 单链接法使用簇对之间的最近数据点来计算相似度度量（见图[25-8](#Fig8)）。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig8_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig8_HTML.jpg)'
  id: totrans-571
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig8_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig8_HTML.jpg)'
- en: Figure 25-8
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 图25-8
- en: Single linkage
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 单链接
- en: Empirically, the complete and average linkages are preferred in practice because
    they yield more balanced dendrograms. Other dissimilarity measures exist for evaluating
    the nearness or homogeneity of data points. One of such is the Manhattan distance,
    another distance-based measure, or the correlation-based distance which groups
    pairs of data samples with highly correlated features. A correlated-based dissimilarity
    measure may be more useful in datasets where proximity in multi-dimensional spaces
    is not as useful a metric for homogeneity as compared to the correlation of their
    features in the space. A choice of calculating dissimilarity has a significant
    impact on the ensuring dendrogram.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，在实践中更倾向于使用完全链接和平均链接，因为它们产生的树状图更加平衡。存在其他相似度度量方法用于评估数据点的接近程度或同质性。其中之一是曼哈顿距离，另一种基于距离的度量，或基于相关性的距离，它将具有高度相关特征的样本对分组。在多维度空间中，基于相关性的相似度度量可能在数据点的同质性方面不如其特征在空间中的相关性作为一个度量指标有用。在数据集中，如果多维度空间中的接近性不如特征的相关性有用，基于相关性的相似度度量可能更有用。计算相似度的选择对确保树状图有重大影响。
- en: After running the algorithm, the dendrogram is cut at a particular height, and
    the number of distinct lines or branches after the cut is circumscribed as the
    number of clusters in the dataset. An illustration of cutting the dendrogram is
    shown in Figure [25-9](#Fig9).
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 运行算法后，在特定的树状图高度处进行切割，切割后形成的不同线条或分支的数量被界定为数据集中的簇数。切割树状图的示意图显示在图[25-9](#Fig9)中。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig9_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig9_HTML.jpg)'
  id: totrans-576
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig9_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig9_HTML.jpg)'
- en: Figure 25-9
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 图25-9
- en: Dendrogram cut
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 系统树状图切割
- en: Hierarchical Clustering with the SciPy Package
  id: totrans-579
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用SciPy包进行层次聚类
- en: This example implements hierarchical or agglomerative clustering with SciPy.
    The ‘scipy.cluster.hierarchy’ package has simple methods for performing hierarchical
    clustering and plotting dendrograms. This example uses the ‘complete’ linkage
    method. The plot of the dendrogram is shown in Figure [25-10](#Fig10).
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例实现了使用SciPy的层次聚类或聚合聚类。`scipy.cluster.hierarchy`包提供了执行层次聚类和绘制树状图的方法。此示例使用的是“完全”链接方法。树状图的绘制图示显示在图[25-10](#Fig10)中。
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig10_HTML.png](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig10_HTML.png)'
  id: totrans-581
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig10_HTML.png](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig10_HTML.png)'
- en: Figure 25-10
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 图25-10
- en: Dendrogram produced by hierarchical clustering
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: 层次聚类产生的树状图
- en: '[PRE43]'
  id: totrans-584
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: This chapter reviewed the pros and cons of *K*-means and hierarchical clustering.
    Both hierarchical and *K*-means are susceptible to perturbations in the dataset
    and can give very different results if a few data points are removed or added.
    Also, it is crucial to standardize the dataset features (i.e., to subtract each
    element in the feature from its mean and divide by its standard deviation or by
    the range) before performing clustering. This ensures that the features are within
    similar numeric bounds and have tempered or measured distances in the feature
    space.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 本章回顾了K-均值和层次聚类的优缺点。层次聚类和K-均值都对数据集的扰动敏感，如果删除或添加少量数据点，可能会给出非常不同的结果。此外，在执行聚类之前，对数据集的特征进行标准化（即从特征中减去每个元素的平均值并除以其标准差或范围）至关重要。这确保了特征在相似的数值范围内，并且在特征空间中有调节或测量的距离。
- en: The results of these clustering algorithms also depend on a wide range of considerations
    such as the choice of *K* for *K*-means, and for hierarchical clustering, the
    choice of dissimilarity measure, the type of linkage, and where to cut the dendrogram
    all affect the final result of the clusters. Hence, to get the best out of clustering,
    it is best to perform a grid search and try out all these different configurations
    in order to get a measured view on the robustness of the results before applying
    into your learning pipeline or using as a model to explain the dataset.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 这些聚类算法的结果也取决于广泛的考虑因素，例如选择 *K* 用于 *K*-means，对于层次聚类，选择相似性度量、链接类型以及在哪里切割树状图都会影响最终聚类结果。因此，为了从聚类中获得最佳效果，最好执行网格搜索并尝试所有这些不同的配置，以便在将结果应用于学习管道或用作解释数据集的模型之前，对结果的鲁棒性有一个量化的看法。
- en: In the next chapter, we will discuss principal component analysis (PCA) as an
    unsupervised machine learning algorithm for finding low-dimensional feature sub-spaces
    that capture the variability in the dataset.
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论主成分分析 (PCA) 作为一种无监督机器学习算法，用于寻找能够捕捉数据集可变性的低维特征子空间。
- en: 26. Principal Component Analysis (PCA)
  id: totrans-588
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 26. 主成分分析 (PCA)
- en: Principal component analysis (PCA) is an essential algorithm in machine learning.
    It is a mathematical method for evaluating the principal components of a dataset.
    The principal components are a set of vectors in high-dimensional space that capture
    the variance (i.e., spread) or variability of the feature space.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 主成分分析 (PCA) 是机器学习中的一个基本算法。它是一种评估数据集主成分的数学方法。主成分是在高维空间中的一组向量，它们捕捉特征空间的方差（即，分散）或可变性。
- en: The goal of computing principal components is to find a low-dimensional feature
    sub-space that captures as much information as possible from the original higher-dimensional
    features of the dataset.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 计算主成分的目标是找到一个低维特征子空间，尽可能多地从数据集的原始高维特征中提取信息。
- en: PCA is particularly useful for simplifying data visualization of high-dimensional
    features by reducing the dimensions of the dataset to a lower sub-space. For example,
    since we can easily visualize relationships on a 2-D plane using scatter diagrams,
    it will be useful to condense an n-dimensional space into two dimensions that
    retain as much information as possible in the n-dimensional dataset. This technique
    is popularly called dimensionality reduction.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: PCA 特别适用于通过将数据集的维度降低到较低子空间来简化高维特征的数据可视化。例如，由于我们可以使用散点图轻松地在二维平面上可视化关系，因此将 n 维空间压缩到两个维度将是有用的，这两个维度在
    n 维数据集中尽可能保留信息。这种技术通常被称为降维。
- en: How Are Principal Components Computed
  id: totrans-592
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何计算主成分
- en: The mathematical details for computing principal components are somewhat involved.
    This section will instead provide a conceptual but solid overview of this process.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 计算主成分的数学细节有些复杂。本节将提供关于此过程的概念性但坚实的概述。
- en: The first step is to find the covariance matrix of the dataset. The covariance
    matrix captures the linear relationship between variables or features in the dataset.
    In a covariance matrix, an increasingly positive number represents a growing relationship,
    while the converse is represented by an increasingly negative number. Numbers
    around zero indicate a non-linear relationship between the variables. The covariance
    matrix is a square matrix (that means it has the same rows and columns). Hence,
    given a dataset with *m* rows and *p* columns, the covariance matrix will be a
    *m* × *p* matrix.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是找到数据集的协方差矩阵。协方差矩阵捕捉数据集中变量或特征之间的线性关系。在协方差矩阵中，越来越大的正数表示关系越来越强，而相反的情况则由越来越大的负数表示。围绕零的数字表示变量之间的非线性关系。协方差矩阵是一个方阵（这意味着它有相同的行和列）。因此，给定一个有
    *m* 行和 *p* 列的数据集，协方差矩阵将是一个 *m* × *p* 矩阵。
- en: The next step is to find the eigenvectors of the covariance matrix dataset.
    In linear algebra theory, eigenvectors are non-zero vectors that merely stretch
    by a scalar factor, but do not change direction when acted upon by a linear transformation.
    We find the eigenvectors using a linear algebra technique called the singular
    value decomposition or SVD for short (see Figure [26-1](#Fig1)). This advanced
    mathematical concept is beyond the scope of this book.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是找到协方差矩阵数据集的特征向量。在线性代数理论中，特征向量是仅通过标量因子拉伸而不改变方向的非零向量，当受到线性变换的作用时不会改变方向。我们使用称为奇异值分解（SVD）的线性代数技术来找到特征向量（参见图
    [26-1](#Fig1)）。这个高级数学概念超出了本书的范围。
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig1_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig1_HTML.jpg)'
  id: totrans-596
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig1_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig1_HTML.jpg)'
- en: Figure 26-1
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 图 26-1
- en: Decompose the covariance matrix using SVD to get the eigenvector matrix
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 使用奇异值分解（SVD）分解协方差矩阵以获取特征向量矩阵
- en: The critical point to note at this junction is that the SVD also outputs a square
    matrix (*p* × *p*), and each column of the matrix is an eigenvector of the original
    dataset. This output is the same across different software packages that compute
    the eigenvectors because the covariance matrix satisfies a mathematical property
    of being symmetric and positive semi-definite (the non-math inclined can conveniently
    ignore this point). We have as many eigenvectors as they are attributes or features
    in the dataset.
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个节点需要注意的关键点是，奇异值分解（SVD）同样输出一个方阵（*p* × *p*），并且矩阵的每一列都是原始数据集的特征向量。这种输出在不同软件包中计算特征向量时是相同的，因为协方差矩阵满足对称和正半定（非数学倾向的人可以方便地忽略这一点）。我们拥有的特征向量数量与数据集中的属性或特征数量相同。
- en: Without delving into mathematical theory, we can conclude that the eigenvectors
    are the principal components or loadings of the feature space. Again remember
    that the principal components capture the most significant variance in the dataset
    by projecting the data onto a vector called the first principal component. Other
    principal components are perpendicular to each other and capture the variance
    not explained by the first principal component. The principal components are arranged
    in order of importance in the eigenvector matrix, with the first principal component
    in the first column, the second principal component in the second column, and
    so on.
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 不深入数学理论，我们可以得出结论，特征向量是特征空间的特征成分或负载量。再次记住，主成分通过将数据投影到称为第一主成分的向量上来捕获数据集中的最大方差。其他主成分相互垂直，并捕获第一主成分未解释的方差。主成分按照重要性顺序排列在特征向量矩阵中，第一主成分位于第一列，第二主成分位于第二列，依此类推。
- en: Dimensionality Reduction with PCA
  id: totrans-601
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用PCA进行降维
- en: To reduce the dimensions of the original dataset using PCA, we multiply the
    desired number of components or loadings from the eigenvector matrix, *A*, by
    the design matrix *X*. Suppose the design matrix (or the original dataset) has
    *m* rows (or observations) and *p* columns (or features), if we want to reduce
    the dimensions of the original dataset to two dimensions, we will multiply the
    original dataset *X* by the first two columns of the eigenvector matrix, *A*[*reduced*].
    The result will be a reduced matrix of *m* rows and 2 columns.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用PCA降低原始数据集的维度，我们将特征向量矩阵 *A* 中所需的成分或负载量与设计矩阵 *X* 相乘。假设设计矩阵（或原始数据集）有 *m* 行（或观测值）和
    *p* 列（或特征），如果我们想将原始数据集的维度降低到二维，我们将原始数据集 *X* 与特征向量矩阵 *A*[*reduced*] 的前两列相乘。结果将是一个具有
    *m* 行和 2 列的降维矩阵。
- en: If *X* is a *m* × *p* matrix and *A*[*reduced*] is a *p* × 2 matrix,
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 *X* 是一个 *m* × *p* 矩阵，而 *A*[*reduced*] 是一个 *p* × 2 矩阵，
- en: '![$$ {T}_{reduced}={X}_{m\times p}\times {A}_{p\times 2} $$](../images/463852_1_En_26_Chapter/463852_1_En_26_Chapter_TeX_Equa.png)'
  id: totrans-604
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {T}_{reduced}={X}_{m\times p}\times {A}_{p\times 2} $$](../images/463852_1_En_26_Chapter/463852_1_En_26_Chapter_TeX_Equa.png)'
- en: Observe that the result *T*[*reduced*] is a *m* × 2 matrix. Hence, *T* is a
    2-D representation of the original dataset *X* as shown in Figure [26-2](#Fig2).
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到结果 *T*[*reduced*] 是一个 *m* × 2 矩阵。因此，*T* 是原始数据集 *X* 的二维表示，如图 [26-2](#Fig2)
    所示。
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig2_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig2_HTML.jpg)'
  id: totrans-606
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig2_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig2_HTML.jpg)'
- en: Figure 26-2
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 图 26-2
- en: Reducing the dimension of the original dataset
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 降低原始数据集的维度
- en: In plotting the reduced dataset, the principal components are ranked in order
    of importance with the first principal component more prominent than the second
    and so on. Figure [26-3](#Fig3) illustrates a plot of the first two principal
    components.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 在绘制降维后的数据集时，主成分按照重要性顺序排列，第一个主成分比第二个更突出，依此类推。图[26-3](#Fig3)展示了前两个主成分的绘图。
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig3_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig3_HTML.jpg)'
  id: totrans-610
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig3_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig3_HTML.jpg)'
- en: Figure 26-3
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 图26-3
- en: Visualize the principal components
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化主成分
- en: Key Considerations for Performing PCA
  id: totrans-613
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 执行PCA的关键注意事项
- en: It is vital to perform mean normalization and feature scaling on the variables
    of features of the original dataset before implementing PCA. This is because unscaled
    features can have stretched and narrow distance n-dimensional space, and this
    has a huge consequence when finding the principal components that explain the
    variance of the dataset (see Figure [26-4](#Fig4)).
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 在实施PCA之前，对原始数据集的特征变量进行均值归一化和特征缩放至关重要。这是因为未经缩放的特征可能导致n维空间中的距离拉伸和狭窄，这在寻找解释数据集方差的特征主成分时会产生巨大影响（见图[26-4](#Fig4)）。
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig4_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig4_HTML.jpg)'
  id: totrans-615
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig4_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig4_HTML.jpg)'
- en: Figure 26-4
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 图26-4
- en: 'Right: An illustration of PCA with scaled features. Left: An illustration of
    PCA with unscaled features .'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 右：缩放特征PCA的示意图。左：未缩放特征PCA的示意图。
- en: Again mean normalization ensures that every attribute or feature of the dataset
    has a zero mean, while feature scaling ensures all the features are within the
    same numeric range.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，均值归一化确保数据集的每个属性或特征都具有零均值，而特征缩放确保所有特征都在相同的数值范围内。
- en: Finally, PCA is susceptible to vary wildly due to slight perturbations or changes
    in the dataset.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，PCA容易受到数据集轻微扰动或变化的影响而剧烈变化。
- en: PCA with Scikit-learn
  id: totrans-620
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Scikit-learn进行PCA
- en: In this section, PCA is implemented using Scikit-learn.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，使用Scikit-learn实现PCA。
- en: '[PRE44]'
  id: totrans-622
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: from sklearn.preprocessing import Normalizer
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: from sklearn.preprocessing import Normalizer
- en: '[PRE45]'
  id: totrans-624
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: In this chapter, we explained PCA giving a high-level overview of how it works
    to find a low-dimensional sub-space of a dataset. More so, we showed how PCA is
    implemented with Scikit-learn. This chapter concludes Part 4\. In the next part,
    we introduce another scheme of learning methods called deep learning that builds
    on the machine learning neural network algorithm for learning complex representations.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: '在本章中，我们解释了PCA，给出了其工作原理的高级概述，即如何找到一个数据集的低维子空间。更重要的是，我们展示了如何使用Scikit-learn实现PCA。本章总结了第4部分。在下一部分，我们将介绍另一种称为深度学习的学习方法，它建立在机器学习神经网络算法之上，用于学习复杂表示。 '
