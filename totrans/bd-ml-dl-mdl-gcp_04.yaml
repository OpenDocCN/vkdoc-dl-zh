- en: Part IVMachine Learning in Practice
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第四部分实践中的机器学习
- en: 18. Introduction to Scikit-learn
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 18. Scikit-learn 简介
- en: Scikit-learn is a Python library that provides a standard interface for implementing
    machine learning algorithms. It includes other ancillary functions that are integral
    to the machine learning pipeline such as data preprocessing steps, data resampling
    techniques, evaluation parameters, and search interfaces for tuning/optimizing
    an algorithm’s performance.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn 是一个 Python 库，它为实施机器学习算法提供了一个标准接口。它包括其他辅助函数，这些函数对于机器学习流程至关重要，例如数据预处理步骤、数据重采样技术、评估参数以及用于调整/优化算法性能的搜索接口。
- en: This section will go through the functions for implementing a typical machine
    learning pipeline with Scikit-learn. Since, Scikit-learn has a variety of packages
    and modules that are called depending on the use case, we’ll import a module directly
    from a package if and when needed using the **from** keyword. Again the goal of
    this material is to provide the foundation to be able to comb through the exhaustive
    Scikit-learn library and be able to use the right tool or function to get the
    job done.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将介绍使用 Scikit-learn 实现典型机器学习流程的函数。由于 Scikit-learn 有多种根据用例调用的包和模块，因此，如果需要，我们将使用
    **from** 关键字直接从包中导入模块。再次强调，本材料的目的是提供基础，以便能够浏览 Scikit-learn 库的详尽内容，并能够使用正确的工具或函数来完成工作。
- en: Loading Sample Datasets from Scikit-learn
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从 Scikit-learn 加载样本数据集
- en: Scikit-learn comes with a set of small standard datasets for quickly testing
    and prototyping machine learning models. These datasets are ideal for learning
    purposes when starting off working with machine learning or even trying out the
    performance of some new model. They save a bit of the time required to identify,
    download, and clean up a dataset obtained from the wild. However, these datasets
    are small and well curated, they do not represent real-world scenarios.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit-learn 提供了一组小型标准数据集，用于快速测试和原型设计机器学习模型。这些数据集在学习机器学习或尝试新模型的性能时非常适合。它们节省了从野外识别、下载和清理数据集所需的时间。然而，这些数据集规模较小且经过精心整理，它们并不代表现实世界的情况。
