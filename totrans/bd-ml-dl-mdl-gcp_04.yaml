- en: Splitting the Dataset into Training and Test Sets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A core practice in machine learning is to split the dataset into different partitions
    for training and testing. Scikit-learn has a convenient method to assist in that
    process called **train_test_split(X, y, test_size=0.25)** , where **X** is the
    design matrix or dataset of predictors and **y** is the target variable. The split
    size is controlled using the attribute **test_size**. By default, test_size is
    set to 25% of the dataset size. It is standard practice to shuffle the dataset
    before splitting by setting the attribute **shuffle=True**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Preprocessing the Data for Model Fitting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before a dataset is trained or fitted with a machine learning model, it necessarily
    undergoes some vital transformations. These transformations have a huge effect
    on the performance of the learning model. Transformations in Scikit-learn have
    a **fit()** and **transform()** method, or a **fit_transform()** method.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the use case, the **fit()** method can be used to learn the parameters
    of the dataset, while the **transform()** method applies the data transform based
    on the learned parameters to the same dataset and also to the test or validation
    datasets before modeling. Also, the **fit_transform()** method can be used to
    learn and apply the transformation to the same dataset in a one-off fashion. Data
    transformation packages are found in the **sklearn.preprocessing** package.
  prefs: []
  type: TYPE_NORMAL
- en: This section will cover some critical transformation for numeric and categorical
    variables. They include
  prefs: []
  type: TYPE_NORMAL
- en: Data rescaling
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standardization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Normalization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Binarization
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Encoding categorical variables
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Input missing data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating higher-order polynomial features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data Rescaling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is often the case that the features of the dataset contain data with different
    scales. In other words, the data in column A can be in the range of 1–5, while
    the data in column B is in the range of 1000–9000\. This different scale for units
    of observations in the same dataset can have an adverse effect for certain machine
    learning models, especially when minimizing the cost function of the algorithm
    because it shrinks the function space and makes it difficult for an optimization
    algorithm like gradient descent to find the global minimum.
  prefs: []
  type: TYPE_NORMAL
- en: When performing data rescaling, usually the attributes are rescaled with the
    range of 0 and 1\. Data rescaling is implemented in Scikit-learn using the **MinMaxScaler**
    module. Let’s see an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Standardization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Linear machine learning algorithms such as linear regression and logistic regression
    make an assumption that the observations of the dataset are normally distributed
    with a mean of 0 and standard deviation of 1\. However, this is often not the
    case with real-world datasets as features are often skewed with differing means
    and standard deviations.
  prefs: []
  type: TYPE_NORMAL
- en: Applying the technique of standardization to the datasets transforms the features
    into a standard Gaussian (or normal) distribution with a mean of 0 and standard
    deviation of 1\. Scikit-learn implements data standardization in the **StandardScaler**
    module. Let’s look at an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Normalization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Data normalization involves transforming the observations in the dataset so
    that it has a unit norm or has magnitude or length of 1\. The length of a vector
    is the square root of the sum of squares of the vector elements. A unit vector
    (or unit norm) is obtained by dividing the vector by its length. Normalizing the
    dataset is particularly useful in scenarios where the dataset is sparse (i.e.,
    a large number of observations are zeros) and also has differing scales. Normalization
    in Scikit-learn is implemented in the **Normalizer** module.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Binarization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Binarization is a transformation technique for converting a dataset into binary
    values by setting a cutoff or threshold. All values above the threshold are set
    to 1, while those below are set to 0\. This technique is useful for converting
    a dataset of probabilities into integer values or in transforming a feature to
    reflect some categorization. Scikit-learn implements binarization with the **Binarizer**
    module.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Encoding Categorical Variables
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most machine learning algorithms do not compute with non-numerical or categorical
    variables. Hence, encoding categorical variables is the technique for converting
    non-numerical features with labels into a numerical representation for use in
    machine learning modeling. Scikit-learn provides modules for encoding categorical
    variables including the **LabelEncoder** for encoding labels as integers, **OneHotEncoder**
    for converting categorical features into a matrix of integers, and **LabelBinarizer**
    for creating a one-hot encoding of target labels.
  prefs: []
  type: TYPE_NORMAL
- en: '**LabelEncoder** is typically used on the target variable to transform a vector
    of hashable categories (or labels) into an integer representation by encoding
    label with values between 0 and the number of categories minus 1\. This is further
    illustrated in Figure [18-1](#Fig1).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_18_Chapter/463852_1_En_18_Fig1_HTML.jpg](../images/463852_1_En_18_Chapter/463852_1_En_18_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 18-1
  prefs: []
  type: TYPE_NORMAL
- en: LabelEncoder
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of **LabelEncoder**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '**OneHotEncoder** is used to transform a categorical feature variable in a
    matrix of integers. This matrix is a sparse matrix with each column corresponding
    to one possible value of a category. This is further illustrated in Figure [18-2](#Fig2).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_18_Chapter/463852_1_En_18_Fig2_HTML.jpg](../images/463852_1_En_18_Chapter/463852_1_En_18_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 18-2
  prefs: []
  type: TYPE_NORMAL
- en: OneHotEncoder
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of **OneHotEncoder** .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Input Missing Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is often the case that a dataset contains several missing observations. Scikit-learn
    implements the **Imputer** module for completing missing values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Generating Higher-Order Polynomial Features
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Scikit-learn has a module called PolynomialFeatures for generating a new dataset
    containing high-order polynomial and interaction features based off the features
    in the original dataset. For example, if the original dataset has two dimensions
    [a, b], the second-degree polynomial transformation of the features will result
    in [1, a, b, *a*², ab, *b*²].
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Machine Learning Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter provides an introduction to working with the Scikit-learn library
    for implementing machine learning algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapters, we’ll implement supervised and unsupervised machine learning
    models using Scikit-learn. Scikit-learn provides a consistent set of methods,
    which are the **fit()** method for fitting models to the training dataset and
    the **predict()** method for using the fitted parameters to make a prediction
    on the test dataset. The examples are geared at explaining working with Scikit-learn;
    hence, we are not so keen on the performance of the model.
  prefs: []
  type: TYPE_NORMAL
- en: 19. Linear Regression
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The fundamental idea behind the linear regression algorithm is that it assumes
    a linear relationship between the features of the dataset. As a result of the
    pre-defined structure that is imposed on the parameters of the model, it is also
    called a parametric learning algorithm. Linear regression is used to predict targets
    that contain real values. As we will see later in Chapter [20](463852_1_En_20_Chapter.xhtml)
    on logistic regression, the linear regression model is not adequate to deal with
    learning problems whose targets are categorical.
  prefs: []
  type: TYPE_NORMAL
- en: The Regression Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In linear regression, the prevailing assumption is that the target variable
    (i.e., the unit that we want to predict) can be modeled as a linear combination
    of the features.
  prefs: []
  type: TYPE_NORMAL
- en: A linear combination is simply the addition of a certain number of vectors that
    are scaled (or adjusted) by some arbitrary constant. A vector is a mathematical
    construct for representing a set of numbers.
  prefs: []
  type: TYPE_NORMAL
- en: For example, let us assume a randomly generated dataset consisting of two features
    and a target variable. The dataset has 50 observations (see Figure [19-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig1_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19-1
  prefs: []
  type: TYPE_NORMAL
- en: Sample dataset
  prefs: []
  type: TYPE_NORMAL
- en: The vectors of this dataset are
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ x1=\left[40\ 31\ 81\ 57\dots 66\ \right],\kern1em x2=\left[73\ 59\ 18\
    69\dots 20\ \right],\kern1em y=\left[105\ 145\ 128\ 116\dots 144\ \right] $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: In a linear regression model, every feature has an assigned “weight.” We can
    say that the weight parameterizes each feature in the dataset. The weights in
    the dataset are adjusted to take on values that capture the underlying relationship
    between the features that optimally approximate the target variable. The linear
    regression model is formally written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_2+\dots +{\theta}_n{x}_n
    $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y} $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_IEq1.png)
    (pronounced y-hat) is the approximate value of the output *y* that we want to
    predict.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*θ*[*i*], where *i* = {1, 2, …*n*}, is the weight assigned to each feature
    in the dataset. The notation *n* is the size of features of the dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*θ*[0] represents the “bias” term.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A Visual Representation of Linear Regression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To provide more intuition, let us draw a 2-D plot of the first feature *x*[1]
    and the target variable *y* of the dataset with all 50 records. We are using just
    one feature in this illustration because it is easier to visualize with a 2-D
    scatter plot (see Figure [19-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig2_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19-2
  prefs: []
  type: TYPE_NORMAL
- en: '*Scatter plot of x* [1] *(on the x axis) and y (on the y axis)*'
  prefs: []
  type: TYPE_NORMAL
- en: The goal of the linear model is to find a line that gives the best approximation
    or best fit to the data points. When found, this line will look like something
    in Figure [19-3](#Fig3). The line of best fit is known as the regression line.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig3_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19-3
  prefs: []
  type: TYPE_NORMAL
- en: '*Scatter plot of x* [1] *(on the x axis) and y (on the y axis) with regression
    line*'
  prefs: []
  type: TYPE_NORMAL
- en: Finding the Regression Line – How Do We Optimize the Parameters of the Linear
    Model?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To find the regression line, we need to define the cost function, which is also
    called the loss function. Remember that the cost in machine learning is the error
    measure that the learning algorithm minimizes. We can also define the cost as
    the penalty when the model outputs an incorrect prediction.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of the linear regression model, the cost function is defined as
    half the sum of the squared difference between the predicted value and the actual
    value. The linear regression cost function is called the ***squared error cost
    function*** and is written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ C\left(\theta \right)=\frac{1}{2}\sum {\left(\hat{y}-y\right)}^2 $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: To put it more simply, the closer the approximate value of the target variable
    ![$$ \hat{y} $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_IEq2.png)
    is to the actual variable *y*, the lower our cost and the better our model.
  prefs: []
  type: TYPE_NORMAL
- en: Having defined the cost function, an optimization algorithm such as gradient
    descent is used to minimize the cost *C*(*θ*) by updating the weights of the linear
    regression model.
  prefs: []
  type: TYPE_NORMAL
- en: How Do We Interpret the Linear Regression Model?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In machine learning, the focus of linear regression differs slightly from traditional
    statistics. In statistics, the goal of a regression model is to understand the
    relationships between the features and targets by interpreting p-values, whereas
    in machine learning, the goal of the linear regression model is to predict the
    targets given new samples.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [19-4](#Fig4) shows a regression model with a line of best fit that optimizes
    the squared difference between the data features and the targets. This difference
    is also called the residuals (shown as the purple vertical lines in Figure [19-4](#Fig4)).
    What we care about in a linear regression model is to minimize the error between
    the predicted labels and the actual labels in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig4_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19-4
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression model showing residuals
  prefs: []
  type: TYPE_NORMAL
- en: If all the points in Figure [19-4](#Fig4) entirely fall on the predicted regression
    line, then the error will be 0\. In interpreting the regression model, we want
    the error measure to be as low as possible.
  prefs: []
  type: TYPE_NORMAL
- en: However, our emphasis is to obtain a low error measure when we evaluate our
    model on the test dataset. Recall that the test of learning is when a model can
    generalize to examples that it was not exposed to during training.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression with Scikit-learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this example, we will implement a linear regression model with Scikit-learn.
    The model will predict house prices from the Boston house-prices dataset. The
    dataset contains 506 observations and 13 features.
  prefs: []
  type: TYPE_NORMAL
- en: 'We begin by importing the following packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding code, using the `train_test_split()` function, the dataset
    is split into training and testing sets. The linear regression algorithm is applied
    to the training dataset to find the optimal values that parameterize the weights
    of the model. The model is evaluated by calling the `.predict()` function on the
    test set.
  prefs: []
  type: TYPE_NORMAL
- en: The error of the model is evaluated using the RMSE error metric (discussed in
    Chapter [14](463852_1_En_14_Chapter.xhtml)).
  prefs: []
  type: TYPE_NORMAL
- en: Adapting to Non-linearity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although linear regression has the premise that the underlying structure of
    the dataset features is linear, this is, however, not the case for most datasets.
    It is nevertheless possible to adapt linear regression to fit or build a model
    for non-linear datasets. This process of adding non-linearity to linear models
    is called ***polynomial regression***.
  prefs: []
  type: TYPE_NORMAL
- en: Polynomial regression fits a non-linear relationship to the data by adding higher-order
    polynomial terms of existing data features as new features in the dataset. More
    of this is visualized in Figure [19-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig5_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19-5
  prefs: []
  type: TYPE_NORMAL
- en: Adding polynomial features to the dataset
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that from a statistical point of view, when approximating
    the optimal values of the weights to minimize the model, the underlying assumption
    of the interactions of the parameters is linear. Non-linear regression models
    may tend to overfit the data, but this can be mitigated by adding regularization
    to the model. Here is a formal example of the polynomial regression model.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_1^2+{\theta}_3{x}_2+{\theta}_4{x}_2^2+\dots
    +{\theta}_n{x}_n+{\theta}_n{x}_n^2 $$](../images/463852_1_En_19_Chapter/463852_1_En_19_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of polynomial regression is shown in Figure [19-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_19_Chapter/463852_1_En_19_Fig6_HTML.jpg](../images/463852_1_En_19_Chapter/463852_1_En_19_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 19-6
  prefs: []
  type: TYPE_NORMAL
- en: Fitting a non-linear model with polynomial regression
  prefs: []
  type: TYPE_NORMAL
- en: Higher-Order Linear Regression with Scikit-learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this example, we will create higher-order polynomials from the dataset features
    in hope of fitting a more flexible model that may better capture the variance
    in the dataset. As seen in Chapter [18](463852_1_En_18_Chapter.xhtml), we will
    use the PolynomialFeatures method to create these higher-order polynomial and
    interaction features. The following code example is similar to the previous code
    example except where it extends the feature matrix with higher-order features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: From the example, we can observe a slight improvement in the error score of
    the model with added higher-order features. This result is similar to what may
    most likely be observed in practice. It is rare to find datasets from real-world
    events where the features have a perfectly underlying linear structure. So adding
    higher-order terms is most likely to improve the model performance. But we must
    watch out to avoid overfitting the model.
  prefs: []
  type: TYPE_NORMAL
- en: Improving the Performance of a Linear Regression Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following techniques are options that can be explored to improve the performance
    of a linear regression model.
  prefs: []
  type: TYPE_NORMAL
- en: '**In the case of Bias (i.e., poor MSE on training data)**'
  prefs: []
  type: TYPE_NORMAL
- en: Perform feature selection to reduce the parameter space. Feature selection is
    the process of eliminating variables that do not contribute to learning the prediction
    model. There are various automatic methods for feature selection with linear regression.
    A couple of them are backward selection, forward propagation, and stepwise regression.
    Features can also be pruned manually by systematically going through each feature
    in the dataset and determining its relevance to the learning problem.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Remove features with high correlation. Correlation occurs when two predictor
    features are strongly dependent on one another. Empirically, highly correlated
    features in the datasets may hurt the model accuracy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use higher-order features. A more flexible fit may better capture the variance
    in the dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rescale your data before training. Unscaled features negatively affect the prediction
    quality of a regression model. Because of the different feature scales in multi-dimensional
    space, it becomes difficult for the model to find the optimal weights that capture
    the learning problem. As mentioned in Chapter [16](463852_1_En_16_Chapter.xhtml),
    gradient descent performs better with feature scaling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In a rare case, we may need to collect more data. However, this is potentially
    costly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**In the case of variance (i.e., the MSE is good when evaluated on training
    data, but poor on the test data)**'
  prefs: []
  type: TYPE_NORMAL
- en: A standard practice, in this case, is to apply regularization (more on this
    in Chapter [21](463852_1_En_21_Chapter.xhtml)) to the regression model. This can
    do a good job at preventing overfitting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This chapter provides an overview on the linear regression machine learning
    algorithm for learning real-valued targets. Also, the chapter provided practical
    steps for implementing linear regression models with Scikit-learn. In the next
    chapter, we will examine logistic regression for learning classification problems.
  prefs: []
  type: TYPE_NORMAL
- en: 20. Logistic Regression
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Logistic regression is a supervised machine learning algorithm developed for
    learning classification problems. A classification learning problem is when the
    target variable is categorical. The goal of logistic regression is to map a function
    from the features of the dataset to the targets to predict the probability that
    a new example belongs to one of the target classes. Figure [20-1](#Fig1) is an
    example of a dataset with categorical targets.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig1_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 20-1
  prefs: []
  type: TYPE_NORMAL
- en: Dataset with qualitative variables as output
  prefs: []
  type: TYPE_NORMAL
- en: Why Logistic Regression?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To develop our understanding of classification with logistic regression and
    why linear regression is unsuitable for learning categorical outputs, let us consider
    a binary or two-class classification problem. The dataset illustrated in Figure
    [20-2](#Fig2) has the output *y* (i.e., eye disease) = {disease, no-disease} is
    an example of dataset with binary targets.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig2_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 20-2
  prefs: []
  type: TYPE_NORMAL
- en: Two-class classification problem
  prefs: []
  type: TYPE_NORMAL
- en: From the illustration in Figure [20-3](#Fig3), the linear regression algorithm
    is susceptible to plot inaccurate decision boundaries especially in the presence
    of outliers (as seen toward the far right of the graph in Figure [20-3](#Fig3)).
    Moreover, the linear regression model will be looking to learn a real-valued output,
    whereas a classification learning problem predicts the class membership of an
    observation using probability estimates.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig3_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 20-3
  prefs: []
  type: TYPE_NORMAL
- en: Linear regression on a classification dataset
  prefs: []
  type: TYPE_NORMAL
- en: Introducing the Logit or Sigmoid Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The logistic function, also known as the logit or the sigmoid function, is responsible
    for constraining the output of the cost function so that it becomes a probability
    output between 0 and 1\. The sigmoid function is formally written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ h(t)=\frac{1}{1+{e}^{-t}} $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The logistic regression model is formally similar to the linear regression
    model except that it is acted upon by the sigmoid model. The following is the
    formal representation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y}={\theta}_0+{\theta}_1{x}_1+{\theta}_2{x}_2+\dots +{\theta}_n{x}_n
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ h\left(\hat{y}\right)=\frac{1}{1+{e}^{-\hat{y}}} $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: where 0 ≤ *h*(*t*) ≤ 1\. The sigmoid function is graphically shown in Figure
    [20-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig4_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 20-4
  prefs: []
  type: TYPE_NORMAL
- en: Logistic function
  prefs: []
  type: TYPE_NORMAL
- en: The sigmoid function, which looks like an *S* curve, rises from 0 and plateaus
    at 1\. From the sigmoid function shown in Figure [20-4](#Fig4), as ![$$ \hat{y}
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_IEq1.png) increases
    to positive infinity, the sigmoid output gets closer to 1, and as *t* decreases
    toward negative infinity, the sigmoid function outputs 0.
  prefs: []
  type: TYPE_NORMAL
- en: Training the Logistic Regression Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The logistic regression cost function is formally written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Cost\left(h(t),y\right)=\Big\{-\mathit{\log}\left(h(t)\right)\  if\ y=1-\mathit{\log}\left(1-h(t)\right)\  if\
    y=0 $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: The cost function also known as ***log-loss*** is set up in this form to output
    the penalty of the algorithm if the model predicts a wrong class. To give more
    intuition, take, for example, a plot of − *log* (*h*(*t*)) when *y* = 1 in Figure
    [20-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig5_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 20-5
  prefs: []
  type: TYPE_NORMAL
- en: Plot of *h*(*t*) when *y* = 1
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [20-5](#Fig5), if the algorithm correctly predicts that the target
    is 1, then the cost tends toward 0\. However, if the algorithm *h*(*t*) predicts
    incorrectly the target as 0, then the cost on the model grows exponentially large.
    The converse is the case with the plot of − *log* (1 − *h*(*t*)) when y = 0.
  prefs: []
  type: TYPE_NORMAL
- en: The logistic model is optimized using gradient descent to find the optimal values
    of the parameter *θ* that minimizes the cost function to predict the class with
    the highest probability estimate.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-class Classification/Multinomial Logistic Regression
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In multi-class or multinomial logistic regression, the labels of the dataset
    contain more than 2 classes. The multinomial logistic regression setup (i.e.,
    the cost function and optimization procedure) is structurally similar to logistic
    regression; the only difference is that the output of logistic regression is 2
    classes, while multinomial has greater than 2 classes (see Figure [20-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_20_Chapter/463852_1_En_20_Fig6_HTML.jpg](../images/463852_1_En_20_Chapter/463852_1_En_20_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 20-6
  prefs: []
  type: TYPE_NORMAL
- en: An illustration of multinomial regression
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [20-6](#Fig6), the multi-class logistic regression builds a one-vs.-rest
    classifier to construct decision boundaries for the different class memberships.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, we introduce a critical function in machine learning called the
    softmax function. The softmax function is used to compute the probability that
    an instance belongs to one of the *K* classes when *K* > 2\. We will see the softmax
    function show up again when we discuss (artificial) neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: In order to build a classification model with *k* classes, the multinomial logistic
    model is formally defined as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \hat{y}(k)={\theta}_0^k+{\theta}_1^k{x}_1+{\theta}_2^k{x}_2+\dots +{\theta}_n^k{x}_n
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: The preceding model takes into consideration the parameters for the k different
    classes.
  prefs: []
  type: TYPE_NORMAL
- en: The softmax function is formally written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ p(k)=\sigma {\left(\hat{y}(k)\right)}_i=\frac{e^{\hat{y}{(k)}_i}}{\sum_{j=1}^K{e}^{\hat{y}\hat{(k)_j}\Big({k}_j}}
    $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: where
  prefs: []
  type: TYPE_NORMAL
- en: '*i* = {1, …, *K*} classes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![$$ \sigma {\left(\hat{y}(k)\right)}_i $$](../images/463852_1_En_20_Chapter/463852_1_En_20_Chapter_TeX_IEq2.png)
    outputs the probability estimates that an example in the training dataset belongs
    to one of the *K* classes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The cost function for learning the class labels in a multinomial logistic regression
    model is called the ***cross-entropy*** cost function. Gradient descent is used
    to find the optimal values of the parameter *θ* that will minimize the cost function
    to ***predict the class with the highest probability estimate accurately***.
  prefs: []
  type: TYPE_NORMAL
- en: Logistic Regression with Scikit-learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this example, we will implement a multi-class logistic regression model with
    Scikit-learn. The model will predict the three species of flowers from the Iris
    dataset. The dataset contains 150 observations and 4 features. For this example,
    we use the accuracy metric and confusion matrix to access the model’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'Take note of the following in the preceding code block:'
  prefs: []
  type: TYPE_NORMAL
- en: The logistic regression model is initialized by calling the method LogisticRegression(solver=‘lbfgs’,
    multi_class=‘ovr’). The attribute ‘multi_class’ is set to ‘ovr’ to create a one-vs.-rest
    classifier.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The confusion matrix for a multi-class learning problem uses the `multilabel_confusion_matrix’
    to calculate classwise confusion matrices where the labels are binned in a one-vs.-rest
    manner. As an example, the first matrix is interpreted as the difference between
    the actual and predicted targets for class 1 against other classes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Optimizing the Logistic Regression Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section surveys a few techniques to consider in optimizing/improving the
    performance of logistic regression models.
  prefs: []
  type: TYPE_NORMAL
- en: '**In the case of Bias (i.e., when the accuracy is poor with training data)**'
  prefs: []
  type: TYPE_NORMAL
- en: Remove highly correlated features. Logistic regression is susceptible to degraded
    performance when highly correlated features are present in the dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Logistic regression will benefit from standardizing the predictors by applying
    feature scaling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Good feature engineering to remove redundant features or recombine features
    based on intuition into the learning problem can improve the classification model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applying log transforms to normalize the dataset can boost logistic regression
    classification accuracy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**In the case of variance (i.e., when the accuracy is good with training data,
    but poor on test data)**'
  prefs: []
  type: TYPE_NORMAL
- en: Applying regularization (more on this in Chapter [21](463852_1_En_21_Chapter.xhtml))
    is a good technique to prevent overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter provides a brief overview of logistic regression for building classification
    models. The chapter includes practical steps for implementing a logistic regression
    classifier with Scikit-learn. In the next chapter, we will examine the concept
    of applying regularization to linear models to mitigate the problem of overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: 21. Regularization for Linear Models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Regularization is the technique of adding a parameter, *λ*, to the loss function
    of a learning algorithm to improve its ability to generalize to new examples by
    reducing overfitting. The role of the extra regularization parameter is to shrink
    or to minimize the measure of the weights (or parameters) of the other features
    in the model.
  prefs: []
  type: TYPE_NORMAL
- en: Regularization is applied to linear models such as polynomial linear regression
    and logistic regression which are susceptible to overfitting when high-order polynomial
    features are added to the set of features.
  prefs: []
  type: TYPE_NORMAL
- en: How Does Regularization Work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: During model building, the regularization parameter *λ* is calibrated to determine
    how much the magnitude of other features in the model is adjusted when training
    the model. The higher the value of the regularization, the more the magnitude
    of the feature weights is reduced.
  prefs: []
  type: TYPE_NORMAL
- en: If the regularization parameter is set too close to zero, it reduces the regularization
    effect on the feature weights of the model. At zero, the penalty the regularization
    term imposes is virtually non-existent, and the model is as if the regularization
    term was never present.
  prefs: []
  type: TYPE_NORMAL
- en: Effects of Regularization on Bias vs. Variance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The higher the value of *λ* (i.e., the regularization parameter), the more restricted
    the coefficients (or weights) of the cost function. Hence, if the value of *λ*
    is high, the model can result in a learning bias (i.e., it underfits the dataset).
  prefs: []
  type: TYPE_NORMAL
- en: However, if the value of *λ* approaches zero, the regularization parameter has
    negligible effects on the model, hence resulting in overfitting the model. Regularization
    is an important technique and should be used when injecting polynomial features
    into linear or logistic regression classifiers to learn non-linear relationships.
  prefs: []
  type: TYPE_NORMAL
- en: Applying Regularization to Models with Scikit-learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The technique of adding a penalty to restrain the values of the parameters of
    the model is also known as Ridge regression or Tikhonov regularization. In this
    section we will build a linear and logistic regression model with regularization.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Regression with Regularization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This code block is similar to the polynomial linear regression example in Chapter
    [19](463852_1_En_19_Chapter.xhtml). The model will predict house prices from the
    Boston house-prices dataset. However, this model includes regularization.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Take note of the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The method Ridge(alpha=1.0) initializes a linear regression model with regularization,
    where the attribute ‘alpha’ controls the magnitude of the regularization parameter.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Logistic Regression with Regularization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This code block here is also similar to the example in Chapter [20](463852_1_En_20_Chapter.xhtml)
    on logistic regression. The model will predict the three species of flowers from
    the Iris dataset. The addition to this code segment is the inclusion of a regularization
    term to the logistic model using the ‘RidgeClassifier’ package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: In the preceding code block, logistic regression with regularization is implemented
    by the method ‘RidgeClassifier()’. The reduced accuracy observed in this example
    when regularization is applied to logistic regression is because the algorithm
    is restricting the values of the model parameters to prevent high variance on
    a dataset that is fairly simplistic and already has high accuracy on test samples
    without regularization.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter discusses the role of regularization in linear models like linear
    and logistic regression. Other forms of regularization exist for other model types
    such as early stopping for neural networks (to be discussed later in Chapter [34](463852_1_En_34_Chapter.xhtml)).
    Regularization is an important technique when designing machine learning models.
    The next chapter will discuss and implement another important machine learning
    algorithm known as support vector machines.
  prefs: []
  type: TYPE_NORMAL
- en: 22. Support Vector Machines
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Support vector machine (SVM) is a machine learning algorithm for learning classification
    and regression models. To build intuition, we will consider the case of learning
    a classification model with SVM. Given a dataset with two target classes that
    are linearly separable, it turns out that there exists an infinite number of lines
    that can discriminate between the two classes (see Figure [22-1](#Fig1)). The
    goal of the SVM is to find the best line that separates the two classes. In higher
    dimensions, this line is called a hyperplane.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig1_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-1
  prefs: []
  type: TYPE_NORMAL
- en: Infinite set of discriminants
  prefs: []
  type: TYPE_NORMAL
- en: What Is a Hyperplane?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A hyperplane is a line or more technically called a discriminant that separates
    two classes in n-dimensional space. When a hyperplane is drawn in 2-D space, it
    is called a line. In 3-D space, it is called a plane, and in dimensions greater
    than 3, the discriminant is called a hyperplane (see Figure [22-2](#Fig2)). For
    any n-dimensional world, we have n-1 hyperplanes.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig2_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: A hyperplane in 2-D is a line. Right: A hyperplane in 3-D is a plane.
    For dimension greater than 3, visualization becomes difficult.'
  prefs: []
  type: TYPE_NORMAL
- en: Finding the Optimal Hyperplane
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The best hyperplane that linearly separates two classes is identified as the
    line lying at the largest margin from the nearest vectors at the boundary of the
    two classes.
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [22-3](#Fig3), we observe that the best hyperplane is the line at
    the exact center of the two classes and constitutes the largest margin between
    both classes. Hence, this optimal hyperplane is also known as the largest margin
    classifier.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig3_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-3
  prefs: []
  type: TYPE_NORMAL
- en: The largest margin classifier
  prefs: []
  type: TYPE_NORMAL
- en: The boundary points of the respective classes which are known as the support
    vectors are essential in finding the optimal hyperplane. The support vectors are
    illustrated in Figure [22-4](#Fig4). The boundary points are called support vectors
    because they are used to determine the maximum distance between the class they
    belong to and the discriminant function separating the classes.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig4_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-4
  prefs: []
  type: TYPE_NORMAL
- en: Support vectors
  prefs: []
  type: TYPE_NORMAL
- en: The mathematical formulation for finding the margin and consequently the hyperplane
    that maximizes the margin is beyond the scope of this book, but suffice to say
    this technique involves the Lagrange multiplier.
  prefs: []
  type: TYPE_NORMAL
- en: The Support Vector Classifier
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the real world, it is difficult to find data points that are precisely linearly
    separable and for which exists a large margin hyperplane. In Figure [22-5](#Fig5),
    the left image represents the data points for two classes in a dataset. Observe
    that there readily exists a linear separator between those two classes. Now, suppose
    we have an additional point from class 1 adjusted in such a way that it is much
    closer to class 2, we see that this point upsets the location of the hyperplane
    as seen in the right image of Figure [22-5](#Fig5). This reveals the sensitivity
    of the hyperplane to an additional data point that may result in a very narrow
    margin.
  prefs: []
  type: TYPE_NORMAL
- en: This sensitivity to data samples has significant drawbacks, the first being
    that the distance between the support vectors and the hyperplane reflects the
    confidence in the classification accuracy. Also, the drastic change in the position
    of the hyperplane due to a single additional point shows that the classifier is
    susceptible to high variability and can overfit the training data.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig5_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: A linearly separable data distribution with a large margin. Right: The
    data point distribution makes it more difficult to find a large margin classifier
    that linearly separates the two classes'
  prefs: []
  type: TYPE_NORMAL
- en: The goal of the support vector classifier is to find a hyperplane that nearly
    discriminates between the two classes. This technique is also called a soft margin.
    A soft margin is tuned to ignore a degree of error when finding the separating
    hyperplane. This concept of a soft margin is how we generalize the support vector
    classifier to find a hyperplane in datasets that are not readily linearly separable.
    The margin is called soft because some examples are purposefully misclassified.
  prefs: []
  type: TYPE_NORMAL
- en: In such cases, as outlined in Figure [22-5](#Fig5), a soft margin classifier
    is preferred as it is more insensitive to individual data points and overall will
    have a better chance of generalizing to new examples. Howbeit, this might misclassify
    a couple of examples while training, but this is overall beneficial to the quality
    of the classifier as it generalizes to new samples.
  prefs: []
  type: TYPE_NORMAL
- en: Again, the margin is called soft because some examples are allowed to violate
    the margin or even be misclassified by the hyperplane to preserve overall generalizability.
    This is illustrated in Figure [22-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig6_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: An example of a soft margin with points allowed to violate the margin.
    Right: An example with some points intentionally misclassified.'
  prefs: []
  type: TYPE_NORMAL
- en: The C Parameter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The C parameter is the hyper-parameter that is responsible for controlling the
    degree of violations to the margins or the number of intentionally misclassified
    points allowed by the support vector classifier. The C hyper-parameter is a non-negative
    real number. When this C parameter is set to 0, the classifier becomes the large
    margin classifier.
  prefs: []
  type: TYPE_NORMAL
- en: In a soft margin classifier, the C parameter is tuned by adjusting its values
    to control the tolerance of the margin. With larger values of C, the classifier
    margins become wider and more tolerant to violations and misclassifications. However,
    with smaller values of C, the margins become narrower and are less tolerant of
    violations and misclassified points.
  prefs: []
  type: TYPE_NORMAL
- en: Observe that the C hyper-parameter is vital for regulating the bias/variance
    trade-off of the support vector classifier. The higher the value of C, our classifier
    is more prone to variability in the data points and can under-simplify the learning
    problem. Also, if C is set closer to zero, it results in a much narrower margin,
    and this can overfit the classifier, leading to high variance – and this will
    likely fail to generalize to new examples (see Figure [22-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig7_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-7
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: Higher values of C result in wider margins with more tolerance. Right:
    Lower values of C result in narrower margins with less tolerance'
  prefs: []
  type: TYPE_NORMAL
- en: Multi-class Classification
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Previously, we have used the SVC to build a discriminant classifier for binary
    classes. What happens when we have more than two classes of outputs in the dataset,
    which is often the case in practice? The SVM can be extended for classifying k
    classes within a dataset, where k > 2\. This extension is, however, not trivial
    with the SVM. There exist two standard approaches for addressing this problem.
    The first is the one-vs.-one (OVO) multi-class classification, while the other
    is the one-vs.-all (OVA) or one-vs.rest (OVR) multi-class classification technique.
  prefs: []
  type: TYPE_NORMAL
- en: One-vs.-One (OVO)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the one-vs.-one approach, when the number of classes, k, is greater than
    2, the algorithm constructs “k combination 2”, ![$$ \left(\frac{k}{2}\right) $$](../images/463852_1_En_22_Chapter/463852_1_En_22_Chapter_TeX_IEq1.png)
    classifiers, where each classifier is for a pair of classes. So if we have 10
    classes in our dataset, a total of 45 classifiers is constructed or trained for
    every pair of classes. This is illustrated with four classes in Figure [22-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: After training, the classifiers are evaluated by comparing examples from the
    test set against each of the ![$$ \left(\frac{k}{2}\right) $$](../images/463852_1_En_22_Chapter/463852_1_En_22_Chapter_TeX_IEq2.png)classifiers.
    The predicted class is then determined by choosing the highest number of times
    an example is assigned to a particular class.
  prefs: []
  type: TYPE_NORMAL
- en: The one-vs.-one multi-class technique can potentially lead to a large number
    of constructed classifiers and hence can result in slower processing time. Conversely,
    the classifiers are more robust to class imbalances when training each classifier.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig8_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-8
  prefs: []
  type: TYPE_NORMAL
- en: Suppose we have four classes in the dataset labeled A to D, this will result
    in six different classifiers
  prefs: []
  type: TYPE_NORMAL
- en: One-vs.-All (OVA)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The one-vs.-all method for fitting an SVM to a multi-classification problem
    where the number of classes k is greater than 2 consists of fitting each k class
    against the remaining k – 1 classes. Suppose we have ten classes, each of the
    classes will be classified against the remaining nine classes. This example is
    illustrated with four classes in Figure [22-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig9_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-9
  prefs: []
  type: TYPE_NORMAL
- en: Given four classes in a dataset, we construct four classifiers, with each class
    fitted against the rest
  prefs: []
  type: TYPE_NORMAL
- en: The classifiers are evaluated by comparing a test example to each fitted classifier.
    The classifier for which the margin of the hyperplane is the largest is chosen
    as the predicted classification target because the classifier margin size is indicative
    of high confidence of class membership.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Kernel Trick: Fitting Non-linear Decision Boundaries'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Non-linear datasets occur more often than not in real world scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Technically speaking, the name support vector machine is when a support vector
    classifier is used with a non-linear kernel to learn non-linear decision boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: SVM uses an essential technique for extending the feature space of a dataset
    to construct a non-linear classifier. This technique is called kernel and is popularly
    known as the kernel trick. Figure [22-10](#Fig10) illustrates the kernel trick
    as an extra dimension is added to the feature space.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig10_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-10
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: Linear discriminant to non-linear data. Right: By using the kernel trick,
    we can linearly separate a non-linear dataset by adding an extra dimension to
    the feature space.'
  prefs: []
  type: TYPE_NORMAL
- en: Adding Polynomial Features
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The feature space of the dataset can be extended by adding higher-order polynomial
    terms or interaction terms. For example, instead of training the classifier with
    linear features, we can add polynomial features or add interaction terms to our
    model.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the dimensions of the dataset, the combinations for extending the
    feature space can quickly become unmanageable, and this can easily lead to a model
    that overfits the test set and also become expensive to compute with a larger
    feature space.
  prefs: []
  type: TYPE_NORMAL
- en: Kernels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Kernel is a mathematical procedure for extending the feature space of a dataset
    to learn non-linear decision boundaries between different classes. The mathematical
    details of kernels are beyond the scope of this text. Suffice to say that a kernel
    can be seen as a mathematical function that captures similarity between data samples.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Kernel
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The support vector classifier is the same as a linear kernel. It is also known
    as a linear kernel because the feature space of the support vector classifier
    is linear.
  prefs: []
  type: TYPE_NORMAL
- en: Polynomial Kernel
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The kernel can also be expressed as a polynomial. With this, a support vector
    classifier is trained on higher-dimensional polynomial features without manually
    adding an exponential number of polynomial features to the dataset. Adding a polynomial
    kernel to the support vector classifier enables the classifier to learn a non-linear
    decision boundary.
  prefs: []
  type: TYPE_NORMAL
- en: Radial Basis Function or the Radial Kernel
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The radial basis function or radial kernel is another non-linear kernel that
    enables the support vector classifier to learn a non-linear decision boundary.
    The radial kernel is similar to adding multiple similarity features to the space.
    For the radial basis function, a hyper-parameter called gamma, *γ*, is used to
    control the flexibility of the non-linear decision boundary. The smaller the gamma
    value, the less complex (or flexible) the non-linear discriminant becomes, but
    a larger value for gamma leads to a more flexible and sophisticated decision boundary
    that tightly fits the non-linearity in the data, which can inadvertently lead
    to overfitting. This is illustrated in Figure [22-11](#Fig11). RBF is a popular
    kernel option used in practice.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_22_Chapter/463852_1_En_22_Fig11_HTML.jpg](../images/463852_1_En_22_Chapter/463852_1_En_22_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 22-11
  prefs: []
  type: TYPE_NORMAL
- en: 'An illustration of adjusting the radial basis function *γ* parameter, together
    with the C parameter of the support vector classifier to fit a non-linear decision
    boundary. Left: RBF kernel with C = 1 and *γ* = 10^(−3). Right: RBF kernel with
    C = 1 and *γ* = 10^(−5).'
  prefs: []
  type: TYPE_NORMAL
- en: When using the radial kernel with the support vector classifier, the values
    of C and gamma are hyper-parameters that are tuned to find an appropriate level
    of model flexibility that generalizes to new examples when deployed.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, a linear kernel or support vector classifier sometimes surprisingly
    performs well when used to map a function to non-linear data. This observation
    follows Occam’s razor which suggests that it is advantageous to select the simplest
    hypothesis to solve a problem in the presence of more complex options.
  prefs: []
  type: TYPE_NORMAL
- en: Also, with regard to choosing the best set of C and gamma, *γ*, to avoid overfitting,
    a grid search is used to explore a range of values for the hyper-parameters and
    come up with the combination that performs best on test data. The grid search
    is used in conjunction with cross-validation approaches. However, the grid search
    procedure can be potentially computationally expensive.
  prefs: []
  type: TYPE_NORMAL
- en: Support vector machines perform well with high-dimensional data. However, they
    are preferred for small or medium-sized datasets. For humongous datasets, SVMs
    become computationally infeasible. Another limitation is that the performance
    of SVMs is known to plateau at some point, even when there exist large training
    samples. This is one of the motivations and advantages of deep neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: Support Vector Machines with Scikit-learn
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In Scikit-learn, **SVC** is the SVM package for classification, while **SVR**
    is the SVM package for regression. The attribute ‘gamma’ in both the SVC and SVR
    methods controls the flexibility of the decision boundary, and the default kernel
    is the radial basis function (rbf).
  prefs: []
  type: TYPE_NORMAL
- en: SVM for Classification
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: In this code example, we will build an SVM classification model to predict the
    three species of flowers from the Iris dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: SVM for Regression
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: In this code example, we will build an SVM regression model to predict house
    prices from the Boston house-prices dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: In this chapter, we surveyed the support vector machine algorithm and its implementation
    with Scikit-learn. In the next chapter, we will discuss on ensemble methods that
    combine outputs of multiple classifiers or weak learners to build better prediction
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 23. Ensemble Methods
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Ensemble learning is a technique that combines the output of multiple classifiers
    also called weak learners to build a more robust prediction model. Ensemble methods
    work by combining a group of classifiers (or models) to get an enhanced prediction
    accuracy. The idea behind an “ensemble” is that the performance from the average
    of a group of classifiers will be better than each classifier on its own. So each
    classifier is called a “weak” learner.
  prefs: []
  type: TYPE_NORMAL
- en: Ensemble learners are usually high-performing algorithms for both classification
    and regression tasks and are mostly competition-winning algorithms. Examples of
    ensemble learning algorithms are Random Forest (RF) and Stochastic Gradient Boosting
    (SGB). We will motivate our discussion of ensemble methods by first discussing
    decision trees because ensemble classifiers such as RF and SGB are built by combining
    several decision tree classifiers.
  prefs: []
  type: TYPE_NORMAL
- en: Decision Trees
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Decision trees, more popularly known as classification and regression trees
    (CART), can be visualized as a graph or flowchart of decisions. A branch connects
    the nodes in the graph, the last node of the graph is called a terminal node,
    and the topmost node is called the root. As seen in Figure [23-1](#Fig1), when
    constructing a decision tree, the root is at the top, while the branches connect
    nodes at lower layers until the terminal node.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig1_HTML.jpg](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 23-1
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of a decision tree
  prefs: []
  type: TYPE_NORMAL
- en: On Regression and Classification with CART
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A classification or regression tree is built by randomly splitting the set of
    attributes of the given dataset into distinct regions. The data points that fall
    within a particular region are used to form the predictor from the means of the
    targets in the regression case and the highest occurring class in the classification
    setting.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, if an unseen observation or test data falls within a region, the mean
    or modal class is used to predict the output for regression and classification
    problems, respectively. In regression trees, the output variable is continuous,
    whereas in classification trees, the output variable is categorical. The terminal
    node of a regression tree takes the average of the samples in that region, while
    the terminal node of a classification tree is the highest occurring class in that
    area.
  prefs: []
  type: TYPE_NORMAL
- en: The process of splitting the features of the dataset into regions is by a greedy
    algorithm called recursive binary splitting. This strategy works by continuously
    dividing the feature space into two new branches or regions until a stopping criterion
    is reached.
  prefs: []
  type: TYPE_NORMAL
- en: Growing a Regression Tree
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In regression trees, the recursive binary splitting technique is used to divide
    a particular feature in the dataset into two regions. The splitting is carried
    out by choosing a value of the feature that minimizes the regression error measure.
    This step is done for all the predictors in the dataset by finding a value that
    reduces the squared error of the final tree. This process is repeated continuously
    for every sub-tree or sub-region until a stopping criterion is reached. For example,
    we can stop the algorithm when no region contains less than ten observations.
    An example of a tree resulting from the splitting of a feature space into six
    regions is shown in Figure [23-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig2_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 23-2
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: An example of splitting a 2-D dataset into sub-trees/regions using the
    recursive binary splitting technique. Right: The resulting tree from the partitioning
    on the left.'
  prefs: []
  type: TYPE_NORMAL
- en: Growing a Classification Tree
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Growing a classification tree is very similar to the regression tree setting
    described in Figure [23-2](#Fig2). The difference here is that the error measure
    to minimize is no longer the squared error, but the misclassification error. This
    is because a classification tree is for predicting a qualitative response, where
    a data point is assigned to a particular region based on the modal value or the
    highest occurring class in that region.
  prefs: []
  type: TYPE_NORMAL
- en: Two algorithms for selecting which value to use for splitting the feature space
    in a classification setting are the Gini index and entropy; further discussions
    on these are beyond the scope of this chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Tree Pruning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tree pruning is a technique for dealing with model overfitting when growing
    trees. Fully grown trees have a high tendency to overfit with high variances when
    applied to unseen samples.
  prefs: []
  type: TYPE_NORMAL
- en: Pruning involves growing a large tree and then pruning or clipping it to create
    a sub-tree. By doing so, we can have a full picture of the tree performance and
    then select a sub-tree that results in a minimized error measure on the test dataset.
    The technique for selecting the best sub-tree is called the cost complexity pruning
    or the weakest link pruning.
  prefs: []
  type: TYPE_NORMAL
- en: Strengths and Weaknesses of CART
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the significant advantages of CART models is that they perform well on
    linear and non-linear datasets. Moreover, CART models implicitly take care of
    feature selection and work well with high-dimensional datasets.
  prefs: []
  type: TYPE_NORMAL
- en: On the flip side, CART models can very easily overfit the dataset and fail to
    generalize to new examples. This downside is mitigated by aggregating a large
    number of decision trees in techniques like Random forests and boosting ensemble
    algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: CART with Scikit-learn
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we will implement a classification and regression decision
    tree classifier with Scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: Classification Tree with Scikit-learn
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example, we will build a classification decision tree classifier
    to predict the species of flowers from the Iris dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Regression Tree with Scikit-learn
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example, we will build a regression decision tree classifier to
    predict house prices from the Boston house-prices dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Random Forests
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Random forest is a robust machine learning algorithm and is often the algorithm
    of choice for many classification and regression problems. It is a popular algorithm
    in machine learning competitions.
  prefs: []
  type: TYPE_NORMAL
- en: Random forest builds an ensemble classifier from a combination of several decision
    tree classifiers. This does an excellent job of reducing the variance that may
    be found in a single decision tree classifier.
  prefs: []
  type: TYPE_NORMAL
- en: Random forest is an improvement on the bagging ensemble algorithm (also known
    as bootstrap aggregation) which involves creating a large number of fully grown
    decision trees by repeatedly selecting random samples from the training dataset
    (also called bootstrapping). The result of these trees is then averaged to smoothen
    out the variance.
  prefs: []
  type: TYPE_NORMAL
- en: Random forest improves this bagging procedure by using only a subset of the
    features or attributes in the training dataset on each tree split. In doing this,
    Random forest creates trees whose average is more robust and less prone to high
    variances.
  prefs: []
  type: TYPE_NORMAL
- en: Observe that the principal distinction between bagging and Random forests is
    the choice of features when splitting the feature space or when building the tree.
    Bagging makes use of the entire features in the dataset, whereas Random forest
    imposes a constraint on the number of features and uses only a subset of features
    on each tree split to reduce the correlation of each sub-tree. Empirically, the
    size of features for each tree split using Random forests is the square root of
    the original number of predictors.
  prefs: []
  type: TYPE_NORMAL
- en: Making Predictions with Random Forests
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In order to make a prediction using Random forest, the test example is passed
    through each trained decision tree. For the regression case, a prediction is made
    for a new example by taking the average of the outputs of the different trees.
    In the case of classification problems, the prediction is the class with the most
    votes from all other trees in the forest. This is best illustrated in Figure [23-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig3_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 23-3
  prefs: []
  type: TYPE_NORMAL
- en: Take a majority vote to determine the final class in the classification case
    and the average of the values in each tree to determine the predicted value in
    the regression case
  prefs: []
  type: TYPE_NORMAL
- en: Random Forests with Scikit-learn
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section will implement Random forests with Scikit-learn for both regression
    and classification use cases.
  prefs: []
  type: TYPE_NORMAL
- en: Random Forests for Classification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example, we will build a Random forest classification model to
    predict the species of flowers from the Iris dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Random Forests for Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example, we will build a Random forest regression model to predict
    house prices from the Boston house-prices dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Stochastic Gradient Boosting (SGB)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Boosting involves growing trees in succession using knowledge from the residuals
    of the previously grown tree. In this case, each successive tree works to improve
    the model of the previous tree by boosting the areas in which the previous tree
    did not perform so well without affecting the areas of high performance. By doing
    this, we iteratively create a model that reduces the residual variance when generalizing
    to test examples. Boosting is illustrated in Figure [23-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_23_Chapter/463852_1_En_23_Fig4_HTML.png](../images/463852_1_En_23_Chapter/463852_1_En_23_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 23-4
  prefs: []
  type: TYPE_NORMAL
- en: An illustration of boosting
  prefs: []
  type: TYPE_NORMAL
- en: Gradient boosting evaluates the difference of the residuals for each tree and
    then uses that information to determine how to split the feature space in the
    successive tree.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient boosting employs a pseudo-gradient in computing the residuals. This
    gradient is the direction of quickest improvement to the loss function. The residual
    variance is minimized as the gradient moves in the direction of steepest descent.
    This movement is the same as the stochastic gradient descent algorithm discussed
    in Chapter [16](463852_1_En_16_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: Tree Depth/Number of Trees
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Gradient boosting can be controlled by choosing the tree depth as a hyper-parameter
    to the model. In practice, a tree depth of 1 performs well, as each tree consists
    of just a single split. Also, the number of trees can affect the model accuracy,
    because gradient boosting can overfit if the number of successive trees is vast.
  prefs: []
  type: TYPE_NORMAL
- en: Shrinkage
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The shrinkage hyper-parameter *λ* controls the learning rate of the gradient
    boosting model. An arbitrarily small value of *λ* may necessitate a larger number
    of trees to obtain a good model performance. However, with a small shrinkage size
    and tree depth *d* = 1, the residuals slowly improve by creating more varied trees
    to improve the worst performing areas of the model. Rule of thumb: shrinkage size
    is 0.01 or 0.001.'
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic Gradient Boosting with Scikit-learn
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section will implement SGB with Scikit-learn for both regression and classification
    use cases.
  prefs: []
  type: TYPE_NORMAL
- en: SGB for Classification
  prefs:
