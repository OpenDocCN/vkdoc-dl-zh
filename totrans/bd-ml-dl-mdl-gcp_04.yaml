  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: SGB for Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example , we will build a SGB regression model to predict house
    prices from the Boston house-prices dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: XGBoost (Extreme Gradient Boosting)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: XGBoost which is short for Extreme Gradient Boosting makes a couple of computational
    and algorithmic modifications to the stochastic gradient boosting algorithm. This
    enhanced algorithm is a favorite in machine learning practice due to its speed
    and has been the winning algorithm in many machine learning competitions. Let’s
    go through some of the modifications made by the XGBoost algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: 'Parallel training: XGBoost supports parallel training over multiple cores.
    This has made XGBoost extremely fast compared to other machine learning algorithms.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Out of core computation: XGBoost facilitates training from data not loaded
    into memory. This feature is a huge advantage when you’re dealing with large datasets
    that may not necessarily fit into the RAM of the computer.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Sparse data optimization: XGBoost is optimized to handle and speed up computation
    with sparse matrices. Sparse matrices contain lots of zeros in its cells.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: XGBoost with Scikit-learn
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section will implement XGBoost with Scikit-learn for both regression and
    classification use cases.
  prefs: []
  type: TYPE_NORMAL
- en: XGBoost for Classification
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example, we will build a XGBoost classification model to predict
    the species of flowers from the Iris dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: XGBoost for Regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this code example, we will build a XGBoost regression model to predict house
    prices from the Boston house-prices dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: In this chapter, we surveyed and implemented ensemble machine learning algorithms
    that combine weak decision tree learners to create a strong classifier for learning
    regression and classification problems. In the next chapter, we will discuss more
    techniques for implementing supervised machine learning models with Scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: 24. More Supervised Machine Learning Techniques with Scikit-learn
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter will cover using Scikit-learn to implement machine learning models
    using techniques such as
  prefs: []
  type: TYPE_NORMAL
- en: Feature engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Resampling methods
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Model evaluation methods
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pipelines for streamlining machine learning workflows
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Techniques for model tuning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature Engineering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature engineering is the process of systematically choosing the set of features
    in the dataset that are useful and relevant to the learning problem. It is often
    the case that irrelevant features negatively affect the performance of the model.
    This section will review some techniques implemented in Scikit-learn for selecting
    relevant features from a dataset. The techniques surveyed include
  prefs: []
  type: TYPE_NORMAL
- en: Statistical tests to select the best *k* features using the **SelectKBest**
    module
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recursive feature elimination (RFE) to recursively remove irrelevant features
    from the dataset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Principal component analysis to select the components that account for the variation
    in the dataset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature importances using ensembled or tree classifiers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Statistical Tests to Select the Best ***k*** Features Using the SelectKBest
    Module
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following list is a selection of statistical tests to use with **SelectKBest**.
    The choice depends if the dataset target variable is numerical or categorical:'
  prefs: []
  type: TYPE_NORMAL
- en: ANOVA F-value, **f_classif** (classification)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chi-squared stats of non-negative features, **chi2** (classification)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: F-value, **f_regression** (regression)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mutual information for a continuous target, **mutual_info_regression** (regression)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s see an example using chi-squared test to select the best variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: From the test scores, the top 3 important features in the dataset are ranked
    from feature 3 to 4 to 1 and to 2 in order. The data scientist can choose to drop
    the second column and observe the effect on the model performance.
  prefs: []
  type: TYPE_NORMAL
- en: We can transform the dataset to subset only the important features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: The result drops the second column of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Recursive Feature Elimination (RFE)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: RFE is used together with a learning model to recursively select the desired
    number of top performing features.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use RFE with **LinearRegression**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: From the result, the 4th, 5th, 6th, 8th, 11th, and 13th features are the top
    6 features in the Boston dataset .
  prefs: []
  type: TYPE_NORMAL
- en: Feature Importances
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tree-based or ensemble methods in Scikit-learn have a **feature_importances_**
    attribute which can be used to drop irrelevant features in the dataset using the
    **SelectFromModel** module contained in the **sklearn.feature_selection** package.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s used the ensemble method **AdaBoostClassifier** in this example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: Resampling Methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Resampling methods are a set of techniques that involve selecting a subset of
    the available dataset, training on that data subset, and using the remainder of
    the data to evaluate the trained model. Let’s review the techniques for resampling
    using Scikit-learn. This section covers
  prefs: []
  type: TYPE_NORMAL
- en: k-Fold cross-validation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leave-one-out cross-validation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: k-Fold Cross-Validation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In k-fold cross validation , the dataset is divided into k-parts or folds. The
    model is trained using *k* − 1 folds and evaluated on the remaining kth fold.
    This process is repeated k-times so that each fold can serve as a test set. At
    the end of the process, k-fold averages the result and reports a mean score with
    a standard deviation. Scikit-learn implements K-fold CV in the module **KFold**.
    The module **cross_val_score** is used to evaluate the cross-validation score
    using the splitting strategy, which is **KFold** in this case.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of this using the k-nearest neighbors (kNN) classification
    algorithm. When initializing **KFold**, it is standard practice to shuffle the
    data before splitting.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Leave-One-Out Cross-Validation (LOOCV)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In LOOCV just one example is assigned to the test set, and the model is trained
    on the remainder of the dataset. This process is repeated for all the examples
    in the dataset. This process is repeated until all the examples in the dataset
    have been used for evaluating the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Model Evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This chapter has already used a couple of evaluation metrics for assessing the
    quality of the fitted models. In this section, we survey a couple of other metrics
    for regression and classification use cases and how to implement them using Scikit-learn.
    For each metric, we show how to use them as stand-alone implementations, as well
    as together with cross-validation using the **cross_val_score** method.
  prefs: []
  type: TYPE_NORMAL
- en: What we’ll cover here includes
  prefs: []
  type: TYPE_NORMAL
- en: Regression evaluation metrics
  prefs: []
  type: TYPE_NORMAL
- en: 'Mean squared error (MSE): The average sum of squared difference between the
    predicted label, ŷ, and the true label, y. A score of 0 indicates a perfect prediction
    without errors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mean absolute error (MAE): The average absolute difference between the predicted
    label, ŷ, and the true label, y. A score of 0 indicates a perfect prediction without
    errors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'R²: The amount of variance or variability in the dataset explained by the model.
    The score of 1 means that the model perfectly captures the variability in the
    dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classification evaluation metrics
  prefs: []
  type: TYPE_NORMAL
- en: 'Accuracy: Is the ratio of correct predictions to the total number of predictions.
    The bigger the accuracy, the better the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Logarithmic loss (a.k.a logistic loss or cross-entropy loss): Is the probability
    that an observation is correctly assigned to a class label. By minimizing the
    log-loss, conversely, the accuracy is maximized. So with this metric, values closer
    to zero are good.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Area under the ROC curve (AUC-ROC): Used in the binary classification case.
    Implementation is not provided, but very similar in style to the others.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Confusion matrix: More intuitive in the binary classification case. Implementation
    is not provided, but very similar in style to the others.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Classification report: It returns a text report of the main classification
    metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regression Evaluation Metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following code is an example of regression evaluation metrics implemented
    stand-alone.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: The following code is an example of regression evaluation metrics implemented
    with cross-validation. The MSE and MAE metrics for cross-validation are implemented
    with the sign inverted. The simple way to interpret this is to have it in mind
    that the closer the values are to zero, the better the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: Classification Evaluation Metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following code is an example of classification evaluation metrics implemented
    stand-alone.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see an example of classification evaluation metrics implemented with cross-validation.
    Evaluation metrics for log-loss using cross-validation is implemented with the
    sign inverted. The simple way to interpret this is to have it in mind that the
    closer the values are to zero, the better the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: 'Pipelines: Streamlining Machine Learning Workflows'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The concept of pipelines in Scikit-learn is a compelling tool for chaining a
    bunch of operations together to form a tidy process flow of data transforms from
    one state to another. The operations that constitute a pipeline can be any of
    Scikit-learn’s transformers (i.e., modules with a **fit** and **transform** method,
    or a **fit_transform** method) or classifiers (i.e., modules with a **fit** and
    **predict** method, or a **fit_predict** method). Classifiers are also called
    predictors.
  prefs: []
  type: TYPE_NORMAL
- en: For a typical machine learning workflow, the steps taken may involve cleaning
    the data, feature engineering, scaling the dataset, and then fitting a model.
    Pipelines can be used in this case to chain these operations together into a coherent
    workflow. They have the advantage of providing a convenient and consistent interface
    for calling at once a sequence of operations.
  prefs: []
  type: TYPE_NORMAL
- en: These transformers or predictors are collectively called estimators in Scikit-learn
    terminology. In the last two paragraphs, we called them operations.
  prefs: []
  type: TYPE_NORMAL
- en: Another advantage of pipelines is that it safeguards against accidentally fitting
    a transform on the entire dataset and thereby leaking statistics influenced by
    the test data to the machine learning model while training. For example, if a
    standardizer is fitted on the whole dataset, the test set will be compromised
    because the test observations have contributed in estimating the mean and standard
    deviation for scaling the training set before fitting the model.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, only the last step of the pipeline can be a classifier or predictor.
    All the stages of the pipeline must contain a **transform** method except the
    final stage, which can be a transformer or a classifier.
  prefs: []
  type: TYPE_NORMAL
- en: To begin using Scikit-learn pipelines, first import
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see some examples of working with Pipelines in Scikit-learn. In the following
    example, we’ll apply a scaling transform to standardize our dataset and then use
    a support vector classifier to train the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: Pipelines Using make_pipeline
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another method for building machine learning pipelines is by using the **make_pipeline**
    method . For the next example, we use PCA to select the best six features and
    reduce the dimensionality of the dataset, and then we’ll fit the model using Random
    forests for regression.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: Pipelines Using FeatureUnion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Scikit-learn provides a module for merging the output of several transformers
    called **feature_union** . It does this by fitting each transformer independently
    to the dataset, and then their respective outputs are combined to form a transformed
    dataset for training the model.
  prefs: []
  type: TYPE_NORMAL
- en: FeatureUnion works in the same way as a Pipeline, and in many ways can be thought
    of as a means of building complex pipelines within a Pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example using FeatureUnion. Here, we will combine the output of
    recursive feature elimination (RFE) and PCA for feature engineering, and then
    we’ll apply the Stochastic Gradient Boosting (SGB) ensemble model for regression
    to train the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: Model Tuning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Each machine learning model has a set of options or configurations that can
    be tuned to optimize the model when fitting to data. These configurations are
    called **hyper-parameters** . Hence, for each hyper-parameter, there exist a range
    of values that can be chosen. Taking into consideration the number of hyper-parameters
    that an algorithm has, the entire space can become exponentially large and infeasible
    to explore all of them. Scikit-learn provides two convenient modules for searching
    through the hyper-parameter space of an algorithm to find the best values for
    each hyper-parameter that optimizes the model.
  prefs: []
  type: TYPE_NORMAL
- en: These modules are the
  prefs: []
  type: TYPE_NORMAL
- en: Grid search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Randomized search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grid Search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Grid search comprehensively explores all the specified hyper-parameter values
    for an estimator. It is implemented using the **GridSearchCV** module. Let’s see
    an example using the Random forest for regression. The hyper-parameters we’ll
    search over are
  prefs: []
  type: TYPE_NORMAL
- en: The number of trees in the forest, **n_estimators**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The maximum depth of the tree, **max_depth**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The minimum number of samples required to split an internal node, **min_samples_leaf**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: Randomized Search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As opposed to grid search, not all the provided hyper-parameter values are evaluated,
    but rather a determined number of hyper-parameter values are sampled from a random
    uniform distribution. The number of hyper-parameter values that can be evaluated
    is determined by the **n_iter** attribute of the **RandomizedSearchCV** module.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we will use the same scenario as in the grid search case.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: This chapter further explored using Scikit-learn to incorporate other machine
    learning techniques such as feature selection and resampling methods to develop
    a more robust machine learning method. In the next chapter, we will examine our
    first unsupervised machine learning method, clustering, and its implementation
    with Scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: 25. Clustering
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Clustering is an unsupervised machine learning technique for grouping homogeneous
    data points into partitions called clusters. In the example dataset illustrated
    in Figure [25-1](#Fig1), suppose we have a set of *n* points and 2 features. A
    clustering algorithm can be applied to determine the number of distinct subclasses
    or groups among the data samples.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig1_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-1
  prefs: []
  type: TYPE_NORMAL
- en: An illustration of clustering in a 2-D space
  prefs: []
  type: TYPE_NORMAL
- en: Clustering a 2-D dataset as seen in Figure [25-1](#Fig1) is relatively trivial.
    The real challenge arises when we have to perform clustering in higher-dimensional
    spaces. The question now is how do we ascertain or find out if a set of points
    are similar or if a set of points should be in the same group? In this section,
    we would cover two essential types of clustering algorithms known as k-means clustering
    and hierarchical clustering.
  prefs: []
  type: TYPE_NORMAL
- en: '*K*-means clustering is used when the number of anticipated distinct classes
    or sub-groups is known in advance. In hierarchical clustering, the exact number
    of clusters is not known, and the algorithm is tasked to find the optimal number
    of heterogeneous sub-groups in the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '*K*-Means Clustering'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: k-Means clustering is one of the most famous and widely used clustering algorithms
    in practice. It works by using a distance measurement (most commonly the Euclidean
    distance) to iteratively assign data points in a hyperspace to a set of non-overlapping
    clusters.
  prefs: []
  type: TYPE_NORMAL
- en: In *K*-means, the anticipated number of clusters, *K*, is chosen at the onset.
    The clusters are initialized by arbitrarily selecting at random one of the data
    points as an initial cluster for each *K*. The algorithm now works by iteratively
    assigning each point in the space to the cluster centroid that it is nearest to
    using the distance measurement.
  prefs: []
  type: TYPE_NORMAL
- en: After all the points have been assigned to their closest cluster point, the
    cluster centroid is adjusted to find a new center among the points in the cluster.
    This process is repeated until the algorithm converges, that is, when the cluster
    centroids stabilize and points do not readily swap clusters after every reassignment.
    These steps are illustrated in Figure [25-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig2_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-2
  prefs: []
  type: TYPE_NORMAL
- en: 'An illustration of k-means clustering with *k* = 2\. Top left: Randomly pick
    a point for each *k*. Top right: Iteratively assign each point to its closest
    cluster centroid. Bottom: Update the cluster centroids for each of the *k* clusters.
    Typically, we repeat the iterative assignment of all the points and update the
    cluster centroid until the algorithm resolves in a stable clustering.'
  prefs: []
  type: TYPE_NORMAL
- en: Considerations for Selecting *K*
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There’s really no way of telling the number of clusters in a dataset from the
    onset. The best way of selecting *k* is to try out different values of *K* to
    see what works best in creating distinct clusters.
  prefs: []
  type: TYPE_NORMAL
- en: Another strategy, which is widely employed in practice, is to compute the average
    distance of the points in the cluster to the cluster centroid for all clusters.
    This estimate is plotted on a graph as we progressively increase the value of
    *K*. We observe that as *K* increases, the distance of points from the centroid
    of its cluster gradually reduces, and the generated curve resembles the elbow
    of an arm. From practice, we choose the value of *K* just after the elbow as the
    best *K* value for that dataset. This method is called the elbow method for selecting
    *K* as is illustrated in Figure [25-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig3_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-3
  prefs: []
  type: TYPE_NORMAL
- en: The elbow method for choosing the best value of k
  prefs: []
  type: TYPE_NORMAL
- en: Considerations for Assigning the Initial *K* Points
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The points that determine the initial value of *K* are important in finding
    a good set of clusters. By selecting the point for *K* at random, two or more
    points may reside in the same cluster, and this will invariably lead to sub-par
    results. To mitigate this from occurring, we can employ more sophisticated approaches
    to selecting the value of *K*. A common strategy is to randomly select the first
    *K* point and then select the next point as the point that is farthest from the
    first chosen point. This strategy is repeated until all *K* points have been selected.
    Another approach is to run hierarchical clustering on a sub-sample of the dataset
    (this is because hierarchical clustering is a computationally expensive algorithm)
    and use the number of clusters after cutting off the dendrogram as the value of
    *K*.
  prefs: []
  type: TYPE_NORMAL
- en: K-Means Clustering with Scikit-learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This example implements K-means clustering with Scikit-learn. Since this is
    an unsupervised learning use case, we use just the features of the Iris dataset
    to cluster the observations into labels.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: The code to plot the clustered labels and the cluster centers should be executed
    in the same notebook. The plot of clusters made by the K-means algorithm is shown
    in Figure [25-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig4_HTML.png](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-4
  prefs: []
  type: TYPE_NORMAL
- en: Plot of K-means clusters and their cluster centers
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical Clustering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hierarchical clustering is another clustering algorithm for finding homogeneous
    sub-groups or classes within a dataset. However, as opposed to *k*-means, we do
    not need to make an a priori assumption of the number of clusters in the dataset
    before running the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: The two main techniques for performing hierarchical clustering are
  prefs: []
  type: TYPE_NORMAL
- en: Bottom-up or agglomerative
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Top-down or divisive
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the bottom-up or agglomerative method, each data point is initially designated
    as a cluster. Clusters are iteratively combined based on homogeneity that is determined
    by some distance measure. On the other hand, the divisive or top-down approach
    starts with a cluster and subsequently splits into homogeneous sub-groups.
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical clustering creates a tree-like representation of the partitioning
    called a dendrogram. A dendrogram is drawn somewhat similar to a binary tree with
    the root at the top and the leaves at the bottom. The leaf on the dendrogram represents
    a data sample. The dendrogram is constructed by iteratively combining the leaves
    based on homogeneity to form clusters moving up the tree. An illustration of hierarchical
    clustering is shown in Figure [25-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig5_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-5
  prefs: []
  type: TYPE_NORMAL
- en: 'An illustration of hierarchical clustering of data points in a 2-D feature
    space. Left: The spatial representation of points in 2-D space. Right: A hierarchical
    cluster of points represented by a dendrogram.'
  prefs: []
  type: TYPE_NORMAL
- en: How Are Clusters Formed
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Clusters are formed by computing the nearness between each pair of data points.
    The notion of nearness is most popularly calculated using the Euclidean distance
    measure. Beginning at the leaves of the dendrogram, we iteratively combine those
    data points that are closer to one another in the multi-dimensional vector space
    until all the homogeneous points are placed into a single group or cluster.
  prefs: []
  type: TYPE_NORMAL
- en: The Euclidean distance is used to compute the nearness between *n* data points.
    After each pair of data points has combined to form a cluster, the new cluster
    pairs are then pulled into groups going up the tree, with the tree branch or dendrogram
    height reflecting the dissimilarity between the clusters.
  prefs: []
  type: TYPE_NORMAL
- en: Dissimilarity computes how different each cluster of data is from one another.
    The notion of dissimilarity between two clusters or groups is described in terms
    of *linkage*. Four types of linkage exist for grouping clusters in hierarchical
    clustering. They are centroid, complete, average, and single.
  prefs: []
  type: TYPE_NORMAL
- en: The centroid linkage computes the dissimilarity between two clusters using the
    geometric centroid of the clusters. The complete linkage uses the two farthest
    data points between the two clusters to compute the dissimilarity (see Figure
    [25-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig6_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-6
  prefs: []
  type: TYPE_NORMAL
- en: Complete linkage
  prefs: []
  type: TYPE_NORMAL
- en: The average linkage finds the means of points within the pair of clusters and
    uses that new artificial point to calculate the dissimilarity (see Figure [25-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig7_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-7
  prefs: []
  type: TYPE_NORMAL
- en: Average linkage
  prefs: []
  type: TYPE_NORMAL
- en: The single linkage uses the closest data point between the cluster pairs to
    compute the dissimilarity measure (see Figure [25-8](#Fig8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig8_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-8
  prefs: []
  type: TYPE_NORMAL
- en: Single linkage
  prefs: []
  type: TYPE_NORMAL
- en: Empirically, the complete and average linkages are preferred in practice because
    they yield more balanced dendrograms. Other dissimilarity measures exist for evaluating
    the nearness or homogeneity of data points. One of such is the Manhattan distance,
    another distance-based measure, or the correlation-based distance which groups
    pairs of data samples with highly correlated features. A correlated-based dissimilarity
    measure may be more useful in datasets where proximity in multi-dimensional spaces
    is not as useful a metric for homogeneity as compared to the correlation of their
    features in the space. A choice of calculating dissimilarity has a significant
    impact on the ensuring dendrogram.
  prefs: []
  type: TYPE_NORMAL
- en: After running the algorithm, the dendrogram is cut at a particular height, and
    the number of distinct lines or branches after the cut is circumscribed as the
    number of clusters in the dataset. An illustration of cutting the dendrogram is
    shown in Figure [25-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig9_HTML.jpg](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-9
  prefs: []
  type: TYPE_NORMAL
- en: Dendrogram cut
  prefs: []
  type: TYPE_NORMAL
- en: Hierarchical Clustering with the SciPy Package
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This example implements hierarchical or agglomerative clustering with SciPy.
    The ‘scipy.cluster.hierarchy’ package has simple methods for performing hierarchical
    clustering and plotting dendrograms. This example uses the ‘complete’ linkage
    method. The plot of the dendrogram is shown in Figure [25-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_25_Chapter/463852_1_En_25_Fig10_HTML.png](../images/463852_1_En_25_Chapter/463852_1_En_25_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 25-10
  prefs: []
  type: TYPE_NORMAL
- en: Dendrogram produced by hierarchical clustering
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: This chapter reviewed the pros and cons of *K*-means and hierarchical clustering.
    Both hierarchical and *K*-means are susceptible to perturbations in the dataset
    and can give very different results if a few data points are removed or added.
    Also, it is crucial to standardize the dataset features (i.e., to subtract each
    element in the feature from its mean and divide by its standard deviation or by
    the range) before performing clustering. This ensures that the features are within
    similar numeric bounds and have tempered or measured distances in the feature
    space.
  prefs: []
  type: TYPE_NORMAL
- en: The results of these clustering algorithms also depend on a wide range of considerations
    such as the choice of *K* for *K*-means, and for hierarchical clustering, the
    choice of dissimilarity measure, the type of linkage, and where to cut the dendrogram
    all affect the final result of the clusters. Hence, to get the best out of clustering,
    it is best to perform a grid search and try out all these different configurations
    in order to get a measured view on the robustness of the results before applying
    into your learning pipeline or using as a model to explain the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we will discuss principal component analysis (PCA) as an
    unsupervised machine learning algorithm for finding low-dimensional feature sub-spaces
    that capture the variability in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 26. Principal Component Analysis (PCA)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Principal component analysis (PCA) is an essential algorithm in machine learning.
    It is a mathematical method for evaluating the principal components of a dataset.
    The principal components are a set of vectors in high-dimensional space that capture
    the variance (i.e., spread) or variability of the feature space.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of computing principal components is to find a low-dimensional feature
    sub-space that captures as much information as possible from the original higher-dimensional
    features of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: PCA is particularly useful for simplifying data visualization of high-dimensional
    features by reducing the dimensions of the dataset to a lower sub-space. For example,
    since we can easily visualize relationships on a 2-D plane using scatter diagrams,
    it will be useful to condense an n-dimensional space into two dimensions that
    retain as much information as possible in the n-dimensional dataset. This technique
    is popularly called dimensionality reduction.
  prefs: []
  type: TYPE_NORMAL
- en: How Are Principal Components Computed
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The mathematical details for computing principal components are somewhat involved.
    This section will instead provide a conceptual but solid overview of this process.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to find the covariance matrix of the dataset. The covariance
    matrix captures the linear relationship between variables or features in the dataset.
    In a covariance matrix, an increasingly positive number represents a growing relationship,
    while the converse is represented by an increasingly negative number. Numbers
    around zero indicate a non-linear relationship between the variables. The covariance
    matrix is a square matrix (that means it has the same rows and columns). Hence,
    given a dataset with *m* rows and *p* columns, the covariance matrix will be a
    *m* × *p* matrix.
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to find the eigenvectors of the covariance matrix dataset.
    In linear algebra theory, eigenvectors are non-zero vectors that merely stretch
    by a scalar factor, but do not change direction when acted upon by a linear transformation.
    We find the eigenvectors using a linear algebra technique called the singular
    value decomposition or SVD for short (see Figure [26-1](#Fig1)). This advanced
    mathematical concept is beyond the scope of this book.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig1_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 26-1
  prefs: []
  type: TYPE_NORMAL
- en: Decompose the covariance matrix using SVD to get the eigenvector matrix
  prefs: []
  type: TYPE_NORMAL
- en: The critical point to note at this junction is that the SVD also outputs a square
    matrix (*p* × *p*), and each column of the matrix is an eigenvector of the original
    dataset. This output is the same across different software packages that compute
    the eigenvectors because the covariance matrix satisfies a mathematical property
    of being symmetric and positive semi-definite (the non-math inclined can conveniently
    ignore this point). We have as many eigenvectors as they are attributes or features
    in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Without delving into mathematical theory, we can conclude that the eigenvectors
    are the principal components or loadings of the feature space. Again remember
    that the principal components capture the most significant variance in the dataset
    by projecting the data onto a vector called the first principal component. Other
    principal components are perpendicular to each other and capture the variance
    not explained by the first principal component. The principal components are arranged
    in order of importance in the eigenvector matrix, with the first principal component
    in the first column, the second principal component in the second column, and
    so on.
  prefs: []
  type: TYPE_NORMAL
- en: Dimensionality Reduction with PCA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To reduce the dimensions of the original dataset using PCA, we multiply the
    desired number of components or loadings from the eigenvector matrix, *A*, by
    the design matrix *X*. Suppose the design matrix (or the original dataset) has
    *m* rows (or observations) and *p* columns (or features), if we want to reduce
    the dimensions of the original dataset to two dimensions, we will multiply the
    original dataset *X* by the first two columns of the eigenvector matrix, *A*[*reduced*].
    The result will be a reduced matrix of *m* rows and 2 columns.
  prefs: []
  type: TYPE_NORMAL
- en: If *X* is a *m* × *p* matrix and *A*[*reduced*] is a *p* × 2 matrix,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {T}_{reduced}={X}_{m\times p}\times {A}_{p\times 2} $$](../images/463852_1_En_26_Chapter/463852_1_En_26_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: Observe that the result *T*[*reduced*] is a *m* × 2 matrix. Hence, *T* is a
    2-D representation of the original dataset *X* as shown in Figure [26-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig2_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 26-2
  prefs: []
  type: TYPE_NORMAL
- en: Reducing the dimension of the original dataset
  prefs: []
  type: TYPE_NORMAL
- en: In plotting the reduced dataset, the principal components are ranked in order
    of importance with the first principal component more prominent than the second
    and so on. Figure [26-3](#Fig3) illustrates a plot of the first two principal
    components.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig3_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 26-3
  prefs: []
  type: TYPE_NORMAL
- en: Visualize the principal components
  prefs: []
  type: TYPE_NORMAL
- en: Key Considerations for Performing PCA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is vital to perform mean normalization and feature scaling on the variables
    of features of the original dataset before implementing PCA. This is because unscaled
    features can have stretched and narrow distance n-dimensional space, and this
    has a huge consequence when finding the principal components that explain the
    variance of the dataset (see Figure [26-4](#Fig4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_26_Chapter/463852_1_En_26_Fig4_HTML.jpg](../images/463852_1_En_26_Chapter/463852_1_En_26_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 26-4
  prefs: []
  type: TYPE_NORMAL
- en: 'Right: An illustration of PCA with scaled features. Left: An illustration of
    PCA with unscaled features .'
  prefs: []
  type: TYPE_NORMAL
- en: Again mean normalization ensures that every attribute or feature of the dataset
    has a zero mean, while feature scaling ensures all the features are within the
    same numeric range.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, PCA is susceptible to vary wildly due to slight perturbations or changes
    in the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: PCA with Scikit-learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, PCA is implemented using Scikit-learn.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: from sklearn.preprocessing import Normalizer
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: In this chapter, we explained PCA giving a high-level overview of how it works
    to find a low-dimensional sub-space of a dataset. More so, we showed how PCA is
    implemented with Scikit-learn. This chapter concludes Part 4\. In the next part,
    we introduce another scheme of learning methods called deep learning that builds
    on the machine learning neural network algorithm for learning complex representations.
  prefs: []
  type: TYPE_NORMAL
