- en: This is our Microsoft Word writing template, which includes brief guidelines
    for how styles should be applied to text. We would like you to use it. However,
    if you have a strong preference for another writing application, or your own Word
    template, let us know, and we’ll work to accommodate you.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们微软Word写作模板，其中包含了关于如何应用样式到文本的简要指南。我们希望您使用它。然而，如果您对另一个写作应用有强烈的偏好，或者您有自己的Word模板，请告诉我们，我们将努力满足您的需求。
