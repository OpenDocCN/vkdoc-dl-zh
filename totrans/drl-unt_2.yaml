- en: 2. Pathfinding and Navigation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Pathfinding is the algorithmic interpretation and implementation of attaining
    the shortest route(s) from a given source(s) to destination(s). While the paradigm
    falls under generic graph theory, there has been much research about different
    heuristic algorithms. The fundamental aspects of choosing the best-fit (least
    cost) route implies certain heuristics to be followed. In this section we will
    try to understand the different concepts of heuristic search algorithms, starting
    from basic Dijkstra Algorithm to variants of A* (A star). The need for different
    search algorithms is extremely essential since generic exhaustive algorithms such
    as breadth-first search (BFS) and depth first search (DFS) are not feasible for
    games, simulations, and robotics. As we proceed into the depths of each heuristic
    algorithm, we will encounter different trade-off metrics being employed, from
    time complexity to space complexity. We will also explore the fundamental aspects
    of navigation meshes and how to create an intelligent pathfinding agent that gets
    rewards when it reaches and finds the target object.
  prefs: []
  type: TYPE_NORMAL
- en: If we recollect from the previous chapter, we talked about how a reinforcement
    learning (RL) environment comprises states, actions, and rewards. We will continue
    on similar lines with the change in the concept of states and actions in generic
    pathfinding. The concept of states in pathfinding arises from the different planar
    coordinates where an agent places itself while it searches for a proper trajectory.
    If we consider the case of a GridWorld environment, where the agent can be placed
    anywhere in the grid, the position of the agent in a particular grid is a state.
    We have seen in the Bellman equation and in the Q-learning section in the last
    chapter, where the agent decides to go to a particular state (grid or “track section”)
    for reward maximization. The similar concept is applied here as well. The action
    space includes the different directions the agent can move to check for alternative
    shorter paths to the destination. In the 2D GridWorld environment, the agent may
    have the action space, which includes the eight directions comprising upper, lower,
    left, right, upper left, upper right, lower left, and lower right or may include
    a subset of them.
  prefs: []
  type: TYPE_NORMAL
- en: This concept of states and actions is very crucial for heuristic pathfinding
    algorithms. Since most of the pathfinding algorithms rely on centralized distance
    minimization techniques, there are certain modifications added to each of the
    algorithms in terms of dynamic weighting, edge selection, bidirectional minimization,
    and many more. A preview of how agents use pathfinding to reach their destination
    is shown in Figure [2-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig1_HTML.png](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Path finding in RL environment
  prefs: []
  type: TYPE_NORMAL
- en: Generic pathfinding based on optimality is quite time-consuming when we use
    exhaustive search algorithms like Bellman Ford, which determines optimal trajectory
    from any source(s) to any destination(s) and takes into consideration negative
    weight edges. This is where Dijkstra, A*, B*, and many other algorithms come into
    the picture to strategically remove certain states in the trajectory of the agent
    that would lead to a suboptimal path. The metrics of optimization can include
    weight minimization, time minimization, reward maximization, and other strategies,
    and based on these constraints, different algorithms employ either dynamic programming
    or heuristic search to model the pathfinding problem. In the context of algorithmic
    complexity determination, we use the O() (big-oh) as the upper bound metric in
    complexity analysis. If we consider the grid environment to be a graph data structure
    where the nodes represent the states and source/destination nodes provided, we
    can emphasize the notation of V for the number of vertices and E as the number
    of edges in the graph. In general BFS and DFS techniques (basic search), the time
    complexity can be viewed as O(|V| +|E|), which is of linear time complexity. This
    is due to the fact that Greedy exhaustive BFS algorithms rely on choosing all
    the vertices V and edges E during computation. For optimality, the different algorithms
    will have different big-O() values in terms of the runtime complexity, which we
    will see in the next section. This will be in accordance with the runtime of the
    algorithms implemented in Python. In general RL, these algorithms are used in
    robotics, autonomous vehicles, and self-searching agents as well as in different
    simulations based on nonplayer character (NPC) navigation. The RL environment
    in these cases may also involve certain obstacles or challenges that the agent
    has to avoid to reach the goal. This may include physical obstacles in the shortest
    path trajectory in a grid or virtual negative rewards-based obstacles (different
    coordinates in n-dimension planes where rewards are negative), which may prevent
    an agent from going to a particular state. The second example may be a scenario
    in robotics where a robotic agent is credited with negative reward when it tries
    to move away from the target.
  prefs: []
  type: TYPE_NORMAL
- en: Pathfinding Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let us try to understand different algorithms involved in pathfinding. We will
    start to emphasize the algorithmic implementations and also view the contrast
    in time complexity of these algorithms. Initially we will start with generic exhaustive
    Greedy Search algorithm and then gradually we will venture into the depths of
    optimized heuristic family of A* algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig2_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: Greedy search state space in grid
  prefs: []
  type: TYPE_NORMAL
- en: '**Greedy algorithm** **:** This is an exhaustive search technique where an
    agent tries to venture all possible paths and states to choose an optimal trajectory
    to reach the destination, We consider a simplified GridWorld environment, where
    the agent starts from a particular grid and has to reach another grid in an optimal
    path; this provides a possible set of movable states for the agent in eight directions,
    as mentioned in the previous section. Since it is an exhaustive enumeration technique,
    all the possible states are explored, which is pretty much similar to the BFS
    or DFS algorithm. If we are using BFS, this can be visualized as an agent choosing
    all the possible states from a particular state S[i,j] to S[i,j+1], S[i,j-1],
    S[i+1,j] , S[i-1,j], S[i+1,j+1] ,S[i-1,j+1] , S[i+1,j-1], S[i-1,j+1]. This can
    be visualized in Figure [2-2](#Fig2).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let us try to understand how the Greedy algorithm works with the help of
    a sample gridWorld simulation in Python. We create a simplified Gridworld mainly
    of 0 s and 1 s, where 0 s are “walkable” grids and 1 s involve grids with obstacles.
    The agent is provided a source grid and destination grid and has to greedily search
    for the destination by exhaustively searching through “walkable” grids.
  prefs: []
  type: TYPE_NORMAL
- en: Open the “Greedy.ipynb” Notebook in Jupyter or Colab and let us view the imports
    required for this program.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We require the heapq library, which implements a priority queue (max heap data
    structure) for automatic sorting of a container (array, lists, tuples) that is
    helpful when updating the minimum distance from a particular state or grid. We
    then enter the Greedy function, which is the main part of the search algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The source state or grid (“src '') is inserted inside the priority queue, and
    the grid data structure (tuple) contains the position as one of the attributes
    in terms of x and y location of a particular grid in 2D plane. The search continues
    as long as the priority queue is not empty (a classic example of how BFS works).
  prefs: []
  type: TYPE_NORMAL
- en: Initially we check whether the currently extracted grid state from the priority
    queue is the destination grid state (“dest”). If the destination is reached, we
    break the loop.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In this part of the code segment, we iterate through the eight possible venturable
    grid states (upper, lower, left, right, upper left, upper right, lower left, and
    lower right) and add the grid positions to get the position of the new grid state.
  prefs: []
  type: TYPE_NORMAL
- en: Since Greedy is an exhaustive search, it places all the different grid positions
    again several times to get to the final destination. We then apply conditional
    logic to check if the maze or GridWorld is walkable by preventing the agent from
    going to grid states with a value of “1.” We also check to see if the agent is
    inside the maze or grid environment and has not left the boundaries. Then we add
    the new distance as a unit value and add the new grid state to the priority queue
    to sort it again based on positional distance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Gridworld or maze is implemented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'The main function calls the Greedy Search on this particular maze or GridWorld
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Here the source grid is chosen as (0, 0) and the destination grid is chosen
    as (7, 6); however, these can be changed according to our requirements. Then the
    Greedy function is called, and the time for computation of the path is calculated
    using the “time” library of Python. After running the code in the Notebook, we
    see a list of different grids, where the agent travels to reach (7, 6). Since
    Greedy is exhaustive, the number of searches may get repeated and the path can
    be really long. This can be correlated to the enormous runtime of the algorithm,
    as shown in Figure [2-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig3_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of the Greedy Search algorithm
  prefs: []
  type: TYPE_NORMAL
- en: Since the time complexity is quite large, we try to explore an optimized, single-source,
    shortest path algorithm called Dijkstra.
  prefs: []
  type: TYPE_NORMAL
- en: '**Dijkstra algorithm:** Dijkstra is a graph-based algorithm that provides the
    optimal, or the shortest, route from a source to a destination. The algorithm
    finds the optimal path by total reordering of the distance measures, and the generic
    ordering of the path lengths can be considered as monotonically increasing. The
    algorithm maintains two separate lists commonly referred to as open list and closed
    list. The open list contains the grid states or nodes that are currently being
    analyzed with the help of neighboring grids. The closed list contains the grid
    states that have been computed. The open list is implemented by using a priority
    queue, which stores the grid states based on the sorted nondecreasing order of
    their distance magnitudes from the source. Particularly since the Dijkstra algorithm
    always finds the shortest route between any grid state from the source, the algorithm
    stops when the grid state is the destination. This particular path is optimal,
    because had there been any other “optimal” path, the Dijkstra algorithm would
    have chosen that. This follows a general lemma in Graph Theory, where if an optimal
    path exists between a start and destination node, all the nodes along that particular
    path will have optimal distance from the start node or source. Mathematically,
    if U(s) is the source node and V(s) is the destination node, and if the path between
    them is optimal, then any node U[1](s) on that path will also have an optimal
    distance from the source. This can be derived as follows:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: V(s) = U(s) + d(u, v),
  prefs: []
  type: TYPE_NORMAL
- en: 'where V(s) is the destination node, U(s) is the source vode, and d(u, v) is
    the optimal distance between the nodes. Then for any point U[1](s) on that path:'
  prefs: []
  type: TYPE_NORMAL
- en: V(s) = U(s) + d(u, u[1]) + U[1](s) + d(u[1], v),
  prefs: []
  type: TYPE_NORMAL
- en: where d(u, u[1]) is the distance from source U(s) to U[1](s) and d(u[1], v)
    is the distance from the U[1](s) to destination V(s). Hence the path d(u, u[1])
    is the optimal path between source and the node U[1](s). This completes the proof.
  prefs: []
  type: TYPE_NORMAL
- en: The Dijkstra algorithm uses this principle to find the optimal shortest path
    and keeps a history of the visited nodes or grid states so as to not backtrack.
    The algorithm, however, is suited for positive weight graphs and grids and does
    not provide an optimal solution for negative weight edges or grid paths (solved
    by Bellman Ford). The algorithm stores the distance of each grid state or node
    from the source or start node, and that is generally in nondecreasing order. This
    is shown in Figure [2-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig4_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: Dijkstra Shortest Path First Algorithm
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [2-4](#Fig4), the agent (with the orange hexagon shape) finds the
    shortest route between the source(yellow circular shape) and destination(grey
    circular shape) in a graph.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: Dijkstra algorithm was designed by computer scientist Edsger W.Dijkstra in 1965.
  prefs: []
  type: TYPE_NORMAL
- en: The numbers on the “arrows” represent the edge weight or cost for traversing
    that edge (this can be compared to time taken to cover that edge). This unidirectional
    graph has a unique shortest path that involves a total cost of 10 units along
    the path, shown by the agent. This path also has the shortest distance from the
    source to any node on this path. We can try to create different graphs and then
    apply the Dijkstra algorithm and always check the validity of the proof.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have covered the important aspects of Dijkstra, let us try to implement
    this in Python so that we can visualize how the algorithm works. We will extensively
    create Unity Projects based on this algorithm in the next section and create an
    AI agent that uses this algorithm to reach a particular destination. Open the
    “Dijkstra.ipynb” Notebook in Jupyter or Colab. The code base has a common template
    using the same GridWorld environment (maze) like before, and we will concentrate
    ourselves with the actual “dijkstra” function that implements the logic.
  prefs: []
  type: TYPE_NORMAL
- en: We initialize the distance dictionary (containing two entities grid-Position.x
    and grid-Position.y) with the maximum value and use the function to minimize this
    dictionary to get minimum distance.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The next step involves including the start grid or source in the priority queue,
    which is our open list. This loop will continue as long as the priority queue
    has some elements (grids). Each grid is extracted from the priority queue or open
    list, and its distance is measured with the previously allocated distance. For
    the first iteration, since we included the distance with maximum value, the new
    value (1 unit) is smaller than the distance replaces it. For next steps, based
    on the different distance computations of neighboring nodes, this distance value
    for a particular grid will get changed. If the distance is more than the previously
    observed value, then it will not be taken into consideration. If the current grid
    is the destination, then the loop breaks and we have reached the target grid with
    a minimum cost path.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is implemented by the following lines:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The next segment deals with the surrounding states or grids along the eight
    directions for possible next grid positions. We have considered the distance between
    each grid as 1 unit in all the directions. We check for each of the eight possible
    grids and update the position of the new grid accordingly; also if the path contains
    obstacles (marked as “1”) similar to the previous case, we will avoid those grids.
    We then add a cost value of 1 unit to the distance from the old grid to the new
    grid and check if the distance is less than the current distance of the new grid.
    If the condition of minimality is satisfied, we update the distance to the new
    grid with the additional value and add the new grid to the priority queue or open
    list for the next neighbor of grids. This process continues until the destination
    is reached. Once the destination is reached, all the grids along the path will
    have a minimum cost from the start grid or source.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This is the entire control logic of the Dijkstra algorithm, and we will compare
    the runtime complexity of this with the previously created Greedy Search algorithm.
    On running this, we will get to see the runtime similar to the one shown in Figure
    [2-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig5_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of the Dijkstra algorithm
  prefs: []
  type: TYPE_NORMAL
- en: In the next section of the notebook, we will observe creation of graphs and
    use Networkx library to create a Dijkstra path in a uniformly weighted graph with
    Euclidean distance as the metric of cost. Networkx is a Python library that contains
    several algorithms related to graph traversals and shortest pathfinding (SPF)
    algorithms and the one provided here is just an example of simulating Dijkstra
    algorithm with its help.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The simulated graph for this implementation looks like that shown in Figure
    [2-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig6_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing graph using Networkx library
  prefs: []
  type: TYPE_NORMAL
- en: Now that we understand the Dijkstra algorithm, we will be creating a simulation
    of the same in Unity with an AI agent trying out the algorithm to reach the target
    in the next section. For the time being, we will concentrate on the fundamental
    aspects of a different class of pathfinding algorithms popularly called as A*.
    This is the most important class of algorithms when it comes to games, RL, and
    robotics, and since it is very closely related to the Dijkstra algorithm, we will
    understand the difference and also the variants of the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig7_HTML.png](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-7
  prefs: []
  type: TYPE_NORMAL
- en: A* algorithm heuristic and cost function
  prefs: []
  type: TYPE_NORMAL
- en: '**A* algorithm** **:** A* is a path searching algorithm that is most extensively
    used in games and simulations owing to computational flexibility, robustness,
    and optimality. However, there is an expensive space complexity associated with
    a classic A* algorithm, mainly due to its nature to store previous grids or states
    (nodes in a graph). The fundamental aspect of A* is its heuristic nature. It combines
    information that the Dijkstra algorithm uses, which involves favoring grids or
    states closer to the destination along the optimal path. The algorithm uses the
    heuristic to rule out certain grids or states, which may increase the optimal
    trajectory of the path and only focuses on those states that provide the minimum
    cost. This requires processing and storing of a grid’s information in terms of
    its neighbors’ distances. There are certain important heuristics that are followed
    in A*, which relies on the weights associated with each grid or state (node).
    This may include Euclidean or Hamiltonian distance measures from that particular
    grid to the destination. The A* uses an optimization strategy based on the grid
    attributes. In addition to the grid position, each grid has three important attributes:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**g-Value:** This is the cost of the path from the start grid or source to
    that particular grid (node).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**h-Value:** This is the heuristic estimated cost from the current grid to
    the destination grid.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**f-Value:** This is the addition of the G- and H-values for a particular grid
    (state or node).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This can be mathematically simplified as :'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: F(n) = G(n) + H(n)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Now let us try to understand why the heuristic term plays a significant role
    in the A* algorithm.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: At one extreme, if the value of H(n) is 0, then F(n) = G(n). This implies that
    if no heuristic factor is considered, A* reduces to simplified the Dijkstra algorithm.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If the H(n) value is always less than the cost of moving from grid ‘n’ to the
    destination, then A* is bound to find the shortest path. The less the value of
    H(n), the less the heuristic, which implies more exploration of different grids,
    which may cause greater time complexity.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If the H(n) value is equal to the cost of moving from grid ’n’ to the destination,
    then this is always the best or optimal path that A* chooses. However, this can
    be defined as a special case where the A* algorithm heuristic provides the exact
    value as that of the optimized path from grid to estination.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: If the H(n) value is greater than the cost of moving from grid ‘n’ to the destination,
    then exploitation along a certain path direction takes place. This would involve
    the A* algorithm to run significantly faster but produce suboptimal trajectories.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: At the other extreme, if the H(n) value is more than G(n), then only heuristics
    are involved in A* algorithm, which makes it similar to the Greedy algorithm.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Generally H(n) is chosen as an admissible heuristic function, which never overestimates
    the actual cost. This makes the heuristic problem specific.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: H(n) can include distance metrics such as Euclidean, distance, Manhattan distance,
    or Squared Euclidean distance as the heuristic measure.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A consistent or monotone heuristic is a heuristic where a particular grid ‘n’
    has a value less than or equal to the distance between the grid to the next grid
    and the heuristic value of the next grid, which is shown as:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: H(n) ≤ d(n,n+1) + H(n+1)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Now that we understand the importance of heuristics in the A* algorithm, we
    can visualize the general propagation of an agent using A* in the form of a tree,
    as shown in Figure [2-7](#Fig7), where red nodes represent the closed list of
    grids and green nodes are in the open list.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Let us understand the implementation details in Python, and then we will be
    simulating the A* algorithm in Unity. Open the “A-star.ipynb” Notebook in Jupyter
    or Colab. We will be using the same template of GridWorld, as in all our previous
    Python simulations of search algorithms, such as the maze or GridWorld environment.
    At the start of the Notebook we initialize a node class that contains the distance,
    position in terms of x, y (in 2D grid environment), and f-, g- and h-values that
    will be used in the A* algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'The next segment involves the actual A* algorithm. We initiate two lists, as
    mentioned before: open and closed list. The open list will contain all the grids
    (nodes) that are currently being analyzed with the cost and the heuristic function,
    and the closed list consists of grids (nodes) that have already been analyzed.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: We include the source grid inside the priority queue or the open list. Both
    the source and the destination grids have f-, g-and h-values initialized to 0\.
    Inside the loop, we will extract each grid. Then we will check the f-value of
    the extracted grid (node) with the f-values of the grids in the open list. If
    the value of the extracted grid is greater, then we assign it with the grid selected
    from the open list whose f-value is smaller than the extracted grid. We pop the
    extracted grid from the open list and add it to the closed list. If the extracted
    current grid is the destination grid, the search terminates and the variable “path”
    contains the optimal route from source to destination.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: We then create a list of children grids or neighbors where the heuristic will
    compute the Euclidean distance from the grid to the destination. Like before,
    we analyze the state space in the eight directions of a particular grid and make
    sure that it is “walkable” (grid value is not 1) and it is inside the maze or
    the GridWorld environment. We then add the new grid to the children list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'The next step is the computation of the f-, g-, and h-values. An initial check
    is made if the child grid in the children list is already on the closed list,
    which is then ignored. We add 1 unit as distance cost G (child; just like in Dijkstra),
    as we considered the distance between each grid to be 1 unit. We then compute
    the H (child) value based on the Euclidean square distance between the x and y
    coordinates of the current child grid and the destination grid to get the heuristic
    value. Finally we add the two values to get the F (child) value. If the current
    grid is on the open list, we check if the G (child) value is less than the g-values
    of the grids on the open list. If the g-value of the current child is greater,
    then we do not consider it, since we require the minimum cost value or optimized
    cost value. Finally we add the child grid to the priority queue or open list for
    the next iteration. This entire workflow is addressed in the following lines of
    code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: This is the implementation of the A* algorithm, and if we run this simulation
    we will get to view the path followed as well as the runtime of the algorithm,
    similarly to the one shown in Figure [2-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig8_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-8
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of the A* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: Once we are comfortable with the implementation and the workflow of the algorithm,
    we can try out the A* implementation of the Networkx library, which has also been
    included in the same Notebook for interested readers.
  prefs: []
  type: TYPE_NORMAL
- en: We will utilize this algorithm when we are creating our simulations with Unity,
    and then we will see how the A* algorithm tries to find an optimal path using
    this algorithm. We discussed the classic A* algorithm in detail, and there are
    many variants of the A* algorithm that we will take a look at. These variations
    are based on different heuristic and algorithmic modifications, trading off memory
    for time optimization and vice versa. We will be working with the same maze template
    in our future class of A* algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The A* algorithm was devised by N.J Nilsson, P.E Hart, and B Raphael.
  prefs: []
  type: TYPE_NORMAL
- en: Variants of the A* Algorithm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We discussed the details of the A* algorithm, but there are many modifications
    to increase memory optimization or reduce time complexity by following different
    methods. Some of the most popular algorithmic implementations are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dynamic weighted A* algorithm** **:** This is a weighted version of the classic
    A* algorithm. The weight-age is given to the heuristic part of the A* optimization
    function. This is done because at the start of the exploration, we generally require
    a stronger heuristic for more grid (node) exploration for an optimal path. As
    the agent approaches the destination grid, the heuristic is required to be minimized
    so that the actual cost of reaching the destination is attained. This process
    of decreasing the weight of the heuristic factor for each grid propagation toward
    the destination is known as dynamic weighted A*. The generic formulation follows
    as shown here:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: F(n) = G(n) + w(n) * H(n),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where F(n), G(n), H(n) have their usual meaning, and w(n) is the dynamic weight
    part. Let us try to visualize its implementation in the maze environment in our
    Python Notebook. Open the “DynamicA-star.ipynb” Notebook, and we can observe that
    there is a weight attribute in the node class.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Since we are using the same source template as the A* algorithm, there are only
    slight changes in the “dynamicastar” function. We initialize the weight decay,
    which is the decay factor, as the search continues toward the destination. This
    decay is essential to reduce the heuristic estimate.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Most of the segment in the next section is similar to the A* algorithm involving
    putting the start grid in the open list and then iterating till the open list
    is not empty. Then we abstract the children grids in the eight directions and
    check for its distance, whether it is “walkable” and whether it is inside the
    maze. The only difference is in the cost function, which is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: We first record the value of actual cost G (child) and heuristic estimate H
    (child), and then we update the W (child) factor by multiplying the depth of search
    with the decay factor. The depth of search indicates how far along the search
    trajectory the agent has visited the grids. Finally we update the F (child) value
    using the equation for dynamic weighted A*. The rest of the code segment is same
    as A*, which includes updating the closed list and adding child grid to the open
    list for the next iteration. Upon running the code, we can get an estimate of
    the time required for the algorithm, as in Figure [2-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig9_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-9
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of dynamic weighted A* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '**Iterative deepening A* (IDA*) algorithm** **:** This is another variation
    of the A* algorithm, which emphasizes memory optimization and performs recursion.
    The key feature of the IDA* algorithm is that it does not keep a record of the
    visited nodes as in the A* algorithm (open list). Instead it reiterates on the
    grid nodes from the start when a new grid node with greater f-score is reached.
    This algorithm uses a threshold value, and if a particular grid has an f-score
    greater than the threshold, the algorithm starts all over again from the start
    grid to the new grid (new depth). The implementation requires an infinite loop
    since we recursively track the grid nodes from the start whenever a higher F (grid)
    value is reached. During the recursion phase, whenever a higher F (grid) value
    is attained, the heuristic estimate does not explore along that grid node (as
    it is not likely on the optimal trajectory) but stores the F (grid) value. The
    recursion returns the minimum F (grid) value score, which is set as the new threshold
    since the reduction of f value would imply an optimal trajectory toward the destination.
    Let us explore a variation of this algorithm in the Notebook. Open the “IDA-star.ipynb”
    Notebook, and we will only look at the code changes, since the same maze template
    is being used. The node class is the same as A* node class with F(n), G(n), H(n),
    position, and distance attributes. The only difference is in the “idastar” function,
    where there is an infinite loop. We initially set the threshold value as the maximum
    squared Euclidean distance or depth from the start grid to the destination grid
    given by:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Inside the infinite loop, we observe most of the operations are the same, as
    a new children grid list is created, and for each new child grid, all possible
    eight directions are explored. The difference lies in the cost estimate update
    rule for each child grid.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The if condition verifies if the current child grid F (child) value is less
    than threshold, and if it is then the child grid becomes the next grid to be analyzed.
    This is a minimization technique that emphasizes selecting the lowest possible
    F (child) value among all the child grids as the new threshold. Similarly we break
    once the child grid is the same as the destination grid. We can run this program
    to generate the runtime efficiency of the algorithm. Since there is no memory
    in this algorithm, the path may contain multiple repeated grid nodes and is essentially
    useful in games and simulations where it is expensive to allocate memory for every
    NPC. In case of a single NPC or robotics, this algorithm may not provide a proper
    solution because reiteration provides time overhead. The complexity of IDA* relies
    mainly on the depth of the path, and it returns the optimal path like A*, provided
    the heuristic function is admissible (i.e., the h-value does not overestimate
    the true cost). Figure [2-10](#Fig10) shows the runtime of the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig10_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-10
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of IDA* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '**Lifelong planning A* (LPA*) algorithm** **:** This algorithm is an incremental
    A* algorithm, which is best suited for dynamic graphs or dynamic RL environments.
    This is most popularly used in games and simulations where no recalculation of
    the entire grid or graph nodes take place. There are certain additional components
    required to update the optimal trajectory in a dynamic environment. The LPA* algorithm
    maintains a list of predecessor and successor grid nodes. This helps in updating
    the neighbors of a particular grid node when its surrounding grids that lie on
    the optimal path are changed dynamically. The predecessor of a grid node n is
    any grid node that has an edge from it to n. The successor of a grid node n is
    the node to which an edge leads from n. The grid node has another attribute referred
    to as Rhs (node). This value is a lookahead based on the minimization of the G
    (node) value and can be written as:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rhs(Node) = minimum(G(node[1]) + d(node, node[1])),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where d(node, node[1]) is the distance between the grids N=node and node[1],
    with the former being the predecessor of the latter.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'This plays an important factor, as if Rhs (n) equals the G(n), then the grid
    n is locally consistent. If all the grids are locally consistent, then an optimal
    trajectory is implied between those grids. Effectively the cost equation also
    changes and is a minimization of the following attributes:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: F(n) = minimum(( minimum ( G(n), Rhs(n)) + H(n) ), (minimum(G(n), Rhs(n))),
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: where symbols have their usual meaning.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: There are certain advantages of this optimization, as each grid node is visited
    at most twice for each iteration of the algorithm. Since the priority queue or
    the open list contains a larger set of attributes, the implementation of this
    data structure determines the runtime of the algorithm. The grid nodes are expanded
    in a monotonically increasing manner, and nodes that are not consistent locally
    are not explored. Since it is based on the A* algorithm, the heuristic should
    be admissible, and in dynamic graph changing environments, LPA* outperforms the
    A* algorithm. We will have a brief overview of how the algorithm works and is
    implemented in most game engines and simulations for dynamic RL environments.
    Open the “LPA-star.ipynb” Notebook and observe the changes in the node class.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: 'The Rhs (n) lookahead attribute has been added to the node class.We create
    predecessor and successor lists, as shown here:'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: predecessor_list=[]
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'The rest of the “lpastar” function is almost similar to previous algorithms,
    with the exception that for each child grid explored in the eight directions,
    they are entered into the successor list as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Next we go to the cost update method and try to understand how the cost is updated
    for the successor nodes. We update the G(n) and H(n) values for the current child
    grid. The Rhs(n) value is then updated for the child grid with the sum of the
    G(n) value and the distance from the predecessor of the child grid to the grid.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: The next step involves updating the successor grid nodes of the child. This
    is done by using the “update_successor” function, which updates the Rhs(n) values
    of the successor grid node with the minimum value between the sum of G(n) and
    H(n) for the predecessor grid node, and the Rhs(n) of the successor grid node.
    If the successor grid is already in the open list, then it is removed from the
    list. If the G(n) and Rhs(n) values of the successor does not match, we set the
    F(n) as mentioned in the cost minimization equation for LPA*. This function updates
    all the successor grid nodes with the minimum cost value so that exploration continues
    along locally consistent successor grid nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'After all the successor grid nodes of the child grid have been updated, the
    F(n) value of the current child grid is updated as per the equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: This algorithm has widespread applications in general pathfinding AI in any
    simulation engine. The reason can be attributed to the swift updates of the F(n),
    G(n), H(n), and Rhs(n) values whenever the grid environment changes. This is quite
    practical in dynamic environments, where faster optimal trajectory is returned
    at the expense of more memory consumption. We can run this in the Notebook or
    Colab to check the runtime of the algorithm, as shown in Figure [2-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig11_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of LPA* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '**D* (D-star) algorithm** **:** This is another variation of A* that operates
    in a similar manner with respect to the classic A* algorithm. There are three
    variants of this algorithm:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classical D* algorithm
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Focused D* algorithm
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: D* lite
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For simplicity, we will be understanding the classical D* algorithm as the
    focued D* is based on this with certain heuristics. D* lite is a modification
    of the LPA* algorithm mentioned previously. This algorithm also has an open list
    and a closed list. Along with that, two attributes are required: raise and lower.
    The raise attribute of a grid indicates that its F(n) value is higher than the
    last time it was visited. The lower attribute of a grid indicates that the current
    F(n) value is lower than the last time the grid node was visited. In the “expansion”
    stage or path exploration stage, the algorithm updates a grid to the open list
    and updates the changes for all the neighboring grid nodes The major difference
    from A* is that unlike A*, which chooses the optimal path from the source grid
    to the destination grid, D* begins by searching backward from the destination
    grid. This can be understood where each grid node has a back pointer in the memory
    where it can store the previous grid in the path. When an obstacle is reached,
    the current grid node F(n) value is raised. This, in turn, raises all the neighboring
    grid nodes F(n) value. When the raised grid node can be lowered by choosing another
    trajectory (another neighboring grid), this is also back-propagated to all the
    previously raised neighboring grid nodes. This is considered to be another variation
    of an incremental search and is most extensively used in games and simulations.
    We can try to understand a simplified variation of the D* algorithm using our
    Python Notebook. Open the “D-star.ipynb” Notebook in Jupyter or Colab. Since most
    of the code is similar to A*, we will only consider the important parts. We have
    a similar initialization of node class, and in the “dstar” function, we have the
    open and closed lists along with the successor and predecessor lists. The most
    important aspect is when an obstacle is encountered by the child grid node and
    the “is_raise” function is called to minimize the F(n) value of the child grid
    node based on the minimum F(n) value observed so far.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: The next step involves checking the open list of grids for any value F(n) that
    is higher than the F(n) value of the current child grid. This implies that the
    open list grid nodes encountered an obstacle and have raised all the F(n) values
    of their nodes. Thus lowering is required.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: Once we have understood this simplified variation of the D* algorithm, we can
    check for the runtime of this algorithm. Focused D* algorithm relies on heuristic
    estimation of raise and lower attributes. A preview of the runtime is shown in
    Figure [2-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig12_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-12
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of D* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '**B* (B-star) algorithm** **:** This is a best first search algorithm, which
    is another variation of the A* algorithm. The concept of this search relies on
    proving or disproving whether the path through a particular grid node is the best
    path. The B* algorithm functions like a depth-first search tree, where it elongates
    from the root to the leaves, either proving or disproving. This enables the exploration
    to be limited to the grid nodes, where there is a chance of optimal path generation.
    This approach fine-tunes the A* algorithm as it creates a subspace of best fit
    grid nodes that are at optimal trajectory instead of iterating over all equally
    probable nodes. B* employs interval evaluations along with heuristic estimates.
    The algorithm performs by selecting nodes based on the upper and lower bounds
    of their F(n) values. This is a fairly simple algorithm, so let’s try to understand
    its implementation in the “B-star.ipynb” Notebook. In most of the code segments,
    it is almost similar, except in the “bstar” function, where we initialize the
    minimum value with the lowest minimum value provided by Python.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: Inside the loop for the children grid nodes along the eight directions, we see
    that after the F(n) update function, we compare the “mini” value (the lower bound)
    among all the child grid nodes and update the F(n) value of the child grid with
    that lower bound minimum value. This ensures exploration continues along the proper
    child grid nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: We can run this code and also get the runtime value of this algorithm as shown
    in Figure [2-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig13_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-13
  prefs: []
  type: TYPE_NORMAL
- en: Runtime of B* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '**Simple memory-bound A* (SMA*) algorithm** **:** This is another algorithmic
    variation of A*, where it expands along most favorable grid nodes and prunes non-favourable
    nodes. It is completely optimal if the allowed memory is sufficient to store a
    shallow version of the simulation. In a given memory space, this algorithm provides
    the best solution than most A* variants. It does not revisit old grid nodes. Similarly
    as in A*, the expansion continues along with consideration of the F(n) heuristic.
    Most simplified, this can be thought of as a memory-constrained version of the
    B* algorithm with pruning. If sufficient memory is provided, this algorithm will
    best optimize the memory. A variation of the SMA* algorithm including a combination
    of B* with LPA* has been provided in the “SMA-star.ipynb” Notebook. Since the
    code has been previously discussed, we will just go through the linking of LPA*
    and memory-optimized B*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: This is the LPA* variant of updating the successor, and the following code segment
    is the B* variant.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Running this code segment provides us with the path as well as the runtime,
    as shown in Figure [2-14](#Fig14).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig14_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-14
  prefs: []
  type: TYPE_NORMAL
- en: Runtime for SMA* algorithm
  prefs: []
  type: TYPE_NORMAL
- en: Other Variants of Pathfinding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: By now, we are well-acquainted with heuristic estimates in generic pathfinding.
    These algorithms are implemented internally in several simulation engines and
    game engines and are the most extensively used in the field of heuristic pathfinding.
    Other algorithmic variations are also present, such as those listed here.
  prefs: []
  type: TYPE_NORMAL
- en: '**Jump search algorithm** **:** A modified A* algorithm where agents can jump
    from one grid to another for getting the optimal path. This can be thought of
    as follows: instead of choosing the eight possible directions at 1 unit apart,
    we consider eight or more directions that are 2 or 3 units apart. This greatly
    increases the search space and is used in games.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Alpha-Beta pruning algorithm** **:** A classical algorithm employed in Game
    Theory (2 person 0 sum game), where one agent has to maximize its rewards at the
    expense of the other agent. This algorithm tries to build a minimax tree—a tree
    that maximizes the rewards for one agent and that minimizes the rewards of the
    other.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Branch and bound** **:** This classic algorithm that involves generation
    of a search tree of all possible states. This is an exhaustive search algorithm
    used in combinatorial optimization problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bellman Ford** **:** A variant of the Dijkstra algorithm involving negative
    weights in graphs and multisource shortest paths.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have tried to understand all the variants of pathfinding algorithms and optimization
    techniques involved in games. The detailed description of A* pathfinding variants
    is a fundamental aspect of understanding how the Unity Game Engine internally
    optimizes search and AI pathfinding. While we provided a Python implementation
    of the different variants of heuristic algorithms, we will now concern ourselves
    with simulating Unity games with Dijkstra and A* algorithms. Since A* is considered
    as the primal heuristic algorithm in games, we will try to understand and build
    an A* search environment in Unity. Later we will focus on navigation meshes in
    Unity and build an enemy AI using NPC-based pathfinding.
  prefs: []
  type: TYPE_NORMAL
- en: Pathfinding in Unity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we will try to simulate the Dijkstra and A* algorithms in Unity,
    where an AI agent tries to reach the target. Since we have an understanding how
    the Dijkstra algorithm works, we will investigate the Unity simulation for the
    same.
  prefs: []
  type: TYPE_NORMAL
- en: Dijkstra Algorithm in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We have to download the “DeepLearning” Unity Folder (from the Github Project
    associated with the book), and we will be using this for all our projects. Once
    downloaded, we will open the “Assets” Folder and navigate to the “HeuristicPathfinding”
    folder. This contains the setup scenes for Dijkstra and A* algorithmic simulations.
    Open the “DijkstraAgent” scene file in Unity Editor. The concept of the simulation
    is to let the purple agent cube reach the green target cube via a minimum cost
    path. The obstacles in the path are represented by the white cube blocks. We will
    be drawing our analogy from the GridWorld or menvironment with which we created
    in the Python implementation of the Dijkstra algorithm. The platform or the plane
    of the simulation is divided into grids (as can be seen in the Unity Scene). These
    grids are packed together to form a maze (matrix of grids). The dimension of the
    maze is 6X6, where we have six grids in the horizontal and vertical direction.
    Like before, for walkable grids, we initialize the value of the grid to be 0,
    and for non-walkable grid (those with the obstacles), we initialize a value of
    1\. We convert the Unity Scene into the maze simulation of Python by assigning
    the grids to the platform, the obstacles as the white cubes, and the target as
    the destination grid. A preview of the scene is provided in Figure [2-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig15_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-15
  prefs: []
  type: TYPE_NORMAL
- en: Dijkstra algorithm Scene in Unity Editor
  prefs: []
  type: TYPE_NORMAL
- en: Let us try to understand how the source code works for this simulation. Open
    the “Scripts” folder and open the “DijkstraAgent.cs” C# script. Since we will
    be trying to implement a C# version of the code segment of Python, we will go
    through certain data structures and collections (containers). We first initialize
    the “Pair” class, which is useful for storing the x and y coordinates of the grid
    platform (since it is 2D). This will be useful for filling the matrix or the grid
    platform with 0 and 1 values, depending on whether the grid is walkable or not.
    A grid coordinate is represented as a tuple or a container having x and y coordinates
    (x,y) such as (0,0), which signifies the start gridnode. Similarly, we have the
    destination gridnode as (5,5), which signifies the top-right corner of the platform.
    The numbering of the grid platform matrix starts from 0 to 5 (from left to right)
    in a particular row and from 0 to 5 (from bottom to top) for each column. Thus
    the bottom left coordinate where the agent cube is placed has a grid position
    coordinate of (0,0) as the x and y values, whereas the target agent is at position
    (5,5). The Obstacles can then be represented as grid positions [(0,3), (1,3)]
    on the left side and between [(3,3), (4,3), (5,3)] on the right side, only allowing
    movement though the (2,3) grid position. This is taken by following our rule that
    the numbering starts from left to right and from bottom to top. Once we are able
    to map the structure of the grid platform with the Unity Scene and the maze environment,
    we can create the class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: We move to the main class “DijkstraAgent,” and we initialize the variables like
    the agent GameObject, target GameObject, the grid matrix for the platform, and
    dictionary, which maps the matrix indices with the grid transform positions and
    an implementation of heap or priority queue data structure, which is extensively
    used in the sorting of the grid distances.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: 'Like before, in the start method, we initialize our GameObjects with tags and
    also fill the dictionary with the grid transform values based on the matrix grid
    coordinates. We initialize the grid matrix with 0’s and obstacles as 1’s and create
    an object of the heap data structure (priority queue). We then call the Coroutine
    function as a separate thread to start the simulation. This can be implemented
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: We implement a multithreaded simulation in this case, as the Coroutine calls
    “executedijkstra” Enumerator method, which in turn passes the variables to another
    Coroutine named as “dijkstra.” This is where the control logic is implemented,
    and a path container is created that stores the x and y coordinate positions of
    the grids that lie on the path the agent follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: In the “dijkstra” method, we first create a collection or container called “distance.”
    This container holds the grid x and y coordinates and a float value that signifies
    the distance of that particular grid node from the source grid node. We initialize
    this “distance” container with values from the grid matrix, which is a representative
    of the grid Transform positions (where grid.x = 0 and grid.y = 0 signify a coordinate
    on the platform as (0,0) or the start grid). In this case, we will manually place
    the target to grid location (5,5) on the platform matrix. We thus have the agent
    cube at the source (0,0) and target cube at the destination grid (5,5). We initialize
    the platform by following our platform rules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  prefs: []
  type: TYPE_PRE
- en: Once we have built the “distance” container, we create another positional container
    called “states,” which will be helpful when we consider the eight grid nodes in
    the neighborhood of a particular grid node (similarly to the children grid in
    the Python program). We create the source and destination grid and assign its
    positional values, with the exception of the source node; all other grid nodes
    have initial values set to the maximum float value of the system. This is similar
    to the one we used in Dijkstra, since we have to update the weights based on minimization
    algorithm. We then allocate the source node to the priority queue or heap.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: The next part running a loop and iterating until the priority queue is not empty.
    We extract the grid node from the top of the queue and then check if the distance
    value of the grid is less than the previously observed value for the same grid.
    For the first iteration, since all the grid distance values are initialized as
    float.MaxValue (maximum float value), it will be replaced. We do not consider
    whether the current distance of the grid exceeds the previous distance value for
    the same grid, and if the destination and current grid positions are the same,
    we break out of the loop. This is the same algorithmic workflow that was implemented
    in the classic Dijkstra Python source code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: The next segment is similar to checking the grids in the eight directions of
    the current grid and adding the new grid position. Then we check whether the new
    position is inside the grid platform and also whether it is walkable(value not
    1). We add a float value of 5f to the new grid distance. Then we check to see
    if the updated grid distance value is less than the previously observed value.
    If the value is less, we update the distance value for the current grid distance
    and add the new child grid to the priority queue and to the path container. This
    operation is similar to the child grid update code segment in the Python Notebook.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: To visualize this in the Unity simulation, after the “dijkstra” function is
    completed, and the path container, which contains the (x, y) coordinates of the
    grids that are on the path from the source to the destination, is filled, another
    Coroutine is called. The “move_agent” Coroutine is pretty simple, as it retrieves
    each grid coordinate (x, y) from the path container and then maps the transform
    position of that particular coordinate using the dictionary. The agent’s transform
    is then updated in accordance with the transform values of the grids on the Dijkstra
    path from this dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: That completes the entire simulation code segment for the Dijkstra algorithm
    for pathfinding in Unity. After we are comfortable with our analysis of the code,
    we can try to run this in the Unity Editor. We will observe that for each iteration,
    the agent cube reaches the target through different grids. We have allowed a wait
    time for 1 second for each decision the agent makes based on the Dijkstra optimization.
    We can also go to the environments folder under the DeepLearning root folder to
    run the Unity executable simulation involving the Dijkstra algorithm. This forms
    a crude template for the readers, and different graph-searching algorithms can
    be implemented with this template. In the next part we will consider an implementation
    of the classic A* algorithm. Since we are now familiar with the original algorithm
    and also the Unity maze environment, which we created in this section, it will
    be fairly easy to understand the A* simulation concept in Unity. We will be using
    specialized node classes to store the F, G, H values, as in the algorithm, and
    use composite collection containers to update these values based on the heuristic
    estimate and the minimization cost function. Figure [2-16](#Fig16) provides a
    representation of the scene.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig16_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-16
  prefs: []
  type: TYPE_NORMAL
- en: Agent following the Dijkstra path toward the target cube
  prefs: []
  type: TYPE_NORMAL
- en: A* Algorithm Simulation in Unity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us create the A* simulation on the same Unity maze environment or the grid
    environment. We have the similar architecture of the Unity Scene with the same
    agent and target at (0, 0) and (5, 5), respectively. Figure [2-17](#Fig17) provides
    a view of the scene.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig17_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-17
  prefs: []
  type: TYPE_NORMAL
- en: A* algorithm simulation Unity Scene
  prefs: []
  type: TYPE_NORMAL
- en: Since we have mentioned the workflow of the simulation in Dijkstra, we have
    followed a similar workflow in this algorithm as well. Initially we create the
    node class that contains the F, G, H values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: Under the monobehavior class, we have similar variables to the agent’s transform,
    target’s transform as well as the dictionary. There is a change in the data structure
    of the priority queue, since now we have to consider several attributes together
    to minimize the distance for optimal trajectory. So every entity inside the heap
    or priority queue (which is the open list, as in A* algorithm) will be a composite
    collection of different containers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: 'Each grid node entity in the open list heap has a position coordinate(x, y;
    given by a Pair<int, int>), followed by the grid node (F, G, H) and the distance
    from the start node. Therefore there is a substantial change in the information
    contained in an individual grid node. Unlike Dijkstra, it contains positions,
    node attributes, and distance. This start method contains the similar implementation
    and initialization of the grid platform and the GameObjects dictionary. The only
    additions are the open list (heap) and closed list composite containers, as shown
    here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: We then go to the Coroutine “executeAstar,” where another Coroutine called “Astar,”
    which implements the original algorithm, is called, and the path container is
    initialized and passed as argument like in Dijkstra.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: Inside the “Astar” function, we initialize the distance container, which holds
    the grid node position coordinates (x, y), and the distance from the start node.
    We also have the similar “states” container that contains the list of eight possible
    child grid node position coordinates for each grid node. We initially set the
    F, G, H values as 0 for the start grid and end grid. The position coordinate for
    the start grid is initialized to (0, 0), and that of the destination grid is (5,
    5). The distance of the start grid is initialized as 0, and all other grids are
    initialized as float.MaxValue like in Dijkstra.
  prefs: []
  type: TYPE_NORMAL
- en: We then add the Start grid node to the open list or priority queue or heap.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: We then iterate as long as the open list is not empty and extract one grid node
    at a time. We then check if the F-value of the extracted grid node is greater
    than other grid nodes in the open list. Once a grid node with F-value less than
    the current grid node is found, we assign the node attributes (F, G, H) to the
    current grid node. If the current grid node is the destination node, we terminate
    the process and provide the path.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: In the next segment, we iterate over the eight neighboring grids and verify
    whether the new grid position lies inside the grid or maze platform and whether
    it is “walkable” (value not 1), like in Dijkstra. Then, like Dijkstra, we increment
    the distance of the new child grid by 5 units and compare whether this is the
    minimum distance value and add to the open list. This is the standard cost function
    for the distance update, similarly to Dijkstra.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we compare the distance metrics for the child grid, as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: In the next step for the current child grid node, we check whether it is present
    in the closed list. If the current child grid node is a part of the closed list,
    then the analysis is not done. The next step is the update of the minimization
    function of the A* algorithm. We update the value based on the distance cost G
    by adding a float value of 5\. We then update the heuristic estimate value H,
    by comparing the square Euclidean distance from the current child grid to the
    destination grid node. Finally we combine the results of the cost function G and
    the heuristic H estimate values to get the F-value. This is the standard heuristic
    update rule of the A* algorithm, as mentioned in the Python implementation. This
    can be observed by the following lines.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: We also ignore the grid node if its G cost is greater than the G cost of the
    grid nodes in the open list. If all conditions pass, we add this child grid node
    to the open list for the next iteration.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: That is the complete implementation of the A* algorithm in Unity. We then pass
    the path container in the “move_agent” Coroutine, as in Dijkstra, so that the
    agent transform can follow along those grid transforms that lie on the optimal
    path. We can run this code segment in the Unity Editor and check the path of motion
    of the agent. Figure [2-18](#Fig18) provides a representation of A* algorithm
    in work.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig18_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-18
  prefs: []
  type: TYPE_NORMAL
- en: Agent reaches toward target along the A* optimized path
  prefs: []
  type: TYPE_NORMAL
- en: By now, we have a fair understanding of how pathfinding algorithms are built
    in game engines and simulation engines internally. An interested reader can use
    these templates to build their own efficient pathfinding algorithms that are under
    the A* class. The core concept of these algorithms is very important to understand
    how the navigation system of Unity works, and we will be focusing on navigation
    meshes and enemy AI in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Navigation Meshes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Navigation meshes are considered meshes that control the area where the agent
    can walk and use optimized pathfinding algorithms to reach the target. Generally
    these are collections of convex polygons that divide the area into small triangles
    (simplest polygon) where the agent can walk. Generally in AI-based navigation,
    these are created with the help of data structures that contain the mesh information,
    such as the number of vertices and edges for a particular platform or model. Simplistically,
    if we divide the “walkable” areas into smaller triangular meshes, we can consider
    the agent as a point inside the triangle and the target as another point in a
    distant triangle. The approach now remains to find an optimized path between these
    two triangles, where the likes of A* algorithms are used. Since navigation meshes
    also can contain a diverse set of obstacles for the environment, these obstacles
    are considered separate points inside some of the triangles in the path from the
    source to the destination. When the agent or the agent point comes near the vicinity
    of the triangle containing the obstacle point, it detects that collision is likely
    to occur along that path based on distance measures. Thus collision detection
    is avoided. Since in most of the cases, these triangular meshes remain static,
    navigation meshes are used in level design to provide areas where the agent can
    traverse. However, we can also create dynamic navigation meshes that change according
    to the nature of obstacles and walkable path. Since we consider triangles as the
    fundamental components in a generic mesh data structure, we can generically define
    a mesh as a combination of three points along x, y, and z axes. There are two
    different ways to link different triangles (polygons) to create composite area
    meshes.
  prefs: []
  type: TYPE_NORMAL
- en: '**Edge sharing** **of triangle meshes**: The common edge of one triangle mesh
    is shared with another ad joint mesh.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vertex sharing** **of triangle meshes**: This includes having a common vertex
    that connects 2 (two) triangle meshes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A convex composite navigation can be made of different shapes, such as rectangular
    or rhomboid, but the fundamental part of any composite convex mesh is a triangle.
    Generally to reduce the level of detail (LOD) in complex gameplay scenes, navigation
    meshes are shown together as a big rectangle or convex polygon instead of individual
    triangles to reduce the computation cost during rendering. The illustration shown
    in Figure [2-19](#Fig19) tries to convey information regarding pathfinding in
    a navigation mesh. Each grid of the navigation mesh is made up of two triangles
    (yellow an black). Since the grid shape resembles a rectangle, each rectangle
    is made up of two triangles, which are the fundamental building blocks of any
    polygon. The source grid point on the mesh is the blue circle, and the destination
    is the green circle There is an obstacle (marked as red) in the center grid. We
    can see that most of the grids in the mesh are made up of triangles that share
    a common side, with the exception of one grid to the left of the obstacle. This
    grid is connected by the vertex sharing mode between the two triangles. When the
    agent encounters the obstacle, it redirects itself to the grid mesh along the
    diagonal, connected by the vertex sharing mode. This is how the agent reroutes
    its path to avoid the obstacle containing grid mesh. The arrow signs denote the
    direction of motion of the agent.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The concept of navigation meshes was started around 1980’s, where it was used
    mainly in robotics and games and was referred to as “Meadow Maps.”
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig19_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-19
  prefs: []
  type: TYPE_NORMAL
- en: Pathfinding in navigation meshes
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will see how to create navigation meshes in Unity using
    an AI module of Unity Engine. We will help our Puppo to collect the stick with
    the help of pathfinding in the navigation mesh.
  prefs: []
  type: TYPE_NORMAL
- en: Navigation Mesh and Puppo
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Open the “DeepLearning” root folder and navigate to “environments.” Then navigate
    to “NavigationPuppo” Unity executable file. Run the simulation or game. We can
    see that if we click anywhere in the green field (platform), Puppo will immediately
    go to that location. This is an example of an AI agent trying to find an optimal
    path from the current location to the location that is pointed out by us on the
    screen. Wherever we click on the ground, we see Puppo going to that particular
    location. Figure [2-20](#Fig20) provides a view of Puppo scene.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig20_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-20
  prefs: []
  type: TYPE_NORMAL
- en: Navigation Puppo Scene using Unity Navigation Mesh
  prefs: []
  type: TYPE_NORMAL
- en: Let us try to create this simulation game. Open the “NavigationPuppo” folder
    inside the Assets folder and then click on the “NavigationMeshPuppo” scene. In
    Unity, we can create navigation meshes very quickly. We can go to the Windows
    Tab inside the Unity Editor and then select AI. Inside AI we have an option of
    “Navigation.” This enables us to use the UnityEngine.AI component and change our
    RL platform environment into a navigation mesh. So the general way to add a navigation
    component inside the Unity Scene is to follow **Windows ➤ AI ➤ Navigation**. This
    can be shown as in Figure [2-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig21_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-21
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the navigation component
  prefs: []
  type: TYPE_NORMAL
- en: Then we select the terrain or ground environment where we want the navigation
    mesh to appear. This process is called as NavMesh Baking in Unity. The NavMesh
    Baking process collects the render meshes of all the convex meshes that are marked
    as navigation static. This implies the navigation mesh will remain static in the
    environment. After we select the “Platform Variant” in our scene, we go to the
    Navigation Tab in the Inspector Window (shown on the right in Figure [2-21](#Fig21))
    and click Bake. The navigation mesh then appears as a blue covering on the ground
    platform as shown in Figure [2-22](#Fig22). There are four main subtabs under
    the Navigation Tab, and we will explore each of these separately.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig22_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-22
  prefs: []
  type: TYPE_NORMAL
- en: Ground platform becomes blue, signifying navigation mesh creation
  prefs: []
  type: TYPE_NORMAL
- en: We then explore the details of the four tabs placed under the Navigation Tab.
    The four main subtabs are discussed here.
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent** : This tab contains the agent type, most generally humanoid is present
    by default. It also contains radius, height, step height, and max slope of the
    agent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Radius**: signifies the radius of the cylindrical collider surrounding the
    agent'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Height**: signifies the height of the agent'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step height**: determines the height of the agent’s steps during locomotion'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Max slope**: the permissible angle that the agent can detect and traverse
    in the environment'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The Agent Tab can be visually observed and changed as well, as shown in Figure
    [2-23](#Fig23). This is required when we assign Puppo as the navigation mesh agent
    (NavMesh agent).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig23_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-23
  prefs: []
  type: TYPE_NORMAL
- en: Agents Tab under the Navigation Tab in Inspector Window
  prefs: []
  type: TYPE_NORMAL
- en: '**Areas** : This tab focuses on the different segments of the navigation mesh.
    As we observe, we can see two parallel tabs, “Name” and “Cost.” This can be useful
    if we are creating a diverse environment for our agent where certain parts of
    the terrain can be watery or muddy while other parts can be plain. We can associate
    different costs to the different mesh sections highlighted by their names. Since
    Unity Engine internally uses the A* algorithm, the cost factor determines the
    actual cost of the minimization function, which we saw in previous sections, denoted
    by the G(n) value. The higher the cost, the more difficult is for the agent to
    traverse along the path, since according to our discussion on A*, the lower value
    of G(n) is always taken into consideration (open list). Visually this can be shown
    as shown in Figure [2-24](#Fig24).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig24_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig24_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 2-24
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Areas Tab under Navigation Tab in the Inspector Window
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Bake** **:** This tab controls the baking of the navigation mesh. Baking
    implies fitting the ground plane mesh with a convex polygonal navigation mesh.
    The accuracy of fitting can depend on several factors that are included in the
    list under the Bake Tab:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent radius :**The cylindrical collider around the agent that determines
    how close the agent can get to a wall or obstacle'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent height:** determines the spaces the agent can use to reach the destination'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Max slope:** the maximum inclination of the ground terrain so that the agent
    can walk up'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step height:** the height of the obstacles on which the agent can step'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: We also have additional settings under the Bake Tab that are included for off
    mesh links . We will look into this in the next section when we discuss off mesh
    links.
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Drop height:** This is the maximum height the agent can drop from when it
    is moving from one navigation mesh to another via the off mesh links'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Jump distance:** The maximum distance the agent can jump when crossing the
    off mesh link to go to adjacent navigation mesh.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There are certain advanced settings under the Bake Tab as shown in Figure [2-25](#Fig25),
    which include:'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Manual Voxel Size:** This allows us to change the accuracy of our Bake process.
    Voxelization is a process in which the screen is rasterized and the NavMesh is
    built to best fit the arbitrary level geometry. The Voxel size determines how
    accurately the navigation mesh fits the scene geometry. The default value is set
    to 3 voxels per agent radius (diameter = 6 voxels). We can manually change the
    value to trade off between the baking speed and accuracy.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Min Region Area:** This allows us to cull smaller areas that are not directly
    connected on the navigation mesh. Surfaces with an aggregate area less than the
    Min Region Area will get removed.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Height Mesh:** The height of the navigation mesh above the terrain.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig25_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig25_HTML.jpg)'
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_IMG
- en: Figure 2-25
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: Bake Tab under Navigation Tab in Inspector Window
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Object** **:** This tab contains the details about Prefabs, Mesh Renderers,
    and the Terrains in the scene, which contain the navigation meshes. We also have
    the navigation static, off mesh links, and navigation area, which is set to walkable
    in this tab, as shown in Figure [2-26](#Fig26). We will focus on the off mesh
    links in the subsequent sections to generate automatic off mesh links between
    navigation meshes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig26_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig26_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 2-26
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Object Tab under Navigation Tab in Inspector Window
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Now that we have an overview of the navigation component in Unity, the next
    step is to attach the NavMesh agent component to Puppo. We initially set all the
    values as default. We have different components in this script that we have to
    add in order to make the agent follow the pathfinding algorithm to reach the destination.
    Components such as steering, obstacle avoidance, and pathfinding are present inside
    the component. Most of the steering and obstacle avoidance have modifiable values
    like angular speed, acceleration, stopping distance, height, radius, and so forth.
    The most important aspect is the pathfinding section, where auto repath and auto
    traverse off mesh is ticked by default. The auto repath automatically computes
    the new A* path from the current source to the destination when the destination
    changes its position (can be thought of as an extension to the LPA* algorithm
    we discussed). There is also an area mask component that indicates which section
    of the navigation mesh has which functionality (by default there are 3: walkable,
    non-walkable, and jump; there can be up to 29 custom). After we have added and
    completed the necessary changes in the scene, let us explore the source code to
    create our simulation game.'
  prefs: []
  type: TYPE_NORMAL
- en: Open the “NavigationPuppo.cs” C# script in any editor to view the generic template
    of creating NavMesh agents and connect it to a destination. We will see that with
    our usual Unity imports (the using component); we are also importing the UnityEngine.AI
    library in our code segment. This contains the necessary classes and methods that
    will be used by the agent to navigate through the navigation mesh.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: To create a navigation mesh agent is really simple in Unity. This is done by
    using the NavMeshAgent type in the variable declaration section. First we initialize
    our GameObject variables and also create a camera variable that will be used by
    us for raycasting. The camera raycast will then be converted into a point on the
    screen where we click, and that will be the new destination where the Puppo agent
    has to go.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: By now, we know that the start method is used for initialization of the varibles
    and the Gameobjects with the tags.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: In the update method, which is called per frame, we check whether we clicked
    the left mouse button via the command Input.GetMouseButtonDown(0), where 0 is
    the code for the left mouse button. Then we create a Raycast that is converted
    to a point on the screen by the camera using the ScreenPointToRay() function.
    Then based on where the ray hits on the screen, we update the new destination
    of the agent by using the SetDestination() function of NavMesh agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: Once done, we can close the editor and assign the script to the Puppo (CORGI)
    game object. Then we can play the game when we run it in the editor. Figure [2-27](#Fig27)
    shows this scene.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig27_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-27
  prefs: []
  type: TYPE_NORMAL
- en: Navigation Puppo Scene in the Unity Editor
  prefs: []
  type: TYPE_NORMAL
- en: Obstacle Meshes and Puppo
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the previous section, we had an overview of the navigation component in Unity
    and how to create an AI agent that can move optimally to any point we click on
    the screen using A*. Now let us return to a classic RL environment of rewards
    and obstacles. In the “environment” folder, we will open the “ObstaclePuppo” Unity
    executable. When we run the game, we see that Puppo is now placed in the same
    ground, but there are certain obstacles in the form of roadblocks where Puppo
    cannot walk. But Puppo has to reach and collect all three sticks from the different
    locations on the ground and that, too, at following an optimal combines the path
    to the three sticks. When we play, we see how Puppo intelligently navigates through
    the scene and avoids the roadblocks and finally collects all three sticks. Figure
    [2-28](#Fig28) shows Puppo resting after collecting all three sticks.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig28_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-28
  prefs: []
  type: TYPE_NORMAL
- en: Obstacle Puppo game in Unity
  prefs: []
  type: TYPE_NORMAL
- en: Open the “ObstacleMeshPuppo” scene in Unity. We have a similar environment as
    we did before, with the addition of two roadblocks that are navigation mesh obstacles
    and three sticks that are the rewards or targets. We bake the scene like before
    and visualize the blue covering of the navigation mesh. The difference here is
    that we have to initialize the obstacles that are present in the mesh. The Prefabs
    marked as “Fence” are the obstacles, and we have to add the NavMesh obstacle component
    to them. This lets Unity Engine know that the mesh contains obstacles at those
    particular transforms or positions. The rest of all the values and other components,
    such as the NavMesh agent or Bake properties, are same as the previous scene.
    Figure [2-29](#Fig29) shows Nav Mesh Obstacle Scene.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig29_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-29
  prefs: []
  type: TYPE_NORMAL
- en: Nav Mesh Obstacle added to the Obstacle Puppo Scene
  prefs: []
  type: TYPE_NORMAL
- en: Let us open the “ObstaclePuppo.cs” C# script to create this simulation. Like
    before, we are using UnityEngine.AI module for our navigation mesh. We also initialize
    variables for the agent, target Gameobjects, and their transforms along with a
    NavMesh agent variable for Puppo (agent).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: 'Start method initializes the variables and also fills the list of the target
    sticks transforms as shown here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: The next step involves calling a Coroutine from the update method called “executeObstacleFind,”
    which gets triggered every frame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: We run the simulation until all the sticks have been collected and the maximum
    rewards have been received by Puppo. We randomly select a stick from the list
    based on the transform positions and then assign its location as the new destination
    for agent Puppo. This is controlled by the SetDestination, which takes the transform
    position attribute of the stick GameObejct.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: Then we compute the distance between the agent and the stick. If the distance
    is less than the given threshold, then it implies Puppo has reached the stick
    and collects the stick. For every stick Puppo collects, a reward of 10 points
    is received by the agent Puppo. To complete the simulation, Puppo needs to collect
    all three sticks, amounting to a total of 30 points.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: Finally we give rest to Puppo for each stick he collects and after collecting
    all the sticks. This is Puppo in the process of collecting the first stick, shown
    in Figure [2-30](#Fig30).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig30_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-30
  prefs: []
  type: TYPE_NORMAL
- en: Obstacle Puppo Unity Scene
  prefs: []
  type: TYPE_NORMAL
- en: Off Mesh Links and Puppo
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final and the most interesting concept of navigation meshes are the off
    mesh links. These are links that allow motion of the navigation mesh agent outside
    the planar convex polygonal navigation meshes and also between different meshes.
    There are two ways to generate off mesh links to connect disjointed navigation
    meshes. Open the “OffMeshPuppo” Unity scene. The two ways to generate off mesh
    links are listed here.
  prefs: []
  type: TYPE_NORMAL
- en: '**Generate automatically** : This is controlled by clicking the Navigation
    Tab in the Inspector Window and then clicking on the Objects Tab. We have to click
    on “Generate OffMeshLinks” (ticked) to automatically generate links between the
    two navigation meshes. In this case, care must be taken on changing the “jump
    across” and “drop height” because the trajectory for drop height is designed such
    that horizontal travel by the agent is:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2* agentRadius + 4* voxelSize
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: and the trajectory for the “jump across” is defined such that the horizontal
    travel is more than 2* agentRadius and less than the jump distance. Figure [2-31](#Fig31)
    shows Off Mesh Links.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig31_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig31_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 2-31
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Automatic off mesh links between the two navigation meshes
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Add off mesh link** **component** : This is another method of adding the
    off mesh link manually to the platform or terrains that need to be connected.
    Based on the width of the off mesh link, the agent always chooses the minimum
    path between the source and the destination, which are present in two different
    navigation meshes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After adding the off mesh links, we will see that links are formed between the
    two navigation meshes. This also shows us the path along which the agent Puppo
    can traverse to reach the stick target in the next navigation mesh, as shown in
    Figure [2-32](#Fig32) and Figure [2-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig32_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-32
  prefs: []
  type: TYPE_NORMAL
- en: Off mesh links in Editor Scene View
  prefs: []
  type: TYPE_NORMAL
- en: Let us now create a very simple script to let Puppo use the off mesh link and
    reach the stick target that is present in the next navigation mesh (the one on
    the left). Open the “OffMeshPuppo, cs” C# script. Since most of the initialization
    and library inclusion is similar to previous codes, we will concentrate ourselves
    on the “Offmesh” Coroutine. We set the destination of the agent as the position
    of the target stick using the SetDestination method, and then we check whether
    the distance between the target and Puppo is less than a given threshold. If this
    condition is met, we reward Puppo with 10 points and the stick is collected, giving
    puppo some time to rest.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: On running the scene (or we can play from selecting the “OffMeshPuppo” Unity.exe
    file from the “environments” folder), we get to see how Puppo uses the off mesh
    link to connect between different navigation meshes. This is shown in Figure [2-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig33_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-33
  prefs: []
  type: TYPE_NORMAL
- en: Off Mesh links in Unity GamePlay Scene
  prefs: []
  type: TYPE_NORMAL
- en: We now proceed to the final section of the chapter, where we will create an
    enemy AI with the help of navigation meshes and pathfinding algorithms that we
    have learned so far.
  prefs: []
  type: TYPE_NORMAL
- en: Creating Enemy AI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have a fair understanding of how pathfinding works in sync with
    navigation meshes and the ease of use of the Unity NavMesh system, we will create
    a very simple enemy AI, where an agent cube has to find a target cube in an obstacle-filled
    environment. Once the target cube is in the line of sight of the agent cube (i.e.,
    the agent can see clearly), then the agent starts firing at the target to destroy
    it. There is one catch, however—we have the ability to move the target anywhere
    we want in the scene to avoid getting shot by the agent. To play the game, go
    to the “environments” folder and just run the “EnemyAI” Unity.exe file. Click
    on the screen where we want the target to move to, and the target will move there.
    Once the agent finds the target, it starts firing and gets a reward once the agent
    destroys the target.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-34](#Fig34) shows the Unity Scene for Enemy AI with Navigation Meshes.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig34_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-34
  prefs: []
  type: TYPE_NORMAL
- en: Enemy AI gameplay using NavMesh agent and pathfinding
  prefs: []
  type: TYPE_NORMAL
- en: Now let us open the “EnemyAI” folder in Assets to explore the scene and navigation
    mesh. We have the scene where the walls are the obstacles and platform serves
    as the navigation mesh. We create this using the Bake method mentioned earlier.
    Then we assign the NavMesh agent component to the purple agent cube. This is the
    enemy agent, which uses heuristic A* to find an optimal path to the target cube.
    The values of the settings of the navigation meshes as well the NavMesh agent
    are set as default. We have two different scripts for this particular use-case.
    The “PlayerAI” script controls the motion of the target (which is us), and the
    “EnemyAI” script, which controls the purple agent. We will explore the “PlayerAI”
    since it resembles the “NavigationPuppo.cs” script, which uses camera and raycast
    to determine a hit-point on the screen and makes the target move there accordingly.
    A preview of the scene is provided in Figure [2-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig35_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig35_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-35
  prefs: []
  type: TYPE_NORMAL
- en: Unity Scene View containing the NavMesh agent component
  prefs: []
  type: TYPE_NORMAL
- en: Open the “PlayerAI” script. We see that we have the same initialization as before,
    containing the target Gameobject, target transform, a NavMesh agent variable,
    and the camera variable that converts the raycast to screen point like before.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: 'We also have the start method initialized as:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: We then have the update method, similarly to before, where we check whether
    the user has clicked the left mouse button and then trigger a raycast that is
    transformed to a point using the ScreenPointToRay() function to get a new transform
    position. Then we set the destination as this new transform position.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: Now let us view the “EnemyAI” script. We have certain variables to initialize,
    such as the target, agent GameObject, NavMesh agent, and a spherical GameObject
    called the “bullet.” We assign the Rigidbody component to the “bullet” GameObject
    such that it uses collision detection when it collides with the target Gameobject.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  prefs: []
  type: TYPE_PRE
- en: 'The start method then initializes those variables like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  prefs: []
  type: TYPE_PRE
- en: We then have a OnTriggerEnter method that is triggered when collisions take
    place between the bullet and the target GameObject. The target is then desroyed
    by the bullet on collision.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: Next we come to the update method. Here, we create a raycast that moves along
    the agent’s z axis in the forward direction. This raycast is helpful to check
    if the target is present in the agent’s line of sight. We also have the SetDestination()
    method, which updates the destination of the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: 'If the Raycast hits the a GameObject, we check whether the hit object is the
    target with the help of the following lines of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: We then let the agent fire the bullets with the help of the Instantiate() method,
    which is used for instantiating prefabs or clones of the bullet GameObject. This
    hits the target Object and calls the OnTriggerEnter, and that method causes the
    target to get destroyed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: We also have another condition that happens if the bullet misses the agent.
    This can happen when the agent is moving away from the line of sight of the target
    and is assigned to new location. In that case, if the agent cube is near the vicinity
    of the target cube, the latter gets destroyed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: That is the entire code segment for this game. Let us return back to Unity and
    assign the “PlayerAI.cs” script to the target (green) and the “EnemyAI.cs” script
    to the agent (purple). Both of these GameObjects have the NavMesh agent attached
    to them. Click play in the Unity Editor, and we can play this AI-driven pathfinding
    game, as shown in Figure [2-35](#Fig35) and [2-36](#Fig36).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502041_1_En_2_Chapter/502041_1_En_2_Fig36_HTML.jpg](../images/502041_1_En_2_Chapter/502041_1_En_2_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-36
  prefs: []
  type: TYPE_NORMAL
- en: Agent firing at the target during GamePlay using NavMeshes in Unity
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With that we come to the end of this chapter. We have explored briefly the core
    fundamentals of pathfinding algorithms in classic RL and autonomous control agents
    and also learned about navigation meshes.
  prefs: []
  type: TYPE_NORMAL
- en: We started with the generic concept of pathfinding in a reinforcement learning
    (RL) environment. We understood the different scenarios where an autonomous agent
    must decide a proper optimal path from a source to a destination, even if there
    are obstacles in the path.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then went through the details of some popular pathfinding algorithms used
    in generic Graph Theory, such as Greedy breadth first search and Dijkstra.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The next topic was on an improvisation of searching algorithms by adding a heuristic
    estimate. We introduced the concept of the A* algorithm for pathfinding and discussed
    Dijkstra as a special case of A* algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We explored the different variants of A* algorithms based on time complexity
    and memory optimization, such as dynamic weighted A*, iterative deepening A*,
    lifelong planning A*, D*, B*, and small memory-bound A* algorithms. This helped
    us understand how different variations are used in simulations and game engines
    based on memory and speed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We then explored creating a simulation in Unity for both Dijkstra and A* algorithms
    and got to explore new fundamental concepts of classes and composite containers
    in C#.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We tried to understand the fundamentals of navigation meshes and the convex
    polygons composing them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Unity, we created navigation meshes and learned about the UnityEngine.AI
    component. This module is responsible for the navigation and pathfinding in Unity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We learned about off mesh links and obstacle avoidance with the help of NavMesh
    agents, NavMesh obstacles, and off mesh links and created games and simulations
    for the same.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the last section, we applied our knowledge and understanding to create an
    “EnemyAI” game, where the main task of the target is to avoid getting fired at
    by the NavMesh agent, which intelligently avoids the obstacles and finds the target
    through the most optimal trajectory.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now we have an understanding of state-based RL as well as pathfinding in generic
    games and autonomous agents. This forms the basis of fundamental concepts of classic
    RL. In the next steps, we will start discovering slowly the depths of machine
    learning (ML) Agents and deep RL using Unity. The next chapter describes setting
    up and installing the Unity ML agents and configuring the system. We will look
    into the core concepts of Unity ML agents and why deep learning is required for
    RL.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: This is our Microsoft Word writing template, which includes brief guidelines
