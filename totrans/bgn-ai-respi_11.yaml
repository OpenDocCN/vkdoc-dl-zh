  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[http://www.ohio.edu/people/starzykj/network/Class/ee690/EE690 Design of Embodied
    Intelligence/Reading Assignments/robot-emotion-Breazeal-Brooks-03.pdf](http://www.ohio.edu/people/starzykj/network/Class/ee690/EE690
