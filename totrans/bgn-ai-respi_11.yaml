- en: 11. Behavior-Based Robotics
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 基于行为的机器人学
- en: Behavior-based robotics (BBR) is an approach to control robots. Its origins
    are in the study of both animal and insect behaviors. This chapter presents an
    in-depth exploration of this approach.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 基于行为的机器人学（BBR）是控制机器人的方法。其起源在于对动物和昆虫行为的研究。本章深入探讨了这种方法。
