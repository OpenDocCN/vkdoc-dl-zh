  zh: '[http://www.sci.brooklyn.cuny.edu/~sklar/teaching/boston-college/s01/mc375/iecon98.pdf](http://www.sci.brooklyn.cuny.edu/%7Esklar/teaching/boston-college/s01/mc375/iecon98.pdf)'
