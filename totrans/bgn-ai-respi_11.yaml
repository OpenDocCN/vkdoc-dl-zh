  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Behavior-based robotics (BBR) was this chapter’s theme. BBR is based on animal
    and insect behavior patterns, especially the ones related to how organisms react
    to sensory stimulation within their environment.
  prefs: []
  type: TYPE_NORMAL
- en: A brief section discussed how the human brain exhibits multilayer behavioral
    functions, which range from basic survival behaviors to complex reasoning behaviors.
    An introduction to the subsumption architecture followed; it is closely modeled
    after the human brain’s multilayered behavioral model.
  prefs: []
  type: TYPE_NORMAL
- en: Further in-depth discussion went through both simple and complex behavioral
    models. I choose to use the finite state model (FSM) for this chapter’s robot
    car demonstration.
  prefs: []
  type: TYPE_NORMAL
- en: I next demonstrated an open source, graphical robotic simulation system named
    breve. A simple Braitenberg vehicle simulation was created and run that further
    demonstrated how the stimulus/response behavior pattern functions.
  prefs: []
  type: TYPE_NORMAL
- en: The final demonstration used the Alfie robot car, which was controlled by a
    Python script created using the subsumption architecture model. The script contained
    three behaviors, each with its own priority level. I showed how subsumptive-based
    behavior could take over the robot, depending on the environmental conditions
    that the robot encountered.
  prefs: []
  type: TYPE_NORMAL
