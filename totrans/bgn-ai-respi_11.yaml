- en: There is a robot used in a demonstration discussed in this chapter that you
    can build by following the instructions in the appendix. The parts list includes
    items required beyond those needed for the basic robot.
  prefs: []
  type: TYPE_NORMAL
- en: The underlying formal structure for BBR is called subsumption architecture .
    In 1985, MIT professor Dr. Rodney Brooks wrote an internal technical memo titled
    “A Robust Layered Control Mechanism for Mobile Robots.” At the time, Dr. Brooks
    worked in MIT’s Artificial Intelligence Laboratory. His memo was subsequently
    published in 1986 as a paper in the IEEE Journal of Robotics and Automation. His
    paper changed the nature and direction of robotics research for many years. The
    gist of the paper described a robot control organization that he called subsumption
    architecture. The theory behind this architecture is based, in part, on the evolutionary
    development of the human brain.
  prefs: []
  type: TYPE_NORMAL
- en: Human Brain Structure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On a very broad scale, the human brain can be divided into three levels or parts.
    The lowest level is the most primitive part, which is responsible for basic life-supporting
    activities, such as respiration, blood pressure, core temperature, and so forth.
    The brain stem is the organic brain section that hosts these primitive functions.
    Figure [11-1](#Fig1) illustrates the brain stem and the limbic system.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig1_HTML.jpg](A436848_1_En_11_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-1.
  prefs: []
  type: TYPE_NORMAL
- en: Brain stem and limbic system
  prefs: []
  type: TYPE_NORMAL
- en: The next highest level of brain function has been termed the reptile brain or
    limbic system . It is responsible for eating, sleeping, reproduction, flight or
    fight, and similar behaviors. The limbic system is made up of the hippocampus,
    amygdala, hypothalamus, and the pituitary gland. Finally, the highest cognitive
    level is the neocortex, which is responsible for learning, thinking, and similar
    high-level complex activities. The brain components composing the neocortex, or
    cerebral cortex, are the frontal, temporal, occipital, and parietal lobes. Figure
    [11-2](#Fig2) illustrates the four lobes that comprise the cerebral cortex.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig2_HTML.jpg](A436848_1_En_11_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-2.
  prefs: []
  type: TYPE_NORMAL
- en: Cerebral cortex
  prefs: []
  type: TYPE_NORMAL
- en: Most often, these various brain levels function quite independently of each
    other but they can and often have conflicts. Perhaps you have a “high-strung”
    personality and find food a welcoming diversion to ease stress. The higher-level
    function knows that eating too much of the wrong types of food is no good for
    you, but the lower-level reptile brain still craves it. Which brain level overrides
    and changes your behavior is problematic. Sometimes the lower level wins and other
    times the higher level wins. However, if you have an addiction, it is always the
    case that the lower level wins and changes your behavior, usually for the worst.
    Anyone can have many different brain-level behaviors ready to activate at a given
    time, but only one “wins” out and causes the current active behavior to be displayed.
    This interplay between brain behaviors was one source of Dr. Brooks’ subsumption
    architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Subsumption Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A definition of subsumption will help at this point in the discussion. However,
    what really has to be defined is the word subsume, because subsumption is circularly
    defined as the act of subsuming.
  prefs: []
  type: TYPE_NORMAL
- en: 'subsume: incorporating something under a more general category; to include
    something in a larger group or a group in a higher position'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These definitions imply that complex behaviors can be decomposed into multiple
    simpler behaviors. There is another perspective that must be added to the definition.
    This addition is the word reactive, because in the real world, robots depend on
    sensors to react or change behaviors based on sensory inputs. These inputs are
    constantly reacting to changes in the robot’s environment. Reactive behavior is
    also called stimulus/response behavior , which is appropriate for insects. Insects
    are a lower-level life form when compared to mammals, and they do not have a highly
    developed learning capability. What they do have is called habituation , which
    allows an insect to adapt to certain types of environmental changes. This can
    easily be seen by blowing air on a cockroach. The insect initially retreats from
    the blowing air. However, repeatedly blowing air on the cockroach causes it to
    ignore the air because it is perceived as non–life threatening. This type of low-level
    learning is useful for robots, especially autonomous robots.
  prefs: []
  type: TYPE_NORMAL
- en: One way to display the traditional approach for a reactive system is shown in
    Figure [11-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig3_HTML.jpg](A436848_1_En_11_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-3.
  prefs: []
  type: TYPE_NORMAL
- en: Flowchart for a sensor-based system
  prefs: []
  type: TYPE_NORMAL
- en: The collection of serial processes, from sensors to action, may be thought of
    as a behavior. This layout of serial processes or tasks is slow and relatively
    inflexible. Sensors acquire data without attempting to process it in any way.
    That job is left to the perception block, which must sort out all relevant sensory
    data before passing it on to the model block. The model block transforms this
    filtered data into a contextual sense or state. The plan block has rules that
    are followed based upon the state it receives from the model block. Finally, the
    action block implements the appropriate rules received from the plan block and
    sends the required control signals to the actuators, which are shown in the final
    block in the diagram. Having all of these blocks in a serial architecture makes
    for a slow response, which is not a good robotic attribute.
  prefs: []
  type: TYPE_NORMAL
- en: The serial blocks shown in the diagram represent a complex behavior that can
    be represented by a single layer. A layer in a behavioral sense may be considered
    a goal to be achieved by an agent or a robot.
  prefs: []
  type: TYPE_NORMAL
- en: Complex behaviors maybe decomposed into simpler behaviors. This is the key to
    subsumption architecture. Figure [11-4](#Fig4) shows a two-layer decomposition
    in place of the complex single-layer behavior stream shown in Figure [11-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig4_HTML.jpg](A436848_1_En_11_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-4.
  prefs: []
  type: TYPE_NORMAL
- en: Two-layer behavior serial stream
  prefs: []
  type: TYPE_NORMAL
- en: Each layer or path is considered related to a specific task, such as following
    a wall or detecting an obstacle. This is the subsumption architecture proposed
    by Dr. Brooks. Notice that there is an additional arbitrator block that processes
    all of the action block signals before sending selected ones to the actuators.
    This arbitrator block is another important element in subsumption architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Systems can be made much more responsive by essentially converting a single,
    complex behavior into multiple parallel paths. It is also easy to envision that
    many more layers can be added without disturbing any of the existing layers. The
    feature of extending code without modifying existing code closely mimics the software
    composition principle discussed in an earlier chapter. It is always a good thing
    to be able to extend existing code without too much “disturbance” to the existing
    code.
  prefs: []
  type: TYPE_NORMAL
- en: The subsumption architecture does not provide any guidance on how to decompose
    a complex behavior into simpler multiple tasks. In addition, the perception block
    is generally regarded as the hardest of all the blocks to define and implement.
    The problem is to create a meaningful data set from a limited number of environmental
    sensors. This data set then feeds the model block that effectively creates the
    robot’s world or state. At this point, BBR differs significantly from the more
    traditional approach. I discuss the traditional approach first, followed by the
    BBR approach.
  prefs: []
  type: TYPE_NORMAL
- en: Traditional Approach
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the traditional approach, the model block stores a complete and accurate
    model of the real world that the robot operates within. This may be accomplished
    in a variety of ways, but there is usually some type of geometric coordinate system
    involved for mobile robots to establish the current state and predict the future
    state. Sensor data must be calibrated and accurate for the state to be precisely
    determined. Ideal state information is either stored or computed based upon the
    sensor data set. Deviations from the ideal state are errors that are passed onto
    to the plan block so that appropriate control measures can be taken to minimize
    these errors. Controllers or actuators must also be precise and accurate to ensure
    that the corrective motions are done in strict conformance with the commands created
    by the plan and action blocks.
  prefs: []
  type: TYPE_NORMAL
- en: The traditional approach often involves a lot of computer memory to store or
    compute the necessary state information. It is slower than the BBR approach, which
    in turn makes the robot less responsive.
  prefs: []
  type: TYPE_NORMAL
- en: Behavior-Based Robotics Approach
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is worth digressing a bit before discussing BBR. In the study of animal behavior,
    also known as ethology , it has been shown that infant seagulls respond to parent
    models. Figure [11-5](#Fig5) shows such a parent model with a feature circled
    in the figure, which will trigger the infant gull’s instinct feeding behavior.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig5_HTML.jpg](A436848_1_En_11_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-5.
  prefs: []
  type: TYPE_NORMAL
- en: Seagull ethology
  prefs: []
  type: TYPE_NORMAL
- en: All that matters to the infant gulls is that the parent gull model has a sharp
    beak with a colored spot near the beak tip. The babies open their beaks awaiting
    food delivery. These infant gulls use a very limited real-world representation,
    but it has been shown to be perfectly adequate for the gull species to survive.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, real-world robots can use a limited real-world representation or
    model, so that it should be adequate to carry out the desired requirements without
    reliance on an overly detailed world model.
  prefs: []
  type: TYPE_NORMAL
- en: These limited representations are often referred to as “snapshots” of the local
    environment. Behaviors are then designed to react to these snapshots. Two of the
    important points are that the mobile robot does not need to maintain a geometric
    coordinate system, and it does not have to have a memory-laden real-world model.
    By utilizing reflex-like direct responses, mobile robots minimize the complexity
    of the model, plan, and action blocks. The behavior stream almost reverts to a
    simple behavior diagram, as shown in Figure [11-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig6_HTML.jpg](A436848_1_En_11_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-6.
  prefs: []
  type: TYPE_NORMAL
- en: Simple behavioral stream
  prefs: []
  type: TYPE_NORMAL
- en: How can environmental snapshots be related to robot behaviors? Initially, a
    data set has to be created that consists of the sensor data generated when the
    environmental conditions exist, which should trigger the desired robotic reflexive
    behavior. These are termed sensor signatures. Now all that needs to be done is
    to link the signatures to a specific behavior using interpretive routines, normally
    done in the Prediction block. However, there could be an issue that given the
    relatively coarse-grained sensor data signatures, simultaneous stimulus/response
    pairings could happen. Assigning priorities to the simple behaviors alleviates
    this situation. In addition, default or long-term behaviors are normally assigned
    a lower priority than emergent or “tactical” behaviors. The tactical signature
    happens if the robot encounters an environment condition that requires immediate
    attention from the robot control system.
  prefs: []
  type: TYPE_NORMAL
- en: Instituting a behavior prioritization scheme has an unintended positive outcome.
    Robots usually operate with the same behavior, such as moving forward. All behaviors
    acting in sequence should strive to maintain this normalcy. Only when environmental
    conditions warrant should a behavior direct the robot to deviate from the normal.
    When deviations happen, the higher-priority behaviors take control and try to
    restore normalcy.
  prefs: []
  type: TYPE_NORMAL
- en: BBR also incorporates long-term progress indicators to help avoid a “looping”
    situation, as might be the case where the robot continually bounces between two
    barriers or is locked into a wall corner. These long-term progress indicators
    effectively generate a strategic trajectory in which the robot moves in a general
    direction or path. When progress is impeded, a different set of behaviors is selected
    to return to the normal state.
  prefs: []
  type: TYPE_NORMAL
- en: In a layered subsumption model, a low-level layer might have the goal to “avoid
    an obstacle.” This layer could be “beneath” a higher level of “roam around.” The
    higher level of “roam around” is said to subsume the lower-level behavior of “avoid
    an obstacle.” All layers have access to sensors to detect environment changes,
    as well as the ability to control actuators. An overall constraint is that separate
    tasks have the ability to suppress any input and to inhibit output sent to actuators.
    In this way, the lowest levels can be very responsive to environment changes,
    much the way reflexes function in living organisms. Higher levels are more abstract
    and devoted to satisfying goals.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following behaviors may be represented by a variety of graphical or mathematical
    models :'
  prefs: []
  type: TYPE_NORMAL
- en: Functional notation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stimulus/response diagram
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finite state machine (FSM)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Schema
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I use the FSM model because it provides a good representation of behavior interactions
    without much mathematic abstraction. A basic FSM model is shown in Figure [11-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig7_HTML.jpg](A436848_1_En_11_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-7.
  prefs: []
  type: TYPE_NORMAL
- en: Basic FSM model
  prefs: []
  type: TYPE_NORMAL
- en: Figure [11-8](#Fig8) shows multiple behaviors with interrelationships, including
    sensory inhibitions and actuator suppressions. Notice the layered behavior sequences
    and behavior prioritization discussed earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig8_HTML.jpg](A436848_1_En_11_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-8.
  prefs: []
  type: TYPE_NORMAL
- en: Multilayered FSM model
  prefs: []
  type: TYPE_NORMAL
- en: At this point in the discussion, I would normally proceed to show you a Python
    implementation for a subsumption architecture that runs on a Raspberry Pi. Next,
    however, I divert from the norm to discuss a very nice robot simulation project
    that can implement subsumption and a whole lot more.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 11-1: The Breve Project'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The breve project is the work of Jon Klein, who developed it as part of his
    undergraduate and graduate thesis work. It is available from Jon’s website at
    [`www.spiderland.org`](http://www.spiderland.org) for Windows, Linux, and Mac
    platforms. I am using it on a MacBook Pro and it seems to perform quite flawlessly.
    Just be aware that Jon states on his website that he is no longer actively updating
    the application but continues to make it available, at least in the Mac format.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are Jon’s own words to describe what breve is all about: “breve is a free,
    open-source software package which makes it easy to build 3D simulations of multi-agent
    systems and artificial life. Using Python, or using a simple scripting language
    called steve, you can define the behaviors of agents in a 3D world and observe
    how they interact. breve includes physical simulation and collision detection
    so you can simulate realistic creatures. It also has an OpenGL display engine
    so you can visualize your simulated worlds.”'
  prefs: []
  type: TYPE_NORMAL
- en: There is extensive HTML-formatted documentation on the website that I urge you
    to review; particularly the introductory pages showing how to run one of the many
    available demo scripts. These scripts are both in the “steve” front-end language
    as well as Python. It is impossible for me to go through the many documentation
    pages, which would constitute an entire book to itself. I did run the following
    Python script, titled RangerImage.py , in breve. The listing is shown here to
    provide a glimpse of the power and flexibility that you have using breve.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Figure [11-9](#Fig9) shows the actual robot running in the breve display, which
    was created by the preceding script.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig9_HTML.jpg](A436848_1_En_11_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-9.
  prefs: []
  type: TYPE_NORMAL
- en: breve world
  prefs: []
  type: TYPE_NORMAL
- en: 'You may have noticed in the script that there are references to BraitenbergControl,
    BraitenbergLight, and BraitenbergVehicle. These are based on a [thought experiment](https://en.wikipedia.org/wiki/Thought_experiment#Thought%20experiment)
    conducted by [Italian](https://en.wikipedia.org/wiki/Italy#Italy)-[Austrian](https://en.wikipedia.org/wiki/Austria#Austria)
    cyberneticist [Valentino Braitenberg](https://en.wikipedia.org/wiki/Valentino_Braitenberg#Valentino%20Braitenberg),
    who wrote Vehicles: Experiments in Synthetic Psychology (The MIT Press,1984),
    which I highly recommend for readers desiring to learn more about his innovative
    approach to robotics. In his experiment, he envisions vehicles directly controlled
    by sensors. The resulting behavior might appear complex, or even intelligent,
    but in reality, it is based on a combination of simpler behaviors. That should
    remind you of subsumption at work.'
  prefs: []
  type: TYPE_NORMAL
- en: A Braitenberg vehicle may be thought of as an agent that autonomously moves
    around based on its own sensory inputs. In these thought experiments, the sensors
    are primitive and simply measure a stimulus, which is often just a point light
    source. The sensors are also directly connected to the motor actuators so that
    a sensor can immediately activate a motor upon stimulation. Again, this should
    remind you of the simple behavioral stream shown in Figure [11-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: The resulting Braitenberg vehicle behavior depends on how the sensors and motors
    are connected. In Figure [11-10](#Fig10), there are two different configurations
    between the sensors and the motors. The vehicle to the left is wired so that it
    avoids or drives away from the light source. This contrasts with the vehicle on
    the right, which drives toward the light source.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig10_HTML.jpg](A436848_1_En_11_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-10.
  prefs: []
  type: TYPE_NORMAL
- en: Braitenberg vehicles
  prefs: []
  type: TYPE_NORMAL
- en: It is not too much of a leap to say that the vehicle on the left “fears” the
    light, while the vehicle on the right “likes” the light. I have assigned human-like
    behaviors to a robot, which is precisely the result that Braitenberg was seeking.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another Braitenberg vehicle has one light sensor with the following behaviors
    :'
  prefs: []
  type: TYPE_NORMAL
- en: More light produces faster movement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Less light produces slower movement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Darkness produces standstill.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This behavior can be interpreted as a robot that is afraid of the light and
    moves quickly to get away from it. Its goal is to find a dark spot to hide.
  prefs: []
  type: TYPE_NORMAL
- en: 'Of course, the complementary Braitenberg vehicle is one that features these
    behaviors:'
  prefs: []
  type: TYPE_NORMAL
- en: More darkness produces faster movement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Less darkness produces slower movement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Full light produces standstill.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this case, the behavior can be interpreted as a robot that is seeking light
    and moves quickly to get to it. Its goal is to find the brightest spot to park.
  prefs: []
  type: TYPE_NORMAL
- en: Braitenberg vehicles exhibit complex and dynamic behavior in a complex environment
    with multiple stimulation sources. Depending on the configuration between the
    sensors and the actuators, a Braitenberg vehicle might move close to a source,
    but not touch it, run away very quickly, or make circles or figures-of-eight around
    a point. Figure [11-11](#Fig11) illustrates these complex behaviors.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig11_HTML.jpg](A436848_1_En_11_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-11.
  prefs: []
  type: TYPE_NORMAL
- en: Braitenberg vehicles with complex behaviors
  prefs: []
  type: TYPE_NORMAL
- en: These behaviors may appear to be goal-directed, adaptive, and even intelligent
    in much the same way that minimal intelligence is attributed to a cockroach’s
    behavior. But the truth is that the agent is functioning in a purely mechanical
    way, without any [cognitive](https://en.wikipedia.org/wiki/Cognition#Cognition)
    or reasoning processes at play.
  prefs: []
  type: TYPE_NORMAL
- en: There are a few items in the breve Python example that I want to further explain
    in preparation for a step-by-step example in which you create your own Braitenberg
    vehicle. The first item to note is that all breve simulations require a controller
    object, which specifies how the simulation is to be set up. The controller’s name
    in this simulation is AggressorController. In the controller definition, there
    is at least one initialization method named `init`. In this specific case, because
    this is a Python script, there is another initialization method named `__init__`.
    The first initialization method is called when a breve object is instantiated.
    The second initialization method is automatically called when a Python object
    is instantiated. breve takes care of sorting out the relationships between breve
    and Python objects using a third object called a bridge. You don’t ordinarily
    have to be concerned with these bridge objects. In fact, if you only use the steve
    scripting language (instead of Python), you never see a bridge object.
  prefs: []
  type: TYPE_NORMAL
- en: The `init` method creates 10 Braitenberg light objects, a few of which you can
    see in Figure [11-7](#Fig7). They are the spheres named `'n'` surrounding the
    Braitenberg robot, which is also created by the `init` method and is referred
    to as `vehicle`.
  prefs: []
  type: TYPE_NORMAL
- en: The `__init__` method creates all the attributes needed for the simulation,
    and then it calls the `init` method that instantiates all the required simulation
    objects and assigns real values to the attributes. Once that is accomplished,
    all that is needed to click the play button to view the simulation.
  prefs: []
  type: TYPE_NORMAL
- en: 'The step-by-step demonstration starts here. The following listing creates a
    non-functioning Braitenberg vehicle and a light source:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: I named this script firstVehicle.py to indicate that it is the first of several
    generated in the process of developing a working simulation. Figure [11-12](#Fig12)
    shows the result after I loaded and “played” this script in the breve application.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig12_HTML.jpg](A436848_1_En_11_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-12.
  prefs: []
  type: TYPE_NORMAL
- en: breve world for the firstVehicle script
  prefs: []
  type: TYPE_NORMAL
- en: This script defines a `Controller` class that has the two initialization methods
    mentioned earlier. The `init` method instantiates a Braitenberg light object and
    a Braitenberg vehicle. The `__init__` method creates a list of attributes, which
    is filled in by a follow-on script. This method also calls the `init` method.
  prefs: []
  type: TYPE_NORMAL
- en: There is also a new method called `iterate` that simply causes the simulation
    to run continuously.
  prefs: []
  type: TYPE_NORMAL
- en: The next step in developing the script is to add sensors and wheels to the vehicle
    to allow it to move through and explore the breve world. The following statements
    add the wheels and set an initial velocity that causes the vehicle to turn in
    circles. These statements go into the `init` method .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The next set of statements adds the sensors. These are also added to the `init`
    method. The sensors are also cross-linked between the wheels (i.e., right sensor
    controls the left wheel and vice versa). The `setBias` method sets the amount
    of influence that a sensor has on its linked wheel. The default value is 1, which
    means that the sensor has a slightly positive influence on the wheel. A value
    of 15 means that the sensor has a strongly positive influence on the wheel. Bias
    can also be negative, meaning the influence is directly opposite to wheel activation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The preceding sets of statements were added to the `init` method. The whole
    script name was changed to secondVehicle.py. The sensors are designed to have
    a natural affinity toward any light source. However, if the sensors do not detect
    any light source, they will not activate their respective linked wheels. In this
    script configuration, the sensors do not immediately detect the light source and
    the vehicle simply stays still, which is the reason for my setting an initial
    natural velocity for each wheel. These settings guarantee that the robot will
    move. It may not move in the direction of the light source, but it moves. Figure
    [11-13](#Fig13) shows the updated breve world with the enhanced vehicle.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig13_HTML.jpg](A436848_1_En_11_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-13.
  prefs: []
  type: TYPE_NORMAL
- en: Breve world for the secondVehicle script
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, the simulation is working, but it is a bit dull because the vehicle
    has no purpose other than to turn in circles in the breve world, and perhaps to
    catch a glimpse of the solitary light source. It is time to give the vehicle a
    better goal to realize the rationale behind a simulation. I make the goal really
    simple, as this is a “hello world” type demonstration and its purpose is to clarify,
    not obscure how a breve simulation works. The goal is to have the vehicle seek
    out a number of light sources and simply “run through” them.
  prefs: []
  type: TYPE_NORMAL
- en: These additional Braitenberg light sources are generated by the following loop
    that is added to the `init` method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: I also commented out the single light source created in the initial script.
    In addition, I reset the natural velocities back to 0.0 because there are now
    a sufficient number of light sources that the vehicle sensors can likely detect.
    Figure [11-14](#Fig14) shows the updated breve world, with some of the additional
    light sources and the vehicle going through them. The new script was renamed thirdVehicle.py.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig14_HTML.jpg](A436848_1_En_11_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-14.
  prefs: []
  type: TYPE_NORMAL
- en: breve world for the thirdVehicle script
  prefs: []
  type: TYPE_NORMAL
- en: This last script completes my introductory lesson on how to create a robot simulation
    in the breve environment using Python. This lesson just scratches the surface
    on what breve has to offer—not just in robotic simulations but in a whole host
    of other AI applications. Look at Figure [11-15](#Fig15) and see if you recognize
    it.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig15_HTML.jpg](A436848_1_En_11_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-15.
  prefs: []
  type: TYPE_NORMAL
- en: breve snapshot
  prefs: []
  type: TYPE_NORMAL
- en: 'It is a snapshot of Conway’s Game of Life running in breve. This script is
    named PatchLife.py. It is available in the Demos menu selection in both Python
    and steve formats . In fact, most demos are available in both formats. There are
    many demos available for you to try, including the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Braitenberg: vehicles, lights'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Chemistry: Gray Scott diffusion, hypercycle'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'DLA: diffusion limited aggression (fractal growth)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Genetics: Game of Life both 2D and 3D'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Music: play midi and wav files'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Neural networks: multilayer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Physics: springs, joints, walkers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Swarms: swarming robots and other lifeforms'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Terrain: robots, creatures exploring terrain features'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is now time to conclude the breve discussion and return to subsumption.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 11-2: Building a Subsumption-Controlled Robot Car'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section’s objective is to describe how to program a Raspberry Pi that directly
    controls a robot car. The robot car is the same platform used in Chapter [7](A436848_1_En_7_Chapter.html),
    but now uses subsumption architecture to control the car’s behaviors. Python is
    the implementation language for the subsumption classes and scripts.
  prefs: []
  type: TYPE_NORMAL
- en: 'After searching through GitHub, I was inspired by Alexander Svenden’s EV3 post
    that used Python to implement a generic subsumption structure. I also relied on
    my experience with developing subsumptive Java classes with leJOS. You can read
    more about these Java classes at [`www.lejos.org`](http://www.lejos.org) . There
    are two primary classes required: one abstract class named `Behavior` and the
    other named `Controller`. The `Behavior` class encapsulates the car’s behavior
    using the following methods :'
  prefs: []
  type: TYPE_NORMAL
- en: '`takeControl()` : Returns a Boolean value indicating if the behavior should
    take control or not.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`action()` : Implements the specific behavior done by the car.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`suppress()` : Causes the action behavior to immediately stop, and then returns
    the car state to one in which the next behavior can take control.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The `Controller` class contains the main subsumption logic that determines
    which behaviors are active based on priority and the need for activation. The
    following are some of the methods in this class:'
  prefs: []
  type: TYPE_NORMAL
- en: '`__init__()`: Initializes the `Controller` object.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`add()`: Adds a behavior to the list of available behaviors. The order in which
    they are added determines the behavior’s priority.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`remove()`: Removes a behavior from the list of available behaviors. Stops
    any running behavior if the next highest behavior overrides it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`update()`: Stops an old behavior and runs the new behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`step()`: Finds the next active behavior and runs it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`find_next_active_behavior()`: Finds the next behavior wishing to be active.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`find_and_set_new_active_behavior()`: Finds the next behavior wishing to be
    active and makes it active.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`start()`: Runs the selected action method.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`stop()`: Stops the current action.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`continously_find_new_active_behavior()`: Monitors in real-time for new behaviors
    desiring to be active.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`__str__()`: Returns the name of the current behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `Controller` object also functions as a scheduler, where one behavior is
    active at a time. The active behavior is decided by the sensor data and its priority.
    Any old active behavior is suppressed when a behavior with a higher priority signals
    that it wants to run.
  prefs: []
  type: TYPE_NORMAL
- en: There are two ways to use the `Controller` class . The first way is to let the
    class take care of the scheduler itself by calling the `start()` method. The other
    way is to forcibly start the scheduler by calling the `step()` method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The `Controller` class is very general by allowing a wide variety of behaviors
    to be implemented using the general-purpose methods. The `takeControl()` method
    allows a behavior to signal that it wishes to take control of the robot. The way
    it does this is discussed later. The `action()` method is the way a behavior starts
    to control the robot. The obstacle avoidance behavior kicks off its `action()`
    method if a sensor detects an obstacle impeding the robot’s path. The `suppress()`
    method is used by a higher priority behavior to stop or suppress the `action()`
    method of a lower priority behavior. This happens when an obstacle avoidance behavior
    takes over from the normal forward motion behavior by suppressing the forward
    behavior’s `action()` method and having its own `action()` method activated.
  prefs: []
  type: TYPE_NORMAL
- en: The `Controller` class requires a list or array of `Behavior` objects that comprise
    the robot’s overall behavior. A `Controller` instance starts with the highest
    array index in the `Behavior` array and checks the `takeControl()` method’s return
    value. If true, it calls that behavior’s `action()` method. If it is false, the
    `Controller` checks the next `Behavior` object’s `takeControl()` method return
    value. Prioritization happens by the assignment of index array values attached
    to each `Behavior` object. The `Controller` class continually rescans all the
    `Behavior` objects and suppresses a lower priority behavior if a higher priority
    behavior asserts the `takeControl()` method while the lower priority `action()`
    method is activated. Figure [11-16](#Fig16) shows this process with all the behaviors
    that are eventually added.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig16_HTML.jpg](A436848_1_En_11_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-16.
  prefs: []
  type: TYPE_NORMAL
- en: Behavior state diagram
  prefs: []
  type: TYPE_NORMAL
- en: It is now time to create a relatively simple behavior-based robot example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 11-3: Alfie Robot Car'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The target robot is Alfie, which was used in previous chapters. The normal or
    low-priority behavior is to drive in a forward direction. A higher-priority behavior
    is obstacle avoidance, which uses ultrasonic sensors to detect obstacles in the
    robot’s direct path. The obstacle avoidance behavior is to stop, back up, and
    turn 90 degrees to the right.
  prefs: []
  type: TYPE_NORMAL
- en: The following class is named `NormalBehavior` . It reinforces the layered behavior
    approach. This class has all the required `Behavior` method implementations.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The `takeControl()` method should always return the logical value true. Higher
    priority behaviors are always allowed control by the `Controller` class; it really
    doesn’t matter if this lower priority requests control.
  prefs: []
  type: TYPE_NORMAL
- en: 'The `action()` method is very simple: power the motors in a forward direction
    using the full-power setting.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The `suppress()` method is also very simple: it stops both motors.'
  prefs: []
  type: TYPE_NORMAL
- en: The obstacle avoidance behavior is a bit more complex, however. It still implements
    the same three methods specified in the `Behavior` interface. I named the class
    `AvoidObstacle` to indicate its basic behavior.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: There are a few items to point out regarding this class. The `takeControl()`
    method returns a logical true only if the distance between the ultrasonic sensor
    and the obstacle is 10 inches or less. This behavior is never active without asserting
    a true value.
  prefs: []
  type: TYPE_NORMAL
- en: The `action()` method causes the robot to back up for 1.5 seconds, as seen by
    the `time.sleep(1.5)` statement. The robot next rotates for 0.3 seconds based
    on stopping the right motor and allowing the left motor to continue to run. The
    robot then stops waiting for the next behavior to activate.
  prefs: []
  type: TYPE_NORMAL
- en: The `suspense()` method simply stops both motors because there is no other obvious
    behavioral intent regarding suspending obstacle avoidance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The next step is to create a test class named `testBBR` that instantiates all
    of the classes defined earlier, and a `Controller` object. Note that I also added
    the `StopRobot` class to this listing, which I discuss next. I did this to avoid
    another long code listing. The following listing is named subsumption.py :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: At this point, it is a good opportunity to show how easy it is to add another
    behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Adding Another Behavior
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The new class encapsulates a stop behavior based on the battery voltage level.
    You certainly wish to halt the robot if the battery voltage drops below a critical
    level. You also need to build and connect a battery monitoring circuit, as shown
    in the Figure [11-17](#Fig17) schematic.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_11_Fig17_HTML.jpg](A436848_1_En_11_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-17.
  prefs: []
  type: TYPE_NORMAL
- en: Battery monitor schematic
  prefs: []
  type: TYPE_NORMAL
- en: This circuit uses the MCP3008 ADC chip discussed in earlier chapters. You should
    review the installation and configuration for this chip because it uses SPI, which
    requires a specialized Python interface library.
  prefs: []
  type: TYPE_NORMAL
- en: 'The new `Behavior` subclass is named `StopRobot`. It implements all three `Behavior`
    subsumption methods, as well as one more that sets a real-time voltage level.
    The following is the class code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The `testBBR` class also has to be slightly modified to accept the additional
    behavior. The following code shows the two statements that must be added to the
    `testBBR` class. Notice that the `StopRobot` behavior is the last one added, making
    it the highest priority—as it should be.
  prefs: []
  type: TYPE_NORMAL
- en: '`self.sr = StopRobot() (`Add this to the bottom of the list of instantiated
    `Behavior` subclasses.)'
  prefs: []
  type: TYPE_NORMAL
- en: '`self.sr.setVoltage(voltage) (`Add this right after the voltage measurement.)'
  prefs: []
  type: TYPE_NORMAL
- en: Test Run
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The robot was run using an SSH session to make the robot car completely autonomous
    and free of any encumbering wires or cables. The script started with the following
    command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The robot immediately drove forward in a straight line until in encountered
    an obstacle, which was a cardboard box. When the robot closed to about 10 inches
    from the box, it quickly paused, turned right, and proceeded to drive in a straight
    line. For this demonstration’s purpose, it is sufficient to stop at this point;
    although the robot’s behaviors may be continuously fine-tuned as additional requirements
    are placed on the robot.
  prefs: []
  type: TYPE_NORMAL
- en: 'Readers who wish to pursue more in-depth research into BBR should take a look
    at the following recommended website and online articles:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://sccn.ucsd.edu/wiki/MoBILAB`](https://sccn.ucsd.edu/wiki/MoBILAB)'
  prefs:
