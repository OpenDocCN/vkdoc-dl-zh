- en: Change Runtime Settings
  id: totrans-363
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更改运行时设置
- en: 'The following steps provide a walk-through for changing the Notebook runtime
    settings:'
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤提供了更改笔记本运行时设置的指南：
- en: Go to Runtime ➤ Change runtime type (see Figure [7-3](#Fig3)).
  id: totrans-365
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往运行时 ➤ 更改运行时类型（见图 [7-3](#Fig3)）。
