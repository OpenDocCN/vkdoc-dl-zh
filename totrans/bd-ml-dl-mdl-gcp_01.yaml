- en: 'The labeled numbers in Figure [5-3](#Fig3) are explained here:'
  prefs: []
  type: TYPE_NORMAL
- en: Choose the instance name. This name must start with a lowercase letter and can
    include numbers or hyphens, but should not end with a hyphen.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the instance region and zone. This is the geographical region where your
    computing instance is located, while the zone is a location within a region.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select the machine type. This allows for customization of the cores, memory,
    and GPUs for the VM (see Figure [5-4](#Fig4)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig4_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig4_HTML.jpg)'
  prefs:
