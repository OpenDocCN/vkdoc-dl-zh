- en: This chapter works through uploading and deleting data from Google Cloud Storage
    using the Cloud GUI console and command-line tools.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 本章通过使用 Cloud GUI 控制台和命令行工具上传和删除 Google Cloud Storage 中的数据来操作。
- en: In the next chapter, we will introduce Google Compute Engines, which are virtual
    machines running on Google’s distributed data centers and are connected via state-of-the-art
    fiber optic network. These machines are provisioned to lower the cost and speed
    up the processing of computing workloads.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将介绍 Google Compute Engine，这些是在 Google 分布式数据中心运行的虚拟机，并通过最先进的光纤网络连接。这些机器被配置以降低成本并加快计算工作负载的处理速度。
- en: 5. Google Compute Engine (GCE)
  id: totrans-219
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. Google Compute Engine (GCE)
- en: Google Compute Engine (GCE) makes available to users virtual machines (VMs)
    that are running on Google’s data centers around the world. These machines take
    advantage of Google’s state-of-the-art fiber optic powered network capabilities
    to offer fast and high-performance machines that can scale based on usage and
    automatically deal with issues of load balancing.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: Google Compute Engine (GCE) 向用户提供运行在全球 Google 数据中心的虚拟机 (VM)。这些机器利用 Google 最先进的光纤网络能力，提供快速且高性能的机器，可以根据使用情况进行扩展，并自动处理负载均衡问题。
- en: GCE provides a variety of pre-defined machine types for use out of the box;
    also it has the option to create custom machines that are tailored to the specific
    needs of the user. Another major feature of GCE is the ability to use computing
    resources that are currently idle on Google infrastructure for a short period
    of time to enhance or speed up the processing capabilities of batch jobs or fault-tolerant
    workloads. These machines are called preemptible VMs and come at a huge cost-benefit
    to the user as they are about 80% cheaper than regular machines.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: GCE提供多种预定义的机器类型，可直接使用；它还具有创建定制机器的选项，这些机器针对用户的特定需求进行定制。GCE的另一个主要功能是能够使用在Google基础设施上当前空闲的计算资源一段时间，以增强或加快批量作业或容错工作负载的处理能力。这些机器被称为可抢占虚拟机，对用户来说具有巨大的成本效益，因为它们比普通机器便宜约80%。
- en: Again one of the major benefits of GCEs is that the user only pays for the time
    the machines are actually in operation. Also, when the machines are used for a
    long uninterrupted period of time, discounts are accrued to the prices.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: GCE的一个主要好处之一是用户只需为机器实际运行的时间付费。此外，当机器长时间不间断使用时，价格会获得折扣。
- en: In this chapter, we will go through a simple example of provisioning and tearing
    down a Linux machine on the cloud. The examples will cover using the Google Cloud
    web interface and the command-line interface for creating VMs on GCP.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将通过一个简单的示例来介绍在云上配置和拆除Linux机器的过程。示例将涵盖使用Google Cloud网络界面和命令行界面在GCP上创建虚拟机。
- en: Provisioning a VM Instance
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置虚拟机实例
- en: To deploy a VM instance, click the triple dash in the top-left corner of the
    web page to pull out the GCP resources drawer. In the group named ‘COMPUTE’, click
    the arrow beside ‘Compute Engine’ and select ‘VM instances’ as shown in Figure
    [5-1](#Fig1).
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 要部署虚拟机实例，请点击网页左上角的三条横线以拉出GCP资源抽屉。在名为“COMPUTE”的组中，点击“Compute Engine”旁边的箭头，并选择“虚拟机实例”，如图[5-1](#Fig1)所示。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig1_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig1_HTML.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig1_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig1_HTML.png)'
- en: Figure 5-1
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-1
- en: Select VM instances
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 选择虚拟机实例
- en: Click ‘Create’ to begin the process of deploying a VM instance (see Figure [5-2](#Fig2)).
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 点击“创建”以开始部署虚拟机实例的过程（见图[5-2](#Fig2)）。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig3_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig3_HTML.png)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig3_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig3_HTML.png)'
- en: Figure 5-3
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-3
- en: Options for creating an instance
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 创建实例的选项
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig2_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig2_HTML.png)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig2_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig2_HTML.png)'
- en: Figure 5-2
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-2
- en: Begin process of deploying a VM instance
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 开始部署虚拟机实例的过程
- en: 'The labeled numbers in Figure [5-3](#Fig3) are explained here:'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-3](#Fig3)中的标记数字在此处解释：
- en: Choose the instance name. This name must start with a lowercase letter and can
    include numbers or hyphens, but should not end with a hyphen.
  id: totrans-237
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择实例名称。此名称必须以小写字母开头，可以包含数字或连字符，但不能以连字符结尾。
- en: Select the instance region and zone. This is the geographical region where your
    computing instance is located, while the zone is a location within a region.
  id: totrans-238
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择实例区域和区域。这是您的计算实例所在的地理区域，而区域是区域内的一个位置。
- en: Select the machine type. This allows for customization of the cores, memory,
    and GPUs for the VM (see Figure [5-4](#Fig4)).
  id: totrans-239
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择机器类型。这允许对虚拟机的核心、内存和GPU进行定制（见图[5-4](#Fig4)）。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig4_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig4_HTML.jpg)'
  id: totrans-240
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig4_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig4_HTML.jpg)'
- en: Figure 5-4
  id: totrans-241
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图5-4
- en: Select machine type
  id: totrans-242
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 选择机器类型
- en: Select the boot disk. This option selects a disk to boot from. This disk could
    be created from an OS image, an application image, a custom image, or a snapshot
    of an image (see Figure [5-5](#Fig5)).
  id: totrans-243
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择引导磁盘。此选项选择用于引导的磁盘。此磁盘可以是来自操作系统镜像、应用程序镜像、自定义镜像或镜像快照创建的（见图[5-5](#Fig5)）。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig5_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig5_HTML.png)'
  id: totrans-244
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig5_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig5_HTML.png)'
- en: Figure 5-5
  id: totrans-245
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图5-5
- en: Select boot disk
  id: totrans-246
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 选择引导磁盘
- en: Select ‘Allow HTTP traffic’ to allow network traffic from the Internet as shown
    in Figure [5-6](#Fig6).
  id: totrans-247
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择“允许HTTP流量”以允许来自互联网的网络流量，如图[5-6](#Fig6)所示。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig6_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig6_HTML.png)'
  id: totrans-248
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig6_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig6_HTML.png)'
- en: Figure 5-6
  id: totrans-249
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图5-6
- en: Allow network traffic to VM
  id: totrans-250
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 允许虚拟机网络流量
- en: Click ‘Create’ in Figure [5-6](#Fig6) to deploy the VM instance.
  id: totrans-251
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在图[5-6](#Fig6)中点击“创建”以部署虚拟机实例。
- en: Connecting to the VM Instance
  id: totrans-252
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 连接到虚拟机实例
- en: In the VM instances page that lists the created VMs, click ‘SSH’ beside the
    created instance as shown in Figure [5-7](#Fig7). This launches a new window with
    terminal access to the created VM as shown in Figures [5-8](#Fig8) and [5-9](#Fig9).
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 在列出已创建虚拟机的“虚拟机实例”页面，点击创建实例旁边的“SSH”，如图[5-7](#Fig7)所示。这将启动一个新窗口，提供对创建的虚拟机的终端访问，如图[5-8](#Fig8)和[5-9](#Fig9)所示。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig9_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig9_HTML.jpg)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig9_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig9_HTML.jpg)'
- en: Figure 5-9
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-9
- en: Terminal window access to the instance
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 实例的终端窗口访问
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig8_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig8_HTML.jpg)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig8_HTML.jpg](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig8_HTML.jpg)'
