  prefs:
  - PREF_IND
  type: TYPE_PRE
  zh: '[PRE26]'
- en: This chapter went through the step for launching a compute machine instance
    on GCP. It covered working with the web-based cloud console and using commands
    via the shell terminal.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了在GCP上启动计算机器实例的步骤。它涵盖了使用基于Web的云控制台以及通过shell终端使用命令。
- en: In the next chapter, we’ll discuss how to launch a Jupyter notebook instance
    on GCP called JupyterLab. A notebook provides an interactive environment for analytics,
    data science, and prototyping machine learning models.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论如何在 GCP 上启动名为 JupyterLab 的 Jupyter 笔记本实例。笔记本提供了一个用于分析、数据科学和原型设计机器学习模型的交互式环境。
- en: 6. JupyterLab Notebooks
  id: totrans-291
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. JupyterLab 笔记本
- en: Google deep learning virtual machines (VMs) are a part of GCP AI Platform. It
    provisions a Compute Engine instance that comes pre-configured with the relevant
    software packages for carrying out analytics and modeling tasks. It also makes
    available high-performance computing TPU and GPU processing capabilities at a
    single click. These VMs expose a JupyterLab notebook environment for analyzing
    data and designing machine learning models.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: Google 深度学习虚拟机（VM）是 GCP AI 平台的一部分。它配置了一个预装了相关软件包以执行分析和建模任务的 Compute Engine 实例。它还通过一键操作提供高性能计算
    TPU 和 GPU 处理能力。这些 VM 提供了用于分析数据和设计机器学习模型的 JupyterLab 笔记本环境。
- en: In this chapter, we’ll launch a JupyterLab notebook instance using the web-based
    console and the command line.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将使用基于 Web 的控制台和命令行启动 JupyterLab 笔记本实例。
- en: Provisioning a Notebook Instance
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 配置笔记本实例
- en: 'The following steps provide a walk-through for deploying a Notebook instance
    on a deep learning VM:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤提供了在深度学习虚拟机（VM）上部署笔记本实例的指南：
- en: In the group named ‘ARTIFICIAL INTELLIGENCE’ on the GCP resources drawer, click
    the arrow beside ‘AI Platform’ and select ‘Notebooks’ as shown in Figure [6-1](#Fig1).
  id: totrans-296
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 GCP 资源抽屉中名为“人工智能”的组中，点击“AI 平台”旁边的箭头，并选择“笔记本”，如图 [6-1](#Fig1) 所示。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig1_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig1_HTML.png)'
  id: totrans-297
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig1_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig1_HTML.png)'
- en: Figure 6-1
  id: totrans-298
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-1
- en: Open Notebooks on GCP AI Platform
  id: totrans-299
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 在 GCP AI 平台上打开笔记本
- en: Click ‘NEW INSTANCE’ to initiate a notebook instance as shown in Figure [6-2](#Fig2);
    there is an option to customize your instance or to use one of the pre-configured
    instances with TensorFlow, PyTorch, or RAPIDS XGBoost installed.
  id: totrans-300
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“新建实例”以启动笔记本实例，如图 [6-2](#Fig2) 所示；您可以选择自定义实例或使用预配置的实例，这些实例已安装 TensorFlow、PyTorch
    或 RAPIDS XGBoost。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig2_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig2_HTML.png)'
  id: totrans-301
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig2_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig2_HTML.png)'
- en: Figure 6-2
  id: totrans-302
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-2
- en: Start a new Notebook instance
  id: totrans-303
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 启动新的笔记本实例
- en: For this example, we will create a Notebook instance pre-configured with TensorFlow
    2.0 (see Figure [6-3](#Fig3)).
  id: totrans-304
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于本例，我们将创建一个预配置了 TensorFlow 2.0 的笔记本实例（见图 [6-3](#Fig3)）。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig3_HTML.jpg](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig3_HTML.jpg)'
  id: totrans-305
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig3_HTML.jpg](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig3_HTML.jpg)'
- en: Figure 6-3
  id: totrans-306
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-3
- en: Start a new Notebook instance
  id: totrans-307
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 启动新的笔记本实例
- en: Click ‘OPEN JUPYTERLAB’ to launch the JupyterLab notebook instance in a new
    window (see Figure [6-4](#Fig4)).
  id: totrans-308
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“打开 JupyterLab”以在新窗口中启动 JupyterLab 笔记本实例（见图 [6-4](#Fig4)）。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig4_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig4_HTML.png)'
  id: totrans-309
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig4_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig4_HTML.png)'
- en: Figure 6-4
  id: totrans-310
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-4
- en: Open JupyterLab
  id: totrans-311
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 打开 JupyterLab
- en: From the JupyterLab Launcher in Figure [6-5](#Fig5), options exist to open a
    Python notebook, a Python interactive shell, a bash terminal, a text file, or
    a Tensorboard dashboard (more on Tensorboard in Part 6).
  id: totrans-312
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从图 [6-5](#Fig5) 中的 JupyterLab 启动器，可以选择打开 Python 笔记本、Python 交互式 shell、bash 终端、文本文件或
    Tensorboard 仪表板（关于 Tensorboard 的更多信息请见第 6 部分）。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig5_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig5_HTML.png)'
  id: totrans-313
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig5_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig5_HTML.png)'
- en: Figure 6-5
  id: totrans-314
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-5
- en: JupyterLab Launcher
  id: totrans-315
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: JupyterLab 启动器
- en: Open a Python 3 Notebook (see Figure [6-6](#Fig6)). We’ll work with Python notebooks
    in later chapters to carry out data science tasks.
  id: totrans-316
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开 Python 3 笔记本（见图 [6-6](#Fig6)）。我们将在后续章节中使用 Python 笔记本来执行数据科学任务。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig6_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig6_HTML.png)'
  id: totrans-317
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig6_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig6_HTML.png)'
- en: Figure 6-6
  id: totrans-318
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-6
- en: Python 3 Notebook
  id: totrans-319
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Python 3 笔记本
- en: Shut Down/Delete a Notebook Instance
  id: totrans-320
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关闭/删除笔记本实例
- en: 'The following steps provide a walk-through for shutting down and deleting a
    Notebook instance:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤提供了关闭和删除笔记本实例的指南：
- en: From the ‘Notebook instances’ dashboard, click ‘STOP’ to shut down the instance
    when not in use so as to save compute costs on GCP (see Figure [6-7](#Fig7)).
  id: totrans-322
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在“笔记本实例”仪表板上，当不再使用时点击“停止”以关闭实例，从而在 GCP 上节省计算成本（见图 [6-7](#Fig7)）。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig7_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig7_HTML.png)'
  id: totrans-323
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig7_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig7_HTML.png)'
- en: Figure 6-7
  id: totrans-324
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-7
- en: Stop Notebook instance
  id: totrans-325
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 停止笔记本实例
- en: When the instance is no longer needed, click ‘DELETE’ to permanently remove
    the instance. Note that this option is non-recoverable (see Figure [6-8](#Fig8)).
  id: totrans-326
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当实例不再需要时，点击“删除”以永久删除实例。请注意，此选项不可恢复（见图 [6-8](#Fig8)）。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig8_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig8_HTML.png)'
  id: totrans-327
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig8_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig8_HTML.png)'
- en: Figure 6-8
  id: totrans-328
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 6-8
- en: Delete a Notebook instance
  id: totrans-329
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 删除笔记本实例
- en: Starting a Notebook Instance from the Command Line
  id: totrans-330
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从命令行启动笔记本实例
- en: In this section, we’ll examine how the command line is used to launch and shut
    down a pre-configured deep learning VM integrated with JupyterLab.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将探讨如何使用命令行启动和关闭集成了 JupyterLab 的预配置深度学习 VM。
- en: 'Create a Datalab instance: To create a Notebook instance, execute the code'
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 Datalab 实例：要创建笔记本实例，执行以下代码
- en: '[PRE27]'
  id: totrans-333
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: where
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: --image-family can be any of the available images supported by Google Deep Learning
    VM; `"tf-latest-cpu-experimental"` launches an image with TensorFlow 2.0 pre-configured.
  id: totrans-335
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: --image-family 可以是 Google Deep Learning VM 支持的任何可用镜像；`"tf-latest-cpu-experimental"`
    会启动一个预配置了 TensorFlow 2.0 的镜像。
- en: --image-project must be set to `deeplearning-platform-release`
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: --image-project 必须设置为 `deeplearning-platform-release`
- en: 'Here’s the output when the instance is created:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 这是实例创建时的输出：
- en: '[PRE28]'
  id: totrans-338
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'Connect to the instance: To connect to JupyterLab running on the instance,
    run the command'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 连接到实例：要连接到实例上运行的 JupyterLab，运行以下命令
- en: '[PRE29]'
  id: totrans-340
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Then on your local machine, visit `http://localhost:8080` in your browser (see
    Figure [6-9](#Fig9)).
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 然后在您的本地计算机上，在浏览器中访问 `http://localhost:8080`（见图 [6-9](#Fig9)）。
- en: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig9_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig9_HTML.png)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_6_Chapter/463852_1_En_6_Fig9_HTML.png](../images/463852_1_En_6_Chapter/463852_1_En_6_Fig9_HTML.png)'
- en: Figure 6-9
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-9
- en: JupyterLab instance launched from terminal
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 从终端启动的 JupyterLab 实例
- en: 'Stop the instance: To stop the instance, run the following command from your
    local terminal (not on the instance):'
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 停止实例：要停止实例，请在您的本地终端（而不是实例上）运行以下命令
- en: '[PRE30]'
  id: totrans-346
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Delete the instance: The Notebook instance is basically a Google Compute Engine.
    Hence, the instance is deleted the same way a Compute Engine VM is deleted.'
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 删除实例：笔记本实例基本上是一个 Google Compute Engine。因此，实例的删除方式与删除 Compute Engine VM 相同。
- en: '[PRE31]'
  id: totrans-348
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: This chapter introduces Jupyter notebooks running on Google Deep Learning VMs
    for interactive programming of data science tasks and prototyping deep learning
    and machine learning models.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了在 Google Deep Learning VM 上运行的 Jupyter 笔记本，用于数据科学任务的交互式编程以及深度学习和机器学习模型的原型设计。
- en: In the next chapter, we will introduce another product for programming and rapid
    prototyping of learning models called Google Colaboratory.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将介绍另一个用于编程和学习模型快速原型设计的工具，名为 Google Colaboratory。
- en: 7. Google Colaboratory
  id: totrans-351
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 7. Google Colaboratory
- en: Google Colaboratory more commonly referred to as “Google Colab” or just simply
    “Colab” is a research project for prototyping machine learning models on powerful
    hardware options such as GPUs and TPUs. It provides a serverless Jupyter notebook
    environment for interactive development. Google Colab is free to use like other
    G Suite products.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: Google Colaboratory 通常简称为“Google Colab”或简单地称为“Colab”，是一个在强大的硬件选项（如 GPU 和 TPU）上原型设计机器学习模型的研究项目。它提供了一个无服务器的
    Jupyter 笔记本环境，用于交互式开发。Google Colab 与其他 G Suite 产品一样，免费使用。
- en: Starting Out with Colab
  id: totrans-353
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从 Colab 开始
- en: 'The following steps provide a walk-through for launching a Notebook on Google
    Colab:'
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 以下步骤提供了在 Google Colab 上启动笔记本的指南：
- en: Go to [`https://colab.research.google.com/`](https://colab.research.google.com/)
    and log in using your existing Google account to access the Colab homepage (see
    Figure [7-1](#Fig1)).
  id: totrans-355
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前往 [https://colab.research.google.com/](https://colab.research.google.com/)
    并使用您现有的 Google 账户登录以访问 Colab 主页（见图 [7-1](#Fig1)）。
- en: '![../images/463852_1_En_7_Chapter/463852_1_En_7_Fig1_HTML.png](../images/463852_1_En_7_Chapter/463852_1_En_7_Fig1_HTML.png)'
