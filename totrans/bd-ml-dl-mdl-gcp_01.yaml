  id: totrans-379
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 上传笔记本
- en: Notebooks can be uploaded from Google Drive, GitHub, or the local machine (see
    Figure [7-6](#Fig6)).
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 笔记本可以从 Google Drive、GitHub 或本地机器上传（见图 [7-6](#Fig6)）。
