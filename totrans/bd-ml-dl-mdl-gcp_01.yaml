- en: Storing Notebooks
  id: totrans-373
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 存储笔记本
- en: Notebooks on Colab are stored on Google Drive. They can also be saved to GitHub
    or published as a GitHub Gist. They can also be downloaded to the local machine.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Colab 上的笔记本存储在 Google Drive 上。它们也可以保存到 GitHub 或作为 GitHub Gist 发布。它们也可以下载到本地机器。
- en: Figure [7-5](#Fig5) highlights the options for storing Jupyter notebooks running
    on Google Colab.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [7-5](#Fig5) 突出了存储在 Google Colab 上运行的 Jupyter 笔记本的可选方案。
- en: '![../images/463852_1_En_7_Chapter/463852_1_En_7_Fig5_HTML.jpg](../images/463852_1_En_7_Chapter/463852_1_En_7_Fig5_HTML.jpg)'
