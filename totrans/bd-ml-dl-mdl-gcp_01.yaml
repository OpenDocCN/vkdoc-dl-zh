- en: Part IGetting Started with Google Cloud Platform
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 1. What Is Cloud Computing?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Cloud computing is the practice where computing services such as storage options,
    processing units, and networking capabilities are exposed for consumption by users
    over the Internet (the cloud). These services range from free to pay-as-you-use
    billing.
  prefs: []
  type: TYPE_NORMAL
- en: The central idea behind cloud computing is to make aggregated computational
    power available for large-scale consumption. By doing so, the microeconomics principle
    of economies of scale kicks into effect where cost per unit output is minimized
    with increasing scale of operations.
  prefs: []
  type: TYPE_NORMAL
- en: In a cloud computing environment, enterprises or individuals can take advantage
    of the same speed and power of aggregated high-performance computing services
    and only pay for what they use and relinquish these compute resources when they
    are no longer needed.
  prefs: []
  type: TYPE_NORMAL
- en: The concept of cloud computing had existed as time-sharing systems from the
    early years of the modern computer where jobs submitted from different users were
    scheduled to execute on a mainframe. The idea of time-sharing machines fizzled
    away at the advent of the PC. Now, with the rise of enterprise data centers managed
    by big IT companies such as Google, Microsoft, Amazon, IBM, and Oracle, the cloud
    computing notion has resurfaced with the added twist of multi-tenancy as opposed
    to time-sharing. This computing model is set to disrupt the way we work and utilize
    software systems and services.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to storage, networking, and processing services, cloud computing
    provides offer other product solutions such as databases, artificial intelligence,
    and data analytics capabilities and serverless infrastructures.
  prefs: []
  type: TYPE_NORMAL
- en: Categories of Cloud Solutions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The cloud is a terminology that describes large sets of computers that are
    networked together in groups called data centers. These clustered machines can
    be interacted with via dashboards, command-line interfaces, REST APIs, and client
    libraries. Data centers are often distributed across multiple geographical locations.
    The size of data centers is over 100,000 sq. ft. (and those are the smaller sizes!).
    Cloud computing solutions can be broadly categorized into three, namely, the public,
    private, and hybrid cloud. Let’s briefly discuss them:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Public cloud: Public clouds are the conventional cloud computing model, where
    cloud service providers make available their computing infrastructure and products
    for general use by other enterprises and individuals (see Figure [1-1](#Fig1)).
    In public clouds, the cloud service provider is responsible for managing the hardware
    configuration and servicing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_1_Chapter/463852_1_En_1_Fig1_HTML.jpg](../images/463852_1_En_1_Chapter/463852_1_En_1_Fig1_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 1-1
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The public cloud
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Private cloud: In a private cloud, an organization is solely responsible for
    the management and servicing of its computing infrastructure. The machines in
    a private cloud can be located on-premises, or it can be hosted with a cloud service
    provider but routed on a private network.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hybrid cloud: The hybrid cloud is a compromise between the cost and efficiency
    of a public cloud and the data sovereignty and in-house security assurances of
    the private cloud. Many companies and institutions opt for a hybrid cloud and
    multi-cloud by using technology solutions to facilitate easy porting and sharing
    of data and applications between on-premise and cloud-based infrastructures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cloud Computing Models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Cloud computing is also categorized into three models of service delivery.
    They are illustrated as a pyramid as shown in Figure [1-2](#Fig2), where the layers
    of infrastructure abstraction increase as we approach the apex of the pyramid:'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_1_Chapter/463852_1_En_1_Fig2_HTML.png](../images/463852_1_En_1_Chapter/463852_1_En_1_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Models of cloud computing
  prefs: []
  type: TYPE_NORMAL
- en: 'Infrastructure as a Service (IaaS): This model is best suited for enterprises
    or individuals who want to manage the hardware infrastructure that hosts their
    data and applications. This level of fine-grained management requires the necessary
    system administration skills.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Platform as a Service (PaaS): In the PaaS model, the hardware configuration
    is managed by the cloud service provider, as well as other system and development
    tools. This relieves the user to focus on the business logic for quick and easy
    deployment of application and database solutions. Another concept that comes up
    together with PaaS is the idea of **Serverless**, where the cloud service provider
    manages a scalable infrastructure that utilizes and relinquishes resources according
    to demand.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Software as a Service (SaaS): The SaaS model is most recognizable by the general
    public, as a great deal of users interact with SaaS applications without knowing.
    The typical examples of SaaS applications are enterprise email suites such as
    Gmail, Outlook, and Yahoo! Mail. Others include storage platforms like Google
    Drive and Dropbox, photo software like Google Photos, and CRM e-suites like Salesforce
    and Oracle E-business Suite.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this chapter, we summarized the practice of cloud computing by explaining
    the different categories of cloud solutions and the models for service delivery
    over the cloud.
  prefs: []
  type: TYPE_NORMAL
- en: The next chapters in Part 1 will provide an introduction to Google Cloud Platform
    Infrastructure and Services and introduce JupyterLab Instances, and Google Colaboratory
    for prototyping machine learning models and doing data science and analytics tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 2. An Overview of Google Cloud Platform Services
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Google Cloud Platform offers a wide range of services for securing, storing,
    serving, and analyzing data. These cloud services form a secure cloud perimeter
    for data, where different operations and transformations can be carried out on
    the data without it ever leaving the cloud ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: The services offered by Google Cloud include compute, storage, big data/analytics,
    artificial intelligence (AI), and other networking, developer, and management
    services. Let’s briefly review some of the features of the Google Cloud ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: Cloud Compute
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google Compute offers a range of products shown in Figure [2-1](#Fig1) for catering
    to a wide range of computational needs. The compute products consist of the Compute
    Engine (virtual computing instances for custom processing), App Engine (a cloud-managed
    platform for developing web, mobile, and IoT app), Kubernetes Engine (orchestration
    manager for custom docker containers based on Kubernetes), Container Registry
    (private container storage), Serverless Cloud Functions (cloud-based functions
    to connect or extend cloud services), and Cloud Run (managed compute platform
    that automatically scales your stateless containers).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_2_Chapter/463852_1_En_2_Fig1_HTML.jpg](../images/463852_1_En_2_Chapter/463852_1_En_2_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: Cloud compute services
  prefs: []
  type: TYPE_NORMAL
- en: For our purposes of machine learning modeling, the cloud compute engine is what
    we will concentrate on. As later seen in Chapter [6](463852_1_En_6_Chapter.xhtml),
    JupyterLab will provision a compute engine with all the relevant tools, packages,
    and frameworks for data analytics and modeling machine learning and deep learning
    solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Cloud Storage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google Cloud Storage options provide scalable and real-time storage access to
    live and archival data within the cloud perimeter. Cloud storage as an example
    is set up to cater for any conceivable storage demand. Data stored on cloud storage
    is available anytime and from any location around the world. What’s more, this
    massive storage power comes at an almost negligible cost, taking into consideration
    the size and economic value of the stored data. Moreover, acknowledging the accessibility,
    security, and consistency provided by cloud storage, the cost is worth every penny.
  prefs: []
  type: TYPE_NORMAL
- en: The cloud storage products shown in Figure [2-2](#Fig2) include Cloud Storage
    (general-purpose storage platform), Cloud SQL (cloud-managed MySQL and PostgreSQL),
    Cloud Bigtable (NoSQL petabyte-sized storage), Cloud Spanner (scalable/high availability
    transactional storage), Cloud Datastore (transactional NoSQL database), and Persistent
    Disk (block storage for virtual machines).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_2_Chapter/463852_1_En_2_Fig2_HTML.jpg](../images/463852_1_En_2_Chapter/463852_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: Cloud storage products
  prefs: []
  type: TYPE_NORMAL
- en: Big Data and Analytics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google Cloud Platform offers a range of serverless big data and analytics solutions
    for data warehousing, stream, and batch analytics, cloud-managed Hadoop ecosystems,
    cloud-based messaging systems, and data exploration. These services provide multiple
    perspectives to mining/generating real-time intelligence from big data.
  prefs: []
  type: TYPE_NORMAL
- en: Examples of big data services shown in Figure [2-3](#Fig3) include Cloud BigQuery
    (serverless analytics/data warehousing platform), Cloud Dataproc (fully managed
    Hadoop/Apache Spark infrastructure), Cloud Dataflow (Batch/Stream data transformation/processing),
    Cloud Dataprep (serverless infrastructure for cleaning unstructured/structured
    data for analytics), Cloud Datastudio (data visualization/report dashboards),
    Cloud Datalab (managed Jupyter notebook for machine learning/data analytics),
    and Cloud Pub/Sub (serverless messaging infrastructure).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_2_Chapter/463852_1_En_2_Fig3_HTML.jpg](../images/463852_1_En_2_Chapter/463852_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: Big data/analytics serverless platforms
  prefs: []
  type: TYPE_NORMAL
- en: Cloud Artificial Intelligence (AI)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google Cloud AI offers cloud services for businesses and individuals to leverage
    pre-trained models for custom artificial intelligence tasks through the use of
    REST APIs. It also exposes services for developing custom models for domain use
    cases such as AutoML Vision for image classification and object detection tasks
    and AutoML tables to deploy AI models on structured data.
  prefs: []
  type: TYPE_NORMAL
- en: Google Cloud AI services in Figure [2-4](#Fig4) include Cloud AutoML (train
    custom machine learning models leveraging transfer learning), Cloud Machine Learning
    Engine (for large-scale distributed training and deployment of machine learning
    models), Cloud TPU (to quickly train large-scale models), Video Intelligence (train
    custom video models), Cloud Natural Language API (extract/analyze text from documents),
    Cloud Speech API (transcribe audio to text), Cloud Vision API (classification/segmentation
    of images), Cloud Translate API (translate from one language to another), and
    Cloud Video Intelligence API (extract metadata from video files).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_2_Chapter/463852_1_En_2_Fig4_HTML.jpg](../images/463852_1_En_2_Chapter/463852_1_En_2_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-4
  prefs: []
  type: TYPE_NORMAL
- en: Cloud AI services
  prefs: []
  type: TYPE_NORMAL
- en: This chapter provides a high-level overview of the products and services offered
    on Google Cloud Platform.
  prefs: []
  type: TYPE_NORMAL
- en: The next chapter will introduce the Google Cloud software development kit (SDK)
    for interacting with cloud resources from the command line on the local machine
    and the cloud command-line interface (CLI) for doing the same via the cloud console
    interface on GCP.
  prefs: []
  type: TYPE_NORMAL
- en: 3. The Google Cloud SDK and Web CLI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: GCP provides a command-line interface (CLI) for interacting with cloud products
    and services. GCP resources can be accessed via the web-based CLI on GCP or by
    installing the Google Cloud software development kit (SDK) on your local machine
    to interact with GCP via the local command-line terminal.
  prefs: []
  type: TYPE_NORMAL
- en: GCP contains shell commands for a wide range of GCP products such as the Compute
    Engine, Cloud Storage, Cloud ML Engine, BigQuery, and Datalab, to mention just
    a few. Major tools of the Cloud SDK include
  prefs: []
  type: TYPE_NORMAL
- en: 'gcloud tool: Responsible for cloud authentication, configuration, and other
    interactions on GCP'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'gsutil tool: Responsible for interacting with Google Cloud Storage buckets
    and objects'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'bq tool: Used for interacting and managing Google BigQuery via the command
    line'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'kubectl tool: Used for managing Kubernetes container clusters on GCP'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Google Cloud SDK also installs client libraries for developers to programmatically
    interact with GCP products and services through APIs.^([1](#Fn1)) As of this time
    of writing, the Go, Java, Node.js, Python, Ruby, PHP, and C# languages are covered.
    Many more are expected to be added to this list.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter works through setting up an account on GCP, installing the Google
    Cloud SDK, and then exploring GCP commands using the CLI.
  prefs: []
  type: TYPE_NORMAL
- en: Setting Up an Account on Google Cloud Platform
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section shows how to set up an account on Google Cloud Platform. A GCP
    account gives access to all of the platform’s products and services. For a new
    account, a $300 credit is awarded to be spent over a period of 12 months. This
    offer is great as it gives ample time to explore the different features and services
    of Google’s cloud offering.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that a valid credit card is required to register an account to validate
    that it is an authentic user, as opposed to a robot. However, the credit card
    won’t be charged after the trial ends, except Google is authorized to do so:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to [`https://cloud.google.com/`](https://cloud.google.com/) to open an account
    (see Figure [3-1](#Fig1)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig1_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig1_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 3-1
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Google Cloud Platform login page
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Fill in the necessary identity, address, and credit card details.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Wait a moment while an account is created on the platform (see Figure [3-2](#Fig2)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig2_HTML.jpg](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig2_HTML.jpg)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 3-2
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Creating account
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: After account creation, we’re presented with the Welcome to GCP page (see Figure
    [3-3](#Fig3)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig3_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig3_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 3-3
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Welcome to GCP
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Click the icon of three lines in the top-left corner of the page (marked with
    a circle in Figure [3-3](#Fig3)), then click Home (marked with a rectangle in
    Figure [3-3](#Fig3)) to open the Google Cloud Platform dashboard (Figure [3-4](#Fig4)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig4_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig4_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 3-4
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: GCP dashboard
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The Cloud dashboard provides a bird’s-eye summary of the project such as the
    current billing rate and other resource usage statistics. The activity tab to
    the right gives a breakdown of the resource actions performed on the account.
    This feature is useful when building an audit trail of events.
  prefs: []
  type: TYPE_NORMAL
- en: 'GCP Resources: Projects'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All the services and features of the Google Cloud Platform are called resources.
    These resources are arranged in a hierarchical order, with the top level being
    the project. The project is like a container that houses all GCP resources. Billing
    on an account is attached to a project. Multiple projects can be created for an
    account. A project must be created before working with GCP.
  prefs: []
  type: TYPE_NORMAL
- en: To view the projects in the account in Figure [3-5](#Fig5), click the **scope
    picker in the cloud console** (marked with an oval in Figure [3-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig6_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: Scope picker to select projects
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig5_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: Select projects
  prefs: []
  type: TYPE_NORMAL
- en: Accessing Cloud Platform Services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To access the resources on the cloud platform, click the triple dash in the
    top-right corner of the window. Grouped service offerings are used to organize
    the resources. For example, in Figure [3-7](#Fig7), we can see the products under
    **STORAGE**: Bigtable, Datastore, Storage, SQL, and Spanner.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig7_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: Google Cloud Platform services
  prefs: []
  type: TYPE_NORMAL
- en: Account Users and Permissions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GCP allows you to define security roles and permissions for every resource in
    a specific project. This feature is particularly useful when a project scales
    beyond one user. New roles and permissions are created for a user through the
    IAM & admin tab (see Figures [3-8](#Fig8) and [3-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig8_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Open IAM & admin
  prefs: []
  type: TYPE_NORMAL
- en: The Cloud Shell
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Cloud Shell is a vital component for working with GCP resources. Cloud Shell
    provisions an ephemeral virtual machine with command-line tools installed for
    interacting with GCP resources. It gives the user cloud-based command-line access
    to manipulate resources directly from within the GCP perimeter without installing
    the Google Cloud SDK on a local machine.
  prefs: []
  type: TYPE_NORMAL
- en: The Cloud Shell is accessed by clicking the **prompt icon** in the top-left
    corner of the window. See Figures [3-9](#Fig9), [3-10](#Fig10), and [3-11](#Fig11).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig11_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig11_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-11
  prefs: []
  type: TYPE_NORMAL
- en: Cloud Shell interface
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig10_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig10_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-10
  prefs: []
  type: TYPE_NORMAL
- en: Start Cloud Shell
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig9_HTML.jpg](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: Activate Cloud Shell
  prefs: []
  type: TYPE_NORMAL
- en: Google Cloud SDK
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Google Cloud SDK installs command-line tools for interacting with cloud
    resources from the terminal on the local machine:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to [`https://cloud.google.com/sdk/`](https://cloud.google.com/sdk/) to download
    and install the appropriate Cloud SDK for your machine type (see Figure [3-12](#Fig12)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig12_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig12_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 3-12
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Download Google Cloud SDK
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Follow the instructions for the operating system (OS) type to install the Google
    Cloud SDK. The installation installs the default Cloud SDK components.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Open the terminal application of your OS and run the command ‘gcloud init’ to
    begin authorization and configuration of the Cloud SDK.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Select the name for your configuration. Here, it is set to the name ‘your-email-id’.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_IND
  type: TYPE_PRE
- en: Select the Google account to use for the configuration. The browser will open
    to log in to the selected account (see Figures [3-13](#Fig13), [3-14](#Fig14),
    and [3-15](#Fig15)). However, if a purely terminal initialization is desired,
    the user can run ‘gcloud init --console-only’.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_3_Chapter/463852_1_En_3_Fig15_HTML.png](../images/463852_1_En_3_Chapter/463852_1_En_3_Fig15_HTML.png)'
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Figure 3-15
  prefs:
