- en: Click ‘Create bucket’ on the cloud storage dashboard as shown in Figure [4-1](#Fig1).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Give the bucket a unique name (see Figure [4-2](#Fig2)). Buckets in GCP must
    have a global unique name. That is to say, no two storage buckets on Google Cloud
    can have the same name. A common naming convention for buckets is to prefix with
    your organization’s domain name.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select a storage class. A multi-region storage class is for buckets frequently
    accessed all over the world, whereas the cold-line storage is more or less for
    storing backup files. For now, the default selection is okay.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click ‘Create’ to set up a bucket on Google Cloud Storage.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
