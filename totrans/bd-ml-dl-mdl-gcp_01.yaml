- en: In the next chapter, we will introduce Google Compute Engines, which are virtual
    machines running on Google’s distributed data centers and are connected via state-of-the-art
    fiber optic network. These machines are provisioned to lower the cost and speed
    up the processing of computing workloads.
  prefs: []
  type: TYPE_NORMAL
- en: 5. Google Compute Engine (GCE)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Google Compute Engine (GCE) makes available to users virtual machines (VMs)
    that are running on Google’s data centers around the world. These machines take
    advantage of Google’s state-of-the-art fiber optic powered network capabilities
    to offer fast and high-performance machines that can scale based on usage and
    automatically deal with issues of load balancing.
  prefs: []
  type: TYPE_NORMAL
- en: GCE provides a variety of pre-defined machine types for use out of the box;
    also it has the option to create custom machines that are tailored to the specific
    needs of the user. Another major feature of GCE is the ability to use computing
    resources that are currently idle on Google infrastructure for a short period
    of time to enhance or speed up the processing capabilities of batch jobs or fault-tolerant
    workloads. These machines are called preemptible VMs and come at a huge cost-benefit
    to the user as they are about 80% cheaper than regular machines.
  prefs: []
  type: TYPE_NORMAL
- en: Again one of the major benefits of GCEs is that the user only pays for the time
    the machines are actually in operation. Also, when the machines are used for a
    long uninterrupted period of time, discounts are accrued to the prices.
  prefs: []
  type: TYPE_NORMAL
- en: In this chapter, we will go through a simple example of provisioning and tearing
    down a Linux machine on the cloud. The examples will cover using the Google Cloud
    web interface and the command-line interface for creating VMs on GCP.
  prefs: []
  type: TYPE_NORMAL
- en: Provisioning a VM Instance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
