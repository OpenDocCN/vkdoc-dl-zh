- en: Free Up Storage Resource
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 释放存储资源
- en: To delete a bucket or free up a storage resource to prevent billing on a resource
    that is not used, click the checkbox beside the bucket in question, and click
    ‘DELETE’ to remove the bucket and its contents. This action is not recoverable.
    See Figures [4-7](#Fig7) and [4-8](#Fig8).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 要删除存储桶或释放存储资源以防止对未使用的资源进行计费，请点击相关存储桶旁边的复选框，然后点击“删除”以移除存储桶及其内容。此操作不可恢复。请参阅图 [4-7](#Fig7)
    和 [4-8](#Fig8)。
