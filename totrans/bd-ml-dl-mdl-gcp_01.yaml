- en: Tearing Down the Instance
  id: totrans-263
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 断开实例
- en: It is good practice to delete compute instances that are no longer in use to
    save cost for utilizing GCP resources. To delete a compute instance, on the ‘VM
    instances’ page, select the instance for deletion and click ‘DELETE’ (in red)
    as shown in Figure [5-10](#Fig10).
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 删除不再使用的计算实例是一种良好的实践，以节省利用GCP资源成本。要删除计算实例，在“虚拟机实例”页面，选择要删除的实例，然后点击“删除”（红色），如图[5-10](#Fig10)所示。
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig10_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig10_HTML.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig10_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig10_HTML.png)'
- en: Figure 5-10
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-10
- en: Delete the VM instance
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 删除虚拟机实例
- en: Working with GCE from the Command Line
  id: totrans-268
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从命令行使用GCE
- en: 'In this section, we’ll sample the commands for creating and deleting a compute
    instance on GCP using the command-line interface. To create a compute instance
    using ‘gcloud’ from the command-line interface, there are a variety of options
    that can be added to the commands for different specifications of the machine.
    To learn more about a command, attach ‘help’ after the command:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将演示使用命令行界面创建和删除GCP上的计算实例的命令示例。要使用命令行界面通过“gcloud”创建计算实例，可以在命令中添加各种选项以适应不同的机器规格。要了解更多关于某个命令的信息，请在命令后附加“help”：
