  type: TYPE_NORMAL
  zh: 打开笔记本
- en: This chapter introduces Google Colaboratory as an alternative platform to quickly
    spin up a high-performance computing infrastructure running Jupyter notebooks
    for rapid data science and data modeling tasks.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了 Google Colaboratory 作为快速搭建高性能计算基础设施的平台，该平台运行 Jupyter 笔记本，用于快速进行数据科学和数据建模任务。
- en: This is the last chapter in Part 1 on “Getting Started with Google Cloud Platform.”
    In Part 2, containing Chapters [8](463852_1_En_8_Chapter.xhtml)–[12](463852_1_En_12_Chapter.xhtml),
    we will go over the fundamentals of “Programming for Data Science.” The code samples
    in the ensuing chapters can be executed either using Jupyter notebooks running
    on Google Deep Learning VMs or running on Google Colab.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 这是“Google Cloud Platform 入门”第一部分的最后一章。在第二部分中，包含第 [8](463852_1_En_8_Chapter.xhtml)–[12](463852_1_En_12_Chapter.xhtml)
    章，我们将介绍“数据科学编程”的基础知识。随后的章节中的代码示例可以使用在 Google Deep Learning VM 上运行的 Jupyter 笔记本或
    Google Colab 上运行来执行。
- en: The advantage of working with Google Colab is that you do not need to log into
    the Google Cloud Console and it is free to use. When security and privacy are
    not a premium, Google Colab is a good option for modeling as it saves computing
    cost as far as data science and machine learning prototyping is concerned.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 与 Google Colab 合作的优势在于，您无需登录 Google Cloud 控制台，并且使用它是免费的。当安全和隐私不是首要考虑因素时，Google
    Colab 是建模的好选择，因为它在数据科学和机器学习原型设计方面可以节省计算成本。
