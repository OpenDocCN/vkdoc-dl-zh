  id: totrans-368
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Python 3 Notebook
- en: Here, the options exist to change the Python runtime and hardware accelerator
    to a GPU or TPU (see Figure [7-4](#Fig4)).
  id: totrans-369
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在这里，可以选择将 Python 运行时和硬件加速器更改为 GPU 或 TPU（见图 [7-4](#Fig4)）。
