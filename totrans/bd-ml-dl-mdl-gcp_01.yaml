  type: TYPE_NORMAL
  zh: 从存储桶中删除对象
- en: Click the checkbox beside the file and click ‘DELETE’ as shown in Figure [4-6](#Fig6)
    to delete an object from a bucket.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[4-6](#Fig6)所示，点击文件旁边的复选框，然后点击“删除”来从存储桶中删除一个对象。
