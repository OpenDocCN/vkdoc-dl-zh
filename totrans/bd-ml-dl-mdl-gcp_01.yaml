- en: Cloud Storage Console
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 云存储控制台
- en: Click ‘Create bucket’ on the cloud storage dashboard as shown in Figure [4-1](#Fig1).
  id: totrans-161
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如图[4-1](#Fig1)所示，在云存储仪表板上点击“创建存储桶”。
- en: Give the bucket a unique name (see Figure [4-2](#Fig2)). Buckets in GCP must
    have a global unique name. That is to say, no two storage buckets on Google Cloud
    can have the same name. A common naming convention for buckets is to prefix with
    your organization’s domain name.
  id: totrans-162
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 给存储桶起一个独特的名称（见图[4-2](#Fig2)）。GCP中的存储桶必须有一个全局唯一的名称。也就是说，Google Cloud上的两个存储桶不能有相同的名称。存储桶的常见命名约定是以组织的域名作为前缀。
- en: Select a storage class. A multi-region storage class is for buckets frequently
    accessed all over the world, whereas the cold-line storage is more or less for
    storing backup files. For now, the default selection is okay.
  id: totrans-163
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 选择存储类别。多区域存储类别适用于全球各地频繁访问的存储桶，而冷线存储则更多用于存储备份文件。目前，默认选择是合适的。
- en: Click ‘Create’ to set up a bucket on Google Cloud Storage.
  id: totrans-164
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击“创建”以在Google Cloud Storage上设置存储桶。
- en: Uploading Data to a Bucket
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 向存储桶上传数据
- en: Individual files or folders can be uploaded into a bucket on GCS. As an example,
    let’s upload a file from the local machine.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 单个文件或文件夹可以上传到GCS的存储桶中。例如，让我们从本地机器上传一个文件。
- en: To upload a file to a cloud storage bucket on GCP,
