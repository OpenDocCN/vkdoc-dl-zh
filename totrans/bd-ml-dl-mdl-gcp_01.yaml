  type: TYPE_NORMAL
  zh: 从文件上传窗口中选择文件，如图[4-4](#Fig4)所示，点击“打开”。
- en: Upon upload completion, the file is uploaded as an object in GCS bucket (see
    Figure [4-5](#Fig5)).
  id: totrans-179
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 上传完成后，文件作为GCS存储桶中的对象上传（见图[4-5](#Fig5)）。
- en: Delete Objects from a Bucket
  id: totrans-180
  prefs:
