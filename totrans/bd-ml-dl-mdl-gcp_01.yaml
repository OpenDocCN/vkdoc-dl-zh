- en: This chapter covers how to set up command-line access for interacting with GCP
    resources. This includes working with the web-based Cloud Shell and installing
    the Cloud SDK to access GCP resources via the terminal on the local machine.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll introduce Google Cloud Storage (GCS) for storing
    ubiquitous data assets on GCP.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: 4. Google Cloud Storage (GCS)
  id: totrans-149
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Google Cloud Storage is a product for storing a wide range of diverse data objects.
    Cloud storage may be used to store both live and archival data. It has guarantees
    of scalability (can store increasingly large data objects), consistency (the most
    updated version is served on request), durability (data is redundantly placed
    in separate geographic locations to eliminate loss), and high availability (data
    is always available and accessible).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: Google Cloud Storage是一个用于存储各种不同数据对象的产品。云存储可以用于存储实时和归档数据。它保证了可扩展性（可以存储越来越大的数据对象）、一致性（请求时提供最新版本）、持久性（数据在多个地理区域冗余放置以消除损失）和高度可用性（数据始终可用和可访问）。
- en: Let’s take a brief tour through creating and deleting a storage bucket, as well
    as uploading and deleting files from a cloud storage bucket.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要地浏览一下创建和删除存储桶，以及从云存储桶上传和删除文件的过程。
- en: Create a Bucket
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建存储桶
- en: A bucket, as the name implies, is a container for storing data objects on GCP.
    A bucket is the base organizational structure on Cloud Storage. It is similar
    to the topmost directory on a file system. Buckets may have a hierarchy of sub-folders
    containing data assets.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如同其名，存储桶是用于在GCP上存储数据对象的容器。存储桶是云存储中的基本组织结构。它类似于文件系统中最顶层的目录。存储桶可以包含具有数据资产的子文件夹层次结构。
- en: To create a bucket,
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建存储桶，
- en: '![../images/463852_1_En_4_Chapter/463852_1_En_4_Fig2_HTML.png](../images/463852_1_En_4_Chapter/463852_1_En_4_Fig2_HTML.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
