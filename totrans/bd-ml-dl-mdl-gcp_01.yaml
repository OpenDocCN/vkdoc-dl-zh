  - PREF_IND
  type: TYPE_NORMAL
- en: Select machine type
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Select the boot disk. This option selects a disk to boot from. This disk could
    be created from an OS image, an application image, a custom image, or a snapshot
    of an image (see Figure [5-5](#Fig5)).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_5_Chapter/463852_1_En_5_Fig5_HTML.png](../images/463852_1_En_5_Chapter/463852_1_En_5_Fig5_HTML.png)'
  prefs:
