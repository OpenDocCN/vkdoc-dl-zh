  type: TYPE_NORMAL
- en: Select boot disk
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Select ‘Allow HTTP traffic’ to allow network traffic from the Internet as shown
    in Figure [5-6](#Fig6).
