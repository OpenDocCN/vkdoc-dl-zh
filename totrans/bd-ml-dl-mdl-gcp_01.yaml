  id: totrans-357
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 7-1
- en: Google Colab homepage
  id: totrans-358
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Google Colab 主页
- en: Open a Python 3 Notebook (see Figure [7-2](#Fig2)).
  id: totrans-359
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 打开一个 Python 3 笔记本（见图 [7-2](#Fig2)）。
- en: '![../images/463852_1_En_7_Chapter/463852_1_En_7_Fig2_HTML.png](../images/463852_1_En_7_Chapter/463852_1_En_7_Fig2_HTML.png)'
