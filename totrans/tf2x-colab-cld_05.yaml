  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: 'Convert the value to a percentage:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 将值转换为百分比：
- en: '[PRE60]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: 'Display the prediction for the first image:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 显示第一张图像的预测结果：
- en: '[PRE61]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: The prediction can only be between 0 and 9 because our targets are between 0
