- en: 5. Classification
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 分类
- en: '**Classification** is a supervised learning method for predicting a class label
    for a given example of input data. Although we introduced classification with
    MNIST, we work through the famous Fashion-MNIST dataset to delve deeper into the
    topic.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '**分类** 是一种监督学习方法，用于预测给定输入数据的类别标签。尽管我们通过 MNIST 介绍了分类，但我们通过著名的 Fashion-MNIST
    数据集深入研究这一主题。'
- en: '*Fashion-MNIST* is intended as a direct replacement for MNIST to better benchmark
    machine learning algorithms. It shares the same image size and structure of training
    and test splits, but is a more challenging classification problem.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*Fashion-MNIST* 旨在作为 MNIST 的直接替代品，以更好地基准测试机器学习算法。它具有相同的图像大小和训练/测试分割的结构，但是一个更具挑战性的分类问题。'
- en: MNIST benchmarking has several associated problems. It’s far too easy for standard
    machine learning algorithms to achieve over 97% accuracy. It’s even easier for
    deep learning models to achieve over 99% accuracy. The dataset is overused. Finally,
    MNIST cannot represent modern computer vision tasks.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: MNIST 基准测试有几个相关的问题。对于标准机器学习算法来说，达到超过 97% 的准确率太容易了。对于深度学习模型来说，达到超过 99% 的准确率则更加容易。数据集被过度使用。最后，MNIST
    无法代表现代计算机视觉任务。
- en: 'Notebooks for chapters are located at the following URL: [`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow).'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 笔记本位于以下 URL：[`https://github.com/paperd/tensorflow`](https://github.com/paperd/tensorflow)。
- en: 'Enable the GPU (if not already enabled):'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 启用 GPU（如果尚未启用）：
- en: Click *Runtime* in the top-left menu.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在右上角菜单中点击 *运行时*。
- en: Click *Change runtime type* from the drop-down menu.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从下拉菜单中选择 *更改运行时类型*。
- en: Choose *GPU* from the *Hardware accelerator* drop-down menu.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 *硬件加速器* 下拉菜单中选择 *GPU*。
- en: Click *SAVE*.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击 *保存*。
- en: 'Test if GPU is active:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 测试 GPU 是否激活：
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Import the *tensorflow* library. If ‘/device:GPU:0’ is displayed, the GPU is
    active. If ‘..’ is displayed, the regular CPU is active.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 导入 *tensorflow* 库。如果显示 ‘/device:GPU:0’，则表示 GPU 正在运行。如果显示 ‘..’，则表示常规 CPU 正在运行。
- en: Fashion-MNIST Dataset
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Fashion-MNIST 数据集
- en: '**Fashion-MNIST** is a dataset of clothing article images created by Zalando
    Research consisting of a training set of 60,000 examples and a test set of 10,000
    examples. Each example is a 28 × 28 grayscale image associated with a label from
    ten classes.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**Fashion-MNIST** 是由 Zalando Research 创建的服装图像数据集，包含 60,000 个示例的训练集和 10,000
    个示例的测试集。每个示例是一个与十个类别之一的标签关联的 28 × 28 灰度图像。'
- en: Zalando Research is an organization that utilizes an agile design process that
    combines invaluable human experience with the power of machine learning. Zalando
    concentrates on exploring novel ways to use generative models in fashion design
    for rapid visualizations and prototyping.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Zalando Research 是一个利用敏捷设计流程的组织，该流程结合了宝贵的人类经验和机器学习的力量。Zalando 致力于探索在时尚设计中使用生成模型的新方法，以实现快速可视化和原型设计。
- en: Load Fashion-MNIST as a TFDS
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 Fashion-MNIST 加载为 TFDS
- en: Since Fashion-MNIST is a tfds.data.Dataset, we can easily load it with tfds.load.
    To get a list of all TFDS, just run the tfds.list_builders method as demonstrated
    in Chapter [3](501128_1_En_3_Chapter.xhtml).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Fashion-MNIST 是一个 tfds.data.Dataset，我们可以很容易地使用 tfds.load 加载它。要获取所有 TFDS 的列表，只需运行第
    [3](501128_1_En_3_Chapter.xhtml) 章中演示的 tfds.list_builders 方法即可。
- en: 'Load train and test examples as a tf.data.Dataset:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 将训练和测试示例作为 tf.data.Dataset 加载：
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Since we already have *info* from the train data, we don’t need to load it again
    for the test data.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经有训练数据的 *info*，因此不需要再次加载测试数据。
- en: 'Verify train and test data:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 验证训练和测试数据：
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Each image consists of 28 `×` 28 pixels. The *1* dimension indicates that images
    are grayscale. Each label is a scalar.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 每个图像由 28 `×` 28 像素组成。*1* 维度表示图像是灰度的。每个标签都是一个标量。
- en: Explore the Dataset
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索数据集
- en: 'Display information about the dataset:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 显示数据集信息：
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We see the name, description, and homepage. We also see the shape and datatype
    of feature images and labels. We see that we have 70,000 examples with train and
    test splits of 60,000 and 10,000, respectively. A lot of other information is
    also included.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到名称、描述和主页。我们还可以看到特征图像和标签的形状和数据类型。我们还可以看到有 70,000 个示例，其中训练和测试分割分别为 60,000
    和 10,000。还包括许多其他信息。
- en: 'Extract the number of classes and class labels:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 提取类别数量和类别标签：
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We have ten classes representing ten clothing articles.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有十个类别，代表十种服装。
- en: 'Let’s see some training examples:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些训练示例：
- en: '[PRE5]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The show_examples method displays sample images and labels. The label name and
    associated class number is displayed under each image. For example, the class
    number for *Pullover* is *2* because it is the third label in the class labels
    list.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: show_examples 方法显示样本图像和标签。每个图像下方显示标签名称及其关联的类号。例如，*Pullover* 的类号是 *2*，因为它是在类标签列表中的第三个标签。
- en: Listing [5-1](#PC7) is a custom function that displays samples from the train
    dataset.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [5-1](#PC7) 是一个自定义函数，用于显示训练数据集的样本。
- en: '[PRE6]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Import a couple of libraries. The function accepts a dataset, number of samples
    to display, and a colormap. A **colormap** is an array of colors used to map pixel
    data to the actual color values. The matplotlib library provides a variety of
    built-in colormaps.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 导入几个库。该函数接受数据集、要显示的样本数量和颜色图。**颜色图**是一组颜色，用于将像素数据映射到实际的颜色值。matplotlib 库提供了多种内置颜色图。
- en: We assign an example image and label to variables. We then display the label
    name and its associated class number. We end by displaying the image with the
    *imshow()* function. We use *[:, :, 0]* to grab all pixels from each image.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将一个示例图像及其标签分配给变量。然后显示标签名称及其关联的类号。最后，使用 *imshow()* 函数显示图像。我们使用 *[:, :, 0]*
    来获取每个图像的所有像素。
- en: 'Invoke the function to display a couple of training images:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 调用该函数以显示几幅训练图像：
- en: '[PRE7]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now, let’s build a custom function to display a grid of samples.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们构建一个自定义函数来显示样本网格。
- en: Before we create the function, take 30 samples from the train set as shown in
    Listing [5-2](#PC9).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在创建函数之前，从训练集中取出 30 个样本，如下所示：[5-2](#PC9)。
- en: '[PRE8]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Create the function as shown in Listing [5-3](#PC10).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 按照如下所示创建函数：[5-3](#PC10)。
- en: '[PRE9]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Invoke the function:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 调用该函数：
- en: '[PRE10]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'We can also pinpoint metadata with DatasetInfo:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用 DatasetInfo 精确定位元数据：
- en: '[PRE11]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Build the Input Pipeline
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建输入管道
- en: Build the input pipeline for train and test data as shown in Listing [5-4](#PC13).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 按照如下所示构建训练和测试数据的输入管道：[5-4](#PC13)。
- en: '[PRE12]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Shuffle and batch train data. Scale train images. Cache and prefetch train images.
    Batch test data. Scale test images. Cache and prefetch test images. Use batch
    size of 128 and shuffle buffer size of 5,000 for this experiment.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 洗牌并批处理训练数据。缩放训练图像。缓存并预取训练图像。批处理测试数据。缩放测试图像。缓存并预取测试图像。在此实验中使用 128 个批大小和 5,000
    个洗牌缓冲区大小。
- en: Note
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Do not shuffle test data because it is considered new to the neural network
    model.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 不要对测试数据进行洗牌，因为它被认为对神经网络模型来说是新的。
- en: Caching a TFDS can significantly improve performance. The *cache* method of
    a tf.data.Dataset can cache a dataset either in memory or on local storage, which
    saves operations like file opening and data reading from being executed during
    each epoch.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 缓存 TFDS 可以显著提高性能。tf.data.Dataset 的 *cache* 方法可以将数据集缓存到内存或本地存储中，从而避免在每个 epoch
    期间执行文件打开和数据读取等操作。
- en: Adding prefetch is a good idea because it adds efficiency to the batching process.
    While our training algorithm is working on one batch, TensorFlow is working on
    the dataset in parallel to get the next batch ready. So prefetch can dramatically
    improve training performance.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 添加预取是一个好主意，因为它可以提高批处理过程的效率。当我们的训练算法正在处理一个批次时，TensorFlow 正在并行处理数据集以准备下一个批次。因此，预取可以显著提高训练性能。
- en: For more information on TFDS performance improvement, peruse
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 关于 TFDS 性能提升的更多信息，请参阅
- en: '[`www.tensorflow.org/datasets/performances`](http://www.tensorflow.org/datasets/performances)'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/datasets/performances`](http://www.tensorflow.org/datasets/performances)'
- en: '[`www.tensorflow.org/guide/data_performance`](http://www.tensorflow.org/guide/data_performance)'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`www.tensorflow.org/guide/data_performance`](http://www.tensorflow.org/guide/data_performance)'
- en: 'Verify train and test tensors:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 验证训练和测试张量：
- en: '[PRE13]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Both train and test images are 28 `×` 28 `×` 1\. The 1 value means that images
    are grayscale. That is, images are in black and white.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和测试图像都是 28 `×` 28 `×` 1。1 的值表示图像是灰度的。也就是说，图像是黑白两色的。
- en: Build the Model
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: Let’s build a simple feedforward neural net as shown in Listing [5-5](#PC15).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个简单的前馈神经网络，如下所示：[5-5](#PC15)。
- en: '[PRE14]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Import requisite libraries. Clear any previous model sessions and generate a
    seed to facilitate reproducibility of results. The first layer flattens images.
    The second layer uses *relu* activation on 512 neurons to process the data. The
    third layer uses dropout to reduce overfitting. The fourth layer uses softmax
    activation on ten neurons to account for class labels.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 导入所需的库。清除任何先前的模型会话并生成一个种子以促进结果的重复性。第一层将图像展平。第二层使用 *relu* 激活对 512 个神经元进行数据处理。第三层使用
    dropout 来减少过拟合。第四层使用 softmax 激活对十个神经元进行分类标签的处理。
- en: Model Summary
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Display a summary of the model:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 显示模型的摘要：
- en: '[PRE15]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Output shape of the first layer is (None, 784). We get 784 by multiplying 28
    by 28\. We have no parameters at this layer because it is only used to bring data
    into the model.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层的输出形状是 (None, 784)。我们通过将 28 乘以 28 得到 784。在这一层我们没有参数，因为它仅用于将数据带入模型。
- en: Output shape of the second layer is (None, 512) because we have 512 neurons
    at this layer. We get parameters of 401,920 by multiplying 512 neurons at this
    layer by 784 neurons from the previous layer and adding 512 at this layer.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 第二层的输出形状是 (None, 512)，因为我们在这层有 512 个神经元。通过将这层的 512 个神经元乘以前一层的 784 个神经元，并加上这层的
    512 个神经元，我们得到 401,920 个参数。
- en: Output shape of the third layer is (None, 512), and parameters are 0 because
    dropout doesn’t impact neurons or parameters. Output shape of the fourth layer
    is (None, 10) because we have ten neurons at this layer to deal with ten output
    classes. We get parameters of 5,130 by multiplying 10 neurons at this layer by
    512 from the previous layer and adding 10 neurons at this layer.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 第三层的输出形状是 (None, 512)，参数为 0，因为 dropout 不影响神经元或参数。第四层的输出形状是 (None, 10)，因为我们在这层有十个神经元来处理十个输出类别。通过将这层的
    10 个神经元乘以前一层的 512，并加上这层的 10 个神经元，我们得到 5,130 个参数。
- en: Note
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: '*None* is used because TensorFlow models can accept any batch size.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 *None* 是因为 TensorFlow 模型可以接受任何批大小。
- en: Compile the Model
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Define a gradient descent optimizer that tweaks model parameters to minimize
    the loss function:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 定义一个梯度下降优化器，调整模型参数以最小化损失函数：
- en: '[PRE16]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Train the Model
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Train the model with ten epochs:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 使用十个周期训练模型：
- en: '[PRE17]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: We get pretty good accuracy with not much overfitting.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了相当不错的准确率，并且过拟合不多。
- en: Generalize on Test Data
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在测试数据上泛化
- en: 'Although training provides accuracy and loss metrics, it is always a good idea
    to explicitly evaluate the model on test data to see how well the model generalizes
    on new data:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然训练提供了准确性和损失指标，但始终明确地在测试数据上评估模型以查看模型在新数据上的泛化能力是一个好主意：
- en: '[PRE18]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Visualize Performance
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化性能
- en: The *fit* method automatically records the history of the training process as
    a dictionary. So we can assign training information to a variable. In this case,
    we assign it to history. The history attribute of the variable contains the dictionary
    information.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '*fit* 方法自动将训练过程的历史记录作为一个字典。因此，我们可以将训练信息分配给一个变量。在这种情况下，我们将其分配给 history。变量的 history
    属性包含字典信息。'
- en: 'Display the dictionary keys to inform us on how to plot the results:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 显示字典键以告知我们如何绘制结果：
- en: '[PRE19]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: The dictionary history.history contains loss, accuracy, val_loss, and val_accuracy
    metrics that the model measures at the end of each epoch on the training set and
    validation (or test) set.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 字典 history.history 包含损失、准确率、val_loss 和 val_accuracy 指标，这些指标是模型在每个周期结束时在训练集和验证（或测试）集上测量的。
- en: 'The *params* variable provides all parameters involved with training:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*params* 变量提供了所有与训练相关的参数：'
- en: '[PRE20]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Plot training performance as shown in Listing [5-6](#PC22).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [5-6](#PC22) 所示，绘制训练性能图。
- en: '[PRE21]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: We don’t have much overfitting, and our model accuracy is pretty good for such
    a simple neural network.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有太多过拟合，并且对于这样一个简单的神经网络，我们的模型准确率相当不错。
- en: 'We can also use pandas to plot training performance:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以使用 pandas 来绘制训练性能：
- en: '[PRE22]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Predict Labels for Test Images
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测测试图像的标签
- en: Now that we have a trained model, we can make predictions based on test images.
    We predict from test images because the model sees these images as *new* data.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经训练了一个模型，我们可以根据测试图像进行预测。我们使用测试图像进行预测，因为模型将这些图像视为 *新* 数据。
- en: 'Begin by predicting the label for each image in the test set:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 首先预测测试集中的每个图像的标签：
- en: '[PRE23]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: We use the *predict* method on the processed test set *test_fs*.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在处理过的测试集 *test_fs* 上使用 *predict* 方法。
- en: Since Fashion-MNIST has ten class labels, each prediction consists of an array
    of ten numbers that represent the model’s *confidence* in how well the image corresponds
    to each of the ten different articles of clothing.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Fashion-MNIST 有十个类别标签，每个预测由一个包含十个数字的数组组成，这些数字代表模型对图像与十个不同服装类别对应程度的**置信度**。
- en: 'Let’s take a look at the *first* prediction:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 *第一个* 预测：
- en: '[PRE24]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The first prediction is at index 0 because Python indexes range from 0 to 9999
    for test set size of 10,000\. It’s hard to tell which of the values has the highest
    number by looking at the array of float number values.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 第一预测位于索引 0，因为 Python 的索引范围从 0 到 9999，对于测试集大小为 10,000。通过查看浮点数值数组，很难判断哪个值具有最高的数值。
- en: 'Round the numbers in the prediction array to make it easier to see the position
    in the array with the highest confidence:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 将预测数组中的数字四舍五入，以便更容易看到具有最高置信度的数组位置：
- en: '[PRE25]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Now, we can clearly see the value with the highest number. The position with
    the highest confidence corresponds to the position in the class labels array.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以清楚地看到数值最高的值。最高置信度的位置对应于类别标签数组中的位置。
- en: 'We can directly derive the confidence in the prediction with the following
    code:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用以下代码直接推导出预测的置信度：
- en: '[PRE26]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'Display the confidence:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 显示置信度：
- en: '[PRE27]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: 'Display the prediction for the *first* image in the test set:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 显示测试集中*第一个*图像的预测结果：
- en: '[PRE28]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The prediction must be between 0 and 9 because our targets are between 0 and
    9.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 预测值必须在0到9之间，因为我们的目标是介于0到9之间的。
- en: 'Use the *class_labels* array we created earlier to see the actual fashion article:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们之前创建的*class_labels*数组来查看实际的时尚衣物：
- en: '[PRE29]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: So we have the predicted clothing article for the first image in the test set.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们得到了测试集中第一张图像的预测衣物。
- en: 'Display the *first* actual test image:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 显示*第一个*实际测试图像：
- en: '[PRE30]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: We take the first image from a batch of 128 images because we set batch size
    to 128\. If the prediction matches the test image, it was a correct prediction.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从128张图像的一批中取出第一张图像，因为我们设置了批大小为128。如果预测与测试图像匹配，则是一个正确的预测。
- en: Build a Prediction Plot
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建预测图
- en: Now that we have a trained model, we can build a prediction plot.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经有一个训练好的模型，我们可以构建一个预测图。
- en: Since we want to see how well the model performs on new data, take 30 samples
    from the test set as shown in Listing [5-7](#PC32).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们想看看模型在新数据上的表现如何，所以我们从测试集中取出30个样本，如列表[5-7](#PC32)所示。
- en: '[PRE31]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Squeeze each image to remove the 1 dimension for plotting purposes.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 为了绘图目的，将每个图像压缩以去除1维。
- en: Build a plotting function as shown in Listing [5-8](#PC33).
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[5-8](#PC33)所示构建一个绘图函数。
- en: '[PRE32]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Invoke the function as shown in Listing [5-9](#PC34).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[5-9](#PC34)所示调用函数。
- en: '[PRE33]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Any clothing article in *red* means that the prediction was incorrect. Above
    each article of clothing is the actual label, prediction in parentheses, and confidence
    in the prediction.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 所有标有*红色*的衣物意味着预测是错误的。每件衣物的上方是实际标签，括号内是预测结果，以及预测的置信度。
- en: Load Fashion-MNIST as a Keras Dataset
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将Fashion-MNIST作为Keras数据集加载
- en: Although TFDS are recommended for TensorFlow 2.x application, we show you how
    to work with a Keras dataset because of its popularity in industry. The newness
    of TensorFlow 2.x means that it doesn’t yet have the industry penetration of Keras.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然TFDS推荐用于TensorFlow 2.x应用程序，但因为我们展示了如何与Keras数据集一起工作，所以这得益于其在行业中的普及。TensorFlow
    2.x的新颖性意味着它还没有像Keras那样在行业中渗透。
- en: 'Load the Keras dataset:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 加载Keras数据集：
- en: '[PRE34]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Explore the Data
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索数据
- en: 'Let’s look at the data shapes:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看数据形状：
- en: '[PRE35]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: The Keras dataset contains the same data as the Fashion-MNIST TFDS. Train data
    consists of 60,000 28 `×` 28 feature images and 60,000 labels. Test data consists
    of 10,000 28 `×` 28 feature images and 10,000 labels. Train images are contained
    in the train tuple. So train[0] represents images and train[1] represents labels.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: Keras数据集包含与Fashion-MNIST TFDS相同的数据。训练数据包括60,000个28 `×` 28的特征图像和60,000个标签。测试数据包括10,000个28
    `×` 28的特征图像和10,000个标签。训练图像包含在train元组中。因此，train[0]代表图像，train[1]代表标签。
- en: 'Let’s see what the first image represents:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看第一张图像代表什么：
- en: '[PRE36]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Since we access training labels with train[1], we grab the first label with
    train[1][0].
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用train[1]访问训练标签，所以我们通过train[1][0]获取第一个标签。
- en: Visualize the First Image
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化第一张图像
- en: 'Plot the first image with Matplotlib’s imshow function:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Matplotlib的imshow函数绘制第一张图像：
- en: '[PRE37]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: 'Assign images and labels to variables for convenience:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 将图像和标签分配给变量以方便使用：
- en: '[PRE38]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Plot the first image based on the train_images variable:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 根据train_images变量绘制第一张图像：
- en: '[PRE39]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: 'Access the label name of the first image:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 访问第一张图像的标签名称：
- en: '[PRE40]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'Labels are the class IDs ranging from 0 to 9:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 标签是范围从0到9的类别ID：
- en: '[PRE41]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Visualize Sample Images
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化样本图像
- en: Since we can’t use the TFDS show_examples method, we create code as shown in
    Listing [5-10](#PC43).
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们不能使用TFDS的show_examples方法，所以我们创建如列表[5-10](#PC43)所示的代码。
- en: '[PRE42]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: Prepare Data for Training
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备训练数据
- en: To prepare training data for TensorFlow consumption, we need to grab images
    and labels from train and test data. We scale images to ensure that each input
    parameter (a pixel, in our case) has a similar data distribution. The distribution
    of such data resembles a Gaussian curve centered at zero. Scaling data makes convergence
    faster while training the network.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 为了准备TensorFlow消耗的训练数据，我们需要从训练和测试数据中获取图像和标签。我们缩放图像以确保每个输入参数（在我们的例子中是一个像素）具有相似的数据分布。此类数据的分布类似于以零为中心的高斯曲线。缩放数据使网络训练更快收敛。
- en: As we know, pixel data is represented by a range from 0 to 255\. So we divide
    each feature image by 255 to scale it. Once images are scaled, we convert images
    and labels to a tf.Tensor object with from_tensor_slices as shown in Listing [5-11](#PC44).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，像素数据由0到255的范围表示。因此，我们将每个特征图像除以255以对其进行缩放。一旦图像被缩放，我们就使用from_tensor_slices将其转换为tf.Tensor对象，如列表[5-11](#PC44)所示。
- en: '[PRE43]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Display the tensors:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 显示张量：
- en: '[PRE44]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: 'Finish the input pipeline by shuffling, batching, and prefetching train data
    and batching and prefetching test data:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 通过洗牌、分批和预取训练数据以及分批和预取测试数据来完成输入管道：
- en: '[PRE45]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Set BATCH_SIZE to 128 so the model will run faster than with a smaller batch
    size. Experiment with this number and see what happens. We also set SHUFFLE_BUFFER_SIZE
    to 5000 so the shuffle method works well. Again, experiment with this number to
    see what happens.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 将BATCH_SIZE设置为128，这样模型运行速度会比使用更小的批量大。尝试这个数字并看看会发生什么。我们还设置了SHUFFLE_BUFFER_SIZE为5000，以便shuffle方法能够很好地工作。再次尝试这个数字并看看会发生什么。
- en: 'Display the finalized input pipeline tensors:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 显示最终化的输入管道张量：
- en: '[PRE46]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Build the Model
  id: totrans-168
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建模型
- en: Create the same model that we did for the TFDS as shown in Listing [5-12](#PC48).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 创建与TFDS相同的模型，如列表[5-12](#PC48)所示。
- en: '[PRE47]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: As we already know, it is always a good idea to clear any previous modeling
    sessions. Remember that we already created a model and trained it earlier in the
    chapter. Also, generating a seed ensures that the results are consistent. In machine
    learning, such consistency is called *reproducibility*. That is, the seed provides
    a starting point for the random generator that allows us to reproduce results
    in a consistent manner. You can use any integer value for the random seed number.
    We use *0*.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所知，清除任何先前的建模会话总是一个好主意。记住，我们已经在本章的早期创建了一个模型并对其进行了训练。此外，生成一个种子确保结果的一致性。在机器学习中，这种一致性称为*可重复性*。也就是说，种子为随机生成器提供了一个起点，使我们能够以一致的方式重现结果。您可以使用任何整数作为随机种子数字。我们使用*0*。
- en: The first layer, Flatten(), flattens the 2D matrix of 28 `×` 28 images to a
    1D array of 784 pixels. The second layer is the first true layer. It accepts input
    images into 128 neurons and performs *relu* activation. The final layer is the
    output layer. It accepts output from the input layer with ten neurons that represent
    the ten classes of clothing articles and performs softmax activation.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层，Flatten()，将28 `×` 28的二维图像矩阵展平为784像素的一维数组。第二层是第一个真正的层。它接受128个神经元的输入图像并执行*relu*激活。最后一层是输出层。它接受输入层的输出，包含十个神经元，代表十种服装类别，并执行softmax激活。
- en: Model Summary
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型摘要
- en: 'Inspect the model:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 检查模型：
- en: '[PRE48]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Compile the Model
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译模型
- en: 'Compile:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE49]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Train the Model
  id: totrans-179
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'Fit the model. Passing a dataset of (feature, label) pairs is all that’s needed
    for Model.fit and Model.evaluate:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 调整模型。传递一个包含(特征，标签)对的数据集就足够了，用于Model.fit和Model.evaluate：
- en: '[PRE50]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Generalize on Test Data
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在测试数据上推广
- en: 'Although model fit information provides validation loss and accuracy during
    training, it is always a good idea to explicitly evaluate the model on test data
    because accuracy and loss values may differ:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然模型拟合信息在训练期间提供了验证损失和准确度，但始终明确地在测试数据上评估模型是一个好主意，因为准确度和损失值可能不同：
- en: '[PRE51]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Visualize Training
  id: totrans-185
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化训练
- en: The fit method automatically records the history of the training process as
    a dictionary. So we can assign training history to a variable. In this case, we
    assigned it to *history*. The history attribute of the variable contains the dictionary
    information.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: fit方法自动将训练过程的历史记录记录为字典。因此，我们可以将训练历史记录分配给一个变量。在这种情况下，我们将其分配给*history*。变量的history属性包含字典信息。
- en: 'Display the dictionary keys to inform us on how to plot results:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 显示字典键以告知我们如何绘制结果：
- en: '[PRE52]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Dictionary *history.history* contains loss and other metrics the model measures
    at the end of each epoch on the training set and validation set.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 字典*history.history*包含模型在每个训练集和验证集的每个epoch结束时测量的损失和其他指标。
- en: 'The *params* variable provides all parameters involved with the model:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '*params* 变量提供了与模型相关的所有参数：'
- en: '[PRE53]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Listing [5-13](#PC55) plots training history.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [5-13](#PC55) 绘制了训练历史。
- en: '[PRE54]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Overfitting is minimal because training accuracy is closely aligned with test
    accuracy. We did employ dropout in the model to reduce overfitting. **Dropout**
    is a regularization method that approximates training a large number of neural
    networks with different architectures in parallel. The definition doesn’t make
    it easier to understand for anyone new to deep learning. So let’s explain how
    it works.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 过拟合最小，因为训练准确率与测试准确率紧密一致。我们在模型中使用了dropout来减少过拟合。**Dropout** 是一种正则化方法，它通过并行训练具有不同架构的大量神经网络来近似训练。这个定义对于任何刚开始接触深度学习的人来说都不容易理解。所以让我们解释一下它是如何工作的。
- en: During training, some number of layer outputs are randomly ignored or *dropped
    out*. By randomly dropping out layer outputs, effectively the layer looks like
    and is treated like a layer with a different number of nodes and connectivity
    to the prior layer. So each update to a layer during training is performed with
    a different *view* of the configured layer. Dropout is a simple but very effective
    technique to reduce overfitting.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，一些层输出被随机忽略或 *丢弃*。通过随机丢弃层输出，实际上层看起来就像并且被当作具有不同节点数量和与前一层连接性的层来处理。因此，在训练过程中对层的每次更新都是使用配置层的不同
    *视图* 来执行的。Dropout是一种简单但非常有效的技术，可以减少过拟合。
- en: Setting dropout at *0.4* means that we randomly drop out 40% of the layer outputs.
    You can easily experiment with dropout by changing this value. However, you should
    keep dropout rate at or less than *0.5* because otherwise you are removing too
    much data!
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 将dropout设置为 *0.4* 意味着我们将随机丢弃40%的层输出。你可以通过改变这个值轻松地尝试dropout。然而，你应该将dropout率保持在或低于
    *0.5*，否则你将删除太多数据！
- en: Tip
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 小贴士
- en: Experiment with dropout levels, but keep it at or less than 0.5 to avoid removing
    too much data.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的dropout水平，但保持它不超过0.5，以避免删除太多数据。
- en: If the model is overfitting (train accuracy is greater than test accuracy) with
    the dropout value you set, you can increase it. If the model is underfitting (train
    accuracy is less than test accuracy), you can decrease it.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型过拟合（训练准确率大于测试准确率）且dropout值设置不当，可以增加它。如果模型欠拟合（训练准确率小于测试准确率），可以减少它。
- en: 'Use pandas to plot:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 使用pandas进行绘图：
- en: '[PRE55]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Predict Labels for Test Images
  id: totrans-202
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预测测试图像的标签
- en: We can make predictions on test images since we have a trained model.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有一个训练好的模型，我们可以对测试图像进行预测。
- en: 'Predict the label for each image from test set *test_ks*:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集 *test_ks* 对每张图像进行标签预测：
- en: '[PRE56]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: As with the Fashion-MNIST TFDS, a prediction is an array of ten numbers that
    represent the model’s confidence that the image corresponds to each of the ten
    articles of clothing.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 与Fashion-MNIST TFDS一样，预测是一个包含十个数字的数组，代表模型对图像对应十个服装类别的置信度。
- en: Predict the First Image
