- en: 'Create a confusion matrix to visually demonstrate how well the model classified
    articles of clothing from Fashion-MNIST:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs: []
  type: TYPE_PRE
- en: To understand the TensorFlow confusion matrix, imagine that above the first
    row of the matrix are classes 0–9 from left to right. These represent predictions.
    Imagine that to the left of the first column of the matrix are classes 0–9 from
    top to bottom. These represent actual labels. Correct classifications are along
    the diagonal. Misclassifications are not on the diagonal.
  prefs: []
  type: TYPE_NORMAL
- en: The first set of correct classifications is in position row one, column one
    and represents class 0\. The second set is in position row two, column two and
    represents class 1\. And so on…
  prefs: []
  type: TYPE_NORMAL
- en: 'An example misclassification set is row one, column two. This represents the
    number of predictions for class 1 that were misclassified as class 0\. For a technical
    explanation of the TensorFlow confusion matrix, peruse the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://stackoverflow.com/questions/46616837/understanding-a-tensorflow-confusion-matrix-for-binary-classification`](https://stackoverflow.com/questions/46616837/understanding-a-tensorflow-confusion-matrix-for-binary-classification)'
  prefs: []
  type: TYPE_NORMAL
- en: 'For a general explanation of a confusion matrix, peruse the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`www.dataschool.io/simple-guide-to-confusion-matrix-terminology/`](http://www.dataschool.io/simple-guide-to-confusion-matrix-terminology/)'
  prefs: []
  type: TYPE_NORMAL
- en: Number of Hidden Layers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For many problems, we can begin with a single hidden layer and get reasonable
    results as we did with our Fashion-MNIST model in this chapter. For more complex
    problems, we should add layers until we start overfitting the training set.
  prefs: []
  type: TYPE_NORMAL
- en: Number of Neurons in Hidden Layers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The number of neurons in the input and output layers is based on the type of
    input and output your task requires. For example, the Fashion-MNIST task requires
    28 `×` 28 = 784 input neurons and ten output neurons. For hidden layers, it is
    very difficult to determine. You can try increasing the number of neurons gradually
    until the network starts overfitting. In practice, we typically pick a model with
    more layers and neurons than we need and then use early stopping and other regularization
    techniques to reduce overfitting. Since this is an introduction, we won’t delve
    any deeper into tuning networks.
  prefs: []
  type: TYPE_NORMAL
- en: Generally, we get a better model by increasing the number of layers rather than
    the number of neurons per layer. Of course, the number of layers and neurons we
    include is limited by our available computational resources.
  prefs: []
  type: TYPE_NORMAL
