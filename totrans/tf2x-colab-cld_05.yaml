  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 预测值只能在0到9之间，因为我们的目标是介于0到9之间。
- en: 'Use the class_labels array created earlier to see the actual fashion article:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 使用之前创建的 class_labels 数组来查看实际的时尚文章：
- en: '[PRE62]'
  id: totrans-220
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Display the first actual test label for comparison:'
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 显示用于比较的第一个实际测试标签：
- en: '[PRE63]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: If the prediction and actual images match, the prediction is correct.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 如果预测和实际图像匹配，则预测正确。
- en: Predict Four Images
  id: totrans-224
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 预测四张图像
- en: 'Make four predictions from the test set:'
