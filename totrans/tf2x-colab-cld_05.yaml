  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集中进行四次预测：
- en: '[PRE64]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: 'Show the predictions:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 显示预测结果：
- en: '[PRE65]'
  id: totrans-228
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: 'Get class labels:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 获取类别标签：
- en: '[PRE66]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: 'Compare predictions to the test dataset:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 将预测与测试数据集进行比较：
- en: '[PRE67]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: 'Show actuals as class labels:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 以类别标签显示实际值：
- en: '[PRE68]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Visualize as shown in Listing [5-14](#PC70).
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [5-14](#PC70) 所示进行可视化。
- en: '[PRE69]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: Explore Misclassifications
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索错误分类
- en: Let’s explore predictions and actual test image labels to find some misclassifications.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索预测和实际测试图像标签以找到一些错误分类。
- en: 'The first step is to identify prediction labels:'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是识别预测标签：
- en: '[PRE70]'
  id: totrans-240
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: The *y_pred* variable holds a list of prediction labels.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: '*y_pred* 变量包含预测标签的列表。'
- en: 'Next, grab some predictions and actual targets:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，获取一些预测和实际目标：
- en: '[PRE71]'
  id: totrans-243
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: 'Find misclassifications:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找错误分类：
- en: '[PRE72]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: If you don’t get any misclassifications, increase the size of *n* and rerun
    the last two code snippets.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有错误分类，增加 *n* 的大小并重新运行最后两个代码片段。
- en: We now have an array of misclassifications by their index.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有一个按索引排列的错误分类数组。
- en: Listing [5-15](#PC74) displays the confidence for misclassifications.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [5-15](#PC74) 显示了错误分类的置信度。
- en: '[PRE73]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: Visualize Misclassifications
  id: totrans-250
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化错误分类
- en: Create a function to visualize misclassifications as shown in Listing [5-16](#PC75).
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个函数，如列表 [5-16](#PC75) 所示，来可视化错误分类。
- en: '[PRE74]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: 'Invoke the function:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 调用函数：
- en: '[PRE75]'
  id: totrans-254
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: The confidence may still be pretty high even though the prediction was incorrect.
    Although neural networks tend to perform well for prediction, their estimated
    predicted probabilities by the output of a softmax layer tend to be too high.
    That is, they are too confident in their predictions. Remember that the probability
    with the highest value is the predicted class from the prediction array. And this
    probability is the confidence. However, the prediction is not necessarily correct
    unless the model has 100% accuracy.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 即使预测不正确，置信度可能仍然相当高。尽管神经网络在预测方面通常表现良好，但它们通过 softmax 层的输出估计的预测概率往往过高。也就是说，它们对自己的预测过于自信。记住，预测数组中值最高的概率是预测的类别。这个概率就是置信度。然而，除非模型有
    100% 的准确率，否则预测不一定正确。
- en: Create a more sophisticated visualization as shown in Listing [5-17](#PC77).
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [5-17](#PC77) 所示，创建一个更复杂的可视化。
- en: '[PRE76]'
  id: totrans-257
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: Misclassifications, if any, are in red. Above each article of clothing is the
    actual label, prediction in parentheses, and confidence in the prediction.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有的话，错误分类将以红色显示。每件衣服上方是实际标签，括号内是预测，以及预测的置信度。
- en: Predict from a Single Image
  id: totrans-259
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从单张图片进行预测
- en: We can make a prediction on a single image. We choose a number between 0 and
    9,999 because we want an image from the test set. Alternatively, we can generate
    a random number between 0 and 9,999.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对单张图片进行预测。我们选择一个介于 0 和 9,999 之间的数字，因为我们想要测试集中的图片。或者，我们也可以生成一个介于 0 和 9,999
    之间的随机数。
- en: 'Randomly choose an image from the test set:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集中随机选择一张图片：
- en: '[PRE77]'
  id: totrans-262
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: Displayed is the index of the randomly chosen image.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 显示的是随机选择的图片的索引。
- en: 'Grab the image from the test set:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 从测试集中获取图片：
- en: '[PRE78]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: TensorFlow models are optimized to make predictions on a batch or collection
    of examples at once. So add the single image to a batch where it is the only member.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 模型被优化为一次对一批或一系列示例进行预测。所以将单张图片添加到一个批次中，使其成为唯一的成员。
- en: 'Create a batch with a single image:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个包含单个图片的批次：
- en: '[PRE79]'
  id: totrans-268
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: The *expand_dims* method inserts a new axis that appears at the axis position
    in the expanded array shape. So the new shape is (1, 28, 28).
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '*expand_dims* 方法在扩展数组的形状中插入一个新的轴，该轴位于扩展数组的轴位置。因此，新的形状是 (1, 28, 28)。'
- en: 'Now, we can predict:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以进行预测：
- en: '[PRE80]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: 'Display prediction:'
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 显示预测：
- en: '[PRE81]'
  id: totrans-273
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: The index position in the prediction array is displayed.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 预测数组中的索引位置被显示出来。
- en: 'To make it easier, display prediction by label name:'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，通过标签名称显示预测：
- en: '[PRE82]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: 'Display the actual label:'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 显示实际标签：
- en: '[PRE83]'
  id: totrans-278
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: Visualize Single Image Prediction
  id: totrans-279
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化单张图片预测
- en: Visualize the prediction as shown in Listing [5-18](#PC85).
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [5-18](#PC85) 所示，可视化预测结果。
- en: '[PRE84]'
  id: totrans-281
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: Get prediction by label name and actual label name for the image. Get prediction
    confidence from the predictions object that we created earlier. The predictions
    object holds all predictions based on the test set. The *indx* value provides
    the position of the confidence value in the predictions object.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 通过标签名称和实际标签名称获取图片的预测。从我们之前创建的预测对象中获取预测置信度。该预测对象包含基于测试集的所有预测。*indx* 值提供了置信值在预测对象中的位置。
- en: Confusion Matrix
  id: totrans-283
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 混淆矩阵
- en: 'Create a confusion matrix to visually demonstrate how well the model classified
    articles of clothing from Fashion-MNIST:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个混淆矩阵，以直观地展示模型对 Fashion-MNIST 衣服类别的分类效果：
- en: '[PRE85]'
  id: totrans-285
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: To understand the TensorFlow confusion matrix, imagine that above the first
    row of the matrix are classes 0–9 from left to right. These represent predictions.
    Imagine that to the left of the first column of the matrix are classes 0–9 from
    top to bottom. These represent actual labels. Correct classifications are along
    the diagonal. Misclassifications are not on the diagonal.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解 TensorFlow 混淆矩阵，想象矩阵的第一行上方是 0-9 类别，从左到右排列。这些代表预测。想象矩阵的第一列左侧是 0-9 类别，从上到下排列。这些代表实际标签。正确的分类位于对角线上。错误分类不在对角线上。
- en: The first set of correct classifications is in position row one, column one
    and represents class 0\. The second set is in position row two, column two and
    represents class 1\. And so on…
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 第一组正确分类位于第一行第一列，代表类别0。第二组位于第二行第二列，代表类别1。以此类推…
- en: 'An example misclassification set is row one, column two. This represents the
    number of predictions for class 1 that were misclassified as class 0\. For a technical
    explanation of the TensorFlow confusion matrix, peruse the following URL:'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 一个例子中的错误分类集位于第一行第二列。这代表了对类别1的预测错误地被分类为类别0的数量。关于TensorFlow混淆矩阵的技术解释，请参阅以下网址：
- en: '[`https://stackoverflow.com/questions/46616837/understanding-a-tensorflow-confusion-matrix-for-binary-classification`](https://stackoverflow.com/questions/46616837/understanding-a-tensorflow-confusion-matrix-for-binary-classification)'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: '[理解TensorFlow二分类混淆矩阵](https://stackoverflow.com/questions/46616837/understanding-a-tensorflow-confusion-matrix-for-binary-classification)'
- en: 'For a general explanation of a confusion matrix, peruse the following URL:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 关于混淆矩阵的一般解释，请参阅以下网址：
- en: '[`www.dataschool.io/simple-guide-to-confusion-matrix-terminology/`](http://www.dataschool.io/simple-guide-to-confusion-matrix-terminology/)'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '[混淆矩阵术语简单指南](http://www.dataschool.io/simple-guide-to-confusion-matrix-terminology/)'
- en: Number of Hidden Layers
  id: totrans-292
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 隐藏层数量
- en: For many problems, we can begin with a single hidden layer and get reasonable
    results as we did with our Fashion-MNIST model in this chapter. For more complex
    problems, we should add layers until we start overfitting the training set.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 对于许多问题，我们可以从一个隐藏层开始，并像本章中我们的Fashion-MNIST模型那样获得合理的结果。对于更复杂的问题，我们应该添加层，直到我们开始过拟合训练集。
- en: Number of Neurons in Hidden Layers
  id: totrans-294
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 隐藏层中的神经元数量
- en: The number of neurons in the input and output layers is based on the type of
    input and output your task requires. For example, the Fashion-MNIST task requires
    28 `×` 28 = 784 input neurons and ten output neurons. For hidden layers, it is
    very difficult to determine. You can try increasing the number of neurons gradually
    until the network starts overfitting. In practice, we typically pick a model with
    more layers and neurons than we need and then use early stopping and other regularization
    techniques to reduce overfitting. Since this is an introduction, we won’t delve
    any deeper into tuning networks.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 输入层和输出层中的神经元数量取决于你的任务所需的输入和输出类型。例如，Fashion-MNIST任务需要28 `×` 28 = 784个输入神经元和十个输出神经元。对于隐藏层，这非常难以确定。你可以尝试逐渐增加神经元数量，直到网络开始过拟合。在实践中，我们通常选择比所需更多层和神经元的模型，然后使用提前停止和其他正则化技术来减少过拟合。由于这是一个介绍，我们不会深入探讨网络调优。
- en: Generally, we get a better model by increasing the number of layers rather than
    the number of neurons per layer. Of course, the number of layers and neurons we
    include is limited by our available computational resources.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，通过增加层数而不是每层的神经元数量，我们可以得到更好的模型。当然，我们包含的层数和神经元数量受限于我们可用的计算资源。
