- en: 7. Reframing Difficult Deep Learning Problems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '*Successful transformations reframe the problem that makes the solution possible.
    They erase existing boundaries and start from scratch.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: —Malcolm Gladwell, Journalist and Author
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'To speak very roughly, the deep learning process can be represented with three
    central sequentially connected components: the creation of the architecture, the
    definition of training procedures and methods, and the training of the model itself.
    This is the general deep learning modeling workflow. Each of the chapters this
    book has covered up to this point can be categorized approximately into at least
    one of these categories. Chapter [2](516104_1_En_2_Chapter.xhtml), on transfer
    learning and pretraining, discussed methods of training models to transfer and
    develop knowledge from sources other than the original dataset. Chapter [3](516104_1_En_3_Chapter.xhtml),
    on autoencoders, discussed various usages of the versatile autoencoder concept
    and architecture. Chapter [4](516104_1_En_4_Chapter.xhtml), on model compression,
    discussed various modifications to the neural network architecture, in addition
    to alterations in the training procedure. Chapter [5](516104_1_En_5_Chapter.xhtml),
    on meta-optimization, discussed the automation of parameters in neural network
    architecture and training procedures. Chapter [6](516104_1_En_6_Chapter.xhtml),
    on successful neural network design, discussed successful design patterns and
    techniques in neural network architectures and model implementation.'
  prefs: []
  type: TYPE_NORMAL
- en: In this last chapter – Chapter [7](516104_1_En_7_Chapter.xhtml) – we will be
    taking a step back, moving away from strictly the study of building successful
    and efficient neural network systems and toward a more broad perspective on *using*,
    not just *doing*, deep learning in real-world problems. In order to do this, we’re
    going to need to be comfortable with *reframing* difficult real-world problems
    that often don’t come in a format that is convenient for successful application
    of deep learning. Although deep learning is an incredibly powerful and versatile
    tool, it often requires the human knack for problem-solving in the face of difficult
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The key theme we will explore in this chapter is that of *data*. Data is the
    basis of deep learning problems, and it is a key factor in informing how one approaches
    the key components of deep learning (Figure [7-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig1_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: 'Deep learning vs. deep learning: the role data plays in influencing each of
    the components of deep learning'
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ve reached a point in which it’s difficult to abstract the notion of “reframing
    the problem” into a generalized theory or a simple set of bullet points. This
    chapter will present three case studies as examples of successful reframing of
    difficult deep learning problems, in relation to data: experimentation with data
    representation, corrupted data, and limited data. While these case studies are
    not to be taken as strictly representative of the problems that you will face
    and need to reframe, they demonstrate that innovation comes with pushing and breaking
    boundaries. In doing so, hopefully they give you the creative spark to begin tackling
    new and unseen problems yourself.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Data Representation: DeepInsight'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data is a valuable commodity whose purity has become more and more prized throughout
    deep learning development. Whereas traditional machine learning methods often
    heavily relied upon human feature cleaning, engineering, and alteration, modern
    deep learning pushes toward a continual decreasing dependency on humans to perform
    data preprocessing by automating the preparation of the data, most commonly through
    clever neural network architecture designs.
  prefs: []
  type: TYPE_NORMAL
- en: Deep learning is automating the transgression of data forms; different methods
    of representing data are being bridged together in an automated fashion. Yet,
    there still remains a divide in data that deep learning still requires the guidance
    of humans to navigate – the *contextual dimension* of the data. By this, we mean
    not merely the dimensions (i.e., shape) of the data or the encoded knowledge it
    represents, but the organization of data along various dimensions of context from
    the data’s origin, like spatial dimensions of width, height, and channels in an
    image, the dimension of time in audio inputs, and the dimension of sequence in
    text inputs. The contextual dimension of the data best describes what we understand
    to be meaningfully different “types” or “forms” of data in the context of deep
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'So-called “specialized” data forms like images are generally reduced to the
    basic component of deep learning, the vector, upon which they can be processed
    as a primary element among standard layers and manipulations. This has been the
    general convention in the progression of deep learning development: the concept
    of feature extraction implies a tendency of complex data toward simplicity; the
    important elements of complex data are extracted, and from these elements, even
    more important elements are extracted, etc. Thus, complex data forms are reduced
    to the processing unit of the vector.'
  prefs: []
  type: TYPE_NORMAL
- en: This is a rather unexplicit assumption or tradition in deep learning development,
    from which reframing the design paradigm and transgressing boundaries may yield
    new innovative and effective approaches. We can reframe the traditional flow of
    image data to vector form as vector data flowing into *image* form. Convolutional
    operations provide a local approach to feature extraction – that is, complex arrangements
    of data are progressively smoothed with local filters such that information is
    *progressively* generalized – that fully connected layers do not offer, viewing
    and processing all information at once. Intuitively, we may hypothesize that local
    extraction of features may prove to be valuable in domains other than just images.
  prefs: []
  type: TYPE_NORMAL
- en: 'Alok Sharma, Edwin Vans, Daichi Shigemizu, Keith A. Boroevich, and Tatsuhiko
    Tsunoda reframe this traditional design paradigm in their 2019 paper “DeepInsight:
    A methodology to transform a non-image data to an image for convolution neural
    network architecture.”^([1](#Fn1)) The DeepInsight method is a pipeline to transform
    structured/tabular data (this does not bar sequential or text-based data, as long
    as it is framed in a structured data format) into image-based data, which is then
    used for training in a standard convolutional neural network.'
  prefs: []
  type: TYPE_NORMAL
- en: The first step of DeepInsight is to acquire a feature matrix that is used to
    map individual features in structured data to spatial coordinates in the corresponding
    image. This feature density matrix is used as a “template” to generate individual
    images for each individual vector. Each feature is associated with a pixel in
    the “template” matrix. This association is performed via a clever trick in which
    the data is *transposed* and used in dimensionality reduction via methods like
    Kernel PCA or t-Stochastic Neighbor Embedding. Traditionally, in a dataset of
    *n* samples and *d* features, dimensionality reduction to two spatial dimensions
    yields a dataset of *n* samples and two features. However, if we apply dimensionality
    reduction to the *transpose* of such a dataset, we treat each of the *d* features
    as a sample and each of the *n* samples as a feature, yielding a reduced dataset
    with *d* samples and two features. Thus, each of the *d* features has been mapped
    to a two-dimensional point in the “template” matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Using a transformation method like Kernel PCA and t-SNE that preserves local
    relationships, we can map features that behave similarly to one another to physically
    closer locations in the feature matrix (Figure [7-2](#Fig2)). This allows similar
    features in the generated images to be processed more efficiently by convolutions.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig2_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Mapping features into locations in the template matrix *m*. *g*[*i*] is used
    to indicate a particular feature. →^(*T*) indicates the transformation procedure
  prefs: []
  type: TYPE_NORMAL
- en: Once the “template” feature matrix has been established, we can create an image
    for an input vector by establishing a point in the image corresponding to the
    location allocated for that specific feature (Figure [7-3](#Fig3)). (You can observe
    from this that DeepInsight is designed on high-dimensional data; a high number
    of features is needed to populate the image since each point in the image is one
    feature.) In order to prevent redundancy in image representation, the convex hull
    algorithm is utilized to select the smallest rectangle consisting of all the data,
    cropping out unnecessary blank sides. The data is correspondingly rotated, and
    the space is mapped into pixel, image-based format, which can then be passed through
    a standard convolutional neural network.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig3_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-3
  prefs: []
  type: TYPE_NORMAL
- en: 'The DeepInsight pipeline: mapping vectors to pixel coordinates'
  prefs: []
  type: TYPE_NORMAL
- en: Sharma et al. use a model to process this structured turned image data that
    combines many of the previously discussed in this book. The architecture (shown
    in Figure [7-4](#Fig4)) used to process the images uses parallel representation
    with a cardinality of two, in which each of the branches is a simple linear stack
    of linear cells, which follow the standard convolutional pooling dynamic (with
    additional batch normalization and ReLU layers). The two branches are merged and
    processed for the classification output. The difference between the two branches
    lies in the filter size of image operations; by using an architecture that explicitly
    captures differently sized patterns within the image, the model is more effectively
    able to look for both broader patterns and smaller nuances simultaneously and
    combine the findings of these two perspectives to form a more accurate judgment.
    The number of cell repeats, filter sizes, learning rates, and other hyperparameters
    are tuned using Bayesian optimization.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig4_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-4
  prefs: []
  type: TYPE_NORMAL
- en: Architecture used for DeepInsight pipeline
  prefs: []
  type: TYPE_NORMAL
- en: 'The resulting DeepInsight pipeline performs very well on both genetic data,
    which the model was originally designed for, and other high-dimensional data contexts.
    Sharma et al. evaluate the method on five benchmark datasets: RNA-seq, a biological
    RNA sequence dataset from the NIH TCGA dataset; a subset from the TIMIT corpus,
    a speech dataset; the Relathe dataset, derived from news documents; the Madelon
    dataset, which is a synthetically constructed binary classification problem; and
    ringnorm DELVE, another synthetically constructed binary classification problem.
    These five datasets represent a wide array of problem contexts and data spaces;
    the DeepInsight method performs much better than other algorithms that have become
    successful staple methods in modeling structured/tabular datasets (Table [7-1](#Tab1)).
    See Figure [7-5](#Fig5) for a visualization on how DeepInsight generates meaningful
    visual representations across these datasets.'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig5_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-5
  prefs: []
  type: TYPE_NORMAL
- en: Visualization of image patterns mapped by DeepInsight. Differences in samples
    from Cancer, Text, and Vowel datasets are shown as the small patches in the middle
    columns. These differences are extracted by convolutional filters to perform more
    effective classification than another method
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-1
  prefs: []
  type: TYPE_NORMAL
- en: Performance of DeepInsight against other common methods for structured data
    with various datasets
  prefs: []
  type: TYPE_NORMAL
- en: '| Dataset | Decision Tree | AdaBoost | Random Forest | DeepInsight |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| RNA-seq | 85% | 84% | 96% | 99% |'
  prefs: []
  type: TYPE_TB
- en: '| Vowels | 75% | 45% | 90% | 97% |'
  prefs: []
  type: TYPE_TB
- en: '| Text | 87% | 85% | 90% | 92% |'
  prefs: []
  type: TYPE_TB
- en: '| Madelon | 65% | 60% | 62% | 88% |'
  prefs: []
  type: TYPE_TB
- en: '| Ringnorm DELVE | 90% | 93% | 94% | 98% |'
  prefs: []
  type: TYPE_TB
- en: 'We can reflect on key advantages of DeepInsight and its subversion of the traditional
    image-to-vector pipeline with respect to processing structured data:'
  prefs: []
  type: TYPE_NORMAL
- en: CNNs do not require any additional feature extraction techniques, which are
    often used for structured data. They automatically derive advanced and information-rich
    features from the raw input data without need for preprocessing via a series of
    convolutions and pooling. The nonlinear architecture of the model used to process
    the image aids in the development of advanced, rich representations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Convolutions process image data locally in a restricted subarea. This allows
    for greater network depth with a relatively small quantity of parameters, which
    spurs healthy network understanding and generalization. Such performance would
    be more difficult if using a fully connected network, in which building more depth
    to increase modeling power leads to a faster increase in parameters, risking overfitting,
    which neural networks trained on structured data are especially prone to.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The unique structure of the CNN allows it to run very efficiently, given recent
    hardware advancements like GPU utilization.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CNNs and the DeepInsight pipeline broadly are much more customizable/optimizable
    than standard algorithms like tree-based methods that have traditionally shown
    success in modeling structured data. Besides adjusting hyperparameters like the
    model architecture, the vector-to-template matrix mapping, the learning rate,
    among countless others, one can also easily use image augmentation methods to
    generate “new” image data. Such data augmentation is difficult to accomplish with
    tabular data because the structured format does not contain an inherent robustness
    due to the low dimensionality of its representation space relative to images;
    that is, while rotating an image should not affect the phenomenon it represents,
    altering structured data likely will.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In practice, DeepInsight should be a contributing member in an ensemble of other
    decision-making models. Combining the locality-specific nature of DeepInsight
    with the more global approach of other modeling methods will likely yield a more
    informed prediction.
  prefs: []
  type: TYPE_NORMAL
- en: To implement DeepInsight, we’ll be using code created by Sharma et al., which
    can be installed from the GitHub repository (Listing [7-1](#PC1)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The dataset we will use is the Mice Protein Expression Dataset from the infamous
    University of California Irvine Machine Learning Repository, which is a classification
    dataset with 1080 instances and 80 features modeling the expression of 77 proteins
    in the cerebral cortex of mice exposed to context fear conditioning. A cleaned
    version of the dataset is available in the source code for this book to be downloaded.
  prefs: []
  type: TYPE_NORMAL
- en: Assuming that the data has been loaded as a pandas DataFrame in the variable
    `data`, the first step is to separate into training and testing datasets, a standard
    procedure in machine learning (Listing [7-2](#PC2)). We’ll also need to convert
    the labels to one-hot format, which in their original organization are integers
    corresponding to a class. This can be accomplished easily using `keras.util`’s
    `to_categorical` function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We will need to use the `LogScaler` object from the DeepInsight library to scale
    the data between 0 and 1 using the L2 norm (Listing [7-3](#PC3)). We transform
    both the training dataset and the testing dataset, fitting the scaler on the training
    dataset only. All new data used for prediction by the DeepInsight model should
    pass through this scaler first.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The `ImageTransformer` object performs the image transformation by first generating
    the “template” matrix via a dimensionality reduction method passed into `feature_extractor`,
    which accepts either `'tsne'`, `'pca'`, or `'kpca'`. This method is used to determine
    a mapping of features in the input vector to an image of `pixels` dimensions.
    We can instantiate an ImageTransformer with Kernel PCA dimensionality reduction
    method to generate 32x32 images (`feature_extractor='kpca', pixels=32`) (Listing
    [7-4](#PC4)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Kernel PCA is used rather than t-SNE because of the relatively low dimensionality
    and quantity of the data. PCA is not employed because its linearity limits the
    nuance it captures. An image length of 32 pixels is chosen as a balance between
    making the generated images too sparse (too high an image length) and too small
    (too small an image length) to meaningfully and accurately represent spatial relationships
    between features. As image size decreases, the conception of distance in the DeepInsight
    pipeline – that is, the placement of features as pixels farther or closer to one
    another dependent on their similarity – becomes more approximated to the point
    of being arbitrary.
  prefs: []
  type: TYPE_NORMAL
- en: We can visualize the generated images of the ImageTransformer easily using `matplotlib.pyplot.imshow()`
    to get a feel for how dimensionality reduction method and image size influence
    the arrangement of the features and the likelihood of success (Figure [7-6](#Fig6)).
    The differences between images are subtle, but the distinguishing factors are
    identified and amplified by a series of convolutional operations. Note that the
    32x32 pixel space allows for a clustering of similar features and for less related
    features to be distanced farther away in a corner.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig6_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-6
  prefs: []
  type: TYPE_NORMAL
- en: Four example images generated from structured data using the DeepInsight method
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll build an architecture in a similar style to the two-branch cell design
    used in the DeepInsight paper, with three key adaptations: InceptionV3-style factorization/expansion
    of filters, dropout in cells, and a longer fully connected component (Listing
    [7-5](#PC5)). These aid to develop more specific filters with smaller areas to
    better parse densely packed features, further aid generalization by preventing
    overfitting, and better process derived features, respectively. One branch processes
    images with a kernel of size (2,2), and the other uses a kernel of size (5,5)
    (with additional factorization, e.g., 5x1 and 1x5).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The model, when compiled and trained on the data for several dozen epochs, yields
    almost perfect training and accuracy *and* test accuracy (Listing [7-6](#PC6)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: By expanding the data type with which convolutional and other image-based images
    can reach to structured data, DeepInsight bridges entire regions of deep learning
    and, in this case, has yielded an incredibly successful model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Corrupted Data: Negative Learning with Noisy Labels'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Improperly labeled data is more prevalent than we would like to think, especially
    in the context of annotated datasets, in which samples are manually labeled by
    human annotators that often move quickly and can make mistakes. Alternatively,
    adversarial attacks may be conducted on datasets that switch the labels of certain
    training items to maximally derail neural network performance. Since data that
    does not model the phenomena it represents faithfully yields in a model that does
    not properly model the phenomena it is trained to, often overfitting and developing
    “confused” representations (i.e., GIGO (Garbage In, Garbage Out)), there is a
    need for developing methods to handle data with corrupted labels that does not
    entail manually searching through the entire dataset to correct them.
  prefs: []
  type: TYPE_NORMAL
- en: Youngdong Kim, Junho Yim, Juseung Yun, and Junmo Kim propose a novel, simple
    but successful learning pipeline to deal with corrupted labels.^([2](#Fn2)) Their
    approach reframes the traditional approach to multiclass image classification
    tasks, *positive learning*, in which the neural network is “taught” to associate
    an image with a label – that is, this image *is* a [label]. *Negative learning*
    , on the other hand, is when the neural network is “taught” to *not* associate
    an image with a label – that is, this image is *not* a [label] (Figure [7-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig7_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-7
  prefs: []
  type: TYPE_NORMAL
- en: Visual difference between positive learning and negative learning
  prefs: []
  type: TYPE_NORMAL
- en: 'In a multiclass context, negative learning is an indirect method of learning.
    Several negative learning associations must be learned to be equivalent to one
    positive learning association. For instance, if we are training a model to classify
    MNIST-style digits from 0 to 9, to represent the knowledge that some image represents
    the digit “3,” we would need nine negative learning associations: that image is
    *not* the digit “0,” that image is *not* the digit “1,” …, that image is *not*
    the digit “9.” The point of negative learning in this context, though, is not
    to equivalently represent positive learning because we know that many of the positive
    learning associations have been corrupted.'
  prefs: []
  type: TYPE_NORMAL
- en: Suppose we are training a model on a multiclass problem with *k* classes. Rather
    than using positive learning by associating some training input *x* with a positive
    label *y*[*p*], which we know may be corrupted, we randomly select one of the
    *k* − 1 other classes to use as a negative label *y*[*n*]. If the original positive
    label *was* corrupted (i.e., *y*[*p*] does not match *x*), then there is a ![$$
    1-\frac{1}{k-1} $$](../images/516104_1_En_7_Chapter/516104_1_En_7_Chapter_TeX_IEq1.png)
    probability that a randomly selected negative label is true – only one of the
    other *k* − 1 negative labels is false when applied to *x* because it is the positive
    label. As *k* increases, the probability that a randomly selected negative label
    is true grows closer to 1\. For modern datasets, with *k* = 100 or even *k* = 1000,
    the probability that a negative label is incorrect is negligible. On the other
    hand, if the original positive label is *not* corrupted (i.e., it is correct),
    then there is a 100% chance that a randomly selected alternative negative label
    is true.
  prefs: []
  type: TYPE_NORMAL
- en: Training a model on negative labels necessitates a different loss function.
    Suppose the true one-hot vector for a five-class classification problem is [1,
    0, 0, 0, 0] (i.e., the negative label is the class index 0 represents) and the
    prediction is [0.3, 0.4, 0.2, 0.0, 0.1]. Our loss function does not need to consider
    predictions for classes other than the negative label. All we care about is that
    the model's prediction for the class at index 0 (the 0.3 prediction) decreases
    toward zero, because we want the model to be as least confident as possible with
    respect to that class. Rather than increasing the probability of the correct class,
    the model is trained to minimize the confidence of a randomly selected incorrect
    class (i.e., corresponding to the negative label).
  prefs: []
  type: TYPE_NORMAL
- en: Besides ensuring an increased truthfulness of the labels, this method of negative
    learning discourages overfitting to the noisy data by introducing associations
    via indirect associations. In a sufficiently large dataset, these indirect associations
    learned via negative learning compound together to form knowledge comparable to
    that of positive learning (if the labels weren’t corrupted). Evidence of lack
    of overfitting is demonstrated by comparing the probability distribution of confidences
    for models trained on positive learning and negative learning – a model trained
    with negative learning is less confident and more accurately identifies corrupted
    examples (Figure [7-8](#Fig8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig8_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-8
  prefs: []
  type: TYPE_NORMAL
- en: 'Left: two probability distributions representing model confidence in datasets
    (left, orange: corrupted data; right, blue: uncorrupted data) with just positive
    learning. Right: with just negative learning'
  prefs: []
  type: TYPE_NORMAL
- en: To improve upon convergence, the authors introduce *selective negative learning*
    (SelNL) , in which the convolutional neural network is trained further only on
    data with which the model predicts a label with a confidence larger than ![$$
    \frac{1}{k} $$](../images/516104_1_En_7_Chapter/516104_1_En_7_Chapter_TeX_IEq2.png)
    (larger than chance). This means that negative labels that may be incorrect contradict
    the learned knowledge of other correct negative labels and thus can be filtered
    out of the training dataset. SelNL helps the model both become more confident
    and more accurately separate the probability distributions of corrupted vs. uncorrupted
    data (Figure [7-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig9_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-9
  prefs: []
  type: TYPE_NORMAL
- en: 'Two probability distributions representing model confidence in datasets (left,
    orange: corrupted data; right, blue: uncorrupted data) with *NL* → *SelNL*'
  prefs: []
  type: TYPE_NORMAL
- en: Kim et al. introduce another training paradigm, *selective positive learning*
    (SelPL) , on the basis that positive learning is faster and more accurate than
    negative learning given correct labels. Now that the negative learning and selective
    negative learning paradigm has allowed for a more or less accurate separation
    of corrupted and uncorrupted data, we can filter out data with which the model
    predicts with a confidence less than *γ*. Data that passes this threshold requirement
    are considered to be clean, and the *positive labels* for the clean data are used
    for further training on the network.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of this pipeline – *NL* → *SelNL* → *SelPL*, termed the SelNLPL pipeline
    – the model is able to clearly separate corrupted and uncorrupted data, attaching
    a low probability to the former and a high probability to the latter (Figure [7-10](#Fig10)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig10_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-10
  prefs: []
  type: TYPE_NORMAL
- en: 'Two probability distributions representing model confidence in datasets (left,
    orange: corrupted data; right, blue: uncorrupted data) with *NL*→ *SelNL*→ *SelPL*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that the network’s transition from negative learning to positive learning
    in the *SelNL* → *SelPL* phase may seem to be jarring but has been empirically
    observed to be smooth. The network needs only to rearrange and reformat the knowledge
    it has already obtained to acclimate to the positive learning regime. This is
    demonstrated by the training curve of the model as it is trained in various stages:
    negative learning, selective negative learning, and selective positive learning
    (Figure [7-11](#Fig11)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig11_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-11
  prefs: []
  type: TYPE_NORMAL
- en: Performance across the *NL* → *SelNL* → *SelPL* pipeline
  prefs: []
  type: TYPE_NORMAL
- en: This model’s filtering capabilities can be used not only to identify corrupted
    data but also to correct it. A new classification network is trained on the clean
    dataset (the set of data that has been identified by the previous model not to
    be corrupted). It then predicts the labels of the corrupted data to update their
    labels. The entire datasets – both the originally uncorrupted and the updated
    data – are used to train a final classification network. The final classification
    network has access to a corrected, almost completely truthful dataset (Figure
    [7-12](#Fig12)). Thus, it can more faithfully model the phenomena the data represents.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig12_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-12
  prefs: []
  type: TYPE_NORMAL
- en: Complete NLNL pipeline – SelNLPL pipeline to separation in noisy and clean data
    to label updating to final model classification
  prefs: []
  type: TYPE_NORMAL
- en: This pipeline achieves state-of-the-art performance in the realm of addressing
    data corruption, performing better than other data corruption methods across a
    wide span of models and datasets (Table [7-2](#Tab2)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Performance of NLNL pipeline against other methods
  prefs: []
  type: TYPE_NORMAL
- en: '| Dataset | Model | Method | Noise Level Performance |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|   |   | 20% | 40% | 60% |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| FashionMNIST | ResNet18 | CEMAETruncated *L*[*q*]NLNL | 93.2480.3993.21**94.82**
    | 92.0979.3092.60**94.16** | 90.2982.4191.56**92.78** |'
  prefs: []
  type: TYPE_TB
- en: '| CIFAR-10 | ResNet14 | CEBootstrap – softBootstrap – hardNLNL | 83.784.383.6**89.85**
    | –––– | –––– |'
  prefs: []
  type: TYPE_TB
- en: '| ResNet34 | CEMAETruncated *L*[*q*]NLNL | 86.9883.7289.70**94.23** | 81.8867.0087.62**92.43**
    | 74.1464.2182.70**88.32** |'
  prefs: []
  type: TYPE_TB
- en: '| CIFAR-100 | ResNet34 | CEMAETruncated *L*[*q*]NLNL | 58.7215.8067.61**71.52**
    | 48.209.0362.64**66.39** | 37.417.7454.04**56.51** |'
  prefs: []
  type: TYPE_TB
- en: '| MNIST | LeNet | CEBoot – hardBoot – softD2LNLNL | 88.0287.6988.5098.84**99.35**
    | 68.4669.4970.1998.49**99.27** | 45.5150.4546.0494.73**98.91** |'
  prefs: []
  type: TYPE_TB
- en: By reframing the traditional positive learning paradigm as negative learning
    and then using it to build a complete learning and filtering pipeline, the Negative
    Learning for Noisy Labels method cleverly solves the difficult problem of corrupted
    labels.
  prefs: []
  type: TYPE_NORMAL
- en: We will be implementing a slightly revised/simplified version of the NLNL pipeline
    proposed by Kim et al. We will use the CIFAR-10 dataset, which contains several
    thousand 32x32 pixel images from ten different classes of animals and transportation.
    This dataset can be loaded directly from Keras datasets (Listing [7-7](#PC7)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: First, we need to inject noise into the dataset (Listing [7-8](#PC8)). We will
    do this simply by randomly switching a certain subset of labels to another different
    label. A subset of indices are initially randomly selected via numpy’s random
    choice function and will be used to determine which data instances will be corrupted.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: To perform the corruption (Listing [7-9](#PC9)), we can loop through each of
    the randomly selected indices. For each one, we generate a list of possible indices
    (all classes except for the true class) and randomly choose from this set of possibilities.
    These changes are made to `cy_train`, designated to store the corrupted *y* labels
    for training. This should be created with `cy_train = np.copy(y_train)` rather
    than `cy_train = y_train`. In the latter method, the two variables are still entangled
    and any changes to cy_train will appear in `y_train`. By explicitly copying over
    the variables, we “disentangle” the two.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: In this configuration, 20% of the labels have been corrupted. Generating negative
    labels for the entire dataset (Listing [7-10](#PC10)) is relatively similar to
    corrupting the data. We choose a label other than the label currently associated
    with each training item and use it as the randomly selected *negative label* for
    that item. Negative labels are stored in the `ny_train` variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The first phase of the NLNL pipeline is to perform negative learning. We will
    use a standard EfficientNetB3 model with no architecture modification for simplicity
    (Listing [7-11](#PC11)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Recall that we need a specialized loss function to train negative learning with.
    We want to decrease the model’s confidence that the training item belongs in the
    class corresponding to the negative label. If we instead adopt an alternative
    approach of maximizing the model’s confidence that the training item is associated
    with the class corresponding to the negative label and then perform post-processing
    negation (e.g., the class with the lowest confidence is the true class), which
    on the surface seems identical, we run into the problem of forcing the model to
    learn a fundamentally random phenomenon – which negative label was randomly selected,
    encouraging overfitting and poor performance.
  prefs: []
  type: TYPE_NORMAL
- en: The general cross-entropy loss equation is, in simple form, *l*(*y*[*t*], *y*[*p*]) =  − *y*[*t*] ·  *log* (*y*[*p*])
    (averaged across all *y*[*t*] − *y*[*p*] training pairs), where *y*[*t*] is the
    true label and *y*[*p*] is a set of probabilistic predictions. This loss function
    seeks to maximize the model’s confidence of the true class. This correspondingly
    decreases the confidences of other classes for the same training item, because
    the softmax output ensures all probabilities sum to 1.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, because we want to *minimize* the model’s confidence in the negative
    label class, we instead use (*y*[*t*], *y*[*p*]) =  − *y*[*t*] ·  *log* (1 − *y*[*p*]).
    The only difference is that the prediction *y*[*p*] is replaced with 1 − *y*[*p*]
    such that a higher confidence for the negative label is punished.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing custom loss functions like this in Keras is simple; we define a
    function that takes in `y_true` and `y_pred` and returns the average loss across
    items using Keras/TensorFlow backend-style functions (Listing [7-12](#PC12)).
    Because logarithms return NaN when their input is 0, we make sure to use TensorFlow’s
    `tf.clip_by_value` to ensure that the input is, at its minimum, `1e-5` (or some
    other arbitrary epsilon value). `tf.reduce_mean` averages the cross-entropy losses
    of all the items; passing `axis=-1` ensures this. We also make sure to cast `y_true`
    and `y_pred` as float 32 to prevent future type problems.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The model can then be compiled with our special loss and fitted with the negative
    labels (Listing [7-13](#PC13)). Note that the labels in their current form are
    not one-hot encoded; we took advantage of this to make label processing when adding
    noise and generating negative labels more convenient. Normally, we could pass
    in integer-style labels for multiclass problems and use the “`sparse_categorical_crossentropy`”
    loss, which automatically converts the labels to one-hot representation before
    performing categorical cross-entropy. Because our custom loss function was not
    built with this functionality, the labels are converted into one-hot form with
    `keras.utils.to_categorical` manually for compatibility with the loss function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Note that extensive training is required in each stage for each model version
    to develop sufficient knowledge representations; insufficient training in one
    stage will stunt the development of the following stages. This is something to
    watch out for in all non-end-to-end multi-stage pipeline designs.
  prefs: []
  type: TYPE_NORMAL
- en: The second stage of the pipeline is to perform *selective negative learning*
    – further negative learning to filter out initial problematic inputs (Listing
    [7-14](#PC14)). While there are many possible filters to determine which data
    is problematic or not, for simplicity, we will select training items with which
    the confidence associated with the positive label is larger than ![$$ \frac{1}{10}
    $$](../images/516104_1_En_7_Chapter/516104_1_En_7_Chapter_TeX_IEq3.png). This
    method begins to filter out corrupted data, which is likely to yield a probability
    below chance. We can select this subset of data by creating a Boolean mask and
    applying it to `x_train` and `ny_train` to create `selnl_x_train` and `selnl_y_train`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: We can continue to train the model on the updated data (Listing [7-15](#PC15)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: The third stage of the pipeline is the transition toward *selective positive
    learning* (Listing [7-16](#PC16)). Selecting data to use in selective positive
    learning is similar to selecting data for selective negative learning, but we
    want to use an even more stringent criteria here to ensure that the model is being
    trained on uncorrupted labels. We will include only data points with which the
    model assigns at least a 40% confidence to the positive label class. Note that
    the labels (`selpl_y_train`) are taken from `cy_train` – the corrupted positive
    learning labels, not the negative learning ones.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Because we are switching from a negative learning paradigm to a positive learning
    one, we need to change the loss function such that a higher confidence of the
    class indicated in the label is rewarded rather than punished. This can be performed
    by recompiling the model, which still retains its weights (Listing [7-17](#PC17)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: After the SelNLPL pipeline has been completed, this model can be used to separate
    the dataset into corrupted and uncorrupted datasets (Listing [7-18](#PC18)). Corrupted
    data is more likely to have a low confidence for the assigned positive label,
    whereas uncorrupted data is more likely to have a high confidence. We can make
    this threshold 50% to separate into corrupted and uncorrupted data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Now that a clean dataset has been identified, a new model is trained on the
    clean labels (Listing [7-19](#PC19)). In this case, it is identical to the model
    used in the previous SelNLPL pipeline, but it doesn’t have to be.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: This model’s prediction is used to correct the labels (Listing [7-20](#PC20)).
    We can extract the integer labels from the model’s probabilistic predictions by
    identifying the index of the maximum probability in each prediction with `np.where()`.
    The set of originally unclean, now cleaned, data is fitted into a numpy array
    and reshaped into the desired shape.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: The two datasets can now be concatenated together into a final clean dataset,
    which can be used to train a final model (Listing [7-21](#PC21)).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Keeping track of data and models throughout this pipeline can be arduous, but
    organization is important to prevent mistakes. Mistyping a variable name can lead
    to a model being trained on the incorrect dataset, which will result in either
    deceivingly amazing results or frustratingly poor ones.
  prefs: []
  type: TYPE_NORMAL
- en: The NLNL pipeline demonstrates how an initial reframing can be developed into
    a complete pipeline taking on a difficult problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'Limited Data: Siamese Networks'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep learning applications are famously data hungry. A modern neural network
    often needs to consume and process thousands of data instances per class to obtain
    a strong representation and understanding of the primary features and attributes
    associated with that class. Throughout this book, we have explored various methods
    to decrease the raw amount of new data required for successful training of neural
    networks. Image augmentation can provide “new data” that the model has not seen
    before in that exact form. Transfer learning allows for feature extraction skills
    to be transferred from one general dataset to a more specific dataset, where a
    smaller dataset can be used to fine-tune/adapt the skills toward a specific context.
    Self-supervised learning accustoms the model to the fundamental relationships
    and features of the dataset before it is ever exposed to labels. If you were up
    to it, you could even train a variational autoencoder to generate new data to
    increase the dataset size. While these methods are effective in dealing with *small
    datasets*, they too have trouble with very small datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '*Few-shot learning* is a field of machine learning and deep learning that has
    recently risen in importance as applications with a high number of classes but
    few training examples in each class become more important. Think, for instance,
    of facial recognition models built into applications like face-based logins to
    phones – the model must be able to verify that your face belongs to you but recognize
    that your face does not belong to one of the many other possible people that exist.
    It must do so with very high performance – a model with a 95% accuracy used in
    login applications is not secure enough – and with very few training examples
    – it’s not a good user experience if the user needs to generate hundreds of training
    examples!'
  prefs: []
  type: TYPE_NORMAL
- en: An even more extreme study within few-shot learning is that of *one-shot learning*.
    One-shot learning is concerned with classification of inputs given only one instance
    of each class. For instance, if we are training a model to identify animals under
    a one-shot regime, the dataset would be comprised of one image from each class
    (a dog, a cat, a horse, a chicken, etc.) and the model would be expected to generalize
    all instances of that class from the one image representing the class it was provided.
    This is, of course, a very difficult task. Advances in one-shot learning and few-shot
    learning generally, however, have the potential to work toward closing the gap
    between deep learning and the human mind, which is notably able to generalize
    concepts and ideas from a much smaller set of instances.
  prefs: []
  type: TYPE_NORMAL
- en: Early work in one-shot learning by Li Fei-Fei et al. in the early 2000s used
    a variational Bayesian framework relying on the principle that previously learned
    classes can be used to predict future ones with few examples from the given classes.
    Later work by Lake et al. in 2013 proposed the *Hierarchical Bayesian Program
    Learning* method, which can learn drawn figures (i.e., assemblages of lines, curves,
    and dots) by systematically deconstructing the image and proposing structural
    explanations for observed pixels. Even through the increasing usage of convolutional
    neural networks, the most promising approaches to one-shot learning have not used
    the conventional convolutional neural network architecture but instead have relied
    upon some level of domain knowledge to fill the knowledge void left by the lack
    of training data. For instance, if a model is trained to classify MNIST-style
    digits (10 classes, from 0 to 9), we can build knowledge of the data’s structure
    – line composition, discriminative features, etc. – into the design of the system,
    like HBPL does.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, an even further challenge on top of one-shot image recognition is to make
    a step toward *universal one-shot learning* , in which a system can automatically
    develop knowledge representations from one-shot datasets in all sorts of problem
    domains (i.e., not needing domain knowledge to be implicitly encoded in the design
    of the system).
  prefs: []
  type: TYPE_NORMAL
- en: Gregory Koch, Richard Zemel, and Ruslan Salakhutdinov work toward addressing
    this challenging problem by reframing the problem of one-shot image *classification*
    to a problem of *similarity* in their 2015 paper “Siamese Neural Networks for
    One-Shot Image Recognition.”^([3](#Fn3)) Rather than trying to represent each
    class’s features by its own – abstract features floating in a sparse knowledge
    space – we force the model to learn relationships between the classes, such that
    knowledge of one class is grounded in knowledge of others. This method allows
    for a more stable, reliable, and abundant construction of understanding.
  prefs: []
  type: TYPE_NORMAL
- en: 'Say that you are presented with an apple, an orange, and a grape for the first
    time. You are told that you must develop knowledge representations of these three
    entities and apply them when presented to a new object (i.e., recognize if a new
    object is an apple, an orange, or a grape). You could develop a long list of the
    features characterizing each object: the apple is round – almost spherical, but
    slightly oblong – red, with a stem on the top, and a relatively hard exterior.
    The orange is round – almost spherical, but slightly oblong – orange, with a stub
    on top, and a soft but firm exterior. The grape is round and small – almost spherical,
    but slightly oblong – purple, with a small stem on top, and a thin, papery exterior.'
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two key problems with this sort of knowledge representation: firstly,
    there is evident redundancy in our features that are not relevant for discrimination
    between the classes. All the objects are round – almost spherical, but slightly
    oblong, and thus this feature can be discarded because it provides no information
    for the purposes of classification. Secondly, it relies upon the construction
    of attributes that are very difficult to come to by themselves. What counts as
    “soft,” for instance, is made meaningful only by the existence of a “hard” object.
    Likewise, color is meaningful only when contrasted with other colors. Thus, it
    is impractical to represent knowledge with such few items per class as an identification
    of various qualities of each class independently.'
  prefs: []
  type: TYPE_NORMAL
- en: Rather, we design our method of knowledge representation to capture similarities
    and differences between each of the items – we are making explicit what is implicit
    and shoved under the carpet in the previous form of knowledge representation.
    The orange and the apple are similar in size, whereas the grape is different.
    The orange, the apple, and the grape are all different in color and in texture.
    The apple and the grape are similar in the quality of having a stem, whereas the
    orange has a small stub. These qualities have more meaning because we explicitly
    represent them as a similarity or difference between objects exemplifying those
    qualities. Thus, we are able to develop a more stable representation of this knowledge;
    it is grounded in relationships. When we are presented with a new object, we compare
    it with each of the previously seen items and assign the object the class of whatever
    item it is deemed most similar to.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another perhaps more familiar example: if you have ever been confused by when
    to use “who” and “whom” and looked it up online, you will likely have found two
    answers. One usually goes along the lines of “who refers to the subject of a sentence;
    whom refers to the object of a verb or preposition.” The other is “use ‘who’ when
    you can substitute it with ‘he’ or ‘she’; use ‘whom’ if you can substitute it
    with ‘him’ or ‘her’. ” The first approach attempts to define the usage of this
    new concept – who vs. whom – in explicit, non-relational, grammatical terms, using
    objective pillars of language to support new syntax understanding. The other is
    relational, taking advantage of other ideas in the contextual space to establish
    an understanding of this new one. While the former may be more academic and formal,
    the latter is usually more effective.'
  prefs: []
  type: TYPE_NORMAL
- en: In the Siamese network system proposed by Koch et al., a network is trained
    to classify whether two inputs are the same or not (Figure [7-13](#Fig13)). As
    this is technically a binary classification problem, the network outputs the probability
    that two inputs belong to the same class.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig13_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-13
  prefs: []
  type: TYPE_NORMAL
- en: Reframing the classification problem paradigm into one of similarity for one-shot
    learning. In this case, the network is shown multiple images from the same class;
    that is, few-shot learning. One-shot learning is generally performed via image
    augmentation
  prefs: []
  type: TYPE_NORMAL
- en: The model is trained on these *verification tasks* . Note that because verification
    tasks are constructed from pairs of data, we can also expand the size of the dataset
    because one data instance for training the Siamese network is constructed from
    every pair of data instances. After training, the model predicts the similarity
    between a test input and every training instance. The class of the training instance
    with the highest probability of belonging to the same class as the test input
    is deemed the class of the test input. Note that this paradigm works both in one-shot
    classification and in few-shot classification.
  prefs: []
  type: TYPE_NORMAL
- en: In order to realize this concept, the *Siamese network* architecture is used
    (Figure [7-14](#Fig14)). Like Siamese twins, the network has two heads to take
    in the two inputs. The two inputs are processed separately in parallel with one
    another to extract key features required for comparison. These two parallel branches
    are entangled by *weight sharing* , in which (recall from Chapter [5](516104_1_En_5_Chapter.xhtml),
    Efficient Neural Architecture Search case study) weights across different parts
    of the network are the same and updated identically. This weight sharing ensures
    that the order of input does not matter and that both inputs are processed in
    the same manner. After the inputs have been processed in parallel, their encoded
    features are compared via a distance layer, which computes the distance between
    the encoded representation. This distance is then further processed via an output
    layer to yield the final probability/similarity.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig14_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-14
  prefs: []
  type: TYPE_NORMAL
- en: Simplified Siamese network architecture
  prefs: []
  type: TYPE_NORMAL
- en: The Siamese network design used by Koch et al. uses the standard sequence of
    alternating convolution and pooling operations (Figure [7-15](#Fig15)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_7_Chapter/516104_1_En_7_Fig15_HTML.jpg](../images/516104_1_En_7_Chapter/516104_1_En_7_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7-15
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional branch of the Siamese network used in the original paper by Koch
    et al.
  prefs: []
  type: TYPE_NORMAL
- en: The Siamese network system performs well in multiple contexts. Consider, for
    instance, the Omniglot dataset (Figure [7-16](#Fig16)), which contains images
    of characters in various alphabets – Aurek-Besh, Greek, Hebrew, Korean, Latin,
    Malay, etc. The convolutional Siamese network performs better than almost all
    other algorithms and models in one-shot learning on the Omniglot dataset (Table
    [7-3](#Tab3)).
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-3
  prefs: []
  type: TYPE_NORMAL
- en: Comparison of Siamese network method against other one-shot learning methods
  prefs: []
  type: TYPE_NORMAL
- en: '| Method | One-Shot Test Acc. |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Humans | 95.5% |'
  prefs: []
  type: TYPE_TB
- en: '| Hierarchical Bayesian Program Learning | 95.2% |'
  prefs: []
  type: TYPE_TB
- en: '| Affine model | 81.8% |'
  prefs: []
  type: TYPE_TB
- en: '| Hierarchical deep | 65.2% |'
  prefs: []
  type: TYPE_TB
- en: '| Deep Boltzmann machine | 62.0% |'
  prefs: []
