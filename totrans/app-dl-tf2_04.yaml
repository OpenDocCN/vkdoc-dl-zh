- en: Weight distribution comparison between the model without the *ℓ*[1] regularization
    term (*λ* = 0.0, light gray) and with *ℓ*[1] regularization (*λ* = 3.0, dark gray)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 没有使用 *ℓ*[1] 正则化项（*λ* = 0.0，浅灰色）和使用了 *ℓ*[1] 正则化（*λ* = 3.0，深灰色）的模型之间的权重分布比较
- en: As you can see, *ℓ*[1] regularization has the same effect as *ℓ*[2]. It reduces
    the effective complexity of the network, reducing many weights to zero.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，*ℓ*[1] 正则化与 *ℓ*[2] 有相同的效果。它降低了网络的有效复杂度，将许多权重降至零。
- en: To give you an idea of how effective regularization is in reducing the weights,
    Table [4-2](#Tab2) compares the percentage of weights less than 10^(−3) with and
    without regularization after 1000 epochs.
  id: totrans-154
