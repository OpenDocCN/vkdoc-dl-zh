- en: 4. Regularization
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 正则化
- en: 'This chapter explains a very important technique often used when training deep
    networks: *regularization*. We look at techniques such as the *ℓ*[1] **and** *ℓ*[2]
    **methods**, dropout, and early stopping. You learn how these methods help prevent
    the problem of overfitting and help you achieve much better results from your
    models when applied correctly. We look at the mathematics behind the methods and
    at how to implement them correctly in Python and Keras.'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 本章解释了在训练深度网络时经常使用的一个非常重要的技术：*正则化*。我们探讨了*ℓ*[1] **和** *ℓ*[2] **方法**、dropout和提前停止等技术。您将学习这些方法如何帮助防止过拟合问题，并在正确应用时帮助您从模型中获得更好的结果。我们探讨了这些方法背后的数学原理，以及如何在Python和Keras中正确实现它们。
- en: Complex Networks and Overfitting
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 复杂网络和过拟合
- en: In the previous chapters, you learned how to build and train complex networks.
    One of the most common problems you will encounter when using complex networks
    is overfitting. In this chapter, we face an extreme case of overfitting and discuss
    a few strategies to avoid it. A perfect dataset for studying this problem is the
    Boston housing price dataset [1].
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，您学习了如何构建和训练复杂网络。当使用复杂网络时，您将遇到的最常见问题之一是过拟合。在本章中，我们面对一个过拟合的极端案例，并讨论了一些避免它的策略。研究此问题的完美数据集是波士顿房价数据集[1]。
- en: 'This dataset contains information collected by the U.S. Census Bureau concerning
    housing around the Boston area. Each record in the database describes a Boston
    suburb or town. The data was drawn from the Boston Standard Metropolitan Statistical
    Area (SMSA) in 1970\. The attributes are defined as follows:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据集包含美国人口普查局收集的有关波士顿地区住房的信息。数据库中的每条记录描述了一个波士顿郊区或城镇。数据来自1970年的波士顿标准大都市统计区（SMSA）。属性定义如下：
- en: 'CRIM: Per capita crime rate by town'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CRIM：城镇的人均犯罪率
- en: 'ZN: Proportion of residential land zoned for lots over 25,000 square feet'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ZN：住宅土地中划为超过25,000平方英尺地块的比例
- en: 'INDUS: Proportion of non-retail business acres per town'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: INDUS：每个城镇非零售商业地块的比例
- en: 'CHAS: Charles River dummy variable (1 if tract bounds river; 0 otherwise)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CHAS：查尔斯河虚拟变量（如果地块边界是河流则为1，否则为0）
- en: 'NOX: Nitric oxides concentration (parts per 10 million)'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NOX：每千万分之一氧化氮浓度
- en: 'RM: Average number of rooms per dwelling'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RM：每套住宅的平均房间数
- en: 'AGE: Proportion of owner-occupied units built prior to 1940'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AGE：1940年之前建造的业主自住单元的比例
- en: 'DIS: Weighted distances to five Boston employment centers'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: DIS：到五个波士顿就业中心的加权距离
- en: 'RAD: Index of accessibility to radial highways'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAD：到达放射状高速公路的指数
- en: 'TAX: Full-value property-tax rate per $10,000'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TAX：每$10,000的全值财产税税率
- en: 'PTRATIO: Pupil-teacher ratio by town'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PTRATIO：城镇的师生比例
- en: '*B* − 1000(*B*[*k*] − 0.63)² − *B*[*k*]: Proportion of African Americans by
    town'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*B* − 1000(*B*[*k*] − 0.63)² − *B*[*k*]：城镇非洲裔美国人的比例'
- en: 'LSTAT: % lower status of the population'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LSTAT：人口中低地位百分比
- en: 'MEDV: Median value of owner-occupied homes in $1000s'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MEDV：业主自住房屋的中值（以千美元为单位）
- en: Let’s get the data
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们获取数据
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: and then import the dataset
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然后导入数据集
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The dataset has 13 features (contained in the `features` NumPy array) and the
    house price is contained in the `target` NumPy array. To normalize the features,
    we use this function
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 该数据集有13个特征（包含在`features` NumPy数组中）和房价包含在`target` NumPy数组中。为了归一化特征，我们使用此函数
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: To conclude the dataset preparation, we normalize it and then create a training
    and a dev dataset
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完成数据集的准备，我们对其进行归一化，然后创建一个训练集和一个dev集
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The `np.random.seed(42)` is there so that you will always get the same training
    and dev dataset (so the results are reproducible).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.random.seed(42)`的存在是为了确保您总是得到相同的训练集和dev集（因此结果是可重复的）。'
- en: 'Then we build a complex neural network with four layers and 20 neurons for
    each layer. To build it, we define this function to build each layer, train the
    model, and validate it against the dev dataset:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们构建了一个具有四层和每层20个神经元的复杂神经网络。为了构建它，我们定义了这个函数来构建每一层，训练模型，并使用dev数据集进行验证：
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: This function builds and trains a feed-forward neural network model and evaluates
    it on the training and dev sets. You learned about feed-forward neural networks
    implementation in the last chapter so you should now understand what it does.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数构建并训练了一个前馈神经网络模型，并在训练集和dev集上对其进行评估。您在上章学习了前馈神经网络实现，因此现在应该理解它所做的工作。
- en: We use the He initialization here, since we will use ReLU activation functions.
    In the output layer, we have one neuron with the identity activation function
    for regression (remember that, in Keras, when you do not specify an activation
    function, the default one will be the identity function). Additionally, we use
    the Adam optimizer.^([1](#Fn1))
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里使用He初始化，因为我们将会使用ReLU激活函数。在输出层，我们有一个具有恒等激活函数的单个神经元用于回归（记住，在Keras中，当你没有指定激活函数时，默认的激活函数将是恒等函数）。此外，我们使用Adam优化器.^([1](#Fn1))
- en: Now let’s run the model with this code
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们用这段代码运行模型。
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: As you may notice, to make things simpler, we avoided writing a function with
    many input parameters and simply hard-coded all the values in the body function
    (as for the learning rate, for example), since in this case we do not need to
    tune the parameters very much. Moreover, we are not using mini-batches here, since
    we only have a few hundred observations.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所注意到的，为了使事情更简单，我们避免编写具有许多输入参数的函数，并在函数体中直接硬编码所有值（例如，对于学习率），因为在这种情况下我们不需要调整参数很多。此外，我们在这里没有使用小批量，因为我们只有几百个观测值。
- en: We are calculating the MSE for the training and dev datasets, as the typical
    cost function for linear regression problems. This way, we can check what is happening
    on both datasets at the same time. If you let the code run and plot the two MSEs—one
    for the training indicated with *MSE*[*train*] and one for the dev dataset indicated
    with *MSE*[*dev*]—you get Figure [4-1](#Fig1).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在计算训练集和开发集的均方误差（MSE），作为线性回归问题的典型损失函数。这样，我们可以同时检查两个数据集上发生的情况。如果你让代码运行并绘制两个MSE图——一个用于表示训练集的*MSE*[*train*]，另一个用于表示开发集的*MSE*[*dev*]——你会得到图[4-1](#Fig1)。
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig1_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig1_HTML.jpg)'
- en: Figure 4-1
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-1
- en: The MSE for the training (continuous line) and the dev dataset (dashed line)
    for the neural network with four layers, each with 20 neurons
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有四个层，每层20个神经元的神经网络，训练集（连续线）和开发集（虚线）的MSE。
- en: Note how the training error goes to zero, while the dev error reaches a value
    of about 10 and then it starts increasing to a value of about 15, after dropping
    rapidly at the beginning. If you remember our basic error analysis introduction,
    you should know that this means that you are in a regime of *extreme overfitting*
    (when *MSE*[*train*] ≪ *MSE*[*dev*]). The error on the training dataset is practically
    zero, while the one on the dev dataset is not. The model cannot generalize at
    all when applied to new data. Figure [4-2](#Fig2) shows the predicted value plotted
    versus the real value. Note how in the left plot, for the training data, the prediction
    is almost perfect, while on the plot on the right, for the dev dataset, it’s not
    that good. Recall that a perfect model will give you predicted values exactly
    equal to the measured ones. So, when plotting one versus the other, they would
    all lie on the 45-degree line in the plot, as is happening in the left plot in
    Figure [4-2](#Fig2).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，训练误差降至零，而开发误差达到大约10的值，然后开始增加到大约15，在开始时迅速下降。如果你还记得我们基本误差分析介绍，你应该知道这意味着你处于*极端过拟合*状态（当*MSE*[*train*] ≪ *MSE*[*dev*]）。训练数据集上的误差实际上为零，而开发数据集上的误差不是。当应用于新数据时，模型根本无法泛化。图[4-2](#Fig2)显示了预测值与真实值的关系图。注意，在图[4-2](#Fig2)的左图中，对于训练数据，预测几乎完美，而在右边的图中，对于开发集，预测并不那么好。回想一下，一个完美的模型将给出与测量值完全相同的预测值。因此，当将一个与另一个绘制在一起时，它们都会位于图的45度线上，正如图[4-2](#Fig2)左图所示。
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig2_HTML.jpg)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig2_HTML.jpg)'
- en: Figure 4-2
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-2
- en: Predicted value versus the real value for the target variable (the house price).
    Note how, in the left plot, for the training data, the prediction is almost perfect,
    while on the plot on the right, for the dev dataset, the predictions are more
    spread out
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 预测值与目标变量（房价）的真实值之间的比较。注意，在左边的图中，对于训练数据，预测几乎完美，而在右边的图中，对于开发集，预测分布更广。
- en: What can we do in this case to avoid the problem of overfitting? One solution
    would be of course to reduce the complexity of the network. Reduce the number
    of layers and/or the number of neurons in each layer. But, as you can imagine,
    this strategy is very time consuming. You must try several network architectures
    to see how the training error and the dev error behave. In this case, this is
    still a viable solution, but if you are working on a problem where the training
    phase takes several days, this can be quite difficult and extremely time consuming.
    Several strategies have been developed to deal with this problem; the most common
    is called *regularization* and is the focus of this chapter.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们该如何避免过拟合的问题呢？一个解决方案当然是减少网络的复杂性。减少层数和/或每层的神经元数量。但是，正如你可以想象的那样，这种策略非常耗时。你必须尝试几种网络架构，看看训练误差和开发误差是如何表现的。在这种情况下，这仍然是一个可行的解决方案，但如果你正在处理一个训练阶段需要几天的问题，这可能相当困难，并且非常耗时。已经开发出几种策略来处理这个问题；最常见的方法被称为*正则化*，这也是本章的重点。
- en: What Is Regularization
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是正则化
- en: 'Before going into the different methods, we must quickly discuss how the deep
    learning community interprets the term *regularization* . The term has deeply
    (pun intended) evolved over time. For example, in the traditional sense from the
    90s, the term was reserved only to a penalty term in the loss function [2]. Lately,
    the term has gained a much more broader meaning. For example, Goodfellow [3] defines
    it as *“any modification we make to a learning algorithm that is intended to reduce
    its test error but not its training error.”* Kukačka [4] generalizes the term
    even more and provides the definition: “Regularization is any supplementary technique
    that aims at making the model generalize better, i.e. produce better results on
    the test set.” So be aware when using the term and always be precise with what
    you mean.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在进入不同的方法之前，我们必须迅速讨论深度学习社区如何解释*正则化*这个术语。随着时间的推移，这个术语已经发生了深刻的演变（有意为之）。例如，在90年代的传统意义上，这个术语仅保留在损失函数中的惩罚项[2]。最近，这个术语的含义已经变得更加广泛。例如，Goodfellow
    [3]将其定义为*“我们对学习算法所做的任何修改，旨在减少其测试误差，但不会增加其训练误差。”* Kukačka [4]进一步推广了这个术语，并提供了定义：“正则化是任何旨在使模型更好地泛化的辅助技术，即产生更好的测试集结果。”所以，在使用这个术语时，要小心，并且始终要明确你所指的含义。
- en: You may also have heard or read the claim that regularization has been developed
    to fight overfitting. This is also a way of understanding it. Remember, a model
    that is overfitting the training dataset is not generalizing well to new data.
    This definition is also in line with all the others.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能也听说过或读到过这样的说法：正则化是为了对抗过拟合而开发的。这也是理解它的一种方式。记住，一个过度拟合训练数据集的模型并不能很好地泛化到新数据。这个定义也与所有其他定义相一致。
- en: This is just a matter of definitions but it’s important to have heard them,
    so that you better understand what is meant when reading papers or books. This
    is a very active research area and, to give you an idea, Kukačka, in his review
    paper, lists 58 different regularization methods. It’s important to understand
    that with their general definition, SGD (Stochastic Gradient Descent) is also
    considered a regularization method, something that not everyone agrees on. So
    be warned when reading research material about the variation with the term regularization.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个定义问题，但重要的是要听过它们，这样你就能更好地理解在阅读论文或书籍时所指的含义。这是一个非常活跃的研究领域，为了给你一个概念，Kukačka在他的综述论文中列出了58种不同的正则化方法。重要的是要理解，根据它们的广义定义，随机梯度下降（SGD）也被视为一种正则化方法，这并不是每个人都同意的。所以，在阅读研究材料时，要注意正则化这个术语的变体。
- en: 'In this chapter, we look at the three most common and known methods—*ℓ*[1],
    *ℓ*[2], and dropout, We also briefly talk about early stopping, although this
    method does not, technically speaking, fight overfitting. *ℓ*[1] and *ℓ*[2] achieve
    a so-called weight decay by adding a regularization term to the cost function,
    while dropout simply removes, in a random fashion, nodes from the network during
    the training phase. To understand the three methods properly, we need to study
    them in detail. Let’s start with the most instructive one: *ℓ*[2] regularization.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将探讨三种最常见和已知的方法——*ℓ*[1]、*ℓ*[2]和dropout，我们还将简要讨论提前停止，尽管从技术上讲，这种方法并不能真正对抗过拟合。*ℓ*[1]和*ℓ*[2]通过在损失函数中添加正则化项来实现所谓的权重衰减，而dropout则在训练阶段以随机方式从网络中移除节点。为了正确理解这三种方法，我们需要详细研究它们。让我们从最具指导性的一个开始：*ℓ*[2]正则化。
- en: At the end of the chapter, we look at a few other ideas on how to fight overfitting
    and get the model to generalize better. Instead of changing or modifying the model
    or the learning algorithm, we will consider strategies with the idea of modifying
    the training data to make learning more effective.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: About Network Complexity
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s spend a few moments briefly discussing the term we used very often: network
    complexity. You have read here, and can find almost everywhere, that with regularization
    you want to reduce network complexity . But what are we referring to really? It
    is very difficult to give a definition of network complexity, so much that nobody
    does it, actually. You can find several research papers on the problem of model
    complexity (note that this is not exactly network complexity), with roots in information
    theory. In this chapter, you see how the number of weights different from zero
    will change dramatically with the number of epochs, with the optimization algorithm
    and so on, therefore making this vague concept of complexity also dependent on
    how long you train your model. To make the story short, the term *network complexity*
    should be used only at a general level, since theoretically it’s a very complex
    concept to define. A complete discussion of the subject is completely out of the
    scope of this book.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '**ℓ**[***p***] **Norm**'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we start studying what *ℓ*[1] and *ℓ*[2] regularization is, we need to
    introduce the *ℓ*[*p*] norm notation. We define the *ℓ*[*p*] norm of a vector
    ***x*** with *x*[*i*] components as
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\left\Vert \boldsymbol{x}\right\Vert}_p=\sqrt[p]{\sum_i{\left|{x}_i\right|}^p}\kern1.75em
    p\in \mathbb{R} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equa.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: where the sum is performed over all components of the vector ***x***.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s now start with the most instructive norm: the *ℓ*[2].'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '**ℓ**[**2**] **Regularization**'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the most common regularization methods, *ℓ*[2] regularization, consists
    of adding a term to the cost function that has the goal of effectively reducing
    the capacity of the network to adapt to complex datasets. Let’s first look at
    the mathematics behind the method.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '**Theory of ℓ**[**2**] **Regularization**'
  id: totrans-59
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: When doing plain regression, the cost function is simply the MSE (Mean Squared
    Error)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ L\left(\boldsymbol{w}\right)=\frac{1}{m}\sum \limits_{i=1}^m{\left({y}_i-{\hat{y}}_i\right)}^2
    $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equb.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
- en: where *y*[*i*] is our measured target variable, ![$$ {\hat{y}}_i $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_IEq1.png)
    is the predicted value, ***w*** is the vector of all the weights of our network
    including the bias, and *m* is the number of observations. Now let’s define a
    new cost function ![$$ \overset{\sim }{L}\left(\boldsymbol{w},b\right) $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_IEq2.png)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overset{\sim }{L}\left(\boldsymbol{w}\right)=L\left(\boldsymbol{w}\right)+\frac{\lambda
    }{2m}{{\left\Vert \boldsymbol{w}\right\Vert}^2}_2 $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equc.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
- en: This additional term
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\lambda }{2m}{{\left\Vert \boldsymbol{w}\right\Vert}^2}_2 $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equd.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
- en: is called the *regularization term* and is nothing more than the *ℓ*[2] norm
    squared and ***w*** multiplied by a constant factor *λ*/2*m*. *λ* is a called
    the *regularization parameter* *.*
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: The new regularization parameter *λ* is a new hyper-parameter that you need
    to tune to find its optimal value.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s study the effect this term has on the GD (gradient descent) algorithm.
    Consider the update equation for the weight *w*[*j*]
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{j,\left[n+1\right]}={w}_{j,\left[n\right]}-\gamma \frac{\partial
    \overset{\sim }{L}\left({\boldsymbol{w}}_{\left[n\right]}\right)}{\partial {w}_j}={w}_{j,\left[n\right]}-\gamma
    \frac{\partial L\left({\boldsymbol{w}}_{\left[n\right]}\right)}{\partial {w}_j}-\frac{\gamma
    \lambda}{m}{w}_{j,\left[n\right]} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Eque.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: since
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial }{\partial {w}_j}{{\left\Vert \boldsymbol{w}\right\Vert}^2}_2=2{w}_j
    $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equf.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
- en: This gives us
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{j,\left[n+1\right]}={w}_{j,\left[n\right]}\left(1-\frac{\gamma \lambda}{m}\right)-\gamma
    \frac{\partial L\left({\boldsymbol{w}}_{\left[n\right]}\right)}{\partial {w}_j}
    $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equg.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: This is the equation that we need to use for the weights update. The difference
    with the one we already know from plain GD is that now the weight *w*[*j*, [*n*]]
    is multiplied by a constant ![$$ 1-\frac{\gamma \lambda}{m}&lt;1\. $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_IEq3.png)
    This has the effect of shifting the weight values during the update toward zero,
    and therefore making the network less complex. This in turn helps to prevent overfitting.
    Let’s see what is really happening to the weights by applying the method to the
    Boston housing dataset.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Keras Implementation
  id: totrans-76
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The implementation in Keras is extremely easy. The library performs all the
    computations for us, and we just have to decide which regularization we want to
    use, set the *λ* parameter, and apply it to each layer. The model construction
    remains the same.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: In Keras, regularization is applied at the layer level, and not globally on
    the cost function. You will notice how it is added at each layer and not when
    defining the cost function. But the explanation here remains valid, and it works
    in the same way as we discussed. The reason for this is that it can be helpful
    to add regularization only on certain layers, for example the largest, and not
    on layers with only a few neurons.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: We can do this with this function
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The main differences with respect to the previous function (the one that we
    used to build a network without regularization) are highlighted in bold.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的功能（我们用来构建没有正则化的网络的功能）相比，主要的不同之处用粗体突出显示。
- en: With the `reg = tf.keras.regularizers.l2(l2 = lambda_)` line, we defined the
    *ℓ*[2] regularizer, setting the value for *λ*. Then we apply the regularizer to
    each layer, assigning it to the `kernel_regularizer`, which applies the penalty
    on the layer’s kernel. The layers may also expose the keywork arguments `bias_regularizer`
    and `activity_regularizer`, which apply a penalty to the layer’s bias and output,
    respectively, but are less often used. Here we employ only the `kernel_regularizer`
    argument.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在`reg = tf.keras.regularizers.l2(l2 = lambda_)`这一行中，我们定义了*ℓ*[2]正则化器，设置了*λ*的值。然后我们将正则化器应用于每一层，将其分配给`kernel_regularizer`，这将在层的核上应用惩罚。层还可以公开`bias_regularizer`和`activity_regularizer`关键字参数，分别对层的偏置和输出应用惩罚，但使用得较少。在这里，我们只使用了`kernel_regularizer`参数。
- en: Remember that in Python `lambda` is a reserved word, so we cannot use it. This
    is why we use `lambda_`.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，在Python中`lambda`是一个保留字，所以我们不能使用它。这就是为什么我们使用`lambda_`。
- en: Now let’s train and evaluate our network to see what happens. This time we will
    print the MSE coming from the training (*MSE*[*train*]) and from dev (*MSE*[*dev*])
    datasets to check what is going on. As mentioned, applying this method make many
    weights go to zero, effectively reducing the complexity of the network, and therefore
    fighting overfitting. Let’s run the model for *λ* = 0.0, without regularization,
    and for *λ* = 10.0.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们训练和评估我们的网络，看看会发生什么。这次我们将打印来自训练集（*MSE*[*train*]）和开发集（*MSE*[*dev*]）的MSE，以检查发生了什么。如前所述，应用这种方法会使许多权重变为零，从而有效地降低网络的复杂性，并因此对抗过拟合。让我们运行*λ* = 0.0，没有正则化，以及*λ* = 10.0的模型。
- en: We can run this model with the following code
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以用以下代码运行这个模型
- en: '[PRE7]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: and that gives us
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这给了我们
- en: '[PRE8]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As expected, we are in an extreme overfitting regime (*MSE*[*train*] ≪ *MSE*[*dev*])
    after 5000 epochs. Now let’s try this with *λ* = 10.0
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，经过5000个epoch后，我们处于极端过拟合状态（*MSE*[*train*] ≪ *MSE*[*dev*]）。现在让我们尝试*λ* = 10.0的情况。
- en: '[PRE9]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: and that gives these results
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了以下结果
- en: '[PRE10]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: We aren’t in an overfitting regime any more, since the two MSE values are of
    the same order of magnitude. The best way to see what is going on is to study
    the weights distribution for each layer. In Figure [4-3](#Fig3), the weights distribution
    for the four hidden layers are plotted. The light gray histogram is for the weights
    without regularization, and the darker (and much more concentrated around zero)
    histogram is for the weights with regularization.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不再处于过拟合状态，因为两个MSE值具有相同的数量级。最好的方法是研究每一层的权重分布。在图[4-3](#Fig3)中，绘制了四个隐藏层的权重分布。浅灰色直方图表示没有正则化的权重，而较深色（且更集中在零附近）的直方图表示有正则化的权重。
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig3_HTML.jpg)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig3_HTML.jpg)'
- en: Figure 4-3
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-3
- en: Weights distribution for each layer. The light gray histogram is for the weights
    without regularization, and the darker (and much more concentrated around zero)
    histogram is for the weights with regularization
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 每一层的权重分布。浅灰色直方图表示没有正则化的权重，而较深色（且更集中在零附近）的直方图表示有正则化的权重
- en: You can clearly see how the weights, when we apply regularization, are much
    more concentrated around zero, meaning they are much smaller than without regularization.
    This makes the weight decay effect of regularization very evident. We now have
    the chance to have another brief digression about network complexity. We said
    that this method reduces the network complexity. We saw previously that you can
    consider the number of learnable parameters an indication of the complexity of
    a network, but you have also been warned that this can be very misleading. Now
    let’s see why. Recall that the total number of learnable parameters we have in
    a network is given by the formula
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以清楚地看到，当我们应用正则化时，权重分布得更加集中在零附近，这意味着它们比没有正则化时小得多。这使得正则化的权重衰减效应非常明显。我们现在有机会简要地讨论一下网络复杂性。我们说过这种方法可以降低网络复杂性。我们之前看到，你可以将可学习参数的数量视为网络复杂性的一个指标，但你也已经被警告过这可能会非常误导。现在让我们看看为什么。回想一下，我们在网络中拥有的可学习参数的总数由以下公式给出：
- en: '![$$ Q=\sum \limits_{j=1}^L{n}_l\left({n}_{l-1}+1\right) $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equh.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Q=\sum \limits_{j=1}^L{n}_l\left({n}_{l-1}+1\right) $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equh.png)'
- en: where *n*[*l*] is the number of neurons in layer *l* and *L* is the total number
    of layers, including the output one. In this case, we have an input layer with
    13 features, then four layers with each 20 neurons, and then an output layer with
    one neuron. Therefore *Q* is given by
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Q=20\times \left(13+1\right)+20\times \left(20+1\right)+20\times \left(20+1\right)+20\times
    \left(20+1\right)+1\times \left(20+1\right)=1561 $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equi.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
- en: '*Q* is a very big number. Already, and without regularization, it is interesting
    to note that we have roughly 6% of the weights that after 1000 epochs are less
    than 10^(−3), so effectively close to zero. This is why talking about complexity
    in terms of the number of learnable parameters is risky. Additionally, using regularization
    will completely change the scenario. Complexity is a difficult concept to define:
    it depends on many things, including the architecture, the optimization algorithm,
    the cost function, and the number of epochs trained.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Defining the complexity of a network only in terms of the number of weights
    is not completely correct. The total number of weights gives you an idea, but
    it can be misleading since many may be zero after the training, effectively disappearing
    from the network, and making it less complex. It is more correct to talk about
    *model complexity* instead of network complexity, since many more aspects are
    involved than simply how many neurons or layers the network has.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: Incredibly enough, only half of the weights play a role in the predictions at
    the end. This is why defining the network complexity only with the *Q* parameter
    is misleading. Given your problem, your loss function, and optimizer, you may
    well end up with a network that when trained is much simpler than what it was
    during the construction phase. So be very careful when using the term complexity
    in the deep learning world. Be aware of the subtleties involved.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: To give you an idea how effective regularization is in reducing the weights,
    Table [4-1](#Tab1) compares the percentage of weights less than 10^(−3) with and
    without regularization, after 1000 epochs in each hidden layer.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-1
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Percentage of Weights Less Than 10^(−3) With and Without Regularization After
    1000 Epochs
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '| **Layer** | **Percent of Weight Less Than** 10^(−3) **for** *λ* = 0.0 | **Percent
    of Weight Less Than** 10^(−3) **for** *λ* = 3.0 |'
  id: totrans-109
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-110
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0.77 | 1.54 |'
  id: totrans-111
  prefs: []
  type: TYPE_TB
- en: '| 2 | 0.0 | 28.25 |'
  id: totrans-112
  prefs: []
  type: TYPE_TB
- en: '| 3 | 1.0 | 40.0 |'
  id: totrans-113
  prefs: []
  type: TYPE_TB
- en: '| 4 | 0.25 | 45.75 |'
  id: totrans-114
  prefs: []
  type: TYPE_TB
- en: But how should we choose *λ*? To get an idea (and remember that in the deep
    learning world there is no universal rule), it’s useful to see what happens when
    you vary the *λ* parameter to your optimizing metric (in this case, the MSE).
    Figure [4-4](#Fig4) shows the behavior of *MSE*[*train*] (continuous line) and
    of *MSE*[*dev*] (dashed line) on the Boston dataset for this network varying *λ*
    after 1000 epochs.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig4_HTML.jpg)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig4_HTML.jpg)'
- en: Figure 4-4
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-4
- en: Behavior of the MSE for the training (continuous line) dataset and for the dev
    (dashed line) dataset for our network varying *λ*
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 训练数据集（连续线）和开发数据集（虚线）的 MSE 行为
- en: 'As you can see, with small values of *λ* (effectively without regularization),
    we are in an overfitting regime (*MSE*[*train*] ≪ *MSE*[*dev*]), with the *MSE*[*train*]
    and the *MSE*[*dev*] increasing. Until *λ* ≈ 6, the model overfits the training
    data, then the two values cross and the overfitting finishes. After that they
    grow together, at which point the model cannot capture the fine data structures
    anymore. After the crossing of the lines, the model is getting too simple to capture
    the features of the problem. Therefore, the errors grow together and the error
    on the training dataset gets bigger, since the model doesn’t even fit the training
    data well. In this specific case, a good value to choose for *λ* is around 6,
    around the value when the two lines cross, since you are not in an overfitting
    region anymore (since *MSE*[*train*] ≈ *MSE*[*dev*]). Remember that the main goal
    of having the regularization term is to get a model that generalizes in the best
    way possible when it’s applied to new data. You can look at it in a different
    way: a value of *λ* ≈ 6 gives you the minimum of *MSE*[*dev*] outside the overfitting
    region (for *λ* ≲ 6), so it’s a good choice. Note that you may observe a very
    different behavior for your optimizing metric, so you have to decide what the
    best value is for *λ* on a case-by-case basis.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，当 *λ* 的值较小时（实际上是没有正则化），我们处于过拟合状态（*MSE*[*train*] ≪ *MSE*[*dev*]），*MSE*[*train*]
    和 *MSE*[*dev*] 都在增加。直到 *λ* ≈ 6，模型开始过拟合训练数据，然后两个值交叉，过拟合结束。之后它们一起增长，此时模型无法再捕捉到精细的数据结构。在两条线的交叉之后，模型变得过于简单，无法捕捉到问题的特征。因此，错误一起增长，训练数据集上的错误变得更大，因为模型甚至没有很好地拟合训练数据。在这个特定的情况下，一个合适的
    *λ* 值大约是 6，大约在两条线交叉的值，因为您已经不再处于过拟合区域（因为 *MSE*[*train*] ≈ *MSE*[*dev*]）。记住，正则化项的主要目的是在将模型应用于新数据时，以最佳方式泛化。您可以从不同的角度看待它：*λ* ≈ 6
    的值给您提供了过拟合区域外（对于 *λ* ≲ 6）*MSE*[*dev*] 的最小值，因此是一个不错的选择。请注意，您可能会观察到优化指标的不同行为，因此您必须根据具体情况决定
    *λ* 的最佳值。
- en: Note
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: A good way for estimating the optimal value of the regularization parameter
    *λ* is to plot your optimizing metric (in this example, the MSE) for the training
    and the dev dataset and see how they behave for various values of *λ*. Then you
    choose the value that gives the minimum of your optimizing metric on the dev dataset
    and at the same time gives you a model that is not overfitting your training data.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 估计正则化参数 *λ* 的最佳值的一个好方法是绘制您的优化指标（在这个例子中是 MSE）对于训练和开发数据集，并观察它们在 *λ* 的各种值下的行为。然后您选择在开发数据集上给出优化指标最小值的值，同时给出一个不会过拟合训练数据的模型。
- en: Let’s discuss the effects of *ℓ*[2] regularization in an even more visual way.
    Let’s consider a dataset generated with the following code
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以更直观的方式讨论 *ℓ*[2] 正则化的影响。让我们考虑以下代码生成的数据集
- en: '[PRE11]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Our dataset has two features: *x* and *y*. We generated two groups of points—`xx1`,
    `yy1` and `xx2`, `yy2`—from a normal distribution. To the first, we assigned the
    label 0 (contained in the array `yy1_`) and to the second the label 1 (in the
    array `yy2_`). Now let’s use a network like the one we described earlier (with
    four layers, each having 20 neurons) to do some binary classification on this
    dataset. We can take the same code given previously, modifying the output layer
    and the cost function. Recall that for binary classification, we need one neuron
    in the output layer with the sigmoid activation function'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的数据库有两个特征：*x* 和 *y*。我们从正态分布生成了两组点——`xx1`, `yy1` 和 `xx2`, `yy2`——。对于第一组，我们分配了标签
    0（包含在数组 `yy1_` 中）和第二组分配了标签 1（在数组 `yy2_` 中）。现在让我们使用我们之前描述的网络（具有四个层，每个层有 20 个神经元）来对这个数据集进行一些二元分类。我们可以使用之前给出的相同代码，修改输出层和损失函数。回想一下，对于二元分类，输出层需要一个具有
    sigmoid 激活函数的神经元
- en: '[PRE12]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: As you can see, the code is almost the same, except for the different cost function
    and the activation function of the output layer. Let’s plot the decision boundary^([2](#Fn2))
    for this problem. That means we will run our network on our dataset with the code
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，代码几乎相同，只是成本函数和输出层的激活函数不同。让我们绘制这个问题的决策边界^([2](#Fn2))。这意味着我们将使用以下代码在我们的数据集上运行我们的网络
- en: '[PRE13]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Figure [4-5](#Fig5) shows our dataset, whereby the white points are of one class
    and the black of the second. The gray area is the zone that the network classifies
    as being of one class and the white as the other class. You can see that the network
    can capture the complex structure of our data in a flexible way.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig5_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
- en: Figure 4-5
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Decision boundary without regularization. White points are of one class and
    black are the second. The gray area is the zone that the network classifies as
    being of one class and the white to the other. You can see that the network can
    capture the complex structure of this data
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s apply regularization to the network, exactly as we did before, and
    see how the decision boundary is modified. We use a regularization parameter *λ* = 0.04.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig6_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: Figure 4-6
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: The decision boundary as predicted by the network with *ℓ*[2] regularization
    and with a regularization parameter *λ* = 0.04
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: 'You can clearly see in Figure [4-6](#Fig6) that the decision boundary is almost
    linear and is not able to capture the complex structure of the data anymore. Exactly
    what we expected: the regularization term makes the model simpler, and therefore
    less able to capture the fine structures. It is interesting to compare the decision
    boundary of our network with the result of logistic regression with just one neuron.
    We will not repeat the code here for space reasons (you can find the complete
    code version in the online version of the book), but if you compare the two decision
    boundaries in Figure [4-7](#Fig7) (the one coming from the network with one neuron
    that’s linear), you can see that they are almost the same. The difference is that
    the regularized version presents a smoother decision boundary. To conclude, a
    regularization term of *λ* = 0.04 effectively gives the same results as a network
    with just one neuron.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig7_HTML.jpg)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
- en: Figure 4-7
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: The decision boundaries for the complex network with *λ* = 0.04 and for one
    with just one neuron. The two boundaries overlap nearly completely
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: '**ℓ**[**1**] **Regularization**'
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section looks at a regularization technique that is very similar to *ℓ*[2]
    regularization. It is based on the same principle, adding a term to the cost function.
    This time, the mathematical form of the added term is different, but the method
    works very similarly to what you saw in the previous sections. Let’s again look
    at the mathematics behind the algorithm.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: '**Theory of ℓ**[**1**] **Regularization and Keras Implementation**'
  id: totrans-142
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '*ℓ*[1] regularization also works by adding an additional term to the cost function'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \overset{\sim }{L}\left(\boldsymbol{w}\right)=L\left(\boldsymbol{w}\right)+\frac{\lambda
    }{m}{\left\Vert \boldsymbol{w}\right\Vert}_1 $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equj.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
- en: The effect it has on the learning is effectively similar to the one described
    with *ℓ*[2] regularization. Keras has, as for *ℓ*[2], a function ready to be used.
    The code is the same as before, with the only difference in the regularized definition
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We can again compare the weights distribution between the model without the
    regularization term (*λ* = 0.0) and with regularization (*λ* = 3.0) in Figure
    [4-8](#Fig8). We used the Boston dataset for the calculation. We trained the model
    with the call
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: once with *λ* = 0.0 and once with *λ* = 3.0.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig8_HTML.jpg)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
- en: Figure 4-8
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Weight distribution comparison between the model without the *ℓ*[1] regularization
    term (*λ* = 0.0, light gray) and with *ℓ*[1] regularization (*λ* = 3.0, dark gray)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, *ℓ*[1] regularization has the same effect as *ℓ*[2]. It reduces
    the effective complexity of the network, reducing many weights to zero.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: To give you an idea of how effective regularization is in reducing the weights,
    Table [4-2](#Tab2) compares the percentage of weights less than 10^(−3) with and
    without regularization after 1000 epochs.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-2
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: Percentage of Weights Less Than 10^(−3) With and Without Regularization After
    1000 Epochs
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: '| Layer | Percent of Weight Less Than 10^(−3) for *λ* = 0.0 | Percent of Weight
    Less Than 10^(−3) for *λ* = 3.0 |'
  id: totrans-157
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-158
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0.0 | 90.77 |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
- en: '| 2 | 0.5 | 94.50 |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
- en: '| 3 | 0.0 | 96.75 |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
- en: '| 4 | 0.0 | 94.50 |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
- en: Are the Weights Really Going to Zero?
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is instructive to see why the weights are going to zero. For illustrative
    purposes in Figure [4-9](#Fig9), you can see weight ![$$ {w}_{12,5}^{\left[3\right]}
    $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_IEq4.png) (from
    layer 3) plotted versus the number of epochs for our artificial dataset with two
    features,*ℓ*[2] regularization, *γ* = 10^(−3), *λ* = 0.1, after 1000 epochs. You
    can see how it quickly decreases to zero. The value after 1000 epochs is 2 · 10^(−21),
    so for all purposes zero.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig9_HTML.jpg)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
- en: Figure 4-9
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Weight ![$$ {w}_{12,5}^{\left[3\right]} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_IEq5.png)
    plotted versus the epochs for our artificial dataset with two features, *ℓ*[2]
    regularization, *γ* = 10^(−3), *λ* = 0.1, trained for 1000 epochs
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: If you were wondering, the weight goes to zero almost exponentially. A way of
    understanding why is to consider the weight update equation for one weight
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{j,\left[n+1\right]}={w}_{j,\left[n\right]}\left(1-\frac{\gamma \lambda}{m}\right)-\frac{\gamma
    \partial L\left({\boldsymbol{w}}_{\left[n\right]}\right)}{\partial {w}_j} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equk.png)'
  id: totrans-169
  prefs: []
  type: TYPE_IMG
- en: Let’s now suppose we find ourselves close to the minimum, in a region where
    the derivative of the cost function *J* is almost zero, so that we can neglect
    it. In other words, let’s suppose
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial L\left({\boldsymbol{w}}_{\left[n\right]}\right)}{\partial
    {w}_j}\approx 0 $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equl.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
- en: We can rewrite the weight update equation as
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{j,\left[n+1\right]}-{w}_{j,\left[n\right]}=-{w}_{j,\left[n\right]}\frac{\gamma
    \lambda}{m} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equm.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
- en: Now the rate of variation of the weight with respect to the iteration number
    is proportional to the weight itself. For those of you with knowledge of differential
    equations, you may realize that we can draw a parallel to the following equation
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{dx(t)}{dt}=-\frac{\gamma \lambda}{m}x(t) $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equn.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
- en: Now the rate of variation of *x*(*t*) with respect to time is proportional to
    the function itself. For those of you who know how to solve this equation, you
    may know that a generic solution is
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ x(t)=A{e}^{-\frac{\gamma \lambda}{m}\left(t-{t}_0\right)} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_Equo.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
- en: You can now see why the weight decay will have a decay similar to an exponential
    function by drawing a parallel between the two equations. Figure [4-10](#Fig10)
    shows the weight decay we discussed together with a pure exponential decay. The
    two curves are not identical, as expected, since especially at the beginning the
    gradient of the cost function is surely not zero. But the similarity is remarkable
    and should give you an idea of how fast the weights can go to zero (really quickly).
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig10_HTML.jpg)'
  id: totrans-179
  prefs: []
  type: TYPE_IMG
- en: Figure 4-10
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: Weight ![$$ {w}_{12,5}^{\left[3\right]} $$](../images/463356_2_En_4_Chapter/463356_2_En_4_Chapter_TeX_IEq6.png)
    plotted versus the epochs for our artificial dataset with two features, *ℓ*[2]
    regularization, *γ* = 10^(−3), *λ* = 0.1, trained for 1000 epochs (continous line),
    together with a pure exponential decay (dashed line) for illustrative purposes
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: Note that when using regularization, you end up having tensors with a lot of
    zero elements, called sparse tensors. You can then profit from special routines
    that are extremely efficient with sparse tensors. This is something to keep in
    mind when you start moving toward more complex models, but a subject too advanced
    for this book.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: Dropout
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The basic idea of *dropout* is different: during the training phase you remove
    nodes from layer *l* randomly with a probability *p*^([*l*]). In each iteration
    you remove different nodes, effectively training at each iteration a different
    network (when using mini-batches, you train a different network for each batch,
    for example).'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: 'In Keras, you simply add how many dropout layers you want after the layer you
    need to drop, using the following function: `keras.layers.Dropout(rate)`. You
    must put as input the layer you want to drop, and you must set the `rate` parameter.
    This parameter can assume float values in the range [0, 1), since it represents
    the fraction of the input units to drop. Therefore, it is not possible to drop
    all the units (setting a rate equal to 1). Usually, the `rate` parameter is set
    the same for all networks (but technically speaking, can be layer specific).'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: Very importantly, when doing predictions on a dev dataset, no dropout should
    be used! Keras will automatically apply dropout during the training phase of the
    model, without dropping any additional unit during the model’s evaluation on a
    different set.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: During training, dropout removes nodes randomly during each iteration. But when
    doing predictions on a dev dataset, the entire network needs to be used without
    dropout. Keras will automatically consider this case for you.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: Dropout can be layer-specific. For example, for layers with many neurons, `rate`
    can be small. For layers with a few neurons, you can set `rate = 0.0`, effectively
    keeping all neurons in such layers.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: The implementation in Keras is easy.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: As you can see, you must put a dropout layer (highlighted in bold) after the
    layer you want to modify, setting the `rate` parameter .
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s analyze what happens to the cost function when using dropout. Let’s
    run our model applied to the Boston dataset for two values of the `rate` variable:
    0.0 (without dropout) and 0.5\. In Figure [4-11](#Fig11), you can see that when
    applying dropout, the cost function is very irregular. It oscillates wildly. The
    two models have been evaluated with the calls'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: for rate = 0.0 and for 0.50.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig11_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
- en: Figure 4-11
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: 'The cost function for the training dataset for our model for two values of
    the rate variable: 0.0 (no dropout) and 0.50\. *γ* = 0.001\. The models have been
    trained for 8000 epochs. No mini-batch has been used. The oscillating line is
    the one evaluated with regularization'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-12](#Fig12) shows the evolution of the MSE for the training and dev
    datasets in case of dropout (`rate = 0.5`).
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig12_HTML.jpg)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
- en: Figure 4-12
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: MSE for the training and dev datasets in case of dropout (rate = 0.50)
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-13](#Fig13) shows the same plot but without dropout. The difference
    is quite striking. Very interesting is the fact that, without dropout, *MSE*[*dev*]
    grows with epochs, while when using dropout it is rather stable .
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig13_HTML.jpg)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
- en: Figure 4-13
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: MSE for the training and dev datasets in case of no dropout (rate = 0.0)
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-13](#Fig13) shows that the *MSE*[*dev*] grows after dropping at the
    beginning. The model is in a clear extreme overfitting regime (*MSE*[*train*] ≪ *MSE*[*dev*]),
    and it generalizes worst when applied to new data. In Figure [4-12](#Fig12), you
    can see how the *MSE*[*train*] and *MSE*[*dev*] are of the same order of magnitude
    and the *MSE*[*dev*] does not continue to grow, so we have a model that is a lot
    better at generalizing than the one shown in Figure 4-13.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: When applying dropout, your metric (in this case, the MSE) will oscillate, so
    do not be surprised when trying to find the best hyper-parameters if you see your
    optimizing metric oscillating.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: Early Stopping
  id: totrans-210
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Early stopping* is another technique that is sometimes used to fight overfitting.
    Strictly speaking, this method does nothing to avoid overfitting; it simply stops
    the learning before the overfitting problem becomes too bad. Consider the example
    in the last section. Figure [4-14](#Fig14) shows the *MSE*[*train*] and *MSE*[*dev*]
    plotted on the same plot.'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig14_HTML.jpg)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
- en: Figure 4-14
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: MSE for the training and dev datasets in case of no dropout (rate = 0.0). Early
    stopping consists of stopping the learning phase at the iteration when the *MSE*[*dev*]
    is at a minimum (indicated with a vertical line in the plot)
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: Early stopping simply consists of stopping the training at the point when the
    *MSE*[*dev*] has its minimum. (In Figure [4-14](#Fig14), the minimum is indicated
    by a vertical line.) Note that this is not an ideal way of solving the overfitting
    problem. Your model will still most probably generalize very badly to new data.
    It is usually preferable to use other techniques. Additionally, this is also time
    consuming and a manual process that is very error prone. You can get a good overview
    of the different contexts by checking the Wikipedia page at [`https://goo.gl/xnKo2s`](https://goo.gl/xnKo2s).
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: Additional Methods
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'All the methods we have discussed so far consist of, in some form or another,
    making the model less complex. You keep the data as it is and modify your model.
    But we can also try to do the opposite: leave the model as it is and work on the
    data. Here are two common strategies that help prevent overfitting (but are not
    easily applicable):'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: '**Get more data.** This is the simplest way of fighting overfitting. Unfortunately,
    very often in real life this is not possible. If you are classifying pictures
    of cats taken with a smartphone you may think of getting more data from the web.
    Although this may seem like a perfectly good idea, you may discover that the images
    have different quality, that possibly not all the images are really cats (what
    about cat toys?), you may only find images of white cats, and so on. Basically,
    your additional observations may come from a very different distribution than
    your original data and that will be a problem. So, when getting additional data,
    consider this problem well before proceeding.'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Augment your data.** For example, if you are working with images you can
    generate additional images by rotating, stretching, shifting, and otherwise editing
    your original images. That is a very common technique that may help.'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The problem of making the model generalize better on new data is one of machine
    learning’s biggest goal. It is a complicated problem that requires experience
    and tests. Lots of tests. A lot of research is currently going on to solve such
    problems when working on very complex problems.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: Exercises
  id: totrans-221
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Exercise 1 (Level: Easy)'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: 'Try to determine which architecture (number of layers and number of neurons)
    does not overfit the Boston dataset. When does the network start overfitting?
    Which network would provide a good result? At a minimum, try the following combinations:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: '| **Number of Layers** | **Number of Neurons in Each Layer** |'
  id: totrans-224
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-225
  prefs: []
  type: TYPE_TB
- en: '| 1 | 3 |'
  id: totrans-226
  prefs: []
  type: TYPE_TB
- en: '| 1 | 5 |'
  id: totrans-227
  prefs: []
  type: TYPE_TB
- en: '| 2 | 3 |'
  id: totrans-228
  prefs: []
  type: TYPE_TB
- en: '| 2 | 5 |'
  id: totrans-229
  prefs: []
  type: TYPE_TB
- en: 'Exercise 2 (Level: Medium)'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: 'Find the minimum value for *λ* (in the case of *ℓ*[2]) for which the overfitting
    stops. Perform a set of tests using the function hist, `model = create_and_train_reg_model_L2(train_x,
    train_y, dev_x, dev_y, 20, 4, 0.0)`, varying the value of *λ* from 0 to 10.0 in
    regular increments (you can decide which values you want to test). Use at a minimum
    the values: 0, 0.5, 1.0, 2.0, 5.0, 7.0, 10.0, and 15.0\. After that, plot the
    value of the cost function on the training dataset and on the dev dataset vs.
    *λ*.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: 'Exercise 3 (Level: Medium)'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: 'In the *ℓ*[1] regularization example applied to the Boston dataset, plot the
    amount of weights close to zero in hidden layer 3 vs. *λ*. Considering only layer
    3, plot the quantity `(np.sum(np.abs(weights3) < 1e-3)) / weights3.size * 100.0`
    we have evaluated before and calculate it for several values of *λ*. Consider
    at least these values: 0, 0.5, 1.0, 2.0, 5.0, 7.0, 10.0, and 15.0\. Plot the value
    vs. *λ*. What shape does the curve have? Does it flatten out?'
