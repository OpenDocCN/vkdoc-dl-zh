  zh: '[PRE15]'
- en: once with *λ* = 0.0 and once with *λ* = 3.0.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 一次使用 *λ* = 0.0，一次使用 *λ* = 3.0。
- en: '![](../images/463356_2_En_4_Chapter/463356_2_En_4_Fig8_HTML.jpg)'
