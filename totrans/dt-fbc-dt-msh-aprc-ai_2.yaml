- en: 6. Relevant ML and DL Concepts
  id: totrans-198
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 相关的机器学习和深度学习概念
- en: 'At the heart of a Data Fabric and Data Mesh is the use of *artificial intelligence*
    (AI) and *machine learning* (ML) technologies to automate complex data tasks to
    the greatest extent possible. Therefore, understanding the concepts of AI and
    ML is the foundation for implementing both concepts in an enterprise. If you are
    already an AI/ML practitioner, you might skip this chapter. If you are not sure,
    please take a quick assessment by answering the following questions, and please
    continue with this chapter should you need more clarity:'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织和数据网格的核心是使用*人工智能*（AI）和*机器学习*（ML）技术尽可能自动化复杂的数据任务。因此，理解人工智能和机器学习的概念是实施这两个概念的企业基础。如果你已经是AI/ML从业者，你可能可以跳过这一章。如果你不确定，请快速评估以下问题，并在需要更多清晰度的情况下继续本章：
- en: Do you know the correlation of AI, ML, and DL?
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你知道人工智能、机器学习和深度学习之间的相关性吗？
- en: Do you know what types of problems AI and ML can solve?
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你知道人工智能和机器学习可以解决哪些类型的问题吗？
- en: Do you know relevant business scenarios for AI?
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你知道人工智能的相关商业场景吗？
- en: Do you know the lifecycle of AI models, and do you know the specific tasks in
    each stage of the AI lifecycle?
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你知道人工智能模型的生命周期吗？你知道人工智能生命周期每个阶段的具体任务吗？
- en: Introduction to AI, ML, and DL
  id: totrans-204
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能、机器学习和深度学习简介
- en: Broadly speaking, AI is a system that can simulate human perception, learning,
    reasoning, and interaction. It covers a wide range of fields, including autonomous
    driving, robot control, computer vision, Natural Language Understanding (NLU),
    and more. The current AI technology for commercial use is still relatively narrow,
    where AI models require large amounts of data to be trained for a single task
    and a single domain and AI models for new domains require new data to be acquired.
    In the meantime, a great deal of research is being done to broaden the scope of
    AI. For example, meta-learning and N-shots learning^([1](#Fn1)) focus on training
    models using small amounts of samples. Transfer learning^([2](#Fn2)) reuses AI
    models from one domain in other domains to handle multi-tasks and multi-domains.
    Federated learning^([3](#Fn3)) enables multiple parties to collaboratively learn
    a shared model without sharing the data.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 广义而言，人工智能是一个可以模拟人类感知、学习、推理和交互的系统。它涵盖了广泛的领域，包括自动驾驶、机器人控制、计算机视觉、自然语言理解（NLU）等。目前用于商业用途的人工智能技术仍然相对狭窄，其中人工智能模型需要大量数据来训练单个任务和单个领域，而新领域的人工智能模型需要获取新的数据。与此同时，正在进行大量研究以拓宽人工智能的范围。例如，元学习和N-shots学习^([1](#Fn1))专注于使用少量样本训练模型。迁移学习^([2](#Fn2))在处理多任务和多领域时，重新使用一个领域中的AI模型在其他领域。联邦学习^([3](#Fn3))使多个方能够协作学习一个共享模型，而无需共享数据。
- en: ML is one way to implement AI systems. ML uses algorithms to parse data, learn
    from it, and then make decisions or make predictions about real-world events.
    Unlike traditional software programs that are hard-coded to solve a specific task,
    ML uses large amounts of data to train algorithms to learn how to accomplish a
    task from data. Rule-based systems are an example of a non-ML system. In rule-based
    systems, it is up to humans to clearly define the parameters of branching conditions,
    such as the if-statements present in the implementation code. ML has a strong
    assumption that the history of what has happened has an inherent pattern and thereby
    that the same results under similar conditions will occur in the future. The process
    of training is to find a function *f(x)* that optimally describes the pattern
    of existing samples and then use this function to make predictions for new samples.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习是实现人工智能系统的一种方式。机器学习使用算法解析数据，从中学习，然后对现实世界事件做出决策或预测。与硬编码以解决特定任务的传统软件程序不同，机器学习使用大量数据来训练算法，学习如何从数据中完成任务。基于规则的系统是非机器学习系统的一个例子。在基于规则的系统中，人类需要明确定义分支条件的参数，例如实现代码中存在的if语句。机器学习有一个强烈的假设，即已经发生的历史事件具有内在的模式，因此，在相似条件下未来将发生相同的结果。训练过程是找到一个函数
    *f(x)*，该函数最优地描述现有样本的模式，然后使用此函数对新样本进行预测。
- en: 'There are three types of ML: supervised learning, unsupervised learning, and
    reinforcement learning.'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习有三种类型：监督学习、无监督学习和强化学习。
- en: '**Supervised Learning** derives the prediction function from the labeled training
    data. It''s like taking the exam (inference) after studying past exams’ questions
    (data) and answers (labels).'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: '**监督学习**从标记的训练数据中推导出预测函数。这就像在学习过去考试的题目（数据）和答案（标签）之后参加考试（推理）。'
- en: '![](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig1_HTML.png)'
  id: totrans-209
  prefs: []
  type: TYPE_IMG
  zh: '![图6-1](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig1_HTML.png)'
- en: A set of 12 paintings arranged in 3 rows. The top row denotes Van Gogh, the
    middle row denotes Monet, and the bottom row denotes Picasso.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 一组12幅画作，排列成3行。最上面一行代表梵高，中间一行代表莫奈，最下面一行代表毕加索。
- en: Figure 6-1
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-1
- en: Training Datasets for Supervised Learning
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习的训练数据集
- en: For example, given several previous artworks by Van Gogh, Picasso, and Monet
    (as depicted in Figure [6-1](#Fig1)), who has painted the one in Figure [6-2](#Fig2)?
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，给定梵高、毕加索和莫奈的几幅先前艺术作品（如图[6-1](#Fig1)所示），谁画了图[6-2](#Fig2)中的那一幅？
- en: '![](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig2_HTML.jpg)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图6-2](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig2_HTML.jpg)'
- en: A painting in the portrait orientation.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅肖像方向的画作。
- en: Figure 6-2
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-2
- en: Testing Data for Supervised Learning
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习的数据测试
- en: '**Unsupervised Learning** infers conclusions from unlabeled training data.
    Although the training data is not labeled, the machine learns to find common features,
    a structure or pattern in the input data, or if there are some associations between
    the features. The most typical unsupervised learning is clustering, which groups
    similar data from many data samples. For example, a system for grouping customers
    based on purchase behaviors is unsupervised learning. By grouping customers according
    to the characteristics of their purchase history, different marketing campaigns
    can be implemented for each group.'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: '**无监督学习**从未标记的训练数据中推断结论。尽管训练数据没有标记，机器学习仍然能够找到输入数据中的共同特征、结构或模式，或者特征之间是否存在某些关联。最典型的无监督学习是聚类，它将来自许多数据样本的相似数据分组。例如，根据购买行为对客户进行分组的系统就是无监督学习。通过根据客户的购买历史特征进行分组，可以为每个组实施不同的营销活动。'
- en: For example, although no labels are defined for the pictures in Figure [6-3](#Fig3),
    ML models can distinguish one category from the other category.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，尽管图[6-3](#Fig3)中的图片没有定义标签，机器学习模型仍然可以区分一个类别与另一个类别。
- en: '![](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig3_HTML.png)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig3_HTML.png)'
- en: 4 photographs. Mountains reaching dark clouds and habitation in the valley.
    A large waterbody with mountains on the other end and a sky with snowflake clouds.
    A sea with tides splashing the rocks and a clear sky above. A landscape with undulations
    and a clear sky.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 4张照片。山脉延伸至黑暗的云层和山谷中的居住地。一个大型水域，另一端有山脉，天空中有雪花状云。海浪拍打着岩石，上方是晴朗的天空。一个有起伏的景观和晴朗的天空。
- en: Figure 6-3
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-3
- en: An Illustration of Unsupervised Learning
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 无监督学习的示意图
- en: In the real world, there are many situations where only some data is labeled
    because of the high cost of manual labeling. One way to resolve this problem is
    to use a small number of labeled data to train a model and use this model to label
    yet unlabeled data and then create a new dataset to improve the model. This type
    of learning is known as semi-supervised learning^([4](#Fn4)) and is now a popular
    area of research.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，由于手动标记的高成本，只有一些数据被标记。解决这个问题的方法之一是使用少量标记数据来训练模型，并使用此模型来标记未标记的数据，然后创建一个新的数据集以改进模型。这种学习被称为半监督学习^([4](#Fn4))，现在是一个热门的研究领域。
- en: '**Reinforcement learning** is concerned with how a software agent can take
    actions in an environment to maximize some cumulative return. Unlike supervised
    learning and unsupervised learning, reinforcement learning doesn’t require a large
    amount of input data. It has a beginning state and enters a new state when an
    action is made. The system will give signals – positive for desired results and
    negative for failure. The whole training process is constantly exploring the possible
    actions through many trials and errors in a changing environment until then finding
    the best path to get maximum outcome based on predefined criteria. Common applications
    include chess play, robotics control, and autonomous driving.'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '**强化学习**关注软件代理如何在环境中采取行动以最大化某些累积回报。与监督学习和无监督学习不同，强化学习不需要大量的输入数据。它有一个初始状态，当采取行动时进入新的状态。系统将给出信号——对于期望的结果是积极的，对于失败是消极的。整个训练过程不断通过在变化的环境中多次尝试和错误来探索可能的行为，直到找到基于预定义标准获得最大结果的最佳路径。常见应用包括棋类游戏、机器人控制和自动驾驶。'
- en: '**Deep learning** (DL) is “a subset of ML, which is essentially a neural network
    with three or more layers.”^([5](#Fn5)) The strength of DL is automatic feature
    extraction. Instead of hand-picking features from datasets, DL can discover and
    learn good feature representation. For example, an image can be represented in
    a variety of ways, such as a vector of intensity values per pixel or more abstractly
    as a series of edges, regions of a particular shape at a different layer of DL
    architecture. DL has a wide range of applications, such as image recognition,
    video analytics, object detection, machine translation, etc. However, DL requires
    large amounts of labeled data and extremely powerful computation resources, like
    high-performance Graphical Processing Units (GPUs), to find the right architecture
    and best set of parameters for the entire architecture. It usually takes millions
    of images and thousands of hours of video for training.'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: '**深度学习**（DL）是“机器学习的一个子集，本质上是一个具有三个或更多层的神经网络。”^([5](#Fn5)) 深度学习的优势在于自动特征提取。与从数据集中手动挑选特征不同，深度学习可以发现并学习良好的特征表示。例如，一张图片可以用多种方式表示，如每个像素的强度值向量或更抽象地表示为一系列边缘、在深度学习架构的不同层中具有特定形状的区域。深度学习有广泛的应用，如图像识别、视频分析、目标检测、机器翻译等。然而，深度学习需要大量的标记数据以及极其强大的计算资源，如高性能的图形处理单元（GPU），以找到整个架构的正确架构和最佳参数集。通常需要数百万张图片和数千小时的视频进行训练。'
- en: ML and DL Industry Use Cases
  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习和深度学习行业用例
- en: 'To discover AI use cases for each industry, understanding what types of problems
    ML and DL are good at solving is a must. The following five types of problems
    are often seen resolved by ML and DL:'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 要发现每个行业的AI用例，了解机器学习和深度学习擅长解决哪些类型的问题是必须的。以下五种类型的问题通常可以通过机器学习和深度学习得到解决：
- en: '**Classification problem**: The first type is the classification problem, whether
    the sample is type A or type B. For example, *is this patient highly likely to
    have diabetes*? Or *is this client at risk of churn*? These are typically binary
    classification problems. Supervised learning algorithms are widely used for classification
    problems.'
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分类问题**：第一种类型是分类问题，例如样本是类型A还是类型B。例如，*这位患者高度可能患有糖尿病吗*？或者*这位客户有流失风险吗*？这些通常是二元分类问题。监督学习算法在分类问题中得到了广泛应用。'
- en: '**Regression problem**: The second type is the regression problem, for example,
    predicting house prices, stock prices, and commodity prices based on historical
    data and relevant external events.'
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**回归问题**：第二种类型是回归问题，例如，根据历史数据和相关的外部事件预测房价、股价和商品价格。'
- en: '**Anomaly detection**: The third type of problem is anomaly detection. A very
    common anomaly detection scenario in IT operations is whether the current CPU,
    memory, and storage consumption are as expected based on workload patterns. For
    instance, *will this cause any performance degradation or even outage*?'
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**异常检测**：第三种类型的问题是异常检测。在IT运营中一个非常常见的异常检测场景是，当前的CPU、内存和存储消耗是否基于工作负载模式符合预期。例如，*这会导致任何性能下降甚至中断吗*？'
- en: '**Clustering problem**: The fourth type is the clustering problem, where unsupervised
    learning algorithms excel. A typical case is that a company looks to improve business
    performance by using customer segmentation for precision marketing.'
  id: totrans-232
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**聚类问题**：第四种类型是聚类问题，其中无监督学习算法表现突出。一个典型的例子是，一家公司希望通过客户细分来进行精准营销，以提高业务绩效。'
- en: '**The next best action problem**: Finally, the next best action problem. Reinforcement
    learning algorithms are used to solve this type of problem. In addition to robot
    control and autonomous driving, transactions in the financial service industry,
    treatments in healthcare, and online recommendations in ecommerce are popular
    reinforcement learning use cases.'
  id: totrans-233
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**下一个最佳行动问题**：最后是下一个最佳行动问题。强化学习算法用于解决这类问题。除了机器人控制和自动驾驶，金融服务行业的交易、医疗保健中的治疗以及电子商务中的在线推荐都是流行的强化学习用例。'
- en: 'After understanding the problems that AI can solve, let''s look at industry-related
    AI use cases and AI applications:'
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解AI可以解决的问题之后，让我们来看看与行业相关的AI用例和AI应用：
- en: '**Manufacturing**: Predictive maintenance is a method of preventing the failure
    of expensive manufacturing equipment by analyzing data throughout the production
    process. A variety of data includes vibrations, temperature, ultrasonics, and
    acoustics through sensors built into the equipment. These data help create ML
    models to identify abnormal behaviors in advance to ensure that necessary maintenance
    actions are taken to minimize production downtime. Inspecting goods and products
    can be quite a cumbersome task for any large manufacturing company. Computer vision
    can provide the analysis of real-time information obtained from captured images
    to perform complex inspection tasks. It can help verify the correct number of
    items in the warehouse, monitor the staff''s operations for compliance with safety
    regulations, and check for the presence of defective products.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: '**制造业**: 预测性维护是一种通过分析整个生产过程中的数据来预防昂贵制造设备故障的方法。这些数据包括设备内置传感器收集到的振动、温度、超声波和声学数据。这些数据有助于创建机器学习模型，以提前识别异常行为，确保采取必要的维护措施以最小化生产停机时间。对于任何大型制造公司来说，检查商品和产品可能是一项相当繁琐的任务。计算机视觉可以提供从捕获的图像中获取的实时信息分析，以执行复杂的检查任务。它可以帮助验证仓库中物品的正确数量，监控员工操作是否符合安全规定，并检查是否存在缺陷产品。'
- en: '**Financial service**: AI has a wide range of application scenarios in the
    financial industry, including anti-money laundering, capital position forecasting,
    smart loan approval, credit card fraud detection, intelligent investment, etc.
    The financial industry adopted information technology many years ago, so it has
    accumulated a large amount of data, laying a good foundation for ML. However,
    the financial industry is also a highly regulated industry, and if the models
    are not well interpreted, they cannot be used in production systems due to compliance.
    Thus, the scenarios of DL are limited in this respect.'
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: '**金融服务**: 人工智能在金融行业有广泛的应用场景，包括反洗钱、资本位置预测、智能贷款审批、信用卡欺诈检测、智能投资等。金融行业多年前就采用了信息技术，因此积累了大量数据，为机器学习奠定了良好的基础。然而，金融行业也是一个高度监管的行业，如果模型没有得到良好的解释，由于合规性原因，它们不能用于生产系统。因此，深度学习的场景在这方面受到了限制。'
- en: '**Telecommunications**: Telecommunications is another industry with a wealth
    of accumulated data. AI is used for intelligent planning of mobile sites, fast
    turnup of base station services, intelligent path planning, and automatic deployment
    of optical transmission networks. It can forecast the network based on network
    history data, manage network resources dynamically and adaptively, and adjust
    parameters. As operations in the telecom industry are supported by large network
    equipment, predictive maintenance of equipment is a very important AI scenario.
    Models are built for network health analysis and prediction and network self-healing,
    reducing the workload of operation and maintenance personnel, improving the efficiency
    of operation and maintenance fault handling, and continuously promoting fundamental
    changes in network operation and maintenance modes.'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: '**电信业**: 电信业是另一个拥有大量积累数据的行业。人工智能被用于移动站点智能规划、基站服务快速开通、智能路径规划和光传输网络的自动部署。它可以基于网络历史数据预测网络，动态和自适应地管理网络资源，并调整参数。由于电信行业的运营依赖于大型网络设备，因此设备的预测性维护是一个非常重要的AI场景。建立了用于网络健康分析和预测以及网络自愈的模型，减少了运维人员的工作量，提高了运维故障处理的效率，并不断推动网络运营和维护模式的根本性变革。'
- en: '**Automobile**: There is no doubt that the most critical application of AI
    in the automotive industry is autonomous driving. In addition to this, there are
    many other AI application scenarios in the automotive industry. For example, supply
    chain management in the automotive manufacturing industry is complex, and it is
    very valuable to use AI to optimize the supply chain. At the same time, quality
    inspection of the automobile production line, abnormality detection during driving,
    and interactive experience in the car are all perfect scenarios for AI applications.
    In addition, the repair procedures for cars are complex. Using chatbots can help
    staff find the information they need most to complete their work in a timely manner.'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '**汽车**：毫无疑问，AI在汽车行业中最关键的应用是自动驾驶。除此之外，汽车行业中还有许多其他AI应用场景。例如，汽车制造行业的供应链管理非常复杂，使用AI优化供应链非常有价值。同时，汽车生产线的质量检验、驾驶过程中的异常检测以及车内交互体验都是AI应用的完美场景。此外，汽车的维修程序也很复杂。使用聊天机器人可以帮助员工及时找到他们完成工作所需的最重要信息。'
- en: After understanding what business problems AI can solve, let’s move on to some
    concepts in various stages of AI.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 在了解AI可以解决哪些商业问题之后，让我们继续探讨AI各个阶段的一些概念。
- en: Data Exploration and Preparation
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据探索和准备
- en: The first stage in ML is data exploration and data preparation.^([6](#Fn6))
    At this stage, an initial exploratory analysis of the data needs to be done to
    understand the distribution of the data and the state of the data quality. Descriptive
    statistics^([7](#Fn7)) is a technique to describe the characteristics of a dataset.
    It provides measures to summarize the central value of a dataset (e.g., mean,
    median, and mode measures) and the dispersion of data within the dataset (e.g.,
    min, max, and variance measures). The histogram is another powerful exploratory
    tool for data understanding. It shows the distribution of continuous data, allowing
    easy detection of outliers.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习的第一阶段是数据探索和数据准备.^([6](#Fn6)) 在这个阶段，需要对数据进行初步的探索性分析，以了解数据的分布和数据质量状况。描述性统计.^([7](#Fn7))
    是一种描述数据集特征的技术。它提供了总结数据集中心值（例如，均值、中位数和众数度量）和数据集内数据分散程度（例如，最小值、最大值和方差度量）的度量。直方图是另一种强大的数据理解探索工具。它显示了连续数据的分布，便于检测异常值。
- en: In addition to understanding the distribution of data, the quality of data needs
    to be inspected too. The reality is that data can be subject to a variety of errors
    depending on the source and the way it is generated. For example, when entered
    manually, there may be missing values, duplicate values, incomplete values, and
    outliers. Or there may be inconsistencies in the format and caliber of the data
    when it is extracted from various application systems. These data quality issues
    can lead to irrelevant or even incorrect analysis results. Therefore, the next
    important data preparation task is *data cleansing*, which is a process of detecting
    and correcting erroneous data in a dataset.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 除了了解数据的分布外，还需要检查数据的质量。现实情况是，数据可能会因来源和生成方式的不同而受到各种错误的影响。例如，当手动输入时，可能会有缺失值、重复值、不完整值和异常值。或者，当从各种应用系统中提取数据时，数据格式和尺寸可能存在不一致性。这些数据质量问题可能导致分析结果不相关甚至错误。因此，下一个重要的数据准备任务是*数据清洗*，这是一个检测和纠正数据集中错误数据的过程。
- en: 'Data quality can be improved by using *data transformation*. The following
    transformation methods are commonly used:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过使用*数据转换*来提高数据质量。以下是一些常用的转换方法：
- en: '**Missing values**: Fill missing values with default values, for example, using
    the average of the data values in this column or with the values of adjacent data.'
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺失值**：用默认值填充缺失值，例如，使用该列数据值的平均值或相邻数据值。'
- en: '**Various data formats**: Turn the data with various date formats into a uniform
    format, for example, extending all the phone numbers with country codes.'
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**各种数据格式**：将具有各种日期格式的数据转换为统一格式，例如，将所有电话号码扩展为国家代码。'
- en: '**Categorical values**: Encode categorical values to numerical values, for
    example, by determining the numerical range of all features and adjusting them
    to a uniform scale (normalization).'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类值**：将分类值编码为数值，例如，通过确定所有特征的数值范围并将它们调整到统一的比例（归一化）。'
- en: '**Outliers and duplicate values**: Remove outliers and duplicates from further
    inclusion.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常值和重复值**：从进一步包含中移除异常值和重复值。'
- en: 'Once you have clean and tidy data, the next step is *feature engineering*,
    which aims to get better training data for optimal models. Feature engineering
    includes sub-problems: feature selection, feature construction, and feature extraction.'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了干净整洁的数据，下一步就是 *特征工程*，其目的是为最优模型获取更好的训练数据。特征工程包括子问题：特征选择、特征构造和特征提取。
- en: '*Feature selection* is the technique of selecting the subset of input features
    that are most relevant to the target variable and discarding the features that
    are less relevant. For example, if the correlation between features is strong,
    it means that these features are redundant. Selecting redundant features or irrelevant
    features only increases the training time and does not improve the performance
    of models.^([8](#Fn8))'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: '*特征选择* 是选择与目标变量最相关的输入特征子集，并丢弃不那么相关的特征的技术。例如，如果特征之间的相关性很强，这意味着这些特征是冗余的。选择冗余特征或不相关特征只会增加训练时间，并不能提高模型的性能。[8](#Fn8)'
- en: '*Feature construction* is the process of constructing new features from original
    features. Creating new features requires data scientists’ deep insight and analytics
    skills to identify meaningful transformation from existing features, for example,
    combining attributes such as date-time-location, decomposing or slicing the original
    features such as from one feature that has three values [*green*, *yellow*, *unknown*]
    to three Boolean features – *is_green, is_yellow*, *and is_unknown* `–` or adding
    arithmetic operations such as *x*³ + *y* as a new feature.'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: '*特征构造* 是从原始特征构建新特征的过程。创建新特征需要数据科学家深入洞察和分析技能，以识别现有特征中的有意义转换，例如，结合日期时间位置等属性，分解或切片原始特征，如从具有三个值[*绿色*，*黄色*，*未知*]的一个特征到三个布尔特征
    – *is_green, is_yellow*，*and is_unknown* `–` 或添加算术运算如 *x*³ + *y* 作为新特征。'
- en: '*Feature extraction* is the process of reducing the dimensionality of the dataset
    by applying various dimensionality reduction algorithms, such as Principal Component
    Analysis (PCA), Independent Component Analysis (ICA), and Linear Discriminant
    Analysis (LDA). The purpose of feature extraction is to minimize the dimensionality
    of the data while ensuring that the important information of the target is retained.'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: '*特征提取* 是通过应用各种降维算法（如主成分分析（PCA）、独立成分分析（ICA）和线性判别分析（LDA））来降低数据集维度的过程。特征提取的目的是在确保保留目标重要信息的同时，最小化数据的维度。'
- en: Model Selection, Training, and Evaluation
  id: totrans-252
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型选择、训练和评估
- en: Choosing the right AI/ML algorithms to train your model is a creative process
    of mapping your business problem to an AI/ML toolset. Depending on the nature
    of the data you collect and prepare, you can determine which algorithms can solve
    the problem. Model selection, training, and evaluation are iterative processes
    in the AI lifecycle, in which data scientists do various experiments by exploring
    different models using different features.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 选择合适的 AI/ML 算法来训练你的模型是一个将你的业务问题映射到 AI/ML 工具集的创造性过程。根据你收集和准备的数据的性质，你可以确定哪些算法可以解决问题。模型选择、训练和评估是人工智能生命周期中的迭代过程，数据科学家通过探索不同的模型和不同的特征进行各种实验。
- en: The following Table [6-1](#Tab1) summarizes key questions that should be considered
    in AI model selection, training, and evaluation regarding business, data, and
    environment.^([9](#Fn9))
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 下表 [6-1](#Tab1) 总结了在人工智能模型选择、训练和评估中应考虑的关键问题，涉及业务、数据和环境。[9](#Fn9)
- en: Table 6-1
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 表 6-1
- en: Key questions to be answered when choosing and evaluating an AI model
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 选择和评估 AI 模型时需要回答的关键问题
- en: '|   | Model Selection/Training | Model Evaluation |'
  id: totrans-257
  prefs: []
  type: TYPE_TB
  zh: '|   | 模型选择/训练 | 模型评估 |'
- en: '| --- | --- | --- |'
  id: totrans-258
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Business | − Is it an exploration or prediction?− Do you need to detect anomalies
    or outliers?− Do you want a recommendation? | − Are there any domain-specific
    metrics to justify the model?− What is the expected output of the business problem?−
    Are there any quality and acceptance measures? |'
  id: totrans-259
  prefs: []
  type: TYPE_TB
  zh: '| 业务 | − 是否是探索或预测？− 是否需要检测异常或离群值？− 你是否需要一个推荐？ | − 是否有特定领域的指标来证明模型？− 业务问题的预期输出是什么？−
    是否有质量和接受度指标？ |'
- en: '| Data | − Is there a target to predict?− Is the prediction numeric or categorical?−
    Does the data need to be grouped or scaled?− What is the range of values for features
    and target in the data?− Do you need dimensionality reduction or manifold learning?−
    How to address missing data values?− Do you have labeled data?− Do you need to
    process unstructured data (i.e., text)?− What are potential hyperparameters? |
    − What is the type of model (classification, regression, clustering, etc.)?− What’s
    expected estimation error and approximation error?− What’s expected confusion
    matrix and precision, recall, and F1 measure?− What’s expected accuracy and error
    rate?− What’s expected ROC and AUC?− What’s expected cost curve?− What’s expected
    Shapley Additive exPlanations (SHAP) values’− What’s expected performance on the
    test/holdout dataset?− When conducting HPO, and how do you design hypothesis tests?
    |'
  id: totrans-260
  prefs: []
  type: TYPE_TB
  zh: '| 数据 | − 是否有预测的目标？− 预测是数值型还是分类型？− 数据需要分组或缩放吗？− 数据中特征和目标值的范围是什么？− 是否需要进行降维或流形学习？−
    如何处理缺失数据值？− 你有标记数据吗？− 你需要处理非结构化数据（即文本）吗？− 有哪些潜在的超参数？ | − 模型的类型是什么（分类、回归、聚类等）？−
    预期的估计误差和近似误差是多少？− 预期的混淆矩阵、精确度、召回率和F1度量是多少？− 预期的准确率和错误率是多少？− 预期的ROC和AUC是多少？− 预期的成本曲线是多少？−
    预期的Shapley加性解释（SHAP）值是多少？− 预期在测试/保留数据集上的性能如何？− 在进行HPO时，你如何设计假设检验？ |'
- en: '| Environment | − What ML frameworks do you have access to (proprietary or
    open source)?− What computing resources do you have?− Where is the data? How large
    is it?− Which platform will the model be deployed to?− Frequency of model retraining.−
    Is this a distributed training or deployment pattern? | − Do you need to explain
    the model?− Do you need to explain the output of the model?− Is it online or batch
    prediction (different way of collecting evidence for evaluation)?− What is the
    size of the model?− Is it possible to repeat the training process and gain the
    same model? |'
  id: totrans-261
  prefs: []
  type: TYPE_TB
  zh: '| 环境 | − 你能访问哪些机器学习框架（专有或开源）？− 你有什么计算资源？− 数据在哪里？有多大？− 模型将被部署到哪个平台？− 模型重新训练的频率。−
    是否需要解释模型？− 是否需要解释模型的输出？− 是在线预测还是批量预测（不同的证据收集方式用于评估）？− 模型的规模有多大？− 是否可以重复训练过程并获得相同的模型？
    |'
- en: In the model selection and model training phases, the questions to be thought
    about are similar, and therefore they have been combined into one column in the
    preceding table. However, the focus of the same question at these two stages is
    different. For example, for the question *Is the prediction numeric or categorical?*,
    model selection aims to find the characteristics of different data types, while
    model training is to identify applicable algorithms in conjunction with the data
    types.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型选择和模型训练阶段，需要思考的问题类似，因此它们在前面的表格中被合并为一列。然而，这两个阶段对同一问题的关注点是不同的。例如，对于问题“预测是数值型还是分类型？”，模型选择旨在找到不同数据类型的特征，而模型训练则是要识别与数据类型相结合的适用算法。
- en: The evaluation method depends on the nature of the problems. Classification
    models favor accuracy, precision, recall, F1 measure, Receiver Operating Characteristic
    (ROC), and area under the ROC curve, whereas regression models prefer mean absolute
    error (MAE), mean squared error (MSE), root mean squared error (RMSE), etc. Model
    evaluation is critical because AI models have the potential to make incorrect
    predictions.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 评估方法取决于问题的性质。分类模型倾向于准确性、精确度、召回率、F1度量、接收者操作特征（ROC）和ROC曲线下的面积，而回归模型则更偏好平均绝对误差（MAE）、均方误差（MSE）、均方根误差（RMSE）等。模型评估至关重要，因为AI模型有可能做出错误的预测。
- en: A model that has a zero error rate on the training dataset doesn’t mean it will
    perform well for unforeseen data in the future. A model can be tuned to master
    every detail of the training dataset, but it may fail to generalize prediction
    of new samples. This is called as *overfitting*. Model evaluation (a.k.a. offline
    testing) aims to overcome overfitting in the training process.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练数据集上具有零误差率的模型并不意味着它在未来的不可预见数据上会表现良好。一个模型可以被调整以掌握训练数据集的每一个细节，但它可能无法泛化对新样本的预测。这被称为*过拟合*。模型评估（也称为离线测试）旨在克服训练过程中的过拟合。
- en: 'As a rule of thumb for practitioners, follow these three steps to set up the
    model selection and evaluation process:'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 作为实践者的经验法则，遵循以下三个步骤来设置模型选择和评估过程：
- en: Design a sampling strategy to separate data into mutually exclusive datasets
    for training and testing.
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计一个采样策略，将数据分离成互斥的数据集用于训练和测试。
- en: Choose best-fit evaluation metrics to gauge performance of models.
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择最适合的评估指标来衡量模型性能。
- en: Conduct tests using different datasets to make comparisons against trained models
    and make the selection.
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用不同的数据集进行测试，以比较训练模型并做出选择。
- en: Model Deployment
  id: totrans-269
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型部署
- en: Model deployment is the final stage of delivering the model. It is the process
    of infusing the model into the production system (either in real time or through
    a batch interface). The previous chapter explains that a Data Fabric and Data
    Mesh is designed to address the challenges of accessing data in a distributed
    hybrid environment. Model scoring needs real-world data to make a prediction,
    and thereby model deployment also faces the challenge of accessing distributed
    data. Therefore, the model deployment pattern does not solely rely on how to integrate
    with applications, but the residency and the size of input data required by models,
    latency requirements, and so on. This section introduces some key decision factors
    for deploying AI/ML models.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 模型部署是模型交付的最终阶段。它是将模型注入生产系统（无论是实时还是通过批量接口）的过程。前一章解释了数据编织和数据网格旨在解决分布式混合环境中访问数据所面临的挑战。模型评分需要真实世界的数据来进行预测，因此模型部署也面临着访问分布式数据的挑战。因此，模型部署模式不仅依赖于如何与应用程序集成，还包括模型所需的数据驻留和输入数据大小、延迟要求等因素。本节介绍了部署AI/ML模型的一些关键决策因素。
- en: One aspect to consider is the AI/ML model format. There are many language-agnostic
    and vendor-specific serialization formats that exist in the industry. AI deployments^([10](#Fn10))
    can be characterized by using various programming languages and AI model standards.
    There are quite a few popular AI-related programming languages, such as Python
    (the most prominent one), Scala, R, Julia, and additional languages for notebooks,
    such as Ruby, Perl, F#, and C#. The choice of different programming languages
    allows for the implementation of different AI/ML frameworks and the corresponding
    model formats. In the open source world, several AI model`–`related standards^([11](#Fn11))
    exist, where the Predictive Model Markup Language (PMML), Open Neural Network
    eXchange (ONNX), and Portable Format for Analytics (PFA) are prominent examples.
    Although Spark is not a standard, it is still popular among data scientists and
    provides a de facto standardization, especially for Spark ML model exchange and
    portability.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 需要考虑的一个方面是AI/ML模型格式。在行业中存在许多语言无关和供应商特定的序列化格式。AI部署^([10](#Fn10))可以通过使用各种编程语言和AI模型标准来表征。有许多流行的AI相关编程语言，例如Python（最突出的一种）、Scala、R、Julia，以及用于笔记本的附加语言，如Ruby、Perl、F#和C#。不同编程语言的选择允许实现不同的AI/ML框架和相应的模型格式。在开源领域，存在几个与AI模型`–`相关的标准^([11](#Fn11))，其中预测模型标记语言（PMML）、开放神经网络交换（ONNX）和可移植分析格式（PFA）是突出的例子。尽管Spark不是一个标准，但它仍然在数据科学家中很受欢迎，并为Spark
    ML模型交换和可移植性提供了事实上的标准化。
- en: The following Table [6-2](#Tab2) highlights features of popular language-agnostic
    formats for the AI/ML model, namely, PMML, PFA, and ONNX.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表[6-2](#Tab2)突出了AI/ML模型流行语言无关格式的特点，即PMML、PFA和ONNX。
- en: Table 6-2
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 表6-2
- en: The language-agnostic formats of AI Model
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型的语言无关格式
- en: '| **Format** | **Human-Readable** | **Runtime Support** |'
  id: totrans-275
  prefs: []
  type: TYPE_TB
  zh: '| **格式** | **可读性** | **运行时支持** |'
- en: '| --- | --- | --- |'
  id: totrans-276
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| PMML | Yes (XML) | Python, R, C++, Java, or Scala |'
  id: totrans-277
  prefs: []
  type: TYPE_TB
  zh: '| PMML | 是（XML） | Python, R, C++, Java, 或 Scala |'
- en: '| PFA | Yes (JSON with the Avro schema for data types) | PFA-enabled runtime
    |'
  id: totrans-278
  prefs: []
  type: TYPE_TB
  zh: '| PFA | 是（带有Avro模式的数据类型的JSON） | PFA启用运行时 |'
- en: '| ONNX | No | TensorFlow, PyTorch, CNTK, CoreML, PaddlePaddle, ONNX-enabled
    runtimes |'
  id: totrans-279
  prefs: []
  type: TYPE_TB
  zh: '| ONNX | 否 | TensorFlow、PyTorch、CNTK、CoreML、PaddlePaddle、ONNX启用运行时 |'
- en: The choice of AI languages and standards depends on individual data scientists'
    use cases, skills, and preferences. Some AI models can be converted or integrated
    using specific standards. Python Scikit-learn models, for example, can be put
    into production using PMML or ONNX. However, in other cases, the owner of the
    AI model does not want to expose the model and therefore needs to consider how
    to package the model. For maximum compatibility, the model should be exported
    to a language-independent format.
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: AI语言和标准的选择取决于数据科学家个人的用例、技能和偏好。一些AI模型可以使用特定标准进行转换或集成。例如，Python Scikit-learn模型可以使用PMML或ONNX投入生产。然而，在其他情况下，AI模型的拥有者不希望公开模型，因此需要考虑如何打包模型。为了实现最大兼容性，模型应导出为与语言无关的格式。
- en: To protect the model (i.e., hide the implementation details of the model), it
    can be deployed in a proprietary format with a scoring engine that can be used
    to parse the model and perform inference on it.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保护模型（即隐藏模型的实现细节），它可以以专有格式部署，并带有评分引擎，该引擎可以用于解析模型并在其上进行推理。
- en: 'The next decision is about serving the model. There are a few patterns to choose
    from.^([12](#Fn12)) To determine a suitable pattern, you’ll need to consider the
    following factors: the size and the location of data, the size of the model, the
    latency of request, the cost of serving, etc.'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个决策是关于模型的服务。有几个模式可供选择。[12](#Fn12) 为了确定合适的模式，你需要考虑以下因素：数据的大小和位置、模型的大小、请求的延迟、服务的成本等。
- en: As shown in Figure [6-4](#Fig4), a RESTful API is suitable for real-time requests
    on a small amount of data, usually one record per request. The cost of serving
    a RESTful API is high since you need dedicated computing resources to make the
    service highly available. Streaming API should be used when a huge amount of data
    needs to be processed and the result is expected in near real time. Streaming
    API is asynchronous by design. Consider a messaging system with a queue to handle
    such requests.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[6-4](#Fig4)所示，RESTful API适用于小量数据的实时请求，通常每个请求一条记录。由于需要专用计算资源来确保服务的高可用性，因此服务RESTful
    API的成本较高。当需要处理大量数据且期望在接近实时的时间内得到结果时，应使用流式API。流式API设计为异步的。考虑一个带有队列的消息系统来处理此类请求。
- en: '![](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig4_HTML.png)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_6_Chapter/537582_1_En_6_Fig4_HTML.png)'
- en: A quadrant chart of the latency of requests versus the size of data represents
    the position of the RESTful, streaming, batch job, and on-demand in different
    quadrants.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 请求延迟与数据大小关系的象限图表示了RESTful、流式、批量作业和按需在不同象限中的位置。
- en: Figure 6-4
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-4
- en: Model Deployment Patterns
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 模型部署模式
- en: If you need to process a large amount of data but do not need the result right
    away, deploy the model into a batch job, which can be scheduled to run on predefined
    triggers (a specific time or an event) and yield output to external storage, for
    example, a database table. If the request is not sensitive to either latency or
    size of data, you can deploy the model on demand. This is sometimes referred to
    as serverless, which is more cost-effective since the computing resources are
    only required when there are incoming workloads.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要处理大量数据但不需要立即得到结果，可以将模型部署到批量作业中，它可以被安排在预定义的触发器（特定时间或事件）上运行，并将输出输出到外部存储，例如数据库表。如果请求对延迟或数据大小不敏感，可以按需部署模型。这有时被称为无服务器，因为它更经济高效，因为只有在有传入工作量时才需要计算资源。
- en: Natural Language Processing (NLP)
  id: totrans-289
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）
- en: 'Natural languages such as Chinese, English, and Japanese are flexible and versatile,
    but they cannot be well understood by computers. Natural Language Processing (NLP)
    was born to achieve communication between humans and computers using natural language.
    NLP is a field that integrates linguistics, computer science, mathematics, and
    other disciplines to study not only linguistics but also how to make computers
    process these languages. It is divided into two main directions: Natural Language
    Understanding (NLU), which is listening and reading, and Natural Language Generation
    (NLG), which is speaking and writing.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言，如中文、英语和日语，灵活多变，但计算机难以理解。自然语言处理（NLP）就是为了实现人类与计算机之间使用自然语言的交流而诞生的。NLP是一个将语言学、计算机科学、数学和其他学科相结合的领域，它不仅研究语言学，还研究如何使计算机处理这些语言。它分为两个主要方向：自然语言理解（NLU），即听和读，以及自然语言生成（NLG），即说和写。
- en: 'By the 1980s and 1990s, statistical ML algorithms were introduced into NLP,
    and rule-based approaches were gradually replaced by statistical-based approaches.
    During this phase, NLP made substantial breakthroughs and moved toward practical
    stages. From around 2008, as DL neural networks achieved remarkable results in
    image processing and speech recognition, DL was also applied to NLP: from the
    very first word embedding and word2vec to neural network models such as RNN, GRU,
    LSTM, and, more recently, attention mechanism, pre-trained language models, etc.
    With the addition of DL, there is significant progress made in NLP.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 到了20世纪80年代和90年代，统计机器学习算法被引入到NLP中，基于规则的途径逐渐被基于统计的方法所取代。在这一阶段，NLP取得了重大突破，并逐步走向实用阶段。从大约2008年开始，随着深度学习神经网络在图像处理和语音识别方面取得了显著成果，深度学习也被应用于NLP：从最初的词嵌入和word2vec到RNN、GRU、LSTM等神经网络模型，再到最近的注意力机制、预训练语言模型等。随着深度学习的加入，NLP取得了显著的进展。
- en: In natural language, words are the most basic units. For a computer to understand
    and process natural language, we first must encode words. Although it is easy
    to construct word vectors using one-hot encoding,^([13](#Fn13)) it does not represent
    the semantics of the words very well. Word2vec represents words as a fixed-length
    vector and learns the semantic information of words by context. It contains two
    models – one is predicting the context by a central word, and the other one is
    predicting a central word by the context.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 在自然语言中，单词是最基本的单位。为了使计算机能够理解和处理自然语言，我们首先必须对单词进行编码。尽管使用one-hot编码构建词向量很容易，^([13](#Fn13))但它并不能很好地表示单词的语义。Word2vec将单词表示为固定长度的向量，并通过上下文学习单词的语义信息。它包含两个模型——一个是通过中心词预测上下文，另一个是通过上下文预测中心词。
- en: At the same time as word vectors were proposed, the DL RNN framework was applied
    to NLP with great success in combination with word vectors. RNN is not perfect.
    It has problems like difficulty to parallelize and establish long-distance and
    hierarchical dependencies. The recent attention mechanism can help resolve these
    issues. The core idea is to filter out a small amount of important information
    from a large amount of information and focus on this information. It focuses less
    on other external data and instead focuses only on the input data itself and is
    better at capturing the relevance of the data internally.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 当提出词向量时，深度学习RNN框架与词向量结合在NLP中取得了巨大的成功。RNN并不完美。它存在难以并行化以及建立长距离和层次依赖的问题。最近提出的注意力机制可以帮助解决这些问题。其核心思想是从大量信息中过滤出少量重要信息并关注这些信息。它较少关注其他外部数据，而只关注输入数据本身，并且更擅长捕捉数据内部的相关性。
- en: While the application of DL gave NLP its first leap, the advent of pre-training
    models has given NLP its second leap. Pre-training learns a powerful language
    model from large-scale corpus data by self-supervised learning (without annotation),
    which is then migrated to specific tasks by fine-tuning to eventually achieve
    significant results.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然深度学习的应用使NLP实现了第一次飞跃，但预训练模型的出现为NLP带来了第二次飞跃。预训练通过自监督学习（无需标注）从大规模语料库数据中学习一个强大的语言模型，然后通过微调迁移到特定任务，最终实现显著的结果。
- en: After introducing the popular research advances in the field of NLP, let’s look
    at the business value of NLP, where still 80% of organizations are waking up to
    the fact that 80% of their content is unstructured.^([14](#Fn14)) The unstructured
    data includes surveillance video and images, customer support recordings, various
    reports, social media posts, historical documentation, operating manuals, and
    more. NLP can help companies uncover knowledge from text-related unstructured
    data.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 在介绍了NLP领域的流行研究进展后，让我们来看看NLP的商业价值，目前仍有80%的组织意识到他们80%的内容是非结构化的.^([14](#Fn14))
    非结构化数据包括监控视频和图像、客户支持录音、各种报告、社交媒体帖子、历史文档、操作手册等等。NLP可以帮助公司从与文本相关的非结构化数据中挖掘知识。
- en: For example, Woodside Energy^([15](#Fn15)) harnesses the power of NLP technology
    powered by IBM Watson to extract meaningful insights from 30 years of complex
    engineering data and help workers quickly find information and synthesize it into
    informed business decisions.^([16](#Fn16))
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Woodside Energy^([15](#Fn15))利用IBM Watson驱动的NLP技术从30年的复杂工程数据中提取有意义的见解，并帮助工作人员快速找到信息并将其综合为明智的商业决策.^([16](#Fn16))
- en: 'There are many other use cases for NLP:'
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: NLP有许多其他的应用场景：
- en: '**Virtual agents and chatbots**: A question expressed in natural language is
    analyzed to some extent (e.g., entity links, relational formulas, forming logical
    expressions, etc.). After the analysis is completed, possible candidate answers
    are found in the knowledge base, and the best answer is found by sorting. For
    example, auto-response customer service is widely used to improve and optimize
    customer relationship in the ecommerce industry to filter out a number of repetitive
    questions by replying to many basic and repetitive questions, thus enabling human
    customer service to serve customers better.'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**虚拟代理和聊天机器人**：对用自然语言表达的问题进行分析（例如，实体链接、关系公式、形成逻辑表达式等）。分析完成后，在知识库中找到可能的候选答案，并通过排序找到最佳答案。例如，自动响应客户服务在电子商务行业中广泛应用，通过回答许多基本和重复的问题来过滤出大量重复性问题，从而使得人工客户服务能够更好地服务客户。'
- en: '**Machine translation**: The most well-known NLP scenario is obtaining text
    in a source language and automatically translating the input source language text
    into a target language text. Today, this scenario already works very well.'
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器翻译**：最著名的自然语言处理场景是从源语言获取文本，并自动将输入的源语言文本翻译成目标语言文本。今天，这种场景已经运作得非常好。'
- en: '**Audio transcript**: Convert an audio file into a text file that can support
    the audience gaining a better understanding of the content in the audio and make
    the audio content searchable for future reference.'
  id: totrans-300
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**音频转录**：将音频文件转换为文本文件，以便观众更好地理解音频内容，并使音频内容可搜索，以便将来参考。'
- en: '**Sentiment analysis**: Analyzing the sentiment of massive customer support
    calls and social media comments to achieve a timely response to public opinion.'
  id: totrans-301
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**情感分析**：分析大量客户支持电话和社交媒体评论的情感，以实现对公众舆论的及时响应。'
- en: '**Text summarization**: Extract key information from a huge amount of text
    to save people time and effort reading the entire document, finding relevant information
    easily and quickly.'
  id: totrans-302
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文本摘要**：从大量文本中提取关键信息，节省人们阅读整个文档的时间和精力，便于快速找到相关信息。'
- en: '**Grammar check and correction**: Automatically correct grammar or spelling
    mistakes to improve the quality and correctness of the writing.'
  id: totrans-303
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语法检查和纠正**：自动纠正语法或拼写错误，以提高写作的质量和正确性。'
- en: Key Takeaways
  id: totrans-304
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [6-3](#Tab3).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用表[6-3](#Tab3)中总结的几个关键要点来结束本章。
- en: Table 6-3
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 表 6-3
- en: Key Takeaways
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-308
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-309
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | There are three types of ML. | Supervised learning derives the prediction
    function from the labeled training data, while unsupervised learning finds hidden
    patterns with unlabeled training data. Reinforcement learning doesn’t require
    a large amount of training data but does trial and error to get maximum outcome
    based on predefined criteria. |'
  id: totrans-310
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 机器学习有三种类型。| 监督学习从标记的训练数据中推导出预测函数，而无监督学习通过未标记的训练数据找到隐藏的模式。强化学习不需要大量的训练数据，但通过试错来根据预定义的标准获得最大结果。|'
- en: '| 2 | There are some types of problems that ML and DL are good at solving.
    | ML and DL can solve the problems like classification (A or B), regression (how
    much), anomaly detection, clustering, and best next action. |'
  id: totrans-311
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 机器学习和深度学习擅长解决一些类型的问题。| 机器学习和深度学习可以解决分类（A或B）、回归（多少）、异常检测、聚类和最佳下一步行动等问题。|'
- en: '| 3 | ML/AI addresses a broad set of industry use cases. | Predictive maintenance
    in manufacture, fraud detection in finance, network planning in telecom, in-car
    interactive experience in automobile, etc. |'
  id: totrans-312
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 机器学习/人工智能解决了一系列广泛的行业用例。| 制造业的预测性维护、金融中的欺诈检测、电信中的网络规划、汽车中的车载交互体验等。|'
- en: '| 4 | Feature engineering includes several subfields. | Feature engineering
    includes sub-problems, which are feature selection, feature construction, and
    feature extraction. |'
  id: totrans-313
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 特征工程包括几个子领域。| 特征工程包括子问题，这些子问题包括特征选择、特征构造和特征提取。|'
- en: '| 5 | The model evaluation method depends on the nature of the business problems.
    | Classification models favor accuracy, precision, recall, F1 measure, ROC, and
    area under the ROC curve, whereas regression models prefer mean absolute error
    (MAE), mean squared error (MSE), and root mean squared error (RMSE). |'
  id: totrans-314
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 模型评估方法取决于业务问题的性质。| 分类模型倾向于准确性、精确度、召回率、F1度量、ROC和ROC曲线下的面积，而回归模型则更偏好平均绝对误差（MAE）、平均平方误差（MSE）和均方根误差（RMSE）。|'
- en: '| 6 | It’s a multi-factor decision to choose a model deployment pattern. |
    Model deployment patterns do not solely rely on the integration with applications
    but the residency and size of input data required by models, latency requirements,
    etc. |'
  id: totrans-315
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 选择模型部署模式是一个多因素决策。 | 模型部署模式不仅依赖于与应用程序的集成，还包括模型所需的数据驻留和大小、延迟要求等。 |'
- en: '| 7 | NLP is divided into two main directions. | Natural Language Understanding
    (NLU), which is listening and reading, and Natural Language Generation (NLG),
    which is speaking and writing. |'
  id: totrans-316
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 自然语言处理（NLP）分为两个主要方向。 | 自然语言理解（NLU），即听和读，以及自然语言生成（NLG），即说和写。 |'
- en: '| 8 | There are many other use cases for NLP. | Virtual agents and chatbots,
    machine translation, audio transcript, sentiment analysis, text summarization,
    grammar check and correction, etc. |'
  id: totrans-317
  prefs: []
  type: TYPE_TB
  zh: '| 8 | 自然语言处理（NLP）有许多其他的应用场景。 | 虚拟代理和聊天机器人、机器翻译、音频转录、情感分析、文本摘要、语法检查和纠正等。 |'
