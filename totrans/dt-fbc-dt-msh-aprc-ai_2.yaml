- en: 8. AI for Entity Resolution
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'It is widely accepted that an organization’s success is increasingly dependent
    on its ability to derive value from the data it has. However, many organizations
    are still stuck on the first step – understanding the data `–` especially as the
    volume and complexity of data continue to grow. Think about a simple question:
    *How many customers does your enterprise have?* For many businesses, providing
    an accurate answer to this question remains difficult.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The reason is quite simple: large organizations often have multiple departments,
    product lines, and sales channels that collect a wide variety of customer information.
    A customer may be registered with a different email address and be identified
    as a different user in multiple systems. Not to mention the new companies that
    come in through acquisitions. The format in which customer information is stored
    varies widely. Therefore, identifying the same customer across multiple systems
    is key for laying the trust foundation for analytics and AI for the enterprise
    and for implementing a sustainable Data Fabric architecture and corresponding
    Data Mesh solution.'
  prefs: []
  type: TYPE_NORMAL
- en: This chapter is a deep dive into the third use case scenario (customer 360),
    which we have elaborated on in Chapter [3](537582_1_En_3_Chapter.xhtml). It outlines
    novel AI-infused capabilities for entity matching, which can significantly improve
    trust in consuming core information.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The data used to describe the core business entities of an enterprise is referred
    to as master data, managed via MDM systems. Enterprise master data has high business
    value, can be reused across business units within an enterprise, and is often
    distributed across multiple heterogeneous application systems.
  prefs: []
  type: TYPE_NORMAL
- en: There are many types of enterprise master data. The most common are suppliers
    and customers. In addition, industries may have specific types of master data.^([1](#Fn1))
    Ecommerce companies must have a holistic view of channels and distributors for
    cross-selling and upselling. Healthcare requires a 360-degree view of patients
    for personalized treatment, healthcare services, and insurance plans. Manufacturers
    care about materials, parts, and prices, which are critical to their procurement.
  prefs: []
  type: TYPE_NORMAL
- en: For different business departments within an enterprise, their master data is
    also different. Customer information is undoubtedly critical for sales and marketing
    departments. Product information including product releases and categories is
    a core asset for R&D departments. The employee information, organizational structure,
    as well as departmental hierarchies are of primary concerns to the human resource
    department.
  prefs: []
  type: TYPE_NORMAL
- en: Having complete and accurate sets of master data helps enterprises streamline
    the process, improve customer experience, and optimize resources. However, in
    the real world, the same data can be represented in different formats by various
    systems because of spelling, abbreviations, languages, format, etc. Let’s look
    at the example in Figure [8-1](#Fig1). In this example, *name*, *address,* and
    *phone number* are identity attributes. However, in the *Employee* table, *name*
    and *address* are composite attributes, while in the *Order* table, they are atomic
    attributes. But it’s easy to map the composite attributes in the first table to
    the second table.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two tables of employee information and an order table. The columns in the employee
    tables include first name, middle name, last name, primary phone, address line
    1, address line 2, city, zip code, state, and country. In the second table, the
    columns include name, shipping address, country, mobile phone, and t-shirt size.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-1
  prefs: []
  type: TYPE_NORMAL
- en: Different Records for the Same Person
  prefs: []
  type: TYPE_NORMAL
- en: The formats of the preceding relevant attributes are slightly different. The
    mobile phone in the *Order* table doesn’t have the country code. The data value
    in the column *Country* is also presented differently. Nevertheless, Jennifer
    Gates and Philip Jones in both systems are most likely referring to the same customers,
    respectively, because of the similarity of corresponding attributes.
  prefs: []
  type: TYPE_NORMAL
- en: Going back to the question at the beginning of this chapter, *how many customers
    does the business really have?* If duplicate records are not removed from the
    same system or merged across different systems, the business may have far more
    customers than it actually has, which can lead to bad decisions or even serious
    business ramifications.
  prefs: []
  type: TYPE_NORMAL
- en: Let us begin with an introduction into entity matching.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing Entity Matching
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Entity matching^([2](#Fn2)) is referring to the process of recognizing the same
    entity (people, products, suppliers, etc.) in the real world across datasets from
    the same or disparate data sources. Matching within the same data source is mainly
    for the purpose of identifying duplicate entity records, where the similarity
    of the same attributes is calculated directly. Matching between data sources is
    done to establish linkages between entities from different data sources and thus
    creates a comprehensive view of the entities. The calculation of similarity is
    a bit more complex. The similarity of attributes is first calculated, followed
    by the similarity computation of the values of similar attributes.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the *Insurance* database as depicted in Figure [8-2](#Fig2) has
    a *Customer* table with the attribute *Name*. The values corresponding to the
    attribute *Name* are Bob Lyle and Robert Lyle. They might refer to the same person.
    The *Retail* database also has a *Customer* table with two attributes, *Last Name*
    and *First Name*. First, match the *First Name* and *Last Name* and *Name* in
    both tables. Then compare the record values of these attributes to see if the
    records are similar.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Two tables of insurance and retail information. The insurance table includes
    the name, address, and contact. The retail table includes their first and last
    name and emails. The text at the bottom of the 2 tables reads self-service capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-2
  prefs: []
  type: TYPE_NORMAL
- en: The Illustration of Entity Matching
  prefs: []
  type: TYPE_NORMAL
- en: What is somewhat ironic, however, is that entity matching itself has many variations
    of what it is called – entity resolution,^([3](#Fn3)) record linkage, duplication,
    etc.
  prefs: []
  type: TYPE_NORMAL
- en: Why does entity matching matter? With the explosive growth of data volume, enterprises
    are facing an increasingly severe data silo problem. The causes of data silos
    are both internal and external. First, when IT applications go live, they do not
    consider a unified data architecture, and the data models in the applications
    can vary, for example, the design of the customer table for the credit card system
    may be different from the deposit and loan systems. In addition, if data are outsourced,
    such as potential customer data for marketing activities, the definition of the
    prospect entity is likely to be different from the self-built systems. Lacking
    an effective way to identify the relationship between these records and to merge
    the records for the same entity, the value of this data will diminish greatly.
    The problem not only arises from the business side but also from the end user,
    where some information may be entered incorrectly or where a change of name, a
    change of cell phone number, or a move causes changes in personal information,
    resulting in inconsistent records from period to period.
  prefs: []
  type: TYPE_NORMAL
- en: 'Entity matching is the foundational technology that provides a single truth.
    Companies can use entity matching to see the whole picture: on the one hand, to
    customize the experience for customers and increase sales and, on the other hand,
    to continuously assess risk and identify suspicious behaviors in a timely manner.'
  prefs: []
  type: TYPE_NORMAL
- en: Traditional Entity Resolution Approaches
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Entity matching is generally considered to be a process consisting of multiple
    steps. Although the specific steps vary, they all include the steps depicted in
    Figure [8-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram of the reference model of a traditional entity. It begins with
    data collection from data sources A and B, followed by data pre-processing, blocking,
    similarity computation, matching decisions, and merging.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-3
  prefs: []
  type: TYPE_NORMAL
- en: The Reference Model of Traditional Entity Matching
  prefs: []
  type: TYPE_NORMAL
- en: 'The first step is data preprocessing. The goal in this stage is to transform
    data into a consistent structured format with the same caliber, such as units,
    types, and abbreviations. Data preprocessing also includes schema matching. The
    aim is to identify attributes between data sources that should be compared with
    each other, essentially identifying semantically relevant attributes. For example,
    the *Address* column in one table should be linked to one or many columns (*Address
    Line 1*, *Address Line 2*, *Street Name*, *City Name*). The traditional way is
    to build a global dictionary that consists of all possible ways of a single attribute
    representation. In this case, the entry in the dictionary is (Key: *Address*,
    Value: *Address Line 1*, *Address Line 2*, *Street Name*, *City Name*).^([4](#Fn4))'
  prefs: []
  type: TYPE_NORMAL
- en: The second step is blocking,^([5](#Fn5)) as shown in Figure [8-4](#Fig4). This
    phase is particularly important in the context of big data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram consists of two data sources, A and B, scattered on the left
    side. The sources form three clusters, with A and B combined in each cluster.
    Each cluster contains three A and two B.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-4
  prefs: []
  type: TYPE_NORMAL
- en: The Illustration of Blocking
  prefs: []
  type: TYPE_NORMAL
- en: The computational complexity of entity matching is related to the amount of
    the data sample. For example, if there are 10,000 customer records in a table
    from data source A and 100,000 customer records in a table from data source B,
    then a billion pairwise comparisons (100,000 `×` 10,000) will be performed, which
    is very time-consuming. The idea of blocking is to reduce the complexity of the
    computation by dividing the data from disparate data sources into much smaller
    blocks and comparing only the data records within the blocks. This significantly
    reduces the complexity of the computation from a quadratic amount of total data
    to a quadratic number of blocks. The key steps in blocking as illustrated in Figure
    [8-4](#Fig4) are extracting tokens (combinations of attributes) from records and
    mapping the records to one or more blocks. There are many blocking algorithms.^([6](#Fn6))
    The two main categories are hash-based and sort-based. As the name suggests, hash-based
    blocking is mapped to blocks by tokens, while sort-based is sorting the tokens
    and taking a fixed-size window as blocks.
  prefs: []
  type: TYPE_NORMAL
- en: The next step is similarity computation. The similarity between two records
    is calculated by aggregating the similarity value of corresponding attributes
    on the assumption that attributes are independent. The core elements of this stage
    are the similarity function and attribute selection.
  prefs: []
  type: TYPE_NORMAL
- en: The classic method is rule-based. For example, *if two records have similar
    names and similar addresses, they refer to the same entity*. In this example,
    the selected attributes are *name* and *address*. *Similarity* is a probabilistic
    matching and is usually defined by a similarity function, such as the Jaccard
    similarity or index,^([7](#Fn7)) which measures the similarity of two datasets
    by the percentage of the total number of common values and the total number of
    distinct values in two datasets, as illustrated in Figure [8-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of set A Jennifer gates shopping cart and set B Philip Jone
    shopping cart. The text reads Jaccard similarity between set A and set B = A intersects
    B over A union B = 4 by 8 = 50%.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-5
  prefs: []
  type: TYPE_NORMAL
- en: An Illustration of the Jaccard Similarity Between Two Sets
  prefs: []
  type: TYPE_NORMAL
- en: The rule-based method is straightforward and easy to implement. However, it
    usually requires deep domain knowledge to be constructed manually, and it’s hard
    to adjust. In addition, it is not scalable. Once the problem space increases,
    rule-based systems quickly become unmanageable.
  prefs: []
  type: TYPE_NORMAL
- en: The final stage is matching decisions and merging, as depicted in Figure [8-6](#Fig6).
    The matching decision is made by comparing the similarity value with the attribute-level
    threshold, and the record-level threshold determines whether the two records match.
    Once two records are identified as the same entity, these two records are consolidated
    into a single representative of the object.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A table of the merging process displays birth date, customer lifetime value,
    gender, home telephone, given name, last name, address line 1, city, postal code,
    and state or province value.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-6
  prefs: []
  type: TYPE_NORMAL
- en: An Example of Merging
  prefs: []
  type: TYPE_NORMAL
- en: Use of AI to Resolve Entity Challenges
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many problems in the entity matching process can be solved by ML methods. Chapter
    [6](537582_1_En_6_Chapter.xhtml) explains the difference between non-learning
    programming and ML. Instead of manually selecting the attributes/tokens and constructing
    the rules manually for entity resolution, the ML method learns an optimal solution
    for matching results from training datasets. Let us examine for each entity matching
    stage which ML method can be applied.
  prefs: []
  type: TYPE_NORMAL
- en: '**Data preprocessing**: Schema matching is to find similar attributes between
    source schema A and target schema B. The problem can be translated to a classical
    clustering problem given the features of attributes in source A and target B.
    The features of attributes are extracted by metadata of the schema (column name,
    the type of data, unique constraints) and the statistics of data in the field
    (max, min, average for numeric data, etc.). With extracted features for each attribute,
    K-means and SOM (Self-Organizing Map) put attributes with similar features to
    clusters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Blocking**: The essence of blocking is to put data records that are likely
    to refer to the same entity in one data block and discard dissimilar and irrelevant
    data as much as possible. With the training datasets having labels where matching
    pairs and non-matching pairs are marked, supervised learning helps select the
    attributes/tokens and the transformation functions that map matching pairs to
    the same block and non-matching pairs to disjunctive blocks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even if the labeled data is not available either because no prior knowledge
    is available or labeling is too expensive, unsupervised learning can come into
    play, using clustering algorithms to facilitate subsequent supervised learning.
    There are several clustering algorithms that help to obtain approximate labels.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Similarity computation**: The learning goal is finding the best similarity
    computation method for known matched and unmatched data in the training set. SVM
    (Support Vector Machine) and decision tree are classification algorithms that
    are often used in practices to find the best similarity computation method.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Matching decision**: Learning the right thresholds for matching decisions
    is a supervised learning problem. Using different thresholds influences the matching
    decision.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the rise of DL, a neural network has a wide range of uses in the entity
    matching process.^([8](#Fn8)) Originally it is merely a classifier for a determination
    of whether the records are matching or not. Now it is expanding the role to address
    the challenges of every step in the process. Feature extraction, schema matching,
    blocking, and similarity measures are especially interesting in this regard since
    DL methods increasingly reduce the need for tedious handcrafting efforts. The
    basic DL methods in this space are Recurrent Neural Networks (RNNs).^([9](#Fn9))
  prefs: []
  type: TYPE_NORMAL
- en: Active learning is also applicable for entity matching to overcome the challenges
    of lack of annotated data. The idea behind is that the active learner selects
    a small set of the most informative records from the unlabeled datasets for the
    expert to label and then learns an effective classifier from labeled data. The
    goal is to achieve high classifier performance with relatively low labeling costs.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [8-7](#Fig7) is an illustration of the reference model for an AI-based
    entity matching process.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A process illustration of A I-based entity matching. It begins with training
    data of source and target, followed by pre-processing schema matching, blocking,
    and similarity computation.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-7
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of an AI-Based Entity Matching Process
  prefs: []
  type: TYPE_NORMAL
- en: The Benefits and Cost of an AI-Based Solution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are several limitations to the traditional entity matching approach.
    Firstly, rule-based matching approaches completely rely on the knowledge of domain
    experts. However, this method is not very accurate and is somewhat subjective.
    For example, consider the rule: *if two records have a similar address value,
    then they are matched*.'
  prefs: []
  type: TYPE_NORMAL
- en: Imagine the situation because if you are currently renting a place where a previous
    tenant had credit risks, then your credit will also be impacted assuming you are
    the same person, which is obviously unfair. Also, the cost of constructing rule-based
    is high and requires the heavy lifting of coding all the knowledge into rules
    for enumeration.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, the traditional approaches require manual efforts to select attributes
    for schema matching and blocking. This is not just labor-intensive but also error-prone.
    The selection of the appropriate blocking strategy and the ad hoc adjustments
    make this task nontrivial. If the manual selection strategy is not optimal, very
    likely similar records are assigned to different blocks, which leads to a high
    rate of missing pairing, or too many unrelated records are assigned to the same
    block, resulting in a waste of computational resources.
  prefs: []
  type: TYPE_NORMAL
- en: AI-based solutions go a long way to solving these challenges. Firstly, AI learns
    based on historical data, breaking through the limitations of expert experience
    and also unearthing potentially hidden patterns from the data to achieve optimal
    solutions. At the same time, the use of ML or DL can automate time-consuming and
    laborious tasks to the greatest extent possible and will also reduce human error.
  prefs: []
  type: TYPE_NORMAL
- en: However, all advantages come at a cost. In general, the execution time of AI-based
    solutions is significantly worse than that of non-learning methods and not scalable
    for large datasets. This is especially true for DL, which requires specific hardware
    acceleration. Also, the effectiveness of ML approaches is known to depend on the
    provision of training data. It takes a lot of time to receive and clean the data,
    not to mention the need to correctly label the data for a high-quality model.
    This all adds to the difficulty of building an AI solution.
  prefs: []
  type: TYPE_NORMAL
- en: The distribution of data and the positive and negative instances have a great
    impact on the accuracy and fairness of models. Last but not the least, the use
    of DL also faces the problem of interpretability. While there are many benefits
    to AI-based solutions, there are also costs associated with them that need to
    be weighed carefully.
  prefs: []
  type: TYPE_NORMAL
- en: Considerations for MDM Solutions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As mentioned earlier, entity resolution is the core of MDM. Having understood
    how entity resolution works, let’s return to the MDM solution. Without a doubt,
    one of the most important considerations in choosing a master data solution is
    the accuracy, efficiency, and automation level of entity resolution. Ideally,
    the solution should provide rich built-in models for attribute mapping and record
    mapping and automate the entire matching process as much as possible when data
    is ingested.
  prefs: []
  type: TYPE_NORMAL
- en: See one example in Figure [8-8](#Fig8). When the *Auto Insurance Customers_shaped*
    table is ingested, the columns are automatically mapped to built-in data models.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the auto insurance customer shape. It displays the customer's
    information, name, country, latitude, and longitude mapped to the customer key,
    legal name, primary residence, latitude degrees, and longitude degrees.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-8
  prefs: []
  type: TYPE_NORMAL
- en: Auto-mapping
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, a generic model may not be applicable because of the different domains
    in which companies operate. This requires an MDM solution to provide capabilities
    to allow users to bring their own customized models and have the flexibility to
    map the attribute of the model to data columns, as depicted in Figure [8-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_8_Chapter/537582_1_En_8_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the I B M match 360 Watson home has edit attributes, match strength
    status as strong. On the right panel, attributes, birth date, gender, and address
    check boxes are selected.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 8-9
  prefs: []
  type: TYPE_NORMAL
- en: Customized Model
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the core functions, the upstream of the MDM system should be
    tightly integrated with the enterprise data architecture, allowing streamlined
    access to different types of data sources, to either ETL, virtualize, or replicate.
  prefs: []
  type: TYPE_NORMAL
- en: In the meantime, it needs to be tightly integrated with the enterprise asset
    catalog. Master data, as an important asset, is published in the enterprise asset
    catalog for various departments within the enterprise to query and consume.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [8-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 8-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | There are many types of enterprise master data. | The most common master
    data are suppliers and customers. There are also industry-specific master data
    – *channels* and *distributors* for ecommerce, *patients* for healthcare, *materials
    and parts* for manufacture. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Entity matching is referring to the process of recognizing the same entity.
    | Matching within the same data source is mainly for the case of duplicate entity
    records in the data source. Matching between data sources is for better correlating
    entities between different data sources for a more comprehensive view of the entity.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Entity matching itself has many variations. | It is called entity resolution,
    record linkage, duplication, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Entity matching is a process consisting of multiple steps. | It consists
    of preprocessing to clean data and match schemas, blocking to reduce the comparison
    complexity, and similarity computation and merging for outcome. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Many problems in the entity matching process can be solved by ML methods.
    | Essentially entity matching is a classification problem for labeled data and
    a clustering problem for unlabeled data. SVM, K-means, and decision tree are common
    algorithms. |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Entity matching is a key capability for Data Fabric and Data Mesh. |
    A Data Fabric architecture and Data Mesh solution needs to include an entity matching
    capability for core information to guarantee trust in core information, that is,
    customer, partner, supplier, citizen, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | A MDM solution is more than an entity matching engine. | The capabilities
    of allowing users to bring their own models and have the flexibility to map the
    attributes of the model to data columns are also important. |'
  prefs: []
  type: TYPE_TB
