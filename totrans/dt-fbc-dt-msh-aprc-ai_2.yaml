- en: 9. Data Fabric and Data Mesh for the AI Lifecycle
  id: totrans-605
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. AI 生命周期中的数据编织和数据网格
- en: With the development of AI in technology and business, AI is no longer an experiment
    limited to a select few data scientists. It will penetrate all aspects of enterprise
    business operations and continue to innovate and optimize for new business scenarios.
    Now the focus shifts from the competition of AI algorithms to how to combine the
    strength of expert teams and AI technology for the actual needs of the enterprise
    and industry to generate business value.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 随着技术和商业领域人工智能的发展，人工智能不再仅限于少数数据科学家进行的实验。它将渗透到企业业务运营的各个方面，并继续为新的商业场景进行创新和优化。现在，焦点从人工智能算法的竞争转移到了如何结合专家团队和人工智能技术的优势，以满足企业和行业的实际需求，从而产生商业价值。
- en: To put data and AI into production means enterprises not only need to create
    AI models but also operationalize AI workloads, which means practicing AI effectively
    and efficiently and, more importantly, doing it in a way that instills confidence
    in the outcome. Therefore, it is crucial to establish a verifiable AI full lifecycle
    management system within the enterprise.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据和人工智能投入生产意味着企业不仅需要创建 AI 模型，还需要使 AI 工作负载运营化，这意味着有效地和高效地实践人工智能，更重要的是，以能够使结果令人信服的方式进行。因此，在企业内部建立可验证的
    AI 全生命周期管理系统至关重要。
- en: Let us dive into this topic by introducing the AI lifecycle.
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过介绍 AI 生命周期来深入探讨这个主题。
- en: Introduction to the AI Lifecycle
  id: totrans-609
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI 生命周期的简介
- en: AI and software engineering have fundamental differences. Traditional software
    is rule-driven, where the programmer translates the solution to a problem into
    clear logical rules, while AI is more data-driven, which is based on training
    sets of data and a set of selected algorithms. Traditional software decomposes
    the problem into components, modules, and functions till the lines of code. It
    always has a deterministic output for each building block, and all building blocks
    orchestrate to produce deterministic outputs for the systems for the same input.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和软件工程有根本性的区别。传统的软件是规则驱动的，程序员将问题的解决方案转化为清晰的逻辑规则，而人工智能则是更偏向数据驱动的，它基于数据集和一系列选定的算法。传统的软件将问题分解为组件、模块和函数，直到代码行。它总是为每个构建块提供确定性的输出，并且所有构建块协同工作，为相同的输入产生确定性的输出。
- en: AI works in a very different way. Without explicit rules defined, the AI model
    is trained to find an approximation of the optimal solution to the problem. The
    efficiency of the solution depends on the quality of the data used for training,
    the effectiveness of selected features, and the sophistication of the algorithm.
    It implements using a *stepwise approximation plus search* strategy to find a
    set of parameters (models) to minimize the loss function.
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能以非常不同的方式工作。没有定义明确的规则，人工智能模型被训练去寻找问题的最优解的近似。解决方案的效率取决于用于训练的数据质量、所选特征的有效性和算法的复杂性。它通过使用“逐步近似加搜索”策略来找到一组参数（模型），以最小化损失函数。
- en: Therefore, AI engineering is a whole new field. According to Gartner technology
    trend 2022,^([1](#Fn1)) “AI engineering automates updates to data, models, and
    applications to streamline AI delivery. Combined with strong AI governance, AI
    engineering will operationalize the delivery of AI to ensure its ongoing business
    value.” In essence, AI engineering is a collection of methods, tools, and practices
    that expedite the entire AI lifecycle and ensures the efficient delivery of AI
    models that are robust, trustworthy, and interpretable and that continue to create
    value for the enterprise.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，人工智能工程是一个全新的领域。根据 Gartner 2022 年技术趋势^([1](#Fn1))，“人工智能工程自动化数据、模型和应用程序的更新，以简化人工智能交付。结合强大的人工智能治理，人工智能工程将使人工智能的交付实现商业化，确保其持续的商业价值。”本质上，人工智能工程是一系列方法、工具和实践的集合，它加速了整个人工智能生命周期，并确保了高效交付稳健、可信且可解释的人工智能模型，并持续为企业创造价值。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig1_HTML.png)'
  id: totrans-613
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig1_HTML.png)'
- en: The cyclic illustration of A I include A I engineering, A I governance, understand
    business problems, collect data, prepare data, build A I models, deploy A I models,
    and monitor A I models.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的循环图包括人工智能工程、人工智能治理、理解业务问题、收集数据、准备数据、构建人工智能模型、部署人工智能模型和监控人工智能模型。
- en: Figure 9-1
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-1
- en: The Stages of the AI Lifecycle
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能生命周期的阶段
- en: 'Although there are multiple reference models^([2](#Fn2)) of the AI lifecycle
    in the industry, most of them comprise the following common stages from conception
    to maintenance, as shown in Figure [9-1](#Fig1):'
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在业界存在多个人工智能生命周期的参考模型^([2](#Fn2))，但大多数模型都包含从构思到维护的以下共同阶段，如图 [9-1](#Fig1) 所示：
- en: '**Understand the business problem**: Data scientists learn from domain experts
    to understand business problems, research the necessity and feasibility of AI,
    and define key metrics of the AI project – not only performance metrics of the
    model itself but also service-level metrics^([3](#Fn3)):'
  id: totrans-618
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**理解业务问题**：数据科学家从领域专家那里学习，理解业务问题，研究人工智能的必要性和可行性，并定义人工智能项目的关键指标——不仅包括模型本身的性能指标，还包括服务级别的指标^([3](#Fn3))：'
- en: '**Service latency**: The time it takes to load models and prepare required
    features'
  id: totrans-619
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**服务延迟**：加载模型和准备所需特征所需的时间'
- en: '**Inference latency**: The time the model takes to make a prediction for a
    given input'
  id: totrans-620
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**推理延迟**：模型对给定输入进行预测所需的时间'
- en: '**Collect data**: Data scientists request data access that is required for
    AI projects. This stage is often the most time-consuming and labor-intensive if
    the enterprise has not established a trusted enterprise-level data foundation
    for analytics. Data scientists not knowing what kind of business data is available
    in what format may struggle to make specific data requests, so much so that the
    process may be repeated several times until the required data is finally obtained.
    Therefore, it’s not an overstatement that “74% of AI adopters say that data access
    is a challenge.” New industry regulations are making this even more challenging.'
  id: totrans-621
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**收集数据**：数据科学家请求 AI 项目所需的数据访问权限。如果企业尚未建立用于分析的受信任的企业级数据基础，那么这一阶段通常是耗时最长、劳动强度最大的。如果数据科学家不知道以何种格式可用哪些类型的业务数据，他们可能难以提出具体的数据请求，以至于这个过程可能需要重复多次，直到最终获得所需的数据。因此，说“74%
    的 AI 采用者表示数据访问是一个挑战”并不夸张。新的行业法规使这一挑战变得更加严峻。'
- en: '**Prepare data**: When datasets are available, data scientists start to wrangle,
    explore, and cleanse datasets. The challenges in this stage for data scientists
    are the following:'
  id: totrans-622
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**准备数据**：当数据集可用时，数据科学家开始整理、探索和清洗数据集。在这一阶段，数据科学家面临的挑战如下：'
- en: '*How to identify flaws in the data*? Since datasets are from disparate data
    sources and often produced by different business applications, datasets have various
    types of quality issues, for example, missing values, duplicated records, inconsistent
    values, etc.'
  id: totrans-623
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*如何识别数据中的缺陷*？由于数据集来自不同的数据源，通常由不同的业务应用程序生成，因此数据集存在各种类型的质量问题，例如缺失值、重复记录、不一致的值等。'
- en: '*How to visualize large datasets*? Visualization helps data scientists identify
    outliers in the data, understand the statistics of datasets, and prepare for the
    feature engineering in the next stage.'
  id: totrans-624
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*如何可视化大数据集*？可视化有助于数据科学家识别数据中的异常值，了解数据集的统计信息，并为下一阶段的特征工程做准备。'
- en: '**Build models**: This stage requires the creativity of data scientists. First,
    data scientists extract features from datasets, and quite often data scientists
    derive new features from raw data by aggregation or transformation for better
    results of prediction. Second, data scientists build models by splitting datasets
    between training and testing, training models including HPO (Hyperparameter Optimization),
    and evaluating models. This is an iterative process.'
  id: totrans-625
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**构建模型**：这一阶段需要数据科学家的创造力。首先，数据科学家从数据集中提取特征，并且数据科学家通常通过聚合或转换原始数据来推导新的特征，以获得更好的预测结果。其次，数据科学家通过在训练集和测试集之间划分数据集、训练模型（包括超参数优化
    HPO）和评估模型来构建模型。这是一个迭代的过程。'
- en: '**Deploy models**: This is where ML engineers take control from data scientists.
    It may involve the reimplementation of models in a scalable fashion because of
    service-level requirements defined in the first stage. There are several examples:'
  id: totrans-626
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**部署模型**：这是机器学习工程师从数据科学家手中接管控制的地方。由于第一阶段中定义的服务级别要求，可能需要以可扩展的方式重新实现模型。以下是一些例子：'
- en: Rewrite the Python model into Java/C++ for better performance.
  id: totrans-627
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将 Python 模型重写为 Java/C++ 以获得更好的性能。
- en: Rearchitect the model to run in a parallel way.
  id: totrans-628
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新设计模型以并行运行。
- en: Build a feature store for the features less likely to change.
  id: totrans-629
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为不太可能改变的特征构建特征存储库。
- en: Deploy the models to the environment close to the data source (data gravity).
  id: totrans-630
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将模型部署到靠近数据源的环境（数据重力）。
- en: '**Monitor models**: After the model is deployed in a production environment,
    ML engineers continue to monitor the quality or accuracy of the model and drift,
    which is the drop in accuracy and in data consistency over time. The degradation
    of predictive performance triggers pullout of models from the production environment
    and retraining with recent datasets. In highly regulated industries, the monitoring
    stage comprises fairness and explainability.'
  id: totrans-631
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**监控模型**：模型部署到生产环境后，机器学习工程师继续监控模型的质量或准确性以及漂移，即随着时间的推移，准确性和数据一致性的下降。预测性能的下降会触发模型从生产环境中撤出，并使用最近的数据集进行重新训练。在高度监管的行业中，监控阶段包括公平性和可解释性。'
- en: '**Govern models**: This stage is to capture necessary information and calculate
    risk scores on an ongoing basis to ensure enterprises govern the creation and
    adoption of AI throughout the entire lifecycle. For example, facts and lineage
    provide metadata tracking of underlying datasets and algorithms. This is very
    useful to become enterprise-ready for any regulatory requirement that may arise.'
  id: totrans-632
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**治理模型**：这一阶段是为了持续捕捉必要的信息并计算风险评分，以确保企业在整个生命周期中治理人工智能的创建和采用。例如，事实和血缘提供了底层数据集和算法的元数据跟踪。这对于应对可能出现的任何监管要求非常有用。'
- en: AI engineering is the operationalization of AI models to create a sustainable,
    repeatable, and measurable operationalization process. It involves data engineers,
    data administrators, data scientists, ML engineers, business analysts, and operations
    engineers. The goal is to empower every data-related role in the enterprise, regardless
    of their background and skills, to collaborate closely and smoothly to deliver
    the full value of AI investments and improve time-to-market.
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工程是将人工智能模型实际应用的过程，以创建一个可持续、可重复和可衡量的实际应用过程。它涉及数据工程师、数据管理员、数据科学家、机器学习工程师、业务分析师和运维工程师。目标是让企业中的每一个与数据相关的角色，无论其背景和技能如何，都能紧密且顺畅地协作，以实现人工智能投资的全部价值并缩短上市时间。
- en: 'Key Aspects: DataOps, ModelOps, MLOps'
  id: totrans-634
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键方面：数据操作（DataOps）、模型操作（ModelOps）、机器学习操作（MLOps）
- en: When it comes to operationalizing AI, it is important to understand a few concepts,
    namely, DataOps, ModelOps, and MLOps. Like DevOps, systematic software development
    that aims to deliver software from code to production rapidly with high quality
    and on a continuous basis, DataOps follows the same principles and practices but
    applies them to data. It is designed to accelerate the collection, processing,
    and analysis to produce high-quality data for data citizens to fulfill their needs
    in a compliant way.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到将人工智能实际应用时，理解几个概念是很重要的，即数据操作（DataOps）、模型操作（ModelOps）和机器学习操作（MLOps）。与DevOps类似，DevOps旨在通过系统化、快速、高质量且持续地将软件从代码到生产交付，DataOps遵循相同的原理和实践，但将其应用于数据。它旨在加速数据的收集、处理和分析，以产生高质量的数据，满足数据公民合规的需求。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig2_HTML.png)'
  id: totrans-636
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig2_HTML.png)'
- en: The cyclic illustration of the Model Ops includes several stages, such as model
    selection, feature engineering, preparing data, model governance, model monitoring,
    model deployment, model evaluation, and hyperparameter tuning, all depicted at
    the center. On the right, there are stages for Dev Ops, including code, testing,
    building, deploying, and operating leads to the database. On the left, the Data
    Ops stages are data discovery, data enrichment, data quality, data cleansing,
    and data governance.
  id: totrans-637
  prefs: []
  type: TYPE_NORMAL
  zh: 模型操作（ModelOps）的循环图包括几个阶段，如模型选择、特征工程、准备数据、模型治理、模型监控、模型部署、模型评估和超参数调整，所有这些都在中心展示。在右侧，有DevOps的阶段，包括代码、测试、构建、部署和运营，最终导向数据库。在左侧，数据操作（DataOps）的阶段包括数据发现、数据丰富、数据质量、数据清洗和数据治理。
- en: Figure 9-2
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-2
- en: DataOps, ModelOps, and DevOps
  id: totrans-639
  prefs: []
  type: TYPE_NORMAL
  zh: 数据操作（DataOps）、模型操作（ModelOps）和DevOps
- en: 'As shown in Figure [9-2](#Fig2), DataOps covers two stages in the AI lifecycle:
    *Collect Data* and *Prepare Data*. The implementation of DataOps streamlines the
    processes in these two stages by automating data tasks into data pipelines. A
    Data Fabric architecture and Data Mesh solution^([4](#Fn4)) is an ideal way to
    implement DataOps practices.^([5](#Fn5))'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[9-2](#Fig2)所示，数据操作（DataOps）涵盖了人工智能生命周期中的两个阶段：*收集数据*和*准备数据*。数据操作（DataOps）的实施通过将数据任务自动化到数据管道中，简化了这两个阶段的过程。数据编织架构（Data
    Fabric architecture）和数据网格解决方案^([4](#Fn4)）是实现数据操作（DataOps）实践的理想方式.^([5](#Fn5))
- en: ModelOps was coined at almost the same time as DataOps. It’s a combination of
    AI with analytical models and DevOps, designed to bring some of the proven capabilities
    of agile software engineering to AI and the analytics space. ModelOps is a DevOps-like
    framework and set of toolchains and processes that bring together data engineers,
    data scientists, developers, and operators to accelerate the delivery of models
    from data preparation to model production through an effective enterprise data
    and AI strategy while continuously monitoring the models and retraining the models
    when needed and instilling the trust throughout the entire process. It covers
    all stages in the AI lifecycle presented in Figure [9-1](#Fig1).
  id: totrans-641
  prefs: []
  type: TYPE_NORMAL
  zh: ModelOps几乎与DataOps同时被提出。它是AI与分析模型和DevOps的结合，旨在将敏捷软件开发的一些成熟能力引入AI和数据分析领域。ModelOps是一个类似于DevOps的框架，以及一系列工具链和流程，将数据工程师、数据科学家、开发者和运维人员聚集在一起，通过有效的企业数据和AI策略加速模型从数据准备到模型生产的交付，同时持续监控模型并在需要时重新训练模型，在整个过程中建立信任。它涵盖了AI生命周期中图[9-1](#Fig1)所示的各个阶段。
- en: 'MLOps is a subfield of ModelOps. The primary goal is to help data scientists
    with rapid prototyping for ML models and fast delivery of ML models to production
    systems. MLOps focuses on the automation of tasks specific to ML, as outlined
    in Figure [9-2](#Fig2): feature engineering, HPO, version control, model evaluation,
    and finally deployment of inference models at scale. It increasingly employs tools
    with interpretability, transparency, security, governance, and reproducibility
    of experiments to incorporate ethics and remove bias throughout the entire ML
    lifecycle.'
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: MLOps是ModelOps的一个子领域。其主要目标是帮助数据科学家进行ML模型的快速原型设计和快速将ML模型部署到生产系统中。MLOps专注于ML特定任务的自动化，如图[9-2](#Fig2)所示：特征工程、HPO、版本控制、模型评估，以及最终在规模上部署推理模型。它越来越多地使用具有可解释性、透明度、安全性、治理和实验可重复性的工具，以在整个ML生命周期中融入伦理并消除偏见。
- en: ModelOps and MLOps are often used interchangeably. They are very similar in
    terms of capabilities. But ModelOps has a broader scope including not just ML
    models but also knowledge graphs, rules, optimization, and natural language techniques
    and agents, while MLOps focuses on ML model operationalization only, according
    to Gartner.^([6](#Fn6))
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: ModelOps和MLOps经常被互换使用。在功能方面，它们非常相似。但根据Gartner的说法，ModelOps的范畴更广，不仅包括ML模型，还包括知识图谱、规则、优化以及自然语言技术和代理，而MLOps则专注于ML模型的运营化。[6](#Fn6)
- en: As presented in Figure [9-2](#Fig2), the data preparation task in ModelOps triggers
    DataOps pipelines. The output of DataOps, which is high-quality governed data,
    goes into the next stage of ModelOps. So where does the output of ModelOps go?
    The answer is *business application*. Typically, there are several ways to integrate
    the predictions from ML models with business applications. The first option is
    offline inference, where the prediction results are stored in a database and the
    application gets them directly from the database. The second is batch prediction,
    which makes inference on a set of records on a regular basis, for example, weekly,
    monthly, or quarterly. This is commonly used for accumulated data and situations
    that don’t need immediate results. The third option is online inference, where
    the model is called via an API to make predictions. Usually, online inference
    is expected to have results instantly. Also, the prediction requests can queue
    up by the message broker and be processed later.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[9-2](#Fig2)所示，ModelOps中的数据准备任务触发了DataOps管道。DataOps的输出，即高质量受控数据，进入ModelOps的下一阶段。那么ModelOps的输出去哪里呢？答案是*商业应用*。通常，有几种方法可以将ML模型的预测与商业应用集成。第一种是离线推理，预测结果存储在数据库中，应用直接从数据库中获取。第二种是批量预测，定期对一组记录进行推理，例如每周、每月或每季度。这通常用于累积数据和不需要即时结果的情况。第三种是在线推理，通过API调用模型进行预测。通常，在线推理期望立即得到结果。此外，预测请求可以通过消息代理排队，稍后处理。
- en: Either way, the model inference is consumed by business applications. Therefore,
    DevOps also comes into play. Both new deployments of models and anomalies detected
    during the monitoring phase trigger the DevOps pipelines and actions accordingly.
    DevOps practices are essential to ensure that AI models can be deployed and injected
    into the business workflow of the enterprise. The model repositories need to be
    built for AI model lifecycle management, champion testing, and system testing,
    and model rollout/rollback mechanisms need to be set up to ensure availability,
    backed by CI/CD (Continuous Integration/Continuous Deployment).
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 无论哪种方式，模型推理都是由业务应用程序消费的。因此，开发操作（DevOps）也介入其中。模型的新部署和监控阶段检测到的异常都会相应地触发DevOps管道和操作。DevOps实践对于确保人工智能模型可以被部署并注入到企业的业务工作流程中至关重要。需要建立模型存储库以进行人工智能模型生命周期管理、冠军测试和系统测试，并需要设置模型推出/回滚机制以确保可用性，这由CI/CD（持续集成/持续部署）支持。
- en: 'In summary, AI engineering consists of three pillars: data, model, and code.
    To achieve best practice in AI engineering, it is recommended to adopt a platform
    that can provide capabilities for DataOps, ModelOps, and DevOps or integrate seamlessly
    with external Ops frameworks without supporting all three.'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，人工智能工程由三个支柱组成：数据、模型和代码。为了在人工智能工程中实现最佳实践，建议采用能够提供数据操作（DataOps）、模型操作（ModelOps）和开发操作（DevOps）能力或能够无缝集成外部操作框架的平台，而不必支持所有三个领域。
- en: 'The following are some motivational aspects to implement DataOps, MLOps, and
    ModelOps in the context of the AI lifecycle:'
  id: totrans-647
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些在人工智能生命周期背景下实施数据操作（DataOps）、机器学习操作（MLOps）和模型操作（ModelOps）的激励因素：
- en: '**Complexity of data domains**: Data challenges that enterprises are faced
    with are not just the explosive growth of data but the complexity of the data
    domains and the heterogeneity of data sources from hybrid cloud and multi-regions.
    Data silos are becoming an increasingly serious problem. The advent of Data Fabric
    and Data Mesh concepts is aiming to resolve this issue by providing smart integration
    capabilities to help users decide to virtualize, replicate, or transform data
    depending on various factors, for example, policies, performance, latency, etc.
    Especially Data Mesh solutions with their organizational and federated approach
    are geared toward breaking data silos with data source and data ownerships.'
  id: totrans-648
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据领域的复杂性**：企业面临的数据挑战不仅仅是数据的爆炸性增长，还有数据领域的复杂性以及来自混合云和多区域的异构数据源。数据孤岛问题日益严重。数据编织和数据网格概念的兴起旨在通过提供智能集成能力来解决这一问题，帮助用户根据各种因素（例如，策略、性能、延迟等）决定虚拟化、复制或转换数据。特别是，具有组织和联邦方法的Data
    Mesh解决方案旨在通过数据源和数据所有权打破数据孤岛。'
- en: '**AI governance**: One critical aspect of implementing DataOps is to address
    the need for data and AI governance and privacy. Data Fabric and Data Mesh provide
    a knowledge-augmented central catalog that contains'
  id: totrans-649
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**人工智能治理**：实施数据操作的关键方面之一是解决数据与人工智能治理和隐私的需求。数据编织（Data Fabric）和数据网格（Data Mesh）提供了一种知识增强的中心目录，其中包含'
- en: An inventory of data assets with enriched business semantics
  id: totrans-650
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个包含丰富业务语义的数据资产清单
- en: A set of governance artifacts including business glossaries, regulations, data
    privacy policies, data protection rules, and privacy data classifications
  id: totrans-651
  prefs:
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一套包括业务术语表、法规、数据隐私政策、数据保护规则和隐私数据分类的治理工件
- en: '**Knowledge catalog**: The Data Fabric architecture with its knowledge catalog
    capabilities automatically enriches data assets via data discovery and data integration
    and enforces quality and protection rules throughout all activities in the *data
    preparation* stage.'
  id: totrans-652
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**知识目录**：具有知识目录功能的Data Fabric架构通过数据发现和数据集成自动丰富数据资产，并在*数据准备*阶段的各项活动中强制执行质量和保护规则。'
- en: '**Democratization of data and AI**: Furthermore, one key benefit of DataOps
    is data and AI democratization. The intelligent catalog and semantic search enable
    everyone in the company to find the data they need to perform their job. In the
    context of the AI lifecycle, it greatly improves the collaboration and communication
    among data scientists, data engineers, and IT specialists and reduces the time
    for *Collect Data*.'
  id: totrans-653
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据和人工智能的民主化**：此外，数据操作的一个重要好处是数据和人工智能的民主化。智能目录和语义搜索使公司中的每个人都能找到他们完成工作所需的数据。在人工智能生命周期背景下，它极大地提高了数据科学家、数据工程师和IT专家之间的协作和沟通，并减少了*收集数据*的时间。'
- en: '**Data and AI orchestration**: Last but not the least, the core of DataOps
    lies in orchestration, which is responsible for moving data and AI between different
    stages in the pipeline and instantiating the data tools that operate on it. It
    also monitors progress and issues alerts for specific data problems. Data Fabric
    and Data Mesh provide a unified pipeline that composes an end-to-end workflow
    by reusable data pipelines, which is the core objective of DataOps orchestration.'
  id: totrans-654
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据和AI编排**：最后但同样重要的是，DataOps的核心在于编排，它负责在管道的不同阶段之间移动数据和AI，并实例化在它上面操作的数据工具。它还监控进度并为特定数据问题发出警报。Data
    Fabric和Data Mesh提供了一个统一的管道，通过可重用的数据管道组成端到端的工作流程，这是DataOps编排的核心目标。'
- en: To illustrate DataOps and ModelOps further, let us dive into a couple of case
    studies.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步说明DataOps和ModelOps，让我们深入探讨几个案例研究。
- en: 'Case Study 1: Consolidating Fragmented Data in a Hybrid Cloud Environment'
  id: totrans-656
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究1：在混合云环境中整合碎片化数据
- en: The data needed to build models is scattered across multiple data sources and
    often across multiple clouds. According to IDC’s State of the CDO 2021 study,^([7](#Fn7))
    data fragmentation and complexity is the number one barrier to digital transformation
    in 2022\. Nearly 80% of organizations surveyed are storing more than half of their
    data in hybrid cloud infrastructures. Seventy-nine percent of organizations are
    using more than 100 data sources, and 30% are using more than 1,000 data sources.
    However, 75% of organizations do not yet have a complete architecture to manage
    a set of end-to-end data activities, including integration, access, governance,
    and protection.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 构建模型所需的数据分散在多个数据源中，通常跨越多个云。根据IDC的2021年CDO状态研究，^([7](#Fn7)) 数据碎片化和复杂性是2022年数字转型的首要障碍。近80%的受访组织存储了超过一半的数据在混合云基础设施中。79%的组织使用超过100个数据源，30%的组织使用超过1,000个数据源。然而，75%的组织还没有一个完整的架构来管理一系列端到端的数据活动，包括集成、访问、治理和保护。
- en: One of the ultimate goals of a Data Fabric architecture and Data Mesh solution^([8](#Fn8))
    is to achieve a single source of truth, which asserts enterprise-wide data coverage
    across applications that is not limited by any single platform or tool.^([9](#Fn9))
    This creates both technical and process challenges for groups seeking to access
    and explore their data. The technical challenges arise from the logistics of extracting
    data from multiple sources or if that data is stored in different formats. Making
    data usable requires a significant amount of time and effort from highly skilled
    data engineers. More complex are the organizational-level restrictions around
    who is accessing what data and for what purpose. This is particularly difficult
    in industries such as healthcare and finance, where sensitive data needs to be
    handled with care and often with strict regulatory requirements. At the same time,
    people struggle with analyzing data without replicating it. In the majority of
    analytics projects, multiple copies of the data are stored in different locations
    and formats, which creates additional issues such as cost, latency, untrustworthy
    data, security risks, and more.
  id: totrans-658
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织架构和数据网格解决方案^([8](#Fn8))的最终目标之一是实现单一事实来源，这声称企业级数据覆盖范围跨越应用程序，不受任何单一平台或工具的限制.^([9](#Fn9))
    这为寻求访问和探索其数据的团队带来了技术和流程挑战。技术挑战源于从多个来源提取数据的物流，或者如果数据存储在不同的格式中。使数据可用的需要高度熟练的数据工程师的大量时间和精力。更复杂的是，在组织层面关于谁可以访问什么数据以及出于什么目的的限制。这在医疗保健和金融等行业尤其困难，在这些行业中，敏感数据需要谨慎处理，并且通常需要严格的监管要求。同时，人们在分析数据时也面临着不复制数据的挑战。在大多数分析项目中，数据的多份副本存储在不同的位置和格式中，这又产生了额外的成本、延迟、不可信的数据、安全风险等问题。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig3_HTML.png)'
  id: totrans-659
  prefs: []
  type: TYPE_IMG
  zh: '![图9-3](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig3_HTML.png)'
- en: The table contains columns for the application I D, debt, credit score, interest
    rate, and recommended interest rate. The illustration of Mongo and Postgre S Q
    L includes daily updates, debt updates per transaction, interest rates, applicant
    scores, and mortgage application data for both on-premise and cloud-based warehouses.
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: 表格包含应用ID、债务、信用评分、利率和推荐利率等列。Mongo和PostgreSQL的示例包括每日更新、每笔交易的债务更新、利率、申请人评分以及本地和云基础仓库的抵押贷款申请数据。
- en: Figure 9-3
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-3
- en: The Data Architecture for a Mortgage Application
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 抵押贷款申请的数据架构
- en: As most organizations struggle with data fragmentation, there is a strong need
    for a unified enterprise data architecture. This section presents you with a case
    study to integrate data from multiple sources with the implementation of a Data
    Fabric architecture. Data and sample projects used in the case study can be found
    in IBM Cloud Pak for Data Gallery.^([10](#Fn10))
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: 由于大多数组织都面临着数据碎片化的问题，因此对统一的企业数据架构有强烈的需求。本节提供了一个案例研究，展示了如何通过实施数据编织架构来整合来自多个来源的数据。案例研究中使用的数据和样本项目可以在IBM
    Cloud Pak for Data Gallery中找到.^([10](#Fn10))
- en: 'In this case study, a bank in the United States wants to offer a smart mortgage
    service for California residents. The interest rate on the loan is based on a
    combination of the applicant’s personal credit score and the latest interest rate
    regulations. To implement this service, data engineers in this bank need to collect
    all key information about the applicant and recommended rates. The key information
    is spread in different database systems as depicted in Figure [9-3](#Fig3):'
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 在本案例研究中，美国的一家银行希望为加利福尼亚居民提供智能房贷服务。贷款利率基于申请人的个人信用评分和最新的利率法规的组合。为了实施这项服务，该银行的数据库工程师需要收集关于申请人和推荐利率的所有关键信息。这些关键信息分散在不同的数据库系统中，如图[9-3](#Fig3)所示：
- en: The anonymized mortgage application data and mortgage applicants’ PII (Personally
    Identifiable Information) are stored on a cloud data warehouse.
  id: totrans-665
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 匿名房贷申请数据和房贷申请人的PII（个人信息）存储在云数据仓库中。
- en: The mortgage applicants’ credit score data is stored on a PostgreSQL database.
  id: totrans-666
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 房贷申请人的信用评分数据存储在PostgreSQL数据库中。
- en: The interest rate is subject to market change and is scheduled to be refreshed
    daily, where the latest interest rate data can be retrieved from a MongoDB database.
  id: totrans-667
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利率受市场变化的影响，并计划每天更新，最新利率数据可以从MongoDB数据库中检索。
- en: Data engineers need to find mortgage applicants’ credit scores, filter the data
    by state (to only include records from California), calculate the total debt for
    each applicant, and then merge credit score ranges into a data asset to be consumed
    by the data science team.
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: 数据工程师需要找到房贷申请人的信用评分，通过州（仅包括来自加利福尼亚州的记录）过滤数据，计算每个申请人的总债务，然后将信用评分范围合并成数据资产，以便数据科学团队使用。
- en: As explained in the previous section, being able to collect and prepare data
    with good quality is critical to building a data pipeline. It is important to
    understand the metadata of the ingested data. Sample data previews can help us
    understand the values within the data, and statistics and visualizations can help
    us determine a strategy for connecting multiple datasets.
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，能够收集和准备高质量的数据对于构建数据管道至关重要。了解摄入数据的元数据非常重要。样本数据预览可以帮助我们理解数据中的值，而统计和可视化可以帮助我们确定连接多个数据集的策略。
- en: From the data preview, as depicted in Figure [9-4](#Fig4), it is found that
    the column ID can be used to connect application data with PII data. It’s also
    found that the column STATE_CODE can be used to filter the data instead of using
    the state name (which requires an additional step for data transformation). It’s
    noticeable that the mortgage applicant’s credit score data uses a different code
    in the column ID, which cannot be used as a key for further connections. So the
    column EMAIL_ADDRESS is chosen instead.
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 从数据预览中，如图[9-4](#Fig4)所示，可以发现列ID可以用来将应用程序数据与PII数据（个人信息）连接起来。还发现列STATE_CODE可以用来过滤数据，而不是使用州名（这需要额外的数据转换步骤）。值得注意的是，房贷申请人的信用评分数据在ID列中使用不同的代码，不能用作进一步连接的关键。因此，选择了列EMAIL_ADDRESS。
- en: Let’s see how to build data pipelines to consolidate fragmented data from disparate
    data sources, which is a goal of DataOps.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看如何构建数据管道来整合来自不同数据源的数据碎片，这是数据运营的目标。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig4_HTML.png)'
  id: totrans-672
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig4_HTML.png)'
- en: The table contains columns for I D, name, street address, city, state, state
    code, zip code, email address, and credit score. It displays Rows from 1 to 14.
  id: totrans-673
  prefs: []
  type: TYPE_NORMAL
  zh: 该表包含ID、姓名、街道地址、城市、州、州代码、邮政编码、电子邮件地址和信用评分等列。它显示了从1到14的行。
- en: Figure 9-4
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-4
- en: Preview Sample Data
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 预览样本数据
- en: First, adding the amounts of the loan and credit card debt gives the total debt
    of an applicant. Then query the interest rate table in MongoDB with the credit
    score to find the corresponding interest rate. Finally, generate recommended interest
    rate for mortgage applicants. The whole data pipeline looks like Figure [9-5](#Fig5).
  id: totrans-676
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，添加贷款和信用卡债务的金额可以得到申请人的总债务。然后，使用信用评分在MongoDB中查询利率表以找到相应的利率。最后，为抵押贷款申请人生成推荐利率。整个数据管道看起来如图[9-5](#Fig5)所示。
- en: However, interest rate data keeps changing. Loan and credit card debt amounts
    are updated monthly. Credit scores are calculated by other applications and pushed
    to the PostgreSQL database daily. Interest rates are updated daily. If the tasks
    of joining of data, the calculation of total debt, and querying of interest rates
    are separated and run independently, there’s no guarantee the result keeps the
    expected level of accuracy. Therefore, the pipeline, as depicted in Figure [9-5](#Fig5),
    needs to be deployed as one job and is scheduled to run regularly. That ensures
    that the data request of interest rate is fulfilled with up-to-date data.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，利率数据持续变化。贷款和信用卡债务金额每月更新。信用评分由其他应用程序计算并每日推送到PostgreSQL数据库。利率每日更新。如果数据连接、总债务计算和利率查询的任务被分离并独立运行，则无法保证结果保持预期的准确度。因此，如图[9-5](#Fig5)所示的管道需要作为一个作业部署，并定期调度运行。这确保了利率数据请求能够得到最新的数据。
- en: High-quality ML models require high-quality data. ML pioneer Andrew Ng believes
    that focusing on the data quality that powers AI systems will help unlock their
    full power.^([11](#Fn11)) Business leaders like Gartner believe that low-quality
    data induces high cost and undermines business.^([12](#Fn12)) Data only delivers
    business value when it is correlated and can be accessed by any user or application
    in the organization. Organizations looking to improve data quality typically start
    with a data and analytics governance program that consolidates fragmented data
    from hybrid cloud environments. When implemented properly, Data Fabric and Data
    Mesh help ensure that this value is available throughout the organization in the
    most efficient and automated manner.
  id: totrans-678
  prefs: []
  type: TYPE_NORMAL
  zh: 高质量的机器学习模型需要高质量的数据。机器学习先驱安德鲁·吴（Andrew Ng）认为，关注驱动AI系统的数据质量将有助于释放其全部潜力。[11](#Fn11)
    商业领导者，如高德纳（Gartner），认为低质量数据会导致高成本并损害业务。[12](#Fn12) 只有当数据与业务相关联并且可以被组织中的任何用户或应用程序访问时，数据才能产生业务价值。寻求提高数据质量的组织通常从数据和分析治理计划开始，该计划整合了混合云环境中的碎片化数据。当正确实施时，数据织物（Data
    Fabric）和数据网格（Data Mesh）有助于确保这种价值以最有效和自动化的方式在整个组织中可用。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig5_HTML.png)'
  id: totrans-679
  prefs: []
  type: TYPE_IMG
  zh: '![图9-5](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig5_HTML.png)'
- en: The screen displays multi-cloud data integration at the top. The left panel
    includes dropdowns for connectors, stages, and quality stages. On the right, the
    mortgage applications 1, mortgage applicants 1, credit score 1, D S interest rates
    1, all link to join on I D, filter state code, join on email, transformer 1, lookup
    1, and sequential file 1.
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕顶部显示的是多云数据集成。左侧面板包括连接器、阶段和质量阶段的下拉菜单。在右侧，抵押贷款申请1、抵押贷款申请人1、信用评分1、D S利率1，所有这些都与ID关联、筛选状态代码、通过电子邮件关联、变压器1、查找1和顺序文件1链接。
- en: Figure 9-5
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-5
- en: Create Data Pipelines
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 创建数据管道
- en: The ideal implementation of both concepts puts together self-service data tools
    into an intelligent fabric of a heterogeneous data landscape. It provides everyone
    in the organization with the ability to find, explore ,and interrogate all available
    data, whether on-premises or in a hybrid cloud landscape.
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种概念的理想实现是将自助数据工具整合到异构数据景观的智能织物中。它为组织中的每个人提供查找、探索和查询所有可用数据的能力，无论是在本地还是在混合云景观中。
- en: 'Case Study 2: Operationalizing AI'
  id: totrans-684
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究2：AI的运营化
- en: Operationalizing AI refers to AI lifecycle management, which introduces integration
    between the data engineering team that builds the data pipeline, the data science
    team that builds the AI models, and the operation team that deploys and maintains
    the AI models. Operationalizing AI and AI engineering are often interchangeable.
    As explained in the previous section, AI engineering involves the core management
    competencies of ModelOps, DataOps, and DevOps to enable organizations to improve
    the performance, scalability, interpretability, and reliability of AI models while
    delivering the full value of AI investments.
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能投入实际应用是指人工智能生命周期管理，它引入了构建数据管道的数据工程团队、构建AI模型的数据科学团队以及部署和维护AI模型的运营团队之间的集成。将人工智能投入实际应用和AI工程通常可以互换使用。正如前文所述，AI工程涉及模型操作（ModelOps）、数据操作（DataOps）和开发操作（DevOps）的核心管理能力，以使组织能够提高AI模型的表现力、可扩展性、可解释性和可靠性，同时实现人工智能投资的全部价值。
- en: In the mortgage business, change is constantly happening based on changing regulations,
    products, and processes. It is imperative that customers get up-to-date information
    and timely support to streamline their home-buying experience. The bank in our
    case study wants to have an expansion of its business by offering low-interest-rate
    mortgage renewals for online applications. The task for the data scientist team
    is to train a mortgage approval model to predict which applicants qualify for
    a mortgage and deploy the model for real-time evaluation based on the applicant’s
    requirements.
  id: totrans-686
  prefs: []
  type: TYPE_NORMAL
  zh: 在抵押贷款业务中，由于法规、产品和流程的不断变化，变化是持续发生的。客户必须获得最新信息和及时支持，以简化他们的购房体验。在我们的案例研究中，该银行希望通过提供低利率的在线申请抵押贷款续签来扩大其业务。数据科学家团队的任务是训练一个抵押贷款批准模型，以预测哪些申请人有资格获得抵押贷款，并根据申请人的要求部署模型进行实时评估。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig6_HTML.png)'
  id: totrans-687
  prefs: []
  type: TYPE_IMG
  zh: '![图9-6](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig6_HTML.png)'
- en: The screen displays the transaction details and explains the predicted outcome,
    with a confidence level of 93.32 percent. It also displays a bar chart that plots
    the relative weights of the features that influenced this prediction. The chart
    follows a decreasing trend.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕显示交易详情并解释预测结果，置信度为93.32%。它还显示了一个条形图，该图显示了影响此预测的特征的相对权重。该图表呈下降趋势。
- en: Figure 9-6
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-6
- en: Explain How Prediction Is Being Made in Plain English
  id: totrans-690
  prefs: []
  type: TYPE_NORMAL
  zh: 用通俗易懂的语言解释预测是如何进行的
- en: There are a wealth of algorithms for training the model. Once it’s available,
    the data scientists save it to the project and use a holdout dataset to evaluate
    the model. Figure [9-6](#Fig6) explains in plain English why the model makes a
    prediction with a high degree of confidence. When the performance of the model
    is satisfactory, it can be taken to production.
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 存在着大量用于训练模型的算法。一旦可用，数据科学家将其保存到项目中，并使用保留数据集来评估模型。图 [9-6](#Fig6) 用通俗易懂的语言解释了为什么模型会以高置信度进行预测。当模型性能令人满意时，它可以被部署到生产环境中。
- en: Moreover, the status and production performance of the models can be monitored
    at any time from the model inventory, as shown in Figure [9-7](#Fig7).
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，可以从模型库存中随时监控模型的状况和生产性能，如图 [9-7](#Fig7) 所示。
- en: There are a few challenges when operationalizing AI. The most common one is
    that deploying AI models into production is expensive and time-consuming. For
    many organizations, over 80% of the models have never been operationalized. While
    data science teams build many models, very few are actually deployed into production,
    which is where the real value comes from. For many organizations, the time it
    takes them to build, train, and deploy models is 6`–`12 months.
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 在将人工智能投入实际应用时，会面临一些挑战。最常见的一个问题是将AI模型部署到生产环境中既昂贵又耗时。对于许多组织来说，超过80%的模型从未被实际应用过。虽然数据科学团队构建了许多模型，但实际上只有少数被部署到生产环境中，这才是真正的价值所在。对于许多组织来说，构建、训练和部署模型所需的时间是6至12个月。
- en: The issue of AI bias has attracted increasing attention in public. Drift occurs
    as data patterns change, which leads to a reduction in the accuracy of each model’s
    predictions. When this happens, line-of-business leaders are increasingly losing
    confidence that their models are producing actionable insights for their business.
    Fairness is also an area of concern. If the model has produced favorable predicting
    results for specific groups (gender, age, or nationality), then it can lead to
    AI ethics discussions and possibly even legal risks.
  id: totrans-694
  prefs: []
  type: TYPE_NORMAL
  zh: AI偏见问题在公众中引起了越来越多的关注。随着数据模式的变化，漂移发生，导致每个模型预测的准确性降低。当这种情况发生时，业务线领导者越来越失去信心，认为他们的模型正在为业务产生可操作的见解。公平性也是一个值得关注的问题。如果模型为特定群体（性别、年龄或国籍）产生了有利的预测结果，那么它可能导致AI伦理讨论，甚至可能带来法律风险。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig7_HTML.png)'
  id: totrans-695
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig7_HTML.png)'
- en: The screen displays the mortgage approval model entry at the top. The asset
    option is selected among others. The data for model tracking, develop, deploy,
    validate, operate and model sharing are present.
  id: totrans-696
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕显示的是顶部抵押贷款批准模型入口。在选项中选择了资产选项。模型跟踪、开发、部署、验证、操作和模型共享的数据都存在。
- en: Figure 9-7
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-7
- en: The Status of the Model in the Model Inventory
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 模型在模型库存中的状态
- en: 'Another AI trust issue that affects model deployment comes from the lack of
    model lineage analysis. This includes two aspects. One is how the model is built
    and which features have a decisive role in the final scoring results of the model.
    This is the area where the interpretability of the model comes into play. The
    other area is data lineage: where the data used to train the model comes from,
    whether it is accurate and secure, and whether there is a possibility of tampering.'
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个影响模型部署的AI信任问题是模型血缘分析的缺乏。这包括两个方面。一方面是模型是如何构建的，以及哪些特征在模型的最终评分结果中起着决定性作用。这是模型可解释性发挥作用的领域。另一方面是数据血缘：用于训练模型的数据来源，数据是否准确和安全，以及是否存在篡改的可能性。
- en: The fact sheets shown in Figure [9-7](#Fig7) are an example to help business
    users understand and trust the model.
  id: totrans-700
  prefs: []
  type: TYPE_NORMAL
  zh: 图[9-7](#Fig7)中显示的事实表是帮助商业用户理解和信任模型的示例。
- en: These challenges need to be considered when an organization chooses a Data Fabric
    and Data Mesh implementation. The goal of acquiring data is to use it for a particular
    business purpose. Therefore, the best solution is to have the capabilities to
    operationalize data and AI implemented within the Data Fabric architecture. It
    helps organizations reduce the skills required to build and manipulate AI models,
    speed up delivery time by minimizing mundane tasks and data preparation challenges,
    and, at the same time, optimize the quality and accuracy of AI models with real-time
    governance.
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个组织选择数据编织（Data Fabric）和数据网格（Data Mesh）的实施时，需要考虑这些挑战。获取数据的目的是为了用于特定的商业目的。因此，最佳方案是在数据编织架构内实现数据运营和AI的能力。这有助于组织减少构建和操作AI模型所需的技能，通过最小化日常任务和数据准备挑战来加快交付时间，同时，通过实时治理优化AI模型的质量和准确性。
- en: Accelerate MLOps with AutoAI
  id: totrans-702
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用AutoAI加速MLOps
- en: There is a chasm between using Jupyter notebooks to develop models for experimentation
    and deploying them to production systems. While enterprise investment in AI has
    been increasing, the percentage of AI models that are delivered to production
    is still small. Enterprises are recognizing that crossing this chasm has become
    critical to realizing the value of AI. Due to the success of DevOps, many enterprises
    are looking to MLOps to solve this problem. As it is explained in the earlier
    section, MLOps is a set of practices that connect data preparation, model creation,
    deployment, and monitoring, with a focus on operating ML models effectively.
  id: totrans-703
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Jupyter笔记本开发实验模型并将其部署到生产系统之间存在鸿沟。尽管企业在AI上的投资一直在增加，但被部署到生产中的AI模型比例仍然很小。企业开始认识到，跨越这个鸿沟对于实现AI的价值至关重要。由于DevOps的成功，许多企业正在寻求MLOps来解决这一问题。正如前面章节所述，MLOps是一套将数据准备、模型创建、部署和监控连接起来的实践，重点是有效操作ML模型。
- en: The success criteria for MLOps are to establish a sustainable set of disciplines
    for enterprises to roll out experimental models to production smoothly. Listed
    in the following are challenges that need to be dealt with when implementing MLOps
    practices.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: MLOps的成功标准是建立一套可持续的纪律，使企业能够顺利地将实验模型推出到生产环境中。以下列出的是在实施MLOps实践时需要解决的挑战。
- en: 'The first is data preparation. Since ML models are built on data, they are
    very sensitive to the quality of data, such as the semantics, quantity, and completeness
    of the data being used to train the model. However, data preprocessing can be
    very time-consuming, depending on the conditions of the data. As explained in
    Chapter [6](537582_1_En_6_Chapter.xhtml), a sequence of data understanding and
    data preparation tasks need to be performed. Here are some of the most common
    examples:'
  id: totrans-705
  prefs: []
  type: TYPE_NORMAL
  zh: 第一项是数据准备。由于ML模型建立在数据之上，它们对数据的语义、数量和完整性等质量非常敏感。然而，数据预处理可能非常耗时，这取决于数据条件。正如第[6](537582_1_En_6_Chapter.xhtml)章所述，需要执行一系列数据理解和数据准备任务。以下是一些最常见的例子：
- en: '**Feature selection**: Discard features that are less important to prediction.
    First, exclude the features that have a constant value throughout the dataset.
    Second, if the data type is not time or date, ignore the columns that have a unique
    value, which very likely represents an ID.'
  id: totrans-706
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征选择**：丢弃对预测不那么重要的特征。首先，排除在整个数据集中具有恒定值的特征。其次，如果数据类型不是时间或日期，忽略具有唯一值的列，这很可能代表一个ID。'
- en: '**Missing or incorrect values**: For the missing values or inaccurate values
    in the datasets, one option is to use a statistical approach to estimate – the
    mean, median, or average of adjacent records. Another option is to use an ML algorithm
    to predict the missing or inaccurate value.'
  id: totrans-707
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺失或错误值**：对于数据集中的缺失值或不准确值，一种选择是使用统计方法进行估计——相邻记录的平均值、中位数或平均值。另一种选择是使用ML算法预测缺失或不准确值。'
- en: '**Feature encoding and scaling**: There are many transformation methods based
    on data types. For example, you can encode categorical features as ordinal numbers
    and scale numerical features to see how they affect the performance of the model.'
  id: totrans-708
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特征编码和缩放**：基于数据类型有许多转换方法。例如，可以将分类特征编码为序数，并将数值特征缩放以查看它们如何影响模型的性能。'
- en: The next phase is model creation. Based on the characteristics of datasets and
    the nature of business problems, there are a wealth of ML algorithms to use. In
    reality, the choice of algorithms needs to balance between the accuracy and the
    time spent for training. Another thing to consider is the metrics used to evaluate
    ML models, such as ROC and AUC for binary classification^([13](#Fn13)); F1, precision,
    and recall for multi-class classification; mean squared error (MSE), root mean
    squared error (RMSE), and R2 for regression; etc.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个阶段是模型创建。根据数据集的特征和业务问题的性质，有丰富的ML算法可供选择。实际上，算法的选择需要在准确性和训练时间之间取得平衡。另一件需要考虑的事情是用于评估ML模型的指标，例如，对于二分类，使用ROC和AUC^([13](#Fn13))；对于多分类，使用F1、精确率和召回率；对于回归，使用均方误差（MSE）、均方根误差（RMSE）和R2等。
- en: Feature engineering also plays an important role in model creation. ML algorithms
    deal with tabular data, and if relationships exist between different features,
    using data transformation to derive new features and combine them will help reveal
    the insights hidden in the data.
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 特征工程在模型创建中也起着重要作用。ML算法处理表格数据，如果不同特征之间存在关系，使用数据转换来推导新特征并将它们组合起来将有助于揭示数据中隐藏的见解。
- en: While these previously described tasks are complex, the approach to when and
    what method is needed to solve a problem is clear. This lays a good foundation
    for automation. Many vendors offer AutoAI solutions to automate the preceding
    tasks.
  id: totrans-711
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然之前描述的任务很复杂，但何时以及需要什么方法来解决问题的方法是清晰的。这为自动化奠定了良好的基础。许多供应商提供AutoAI解决方案来自动化前面的任务。
- en: AutoAI is a no-code/low-code platform that automates several aspects of the
    MLOps lifecycle. As shown in Figure [9-8](#Fig8), AutoAI provides an easy-to-follow
    wizard to help you define the model training settings and to choose the target
    (predicted) feature. AutoAI also provides HPO capabilities that help optimize
    the hyperparameters of the best-performing pipelines from the previous phases.
    It uses a model-based, derivative-free global search algorithm, called RBFOpt,^([14](#Fn14))
    which is tailored for the costly ML model training and scoring evaluations.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: AutoAI是一个无需代码/低代码平台，它自动化了MLOps生命周期的多个方面。如图[9-8](#Fig8)所示，AutoAI提供了一个易于遵循的向导，帮助您定义模型训练设置并选择目标（预测）特征。AutoAI还提供了HPO功能，有助于优化前一阶段表现最佳管道的超参数。它使用基于模型、无导数的全局搜索算法，称为RBFOpt，^([14](#Fn14))，该算法针对昂贵的ML模型训练和评分评估进行了定制。
- en: 'For each folding and algorithm type, AutoAI creates two pipelines optimizing
    the algorithm type using HPO: the first optimizes the algorithm type based on
    the preprocessed (imputed/encoded/scaled) dataset, and the second one optimizes
    the algorithm type based on optimized feature engineering of the preprocessed
    (imputed/encoded/scaled) dataset.'
  id: totrans-713
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每种折叠和算法类型，AutoAI创建两个管道，使用HPO优化算法类型：第一个基于预处理（推断/编码/缩放）的数据集优化算法类型，第二个基于优化特征工程后的预处理（推断/编码/缩放）数据集优化算法类型。
- en: The final model can be selected from the set of candidate models. Once the model
    is built and exported to a Jupyter notebook, the data scientist can further customize
    the results, which is often required for more complex use cases.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 最终模型可以从候选模型集中选择。一旦模型构建并导出到Jupyter笔记本，数据科学家可以进一步定制结果，这对于更复杂的使用案例通常是必需的。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig8_HTML.png)'
  id: totrans-715
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig8_HTML.png)'
- en: The infographic depicts the experiment summary relationship map. The right panel
    includes the progress map and hyperparameter optimization. Feature transformers,
    pipelines, top algorithms, 100 percent of training data are represented in the
    form of semicircular layers. At the bottom, there is a table for the pipeline
    leaderboard.
  id: totrans-716
  prefs: []
  type: TYPE_NORMAL
  zh: 信息图展示了实验摘要关系图。右侧面板包括进度图和超参数优化。特征转换器、管道、顶级算法以及100%的训练数据均以半圆形层的形式表示。底部有一个用于管道排行榜的表格。
- en: Figure 9-8
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-8
- en: AutoAI
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 自动AI
- en: AutoAI automates the highly complex process of finding and optimizing the best
    ML models, features, and model hyperparameters for training.^([15](#Fn15)) It
    allows people without deep data science expertise to create models of all types
    and even those with deep data science expertise to prototype and iterate from
    them more quickly. AutoAI reduces the effort of building models and increases
    productivity and accuracy. It provides significant productivity gains for enterprises
    implementing MLOps.
  id: totrans-719
  prefs: []
  type: TYPE_NORMAL
  zh: AutoAI自动化了寻找和优化最佳机器学习模型、特征和模型超参数的复杂过程，用于训练。[15](#Fn15) 它允许没有深厚数据科学专业知识的人创建各种类型的模型，甚至允许那些具有深厚数据科学专业知识的人更快地从中原型设计和迭代。AutoAI减少了构建模型的努力，提高了生产力和准确性。它为企业实施MLOps提供了显著的生产力提升。
- en: Deployment Patterns for AI Engineering
  id: totrans-720
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能工程部署模式
- en: 'When it comes to the training and deployment of AI models, IT often defines
    the requirements that data science practices must comply with. For example, if
    training data are stored in a public cloud, model training using that data very
    likely also must take place in the same cloud to minimize data export (outbound)
    costs or to comply with governance rules. There are many other factors around
    model training and deployment, including security, latency, performance, and data
    residency. Here are a few examples:'
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到AI模型的训练和部署时，IT部门通常定义数据科学实践必须遵守的要求。例如，如果训练数据存储在公共云中，那么使用这些数据进行模型训练很可能也必须在同一云中进行，以最小化数据导出（出站）成本或遵守治理规则。模型训练和部署周围有许多其他因素，包括安全性、延迟、性能和数据驻留。以下是一些示例：
- en: 'Meet the service-level requirement, for example, response time, latency, and
    throughput:'
  id: totrans-722
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 满足服务级别要求，例如响应时间、延迟和吞吐量：
- en: Co-locating with the data source for easy access to features
  id: totrans-723
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与数据源协同定位以方便访问特征
- en: Co-locating with the applications to reduce network overhead
  id: totrans-724
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与应用程序协同定位以减少网络开销
- en: Easy scale-out to accommodate massive inference calls
  id: totrans-725
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 容易扩展以适应大量的推理调用
- en: 'Optimize cost for deployment related to hardware, integration, and operation
    cost:'
  id: totrans-726
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化与硬件、集成和运营成本相关的部署成本：
- en: Reuse existing computational resources.
  id: totrans-727
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复使用现有的计算资源。
- en: Reduce efforts of integrating with existing applications.
  id: totrans-728
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少与现有应用程序集成的努力。
- en: Reduce operational costs by reusing existing operations infrastructure.
  id: totrans-729
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过重复使用现有的操作基础设施来降低运营成本。
- en: Depending on the importance of these factors, enterprises employ one or more
    of three common patterns when deciding on ML deployment architecture. The first
    pattern is to deploy the runtime environment of the ML model to the platform where
    the data originated.
  id: totrans-730
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些因素的重要性，企业在决定机器学习部署架构时，会采用三种常见模式之一或多个。第一种模式是将机器学习模型的运行时环境部署到数据源所在的平台。
- en: Business-critical applications in large enterprises are currently deployed in
    highly reliable and regulated environments. For instance, two of three large financial
    institutions in the world are running their core banking systems on IBM zSystems.
    As a result, a large amount of training data for ML and the raw data needed for
    inference after the ML models go live are still generated and stored on-premises.
    Moving this data from a secure environment to the public cloud not only introduces
    latency but also increases the risk of data leakage and data tampering.
  id: totrans-731
  prefs: []
  type: TYPE_NORMAL
  zh: 在大型企业中，业务关键型应用程序目前部署在高度可靠和受监管的环境中。例如，世界上三分之二的大型金融机构正在使用IBM zSystems运行其核心银行系统。因此，大量用于机器学习的训练数据和模型上线后所需的原始数据仍然在本地生成和存储。将此数据从安全环境迁移到公共云不仅引入了延迟，还增加了数据泄露和数据篡改的风险。
- en: The deployment pattern in Figure [9-9](#Fig9) can be an option for organizations
    that do not want to take legal risks and potential financial losses, but still
    want to benefit from flexible, scalable, and cost-effective computing resources
    on the public cloud.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 图[9-9](#Fig9)中的部署模式可以是那些不想承担法律风险和潜在财务损失，但仍然想从公共云的灵活、可扩展和成本效益的计算资源中获益的组织的一个选择。
- en: First, the data is masked according to the data protection regulations and migrated
    to the public cloud platform through intelligent integration technology as the
    dataset for model training. When the model training is completed, it is deployed
    to the on-premises system. To obtain better scalability, it is recommended to
    use container-based deployment. In addition, multiple versions of the same model
    can be deployed for subsequent AB testing^([16](#Fn16)) and gray release.
  id: totrans-733
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，根据数据保护法规对数据进行脱敏，并通过智能集成技术将其作为模型训练的数据集迁移到公共云平台。当模型训练完成后，它被部署到本地系统。为了获得更好的可伸缩性，建议使用基于容器的部署。此外，可以部署同一模型的多个版本，用于后续的A/B测试^([16](#Fn16))和灰度发布。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig9_HTML.png)'
  id: totrans-734
  prefs: []
  type: TYPE_IMG
  zh: '![图9-9](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig9_HTML.png)'
- en: An architecture diagram illustrates the interconnectivity between machine learning
    runtime on-premise and machine learning training platform in the public cloud.
    The on-premise block includes an A P I gateway that invokes model inference A
    P I, and core business applications that get retrieved raw data for model inference.
    The machine learning training platform includes hyperparameter optimization and
    model evaluation.
  id: totrans-735
  prefs: []
  type: TYPE_NORMAL
  zh: 架构图说明了本地机器学习运行时与公共云中的机器学习训练平台之间的互连性。本地块包括调用模型推理API的API网关，以及获取用于模型推理的原始数据的核心业务应用程序。机器学习训练平台包括超参数优化和模型评估。
- en: Figure 9-9
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: 'Pattern 1: Co-locate ML Runtime with Data for Easy Access of Features'
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 模式1：将ML运行时与数据本地化以便于访问特征
- en: There are several ways in which models and applications can be integrated. To
    continuously monitor and easily update models, invoking inference APIs of models
    from applications is the most common way of integration. Considering the scale
    of the workloads in production systems, which may reach up to 10,000 per second,
    enterprises usually use an API gateway for load balancing.
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 模型和应用程序可以集成的几种方式中，从应用程序调用模型的推理API以持续监控和轻松更新模型，是最常见的集成方式。考虑到生产系统中工作负载的规模，可能达到每秒10,000次，企业通常使用API网关进行负载均衡。
- en: In this pattern, the application directly obtains the raw data needed to invoke
    the model APIs and then sends the request for model inference through the API
    gateway, which forwards it to the runtime container of the corresponding model
    version based on the specific information of the request. If too many inference
    requests are received at the same time, the API gateway may create a new replica
    of the runtime with the specific model version to maintain the service level for
    the model.
  id: totrans-739
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种模式中，应用程序直接获取调用模型API所需的原始数据，然后通过API网关发送模型推理请求，API网关根据请求的具体信息将其转发到对应模型版本的运行时容器。如果同时收到太多的推理请求，API网关可能会为特定模型版本创建一个新的运行时副本，以维持模型的服务水平。
- en: The core idea behind this deployment pattern is to train models on public cloud
    with regulated data from on-premises but deploy models back to on-premises to
    easily access raw data, thereby improving the performance and quality of model
    inference. One potential drawback of this pattern is the massive amount of scoring
    requests that may have an impact on business-critical applications that reside
    in the same system. Another disadvantage is that skills and toolchains for operationalization
    are more complex due to cross-platform deployments.
  id: totrans-740
  prefs: []
  type: TYPE_NORMAL
  zh: 此部署模式背后的核心思想是在公有云上使用来自本地的受控数据进行模型训练，但将模型部署回本地以方便访问原始数据，从而提高模型推理的性能和质量。这种模式的潜在缺点是大量的评分请求可能会影响位于同一系统中的业务关键应用程序。另一个缺点是由于跨平台部署，操作化和工具链的技能和工具链更加复杂。
- en: In contrast with data gravity, the second deployment pattern is a cloud-native
    one. Assuming most data for training and scoring are generated on-premises and
    modernized applications are running on public cloud, enterprises can consider
    the deployment pattern presented in Figure [9-10](#Fig10).
  id: totrans-741
  prefs: []
  type: TYPE_NORMAL
  zh: 与数据重力相反，第二种部署模式是云原生模式。假设大多数训练和评分数据都是在本地生成，并且现代化应用程序运行在公有云上，企业可以考虑图[9-10](#Fig10)中提出的部署模式。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig10_HTML.png)'
  id: totrans-742
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig10_HTML.png)'
- en: An architecture diagram illustrates the interconnectivity between the machine
    learning training platform and machine learning runtime in the public cloud. The
    public cloud block includes an A P I gateway and applications. There is a block
    for on-premise, on the left that virtualizes, replicates, and transforms the data
    for training.
  id: totrans-743
  prefs: []
  type: TYPE_NORMAL
  zh: 架构图说明了机器学习训练平台和公有云中机器学习运行时的互连性。公有云块包括一个API网关和应用程序。左侧有一个本地块，它虚拟化、复制和转换训练数据。
- en: Figure 9-10
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-10
- en: 'Pattern 2: Co-locate ML Runtime with the Application on Cloud'
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 模式2：在云上将ML运行时与应用程序本地化
- en: Like the previous pattern, during the training phase, data is moved off from
    the on-premises system to the public cloud, and after the training is complete,
    it is deployed directly to the public cloud. Applications running on public cloud
    retrieve raw data either directly from the data source on-premises or though access
    to a near-real-time cache of the data source on-premises. Once applications get
    the data needed for model inference APIs, they send requests to the API gateway,
    which dispatches the requests to a specific runtime for models as described in
    the first pattern.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的模式类似，在训练阶段，数据从本地系统移动到公有云，训练完成后，直接部署到公有云。公有云上运行的应用程序从本地数据源直接获取原始数据，或者通过访问本地数据源的近实时缓存来获取数据。一旦应用程序获取到用于模型推理API所需的数据，它们就会向API网关发送请求，API网关将请求调度到第一模式中描述的特定运行时。
- en: 'There are two important consideration factors when deploying this pattern:'
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署此模式时有两个重要的考虑因素：
- en: Whether the latency of copying data or accessing data for model inference is
    acceptable. Depending on the data source and technology, the latency varies from
    hours to seconds.
  id: totrans-748
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 复制数据或访问用于模型推理的数据的延迟是否可接受。根据数据源和技术，延迟从小时到秒不等。
- en: Whether the data movement complies with security and privacy regulations. For
    example, data generated by data centers in the countries in the European Union
    is not allowed for transit use by applications running on public cloud in the
    United States.
  id: totrans-749
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据移动是否符合安全和隐私法规。例如，欧盟国家数据中心生成数据不允许在美国的公有云上运行的应用程序进行中转使用。
- en: If the above-mentioned factors are not hindrances, then this deployment pattern
    has advantages. First, the environment in which the models run can easily scale
    out through a public cloud infrastructure. Second, the cost of operations and
    maintenance is relatively low due to the unified operations toolchain. Last but
    not the least, it has minimal impact on on-premises systems.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 如果上述因素不是障碍，那么这种部署模式具有优势。首先，模型运行的运行环境可以通过公有云基础设施轻松扩展。其次，由于统一的操作工具链，运营和维护成本相对较低。最后但同样重要的是，它对本地系统的影响最小。
- en: The third and final common deployment pattern is an edge deployment one. AI
    models for image recognition and video analysis are widely used in the manufacturing
    industry. One typical use case for image recognition is to spot the defects in
    the parts in the production line to reduce the manual efforts of quality inspection.
    Another use case is the use of video analytics to monitor whether workers are
    operating regulation-safe operations.
  id: totrans-751
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个也是最后的常见部署模式是边缘部署。在制造业中，图像识别和视频分析的AI模型被广泛使用。图像识别的一个典型用例是在生产线上的零件中检测缺陷，以减少质量检查的人工工作量。另一个用例是使用视频分析来监控工人是否在进行规范安全操作。
- en: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig11_HTML.png)'
  id: totrans-752
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_9_Chapter/537582_1_En_9_Fig11_HTML.png)'
- en: An architecture diagram that includes 3 edge devices connected to the public
    cloud and an on-premise machine learning training platform. The platform deploys
    the D L model in C + + to each edge device.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 包含3个连接到公共云和本地机器学习训练平台的边缘设备的架构图。该平台将C++中的D L模型部署到每个边缘设备。
- en: Figure 9-11
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-11
- en: Deploy an Inference Service on an Edge Device
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 在边缘设备上部署推理服务
- en: In these two examples, very likely the production lines in the shop floor don’t
    have connections to the public cloud. Even if they have connections, the network
    overhead increases the delay in the return of model inference results, and the
    performance requirements of the application cannot be met. That’s why edge deployment
    has traction.
  id: totrans-756
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两个例子中，很可能车间生产线与公共云没有连接。即使有连接，网络开销会增加模型推理结果返回的延迟，并且无法满足应用程序的性能要求。这就是为什么边缘部署有吸引力。
- en: In this deployment pattern, as depicted in Figure [9-11](#Fig11), all data captured
    at edge devices (including images and videos) is sent to public cloud or on-premises
    for training. Since images and videos are unstructured data, manual annotation
    is usually required. When the model training is completed, the model is deployed
    to multiple edge devices. One difficulty with this deployment pattern is that
    the model may be rewritten in a language like C++ due to the resource constraints
    of the edge-side devices and the extremely high requirements for performance,
    which imposes additional difficulties for model upgrades and version management.
    It often requires an additional component to dispatch the models to edge devices
    and manage the lifecycle of models at the edge.
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种部署模式中，如图[9-11](#Fig11)所示，在边缘设备上捕获的所有数据（包括图像和视频）都发送到公共云或本地进行训练。由于图像和视频是非结构化数据，通常需要手动标注。当模型训练完成后，模型被部署到多个边缘设备。这种部署模式的一个困难是，由于边缘设备资源限制和性能要求极高，模型可能需要用C++等语言重写，这给模型升级和版本管理带来了额外的困难。通常需要一个额外的组件来分发模型到边缘设备，并管理边缘设备上模型的整个生命周期。
- en: Key Takeaways
  id: totrans-758
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [9-1](#Tab1).
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用表[9-1](#Tab1)中总结的几个关键要点来结束本章。
- en: Table 9-1
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: 表9-1
- en: Key Takeaways
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-762
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-763
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | AI and software engineering have fundamental differences. | Traditional
    software is rule-driven, where the problem can be coded with clear logical rules
    and have deterministic output, while AI is more data-driven, which is based on
    training sets of data and algorithms for approximation of an optimal solution.
    |'
  id: totrans-764
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 人工智能和软件工程有根本的不同。 | 传统软件是规则驱动的，问题可以用清晰的逻辑规则编码，并具有确定性的输出，而人工智能更注重数据驱动，它基于训练数据集和算法来逼近最优解。
    |'
- en: '| 2 | The AI lifecycle comprises of multiple stages. | The AI lifecycle comprises
    of business problem understanding, collecting data, preparing data, building the
    model, deploying the model, monitoring the model, and governing the model. |'
  id: totrans-765
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 人工智能生命周期包括多个阶段。 | 人工智能生命周期包括业务问题理解、收集数据、准备数据、构建模型、部署模型、监控模型和管理模型。 |'
- en: '| 3 | AI operationalization domains include DataOps, ModelOps, and DevOps.
    | AI operationalization consists of three pillars – data, model, and code. It
    is recommended to adopt a platform that can provide capabilities for DataOps,
    ModelOps, and DevOps. |'
  id: totrans-766
  prefs: []
  type: TYPE_TB
  zh: '| 3 | AI运营化领域包括DataOps、ModelOps和DevOps。 | AI运营化由三个支柱组成——数据、模型和代码。建议采用能够提供DataOps、ModelOps和DevOps能力的平台。
    |'
- en: '| 4 | Differences between ModelOps and MLOps. | MLOps is a subfield of ModelOps.
    ModelOps contains the operationalization not just for machine learning but also
    for knowledge graphs, rules, optimization, Natural Language Processing, agents,
    etc. |'
  id: totrans-767
  prefs: []
  type: TYPE_TB
- en: '| 5 | The Data Fabric architecture and Data Mesh solution implements DataOps
    practices. | Data Fabric and Data Mesh provide a unified enterprise data architecture
    and solution for consolidating dispersed data from a hybrid cloud environment
    through automated data discovery, smart data integration, and intelligent cataloging.
    |'
  id: totrans-768
  prefs: []
  type: TYPE_TB
- en: '| 6 | Majority of models never get into production. | Over 80% of models are
    never operationalized because the efforts involved in deploying them are enormous
    and the models are deployed and found to produce drift or fairness issues that
    outweigh the benefits. |'
  id: totrans-769
  prefs: []
  type: TYPE_TB
- en: '| 6 | AutoAI accelerates MLOps. | AutoAI is a no-code/low-code platform that
    automates several aspects of the MLOps lifecycle. It allows citizen data scientists
    to create models of all types and even seasoned data scientists to prototype and
    iterate from them more quickly. |'
  id: totrans-770
  prefs: []
  type: TYPE_TB
- en: '| 8 | There are multiple deployment architecture patterns. | The choice of
    deployment architecture is determined by various factors, including but not limited
    to data locality, performance and latency requirements, and security requirement.
    |'
  id: totrans-771
  prefs: []
  type: TYPE_TB
