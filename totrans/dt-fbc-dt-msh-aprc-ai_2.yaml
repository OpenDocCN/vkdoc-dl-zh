- en: 7. AI and ML for a Data Fabric and Data Mesh
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter provides a deep dive into the exploitation of AI and ML for various
    Data Fabric and Data Mash topics and tasks, such as data discovery, data access,
    and data profiling, analyzing the “digital exhaust” of Data Fabric and Data Mesh
    process steps, ML-based entity matching, automated data quality assessments, and
    semantic enrichment of the underlying data.
  prefs: []
  type: TYPE_NORMAL
- en: This is an essential chapter, which highlights some novel ideas to augment both
    concepts with AI and ML.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Today’s data-rich enterprises are frequently confronted with the challenge to
    manage a heterogenous and highly distributed data landscape, where business data
    resides in diverse data stores, leading to the segmentation of data across various
    organizations. Discovering, understanding, and gaining trust in data and accessing
    relevant business data for downstream consuming purposes constitutes a huge challenge
    for business organizations. The limitation of human cognitive capabilities to
    understand data in context and gain semantic knowledge has not only created a
    bottleneck for data exploration tasks but has also led to ever-increasing difficulties
    to gain relevant and actionable business insight. Thus, a human-centric manual
    Data Fabric or Data Mesh approach is lacking the means to democratize access to
    data in a self-service fashion and to enable *data-as-a-product* (*shopping-for-data*)
    as a key Data Mesh principle.
  prefs: []
  type: TYPE_NORMAL
- en: The implications of AI and ML (AI/ML) to simplify and optimize a Data Mesh solution
    cannot be overestimated. Especially ML as the prevalent AI technology facilitates
    simplified discovery, access, and profiling of data that is stored in a variety
    of data stores, for example, RDBMS, NoSQL databases, or key value stores that
    are distributed enterprise-wide. The exploitation of AI/ML in Data Fabric^([1](#Fn1))
    scenarios has incentivized exploration and consumption of data for business organizations
    that have otherwise struggled even finding relevant data for their business purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Apart from exploring the usage of AI/ML to improve and simplify a Data Fabric
    architecture or Data Mesh solution, most data-centric enterprises are looking
    for current capabilities used for their existing AI initiatives. In this chapter,
    however, we elaborate on AI/ML to be used for both concepts.
  prefs: []
  type: TYPE_NORMAL
- en: General Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The following is a short, introductory description of some key Data Fabric
    and Data Mesh areas that can derive benefits from ML/DL. These areas are further
    discussed in the following corresponding sections. Since our focus is exclusively
    on the ML/DL aspects, we are assuming the reader to have a basic knowledge about
    these concepts in general. For instance, we don’t elaborate in-depth about data
    governance or data quality:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cataloging**: One of the most essential components for concepts is a knowledge
    or governance catalog. It contains business, technical, and operational metadata.
    Although governance catalogs and cataloging in general have existed already for
    quite some time, the ever-increasing diversity and complexity of the IT and business
    landscape and emerging regulations induce the need for AI-infused cataloging.^([2](#Fn2))
    For instance, AI is leveraged to automatically extract and propose new business
    terms for new regulations as candidates into a knowledge catalog. Registering
    and cataloging new data sources is based on automated metadata discovery, AI-based
    data rule discovery, automated detection of sensitive data, AI-based classification,
    and automated assignment of business terms.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data discovery**: The process of searching, understanding, and evaluating
    data is usually encapsulated as data discovery, which is enabled via automated
    data cataloging. Apart from data discovery, which should also include the discovery
    of data transformation stages or AI artefacts, such as ML/DL models, data engineering
    pipelines, etc., AI/ML itself should be used for data discovery tasks. ML-augmented
    data discovery and visualization includes semantic search, data affinity and non-obvious
    relationship discovery, identification of relevant data objects and AI artefacts
    for corresponding business tasks, and automated discovery to monitor data quality.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data profiling**: The process of examining, analyzing, and checking the content
    of all data attributes of relevant data sources to get a first path in understanding
    data quality is referred to as data profiling. The outcome of data profiling tasks
    is metadata that is captured in a knowledge catalog. This data relates to quality,
    structure, content, and relationship of the underlying data sources. For structured
    and relational data, profiling includes determination of data types, column and
    domain analysis, primary key analysis of corresponding tables, and cross-domain
    and foreign key analysis. Especially for non-structured and non-relational data,
    profiling is overlapping with activity or user behavior, customer classification,
    etc. ML can be used to accelerate and automate data profiling tasks; even DL techniques
    can be deployed to calculate quality measures, for instance, of text data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data access**: There are several AI-infused data access and data integration
    areas that further simplify and optimize data access with minimal data movement
    and high automation, such as self-service data access, ML-based query optimization,
    and ML-infused data abstraction layers where, for instance, data federation and
    virtualization is augmented with intelligent caching to allow for centralized
    access to data stored in disparate data sources including multiple clouds, semantic
    SQL, and confidence-based SQL statements.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Automated data quality assessment**: Data can only be used by business organizations
    if its quality within a business context and the source it originates from are
    trusted and its content and structure is well understood. AI-infused data quality
    assessments^([3](#Fn3)) enable automation, including calculations of data quality
    scores, detection of data anomalies and data drift, and to auto-analyze data quality
    issues with the goal to suggest remediation strategies for improved business consumption.
    Delivering reliable and trusted data in a timely fashion for business consumption
    is a continuous process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Entity matching**^([4](#Fn4)): Establishing a single, trusted version of
    the truth (360-degree view) of core business entities, in particular persona data,
    for example, customers, citizens, employees, and business partners, is required
    to deliver business insight. Since these persona records are typically distributed
    across multiple systems and applications across multiple clouds with different
    identifiers, ML-infused entity matching techniques can help resolve these entities,
    complementing traditional MDM solutions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Digital exhaust**: Any Data Fabric architecture or Data Mesh solution that
    is not only comprised of data discovery, profiling, and access but also of data
    exploration and transformation tasks, development and operationalization of ML/DL
    models, and orchestration and management of data and AI artefacts generates a
    digital exhaust, which can be leveraged to create additional metadata, which we
    call digital exhaust metadata. This is related to data lineage and data provenance
    events, data transformation stages, data knowledge graphs, data quality assessments,
    and shifts in key data quality measures. AI/ML can be applied to this metadata
    to gain additional relevant and actionable insight and to further optimize corresponding
    scenarios. For instance, shifts in data quality measures can be correlated to
    drift and degrading accuracy and precision of ML models during their entire lifetime.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Semantic enrichment**: Whereas the digital exhaust is geared toward enhancing
    and further optimizing relevant scenarios themselves, semantic enrichment thrives
    for simplification and optimization of data consumption by applications and business
    users. Applying AI provides automated enrichment to contextualize data with semantic
    knowledge, for instance, based on knowledge graphs and other existing metadata
    in the catalog. Enriching the Data Fabric or Data Mesh with semantic knowledge
    can shield data and business users from the complexity of IT, for example, the
    heterogeneous source data landscape, different data access methods (SQL vs. NoSQL),
    and various data formats (relational, XML, JSON, text, etc.).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Governing**: Data and information governance has existed for decades. Since
    this book does not provide a review of data governance^([5](#Fn5)) in general,
    we treat the AI-related aspects of governance in the sections on cataloging, data
    quality assessment, entity matching, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [7-1](#Fig1) is a high-level illustration of the relationship or coherence
    of these key Data Fabric and Data Mesh areas, which we have elaborated on earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_7_Chapter/537582_1_En_7_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A flow structure of data includes knowledge catalog metadata at the center,
    to discover, profile, and assess data quality, access, build, consume, and at
    bottom cataloging, entity matching, digital exhaust, semantic enrichment, and
    governing.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-1
  prefs: []
  type: TYPE_NORMAL
- en: Relationship of Key Data Fabric or Data Mesh Areas
  prefs: []
  type: TYPE_NORMAL
- en: The knowledge or governance catalog, depicted as the middle layer, contains
    the required business, technical, and operational metadata. The layer above it
    represents the data consumer or business user, who discovers and profiles data,
    assesses data quality, and finally accesses the data to build business-related
    artefacts that can then be used to consume data in a business-relevant context.
    The layer below it represents key Data Fabric or Data Mesh tasks that are performed
    by data stewards, data or information governance professionals, or data engineers.
    These consist of registering or cataloging new data sources or other entities
    into the knowledge catalog, performing entity matching tasks (in addition to a
    broader set of data quality measures), activating the digital exhaust, performing
    semantic enrichments, and conducting a broad range of data governance tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these tasks may be performed by different personas, depending on the
    usage scenario, for example, data consumption vs. data source registration. For
    instance, assessing data quality may be done by data consumers, business users,
    data stewards, or data governance professionals alike.
  prefs: []
  type: TYPE_NORMAL
- en: The outcome of the digital exhaust further improves scenarios for both concepts,
    whereas the outcome of the semantic enrichment can further simplify and optimize
    data consumption and data access.
  prefs: []
  type: TYPE_NORMAL
- en: The next section provides more details about these AI-infused topics.^([6](#Fn6))
    While doing so, our focus is specifically on the AI/ML aspects.
  prefs: []
  type: TYPE_NORMAL
- en: Let us begin with cataloging.
  prefs: []
  type: TYPE_NORMAL
- en: Cataloging
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The knowledge or governance catalog is an essential component in a Data Fabric
    architecture and Data Mesh solution. By using the term *cataloging*, we refer
    to data-centric tasks, which all generate business, technical, or operational
    metadata that is stored in the knowledge catalog. These tasks are not limited
    to data itself, but refer to IT- or AI-related artefacts, such as ETL^([7](#Fn7))
    stages and process flows, ML/DL models, data pipelines, etc.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are a few examples:'
  prefs: []
  type: TYPE_NORMAL
- en: Registering a new data source, ETL stage, or AI artefact, for example, an ML/DL
    model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Proposing and classifying new business terms for new regulations or laws
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discovering and creating new asset rules or policies, for example, related to
    data, ML/DL models, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Detecting sensitive data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Profiling data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Assessing data quality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Assessing ML/DL model accuracy, precision, and other quality-related KPIs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating and assigning new business terms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In addition to the preceding tasks, the operational environment may generate
    additional metadata, for instance, by continuously measuring data quality KPIs,
    for example, a data quality score, understanding drift and bias in ML/DL models,
    capturing data lineage or data provenance events, etc. Activating the digital
    exhaust and performing semantic enrichment^([8](#Fn8)) generate metadata as well.
    Some of these tasks are performed in a certain sequence within the context of
    a cataloging process. For instance, registering a new data source may very well
    include the tasks to detect sensitive data and to generate and assign new business
    terms.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [7-2](#Fig2) is an illustration of the *registering a new asset* process.
    We describe this process regarding a data source, IT asset (ETL stage), and AI
    artefact (ML model), whereby the focus is on the AI-infused augmentation. Let
    us discuss Figure [7-2](#Fig2) in more detail. The metadata of a new data source
    needs to be discovered automatically. This includes ownership, access methods
    (SQL, NoSQL, REST API, etc.), structured or unstructured data, read and/or write
    access, authentication requirements, and so forth.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_7_Chapter/537582_1_En_7_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A schematic representation of the different stages of data source, E T L stage,
    M L model includes auto-discover, metadata, auto-assessing asset quality, auto-detecting
    sensitive asset, auto-discover new asset rules, and auto-assign business terms.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-2
  prefs: []
  type: TYPE_NORMAL
- en: Registering a New Asset
  prefs: []
  type: TYPE_NORMAL
- en: The metadata of a new ETL stage includes ownership, execution pattern, source
    data required, downstream consuming systems, applications, languages used (e.g.,
    SQL, Java, C++, etc.) or additional ETL stages that depend on the outcome of the
    ETL stage, and so forth. The metadata of a new ML model includes ownership, status
    of the ML model (e.g., trained, validated, tested, deployed, etc.), business purpose,
    required data sources, features required from those data sources, data pipeline
    required, and so forth.
  prefs: []
  type: TYPE_NORMAL
- en: A data steward needs to validate the cataloging steps and may even have to manually
    complete missing metadata.
  prefs: []
  type: TYPE_NORMAL
- en: Auto-assessment of the new data source quality includes AI-based generation
    of a quality score and detection of data anomalies, missing attributes, or data
    drift that is especially important for AI model development and adjustments. Detecting
    data drift may be a repetitive process.
  prefs: []
  type: TYPE_NORMAL
- en: The auto-assessment of the ETL stage includes ML-based quality evaluation of
    the ETL stage output dataset in terms of completeness and trustworthiness and
    drift detection in the ETL performance, the latter one being a repetitive process.^([9](#Fn9))
    The auto-assessment of an ML model quality is itself based on ML methods to measure,
    for instance, the ML model accuracy, precision, and areas under the ROC and PR
    curves^([10](#Fn10)) and detection of model fairness (bias) and drift, the latter
    one being a repetitive process as well.
  prefs: []
  type: TYPE_NORMAL
- en: Auto-detecting sensitive data is based on AI-infused methods to discover, for
    instance, PII^([11](#Fn11)) or confidential data. A data steward may perform a
    final validation to either confirm or decline the recommendation from the AI model.
    For an ETL stage, AI-based detection of sensitive data that is processed in the
    ETL stage has to be performed. Likewise, for a new ML model, AI-based methods
    need to be applied to auto-detect sensitive features used in the ML model.
  prefs: []
  type: TYPE_NORMAL
- en: Auto-detecting new asset rules is an essential step in the registration process.
    For a new data source, this includes AI-based, automated pattern discovery for
    new data rules and policies or assignment of existing data rules or policies.
    For an ETL stage, this includes AI-based pattern discovery for the ETL stage execution
    or correlation discovery of a particular ETL stage with additional ETL stages,
    which results in corresponding rules or policies. A new ML model needs to be understood
    in terms of its scoring and inferencing needs. AI-based metadata analysis to determine
    a scoring or inferencing pattern generates either new or assigns existing ML model
    scoring- and inferencing-related rules or policies.
  prefs: []
  type: TYPE_NORMAL
- en: Auto-assignment of business terms related to a new data source includes ML/DL-based
    assignment of existing business terms that are already included in the knowledge
    catalog; it may also generate new business terms that are, for instance, derived
    from new regulations or laws. A new ETL stage may generate new KPIs, which aren’t
    reflected yet in the knowledge catalog. ML/DL-based business term assignment for
    such a new ETL stage relates to those new KPIs.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, an ML model generates outcomes, for example, a trust or confidence
    score and so on, which may be captured with a new business term or assigned to
    an existing one.
  prefs: []
  type: TYPE_NORMAL
- en: Let us move on to examine what is meant by AI-infused understanding of AI assets.
  prefs: []
  type: TYPE_NORMAL
- en: AI-Infused Understanding of Assets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the previous section, we have broadened the scope above and beyond just dealing
    with data, incorporating ETL stages and ML models into our discussion.
  prefs: []
  type: TYPE_NORMAL
- en: Moving on, we continue to focus on data and ML models. This lives up to the
    expectations that today’s enterprises are dealing with an ever-increasing number
    of diverse assets. When we use the term *asset* in this section, we refer to data
    and AI models, where we limit our scope to AI-infused understanding.
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [7-3](#Fig3) depicts the set of AI capabilities that are applied to
    the four process steps: *discovering*, *profiling*, *assessing quality*, and *accessing
    assets*. Some of the AI capabilities may be applied to several process steps,
    such as the quality assessment that is part of the profiling and quality assessment
    processes. The profiling process is limited to a quality score, whereas the quality
    assessment process determines quality KPIs at a much more detailed level, including
    recommendation to improve the quality of assets.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_7_Chapter/537582_1_En_7_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A schematic representation of discover assets, profile assets, assess asset
    quality, and access to assets, below it has different assets such as semantic
    search, intelligent search, business relevance, relationship discovery, dependency
    detection, data drift detection, affinity discovery, quality score, baseline determination,
    anomaly discovery, auto S Q L, A I queries and more.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-3
  prefs: []
  type: TYPE_NORMAL
- en: Overview of AI-Infused Understanding of Assets
  prefs: []
  type: TYPE_NORMAL
- en: We discuss these AI capabilities in the forthcoming four subsections. Let us
    begin with asset discovery.
  prefs: []
  type: TYPE_NORMAL
- en: Asset Discovery
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once a new asset – again, we stay focused on data sources and ML models and
    focus on the AI-infused capabilities – is registered in the knowledge catalog,
    we can assume the availability of necessary metadata in the catalog. This enables
    the business user and other data and AI asset consumers to conduct semantic and
    intelligent searches, to understand the business relevance, and to discover relationships
    of assets.
  prefs: []
  type: TYPE_NORMAL
- en: Semantic search^([12](#Fn12)) describes the business user’s or search engine’s
    intent to generate the most accurate search results possible by considering the
    search intent, query context, and relationship between relevant assets or entities.
    These entities can be structured data (e.g., relational data, XML or JSON files,
    hierarchical data, CSV files) or non-structured data (e.g., textual data, image
    files, video and audio files). Thus, semantic search needs to address both types
    of data.
  prefs: []
  type: TYPE_NORMAL
- en: AI-based intelligent search^([13](#Fn13)) helps surface information and answers
    that are specific to a business intent. Even if relevant assets have been identified
    via the available metadata in the knowledge catalog, semantic and intelligent
    searches over these assets (e.g., data, ML models, etc.) need to be performed
    to gain further insight and to validate the relevance for a particular business
    intent.
  prefs: []
  type: TYPE_NORMAL
- en: Discovering assets and their relationship needs to be performed considering
    the corresponding business relevance or business objective. This requires search
    tools to be equipped with understanding human language and the capability to learn
    and become more targeted via ML/DL. This scope of understanding assets reaches
    clearly above and beyond the discovery and profiling phases, where structured
    and unstructured data, ML models, and other assets need to be further explored
    and understood in a business context.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to this profiling phase.
  prefs: []
  type: TYPE_NORMAL
- en: Asset Profiling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once assets have been discovered, they need to be further understood in terms
    of their dependencies from other assets. For ML models, this means to understand
    the required features for scoring and inferencing, including systems and data
    sources those features are generated with and stored at, respectively. ML/DL techniques
    can be used to understand the affinity of an asset to other assets that are reflected
    in the knowledge catalog. Asset profiling – including affinity discovery – is
    not limited to analyzing the metadata in the knowledge catalog; discovered assets
    need to be analyzed by looking at the assets directly. For instance, data assets
    need to be scanned to understand their content and structure, data type, primary
    and foreign key relationship, and also affinity to other assets.
  prefs: []
  type: TYPE_NORMAL
- en: Quality scores may have to be calculated using ML models and statistical samplings
    on a well-defined subset of the data, predicting the quality of the entire asset.
    In some situations, profiling on a subset of the data may not be sufficient; it
    thus may have to be done on the entire dataset. Data drift detection is a repetitive
    process that is particularly important considering the underlying data for ML
    models.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating quality scores is the first step of a more pervasive asset quality
    assessment, which we discuss next.
  prefs: []
  type: TYPE_NORMAL
- en: Automatic Asset Quality Assessment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Understanding anomalies especially in data sources is a key area within the
    automated asset quality assessment. This requires the determination of a data
    baseline to really understand deviations from that baseline. AI/ML techniques
    can be used to determine the baseline of almost all relevant data components.
    Corresponding products need to come with prepared model templates and GUIs to
    facilitate these quality assessments and – most importantly – to minimize skill
    requirements for business users to determine baselines and discover anomalies.
    Sophisticated tools should also react to discovered anomalies by comparing them
    to known issues and subsequently proposing remediation strategies. This does not
    only apply to data anomalies, but to issues with other assets as well.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, discovering degrading ML model quality measures, for example,
    model bias or drift, reduced ML model accuracy or precision, reduction of the
    area under the ROC and/or PR curve, etc., should be conveyed with recommendations
    or autonomously performed correction, such as retraining of an ML model or adjustments
    of hyperparameters. Quality assessment of any asset is a repetitive, ongoing process,
    not only executed when trying to understand an asset after its initial discovery.
  prefs: []
  type: TYPE_NORMAL
- en: Once assets are understood, they can finally be accessed or reaccessed. How
    AI can support this is the topic of our next subsection.
  prefs: []
  type: TYPE_NORMAL
- en: Asset Access
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An ML-infused data abstraction layer should support the business user or asset
    consumer to discover the best access method. For instance, several data sources
    may have to be accessed considering a specific business purpose. The business
    intent may be indicated by leveraging the business glossary, specifying specific
    business terms and KPIs of interest.
  prefs: []
  type: TYPE_NORMAL
- en: Using ML methods under the cover could suggest corresponding methods to access
    the required data sources via data virtualization with federation and intelligent
    caching to provide a centralized access, which hides the complexity and diversity
    of the underlying set of data sources from the asset consumer. This simplifies
    and optimizes data access for the data consumer and reduces the appearance of
    data silos by providing an ML-underpinned convergence of data stores. Such an
    ML-infused data abstraction layer increases self-service data access needs and
    minimizes data movement.
  prefs: []
  type: TYPE_NORMAL
- en: Improving SQL query performance and optimizing resource consumption is another
    key dimension of data access. ML-infused query optimization in RDBMS^([14](#Fn14))
    can support an optimizer to learn from past experience in comparing chosen access
    paths and corresponding elapsed times of a particular SQL query to refine the
    access path with each execution – resulting in reduced query elapsed times, further
    optimizing resource consumption, and making critical insight available to the
    business in a much shorter time.
  prefs: []
  type: TYPE_NORMAL
- en: IBM Db2 AI for z/OS^([15](#Fn15)) is an example, where AI/ML is used to optimize
    operational SQL query performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us now discuss a few enhancements that are broadening the scope of standard
    SQL to enable additional use cases:'
  prefs: []
  type: TYPE_NORMAL
- en: '**AutoSQL**: The diversity of data stores and methods, such as data lakes,
    data lakehouses, relational data stores, DWH, potentially several knowledge catalogs,
    and streaming data, requires AI-based SQL capabilities to hide the business user
    from using multiple query engines and moving or replicating data. AutoSQL^([16](#Fn16))
    is a technology that automates the access, integration, and management of data
    for AI – regardless of where it resides and how it is stored – without having
    to move assets. In conjunction with data virtualization and intelligent caching
    capabilities, AutoSQL empowers business users to easily query data across hybrid
    cloud and multi-vendor environments.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Confidence-based query matching**: Another means to improve data access is
    ML-infused confidence-based query matching, which improves query results and accuracy,
    even when the data resides outside of initial search parameters. This feature
    dramatically expands the range of possible data tasks that can be done without
    involving a data scientist.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Semantic SQL**: Enhancing traditional SQL with semantic query capabilities
    allows easier access to data, without the need for costly ETL or getting data
    scientists engaged. It also enables additional use cases that were not possible
    with the standard SQL. For instance, Db2 for z/OS with SQL Data Insights (SDI)^([17](#Fn17))
    leverages DL methods and extends the standard SQL to enhance the traditional data
    processing in a relational database. It extrapolates unsupervised learning to
    train neural network models for discovering, matching, and grouping records with
    similarities, dissimilarities, and clusters in Db2 for z/OS data. For example,
    by learning from a large amount of training data, SDI can infer hidden relationships
    across two different records that are traditionally not considered an exact match.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AI/ML for Entity Matching
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the key challenges in any Data Fabric architecture and Data Mesh solution
    is entity resolution and matching for core information (master data). Since data
    is stored in different systems and applications, core entities, for example, customers,
    business partners, citizens, employees, products, services, etc., are usually
    represented quite differently, making it hard to match these entities to derive
    a trusted, complete, single version of the truth (golden record). This has been
    a known issue for decades.
  prefs: []
  type: TYPE_NORMAL
- en: AI/ML has found its way to tackle this challenge, complementing existing deterministic
    and probabilistic matching techniques, yielding much more accurate matching results.
    Since we discuss entity matching^([18](#Fn18)) in much more detail in Chapter
    [8](537582_1_En_8_Chapter.xhtml), this section provides just a conceptual view
    of the AI/ML-infused state-of-the-art entity matching concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [7-4](#Fig4) depicts the AI/ML-based matching engine in the middle box
    with its key AI/ML capabilities, such as nickname resolution, pattern discovery,
    similarity discovery, distance measuring, ML-based prediction, and a standardizer
    function. Various inconsistent but similar records (depicted on the left side)
    serve as input to the matching engine, which can be adjusted and tuned by setting
    various parameters (depicted on the right side), such as matching attributes,
    threshold sensitivity, match strength setting, and tuning of the underlying ML
    algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_7_Chapter/537582_1_En_7_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An architecture diagram explains the matching results from A I or M L-based
    matching engine consist of name resolution, similarity discovery, M L-based prediction,
    pattern discovery, distance measuring, and standardizer function. The matching
    engine gets input from matching attributes, threshold sensitivity, match strength
    setting, M L algorithm tuning, and record 1 to record n.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-4
  prefs: []
  type: TYPE_NORMAL
- en: AI-Infused Entity Matching
  prefs: []
  type: TYPE_NORMAL
- en: The following is a list of the four parameters, which can be adjusted to influence
    the matching result.
  prefs: []
  type: TYPE_NORMAL
- en: '**Matching attributes**: Need to be defined based on the record content. These
    attributes can, for instance, be names, addresses, nicknames, phone numbers, city
    names, etc.; they are used as input for the comparison to match incoming records
    to create master data entities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Threshold sensitivity**: Needs to be defined as lower and upper boundaries
    for non-matches of records, enabling fine-tuning of the matching engine.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Match strength settings**: Can be used to set the similarity strength, for
    instance, with values between 0 and 10, and to see an estimate of how changes
    to attributes and threshold sensitivities affect the matching algorithm.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**ML algorithm tuning**: Influences the ML algorithms of the matching engine
    by setting distance measuring, standardization of entities, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Matching results are presented to the business users, data stewards, or requesting
    applications. If needed, further adjustments can be triggered by these personas
    or applications by further tuning the matching engine via the preceding parameters
    and sending corresponding records back to the matching engine.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following list describes the key AI/ML-based capabilities of the matching
    engine:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Name resolution**: Names may be fully spelled out, abbreviated, or provided
    as nicknames. Name resolution may use graph representations to indicate relationship
    with other entities, such as persona, city, employer, or attributes, like profession,
    age, etc. This allows Graph Neural Networks (GNNs) to resolve names or nicknames.
    GNNs can also be used to discover additional insight that may, for instance, be
    relevant to prevent fraud.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Pattern discovery**: A large number of records and attributes can either
    be automatically clustered according to discovered patterns or along a well-chosen
    subset of attributes or attribute types. This simplifies and accelerates the discovery
    of similar entities.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Similarity discovery**: The similarity discovery algorithms should be adjustable
    by the business user via match strength settings or weights. Different similarity
    algorithms may be used based on distance calculations, semantic similarity relations,
    GNNs, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Distance measuring**: Calculating the distance is related to similarity discovery,
    which can be facilitated via adjustable weights as well.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Standardizer function**: Standardizers are used by the matching algorithm
    to convert the values of different attributes to a standardized representation
    that can be processed by the AI/ML-based matching engine. Multiple standardizers
    should be used by the matching algorithm depending on the specific attribute types
    found in the records.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**ML-based prediction**: Since there may be potentially millions of entities
    to be resolved, ML algorithms can be used on a much smaller subset of the data,
    for instance, 5`–`10%, to predict matching entities on the entire dataset or to
    support data stewards in further fine-tuning the matching engine parameters. This
    improves performance and reduces resource consumption.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Depending on the data type, other AI/ML methods and algorithms may be used for
    matching purposes. For instance, comparing and determining the similarity of two
    texts or determining whether two texts portray a similar opinion about a certain
    subject may be done by applying DL algorithms. This topic, however, is beyond
    the scope of this book.
  prefs: []
  type: TYPE_NORMAL
- en: AI/ML to Activate the Digital Exhaust
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As you have seen in Chapters [3](537582_1_En_3_Chapter.xhtml) and [5](537582_1_En_5_Chapter.xhtml),
    a Data Fabric architecture or Data Mesh solution is comprised of a vast number
    of components that can be used to implement a variety of scenarios. Most associated
    tasks, regardless of whether they are performed by data stewards, business users,
    data engineers, data scientists, or other IT- and business-related personas, generate
    additional metadata in the knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: During the operations of systems, applications, and tools, additional data is
    generated. This digital footprint is related to the execution of ETL jobs and
    SQL queries, the scoring and inferencing of ML/DL models, changes to quality KPIs
    of data, ML/DL models, and other assets. Additional useful information can be
    found in systems and application LOGs, via insights from data lineage or data
    provenance events, data quality assessments, or data knowledge graphs.
  prefs: []
  type: TYPE_NORMAL
- en: This digital footprint may also be related to registering a new asset in the
    knowledge catalog, gaining additional insight about the data and AI assets, executing
    a data quality improvement or data matching process, exploring and transforming
    assets, and consuming or using an asset for a particular business purpose. The
    digital exhaust can be leveraged to create additional metadata, where AI/ML can
    be applied to this newly generated metadata to gain additional insight and to
    further optimize processes for both concepts.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are just a few examples of additional insight derived from the
    digital exhaust:'
  prefs: []
  type: TYPE_NORMAL
- en: Shifts in data quality KPIs can be correlated to drift and degrading accuracy
    and precision of some ML models during their lifetime.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: New data sources or other assets may have been registered in the knowledge catalog
    that could potentially be used to increase the relevance of BI reports or improve
    the accuracy of ML models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Correlation of LOG data to SQL query elapsed time behavior could yield additional
    insight regarding constraints in consumption of resources, for example, memory,
    CPU, I/O, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure [7-5](#Fig5) depicts the knowledge catalog in the center, which contains
    the metadata related to registering, cataloging, understanding, etc., which we
    have already discussed in the previous sections. It also contains new types of
    metadata, which is derived from the digital exhaust data, which we call *digital
    exhaust metadata*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_7_Chapter/537582_1_En_7_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A block diagram comprises several components, including digital exhaust metadata,
    a knowledge catalog, updated metadata, A I or M L capabilities, communication
    for query optimization, correlation insight, new data sources, and troubleshooting,
    all aimed at achieving quality improvements. It also involves digital exhaust
    data, logs, E T L stages, lineage, asset changes, and quality changes.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-5
  prefs: []
  type: TYPE_NORMAL
- en: Digital Exhaust Metadata
  prefs: []
  type: TYPE_NORMAL
- en: This new type of metadata is generated by the digital exhaust data, which is
    composed of LOGs, executions of ETL stages and SQL queries, etc. This metadata
    needs to be generated based on the digital exhaust. This can be done in a straightforward
    manner by simply storing, for instance, LOG data, data lineage events, SQL query
    elapsed times and resource consumption, SQL access path information, etc. in the
    knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: To some degree, existing metadata is updated as well. This combination of digital
    exhaust metadata and updated metadata needs to be analyzed via AI/ML capabilities
    to derive additional insight with recommendations to improve, simplify, and optimize
    corresponding Data Fabric or Data Mesh scenarios. AI/ML techniques are primarily
    used to discover patterns and non-obvious correlations or perform clustering and
    predictions.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, ML methods can be used to predict data quality that is likely
    to degrade below a defined threshold or to predict improved SQL performance based
    on resource adjustments, for example, adjusting the size of buffer pools. The
    Data Fabric and Data Mesh solution should autonomously implement adjustments or
    provide recommendations that should be implemented.
  prefs: []
  type: TYPE_NORMAL
- en: Activating the digital exhaust may also yield additional business insight simply
    by correlating non-obvious data points. Of course, this depends on the scope and
    content of the digital exhaust data captured. For instance, if ML model scoring
    or inferencing events related to marketing campaigns are captured, this data could
    be correlated with data quality initiatives or availability of new data sources,
    possibly suggesting or autonomously implementing adjustments that can improve
    the accuracy of the marketing campaign.
  prefs: []
  type: TYPE_NORMAL
- en: Let us now elaborate on the final topic, which is related to using AI/ML for
    semantic enrichment.
  prefs: []
  type: TYPE_NORMAL
- en: AI/ML for Semantic Enrichment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Semantic enrichment^([19](#Fn19)) is the process of adding meaning to data,
    which is represented as additional metadata in the knowledge catalog. The intent
    of semantic enrichment is to simplify and optimize some of the key Data Fabric
    and Data Mesh tasks, such as search and discovery of assets, access, and consumption
    of assets by applications and business users to build corresponding data products.
    Again, when we use the term *assets*, we refer to data, ML/DL models, and other
    AI artefacts. Applying AI to the semantic enrichment process provides *intelligent*
    and *automated* enrichment to contextualize assets with semantic knowledge mainly
    by using external data sources, for instance, based on knowledge graphs, domain-
    or industry-specific taxonomies or ontologies, business and IT glossaries, and
    other existing metadata in the knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Enriching the Data Fabric and Data Mesh with semantic knowledge makes it easier
    for data and business users to search, discover, access, and consume assets and
    can shield especially business users from the complexity of IT, the heterogeneous
    source data landscape, different data access methods (SQL vs. NoSQL), and various
    data formats (relational, XML, JSON, text, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: Semantic enrichment is often used in the context of tagging, indexing, classification,
    markup, annotation, etc. The challenge of semantic enrichment is to provide automation
    as much as possible, primarily via infusing AI/ML into the semantic enrichment
    process.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [7-6](#Fig6) is a high-level depiction of the AI/ML-infused semantic
    enrichment engine, which is comprised of AI/ML capabilities, such as clustering,
    pattern discovery, correlation or relationship discovery, concept matching, etc.,
    plus additional semantic enrichment capabilities, such as linguistic analysis,
    text analysis, tagging, indexing, etc. As it is depicted on the left side of Figure
    [7-6](#Fig6), the assets to be semantically enriched could be data (structured
    or unstructured), ML/DL models or other AI-related artefacts, text, XML or JSON
    documents, data science`–`related pipelines, ETL stages, digital exhaust metadata,
    etc.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_7_Chapter/537582_1_En_7_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A schematic illustration depicts various components, including assets data,
    M L or D L models, text, knowledge graphs, domain-specific ontologies, business
    I T glossaries, and metadata. These components are connected to a semantic enrichment
    engine that utilizes M L capabilities such as clustering, correlations, linguistic
    analysis, tagging, pattern discovery, concept matching, text analysis, and indexing.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 7-6
  prefs: []
  type: TYPE_NORMAL
- en: Semantic Enrichment
  prefs: []
  type: TYPE_NORMAL
- en: The semantic enrichment engine is using additional external data sources, such
    as knowledge graphs, domain- or industry-specific taxonomies or ontologies, and
    business and IT glossaries, to generate the semantic metadata or knowledge. Existing
    metadata that is already stored in the knowledge catalog may be used as additional
    input as well.
  prefs: []
  type: TYPE_NORMAL
- en: Once the semantic metadata is generated, it can then be used by business users
    to simplify and optimize Data Fabric and Data Mesh`–`related tasks, such as search,
    discovery, access, and consumption of assets, and – most importantly – to build
    data products in self-service fashion. In addition, the semantic insight should
    be explainable, actionable, and visualized^([20](#Fn20)) via a GUI.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [7-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 7-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | AI/ML methods are essential to augment the Data Fabric and Data Mesh.
    | AI/ML-infused Data Fabric and Data Mesh democratizes access to data in a self-service
    fashion and enables *data-as-a-product* (*shopping-for-data*) as a key Data Mesh
    principle. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Registering a new asset should automatically generate metadata. | Registering
    a new data or AI asset into the knowledge catalog should be done in correlation
    with auto-assessing asset quality, auto-detecting sensitive data, auto-discovering
    new asset rules, and auto-assigning business terms. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Enhancing standard SQL with AI. | There are essential enhancements to
    standard SQL, such as AutoSQL, confidence-based query matching, and semantic SQL.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | AI/ML should be used for entity matching. | AI/ML has found its way to
    tackle the entity matching challenge for core information (master data), complementing
    existing deterministic and probabilistic matching techniques, yielding much more
    accurate matching results. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | AI/ML can be used to activate the digital exhaust. | The digital exhaust
    can be leveraged to create additional metadata (digital exhaust metadata), where
    AI/ML can be applied to this metadata to gain additional insight and to further
    optimize Data Fabric and Data Mesh scenarios. |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | The semantic enrichment engine should be enhanced with AI/ML. | The goal
    of semantic enrichment is to simplify and optimize some of the key Data Fabric
    and Data Mesh tasks, such as search and discovery of assets, access, and consumption
    of assets by applications and business users. |'
  prefs: []
  type: TYPE_TB
