- en: Part IIKey Data Fabric and Data Mesh Capabilities and Concepts
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第二部分：关键数据编织和数据网格能力与概念
- en: 5. Key Data Fabric and Data Mesh Capabilities
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5. 关键数据编织和数据网格能力
- en: A state-of-the-art Data Fabric architecture and Data Mesh solution is unquestionably
    linked to the knowledge catalog^([1](#Fn1)) as one of its prime components. What
    differentiates a modern knowledge catalog from traditional ones are AI-infused
    capabilities to automate tasks and to provide self-service capabilities. AI is
    without dispute an inevitable domain that characterizes a modern Data Fabric and
    Data Mesh. Infusing AI generates additional added value specifically for business
    users, such as delivering trustworthy AI.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 最先进的数据编织架构和数据网格解决方案无疑与知识目录^([1](#Fn1))紧密相连，作为其核心组件之一。现代知识目录与传统知识目录的区别在于其AI增强的能力，可以自动化任务并提供自助服务能力。AI无疑是现代数据编织和数据网格的一个不可避免的特征领域。注入AI为商业用户创造了额外的价值，例如提供可信AI。
- en: Dealing with diverse and heterogeneous source data, which is typically distributed
    across various organizations and systems, requires intelligent information integration
    concepts that go far above and beyond traditional data federation or virtualization
    techniques.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 处理多样化的异构源数据，这些数据通常分布在各种组织和系统中，需要超越传统数据联盟或虚拟化技术的智能信息集成概念。
- en: Intelligent information integration needs to include AI artefacts (for instance,
    AI models, Jupyter notebooks, ETL stages and pipelines, dashboards, physical and
    logical data models), automating the integration of these artefacts for timely
    insights and business decisions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 智能信息集成需要包括AI工件（例如，AI模型、Jupyter笔记本、ETL阶段和管道、仪表板、物理和逻辑数据模型），自动化这些工件的集成以获得及时洞察和业务决策。
- en: Introduction
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: This chapter introduces key capabilities for both concepts, such as a knowledge
    catalog with active metadata, data curation, rules and policy management, semantic
    knowledge graphs (semantic networks), and self-service capabilities. A subsection
    elaborates on trustworthy AI, which has been described in Chapter [3](537582_1_En_3_Chapter.xhtml)
    as one of the four key use case scenarios or entry points. It also includes activation
    of the digital exhaust, where we elaborate on pattern recognition and correlation
    discovery from the digital exhaust to augment and operationalize this insight
    into the Data Fabric and Data Mesh.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本章介绍了这两个概念的关键能力，例如具有主动元数据的知识目录、数据整理、规则和政策管理、语义知识图谱（语义网络）和自助服务能力。一个子节详细阐述了可信AI，这在第[3](537582_1_En_3_Chapter.xhtml)章中被描述为四个关键用例场景或入口点之一。它还包括激活数字废气，其中我们详细阐述了从数字废气中识别模式和发现相关性的过程，以增强和实现这一见解到数据编织和数据网格中。
- en: Finally, we elaborate very briefly on intelligent information integration concepts
    as an integral part for both concepts. Although we address intelligent information
    integration approaches, the focus of this chapter is nevertheless on the knowledge
    catalog and trustworthy AI topics.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们非常简要地阐述了智能信息集成概念，这是两个概念不可或缺的一部分。尽管我们讨论了智能信息集成方法，但本章的重点仍然是知识目录和可信AI主题。
- en: Knowledge Catalog
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 知识目录
- en: As we have already seen in Chapter [2](537582_1_En_2_Chapter.xhtml), the knowledge
    catalog is one of the most essential components for a Data Fabric architecture
    and Data Mesh solution and is inevitably associated with enabling execution of
    relevant tasks, such as cataloging all your assets, generating active metadata,
    performing data curation tasks, implementing self-service capabilities, providing
    a knowledge graph (semantic networks), enforcing local and global data rules and
    policies, and enforcing unified data and AI governance. To investigate additional
    facets, we feature the knowledge catalog in several additional chapters, for example,
    Chapters [13](537582_1_En_13_Chapter.xhtml), [14](537582_1_En_14_Chapter.xhtml),
    and [15](537582_1_En_15_Chapter.xhtml).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在第[2](537582_1_En_2_Chapter.xhtml)章中已经看到的，知识目录是数据编织架构和数据网格解决方案中最基本的部分之一，并且不可避免地与执行相关任务相关联，例如编制所有资产、生成主动元数据、执行数据整理任务、实施自助服务能力、提供知识图谱（语义网络）、执行本地和全局数据规则和政策、以及执行统一的数据和AI治理。为了调查其他方面，我们在几个额外的章节中特别强调了知识目录，例如第[13](537582_1_En_13_Chapter.xhtml)、[14](537582_1_En_14_Chapter.xhtml)和[15](537582_1_En_15_Chapter.xhtml)章。
- en: Let’s start with a description of what we mean by metadata and by generating
    active metadata.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从对元数据和生成主动元数据的描述开始。
- en: Active Metadata
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 活跃元数据
- en: 'The treatment of this topic requires us to briefly revisit what we mean by
    metadata. Metadata is simply data that describes data; it is typically categorized
    into business metadata, technical metadata, and operational metadata:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 处理这个主题需要我们简要回顾一下我们所说的元数据是什么意思。元数据简单地说是描述数据的；它通常分为业务元数据、技术元数据和操作元数据：
- en: '**Business metadata**: Provides business-relevant context to data and AI artefacts.
    It describes business aspects, provides meaning to the data and AI assets, and
    is primarily added and consumed by business users. Business metadata enables LoB
    users to use an organization- or enterprise-wide consistent language, for instance,
    by maintaining industry- or domain-specific business glossaries. Business metadata
    helps bridge the chasm between IT and business teams. Examples of business metadata
    are annotations to business reports or AI model outcomes, business glossaries,
    and information about federal and international laws or regulations relevant to
    business operations and how to manage data and AI assets, ownership of AI assets,
    security and privacy levels, etc.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**业务元数据**：为数据和AI工件提供业务相关的上下文。它描述业务方面，为数据和AI资产提供意义，并且主要由业务用户添加和消费。业务元数据使LoB用户能够使用组织或企业范围内的统一语言，例如，通过维护行业或领域特定的业务术语表。业务元数据有助于弥合IT和业务团队之间的鸿沟。业务元数据的例子包括业务报告或AI模型结果的注释、业务术语表以及与业务运营相关的联邦和国际法律或法规的信息，以及如何管理和AI资产的所有权、安全性和隐私级别等。'
- en: '**Technical metadata**: Is primarily concerned about the organization of data
    and AI artefacts; it describes its structure and physical attributes, location
    of AI assets, quality metrics, connections available, access methods, etc. Examples
    of technical metadata are database table and column names, indexes, data types,
    names and attributes of AI models (i.e., ML/DL algorithms used), Jupyter notebooks
    (i.e., languages used), logical and physical data models, XML schema definitions,
    stored procedure definitions, BI artefacts, etc. Technical metadata enables data
    professionals to give adequate attention to how to manage, access, transform,
    and consume data and AI assets.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**技术元数据**：主要关注数据和组织AI工件的组织；它描述其结构和物理属性、AI资产的位置、质量指标、可用的连接、访问方法等。技术元数据的例子包括数据库表和列名、索引、数据类型、AI模型（即使用的ML/DL算法）的名称和属性、Jupyter笔记本（即使用的语言）、逻辑和物理数据模型、XML模式定义、存储过程定义、BI工件等。技术元数据使数据专业人士能够充分关注如何管理、访问、转换和消费数据和AI资产。'
- en: '**Operational metadata**: Often called process metadata, is concerned about
    the creation and transformation of AI assets, including when they were updated
    or deleted by whom and why; it describes events and processes that affect AI assets.
    Examples of operational metadata are ETL stages, Insert/Update/Delete (I/U/D)
    logs, pipelines, job execution logs including runtime parameters, SQL query execution
    logs (i.e., access path information), AI asset usage logs, etc. In combination
    with business and technical metadata, process metadata can, for instance, be used
    to visualize data lineage or data provenance.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**操作元数据**：通常被称为流程元数据，关注于AI资产的创建和转换，包括它们何时被谁更新或删除以及原因；它描述了影响AI资产的的事件和过程。操作元数据的例子包括ETL阶段、插入/更新/删除（I/U/D）日志、管道、作业执行日志（包括运行时参数）、SQL查询执行日志（即访问路径信息）、AI资产使用日志等。结合业务和技术元数据，流程元数据可以用于可视化数据血缘或数据来源。'
- en: Before moving ahead toward active metadata, we provide another angle to metadata,
    which became popular in recent years – social metadata. This is often mistaken
    for user-generated content. However, social metadata is data about social data
    and its originator, for instance, annotations, descriptions, trust scores, relevance,
    completeness, etc.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续讨论活跃元数据之前，我们提供另一个关于元数据的视角，这在近年来变得流行——社交元数据。这通常被误认为是用户生成的内容。然而，社交元数据是关于社交数据和其发起者的数据，例如，注释、描述、信任分数、相关性、完整性等。
- en: Let us now set ourselves the task to explain what we mean by active metadata
    and why it matters. According to Gartner,^([2](#Fn2)) “active metadata management
    is an emerging set of capabilities across multiple data management markets resulting
    from continuous metadata management innovation.” In our view, active metadata
    is AI/ML-augmented metadata, meaning it is generated by applying AI/ML techniques
    to metadata to gain additional actionable insight, which can be used to further
    automate Data Fabric or Data Mesh tasks. In other words, active metadata is presumably
    derived from traditional metadata (business, technical, and operational) via AI/ML
    capabilities to enable automated consumption by Data Mesh`–`relevant applications
    and systems. In addition, users may be allowed to intercept the execution of automated
    tasks to validate, adjust, or even reject those automated tasks; recommendations
    and suggestions may have to be evaluated prior to implementing them. AI/ML techniques
    are particularly well suited to further augment automation and simplification
    of essential tasks.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设定一个任务，解释我们所说的主动元数据是什么，以及为什么它很重要。根据 Gartner 的说法^([2](#Fn2))，“主动元数据管理是一组在多个数据管理市场中不断创新的元数据管理能力。”在我们看来，主动元数据是
    AI/ML 增强的元数据，这意味着它是通过应用 AI/ML 技术到元数据中，以获得额外的可操作见解，这些见解可以用于进一步自动化数据织锦或数据网格任务。换句话说，主动元数据可能是通过
    AI/ML 能力从传统元数据（业务、技术和操作）中派生出来的，以使数据网格相关应用程序和系统能够自动消费。此外，用户可能允许拦截自动化任务的执行以验证、调整或甚至拒绝这些自动化任务；在实施之前可能需要评估建议和意见。AI/ML
    技术特别适合进一步增强自动化和简化基本任务。
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig1_HTML.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig1_HTML.png)'
- en: An illustration represents the layer of passive metadata containing business
    metadata, technical metadata, and operational metadata. At the bottom, it indicates
    the elements of active metadata named automated rules, alerts, resource allocation,
    and tagging. It also denotes the outcomes and updates of the active metadata generation
    engine on the right.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图表示了包含业务元数据、技术元数据和操作元数据的被动元数据层。在最下面，它指出了名为自动化规则、警报、资源分配和标记的主动元数据元素。它还表示了主动元数据生成引擎右侧的成果和更新。
- en: Figure 5-1
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-1
- en: Active Metadata
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 主动元数据
- en: Figure [5-1](#Fig1) depicts the key components to generate and consume active
    metadata; it features prominently the knowledge catalog with its business metadata,
    technical metadata, and operational metadata in the middle, which often is referred
    to as passive metadata, and the active metadata generation engine with its AI/ML
    capabilities on the right side.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [5-1](#Fig1) 展示了生成和消费主动元数据的关键组件；它突出显示了位于中间的知识目录，其中包含业务元数据、技术元数据和操作元数据，通常被称为被动元数据，以及右侧的主动元数据生成引擎，它具有
    AI/ML 能力。
- en: The active metadata generation engine applies the AI/ML capabilities, such as
    pattern and correlation discovery, clustering and prediction, and anomaly detection,
    holistically to the entirety of passive metadata (business, technical, and operational)
    to derive to actionable insight and recommendations for improvements or simplifications
    of relevant tasks. The primary objective of active metadata is geared toward automated
    inferencing into Data Mesh applications, systems, or components. Nevertheless,
    business analysts, data stewards, data governance personnel, and data scientists
    may benefit from active metadata as well by gaining additional insight, for instance,
    by receiving alerts related to shifting business outcomes, violations to regulatory
    compliance, degrading data quality metrics, or recommendations to expedite data
    exploration tasks.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 主动元数据生成引擎将 AI/ML 能力，如模式和相关发现、聚类和预测以及异常检测，全面应用于整个被动元数据（业务、技术和操作），以得出可操作见解和改进或简化相关任务的推荐。主动元数据的主要目标是针对数据网格应用程序、系统或组件的自动化推理。尽管如此，业务分析师、数据管理员、数据治理人员和数据科学家也可以通过获得额外的见解而受益，例如，通过接收有关业务结果变化、违反合规性、数据质量指标下降或建议加快数据探索任务的警报。
- en: Semantic enrichment and activating the digital exhaust from Data Fabric or Data
    Mesh processes, which we further explore in Chapter [7](537582_1_En_7_Chapter.xhtml),
    are additional examples related to generating active metadata.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 语义丰富化和激活来自数据织锦或数据网格过程的数字废气，我们将在第 [7](537582_1_En_7_Chapter.xhtml) 章节中进一步探讨，是生成主动元数据的附加示例。
- en: Data Curation
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据整理
- en: We refer to data curation as a set of processes to add data and AI assets to
    a knowledge catalog, enriching them by assigning classifications, data classes,
    and business terms, automatically generating and assigning asset rules and policies,
    providing a self-service way to discover and share enterprise assets, and analyzing,
    ensuring, and improving quality of the assets. Data stewards and data engineers
    curate data and AI assets by intelligent cataloging and automated metadata management,
    including importing and enriching metadata, preparing the assets, enriching the
    assets by assigning governance artefacts, and publishing the assets into a knowledge
    catalog.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将数据整理定义为一系列将数据和分析资产添加到知识编目中的过程，通过分配分类、数据类别和业务术语来丰富它们，自动生成和分配资产规则和政策，提供一种自助方式来发现和共享企业资产，以及分析、确保和提高资产的质量。数据管理员和数据工程师通过智能编目和自动化元数据管理来整理数据和AI资产，包括导入和丰富元数据、准备资产、通过分配治理工件来丰富资产，并将资产发布到知识编目中。
- en: Intelligent cataloging and automated metadata management are further examined
    in Chapters [13](537582_1_En_13_Chapter.xhtml) and [14](537582_1_En_14_Chapter.xhtml).
    In this section, we provide a high-level overview of the key data curation tasks.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 智能编目和自动化元数据管理在章节 [13](537582_1_En_13_Chapter.xhtml) 和 [14](537582_1_En_14_Chapter.xhtml)
    中进一步探讨。在本节中，我们提供了关键数据整理任务的高级概述。
- en: 'The following is a brief description of key data curation tasks:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是对关键数据整理任务的简要描述：
- en: '**Create metadata**: Automatically generate metadata of relevant data and AI
    assets, for example, source data tables, and capture the metadata in the knowledge
    catalog.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创建元数据**：自动生成相关数据和AI资产（例如，源数据表）的元数据，并在知识编目中捕获这些元数据。'
- en: '**Assign business terms**: Discover business terms based on available business
    glossaries or propose new business terms, for instance, based on available taxonomies,
    and assign these terms to corresponding assets.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分配业务术语**：根据可用的业务术语表发现业务术语或提出新的业务术语，例如，基于可用的分类法，并将这些术语分配给相应的资产。'
- en: '**Analyze asset quality**: Perform profiling of data and AI assets, conduct
    quality assessments, and propose recommendations for quality improvements to be
    accepted or rejected by the data steward.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分析资产质量**：对数据和AI资产进行配置文件分析，进行质量评估，并提出质量改进建议供数据管理员接受或拒绝。'
- en: '**Refine assets**: Prepare, transform, and improve quality of data and AI assets,
    for instance, based on data rules and policies, including automatically generated
    recommendations to be accepted or rejected by the data steward.'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**精炼资产**：准备、转换和改进数据和分析资产的质量，例如，基于数据规则和政策，包括自动生成的建议供数据管理员接受或拒绝。'
- en: '**Enriching metadata**: Assign data classes, perform semantic enrichment (e.g.,
    generate semantic knowledge graphs) and data classification, add tags and annotations,
    etc.'
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**丰富元数据**：分配数据类别，执行语义丰富（例如，生成语义知识图谱）和数据分类，添加标签和注释等。'
- en: '**Assigning governance artefacts**: For instance, automatically generate rules
    and policies according to governance and regulation imperatives.'
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分配治理工件**：例如，根据治理和监管要求自动生成规则和政策。'
- en: Most of these data curation tasks, for example, semantic enrichment and automatically
    generating and assigning asset rules and policies, may very well require applying
    AI/ML techniques. We refer to AI/ML-infused data curation as *advanced or intelligent
    data curation*.^([3](#Fn3))
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数这些数据整理任务，例如语义丰富和自动生成和分配资产规则和政策，可能非常需要应用AI/ML技术。我们将AI/ML融合的数据整理称为*高级或智能数据整理*。[3](#Fn3)
- en: Let us now proceed to the exciting topic of semantic knowledge graphs.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续探讨一个令人兴奋的主题——语义知识图谱。
- en: Semantic Knowledge Graphs
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语义知识图谱
- en: 'A knowledge graph – often referred to as a semantic network – is a directed
    labeled graph, which comprises three main components: nodes, edges, and labels.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱——通常被称为语义网络——是一个有向标签图，它包含三个主要组件：节点、边和标签。
- en: 'Figure [5-2](#Fig2) is a simple knowledge graph depicting the relationship
    of a customer *A* to a vendor *B*: *A* is a customer of *B*. Depending on the
    application area, *A* is referred to as *subject*, *B* is referred to as *object*,
    and the label is referred to as *predicate*. A directed graph where the nodes
    are classes and subclasses of objects of a particular domain (e.g., car, engine,
    cylinder, camshaft, etc.), and the edges describe the subclass relationship, is
    called a taxonomy. The conceptual compatibility of knowledge graphs to active
    metadata seems to be obvious: knowledge graphs represent enriched metadata that
    is derived by analyzing passive metadata and by applying AI/ML capabilities to
    gain additional non-obvious insight. For instance, knowledge graphs should be
    created by visualizing *ownership-asset* relationships and enriching the knowledge
    graph with detected anomalies in those relationships or non-obvious correlations
    between some data and AI assets.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图[5-2](#Fig2)是一个简单的知识图谱，描述了客户*A*与供应商*B*之间的关系：*A*是*B*的客户。根据应用领域，*A*被称为*主题*，*B*被称为*对象*，标签被称为*谓词*。一个有向图，其中节点是特定领域（例如，汽车、发动机、气缸、凸轮轴等）的对象的类和子类，边描述子类关系，被称为分类法。知识图谱与活动元数据的概念兼容性似乎是明显的：知识图谱代表了通过分析被动元数据和通过应用AI/ML能力以获得额外非明显洞察而得出的丰富元数据。例如，知识图谱应通过可视化*所有权-资产*关系并丰富知识图谱中检测到的这些关系中的异常或某些数据与AI资产之间的非明显相关性来创建。
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig2_HTML.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig2_HTML.png)'
- en: A diagram indicates node a pointing an arrow towards node b. The arrow is indicated
    as edge, and the text at the top reads label, colon, is customer of.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 一个图表表明节点a指向节点b的箭头。箭头表示为边，顶部的文本读作标签，冒号，是客户。
- en: Figure 5-2
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-2
- en: Knowledge Graph
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱
- en: We may call those AI/ML-enriched knowledge graphs as *semantic knowledge graphs*.^([4](#Fn4))
    They are stored in graph databases (GDBs) as a logical component of a knowledge
    catalog. Examples of GDBs are Amazon Neptune,^([5](#Fn5)) Neo4j,^([6](#Fn6)) and
    IBM Graph,^([7](#Fn7)) among others. Figure [5-3](#Fig3) is an example of a semantic
    knowledge graph that visualizes an AI model in context. It characterizes the AI
    model in terms of its type and subtype, for example, the AI model can be of type
    *machine learning* with an associated subtype of a *binary classification model*,
    as it is very common for fraud prevention models.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这些AI/ML增强的知识图谱称为*语义知识图谱*^([4](#Fn4))。它们作为知识目录的逻辑组件存储在图数据库（GDBs）中。图数据库的例子包括Amazon
    Neptune^([5](#Fn5))、Neo4j^([6](#Fn6))和IBM Graph^([7](#Fn7))等。图[5-3](#Fig3)是一个可视化AI模型上下文的语义知识图谱示例。它从类型和子类型的角度描述AI模型，例如，AI模型可以是*机器学习*类型，关联的子类型是*二元分类模型*，因为欺诈预防模型非常常见。
- en: As you can easily imagine, the knowledge graph could also visualize additional
    characteristics of the AI model, such as when the model was trained and deployed,
    when and how often it was retrained, and related AI artefacts, for example, Jupyter
    notebooks, pipelines, required features, etc.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如您容易想象，知识图谱还可以可视化AI模型的附加特征，例如模型何时被训练和部署，何时以及多久重新训练，以及相关的AI工件，例如Jupyter笔记本、管道、所需特征等。
- en: The knowledge graph also depicts the personas, which have developed the AI model
    and its current ownership, including their corresponding roles and organizations
    they belong to. In our example *John*, who is a data scientist in the development
    organization, has developed the model, and *Joan*, who is a business owner in
    the fraud department, has business responsibility for the AI model. Additional
    personas with their corresponding roles and organizations could be included as
    well, for example, linking the model to the AI governance and IT operational organizations.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱还描绘了角色，这些角色开发了AI模型及其当前所有权，包括他们对应的角色和他们所属的组织。在我们的例子中，*John*是开发组织中的数据科学家，开发了该模型，而*Joan*是欺诈部门的业务所有者，对AI模型有业务责任。还可以包括其他具有相应角色和组织的角色，例如，将模型链接到AI治理和IT运营组织。
- en: A knowledge graph needs to give adequate attention to key quality metrics that
    need to be regularly measured during the operationalization phase of the AI model.
    This is exemplarily depicted on the left side of Figure [5-3](#Fig3), where you
    see the area under the ROC (Receiver Operating Characteristic) and PR (Precision-Recall)
    curves^([8](#Fn8)) and F1 measure, among others.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 知识图谱需要给予在AI模型操作阶段需要定期测量的关键质量指标足够的关注。这如图[5-3](#Fig3)的左侧所示，其中你可以看到ROC（接收者操作特征）和PR（精确率-召回率）曲线下的面积以及其他F1度量。
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig3_HTML.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig3_HTML.png)'
- en: A diagram exhibits the interconnection among multiple nodes. It denotes the
    A I model related to the taxonomy, enriched with tags and annotation, and added
    interfacing patterns, providing the quality metrics containing area under P R,
    R O C, and F 1 measure, which belong to the primary metrics.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一个图表展示了多个节点之间的相互连接。它表示与分类相关的AI模型，通过标签和注释进行了丰富，并添加了接口模式，提供了包含P-R曲线下面积、ROC和F1度量等质量指标的度量，这些属于主要指标。
- en: Figure 5-3
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-3
- en: Semantic Knowledge Graph Example
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 语义知识图谱示例
- en: Additional metrics and insight into the model could be visualized by the knowledge
    graph, such as bias and drift, including the corresponding times when those metrics
    were measured. Additional insight could be related to the explainability of the
    AI model, for example, based on automated discovery of features influencing scoring.
    Analyzing passive metadata available in the knowledge catalog – in combination
    with AI/ML techniques – enables enrichment of a knowledge graph of AI models.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 通过知识图谱可以可视化额外的指标和对模型的洞察，例如偏差和漂移，包括测量这些指标时的时间。额外的洞察可能与AI模型的可解释性相关，例如，基于影响评分的特征的自动发现。分析知识目录中可用的被动元数据——结合AI/ML技术——能够丰富AI模型的知识图谱。
- en: Metadata of potentially unprecedented diversity in terms of pervasive business
    glossaries, structured and unstructured data, and particularly operational metadata,
    entangled with external data, such as industry- or domain-specific taxonomies
    and ontologies, makes AI/ML particularly well suited to enrich the knowledge graph
    with semantic knowledge. In our semantic knowledge graph as depicted in Figure
    [5-3](#Fig3), we have indicated just a few examples of automated semantic enrichments.
    The AI model could, for instance, be related to a specific taxonomy or ontology,
    including suggestions to adjust and refine the feature set by embracing specific
    terms.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在业务术语、结构化和非结构化数据以及尤其是操作元数据方面具有前所未有的多样性，与外部数据如行业或领域特定的分类法和本体纠缠在一起，这使得AI/ML特别适合用语义知识丰富知识图谱。如图[5-3](#Fig3)所示，我们在图中仅指出了自动语义丰富的一小部分示例。例如，AI模型可以与特定的分类法或本体相关联，包括通过采用特定术语来调整和细化特征集的建议。
- en: Furthermore, the AI model could be tagged; annotations could be added to make
    it more explainable to business users. Finally, insight into the scoring and inferencing
    patterns could shed light on the business relevance of the AI model, indicating,
    for instance, the number of prevented fraudulent transactions (true positive rate,
    TPR) and names of the calling applications or components, including corresponding
    statistics that may even rank the AI model regarding its business relevance to
    other AI models. As we have described in the “Data Product” section of Chapter
    [2](537582_1_En_2_Chapter.xhtml), a data product consists of a set of semantically
    related data and AI assets. Therefore, this automated semantic enrichment capability
    is essential to create a semantic knowledge graph, which can be used to build
    data products.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，AI模型可以被标记；可以添加注释以使其对商业用户更具可解释性。最后，对评分和推理模式的洞察可以揭示AI模型在业务上的相关性，例如，防止欺诈交易的数量（真正率，TPR）和调用应用程序或组件的名称，包括可能对AI模型与其他AI模型在业务相关性方面进行排名的相应统计数据。正如我们在第[2](537582_1_En_2_Chapter.xhtml)章“数据产品”部分所描述的，数据产品由一组语义相关的数据和AI资产组成。因此，这种自动语义丰富能力对于创建语义知识图谱至关重要，该图谱可用于构建数据产品。
- en: In Chapter [7](537582_1_En_7_Chapter.xhtml), we further examine the semantic
    enrichment process that provides *intelligent* and *automated* enrichment to contextualize
    assets with semantic knowledge mainly by using external data sources, for instance,
    external knowledge graphs. Semantic enrichment in tandem with knowledge graphs
    and other input, for example, domain- or industry-specific taxonomies or ontologies,
    constitutes a key capability of an intelligent approach.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [7](537582_1_En_7_Chapter.xhtml) 章中，我们进一步探讨了提供 *智能* 和 *自动化* 丰富化的语义丰富化过程，主要通过使用外部数据源来实现，例如外部知识图谱。与知识图谱和其他输入（例如特定领域或行业的分类法或本体）相结合的语义丰富化构成了智能方法的关键能力。
- en: 'Although taxonomies, ontologies, and knowledge graphs are often used synonymously
    and these are related concepts, there are differences: Taxonomies can be viewed
    as a subset of knowledge graphs, providing structure to objects that belong to
    a particular domain, where the nodes are classes and subclasses of these objects.
    Ontologies are concerned about formal naming conventions, including definition
    of types, properties, and correlation of entities, where the entities are depicted
    as nodes and the relationships as edges.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管分类法、本体和知识图谱经常被同义使用，并且这些是相关概念，但它们之间有区别：分类法可以被视为知识图谱的一个子集，为属于特定领域的对象提供结构，其中节点是这些对象的类和子类。本体关注于正式的命名约定，包括类型、属性的定义以及实体的关联，其中实体被表示为节点，关系被表示为边。
- en: Let us move on to discuss self-service capabilities.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论自服务能力。
- en: Self-Service Capabilities
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自服务能力
- en: As we have seen in Chapter [2](537582_1_En_2_Chapter.xhtml), a state-of-the-art
    Data Fabric architecture and Data Mesh solution is inevitably affected by its
    self-service capabilities. However, we need to shed more light on what is really
    meant by *self-service*. Self-service is the digitalization of processes and tasks
    that would otherwise require intervention and support by personas with other,
    non-business-related roles and responsibilities. In simple words, self-service
    capabilities of a Data Mesh solution enable a business user to perform business
    tasks, for example, generating a report, discovering and accessing data, understanding
    the quality and trustworthiness of AI assets, etc. without support and dependencies
    from IT or other business units. Since today’s dependency of business users from
    IT organizations represents a challenge in producing data products in a more agile
    fashion, self-service capabilities are vital for a Data Mesh solution.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在第 [2](537582_1_En_2_Chapter.xhtml) 章中看到的，最先进的数据编织架构和数据网格解决方案不可避免地会受到其自服务能力的影响。然而，我们需要进一步阐明“自服务”的真正含义。自服务是将原本需要由具有其他、非业务相关角色和职责的人员进行干预和支持的过程和任务数字化。简单来说，数据网格解决方案的自服务能力使得业务用户能够执行业务任务，例如，生成报告、发现和访问数据、理解人工智能资产的质量和可靠性等，而无需依赖
    IT 或其他业务部门的支持。鉴于今天业务用户对 IT 组织的依赖性代表了在更敏捷的方式下生产数据产品的挑战，自服务能力对于数据网格解决方案至关重要。
- en: The following Table [5-1](#Tab1) describes the most essential self-service capabilities
    for both concepts.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 以下表格 [5-1](#Tab1) 描述了两个概念最基本的自服务能力。
- en: Table 5-1
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-1
- en: Essential Self-Service Capabilities of a Data Fabric and Data Mesh
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织和数据网格的基本自服务能力
- en: '| # | Capabilities | High-Level Description |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| # | 能力 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Access to AI assets without additional credentials | The knowledge catalog
    includes metadata of AI assets, which are accessible by users (based on their
    role and responsibility), for example, business users, data scientists, AI governance
    personnel, data engineers, etc., without the need to request additional credentials.
    |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 无需额外凭证访问人工智能资产 | 知识目录包括人工智能资产的元数据，用户（基于其角色和职责）可以访问这些资产，例如，业务用户、数据科学家、人工智能治理人员、数据工程师等，无需请求额外凭证。
    |'
- en: '| 2 | Information regarding access methods | All metadata in the knowledge
    catalog should include information regarding the access methods of the corresponding
    AI assets, for example, SQL, NoSQL, REST APIs, Java SDK, .NET SDK, etc. |'
  id: totrans-66
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 访问方法信息 | 知识目录中的所有元数据都应包括有关相应人工智能资产访问方法的信息，例如 SQL、NoSQL、REST API、Java
    SDK、.NET SDK 等。 |'
- en: '| 3 | Information about related AI assets | The knowledge catalog should include
    information of related AI assets, providing a holistic and business-relevant picture
    of particular AI assets, including information of governance artefacts, Jupyter
    notebooks, etc. |'
  id: totrans-67
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 相关AI资产的信息 | 知识目录应包括相关AI资产的信息，提供特定AI资产的全面和业务相关的视图，包括治理工件、Jupyter笔记本等信息。|'
- en: '| 4 | Generating active metadata | AI/ML-augmented metadata, for instance,
    triggering automated resource allocations, tagging and annotations, and automated
    allocation of resources for peak AI asset consumption intervals. |'
  id: totrans-68
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 生成活动元数据 | 例如，通过AI/ML增强的元数据触发自动资源分配、标记和注释，以及为AI资产高峰消费间隔自动分配资源。|'
- en: '| 5 | Semantic search capabilities | AI/ML-based search to discover, for instance,
    non-obvious correlation among AI assets or recommendations concerning additional
    AI assets that are relevant for a particular business purpose. |'
  id: totrans-69
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 语义搜索能力 | 基于AI/ML的搜索，例如，发现AI资产之间的非明显相关性或针对特定商业目的的相关AI资产的推荐。|'
- en: '| 6 | GUI-based data exploration and preparation | Easy-to-use, GUI-based data
    exploration and preparation tools that can be used by non-IT personas, such as
    business users, business analysts, data governance officers, etc., in a self-explanatory
    way. |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 基于GUI的数据探索和准备 | 易于使用的基于GUI的数据探索和准备工具，可以由非IT角色使用，如商业用户、商业分析师、数据治理官员等，以自解释的方式进行。|'
- en: '| 7 | Performing data curation tasks | Some of the data curation tasks, which
    we have listed earlier in this chapter, need to be performed by business users
    without intervention or assistance by subject matter experts or IT personnel,
    for example, data quality assessments and data refinement tasks. |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 执行数据整理任务 | 我们在本章前面列出的一些数据整理任务需要由商业用户执行，无需领域专家或IT人员的干预或协助，例如，数据质量评估和数据精炼任务。|'
- en: Some of these capabilities go far above and beyond what a knowledge catalog
    can provide. For instance, a GUI-based data exploration and preparation tool may
    leverage the data in the knowledge catalog. Nevertheless, it requires a separate
    set of tools that are part of the Data Fabric architecture.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 其中一些能力远远超出了知识目录所能提供的内容。例如，基于GUI的数据探索和准备工具可能利用知识目录中的数据。然而，它需要一套独立的工具，这些工具是数据织物架构的一部分。
- en: As you can easily see from this table, self-service capabilities enable business
    organizations to entertain a data marketplace with *data-as-a-product* and *shopping-for-data*
    experience.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从这张表中轻松看出，自助服务能力使商业组织能够提供具有“数据即产品”和“数据购物”体验的数据市场。
- en: Trustworthy AI
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可信AI
- en: This section examines one of the four key pillars or use cases of a Data Fabric
    or Data Mesh, which we have introduced in Chapter [3](537582_1_En_3_Chapter.xhtml),
    namely, trustworthy AI. Once AI models are prepared and deployed for scoring,
    outcomes of the AI models need to be regularly monitored and measured to gain
    insight and confidence regarding the continuing business relevance. Data scientists
    and business users alike need to understand shifts in fairness or bias, drift
    concerning drop in accuracy or data consistency, and deteriorating quality metrics
    during the operationalization of the AI models. In addition, business users increasingly
    require explainability and insight into how AI model outcomes are derived, for
    instance, in terms of influencing features; they need to gain trust and confidence.
    Tackling these challenges is subsumed under the term *trustworthy AI*.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了数据织物或数据网格的四个关键支柱或用例之一，即我们在第[3](537582_1_En_3_Chapter.xhtml)章中介绍的内容，即可信AI。一旦AI模型准备就绪并部署用于评分，就需要定期监控和测量AI模型的结果，以获得关于持续业务相关性的洞察和信心。数据科学家和商业用户都需要了解公平性或偏差的变化、准确性或数据一致性下降的漂移，以及AI模型在运营过程中的质量指标下降。此外，商业用户越来越需要了解AI模型结果是如何得出的，例如，从影响特征的角度来看；他们需要获得信任和信心。解决这些挑战属于“可信AI”这一术语的范畴。
- en: 'Trustworthy AI, however, is not only a clever acronym: in recent years, it
    became a prominent theme embraced by regulatory bodies and government agencies,^([9](#Fn9))
    also entangling trust in AI with ethics, transparency, and explainability of AI.
    Given these regulatory guidelines and imperatives, enterprises must increasingly
    contend with these challenges. In this section, however, we provide concrete examples
    regarding the technical aspects of trustworthy AI, leaving aside the ethical,
    lawful, and societal aspects.^([10](#Fn10))'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，可信的AI不仅仅是一个巧妙的缩写词：近年来，它已成为监管机构和政府机构广泛接受的主题，^([9](#Fn9)) 同时将AI的信任与道德、透明度和AI的可解释性联系起来。鉴于这些监管指南和强制性要求，企业必须越来越多地应对这些挑战。然而，在本节中，我们提供了关于可信AI技术方面的具体示例，而将道德、法律和社会方面留待以后讨论.^([10](#Fn10))
- en: Introduction
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 简介
- en: A thorough treatment of trustworthy AI could certainly fill an entire book by
    itself; we therefore must consciously sample out the vital issues that are most
    instrumental for both concepts.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 可信的AI的全面处理当然可以写成一整本书；因此，我们必须有意识地挑选出对这两个概念都至关重要的关键问题。
- en: 'The following are the key issues – or rather challenges – that we consider
    as essential in the context of a Data Fabric and Data Mesh:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是我们认为在数据编织和数据网格背景下至关重要的关键问题——或者更确切地说，是挑战：
- en: '**Model fairness**^([11](#Fn11)) (bias): Deals with measuring and managing
    desirable or undesirable preferences for certain values of chosen features determining
    the outcome of an AI model. This is especially important if these features are
    gender, age, religion, race, nationality, etc.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型公平性**^([11](#Fn11))（偏差）：处理测量和管理对选定特征值决定AI模型结果的有利或不利的偏好。如果这些特征是性别、年龄、宗教、种族、国籍等，这一点尤为重要。'
- en: '**Drift detection**: Measures two kinds of drift, (a) the ML model drift, which
    measures the drop in accuracy and drop in data consistency by comparing accuracy
    during runtime with the accuracy during training, and (b) data drift, which is
    comparing key characteristics of the dataset, for example, value distributions
    of key features for the ML model used for training with the dataset during runtime.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**漂移检测**：衡量两种类型的漂移，(a) 机器学习模型漂移，通过比较运行时和训练时的准确性以及数据一致性的下降来衡量，和 (b) 数据漂移，即比较数据集的关键特征，例如，用于训练的数据集中机器学习模型的关键特征值分布与运行时数据集的特征值分布。'
- en: '**Explainability**: Provides insight and transparency of AI model outcomes
    to business users with no or limited data science skills and allowing for *what-if*
    scenarios.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可解释性**：为没有或有限数据科学技能的商业用户提供对AI模型结果的洞察和透明度，并允许进行“如果...将会怎样”的情景分析。'
- en: '**Model quality metrics**: Metrics such as precision, areas under the ROC and
    PR curves, true positive rate (TPR), true negative rate (TNR), etc. need to be
    collected. Measuring these model quality metrics during the entire lifecycle and
    allowing corrective actions to be taken is an essential feature for both concepts.'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型质量指标**：需要收集诸如精确度、ROC和PR曲线下的面积、真正率（TPR）、真正负率（TNR）等指标。在整个生命周期中测量这些模型质量指标并允许采取纠正措施是这两个概念的重要特征。'
- en: We examine these four challenges of trustworthy AI in the subsequent subsections.
    Let us begin with model fairness (bias).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在接下来的小节中探讨可信AI的这四个挑战。让我们从模型公平性（偏差）开始。
- en: Model Fairness
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型公平性
- en: As stated previously, bias is concerned about preferences regarding favorable
    AI model outcomes for specific feature values. For instance, a binary classification
    model that predicts acceptance for a marketing campaign may include gender (e.g.,
    female and male) as a feature input. In preparation for deployment and operationalization
    of this ML model, initial bias needs to be measured to understand, for instance,
    favorable outcomes regarding females in relationship to males.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，偏差关注的是对特定特征值的有利AI模型结果的偏好。例如，一个预测营销活动接受度的二元分类模型可能包括性别（例如，女性和男性）作为特征输入。在部署和运营此机器学习模型之前，需要测量初始偏差，以了解例如女性相对于男性的有利结果。
- en: Once the ML model is in production, changes in bias need to be monitored at
    regular intervals to enable data scientists to act once bias falls below a defined
    threshold.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦机器学习模型投入生产，就需要定期监控偏差的变化，以便数据科学家在偏差低于定义的阈值时采取行动。
- en: In this subsection, we examine an example of how bias can be measured and monitored,^([12](#Fn12))
    by using the above-mentioned ML model with gender (female and male) as a feature,
    where we intend to monitor bias for females.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在本小节中，我们通过使用上述提到的以性别（女性和男性）作为特征的机器学习模型，考察了如何测量和监控偏差，^([12](#Fn12)) 我们旨在监控女性的偏差。
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig4_HTML.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig4_HTML.png)'
- en: A screenshot represents a bar graph of favorable outcomes of the female monitored
    group and the male reference group. It indicates the threshold point of 75%, perfect
    equality of 77%, favorable outcome of 66%, bias of 9%, and highlights the female
    score of 86%.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 一张截图代表了一个条形图，显示了女性监控组和男性参考组的有利结果。它指示了75%的阈值点、77%的完美平等、66%的有利结果、9%的偏差，并突出显示了女性得分为86%。
- en: Figure 5-4
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-4
- en: Fairness/Bias Score for Gender
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 性别公平/偏差分数
- en: 'Initial bias is described by calculating three metrics `–` perfect equality,
    favorable outcome, and fairness score:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 初始偏差通过计算三个指标来描述`–`完美平等、有利结果和公平性分数：
- en: '**Perfect equality**: An initial, balanced dataset is used, where records with
    *females* as favorable outcomes (female records) are added to the male records
    by just changing the gender value from *female* to *male*. This new perturbed
    dataset is used to measure the percentage of favorable outcomes. This metric is
    called perfect equality and can be seen in Figure [5-4](#Fig4) as 77%.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完美平等**：使用一个初始的平衡数据集，其中将具有*女性*作为有利结果（女性记录）的记录添加到男性记录中，只需将性别值从*女性*更改为*男性*。这个新的扰动数据集用于测量有利结果的百分比。这个指标被称为完美平等，如图
    [5-4](#Fig4) 所示为77%。'
- en: '**Favorable outcome**: Adding records with *males* as favorable outcomes to
    the female records by just changing the gender value from *male* to *female* gives
    a new perturbed dataset, which is used to measure the percentage of favorable
    outcomes. This metric is called a favorable outcome and can be seen in Figure
    [5-4](#Fig4) as 66%.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有利结果**：通过将具有*男性*作为有利结果的记录添加到女性记录中，只需将性别值从*男性*更改为*女性*，得到一个新的扰动数据集，该数据集用于测量有利结果的百分比。这个指标被称为有利结果，如图
    [5-4](#Fig4) 所示为66%。'
- en: '**Fairness score**: Dividing the favorable outcome by the perfect equality
    yields the fairness score for gender, which is 86% (66/77).'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公平性分数**：将有利结果除以完美平等得到性别的公平性分数，为86%（66/77）。'
- en: The creation of the perturbed datasets as described previously to calculate
    the favorable outcome for the male records, which are used as references to calculate
    perfect equality, and the monitored female records, which are used to calculate
    favorable outcome, entangles female and male records in both directions and subsequently
    generates more balanced perturbed datasets.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，创建扰动数据集以计算男性记录的有利结果，这些结果用作计算完美平等性的参考，以及监控的女性记录，这些记录用于计算有利结果，在两个方向上纠缠了男性和女性记录，从而生成了更平衡的扰动数据集。
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig5_HTML.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig5_HTML.png)'
- en: A screenshot represents a line graph of fairness scores in different timelines
    between June 13 and June 17\. It indicates a point denoting Thursday, June 16,
    2022\. It also highlights the gender option on the left panel. The fairness score
    for gender is denoted as 85%.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 一张截图代表了一个从6月13日到6月17日不同时间线上的公平性分数的折线图。它指示了表示周四，2022年6月16日的点。它还突出显示了左侧面板上的性别选项。性别公平性分数表示为85%。
- en: Figure 5-5
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-5
- en: Evaluations of Fairness/Bias for Gender
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 性别公平/偏差评估
- en: 'The hatched area is indicating the initial bias for females, which is measured
    against a defined threshold; it is the difference between the threshold – in our
    example set at 75% – and the favorable outcome (66%), which is 9%. This initial
    bias should not necessarily be seen in a negative way: depending on the underlying
    business model, bias regarding a certain feature value – *females* in our example
    – could very well represent truthful behavior. Data scientists need to carefully
    examine and possibly adjust the ML model till the outcome is satisfactory regarding
    the underlying business model.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 破折线区域表示女性的初始偏差，它是对一个定义的阈值进行测量的；它是阈值（在我们的例子中设置为75%）与有利结果（66%）之间的差异，即9%。这种初始偏差不一定应该以负面方式看待：根据潜在的商业模型，关于某个特征值（在我们的例子中是*女性*）的偏差可能非常真实地代表真实行为。数据科学家需要仔细检查并可能调整机器学习模型，直到结果符合潜在的商业模型。
- en: Once the initial fairness score and bias have been measured based on the balanced
    and perturbed datasets, changes of those metrics should be monitored once the
    ML model has been deployed into production. This is depicted in an exemplary way
    in Figure [5-5](#Fig5), where the favorable outcome for females is measured on
    an hourly basis. Monitoring results can be shown as dashboards and by generating
    alerts if the bias is greater than a defined value.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦基于平衡和扰动的数据集测量了初始公平性分数和偏差，一旦机器学习模型投入生产，就应该监控这些指标的变化。这如图[5-5](#Fig5)所示，其中女性的有利结果按小时测量。监控结果可以以仪表板的形式展示，并在偏差超过定义的值时生成警报。
- en: Evaluations of fairness should be enhanced by considering correlations of the
    monitored feature value (e.g., females in gender) with other features, such as
    salary levels, age, etc. Furthermore, AI-infused measurements of fairness should
    predict when a creeping deterioration of fairness may reach a certain level, alerting
    business users and data scientists well in advance. Furthermore, actionable recommendations
    should be provided to data scientists on possible adjustments, for example, changing
    weights of features, choosing a different ML algorithm, or adjusting hyperparameters.
    Finally, in an automated AI-infused Data Fabric or Data Mesh, *self-correction*
    capabilities of a trustworthy AI module should rebuild a di-biased model automatically,
    either relieving data scientists from taking actions themselves or enabling them
    to validate and approve these automated corrections.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 公平性的评估应通过考虑监控特征值（例如，性别中的女性）与其他特征（如薪资水平、年龄等）的相关性来加强。此外，公平性的AI测量应预测公平性逐渐恶化何时可能达到某个水平，提前警告商业用户和数据科学家。此外，应向数据科学家提供可操作的推荐，例如，改变特征的权重、选择不同的机器学习算法或调整超参数。最后，在自动化的AI融合数据编织或数据网中，可信AI模块的*自我校正*能力应自动重建一个无偏差模型，要么减轻数据科学家采取行动的负担，要么使他们能够验证和批准这些自动校正。
- en: Let us now elaborate on drift detection.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进一步阐述漂移检测。
- en: Drift Detection
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 漂移检测
- en: An AI model needs to accurately reflect the underlying business reality (e.g.,
    customer behavior, fraud scenarios, etc.) and the data available for scoring and
    inferencing (e.g., customer profile data, transactional banking data, insurance
    claims data, etc.). But this can change over time, resulting in a drop of some
    or all AI model quality metrics – as depicted in Figure [5-6](#Fig6).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型需要准确反映底层商业现实（例如，客户行为、欺诈场景等）以及用于评分和推理的数据（例如，客户档案数据、交易性银行数据、保险索赔数据等）。但这些都可能随时间变化，导致某些或所有AI模型质量指标下降——如图[5-6](#Fig6)所示。
- en: Both changes of the business reality and data consistency issues may lead to
    decreasing AI model quality metrics. Figure [5-6](#Fig6) depicts the declining
    area under the ROC curve, as an example^([13](#Fn13)) of a particular quality
    metric, and the drop in data consistency.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 商业现实的改变和数据一致性问题的变化可能会导致AI模型质量指标下降。图[5-6](#Fig6)展示了ROC曲线下面积的下降，作为一个特定质量指标的例子，以及数据一致性的下降。
- en: 'Using a few examples, we briefly examine what we really mean by changes of
    business reality and drop in data consistency:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 通过几个例子，我们简要地检查我们所说的商业现实的改变和数据一致性的下降：
- en: '**Changes of business reality**: Behavior or preferences of customers purchasing
    goods, signing up for loans and insurance contracts, leveraging services or delivery
    channels, using the Internet or social media, etc. may change over time and subsequently
    do not represent the customer behavior or preferences anymore during the AI model
    training time.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商业现实的改变**：购买商品、申请贷款和保险合同、利用服务或配送渠道、使用互联网或社交媒体等客户的行为或偏好可能会随时间变化，并且随后不再代表AI模型训练时间内的客户行为或偏好。'
- en: '**Drop in data consistency**: Production data available for scoring and inferencing
    may deviate from pre-production data used for AI model training, validation, and
    test. An increase in records in the production data that are like those that the
    AI model did not evaluate correctly in the pre-production data, changes in frequency
    distributions or different ranges of numeric values of some features, data patterns,
    and rare combinations of feature values are some examples.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据一致性下降**：可用于评分和推理的生产数据可能与用于AI模型训练、验证和测试的预生产数据不同。生产数据中记录的增加，类似于AI模型在预生产数据中没有正确评估的记录，频率分布的变化或某些特征的数值范围的差异，数据模式以及特征值罕见组合等，都是一些例子。'
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig6_HTML.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig6_HTML.png)'
- en: A screenshot represents a line graph denoting the change from training data
    at different time frames. It indicates the drop in accuracy as 10% and the drop
    in data consistency as 10% on the right panel.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图表示一条线图，显示了不同时间框架的训练数据的改变。它表明右面板上准确率下降了10%，数据一致性下降了10%。
- en: Figure 5-6
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-6
- en: Drift Detection
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 漂移检测
- en: As mentioned previously, these changes in business reality and the drop in data
    consistency can lead to a drop in AI model quality metrics. The declining area
    under the ROC curve and the drop in data consistency over time are depicted in
    Figure [5-6](#Fig6). Other quality metrics could be displayed as well, for example,
    accuracy, precision, area under the PR curve, etc.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，这些业务现实的改变和数据一致性的下降可能导致AI模型质量指标的下降。ROC曲线下的下降区域以及随时间变化的数据一致性下降在图[5-6](#Fig6)中展示。还可以显示其他质量指标，例如准确率、精确率、PR曲线下的面积等。
- en: A state-of-the-art Data Fabric or Data Mesh needs to complement drift detection
    with alerts and predictive and automated self-corrective capabilities – like what
    we have described under the preceding model fairness.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 一流的Data Fabric或Data Mesh需要通过警报和预测以及自动自我纠正能力来补充漂移检测，就像我们在前面的模型公平性中描述的那样。
- en: Let us move on to model explainability.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论模型可解释性。
- en: Model Explainability
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型可解释性
- en: As we mentioned previously, model explainability provides insight and transparency
    of AI model outcomes to business users with no or limited data science skills
    and allows for *what-if* scenarios. This is rated very highly in importance when
    it comes to trust, transparency, and interpretability of AI models. Depending
    on the type of an AI model, evaluation results can include different types of
    analysis, which are typically based on popular open source frameworks, such as
    LIME (Local Interpretable Model-Agnostic Explanations) and SHAP, or the ability
    to test *what-if scenarios* on the data. LIME is a Python library to analyze the
    input and output values of an AI model to create human-understandable interpretations
    of the model. LIME reveals which model features are most important for a set of
    specific data points. There are typically several thousand perturbations done
    for a particular set of model features that are relatively close to the data points
    of the model features. In an ideal setting, the features with high importance
    in LIME are the model features that are most important for those specific data
    points.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，模型可解释性为没有或有限数据科学技能的商业用户提供了对AI模型结果的洞察和透明度，并允许进行*假设性*情景分析。这在AI模型的信任、透明度和可解释性方面非常重要。根据AI模型类型的不同，评估结果可以包括不同类型的分析，这些分析通常基于流行的开源框架，如LIME（局部可解释模型无关解释）和SHAP，或者测试数据上的*假设性*情景的能力。LIME是一个Python库，用于分析AI模型的输入和输出值，以创建人类可理解的模型解释。LIME揭示了哪些模型特征对于一组特定的数据点最为重要。通常，对于一组接近模型特征数据点的模型特征，会有数千种扰动。在理想情况下，LIME中重要性高的特征是对于那些特定数据点最重要的模型特征。
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig7_HTML.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig7_HTML.png)'
- en: A bar graph represents the percentage of the relative weight of the features
    that include location duration, gender, employment duration, age, current residence
    duration, owns the property, loan amount, and other loans. It highlights the loan
    duration, gender, and employment duration that have the values of 13.3%, 13.2%,
    and 11.9%.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图表示包含位置时长、性别、就业时长、年龄、当前居住时长、拥有财产、贷款金额和其他贷款等特征的相对权重的百分比。它突出了贷款时长、性别和就业时长，它们的值分别为13.3%、13.2%和11.9%。
- en: Figure 5-7
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图5-7
- en: Explainability for a Specific Transaction
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 特定交易的可解释性
- en: SHapley Additive exPlanations (SHAP) is a Python library with a method that
    explains the output of any ML model. It connects optimal credit allocation with
    local explanations by using Shapley values and their related extensions. SHAP
    assigns each feature of an ML model an importance value for a particular prediction,
    which is called a Shapley value. The Shapley value is the average marginal contribution
    of a feature value across all possible groups of features. The SHAP values of
    the input features are the sums of the difference between baseline or expected
    ML model output and the current ML model output for the prediction that is being
    explained. The baseline ML model output can be based on the summary of the training
    data or any subset of data that explanations must be generated for.^([14](#Fn14))
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: SHapley Additive exPlanations (SHAP) 是一个Python库，其中包含一种解释任何ML模型输出的方法。它通过使用Shapley值及其相关扩展将最优信用分配与局部解释联系起来。SHAP为ML模型的每个特征分配一个特定预测的重要性值，这被称为Shapley值。Shapley值是特征值在所有可能的特征组中的平均边际贡献。输入特征的SHAP值是基线或预期ML模型输出与当前ML模型输出之间的差异之和，这些差异是针对正在解释的预测。基线ML模型输出可以基于训练数据的摘要或任何必须生成解释的数据子集.^([14](#Fn14))
- en: We illustrate explainability with a simple example by using a credit risk model,
    as depicted in Figure [5-7](#Fig7). The outcome of this ML model produces a *risk
    score* for a loan approval process, which uses several features as input to the
    model, such as *LoanDuration*, *Gender*, *EmploymentDuration*, *Age*, *CurrentResidenceDuration*,
    *OwnsProperty*, *LoanAmount*, and *OthersOnLoan*, which you can see on the horizontal
    feature axis.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过使用信用风险模型来展示可解释性，如图[5-7](#Fig7)所示。该机器学习模型的输出为贷款审批流程生成一个*risk score*，该流程使用多个特征作为模型的输入，例如*LoanDuration*（贷款期限）、*Gender*（性别）、*EmploymentDuration*（就业期限）、*Age*（年龄）、*CurrentResidenceDuration*（当前居住期限）、*OwnsProperty*（拥有财产）、*LoanAmount*（贷款金额）和*OthersOnLoan*（其他贷款人），这些特征您可以在水平特征轴上看到。
- en: As you can see in the upper-left corner of Figure [5-7](#Fig7), the ML model
    predicts risk for a loan approval for a particular customer or transaction with
    a confidence level of 62.19%. The graphic shows the most important features influencing
    the risk score. The top three features influencing the model’s predicted outcome
    are *LoanDuration* (13.3%), *Gender* (13.2%), and *EmploymentDuration* (11.9%).
    The feature *OthersOnLoan* is influencing the model toward a predicted outcome
    of *No Risk*.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[5-7](#Fig7)的左上角所示，ML模型以62.19%的置信度预测特定客户或交易的贷款审批风险。图形显示了影响风险评分的最重要特征。影响模型预测结果的前三个特征是*LoanDuration*（13.3%）、*Gender*（13.2%）和*EmploymentDuration*（11.9%）。特征*OthersOnLoan*使模型倾向于预测结果为*无风险*。
- en: 'Explainability should also allow for GUI-based *what-if* scenarios to enable
    business users or data scientists to better understand the impact of adjusted
    feature values on the predicted outcome. This includes scenarios where existing
    features are neglected or additional features are added. Any adjustment done in
    such a *what-if* scenario should indeed generate the same information as included
    in Figure [5-7](#Fig7): confidence level (risk score) and ranking of most influential
    features. Given the variety of models (e.g., regression, classification, clustering,
    DL models), this is easier said than done. Our preceding example is based on a
    relatively simple binary classification model.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 可解释性还应允许基于GUI的*what-if*场景，以便业务用户或数据科学家更好地理解调整后的特征值对预测结果的影响。这包括忽略现有特征或添加额外特征的场景。在这种*what-if*场景中进行的任何调整确实应该生成与图[5-7](#Fig7)中包含的信息相同：置信水平（风险评分）和最有影响力的特征排名。鉴于模型的多样性（例如，回归、分类、聚类、深度学习模型），这比说起来容易做起来难。我们前面的例子是基于一个相对简单的二元分类模型。
- en: Since we have already referenced AI model quality metrics, we briefly describe
    some of the key ones in the forthcoming subsection.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已引用了AI模型质量指标，我们将在接下来的小节中简要描述其中的一些关键指标。
- en: Model Quality Metrics
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型质量指标
- en: 'As we have seen in this section, measuring quality metrics plays a fundamental
    role to enable trustworthy AI, specifically for drift detection and explainability;
    they should be measurable on a regular basis once the AI model has been deployed
    into production. Relevant quality metrics depend on the type of the AI model.
    The following is a list of quality metrics for binary classification problems:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 正如本节所看到的，衡量质量指标对于实现可信赖的AI起着基本作用，特别是对于漂移检测和可解释性；一旦AI模型投入生产，它们应定期可测量。相关的质量指标取决于AI模型类型。以下是为二元分类问题列出的一些质量指标：
- en: '**True positive rate** (TPR), also called sensitivity, recall (R), or hit rate:
    *TPR* = *TP*/(*TP* + *FN*)'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**真正正率** (TPR)，也称为敏感性、召回率 (R) 或命中率：*TPR* = *TP*/(*TP* + *FN*)'
- en: '**False positive rate** (FPR), also called fall-out: *FPR* = *FP*/(*FP* + *TN*)'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假正率** (FPR)，也称为误报率：*FPR* = *FP*/(*FP* + *TN*)'
- en: '**True negative rate** (TNR), also called specificity or selectivity: *TNR* = *TN*/(*TN* + *FP*)'
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**真正负率** (TNR)，也称为特异性或选择性：*TNR* = *TN*/(*TN* + *FP*)'
- en: '**False negative rate** (FNR), also called miss rate: *FNR* = *FN*/(*FN* + *TP*)'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**假负率** (FNR)，也称为漏报率：*FNR* = *FN*/(*FN* + *TP*)'
- en: '**Accuracy** (ACC): *ACC* = (*TP* + *TN*)/(*TP* + *TN* + *FP* + *FN*)'
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**准确率** (ACC): *ACC* = (*TP* + *TN*)/(*TP* + *TN* + *FP* + *FN*)'
- en: '**Precision** (P): *P* = *TP*/(*TP* + *FP*)'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**精确率** (P): *P* = *TP*/(*TP* + *FP*)'
- en: '**Area under the ROC curve**: Is created by plotting the true positive rate
    (TPR) vs. the false positive rate (FPR) at various threshold settings.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ROC曲线下的面积**: 通过在不同阈值设置下绘制真实正率 (TPR) 与假正率 (FPR) 来创建。'
- en: '**Area under the PR curve**: Is created by plotting the precision (P) vs. the
    recall (R) or true positive rate (TPR), where the balance of the curve is determined
    by business decisions. The ROC and PR curves are interrelated and should be evaluated
    in combination based on business imperatives.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PR曲线下的面积**: 通过绘制精确率 (P) 与召回率 (R) 或真实正率 (TPR) 来创建，曲线的平衡由业务决策决定。ROC曲线和PR曲线相互关联，应根据业务需求综合考虑进行评估。'
- en: '**F1 measure**, also called harmonic mean of precision and sensitivity: *F*1 *measure* = 2*TP*/(2*TP* + *FP* + *FN*)'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**F1指标**，也称为精确率和敏感度的调和平均值：*F*1 *measure* = 2*TP*/(2*TP* + *FP* + *FN*)'
- en: '**Logarithmic loss** measures the performance of a classification model whose
    output is a probability value between 0 and 1, where the logarithmic loss increases
    as the predicted probability diverges from the actual classification:'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对数损失**衡量的是输出概率值在0到1之间的分类模型的性能，当预测概率与实际分类偏离时，对数损失增加：'
- en: '*Logarithmic loss* =  − (*ylog*(*p*) + (1 − *y*)*loglog* (1 − *p*) ),'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '*对数损失* =  − (*ylog*(*p*) + (1 − *y*)*loglog* (1 − *p*)),'
- en: where *y* is the predicted probability of the true label *p*.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *y* 是预测真实标签 *p* 的概率。
- en: Most of these metrics can easily be comprehended from the confusion matrix.
    A concrete example of a confusion matrix is depicted in Figure [5-8](#Fig8), where
    you can see the predicted vs. the actual outcomes. Figure [5-8](#Fig8) displays
    the values TN, FN, FP, and TP, which are taken as input to calculate the quality
    metrics, which you can see in the top part of the figure, for example, accuracy,
    recall, precision, etc. You can also see the areas under the ROC and PR curves,
    which are derived by measuring the TPR and FPR at different threshold settings.^([15](#Fn15))
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数这些指标都可以从混淆矩阵中轻松理解。一个具体的混淆矩阵示例如图 [5-8](#Fig8) 所示，您可以看到预测值与实际结果。图 [5-8](#Fig8)
    显示了TN、FN、FP和TP的值，这些值被用作计算质量指标，您可以在图的顶部部分看到，例如，准确率、召回率、精确率等。您还可以看到ROC曲线和PR曲线下的面积，这些面积是通过在不同阈值设置下测量TPR和FPR得到的.^([15](#Fn15))
- en: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig8_HTML.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_5_Chapter/537582_1_En_5_Fig8_HTML.png)'
- en: A screenshot highlights the values as follows. Area under R O C, 0.76\. Area
    under P R, 0.69\. Accuracy, 0.81\. T P R, 0.62\. F P R, 0.09\. recall, 0.62\.
    precision, 0.78\. F I measure, 0.69\. Logarithmic loss, 0.43\. It also highlights
    the values of true negative, true positive, and false negative, and false positive.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图突出显示以下值。ROC曲线下的面积，0.76。PR曲线下的面积，0.69。准确率，0.81。TPR，0.62。FPR，0.09。召回率，0.62。精确率，0.78。F1指标，0.69。对数损失，0.43。它还突出显示了真正负、真正正、假负和假正的值。
- en: Figure 5-8
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5-8
- en: Confusion Matrix for Binary Classification Problems
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 二元分类问题的混淆矩阵
- en: 'There are additional quality measures for regression problems and quality metrics
    for multiclass classification problems. The following are some quality metrics
    for regression problems: R squared, proportion explained variance, root mean squared
    error (RMSE), mean absolute error, and mean squared error.'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 对于回归问题有额外的质量度量，对于多类分类问题有质量指标。以下是一些回归问题的质量指标：R平方、解释方差比例、均方根误差（RMSE）、平均绝对误差和均方误差。
- en: 'Finally, we are listing some quality metrics for multiclass classification
    problems: accuracy, weighted true positive rate (wTPR), weighted false positive
    rate (wFPR), weighted recall, weighted precision, weighted F1 measure, and logarithmic
    loss.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们列出了一些多类分类问题的质量指标：准确率、加权真正例率（wTPR）、加权假正例率（wFPR）、加权召回率、加权精确率、加权F1度量以及对数损失。
- en: Intelligent Information Integration
  id: totrans-151
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能信息集成
- en: For decades, information integration has been a well-known IT domain, which
    includes but is not limited to ubiquitous challenges that stem from the diversity
    as well as the disparity of information and data sources. What has changed in
    recent years, however, is an ever-increasing need to intelligently accommodate
    different integration methods in an automated fashion, for example, traditional
    ETL and replication, real-time streaming of data, messaging, data virtualization
    and federation, microservices, etc., in a wide variety of architectural settings,
    including hybrid cloud environments.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 几十年来，信息集成一直是众所周知的IT领域，包括但不限于源于信息来源多样性和差异性的普遍挑战。然而，近年来，智能地以自动化方式适应不断增长的不同集成方法的需求却日益增加，例如，传统的ETL和复制、实时数据流、消息传递、数据虚拟化和联盟、微服务等，在广泛的架构设置中，包括混合云环境。
- en: Furthermore, information integration must incorporate a rich variety of artefacts,
    other than just structured and unstructured data, for example, AI models, pipelines,
    ETL stages, and even application logic. Data Mesh solutions, with their key imperatives
    to establish a data marketplace for business users with self-service shopping-for-data
    (data-as-a-product), are only adding further demand for automated and intelligent
    information integration techniques.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，信息集成必须包含丰富的工件种类，而不仅仅是结构化和非结构化数据，例如AI模型、管道、ETL阶段，甚至应用逻辑。数据网格解决方案，通过其建立数据市场以供商业用户自助购买数据（数据即产品）的关键要求，进一步增加了对自动化和智能信息集成技术的需求。
- en: A modern Data Fabric architecture or Data Mesh solution needs to tackle these
    challenges. AI is particularly well suited for this purpose. We use the term *intelligent
    information integration* as an AI-infused information integration layer, which
    constitutes a vital capability for both concepts to automate information integration
    tasks as far as possible.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 现代数据布料架构或数据网格解决方案需要应对这些挑战。AI 对于此目的特别适合。我们使用术语“智能信息集成”来指代一个注入了AI的信息集成层，这对于两个概念来说都是至关重要的，以便尽可能自动化信息集成任务。
- en: Table [5-2](#Tab2) lists essential intelligent information integration capabilities
    that are needed for any modern approach.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [5-2](#Tab2) 列出了任何现代方法所需的必要智能信息集成能力。
- en: Table 5-2
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-2
- en: Intelligent Information Integration Capabilities
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 智能信息集成能力
- en: '| # | Capabilities | High-Level Description |'
  id: totrans-158
  prefs: []
  type: TYPE_TB
  zh: '| # | 能力 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Automated workload distribution | AI-enabled automated workload distribution
    should be implemented, considering underlying system availability and capabilities,
    resource consumption, SLAs, and performance requirements. |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 自动化工作负载分配 | 应考虑底层系统可用性和能力、资源消耗、服务级别协议（SLAs）和性能要求，实施AI启用的自动化工作负载分配。 |'
- en: '| 2 | Self-service information integration | Business users and data engineers
    need to perform information integration tasks (including data exploration, data
    preparation and transformation in a self-service manner) with transparency from
    the complexity and diversity of source systems and corresponding artefacts. |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 自助信息集成 | 商业用户和数据工程师需要以透明的方式执行信息集成任务（包括自助方式进行的数据探索、数据准备和转换），以简化来自源系统和相应工件复杂性和多样性的问题。
    |'
- en: '| 3 | Active metadata exploitation | Business users should transparently leverage
    active metadata to gain pervasive and relevant insight regarding the underlying
    assets, search and discovery, access methods, policies, etc. |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 活跃元数据利用 | 商业用户应透明地利用活跃元数据，以获得关于底层资产、搜索和发现、访问方法、策略等方面的普遍和相关信息。 |'
- en: '| 4 | Semantic knowledge graph exploitation | Business users need to exploit
    semantic knowledge graphs to understand relevance of taxonomies and ontologies,
    get further insights from tags and annotations, and get relevant recommendations
    for asset consumption and inferencing into applications. |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 语义知识图谱利用 | 商业用户需要利用语义知识图谱来理解分类法和本体论的相关性，从标签和注释中获得进一步见解，并获得资产消费和应用于推理的相关推荐。
    |'
- en: '| 5 | Learnable information integration | Intelligent information integration
    needs to be learnable, meaning that AI methods should be applied to adjust, improve,
    simplify, and optimize integration flows and tasks over time. |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 可学习的信息集成 | 智能信息集成需要是可学习的，这意味着AI方法应应用于调整、改进、简化和优化集成流程和任务，随着时间的推移进行。 |'
- en: '| 6 | Automated corrections of integration flows | AI should be applied to
    faulty or bad-performing information integration flows, jobs, and tasks, generating
    recommendations for IT personnel and automatically implementing meaningful corrections.
    |'
  id: totrans-165
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 集成流的自动纠正 | 应将AI应用于有缺陷或表现不佳的信息集成流、作业和任务，为IT人员生成建议，并自动实施有意义的纠正。 |'
- en: '| 7 | Leveraging the digital exhaust^([16](#Fn16)) | Information integration
    should be improved over time by automatically activating the digital exhaust,
    for instance, to optimize resource allocation for end-of-month or end-of quarter
    integration tasks. |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 利用数字废气^([16](#Fn16)) | 应通过自动激活数字废气，例如，优化月末或季度末集成任务的资源分配，随着时间的推移改进信息集成。
    |'
- en: Key Takeaways
  id: totrans-167
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [5-3](#Tab3).
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以几个关键要点结束本章，这些要点总结在表 [5-3](#Tab3) 中。
- en: Table 5-3
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 表 5-3
- en: Key Takeaways
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-171
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-172
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Active metadata is a key characteristic of Data Fabric and Data Mesh.
    | Active metadata is AI/ML-augmented metadata, generated by applying AI/ML techniques
    to metadata to gain additional actionable insight from metadata, which can be
    used to further automate Data Fabric and Data Mesh tasks. |'
  id: totrans-173
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 活跃元数据是数据织构和数据网格的关键特征。 | 活跃元数据是AI/ML增强的元数据，通过将AI/ML技术应用于元数据来生成，从而从元数据中获得额外的可操作见解，这些见解可用于进一步自动化数据织构和数据网格任务。
    |'
- en: '| 2 | AI/ML techniques need to be applied to data curation tasks. | AI/ML-infused
    data curation is referred to as advanced or intelligent data curation; it enables
    automated data curation with intelligent cataloging. |'
  id: totrans-174
  prefs: []
  type: TYPE_TB
  zh: '| 2 | AI/ML技术需要应用于数据整理任务。 | AI/ML注入的数据整理被称为高级或智能数据整理；它使智能编目实现自动化数据整理。 |'
- en: '| 3 | Semantic knowledge graphs should be an integral part of a Data Fabric.
    | AI/ML-enriched knowledge graphs are called semantic knowledge graphs or semantic
    networks, depicting non-obvious relationships of objects and assets, providing
    further actionable insight to data consumers and business users. |'
  id: totrans-175
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 语义知识图谱应该是数据织构的一个组成部分。 | AI/ML增强的知识图谱被称为语义知识图谱或语义网络，描绘了对象和资产的非明显关系，为数据消费者和商业用户提供进一步的可操作见解。
    |'
- en: '| 4 | Self-service is a vital Data Fabric and Data Mesh characteristic. | Self-service
    capabilities of a Data Mesh solution enable a business user to perform business
    tasks without support and dependencies from IT or other business units. |'
  id: totrans-176
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 自服务是数据织构和数据网格的关键特征。 | 数据网格解决方案的自服务能力使商业用户能够在没有IT或其他业务部门支持的情况下执行业务任务。
    |'
- en: '| 5 | Trustworthy AI means to measure and ensure AI model fairness. | Fairness
    or bias deals with measuring and managing desirable or undesirable preferences
    for certain values of chosen features determining the outcome of an AI model.
    |'
  id: totrans-177
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 可信的AI意味着衡量和确保AI模型公平性。 | 公平性或偏差涉及衡量和管理对AI模型结果有决定性影响的特征值的期望或非期望偏好。 |'
- en: '| 6 | Trustworthy AI means to detect drift. | Drift measures the drop in accuracy
    and drop in data consistency by comparing accuracy during runtime with the accuracy
    during training and by comparing key characteristics of the dataset used for training
    with the dataset during runtime. |'
  id: totrans-178
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 可信人工智能意味着检测漂移。| 漂移通过比较运行时和训练期间的准确性以及比较用于训练的数据集的关键特征与运行时数据集的特征来衡量准确性和数据一致性的下降。|'
- en: '| 7 | Trustworthy AI means to provide explainability. | Explainability provides
    insight and transparency of AI model outcomes to business users with no or limited
    data science skills and allows for *what-if* scenarios. |'
  id: totrans-179
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 可信人工智能意味着提供可解释性。| 可解释性为没有或有限数据科学技能的商业用户提供对人工智能模型结果的洞察和透明度，并允许进行*假设性*情景分析。|'
- en: '| 8 | Model quality metrics serve as input to enable trustworthy AI. | There
    are several AI model quality metrics that are automatically calculated; they can
    also be visualized to provide further insight to data scientists to optimize model
    outcomes. |'
  id: totrans-180
  prefs: []
  type: TYPE_TB
  zh: '| 8 | 模型质量指标作为输入，以实现可信人工智能。| 存在几个自动计算的人工智能模型质量指标；它们也可以被可视化，以向数据科学家提供进一步洞察，以优化模型结果。|'
- en: '| 9 | AI/ML introduces automation and intelligence to information integration
    tasks. | The term *intelligent information integration* relates to an AI-infused
    information integration layer, which constitutes a vital capability of a modern
    Data Fabric architecture and Data Mesh solution. |'
  id: totrans-181
  prefs: []
  type: TYPE_TB
  zh: '| 9 | AI/ML将自动化和智能引入信息集成任务。| 智能信息集成一词与一个AI增强的信息集成层相关，这构成了现代数据织物架构和数据网格解决方案的关键能力。|'
