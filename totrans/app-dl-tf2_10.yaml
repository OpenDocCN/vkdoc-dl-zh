- en: Table 10-1
  prefs: []
  type: TYPE_NORMAL
- en: Confusion Matrix for the Model Described in the Text
  prefs: []
  type: TYPE_NORMAL
- en: '|   | Predicted Class 0 | Predicated Class 1 |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| **Real class 0** | 0 | 6742 |'
  prefs: []
  type: TYPE_TB
- en: '| **Real class 1** | 0 | 53258 |'
  prefs: []
  type: TYPE_TB
- en: How should we read this table? In the “Predicted Class 0” column, you will see
    the number of observations that our model predicts of being of class 0 for each
    real class. 0 is the number of observations our model predicts of being of class
    0 and are really in class 0\. 0 is the number of observations that our model predicts
    in class 0 but are really in class 1.
  prefs: []
  type: TYPE_NORMAL
- en: It should be easy to see that our model effectively predicts all observations
    to be in class 1 (a total of 6742+53258 = 60000). Since we have a total of 60,000
    observations in our training set, we get an accuracy of 53258/60000 = 0.887, as
    our Keras code told us. But not because our model is good, simply because it has
    effectively classified all observations in class 1\. We don’t need a neural network
    in this case to reach this accuracy. What happens is that our model sees observations
    belonging to class 0 so rarely that they almost don’t influence the learning,
    which is dominated by the observations in class 1.
  prefs: []
  type: TYPE_NORMAL
- en: What at the beginning seemed a nice result , turns out is a really bad one.
    This is an example of how badly things can go if you don’t pay attention to the
    distributions of your classes. This of course applies not only when splitting
    your dataset, but in general when you approach a classification problem, regardless
    of the classifier you want to train (it does not apply only to neural networks).
  prefs: []
  type: TYPE_NORMAL
- en: Tip
  prefs: []
  type: TYPE_NORMAL
- en: When splitting your dataset into complex problems, you need to pay close attention
    not only to the number of observations you have in your datasets, but also to
    what observations you choose and to the distribution of the classes.
  prefs: []
  type: TYPE_NORMAL
- en: 'To conclude this section, let me give you a few hints about how to deal with
    unbalanced datasets:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Change your metric:** In our example, you may want to use something else
    instead of accuracy, since it can be misleading. You could try using the confusion
    matrix for example, or other metrics like precision, recall, or F1 (review them
    if you don’t know them, as they are very important to know). Another important
    way of checking how your model is doing, and one that I suggest you learn, is
    the ROC Curve, which will help you tremendously.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Work with an undersampled dataset:** If you have for example 1000 observations
    in class 1 and 100 in class 2, you may create a new dataset with 100 random observations
    in class 1 and the 100 you have in class 2\. The problem with this method is that
    you will have a lot less data to feed to your model to train it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Work with an oversampled dataset:** You may try to do the opposite. You may
    take the 100 observations in class 2 and replicate them ten times to end up with
    1000 observations in class 2 (sometimes called sampling with replacement).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Get more data in the class with less observations:** This is not always possible.
    In the case of fraudulent credit card transactions, you cannot go around and generate
    new data, unless you want to go to jail .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Datasets with Different Distributions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now I want to discuss another terminology issue, which will lead us to understanding
    a common problem in the deep learning world. Very often you will hear sentences
    like: “the sets come from different distributions.” This sentence is not always
    easy to understand. Take for example two datasets formed by images taken with
    a professional DSLR, and a second one created by images taken with an old smartphone.
    In the deep learning world, we say that those two sets come from different distributions.
    But what is the meaning of the sentence? The two datasets differ for various reasons:
    resolution of images, blurriness due to different quality of lens, amount of colors,
    how much is in focus, and possibly more. All those differences are what is usually
    meant by different “distributions.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at another example. We could consider two datasets: one made of
    images of white cats and one made of images of black cats. Also, in this case
    we talk about different distributions. This becomes a problem when you train a
    model on one set and want to apply it to the other. For example, if you train
    a model on a set of images of white cats, you probably are not going to do very
    good on the dataset of black cats, since your model has never seen black cats
    during training.'
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: 'When talking about datasets coming from different distributions, it is usually
    meant that the observations have different characteristics in the two datasets:
    black and white cats, high- and low-resolution images, speech recording in Italian
    and in German, and so on.'
  prefs: []
  type: TYPE_NORMAL
- en: Since data is precious, people often try to create the different datasets (train,
    dev, etc.) from different sources. For example, you may decide to train your model
    on a set made of images taken from the web and see how good it is on a set made
    of images you took with your smartphone. This may seem a nice idea to be able
    to use as much data as possible, but it may give you many headaches. Let’s see
    what happens in a real case so that you see the consequences of doing something
    like this.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s consider the subset of the MNIST dataset made of the two digits: 1 and
    2\. We will build a dev dataset coming from a different distribution, shifting
    a subset of the images ten pixels to the right. We will train our model on the
    images as they are in the original dataset and apply the model to images shifted
    ten pixels to the right. Let’s first load the data'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: First select only digits 1 and 2
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: We have 12,700 observations in the training dataset and 2167 in the test dataset
    (we will call it dev dataset from now on in this chapter).
  prefs: []
  type: TYPE_NORMAL
- en: Then we normalize the features
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: And then we transform the matrixes to give them the right dimensions
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: And finally, we shift the labels to have 0 and 1
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: We can check the sizes of the arrays with this code
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: That gives us
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: We have 12,700 observations in our training set and 2167 in the dev set. Now
    let’s duplicate the dev dataset and shift each image to the right ten pixels.
    We can do this quickly with this code
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: To make the shift easy, we first reshaped the images in a 28x28 matrix, then
    simply shifted the columns with `tmp_shifted[:,10:28] = tmp[:,0:18]`. Then we
    simply reshape the images in a one-dimensional array of 784 elements. The labels
