    on the left and its shifted version on the right.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/463356_2_En_10_Chapter/463356_2_En_10_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-8
  prefs: []
