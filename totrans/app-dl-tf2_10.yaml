  type: TYPE_PRE
- en: The `y_train_unbalanced` and `y_test_unbalanced` arrays will contain the new
    labels. Note that the dataset is now heavily unbalanced. Label 0 appears roughly
    10% of the time, while label 1 appears 90% of the time.
  prefs: []
  type: TYPE_NORMAL
- en: We then reshape (to provide the data in the right dimension required by the
    neural network) and normalize the training and the test data
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Then we build our network with a single neuron
  prefs: []
  type: TYPE_NORMAL
