- en: Foreword
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 前言
- en: Without even realizing it, we have been buried by the data we generate every
    day, in all areas of technology applications, social life, and health. Buried
    in this huge amount of data that we have been storing for years in the most disparate
    formats and ways lies knowledge that we yearn for and that we have not yet uncovered.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在没有意识到的情况下，我们已经淹没在我们每天产生的数据中，这些数据涵盖了技术应用的各个领域、社会生活和健康。在这庞大数量的数据中，这些数据以最不同的格式和方式存储了多年，其中包含了我们渴望但尚未发现的知识。
- en: After an initial phase of caution that lasted a few years, today we all agree
    that artificial intelligence is a very powerful way to extract this knowledge
    from data.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几年的初步谨慎阶段后，今天我们所有人都同意，人工智能是一种非常强大的方法，可以从数据中提取这种知识。
- en: For example, in my daily activity as a professor of biomedical engineering at
    the Politecnico di Torino, I often find myself dealing with topics that have to
    do with the world of health. I realize how much the clinical world is fascinated
    by the potential of these new technologies and sometimes looks at them as if they
    were something mystical. In healthcare, artificial intelligence, machine learning,
    and deep learning are in the spotlight for their ability to predict disease risk
    and for their efficiency in automating several steps that make up the investigation
    phase of biomedical images or signals that support clinical decision-making.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在我作为都灵理工大学生物医学工程教授的日常活动中，我经常发现自己处理与健康世界相关的话题。我意识到临床世界是多么着迷于这些新技术的潜力，有时甚至把它们看作是神秘的东西。在医疗保健领域，人工智能、机器学习和深度学习因其预测疾病风险的能力和在自动化生物医学图像或信号调查阶段以及支持临床决策的步骤中的效率而备受关注。
- en: However, the road to making these technologies a definitive support in clinical
    practice is still long and tortuous and includes a better understanding of the
    functioning of biological systems, much of which has yet to be clarified despite
    the countless discoveries in medicine, biology, biochemistry, and biophysics.
    Despite the incredible impact of these methods in everyday life, most users of
    AI-driven technologies have no idea how these technologies work, and this is still
    true even for many scientific disciplines.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，将这些技术作为临床实践中的决定性支持的道路仍然漫长而曲折，这包括对生物系统功能的更好理解，尽管在医学、生物学、生物化学和生物物理学中已经有了无数的发现，但其中许多仍未得到明确。尽管这些方法在日常生活中产生了不可思议的影响，但大多数人工智能技术的使用者并不知道这些技术是如何工作的，即使是许多科学学科也是如此。
- en: Therefore, there is a great need to educate society about AI technologies at
    different levels of depth in order to make sure that the professionals of the
    future, at least those involved in scientific disciplines, can actively use these
    methods. In other words, machine learning techniques, or deep learning, should
    not be considered a solution to a specific problem, but a tool or set of tools
    to achieve a solution to a specific problem.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，有必要从不同深度的层次上教育社会关于人工智能技术，以确保未来的专业人士，至少是那些涉及科学学科的，能够积极使用这些方法。换句话说，机器学习技术，或者说深度学习，不应被视为解决特定问题的方案，而应被视为实现特定问题解决方案的工具或工具集。
- en: In this context, this book proposes an approach that helps readers interface
    with complex methodologies by providing original application examples that are
    gradually more complex and resemble real problems while maintaining a scholastic
    character. Dr. Michelucci puts in this book all his skills as an exceptional trainer,
    combining his ability to explain very complex concepts in a clear and understandable
    way, while maintaining a good degree of mathematical formalism, and his ability
    to stimulate critical thinking through the development of practical problems.
    This book also provides a quick guide to using working environments such as Jupyter
    Notebooks to create and share documents that contain equations, code, and text.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种背景下，本书提出了一种方法，通过提供原创的应用示例，这些示例逐渐变得更加复杂，更接近真实问题，同时保持学术性质，帮助读者与复杂的方法进行交互。Michelucci博士在这本书中倾注了他作为一名杰出培训师的所有技能，结合了他以清晰易懂的方式解释非常复杂概念的能力，同时保持良好的数学形式主义程度，以及通过发展实际问题来激发批判性思维的能力。本书还提供了使用Jupyter
    Notebooks等工作环境创建和共享包含方程、代码和文本的文档的快速指南。
- en: A journey that starts with the single neuron teaches readers how to build neural
    networks, training techniques, testing, and validation through appropriate metrics,
    tuning hyperparameters, and much more.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 从单个神经元开始的旅程教导读者如何构建神经网络，训练技术，测试和验证，通过适当的指标，调整超参数以及更多。
- en: All these topics are covered by providing code examples that help the readers
    make concepts and methods their own so that they can customize them to specific
    problems.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些主题都通过提供代码示例来涵盖，这些示例帮助读者将概念和方法据为己有，以便他们可以根据特定问题进行定制。
- en: Therefore, this book is a valuable aid for those who want to not only learn
    about deep learning, but also want to make it part of their methodological background.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，本书对于那些不仅想了解深度学习，还想将其作为他们方法论背景的一部分的人来说是一种宝贵的辅助工具。
- en: I believe that Dr. Michelucci's work will be useful to engineers, physicists,
    and mathematicians who are interested in making their own concepts and methods
    related to deep neural networks. The collaboration I undertook with Umberto Michelucci
    for several years was fundamental for my research group's professional growth,
    and I am sure that this book will be of support to many other passionate scientists.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为Michelucci博士的工作将对工程师、物理学家和数学家有用，他们对创建与深度神经网络相关的自己概念和方法感兴趣。我与Umberto Michelucci进行的多年合作对我研究小组的专业成长至关重要，我确信这本书将对许多其他热情的科学家有所帮助。
- en: Sincerely,
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 诚挚地，
- en: Marco A. Deriu, PhD
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Marco A. Deriu，博士
- en: Introduction
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: This is the second edition of *Applied Deep Learning* and it has been updated
    for TensorFlow 2.X and expanded to cover additional advanced material, such as
    autoencoders and generative adversarial networks (GANs). The goal of this book
    is to teach you the necessary fundamentals of how neural networks work, how to
    train them, and how to implement them with Keras. We start by discussing what
    a neuron is and what you can achieve with just one, then move to multiple layers
    in feed-forward neural networks. You learn what regularization is and how to use
    it, how advanced optimizers (such as Adam) work, and how to do hyperparameter
    tuning. At the end of the book, we look at some advanced topics, such as autoencoders,
    metric analysis, and GANs.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这是《应用深度学习》的第二版，它已经更新为TensorFlow 2.X，并扩展以涵盖额外的先进材料，例如自编码器和生成对抗网络（GANs）。这本书的目标是教你神经网络如何工作、如何训练它们以及如何使用Keras实现它们的必要基础知识。我们首先讨论神经元是什么以及你只用一个神经元能实现什么，然后转向前馈神经网络中的多层。你将学习正则化是什么以及如何使用它，高级优化器（如Adam）是如何工作的，以及如何进行超参数调整。在书的最后，我们探讨一些高级主题，例如自编码器、度量分析和GANs。
- en: If you are new to this subject, I suggest you read the chapters in order, but
    if you already have some experience and you want to learn about a specific topic,
    you can jump directly to the relevant chapter. The chapters are mostly self-contained,
    although each refers to concepts explained in previous chapters, so if you don’t
    know what a specific symbol or concept means, you can refer to the previous chapters.
    I worked hard to keep the mathematical notation and programming style as consistent
    as possible to make following the book easier. I only discuss very short code
    snippets (the ones I consider relevant), so you will not find complete code to
    copy and use, but don’t worry. This book has an online site where you can find
    lots of Jupyter Notebooks that will be updated regularly with new examples and
    topics. You can find them at [`https://adl.toelt.ai`](https://adl.toelt.ai).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这个主题是新手，我建议你按顺序阅读章节，但如果你已经有一些经验，并且想了解特定主题，你可以直接跳到相关章节。这些章节大多是自包含的，尽管每个章节都提到了前几章中解释的概念，所以如果你不知道某个特定符号或概念的含义，你可以参考前几章。我努力使数学符号和编程风格尽可能一致，以便更容易地跟随书籍。我只讨论非常短的代码片段（我认为相关的），所以你不会找到可以复制和使用的完整代码，但不用担心。这本书有一个在线网站，你可以找到许多定期更新新示例和主题的Jupyter
    Notebooks。你可以在[`https://adl.toelt.ai`](https://adl.toelt.ai)找到它们。
- en: Anytime you want to see the complete code in action, go to that site and you
    will find complete examples that you can download or open in Google Colab to try.
    TensorFlow is updated often, so providing code examples in the book would make
    the book age very quickly! My suggestion is to study the concepts here in the
    book, and then go to the online site and try the complete code to see how what
    you learned works in practice.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你想看到完整的代码在实际中的应用，就去那个网站，你将找到可以下载或打开在Google Colab中尝试的完整示例。TensorFlow经常更新，所以在书中提供代码示例会使书籍很快过时！我的建议是先在书中学习概念，然后去在线网站尝试完整的代码，看看你学到的在实际中是如何工作的。
- en: At the end of each chapter there are some exercises that have the goal of making
    you think about what you learned and give you interesting insights.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 每个章节的结尾都有一些练习，目的是让你思考你学到了什么，并给你一些有趣的见解。
- en: Who This Book Is For
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这本书面向谁
- en: 'To benefit from this book, you should have intermediate Python programming
    experience. It’s helpful if you understand how the NumPy library works, since
    it is used extensively with TensorFlow. You should also have a basic understanding
    of algebra and calculus. You should understand at least the following concepts:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了从这本书中受益，你应该有中级Python编程经验。如果你了解NumPy库的工作方式，这会有帮助，因为TensorFlow广泛使用它。你还应该对代数和微积分有基本的了解。你应该至少理解以下概念：
- en: What is a matrix.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 矩阵是什么。
- en: How to do basic operations on matrixes, such as multiplying them, inverting
    them, and so on.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在矩阵上进行基本操作，例如乘法、求逆等。
- en: What is a derivative (and what is a partial derivative).
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导数（以及偏导数）是什么。
- en: How to calculate easy derivatives.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何计算简单的导数。
- en: What a function is and what it means to minimize one.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 函数是什么以及最小化一个函数的含义。
- en: If you understand those concepts, you should be able to follow the explanations
    in the book. I always give many practical hints in the book to make clear what
    the implications of the theoretical concepts are in practice. I hope this will
    help you with your real-life projects.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你理解了这些概念，你应该能够理解书中的解释。我在书中总是给出许多实用提示，以阐明理论概念在实际中的含义。我希望这能帮助你处理现实生活中的项目。
- en: Do You Need to Know TensorFlow/Keras?
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你是否需要了解TensorFlow/Keras？
- en: 'This is a tricky question. The more you know, the more you will be able to
    benefit from the book. The main goal of this book is not to teach you Keras, but
    to teach you how neural networks work and give you implementation examples in
    Keras. Let me stress it again: The focus is on understanding how neural networks
    work, not on how Keras works. This is not a book on Keras. The best way to learn
    all the particularities of Keras is to look at the official documentation ([`https://www.tensorflow.org/learn`](https://www.tensorflow.org/learn)).
    It is always up-to-date and contains many examples. This book covers the necessary
    skills you need to understand basic examples, but if you want to understand all
    the subtleties, you should study the official documentation.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个棘手的问题。你知道得越多，你就能从这本书中获得更多的益处。本书的主要目标不是教你Keras，而是教你神经网络是如何工作的，并在Keras中提供实现示例。让我再次强调：重点是理解神经网络是如何工作的，而不是Keras是如何工作的。这不是一本关于Keras的书。了解Keras所有特定性的最佳方式是查看官方文档([`https://www.tensorflow.org/learn`](https://www.tensorflow.org/learn))。它总是最新的，包含许多示例。本书涵盖了理解基本示例所需的必要技能，但如果你想要理解所有细微差别，你应该研究官方文档。
- en: Note
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: You will probably be able to understand most of the concepts even without knowing
    how Keras works, but the more experience you have with Keras, the easier it will
    be for you to follow the explanations.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 即使不了解Keras的工作原理，你可能也能理解大部分的概念，但你在Keras方面的经验越多，理解解释就会越容易。
- en: Which Version of TensorFlow Is Used in this Book?
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本书使用的是哪个版本的TensorFlow？
- en: The code developed in this book has been tested on TensorFlow 2.5\. I try to
    use only the fundamental Keras features to make it as compatible as possible with
    older and future versions. If you are using a different TensorFlow version, you
    may find that some of the code will not work. If you are running the code from
    [`https://adl.toelt.ai`](https://adl.toelt.ai) locally and you encounter this
    problem, I suggest you create a virtual environment^([1](#Fn1)) with TensorFlow
    2.5\. Versions of other packages, such as NumPy or Pandas, should not matter much.
    Any relatively modern (let’s say from 2020 or 2021) version should work just fine.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 本书开发的代码已在TensorFlow 2.5上进行了测试。我尽量只使用基本的Keras功能，使其尽可能与较旧和未来的版本兼容。如果你使用的是不同的TensorFlow版本，你可能会发现一些代码无法运行。如果你从[`https://adl.toelt.ai`](https://adl.toelt.ai)本地运行代码并遇到这个问题，我建议你创建一个带有TensorFlow
    2.5的虚拟环境^([1](#Fn1))。其他包的版本，如NumPy或Pandas，不应有很大影响。任何相对现代的（让我们说从2020或2021年开始）版本都应该工作得很好。
- en: How to Try the Code in the Book
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何尝试本书中的代码
- en: There are several ways to try the code discussed in this book. I worked very
    hard to make sure that you can run all the examples in the book in Google Colab
    ([`https://colab.research.google.com/`](https://colab.research.google.com/)),
    so that you don’t have to install anything on your personal laptop or PC. If you
    go to [`https://adl.toelt.ai`](https://adl.toelt.ai), you can open all the examples
    directly in Google Colab. If you are on a page at [`https://adl.toelt.ai`](https://adl.toelt.ai),
    simply hover the mouse over the small rocket icon on the top-right side of the
    examples (see Figure [I-1](#Fig1)). You have several options to open the notebook
    in an environment to try it.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以尝试本书中讨论的代码。我非常努力确保你可以在Google Colab([`https://colab.research.google.com/`](https://colab.research.google.com/))上运行本书中的所有示例，这样你就不需要在你的个人笔记本电脑或PC上安装任何东西。如果你访问[`https://adl.toelt.ai`](https://adl.toelt.ai)，你可以直接在Google
    Colab中打开所有示例。如果你在[`https://adl.toelt.ai`](https://adl.toelt.ai)的页面上，只需将鼠标悬停在示例右上角的小火箭图标上（见图I-1）。你有几种选项可以打开笔记本来尝试它。
- en: '![](../images/463356_2_En_BookFrontmatter_Fig1_HTML.jpg)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图I-1](../images/463356_2_En_BookFrontmatter_Fig1_HTML.jpg)'
- en: Figure I-1
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图I-1
- en: By hovering with the mouse over the small rocket icon on the top-right side
    of the pages at [`https://adl.toelt.ai`](https://adl.toelt.ai), you can open the
    notebook directly in Google Colab without having to install anything on your machine
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将鼠标悬停在页面右上角的火箭图标上，您可以直接在 Google Colab 中打开笔记本，无需在您的机器上安装任何东西。[https://adl.toelt.ai](https://adl.toelt.ai)
