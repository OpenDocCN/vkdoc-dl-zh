    Colab 是一个运行在 Google 服务器上的带有 Python 引擎的在线 Jupyter Notebook。如果您之前使用过 Jupyter Notebook，那么您应该没问题。如果没有，我建议您访问官方项目页面[https://jupyter.org](https://jupyter.org)并学习许多可用的教程。Jupyter
    Notebook 环境被广泛用于数据科学，这是每个从业者都应该了解的内容。
- en: Contents of the Book
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 书籍内容
- en: The first chapter discusses the problem of optimization in general and how it
    relates to neural networks. We look at how the most important minimization algorithm,
    gradient descent, is working and how the mini-batch and stochastic variations
    of it function.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 第一章讨论了优化的一般问题以及它与神经网络的关系。我们探讨了最重要的最小化算法——梯度下降的工作原理以及其小批量和小批量随机变体是如何工作的。
- en: 'Chapter [2](463356_2_En_2_Chapter.xhtml) looks at how one neuron is structured
    and at the most commonly used activation functions. Then it covers how to implement
    a neural network with one single neuron in Keras and how to do linear regression
    and logistic regression (classification) with it. We discuss the three fundamental
    components of any neural network model: the network architecture, the loss function,
    and the optimizer.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [2](463356_2_En_2_Chapter.xhtml) 章探讨了单个神经元的结构和最常用的激活函数。然后它涵盖了如何使用 Keras 实现单个神经元的神经网络以及如何使用它进行线性回归和逻辑回归（分类）。我们讨论了任何神经网络模型的基本三个组成部分：网络架构、损失函数和优化器。
- en: Chapter [3](463356_2_En_3_Chapter.xhtml) moves to neural networks with multiple
    layers and many neurons. We discuss the concept of overfitting and how to do basic
    error analysis. Then we look at how to implement neural networks with multiple
    layers with Keras. Additionally, we look at weight initialization and discuss
    the various ways of doing it. Finally, we discuss how to estimate how much memory
    a neural network model implemented with Keras will need.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [3](463356_2_En_3_Chapter.xhtml) 章讨论了多层和许多神经元的神经网络。我们讨论了过拟合的概念以及如何进行基本的错误分析。然后我们探讨如何使用
    Keras 实现多层神经网络。此外，我们还探讨了权重初始化及其各种方法。最后，我们讨论了如何估计使用 Keras 实现的神经网络模型所需的内存量。
- en: In Chapter [4](463356_2_En_4_Chapter.xhtml), the concept of regularization is
    discussed. We look at the *l*[*p*] norm and at *l*[2] and *l*[1] regularization.
    Then we discuss how dropout works and how to implement it in Keras. Finally, we
    look at how early stopping works.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [4](463356_2_En_4_Chapter.xhtml) 章中，我们讨论了正则化的概念。我们探讨了 *l*[*p*] 范数以及 *l*[2]
    和 *l*[1] 正则化。然后我们讨论了 dropout 的工作原理以及如何在 Keras 中实现它。最后，我们探讨了早停的工作原理。
- en: In Chapter [5](463356_2_En_5_Chapter.xhtml), the Adam, momentum, and RMSProp
    optimizers are discussed, starting with what exponentially weighted averages are,
    a concept necessary for understanding advanced optimizers.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [5](463356_2_En_5_Chapter.xhtml) 章，讨论了 Adam、动量优化器和 RMSProp 优化器，从指数加权平均的概念开始，这是理解高级优化器所必需的。
- en: In Chapter [6](463356_2_En_6_Chapter.xhtml), we discuss hyper-parameter tuning.
    We discuss grid and random search and coarse-to-fine optimization. Then Bayesian
    optimization is explained and discussed at length. Finally, we discuss sampling
    on a logarithmic scale. In Chapter [7](463356_2_En_7_Chapter.xhtml), we discuss
    convolutional neural networks and how to implement them in Keras.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [6](463356_2_En_6_Chapter.xhtml) 章，我们讨论了超参数调整。我们讨论了网格搜索和随机搜索以及从粗到精的优化。然后详细解释和讨论了贝叶斯优化。最后，我们讨论了对数尺度上的采样。在第
    [7](463356_2_En_7_Chapter.xhtml) 章，我们讨论了卷积神经网络以及如何在 Keras 中实现它们。
- en: Chapter [8](463356_2_En_8_Chapter.xhtml) is a very short chapter with a very
    basic introduction to recurrent neural networks. In Chapter [9](463356_2_En_9_Chapter.xhtml),
    we discuss autoencoders and their applications. Chapter [10](463356_2_En_10_Chapter.xhtml)
    contains a discussion of metric and error analysis.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [8](463356_2_En_8_Chapter.xhtml) 章是一个非常简短的章节，对循环神经网络进行了非常基础的介绍。在第 [9](463356_2_En_9_Chapter.xhtml)
    章，我们讨论了自编码器及其应用。第 [10](463356_2_En_10_Chapter.xhtml) 章包含了对度量误差分析的讨论。
- en: Chapter [11](463356_2_En_11_Chapter.xhtml) is a brief introduction to generative
    adversarial networks. In Appendixes A and B, an introduction to Keras and a discussion
    about how to customize it are briefly discussed.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 第 [11](463356_2_En_11_Chapter.xhtml) 章是对生成对抗网络的简要介绍。在附录 A 和 B 中，简要介绍了 Keras
    以及如何对其进行定制的讨论。
- en: Final Words
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的话
- en: I hope that this book gives you a clear curriculum to follow in order to study
    neural networks in the most structured and easy way. The topics are not easy and
    require effort and time. Thus, you should not be discouraged. Unfortunately, real
    machine learning projects involve much more than simply copy and pasting from
    blogs on the Internet. Programming is only a part of it, and without knowing how
    the algorithms work, writing the code will be useless, and in the worst case will
    give you the wrong results.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这本书能给你提供一个清晰的课程，以便以最结构化和最简单的方式学习神经网络。这些主题并不容易，需要努力和时间。因此，你不应该气馁。不幸的是，真实的机器学习项目涉及的不仅仅是简单地从互联网上的博客中复制粘贴。编程只是其中的一部分，如果不了解算法是如何工作的，编写代码将是无用的，在最坏的情况下甚至会得到错误的结果。
- en: I hope that you will find this book useful and that you will profit from it
    for your career and research projects.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你会觉得这本书有用，并且能在你的职业和研究项目中从中受益。
- en: Dübendorf, 1^(st) January 2022
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 杜本多夫，2022 年 1 月 1 日
- en: Acknowledgments
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: This book would not have been possible without the help of many people who read
    drafts and gave me feedback. Prof. Marco Deriu helped greatly with many projects,
    ideas, and discussions. Dr. Piga read drafts and gave me feedback and ideas about
    how to make the chapters better. In particular, I am deeply indebted to Michela
    Sperti. She worked without pause and updated almost all of the book’s code to
    TensorFlow 2\. Not only that, but she also read all the chapters and gave me important
    feedback that made the book much better. Without her, the book would not be as
    good as it is. Of course, all the mistakes that are in the book are completely
    my fault.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 没有众多阅读草稿并给予我反馈的人的帮助，这本书是不可能完成的。Marco Deriu 教授在许多项目、想法和讨论中给予了极大的帮助。Piga 博士阅读了草稿并给了我关于如何使章节更好的反馈和想法。特别是，我对
    Michela Sperti 深感感激。她不懈地工作，几乎更新了书中所有代码到 TensorFlow 2。不仅如此，她还阅读了所有章节，并给了我重要的反馈，使这本书变得更好。没有她，这本书就不会像现在这样好。当然，书中所有的错误都是完全我的责任。
- en: I am also incredibly grateful to Aditee Mirashi, an untiring editor, Jojo John
    Moolayil, a wonderful technical editor, and Celestin John Suresh, the most wonderful
    acquisition editor one may want. Many thanks to a wonderful Apress editing team.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我也非常感谢 Aditee Mirashi，一位不知疲倦的编辑，Jojo John Moolayil，一位出色的技术编辑，以及 Celestin John
    Suresh，可能是最出色的收购编辑。感谢一个出色的 Apress 编辑团队。
- en: But more importantly, I am infinitely indebted to my daughter Caterina and my
    wife Francesca, who supported me during the entire process and had infinite patience
    with me while I was writing and updating this book. You are the reason I do what
    I do.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 但更重要的是，我对我的女儿 Caterina 和我的妻子 Francesca 无限感激，他们在整个过程中支持我，在我写作和更新这本书时对我有着无限的耐心。你们是我所做一切的原因。
- en: A last big thank you goes to all the readers of the first edition. I thank you
    for your trust and interest in what I wrote. You are my main motivation for updating
    the book to this second edition.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我要向第一版的所有读者表示衷心的感谢。感谢你们对我的作品的信任和兴趣。你们是我将这本书更新到第二版的主要动力。
