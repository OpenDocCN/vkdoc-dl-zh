- en: 3. Wit.ai and Dialogflow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter covers the basics of [Wit.​ai](https://wit.ai/) and [Dialogflow](https://dialogflow.com/),
    two chatbot interfaces from Google that provide helpful capabilities. You’ll start
    by exploring a simple bot flow using Wit.ai, and then move on to Dialogflow to
    create a full-fledged bot to deploy to the Web.
  prefs: []
  type: TYPE_NORMAL
- en: Getting Started with Wit.ai
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Wit.ai* is a web-based IDE for creating bots. To launch Wit.ai, you have to
    go to [`https://wit.ai/`](https://wit.ai/) .'
  prefs: []
  type: TYPE_NORMAL
- en: In this section, you’ll work on creating a new app and then you’ll add intent
    to it. Next, you’ll add text and keywords to modify the bot. Later in this chapter,
    you’ll implement the Dialogflow tools to implement the bot.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a New App
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will work on creating your first app. From the Wit.ai web
    site, click Quick Start, as shown in Figure [3-1](#Fig1).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig1_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-1
  prefs: []
  type: TYPE_NORMAL
- en: Choosing the Quick Start option to create an app
  prefs: []
  type: TYPE_NORMAL
- en: This opens a page that presents options to create the first app by using either
    GitHub or Facebook, as shown in Figure [3-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig2_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-2
  prefs: []
  type: TYPE_NORMAL
- en: Logging in using GitHub
  prefs: []
  type: TYPE_NORMAL
- en: After you log in, you’ll have the option to create your new app , as shown in
    Figure [3-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig3_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-3
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new app
  prefs: []
  type: TYPE_NORMAL
- en: Let’s create a simple app. You’ll name the app *TestStories*. In the app description
    section , type *Demo*. Select the Private option for the app data. Then click
    the Create App button, shown in Figure [3-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig4_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-4
  prefs: []
  type: TYPE_NORMAL
- en: Setting the details for your new app
  prefs: []
  type: TYPE_NORMAL
- en: Adding Intent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Clicking the Create App button opens the next page, which presents the Stories
    option. Following that, you head to the Understanding option; this page is shown
    in Figure [3-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig5_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-5
  prefs: []
  type: TYPE_NORMAL
- en: The Understanding options at the Wit.ai site
  prefs: []
  type: TYPE_NORMAL
- en: Let’s work through the new app with a pizza example.
  prefs: []
  type: TYPE_NORMAL
- en: In the User Says text box, type *I want some cheese pizza*, as shown in Figure
    [3-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig6_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-6
  prefs: []
  type: TYPE_NORMAL
- en: Adding details we are working towards ordering pizza so we are constructing
    the way to start the conversation
  prefs: []
  type: TYPE_NORMAL
- en: Now you’re ready to create an intent. You add the value for the intent as pizza,
    as shown in Figure [3-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig7_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-7
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new intent. An intent is needed in here so that while conversation
    it is able to find the right order for communication.
  prefs: []
  type: TYPE_NORMAL
- en: You add a pizza option with cheese and finally click the Validate button , as
    shown in Figure [3-8](#Fig8).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig8_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-8
  prefs: []
  type: TYPE_NORMAL
- en: Creating an intent and then validating it. We are creating different intent
    so that we are giving an option to choose for the user which type of pizza they
    want to have.
  prefs: []
  type: TYPE_NORMAL
- en: After validating that is creation of the entities option, you have two entities
    created now, highlighted in Figure [3-9](#Fig9).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig9_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-9
  prefs: []
  type: TYPE_NORMAL
- en: The app shows two intents
  prefs: []
  type: TYPE_NORMAL
- en: Adding Text and Keywords
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s work on modifying the bot. We will work now on creating the flow of the
    chatbot so the user is able to order different kind of pizzas.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, you’ll try to add a sentence. Figure [3-10](#Fig10) shows how
    to add a sentence for recognition.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig10_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-10
  prefs: []
  type: TYPE_NORMAL
- en: The app is trying to understand a sentence. Here we are working on how a chatbot
    will be able to discover what user is typing so that the sentence that is created
    is understandable to the bot.
  prefs: []
  type: TYPE_NORMAL
- en: Next, click Validate. Now you need to select an entity. Choose Pizza and click
    the arrow associated with it (see Figure [3-11](#Fig11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig11_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-11
  prefs: []
  type: TYPE_NORMAL
- en: Select an entity and the arrow associated with it
  prefs: []
  type: TYPE_NORMAL
- en: When you click the Pizza arrow , you head to the page that has keywords and
    synonyms, as shown in Figure [3-12](#Fig12).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig12_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-12
  prefs: []
  type: TYPE_NORMAL
- en: Page for adding a new keyword
  prefs: []
  type: TYPE_NORMAL
- en: Here you’ll add new keywords. The results are shown in Figure [3-13](#Fig13).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig13_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-13
  prefs: []
  type: TYPE_NORMAL
- en: Added keywords so that we are exactly creating the ways different type of pizzas
    are ordered
  prefs: []
  type: TYPE_NORMAL
- en: Now click the Understanding option in order to train the bot to recognize the
    new keywords that you added. It is visible at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with pepperoni pizza . For understanding the flow of the intent
    for pepperoni pizza, type in *I want a pepperoni pizza*, we are showing how the
    bot can be made to order a specific pizza as shown in Figure [3-14](#Fig14). Then
    click Validate.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig14_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-14
  prefs: []
  type: TYPE_NORMAL
- en: Adding the pepperoni pizza option
  prefs: []
  type: TYPE_NORMAL
- en: Now you’ll add veggie pizza, as shown in Figure [3-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig15_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-15
  prefs: []
  type: TYPE_NORMAL
- en: Adding veggie pizza option
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now add a Large pizza option . For that, you need to make some changes,
    shown in Figure [3-16](#Fig16).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig16_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-16
  prefs: []
  type: TYPE_NORMAL
- en: You need to change the pizza option
  prefs: []
  type: TYPE_NORMAL
- en: Delete the Pizza option , because you want to work on the size of the pizza.
    Click the cross option to delete the pizza value, as shown in Figure [3-17](#Fig17).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig17_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-17
  prefs: []
  type: TYPE_NORMAL
- en: Deleting the pizza option
  prefs: []
  type: TYPE_NORMAL
- en: Creating a New Entity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you’ll create an entity named *pizzaSize*, shown in Figure
    [3-18](#Fig18).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig18_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-18
  prefs: []
  type: TYPE_NORMAL
- en: Creating the pizzaSize entity
  prefs: []
  type: TYPE_NORMAL
- en: After creating the intent, the bot page looks like Figure [3-19](#Fig19).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig19_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-19
  prefs: []
  type: TYPE_NORMAL
- en: Adding a new intent
  prefs: []
  type: TYPE_NORMAL
- en: Implementing Wit.ai with Facebook
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ve gone through the process of creating a simple app that uses some of the
    features of Wit.ai. In this section, you’ll implement Wit.ai with Facebook. The
    Facebook API is available at `developers.facebook.com`. You will create a chatbot
    for the official Facebook page, or any Facebook page. This chatbot will add to
    Facebook Messenger. You will have to set up webhooks accordingly. To get webhooks
    working, you need to set up ngrock.
  prefs: []
  type: TYPE_NORMAL
- en: First, create a new app as you’ve done before. This time, name it Test1, as
    shown in Figure [3-20](#Fig20).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig20_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-20
  prefs: []
  type: TYPE_NORMAL
- en: Adding a new name
  prefs: []
  type: TYPE_NORMAL
- en: Now head back to the Facebook for Developers site at [`https://developers.facebook.com/`](https://developers.facebook.com/)
    . You need to use your Facebook credentials to log in. The page looks Figure [3-21](#Fig21).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig21_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-21
  prefs: []
  type: TYPE_NORMAL
- en: The Facebook for Developers page
  prefs: []
  type: TYPE_NORMAL
- en: Now you need to create a new app. Click the My Apps option at the top right
    to access the drop-down menu for creating a new app, as shown in Figure [3-22](#Fig22).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig22_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-22
  prefs: []
  type: TYPE_NORMAL
- en: Adding a new app
  prefs: []
  type: TYPE_NORMAL
- en: Name it *SampleApp* and add a product to it by clicking the Add a Product button,
    as shown in Figure [3-23](#Fig23).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig23_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-23
  prefs: []
  type: TYPE_NORMAL
- en: Adding a sample app
  prefs: []
  type: TYPE_NORMAL
- en: For a product, you need to add a messenger , shown in Figure [3-24](#Fig24).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig24_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-24
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Messenger option
  prefs: []
  type: TYPE_NORMAL
- en: Click the Set Up button in the Messenger option. You will be using Wit.ai’s
    natural language processing (NLP) rather than Facebook’s (which is very basic),
    although both of them work perfectly together. Now you have to set up a page with
    the app name created; xxxxxx, as shown in Figure [3-25](#Fig25). Your goal is
    to create a chatbot for the official Facebook page.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig25_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-25
  prefs: []
  type: TYPE_NORMAL
- en: Selecting a web page in Facebook
  prefs: []
  type: TYPE_NORMAL
- en: The site will ask for authentication, and then the token will be created. Now
    you need to quickly set up webhooks. Click the Setup Webhooks button, shown in
    Figure [3-26](#Fig26).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig26_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-26
  prefs: []
  type: TYPE_NORMAL
- en: Setting up Webhooks
  prefs: []
  type: TYPE_NORMAL
- en: Clicking this option opens a page for assigning details. Before using webhooks,
    you need to configure ngrock. Go to the ngrock site at [`https://ngrok.com/`](https://ngrok.com/)
    , shown in Figure [3-27](#Fig27).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig27_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-27
  prefs: []
  type: TYPE_NORMAL
- en: The ngrok site
  prefs: []
  type: TYPE_NORMAL
- en: Download ngrock by clicking the Downloading Ngrok link to access the download
    options, shown in Figure [3-28](#Fig28).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig28_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-28
  prefs: []
  type: TYPE_NORMAL
- en: Downloading ngrok for Windows
  prefs: []
  type: TYPE_NORMAL
- en: 'After downloading ngrock, launch `ngrok.exe` from the command prompt. You have
    to open the command prompt and head to the localhost page. At my end, the localhost
    was 4040\. Key in the following details at the command prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: If web server that is ngrock is up, you will see the window in Figure [3-29](#Fig29).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig29_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig29_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-29
  prefs: []
  type: TYPE_NORMAL
- en: The ngrok status
  prefs: []
  type: TYPE_NORMAL
- en: Let’s head to the localhost page, shown in Figure [3-30](#Fig30), at [`http://7c9cc892.ngrok.io/inspect/http`](http://7c9cc892.ngrok.io/inspect/http)
    *.*
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig30_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig30_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-30
  prefs: []
  type: TYPE_NORMAL
- en: The inspect page as reflected that carries the information of the localhost
    page
  prefs: []
  type: TYPE_NORMAL
- en: When the page is up, you can see the statistics in the command-prompt window,
    as shown in Figure [3-31](#Fig31).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig31_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig31_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-31
  prefs: []
  type: TYPE_NORMAL
- en: You have set up the ngrok environment
  prefs: []
  type: TYPE_NORMAL
- en: Deploying the Wit.ai bot is easy after you’ve set up the ngrok environment as
    well as the webhook’s natural language processing section. Next you will work
    with Dialogflow to create a complete bot that’s deployable to the Web.
  prefs: []
  type: TYPE_NORMAL
- en: Working with Dialogflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, you’ll use Dialogflow (formerly Api.ai) to create a bot. First
    you’ll access the web console through your Google account. Then you’ll create
    a Pizza bot. Finally, you’ll use Small Talk to xxxxx and then link the bot to
    a Google project. A small talk is a way to access prebuilt API for doing the conversation
    in a proper manner.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start now.
  prefs: []
  type: TYPE_NORMAL
- en: Accessing Dialogflow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section introduces you to Dialogflow and gets you logged in via your Google
    account.
  prefs: []
  type: TYPE_NORMAL
- en: Head to the Dialogflow web site at [`https://dialogflow.com/`](https://dialogflow.com/)
    *.*
  prefs: []
  type: TYPE_NORMAL
- en: The Dialogflow web site for creating chatbots is shown in Figure [3-32](#Fig32).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig32_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig32_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-32
  prefs: []
  type: TYPE_NORMAL
- en: The Dialogflow web site
  prefs: []
  type: TYPE_NORMAL
- en: From this Dialogflow page, you can either sign up for free or, if you already
    have an account, you can to the console. If you have a Google account, you need
    to verify it and log in, as shown in Figure [3-33](#Fig33).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig33_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig33_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-33
  prefs: []
  type: TYPE_NORMAL
- en: Logging in using a Google account
  prefs: []
  type: TYPE_NORMAL
- en: Allow the access , as shown in Figure [3-34](#Fig34).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig34_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig34_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-34
  prefs: []
  type: TYPE_NORMAL
- en: Allow Dialogflow to access Goggle Assistant
  prefs: []
  type: TYPE_NORMAL
- en: The next page is a Welcome screen . The apps in Dialogflow are known as *agents*.
    You will have to create one by clicking Create Agent, as shown in Figure [3-35](#Fig35).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig35_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig35_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-35
  prefs: []
  type: TYPE_NORMAL
- en: The Dialogflow welcome page after loogging in
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Pizza Bot
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will use Dialogflow to create a simple pizza bot. Name
    it PizzaBot, as shown in Figure [3-36](#Fig36).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig36_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig36_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-36
  prefs: []
  type: TYPE_NORMAL
- en: Creating a pizza bot
  prefs: []
  type: TYPE_NORMAL
- en: Now you need to figure out what you need to do with the app.
  prefs: []
  type: TYPE_NORMAL
- en: Using Small Talk
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You will be using Small Talk for the bot’s interactions. You’ll use Small Talk
    for interactions like Hi, Hello, and so forth. Then you’ll allow users to order
    the pizza. Dialogflow has this wonderful built-in API that does all the small
    talk for us. You just need to enable it, as shown in Figure [3-37](#Fig37).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig37_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig37_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-37
  prefs: []
  type: TYPE_NORMAL
- en: Enabling Small Talk prebuilt agents. The user selects the small talk option
    so that we are importing the basic way the communication occurs.
  prefs: []
  type: TYPE_NORMAL
- en: You then import Small Talk accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: Linking to a Google Project
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you’ll see how to integrate your bot with a Google project.
    You can link to a Google Project or create a new one, as shown in Figure [3-38](#Fig38).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig38_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig38_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-38
  prefs: []
  type: TYPE_NORMAL
- en: Linking to a Google project
  prefs: []
  type: TYPE_NORMAL
- en: After linking to a Google project or naming a new one, enable Small Talk for
    the PizzaBot app, as shown in Figure [3-39](#Fig39). Small Talk will help us immensely.
    Small Talk has all the basic conversation flows for us and makes us easier to
    communicate.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig39_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig39_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-39
  prefs: []
  type: TYPE_NORMAL
- en: Enabling Small Talk and saving it
  prefs: []
  type: TYPE_NORMAL
- en: In the next step, you need to create a new entity for the app.
  prefs: []
  type: TYPE_NORMAL
- en: Adding an Intent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now you will create an intent. now one of the thongs user might think of as
    parameter being hungry. So you will add an intent named Hungry. We will to create
    a new intent, as shown in Figure [3-40](#Fig40).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig40_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig40_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-40
  prefs: []
  type: TYPE_NORMAL
- en: Creating a new intent. We would be creating a new intent for the chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: You then add training parameters or examples, as shown in Figure [3-41](#Fig41).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig41_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig41_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-41
  prefs: []
  type: TYPE_NORMAL
- en: Adding parameters
  prefs: []
  type: TYPE_NORMAL
- en: You’ve created a simple flow for the bot. Now you will work on creating new
    entities for the it.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a New Entity
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will work on constructing the bot while creating new entities.
    Click the Entities option and then click Create Entity, as shown in Figure [3-42](#Fig42).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig42_HTML.png](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig42_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-42
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Entities option
  prefs: []
  type: TYPE_NORMAL
- en: This creates a field for you with the required details. For pizzas, the entity
    will be Topping, as shown in Figure [3-43](#Fig43).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig43_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig43_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-43
  prefs: []
  type: TYPE_NORMAL
- en: Declare an entity called Topping
  prefs: []
  type: TYPE_NORMAL
- en: 'You will add four toppings for this example:'
  prefs: []
  type: TYPE_NORMAL
- en: Onions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mushroom
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Peperoni
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pineapple
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now save the Topping parameters .. The bot UI will then look like Figure [3-44](#Fig44).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig44_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig44_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-44
  prefs: []
  type: TYPE_NORMAL
- en: The Topping options
  prefs: []
  type: TYPE_NORMAL
- en: Deploying the Bot
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You have already imported the Small Talk agent. Now you’ll import a new agent.
    Let’s name the agent Questionbot. The more agents we add it becomes easier for
    the conversational flow. You create a Questionbot and now you will try to use
    prebuilt agents in it, as shown in Figure [3-45](#Fig45).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig45_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig45_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-45
  prefs: []
  type: TYPE_NORMAL
- en: Adding prebuilt agents
  prefs: []
  type: TYPE_NORMAL
- en: You will have to select all the intents available so the bot flow will be perfect;
    see Figure [3-46](#Fig46).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig46_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig46_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-46
  prefs: []
  type: TYPE_NORMAL
- en: The Small Talk agent
  prefs: []
  type: TYPE_NORMAL
- en: Then you need to copy the intents by clicking to put a check mark on the copy-related
    entities and naming the destination agent (in this case, it is Questionbot). Next,
    click Start, as shown in Figure [3-47](#Fig47).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig47_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig47_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-47
  prefs: []
  type: TYPE_NORMAL
- en: Copying related entities
  prefs: []
  type: TYPE_NORMAL
- en: If you now go to the Questionbot, you will see the intents and all of the content
    in the bot. Try *are you a bot* as a parameter, as shown in Figure [3-48](#Fig48).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig48_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig48_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-48
  prefs: []
  type: TYPE_NORMAL
- en: You ask a question, and the bot answers
  prefs: []
  type: TYPE_NORMAL
- en: Integration with Web Instance
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, you will work toward getting the integration for the Web. We
    will now try to integrate the app to certain platform let’s try in Web Demo.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig49_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig49_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-49
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the Web Demo integration option. We are integrating the bot to enable
    the web version for conversation.
  prefs: []
  type: TYPE_NORMAL
- en: Toggle the slider to right to test the link, as shown in Figure [3-50](#Fig50).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig50_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig50_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-50
  prefs: []
  type: TYPE_NORMAL
- en: Testing the link
  prefs: []
  type: TYPE_NORMAL
- en: Integrate the web link for the bot by using an iframe in an HTML page so the
    bot works accordingly, shown in Figure [3-51](#Fig51).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/457478_1_En_3_Chapter/457478_1_En_3_Fig51_HTML.jpg](../images/457478_1_En_3_Chapter/457478_1_En_3_Fig51_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3-51
  prefs: []
  type: TYPE_NORMAL
- en: Integrating the web link for the bot
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter, you worked on two bot frameworks and learned how they work.
    You created a complete deployable bot by using Dialogflow and saw its result.
    This chapter provided simple examples and integrations as well as use cases for
    bots.
  prefs: []
  type: TYPE_NORMAL
