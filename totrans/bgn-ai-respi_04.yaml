- en: 4. Games
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'This chapter is all about games. But the games I discuss are not the multi-million-dollar
    video blockbusters that are currently saturating the marketplace. Instead, they
    are the much simpler games that have been around for a very long time; some for
    thousands of years. But even in these simple games, AI has had an impact. The
    games discussed in this chapter traditionally involve two human opponents, but
    the modern varieties involve one human playing against a computer. That’s where
    the AI comes in: to provide some randomness and competition to the human player
    such that playing the game does not quickly become boring and trivial.'
  prefs: []
  type: TYPE_NORMAL
- en: Each demonstration presents several iterations for which you will need some
    additional parts, as detailed in the Table [4-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-1.
  prefs: []
  type: TYPE_NORMAL
- en: Parts Lists
  prefs: []
  type: TYPE_NORMAL
- en: '| Description | Quantity | Remarks |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Pi Cobbler | 1 | 40-pin version, either T or DIP form factor acceptable |'
  prefs: []
  type: TYPE_TB
- en: '| solderless breadboard | 1 | 860 insertion points with power supply strips
    |'
  prefs: []
  type: TYPE_TB
- en: '| jumper wires | 1 package |   |'
  prefs: []
  type: TYPE_TB
- en: '| LED | 3 |   |'
  prefs: []
  type: TYPE_TB
- en: '| 220Ω resistor | 3 | 1/4 watt |'
  prefs: []
  type: TYPE_TB
- en: '| 16 × 4 LCD display | 1 | Adafruit p/n 198 or equivalentYou can also use a
    16 × 2 LCD |'
  prefs: []
  type: TYPE_TB
- en: '| 10k Ω potentiometer | 1 | Included with LCD display |'
  prefs: []
  type: TYPE_TB
- en: '| push button switches | 4 | Tactile, suitable for use with a solderless breadboard
    |'
  prefs: []
  type: TYPE_TB
- en: 'The first game to be demonstrated is that old-time favorite we all have played:
    rock-paper-scissors.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 4-1: Rock-Paper-Scissors'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here are the rules for the human-to-human rock-paper-scissors game , in case
    you have not played it for a while. Each opponent clenches his or her fist, counts
    to three, and then displays one of the following hand signals:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Flat hand: paper'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Fist: rock'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Two fingers in a V: scissors'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Winning is determined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: The same signal from each opponent is a tie.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rock dulls a scissor, so the rock sign wins.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Paper covers a rock, so the paper sign wins.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Scissors cut paper, so the scissor sign wins.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are only nine possible combinations, including three ways to tie. Each
    opponent has three ways to win, as described, which leads to the nine possible
    combinations.
  prefs: []
  type: TYPE_NORMAL
- en: The following Python program named prs.py is a straightforward implementation
    of the rock-paper-scissors game. This program does not use any Prolog statements
    demonstrated in the previous chapter, but instead relies on standard Python `if
    ... else` statements . These statements have the same effect as the if <condition>
    then <conclusion> discussed in the section on inference.
  prefs: []
  type: TYPE_NORMAL
- en: prs.py listing
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Figure [4-1](#Fig1) shows several rounds that I conducted with the Raspberry
    Pi .
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig1_HTML.jpg](A436848_1_En_4_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1.
  prefs: []
  type: TYPE_NORMAL
- en: Rock-paper-scissors game play
  prefs: []
  type: TYPE_NORMAL
- en: I do want to comment on one aspect of this program, which is especially directed
    to those readers who are not too comfortable with writing Python programs. The
    `elif` command is a contraction of the words `else if` and is used as part of
    a nested `if ... else` structure, which implements the game logic. The game logic
    can also be portrayed in a tree diagram, as shown in Figure [4-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig2_HTML.jpg](A436848_1_En_4_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-2.
  prefs: []
  type: TYPE_NORMAL
- en: Tree diagram for rock-paper-scissors game
  prefs: []
  type: TYPE_NORMAL
- en: I think you can appreciate the symmetry of the logic as depicted in the figure.
    Note that there are six leafs or end points, which show where the player either
    wins or loses. This matches exactly with the six win/loss combinations I mentioned
    earlier.
  prefs: []
  type: TYPE_NORMAL
- en: 'Believe or not, there is some underlying strategy, which can be invoked when
    playing this game against a human opponent. To understand the competitive strategy,
    I must first assign some values to the game outcomes. Let’s assume the following
    reasonable point assignment for each outcome:'
  prefs: []
  type: TYPE_NORMAL
- en: Win = 2 points
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tie = 1 point
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Loss = 0 points
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Table [4-2](#Tab2) shows, on average, what the expected player values should
    be for a long run of consecutive play.
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-2.
  prefs: []
  type: TYPE_NORMAL
- en: Averaged Player Outcomes
  prefs: []
  type: TYPE_NORMAL
- en: '|   |   | Opponents’ Move | Averaged Player Score |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|   |   | paper | rock | scissors |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Player’s Move | paper | 1 | 2 | 0 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '|   | rock | 0 | 1 | 2 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '|   | scissors | 2 | 0 | 1 | 1 |'
  prefs: []
  type: TYPE_TB
- en: The averaged player score should not surprise you, as over the long run (assuming
    random choices by each opponent), the expected scores or values should be equally
    divided over all the possible outcomes. But now, let’s add a twist to the normal
    approach and take advantage of a human trait. This trait or behavior involves
    random number selection. If you asked someone to select three random numbers from
    1 to 10, odds would favor that they might answer 7, 4, and 8, or some similar
    variation. They could easily answer 5, 5, and 5, which would have satisfied the
    request, but using the word random obviously biases behavior. Let’s assume now
    that your opponent selected rock in the last round. It is more likely than not
    that he will not select rock again for the next round. The averaged expected values
    table can now be modified, as shown in Table [4-3](#Tab3).
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-3.
  prefs: []
  type: TYPE_NORMAL
- en: Modified Averaged Expected Values
  prefs: []
  type: TYPE_NORMAL
- en: '|   |   | Opponent’s Move | Averaged Player Score |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '|   |   | paper | rock | scissors |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Player’s Move | paper | 1 | - | 0 | 0.5 |'
  prefs: []
  type: TYPE_TB
- en: '|   | rock | 0 | - | 2 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '|   | scissors | 2 | - | 1 | 1.5 |'
  prefs: []
  type: TYPE_TB
- en: Clearly, there is a best move on the player’s part based on the opponent’s previous
    move, which is based on normal human behaviors. However, it is not too hard to
    program in a check routine to avoid providing the human player a competitive advantage.
    The code would be something like the following; but note that I just used the
    index integer values and not the equivalent string values .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '`lastMove` and `won` are new integer variables representing the computer’s
    previous selection and whether it won, respectively. I did not incorporate this
    code into the current program because I just wanted to demonstrate the classic
    game design.'
  prefs: []
  type: TYPE_NORMAL
- en: My next iteration of the rock-paper-scissors game eliminates keyboard entry
    and the screen display, and replaces them with push buttons and LEDs.
  prefs: []
  type: TYPE_NORMAL
- en: Rock-Paper-Scissors Game with Switches and LEDs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I thought it would both be fun and interesting to change the game play on the
    Raspberry Pi to use push button switches to select the sign and have LEDs indicate
    a win, lose, or tie for the game. In this project, I also introduce how the Raspberry
    Pi handles interrupts using the Python language. There is one caveat to this program.
    It must be started using the following command-line entry:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The Raspberry Pi system now needs to be set up. The Fritzing diagram is shown
    in Figure [4-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig3_HTML.jpg](A436848_1_En_4_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-3.
  prefs: []
  type: TYPE_NORMAL
- en: Fritzing diagram for rock-paper-scissors game machine
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-3](#Fig3) is an extension of Figure [3-11](#Fig11), which was used
    in an expert system demonstration. I added one additional LED and four push button
    switches to the circuit. The additional LED was connected to pin 27, while the
    push buttons were connected to pins 12, 16, 20, and 21.
  prefs: []
  type: TYPE_NORMAL
- en: The physical Raspberry Pi setup is shown in Figure [4-4](#Fig4). Notice that
    I put labels near the LEDs and push buttons to help the user determine what the
    LEDs indicate and which sign a particular push button enables. The fourth push
    button exits the program when pushed.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig4_HTML.jpg](A436848_1_En_4_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-4.
  prefs: []
  type: TYPE_NORMAL
- en: Physical Raspberry Pi setup
  prefs: []
  type: TYPE_NORMAL
- en: The push buttons act as inputs that momentarily provide a high level of 3.3V
    to the pin when pushed. Each of the input pins is also set up to be in a pull-down
    mode, where an internal resistor at the pin input is connected to ground. This
    prevents an indeterminate floating state from being applied to the pin. In such
    a state, a floating pin could “see” voltages ranging from tens of millivolts to
    as high as two volts, which could trigger a false high on the pin. The actual
    float voltage is highly variable and dependent on the local potential field surrounding
    the pin. Connecting a pull-down resistor avoids all that nasty trouble. And the
    good news is that the pull-down resistor is actually configured via a software
    command, which I discuss after I show you the following code listing.
  prefs: []
  type: TYPE_NORMAL
- en: prs_with_LEDs_and_Switches.py
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: One thing that you should immediately notice is that I only used numbers to
    represent the signs in this game version. There is no need for actual string names
    because the LEDs show the result of the round and the push buttons are already
    clearly labeled. However, I did identify what these “magic” numbers represent
    by using comments with the code listing. I use the magic to represent any number
    that is used to represent something else. Without a comment or other identifying
    means, it does become a magic trick to figure what an isolated number in a program
    is supposed to represent. Unfortunately, more than a few developers still resort
    to using magic numbers in their programs—a practice I highly suggest you avoid
    unless you comment them, but then they are no longer magic.
  prefs: []
  type: TYPE_NORMAL
- en: 'The logic in the preceding program is exactly the same as what was presented
    in the first version of the program. Yet, there are big differences in the input
    and outputs, which now use push buttons and LEDs. I will discuss the LED output
    first since you have already seen it in the expert system demonstration. The pin
    number scheme is first selected, which is still going to BCM because it matches
    the T Pi Cobbler pin designations. The pins selected to be outputs are set up
    next. Those pins are 4, 17, and 27, which represent win, lose, and tie, respectively.
    That’s all that’s needed to preconfigure the outputs. Turning on an output is
    done using this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'You should also notice that I followed each LED output command with this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This forces the Python interpreter to pause for five seconds, which allows the
    user to easily recognize which LED is lit. Without a pause, the LED will light
    and extinguish so quickly that you could never see it. That condition would likely
    puzzle a lot of new programmers who expect to see a lit LED, but never do. The
    program was probably functioning as desired but the new programmer neglected the
    reality of a real-time clock cycle, such that the LED stayed on for only microseconds—far
    too brief a time to detect with the human eye.
  prefs: []
  type: TYPE_NORMAL
- en: Now on to the input pins and the interrupt discussion.
  prefs: []
  type: TYPE_NORMAL
- en: Interrupts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are two principal ways to handle pin inputs: polling and interrupts.
    Polling, as the name suggests, simply periodically checks on a pin state. It must
    be implemented in a loop to work. The following code snippet shows a way to check
    on a pin status:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Polling is much slower than using interrupts, because all the code in a loop
    must be executed. It is possible to miss a button press if the program takes a
    relatively long time to complete each loop, especially if there are any pause
    statements in the loop.
  prefs: []
  type: TYPE_NORMAL
- en: 'Interrupts, on the other hand, are practically immediate, independent of what
    is going on in the main program, looping or not. Interrupts take advantage of
    a hardware subsystem contained within the ARM microprocessor called the interrupt
    controller. Figure [4-5](#Fig5) is a very simplified diagram of an interrupt controller
    that has three interrupt sources: a push button, a serial input, and a clock input.
    The push button interrupt source is pertinent in this project.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig5_HTML.jpg](A436848_1_En_4_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-5.
  prefs: []
  type: TYPE_NORMAL
- en: Interrupt controller
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-6](#Fig6) is a logic flow diagram that clearly shows the sequence
    of actions when an interrupt occurs.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig6_HTML.jpg](A436848_1_En_4_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-6.
  prefs: []
  type: TYPE_NORMAL
- en: Interrupt logic flow diagram
  prefs: []
  type: TYPE_NORMAL
- en: Normally, the microprocessor fetches and executes one instruction after another
    while running the main program. When an interrupt occurs, which I will now call
    an event to conform to the Python language terminology, a jump is made to an interrupt
    service routine (ISR) , as shown in Figure [4-6](#Fig6). And just to further confuse
    you, ISRs are known as callback functions in Python. The interrupt controller
    automatically saves the address of the next executable instruction, as well as
    several other parameters, which is known as saving the processor state. The callback
    function is run next, and when that is completed, the interrupt controller reloads
    the processor state and resumes exactly from the point it was when interrupted.
    All of this action only takes microseconds to complete and is much faster than
    polling.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several steps that must be done in Python to set up interrupts. First,
    the appropriate pin to receive the interrupt must be set up. I will use the rock
    push button as an example. This next statement sets pin 12 as an input with a
    pull-down resistor configured for the reasons I discussed earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, the interrupt source must be identified and linked to a callback function.
    The following statement does it for the rock-signal push button:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Finally, the callback function must be defined. For the rock signal, this function
    is
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Notice, that the word `channel` must be used as an argument in the function
    definition. This is just a peculiarity of the Python language.
  prefs: []
  type: TYPE_NORMAL
- en: Also notice that I used the word `global` in the function definition, which
    specifies that the `player` variable was global or available to all portions of
    the program, whether or not it was in the function or the main program. I normally
    do not like to use globals because they break the object-oriented principle of
    encapsulation, but in this case, it seemed appropriate to minimize code duplication
    and to increase program efficiency. You also need to identify `player` as a global
    in the main program.
  prefs: []
  type: TYPE_NORMAL
- en: 'The last new program feature is the exit push button, which causes it to immediately
    quit the Python interpreter. This is the callback function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Everything else in the program is straightforward or was discussed previously.
  prefs: []
  type: TYPE_NORMAL
- en: There is no screenshot that I can show of this program running because the inputs
    are manual push button activations and the outputs are LEDs being lit. I can just
    assure you that everything functioned as anticipated.
  prefs: []
  type: TYPE_NORMAL
- en: The next game that I discuss is Nim.
  prefs: []
  type: TYPE_NORMAL
- en: 'Demo 4-2: Nim'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nim is game of mathematical strategy in which two players take turns removing
    items from a common heap. In each turn, a player may remove one, two, or three
    items. The objective of the game is to avoid being the player removing the last
    item, although there are Nim variants in which you win by removing the last item.
  prefs: []
  type: TYPE_NORMAL
- en: Various Nim-style games have been played since ancient times, often using pebbles
    as the heap. Nim has also been called pebble pickup, last pebble, and in recent
    times, sticks, or pick-up sticks. Although not really known as a fact, Nim is
    thought to have originated in China because it closely resembles the game Tsyan-shizi,
    or “picking stones.” In European history, Nim dates back to the beginning of the
    16th century. The actual name of Nim name is attributed to Harvard University
    Professor Charles Bouton, who is recognized as the creator game theory during
    the early 1900s.
  prefs: []
  type: TYPE_NORMAL
- en: I will first demonstrate a Python version of Nim in a two-person game. I simply
    describe it as “naive Nim,” in which there is no AI but simply innate player intelligence.
  prefs: []
  type: TYPE_NORMAL
- en: naive_nim.py listing
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Figure [4-7](#Fig7) shows two rounds that I played: pick1 and pick2\. Notice
    that I added some validation checks , which ensured that no more than three sticks
    were picked and that any pick did not reduce the stick total to zero or less.'
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig7_HTML.jpg](A436848_1_En_4_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-7.
  prefs: []
  type: TYPE_NORMAL
- en: Two rounds of Nim play
  prefs: []
  type: TYPE_NORMAL
- en: Now it is time to add some AI to the Nim game by implementing a computer opponent.
  prefs: []
  type: TYPE_NORMAL
- en: nim_computer.py listing
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Figure [4-8](#Fig8) shows two rounds of Nim played against the computer.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig8_HTML.jpg](A436848_1_En_4_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-8.
  prefs: []
  type: TYPE_NORMAL
- en: Two rounds of computer vs. human play
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-8](#Fig8) demonstrates that the program functions as designed when
    each opponent enters a valid stick number. While it is impossible for the computer
    to enter an invalid number, the same is not true for a human. In addition, the
    program must guard against an entry that would reduce the number of sticks to
    zero or less. Figure [4-9](#Fig9) shows these safeguards in action when I attempted
    to enter a number greater than three, or to reduce the stick total to zero.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig9_HTML.jpg](A436848_1_En_4_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-9.
  prefs: []
  type: TYPE_NORMAL
- en: Validation or “sanity” checks
  prefs: []
  type: TYPE_NORMAL
- en: 'What is not evident in Figures [4-8](#Fig8) and [4-9](#Fig9) is my addition
    of a small amount of AI to the program. Normally, the computer entry for each
    turn is determined by the following statement:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'This statement generates a random number between one and three, inclusively.
    Normally, this is OK for a naive approach; however, I did not wish to give too
    much of an unfair advantage to the human player when the stick count was four
    or lower. Therefore, I added the following code to the `moveComputer` function
    :'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: This ensures that the computer wins the round as it emulates the exact human
    behavior expected if a human player was presented with two, three, or four remaining
    sticks.
  prefs: []
  type: TYPE_NORMAL
- en: 'There is more to the Nim game competitive strategy that you should know. Let’s
    assume that six sticks are left and it is your turn. According to game theory,
    your best option would be to remove the exact number of sticks that satisfies
    the following equation :'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ n\; mod\;4=1 $$](A436848_1_En_4_Chapter_IEq1.gif) where n is the remaining
    sticks number after your turn.'
  prefs: []
  type: TYPE_NORMAL
- en: The mod operator in the equation represents integer remaindering division. For
    instance, 8 mod 3 would equal 2 because 3 divides twice into 8 with a remainder
    of 2\. So basically, you discard the dividend and keep the remainder for integer
    division. Table [4-4](#Tab4) shows all of your possible moves with six sticks
    still in the heap.
  prefs: []
  type: TYPE_NORMAL
- en: Table 4-4.
  prefs: []
  type: TYPE_NORMAL
- en: Competitive Strategy for Six Sticks in the Heap
  prefs: []
  type: TYPE_NORMAL
- en: '| Possible Move | Remaining Sticks (n) | n mod 4 |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 5 | 1 |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | 4 | 0 |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | 3 | 3 |'
  prefs: []
  type: TYPE_TB
- en: Thus, according to game theory, your optimal move is to remove one stick. You
    don’t have to be a gaming expert to understand this choice. Remember your opponent
    can only remove one, two, or three sticks. Therefore, after the opponent removes
    the sticks, there can only be two, three, or four sticks remaining. You are then
    guaranteed a win because you can remove the appropriate amount to have one remaining.
  prefs: []
  type: TYPE_NORMAL
- en: The human player has a distinct advantage in this particular game because the
    computer always randomly selects a stick removal number until there are four or
    less sticks remaining in the heap. Therefore, you should always try to have the
    computer’s second-to-last move be with six sticks. I have removed this advantage
    in the next demonstrated Nim version in the following section.
  prefs: []
  type: TYPE_NORMAL
- en: Nim with LCD and Switches
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This Nim version uses push button switches to enter the number of sticks to
    be removed. It uses an LCD to display when the human player should press a push
    button and to show the number of remaining sticks. The push buttons are connected
    to Python callback functions, as was done with the automated rock-paper-scissors
    (rps) game version. In fact, I used a very similar push button circuitry in the
    prs game. I did have to change the pins used with the push buttons to accommodate
    the LCD display interconnections. The LEDs in the prs game are no longer needed
    because they are replaced by the 16 × 2 LCD display.
  prefs: []
  type: TYPE_NORMAL
- en: The Fritzing diagram for the automated Nim setup is shown in Figure [4-10](#Fig10).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig10_HTML.jpg](A436848_1_En_4_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-10.
  prefs: []
  type: TYPE_NORMAL
- en: Fritzing diagram for the automated Nim game
  prefs: []
  type: TYPE_NORMAL
- en: There are obviously too many wiring connections in this setup than can be properly
    shown in a Fritzing diagram. Therefore, I have provided both a schematic showing
    the LCD-to–Pi Cobbler interconnections and a pin list showing all the system interconnections.
    Figure [4-11](#Fig11) is the LCD module–to–Pi Cobbler schematic.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_4_Fig11_HTML.jpg](A436848_1_En_4_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4-11.
  prefs: []
  type: TYPE_NORMAL
- en: Schematic of Pi Cobbler–to–LCD module
  prefs: []
  type: TYPE_NORMAL
- en: Table [4-5](#Tab5) is the pin list detailing all the board interconnections.
    Note that the LCD pin designations start at 1 at the left and go to 16 at the
    far right for the LCD orientation, as shown in the Fritzing diagram. The potentiometer
    is oriented “upside-down,” which places the pins on top. The left pin connects
    to ground, the middle pin to LCD pin 3, and the right pin connects to 5V.
  prefs: []
  type: TYPE_NORMAL
