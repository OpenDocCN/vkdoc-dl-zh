- en: 1. Introduction to Recommendation Systems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 推荐系统简介
- en: In today’s world, customers are faced with multiple choices for every decision.
    Let’s assume that a person is looking for a book to read without any specific
    idea of what they want. There’s a wide range of possibilities for how their search
    might pan out. They might waste a lot of time browsing the Internet and trawling
    through various sites hoping to strike gold. They might look for recommendations
    from other people.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，客户在每一个决策面前都面临着多种选择。假设一个人在寻找一本书来阅读，但没有具体的想法。他们的搜索结果可能有广泛的可能。他们可能会浪费很多时间在网上浏览和浏览各种网站，希望能找到宝藏。他们可能会寻找其他人的推荐。
- en: But if there was a site or app that could recommend books to this customer based
    on what they’d read previously, that would save time that would otherwise be spent
    searching for books of interest on various sites. In short, our main goal is to
    recommend things based on the user’s interests. And that’s what recommendation
    engines do.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果有一个网站或应用可以根据用户之前阅读的内容向他们推荐书籍，这将节省在各个网站上搜索感兴趣书籍的时间。简而言之，我们的主要目标是根据用户的兴趣推荐事物。这正是推荐引擎所做的事情。
- en: A *recommendation engine*, also known as a *recommender system* or a *recommendation
    system*, is one of the most widely used machine learning applications; for example,
    it is used by companies like Amazon, Netflix, Google, and Goodreads.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*推荐引擎*，也称为*推荐系统*或*推荐系统*，是应用最广泛的机器学习应用之一；例如，它被亚马逊、Netflix、谷歌和Goodreads等公司使用。'
- en: This chapter explains recommendation systems and presents various recommendation
    engine algorithms and the fundamentals of creating them in Python 3.8 or greater
    using a Jupyter notebook.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章解释推荐系统，并介绍各种推荐引擎算法以及使用Python 3.8或更高版本和Jupyter笔记本创建它们的基本原理。
- en: What Are Recommendation Engines?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是推荐引擎？
- en: In the past, people generally purchased products recommended to them by their
    friends or the people they trust. This is how people used to make purchasing decisions
    when there was doubt about a product. But since the advent of the Internet, we
    are so used to ordering online and streaming music and movies that we are constantly
    creating data in the back end. A recommendation engine uses that data and different
    algorithms to recommend the most relevant items to users. It initially captures
    the past behavior of a user, and then it recommends items for future purchase
    or use.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，人们通常购买他们朋友或他们信任的人推荐的产品。这就是人们在产品有疑问时如何做出购买决策的。但是，自从互联网的出现，我们已经习惯了在线订购、流媒体音乐和电影，我们不断地在后台创造数据。推荐引擎使用这些数据和不同的算法来向用户推荐最相关的商品。它最初捕捉用户的过去行为，然后推荐未来购买或使用的商品。
- en: There are scenarios where there is no historical data as well. For example,
    when a new user visits a site, there is no history of that user. So how does the
    website recommend products to this user? One way is by recommending bestselling
    products (i.e., the products that are trending). Another possible solution is
    to recommend the products that bring maximum profit to the business and any new
    products recently added to the site.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 也有没有历史数据的情况。例如，当一位新用户访问网站时，没有该用户的历史记录。那么网站是如何向这位用户推荐产品的呢？一种方式是通过推荐畅销产品（即趋势产品）。另一种可能的解决方案是推荐能为企业带来最大利润的产品以及最近添加到网站上的新产品。
- en: If you can recommend a few items to a customer based on their interests, it
    positively impacts the user experience and leads to frequent visits. Hence, intelligent
    recommendation engines are built by studying the past behavior of their users
    to enhance revenue.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你能够根据客户的兴趣向他们推荐一些商品，这将积极影响用户体验并导致频繁访问。因此，通过研究用户的过去行为来增强收入，构建智能推荐引擎。
- en: Recommendation System Types
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推荐系统类型
- en: Data on a user’s likes and dislikes of items are essential to building a recommender
    engine that can suggest relevant items to the user. There are two feedback mechanisms
    through which users provide this required data.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 用户对商品喜好和厌恶的数据对于构建能够向用户推荐相关商品的推荐引擎至关重要。有两种反馈机制，用户通过这些机制提供所需的数据。
- en: '**Explicit feedback** is the data that the user explicitly provides as feedback
    on an item. It is usually difficult to obtain this type of feedback from users,
    and companies try many innovative ways. A simple like or dislike button, star
    ratings, and even comments and reviews as text input can get user feedback on
    an item.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**显式反馈**是用户明确提供的关于项目的反馈数据。通常很难从用户那里获得这种类型的反馈，公司尝试了许多创新的方法。简单的喜欢或不喜欢按钮、星级评分，甚至文本输入的评论和评论都可以获取用户对项目的反馈。'
- en: '**Implicit feedback** is the data that the user implicitly or unknowingly provides
    through their actions. This can be in the form of pages visited, items viewed,
    the number of clicks, and all sorts of other activities performed on the site/platform,
    which can indicate their interest in certain items. This type of data is generally
    captured automatically through cookies and browsing history and doesn’t require
    any direct action from the users.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**隐式反馈**是用户通过他们的行为隐式或无意识地提供的数据。这可能包括访问的页面、查看的项目、点击次数以及网站上/平台上执行的所有其他活动，这些都可以表明他们对某些项目的兴趣。这类数据通常通过cookies和浏览历史自动捕获，不需要用户采取任何直接行动。'
- en: Types of Recommendation Engines
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推荐引擎类型
- en: There are many different types of recommendation engines, and each of them is
    explored in this chapter.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多不同类型的推荐引擎，并且每个引擎都在本章中进行了探讨。
- en: Market basket analysis (association rule mining)
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场篮子分析（关联规则挖掘）
- en: Content-based filtering
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于内容的过滤
- en: Collaborative-based filtering
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于协同过滤
- en: Hybrid systems
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 混合系统
- en: ML clustering
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习聚类
- en: ML classification
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习分类
- en: Deep learning and NLP
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习和自然语言处理
- en: Market Basket Analysis (Association Rule Mining)
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 市场篮子分析（关联规则挖掘）
- en: Retailers predominantly use *market basket analysis* to reveal relationships
    between items. It works by looking for combinations of items that are often put
    together, allowing retailers to identify relationships between items that people
    buy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 零售商主要使用*市场篮子分析*来揭示项目之间的关系。它通过寻找经常一起放置的项目组合来实现，使零售商能够识别人们购买的项目之间的关系。
- en: There are several terms used in association analysis that are important to understand.
    Association rules are widely used to analyze retail basket or transaction data.
    They are intended to identify strong rules discovered in transaction data using
    interest measures based on the concept of strong rules.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在关联分析中使用了几个术语，这些术语对于理解非常重要。关联规则广泛用于分析零售篮子或交易数据。它们旨在通过基于强规则概念的兴趣度量来识别在交易数据中发现的强规则。
- en: 'Association rules are normally written like this: {bread} -> {butter}. This
    means a strong relationship exists between customers who bought bread and butter
    in the same transaction.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 关联规则通常写成这样：{面包} -> {黄油}。这意味着在同一个交易中购买了面包和黄油的客户之间存在强烈的关联。
- en: In the preceding example, {bread} is the antecedent and {butter} is the consequent.
    Both antecedents and consequences can have multiple items. In other words, {bread,
    milk} -> {butter, chips} is a valid rule.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在先前的例子中，{面包}是前件，{黄油}是后件。前件和后件都可以有多个项目。换句话说，{面包, 牛奶} -> {黄油, 薯片} 是一个有效的规则。
- en: '**Support** is the relative frequency of the rule display. In many cases, you
    may want to seek high support to make sure it’s a worthwhile relationship. However,
    there may be cases where low support is useful if you are trying to find “hidden”
    relationships.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**支持度**是规则显示的相对频率。在许多情况下，你可能希望寻求高支持度以确保它是一个有价值的关系。然而，在某些情况下，如果你试图找到“隐藏”的关系，低支持度可能是有用的。'
- en: '**Confidence** is a measure of the reliability of a rule. A 0.5 reliability
    in the preceding example means that bread and milk were purchased 50% of the time.
    The purchase also included butter and chips. For a product recommendation, 50%
    confidence may be perfectly acceptable, but this level may not be high enough
    in a medical situation.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**置信度**是衡量规则可靠性的指标。在先前的例子中，0.5的可靠性意味着面包和牛奶有50%的时间被购买。购买还包括黄油和薯片。对于产品推荐，50%的置信度可能完全可以接受，但在医疗情况下，这个水平可能不够高。'
- en: '**Lift** is the ratio of observed support to expected support if the two rules
    were independent. As a rule of thumb, a lift value close to 1 means that the rules
    were completely independent. Lift - values > 1 are more “interesting” and could
    indicate a useful rule pattern. Figure [1-1](#Fig1) illustrates how support, confidence,
    and lift are calculated.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**提升**是如果两个规则是独立的，则观察到的支持与期望支持的比率。作为一个经验法则，接近1的提升值意味着规则是完全独立的。提升值>1的规则更有“趣”，可能表明有用的规则模式。图
    [1-1](#Fig1) 阐述了支持、置信度和提升是如何计算的。'
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig1_HTML.jpg)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig1_HTML.jpg)'
- en: An analysis of market basket rules. It includes four rules with support, confidence,
    and lift calculations. The rules are 1\. A implies D. 2\. C implies A. 3\. A implies
    C. 4\. B and C imply D.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 市场篮子规则的分析。它包括四个带有支持、置信度和提升计算的规则。规则如下：1. A 蕴含 D。2. C 蕴含 A。3. A 蕴含 C。4. B 和 C
    蕴含 D。
- en: Figure 1-1
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: Market basket analysis
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 市场篮子分析
- en: Content-Based Filtering
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于内容的过滤
- en: The content-based filtering method is a recommendation algorithm that suggests
    items similar to the ones the users have previously selected or shown interest
    in. It can recommend based on the actual content present in the item. For example,
    as shown in Figure [1-2](#Fig2), a new article is recommended based on the text
    present in the articles.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 基于内容的过滤方法是一种推荐算法，它建议与用户先前选择或表现出兴趣的项目相似的项目。它可以基于项目中的实际内容进行推荐。例如，如图 [1-2](#Fig2)
    所示，基于文章中的文本推荐了一篇新文章。
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig2_HTML.jpg)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig2_HTML.jpg)'
- en: An illustration depicts a content-based filtering method. It reveals new articles
    recommended, based on the text present in the article (text read by the user and
    similar articles are recommended to other users).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了基于内容的过滤方法。它揭示了基于文章中现有文本（用户阅读的文本和类似文章推荐给其他用户）推荐的新文章。
- en: Figure 1-2
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: Content-based system
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 基于内容的系统
- en: Let’s look at the popular example of Netflix and its recommendations to explore
    the workings in detail. Netflix saves all user viewing information in a vector-based
    format, known as the *profile vector*, which contains information on past viewings,
    liked and disliked shows, most frequently watched genres, star ratings, and so
    forth. Then there is another vector that stores all the information regarding
    the titles (movies and shows) available on the platform, known as the item vector.
    This vector stores information like the title, actors, genre, language, length,
    crew info, synopsis, and so forth.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一下Netflix及其推荐的流行例子，以详细探讨其工作原理。Netflix将所有用户观看信息以基于向量的格式保存，称为*配置文件向量*，其中包含过去观看信息、喜欢的和不喜欢的内容、最常观看的类型、星级评分等信息。然后还有一个存储有关平台上可用的标题（电影和电视节目）的所有信息的向量，称为项目向量。此向量存储有关标题、演员、类型、语言、长度、制作团队信息、简介等信息。
- en: The content-based filtering algorithm uses the concept of cosine similarity.
    In it, you find the cosine of the angle between two vectors—the profile and item
    vectors in this case. Suppose *A* is the profile vector and *B* is the item vector,
    then the (cosine) similarity between them is calculated as follows.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 基于内容的过滤算法使用余弦相似度的概念。在其中，你找到两个向量（在这种情况下是配置文件向量和项目向量）之间的角度的余弦值。假设 *A* 是配置文件向量，*B*
    是项目向量，那么它们之间的（余弦）相似度计算如下。
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Figa_HTML.jpg)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Figa_HTML.jpg)'
- en: 'A formula states: sim open parenthesis A, B close parenthesis equals cos theta
    equals start fraction A dot B over either A OR B end fraction, here A is the profile
    vector and B is the item vector.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 一个公式表示：sim open parenthesis A, B close parenthesis equals cos theta equals start
    fraction A dot B over either A OR B end fraction，这里 A 是配置文件向量，B 是项目向量。
- en: The outcome (i.e., the cosine value) always ranges between –1 and 1, and this
    value is calculated for multiple item vectors (movies), keeping the profile vector
    (user) constant. The items/movies are then ranked in descending order of similarity,
    and either of the two following approaches is used for recommendations.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 结果（即余弦值）总是在-1和1之间，并且此值是针对多个项目向量（电影）计算的，同时保持配置文件向量（用户）不变。然后根据相似度对项目/电影进行降序排名，并使用以下两种方法之一进行推荐。
- en: In a **top N approach**, the top N movies are recommended, where N is a threshold
    on the number of titles recommended.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 **top N 方法**中，推荐 top N 部电影，其中 N 是推荐标题数量的阈值。
- en: In a **rating scale approach**, a threshold on the similarity value is set,
    and all the titles in that threshold are recommended.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**评分尺度方法**中，设置相似度值的阈值，并推荐该阈值内的所有标题。
- en: The following are other methods popularly used in calculating the similarity.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在计算相似度时常用的其他方法。
- en: '**Euclidean distance** is the distance between two points measured by the length
    of the straight line connecting them. Hence if you can plot the profile and items
    in an n-dimensional Euclidean space, the similarity value is equal to the distance
    between them. The closer the item is, the more similar it is. So, the closest
    items to the profile are recommended. The following is the mathematical formula
    for calculating Euclidean distance.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欧几里得距离**是两个点之间通过连接它们的直线长度来测量的距离。因此，如果你可以在 n 维欧几里得空间中绘制用户资料和项目，相似度值就等于它们之间的距离。项目越接近，就越相似。所以，最接近用户资料的项目会被推荐。以下计算欧几里得距离的数学公式。'
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Figb_HTML.jpg)A formula for
    Euclidean distance. The square root of x subscript 1 minus x subscript 1 whole
    square plus up to plus x subscript N minus y subscript N whole square.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '![图 1-4](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig4_HTML.jpg)欧几里得距离的公式。x
    下标 1 减去 x 下标 1 的平方加上直到加上 x 下标 N 减去 y 下标 N 的平方。'
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig3_HTML.jpg)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图 1-3](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig3_HTML.jpg)'
- en: A formula for Pearson's correlation. Sim of u, v is equal to the summation of
    r subscript u i minus r superscript hyphen subscript u and r subscript v i minus
    r superscript hyphen subscript v over square root of summation of r subscript
    u i minus r superscript hyphen subscript u whole square and the square root of
    summation of r subscript v i minus r superscript hyphen subscript v whole square
    is the end of the formula.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 皮尔逊相关系数的公式。u 和 v 的相似度等于 r 下标 u i 减去 r 上标横线下标 u 和 r 下标 v i 减去 r 上标横线下标 v 的总和除以平方根总和
    r 下标 u i 减去 r 上标横线下标 u 的平方和平方根总和 r 下标 v i 减去 r 上标横线下标 v 的平方，这是公式的结尾。
- en: Figure 1-3
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-3
- en: Formula
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 公式
- en: '**Pearson’s correlation** refers to how correlated or similar two things are.
    The higher the correlation, the higher the similarity. Pearson’s correlation is
    calculated using the formula shown in Figure [1-3](#Fig3).'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**皮尔逊相关系数**指的是两个事物之间如何相关或相似。相关性越高，相似度越高。皮尔逊相关系数使用图 [1-3](#Fig3) 中所示的公式计算。'
- en: The major downside to this recommendation engine is that all suggestions fall
    into the same category, and it becomes somewhat monotonous. As the suggestions
    are based on what the user has seen or liked, we’ll never get new recommendations
    that the user has not explored in the past. For example, if the user has only
    seen mystery movies, the engine will only recommend more mystery movies.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这种推荐引擎的主要缺点是所有建议都落入同一类别，这变得有些单调。由于建议是基于用户已经看到或喜欢的，我们永远不会得到用户过去未探索的新推荐。例如，如果用户只看过悬疑电影，该引擎只会推荐更多悬疑电影。
- en: To improve on this, you need a recommendation engine that not only gives suggestions
    based on the content but also on the behavior of users and on what other like-minded
    users are watching.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 为了改进这一点，你需要一个推荐引擎，它不仅基于内容给出建议，还基于用户的行为以及其他有相似兴趣的用户正在观看的内容。
- en: Collaborative-Based Filtering
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于协作的过滤
- en: In collaborative-based filtering recommendation engines, a user-to-user similarity
    is also considered, along with item similarities, to address some of the drawbacks
    of content-based filtering. Simply put, a collaborative filtering system recommends
    an item to user A based on the interests of a similar user B. Figure [1-4](#Fig4)
    shows a simple working mechanism of collaborative-based filtering
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于协作的过滤推荐引擎中，除了项目相似度外，还会考虑用户之间的相似度，以解决基于内容的过滤的一些缺点。简单来说，一个协作过滤系统会根据相似用户 B 的兴趣向用户
    A 推荐项目。图 [1-4](#Fig4) 展示了基于协作过滤的简单工作原理。
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig4_HTML.jpg)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图 1-4](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig4_HTML.jpg)'
- en: An illustration depicts the collaborative-based filtering method. It recommends
    an item to user A based on the interests of a similar user B. Here displays an
    example with two users A and B.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 一个插图描述了基于协作的过滤方法。它根据相似用户 B 的兴趣向用户 A 推荐项目。这里显示了一个关于用户 A 和 B 的示例。
- en: Figure 1-4
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-4
- en: Collaborative-based filtering
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 基于协作的过滤
- en: The similarity between users can be calculated again by all the techniques mentioned
    earlier. A user-item matrix is created individually for each customer, which stores
    the user’s preference for an item. Taking the same example of Netflix’s recommendation
    engine, the user aspects like previously watched and liked titles, ratings provided
    (if any) by the user, frequently watched genres, and so on are stored and used
    to find similar users. Once these similar users are found, the engine recommends
    titles that the user has not yet watched but users with similar interests have
    watched and liked.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 可以通过前面提到的所有技术重新计算用户之间的相似性。为每位客户创建一个单独的用户-项目矩阵，该矩阵存储用户对项目的偏好。以Netflix的推荐引擎为例，用户的方面，如之前观看并喜欢的标题、用户提供的评分（如果有）、经常观看的类型等，都被存储并用于寻找相似用户。一旦找到这些相似用户，引擎就会推荐用户尚未观看但具有相似兴趣的用户观看并喜欢的标题。
- en: This type of filtering is quite popular because it is only based on a user’s
    past behavior, and no additional input is required. It’s used by many major companies,
    including Amazon, Netflix, and American Express.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的过滤相当受欢迎，因为它仅基于用户的过去行为，不需要额外的输入。它被许多主要公司使用，包括亚马逊、Netflix和美洲Express。
- en: There are two types of collaborative filtering algorithms.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 存在两种类型的协同过滤算法。
- en: In **user-user collaborative filtering**, you find user-user similarities and
    offer suggestions based on what similar users chose in the past. Even though this
    algorithm is quite effective, since it requires high computations for getting
    all user-pair information and calculating the similarities, it takes a lot of
    time and resources. Hence for big customer bases, this algorithm is too expensive
    to use unless a proper parallelizable system is set up.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**用户-用户协同过滤**中，你找到用户之间的相似性，并根据过去相似用户的选择提供建议。尽管这个算法非常有效，但由于它需要计算所有用户对信息并计算相似性，所以需要大量的时间和资源。因此，除非设置了适当的并行化系统，否则对于大型客户群，这个算法的成本太高，无法使用。
- en: In **item-item collaborative filtering**, you try to find item similarities
    instead of similar users. An item look-alike matrix is generated for all the items
    that the user has previously chosen, and from this matrix, similar items are recommended.
    This algorithm is far less computationally expensive because the item-item look-alike
    matrix remains fixed over time with a fixed number of items. Hence recommendations
    are fetched much quicker for a new customer.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**项目-项目协同过滤**中，你试图找到项目之间的相似性，而不是相似的用户。为用户之前选择的所有项目生成一个项目相似度矩阵，并从这个矩阵中推荐相似的项目。由于项目-项目相似度矩阵在固定数量的项目下随时间保持不变，因此该算法的计算成本远低于其他算法。因此，对于新客户，推荐的速度会更快。
- en: One of the drawbacks of this method happens when no ratings are provided for
    a particular item; then, it can’t be recommended. And reliable recommendations
    can be tough to get if a user has only rated a few items.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的缺点之一出现在没有为特定项目提供评分的情况下；那么，它就无法被推荐。如果用户只对少数项目进行了评分，那么获得可靠的推荐可能会很困难。
- en: Hybrid Systems
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混合系统
- en: So far, you have seen how content-based and collaborative-based recommendation
    engines work and their respective pros and cons. But the *hybrid recommendation
    system* combines content and collaborative-based filtering methods.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经看到了基于内容和基于协同的推荐引擎是如何工作的，以及它们各自的优缺点。但是，*混合推荐系统*结合了基于内容和基于协同的过滤方法。
- en: Hybrid recommendation systems can overcome the drawbacks of both content-based
    and collaborative-based to form one powerful recommendation system, both the individual
    methods fail to perform well when there is a lack of data to learn the relation
    between users and items, which is overcome in this hybrid approach.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 混合推荐系统可以克服基于内容和基于协同的缺点，形成一个强大的推荐系统，当缺乏数据来学习用户和项目之间的关系时，这两种单独的方法都无法很好地工作，而混合方法可以克服这一点。
- en: Figure [1-5](#Fig5) shows a simple working mechanism of the hybrid recommendation
    system.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图[1-5](#Fig5)展示了混合推荐系统的一个简单工作机制。
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig5_HTML.jpg)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig5_HTML.jpg)'
- en: A flow chart depicts the working mechanism of the hybrid recommendation system.
    It includes two inputs, one with C F-based recommender, the other with a content-based
    recommender, combiner, and R E C O.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图描述了混合推荐系统的工作机制。它包括两个输入，一个基于C F的推荐器，另一个基于内容的推荐器、组合器和R E C O。
- en: Figure 1-5
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-5
- en: Hybrid recommendation system
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 混合推荐系统
- en: Hybrid recommendation engines can be implemented in multiple ways.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 混合推荐引擎可以以多种方式实现。
- en: Generating recommendations separately by using content-based and collaborative-based
    and then combining them at the end
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分别使用基于内容的和基于协作的方法生成推荐，然后在最后将它们结合起来
- en: Adding the capabilities of the collaborative-based method to a content-based
    recommender engine
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将基于协作的方法的功能添加到基于内容的推荐引擎中
- en: Adding the capabilities of the content-based method to a collaborative-based
    recommender engine
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将基于内容的方法的功能添加到基于协作的推荐引擎中
- en: Several studies compare the performance of conventional methods to that of a
    hybrid system, showing that hybrid recommender engines generally perform better
    and provide more reliable recommendations.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 几项研究比较了传统方法与混合系统的性能，表明混合推荐引擎通常表现更好，并提供更可靠的推荐。
- en: ML Clustering
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习聚类
- en: In today’s world, AI has become an integral part of all automation and technology-based
    solutions and the area of recommendation systems is no different. Machine learning-based
    methods are the upcoming high prospective methods that are quickly becoming a
    norm as more and more companies start adapting AI.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，人工智能已成为所有自动化和基于技术的解决方案的组成部分，推荐系统领域也不例外。基于机器学习的方法是即将到来的具有高度前景的方法，随着越来越多的公司开始采用人工智能，它们正迅速成为一种规范。
- en: 'Machine learning methods are of two types: unsupervised and supervised. This
    section discusses the unsupervised learning method, which is the ML clustering–based
    method. The unsupervised learning technique uses ML algorithms to find hidden
    patterns in data to cluster them without human intervention (unlabeled data).
    Clustering is the grouping of similar objects into clusters. On average, an object
    belonging to one cluster is more similar to an object within that cluster than
    to an object belonging to another cluster.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习方法分为两种：无监督和监督。本节讨论无监督学习方法，即基于机器学习聚类的学习方法。无监督学习技术使用机器学习算法在数据中寻找隐藏的模式，以聚类数据而不需要人为干预（未标记数据）。聚类是将相似对象分组的过程。通常，属于一个聚类的对象与该聚类内的对象比与其他聚类的对象更相似。
- en: In recommendation engines, clustering is used to form groups of users similar
    to each other, as shown in Figure [1-6](#Fig6). It can also cluster similar items
    or products as well. Traditionally similarity measures like cosine similarity
    have been used to get similar users or items, but they have their demerits. If
    a user has not rated many items and the resultant user-item matrix is sparse,
    or when you need to compare multiple user-user pairings to find similar users,
    it gets computationally expensive. A clustering-based approach is generally taken
    to get similar users to overcome these issues. If a user is found to be similar
    to a cluster of users, that user is added to that cluster. Within the cluster,
    all users share interests and tastes, and recommendations are provided to users
    based on them.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在推荐引擎中，聚类用于形成彼此相似的用户组，如图 [1-6](#Fig6) 所示。它还可以聚类相似的项目或产品。传统上，使用如余弦相似度等相似性度量来获取相似的用户或项目，但它们有其缺点。如果一个用户对许多项目没有进行评分，并且结果的用户-项目矩阵是稀疏的，或者当你需要比较多个用户-用户配对以找到相似用户时，这会变得计算成本高昂。通常采用基于聚类的方案来获取相似用户以克服这些问题。如果一个用户被发现与一个用户群相似，那么该用户将被添加到该群组中。在群组内，所有用户都有共同的兴趣和品味，并且根据这些兴趣和品味向用户提供推荐。
- en: '![](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig6_HTML.jpg)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537881_1_En_1_Chapter/537881_1_En_1_Fig6_HTML.jpg)'
- en: A pie chart depicts the group-based similarity. It includes clustering to form
    groups of users similar to each other (cluster similar products or items).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 饼图展示了基于群体的相似性。它包括聚类以形成彼此相似的用户组（聚类相似的产品或项目）。
- en: Figure 1-6
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-6
- en: Groups based on behavior
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 基于行为的群体
- en: The following are some of the popularly used clustering algorithms.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些常用的聚类算法。
- en: k-means clustering
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: k-means 聚类
- en: fuzzy mapping
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模糊映射
- en: self-organizing maps (SOM)
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自组织映射（SOM）
- en: a hybrid of two or more techniques
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两种或更多技术的混合
- en: ML Classification
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器学习分类
- en: Again, clustering comes with its disadvantages. That’s where a classification-based
    recommendation system comes into play.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，聚类也有其缺点。这就是基于分类的推荐系统发挥作用的地方。
- en: In classification based, the algorithm uses features of both items and users
    to predict whether a user will like a product or not. An application of the classification-based
    method is the buyer propensity model.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于分类的方法中，算法使用物品和用户的特点来预测用户是否会喜欢某个产品。基于分类方法的一个应用是购买倾向模型。
- en: Propensity modeling predicts the chances of customers buying a particular item
    or any equivalent task. Also, for example, propensity modeling can help predict
    the likelihood that a sales lead will convert to a customer or not based on various
    features. The propensity score or probability is used to take action.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势建模预测客户购买特定商品或任何等效任务的可能性。例如，趋势建模还可以帮助根据各种特征预测销售线索是否会转化为客户。倾向得分或概率用于采取行动。
- en: The following are some of the limitations of classification-based algorithms.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是基于分类算法的一些局限性。
- en: Collecting a combination of data about different users and items is sometimes
    difficult.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收集关于不同用户和物品的组合数据有时很困难。
- en: Classification is challenging.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类具有挑战性。
- en: The problem is training the models in real time.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问题在于实时训练模型。
- en: Deep Learning
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度学习
- en: Deep learning is a branch of machine learning which is more powerful than ML-based
    algorithms and tends to produce better results. Of course, there are limitations,
    like the need for huge data or explainability, which we must overcome.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是机器学习的一个分支，比基于ML的算法更强大，并且往往能产生更好的结果。当然，也存在一些限制，如需要大量数据或可解释性，我们必须克服这些限制。
- en: Various companies use deep neural networks (DNNs) to enhance the customer experience,
    especially if it’s unstructured data like images and text.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 各家公司使用深度神经网络（DNNs）来提升客户体验，尤其是对于非结构化数据，如图像和文本。
- en: The following are three types of deep learning–based recommender systems.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是基于深度学习的三种推荐系统类型。
- en: Restricted Boltzmann
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制性玻尔兹曼机
- en: Autoencoder based
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于自动编码器
- en: Neural attention–based
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于神经注意力的
- en: Later chapters explore how machine learning and deep learning can be leveraged
    to build powerful recommender systems.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 后续章节将探讨如何利用机器学习和深度学习构建强大的推荐系统。
- en: Now that you have a good understanding of the concepts, let’s start with a simple
    rule-based recommender system in this chapter before proceeding to the implementation
    in upcoming chapters.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 既然您已经很好地理解了这些概念，那么在本章中，我们首先从简单的基于规则的推荐系统开始，然后再在接下来的章节中进行实现。
- en: Rule-Based Recommendation Systems
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基于规则的推荐系统
- en: You build these recommendation systems with simple rules, such as popularity-based
    or buy again.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过简单的规则来构建这些推荐系统，例如基于流行度或再次购买。
- en: Popularity
  id: totrans-114
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 流行度
- en: 'A popularity-based rule is the simplest form: a product is recommended based
    on its popularity (most sold, most clicked, etc.). Let’s implement a quick one.
    For example, a song listened to by many people means it’s popular. It is recommended
    to others without any other intelligence being part of it.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 基于流行度的规则是最简单的一种形式：基于产品的流行度（销量最高、点击率最高等）进行推荐。让我们快速实现一个。例如，许多人听过的歌曲意味着它很受欢迎。推荐给其他人时不需要任何其他智能参与。
- en: Let’s take a retail dataset and implement the same logic.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个零售数据集来实现相同的逻辑。
- en: Fire up a Jupyter notebook and import the necessary packages.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 启动一个Jupyter笔记本并导入必要的包。
- en: '[PRE0]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s import the data.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们导入数据。
- en: '**Note** Refer to the data in this book’s data section. Download the dataset
    from the GitHub link of this book.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**  请参考本书的数据部分中的数据。从本书的GitHub链接下载数据集。'
- en: '[PRE1]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
