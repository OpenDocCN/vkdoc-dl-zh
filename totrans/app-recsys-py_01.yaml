- en: Now let’s discuss *buy again*. It’s another simple recommendation simple calculated
    at the customer/user level. You might have seen “Watch again” on streaming platforms.
    It’s the same concept. You know a certain set of actions are done repeatedly by
    a customer, and we recommend the same action next time.
  prefs: []
  type: TYPE_NORMAL
- en: This is very useful in online grocery platforms because customers come back
    and buy the same item again and again.
