- en: Summary
  id: totrans-183
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned about recommender systems—how they work, their
    applications, and the various implementation types. You also learned about implicit
    and explicit types and the differences between them. The chapter also explored
    market basket analysis (association rule mining), content-based and collaborative-based
    filtering, hybrid systems, ML clustering-based and classification-based methods,
    and deep learning and NLP-based recommender systems. Finally, you implemented
    simple recommender systems. Many other complex algorithms are explored in upcoming
    chapters.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了关于推荐系统——它们是如何工作的、它们的用途以及各种实现类型。你还学习了隐式和显式类型以及它们之间的区别。本章还探讨了市场篮子分析（关联规则挖掘）、基于内容的和基于协作的过滤、混合系统、基于机器学习的聚类和分类方法，以及基于深度学习和自然语言处理的推荐系统。最后，你实现了简单的推荐系统。在接下来的章节中，将探索许多其他复杂的算法。
