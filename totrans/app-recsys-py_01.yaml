  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now that we cleaned up the data, let’s do some basic types of recommendation
    systems. These are not intelligent yet effective in some cases. Popularity-based
    recommendation systems could be a trending song. It could be a fast-selling item
    required for everyone, a recently released movie that gets traction, or a news
    article many users have read.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们清理了数据，让我们做一些基本的推荐系统类型。这些系统目前还不是智能的，但在某些情况下是有效的。基于受欢迎程度的推荐系统可能是一首热门歌曲。它可能是一个每个人都需要的快速销售的商品，一部受到关注的最新电影，或者一篇许多用户都阅读的新闻文章。
- en: Sometimes it’s important to keep it simple because it gets you the most revenue.
    Let’s build a popularity-based system in the data we are using.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候保持简单很重要，因为它能带来最多的收入。让我们在所使用的数据中建立一个基于受欢迎程度的系统。
