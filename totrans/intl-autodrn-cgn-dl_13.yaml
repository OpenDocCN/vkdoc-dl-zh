- en: 13. Further Considerations
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 13. 进一步考虑
- en: 'Now that you have learned about and built your own AI-enabled rover, it may
    be tempting to jump right in and perform the catacomb mission. However, the adage
    of crawling before you walk, walking before you run is applicable. The last thing
    you would want is to perform the mission and fail to return. Thus, testing the
    rover is appropriate. This chapter covers the following topics:'
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了并构建了自己的AI赋能漫游车，你可能想直接进行地下墓穴任务。然而，“先爬行再走路，先走路再奔跑”的谚语是适用的。你最不希望的事情就是在任务中失败并无法返回。因此，测试漫游车是合适的。本章涵盖了以下主题：
- en: Investigating and locating the cause of an accident with a land-based drone
  id: totrans-2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调查和定位地面无人机事故的原因
- en: Understanding the future of unmanned systems and artificial intelligence
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解无人系统和人工智能的未来
- en: Understanding how unmanned systems can build a better tomorrow
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解无人系统如何构建更美好的明天
- en: Designing Your First Mission
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设计你的第一个任务
- en: 'The following are the test missions under controlled conditions that you should
    perform with your rover:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在控制条件下你应该使用你的漫游车执行的测试任务：
- en: Manual control
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动控制
- en: A simple corridor on flat terrain
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平坦地形上的简单走廊
- en: Complex-shaped corridor with uneven terrain
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地形不平的复杂形状走廊
- en: Complex corridor with uneven terrain and obstacles
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复杂的走廊，地形不平，有障碍物
- en: Additional testing as required
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据需要进行的额外测试
- en: Each of these missions will allow for isolating and testing specific functions
    of the rover. Conducting these tests will reduce the risk of a failed mission,
    as errors in programming, design, build, and other unknown factors can be corrected.
    Each of these testing missions should be performed in an open area. This allows
    for the rover to be recovered or aborted in the event of an issue.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 每个这些任务都将允许隔离和测试漫游车的特定功能。进行这些测试将降低任务失败的风险，因为编程、设计、构建和其他未知因素中的错误可以得到纠正。每个这些测试任务都应该在开阔区域进行。这允许在出现问题时回收或中止漫游车。
- en: Manual Control
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 手动控制
- en: This mission is straightforward and is only applicable if you have installed
    a remote-control receiver on the vehicle. Simply put, drive the rover around.
    Test out all of the drive controls of the vehicle. We call this a controllability
    assessment. By going forward, reversing, and turning left and right you will be
    able to identify if there are any issues in the wiring of the rover.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这个任务很简单，仅适用于你在车辆上安装了遥控接收器的情况。简单来说，就是驾驶漫游车。测试车辆的驾驶控制。我们称之为可控性评估。通过前进、后退和左右转弯，你可以识别出漫游车电路中是否存在任何问题。
- en: Simple Corridor on Flat Terrain
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平坦地形上的简单走廊
- en: This mission will test the sensors and the AI. Create a straight corridor out
    of cardboard, or use a hallway. Using the interface program, command the rover
    to start at one end of the hallway and maneuver to the end of the hallway. This
    mission tests out the ability of the drive system and the AI to work together.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这次任务将测试传感器和人工智能。用纸箱制作一个直走廊，或者使用走廊。使用界面程序，命令漫游车从走廊的一端开始，操纵到走廊的另一端。这个任务测试了驱动系统和人工智能协同工作的能力。
- en: Complex-shaped Corridor with Uneven Terrain
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 地形不平的复杂形状走廊
- en: This mission will further test the sensors and the AI. Using the corridor you
    created for the previous mission, add cardboard to the sides to create an uneven
    boundary wall and uneven terrain. The cardboard added to the walls needs to vary,
    allowing for twists and turns. This can be in the form of carpeting, ramps, and
    so on. Once again, program the rover to start at one end and maneuver to the other.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这次任务将进一步测试传感器和人工智能。使用之前任务中创建的走廊，将纸箱添加到两侧以创建不规则的边界墙和不平的地形。添加到墙上的纸箱需要多样化，以便有转弯和曲折。这可以是以地毯、斜坡等形式。再次，编程使漫游车从一端开始，操纵到另一端。
- en: Complex Open Corridor with Uneven Terrain and Obstacles
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 地形不平、有障碍物的复杂开放式走廊
- en: This last testing mission integrates the rover's many issues in the catacombs.
    Modify the corridor you created for the previous mission with further twists and
    turns and add more complex terrain. This mission also incorporates obstacles that
    the rover will have to maneuver around. Place objects in the way of the rover.
    Once again, program the rover to start at one end and maneuver to the other. The
    success of this final mission means you have a fully functional rover!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 最后的测试任务将整合探测车在地下墓穴中的许多问题。修改您为上一任务创建的走廊，增加更多的转弯和更复杂的地面。此任务还包含探测车必须绕过的障碍物。放置一些阻碍探测车的物体。再次，编程探测车从一端开始，移动到另一端。此最终任务的成功意味着您拥有一个完全功能的探测车！
- en: Additional Testing as Required
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 根据需要进行的额外测试
- en: Additional testing may be warranted if you have opted to install different sensors.
    Test each additional sensor individually. This will allow you to isolate any issues
    that might arise. If there is a problem, conducting all of these tests at once
    will make it difficult to separate the specific sub-system that is causing the
    issue.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您选择了安装不同的传感器，可能需要进行额外的测试。单独测试每个额外的传感器。这将允许您隔离可能出现的任何问题。如果有问题，同时进行所有这些测试将使确定导致问题的特定子系统变得困难。
- en: What to Do if the AI Rover Crashes
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如果AI探测车发生故障怎么办
- en: There are many issues the rover might encounter that could cause the system
    to crash. A crash can consist of a software crash or a physical crash into an
    obstacle. We rely on a system of elements to work together without a human in
    the loop to take control to prevent a collision. The key is to collect data from
    a crash to build a better AI-enabled rover. Some problems can be corrected in
    the software. Others are hardware related. For instance, if one of the drive motors
    fails, then the rover will drive in a circle. If the system crashes, then we need
    to analyze the data to pinpoint the problem.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 探测车可能会遇到许多问题，这些问题可能导致系统崩溃。崩溃可能包括软件崩溃或撞到障碍物的物理崩溃。我们依赖于一个元素系统协同工作，无需人类介入来控制以防止碰撞。关键是收集有关崩溃的数据，以构建更好的AI探测车。一些问题可以在软件中纠正。其他问题是硬件相关的。例如，如果其中一个驱动电机失效，那么探测车将沿圆形行驶。如果系统崩溃，那么我们需要分析数据以确定问题。
- en: The Pixhawk autopilot automatically creates a log file and is stored in non-volatile
    memory. This can be downloaded from the autopilot and loaded into the open-source
    Mission Planner software or other software designed to analyze the logs to isolate
    the problem. Both automated log scanning and manual log scanning will allow you
    to troubleshoot the issues. This troubleshooting covers the primary drive system.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Pixhawk自动驾驶仪会自动创建日志文件，并将其存储在非易失性存储器中。可以从自动驾驶仪中下载该日志文件，并将其加载到开源任务规划器软件或其他用于分析日志以隔离问题的软件中。无论是自动日志扫描还是手动日志扫描，都将允许您排查问题。此故障排除涵盖了主要驱动系统。
- en: Mission Ideas
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 任务想法
- en: The mission this book centers on is exploring an unexplored catacomb in Egypt.
    This is not the only mission you could program your AI rover to perform. The following
    sections provide a few examples of missions you could perform with your rover.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 本书所关注的任务是探索埃及的一个未探索过的地下墓穴。这并不是您可以为您的AI探测车编程的唯一任务。以下各节提供了一些您可以使用探测车执行的任务的示例。
- en: Zombie Hunter
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 亡灵猎人
- en: In this mission, you will program your AI-enabled rover to identify the undead
    in a desolate wasteland and map their locations using your newfound Geographic
    Information System (GIS) skills. To perform this mission, the rover’s AI must
    use the sense-and-avoid system to identify zombies from humans. Specifically,
    you must train the AI to classify humans from zombies, and then log their location
    in the GIS software. To confirm your programing is successful, print out small
    images of zombies and humans no taller than the rover itself and set these up
    throughout your corridor. Start your mission at one end. Your task will be successful
    if your rover makes it to the end of the corridor and correctly identifies and
    maps the zombies and humans.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个任务中，您将编程您的AI探测车识别荒凉废墟中的亡灵，并使用您新获得的地理信息系统（GIS）技能绘制他们的位置。为了执行此任务，探测车的AI必须使用感知和避免系统来识别僵尸和人类。具体来说，您必须训练AI将人类与僵尸分类，并在GIS软件中记录他们的位置。为了确认您的编程成功，打印出不超过探测车本身高度的僵尸和人类的小图像，并将它们设置在整个走廊中。从一端开始您的任务。如果您的探测车到达走廊的另一端并正确识别并绘制了僵尸和人类，则您的任务将成功。
- en: Home Delivery
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 家庭送货
- en: This mission is as simple as it sounds. The rover is programmed to use its SLAM
    sensors to deliver a payload to other areas of your house. One consideration with
    this mission is the payload capacity of the rover. Exceeding this capacity will
    lead to a reduced range or overall mission failure.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这个任务听起来很简单。漫游车被编程使用其SLAM传感器将有效载荷运送到你家的其他区域。这个任务的一个考虑因素是漫游车的有效载荷容量。超过这个容量将导致范围减少或整个任务失败。
- en: Home Security
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 家庭安全
- en: For this mission, you program the rover to patrol your house. For any detected
    motion, the rover could trigger an alarm and record images and/or video. You will
    need to consider thresholds of activity to prevent false positives.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个任务，你编程漫游车在你的房子周围巡逻。对于任何检测到的运动，漫游车可以触发警报并记录图像和/或视频。你需要考虑活动阈值以防止误报。
- en: Other Missions
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他任务
- en: Your AI rover can be used for many different missions. Your imagination is the
    only limiting factor. Continue to use the testing and evaluation methods to confirm
    your system is programmed and fully operational before trying a live mission.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你的AI漫游车可以用于许多不同的任务。你的想象力是唯一的限制因素。在尝试实际任务之前，继续使用测试和评估方法来确认你的系统已经编程并且完全运行。
- en: Like It or Not, We Now Live in the Age of Skynet
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 喜欢与否，我们现在生活在赛博坦时代
- en: Technology is rapidly advancing. What was once thought of as science fiction
    is quickly becoming a reality. In 1865, Jules Verne’s science fiction novel *From
    the Earth to the Moon* spoke of launching humans to the moon via a cannon. Little
    did he know that 104 years later, humans would actually land on the moon. Today,
    we have rovers and unmanned aircraft systems (UAS) on Mars, *Voyager* venturing
    outside of the solar system, and telescopes on Earth and in space that can gather
    massive amounts of data. Science fiction is quickly becoming a reality in many
    industries. We have self-driving cars, access to robots for all sorts of applications,
    and access to collective knowledge via the internet. Could Skynet be created and
    the doomsday scenario it presents in the Terminator franchise come to be? The
    answer is yes, it is quite possible. It is up to AI designers and programmers
    to prevent this from happening.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 技术正在迅速发展。曾经被认为是科幻的东西正在迅速成为现实。在1865年，儒勒·凡尔纳的科幻小说《从地球到月球》讲述了通过大炮将人类送上月球的故事。他不知道104年后，人类实际上已经登陆月球。今天，我们在火星上有漫游车和无人员驾驶飞行系统（UAS），*旅行者号*正在太阳系外探险，地球和太空中有望远镜可以收集大量数据。科幻正在许多行业中迅速成为现实。我们有自动驾驶汽车，可以访问各种应用的机器人，以及通过互联网访问集体知识。赛博坦能否被创造出来，以及它在终结者系列电影中提出的末日场景能否成为现实？答案是肯定的，这是完全可能的。防止这种情况发生取决于AI设计师和程序员。
- en: Future Battlefields and Skies Will Have Unmanned Systems
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来战场和天空将会有无人系统
- en: Since the creation and adoption of unmanned systems on the battlefield, many
    in the defense industry have been researching and developing systems that can
    push the envelope further. UAS used to be used solely for intelligence, surveillance,
    and reconnaissance. They are piercing the fog of war with myriad sensors. This
    gives battlefield commanders and soldiers real-time access to the battlefield.
    They are allowing for decisions to be made to win the conflict. Other robotic
    systems have been in development. One rover system called the Multi-Function Utility/Logistics
    and Equipment Vehicle (MULE) was designed with three variants. The variants of
    this MULE were transport, countermine, and light assault. This program was ultimately
    canceled by the military, yet highlights the fact that robotic systems can serve
    on the battlefield in many different ways. Uncrewed robotic systems serve a need
    from air, sea, and ground. This need is to remove the human element from danger.
    If an uncrewed robotic tank gets destroyed in battle, the loss is of the monetary
    value of the tank, not the human piloting the tank. All the training and experience
    gathered by the talk operator is not lost. All they need to do is connect to another
    tank and keep fighting. Battles of the future would not be as costly in terms
    of life, but instead in monetary value. The winner of these battles will be those
    that have a deep manufacturing base that can keep producing these robotic systems,
    as well as logistics and repair locations to support those that are in battle.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 自从战场上的无人系统被创造和采用以来，国防工业中的许多人一直在研究和开发能够进一步突破边界的系统。无人机曾经仅用于情报、监视和侦察。它们通过众多传感器穿透战争的迷雾。这使得战场指挥官和士兵能够实时访问战场。他们允许做出赢得冲突的决定。其他机器人系统也在开发中。一个名为多功能通用/后勤和装备车辆（MULE）的漫游系统设计了三种变体。这种MULE的变体包括运输、反地雷和轻型突击。这个项目最终被军方取消，但突出了机器人系统可以在战场上以许多不同的方式服务的这一事实。无人驾驶的机器人系统从空中、海上和地面满足需求。这种需求是消除危险中的人类因素。如果一个无人驾驶的坦克在战斗中被摧毁，损失的是坦克的货币价值，而不是驾驶坦克的人。所有由驾驶员收集的训练和经验都没有丢失。他们只需要连接到另一辆坦克并继续战斗。未来的战斗在生命损失方面不会那么昂贵，而是货币价值。这些战斗的胜利者将是那些拥有深厚制造基础并能持续生产这些机器人系统，以及后勤和维修地点以支持那些在战斗中的人。
- en: Necessary Countermeasures
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 必要的对抗措施
- en: The development of a new technology produces a counter-industry. A perfect case
    in point is personal computers. These systems became affordable in the 1980s and
    1990s, and coupled with ease of access to the internet, hackers and those with
    ill intent created viruses and malware. To protect users, a new industry was born,
    one that constantly battles viruses and protects computer systems from hackers.
    As soon as the antivirus software has identified, blocked, and removed a virus,
    a new one is written, or a new exploit is found. This has been a constant battle
    and one that will most likely never end!
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 新技术的发展产生了一个反产业。一个完美的例子是个人电脑。这些系统在20世纪80年代和90年代变得可负担，并且随着互联网的易于访问，黑客和那些有恶意的人创造了病毒和恶意软件。为了保护用户，一个新的产业诞生了，这个产业不断与病毒作斗争，保护计算机系统免受黑客攻击。一旦防病毒软件已经识别、阻止和删除了病毒，就会编写一个新的病毒，或者发现一个新的漏洞。这已经是一场持续的战斗，而且很可能会永远没有结束！
- en: Countermeasures for all unmanned systems are being developed and deployed. The
    current hot zone in this counter-industry is with aircraft systems. It was quickly
    realized that anyone could fly these systems into sensitive or restricted areas;
    for instance, the White House, military bases, power plants, etc. Thus, a counter-industry
    was born.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 正在开发和部署针对所有无人系统的对抗措施。在这个反产业中，当前的热点领域是飞机系统。很快人们就意识到任何人都可以将这些系统飞入敏感或受限区域；例如，白宫、军事基地、发电厂等。因此，一个反产业诞生了。
- en: 'The counter-UAS industry is looking at many different ways of stopping or identifying
    UAS. Some of the many systems being developed or deployed are listed here:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 反无人机产业正在寻找许多不同的方法来阻止或识别无人机。以下列出了正在开发或部署的许多系统：
- en: Radar identification and localization
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 雷达识别和定位
- en: Acoustic identification and localization
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 声学识别和定位
- en: Infrared identification
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 红外识别
- en: Combination of identification sensors
  id: totrans-47
  prefs:
