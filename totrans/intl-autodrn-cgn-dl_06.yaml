  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic of the LiDAR sensor. At the top, a box highlights the distance 0.7486084699630737\.
    Below it is the catacomb which has a cylindrical object and highlights the A I
