- en: 'Next, we design, develop, test, verify, and validate the motion-planning, navigation,
    and map-creating script files using the simulated worlds in the `ai_rover_worlds`
    directory. We want to expand the `catkin_ws` directory to include intelligent
    control scripts, such as laser scan data extraction, to control the AI rover’s
    differential drive. Our goal is to create the following directory tree for the
    `catkin_ws` workspace:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Enter the following Linux terminal commands to create the directory tree listing
    for the `catkin_ws` workspace:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Create the `catkin` ROS package `Motion_Planning_Navigation_Goals` using the
    following Linux terminal commands:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Let us quickly review the ROS package dependencies. The `rospy` package is a
    Python client library for ROS, allowing programmers to access the ROS control
    libraries. However, the `rospy` library is not computationally efficient. Instead,
    the library allows the programmer to quickly and efficiently develop ROS applications.
  prefs: []
  type: TYPE_NORMAL
- en: The `std_msgs` dependency develops standard publisher/subscriber ROS messages,
    including common data types. These data types include float and double built-in
    data types and user-defined data types, such as the deep learning neural network
    or multi-arrays for geospatial processing.
  prefs: []
  type: TYPE_NORMAL
- en: The `geometry_msgs` dependency provides messages for geometric elements (points,
    vectors, and poses). The `geometry_msgs` offer standard functions, such as `twist`.
    The `twist` function describes an element’s linear and angular velocities for
    both subscribers and publishers. The differential drive plug-in uses these velocities.
    We need this `geometry_msgs` dependency to communicate the Python autonomous program’s
    linear and angular velocities to control the rover’s differential drive.
  prefs: []
  type: TYPE_NORMAL
- en: The `sensor_msgs` dependency provides sensor messages, such as cameras and range-finding
    laser scanners. This dependency allows for information exchange from both the
    publishers (sensors) and subscribers (Python autonomous programs). These sensor
    messages influence the Python autonomous programs to vary the differential drive
    plug-in’s linear and angular velocities. For more information on the LiDAR’s laser
    pipeline stacks, please refer to [`http://wiki.ros.org/sensor_msgs`](http://wiki.ros.org/sensor_msgs).
  prefs: []
  type: TYPE_NORMAL
- en: Laser Range-Finding Filter Settings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Set the LiDAR sensor settings to the values shown in Table [6-1](#Tab1) in the
    LiDAR sensor section of the `ai_rover_gazebo_plug-in.xacro` file.
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-1
  prefs: []
  type: TYPE_NORMAL
- en: LiDAR-Specific Program Settings
  prefs: []
  type: TYPE_NORMAL
- en: '| XML Setting | Value | Definition |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `<update_rate>` | 20 | Controls the sample rate (speed) of the laser data
    capture rate |'
  prefs: []
  type: TYPE_TB
- en: '| `<samples>` | 1440 | How many samples for one LiDAR range sweep [`minAngle..maxAngle`]
    |'
  prefs: []
  type: TYPE_TB
- en: '| `<frameName>` | `sensor_laser` | Virtual link between LiDAR sensor and chassis
    |'
  prefs: []
  type: TYPE_TB
- en: Verify the program values fall within the LiDAR sensor’s actual physical specifications.
    The Gazebo simulator creates a more realistic LiDAR sensor with these values.
  prefs: []
  type: TYPE_NORMAL
- en: 'After saving these values, determine if the updates were successful by executing
    the following in one window:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'And execute the following in a second window:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Once we have executed these commands, we can control the AI rover displayed
    in a simulation using the keyboard. Next, we will develop a Python script code
    to process and display the LiDAR sensor data.
  prefs: []
  type: TYPE_NORMAL
- en: Laser Range-Finding Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will create our Python script within the `catkin_ws` workspace `Motion_Planning_Navigation_Goals`
    ROS package. This script will retrieve data from the `/ai_rover_remastered/laser_scan/scan`
    topic. Create the following Python script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: The `touch` command creates a file within directories without launching an application,
    such as a word processor or a development environment. The created files are empty.
    To create content, the appropriate application must be launched. The `chmod` command
    makes the `read_Lidar_data.py` file executable via `rosrun`.
  prefs: []
  type: TYPE_NORMAL
- en: Enter the script found in Listing [6-2](#PC13).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The `clbk_laser` function passes the `msg` argument to `min(min(msg.ranges[xxxx:yyyy]),
    10)`, which then reads the data for each of the ten LiDAR sensor sectors, guaranteeing
    a maximum value of 10 meters. It converts the 1,440 samples into ten aggregated
    sectors. Each sector returns the minimum value from the samples or caps the value
    at 10 meters (LiDAR max range). The minimum value is the distance to the obstacle
    closest to the AI rover in that sector. Each sector is 36 degrees in coverage
    (36° x 10 = 360°). As such, the AI rover has no “blind spots” during its continuous
    LiDAR sensor sweep. Because the AI rover has no blind spots, it can also travel
    backward if necessary. Figure [6-5](#Fig5) is the orientation layout of the LiDAR
    sensor.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A layout of the LiDAR sensor orientation. There is a square and at the top corners
    are two rectangular objects. Between them is a large circle and below it is a
    small circle. The arrows from large circle point toward degrees. 0 or 360, 90,
    180, and 270 degree.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-5
  prefs: []
  type: TYPE_NORMAL
- en: LiDAR sensor orientation and layout
  prefs: []
  type: TYPE_NORMAL
- en: The larger solid black circle in the center of Figure [6-5](#Fig5) is the LiDAR
    sensor. The smaller solid black circle toward the bottom of Figure [6-5](#Fig5)
    is the caster wheel. The LiDAR sweep begins at 180° and then ends at 180°. The
    red arrow is the propagating LiDAR laser beam.
  prefs: []
  type: TYPE_NORMAL
- en: 'To run our program `read_Lidar_data.py`, add the following main test driver
    found in lines 23–32\. The source code contained within `main()` performs the
    following functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**rospy.init_node(‘read_Lidar_data’)**: Attaches to ROS.'
