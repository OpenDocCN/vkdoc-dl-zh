- en: '| 3 | 0011 |   |   | < 1 m | < 1 m | Soft Left |'
  id: totrans-199
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 0011 |   |   | < 1 m | < 1 m | 软左 |'
- en: '| 4 | 0100 |   | < 1 m |   |   | Soft Right |'
  id: totrans-200
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 0100 |   | < 1 m |   |   | 软右 |'
- en: '| 5 | 0101 |   | < 1 m |   | < 1 m | Hard Left |'
  id: totrans-201
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 0101 |   | < 1 m |   | < 1 m | 硬左 |'
