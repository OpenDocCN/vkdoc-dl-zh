- en: Obstacle Sense-and-Avoidance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section bridges the information presented in Chapters [1](494112_1_En_1_Chapter.xhtml)
    through [5](494112_1_En_5_Chapter.xhtml) (manual control) with the remaining chapters
    (intelligent autonomous control). We now take our first steps toward developing
    an autonomous rover; i.e., it makes its own decisions through the maze. It achieves
    this through a simple control algorithm. The control algorithm sends commands
    to the actuators/motors.
  prefs: []
  type: TYPE_NORMAL
- en: 'Organize the control algorithm folder directories as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'This creates an empty `sense_avoid_obstacle.py` file in the `scripts` directory.
    The following is the tree structure of listing files and folder directories:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Now that we have an understanding of our tree-structure organization, we must
    return our attention to the source code contained within the `sense_avoid_obstacle.py`
    ROS program node. Listing [6-3](#PC18) provides this source code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Source Code Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are ten functions defined within this program, including six for wheel
    movement. The last function (`main` 108–119) is similar to the other versions
    of the `main` previously discussed in the `read_Lidar_data.py` program. We will
    ignore lines of code that are repeated from previous iterations.
  prefs: []
  type: TYPE_NORMAL
- en: We will now define the following contents of the `main` function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lines 13–25\. Retrieves data from the LiDAR sensor arcs, capping them at a
    maximum of 10 meters. For instance, `''sectorA'': min(min(msg.ranges[0:143]),
    10)` grabs the smallest value from all 144 data samples from the first arc, SectorA,
    and then caps that at 10\. So, if all 144 data samples are greater than 10, SectorA
    will be assigned the value of 10\. For more information about the interpretation
    of the LiDAR data, refer to the “Interpreting the LiDAR” section in this chapter.
    Additionally, review the `read_Lidar_data.py` program in “Laser Range Finding
    Data.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lines 26–27\. Saves values to log file and then calls `sense_and_avoid` (line
    94)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lines 28–70\. These similar-looking functions just set the linear velocity in
    the x-axis (how fast we are going forward) and the angular velocity in the z-axis
    (how fast we turn). For instance, if there are objects in the right quadrant,
    we can turn left at a relatively slow speed. If there are objects directly in
    front of us, we want to quickly turn in another direction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note 1
  prefs: []
  type: TYPE_NORMAL
- en: When we turn, there is no forward momentum. We either move forward or we turn,
    not both. This makes coding a lot easier.
  prefs: []
  type: TYPE_NORMAL
- en: Note 2
  prefs: []
  type: TYPE_NORMAL
- en: 'The turning command is how fast we turn in a given direction, not a target
    angle. The sensor readings happen approximately 10 times per second. Therefore,
    if we tell the rover to turn at a rate of 45° per second, the rover will have
    turned only 4.5° when a new sensor reading takes place. This new reading overrides
    the previous `Twist()` command: 1) This is why we use “soft” and “hard” turns.
    2) This can and will cause an infinite loop, where the rover turns back and forth.
    We will talk about and review a control systems solution to this issue in the
    Chapter [5](494112_1_En_5_Chapter.xhtml) “Summary” section.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking the next section of code out of order:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of four sensors labeled 8, 4, 2, and 1, with sectors and bits.
    Sensor 8 consists of sector G and 0 b x 000 bit, sensor 4 consists of sector F
    and 0 b 0 x 00, sensor 2 consists of sector E and 0 b 00 x 0, and sensor 1 consists
    of sector D and 0 b 000 x.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-9
  prefs: []
  type: TYPE_NORMAL
- en: Bit location encoding for each forward sector
  prefs: []
  type: TYPE_NORMAL
- en: Lines 74–99\. This section encodes the four sensors. Initially, we assume there
    are no close objects (set `bitVar` to `0b0000`). If an object is close (sector
    value < 1m), we set the appropriate bit in `bitVar` to `1`. As illustrated in
    Figure [6-9](#Fig9), if there is an object in Sector E, we “flip” the SectorE
    bit (`0b00x0`), where the bit in the second location is changed. This is the “2’s”
    place, hence the bit-or bitVar = bitVar | 2; flips the “2’s” place (See Figure
    [6-9](#Fig9)). For more information regarding the `sense_and_avoid` function please
    refer to the “Sensing and Avoiding Obstacles” section.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: This is not our first iteration of this piece of code. After our first iteration,
    we recognized that the sixteen different cases represented by the four sensors
    (D, E, F, and G) only resulted in six possible outcomes (`Forward, Soft_Left,
    Hard_Left, Hard_Right, Soft_Right,` and `Retreat`). Furthermore, encoding the
    four sectors into a single 4-bit variable sped up the code tremendously. This
    code rewriting is called *refactoring*.
  prefs: []
  type: TYPE_NORMAL
- en: Lines 52–72\. With the encoded `bitVar`, we can do a quick “dictionary” lookup
    of the appropriate rover movement. The movement decision is based on the location
    of nearby objects encoded in “arguments.” Line 125 passes the encoded `bitVar`
    to switch_movement_options(arguments), and this chooses the “correct” direction
    to move.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interpreting the LiDAR Sensor Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The callback function, `msg_Lidar_laser`, handles information and messages from
    the LiDAR sensor for the subscriber defined in the main function (line 112). The
    `msg_Lidar_laser` function partitions the LiDAR sensor sweep messages into ten
    equally spaced 36-degree sectors for the AI rover. The LiDAR sends 1,440 laser
    pulses every revolution. Every pulse is a ray originating from the LiDAR and going
    to infinity UNLESS the ray encounters an obstruction. The pulse reflects the LiDAR,
    and, based on the return time, the distance to the obstruction is calculated.
    All 1,440 data points are sent by the LiDAR as an event that the `msg_Lidar_laser`
    is listening for and are processed into the ten equally spaced sectors.
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of having ten equally spaced 36-degree sectors is to cover one entire
    revolution around the AI rover. This allows the AI rover to “see” and travel in
    any required direction, including forward, left, right, and backward. Traveling
    in any direction allows the AI rover to navigate and avoid obstacles and cave-ins
    within the Egyptian catacombs.
  prefs: []
  type: TYPE_NORMAL
- en: Sensing and Avoiding Obstacles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `sense_and_avoid` function is a simple finite state machine (FSM) implementing
    simplistic behavior (see Figure [6-10](#Fig10)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A decision diagram. There is a double headed arrow between turn completed and
    forward at the top and bottom, respectively. The flow is in upward direction from
    the forward to the turn completed through hard left, soft left and reverse on
    the left, and soft right and hard right on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-10
  prefs: []
  type: TYPE_NORMAL
- en: Decision finite state machine showing different turning decisions
  prefs: []
  type: TYPE_NORMAL
- en: 'When developing a complex system, such as an intelligent drone, approach the
    solution in small, incremental steps. To simplify our decision-making choices
    about turning, we are only going to use the front four sectors’ data; i.e., sectors
    D, E, F, and G. This sensor data is used to determine if objects exist in our
    path that are less than one meter away. These four sectors make sixteen combinations
    that determine the direction the rover will go. There are only six possible directions:
    forward, soft left, soft right, hard left, hard right, and turn around (see Figure
    [6-11](#Fig11)). (If the “front six” sectors were used for the decision-making,
    we would have 64 combinations! Much more complex!)'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A schematic of the forward-facing sectors of LiDAR sensor. The sectors are labeled
    c to h. The directions from bottom left to bottom right are as follows. Positive
    pi over 2; front, center, left; front, left; 0, positive negative 2 of pi; front,
    right; front, center, right; and negative pi over 2.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-11
  prefs: []
  type: TYPE_NORMAL
- en: Forward-facing sectors are used to decide the next move
  prefs: []
  type: TYPE_NORMAL
- en: 'Each of the four forward-facing sectors returns the distance of the nearest
    object in that sector. As can be seen in Table [6-3](#Tab3), we encode the results
    in `bitVar`. For example, SectorG might return the value `10`. That means the
    object is 10 meters away and not of immediate concern. Assume that SectorF and
    SectorE are similarly large numbers and no danger. Let us say that SectorD returns
    0.9\. This object is less than 1m away and a possible hazard that we should avoid.
    Testing whether each returned value is less than one (i.e., SectorG < 1) returns
    a `true` or a `false`. In this example, values returned by SectorG, SectorF, and
    SectorE are large, and the comparison will return `false`. In contrast, SectorD’s
    comparison will return `true`. The four comparisons are `false, false, false,
    true`, which can be encoded as `bitVar = 0001`. Interpreting Table [6-3](#Tab3):
    If a cell is blank, the nearest object in that direction is far away and of no
    immediate danger. If the cell has “< 1m,” then an object is very close and should
    be avoided.'
  prefs: []
  type: TYPE_NORMAL
- en: Table 6-3
  prefs: []
  type: TYPE_NORMAL
- en: Decision Table Using the Four Forward Sectors to Choose One of Six Decisions.
    Blank Cell Indicates No Nearby Object Detected in Those Sectors
  prefs: []
  type: TYPE_NORMAL
- en: '| Case | bitVar | SectorG | SectorF | SectorE | SectorD | Decision |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 0 | 0000 | No nearby objects * | Forward |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | 0001 |   |   |   | < 1 m | Soft Left |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | 0010 |   |   | < 1 m |   | Soft Left |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | 0011 |   |   | < 1 m | < 1 m | Soft Left |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | 0100 |   | < 1 m |   |   | Soft Right |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | 0101 |   | < 1 m |   | < 1 m | Hard Left |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | 0110 |   | < 1 m | < 1 m |   | Hard Left |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | 0111 |   | < 1 m | < 1 m | < 1 m | Hard Left |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | 1000 | < 1 m |   |   |   | Soft Right |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | 1001 | < 1 m |   |   | < 1 m | Forward |'
  prefs: []
  type: TYPE_TB
- en: '| 10 | 1010 | < 1 m |   | < 1 m |   | Hard Right |'
  prefs: []
  type: TYPE_TB
- en: '| 11 | 1011 | < 1 m |   | < 1 m | < 1 m | Turn Around |'
  prefs: []
  type: TYPE_TB
- en: '| 12 | 1100 | < 1 m | < 1 m |   |   | Soft Right |'
  prefs: []
  type: TYPE_TB
- en: '| 13 | 1101 | < 1 m | < 1 m |   | < 1 m | Turn Around |'
  prefs: []
  type: TYPE_TB
- en: '| 14 | 1110 | < 1 m | < 1 m | < 1 m |   | Hard Right |'
  prefs: []
  type: TYPE_TB
- en: '| 15 | 1111 | < 1 m | < 1 m | < 1 m | < 1 m | Turn Around |'
  prefs: []
  type: TYPE_TB
- en: Formally, the rover’s speed and direction are called the linear velocity and
    angular rotation in the rover’s internal coordinate system. The linear velocity
    is expressed along the x-axis (red), and the angular rotation is about the z-axis
    (blue), as shown in Figure [6-12](#Fig12). Since we are using a rover and assuming
    flat ground at this time, the system reduces to 2D. After removing the “flat ground”
    assumption, our model will become more complex. But that is for a later chapter.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: An illustration of the rover's internal coordinate system. The x-axis forward
    is the linear velocity, y-axis, and the z-axis turn is the angular rotation.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-12
  prefs: []
  type: TYPE_NORMAL
- en: X-, y-, and z-axes are relative to the rover
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two types of angular velocity: orbital and spin. For example, the
    Earth orbits the sun; i.e., the Earth rotates around an external point (sun).
    The Earth also spins about the north/south pole axis; i.e., the Earth rotates
    around an internal point. We use `Twist()` (line 96) to send the spin angular
    velocity to the AI rover. This causes the AI rover to rotate around the internal
    z-axis.'
  prefs: []
  type: TYPE_NORMAL
- en: Another way of looking at orbital angular velocity (OAV) versus spin angular
    velocity (SAV) is the point of view. OAV is observed from outside the rover; i.e.,
    it interacts with multiple objects in the universe. The OAV for the Earth/sun
    combination is 365 days, while the OAV of the moon/Earth orbit is 28 days. OAV
    depends on other objects. On the other hand, SAV is an internal attribute. The
    SAV of the Earth is 24 hours. It does not change concerning other objects. Thus,
    we say the SAV is independent of the observer, whereas OAV is dependent.
  prefs: []
  type: TYPE_NORMAL
- en: When we control the rover, we are using SAV. In other words, if we want to turn
    right 45°, we inform ROS to turn the rover 45°. But remember, ROS uses radians
    instead of degrees when calculating angles. Angular velocities are expressed as
    radians per second, where one radian is equal to an angle at the center of the
    circle whose arc is equal to the radius. From our internal perspective, if we
    “turn left,” we pass a positive value. If we “turn right,” we pass a negative
    value. So our “turn left 45°” becomes “turn left π/4.”
  prefs: []
  type: TYPE_NORMAL
- en: Executing the Avoidance Code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Execute the following Linux terminal commands in one opened terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Then, execute the following Linux terminal commands in a second terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Our rover now avoids simple obstacles, such as the support column. But this
    avoidance algorithm is not very smart! It only uses four specific sectors, and
    each avoidance decision was explicitly chosen by the programmer. What if the programmer
    did not understand all the possible situations and all the possible decisions?
    What if the actual world is so sophisticated that four sectors do not supply enough
    information to always make the correct decision?
  prefs: []
  type: TYPE_NORMAL
- en: Using an artificial intelligence deep learning system (DLS) will allow the AI
    rover to have evolutionary and adaptive behaviors. The use of these advanced methods
    eliminates the programmer’s need to explicitly program all of these behaviors
    and decisions with a finite-state machine (FSM). To achieve these behaviors we
    replace the FSM with a DLS. For example, in Figure [6-13](#Fig13), the FSM-based
    rover may get stuck in the corner because of the collapsed wall. The DLS AI rover
    should be able to intelligently escape the collapsed wall. We will add the DLS
    intelligence in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the Gazebo editor. There are cubical objects arranged in the
    shape of a square with a doorway and a cylindrical object is placed in it. A I
    rover is highlighted to the left of cylindrical object, and the collapsed wall
    is highlighted at the top.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 6-13
  prefs: []
  type: TYPE_NORMAL
- en: Scenario with AI rover (red) and collapsed wall (yellow)
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The purpose of this chapter is to convey to the reader that the development
    of simple control is possible for the first generation of the AI rover. This chapter
    also exposes the severe limits of finite state machines in the creation of ever
    more sophisticated robots, thereby necessitating the creation of deep learning,
    reinforcement deep learning, Bayesian learning, and ultimately artificial cognitive
    intelligence–based controllers that will allow a robot to explore an unknown environment,
    such as the Egyptian catacombs. We should also point out to the reader that we
    have not used any type of probability or statistical analysis on the sensor data
    to determine sensor noise or error. We will revisit this topic in the chapters
    on Bayesian deep learning and statistical analysis for sensor noise and uncertainty.
    We will talk in the next chapter about the development of the first navigational
    and mapping techniques based on SLAM (Simultaneous Localization and Mapping).
    The discussion of navigation and mapping will also require the use of control
    system theory to allow us to understand why it is important to have two main control
    systems to control the angle heading of the AI rover itself and the direction
    of the AI rover’s goal position. The next chapter will be a small but critical
    step in the development of an autonomous rover.
  prefs: []
  type: TYPE_NORMAL
- en: Extra Credit
  prefs: []
  type: TYPE_NORMAL
- en: During the AI rover/catacomb simulations, you must have noticed that if the
    AI rover collides with a granite block it can push it to one side. In reality,
    this would never happen due to the AI rover’s small size, mass, and speed. How
    would you alter the URDF XML files to allow the granite blocks and supporting
    column found in the Egyptian catacombs to have the same simulated mass and moment
    of inertia as a real-world granite block and column with the same dimensions?
    (Look to Chapters [4](494112_1_En_4_Chapter.xhtml) and [5](494112_1_En_5_Chapter.xhtml)
    on modifying the URDF source code.)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Is the AI rover still able to push the granite blocks to one side if it collides
    with a block with a real-world mass and moment of inertia?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We know that we currently have 16 combinations for `bitVar` and for the four
    front sectors that we have used (D, E, F, and G) in `sense_avoid_obstacle.py`.
    How many combinations for `bitVar` would we have if we added both the left (SectorH)
    and the right (SectorC) LiDAR sectors? Please list all of the combinations of
    `bitVar` by using Sectors C, D, E, F, G, and H.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We can see that we are only using the four front LiDAR sectors. What gains could
    we make if we were to incorporate both the left (SectorH) and the right (SectorC)
    LiDAR sectors into `sense_avoid_obstacles.py`? How would we go about reprogramming
    this particular Python ROS node program?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We are currently using ten sectors for the LiDAR sensor array sweep? Is this
    the only number of LiDAR sectors we could use? If not, then what would be the
    ideal number of LiDAR sensor sweep sectors?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How do we modify the source code for the simulated LiDAR sensor range from 10
    meters to 30 meters?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
