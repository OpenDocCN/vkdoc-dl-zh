  type: TYPE_PRE
- en: 'After recompiling everything, run the program with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: If either the Gazebo AI rover catacomb program or keyboard Teleops is not running,
