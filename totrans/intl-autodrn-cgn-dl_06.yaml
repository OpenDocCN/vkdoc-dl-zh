- en: LiDAR sensor analysis at 0.748 meters
  prefs: []
  type: TYPE_NORMAL
- en: We should perform a sanity check and visually inspect that the AI rover is currently
    0.75 meters from the wall. Figure [6-7](#Fig7) shows our numbers make sense. Moving
