  type: TYPE_TB
  zh: '| 8 | 1000 | < 1 m |   |   |   | 软右 |'
- en: '| 9 | 1001 | < 1 m |   |   | < 1 m | Forward |'
  id: totrans-205
  prefs: []
  type: TYPE_TB
  zh: '| 9 | 1001 | < 1 m |   |   | < 1 m | 前进 |'
- en: '| 10 | 1010 | < 1 m |   | < 1 m |   | Hard Right |'
  id: totrans-206
  prefs: []
  type: TYPE_TB
  zh: '| 10 | 1010 | < 1 m |   | < 1 m |   | 硬右 |'
