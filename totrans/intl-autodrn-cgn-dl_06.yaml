  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**rospy.spin():** Keeps the program from shutting down on its own. The program
    can only be shut down by the operator.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To run the `read_Lidar_data.py rosrun` executable, reenter the following Linux
