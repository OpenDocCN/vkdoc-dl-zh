  - PREF_UL
  type: TYPE_NORMAL
- en: '**rospy.Subscriber():** Subscribes to the `Laser_scan` and `msg_Lidar_laser`
    topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**rospy.Publisher():** Publishes to the `ai_rover_remastered base_controller/cmd_vel`
