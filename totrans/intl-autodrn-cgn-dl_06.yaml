- en: 6. Sense and Avoidance
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 6. 感知与避障
- en: In Chapter [5](494112_1_En_5_Chapter.xhtml), we used Gazebo and RViz to simulate
    the AI rover’s behavior. The input could be scripted or arrive through human control.
    We also integrated a LiDAR sensor to “visualize” obstacles in the AI rover’s vicinity.
    However, the AI rover’s differential drive controller plug-in and the LiDAR sensor
    plug-in did not communicate with each other in Chapter [5](494112_1_En_5_Chapter.xhtml).
    This lack of communication between these plug-ins led to less intelligent movement
    around obstacles.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[5](494112_1_En_5_Chapter.xhtml)章中，我们使用了Gazebo和RViz来模拟AI漫游车的行为。输入可以是脚本化的，也可以通过人类控制到达。我们还集成了一个激光雷达传感器来“可视化”AI漫游车附近的障碍物。然而，在第[5](494112_1_En_5_Chapter.xhtml)章中，AI漫游车的差速驱动控制器插件和激光雷达传感器插件之间没有进行通信。这些插件之间的通信不足导致了在障碍物周围运动的不智能。
- en: We need these plug-ins to share data for intelligent navigation and trajectory
    control. To bridge this communication divide, we must create another plug-in with
    Python that sends and retrieves data from the plug-ins. This chapter will develop
    some simple controlling algorithms for the AI rover’s differential drive controller.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要这些插件来共享数据以实现智能导航和轨迹控制。为了弥合这种通信差距，我们必须创建另一个Python插件，用于从插件中发送和检索数据。本章将开发一些简单的控制算法，用于AI漫游车的差速驱动控制器。
- en: We will then have an embedded, intelligent decision-making node that allows
    our AI rover to explore the Egyptian catacombs by sensing and avoiding obstacles,
    traps, and collapsed walls. This node will serve as the prototype for the cognitive
    deep learning engine developed in later chapters.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将拥有一个嵌入式、智能决策节点，它允许我们的AI漫游车通过感知和避开障碍物、陷阱和坍塌的墙壁来探索埃及地下墓穴。这个节点将成为后续章节中开发的认知深度学习引擎的原型。
- en: Objectives
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标
- en: 'The following are the objectives required for successful completion of this
    chapter:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是为成功完成本章所需的目标：
- en: Make the AI rover detect and avoid an obstacle.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让AI漫游车检测并避开障碍物。
- en: Develop the first inertial navigation system.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发第一个惯性导航系统。
- en: Learn rover mission handling with Python.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Python学习漫游车任务处理。
- en: Develop the first Python script for obstacle avoidance.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发第一个用于避障的Python脚本。
- en: Understand how to upload and download Gazebo missions.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解如何上传和下载Gazebo任务。
- en: Verify and validate the first land rover controller within Gazebo simulations.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证和验证Gazebo模拟中的第一个陆地漫游车控制器。
- en: Discuss and review why deep learning is superior to standard state machine controller
    designs.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 讨论和回顾为什么深度学习优于标准状态机控制器设计。
- en: Summary, exercises, and hints.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要、练习和提示。
- en: Understanding Coordinate Systems
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解坐标系
- en: Before we try to program the rover to sense its environment, we need to understand
    how to identify locations, speeds, and velocities. For instance, while you are
    reading this book, you are sitting still. Your speed is zero kph, right? Obviously!
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们尝试编程漫游车感知其环境之前，我们需要了解如何识别位置、速度和速度。例如，当你阅读这本书时，你正坐着不动。你的速度是零千米每小时，对吧？显然！
- en: Not so fast! From your point of view (POV), you are sitting still. But what
    about the alien hovering near the moon? They see you briskly speeding along at
    1,673 kph because of the Earth’s rotation.^([1](#Fn1)) Or the aliens hovering
    near the sun that see you traveling at a whopping 107,000 kph.^([2](#Fn2))
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 别急！从你的视角（POV）来看，你正坐着不动。但那些在月球附近盘旋的外星人呢？由于地球的旋转，他们看到你以每小时1,673公里的速度飞快地移动。[1](#Fn1)
    或者那些在太阳附近盘旋的外星人，他们看到你以惊人的每小时107,000公里的速度旅行。[2](#Fn2)
- en: What may feel strange is that ALL of these measurements of your speed are correct.
    It all depends on your POV. These POVs represent different coordinate systems.
    Another way of thinking about this in mathematical terms is where is the origin,
    O(0,0,0), of your “universe.” The stationary reader has an internal concept of
    everything relative to its current location. In other words, their origin moves
    with them. The alien near the moon sets its origin at the moon, with one face
    always facing the rotating Earth. Hence, the rotational speed is observed. Finally,
    the alien near the sun places its origin at the sun and it sees the Earth rotating
    and orbiting the sun. The orbital speed dominates the observation. Keen observers
    will notice this is a simplified explanation of Einstein’s theory of relativity.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 可能会感觉奇怪的是，你所有关于速度的测量都是正确的。这完全取决于你的视角。这些视角代表不同的坐标系。从数学角度思考的另一种方式是，你的“宇宙”的起点，O(0,0,0)，在哪里。静止的读者有一个相对于其当前位置的内部概念。换句话说，他们的起点随着他们移动。靠近月亮的外星人将其起点设在月亮上，其中一面始终面向旋转的地球。因此，观察到的旋转速度。最后，靠近太阳的外星人将其起点设在太阳上，它看到地球在围绕太阳旋转。轨道速度占主导地位。敏锐的观察者会注意到，这是一个对爱因斯坦相对论理论的简化解释。
- en: So, when solving a problem in 3D space, we find that solutions to our questions
    will change depending on our POV. We refer to these POVs as coordinate systems.
    It behooves us to use the coordinate system that solves our problem the easiest
    and translates into the other systems. Describing our speed and turning is easiest
    to understand from our internal coordinate system. Creating a map or following
    a path is easiest to describe from a local coordinate system. And, finally, creating
    our simulated world is easiest to describe in a global system. Doing the math
    to translate answers into the other coordinate systems is handled automatically
    by Gazebo.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当在三维空间中解决问题时，我们发现我们的问题的解决方案将根据我们的视角（POV）而变化。我们将这些视角称为坐标系。我们有责任使用最简单解决我们问题的坐标系，并将其转换为其他系统。从我们的内部坐标系理解我们的速度和转向是最容易的。从局部坐标系描述创建地图或跟随路径是最容易的。最后，在全局系统中描述我们的模拟世界是最容易的。将答案转换为其他坐标系的数学计算由
    Gazebo 自动处理。
- en: Modeling the AI Rover World
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建模人工智能漫游车世界
- en: Retrieve all of the Xacro, URDF, launch, and Python script files developed in
    Chapter [5](494112_1_En_5_Chapter.xhtml). Use the same AI rover model, the differential
    drive controller, and the LiDAR sensor plug-in. The LiDAR sensor plug-in determines
    the distance between an obstacle and the AI rover. This is essential to identify
    the nearest obstacles during exploration. What we expect to find is that this
    is not enough information to navigate a maze. The rover will become trapped. Using
    a camera *and* LiDAR sensors will supply enough information to navigate a maze.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 检索第 [5](494112_1_En_5_Chapter.xhtml) 章中开发的全部 Xacro、URDF、launch 和 Python 脚本文件。使用相同的
    AI 漫游车模型、差速驱动控制器和 LiDAR 传感器插件。LiDAR 传感器插件确定障碍物与 AI 漫游车之间的距离。这在探索过程中识别最近的障碍物是必不可少的。我们期望找到的是，这不足以导航迷宫。漫游车可能会被困住。使用相机
    *和* LiDAR 传感器将提供足够的信息来导航迷宫。
- en: 'The AI rover is composed of the following components:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能漫游车由以下组件组成：
- en: 'Chassis and caster wheel: link type element'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 底盘和转向轮：链接类型元素
- en: 'Right and left wheels: both link type element'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右轮和左轮：都是链接类型元素
- en: 'Right and left wheel joints: both joint type element'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右轮和左轮关节：都是关节类型元素
- en: LiDAR sensor package and plug-in
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LiDAR 传感器包和插件
- en: Organizing the Project
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组织项目
- en: 'Add the following highlighted sub-directories to the project:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 将以下突出显示的子目录添加到项目中：
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'To generate the `ai_rover_worlds` ROS package directory, execute the following
    Linux terminal commands:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 要生成 `ai_rover_worlds` ROS 包目录，请执行以下 Linux 终端命令：
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This directory organization efficiently manages the complex obstacles. The `ai_rover_worlds`
    directory includes the URDF files describing the mazes and obstacles for each
    generated world. The `launch` folder has the XML files that initiate the world
    and obstacles required by Gazebo. The `worlds` folder has the XML files that describe
    the world to be generated in Gazebo.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 该目录组织有效地管理了复杂的障碍。`ai_rover_worlds` 目录包含了描述每个生成世界中迷宫和障碍的 URDF 文件。`launch` 文件夹包含启动
    Gazebo 所需的世界和障碍的 XML 文件。`worlds` 文件夹包含描述在 Gazebo 中生成世界的 XML 文件。
- en: Modeling the Catacombs (Simplified)
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 建模地下墓穴（简化版）
- en: We can now create our first AI rover’s exploration world layout for the Egyptian
    catacombs by using the Gazebo editor, as we briefly reviewed in both Chapters
    [4](494112_1_En_4_Chapter.xhtml) and [5](494112_1_En_5_Chapter.xhtml). We will
    now create a simple one-room maze with a doorway and a cylindrical object (Figure
    [6-1](#Fig1)). Refer to Chapter [5](494112_1_En_5_Chapter.xhtml) about operating
    the Gazebo editor.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以使用Gazebo编辑器创建我们第一个AI探测车在埃及地下墓穴的探索世界布局，正如我们在第[4](494112_1_En_4_Chapter.xhtml)章和第[5](494112_1_En_5_Chapter.xhtml)章中简要回顾的那样。我们将创建一个简单的单室迷宫，包含一个门道和一个圆柱形物体（见图[6-1](#Fig1)）。关于操作Gazebo编辑器的信息，请参考第[5](494112_1_En_5_Chapter.xhtml)章。
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig1_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig1_HTML.jpg)'
- en: A screenshot of the Gazebo editor. There are cubical objects arranged in the
    shape of a square with a doorway, and a cylindrical object at the bottom right
    is placed in it. It highlights A I rover on the top left within the catacomb.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: Gazebo编辑器的截图。图中展示了以门道形状排列的立方体物体，底部右方放置了一个圆柱形物体。它突出了位于地下墓穴顶左方的AI探测车。
- en: Figure 6-1
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图6-1
- en: First design of Egyptian catacomb with the column
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 带有柱子的埃及地下墓穴的第一个设计
- en: 'Now that we have created our first partially enclosed Egyptian catacomb with
    a supporting column, we should save this 3D design in the following directory:
    `~/sim_gazebo_rviz_ws/src/ai_rover_worlds/worlds`. The name for this file is `ai_rover_catacombs.world`.
    We should save this design by using the Ctrl+Shift+S option. The design save option
    allows us to store this initial design of the Egyptian catacombs without inadvertently
    causing the Gazebo simulator to crash. The Gazebo environment, depending on your
    particular computer hardware characteristics, has the potential to crash during
    a save. We can also see that the simulated granite blocks are misaligned within
    this simple catacomb design. This construction was typical for some of the earliest
    Ancient Egyptian Old Kingdom funerary complexes (circa 3100 B.C.). These examples
    of construction were especially true for those of the Ancient Egyptians who were
    not of the nobility class. The misaligned granite blocks will also allow us to
    test whether the AI rover’s LiDAR and camera sensors can determine and identify
    uneven or misaligned surfaces’ boundaries during its simulation run. We will also
    see the phenomenon of “blind spots” that the AI rover may not be able to locate
    with its sensor arrangement. Once we have this design saved in the correct directory,
    we must then launch it from ROS. We can launch this world within ROS, at first,
    without a launch file. We can do this by executing the following Linux terminal
    commands in two separate windows within the Terminator terminal command:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经创建了一个带有支撑柱的部分封闭的埃及地下墓穴，我们应该将这个3D设计保存在以下目录中：`~/sim_gazebo_rviz_ws/src/ai_rover_worlds/worlds`。该文件的名称为`ai_rover_catacombs.world`。我们应该使用Ctrl+Shift+S选项保存此设计。设计保存选项允许我们存储这个埃及地下墓穴的初始设计，而不会意外导致Gazebo模拟器崩溃。Gazebo环境，根据您的特定计算机硬件特性，在保存过程中有崩溃的可能性。我们还可以看到，在这个简单的地下墓穴设计中，模拟的花岗岩块排列不齐。这种建筑是古埃及最早的一些古王国陵墓建筑（约公元前3100年）的典型特征。这些建筑例子尤其适用于那些非贵族阶级的古埃及人。排列不齐的花岗岩块也将使我们能够测试AI探测车的激光雷达和摄像头传感器在模拟运行期间是否能够确定和识别不均匀或排列不齐的表面的边界。我们还将看到AI探测车可能无法通过其传感器配置定位的“盲点”现象。一旦我们将这个设计保存在正确的目录中，我们必须然后从ROS启动它。我们可以在ROS中启动此世界，最初不需要启动文件。我们可以在两个分开的窗口中执行以下Linux终端命令来完成：
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Note
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 注意
- en: Launch this initial design by using the Linux terminal commands. It appears
    to be the best method to test ROS’s Gazebo interaction. However, this is still
    a guess on our part. We modify the launch file from Chapter [5](494112_1_En_5_Chapter.xhtml)
    to generate our “catacombs” and AI rover together. It is a simple exercise to
    spawn additional AI rovers.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Linux终端命令启动这个初始设计。这似乎是测试ROS的Gazebo交互的最佳方法。然而，这仍然是我们的一部分猜测。我们修改了第[5](494112_1_En_5_Chapter.xhtml)章中的启动文件，以生成我们的“地下墓穴”和AI探测车。生成额外的AI探测车是一个简单的练习。
- en: Once we have executed these Linux terminal commands, we should see the same
    display found in Figure [6-2](#Fig2). We do this to test, verify, and validate
    that the catacomb design can be successfully opened and operated by ROS. We will
    then proceed to modify our original Gazebo and RViz launch file from Chapter [5](494112_1_En_5_Chapter.xhtml).
    The name for this original launch file is `ai_rover_remastered_gazebo.launch`.
    This launch file spawns and then activates a single AI rover within an empty world.
    We will now modify this launch file so the AI rover spawns at the Egyptian catacombs'
    origin coordinates developed in Figure [6-2](#Fig2). The origin coordinates have
    been highlighted in the red box in Figure [6-2](#Fig2), which intersects the red
    (x), green (y), and blue (z) lines. As such, the AI rover will spawn in the red
    box with the Ancient Egyptian catacombs generated around it. We must also be certain
    that the catacomb world never overlaps the spawn location of the AI rover. This
    action would cause the Gazebo simulation to terminate. Listing [6-1](#PC4) is
    the source code listing of this modified launch file for the AI rover model and
    the generated catacombs.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们执行了这些Linux终端命令，我们应该看到与图[6-2](#Fig2)中相同的显示。我们这样做是为了测试、验证和确认地下墓穴设计可以被ROS成功打开和操作。然后我们将继续修改第[5](494112_1_En_5_Chapter.xhtml)章中的原始Gazebo和RViz启动文件。这个原始启动文件的名称是`ai_rover_remastered_gazebo.launch`。这个启动文件在一个空世界中生成并激活一个AI漫游车。我们现在将修改这个启动文件，使AI漫游车在图[6-2](#Fig2)中开发的埃及地下墓穴原点坐标处生成。原点坐标在图[6-2](#Fig2)中被红色方框突出显示，它与红色（x）、绿色（y）和蓝色（z）线相交。因此，AI漫游车将在红色方框内生成，周围是古代埃及地下墓穴。我们还必须确保地下墓穴世界永远不会与AI漫游车的生成位置重叠。这种行为会导致Gazebo模拟终止。列表[6-1](#PC4)是修改后的启动文件源代码列表，用于AI漫游车模型和生成的地下墓穴。
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'There is only one modification to the original launch file from Chapter [5](494112_1_En_5_Chapter.xhtml):
    to add the `<arg name="world_name" value="$(find ai_rover_worlds)/worlds/ai_rover_catacomb.world"/>`
    line of XML source code following the line of source code that first launches
    the empty world. This world acts similar to a clean canvas, after which we generate
    the simulated world of the AI rover exploring the Egyptian catacombs. Therefore,
    we add this line to find and initiate the `ai_rover_catacomb.world` in its correct
    directory. We will now rename the modified version of the launch file from Chapter
    [5](494112_1_En_5_Chapter.xhtml) as `ai_rover_cat.launch.` The following will
    be the terminal Linux commands required to execute this launch file with both
    the AI rover and its operational LiDAR system and the Egyptian catacombs generated
    together:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对第[5](494112_1_En_5_Chapter.xhtml)章中的原始启动文件只有一个修改：在首次启动空世界后的源代码行中添加`<arg name="world_name"
