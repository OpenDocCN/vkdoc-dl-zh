  zh: 执行这些命令后，我们可以使用键盘控制模拟中显示的 AI 巡游车。接下来，我们将开发一个 Python 脚本代码来处理和显示激光雷达传感器数据。
- en: Laser Range-Finding Data
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 激光测距数据
- en: 'We will create our Python script within the `catkin_ws` workspace `Motion_Planning_Navigation_Goals`
    ROS package. This script will retrieve data from the `/ai_rover_remastered/laser_scan/scan`
    topic. Create the following Python script:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在 `catkin_ws` 工作空间 `Motion_Planning_Navigation_Goals` ROS 软件包中创建我们的 Python
    脚本。此脚本将从 `/ai_rover_remastered/laser_scan/scan` 主题检索数据。创建以下 Python 脚本：
- en: '[PRE11]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Note
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 备注
- en: The `touch` command creates a file within directories without launching an application,
    such as a word processor or a development environment. The created files are empty.
    To create content, the appropriate application must be launched. The `chmod` command
    makes the `read_Lidar_data.py` file executable via `rosrun`.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '`touch` 命令在目录中创建文件，而不启动应用程序，例如文字处理器或开发环境。创建的文件是空的。要创建内容，必须启动适当的应用程序。`chmod`
    命令使 `read_Lidar_data.py` 文件可通过 `rosrun` 执行。'
- en: Enter the script found in Listing [6-2](#PC13).
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 进入列表 [6-2](#PC13) 中的脚本。
- en: '[PRE12]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The `clbk_laser` function passes the `msg` argument to `min(min(msg.ranges[xxxx:yyyy]),
    10)`, which then reads the data for each of the ten LiDAR sensor sectors, guaranteeing
    a maximum value of 10 meters. It converts the 1,440 samples into ten aggregated
    sectors. Each sector returns the minimum value from the samples or caps the value
    at 10 meters (LiDAR max range). The minimum value is the distance to the obstacle
    closest to the AI rover in that sector. Each sector is 36 degrees in coverage
    (36° x 10 = 360°). As such, the AI rover has no “blind spots” during its continuous
    LiDAR sensor sweep. Because the AI rover has no blind spots, it can also travel
    backward if necessary. Figure [6-5](#Fig5) is the orientation layout of the LiDAR
    sensor.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '`clbk_laser` 函数将 `msg` 参数传递给 `min(min(msg.ranges[xxxx:yyyy]), 10)`，然后读取每个激光雷达传感器十个扇区的数据，保证最大值为
    10 米。它将 1,440 个样本转换为十个聚合扇区。每个扇区返回样本的最小值或将其限制在 10 米（激光雷达最大范围）。最小值是该扇区中距离 AI 探索车最近的障碍物的距离。每个扇区覆盖
    36 度（36° x 10 = 360°）。因此，AI 探索车在连续的激光雷达传感器扫描过程中没有“盲点”。由于 AI 探索车没有盲点，如果需要，它也可以倒车。图
    [6-5](#Fig5) 是激光雷达传感器的方向布局。'
- en: '![](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig5_HTML.jpg)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图 6-5](../images/494112_1_En_6_Chapter/494112_1_En_6_Fig5_HTML.jpg)'
- en: A layout of the LiDAR sensor orientation. There is a square and at the top corners
    are two rectangular objects. Between them is a large circle and below it is a
    small circle. The arrows from large circle point toward degrees. 0 or 360, 90,
    180, and 270 degree.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 激光雷达传感器方向的布局。有一个正方形，在其顶部角落有两个矩形物体。它们之间有一个大圆，下面有一个小圆。大圆的箭头指向度数。0 或 360，90，180
    和 270 度。
- en: Figure 6-5
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6-5
- en: LiDAR sensor orientation and layout
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 激光雷达传感器方向和布局
- en: The larger solid black circle in the center of Figure [6-5](#Fig5) is the LiDAR
    sensor. The smaller solid black circle toward the bottom of Figure [6-5](#Fig5)
    is the caster wheel. The LiDAR sweep begins at 180° and then ends at 180°. The
    red arrow is the propagating LiDAR laser beam.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [6-5](#Fig5) 中中心的较大实心黑色圆圈是激光雷达传感器。图 [6-5](#Fig5) 底部较小的实心黑色圆圈是万向轮。激光雷达扫描从 180°
    开始，然后结束于 180°。红色箭头是传播的激光雷达激光束。
- en: 'To run our program `read_Lidar_data.py`, add the following main test driver
    found in lines 23–32\. The source code contained within `main()` performs the
    following functions:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行我们的程序 `read_Lidar_data.py`，请添加以下主测试驱动程序，该程序位于第 23-32 行。`main()` 函数内部的源代码执行以下功能：
- en: '**rospy.init_node(‘read_Lidar_data’)**: Attaches to ROS.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**rospy.init_node(''read_Lidar_data'')**：连接到 ROS。'
- en: '**rospy.Subscriber():** Subscribes to the `Laser_scan` and `msg_Lidar_laser`
    topics.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**rospy.Subscriber()**：订阅 `Laser_scan` 和 `msg_Lidar_laser` 主题。'
- en: '**rospy.Publisher():** Publishes to the `ai_rover_remastered base_controller/cmd_vel`
    topic for controlling the AI rover.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**rospy.Publisher()**：发布到 `ai_rover_remastered base_controller/cmd_vel` 主题，以控制
    AI 探索车。'
- en: '**rospy.spin():** Keeps the program from shutting down on its own. The program
    can only be shut down by the operator.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**rospy.spin()**：防止程序自行关闭。程序只能由操作员关闭。'
