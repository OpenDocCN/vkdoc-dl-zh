  id: totrans-202
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 0110 |   | < 1 m | < 1 m |   | 硬左 |'
- en: '| 7 | 0111 |   | < 1 m | < 1 m | < 1 m | Hard Left |'
