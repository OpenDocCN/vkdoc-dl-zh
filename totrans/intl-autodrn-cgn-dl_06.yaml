- en: We have determined that the LiDAR sensor system is operational. We conducted
    this small distance test to verify the Gazebo simulations are working correctly.
    The simulated AI rover must as closely as possible operate within the laws of
    physics. By performing these iterative tests of every single development of the
    AI rover, our odds of building a fully operational AI rover are improved. It also
    narrows the location we need to search when looking for the source of an error.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经确定激光雷达传感器系统是可操作的。我们进行了这个小距离测试，以验证Gazebo模拟是否正确工作。模拟的AI漫游车必须尽可能在物理定律的约束下运行。通过执行AI漫游车每个单独开发的迭代测试，我们构建一个完全可操作的AI漫游车的机会得到了提高。这也缩小了我们寻找错误来源时需要搜索的位置范围。
