- en: Multiclass Classification with SoftMax Function Using Full-Batch Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we illustrate a multiclass classification problem using full-batch
    gradient descent. The MNIST dataset has been used because there are ten output
    classes corresponding to the ten integers. The detailed implementation is provided
    in Listing [2-18](#PC28). A SoftMax has been used as the output layer.
  prefs: []
