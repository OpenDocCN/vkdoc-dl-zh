- en: 2. Introduction to Deep-Learning Concepts and TensorFlow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 深度学习概念和TensorFlow简介
- en: Deep Learning and Its Evolution
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习及其演变
- en: Deep learning evolved from artificial neural networks, which have existed since
    the 1940s. Neural networks are interconnected networks of processing units called
    artificial neurons that loosely mimic the axons found in a biological brain. In
    a biological neuron, dendrites receive input signals from various neighboring
    neurons, typically more than 1000 of them. These modified signals are then passed
    on to the cell body or soma of the neuron, where these signals are summed together
    and then passed on to the axon of the neuron. If the received input signal is
    more than a specified threshold, the axon will release a signal, which will be
    passed on to the neighboring dendrites of other neurons. Figure [2-1](#Fig1) depicts
    the structure of a biological neuron for reference.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是从20世纪40年代以来一直存在的人工神经网络演变而来的。神经网络是由称为人工神经元的处理单元组成的互联网络，它们松散地模拟了生物大脑中的轴突。在生物神经元中，树突接收来自各种邻近神经元的输入信号，通常超过1000个。这些修改后的信号随后传递到神经元的细胞体或胞体，在这些信号被汇总后，再传递到神经元的轴突。如果接收到的输入信号超过一个特定的阈值，轴突将释放一个信号，该信号将被传递到其他神经元的邻近树突。图[2-1](#Fig1)展示了生物神经元的结构以供参考。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig1_HTML.jpg)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig1_HTML.jpg)'
- en: The representation of a biological neuron. The Axon terminal, Schwann cell,
    dendrite, cell body, axon, nucleus, the node of Ranvier, and myelin sheath are
    highlighted.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 生物神经元的表示。轴突末端、施万细胞、树突、细胞体、轴突、细胞核、朗飞节和髓鞘被突出显示。
- en: Figure 2-1
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-1
- en: Structure of a biological neuron
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 生物神经元的结构
- en: Artificial neuron units are inspired by the biological neurons, with some modifications
    for convenience. Much like the dendrites, the input connections to the neuron
    carry the attenuated or amplified input signals from other neighboring neurons.
    The signals are passed on to the neuron, where the input signals are summed up
    and then a decision is made as to what to output based on the total input received.
    For instance, for a binary threshold neuron, an output value of 1 is provided
    when the total input exceeds a predefined threshold; otherwise, the output stays
    at 0\. Several other types of neurons are used in artificial neural networks,
    and their implementation only differs with respect to the activation function
    on the total input to produce the neuron output. In Figure [2-2](#Fig2), the different
    biological equivalents are tagged in the artificial neuron for easy analogy and
    interpretation.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经元单元受到生物神经元的启发，为了方便起见进行了一些修改。与树突类似，神经元的输入连接携带来自其他邻近神经元的衰减或放大后的输入信号。这些信号被传递到神经元，在那里输入信号被汇总，然后根据接收到的总输入决定输出什么。例如，对于二元阈值神经元，当总输入超过预定义的阈值时，提供输出值1；否则，输出保持在0。人工神经网络中使用了多种其他类型的神经元，它们的实现仅与产生神经元输出的激活函数有关。在图[2-2](#Fig2)中，人工神经元中的不同生物等效物被标记出来，以便于类比和解释。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig2_HTML.jpg)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig2_HTML.jpg)'
- en: The image of an artificial neuron includes dendrites as straight lines, cell
    body or soma, summation, activation, and axon.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经元的图像包括作为直线的树突、细胞体或胞体、汇总、激活和轴突。
- en: Figure 2-2
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-2
- en: Structure of an artificial neuron
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经元的结构
- en: Artificial neural networks started with a lot of promise in the early 1940s.
    We will go through the chronology of major events in the artificial neural network
    community to get a feel of how this discipline has evolved over the years and
    what challenges were faced along the way.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络在20世纪40年代初充满了许多希望。我们将回顾人工神经网络社区中的重大事件的时间顺序，以了解这个学科多年来是如何发展的，以及在这个过程中面临了哪些挑战。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig3_HTML.jpg)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig3_HTML.jpg)'
- en: Artificial neural network evolution is illustrated in the image. The image displays
    the scientists' photos together with the year of every evolution.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络的发展在图中得到了展示。图中展示了科学家们的照片以及每个演变的年份。
- en: Figure 2-3
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-3
- en: Evolution of artificial neural networks
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络的演变
- en: 'Warren McCulloch and Walter Pitts, two electrical engineers, published a paper
    titled “A Logical Calculus of the Ideas Immanent in Nervous Activity,” related
    to neural networks, in 1943\. The paper can be located at [`www.cs.cmu.edu/`∼`epxing/Class/10715/reading/McCulloch.and.Pitts.pdf`](http://www.cs.cmu.edu/%25E2%2588%25BCepxing/Class/10715/reading/McCulloch.and.Pitts.pdf).
    Their neurons have a binary output state, and there are two types of input to
    the neurons: excitatory inputs and inhibitory inputs. All excitatory inputs to
    the neuron have equal positive weights. If all the inputs to the neuron are excitatory
    and if the total input ![$$ \sum \limits_i{w}_i{x}_i&gt;0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq1.png),
    the neuron would output 1\. In cases where any of the inhibitory inputs are active
    or ![$$ \sum \limits_i{w}_i{x}_i\le 0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq2.png),
    the output would be 0\. Using this logic, all the Boolean logic functions can
    be implemented by one or more such neurons. The drawback of these networks was
    that they had no way of learning the weights through training. One must figure
    out the weights manually and combine the neurons to achieve the required computation.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两位电气工程师沃伦·麦克库洛奇和沃尔特·皮茨在1943年发表了一篇题为“神经活动内在思想的逻辑演算”的论文，与神经网络相关。该论文可在[http://www.cs.cmu.edu/%E2%88%BCepxing/Class/10715/reading/McCulloch.and.Pitts.pdf](http://www.cs.cmu.edu/%25E2%2588%25BCepxing/Class/10715/reading/McCulloch.and.Pitts.pdf)找到。他们的神经元具有二进制输出状态，神经元有两种输入：兴奋性输入和抑制性输入。所有兴奋性输入到神经元的权重都是正的。如果所有输入到神经元的都是兴奋性输入，并且如果总输入![\(
    \sum \limits_i{w}_i{x}_i>0 \)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq1.png)，则神经元会输出1。在抑制性输入中的任何一个活跃或![\(
    \sum \limits_i{w}_i{x}_i\le 0 \)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq2.png)的情况下，输出将是0。使用这种逻辑，所有布尔逻辑函数都可以通过一个或多个这样的神经元实现。这些网络的缺点是它们没有通过训练学习权重的途径。必须手动确定权重并将神经元组合起来以实现所需的计算。
- en: The next big thing was the Perceptron, which was invented by Frank Rosenblatt
    in 1957\. He, along with his collaborators, Alexander Stieber and Robert H. Shatz,
    documented their invention in a report titled “The Perceptron—A Perceiving and
    Recognizing Automaton,” which can be located at [`https://blogs.umass.edu/brain-wars/files/2016/03/rosenblatt-1957.pdf`](https://blogs.umass.edu/brain-wars/files/2016/03/rosenblatt-1957.pdf).
    The Perceptron was built with the motive of binary classification tasks. Both
    the weights and bias to the neuron can be trained through the Perceptron learning
    rule. The weights can be both positive and negative. There were strong claims
    made by Frank Rosenblatt about the capabilities of the Perceptron model. Unfortunately,
    not all of them were true.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一个重大突破是感知器，它由弗兰克·罗森布拉特在1957年发明。他和他的合作者亚历山大·斯蒂贝尔和罗伯特·H·沙茨在一份题为“感知器——一种感知和识别的自动机”的报告中记录了他们的发明，该报告可在[https://blogs.umass.edu/brain-wars/files/2016/03/rosenblatt-1957.pdf](https://blogs.umass.edu/brain-wars/files/2016/03/rosenblatt-1957.pdf)找到。感知器的构建目的是为了二元分类任务。通过感知器学习规则，可以训练神经元到权重和偏差。权重可以是正数也可以是负数。弗兰克·罗森布拉特对感知器模型的能力提出了强烈的声明。不幸的是，其中并非所有都是真实的。
- en: 'Marvin Minsky and Seymour A. Papert wrote a book titled *Perceptrons: An Introduction
    to Computational Geometry* in 1969 (MIT Press), which showed the limitations of
    the Perceptron learning algorithm even on simple tasks such as developing the
    XOR Boolean function with a single Perceptron. A better part of the artificial
    neural network community perceived that these limitations showed by Minsky and
    Papert applied to all neural networks, and hence the research in artificial neural
    networks nearly halted for a decade, until the 1980s.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 马文·明斯基和西摩·A·帕佩特在1969年（麻省理工学院出版社）撰写了一本名为《感知器：计算几何导论》的书，展示了感知器学习算法即使在像使用单个感知器开发XOR布尔函数这样的简单任务上的局限性。人工神经网络社区的一部分人认为，明斯基和帕佩特展示的这些局限性适用于所有神经网络，因此人工神经网络的研究几乎停滞了十年，直到20世纪80年代。
- en: In the 1980s, interest in artificial neural networks was revived by Geoffrey
    Hilton, David Rumelhart, Ronald Williams, and others, primarily because of the
    backpropagation method of learning multi-layered problems and because of the ability
    of neural networks to solve nonlinear classification problems.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在20世纪80年代，杰弗里·希尔顿、大卫·鲁梅尔哈特、罗纳德·威廉姆斯等人重新点燃了对人工神经网络的研究兴趣，这主要是因为多层问题学习的反向传播方法以及神经网络解决非线性分类问题的能力。
- en: In the 1990s, support vector machines (SVM), invented by V. Vapnik and C. Cortes,
    became popular since neural networks were not scaling up to large problems.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 1990 年代，支持向量机（SVM），由 V. Vapnik 和 C. Cortes 发明，由于神经网络无法扩展到大型问题而变得流行。
- en: Artificial neural networks were renamed deep learning in 2006 when Geoffrey
    Hinton and others introduced the idea of unsupervised pretraining and deep-belief
    networks. Their work on deep-belief networks was published in a paper titled “A
    Fast Learning Algorithm for Deep Belief Nets.” The paper can be located at [`www.cs.toronto.edu/`∼`hinton/absps/fastnc.pdf`](https://www.cs.toronto.edu/%25E2%2588%25BChinton/absps/fastnc.pdf)*.*
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工神经网络在 2006 年被更名为深度学习，当时 Geoffrey Hinton 和其他人引入了无监督预训练和深度信念网络的想法。他们关于深度信念网络的工作发表在题为“Deep
    Belief Nets”的论文中。该论文可在[`www.cs.toronto.edu/`∼`hinton/absps/fastnc.pdf`](https://www.cs.toronto.edu/%25E2%2588%25BChinton/absps/fastnc.pdf)找到*.*。
- en: ImageNet, a large collection of labeled images, was created and released by
    a group in Stanford in 2010.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ImageNet，一个大型标记图像集合，由斯坦福大学的一个团队在 2010 年创建并发布。
- en: In 2012, Alex Krizhevsky, [Ilya Sutskever](http://www.cs.toronto.edu/%25E2%2588%25BCilya/),
    and Geoffrey Hinton won the ImageNet Competition for achieving an error rate of
    16%, whereas in the first two years, the best models had around 28% and 26% error
    rates. This was a huge margin of win. The implementation of the solution had several
    aspects of deep learning that are standard in any deep-learning implementation
    today.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 2012 年，Alex Krizhevsky、[Ilya Sutskever](http://www.cs.toronto.edu/%25E2%2588%25BCilya/)
    和 Geoffrey Hinton 凭借 16% 的错误率赢得了 ImageNet 竞赛，而在这前两年，最佳模型的错误率分别约为 28% 和 26%。这是一个巨大的胜利差距。该解决方案的实施具有深度学习在今天的任何深度学习实现中都是标准的几个方面。
- en: Graphical processing units (GPUs) were used to train the model. GPUs are very
    good at doing matrix operations and are computationally very fast since they have
    thousands of cores to do parallel computing.
  id: totrans-25
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图形处理单元（GPU）被用于训练模型。GPU 在执行矩阵运算方面非常出色，并且由于它们有成千上万的内核进行并行计算，因此在计算上非常快速。
- en: Dropout was used as a regularization technique to reduce overfitting.
  id: totrans-26
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dropout 被用作正则化技术以减少过拟合。
- en: Rectified linear units (ReLU) were used as activation functions for the hidden
    layers.
  id: totrans-27
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 矩形线性单元（ReLU）被用作隐藏层的激活函数。
- en: Figure [2-3](#Fig3) shows the evolution of the artificial neural network into
    deep learning. ANN stands for artificial neural network, MLP stands for multi-layer
    Perceptron, and AI stands for artificial intelligence.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-3](#Fig3) 展示了人工神经网络向深度学习的演变。ANN 代表人工神经网络，MLP 代表多层感知器，AI 代表人工智能。
- en: Perceptrons and Perceptron Learning Algorithm
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 感知器和感知器学习算法
- en: Although there are limitations to what Perceptron learning algorithms can do,
    they are the precursor to the advanced techniques in deep learning we see today.
    Hence, a detailed study of Perceptrons and the Perceptron learning algorithm is
    worthwhile. Perceptrons are linear binary classifiers that use a hyperplane to
    separate the two classes. The Perceptron learning algorithm is guaranteed to fetch
    a set of weights and bias that classifies all the inputs correctly, provided such
    a feasible set of weights and bias exist.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管感知器学习算法的功能有限，但它们是今天我们看到的高级深度学习技术的先驱。因此，对感知器和感知器学习算法进行详细研究是值得的。感知器是使用超平面来分隔两个类别的线性二元分类器。只要存在这样的可行权重和偏置集，感知器学习算法就能保证找到一组权重和偏置，以正确分类所有输入。
- en: Perceptron is a linear classifier, and as we saw in Chapter [1](448418_2_En_1_Chapter.xhtml),
    linear classifiers generally perform binary classification by constructing a hyperplane
    that separates the positive class from the negative class.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器是一种线性分类器，正如我们在第 [1](448418_2_En_1_Chapter.xhtml) 章节中看到的，线性分类器通常通过构建一个超平面来区分正类和负类，从而进行二元分类。
- en: The hyperplane is represented by a unit weight vector *w*′ ∈ *R*^(*n* × 1) that
    is perpendicular to the hyperplane and a bias term *b* that determines the distance
    of the hyperplane from the origin. The vector *w*′ ∈ *R*^(*n* × 1) is chosen to
    point toward the positive class.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 超平面由一个单位权重向量 *w*′ ∈ R^(n × 1) 表示，该向量垂直于超平面，以及一个偏置项 *b*，它决定了超平面与原点的距离。向量 *w*′
    ∈ R^(n × 1) 被选择指向正类。
- en: As illustrated in Figure [2-4](#Fig4), for any input vector *x*′ ∈ *R*^(*n* × 1),
    the dot product with the negative of the unit vector *w*′ would give the distance
    *b* of the hyperplane from the origin since *x*′ and *w*′ are on the side opposite
    of the origin. Formally, for points lying on the hyperplane,
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [2-4](#Fig4) 所示，对于任何输入向量 *x*′ ∈ *R*^(*n* × 1)，与单位向量 *w*′ 的负值的点积将给出超平面到原点的距离
    *b*，因为 *x*′ 和 *w*′ 在原点的对面。形式上，对于位于超平面上的点，
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig4_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig4_HTML.jpg)'
- en: Both positive and negative plots are displayed on the graph. Drawing a hyperplane
    from the intersection of the two plots allows for their separation.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 正负图都显示在图表上。从两个图的交点绘制超平面可以分离它们。
- en: Figure 2-4
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-4
- en: Hyperplane separating two classes
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 分隔两个类的超平面
- en: '![$$ -{w^{\prime}}^T{x}^{\prime }=b=&gt;{w^{\prime}}^T{x}^{\prime }+b=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equa.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equa.png)'
- en: Similarly, for points lying below the hyperplane, i.e., the input vectors ![$$
    {x}_{+}^{\prime}\in {R}^{n\times 1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq3.png)
    belonging to the positive class, the negative of the projection of ![$$ {x}_{+}^{\hbox{'}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq4.png) on w′
    should be less than *b*. So, for the points belonging to the positive class,
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，对于位于超平面下的点，即属于正类的输入向量 ![$$ {x}_{+}^{\prime}\in {R}^{n\times 1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq3.png)，在
    w′ 上的投影的负值应该小于 *b*。因此，对于属于正类的点，
- en: '![$$ -{w^{\prime}}^T{x}^{\prime}\left\langle b=\right\rangle {w^{\prime}}^T{x}^{\prime
    }+b&gt;0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equb.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equb.png)'
- en: Similarly, for points lying above the hyperplane, i.e., the input vectors ![$$
    {x}_{+}^{\prime}\in {R}^{n\times 1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq5.png)
    belonging to the negative class, the negative of the projection of ![$$ {x}_{-}^{\hbox{'}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq6.png) on w′
    should be greater than *b*. So, for the points belonging to the negative class,
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，对于位于超平面上的点，即属于负类的输入向量 ![$$ {x}_{+}^{\prime}\in {R}^{n\times 1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq5.png)，在
    w′ 上的投影的负值应该大于 *b*。因此，对于属于负类的点，
- en: '![$$ -{w^{\prime}}^T{x}^{\prime }&gt;b=&gt;{w^{\prime}}^T{x}^{\prime }+b&lt;0
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equc.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equc.png)'
- en: 'Summarizing the preceding deductions, we can conclude the following:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 总结前面的推导，我们可以得出以下结论：
- en: '*w*′^(*T*)*x*′ + *b* = 0  corresponds to the hyperplane, and all *x*′ ∈ *R*^(*n* × 1)
    that lie on the hyperplane will satisfy this condition. Generally, points on the
    hyperplane are taken to belong to the negative class.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*′^(*T*)*x*′ + *b* = 0 对应于超平面，并且所有位于超平面上的 *x*′ ∈ *R*^(*n* × 1) 都将满足这个条件。通常，位于超平面上的点被认为是属于负类的。'
- en: '*w*′*T**x*′ + *b* > 0 corresponds to all points in the positive class.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*′*T**x*′ + *b* > 0 对应于正类中的所有点。'
- en: '*w*′^(*T*)*x*′ + *b* ≤ 0 corresponds to all points in the negative class.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*′^(*T*)*x*′ + *b* ≤ 0 对应于负类中的所有点。'
- en: However, for Perceptron we don’t keep the weight vector *w*′ as a unit vector
    but rather keep it as any general vector. In such cases, the bias *b* would not
    correspond to the distance of the hyperplane from the origin, but rather it would
    be a scaled version of the distance from the origin, the scaling factor being
    the magnitude or the *l*² norm of the vector *w*′, i.e., *||w′||*[2]. Just to
    summarize, if *w*′ is any general vector perpendicular to the hyperplane and is
    pointing toward the positive class, then *w*′^(*T*)*x* + *b* = 0 still represents
    a hyperplane where *b* represents the distance of the hyperplane from the origin
    times the magnitude of *w*′.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于感知机，我们并不将权重向量 *w*′ 保持为单位向量，而是将其保持为任何一般向量。在这种情况下，偏置 *b* 不会对应于超平面到原点的距离，而将是对原点距离的缩放版本，缩放因子是向量
    *w*′ 的模或 *l*² 范数，即 *||w′||*[2]。简而言之，如果 *w*′ 是任何与超平面垂直且指向正类的通用向量，那么 *w*′^(*T*)*x* + *b* = 0
    仍然代表一个超平面，其中 *b* 代表超平面到原点的距离乘以 *w*′ 的大小。
- en: In the machine-learning domain, the task is to learn the parameters of the hyperplane
    (i.e., *w*′ and *b*). We generally tend to simplify the problem to get rid of
    the bias term and consume it as a parameter within *w* corresponding to a constant
    input feature of 1,1 as we discussed earlier in Chapter [1](448418_2_En_1_Chapter.xhtml).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习领域，任务是学习超平面的参数（即 *w*′ 和 *b*）。我们通常倾向于简化问题，以消除偏差项，并将其作为参数包含在 *w* 中，对应于我们之前在第
    [1](448418_2_En_1_Chapter.xhtml) 章节中讨论的常数输入特征 1。
- en: Let the new parameter vector after adding the bias be *w* ∈ *R*^((*n* + 1) × 1)
    and the new input features vector after adding the constant term 1 be *x* ∈ *R*^((*n* + 1) × 1),
    where
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在添加偏差后，新的参数向量为 *w* ∈ *R*^((*n* + 1) × 1)，添加常数项 1 后的新输入特征向量为 *x* ∈ *R*^((*n* + 1) × 1)，其中
- en: '![$$ {x}^{\prime }={\left[{x}_1\ {x}_2{x}_3..\kern0.5em {x}_n\right]}^T $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equd.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![x^{\prime }={\left[{x}_1\ {x}_2{x}_3..\kern0.5em {x}_n\right]}^T](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equd.png)'
- en: '![$$ x={\left[1\ {x}_1\ {x}_2{x}_3..\kern0.5em {x}_n\right]}^T $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Eque.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![x={\left[1\ {x}_1\ {x}_2{x}_3..\kern0.5em {x}_n\right]}^T](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Eque.png)'
- en: '![$$ {w}^{\hbox{''}}={\left[{w}_1\ {w}_2{w}_3..\kern0.5em {w}_n\right]}^T $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equf.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![w^{\hbox{''}}={\left[{w}_1\ {w}_2{w}_3..\kern0.5em {w}_n\right]}^T](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equf.png)'
- en: '![$$ w={\left[b\ {w}_1\ {w}_2{w}_3..\kern0.5em {w}_n\right]}^T $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equg.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![w={\left[b\ {w}_1\ {w}_2{w}_3..\kern0.5em {w}_n\right]}^T](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equg.png)'
- en: 'By doing the preceding manipulation, we’ve made the hyperplane in *R*^(*n*)
    at a distance from the origin pass through the origin in the *R*^((*n* + 1)) vector
    space. The hyperplane is now only determined by its weight parameter vector *w* ∈ *R*^((*n* + 1) × 1),
    and the rules for classification get simplified as follows:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 通过进行上述操作，我们使 *R*^(*n*) 中的超平面在原点处通过原点，在 *R*^((*n* + 1)) 向量空间中。现在超平面仅由其权重参数向量
    *w* ∈ *R*^((*n* + 1) × 1) 决定，分类规则简化如下：
- en: '*w*^(*T*)*x* = 0  corresponds to the hyperplane, and all *x* ∈ *R*^((*n* + 1) × 1)
    that lies on the hyperplane will satisfy this condition.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*^(*T*)*x* = 0 对应于超平面，并且所有位于超平面上的 *x* ∈ *R*^((*n* + 1) × 1) 都将满足这个条件。'
- en: '*w*^(*T*)*x* > 0 corresponds to all points in the positive class. This means
    the classification is now solely determined by the angle between the vectors *w*
    and *x*. If input vector *x* makes an angle within −90 degrees to +90 degrees
    with the weight parameter vector *w*, then the output class is positive.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*^(*T*)*x* > 0 对应于正类中的所有点。这意味着分类现在完全由向量 *w* 和 *x* 之间的角度决定。如果输入向量 *x* 与权重参数向量
    *w* 之间的角度在 -90 度到 +90 度之间，则输出类别为正。'
- en: '*w*^(*T*)*x* ≤ 0 corresponds to points in the negative class. The equality
    condition is treated differently in different classification algorithms. For Perceptrons,
    points on the hyperplanes are treated as belonging to the negative class.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*w*^(*T*)*x* ≤ 0 对应于负类中的点。不同分类算法中对等式条件有不同的处理方式。对于感知器，超平面上的点被视为属于负类。'
- en: Now we have everything we need to proceed with the Perceptron learning algorithm.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经拥有了进行感知器学习算法所需的一切。
- en: Let *x*^((*i*)) ∈ *R*^((*n* + 1) × 1) ∀ *i* ∈ {1, 2, …*m*} represent the *m*
    input feature vectors and *y*^((*i*)) ∈ {0, 1} ∀ *i* = {1, 2, …., *m*} the corresponding
    class label.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 让 *x*^((*i*)) ∈ *R*^((*n* + 1) × 1) ∀ *i* ∈ {1, 2, …*m*} 表示 *m* 个输入特征向量，*y*^((*i*)) ∈ {0,
    1} ∀ *i* = {1, 2, …., *m*} 表示相应的类别标签。
- en: 'The Perceptron learning problem is as follows:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器学习问题如下：
- en: 'Step 1: Start with a random set of weights *w* ∈ *R*^((*n* + 1) × 1).'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1步：从一个随机的权重集 *w* ∈ *R*^((*n* + 1) × 1) 开始。
- en: 'Step 2: Evaluate the predicted class for a data point. For an input data point
    *x*^((*i*)), if *w*^(*T*)*x*^((*i*)) > 0[,] then the predicted class ![$$ {y}_p^{(i)}=1
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq7.png) else ![$$
    {y}_p^{(i)}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq8.png).
    For the Perceptron classifier, points on the hyperplane are generally considered
    to belong to the negative class.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2步：评估数据点的预测类别。对于输入数据点 *x*^((*i*))，如果 *w*^(*T*)*x*^((*i*)) > 0，则预测类别 ![$$ {y}_p^{(i)}=1
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq7.png)，否则 ![$$
    {y}_p^{(i)}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq8.png)。对于感知器分类器，超平面上的点通常被认为是属于负类。
- en: 'Step 3: Update the weight vector *w* as follows:'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3步：按照以下方式更新权重向量 *w*：
- en: If *y*[*p*]^((*i*)) = 0 and the actual class *y*^((*i*)) = 1, update the weight
    vector as *w* = *w* + *x*^((*i*)).
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *y*[*p*]^((*i*)) = 0 且实际类别 *y*^((*i*)) = 1，则更新权重向量为 *w* = *w* + *x*^((*i*)).
- en: If *y*[*p*]^((*i*)) = 1 and the actual class *y*^((*i*)) = 0, update the weight
    vector as *w* = *w* − *x*^((*i*)).
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 *y*[*p*]^((*i*)) = 1 且实际类别 *y*^((*i*)) = 0，则更新权重向量为 *w* = *w* - *x*^((*i*)).
- en: If ![$$ {y}_p^{(i)}={y}^{(i)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq9.png)
    no updates are required to *w*.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 ![$$ {y}_p^{(i)}={y}^{(i)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq9.png)
    不需要更新 *w*。
- en: 'Step 4: Go to Step 2 and process the next data point.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第4步：回到第2步并处理下一个数据点。
- en: 'Step 5: Stop when all the data points have been correctly classified.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第5步：当所有数据点都被正确分类时停止。
- en: Perceptron will only be able to classify the two classes properly if there exists
    a feasible weight vector *w* that can linearly separate the two classes. In such
    cases, the Perceptron Convergence theorem guarantees convergence.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果存在一个可行权重向量 *w* 可以线性分离两个类，则感知机才能正确分类两个类。在这种情况下，感知机收敛定理保证了收敛。
- en: Geometrical Interpretation of Perceptron Learning
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 感知机学习的几何解释
- en: The geometrical interpretation of Perceptron learning sheds some light on the
    feasible weight vector *w* that represents a hyperplane separating the positive
    and the negative classes.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 感知机学习的几何解释有助于阐明表示正负类分离超平面的可行权重向量 *w*。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig5_HTML.jpg)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig5_HTML.jpg)'
- en: Hyperplanes one and two are represented in the image as they intersect at the
    origin. cone of feasible is formed between the two planes.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 超平面一和二在图像中表现为它们在原点相交，形成可行锥体。
- en: Figure 2-5
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-5
- en: Hyperplanes in weight space and feasible set of weight vectors
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 权重空间中的超平面和权重向量的可行集
- en: Let us take two data points, (*x*^((1)), *y*^((1))) and (*x*^((2)), *y*^((2))),
    as illustrated in Figure [2-5](#Fig5). Further, let *x*^((*i*)) ∈ ℝ^(3 × 1) *x*^((*I*)) ∈ *R*^(3 × 1)
    include the constant feature of 1 for the intercept term. Also, let’s take *y*^((1)) = 1
    and *y*^((2)) = 0 (i.e., data point 1 belongs to the positive class, while data
    point 2 belongs to the negative class).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们取两个数据点，(*x*^((1)), *y*^((1))) 和 (*x*^((2)), *y*^((2)))，如图 [2-5](#Fig5) 所示。进一步，让
    *x*^((*i*)) ∈ ℝ^(3 × 1) *x*^((*I*)) ∈ *R*^(3 × 1) 包含截距项的常数特征1。此外，取 *y*^((1)) =
    1 和 *y*^((2)) = 0（即数据点1属于正类，而数据点2属于负类）。
- en: In an input feature vector space, the weight vector determines the hyperplane.
    Along the same lines, we need to consider the individual input vectors as being
    representative of hyperplanes in the weight space to determine the feasible set
    of weight vectors for classifying the data points correctly.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在输入特征向量空间中，权重向量确定超平面。同样，我们需要考虑单个输入向量作为权重空间中代表超平面的代表，以确定正确分类数据点的可行权重向量集。
- en: In Figure [2-5](#Fig5), hyperplane 1 is determined by input vector *x*^((1)),
    which is perpendicular to hyperplane 1\. Also, the hyperplane passes through the
    origin since the bias term has been consumed as a parameter within the weight
    vector *w*. For the first data point, *y*^((1)) = 1\. The prediction for the first
    data point would be correct if *w*^(*T*)*x*^((1)) > 0\. All the weight vectors
    *w* that are within an angle of -90 to +90 degrees from the input vector *x*^((1))
    would satisfy the condition *w*^(*T*)*x*^((1)) > 0\. They form the feasible set
    of weight vectors for the first data point, as illustrated by the shaded region
    above hyperplane 1 in Figure [2-5](#Fig5).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [2-5](#Fig5) 中，超平面1由输入向量 *x*^((1)) 确定，该向量垂直于超平面1。此外，由于偏差项已被消耗为权重向量 *w* 中的参数，该超平面通过原点。对于第一个数据点，*y*^((1))
    = 1。如果 *w*^(*T*)*x*^((1)) > 0，则对第一个数据点的预测将是正确的。所有与输入向量 *x*^((1)) 形成角度在-90到+90度之间的权重向量
    *w* 都将满足条件 *w*^(*T*)*x*^((1)) > 0。它们构成了第一个数据点的可行权重向量集，如图 [2-5](#Fig5) 中超平面1上方的阴影区域所示。
- en: Similarly, hyperplane 2 is determined by input vector *x*^((2)), which is perpendicular
    to hyperplane 2\. For the second data point, *y*^((2)) = 0\. The prediction for
    the second data point would be correct if *w*^(*T*)*x*^((2)) ≤ 0\. All the weight
    vectors *w* that are beyond an angle of -90 to +90 degrees from the input vector
    *x*^((2)) would satisfy the condition *w*^(*T*)*x*^((2)) ≤ 0\. They form the feasible
    set of weight vectors for the second data point as illustrated by the shaded region
    below hyperplane 2 in Figure [2-5](#Fig5).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，超平面2由输入向量 *x*^((2)) 确定，该向量垂直于超平面2。对于第二个数据点，*y*^((2)) = 0。如果对于第二个数据点的预测 *w*^(*T*)*x*^((2)) ≤ 0，则预测是正确的。所有与输入向量
    *x*^((2)) 形成角度在-90到+90度之间的权重向量 *w* 都会满足条件 *w*^(*T*)*x*^((2)) ≤ 0。它们构成了第二个数据点的权重向量可行集，如图[2-5](#Fig5)中超平面2下方的阴影区域所示。
- en: So, the set of weight vectors *w* that satisfy both the data points is the region
    of overlap between the two shaded regions. Any weight vector *w* in the region
    of overlap would be able to linearly separate the two data points by the hyperplanes
    they define in the input vector space.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，满足两个数据点的权重向量 *w* 集合是两个阴影区域的交集区域。任何位于交集区域的权重向量 *w* 都能够通过它们在输入向量空间中定义的超平面线性分离两个数据点。
- en: Limitations of Perceptron Learning
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 感知器学习的局限性
- en: The Perceptron learning rule can only separate classes if they are linearly
    separable in the input space. Even the very basic XOR gate logic can’t be implemented
    by the Perceptron learning rule.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器学习规则只能在输入空间中线性可分的情况下分离类别。即使是基本的异或门逻辑也无法通过感知器学习规则实现。
- en: 'For the XOR logic, the following are the input and the corresponding output
    label or classes:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 对于异或逻辑，以下为输入及其对应的输出标签或类别：
- en: '![$$ {x}_1=1,{x}_2=0\kern1.5em y=1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equh.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![x1=1,x2=0 y=1](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equh.png)'
- en: '![$$ {x}_1=0,{x}_2=1\kern1.5em y=1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equi.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![x1=0,x2=1 y=1](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equi.png)'
- en: '![$$ {x}_1=1,{x}_2=1\kern1.5em y=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equj.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![x1=1,x2=1 y=0](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equj.png)'
- en: '![$$ {x}_1=0,{x}_2=0\kern1.5em y=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equk.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![x1=0,x2=0 y=0](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equk.png)'
- en: Let us initialize the weight vector *w* → [ 0 0 0]^(*T*), where the first component
    of the weight vector corresponds to the bias term. Similarly, all the input vectors
    would have their first components as 1.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们初始化权重向量 *w* → [ 0 0 0]^(*T*)，其中权重向量的第一个分量对应于偏置项。同样，所有输入向量的第一个分量都为1。
- en: For *x*[1] = 1, *x*[2] = 0, *y* = 1, the prediction is ![$$ {\textrm{w}}^Tx=\left[0\
    0\ 0\right]\left[\begin{array}{c}1\\ {}1\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq10.png)
    = 0\. Since w^(*T*)*x* = 0, the data point would be classified as 0, which doesn’t
    match the actual class of 1\. Hence, the updated weight vector as per the Perceptron
    rule should be ![$$ w\to w+x=\left[\begin{array}{c}0\\ {}0\\ {}0\end{array}\right]+\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right]=\left[\begin{array}{c}1\\ {}1\\ {}0\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq11.png).
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 *x*[1] = 1, *x*[2] = 0, *y* = 1，预测是 ![$$ {\textrm{w}}^Tx=\left[0\ 0\ 0\right]\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq10.png)
    = 0。由于 w^(*T*)*x* = 0，数据点会被分类为0，这与实际类别1不符。因此，根据感知器规则更新的权重向量应该是 ![$$ w\to w+x=\left[\begin{array}{c}0\\
    {}0\\ {}0\end{array}\right]+\left[\begin{array}{c}1\\ {}1\\ {}0\end{array}\right]=\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq11.png).
- en: For *x*[1] = 0, *x*[2] = 1, *y* = 1, the prediction is ![$$ {\textrm{w}}^Tx=\left[1\
    1\ 0\right]\left[\begin{array}{c}1\\ {}0\\ {}1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq12.png)
    = 1\. Since w^(*T*)*x* = 1 > 0, the data point would be correctly classified as
    1\. Hence, there would be no update to the weight vector, and it stays at ![$$
    \left[\begin{array}{c}1\\ {}1\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq13.png)
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 *x*[1] = 0, *x*[2] = 1, *y* = 1，预测是 ![$$ {\textrm{w}}^Tx=\left[1\ 1\ 0\right]\left[\begin{array}{c}1\\
    {}0\\ {}1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq12.png)
    = 1。由于 w^(*T*)*x* = 1 > 0，数据点会被正确分类为1。因此，权重向量不会有更新，并保持在 ![$$ \left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq13.png)
- en: For *x*[1] = 1, *x*[2] = 1, *y* = 0, the prediction is ![$$ {\textrm{w}}^Tx=\left[1\
    1\ 0\right]\left[\begin{array}{c}1\\ {}1\\ {}1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq14.png)
    = 2\. Since w^(*T*)*x* = 2, the data point would be classified as 1, which doesn’t
    match the actual class of 0\. Hence, the updated weight vector should be ![$$
    w\to w-x=\left[\begin{array}{c}1\\ {}1\\ {}0\end{array}\right]-\left[\begin{array}{c}1\\
    {}1\\ {}1\end{array}\right]=\left[\begin{array}{c}0\\ {}0\\ {}-1\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq15.png).
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 *x*[1] = 1, *x*[2] = 1, *y* = 0，预测为 ![$$ {\textrm{w}}^Tx=\left[1\ 1\ 0\right]\left[\begin{array}{c}1\\
    {}1\\ {}1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq14.png)
    = 2。由于 w^(*T*)*x* = 2，数据点将被分类为 1，这与实际类别 0 不符。因此，更新的权重向量应该是 ![$$ w\to w-x=\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right]-\left[\begin{array}{c}1\\ {}1\\ {}1\end{array}\right]=\left[\begin{array}{c}0\\
    {}0\\ {}-1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq15.png)。
- en: For *x*[1] = 0, *x*[2] = 0, *y* = 0, the prediction is ![$$ {\textrm{w}}^Tx=\left[0\
    0-1\right]\left[\begin{array}{c}1\\ {}0\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq16.png)
    = 0\. Since w^(*T*)*x* = 0, the data point would be correctly classified as 0\.
    Hence, there would be no update to the weight vector *w*.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 *x*[1] = 0, *x*[2] = 0, *y* = 0，预测为 ![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\
    {}0\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq16.png)
    = 0。由于 w^(*T*)*x* = 0，数据点将被正确分类为 0。因此，权重向量 *w* 将不会更新。
- en: So, the weight vector after the first pass over the data points is *w* = [0 0 − 1]^(*T*).
    Based on the updated weight vector *w*, let’s evaluate how well the points have
    been classified.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在第一次遍历数据点后的权重向量为 *w* = [0 0 − 1]^(*T*). 基于更新的权重向量 *w*，让我们评估这些点被分类得有多好。
- en: For data point 1, ![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq17.png),
    so it is wrongly classified as class 0.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 1，![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\ {}1\\
    {}0\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq17.png)，因此它被错误地分类为类别
    0。
- en: For data point 2, ![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\
    {}0\\ {}1\end{array}\right]=-1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq18.png),
    so it is wrongly classified as class 0.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 2，![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\ {}0\\
    {}1\end{array}\right]=-1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq18.png)，因此它被错误地分类为类别
    0。
- en: For data point 3, ![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\
    {}1\\ {}1\end{array}\right]=-1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq19.png),
    so it is correctly classified as class 0.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 3，![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\ {}1\\
    {}1\end{array}\right]=-1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq19.png)，因此它被正确地分类为类别
    0。
- en: For data point 4, ![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\
    {}0\\ {}0\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq20.png),
    so it is correctly classified as class 0.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 4，![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\ {}0\\
    {}0\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq20.png)，因此它被正确地分类为类别
    0。
- en: 'Based on the preceding classifications, we see after the first iteration that
    the Perceptron algorithm managed to classify only the negative class correctly.
    If we were to apply the Perceptron learning rule over the data points again, the
    updates to the weight vector *w* in the second pass would be as follows:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 根据前面的分类，我们看到在第一次迭代后，感知机算法成功地将负类正确分类。如果我们再次在数据点上应用感知机学习规则，第二次遍历中权重向量 *w* 的更新如下：
- en: For data point 1, ![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq21.png)
    so it is wrongly classified as class 0\. Hence, the updated weight as per the
    Perceptron rule is ![$$ w\to w+x=\kern0.5em \left[\begin{array}{c}0\\ {}0\\ {}-1\end{array}\right]+\left[\begin{array}{c}1\\
    {}1\\ {}0\end{array}\right]=\left[\begin{array}{c}1\\ {}1\\ {}-1\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq22.png).
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 1，![$$ {\textrm{w}}^Tx=\left[0\ 0-1\right]\left[\begin{array}{c}1\\ {}1\\
    {}0\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq21.png)
    因此它被错误地分类为类别 0。因此，根据感知机规则更新的权重为 ![$$ w\to w+x=\kern0.5em \left[\begin{array}{c}0\\
    {}0\\ {}-1\end{array}\right]+\left[\begin{array}{c}1\\ {}1\\ {}0\end{array}\right]=\left[\begin{array}{c}1\\
    {}1\\ {}-1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq22.png)。
- en: For data point 2, ![$$ {\textrm{w}}^Tx=\left[1\ 1-1\right]\left[\begin{array}{c}1\\
    {}0\\ {}1\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq23.png)
    so it is wrongly classified as class 0\. Hence, the updated weight as per the
    Perceptron rule is ![$$ w\to w+x=\kern0.5em \left[\begin{array}{c}1\\ {}1\\ {}-1\end{array}\right]+\left[\begin{array}{c}1\\
    {}0\\ {}1\end{array}\right]=\left[\begin{array}{c}2\\ {}1\\ {}0\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq24.png).
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 2，![$$ {\textrm{w}}^Tx=\left[1\ 1-1\right]\left[\begin{array}{c}1\\ {}0\\
    {}1\end{array}\right]=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq23.png)，因此它被错误地分类为类别
    0。因此，根据感知机规则更新的权重为 ![$$ w\to w+x=\kern0.5em \left[\begin{array}{c}1\\ {}1\\ {}-1\end{array}\right]+\left[\begin{array}{c}1\\
    {}0\\ {}1\end{array}\right]=\left[\begin{array}{c}2\\ {}1\\ {}0\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq24.png)。
- en: For data point 3, ![$$ {\textrm{w}}^Tx=\left[2\ 10\right]\left[\begin{array}{c}1\\
    {}1\\ {}1\end{array}\right]=3 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq25.png),
    so it is wrongly classified as class 1\. Hence, the updated weight as per Perceptron
    rule is ![$$ w\to w-x=\kern0.5em \left[\begin{array}{c}2\\ {}1\\ {}0\end{array}\right]-\left[\begin{array}{c}1\\
    {}1\\ {}1\end{array}\right]=\left[\begin{array}{c}1\\ {}0\\ {}-1\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq26.png).
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 3，![$$ {\textrm{w}}^Tx=\left[2\ 10\right]\left[\begin{array}{c}1\\ {}1\\
    {}1\end{array}\right]=3 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq25.png)，因此它被错误地分类为类别
    1。因此，根据感知机规则更新的权重为 ![$$ w\to w-x=\kern0.5em \left[\begin{array}{c}2\\ {}1\\ {}0\end{array}\right]-\left[\begin{array}{c}1\\
    {}1\\ {}1\end{array}\right]=\left[\begin{array}{c}1\\ {}0\\ {}-1\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq26.png)。
- en: For data point 4, ![$$ {\textrm{w}}^Tx=\left[1\ 0-1\right]\left[\begin{array}{c}1\\
    {}0\\ {}0\end{array}\right]=1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq27.png)
    so it is wrongly classified as class 1\. Hence, the updated weight as per Perceptron
    rule is ![$$ w\to w-x=\kern0.5em \left[\begin{array}{c}1\\ {}0\\ {}-1\end{array}\right]-\left[\begin{array}{c}1\\
    {}0\\ {}0\end{array}\right]=\left[\begin{array}{c}0\\ {}0\\ {}-1\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq28.png)
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于数据点 4，![$$ {\textrm{w}}^Tx=\left[1\ 0-1\right]\left[\begin{array}{c}1\\ {}0\\
    {}0\end{array}\right]=1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq27.png)，因此它被错误地分类为类别
    1。因此，根据感知机规则更新的权重为 ![$$ w\to w-x=\kern0.5em \left[\begin{array}{c}1\\ {}0\\ {}-1\end{array}\right]-\left[\begin{array}{c}1\\
    {}0\\ {}0\end{array}\right]=\left[\begin{array}{c}0\\ {}0\\ {}-1\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq28.png)。
- en: The weight vector after the second pass is [0 0 − 1]^(*T*), which is the same
    as the weight vector after the first pass. From the observations made during the
    first and second passes of Perceptron learning, it’s clear that no matter how
    many passes we make over the data points, we will always end up with the weight
    vector [0 0 − 1]^(*T*). As we saw earlier, this weight vector can only classify
    the negative class correctly, and so we can safely infer without loss of generality
    that the Perceptron algorithm will always fail to model the XOR logic.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次遍历后的权重向量为 [0 0 − 1]^(*T*)，这与第一次遍历后的权重向量相同。从感知机学习第一次和第二次遍历期间做出的观察来看，很明显，无论我们对数据点进行多少次遍历，我们最终都会得到权重向量
    [0 0 − 1]^(*T*)。正如我们之前所看到的，这个权重向量只能正确分类负类，因此我们可以安全地推断，在一般情况下，感知机算法将始终无法模拟 XOR
    逻辑。
- en: Need for Nonlinearity
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非线性的需求
- en: As we have seen, the Perceptron algorithm can only learn a linear decision boundary
    for classification and hence cannot solve problems where nonlinearity in the decision
    boundary is a need. Through the illustration of the XOR problem, we saw that the
    Perceptron is incapable of linearly separating the two classes properly.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，感知机算法只能学习线性决策边界进行分类，因此不能解决决策边界非线性是必需的问题。通过 XOR 问题的说明，我们看到了感知机无法正确地线性分离两个类别。
- en: We need to have two hyperplanes to separate the two classes, as illustrated
    in Figure [2-6](#Fig6), and the one hyperplane learned through the Perceptron
    algorithm does not suffice to provide the required classification. In Figure [2-6](#Fig6),
    the data points in between the two hyperplane lines belong to the positive class,
    while the other two data points belong to the negative class. Requiring two hyperplanes
    to separate two classes is the equivalent of having a nonlinear classifier.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要两个超平面来分离两个类，如图[2-6](#Fig6)所示，而通过感知器算法学习的一个超平面不足以提供所需的分类。在图[2-6](#Fig6)中，两个超平面线之间的数据点属于正类，而其他两个数据点属于负类。需要两个超平面来分离两个类相当于拥有一个非线性分类器。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig6_HTML.jpg)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig6_HTML.jpg)'
- en: Hyperplanes one and two, which are represented as parallel lines, are displayed
    on the graph of the X O R problem.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 超平面一和二，表示为平行线，显示在XOR问题的图表中。
- en: Figure 2-6
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-6
- en: XOR problem with two hyperplanes to separate the two classes
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 使用两个超平面分离两个类的XOR问题
- en: A multi-layer Perceptron (MLP) can provide nonlinear separation between classes
    by introducing nonlinearity in the hidden layers. Do note that when a Perceptron
    outputs a 0 or 1 based on the total input received, the output is a nonlinear
    function of its input. Everything said and done while learning the weights of
    the multi-layer Perceptron is not possible to achieve via the Perceptron learning
    rule.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器（MLP）可以通过在隐藏层中引入非线性来实现类之间的非线性分离。请注意，当感知器根据接收到的总输入输出0或1时，输出是其输入的非线性函数。在学习多层感知器的权重过程中所说的和所做的一切都不可能通过感知器学习规则来实现。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig7_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig7_HTML.jpg)'
- en: The image of X O R logic implementation. A N D gate, X O R Gate, and O R Gate
    are the three nodes in the image.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: XOR逻辑实现图像。AND门、XOR门和OR门是图像中的三个节点。
- en: Figure 2-7
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-7
- en: XOR logic implementation with multi-layer Perceptron network
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 使用多层感知器网络实现XOR逻辑
- en: In Figure [2-7](#Fig7), the XOR logic has been implemented through a multi-layer
    Perceptron network. If we have a hidden layer comprising two Perceptrons, with
    one capable of performing the OR logic while the other is capable of performing
    the AND logic, then the whole network would be able to implement the XOR logic.
    The Perceptrons for the OR and AND logic can be trained using the Perceptron learning
    rule. However, the network as a whole can’t be trained through the Perceptron
    learning rule. If we look at the final input to the XOR gate, it will be a nonlinear
    function of its input to produce a nonlinear decision boundary.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[2-7](#Fig7)中，XOR逻辑通过多层感知器网络实现。如果我们有一个包含两个感知器的隐藏层，其中一个能够执行OR逻辑，而另一个能够执行AND逻辑，那么整个网络就能够实现XOR逻辑。OR和AND逻辑的感知器可以使用感知器学习规则进行训练。然而，整个网络不能通过感知器学习规则进行训练。如果我们观察XOR门的最终输入，它将是其输入的非线性函数，以产生非线性决策边界。
- en: Hidden-Layer Perceptrons’ Activation Function for Nonlinearity
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐藏层感知器的非线性激活函数
- en: If we make the activation functions of the hidden layers linear, then the output
    of the final neuron would be linear, and hence we would not be able to learn any
    nonlinear decision boundaries. To illustrate this, let’s try to implement the
    XOR function through hidden-layer units that have linear activation functions.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将隐藏层的激活函数设为线性，那么最终神经元的输出将是线性的，因此我们将无法学习任何非线性决策边界。为了说明这一点，让我们尝试通过具有线性激活函数的隐藏层单元来实现XOR函数。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig8_HTML.jpg)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig8_HTML.jpg)'
- en: The illustration of the linear output hidden layers. The three nodes h 1, h
    2, and h 3 are indicated by the arrows b 1, b 2, and b 3.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 线性输出隐藏层的示意图。节点h 1、h 2和h 3分别由箭头b 1、b 2和b 3指示。
- en: Figure 2-8
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-8
- en: Linear output hidden layers in a two-layer Perceptron network
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 两层感知器网络中的线性输出隐藏层
- en: 'Figure [2-8](#Fig8) shows a two-layer Perceptron network with one hidden layer.
    The hidden layer consists of two neuron units. We look at the overall output of
    the network when the activations in the hidden units are linear:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-8](#Fig8)显示了一个具有一个隐藏层的两层感知器网络。隐藏层由两个神经元单元组成。我们观察当隐藏单元的激活是线性时的网络整体输出：
- en: Output of the hidden unit *h*[1] = *w*[11]*x*[1] + *w*[21]*x*[2] + *b*[1]
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏单元 *h*[1] = *w*[11]*x*[1] + *w*[21]*x*[2] + *b*[1]
- en: Output of the hidden unit *h*[2] = *w*[12]*x*[1] + *w*[22]*x*[2] + *b*[2]
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏单元 *h*[2] 的输出 = *w*[12]*x*[1] + *w*[22]*x*[2] + *b*[2]
- en: Output of the output unit *p*[1] = *w*[1](*w*[11]*x*[1] + *w*[21]*x*[2] + *b*[1]) + *w*[2](*w*[12]*x*[1] + *w*[22]*x*[2] + *b*[2]) + *b*[3]
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 输出单元 *p*[1] 的输出 = *w*[1](*w*[11]*x*[1] + *w*[21]*x*[2] + *b*[1]) + *w*[2](*w*[12]*x*[1] + *w*[22]*x*[2] + *b*[2]) + *b*[3]
- en: '![$$ =\left({w}_1{w}_{11}+\kern0.5em {w}_2{w}_{12}\right){x}_1+\left({w}_1{w}_{21}+\kern0.5em
    {w}_2{w}_{22}\right){x}_2+{w}_1{b}_1+{w}_2{b}_2+{b}_3 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equl.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =\left({w}_1{w}_{11}+\kern0.5em {w}_2{w}_{12}\right){x}_1+\left({w}_1{w}_{21}+\kern0.5em
    {w}_2{w}_{22}\right){x}_2+{w}_1{b}_1+{w}_2{b}_2+{b}_3 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equl.png)'
- en: As deduced in the preceding lines, the final output of the network—i.e., the
    output of unit *p*[1]— is a linear function of its inputs, and thus the network
    can’t produce a nonlinear separation between classes.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，网络的最终输出，即单元 *p*[1] 的输出，是其输入的线性函数，因此网络不能在类别之间产生非线性分离。
- en: If instead of a linear output being produced by the hidden layer we introduce
    an activation function represented as *f*(*x*) = 1/(1 + *e*^(−*x*)), then the
    output of the hidden unit ![$$ {h}_1=1/\Big(1+{e}^{-\left({w}_{11}{x}_1+{w}_{21}{x}_2+{b}_1\right)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq29.png)).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 如果隐藏层产生的不是线性输出，而是引入一个表示为 *f*(*x*) = 1/(1 + *e*^(−*x*)) 的激活函数，那么隐藏单元的输出 ![$$
    {h}_1=1/\Big(1+{e}^{-\left({w}_{11}{x}_1+{w}_{21}{x}_2+{b}_1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq29.png))。
- en: Similarly, the output of the hidden unit ![$$ {h}_2=1/\left(1+{e}^{-\left({w}_{12}{x}_1+{w}_{22}{x}_2+{b}_2\right)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq30.png).
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，隐藏单元的输出 ![$$ {h}_2=1/\left(1+{e}^{-\left({w}_{12}{x}_1+{w}_{22}{x}_2+{b}_2\right)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq30.png)。
- en: The output of the output unit ![$$ {p}_1=\kern0.5em {w}_1/\left(1+{e}^{-\left({w}_{11}{x}_1+{w}_{21}{x}_2+{b}_1\right)}\right)+\kern0.5em
    {w}_2/\left(1+{e}^{-\left({w}_{12}{x}_1+{w}_{22}{x}_2+{b}_2\right)}\right)+{b}_3
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq31.png).
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 输出单元的输出 ![$$ {p}_1=\kern0.5em {w}_1/\left(1+{e}^{-\left({w}_{11}{x}_1+{w}_{21}{x}_2+{b}_1\right)}\right)+\kern0.5em
    {w}_2/\left(1+{e}^{-\left({w}_{12}{x}_1+{w}_{22}{x}_2+{b}_2\right)}\right)+{b}_3
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq31.png)。
- en: Clearly, the preceding output is nonlinear in its inputs and hence can learn
    more complex nonlinear decision boundaries rather than using a linear hyperplane
    for classification problems. The activation function for the hidden layers is
    called a sigmoid function, and we will discuss it in more detail in the subsequent
    sections.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，前面的输出在其输入上是非线性的，因此可以学习更复杂的非线性决策边界，而不是使用线性超平面进行分类问题。隐藏层的激活函数称为Sigmoid函数，我们将在后续章节中更详细地讨论它。
- en: Different Activation Functions for a Neuron/Perceptron
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 神经元/感知器的不同激活函数
- en: There are several activation functions for neural units, and their use varies
    with respect to the problem at hand and the topology of the neural network. In
    this section, we are going to discuss all the relevant activation functions that
    are used in today’s artificial neural networks.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 神经单元有几种激活函数，它们的使用取决于具体问题和神经网络的拓扑结构。在本节中，我们将讨论今天在人工神经网络中使用的所有相关激活函数。
- en: Linear Activation Function
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性激活函数
- en: In a linear neuron, the output is linearly dependent on its inputs. If the neuron
    receives three inputs *x*[1], *x*[2], and *x*[3], then the output *y* of the linear
    neuron is given by *y* = *w*[1]*x*[1] + *w*[2]*x*[2] + *w*[3]*x*[3] + *b*, where
    *w*[1], *w*[2], and *w*[3] are the synaptic weights for the input *x*[1], *x*[2],
    and *x*[3], respectively, and *b* is the bias at the neuron unit.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在线性神经元中，输出与其输入线性相关。如果神经元接收三个输入 *x*[1]、*x*[2] 和 *x*[3]，那么线性神经元的输出 *y* 由 *y* = *w*[1]*x*[1] + *w*[2]*x*[2] + *w*[3]*x*[3] + *b*
    给出，其中 *w*[1]、*w*[2] 和 *w*[3] 分别是输入 *x*[1]、*x*[2] 和 *x*[3] 的突触权重，而 *b* 是神经元单元的偏置。
- en: In vector notation, we can express the output *y* = *w*^(*T*)*x* + *b*.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在向量表示法中，我们可以表示输出 *y* = *w*^(*T*)*x* + *b*。
- en: If we take *w*^(*T*)*x* + *b* = *z*, then the output with respect to the net
    input *z* will be as represented in Figure [2-9](#Fig9).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们取 *w*^(*T*)*x* + *b* = *z*，那么相对于网络输入 *z* 的输出将如图 [2-9](#Fig9) 所示。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig9_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig9_HTML.jpg)'
- en: The image of the two-layer perceptron network. A horizontal line denotes the
    z axis, a vertical line denotes the y axis, and a diagonal line cuts across the
    point where the z and y axes converge.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 两层感知器网络的图像。水平线表示z轴，垂直线表示y轴，对角线穿过z轴和y轴交汇的点。
- en: Figure 2-9
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-9
- en: Linear output hidden layers in a two-layer Perceptron network
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 两层感知器网络中的线性输出隐藏层
- en: Binary Threshold Activation Function
  id: totrans-143
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 二进制阈值激活函数
- en: In a binary threshold neuron (see Figure [2-10](#Fig10)), if the net input to
    the neuron exceeds a specified threshold, then the neuron is activated; i.e.,
    outputs 1 or else it outputs 0\. If the net linear input to the neuron is *z* = *w*^(*T*)*x* + *b*
    and *k* is the threshold beyond which the neuron activates, then
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在二进制阈值神经元（见图 [2-10](#Fig10)）中，如果神经元的净输入超过一个指定的阈值，那么神经元就会被激活；即输出1，否则输出0。如果神经元的净线性输入是
    *z* = *w*^(*T*)*x* + *b*，而 *k* 是神经元激活的阈值，那么
- en: '![$$ y=1\kern2.25em if\ z&gt;k $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equm.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equm.png)'
- en: '![$$ y=0\kern2.25em if\ z\le k $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equn.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equn.png)'
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig10_HTML.jpg)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig10_HTML.jpg)'
- en: The binary threshold neuron's graph. The z-axis plot's distance from the origin
    is mentioned as k.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 二进制阈值神经元的图像。z轴的图示距离原点的距离被提及为k。
- en: Figure 2-10
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-10
- en: Binary threshold neuron
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 二进制阈值神经元
- en: Generally, the binary threshold neuron is adjusted to activate at threshold
    0 by adjusting the bias. The neuron is activated when *w*^(*T*)*x* + *b* > *k* => *w*^(*T*)*x* + (*b* − *k*) > 0.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，通过调整偏置，将二进制阈值神经元调整到在阈值0处激活。当 *w*^(*T*)*x* + *b* > *k* => *w*^(*T*)*x* + (*b*
    − *k*) > 0 时，神经元被激活。
- en: Sigmoid Activation Function
  id: totrans-152
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Sigmoid 激活函数
- en: 'The input–output relation for a sigmoid neuron is expressed as the following:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid 神经元的输入-输出关系表示如下：
- en: '![$$ y=1/\left(1+{e}^{-z}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equo.png)'
  id: totrans-154
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equo.png)'
- en: where *z* = *w*^(*T*)*x* + *b* is the net input to the *sigmoid* activation
    function.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *z* = *w*^(*T*)*x* + *b* 是 *sigmoid* 激活函数的净输入。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig11_HTML.jpg)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig11_HTML.jpg)'
- en: The sigmoid activation function graph. A linear curve plot, with reading 1 on
    the y axis, is displayed on the graph.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid 激活函数的图像。图表上显示的是一条线性曲线图，y轴上的读数为1。
- en: Figure 2-11
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-11
- en: Sigmoid activation function
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid 激活函数
- en: When the net input *z* to a sigmoid function is a positive large number *e*^(−*z*)
    ➤ 0 and so *y* ➤ 1.
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当sigmoid函数的净输入 *z* 为一个正的大数 *e*^(−*z*) ➤ 0，因此 *y* ➤ 1。
- en: When the net input *z* to a sigmoid is a negative large number *e*^(−*z*) ➤
    ∞ and so *y* ➤ 0.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当sigmoid的净输入 *z* 为一个负的大数 *e*^(−*z*) ➤ ∞，因此 *y* ➤ 0。
- en: When the net input *z* to a sigmoid function is 0, then *e*^(−*z*) = 1 and so
    ![$$ y=\frac{1}{2} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq32.png).
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当sigmoid函数的净输入 *z* 为0时，则 *e*^(−*z*) = 1，因此 ![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq32.png)。
- en: Figure [2-11](#Fig11) illustrates the input–output relationship of a sigmoid
    activation function. The output of a neuron that has a sigmoid activation function
    is very smooth and gives nice continuous derivatives, which works well when training
    a neural network. The output of a sigmoid activation function ranges between 0
    and 1\. Because of its capability to provide continuous values in the range of
    0 to 1, the sigmoid function is generally used to output probability with respect
    to a given class for a binary classification. The sigmoid activation functions
    in the hidden layers introduce nonlinearity so that the model can learn more complex
    features.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-11](#Fig11) 展示了sigmoid激活函数的输入-输出关系。具有sigmoid激活函数的神经元的输出非常平滑，并且给出很好的连续导数，这在训练神经网络时效果很好。sigmoid激活函数的输出范围在0到1之间。由于其能够在0到1的范围内提供连续值，sigmoid函数通常用于输出关于给定类别的概率，用于二进制分类。隐藏层中的sigmoid激活函数引入非线性，使得模型能够学习更复杂的特点。
- en: SoftMax Activation Function
  id: totrans-164
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: SoftMax 激活函数
- en: 'The SoftMax activation function is a generalization of the sigmoid function
    and is best suited for multiclass classification problems. If there are k output
    classes and the weight vector for the ith class is w(i), then the predicted probability
    for the ith class given the input vector *x* ∈ ℝ^(*n* × 1) is given by the following:'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: SoftMax激活函数是Sigmoid函数的推广，最适合多分类问题。如果有k个输出类别，第i个类别的权重向量为w(i)，那么给定输入向量*x* ∈ ℝ^(*n* × 1)的第i个类别的预测概率如下：
- en: '![$$ P\left({y}_i=1/x\right)=\frac{e^{w^{(i)T}x+{b}^{(i)}}}{\sum_{j=1}^k{e}^{w^{(j)T}x+{b}^{(j)}}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equp.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({y}_i=1/x\right)=\frac{e^{w^{(i)T}x+{b}^{(i)}}}{\sum_{j=1}^k{e}^{w^{(j)T}x+{b}^{(j)}}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equp.png)'
- en: where b(i) is the bias term for each output unit of the SoftMax.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 其中b(i)是SoftMax每个输出单元的偏差项。
- en: Let’s try to see the connection between a sigmoid function and a two-class SoftMax
    function.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试看看Sigmoid函数和二分类SoftMax函数之间的联系。
- en: Let’s say the two classes are y1 and y2 and the corresponding weight vectors
    for them are w(1) and w(2). Also, let the biases for them be b(1) and b(2), respectively.
    Let’s say the class corresponding to *y*[1] = 1 is the positive class.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 假设有两个类别y1和y2，它们对应的权重向量分别为w(1)和w(2)。同时，它们的偏差分别为b(1)和b(2)。假设对应于*y*[1] = 1的类别是正类。
- en: '![$$ P\left({y}_1=1/x\right)=\frac{e^{w^{(1)T}x+{b}^{(1)}}}{e^{w^{(1)T}x+{b}^{(1)}}+{e}^{w^{(2)T}x+{b}^{(2)}}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equq.png)'
  id: totrans-170
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({y}_1=1/x\right)=\frac{e^{w^{(1)T}x+{b}^{(1)}}}{e^{w^{(1)T}x+{b}^{(1)}}+{e}^{w^{(2)T}x+{b}^{(2)}}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equq.png)'
- en: '![$$ =\frac{1}{1+{e}^{-{\left({w}^{(1)}-{w}^{(2)}\right)}^Tx-\left({\textrm{b}}^{(1)}-{\textrm{b}}^{(2)}\right)}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equr.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =\frac{1}{1+{e}^{-{\left({w}^{(1)}-{w}^{(2)}\right)}^Tx-\left({\textrm{b}}^{(1)}-{\textrm{b}}^{(2)}\right)}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equr.png)'
- en: We can see from the preceding expression that the probability of the positive
    class for a two-class SoftMax has the same expression as that of a sigmoid activation
    function, the only difference being that in the sigmoid we only use one set of
    weights, while in the two-class SoftMax, there are two sets of weights. In sigmoid
    activation functions, we don’t use different sets of weights for the two different
    classes, and the set of weight taken is generally the weight of the positive class
    with respect to the negative class. In SoftMax activation functions, we explicitly
    take different sets of weights for different classes.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 从前面的表达式中我们可以看出，二分类SoftMax的正类概率与Sigmoid激活函数的表达式相同，唯一的区别在于Sigmoid中我们只使用一组权重，而在二分类SoftMax中，有两组权重。在Sigmoid激活函数中，我们不会为两个不同的类别使用不同的权重集，通常选取的权重集是正类相对于负类的权重。在SoftMax激活函数中，我们明确地为不同的类别使用不同的权重集。
- en: 'The loss function for the SoftMax layer as represented by Figure [2-12](#Fig12)
    is called categorical cross-entropy and is given by the following:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 软Max层的损失函数，如图[2-12](#Fig12)所示，被称为分类交叉熵，其表达式如下：
- en: '![$$ C=\sum \limits_{i=1}^k-{y}_i\log P\left({y}_i=1/x\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equs.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C=\sum \limits_{i=1}^k-{y}_i\log P\left({y}_i=1/x\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equs.png)'
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig12_HTML.jpg)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig12_HTML.jpg)'
- en: The image represents the softmax activation function. In the illustration, the
    rectangular vertical square has three nodes w of 1, w of 2, and w of K.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 该图像表示Softmax激活函数。在图中，矩形垂直方框有三个节点w，分别为1、2和K。
- en: Figure 2-12
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-12
- en: SoftMax activation function
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: SoftMax激活函数
- en: Rectified Linear Unit (ReLU) Activation Function
  id: totrans-179
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 线性整流单元（ReLU）激活函数
- en: In a rectified linear unit, as shown in Figure [2-13](#Fig13), the output equals
    the net input to the neuron if the overall input is greater than 0; however, if
    the overall input is less than or equal to 0, the neuron outputs a 0.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个ReLU单元中，如图[2-13](#Fig13)所示，如果整体输入大于0，则输出等于神经元的净输入；然而，如果整体输入小于或等于0，则神经元输出0。
- en: 'The output for a *ReLU* unit can be represented as follows:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 一个ReLU单元的输出可以表示如下：
- en: '![$$ y=\mathit{\max}\left(0,{w}^Tx+b\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equt.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![$$ y=\mathit{\max}\left(0,{w}^Tx+b\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equt.png)'
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig13_HTML.jpg)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig13_HTML.jpg)'
- en: The image of the rectified linear unit. In the first quadrant from the origin,
    a straight line is drawn diagonally.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 矩形线性单元的图像。从原点出发的第一象限中，画了一条对角线。
- en: Figure 2-13
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-13
- en: Rectified linear unit
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 矩形线性单元
- en: The ReLU is one of the key elements that has revolutionized deep learning. They
    are easier to compute. ReLUs combine the best of both worlds—they have a constant
    gradient, while the net input is positive and zero gradient elsewhere. If we take
    the sigmoid activation function, for instance, the gradient of the same is almost
    zero for very large positive and negative values, and hence the neural network
    might suffer from a vanishing-gradient problem. This constant gradient for positive
    net input ensures the gradient-descent algorithm doesn’t stop learning because
    of a vanishing gradient. At the same time, the zero output for a non-positive
    net input renders nonlinearity.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU 是深度学习革命性的关键元素之一。它们更容易计算。ReLU 结合了两者之长——它们具有恒定的梯度，而净输入为正时其他地方的梯度为零。如果我们以
    sigmoid 激活函数为例，对于非常大的正负值，其梯度几乎为零，因此神经网络可能会遭受梯度消失问题。对于正净输入的恒定梯度确保梯度下降算法不会因为梯度消失而停止学习。同时，非正净输入的零输出提供了非线性。
- en: There are several versions of rectified linear unit activation functions such
    as parametric rectified linear unit (PReLU) and leaky rectified linear unit.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 矩形线性单元激活函数有几个版本，如参数化矩形线性单元（PReLU）和漏矩形线性单元。
- en: 'For a normal ReLU activation function, the output and the gradients are zero
    for non-positive input values, and so the training can stop because of the zero
    gradient. For the model to have a non-zero gradient even while the input is negative,
    PReLU can be useful. The input–output relationship for a PReLU activation function
    is given by the following:'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 对于正常的 ReLU 激活函数，对于非正输入值，输出和梯度为零，因此训练可能会因为零梯度而停止。为了使模型即使在输入为负时也有非零梯度，PReLU 可能是有用的。PReLU
    激活函数的输入-输出关系如下：
- en: '![$$ y=\max \left(0,z\right)+\beta \min \left(0,z\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equu.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equu.png)'
- en: where *z* = *w*^(*T*)*x* + *b* is the net input to the PReLU activation function
    and *β* is the parameter learned through training.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *z* = *w*^(*T*)*x* + *b* 是 PReLU 激活函数的净输入，而 *β* 是通过训练学习到的参数。
- en: When *β* is set to −1, then *y* = |*z*| and the activation function is called
    absolute value ReLU. When *β* is set to some small positive value, typically around
    0.01, then the activation function is called leaky ReLU.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 当 *β* 设置为 -1 时，则 *y* = |*z*|，激活函数被称为绝对值 ReLU。当 *β* 设置为一些小的正数值，通常约为 0.01 时，则激活函数被称为漏
    ReLU。
- en: Tanh Activation Function
  id: totrans-193
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Tanh 激活函数
- en: 'The input–output relationship for a tanh activation function (see Figure [2-14](#Fig14))
    is expressed as follows:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: tanh 激活函数的输入-输出关系（见图 [2-14](#Fig14)）表示如下：
- en: '![$$ y=\frac{e^z-{e}^{-z}}{e^z+{e}^{-z}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equv.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equv.png)'
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig14_HTML.jpg)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig14_HTML.jpg)'
- en: The graph of the tan h activation function. the equation y is equal to tan h
    of z Is mentioned in the plot.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: tan h 激活函数的图像。图中提到了 y 等于 z 的 tan h 的方程。
- en: Figure 2-14
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-14
- en: Tanh activation function
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: Tanh 激活函数
- en: where *z* = *w*^(*T*)*x* + *b* is the net input to the tanh activation function.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *z* = *w*^(*T*)*x* + *b* 是 tanh 激活函数的净输入。
- en: When the net input *z* is a positive large number *e*^(−*z*) ➤ 0 and so *y*
    ➤ 1.
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当网络输入 *z* 是一个正的大数 *e*^(−*z*) ➤ 0，因此 *y* ➤ 1。
- en: When the net input *z* is a negative large number *e*^(*z*) ➤ 0 and so *y* ➤
    -1.
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当网络输入 *z* 是一个负的大数 *e*^(*z*) ➤ 0，因此 *y* ➤ -1。
- en: When the net input *z* is 0, then *e*^(−*z*) = 1 and so *y* = 0.
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当网络输入 *z* 为 0 时，则 *e*^(−*z*) = 1，因此 *y* = 0。
- en: As we can see, tanh activation functions can output values between -1 and +1.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，tanh 激活函数可以输出介于 -1 和 +1 之间的值。
- en: The sigmoid activation function saturates at around output 0\. While training
    the network, if the outputs in the layer are close to zero, the gradient vanishes
    and training stops. The tanh activation function saturates at -1 and + 1 values
    for the output and has well-defined gradients at around the 0 value of the output.
    So, with tanh activation functions such vanishing-gradient problems can be avoided
    around output 0.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: sigmoid激活函数在输出约为0时饱和。在训练网络时，如果层的输出接近零，梯度消失，训练停止。tanh激活函数在输出为-1和+1时饱和，并且在输出约为0时具有定义良好的梯度。因此，使用tanh激活函数可以避免输出0附近的梯度消失问题。
- en: SoftPlus Activation Function
  id: totrans-206
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: SoftPlus激活函数
- en: 'The SoftPlus activation function on an input z is defined as follows:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: SoftPlus激活函数在输入z上的定义如下：
- en: '![$$ f(z)={\log}_e\left(1+{e}^z\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equw.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equw.png)'
- en: 'It is not difficult to see that the gradient of the activation function with
    respect to the input is nothing but the sigmoid activation on the input as shown
    in the following:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 很容易看出，激活函数相对于输入的梯度不过是输入上的sigmoid激活，如下所示：
- en: '![$$ {f}^{\prime }(z)=\frac{1}{\left(1+{e}^{-z}\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equx.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equx.png)'
- en: The SoftPlus activation can be viewed as a smooth approximation of the ReLU
    function as can be seen from Figure [2-15](#Fig15).
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: SoftPlus激活函数可以看作是ReLU函数的平滑近似，如图[2-15](#Fig15)所示。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig15_HTML.jpg)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig15_HTML.jpg)'
- en: The graph represents the soft plus activation function. The graph includes the
    equation for f of x.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 图形表示软加激活函数。图形包括f(x)的方程。
- en: Figure 2-15
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-15
- en: SoftPlus activation function
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: SoftPlus激活函数
- en: The SoftPlus function can lead to instability when z is close to zero or when
    z is too large and hence is not often used. A modified version of the SoftPlus
    as shown in the following helps avoid such issues.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 当z接近零或z太大时，SoftPlus函数可能导致不稳定性，因此不常使用。以下所示SoftPlus的修改版本有助于避免此类问题。
- en: '![$$ f(z)=\max \left(0,z\right)+{\log}_e\left(1+{e}^{-\left|x\right|}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equy.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equy.png)'
- en: The SoftPlus function much like ReLU activation provides nonnegative outputs.
    For this reason, the SoftPlus activation is often used to output standard deviation
    in neural networks.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: SoftPlus函数与ReLU激活函数类似，提供非负输出。因此，SoftPlus激活函数常用于神经网络中输出标准差。
- en: Swish Activation Function
  id: totrans-219
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Swish激活函数
- en: 'The SoftPlus activation function on an input z is defined as the product of
    the input and the sigmoid activation on the input(see below):'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: SoftPlus激活函数在输入z上的定义是输入与输入上的sigmoid激活的乘积（见下文）：
- en: '![$$ f(z)=z\ast sigmoid(z)=\frac{z}{\left(1+{e}^{-z}\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equz.png)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equz.png)'
- en: One way Swish is different from the existing activation function is that Swish
    is non-monotonic in nature as can be seen from Figure [2-16](#Fig16).
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: Swish与现有激活函数的不同之处在于，Swish本质上是非单调的，如图[2-16](#Fig16)所示。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig16_HTML.jpg)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig16_HTML.jpg)'
- en: The graph of the swish activation function. The graph initially displays a relatively
    straight line before displaying the upward tendency.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: Swish激活函数的图形。图形最初显示一条相对直的线，然后显示上升趋势。
- en: Figure 2-16
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-16
- en: Swish activation function
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: Swish激活函数
- en: One of the potential advantages of Swish is that it has non-zero gradient for
    negative values of *z* which ensures that we do not have the dead neuron problem
    we face with ReLU activation. The sigmoid in the Swish activation acts like a
    gate attenuating the linear activation *z* for *z* < 0 yet keeping the gradient
    alive.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: Swish的一个潜在优势是，对于负值的z，它具有非零梯度，这确保了我们不会遇到ReLU激活函数所面临的神经元死亡问题。Swish激活函数中的sigmoid就像一个门，当z
    < 0时衰减线性激活z，同时保持梯度活跃。
- en: Swish as a replacement for ReLU suggests an improvement in classification accuracy
    on ImageNet by 0.9% and around 0.6% for Inception ResNet v2.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: Swish作为ReLU的替代品，表明在ImageNet上的分类准确率提高了0.9%，对于Inception ResNet v2大约提高了0.6%。
- en: Learning Rule for Multi-layer Perceptron Network
  id: totrans-229
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多层感知器网络的学习规则
- en: In an earlier section, we saw that the Perceptron learning rule can only learn
    linear decision boundaries. Nonlinear complex decision boundaries can be modeled
    through multi-layer Perceptrons; however, such a model cannot be learned through
    the Perceptron learning rule. Hence, one would need a different learning algorithm.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们了解到感知器学习规则只能学习线性决策边界。非线性复杂决策边界可以通过多层感知器来建模；然而，这样的模型不能通过感知器学习规则来学习。因此，需要一个不同的学习算法。
- en: In the Perceptron learning rule, the goal is to keep updating the weights of
    the model till all the training data points have been correctly classified. If
    there is no such feasible weight vector that classifies all the points correctly,
    the algorithm does not converge. In such cases, the algorithm can be stopped by
    predefining the number of passes (iterations) to train or by defining a threshold
    for the number of correctly classified training data points after which to stop
    the training.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在感知器学习规则中，目标是不断更新模型的权重，直到所有训练数据点都被正确分类。如果没有这样的可行权重向量可以正确分类所有点，算法就不会收敛。在这种情况下，可以通过预定义训练的迭代次数（遍历次数）或定义正确分类的训练数据点数阈值来停止训练。
- en: For multi-layer Perceptrons and for most of the deep-learning training networks,
    the best way to train the model is to compute a cost function based on the error
    of misclassification and then to minimize the cost function with respect to the
    parameters of the model. Since cost-based learning algorithms minimize the cost
    function, for binary classifications—generally the log-loss cost function—the
    negative of the log likelihood function is used. For reference, how the log-loss
    cost function is derived from maximum likelihood methods has been illustrated
    in Chapter [1](448418_2_En_1_Chapter.xhtml) under “Logistic Regression.”
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 对于多层感知器和大多数深度学习训练网络，训练模型的最佳方式是计算基于误分类错误的成本函数，然后根据模型参数最小化成本函数。由于基于成本的学习算法最小化成本函数，对于二分类——通常是对数损失成本函数——使用对数似然函数的负值。为了参考，如何从最大似然方法推导出对数损失成本函数已在“逻辑回归”部分第
    [1](448418_2_En_1_Chapter.xhtml) 章中说明。
- en: A multi-layer Perceptron network would have hidden layers, and to learn nonlinear
    decision boundaries, the activation functions should be nonlinear themselves,
    such as sigmoid, ReLU, tanh, and so forth. The output neuron for binary classification
    should have a sigmoid activation function in order to cater to the log-loss cost
    function and to output probability values for the classes.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器网络将包含隐藏层，为了学习非线性决策边界，激活函数本身也应该是非线性的，例如sigmoid、ReLU、tanh等。对于二分类，输出神经元应该具有sigmoid激活函数，以便适应对数损失成本函数并输出类别的概率值。
- en: Now, with the preceding considerations, let us try to solve the XOR function
    by building a log-loss cost function and then minimizing it with respect to the
    weight and bias parameters of the model. All the neurons in the network are taken
    to have sigmoid activation functions.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，根据前面的考虑，让我们尝试通过构建对数损失成本函数并最小化模型权重和偏置参数来求解XOR函数。网络中的所有神经元都采用sigmoid激活函数。
- en: Referring to Figure [2-7](#Fig7), let the input and output at hidden unit *h*[1]
    be *i*[1] and *z*[1], respectively. Similarly, let the input and output at hidden
    unit *h*[2] be *i*[2] and *z*[2], respectively. Finally, let the input and output
    at output layer *p*[1] be *i*[3] and *z*[3], respectively.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 参考图 [2-7](#Fig7)，设隐藏单元 *h*[1] 的输入和输出分别为 *i*[1] 和 *z*[1]。同样，设隐藏单元 *h*[2] 的输入和输出分别为
    *i*[2] 和 *z*[2]。最后，设输出层的输入和输出为 *p*[1] 和 *z*[3]。
- en: '![$$ {i}_1={w}_{11}{x}_1+{w}_{21}{x}_2+{b}_1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaa.png)'
  id: totrans-236
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $i_1=w_{11}x_1+w_{21}x_2+b_1$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaa.png)'
- en: '![$$ {i}_2={w}_{12}{x}_1+{w}_{22}{x}_2+{b}_2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equab.png)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $i_2=w_{12}x_1+w_{22}x_2+b_2$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equab.png)'
- en: '![$$ {z}_1=1/\left(1+{e}^{-{i}_1}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equac.png)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $z_1=1/\left(1+e^{-i_1}\right)$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equac.png)'
- en: '![$$ {z}_2=1/\left(1+{e}^{-{i}_2}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equad.png)'
  id: totrans-239
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $z_2=1/\left(1+e^{-i_2}\right)$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equad.png)'
- en: '![$$ {i}_3={w}_1{z}_1+{w}_2{z}_2+{b}_3 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equae.png)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {i}_3={w}_1{z}_1+{w}_2{z}_2+{b}_3 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equae.png)'
- en: '![$$ {z}_3=1/\left(1+{e}^{-{i}_3}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaf.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {z}_3=1/\left(1+{e}^{-{i}_3}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaf.png)'
- en: 'Considering the log-loss cost function, the total cost function for the XOR
    problem can be defined as follows:'
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到对数损失成本函数，XOR问题的总成本函数可以定义为以下：
- en: '![$$ C=\kern0.5em \sum \limits_{i=1}^4-{y}^{(i)}{logz_3}^{(i)}-\left(1-{y}^{(i)}\right)\log
    \left(1-{z_3}^{(i)}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equag.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C=\kern0.5em \sum \limits_{i=1}^4-{y}^{(i)}{logz_3}^{(i)}-\left(1-{y}^{(i)}\right)\log
    \left(1-{z_3}^{(i)}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equag.png)'
- en: 'If all the weights and biases put together can be thought of as a parameter
    vector *θ*, we can learn the model by minimizing the cost function *C*(*θ*):'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 如果所有权重和偏差加在一起可以被视为参数向量 *θ*，我们可以通过最小化成本函数 *C*(*θ*) 来学习模型：
- en: '![$$ {\theta}^{\ast }=\underset{\theta }{Arg \operatorname {Min}}C\left(\theta
    \right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equah.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\ast }=\underset{\theta }{Arg \operatorname {Min}}C\left(\theta
    \right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equah.png)'
- en: For minima, the gradient of the cost function *C*(*θ*) with respect to *θ* (i.e.,
    ∇*C*(*θ*)) should be zero. The minima can be reached through gradient-descent
    methods. The update rule for gradient descent is *θ*^((*t* + 1)) = *θ*^((*t*)) − η ∇ *C*(*θ*^((*t*))),
    where η is the learning rate and *θ*^((*t* + 1)) and *θ*^((*t*)) are the parameter
    vectors at iterations *t* + 1 and *t*, respectively.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最小值，成本函数 *C*(*θ*) 关于 *θ* 的梯度（即，∇*C*(*θ*)）应为零。最小值可以通过梯度下降法达到。梯度下降的更新规则为 *θ*^((*t* + 1))
    = *θ*^((*t*)) − η ∇ *C*(*θ*^((*t*))), 其中 η 是学习率，*θ*^((*t* + 1)) 和 *θ*^((*t*))
    分别是迭代 *t* + 1 和 *t* 时的参数向量。
- en: 'If we consider individual weight within the parameter vector, the gradient-descent
    update rule becomes the following:'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们考虑参数向量中的单个权重，梯度下降的更新规则变为以下：
- en: '![$$ {w_k}^{\left(t+1\right)}={w_k}^{(t)}-\upeta \frac{\partial C\left({w_k}^{(t)}\right)}{\partial
    {w}_k}\kern0.75em \forall {w}_k\in \theta $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equai.png)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w_k}^{\left(t+1\right)}={w_k}^{(t)}-\upeta \frac{\partial C\left({w_k}^{(t)}\right)}{\partial
    {w}_k}\kern0.75em \forall {w}_k\in \theta $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equai.png)'
- en: The gradient vector would not be as easy to compute as it would be in linear
    or logistic regression since in neural networks the weights follow a hierarchical
    order. However, the chain rule of derivatives provides for some simplification
    to methodically compute the partial derivatives with respect to the weights (including
    biases).
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在神经网络中权重遵循层次顺序，梯度向量可能不像在线性或逻辑回归中那样容易计算。然而，导数的链式法则为有系统地计算关于权重的偏导数（包括偏差）提供了一些简化。
- en: The method is called *backpropagation*, and it provides simplification in gradient
    computation.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法被称为 *反向传播*，它在梯度计算中提供了简化。
- en: Backpropagation for Gradient Computation
  id: totrans-251
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反向传播用于梯度计算
- en: Backpropagation is a useful method of propagating the error at the output layer
    backward so that the gradients at the preceding layers can be computed easily
    using the chain rule of derivatives.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播是一种有用的方法，可以将输出层的错误反向传播，以便可以使用导数的链式法则轻松计算前一层级的梯度。
- en: 'Let us consider one training example and work through the backpropagation,
    taking the XOR network structure into account (see Figure [2-8](#Fig8)). Let the
    input be *x* = [*x*[1] *x*[2]]^(*T*) and the corresponding class be *y*. So, the
    cost function for the single record becomes the following:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑一个训练示例，并通过考虑 XOR 网络结构来执行反向传播（见图 [2-8](#Fig8)）。设输入为 *x* = [*x*[1] *x*[2]]^(*T*)，相应的类别为
    *y*。因此，单个记录的成本函数变为以下：
- en: '![$$ C=-{ylogz}_3-\left(1-y\right)\ \log \left(1-{z}_3\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaj.png)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C=-{ylogz}_3-\left(1-y\right)\ \log \left(1-{z}_3\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaj.png)'
- en: '![$$ \frac{\partial C}{\partial {w}_1}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {w}_1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equak.png)'
  id: totrans-255
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial C}{\partial {w}_1}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {w}_1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equak.png)'
- en: '![$$ \frac{dC}{dz_3}=\frac{\left({z}_3-y\right)}{z_3\left(1-{z}_3\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equal.png)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{dC}{dz_3}=\frac{\left({z}_3-y\right)}{z_3\left(1-{z}_3\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equal.png)'
- en: '![$$ {z}_3=1/\left(1+{e}^{-{z}_3}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equam.png)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![z_3的计算公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equam.png)'
- en: '![$$ \frac{dz_3}{di_3}={z}_3\left(1-{z}_3\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equan.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![z_3对i_3的导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equan.png)'
- en: '![$$ \frac{dC}{di_3}=\frac{dC}{dz_3}\frac{dz_3}{di_3}=\frac{\left({z}_3-y\right)}{z_3\left(1-{z}_3\right)}{z}_3\left(1-{z}_3\right)=\left({z}_3-y\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equao.png)'
  id: totrans-259
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数对i_3的导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equao.png)'
- en: 'As we can see, the derivative of the cost function with respect to the net
    input in the final layer is nothing but the error in estimating the output (*z*[3] − *y*):'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，最终层中关于净输入的成本函数的导数不过是估计输出误差（*z*[3] − *y*）：
- en: '![$$ \frac{\partial {i}_3}{\partial {w}_1}={z}_1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equap.png)'
  id: totrans-261
  prefs: []
  type: TYPE_IMG
  zh: '![i_3对w_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equap.png)'
- en: '![$$ \frac{\partial C}{\partial {w}_1}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {w}_1}=\left({z}_3-y\right){z}_1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaq.png)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数对w_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaq.png)'
- en: Similarly,
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，
- en: '![$$ \frac{\partial C}{\partial {w}_2}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {w}_2}=\left({z}_3-y\right){z}_2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equar.png)'
  id: totrans-264
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数对w_2的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equar.png)'
- en: '![$$ \frac{\partial C}{\partial {b}_3}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {b}_3}=\left({z}_3-y\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equas.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数对b_3的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equas.png)'
- en: 'Now, let us compute the partial derivatives of the cost function with respect
    to the weights in the previous layer:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们计算成本函数关于前一层权重的偏导数：
- en: '![$$ \frac{\partial C}{\partial {z}_1}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {z}_1}=\left({z}_3-y\right){w}_1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equat.png)'
  id: totrans-267
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数对z_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equat.png)'
- en: '![$$ \frac{\partial C}{\partial {z}_1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq33.png)
    can be treated as the error with respect to the output of the hidden-layer unit
    *h*[1]. The error is propagated in proportion to the weight that is joining the
    output unit to the hidden-layer unit. If there were multiple output units, then
    ![$$ \frac{\partial C}{\partial {z}_1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq34.png)
    would have a contribution from each of the output units. We will see this in detail
    in the next section.'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: '![对z_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq33.png)
    可以被视为关于隐藏层单元*h*[1]输出的误差。误差会按照连接输出单元和隐藏层单元的权重比例传播。如果有多个输出单元，那么![对z_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq34.png)将会有来自每个输出单元的贡献。我们将在下一节中详细看到这一点。'
- en: Similarly,
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，
- en: '![$$ \frac{\partial C}{\partial {i}_1}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {z}_1}\frac{dz_1}{di_1}=\left({z}_3-y\right){w}_1{z}_1\left(1-{z}_1\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equau.png)'
  id: totrans-270
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数对i_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equau.png)'
- en: '![$$ \frac{\partial C}{\partial {i}_1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq35.png)
    can be considered the error with respect to the net input of the hidden-layer
    unit *h*[1]. It can be computed by just multiplying the *z*[1](1 − *z*[1]) factor
    by ![$$ \frac{\partial C}{\partial {z}_1} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq36.png):'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: '![成本函数对i_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq35.png)
    可以被认为是关于隐藏层单元*h*[1]净输入的误差。它可以通过将*z*[1](1 − *z*[1])因子乘以![对z_1的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq36.png)来计算：'
- en: '![$$ \frac{\partial C}{\partial {w}_{11}}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {z}_1}\frac{dz_1}{di_1}\frac{\partial {i}_i}{\partial {w}_{11}}=\left({z}_3-y\right){w}_1{z}_1\left(1-{z}_1\right){x}_1
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equav.png)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equav.png)'
- en: '![$$ \frac{\partial C}{\partial {w}_{21}}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {z}_1}\frac{dz_1}{di_1}\frac{\partial {i}_i}{\partial {w}_{21}}=\left({z}_3-y\right){w}_1{z}_1\left(1-{z}_1\right){x}_2
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaw.png)'
  id: totrans-273
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaw.png)'
- en: '![$$ \frac{\partial C}{\partial {b}_1}=\frac{dC}{dz_3}\frac{dz_3}{di_3}\frac{\partial
    {i}_3}{\partial {z}_1}\frac{dz_1}{di_1}\frac{\partial {i}_i}{\partial {w}_{21}}=\left({z}_3-y\right){w}_1{z}_1\left(1-{z}_1\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equax.png)'
  id: totrans-274
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equax.png)'
- en: Once we have the partial derivative of the cost function with respect to the
    input in each neuron unit, we can compute the partial derivative of the cost function
    with respect to the weight contributing to the input—we just need to multiply
    the input coming through that weight.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们得到了每个神经元单元关于输入的成本函数的偏导数，我们就可以计算关于贡献输入的权重的成本函数的偏导数——我们只需乘以通过该权重的输入。
- en: Generalizing the Backpropagation Method for Gradient Computation
  id: totrans-276
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推广反向传播方法进行梯度计算
- en: In this section, we try to generalize the backpropagation method through a more
    complicated network. We assume the final output layer is composed of three independent
    sigmoid output units, as depicted in Figure [2-17](#Fig17). Also, we assume that
    the network has a single record for ease of notation and for simplification in
    learning.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们试图通过一个更复杂的网络推广反向传播方法。我们假设最终输出层由三个独立的sigmoid输出单元组成，如图 [2-17](#Fig17) 所示。此外，我们假设网络只有一个记录，以便于符号表示和简化学习过程。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig17_HTML.jpg)'
  id: totrans-278
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig17_HTML.jpg)'
- en: The input, hidden unit output, output units, and output unit output are highlighted
    by the network model.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 网络模型突出了输入、隐藏单元输出、输出单元以及输出单元输出。
- en: Figure 2-17
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-17
- en: Network to illustrate backpropagation for independent sigmoid output layers
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 网络图示独立sigmoid输出层的反向传播
- en: 'The cost function for a single input record is given by the following:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 单个输入记录的成本函数如下所示：
- en: '![$$ C=\sum \limits_{i=1}^3-{y}_i\log P\left({y}_i=1\right)-\left(1-{y}_i\right)\log
    \left(1-P\left({y}_i=1\right)\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equay.png)'
  id: totrans-283
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equay.png)'
- en: '![$$ =\sum \limits_{i=1}^3-{y}_i\log {\textrm{z}}_i^{(3)}-\left(1-{y}_i\right)\log
    \left(1-{\textrm{z}}_i^{(3)}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaz.png)'
  id: totrans-284
  prefs: []
  type: TYPE_IMG
  zh: '![损失函数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equaz.png)'
- en: In the preceding expression, *y*[*i*] ∈ {0, 1}, depending on whether the event
    specific to *y*[*i*] is active or not.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的表达式中，*y*[*i*] ∈ {0, 1}，根据特定于 *y*[*i*] 的事件是否激活而定。
- en: '![$$ P\left({y}_i=1\right)={\textrm{z}}_i^{(3)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq37.png)
    denotes the predicted probability of the *ith* class.'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: '![预测概率公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq37.png)
    表示第 *ith* 类的预测概率。'
- en: Let us compute the partial derivative of the cost function with respect to the
    weight *w*[*ji*]^((2)). The weight would only impact the output of the *ith* output
    unit of the network.
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算成本函数关于权重 *w*[*ji*]^((2)) 的偏导数。权重只会影响网络的 *ith* 输出单元的输出。
- en: '![$$ \frac{\partial C}{\partial {w}_{ji}^{(2)}}=\frac{\partial C}{\partial
    {\textrm{z}}_i^{(3)}}\frac{\partial {\textrm{z}}_i^{(3)}}{\partial {\textrm{s}}_i^{(3)}}\frac{\partial
    {\textrm{s}}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equba.png)'
  id: totrans-288
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equba.png)'
- en: '![$$ \frac{\partial C}{\partial {\textrm{z}}_i^{(3)}}=\frac{\left({\textrm{z}}_i^{(3)}-{y}_i\right)}{{\textrm{z}}_i^{(3)}\left(1-{\textrm{z}}_i^{(3)}\right)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbb.png)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbb.png)'
- en: '![$$ P\left({y}_i=1\right)={\textrm{z}}_i^{(3)}=1/\left(1+{e}^{-{\textrm{s}}_i^{(3)}}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbc.png)'
  id: totrans-290
  prefs: []
  type: TYPE_IMG
  zh: '![概率公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbc.png)'
- en: '![$$ \frac{\partial {\textrm{z}}_i^{(3)}}{\partial {\textrm{s}}_i^{(3)}}={\textrm{z}}_i^{(3)}\left(1-{\textrm{z}}_i^{(3)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbd.png)'
  id: totrans-291
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbd.png)'
- en: '![$$ \frac{\partial C}{\partial {\textrm{s}}_i^{(3)}}=\frac{\partial C}{\partial
    {\textrm{z}}_i^{(3)}}\frac{\partial {\textrm{z}}_i^{(3)}}{\partial {\textrm{s}}_i^{(3)}}=\frac{\left({\textrm{z}}_i^{(3)}-{y}_i\right)}{{\textrm{z}}_i^{(3)}\left(1-{\textrm{z}}_i^{(3)}\right)}{\textrm{z}}_i^{(3)}\left(1-{\textrm{z}}_i^{(3)}\right)=\left({\textrm{z}}_i^{(3)}-{y}_i\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Eqube.png)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Eqube.png)'
- en: So, as before, the partial derivative of the cost function with respect to the
    net input for the *ith* output unit is ![$$ \left({\textrm{z}}_i^{(3)}-{y}_i\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq38.png) which
    is nothing but the error in prediction at the *ith* output unit.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，与之前一样，第*i*个输出单元的净输入相对于成本函数的偏导数是![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq38.png)，这实际上就是第*i*个输出单元预测误差。
- en: '![$$ \frac{\partial {\textrm{s}}_i^{(3)}}{\partial {w}_{ji}^{(2)}}={\textrm{z}}_j^{(2)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbf.png)'
  id: totrans-294
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbf.png)'
- en: 'Combining ![$$ \frac{\partial C}{\partial {\textrm{s}}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq39.png)
    and ![$$ \frac{\partial {\textrm{s}}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq40.png),
    we get the following:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 将![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq39.png)和![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq40.png)结合，我们得到以下结果：
- en: '![$$ \frac{\partial C}{\partial {w}_{ji}^{(2)}}=\left({\textrm{z}}_i^{(3)}-{y}_i\right){\textrm{z}}_j^{(2)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbg.png)'
  id: totrans-296
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbg.png)'
- en: '![$$ \frac{\partial C}{\partial {b}_i^{(2)}}=\left({\textrm{z}}_i^{(3)}-{y}_i\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbh.png)'
  id: totrans-297
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbh.png)'
- en: 'The preceding gives a generalized expression for partial derivatives of the
    cost function with respect to weights and biases in the last layer of the network.
    Next, let us compute the partial derivative of the weights and biases in the lower
    layers. Things get a little more involved but still follow a generalized trend.
    Let us compute the partial derivative of the cost function with respect to the
    weight *w*[*kj*]^((1)). The weight would be impacted by the errors at all three
    output units. Basically, the error at the output of the *jth* unit in the hidden
    layer would have an error contribution from all output units, scaled by the weights
    connecting the output layers to the *jth* hidden unit. Let us compute the partial
    derivative just by the chain rule and see if it lives up to what we have proclaimed:'
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的内容给出了关于网络最后一层权重和偏置的代价函数偏导数的通用表达式。接下来，让我们计算下层权重和偏置的偏导数。事情变得稍微复杂一些，但仍然遵循一个通用的趋势。让我们通过链式法则计算代价函数关于权重
    *w*[*kj*]^((1)) 的偏导数。这个权重会受到所有三个输出单元错误的 影响。基本上，隐藏层中 *jth* 单元的输出错误会有来自所有输出单元的错误贡献，这些贡献通过连接输出层到
    *jth* 隐藏单元的权重进行缩放。让我们通过链式法则进行计算，看看它是否符合我们之前宣称的：
- en: '![$$ \frac{\partial C}{\partial {w}_{kj}^{(1)}}=\frac{\partial C}{\partial
    {\textrm{z}}_j^{(2)}}\frac{\partial {\textrm{z}}_j^{(2)}}{\partial {\textrm{s}}_j^{(2)}}\frac{\partial
    {\textrm{s}}_j^{(2)}}{\partial {w}_{kj}^{(1)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbi.png)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbi.png)'
- en: '![$$ \frac{\partial {\textrm{s}}_j^{(2)}}{\partial {w}_{kj}^{(1)}}={\textrm{z}}_k^{(1)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbj.png)'
  id: totrans-300
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbj.png)'
- en: '![$$ \frac{\partial {\textrm{z}}_j^{(2)}}{\partial {\textrm{s}}_j^{(2)}}={\textrm{z}}_j^{(2)}\left(1-{\textrm{z}}_j^{(2)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbk.png)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbk.png)'
- en: 'Now, ![$$ \frac{\partial C}{\partial {\textrm{z}}_j^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq41.png)
    is the tricky computation since z[*j*]^((2)) influences all three output units:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq41.png)
    是一个棘手的计算，因为 z[*j*]^((2)) 影响到所有的三个输出单元：
- en: '![$$ \frac{\partial C}{\partial {\textrm{z}}_j^{(2)}}=\sum \limits_{i=1}^3\frac{\partial
    C}{\partial {\textrm{z}}_i^{(3)}}\frac{\partial {\textrm{z}}_i^{(3)}}{\partial
    {\textrm{s}}_i^{(3)}}\frac{\partial {\textrm{s}}_i^{(3)}}{\partial {\textrm{z}}_j^{(2)}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbl.png)'
  id: totrans-303
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbl.png)'
- en: '![$$ =\kern0.5em \sum \limits_{i=1}^3\left({\textrm{z}}_i^{(3)}-{y}_i\right){w}_{ji}^{(2)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbm.png)'
  id: totrans-304
  prefs: []
  type: TYPE_IMG
  zh: '![等式公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbm.png)'
- en: 'Combining the expressions for ![$$ \frac{\partial {\textrm{s}}_j^{(2)}}{\partial
    {w}_{kj}^{(1)}},\frac{\partial {\textrm{z}}_j^{(2)}}{\partial {\textrm{s}}_j^{(2)}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq42.png) and ![$$
    \frac{\partial C}{\partial {\textrm{z}}_j^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq43.png),
    we have the following:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 将 ![$$ \frac{\partial {\textrm{s}}_j^{(2)}}{\partial {w}_{kj}^{(1)}},\frac{\partial
    {\textrm{z}}_j^{(2)}}{\partial {\textrm{s}}_j^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq42.png)
    和 ![$$ \frac{\partial C}{\partial {\textrm{z}}_j^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq43.png)
    的表达式结合起来，我们得到以下结果：
- en: '![$$ \frac{\partial C}{\partial {w}_{kj}^{(1)}}=\sum \limits_{i=1}^3\left({\textrm{z}}_i^{(3)}-{y}_i\right){w}_{ji}^{(2)}{\textrm{z}}_j^{(2)}\left(1-{\textrm{z}}_j^{(2)}\right){\textrm{x}}_k^{(1)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbn.png)'
  id: totrans-306
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbn.png)'
- en: 'In general, for a multi-layer neural network to compute the partial derivative
    of the cost function *C* with respect to a specific weight *w* contributing to
    the net input *s* in a neuron unit, we need to compute the partial derivative
    of the cost function with respect to the net input (i.e., ![$$ \frac{\partial
    C}{\partial s} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq44.png))
    and then multiply the input *x* associated with the weight *w*, as follows:'
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，为了计算多层神经网络中成本函数*C*关于特定权重*w*（该权重对神经元单元的净输入*s*有贡献）的偏导数，我们需要计算成本函数关于净输入的偏导数（即![C关于s的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq44.png)），然后乘以与权重*w*相关的输入*x*，如下所示：
- en: '![$$ \frac{\partial C}{\partial w}=\frac{\partial C}{\partial s}\frac{\partial
    s}{\partial w}=\frac{\partial C}{\partial s}x $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbo.png)'
  id: totrans-308
  prefs: []
  type: TYPE_IMG
  zh: '![C关于w的偏导数= C关于s的偏导数* s关于w的偏导数= C关于s的偏导数*x](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbo.png)'
- en: '![$$ \frac{\partial C}{\partial s} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq45.png)
    can be thought of as the error at the neural unit and can be computed iteratively
    by passing the error at the output layer to the neural units in the lower layers.
    Another point to note is that an error in a higher-layer neural unit is distributed
    to the output of the preceding layer’s neural units in proportion to the weight
    connections between them. Also, the partial derivative of the cost function with
    respect to the net input to a sigmoid activation neuron ![$$ \frac{\partial C}{\partial
    s} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq46.png) can
    be computed from the partial derivative of the cost function with respect to the
    output *z* of a neuron (i.e., ![$$ \frac{\partial C}{\partial z} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq47.png))
    by multiplying ![$$ \frac{\partial C}{\partial z\ } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq48.png)
    by *z*(1 − *z*). For linear neurons, this multiplying factor becomes 1.'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: '![C关于s的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq45.png)
    可以被视为神经单元的错误，可以通过迭代地传递输出层的错误到下层神经单元来计算。另一个需要注意的点是，高层神经单元的错误会按照它们之间的权重连接比例分布到前一层的神经单元输出。此外，成本函数关于sigmoid激活神经元的净输入的偏导数![C关于s的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq46.png)可以通过将![C关于z的偏导数](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq47.png)乘以*z*(1 − *z*)来从关于神经元输出*z*的偏导数计算得出。对于线性神经元，这个乘数因子变为1。'
- en: All these properties of neural networks make computing gradients easy. This
    is how a neural network learns in each iteration through backpropagation.
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些神经网络特性使得计算梯度变得容易。这就是神经网络通过反向传播在每个迭代中学习的方式。
- en: Each iteration is composed of a forward pass and a backward pass, or backpropagation.
    In the forward pass, the net input and output at each neuron unit in each layer
    are computed. Based on the predicted output and the actual target values, the
    error is computed in the output layers. The error is backpropagated by combining
    it with the neuron outputs computed in the forward pass and with existing weights.
    Through backpropagation, the gradients get computed iteratively. Once the gradients
    are computed, the weights are updated by gradient-descent methods.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 每个迭代由前向传递和反向传递组成，或称为反向传播。在前向传递中，计算每一层中每个神经单元的净输入和输出。基于预测输出和实际目标值，计算输出层的错误。通过将错误与前向传递中计算的神经元输出和现有权重相结合，将错误反向传播。通过反向传播，梯度被迭代地计算。一旦计算了梯度，权重将通过梯度下降方法进行更新。
- en: Please note that the deductions shown are valid for sigmoid activation functions.
    For other activation functions, while the approach remains the same, changes specific
    to the activation functions are required in the implementation.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，所显示的推导适用于sigmoid激活函数。对于其他激活函数，虽然方法保持不变，但在实现中需要针对激活函数进行特定的更改。
- en: The cost function for a SoftMax function is different from that for the independent
    multiclass classification.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: SoftMax函数的成本函数与独立的多类分类的成本函数不同。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig18_HTML.jpg)'
  id: totrans-314
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig18_HTML.jpg)'
- en: In the given network, the output unit's net input displays three nodes while
    the hidden unit's net input displays five nodes.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定的网络中，输出单元的净输入显示三个节点，而隐藏单元的净输入显示五个节点。
- en: Figure 2-18
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-18
- en: Network to illustrate backpropagation for SoftMax output layer
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 展示SoftMax输出层反向传播的神经网络
- en: 'The cross-entropy cost for the SoftMax activation layer in the network represented
    in Figure [2-18](#Fig18) is given by the following:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 网络中SoftMax激活层的交叉熵成本由以下公式给出：
- en: '![$$ C=\sum \limits_{i=1}^3-{y}_i\log P\left({y}_i=1\right)=\kern0.5em \sum
    \limits_{i=1}^3-{y}_i\log {z}_i^{(3)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbp.png)'
  id: totrans-319
  prefs: []
  type: TYPE_IMG
  zh: '![成本函数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbp.png)'
- en: Let us compute the partial derivative of the cost function with respect to the
    weight *w*[*ji*]^((2)). Now, the weight would impact the net input *s*[*i*]^((3))
    to the *ith* SoftMax unit. However, unlike the independent binary activations
    in the earlier network, here all three SoftMax output units ![$$ {z}_k^{(3)}\forall
    k\in \left\{1,2,3\right\} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq49.png)
    would be influenced by *s*[*i*]^((3)) since
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算成本函数关于权重 *w*[*ji*]^((2)) 的偏导数。现在，这个权重将影响第 *i* 个SoftMax单元的净输入 *s*[*i*]^((3))。然而，与早期网络中独立的二元激活不同，这里所有三个SoftMax输出单元
    ![$$ {z}_k^{(3)}\forall k\in \left\{1,2,3\right\} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq49.png)
    都会受到 *s*[*i*]^((3)) 的影响，因为
- en: '![$$ {z}_k^{(3)}=\frac{e^{s_k^{(3)}}}{\sum_{l=1}^3{e}^{s_l^{(3)}}}=\frac{e^{s_k^{(3)}}}{\sum_{l\ne
    i}{e}^{s_l^{(3)}}+{e}^{s_i^{(3)}}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbq.png)'
  id: totrans-321
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {z}_k^{(3)}=\frac{e^{s_k^{(3)}}}{\sum_{l=1}^3{e}^{s_l^{(3)}}}=\frac{e^{s_k^{(3)}}}{\sum_{l\ne
    i}{e}^{s_l^{(3)}}+{e}^{s_i^{(3)}}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbq.png)'
- en: 'Hence, the derivative ![$$ \frac{\partial C}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq50.png)
    can be written as follows:'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，导数 ![$$ \frac{\partial C}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq50.png)
    可以表示如下：
- en: '![$$ \frac{\partial C}{\partial {w}_{ji}^{(2)}}=\frac{\partial C}{\partial
    {s}_i^{(3)}}\frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbr.png)'
  id: totrans-323
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbr.png)'
- en: Now, as just stated, since *s*[*i*]^((3)) influences all the outputs *z*[*k*]^((3))
    in the SoftMax layer,
  id: totrans-324
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，正如刚才所述，由于 *s*[*i*]^((3)) 影响SoftMax层中所有输出 *z*[*k*]^((3))，
- en: '![$$ \frac{\partial C}{\partial {s}_i^{(3)}}=\sum \limits_{k=1}^3\frac{\partial
    C}{\partial {z}_k^{(3)}}\frac{\partial {z}_k^{(3)}}{\partial {s}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbs.png)'
  id: totrans-325
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbs.png)'
- en: 'The individual components of the partial derivative are as follows:'
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 偏导数的各个分量如下：
- en: '![$$ \frac{\partial C}{\partial {z}_k^{(3)}}=\frac{-{y}_k}{z_k^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbt.png)'
  id: totrans-327
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbt.png)'
- en: For *k* = *i*, ![$$ \frac{\partial {z}_k^{(3)}}{\partial {s}_i^{(3)}}={z}_i^{(3)}\left(1-{z}_i^{(3)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq51.png)
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 *k* = *i*， ![$$ \frac{\partial {z}_k^{(3)}}{\partial {s}_i^{(3)}}={z}_i^{(3)}\left(1-{z}_i^{(3)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq51.png)
- en: For ![$$ k\ne i,\kern0.5em \frac{\partial {z}_k^{(3)}}{\partial {s}_i^{(3)}}=-{z}_i^{(3)}{z}_k^{(3)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq52.png)
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 ![$$ k\ne i,\kern0.5em \frac{\partial {z}_k^{(3)}}{\partial {s}_i^{(3)}}=-{z}_i^{(3)}{z}_k^{(3)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq52.png)
- en: '![$$ \frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}}={z}_j^{(2)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbu.png)'
  id: totrans-330
  prefs: []
  type: TYPE_IMG
  zh: '![偏导数公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbu.png)'
- en: '![$$ \frac{\partial C}{\partial {s}_i^{(3)}}=\sum \limits_{k=1}^3\frac{\partial
    C}{\partial {z}_k^{(3)}}\frac{\partial {z}_k^{(3)}}{\partial {s}_i^{(3)}}=\sum
    \limits_{k=i}\frac{\partial C}{\partial {z}_k^{(3)}}\frac{\partial {z}_k^{(3)}}{\partial
    {s}_i^{(3)}}+\sum \limits_{k\ne i}\frac{\partial C}{\partial {z}_k^{(3)}}\frac{\partial
    {z}_k^{(3)}}{\partial {s}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbv.png)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbv.png)'
- en: '![$$ =\frac{-{y}_i}{z_i^{(3)}}{z}_i^{(3)}\left(1-{z}_i^{(3)}\right)+\sum \limits_{k\ne
    i}\frac{-{y}_k}{z_k^{(3)}}\left(-{z}_i^{(3)}{z}_k^{(3)}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbw.png)'
  id: totrans-332
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbw.png)'
- en: '![$$ =-{y}_i\left(1-{z}_i^{(3)}\right)+{z}_i^{(3)}\sum \limits_{k\ne i}{y}_k
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbx.png)'
  id: totrans-333
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbx.png)'
- en: '![$$ =-{y}_i+{y}_i{z}_i^{(3)}+{z}_i^{(3)}\sum \limits_{k\ne i}{y}_k $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equby.png)'
  id: totrans-334
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equby.png)'
- en: '![$$ =-{y}_i+{z}_i^{(3)}\sum \limits_k{y}_k $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbz.png)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equbz.png)'
- en: Since *y*[*k*] = 1 for only one value of *k*, hence ![$$ \sum \limits_k{y}_k=1
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq53.png). Hence,
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 *y*[*k*] = 1 仅对 *k* 的一个值成立，因此 ![$$ \sum \limits_k{y}_k=1 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq53.png)。因此，
- en: '![$$ \frac{\partial C}{\partial {s}_i^{(3)}}=-{y}_i+{z}_i^{(3)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equca.png)'
  id: totrans-337
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equca.png)'
- en: '![$$ ={z}_i^{(3)}-{y}_i $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcb.png)'
  id: totrans-338
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcb.png)'
- en: 'As it turns out, the cost derivative with respect to the net input to the *ith*
    SoftMax unit is the error in predicting the output at the *ith* SoftMax output
    unit. Combining ![$$ \frac{\partial C}{\partial {s}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq54.png)
    and ![$$ \frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq55.png),
    we get the following:'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，第 *i* 个 SoftMax 单元的网络输入相对于成本导数是预测第 *i* 个 SoftMax 输出单元输出的误差。结合 ![$$ \frac{\partial
    C}{\partial {s}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq54.png)
    和 ![$$ \frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq55.png)，我们得到以下公式：
- en: '![$$ \frac{\partial C}{\partial {w}_{ji}^{(2)}}=\frac{\partial C}{\partial
    {s}_i^{(3)}}\frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}}=\left({z}_i^{(3)}-{y}_i\right){z}_j^{(2)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcc.png)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcc.png)'
- en: 'Similarly, for the bias term to the *ith* SoftMax output unit, we have the
    following:'
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，对于第 *i* 个 SoftMax 输出单元的偏置项，我们有以下公式：
- en: '![$$ \frac{\partial C}{\partial {b}_i^{(2)}}=\left({\textrm{z}}_i^{(3)}-{y}_i\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcd.png)'
  id: totrans-342
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcd.png)'
- en: Computing the partial derivative of the cost function with respect to the weight
    *w*[*kj*]^((1)) in the previous layer, i.e., ![$$ \frac{\partial C}{\partial {w}_{kj}^{(1)}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq56.png), would
    have the same form as that in the case of a network with independent binary classes.
    This is obvious since the networks only differ in terms of the output units’ activation
    functions, and even then, the expressions that we get for ![$$ \frac{\partial
    C}{\partial {s}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq57.png)
    and ![$$ \frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq58.png)
    remain the same. As an exercise, interested readers can verify whether ![$$ \frac{\partial
    C}{\partial {w}_{kj}^{(1)}}=\sum \limits_{i=1}^3\left({\textrm{z}}_i^{(3)}-{y}_i\right){w}_{ji}^{(2)}{\textrm{z}}_j^{(2)}\left(1-{\textrm{z}}_j^{(2)}\right){\textrm{x}}_k^{(1)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq59.png) still
    holds true.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 计算关于前一层权重 *w*[*kj*]^((1)) 的成本函数的偏导数，即 ![$$ \frac{\partial C}{\partial {w}_{kj}^{(1)}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq56.png)，其形式将与具有独立二进制类别的网络中的形式相同。这是显而易见的，因为网络只在输出单元的激活函数方面有所不同，即使如此，我们得到的
    ![$$ \frac{\partial C}{\partial {s}_i^{(3)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq57.png)
    和 ![$$ \frac{\partial {s}_i^{(3)}}{\partial {w}_{ji}^{(2)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq58.png)
    的表达式仍然相同。作为练习，感兴趣的读者可以验证 ![$$ \frac{\partial C}{\partial {w}_{kj}^{(1)}}=\sum
    \limits_{i=1}^3\left({\textrm{z}}_i^{(3)}-{y}_i\right){w}_{ji}^{(2)}{\textrm{z}}_j^{(2)}\left(1-{\textrm{z}}_j^{(2)}\right){\textrm{x}}_k^{(1)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq59.png) 是否仍然成立。
- en: Deep Learning vs. Traditional Methods
  id: totrans-344
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 深度学习与传统方法
- en: In this book, we will use TensorFlow from Google as the deep-learning library
    since it has several advantages. Before moving on to TensorFlow, let us look at
    some of the key advantages of deep learning and a few of its shortcomings if it
    is not used in the right place.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 在这本书中，我们将使用谷歌的TensorFlow作为深度学习库，因为它具有几个优点。在继续使用TensorFlow之前，让我们看看深度学习的一些关键优点以及如果使用不当的一些缺点。
- en: Deep learning outperforms traditional machine-learning methods by a huge margin
    in several domains, especially in the fields of computer vision, speech recognition,
    natural language processing, and time series.
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在多个领域，深度学习在性能上远远超过传统的机器学习方法，尤其是在计算机视觉、语音识别、自然语言处理和时间序列领域。
- en: With deep learning, more and more complex features can be learned as the layers
    in the deep-learning neural network increase. Because of this automatic feature-learning
    property, deep learning reduces the feature-engineering time, which is a time-consuming
    activity in traditional machine-learning approaches.
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习随着深度学习神经网络层数的增加，可以学习到越来越多复杂的特征。正因为这种自动特征学习特性，深度学习减少了特征工程的时间，这在传统的机器学习方法中是一个耗时的工作。
- en: Deep learning works best for unstructured data, and there is a plethora of unstructured
    data in the form of images, text, speech, sensor data, and so forth, which when
    analyzed would revolutionize different domains, such as healthcare, manufacturing,
    banking, aviation, e-commerce, and so on.
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习最适合无结构化数据，而以图像、文本、语音、传感器数据等形式存在的无结构化数据非常多，一旦分析，将革命性地改变不同的领域，如医疗保健、制造业、银行业、航空业、电子商务等。
- en: 'A few limitations of deep learning are as follows:'
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习的一些局限性如下：
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig19_HTML.jpg)'
  id: totrans-350
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig19_HTML.jpg)'
- en: The graph illustrates the relationship between performance and data volume.
    Two curves represent the deep learning method and conventional methods in the
    graph.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 图表展示了性能与数据量之间的关系。图中的两条曲线分别代表了深度学习方法和传统方法。
- en: Figure 2-19
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-19
- en: Performance comparison of traditional methods vs. deep-learning methods
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 传统方法与深度学习方法的性能比较
- en: Deep-learning networks generally tend to have a lot of parameters, and for such
    implementations, there should be a sufficiently large volume of data to train.
    If there are not enough data, deep-learning approaches will not work well since
    the model will suffer from overfitting.
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习网络通常具有很多参数，对于这样的实现，应该有足够大的数据量来训练。如果没有足够的数据，深度学习方法将不会很好地工作，因为模型将遭受过拟合。
- en: The complex features learned by the deep-learning network are often hard to
    interpret.
  id: totrans-355
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习网络学习到的复杂特征通常难以解释。
- en: Deep-learning networks require a lot of computational power to train because
    of the large number of weights in the model as well as the data volume.
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习网络需要大量的计算能力来训练，因为模型中包含大量的权重以及数据量。
- en: When the data volume is less, traditional methods tend to perform better that
    deep-learning ones. However, when the data volume is huge, the deep-learning method
    wins over traditional methods by a huge margin, which has been roughly depicted
    in Figure [2-19](#Fig19).
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 当数据量较小时，传统方法往往比深度学习方法表现更好。然而，当数据量巨大时，深度学习方法在性能上远远超过传统方法，这在图 [2-19](#Fig19) 中大致有所描述。
- en: TensorFlow
  id: totrans-358
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow
- en: TensorFlow from Google is an open source library that primarily focuses on deep
    learning. It uses computational data-flow graphs to represent complicated neural
    network architecture. The nodes in the graph denote mathematical computations,
    also called ops (operations), whereas the edges denote the data tensors transferred
    between them. Also, the relevant gradients are stored at each node of the computational
    graph, and during backpropagation, these are combined to get the gradients with
    respect to each weight. Tensors are multidimensional data arrays used by TensorFlow.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 Google 的 TensorFlow 是一个主要关注深度学习的开源库。它使用计算数据流图来表示复杂的神经网络架构。图中的节点表示数学计算，也称为
    ops（操作），而边表示它们之间传输的数据张量。此外，相关的梯度存储在每个计算图的节点上，在反向传播过程中，这些梯度被组合以获得每个权重的梯度。张量是多维数据数组，由
    TensorFlow 使用。
- en: Common Deep-Learning Packages
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 常见深度学习包
- en: 'The common deep-learning packages are as follows:'
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 常见的深度学习包如下：
- en: '***Pytorch***: Pytorch is a deep-learning open source framework from Facebook
    based on Torch Library. It was primarily built with the intention of expediting
    research prototyping to deployment. Pytorch uses a C++ frontend with Python interface.
    Reputed organizations such as Facebook AI Research and IBM use Pytorch. Pytorch
    can utilize GPU for fast computation.'
  id: totrans-362
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Pytorch***: Pytorch 是一个基于 Torch 库的开源深度学习框架，由 Facebook 提供。它主要构建的目的是加速从研究原型到部署的过程。Pytorch
    使用 C++ 前端和 Python 接口。Facebook AI Research 和 IBM 等知名组织使用 Pytorch。Pytorch 可以利用 GPU
    进行快速计算。'
- en: '***Theano***: Theano is a deep-learning package in Python that is primarily
    used for computationally intensive research-oriented activities. It is tightly
    integrated with Numpy array and has efficient symbolic differentiators. It also
    provides transparent use of GPU for much faster computation.'
  id: totrans-363
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Theano***: Theano 是一个主要用于计算密集型研究活动的 Python 深度学习包。它与 Numpy 数组紧密集成，并具有高效的符号微分器。它还提供了对
    GPU 的透明使用，以实现更快的计算。'
- en: '***Caffe***: Caffe is a deep-learning framework developed by Berkeley AI Research
    ([BAIR](http://bair.berkeley.edu/)). Speed makes Caffe perfect for research experiments
    and industry deployment. Caffe implementation can use GPU very efficiently.'
  id: totrans-364
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Caffe***: Caffe 是由伯克利人工智能研究（[BAIR](http://bair.berkeley.edu/)）开发的深度学习框架。速度使
    Caffe 成为研究实验和工业部署的完美选择。Caffe 的实现可以非常高效地使用 GPU。'
- en: '***CuDNN***: CuDNN stands for CUDA Deep Neural Network library. It provides
    a library of primitives for GPU implementation of deep neural networks.'
  id: totrans-365
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***CuDNN***: CuDNN 代表 CUDA 深度神经网络库。它提供了一组用于在 GPU 上实现深度神经网络的原始库。'
- en: '***TensorFlow***: TensorFlow is an open source deep-learning framework from
    Google inspired by Theano. TensorFlow is slowly becoming the preferred library
    for deep learning in research-oriented work as well as for production implementation.
    Also, for distributed production implementation over the cloud, TensorFlow is
    becoming the go-to library.'
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***TensorFlow***: TensorFlow 是一个由 Google 启发的开源深度学习框架，灵感来源于 Theano。TensorFlow
    正在逐渐成为研究导向工作和生产实现中深度学习的首选库。此外，对于云上的分布式生产实现，TensorFlow 也正在成为首选库。'
- en: '***MxNet***: MxNet is an open source deep-learning framework that can scale
    to multiple GPUs and machines and is supported by major cloud providers such as
    AWS and Azure. Popular machine-learning library GraphLab has good deep-learning
    implementation using MxNet.'
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***MxNet***: MxNet 是一个开源的深度学习框架，可以扩展到多个 GPU 和机器，并得到 AWS 和 Azure 等主要云服务提供商的支持。流行的机器学习库
    GraphLab 使用 MxNet 实现了良好的深度学习功能。'
- en: '***deeplearning4j***: deeplearning4j is an open source distributed deep-learning
    framework for Java virtual machines.'
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***deeplearning4j***: deeplearning4j 是一个用于 Java 虚拟机的开源分布式深度学习框架。'
- en: '***Sonnet***: Sonnet is a high-level library for building complex neural network
    architectures using TensorFlow as the backend. Sonnet was developed at DeepMind.'
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Sonnet**：Sonnet是一个使用TensorFlow作为后端构建复杂神经网络架构的高级库。Sonnet是在DeepMind开发的。'
- en: '***ONNX***: ONNX stands for Open Neural Network Exchange and is jointly developed
    by Microsoft and Facebook. ONNX as the name suggests helps in the seamless transfer
    of models from one framework to another. For example, a model trained on Pytorch
    can be seamless setup for inference in TensorFlow using ONNX.'
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ONNX**：ONNX代表开放神经网络交换，由微软和Facebook共同开发。正如其名所示，ONNX有助于模型在各个框架之间无缝迁移。例如，在Pytorch上训练的模型可以使用ONNX在TensorFlow中进行无缝的推理设置。'
- en: TensorFlow and Pytorch are the most popular and widely used deep-learning frameworks
    across academia and industry. The following are some of the salient features of
    the two frameworks.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow和Pytorch是学术界和工业界最流行且广泛使用的深度学习框架。以下是这两个框架的一些显著特性。
- en: Python is the high-level language of choice for TensorFlow and Pytorch. Both
    TensorFlow and Pytorch provide the right amount of abstractions to speed up model
    development.
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python是TensorFlow和Pytorch的首选高级语言。TensorFlow和Pytorch都提供了适当程度的抽象，以加快模型开发。
- en: TensorFlow much like Theano, MxNet, and Caffe uses automatic differentiators,
    while Torch uses AutoGrad. Automatic differentiators are different from symbolic
    differentiation and numeric differentiation. Automatic differentiators are very
    efficient when used in neural networks because of the backpropagation method of
    learning that utilizes the chain rule of differentiation.
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TensorFlow与Theano、MxNet和Caffe类似，使用自动微分器，而Torch使用AutoGrad。自动微分器与符号微分和数值微分不同。由于神经网络利用微分链式法则的学习方法，自动微分器在神经网络中使用时非常高效。
- en: For production implementation on the cloud, TensorFlow is on its way to becoming
    the go-to platform for applications targeting large distributed systems.
  id: totrans-374
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于云上的生产实现，TensorFlow正在成为针对大型分布式系统的应用的首选平台。
- en: TensorFlow has better visualization capabilities in the form of TensorBoard
    which enables one to track and debug training issues much more conveniently.
  id: totrans-375
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: TensorFlow在TensorBoard的形式下具有更好的可视化能力，这使得人们可以更方便地跟踪和调试训练问题。
- en: TensorFlow Installation
  id: totrans-376
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow安装
- en: 'TensorFlow can be installed with ease in Linux-, Mac OS–, and Windows-based
    machines. It is always preferable to create separate environments for TensorFlow.
    In this book, we will be using the capabilities of TensorFlow 2 which requires
    your Python version to be greater than or equal to 3.7\. The details of installation
    for TensorFlow 2 are documented well on the official website for TensorFlow: [`www.tensorflow.org/install`](http://www.tensorflow.org/install).'
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow可以轻松安装在基于Linux、Mac OS和Windows的机器上。始终建议为TensorFlow创建单独的环境。在这本书中，我们将使用TensorFlow
    2的功能，这要求您的Python版本必须大于或等于3.7。TensorFlow 2的安装细节在TensorFlow的官方网站上有很好的记录：[www.tensorflow.org/install](http://www.tensorflow.org/install)。
- en: TensorFlow Basics for Development
  id: totrans-378
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow开发基础
- en: TensorFlow has its own format of commands to define and manipulate tensors.
    TensorFlow 1 worked on the principle of executing the logic using computational
    graphs within activated sessions. However, TensorFlow 2 looks at eager execution
    as its default. We discuss on both eager execution and computation graph approaches
    in detail in the following and then compare their salient features.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow有其自己的命令格式来定义和操作张量。TensorFlow 1基于在激活会话中使用计算图执行逻辑的原则。然而，TensorFlow 2将即时执行视为默认。我们将在以下内容中详细讨论即时执行和计算图方法，然后比较它们的显著特性。
- en: Eager Execution
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 即时执行
- en: Eager execution provides an execution environment to execute operations immediately.
    It does not work on the principle of building computation graphs to be executed
    later. Eager execution simplifies the model development effort in TensorFlow as
    one can see the results of the operations immediately. Eager execution makes debugging
    easier and is a flexible tool for research and fast prototyping.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 即时执行提供了一个立即执行操作的执行环境。它不基于构建稍后执行的计算图的原则。即时执行简化了TensorFlow中的模型开发工作，因为人们可以立即看到操作的结果。即时执行使调试变得更容易，并且是研究和快速原型设计的灵活工具。
- en: Graph-Based Execution
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 基于图的执行
- en: Although Eager execution has several advantages as discussed in the earlier
    section, it is in general slower than the graph execution. Eager execution cannot
    take advantage of acceleration opportunities that exist as it runs the TensorFlow
    operations one by one. In contrast to eager execution, graph execution extracts
    the TensorFlow-specific computation operations from Python and builds an efficient
    graph that can take advantage of potential acceleration opportunities. Also, graphs
    provide cross-platform flexibility as the graphs can be run, stored, and restored
    without the need for the original Python code. Hence, graph-based execution turns
    out to be important for models in devices such as mobile where Python code might
    not be available.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如前所述，急切执行有几个优点，但它通常比图执行慢。急切执行无法利用运行TensorFlow操作时存在的加速机会。与急切执行相反，图执行从Python中提取TensorFlow特定的计算操作，构建一个高效的图，可以利用潜在的加速机会。此外，图提供了跨平台的灵活性，因为图可以在没有原始Python代码的情况下运行、存储和恢复。因此，基于图的执行对于在移动设备等设备上的模型来说非常重要，在这些设备上可能没有Python代码。
- en: The following are some of the key features of eager execution and graph-based
    execution.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一些急切执行和基于图执行的关键特性。
- en: '| Eager execution | Graph-based execution |'
  id: totrans-385
  prefs: []
  type: TYPE_TB
  zh: '| 急切执行 | 基于图的执行 |'
- en: '| --- | --- |'
  id: totrans-386
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Highly intuitive and easy to debugSimplifies rapid model development | Less
    intuitive and in general hard to debug than eager execution |'
  id: totrans-387
  prefs: []
  type: TYPE_TB
  zh: '| 非常直观且易于调试，简化了快速模型开发 | 相比急切执行，直观性较低，通常更难调试 |'
- en: '| Slower than graph-based execution as it executes the TensorFlow operations
    one by one | Generally faster than eager execution as graph can be built to take
    advantage of acceleration opportunities prior to execution |'
  id: totrans-388
  prefs: []
  type: TYPE_TB
  zh: '| 由于逐个执行TensorFlow操作，比基于图的执行慢 | 通常比急切执行快，因为可以在执行之前构建图以利用加速机会 |'
- en: '| Better for beginners. | Ideal for large-scale training |'
  id: totrans-389
  prefs: []
  type: TYPE_TB
  zh: '| 更适合初学者 | 适用于大规模训练 |'
- en: '| Support for GPU and TPU acceleration | Support for GPU and TPU acceleration
    |'
  id: totrans-390
  prefs: []
  type: TYPE_TB
  zh: '| 支持GPU和TPU加速 | 支持GPU和TPU加速 |'
- en: 'The Best Strategy for TensorFlow 2: Eager Execution vs. Graph Execution'
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 2的最佳策略：急切执行与图执行比较
- en: Although TensorFlow 2 has prioritized eager execution, one can build models
    in an eager execution fashion and then execute it using graph execution. One can
    wrap eager execution operations with just **tf.function()** to get the benefits
    of the graph-based execution without having to create a graph and then run the
    graph within a session through **session.run().** Use this mixed scheme in a way
    we are adopting the intuitive way of coding as in eager execution but eventually
    executing the code in a graph-based way with minimal changes to the eager execution
    code by wrapping it around with **tf.function().**
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管TensorFlow 2优先考虑了急切执行，但人们可以以急切执行的方式构建模型，然后使用图执行来执行它。只需用**tf.function()**包装急切执行操作，就可以在不创建图的情况下，通过在会话中运行**session.run()**来获得基于图的执行的好处。我们可以采用这种混合方案，即在急切执行中采用直观的编码方式，但最终通过用**tf.function()**包装来以最小的方式改变急切执行代码，以基于图的方式执行代码。
- en: Listings [2-1](#PC1) to [2-15](#PC21) are a few of the basic TensorFlow commands
    used to define tensors and TensorFlow variables and to execute TensorFlow computational
    graphs within sessions. The idea is to emphasize both eager execution and the
    graph-based execution methods as part of the following code listings.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-1](#PC1) 到 [2-15](#PC21) 是一些基本的TensorFlow命令，用于定义张量和TensorFlow变量，并在会话中执行TensorFlow计算图。其目的是强调以下代码列表中的急切执行和基于图的执行方法。
- en: '[PRE0]'
  id: totrans-394
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '[PRE1]'
  id: totrans-395
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: With eager execution as the default, we will be able to see the values of the
    tensor immediately`.`
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 在默认情况下使用急切执行，我们将能够立即看到张量的值。
- en: '[PRE2]'
  id: totrans-397
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-398
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-399
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '[PRE5]'
  id: totrans-400
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-401
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-402
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-403
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: From Listing [2-9](#PC9), we can observe that for simple operations, graph execution
    takes more time than eager execution. Next we will see how the inference time
    looks when the model is heavy in parameters.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 从列表 [2-9](#PC9) 我们可以观察到，对于简单操作，图执行比急切执行花费更多时间。接下来我们将看到当模型参数较多时，推理时间是如何表现的。
- en: '[PRE9]'
  id: totrans-405
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We can see from Listing [2-10](#PC10) that in case of a model with several parameters,
    graph execution method scores over eager execution.
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 从列表 [2-10](#PC10) 我们可以看出，在具有多个参数的模型情况下，基于图的执行方法优于急切执行。
- en: '[PRE10]'
  id: totrans-407
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: TensorFlow variable method tf.Variable produces mutable tensors which can only
    be changed using assign.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow变量方法tf.Variable产生可变的张量，只能使用assign来更改。
- en: '[PRE11]'
  id: totrans-409
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-410
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: TensorFlow needs to remember the order of operation in forward pass so that
    during the backward pass (backpropagation), it can traverse the list of operations
    in reverse order to compute gradients.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow 需要记住正向传递中的操作顺序，以便在反向传递（反向传播）期间，它可以按相反顺序遍历操作列表来计算梯度。
- en: tf.GradientTape() is precisely the method that provides a way of recording relevant
    operations executed within its scope so that the information can be used to compute
    the gradient.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: tf.GradientTape() 正是提供了一种记录其作用域内执行的相关操作的方法，以便可以使用这些信息来计算梯度。
- en: '[PRE13]'
  id: totrans-413
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We can see from the output that the gradient of loss with respect to each of
    the units in each layer is stored by TensorFlow. TensorFlow is able to compute
    the same because it is tracking the variables and parameters of interest in the
    forward pass using the tf.GradientTape() method.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 从输出中我们可以看到，TensorFlow 存储了每一层中每个单元相对于损失函数的梯度。TensorFlow 能够这样做，因为它在正向传递中使用 tf.GradientTape()
    方法跟踪感兴趣的变量和参数。
- en: Gradient-Descent Optimization Methods from a Deep-Learning Perspective
  id: totrans-415
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从深度学习视角看梯度下降优化方法
- en: Before we dive into the TensorFlow optimizers, it is important to understand
    a few key points regarding full-batch gradient descent and stochastic gradient
    descent, including their shortcomings, so that one can appreciate the need to
    come up with variants of these gradient-based optimizers.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨 TensorFlow 优化器之前，了解一些关于全批量梯度下降和随机梯度下降的关键点非常重要，包括它们的缺点，这样人们才能欣赏到提出这些基于梯度的优化器变体的必要性。
- en: Elliptical Contours
  id: totrans-417
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 椭圆轮廓
- en: The cost function for a linear neuron with a least square error is quadratic.
    When the cost function is quadratic, the direction of the gradient resulting from
    the full-batch gradient-descent method gives the best direction for cost reduction
    in a linear sense, but it does not point to the minimum unless the different elliptical
    contours of the cost function are circles. In cases of long elliptical contours,
    the gradient components might be large in directions where less change is required
    and small in directions where more change is required to move to the minimum point.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有最小二乘误差的线性神经元，其成本函数是二次的。当成本函数是二次的时，全批量梯度下降方法产生的梯度方向在线性意义上给出了成本减少的最佳方向，但它不指向最小值，除非成本函数的不同椭圆轮廓是圆形。在椭圆轮廓较长的情况下，梯度分量可能在需要较小变化的方向上较大，而在需要较大变化才能移动到最小点的方向上较小。
- en: As we can see in Figure [2-20](#Fig20), the gradient at *S* does not point to
    the direction of the minimum, i.e., point *M*. The problem with this condition
    is that if we take small steps by making the learning rate small, then the gradient
    descent would take a while to converge, whereas if we were to use a big learning
    rate, the gradients will change direction rapidly in directions where the cost
    function had curvature, leading to oscillations. The cost function for a multi-layer
    neural network is not quadratic but rather is mostly a smooth function. Locally,
    such non-quadratic cost functions can be approximated by quadratic functions,
    and so the problems of gradient descent inherent to elliptical contours still
    prevail for non-quadratic cost functions.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 如[图 2-20](#Fig20) 所示，梯度在 *S* 处并不指向最小值方向，即点 *M*。这种条件的问题在于，如果我们通过减小学习率来采取小步长，那么梯度下降将需要一段时间才能收敛，而如果我们使用大的学习率，梯度将在成本函数曲率方向上迅速改变方向，导致振荡。多层神经网络的成本函数不是二次的，而主要是平滑函数。在局部，这种非二次成本函数可以用二次函数近似，因此对于非二次成本函数，梯度下降固有的椭圆轮廓问题仍然存在。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig20_HTML.jpg)'
  id: totrans-420
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-20](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig20_HTML.jpg)'
- en: The orbit structure plot with s in the outer circle of the orbit and m in the
    inner circle is displayed on the counterplot graph.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 轨道结构图显示了轨道外圈为 s，内圈为 m 的图形，该图显示在计数图上。
- en: Figure 2-20
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-20
- en: Contour plot for a quadratic cost function with elliptical contours
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 二次成本函数的椭圆轮廓等高线图
- en: The best way to get around this problem is to take larger steps in those directions
    in which the gradients are small but consistent and take smaller steps in those
    directions that have big but inconsistent gradients. This can be achieved if,
    instead of having a fixed learning rate for all dimensions, we have a separate
    learning rate for each dimension.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题的最佳方法是在梯度较小但一致的那些方向上采取较大的步长，而在梯度大但不一致的方向上采取较小的步长。如果对于所有维度都有一个固定的学习率，而不是每个维度都有一个单独的学习率，则可以实现这一点。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig21_HTML.jpg)'
  id: totrans-425
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig21_HTML.jpg)'
- en: The graph of the relation between c of w and w. In the graph, two linear curves
    connect at one point to form an upward curve structure.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: w与c之间的关系图。在图中，两条直线曲线在一点相交形成一个向上的曲线结构。
- en: Figure 2-21
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-21
- en: Gradient descent for a cost function with one variable
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: 单变量成本函数的梯度下降
- en: In Figure [2-21](#Fig21), the cost function between *A* and *C* is almost linear,
    and so gradient descent works well. However, from point *C*, the curvature of
    the cost function takes over, and so the gradient at *C* is not able to keep up
    with the direction of the change in cost function. Based on the gradient, if we
    take a small learning rate at *C*, we will end up at *D*, which is reasonable
    enough since it does not overshoot the point of minima. However, a larger step
    size at *C* will get us to *D*', which is not desirable, because it is on the
    other side of the minima. Again, a large step size at *D* ' would get us to *E*,
    and if the learning rate is not reduced, the algorithm tends to toggle between
    points on either side of the minima, leading to oscillations. When this happens,
    one way to stop it and achieve convergence is to look at the sign of the gradient
    ![$$ \frac{\partial C}{\partial w} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq60.png)
    or ![$$ \frac{dC}{dw} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq61.png)
    in successive iterations, and if they have opposite signs, reduce the learning
    rate so that the oscillations are reduced. Similarly, if the successive gradients
    have the same sign, then the learning rate can be increased accordingly. When
    the cost function is a function of multiple weights, the cost function might have
    curvatures in some dimensions of the weights, while it might be linear along other
    dimensions. Hence, for multivariate cost functions, the partial derivative of
    the cost function with respect to each weight ![$$ \left(\frac{\partial C}{\partial
    {w}_i}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq62.png)
    can be similarly analyzed to update the learning rate for each weight or dimension
    of the cost function.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[2-21](#Fig21)中，A和C之间的成本函数几乎呈线性，因此梯度下降法效果良好。然而，从点C开始，成本函数的曲率占主导地位，因此C点的梯度无法跟上成本函数变化的方向。基于梯度，如果我们C点取一个小的学习率，最终会到达D点，这是合理的，因为它没有超过最小值点。然而，C点取一个较大的步长将使我们到达D'点，这是不希望的，因为它位于最小值点的另一侧。再次，D'点的较大步长将使我们到达E点，如果学习率没有降低，算法倾向于在最小值点两侧的点之间切换，导致振荡。当这种情况发生时，停止它并实现收敛的一种方法是通过查看连续迭代中梯度的符号![\(
    \frac{\partial C}{\partial w} \)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq60.png)或![\(
    \frac{dC}{dw} \)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq61.png)，如果它们具有相反的符号，则降低学习率以减少振荡。同样，如果连续的梯度具有相同的符号，则可以相应地增加学习率。当成本函数是多个权重的函数时，成本函数可能在权重的某些维度上有曲率，而在其他维度上可能是线性的。因此，对于多元成本函数，成本函数关于每个权重的偏导数![\(
    \left(\frac{\partial C}{\partial {w}_i}\right) \)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq62.png)可以类似地分析以更新每个权重或成本函数维度的学习率。
- en: Non-convexity of Cost Functions
  id: totrans-430
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 成本函数的非凸性
- en: The other big problem with neural networks is that the cost functions are mostly
    non-convex, and so the gradient-descent method might get stuck at local minimum
    points, leading to a suboptimal solution. The non-convex nature of the neural
    network is the result of the hidden-layer units that have nonlinear activation
    functions, such as sigmoid. Full-batch gradient descent uses the full dataset
    for the gradient computation. While this is good for convex cost surfaces, it
    has its own problems in cases of non-convex cost functions. For non-convex cost
    surfaces with full-batch gradients, the model is going to end up with the minima
    in its basin of attraction. If the initialized parameters are in the basin of
    attraction of a local minima that doesn’t provide good generalization, a full-batch
    gradient would give a suboptimal solution.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的其他大问题是其成本函数大多是非凸的，因此梯度下降法可能会陷入局部最小值点，导致次优解。神经网络的非凸性质是由于具有非线性激活函数（如sigmoid）的隐藏层单元造成的。全批量梯度下降使用整个数据集进行梯度计算。虽然这对于凸成本表面来说是好的，但在非凸成本函数的情况下，它也有其自身的问题。对于具有全批量梯度的非凸成本表面，模型最终会在其吸引域的极小值处结束。如果初始化的参数位于一个局部最小值的吸引域中，而这个局部最小值不能提供良好的泛化，那么全批量梯度将给出一个次优解。
- en: With stochastic gradient descent, the noisy gradients computed may force the
    model out of the basin of attraction of the bad local minima—one that does not
    provide good generalization—and place it in a more optimal region. Stochastic
    gradient descent with single data points produces very random and noisy gradients.
    Gradients with mini-batches tend to produce much more stable estimates of gradients
    when compared to gradients of single data points, but they are still noisier than
    those produced by the full batches. Ideally, the mini-batch size should be carefully
    chosen such that the gradients are noisy enough to avoid or escape bad local minima
    points but stable enough to converge at global minima or a local minimum that
    provides good generalization.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 随机梯度下降中计算出的噪声梯度可能会迫使模型摆脱不良局部最小值的吸引域——那种不能提供良好泛化的吸引域——并将其放置在一个更优的区域。使用单个数据点的随机梯度下降会产生非常随机和噪声的梯度。与单个数据点的梯度相比，使用小批量的梯度通常会产生更稳定的梯度估计，但它们仍然比全批量产生的梯度更嘈杂。理想情况下，小批量的大小应该仔细选择，使得梯度足够嘈杂以避免或逃离不良局部最小值点，但足够稳定以收敛到全局最小值或提供良好泛化的局部最小值。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig22_HTML.jpg)'
  id: totrans-433
  prefs: []
  type: TYPE_IMG
  zh: '![图2-22](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig22_HTML.jpg)'
- en: Two orbital structures with the center points G and L are combined in the contour
    plot illustration.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 在等高线图说明中，将中心点G和L的两种轨道结构结合起来。
- en: Figure 2-22
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-22
- en: Contour plot showing basins of attraction for global and local minima and traversal
    of paths for gradient descent and stochastic gradient descent
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 等高线图显示了全局和局部最小值的吸引域以及梯度下降和随机梯度下降的路径遍历
- en: In Figure [2-22](#Fig22), the dotted arrows correspond to the path taken by
    stochastic gradient descent (SGD), while the continuous arrows correspond to the
    path taken by full-batch gradient descent. Full-batch gradient descent computes
    the actual gradient at a point, and if it is in the basin of attraction of a poor
    local minimum, gradient descent almost surely ensures that the local minima *L*
    is reached. However, in the case of stochastic gradient descent, because the gradient
    is based on only portion of the data and not on the full batch, the gradient direction
    is only a rough estimate. Since the noisy rough estimate does not always point
    to the actual gradient at the point *C*, stochastic gradient descent may escape
    the basin of attraction of the local minima and fortunately land in the basin
    of a global minima. Stochastic gradient descent may escape the global minima basin
    of attraction too, but generally if the basin of attraction is large and the mini-batch
    size is carefully chosen so that the gradients it produces are moderately noisy,
    stochastic gradient descent is most likely to reach the global minima *G* (as
    in this case) or some other optimal minima that has a large basin of attraction.
    For non-convex optimization, there are other heuristics as well, such as momentum,
    which when adopted along with stochastic gradient descent increases the chances
    of the SGD’s avoiding shallow local minima. Momentum generally keeps track of
    the previous gradients through the velocity component. So, if the gradients are
    steadily pointing toward a good local minimum that has a large basin of attraction,
    the velocity component would be high in the direction of the good local minimum.
    If the new gradient is noisy and points toward a bad local minimum, the velocity
    component would provide momentum to continue in the same direction and not get
    influenced by the new gradient too much.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[2-22](#Fig22)中，虚线箭头对应随机梯度下降（SGD）所采取的路径，而实线箭头对应全批量梯度下降所采取的路径。全批量梯度下降在一点上计算实际的梯度，如果它位于一个较差的局部最小值吸引域内，梯度下降几乎可以确保达到局部最小值*L*。然而，在随机梯度下降的情况下，因为梯度仅基于数据的一部分而不是整个批量，所以梯度方向只是一个粗略的估计。由于这个噪声的粗略估计并不总是指向点*C*的实际梯度，随机梯度下降可能会逃离局部最小值的吸引域，并且幸运地落在全局最小值的吸引域中。随机梯度下降也可能逃离全局最小值的吸引域，但通常如果吸引域很大，并且仔细选择小批量大小，使得它产生的梯度适度噪声，随机梯度下降最有可能达到全局最小值*G*（如本例所示）或其他具有大吸引域的其他最优最小值。对于非凸优化，还有其他启发式方法，例如动量，当与随机梯度下降结合使用时，可以增加避免浅局部最小值的机会。动量通常通过速度分量跟踪之前的梯度。因此，如果梯度持续指向一个具有大吸引域的良好局部最小值，则速度分量会在良好局部最小值的方向上很高。如果新的梯度是噪声的，并且指向一个较差的局部最小值，则速度分量将提供动量以继续在同一方向上前进，并且不会过多地受到新梯度的影响。
- en: Saddle Points in the High-Dimensional Cost Functions
  id: totrans-438
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 高维成本函数中的鞍点
- en: 'Another impediment to optimizing non-convex cost functions is the presence
    of saddle points. The number of saddle points increases exponentially with the
    dimensionality increase of the parameter space of a cost function. Saddle points
    are stationary points (i.e., points where the gradient is zero) but are neither
    a local minimum nor a local maximum point. Since the saddle points are associated
    with a long plateau of points with the same cost as that of the saddle point,
    the gradient in the plateau region is either zero or very close to zero. Because
    of this near-zero gradient in all directions, gradient-based optimizers have a
    hard time coming out of these saddle points. Mathematically, to determine whether
    a point is a saddle point, the Eigen values of the Hessian matrix of the cost
    function must be computed at the given point. If there are both positive and negative
    Eigen values, then it is a saddle point. Just to refresh our memory of local and
    global minima tests, if all the Eigen values of the Hessian matrix are positive
    at a stationary point, then the point is a global minimum, whereas if all the
    Eigen values of the Hessian matrix are negative at the stationary point, then
    the point is a global maximum. The Eigen vectors of the Hessian matrix for a cost
    function give the direction of change in the curvature of the cost function, whereas
    the Eigen values denote the magnitude of the curvature changes along those directions.
    Also, for cost functions with continuous second derivatives, the Hessian matrix
    is symmetrical and hence would always produce an orthogonal set of Eigen vectors,
    thus giving mutually orthogonal directions for cost curvature changes. If in all
    such directions given by Eigen vectors the values of the curvature changes (Eigen
    values) are positive, then the point must be a local minimum, whereas if all the
    values of curvature changes are negative, then the point is a local maximum. This
    generalization works for cost functions with any input dimensionality, whereas
    the determinant rules for determining extremum points vary with the dimensionality
    of the input to the cost function. Coming back to saddle points, since the Eigen
    values are positive for some directions but negative for other directions, the
    curvature of the cost function increases in the direction of positive Eigen values
    while decreasing in the direction of Eigen vectors with negative coefficients.
    This nature of the cost surface around a saddle point generally leads to a region
    of long plateau with a near-zero gradient and makes it tough for gradient-descent
    methods to escape the plateau of this low gradient. The point (0, 0) is a saddle
    point for the function *f*(*x*, *y*) = *x*² − *y*² as we can see from the following
    evaluation:'
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 优化非凸成本函数的另一个障碍是鞍点的存在。随着成本函数参数空间维度的增加，鞍点的数量呈指数增长。鞍点是驻点（即梯度为零的点），但既不是局部最小点也不是局部最大点。由于鞍点与具有与鞍点相同成本的点的长平台相关联，平台区域的梯度要么为零，要么非常接近零。由于所有方向的梯度都接近于零，基于梯度的优化器很难从这些鞍点中出来。从数学上讲，要确定一个点是否是鞍点，必须在给定点计算成本函数的Hessian矩阵的特征值。如果既有正特征值也有负特征值，那么它就是一个鞍点。为了刷新我们对局部和全局最小值测试的记忆，如果在驻点处Hessian矩阵的所有特征值都是正的，那么该点是全局最小值，而如果在驻点处Hessian矩阵的所有特征值都是负的，那么该点是全局最大值。成本函数的Hessian矩阵的特征向量给出了成本函数曲率变化的方向，而特征值表示沿着这些方向曲率变化的幅度。此外，对于具有连续二阶导数的成本函数，Hessian矩阵是对称的，因此总是产生一组正交的特征向量，从而给出成本曲率变化的相互正交方向。如果在所有由特征向量给出的方向上，曲率变化的值（特征值）都是正的，那么该点必定是局部最小值，而如果所有曲率变化的值都是负的，那么该点是局部最大值。这种推广适用于任何输入维度的成本函数，而确定极值点的行列式规则随着成本函数输入的维度而变化。回到鞍点，由于某些方向的特征值是正的，而其他方向的特征值是负的，因此成本函数的曲率在正特征值的方向上增加，而在具有负系数的特征向量的方向上减少。这种鞍点周围成本表面的性质通常会导致一个具有接近零梯度的长平台区域，这使得梯度下降方法难以逃离这个低梯度的平台。点（0，0）是函数
    *f*(*x*, *y*) = *x*² − *y*² 的鞍点，如下所示的评价可以观察到：
- en: ∇*f*(*x*, *y*) = 0 => ![$$ \frac{\partial f}{\partial x}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq63.png)
    and ![$$ \frac{\partial f}{\partial y}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq64.png)
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: ∇*f*(*x*, *y*) = 0 => ![$$ \frac{\partial f}{\partial x}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq63.png)
    和 ![$$ \frac{\partial f}{\partial y}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq64.png)
- en: '![$$ \frac{\partial f}{\partial x}=2x=0=&gt;x=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equce.png)'
  id: totrans-441
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial f}{\partial x}=2x=0=&gt;x=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equce.png)'
- en: '![$$ \frac{\partial f}{\partial y}=-2y=0=&gt;y=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcf.png)'
  id: totrans-442
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial f}{\partial y}=-2y=0=&gt;y=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcf.png)'
- en: 'So, (*x*, *y*) = (0, 0) is a stationary point. The next thing to do is to compute
    the Hessian matrix and evaluate its Eigen values at (*x*, *y*) = (0, 0). The Hessian
    matrix *Hf*(*x*, *y*) is as follows:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，(*x*, *y*) = (0, 0) 是一个驻点。接下来要做的事情是计算 Hessian 矩阵，并在 (*x*, *y*) = (0, 0) 处评估其特征值。Hessian
    矩阵 *Hf*(*x*, *y*) 如下所示：
- en: '![$$ Hf\left(x,y\right)=\left[\begin{array}{cc}\frac{\partial^2f}{\partial
    {x}^2}&amp; \frac{\partial^2f}{\partial x\partial y}\\ {}\frac{\partial^2f}{\partial
    x\partial y}&amp; \frac{\partial^2f}{\partial {y}^2}\end{array}\right]=\left[\begin{array}{cc}2&amp;
    0\\ {}0&amp; -2\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcg.png)'
  id: totrans-444
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Hf\left(x,y\right)=\left[\begin{array}{cc}\frac{\partial^2f}{\partial
    {x}^2}& \frac{\partial^2f}{\partial x\partial y}\\ \frac{\partial^2f}{\partial
    x\partial y}& \frac{\partial^2f}{\partial {y}^2}\end{array}\right]=\left[\begin{array}{cc}2&
    0\\ 0& -2\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcg.png)'
- en: So, the Hessian *Hf*(*x*, *y*) at all points including (*x*, *y*) = (0, 0) is
    ![$$ \left[\begin{array}{cc}2&amp; 0\\ {}0&amp; -2\end{array}\right]. $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq65.png)
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，包括 (*x*, *y*) = (0, 0) 在内的所有点的 Hessian 矩阵 *Hf*(*x*, *y*) 是 ![$$ \left[\begin{array}{cc}2&
    0\\ 0& -2\end{array}\right]. $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq65.png)
- en: The two Eigen values of the *Hf*(*x*, *y*) are 2 and -2, corresponding to the
    Eigen vectors ![$$ \left[\begin{array}{c}1\\ {}0\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq66.png)
    and ![$$ \left[\begin{array}{c}0\\ {}1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq67.png)
    which are nothing but the directions along the *X* and *Y* axes. Since one Eigen
    value is positive and the other negative, (*x*, *y*) = (0, 0) is a saddle point.
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: '*Hf*(*x*, *y*) 的两个特征值是 2 和 -2，对应于特征向量 ![$$ \left[\begin{array}{c}1\\ 0\end{array}\right]
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq66.png) 和 ![$$
    \left[\begin{array}{c}0\\ 1\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq67.png)，这不过是沿着
    *X* 和 *Y* 轴的方向。由于一个特征值是正的，另一个是负的，所以 (*x*, *y*) = (0, 0) 是一个鞍点。'
- en: The non-convex function *f*(*x*, *y*) = *x*² − *y*² is plotted in Figure [2-23](#Fig23),
    where *S* is the saddle point at *x*, *y* = (0, 0).
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 非凸函数 *f*(*x*, *y*) = *x*² − *y*² 在图 [2-23](#Fig23) 中绘制，其中 *S* 是鞍点，位于 *x*, *y* = (0,
    0) 处。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig23_HTML.jpg)'
  id: totrans-448
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig23_HTML.jpg)'
- en: The center of the three-dimensional plot, s, is displayed on the graph as the
    relationship between f of x y, and x and y.
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 三维图的中心 s 显示在图上，表示 f(x, y) 与 x 和 y 之间的关系。
- en: Figure 2-23
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-23
- en: Plot of *f*(*x*, *y*) = *x*² − *y*²
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: '*f*(*x*, *y*) = *x*² − *y*² 的绘制'
- en: Learning Rate in Mini-Batch Approach to Stochastic Gradient Descent
  id: totrans-452
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小批量随机梯度下降法中的学习率
- en: 'When there is high redundancy in the dataset, the gradient computed on a mini-batch
    of data points is almost the same as the gradient computed on the whole dataset,
    provided the mini-batch is a good representation of the entire dataset. In such
    cases, computing the gradient on the whole dataset can be avoided, and instead
    the gradient on the mini-batch of data points can be used as the approximate gradient
    for the whole dataset. This is the mini-batch approach to gradient descent, which
    is also called mini-batch stochastic gradient descent. When, instead of using
    a mini-batch, the gradients are approximated by one data point, it is called online
    learning or stochastic gradient descent. However, it is always better to use the
    mini-batch version of stochastic gradient descent over online learning since the
    gradients for the mini-batch method are less noisy compared to the online mode
    of learning. Learning rate plays a vital role in the convergence of mini-batch
    stochastic gradient descent. The following approach tends to provide good convergence:'
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 当数据集中存在高度冗余时，对数据点的迷你批次计算出的梯度几乎与对整个数据集计算出的梯度相同，前提是迷你批次是整个数据集的良好表示。在这种情况下，可以避免对整个数据集计算梯度，而是可以使用数据点的迷你批次梯度作为整个数据集的近似梯度。这是梯度下降的迷你批次方法，也称为迷你批次随机梯度下降。当不使用迷你批次，而是通过一个数据点来近似梯度时，它被称为在线学习或随机梯度下降。然而，与在线学习模式相比，由于迷你批次方法的梯度比学习模式中的梯度更少噪声，因此始终最好使用随机梯度下降的迷你批次版本。学习率在迷你批次随机梯度下降的收敛中起着至关重要的作用。以下方法往往能提供良好的收敛：
- en: Start with an initial learning rate.
  id: totrans-454
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从初始学习率开始。
- en: Increase the learning rate if the error reduces.
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果错误减少，则增加学习率。
- en: Decrease the learning rate if the error increases.
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果错误增加，则降低学习率。
- en: Stop the learning process if the error ceases to reduce.
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果错误不再减少，则停止学习过程。
- en: As we will see in the next section, the different optimizers adopt an adaptive
    learning-rate approach in their implementations.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们在下一节中将要看到的，不同的优化器在其实现中采用了自适应学习率的方法。
- en: Optimizers in TensorFlow
  id: totrans-459
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow中的优化器
- en: TensorFlow has a rich inventory of optimizers for optimizing cost functions.
    The optimizers are all gradient based, along with some special optimizers to handle
    local minima problems. Since we dealt with the most common gradient-based optimizers
    used in machine learning and deep learning in the first chapter, here we will
    stress the customizations added in TensorFlow to the base algorithms.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow拥有丰富的优化器库存，用于优化成本函数。所有优化器都是基于梯度的，还有一些特殊的优化器用于处理局部最小值问题。由于我们在第一章中处理了机器学习和深度学习中使用的最常见基于梯度的优化器，因此在这里我们将强调TensorFlow对基本算法添加的定制。
- en: GradientDescentOptimizer
  id: totrans-461
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: GradientDescentOptimizer
- en: '`GradientDescentOptimizer` implements the fundamental full-batch gradient-descent
    algorithm and takes the learning rate as an input. The gradient-descent algorithm
    will not loop over the iterations automatically, so such logic must be specified
    by the developer.'
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: '`GradientDescentOptimizer`实现了基本的完整批次梯度下降算法，并将学习率作为输入。梯度下降算法不会自动循环迭代，因此这种逻辑必须由开发者指定。'
- en: Usage
  id: totrans-463
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 用法
- en: '[PRE14]'
  id: totrans-464
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: The optimizer object for full-batch gradient descent can be defined as above
    where `learning_rate` is the constant learning rate to be used for the entire
    duration of training.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 完整批次梯度下降的优化器对象可以定义为上述内容，其中`learning_rate`是在整个训练期间使用的恒定学习率。
- en: AdagradOptimizer
  id: totrans-466
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: AdagradOptimizer
- en: '`AdagradOptimizer` is a first-order optimizer like gradient descent but with
    some modifications. Instead of having a global learning rate, the learning rate
    is normalized for each dimension on which the cost function is dependent. The
    learning rate in each iteration is the global learning rate divided by the *l*²
    norm of the prior gradients up to the current iteration for each dimension.'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: '`AdagradOptimizer`是一种类似于梯度下降的一阶优化器，但有一些修改。它没有全局学习率，而是对成本函数依赖的每个维度进行归一化。每个迭代的学习率是全球学习率除以当前迭代前每个维度的先前梯度的l²范数。'
- en: 'If we have a cost function *C*(*θ*) where *θ* = [*θ*[1]*θ*[2]. . *θ*[*n*]]^(*T*) ∈ *R*^(*n* × 1),
    then the update rule for *θ*[*i*] is as follows:'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们有一个成本函数 *C*(*θ*)，其中 *θ* = [*θ*[1]*θ*[2]. . *θ*[*n*]]^(*T*) ∈ *R*^(*n* ×
    1)，那么 *θ*[*i*] 的更新规则如下：
- en: '![$$ {\theta}_i^{\left(t+1\right)}-\frac{\eta }{\sqrt{\sum \limits_{\tau =1}^t{\theta_i^{\left(\tau
    \right)}}^2+\epsilon\ }}\frac{\partial {C}^{(t)}}{\partial {\theta}_i} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equch.png)'
  id: totrans-469
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}_i^{\left(t+1\right)}-\frac{\eta }{\sqrt{\sum \limits_{\tau =1}^t{\theta_i^{\left(\tau
    \right)}}^2+\epsilon\ }}\frac{\partial {C}^{(t)}}{\partial {\theta}_i} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equch.png)'
- en: where *η* is the learning rate and *θ*[*i*]^((*t*)) and *θ*[*i*]^((*t* + 1))
    are the values for the *ith* parameter at iterations *t* and *t* + 1, respectively.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *η* 是学习率，*θ*[*i*]^((*t*)) 和 *θ*[*i*]^((*t* + 1)) 分别是第 *i* 个参数在迭代 *t* 和 *t* + 1
    时的值。
- en: 'In a matrix format, the parameter update for the vector *θ* can be represented
    by the following:'
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 在矩阵格式中，向量 *θ* 的参数更新可以表示为以下形式：
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}-\eta {G}_{(t)}^{-1}\nabla C\left({\theta}^{(t)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equci.png)'
  id: totrans-472
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}-\eta {G}_{(t)}^{-1}\nabla C\left({\theta}^{(t)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equci.png)'
- en: 'where *G*[(*t*)]is the diagonal matrix containing the *l*² norm of the past
    gradients till iteration *t* for each dimension. The matrix *G*[(*t*)] would be
    of the following form:'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *G*[(*t*)] 是包含每个维度过去梯度到迭代 *t* 的 l² 范数的对角矩阵。矩阵 *G*[(*t*)] 将具有以下形式：
- en: '![$$ {G}_{(t)}=\left[\begin{array}{ccc}\sqrt{\sum \limits_{\tau =1}^t{\theta_1^{\left(\tau
    \right)}}^2+\epsilon\ }&amp; \dots &amp; 0\\ {}\dots &amp; \sqrt{\sum \limits_{\tau
    =1}^t{\theta_i^{\left(\tau \right)}}^2+\epsilon\ }&amp; \dots \\ {}0&amp; \dots
    &amp; \sqrt{\sum \limits_{\tau =1}^t{\theta_n^{\left(\tau \right)}}^2+\epsilon\
    }\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcj.png)'
  id: totrans-474
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {G}_{(t)}=\left[\begin{array}{ccc}\sqrt{\sum \limits_{\tau =1}^t{\theta_1^{\left(\tau
    \right)}}^2+\epsilon\ }&amp; \dots &amp; 0\\ {}\dots &amp; \sqrt{\sum \limits_{\tau
    =1}^t{\theta_i^{\left(\tau \right)}}^2+\epsilon\ }&amp; \dots \\ {}0&amp; \dots
    &amp; \sqrt{\sum \limits_{\tau =1}^t{\theta_n^{\left(\tau \right)}}^2+\epsilon\
    }\end{array}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcj.png)'
- en: Sometimes sparse features that don’t show up much in the data can be very useful
    to an optimization problem. However, with basic gradient descent or stochastic
    gradient descent, the learning rate gives equal importance to all the features
    in each iteration. Since the learning rate is the same, the overall contribution
    of non-sparse features would be much more than that of sparse features. Hence,
    we end up losing critical information from the sparse features. With `Adagrad`,
    each parameter is updated with a different learning rate. The sparser the feature
    is, the higher its parameter update would be in an iteration. This is because
    for sparse features, the quantity ![$$ \sqrt{\sum \limits_{\tau =1}^t{\theta_i^{\left(\tau
    \right)}}^2+\epsilon\ } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq68.png)
    would be less, and hence the overall learning rate would be high.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，在数据中不太显现的稀疏特征对于优化问题可能非常有用。然而，使用基本的梯度下降法或随机梯度下降法时，学习率在每次迭代中对所有特征给予同等的重要性。由于学习率相同，非稀疏特征的整体贡献将远大于稀疏特征。因此，我们最终会丢失稀疏特征中的关键信息。使用`Adagrad`，每个参数都会用不同的学习率进行更新。特征越稀疏，其参数在迭代中的更新就越高。这是因为对于稀疏特征，量
    ![$$ \sqrt{\sum \limits_{\tau =1}^t{\theta_i^{\left(\tau \right)}}^2+\epsilon\
    } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq68.png) 会更小，因此整体学习率会更高。
- en: This is a good optimizer to use in applications with natural language processing
    and image processing where the data is sparse.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在自然语言处理和图像处理等应用中使用的好优化器，其中数据是稀疏的。
- en: Usage
  id: totrans-477
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 用法
- en: '[PRE15]'
  id: totrans-478
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: where `learning_rate` represents *η* and `initial_accumulator_value` represents
    the initial non-zero normalizing factor for each weight.
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `learning_rate` 代表 *η*，而 `initial_accumulator_value` 代表每个权重的初始非零归一化因子。
- en: RMSprop
  id: totrans-480
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: RMSprop
- en: '`RMSprop` is the mini-batch version of the resilient backpropagation (`Rprop`)
    optimization technique that works best for full-batch learning. `Rprop` solves
    the issue of gradients not pointing to the minimum in cases where the cost function
    contours are elliptical. As we discussed earlier, in such cases, instead of a
    global learning rule, a separate adaptive update rule for each weight would lead
    to better convergence. The special thing with `Rprop` is that it doesn’t use the
    magnitude of the gradients of the weight but only the signs in determining how
    to update each weight. The following is the logic by which `Rprop` works:'
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: '`RMSprop` 是 resilient backpropagation (`Rprop`) 优化技术的 mini-batch 版本，最适合全批量学习。`Rprop`
    解决了在成本函数等高线呈椭圆形的情况下梯度不指向最小值的问题。正如我们之前讨论的，在这种情况下，使用全局学习规则，而不是为每个权重设置单独的自适应更新规则，将导致更好的收敛。`Rprop`
    的特别之处在于，它不使用权重的梯度幅度，而只使用符号来确定如何更新每个权重。以下是 `Rprop` 的工作逻辑：'
- en: Start with the same magnitude of weight update for all weights, i.e., *Δ*[*ij*]^((*t* = 0)) = *Δ*[*ij*]^((0)) = *Δ*.
    Also, set the maximum and minimum allowable weight updates to *Δ*[*max*] and *Δ*[*min*],
    respectively.
  id: totrans-482
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于所有权重，从相同的权重更新幅度开始，即 *Δ*[*ij*]^((*t* = 0)) = *Δ*[*ij*]^((0)) = *Δ*。同时，将允许的最大和最小权重更新分别设置为
    *Δ*[*max*] 和 *Δ*[*min*]。
- en: At each iteration, check the sign of both the previous and the current gradient
    components, i.e., the partial derivatives of the cost function with respect to
    the different weights.
  id: totrans-483
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每次迭代中，检查前一个和当前梯度分量的符号，即成本函数关于不同权重的偏导数。
- en: 'If the signs of the current and previous gradient components for a weight connection
    are the same—i.e., ![$$ \mathit{\operatorname{sign}}\left(\frac{\partial {C}^{(t)}}{\partial
    {w}_{ij}}\frac{\partial {C}^{\left(t-1\right)}}{\partial {w}_{ij}}\right)=+ ve
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq69.png)—then
    increase the learning by a factor *η*[+] = 1.2\. The update rule becomes as follows:'
  id: totrans-484
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一个权重连接的当前和前一个梯度分量的符号相同——即 ![$$ \mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\frac{\partial {C}^{\left(t-1\right)}}{\partial {w}_{ij}}\right)=+
    ve $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq69.png)——则通过一个因子
    *η*[+] = 1.2 增加学习率。更新规则如下：
- en: '![$$ {\varDelta_{ij}}^{\left(t+1\right)}=\min \left({\eta}_{+}{\varDelta_{ij}}^{(t)},{\varDelta}_{max}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equck.png)'
  id: totrans-485
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\varDelta_{ij}}^{\left(t+1\right)}=\min \left({\eta}_{+}{\varDelta_{ij}}^{(t)},{\varDelta}_{max}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equck.png)'
- en: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right).{\varDelta_{ij}}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcl.png)'
  id: totrans-486
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right).{\varDelta_{ij}}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcl.png)'
- en: 'If the signs of the current and previous gradient components for a dimension
    are different—i.e., ![$$ \mathit{\operatorname{sign}}\left(\frac{\partial {C}^{(t)}}{\partial
    {w}_{ij}}\frac{\partial {C}^{\left(t-1\right)}}{\partial {w}_{ij}}\right)=- ve
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq70.png)—then
    reduce the learning rate by a factor *η*[−] = 0.5\. The update rule becomes as
    follows:'
  id: totrans-487
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一个维度的当前和前一个梯度分量的符号不同——即 ![$$ \mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\frac{\partial {C}^{\left(t-1\right)}}{\partial {w}_{ij}}\right)=-
    ve $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq70.png)——则通过一个因子
    *η*[−] = 0.5 减小学习率。更新规则如下：
- en: '![$$ {\varDelta_{ij}}^{\left(t+1\right)}=\max \left({\eta}_{-}{\varDelta_{ij}}^{(t)},{\varDelta}_{min}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcm.png)'
  id: totrans-488
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\varDelta_{ij}}^{\left(t+1\right)}=\max \left({\eta}_{-}{\varDelta_{ij}}^{(t)},{\varDelta}_{min}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcm.png)'
- en: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right).{\varDelta_{ij}}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcn.png)'
  id: totrans-489
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right).{\varDelta_{ij}}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcn.png)'
- en: 'If ![$$ \frac{\partial {C}^{(t)}}{\partial {w}_{ij}}\frac{\partial {C}^{\left(t-1\right)}}{\partial
    {w}_{ij}}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq71.png),
    the update rule is as follows:'
  id: totrans-490
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 ![$$ \frac{\partial {C}^{(t)}}{\partial {w}_{ij}}\frac{\partial {C}^{\left(t-1\right)}}{\partial
    {w}_{ij}}=0 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq71.png)，更新规则如下：
- en: '![$$ {\varDelta_{ij}}^{\left(t+1\right)}={\varDelta_{ij}}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equco.png)'
  id: totrans-491
  prefs: []
  type: TYPE_IMG
  zh: '![Δ_ij^(t+1) = Δ_ij^(t)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equco.png)'
- en: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\mathit{\operatorname{sign}}\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right).{\varDelta_{ij}}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcp.png)'
  id: totrans-492
  prefs: []
  type: TYPE_IMG
  zh: '![w_ij^(t+1) = w_ij^(t) - sign(∂C^(t)/∂w_ij)Δ_ij^(t+1)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcp.png)'
- en: The dimensions along which the gradients are not changing sign at a specific
    interval during gradient descent are the dimensions along which the weight changes
    are consistent. Hence, increasing the learning rate would lead to faster convergence
    of those weights to their final value.
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 在梯度下降过程中，梯度在特定间隔内不改变符号的维度是权重变化一致的维度。因此，增加学习率会导致这些权重更快地收敛到它们的最终值。
- en: The dimensions along which the gradients are changing sign indicate that along
    those dimensions, the weight changes are inconsistent, and so by decreasing the
    learning rate, one would avoid oscillations and better catch up with the curvatures.
    For a convex function, gradient sign change generally occurs when there is curvature
    in the cost function surface and the learning rate is set high. Since the gradient
    does not have the curvature information, a large learning rate takes the updated
    parameter value beyond the minima point, and the phenomena keep on repeating on
    either side of the minima point.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度符号变化的维度表明，在这些维度上，权重变化是不一致的，因此通过降低学习率，可以避免振荡并更好地捕捉曲率。对于一个凸函数，梯度符号变化通常发生在损失函数表面有曲率且学习率设置较高时。由于梯度没有曲率信息，较大的学习率会将更新后的参数值带到最小值点之外，这种现象会在最小值点的两侧重复发生。
- en: '`Rprop` works well with full batches but does not do well when stochastic gradient
    descent is involved. When the learning rate is very small, gradients from different
    mini-batches average out in cases of stochastic gradient descent. If through stochastic
    gradient descent for a cost function the gradients for a weight are +0.2 each
    for nine mini-batches and -0.18 for the tenth mini-batch when the learning rate
    is small, then the effective gradient effect for stochastic gradient descent is
    almost zero, and the weight remains almost at the same position, which is the
    desired outcome.'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: '`Rprop`与完整批次配合得很好，但在涉及随机梯度下降时表现不佳。当学习率非常小的时候，在随机梯度下降的情况下，不同小批次的梯度会平均化。如果通过随机梯度下降对一个损失函数的权重梯度是每个小批次+0.2，而在第十个小批次时为-0.18（学习率小），那么随机梯度下降的有效梯度效应几乎为零，权重几乎保持在相同的位置，这是期望的结果。'
- en: However, with `Rprop` the learning rate will increase about nine times and decrease
    only once, and hence the effective weight would be much larger than zero. This
    is undesirable.
  id: totrans-496
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在`Rprop`中，学习率将增加大约九次，而减少一次，因此有效权重将远大于零。这是不希望的。
- en: To combine the qualities of `Rprop`’s adaptive learning rule for each weight
    with the efficiency of stochastic gradient descent, `RMSprop` came into the picture.
    In `Rprop` we do not use the magnitude but rather just the sign of the gradient
    for each weight. The sign of the gradient for each weight can be thought of as
    dividing the gradient for the weight by its magnitude. The problem with stochastic
    gradient descent is that with each mini-batch, the cost function keeps on changing
    and hence so do the gradients. So, the idea is to get a magnitude of gradient
    for a weight that would not fluctuate much over nearby mini-batches. What would
    work well is a root mean of the squared gradients for each weight over the recent
    mini-batches to normalize the gradient.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 为了结合`Rprop`对每个权重的自适应学习规则的质量和随机梯度下降的效率，`RMSprop`应运而生。在`Rprop`中，我们不是使用梯度的幅度，而是仅使用每个权重的梯度符号。每个权重的梯度符号可以理解为将权重的梯度除以其幅度。随机梯度下降的问题在于，随着每个小批次的到来，损失函数不断变化，因此梯度也随之变化。因此，想法是得到一个权重梯度的幅度，这个幅度在附近的批次中不会波动太大。对于每个权重，在最近的批次中对平方梯度的均方根进行计算将很好地起到归一化梯度的作用。
- en: '![$$ {g_{ij}}^{(t)}=\alpha {g_{ij}}^{\left(t-1\right)}+\left(1-\alpha \right){\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right)}^2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcq.png)'
  id: totrans-498
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ g_{ij}^{(t)}=\alpha g_{ij}^{\left(t-1\right)}+\left(1-\alpha \right)\left(\frac{\partial
    C^{(t)}}{\partial w_{ij}}\right)^2 $](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcq.png)'
- en: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\eta }{\sqrt{g_{ij}^{(t)}+\epsilon
    }}\frac{\partial {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcr.png)'
  id: totrans-499
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ w_{ij}^{\left(t+1\right)}=w_{ij}^{(t)}-\frac{\eta }{\sqrt{g_{ij}^{(t)}+\epsilon
    }}\frac{\partial C^{(t)}}{\partial w_{ij}} $](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcr.png)'
- en: where *g*^((*t*)) is the root mean square of the gradients for the weight *w*[*ij*]
    at iteration *t* and *α* is the decay rate for the root mean square gradient for
    each weight *w*[*ij*].
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *g*^((*t*)) 是在迭代 *t* 时权重 *w*[*ij*] 的梯度的均方根，而 *α* 是每个权重 *w*[*ij*] 的均方根梯度的衰减率。
- en: Usage
  id: totrans-501
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 使用方法
- en: '[PRE16]'
  id: totrans-502
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: where `decay` represents *α*, epsilon represents *ϵ*, and *η* represents the
    learning rate.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `decay` 表示 *α*，epsilon 表示 *ϵ*，而 *η* 表示学习率。
- en: AdadeltaOptimizer
  id: totrans-504
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: AdadeltaOptimizer
- en: '`AdadeltaOptimizer` is a variant of `AdagradOptimizer` that is less aggressive
    in reducing the learning rate. For each weight connection, `AdagradOptimizer`
    scales the learning rate constant in an iteration by dividing it by the root mean
    square of all past gradients for that weight till that iteration. So, the effective
    learning rate for each weight is a monotonically decreasing function of the iteration
    number, and after a considerable number of iterations, the learning rate becomes
    infinitesimally small. `AdagradOptimizer` overcomes this problem by taking the
    mean of the exponentially decaying squared gradients for each weight or dimension.
    Hence, the effective learning rate in `AdadeltaOptimizer` remains more of a local
    estimate of its current gradients and does not shrink as fast as the `AdagradOptimizer`
    method. This ensures that learning continues even after a considerable number
    of iterations or epochs. The learning rule for `Adadelta` can be summed up as
    follows:'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: '`AdadeltaOptimizer` 是 `AdagradOptimizer` 的一个变体，它在降低学习率方面不那么激进。对于每个权重连接，`AdagradOptimizer`
    通过将学习率常数除以直到该迭代为止的所有过去梯度的均方根来缩放迭代中的学习率常数。因此，每个权重的有效学习率是迭代数的单调递减函数，在相当多的迭代之后，学习率变得极其小。`AdagradOptimizer`
    通过对每个权重或维度的指数衰减平方梯度取平均来克服这个问题。因此，`AdadeltaOptimizer` 中的有效学习率更多地是当前梯度的局部估计，并且不会像
    `AdagradOptimizer` 方法那样快速收缩。这确保了即使在相当多的迭代或周期之后，学习仍然继续。`Adadelta` 的学习规则可以总结如下：'
- en: '![$$ {g}_{ij}^{(t)}=\gamma {g}_{ij}^{\left(t-1\right)}+\left(1-\gamma \right){\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right)}^2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcs.png)'
  id: totrans-506
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ g_{ij}^{(t)}=\gamma g_{ij}^{\left(t-1\right)}+\left(1-\gamma \right)\left(\frac{\partial
    C^{(t)}}{\partial w_{ij}}\right)^2 $](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcs.png)'
- en: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\eta }{\sqrt{g_{ij}^{(t)}+\in
    }}\frac{\partial {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equct.png)'
  id: totrans-507
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ w_{ij}^{\left(t+1\right)}=w_{ij}^{(t)}-\frac{\eta }{\sqrt{g_{ij}^{(t)}+\epsilon
    }}\frac{\partial C^{(t)}}{\partial w_{ij}} $](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equct.png)'
- en: 'where *γ* is the exponential decay constant, *η* is a learning-rate constant,
    and *g*[*ij*]^((*t*)) represents the effective mean square gradient at iteration
    *t*. We can denote the term ![$$ \sqrt{g_{ij}^{(t)}+\in } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq72.png)
    as *RMS*(*g*[*ij*]^((*t*))), which gives the update rule as follows:'
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *γ* 是指数衰减常数，*η* 是学习率常数，而 *g*[*ij*]^((*t*)) 表示在迭代 *t* 时的有效均方梯度。我们可以将项 ![$$
    \sqrt{g_{ij}^{(t)}+\in } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq72.png)
    表示为 *RMS*(*g*[*ij*]^((*t*))), 这给出了以下更新规则：
- en: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\eta }{RMS\left({g}_{ij}^{(t)}\right)}\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcu.png)'
  id: totrans-509
  prefs: []
  type: TYPE_IMG
  zh: '![公式 $ w_{ij}^{\left(t+1\right)}=w_{ij}^{(t)}-\frac{\eta }{RMS\left(g_{ij}^{(t)}\right)}\frac{\partial
    C^{(t)}}{\partial w_{ij}} $](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcu.png)'
- en: 'If we observe carefully, the unit for the change in weight doesn’t have the
    unit of the weight. The units for ![$$ \frac{\partial {C}^{(t)}}{\partial {w}_{ij}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq73.png) and *RMS*(*g*[*ij*]^((*t*)))
    are the same—i.e., the unit of gradient (cost function change/per unit weight
    change)—and hence they cancel each other out. Therefore, the unit of the weight
    change is the unit of the learning-rate constant. `Adadelta` solves this problem
    by replacing the learning-rate constant *η* with a square root of the mean of
    the exponentially decaying squared-weight updates up to the current iteration.
    Let *h*[*ij*]^((*t*)) be the mean of the square of the weight updates up to iteration
    *t*, β be the decaying constant, and *Δw*[*ij*]^((*t*)) be the weight update in
    iteration *t*. Then, the update rule for *h*[*ij*]^((*t*)) and the final weight
    update rule for `Adadelta` can be expressed as follows:'
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们仔细观察，权重量变的单位并不具有权重的单位。![$$ \frac{\partial {C}^{(t)}}{\partial {w}_{ij}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq73.png) 和 *RMS*(*g*[*ij*]^((*t*)))
    的单位相同——即梯度的单位（成本函数变化/单位权重变化）——因此它们相互抵消。因此，权重量变的单位是学习率常数的单位。`Adadelta` 通过用当前迭代的指数衰减平方权重更新的均值平方根替换学习率常数
    *η* 来解决这个问题。设 *h*[*ij*]^((*t*)) 为迭代 *t* 时权重更新的均值，β 为衰减常数，*Δw*[*ij*]^((*t*)) 为迭代
    *t* 时的权重更新。那么，*h*[*ij*]^((*t*)) 的更新规则和 `Adadelta` 的最终权重更新规则可以表示如下：
- en: '![$$ {h}_{ij}^{(t)}=\upbeta {h}_{ij}^{\left(t-1\right)}+\left(1-\upbeta \right){\left(\varDelta
    {w}_{ij}^{(t)}\right)}^2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcv.png)'
  id: totrans-511
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {h}_{ij}^{(t)}=\upbeta {h}_{ij}^{\left(t-1\right)}+\left(1-\upbeta \right){\left(\varDelta
    {w}_{ij}^{(t)}\right)}^2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcv.png)'
- en: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\sqrt{h_{ij}^{(t)}+\epsilon
    }}{RMS\left({g}_{ij}^{(t)}\right)}\frac{\partial {C}^{(t)}}{\partial {w}_{ij}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcw.png)'
  id: totrans-512
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\sqrt{h_{ij}^{(t)}+\epsilon
    }}{RMS\left({g}_{ij}^{(t)}\right)}\frac{\partial {C}^{(t)}}{\partial {w}_{ij}}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcw.png)'
- en: 'If we denote ![$$ \sqrt{h_{ij}^{(t)}+\epsilon } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq74.png)as
    *RMS*(*h*[*ij*]^((*t*))), then the update rule becomes as follows:'
  id: totrans-513
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将 ![$$ \sqrt{h_{ij}^{(t)}+\epsilon } $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq74.png)
    记为 *RMS*(*h*[*ij*]^((*t*)))，那么更新规则变为如下：
- en: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{RMS\left({h}_{ij}^{(t)}\right)}{RMS\left({g}_{ij}^{(t)}\right)}\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcx.png)'
  id: totrans-514
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{RMS\left({h}_{ij}^{(t)}\right)}{RMS\left({g}_{ij}^{(t)}\right)}\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcx.png)'
- en: Usage
  id: totrans-515
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 使用方法
- en: '[PRE17]'
  id: totrans-516
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: where `rho` represents γ, `epsilon` represents *ϵ*, and *η* represents the learning
    rate.
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `rho` 代表 γ，`epsilon` 代表 *ϵ*，*η* 代表学习率。
- en: One significant advantage of `Adadelta` is that it eliminates the learning-rate
    constant altogether. If we compare `Adadelta` and `RMSprop,` both are the same
    if we leave aside the learning-rate constant elimination. `Adadelta` and `RMSprop`
    were both developed independently around the same time to resolve the fast learning-rate
    decay problem of `Adagrad`.
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: '`Adadelta` 的一大优势是它完全消除了学习率常数。如果我们比较 `Adadelta` 和 `RMSprop`，忽略学习率常数的消除，两者是相同的。`Adadelta`
    和 `RMSprop` 都是在大约同一时间独立开发的，旨在解决 `Adagrad` 的快速学习率衰减问题。'
- en: AdamOptimizer
  id: totrans-519
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: AdamOptimizer
- en: '`Adam`, or Adaptive Moment Estimator, is another optimization technique that,
    much like `RMSprop` or `Adagrad`, has an adaptive learning rate for each parameter
    or weight. `Adam` not only keeps a running mean of squared gradients but also
    keeps a running mean of past gradients.'
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: '`Adam`，或自适应矩估计器，是另一种优化技术，与 `RMSprop` 或 `Adagrad` 类似，为每个参数或权重具有自适应学习率。`Adam`
    不仅保持平方梯度的运行均值，还保持过去梯度的运行均值。'
- en: 'Let the decay rate of the mean of gradients *m*[*ij*]^((*t*)) and the mean
    of the square of gradients *v*[*ij*]^((*t*)) for each weight *w*[*ij*] be *β*[1]
    and *β*[2], respectively. Also, let η be the constant learning-rate factor. Then,
    the update rules for `Adam` are as follows:'
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 设每个权重 *w*[*ij*] 的梯度均值的衰减率 *m*[*ij*]^((*t*)) 和梯度平方的均值 *v*[*ij*]^((*t*)) 分别为 *β*[1]
    和 *β*[2]。同时，设 η 为常数学习率因子。那么，`Adam` 的更新规则如下：
- en: '![$$ {m}_{ij}^{(t)}={\beta}_1{m}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcy.png)'
  id: totrans-522
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {m}_{ij}^{(t)}={\beta}_1{m}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcy.png)'
- en: '![$$ {v}_{ij}^{(t)}={\beta}_2{v}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_2\right){\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right)}^2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcz.png)'
  id: totrans-523
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{ij}^{(t)}={\beta}_2{v}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_2\right){\left(\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right)}^2 $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equcz.png)'
- en: 'If we expand the expression for the moving average of the gradient ![$$ {m}_{ij}^{(t)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq75.png) and the
    square of the gradient ![$$ {v}_{ij}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq76.png)
    we would see their expectations are biased. For instance, the gradient iteration
    *t* can be simplified as follows:'
  id: totrans-524
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们展开梯度移动平均的表示式 ![$$ {m}_{ij}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq75.png)
    和梯度的平方 ![$$ {v}_{ij}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq76.png)，我们会看到它们的期望是有偏的。例如，梯度迭代
    *t* 可以简化如下：
- en: '![$$ {m}_{ij}^{(t)}={\beta}_1{m}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equda.png)'
  id: totrans-525
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {m}_{ij}^{(t)}={\beta}_1{m}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equda.png)'
- en: '![$$ ={\beta}_1\left({\beta}_1{m}_{ij}^{\left(t-2\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{\left(t-1\right)}}{\partial {w}_{ij}}\right)+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdb.png)'
  id: totrans-526
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={\beta}_1\left({\beta}_1{m}_{ij}^{\left(t-2\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{\left(t-1\right)}}{\partial {w}_{ij}}\right)+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdb.png)'
- en: '![$$ ={\beta}_1^2{m}_{ij}^{\left(t-2\right)}+{\beta}_1\left(1-{\beta}_1\right)\frac{\partial
    {C}^{\left(t-1\right)}}{\partial {w}_{ij}}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdc.png)'
  id: totrans-527
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={\beta}_1^2{m}_{ij}^{\left(t-2\right)}+{\beta}_1\left(1-{\beta}_1\right)\frac{\partial
    {C}^{\left(t-1\right)}}{\partial {w}_{ij}}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdc.png)'
- en: '![$$ ={\beta}_1^t{m}_{ij}^{(0)}+{\beta}_1^{t-1}\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(1)}}{\partial {w}_{ij}}+\dots +\left(1-{\beta}_1\right)\frac{\partial {C}^{(t)}}{\partial
    {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdd.png)'
  id: totrans-528
  prefs: []
  type: TYPE_IMG
  zh: '![$$ ={\beta}_1^t{m}_{ij}^{(0)}+{\beta}_1^{t-1}\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(1)}}{\partial {w}_{ij}}+\dots +\left(1-{\beta}_1\right)\frac{\partial {C}^{(t)}}{\partial
    {w}_{ij}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdd.png)'
- en: 'Taking expectation of the ![$$ E\left[{m}_{ij}^{(t)}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq77.png)
    and assuming that E![$$ \left[\frac{\partial {C}^{(i)}}{\partial {w}_{ij}}\right]=g
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq78.png) is the
    actual gradient of the full dataset, we have the following:'
  id: totrans-529
  prefs: []
  type: TYPE_NORMAL
  zh: 对 ![$$ E\left[{m}_{ij}^{(t)}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq77.png)
    求期望，并假设 E![$$ \left[\frac{\partial {C}^{(i)}}{\partial {w}_{ij}}\right]=g $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq78.png)
    是整个数据集的实际梯度，我们得到以下结果：
- en: '![$$ E\left[{m}_{ij}^{(t)}\right]=E\left[{\beta}_1^t{m}_{ij}^{(0)}+{\beta}_1^{t-1}\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(1)}}{\partial {w}_{ij}}+\dots +\left(1-{\beta}_1\right)\frac{\partial {C}^{(t)}}{\partial
    {w}_{ij}}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equde.png)'
  id: totrans-530
  prefs: []
  type: TYPE_IMG
  zh: '![$$ E\left[{m}_{ij}^{(t)}\right]=E\left[{\beta}_1^t{m}_{ij}^{(0)}+{\beta}_1^{t-1}\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(1)}}{\partial {w}_{ij}}+\dots +\left(1-{\beta}_1\right)\frac{\partial {C}^{(t)}}{\partial
    {w}_{ij}}\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equde.png)'
- en: '![$$ =E\left[{\beta}_1^t{m}_{ij}^{(0)}\right]+\left(1-{\beta}_1\right)g\left[{\beta}_1^{t-1}+\dots
    +1\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdf.png)'
  id: totrans-531
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =E\left[{\beta}_1^t{m}_{ij}^{(0)}\right]+\left(1-{\beta}_1\right)g\left[{\beta}_1^{t-1}+\dots
    +1\right] $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdf.png)'
- en: '![$$ =E\left[{\beta}_1^t{m}_{ij}^{(0)}\right]+\frac{\left(1-{\beta}_1\right)g\left(1-{\beta}_1^t\right)}{\left(1-{\beta}_1\right)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdg.png)'
  id: totrans-532
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =E\left[{\beta}_1^t{m}_{ij}^{(0)}\right]+\frac{\left(1-{\beta}_1\right)g\left(1-{\beta}_1^t\right)}{\left(1-{\beta}_1\right)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdg.png)'
- en: 'If we take the initial estimate of the moving average of gradient ![$$ {m}_{ij}^{(0)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq79.png) to be
    zero, then we have from above:'
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将梯度移动平均的初始估计 ![$$ {m}_{ij}^{(0)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq79.png)
    设为零，那么根据上面的公式，我们有：
- en: '![$$ E\left[{m}_{ij}^{(t)}\right]=E\left[{\beta}_1{m}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right]=g\left(1-{\beta}_1^t\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdh.png)'
  id: totrans-534
  prefs: []
  type: TYPE_IMG
  zh: '![$$ E\left[{m}_{ij}^{(t)}\right]=E\left[{\beta}_1{m}_{ij}^{\left(t-1\right)}+\left(1-{\beta}_1\right)\frac{\partial
    {C}^{(t)}}{\partial {w}_{ij}}\right]=g\left(1-{\beta}_1^t\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdh.png)'
- en: 'Hence to make the moving average of the gradient unbiased estimate of the true
    gradient *g* of the entire dataset at iteration *t*, we define the normalized
    moving average of gradient as ![$$ {\hat{m}}_{ij}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq80.png)
    as follows:'
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了使梯度移动平均成为迭代 *t* 时整个数据集的真实梯度 *g* 的无偏估计，我们定义梯度归一化移动平均为 ![$$ {\hat{m}}_{ij}^{(t)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq80.png)，如下所示：
- en: '![$$ {\hat{m}}_{ij}^{(t)}=\frac{m_{ij}^{(t)}}{\left(1-{\beta}_1^t\right)\ }
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdi.png)'
  id: totrans-536
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\hat{m}}_{ij}^{(t)}=\frac{m_{ij}^{(t)}}{\left(1-{\beta}_1^t\right)\ }
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdi.png)'
- en: 'Similarly, we define the normalized moving average of the square of the gradient
    ![$$ {v}_{ij}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq81.png)
    as follows:'
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们定义梯度平方的归一化移动平均为 ![$$ {v}_{ij}^{(t)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq81.png)，如下所示：
- en: '![$$ {\hat{v}}_{ij}^{(t)}=\frac{v_{ij}^{(t)}}{\left(1-{\beta}_2^t\right)\ }
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdj.png)'
  id: totrans-538
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\hat{v}}_{ij}^{(t)}=\frac{v_{ij}^{(t)}}{\left(1-{\beta}_2^t\right)\ }
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdj.png)'
- en: 'The final update rule for each weight *w*[*ij*] is as follows:'
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 每个权重 *w*[*ij*] 的最终更新规则如下：
- en: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\frac{\eta }{\sqrt{\hat{v_{ij}^{(t)}}+\in
    }}\hat{m_{ij}^{(t)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdk.png)'
  id: totrans-540
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w_{ij}}^{\left(t+1\right)}={w_{ij}}^{(t)}-\frac{\eta }{\sqrt{\hat{v_{ij}^{(t)}}+\in
    }}\hat{m_{ij}^{(t)}} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdk.png)'
- en: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\eta\ {\hat{m}}_{ij}^{(t)}}{\sqrt{{\hat{v}}_{ij}^{(t)}+\epsilon
    }} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdl.png)'
  id: totrans-541
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {w}_{ij}^{\left(t+1\right)}={w}_{ij}^{(t)}-\frac{\eta\ {\hat{m}}_{ij}^{(t)}}{\sqrt{{\hat{v}}_{ij}^{(t)}+\epsilon
    }} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdl.png)'
- en: Usage
  id: totrans-542
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 使用方法
- en: '[PRE18]'
  id: totrans-543
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: where `learning_rate` is the constant learning rate *η* and `cost` *C* is the
    cost function that needs to be minimized through `AdamOptimizer`. The parameters
    `beta1` and `beta2` correspond to *β*[1] and *β*[2], respectively, whereas `epsilon`
    represents ∈.
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，`learning_rate` 是常数学习率 *η*，`cost` *C* 是需要通过 `AdamOptimizer` 最小化的成本函数。参数 `beta1`
    和 `beta2` 分别对应 *β*[1] 和 *β*[2]，而 `epsilon` 代表 ∈。
- en: MomentumOptimizer and Nesterov Algorithm
  id: totrans-545
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 动量优化器和Nesterov算法
- en: 'The momentum-based optimizers have evolved to take care of non-convex optimizations.
    Whenever we are working with neural networks, the cost functions that we generally
    get are non-convex in nature, and thus the gradient-based optimization methods
    might get caught up in bad local minima. As discussed earlier, this is highly
    undesirable since in such cases we get a suboptimal solution to the optimization
    problem—and likely a suboptimal model. Also, gradient descent follows the slope
    at each point and makes small advances toward the local minima, but it can be
    terribly slow. Momentum-based methods introduce a component called velocity *v*
    that dampens the parameter update when the gradient computed changes sign, whereas
    it accelerates the parameter update when the gradient is in the same direction
    of velocity. This introduces faster convergence as well as fewer oscillations
    around the global minima or around a local minimum that provides good generalization.
    The update rule for momentum-based optimizers is as follows:'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 基于动量的优化器已经发展起来以处理非凸优化。每当我们在处理神经网络时，我们通常得到的成本函数在本质上是非凸的，因此基于梯度的优化方法可能会陷入局部最小值。如前所述，这是非常不希望的，因为在这些情况下，我们得到的优化问题的解是次优的——并且可能是一个次优模型。此外，梯度下降遵循每个点的斜率，并朝着局部最小值进行小步前进，但它可能非常慢。基于动量的方法引入了一个称为速度
    *v* 的组件，当计算的梯度改变符号时，它会抑制参数更新，而当梯度与速度方向相同时，它会加速参数更新。这引入了更快的收敛速度以及围绕全局最小值或提供良好泛化的局部最小值的更少振荡。基于动量的优化器的更新规则如下：
- en: '![$$ {v}_i^{\left(t+1\right)}=\alpha {v}_i^{(t)}-\eta \frac{\partial C}{\partial
    {w}_i}\ \left({w_i}^{(t)}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdm.png)'
  id: totrans-547
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdm.png)'
- en: '![$$ {w_i}^{\left(t+1\right)}={w_i}^{(t)}+{v}_i^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdn.png)'
  id: totrans-548
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdn.png)'
- en: where *α* is the momentum parameter and *η* is the learning rate. The terms
    *v*[*i*]^((*t*)) and ![$$ {v}_i^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq82.png)
    represent the velocity at iterations *t* and (*t* + 1), respectively, for the
    *ith* parameter. Similarly, *w*[*i*]^((*t*)) and *w*[*i*]^((*t* + 1)) represent
    the weight of the *ith* parameter at iterations *t* and *t* + 1, respectively.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *α* 是动量参数，*η* 是学习率。术语 *v*[*i*]^((*t*)) 和 ![$$ {v}_i^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq82.png)
    分别表示第 *i* 个参数在迭代 *t* 和 (*t* + 1) 时的速度，同样，*w*[*i*]^((*t*)) 和 *w*[*i*]^((*t* + 1))
    分别表示第 *i* 个参数在迭代 *t* 和 *t* + 1 时的权重。
- en: Imagine that while optimizing a cost function the optimization algorithm reaches
    a local minimum where ![$$ \frac{\partial C}{\partial {w}_i}\left({w}_i^{(t)}\right)\to
    0\forall i\in \left\{1,2,..n\right\} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq83.png).
    In normal gradient-descent methods that do not take momentum into consideration,
    the parameter update would stop at that local minimum or the saddle point. However,
    in momentum-based optimization, the prior velocity would drive the algorithm out
    of the local minima, considering the local minima has a small basin of attraction,
    as ![$$ {v}_i^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq84.png)
    would be non-zero because of the non-zero velocity from prior gradients. Also,
    if the prior gradients consistently pointed toward a global minimum or a local
    minimum with good generalization and a reasonably large basin of attraction, the
    velocity or the momentum of gradient descent would be in that direction. So, even
    if there were a bad local minimum with a small basin of attraction, the momentum
    component would not only drive the algorithm out of the bad local minima but also
    would continue the gradient descent toward the global minima or the good local
    minima.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，在优化成本函数时，优化算法达到一个局部最小值，其中 ![$$ \frac{\partial C}{\partial {w}_i}\left({w}_i^{(t)}\right)\to
    0\forall i\in \left\{1,2,..n\right\} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq83.png)。在正常梯度下降方法中，如果不考虑动量，参数更新会在那个局部最小值或鞍点停止。然而，在基于动量的优化中，先前的速度会将算法驱出局部最小值，因为局部最小值具有较小的吸引域，如
    ![$$ {v}_i^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq84.png)
    由于先前梯度的非零速度而不会为零。此外，如果先前的梯度始终指向全局最小值或具有良好泛化能力和合理大吸引域的局部最小值，则梯度下降的速度或动量将朝那个方向。因此，即使存在具有小吸引域的坏局部最小值，动量分量不仅会驱使算法离开坏局部最小值，还会继续梯度下降以指向全局最小值或好的局部最小值。
- en: 'If the weights are part of the parameter vector *θ*, the vectorized update
    rule for momentum-based optimizers would be as follows (refer to Figure [2-24](#Fig24)
    for the vector-based illustration):'
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 如果权重是参数向量 *θ* 的一部分，基于动量的优化器的向量化更新规则如下（参见图 [2-24](#Fig24) 以了解基于矢量的说明）：
- en: '![$$ {v}^{\left(t+1\right)}=\alpha {v}^{(t)}-\eta \nabla C\ \left(\theta ={\theta}^{(t)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdo.png)'
  id: totrans-552
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}^{\left(t+1\right)}=\alpha {v}^{(t)}-\eta \nabla C\ \left(\theta ={\theta}^{(t)}\right)
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdo.png)'
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}+{v}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdp.png)'
  id: totrans-553
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}+{v}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdp.png)'
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig24_HTML.jpg)'
  id: totrans-554
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig24_HTML.jpg)'
- en: Five arrows are displayed on the momentum parameter vector graphic to represent
    five different equations.
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: 动量参数矢量图上显示了五个箭头，以表示五个不同的方程。
- en: Figure 2-24
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-24
- en: Parameter vector update in momentum-based gradient-descent optimizer
  id: totrans-557
  prefs: []
  type: TYPE_NORMAL
  zh: 基于动量的梯度下降优化器中的参数向量更新
- en: A specific variant of momentum-based optimizers is the Nesterov accelerated
    gradient technique. This method utilizes the existing velocity *v*^((*t*)) to
    make an update to the parameter vector. Since it is an intermediate update to
    the parameter vector, it’s convenient to denote it by ![$$ {\theta}^{\left(t+\frac{1}{2}\right)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq85.png) The gradient
    of the cost function is evaluated at ![$$ {\theta}^{\left(t+\frac{1}{2}\right)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq86.png) and the
    same is used to update the new velocity. Finally, the new parameter vector is
    the sum of the parameter vector at the previous iteration and the new velocity.
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 基于动量的优化器的一个特定变体是Nesterov加速梯度技术。这种方法利用现有的速度 *v*^((*t*)) 来更新参数向量。由于它是对参数向量的中间更新，因此方便地用
    ![$$ {\theta}^{\left(t+\frac{1}{2}\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq85.png)
    表示。在 ![$$ {\theta}^{\left(t+\frac{1}{2}\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_IEq86.png)
    处评估成本函数的梯度，并使用相同的梯度来更新新的速度。最后，新的参数向量是前一次迭代的参数向量和新的速度之和。
- en: '![$$ {\theta}^{\left(t+\frac{1}{2}\right)}={\theta}^{(t)}+\alpha {v}^{(t)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdq.png)'
  id: totrans-559
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}^{\left(t+\frac{1}{2}\right)}={\theta}^{(t)}+\alpha {v}^{(t)}
    $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdq.png)'
- en: '![$$ {v}^{\left(t+1\right)}=\alpha {v}^{(t)}-\eta \nabla C\ \left(\uptheta
    ={\theta}^{\left(t+\frac{1}{2}\right)}\right) $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdr.png)'
  id: totrans-560
  prefs: []
  type: TYPE_IMG
  zh: '![v^(t+1)=αv^(t)−η∇C(θ=θ^(t+1/2))] (../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equdr.png)'
- en: '![$$ {\theta}^{\left(t+1\right)}={\theta}^{(t)}+{v}^{\left(t+1\right)} $$](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equds.png)'
  id: totrans-561
  prefs: []
  type: TYPE_IMG
  zh: '![θ^(t+1)=θ^(t)+v^(t+1)](../images/448418_2_En_2_Chapter/448418_2_En_2_Chapter_TeX_Equds.png)'
- en: Usage
  id: totrans-562
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 使用方法
- en: '[PRE19]'
  id: totrans-563
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: where `learning_rate` represents *η*, `momentum` represents *α*, and `use_nesterov`
    determines whether to use the Nesterov version of momentum.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 `learning_rate` 代表 *η*，`momentum` 代表 *α*，而 `use_nesterov` 决定是否使用 Nesterov
    动量的版本。
- en: Epoch, Number of Batches, and Batch Size
  id: totrans-565
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Epoch、批次数和批大小
- en: 'Deep-learning networks, as mentioned earlier, are generally trained through
    mini-batch stochastic gradient descent. A few of the terms with which we need
    to familiarize ourselves are as follows:'
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习网络，如前所述，通常通过小批量随机梯度下降进行训练。我们需要熟悉的一些术语如下：
- en: '***Batch size***: The batch size determines the number of training data points
    in each mini-batch. The batch size should be chosen such that it gives a good
    enough estimate of the gradient for the full training dataset and at the same
    time noisy enough to escape bad local minima that do not provide good generalization.'
  id: totrans-567
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Batch size***：批大小决定了每个小批量中的训练数据点的数量。批大小应选择得足够好，以便对整个训练数据集的梯度给出足够好的估计，同时足够嘈杂，以避免提供不良泛化的坏局部最小值。'
- en: '***Number of batches***: The number of batches gives the total number of mini-batches
    in the entire training dataset. It can be computed by dividing the count of the
    total training data points by the batch size. Please note that the last mini-batch
    might have a smaller number of data points than the batch size.'
  id: totrans-568
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Number of batches***：批次数给出了整个训练数据集中的小批次数量。可以通过将总训练数据点的数量除以批大小来计算。请注意，最后一个
    mini-batch 可能比批大小有更少的数据点。'
- en: '***Epochs***: One epoch consists of one full pass of training over the entire
    dataset. To be more specific, one epoch is equivalent to a forward pass plus one
    backpropagation over the entire training dataset. So, one epoch would consist
    of *n* number of forward pass + backpropagation where *n* denotes the number of
    batches.'
  id: totrans-569
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Epochs***：一个 epoch 包括在整个数据集上的一次完整训练过程。更具体地说，一个 epoch 等同于在整个训练数据集上的前向传播加上一次反向传播。因此，一个
    epoch 将包含 *n* 次前向传播 + 反向传播，其中 *n* 表示批次的数量。'
- en: XOR Implementation Using TensorFlow
  id: totrans-570
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 TensorFlow 实现 XOR
- en: Now that we have a decent idea of the components and training methods involved
    with an artificial neural network; we will implement a XOR network using sigmoid
    activation functions in the hidden layers as well as in the output. The detailed
    implementation has been outlined in Listing [2-15](#PC21).
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经对人工神经网络涉及的组件和训练方法有了相当的了解；我们将使用 sigmoid 激活函数在隐藏层以及输出层实现 XOR 网络。详细的实现已在列表
    [2-15](#PC21) 中概述。
- en: '[PRE20]'
  id: totrans-572
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: In Listing [2-15](#PC21), the XOR logic has been implemented using TensorFlow
    2\. The hidden-layer units have sigmoid activation functions to introduce nonlinearity.
    The output activation function has a sigmoid activation function to give probability
    outputs. We are using the gradient-descent optimizer with a learning rate of 0.01
    and total iterations of around 100,000\. If we see the final prediction, the first
    and fourth training samples have a near-zero value for probabilities, while the
    second and fourth training samples have probabilities near 1\. So, the network
    can predict the classes accurately corresponding to the XOR labels with high precision.
    Any reasonable threshold on the output probabilities would classify the data points
    correctly into the XOR classes.
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: 在列表 [2-15](#PC21) 中，XOR 逻辑已经使用 TensorFlow 2 实现。隐藏层单元使用 sigmoid 激活函数来引入非线性。输出激活函数使用
    sigmoid 激活函数以给出概率输出。我们使用学习率为 0.01 且总迭代次数约为 100,000 的梯度下降优化器。如果我们查看最终预测，第一个和第四个训练样本的概率值接近零，而第二个和第四个训练样本的概率值接近
    1。因此，网络可以以高精度准确预测与 XOR 标签对应的类别。任何合理的输出概率阈值都可以将数据点正确分类到 XOR 类别中。
- en: TensorFlow Computation Graph for XOR Network
  id: totrans-574
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: XOR 网络的 TensorFlow 计算图
- en: In Figure [2-25](#Fig25), the computation graph for the preceding implemented
    XOR network is illustrated. The computation graph summary is written to the log
    files that can we defined as in the following anywhere in the code before the
    actual training or execution of the function of interest using tf.summary.create_file_writer()
    function. Here we choose to define the log prior to the MLP class instantiation
    for the model creation.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [2-25](#Fig25) 中，展示了之前实现的 XOR 网络的计算图。计算图摘要被写入日志文件中，我们可以在代码中的任何位置定义它，在实际上传或执行感兴趣的函数之前使用
    tf.summary.create_file_writer() 函数。在这里，我们选择在 MLP 类实例化之前定义日志。
- en: '`stamp = datetime.now().strftime("%Y%m%d-%H%M%S")`'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: '`stamp = datetime.now().strftime("%Y%m%d-%H%M%S")`'
- en: '`logdir = ''logs/func1/%s'' % stamp`'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: '`logdir = ''logs/func1/%s'' % stamp`'
- en: '`writer = tf.summary.create_file_writer(logdir)`'
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: '`writer = tf.summary.create_file_writer(logdir)`'
- en: '[PRE21]'
  id: totrans-579
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '`model = MLP(n_hidden=2,n_out=1)`'
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: '`model = MLP(n_hidden=2,n_out=1)`'
- en: Once we have defined the log writer, we need to set the summary trace on by
    using tf.summary.trace_on() function immediately before the function call or the
    model training of interest to us. For graph information, we need to set **graph=True**,
    while for profile information such as Memory and CPU time, we need to set **profile=True**
    while setting the summary trace on. Also, we need to set the trace_export functionality
    to write the traces to the log just after the computation logic (training, function
    call, etc.) we are trying to trace ends.
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们定义了日志写入器，我们需要通过使用 tf.summary.trace_on() 函数立即在函数调用或感兴趣的模型训练之前设置摘要跟踪。对于图信息，我们需要设置
    **graph=True**，而对于内存和 CPU 时间等配置信息，我们需要在设置摘要跟踪时设置 **profile=True**。此外，我们还需要将 trace_export
    功能设置在尝试跟踪的计算逻辑（训练、函数调用等）之后，将跟踪写入日志。
- en: 'In fact, the trace_on and trace_export functionalities should sandwidth the
    execution logic that we plan to trace. For the XOR example, we place the trace_on
    and trace_export functionality to trace the training of the model as in the following:'
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，trace_on 和 trace_export 功能应该覆盖我们计划跟踪的执行逻辑。对于 XOR 示例，我们将 trace_on 和 trace_export
    功能放置在以下跟踪模型训练的位置：
- en: '[PRE22]'
  id: totrans-583
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: This would start the TensorBoard session where we can observe the computation
    graph. Figure [2-25](#Fig25) shows the computation graph for the XOR network in
    Listing [2-15](#PC21).
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 这将启动 TensorBoard 会话，我们可以在此观察计算图。图 [2-25](#Fig25) 展示了列表 [2-15](#PC21) 中 XOR 网络的计算图。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig25_HTML.jpg)'
  id: totrans-585
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig25_HTML.jpg)'
- en: The representation of the computation graph. It contains both the main graph
    and auxiliary nodes such as gradient and m l p.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 计算图的表示。它包含主图以及梯度、mlp 等辅助节点。
- en: Figure 2-25
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-25
- en: Computation graph for the XOR network
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: XOR 网络的计算图
- en: Now, we implement the XOR logic again, using linear activation functions in
    the hidden layer and keeping the rest of the network as it is. Listing [2-16](#PC24)
    shows the TensorFlow implementation.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们再次实现 XOR 逻辑，在隐藏层中使用线性激活函数，其余网络保持不变。列表 [2-16](#PC24) 展示了 TensorFlow 的实现。
- en: '[PRE23]'
  id: totrans-590
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: The final predictions as shown in Listing [2-16](#PC24) are all near 0.5, which
    means that the implemented XOR logic is not able to do a good job in discriminating
    the positive class from the negative one. When we have linear activation functions
    in the hidden layer, the network primarily remains linear, as we have seen previously,
    and hence the model is not able to do well where nonlinear decision boundaries
    are required to separate classes.
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [2-16](#PC24) 所示的最终预测值都接近 0.5，这意味着实现的 XOR 逻辑无法很好地区分正类和负类。当我们隐藏层中有线性激活函数时，网络主要保持线性，正如我们之前所看到的，因此模型在需要非线性决策边界来分离类时表现不佳。
- en: Linear Regression in TensorFlow
  id: totrans-592
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow 中的线性回归
- en: Linear regression can be expressed as a single-neuron regression problem. The
    mean of the square of the errors in prediction is taken as the cost function to
    be optimized with respect to the coefficient of the model. Listing [2-17](#PC25)
    shows a TensorFlow implementation of linear regression with the Boston housing
    price dataset.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归可以表示为一个单神经元回归问题。预测误差平方的平均值被用作相对于模型系数的优化成本函数。列表 [2-17](#PC25) 展示了使用波士顿房价数据集的
    TensorFlow 线性回归实现。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig26_HTML.jpg)'
  id: totrans-594
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig26_HTML.jpg)'
- en: The relationship between M S E and epoch is represented on the graph. It begins
    with a sharp fall and then transitions to a straight line.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 图表上表示了均方误差（MSE）与迭代次数（epoch）之间的关系。它开始时急剧下降，然后转变为直线。
- en: Figure 2-26
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-26
- en: Cost (MSE) vs. epochs while training
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 训练过程中的成本（均方误差）与迭代次数对比
- en: '[PRE24]'
  id: totrans-598
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '[PRE25]'
  id: totrans-599
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig27_HTML.jpg)'
  id: totrans-600
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-27](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig27_HTML.jpg)'
- en: The graph displays a smattering of plot dots that are rising in number. The
    plot number reduced as the graph increased.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 图表显示了一些散点，这些散点随着图表的增加而数量增加。随着图表的增加，散点数量减少。
- en: Figure 2-27
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-27
- en: Predicted house price vs. actual house price
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 预测房价与实际房价对比
- en: '[PRE26]'
  id: totrans-604
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Figure [2-26](#Fig26) illustrates the cost progression against the epochs, and
    Figure [2-27](#Fig27) illustrates the predicted house price vs. the actual house
    price after training. As we can see, the linear regression using TensorFlow does
    a decent job of predicting the housing prices.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-26](#Fig26) 展示了成本随迭代次数的变化，图 [2-27](#Fig27) 展示了训练后预测房价与实际房价的对比。正如我们所见，使用
    TensorFlow 的线性回归在预测房价方面做得相当不错。
- en: Multiclass Classification with SoftMax Function Using Full-Batch Gradient Descent
  id: totrans-606
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用全批量梯度下降法通过 SoftMax 函数进行的多类分类
- en: In this section, we illustrate a multiclass classification problem using full-batch
    gradient descent. The MNIST dataset has been used because there are ten output
    classes corresponding to the ten integers. The detailed implementation is provided
    in Listing [2-18](#PC28). A SoftMax has been used as the output layer.
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们使用全批量梯度下降法来展示一个多类分类问题。MNIST 数据集被选用，因为它有十个输出类别，对应于十个整数。详细的实现已在列表 [2-18](#PC28)
    中提供。输出层使用了 SoftMax。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig28_HTML.jpg)'
  id: totrans-608
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-28](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig28_HTML.jpg)'
- en: The actual digits in the image are 7 2 1 0 4 1 4 9 5 9 and the predicted digits
    are 7 2 1 0 4 1 4 9 6 9.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 图像中的实际数字是 7 2 1 0 4 1 4 9 5 9，预测的数字是 7 2 1 0 4 1 4 9 6 9。
- en: Figure 2-28
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-28
- en: Actual digits vs. predicted digits for SoftMax classification through gradient
    descent
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 通过梯度下降法进行 SoftMax 分类的实际数字与预测数字对比
- en: '[PRE27]'
  id: totrans-612
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '[PRE28]'
  id: totrans-613
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: Figure [2-28](#Fig28) displays the actual digits vs. the predicted digits for
    SoftMax classification of the validation dataset samples after training through
    gradient-descent full-batch learning.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-28](#Fig28) 显示了经过梯度下降全批量学习训练后，验证数据集样本的 SoftMax 分类中实际数字与预测数字的对比。
