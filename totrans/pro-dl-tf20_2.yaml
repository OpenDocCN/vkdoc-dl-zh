  id: totrans-621
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: '[PRE30]'
  id: totrans-622
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Figure [2-29](#Fig29) displays the actual digits vs. predicted digits for SoftMax
    classification of the validation dataset samples after training through stochastic
    gradient descent.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-29](#Fig29) 显示了经过随机梯度下降训练后，验证数据集样本的 SoftMax 分类中实际数字与预测数字的对比。
- en: GPU
  id: totrans-624
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: GPU
- en: Before we end this chapter, we want to talk a little about GPU, which has revolutionized
    the deep-learning world. GPU stands for graphical processing unit, which was initially
    used for gaming purposes to display more screens per second for better gaming
    resolution. Deep-learning networks use a lot of matrix multiplication, especially
    convolution, for both the forward pass and for backpropagation. GPUs are good
    at matrix-to-matrix multiplication; hence, several thousand cores of GPU are utilized
    to process data in parallel. These speed up the deep-learning training.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束本章之前，我们想简要谈谈 GPU，它彻底改变了深度学习领域。GPU 代表图形处理单元，最初用于游戏目的，以每秒显示更多屏幕来提高游戏分辨率。深度学习网络在正向传播和反向传播过程中都大量使用矩阵乘法，尤其是卷积。GPU
    在矩阵到矩阵的乘法方面表现良好；因此，数千个 GPU 核心被用来并行处理数据。这些加速了深度学习的训练过程。
- en: 'Common GPUs available in the market are as follows:'
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 市面上可用的常见GPU如下：
- en: NVIDIA RTX 30 Series
  id: totrans-627
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NVIDIA RTX 30系列
- en: NVIDIA GTX TITAN X
  id: totrans-628
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NVIDIA GTX TITAN X
- en: NVIDIA GeForce GTX 1080
  id: totrans-629
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NVIDIA GeForce GTX 1080
- en: NVIDIA GeForce GTX 1070
  id: totrans-630
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NVIDIA GeForce GTX 1070
- en: NVIDIA Tesla V100
  id: totrans-631
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NVIDIA Tesla V100
- en: One limitation of GPU is that they are designed as general-purpose processor
    that can support a wide variety of applications. In doing so, the GPU must access
    registers and shared memory to read and store results. A large amount of energy
    is expended by the GPU in accessing memory which increases the footprint of the
    GPU.
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: GPU的一个局限性是，它们被设计为通用处理器，可以支持各种应用。在这样做的时候，GPU必须访问寄存器和共享内存来读取和存储结果。GPU在访问内存上消耗了大量的能量，这增加了GPU的足迹。
- en: TPU
  id: totrans-633
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TPU
- en: An alternative to GPU is the Tensor Processing Units or TPUs from Google which
    is designed to accelerate the deep-learning and machine-learning applications.
    Unlike the CPU and GPU which are general-purpose processors, TPUs are designed
    solely as matrix processor specialized for neural network workloads.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: GPU的替代品是Google的Tensor Processing Units或TPUs，它被设计用于加速深度学习和机器学习应用。与CPU和GPU这些通用处理器不同，TPUs被设计为仅作为矩阵处理器，专门用于神经网络工作负载。
- en: In TPUs, the entire matrix computation is done once the data and the parameters
    of the model are loaded into TPU and post that there is no memory access during
    the entire process of the massive computation. Hence the power expended in accessing
    memory is much less in TPUs than in GPUs.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 在TPUs中，一旦数据和模型参数被加载到TPU中，整个矩阵计算就会完成，之后在整个大规模计算过程中没有内存访问。因此，在TPUs中访问内存所消耗的功率比在GPU中少得多。
- en: TPUs were used by Google internally since 2015, and it has been made publicly
    available to others since 2018.
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: Google自2015年以来内部使用TPUs，自2018年以来已向公众开放。
- en: Summary
  id: totrans-637
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we have covered how deep learning has evolved from artificial
    neural networks over the years. Also, we discussed the Perceptron method of learning,
    its limitations, and the current method of training neural networks. Problems
    pertaining to non-convex cost functions, elliptical localized cost contours, and
    saddle points were discussed in some detail, along with the need for different
    optimizers to tackle such problems. Also, in the second half of the chapter, we
    caught up on TensorFlow basics and how to execute simple models pertaining to
    linear regression, multiclass SoftMax, and XOR classification through TensorFlow.
    In the next chapter, the emphasis is going to be on convolutional neural networks
    for images.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了深度学习是如何从人工神经网络逐年发展而来的。此外，我们还讨论了感知器学习方法、其局限性以及当前训练神经网络的训练方法。详细讨论了与非线性成本函数、椭圆局部成本轮廓和鞍点相关的问题，以及需要不同的优化器来解决此类问题。在章节的后半部分，我们回顾了TensorFlow的基础知识以及如何通过TensorFlow执行与线性回归、多类SoftMax和XOR分类相关的简单模型。在下一章中，重点将放在图像的卷积神经网络上。
