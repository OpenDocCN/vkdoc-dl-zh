  id: totrans-615
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用随机梯度下降法通过 SoftMax 函数进行的多类分类
- en: We now perform the same classification task, but instead of using full-batch
    learning, we resort to stochastic gradient descent with a batch size of 1000\.
    The detailed implementation has been outlined in Listing [2-19](#PC30).
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在执行相同的分类任务，但不是使用全批量学习，而是使用批量大小为 1000 的随机梯度下降法。详细的实现已在列表 [2-19](#PC30) 中概述。
- en: '![](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig29_HTML.jpg)'
  id: totrans-617
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-29](../images/448418_2_En_2_Chapter/448418_2_En_2_Fig29_HTML.jpg)'
