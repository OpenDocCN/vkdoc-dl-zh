- en: 1. Welcome to TensorFlow.js
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 欢迎来到TensorFlow.js
- en: The world is on the verge of an **artificial intelligence** (AI) revolution.
    This wave of innovation, which takes the shape of **data** and **machine learning**
    (ML), is rapidly changing the way we create software, how industries function,
    and even facets of our lives. As the adoption and demand for data-based products
    and machine learning–powered applications increase, so do their requirements,
    the tools used to develop them, and the platforms where we wish to deploy them.
    One of these platforms is the **web browser**.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 世界正站在一场**人工智能**（AI）革命的边缘。这股创新浪潮以**数据**和**机器学习**（ML）的形式出现，正在迅速改变我们创建软件的方式、行业的运作方式，甚至我们生活的方方面面。随着基于数据和机器学习驱动的应用的需求和采用率的增加，它们的要求、用于开发它们的工具以及我们希望部署它们的平台也在增加。这些平台之一就是**网络浏览器**。
- en: Although accessible, for a long time, the browser was not regarded as a potential
    medium capable of harnessing and serving the power of **machine learning**. However,
    as the field keeps evolving and we march toward an Age of Data, the browser is
    slowly proving itself as a worthy contender, one that can deliver the breakthroughs
    of machine learning because of the advantages and distinctive features it possesses.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管可访问，但长期以来，浏览器并未被视为一种能够利用和提供机器学习力量的潜在媒介。然而，随着该领域的不断发展，我们迈向数据时代，浏览器正逐渐证明自己是一个值得竞争的对手，因为它拥有优势和独特的特性，能够带来机器学习的突破。
- en: Born from the necessity to have a reliable and production-ready solution for
    doing machine learning on the Web, the TensorFlow team released **TensorFlow.js**
    in March 2018\. This library is a high-performance and open source framework for
    training, executing, and deploying ML models in the browser using **JavaScript**
    (JS).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow团队为了在Web上执行机器学习提供一个可靠且现成的解决方案，于2018年3月发布了**TensorFlow.js**。这个库是一个高性能的开源框架，用于在浏览器中使用**JavaScript**（JS）训练、执行和部署机器学习模型。
- en: TensorFlow.js is the successor of *deeplearn.js*, a defunct machine learning
    tool developed by Google Brain for building artificial neural network–based models
    for the browser. Now, this library is at the center of TensorFlow.js and bears
    the name **TensorFlow.js Core API** or just **tfjs-core**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow.js是*deeplearn.js*的后继者，这是一个由Google Brain开发的已废弃的机器学习工具，用于在浏览器中构建基于人工神经网络的模型。现在，这个库是TensorFlow.js的核心，被称为**TensorFlow.js核心API**或简称**tfjs-core**。
- en: 'According to the paper “TensorFlow.js: Machine Learning for the Web and Beyond”
    (Smilkov et al., 2019), one of the main motivations behind TF.js is bringing to
    JavaScript and the web ecosystem the power of machine learning to JS developers
    and to those with limited or no ML experience. TF.js achieves this goal thanks
    to its multiple abstraction levels, which provide an easy-to-use and clean experience
    without compromising the functionality.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 根据2019年Smilkov等人撰写的论文“TensorFlow.js：Web和超越的机器学习”（Smilkov et al., 2019），TF.js背后的主要动机之一是将机器学习的力量带给JavaScript和Web生态系统中的开发者，以及那些有限或没有机器学习经验的人。TF.js通过其多个抽象级别实现了这一目标，提供了易于使用且干净的体验，同时不牺牲功能。
- en: Why the browser?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么是浏览器？
- en: 'Doing and executing machine learning have been mainly associated with *Python*,
    *R*, *C++*, servers, cloud, GPU, and CPU—but not the browser. Or at least until
    the first machine learning libraries surfaced. But why now? What is making the
    web browser a desirable platform for executing ML? We could argue and agree that
    these are some valid reasons: JavaScript, accessibility, privacy, speed, and cost-effectiveness.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 做和执行机器学习一直主要与*Python*、*R*、*C++*、服务器、云、GPU和CPU相关联——但不是浏览器。或者至少直到第一个机器学习库出现。但为什么是现在？是什么让网络浏览器成为执行机器学习的理想平台？我们可以争论并同意，以下是一些合理的理由：JavaScript、可访问性、隐私、速度和成本效益。
- en: JavaScript
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: JavaScript
- en: As stated in GitHub’s 2019 report titled “The State of the Octoverse” (GitHub,
    2019) and StackOverflow’s Developer Survey (StackOverflow, 2019), JavaScript is
    (and has been for at least seven years) the world’s most popular programming language.
    It beat Python, one that has been in the spotlight for a few years now because
    of its status as the de facto language of “data science.” Being the top language
    implies that it has both demand and supply—the demand for more products and the
    developers to supply them. Yet, for a long time, until 2015, when libraries such
    as *ConvNetJS*, *brain.js*, and eventually TensorFlow.js were released, there
    was no competitive or production-ready framework to develop and execute deep learning
    on the browser. So, given the popularity of the language, it was only a matter
    of time before the deep learning revolution reached this large group of developers.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如同在GitHub 2019年发布的报告《Octoverse 状态》（GitHub, 2019）和StackOverflow开发者调查（StackOverflow,
    2019）中所述，JavaScript（以及至少在过去七年中）一直是世界上最受欢迎的编程语言。它超越了Python，后者因为其作为“数据科学”事实上的语言而受到几年的关注。作为顶级语言意味着它既有需求也有供应——对更多产品的需求以及提供这些产品的开发者。然而，在2015年之前，直到像*ConvNetJS*、*brain.js*和最终TensorFlow.js这样的库发布，浏览器上开发执行深度学习的竞争性或生产就绪框架并不存在。因此，鉴于语言的普及，深度学习革命达到这一大群开发者中只是时间问题。
- en: Moreover, JavaScript is slowly turning into a language capable of doing production-ready
    machine learning and data science. In recent years, JavaScript has gained other
    libraries and frameworks such as *Apache Arrow*,^([1](#Fn1)) a language-agnostic
    framework for processing columnar data, *Observable*^([2](#Fn2)) (notebook), and
    many visualization tools that assist us at evaluating data.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，JavaScript正在逐渐成为一个能够进行生产就绪的机器学习和数据科学的语言。近年来，JavaScript获得了其他库和框架，如*Apache
    Arrow*^([1](#Fn1))，这是一个处理列数据的语言无关框架，*Observable*^([2](#Fn2))（笔记本），以及许多帮助我们评估数据的可视化工具。
- en: Accessibility
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可访问性
- en: When you are on your computer or mobile device, what’s the app you are most
    likely to use? …Exactly! The web browser, our gateway to the Web, and a very accessible
    tool. Now consider all the people who use a browser and multiply that by the time
    spent clicking and getting lost amid the entanglement of the World Wide Web. That
    has to be a considerable number. With such a broad audience, it would seem like
    the web browser is an ideal place to deploy machine learning applications.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在电脑或移动设备上时，你最可能使用的应用程序是什么？…正是！网络浏览器，我们的网络门户，一个非常易于访问的工具。现在考虑所有使用浏览器的人，并将他们花费在点击和迷失在万维网错综复杂中的时间相乘。这肯定是一个相当大的数字。拥有如此广泛的受众，网络浏览器似乎是一个部署机器学习应用的理想场所。
- en: But not only is the web browser a medium accessible to most of us. The nature
    of the browser itself has access to a wide range of components, such as the device’s
    microphone, web camera, keyboard, location, and many sensors (like an accelerometer)
    if the computer supports them. These tools are sources of data—handy and rich
    data that can power many ML models.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 但不仅仅是因为网络浏览器是我们大多数人都能访问的媒介。浏览器本身的性质可以访问广泛的组件，例如设备的麦克风、网络摄像头、键盘、位置以及许多传感器（如加速度计），如果计算机支持的话。这些工具是数据来源——方便且丰富的数据，可以为许多机器学习模型提供动力。
- en: Privacy
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐私
- en: As great and powerful as the aforementioned data is, some of us would be reluctant
    to give it away in exchange, for example, of a service that could predict if you
    look tired today based on an image. But with TensorFlow.js and its **on-device**
    installed models, the user does not have to worry about this. With a model deployed
    on the browser—and not on an external server where you would have to send your
    data somewhere else—the provided data and the model’s predictions stay on your
    device.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管上述数据非常伟大和强大，但有些人可能不愿意为了交换，例如，一个可以根据图像预测你今天是否看起来疲倦的服务。但是，有了TensorFlow.js及其**设备上**安装的模型，用户不必为此担心。模型部署在浏览器上——而不是在外部服务器上，你将不得不将数据发送到其他地方——提供的数据和模型的预测都留在你的设备上。
- en: This preservation of the user’s privacy enables developers to create applications
    that use sensitive data, for instance, services for the medical industry and silly
    ones like the “tired or not” app mentioned earlier. In such a case, you will be
    able to use the app, knowing that nobody would ever see your sleepy morning face.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这种对用户隐私的保护使得开发者能够创建使用敏感数据的应用程序，例如，为医疗行业提供的服务以及前面提到的“是否疲倦”的应用程序。在这种情况下，你将能够使用该应用程序，知道没有人会看到你那困倦的早晨面孔。
- en: Speed
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 速度
- en: Another advantage of having an on-device model doing its computations client-side
    is the gain in speed. Hosting the model client-side means not having to upload
    data somewhere else, allowing us to reduce the overall latency of the application
    and the inference time. This advantage is beneficial when the application involves
    large datasets such as imagery or audio data. For example, suppose that our “tired
    or not” app has an even better predictive model that uses a 5-second clip instead
    of an image. Now imagine having to upload that video, waiting for the computation,
    and downloading the result. That is at least a few seconds. Sure, a few seconds
    is nothing, but in other kinds of applications, for example, real-time object
    detection, this latency would undoubtedly be detrimental.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在设备上运行的模型进行其计算的优势之一是速度的提升。在客户端托管模型意味着不需要将数据上传到其他地方，这使我们能够降低应用程序的整体延迟和推理时间。当应用程序涉及大型数据集，如图像或音频数据时，这种优势非常有用。例如，假设我们的“是否疲倦”应用程序有一个更好的预测模型，它使用5秒的视频剪辑而不是图像。现在想象一下，你需要上传这个视频，等待计算，然后下载结果。这至少需要几秒钟。当然，几秒钟不算什么，但在其他类型的应用程序中，例如实时物体检测，这种延迟无疑是有害的。
- en: Cost-effectiveness
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本效益
- en: Suppose that we present our “tired or not” web app at the *Tired People World
    Convention*, and it wins the “Best of Show” award. Wow, congrats! As a result,
    the app suddenly goes viral, and millions of users are checking if they are tired.
    In an unfortunate pre-TensorFlow.js scenario where we would host the model somewhere
    in the cloud, we would have to pay for the bandwidth involved in the traffic.
    Besides, the service is most likely to crash since we went from two users to millions
    in less than an hour. As a result, now we need to scale up and start a couple
    of additional machines, and this is not cheap at all.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们在 *疲倦人群世界大会* 上展示了我们的“是否疲倦”网络应用程序，并赢得了“最佳展示”奖项。哇，恭喜！因此，应用程序突然变得流行起来，数百万用户正在检查他们是否疲倦。在一个不幸的、在
    TensorFlow.js 之前的情况中，如果我们把模型托管在云中的某个地方，我们就必须为涉及的带宽付费。此外，由于我们在不到一个小时的时间里从两个用户增长到数百万用户，服务很可能会崩溃。因此，现在我们需要扩展并启动几台额外的机器，而这并不便宜。
- en: However, since we know TensorFlow.js, and how to deploy models on the browser,
    the total cost might be a fraction of that paid in the earlier example. Still,
    the app has to download the model, but as we will later see, they can be as small
    as less than 1 MB.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于我们了解 TensorFlow.js 以及如何在浏览器上部署模型，总成本可能只是之前示例中支付的一小部分。尽管如此，应用程序仍然需要下载模型，但正如我们稍后将要看到的，它们可以小到不到1
    MB。
- en: Features
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 功能
- en: As we will discover in the book and its exercise, TensorFlow.js is an extensive
    and complete ecosystem with a multitude of functionalities. Of these, there are
    four that distinguish it and make it a unique library among the deep learning
    frameworks currently available. These features are its usage as an **inference
    engine**, the **pre-trained models**, its many **backends**, and the **compatibility
    with TensorFlow**.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在本书及其练习中将要发现的那样，TensorFlow.js 是一个广泛且完整的生态系统，具有众多功能。其中，有四个特性使其与众不同，使其成为当前可用的深度学习框架中独特的库。这些特性包括其作为
    **推理引擎** 的使用、**预训练模型**、其许多 **后端** 以及与 **TensorFlow** 的兼容性。
- en: Inference engine
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推理引擎
- en: While TensorFlow.js is a complete deep learning framework that supports building
    machine learning models, it truly excels as an inference engine, a tool for performing
    predictions. The opposite of a prediction engine is a solution specialized for
    training models, for example, *TensorFlow* or *PyTorch*.^([3](#Fn3)) Typically,
    after training a model, if we wish to deploy it to production, we must consider
    alternative platforms such as a custom API service, a cloud solution like *Google’s
    AI Platform*,^([4](#Fn4)) *TensorFlow Lite* (an inference engine for mobile devices),
    and of course, TensorFlow.js. With the former, we can quickly train, deploy, and
    present the model to a user directly in the browser, making it an ideal inference
    engine.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 TensorFlow.js 是一个完整的深度学习框架，支持构建机器学习模型，但它真正擅长的是作为推理引擎，一个执行预测的工具。与预测引擎相反的是专门用于训练模型的解决方案，例如
    *TensorFlow* 或 *PyTorch*。^([3](#Fn3)) 通常，在训练好模型后，如果我们希望将其部署到生产环境中，我们必须考虑替代平台，如自定义API服务、云解决方案如
    *Google的AI平台*，^([4](#Fn4)) *TensorFlow Lite*（移动设备的推理引擎），以及当然，TensorFlow.js。使用前者，我们可以快速训练、部署，并在浏览器中直接向用户展示模型，使其成为一个理想的推理引擎。
- en: Pre-trained models
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预训练模型
- en: 'A second feature that relates to the previous one is how simple it is to load
    pre-trained models that work out of the box. TensorFlow.js comes with several
    built-in models that cover a whole range of use cases. For example, if you need
    a quick object detector to make sure the person using the “tired or not” app is,
    well, a person, TF.js provides a model trained on the COCO dataset. To load it
    and use it, we only need two lines of code, such as this:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 与前一个特性相关联的第二个特性是加载预训练模型是多么简单。TensorFlow.js 内置了几个模型，涵盖了整个范围的用例。例如，如果你需要一个快速的对象检测器来确保使用“是否疲倦”应用的人确实是人，TF.js
    提供了一个在 COCO 数据集上训练的模型。要加载并使用它，我们只需要两行代码，例如这个：
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Likewise, if you are ever in need of a classifier that detects whether a piece
    of text contains toxic content (insults, threats, obscenity), there is a text
    toxicity detection model available in TF.js (one exercise from the book features
    this model). Table [1-1](#Tab1) presents some models provided by TensorFlow.js
    and ml5.js, a high-level library built on top of TensorFlow.js that we will use
    later in the book.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，如果你需要一种分类器来检测文本是否包含有害内容（侮辱、威胁、淫秽），TF.js 中有一个文本毒性检测模型可供使用（书中的一篇练习展示了这个模型）。表
    [1-1](#Tab1) 展示了 TensorFlow.js 和 ml5.js 提供的一些模型，ml5.js 是一个建立在 TensorFlow.js 之上的高级库，我们将在本书的后续内容中使用它。
