- en: 1. Welcome to TensorFlow.js
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The world is on the verge of an **artificial intelligence** (AI) revolution.
    This wave of innovation, which takes the shape of **data** and **machine learning**
    (ML), is rapidly changing the way we create software, how industries function,
    and even facets of our lives. As the adoption and demand for data-based products
    and machine learning–powered applications increase, so do their requirements,
    the tools used to develop them, and the platforms where we wish to deploy them.
    One of these platforms is the **web browser**.
  prefs: []
  type: TYPE_NORMAL
- en: Although accessible, for a long time, the browser was not regarded as a potential
    medium capable of harnessing and serving the power of **machine learning**. However,
    as the field keeps evolving and we march toward an Age of Data, the browser is
    slowly proving itself as a worthy contender, one that can deliver the breakthroughs
    of machine learning because of the advantages and distinctive features it possesses.
  prefs: []
  type: TYPE_NORMAL
- en: Born from the necessity to have a reliable and production-ready solution for
    doing machine learning on the Web, the TensorFlow team released **TensorFlow.js**
    in March 2018\. This library is a high-performance and open source framework for
    training, executing, and deploying ML models in the browser using **JavaScript**
    (JS).
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow.js is the successor of *deeplearn.js*, a defunct machine learning
    tool developed by Google Brain for building artificial neural network–based models
    for the browser. Now, this library is at the center of TensorFlow.js and bears
    the name **TensorFlow.js Core API** or just **tfjs-core**.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to the paper “TensorFlow.js: Machine Learning for the Web and Beyond”
    (Smilkov et al., 2019), one of the main motivations behind TF.js is bringing to
    JavaScript and the web ecosystem the power of machine learning to JS developers
    and to those with limited or no ML experience. TF.js achieves this goal thanks
    to its multiple abstraction levels, which provide an easy-to-use and clean experience
    without compromising the functionality.'
  prefs: []
  type: TYPE_NORMAL
- en: Why the browser?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Doing and executing machine learning have been mainly associated with *Python*,
    *R*, *C++*, servers, cloud, GPU, and CPU—but not the browser. Or at least until
    the first machine learning libraries surfaced. But why now? What is making the
    web browser a desirable platform for executing ML? We could argue and agree that
    these are some valid reasons: JavaScript, accessibility, privacy, speed, and cost-effectiveness.'
  prefs: []
  type: TYPE_NORMAL
- en: JavaScript
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As stated in GitHub’s 2019 report titled “The State of the Octoverse” (GitHub,
    2019) and StackOverflow’s Developer Survey (StackOverflow, 2019), JavaScript is
    (and has been for at least seven years) the world’s most popular programming language.
    It beat Python, one that has been in the spotlight for a few years now because
    of its status as the de facto language of “data science.” Being the top language
    implies that it has both demand and supply—the demand for more products and the
    developers to supply them. Yet, for a long time, until 2015, when libraries such
    as *ConvNetJS*, *brain.js*, and eventually TensorFlow.js were released, there
    was no competitive or production-ready framework to develop and execute deep learning
    on the browser. So, given the popularity of the language, it was only a matter
    of time before the deep learning revolution reached this large group of developers.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, JavaScript is slowly turning into a language capable of doing production-ready
    machine learning and data science. In recent years, JavaScript has gained other
    libraries and frameworks such as *Apache Arrow*,^([1](#Fn1)) a language-agnostic
    framework for processing columnar data, *Observable*^([2](#Fn2)) (notebook), and
    many visualization tools that assist us at evaluating data.
  prefs: []
  type: TYPE_NORMAL
- en: Accessibility
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you are on your computer or mobile device, what’s the app you are most
    likely to use? …Exactly! The web browser, our gateway to the Web, and a very accessible
    tool. Now consider all the people who use a browser and multiply that by the time
    spent clicking and getting lost amid the entanglement of the World Wide Web. That
    has to be a considerable number. With such a broad audience, it would seem like
    the web browser is an ideal place to deploy machine learning applications.
  prefs: []
  type: TYPE_NORMAL
- en: But not only is the web browser a medium accessible to most of us. The nature
    of the browser itself has access to a wide range of components, such as the device’s
    microphone, web camera, keyboard, location, and many sensors (like an accelerometer)
    if the computer supports them. These tools are sources of data—handy and rich
    data that can power many ML models.
  prefs: []
  type: TYPE_NORMAL
- en: Privacy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As great and powerful as the aforementioned data is, some of us would be reluctant
    to give it away in exchange, for example, of a service that could predict if you
    look tired today based on an image. But with TensorFlow.js and its **on-device**
    installed models, the user does not have to worry about this. With a model deployed
    on the browser—and not on an external server where you would have to send your
    data somewhere else—the provided data and the model’s predictions stay on your
    device.
  prefs: []
  type: TYPE_NORMAL
- en: This preservation of the user’s privacy enables developers to create applications
    that use sensitive data, for instance, services for the medical industry and silly
    ones like the “tired or not” app mentioned earlier. In such a case, you will be
    able to use the app, knowing that nobody would ever see your sleepy morning face.
  prefs: []
  type: TYPE_NORMAL
- en: Speed
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another advantage of having an on-device model doing its computations client-side
    is the gain in speed. Hosting the model client-side means not having to upload
    data somewhere else, allowing us to reduce the overall latency of the application
    and the inference time. This advantage is beneficial when the application involves
    large datasets such as imagery or audio data. For example, suppose that our “tired
    or not” app has an even better predictive model that uses a 5-second clip instead
    of an image. Now imagine having to upload that video, waiting for the computation,
    and downloading the result. That is at least a few seconds. Sure, a few seconds
    is nothing, but in other kinds of applications, for example, real-time object
    detection, this latency would undoubtedly be detrimental.
  prefs: []
  type: TYPE_NORMAL
- en: Cost-effectiveness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Suppose that we present our “tired or not” web app at the *Tired People World
    Convention*, and it wins the “Best of Show” award. Wow, congrats! As a result,
    the app suddenly goes viral, and millions of users are checking if they are tired.
    In an unfortunate pre-TensorFlow.js scenario where we would host the model somewhere
    in the cloud, we would have to pay for the bandwidth involved in the traffic.
    Besides, the service is most likely to crash since we went from two users to millions
    in less than an hour. As a result, now we need to scale up and start a couple
    of additional machines, and this is not cheap at all.
  prefs: []
  type: TYPE_NORMAL
- en: However, since we know TensorFlow.js, and how to deploy models on the browser,
    the total cost might be a fraction of that paid in the earlier example. Still,
    the app has to download the model, but as we will later see, they can be as small
    as less than 1 MB.
  prefs: []
  type: TYPE_NORMAL
- en: Features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we will discover in the book and its exercise, TensorFlow.js is an extensive
    and complete ecosystem with a multitude of functionalities. Of these, there are
    four that distinguish it and make it a unique library among the deep learning
    frameworks currently available. These features are its usage as an **inference
    engine**, the **pre-trained models**, its many **backends**, and the **compatibility
    with TensorFlow**.
  prefs: []
  type: TYPE_NORMAL
- en: Inference engine
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While TensorFlow.js is a complete deep learning framework that supports building
    machine learning models, it truly excels as an inference engine, a tool for performing
    predictions. The opposite of a prediction engine is a solution specialized for
    training models, for example, *TensorFlow* or *PyTorch*.^([3](#Fn3)) Typically,
    after training a model, if we wish to deploy it to production, we must consider
    alternative platforms such as a custom API service, a cloud solution like *Google’s
    AI Platform*,^([4](#Fn4)) *TensorFlow Lite* (an inference engine for mobile devices),
    and of course, TensorFlow.js. With the former, we can quickly train, deploy, and
    present the model to a user directly in the browser, making it an ideal inference
    engine.
  prefs: []
  type: TYPE_NORMAL
- en: Pre-trained models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A second feature that relates to the previous one is how simple it is to load
    pre-trained models that work out of the box. TensorFlow.js comes with several
    built-in models that cover a whole range of use cases. For example, if you need
    a quick object detector to make sure the person using the “tired or not” app is,
    well, a person, TF.js provides a model trained on the COCO dataset. To load it
    and use it, we only need two lines of code, such as this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Likewise, if you are ever in need of a classifier that detects whether a piece
    of text contains toxic content (insults, threats, obscenity), there is a text
    toxicity detection model available in TF.js (one exercise from the book features
    this model). Table [1-1](#Tab1) presents some models provided by TensorFlow.js
    and ml5.js, a high-level library built on top of TensorFlow.js that we will use
    later in the book.
  prefs: []
  type: TYPE_NORMAL
- en: Table 1-1
  prefs: []
  type: TYPE_NORMAL
- en: Some pre-trained models
  prefs: []
  type: TYPE_NORMAL
- en: '| Use Case | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Body segmentation | Segments a person’s body part with BodyPix |'
  prefs: []
  type: TYPE_TB
- en: '| Object detection | SSD model trained with the COCO dataset |'
  prefs: []
  type: TYPE_TB
- en: '| Sentence encoding | Encodes text into embeddings |'
  prefs: []
  type: TYPE_TB
- en: '| k-means (ml5.js) | Clusters data using k-means |'
  prefs: []
  type: TYPE_TB
- en: Backend
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A highlight of TensorFlow.js is that it supports three unique backends that
    also dictate how it runs under the hood. These backends are **WebGL**, **Node.js**,
    and **regular** JavaScript. Each of these solutions has its own set of advantages
    and disadvantages that are mostly perceived in the speed of the operations.
  prefs: []
  type: TYPE_NORMAL
- en: WebGL
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Training a large neural network is a computationally intensive task. On top
    of that, inferring a result can also, in the worst-case scenario, take a few seconds.
    To deal with these drawbacks, developers resort to big and expensive machines
    equipped with powerful and expensive graphics processing units (GPUs) to train
    these models. What distinguishes a GPU is its ability to do many numerical computations
    in parallel, something that a CPU can do, but not as effective as it.
  prefs: []
  type: TYPE_NORMAL
- en: One of the TensorFlow.js backend modes is the **WebGL** mode, one that uses
    your computer’s GPU to accelerate and parallelize its processes. WebGL is a JavaScript
    API for rendering high-performance interactive graphics in the browser. While
    the original purpose of this library is to render those flashy graphics we see
    online nowadays, the developers behind TensorFlow.js are using it to improve and
    speed up its processes and performance. The WebGL mode is the default one, as
    long as your browser supports it.
  prefs: []
  type: TYPE_NORMAL
- en: Node.js
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another backend is the “node” mode that enables running TensorFlow.js in a Node.js
    application. Node.js is a JavaScript server-side runtime that executes JS code
    in an environment outside the browser. Running TF.js in Node.js has many advantages,
    with the biggest one being the capability of performing server-side, allowing
    us to build applications that do not have to interact with the user directly.
    An example would be deploying a different version of *tired or not* in a server
    and exposing it with a web service.
  prefs: []
  type: TYPE_NORMAL
- en: A second advantage of using a Node.js backend is the gain in performance. For
    instance, in a Node.js environment, TensorFlow.js uses the TensorFlow C library,
    which is faster than the JS implementation. Moreover, the Node.js backend features
    a GPU variant that accelerates tensor operations by running them on an NVIDIA
    GPU using CUDA.
  prefs: []
  type: TYPE_NORMAL
- en: Regular CPU
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Then, there is the least performant CPU backend, which uses a plain JS implementation
    of TensorFlow.js. Its advantage is that the package size is the smallest of all
    of them. This mode is the fallback option.
  prefs: []
  type: TYPE_NORMAL
- en: Compatibility with TensorFlow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As the name points out, TensorFlow.js is part of the TensorFlow ecosystem. As
    a result, its Layers API and the overall way to develop a model resemble TensorFlow’s
    Keras high-level API. Thanks to this consistency, transitioning from TF to TF.js
    (or the other way around) should be smoother for users familiar with one of the
    platforms. In the following code, you will find two examples of the same model
    in both TensorFlow.js and Keras.
  prefs: []
  type: TYPE_NORMAL
- en: 'TensorFlow.js:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'TensorFlow 2.0 Keras Sequential model (Python):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: But more than merely having a similar API, being a part of the TensorFlow ecosystem
    means being able to convert models originally trained in TensorFlow and even models
    from *TensorFlow Hub*^([5](#Fn5))—a repository of TensorFlow’s models—to TensorFlow.js
    models using a Python library named *TensorFlow.js Converter*.^([6](#Fn6)) During
    this conversion process, the library ensures that each operation from the original
    graph is compatible with those available in TensorFlow.js. Moreover, the tool
    provides various mechanisms that help to reduce the size of the model, which is
    always great when working in a web environment. Nonetheless, this process might
    compromise the model’s predictive power, so be cautious.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The TensorFlow.js library comprises two APIs: the **Operations API** and the
    **Layers API** . The former, Operations API, provides the essential low-level
    functionalities the library requires, like the mathematical and tensor operations,
    while the latter provides the basic blocks needed to build the models. But before
    getting there, to understand the next parts better and to give some context to
    the name “TensorFlow,” let’s see what a tensor is.'
  prefs: []
  type: TYPE_NORMAL
- en: Tensors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Tensors are the main abstraction and unit of data of TensorFlow.js. More precisely,
    we could describe them as a multidimensional array or as the official documentation
    says, “a set of values shaped into an array of one and more dimensions” (Google,
    2018b). In TF.js, tensors are objects, and they have the following properties
    that describe them: **dtype**, **rank**, and **shape**. The first one, dtype,
    defines the tensor’s data type; the second one, rank, describes how many dimensions
    the tensor has; and the last, shape, specifies the size of the dimensions of the
    data.'
  prefs: []
  type: TYPE_NORMAL
- en: For example, the following code
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: outputs `float32 | 2,2 | 2`, which corresponds to a tensor whose elements are
    floats, shape is 2,2 (like a matrix), and rank is 2.
  prefs: []
  type: TYPE_NORMAL
- en: To have a proper idea of how something so abstract like a tensor looks like,
    Figure [1-1](#Fig1) presents five tensors of rank 1 up to rank 5\. In the image,
    we can see that a tensor of rank 1 is a vector or an array. A tensor of rank 2
    is a matrix, and a tensor of rank 3 is a cube. Then it gets more complex. A rank
    4 tensor is a vector of cubes, and one of rank 5 is a matrix of cubes. As a concrete
    example, consider a colored image. When converted to a tensor, a colored image
    is represented with a tensor of rank 3, while a list of images is represented
    with a tensor of rank 4.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_1_Chapter/494424_1_En_1_Fig1_HTML.jpg](../images/494424_1_En_1_Chapter/494424_1_En_1_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-1
  prefs: []
  type: TYPE_NORMAL
- en: An example of a tensor of ranks 1, 2, 3, 4, and 5
  prefs: []
  type: TYPE_NORMAL
- en: But what about the “flow” part? The word “flow” refers to how the tensors move
    through the layers. As we will see later, when we define our first models, you
    will get the impression that defining the model is specifying how the data, or
    tensors, flow through the layers of the neural network. Besides this, not only
    tensors flow, but they also change their shapes and ranks, adding more sense to
    the “flow” term.
  prefs: []
  type: TYPE_NORMAL
- en: Layers API
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Layers API is TensorFlow.js’ principal and preferred way of building the
    models we will train. It is a high-level API that works with the notion of stacking
    or connecting the layers in which the data will flow. If you have used Keras before,
    you will realize how similar it is to this library; as stated earlier, TF.js aims
    to be consistent with its counterpart TensorFlow.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Layers API features two ways to make a model. The first, and most popular
    one, named **Sequential** , builds models by sequentially stacking layers so that
    the output of one is the input of the following one. Think of a stack of delicious
    fluffy pancakes where you add a ridiculously amount of syrup on the top, and as
    a result, the syrup will propagate or *flow* to the next layer. Let’s illustrate
    with code how we can define a small neural network of two layers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: To define a Sequential model, start by creating an instance of a `tf.Sequential`
    object, here named `model`. Then, with the method `tf.Sequential.add()`, we append
    the layers. The first of them is a dense layer with `inputShape`—the shape of
    the layer’s input data—of 10\. Following it is the `units` value—the layer’s output
    shape—of also 10\. Right after this layer, we add a second dense layer whose input
    shape is 10 and the output 3\. Note that the input shape has to match the output
    of the previous one. Otherwise, the model won’t compile. Figure [1-2](#Fig2) is
    a visual representation of the model’s architecture and the dense layers. On the
    left-hand side of the first layer are the model’s inputs, formally known as the
    input layer, followed by the “internal” units, or the hidden layer. The second
    layer receives as input the output of the previous layer and produces an output.
    This output part is called the output layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_1_Chapter/494424_1_En_1_Fig2_HTML.jpg](../images/494424_1_En_1_Chapter/494424_1_En_1_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1-2
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of a model with two dense layers. Image was created using the software
    NN-SVG (LeNail, 2019)
  prefs: []
  type: TYPE_NORMAL
- en: 'The second way of constructing models with the Layers API is using the **Functional**
    approach. The main difference is that, unlike the sequential method, this one
    allows creating the network’s graph arbitrarily, as long as there are no cycles.
    Also, there is no `add()` method, but one called `tf.layers.Layer.apply()` that
    connects the layer. In the following, you will find the same model as before defined
    using the functional way:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The apply function returns an instance of an object known as a *SymbolicTensor*
    , which is a type of tensor that has no concrete value. Think of it as a placeholder
    for a tensor. The equivalent of this approach in a pancake world is having the
    pancakes laid down on a table and connecting them with lines of syrup (good luck
    cleaning that).
  prefs: []
  type: TYPE_NORMAL
- en: The Layers API goes beyond connecting layers. It includes a vast collection
    of tools such as `tf.Sequential.summary()`, a function that prints the model’s
    structure and is helpful if you ever need to inspect it. In the exercises, we
    will get to know this method and others.
  prefs: []
  type: TYPE_NORMAL
- en: Operations API
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The second API component is the Operations API. This one includes the low-level
    mathematical operations that we inadvertently apply each time we execute an action
    that involves a layer. These operations cover a whole range of mathematical scenarios,
    such as arithmetical operations that add two tensors element-wise, like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: It also supports basic math operations like `tf.abs()` (absolute value), matrix
    operations, normalization methods, and logical operations. Because tensors are
    immutable objects, all operations return new tensors.
  prefs: []
  type: TYPE_NORMAL
- en: While using the Layers API is the standard and even the recommended (Google,
    2018a) way of building a model, we should know that it is possible to create a
    model using the Operations API. Building a model using this approach provides
    us with full control of every part of the system. Despite this advantage, with
    this method, we would have to implement manually many of the features that the
    Layers API does for us, for example, training monitoring and weight initialization.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code presents the same model we have been using in this section
    implemented with operations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: How to install
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After so much talk about TensorFlow.js, you might be very excited to implement
    the world’s next big app. But before getting there and lifting another “Best of
    Show” award, we need to install the library. So, how do we do this? The first
    detail we need to decide is where we will execute our apps. Is it on the browser?
    Or as a Node.js application?
  prefs: []
  type: TYPE_NORMAL
- en: 'If it is for the browser (this is the most common case and the one we will
    use in this book), then there are two alternatives. The first one involves loading
    TensorFlow.js via a *content delivery network* (CDN) using a script tag. To access
    it this way, add the following tag to the app’s main HTML file:'
  prefs: []
  type: TYPE_NORMAL
- en: Upon executing the app, this small line downloads and loads the library, saving
    us from manually installing it in our computers.
  prefs: []
  type: TYPE_NORMAL
- en: An alternate approach involves using a package manager like *npm* or *yarn*
    to download TensorFlow.js and add it to the project. In the following, you will
    find the commands
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: or
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Once the project is set, importing the library requires adding the following
    line to the JS script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: or
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: If the target platform is Node.js, then use
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: or
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: To install the GPU variant, use
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: or
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Recap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The applications and reach of machine learning are taking the world by storm.
    In its wake, this AI revolution is bringing a surge of smart products that are
    slowly shaping the way we lead our digital lives and even starting to disrupt
    the “real world.” We have felt its effects. For instance, ML is improving the
    way we shop (not improving our wallets, though), how we browse movies, and even
    how we find love by matching us with the “perfect” target. Moreover, ML has also
    reached diverse platforms such as **mobile**, for example, *Google Assistant*,
    *Siri*, and *Android’s Adaptive Battery,* and **embedded devices**, for example,
    *NVIDIA Jetson*. However, a platform that hasn’t yet been impacted as the others
    is the web browser. Or so it was until TensorFlow.js came around.
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow.js is a deep learning library that aims to bring the AI revolution
    to JavaScript and the web browser. It provides the tools needed to create and
    deploy client-side low-latency models that require no server.
  prefs: []
  type: TYPE_NORMAL
- en: With over 12K stars on GitHub, TensorFlow.js is currently the most popular machine
    learning library for JavaScript. Granted that, we have to recognize the libraries
    that came before it and the others who are still active. Before TensorFlow.js,
    there was deeplearn.js, a package that now forms the core of TF.js. Other past
    libraries are *ConvNetJS* and *Keras.js*, and some that are still active are *brain.js*
    (10.6K stars) and ml5.js (3.4K stars).
