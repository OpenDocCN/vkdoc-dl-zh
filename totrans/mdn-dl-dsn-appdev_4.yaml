  id: totrans-296
  prefs: []
  type: TYPE_TB
  zh: '| LeNet-300-100Compressed | 1.64%1.58% | – | 1070 KB27 KB | 40 times |'
- en: '| LeNet-5Compressed | 0.80%0.74% | – | 1720 KB44 KB | 39 times |'
  id: totrans-297
  prefs: []
  type: TYPE_TB
- en: '| AlexNetCompressed | 42.78%42.78% | 19.73%19.70% | 240 MB6.9 MB | 35 times
    |'
  id: totrans-298
  prefs: []
  type: TYPE_TB
- en: '| VGG-16Compressed | 31.50%31.17% | 11.32%10.91% | 552 MB11.3 MB | 49 times
    |'
  id: totrans-299
  prefs: []
  type: TYPE_TB
- en: 'Han, Mao, and Dally provide important insights into the dynamics of collaborative
    optimization. Pruning before quantization doesn’t hurt quantization, for instance
    – the performance of a model both pruned and quantized is almost identical to
    that of a model that has only undergone quantization (of course, the pruned and
    quantized model has fewer parameters) (Figure [4-19](#Fig19)). This demonstrates
    a key property of ideal collaborative optimization: strength is found in a diverse
    array of compression attacks. By chaining a diverse set of compression methods
    that each attack different representation redundancies, the model is stripped
    of inefficient representations from all “angles” and therefore results in higher
    compression while still maintaining the necessary essential facilities for good
    performance.'
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig19_HTML.png](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig19_HTML.png)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
- en: Figure 4-19
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
- en: Performance of models with various compression methods applied
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
- en: Rethinking Quantization for Deeper Compression
  id: totrans-304
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Recall that when performing quantization, Quantization Aware Training is used
    to orient the model toward learning weights that are robust to quantization. This
    is performed by simulating a quantized environment when the model is making predictions.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
- en: 'However, Quantization Aware Training raises a key problem: because quantization
    effectively “discretizes” or “bins” a functionally “continuous” weight value,
    the derivative with respect to the input is zero at almost everywhere, posing
    problems for the gradient update calculations. In order to work around this, in
    practice a Straight Through Estimator is used. As implied by its name, a Straight
    Through Estimator estimates the output gradients of the discretized layer as its
    input gradients without regard for the actual derivative of the actual discretized
    layer. A Straight Through Estimator works with relatively less aggressive quantization
    (i.e., the 8-bit integer quantization implemented earlier) but fails to provide
    sufficient estimation for more severe compressions (e.g., 4-bit integer).'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
- en: To address this problem, Angela Fan and Pierre Stock, along with Benjamin Graham,
    Edouard Grave, Remi Gribonval, Herve Jegou, and Armand Joulin, propose quantization
    noise in their paper “Training with Quantization Noise for Extreme Model Compression,”^([4](#Fn4))
    a novel approach toward orienting a compressed model to developing quantization
    robust weights.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
- en: Rather than simulating the quantization of the entire model, like in Quantization
    Aware Training, quantization noise instead simulated the quantization of *part
    of a model* – a randomly selected subset of weights are simulated quantized during
    each forward pass (Figure [4-20](#Fig20)). This means that most of the weights
    are updated with cleaner gradients.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 与在量化感知训练中模拟整个模型的量化不同，量化噪声模拟了*模型的一部分*的量化——在每个前向传递过程中，随机选择的一组权重被模拟量化（图[4-20](#Fig20)）。这意味着大多数权重都使用更干净的梯度进行更新。
- en: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig20_HTML.png](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig20_HTML.png)'
  id: totrans-309
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig20_HTML.png](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig20_HTML.png)'
- en: Figure 4-20
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 图4-20
- en: Demonstration of training without quantization noise vs. with quantization noise
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 无量化噪声与有量化噪声的训练演示
- en: Quantization noise significantly improves the performance of low-precision compression
    methods over Quantization Aware Training, both in the domains of language modeling
    and image classification (Table [4-2](#Tab2)).
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 量化噪声在量化感知训练中显著提高了低精度压缩方法在语言建模和图像分类领域的性能（表[4-2](#Tab2)）。
- en: Table 4-2
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 表4-2
- en: 'Language modeling task: 16-layer transformer on WikiText-103\. Image classification:
    EfficientNetB3 on ImageNet 1k. “Comp.” refers to “Compression.” “PPL” refers to
    perplexity, a metric for NLP tasks (lower is better). QAT refers to Quantization
    Aware Training; QN refers to quantization noise.'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 语言建模任务：WikiText-103上的16层Transformer。图像分类：ImageNet 1k上的EfficientNetB3。“比较”指的是“压缩”。“PPL”指的是困惑度，它是NLP任务的指标（越低越好）。QAT指的是量化感知训练；QN指的是量化噪声。
- en: '| Quantization Method | Language Modeling | Image Classification |'
