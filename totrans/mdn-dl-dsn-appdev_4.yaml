- en: 'Responsible Compression: What Do Compressed Models Forget?'
  id: totrans-331
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 负责任压缩：压缩模型忘记了什么？
- en: When we talk about compression, the two key figures we consider are the model
    performance and the compression factor. These two figures are often balanced and
    used to determine the success of a model compression operation. We often see an
    increase in compression accompanied by a decrease in performance – but do you
    wonder what *types* of data inputs are being sacrificed by the compression procedure?
    What is lying beneath the generalized performance metrics?
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论压缩时，我们考虑的两个关键指标是模型性能和压缩因子。这两个指标通常平衡使用，以确定模型压缩操作的成功。我们经常看到压缩的增加伴随着性能的下降——但你是否想知道压缩过程牺牲了哪些*类型*的数据输入？泛化性能指标之下隐藏着什么？
- en: 'In “What Do Compressed Deep Neural Networks Forget?”,^([5](#Fn5)) Sara Hooker,
    along with Aaron Courville, Gregory Clark, Yann Dauphin, and Andrea Frome, investigates
    just this question: how do compression methods affect what knowledge a compressed
    model is forced to “forget” by the compression? Hooker et al.’s findings suggest
    that looking merely at standard performance metrics like test set accuracy may
    not be enough to reveal the impact of compression on the model’s true generalization
    capabilities.'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 在“压缩深度神经网络会忘记什么？”^([5](#Fn5))一文中，Sara Hooker 与 Aaron Courville、Gregory Clark、Yann
    Dauphin 和 Andrea Frome 一起调查了这个问题：压缩方法如何影响压缩模型被迫“忘记”的知识？Hooker 等人的发现表明，仅仅查看标准性能指标，如测试集准确率，可能不足以揭示压缩对模型真实泛化能力的影响。
- en: Pruning Identified Exemplars (PIEs) are defined inputs to a model in which there
    is a high level of disagreement between the predictions of pruned and unpruned
    models. Hooker et al. find that general metrics like test set accuracy hide important
    information regarding the effect of pruning on the model’s generalization capabilities;
    model compression methods like pruning *do not uniformly affect the model’s data
    to process instances across the distribution of the dataset*. Rather, a small
    subset of data is disproportionately impacted (Figure [4-21](#Fig21)).
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 修剪识别的示例（PIEs）是模型中修剪模型和未修剪模型预测之间高度不一致的输入定义。Hooker 等人发现，像测试集准确率这样的通用指标隐藏了有关修剪对模型泛化能力影响的重要信息；模型压缩方法如修剪*并不均匀地影响模型处理数据实例的能力，这些数据实例分布在数据集的分布中*。相反，一小部分数据受到不成比例的影响（见图
    [4-21](#Fig21)）。
- en: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig21_HTML.jpg](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig21_HTML.jpg)'
  id: totrans-335
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig21_HTML.jpg](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig21_HTML.jpg)'
- en: Figure 4-21
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-21
- en: Increase or decrease in a compressed model’s recall for certain ImageNet classes.
    Colored bars indicate the classes in which the impact of compression is statistically
    significant. As a higher percent of weights are pruned, there are more classes
    that are statistically significantly affected by compression. Note that, interestingly,
    quantization suffers less from these generalization vulnerabilities than pruning
    does
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 某些 ImageNet 类别在压缩模型召回率中的增加或减少。彩色条表示压缩影响在统计上显著的类别。随着修剪的权重百分比增加，受压缩影响统计上显著的类别也越来越多。值得注意的是，量化比修剪受到的泛化脆弱性影响较小
- en: Data instances from the long tail of the dataset distribution – that is, less
    commonly represented or more complex data instances – are more often “sacrificed”
    in model compression. Hooker at al. asked human subjects to label components of
    Pruning Identified Exemplars and found that PIEs were more difficult both for
    humans and models to classify; PIEs are generally more complex, consisting of
    multiple objects, lower quality, or ambiguity (Figure [4-22](#Fig22)). Pruning
    forces compressed models to sacrifice understanding of these particular instances,
    exposing vulnerabilities in compressed model generalization.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 来自数据集分布长尾的数据实例——即不太常见或更复杂的数据实例——在模型压缩中更常“被牺牲”。Hooker 等人要求受试者对修剪识别的示例的组件进行标记，并发现这些
    PIEs 对于人类和模型来说都更难分类；PIEs 通常更复杂，由多个对象、较低质量或模糊性组成（见图 [4-22](#Fig22)）。修剪迫使压缩模型牺牲对这些特定实例的理解，暴露了压缩模型泛化的脆弱性。
- en: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig22_HTML.jpg](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig22_HTML.jpg)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![../images/516104_1_En_4_Chapter/516104_1_En_4_Fig22_HTML.jpg](../images/516104_1_En_4_Chapter/516104_1_En_4_Fig22_HTML.jpg)'
- en: Figure 4-22
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4-22
- en: Pruning Identified Exemplars are more difficult to classify and are less represented
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 修剪识别的示例更难分类，且代表性较低
- en: Compressed models, moreover, are more prone to small changes that humans would
    be robust to. The higher the compression, the less robust the model becomes to
    variations like changing brightness, contrast, blurring, zooming, and JPEG noise.
    This also increases the vulnerability of compressed models used in deployment
    to adversarial attacks, or attacks designed to subvert the model’s output by making
    small, cumulative changes undetectable to humans (see Chapter [2](516104_1_En_2_Chapter.xhtml),
    Case Study 1, on adversarial attacks exploiting properties of transfer learning).
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，压缩模型更容易受到人类能够抵抗的小变化的影响。压缩程度越高，模型对亮度、对比度、模糊、缩放和JPEG噪声等变化的不变性越低。这也增加了部署中使用的压缩模型对对抗攻击的脆弱性，或者通过使小而累积的变化对人类不可检测来颠覆模型输出的攻击（参见第[2](516104_1_En_2_Chapter.xhtml)章，案例研究1，关于利用迁移学习特性的对抗攻击）。
- en: In addition to posing concerns for model robustness and security, these findings
    raise questions for the role of model compression in increasing discussion on
    fairness. Given that model compression disproportionately affects the model’s
    capacity to process less represented items in categories, model compression can
    amplify existing disparities in dataset representation.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 除了对模型鲁棒性和安全性提出担忧之外，这些发现也对模型压缩在提高公平性讨论中的作用提出了疑问。鉴于模型压缩不成比例地影响模型处理类别中较少表示的项目的能力，模型压缩可能会放大数据集中表示的现有差异。
- en: Hooker et al.’s work reminds us that neural networks are complex entities that
    often may require more exploration and consideration than wide-reaching metrics
    may suggest and leaves important questions to be answered in future work on model
    compression.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 霍克等人的工作提醒我们，神经网络是复杂的实体，可能需要比广泛使用的指标所暗示的更多探索和考虑，并为未来关于模型压缩的工作留下了重要的问题待解答。
- en: Key Points
  id: totrans-345
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键点
- en: 'In this chapter, we discussed the intuition and implementation of three key
    model compression methods – pruning, quantization, and weight clustering – as
    well as collaborative optimization techniques by which these compression methods
    can be chained together – sparsity preserving quantization, cluster preserving
    quantization, and sparsity preserving clustering:'
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了三种关键模型压缩方法——剪枝、量化和权重聚类——的直觉和实现，以及将这些压缩方法串联在一起的协同优化技术——稀疏性保留量化、聚类保留量化和稀疏性保留聚类：
- en: The goal of model compression is to decrease the “cost” a model incurs while
    maintaining model performance as much as possible. The “cost” of a model encompasses
    many factors, including storage, latency, server-side computation and power cost,
    and privacy. Model compression is a core element both of practical deployment
    and key to advancing theoretical understandings of deep learning.
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型压缩的目标是在尽可能保持模型性能的同时降低模型所承担的“成本”。模型的“成本”包括许多因素，包括存储、延迟、服务器端计算和电力成本以及隐私。模型压缩是实际部署的核心要素，也是深化对深度学习理论理解的关键。
- en: In pruning, unimportant parameters or other more structured network elements
    are “removed” by being set to 0\. This allows for much more efficient storage
    of the network. Pruning follows an iterative process – firstly, the importance
    of network elements is evaluated and the least important network elements are
    pruned away. Then, the model is fine-tuned on data to adapt to the pruned elements.
    This process repeats until the desired percentage of parameters are pruned away.
    A popular parameter importance criterion is by magnitude (magnitude-based pruning),
    in which parameters with smaller magnitudes are considered less substantial to
    the model’s output and set to zero.
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在剪枝中，不重要的参数或其他更结构化的网络元素通过将其设置为0来“移除”。这允许更有效地存储网络。剪枝遵循一个迭代过程——首先评估网络元素的重要性，然后移除最不重要的网络元素。然后，模型在数据上微调以适应剪枝元素。这个过程重复进行，直到移除所需百分比的参数。一个流行的参数重要性标准是按大小（基于大小的剪枝），其中较小的参数被认为对模型输出的贡献较小，并设置为0。
- en: In quantization, parameters are stored at a lower precision (usually, 8-bit
    integer form). This significantly decreases the storage and latency of a quantized
    model. However, performing post-processing quantization leads to accumulated inaccuracies
    that result in a large decrease in model performance. To address this, quantized
    models first undergo Quantization Aware Training, in which the model is in a simulated
    quantized environment and learns weights that are robust to quantization.
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在量化过程中，参数以较低的精度（通常为8位整数形式）存储。这显著降低了量化模型的存储和延迟。然而，进行后处理量化会导致累积的不准确性，从而大幅降低模型性能。为了解决这个问题，量化模型首先进行量化感知训练，其中模型处于模拟的量化环境中，并学习对量化具有鲁棒性的权重。
- en: In weight clustering, weights assigned to a cluster and set to the centroid
    value of that cluster, such that weights similar in value to one another (i.e.,
    part of the same cluster) make slight adjustments to be the same. This redundancy
    in values allows for more efficient storage. The outcome of weight clustering
    is heavily dependent on the number of clusters chosen.
  id: totrans-350
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在权重聚类中，将分配给簇的权重设置为该簇的重心值，使得值相似的权重（即同一簇的一部分）进行轻微调整以保持相同。这种值的冗余允许更有效的存储。权重聚类的结果高度依赖于选择的簇数量。
- en: In collaborative optimization, several model compression methods are chained
    together. By attaching model compression methods together, we can take advantage
    of each method’s unique compression strengths. However, these methods must be
    attached in an order and implemented with special consideration to preserve the
    compression effect of the previous method.
  id: totrans-351
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在协同优化中，将几种模型压缩方法串联在一起。通过将模型压缩方法串联起来，我们可以利用每种方法独特的压缩优势。然而，这些方法必须按照顺序连接，并特别考虑以保留前一种方法的压缩效果。
- en: Model compression methods can be implemented using the TensorFlow Model Optimization
    library. To implement model compression methods, use appropriate TensorFlow Model
    Optimization functions to wrap an existing Keras model in “prunable,” “quantizable,”
    or “clusterable” layers. After the model compression is performed, remove the
    compression wrappers from these layers. Often, you will need to apply a compression
    algorithm (e.g., GZIP) and convert the model into TFLite to see the rest of compression.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用TensorFlow模型优化库来实现模型压缩方法。要实现模型压缩方法，请使用适当的TensorFlow模型优化函数将现有的Keras模型包装在“可剪枝”、“可量化”或“可聚类”层中。模型压缩完成后，从这些层中移除压缩包装器。通常，您需要应用压缩算法（例如，GZIP）并将模型转换为TFLite以查看剩余的压缩。
- en: Model compression (primarily pruning) forces models to sacrifice understanding
    of the long tail end of the data distribution, shrinking model generalization
    capability. It also increases compressed models’ vulnerability to adversarial
    attacks and poses questions of fairness.
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型压缩（主要是剪枝）迫使模型牺牲对数据分布长尾端的理解，缩小模型泛化能力。它还增加了压缩模型对对抗攻击的脆弱性，并提出了公平性的问题。
- en: In the next chapter, we will discuss the automation of deep learning design
    with meta-optimization.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将讨论使用元优化自动化的深度学习设计。
