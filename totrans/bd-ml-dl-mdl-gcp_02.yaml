- en: '[PRE21]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The for Loop
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: for循环
- en: The for loop repeats the statements within its code block until a terminating
    condition is reached. It is different from the while loop in that it knows exactly
    how many times the iteration should occur. The for loop is controlled by an iterable
    expression (i.e., expressions in which elements can be accessed sequentially).
    The for statement is visualized by the flowchart in Figure [9-4](#Fig4).
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: for循环重复其代码块内的语句，直到达到终止条件。它与while循环不同，因为它确切地知道迭代应该发生多少次。for循环由一个可迭代表达式（即，可以按顺序访问元素的表达式）控制。for语句通过图[9-4](#Fig4)中的流程图来表示。
- en: '![../images/463852_1_En_9_Chapter/463852_1_En_9_Fig4_HTML.jpg](../images/463852_1_En_9_Chapter/463852_1_En_9_Fig4_HTML.jpg)'
