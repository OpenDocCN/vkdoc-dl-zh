  prefs: []
  type: TYPE_PRE
- en: Packages and Modules
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A module is simply a Python source file, and packages are a collection of modules.
    Modules written by other programmers can be incorporated into your source code
    by using **import** and **from** statements.
  prefs: []
  type: TYPE_NORMAL
- en: import Statement
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The **import** statement allows you to load any Python module into your source
    file. It has the following syntax:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: 'where the following is optional:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE39]'
  prefs: []
  type: TYPE_PRE
- en: Let us take an example by importing a very important package called **numpy**
    that is used for numerical processing in Python and very critical for machine
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: from Statement
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The **from** statement allows you to import a specific feature from a module
    into your source file. The syntax is as follows:'
  prefs: []
  type: TYPE_NORMAL
