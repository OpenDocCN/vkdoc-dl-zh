- en: The while Loop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The while loop evaluates a condition, which, if true, repeatedly executes the
    set of instructions within the while block. It does so until the condition evaluates
    to false. The while statement is visualized by the flowchart in Figure [9-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_9_Chapter/463852_1_En_9_Fig3_HTML.jpg](../images/463852_1_En_9_Chapter/463852_1_En_9_Fig3_HTML.jpg)'
