  prefs: []
  type: TYPE_NORMAL
- en: Correlation Matrix Plots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Again, correlation shows how much relationship exists between two variables.
    By plotting the correlation matrix, we get a visual representation of which variables
    in the dataset are highly correlated. Remember that parametric machine learning
    methods such as logistic and linear regression can take a performance hit when
    variables are highly correlated. Also, in practice, the correlation values that
    are greater than –0.7 or 0.7 are for the most part highly correlated. The outputs
    with matplotlib and seaborn are shown in Figure [12-13](#Fig13) and Figure [12-14](#Fig14),
    respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig13_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig13_HTML.jpg)'
