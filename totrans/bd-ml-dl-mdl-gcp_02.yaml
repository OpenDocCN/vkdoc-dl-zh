  prefs: []
  type: TYPE_PRE
  zh: '[PRE145]'
- en: Pairwise Scatter Plot
  id: totrans-558
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pairwise scatter plot is an effective window for visualizing the relationships
    among multiple variables within the same plot. However, with higher-dimension
    datasets, the plot may become clogged up, so use it with care. Let’s see an example
    of this with Matplotlib and seaborn.
  id: totrans-559
  prefs: []
  type: TYPE_NORMAL
- en: Here, we will use the method **scatter_matrix** , one of the plotting functions
    in Pandas to graph a pairwise scatter plot matrix. The outputs with matplotlib
    and seaborn are shown in Figure [12-11](#Fig11) and Figure [12-12](#Fig12), respectively.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将使用**scatter_matrix**方法，这是Pandas中的一种绘图函数，用于绘制成对散点图矩阵。使用matplotlib和seaborn的输出分别显示在图[12-11](#Fig11)和图[12-12](#Fig12)中。
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig11_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig11_HTML.jpg)'
