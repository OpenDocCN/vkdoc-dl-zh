- en: Nigeria Coat of Arms
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 尼日利亚国徽
- en: This chapter completes Part 2 of this book, which provides the foundation to
    programming for data science using the Python data science stack. In the next
    segment, Part 3, containing Chapters [13](463852_1_En_13_Chapter.xhtml)–[17](463852_1_En_17_Chapter.xhtml),
    we will provide an introduction to the field of machine learning.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 本章完成了本书的第二部分，这部分提供了使用Python数据科学堆栈进行数据科学编程的基础。在下一部分，即第三部分，包含第[13](463852_1_En_13_Chapter.xhtml)章至[17](463852_1_En_17_Chapter.xhtml)章，我们将介绍机器学习领域。
