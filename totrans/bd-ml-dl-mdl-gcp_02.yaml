  zh: '[PRE144]'
- en: Multivariate Plots
  id: totrans-547
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Common multivariate visualizations include the scatter plot and its extension
    the pairwise plot, parallel coordinate plots, and the covariance matrix plot.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
- en: Scatter Plot
  id: totrans-549
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Scatter plot exposes the relationships between two variables in a dataset. The
    outputs with matplotlib and seaborn are shown in Figure [12-9](#Fig9) and Figure
    [12-10](#Fig10), respectively.
  id: totrans-550
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig10_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig10_HTML.jpg)'
