  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Packages and Modules
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 包和模块
- en: A module is simply a Python source file, and packages are a collection of modules.
    Modules written by other programmers can be incorporated into your source code
    by using **import** and **from** statements.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 模块只是一个Python源文件，而包是一组模块。可以通过使用**import**和**from**语句将其他程序员编写的模块合并到您的源代码中。
- en: import Statement
  id: totrans-154
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: import语句
- en: 'The **import** statement allows you to load any Python module into your source
    file. It has the following syntax:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**import**语句允许您将任何Python模块加载到源文件中。它具有以下语法：'
- en: '[PRE38]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'where the following is optional:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 其中以下内容是可选的：
- en: '[PRE39]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: Let us take an example by importing a very important package called **numpy**
    that is used for numerical processing in Python and very critical for machine
    learning.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过导入一个非常重要的包**numpy**来举例，它在Python中进行数值处理，对于机器学习非常关键。
- en: '[PRE40]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: from Statement
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: from语句
- en: 'The **from** statement allows you to import a specific feature from a module
    into your source file. The syntax is as follows:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: '**from**语句允许您将模块中的特定功能导入到源文件中。其语法如下：'
- en: '[PRE41]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: 'Let’s see an example:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个例子：
- en: '[PRE42]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: This chapter provides the fundamentals for programming with Python. Programming
    is a very active endeavor, and competency is gained by experience and repetition.
    What is presented in this chapter provides just enough to be dangerous.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了使用Python编程的基础知识。编程是一项非常活跃的活动，能力是通过经验和重复获得的。本章所提供的内容仅足以让人感到危险。
- en: In the next chapter, we’ll introduce NumPy, a Python package for numerical computing.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将介绍NumPy，这是一个用于数值计算的Python包。
- en: 10. NumPy
  id: totrans-168
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. NumPy
- en: NumPy is a Python library optimized for numerical computing. It bears close
    semblance with MATLAB and is equally as powerful when used in conjunction with
    other packages such as SciPy for various scientific functions, Matplotlib for
    visualization, and Pandas for data analysis. NumPy is short for numerical python.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy是一个针对数值计算优化的Python库。它与MATLAB非常相似，当与其他包（如用于各种科学功能的SciPy、用于可视化的Matplotlib和用于数据分析的Pandas）结合使用时，同样强大。NumPy代表数值Python。
- en: NumPy’s core strength lies in its ability to create and manipulate n-dimensional
    arrays. This is particularly critical for building machine learning and deep learning
    models. Data is often represented in a matrix-like grid of rows and columns, where
    each row represents an observation and each column a variable or feature. Hence,
    NumPy’s 2-D array is a natural fit for storing and manipulating datasets.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy的核心优势在于其创建和操作n维数组的能力。这对于构建机器学习和深度学习模型尤其关键。数据通常以行和列组成的矩阵状网格表示，其中每一行代表一个观察值，每一列代表一个变量或特征。因此，NumPy的二维数组非常适合存储和操作数据集。
- en: This tutorial will cover the basics of NumPy to get you very comfortable working
    with the package and also get you to appreciate the thinking behind how NumPy
    works. This understanding forms a foundation from which one can extend and seek
    solutions from the NumPy reference documentation when a specific functionality
    is needed.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程将涵盖NumPy的基础知识，让您非常熟悉使用该包，并欣赏NumPy工作背后的思考方式。这种理解构成了一个基础，从它可以扩展并从NumPy参考文档中寻求解决方案，当需要特定功能时。
- en: 'To begin using NumPy, we’ll start by importing the NumPy module:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用NumPy，我们首先导入NumPy模块：
- en: '[PRE43]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: NumPy 1-D Array
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NumPy一维数组
- en: 'Let’s create a simple 1-D NumPy array:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个简单的1维NumPy数组：
- en: '[PRE44]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: We can also create an array from a Python list.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以从 Python 列表创建数组。
- en: '[PRE45]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Let’s explore other useful methods often employed for creating arrays.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索其他常用于创建数组的实用方法。
- en: '[PRE46]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: NumPy Datatypes
  id: totrans-181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NumPy 数据类型
- en: NumPy boasts a broad range of numerical datatypes in comparison with vanilla
    Python. This extended datatype support is useful for dealing with different kinds
    of signed and unsigned integer and floating-point numbers as well as booleans
    and complex numbers for scientific computation. NumPy datatypes include the **bool_**,
    **int**(8,16,32,64), **uint**(8,16,32,64), **float**(16,32,64), **complex**(64,128)
    as well as the **int_**, **float_**, and **complex_**, to mention just a few.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 与纯 Python 相比，NumPy 拥有更广泛的数值数据类型。这种扩展的数据类型支持对于处理不同类型的有符号和无符号整数、浮点数以及用于科学计算的布尔和复数非常有用。NumPy
    数据类型包括 **bool_**、**int**(8,16,32,64)、**uint**(8,16,32,64)、**float**(16,32,64)、**complex**(64,128)
    以及 **int_**、**float_** 和 **complex_**，仅举几例。
- en: The datatypes with a **_** appended are base Python datatypes converted to NumPy
    datatypes. The parameter **dtype** is used to assign a datatype to a NumPy function.
    The default NumPy type is **float_**. Also, NumPy infers contiguous arrays of
    the same type.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 后缀带有 **_** 的数据类型是将基础 Python 数据类型转换为 NumPy 数据类型。参数 **dtype** 用于将数据类型分配给 NumPy
    函数。NumPy 的默认类型是 **float_**。此外，NumPy 还可以推断出相同类型的连续数组。
- en: 'Let’s explore a bit with NumPy datatypes:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用 NumPy 数据类型探索一下：
- en: '[PRE47]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: Indexing + Fancy Indexing (1-D)
  id: totrans-186
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 索引 + 精美索引（1-D）
- en: We can index a single element of a NumPy 1-D array similar to how we index a
    Python list.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以像索引 Python 列表一样索引 NumPy 1-D 数组中的单个元素。
- en: '[PRE48]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Fancy indexing in NumPy is an advanced mechanism for indexing array elements
    based on integers or boolean. This technique is also called *masking*.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 中的精美索引是一种基于整数或布尔的高级索引数组元素的方法。这种技术也称为 *掩码*。
- en: Boolean Mask
  id: totrans-190
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 布尔掩码
- en: Let’s index all the even integers in the array using a boolean mask.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用布尔掩码索引数组中的所有偶数整数。
- en: '[PRE49]'
  id: totrans-192
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: Observe that the code my_array % 2 == 0 outputs an array of booleans.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到代码 my_array % 2 == 0 输出的是一个布尔数组。
- en: '[PRE50]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: Integer Mask
  id: totrans-195
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 整数掩码
- en: Let’s select all elements with even indices in the array.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们选择数组中所有偶数索引的元素。
- en: '[PRE51]'
  id: totrans-197
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Remember that array indices are indexed from 0\. So the second element, 18,
    is in index 1.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，数组索引从 0 开始。因此，第二个元素，18，位于索引 1。
- en: '[PRE52]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: Slicing a 1-D Array
  id: totrans-200
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 切片 1-D 数组
- en: Slicing a NumPy array is also similar to slicing a Python list.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 切片 NumPy 数组与切片 Python 列表类似。
- en: '[PRE53]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Basic Math Operations on Arrays: Universal Functions'
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数组上的基本数学运算：通用函数
- en: The core power of NumPy is in its highly optimized vectorized functions for
    various mathematical, arithmetic, and string operations. In NumPy these functions
    are called universal functions. We’ll explore a couple of basic arithmetic with
    NumPy 1-D arrays.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: NumPy 的核心优势在于其高度优化的向量化函数，适用于各种数学、算术和字符串操作。在 NumPy 中，这些函数被称为通用函数。我们将探讨使用 NumPy
    1-D 数组进行的基本算术运算。
- en: '[PRE54]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: Higher-Dimensional Arrays
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高维数组
- en: As we’ve seen earlier, the strength of NumPy is its ability to construct and
    manipulate n-dimensional arrays with highly optimized (i.e., vectorized) operations.
    Previously, we covered the creation of 1-D arrays (or vectors) in NumPy to get
    a feel of how NumPy works.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所见，NumPy 的优势在于其构建和操作 n 维数组的能力，这些操作高度优化（即向量化）。之前，我们介绍了 NumPy 中 1-D 数组（或向量）的创建，以了解
    NumPy 的工作原理。
- en: This section will now consider working with 2-D and 3-D arrays. 2-D arrays are
    ideal for storing data for analysis. Structured data is usually represented in
    a grid of rows and columns. And even when data is not necessarily represented
    in this format, it is often transformed into a tabular form before doing any data
    analytics or machine learning. Each column represents a feature or attribute and
    each row an observation.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 本节将考虑如何处理 2-D 和 3-D 数组。2-D 数组非常适合存储用于分析的数据。结构化数据通常以行和列的网格形式表示。即使数据不一定以这种格式表示，在进行任何数据分析或机器学习之前，也经常将其转换为表格形式。每一列代表一个特征或属性，每一行代表一个观测值。
- en: Also, other data forms like images are adequately represented using 3-D arrays.
    A colored image is composed of *n* × *n* pixel intensity values with a color depth
    of three for the red, green, and blue (RGB) color profiles.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，其他数据形式，如图像，也可以使用 3-D 数组充分表示。彩色图像由 *n* × *n* 像素强度值组成，具有红色、绿色和蓝色（RGB）颜色配置文件的三种颜色深度。
- en: Creating 2-D Arrays (Matrices)
  id: totrans-210
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 2-D 数组（矩阵）
- en: Let us construct a simple 2-D array.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个简单的 2-D 数组。
- en: '[PRE55]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Let’s explore common methods in practice for creating 2-D NumPy arrays, **which
    are also matrices**.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索在实践中创建2维NumPy数组的一些常用方法，**这些方法也是矩阵**。
- en: '[PRE56]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: '`Creating 3-D Arrays`'
  id: totrans-215
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '`创建3维数组`'
- en: Let’s construct a basic 3-D array.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个基本的3维数组。
- en: '[PRE57]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: 'We can also create 3-D arrays with methods such as **ones**, **zeros**, **full**,
    and **empty** by passing the configuration for [page, row, columns] into the **shape**
    parameter of the methods. For example:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以通过传递[页码，行，列]的配置到方法的**shape**参数，使用**ones**、**zeros**、**full**和**empty**等方法创建3维数组。例如：
- en: '[PRE58]'
  id: totrans-219
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: Indexing/Slicing of Matrices
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩阵的索引/切片
- en: Let’s see some examples of indexing and slicing 2-D arrays. The concept extends
    nicely from doing the same with 1-D arrays.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些2维数组的索引和切片的例子。这个概念很好地扩展到了对1维数组做同样的操作。
- en: '[PRE59]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: 'Matrix Operations: Linear Algebra'
  id: totrans-223
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 矩阵运算：线性代数
- en: Linear algebra is a convenient and powerful system for manipulating a set of
    data features and is one of the strong points of NumPy. Linear algebra is a crucial
    component of machine learning and deep learning research and implementation of
    learning algorithms. NumPy has vectorized routines for various matrix operations.
    Let’s go through a few of them.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 线性代数是一个方便且强大的系统，用于操作一组数据特征，并且是NumPy的强项之一。线性代数是机器学习和深度学习研究及其学习算法实现的关键组成部分。NumPy为各种矩阵运算提供了向量化例程。让我们来看几个例子。
- en: Matrix Multiplication (Dot Product)
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩阵乘法（点积）
- en: First let’s create random integers using the method **np.random.randint(low,
    high=None, size=None,)** which returns random integers from low (inclusive) to
    high (exclusive).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们使用方法**np.random.randint(low, high=None, size=None,**)来创建随机整数，该方法返回从低（包含）到高（不包含）的随机整数。
- en: '[PRE60]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: We can use the following routines for matrix multiplication, **np.matmul(a,b)**
    or **a @ b** if using Python 3.6\. Using **a @ b** is preferred. Remember that
    when multiplying matrices, the inner matrix dimensions must agree. For example,
    if A is an *m* × *n* matrix and B is an *n* × *p* matrix, the product of the matrices
    will be an *m* × *p* matrix with the inner dimensions of the respective matrices
    *n* agreeing (see Figure [10-1](#Fig1)).
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用以下例程进行矩阵乘法，**np.matmul(a,b)**或**a @ b**（如果使用Python 3.6）。建议使用**a @ b**。记住，当乘法矩阵时，内部矩阵维度必须一致。例如，如果A是一个*m*
    × *n*矩阵，B是一个*n* × *p*矩阵，矩阵的乘积将是一个*m* × *p*矩阵，其内部维度与相应矩阵的*n*一致（见图[10-1](#Fig1)）。
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig1_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig1_HTML.jpg)'
  id: totrans-229
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig1_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig1_HTML.jpg)'
- en: Figure 10-1
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-1
- en: Matrix multiplication
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法
- en: '[PRE61]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: '`Element-Wise Operations`'
  id: totrans-233
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '`元素级运算`'
- en: Element-wise matrix operations involve matrices operating on themselves in an
    element-wise fashion. The action can be an addition, subtraction, division, or
    multiplication (which is commonly called the Hadamard product). The matrices must
    be of the same shape. **Please note** that while a matrix is of shape *n* × *n*,
    a vector is of shape *n* × 1\. These concepts easily apply to vectors as well.
    See Figure [10-2](#Fig2).
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 元素级矩阵运算涉及矩阵以元素级方式对自己进行操作。操作可以是加法、减法、除法或乘法（通常称为Hadamard积）。矩阵必须具有相同的形状。**请注意**，虽然矩阵的形状是*n*
    × *n*，但向量是*n* × 1。这些概念也容易应用到向量上。见图[10-2](#Fig2)。
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig2_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig2_HTML.jpg)'
  id: totrans-235
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig2_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig2_HTML.jpg)'
- en: Figure 10-2
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-2
- en: Element-wise matrix operations
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 元素级矩阵运算
- en: Let’s have some examples.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一些例子。
- en: '[PRE62]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: '`Scalar Operation`'
  id: totrans-240
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '`标量运算`'
- en: A matrix can be acted upon by a scalar (i.e., a single numeric entity) in the
    same way element-wise fashion. This time the scalar operates upon each element
    of the matrix or vector. See Figure [10-3](#Fig3).
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 一个矩阵可以像元素级一样被一个标量（即单个数值实体）作用。这次标量作用于矩阵或向量的每个元素。见图[10-3](#Fig3)。
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig3_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig3_HTML.jpg)'
  id: totrans-242
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig3_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig3_HTML.jpg)'
- en: Figure 10-3
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-3
- en: Scalar operations
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 标量运算
- en: Let’s look at some examples.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一些例子。
- en: '[PRE63]'
  id: totrans-246
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: Matrix Transposition
  id: totrans-247
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩阵转置
- en: Transposition is a vital matrix operation that reverses the rows and columns
    of a matrix by flipping the row and column indices. The transpose of a matrix
    is denoted as *A*^(*T*). Observe that the diagonal elements remain unchanged.
    See Figure [10-4](#Fig4).
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig4_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig4_HTML.jpg)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
- en: Figure 10-4
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: Matrix transpose
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  id: totrans-253
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: '`The Inverse of a Matrix`'
  id: totrans-254
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A *m* × *m* matrix *A* (also called a square matrix) has an inverse if *A* times
    another matrix *B* results in the identity matrix *I* also of shape *m* × *m*.
    This matrix *B* is called the inverse of *A* and is denoted as *A*^(−1). This
    relationship is formally written as
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A{A}^{-1}={A}^{-1}A=I $$](../images/463852_1_En_10_Chapter/463852_1_En_10_Chapter_TeX_Equa.png)'
  id: totrans-256
  prefs: []
  type: TYPE_IMG
- en: However, not all matrices have an inverse. A matrix with an inverse is called
    a *nonsingular* or *invertible* matrix, while those without an inverse are known
    as *singular* or *degenerate*.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
- en: Note
  id: totrans-258
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A square matrix is a matrix that has the same number of rows and columns.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use NumPy to get the inverse of a matrix. Some linear algebra modules
    are found in a sub-module of NumPy called **linalg**.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  id: totrans-261
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: NumPy also implements the *Moore-Penrose pseudo inverse*, which gives an inverse
    derivation for degenerate matrices. Here, we use the **pinv** method to find the
    inverses of invertible matrices.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  id: totrans-263
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: Reshaping
  id: totrans-264
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A NumPy array can be restructured to take on a different shape. Let’s convert
    a 1-D array to a *m* × *n* matrix.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  id: totrans-266
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: Reshape vs. Resize Method
  id: totrans-267
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: NumPy has the **np.reshape** and **np.resize** methods. The reshape method returns
    an ndarray with a modified shape without changing the original array, whereas
    the resize method changes the original array. Let’s see an example.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  id: totrans-269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: Stacking Arrays
  id: totrans-270
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: NumPy has methods for concatenating arrays – also called stacking. The methods
    hstack and vstack are used to stack several arrays along the horizontal and vertical
    axis, respectively.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: Let’s stack **A** and **B** horizontally using **hstack**. To use **hstack**,
    the arrays must have the same number of rows. Also, the arrays to be stacked are
    passed as a tuple to the **hstack** method.
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  id: totrans-274
  prefs: []
  type: TYPE_PRE
  zh: '[PRE70]'
- en: To stack **A** and **B** vertically using **vstack**, the arrays must have the
    same number of columns. The arrays to be stacked are also passed as a tuple to
    the **vstack** method.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE71]'
- en: Broadcasting
  id: totrans-277
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: NumPy has an elegant mechanism for arithmetic operation on arrays with different
    dimensions or shapes. As an example, when a scalar is added to a vector (or 1-D
    array). The scalar value is conceptually broadcasted or stretched across the rows
    of the array and added element-wise. See Figure [10-5](#Fig5).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig5_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig5_HTML.jpg)'
  id: totrans-279
  prefs: []
  type: TYPE_IMG
- en: Figure 10-5
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
- en: Broadcasting example of adding a scalar to a vector (or 1-D array)
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
- en: Matrices with different shapes can be broadcasted to perform arithmetic operations
    by stretching the dimension of the smaller array. Broadcasting is another vectorized
    operation for speeding up matrix processing. However, not all arrays with different
    shapes can be broadcasted. For broadcasting to occur, the trailing axes for the
    arrays must be the same size or 1.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 形状不同的矩阵可以通过拉伸较小数组的维度来进行广播，以执行算术运算。广播是另一种用于加速矩阵处理的向量化操作。然而，并非所有形状不同的数组都可以进行广播。为了进行广播，数组的尾随轴必须具有相同的大小或为1。
- en: In the example that follows, the matrices **A** and **B** have the same rows,
    but the column of matrix **B** is 1\. Hence, an arithmetic operation can be performed
    on them by broadcasting and adding the cells element-wise.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的示例中，矩阵**A**和**B**具有相同的行数，但矩阵**B**的列数为1。因此，可以通过广播和逐元素添加单元格来对它们执行算术运算。
- en: '[PRE72]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE72]'
- en: See Figure [10-6](#Fig6) for more illustration.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅图[10-6](#Fig6)以获取更多说明。
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig6_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig6_HTML.jpg)'
  id: totrans-286
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig6_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig6_HTML.jpg)'
- en: Figure 10-6
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-6
- en: Matrix broadcasting example
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵广播示例
- en: 'Let’s see this in code:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看代码示例：
- en: '[PRE73]'
  id: totrans-290
  prefs: []
  type: TYPE_PRE
  zh: '[PRE73]'
- en: 'The example that follows cannot be broadcasted and will result in a *ValueError:
    operands could not be broadcasted together with shapes (4,3) (4,2)* because the
    matrices **A** and **B** have different columns and do not fit with the aforementioned
    rules of broadcasting that the trailing axes for the arrays must be the same size
    or 1.'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '下面的示例无法进行广播，并将导致*ValueError: operands could not be broadcasted together with
    shapes (4,3) (4,2)*错误，因为矩阵**A**和**B**的列不同，并且不符合上述广播规则，即数组的尾随轴必须具有相同的大小或为1。'
- en: '[PRE74]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE74]'
- en: When we try to add the preceding example in Python, we get an error.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们尝试在Python中添加前面的示例时，我们会得到一个错误。
- en: '[PRE75]'
  id: totrans-294
  prefs: []
  type: TYPE_PRE
  zh: '[PRE75]'
- en: Loading Data
  id: totrans-295
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载数据
- en: Loading data is an important process in the data analysis/machine learning pipeline.
    Data usually comes in **.csv** format. **csv** files can be loaded into Python
    by using the **loadtxt** method. The parameter **skiprows** skips the first row
    of the dataset – it is usually the header row of the data.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 加载数据是数据分析/机器学习流程中的一个重要过程。数据通常以**.csv**格式存在。可以通过使用**loadtxt**方法将**csv**文件加载到Python中。参数**skiprows**跳过了数据集的第一行——通常是数据的标题行。
- en: '[PRE76]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE76]'
- en: Pandas is a preferred package for loading data in Python.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas是Python中加载数据的首选包。
- en: We will learn more about Pandas for data manipulation in the next chapter.
  id: totrans-299
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下一章中学习更多关于Pandas数据操作的知识。
- en: 11. Pandas
  id: totrans-300
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. Pandas
- en: Pandas is a specialized Python library for data analysis, especially on humongous
    datasets. It boasts easy-to-use functionality for reading and writing data, dealing
    with missing data, reshaping the dataset, and massaging the data by slicing, indexing,
    inserting, and deleting data variables and records. Pandas also has an important
    **groupBy** functionality for aggregating data for defined conditions – useful
    for plotting and computing data summaries for exploration.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas是一个专门用于数据分析的Python库，尤其是在处理庞大的数据集时。它提供了易于使用的功能，用于读取和写入数据、处理缺失数据、重塑数据集，并通过切片、索引、插入和删除数据变量和记录来调整数据。Pandas还拥有一个重要的**groupBy**功能，用于根据定义的条件聚合数据——这对于绘图和计算用于探索的数据摘要非常有用。
- en: Another key strength of Pandas is in re-ordering and cleaning time series data
    for time series analysis. In short, Pandas is the go-to tool for data cleaning
    and data exploration.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas的另一个关键优势在于对时间序列数据进行重新排序和清洗，以便进行时间序列分析。简而言之，Pandas是数据清洗和数据探索的首选工具。
- en: 'To use Pandas, first import the Pandas module:'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 要使用Pandas，首先导入Pandas模块：
- en: '[PRE77]'
  id: totrans-304
  prefs: []
  type: TYPE_PRE
  zh: '[PRE77]'
- en: Pandas Data Structures
  id: totrans-305
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pandas数据结构
- en: Just like NumPy, Pandas can store and manipulate a multi-dimensional array of
    data. To handle this, Pandas has the **Series** and **DataFrame** data structures.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 就像NumPy一样，Pandas可以存储和操作多维数组数据。为了处理这些数据，Pandas提供了**Series**和**DataFrame**数据结构。
- en: Series
  id: totrans-307
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Series
- en: The **Series** data structure is for storing a 1-D array (or vector) of data
    elements. A series data structure also provides labels to the data items in the
    form of an **index**. The user can specify this label via the **index** parameter
    in the **Series** function, but if the **index** parameter is left unspecified,
    a default label of 0 to one minus the size of the data elements is assigned.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: '**Series**数据结构用于存储数据元素的一维数组（或向量）。Series数据结构还提供了以**索引**形式的数据项标签。用户可以通过**Series**函数中的**index**参数指定此标签，但如果**index**参数未指定，则将分配一个默认标签，从0到数据元素大小减1。'
- en: Let us consider an example of creating a **Series** data structure.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  id: totrans-310
  prefs: []
  type: TYPE_PRE
  zh: '[PRE78]'
- en: Elements in a Series data structure can be assigned the same indices.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  id: totrans-312
  prefs: []
  type: TYPE_PRE
  zh: '[PRE79]'
- en: DataFrames
  id: totrans-313
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A DataFrame is a Pandas data structure for storing and manipulating 2-D arrays.
    A 2-D array is a table-like structure that is similar to an Excel spreadsheet
    or a relational database table. A DataFrame is a very natural form for storing
    structured datasets.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
- en: A DataFrame consists of rows and columns for storing records of information
    (in rows) across heterogeneous variables (in columns).
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see examples of working with DataFrames.
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  id: totrans-317
  prefs: []
  type: TYPE_PRE
  zh: '[PRE80]'
- en: We will observe from the preceding example that a DataFrame is constructed from
    a dictionary of records where each value is a **Series** data structure. Also
    note that each row has an **index** that can be assigned when creating the DataFrame,
    else the default from 0 to one off the number of records in the DataFrame is used.
    Creating an index manually is usually not feasible except when working with small
    dummy datasets.
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
- en: NumPy is frequently used together with Pandas. Let’s import the NumPy library
    and use some of its functions to demonstrate other ways of creating a quick DataFrame.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  id: totrans-320
  prefs: []
  type: TYPE_PRE
  zh: '[PRE81]'
- en: Let’s examine some other operations with DataFrames.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  id: totrans-322
  prefs: []
  type: TYPE_PRE
  zh: '[PRE82]'
- en: In summary, a DataFrame is a tabular structure for storing a structured dataset
    where each column contains a **Series** data structure of records. Here’s an illustration
    (Figure [11-1](#Fig1)).
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_11_Chapter/463852_1_En_11_Fig1_HTML.jpg](../images/463852_1_En_11_Chapter/463852_1_En_11_Fig1_HTML.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
- en: Figure 11-1
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
- en: Pandas data structure
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
- en: Let’s check the data type of each column in the DataFrame.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  id: totrans-328
  prefs: []
  type: TYPE_PRE
  zh: '[PRE83]'
- en: An **object** data type in Pandas represents **Strings**.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
- en: Data Indexing (Selection/Subsets)
  id: totrans-330
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Similar to NumPy, Pandas objects can index or subset the dataset to retrieve
    a specific sub-record of the larger dataset. Note that data indexing returns a
    new **DataFrame** or **Series** if a 2-D or 1-D array is retrieved. They do not,
    however, alter the original dataset. Let’s go through some examples of indexing
    a Pandas DataFrame.
  id: totrans-331
  prefs: []
  type: TYPE_NORMAL
- en: First let’s create a dataframe. Observe the default integer indices assigned.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  id: totrans-333
  prefs: []
  type: TYPE_PRE
  zh: '[PRE84]'
- en: Selecting a Column from a DataFrame
  id: totrans-334
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Remember that the data type of a DataFrame column is a **Series** because it
    is a vector or 1-D array.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  id: totrans-336
  prefs: []
  type: TYPE_PRE
  zh: '[PRE85]'
- en: 'To select multiple columns, enclose the column names as **strings** with the
    double square brackets **[[ ]]**. The following code is an example:'
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE86]'
  id: totrans-338
  prefs: []
  type: TYPE_PRE
  zh: '[PRE86]'
- en: Selecting a Row from a DataFrame
  id: totrans-339
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pandas makes use of two unique wrapper attributes for indexing rows from a **DataFrame**
    or a cell from a **Series** data structure. These attributes are the **iloc**
    and **loc** – they are also known as indexers. The **iloc** attribute allows you
    to select or slice row(s) of a DataFrame using the intrinsic Python index format,
    whereas the **loc** attribute uses the explicit indices assigned to the DataFrame.
    If no explicit index is found, **loc** returns the same value as **iloc**.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
- en: Remember that the data type of a DataFrame row is a **Series** because it is
    a vector or 1-D array.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，DataFrame行的数据类型是**Series**，因为它是一个向量或一维数组。
- en: Let’s select the first row from the DataFrame.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从DataFrame中选择第一行。
- en: '[PRE87]'
  id: totrans-343
  prefs: []
  type: TYPE_PRE
  zh: '[PRE87]'
- en: Now let’s create a DataFrame with explicit indexing and test out the **iloc**
    and **loc** methods. Pandas will return an error if **iloc** is used for explicit
    indexing or if **loc** is used for implicit Python indexing.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建一个具有显式索引的DataFrame，并测试**iloc**和**loc**方法。如果使用**iloc**进行显式索引或使用**loc**进行隐式Python索引，Pandas将返回一个错误。
- en: '[PRE88]'
  id: totrans-345
  prefs: []
  type: TYPE_PRE
  zh: '[PRE88]'
- en: Selecting Multiple Rows and Columns from a DataFrame
  id: totrans-346
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从DataFrame中选择多行和多列
- en: Let’s use the **loc** method to select multiple rows and columns from a Pandas
    DataFrame.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用**loc**方法从Pandas DataFrame中选择多行和多列。
- en: '[PRE89]'
  id: totrans-348
  prefs: []
  type: TYPE_PRE
  zh: '[PRE89]'
- en: Slice Cells by Row and Column from a DataFrame
  id: totrans-349
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从DataFrame中按行和列切片单元格
- en: First let’s create a DataFrame. Remember, we use **iloc** when no explicit index
    or row labels are assigned.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们创建一个DataFrame。记住，当我们没有明确指定索引或行标签时，我们使用**iloc**。
- en: '[PRE90]'
  id: totrans-351
  prefs: []
  type: TYPE_PRE
  zh: '[PRE90]'
- en: DataFrame Manipulation
  id: totrans-352
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DataFrame操作
- en: Let’s go through some common tasks for manipulating a DataFrame.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一下操作DataFrame的一些常见任务。
- en: Removing a Row/Column
  id: totrans-354
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 删除行/列
- en: In many cases during the data cleaning process, there may be a need to drop
    unwanted rows or data variables (i.e., columns). We typically do this using the
    **drop** function. The **drop** function has a parameter **axis** whose default
    is 0\. If **axis** is set to 1, it drops columns in a dataset, but if left at
    the default, rows are dropped from the dataset.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据清洗过程中，在许多情况下，可能需要删除不需要的行或数据变量（即列）。我们通常使用**drop**函数来完成这项操作。**drop**函数有一个参数**axis**，其默认值为0。如果**axis**设置为1，它将删除数据集中的列，但如果保持默认值，则从数据集中删除行。
- en: Note that when a column or row is dropped, a new **DataFrame** or **Series**
    is returned without altering the original data structure. However, when the attribute
    **inplace** is set to **True**, the original DataFrame or Series is modified.
    Let’s see some examples.
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，当删除列或行时，会返回一个新的**DataFrame**或**Series**，而不会改变原始数据结构。然而，当将**inplace**属性设置为**True**时，原始DataFrame或Series将被修改。让我们看看一些例子。
- en: '[PRE91]'
  id: totrans-357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE91]'
- en: Let’s see examples of removing a row given a condition.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看根据条件删除行的示例。
- en: '[PRE92]'
  id: totrans-359
  prefs: []
  type: TYPE_PRE
  zh: '[PRE92]'
- en: Adding a Row/Column
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加行/列
- en: We can add a new column to a Pandas DataFrame by using the **assign** method.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过使用**assign**方法向Pandas DataFrame中添加新列。
- en: '[PRE93]'
  id: totrans-362
  prefs: []
  type: TYPE_PRE
  zh: '[PRE93]'
- en: We can also add a new DataFrame column by computing some function on another
    column. Let’s take an example by adding a column computing the absolute difference
    of the ages from their mean.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以通过在另一列上计算某个函数来向DataFrame中添加新列。让我们通过添加一个计算年龄与平均年龄绝对差的列来举例。
- en: '[PRE94]'
  id: totrans-364
  prefs: []
  type: TYPE_PRE
  zh: '[PRE94]'
- en: Typically in practice, a fully formed dataset is converted into Pandas for cleaning
    and data analysis, which does not ideally involve adding a new observation to
    the dataset. But in the event that this is desired, we can use the **append()**
    method to achieve this. However, it may not be a computationally efficient action.
    Let’s see an example.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 通常在实际操作中，一个完整的数据集会被转换为Pandas进行清洗和分析，这通常不涉及向数据集中添加新的观测值。但如果有此需求，我们可以使用**append()**方法来实现。然而，这可能不是一个计算效率高的操作。让我们看看一个例子。
- en: '[PRE95]'
  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE95]'
- en: We observe that adding a new row involves passing to the **append** method,
    a **Series** object with the **index** attribute set to the columns of the main
    DataFrame. Since typically, in given datasets, the index is nothing more than
    the assigned defaults, we set the attribute **ignore_index** to create a new set
    of default index values with the new row(s).
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 我们观察到添加新行涉及到传递给**append**方法一个**Series**对象，其**index**属性设置为主DataFrame的列。由于通常在给定的数据集中，索引不过是分配的默认值，因此我们将**ignore_index**属性设置为创建一组新的默认索引值，以包含新行。
- en: Data Alignment
  id: totrans-368
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据对齐
- en: Pandas utilizes data alignment to align indices when performing some binary
    arithmetic operation on DataFrames. If two or more DataFrames in an arithmetic
    operation do not share a common index, a **NaN** is introduced denoting missing
    data. Let’s see examples of this.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas在执行DataFrame上的某些二元算术操作时，利用数据对齐来对齐索引。如果参与算术操作的DataFrame中有两个或多个DataFrame没有共享的公共索引，则会引入一个**NaN**，表示缺失数据。让我们看看这个的示例。
- en: '[PRE96]'
  id: totrans-370
  prefs: []
  type: TYPE_PRE
  zh: '[PRE96]'
- en: 'If we do not want a **NaN** signifying missing values to be imputed, we can
    use the **fill_value** attribute to substitute with a default value. However,
    to take advantage of the **fill_value** attribute, we have to use the Pandas arithmetic
    methods: **add(), sub(), mul(), div(), floordiv(), mod()**, and **pow()** for
    addition, subtraction, multiplication, integer division, numeric division, remainder
    division, and exponentiation. Let’s see examples.'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们不希望用 **NaN** 表示的缺失值被填充，我们可以使用 **fill_value** 属性用默认值替换。然而，为了利用 **fill_value**
    属性，我们必须使用 Pandas 的算术方法：**add()**、**sub()**、**mul()**、**div()**、**floordiv()**、**mod()**
    和 **pow()**，分别用于加法、减法、乘法、整数除法、数值除法、余数除法和指数运算。让我们看看示例。
- en: '[PRE97]'
  id: totrans-372
  prefs: []
  type: TYPE_PRE
  zh: '[PRE97]'
- en: Combining Datasets
  id: totrans-373
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 合并数据集
- en: We may need to combine two or more datasets together; Pandas provides methods
    for such operations. We would consider the simple case of combining data frames
    with shared column names using the **concat** method.
  id: totrans-374
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能需要将两个或多个数据集合并在一起；Pandas 提供了这样的操作方法。我们将考虑使用 **concat** 方法合并具有共享列名的数据框的简单情况。
- en: '[PRE98]'
  id: totrans-375
  prefs: []
  type: TYPE_PRE
  zh: '[PRE98]'
- en: Observe that the **concat** method preserves indices by default. We can also
    concatenate or combine two dataframes by rows (or horizontally). This is done
    by setting the **axis** parameter to 1.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到 **concat** 方法默认保留索引。我们也可以通过设置 **axis** 参数为 1 来按行（或水平）连接或合并两个数据框。
- en: '[PRE99]'
  id: totrans-377
  prefs: []
  type: TYPE_PRE
  zh: '[PRE99]'
- en: Handling Missing Data
  id: totrans-378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理缺失数据
- en: Dealing with missing data is an integral part of the data cleaning/data analysis
    process. Moreover, some machine learning algorithms will not work in the presence
    of missing data. Let’s see some simple Pandas methods for identifying and removing
    missing data, as well as imputing values into missing data.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 处理缺失数据是数据清洗/数据分析过程的一个基本部分。此外，一些机器学习算法在存在缺失数据的情况下将无法工作。让我们看看一些简单的 Pandas 方法，用于识别和删除缺失数据，以及将值填充到缺失数据中。
- en: Identifying Missing Data
  id: totrans-380
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 识别缺失数据
- en: In this section, we’ll use the **isnull()** method to check if missing cells
    exist in a DataFrame.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将使用 **isnull()** 方法检查 DataFrame 中是否存在缺失单元格。
- en: '[PRE100]'
  id: totrans-382
  prefs: []
  type: TYPE_PRE
  zh: '[PRE100]'
- en: Let’s check for missing data in this data frame. The **isnull()** method will
    return **True** where there is a missing data, whereas the **notnull()** function
    returns **False**.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查这个数据框中的缺失数据。**isnull()** 方法将在存在缺失数据的地方返回 **True**，而 **notnull()** 函数返回
    **False**。
- en: '[PRE101]'
  id: totrans-384
  prefs: []
  type: TYPE_PRE
  zh: '[PRE101]'
- en: However, if we want a single answer (i.e., either **True** or **False**) to
    report if there is a missing data in the data frame, we will first convert the
    DataFrame to a NumPy array and use the function **any()**.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们想要一个单一的答案（即，要么是 **True** 要么是 **False**）来报告数据框中是否存在缺失数据，我们首先将 DataFrame
    转换为 NumPy 数组，并使用函数 **any()**。
- en: The **any** function returns **True** when at least one of the elements in the
    dataset is **True**. In this case, **isnull()** returns a DataFrame of booleans
    where **True** designates a cell with a missing value.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: '**any** 函数在数据集的元素中至少有一个为 **True** 时返回 **True**。在这种情况下，**isnull()** 返回一个布尔 DataFrame，其中
    **True** 表示有缺失值的单元格。'
- en: Let’s see how that works.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看它是如何工作的。
- en: '[PRE102]'
  id: totrans-388
  prefs: []
  type: TYPE_PRE
  zh: '[PRE102]'
- en: Removing Missing Data
  id: totrans-389
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 删除缺失数据
- en: Pandas has a function **dropna()** which is used to filter or remove missing
    data from a DataFrame. **dropna()** returns a new DataFrame without missing data.
    Let’s see examples of how this works.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 有一个名为 **dropna()** 的函数，用于从 DataFrame 中过滤或删除缺失数据。**dropna()** 返回一个不包含缺失数据的新
    DataFrame。让我们看看这个函数是如何工作的示例。
- en: '[PRE103]'
  id: totrans-391
  prefs: []
  type: TYPE_PRE
  zh: '[PRE103]'
- en: As we will observe from the preceding code block, **dropna()** drops all rows
    that contain a missing value. But we may not want that. We may rather, for example,
    want to drop columns with missing data or drop rows where all the observations
    are missing or better still remove consequent on the number of observations present
    in a particular row.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们从前面的代码块中观察到的，**dropna()** 会删除包含缺失值的所有行。但也许我们并不希望这样做。例如，我们可能更希望删除包含缺失数据的列或删除所有观测值都缺失的行，或者更理想的是根据特定行中存在的观测值数量来删除。
- en: Let’s see examples of this option. First let’s expand our example dataset.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个选项的示例。首先让我们扩展我们的示例数据集。
- en: '[PRE104]'
  id: totrans-394
  prefs: []
  type: TYPE_PRE
  zh: '[PRE104]'
- en: Drop columns with **NaN**. This option is not often used in practice.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 删除包含 **NaN** 的列。这个选项在实践中不常用。
- en: '[PRE105]'
  id: totrans-396
  prefs: []
  type: TYPE_PRE
  zh: '[PRE105]'
- en: Drop rows where all the observations are missing.
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 删除所有观测值都缺失的行。
- en: '[PRE106]'
  id: totrans-398
  prefs: []
  type: TYPE_PRE
  zh: '[PRE106]'
- en: Drop rows based on an observation threshold. By adjusting the **thresh** attribute,
    we can drop rows where the number of observations in the row is less than the
    **thresh** value.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 根据观测阈值删除行。通过调整 **thresh** 属性，我们可以删除行中观测值数量小于 **thresh** 值的行。
- en: '[PRE107]'
  id: totrans-400
  prefs: []
  type: TYPE_PRE
  zh: '[PRE107]'
- en: Imputing Values into Missing Data
  id: totrans-401
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 填充缺失数据中的值
- en: Imputing values as substitutes for missing data is a standard practice in preparing
    data for machine learning. Pandas has a **fillna()** function for this purpose.
    A simple approach is to fill **NaNs** with zeros.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 用替代值填充缺失数据是准备数据用于机器学习时的标准做法。Pandas 提供了一个名为 **fillna()** 的函数用于此目的。一种简单的方法是将 **NaNs**
    填充为零。
- en: '[PRE108]'
  id: totrans-403
  prefs: []
  type: TYPE_PRE
  zh: '[PRE108]'
- en: Another tactic is to fill missing values with the mean of the column value.
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种策略是用列值的平均值填充缺失值。
- en: '[PRE109]'
  id: totrans-405
  prefs: []
  type: TYPE_PRE
  zh: '[PRE109]'
- en: Data Aggregation (Grouping)
  id: totrans-406
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据聚合（分组）
- en: We will touch briefly on a common practice in data science, and that is grouping
    a set of data attributes, either for retrieving some group statistics or applying
    a particular set of functions to the group. Grouping is commonly used for data
    exploration and plotting graphs to understand more about the dataset. Missing
    data are automatically excluded in a grouping operation.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将简要介绍数据科学中的一个常见做法，即对一组数据属性进行分组，无论是为了检索某些组统计信息还是应用特定的一组函数。分组通常用于数据探索和绘制图表以更好地了解数据集。在分组操作中，缺失数据会自动排除。
- en: Let’s see examples of how this works.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个是如何工作的例子。
- en: '[PRE110]'
  id: totrans-409
  prefs: []
  type: TYPE_PRE
  zh: '[PRE110]'
- en: Let’s find the mean age and salary for observations in our dataset grouped by
    **Sex**.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们找到我们数据集中按 **性别** 分组的观察值的平均年龄和薪水。
- en: '[PRE111]'
  id: totrans-411
  prefs: []
  type: TYPE_PRE
  zh: '[PRE111]'
- en: We can group by more than one variable. In this case for each Sex group, also
    group the age and find the mean of the other numeric variables.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以按多个变量进行分组。在这种情况下，对于每个 **性别** 组，也按年龄分组，并找到其他数值变量的平均值。
- en: '[PRE112]'
  id: totrans-413
  prefs: []
  type: TYPE_PRE
  zh: '[PRE112]'
- en: Also, we can use a variable as a group key to run a group function on another
    variable or sets of variables.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还可以使用一个变量作为分组键，对另一个变量或变量集运行分组函数。
- en: '[PRE113]'
  id: totrans-415
  prefs: []
  type: TYPE_PRE
  zh: '[PRE113]'
- en: Statistical Summaries
  id: totrans-416
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 统计摘要
- en: Descriptive statistics is an essential component of the data science pipeline.
    By investigating the properties of the dataset, we can gain a better understanding
    of the data and the relationship between the variables. This information is useful
    in making decisions about the type of data transformations to carry out or the
    types of learning algorithms to spot check. Let’s see some examples of simple
    statistical functions in Pandas.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 描述性统计是数据科学流程的一个基本组成部分。通过研究数据集的性质，我们可以更好地理解数据以及变量之间的关系。这些信息对于决定执行的数据转换类型或要检查的学习算法类型非常有用。让我们看看
    Pandas 中简单统计函数的一些例子。
- en: First, we’ll create a Pandas dataframe.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将创建一个 Pandas 数据框。
- en: '[PRE114]'
  id: totrans-419
  prefs: []
  type: TYPE_PRE
  zh: '[PRE114]'
- en: Use the **describe** function to obtain summary statistics of a dataset. Eight
    statistical measures are displayed. They are count, mean, standard deviation,
    minimum value, 25th percentile, 50th percentile or median, 75th percentile, and
    the maximum value.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 **describe** 函数来获取数据集的摘要统计信息。显示八个统计指标。它们是计数、平均值、标准差、最小值、25百分位数、50百分位数或中位数、75百分位数和最大值。
- en: '[PRE115]'
  id: totrans-421
  prefs: []
  type: TYPE_PRE
  zh: '[PRE115]'
- en: Correlation
  id: totrans-422
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 相关性
- en: Correlation shows how much relationship exists between two variables. Parametric
    machine learning methods such as logistic and linear regression can take a performance
    hit when variables are highly correlated. The correlation values range from –1
    to 1, with 0 indicating no correlation at all. –1 signifies that the variables
    are strongly negatively correlated, while 1 shows that the variables are strongly
    positively correlated. In practice, it is safe to eliminate variables that have
    a correlation value greater than –0.7 or 0.7\. A common correlation estimate in
    use is the Pearson’s correlation coefficient.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性展示了两个变量之间存在多少关系。当变量高度相关时，参数化机器学习方法，如逻辑回归和线性回归，可能会受到影响。相关值范围从 –1 到 1，其中 0
    表示完全没有相关性。–1 表示变量之间存在强烈的负相关性，而 1 表示变量之间存在强烈的正相关性。在实践中，当变量的相关值大于 –0.7 或 0.7 时，可以安全地消除这些变量。常用的相关估计方法是皮尔逊相关系数。
- en: '[PRE116]'
  id: totrans-424
  prefs: []
  type: TYPE_PRE
  zh: '[PRE116]'
- en: Skewness
  id: totrans-425
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 偏度
- en: Another important statistical metric is the skewness of the dataset. Skewness
    is when a bell-shaped or normal distribution is shifted toward the right or the
    left. Pandas offers a convenient function called **skew()** to check the skewness
    of each variable. Values close to 0 are more normally distributed with less skew.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的统计指标是数据集的偏度。偏度是指当钟形或正态分布向右或向左偏移时。Pandas 提供了一个方便的函数称为 **skew()** 来检查每个变量的偏度。接近
    0 的值分布更接近正态，偏度更小。
- en: '[PRE117]'
  id: totrans-427
  prefs: []
  type: TYPE_PRE
  zh: '[PRE117]'
- en: Importing Data
  id: totrans-428
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 导入数据
- en: Again, getting data into the programming environment for analysis is a fundamental
    and first step for any data analytics or machine learning task. In practice, data
    usually comes in a comma-separated value, **csv,** format.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，将数据导入编程环境进行分析是任何数据分析或机器学习任务的基本且第一步。在实践中，数据通常以逗号分隔值，**csv** 格式存在。
- en: '[PRE118]'
  id: totrans-430
  prefs: []
  type: TYPE_PRE
  zh: '[PRE118]'
- en: To export a DataFrame back to **csv**
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 将 DataFrame 导出为 **csv**
- en: '[PRE119]'
  id: totrans-432
  prefs: []
  type: TYPE_PRE
  zh: '[PRE119]'
- en: For the next example, the dataset ‘states.csv’ is found in the chapter folder
    of the code repository of this book.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一个例子中，数据集 'states.csv' 位于本书代码仓库的章节文件夹中。
- en: '[PRE120]'
  id: totrans-434
  prefs: []
  type: TYPE_PRE
  zh: '[PRE120]'
- en: Timeseries with Pandas
  id: totrans-435
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 Pandas 处理时间序列
- en: One of the core strengths of Pandas is its powerful set of functions for manipulating
    timeseries datasets. A couple of these functions are covered in this material.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 的核心优势之一是其强大的时间序列数据集操作函数集。本材料中涵盖了其中的一些函数。
- en: Importing a Dataset with a DateTime Column
  id: totrans-437
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导入具有日期时间列的数据集
- en: When importing a dataset that has a column containing datetime entries, Pandas
    has an attribute in the **read_csv** method called **parse_dates** that converts
    the datetime column from strings into Pandas **date** datatype. The attribute
    **index_col** uses the column of datetimes as an index to the DataFrame.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 当导入包含日期时间条目的数据集时，Pandas 在 **read_csv** 方法中有一个名为 **parse_dates** 的属性，该属性将日期时间列从字符串转换为
    Pandas **date** 数据类型。属性 **index_col** 使用日期时间列作为 DataFrame 的索引。
- en: The method **head()** prints out the first five rows of the DataFrame, while
    the method **tail()** prints out the last five rows of the DataFrame. This function
    is very useful for taking a peek at a large DataFrame without having to bear the
    computational cost of printing it out entirely.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 方法 **head()** 打印 DataFrame 的前五行，而方法 **tail()** 打印 DataFrame 的最后五行。这个函数在不需要承担打印整个
    DataFrame 的计算成本的情况下查看大型 DataFrame 非常有用。
- en: '[PRE121]'
  id: totrans-440
  prefs: []
  type: TYPE_PRE
  zh: '[PRE121]'
- en: Let’s examine the index of the imported data. Notice that they are the datetime
    entries.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查导入数据的索引。注意，它们是日期时间条目。
- en: '[PRE122]'
  id: totrans-442
  prefs: []
  type: TYPE_PRE
  zh: '[PRE122]'
- en: Selection Using DatetimeIndex
  id: totrans-443
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 DatetimeIndex 进行选择
- en: The **DatetimeIndex** can be used to select the observations of the dataset
    in various interesting ways. For example, we can select the observation of an
    exact day or the observations belonging to a particular month or year. The selected
    observation can be subsetted by columns and grouped to give more insight in understanding
    the dataset.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: '**DatetimeIndex** 可以以各种有趣的方式选择数据集的观测值。例如，我们可以选择确切的日期的观测值，或者属于特定月份或年份的观测值。所选的观测值可以通过列进行子集化，并通过分组来提供更多关于理解数据集的洞察。'
- en: Let’s see some examples.
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些例子。
- en: Select a Particular Date
  id: totrans-446
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 选择一个特定的日期
- en: Let’s select a particular date from a DataFrame.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从 DataFrame 中选择一个特定的日期。
- en: '[PRE123]'
  id: totrans-448
  prefs: []
  type: TYPE_PRE
  zh: '[PRE123]'
- en: Select a Month
  id: totrans-449
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 选择一个月份
- en: Let’s select a particular month from a DataFrame.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从 DataFrame 中选择一个特定的月份。
- en: '[PRE124]'
  id: totrans-451
  prefs: []
  type: TYPE_PRE
  zh: '[PRE124]'
- en: Select a Year
  id: totrans-452
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 选择一个年份
- en: Let’s select a particular year from a DataFrame.
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从 DataFrame 中选择一个特定的年份。
- en: '[PRE125]'
  id: totrans-454
  prefs: []
  type: TYPE_PRE
  zh: '[PRE125]'
- en: Subset Data Columns and Find Summaries
  id: totrans-455
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 子集数据列并查找摘要
- en: Get the closing prices of Bitcoin stocks for the month of January.
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 获取一月份比特币股票的收盘价。
- en: '[PRE126]'
  id: totrans-457
  prefs: []
  type: TYPE_PRE
  zh: '[PRE126]'
- en: Find the mean market value of Ethereum for the month of January.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 查找一月份以太坊的平均市值。
- en: '[PRE127]'
  id: totrans-459
  prefs: []
  type: TYPE_PRE
  zh: '[PRE127]'
- en: Resampling Datetime Objects
  id: totrans-460
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重采样日期时间对象
- en: A Pandas DataFrame with an index of **DatetimeIndex**, **PeriodIndex**, or **TimedeltaIndex**
    can be resampled to any of the date time frequencies from seconds, to minutes,
    to months. Let’s see some examples.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas DataFrame 的索引为 **DatetimeIndex**、**PeriodIndex** 或 **TimedeltaIndex**
    时，可以重采样到从秒到分钟，再到月份的任何日期时间频率。让我们看看一些例子。
- en: Let’s get the average monthly closing values for Litecoin.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们获取Litecoin的平均月收盘价。
- en: '[PRE128]'
  id: totrans-463
  prefs: []
  type: TYPE_PRE
  zh: '[PRE128]'
- en: Get the average weekly market value of Bitcoin Cash.
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 获取比特币现金的平均每周市值。
- en: '[PRE129]'
  id: totrans-465
  prefs: []
  type: TYPE_PRE
  zh: '[PRE129]'
- en: Convert to Datetime Datatype Using ‘to_datetime’
  id: totrans-466
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 'to_datetime' 转换为日期时间数据类型
- en: 'Pandas uses the **to_datetime** method to convert strings to Pandas datetime
    datatype. The **to_datetime** method is smart enough to infer a **datetime** representation
    from a string of dates passed with different formats. The default output format
    of **to_datetime** is in the following order: **year, month, day, minute, second,
    millisecond, microsecond, nanosecond**.'
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 使用 **to_datetime** 方法将字符串转换为 Pandas 日期时间数据类型。**to_datetime** 方法足够智能，可以从传递的不同格式的日期字符串中推断出
    **datetime** 表示形式。**to_datetime** 的默认输出格式按以下顺序排列：**年，月，日，分，秒，毫秒，微秒，纳秒**。
- en: The input to **to_datetime** is recognized as **month, day, year**. Although,
    it can easily be modified by setting the attributes **dayfirst** or **yearfirst**
    to **True**.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: '**to_datetime** 的输入被识别为 **月、日、年**。尽管如此，可以通过设置属性 **dayfirst** 或 **yearfirst**
    为 **True** 来轻松修改。'
- en: For example, if **dayfirst** is set to **True**, the input is recognized as
    **day, month, year**.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果 **dayfirst** 设置为 **True**，则输入被识别为 **日、月、年**。
- en: Let’s see an example of this.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看这个例子。
- en: '[PRE130]'
  id: totrans-471
  prefs: []
  type: TYPE_PRE
  zh: '[PRE130]'
- en: Let’s set dayfirst to True. Observe that the first input in the string is treated
    as a day in the output.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将 dayfirst 设置为 True。观察输出中的第一个输入被处理为日期。
- en: '[PRE131]'
  id: totrans-473
  prefs: []
  type: TYPE_PRE
  zh: '[PRE131]'
- en: The shift() Method
  id: totrans-474
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: shift() 方法
- en: A typical step in a timeseries use case is to convert the timeseries dataset
    into a supervised learning framework for predicting the outcome for a given time
    instant. The **shift()** method is used to adjust a Pandas DataFrame column by
    shifting the observations forward or backward. If the observations are pulled
    backward (or lagged), **NaNs** are attached at the tail of the column. But if
    the values are pushed forward, the head of the column will contain **NaNs**. This
    step is important for adjusting the **target** variable of a dataset to predict
    outcomes *n*-days or steps or instances into the future. Let’s see some examples.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列用例中的典型步骤是将时间序列数据集转换为监督学习框架，以预测给定时间点的结果。**shift()** 方法用于通过向前或向后移动观察值来调整 Pandas
    DataFrame 列。如果观察值被向后拉（或滞后），则列的尾部将附加 **NaNs**。但如果值被向前推，则列的头部将包含 **NaNs**。这一步骤对于调整数据集的
    **目标** 变量以预测未来 *n* 天或步骤或实例的结果至关重要。让我们看看一些例子。
- en: Subset columns for the observations related to Bitcoin Cash.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 为与比特币现金相关的观察值选择子列。
- en: '[PRE132]'
  id: totrans-477
  prefs: []
  type: TYPE_PRE
  zh: '[PRE132]'
- en: Now let’s create a target variable that contains the closing rates 3 days into
    the future.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建一个包含未来 3 天收盘率的目标变量。
- en: '[PRE133]'
  id: totrans-479
  prefs: []
  type: TYPE_PRE
  zh: '[PRE133]'
- en: Observe that the tail of the column **close_4_head** contains **NaNs**.
  id: totrans-480
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到列 **close_4_head** 的尾部包含 **NaNs**。
- en: '[PRE134]'
  id: totrans-481
  prefs: []
  type: TYPE_PRE
  zh: '[PRE134]'
- en: Rolling Windows
  id: totrans-482
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 滚动窗口
- en: Pandas provides a function called **rolling()** to find the rolling or moving
    statistics of values in a column over a specified window. The window is the “number
    of observations used in calculating the statistic.” So we can find the rolling
    sums or rolling means of a variable. These statistics are vital when working with
    timeseries datasets. Let’s see some examples.
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas 提供了一个名为 **rolling()** 的函数，用于在指定窗口内查找列中值的滚动或移动统计量。窗口是“用于计算统计量的观察数量”。因此，我们可以找到变量的滚动总和或滚动平均值。这些统计量在处理时间序列数据集时至关重要。让我们看看一些例子。
- en: Let’s find the rolling means for the closing variable over a 30-day window.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们找到一个 30 天窗口内收盘变量的滚动平均值。
- en: '[PRE135]'
  id: totrans-485
  prefs: []
  type: TYPE_PRE
  zh: '[PRE135]'
- en: The first few values of the **rolling_means** variable contain **NaNs** because
    the method computes the rolling statistic from the earliest time to the latest
    time in the dataset. Let’s print out the first five values using the **head**
    method.
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: '**rolling_means** 变量的前几个值包含 **NaNs**，因为该方法从数据集中的最早时间到最晚时间计算滚动统计量。让我们使用 **head**
    方法打印出前五个值。'
- en: '[PRE136]'
  id: totrans-487
  prefs: []
  type: TYPE_PRE
  zh: '[PRE136]'
- en: Now let’s observe the last five values using the **tail** method.
  id: totrans-488
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用 **tail** 方法观察最后五个值。
- en: '[PRE137]'
  id: totrans-489
  prefs: []
  type: TYPE_PRE
  zh: '[PRE137]'
- en: Let’s do a quick plot of the rolling means using the Pandas plotting function.
    The output of the plot is shown in Figure [11-2](#Fig2).
  id: totrans-490
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用 Pandas 绘图函数快速绘制滚动平均值。该图的输出显示在图 [11-2](#Fig2) 中。
- en: '![../images/463852_1_En_11_Chapter/463852_1_En_11_Fig2_HTML.jpg](../images/463852_1_En_11_Chapter/463852_1_En_11_Fig2_HTML.jpg)'
  id: totrans-491
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_11_Chapter/463852_1_En_11_Fig2_HTML.jpg](../images/463852_1_En_11_Chapter/463852_1_En_11_Fig2_HTML.jpg)'
- en: Figure 11-2
  id: totrans-492
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-2
- en: Rolling average closing price over 30 days for Bitcoin Cash
  id: totrans-493
  prefs: []
  type: TYPE_NORMAL
  zh: 比特币现金 30 天滚动平均收盘价
- en: '[PRE138]'
  id: totrans-494
  prefs: []
  type: TYPE_PRE
  zh: '[PRE138]'
- en: More on plotting in the next chapter.
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中将有更多关于绘图的内容。
- en: 12. Matplotlib and Seaborn
  id: totrans-496
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12. Matplotlib 和 Seaborn
- en: It is critical to be able to plot the observations and variables of a dataset
    before subjecting the dataset to some machine learning algorithm or another. Data
    visualization is essential to understand your data and to glean insights into
    the underlying structure of the dataset. These insights help the scientist in
    deciding with statistical analysis or which learning algorithm is more appropriate
    for the given dataset. Also, the scientist can get ideas on suitable transformations
    to apply to the dataset.
  id: totrans-497
  prefs: []
  type: TYPE_NORMAL
  zh: 在将数据集提交给某些机器学习算法之前，能够绘制数据集的观察值和变量至关重要。数据可视化对于理解数据以及洞察数据集的潜在结构至关重要。这些洞察帮助科学家决定使用哪种统计分析或哪种学习算法更适合给定的数据集。此外，科学家还可以获得关于对数据集应用适当转换的想法。
- en: In general, visualization in data science can conveniently be split into **univariate**
    and **multivariate** data visualizations. Univariate data visualization involves
    plotting a single variable to understand more about its distribution and structure,
    while multivariate plots expose the relationship and structure between two or
    more variables.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，数据科学中的可视化可以方便地分为**单变量**和**多变量**数据可视化。单变量数据可视化涉及绘制单个变量以了解其分布和结构，而多变量图则揭示了两个或更多变量之间的关系和结构。
- en: Matplotlib and Seaborn
  id: totrans-499
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Matplotlib和Seaborn
- en: Matplotlib is a graphics package for data visualization in Python. Matplotlib
    has arisen as a key component in the Python data science stack and is well integrated
    with NumPy and Pandas. The **pyplot** module mirrors the MATLAB plotting commands
    closely. Hence, MATLAB users can easily transit to plotting with Python.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib是Python中用于数据可视化的图形包。Matplotlib已成为Python数据科学堆栈的关键组件，并与NumPy和Pandas良好集成。**pyplot**模块与MATLAB绘图命令紧密对应。因此，MATLAB用户可以轻松过渡到使用Python进行绘图。
- en: Seaborn, on the other hand, extends the Matplotlib library for creating beautiful
    graphics with Python using a more straightforward set of methods. Seaborn is more
    integrated for working with Pandas DataFrames. We will go through creating simple
    essential plots with Matplotlib and seaborn.
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，seaborn通过使用更简单的方法集扩展了Matplotlib库，以便使用Python创建美观的图形。seaborn与Pandas DataFrames的集成度更高。我们将通过Matplotlib和seaborn创建简单的基本图表。
- en: Pandas Plotting Methods
  id: totrans-502
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Pandas绘图方法
- en: Pandas also has a robust set of plotting functions which we will also use for
    visualizing our dataset. The reader will observe how we can easily convert datasets
    from NumPy to Pandas and vice versa to take advantage of one functionality or
    the other. The plotting features of Pandas are found in the **plotting** module.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas还提供了一套强大的绘图函数，我们也将使用这些函数来可视化我们的数据集。读者将观察到我们如何轻松地将数据集从NumPy转换为Pandas，反之亦然，以利用某一功能或另一功能。Pandas的绘图功能位于**plotting**模块中。
- en: There are many options and properties for working with **matplotlib**, **seaborn**,
    and **pandas.plotting** functions for data visualization, but as is the theme
    of this material, the goal is to keep it simple and give the reader just enough
    to be dangerous. Deep competency comes with experience and continuous usage. These
    cannot really be taught.
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用**matplotlib**、**seaborn**和**pandas.plotting**函数进行数据可视化时，有许多选项和属性，但正如本材料的主题，目标是保持简单，给读者提供足够的知识以供使用。深入的专业能力来自于经验和持续的使用。这些实际上是无法教授的。
- en: To begin, we will load Matplotlib by importing the **pyplot** module from the
    **matplotlib** package and the **seaborn** package.
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将通过从matplotlib包导入**pyplot**模块和**seaborn**包来加载Matplotlib。
- en: '[PRE139]'
  id: totrans-506
  prefs: []
  type: TYPE_PRE
  zh: '[PRE139]'
- en: We’ll also import the **numpy** and **pandas** packages to create our datasets.
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将导入**numpy**和**pandas**包来创建我们的数据集。
- en: '[PRE140]'
  id: totrans-508
  prefs: []
  type: TYPE_PRE
  zh: '[PRE140]'
- en: Univariate Plots
  id: totrans-509
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单变量图
- en: Some common and essential univariate plots are line plots, bar plots, histograms
    and density plots, and the box and whisker plot, to mention just a few.
  id: totrans-510
  prefs: []
  type: TYPE_NORMAL
  zh: 一些常见和基本的单变量图包括线形图、条形图、直方图和密度图，以及箱线图，仅举几例。
- en: Line Plot
  id: totrans-511
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 线形图
- en: Let’s plot a sine graph of 100 points from the negative to positive **exponential**
    range. The **plot** method allows us to plot lines or markers to the figure. The
    outputs of the sine and cosine line plot are shown in Figure [12-1](#Fig1) and
    Figure [12-2](#Fig2), respectively.
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制一个从负到正**指数**范围的100个点的正弦图。**plot**方法允许我们在图中绘制线条或标记。正弦和余弦线图的输出分别如图[12-1](#Fig1)和图[12-2](#Fig2)所示。
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig2_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig2_HTML.jpg)'
  id: totrans-513
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig2_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig2_HTML.jpg)'
- en: Figure 12-2
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-2
- en: Lineplot with seaborn
  id: totrans-515
  prefs: []
  type: TYPE_NORMAL
  zh: 使用seaborn的线形图
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig1_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig1_HTML.jpg)'
  id: totrans-516
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig1_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig1_HTML.jpg)'
- en: Figure 12-1
  id: totrans-517
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-1
- en: Lineplot with Matplotlib
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Matplotlib的线形图
- en: '[PRE141]'
  id: totrans-519
  prefs: []
  type: TYPE_PRE
  zh: '[PRE141]'
- en: Bar Plot
  id: totrans-520
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 条形图
- en: Let’s create a simple bar plot using the bar method. The output with matplotlib
    is shown in Figure [12-3](#Fig3), and the output with seaborn is shown in Figure
    [12-4](#Fig4).
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用条形图方法创建一个简单的条形图。使用matplotlib的输出如图[12-3](#Fig3)所示，使用seaborn的输出如图[12-4](#Fig4)所示。
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig4_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig4_HTML.jpg)'
  id: totrans-522
