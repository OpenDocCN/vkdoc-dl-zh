- en: Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Matplotlib is also used to visualize images. This process is utilized when visualizing
    a dataset of image pixels. You will observe that image data is stored in the computer
    as an array of pixel intensity values ranging from 0 to 255 across three bands
    for colored images.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE150]'
  prefs: []
  type: TYPE_PRE
- en: Note that the image contains 232 rows and 240 columns of pixel values across
    three channels (i.e., red, green, and blue).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s print the first row of the columns in the first channel of our image data.
    Remember that each pixel is an intensity value from 0 to 255\. Values closer to
    0 are black, while those closer to 255 are white. The output is shown in Figure
    [12-15](#Fig15).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE151]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s plot the image.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE152]'
  prefs: []
  type: TYPE_PRE
