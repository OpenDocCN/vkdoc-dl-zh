- en: Part IIProgramming Foundations for Data Science
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 8. What Is Data Science?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Data science encompasses the tools and techniques for extracting information
    from data. Data science techniques draw extensively from the field of mathematics,
    statistics, and computation. However, data science is now encapsulated into software
    packages and libraries, thus making them easily accessible and consumable by the
    software development and engineering communities. This is a major factor to the
    rise of intelligence capabilities now integrated as a major staple in software
    products across all sorts of domains.
  prefs: []
  type: TYPE_NORMAL
- en: This chapter will discuss broadly on the opportunities for data science and
    big data analytics integration as part of the transformation portfolio of businesses
    and institutions and give an overview on the data science process as a reusable
    template for fulfilling data science projects.
  prefs: []
  type: TYPE_NORMAL
- en: The Challenge of Big Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Due to the expansion of data at the turn of the twenty-first century epitomized
    by the so-called 3Vs of big data, which are volume, velocity, and variety. Volume
    refers to the increasing size of data, velocity the speed at which data is acquired,
    and variety the diverse types of data that are available. For others, this becomes
    5Vs with the inclusion of value and veracity to mean the usefulness of data and
    the truthfulness of data, respectively. We have observed data volume blowout from
    the megabyte (MB) to the terabyte (TB) scale and now exploding past the petabyte
    (PB). We have to find new and improved means of storing and processing this ever-increasing
    dataset. Initially, this challenge of storage and data processing was addressed
    by the Hadoop ecosystem and other supporting frameworks, but even these have become
    expensive to manage and scale, and this is why there is a pivot to cloud-managed,
    elastic, secure, and high-availability data storage and processing capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, for most applications and business use cases, there is a
    need to carry out real-time analysis on data due to the vast amount of data created
    and available at a given moment. Previously, getting insights from data and unlocking
    value had been down to traditional analysis on batch data workloads using statistical
    tools such as Excel, Minitab, or SPSS. But in the era of big data, this is changing,
    as more and more businesses and institutions want to understand the information
    in their data at a real-time or at worst near real-time pace.
  prefs: []
  type: TYPE_NORMAL
- en: Another vertical to the big data conundrum is that of variety. Formerly, a pre-defined
    structure had to be imposed on data in order to easily store them as well as make
    it easy for data analysis. However, a wide diversity of datasets are now collected
    and stored such as spatial maps, image data, video data, audio data, text data
    from emails and other documents, and sensor data. As a matter of fact, a far larger
    amount of datasets in the wild are unstructured. This led to the development of
    unstructured or semi-structured databases such as Elasticsearch, Solr, HBase,
    Cassandra, and MongoDB, to mention just a few.
  prefs: []
  type: TYPE_NORMAL
- en: The Data Science Opportunity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the new age, where data has inevitably and irreversibly become the new gold,
    the greatest needs of organizations are the skills required for data governance
    and analytics to unlock intelligence and value from data as well as the expertise
    to develop and productionize enterprise data products. This has led to new roles
    within the data science umbrella such as
  prefs: []
  type: TYPE_NORMAL
- en: Data analysts/scientist who specialize in mining intelligence from data using
    statistical techniques and computational tools by understanding the business use
    case
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data engineers/architects who specialize in architecting and managing the infrastructure
    for efficient big data pipelines by ensuring that the data platform is redundant,
    scalable, secure, and highly available
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine learning engineers who specialize in designing and developing machine
    learning algorithms as well as incorporating them into production systems for
    online or batch prediction services
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Data Science Process
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The data science process involves components for data ingestion and serving
    of data models. However, we will discuss briefly on the steps for carrying out
    data analytics in lieu of data prediction modeling.
  prefs: []
  type: TYPE_NORMAL
- en: These steps consist of
  prefs: []
  type: TYPE_NORMAL
- en: 'Data summaries: The vital statistical summaries of the datasets’ variables
    or features. This includes information such as the number of variables, their
    data types, the number of observations, and the count/percentage of missing data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Data visualization` : This involves employing univariate and multivariate
    data visualization methods to get a better intuition on the properties of the
    data variables and their relationship with each other. This includes metrics such
    as histograms, box and whisker plots, and correlation plots.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Data cleaning/preprocessing` `:` This process involves sanitizing the data
    to make it amenable for modeling. Data rarely comes clean with each row representing
    an observation and each column an entity. In this phase of a data science effort,
    the tasks involved may include removing duplicate entries, choosing a strategy
    for dealing with missing data, as well as converting data features into numeric
    data types of encoded categories. This phase may also involve carrying out statistical
    transformation on the data features to normalize and/or standardize the data elements.
    Data features of wildly differing scales can lead to poor model results as they
    become more difficult for the learning algorithm to converge to the global minimum.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Feature engineering:` This practice involves systematically pruning the data
    feature space to only select those features relevant to the modeling problem as
    part of the model task. Good feature engineering is often the difference between
    an average and high performant model.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`Data modeling and evaluation:` This phase involves passing the data through
    a learning algorithm to build a predictive model. This process is usually an iterative
    process that involves constant refinement in order to build a model that better
    minimizes the cost function on the hold-out validation set and the test set.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this chapter, we provided a brief overview to the concept of data science,
    the challenge of big data, and its goal to unlock value from data. The next chapter
    will provide an introduction to programming with Python.
  prefs: []
  type: TYPE_NORMAL
- en: 9. Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Python is one of the preferred languages for data science in the industry primarily
    because of its simple syntax and the number of reusable machine learning/deep
    learning packages. These packages make it easy to develop data science products
    without getting bogged down with the internals of a particular algorithm or method.
    They have been written, debugged, and tested by the best experts in the field,
    as well as by a large supporting community of developers that contribute their
    time and expertise to maintain and improve them.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we will go through the foundations of programming with Python
    3\. This section forms a framework for working with higher-level packages such
    as NumPy, Pandas, Matplotlib, TensorFlow, and Keras. The programming paradigm
    we will cover in this chapter can be easily adapted or applied to similar languages,
    such as R, which is also commonly used in the data science industry.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to work through this chapter and the successive chapters in this
    part is to work through the code by executing them on Google Colab or GCP Deep
    Learning VMs.
  prefs: []
  type: TYPE_NORMAL
- en: Data and Operations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Fundamentally, programming involves storing data and operating on that data
    to generate information. Techniques for efficient data storage are studied in
    the field called data structures, while the techniques for operating on data are
    studied as algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Data is stored in a memory block on the computer. Think of a memory block as
    a container holding data (Figure [9-1](#Fig1)). When data is operated upon, the
    newly processed data is also stored in memory. Data is operated by using arithmetic
    and boolean expressions and functions.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_9_Chapter/463852_1_En_9_Fig1_HTML.jpg](../images/463852_1_En_9_Chapter/463852_1_En_9_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-1
  prefs: []
  type: TYPE_NORMAL
- en: An illustration of a memory cell holding data
  prefs: []
  type: TYPE_NORMAL
- en: In programming, a memory location is called a variable. A **variable** is a
    container for storing the data that is assigned to it. A variable is usually given
    a unique name by the programmer to represent a particular memory cell. In python,
    variable names are programmer defined, but it must follow a valid naming condition
    of only alphanumeric lowercase characters with words separated by an underscore.
    Also, a variable name should have semantic meaning to the data that is stored
    in that variable. This helps to improve code readability later in the future.
  prefs: []
  type: TYPE_NORMAL
- en: The act of placing data to a variable is called **assignment**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Data Types
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Python has the number and string data types in addition to other supported specialized
    datatypes. The number datatype, for instance, can be an int or a float. Strings
    are surrounded by quotes in Python.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Other fundamental data types in Python include the lists, tuple, and dictionary.
    These data types hold a group of items together in sequence. Sequences in Python
    are indexed from 0.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tuples** are an immutable ordered sequence of items. Immutable means the
    data cannot be changed after being assigned. Tuple can contain elements of different
    types. Tuples are surrounded by brackets (…).'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Lists** are very similar to tuples, only that they are mutable. This means
    that list elements can be changed after being assigned. Lists are surrounded by
    square brackets […].'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Dictionaries contain a mapping from keys to values. A key/value pair is an item
    in a dictionary. The items in a dictionary are indexed by their keys. The keys
    in a dictionary can be any *hashable* datatype (hashing transforms a string of
    characters into a key to speed up search). Values can be of any datatype. In other
    languages, a dictionary is analogous to a hash table or a map. Dictionaries are
    surrounded by a pair of braces {…}. A dictionary is not ordered.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: More on Lists
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As earlier mentioned, because list items are mutable, they can be changed, deleted,
    and sliced to produce a new list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: When modifying a slice of elements in the list, the right-hand side can be of
    any length depending that the left-hand size is not a single index.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Some useful list methods include
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The append() method adds an item (could be a list, string, or number) to the
    end of a list. If the item is a list, the list as a whole is appended to the end
    of the current list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The extend() method extends the list by adding items from an iterable. An iterable
    in Python are objects that have special methods that enable you to access elements
    from that object sequentially. Lists and strings are iterable objects. So extend()
    appends all the elements of the iterable to the end of the list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We can combine a list **with another list** by overloading the operator +.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Strings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Strings in Python are enclosed by a pair of single quotes (‘ … ’). Strings are
    immutable. This means they cannot be altered when assigned or when a string variable
    is created. Strings can be indexed like a list as well as sliced to create new
    lists.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: We can operate on string values with the boolean operators.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: We can concatenate two strings to create a new string using the overloaded operator
    +.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Arithmetic and Boolean Operations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section introduces operators for programming arithmetic and logical constructs.
  prefs: []
  type: TYPE_NORMAL
- en: Arithmetic Operations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In Python, we can operate on data using familiar algebra operations such as
    addition +, subtraction -, multiplication `*`, division /, and exponentiation
    `**`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Boolean Operations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Boolean operations evaluate to True or False. Boolean operators include the
    comparison and logical operators. The comparison operators include less than or
    equal to <=, less than <, greater than or equal to >=, greater than >, not equal
    to !=, and equal to ==.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: The logical operators include Boolean NOT (not), Boolean AND (and), and Boolean
    OR (or). We can also carry out identity and membership tests using
  prefs: []
  type: TYPE_NORMAL
- en: is, is not (identity)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: in, not in (membership)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: The print() Statement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The print() statement is a simple way to show the output of data values to the
    console. Variables can be concatenated using the comma. Space is implicitly added
    after the comma.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Using the Formatter
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Formatters add a placeholder for inputting a data value into a string output
    using the curly brace {}. The format method from the str class is invoked to receive
    the value as a parameter. The number of parameters in the format method should
    match the number of placeholders in the string representation. Other format specifiers
    can be added with the placeholder curly brackets.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Control Structures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Programs need to make decisions which result in executing a particular set of
    instructions or a specific block of code repeatedly. With control structures,
    we would have the ability to write programs that can make logical decisions and
    execute an instruction set until a terminating condition occurs.
  prefs: []
  type: TYPE_NORMAL
- en: The if/elif (else-if) Statements
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The if/elif (else-if) statement executes a set of instructions if the tested
    condition evaluates to true. The else statement specifies the code that should
    execute if none of the previous conditions evaluate to true. It can be visualized
    by the flowchart in Figure [9-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
