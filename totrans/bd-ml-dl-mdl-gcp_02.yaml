  zh: '[PRE142]'
- en: Histogram/Density Plots
  id: totrans-529
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Histogram and density plots are essential for examining the statistical distribution
    of a variable. For a simple histogram, we’ll create a set of 100,000 points from
    the normal distribution. The outputs with matplotlib and seaborn are shown in
    Figure [12-5](#Fig5) and Figure [12-6](#Fig6), respectively.
  id: totrans-530
