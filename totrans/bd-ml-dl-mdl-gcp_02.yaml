  prefs: []
  type: TYPE_PRE
- en: 'Let’s see an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: This chapter provides the fundamentals for programming with Python. Programming
    is a very active endeavor, and competency is gained by experience and repetition.
    What is presented in this chapter provides just enough to be dangerous.
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapter, we’ll introduce NumPy, a Python package for numerical computing.
  prefs: []
  type: TYPE_NORMAL
- en: 10. NumPy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: NumPy is a Python library optimized for numerical computing. It bears close
    semblance with MATLAB and is equally as powerful when used in conjunction with
    other packages such as SciPy for various scientific functions, Matplotlib for
    visualization, and Pandas for data analysis. NumPy is short for numerical python.
  prefs: []
  type: TYPE_NORMAL
- en: NumPy’s core strength lies in its ability to create and manipulate n-dimensional
    arrays. This is particularly critical for building machine learning and deep learning
    models. Data is often represented in a matrix-like grid of rows and columns, where
    each row represents an observation and each column a variable or feature. Hence,
    NumPy’s 2-D array is a natural fit for storing and manipulating datasets.
  prefs: []
  type: TYPE_NORMAL
- en: This tutorial will cover the basics of NumPy to get you very comfortable working
    with the package and also get you to appreciate the thinking behind how NumPy
    works. This understanding forms a foundation from which one can extend and seek
    solutions from the NumPy reference documentation when a specific functionality
    is needed.
  prefs: []
  type: TYPE_NORMAL
- en: 'To begin using NumPy, we’ll start by importing the NumPy module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: NumPy 1-D Array
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s create a simple 1-D NumPy array:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE44]'
  prefs: []
  type: TYPE_PRE
- en: We can also create an array from a Python list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE45]'
  prefs: []
  type: TYPE_PRE
- en: Let’s explore other useful methods often employed for creating arrays.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE46]'
  prefs: []
  type: TYPE_PRE
- en: NumPy Datatypes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: NumPy boasts a broad range of numerical datatypes in comparison with vanilla
    Python. This extended datatype support is useful for dealing with different kinds
    of signed and unsigned integer and floating-point numbers as well as booleans
    and complex numbers for scientific computation. NumPy datatypes include the **bool_**,
    **int**(8,16,32,64), **uint**(8,16,32,64), **float**(16,32,64), **complex**(64,128)
    as well as the **int_**, **float_**, and **complex_**, to mention just a few.
  prefs: []
  type: TYPE_NORMAL
- en: The datatypes with a **_** appended are base Python datatypes converted to NumPy
    datatypes. The parameter **dtype** is used to assign a datatype to a NumPy function.
    The default NumPy type is **float_**. Also, NumPy infers contiguous arrays of
    the same type.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s explore a bit with NumPy datatypes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE47]'
  prefs: []
  type: TYPE_PRE
- en: Indexing + Fancy Indexing (1-D)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can index a single element of a NumPy 1-D array similar to how we index a
    Python list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE48]'
  prefs: []
  type: TYPE_PRE
- en: Fancy indexing in NumPy is an advanced mechanism for indexing array elements
    based on integers or boolean. This technique is also called *masking*.
  prefs: []
  type: TYPE_NORMAL
- en: Boolean Mask
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s index all the even integers in the array using a boolean mask.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE49]'
  prefs: []
  type: TYPE_PRE
- en: Observe that the code my_array % 2 == 0 outputs an array of booleans.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  prefs: []
  type: TYPE_PRE
- en: Integer Mask
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s select all elements with even indices in the array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  prefs: []
  type: TYPE_PRE
- en: Remember that array indices are indexed from 0\. So the second element, 18,
    is in index 1.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
  prefs: []
  type: TYPE_PRE
- en: Slicing a 1-D Array
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Slicing a NumPy array is also similar to slicing a Python list.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE53]'
  prefs: []
  type: TYPE_PRE
- en: 'Basic Math Operations on Arrays: Universal Functions'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The core power of NumPy is in its highly optimized vectorized functions for
    various mathematical, arithmetic, and string operations. In NumPy these functions
    are called universal functions. We’ll explore a couple of basic arithmetic with
    NumPy 1-D arrays.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE54]'
  prefs: []
  type: TYPE_PRE
- en: Higher-Dimensional Arrays
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we’ve seen earlier, the strength of NumPy is its ability to construct and
    manipulate n-dimensional arrays with highly optimized (i.e., vectorized) operations.
    Previously, we covered the creation of 1-D arrays (or vectors) in NumPy to get
    a feel of how NumPy works.
  prefs: []
  type: TYPE_NORMAL
- en: This section will now consider working with 2-D and 3-D arrays. 2-D arrays are
    ideal for storing data for analysis. Structured data is usually represented in
    a grid of rows and columns. And even when data is not necessarily represented
    in this format, it is often transformed into a tabular form before doing any data
    analytics or machine learning. Each column represents a feature or attribute and
    each row an observation.
  prefs: []
  type: TYPE_NORMAL
- en: Also, other data forms like images are adequately represented using 3-D arrays.
    A colored image is composed of *n* × *n* pixel intensity values with a color depth
    of three for the red, green, and blue (RGB) color profiles.
  prefs: []
  type: TYPE_NORMAL
- en: Creating 2-D Arrays (Matrices)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us construct a simple 2-D array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE55]'
  prefs: []
  type: TYPE_PRE
- en: Let’s explore common methods in practice for creating 2-D NumPy arrays, **which
    are also matrices**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE56]'
  prefs: []
  type: TYPE_PRE
- en: '`Creating 3-D Arrays`'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s construct a basic 3-D array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: 'We can also create 3-D arrays with methods such as **ones**, **zeros**, **full**,
    and **empty** by passing the configuration for [page, row, columns] into the **shape**
    parameter of the methods. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE58]'
  prefs: []
  type: TYPE_PRE
- en: Indexing/Slicing of Matrices
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s see some examples of indexing and slicing 2-D arrays. The concept extends
    nicely from doing the same with 1-D arrays.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE59]'
  prefs: []
  type: TYPE_PRE
- en: 'Matrix Operations: Linear Algebra'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Linear algebra is a convenient and powerful system for manipulating a set of
    data features and is one of the strong points of NumPy. Linear algebra is a crucial
    component of machine learning and deep learning research and implementation of
    learning algorithms. NumPy has vectorized routines for various matrix operations.
    Let’s go through a few of them.
  prefs: []
  type: TYPE_NORMAL
- en: Matrix Multiplication (Dot Product)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First let’s create random integers using the method **np.random.randint(low,
    high=None, size=None,)** which returns random integers from low (inclusive) to
    high (exclusive).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: We can use the following routines for matrix multiplication, **np.matmul(a,b)**
    or **a @ b** if using Python 3.6\. Using **a @ b** is preferred. Remember that
    when multiplying matrices, the inner matrix dimensions must agree. For example,
    if A is an *m* × *n* matrix and B is an *n* × *p* matrix, the product of the matrices
    will be an *m* × *p* matrix with the inner dimensions of the respective matrices
    *n* agreeing (see Figure [10-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig1_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: Matrix multiplication
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE61]'
  prefs: []
  type: TYPE_PRE
- en: '`Element-Wise Operations`'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Element-wise matrix operations involve matrices operating on themselves in an
    element-wise fashion. The action can be an addition, subtraction, division, or
    multiplication (which is commonly called the Hadamard product). The matrices must
    be of the same shape. **Please note** that while a matrix is of shape *n* × *n*,
    a vector is of shape *n* × 1\. These concepts easily apply to vectors as well.
    See Figure [10-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig2_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-2
  prefs: []
  type: TYPE_NORMAL
- en: Element-wise matrix operations
  prefs: []
  type: TYPE_NORMAL
- en: Let’s have some examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  prefs: []
  type: TYPE_PRE
- en: '`Scalar Operation`'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A matrix can be acted upon by a scalar (i.e., a single numeric entity) in the
    same way element-wise fashion. This time the scalar operates upon each element
    of the matrix or vector. See Figure [10-3](#Fig3).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig3_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-3
  prefs: []
  type: TYPE_NORMAL
- en: Scalar operations
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at some examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE63]'
  prefs: []
  type: TYPE_PRE
- en: Matrix Transposition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Transposition is a vital matrix operation that reverses the rows and columns
    of a matrix by flipping the row and column indices. The transpose of a matrix
    is denoted as *A*^(*T*). Observe that the diagonal elements remain unchanged.
    See Figure [10-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig4_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-4
  prefs: []
  type: TYPE_NORMAL
- en: Matrix transpose
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE64]'
  prefs: []
  type: TYPE_PRE
- en: '`The Inverse of a Matrix`'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A *m* × *m* matrix *A* (also called a square matrix) has an inverse if *A* times
    another matrix *B* results in the identity matrix *I* also of shape *m* × *m*.
    This matrix *B* is called the inverse of *A* and is denoted as *A*^(−1). This
    relationship is formally written as
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ A{A}^{-1}={A}^{-1}A=I $$](../images/463852_1_En_10_Chapter/463852_1_En_10_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: However, not all matrices have an inverse. A matrix with an inverse is called
    a *nonsingular* or *invertible* matrix, while those without an inverse are known
    as *singular* or *degenerate*.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A square matrix is a matrix that has the same number of rows and columns.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use NumPy to get the inverse of a matrix. Some linear algebra modules
    are found in a sub-module of NumPy called **linalg**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: NumPy also implements the *Moore-Penrose pseudo inverse*, which gives an inverse
    derivation for degenerate matrices. Here, we use the **pinv** method to find the
    inverses of invertible matrices.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE66]'
  prefs: []
  type: TYPE_PRE
- en: Reshaping
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A NumPy array can be restructured to take on a different shape. Let’s convert
    a 1-D array to a *m* × *n* matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE67]'
  prefs: []
  type: TYPE_PRE
- en: Reshape vs. Resize Method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: NumPy has the **np.reshape** and **np.resize** methods. The reshape method returns
    an ndarray with a modified shape without changing the original array, whereas
    the resize method changes the original array. Let’s see an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE68]'
  prefs: []
  type: TYPE_PRE
- en: Stacking Arrays
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: NumPy has methods for concatenating arrays – also called stacking. The methods
    hstack and vstack are used to stack several arrays along the horizontal and vertical
    axis, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE69]'
  prefs: []
  type: TYPE_PRE
- en: Let’s stack **A** and **B** horizontally using **hstack**. To use **hstack**,
    the arrays must have the same number of rows. Also, the arrays to be stacked are
    passed as a tuple to the **hstack** method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE70]'
  prefs: []
  type: TYPE_PRE
- en: To stack **A** and **B** vertically using **vstack**, the arrays must have the
    same number of columns. The arrays to be stacked are also passed as a tuple to
    the **vstack** method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE71]'
  prefs: []
  type: TYPE_PRE
- en: Broadcasting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: NumPy has an elegant mechanism for arithmetic operation on arrays with different
    dimensions or shapes. As an example, when a scalar is added to a vector (or 1-D
    array). The scalar value is conceptually broadcasted or stretched across the rows
    of the array and added element-wise. See Figure [10-5](#Fig5).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig5_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-5
  prefs: []
  type: TYPE_NORMAL
- en: Broadcasting example of adding a scalar to a vector (or 1-D array)
  prefs: []
  type: TYPE_NORMAL
- en: Matrices with different shapes can be broadcasted to perform arithmetic operations
    by stretching the dimension of the smaller array. Broadcasting is another vectorized
    operation for speeding up matrix processing. However, not all arrays with different
    shapes can be broadcasted. For broadcasting to occur, the trailing axes for the
    arrays must be the same size or 1.
  prefs: []
  type: TYPE_NORMAL
- en: In the example that follows, the matrices **A** and **B** have the same rows,
    but the column of matrix **B** is 1\. Hence, an arithmetic operation can be performed
    on them by broadcasting and adding the cells element-wise.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE72]'
  prefs: []
  type: TYPE_PRE
- en: See Figure [10-6](#Fig6) for more illustration.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_10_Chapter/463852_1_En_10_Fig6_HTML.jpg](../images/463852_1_En_10_Chapter/463852_1_En_10_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-6
  prefs: []
  type: TYPE_NORMAL
- en: Matrix broadcasting example
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see this in code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE73]'
  prefs: []
  type: TYPE_PRE
- en: 'The example that follows cannot be broadcasted and will result in a *ValueError:
    operands could not be broadcasted together with shapes (4,3) (4,2)* because the
    matrices **A** and **B** have different columns and do not fit with the aforementioned
    rules of broadcasting that the trailing axes for the arrays must be the same size
    or 1.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE74]'
  prefs: []
  type: TYPE_PRE
- en: When we try to add the preceding example in Python, we get an error.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE75]'
  prefs: []
  type: TYPE_PRE
- en: Loading Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Loading data is an important process in the data analysis/machine learning pipeline.
    Data usually comes in **.csv** format. **csv** files can be loaded into Python
    by using the **loadtxt** method. The parameter **skiprows** skips the first row
    of the dataset – it is usually the header row of the data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE76]'
  prefs: []
  type: TYPE_PRE
- en: Pandas is a preferred package for loading data in Python.
  prefs: []
  type: TYPE_NORMAL
- en: We will learn more about Pandas for data manipulation in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: 11. Pandas
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Pandas is a specialized Python library for data analysis, especially on humongous
    datasets. It boasts easy-to-use functionality for reading and writing data, dealing
    with missing data, reshaping the dataset, and massaging the data by slicing, indexing,
    inserting, and deleting data variables and records. Pandas also has an important
    **groupBy** functionality for aggregating data for defined conditions – useful
    for plotting and computing data summaries for exploration.
  prefs: []
  type: TYPE_NORMAL
- en: Another key strength of Pandas is in re-ordering and cleaning time series data
    for time series analysis. In short, Pandas is the go-to tool for data cleaning
    and data exploration.
  prefs: []
  type: TYPE_NORMAL
- en: 'To use Pandas, first import the Pandas module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE77]'
  prefs: []
  type: TYPE_PRE
- en: Pandas Data Structures
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Just like NumPy, Pandas can store and manipulate a multi-dimensional array of
    data. To handle this, Pandas has the **Series** and **DataFrame** data structures.
  prefs: []
  type: TYPE_NORMAL
- en: Series
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **Series** data structure is for storing a 1-D array (or vector) of data
    elements. A series data structure also provides labels to the data items in the
    form of an **index**. The user can specify this label via the **index** parameter
    in the **Series** function, but if the **index** parameter is left unspecified,
    a default label of 0 to one minus the size of the data elements is assigned.
  prefs: []
  type: TYPE_NORMAL
- en: Let us consider an example of creating a **Series** data structure.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE78]'
  prefs: []
  type: TYPE_PRE
- en: Elements in a Series data structure can be assigned the same indices.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE79]'
  prefs: []
  type: TYPE_PRE
- en: DataFrames
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A DataFrame is a Pandas data structure for storing and manipulating 2-D arrays.
    A 2-D array is a table-like structure that is similar to an Excel spreadsheet
    or a relational database table. A DataFrame is a very natural form for storing
    structured datasets.
  prefs: []
  type: TYPE_NORMAL
- en: A DataFrame consists of rows and columns for storing records of information
    (in rows) across heterogeneous variables (in columns).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see examples of working with DataFrames.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE80]'
  prefs: []
  type: TYPE_PRE
- en: We will observe from the preceding example that a DataFrame is constructed from
    a dictionary of records where each value is a **Series** data structure. Also
    note that each row has an **index** that can be assigned when creating the DataFrame,
    else the default from 0 to one off the number of records in the DataFrame is used.
    Creating an index manually is usually not feasible except when working with small
    dummy datasets.
  prefs: []
  type: TYPE_NORMAL
- en: NumPy is frequently used together with Pandas. Let’s import the NumPy library
    and use some of its functions to demonstrate other ways of creating a quick DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE81]'
  prefs: []
  type: TYPE_PRE
- en: Let’s examine some other operations with DataFrames.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE82]'
  prefs: []
  type: TYPE_PRE
- en: In summary, a DataFrame is a tabular structure for storing a structured dataset
    where each column contains a **Series** data structure of records. Here’s an illustration
    (Figure [11-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_11_Chapter/463852_1_En_11_Fig1_HTML.jpg](../images/463852_1_En_11_Chapter/463852_1_En_11_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-1
  prefs: []
  type: TYPE_NORMAL
- en: Pandas data structure
  prefs: []
  type: TYPE_NORMAL
- en: Let’s check the data type of each column in the DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE83]'
  prefs: []
  type: TYPE_PRE
- en: An **object** data type in Pandas represents **Strings**.
  prefs: []
  type: TYPE_NORMAL
- en: Data Indexing (Selection/Subsets)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Similar to NumPy, Pandas objects can index or subset the dataset to retrieve
    a specific sub-record of the larger dataset. Note that data indexing returns a
    new **DataFrame** or **Series** if a 2-D or 1-D array is retrieved. They do not,
    however, alter the original dataset. Let’s go through some examples of indexing
    a Pandas DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: First let’s create a dataframe. Observe the default integer indices assigned.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE84]'
  prefs: []
  type: TYPE_PRE
- en: Selecting a Column from a DataFrame
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Remember that the data type of a DataFrame column is a **Series** because it
    is a vector or 1-D array.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE85]'
  prefs: []
  type: TYPE_PRE
- en: 'To select multiple columns, enclose the column names as **strings** with the
    double square brackets **[[ ]]**. The following code is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE86]'
  prefs: []
  type: TYPE_PRE
- en: Selecting a Row from a DataFrame
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pandas makes use of two unique wrapper attributes for indexing rows from a **DataFrame**
    or a cell from a **Series** data structure. These attributes are the **iloc**
    and **loc** – they are also known as indexers. The **iloc** attribute allows you
    to select or slice row(s) of a DataFrame using the intrinsic Python index format,
    whereas the **loc** attribute uses the explicit indices assigned to the DataFrame.
    If no explicit index is found, **loc** returns the same value as **iloc**.
  prefs: []
  type: TYPE_NORMAL
- en: Remember that the data type of a DataFrame row is a **Series** because it is
    a vector or 1-D array.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s select the first row from the DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE87]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s create a DataFrame with explicit indexing and test out the **iloc**
    and **loc** methods. Pandas will return an error if **iloc** is used for explicit
    indexing or if **loc** is used for implicit Python indexing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE88]'
  prefs: []
  type: TYPE_PRE
- en: Selecting Multiple Rows and Columns from a DataFrame
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s use the **loc** method to select multiple rows and columns from a Pandas
    DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE89]'
  prefs: []
  type: TYPE_PRE
- en: Slice Cells by Row and Column from a DataFrame
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First let’s create a DataFrame. Remember, we use **iloc** when no explicit index
    or row labels are assigned.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE90]'
  prefs: []
  type: TYPE_PRE
- en: DataFrame Manipulation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s go through some common tasks for manipulating a DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: Removing a Row/Column
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In many cases during the data cleaning process, there may be a need to drop
    unwanted rows or data variables (i.e., columns). We typically do this using the
    **drop** function. The **drop** function has a parameter **axis** whose default
    is 0\. If **axis** is set to 1, it drops columns in a dataset, but if left at
    the default, rows are dropped from the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Note that when a column or row is dropped, a new **DataFrame** or **Series**
    is returned without altering the original data structure. However, when the attribute
    **inplace** is set to **True**, the original DataFrame or Series is modified.
    Let’s see some examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE91]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see examples of removing a row given a condition.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE92]'
  prefs: []
  type: TYPE_PRE
- en: Adding a Row/Column
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can add a new column to a Pandas DataFrame by using the **assign** method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE93]'
  prefs: []
  type: TYPE_PRE
- en: We can also add a new DataFrame column by computing some function on another
    column. Let’s take an example by adding a column computing the absolute difference
    of the ages from their mean.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE94]'
  prefs: []
  type: TYPE_PRE
- en: Typically in practice, a fully formed dataset is converted into Pandas for cleaning
    and data analysis, which does not ideally involve adding a new observation to
    the dataset. But in the event that this is desired, we can use the **append()**
    method to achieve this. However, it may not be a computationally efficient action.
    Let’s see an example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE95]'
  prefs: []
  type: TYPE_PRE
- en: We observe that adding a new row involves passing to the **append** method,
    a **Series** object with the **index** attribute set to the columns of the main
    DataFrame. Since typically, in given datasets, the index is nothing more than
    the assigned defaults, we set the attribute **ignore_index** to create a new set
    of default index values with the new row(s).
  prefs: []
  type: TYPE_NORMAL
- en: Data Alignment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pandas utilizes data alignment to align indices when performing some binary
    arithmetic operation on DataFrames. If two or more DataFrames in an arithmetic
    operation do not share a common index, a **NaN** is introduced denoting missing
    data. Let’s see examples of this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE96]'
  prefs: []
  type: TYPE_PRE
- en: 'If we do not want a **NaN** signifying missing values to be imputed, we can
    use the **fill_value** attribute to substitute with a default value. However,
    to take advantage of the **fill_value** attribute, we have to use the Pandas arithmetic
    methods: **add(), sub(), mul(), div(), floordiv(), mod()**, and **pow()** for
    addition, subtraction, multiplication, integer division, numeric division, remainder
    division, and exponentiation. Let’s see examples.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE97]'
  prefs: []
  type: TYPE_PRE
- en: Combining Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We may need to combine two or more datasets together; Pandas provides methods
    for such operations. We would consider the simple case of combining data frames
    with shared column names using the **concat** method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE98]'
  prefs: []
  type: TYPE_PRE
- en: Observe that the **concat** method preserves indices by default. We can also
    concatenate or combine two dataframes by rows (or horizontally). This is done
    by setting the **axis** parameter to 1.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE99]'
  prefs: []
  type: TYPE_PRE
- en: Handling Missing Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Dealing with missing data is an integral part of the data cleaning/data analysis
    process. Moreover, some machine learning algorithms will not work in the presence
    of missing data. Let’s see some simple Pandas methods for identifying and removing
    missing data, as well as imputing values into missing data.
  prefs: []
  type: TYPE_NORMAL
- en: Identifying Missing Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we’ll use the **isnull()** method to check if missing cells
    exist in a DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE100]'
  prefs: []
  type: TYPE_PRE
- en: Let’s check for missing data in this data frame. The **isnull()** method will
    return **True** where there is a missing data, whereas the **notnull()** function
    returns **False**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE101]'
  prefs: []
  type: TYPE_PRE
- en: However, if we want a single answer (i.e., either **True** or **False**) to
    report if there is a missing data in the data frame, we will first convert the
    DataFrame to a NumPy array and use the function **any()**.
  prefs: []
  type: TYPE_NORMAL
- en: The **any** function returns **True** when at least one of the elements in the
    dataset is **True**. In this case, **isnull()** returns a DataFrame of booleans
    where **True** designates a cell with a missing value.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how that works.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE102]'
  prefs: []
  type: TYPE_PRE
- en: Removing Missing Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pandas has a function **dropna()** which is used to filter or remove missing
    data from a DataFrame. **dropna()** returns a new DataFrame without missing data.
    Let’s see examples of how this works.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE103]'
  prefs: []
  type: TYPE_PRE
- en: As we will observe from the preceding code block, **dropna()** drops all rows
    that contain a missing value. But we may not want that. We may rather, for example,
    want to drop columns with missing data or drop rows where all the observations
    are missing or better still remove consequent on the number of observations present
    in a particular row.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see examples of this option. First let’s expand our example dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE104]'
  prefs: []
  type: TYPE_PRE
- en: Drop columns with **NaN**. This option is not often used in practice.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE105]'
  prefs: []
  type: TYPE_PRE
- en: Drop rows where all the observations are missing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE106]'
  prefs: []
  type: TYPE_PRE
- en: Drop rows based on an observation threshold. By adjusting the **thresh** attribute,
    we can drop rows where the number of observations in the row is less than the
    **thresh** value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE107]'
  prefs: []
  type: TYPE_PRE
- en: Imputing Values into Missing Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Imputing values as substitutes for missing data is a standard practice in preparing
    data for machine learning. Pandas has a **fillna()** function for this purpose.
    A simple approach is to fill **NaNs** with zeros.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE108]'
  prefs: []
  type: TYPE_PRE
- en: Another tactic is to fill missing values with the mean of the column value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE109]'
  prefs: []
  type: TYPE_PRE
- en: Data Aggregation (Grouping)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will touch briefly on a common practice in data science, and that is grouping
    a set of data attributes, either for retrieving some group statistics or applying
    a particular set of functions to the group. Grouping is commonly used for data
    exploration and plotting graphs to understand more about the dataset. Missing
    data are automatically excluded in a grouping operation.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see examples of how this works.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE110]'
  prefs: []
  type: TYPE_PRE
- en: Let’s find the mean age and salary for observations in our dataset grouped by
    **Sex**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE111]'
  prefs: []
  type: TYPE_PRE
- en: We can group by more than one variable. In this case for each Sex group, also
    group the age and find the mean of the other numeric variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE112]'
  prefs: []
  type: TYPE_PRE
- en: Also, we can use a variable as a group key to run a group function on another
    variable or sets of variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE113]'
  prefs: []
  type: TYPE_PRE
- en: Statistical Summaries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Descriptive statistics is an essential component of the data science pipeline.
    By investigating the properties of the dataset, we can gain a better understanding
    of the data and the relationship between the variables. This information is useful
    in making decisions about the type of data transformations to carry out or the
    types of learning algorithms to spot check. Let’s see some examples of simple
    statistical functions in Pandas.
  prefs: []
  type: TYPE_NORMAL
- en: First, we’ll create a Pandas dataframe.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE114]'
  prefs: []
  type: TYPE_PRE
- en: Use the **describe** function to obtain summary statistics of a dataset. Eight
    statistical measures are displayed. They are count, mean, standard deviation,
    minimum value, 25th percentile, 50th percentile or median, 75th percentile, and
    the maximum value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE115]'
  prefs: []
  type: TYPE_PRE
- en: Correlation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Correlation shows how much relationship exists between two variables. Parametric
    machine learning methods such as logistic and linear regression can take a performance
    hit when variables are highly correlated. The correlation values range from –1
    to 1, with 0 indicating no correlation at all. –1 signifies that the variables
    are strongly negatively correlated, while 1 shows that the variables are strongly
    positively correlated. In practice, it is safe to eliminate variables that have
    a correlation value greater than –0.7 or 0.7\. A common correlation estimate in
    use is the Pearson’s correlation coefficient.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE116]'
  prefs: []
  type: TYPE_PRE
- en: Skewness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another important statistical metric is the skewness of the dataset. Skewness
    is when a bell-shaped or normal distribution is shifted toward the right or the
    left. Pandas offers a convenient function called **skew()** to check the skewness
    of each variable. Values close to 0 are more normally distributed with less skew.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE117]'
  prefs: []
  type: TYPE_PRE
- en: Importing Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Again, getting data into the programming environment for analysis is a fundamental
    and first step for any data analytics or machine learning task. In practice, data
    usually comes in a comma-separated value, **csv,** format.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE118]'
  prefs: []
  type: TYPE_PRE
- en: To export a DataFrame back to **csv**
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE119]'
  prefs: []
  type: TYPE_PRE
- en: For the next example, the dataset ‘states.csv’ is found in the chapter folder
    of the code repository of this book.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE120]'
  prefs: []
  type: TYPE_PRE
- en: Timeseries with Pandas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the core strengths of Pandas is its powerful set of functions for manipulating
    timeseries datasets. A couple of these functions are covered in this material.
  prefs: []
  type: TYPE_NORMAL
- en: Importing a Dataset with a DateTime Column
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When importing a dataset that has a column containing datetime entries, Pandas
    has an attribute in the **read_csv** method called **parse_dates** that converts
    the datetime column from strings into Pandas **date** datatype. The attribute
    **index_col** uses the column of datetimes as an index to the DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: The method **head()** prints out the first five rows of the DataFrame, while
    the method **tail()** prints out the last five rows of the DataFrame. This function
    is very useful for taking a peek at a large DataFrame without having to bear the
    computational cost of printing it out entirely.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE121]'
  prefs: []
  type: TYPE_PRE
- en: Let’s examine the index of the imported data. Notice that they are the datetime
    entries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE122]'
  prefs: []
  type: TYPE_PRE
- en: Selection Using DatetimeIndex
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **DatetimeIndex** can be used to select the observations of the dataset
    in various interesting ways. For example, we can select the observation of an
    exact day or the observations belonging to a particular month or year. The selected
    observation can be subsetted by columns and grouped to give more insight in understanding
    the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see some examples.
  prefs: []
  type: TYPE_NORMAL
- en: Select a Particular Date
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s select a particular date from a DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE123]'
  prefs: []
  type: TYPE_PRE
- en: Select a Month
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s select a particular month from a DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE124]'
  prefs: []
  type: TYPE_PRE
- en: Select a Year
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s select a particular year from a DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE125]'
  prefs: []
  type: TYPE_PRE
- en: Subset Data Columns and Find Summaries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Get the closing prices of Bitcoin stocks for the month of January.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE126]'
  prefs: []
  type: TYPE_PRE
- en: Find the mean market value of Ethereum for the month of January.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE127]'
  prefs: []
  type: TYPE_PRE
- en: Resampling Datetime Objects
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A Pandas DataFrame with an index of **DatetimeIndex**, **PeriodIndex**, or **TimedeltaIndex**
    can be resampled to any of the date time frequencies from seconds, to minutes,
    to months. Let’s see some examples.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get the average monthly closing values for Litecoin.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE128]'
  prefs: []
  type: TYPE_PRE
- en: Get the average weekly market value of Bitcoin Cash.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE129]'
  prefs: []
  type: TYPE_PRE
- en: Convert to Datetime Datatype Using ‘to_datetime’
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Pandas uses the **to_datetime** method to convert strings to Pandas datetime
    datatype. The **to_datetime** method is smart enough to infer a **datetime** representation
    from a string of dates passed with different formats. The default output format
    of **to_datetime** is in the following order: **year, month, day, minute, second,
    millisecond, microsecond, nanosecond**.'
  prefs: []
  type: TYPE_NORMAL
- en: The input to **to_datetime** is recognized as **month, day, year**. Although,
    it can easily be modified by setting the attributes **dayfirst** or **yearfirst**
    to **True**.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if **dayfirst** is set to **True**, the input is recognized as
    **day, month, year**.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE130]'
  prefs: []
  type: TYPE_PRE
- en: Let’s set dayfirst to True. Observe that the first input in the string is treated
    as a day in the output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE131]'
  prefs: []
  type: TYPE_PRE
- en: The shift() Method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A typical step in a timeseries use case is to convert the timeseries dataset
    into a supervised learning framework for predicting the outcome for a given time
    instant. The **shift()** method is used to adjust a Pandas DataFrame column by
    shifting the observations forward or backward. If the observations are pulled
    backward (or lagged), **NaNs** are attached at the tail of the column. But if
    the values are pushed forward, the head of the column will contain **NaNs**. This
    step is important for adjusting the **target** variable of a dataset to predict
    outcomes *n*-days or steps or instances into the future. Let’s see some examples.
  prefs: []
  type: TYPE_NORMAL
- en: Subset columns for the observations related to Bitcoin Cash.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE132]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s create a target variable that contains the closing rates 3 days into
    the future.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE133]'
  prefs: []
  type: TYPE_PRE
- en: Observe that the tail of the column **close_4_head** contains **NaNs**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE134]'
  prefs: []
  type: TYPE_PRE
- en: Rolling Windows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pandas provides a function called **rolling()** to find the rolling or moving
    statistics of values in a column over a specified window. The window is the “number
    of observations used in calculating the statistic.” So we can find the rolling
    sums or rolling means of a variable. These statistics are vital when working with
    timeseries datasets. Let’s see some examples.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s find the rolling means for the closing variable over a 30-day window.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE135]'
  prefs: []
  type: TYPE_PRE
- en: The first few values of the **rolling_means** variable contain **NaNs** because
    the method computes the rolling statistic from the earliest time to the latest
    time in the dataset. Let’s print out the first five values using the **head**
    method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE136]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s observe the last five values using the **tail** method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE137]'
  prefs: []
  type: TYPE_PRE
- en: Let’s do a quick plot of the rolling means using the Pandas plotting function.
    The output of the plot is shown in Figure [11-2](#Fig2).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_11_Chapter/463852_1_En_11_Fig2_HTML.jpg](../images/463852_1_En_11_Chapter/463852_1_En_11_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11-2
  prefs: []
  type: TYPE_NORMAL
