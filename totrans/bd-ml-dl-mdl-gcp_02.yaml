- en: To loop for a specific number of time, use the range() function.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 要循环特定次数，请使用range()函数。
- en: '[PRE24]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: List Comprehensions
  id: totrans-113
  prefs:
