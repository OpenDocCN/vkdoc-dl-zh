- en: '[PRE142]'
  prefs: []
  type: TYPE_PRE
- en: Histogram/Density Plots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Histogram and density plots are essential for examining the statistical distribution
    of a variable. For a simple histogram, we’ll create a set of 100,000 points from
    the normal distribution. The outputs with matplotlib and seaborn are shown in
    Figure [12-5](#Fig5) and Figure [12-6](#Fig6), respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig6_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-6
  prefs: []
  type: TYPE_NORMAL
- en: Histogram with seaborn
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig5_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12-5
  prefs: []
  type: TYPE_NORMAL
- en: Histogram with Matplotlib
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE143]'
  prefs: []
  type: TYPE_PRE
- en: Box and Whisker Plots
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Boxplot , also popularly called box and whisker plot, is another useful visualization
    technique for gaining insights into the underlying data distribution. The boxplot
    draws a box with the upper line representing the 75th percentile and the lower
    line the 25th percentile. A line is drawn at the center of the box indicating
    the 50th percentile or median value. The whiskers at both ends give an estimation
    of the spread or variance of the data values. The dots at the tail end of the
    whiskers represent possible outlier values. The outputs with matplotlib and seaborn
    are shown in Figure [12-7](#Fig7) and Figure [12-8](#Fig8), respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/463852_1_En_12_Chapter/463852_1_En_12_Fig8_HTML.jpg](../images/463852_1_En_12_Chapter/463852_1_En_12_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
