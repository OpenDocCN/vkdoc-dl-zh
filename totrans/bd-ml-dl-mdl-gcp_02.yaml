  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: The break and continue Statements
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: break和continue语句
- en: The break statement terminates the execution of the nearest enclosing loop (for,
    while loops) in which it appears.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: break语句终止它出现的最近封装循环（for、while循环）的执行。
- en: '[PRE31]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The continue statement skips the next iteration of the loop to which it belongs,
    ignoring any code after it.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: continue语句跳过它所属的循环的下一个迭代，忽略其后的任何代码。
- en: '[PRE32]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Functions
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 函数
- en: A function is a code block that carries out a particular action (Figure [9-5](#Fig5)).
    Functions are called by the programmer when needed by making a **function call**.
    Python comes pre-packaged with lots of useful functions to simplify programming.
    The programmer can also write custom functions.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 函数是一个执行特定操作的代码块（见图[9-5](#Fig5)）。当程序员需要时，通过进行**函数调用**来调用函数。Python预装了大量的有用函数，以简化编程。程序员也可以编写自定义函数。
- en: '![../images/463852_1_En_9_Chapter/463852_1_En_9_Fig5_HTML.jpg](../images/463852_1_En_9_Chapter/463852_1_En_9_Fig5_HTML.jpg)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![../images/463852_1_En_9_Chapter/463852_1_En_9_Fig5_HTML.jpg](../images/463852_1_En_9_Chapter/463852_1_En_9_Fig5_HTML.jpg)'
- en: Figure 9-5
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-5
- en: Functions
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 函数
- en: A function receives data into its parameter list during a function call. The
    inputed data is used to complete the function execution. At the end of its execution,
    a function always returns a result – this result could be ‘None’ or a specific
    data value.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 函数在函数调用期间接收数据到其参数列表。输入的数据用于完成函数执行。在其执行结束时，函数总是返回一个结果——这个结果可以是‘None’或特定的数据值。
- en: Functions are treated as first-class objects in Python. That means a function
    can be passed as data into another function, the result of a function execution
    can also be a function, and a function can also be stored as a variable.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中，函数被视为一等对象。这意味着一个函数可以作为数据传递给另一个函数，函数执行的输出也可以是一个函数，函数还可以作为变量存储。
- en: Functions are visualized as a black box that receives a set of objects as input,
    executes some code, and returns another set of objects as output.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 函数被可视化为一个黑盒，它接收一组对象作为输入，执行一些代码，并返回另一组对象作为输出。
- en: User-Defined Functions
  id: totrans-139
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 用户自定义函数
