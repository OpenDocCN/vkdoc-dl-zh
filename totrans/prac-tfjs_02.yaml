- en: Structuring the HTML, importing the packages, and loading the script
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this first part of the tutorial, you will load both the TensorFlow.js and
    tfjs-vis packages via a CDN, define the structure and elements of the app using
    several HTML tags, and load the script that trains the model. But before doing
    all of that, please open your editor, create a new file, and name it *index.html*.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the top of the file, create an `<html>` tag and the closing counterpart
    `</html>`. This essential tag is the element that represents the root of an HTML
    file. Next, within the tags, create a `<head>` tag—an element used to define metadata,
    styles, and scripts, among others—and close it. Then, inside the `<head>` tags,
    add the following lines to import TensorFlow.js and tfjs-vis:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, right after the `</head>` line, create a `<body>` tag (within the `<html>`
    tags), which, as the name points out, defines the document’s body and contains
    all its content.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first element you will add in the body is a `<div>` tag, that is, a container
    or a division in an HTML document that encapsulates other elements. Inside this
    `<div>` tag, you will later add, programmatically using JS, the button that builds
    and displays the dataset’s visualization. Therefore, set its `id` to `visualize`,
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the following line, add an `<input>` field of type “number,” a blank space
    where the user can enter a number, hence the name input. In this field, the user
    will specify the number of training epochs, so use the id and name “number-epochs.”
    Moreover, to make it more interesting, add a `min` attribute of value “1,” a `max`
    attribute of value “20,” and a default `value` set to “5.” It should look like
    this:'
  prefs: []
  type: TYPE_NORMAL
