- en: 2. Training our first models
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In Chapter [1](494424_1_En_1_Chapter.xhtml), we introduced the TensorFlow.js
    ecosystem. There, we discussed its history, features, and details, such as tensors,
    operations, and layers. In this second chapter, we will apply several of the concepts
    introduced to build our first machine learning models.
  prefs: []
  type: TYPE_NORMAL
- en: The models we will create here belong to the category of **supervised learning**.
    This is the ML task of learning from a labeled training set, a function that maps
    a set of inputs, known as **features**, to a **label** (also named class). In
    this chapter, we will explore this type of learning and how it works by building
    a **logistic regression** and **linear regression** model using TensorFlow.js'
    Layers API.
  prefs: []
  type: TYPE_NORMAL
- en: The first of these models, logistic regression, is a classic supervised learning
    model that classifies an instance into one of two classes. Then, we will see linear
    regression, an algorithm used to predict a numeric value. In Chapter [3](494424_1_En_3_Chapter.xhtml),
    we will put supervised learning aside and focus on unsupervised learning, a type
    of machine learning that requires no labels.
  prefs: []
  type: TYPE_NORMAL
- en: Before heading straight to the algorithms, let’s dedicate the first portion
    of the chapter to discuss how we will approach the machine learning projects you
    will build here (and in the rest of the book).
  prefs: []
  type: TYPE_NORMAL
- en: Approaching a machine learning problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The starting point of every machine learning problem is precisely that: *the
    problem*, the thing we need to solve. This problem should not be building a machine
    learning model. Building a model is the solution or the approach we take to solve
    the problem. Instead, this problem should be a precise statement or question that,
    at the same time, could be translated into the objective we wish our model to
    learn.'
  prefs: []
  type: TYPE_NORMAL
- en: Knowing what we want to solve is essential. Once we define the problem, we will
    be better positioned to select an adequate **model** (and thus, the learning paradigm)
    and other things that come with developing an ML system, for instance, the **training
    framework** , **performance metric** , and **deployment platform** . But, before
    that, there is one crucial detail we need to address, and that is the **data**—the
    fuel of machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: The data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In machine learning, data is the essence. It is the information and knowledge
    that models use to learn. Without it, machine learning wouldn’t exist. Oxford
    defines data as “facts and statistics collected together for reference or analysis.”^([1](#Fn1))
    I want to emphasize the word “analysis.” In layman’s terms, we could say that
    when a machine learning model is learning, it is analyzing the data until it is
    capable of extrapolating from it.
  prefs: []
  type: TYPE_NORMAL
- en: But, when we do machine learning, computers aren’t the only ones that should
    analyze this data and learn from it. We, the humans responsible for the ML system,
    should analyze it too before feeding it to the model because of two main reasons.
  prefs: []
  type: TYPE_NORMAL
- en: The first of these is to assure the quality of the data. Bad and unclean data
    exists. In fact, I’m willing to say that most datasets are very far from being
    perfect. Therefore, we should dedicate a part of our development process to explore
    this data, pre-process it, and make sure it is suitable for our problem. After
    all, like we like to say in this field, “garbage in, garbage out,” meaning that
    if the training data is poor, so is the model’s predictive power.
  prefs: []
  type: TYPE_NORMAL
- en: The task of exploring a dataset is nonsurprisingly known as **exploratory data
    analysis** , and it involves summarizing, visualizing, and processing the data
    to learn more about it. While doing so, we may perform tasks such as *feature
    normalizing*, which is converting the numerical values to a common scale or checking
    for rows with empty values. Most of the datasets we will see in this book are
    already prepared and do not need any further modification. Still, it is always
    good to keep this in mind.
  prefs: []
  type: TYPE_NORMAL
- en: The second reason why it is essential to understand the data is that no model
    is compatible with every piece of data. Data comes in different sizes and shapes
    and has specific attributes, and unfortunately, there is no universal model that
    fits all. Of all the possible characteristics a dataset can have, the ones we
    will consider are the **type** of data and the **target variable**.
  prefs: []
  type: TYPE_NORMAL
- en: Some of the most used and popular types of data are **tabular**, **imagery**,
    and **text** data. A tabular dataset is the classic matrix. Its data is structured
    into rows and columns, where each row represents one particular instance or data
    observation, and the columns represent the properties or features—we typically
    find them in a *CSV* file. Then, there’s imagery data, a format that is highly
    popular in deep learning. As we saw in Chapter [1](494424_1_En_1_Chapter.xhtml),
    when we discussed tensors, images and videos are an extension of a tabular dataset.
    For example, a picture, at least a grayscale one, is a matrix where each data
    point is the intensity of a pixel. Last, there is also text data. This kind of
    data has no particular format. For instance, you can find text data in a tabular
    dataset, for example, a CSV file where each row is a sentence or in a corpus (large
    body of text). Text data is mostly used in natural language processing applications
    (NLP).
  prefs: []
  type: TYPE_NORMAL
- en: 'Then there are the target variables and its two kinds: **discrete** and **continuous**.
    A discrete variable is a variable that takes a specific value from a set of possible
    values. For instance, in a model whose goal is predicting whether this image is
    of a cat or a dog, the target variable is discrete because the only possible values
    are “cat” or “dog.”'
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, we have the continuous variables, which can take as a value
    any number between a minimum and a maximum value. Its target variable (what we
    want to predict) could be, for example, the distance I would walk in one day.
    In a case like this, the range of this variable goes from 0 km all the way to
    infinite (I better get some good shoes!).
  prefs: []
  type: TYPE_NORMAL
- en: The model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There is not a perfect machine learning model. While impressive, all of them
    have their advantages and disadvantages. Some do better on dataset *A* and not
    on *B*, while others perform great on *B* and not *A*—a concept known as *the
    no free lunch* theorem. So, choosing an appropriate one is not a trivial task.
    As mentioned in the previous point, the model is closely related to the kind of
    data we have at hand. For instance, images, due to their visual nature and large
    size, require a type of layer capable of extracting their features. So, for this
    case, a *convolutional neural network* (CNN) is a good choice. But for text data,
    CNN is not optimal. Instead, you could consider using *recurrent neural networks*
    (RNNs). Other cases include using *linear regression* if the goal is predicting
    a continuous value or logistic regression for discrete classification.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting the model also depends on whether or not the dataset has labels. For
    example, in cases where the data is labeled, then the answer is a supervised learning
    model. Otherwise, unsupervised learning might be more appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the models we will apply in this book belong to the **connectionism**
    field (Domingos, 2015), the one that involves artificial neural networks. Some
    will be deep networks, others shallow, and a few might not have the term “network”
    on their name, but they are still networks. Also, we will mostly focus on supervised
    learning problems.
  prefs: []
  type: TYPE_NORMAL
- en: The training framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After getting the correct data and choosing the model, the following step is
    selecting the framework or library for training the model. In most cases, this
    is a personal choice or one based on the technology stack where we have to deploy
    the system. Some of the most popular ones are **TensorFlow** (Python), **PyTorch**
    (Python), **scikit-learn** (Python, see the trend?), and of course, **TensorFlow.js**
    (JavaScript).
  prefs: []
  type: TYPE_NORMAL
- en: Defining the model’s architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In most libraries that do what some call “traditional machine learning”—ML that
    is not deep learning—training a model is a matter of creating an instance of the
    algorithm and using `model.fit()` to train it. In TensorFlow.js, this approach
    is not possible. As we saw in Chapter [1](494424_1_En_1_Chapter.xhtml), defining
    a model in TensorFlow.js involves creating it layer by layer using the Layers
    API. For our exercises, we will use a mix of models we will design and train,
    pre-trained models, and ml5.js models.
  prefs: []
  type: TYPE_NORMAL
- en: The performance metric, loss function, and optimizer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another part of the training we need to configure is the *performance metric*
    , a single number score that evaluates the correctness of the model. Once again,
    there is no perfect performance metric, and like the previous cases, it also depends
    on the data and the problem we are trying to solve.
  prefs: []
  type: TYPE_NORMAL
- en: Of all the performance metrics out there, the **accuracy** score is the most
    common one. This score measures the fraction or ratio of predictions the model
    correctly guessed. For example, suppose we have trained a model that predicts
    if a potato tastes good or not. Then, we test it with a test dataset of ten observations
    from which we know the ground truth (the real label). From these ten trials, seven
    of them were correct and three were not, so we could simplify this as saying that
    the model is 7 / 10 = 0.7 or 70% accurate (and that you just ate ten potatoes).
  prefs: []
  type: TYPE_NORMAL
- en: While straightforward and easy to interpret, the accuracy metric is not optimal
    for every case, for example, in problems where the target variable is continuous
    or situations where the dataset is imbalanced—when the number of observations
    of a class heavily outweighs another one, for instance, a dataset where 95% of
    the rows belong to class *A*.
  prefs: []
  type: TYPE_NORMAL
- en: A second aspect of the training we need to define is the *loss function* , often
    called the *cost* or *objective* function. This function specifies the objective
    the model wants to minimize during training. Like the performance metric, it is
    also a single number value. But instead of measuring its performance, it computes
    how incorrect the predictions are. During training, we want to minimize this value
    (we are not interested in wrong predictions, right?), so the smallest the number,
    the better it is.
  prefs: []
  type: TYPE_NORMAL
- en: 'There is no unique way to compute the loss value; after all, there are many
    loss functions. But the common ground between them is that the model evaluates
    it at the end of every batch of data and epoch (more on this soon). Then, it updates
    its weights (the model’s parameters) according to the function’s value: the loss
    value. It might be a bit tricky to grasp this concept, but after training the
    first model, you will get a better idea.'
  prefs: []
  type: TYPE_NORMAL
- en: Last, we have a third component, the *optimizer* , another type of function
    that works very closely with the loss. In the preceding point, we said that the
    loss function intends to measure how wrong the model is so that it can update
    the weights. But by how much will it update those weights? That’s the role of
    the optimizer. Quoting the official TensorFlow.js documentation, an optimizer’s
    job is to “decide how much to change each parameter in the model given the current
    model prediction” (Google, 2018c).
  prefs: []
  type: TYPE_NORMAL
- en: Now, with the right data at hand, the model architecture defined, and the metrics
    decided, it’s time to train our model.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Training a model can be a lengthy, expensive, and energy-hungry process. Hence,
    we need to make sure it proceeds in the right way to avoid any unpleasant surprises
    once the training ends. In the examples we are about to see, we will use the metrics
    introduced earlier to peek at the training and watch its progress. To do so, we
    will use TensorFlow.js’ visualization library **tfjs-vis** to see in real-time
    how the model’s loss and performance metric evolve during training.
  prefs: []
  type: TYPE_NORMAL
- en: The evaluation phase also extends to the trained model. Here, we will test the
    model using data it did not see during the training phase to assess its predictive
    power. Doing so is very important because a model that does well at training is
    not necessarily good at predicting. One of the main reasons this phenomenon occurs
    is because of **overfitting**. An overfitted model is one that underwent a wrong
    training phase, and it *memorized*—instead of *modeled*—the training data, its
    noise, and random fluctuations. As a result, the model loses its ability to generalize,
    meaning that it will not work well in cases it did not see during the training.
  prefs: []
  type: TYPE_NORMAL
- en: Deploying the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By this point, suppose we have a good model that fits the problem we defined
    right at the start. It did great during training and performs well on the testing
    phase, and your boss approves it. Now it is time to deploy and present it to the
    world. But how? This is neither an easy question to answer nor a trivial task
    to complete, because deploying a model depends on many factors, like the platform
    of interest or the company’s requirements.
  prefs: []
  type: TYPE_NORMAL
- en: Deploying a model is the process of serving it or making it available for use.
    For example, Amazon’s recommendation engines are probably located in Amazon Web
    Services servers, listening to our searches for “tensorflow js books.” Typically,
    when we train machine learning models, we do it in an enclosed environment, like
    a script, a notebook, or a service somewhere in the cloud. However, the chances
    are that these are not the environments where you will deploy it. After all, these
    scripts might be designed for training and not for inferring. So, we need a second
    platform to deploy them.
  prefs: []
  type: TYPE_NORMAL
- en: As you might expect, our deployment target is TensorFlow.js—one that, as discussed
    earlier, performs well as a training and inferring platform.
  prefs: []
  type: TYPE_NORMAL
- en: To summarize this first part of the chapter, all the cases introduced here are
    a description and a guide on how you will approach most of this book’s problems.
    Nevertheless, it is not an exhaustive or perfect list of how every machine learning
    system works. Now, let’s finally apply all of this information and build the book’s
    first models.
  prefs: []
  type: TYPE_NORMAL
- en: Building a logistic regression model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this first exercise, we will create a web application that trains and serves
    a logistic regression model. Moreover, to have a richer application, we will use
    the visualization library tfjs-vis to plot the data and the training’s loss and
    performance metric.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are in a web environment, this tutorial also covers certain web development
    concepts such as loading libraries from a CDN or how to create a button dynamically.
    While these topics are not related to TensorFlow.js or ML, I believe that the
    book should explain them to understand the app thoroughly and to assist those
    who are not familiar with them.
  prefs: []
  type: TYPE_NORMAL
- en: Time to start! So, grab your laptop and prepare to get your hands dirty. Or,
    if you rather just read about the process, of course, that’s great too. For extra
    references, you can find the complete source code at [`https://github.com/Apress/Practical-TensorFlow.js/tree/master/2`](https://github.com/Apress/Practical-TensorFlow.js/tree/master/2).
  prefs: []
  type: TYPE_NORMAL
- en: Understanding logistic regression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This web app features a **logistic regression** (or logit) model, a supervised
    learning algorithm that tries to find an association between a set of **independent
    variables** , also known as the predictors, and a **discrete dependent variable**
    , known as the label. In other words, it uses a collection of attributes or features
    to learn to classify them into a category. The function that maps the set of features
    to the target is a special case of the logistic function (hence the name) called
    the sigmoid function.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically speaking, the model in question is a **binary logistic regression
    model** , one whose target variable has one of **two** possible values, for example,
    “0” or “1,” “true” or “false,” or “spam” or “not spam.” However, the algorithm’s
    output does not look this way. A logit model’s output is the likelihood or probability
    of the label being the default case. Let me explain. Suppose we have a model that
    predicts if a message is “spam” or “not spam,” and we test it with the text: “TensorFlow.js
    is nice.” The answer is, of course, “not spam,” but the model won’t say it this
    way. Instead, its output is a value between 0 and 1, where 1 means that it is
    100% confident the message is spam, and 0 indicates that it is 0% likely to be
    spam. Typically, most implementations of logistic regression set the threshold
    at 0.5, meaning that they consider anything above this value the “true” response,
    for example, “spam,” while anything below, the “false” one.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure [2-1](#Fig1) presents an example of a logistic function from a model
    that predicts a vehicle engine’s shape (vs) where the label “0” means “V-shaped”
    and 1, “straight,” using as predictor its horsepower (hp).^([2](#Fn2)) The dots
    you see here are the training set. In the x-axis, you have the horsepower, *hp*;
    in the y-axis, the engine’s shape, *vs*; and in the chart, the logistic curve
    that maps both variables. To interpret it and to predict from this plot, consider
    the input *hp=100*. Now, go to the y-axis and find the value where “100” intercepts
    the “S” curve. In this case, it touches the curve in the 0.80 mark, and since
    0.80 > 0.50, then the prediction is “1.” On the other hand, if *hp=200*, the likelihood
    is 0.004, so the predicted label is “0.”
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_2_Chapter/494424_1_En_2_Fig1_HTML.jpg](../images/494424_1_En_2_Chapter/494424_1_En_2_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1
  prefs: []
  type: TYPE_NORMAL
- en: A fitted logistic regression
  prefs: []
  type: TYPE_NORMAL
- en: For this exercise, we will create a logistic regression using a network-like
    model in TensorFlow.js. But before getting there, we need to start by reviewing
    what an artificial neural network is.
  prefs: []
  type: TYPE_NORMAL
- en: What is an artificial neural network?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our brain is made of billions of interconnected neurons that are organized in
    a complex network-like structure. These neurons—the fundamental units of the brain—are
    continually sending electrical impulses, known as signals, that are received by
    others. Some signals are strong, and when they reach the receiving neuron, it
    stimulates them to create and transmit their own signal to the network. Weak signals,
    on the other hand, do not trigger an impulse.
  prefs: []
  type: TYPE_NORMAL
- en: 'An artificial neural network aims to mimic the connectivity and impulses characteristic
    of the brain. Its main block, the **perceptron** (Rosenblatt, 1958), plays the
    role of the biological neuron. A perceptron is a mathematical representation of
    the neuron, and like its biological counterpart, its role is to produce an output
    signal depending on whether the input was strong. It consists of five main parts
    and an additional one (Figure [2-2](#Fig2)):'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_2_Chapter/494424_1_En_2_Fig2_HTML.jpg](../images/494424_1_En_2_Chapter/494424_1_En_2_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2
  prefs: []
  type: TYPE_NORMAL
- en: A perceptron
  prefs: []
  type: TYPE_NORMAL
- en: 'Inputs: The incoming signals.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Weights: Values that weigh (modify) the inputs. The weights are probably the
    most important part of the network. During training, the network will learn an
    optimal set of weights capable of producing the desired output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Weighted sum: This operation computes the weighted sum of the inputs *z* = *w*[1]*x*[1] + *w*[2]*x*[2] + … + *w*[*n*]*x*[*n*]'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Activation function: This operation applies an activation function to the weighted
    sum.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The output: This value is the activation function applied to the weighted sum
    *h*[*w*](*x*) = *activation*(*z*); the outgoing signal.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The bias (optional): Sometimes, a perceptron has an additional input called
    the bias, denoted with *x*[0]. If bias is used, the weighted sum becomes *y* = *x*[0] + *w*[1]*x*[1] + *w*[2]*x*[2] + … + *w*[*n*]*x*[*n*].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In one sentence, we could say that a perceptron is a structure that receives
    a series of inputs and produces an output. Let’s see an example. Suppose that
    we have one perceptron with inputs *X*[1] = 0.7, *W*[1] = 0.3, *X*[2] = 0.4, *W*[2] = 0,
    and bias *X*[0] = 1, and the activation function is sigmoid (the one from logistic
    regression) defined as ![$$ \frac{1}{1+{e}^{-x}} $$](../images/494424_1_En_2_Chapter/494424_1_En_2_Chapter_TeX_IEq1.png).
    In this case, the weighted sum is *y* = 1 + 0.7 ∗ 0.3 + 0.4 ∗ 0 = 1.21\. And after
    applying the sigmoid activation function, ![$$ \frac{1}{1+{e}^{-1.21}}=0.77 $$](../images/494424_1_En_2_Chapter/494424_1_En_2_Chapter_TeX_IEq2.png)
    (Figure [2-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/494424_1_En_2_Chapter/494424_1_En_2_Fig3_HTML.jpg](../images/494424_1_En_2_Chapter/494424_1_En_2_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2-3
  prefs: []
  type: TYPE_NORMAL
- en: An example of a perceptron with values
  prefs: []
  type: TYPE_NORMAL
- en: 'Like the brain, in practice, you never use a single perceptron because one
    is not enough for learning complex problems. So, instead of using one, you use
    layers of perceptron that are connected, hence the term **artificial neural network**
    (ANN). An ANN has three kinds of layers: **input**, **hidden**, and **output**
    layers. The input layer receives the data and distributes it among the first hidden
    layer because, typically, the neurons of one layer are connected to all the neurons
    of the previous one, a *fully connected layer*. The hidden layers compute the
    activation values of their inputs and send them to the next one. Last, the output
    layer uses the activations from the past hidden layer to produce the final output.
    In a neural network architecture, the more layers you have, the more weights,
    increasing the network’s capability of learning a solution to a more complex problem.
    For instance, the preceding example intends to learn only two weights. But in
    reality, a problem such as image classification could easily require a network
    of millions of weights. Therefore, to cope with the complexity, the network might
    require more layers.'
  prefs: []
  type: TYPE_NORMAL
- en: But how do they learn? Excellent question. During training, the model tries
    to tweak its weight in such a way that it is able to predict the label of a dataset
    using its predictors. In our perceptron example, we used two predictors [0.7,
    0.4], and the output was 0.7702\. But what if the actual correct target is 1.0?
    Can we tweak the weights with the goal of getting a better output? The answer
    is yes.
  prefs: []
  type: TYPE_NORMAL
- en: During training, when a value reaches the output layer, the model calculates
    the difference between the actual and predicted values. This difference, formally
    known as the error, is sent back to the model’s weight and bias to modify them
    in a way that minimizes the error; in other words, we update the weights to close
    the gap between the actual and predicted values. This process of sending the error
    back to the model is called **backpropagation** (Rumelhart et al., 1985). As we
    will soon see, a network learns in cycles known as **epochs** . At the end of
    each of these, the model propagates the errors back, with the intention of reducing
    the error in the upcoming epoch. So, you could see this as an iterative process
    that runs until the model finds an optimal set of weights or *converges.* As a
    result, it is not surprising to have a large error early during training. You
    will learn more about how the training error evolves through the visualizations
    we will create.
  prefs: []
  type: TYPE_NORMAL
- en: Overview of the data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This exercise’s dataset is a synthetic one. It includes 700 observations, 2
    features, and the class column named “label.” It is balanced, with 349 points
    belonging to the class “0” and 351 to the second class, “1.” Each of the features
    follows a normal distribution, meaning that most points are situated near the
    mean and have a standard deviation of 1\. Besides this, to make the dataset suitable
    for a classification problem, the features are interdependent.
  prefs: []
  type: TYPE_NORMAL
- en: Building the app
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For better visibility and clarity, we will split the tutorial into different
    sections, where each of them describes a particularity or a mechanism of the application.
    First, we will start by setting up the workspace, followed by defining the HTML
    file and importing the required packages. Then, we will load the dataset, plot
    it, and, last, build the model and train it. Follow me!
  prefs: []
  type: TYPE_NORMAL
- en: Setting up the workspace
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For this exercise, the only thing you will need is a web browser and your preferred
    code editor. Nothing else. The app will use the CDN approach to download the libraries,
    so you do not have to install anything. Now, create a new project, open the code
