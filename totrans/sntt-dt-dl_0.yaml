- en: Preface
  prefs: []
  type: TYPE_NORMAL
- en: In 2017, *The Economist* wrote, “The world’s most valuable resource is no longer
    oil, but data,” and this becomes truer with every passing day. The gathering and
    analysis of massive amounts of data drive the business world, public administration,
    and science, giving leaders the information they need to make accurate, strategically-sound
    decisions. Although some worry about the implications of this new “data economy,”
    it is clear that data is here to stay. Those who can harness the power of data
    will be in a good position to shape the future.
  prefs: []
  type: TYPE_NORMAL
- en: To use data ever more efficiently, machine and deep learning—forms of artificial
    intelligence (AI)—continue to evolve. And every new development in how data and
    AI are used impacts innumerable areas of everyday life. In other words, from banking
    to healthcare to scientific research to sports and entertainment, data has become
    everything. But, for privacy reasons, it is not always possible to find sufficient
    data.
  prefs: []
  type: TYPE_NORMAL
- en: As the lines between the real and virtual worlds continue to blur, data scientists
    have begun to generate synthetic data, with or without real data, to understand,
    control, and regulate decision-making in the real world. Instead of focusing on
    how to overcome barriers to data, data professionals have the option of either
    transforming existing data for their specific use or producing it synthetically.
    We have written this book to explore the importance and meaning of these two avenues
    through real-world examples. If you work with or are interested in data science,
    statistics, machine learning, deep learning, or AI, this book is for you.
  prefs: []
  type: TYPE_NORMAL
- en: While deep learning models’ huge data needs are a bottleneck for such applications,
    synthetic data has allowed these models to be, in a sense, self-fueled. Synthetic
    data is still an emerging topic, from healthcare to retail, manufacturing to autonomous
    driving. It should be noted that since labeling processes start with real data.
    Real data, augmented data, and synthetic data all take place in these deep learning
    processes.
  prefs: []
  type: TYPE_NORMAL
- en: This book includes examples of Python and R applications for synthetic data
    production. We hope that it proves to be as comprehensive as you need it to be.
  prefs: []
  type: TYPE_NORMAL
