- en: Introduction
  prefs: []
  type: TYPE_NORMAL
- en: '“The claim is that nature itself operates in a way that is analogous to a priori
    reasoning. The way nature operates is, of course, via causation: the processes
    we see unfolding around us are causal processes, with earlier stages linked to
    later ones by causal relations” [[1](#Par371)]. Data is extremely important in
    the operation of causal relationships and can be described as the “sine qua non”
    of these processes. In addition, data quality is related to quantity and diversity,
    especially in the AI framework.'
  prefs: []
  type: TYPE_NORMAL
- en: Data is the key to understanding causal relationships. Without data, it would
    be impossible to understand how the world works. The philosopher David Hume understood
    this better than anyone. According to Hume, our knowledge of the world comes from
    our experiences. Experiences produce data, which can be stored on a computer or
    in the cloud. Based on this data, we can make predictions about what will happen
    in the future. These predictions allow us to test our hypotheses and theories.
    If our predictions are correct, we can have confidence in our ideas. If they are
    wrong, we need to rethink our hypotheses and theories. This cycle of testing and
    refinement is how we make progress in science and life. This is how we make progress
    as scientists and as human beings.
  prefs: []
  type: TYPE_NORMAL
- en: Many of today’s technology giants, such as Amazon, Facebook, and Google, have
    made data-driven decision-making the core of their business models. They have
    done this by harnessing the power of big data and AI to make decisions that would
    otherwise be impossible. In many ways, these companies are following in the footsteps
    of Hume, using data to better understand the world around them.
  prefs: []
  type: TYPE_NORMAL
- en: As technology advances, how we collect and store data also changes. In the past,
    data was collected through experiments and observations made by scientists. However,
    with the advent of computers and the internet, data can now be collected automatically
    and stored in a central location. This has led to a change in the way we think
    about knowledge. Instead of knowledge being stored in our minds, it is now something
    that is stored in computers and accessed through algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: This change in the way we think about knowledge has had a profound impact on
    the way we live and work. In the past, we would have to rely on our memory and
    experience to make decisions. However, now we can use data to make more informed
    decisions. For example, we can use data about the past behavior of consumers to
    predict what they might buy in the future. This has led to a more efficient and
    effective way of doing business.
  prefs: []
  type: TYPE_NORMAL
- en: In the age of big data, it is more important than ever to have high-quality
    data to make accurate predictions. However, it is not only the quantity and quality
    of the data that is important but also the diversity. The diversity of data sources
    is important to avoid bias and to get a more accurate picture of the world. This
    is because different data sources can provide different perspectives on the same
    issue, which can help to avoid bias. Furthermore, more data sources can provide
    a more complete picture of what is happening in the world.
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In recent years, a method has been developed to teach machines to see, read,
    and hear via data input. The point of origin for this is what we think of in the
    brain as producing output bypassing inputs through a large network of neurons.
    In this framework, we are trying to give machines the ability to learn by modeling
    artificial neural networks. Although some authors suggest that the brain does
    not work that way, this is the path followed today.
  prefs: []
  type: TYPE_NORMAL
- en: Many machines learning projects in new application areas began with the labeling
    of data by humans to initiate machine training. These projects were categorized
    under the title of *supervised learning*. This labeling task is similar to the
    structured content analysis applied in social sciences and humanities. Supervised
    learning is a type of machine learning that is based on providing the machine
    with training data that is already labeled. This allows the machine to learn and
    generalize from the data to make predictions about new data. Supervised learning
    is a powerful tool for many machine learning applications.
  prefs: []
  type: TYPE_NORMAL
- en: The quality of data used in machine learning studies is crucial for the accuracy
    of the findings. A study by Geiger et al. (2020) showed that the data used to
    train a machine learning model for credit scoring was of poor quality, which led
    to an unfair and inaccurate model. The study highlights the importance of data
    quality in machine learning research. Data quality is essential for accurate results.
    Furthermore, the study showed how data labeling impacts data quality. About half
    of the papers using original human annotation overlap with other papers to some
    extent, and about 70% of the papers that use multiple overlaps report metrics
    of inter-annotator agreement [[2](#Par373)]. This suggests that the data used
    in these studies is unreliable and that further research is needed to improve
    data quality.
  prefs: []
  type: TYPE_NORMAL
- en: As more business decisions are informed by data analysis, more companies are
    built on data. However, data quality remains a problem. Unfortunately, “garbage
    in, garbage out,” which was a frequently used motto about computers in the past,
    is valid in the sense of data sampling, which is also used in the framework of
    machine learning. According to the AI logic most employed today, if qualified
    college graduates have been successful in obtaining doctorates in the past, they
    will remain doing so in the future. In this context, naturally, the way to get
    a good result in machine learning is to include “black swans” in our training
    data, and this is also a problem with our datasets.
  prefs: []
  type: TYPE_NORMAL
- en: A “black swan” is a term used to describe outliers in datasets. It is a rare
    event that is difficult to predict and has a major impact on a system. In machine
    learning, a black swan event is not represented in the training data but could
    significantly impact the results of the machine learning algorithm. Black swans
    train models to be more robust to unexpected inputs. It is important to include
    them in training datasets to avoid biased results.
  prefs: []
  type: TYPE_NORMAL
- en: Over time, technological development has moved it into the framework of human
    decision-making with data and into the decision-making framework of machines.
    Now, machines evaluate big data and make decisions with algorithms written by
    humans. For example, a driverless car can navigate toward the desired destination
    by constantly collecting data on stationary and moving objects around it in various
    ways. Autonomous driving is a very important and constantly developing application
    area for synthetic data. Autonomous driving systems should be developed at a capability
    level that can solve complex and varied traffic problems in simulation. The scenarios
    we mentioned in these simulations are sometimes made by gaming engines such as
    Unreal and Unity. Creating accurate and useful “synthetic data” with simulations
    based on real data will be the way companies will prefer real data that cannot
    be easily found.
  prefs: []
  type: TYPE_NORMAL
- en: Synthetic data is becoming an increasingly important tool for businesses looking
    to improve their AI initiatives and overcome many of the associated challenges.
    By creating synthetic data, businesses can shape and form data to their needs
    and augment and de-bias their datasets. This makes synthetic data an essential
    part of any AI strategy. DataGen, Mostly, Cvedia, Hazy, AI.Reverie, Omniverse,
    and Anyverse can be counted among the startups that produce synthetic data. Sample
    images from synthetic outdoor datasets produced by such companies can be seen
    in the given source.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the benefits mentioned, synthetic data can also help businesses
    train their AI models more effectively and efficiently. Businesses can avoid the
    need for costly and time-consuming data collection processes by using synthetic
    data. This can help businesses save money and resources and get their AI initiatives
    up and running more quickly.
  prefs: []
  type: TYPE_NORMAL
- en: Who Is This Book For?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The book is meant for people who want to learn about synthetic data and its
    applications. It will prove especially useful for people working in machine learning
    and computer vision, as synthetic data can be used to train machine learning models
    that can make more accurate predictions about real-world data.
  prefs: []
  type: TYPE_NORMAL
- en: The book is written for the benefit of data scientists, machine learning engineers,
    deep learning practitioners, artificial intelligence researchers, data engineers,
    business analysts, information technology professionals, students, and anyone
    interested in learning more about synthetic data and its applications.
  prefs: []
  type: TYPE_NORMAL
- en: Book Structure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Synthetic data is not originally collected from real-world sources. It is generated
    by artificial means, using algorithms or mathematical models, and has many applications
    in deep learning, particularly in training neural networks. This book, which discusses
    the structure and application of synthetic data, consists of five chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [1](534235_1_En_1_Chapter.xhtml) covers synthetic data, why it is important,
    and how it can be used in data science and artificial intelligence applications.
    This chapter also discusses the accuracy problems associated with synthetic data,
    the life cycle of data, and the tradeoffs between data collection and privacy.
    Finally, this chapter describes some applications of synthetic data, including
    financial services, manufacturing, healthcare, automotive, robotics, security,
    social media, marketing, natural language processing, and computer vision.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [2](534235_1_En_2_Chapter.xhtml) provides information about different
    ways of generating synthetic data. It covers how to generate fair synthetic data,
    as well as how to use video games to create synthetic data. The chapter also discusses
    the synthetic-to-real domain gap and how to overcome it using domain transfer,
    domain adaptation, and domain randomization. Finally, the chapter discusses whether
    a real-world experience is necessary for training machine learning models and,
    if not, how to achieve it using pretraining, reinforcement learning, and self-supervised
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [3](534235_1_En_3_Chapter.xhtml) explains the content and purpose of
    a *generative adversarial network*, or GAN, a type of AI used to generate new
    data, like training data.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [4](534235_1_En_4_Chapter.xhtml) explores synthetic data generation
    with R.
  prefs: []
  type: TYPE_NORMAL
- en: Chapter [5](534235_1_En_5_Chapter.xhtml) covers different methods of synthetic
    data generation with Python.
  prefs: []
  type: TYPE_NORMAL
- en: Learning Outcomes of the Book
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Readers of this book will learn about the various types of synthetic data, how
    to create them, and their benefits and challenges. They will also learn about
    its importance in data science and artificial intelligence. Furthermore, readers
    will come away understanding how to employ automatic data labeling and how GANs
    can be used to generate synthetic data. Lastly, readers who complete this book
    will know how to generate synthetic data using the R and Python programming languages.
  prefs: []
  type: TYPE_NORMAL
- en: Source Code
  prefs:
