- en: '[2](#Fn2_source)'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '[2](#Fn2_source)'
- en: It is also referred to as Adaline rule as well as Widrow-Hoff rule.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 它也被称为Adaline规则以及Widrow-Hoff规则。
- en: '[3](#Fn3_source)'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: '[3](#Fn3_source)'
- en: The delta rule is a type of numerical method called gradient descent . The gradient
    descent starts from the initial value and proceeds to the solution. Its name originates
    from its behavior whereby it searches for the solution as if a ball rolls down
    the hill along the steepest path. In this analogy, the position of the ball is
    the occasional output from the model, and the bottom is the solution. It is noteworthy
    that the gradient descent method cannot drop the ball to the bottom with just
    one throw.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: Delta规则是一种称为梯度下降的数值方法。梯度下降从初始值开始，继续到解。它的名字来源于它的行为，就像一个球沿着最陡峭的路径滚下山一样寻找解。在这个类比中，球的位置是模型偶尔的输出，底部是解。值得注意的是，梯度下降方法不能只抛一次就将球扔到底部。
- en: '[4](#Fn4_source)'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '[4](#Fn4_source)'
- en: The output from a sigmoid function is within the range of 0-1\. This behavior
    of the sigmoid function is useful when the neural network produces probability
    outputs.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid函数的输出范围在0-1之间。这种Sigmoid函数的行为在神经网络产生概率输出时非常有用。
