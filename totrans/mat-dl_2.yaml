- en: 2. Neural Network
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter introduces the neural network, which is widely used as the model
    for Machine Learning. The neural network has a long history of development and
    a vast amount of achievement from research works. There are many books available
    that purely focus on the neural network. Along with the recent growth in interest
    for Deep Learning, the importance of the neural network has increased significantly
    as well. We will briefly review the relevant and practical techniques to better
    understand Deep Learning. For those who are new to the concept of the neural network,
    we start with the fundamentals.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: First, we will see how the neural network is related to Machine Learning. The
    models of Machine Learning can be implemented in various forms. The neural network
    is one of them. Simple isn’t it? Figure [2-1](#Fig1) illustrates the relationship
    between Machine Learning and the neural network . Note that we have the neural
    network in place of the model, and the learning rule in place of Machine Learning.
    In context of the neural network, the process of determining the model (neural
    network) is called the learning rule . This chapter explains the learning rules
    for a single-layer neural network. The learning rules for a multi-layer neural
    network are addressed in Chapter [3](A448947_1_En_3_Chapter.html).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig1_HTML.gif](A448947_1_En_2_Fig1_HTML.gif)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: Figure 2-1.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The relationship between Machine Learning and the neural network
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Nodes of a Neural Network
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Whenever we learn something, our brain stores the knowledge. The computer uses
    memory to store information. Although they both store information, their mechanisms
    are very different. The computer stores information at specified locations of
    the memory, while the brain alters the association of neurons. The neuron itself
    has no storage capability; it just transmits signals from one neurons to the other.
    The brain is a gigantic network of these neurons, and the association of the neurons
    forms specific information.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: The neural network imitates the mechanism of the brain. As the brain is composed
    of connections of numerous neurons, the neural network is constructed with connections
    of nodes, which are elements that correspond to the neurons of the brain. The
    neural network mimics the neurons’ association, which is the most important mechanism
    of the brain, using the weight value. The following table summarizes the analogy
    between the brain and neural network .
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '| Brain | Neural Network |'
  id: totrans-9
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
- en: '| Neuron | Node |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
- en: '| Connection of neurons | Connection weight |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
- en: Explaining this any further using text may cause more confusion. Look at a simple
    example for a better understanding of the neural network’s mechanism . Consider
    a node that receives three inputs, as shown in Figure [2-2](#Fig2).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig2_HTML.gif](A448947_1_En_2_Fig2_HTML.gif)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: Figure 2-2.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: A node that receives three inputs
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: The circle and arrow of the figure denote the node and signal flow, respectively.
    x [1], x [2], and x [3] are the input signals. w [1], w [2], and w [3] are the
    weights for the corresponding signals. Lastly, b is the bias, which is another
    factor associated with the storage of information. In other words, the information
    of the neural net is stored in the form of weights and bias.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: 'The input signal from the outside is multiplied by the weight before it reaches
    the node. Once the weighted signals are collected at the node , these values are
    added to be the weighted sum. The weighted sum of this example is calculated as
    follows:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ v=\left({w}_1\times {x}_1\right)+\left({w}_2\times {x}_2\right)+\left({w}_3\times
    {x}_3\right)+ b $$](A448947_1_En_2_Chapter_Equa.gif)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: This equation indicates that the signal with a greater weight has a greater
    effect. For instance, if the weight w [1] is 1, and w [2] is 5, then the signal
    x [2] has five times larger effect than that of x [1]. When w [1] is zero, x [1]
    is not transmitted to the node at all. This means that x [1] is disconnected from
    the node. This example shows that the weights of the neural network imitate how
    the brain alters the association of the neurons.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 'The equation of the weighted sum can be written with matrices as:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ v\kern0.5em =\kern0.5em w\kern0.1em x\kern0.5em +\kern0.5em b $$](A448947_1_En_2_Chapter_IEq1.gif)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: 'where w and x are defined as:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ w\kern0.5em =\kern0.5em \left[\begin{array}{ccc}\hfill {w}_1\hfill & \hfill
    {w}_2\hfill & \hfill {w}_3\hfill \end{array}\right]\kern2em x\kern0.5em =\kern0.5em
    \left[\begin{array}{c}\hfill {x}_1\hfill \\ {}\hfill {x}_2\hfill \\ {}\hfill {x}_3\hfill
    \end{array}\right] $$](A448947_1_En_2_Chapter_Equb.gif)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: Finally, the node enters the weighted sum into the activation function and yields
    its output. The activation function determines the behavior of the node.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=\varphi (v) $$](A448947_1_En_2_Chapter_Equc.gif)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: '![$$ \varphi \left(\cdot \right) $$](A448947_1_En_2_Chapter_IEq2.gif) of this
    equation is the activation function. Many types of activation functions are available
    in the neural network. We will elaborate on them later.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s briefly review the mechanism of the neural net. The following process
    is conducted inside the neural net node:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: The weighted sum of the input signals is calculated.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ \begin{array}{l} v={w}_1{x}_1+{w}_2{x}_2+{w}_3{x}_3+ b\\ {}\kern1.5em
    =\kern0.5em wx+ b\end{array} $$](A448947_1_En_2_Chapter_Equd.gif)'
  id: totrans-30
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: The output from the activation function to the weighted sum is passed outside.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![$$ y=\varphi (v)=\varphi \left( wx+ b\right) $$](A448947_1_En_2_Chapter_Eque.gif)'
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_IMG
- en: Layers of Neural Network
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As the brain is a gigantic network of the neurons, the neural network is a network
    of nodes. A variety of neural networks can be created depending on how the nodes
    are connected. One of the most commonly used neural network types employs a layered
    structure of nodes as shown in Figure [2-3](#Fig3).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig3_HTML.gif](A448947_1_En_2_Fig3_HTML.gif)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_2_Fig3_HTML.gif](A448947_1_En_2_Fig3_HTML.gif)'
- en: Figure 2-3.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-3。
- en: A layered structure of nodes
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 节点的分层结构
- en: The group of square nodes in Figure [2-3](#Fig3) is called the input layer .
    The nodes of the input layer merely act as the passage that transmits the input
    signals to the next nodes. Therefore, they do not calculate the weighted sum and
    activation function. This is the reason that they are indicated by squares and
    distinguished from the other circular nodes. In contrast, the group of the rightmost
    nodes is called the output layer . The output from these nodes becomes the final
    result of the neural network. The layers in between the input and output layers
    are called hidden layers . They are given this name because they are not accessible
    from the outside of the neural network.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-3](#Fig3)中的方形节点组被称为输入层。输入层的节点仅仅充当将输入信号传输到下一个节点的通道。因此，它们不计算加权总和和激活函数。这就是为什么它们用方形表示，并与其他圆形节点区分开来。相比之下，最右侧的节点组被称为输出层。这些节点的输出成为神经网络的最终结果。输入层和输出层之间的层被称为隐藏层。它们之所以被称为隐藏层，是因为它们无法从神经网络的外部访问。
- en: The neural network has been developed from a simple architecture to a more and
    more complex structure. Initially, neural network pioneers had a very simple architecture
    with only input and output layers, which are called single-layer neural networks.
    When hidden layers are added to a single-layer neural network , this produces
    a multi-layer neural network. Therefore, the multi-layer neural network consists
    of an input layer, hidden layer(s), and output layer. The neural network that
    has a single hidden layer is called a shallow neural network or a vanilla neural
    network . A multi-layer neural network that contains two or more hidden layers
    is called a deep neural network . Most of the contemporary neural networks used
    in practical applications are deep neural networks . The following table summarizes
    the branches of the neural network depending on the layer architecture.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络已经从简单的架构发展到越来越复杂的结构。最初，神经网络先驱们有一个非常简单的架构，只有输入层和输出层，这些被称为单层神经网络。当向单层神经网络添加隐藏层时，这会产生多层神经网络。因此，多层神经网络由输入层、隐藏层（s）和输出层组成。只有一个隐藏层的神经网络被称为浅层神经网络或香草神经网络。包含两个或更多隐藏层的多层神经网络被称为深层神经网络。在实用应用中使用的绝大多数当代神经网络都是深层神经网络。以下表格总结了根据层架构划分的神经网络分支。
- en: '| Single-Layer Neural Network | Input Layer – Output Layer |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 单层神经网络 | 输入层 – 输出层 |'
- en: '| Multi-Layer Neural Network | Shallow Neural Network | Input Layer – Hidden
    Layer – Output Layer |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| 多层神经网络 | 浅层神经网络 | 输入层 – 隐藏层 – 输出层 |'
- en: '| Deep Neural Network | Input Layer – Hidden Layers – Output Layers |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| 深层神经网络 | 输入层 – 隐藏层 – 输出层 |'
- en: The reason that we classify the multi-layer neural network by these two types
    has to do with its historical background of development. The neural network started
    as the single-layer neural network and evolved to the shallow neural network ,
    followed by the deep neural network. The deep neural network has not been seriously
    highlighted until the mid-2000s, after two decades had passed since the development
    of the shallow neural network. Therefore, for a long time, the multi-layer neural
    network meant just the single hidden-layer neural network. When the need to distinguish
    multiple hidden layers arose, they gave a separate name to the deep neural network.
    See Figure [2-4](#Fig4).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将多层神经网络按这两种类型分类的原因与其发展的历史背景有关。神经网络最初是单层神经网络，然后发展到浅层神经网络，接着是深层神经网络。直到2005年中期，浅层神经网络发展了20年后，深层神经网络才被真正重视。因此，长期以来，多层神经网络仅仅意味着单隐藏层神经网络。当需要区分多个隐藏层时，它们为深层神经网络赋予了单独的名称。见图[2-4](#Fig4)。
- en: '![A448947_1_En_2_Fig4_HTML.gif](A448947_1_En_2_Fig4_HTML.gif)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![A448947_1_En_2_Fig4_HTML.gif](A448947_1_En_2_Fig4_HTML.gif)'
- en: Figure 2-4.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-4。
- en: The branches of the neural network depend on the layer architecture
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的分支取决于层架构
- en: In the layered neural network , the signal enters the input layer, passes through
    the hidden layers, and leaves through the output layer. During this process, the
    signal advances layer by layer. In other words, the nodes on one layer receive
    the signal simultaneously and send the processed signal to the next layer at the
    same time.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Let’s follow a simple example to see how the input data is processed as it passes
    through the layers. Consider the neural network with a single hidden layer shown
    in Figure [2-5](#Fig5).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig5_HTML.gif](A448947_1_En_2_Fig5_HTML.gif)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
- en: Figure 2-5.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: A neural network with a single hidden layer
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Just for convenience, the activation function of each node is assumed to be
    a linear function shown in Figure [2-6](#Fig6). This function allows the nodes
    to send out the weighted sum itself.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig6_HTML.gif](A448947_1_En_2_Fig6_HTML.gif)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: Figure 2-6.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: The activation function of each node is a linear function
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Now we will calculate the output from the hidden layer (Figure [2-7](#Fig7)).
    As previously addressed, no calculation is needed for the input nodes, as they
    just transmit the signal.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig7_HTML.gif](A448947_1_En_2_Fig7_HTML.gif)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
- en: Figure 2-7.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Calculate the output from the hidden layer
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: 'The first node of the hidden layer calculates the output as:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: 'Weighted sum: ![$$ v\kern0.62em =\kern0.62em \left(3\times 1\right)\kern0.5em
    +\kern0.5em \left(1\times 2\right)\kern0.5em +\kern0.5em 1\kern0.62em =\kern0.62em
    6 $$](A448947_1_En_2_Chapter_IEq3.gif)'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output: ![$$ y\kern0.62em =\kern0.62em \varphi (v)\kern0.62em =\kern0.62em
    v\kern0.62em =\kern0.62em 6 $$](A448947_1_En_2_Chapter_IEq4.gif)'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In a similar manner, the second node of the hidden layer calculates the output
    as:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: 'Weighted sum: ![$$ v\kern0.62em =\kern0.62em \left(2\times 1\right)\kern0.5em
    +\kern0.5em \left(4\times 2\right)\kern0.5em +\kern0.5em 1\kern0.62em =\kern0.62em
    11 $$](A448947_1_En_2_Chapter_IEq5.gif)'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output: ![$$ y\kern0.62em =\kern0.62em \varphi (v)\kern0.62em =\kern0.62em
    v\kern0.62em =\kern0.62em 11 $$](A448947_1_En_2_Chapter_IEq6.gif)'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The weighted sum calculations can be combined in a matrix equation as follows:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ v=\left[\begin{array}{l}3\times 1+1\times 2+1\\ {}2\times 1+4\times 2+1\end{array}\right]=\left[\begin{array}{cc}\hfill
    3\hfill & \hfill 1\hfill \\ {}\hfill 2\hfill & \hfill 4\hfill \end{array}\right]\left[\begin{array}{l}1\\
    {}2\end{array}\right]+\left[\begin{array}{l}1\\ {}1\end{array}\right]=\left[\begin{array}{l}6\\
    {}11\end{array}\right] $$](A448947_1_En_2_Chapter_Equf.gif)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.1)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: 'The weights of the first node of the hidden layer lay in the first row, and
    the weights of the second node are in the second row. This result can be generalized
    as the following equation:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ v= W x+ b $$](A448947_1_En_2_Chapter_Equ1.gif)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: 'where x is the input signal vector and b is the bias vector of the node. The
    matrix W contains the weights of the hidden layer nodes on the corresponding rows.
    For the example neural network, W is given as:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ W\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill --\kern0.5em
    \mathrm{weights}\ \mathrm{of}\ \mathrm{the}\ \mathrm{first}\ \mathrm{node}\kern0.5em
    --\hfill \\ {}\hfill --\kern0.5em \mathrm{weights}\ \mathrm{of}\ \mathrm{the}\
    \mathrm{second}\ \mathrm{node}\kern0.5em --\hfill \end{array}\;\right]\kern0.62em
    =\kern0.62em \left[\;\begin{array}{cc}\hfill 3\hfill & \hfill 1\hfill \\ {}\hfill
    2\hfill & \hfill 4\hfill \end{array}\;\right] $$](A448947_1_En_2_Chapter_Equg.gif)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
- en: Since we have all the outputs from the hidden layer nodes , we can determine
    the outputs of the next layer, which is the output layer. Everything is identical
    to the previous calculation, except that the input signal comes from the hidden
    layer.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig8_HTML.gif](A448947_1_En_2_Fig8_HTML.gif)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: Figure 2-8.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Determine the outputs of the output layer
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use the matrix form of Equation 2.1 to calculate the output.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: 'Weighted sum: ![$$ v\kern0.62em =\kern0.62em \left[\;\begin{array}{cc}\hfill
    3\hfill & \hfill 2\hfill \\ {}\hfill 5\hfill & \hfill 1\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    6\hfill \\ {}\hfill 11\hfill \end{array}\;\right]\kern0.5em +\kern0.5em \left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill
    41\hfill \\ {}\hfill 42\hfill \end{array}\;\right] $$](A448947_1_En_2_Chapter_IEq7.gif)'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output: ![$$ y\kern0.62em =\kern0.62em \varphi (v)\kern0.62em =\kern0.62em
    v\kern0.62em =\kern0.62em \left[\;\begin{array}{c}\hfill 41\hfill \\ {}\hfill
    42\hfill \end{array}\;\right] $$](A448947_1_En_2_Chapter_IEq8.gif)'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How was that? The process may be somewhat cumbersome, but there is nothing difficult
    in the calculation itself. As we just saw, the neural network is nothing more
    than a network of layered nodes, which performs only simple calculations . It
    does not involve any difficult equations or a complicated architecture. Although
    it appears to be simple, the neural network has been breaking all performance
    records for the major Machine Learning fields, such as image recognition and speech
    recognition. Isn’t it interesting? It seems like the quote, “All the truth is
    simple” is an apt description.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: 'I must leave a final comment before wrapping up the section. We used a linear
    equation for the activation of the hidden nodes, just for convenience. This is
    not practically correct. The use of a linear function for the nodes negates the
    effect of adding a layer. In this case, the model is mathematically identical
    to a single-layer neural network, which does not have hidden layers. Let’s see
    what really happens. Substituting the equation of weighted sum of the hidden layer
    into the equation of weighted sum of the output layer yields the following equation:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \begin{array}{c} v\kern0.62em =\kern0.62em \left[\;\begin{array}{cc}\hfill
    3\hfill & \hfill 2\hfill \\ {}\hfill 5\hfill & \hfill 1\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    6\hfill \\ {}\hfill 11\hfill \end{array}\;\right]\kern0.5em +\kern0.5em \left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]\\ {}=\kern0.62em \left[\;\begin{array}{cc}\hfill
    3\hfill & \hfill 2\hfill \\ {}\hfill 5\hfill & \hfill 1\hfill \end{array}\;\right]\left(\;\left[\;\begin{array}{cc}\hfill
    3\hfill & \hfill 1\hfill \\ {}\hfill 2\hfill & \hfill 4\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 2\hfill \end{array}\;\right]\kern0.5em +\kern0.5em \left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]\;\right)\kern0.5em +\kern0.5em
    \left[\;\begin{array}{c}\hfill 1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]\\
    {}=\kern0.62em \left[\;\begin{array}{cc}\hfill 3\hfill & \hfill 2\hfill \\ {}\hfill
    5\hfill & \hfill 1\hfill \end{array}\;\right]\left[\;\begin{array}{cc}\hfill 3\hfill
    & \hfill 1\hfill \\ {}\hfill 2\hfill & \hfill 4\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 2\hfill \end{array}\;\right]\kern0.5em +\kern0.5em \left[\;\begin{array}{cc}\hfill
    3\hfill & \hfill 2\hfill \\ {}\hfill 5\hfill & \hfill 1\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]\kern0.5em +\kern0.5em \left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]\\ {}=\kern0.62em \left[\;\begin{array}{cc}\hfill
    13\hfill & \hfill 11\hfill \\ {}\hfill 17\hfill & \hfill 9\hfill \end{array}\;\right]\left[\;\begin{array}{c}\hfill
    1\hfill \\ {}\hfill 2\hfill \end{array}\;\right]\kern0.5em +\kern0.5em \left[\;\begin{array}{c}\hfill
    6\hfill \\ {}\hfill 7\hfill \end{array}\;\right]\end{array} $$](A448947_1_En_2_Chapter_Equh.gif)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
- en: This matrix equation indicates that this example neural network is equivalent
    to a single layer neural network as shown in Figure [2-9](#Fig9).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig9_HTML.gif](A448947_1_En_2_Fig9_HTML.gif)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
- en: Figure 2-9.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: This example neural network is equivalent to a single layer neural network
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Keep in mind that the hidden layer becomes ineffective when the hidden nodes
    have linear activation functions. However, the output nodes may, and sometimes
    must, employ linear activation functions.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Supervised Learning of a Neural Network
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This section introduces the concepts and process of supervised learning of
    the neural network. It is addressed in the “Types of Machine Learning” section
    in Chapter [1](A448947_1_En_1_Chapter.html). Of the many training methods, this
    book covers only supervised learning. Therefore, only supervised learning is discussed
    for the neural network as well. In the big picture, supervised learning of the
    neural network proceeds in the following steps:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: Initialize the weights with adequate values.
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Take the “input” from the training data, which is formatted as `{ input, correct
    output }`, and enter it into the neural network. Obtain the output from the neural
    network and calculate the error from the correct output.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adjust the weights to reduce the error .
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Repeat Steps 2-3 for all training data
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These steps are basically identical to the supervised learning process of the
    “Types of Machine Learning” section. This makes sense because the training of
    supervised learning is a process that modifies the model to reduce the difference
    between the correct output and model’s output. The only difference is that the
    modification of the model becomes the changes in weights for the neural network.
    Figure [2-10](#Fig10) illustrates the concept of supervised learning that has
    been explained so far. This will help you clearly understand the steps described
    previously.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig10_HTML.gif](A448947_1_En_2_Fig10_HTML.gif)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
- en: Figure 2-10.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: The concept of supervised learning
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'Training of a Single-Layer Neural Network: Delta Rule'
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As previously addressed, the neural network stores information in the form of
    weights.[¹](#Fn1) Therefore, in order to train the neural network with new information,
    the weights should be changed accordingly. The systematic approach to modifying
    the weights according to the given information is called the learning rule . Since
    training is the only way for the neural network to store the information systematically,
    the learning rule is a vital component in neural network research.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we deal with the delta rule, [²](#Fn2) the representative learning
    rule of the single-layer neural network. Although it is not capable of multi-layer
    neural network training, it is very useful for studying the important concepts
    of the learning rule of the neural network .
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Consider a single-layer neural network, as shown in Figure [2-11](#Fig11). In
    the figure, d [i] is the correct output of the output node i.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig11_HTML.gif](A448947_1_En_2_Fig11_HTML.gif)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
- en: Figure 2-11.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: A single-layer neural network
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: 'Long story short, the delta rule adjusts the weight as the following algorithm:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: “If an input node contributes to the error of the output node, the weight between
    the two nodes is adjusted in proportion to the input value, x [j] and the output
    error, e [i] .”
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This rule can be expressed in equation as:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{i j}\kern1em \leftarrow \kern1em {w}_{i j}\kern0.5em +\kern0.5em
    \alpha \kern0.1em {e}_i\kern0.1em {x}_j $$](A448947_1_En_2_Chapter_Equ2.gif)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.2)where
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: x [j] = The output from the input node j, (![$$ j=1,\kern0.5em 2,\kern0.5em
    3 $$](A448947_1_En_2_Chapter_IEq9.gif))
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: e [i] = The error of the output node i
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: w [ij] = The weight between the output node i and input node j
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: α = Learning rate (![$$ 0\kern0.5em <\kern0.5em \alpha \kern0.5em \le \kern0.5em
    1 $$](A448947_1_En_2_Chapter_IEq10.gif))
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The learning rate , α, determines how much the weight is changed per time. If
    this value is too high, the output wanders around the solution and fails to converge.
    In contrast, if it is too low, the calculation reaches the solution too slowly.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 学习率α决定了每次权重变化的大小。如果这个值太高，输出会在解周围徘徊并无法收敛。相反，如果这个值太低，计算达到解的速度会太慢。
- en: To take a concrete example, consider the single-layer neural network , which
    consists of three input nodes and one output node, as shown in Figure [2-12](#Fig12).
    For convenience, we assume no bias for the output node at this time. We use a
    linear activation function; i.e., the weighted sum is directly transferred to
    the output.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 为了具体说明，考虑由三个输入节点和一个输出节点组成的单层神经网络，如图[2-12](#Fig12)所示。为了方便，我们假设输出节点此时没有偏差。我们使用线性激活函数；即，加权求和直接传递到输出。
- en: '![A448947_1_En_2_Fig12_HTML.gif](A448947_1_En_2_Fig12_HTML.gif)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
  zh: '![图2-12](A448947_1_En_2_Fig12_HTML.gif)'
- en: Figure 2-12.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-12.
- en: A single-layer neural network with three input nodes and one output node
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 具有三个输入节点和一个输出节点的单层神经网络
- en: Note that the first number of the subscript (1) indicates the node number to
    which the input enters. For example, the weight between the input node 2 and output
    node 1 is denoted as w [12]. This notation enables an easier matrix operation;
    the weights associated with the node i are allocated at the i -th row of the weight
    matrix.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，下标中的第一个数字（1）表示输入进入的节点编号。例如，输入节点2和输出节点1之间的权重表示为w[12]。这种表示法使得矩阵运算更容易；与节点i相关的权重分配在权重矩阵的第i行。
- en: 'Applying the delta rule of Equation 2.2 to the example neural network yields
    the renewal of the weights as:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程2.2的delta规则应用于示例神经网络，得到权重的更新如下：
- en: '![$$ \begin{array}{l}{w}_{11}\kern1em \leftarrow \kern1em {w}_{11}\kern0.5em
    +\kern0.5em \alpha \kern0.1em {e}_1\kern0.1em {x}_1\\ {}{w}_{12}\kern1em \leftarrow
    \kern1em {w}_{12}\kern0.5em +\kern0.5em \alpha \kern0.1em {e}_1\kern0.1em {x}_2\\
    {}{w}_{13}\kern1em \leftarrow \kern1em {w}_{13}\kern0.5em +\kern0.5em \alpha \kern0.1em
    {e}_1\kern0.1em {x}_3\end{array} $$](A448947_1_En_2_Chapter_Equi.gif)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![权重更新公式](A448947_1_En_2_Chapter_Equi.gif)'
- en: Let’s summarize the training process using the delta rule for the single-layer
    neural network.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用单层神经网络的delta规则来总结训练过程。
- en: Initialize the weights at adequate values.
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在合适的值上初始化权重。
- en: Take the “input” from the training data of `{ input, correct output }` and enter
    it to the neural network. Calculate the error of the output, y [i] , from the
    correct output, d [i] , to the input.
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从训练数据 `{ 输入, 正确输出 }` 中获取“输入”，并将其输入到神经网络中。计算输出y[i]从正确输出d[i]到输入的错误。
- en: '![$$ {e}_i\kern0.5em =\kern0.5em {d}_i-{y}_i $$](A448947_1_En_2_Chapter_Equj.gif)'
  id: totrans-125
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![误差计算公式](A448947_1_En_2_Chapter_Equj.gif)'
- en: 'Calculate the weight updates according to the following delta rule:'
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 根据以下delta规则计算权重更新：
- en: '![$$ \triangle {w}_{i j}\kern0.5em =\kern0.5em \alpha \kern0.2em {e}_i\kern0.1em
    {x}_j $$](A448947_1_En_2_Chapter_Equk.gif)'
  id: totrans-127
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![三角形权重公式](A448947_1_En_2_Chapter_Equk.gif)'
- en: 'Adjust the weights as:'
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按以下方式调整权重：
- en: '![$$ {w}_{ij}\kern0.5em \leftarrow \kern0.5em {w}_{ij}\kern0.5em +\kern0.5em
    \triangle {w}_{ij} $$](A448947_1_En_2_Chapter_Equl.gif)'
  id: totrans-129
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![权重更新公式](A448947_1_En_2_Chapter_Equl.gif)'
- en: Perform Steps 2-4 for all training data.
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对所有训练数据进行步骤2-4的操作。
- en: Repeat Steps 2-5 until the error reaches an acceptable tolerance level.
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复步骤2-5，直到误差达到可接受的容差水平。
- en: These steps are almost identical to that of the process for the supervised learning
    in the “Supervised Learning of a Neural Network” section. The only difference
    is the addition of Step 6\. Step 6 just states that the whole training process
    is repeated. Once Step 5 has been completed, the model has been trained with every
    data point. Then, why do we train it using all of the same training data? This
    is because the delta rule searches for the solution as it repeats the process,
    rather than solving it all at once.[³](#Fn3) The whole process repeats, as retraining
    the model with the same data may improve the model.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Just for reference, the number of training iterations, in each of which all
    training data goes through Steps 2-5 once, is called an epoch . For instance,
    epoch = 10 means that the neural network goes through 10 repeated training processes
    with the same dataset.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: Are you able to follow this section so far? Then you have learned most of the
    key concepts of the neural network training. Although the equations may vary depending
    on the learning rule, the essential concepts are relatively the same. Figure [2-13](#Fig13)
    illustrates the training process described in this section.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig13_HTML.gif](A448947_1_En_2_Fig13_HTML.gif)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
- en: Figure 2-13.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: The training process
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: Generalized Delta Rule
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section touches on some theoretical aspects of the delta rule. However,
    you don’t need to be frustrated. We will go through the most essential subjects
    without elaborating too much on the specifics.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: The delta rule of the previous section is rather obsolete. Later studies have
    uncovered that there exists a more generalized form of the delta rule. For an
    arbitrary activation function , the delta rule is expressed as the following equation.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{i j}\kern1em \leftarrow \kern1em {w}_{i j}\kern0.5em +\kern0.5em
    \alpha \kern0.1em {\delta}_i\kern0.1em {x}_j $$](A448947_1_En_2_Chapter_Equ3.gif)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.3)
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: 'It is the same as the delta rule of the previous section, except that e [i]
    is replaced with δ [i] . In this equation, δ [i] is defined as:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\delta}_i\kern0.5em =\kern0.5em {\varphi}^{\prime}\left({v}_i\right)\kern0.1em
    {e}_i $$](A448947_1_En_2_Chapter_Equ4.gif)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.4) where
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: e [i] = The error of the output node i
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: v [i] = The weighted sum of the output node i
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: φ′ = The derivative of the activation function φ of the output node i
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Recall that we used a linear activation function of ![$$ \varphi (x)\kern0.5em
    =\kern0.5em x $$](A448947_1_En_2_Chapter_IEq11.gif) for the example. The derivative
    of this function is ![$$ {\varphi}^{\prime }(x)\kern0.5em =\kern0.5em 1 $$](A448947_1_En_2_Chapter_IEq12.gif).
    Substituting this value into Equation 2.4 yields δ [ i ] as:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\delta}_i\kern0.5em =\kern0.5em {e}_i $$](A448947_1_En_2_Chapter_Equm.gif)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
- en: Plugging this equation into Equation 2.3 results in the same formula as the
    delta rule in Equation 2.2\. This fact indicates that the delta rule in Equation
    2.2 is only valid for linear activation functions.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can derive the delta rule with the sigmoid function, which is widely
    used as an activation function. The sigmoid function is defined as shown in Figure
    [2-14](#Fig14).[⁴](#Fn4)
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig14_HTML.gif](A448947_1_En_2_Fig14_HTML.gif)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
- en: Figure 2-14.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: The sigmoid function defined
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: 'We need the derivative of this function , which is given as:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\varphi}^{\prime }(x)\kern0.62em =\kern0.62em \varphi (x)\left(1-\varphi
    (x)\right) $$](A448947_1_En_2_Chapter_Equn.gif)'
  id: totrans-157
  prefs: []
  type: TYPE_IMG
- en: 'Substituting this derivative into Equation 2.4 yields δ [i] as:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\delta}_i\kern0.62em =\kern0.62em {\varphi}^{\prime}\left({v}_i\right)\kern0.1em
    {e}_i\kern0.62em =\kern0.62em \varphi \left({v}_i\right)\left(1-\varphi \left({v}_i\right)\right)\kern0.2em
    {e}_i $$](A448947_1_En_2_Chapter_Equo.gif)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
- en: 'Again, plugging this equation into Equation 2.3 gives the delta rule for the
    sigmoid function as:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{i j}\kern0.62em \leftarrow \kern1em {w}_{i j}\kern0.5em +\kern0.5em
    \alpha \kern0.2em \varphi \left({v}_i\right)\left(1-\varphi \left({v}_i\right)\right)\kern0.2em
    {e}_i\kern0.1em {x}_j $$](A448947_1_En_2_Chapter_Equ5.gif)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.5)
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: Although the weight update formula is rather complicated, it maintains the identical
    fundamental concept where the weight is determined in proportion to the output
    node error, e [i] and the input node value, x [j] .
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: SGD, Batch, and Mini Batch
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The schemes that are used to calculate the weight update, ∆w [ij] , are introduced
    in this section. Three typical schemes are available for supervised learning of
    the neural network.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic Gradient Descent
  id: totrans-166
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Stochastic Gradient Descent (SGD) calculates the error for each training
    data and adjusts the weights immediately. If we have 100 training data points,
    the SGD adjusts the weights 100 times. Figure [2-15](#Fig15) shows how the weight
    update of the SGD is related to the entire training data.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig15_HTML.gif](A448947_1_En_2_Fig15_HTML.gif)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
- en: Figure 2-15.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: How the weight update of the SGD is related to the entire training data
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: 'As the SGD adjusts the weight for each data point, the performance of the neural
    network is crooked while the undergoing the training process. The name “stochastic”
    implies the random behavior of the training process. The SGD calculates the weight
    updates as:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \triangle {w}_{i j}\kern0.62em =\kern0.62em \alpha \kern0.20em {\delta}_i\kern0.1em
    {x}_j $$](A448947_1_En_2_Chapter_Equp.gif)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
- en: This equation implies that all the delta rules of the previous sections are
    based on the SGD approach.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: Batch
  id: totrans-174
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the batch method , each weight update is calculated for all errors of the
    training data, and the average of the weight updates is used for adjusting the
    weights. This method uses all of the training data and updates only once. Figure
    [2-16](#Fig16) explains the weight update calculation and training process of
    the batch method.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig16_HTML.gif](A448947_1_En_2_Fig16_HTML.gif)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
- en: Figure 2-16.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: The batch method’s weight update calculation and training process
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: 'The batch method calculates the weight update as:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \triangle {w}_{ij}\kern0.62em =\kern0.62em \frac{1}{N}{\displaystyle \sum_{k=1}^N\triangle
    {w}_{ij}(k)} $$](A448947_1_En_2_Chapter_Equ6.gif)'
  id: totrans-180
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.6) where ∆w [ij] (k) is the weight update for the k -th training
    data and N is the total number of the training data.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: Because of the averaged weight update calculation, the batch method consumes
    a significant amount of time for training.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: Mini Batch
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The mini batch method is a blend of the SGD and batch methods. It selects a
    part of the training dataset and uses them for training in the batch method. Therefore,
    it calculates the weight updates of the selected data and trains the neural network
    with the averaged weight update. For example, if 20 arbitrary data points are
    selected out of 100 training data points, the batch method is applied to the 20
    data points. In this case, a total of five weight adjustments are performed to
    complete the training process for all the data points (5 = 100/20). Figure shows
    2-17 how the mini batch scheme selects training data and calculates the weight
    update.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig17_HTML.gif](A448947_1_En_2_Fig17_HTML.gif)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
- en: Figure 2-17.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: How the mini batch scheme selects training data and calculates the weight update
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: 'The mini batch method , when it selects an appropriate number of data points,
    obtains the benefits from both methods: speed from the SGD and stability from
    the batch. For this reason, it is often utilized in Deep Learning, which manipulates
    a significant amount of data.'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s delve a bit into the SGD , batch, and mini batch in terms of the
    epoch. The epoch is briefly introduced in the “Training of a Single-Layer Neural
    Network: Delta Rule” section. As a recap, the epoch is the number of completed
    training cycles for all of the training data. In the batch method, the number
    of training cycles of the neural network equals an epoch, as shown in Figure [2-18](#Fig18).
    This makes perfect sense because the batch method utilizes all of the data for
    one training process.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig18_HTML.gif](A448947_1_En_2_Fig18_HTML.gif)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
- en: Figure 2-18.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: The number of training cycles of the neural network equals an epoch
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, in the mini batch, the number of training processes for one epoch
    varies depending on the number of data points in each batch. When we have N training
    data points in total, the number of training processes per epoch is greater than
    one, which corresponds to the batch method , and smaller than N, which corresponds
    to the SGD .
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Delta Rule'
  id: totrans-194
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You are now ready to implement the delta rule as a code. Consider a neural network
    that consists of three input nodes and one output node, as shown in Figure [2-19](#Fig19).
    The sigmoid function is used for the activation function of the output node.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig19_HTML.gif](A448947_1_En_2_Fig19_HTML.gif)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
- en: Figure 2-19.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
- en: Neural network that consists of three input nodes and one output node
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
- en: We have four training data points, as shown in the following table. As they
    are used for supervised learning, each data point consists of an input-correct
    output pair. The last bold number of each dataset is the correct output.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Figa_HTML.gif](A448947_1_En_2_Figa_HTML.gif)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
- en: 'Let’s train the neural network with this data. The delta rule for the sigmoid
    function, which is given by Equation 2.5, is the learning rule. Equation 2.5 can
    be rearranged as a step-by-step process, as follows:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \begin{array}{c}{\delta}_i\kern1em =\kern1em \varphi \left({v}_i\right)\left(1-\varphi
    \left({v}_i\right)\right)\kern0.2em {e}_i\\ {}\varDelta {w}_{i j}\kern1em =\kern1em
    \alpha \kern0.2em {\delta}_i\kern0.1em {x}_j\\ {}{w}_{i j}\kern1em \leftarrow
    \kern1em {w}_{i j}\kern0.5em +\kern0.5em \varDelta {w}_{i j}\end{array} $$](A448947_1_En_2_Chapter_Equ7.gif)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
- en: (Equation 2.7)
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: We will implement the delta rule using the SGD and batch methods for the example
    neural network. As it is single-layered and contains simple training data, the
    code is not complicated. Once you follow the code, you will clearly see the difference
    between the SGD code and the batch code. As previously addressed, the SGD trains
    every data point immediately and does not require addition or averages of the
    weight updates. Therefore, the code for the SGD is simpler than that of the batch.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: Implementation of the SGD Method
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The function `DeltaSGD` is the SGD method of the delta rule given by Equation
    2.7\. It takes the weights and training data of the neural network and returns
    the newly trained weights.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-207
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: where `W` is the argument that carries the weights. `X` and `D` carry the inputs
    and correct outputs of the training data, respectively. The training data is divided
    into two variables for convenience. The following listing shows the `DeltaSGD.m`
    file, which implements the `DeltaSGD` function .
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-209
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The code proceeds as follows: Take one of the data points and calculate the
    output, `y`. Calculate the difference between this output and the correct output,
    `d`. Calculate the weight update, `dW`, according to the delta rule. Using this
    weight update, adjust the weight of neural network. Repeat the process for the
    number of the training data points, `N`. This way, the function `DeltaSGD` trains
    the neural network for every epoch.'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: The function `Sigmoid` that `DeltaSGD` calls is listed next. This outlines the
    pure definition of the sigmoid function and is implemented in the `Sigmoid.m`
    file. As it is a very simple code, we skip further discussion of it.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-212
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The following listing shows the `TestDeltaSGD.m` file , which tests the `DeltaSGD`
    function . This program calls the function `DeltaSGD`, trains it 10,000 times,
    and displays the output from the trained neural network with the input of all
    the training data. We can see how well the neural network was trained by comparing
    the output with the correct output.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: This code initializes the weights with random real numbers between -1 and 1\.
    Executing this code produces the following values. These output values are very
    close to the correct outputs in `D`. Therefore, we can conclude that the neural
    network has been properly trained.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\kern0.1em \begin{array}{c}\hfill 0.0102\hfill \\ {}\hfill 0.0083\hfill
    \\ {}\hfill 0.9932\hfill \\ {}\hfill 0.9917\hfill \end{array}\kern0.1em \right]\kern2em
    \iff \kern2em D\kern0.5em =\kern0.5em \left[\;\begin{array}{c}\hfill 0\hfill \\
    {}\hfill 0\hfill \\ {}\hfill 1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]
    $$](A448947_1_En_2_Chapter_Equq.gif)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
- en: Every example code in this book consists of the implementation of the algorithm
    and the test program in separate files. This is because putting them together
    often makes the code more complicated and hampers efficient analysis of the algorithm.
    The file name of the test program starts with `Test` and is followed by the name
    on the algorithm file. The algorithm file is named after the function name, in
    compliance with the naming convention of MATLAB. For example, the implementation
    file of the `DeltaSGD` function is named `DeltaSGD.m`.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
- en: '| Algorithm implementation | `example/ DeltaSGD.m` |'
  id: totrans-218
  prefs: []
  type: TYPE_TB
- en: '| Test program | `example/ TestDeltaSGD.m` |'
  id: totrans-219
  prefs: []
  type: TYPE_TB
- en: Implementation of the Batch Method
  id: totrans-220
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The function `DeltaBatch` implements the delta rule of Equation 2.7 using the
    batch method. It takes the weights and training data of the neural network and
    returns trained weights.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In this function definition, the variables carry the same meaning as those in
    the function `DeltaSGD`; `W` is the weight of the neural network, `X` and `D`
    are the input and correct output of the training data, respectively. The following
    listing shows the `DeltaBatch.m` file, which implements the function `DeltaBatch`
    .
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This code does not immediately train the neural network with the weight update,
    `dW`, of the individual training data points. It adds the individual weight updates
    of the entire training data to `dWsum` and adjusts the weight just once using
    the average, `dWavg`. This is the fundamental difference that separates this method
    from the SGD method . The averaging feature of the batch method allows the training
    to be less sensitive to the training data.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 此代码不会立即使用单个训练数据点的权重更新`dW`来训练神经网络。它将整个训练数据的单个权重更新加到`dWsum`上，并使用平均值`dWavg`调整权重一次。这是与SGD方法区分的基本差异。批处理方法的平均特性使得训练对训练数据不那么敏感。
- en: Recall that Equation 2.6 yields the weight update. It will be much easier to
    understand this equation when you look into it using the previous code. Equation
    2.6 is shown here again, for your convenience.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 回想一下，方程2.6给出了权重更新。当你使用前面的代码查看它时，理解这个方程会容易得多。为了方便起见，这里再次显示方程2.6。
- en: '![$$ \triangle {w}_{ij}\kern0.62em =\kern0.62em \frac{1}{N}{\displaystyle \sum_{k=1}^N\triangle
    {w}_{ij}(k)} $$](A448947_1_En_2_Chapter_Equr.gif)'
  id: totrans-227
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A448947_1_En_2_Chapter_Equr.gif)'
- en: where ∆w [ij] (k) is the weight update for the k -th training data point.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 其中∆w[ij](k)是第k个训练数据点的权重更新。
- en: The following program listing shows the `TestDeltaBatch.m` file that tests the
    function `DeltaBatch` . This program calls in the function `DeltaBatch` and trains
    the neural network 40,000 times. All the training data is fed into the trained
    neural network, and the output is displayed. Check the output and correct output
    from the training data to verify the adequacy of the training.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 以下程序列表显示了测试`DeltaBatch`函数的`TestDeltaBatch.m`文件。此程序调用`DeltaBatch`函数并训练神经网络40,000次。所有训练数据都输入到训练好的神经网络中，并显示输出。检查输出和从训练数据得到的正确输出，以验证训练的充分性。
- en: '[PRE6]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Next, execute this code, and you will see the following values on your screen.
    The output is very similar to the correct output, `D` . This verifies that the
    neural network has been properly trained.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，执行此代码，你将在屏幕上看到以下值。输出与正确输出`D`非常相似。这证实了神经网络已经被正确训练。
- en: '![$$ \left[\kern0.1em \begin{array}{c}\hfill 0.0102\hfill \\ {}\hfill 0.0083\hfill
    \\ {}\hfill 0.9932\hfill \\ {}\hfill 0.9917\hfill \end{array}\kern0.1em \right]\kern2em
    \iff \kern2em D\kern0.5em =\kern0.5em \left[\;\begin{array}{c}\hfill 0\hfill \\
    {}\hfill 0\hfill \\ {}\hfill 1\hfill \\ {}\hfill 1\hfill \end{array}\;\right]
    $$](A448947_1_En_2_Chapter_Equs.gif)'
  id: totrans-232
  prefs: []
  type: TYPE_IMG
  zh: '![公式](A448947_1_En_2_Chapter_Equs.gif)'
- en: As this test program is almost identical to the `TestDeltaSGD.m` file, we will
    skip the detailed explanation. An interesting point about this method is that
    it trained the neural network 40,000 times. Recall that the SGD method performed
    only 10,000 trainings. This indicates that the batch method requires more time
    to train the neural network to yield a similar level of accuracy of that of the
    SGD method. In other words, the batch method learns slowly.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个测试程序几乎与`TestDeltaSGD.m`文件相同，我们将跳过详细说明。关于这种方法的一个有趣点是它训练了神经网络40,000次。回想一下，SGD方法只进行了10,000次训练。这表明批处理方法需要更多的时间来训练神经网络，以达到与SGD方法相似的水平精度。换句话说，批处理方法学习速度较慢。
- en: Comparison of the SGD and the Batch
  id: totrans-234
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SGD和批处理比较
- en: In this section, we practically investigate the learning speeds of the SGD and
    the batch. The errors of these methods are compared at the end of the training
    processes for the entire training data. The following program listing shows the
    `SGDvsBatch.m` file, which compares the mean error of the two methods. In order
    to evaluate a fair comparison, the weights of both methods are initialized with
    the same values.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们实际研究了SGD和批处理的收敛速度。这些方法在整个训练数据训练结束时的误差被比较。以下程序列表显示了比较两种方法平均误差的`SGDvsBatch.m`文件。为了进行公平的比较，两种方法的权重都初始化为相同的值。
- en: '[PRE7]'
  id: totrans-236
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This program trains the neural network 1,000 times for each function, `DeltaSGD`
    and `DeltaBatch`. At each epoch, it inputs the training data into the neural network
    and calculates the mean square error (`E1`, `E2`) of the output. Once the program
    completes 1,000 trainings, it generates a graph that shows the mean error at each
    epoch. As Figure [2-20](#Fig20) shows, the SGD yields faster reduction of the
    learning error than the batch; the SGD learns faster.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig20_HTML.gif](A448947_1_En_2_Fig20_HTML.gif)'
  id: totrans-238
  prefs: []
  type: TYPE_IMG
- en: Figure 2-20.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: The SGD method learns faster than the batch method
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of Single-Layer Neural Networks
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This section presents the critical reason that the single-layer neural network
    had to evolve into a multi-layer neural network. We will try to show this through
    a particular case. Consider the same neural network that was discussed in the
    previous section. It consists of three input nodes and an output node, and the
    activation function of the output node is a sigmoid function (Figure [2-21](#Fig21)).
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig21_HTML.gif](A448947_1_En_2_Fig21_HTML.gif)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
- en: Figure 2-21.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: Our same neural network
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: 'Assume that we have four training data points , as shown here. It is different
    from that of the “Example: Delta Rule” section in that the second and fourth correct
    outputs are switched while the inputs remain the same. Well, the difference is
    barely noticeable. It shouldn’t cause any trouble, right?'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Figb_HTML.gif](A448947_1_En_2_Figb_HTML.gif)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
- en: 'We will now train it with the delta rule using the SGD. As we are considering
    the same neural network, we can train it using the function `DeltaSGD` from the
    “Example: Delta Rule” section. We have to just change its name to `DeltaXOR`.
    The following program listing shows the `TestDeltaXOR.m` file, which tests the
    `DeltaXOR` function. This program is identical to the `TestDeltaSGD.m` file from
    the “Example: Delta Rule” section, except that it has different values for `D`,
    and it calls the `DeltaXOR` function instead of `DeltaSGD`.'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-249
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: When we run the code, the screen will show the following values, which consist
    of the output from the trained neural network corresponding to the training data.
    We can compare them with the correct outputs given by `D`.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \left[\kern0.1em \begin{array}{c}\hfill 0.5297\hfill \\ {}\hfill 0.5000\hfill
    \\ {}\hfill 0.4703\hfill \\ {}\hfill 0.4409\hfill \end{array}\kern0.1em \right]\kern2em
    \iff \kern2em D\kern0.5em =\kern0.5em \left[\;\begin{array}{c}\hfill 0\hfill \\
    {}\hfill 1\hfill \\ {}\hfill 1\hfill \\ {}\hfill 0\hfill \end{array}\;\right]
    $$](A448947_1_En_2_Chapter_Equt.gif)'
  id: totrans-251
  prefs: []
  type: TYPE_IMG
- en: 'What happened? We got two totally different sets. Training the neural network
    for a longer period does not make a difference. The only difference from the code
    from the “Example: Delta Rule” section is the correct output variable, `D`. What
    actually happened?'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: Illustrating the training data can help elucidate this problem. Let’s interpret
    the three values of the input data as the X, Y, and Z coordinates, respectively.
    As the third value, i.e. the Z coordinate, is fixed as 1, the training data can
    be visualized on a plane as shown in Figure [2-22](#Fig22).
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig22_HTML.gif](A448947_1_En_2_Fig22_HTML.gif)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
- en: Figure 2-22.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: Interpreting the three values of the input data as the X, Y, and Z coordinates
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: The values `0` and `1` in the circles are the correct outputs assigned to each
    point. One thing to notice from this figure is that we cannot divide the regions
    of `0` and `1` with a straight line. However, we may divide it with a complicated
    curve , as shown in Figure [2-23](#Fig23). This type of problem is said to be
    linearly inseparable.
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig23_HTML.gif](A448947_1_En_2_Fig23_HTML.gif)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
- en: Figure 2-23.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: We can only separate the regions of 0 and 1 with a complicated curve
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: 'In the same process, the training data from the “Example: Delta Rule” section
    on the X-Y plane appears in Figure [2-24](#Fig24).'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig24_HTML.gif](A448947_1_En_2_Fig24_HTML.gif)'
  id: totrans-262
  prefs: []
  type: TYPE_IMG
- en: Figure 2-24.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
- en: The delta rule training data
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: In this case, a straight border line that divides the regions of `0` and `1`
    can be found easily. This is a linearly separable problem (Figure [2-25](#Fig25)).
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
- en: '![A448947_1_En_2_Fig25_HTML.gif](A448947_1_En_2_Fig25_HTML.gif)'
  id: totrans-266
  prefs: []
  type: TYPE_IMG
- en: Figure 2-25.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: This data presents a linearly separable problem
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: To put it simply, the single-layer neural network can only solve linearly separable
    problems. This is because the single-layer neural network is a model that linearly
    divides the input data space. In order to overcome this limitation of the single-layer
    neural network, we need more layers in the network. This need has led to the appearance
    of the multi-layer neural network, which can achieve what the single-layer neural
    network cannot. As this is rather mathematical; it is fine to skip this portion
    if you are not familiar with it. Just keep in mind that the single-layer neural
    network is applicable for specific problem types . The multi-layer neural network
    has no such limitations.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-270
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This chapter covered the following concepts:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \begin{array}{l}{\delta}_i\kern0.72em =\kern0.62em {\varphi}^{\prime}\left({v}_i\right)\kern0.1em
    {e}_i\\ {}{w}_{i j}\kern1em \leftarrow \kern1em {w}_{i j}\kern0.5em +\kern0.5em
    \alpha \kern0.1em {\delta}_i\kern0.1em {x}_j\end{array} $$](A448947_1_En_2_Chapter_Equu.gif)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
- en: The delta rule is an iterative method that gradually reaches the solution. Therefore,
    the network should be repeatedly trained with the training data until the error
    is reduced to the satisfactory level.
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The single-layer neural network is applicable only to specific types of problems.
    Therefore, the single-layer neural network has very limited usages. The multi-layer
    neural network has been developed to overcome the essential limitations of the
    single-layer neural network.
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The method used to adjust the weight according to the training data is called
    the learning rule .
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据训练数据调整权重的称为学习规则。
- en: 'There are three major types of error calculations: the stochastic gradient
    descent, batch, and mini batch.'
  id: totrans-276
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 存在三种主要的错误计算类型：随机梯度下降、批量和迷你批量。
- en: The delta rule is the representative learning rule of the neural network. Its
    formula varies depending on the activation function.
  id: totrans-277
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Delta规则是神经网络的代表性学习规则。其公式根据激活函数的不同而变化。
- en: The neural network is a network of nodes, which imitate the neurons of the brain.
    The nodes calculate the weighted sum of the input signals and output the result
    of the activation function with the weighted sum.
  id: totrans-278
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经网络是由节点组成的网络，它模仿了大脑中的神经元。节点计算输入信号的加权总和，并输出加权总和的激活函数结果。
- en: Most neural networks are constructed with the layered nodes. For the layered
    neural network, the signal enters through the input layer, passes through the
    hidden layer, and exits through the output layer.
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大多数神经网络都是用分层节点构建的。对于分层神经网络，信号通过输入层进入，通过隐藏层传递，并通过输出层退出。
- en: In practice, the linear functions cannot be used as the activation functions
    in the hidden layer. This is because the linear function negates the effects of
    the hidden layer. However, in some problems such as regression, the output layer
    nodes may employ linear functions.
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实践中，线性函数不能用作隐藏层的激活函数。这是因为线性函数抵消了隐藏层的效果。然而，在某些问题如回归中，输出层节点可能会使用线性函数。
- en: For the neural network, supervised learning implements the process to adjust
    the weights and to reduce the discrepancies between the correct output and output
    of the neural network (Figure [2-26](#Fig26)).
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于神经网络，监督学习实现了调整权重并减少正确输出与神经网络输出之间差异的过程（图[2-26](#Fig26)）。
- en: '![A448947_1_En_2_Fig26_HTML.gif](A448947_1_En_2_Fig26_HTML.gif)'
  id: totrans-282
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![A448947_1_En_2_Fig26_HTML.gif](A448947_1_En_2_Fig26_HTML.gif)'
- en: Figure 2-26.
  id: totrans-283
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图2-26。
- en: Review of supervised learning
  id: totrans-284
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 监督学习综述
- en: Footnotes[1](#Fn1_source)
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 脚注[1](#Fn1_source)
- en: Unless otherwise noticed, the weight in this book includes bias as well.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 除非另有说明，本书中的权重包括偏差。
- en: '[2](#Fn2_source)'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: '[2](#Fn2_source)'
- en: It is also referred to as Adaline rule as well as Widrow-Hoff rule.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 它也被称为Adaline规则以及Widrow-Hoff规则。
- en: '[3](#Fn3_source)'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: '[3](#Fn3_source)'
- en: The delta rule is a type of numerical method called gradient descent . The gradient
    descent starts from the initial value and proceeds to the solution. Its name originates
    from its behavior whereby it searches for the solution as if a ball rolls down
    the hill along the steepest path. In this analogy, the position of the ball is
    the occasional output from the model, and the bottom is the solution. It is noteworthy
    that the gradient descent method cannot drop the ball to the bottom with just
    one throw.
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: Delta规则是一种称为梯度下降的数值方法。梯度下降从初始值开始，继续到解。它的名字来源于它的行为，就像一个球沿着最陡峭的路径滚下山一样寻找解。在这个类比中，球的位置是模型偶尔的输出，底部是解。值得注意的是，梯度下降方法不能只抛一次就将球扔到底部。
- en: '[4](#Fn4_source)'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: '[4](#Fn4_source)'
- en: The output from a sigmoid function is within the range of 0-1\. This behavior
    of the sigmoid function is useful when the neural network produces probability
    outputs.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid函数的输出范围在0-1之间。这种Sigmoid函数的行为在神经网络产生概率输出时非常有用。
