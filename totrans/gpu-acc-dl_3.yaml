- en: 4. Advanced GPU Programming for Deep Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4. 高级GPU编程用于深度学习
- en: 4.1 CUDA Programming Model
  id: totrans-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.1 CUDA编程模型
- en: 4.1.1 What Is CUDA?
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.1 什么是CUDA？
- en: CUDA (Compute Unified Device Architecture) is a parallel computing platform
    and programming model developed by NVIDIA to leverage the massive processing capabilities
    of its GPUs for general-purpose computing. By enabling compute-intensive algorithms
    to run directly on the GPU instead of the CPU, CUDA facilitates substantial performance
    gains for tasks that can be parallelized effectively. Introduced in 2007 alongside
    the NVIDIA Tesla GPU architecture, CUDA has since evolved into a cornerstone of
    high-performance computing. It is now widely used across various domains, including
    scientific computing, deep learning, image and signal processing, and large-scale
    simulations, due to its ability to unlock accelerated processing and efficient
    resource utilization.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA（统一计算设备架构）是由NVIDIA开发的一个并行计算平台和编程模型，旨在利用其GPU的强大处理能力进行通用计算。通过使计算密集型算法能够直接在GPU上而不是CPU上运行，CUDA为可以有效地并行化的任务提供了显著的性能提升。CUDA与NVIDIA
    Tesla GPU架构一起于2007年推出，此后已发展成为高性能计算的一个基石。由于其能够解锁加速处理和高效资源利用的能力，CUDA现在在各个领域得到广泛应用，包括科学计算、深度学习、图像和信号处理以及大规模模拟。
- en: Programming with CUDA is typically done using extensions to standard programming
    languages such as C, C++, and Fortran. In addition, high-level interfaces such
    as PyCUDA allow Python developers to write GPU-accelerated code using Python syntax.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 使用CUDA进行编程通常是通过扩展标准编程语言（如C、C++和Fortran）来完成的。此外，像PyCUDA这样的高级接口允许Python开发者使用Python语法编写GPU加速代码。
- en: 'CUDA is built around three fundamental abstractions that enable developers
    to express parallelism and manage hardware resources efficiently:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA围绕三个基本抽象构建，这些抽象使开发者能够表达并行性并有效地管理硬件资源：
- en: '**Hierarchy of Thread Groups:** CUDA organizes parallel computations using
    a hierarchy of threads. Threads are grouped into blocks, and blocks are further
    organized into grids. This hierarchical structure helps in expressing both data-level
    and task-level parallelism.'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**线程组层次结构**：CUDA使用线程的层次结构来组织并行计算。线程被分组到块中，而块进一步组织成网格。这种层次结构有助于表达数据级和任务级的并行性。'
- en: '**Shared Memory:** Each thread block can access a fast, on-chip shared memory
    space. This memory can enable communication and data sharing among threads within
    the same block, leading to significant performance optimizations.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**共享内存**：每个线程块都可以访问一个快速、片上共享内存空间。这种内存可以使得同一块内的线程之间进行通信和数据共享，从而实现显著的性能优化。'
- en: '**Barrier Synchronization:** CUDA provides mechanisms for synchronizing threads
    within a block. Thread synchronization ensures that all threads in a block reach
    a certain point in the program before proceeding, which is essential when working
    with shared data to avoid race conditions.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**屏障同步**：CUDA提供了同步块内线程的机制。线程同步确保在继续执行程序之前，块中的所有线程都达到程序中的某个特定点，这在处理共享数据时避免竞态条件是必不可少的。'
- en: These abstractions make CUDA a powerful model for exploiting fine-grained parallelism
    in modern computational problems.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这些抽象使CUDA成为利用现代计算问题中细粒度并行性的强大模型。
- en: 4.1.2 CUDA Programming Model
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.2 CUDA编程模型
- en: The CUDA programming model is designed to express and execute parallel algorithms
    on NVIDIA GPUs efficiently. It provides a structure for implementing fine-grained
    data parallelism and thread-level parallelism, which are nested within coarse-grained
    data parallelism and task parallelism. This multilevel parallelism enables CUDA
    to scale across thousands of GPU cores and efficiently utilize the GPU architecture.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA编程模型旨在高效地表达和执行在NVIDIA GPU上的并行算法。它提供了一个实现细粒度数据并行性和线程级并行性的结构，这些并行性嵌套在粗粒度数据并行性和任务并行性之中。这种多级并行性使CUDA能够扩展到数千个GPU核心，并有效地利用GPU架构。
- en: 'The CUDA model follows a three-step design pattern for parallel problem-solving:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA模型遵循一个三步设计模式来处理并行问题：
- en: '**Partitioning the Problem into Coarse-Grained Subproblems:** The first step
    in designing a CUDA-based solution is dividing the problem into multiple independent
    subproblems. These subproblems are large enough to be computed independently of
    each other. Each coarse-grained unit typically corresponds to a chunk of data
    or a portion of the computation that can be handled in parallel.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将问题划分为粗粒度子问题：** 设计基于CUDA的解决方案的第一步是将问题划分为多个独立的子问题。这些子问题足够大，可以独立于彼此计算。每个粗粒度单元通常对应于可以并行处理的数据块或计算部分。'
- en: '**Assigning Subproblems to Thread Blocks:** Once the problem is divided, each
    subproblem is assigned to a group of threads called a *block*. A thread block
    is a logical execution unit in CUDA and is scheduled independently by the GPU.
    Multiple blocks can run in parallel on different multiprocessors of the GPU. This
    level introduces coarse-grained parallelism in terms of blocks.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将子问题分配给线程块：** 一旦问题被分割，每个子问题就被分配给一组线程，称为*块*。线程块是CUDA中的一个逻辑执行单元，并由GPU独立调度。多个块可以在GPU的不同多处理器上并行运行。这一级别在块层面上引入了粗粒度并行性。'
- en: '**Decomposing Each Subproblem into Fine-Grained Tasks:** The assigned subproblem
    is further broken down within each block into smaller work items. The individual
    threads execute these tasks within the block. All threads in a block can share
    data using fast on-chip shared memory and can synchronize their execution to coordinate
    computations. This fine-grained parallelism at the thread level allows for efficient
    calculation of subtasks.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将每个子问题分解为细粒度任务：** 分配的子问题在每个块内进一步分解成更小的作业项。各个线程在块内执行这些任务。块中的所有线程都可以使用快速的片上共享内存共享数据，并可以同步它们的执行以协调计算。这种在线程级别的细粒度并行性允许高效地计算子任务。'
- en: Figure [4.1](#Fig1) shows the hierarchical model containing grid to blocks to
    threads, which provides flexibility in mapping complex computational tasks to
    the GPU architecture. It allows developers to exploit both interblock parallelism
    and intrablock parallelism, leading to efficient and scalable parallel execution.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [4.1](#Fig1) 展示了包含网格到块再到线程的层次模型，该模型在将复杂的计算任务映射到GPU架构时提供了灵活性。它允许开发者利用块间并行性和块内并行性，从而实现高效且可扩展的并行执行。
- en: '![Diagram illustrating the CUDA execution hierarchy. It shows a grid containing
    multiple blocks. Each block consists of threads and shared memory. The structure
    emphasizes the organization of threads within blocks and blocks within a grid,
    highlighting the parallel processing architecture.](../images/641715_1_En_4_Chapter/641715_1_En_4_Fig1_HTML.jpg)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![说明CUDA执行层次结构的图。它显示了一个包含多个块的网格。每个块由线程和共享内存组成。该结构强调了块内线程和网格内块的组织结构，突出了并行处理架构。](../images/641715_1_En_4_Chapter/641715_1_En_4_Fig1_HTML.jpg)'
- en: Fig. 4.1
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4.1
- en: The CUDA Execution Hierarchy highlights how threads are organized into warps,
    blocks, and grids to efficiently utilize the GPU’s parallel architecture
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA执行层次结构突出了线程如何组织成warp、块和网格，以有效地利用GPU的并行架构。
- en: 4.1.3 Heterogeneous Computing
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.3 异构计算
- en: Heterogeneous computing is a computing paradigm in which a system utilizes more
    than one processor or computational unit to perform a task. The goal is to leverage
    the strengths of different types of processors for improved performance, power
    efficiency, or scalability. In the context of CUDA and GPU computing, heterogeneous
    systems typically combine a CPU (central processing unit) and a GPU (graphics
    processing unit), working together to solve a computational problem.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 异构计算是一种计算范式，其中系统利用多个处理器或计算单元来执行任务。目标是利用不同类型处理器的优势，以提高性能、功率效率或可扩展性。在CUDA和GPU计算中，异构系统通常结合CPU（中央处理单元）和GPU（图形处理单元），共同解决计算问题。
- en: In such a system, we distinguish between two primary components.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样的系统中，我们区分两个主要组件。
- en: 4.1.3.1 Host
  id: totrans-23
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.3.1 主机
- en: The **host** refers to the CPU and its associated memory, often called *host
    memory*. The CPU is responsible for general-purpose computing tasks, including
    program control flow, task scheduling, and memory management. It initializes the
    program, prepares data, and launches computations on the GPU. The host manages
    communication and data transfer between itself and the GPU device.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**主机**指的是 CPU 及其相关内存，通常称为*主机内存*。CPU 负责通用计算任务，包括程序控制流、任务调度和内存管理。它初始化程序，准备数据，并在
    GPU 上启动计算。主机管理自身与 GPU 设备之间的通信和数据传输。'
- en: 4.1.3.2 Device
  id: totrans-25
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.3.2 设备
- en: The **device** refers to the GPU and its dedicated memory, known as *device
    memory*. The GPU excels at highly parallel tasks and is optimized for executing
    thousands of threads concurrently. It is well-suited for data-parallel and compute-intensive
    workloads such as matrix operations, image processing, and deep learning.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**设备**指的是 GPU 及其专用内存，称为*设备内存*。GPU 在高度并行任务方面表现出色，并针对同时执行数千个线程进行了优化。它非常适合数据并行和计算密集型工作负载，如矩阵运算、图像处理和深度学习。'
- en: 4.1.3.3 Interaction Between Host and Device
  id: totrans-27
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.3.3 主机和设备之间的交互
- en: 'In CUDA-based heterogeneous computing, the typical workflow includes the following
    steps:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在基于 CUDA 的异构计算中，典型的流程包括以下步骤：
- en: Allocate memory on the host (CPU) and the device (GPU).
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在主机（CPU）和设备（GPU）上分配内存。
- en: Transfer input data from host memory to device memory.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将输入数据从主机内存传输到设备内存。
- en: Launch one or more kernels (GPU functions) from the host to execute on the device.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从主机启动一个或多个内核（GPU 函数）以在设备上执行。
- en: Copy results from device memory back to host memory.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将设备内存中的结果复制回主机内存。
- en: Deallocate memory resources on both host and device.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在主机和设备上释放内存资源。
- en: Efficient data transfer and synchronization between the host and device are
    critical for achieving optimal performance in heterogeneous systems. CUDA provides
    APIs for memory management and kernel execution to facilitate this interaction.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在异构系统中实现最佳性能，主机和设备之间的有效数据传输和同步至关重要。CUDA 提供了用于内存管理和内核执行的 API，以促进这种交互。
- en: '![Code snippet titled "Serial Code on Host (CPU)" showing C language syntax
    for memory allocation and data transfer. It includes variable declarations for
    pointers `in`, `out`, `d_in`, and `d_out`. The code calculates `size` using ``,
    `RADIUS`, and `sizeof(int)`. Memory is allocated for `in` and `out` using `malloc`,
    and initialized with `fill_ints`. CUDA functions `cudaMalloc` and `cudaMemcpy`
    are used for memory allocation and data transfer between host and device.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaa_HTML.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![代码片段标题为“主机（CPU）上的串行代码”，显示内存分配和数据传输的 C 语言语法。它包括指针 `in`、`out`、`d_in` 和 `d_out`
    的变量声明。代码使用 `RADIUS` 和 `sizeof(int)` 计算 `size`。使用 `malloc` 为 `in` 和 `out` 分配内存，并使用
    `fill_ints` 初始化。CUDA 函数 `cudaMalloc` 和 `cudaMemcpy` 用于在主机和设备之间进行内存分配和数据传输。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaa_HTML.png)'
- en: '![Screenshot of parallel code for a GPU device. The code defines a global function
    `stencil_1d` with integer pointers `in` and `out`. It uses shared memory for a
    temporary array `temp` and calculates indices `gindex` and `lindex`. The code
    includes a conditional statement to handle boundary conditions and a loop to compute
    results using the `temp` array. The final result is stored in the `out` array.
    Key functions include `__syncthreads()` for synchronization.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaab_HTML.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![GPU 设备的并行代码截图。代码定义了一个全局函数 `stencil_1d`，具有整数指针 `in` 和 `out`。它使用共享内存来存储临时数组
    `temp` 并计算索引 `gindex` 和 `lindex`。代码包括一个条件语句来处理边界条件，并使用 `temp` 数组计算结果的循环。最终结果存储在
    `out` 数组中。关键函数包括用于同步的 `__syncthreads()`。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaab_HTML.png)'
- en: '![Code snippet titled "Launching the Kernel and Final Steps" showing CUDA operations.
    It includes a kernel launch with `stencil_1d` and memory operations like `cudaMemcpy`,
    `free`, and `cudaFree`. The code manages input and output data with specified
    block sizes and memory transfers between device and host.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaac_HTML.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![代码片段标题为“启动内核和最终步骤”，显示 CUDA 操作。它包括使用 `stencil_1d` 的内核启动和内存操作，如 `cudaMemcpy`、`free`
    和 `cudaFree`。代码使用指定的块大小管理输入和输出数据，并在设备和主机之间进行内存传输。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaac_HTML.png)'
- en: '![Code snippet titled "Main Function and Constants" showing C language code.
    It defines constants as 1024, RADIUS as 3, and BLOCK_SIZE as 16\. A function `fill_ints`
    takes an integer pointer and an integer, calling `fill_n` with these parameters
    and 1\. The `main` function includes a comment about memory setup and kernel launch,
    returning 0.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaad_HTML.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![标题为“主函数和常量”的代码片段，展示了C语言代码。它将常量定义为1024，RADIUS为3，BLOCK_SIZE为16。函数`fill_ints`接受一个整数指针和一个整数，使用这些参数和1调用`fill_n`。`main`函数包含有关内存设置和内核启动的注释，返回0。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaad_HTML.png)'
- en: 4.1.4 CUDA Extensions to C/C++
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.4 CUDA对C/C++的扩展
- en: CUDA (Compute Unified Device Architecture) extends the C/C++ programming languages
    with features specifically designed for general-purpose GPU programming. These
    extensions allow developers to write parallel programs that can be executed efficiently
    on NVIDIA GPUs. The CUDA model introduces new syntax, keywords, and API functions
    to support kernel-based parallelism, memory management, and thread organization.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA（计算统一设备架构）通过为通用GPU编程设计特定功能来扩展C/C++编程语言。这些扩展允许开发者编写可以在NVIDIA GPU上高效执行的并行程序。CUDA模型引入了新的语法、关键字和API函数来支持基于内核的并行性、内存管理和线程组织。
- en: 4.1.4.1 Function Launch and Kernel Execution
  id: totrans-41
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.1 函数启动和内核执行
- en: 'In CUDA, functions intended to run on the GPU are called **kernels**. These
    are launched from the host (CPU) using a special syntax involving triple angle
    brackets:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在CUDA中，旨在在GPU上运行的函数被称为**内核**。这些内核通过主机（CPU）使用特殊语法（涉及三个尖括号）启动：
- en: '![The image shows a code snippet for launching a kernel in parallel computing.
    It reads: `kernelName<<<gridDim, blockDim>>>(arguments);`. The snippet includes
    placeholders for the kernel name, grid dimensions, block dimensions, and arguments.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaae_HTML.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![该图像显示了并行计算中启动内核的代码片段。内容为：“`kernelName<<<gridDim, blockDim>>>(arguments);`”。该片段包括内核名称、网格维度、块维度和参数的占位符。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaae_HTML.png)'
- en: This syntax indicates that the GPU will execute the kernel using `gridDim` blocks,
    each containing `blockDim` threads. Each thread executes the same code but can
    operate on different data, enabling data-parallel execution.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 此语法表示GPU将使用`gridDim`个块执行内核，每个块包含`blockDim`个线程。每个线程执行相同的代码，但可以操作不同的数据，从而实现数据并行执行。
- en: 4.1.4.2 Calling Functions on the GPU
  id: totrans-45
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.2 在GPU上调用函数
- en: 'CUDA allows functions to be executed either on the host or the device, or called
    from one device function to another. This is specified using qualifiers:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA允许函数在主机或设备上执行，或者从一个设备函数调用另一个设备函数。这是通过修饰符来指定的。
- en: '![The image is a list explaining CUDA function qualifiers. It includes: - `__global__`:
    Declares a kernel function called from the host, executed on the device. - `__device__`:
    Declares a function that both runs and is called from the device. - `__host__`:
    Optional; indicates the function is executed on the host (default behavior).](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaf_HTML.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![该图像是一个解释CUDA函数修饰符的列表。它包括：- `__global__`：声明一个从主机调用的内核函数，在设备上执行。- `__device__`：声明一个既在设备上运行又从设备调用的函数。-
    `__host__`：可选；表示函数在主机（默认行为）上执行。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaf_HTML.png)'
- en: 4.1.4.3 Memory Management
  id: totrans-48
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.3 内存管理
- en: CUDA extends memory control beyond standard C/C++ by introducing device memory
    management routines. These include
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA通过引入设备内存管理例程来扩展标准C/C++的内存控制。这些包括
- en: '![A screenshot displaying a list of CUDA functions with descriptions: "cudaMalloc()
    - Allocates memory on the GPU," "cudaMemcpy() - Transfers data between host and
    device memory," and "cudaFree() - Deallocates memory on the GPU."](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaag_HTML.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![截图显示了一组带有描述的CUDA函数：“cudaMalloc() - 在GPU上分配内存”，“cudaMemcpy() - 在主机和设备内存之间传输数据”，“cudaFree()
    - 在GPU上释放内存。”](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaag_HTML.png)'
- en: These functions are necessary because the host and device have separate memory
    spaces. Proper memory management ensures efficient data transfers and overall
    performance.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数是必要的，因为主机和设备有独立的内存空间。适当的内存管理确保了高效的数据传输和整体性能。
- en: 4.1.4.4 Memory Declaration Qualifiers
  id: totrans-52
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.4 内存声明修饰符
- en: 'CUDA introduces qualifiers to declare variables in different memory spaces:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA通过引入用于声明不同内存空间变量的修饰符来扩展内存控制：
- en: '![A list explaining CUDA memory qualifiers: "__shared__" for on-chip shared
    memory accessible by all threads in a block, "__global__" for kernel functions,
    "__device__" for variables or functions in device memory, "__constant__" for read-only
    memory accessible to all threads, and "__local__" for thread-private memory in
    device DRAM.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaah_HTML.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![解释CUDA内存限定符的列表：“__shared__”表示块内所有线程可访问的片上共享内存，“__global__”表示内核函数，“__device__”表示设备内存中的变量或函数，“__constant__”表示所有线程可访问的只读内存，“__local__”表示设备DRAM中的线程私有内存。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaah_HTML.png)'
- en: These qualifiers help optimize memory access patterns and allow explicit control
    over variable storage.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这些限定符有助于优化内存访问模式，并允许对变量存储进行显式控制。
- en: 4.1.4.5 Special Instructions
  id: totrans-56
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.5 特殊指令
- en: 'CUDA provides synchronization and memory consistency primitives to ensure correct
    execution of parallel threads:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA提供同步和内存一致性原语以确保并行线程的正确执行：
- en: '![The image is a text box listing CUDA functions for thread synchronization.
    It includes: - `__syncthreads()`: Synchronizes all threads within a block. - `__threadfence()`,
    `__threadfence_block()`: Ensure ordering of memory operations across threads or
    blocks.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaai_HTML.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图像是一个文本框，列出了用于线程同步的CUDA函数。包括：- `__syncthreads()`：同步块内所有线程。- `__threadfence()`，`__threadfence_block()`：确保跨线程或块的内存操作顺序。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaai_HTML.png)'
- en: These are crucial when multiple threads collaborate and share data during execution.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当多个线程在执行过程中协作并共享数据时，这些标识符至关重要。
- en: 4.1.4.6 Thread and Block Identification Keywords
  id: totrans-60
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.6 线程和块标识符
- en: 'CUDA offers built-in variables to determine a thread’s unique position within
    the execution grid:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA提供内置变量以确定线程在执行网格中的唯一位置：
- en: '![A list of terms related to thread and block indexing in a grid, formatted
    with bullet points. The terms include: "threadIdx" for the index of a thread within
    its block as a 3D vector, "blockIdx" for the index of a block within the grid
    as a 3D vector, "blockDim" for the dimensions of a thread block, and "gridDim"
    for the dimensions of the grid.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaj_HTML.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![与网格中线程和块索引相关的术语列表，以项目符号格式呈现。术语包括：“threadIdx”表示线程在其块内的索引，作为一个3D向量，“blockIdx”表示块在网格内的索引，作为一个3D向量，“blockDim”表示线程块的维度，“gridDim”表示网格的维度。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaj_HTML.png)'
- en: These identifiers are used to assign data or tasks to individual threads. They
    provide fine-grained control over how a program is parallelized and how data is
    accessed.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这些标识符用于将数据或任务分配给单个线程。它们提供了对程序如何并行化以及数据如何访问的精细控制。
- en: 4.1.4.7 Function Declarations in CUDA
  id: totrans-64
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.7 CUDA中的函数声明
- en: 'In CUDA programming, function qualifiers specify where a function will execute
    (host or device) and from where it can be called. These qualifiers are essential
    in determining how code interacts with CPU (host) and GPU (device) memory and
    execution threads. CUDA defines three primary function qualifiers: `__device__`,
    `__global__`, and `__host__`. Understanding their behavior is key to writing efficient
    and correct CUDA programs.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在CUDA编程中，函数限定符指定函数将在何处执行（主机或设备）以及可以从哪里调用。这些限定符对于确定代码如何与CPU（主机）和GPU（设备）内存以及执行线程交互至关重要。CUDA定义了三个主要函数限定符：`__device__`、`__global__`和`__host__`。理解它们的行为是编写高效和正确CUDA程序的关键。
- en: 4.1.4.8 CUDA Function Qualifiers Overview
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.8 CUDA函数限定符概述
- en: The Table [4.1](#Tab1) gives the basic syntax of function description, execution
    mode and callable from.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 表 [4.1](#Tab1) 提供了函数描述、执行模式和可调用的基本语法。
- en: Table 4.1
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 表 4.1
- en: CUDA Function Qualifiers and Their Execution/Call Context
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA函数限定符及其执行/调用上下文
- en: '| Function declaration | Executed on | Callable from |'
  id: totrans-70
  prefs: []
  type: TYPE_TB
  zh: '| 函数声明 | 执行于 | 可从 |'
- en: '| --- | --- | --- |'
  id: totrans-71
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `__device__ float deviceFunc()` | Device | Device |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
  zh: '| `__device__ float deviceFunc()` | 设备 | 设备 |'
- en: '| `__global__ void kernelFunc()` | Device | Host |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
  zh: '| `__global__ void kernelFunc()` | 设备 | 主机 |'
- en: '| `__host__ float hostFunc()` | Host | Host |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
  zh: '| `__host__ float hostFunc()` | 主机 | 主机 |'
- en: 4.1.4.9 Function Qualifier Descriptions
  id: totrans-75
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.9 函数限定符描述
- en: '`__device__`: Declares a function that runs on the GPU and can only be invoked
    from device or global functions. These functions are not accessible directly from
    the CPU.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__device__`: 声明一个在GPU上运行的函数，并且只能从设备或全局函数中调用。这些函数不能直接从CPU访问。'
- en: '`__global__`: Declares a kernel function that executes on the GPU but is invoked
    from the host using the kernel launch syntax (e.g., `<<<...>>>`).'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__global__`：声明一个在GPU上执行但使用内核启动语法（例如`<<<...>>>`）从主机调用的内核函数。'
- en: '`__host__`: Declares a function that executes on the CPU and can be called
    from other host functions. By default, all C++ functions are treated as host functions
    unless specified otherwise.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__host__`：声明一个在CPU上执行并可从其他主机函数调用的函数。默认情况下，所有C++函数都被视为主机函数，除非另有指定。'
- en: '4.1.4.10 Example: CUDA Function Declarations in Action'
  id: totrans-79
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.1.4.10 示例：CUDA函数声明在实际中的应用
- en: '![Code screenshot showing CUDA C++ functions for squaring numbers. The `__device__`
    function `square` takes a float `x` and returns its square. The `__global__` function
    `squareKernel` calculates the square of elements in an input array `d_in` and
    stores results in `d_out`. The `__host__` function `launchKernel` manages memory
    allocation and data transfer between host and device, invoking `squareKernel`
    to process data. Functions include `cudaMalloc`, `cudaMemcpy`, and `cudaFree`
    for memory management.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaak_HTML.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![代码截图显示了用于平方数字的CUDA C++函数。`__device__`函数`square`接受一个`float`类型的`x`并返回其平方。`__global__`函数`squareKernel`计算输入数组`d_in`中元素的平方并将结果存储在`d_out`中。`__host__`函数`launchKernel`管理内存分配和主机与设备之间的数据传输，调用`squareKernel`来处理数据。包括用于内存管理的`cudaMalloc`、`cudaMemcpy`和`cudaFree`函数。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaak_HTML.png)'
- en: '![The image displays a LaTeX code snippet illustrating an itemized list. The
    list includes three items: a `__device__` function for computing squares on a
    GPU, a `__global__` kernel launched from the host, and a `__host__` function that
    manages memory and launches the kernel.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaal_HTML.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![该图像显示了一个LaTeX代码片段，说明了项目符号列表。列表包括三个项目：一个用于在GPU上计算平方的`__device__`函数，从主机启动的`__global__`内核，以及一个管理内存并启动内核的`__host__`函数。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaal_HTML.png)'
- en: 4.2 Variable Type Qualifiers in CUDA
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.2 CUDA中的变量类型限定符
- en: '![Table illustrating memory scope and lifetime in a programming context. The
    table has two columns: "Memory Scope" and "Lifetime." It lists different variable
    declarations with their respective memory scopes and lifetimes. For example, "int
    localVar" is in the register memory scope with a thread lifetime. "__device__
    __local__ int localVar" has a local memory scope and thread lifetime. "__device__
    __shared__ int sharedVar" has a shared memory scope and block lifetime. "__device__
    int globalVar" has a global memory scope and grid lifetime.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaam_HTML.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![表格说明了编程上下文中的内存作用域和生命周期。表格有两列：“内存作用域”和“生命周期”。它列出了不同的变量声明及其相应的内存作用域和生命周期。例如，“int
    localVar”在寄存器内存作用域中，具有线程生命周期。“__device__ __local__ int localVar”具有局部内存作用域和线程生命周期。“__device__
    __shared__ int sharedVar”具有共享内存作用域和块生命周期。“__device__ int globalVar”具有全局内存作用域和网格生命周期。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaam_HTML.png)'
- en: 'In CUDA programming, variables are stored in different types of memory depending
    on their declaration and qualifiers. Understanding these memory types is essential
    for optimizing performance, reducing memory latency, and ensuring correct data
    access patterns across threads and blocks. Below are some important points about
    variable memory qualifiers in CUDA:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在CUDA编程中，变量的存储取决于它们的声明和限定符。理解这些内存类型对于优化性能、减少内存延迟以及确保线程和块之间正确的数据访问模式至关重要。以下是一些关于CUDA中变量内存限定符的重要要点：
- en: '**Automatic variables without qualifiers** are stored in registers, which are
    the fastest form of memory, and their lifetime is restricted to a single thread.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无限定符的自动变量**存储在寄存器中，这是最快的内存形式，其生命周期限制在单个线程内。'
- en: '**Local arrays** (i.e., arrays declared inside functions without special qualifiers)
    are stored in *local memory*, which resides in global memory but is private to
    each thread. This happens because arrays typically exceed register capacity.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**局部数组**（即，在函数内部声明的没有特殊限定符的数组）存储在*局部内存*中，该内存位于全局内存中，但对每个线程是私有的。这是因为数组通常超过寄存器容量。'
- en: '`__shared__` variables reside in *shared memory*, which is visible to all threads
    within a block. This memory is useful for interthread communication within the
    block and offers much lower latency compared to global memory.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`__shared__`变量位于*共享内存*中，该内存对所有块内的线程都是可见的。这种内存对于块内线程间的通信很有用，并且与全局内存相比具有更低的延迟。'
- en: '`__device__` variables declared at file scope (i.e., outside functions) and
    without any other qualifiers are placed in *global memory*. This memory is accessible
    by all threads and persists throughout the lifetime of the application.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在文件作用域（即，在函数外部）声明的`__device__`变量（没有其他限定符）被放置在*全局内存*中。这种内存可以被所有线程访问，并且在整个应用程序的生命周期中持续存在。
- en: In CUDA, **pointers** can only refer to memory in global space. They cannot
    point to registers or local memory of other threads. This restriction ensures
    proper memory access and consistency across GPU threads.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在CUDA中，**指针**只能引用全局空间中的内存。它们不能指向寄存器或其他线程的局部内存。这种限制确保了GPU线程之间正确的内存访问和一致性。
- en: Each of these memory types plays a specific role in GPU computation, and their
    correct usage is essential for achieving optimal throughput and minimizing bottlenecks.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这些内存类型中的每一种在GPU计算中都扮演着特定的角色，并且它们的正确使用对于实现最佳吞吐量和最小化瓶颈至关重要。
- en: 4.2.1 SIMT Architecture
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.1 SIMT架构
- en: The SIMT (Single Instruction, Multiple Threads) architecture is a fundamental
    design principle of modern GPU programming frameworks like CUDA. SIMT enables
    multiple threads to execute the same instruction concurrently on different data
    elements, thus harnessing the inherent parallelism of GPU hardware. While SIMT
    resembles SIMD (Single Instruction, Multiple Data) in structure, it adds layer
    of flexibility through multithreading. Unlike SIMD, where developers must often
    be aware of the vector width and explicitly manage it in their code, SIMT abstracts
    these hardware details, enabling a simpler and more scalable programming model.
    In SIMT, a group of threads called a warp (typically 32 threads) executes instructions
    in lockstep, but each thread maintains its program counter and register state,
    allowing divergent control flows. This multithreaded execution model will enable
    developers to write scalar-like code that automatically scales across thousands
    of cores. As a result, the need to know the exact number of cores is largely eliminated,
    and developers can focus on the data-parallel nature of their problems rather
    than the specific execution units.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: SIMT（单指令多线程）架构是现代GPU编程框架（如CUDA）的基本设计原则。SIMT允许多个线程在不同的数据元素上并发执行相同的指令，从而利用GPU硬件固有的并行性。虽然SIMT在结构上类似于SIMD（单指令多数据），但它通过多线程增加了一层灵活性。与SIMD不同，开发者必须经常了解向量宽度并在代码中显式管理它，SIMT抽象了这些硬件细节，使得编程模型更简单、更可扩展。在SIMT中，一组线程（称为warp，通常是32个线程）以锁步方式执行指令，但每个线程都保持其程序计数器和寄存器状态，允许不同的控制流。这种多线程执行模型将使开发者能够编写类似标量的代码，该代码可以自动扩展到数千个核心。因此，了解确切核心数量的需求在很大程度上被消除，开发者可以专注于他们问题的数据并行特性，而不是特定的执行单元。
- en: 4.2.1.1 Mapping Blocks and Threads
  id: totrans-93
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.1.1 映射块和线程
- en: In CUDA, when a kernel function is launched from the host (CPU), it defines
    a grid of thread blocks that must be mapped to the hardware resources of the GPU.
    This process is crucial to achieving efficient execution and maximizing parallel
    throughput. Each block is assigned to a streaming multiprocessor (SM), the basic
    compute unit in the GPU. Once assigned, all threads within a thread block execute
    concurrently on a single SM. Each thread block has access to shared memory and
    can synchronize internally, allowing efficient intrablock collaboration. Multiple
    thread blocks can also run simultaneously on a single SM, provided sufficient
    resources like registers and shared memory are available. As the thread blocks
    complete their execution, the CUDA runtime system dynamically schedules new blocks
    on the freed SMs. This process continues until all thread blocks have completed,
    ensuring high occupancy and effective utilization of GPU resources throughout
    the kernel’s execution.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在CUDA中，当从主机（CPU）启动内核函数时，它定义了一个线程块网格，该网格必须映射到GPU的硬件资源。这个过程对于实现高效执行和最大化并行吞吐量至关重要。每个块被分配到一个流式多处理器（SM），这是GPU中的基本计算单元。一旦分配，线程块中的所有线程将在单个SM上并发执行。每个线程块都可以访问共享内存并能够内部同步，从而实现高效的块内协作。如果可用足够的资源，如寄存器和共享内存，多个线程块也可以在单个SM上同时运行。随着线程块完成执行，CUDA运行时系统会动态地将新的块调度到释放的SM上。这个过程会一直持续到所有线程块都完成，确保在整个内核执行过程中GPU资源的高占用率和有效利用。
- en: 4.2.1.2 Thread Life Cycle in a GPU
  id: totrans-95
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.1.2 GPU中的线程生命周期
- en: 'The thread life cycle on a GPU begins with the launch of a kernel function,
    which triggers the creation of a grid consisting of multiple thread blocks. These
    thread blocks are then serially assigned to the available streaming multiprocessors
    (SMs). Depending on the availability of computational resources, a single SM may
    host more than one thread block concurrently. Within each thread block, threads
    are further organized into warps, which are groups of typically 32 threads. This
    hierarchical scheduling supports two levels of parallelism: interblock parallelism,
    where different thread blocks run across different SMs, and intrablock parallelism,
    where multiple warps execute within a single SM. The SM’s scheduler dynamically
    selects warps that are ready to run, specifically those whose operands are already
    available.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在GPU上的线程生命周期从内核函数的启动开始，这触发了由多个线程块组成的网格的创建。然后，这些线程块被顺序分配给可用的流多处理器（SM）。根据计算资源的可用性，单个SM可能同时托管多个线程块。在每个线程块内，线程进一步组织成warp，通常是32个线程的组。这种分层调度支持两个级别的并行性：块间并行性，其中不同的线程块在不同的SM上运行，以及块内并行性，其中多个warp在单个SM内执行。SM的调度器动态选择准备好运行的warp，特别是那些操作数已经可用的warp。
- en: 4.2.2 Device Memory Management
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.2 设备内存管理
- en: 'In CUDA programming, memory management on the device side is crucial for efficient
    GPU utilization. Device memory can be allocated in two primary forms: linear and
    CUDA arrays. While both are supported, linear memory is more commonly used in
    general-purpose GPU computing due to its straightforward interface. Allocation
    of linear device memory is typically performed using the `cudaMalloc()` function,
    and the corresponding deallocation is done using `cudaFree()`. Data transfer between
    the host (CPU) and the device (GPU) is managed through the `cudaMemcpy()` function,
    which allows copying data in both directions. Additionally, CUDA provides shared
    memory, which is allocated using the `__shared__` memory space specifier. Shared
    memory resides on-chip and is significantly faster than global memory when used
    correctly, making it suitable for intrablock communication and temporary storage.
    Understanding how to manage these memory types is critical for optimizing CUDA
    applications.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在CUDA编程中，设备端的内存管理对于高效利用GPU至关重要。设备内存可以以两种主要形式分配：线性内存和CUDA数组。虽然两者都受到支持，但由于其直观的接口，线性内存在通用GPU计算中更常用。线性设备内存的分配通常使用`cudaMalloc()`函数执行，相应的释放操作使用`cudaFree()`完成。主机（CPU）和设备（GPU）之间的数据传输通过`cudaMemcpy()`函数管理，该函数允许双向复制数据。此外，CUDA提供了共享内存，它使用`__shared__`内存空间指定符进行分配。共享内存位于芯片上，当正确使用时，其速度比全局内存快得多，这使得它适合块内通信和临时存储。理解如何管理这些内存类型对于优化CUDA应用程序至关重要。
- en: 4.2.3 Memory Hierarchy
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.3 内存层次结构
- en: 'CUDA’s memory architecture features a layered hierarchy designed to optimize
    performance based on access patterns and scope. Beyond global and shared memory,
    CUDA includes two additional read-only memory spaces accessible by all threads:
    constant memory and texture memory. These memory spaces originate from GPU graphics
    pipelines and shading languages and have been adapted for general-purpose computing.
    Each memory type serves different access models and optimization strategies. For
    instance, constant memory is ideal for broadcasting values to all threads efficiently,
    while texture memory provides benefits like caching and spatial locality, which
    are particularly useful in image processing tasks. Importantly, global, constant,
    and texture memory spaces are persistent across multiple kernel launches within
    the same application, allowing for reusable data storage without reallocation,
    thereby improving performance and reducing host-device communication overhead.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA的内存架构具有分层层次结构，旨在根据访问模式和范围优化性能。除了全局和共享内存之外，CUDA还包括两个所有线程都可以访问的只读内存空间：常量内存和纹理内存。这些内存空间源自GPU图形管道和着色语言，并已适应通用计算。每种内存类型都服务于不同的访问模型和优化策略。例如，常量内存非常适合高效地向所有线程广播值，而纹理内存提供了诸如缓存和空间局部性等好处，这在图像处理任务中特别有用。重要的是，全局、常量和纹理内存空间在同一个应用程序的多个内核调用中持续存在，允许在不重新分配的情况下重复使用数据存储，从而提高性能并减少主机-设备通信开销。
- en: 4.2.4 GPU Memory Management
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.4 GPU内存管理
- en: Efficient GPU memory management is essential for high-performance computing,
    particularly in CUDA-based programming. CUDA exposes multiple levels of memory
    to developers, each with different characteristics, performance, and scope. Understanding
    how memory is allocated, accessed, and synchronized helps optimize applications
    for speed and resource efficiency.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的GPU内存管理对于高性能计算至关重要，尤其是在基于CUDA的编程中。CUDA向开发者暴露了多个内存层级，每个层级都有不同的特性、性能和作用域。理解内存的分配、访问和同步有助于优化应用程序以实现速度和资源效率。
- en: 4.2.4.1 Types of GPU Memory (Global, Shared, Constant, Texture)
  id: totrans-103
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.4.1 GPU内存类型（全局、共享、常量、纹理）
- en: CUDA supports a rich memory hierarchy, each level designed to support different
    access scopes and performance trade-offs.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA支持丰富的内存层次结构，每个层级都旨在支持不同的访问范围和性能权衡。
- en: '**Global memory** is the most commonly used memory space accessible by all
    threads across all blocks. It is off-chip, meaning it resides in DRAM and thus
    has higher access latency than on-chip memory. Despite its latency, it is persistent
    across kernel launches and ideal for storing large datasets.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**全局内存**是最常用的内存空间，所有块的所有线程都可以访问。它是离芯片的，意味着它位于DRAM中，因此比片上内存有更高的访问延迟。尽管有延迟，但它跨内核调用持久存在，非常适合存储大型数据集。'
- en: '**Shared memory**, on the other hand, is a low-latency, high-bandwidth memory
    region that is allocated per thread block. Threads within the same block can collaborate
    by reading and writing from shared memory. It is declared using the `__shared__`
    keyword and can significantly accelerate performance if memory access is managed
    properly.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**共享内存**，另一方面，是一个低延迟、高带宽的内存区域，每个线程块分配一个。同一块内的线程可以通过从共享内存中读取和写入来协作。它使用`__shared__`关键字声明，如果内存访问管理得当，可以显著提高性能。'
- en: '**Constant memory** is a small read-only memory space optimized for broadcasting
    the same data across all threads. Since it is cached, access to constant memory
    is faster when all threads access the exact location, making it ideal for look-up
    tables and continuous parameters.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**常量内存**是一个小的只读内存空间，优化了在所有线程间广播相同数据。由于它被缓存，当所有线程访问确切位置时，访问常量内存更快，这使得它非常适合查找表和连续参数。'
- en: '**Texture memory** is another read-only memory that comes from the GPU’s graphics
    heritage. It is optimized for 2D spatial locality and provides hardware interpolation,
    making it useful for image processing tasks. Like constant memory, texture memory
    is cached and can be accessed by all threads.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**纹理内存**是另一种来自GPU图形遗产的只读内存。它优化了2D空间局部性，并提供了硬件插值，这使得它在图像处理任务中很有用。像常量内存一样，纹理内存被缓存，所有线程都可以访问。'
- en: These memory spaces—global, shared, constant, and texture—offer different trade-offs
    regarding access latency, bandwidth, and scope. Their efficient utilization is
    a cornerstone of high-performance GPU programming.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 这些内存空间——全局、共享、常量和纹理——在访问延迟、带宽和作用域方面提供了不同的权衡。它们的有效利用是高性能GPU编程的基石。
- en: 4.2.4.2 Memory Growth, Garbage Collection, and Layer-wise Memory Reuse
  id: totrans-110
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.4.2 内存增长、垃圾回收和分层内存复用
- en: In large-scale deep learning applications, managing GPU memory growth and reuse
    is critical due to increasing model sizes and batch processing demands. Improper
    handling can lead to fragmentation and performance degradation.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在大规模深度学习应用中，由于模型尺寸和批量处理需求的增加，管理GPU内存的增长和复用至关重要。处理不当可能导致碎片化和性能下降。
- en: CUDA does not provide automatic garbage collection. However, developers can
    implement custom memory pools to efficiently allocate and reuse memory buffers—avoiding
    costly repeated allocations and deallocations.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: CUDA不提供自动垃圾回收。然而，开发者可以实现自定义内存池以高效地分配和复用内存缓冲区——避免昂贵的重复分配和释放。
- en: A widely adopted strategy is **layer-wise memory reuse**, particularly in neural
    networks. Intermediate activations, used only during forward and backward passes,
    can be repurposed across layers when not accessed concurrently. Deep learning
    frameworks like PyTorch and TensorFlow apply such techniques internally via memory
    planners.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一种广泛采用的战略是**分层内存复用**，尤其是在神经网络中。在正向和反向传播过程中仅使用的中间激活，当不是同时访问时，可以在层之间重新分配用途。像PyTorch和TensorFlow这样的深度学习框架通过内存规划器内部应用此类技术。
- en: To coordinate memory access among threads, constructs like `__syncthreads()`
    are used for synchronizing shared memory operations, while atomic instructions
    such as `atomicAdd()` help prevent race conditions during concurrent updates.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在线程之间协调内存访问，使用 `__syncthreads()` 等构造来同步共享内存操作，而原子指令如 `atomicAdd()` 则有助于防止并发更新时的竞态条件。
- en: Finally, host-device synchronization ensures computations complete on the GPU
    before results are accessed by the host. This synchronization is often implicit
    at the end of kernel execution, though asynchronous streams may require explicit
    management in advanced use cases.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，主机-设备同步确保在主机访问结果之前，GPU 上的计算已完成。这种同步通常在内核执行结束时隐式进行，尽管在高级用例中异步流可能需要显式管理。
- en: 4.2.4.3 Efficient Memory Access and Coalescing Strategies
  id: totrans-116
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.4.3 高效内存访问和归约策略
- en: Efficient memory access is fundamental to achieving high performance in GPU
    programming. CUDA enables threads within a warp (typically 32 threads) to access
    global memory in a coalesced manner—where adjacent threads access contiguous memory
    addresses—allowing a single memory transaction to serve the entire warp. This
    significantly reduces latency and leverages the high memory bandwidth of the GPU.
    Conversely, uncoalesced or scattered memory accesses trigger multiple memory transactions,
    resulting in substantial performance degradation.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的内存访问对于在 GPU 编程中实现高性能至关重要。CUDA 允许 warp（通常是 32 个线程）内的线程以归约方式访问全局内存——即相邻线程访问连续的内存地址——允许单个内存事务服务于整个
    warp。这显著降低了延迟并利用了 GPU 的高内存带宽。相反，非归约或分散的内存访问会触发多个内存事务，导致性能大幅下降。
- en: Shared memory access must also be optimized to avoid bank conflicts, which occur
    when multiple threads attempt to access the same memory bank simultaneously. These
    conflicts can be mitigated through careful indexing strategies and padding, ensuring
    that accesses are parallelized and conflict-free.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 共享内存访问也必须优化，以避免银行冲突，当多个线程同时尝试访问相同的内存银行时会发生银行冲突。这些冲突可以通过仔细的索引策略和填充来缓解，确保访问是并行化的且无冲突的。
- en: Dynamic memory allocation and deallocation on the device can be handled using
    `cudaMalloc()` and `cudaFree()`. Data transfers between host and device are managed
    using `cudaMemcpy()`, which should be minimized or overlapped with computation
    via asynchronous streams to reduce idle time and improve overall throughput.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用 `cudaMalloc()` 和 `cudaFree()` 在设备上处理动态内存分配和释放。主机和设备之间的数据传输由 `cudaMemcpy()`
    管理，应尽量减少或通过异步流与计算重叠，以减少空闲时间并提高整体吞吐量。
- en: Moreover, utilizing read-only memory spaces such as constant and texture memory
    can further optimize memory access. These memory types offer cached access and
    are ideal for broadcast or spatially local access patterns, enhancing performance
    through reduced latency and improved cache utilization.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，利用只读内存空间，如常量和纹理内存，可以进一步优化内存访问。这些内存类型提供缓存的访问，并且对于广播或空间局部访问模式非常理想，通过降低延迟和改进缓存利用率来提高性能。
- en: 4.2.4.4 Memory Growth, Garbage Collection, and Layer-wise Memory Reuse
  id: totrans-121
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.2.4.4 内存增长、垃圾回收和逐层内存重用
- en: In large-scale applications, intense learning workloads, managing GPU memory
    growth, and reuse become a complex yet essential task. Memory consumption can
    grow rapidly with increasing model size and batch processing requirements. Therefore,
    it is necessary to carefully handle memory allocation and deallocation to avoid
    fragmentation and excessive usage.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 在大规模应用中，密集的学习工作负载、管理 GPU 内存增长和重用变得既复杂又至关重要。随着模型大小和批量处理需求的增加，内存消耗可能会迅速增长。因此，必须仔细处理内存分配和释放，以避免碎片化和过度使用。
- en: While CUDA does not offer automatic garbage collection, developers can implement
    custom memory pools to manage allocations efficiently. This helps in reusing memory
    buffers instead of repeatedly allocating and freeing memory, which is computationally
    expensive.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 CUDA 不提供自动垃圾回收，但开发者可以实施自定义内存池以高效地管理分配。这有助于重用内存缓冲区，而不是反复分配和释放内存，后者在计算上代价高昂。
- en: One practical approach is **layer-wise memory reuse**, especially in neural
    networks. Since intermediate activations are used only during forward and backward
    passes, their memory can be reused across layers when not needed concurrently.
    Frameworks like PyTorch and TensorFlow apply such optimizations internally through
    memory planners.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 一种实际的方法是**层间内存重用**，尤其是在神经网络中。由于中间激活只在正向和反向传播期间使用，因此当不需要同时使用时，它们的内存可以在层之间重用。像PyTorch和TensorFlow这样的框架通过内存规划器内部应用此类优化。
- en: Efficient synchronization constructs like `__syncthreads()` help manage the
    temporal sharing of shared memory within a block. Similarly, atomic operations
    like `atomicAdd()` ensure safe concurrent access to memory locations without race
    conditions.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的同步构造，如`__syncthreads()`，有助于管理块内共享内存的时间共享。同样，原子操作，如`atomicAdd()`，确保在没有竞争条件的情况下安全地并发访问内存位置。
- en: Finally, host-device synchronization ensures that GPU computations are completed
    before the host accesses results. This is typically handled through implicit synchronization
    at kernel completion, ensuring correctness without explicit developer intervention
    unless using asynchronous streams.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，主机-设备同步确保在主机访问结果之前GPU计算已完成。这通常通过内核完成时的隐式同步来处理，确保正确性而无需开发者的显式干预，除非使用异步流。
- en: 4.3 Optimization Techniques on GPUs
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.3 GPU上的优化技术
- en: Graphics processing units (GPUs) are designed to handle massive parallel workloads
    efficiently. However, specific optimization strategies must be employed to harness
    their computational power fully. These techniques aim to minimize latency, maximize
    throughput, and ensure efficient use of hardware resources. This section elaborates
    on key optimization techniques applicable to GPU programming, particularly using
    CUDA.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图形处理单元（GPU）被设计成高效处理大量并行工作负载。然而，必须采用特定的优化策略来充分利用其计算能力。这些技术旨在最小化延迟，最大化吞吐量，并确保高效使用硬件资源。本节详细介绍了适用于GPU编程的关键优化技术，特别是使用CUDA。
- en: 4.3.1 Memory Access Optimization
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.1 内存访问优化
- en: Efficient memory access is fundamental to GPU performance. Global memory accesses
    are relatively slow, and optimizing access patterns is critical.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 高效的内存访问是GPU性能的基本要素。全局内存访问相对较慢，优化访问模式至关重要。
- en: 4.3.1.1 Memory Coalescing
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.1.1 内存归约
- en: GPUs allow threads in a warp to access global memory in a coalesced manner,
    i.e., adjacent threads accessing adjacent memory locations. Proper coalescing
    minimizes memory transactions and improves bandwidth utilization.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: GPU允许warp中的线程以归约方式访问全局内存，即相邻线程访问相邻的内存位置。适当的归约最小化内存事务并提高带宽利用率。
- en: To optimize memory access on GPUs, it is essential to follow key best practices
    such as organizing data in the Structure of Arrays (SoA) format rather than Array
    of Structures (AoS), ensuring that thread indices correspond linearly to memory
    addresses, and aligning data structures to 32-, 64-, or 128-byte boundaries to
    enable memory coalescing. Additionally, effectively utilizing shared memory—an
    on-chip, low-latency memory shared among threads in a block—can significantly
    enhance performance. This involves loading frequently accessed data into shared
    memory, minimizing bank conflicts by ensuring threads access different memory
    banks, and introducing padding to avoid multiple threads contending for the same
    bank.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化GPU上的内存访问，必须遵循关键的最佳实践，例如以数组结构（SoA）格式而不是结构数组（AoS）格式组织数据，确保线程索引与内存地址线性对应，并将数据结构对齐到32位、64位或128位边界以启用内存归约。此外，有效地利用共享内存——这是块内线程之间共享的片上、低延迟内存——可以显著提高性能。这包括将频繁访问的数据加载到共享内存中，通过确保线程访问不同的内存银行来最小化银行冲突，并引入填充以避免多个线程争夺同一银行。
- en: 4.3.2 Thread-Level Optimization
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.2 线程级优化
- en: Thread-level control helps ensure efficient execution of code within a warp
    and across thread blocks.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 线程级控制有助于确保warp内和线程块间的代码高效执行。
- en: 4.3.2.1 Occupancy Optimization
  id: totrans-136
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.2.1 占用优化
- en: Occupancy refers to the ratio of active warps per streaming multiprocessor (SM)
    to the maximum number of warps the SM can support. High occupancy helps hide memory
    latency. Maximizing occupancy—the ratio of active warps per streaming multiprocessor
    (SM) to the maximum supported warps—is critical in achieving high performance
    on GPUs. Efficient occupancy ensures better latency hiding and resource utilization.
    One key strategy is to carefully tune the number of threads per block, ideally
    using values that are multiples of 32, as warps are executed in groups of 32 threads.
    Selecting an appropriate block size helps ensure enough warps are scheduled on
    each SM to keep the execution pipelines busy.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 占用率是指每个流多处理器（SM）中活跃warp的数量与SM可以支持的最大warp数量的比率。高占用率有助于隐藏内存延迟。最大化占用率——即每个流多处理器（SM）中活跃warp的数量与最大支持的warp数量的比率——对于在GPU上实现高性能至关重要。高效的占用率确保更好的延迟隐藏和资源利用率。一个关键策略是仔细调整每个块中的线程数量，理想情况下使用32的倍数值，因为warp是以32个线程为一组执行的。选择合适的块大小有助于确保每个SM上调度足够的warp以保持执行流水线忙碌。
- en: Another important consideration is managing register and shared memory usage.
    Excessive usage of these limited resources by individual threads or blocks can
    reduce the number of concurrent threads launched, thereby decreasing occupancy.
    Developers should strive to write memory- and register-efficient kernels to allow
    more blocks to reside on an SM simultaneously.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的考虑因素是管理寄存器和共享内存的使用。单个线程或块对这些有限资源的过度使用会减少并发启动的线程数量，从而降低占用率。开发者应努力编写内存和寄存器高效的内核，以允许更多的块同时驻留在SM上。
- en: Tools such as `cudaOccupancyMaxPotentialBlockSize()` and NVIDIA’s Occupancy
    Calculator can aid in making informed decisions. These tools analyze the kernel’s
    resource usage and provide optimal block sizes and launch configurations that
    maximize occupancy, helping developers fine-tune performance through empirical
    and automated analysis.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '`cudaOccupancyMaxPotentialBlockSize()` 和 NVIDIA的占用计算器等工具可以帮助做出明智的决策。这些工具分析内核的资源使用情况，并提供最优的块大小和启动配置，以最大化占用率，帮助开发者通过实证和自动化分析微调性能。'
- en: 4.3.2.2 Avoiding Thread Divergence
  id: totrans-140
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.3.2.2 避免线程发散
- en: Divergence in GPU execution arises when threads within the same warp follow
    different execution paths due to conditional statements, leading to serialized
    execution and reduced performance. To mitigate this, it is advisable to minimize
    the use of conditionals within warps and ensure that threads are grouped in a
    way that follows similar control flow paths. Additionally, techniques such as
    warp voting and predicated execution can be employed to handle common conditions
    more efficiently, allowing all threads in a warp to remain active and reducing
    the impact of divergence on overall kernel performance.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 当同一warp内的线程由于条件语句而遵循不同的执行路径时，会导致GPU执行中的发散，从而引起串行执行和性能下降。为了减轻这种情况，建议尽量减少warp内条件语句的使用，并确保线程以遵循类似控制流路径的方式分组。此外，可以采用warp投票和条件执行等技术来更有效地处理常见条件，使warp中的所有线程保持活跃，并减少发散对内核整体性能的影响。
- en: 4.3.3 Instruction-Level Optimization
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.3 指令级优化
- en: Instruction-level parallelism (ILP) enhances GPU performance by enabling the
    simultaneous execution of multiple independent instructions within a single thread.
    To exploit ILP effectively, developers should restructure code to minimize inter-instruction
    dependencies. One way to achieve this is by reordering instructions so that the
    execution of one does not depend on the result of another. Loop unrolling is another
    helpful technique, as it increases the number of operations exposed to the scheduler
    while reducing overhead from loop control. Composing complex tasks into smaller,
    independent units can improve pipeline utilization and ensure smoother, more efficient
    execution on the GPU.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 指令级并行性（ILP）通过在单个线程内同时执行多个独立指令来增强GPU性能。为了有效地利用ILP，开发者应该重构代码以最小化指令间的依赖。实现这一目标的一种方法是通过重新排序指令，使得一个指令的执行不依赖于另一个指令的结果。循环展开是另一种有用的技术，因为它增加了暴露给调度器的操作数量，同时减少了循环控制的开销。将复杂任务组合成更小、更独立的单元可以提高流水线利用率，并确保GPU上更平滑、更高效的执行。
- en: 4.3.4 Asynchronous Execution and Overlapping
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.4 异步执行和重叠
- en: Modern GPUs support asynchronous execution, enabling memory transfers and kernel
    execution to occur concurrently using CUDA streams. This capability significantly
    enhances performance by reducing idle time and maximizing GPU resource utilization.
    By leveraging multiple CUDA streams, developers can overlap data movement between
    host and device with computation on the GPU, thus improving throughput. Using
    `cudaMemcpyAsync()` allows for non-blocking memory transfers, enabling the application
    to initiate data copy operations without waiting for them to complete before launching
    kernels. Additionally, using pinned (page-locked) memory further accelerates data
    transfer by allowing direct access from the GPU, avoiding the overhead of pageable
    memory. Together, these techniques form a powerful strategy for achieving high
    efficiency in GPU-accelerated deep learning workloads.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 现代GPU支持异步执行，允许使用 CUDA 流在内存传输和内核执行之间并发发生。这种能力通过减少空闲时间并最大化 GPU 资源利用率显著提高了性能。通过利用多个
    CUDA 流，开发者可以在主机和设备之间重叠数据移动与 GPU 上的计算，从而提高吞吐量。使用 `cudaMemcpyAsync()` 允许非阻塞的内存传输，使得应用程序可以在启动内核之前启动数据复制操作，而不必等待它们完成。此外，使用固定（页锁定）内存通过允许
    GPU 直接访问进一步加速数据传输，避免了可分页内存的开销。这些技术共同形成了一种强大的策略，用于在 GPU 加速的深度学习工作负载中实现高效率。
- en: 4.3.5 Profiling and Analysis Tools
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.5 性能分析与分析工具
- en: Performance tuning in GPU programming must be guided by effective profiling
    to identify and resolve computational bottlenecks. Several tools are available
    to support this process. `Nsight Compute` provides kernel-level profiling, offering
    insights into individual CUDA kernel executions. `Nsight Systems` is used for
    system-level profiling, allowing developers to analyze CPU-GPU interactions and
    timeline-based behavior. Tools like `nvprof` and the `CUDA Profiler API` offer
    access to performance counters and memory throughput data. Key metrics to analyze
    during profiling include memory throughput, occupancy rate, warp execution efficiency,
    and memory access patterns—both global and shared. These metrics help understand
    how effectively the GPU resources are utilized and guide developers in optimizing
    kernel performance for deep learning applications.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在GPU编程中进行性能调整必须由有效的性能分析来指导，以识别和解决计算瓶颈。有几种工具可用于支持此过程。`Nsight Compute` 提供了内核级别的性能分析，提供了对单个
    CUDA 内核执行的洞察。`Nsight Systems` 用于系统级别的性能分析，允许开发者分析 CPU-GPU 交互和基于时间线的行为。像 `nvprof`
    和 `CUDA Profiler API` 这样的工具提供了对性能计数器和内存吞吐量数据的访问。在性能分析期间需要分析的关键指标包括内存吞吐量、占用率、warp
    执行效率和内存访问模式——包括全局和共享。这些指标有助于了解 GPU 资源的有效利用程度，并指导开发者优化内核性能以用于深度学习应用。
- en: 4.3.6 Essential GPU Optimization Guidelines
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.6 必要的GPU优化指南
- en: Maximizing GPU efficiency in deep learning requires adherence to several essential
    optimization practices. Developers should reduce reliance on global memory in
    favor of shared memory, which offers lower latency and higher throughput. Ensuring
    that memory access patterns are coalesced can significantly enhance bandwidth
    utilization. The use of occupancy calculators helps in fine-tuning thread and
    block configurations to achieve optimal hardware utilization. To maintain warp
    execution efficiency, control flow should be carefully designed to avoid divergence
    within warps. Leveraging asynchronous streams allows for the overlapping of computation
    and memory transfers, which helps minimize idle GPU time. Finally, continuous
    profiling is vital to identify and address performance bottlenecks, enabling informed
    adjustments throughout the development lifecycle.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度学习中最大化GPU效率需要遵循几个必要的优化实践。开发者应减少对全局内存的依赖，转而使用共享内存，这提供了更低的延迟和更高的吞吐量。确保内存访问模式合并可以显著提高带宽利用率。使用占用率计算器有助于微调线程和块配置，以实现最佳硬件利用率。为了保持
    warp 执行效率，控制流应精心设计，以避免 warp 内部出现分歧。利用异步流可以实现计算和内存传输的重叠，这有助于最小化 GPU 空闲时间。最后，持续的性能分析对于识别和解决性能瓶颈至关重要，它可以在整个开发周期中提供信息化的调整。
- en: 4.4 GPU Optimization Techniques
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.4 GPU优化技术
- en: Optimizing applications for GPUs requires a deep understanding of both the hardware
    architecture and the nature of parallel algorithms. While the GPU excels in high-throughput
    parallel execution, efficient utilization demands tailored programming approaches.
    This section explores advanced GPU optimization techniques especially relevant
    in large-scale matrix computations and deep learning workloads. The methods discussed
    are essential for achieving state-of-the-art performance in scientific computing,
    AI, and graphics applications. Table [4.2](#Tab2) gives the comparison of various
    techniques for GPU optimization.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 为GPU优化应用程序需要深入了解硬件架构和并行算法的本质。虽然GPU在高效的高吞吐量并行执行方面表现出色，但高效的利用需要定制的编程方法。本节探讨了特别适用于大规模矩阵计算和深度学习工作负载的高级GPU优化技术。所讨论的方法对于在科学计算、人工智能和图形应用中实现最先进性能至关重要。表[4.2](#Tab2)给出了各种GPU优化技术的比较。
- en: 4.4.1 Tiled Matrix Multiplication and Parallel Algorithms
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.1 分块矩阵乘法和并行算法
- en: Matrix multiplication is fundamental in many domains, from computer graphics
    to machine learning. On GPUs, naive implementations often lead to performance
    bottlenecks due to excessive global memory accesses. *Tiled matrix multiplication*
    addresses this by partitioning the computation into subblocks (tiles), enabling
    effective use of fast shared memory.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法在许多领域都是基础，从计算机图形学到机器学习。在GPU上，简单的实现往往由于过多的全局内存访问而导致性能瓶颈。*分块矩阵乘法*通过将计算划分为子块（分块）来解决这一问题，从而有效地利用快速的共享内存。
- en: This approach loads portions of the input matrices into shared memory by cooperative
    threads in a block. Each thread computes a partial result for a tile and accumulates
    it in registers. This dramatically reduces the number of redundant global memory
    accesses and leverages the high bandwidth of shared memory.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法通过块中的合作线程将输入矩阵的部分加载到共享内存中。每个线程计算一个分块的局部结果，并将其累加到寄存器中。这显著减少了冗余的全局内存访问次数，并利用了共享内存的高带宽。
- en: The tiled matrix multiplication algorithm given in Algorithm [1](#FPar1) is
    a parallel strategy designed to efficiently multiply two large matrices on a GPU
    or similar parallel architecture. The key idea is to divide the input matrices
    into smaller submatrices or *tiles*, which can be loaded into the fast, on-chip
    shared memory. Each thread block is responsible for computing a tile of the output
    matrix. Within a block, threads collaborate to load corresponding tiles of the
    input matrices from global memory into shared memory.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 算法[1](#FPar1)中给出的分块矩阵乘法算法是一种并行策略，旨在在GPU或类似并行架构上有效地乘以两个大矩阵。关键思想是将输入矩阵划分为较小的子矩阵或*分块*，这些分块可以加载到快速的片上共享内存中。每个线程块负责计算输出矩阵的一个分块。在块内，线程协作从全局内存中加载对应输入矩阵的分块到共享内存中。
- en: Table 4.2
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 表4.2
- en: Comparison of Key GPU Optimization Techniques
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 关键GPU优化技术比较
- en: '| **Technique** | **Method** | **Performance impact** |'
  id: totrans-158
  prefs: []
  type: TYPE_TB
  zh: '| **技术** | **方法** | **性能影响** |'
- en: '| --- | --- | --- |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **Tiled matrix multiplication** | Divides large matrices into smaller tiles
    and loads them into shared memory to reduce global memory accesses. | Up to 2–5$$$\times
    $$$ speedup over naive implementations. |'
  id: totrans-160
  prefs: []
  type: TYPE_TB
  zh: '| **分块矩阵乘法** | 将大矩阵划分为较小的分块并将它们加载到共享内存中，以减少全局内存访问。 | 相比简单实现，速度可提升2–5倍。|'
- en: '| **Gradient checkpointing (recomputation)** | Saves only a subset of activations
    during forward pass; recomputes the rest during backward pass to reduce memory
    use. | Reduces memory usage by 50–80%; small compute overhead. |'
  id: totrans-161
  prefs: []
  type: TYPE_TB
  zh: '| **梯度检查点（重新计算）** | 在正向传播过程中只保存一部分激活；在反向传播过程中重新计算其余部分以减少内存使用。 | 内存使用量减少50–80%；计算开销小。|'
- en: '| **Mixed-precision training with tensor cores** | Performs calculations in
    FP16/BF16 while retaining FP32 master weights; uses loss scaling for stability.
    | 2–3$$$\times $$$ faster training with 50% memory savings. |'
  id: totrans-162
  prefs: []
  type: TYPE_TB
  zh: '| **使用张量核心进行混合精度训练** | 在FP16/BF16中进行计算，同时保留FP32主权重；使用损失缩放以保持稳定性。 | 训练速度提高2–3倍，内存节省50%。|'
- en: '| **Loop unrolling** | Expands loops to minimize loop control overhead and
    expose more instruction-level parallelism. | 10–30% speed gain depending on loop
    depth and dependency. |'
  id: totrans-163
  prefs: []
  type: TYPE_TB
  zh: '| **循环展开** | 将循环展开以最小化循环控制开销并暴露更多指令级并行性。 | 依据循环深度和依赖关系，速度提升可达10–30%。|'
- en: '| **Kernel fusion** | Merges multiple GPU kernels to reduce global memory transfers
    and kernel launch overhead. | 20–40% performance boost in memory-bound workloads.
    |'
  id: totrans-164
  prefs: []
  type: TYPE_TB
  zh: '| **内核融合** | 通过减少全局内存传输和内核启动开销来合并多个GPU内核。 | 在内存受限的工作负载中，性能可提高20–40%。 |'
- en: '| **Memory coalescing** | Ensures threads in a warp access consecutive memory
    addresses to minimize memory transactions. | Critical for bandwidth efficiency;
    up to 10$$$\times $$$ speedup in worst-to-best case. |'
  id: totrans-165
  prefs: []
  type: TYPE_TB
  zh: '| **内存归约** | 确保warp中的线程访问连续的内存地址，以最小化内存事务。 | 对于带宽效率至关重要；在最坏到最好的情况下，速度可提高10$$$\times$$$。
    |'
- en: '| **Warp divergence avoidance** | Minimizes control flow divergence by grouping
    threads with similar execution paths or using predication. | Improves warp execution
    efficiency; avoids serialization. |'
  id: totrans-166
  prefs: []
  type: TYPE_TB
  zh: '| **避免warp发散** | 通过将具有相似执行路径的线程分组或使用预测来最小化控制流发散。 | 提高warp执行效率；避免串行化。 |'
- en: '| **Asynchronous execution and streams** | Uses CUDA streams to overlap kernel
    execution with memory transfers. | Enables compute-communication overlap; up to
    1.5–2$$$\times $$$ speedup. |'
  id: totrans-167
  prefs: []
  type: TYPE_TB
  zh: '| **异步执行和流** | 使用CUDA流来重叠内核执行与内存传输。 | 实现计算-通信重叠；速度可提高1.5–2$$$\times $$$。 |'
- en: Once the tiles are loaded, each thread computes a partial product by performing
    an inner product of the relevant row and column from the shared memory tiles.
    These partial results are accumulated across all required phases (based on the
    inner dimension *K*) to produce a single output element. After all phases are
    complete, the final result is written back to global memory.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦加载了瓷砖，每个线程通过执行共享内存瓷砖中相关行和列的内积来计算一个部分乘积。这些部分结果在所有所需的阶段（基于内维*K*）中累积，以生成单个输出元素。所有阶段完成后，最终结果被写回全局内存。
- en: This tiling approach drastically reduces the number of global memory accesses,
    thereby improving memory throughput and overall performance. The algorithm ensures
    data reuse within shared memory and allows for scalable, predictable execution
    on parallel hardware. It is widely used in GPU libraries such as cuBLAS and is
    a foundation for many high-performance computing tasks in graphics, scientific
    computing, and deep learning.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 这种分块方法极大地减少了全局内存访问次数，从而提高了内存吞吐量和整体性能。该算法确保在共享内存中数据重用，并允许在并行硬件上实现可扩展和可预测的执行。它在cuBLAS等GPU库中得到了广泛应用，并且是图形、科学计算和深度学习中许多高性能计算任务的基础。
- en: Algorithm 1 Tiled Matrix Multiplication on GPU
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 算法1 GPU上的分块矩阵乘法
- en: '![Pseudocode for matrix multiplication using a tiled approach. It requires
    matrices A of size M times K , B of size K times , and a tile size TILE_WIDTH
    . The output is matrix C of size M times . The process involves iterating over
    tile pair indices, initializing C_{sub} to zero, loading tiles A_{tile} and B_{tile}
    into shared memory, synchronizing threads, and performing multiplication and accumulation.
    Finally, C_{sub} is written to C[i][j] .](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaan_HTML.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![使用分块方法进行矩阵乘法的伪代码。它需要大小为M乘以K的矩阵A，大小为K乘以的矩阵B，以及一个瓷砖大小TILE_WIDTH。输出是大小为M乘以的矩阵C。该过程涉及迭代瓷砖对索引，初始化C_{sub}为零，将A_{tile}和B_{tile}加载到共享内存中，同步线程，并执行乘法和累积。最后，C_{sub}被写入C[i][j]
    。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaan_HTML.png)'
- en: 4.4.2 Gradient Checkpointing and Recomputation
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.2 梯度检查点和重新计算
- en: Memory is often a limiting factor in large-scale deep learning models, especially
    during backpropagation, where activations for each layer must be stored. *Gradient
    checkpointing* (also known as *activation recomputation*) provides a trade-off
    between memory usage and computation.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 在大规模深度学习模型中，内存通常是限制因素，尤其是在反向传播期间，此时必须存储每一层的激活。*梯度检查点*（也称为*激活重新计算*）在内存使用和计算之间提供了一个权衡。
- en: Gradient checkpointing is a memory optimization technique widely used in training
    deep neural networks, particularly those with many layers or large parameter sizes
    such as transformers. During the forward pass of backpropagation, conventional
    implementations store all intermediate activations to be reused in the backward
    pass. However, this storage can quickly exhaust GPU memory when working with deep
    models or large batch sizes.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度检查点是一种在训练深度神经网络时广泛使用的内存优化技术，尤其是在具有许多层或大型参数大小（如变换器）的神经网络中。在反向传播的前向传递中，传统实现存储所有中间激活以在反向传递中重用。然而，当处理深度模型或大型批量时，这种存储可以迅速耗尽GPU内存。
- en: Gradient checkpointing addresses this limitation by saving only a subset of
    activations, called *checkpoints*, during the forward pass. Instead of storing
    every intermediate output, it strategically stores outputs at specific intervals.
    When needed during backpropagation, the missing activations are recomputed from
    the nearest stored checkpoint, thereby trading additional computation for reduced
    memory usage.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度检查点通过在正向传播过程中仅保存激活的子集，称为“检查点”，来解决这一限制。它不是存储每个中间输出，而是有选择地在特定间隔存储输出。在反向传播过程中需要时，缺失的激活将从最近的存储检查点重新计算，从而以额外的计算换取减少的内存使用。
- en: This method allows training of deeper or more memory-intensive models without
    running out of memory, making it especially useful for GPUs with limited capacity.
    It is supported in major deep learning frameworks like PyTorch (via `torch.utils.checkpoint`)
    and TensorFlow. Though it introduces additional compute time, the memory efficiency
    gained is often crucial in practice and enables scalability of model training.
    The detailed steps are summerized in Algorithm [2](#FPar2).
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法允许训练更深或更内存密集的模型而不会耗尽内存，对于容量有限的 GPU 尤其有用。它被支持在主要的深度学习框架中，如 PyTorch（通过 `torch.utils.checkpoint`）和
    TensorFlow。尽管它引入了额外的计算时间，但获得的内存效率在实践上通常至关重要，并使模型训练可扩展。详细的步骤总结在算法 [2](#FPar2) 中。
- en: Algorithm 2 Gradient Checkpointing with Recomputation
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 算法 2 带重新计算的梯度检查点
- en: '![Flowchart for a backpropagation algorithm in a neural network model with
    L layers and input x . The process involves selecting checkpoint layers C subset
    {1, 2, ldots, L} , computing activations x_l = f_l(x_{l-1}) , and storing or discarding
    them based on checkpoint presence. Loss is computed from the final output x_L
    . During the backward pass, if an activation is unavailable, it is recomputed
    from the nearest checkpoint. Gradients frac{partial L}{partial x_{l-1}} are computed
    for parameter updates.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaao_HTML.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![神经网络模型中具有 L 层和输入 x 的反向传播算法流程图。该过程涉及选择检查点层 C 的子集 {1, 2, ..., L}，计算激活 x_l =
    f_l(x_{l-1})，并根据检查点是否存在存储或丢弃它们。损失是从最终输出 x_L 计算得出的。在反向传播过程中，如果激活不可用，则从最近的检查点重新计算。计算梯度
    ∂L/∂x_{l-1} 用于参数更新。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaao_HTML.png)'
- en: Instead of storing all intermediate activations during the forward pass, only
    selected checkpoints are saved. During backpropagation, missing activations are
    recomputed on-the-fly from the nearest checkpoints. This significantly reduces
    memory usage, allowing larger batch sizes or deeper models to fit within GPU constraints.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在正向传播过程中，不是存储所有中间激活，而是只保存选定的检查点。在反向传播过程中，缺失的激活将实时从最近的检查点重新计算。这显著减少了内存使用，允许更大的批量大小或更深的模型在
    GPU 约束内进行拟合。
- en: This optimization is particularly beneficial on GPUs with limited memory or
    when training large transformer-based models. Frameworks like PyTorch and TensorFlow
    have built-in support for checkpointing via libraries such as `torch.utils.checkpoint`.
    While it increases computational overhead due to recomputation, the gain in memory
    efficiency is crucial in practice and often outweighs the performance trade-off.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 此优化特别有益于内存有限或训练大型基于 Transformer 的模型时。PyTorch 和 TensorFlow 等框架通过库如 `torch.utils.checkpoint`
    内置了对检查点的支持。虽然它由于重新计算而增加了计算开销，但内存效率的提升在实践上至关重要，并且通常超过性能权衡。
- en: 4.4.3 Mixed-Precision Training and Tensor Core Usage
  id: totrans-181
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.3 混合精度训练和 Tensor Core 使用
- en: Modern GPUs, such as NVIDIA’s Volta, Ampere, and Hopper architectures, incorporate
    specialized hardware units called *Tensor Cores* that are designed to perform
    matrix operations with high throughput, especially using lower-precision formats
    like FP16 or BF16\. *Mixed-precision training* is a technique that takes advantage
    of these units to accelerate deep learning model training while reducing memory
    usage.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 现代GPU，如 NVIDIA 的 Volta、Ampere 和 Hopper 架构，集成了称为“Tensor Core”的专用硬件单元，这些单元旨在以高吞吐量执行矩阵运算，特别是使用低精度格式如
    FP16 或 BF16。*混合精度训练*是一种利用这些单元来加速深度学习模型训练并减少内存使用的技巧。
- en: In mixed-precision training, model weights are maintained in FP32 (single precision)
    to ensure numerical stability, but the forward and backward computations are carried
    out in FP16 or BF16\. This approach greatly reduces memory bandwidth and storage
    requirements. However, operating at reduced precision can introduce numerical
    underflow, particularly during gradient computation. To address this, a technique
    called *loss scaling* is employed to scale gradients before they are reduced and
    then unscaled during updates.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 在混合精度训练中，模型权重以 FP32（单精度）格式维护以确保数值稳定性，但正向和反向计算以 FP16 或 BF16 格式进行。这种方法大大降低了内存带宽和存储需求。然而，在降低精度下操作可能会引入数值下溢，尤其是在梯度计算期间。为了解决这个问题，采用了一种称为
    *梯度缩放* 的技术，在梯度被缩减之前对其进行缩放，然后在更新过程中进行反缩放。
- en: Frameworks such as PyTorch and TensorFlow support mixed-precision training via
    tools like NVIDIA’s Automatic Mixed Precision (AMP) and Apex. These frameworks
    automate the management of precision casting, scaling, and memory handling. Mixed-precision
    training offers the dual benefit of increased throughput—often 2–3$$$\times $$$
    compared to FP32-only training—and the ability to fit larger models or batch sizes
    in the same memory footprint, making it standard practice for state-of-the-art
    deep learning systems. The steps are summerized in Algorithm [3](#FPar3).
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 框架如 PyTorch 和 TensorFlow 通过 NVIDIA 的自动混合精度 (AMP) 和 Apex 等工具支持混合精度训练。这些框架自动管理精度转换、缩放和内存处理。混合精度训练提供了双重好处：与仅使用
    FP32 的训练相比，吞吐量通常提高 2-3 倍，并且能够在相同的内存占用下拟合更大的模型或批量大小，这使得它成为最先进深度学习系统的标准实践。步骤总结在算法
    [3](#FPar3) 中。
- en: Algorithm 3 Mixed-Precision Training with Tensor Cores
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 算法 3 使用 Tensor 核进行混合精度训练
- en: '![Flow chart detailing a process for updating neural network model parameters
    using mixed precision. It begins with initializing master weights in FP32 and
    model copies in FP16/BF16\. The process involves setting a loss scaling factor,
    casting inputs, performing forward and backward passes, computing and scaling
    loss, unscaling gradients, and checking for gradient overflow. If no overflow
    occurs, master weights are updated in FP32 and copied to the FP16/BF16 model.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaap_HTML.png)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
  zh: '![流程图详细说明了使用混合精度更新神经网络模型参数的过程。它从在 FP32 中初始化主权重和在 FP16/BF16 中初始化模型副本开始。该过程包括设置损失缩放因子、转换输入、执行正向和反向传递、计算和缩放损失、反缩放梯度和检查梯度溢出。如果没有溢出发生，主权重以
    FP32 格式更新并复制到 FP16/BF16 模型。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaap_HTML.png)'
- en: 4.4.4 Implementation of Matrix Multiplication Kernel
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.4 矩阵乘法内核的实现
- en: Matrix multiplication is a core operation in scientific computing, machine learning,
    and graphics. On GPUs, an efficient implementation leverages thread-level parallelism
    and shared memory to reduce global memory accesses and improve data reuse. The
    kernel assigns blocks of threads to tiles of the result matrix, where each thread
    computes one element by performing a row and column dot product.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵乘法是科学计算、机器学习和图形学中的核心操作。在 GPU 上，一个有效的实现利用线程级并行性和共享内存来减少全局内存访问并提高数据重用。内核将线程块分配给结果矩阵的瓦片，其中每个线程通过执行行和列的点积来计算一个元素。
- en: Below is a high-level CUDA-style pseudocode using shared memory for tiled matrix
    multiplication.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是使用共享内存进行瓦片矩阵乘法的高级 CUDA 风格伪代码。
- en: Algorithm 4 Tiled Matrix Multiplication Kernel (CUDA-Style)
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 算法 4 瓦片矩阵乘法内核（CUDA 风格）
- en: '![The image is a pseudocode for matrix multiplication using shared memory in
    parallel computing. It involves input matrices A[M][K] and B[K][], and outputs
    matrix C[M][]. Key steps include defining `TILE_WIDTH`, calculating row and column
    indices, initializing `Cvalue` to zero, and iterating over tiles in the K dimension.
    Shared memory arrays A_s and B_s are used to load submatrices. The code includes
    synchronization with `__syncthreads()` and updates `Cvalue` with products of elements
    from A_s and B_s. Finally, C[row][col] is set to `Cvalue`.](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaq_HTML.png)'
  id: totrans-191
  prefs: []
  type: TYPE_IMG
  zh: '![该图像是并行计算中使用共享内存进行矩阵乘法的伪代码。它涉及输入矩阵 A[M][K] 和 B[K][]，并输出矩阵 C[M][]。关键步骤包括定义
    `TILE_WIDTH`、计算行和列索引、将 `Cvalue` 初始化为零，并在 K 维度上迭代瓦片。使用共享内存数组 A_s 和 B_s 来加载子矩阵。代码包括与
    `__syncthreads()` 的同步，并使用 A_s 和 B_s 的元素乘积更新 `Cvalue`。最后，将 C[row][col] 设置为 `Cvalue`。](../images/641715_1_En_4_Chapter/641715_1_En_4_Figaaq_HTML.png)'
- en: This implementation achieves high memory efficiency by reducing global memory
    accesses through shared memory buffering. Thread synchronization ensures the correctness
    when multiple threads operate on shared data.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 该实现通过共享内存缓冲区减少全局内存访问，从而实现高内存效率。线程同步确保了当多个线程操作共享数据时的正确性。
- en: 4.5 Summary
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.5 摘要
- en: The chapter provides a comprehensive overview of GPU computing principles and
    advanced optimization techniques for deep learning. It introduces the CUDA programming
    model, emphasizing heterogeneous computing where CPUs and GPUs collaborate, and
    discusses CUDA extensions to C/C++, SIMT architecture, and GPU memory hierarchy
    for efficient data handling. The chapter further explores key performance optimization
    strategies such as memory access, thread and instruction-level parallelism, asynchronous
    execution, and profiling tools. Advanced topics like tiled matrix multiplication,
    gradient checkpointing, mixed-precision training using tensor cores, and optimized
    kernel implementations are also covered. The chapter equips readers with the theoretical
    and practical knowledge required to build efficient, GPU-accelerated deep learning
    applications.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 本章全面概述了GPU计算原理和深度学习的先进优化技术。它介绍了CUDA编程模型，强调异构计算，其中CPU和GPU协作，并讨论了CUDA对C/C++的扩展、SIMT架构和GPU内存层次结构以实现高效数据处理。本章进一步探讨了关键性能优化策略，如内存访问、线程和指令级并行性、异步执行和性能分析工具。还涵盖了高级主题，如分块矩阵乘法、梯度检查点、使用张量核心的混合精度训练和优化内核实现。本章为读者提供了构建高效、GPU加速的深度学习应用所需的理论和实践知识。
- en: Exercise
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 练习
- en: What are the advantages of using the CUDA programming model for deep learning
    applications?
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用CUDA编程模型进行深度学习应用有哪些优势？
- en: Explain the concept of heterogeneous computing and its significance in GPU-based
    systems.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释异构计算的概念及其在基于GPU的系统中的重要性。
- en: Describe the purpose and usage of CUDA-specific function qualifiers such as
    `__global__`, `__device__`, and `__host__`.
  id: totrans-198
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述CUDA特定函数限定符（如`__global__`、`__device__`和`__host__`）的目的和用法。
- en: Compare SIMT (Single Instruction, Multiple Threads) with SIMD (Single Instruction,
    Multiple Data) architectures.
  id: totrans-199
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 比较SIMT（单指令，多线程）与SIMD（单指令，多数据）架构。
- en: Discuss the different types of device memory in CUDA and their roles in kernel
    execution.
  id: totrans-200
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 讨论CUDA中不同类型的设备内存及其在内核执行中的作用。
- en: Explain the hierarchy of CUDA memory and identify which memory types offer the
    fastest access.
  id: totrans-201
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释CUDA内存的层次结构，并确定哪种内存类型提供最快的访问。
- en: How can effective GPU memory management improve the performance of deep learning
    models?
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如何通过有效的GPU内存管理来提高深度学习模型的性能？
- en: What are coalesced memory accesses, and how do they contribute to memory access
    optimization?
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是归一化内存访问，它们如何有助于内存访问优化？
- en: Describe thread divergence and suggest ways to minimize its impact in CUDA programming.
  id: totrans-204
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 描述线程发散的概念，并提出在CUDA编程中减少其影响的方法。
- en: Discuss instruction-level parallelism in the context of CUDA. Provide examples
    where applicable.
  id: totrans-205
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在CUDA的背景下讨论指令级并行性。如有适用，提供示例。
- en: Explain how asynchronous execution and overlapping of memory transfers with
    computation can enhance performance.
  id: totrans-206
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 解释异步执行和内存传输与计算的叠加如何提高性能。
- en: List three profiling or analysis tools used in CUDA development and describe
    their features.
  id: totrans-207
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 列出三种在CUDA开发中使用的分析工具，并描述其功能。
- en: Summarize key guidelines to be followed for optimizing GPU kernels.
  id: totrans-208
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总结优化GPU内核时应遵循的关键指南。
- en: Illustrate the implementation of tiled matrix multiplication using CUDA. Why
    is this technique preferred?
  id: totrans-209
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用CUDA说明分块矩阵乘法的实现。为什么这种技术更受欢迎？
- en: What is mixed-precision training? How do tensor cores assist in accelerating
    such training?
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 什么是混合精度训练？张量核心如何帮助加速此类训练？
