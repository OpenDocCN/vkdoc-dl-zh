- en: 'Appendix A: Build Instructions for the Alfie Robot Car'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An oblique front view of the robotic car is shown in Figure [A-1](#Fig1) . It
    was constructed from a kit available from the Parallax Corporation ( [`www.parallax.com`](http://www.parallax.com)
    ).
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig1_HTML.jpg](A436848_1_En_BookBackmatter_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-1.
  prefs: []
  type: TYPE_NORMAL
- en: Finished robotic car
  prefs: []
  type: TYPE_NORMAL
- en: A straight-on back view of the car is shown in Figure [A-2](#Fig2) .
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig2_HTML.jpg](A436848_1_En_BookBackmatter_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-2.
  prefs: []
  type: TYPE_NORMAL
- en: Straight-on back view of the finished robot car
  prefs: []
  type: TYPE_NORMAL
- en: Parallax named this robot model the Boe-Bot , which is short for board of education
    robot . The company sells several versions of the Boe-Bot, which include different
    microcontrollers. I purchased the kit controlled by their propeller activity board.
    However, there is a basic model 28124 parts kit available without a microcontroller,
    which allows you to build only the robot car platform, and then you add your own
    Raspberry Pi.
  prefs: []
  type: TYPE_NORMAL
- en: The car is powered by two continuous rotation (CR) servos on the underside of
    the robot, as seen in Figure [A-3](#Fig3) .
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig3_HTML.jpg](A436848_1_En_BookBackmatter_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-3.
  prefs: []
  type: TYPE_NORMAL
- en: Underside of the robotic car
  prefs: []
  type: TYPE_NORMAL
- en: It is easy to quickly build the basic robotic car platform. You can go to the
    Parallax website to download the assembly instructions if you want a preview of
    what is involved in the platform assembly.
  prefs: []
  type: TYPE_NORMAL
- en: Robotic Car Power Supply
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The two CR servos driving the robot car require more voltage and current than
    provided by a cell battery eliminator, which powers the Raspberry Pi. Fortunately,
    Parallax provides a nice alternative power supply for both CR servos. In addition,
    its form factor matches nicely with the robotic car’s chassis. Figure [A-4](#Fig4)
    shows the Li-ion battery power supply mounted on the robotic car’s chassis.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig4_HTML.jpg](A436848_1_En_BookBackmatter_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-4.
  prefs: []
  type: TYPE_NORMAL
- en: Li-ion battery power supply mounted on the robot car’s chassis
  prefs: []
  type: TYPE_NORMAL
- en: The Parallax part number for the power supply with two Li-ion batteries is 28989\.
    It has a built-in charging system for the two 18650-size Li-ion cells. Each cell
    provides 3.7 VDC that will provide over 1 A when fully charged. Two cells in the
    series provide 7.4 VDC to the CR servos, which is plenty of power to allow them
    to be operated at maximum capacity if so desired.
  prefs: []
  type: TYPE_NORMAL
- en: CR Servo Drive Pulse Width Modulation (PWM)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The motors on the robot car are CR servos , which mean they must be driven
    using appropriate PWM signals. The PWM pulse duration ranges from 1.0 to 2.0 milliseconds
    (ms) for the CR servos used on this robot car. Sending a 1.5 ms pulse duration
    signal will cause the CR servos to remain motionless with no rotation. The `ChangeDutyCycle(arg)`
    Python command sets the servo’s rotation speed. I experimentally determined the
    `arg` values as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '2.6: No rotation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '3.6: Full speed in the counterclockwise direction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '2.2: Full speed in the clockwise direction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will see these values in the various Python scripts that control the robot
    car.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: I used Raspberry Pi model 3, which has two independent PWM channels, suitable
    for directly controlling each CR servo. If you use a model 2 B or B+, there is
    only one PWM channel available on these boards. You need to use an external multiplexer
    board to enable the two channels for CR servo control. I refer you to Adafruit’s
    Learn tutorial at [`https://learn.adafruit.com/adafruit-16-channel-servo-driver-with-raspberry-pi/overview`](https://learn.adafruit.com/adafruit-16-channel-servo-driver-with-raspberry-pi/overview)
    , where the installation and setup of a 16 -channel multiplexed servo driver is
    discussed in an excellent fashion. In other projects, I set up this board according
    to the tutorial instructions without any difficulty.
  prefs: []
  type: TYPE_NORMAL
- en: Mount Plates
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The robot car incorporates two mount plates designed to hold the cell battery
    eliminator’s power supply and a Raspberry Pi. Figure [A-5](#Fig5) is a side view
    of the robot car with all the plates installed with the battery eliminator, Raspberry
    Pi, and solderless breadboard.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig5_HTML.jpg](A436848_1_En_BookBackmatter_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-5.
  prefs: []
  type: TYPE_NORMAL
- en: Side view of the robot car
  prefs: []
  type: TYPE_NORMAL
- en: I used four non-threaded 1/2-inch nylon spacers with four 7/8-inch 4-40 machine
    screws to mount the Li-ion power supply to the car chassis. The 4-40 machine screws
    were threaded into 1-inch nylon spacers with internal 4-40 threads. The battery
    eliminator plate is secured between the top of the 1/2-inch nylon spacers and
    the bottom of the 1-inch threaded nylon spacers. Figure [A-6](#Fig6) is a detailed
    drawing of the battery eliminator mount plate.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig6_HTML.jpg](A436848_1_En_BookBackmatter_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-6.
  prefs: []
  type: TYPE_NORMAL
- en: Battery eliminator mount plate construction drawing
  prefs: []
  type: TYPE_NORMAL
- en: The next mount plate holds the Raspberry Pi and a solderless breadboard. Figure
    [A-7](#Fig7) shows a construction drawing for this mount plate.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig7_HTML.jpg](A436848_1_En_BookBackmatter_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-7.
  prefs: []
  type: TYPE_NORMAL
- en: Raspberry Pi mount plate
  prefs: []
  type: TYPE_NORMAL
- en: This plate is secured to the battery eliminator mount plate using the four 1-inch
    threaded nylon spacers with four 4-40 1/2-inch machine screws.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the Raspberry Pi is secured to the Raspberry Pi mount plate with 7/8-inch
    non-threaded nylon spacers coupled with 1-1/4-inch 4-40 machine screws and nuts.
  prefs: []
  type: TYPE_NORMAL
- en: I plugged in two Ping ultrasonic sensors into the breadboard along with a MCP3008
    ADC chip. Figure [A-8](#Fig8) is a close-up of the solderless breadboard with
    all the components plugged in.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig8_HTML.jpg](A436848_1_En_BookBackmatter_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-8.
  prefs: []
  type: TYPE_NORMAL
- en: Solderless breadboard with all components plugged in
  prefs: []
  type: TYPE_NORMAL
- en: The solderless breadboard is attached to the mount plate using double-sided
    tape, which allows easy removal if desired. I strongly recommend that you do not
    use the adhesive backing that comes with the solderless breadboard because it
    is practically impossible to remove the breadboard once it is attached to the
    plastic mount plate.
  prefs: []
  type: TYPE_NORMAL
- en: This completes the mechanical build instructions for the robotic car. Next,
    I present the electrical and wiring instructions that will energize the car and
    sensors.
  prefs: []
  type: TYPE_NORMAL
- en: Electrical and Wiring Instructions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The electrical connections for the car are fairly simply, as shown in the Figure
    [A-9](#Fig9) schematic of both the propulsion drive electrical schematic and the
    ultrasonic sensor interconnections.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig9_HTML.jpg](A436848_1_En_BookBackmatter_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-9.
  prefs: []
  type: TYPE_NORMAL
- en: Electrical schematic for the robot car
  prefs: []
  type: TYPE_NORMAL
- en: The main power source for the two CR servos is the Li-ion power supply, which
    provides 7.4 VDC and has an energy capacity of approximately 2600 mAh when fully
    charged. This capacity should provide the CR servos with more than 6 hours of
    runtime before they need a recharge.
  prefs: []
  type: TYPE_NORMAL
- en: The Raspberry Pi is powered by a separate cell battery eliminator module. The
    Raspberry Pi model 3 draws an average current of about 120 ma, which means that
    a 2100 mAh battery eliminator provides more than 15 hours of power to the Raspberry
    Pi before requiring a recharge.
  prefs: []
  type: TYPE_NORMAL
- en: Ping Sensor
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: I purchased several inexpensive HC-SR04 Ping sensors from Amazon.com. Figure
    [A-10](#Fig10) shows close-up front and back views of this sensor.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig10_HTML.jpg](A436848_1_En_BookBackmatter_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-10.
  prefs: []
  type: TYPE_NORMAL
- en: HC-SR04 Ping sensor
  prefs: []
  type: TYPE_NORMAL
- en: The Ping sensor contains an embedded microprocessor as part of the sensor hardware.
    This processor controls the ultrasonic transmitter and receiver transducers that
    physically measure distance by bouncing discrete ultrasonic sound wave pulses
    off objects, and timing how long the sound takes to transit from the sensor transmitter
    to the sensor receiver. The distance is easily calculated because the speed of
    sound is relatively constant at 1130 ft/sec. This is method of operation is quite
    similar to the way that bats navigate in caves and attics. Figure [A-11](#Fig11)
    is a block diagram of the sensor and all the principal components.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig11_HTML.jpg](A436848_1_En_BookBackmatter_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-11.
  prefs: []
  type: TYPE_NORMAL
- en: Ping sensor block diagram
  prefs: []
  type: TYPE_NORMAL
- en: The distance is proportional to the length of the digital pulse, which is sensed
    by any processor that needs it—in this case, the Raspberry Pi. The digital pulse
    generated by the Ping has a 10-μsec time measurement resolution, which translates
    to approximately 1-inch distance measurement uncertainty in its total range of
    up to 100 inches. Of course, distance measurements also depend upon the size and
    texture of the reflecting object. A hard wall provides excellent reflection, whereas
    a curtain would be more problematic.
  prefs: []
  type: TYPE_NORMAL
- en: Note that the Ping sensor requires 5 VDC for its power supply, and as a consequence,
    the digital output pulse from the Ping sensor is also at a 5 VDC level. This level
    is incompatible with the Raspberry Pi maximum 3.3 VDC GPIO input level. This is
    the reason I used resistive dividers as shown in the Figure [A-9](#Fig9) schematic.
  prefs: []
  type: TYPE_NORMAL
- en: The digital communication protocol between the Ping sensor and Raspberry Pi
    commences when the Raspberry Pi (host device) generates a 10-μsec trigger pulse
    that in turn causes the Ping sensor to emit a short burst of 40-kHz ultrasonic
    sound waves. This burst travels through the air, hits an object, and then bounces
    back to the Ping sensor. The Ping simultaneously starts its digital pulse when
    it receives the host’s trigger pulse. This pulse terminates when an echo return
    is detected. Therefore, the width of the digital pulse is proportional to the
    distance to the target.
  prefs: []
  type: TYPE_NORMAL
- en: 'The electrical schematic in Figure [A-9](#Fig9) shows the interconnections
    between the Raspberry Pi and the Ping sensors. Besides the V [CC] and ground wires,
    there are two other wires connecting each Ping sensor to the Raspberry Pi: one
    wire carries the pulse initiation trigger from the Raspberry Pi to the Ping and
    the other wire sends the digital timing pulse from the Ping to the Raspberry Pi.
    The actual range measurement is calculated within the Raspberry Pi’s Python script.'
  prefs: []
  type: TYPE_NORMAL
- en: MCP3008 Analog-to-Digital Converter (ADC)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: One of the significant shortfalls of the Raspberry Pi—at least as far as it
    concerns experimenters—is the lack of any analog-to-digital converters. Unlike
    most popular microcontroller boards, such as the Arduino Uno or the Beaglebone
    Black, the Raspberry Pi has never come equipped with this option. Therefore, it
    is necessary to use an external chip for this function. A very popular and inexpensive
    solution is the Microchip MCP3008, 8-channel, 10-bit, ADC chip. Figure [A-12](#Fig12)
    shows the pinout for this chip.
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig12_HTML.jpg](A436848_1_En_BookBackmatter_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-12.
  prefs: []
  type: TYPE_NORMAL
- en: MCP3008 pinout
  prefs: []
  type: TYPE_NORMAL
- en: 'The following pins must be used to convert analog voltages to equivalent digital
    numbers:'
  prefs: []
  type: TYPE_NORMAL
- en: V [DD] (power)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: V [REF] (analog voltage reference)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DGND (digital ground)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AGND (analog ground)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DOUT (data out from MCP3008)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: CLK (clock pin)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DIN (data in from Raspberry Pi)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: /CS (chip select)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An analog input, channels 0 to 7 Table [A-1](#Tab1) lists the interconnections
    used for several robot car circuits in this book’s projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Table A-1.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
