- en: Software Installation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I used Adafruit’s MCP3008 library to interface the MCP3008 to the Raspberry
    Pi. You must first ensure that the SPI interface is enabled in the Jessie distribution.
    Use the raspi-config application to enable SPI, if it hasn’t already been enabled.
    You should enter the following commands once the SPI interface is enabled:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'There is an `examples` folder in the `Adafruit_Python_MCP3008` directory once
    the Adafruit library is installed. Go to the `examples` directory and run this
    command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: You should see a display similar to what is shown in Figure [A-13](#Fig13) .
  prefs: []
  type: TYPE_NORMAL
- en: '![A436848_1_En_BookBackmatter_Fig13_HTML.jpg](A436848_1_En_BookBackmatter_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure A-13.
  prefs: []
  type: TYPE_NORMAL
- en: simpletest.py display
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I believe that I sufficiently provided you with detailed information on how
    to build and set up a robot car for use in this book’s demonstrations, as well
    as for your own experiments. You can obviously modify and adjust the build instructions
    to suit your own situation. This is part of the fun and excitement of being a
    maker.
  prefs: []
  type: TYPE_NORMAL
