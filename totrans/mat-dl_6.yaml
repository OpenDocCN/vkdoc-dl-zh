- en: The representative methods include SIFT, HoG, Textons, Spin image, RIFT, and
    GLOH.
  prefs: []
  type: TYPE_NORMAL
- en: '[4](#Fn4_source)'
  prefs: []
  type: TYPE_NORMAL
- en: It is often explained using the local receptive filed and shared weights from
    the perspective of the ordinary neural network. However, they would not be helpful
    for beginners. This book does not insist its relationship with the ordinary neural
    network and explains it as a type of digital filter.
  prefs: []
  type: TYPE_NORMAL
- en: '[5](#Fn5_source)'
  prefs: []
  type: TYPE_NORMAL
- en: Also called kernels.
  prefs: []
  type: TYPE_NORMAL
- en: '[6](#Fn6_source)'
  prefs: []
