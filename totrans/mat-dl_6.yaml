- en: '[7](#Fn7_source)'
  prefs: []
  type: TYPE_NORMAL
- en: The designer decides how many elements to stride for each operation. It can
    be greater than one if the filter is larger.
  prefs: []
  type: TYPE_NORMAL
- en: '[8](#Fn8_source)'
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes the activation function is omitted depending on the problem.
  prefs: []
