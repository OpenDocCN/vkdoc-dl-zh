- en: Part IIITensorFlow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 第三部分TensorFlow
- en: 9. Deep Learning Fundamentals
  id: totrans-1
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 9. 深度学习基础
- en: In this chapter, we will describe a very important topic in deep learning fundamentals,
    the basic functions that deep learning is built on. Then we will try to build
    layers from these functions and combine these layers together to get a more complex
    model that will help us solve more complex problems, and all that will be described
    by TensorFlow examples.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们将描述深度学习基础中的一个非常重要的话题，即深度学习构建在基本函数之上。然后，我们将尝试从这些函数构建层并将这些层组合起来，以获得更复杂的模型，这将帮助我们解决更复杂的问题，所有这些都将通过TensorFlow示例进行描述。
- en: First we will describe the smallest component of almost any deep neural network,
    which is the neuron and sometimes called *perceptron* . We will discuss it in
    some detail, and we will deep dive because there’s much to cover in this chapter.
    Then we will illustrate the types of possible layers in a neural network, such
    as *input*, *hidden*, and *output* layers. As we are showing you the layers, we’ll
    describe the difference between shallow and deep neural networks. After describing
    the neuron, we will show you some of the activation functions you can use to build
    a better neural network. Then we’ll get into the learning procedure called gradient
    descent, an algorithm that helps learning happen. We will describe different types,
    such as full-batch, stochastic, and mini-batch gradient descent. And as learning
    happens, we need to check how good it is. We can do this with loss functions,
    so we will show you the different loss functions you can use to validate the learning
    of your model. Then we need to propagate the errors that your model makes to get
    better weights and good performance; and to do that, we need to show you the backpropagation
    algorithm and how it works. After describing this learning framework of neural
    networks, we think it is fair to show you some traps to avoid falling into in
    this area, called vanishing and exploding gradients. And last, we will go from
    theoretical to practical by refreshing your mind with some TensorFlow basics.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将描述几乎任何深度神经网络的最小组件，即神经元，有时也称为**感知器**。我们将对其进行详细讨论，并深入探讨，因为本章有很多内容需要涵盖。然后，我们将展示神经网络中可能的层类型，如**输入**、**隐藏**和**输出**层。在我们向您展示层的同时，我们将描述浅层和深层神经网络的区别。在描述神经元之后，我们将向您展示一些可用于构建更好神经网络的激活函数。然后，我们将探讨称为梯度下降的学习过程，这是一个帮助学习发生的算法。我们将描述不同类型，如全批量、随机和迷你批量梯度下降。在学习过程中，我们需要检查其效果如何。我们可以通过损失函数来完成这项工作，因此我们将向您展示可用于验证模型学习的不同损失函数。然后，我们需要传播模型犯的错误以获得更好的权重和良好的性能；为此，我们需要向您展示反向传播算法及其工作原理。在描述了神经网络的学习框架之后，我们认为展示一些在这个领域应避免的陷阱是公平的，这些陷阱被称为梯度消失和梯度爆炸。最后，我们将通过刷新一些TensorFlow基础知识，从理论转向实践。
- en: Perceptron
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 感知器
- en: The most fundamental unit of a deep neural network is called *an* *artificial
    neuron* , which takes an input, processes it, passes it through an activation
    function like the *sigmoid*, and returns the activated output. In this section,
    we are only going to talk about the *perceptron* model proposed before the “*activation*”
    part came into the picture.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 深度神经网络的最基本单元被称为**人工神经元**，它接收输入，对其进行处理，通过一个激活函数（如**sigmoid**函数）传递，并返回激活后的输出。在本节中，我们只将讨论在“**激活**”部分出现之前提出的**感知器**模型。
- en: A **Perceptron** is the smallest layer in the neural network. It is a linear
    classifier (binary), and it is used in supervised learning. It helps to classify
    the given input data; the output value is f(x) calculated as *f*(*x*) = ⟨*w*,
    *x*⟩ + *b*
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**感知器**是神经网络中最小的层。它是一个线性分类器（二分类），用于监督学习。它有助于对给定的输入数据进行分类；输出值是计算为 f(x) = ⟨w,
    x⟩ + b'
- en: where *w* is a vector of weights and ⟨·, ·⟩ denotes the dot product. We use
    the dot product as we are computing a weighted sum. The sign of *f*(*x*) is used
    to classify *x* as either a positive or a negative instance.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 w 是权重向量，⟨·, ·⟩ 表示点积。我们使用点积是因为我们正在计算加权总和。f(x) 的符号用于将 x 分类为正实例或负实例。
- en: Since the inputs are fed directly to the output via the weights, the perceptron
    can be considered the simplest kind of feedforward network.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由于输入直接通过权重传递到输出，因此感知器可以被认为是前馈网络中最简单的一种。
- en: Before diving into the mathematics that powers this algorithm, let’s see a little
    history on how they got the concept of the perceptron, which is neuron as we talked
    about in Chapter [1](484548_1_En_1_Chapter.xhtml).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨推动此算法的数学之前，让我们看看他们是如何得到感知器概念的，正如我们在第[1](484548_1_En_1_Chapter.xhtml)章中讨论的神经元一样。
- en: The very first step toward the perceptron we use today was taken in 1943 by
    Warren MuCulloch (a neuroscientist) and Walter Pitts (a logician), by mimicking
    the functionality of a biological neuron. Figure [9-1](#Fig1) describes the neuron
    notation.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们今天使用的感知器的第一步是在1943年由神经科学家Warren MuCulloch和逻辑学家Walter Pitts采取的，他们通过模拟生物神经元的机能。图[9-1](#Fig1)描述了神经元符号。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig1_HTML.jpg](Images/484548_1_En_9_Fig1_HTML.jpg)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig1_HTML.jpg](Images/484548_1_En_9_Fig1_HTML.jpg)'
- en: Figure 9-1
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-1
- en: The notation of a biological neuron
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 生物神经元的符号
- en: As we see in Figure [9-1](#Fig1), there are two sides in this node, *g* and
    *f*; one of them takes the input. As we can see in the figure, *g* take a fixed
    size vector of data *x*[1], …, *x*[*n*], and performs an aggregation operation.
    On the other hand, the *f* function makes a decision; this decision is made based
    on the aggregated value in *f*. Let’s elaborate more on this idea.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在图[9-1](#Fig1)中看到的那样，这个节点有两个方面，*g*和*f*；其中之一接受输入。正如我们在图中看到的那样，*g*接受一个固定大小的数据向量*x*[1]，…，*x*[*n*]，并执行聚合操作。另一方面，*f*函数做出决定；这个决定是基于*f*中的聚合值。让我们更详细地阐述这个想法。
- en: 'Let’s suppose that we want to predict a decision: whether to watch a random
    soccer game or not on TV. The inputs are all Boolean (i.e., {0, 1}) and my output
    variable is also Boolean {0 : *Will watch it*, 1 : *Won*^’*t watch it*}.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们想要预测一个决定：是否在电视上看一场随机的足球比赛。所有输入都是布尔值（即，{0, 1}），我的输出变量也是布尔值 {0 : *Will watch it*,
    1 : *Won*^’*t watch it*}。
- en: So, now we need to construct our data variables. Let’s assume that *x*[1] could
    be *isPremierLeagueOn* (I like Premier League more), *x*[2] could be *isItAFriendlyGame*
    (I tend to care less about the friendliness), *x*[3] could be *isNotHome* (I can’t
    watch it when I’m running errands, can I?), and *x*[4] could be *isManUnitedPlaying*
    (I am a big Man United fan. GGMU!)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，现在我们需要构建我们的数据变量。让我们假设*x*[1]可以是*isPremierLeagueOn*（我喜欢英超联赛），*x*[2]可以是*isItAFriendlyGame*（我对友谊赛不太关心），*x*[3]可以是*isNotHome*（我在跑腿时不能看它，可以吗？），而*x*[4]可以是*isManUnitedPlaying*（我是一个曼联的大粉丝。GGMU！）
- en: We only have four observations about the data we have, like *x*[3]. If *x*[3]
    is 1 (not home), then my output will always be 0 (I can’t watch it when I’m running
    errands.), so the neuron will never fire, but we need to have a good output note
    at this point. As we see in the example, these inputs can either be excitatory
    or inhibitory. So what is the difference between them (Table [9-1](#Tab1))?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只有关于我们拥有的数据的四个观察结果，就像*x*[3]。如果*x*[3]是1（不在家），那么我的输出将始终是0（我在跑腿时不能看它。），因此神经元永远不会放电，但在这个时候我们需要一个好的输出注释。正如我们在示例中看到的那样，这些输入可以是兴奋性的或抑制性的。那么它们之间有什么区别（表[9-1](#Tab1)）？
- en: Table 9-1
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 表9-1
- en: The Difference Between Excitatory and Inhibitory
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 兴奋性和抑制性的区别
- en: '| Excitatory | Inhibitory |'
  id: totrans-20
  prefs: []
  type: TYPE_TB
  zh: '| 兴奋性 | 抑制性 |'
- en: '| --- | --- |'
  id: totrans-21
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| Inhibitory inputs are those that have maximum effect on the decision making,
    irrespective of other inputs. | Inputs are NOT the ones that will make the neuron
    fire on its own, but they might fire it when combined together. |'
  id: totrans-22
  prefs: []
  type: TYPE_TB
  zh: '| 抑制性输入是指那些对决策有最大影响，而不管其他输入的输入。 | 输入不是那些会单独使神经元放电的输入，但它们可能在与其他输入结合时使其放电。 |'
- en: We need to make an equation to deduce how we can fire this perceptron and when
    we can’t fire it. The formula is just a summation equation of all the inputs and
    the gave the output a domain about how we can act with the output we have (Figure
    [9-2](#Fig2)).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要制定一个方程来推断我们如何使这个感知器放电，以及我们何时不能使其放电。这个公式只是所有输入的总和方程，并给输出一个关于我们如何使用现有输出的作用域（图[9-2](#Fig2)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig2_HTML.jpg](Images/484548_1_En_9_Fig2_HTML.jpg)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig2_HTML.jpg](Images/484548_1_En_9_Fig2_HTML.jpg)'
- en: Figure 9-2
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-2
- en: The equations that power the perceptron
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 推动感知器工作的方程
- en: We can see that *g*(*x*) is just doing a sum of the inputs—a simple aggregation—and
    theta here is called the thresholding parameter . For example, if I always watch
    the game when the sum turns out to be 2 or more, the theta is 2 here. This is
    called the thresholding logic.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，*g*(*x*)只是对输入进行求和——这是一种简单的聚合——这里的theta被称为阈值参数。例如，如果我在总和达到2或更多时总是观看比赛，这里的theta就是2。这被称为阈值逻辑。
- en: Let’s see an example of how it works with the *AND* Boolean gate (Figure [9-3](#Fig3)).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看它与*AND*布尔门（图[9-3](#Fig3)）是如何工作的一个例子。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig3_HTML.jpg](Images/484548_1_En_9_Fig3_HTML.jpg)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig3_HTML.jpg](Images/484548_1_En_9_Fig3_HTML.jpg)'
- en: Figure 9-3
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-3
- en: The AND Boolean gate operation — neuron style
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: AND布尔门操作——神经元风格
- en: 'An *AND* function neuron would only fire when **ALL** the inputs are ON, like
    when *g*(*x*) ≥ 3\. Researchers should know that the original M-P (*MuCulloch,
    Pitts*) neuron is not so good at everything we work with. It has some limitations,
    so let’s see those limitations. We’ll explain the M-P neuron but we may see some
    questions that the M-P neuron can’t handle:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一个*AND*函数神经元只有在**所有**输入都开启时才会触发，比如当*g*(*x*) ≥ 3时。研究人员应该知道，原始的M-P（*MuCulloch,
    Pitts*）神经元并不擅长我们处理的所有事情。它有一些局限性，所以让我们看看这些局限性。我们将解释M-P神经元，但我们可能会看到一些M-P神经元无法处理的问题：
- en: What about non-Boolean (say, real) inputs? We haven’t any Boolean inputs; we
    have ranges and variety of numbers, like {1, 2, 4, 5}.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于非布尔（例如，实数）输入怎么办？我们没有布尔输入；我们有像{1, 2, 4, 5}这样的范围和多种数字。
- en: Do we always need to hand code the threshold? We should have some dynamic work
    with the threshold values.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否总是需要手动编码阈值？我们应该对阈值值进行一些动态处理。
- en: Are all inputs equal? What if we want to assign more importance to some inputs?
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 所有的输入都相等吗？如果我们想要给某些输入分配更高的权重怎么办？
- en: What about functions that are not linearly separable, say, the XOR function?
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于非线性可分函数怎么办，比如XOR函数？
- en: We see the limitations in this model. I hope it is now clear why we are not
    using the M-P neuron today. Overcoming the limitations of the M-P neuron, Frank
    Rosenblatt, an American psychologist, proposed the classical perception model,
    the mighty artificial neuron, in 1958\. It is a more generalized computational
    model than the McCulloch-Pitts neuron, where weights and thresholds can be learned
    over time. But what’s the difference between McCulloch-Pitts and Minsky-Papert.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到这个模型的局限性。我希望现在很清楚为什么我们现在不使用M-P神经元。克服M-P神经元的局限性，美国心理学家Frank Rosenblatt在1958年提出了经典感知模型，强大的人工神经元。它比McCulloch-Pitts神经元是一个更通用的计算模型，其中权重和阈值可以在时间上学习。但McCulloch-Pitts和Minsky-Papert之间有什么区别。
- en: The perceptron model, proposed by Minsky-Papert (Figure [9-4](#Fig4)), is a
    more general computational model than the McCulloch-Pitts neuron. It overcomes
    some of the limitations of the M-P neuron by introducing the concept of numerical
    weights (a measure of importance) for inputs, and a mechanism for learning those
    weights. Inputs are no longer limited to Boolean values, as is the case of an
    M-P neuron; it supports real inputs as well, which makes it more useful and generalized.
    This is the perceptron, the most fundamental unit of a deep neural network, called
    an artificial neuron.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 由Minsky-Papert提出的感知器模型（图[9-4](#Fig4)）比McCulloch-Pitts神经元是一个更通用的计算模型。它通过引入输入的数值权重（重要性的度量）和权重学习机制来克服M-P神经元的某些局限性。输入不再仅限于布尔值，就像M-P神经元那样；它还支持实数输入，这使得它更有用和更通用。这就是感知器，它是深度神经网络中最基本的单元，被称为人工神经元。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig4_HTML.jpg](Images/484548_1_En_9_Fig4_HTML.jpg)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig4_HTML.jpg](Images/484548_1_En_9_Fig4_HTML.jpg)'
- en: Figure 9-4
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-4
- en: The Minsky perceptron model
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Minsky感知器模型
- en: 'Let’s talk about the perceptron model and how it works in a dynamic way. As
    we look at the new version of the perceptron, we see one difference: we have a
    new variable called *weights*. We take a weighted sum of the inputs and set the
    output as one only when the sum is more than an arbitrary threshold (theta). However,
    according to the convention, instead of hand coding the thresholding parameter
    theta, we add it as one of the inputs, with the weight -theta as shown in the
    following, which makes it learnable. This is called the PLA (Perceptron Learning
    Algorithm); the equation will change in this way:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈感知器模型以及它是如何以动态方式工作的。当我们看感知器的新版本时，我们看到一个区别：我们有一个新的变量叫做 *权重*。我们取输入的加权总和，并且只有当总和超过一个任意的阈值（theta）时，我们才将输出设置为
    1。然而，根据惯例，我们不是手动编码阈值参数 theta，而是将其作为输入之一添加，如下所示，权重为 -theta，这使得它可学习。这被称为 PLA（感知器学习算法）；方程将这样改变：
- en: '![$$ y=1\kern1em if\ {\sum}_{i=0}^n{w}_i{x}_i\ge 0 $$](Images/484548_1_En_9_Chapter_TeX_Equa.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![$$ y=1\kern1em if\ {\sum}_{i=0}^n{w}_i{x}_i\ge 0 $$](Images/484548_1_En_9_Chapter_TeX_Equa.png)'
- en: '![$$ y=0\kern1em if\ {\sum}_{i=0}^n{w}_i{x}_i&lt;0 $$](Images/484548_1_En_9_Chapter_TeX_Equb.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![$$ y=0\kern1em if\ {\sum}_{i=0}^n{w}_i{x}_i<0 $$](Images/484548_1_En_9_Chapter_TeX_Equb.png)'
- en: '![$$ where,{x}_0=1\  and\ {w}_0=-\theta $$](Images/484548_1_En_9_Chapter_TeX_Equc.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![$$ where,{x}_0=1\  and\ {w}_0=-\theta $$](Images/484548_1_En_9_Chapter_TeX_Equc.png)'
- en: Let’s go back to our friend predicting whether I would watch a random game of
    soccer on TV or not using the behavioral data available. And let’s assume my decision
    is solely dependent on three binary inputs (binary used for simplicity).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到我们的朋友使用可用的行为数据预测我是否会看电视上随机的一场比赛。并且假设我的决定仅依赖于三个二元输入（二元用于简化）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig5_HTML.jpg](Images/484548_1_En_9_Fig5_HTML.jpg)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig5_HTML.jpg](Images/484548_1_En_9_Fig5_HTML.jpg)'
- en: Figure 9-5
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-5
- en: The soccer example implementation using a perceptron
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 使用感知器实现的足球示例
- en: One point about the preceding photo is that *w*[0] is the *bias* value. Now,
    let’s continue the example. A soccer freak may have a very low threshold and may
    watch any soccer game irrespective of the league, club, or importance of the game
    **[theta = 0].** On the other hand, a selective viewer may only watch a soccer
    game that is a Premier League game, featuring a Man United game, that is not friendly
    **[theta = 2]**. The key points are the **weights** and the **bias**, and they
    will depend on the data (my viewing history, in this case).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 关于前面照片的一点是，*w*[0] 是 *偏差* 值。现在，让我们继续这个例子。一个足球狂热者可能有一个非常低的阈值，可能不看联赛、俱乐部或比赛的重要性而看任何足球比赛
    **[theta = 0]**。另一方面，一个选择性的观众可能只看英超联赛的比赛，包括曼联的比赛，而不是友谊赛 **[theta = 2]**。关键点是 **权重**
    和 **偏差**，它们将取决于数据（在这种情况下是我的观看历史）。
- en: '*Bias* *occurs when an algorithm has limited flexibility to learn the true
    signal from the dataset*.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*偏差*发生在算法在数据集中学习真实信号时灵活性有限。'
- en: Let’s take an example of Boolean functions using a perceptron. We will use the
    OR function, which is the easiest one of all Boolean functions (Figure [9-6](#Fig6)).
    We will make you try to solve this equation by using the AND Boolean function,
    but for now, let’s use OR.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个感知器来举一个布尔函数的例子。我们将使用 OR 函数，这是所有布尔函数中最简单的一个（图 [9-6](#Fig6)）。我们将让你尝试使用 AND
    布尔函数来解这个方程，但现在让我们使用 OR。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig6_HTML.jpg](Images/484548_1_En_9_Fig6_HTML.jpg)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig6_HTML.jpg](Images/484548_1_En_9_Fig6_HTML.jpg)'
- en: Figure 9-6
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-6
- en: The equation of an OR Gate
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: OR 门的方程
- en: But by the way, is XOR (exclusive OR) reliable to use with the perceptron model?
    The answer is **no**, because we can’t separate nonlinear functions to positive
    and negative tuples. The table of XOR is shown in Figure [9-7](#Fig7).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 但是顺便问一下，XOR（异或）与感知器模型一起使用可靠吗？答案是**不**，因为我们不能将非线性函数分离为正负元组。XOR的真值表如图 [9-7](#Fig7)
    所示。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig7_HTML.jpg](Images/484548_1_En_9_Fig7_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig7_HTML.jpg](Images/484548_1_En_9_Fig7_HTML.jpg)'
- en: Figure 9-7
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-7
- en: The XOR Gate implementation using a perceptron
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 使用感知器实现的 XOR 门
- en: As we see, it isn’t separable output values, where in the OR function it is
    separable; let’s see this in graphs (Figure [9-8](#Fig8)).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，输出值不是可分离的，在 OR 函数中它是可分离的；让我们在图表中看看（图 [9-8](#Fig8)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig8_HTML.jpg](Images/484548_1_En_9_Fig8_HTML.jpg)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig8_HTML.jpg](Images/484548_1_En_9_Fig8_HTML.jpg)'
- en: Figure 9-8
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-8
- en: The OR gate (left); the XOR gate (right)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: OR门（左）；XOR门（右）
- en: But what about a multilayer perceptron? We will talk about it later, but we
    should first conclude about these two approaches of perceptron (Figure [9-9](#Fig9))
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，多层感知器又是怎样的呢？我们稍后再谈，但首先我们应该总结一下这两种感知器的方法（图[9-9](#Fig9)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig9_HTML.jpg](Images/484548_1_En_9_Fig9_HTML.jpg)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig9_HTML.jpg](Images/484548_1_En_9_Fig9_HTML.jpg)'
- en: Figure 9-9
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-9
- en: The McCulloch neuron vs. perceptron
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 麦克洛奇神经元与感知器
- en: 'We don’t need to make a further comparison; just the preceding equations and
    the explanations will lead you to understand the concept. From this section, we
    aim to allow you get to know the perceptron learning algorithm , which is based
    on two types of perceptron: single perceptron and multiple perceptrons. Before
    we talk about the types of perceptron, we need to list the major components of
    a perceptron:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要进行进一步的比较；前面的方程和解释就足以让你理解这个概念。从本节开始，我们旨在让你了解基于两种类型的感知器（单个感知器和多个感知器）的感知器学习算法。在我们讨论感知器的类型之前，我们需要列出感知器的主要组成部分：
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig10_HTML.jpg](Images/484548_1_En_9_Fig10_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig10_HTML.jpg](Images/484548_1_En_9_Fig10_HTML.jpg)'
- en: Figure 9-10
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-10
- en: The perceptron in detail steps
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 感知器的详细步骤
- en: '*Input* : All the features become the input for a perceptron. We denote the
    input of a perceptron by [*x*[1], …,  *x*[*n*]], where *x* represents the feature
    value and n represents the total number of features. We also have a special kind
    of input called the bias. In the image (Figure [9-10](#Fig10)), we have described
    the value of the bias as *w*[0].'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入*：所有特征都成为感知器的输入。我们用[*x*[1], …,  *x*[*n*]]表示感知器的输入，其中*x*代表特征值，n代表特征的总数。我们还有一个特殊的输入，称为偏差。在图像（图[9-10](#Fig10)）中，我们将偏差的值描述为*w*[0]。'
- en: '*Weights* : The values that are computed over the time of training the model.
    Initially, we start the value of weights with some initial value and these values
    get updated for each training error. We represent the weights for a perceptron
    by [*w*[1], …,  *w*[*n*]].'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*权重*：在训练模型的过程中计算出的值。最初，我们以某个初始值开始权重的值，并且这些值会随着每个训练错误的更新而更新。我们用[*w*[1], …,  *w*[*n*]]表示感知器的权重。'
- en: '*Bias*: A bias neuron allows a classifier to shift the decision boundary left
    or right. In algebraic terms, the bias neuron allows a classifier to translate
    its decision boundary. It aims to “*move every point a constant distance in a
    specified direction.*”'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*偏差*：偏差神经元允许分类器将决策边界向左或向右移动。在代数术语中，偏差神经元允许分类器平移其决策边界。它的目的是“*将每个点沿指定方向移动一个常量距离*”。'
- en: '*Bias helps to train the model faster and with better quality.*'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*偏差有助于更快、更好地训练模型*。'
- en: '*Weighted summation*: Weighted summation is the sum of the values that we get
    after the multiplication of each weight *w*[*n*] associated with each feature
    value *x*[*n*]. We represent the weighted summation by ![$$ {\sum}_{i=0}^n{w}_i{x}_i
    $$](Images/484548_1_En_9_Chapter_TeX_IEq1.png).'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*加权求和*：加权求和是每个与特征值*x*[*n*]相关的权重*w*[*n*]相乘后得到的值的总和。我们用![$$ {\sum}_{i=0}^n{w}_i{x}_i
    $$](Images/484548_1_En_9_Chapter_TeX_IEq1.png)表示加权求和。'
- en: '*Step/activation function*: The role of activation functions is to make neural
    networks nonlinear. For linear classification, for example, it becomes necessary
    to make the perceptron as linear as possible. We will talk about this in the next
    sections, but it’s good to know about it.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*步/激活函数*：激活函数的作用是使神经网络非线性。例如，对于线性分类，需要尽可能使感知器线性化。我们将在下一节中讨论这个问题，但了解这一点是好的。'
- en: '*Output*: The weighted summation is passed to the step/activation function,
    and whatever value we get after computation is our predicted output.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输出*：加权求和传递到步/激活函数，计算后得到的任何值都是我们的预测输出。'
- en: Single Perceptron
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 单个感知器
- en: A single perceptron is a basic fundamental function in the neural network, and
    it only works with a binary classifier. We’ve already talked a lot about it. But
    if we have more than two classes, we will want to get into the multilayer perceptron.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 单个感知器是神经网络中的基本基本函数，它仅与二元分类器一起工作。我们已经谈了很多关于它。但是，如果我们有超过两个类别，我们就会想要了解多层感知器。
- en: Multilayer Perceptron
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多层感知器
- en: A multilayer perceptron (MLP) contains one or more hidden layers (apart from
    one input and one output layer). While a single layer perceptron can only learn
    linear functions, a multilayer perceptron can also learn nonlinear functions (Figure
    [9-11](#Fig11)).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器（MLP）包含一个或多个隐藏层（除了一个输入层和一个输出层）。虽然单层感知器只能学习线性函数，但多层感知器也可以学习非线性函数（图 [9-11](#Fig11)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig11_HTML.jpg](Images/484548_1_En_9_Fig11_HTML.jpg)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig11_HTML.jpg](Images/484548_1_En_9_Fig11_HTML.jpg)'
- en: Figure 9-11
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-11
- en: Multilayered perceptron architecture
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器架构
- en: '*Input layer*: The input layer has three nodes. The bias node has a value of
    1\. The other two nodes take *X*[1] and *X*[2] as external inputs (which are numerical
    values depending upon the input dataset). As discussed, no computation is performed
    in the input layer, so the outputs from nodes in the input layer are 1, *X*[1],
    and *X*[2], respectively, which are fed into the hidden layer.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入层*：输入层有三个节点。偏置节点的值为1。其他两个节点接收 *X*[1] 和 *X*[2] 作为外部输入（这些是依赖于输入数据集的数值）。如前所述，输入层不执行任何计算，因此输入层节点的输出分别是1,
    *X*[1] 和 *X*[2]，这些被输入到隐藏层。'
- en: '*Hidden layer*: The hidden layer also has three nodes, with the bias node having
    an output of 1\. The output of the other two nodes in the hidden layer depends
    on the outputs from the input layer (1, *X*[1], *X*[2]) as well as the weights
    associated with the connections (**edges**). Then these edges are connected to
    the output layer.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*隐藏层*：隐藏层也有三个节点，偏置节点输出为1。隐藏层中其他两个节点的输出取决于输入层的输出（1, *X*[1], *X*[2]）以及与连接（**边**）相关的权重。然后这些边连接到输出层。'
- en: Note
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: '*f* refers to the activation function. These outputs are then fed to the nodes
    in the output layer.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '*f* 代表激活函数。这些输出随后被输入到输出层的节点中。'
- en: '*Output layer*: The output layer has two nodes that take inputs from the hidden
    layer and perform similar computations as shown for the highlighted hidden node.
    The values calculated (*Y*[1] and *Y*[2]) as a result of these computations act
    as outputs of the multilayer perceptron .'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输出层*：输出层有两个节点，它们从隐藏层接收输入并执行与突出显示的隐藏节点类似的计算。这些计算的结果值（*Y*[1] 和 *Y*[2]）作为多层感知器的输出。'
- en: Recap
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回顾
- en: To recap , we learned in this section that the perceptron is the fundamental
    function of the neural network. When you have only one perceptron, you have a
    single perceptron that will solve binary classification problems; but if you have
    a nonlinear classification problem, you will need to use more than one perceptron
    to solve this problem, like OR and XOR.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾，在本节中我们了解到感知器是神经网络的根本功能。当你只有一个感知器时，你有一个用于解决二元分类问题的单个感知器；但如果你有一个非线性分类问题，你需要使用多个感知器来解决这个问题，比如
    OR 和 XOR。
- en: Different Neural Network Layers
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不同的神经网络层
- en: Before we start working with layers in the neural network, we should understand
    exactly what layers are. *Layer* is a general term that applies to a collection
    of nodes (perceptron), which contain an *activation function* (e.g., sigmoid).
    Patterns are presented to the network via the **input layer** , which communicates
    to one or more **hidden layers** where the actual processing is done via a system
    of weighted connections (edges). The hidden layers then link to an **output layer**
    .
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始处理神经网络中的层之前，我们应该确切地了解层是什么。*层*是一个通用术语，适用于节点（感知器）的集合，这些节点包含一个 *激活函数*（例如，Sigmoid）。模式通过
    **输入层** 传递给网络，该层与一个或多个 **隐藏层** 通信，实际处理通过加权连接（边）系统完成。隐藏层随后连接到 **输出层**。
- en: Figure [9-12](#Fig12) illustrates each layer.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-12](#Fig12) 展示了每一层。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig12_HTML.jpg](Images/484548_1_En_9_Fig12_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig12_HTML.jpg](Images/484548_1_En_9_Fig12_HTML.jpg)'
- en: Figure 9-12
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-12
- en: Multilayered neural network architecture
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 多层神经网络架构
- en: A neural network is made up of an input layer, one or more hidden layers, and
    an output layer. Every layer has one or more perceptrons, which combine together
    to make a layer. Every layer has a name, which describes its position.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络由一个输入层、一个或多个隐藏层和一个输出层组成。每个层都有一个或多个感知器，它们组合在一起形成一个层。每个层都有一个名称，描述其位置。
- en: Input Layer
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输入层
- en: 'The first layer in Figure [9-12](#Fig12) is called the *input layer* , which
    has nodes; the nodes of the input layer are **passive**. Passive means that they
    do not modify the data; they receive a single value on their input and duplicate
    the value to their multiple outputs. All of the input variables are represented
    as input nodes; each value from the input layer is duplicated and sent to all
    of the hidden nodes, which are contained in the **hidden layer**. This takes us
    to a new question: *what is the hidden layer?*'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [9-12](#Fig12) 中的第一层被称为*输入层*，它包含节点；输入层的节点是**被动**的。被动意味着它们不修改数据；它们在其输入上接收单个值并将其复制到多个输出。所有输入变量都表示为输入节点；输入层中的每个值都被复制并发送到所有隐藏节点，这些节点包含在**隐藏层**中。这引出了一个新的问题：*什么是隐藏层？*
- en: Hidden Layer(s)
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 隐藏层（s）
- en: All of the input variables that came from the input layer are combined across
    one or more nodes (summation node or activation node) in the hidden layer. This
    essentially creates new features, derived from the input data provided, and then
    through these features to a new hidden layer and so on to get into the **output
    layer**. All input nodes are connected to all nodes in the hidden layer. We should
    note that the key point of difference between shallow and deep neural networks
    is the number of hidden layers. If you have more than one connected hidden layer,
    it’s a deep neural network, but if we have only one hidden layer, it’s a shallow
    neural network. As we see, the input data is going to the hidden layer with bias
    and weights parameters. But is there only one way that data is weighted? The answer
    is **no**.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 所有来自输入层的输入变量都通过隐藏层中的一个或多个节点（求和节点或激活节点）组合。这本质上创建了新的特征，这些特征是从提供的输入数据中派生出来的，然后通过这些特征进入新的隐藏层，依此类推，最终到达**输出层**。所有输入节点都与隐藏层中的所有节点相连。我们应该注意，浅层和深层神经网络之间的关键区别是隐藏层的数量。如果你有多个连接的隐藏层，那么它是一个深层神经网络，但如果我们只有一个隐藏层，那么它是一个浅层神经网络。正如我们所见，输入数据将带有偏差和权重参数进入隐藏层。但是，数据加权只有一种方式吗？答案是**不是**。
- en: Hidden neural network layers are set up in many different ways. In some cases,
    weighted inputs are randomly assigned. In other cases, they are fine-tuned and
    calibrated through a process called backpropagation. But we have many types of
    neural networks (*sequence, convolution, feedforward*, etc.), so there are different
    ways to set up these hidden layers to generate various results. Convolutional
    neural networks focus on image processing; recurrent neural networks contain an
    element of memory; and simple feedforward neural networks work in a straightforward
    way on training data sets.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 隐藏的神经网络层可以以许多不同的方式设置。在某些情况下，加权输入被随机分配。在其他情况下，它们通过称为反向传播的过程进行微调和校准。但是，我们有许多类型的神经网络（*序列、卷积、前馈*等），因此设置这些隐藏层以生成各种结果的方式也不同。卷积神经网络专注于图像处理；循环神经网络包含记忆元素；而简单的前馈神经网络在训练数据集上以直接的方式工作。
- en: 'So, a full description of the hidden layer is: artificial neurons take in a
    set of weighted inputs and produce an output through an activation function. It
    is a typical part of nearly any neural network, in which engineers simulate the
    types of activities that go on in the human brain.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，隐藏层的完整描述是：人工神经元接收一组加权输入并通过激活函数产生输出。它是几乎所有神经网络的一个典型部分，其中工程师模拟人类大脑中发生的活动类型。
- en: Output Layer
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输出层
- en: The output layer in an artificial neural network is the last layer of neurons,
    which produces given outputs for the program. Though they are made much like other
    artificial neurons in the neural network, output layer neurons may be built or
    observed in a different way, given that they are the last “actor” nodes on the
    network.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 人工神经网络中的输出层是神经元的最外层，它为程序产生特定的输出。尽管它们在神经网络中与其他人工神经元非常相似，但输出层神经元可能以不同的方式构建或观察，因为它们是网络上的最后一个“演员”节点。
- en: Shallow vs. Deep Neural Networks
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 浅层与深层神经网络
- en: Here we don’t want to get too far into comparison. We will just consider what
    makes a shallow network “shallow,” and the same with deep neural networks. Neural
    networks can be recurrent or feedforward; feedforward ones do not have any loops
    in their graph and can be organized in layers. If there are many layers, then
    we say that the network is deep.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们不想深入比较。我们只考虑什么使浅层网络“浅”，以及深层神经网络也是如此。神经网络可以是循环的或前馈的；前馈网络在其图中没有任何循环，并且可以分层组织。如果有许多层，那么我们说该网络是深的。
- en: But we have a question about what makes a neural network deep. Practically speaking,
    *how many layers does a network have to have in order to qualify as deep?*
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们有一个关于什么使神经网络成为深度的问题。从实际的角度讲，*网络需要有多少层才能被认定为深度？*
- en: Usually, if we have two or more hidden layers, we call it a *deep* neural network.
    In contrast, a network with only a single hidden layer is conventionally called
    *shallow* (Figure [9-13](#Fig13)).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，如果我们有两个或更多隐藏层，我们称之为*深度*神经网络。相比之下，只有一个隐藏层的网络传统上被称为*浅层*（图[9-13](#Fig13)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig13_HTML.jpg](Images/484548_1_En_9_Fig13_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig13_HTML.jpg](Images/484548_1_En_9_Fig13_HTML.jpg)'
- en: Figure 9-13
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-13
- en: The difference between a shallow vs. deep neural network
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 浅层与深度神经网络的区别
- en: 'We think that a shallow network *could* perform as well as the deeper ones.
    But there are still questions about this subject. We don’t have an accurate answer,
    but we can produce some points for consideration about deep and shallow, and which
    performs the best:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认为浅层网络*可能*表现得和深层网络一样好。但关于这个问题仍有疑问。我们没有一个准确的答案，但我们可以提出一些关于深度和浅层，以及哪个表现最好的考虑点：
- en: Maybe a shallow network is more difficult to train with our current algorithms.
  id: totrans-116
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可能浅层网络用我们当前的算法训练起来更困难。
- en: Maybe a shallow architecture does not fit the kind of problems we are usually
    trying to solve.
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可能浅层架构不适合我们通常试图解决的问题类型。
- en: It can be argued that the number of units in a shallow network grows exponentially
    with task complexity. It may be that if you have a more complex task you want
    your model to fit, you need to have more neurons. So in order to be useful, a
    shallow network might need to have more neurons, possibly much bigger than a deep
    network.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 可以认为浅层网络中的单元数量随着任务复杂性的增加呈指数增长。可能的情况是，如果你有一个更复杂的任务需要你的模型去拟合，你可能需要更多的神经元。因此，为了有用，浅层网络可能需要更多的神经元，可能比深度网络大得多。
- en: These answers may be good to ponder the differences, but with a neural network
    you never know if using it deep or shallow may fit or not. But we will see that
    in a trial and error sequence. The amount of progress achieved in deep learning
    over the last ten years is truly amazing, but most of this progress was achieved
    by trial and error. We still lack very basic understanding about what exactly
    makes deep nets work so well. Even the list of things that people consider to
    be crucial for setting up an effective deep network seems to change every couple
    of years.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这些答案可能有助于思考差异，但使用神经网络时，你永远不知道使用深度或浅层是否合适。但我们将通过试错过程来看到这一点。在过去十年中，深度学习取得的进步确实是惊人的，但大多数进步是通过试错实现的。我们仍然缺乏对深度网络为何工作得如此之好的基本理解。甚至人们认为对于设置一个有效的深度网络至关重要的因素似乎每隔几年就会改变。
- en: 'The conclusion is that we have two designs of the neural network: one if you
    have only one hidden layer we now talk about a shallow neural network if the hidden
    layers exceeded we now talk about the deep neural network, There is nothing that
    says you *must* use a deep neural network, but we assume it may be good for many
    types of complex data.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 结论是，我们有两种神经网络的设计：如果你只有一个隐藏层，我们现在讨论的是浅层神经网络；如果隐藏层超过一个，我们现在讨论的是深度神经网络。没有规定你*必须*使用深度神经网络，但我们假设它可能对许多类型的复杂数据是有益的。
- en: Activation Functions
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激活函数
- en: Neural network activation functions are a mathematical “gate.” The main concept
    of the activation function is the perceptron, and neural network activation functions
    are a crucial component of deep learning.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的激活函数是一个数学上的“门”。激活函数的主要概念是感知器，神经网络激活函数是深度学习的一个关键组成部分。
- en: Activation functions determine the output of a deep learning model; its accuracy;
    and also the computational efficiency of training a model, which can make or break
    a large-scale neural network. The activation function is a very important part
    in neural network architecture, because activation functions have a major effect
    on the neural network’s ability to converge and the convergence speed. In some
    cases, activation functions might prevent neural networks from converging in the
    first place. Their main purpose is to convert an input signal of a node in an
    ANN to an output signal.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数决定了深度学习模型的输出、准确性和训练模型的计算效率，这可能会使大规模神经网络成功或失败。激活函数是神经网络架构中非常重要的一个部分，因为激活函数对神经网络收敛能力和收敛速度有重大影响。在某些情况下，激活函数可能会阻止神经网络首先收敛。它们的主要目的是将人工神经网络中节点的输入信号转换为输出信号。
- en: Activation functions are mathematical equations that determine the output of
    a neural network. After describing the activation function, we may still want
    to know more about what it does. The function is attached to each neuron in the
    network and determines whether it should be fired or not; it does this based on
    whether each neuron’s input is relevant for the model’s prediction. Activation
    functions also help normalize the output of each neuron to a range between 1 and
    0 or between -1 and 1.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数是数学方程，决定了神经网络的输出。在描述了激活函数之后，我们可能还想了解更多关于它所做的工作。该函数附加到网络中的每个神经元上，并决定它是否应该被激活；它是根据每个神经元的输入是否对模型的预测相关来决定这一点的。激活函数还有助于将每个神经元的输出标准化到1和0或-1和1之间。
- en: The question is asked *what is the* *role of* *the activation function in a
    model?* As we saw in the previous section talking about layers, data points are
    transferred from the input layer to the output layer, passed by hidden layers.
    Each neuron has a weight, and multiplying the input number with the weight gives
    the output of the neuron, which is transferred to the next layer.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 提问：*激活函数在模型中的作用是什么？* 如我们在上一节关于层的讨论中看到的，数据点从输入层传输到输出层，通过隐藏层传递。每个神经元都有一个权重，将输入数字与权重相乘得到神经元的输出，然后传递到下一层。
- en: The activation function is located in between the input feeding the current
    neuron and its output going to the next layer (Figure [9-14](#Fig14)). It can
    be as simple as a step function that turns the neuron output on and off, depending
    on a rule or threshold. Or it can be a transformation that maps the input signals
    into output signals that are needed for the neural network to function.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数位于当前神经元输入和输出到下一层的中间位置（图[9-14](#Fig14)）。它可以像步进函数一样简单，根据规则或阈值开启或关闭神经元输出。或者它也可以是一个变换，将输入信号映射到神经网络功能所需的输出信号。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig14_HTML.jpg](Images/484548_1_En_9_Fig14_HTML.jpg)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig14_HTML.jpg](Images/484548_1_En_9_Fig14_HTML.jpg)'
- en: Figure 9-14
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-14
- en: The placement of the activation function
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数的位置
- en: 'Let’s visualize the process, which starts from input: multiply input data with
    weights, add bias to them, go through the activation function, and then feed to
    the next layer (Figure [9-15](#Fig15)).'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们可视化这个过程，它从输入开始：将输入数据与权重相乘，给它们加上偏差，通过激活函数，然后输入到下一层（图[9-15](#Fig15)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig15_HTML.jpg](Images/484548_1_En_9_Fig15_HTML.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig15_HTML.jpg](Images/484548_1_En_9_Fig15_HTML.jpg)'
- en: Figure 9-15
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-15
- en: The steps of how activation works in a neuron
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数在神经元中工作的步骤
- en: So, after talking about the process, we need to know the types, how to use them,
    how they work, and which one is the reliable one for our neural network model.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在讨论了过程之后，我们需要了解激活函数的类型、如何使用它们、它们的工作原理以及哪一种是我们神经网络模型中可靠的。
- en: Types of Activation Functions
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 激活函数的类型
- en: 'There are three types of activation functions: binary step function, linear
    activation function, and nonlinear activation function.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 激活函数有三种类型：二进制步进函数、线性激活函数和非线性激活函数。
- en: First, the binary step function is a threshold-based activation function (Figure
    [9-16](#Fig16)). What does this mean? It means that it depends on whether it is
    above or below a certain threshold value. If the neuron output is above the threshold,
    the activation neuron will send exactly the same signal to the next layer—and
    vice versa.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，二元阶梯函数是一个基于阈值的激活函数（图[9-16](#Fig16)）。这意味着什么？这意味着它取决于是否高于或低于某个阈值值。如果神经元输出高于阈值，激活神经元将向下一层发送完全相同的信号——反之亦然。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig16_HTML.jpg](Images/484548_1_En_9_Fig16_HTML.jpg)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig16_HTML.jpg](Images/484548_1_En_9_Fig16_HTML.jpg)'
- en: Figure 9-16
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-16
- en: A binary activation function
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 二元激活函数
- en: But it is still binary, so we can’t use it in multiclassification problems .
    It’s only a trigger function and can’t change any of the data that comes from
    the previous layer, so we need a more complex activation function. So let’s talk
    about the next type of activation function, which is the **linear activation function**
    (Figure [9-17](#Fig17)). It uses the function *A* = *w* ∗ *x*. It takes the inputs,
    multiplied by the weights for each neuron, and creates an output signal proportional
    to the input. In one sense, a linear function is better than a step function because
    it allows multiple outputs, not just yes and no.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 但它仍然是二元的，所以我们不能将其用于多分类问题。它只是一个触发函数，不能改变来自前一层的任何数据，因此我们需要一个更复杂的激活函数。那么，让我们来谈谈下一类激活函数，即**线性激活函数**（图[9-17](#Fig17)）。它使用函数
    *A* = *w* *x*。它将输入乘以每个神经元的权重，并创建一个与输入成比例的输出信号。从某种意义上说，线性函数比阶梯函数更好，因为它允许多个输出，而不仅仅是是或否。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig17_HTML.jpg](Images/484548_1_En_9_Fig17_HTML.jpg)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig17_HTML.jpg](Images/484548_1_En_9_Fig17_HTML.jpg)'
- en: Figure 9-17
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-17
- en: How linear activation works
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 线性激活函数的工作原理
- en: 'But does the linear activation function have no problems? Of course it has.
    The problems lie in that it’s a constant function, so we can’t use the backpropagation
    technique (which we will talk about in the next sections) because it depends on
    derivatives. This is a constant function, so it has no derivative. The second
    thing is that it depends on its linearity. However many layers we have, it’s still
    a linear function; we could almost say that a neural network with a linear activation
    function is simply a linear regression model. It has limited power and ability
    to handle the complexity of varying parameters of input data, which makes us need
    to look to a new activation function: the nonlinear activation function. Nowadays
    many neural network models use nonlinear activation functions. They allow the
    model to create complex mappings between the network’s inputs and outputs, which
    are essential for learning and modeling complex data such as images, video, audio,
    and data sets that are nonlinear or have high dimensionality. They solve problems
    that faced the linear activation function. The types of nonlinear activation functions
    that are used today in neural network models are *sigmoid/logistic*, *tanh/hyperbolic
    tangent*, *ReLU (rectified linear unit)*, *leaky ReLU*, *softmax*, and *swish*.
    Let’s take a tour of those functions .'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 但线性激活函数没有问题吗？当然有。问题在于它是一个常数函数，所以我们不能使用反向传播技术（我们将在下一节中讨论），因为它依赖于导数。这是一个常数函数，所以它没有导数。第二件事是它依赖于其线性。无论我们有多少层，它仍然是一个线性函数；我们几乎可以说，具有线性激活函数的神经网络只是一个线性回归模型。它处理输入数据参数变化复杂性的能力和能力有限，这使得我们需要寻找新的激活函数：非线性激活函数。如今，许多神经网络模型使用非线性激活函数。它们允许模型在网络的输入和输出之间创建复杂的映射，这对于学习和建模复杂数据（如图像、视频、音频以及非线性或高维度的数据集）至关重要。它们解决了线性激活函数面临的问题。今天在神经网络模型中使用的非线性激活函数类型包括
    *sigmoid/logistic*、*tanh/双曲正切*、*ReLU（修正线性单元）*、*漏ReLU*、*softmax* 和 *swish*。让我们来浏览一下这些函数。
- en: '**Sigmoid or logistic activation function** : when we talk about sigmoid, we
    mean probability between 0 and 1 function. The main reason we use sigmoid function
    is that it exists between 0 and 1.'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**Sigmoid或逻辑激活函数**：当我们谈论sigmoid时，我们指的是介于0和1之间的概率函数。我们使用sigmoid函数的主要原因是因为它存在于0和1之间。'
- en: 'Therefore, it is especially useful for models where we have to predict the
    probability of an output. Since the probability of anything exists only between
    *the range of 0 and 1*, sigmoid is the right choice. From only 0 and 1, let’s
    make the range wider; we can make the range from *-1 to 1*. This takes us to a
    new function: tanh or hyperbolic tangent activation function. This function is
    almost like sigmoid but the range is between -1 and 1 (Figure [9-18](#Fig18)).
    The advantage is that the negative inputs will be mapped strongly negative and
    the zero inputs will be mapped near zero in the tanh graph. And it works very
    well when we work in classification between two classes. But there is a function
    that may be the same as sigmoid; it’s called **Softmax** . This function will
    calculate the probabilities of each target class over all possible target classes.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，它对于我们必须预测输出概率的模型特别有用。因为任何东西的概率只存在于*0到1的范围之间*，所以sigmoid是正确的选择。从只有0和1开始，让我们使范围更广；我们可以使范围从*-1到1*。这带我们到一个新的函数：tanh或双曲正切激活函数。这个函数几乎像sigmoid，但范围在-1到1之间（见图[9-18](#Fig18)）。优点是，负输入将被映射到强烈的负值，零输入将被映射到接近零的tanh图中。并且当我们在两个类别之间进行分类时，它工作得非常好。但是有一个可能和sigmoid相同的函数；它被称为**Softmax**。这个函数将计算所有可能目标类别中每个目标类别的概率。
- en: 'Later, the calculated probabilities will be helpful for determining the target
    class for the given inputs. It’s almost like the sigmoid function but it is divided
    by all the possible target classes. If the Softmax function is used for a multiclassification
    model, it returns the probabilities of each class and the target class will have
    a high probability . Its equation is:'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，计算出的概率将有助于确定给定输入的目标类别。这几乎就像sigmoid函数，但它被除以所有可能的目标类别。如果使用Softmax函数进行多分类模型，它将返回每个类别的概率，目标类别将有较高的概率。其方程式为：
- en: '![$$ Sigmoid(x)=\frac{1}{1+\mathit{\exp}\left(-x\right)} $$](Images/484548_1_En_9_Chapter_TeX_Equd.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Sigmoid(x)=\frac{1}{1+\mathit{\exp}\left(-x\right)} $$](Images/484548_1_En_9_Chapter_TeX_Equd.png)'
- en: '![$$ softmax(x)=\frac{\mathit{\exp}(x)}{\sum_{j=0}^k\mathit{\exp}\left({x}_j\right)}
    $$](Images/484548_1_En_9_Chapter_TeX_Eque.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![$$ softmax(x)=\frac{\mathit{\exp}(x)}{\sum_{j=0}^k\mathit{\exp}\left({x}_j\right)}
    $$](Images/484548_1_En_9_Chapter_TeX_Eque.png)'
- en: '![$$ softmax(x)=\frac{\mathit{\exp}(x)}{\sum_{j=0}^k\mathit{\exp}\left({x}_j\right)}
    $$](Images/484548_1_En_9_Chapter_TeX_Equf.png)'
  id: totrans-151
  prefs: []
  type: TYPE_IMG
  zh: '![$$ softmax(x)=\frac{\mathit{\exp}(x)}{\sum_{j=0}^k\mathit{\exp}\left({x}_j\right)}
    $$](Images/484548_1_En_9_Chapter_TeX_Equf.png)'
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig18_HTML.jpg](Images/484548_1_En_9_Fig18_HTML.jpg)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig18_HTML.jpg](Images/484548_1_En_9_Fig18_HTML.jpg)'
- en: Figure 9-18
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-18
- en: The difference between sigmoid and tanh
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: Sigmoid和tanh之间的区别
- en: Note
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Both tanh and logistic sigmoid activation functions are used in feedforward
    nets.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 双曲正切和逻辑Sigmoid激活函数都用于前馈网络。
- en: Although we have good function in the range between -1 and 1, we need to have
    x continuous, so now we need to work with the ReLU function. It works from zero
    to infinity. Let’s see how it works, and why it’s called *rectified*. It is called
    rectified because it’s rectified under zero; if the value is below zero it will
    be zero, but if it equals 0 or above zero it will be the value itself.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们在-1和1之间的范围内有良好的函数，但我们需要x是连续的，所以我们现在需要处理ReLU函数。它从零延伸到无穷大。让我们看看它是如何工作的，以及为什么它被称为*修正的*。它被称为修正的，因为它在零以下进行了修正；如果值低于零，它将是零，但如果它等于0或高于零，它将是其本身的值。
- en: '*The conclusion is f(z) is zero when z is less than zero and f(z) is equal
    to z when z is above or equal to zero.*'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '*结论是，当z小于零时，f(z)为零，当z大于或等于零时，f(z)等于z。*'
- en: After working with infinity, we now have to work with zero. We mainly waste
    all data under zero, so we create a new activation that gets some of the data
    under zero. It’s called **leaky ReLU** .
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理完无穷大之后，我们现在必须处理零。我们主要浪费了所有在零以下的数据，因此我们创建了一个新的激活函数，它获取一些零以下的数据。它被称为**漏斗ReLU**。
- en: 'This function works in the same direction as the ReLU function but it has some
    variations; it mainly tries to improve ReLU range. It works with range - infinity,
    infinity. That is the main variation (Figure [9-19](#Fig19)); the equation is:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数与ReLU函数的方向相同，但它有一些变化；它主要试图改进ReLU的范围。它的工作范围是-无穷大到无穷大。这是主要的变化（见图[9-19](#Fig19)）；方程式为：
- en: '![$$ Relu(x)=\mathit{\max}\left(0,x\right) $$](Images/484548_1_En_9_Chapter_TeX_Equg.png)'
  id: totrans-161
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Relu(x)=\mathit{\max}\left(0,x\right) $$](Images/484548_1_En_9_Chapter_TeX_Equg.png)'
- en: '![$$ LeakyRelu(x)=\mathit{\max}\left(0.01\ast x,x\right) $$](Images/484548_1_En_9_Chapter_TeX_Equh.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![$$ LeakyRelu(x)=\mathit{\max}\left(0.01\ast x,x\right) $$](Images/484548_1_En_9_Chapter_TeX_Equh.png)'
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig19_HTML.jpg](Images/484548_1_En_9_Fig19_HTML.jpg)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig19_HTML.jpg](Images/484548_1_En_9_Fig19_HTML.jpg)'
- en: Figure 9-19
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-19
- en: ReLU function (left); leaky ReLU function (right)
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: ReLU函数（左侧）；漏斗ReLU函数（右侧）
- en: 'As we see in the preceding equations, the variation in function is that the
    first parameter in ReLU is equal to x multiplied by 0, as every parameter below
    0 will equal zero. In leaky ReLU, x is multiplied by 0.01, so for every parameter
    below zero you will have a negative target for this input. Google created a new
    activation function called **swish**; it performs better than *ReLU* with a similar
    level of computational efficiency (Figure [9-20](#Fig20)). Its equation is:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在前面的方程中看到的，函数的变化在于ReLU的第一个参数等于x乘以0，因为所有小于0的参数都将等于零。在漏斗ReLU中，x乘以0.01，因此对于所有小于零的参数，这个输入将有一个负的目标。谷歌创建了一个新的激活函数，称为**swish**；它在具有相似计算效率的水平上比*ReLU*表现更好（见图[9-20](#Fig20)）。它的方程是：
- en: '![$$ Swish(x)=\frac{x}{1-\mathit{\exp}\left(-x\right)} $$](Images/484548_1_En_9_Chapter_TeX_Equi.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![$$ Swish(x)=\frac{x}{1-\mathit{\exp}\left(-x\right)} $$](Images/484548_1_En_9_Chapter_TeX_Equi.png)'
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig20_HTML.jpg](Images/484548_1_En_9_Fig20_HTML.jpg)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig20_HTML.jpg](Images/484548_1_En_9_Fig20_HTML.jpg)'
- en: Figure 9-20
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-20
- en: The swish activation function
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: Swish激活函数
- en: Recap
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回顾
- en: 'After all, an activation function is just a perceptron. It works to allow neural
    networks to learn: it should be in the output layer, it may be in hidden layers,
    but it has never been in the input layer.'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，激活函数只是一个感知器。它的作用是允许神经网络进行学习：它应该位于输出层，它可能位于隐藏层，但它从未位于输入层。
- en: Gradient Descent
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 梯度下降
- en: This is the main core of machine learning—the way we work to decrease the loss
    function. Let’s get an in-depth description of gradient descent; you can have
    more than one description with different meanings, but let’s see the abstract
    definition of gradient descent. Gradient descent is an optimization algorithm
    used to minimize some function by iteratively moving in the direction of steepest
    descent, as defined by the negative of the gradient. In machine learning, gradient
    descent is an optimization algorithm used to find the values of parameters (coefficients)
    of a function (f) that minimizes a cost function (loss). We talk about the cost
    function in the next sections. Gradient descent is best to use when the parameters
    cannot be calculated analytically (e.g., using linear algebra) and must be searched
    for by an optimization algorithm.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这是机器学习的主要核心——我们用来减少损失函数的方法。让我们深入了解一下梯度下降；你可以有多种不同的描述，它们有不同的含义，但让我们看看梯度下降的抽象定义。梯度下降是一种优化算法，通过迭代地在最陡下降方向上移动，根据梯度的负值定义，来最小化某个函数。在机器学习中，梯度下降是一种优化算法，用于找到函数（f）的参数（系数）的值，这些值最小化成本函数（损失）。我们将在下一节中讨论成本函数。当参数无法通过解析方法（例如，使用线性代数）计算时，梯度下降是最好的选择，必须通过优化算法进行搜索。
- en: We will not write the gradient descent algorithm manually, as it is already
    implemented in packages like Keras. But we need to understand the concept of how
    we optimize the cost function. Cost function is simply equal to *Loss* = (*actual
    output* − *predicted output*). Let’s see how gradient descent minimizes the cost
    function. Gradient descent is an efficient optimization algorithm that attempts
    to find a local or global minimum of a function. Gradient descent enables a model
    to learn the gradient or direction that the model should take in order to reduce
    errors (differences between actual y and predicted y). The direction in the simple
    linear regression example refers to how the model parameters **B** *(bias or intercept)*
    and **W** *(slope or coefficient)* should be tweaked or corrected to further reduce
    the cost function. As the model iterates, it gradually converges toward a minimum
    where further tweaks to the parameters produce little or zero changes in the loss,
    also referred to as convergence, where *y* = *WX* + *B*. Let’s see Figure [9-20](#Fig20)
    to illustrate this linear function.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不会手动编写梯度下降算法，因为它已经在像Keras这样的包中实现了。但我们需要理解如何优化成本函数的概念。成本函数简单等于*损失* = (*实际输出*
    − *预测输出*)。让我们看看梯度下降如何最小化成本函数。梯度下降是一种高效的优化算法，试图找到一个函数的局部或全局最小值。梯度下降使模型能够学习模型应该采取的梯度或方向，以减少误差（实际y与预测y之间的差异）。在简单的线性回归示例中，这个方向指的是模型参数**B**（偏差或截距）和**W**（斜率或系数）应该如何调整或纠正，以进一步减少成本函数。随着模型迭代，它逐渐收敛到一个最小值，在这个最小值处，参数的进一步调整对损失的影响很小或为零，这也被称为收敛，其中
    *y* = *WX* + *B*。让我们看看图[9-20](#Fig20)来展示这个线性函数。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig21_HTML.jpg](Images/484548_1_En_9_Fig21_HTML.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig21_HTML.jpg](Images/484548_1_En_9_Fig21_HTML.jpg)'
- en: Figure 9-21
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-21
- en: A gradient descent step to the minimum point
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 向最小点的一次梯度下降步骤
- en: Let’s explain what happened in this graph. A random position on the surface
    of the graph is the cost of the current values of the coefficients (cost). The
    bottom of the graph is the cost of the best set of coefficients, the minimum of
    the function. Now you will iterate in the cost to get to the goal, which is to
    continue to try different values for the coefficients, evaluate their cost, and
    select new coefficients that have a slightly better (lower) cost. Repeating this
    process enough times will lead to the bottom of the graph, and you will know the
    values of the coefficients that result in the minimum cost.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们解释一下这个图上发生了什么。图表面上的一个随机位置是当前系数值的成本（成本）。图的底部是最佳系数集的成本，即函数的最小值。现在你将迭代成本以到达目标，即继续尝试不同的系数值，评估它们的成本，并选择略微更好（更低）成本的新的系数。重复这个过程足够多次将导致图的底部，你将知道导致最小成本的系数值。
- en: Recap
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 概述
- en: 'Gradient descent is a way to optimize the cost by trying to get the minimum
    optimal values in the cost function. This concept has many applications like mini-batch,
    full batch, and stochastic gradient descent, and we will see them in the next
    sections. Gradient descent is a very popular optimization technique in machine
    learning and deep learning and it can be used with most, if not all, of the learning
    algorithms. A gradient is basically the slope of a function: the degree of change
    of a parameter with the amount of change in another parameter. Mathematically,
    it can be described as the partial derivatives of a set of parameters with respect
    to its inputs. The more the gradient, the steeper the slope. Gradient descent
    is a convex function.'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降是一种通过尝试在成本函数中获取最小最优值来优化成本的方法。这个概念有许多应用，如小批量、全批量以及随机梯度下降，我们将在下一节中看到它们。梯度下降是机器学习和深度学习中非常流行的优化技术，它可以与大多数，如果不是所有，的学习算法一起使用。梯度基本上是一个函数的斜率：一个参数随着另一个参数的变化而变化的程度。从数学上讲，它可以描述为参数集相对于其输入的偏导数。梯度越大，斜率越陡。梯度下降是一个凸函数。
- en: Batch vs. Stochastic vs. Mini-Batch Gradient Descent
  id: totrans-182
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 批量 vs. 随机 vs. 小批量梯度下降
- en: Now, let’s look further into those three types. But before we start, we have
    to remind you that the goal of all supervised machine learning algorithms is to
    best estimate a *target function (f)* that maps *input data (X)* onto *output
    variables (Y)*. This describes all classification and regression problems.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们进一步探讨这三种类型。但在我们开始之前，我们必须提醒你，所有监督机器学习算法的目标是最好地估计一个*目标函数（f）*，该函数将*输入数据（X）*映射到*输出变量（Y）*。这描述了所有分类和回归问题。
- en: Batch Gradient Descent
  id: totrans-184
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 批量梯度下降
- en: The concept behind batch gradient descent is to update the parameters of neural
    networks once. This process happens after the training example is finished, that
    is, after all the training examples have been passed through the **network**.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 批量梯度下降背后的概念是在训练示例完成后更新神经网络参数一次。这个过程发生在所有训练示例都通过**网络**之后。
- en: For instance, if the training dataset contains 100 training examples, then the
    parameters of the neural network are updated once the training of all 100 examples
    is finished. Table [9-2](#Tab2) lists advantages and disadvantages of batch gradient
    descent.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果训练数据集包含100个训练示例，那么一旦所有100个示例的训练完成，神经网络参数就会更新一次。表[9-2](#Tab2)列出了批量梯度下降的优点和缺点。
- en: Table 9-2
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 表9-2
- en: Pros/Cons of Batch Gradient Descent
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 批量梯度下降的优缺点
- en: '| Advantages | Disadvantages |'
  id: totrans-189
  prefs: []
  type: TYPE_TB
  zh: '| 优点 | 缺点 |'
- en: '| --- | --- |'
  id: totrans-190
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| It produces a more stable gradient descent convergence and stable error gradient
    than stochastic gradient descent. | The entire training set can be too large to
    process in the memory, therefore, additional memory might be needed. |'
  id: totrans-191
  prefs: []
  type: TYPE_TB
  zh: '| 它比随机梯度下降产生更稳定的梯度下降收敛和稳定的误差梯度。 | 整个训练集可能太大，无法在内存中处理，因此可能需要额外的内存。 |'
- en: '| It is computationally efficient, as all computer resources are not being
    used to process a single sample but rather are being used for all training samples.
    | Depending on computer resources, it can take too long for processing all the
    training samples as a batch. |'
  id: totrans-192
  prefs: []
  type: TYPE_TB
  zh: '| 它在计算上效率高，因为所有计算机资源都不是用来处理单个样本，而是用来处理所有训练样本。 | 根据计算机资源，将所有训练样本作为一个批次处理可能需要太长时间。
    |'
- en: '| It enhances the steps toward the minimum of loss function, due to updating
    the parameters by computing the average of all the training samples rather than
    the value of a single sample. |   |'
  id: totrans-193
  prefs: []
  type: TYPE_TB
  zh: '| 它通过计算所有训练样本的平均值而不是单个样本的值来更新参数，从而增强了向损失函数最小值迈进的过程。 | |'
- en: We can see that with batch gradient, it is all about the resources you have.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，使用批量梯度下降，这完全取决于你拥有的资源。
- en: Stochastic Gradient Descent
  id: totrans-195
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 随机梯度下降
- en: 'In this method, one training sample (example) is passed through the neural
    network at a time and the parameters (weights) of each layer are updated with
    the computed gradient. The parameters of all the layers of the network are updated
    after every training sample. Let’s take an example: you have 1,000 training samples,
    so you now have 1,000 updated parameters and every parameter is updated after
    every individual sample. Table [9-3](#Tab3) lists advantages and disadvantages
    of stochastic gradient descent. Following is the equation for stochastic gradient
    descent; it is iterated over “n” times for “n” training samples in the training
    set.'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种方法中，每次只有一个训练样本（示例）通过神经网络，并且每个层的参数（权重）都使用计算出的梯度进行更新。网络所有层的参数在每次训练样本之后都会更新。让我们举一个例子：你有1,000个训练样本，因此你现在有1,000个更新的参数，并且每个参数都是在每个单独样本之后更新的。表[9-3](#Tab3)列出了随机梯度下降的优点和缺点。以下为随机梯度下降的方程；它会在训练集中对“n”个训练样本进行“n”次迭代。
- en: '![$$ {\theta}_j:= {\theta}_j-\alpha \frac{\partial }{\partial {\theta}_j}J\left(\theta
    \right). $$](Images/484548_1_En_9_Chapter_TeX_IEq2.png)'
  id: totrans-197
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\theta}_j:= {\theta}_j-\alpha \frac{\partial }{\partial {\theta}_j}J\left(\theta
    \right). $$](Images/484548_1_En_9_Chapter_TeX_IEq2.png)'
- en: Table 9-3
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 表9-3
- en: Pros/cons of Stochastic Gradient Descent
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 随机梯度下降的优缺点
- en: '| Advantages | Disadvantages |'
  id: totrans-200
  prefs: []
  type: TYPE_TB
  zh: '| 优点 | 缺点 |'
- en: '| --- | --- |'
  id: totrans-201
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| It is computationally fast, as only one sample is processed at a time. |
    It can take the gradient descent into other directions, because its frequent updating
    to local minimum is very noisy. |'
  id: totrans-202
  prefs: []
  type: TYPE_TB
  zh: '| 它在计算上非常快，因为一次只处理一个样本。 | 它可以将梯度下降引入其他方向，因为其频繁更新到局部最小值的噪声非常大。 |'
- en: '| In this type, we have many updates. That means the frequent updates of the
    steps taken toward the minima of the loss function have oscillations, which can
    help to get out of local minimums of the loss function. | It loses the advantage
    of vectorized operations, as it deals with only a single example at a time. |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
  zh: '| 在这种类型中，我们有很多更新。这意味着向损失函数最小值迈进步骤的频繁更新会产生振荡，这有助于跳出损失函数的局部最小值。 | 由于它一次只处理一个示例，因此它失去了向量运算的优势。
    |'
- en: '| It is easier to fit into memory, due to a single training sample being processed
    by the network. | Frequent updates are computationally expensive, due to using
    all resources for processing one training sample at a time. |'
  id: totrans-204
  prefs: []
  type: TYPE_TB
  zh: '| 由于网络一次处理一个训练样本，因此更容易适应内存。 | 由于一次只使用所有资源处理一个训练样本，频繁更新在计算上很昂贵。 |'
- en: As we see, every optimization has its advantages and disadvantages, which must
    be considered when choosing which type of gradient descent to use. Now let’s talk
    about the final type we’ve mentioned in this section, the mini-batch gradient
    descent.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，每种优化都有其优点和缺点，在选择使用哪种梯度下降时必须考虑。现在让我们谈谈本节中提到的最后一种类型，即小批量梯度下降。
- en: Mini-batch Gradient Descent
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小批量梯度下降
- en: Mini-batch gradient is a hybrid system between stochastic and batch gradient
    descent. It is a variation of the gradient descent algorithm that splits the training
    dataset into small batches that are used to calculate model error and update model
    coefficients. What mini-batch seeks to do is to find the balance between what
    stochastic does and the efficiency of batch gradient. Table [9-4](#Tab4) lists
    advantages and disadvantages of this type.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 小批量梯度下降是随机梯度下降和小批量梯度下降之间的混合系统。它是梯度下降算法的一种变体，将训练数据集分成小批量，用于计算模型误差和更新模型系数。小批量试图在随机梯度所做的事情和小批量梯度的效率之间找到平衡。表
    [9-4](#Tab4) 列出了这种类型的优缺点。
- en: Ultimately, we only need to know that all this will work to optimize model learning
    and change the equation of cost function to allow the model to get the best accuracy
    while reducing the error rate.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我们只需要知道所有这些都会帮助我们优化模型学习，并改变成本函数的方程，以便模型在降低错误率的同时获得最佳精度。
- en: Table 9-4
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 表 9-4
- en: The Pros/Cons of Mini-batch Gradient Descent
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 小批量梯度下降的优缺点
- en: '| Advantages | Disadvantages |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| 优点 | 缺点 |'
- en: '| --- | --- |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| The model update frequency is higher than batch gradient descent, which allows
    for a more robust convergence, avoiding local minima.The batched updates provide
    a computationally more efficient process than stochastic gradient descent. | You
    need to configure the “mini-batch size” hyperparameter for the learning algorithm.Error
    information must be accumulated across mini-batches of training examples, as with
    batch gradient descent. |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| 模型更新频率高于批量梯度下降，这允许更稳健的收敛，避免局部最小值。批量更新比随机梯度下降在计算上更高效。 | 您需要为学习算法配置“小批量大小”超参数。错误信息必须像批量梯度下降一样跨训练示例的小批量累积。
    |'
- en: Note
  id: totrans-214
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The most used gradient is the mini-batch gradient descent, especially in deep
    learning.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 最常用的梯度是小批量梯度下降，尤其是在深度学习中。
- en: Recap
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 回顾
- en: In this section, we learned the types of gradient descent. As we see, every
    type has its advantages and disadvantages, so we need to choose between them and
    see what will enhance our model more. We said before that mini-batch is the state
    of the art in deep learning nowadays; that may change in the future, but for now
    we will use it in deep learning. We hope you had fun with this section on gradient
    optimizers.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们学习了梯度下降的类型。正如我们所见，每种类型都有其优点和缺点，因此我们需要在这两者之间做出选择，看看什么会更多地增强我们的模型。我们之前说过，小批量现在是深度学习中的最佳实践；这在未来可能会改变，但到目前为止，我们将在深度学习中使用它。我们希望您在本节关于梯度优化器的讨论中玩得开心。
- en: Loss function and Backpropagation
  id: totrans-218
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 损失函数和反向传播
- en: To simplify the neural network algorithm, we can say that any neural network
    can be presented as a black box with two methods, learning and predicting, as
    described in Figure [9-22](#Fig22).
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化神经网络算法，我们可以这样说，任何神经网络都可以表示为一个黑盒，具有两种方法，学习和预测，如图 [9-22](#Fig22) 所述。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig22_HTML.jpg](Images/484548_1_En_9_Fig22_HTML.jpg)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig22_HTML.jpg](Images/484548_1_En_9_Fig22_HTML.jpg)'
- en: Figure 9-22
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-22
- en: The difference between training and predicting methods
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 训练和预测方法的区别
- en: Our main concern in this part of the book is the learning process, which takes
    the inputs and the desired outputs and updates its internal state accordingly,
    so the calculated output gets as close as possible to the desired output.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 本书这一部分的主要内容是学习过程，它接受输入和期望的输出，并相应地更新其内部状态，以便计算出的输出尽可能接近期望的输出。
- en: 'In order to achieve this, we will decompose the learning process into its several
    building blocks or steps, which can be stated in the following order:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现这一点，我们将学习过程分解为其几个构建块或步骤，这些步骤可以按以下顺序陈述：
- en: Model initialization
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 模型初始化
- en: Forward propagation
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前向传播
- en: Compute loss
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算损失
- en: Compute differentiation
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算微分
- en: Back propagation
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反向传播
- en: Update the weights.
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新权重。
- en: Iterate from step 2 to 6 until convergence.
  id: totrans-231
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从步骤2迭代到步骤6，直到收敛。
- en: The first step is **model initialization** before any learning procedure happens.
    This step is the initial hypothesis, or we can say the random guess. In this step,
    the model you will build will guess a random output for a given input. Thus, a
    *random initialization* of the model is a common practice. In order to understand
    this analogy, take for instance a person who has never played soccer in his life.
    The very first time he tries to shoot the ball, he just shoots it randomly.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何学习过程发生之前，第一步是 **模型初始化**。这一步是初始假设，或者说是一个随机猜测。在这一步中，你将要构建的模型将为给定的输入猜测一个随机输出。因此，对模型进行
    *随机初始化* 是一种常见的做法。为了理解这个类比，以一个从未踢过足球的人为例。他第一次尝试射门时，只是随机地射门。
- en: The natural step to do after *initializing* the model with random weights is
    to check its performance. And to check the model performance we need first to
    make it work on the inputs we pass them through the network layer and we compare
    the model output with the actual output straightforwardly. This step is called
    **forward-propagation** , because the calculation flow is going in the natural
    forward direction from the input through the neural network to the output.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 在用随机权重初始化模型之后，下一步是检查其性能。为了检查模型性能，我们首先需要让它处理我们传递给网络层的输入，并将模型输出与实际输出直接比较。这一步被称为
    **前向传播**，因为计算流程是沿着自然的前向方向从输入通过神经网络到输出的。
- en: At this stage, on the one hand we have the model output of the randomly initialized
    neural network. On the other hand, we have the actual output we would like the
    network to learn, the real output of input data we feed to the neural network.
    Returning to the example of our soccer player shooting for the first time, the
    model output will be the final position of the ball (most of the time it will
    be out/missed), and the actual output would be that the ball goes inside the goal.
    In the beginning, our player is just shooting randomly. Let’s say the ball went
    out—or to the right side of the goal—most of the time. What he can learn from
    this is that he needs to shoot a bit more to the left and focus his aim to the
    goal area next time he trains. In order to be able to generalize to any problem,
    we define what we call **loss function** .
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，一方面我们有随机初始化的神经网络的模型输出。另一方面，我们有网络需要学习的实际输出，即我们输入到神经网络中的数据的真实输出。回到我们足球员第一次射门的例子，模型输出将是球的最终位置（大多数情况下是出界或错过目标），而实际输出将是球进入球门。一开始，我们的球员只是随机射门。假设球大多数时候都飞出了——或者飞到了球门的右侧。他能从中学到的是，他需要稍微向左射门，并在下一次训练时将注意力集中在球门区域。为了能够将这一概念推广到任何问题，我们定义了所谓的
    **损失函数**。
- en: Basically, it is a performance metric on how well the neural network manages
    to reach its goal of generating outputs as close as possible to the desired values.
    The most intuitive loss function is simply *loss* = (*actual output* − *model
    output*).
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，这是一个性能指标，衡量神经网络达到其目标（生成尽可能接近期望值的输出）的好坏。最直观的损失函数就是 *损失* = (*实际输出* - *模型输出*)。
- en: Obviously, we can use any optimization technique that modifies the internal
    weights of neural networks in order to minimize the total loss function that we
    previously defined. These techniques can include greedy search or even a simple
    brute-force search, but the most used technique is to go to the optimal weights
    that minimize the loss to its minimum value step by step using **differentiation**.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，我们可以使用任何修改神经网络内部权重的优化技术，以最小化我们之前定义的总损失函数。这些技术可以包括贪婪搜索甚至简单的暴力搜索，但最常用的技术是逐步找到最小化损失的优化权重，即使用
    **微分**。
- en: Using searching techniques or even brute-force might work if the model has only
    very few parameters and we don’t care much about precision. However, if we are
    training a neural network over an array of 600x600 inputs (like in image processing),
    we can very easily reach models with millions of weights to optimize and brute-force
    can’t even be imaginable, since it’s a pure waste of computational resources!
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型只有非常少的参数，并且我们不太关心精度，那么使用搜索技术甚至暴力搜索可能可行。然而，如果我们正在训练一个包含600x600输入的神经网络（如在图像处理中），我们很容易达到拥有数百万个权重需要优化的模型，而暴力搜索甚至无法想象，因为它纯粹是计算资源的浪费！
- en: Basically, differentiation deals with the derivative of the loss function. In
    mathematics, the derivative of a function at a certain point gives the rate or
    the speed at which this function is changing its values at this point. In order
    to see the effect of the derivative, we can ask ourselves how much the total error
    will change if we change the internal weight of the neural network with a certain
    small value *δW*.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，微分处理的是损失函数的导数。在数学中，函数在某个点的导数给出了这个函数在这个点值变化的速率或速度。为了看到导数的效果，我们可以问自己，如果我们改变神经网络内部权重的一个很小的值
    *δW*，总误差会有多少变化。
- en: You model might be composed of only one layer inside the neural network between
    the inputs and the outputs. But in many cases, more layers are needed, in order
    to reach more variations in the functionality of the neural network. For sure,
    we can always create one complicated function that represents the composition
    of all the layers of the network. Although in most cases composing the functions
    is very hard; plus, for every composition one has to calculate the dedicated derivative
    of the composition (which is not at all scalable and very error prone). In order
    to solve the problem, luckily for us, the derivative is decomposable, thus it
    can be **backpropagated**. We have the starting point of errors, which is the
    loss function, and we know how to derive it. So if we know how to derive each
    function from the composition, we can propagate back the error from the end to
    the start.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 您的模型可能只由神经网络中输入和输出之间的一个层组成。但在许多情况下，需要更多的层，以便达到神经网络功能变化的更多变体。当然，我们总是可以创建一个复杂的函数来表示网络所有层的组合。尽管在大多数情况下组合函数非常困难；此外，对于每个组合，都必须计算组合的专用导数（这根本不可扩展且非常容易出错）。为了解决这个问题，幸运的是，导数是可分解的，因此它可以**反向传播**。我们有误差的起点，即损失函数，我们知道如何导出它。所以如果我们知道如何从组合中导出每个函数，我们就可以从末端到起点传播误差。
- en: As we presented earlier, the derivative is just the rate at which the error
    changes, relative to the weight changes.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们之前所述，导数仅仅是误差相对于权重变化的速率。
- en: Note
  id: totrans-241
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: In real-life problems we shouldn’t **update the weights** with such big steps.
    Since there are a lot of nonlinearities, any big change in weights will lead to
    chaotic behavior. We should not forget that the derivative is only local at the
    point where we are calculating the derivative.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中的问题中，我们不应该**以如此大的步长更新权重**。由于存在许多非线性，任何权重的重大变化都可能导致混乱的行为。我们不应该忘记，导数仅在计算导数的点上才是局部的。
- en: 'Thus, a general rule of weight updates is the delta rule: *NewWeight* = *OldWeight* − *CalculatedDerivative* ∗ *LearningRate*
    The learning rate is introduced as a constant (usually very small), in order to
    force the weight to get updated very smoothly and slowly (to avoid big steps and
    chaotic behavior).'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，权重更新的一个通用规则是delta规则：*新权重* = *旧权重* - *计算导数* × *学习率*。学习率被引入作为一个常数（通常非常小），目的是为了使权重更新非常平滑和缓慢（以避免大步和混乱的行为）。
- en: Since we update the weights with a small delta step at a time, it will take
    several iterations in order to learn. This is very similar to genetic algorithms,
    where after each generation we apply a small mutation rate and the fittest survives.
    In a neural network, after each iteration the gradient descent force updates the
    weights toward less and less global loss function. The similarity is that the
    delta rule acts as a mutation operator, and the loss function acts as a fitness
    function to minimize. The difference is that in genetic algorithms, the mutation
    is blind. Some mutations are bad, some are good, but the good ones have a higher
    chance to survive. However, the weight updates in neural networks are smarter,
    since they are guided by the decreasing gradient force over the error.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们每次只以一个小步长更新权重，因此需要多次迭代才能学习。这与遗传算法非常相似，在每一代之后，我们应用一个小突变率，最适应的个体生存下来。在神经网络中，每次迭代后，梯度下降力将权重更新到越来越小的全局损失函数。相似之处在于，delta规则充当突变操作符，损失函数充当最小化的适应度函数。不同之处在于，在遗传算法中，突变是盲目的。一些突变是坏的，一些是好的，但好的突变有更高的生存机会。然而，神经网络中的权重更新更智能，因为它们是由误差的下降梯度力引导的。
- en: Loss Function
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 损失函数
- en: 'The loss function is the metric that helps a network understand whether it
    is learning in the right direction. To frame the loss function in simple words,
    consider it as the test score you achieve in an examination. Say you appeared
    for tests with several questions on a certain subject: what metrics would you
    use to understand your performance on this test? Obviously, the test score. Assume
    you answered all the questions, comparing your answers for each question with
    the right answer will give you a score metric that assesses your performance on
    the subject itself. Assuming you scored 56, 60, 78, 90, and 96 out of 100 in five
    consecutive language tests, you would clearly see that improving test scores are
    an indication of how well you are performing. Had the test scores been decreasing,
    then the verdict would be that your performance is decreasing and you would need
    to change your studying methods or materials to improve.'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 损失函数是帮助网络理解其是否在学习正确方向的度量标准。用简单的话来说，可以将损失函数视为你在考试中获得的分数。比如说，你参加了一个关于某个主题的考试，有几个问题：你会使用什么指标来理解你在这次考试中的表现？显然，是考试分数。假设你回答了所有问题，将你的答案与正确答案进行比较，将给出一个评估你在该主题上表现的分数指标。假设你在连续的五次语言测试中分别获得了56、60、78、90和96分（满分100分），你将清楚地看到提高的考试成绩是你表现良好的一个指标。如果考试成绩在下降，那么结论将是你的表现正在下降，你需要改变学习方法和材料来提高。
- en: Similarly, *how does a network understand whether it is improving its learning
    process in each iteration?* It uses the loss function, which is analogous to the
    test score. The loss function essentially measures the loss from the target. Say
    you are developing a model to predict whether a student will pass or fail, and
    the chance of passing or failing is defined by the probability. So, 1 would indicate
    that he will pass with 100% certainty and 0 would indicate that he will definitely
    fail.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，*网络如何理解它在每次迭代中是否在改进其学习过程？* 它使用损失函数，这与考试分数类似。损失函数本质上衡量的是与目标之间的损失。比如说，你正在开发一个模型来预测学生是否会通过或失败，通过或失败的概率被定义为概率。所以，1表示他有100%的把握通过，而0表示他肯定会失败。
- en: The model learns from the data and predicts a score of 0.87 for the student
    to pass. So, the actual loss here would be 1.00 – 0.87 = 0.13\. If it repeats
    the exercise with some parameter updates in order to improve and now achieves
    a loss of 0.40, it would understand that the changes it has made are not helping
    the network to appropriately learn. Alternatively, a new loss of 0.05 would indicate
    that the updates or changes from the learning are in the right direction.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 模型从数据中学习并预测学生的通过分数为0.87。因此，这里的实际损失将是1.00 – 0.87 = 0.13。如果它通过更新一些参数来重复练习以改进，并且现在损失为0.40，它将理解它所做的更改并没有帮助网络适当地学习。或者，新的损失为0.05将表明学习中的更新或更改方向是正确的。
- en: 'Based on the type of data outcome, we have several standard loss functions
    defined in both machine and deep learning. For regression use cases (e.g., where
    the end prediction would be a continuous number like the marks scored by a student,
    the number of product units sold by a shop, the number of calls received from
    customers in a contact center), here are some popular loss functions available:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 根据数据结果的类型，我们在机器学习和深度学习中定义了几个标准的损失函数。对于回归用例（例如，最终预测将是一个连续数字，如学生获得的分数、商店销售的产品单位数量、客户在接触中心收到的电话数量等），以下是一些可用的流行损失函数：
- en: '**Mean Squared Error** - Average squared difference between the actual and
    predicted value.'
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: '**均方误差**是实际值和预测值之间的平均平方差。'
- en: The squared difference makes it easy to penalize the model more for a higher
    difference. So, a difference of 3 would result in a loss of 9, but difference
    of 9 would return a loss of 81.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 平方差使得对模型进行更高差异的惩罚变得容易。因此，3的差值会导致9的损失，但9的差值会返回81的损失。
- en: The mathematical equivalent would be
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 数学等价式为
- en: '![$$ {\sum}_{i=0}^n\frac{{\left( Actual- Predicted\right)}^2}{k} $$](Images/484548_1_En_9_Chapter_TeX_Equj.png)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_9_Chapter_TeX_Equj.png)'
- en: TensorFlow equivalent
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow等价形式
- en: '[PRE0]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Mean Absolute Error** is the average absolute error between actual and predicted.'
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: '**平均绝对误差**是实际值和预测值之间的平均绝对误差。'
- en: The mathematical equivalent would be
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 数学等价式为
- en: '![$$ {\sum}_{i=0}^n\mid Actual- Predicted\mid $$](Images/484548_1_En_9_Chapter_TeX_Equk.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_9_Chapter_TeX_Equk.png)'
- en: TensorFlow equivalent is
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow等价形式为
- en: '[PRE1]'
  id: totrans-260
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Similarly, a few other variants are
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，还有一些其他变体
- en: MAPE – Mean absolute percentage error
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MAPE – 均方根百分比误差
- en: MSLE – Mean square logarithmic error
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MSLE – 均方对数误差
- en: '[PRE2]'
  id: totrans-264
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: For categorical outcomes, your prediction would be for a class, like whether
    a student will pass (1) or fail (0), whether the customer will make a purchase
    or not, whether the customer will default on payment or not, and so on. Some use
    cases may have multiple classes as an outcome, like classifying types of disease
    (Type A, B, or C); classifying images as cats, dogs, cars, horses, landscapes;
    and so on.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分类结果，你的预测将是一个类别，例如学生是否会通过（1）或失败（0），客户是否会购买或不会购买，客户是否会拖欠付款或不会拖欠，等等。某些用例可能有多个类别作为结果，例如分类疾病类型（A型、B型或C型）；将图像分类为猫、狗、汽车、马、风景等等。
- en: In such cases, the losses defined in the preceding cannot be used due to obvious
    reasons. We would need to quantify the outcome of the class as probability and
    define losses based on the probability estimates as predictions.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，由于明显的原因，不能使用前面定义的损失。我们需要将类别的结果量化为概率，并基于概率估计作为预测来定义损失。
- en: 'A few popular choices for losses for categorical outcomes in Keras are as follows:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 在Keras中，对于分类结果的损失，一些流行的选择如下：
- en: '**Binary cross-entropy** defines the loss when the categorical outcome is a
    binary variable, that is, with two possible outcomes: (Pass/Fail) or (Yes/No).'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
  zh: '**二元交叉熵**定义了当分类结果是一个二元变量时的损失，即有两个可能的结果：（通过/失败）或（是/否）。'
- en: The mathematical form would be ![$$ Loss=-\left[\ y\ast \mathit{\log}\left(\hat{y}\right)+\left(1-y\right)\ast
    \mathit{\log}\left(1-\hat{y}\right)\ \right] $$](Images/484548_1_En_9_Chapter_TeX_IEq3.png)
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 数学形式为 ![公式](Images/484548_1_En_9_Chapter_TeX_IEq3.png)
- en: TensorFlow equivalent is
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow等价形式为
- en: '[PRE4]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Categorical cross-entropy** defines the loss when the categorical outcomes
    is nonbinary, that is, more than two possible outcomes: (Yes/No/Maybe) or (Type
    1/ Type 2/… Type n).'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: '**分类交叉熵**定义了当分类结果不是二元时（即，有两个以上的可能结果：（是/否/可能）或（类型1/类型2/…类型n））的损失。'
- en: The mathematical form would be ![$$ Loss={\sum}_{j=0}^m{\sum}_{i=0}^n{y}_{ij}\ast
    \log \left(\ {\hat{y}}_{ji}\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq4.png)
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 数学形式为 ![公式](Images/484548_1_En_9_Chapter_TeX_IEq4.png)
- en: TensorFlow equivalent is
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: TensorFlow等价形式为
- en: '[PRE5]'
  id: totrans-276
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Backpropagation
  id: totrans-277
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 反向传播
- en: Understanding the backpropagation algorithm can take some time. If you are looking
    for a fast implementation of a neural network, you can skip this section, as modern
    libraries have the capability to autodifferentiate and perform the entire training
    procedure. However, understanding this algorithm would definitely give you insights
    into problems related to deep learning (learning problems, slow learning, exploding
    gradients, and diminishing gradients).
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 理解反向传播算法可能需要一些时间。如果你正在寻找快速实现神经网络的方法，你可以跳过这一节，因为现代库具有自动微分和执行整个训练过程的能力。然而，理解这个算法将肯定让你对与深度学习相关的问题（学习问题、学习速度慢、梯度爆炸和梯度消失）有更深的洞察。
- en: Gradient descent is a powerful algorithm, yet it is a slow method when the number
    of weights increases. In the case of neural networks having parameters in the
    range of thousands, training each weight with respect to the loss function—or,
    rather, formulating the loss as a function of all the weights—becomes painstakingly
    slow and extremely complex to use for practical purposes.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降是一个强大的算法，但当权重的数量增加时，它是一个缓慢的方法。在具有数千个参数的神经网络的情况下，相对于损失函数训练每个权重——或者更确切地说，将损失表示为所有权重的函数——变得非常缓慢且极其复杂，不适用于实际应用。
- en: 'Thanks to the path-breaking paper by Geoffrey Hinton and his colleagues in
    1986, we have an extremely fast and beautiful algorithm that helps us to find
    the partial derivative of the loss with respect to each weight. This algorithm
    is the workhorse of the training procedure for every deep learning algorithm.
    More detailed information can be found here: [`www.cs.toronto.edu/~hinton/backprop.html`](http://www.cs.toronto.edu/%257Ehinton/backprop.html).'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了1986年Geoffrey Hinton及其同事开创性的论文，我们得到了一个极其快速且美丽的算法，帮助我们找到损失相对于每个权重的偏导数。这个算法是每个深度学习算法训练过程中的工作马。更详细的信息可以在这里找到：[`www.cs.toronto.edu/~hinton/backprop.html`](http://www.cs.toronto.edu/%257Ehinton/backprop.html)。
- en: It is the most efficient possible procedure to compute the exact gradient, and
    its computational cost is always of the same *O*() complexity as computing the
    loss itself. The proof of backpropagation is beyond the scope of this book; however,
    the intuitive explanation of the algorithm can give you an excellent insight into
    its complex working.
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 这是计算精确梯度的最有效可能的程序，其计算成本始终与计算损失本身的相同 *O*() 复杂度。反向传播的证明超出了本书的范围；然而，算法的直观解释可以给你一个对其复杂工作的极好洞察。
- en: 'For backpropagation to work, two basic assumptions are made regarding the error
    function:'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使反向传播工作，对误差函数做出了两个基本假设：
- en: Total error can be written as a summation of individual errors of training samples/minibatch,
    *E* = ∑[*k*]*E*[*k*].
  id: totrans-283
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 总误差可以写成训练样本/小批次的单个误差之和，*E* = ∑[*k*]*E*[*k*]。
- en: Error can be written as a function of outputs of the network.
  id: totrans-284
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 错误可以写成网络输出的函数。
- en: 'Backpropagation consists of two parts:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播包括两个部分：
- en: Forward pass, wherein we initialize the weights and make a feedforward network
    to store all the values
  id: totrans-286
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 前向传递，其中我们初始化权重并创建一个前馈网络来存储所有值
- en: Backward pass, which is performed to have the stored values update the weights.
  id: totrans-287
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 反向传递，这是为了使存储的值更新权重。
- en: Partial derivatives, chain rules, and linear algebra are the main tools required
    to deal with backpropagation (Figure [9-23](#Fig23)).
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 偏导数、链式法则和线性代数是处理反向传播（图[9-23](#Fig23)）所需的主要工具。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig23_HTML.jpg](Images/484548_1_En_9_Fig23_HTML.jpg)'
  id: totrans-289
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig23_HTML.jpg](Images/484548_1_En_9_Fig23_HTML.jpg)'
- en: Figure 9-23
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 图9-23
- en: How backpropagation works
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播是如何工作的
- en: Initially, all the edge weights are randomly assigned. For every input in the
    training dataset, the ANN is activated and its output is observed. This output
    is compared with the desired output that we already know, and the error is “propagated”
    back to the previous layer. This error is noted, and the weights are “adjusted”
    accordingly. This process is repeated until the output error is below a predetermined
    threshold.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，所有边缘权重都是随机分配的。对于训练数据集中的每个输入，激活ANN并观察其输出。这个输出与我们已经知道的期望输出进行比较，错误被“传播”回前一层。这个错误被记录下来，并根据相应的权重进行调整。这个过程会重复进行，直到输出错误低于预先设定的阈值。
- en: Once the preceding algorithm terminates, we have a “learned” ANN, which we consider
    to be ready to work with “new” inputs. This neural network is said to have learned
    from several examples (labeled data) and from its mistakes (error propagation).
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦前面的算法终止，我们就得到了一个“学习”好的人工神经网络（ANN），我们认为它已经准备好处理“新”的输入。这个神经网络被称为从几个示例（标记数据）和它的错误（误差传播）中学习。
- en: Curious readers should investigate the original paper on backpropagation. We
    have provided a list of resources and blogs to understand the algorithm in greater
    depth. However, when it comes to implementation, you will hardly write your own
    code on backpropagation, as most of the libraries support automatic differentiation,
    and you won’t really want to tweak the backpropagation algorithm.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心强的读者应该调查关于反向传播的原始论文。我们提供了一系列资源和博客，以更深入地理解该算法。然而，当涉及到实现时，你几乎不会自己编写反向传播的代码，因为大多数库都支持自动微分，而且你也不太可能想要调整反向传播算法。
- en: In layman’s language, in backpropagation, we try to sequentially update the
    weights, first by making a forward pass on the network, after which we first update
    the weights of the last layer, using the label and last layer outputs, then subsequently
    use this information recursively on the layer just before and proceed.
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 用通俗易懂的话来说，在反向传播中，我们试图按顺序更新权重，首先通过在网络中进行前向传递，然后首先使用标签和最后一层的输出更新最后一层的权重，随后递归地使用这些信息在紧邻的层上操作。
- en: The Four Fundamental Equations Behind Backpropagation
  id: totrans-296
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 反向传播背后的四个基本方程
- en: Backpropagation is about understanding how changing the weights and biases in
    a network changes the cost function. Ultimately, this meanscomputing the partial
    derivatives ![$$ \frac{\partial C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq5.png)
    and ![$$ \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq6.png).
    But to compute those,we first introduce an intermediate quantity, ![$$ {\delta}_j^l
    $$](Images/484548_1_En_9_Chapter_TeX_IEq7.png), which we call the *error* in the
    *j*^(*th*) neuron in the *l*^(*th*) layer. Backpropagation will give us a procedure
    tocompute the error ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq8.png),
    and then will relate ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq9.png)
    to ![$$ \frac{\partial C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq10.png)
    and ![$$ \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq11.png).
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播是关于理解网络中权重和偏置的变化如何改变损失函数。最终，这意味着计算偏导数 ![$$ \frac{\partial C}{\partial {w}_{jk}^l}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq5.png) 和 ![$$ \frac{\partial C}{\partial
    {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq6.png)。但为了计算这些，我们首先引入一个中间量，![$$
    {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq7.png)，我们称之为第 *l* 层第 *j*
    个神经元的 *误差*。反向传播将给我们一个计算误差 ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq8.png)
    的过程，然后会将 ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq9.png) 与 ![$$
    \frac{\partial C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq10.png)
    和 ![$$ \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq11.png)
    相关联。
- en: To understand how the error is defined, imagine there is a red square in our
    neural network (red square in Figure [9-24](#Fig24)).
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解误差是如何定义的，想象在我们的神经网络中有一个红色方块（如图 [9-24](#Fig24) 中的红色方块）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig24_HTML.jpg](Images/484548_1_En_9_Fig24_HTML.jpg)'
  id: totrans-299
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig24_HTML.jpg](Images/484548_1_En_9_Fig24_HTML.jpg)'
- en: Figure 9-24
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-24
- en: The neuron J in Layer L through the backpropagation process
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 层 L 中的神经元 J 通过反向传播过程
- en: The red square sits at the *j*^(*th*) neuron in layer l. As the input to the
    neuron comes in, the red square messes with the neuron’s operation. It adds a
    little change ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq12.png)
    to the neuron’s weighted input, so that insteadof outputting ![$$ \sigma \left({z}_j^l\right)
    $$](Images/484548_1_En_9_Chapter_TeX_IEq13.png), the neuron outputs ![$$ \sigma
    \left({z}_j^l+\varDelta {z}_j^l\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq14.png).
    This change propagates through later layers in the network, finally causing the
    overall cost to change by an amount ![$$ \frac{\partial C}{\partial {z}_j^l}\varDelta
    {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq15.png).
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 红色方块位于层l的第*j*个神经元。当神经元的输入到来时，红色方块会干扰神经元的操作。它向神经元的加权输入中添加一个小的变化![Δz_j^l](Images/484548_1_En_9_Chapter_TeX_IEq12.png)，使得神经元不是输出![σ(z_j^l)](Images/484548_1_En_9_Chapter_TeX_IEq13.png)，而是输出![σ(z_j^l+Δz_j^l)](Images/484548_1_En_9_Chapter_TeX_IEq14.png)。这种变化通过网络中的后续层传播，最终导致整体成本变化一个量![∂C/∂z_j^lΔz_j^l](Images/484548_1_En_9_Chapter_TeX_IEq15.png)。
- en: Now, this square is a good red square, and is trying to help you improve the
    cost, that is, trying to find a ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq16.png)
    that makes the cost smaller. Suppose![$$ \frac{\partial C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq17.png)
    has a large value (either positive or negative). Then the red square canlower
    the cost quite a bit by choosing ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq18.png)
    to have the opposite sign to ![$$ \frac{\partial C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq19.png).By
    contrast, if ![$$ \frac{\partial C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq20.png)
    is close to zero, then the red square can’t improve thecost much at all by perturbing
    the weighted input ![$$ {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq21.png).
    So, as far as the red square can tell, the neuron is already pretty near optimal.
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这个方块是一个很好的红色方块，并且试图帮助你改善成本，即试图找到一个![Δz_j^l](Images/484548_1_En_9_Chapter_TeX_IEq16.png)使得成本更小。假设![∂C/∂z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq17.png)有一个很大的值（无论是正的还是负的）。然后红色方块可以通过选择![Δz_j^l](Images/484548_1_En_9_Chapter_TeX_IEq18.png)具有与![∂C/∂z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq19.png)相反的符号来相当大地降低成本。相比之下，如果![∂C/∂z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq20.png)接近于零，那么红色方块通过扰动加权输入![z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq21.png)几乎不能改善成本。所以，从红色方块的角度来看，神经元已经非常接近最优。
- en: This is only the case for small changes ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq22.png),
    of course. We’ll assume that the red square is constrained to make such small
    changes. And so, there’s a heuristic sense in which ![$$ \frac{\partial C}{\partial
    {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq23.png) is a measure of the error
    in the neuron.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 这只适用于微小的变化 ![Δz_j^l](Images/484548_1_En_9_Chapter_TeX_IEq22.png)，当然。我们将假设红色方块被限制进行这样的微小变化。因此，在某种启发式意义上，![∂C/∂z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq23.png)是神经元误差的一个度量。
- en: Motivated by this story, we define the error ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq24.png)
    of neuron *j* in layer *l*by ![$$ {\delta}_j^l=\frac{\partial C}{\partial {z}_j^l}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq25.png).
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 受这个故事启发，我们定义层l中神经元*j*的误差![δ_j^l](Images/484548_1_En_9_Chapter_TeX_IEq24.png)为![δ_j^l=∂C/∂z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq25.png)。
- en: To continue, we use *δ*^(*l*) to denote the vector of errors associated with
    layer l. Backpropagation will give us a way of computing *δ*^(*l*) for every layer,
    and thenrelating those errors to the quantities of real interest, ![$$ \frac{\partial
    C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq26.png) and ![$$
    \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq27.png).
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 为了继续，我们用*δ*^(*l*)来表示与层l相关的误差向量。反向传播将给我们一种计算每个层的*δ*^(*l*)的方法，然后把这些误差与真正感兴趣的量相关联，即![∂C/∂w_jk^l](Images/484548_1_En_9_Chapter_TeX_IEq26.png)和![∂C/∂b_j^l](Images/484548_1_En_9_Chapter_TeX_IEq27.png)。
- en: You might wonder why the red square is changing the weighted input ![$$ {z}_j^l
    $$](Images/484548_1_En_9_Chapter_TeX_IEq28.png). Surely, it’d be more natural
    to imagine the red square changing theoutput activation ![$$ {a}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq29.png),
    with the result that we’d be using ![$$ \frac{\partial C}{\partial {a}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq30.png)
    as ourmeasure of error. In fact, if you do, these things work out quite similarly
    to the discussion following. But it turns out to make the presentation of backpropagation
    a little more algebraically complicated. So, we’ll stickwith ![$$ {\delta}_j^l=\frac{\partial
    C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq31.png) as our measure
    of error.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道为什么红色方块在改变加权输入 ![z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq28.png)。当然，想象红色方块改变输出激活
    ![a_j^l](Images/484548_1_En_9_Chapter_TeX_IEq29.png) 会更自然，结果是我们将使用 ![∂C/∂a_j^l](Images/484548_1_En_9_Chapter_TeX_IEq30.png)
    作为我们的错误度量。实际上，如果你这样做，这些事情的工作方式与下面的讨论非常相似。但结果证明，这会使反向传播的表示在代数上稍微复杂一些。因此，我们将坚持使用
    ![δ_j^l=∂C/∂z_j^l](Images/484548_1_En_9_Chapter_TeX_IEq31.png) 作为我们的错误度量。
- en: In classification problems like *MNIST,* the term “**error**” is sometimes used
    to mean the classification failure rate. For example, if the neural net correctly
    classifies 96.0 percent of the digits, then the error is 4.0 percent. Obviously,
    this has quite a different meaning from our *δ* vectors. In practice, you shouldn’t
    have trouble telling which meaning is intended in any given usage.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 在像 *MNIST* 这样的分类问题中，“**错误**”一词有时用来表示分类失败率。例如，如果神经网络正确分类了 96.0% 的数字，那么错误率就是 4.0%。显然，这与我们的
    *δ* 向量有相当不同的含义。在实践中，你通常不会在给定的用法中弄混哪种含义是意图。
- en: 'Our target: Backpropagation is based around four fundamental equations. Together,
    those equations give us a way of computing both the error *δ*^(*l*) and the gradient
    of the cost function. I state the four equations later. Be warned, though: you
    shouldn’t expect to instantaneously assimilate the equations. Such an expectation
    will lead to disappointment. In fact, the backpropagation equations are so rich,
    that understanding them well requires considerable time and patience as you gradually
    delve deeper into the equations. The good news is that such patience is repaid
    many times over. And so, the discussion in this section is merely a beginning,
    helping you on the way to a thorough understanding of the equations.'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标：反向传播基于四个基本方程。这些方程共同为我们提供了一种计算误差 *δ*^(*l*) 和损失函数梯度的方法。我将在后面陈述这四个方程。不过，警告一下：你不应该期望立即吸收这些方程。这样的期望会导致失望。事实上，反向传播方程非常丰富，要很好地理解它们需要相当的时间和耐心，随着你逐渐深入方程。好消息是，这种耐心会得到多倍的回报。因此，本节中的讨论只是一个开始，帮助你走向对方程的彻底理解。
- en: 'Here’s a preview of the ways we’ll delve more deeply into the equations later
    in the chapter: I’ll give a short proof of the equations, which helps explain
    why they are true; we’ll restate the equations in algorithm-like form as pseudocode,
    and see how the pseudocode can be implemented as real, running Python code; and,
    in the final section of the chapter, we’ll develop an intuitive picture of what
    the backpropagation equations mean, and how someone might discover them from scratch.
    Along the way we’ll return repeatedly to the four fundamental equations, and as
    you deepen your understanding, those equations will come to seem comfortable and,
    perhaps, even beautiful and natural.'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是本章后面我们将更深入探讨方程的方法的预览：我将给出方程的简短证明，这有助于解释为什么它们是正确的；我们将以算法形式重述方程作为伪代码，并看看伪代码如何被实现为真实的、可运行的
    Python 代码；在章节的最后部分，我们将发展一个直观的图像来理解反向传播方程的含义，以及某人如何从头开始发现它们。在这个过程中，我们将反复回到四个基本方程，随着你对这些方程理解的加深，这些方程将变得舒适，甚至可能美丽而自然。
- en: Here’s an equation for the error in the output layer, *δ*^(*L*). The components
    of *δ*^(*L*) are given by
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是输出层误差 *δ*^(*L*) 的一个方程。*δ*^(*L*) 的组成部分如下所示
- en: '![$$ {\delta}_j^L=\frac{\partial C}{\partial {a}_j^L}{\sigma}^{`}\left({z}_j^L\right)
    $$](Images/484548_1_En_9_Chapter_TeX_Equ1.png)'
  id: totrans-312
  prefs: []
  type: TYPE_IMG
  zh: '![δ_j^L=∂C/∂a_j^Lσ^{''}(z_j^L)](Images/484548_1_En_9_Chapter_TeX_Equ1.png)'
- en: (Equation 1)
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: (方程 1)
- en: This is a very natural expression. The first term on the right, ![$$ \frac{\partial
    C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq32.png),just measures
    how fast the cost is changing as a function of the *j*^(*th*) output activation.
    If, for example, *C* doesn’t depend much on a particular output neuron, *j*, then
    ![$$ {\delta}_j^L $$](Images/484548_1_En_9_Chapter_TeX_IEq33.png) will be small,
    which is what we’d expect. The second term on the right, ![$$ {\sigma}^{`}\left({z}_j^L\right)
    $$](Images/484548_1_En_9_Chapter_TeX_IEq34.png), measures how fast the activation
    function *σ* is changing at ![$$ {z}_j^L $$](Images/484548_1_En_9_Chapter_TeX_IEq35.png).
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常自然的表达。右侧的第一个项，![\( \frac{\partial C}{\partial {a}_j^L} \)](Images/484548_1_En_9_Chapter_TeX_IEq32.png)，仅仅衡量了成本函数作为输出激活的
    *j*^(*th*) 激活的函数变化速度。例如，如果 *C* 对特定输出神经元 *j* 的依赖不大，那么 ![$( \delta_j^L )](Images/484548_1_En_9_Chapter_TeX_IEq33.png)
    将会很小，这正是我们所期望的。右侧的第二个项，![\( \sigma^{`}(z_j^L) \)](Images/484548_1_En_9_Chapter_TeX_IEq34.png)，衡量了激活函数
    *σ* 在 ![$( z_j^L )](Images/484548_1_En_9_Chapter_TeX_IEq35.png) 处的变化速度。
- en: Notice that everything in Equation 1 is easily computed. In particular, we compute
    ![$$ {z}_j^L $$](Images/484548_1_En_9_Chapter_TeX_IEq36.png) while computing the
    behavior of the network, and it’s only a small additional overhead to compute
    ![$$ {\sigma}^{`}\left({z}_j^L\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq37.png).
    The exact form of ![$$ \frac{\partial C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq38.png)
    will, of course, depend on the form of the cost function. However,provided the
    cost function is known, there should be little trouble computing ![$$ \frac{\partial
    C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq39.png). For example,
    if we’re using the quadratic cost function,then ![$$ C=\frac{1}{2}{\sum}_j{\left({a}_j^L-{y}_j\right)}^2
    $$](Images/484548_1_En_9_Chapter_TeX_IEq40.png), and so ![$$ \frac{\partial C}{\partial
    {a}_j^L}=\left({a}_j^L-{y}_j\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq41.png),
    which obviously is easilycomputable.
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到方程1中的所有内容都很容易计算。特别是，我们在计算网络的行为时同时计算 ![$( z_j^L )](Images/484548_1_En_9_Chapter_TeX_IEq36.png)，计算
    ![$( \sigma^{`}(z_j^L) \)](Images/484548_1_En_9_Chapter_TeX_IEq37.png) 只会增加很小的额外开销。当然，\(
    \frac{\partial C}{\partial {a}_j^L} \) 的确切形式将取决于成本函数的形式。然而，如果已知成本函数，计算 \( \frac{\partial
    C}{\partial {a}_j^L} \) 应该不会有太多麻烦。例如，如果我们使用二次成本函数，那么 ![$( C=\frac{1}{2}\sum_j{(a_j^L-y_j)}^2
    \)](Images/484548_1_En_9_Chapter_TeX_IEq40.png)，因此 ![$( \frac{\partial C}{\partial
    {a}_j^L}=(a_j^L-y_j) \)](Images/484548_1_En_9_Chapter_TeX_IEq41.png)，这显然是容易计算的。
- en: Equation 1 is a component-wise expression for *δ*^(*L*). It’s a perfectly good
    expression, but not the matrix-based form we want for backpropagation. However,
    it’s easy to rewrite the equation in a matrix-based form, as *δ*^(*L*) = ∇[*a*]*C* ⊙ *σ*^′(*z*^(*L*))
    (Equation 1 a).
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 方程1是 *δ*^(*L*) 的分项表达式。这是一个非常好的表达式，但不是我们想要用于反向传播的基于矩阵的形式。然而，很容易将方程重写为基于矩阵的形式，即
    *δ*^(*L*) = ∇[*a*]*C* ⊙ *σ*^′(*z*^(*L*)) (方程1 a)。
- en: Here, ∇[*a*]*C* is defined to be a vector whose components are the partialderivatives
    ![$$ \frac{\partial C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq42.png).
    You can think of ∇[*a*]*C* as expressing the rate of changeof *C* with respect
    to the output activations. It’s easy to see that Equation 1 a and Equation 1 are
    equivalent, and for that reason from now on we’ll use Equation 1 interchangeably
    to refer to both equations. As an example, in the case of the quadratic cost we
    have ∇[*a*]*C* = *a*^(*L*) − *y*, and so the fully matrix-based form of Equation
    1 becomes *δ*^(*L*) = (*a*^(*L*) − *y*) ⊙ *σ*^′(*z*^(*L*)). As you can see, everything
    in this expression has a nice vector form, and is easily computed using a library
    such as *NumPy*.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，∇[*a*]*C* 被定义为具有部分导数 ![$( \frac{\partial C}{\partial {a}_j^L} \)](Images/484548_1_En_9_Chapter_TeX_IEq42.png)
    的分量向量。你可以将 ∇[*a*]*C* 视为表示 *C* 相对于输出激活的变化率。很容易看出，方程1 a 和方程1是等价的，因此从现在起我们将交替使用方程1来指代这两个方程。例如，在二次成本的情况下，我们有
    ∇[*a*]*C* = *a*^(*L*) − *y*，因此方程1的完全矩阵形式变为 *δ*^(*L*) = (*a*^(*L*) − *y*) ⊙ *σ*^′(*z*^(*L*))。正如你所看到的，这个表达式中的所有内容都有一个很好的向量形式，并且可以使用像
    *NumPy* 这样的库轻松计算。
- en: Here is an equation for the error *δ*^(*l*) in terms of the error in the next
    layer, *δ*^(*l* + 1). In particular,
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个关于下一层错误 *δ*^(*l*) 的方程，它涉及到下一层的错误 *δ*^(*l* + 1)。特别是，
- en: '![$$ {\delta}^l=\left({\left({w}^{l+1}\right)}^T{\delta}^{l+1}\right)\Big)\odot
    {\sigma}^{`}\left({z}^l\right) $$](Images/484548_1_En_9_Chapter_TeX_Equ2.png)'
  id: totrans-319
  prefs: []
  type: TYPE_IMG
  zh: '![$( \delta^l=\left(\left(w^{l+1}\right)^T\delta^{l+1}\right)\Big)\odot \sigma^{`}\left(z^l\right)
    \)](Images/484548_1_En_9_Chapter_TeX_Equ2.png)'
- en: (Equation 2)
  id: totrans-320
  prefs: []
  type: TYPE_NORMAL
  zh: (方程式 2)
- en: where (*w*^(*l* + 1))^(*T*) is the transpose of the weight matrix *w*^(*l* + 1)
    for the (*l* + 1)^(*th*) layer. This equation appears complicated, but each element
    has a nice interpretation. Suppose we know the error *δ*^(*l* + 1) at the (*l* + 1)^(*th*)
    layer. When we apply the transpose weight matrix, (*w*^(*l* + 1))^(*T*), we can
    think intuitively of this as moving the error backward through the network, giving
    us some sort of measure of the error at the output of the *l*^(*th*) layer. We
    then take the Hadamard product ⊙*σ*^`(*z*^(*l*)). This moves the error backward
    through the activation function in layer *l*, giving us the error *δ*^(*l*) in
    the weighted input to layer *l*.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 (*w*^(*l* + 1))^(*T*) 是 (*l* + 1)^(*th*) 层的权重矩阵 *w*^(*l* + 1) 的转置。这个方程看起来很复杂，但每个元素都有很好的解释。假设我们已知
    (*l* + 1)^(*th*) 层的误差 *δ*^(*l* + 1)。当我们应用转置权重矩阵 (*w*^(*l* + 1))^(*T*) 时，我们可以直观地认为这是将误差向后移动通过网络，给我们某种关于
    *l*^(*th*) 层输出的误差度量。然后我们取 Hadamard 积 ⊙*σ*^`(*z*^(*l*))。这将在 *l* 层的激活函数中向后移动误差，给我们
    *l* 层加权输入中的误差 *δ*^(*l*)。
- en: By combining Equation 2 with Equation 1, we can compute the error *δ*^(*l*)
    for any layer in the network. We start by using Equation 1 to compute *δ*^(*L*),
    then apply Equation 2 to compute *δ*^(*L* − 1), then Equation 2 again to compute
    *δ*^(*L* − 2), and so on, all the way back through the network.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将方程式 2 与方程式 1 结合，我们可以计算网络中任何层的误差 *δ*^(*l*)。我们首先使用方程式 1 来计算 *δ*^(*L*), 然后应用方程式
    2 来计算 *δ*^(*L* − 1), 然后再用方程式 2 来计算 *δ*^(*L* − 2), 以此类推，一直回溯到网络中。
- en: Here’s an equation for the rate of change of the cost with respect to any bias
    in the network. In particular,
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是网络中任何偏置相对于成本变化的方程。特别是，
- en: '![$$ \frac{\partial C}{\partial {b}_j^l}={\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_Equ3.png)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial C}{\partial {b}_j^l}={\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_Equ3.png)'
- en: (Equation 3)
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: (方程式 3)
- en: That is, the error ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq43.png)
    is exactly equal to the rate of change ![$$ \frac{\partial C}{\partial {b}_j^l}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq44.png). This isgreat news, since Equation
    1 and Equation 2 have already told us how tocompute ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq45.png).
    We can rewrite Equation 3 in shorthand as ![$$ \frac{\partial C}{\partial b}=\delta
    $$](Images/484548_1_En_9_Chapter_TeX_IEq46.png), where it is understood that *δ*
    is being evaluated at the same neuron as the bias *b*.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 即，误差 ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq43.png) 完全等于变化率
    ![$$ \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq44.png)。这是一个好消息，因为方程式
    1 和方程式 2 已经告诉我们如何计算 ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq45.png)。我们可以将方程式
    3 简写为 ![$$ \frac{\partial C}{\partial b}=\delta $$](Images/484548_1_En_9_Chapter_TeX_IEq46.png)，其中理解
    *δ* 是在与偏置 *b* 相同的神经元处评估的。
- en: 'Here is an equation for the rate of change of the cost with respect to any
    weight in the network: In in particular,'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个关于网络中任何权重相对于成本变化的方程：特别是，
- en: '![$$ \frac{\partial C}{\partial {w}_{jk}^l}={a}_k^{l-1}{\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_Equ4.png)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial C}{\partial {w}_{jk}^l}={a}_k^{l-1}{\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_Equ4.png)'
- en: (Equation 4)
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: (方程式 4)
- en: This tells us how to compute the partial derivatives ![$$ \frac{\partial C}{\partial
    {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq47.png) in terms ofthe quantities
    *δ*^(*l*) and *a*^(*l* − 1), which we already know how to compute. Theequation
    can be rewritten in a less index-heavy notation as ![$$ \frac{\partial C}{\partial
    w}={a}_{in}{\delta}_{out} $$](Images/484548_1_En_9_Chapter_TeX_IEq48.png), where
    it’s understood that *a*[*in*] is the activation of the neuron input to the weight
    *w*, and *δ*[*out*] is the error of the neuron output from the weight *w*. Zooming
    in to look at just the weight, *w*, and the two neurons connected by that weight,
    we can depict this as shown in Figure [9-25](#Fig25).
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉我们如何根据已知的 *δ*^(*l*) 和 *a*^(*l* − 1) 计算偏导数 ![$$ \frac{\partial C}{\partial
    {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq47.png)。该方程可以用更少的索引符号重写为 ![$$
    \frac{\partial C}{\partial w}={a}_{in}{\delta}_{out} $$](Images/484548_1_En_9_Chapter_TeX_IEq48.png)，其中理解
    *a*[*in*] 是输入到权重 *w* 的神经元的激活，而 *δ*[*out*] 是从权重 *w* 输出的神经元的误差。聚焦于仅查看权重 *w* 和通过该权重连接的两个神经元，我们可以将其表示如图
    [9-25](#Fig25) 所示。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig25_HTML.jpg](Images/484548_1_En_9_Fig25_HTML.jpg)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig25_HTML.jpg](Images/484548_1_En_9_Fig25_HTML.jpg)'
- en: Figure 9-25
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-25
- en: The backpropagation connection between two neurons
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 两个神经元之间的反向传播连接
- en: A nice consequence of the equation ![$$ \frac{\partial C}{\partial w}={a}_{in}{\delta}_{out}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq49.png) is that when the activation a[in]
    is small, *a*[*in*] ≈ 0, the gradient term ![$$ \frac{\partial C}{\partial w}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq50.png) will also tend to be small. In
    this case, we’ll say the weight learns slowly, meaning that it’s not changing
    much during gradient descent. In other words, one consequence of Equation 4 is
    that weights output from low-activation neurons learn slowly.
  id: totrans-334
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 ![∂C/∂w=a_inδ_out](Images/484548_1_En_9_Chapter_TeX_IEq49.png) 的一个良好后果是，当激活
    a[in] 很小，*a*[*in*] ≈ 0 时，梯度项 ![∂C/∂w](Images/484548_1_En_9_Chapter_TeX_IEq50.png)
    也会倾向于很小。在这种情况下，我们将说权重学习缓慢，这意味着它在梯度下降过程中变化不大。换句话说，方程4的一个后果是，来自低激活神经元的权重学习缓慢。
- en: There are other insights along these lines, which can be obtained from Equation
    1 to Equation 4\. Let’s start by looking at the output layer. Consider the term
    ![$$ {\sigma}^{`}\left({z}_j^L\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq51.png)
    in Equation 1\. Recall from the graph of the sigmoid function in the last chapter
    that the σ function becomes very flat when ![$$ \sigma \left({z}_j^L\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq52.png)
    is approximately 0 or 1\. When this occurs, we will have ![$$ {\sigma}^{`}\left({z}_j^L\right)\approx
    0 $$](Images/484548_1_En_9_Chapter_TeX_IEq53.png). And so, the lesson is that
    a weight in the final layer will learn slowly if the output neuron is either low
    activation (≈0) or high activation (≈1). In this case, it’s common to say the
    output neuron has saturated and, as a result, the weight has stopped learning
    (or is learning slowly). Similar remarks also hold for the biases of output neuron.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着这条思路，还有其他一些见解，可以从方程1到方程4中获得。让我们首先看看输出层。考虑方程1中的项 ![σ^{`}(z_j^L)](Images/484548_1_En_9_Chapter_TeX_IEq51.png)。回想一下上一章中sigmoid函数的图形，当
    ![σ(z_j^L)](Images/484548_1_En_9_Chapter_TeX_IEq52.png) 大约等于0或1时，σ函数变得非常平坦。当这种情况发生时，我们将有
    ![σ^{`}(z_j^L)≈0](Images/484548_1_En_9_Chapter_TeX_IEq53.png)。因此，教训是如果输出神经元是低激活（≈0）或高激活（≈1），则最终层的权重将学习缓慢。在这种情况下，通常会说输出神经元已经饱和，因此权重停止学习（或学习缓慢）。对于输出神经元的偏差也有类似的评论。
- en: We can obtain similar insights for earlier layers. In particular, note the *σ*^'(*z*^(*l*))
    term in Equation 2\. This means that ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq54.png)
    is likely to get small if the neuron is near saturation. And this, in turn, means
    that any weights input to a saturated neuron will learn slowly.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以对早期层获得类似的见解。特别是注意方程2中的 *σ*^'(*z*^(*l*)) 项。这意味着如果神经元接近饱和，![δ_j^l](Images/484548_1_En_9_Chapter_TeX_IEq54.png)
    很可能变得很小。这反过来又意味着任何输入到饱和神经元的权重都会学习缓慢。
- en: This reasoning won’t hold if (*w*^(*l* + 1))^(*T*)*δ*^(*l* + 1)) has large enough
    entries to compensate for the smallness of ![$$ {\sigma}^{`}\left({z}_j^L\right)
    $$](Images/484548_1_En_9_Chapter_TeX_IEq55.png). But I’m speaking of the general
    tendency.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 如果 (*w*^(*l* + 1))^(*T*)*δ*^(*l* + 1)) 有足够大的项来补偿 ![σ^{`}(z_j^L)](Images/484548_1_En_9_Chapter_TeX_IEq55.png)
    的小值，这种推理就不成立了。但我是在谈论一般趋势。
- en: Summing up, we’ve learned that a weight will learn slowly if either the input
    neuron is low-activation or if the output neuron has saturated (i.e., is either
    high- or low-activation).
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下，我们已经了解到，如果输入神经元是低激活的，或者输出神经元已经饱和（即高激活或低激活），则权重将学习缓慢。
- en: None of these observations is too greatly surprising. Still, they help improve
    our mental model of what’s going on as a neural network learns. Furthermore, we
    can turn this type of reasoning around. The four fundamental equations turn out
    to hold for any activation function, not just the standard sigmoid function (that’s
    because, as we’ll see in a moment, the proofs don’t use any special properties
    of *σ*). So, we can use these equations to design activation functions that have
    particular desired learning properties. As an example, suppose we were to choose
    a (nonsigmoid) activation function σ so that σ′ is always positive and never gets
    close to zero. That would prevent the slowdown of learning that occurs when ordinary
    sigmoid neurons saturate. Later in the book we’ll see examples where this kind
    of modification is made to the activation function. Keeping the four equations
    (Equations 1 to 4) in mind can help explain why such modifications are tried,
    and what impact they can have (Figure [9-26](#Fig26)).
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 这些观察结果并不令人特别惊讶。然而，它们有助于提高我们对神经网络学习过程中所发生事情的心理模型。此外，我们可以反过来思考这个问题。四个基本方程对于任何激活函数都成立，而不仅仅是标准的
    sigmoid 函数（这是因为，正如我们一会儿将看到的，证明没有使用任何关于 *σ* 的特殊性质）。因此，我们可以使用这些方程来设计具有特定期望学习特性的激活函数。例如，假设我们选择一个（非
    sigmoid）激活函数 σ，使得 σ′ 总是正的，并且永远不会接近零。这将防止普通 sigmoid 神经元饱和时发生的学习速度减慢。在本书的后面部分，我们将看到对激活函数进行此类修改的例子。记住这四个方程（方程
    1 到 4）可以帮助解释为什么尝试这样的修改，以及它们可能产生的影响（图 [9-26](#Fig26)）。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig26_HTML.jpg](Images/484548_1_En_9_Fig26_HTML.jpg)'
  id: totrans-340
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig26_HTML.jpg](Images/484548_1_En_9_Fig26_HTML.jpg)'
- en: Figure 9-26
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-26
- en: Summing up all of the four equations
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 总结所有四个方程
- en: Exploding Gradients
  id: totrans-343
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 梯度爆炸
- en: What are exploding gradients?
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 什么是梯度爆炸？
- en: An error gradient is the direction and magnitude calculated during the training
    of a neural network that is used to update the network weights in the right direction
    and by the right amount.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 错误梯度是在训练神经网络期间计算出的方向和幅度，用于以正确的方向和正确的量更新网络权重。
- en: In deep networks or recurrent neural networks, error gradients can accumulate
    during an update and result in very large gradients. These in turn result in large
    updates to the network weights, and in turn, an unstable network. At an extreme,
    the values of weights can become so large as to overflow and result in NaN values.
  id: totrans-346
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度网络或循环神经网络中，错误梯度在更新过程中可能会累积，导致非常大的梯度。这些梯度反过来又导致网络权重的较大更新，进而导致网络不稳定。在极端情况下，权重值可能变得非常大，以至于溢出并导致
    NaN 值。
- en: The explosion occurs through exponential growth by repeatedly multiplying gradients
    through the network layers that have values larger than 1.0.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 爆炸是通过重复乘以具有大于 1.0 值的网络层的梯度而通过指数增长发生的。
- en: What is the problem with exploding gradients?
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度爆炸的问题是什么？
- en: In deep multilayer perceptron networks, exploding gradients can result in an
    unstable network that at best cannot learn from the training data and at worst
    results in NaN weight values that can no longer be updated. Exploding gradients
    can make learning unstable. In recurrent neural networks, exploding gradients
    can result in an unstable network that is unable to learn from training data and
    at best a network that cannot learn over long input sequences of data.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度多层感知器网络中，梯度爆炸可能导致网络不稳定，最坏的情况下会导致无法更新的 NaN 权重值。梯度爆炸会使学习不稳定。在循环神经网络中，梯度爆炸可能导致网络不稳定，无法从训练数据中学习，并且在最佳情况下，网络无法从长输入序列数据中学习。
- en: The exploding gradients problem refers to the large increase in the norm of
    the gradient during training. Such events are due to the explosion of the long-term
    components
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度爆炸问题指的是训练过程中梯度范数的显著增加。这些事件是由于长期成分的爆炸。
- en: 'How do you know if you have exploding gradients? There are some subtle signs
    that you may be suffering from exploding gradients during the training of your
    network, such as:'
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何知道你是否遇到了梯度爆炸？在训练你的网络时，你可能会有一些细微的迹象表明你正在遭受梯度爆炸，例如：
- en: The model is unable to get traction on your training data (e.g., poor loss).
  id: totrans-352
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型无法在你的训练数据上获得牵引力（例如，损失值不佳）。
- en: The model is unstable, resulting in large changes in loss from update to update.
  id: totrans-353
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型不稳定，导致损失从更新到更新发生大幅变化。
- en: The model loss goes to NaN during training.
  id: totrans-354
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型损失在训练过程中变为 NaN。
- en: If you have these types of problems, you can dig deeper to see if you have a
    problem with exploding gradients. There are some less subtle signs that you can
    use to confirm that you have exploding gradients.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到这些问题，可以深入挖掘以查看是否存在梯度爆炸问题。有一些不那么微妙的迹象可以用来确认你是否存在梯度爆炸。
- en: The model weights quickly become very large during training.
  id: totrans-356
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练过程中，模型权重会迅速变得非常大。
- en: The model weights go to NaN values during training.
  id: totrans-357
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练过程中，模型权重会变成NaN值。
- en: The error gradient values are consistently above 1.0 for each node and layer
    during training.
  id: totrans-358
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练过程中，每个节点和层的错误梯度值始终大于1.0。
- en: How can we fix exploding gradients? There are many approaches to addressing
    exploding gradients; this section lists some best practice approaches that you
    can use.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何修复梯度爆炸？解决梯度爆炸有许多方法；本节列出了你可以使用的最佳实践方法。
- en: Re-Design the Network Model
  id: totrans-360
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 重新设计网络模型
- en: In deep neural networks, exploding gradients may be addressed by redesigning
    the network to have fewer layers.
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度神经网络中，可以通过重新设计网络以具有更少的层来解决梯度爆炸问题。
- en: There may also be some benefit in using a smaller batch size while training
    the network.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练网络时，使用较小的批量大小也可能带来一些好处。
- en: In recurrent neural networks, updating across fewer prior time steps during
    training, called truncated backpropagation through time, may reduce the exploding
    gradient problem.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 在循环神经网络中，在训练期间更新较少的先前时间步，称为时间反向传播的截断，可以减少梯度爆炸问题。
- en: Use Long Short-Term Memory Networks
  id: totrans-364
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用长短期记忆网络
- en: In recurrent neural networks, gradient exploding can occur given the inherent
    instability in the training of this type of network, for example, via backpropagation
    through time that essentially transforms the recurrent network into a deep multilayer
    perceptron neural network.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 在循环神经网络中，由于这种网络训练的固有不稳定，梯度爆炸可能会发生，例如，通过时间反向传播将循环网络基本上转换为一个深度多层感知器神经网络。
- en: Exploding gradients can be reduced by using the LSTM memory units and, perhaps,
    related gated-type neuron structures.
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使用LSTM记忆单元以及可能的相关门控型神经元结构，可以减少梯度爆炸。
- en: Adopting LSTM memory units is a new best practice for recurrent neural networks
    for sequence prediction.
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 采用LSTM记忆单元是循环神经网络进行序列预测的新最佳实践。
- en: Use Gradient Clipping
  id: totrans-368
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用梯度裁剪
- en: Exploding gradients can still occur in very deep multilayer perceptron networks
    with a large batch size and LSTMs with very long input sequence lengths.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在具有大批量大小和非常长的输入序列长度的LSTM的非常深的多层感知器网络中，梯度爆炸仍然可能发生。
- en: If exploding gradients are still occurring, you can check for and limit the
    size of gradients during the training of your network.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 如果梯度爆炸仍然发生，你可以在训练你的网络时检查并限制梯度的尺寸。
- en: 'This is called gradient clipping. Dealing with the exploding gradients has
    a simple but very effective solution: clipping gradients if their norm exceeds
    a given threshold.'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为梯度裁剪。处理梯度爆炸有一个简单但非常有效的解决方案：如果梯度的范数超过给定的阈值，则裁剪梯度。
- en: Specifically, the values of the error gradient are checked against a threshold
    value and clipped or set to that threshold value if the error gradient exceeds
    the threshold.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，检查错误梯度的值是否超过阈值，如果超过阈值，则将其裁剪或设置为该阈值值。
- en: To some extent, the exploding gradient problem can be mitigated by gradient
    clipping (thresholding the values of the gradients before performing a gradient
    descent step).
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 在一定程度上，可以通过梯度裁剪（在执行梯度下降步骤之前对梯度的值进行阈值处理）来减轻梯度爆炸问题。
- en: Use Weight Regularization
  id: totrans-374
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用权重正则化
- en: Another approach, if exploding gradients are still occurring, is to check the
    size of network weights and apply a penalty to the network’s loss function for
    large weight values.
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 如果梯度爆炸仍然发生，另一种方法是检查网络权重的尺寸，并对大权重值应用网络损失函数的惩罚。
- en: This is called weight regularization and often an L1 (absolute weights) or an
    L2 (squared weights) penalty can be used.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为权重正则化，通常可以使用L1（绝对权重）或L2（平方权重）惩罚。
- en: Using an L1 or L2 penalty on the recurrent weights can help with exploding gradients.
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 在循环权重上使用L1或L2惩罚可以帮助解决梯度爆炸。
- en: Vanishing Gradients
  id: totrans-378
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 梯度消失
- en: The vanishing gradients problem is one example of unstable behavior that you
    may encounter when training a deep neural network.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度消失问题是你在训练深度神经网络时可能遇到的不稳定行为的一个例子。
- en: It describes the situation where a deep multilayer feedforward network or a
    recurrent neural network is unable to propagate useful gradient information from
    the output end of the model back to the layers near the input end of the model.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 它描述了深度多层前馈网络或循环神经网络无法从模型的输出端传播有用的梯度信息到模型输入端附近的层的情况。
- en: The result is the general inability of models with many layers to learn on a
    given dataset, or they might prematurely converge to a poor solution.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是，具有许多层的模型在给定数据集上学习的能力普遍不足，或者它们可能会过早地收敛到一个较差的解决方案。
- en: Many fixes and workarounds have been proposed and investigated, such as alternate
    weight initialization schemes, unsupervised pretraining, layer-wise training,
    and variations on gradient descent. Perhaps the most common change is the use
    of the rectified linear activation function that has become the new default, instead
    of the hyperbolic tangent activation function that was the default through the
    late 1990s and 2000s.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 已经提出了许多修复方案和解决方案，例如交替权重初始化方案、无监督预训练、分层训练和梯度下降的变体。最常见的变化可能是使用修正线性激活函数，这已成为新的默认选项，而不是1990年代末和2000年代默认使用的双曲正切激活函数。
- en: In this section, you will discover how to diagnose a vanishing gradient problem
    when training a neural network model, and how to fix it using an alternate activation
    function and weight initialization scheme.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将了解如何在训练神经网络模型时诊断梯度消失问题，以及如何使用替代激活函数和权重初始化方案来修复它。
- en: Vanishing Gradients Problem
  id: totrans-384
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 梯度消失问题
- en: For instance, a neural network is trained using stochastic gradient descent.
    This involves first calculating the prediction error made by the model and using
    the error to estimate a gradient used to update each weight in the network so
    that less error is made next time. This error gradient is propagated backward
    through the network from the output layer to the input layer.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，使用随机梯度下降训练神经网络。这涉及首先计算模型做出的预测误差，并使用误差来估计用于更新网络中每个权重的梯度，以便在下一次减少误差。这个误差梯度从输出层传播到输入层。
- en: It is desirable to train neural networks with many layers, as the addition of
    more layers increases the capacity of the network, making it capable of learning
    a large training dataset and efficiently representing more complex mapping functions
    from inputs to outputs.
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: 训练具有许多层的神经网络是可取的，因为增加更多的层会增加网络的能力，使其能够学习大量的训练数据集，并有效地表示从输入到输出的更复杂的映射函数。
- en: A problem with training networks with many layers (e.g., deep neural networks)
    is that the gradient diminishes dramatically as it is propagated backward through
    the network. The error may be so small by the time it reaches layers close to
    the input of the model, that it may have very little effect. As such, this problem
    is referred to as the “vanishing gradients” problem.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 训练具有许多层（例如，深度神经网络）的网络的难题在于，梯度在通过网络反向传播时会急剧减小。当误差传播到接近模型输入的层时，误差可能非常小，以至于可能几乎没有影响。因此，这个问题被称为“梯度消失”问题。
- en: Vanishing gradients make it difficult to know in which direction the parameters
    should move to improve the cost function.
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度消失使得难以知道参数应该朝哪个方向移动以改善成本函数。
- en: In fact, the error gradient can be unstable in deep neural networks and not
    only vanish, but also explode, where the gradient exponentially increases as it
    is propagated backward through the network. This is referred to as the “exploding
    gradient” problem.
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，在深度神经网络中，误差梯度可能是不稳定的，不仅会消失，还可能爆炸，即梯度在通过网络反向传播时会呈指数增长。这被称为“梯度爆炸”问题。
- en: The term vanishing gradient refers to the fact that in a feedforward network
    (FFN) the backpropagated error signal typically decreases (or increases) exponentially
    as a function of the distance from the final layer.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: “梯度消失”这个术语指的是在前馈网络（FFN）中，反向传播的误差信号通常随着距离最终层的距离呈指数（或增加）。
- en: Vanishing gradients is a particular problem with recurrent neural networks because
    the update of the network involves unrolling the network for each input time step,
    in effect creating a very deep network that requires weight updates. A modest
    recurrent neural network may have 200-to-400 input time steps, resulting conceptually
    in a very deep network.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 消失梯度是循环神经网络的一个特定问题，因为网络的更新涉及到对每个输入时间步进行网络展开，实际上创建了一个非常深的网络，需要权重更新。一个适度大小的循环神经网络可能有
    200 到 400 个输入时间步，从概念上讲，这导致了一个非常深的网络。
- en: The vanishing gradients problem may be manifest in a multilayer perceptron by
    a slow rate of improvement of a model during training and perhaps premature convergence
    (e.g., continued training does not result in any further improvement). Inspecting
    the changes to the weights during training, we would see more change (i.e., more
    learning) occurring in the layers closer to the output layer and less change occurring
    in the layers close to the input layer.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: 消失梯度问题可能通过在训练过程中模型改进速度缓慢以及可能过早收敛（例如，继续训练不会导致任何进一步的改进）在多层感知器中表现出来。检查训练过程中权重的变化，我们会看到靠近输出层的层发生更多的变化（即，更多的学习），而在靠近输入层的层中变化较少。
- en: There are many techniques that can be used to reduce the impact of the vanishing
    gradients problem for feedforward neural networks, most notably alternate weight
    initialization schemes and use of alternate activation functions.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多技术可以用来减少前馈神经网络中消失梯度问题的影响，最显著的是交替权重初始化方案和使用交替激活函数。
- en: Different approaches to training deep networks (both feedforward and recurrent)
    have been studied and applied (in an effort to address vanishing gradients), such
    as pretraining, better random initial scaling, better optimization methods, specific
    architectures, orthogonal initialization, etc.
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 深度网络（前馈和循环）的不同训练方法已被研究和应用（以解决消失梯度问题），例如预训练、更好的随机初始缩放、更好的优化方法、特定架构、正交初始化等。
- en: In this section, we will take a closer look at the use of an alternate weight
    initialization scheme and activation function to permit the training of deeper
    neural network models.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将更详细地研究使用交替权重初始化方案和激活函数来允许训练更深的神经网络模型。
- en: 'Weight initialization: Update the deep MLP with tanh activation to use Xavier
    uniform weight initialization and report the results.'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: 权重初始化：将具有 tanh 激活的深度 MLP 更新为使用 Xavier 均匀权重初始化并报告结果。
- en: 'Learning algorithm: Update the deep MLP with tanh activation to use an adaptive
    learning algorithm such as Adam and report the results.'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 学习算法：将具有 tanh 激活的深度 MLP 更新为使用自适应学习算法（如 Adam）并报告结果。
- en: 'Weight changes: Update the tanh and ReLU examples to record and plot the L1
    vector norm of model weights each epoch as a proxy for how much each layer is
    changed during training and compare results.'
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 权重变化：更新 tanh 和 ReLU 示例，以记录和绘制每个纪元的模型权重 L1 向量范数，作为每个层在训练期间变化的代理，并比较结果。
- en: 'Study model depth: Create an experiment using the MLP with tanh activation
    and report the performance of models as the number of hidden layers is increased
    from 1 to 10.'
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 研究模型深度：创建一个使用具有 tanh 激活的 MLP 的实验，并报告当隐藏层数量从 1 增加到 10 时模型的性能。
- en: 'Increase breadth: Increase the number of nodes in the hidden layers of the
    MLP with tanh activation from 5 to 25, and report performance as the number of
    layers are increased from 1 to 10.'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 扩展广度：将具有 tanh 激活的 MLP 的隐藏层节点数量从 5 增加到 25，并报告当层数从 1 增加到 10 时的性能。
- en: TensorFlow Basics
  id: totrans-401
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 基础知识
- en: In Part I, we discussed TensorFlow from installation to its basics; we also
    showed how to build a fully functional model using a toy dataset. We did all this
    in the introduction part to make you feel that it’s easier than you think to learn
    deep learning and start using TensorFlow. But now we need to show you the needed
    fundamentals of TensorFlow, going through the same headers but with some depth;
    for instance, we will reillustrate the use of different types of tensor (i.e.,
    placeholder, variable, and constant, giving you the concrete tools that you will
    use to build any TensorFlow deep learning models.
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一部分，我们讨论了从安装到其基础知识的 TensorFlow；我们还展示了如何使用玩具数据集构建一个完全功能性的模型。我们在介绍部分做了所有这些，让你感觉学习深度学习和开始使用
    TensorFlow 比你想象的要容易。但现在我们需要向你展示 TensorFlow 所需的基本知识，通过相同的标题但深入一些；例如，我们将重新说明不同类型张量的使用（即，占位符、变量和常量），为你提供构建任何
    TensorFlow 深度学习模型的具体工具。
- en: So, in this section, we are going to discuss the difference between placeholder,
    variable, and constant tensor types, and also show you the properties of tensors.
    After that we are going to show you the optimization framework and approaches
    that TensorFlow uses in almost any deep learning models, going throw the learning
    rate and understanding the mini-batch approach. Last, we will show you the most
    important optimizers in TensorFlow.
  id: totrans-403
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在本节中，我们将讨论占位符、变量和常量张量类型之间的区别，并展示张量的属性。之后，我们将向您展示TensorFlow在几乎所有深度学习模型中使用的优化框架和方法，包括学习率以及理解小批量方法。最后，我们将向您展示TensorFlow中最重要的优化器。
- en: Placeholder vs. Variable vs. Constant
  id: totrans-404
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 占位符 vs. 变量 vs. 常量
- en: As we described in Part I, placeholders, variables, and constants are key tools
    for using computational graphs in TensorFlow. So, we have to understand the differences
    and when to best use them to our advantage.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在第一部分中描述的，占位符、变量和常量是使用TensorFlow中的计算图的关键工具。因此，我们必须了解它们之间的区别以及何时最好地利用它们来发挥优势。
- en: 'One of the most important distinctions to make with the data is whether it
    is a placeholder or a variable. Variables are the parameters of the algorithm
    and TensorFlow keeps track of how to change these to optimize the algorithm. Placeholders
    are objects that allow you to feed in data of a specific type and shape and depend
    on the results of the computational graph, such as the expected outcome of a computation.
    On the other hand, constants have a simple use: while you build a huge model,
    you are going to use some functions that do something for you: matrices multiplication
    or any computational operation. Here you can use the constant for these operations
    to help you do it inside the computational graph.'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据中区分的一个重要方面是它是否是占位符或变量。变量是算法的参数，TensorFlow会跟踪如何改变这些参数以优化算法。占位符是允许您输入特定类型和形状数据的对象，并依赖于计算图的结果，例如计算的预期结果。另一方面，常量有一个简单的用途：当您构建一个庞大的模型时，您将使用一些为您做些事情的函数：矩阵乘法或任何计算操作。在这里，您可以使用常量进行这些操作，以帮助您在计算图中完成它们。
- en: Another important distinction is that in TensorFlow the differences between
    constants and variables are that when you declare some constant, its value can’t
    be changed in the future (also the initialization should be with a value, not
    with an operation). Nevertheless, when you declare a variable, you can change
    its value in the future with `tf.assign()` method (and the initialization can
    be achieved with a value or operation).
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的区别是，在TensorFlow中，常量和变量之间的区别在于，当你声明某些常量时，其值在将来不能改变（初始化也应该使用值，而不是操作）。尽管如此，当你声明一个变量时，你可以使用`tf.assign()`方法在将来改变它的值（初始化可以通过值或操作实现）。
- en: 'The main way to create a variable is by using the `Variable()` function , which
    takes a tensor as an input and outputs a variable. This is the declaration, and
    we still need to initialize the variable. Initializing is what puts the variable
    with the corresponding methods on the computational graph. Here is an example
    of creating and initializing a variable:'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 创建变量的主要方式是使用`Variable()`函数，它接受一个张量作为输入并输出一个变量。这是声明，我们还需要初始化变量。初始化是将变量及其相应的方法放置在计算图上的过程。以下是一个创建和初始化变量的示例：
- en: '[PRE6]'
  id: totrans-409
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Placeholders are just holding the position for data to be fed into the graph.
    Placeholders get data from a `feed_dict` argument in the session. To put a placeholder
    in the graph, we must perform at least one operation on the placeholder. We initialize
    the graph, declare x to be a placeholder, and define y as the identity operation
    on x, which just returns x. We then create data to feed into the x placeholder
    and run the identity operation. It is worth noting that TensorFlow will not return
    a self-referenced placeholder in the feed dictionary. The code is shown here and
    the resulting graph is shown in the next section:'
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 占位符只是为要输入图中的数据保留位置。占位符从会话中的`feed_dict`参数获取数据。为了在图中放置占位符，我们必须在占位符上执行至少一个操作。我们初始化图，声明x为占位符，并将y定义为对x的恒等操作，它只是返回x。然后我们创建数据以输入到x占位符中，并运行恒等操作。值得注意的是，TensorFlow不会在feed字典中返回自引用的占位符。代码如下，结果图将在下一节中展示：
- en: '[PRE7]'
  id: totrans-411
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We can see what the code looks like in detail with just one variable, initialized
    to all zeros. The gray shaded region is a very detailed view of the operations
    and constants involved. The main computational graph with less detail is the smaller
    graph outside of the gray region in the upper right corner. For more details on
    creating and visualizing graphs. Note that TensorFlow will not return a self-refernced
    placeholder in the feed dictionary. In technical speech, running `sess.run(x,
    feed_dict={x: x_vals})` in the following graph will return an error .'
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: '我们可以通过一个变量来详细查看代码，该变量初始化为全零。灰色阴影区域是涉及的操作和常数的非常详细视图。主要计算图细节较少，是灰色区域右上角较小的图形。有关创建和可视化图的更多详细信息。请注意，TensorFlow不会在feed字典中返回自引用占位符。在技术术语中，在以下图中运行`sess.run(x,
    feed_dict={x: x_vals})`将返回错误。'
- en: Gradient-Descent Optimization Methods from a Deep-Learning Perspective
  id: totrans-413
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从深度学习视角看梯度下降优化方法
- en: We think that before diving into the TensorFlow optimizers, which is a very
    important topic, it’s also important to understand a few key points regarding
    full-batch gradient descent and stochastic gradient descent, including their drawbacks.
    That is so that one can know and understand the need to compare and choose from
    variants of these optimizers.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 我们认为，在深入研究TensorFlow优化器之前，这是一个非常重要的主题，了解关于全批量梯度下降和随机梯度下降的一些关键点也很重要，包括它们的缺点。这样，人们就可以了解和了解比较和选择这些优化器变体需求的原因。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig27_HTML.jpg](Images/484548_1_En_9_Fig27_HTML.jpg)'
  id: totrans-415
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig27_HTML.jpg](Images/484548_1_En_9_Fig27_HTML.jpg)'
- en: Figure 9-27
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-27
- en: The difference between many cost functions
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 许多成本函数之间的差异
- en: The cost function for a linear neuron with a least square error is quadratic
    (Figure [9-27](#Fig27)). When the cost function is quadratic, the direction of
    the gradient resulting from the full-batch gradient-descent method gives the best
    direction for cost reduction in a linear sense, but it doesn’t point to the minimum
    unless the different elliptical contours of the cost function are circles. In
    cases of long elliptical contours, the gradient components might be large in directions
    where less change is required and small in directions where more change is required
    to move to the minimum point.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 线性神经元的最小二乘误差成本函数是二次的（见图 [9-27](#Fig27)）。当成本函数是二次的时，全批量梯度下降法产生的梯度方向在线性意义上给出了成本减少的最佳方向，但除非成本函数的不同椭圆轮廓是圆形，否则它并不指向最小值。在长椭圆轮廓的情况下，梯度分量可能在需要较小变化的方向上很大，而在需要较大变化才能移动到最小点的方向上很小。
- en: The problem with this condition is that if we take small steps by making the
    learning rate small, the gradient descent would take a while to converge, whereas
    if we were to use a big learning rate, the gradients would change direction rapidly
    in directions where the cost function had curvature, leading to oscillations.
    The cost function for a multilayer neural network is not quadratic but rather
    is mostly a smooth function. Locally, such nonquadratic cost functions can be
    approximated by quadratic functions, and so the problems of gradient descent inherent
    to elliptical contours still prevail for nonquadratic cost functions.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 这个条件的问题在于，如果我们通过减小学习率来采取小步长，梯度下降将需要一段时间才能收敛，而如果我们使用大学习率，梯度会在成本函数曲率的方向上迅速改变方向，导致振荡。多层神经网络的成本函数不是二次的，而主要是平滑函数。局部上，这些非二次成本函数可以通过二次函数近似，因此梯度下降固有的椭圆轮廓问题仍然存在于非二次成本函数中。
- en: The best way to get around this problem is to take larger steps in those directions
    in which the gradients are small but consistent, and take smaller steps in those
    directions that have big but inconsistent gradients. This can be achieved if,
    instead of having a fixed learning rate for all dimensions, we have a separate
    learning rate for each dimension.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这个问题的最佳方法是在梯度较小但一致的方向上采取更大的步长，在梯度大但方向不一致的方向上采取较小的步长。如果我们对每个维度都有一个单独的学习率，而不是对所有维度都有一个固定的学习率，就可以实现这一点。
- en: Another big problem with neural networks is that the cost functions are mostly
    nonconvex, so the gradient-descent method might get stuck at local minimum points,
    leading to a suboptimal solution.
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络另一个大问题是成本函数大多是非凸的，因此梯度下降法可能会陷入局部最小值点，导致次优解。
- en: Note
  id: totrans-422
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The nonconvex nature of the neural network is the result of the hidden layer
    units that have nonlinear activation functions, such as sigmoid.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络的非凸性质是隐藏层单元具有非线性激活函数的结果，例如sigmoid函数。
- en: Full-batch gradient descent uses the full dataset for the gradient computation.
    While this is good for convex cost surfaces, it has its own problems in cases
    of nonconvex cost functions. For nonconvex cost surfaces with full-batch gradients,
    the model is going to end up with the minima in its basin of attraction. If the
    initialized parameters are in the basin of attraction of a local minimum that
    doesn’t provide good generalization, a full-batch gradient would give a suboptimal
    solution.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 全批量梯度下降法使用整个数据集进行梯度计算。虽然这对于凸成本表面来说很好，但在非凸成本函数的情况下，它有自己的问题。对于具有全批量梯度的非凸成本表面，模型最终会在其吸引域的极小值处结束。如果初始化的参数位于一个局部最小值的吸引域中，而这个局部最小值不能提供良好的泛化，那么全批量梯度将给出次优解。
- en: With stochastic gradient descent, the noisy gradients computed may force the
    model out of the basin of attraction of the bad local minima—one that doesn’t
    provide good generalization—and place it in a more optimal region. Stochastic
    gradient descent with single data points produces very random and noisy gradients.
    Gradients with mini-batches tend to produce much more stable estimates of gradients
    when compared with gradients of single data points, but they are still noisier
    than those produced by the full batches.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 使用随机梯度下降，计算出的噪声梯度可能会迫使模型脱离不良局部最小值的吸引域——那种不能提供良好泛化的最小值——并将其放置在一个更优的区域。使用单个数据点的随机梯度下降会产生非常随机和噪声的梯度。与单个数据点的梯度相比，使用小批量数据的梯度通常会产生更稳定的梯度估计，但它们仍然比全批量产生的梯度更噪声。
- en: Ideally, the mini-batch size should be carefully chosen such that the gradients
    are noisy enough to avoid or escape bad local minima points but stable enough
    to converge at global minima or a local minimum that provides good generalization.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，小批量的大小应该仔细选择，使得梯度足够噪声以避免或逃离不良局部最小值点，但同时又足够稳定以收敛到全局最小值或提供良好泛化的局部最小值。
- en: In Figure [9-28](#Fig28), the dotted arrows correspond to the path taken by
    stochastic gradient descent (SGD) , while the continuous arrows correspond to
    the path taken by full-batch gradient descent. Full-batch gradient descent computes
    the actual gradient at a point, and if it is in the basin of attraction of a poor
    local minimum, gradient descent almost certainly ensures that the local minima
    L is reached. However, in the case of stochastic gradient descent, because the
    gradient is based on only a portion of the data and not on the full batch, the
    gradient direction is only a rough estimate. Since the noisy rough estimate doesn’t
    always point to the actual gradient at point C, stochastic gradient descent may
    escape the basin of attraction of the local minima and fortunately land in the
    basin of a global minima. Stochastic gradient descent may escape the global minima
    basin of attraction too, but generally if the basin of attraction is large and
    the mini-batch size is carefully chosen so that the gradients it produces are
    moderately noisy, stochastic gradient descent is most likely to reach the global
    minima G (as in this case) or some other optimal minima that has a large basin
    of attraction. For nonconvex optimization, there are other heuristics as well,
    such as momentum, which when adopted along with stochastic gradient descent increases
    the chances of the SGD’s avoiding shallow local minima. Momentum generally keeps
    track of the previous gradients through the velocity component. So, if the gradients
    are steadily pointing toward a good local minimum that has a large basin of attraction,
    the velocity component would be high in the direction of the good local minimum.
    If the new gradient is noisy and points toward a bad local minimum, the velocity
    component would provide momentum to continue in the same direction and not get
    influenced by the new gradient too much.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [9-28](#Fig28) 中，虚线箭头对应随机梯度下降（SGD）所走的路径，而实线箭头对应全批量梯度下降所走的路径。全批量梯度下降在一点计算实际梯度，如果它位于一个较差的局部最小值吸引域内，梯度下降几乎可以确保达到局部最小值
    L。然而，在随机梯度下降的情况下，因为梯度仅基于数据的一部分而不是整个批量，所以梯度方向只是一个粗略的估计。由于这个粗略的估计并不总是指向点 C 的实际梯度，随机梯度下降可能会逃离局部最小值的吸引域，并且幸运地落在全局最小值的吸引域中。随机梯度下降也可能逃离全局最小值的吸引域，但通常如果吸引域很大，并且仔细选择小批量大小，使得它产生的梯度适度噪声，随机梯度下降最有可能达到全局最小值
    G（如本例所示）或具有大吸引域的其他最优最小值。对于非凸优化，还有其他启发式方法，例如动量，当与随机梯度下降结合使用时，可以增加 SGD 避免浅局部最小值的机会。动量通常通过速度分量跟踪之前的梯度。因此，如果梯度持续指向一个具有大吸引域的良好局部最小值，则速度分量会在良好局部最小值的方向上很高。如果新的梯度是噪声的，并指向一个较差的局部最小值，则速度分量会提供动量以继续在同一方向上前进，并且不会过多地受到新梯度的影响。
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig28_HTML.jpg](Images/484548_1_En_9_Fig28_HTML.jpg)'
  id: totrans-428
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig28_HTML.jpg](Images/484548_1_En_9_Fig28_HTML.jpg)'
- en: Figure 9-28
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 图 9-28
- en: The steps of SGD algorithms
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 随机梯度下降（SGD）算法的步骤
- en: Another impediment to optimizing nonconvex cost functions is the presence of
    saddle points. The number of saddle points increases exponentially with the dimensionality
    increase of the parameter space of a cost function. Saddle points are stationary
    points (i.e., points where the gradient is zero) but are neither a local minimum
    nor a local maximum point. Since the saddle points are associated with a long
    plateau of points with the same cost as that of the saddle point, the gradient
    in the plateau region is either zero or very close to zero. Because of this near-zero
    gradient in all directions, gradient-based optimizers have a hard time coming
    out of these saddle points. Mathematically, to determine whether a point is a
    saddle point, the Eigenvalues of the Hessian matrix of the cost function must
    be computed at the given point. If there are both positive and negative Eigenvalues,
    then it is a saddle point.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个优化非凸成本函数的障碍是鞍点的存在。鞍点的数量随着成本函数参数空间维度的增加而指数增长。鞍点是驻点（即梯度为零的点），但既不是局部最小值也不是局部最大值点。由于鞍点与具有与鞍点相同成本的点的长平台相关联，平台区域的梯度要么为零，要么非常接近零。由于所有方向上几乎为零的梯度，基于梯度的优化器很难从这些鞍点中出来。从数学上讲，为了确定一个点是否是鞍点，必须在给定点计算成本函数的海森矩阵的特征值。如果有正负特征值，则它是一个鞍点。
- en: Learning Rate in the Mini-batch Approach to Stochastic Gradient Descent
  id: totrans-432
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在小批量随机梯度下降法中的学习率
- en: 'When there is high redundancy in the dataset, the gradient computed on a mini-batch
    of data points is almost the same as the gradient computed on the whole dataset,
    provided the mini-batch is a good representation of the entire dataset. In such
    cases, computing the gradient on the whole dataset can be avoided, and instead
    the gradient on the mini-batch of data points can be used as the approximate gradient
    for the whole dataset. This is the mini-batch approach to gradient descent, which
    is also called mini-batch stochastic gradient descent. When, instead of using
    a mini-batch, the gradients are approximated by one data point, it is called online
    learning or stochastic gradient descent. However, it is always better to use the
    mini-batch version of stochastic gradient descent over online learning, since
    the gradients for the mini-batch method are less noisy compared with the online
    mode of learning. Learning rate plays a vital role in the convergence of mini-batch
    stochastic gradient descent. The following approach tends to provide good convergence:'
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 当数据集中存在高度冗余时，对数据点的迷你批量计算出的梯度几乎与对整个数据集计算出的梯度相同，前提是迷你批量是整个数据集的良好表示。在这种情况下，可以避免对整个数据集计算梯度，而是可以使用数据点的迷你批量梯度作为整个数据集的近似梯度。这是梯度下降的迷你批量方法，也称为迷你批量随机梯度下降。当不使用迷你批量，而是用一个数据点来近似梯度时，它被称为在线学习或随机梯度下降。然而，与在线学习模式相比，总是最好使用随机梯度下降的迷你批量版本，因为与在线学习模式相比，迷你批量方法的梯度噪声更少。学习率在迷你批量随机梯度下降的收敛中起着至关重要的作用。以下方法往往能提供良好的收敛：
- en: Start with an initial learning rate.
  id: totrans-434
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个初始学习率开始。
- en: Increase the learning rate if the error reduces.
  id: totrans-435
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果错误减少，则增加学习率。
- en: Decrease the learning rate if the error increases.
  id: totrans-436
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果错误增加，则降低学习率。
- en: Stop the learning process if the error ceases to reduce.
  id: totrans-437
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果错误不再减少，则停止学习过程。
- en: Summary
  id: totrans-438
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: As we will see in the next section, the different optimizers adopt an adaptive
    learning-rate approach in their implementations.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们将在下一节中看到的，不同的优化器在其实现中采用自适应学习率方法。
- en: 10. Improving Deep Neural Networks
  id: totrans-440
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 10. 改进深度神经网络
- en: Optimizers in TensorFlow
  id: totrans-441
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 中的优化器
- en: We’re still on the subject of gradient descent. But let’s now talk about gradient
    optimization, because of its importance to gradient descent. It is an optimization
    method for finding the minimum of a function, and it’s important in deep learning.
    It works to update the weights of the neural network through backpropagation.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 我们仍然在梯度下降的主题上。但现在让我们谈谈梯度优化，因为它对梯度下降的重要性。它是一种寻找函数最小值的优化方法，在深度学习中非常重要。它通过反向传播来更新神经网络的权重。
- en: 'So what are the optimizations of the types of gradient descent we talked about
    previously (batch, mini-batch, and stochastic)? Let’s start by talking about the
    benefits of these optimization methods:'
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们之前讨论的梯度下降类型（批量、小批量、随机）的优化是什么？让我们先谈谈这些优化方法的好处：
- en: Modifying the learning rate component, α
  id: totrans-444
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 修改学习率组件，α
- en: Modifying the gradient component, ∂L/∂w
  id: totrans-445
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 修改梯度组件，∂L/∂w
- en: Modifying both (α, and ∂L/∂w)
  id: totrans-446
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 修改（α 和 ∂L/∂w）两者
- en: We mention ∂L/∂w as a function of the gradient (wnew=w- α ∂L/∂w). This is the
    equation that optimizers try to optimize. To start, I think every optimizer is
    an optimizer of the optimizer. That’s a very weird phrase but it's true, for example,
    Adadelta and RMSprop are optimizers of Adagrad. Let’s see an image that may help
    show the connections between all optimizers (Figure [10-1](#Fig1)).
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将 ∂L/∂w 作为梯度的函数（wnew=w- α ∂L/∂w）来提及。这是优化器试图优化的方程。首先，我认为每个优化器都是优化器的优化器。这是一个非常奇怪的短语，但却是真的，例如，Adadelta
    和 RMSprop 是 Adagrad 的优化器。让我们看一张可能有助于展示所有优化器之间联系的图片（图 [10-1](#Fig1)）。
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig1_HTML.jpg](Images/484548_1_En_10_Fig1_HTML.jpg)'
  id: totrans-448
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig1_HTML.jpg](Images/484548_1_En_10_Fig1_HTML.jpg)'
- en: Figure 10-1
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-1
- en: The optimizers tree
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 优化器树
- en: The most used type of optimizer in deep learning is mini-batch. We talked before
    about why it’s the most used, so let’s now get into the adaptive learning rate
    algorithms, Nesterov accelerated gradient (NAG) and momentum, and adaptive learning
    methods.
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 在深度学习中，最常用的优化器类型是小批量。我们之前已经讨论过为什么它是最常用的，现在让我们深入了解自适应学习率算法，如 Nesterov 加速梯度（NAG）和动量，以及自适应学习方法。
- en: 'Usage:'
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 用法：
- en: '[PRE8]'
  id: totrans-453
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The Notation to Use
  id: totrans-454
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用的符号
- en: '*t -> is for time step*'
  id: totrans-455
  prefs: []
  type: TYPE_NORMAL
  zh: '*t -> 表示时间步*'
- en: '*w -> weight/parameter which we want to update*'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: '*w -> 我们想要更新的权重/参数*'
- en: '*α -> learning rate*'
  id: totrans-457
  prefs: []
  type: TYPE_NORMAL
  zh: '*α -> 学习率*'
- en: ∂L/∂w -> gradient of L, the loss function to minimize
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: ∂L/∂w -> L的梯度，要最小化的损失函数
- en: Momentum
  id: totrans-459
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动量
- en: 'This gradient optimizer has a variable that makes the gradient converge very
    fast, as it does not depend only on the current gradient to update the weight.
    Gradient descent with momentum replaces the current gradient with *V* (which stands
    for velocity), the exponential moving average of current and past gradients. Momentum-based
    methods introduce a component called velocity *V* that dampens the parameter update
    when the gradient computed changes sign, whereas it accelerates the parameter
    update when the gradient is in the same direction of velocity. This introduces
    faster convergence as well as fewer oscillations around the global minima, or
    around a local minimum that provides good generalization. The update rule for
    momentum-based optimizers is as follows:'
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 这种梯度优化器有一个变量，它使梯度非常快地收敛，因为它不仅依赖于当前梯度来更新权重。具有动量的梯度下降用 *V*（代表速度）替换当前梯度，即当前和过去梯度的指数移动平均值。基于动量的方法引入了一个称为速度
    *V* 的分量，当计算的梯度改变符号时，它会抑制参数更新，而当梯度与速度方向相同时，它会加速参数更新。这引入了更快的收敛速度以及围绕全局最小值或提供良好泛化的局部最小值的更少振荡。基于动量的优化器的更新规则如下：
- en: '![$$ {\displaystyle \begin{array}{l}{w}_{t+1}={w}_t-\alpha {V}_t\\ {}{V}_t=\beta
    {V}_{t-1}+\left(1-\beta \right)\frac{\partial L}{\partial {w}_t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq1.png)'
  id: totrans-461
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}{w}_{t+1}={w}_t-\alpha {V}_t\\ {}{V}_t=\beta
    {V}_{t-1}+\left(1-\beta \right)\frac{\partial L}{\partial {w}_t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq1.png)'
- en: Default value β = 0.9, where α is the momentum parameter and η is the learning
    rate. The terms ![$$ {v}_i^t $$](Images/484548_1_En_10_Chapter_TeX_IEq2.png) and
    ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq3.png) represent the
    velocity at iterations *t* and (*t* + 1), respectively, for the *i*^(*th*) parameter.
    Similarly, ![$$ {v}_i^t $$](Images/484548_1_En_10_Chapter_TeX_IEq4.png) and ![$$
    {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq5.png) represent the weight
    of the ith parameter at iterations *t* and (*t* + 1), respectively, when the cost
    function reaches the local minimum. When we use gradient descent, the parameters
    are stopped updating and in this local minimum, but when we use the momentum we
    will see that the parameters don’t stop updating. For example, the velocity is
    still updating because it can’t be a zero value. The prior velocity would drive
    the algorithm out of the local minima, considering the local minima has a small
    basin of attraction. The velocity or the momentum of gradient descent would be
    in that direction, as ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq6.png)
    would be nonzero because of the nonzero velocity from prior gradients. Also, if
    the prior gradients consistently pointed toward a global minimum or a local minimum
    with good generalization and a reasonably large basin of attraction, the velocity
    or the momentum of gradient descent would be in that direction. So, even if there
    were a bad local minimum with a small basin of attraction, the momentum component
    would not only drive the algorithm out of the bad local minima but also would
    continue the gradient descent toward the global minima or the good local minima.
  id: totrans-462
  prefs: []
  type: TYPE_NORMAL
  zh: 默认值 β = 0.9，其中 α 是动量参数，η 是学习率。术语 ![$$ {v}_i^t $$](Images/484548_1_En_10_Chapter_TeX_IEq2.png)
    和 ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq3.png) 分别代表第 *i* 个参数在迭代
    *t* 和 (*t* + 1) 时的速度。同样，![$$ {v}_i^t $$](Images/484548_1_En_10_Chapter_TeX_IEq4.png)
    和 ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq5.png) 分别代表当损失函数达到局部最小值时，第
    *i* 个参数在迭代 *t* 和 (*t* + 1) 时的权重。当我们使用梯度下降时，参数停止更新，并在这个局部最小值处，但当我们使用动量时，我们会看到参数不会停止更新。例如，速度仍在更新，因为它不能是零值。先前的速度会将算法驱出局部最小值，考虑到局部最小值有一个小的吸引域。梯度下降的速度或动量会朝那个方向，因为
    ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq6.png) 由于先前梯度的非零速度而不为零。此外，如果先前的梯度始终指向全局最小值或具有良好泛化能力和合理大吸引域的局部最小值，梯度下降的速度或动量也会朝那个方向。因此，即使存在一个具有小吸引域的坏局部最小值，动量分量不仅会驱使算法跳出坏局部最小值，还会继续梯度下降以趋向全局最小值或好的局部最小值。
- en: 'Usage:'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: '[PRE9]'
  id: totrans-464
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Nesterov Accelerated Gradient
  id: totrans-465
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Nesterov 加速梯度
- en: After momentum had gained in popularity, a similar update was implemented using
    Nesterov accelerated gradient (NAG; Sutskever et al., 2013). This update utilizes
    *V*, the exponential moving average of what I would call projected gradients.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 在动量变得流行之后，使用Nesterov加速梯度（NAG；Sutskever等，2013）实现了类似的更新。这个更新利用了V，即我称之为投影梯度的指数移动平均。
- en: '![$$ {\displaystyle \begin{array}{l}{w}_{t+1}={w}_t-\alpha {V}_t\\ {}{V}_t=\beta
    {V}_{t-1}+\left(1-\beta \right)\frac{\partial L}{\partial {w}^{\ast }}\end{array}}
    $$](Images/484548_1_En_10_Chapter_TeX_IEq7.png)'
  id: totrans-467
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}{w}_{t+1}={w}_t-\alpha {V}_t\\ {}{V}_t=\beta
    {V}_{t-1}+\left(1-\beta \right)\frac{\partial L}{\partial {w}^{\ast }}\end{array}}
    $$](Images/484548_1_En_10_Chapter_TeX_IEq7.png)'
- en: 'The last term in the second equation is a projected gradient. This value can
    be obtained by going **one step ahead** using the previous velocity. This means
    that for this time step *t*, we have to carry out another forward propagation
    before we can finally execute the backpropagation. Here’s how it goes:'
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个方程的最后一个项是一个投影梯度。这个值可以通过使用前一个速度向前**一步**来获得。这意味着对于这个时间步t，我们必须在最终执行反向传播之前执行另一个前向传播。以下是具体步骤：
- en: Update the current weight w to a projected weight w^∗ using the previous velocity.
  id: totrans-469
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用前一个速度将当前权重w更新为投影权重w^∗。
- en: '*w*^∗ = *w*[*t*] − *αV*[*t* − 1]'
  id: totrans-470
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*w*^∗ = *w*[*t*] − *αV*[*t* − 1]'
- en: Carry out forward propagation, but using this projected weight.
  id: totrans-471
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行前向传播，但使用这个投影权重。
- en: Obtain the projected gradient ∂L/∂w^∗.
  id: totrans-472
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 获得投影梯度 ∂L/∂w^∗。
- en: Compute V and w accordingly.
  id: totrans-473
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 依次计算V和w。
- en: Note
  id: totrans-474
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The original Nesterov accelerated gradient paper (Nesterov, 1983) was not about
    stochastic gradient descent and did not explicitly use the gradient descent equation.
    Hence, a more appropriate reference is the aforementioned publication by Sutskever
    et al. in 2013, which described NAG’s application in stochastic gradient descent.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 原始的Nesterov加速梯度论文（Nesterov，1983）并不是关于随机梯度下降的，也没有明确使用梯度下降方程。因此，一个更合适的参考文献是Sutskever等人在2013年发表的上文，其中描述了NAG在随机梯度下降中的应用。
- en: Adagrad
  id: totrans-476
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Adagrad
- en: Adaptive gradient (Adagrad) is mostly like gradient descent but with some modifications.
    Instead of having a global learning rate, the learning rate is normalized for
    each dimension on which the cost function is dependent. The learning rate in each
    iteration is the global learning rate divided by the l2 norm of the prior gradients
    up to the current iteration for each dimension. It works on the learning rate
    component by dividing the learning rate by the square root of S, which is the
    cumulative sum of current and past squared gradients.
  id: totrans-477
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应梯度（Adagrad）与梯度下降类似，但有一些修改。它不是使用全局学习率，而是对成本函数依赖的每个维度进行归一化。每个迭代的学习率是全球学习率除以当前迭代每个维度的先前梯度的l2范数。它通过将学习率除以S的平方根来作用于学习率组件，S是当前和过去平方梯度的累积和。
- en: Sometimes sparse features that don’t show up much in the data can be very useful
    to an optimization problem. However, with basic gradient descent or stochastic
    gradient descent, the learning rate gives equal importance to all the features
    in each iteration. Since the learning rate is the same, the overall contribution
    of nonsparse features would be much more than that of sparse features. Hence,
    we end up losing critical information from the sparse features. With Adagrad,
    each parameter is updated with a different learning rate.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，在数据中不太显现的稀疏特征对优化问题非常有用。然而，在基本的梯度下降或随机梯度下降中，学习率在每次迭代中对所有特征给予同等的重要性。由于学习率相同，非稀疏特征的整体贡献将远大于稀疏特征。因此，我们最终会丢失稀疏特征中的关键信息。在Adagrad中，每个参数都使用不同的学习率进行更新。
- en: 'The sparser the feature is, the higher its parameter update would be in an
    iteration . This is because for sparse features the quantity would be less and
    the overall learning rate would be high. It may be a very good use in NLP or image
    processing because of data sparsity. Let’s see the equation that makes what we’re
    saying sensible: S is initialized by 0.'
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 特征越稀疏，在迭代中其参数更新就越高。这是因为对于稀疏特征，这个量会更少，整体学习率会更高。由于数据稀疏性，这可能在NLP或图像处理中是一个非常好的应用。让我们看看使我们的说法有意义的方程：S被初始化为0。
- en: '![$$ {S}_t={S}_{t-1}+{\left[\frac{\partial L}{\partial wt}\right]}^2 $$](Images/484548_1_En_10_Chapter_TeX_IEq8.png)'
  id: totrans-480
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {S}_t={S}_{t-1}+{\left[\frac{\partial L}{\partial wt}\right]}^2 $$](Images/484548_1_En_10_Chapter_TeX_IEq8.png)'
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{S_t+\in }}\cdot \frac{\partial L}{\partial
    {w}_t} $$](Images/484548_1_En_10_Chapter_TeX_IEq9.png)'
  id: totrans-481
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_10_Chapter_TeX_IEq9.png)'
- en: So, we note in this section that we try to adapt the learning rate to get the
    minima of cost function, one of the main reasons for creating these optimizations.
    Instead of a common learning rate for all parameters, we want to have separate
    learning rate for each. So Adagrad keeps the sum of squares of parameter-wise
    gradients and modifies individual learning rates using this. As a result, parameters
    occurring more often have smaller gradients.
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在本节中，我们注意到我们试图调整学习率以获得成本函数的最小值，这是创建这些优化方法的主要原因之一。我们不想为所有参数使用一个共同的学习率，而是希望为每个参数设置一个单独的学习率。因此，Adagrad通过保持参数梯度的平方和来修改个别学习率。结果，出现频率较高的参数具有较小的梯度。
- en: Adadelta
  id: totrans-483
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Adadelta
- en: Adadelta is an extension of Adagrad and it also tries to lessen Adagrad’s aggressive,
    monotonically reducing of the learning rate, it also focuses on the learning rate
    component. Adadelta is probably short for **“adaptive delta,”** where delta here
    refers to the difference between the current weight and the newly updated weight.
    In Adadelta we do not need to set the default learning rate, as we take the ratio
    of the running average of the previous time steps to the current gradient.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: Adadelta是Adagrad的扩展，它也试图减轻Adagrad的激进、单调降低学习率的特性，它还专注于学习率分量。Adadelta可能代表“自适应delta”，这里的delta指的是当前权重和更新后的新权重之间的差异。在Adadelta中，我们不需要设置默认的学习率，因为我们取前一时间步的运行平均与当前梯度的比率。
- en: '![$$ {\displaystyle \begin{array}{l}{D}_t=\beta {D}_{t-1}+\left(1-\beta \right){\left[\varDelta
    {w}_t\right]}^2\\ {}{S}_t=\beta {S}_{t-1}+\left(1-\beta \right){\left[\frac{\partial
    L}{\partial wt}\right]}^2\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq10.png)'
  id: totrans-485
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_10_Chapter_TeX_IEq10.png)'
- en: '![$$ {w}_{t+1}={w}_t-\frac{\sqrt{D_{t-1}+\in }}{\sqrt{S_t+\in }}\cdot \frac{\partial
    L}{\partial {w}_t} $$](Images/484548_1_En_10_Chapter_TeX_IEq11.png)'
  id: totrans-486
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_10_Chapter_TeX_IEq11.png)'
- en: 'Usage:'
  id: totrans-487
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: '[PRE10]'
  id: totrans-488
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: where decay represents α, epsilon represents ε, and η represents the learning
    rate.
  id: totrans-489
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，衰减代表α，epsilon代表ε，η代表学习率。
- en: RMSprop
  id: totrans-490
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RMSprop
- en: Root mean square prop or RMSprop (Hinton et al., 2012) is another adaptive learning
    rate that is an improvement of Adagrad. Instead of taking the cumulative sum of
    squared gradients like in Adagrad, we take the exponential moving average of these
    gradients.
  id: totrans-491
  prefs: []
  type: TYPE_NORMAL
  zh: 根均方误差或RMSprop（Hinton等人，2012）是另一种自适应学习率，它是Adagrad的改进。与Adagrad中累积平方梯度的总和不同，我们取这些梯度的指数移动平均。
- en: '![$$ {S}_t=\beta {S}_{t-1}+\left(1-\beta \right){\left[\frac{\partial L}{\partial
    wt}\right]}^2 $$](Images/484548_1_En_10_Chapter_TeX_IEq12.png)'
  id: totrans-492
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_10_Chapter_TeX_IEq12.png)'
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{S_t+\in }}\cdot \frac{\partial L}{\partial
    {w}_t} $$](Images/484548_1_En_10_Chapter_TeX_IEq13.png)'
  id: totrans-493
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_10_Chapter_TeX_IEq13.png)'
- en: Taking an overall view, we will see that RMSprop is mostly like Adadelta but
    it has one difference. The difference between Adadelta and RMSprop is that Adadelta
    removes the use of the learning rate parameter completely by replacing it with
    D, the exponential moving average of squared deltas.
  id: totrans-494
  prefs: []
  type: TYPE_NORMAL
  zh: 从整体来看，我们将看到RMSprop与Adadelta非常相似，但它有一个区别。Adadelta和RMSprop之间的区别在于，Adadelta通过用D（平方delta的指数移动平均）替换学习率参数，完全取消了学习率参数的使用。
- en: 'Usage:'
  id: totrans-495
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：
- en: '[PRE11]'
  id: totrans-496
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Adam
  id: totrans-497
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Adam
- en: Adaptive moment estimation , or Adam (Kingma & Ba, 2014), is a combination of
    momentum and RMSprop. It acts upon the gradient component by using V, the exponential
    moving average of gradients (like in momentum) and the learning rate component
    by dividing the learning rate α by the square root of S, the exponential moving
    average of squared gradients (like in RMSprop).
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 自适应矩估计，或Adam（Kingma & Ba，2014），是动量和RMSprop的结合。它通过使用V（梯度指数移动平均，类似于动量）和通过将学习率α除以平方梯度的指数移动平均S（类似于RMSprop）来作用于梯度分量和学习率分量。
- en: '![$$ {\displaystyle \begin{array}{l}{\hat{V}}_t=\frac{V_t}{1-{\beta}_1^t}\\
    {}{\hat{S}}_t=\frac{S_t}{1-{\beta}_2^t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq14.png)'
  id: totrans-499
  prefs: []
  type: TYPE_IMG
  zh: '![公式](Images/484548_1_En_10_Chapter_TeX_IEq14.png)'
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{{\hat{S}}_t+\in }}\cdot {\hat{V}}_t
    $$](Images/484548_1_En_10_Chapter_TeX_IEq15.png)'
  id: totrans-500
  prefs: []
  type: TYPE_IMG
  zh: '![此处插入图片描述](Images/484548_1_En_10_Chapter_TeX_IEq15.png)'
- en: Note
  id: totrans-501
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: The ^ terms are actually bias-corrected averages to ensure that the values are
    not biased toward 0.
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: ^ 符号实际上是偏差校正的平均值，以确保值不会偏向 0。
- en: 'Proposed default values by the authors :'
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提出的默认值：
- en: 𝛼 = 0.001
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 𝛼 = 0.001
- en: 𝛽[1] = 0.9
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 𝛽[1] = 0.9
- en: 𝛽[2] = 0.999
  id: totrans-506
  prefs: []
  type: TYPE_NORMAL
  zh: 𝛽[2] = 0.999
- en: 𝜀 = 10^(-8)
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 𝜀 = 10^(-8)
- en: Adam is computationally efficient and has very little memory requirements. The
    Adam optimizer is one of the most popular gradient descent optimization algorithms.
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: Adam 优化器计算效率高，内存需求非常小。Adam 优化器是最受欢迎的梯度下降优化算法之一。
- en: 'Usage:'
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 用法：
- en: '[PRE12]'
  id: totrans-510
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Nadam (Adam + NAG)
  id: totrans-511
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Nadam（Adam + NAG）
- en: 'Nadam is employed for noisy gradients or gradients with high curvatures. The
    learning process is accelerated by summing up the exponential decay of the moving
    averages for the previous and current gradient, Nadam makes use of Nesterov to
    update the gradient one step ahead by replacing the previous ![$$ \hat{V} $$](Images/484548_1_En_10_Chapter_TeX_IEq16.png)
    in the earlier equation with the current ![$$ \hat{V} $$](Images/484548_1_En_10_Chapter_TeX_IEq17.png):'
  id: totrans-512
  prefs: []
  type: TYPE_NORMAL
  zh: Nadam 用于噪声梯度或高曲率梯度。通过累加先前和当前梯度的指数衰减移动平均值来加速学习过程，Nadam 利用 Nesterov 通过将早期方程中的先前![此处插入图片描述](Images/484548_1_En_10_Chapter_TeX_IEq16.png)替换为当前![此处插入图片描述](Images/484548_1_En_10_Chapter_TeX_IEq17.png)来提前更新梯度：
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{{\hat{S}}_t+\in }}\left({\beta}_1{\hat{V}}_t+\frac{1-{\beta}_1}{1-{\beta}_1^t}\cdot
    \frac{\partial L}{\partial {w}_t}\right) $$](Images/484548_1_En_10_Chapter_TeX_IEq18.png)'
  id: totrans-513
  prefs: []
  type: TYPE_IMG
  zh: '![此处插入图片描述](Images/484548_1_En_10_Chapter_TeX_IEq18.png)'
- en: Where
  id: totrans-514
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '![$$ {\displaystyle \begin{array}{l}{\hat{V}}_t=\frac{V_t}{1-{\beta}_1^t}\\
    {}{\hat{S}}_t=\frac{S_t}{1-{\beta}_2^t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq19.png)'
  id: totrans-515
  prefs: []
  type: TYPE_IMG
  zh: '![此处插入图片描述](Images/484548_1_En_10_Chapter_TeX_IEq19.png)'
- en: Where
  id: totrans-516
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '![$$ {\displaystyle \begin{array}{l}{V}_t={\beta}_1{V}_{t-1}+\left(1-{\beta}_1\right)\frac{\partial
    L}{\partial {w}_t}\\ {}{S}_t={\beta}_2{V}_{t-1}+\left(1-{\beta}_2\right){\left[\frac{\partial
    L}{\partial {w}_t}\right]}^2\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq20.png)'
  id: totrans-517
  prefs: []
  type: TYPE_IMG
  zh: '![此处插入图片描述](Images/484548_1_En_10_Chapter_TeX_IEq20.png)'
- en: 'Default values (taken from Keras):'
  id: totrans-518
  prefs: []
  type: TYPE_NORMAL
  zh: '默认值（来自 Keras）:'
- en: α = 0.002
  id: totrans-519
  prefs: []
  type: TYPE_NORMAL
  zh: α = 0.002
- en: β[1] = 0.9
  id: totrans-520
  prefs: []
  type: TYPE_NORMAL
  zh: β[1] = 0.9
- en: β[2] = 0.999
  id: totrans-521
  prefs: []
  type: TYPE_NORMAL
  zh: β[2] = 0.999
- en: ε = 10^(-7)
  id: totrans-522
  prefs: []
  type: TYPE_NORMAL
  zh: ε = 10^(-7)
- en: 'Usage:'
  id: totrans-523
  prefs: []
  type: TYPE_NORMAL
  zh: 用法：
- en: '[PRE13]'
  id: totrans-524
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Choosing the Learning Rate
  id: totrans-525
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择学习率
- en: Choosing the hyperparameters learning rate is one of the hyperparameters. Deep
    learning neural networks are trained using the stochastic gradient descent and
    mini-batch algorithms. So, stochastic gradient descent is an optimization algorithm
    that estimates the error gradient for the current state of the model, using examples
    from the training dataset. It then updates the weights of the model using the
    backpropagation of errors algorithm, referred to simply as backpropagation. The
    amount that the weights are updated during training is referred to as the step
    size or the “learning rate.” Specifically, the learning rate is a configurable
    hyperparameter used in the training of neural networks that has a small positive
    value, often in the range *between 0.0 and 1.0***.**
  id: totrans-526
  prefs: []
  type: TYPE_NORMAL
  zh: 选择超参数学习率是超参数之一。深度学习神经网络使用随机梯度下降和批量算法进行训练。因此，随机梯度下降是一种优化算法，它使用训练数据集中的示例来估计模型当前状态的误差梯度。然后，它使用误差反向传播算法（简称反向传播）来更新模型的权重。在训练期间更新权重的量称为步长或“学习率”。具体来说，学习率是神经网络训练中使用的可配置超参数，它具有小的正值，通常在
    0.0 和 1.0 之间****。
- en: 'Now that we know what the learning rate is, we need to see how we can change
    it during the training phase. In this phase, the backpropagation of error estimates
    the amount of error for which the weights of a node in the network are responsible.
    Instead of *updating the weight with the full amount, it is scaled by the learning
    rate***.** This means that a learning rate of 0.1, a traditionally common default
    value, would mean that weights in the network are updated 0.1 ∗ (estimated weight
    error). So the question is *can we configure the learning rate to get the best
    possible learning rate for our model?* Unfortunately, no. But the learning rate
    is the best hyperparameter you should tune in your model if you have time. In
    my opinion it the best hyperparameter and deserves attention. Unfortunately, we
    cannot analytically calculate the optimal learning rate for a given model on a
    given dataset. Instead, a good (or good enough) learning rate must be discovered
    via trial and error. You may think you can configure the best learning rate, but
    I say you should listen to more people and books:'
  id: totrans-527
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经知道了学习率是什么，我们就需要看看我们如何在训练阶段改变它。在这个阶段，误差反向传播估计了网络中一个节点的权重负责的错误量。不是用全部的错误量来更新权重，而是通过学习率进行缩放**。这意味着，一个0.1的学习率，一个传统上常见的默认值，意味着网络中的权重更新为0.1
    *（估计的权重错误）。所以问题是*我们能否配置学习率以获得我们模型的最佳可能学习率？*不幸的是，不能。但如果你有时间，学习率是你在模型中应该调整的最佳超参数。在我看来，这是最好的超参数，值得注意。不幸的是，我们无法对给定数据集上的给定模型进行解析地计算最佳学习率。相反，一个好的（或足够好的）学习率必须通过试错来发现。你可能认为你可以配置最佳学习率，但我说你应该听听更多人和书中的建议：
- en: 'The initial learning rate. This is often the single most important hyperparameter,
    and one should always make sure that it has been tuned. If there is only time
    to optimize one hyperparameter and one uses stochastic gradient descent, then
    this is the hyperparameter that is worth tuning. See “Practical Recommendations
    for Gradient-Based Training of Deep Architectures” in *Neural Networks: Tricks
    of the Trade*. *Lecture Notes in Computer Science*, vol 7700 (Springer, 2012).'
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始学习率。这通常是单个最重要的超参数，人们应该始终确保它已经被调整。如果只有时间优化一个超参数，并且使用随机梯度下降，那么这就是值得调整的超参数。参见《神经网络：技巧与贸易》中的“基于梯度的深度架构训练的实际建议”。“计算机科学讲义”，第7700卷（Springer，2012年）。
- en: 'In general, it is not possible to calculate the best learning rate a priori.
    See page 72 of *Neural Smithing: Supervised Learning in Feedforward Artificial
    Neural Networks* by Russell D. Reed and Robert J. Marks II (MIT Press, 1998).'
  id: totrans-529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常情况下，无法事先计算出最佳学习率。参见Russell D. Reed和Robert J. Marks II（麻省理工学院出版社，1998年）所著的《神经制造：前馈人工神经网络中的监督学习》第72页。
- en: You can see more books, but there are some things we can use that allow us to
    tune the learning rate parameter. Diagnostic plots can be used to investigate
    how the learning rate impacts the rate of learning and learning dynamics of the
    model. One example is to create a line plot of loss over training epochs during
    training. The line plot can show many properties, such as the rate of learning
    over training epochs (e.g., fast or slow). Has the model learned too quickly (sharp
    rise and plateau) or is it learning too slowly (little or no change)? Is the learning
    rate too large via oscillations in the loss?
  id: totrans-530
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以阅读更多的书籍，但有一些我们可以使用的东西，允许我们调整学习率参数。诊断图可以用来研究学习率如何影响模型的学习率和学习动态。一个例子是在训练期间创建损失随训练周期变化的线图。线图可以显示许多属性，例如训练周期中的学习率（例如，快或慢）。模型是否学得太快（急剧上升和平台期）或者学得太慢（变化很小或没有变化）？学习率是否太大，通过损失中的振荡来体现？
- en: 'Configuring the learning rate is challenging and time-consuming. Or you can
    try **grid search**. This can help to both highlight an order of magnitude where
    good learning rates may reside, as well as describe the relationship between learning
    rate and performance. It is common to grid search learning rates on a log scale
    from 0.1 to 10-5 or 10-6\. When plotted, the results of such a sensitivity analysis
    often show a “U” shape, where loss decreases (performance improves) as the learning
    rate is decreased with a fixed number of training epochs to a point where loss
    sharply increases again because the model fails to converge. Or you can use the
    learning rate schedule: the way in which the learning rate changes over time (training
    epochs) is referred to as the learning rate schedule or learning rate decay. Perhaps
    the simplest learning rate schedule is to decrease the learning rate linearly
    from a large initial value to a small value. This allows large weight changes
    at the beginning of the learning process and small changes or fine-tuning toward
    the end of the learning process. Another option is to use the adaptive learning
    rate, in which the performance of the model on the training dataset can be monitored
    by the learning algorithm and the learning rate can be adjusted in response. The
    simplest implementation may be to make the learning rate smaller once the performance
    of the model plateaus, such as by decreasing the learning rate by a factor of
    two or an order of magnitude. Although no single method works best on all problems,
    there are three adaptive learning rate methods that have proved to be robust over
    many types of neural network architectures and problem types. They are Adagrad,
    RMSprop, and Adam, and all maintain and adapt learning rates for each of the weights
    in the model. At last, we should know that we can’t choose the best learning rate
    but we can try to scale it to get the best result. In my opinion, the deep learning
    community may invite an analytical tool that makes us choose the best learning
    rate, but it’s a very complicated choice to make.'
  id: totrans-531
  prefs: []
  type: TYPE_NORMAL
  zh: 配置学习率具有挑战性和耗时性。或者你可以尝试**网格搜索**。这不仅可以突出可能存在良好学习率的数量级顺序，还可以描述学习率与性能之间的关系。通常在以对数尺度从
    0.1 到 10^-5 或 10^-6 进行网格搜索学习率。当绘制这种敏感性分析的结果时，通常会显示一个“U”形，其中损失随着学习率的降低（性能提高）而降低，直到损失再次急剧增加，因为模型未能收敛。或者你可以使用学习率调度：学习率随时间（训练轮次）变化的方式被称为学习率调度或学习率衰减。可能最简单的学习率调度是将学习率从大的初始值线性降低到小的值。这允许在学习过程开始时进行大的权重变化，并在学习过程结束时进行小的变化或微调。另一种选择是使用自适应学习率，其中学习算法可以监控模型在训练数据集上的性能，并根据性能调整学习率。最简单的实现可能是当模型性能达到平台期时减小学习率，例如通过将学习率减少到原来的二分之一或一个数量级。尽管没有一种方法对所有问题都最佳，但有三种子自适应学习率方法在许多类型的神经网络架构和问题类型上已被证明是稳健的。它们是
    Adagrad、RMSprop 和 Adam，并且所有这些方法都维护和调整模型中每个权重的学习率。最后，我们应该知道我们无法选择最佳的学习率，但我们可以尝试对其进行缩放以获得最佳结果。在我看来，深度学习社区可能会邀请一个分析工具来帮助我们选择最佳的学习率，但这是一个非常复杂的选择。
- en: Dropout Layers and Regularization
  id: totrans-532
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Dropout 层和正则化
- en: We want to regularize the overfitting of a neural network. When we talk about
    regularization , we refer to the model as having a large variance and a small
    bias. That is, the model is sensitive to the specific examples, the statistical
    noise, in the training dataset. A model with large weights is more complex than
    a model with smaller weights. It is a sign of a network that may be overly specialized
    in training data. In practice, we prefer to choose simpler models to solve the
    problem. We prefer models with smaller weights. But we need to remember that,
    in deep learning, when fitting a neural network model we must learn the weights
    of the network (i.e., the model parameters) using stochastic gradient descent
    and the training dataset. The longer we train the network, the more specialized
    the weights will become, overfitting the training data. The weights will grow
    in size in order to handle the specifics of the examples seen in the training
    data. Large weights make the network unstable. Although the weight will be specialized
    to the training dataset, minor variation or statistical noise on the expected
    inputs will result in large differences in the output.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望对神经网络的过拟合进行正则化。当我们谈论正则化时，我们指的是模型具有较大的方差和较小的偏差。也就是说，模型对训练数据集中的特定示例和统计噪声敏感。具有大权重的模型比具有小权重的模型更复杂。这是网络可能在训练数据上过度专业化的一个迹象。在实践中，我们更喜欢选择更简单的模型来解决问题。我们更喜欢具有较小权重的模型。但我们需要记住，在深度学习中，当我们拟合神经网络模型时，我们必须使用随机梯度下降和训练数据集来学习网络的权重（即模型参数）。我们训练网络的时间越长，权重就会变得越专业化，从而过度拟合训练数据。权重会增大以处理训练数据中看到的示例的具体情况。大权重会使网络不稳定。尽管权重将专门针对训练数据集，但预期输入上的微小变化或统计噪声将导致输出的大差异。
- en: 'We will now talk about the neural network dropout layer. This layer can be
    used with most types of layers, such as dense fully connected layers, convolutional
    layers, and recurrent layers such as the long short-term memory network layer.
    It works with all of the hidden layers and with the input layer, but not with
    the output layer. The term “dropout” refers to dropping out units (hidden and
    visible) in a neural network (Figure [10-2](#Fig2)). It drops some nodes or neurons
    to dump the variance in weights of a cost function that we’re trying to regularize.
    A new hyperparameter is introduced that specifies the probability at which outputs
    of the layer are dropped out, or inversely, the probability at which outputs of
    the layer are retained. The interpretation is an implementation detail that can
    differ from paper to code library . A common value is a probability of 0.5 for
    retaining the output of each node in a hidden layer and a value close to 1.0,
    such as 0.8 (this is called rate or `make_prop`), for retaining inputs from the
    visible layer. Some notes to help work with this layer: the dropout rate lets
    us know how many nodes we will drop in this layer, so the default interpretation
    of the dropout hyperparameter is the probability of training a given node in a
    layer, where 1.0 means no dropout and 0.0 means no outputs from the layer.'
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将讨论神经网络dropout层。这个层可以与大多数类型的层一起使用，例如密集的全连接层、卷积层以及长短期记忆网络层等循环层。它适用于所有隐藏层和输入层，但不适用于输出层。术语“dropout”指的是在神经网络中丢弃单元（隐藏和可见单元）（图[10-2](#Fig2)）。它丢弃一些节点或神经元，以减少我们试图正则化的成本函数中权重的方差。引入了一个新的超参数，它指定了层输出被丢弃的概率，或者相反，层输出被保留的概率。这种解释是一个实现细节，可能因论文到代码库而异。一个常见的值是，在隐藏层中保留每个节点输出的概率为0.5，对于保留可见层输入的值接近1.0，例如0.8（这被称为比率或`make_prop`）。一些注意事项有助于使用这个层：dropout率让我们知道在这个层中将丢弃多少节点，因此dropout超参数的默认解释是训练层中给定节点的概率，其中1.0表示没有dropout，0.0表示层没有输出。
- en: A good value for dropout in a hidden layer is between 0.5 and 0.8\. Input layers
    use a larger dropout rate, such as of 0.8.
  id: totrans-535
  prefs: []
  type: TYPE_NORMAL
  zh: 在隐藏层中，dropout的合适值介于0.5和0.8之间。输入层使用更大的dropout率，例如0.8。
- en: Like other regularization methods, dropout is more effective on those problems
    where there is a limited amount of training data and the model is likely to overfit
    the training data. Problems where there is a large amount of training data may
    see less benefit from using dropout.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他正则化方法一样，dropout在训练数据有限且模型可能过度拟合训练数据的那些问题中更为有效。在训练数据量大的问题中，使用dropout可能带来的好处较少。
- en: When using dropout regularization , it is possible to use larger networks with
    less risk of overfitting. In fact, a large network (more nodes per layer) may
    be required, as dropout will probabilistically reduce the capacity of the network.
    We can see that the dropout makes something happen in our neural network, as it
    divides the number of nodes by the probability of dropout we initialized, so the
    number of nodes is equal (#nodes in neural network/probability). A good rule of
    thumb is to divide the number of nodes in the layer before dropout by the proposed
    dropout rate and use that as the number of nodes in the new network that uses
    dropout. For example, a network with 100 nodes and a proposed dropout rate of
    0.5 will require 200 nodes (100 / 0.5) when using dropout.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用dropout正则化时，可以使用更大的网络，同时降低过拟合的风险。实际上，可能需要一个大的网络（每层更多的节点），因为dropout会以概率降低网络的能力。我们可以看到dropout在我们的神经网络中产生了某种效果，因为它将节点数除以初始化的dropout概率，所以节点数等于（神经网络中的节点数/概率）。一个很好的经验法则是将dropout前层的节点数除以建议的dropout率，并使用这个值作为使用dropout的新网络的节点数。例如，一个有100个节点的网络，如果建议的dropout率为0.5，那么在使用dropout时将需要200个节点（100
    / 0.5）。
- en: Usage**:**
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方法：**
- en: '[PRE14]'
  id: totrans-539
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Dropout consists of randomly setting a fraction rate of input units to 0 at
    each update during training time, which helps prevent overfitting. The units that
    are kept are scaled by 1 / (1 - rate), so that their sum is unchanged at training
    time and inference time.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout在训练过程中每次更新时随机将输入单元的一部分设置为0，这有助于防止过拟合。保留的单元通过1 / (1 - rate)进行缩放，以确保在训练时间和推理时间它们的和保持不变。
- en: — TensorFlow official docs
  id: totrans-541
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — TensorFlow官方文档
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig2_HTML.jpg](Images/484548_1_En_10_Fig2_HTML.jpg)'
  id: totrans-542
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig2_HTML.jpg](Images/484548_1_En_10_Fig2_HTML.jpg)'
- en: Figure 10-2
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-2
- en: How dropout works
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: Dropout的工作原理
- en: Normalization Techniques
  id: totrans-545
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 归一化技术
- en: 'Normalization has always been an active area of research in deep learning.
    Normalization techniques can decrease your model’s training time by a huge factor.
    Let’s state some of the benefits of using normalization. It is called “normalization”
    because it tries to dump all the data into the same scale: it normalizes each
    feature so that they maintain the same contribution as every feature, because
    some features have a higher numerical value than others. This way, our network
    can be unbiased (to higher value features). By scaling the data in the same scale,
    it makes the optimization faster, because normalization doesn’t allow weights
    to explode all over the place and restricts them to a certain range.'
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 归一化一直是深度学习中的一个活跃研究领域。归一化技术可以大幅减少模型的训练时间。让我们列举一些使用归一化的好处。它被称为“归一化”，因为它试图将所有数据归入相同的尺度：它将每个特征归一化，以便它们保持与每个特征相同的贡献，因为一些特征的数值高于其他特征。这样，我们的网络可以无偏（对数值较高的特征）。通过将数据缩放到相同的尺度，它使得优化更快，因为归一化不允许权重到处爆炸，并限制它们在一定范围内。
- en: Normalization helps networks with regularization (only slightly, not significantly).
    This is in getting our model to train effectively, but this isn’t as easy as it
    sounds. So we will ask ourselves some questions about what makes normalization
    not so easy; what normalization technique we should use; and, most common, which
    norm technique would be the best trade-off for computation and accuracy for our
    network. The answers may be found within a host of normalization techniques. So
    let’s look at them.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 归一化有助于网络进行正则化（只是稍微，而不是显著）。这是为了使我们的模型能够有效训练，但这并不像听起来那么简单。因此，我们将问自己一些关于什么使得归一化不那么容易；我们应该使用哪种归一化技术；以及最常见的，哪种归一化技术对于我们的网络在计算和精度之间的权衡会是最好的。答案可能隐藏在众多归一化技术中。因此，让我们来看看它们。
- en: Batch Normalization
  id: totrans-548
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 批归一化
- en: Let’s explore what we mean by “batch” and why we should use it. For a start,
    we should know that we normalize the input layer by adjusting and scaling the
    activations. For example, when we have features from 0 to 1, and some from 1 to
    1000, we should normalize them to speed up learning. If the input layer is benefiting
    from it, why not do the same thing for the values in the hidden layers, which
    are changing all the time, and get ten times or more improvement in the training
    speed. Batch normalization allows each layer of a network to learn by itself a
    little bit more independently of other layers. Batch has many good benefits. One
    is that we can use higher learning rates, because batch normalization makes sure
    that there’s no activation that’s gone really high or really low. And that means
    things that previously couldn’t get to train will start to train . It reduces
    overfitting because it has a slight regularization effect. Similar to **dropout**,
    it adds some noise to each hidden layer’s activations. Batch normalization is
    a method that normalizes activations in a network across the mini-batch of a definite
    size. For each feature, batch normalization computes the mean and variance of
    that feature in the mini-batch. It then subtracts the mean and divides the feature
    by its mini-batch standard deviation (Figure [10-3](#Fig3)).
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨一下“批量”的含义以及为什么我们应该使用它。首先，我们应该知道，我们通过调整和缩放激活来归一化输入层。例如，当我们有从0到1的特征，以及一些从1到1000的特征时，我们应该将它们归一化以加快学习速度。如果输入层从中受益，为什么不对隐藏层中的值做同样的事情呢？隐藏层中的值是不断变化的，这样可以在训练速度上获得十倍或更多的提升。批量归一化允许网络的每一层都能在一定程度上独立于其他层进行学习。批量归一化有许多优点。其中之一是我们可以使用更高的学习率，因为批量归一化确保没有激活值过高或过低。这意味着之前无法进行训练的东西现在开始训练了。它减少了过拟合，因为它具有轻微的正则化效果。类似于**dropout**，它为每个隐藏层的激活添加了一些噪声。批量归一化是一种在网络的迷你批次中归一化激活的方法。对于每个特征，批量归一化计算该特征在迷你批次中的均值和方差。然后它从均值中减去，并将特征除以其迷你批次的标准差（图[10-3](#Fig3)）。
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig3_HTML.jpg](Images/484548_1_En_10_Fig3_HTML.jpg)'
  id: totrans-550
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig3_HTML.jpg](Images/484548_1_En_10_Fig3_HTML.jpg)'
- en: Figure 10-3
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 图10-3
- en: The difference between inferences
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: 推理之间的差异
- en: Notice that γ and β are learned during training along with the original parameters
    of the network.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，γ和β是在训练过程中与网络的原始参数一起学习的。
- en: But is there a problem with this technique? Yes, there are many problems—not
    in general, but with some specific things. The first is with RNN, which we will
    talk about in Chapter [12](484548_1_En_12_Chapter.xhtml). In an RNN, the recurrent
    activations of each time-step will have a different story to tell (i.e., statistics).
    This means that we have to fit a separate batch norm layer for each time-step.
    This makes the model more complicated and space-consuming, because it forces us
    to store the statistics for each time-step during training. So now, how can we
    use it with TensorFlow?
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 但这种技术有没有问题？是的，有很多问题——不是普遍的问题，而是与某些具体事物有关。首先是与RNN有关，我们将在第[12](484548_1_En_12_Chapter.xhtml)章中讨论。在RNN中，每个时间步的循环激活将有一个不同的故事要讲（即，统计数据）。这意味着我们必须为每个时间步拟合一个单独的批量归一化层。这使得模型更加复杂，占用更多空间，因为它迫使我们必须在训练过程中存储每个时间步的统计数据。那么，我们如何使用TensorFlow来实现它呢？
- en: '[PRE15]'
  id: totrans-555
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: So, that is the batch normalization technique we can use in our deep neural
    network. There are many more normalization techniques in deep learning. Let’s
    talk about weight normalization.
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这就是我们可以在深度神经网络中使用的批量归一化技术。在深度学习中还有许多其他的归一化技术。让我们来谈谈权重归一化。
- en: Weight Normalization
  id: totrans-557
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 权重归一化
- en: 'In batch normalization we normalize the activation function, but now we will
    normalize the weight. Weight normalization is a method developed by OpenAI, in
    which weight normalization reparametrizes the weights of any layer in the neural
    network in the following way:'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 在批量归一化中，我们归一化了激活函数，但现在我们将归一化权重。权重归一化是由OpenAI开发的一种方法，其中权重归一化以以下方式重新参数化神经网络中任何层的权重：
- en: '![$$ w=\frac{g}{\left\Vert v\right\Vert }v $$](Images/484548_1_En_10_Chapter_TeX_IEq21.png)'
  id: totrans-559
  prefs: []
  type: TYPE_IMG
  zh: '![$$ w=\frac{g}{\left\Vert v\right\Vert }v $$](Images/484548_1_En_10_Chapter_TeX_IEq21.png)'
- en: It separates the weight vector from its direction. This has a similar effect
    as in batch normalization with variance. As for the mean, the developers of this
    weight normalization combine mean-only batch normalization and weight normalization
    to get the desired output even in small mini-batches. It means that they subtract
    out the mean of the minibatch, but do not divide by the variance.
  id: totrans-560
  prefs: []
  type: TYPE_NORMAL
  zh: 它将权重向量与其方向分开。这与批归一化中的方差有类似的效果。至于均值，这项权重归一化的开发者将仅均值批归一化和权重归一化结合起来，即使在小型微型批次中也能得到所需的结果。这意味着他们减去了微型批次的均值，但没有除以方差。
- en: Finally, what we need to know is that they use weight normalization instead
    of dividing by variance.
  id: totrans-561
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要知道的是，它们使用权重归一化而不是除以方差。
- en: Layer Normalization
  id: totrans-562
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 层归一化
- en: 'Layer normalization is a method developed by Geoffrey Hinton. Compared with
    weight normalization, layer normalization is slightly harder to grasp intuitively.
    It normalizes input across the features instead of normalizing input features
    across the batch dimension in batch normalization. So, when we talk about batch
    normalization, Batch normalization normalizes the input features across the batch
    dimension. So, we might say at this point that batch and layer normalization may
    be similar in some way. Let’s see the following equations to explore that (Figure
    [10-4](#Fig4)):'
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 层归一化是由杰弗里·辛顿（Geoffrey Hinton）开发的一种方法。与权重归一化相比，层归一化在直观上稍微难以理解。它对输入进行归一化，而不是在批归一化中对输入特征的批次维度进行归一化。因此，当我们谈论批归一化时，批归一化是对输入特征的批次维度进行归一化。因此，我们可以说批和层归一化可能在某些方面相似。让我们看看以下方程式来探索这一点（图
    [10-4](#Fig4)）：
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig4_HTML.jpg](Images/484548_1_En_10_Fig4_HTML.jpg)'
  id: totrans-564
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig4_HTML.jpg](Images/484548_1_En_10_Fig4_HTML.jpg)'
- en: Figure 10-4
  id: totrans-565
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-4
- en: The layer and batch normalization
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 层和批归一化
- en: The equations seem almost identical, so what is the difference? The difference
    is that in batch normalization, the statistics are computed across the batch and
    are the same for each example in the batch. In contrast, in layer normalization
    , the statistics are computed across each feature and are independent of other
    examples.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 方程式看起来几乎相同，那么区别在哪里？区别在于在批归一化中，统计量是在批次中计算的，并且对于批次中的每个示例都是相同的。相比之下，在层归一化中，统计量是在每个特征上计算的，并且与其他示例无关。
- en: Let’s see an image (Figure [10-5](#Fig5)).
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一张图片（图 [10-5](#Fig5)）。
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig5_HTML.jpg](Images/484548_1_En_10_Fig5_HTML.jpg)'
  id: totrans-569
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig5_HTML.jpg](Images/484548_1_En_10_Fig5_HTML.jpg)'
- en: Figure 10-5
  id: totrans-570
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-5
- en: An example of batch and layer normalization
  id: totrans-571
  prefs: []
  type: TYPE_NORMAL
  zh: 批和层归一化的例子
- en: It solves the problem in batch normalization, as layer normalization performs
    better than the batch norm in the case of RNNs. But the similarity doesn't end
    at this point; there is one more similarity to layer normalization called *instance
    normalization* .
  id: totrans-572
  prefs: []
  type: TYPE_NORMAL
  zh: 它解决了批归一化的问题，因为层归一化在 RNN 的情况下表现优于批归一化。但相似之处并不止于此；还有一个与层归一化相似的概念，称为 *实例归一化*。
- en: Instance Normalization
  id: totrans-573
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实例归一化
- en: Layer normalization and instance normalization are very similar to each other.
    However, the difference between them is that instance normalization normalizes
    across each channel in each training example instead of normalizing across input
    features in a training example. Unlike batch normalization, the instance normalization
    layer is applied at test time as well (due to the nondependency of mini-batch).
    This technique was originally devised for style transfer. The problem that instance
    normalization tries to address is that the network should be agnostic to the contrast
    of the original image . Experimental results show that instance normalization
    performs well on style transfer when replacing batch normalization. Recently,
    instance normalization has also been used as a replacement for batch normalization
    in GANs (generative adversarial networks).
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 层归一化和实例归一化彼此非常相似。然而，它们之间的区别在于实例归一化是在每个训练示例的每个通道上进行归一化，而不是在训练示例的输入特征上进行归一化。与批归一化不同，实例归一化层在测试时也会应用（由于微型批次的非依赖性）。这项技术最初是为风格迁移而设计的。实例归一化试图解决的问题是网络应该对原始图像的对比度无感知。实验结果表明，在替换批归一化时，实例归一化在风格迁移方面表现良好。最近，实例归一化也已被用作
    GANs（生成对抗网络）中批归一化的替代品。
- en: Group Normalization
  id: totrans-575
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组归一化
- en: 'Group normalization , as its name suggests, normalizes over a group of channels
    for each training example. We can say that group norm is in between instance and
    layer normalization. How does this hypertechnique work? When we put all the channels
    into a single group, group normalization becomes layer normalization and when
    we put each channel into a different group, it becomes instance normalization.
    Though layer normalization and instance normalization were both effective on RNNs
    and style transfer, respectively, they were still inferior to batch normalization
    for image recognition tasks. Group normalization was able to achieve much closer
    performance to batch normalization with a batch size of 32 on ImageNet, and outperformed
    it on smaller batch sizes. For tasks like object detection and segmentation that
    use much higher resolution images (and therefore cannot increase their batch size
    due to memory constraints), group normalization was shown to be a very effective
    normalization method. So the question is, if we can only use layer normalization
    or instance normalization, what makes us use the hypertechnique between them?
    The answer is very easy: we need what layer normalization adds. One of the implicit
    assumptions that layer normalization makes is that *all channels are* **equally
    important** when computing the mean. This assumption is not always true in convolutional
    layers. So, we need to use an instance that make neurons near the edge of an image
    and neurons near the center of an image have very different activation statistics
    . This means that computing different statistics for different channels can give
    models much needed flexibility. Channels in an image are not completely independent
    though, so being able to leverage the statistics of nearby channels is an advantage
    that group normalization has over instance normalization (Figure [10-6](#Fig6)).'
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名所示，组归一化是对每个训练示例中的多个通道进行归一化。我们可以说组归一化介于实例归一化和层归一化之间。这种超技术是如何工作的呢？当我们把所有通道放入一个单一组时，组归一化就变成了层归一化；当我们把每个通道放入不同的组时，它就变成了实例归一化。尽管层归一化和实例归一化在
    RNN 和风格迁移任务上都很有效，但它们在图像识别任务上仍然不如批归一化。组归一化在 ImageNet 上以 32 个批大小实现了与批归一化非常接近的性能，并且在较小的批大小上超过了它。对于像目标检测和分割这样的任务，它们使用高分辨率图像（因此由于内存限制无法增加批大小），组归一化已被证明是一个非常有效的归一化方法。所以问题是，如果我们只能使用层归一化或实例归一化，是什么让我们使用介于它们之间的超技术？答案是很容易的：我们需要层归一化所增加的东西。层归一化所做的一个隐含假设是，在计算均值时，**所有通道都是**同等重要的。这个假设在卷积层中并不总是成立。因此，我们需要使用一个实例，使得图像边缘附近的神经元和图像中心附近的神经元具有非常不同的激活统计信息。这意味着为不同的通道计算不同的统计信息可以为模型提供所需的灵活性。然而，图像中的通道并不是完全独立的，因此能够利用邻近通道的统计信息是组归一化相对于实例归一化的一个优势（见图
    [10-6](#Fig6)）。
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig6_HTML.jpg](Images/484548_1_En_10_Fig6_HTML.jpg)'
  id: totrans-577
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig6_HTML.jpg](Images/484548_1_En_10_Fig6_HTML.jpg)'
- en: Figure 10-6
  id: totrans-578
  prefs: []
  type: TYPE_NORMAL
  zh: 图 10-6
- en: Different normalization techniques
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的归一化技术
- en: Now that we’ve finish talking about some of the normalization techniques in
    deep learning, we need to say that there are more techniques to normalize the
    deep learning layers, and the deep learning community is still working on methods
    that enhances performance and prevent overfitting. In the next chapters we will
    discuss the applications of deep learning convolution and sequence models, with
    case studies about them. We are getting to the end of the pipeline, which you
    can make yourself.
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经讨论了一些深度学习中的归一化技术，我们需要说明还有更多技术用于归一化深度学习层，深度学习社区仍在研究提高性能和防止过拟合的方法。在接下来的章节中，我们将讨论深度学习卷积和序列模型的应用，并附上相关案例研究。我们正接近流程的尾声，你可以自己完成它。
- en: Summary
  id: totrans-581
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we worked with optimization techniques that optimize the learning
    rate and make gradients reach the optimum local minimum. We talked about dropout—the
    regularization technique in a neural network—and how it is very useful, and the
    connection between it and normalization. We learned that normalization is a very
    good tool in deep learning, that it comes from statistics and makes the neural
    network more adaptable to data by scaling it. We saw how we can choose the most
    important hyperparameter learning rate and its connection with adaptive learning.
    In the next few chapters we will talk about models, the last stage in the deep
    learning pipeline; we will have some applications about deep learning, and we
    will talk about some case studies. So we hope you had a good workout with this
    chapter.
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们使用了优化技术来优化学习率，并使梯度达到最优局部最小值。我们讨论了dropout——神经网络中的正则化技术，以及它为何非常有效，以及它与归一化的联系。我们了解到归一化是深度学习中的一个非常好的工具，它源自统计学，通过缩放数据使神经网络更能适应数据。我们看到了如何选择最重要的超参数学习率及其与自适应学习的联系。在接下来的几章中，我们将讨论模型，这是深度学习管道的最后一个阶段；我们将探讨一些深度学习应用，并讨论一些案例研究。因此，我们希望您在本章中有所收获。
- en: 11. Convolutional Neural Network
  id: totrans-583
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 卷积神经网络
- en: In the previous chapters, we studied fully connected multilayer neural networks
    and their training, using backpropagation. In a typical multilayer neural network
    layer, with n input nodes and m neurons, we need to learn *n* × *m* parameters
    or weights. While a multilayer neural network may perform well in some cases—in
    particular, for those where the features of different dimensions are independent—there
    are some additional properties in the connection architecture that we might desire.
    For example, if it is known that the dimensions of the input data are strongly
    correlated or that the size of multilayer neural networks (both the number of
    layers and the number of neurons in each layer) must be limited for computational
    considerations, should there be any architectural changes introduced to a standard
    multilayer neural network to accommodate this additional constraint about the
    data or the network complexity?
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们研究了全连接多层神经网络及其使用反向传播的训练。在一个典型的多层神经网络层中，有n个输入节点和m个神经元，我们需要学习n×m个参数或权重。虽然多层神经网络在某些情况下可能表现良好——特别是对于不同维度的特征相互独立的情况——但在连接架构中可能还有一些我们希望拥有的额外属性。例如，如果已知输入数据的维度高度相关，或者多层神经网络的大小（包括层数和每层的神经元数量）必须因计算考虑而受限，那么是否需要对标准多层神经网络进行任何架构上的调整，以适应关于数据或网络复杂性的额外约束？
- en: Deep learning has flourished in recent years in the processing of unstructured
    data, especially images, text, audio, and speech. Taking convolutional neural
    networks (CNNs) into consideration, it works like magic when the data is images.
    Whenever there is a topology associated with the data, convolutional neural networks
    do a good job of extracting the important features out of the images.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来，深度学习在处理非结构化数据方面取得了繁荣发展，特别是图像、文本、音频和语音。考虑到卷积神经网络（CNNs），当数据是图像时，它就像魔法一样有效。每当数据与拓扑相关联时，卷积神经网络都能很好地从图像中提取重要特征。
- en: From an architectural perspective, CNNs are inspired by multilayer perceptrons;
    by imposing local connectivity constraints between neurons of adjacent layers,
    CNNs exploit local spatial correlation. The core element of convolutional neural
    networks is the processing of data through the convolution operation. Convolution
    of any signal with another signal produces a third signal that may reveal more
    information about the signal than the original signal itself.
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 从架构角度来看，卷积神经网络受到多层感知器的启发；通过在相邻层的神经元之间施加局部连接约束，卷积神经网络利用了局部空间相关性。卷积神经网络的核心元素是通过卷积操作处理数据。任何信号与另一个信号的卷积产生第三个信号，这个信号可能比原始信号本身揭示更多关于信号的信息。
- en: What is a Convolutional Neural Network
  id: totrans-587
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是卷积神经网络
- en: A convolutional neural network (CNN) is a deep learning algorithm that can take
    in an input image, assign importance (learnable weights and biases) to various
    aspects/objects in the image, and be able to differentiate one from the other.
    The preprocessing required in a CNN is much lower as compared with other classification
    algorithms. Although in primitive methods filters are hand engineered, with enough
    training, CNNs have the ability to learn these filters/characteristics.
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络（CNN）是一种深度学习算法，它可以接收输入图像，对图像中的各种方面/物体分配重要性（可学习的权重和偏差），并能够区分它们。与其它分类算法相比，CNN所需的预处理要低得多。尽管在原始方法中滤波器是手工设计的，但随着训练的深入，CNN具有学习这些滤波器/特征的能力。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig1_HTML.jpg](Images/484548_1_En_11_Fig1_HTML.jpg)'
  id: totrans-589
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig1_HTML.jpg](Images/484548_1_En_11_Fig1_HTML.jpg)'
- en: Figure 11-1
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-1
- en: An example of a CNN
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: CNN的示例
- en: The architecture of a convolutional neural network (Figure [11-1](#Fig1)) is
    analogous to that of the connectivity pattern of neurons in the human brain and
    was inspired by the organization of the visual cortex. Individual neurons respond
    to stimuli only in a restricted region of the visual field known as the *receptive
    field* . A collection of such fields overlaps to cover the entire visual area.
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络（CNN）的架构（图[11-1](#Fig1)）类似于人脑中神经元的连接模式，并受到了视觉皮层组织的启发。单个神经元只对视觉场中称为**感受野**的特定区域内的刺激做出反应。这些区域的集合相互重叠，覆盖整个视觉区域。
- en: Convolution Operation
  id: totrans-593
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积运算
- en: The convolution of a temporal or spatial signal with another signal produces
    a modified version of the initial signal. The modified signal may have better
    feature representation than the original signal, suitable for a specific task.
    For example, by convolving a grayscale image as a 2-D signal with another signal,
    generally called a filter or kernel, an output signal can be obtained that contains
    the edges of the original image. Edges in an image can correspond to object boundaries,
    changes in illumination, changes in material property, discontinuities in depth,
    and so on, which may be useful for several applications. Knowledge about the linear
    time-invariant or shift-invariant properties of systems helps one appreciate the
    convolution of signals better. We will discuss this first before moving on to
    convolution itself.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 将时间或空间信号与另一个信号进行卷积会产生初始信号的修改版本。修改后的信号可能比原始信号有更好的特征表示，适合特定任务。例如，通过将灰度图像作为二维信号与另一个信号（通常称为滤波器或核）进行卷积，可以得到包含原始图像边缘的输出信号。图像中的边缘可以对应于物体边界、光照变化、材料属性变化、深度不连续性等，这些可能对多个应用有用。了解系统的线性时不变或移不变属性有助于更好地理解信号的卷积。我们将在讨论卷积本身之前先讨论这一点。
- en: One-Dimensional Convolution
  id: totrans-595
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一维卷积
- en: Intuitively, convolution measures the degree of overlap between one function
    and the reversed and translated version of another function. In the discrete case,
    ![$$ y(t)=x(t)\ast h(t)={\sum}_{i=-\infty}^{+\infty }x(i)h\left(t-i\right) $$](Images/484548_1_En_11_Chapter_TeX_IEq1.png)
  id: totrans-596
  prefs: []
  type: TYPE_NORMAL
  zh: 直观地说，卷积衡量了一个函数与另一个函数的翻转和平移版本的叠加程度。在离散情况下，![y(t)=x(t)∗h(t)=∑_{i=-∞}^{+∞}x(i)h(t-i)](Images/484548_1_En_11_Chapter_TeX_IEq1.png)
- en: Similarly, in the continuous domain the convolution of two functions can be
    expressed as ![$$ y(t)=x(t)\ast h(t)={\int}_{i=-\infty}^{+\infty }x(i)h\left(t-i\right)
    di $$](Images/484548_1_En_11_Chapter_TeX_IEq2.png)
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，在连续域中，两个函数的卷积可以表示为![y(t)=x(t)∗h(t)=∫_{i=-∞}^{+∞}x(i)h(t-i) di](Images/484548_1_En_11_Chapter_TeX_IEq2.png)
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig2_HTML.jpg](Images/484548_1_En_11_Fig2_HTML.jpg)'
  id: totrans-598
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig2_HTML.jpg](Images/484548_1_En_11_Fig2_HTML.jpg)'
- en: Figure 11-2
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-2
- en: An example of 1-D convolution masking
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 1-D卷积掩码的示例
- en: Figure [11-2](#Fig2) shows how the equation of 1-dimensional convolution works
    in simple terms. Intuitively, it works like a mask that moves over the data input,
    which is the left vector. In each moving step it takes three neighbors, applies
    the masking values over the three, and assigns the output of the whole equation
    to a single scaler in the output vector.
  id: totrans-601
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-2](#Fig2)以简单的方式展示了1维卷积方程的工作原理。直观地说，它就像一个在数据输入上移动的掩码，即左边的向量。在每次移动步骤中，它取三个邻居，对这三个邻居应用掩码值，并将整个方程的输出分配给输出向量中的一个单个标量。
- en: 'You can see that in its first steps the mask takes the first three neighbors/pair
    in the input vector, which are [1, 0, 1], then multiplies them by the mask values
    [1, 1, 0][1, 1, 0]. The multiplication is a vector-wise operation that multiplies
    the first input with its equivalent, the mask, and then multiplies the second
    input with the second one on the mask, and so on. After three multiplications
    happen, we add all three outputs of these operations, and the final result will
    be a single scalar that is assigned to the second element of the output vector.
    Wait a second: you wonder now why we assign the output to the second element in
    the right output vector, because it is not the first step. The first step was
    taking the input pair and adding to them a zero padding, generating the input
    pair [0, 1, 0].'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，在其第一步中，掩码取输入向量中的前三个邻居/对，即 [1, 0, 1]，然后乘以掩码值 [1, 1, 0][1, 1, 0]。这是一个向量运算，它将第一个输入与其等价的掩码相乘，然后将第二个输入与掩码上的第二个值相乘，依此类推。经过三次乘法运算后，我们将这三个操作的输出相加，最终结果将是一个单独的标量，分配给输出向量的第二个元素。等等：你现在可能想知道为什么我们将输出分配给右侧输出向量的第二个元素，因为它不是第一步。第一步是取输入对并添加零填充，生成输入对
    [0, 1, 0]。
- en: Seeing the convolution in such way makes it easier to understand than the preceding
    equations. Also, you now may understand why the convolution is important, as you
    change the mask values to extract certain knowledge from data input. But if you
    do not understand or see how convolution may extract knowledge/features until
    now, you will see how in a few minutes.
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式看待卷积比前面的方程更容易理解。现在你可能也理解了为什么卷积很重要，因为当你改变掩码值以从数据输入中提取某些知识时。但是，如果你到现在还不理解或看不到卷积如何提取知识/特征，你将在几分钟内看到。
- en: Two-Dimensional Convolution
  id: totrans-604
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 二维卷积
- en: As we described, convolution involves both one-dimensional and two-dimensional
    operations; one-dimensional is referred to as 1-D convolution or just convolution.
    Otherwise, if the convolution is performed between two-dimensions spanning along
    two mutually perpendicular dimensions (i.e., if the single observation is two-dimensional
    in nature or, practically speaking, it is an image or matrix), then it will be
    referred to as 2-D convolution. This concept can be extended to involve multidimensional
    matrices, due to which we can have multidimensional convolution.
  id: totrans-605
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所描述的，卷积涉及一维和二维操作；一维被称为 1-D 卷积或简称卷积。否则，如果卷积是在两个相互垂直的维度上跨越的两个维度之间进行的（即如果单个观察是二维的，或者从实际的角度来说，它是一张图像或矩阵），那么它将被称为
    2-D 卷积。这个概念可以扩展到涉及多维矩阵，因此我们可以有多维卷积。
- en: In the image/computer vision domain, convolution is performed by multiplying
    and accumulating the instantaneous values of the overlapping samples corresponding
    to two input images, one of which is flipped. This definition of 1-D convolution
    is applicable even for 2-D convolution except that, in the latter case, one of
    the inputs is flipped twice.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 在图像/计算机视觉领域，卷积是通过乘积和累加对应于两个输入图像的瞬时值来执行的，其中一个图像是翻转的。1-D 卷积的定义适用于 2-D 卷积，只是在这种情况下，一个输入翻转了两次。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig3_HTML.jpg](Images/484548_1_En_11_Fig3_HTML.jpg)'
  id: totrans-607
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig3_HTML.jpg](Images/484548_1_En_11_Fig3_HTML.jpg)'
- en: Figure 11-3
  id: totrans-608
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-3
- en: 2-D convolution masking
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 二维卷积掩码
- en: Figure [11-3](#Fig3) shows the kind of operation that is extensively used in
    the field of digital image processing, wherein the 2-D matrix representing the
    image will be convolved with a comparatively smaller matrix called 2-D kernel.
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-3](#Fig3) 展示了在数字图像处理领域中广泛使用的操作类型，其中代表图像的二维矩阵将与一个较小的矩阵（称为 2-D 卷积核）进行卷积。
- en: Padding and Stride
  id: totrans-611
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 填充和步长
- en: Before going deeper into convolution, you need to know one extra thing; actually
    there are two important concepts you need to know and fully grasp. Both padding
    and stride can change the way your model sees the input observation; also, changing
    their parameters impacts the shape of the output feature map.
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨卷积之前，你需要知道一个额外的事情；实际上有两个重要的概念你需要了解并完全掌握。填充和步长都可以改变你的模型看待输入观察的方式；同时，改变它们的参数也会影响输出特征图的形状。
- en: Although the convolutional layer is very simple, it is capable of achieving
    sophisticated and impressive results. Nevertheless, it can be challenging to develop
    an understanding for how the shape of the filters impacts the shape of the output
    feature map and how related configuration hyperparameters such as padding and
    stride should be configured.
  id: totrans-613
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管卷积层非常简单，但它能够实现复杂和令人印象深刻的成果。然而，理解滤波器的形状如何影响输出特征图的形状，以及如何配置相关的配置超参数，如填充和步长，可能具有挑战性。
- en: In a convolution operation we have a kernel, and to make the final output of
    the operation more informative we use padding in an image matrix or any kind of
    input array. Adding padding to the input makes the kernel start giving more information
    to the edges of the input observation, thus making all the information and features
    hidden in edges of the input appear in our output.
  id: totrans-614
  prefs: []
  type: TYPE_NORMAL
  zh: 在卷积操作中，我们有一个核，为了使操作的最终输出更有信息量，我们在图像矩阵或任何类型的输入数组中使用填充。向输入添加填充使得核开始向输入观察的边缘提供更多信息，从而使所有隐藏在输入边缘的信息和特征都出现在我们的输出中。
- en: 'There are three types of padding , stated as follows:'
  id: totrans-615
  prefs: []
  type: TYPE_NORMAL
  zh: 有三种类型的填充，如下所述：
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig4_HTML.jpg](Images/484548_1_En_11_Fig4_HTML.jpg)'
  id: totrans-616
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig4_HTML.jpg](Images/484548_1_En_11_Fig4_HTML.jpg)'
- en: Figure 11-4
  id: totrans-617
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-4
- en: The difference between valid, full, and same padding
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 有效、完整和相同填充之间的区别
- en: '*Padding full*: This type shows the importance of extracting the information
    from the edges of the input. When you use full padding on the input, it makes
    the kernel in the convolution operation treat each pixel with the same priority,
    which means the kernel steps over the edges with the same amount as the center
    pixels.'
  id: totrans-619
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*全填充*: 这种类型显示了从输入边缘提取信息的重要性。当你对输入使用全填充时，它使得卷积操作中的核以相同的优先级处理每个像素，这意味着核以与中心像素相同的方式跨越边缘。'
- en: '*Padding same*: In this type of padding, we need to make the output observation
    shape from convolution operation get the same shape as the input observation.
    For instance, if we have a 32×32 image as input, the output will have the same
    shape, 32×32.'
  id: totrans-620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*填充相同*: 在这种填充方式中，我们需要使卷积操作的输出观察形状与输入观察形状相同。例如，如果我们有一个32×32的图像作为输入，输出也将具有相同的形状，32×32。'
- en: '*Padding valid* : Simply, valid convolution means no padding at all, and this
    may work for you as a dimensionality reduction for an input observation (image).
    For instance, an image with 32×32 input with kernel filter of 3×3 will generate
    a 30×30 output image.'
  id: totrans-621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*有效填充*: 简单来说，有效卷积意味着完全没有填充，这可能对你作为一个输入观察（图像）的维度降低是有用的。例如，一个32×32输入的图像，使用3×3的核滤波器将生成一个30×30的输出图像。'
- en: In Figure [11-4](#Fig4) you can see that on the left the full-padding to the
    input matrix makes the filter walk on each real-value (blue) of the matrix equally.
    So, in the figure the filter will walk/moves/slides on each blue pixel nine times
    wherever the pixel position is, and that creates a bigger output matrix size that
    will have all the representation and more features extracted. On the other hand,
    using no padding or valid padding will create the smallest output, as the filter
    only walks on the input matrix as it is; that means that there are pixels the
    filter will visit only one time and ones that the filter will visit many times.
    However, if you want the output to be equal to your input matrix, you can consider
    using same padding, and that will create an output matrix that is similar in shape
    to the input matrix.
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 在图[11-4](#Fig4)中，你可以看到在左侧，全填充到输入矩阵使得过滤器在矩阵的每个实际值（蓝色）上均匀地移动。因此，在图中，过滤器将在每个蓝色像素上移动/移动/滑动九次，无论像素位置如何，这会创建一个更大的输出矩阵大小，将包含所有表示和更多提取的特征。另一方面，使用无填充或有效填充将创建最小的输出，因为过滤器只是按照输入矩阵的形状移动；这意味着有些像素过滤器只会访问一次，而有些像素过滤器会多次访问。然而，如果你想输出与输入矩阵相同，你可以考虑使用相同填充，这将创建一个与输入矩阵形状相似的输出矩阵。
- en: On the other side, stride controls how the filter convolves around the input
    volume. In the examples we had earlier, the filter convolves around the input
    volume by shifting one unit at a time. The amount by which the filter shifts is
    the stride. In that case, the stride was implicitly set at 1\. Stride is normally
    set in a way so that the output volume is an integer and not a fraction. Let’s
    look at an example. Let’s imagine a 7×7 input volume, a 3×3 filter (disregard
    the 3rd dimension for simplicity), and a stride of 1\. This is the case that we’re
    accustomed to. As you can see in Figure [11-5](#Fig5), the filter walks through
    the input with two pixels stepping to the right, and to the bottom too, and this
    will make the output matrix much smaller, as the overlaps between steps are reduced.
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 在另一方面，步长控制滤波器在输入体积周围的卷积方式。在我们之前的例子中，滤波器通过每次移动一个单位来围绕输入体积进行卷积。滤波器移动的量就是步长。在这种情况下，步长隐式设置为
    1。步长通常设置为输出体积是整数而不是分数。让我们看一个例子。让我们想象一个 7×7 的输入体积，一个 3×3 的滤波器（为了简单起见，忽略第三维度），步长为
    1。这是我们习惯的情况。如图 [11-5](#Fig5) 所示，滤波器通过输入移动，每次向右和向下移动两个像素，这将使输出矩阵变得很小，因为步骤之间的重叠减少了。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig5_HTML.jpg](Images/484548_1_En_11_Fig5_HTML.jpg)'
  id: totrans-624
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig5_HTML.jpg](Images/484548_1_En_11_Fig5_HTML.jpg)'
- en: Figure 11-5
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-5
- en: The difference between the Valid, Full, Same Padding
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: Valid、Full、Same填充之间的区别
- en: Common Image-Processing Filters
  id: totrans-627
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常见图像处理滤波器
- en: Let’s discuss image-processing filters commonly used on 2-D images. Make sure
    to be clear with notations, since the natural way of indexing an image doesn’t
    align well with how one would prefer to define the *x* and *y* axes. Whenever
    we represent an image-processing filter or an image in the coordinate space, *n*[1]
    and *n*[2] are the discrete coordinates for the *x* and *y* directions. The column
    index of the image in NumPy matrix form coincides nicely with the *x* axis, whereas
    the row index moves in the opposite direction of the *y* axis. Also, it doesn’t
    matter which pixel location one chooses as the origin for the image signal while
    doing convolution. Based on whether zero padding is used or not, one can handle
    the edges accordingly. Since the filter kernel is of a smaller size, we generally
    flip the filter kernel and then slide it over the image, not the other way around.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们讨论在二维图像上常用的图像处理滤波器。确保使用符号清晰，因为自然索引图像的方式与定义 *x* 和 *y* 轴的偏好方式并不完全一致。当我们用坐标空间表示图像处理滤波器或图像时，*n*[1]
    和 *n*[2] 是 *x* 和 *y* 方向的离散坐标。图像在 NumPy 矩阵形式中的列索引与 *x* 轴完美对应，而行索引则与 *y* 轴相反方向移动。此外，在进行卷积时，选择哪个像素位置作为图像信号的起点并不重要。根据是否使用零填充，可以相应地处理边缘。由于滤波器核较小，我们通常翻转滤波器核，然后在其上滑动图像，而不是反过来。
- en: Mean and Median Filters
  id: totrans-629
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 均值和中值滤波器
- en: The mean filter or average filter is a low-pass filter that computes the local
    average of the pixel intensity at any specific point. Figure [11-6](#Fig6) shows
    you how the mean filter is calculated in different types, based on what the application
    is going to use.
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 均值滤波器或平均滤波器是一种低通滤波器，它计算任何特定点的像素强度的局部平均值。图 [11-6](#Fig6) 展示了根据应用需求，均值滤波器在不同类型中的计算方式。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig6_HTML.jpg](Images/484548_1_En_11_Fig6_HTML.jpg)'
  id: totrans-631
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig6_HTML.jpg](Images/484548_1_En_11_Fig6_HTML.jpg)'
- en: Figure 11-6
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-6
- en: How the mean filter is calculated
  id: totrans-633
  prefs: []
  type: TYPE_NORMAL
  zh: 如何计算均值滤波器
- en: Here, the matrix entry h22 corresponds to the entry at the origin. So, at any
    given point, the convolution will represent the average of the pixel intensities
    at that point. The following code illustrates how one can convolve an image with
    an image-processing filter such as the mean filter.
  id: totrans-634
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，矩阵中的 h22 项对应于原点处的项。因此，在任何给定点上，卷积将表示该点像素强度的平均值。以下代码说明了如何使用图像处理滤波器（如均值滤波器）对图像进行卷积。
- en: Please note that in many Python implementations, we would be using OpenCV to
    perform basic operations on the image, such as reading the image, converting the
    image from RGB format to grayscale format, and so on. OpenCV is an open source
    image-processing package that has a rich set of methodologies for image processing.
    Readers are advised to explore OpenCV or any other image-processing toolbox in
    order to get accustomed to the basic image-processing functions.
  id: totrans-635
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，在许多Python实现中，我们会使用OpenCV对图像执行基本操作，例如读取图像，将图像从RGB格式转换为灰度格式等。OpenCV是一个开源的图像处理包，它拥有丰富的图像处理方法。建议读者探索OpenCV或任何其他图像处理工具箱，以便熟悉基本图像处理函数。
- en: 'First things first: we need to import all the needed packages and functions
    to make sure that there’s no import error on the way. We will import `cv2` for
    OpenCV operations, `matplotlib` for viewing the image, `NumPy` for creating the
    filter and any matrix operation, and finally convolve2d from `scipy.signal` for
    convolution operation.'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: 首先：我们需要导入所有需要的包和函数，以确保在操作过程中没有导入错误。我们将导入`cv2`用于OpenCV操作，`matplotlib`用于查看图像，`NumPy`用于创建过滤器以及任何矩阵操作，最后从`scipy.signal`导入convolve2d用于卷积操作。
- en: '[PRE16]'
  id: totrans-637
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: After loading the packages, we now need to load the image that we want to make
    the operations on. The Lena Forsen image is one of the most famous images in the
    image processing field. In the following code we will load it, and then transform
    it into a gray image for the sack of simplicity.
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: 在加载包之后，我们现在需要加载我们想要对其执行操作的图像。Lena Forsen图像是图像处理领域中最为著名的图像之一。在下面的代码中，我们将加载它，然后为了简化将其转换为灰度图像。
- en: '[PRE17]'
  id: totrans-639
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Figure [11-7](#Fig7) shows the loaded image in grayscale.
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-7](#Fig7) 显示了加载的灰度图像。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig7_HTML.jpg](Images/484548_1_En_11_Fig7_HTML.jpg)'
  id: totrans-641
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig7_HTML.jpg](Images/484548_1_En_11_Fig7_HTML.jpg)'
- en: Figure 11-7
  id: totrans-642
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-7
- en: The gray loaded image
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: 加载的灰度图像
- en: After loading the image, we need to add some noise to it, to see how the filter
    will somehow fix the noise. In the following code we will add a type of noise
    called Gaussian noise . Then we will try to fix it.
  id: totrans-644
  prefs: []
  type: TYPE_NORMAL
  zh: 在加载图像后，我们需要向其添加一些噪声，以查看过滤器如何以某种方式修复噪声。在下面的代码中，我们将添加一种称为高斯噪声的噪声类型。然后我们将尝试修复它。
- en: '[PRE18]'
  id: totrans-645
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Now, after we add the noise, we need to know how the noise will affect the image
    quality. In Figure [11-8](#Fig8), you will see the image with the noise all over
    it.
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在我们添加噪声之后，我们需要知道噪声将如何影响图像质量。在图 [11-8](#Fig8) 中，你会看到遍布噪声的图像。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig8_HTML.jpg](Images/484548_1_En_11_Fig8_HTML.jpg)'
  id: totrans-647
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig8_HTML.jpg](Images/484548_1_En_11_Fig8_HTML.jpg)'
- en: Figure 11-8
  id: totrans-648
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-8
- en: The Guassian noise on the image
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: 图像上的高斯噪声
- en: '[PRE19]'
  id: totrans-650
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: At the end, we will create and apply the mean filter to the image; we will use
    convolve2d for that purpose, to apply the filter to the image. In Figure [11-9](#Fig9)
    you can see the resulting image of the operation from the preceding code.
  id: totrans-651
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将创建并应用均值滤波器到图像上；我们将使用convolve2d来实现这一点，将过滤器应用到图像上。在图 [11-9](#Fig9) 中，你可以看到前面代码操作的结果图像。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig9_HTML.jpg](Images/484548_1_En_11_Fig9_HTML.jpg)'
  id: totrans-652
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig9_HTML.jpg](Images/484548_1_En_11_Fig9_HTML.jpg)'
- en: Figure 11-9
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-9
- en: The image after the mean filter
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: 应用均值滤波器后的图像
- en: The mean filter is mostly used to reduce the noise in an image. If there is
    some white Gaussian noise present in the image, the mean filter will reduce the
    noise, since it averages over its neighborhood, hence the white noise of the zero
    mean will be suppressed. As we can see from Figure [11-9](#Fig9), the Gaussian
    white noise is reduced once the image has been convolved with the mean filter.
    The new image has fewer high-frequency components and thus is relatively less
    sharp than the image before convolution, but the filter has done a good job of
    reducing the white noise.
  id: totrans-655
  prefs: []
  type: TYPE_NORMAL
  zh: 均值滤波器主要用于减少图像中的噪声。如果图像中存在一些白色高斯噪声，均值滤波器将减少噪声，因为它在其邻域内进行平均，因此零均值的白色噪声将被抑制。从图
    [11-9](#Fig9) 中我们可以看到，一旦图像与均值滤波器卷积，高斯白噪声就会减少。新图像具有较少的高频成分，因此相对于卷积前的图像来说相对不那么锐利，但过滤器已经很好地减少了白噪声。
- en: One the other hand, a 2-D median filter replaces each pixel in a neighborhood
    with the median pixel intensity in that neighborhood, based on the filter size.
    The median filter is good for removing salt and pepper noise. This type of noise
    presents itself in images in the form of black and white pixels, and is generally
    caused by sudden disturbances while capturing the images. The following code illustrates
    how salt and pepper noise can be added to an image, and then how the noise can
    be suppressed using a median filter.
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，二维中值滤波器根据滤波器大小，将邻域中的每个像素替换为该邻域的中值像素强度。中值滤波器适用于移除盐和胡椒噪声。这种噪声以黑白像素的形式出现在图像中，通常是由于在捕获图像时突然的干扰造成的。以下代码说明了如何向图像中添加盐和胡椒噪声，以及如何使用中值滤波器抑制噪声。
- en: First, we select some random indices to do the operations (adding the noise)
    on it.
  id: totrans-657
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们选择一些随机索引来执行操作（添加噪声）。
- en: '[PRE20]'
  id: totrans-658
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Then we will iterate over the indicis and set the values on the image to either
    0 or 255, creating a salt-like noise. The following code describes the iteration,
    and Figure [11-10](#Fig10) shows the result of the noise on the image.
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将遍历索引并在图像上设置值为 0 或 255，创建类似盐的噪声。以下代码描述了迭代过程，图 [11-10](#Fig10) 显示了噪声在图像上的结果。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig10_HTML.jpg](Images/484548_1_En_11_Fig10_HTML.jpg)'
  id: totrans-660
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig10_HTML.jpg](Images/484548_1_En_11_Fig10_HTML.jpg)'
- en: Figure 11-10
  id: totrans-661
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-10
- en: The salt and pepper noise on the image
  id: totrans-662
  prefs: []
  type: TYPE_NORMAL
  zh: 图像上的盐和胡椒噪声
- en: '[PRE21]'
  id: totrans-663
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Now we need to remove the salty noise from the image. Lucky for us, cv2 has
    an implementation of the image. The following code describes how to use it.
  id: totrans-664
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要从图像中移除盐分噪声。幸运的是，cv2库已经实现了图像处理。以下代码描述了如何使用它。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig11_HTML.jpg](Images/484548_1_En_11_Fig11_HTML.jpg)'
  id: totrans-665
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig11_HTML.jpg](Images/484548_1_En_11_Fig11_HTML.jpg)'
- en: Figure 11-11
  id: totrans-666
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-11
- en: The median filter effect on the noise in the image
  id: totrans-667
  prefs: []
  type: TYPE_NORMAL
  zh: 中值滤波器对图像中噪声的影响
- en: '[PRE22]'
  id: totrans-668
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: As we can see, the salt and pepper noise has been removed by the median filter
    (Figure [11-11](#Fig11)).
  id: totrans-669
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，中值滤波器（图 [11-11](#Fig11)）已经移除了盐和胡椒噪声。
- en: Gaussian Filter
  id: totrans-670
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高斯滤波器
- en: The Gaussian filter is a modified version of the mean filter, where the weights
    of the impulse function are distributed normally around the origin. Weight is
    highest at the center of the filter and falls normally away from the center. A
    Gaussian filter can be created with the following code. As we can see, the intensity
    falls in a Gaussian fashion away from the origin. The Gaussian filter, when displayed
    as an image, has the highest intensity at the origin and then diminishes for pixels
    away from the center. Gaussian filters are used to reduce noise by suppressing
    the high-frequency components. However, in its pursuit of suppressing the high-frequency
    components, it ends up producing a blurred image, called Gaussian blur.
  id: totrans-671
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯滤波器是均值滤波器的一个修改版本，其中脉冲函数的权重在原点周围呈正态分布。权重在滤波器的中心最高，并从中心向周围正常衰减。可以使用以下代码创建高斯滤波器。正如我们所见，强度以高斯方式从原点衰减。当高斯滤波器以图像形式显示时，在原点处具有最高的强度，然后向远离中心的像素衰减。高斯滤波器用于通过抑制高频成分来减少噪声。然而，在追求抑制高频成分的过程中，它最终产生了一个模糊的图像，称为高斯模糊。
- en: In Figure [11-12](#Fig12), the original image is convolved with the Gaussian
    filter to produce an image that has Gaussian blur. We then subtract the blurred
    image from the original image to get the high-frequency component of the image.
    A small portion of the high-frequency image is added to the original image to
    improve the sharpness of the image.
  id: totrans-672
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [11-12](#Fig12) 中，原始图像与高斯滤波器卷积，生成具有高斯模糊的图像。然后我们从原始图像中减去模糊图像，以获取图像的高频成分。将高频图像的一小部分添加到原始图像中，以提高图像的清晰度。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig12_HTML.jpg](Images/484548_1_En_11_Fig12_HTML.jpg)'
  id: totrans-673
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig12_HTML.jpg](Images/484548_1_En_11_Fig12_HTML.jpg)'
- en: Figure 11-12
  id: totrans-674
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-12
- en: What the filter looks like
  id: totrans-675
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器的样子
- en: '[PRE23]'
  id: totrans-676
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: As you can see in Figure [11-12](#Fig12), it seems that the filter focuses on
    the middle pixel. After applying this filter on the image, you can see in Figure
    [11-13](#Fig13) that the image blurred. The following code describes how to apply
    the filter on the image.
  id: totrans-677
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 [11-12](#Fig12) 所示，您可以看到滤波器似乎专注于中间像素。在将此滤波器应用于图像后，您可以在图 [11-13](#Fig13) 中看到图像变模糊了。以下代码描述了如何在图像上应用此滤波器。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig13_HTML.jpg](Images/484548_1_En_11_Fig13_HTML.jpg)'
  id: totrans-678
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig13_HTML.jpg](Images/484548_1_En_11_Fig13_HTML.jpg)'
- en: Figure 11-13
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-13
- en: The image after applying the filter
  id: totrans-680
  prefs: []
  type: TYPE_NORMAL
  zh: 应用过滤器后的图像
- en: '[PRE24]'
  id: totrans-681
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The following code describes how to get back one step, enhancing the image to
    its real state. And Figure [11-14](#Fig14) shows the image returned to its real
    state without the blurring.
  id: totrans-682
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码描述了如何退回一步，增强图像到其实际状态。图 [11-14](#Fig14) 显示了图像返回到其实际状态，没有模糊。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig14_HTML.jpg](Images/484548_1_En_11_Fig14_HTML.jpg)'
  id: totrans-683
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig14_HTML.jpg](Images/484548_1_En_11_Fig14_HTML.jpg)'
- en: Figure 11-14
  id: totrans-684
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-14
- en: The image after enhancement
  id: totrans-685
  prefs: []
  type: TYPE_NORMAL
  zh: 增强后的图像
- en: '[PRE25]'
  id: totrans-686
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Sobel Edge-Detection Filter
  id: totrans-687
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Sobel边缘检测滤波器
- en: The Sobel operator, sometimes called the Sobel–Feldman operator or Sobel filter,
    is used in image processing and computer vision, particularly within edge detection
    algorithms where it creates an image emphasizing edges.
  id: totrans-688
  prefs: []
  type: TYPE_NORMAL
  zh: Sobel算子，有时也称为Sobel-Feldman算子或Sobel滤波器，在图像处理和计算机视觉中应用，尤其是在边缘检测算法中，它创建了一个强调边缘的图像。
- en: The output response of a Sobel edge convolution detector along both the horizontal
    and vertical axes can be expressed by the following *Gx* and *Gy* matrices, respectively.
    The Sobel detectors are extensions of the horizontal and vertical gradient filters
    just illustrated. Instead of only taking the gradient at the point, it also takes
    the sum of the gradients at the points on either side of it. Also, it gives double
    weight to the point of interest. See Figure [11-15](#Fig15).
  id: totrans-689
  prefs: []
  type: TYPE_NORMAL
  zh: Sobel 边缘卷积检测器在水平和垂直轴上的输出响应可以分别用以下 *Gx* 和 *Gy* 矩阵表示。Sobel 检测器是前面展示的水平方向和垂直方向梯度滤波器的扩展。它不仅取点的梯度，还取其两侧点的梯度之和。此外，它给感兴趣点的权重加倍。见图
    [11-15](#Fig15)。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig15_HTML.jpg](Images/484548_1_En_11_Fig15_HTML.jpg)'
  id: totrans-690
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig15_HTML.jpg](Images/484548_1_En_11_Fig15_HTML.jpg)'
- en: Figure 11-15
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-15
- en: The Sobel filter along with the two axes
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: 沿着两个轴的 Sobel 过滤器
- en: 'The convolution of the image with the Sobel filters is illustrated in the following
    code:'
  id: totrans-693
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码展示了图像与Sobel滤波器的卷积：
- en: '[PRE26]'
  id: totrans-694
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Figure [11-16](#Fig16) shows the result of the preceding code. In the figure
    you can see that some of the edges appear strongly, and that’s because the filter
    used can be considered a half filter. If you continue, you can see that the final
    result contains all the edges in the image.
  id: totrans-695
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-16](#Fig16) 展示了前面代码的结果。在图中你可以看到一些边缘显得非常明显，这是因为使用的过滤器可以被认为是一个半过滤器。如果你继续观察，你会看到最终的结果包含了图像中的所有边缘。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig16_HTML.jpg](Images/484548_1_En_11_Fig16_HTML.jpg)'
  id: totrans-696
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig16_HTML.jpg](Images/484548_1_En_11_Fig16_HTML.jpg)'
- en: Figure 11-16
  id: totrans-697
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-16
- en: The image after applying the X-axis filter
  id: totrans-698
  prefs: []
  type: TYPE_NORMAL
  zh: 应用X轴过滤器后的图像
- en: And here is the other half filter, the Y-axis filter. Here you will find that
    the result may be similar to the result of the preceding code, but with some focus
    you can see some differences between the results (Figure [11-17](#Fig17)).
  id: totrans-699
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是另一个半过滤器，Y轴过滤器。在这里你会发现结果可能与前面代码的结果相似，但通过仔细观察，你可以看到结果之间的一些差异（见图 [11-17](#Fig17)）。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig17_HTML.jpg](Images/484548_1_En_11_Fig17_HTML.jpg)'
  id: totrans-700
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig17_HTML.jpg](Images/484548_1_En_11_Fig17_HTML.jpg)'
- en: Figure 11-17
  id: totrans-701
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-17
- en: The Y-axis filter
  id: totrans-702
  prefs: []
  type: TYPE_NORMAL
  zh: Y轴过滤器
- en: '[PRE27]'
  id: totrans-703
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: Now, by combining the both filters (but squared), you will see the wanted result.
    In Figure [11-18](#Fig18) you can see the output of the following code; the result
    shows how the edges of the images look.
  id: totrans-704
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，通过结合这两个过滤器（但平方），你会看到期望的结果。在图 [11-18](#Fig18) 中，你可以看到以下代码的输出；结果显示了图像边缘的形状。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig18_HTML.jpg](Images/484548_1_En_11_Fig18_HTML.jpg)'
  id: totrans-705
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig18_HTML.jpg](Images/484548_1_En_11_Fig18_HTML.jpg)'
- en: Figure 11-18
  id: totrans-706
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-18
- en: The edges of the image
  id: totrans-707
  prefs: []
  type: TYPE_NORMAL
  zh: 图像的边缘
- en: '[PRE28]'
  id: totrans-708
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The preceding code has the logic required to convolve the image with the Sobel
    filters. The *horizontal Sobel* filter detects edges in the horizontal direction,
    whereas the *vertical Sobel* filter detects edges in the vertical direction. Both
    are high-pass filters, since they attenuate the low frequencies from the signals
    and capture only the high-frequency components within the image. Edges are important
    features for an image, and help one detect local changes within an image. Edges
    are generally present on the boundary between the two regions in an image, and
    are often the first step in retrieving information from images. We saw this in
    the outputs of the preceding codes.
  id: totrans-709
  prefs: []
  type: TYPE_NORMAL
  zh: 上一段代码包含了使用Sobel滤波器对图像进行卷积所需的逻辑。*水平Sobel*滤波器检测水平方向的边缘，而*垂直Sobel*滤波器检测垂直方向的边缘。两者都是高通滤波器，因为它们衰减了信号中的低频成分，只捕获图像中的高频成分。边缘是图像的重要特征，有助于检测图像中的局部变化。边缘通常出现在图像中两个区域的边界上，并且通常是提取图像信息的第一步。我们在上一段代码的输出中看到了这一点。
- en: 'The equation that runs the combination between both halves of the filter is:'
  id: totrans-710
  prefs: []
  type: TYPE_NORMAL
  zh: 连接滤波器两半部分的方程如下：
- en: '![$$ C\left(x,y\right)=\sqrt{{\left({I}_x\left(x,y\right)\right)}^2+{\left({I}_y\left(x,y\right)\right)}^2}
    $$](Images/484548_1_En_11_Chapter_TeX_Equa.png)'
  id: totrans-711
  prefs: []
  type: TYPE_IMG
  zh: '![$$ C\left(x,y\right)=\sqrt{{\left({I}_x\left(x,y\right)\right)}^2+{\left({I}_y\left(x,y\right)\right)}^2}
    $$](Images/484548_1_En_11_Chapter_TeX_Equa.png)'
- en: where *C*(*x*, *y*) denotes the pixel intensity function for the combined Sobel
    filter, and *I*[*y*](*x*, *y*) denotes the pixel intensity of the image obtained
    through the vertical Sobel filter.
  id: totrans-712
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *C*(*x*, *y*) 表示组合Sobel滤波器的像素强度函数，而 *I*[*y*](*x*, *y*) 表示通过垂直Sobel滤波器获得的图像像素强度。
- en: Identity Transform
  id: totrans-713
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 身份变换
- en: The filter for identity transform through convolution is as follows.
  id: totrans-714
  prefs: []
  type: TYPE_NORMAL
  zh: 通过卷积进行身份变换的滤波器如下。
- en: 'Figure [11-19](#Fig19) illustrates a unity transform through convolution. The
    implementation is like the mean filter, but with a simple modification: instead
    of a mean filter with 1/9 at each value of the filter pixel, we put just 1 in
    the middle pixel, and all others are 0s.'
  id: totrans-715
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-19](#Fig19) 展示了通过卷积实现的单位变换。实现方式类似于均值滤波器，但有一个简单的修改：在滤波器像素的每个值上，我们只将1放在中间像素，其余都是0。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig19_HTML.jpg](Images/484548_1_En_11_Fig19_HTML.jpg)'
  id: totrans-716
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig19_HTML.jpg](Images/484548_1_En_11_Fig19_HTML.jpg)'
- en: Figure 11-19
  id: totrans-717
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-19
- en: The identity filter
  id: totrans-718
  prefs: []
  type: TYPE_NORMAL
  zh: 身份滤波器
- en: Convolutional Neural Networks
  id: totrans-719
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积神经网络
- en: '**Convolutional neural networks** (CNNs) are based on the convolution of images,
    and detect features based on filters that are learned by the CNN through training.
    For example, we don’t apply any known filter, such as the ones for the detection
    of edges or for removing Gaussian noise, but through the training of the convolutional
    neural network the algorithm learns image-processing filters on its own that might
    be very different from normal image-processing filters. For supervised training,
    the filters are learned in such a way that the overall cost function is reduced
    as much as possible. Generally, the first convolutional layer learns to detect
    edges, while the second may learn to detect more complex shapes that can be formed
    by combining different edges, such as circles and rectangles, and so on. The third
    layer and beyond learn much more complicated features based on the features generated
    in the previous layer.'
  id: totrans-720
  prefs: []
  type: TYPE_NORMAL
  zh: '**卷积神经网络** (CNNs) 基于图像的卷积，并通过CNN通过训练学习到的滤波器来检测特征。例如，我们不会应用任何已知的滤波器，例如用于检测边缘或去除高斯噪声的滤波器，而是通过卷积神经网络的训练，算法会自己学习图像处理滤波器，这些滤波器可能与常规图像处理滤波器非常不同。对于监督训练，滤波器是通过以下方式学习的，即尽可能减少整体成本函数。通常，第一层卷积学习检测边缘，而第二层可能学习检测由不同边缘组合而成的更复杂的形状，例如圆形和矩形等。第三层及以后的层基于前一层的特征学习更复杂的功能。'
- en: The good thing about convolutional neural networks is the sparse connectivity
    that results from weight sharing, which greatly reduces the number of parameters
    to learn. The same filter can learn to detect the same edge in any given portion
    of the image through its equivariance property, which is a great property of convolution
    useful for feature detection.
  id: totrans-721
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络的好处是权重共享导致的稀疏连接，这大大减少了需要学习的参数数量。相同的滤波器可以通过其等变性属性学习检测图像任何部分的相同边缘，这是卷积在特征检测中非常有用的一个属性。
- en: Layers of Convolutional Neural Networks
  id: totrans-722
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积神经网络层
- en: 'The following are the typical layers of a convolutional neural network:'
  id: totrans-723
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个卷积神经网络的典型层：
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig20_HTML.jpg](Images/484548_1_En_11_Fig20_HTML.jpg)'
  id: totrans-724
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig20_HTML.jpg](Images/484548_1_En_11_Fig20_HTML.jpg)'
- en: Figure 11-20
  id: totrans-725
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-20
- en: A simple CNN
  id: totrans-726
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的CNN
- en: '*Input layer* : will hold the pixel intensity of the image. For example, an
    input image with width 64, height 64, and depth 3 for the red, green, and blue
    color channels (RGB) would have input dimensions of 64*x*64*x*3.'
  id: totrans-727
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*输入层*：将持有图像的像素强度。例如，一个宽度为64，高度为64，深度为3（红、绿、蓝颜色通道RGB）的输入图像将具有64*x*64*x*3的输入维度。'
- en: '*Convolutional layer* : will take images from the preceding layers and convolve
    with them the specified number of filters to create images called output feature
    maps. The number of output feature maps is equal to the specified number of filters.
    Until now, CNNs in TensorFlow have used mostly 2-D filters; however, 3-D convolution
    filters have been introduced recently.'
  id: totrans-728
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*卷积层*：将从前一层接收图像，并使用指定的过滤器与它们进行卷积，以创建称为输出特征图的图像。输出特征图的数量等于指定的过滤器数量。到目前为止，TensorFlow中的CNN主要使用2-D过滤器；然而，最近引入了3-D卷积过滤器。'
- en: '*Activation functions* : For CNNs they are generally ReLUs, which we discussed
    in a previous chapter. The output dimension is the same as the input after passing
    through the ReLU activation layers. The ReLU layer adds nonlinearity in the network
    and at the same time provides nonsaturating gradients for positive net inputs.'
  id: totrans-729
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*激活函数*：对于CNN，它们通常是ReLU，我们已在之前的章节中讨论过。ReLU激活层后的输出维度与输入相同。ReLU层在网络中添加非线性，同时为正净输入提供非饱和梯度。'
- en: '*Pooling layer* : will downsample the 2-D activation maps along the height
    and width dimensions. The depth or the number of activation maps is not compromised
    and remains the same.'
  id: totrans-730
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*池化层*：将2-D激活图在高度和宽度维度上进行下采样。深度或激活图的数量不受影响，保持不变。'
- en: '*Fully connected layers* : contain traditional neurons that receive different
    sets of weights from the preceding layers; there is no weight sharing between
    them as is typical for convolution operations. Each neuron in this layer will
    be connected either to all the neurons in the previous layer or to all the coordinate-wise
    outputs in the output maps through separate weights. For classification, the class
    output neurons receive inputs from the final fully connected layers.'
  id: totrans-731
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*全连接层*：包含传统的神经元，这些神经元从前一层的不同权重集中接收输入；与卷积操作中典型的权重共享不同，它们之间没有权重共享。这一层的每个神经元要么连接到前一层的所有神经元，要么通过单独的权重连接到输出图中的所有坐标输出。对于分类，类别输出神经元接收来自最终全连接层的输入。'
- en: Figure [11-20](#Fig20) illustrates a basic CNN that uses one convolutional layer,
    and one pooling layer followed by a fully connected layer and, finally, the output
    classification layer. The network tries to detect the number inside the image,
    which is 2\. The output unit can be taken to have a sigmoid activation function,
    since it’s a binary classification problem for images. Generally, for most of
    the CNN architectures, a few to several convolutional layer-ReLU layer-pooling
    layer combinations are stacked one after another before the fully connected layers.
    We will discuss the different architectures at a later point in time. For now,
    let’s look at the different layers in much more detail.
  id: totrans-732
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-20](#Fig20) 展示了一个基本的CNN，它使用一个卷积层，一个池化层，随后是一个全连接层，最后是输出分类层。该网络试图检测图像中的数字，即2。输出单元可以采用sigmoid激活函数，因为对于图像来说，这是一个二分类问题。通常，对于大多数CNN架构，在全连接层之前，会堆叠几个卷积层-ReLU层-池化层的组合。我们将在稍后的时间讨论不同的架构。现在，让我们更详细地看看不同的层。
- en: Input Layer
  id: totrans-733
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 输入层
- en: The input to this layer is images. Generally, the images are fed in batches
    as four-dimensional tensors, where the first dimension is specific to the image
    index, second and third dimensions are specific to the height and width of the
    image, and the fourth dimension corresponds to the different channels. For a colored
    image, generally we have the *red* (R), *green* (G), and *blue* (B) channels,
    while for grayscale images we have only one channel. The number of images in a
    batch would be determined by the mini-batch size chosen for the mini-batch stochastic
    gradient descent. The batch size is one for stochastic gradient descent. The inputs
    can be fed to the input layer in mini-batches through TensorFlow placeholder `tf.placeholder`
    at runtime
  id: totrans-734
  prefs: []
  type: TYPE_NORMAL
  zh: 此层的输入是图像。通常，图像以四维张量的形式批量输入，其中第一个维度是特定于图像索引的，第二和第三维度是特定于图像的高度和宽度，第四维度对应于不同的通道。对于彩色图像，通常我们有*红色*（R）、*绿色*（G）和*蓝色*（B）通道，而对于灰度图像，我们只有一个通道。批处理中的图像数量由为小批量随机梯度下降选择的小批量大小决定。对于随机梯度下降，批处理大小为1。可以通过TensorFlow的`tf.placeholder`在运行时以小批量形式将输入馈送到输入层。
- en: Convolutional layer
  id: totrans-735
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 卷积层
- en: Convolution is the heart of any CNN network. TensorFlow supports both 2-D and
    3-D convolutions. However, 2-D convolutions are more common, since 3-D convolutions
    are computationally memory intensive. The input images or intermediate images
    in the form of output feature maps are 2-D convolved with 2-D filters of the size
    specified. 2-D convolution happens along the spatial dimensions, whereas there
    is no convolution along the depth channel of the image volume. For each depth
    channel, the same number of feature maps is generated, and then they are summed
    together along the depth dimension before they pass through the *ReLU* activations.
    These filters help to detect features in the images. The deeper the convolutional
    layer is in the network, the more complicated features it learns. For instance,
    the initial convolutional layer might learn to detect edges in an image, while
    the second convolutional layer might learn to connect the edges to form geometric
    shapes such as circles and rectangles. The even deeper convolutional layers might
    learn to detect more complicated features; for example, in cat vs. dog classification
    it might learn to detect eyes, nose, or other body parts of the animals.
  id: totrans-736
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积是任何卷积神经网络的核心。TensorFlow支持2维和3维卷积。然而，由于3维卷积在计算上对内存的需求较高，2维卷积更为常见。输入图像或中间图像以输出特征图的形式，与指定大小的2维滤波器进行2维卷积。2维卷积沿着空间维度进行，而在图像体积的深度通道上没有卷积。对于每个深度通道，生成相同数量的特征图，然后在它们通过*ReLU*激活函数之前，沿着深度维度将它们相加。这些滤波器有助于检测图像中的特征。卷积层在网络的深度越深，它学习的特征就越复杂。例如，初始卷积层可能学会检测图像中的边缘，而第二个卷积层可能学会将边缘连接起来形成几何形状，如圆形和矩形。更深的卷积层可能学会检测更复杂的特征；例如，在猫与狗的分类中，它可能学会检测眼睛、鼻子或其他动物的身体部位。
- en: In a CNN, only the size of the filters is specified; the weights are initialized
    to arbitrary values before the start of training. The weights of the filters are
    learned through the CNN training process, hence they might not represent the traditional
    image-processing filters such as *mean*, *median*, *Gaussian*, *Sobel* or other
    kinds of filters. Instead the learned filters would be such that the overall loss
    function defined is minimized or a good generalization is achieved based on the
    validation. Although it might not learn the traditional edge detection filter,
    it would learn several filters that detect edges in some form, since edges are
    good feature detectors for images.
  id: totrans-737
  prefs: []
  type: TYPE_NORMAL
  zh: 在CNN中，只指定滤波器的大小；在训练开始之前，权重被初始化为任意值。滤波器的权重通过CNN的训练过程学习，因此它们可能不代表传统的图像处理滤波器，如*均值*、*中值*、*高斯*、*索贝尔*或其他类型的滤波器。相反，学习的滤波器将使得定义的整体损失函数最小化或基于验证实现良好的泛化。尽管它可能不会学习传统的边缘检测滤波器，但它会学习几个以某种形式检测边缘的滤波器，因为边缘是图像中良好的特征检测器。
- en: 'Some of the terms with which one should be familiar while defining the convolutional
    layer are as follows:'
  id: totrans-738
  prefs: []
  type: TYPE_NORMAL
  zh: 在定义卷积层时，应该熟悉的一些术语如下：
- en: '*Filter size*: Filter size defines the height and width of the filter kernel.
    A filter kernel of size 3 × 3 would have nine weights. Generally, these filters
    are initialized and slid over the input image for convolution without flipping
    these filters. Technically, when convolution is performed without flipping the
    filter kernel, it’s called cross-correlation and not convolution. However, it
    doesn’t matter, as we can consider the filters learned as a flipped version of
    image processing filters.'
  id: totrans-739
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*滤波器大小*：滤波器大小定义了滤波器内核的高度和宽度。一个3×3大小的滤波器内核将具有九个权重。通常，这些滤波器在初始化后会在输入图像上滑动进行卷积，而不翻转这些滤波器。技术上，当不翻转滤波器内核进行卷积时，这被称为交叉相关而不是卷积。然而，这并不重要，因为我们可以将学习到的滤波器视为图像处理滤波器的翻转版本。'
- en: '*Stride*: The stride determines the number of pixels to move in each spatial
    direction while performing convolution. In normal convolution of signals, we generally
    don’t skip any pixels and instead compute the convolution sum at each pixel location,
    hence we have a stride of 1 along both spatial directions for 2-D signals. However,
    one may choose to skip every alternate pixel location while convolving, and thus
    choose a stride of 2\. If a stride of 2 is chosen along both the height and the
    width of the image, then after convolving the output image would be approximately
    1/4 of the input image sizes. Why it is *approximately* 1/4 and not exactly 1/4
    of the original image or feature-map sizes will be covered in our next topic of
    discussion.'
  id: totrans-740
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*步长*：步长决定了在执行卷积时在每个空间方向上移动的像素数。在信号的正常卷积中，我们通常不会跳过任何像素，而是在每个像素位置计算卷积和，因此对于二维信号，我们在两个空间方向上都有步长1。然而，一个人可以选择在卷积时跳过每个交替的像素位置，因此可以选择步长为2。如果在图像的高度和宽度上选择步长为2，那么在卷积后，输出图像的大小将大约是输入图像大小的1/4。为什么它是*近似*1/4而不是原始图像或特征图大小的精确1/4将在我们下一个讨论的主题中涵盖。'
- en: '*Padding*: When we convolve an image of a specific size by a filter, the resulting
    image is generally smaller than the original image. For example, if we convolve
    a 5×5 2-D image by a filter of size 3 × 3, the resulting image is 3 × 3.'
  id: totrans-741
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**填充**：当我们用一个特定大小的图像通过一个滤波器卷积时，得到的图像通常比原始图像小。例如，如果我们用一个3×3大小的滤波器卷积一个5×5的二维图像，得到的图像是3×3。'
- en: Padding is an approach that appends zeros to the boundary of an image to control
    the size of the output of convolution. The convolved output image length *L*^′
    along a specific spatial dimension is given by
  id: totrans-742
  prefs: []
  type: TYPE_NORMAL
  zh: '**填充**：在将特定大小的图像通过一个滤波器卷积时，得到的图像通常比原始图像小。例如，如果我们用一个3×3大小的滤波器卷积一个5×5的二维图像，得到的图像是3×3。'
- en: '![$$ {L}^{\prime }=\frac{L-K+2P}{S}+1 $$](Images/484548_1_En_11_Chapter_TeX_Equb.png)'
  id: totrans-743
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {L}^{\prime }=\frac{L-K+2P}{S}+1 $$](Images/484548_1_En_11_Chapter_TeX_Equb.png)'
- en: where *L* denotes the Length of the input image in a specific dimension and
    *K* is length of the kernel/filter in a specific dimension, while *P* denotes
    zeros padded along a dimension in either end and *S* stands for stride of the
    convolution.
  id: totrans-744
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *L* 表示输入图像在特定维度上的长度，*K* 是特定维度上内核/滤波器的长度，而 *P* 表示在维度的两端填充的零，*S* 表示卷积的步长。
- en: In general, for a stride of 1 the image size along each dimension is reduced
    by (*K* − 1)/2 on either end, where K is the length of the filter kernel along
    that dimension. So, to keep the output image the same as that of the input image,
    a pad length of (*K* − 1)/2 would be required.
  id: totrans-745
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，对于步长为1，图像在每个维度上的大小会减少(*K* - 1)/2，其中K是该维度上滤波器内核的长度。因此，为了保持输出图像与输入图像相同，需要(*K*
    - 1)/2的填充长度。
- en: In TensorFlow , padding can be chosen as either “**VALID**” or “**SAME.” SAME**
    ensures that the output spatial dimensions of the image are the same as those
    of the input spatial dimensions in cases where a stride of 1 is chosen. It uses
    zero padding to achieve this. It tries to keep the zero pad length even on both
    sides of a dimension, but if the total pad length for that dimension is odd, the
    extra length is added to the right for the horizontal dimension and to the bottom
    for the vertical dimension.
  id: totrans-746
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow中，填充可以选择为“**VALID**”或“**SAME**”。**SAME**确保在步长为1的情况下，图像的输出空间维度与输入空间维度相同。它使用零填充来实现这一点。它试图使零填充长度在维度的两侧保持一致，但如果该维度的总填充长度是奇数，则额外的长度将添加到水平维度的右侧和垂直维度的底部。
- en: For recap, **VALID** doesn’t use zero padding; hence, the output image dimension
    would be smaller than the input image dimensions, even for a stride of 1.
  id: totrans-747
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回顾，**VALID** 不使用零填充；因此，输出图像的维度将小于输入图像的维度，即使步长为1也是如此。
- en: '[PRE29]'
  id: totrans-748
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Pooling Layer
  id: totrans-749
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**池化层**'
- en: A pooling operation on an image generally summarizes a locality of an image,
    the locality being given by the size of the filter kernel—also called the receptive
    field. The summarization generally happens in the form of max pooling or average
    pooling. In max pooling, the maximum pixel intensity of a locality is taken as
    the representative of that locality. In average pooling, the average of the pixel
    intensities around a locality is taken as the representative of that locality.
    Pooling reduces the spatial dimensions of an image. The kernel size that determines
    the locality is generally chosen as 2 × 2, whereas the stride is chosen as 2\.
    This reduces the image size to about 1/4 the size of the original image.
  id: totrans-750
  prefs: []
  type: TYPE_NORMAL
  zh: 对图像进行池化操作通常总结图像的局部性，局部性由滤波器核的大小给出，也称为感受野。总结通常以最大池化或平均池化的形式发生。在最大池化中，局部性的最大像素强度被用作该局部性的代表。在平均池化中，局部周围像素强度的平均值被用作该局部性的代表。池化减少了图像的空间维度。确定局部性的核大小通常选择为
    2 × 2，而步长选择为 2。这使图像大小减少到原始图像大小的约 1/4。
- en: '[PRE30]'
  id: totrans-751
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Backpropagation Through the Convolutional and Pooling Layers
  id: totrans-752
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过卷积层和池化层的反向传播
- en: In an earlier chapter we introduced the backpropagation algorithm and we described
    the backward path for perceptrons. Now we will try to understand how the backward
    pass for a single convolutional layer works, by taking a simple case wherein the
    number of channels is one across all computations.
  id: totrans-753
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面的章节中，我们介绍了反向传播算法，并描述了感知器的反向路径。现在我们将尝试理解单个卷积层的反向传播是如何工作的，通过考虑一个简单的情况，其中所有计算中的通道数都是一。
- en: Backpropagation through a convolutional layer is much like backpropagation for
    a multilayer perceptron network. The only difference is that the weight connections
    are sparse, since the same weights are shared by different input neighborhoods
    to create an output feature map. Each output feature map is the result of the
    convolution of an image or a feature map from the previous layer, with a filter
    kernel whose values are the weights that we need to learn through backpropagation.
    The weights in the filter kernel are shared for a specific input–output feature-map
    combination.
  id: totrans-754
  prefs: []
  type: TYPE_NORMAL
  zh: 通过卷积层的反向传播与多层感知器网络的反向传播类似。唯一的区别是权重连接是稀疏的，因为相同的权重被不同的输入邻域共享以创建输出特征图。每个输出特征图是图像或前一层特征图与滤波器核的卷积的结果，滤波器核的值是我们需要通过反向传播学习的权重。滤波器核中的权重对于特定的输入-输出特征图组合是共享的。
- en: The following convolution operation takes an input *X* of size 3*x*3 using a
    single filter *W* of size 2 × 2 without any padding, and `stride = 1,` generating
    an output *H* of size 2 × 2\. Also note that, while performing the forward pass,
    we will cache the variables *X* and filter *W*. This will help us while performing
    the backward pass (Figure [11-21](#Fig21)).
  id: totrans-755
  prefs: []
  type: TYPE_NORMAL
  zh: 以下卷积操作使用一个大小为 2 × 2 的单个滤波器 *W* 对大小为 3 × 3 的输入 *X* 进行操作，没有填充，`步长 = 1`，生成一个大小为
    2 × 2 的输出 *H*。同时请注意，在进行正向传播时，我们将缓存变量 *X* 和滤波器 *W*。这将在反向传播时帮助我们（图 [11-21](#Fig21)）。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig21_HTML.jpg](Images/484548_1_En_11_Fig21_HTML.jpg)'
  id: totrans-756
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig21_HTML.jpg](Images/484548_1_En_11_Fig21_HTML.jpg)'
- en: Figure 11-21
  id: totrans-757
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-21
- en: The input, weights, and output of the convolutional layer
  id: totrans-758
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积层的输入、权重和输出
- en: '*h*[11] = *W*[11]*X*[11] + *W*[12]*X*[12] + *W*[21]*X*[21] + *W*[22]*X*[22]'
  id: totrans-759
  prefs: []
  type: TYPE_NORMAL
  zh: '*h*[11] = *W*[11]*X*[11] + *W*[12]*X*[12] + *W*[21]*X*[21] + *W*[22]*X*[22]'
- en: '*h*[12] = *W*[11]*X*[12] + *W*[12]*X*[13] + *W*[21]*X*[22] + *W*[22]*X*[23]'
  id: totrans-760
  prefs: []
  type: TYPE_NORMAL
  zh: '*h*[12] = *W*[11]*X*[12] + *W*[12]*X*[13] + *W*[21]*X*[22] + *W*[22]*X*[23]'
- en: '*h*[21] = *W*[11]*X*[21] + *W*[12]*X*[22] + *W*[21]*X*[31] + *W*[22]*X*[32]'
  id: totrans-761
  prefs: []
  type: TYPE_NORMAL
  zh: '*h*[21] = *W*[11]*X*[21] + *W*[12]*X*[22] + *W*[21]*X*[31] + *W*[22]*X*[32]'
- en: '*h*[22] = *W*[11]*X*[22] + *W*[12]*X*[23] + *W*[21]*X*[32] + *W*[22]*X*[33]'
  id: totrans-762
  prefs: []
  type: TYPE_NORMAL
  zh: '*h*[22] = *W*[11]*X*[22] + *W*[12]*X*[23] + *W*[21]*X*[32] + *W*[22]*X*[33]'
- en: Note
  id: totrans-763
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: Here, we are performing the convolution operation without flipping the filter.
    This is also referred to as the cross-correlation operation in literature. The
    preceding figure is provided just for the sake of clarity.
  id: totrans-764
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们执行卷积操作时没有翻转滤波器。这在文献中也被称作交叉相关操作。前面的图只是为了清晰起见。
- en: Before moving further, make note of the following notations.
  id: totrans-765
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，请注意以下符号。
- en: '![$$ {\displaystyle \begin{array}{l}\partial {h}_{ij} represents\kern0.5em
    \frac{\partial L}{\partial {h}_{ij}}\\ {}\partial {w}_{ij} represents\kern0.5em
    \frac{\partial L}{\partial {w}_{ij}}\end{array}} $$](Images/484548_1_En_11_Chapter_TeX_IEq3.png)'
  id: totrans-766
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}\partial {h}_{ij} represents\kern0.5em
    \frac{\partial L}{\partial {h}_{ij}}\\ {}\partial {w}_{ij} represents\kern0.5em
    \frac{\partial L}{\partial {w}_{ij}}\end{array}} $$](Images/484548_1_En_11_Chapter_TeX_IEq3.png)'
- en: Now, for implementing the backpropagation step for the current layer, we can
    assume that we get 𝜕h as input (from the backward pass of the next layer), and
    our aim is to calculate *∂w* and *∂x*. It is important to understand that *∂x*
    (or *∂h* for the previous layer) would be the input for the backward pass of the
    previous layer. This is the core principle behind the success of backpropagation.
  id: totrans-767
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了实现当前层的反向传播步骤，我们可以假设我们得到了 𝜕h 作为输入（来自下一层的反向传播），我们的目标是计算 *∂w* 和 *∂x*。重要的是要理解
    *∂x*（或前一层中的 *∂h*）将是前一层反向传播的输入。这是反向传播成功背后的核心原理。
- en: '*∂W*[11] = *X*[11]*∂h*[11] + *X*[12]*∂h*[12] + *X*[21]*∂h*[21] + *X*[22]*∂h*[22]'
  id: totrans-768
  prefs: []
  type: TYPE_NORMAL
  zh: '*∂W*[11] = *X*[11]*∂h*[11] + *X*[12]*∂h*[12] + *X*[21]*∂h*[21] + *X*[22]*∂h*[22]'
- en: '*∂W*[12] = *X*[12]*∂h*[11] + *X*[13]*∂h*[12] + *X*[22]*∂h*[21] + *X*[23]*∂h*[22]'
  id: totrans-769
  prefs: []
  type: TYPE_NORMAL
  zh: '*∂W*[12] = *X*[12]*∂h*[11] + *X*[13]*∂h*[12] + *X*[22]*∂h*[21] + *X*[23]*∂h*[22]'
- en: '*∂W*[21] = *X*[21]*X*[11] + *X*[22]*∂h*[12] + *X*[31]*∂h*[21] + *X*[32]*∂h*[22]'
  id: totrans-770
  prefs: []
  type: TYPE_NORMAL
  zh: '*∂W*[21] = *X*[21]*X*[11] + *X*[22]*∂h*[12] + *X*[31]*∂h*[21] + *X*[32]*∂h*[22]'
- en: '*∂W*[22] = *X*[22]*X*[11] + *X*[23]*∂h*[12] + *X*[32]*∂h*[21] + *X*[33]*∂h*[22]'
  id: totrans-771
  prefs: []
  type: TYPE_NORMAL
  zh: '*∂W*[22] = *X*[22]*X*[11] + *X*[23]*∂h*[12] + *X*[32]*∂h*[21] + *X*[33]*∂h*[22]'
- en: Each weight in the filter contributes to each pixel in the output map. Thus,
    any change in weight in the filter will affect all the output pixels. Thus, all
    these changes add up to contribute to the final loss. Therefore, we can easily
    calculate the derivatives as follows.
  id: totrans-772
  prefs: []
  type: TYPE_NORMAL
  zh: 滤波器中的每个权重都对输出图中的每个像素有贡献。因此，滤波器中权重的任何变化都会影响所有输出像素。因此，所有这些变化加起来都会对最终损失做出贡献。因此，我们可以很容易地计算出以下导数。
- en: Weight Sharing Through Convolution and Its Advantages
  id: totrans-773
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过卷积进行权重共享及其优势
- en: Weight sharing through convolution greatly reduces the number of parameters
    in the convolutional neural network. Imagine we created a feature map of size
    *k* × *k* from an image of *n* × *n* size with full connections instead of convolutions.
    There would be *k*²*n*² weights for that one feature map alone, which are a lot
    of weights to learn. Instead, since in convolution the same weights are shared
    across locations defined by the filter kernel size, the number of parameters to
    learn is reduced by a huge factor. In cases of convolution, as in this scenario,
    we just need to learn the weights for the specific filter kernel. Since the filter
    size is relatively small with respect to the image, the number of weights is reduced
    significantly. For any image, we generate several feature maps corresponding to
    different filter kernels. Each filter kernel learns to detect a different kind
    of feature. The feature maps created are again convolved with other filter kernels
    to learn even more complex features in subsequent layers.
  id: totrans-774
  prefs: []
  type: TYPE_NORMAL
  zh: 通过卷积进行权重共享大大减少了卷积神经网络中的参数数量。想象一下，如果我们用一个大小为 *k* × *k* 的特征图从大小为 *n* × *n* 的图像中创建一个全连接而不是卷积，那么仅此一个特征图就会有
    *k*²*n*² 个权重，这需要学习很多权重。相反，由于在卷积中，相同的权重在由滤波器核大小定义的位置之间共享，因此需要学习的参数数量减少了巨大的因子。在这种情况下，例如，我们只需要学习特定滤波器核的权重。由于与图像相比，滤波器的大小相对较小，因此权重的数量显著减少。对于任何图像，我们都会生成几个与不同滤波器核相对应的特征图。每个滤波器核都学习检测不同类型的特征。创建的特征图再次与其他滤波器核卷积，以在后续层中学习更复杂的功能。
- en: Translation Equivariance and Invariance
  id: totrans-775
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 平移等变性和不变性
- en: The convolution operation provides translational equivariance . That is, if
    a feature *Z*[1] in an input produces a specific feature *Z*[2] in the output,
    then even if feature *Z*[1] is translated around in the image, feature *Z*[2]
    would continue to be generated at different locations of the output (Figure [11-22](#Fig22)).
  id: totrans-776
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积操作提供平移等变性。也就是说，如果一个输入中的特征 *Z*[1] 产生输出中的特定特征 *Z*[2]，那么即使特征 *Z*[1] 在图像中进行了平移，特征
    *Z*[2] 仍然会在输出中的不同位置继续生成（见图 [11-22](#Fig22)）。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig23_HTML.jpg](Images/484548_1_En_11_Fig23_HTML.jpg)'
  id: totrans-777
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig23_HTML.jpg](Images/484548_1_En_11_Fig23_HTML.jpg)'
- en: Figure 11-23
  id: totrans-778
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-23
- en: Equivariance
  id: totrans-779
  prefs: []
  type: TYPE_NORMAL
  zh: 等变性
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig22_HTML.jpg](Images/484548_1_En_11_Fig22_HTML.jpg)'
  id: totrans-780
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig22_HTML.jpg](Images/484548_1_En_11_Fig22_HTML.jpg)'
- en: Figure 11-22
  id: totrans-781
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-22
- en: Invariance
  id: totrans-782
  prefs: []
  type: TYPE_NORMAL
  zh: 不变性
- en: 'Convolution still produces the same feature for the digit, irrespective of
    the translation. This property of convolution is called translational equivariance.
    In fact, if the digit is represented by a set of pixel intensities, *x*, and *f*
    is the translation operation on *x*, while *g* is the convolution operation with
    a filter kernel, then the following holds true for convolution: *g*(*f*(*x*)) = *f*(*g*(*x*)).'
  id: totrans-783
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积仍然为数字产生相同的特征，无论平移如何。这种卷积的性质被称为平移等变性。实际上，如果数字由一组像素强度 *x* 表示，*f* 是对 *x* 的平移操作，而
    *g* 是与滤波器核的卷积操作，那么对于卷积以下等式成立：*g*(*f*(*x*)) = *f*(*g*(*x*))。
- en: In our case, *f*(*x*) produces the translated plan in the Figure [11-23](#Fig23)
    and the translated plan is convolved through g to produce the activated feature
    for the same plan, as seen in the other figure. This activated feature for the
    plan (i.e., (*f*(*x*))) could also have been achieved by translating the activated
    figure (i.e., *g*(*x*)) through the same translation *f*.
  id: totrans-784
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的案例中，*f*(*x*)生成了图 [11-23](#Fig23) 中的转换计划，并且转换计划通过 g 卷积生成了相同计划的激活特征，如其他图中所示。这个计划的激活特征（即，(*f*(*x*)))也可以通过将激活图像（即，*g*(*x*))通过相同的转换
    *f* 进行转换来获得。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig24_HTML.jpg](Images/484548_1_En_11_Fig24_HTML.jpg)'
  id: totrans-785
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig24_HTML.jpg](Images/484548_1_En_11_Fig24_HTML.jpg)'
- en: Figure 11-24
  id: totrans-786
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-24
- en: The advantage of the pooling layer that solves the invariance
  id: totrans-787
  prefs: []
  type: TYPE_NORMAL
  zh: 解决不变性的池化层的优势
- en: Pooling provides some form of translational invariance based on the receptor
    field kernel size of the pooling. Let’s take the case of max pooling. The digits
    in Figure [11-24](#Fig24) at a specific position are detected through convolution
    filters in both sides but are not equal, and that’s the problem of the convolutional
    layers; but if you took a closer look you can see that the pooling layers extract
    a similar value to each other. In this way, max pooling provides some translational
    invariance to feature detection if the translation distance is not very high with
    respect to the size of the receptor field or kernel for max pooling.
  id: totrans-788
  prefs: []
  type: TYPE_NORMAL
  zh: 池化基于池化感受野核的大小提供某种形式的平移不变性。让我们以最大池化为例。图 [11-24](#Fig24) 中特定位置的数字通过两边的卷积滤波器检测到，但并不相等，这就是卷积层的问题；但如果你仔细观察，你可以看到池化层提取了彼此相似的价值。以这种方式，最大池化在平移距离相对于感受野或最大池化核的大小不是很高的情况下，为特征检测提供了某种平移不变性。
- en: Similarly, average pooling takes the average of the values in a locality of
    a feature map based on the size of the receptor field kernel. So, if a specific
    feature is detected by high values in its feature map in a locality—let’s say
    at regions of edges—then the averages would continue to be high even if the image
    were a little translated.
  id: totrans-789
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，平均池化基于感受野核的大小，对特征图局部区域的值进行平均。所以，如果某个特定特征在其特征图的一个局部区域（比如边缘区域）通过高值被检测到，那么即使图像略有平移，平均值也会继续很高。
- en: Case Study—Digit Recognition on the CIFAR-10 Dataset
  id: totrans-790
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究——在 CIFAR-10 数据集上的数字识别
- en: The first thing to do in any project or experiment is import all the needed
    packages. We will import TensorFlow and NumPy for all the deep learning model
    building and matrix operations; also, we need matplotlib for plotting the analysis
    and results. And we will load the rebuilt CIFAR-10 dataset in the `keras.dataset`
    module in TensorFlow for the sake of ease and simplicity.
  id: totrans-791
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何项目或实验中要做的第一件事是导入所有需要的包。我们将导入 TensorFlow 和 NumPy 用于所有深度学习模型构建和矩阵操作；此外，我们还需要
    matplotlib 来绘制分析和结果。我们将使用 TensorFlow 中的 `keras.dataset` 模块轻松简单地加载重建的 CIFAR-10
    数据集。
- en: '[PRE31]'
  id: totrans-792
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: After importing all the packages, we now need to load the dataset, and if you
    are using this for the first time, it is probably going to download the dataset
    in your machine.
  id: totrans-793
  prefs: []
  type: TYPE_NORMAL
  zh: 在导入所有包之后，我们现在需要加载数据集，如果你是第一次使用，它可能会在你的机器上下载数据集。
- en: '[PRE32]'
  id: totrans-794
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: 'After doing all this, you are ready to build the model. We are going to build
    a class that should define the model and run it too, as well as extracting the
    analysis and reporting the progress. The class `CifarNet` contains three functions
    as follows:'
  id: totrans-795
  prefs: []
  type: TYPE_NORMAL
  zh: 完成所有这些后，你就可以构建模型了。我们将构建一个类，该类应该定义模型并运行它，以及提取分析和报告进度。`CifarNet` 类包含以下三个函数：
- en: '*Init*: Function that is responsible for getting and setting conv variables
    (weights)'
  id: totrans-796
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*初始化*：负责获取和设置卷积变量（权重）的函数'
- en: '*Forward*: Function that is responsible for creating the model architecture'
  id: totrans-797
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*前言*：负责创建模型架构的函数'
- en: '*Run*: Function that runs the model and returns the report of running'
  id: totrans-798
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*运行*：运行模型并返回运行报告的函数'
- en: '[PRE33]'
  id: totrans-799
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Now we need to run the class. First we will initialize the class and create
    X and y variables for the dataset.
  id: totrans-800
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要运行这个类。首先，我们将初始化类并创建用于数据集的X和y变量。
- en: '[PRE34]'
  id: totrans-801
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Then we will call the `forward` function to create the model architecture as
    follows.
  id: totrans-802
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将调用`forward`函数来创建以下模型架构。
- en: '[PRE35]'
  id: totrans-803
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: After that, we will create all the needed hyperparameters the model uses, such
    as learning rate, optimizer type, etc.
  id: totrans-804
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将创建模型使用的所有需要的超参数，例如学习率、优化器类型等。
- en: '[PRE36]'
  id: totrans-805
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Now we will train the model with 10 epochs as a start, to check if the model
    is running correctly. If you have low computational power, we recommend you run
    the model with just 1 or 2 epochs to test if it’s functionally running correct.
  id: totrans-806
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将以10个epoch作为起点来训练模型，以检查模型是否运行正确。如果你计算能力较低，我们建议你只运行1或2个epoch来测试其功能是否正确运行。
- en: '[PRE37]'
  id: totrans-807
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: If the model is running correctly, you will see the following output per each
    epoch the model passes (Figure [11-25](#Fig25)).
  id: totrans-808
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型运行正确，你将看到每个epoch模型通过时的以下输出（图[11-25](#Fig25)）。
- en: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig25_HTML.jpg](Images/484548_1_En_11_Fig25_HTML.jpg)'
  id: totrans-809
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_11_Chapter/484548_1_En_11_Fig25_HTML.jpg](Images/484548_1_En_11_Fig25_HTML.jpg)'
- en: Figure 11-25
  id: totrans-810
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-25
- en: The loss/mini-batch per epoch
  id: totrans-811
  prefs: []
  type: TYPE_NORMAL
  zh: 每个epoch的损失/mini-batch
- en: '[PRE38]'
  id: totrans-812
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: With the preceding basic convolutional neural network, which comprises two convolutional–max
    pooling–ReLU pairs along with a fully connected layer before the final output
    softmax unit, we can achieve a test-set high accuracy in just 20 to 30 epochs.
    And if you have low computational power, you can always use the cloud to train
    a larger bunch of epochs.
  id: totrans-813
  prefs: []
  type: TYPE_NORMAL
  zh: 使用前面提到的基本卷积神经网络，它包含两个卷积-最大池化-ReLU对，并在最终的输出softmax单元之前有一个全连接层，我们可以在仅仅20到30个epoch内实现测试集的高准确率。如果你计算能力较低，你总是可以使用云来训练更多的epoch。
- en: One more thing to emphasize is the importance of tuning the model with the correct
    set of hyperparameters and prior information. Parameters such as learning rate
    selection can be very tricky, since the cost function for neural networks is generally
    nonconvex. A large learning rate can lead to faster convergence to a local minimum
    but might introduce oscillations, whereas a low learning rate will lead to very
    slow convergence. Ideally, the learning rate should be low enough that network
    parameters can converge to a meaningful local minimum, and at the same time it
    should be high enough that the models can reach the minima faster. Generally,
    for the preceding neural network a learning rate of 0.01 is a little on the higher
    side, but since we are only training the data on 20 epochs, it works well. A lower
    learning rate wouldn’t have achieved such a high accuracy with just 10 epochs.
    Similarly, the batch size chosen for the mini-batch version of stochastic gradient
    descent influences the convergence of the training process. A larger batch size
    might be good, since the gradient estimates are less noisy; however, it may come
    at the cost of increased computation. One also needs to try out different filter
    sizes as well as experiment with different numbers of feature maps in each convolutional
    layer. The kind of model architecture we choose works as prior knowledge to the
    network.
  id: totrans-814
  prefs: []
  type: TYPE_NORMAL
  zh: 另一点需要强调的是，使用正确的超参数集和先验信息调整模型的重要性。例如，学习率的选择可能非常棘手，因为神经网络的成本函数通常是非凸的。较大的学习率可以更快地收敛到局部最小值，但可能会引入振荡，而较低的学习率会导致非常缓慢的收敛。理想情况下，学习率应该足够低，以便网络参数可以收敛到一个有意义的局部最小值，同时它应该足够高，以便模型可以更快地达到最小值。通常，对于前面的神经网络，0.01的学习率稍微有点高，但鉴于我们只训练了20个epoch的数据，它效果很好。较低的学习率不会在仅仅10个epoch内达到如此高的准确率。同样，为随机梯度下降的mini-batch版本选择的小批量大小会影响训练过程的收敛。较大的批量大小可能更好，因为梯度估计的噪声更少；然而，这也可能以增加计算为代价。还需要尝试不同的滤波器大小，以及在每个卷积层中实验不同的特征图数量。我们选择的那种模型架构作为网络的前置知识。
- en: Summary
  id: totrans-815
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we introduced the fundamental of how neural networks deal with
    images—data-matrices in general—and we introduced the modification needed for
    it. We showed you the transformation from regular image processing techniques
    and filters to convolutional neural networks and discussed it in detail.
  id: totrans-816
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们介绍了神经网络如何处理图像的基本原理——通常是数据矩阵，并介绍了为此所需的修改。我们展示了从常规图像处理技术和滤波器到卷积神经网络的转换，并对其进行了详细讨论。
- en: In the next chapter, we will go through how neural networks deal with sequences
    and text data.
  id: totrans-817
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一章中，我们将探讨神经网络如何处理序列和文本数据。
- en: 12. Sequential Models
  id: totrans-818
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12. 顺序模型
- en: Recurrent Neural Networks
  id: totrans-819
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 循环神经网络
- en: So why do we need a recurrent neural network (RNN)? Let’s try to answer that
    with an example, or analogy. When reading a new article, people have two options.
    First, if they can’t understand it, they can read articles that the new article
    is based on, for background information. Otherwise, they *do* understand the new
    article, based on some prior knowledge of the subject, without an immediate need
    to read similar articles. In both cases, their ability to understand the new article
    is enabled by some preexisting or preaquired knowledge. But they don’t need to
    go back to the phase of learning alphabets or numbers; they only need to know
    what this article is about. This is the way recurrent neural networks work.
  id: totrans-820
  prefs: []
  type: TYPE_NORMAL
  zh: 那么为什么我们需要循环神经网络（RNN）呢？让我们通过一个例子或类比来尝试回答这个问题。当阅读一篇新文章时，人们有两个选择。首先，如果他们不理解它，他们可以阅读基于新文章的文章，以获取背景信息。否则，他们基于对主题的一些先验知识，不需要立即阅读类似的文章就能理解新文章。在两种情况下，他们理解新文章的能力都是由一些预先存在或预先获得的知识所赋予的。但他们不需要回到学习字母或数字的阶段；他们只需要知道这篇文章是关于什么的。这就是循环神经网络工作的方式。
- en: RNNs add an interesting twist to basic neural networks. The neural network takes
    in a fixed size vector as input, which limits its usage in situations that involve
    a “series” type input with no predetermined size. RNNs are designed to take a
    series of inputs with no predetermined limit on size. But one may wonder if you
    can just repeat the traditional neural network. Yes you can, but you will miss
    the concept of series. Series means every input is a neighbor to another input.
    So, if you repeat this neural network more than once, you will miss the series.
    Inputs mean many inputs to the neural network, not series input, so the RNN is
    a sequential model network. An RNN remembers the past, and its decisions are influenced
    by what it has learned from the past. Let’s say that basic feedforward networks
    “remember” things too; they remember things they learned during training. For
    example, an image classifier learns what a “1” looks like during training and
    then uses that knowledge to classify things in production. Now let’s see about
    the RNN and its types.
  id: totrans-821
  prefs: []
  type: TYPE_NORMAL
  zh: RNN为基本的神经网络增添了有趣的转折。神经网络以固定大小的向量作为输入，这限制了它在涉及无预定大小“序列”类型输入的情况下的使用。RNN被设计成可以接受一系列输入，没有预定的大小限制。但有人可能会想，你能否只是重复传统的神经网络。是的，你可以，但你将错过序列的概念。序列意味着每个输入都是另一个输入的邻居。所以，如果你重复这个神经网络多次，你将错过序列。输入意味着许多输入到神经网络中，而不是序列输入，因此RNN是一个顺序模型网络。RNN记得过去，它的决策受到它从过去学到的内容的影响。让我们假设基本的前馈网络“记得”事情；它们记得在训练期间学到的内容。例如，图像分类器在训练期间学习“1”看起来像什么，然后使用这些知识在生产中对事物进行分类。现在让我们来看看RNN及其类型。
- en: RNNs can take one or more input vectors and produce one or more output vectors,
    and the output(s) are influenced by **weights applied on inputs and “hidden” state
    vectors** representing the context based on prior input(s) and output(s). So,
    the same input could produce a different output, depending on **previous inputs
    in the series.** This is the “series” aspect of an RNN. Now, *how can we create
    the layers of an RNN?* First of all, the RNN looks quite similar to a traditional
    neural network except that a memory state is added to the neurons. Imagine a simple
    model with only one neuron, fed by a batch of data. In a traditional neural network,
    the model produces the output by multiplying the input with the weight and the
    activation function. With an **RNN**, this output is sent back to itself a number
    of times. **Time step** is the amount of time the output becomes the input of
    the next matrices multiplication. Let’s visualize what happens. Say the network
    is composed of one neuron. The network computes the matrices multiplication between
    the input and the weight and adds nonlinearity with the activation function. It
    becomes the output at *t* − 1\. This output is the input of the second matrices
    multiplication.
  id: totrans-822
  prefs: []
  type: TYPE_NORMAL
  zh: RNN 可以接受一个或多个输入向量，并产生一个或多个输出向量，输出（s）受输入上应用的 **权重和表示基于先前输入（s）和输出（s）的上下文的“隐藏”状态向量**
    的影响。因此，相同的输入可能会产生不同的输出，这取决于 **系列中的先前输入**。这是 RNN 的“系列”方面。现在，*我们如何创建 RNN 的层呢？* 首先，RNN
    在外观上与传统神经网络非常相似，只是增加了一个记忆状态到神经元中。想象一个只有一个神经元、由一批数据馈入的简单模型。在一个传统神经网络中，模型通过将输入与权重相乘并添加激活函数来产生输出。在
    **RNN** 中，这个输出被多次发送回自身。**时间步** 是输出成为下一个矩阵乘法输入的时间量。让我们可视化一下会发生什么。假设网络由一个神经元组成。网络计算输入和权重之间的矩阵乘法，并使用激活函数添加非线性。它成为
    *t* − 1 的输出。这个输出是第二个矩阵乘法的输入。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig1_HTML.jpg](Images/484548_1_En_12_Fig1_HTML.jpg)'
  id: totrans-823
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig1_HTML.jpg](Images/484548_1_En_12_Fig1_HTML.jpg)'
- en: Figure 12-1
  id: totrans-824
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-1
- en: The abstraction of an RNN
  id: totrans-825
  prefs: []
  type: TYPE_NORMAL
  zh: RNN 的抽象
- en: Figure [12-1](#Fig1) shows an abstract explanation of when you have an input
    and an output; input means batch, but batch per time. Figure [12-2](#Fig2) shows
    the RNN cell in more detail.
  id: totrans-826
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [12-1](#Fig1) 展示了当有输入和输出时的抽象解释；输入意味着批量，但每个时间步的批量。图 [12-2](#Fig2) 更详细地展示了 RNN
    细胞。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig2_HTML.jpg](Images/484548_1_En_12_Fig2_HTML.jpg)'
  id: totrans-827
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig2_HTML.jpg](Images/484548_1_En_12_Fig2_HTML.jpg)'
- en: Figure 12-2
  id: totrans-828
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-2
- en: The details inside an RNN
  id: totrans-829
  prefs: []
  type: TYPE_NORMAL
  zh: RNN 内部的细节
- en: Now let’s explain it in detail, but we will look at it from end to start. We
    cache the output from *softmax* and the output from *tanh* . You can say we save![$$
    {\hat{y}}^t $$](Images/484548_1_En_12_Chapter_TeX_IEq1.png) and *a*^(*t*) to the
    cache to use it in the next state. The next state will take those two parameters
    as input and multiply the (a) parameter, which will be the *a*^(*t* − 1) with
    the weight of this state. At the same time, we multiply the input vector with
    the weight of this state, combine those two parameters with the bias, and apply
    the tanh activation function on them. This will generate the next activation (a)
    and apply *softmax* on it to generate the predicted (y), and cache them to the
    next state of RNN and back again with this cycle from end to start.
  id: totrans-830
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来详细解释一下，但我们将从后往前看。我们缓存了来自 *softmax* 和 *tanh* 的输出。你可以说是我们保存了[$$ {\hat{y}}^t
    $$](Images/484548_1_En_12_Chapter_TeX_IEq1.png) 和 *a*^(*t*) 到缓存中，以便在下一个状态中使用。下一个状态将使用这两个参数作为输入，并将
    (a) 参数（这将变为 *a*^(*t* − 1)）与这个状态的权重相乘。同时，我们将输入向量与这个状态的权重相乘，将这两个参数与偏置结合，并对它们应用 tanh
    激活函数。这将生成下一个激活 (a)，并对其应用 *softmax* 以生成预测的 (y)，并将它们缓存到 RNN 的下一个状态，然后从这个循环的末尾开始再次返回。
- en: So, now that we’ve seen only one cell and had a brief look at its functions,
    let’s connect this cell with other cells and get a big recurrent neural network.
    You will see that in real life the sequence of data goes from the input and generates
    new output every time step. This is an RNN, which depends on time and a series
    of data. Figure [12-3](#Fig3) will make the idea more visible.
  id: totrans-831
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，既然我们已经看到了一个细胞，并且对其功能进行了简要的观察，让我们将这个细胞与其他细胞连接起来，得到一个大的循环神经网络。你会发现，在现实生活中，数据序列从输入开始，并在每个时间步生成新的输出。这是一个
    RNN，它依赖于时间和一系列数据。图 [12-3](#Fig3) 将使这个想法更加明显。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig3_HTML.jpg](Images/484548_1_En_12_Fig3_HTML.jpg)'
  id: totrans-832
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig3_HTML.jpg](Images/484548_1_En_12_Fig3_HTML.jpg)'
- en: Figure 12-3
  id: totrans-833
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-3
- en: A sequence of RNN cells
  id: totrans-834
  prefs: []
  type: TYPE_NORMAL
  zh: 一系列RNN单元
- en: This figure explains how the connection between the activation is generated
    from a state, goes through the next state, and generates a new predicted output
    (y). This makes a series, as we talked about previously. Now that you know the
    structure of the RNN, you should know that there is more than one type of RNN.
    You need to know the size of the input the RNN needs and the size of the output
    that you predicted from the RNN.
  id: totrans-835
  prefs: []
  type: TYPE_NORMAL
  zh: 此图解释了激活与状态之间的连接是如何生成的，经过下一个状态，并生成一个新的预测输出（y）。这形成了一个序列，正如我们之前所讨论的。现在你了解了RNN的结构，你应该知道RNN不止一种类型。你需要知道RNN需要的输入大小以及从RNN预测的输出大小。
- en: We have three types of RNN. The first type is fully recurrent networks. In this
    type the layered topology of a multilayer perceptron is preserved, but every element
    has a weighted connection to every other element in the architecture and has a
    single feedback connection to itself. Not all connections are trained, and the
    extreme nonlinearity of the error derivatives means conventional backpropagation
    will not work, so the backpropagation through time approach or stochastic gradient
    descent is employed.
  id: totrans-836
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有三种类型的RNN。第一种类型是全递归网络。在这种类型中，多层感知器的分层拓扑结构被保留，但每个元素都与架构中的每个其他元素有加权连接，并且有一个反馈连接到自身。并非所有连接都会被训练，并且误差导数的极端非线性意味着传统的反向传播将不起作用，因此采用时间反向传播方法或随机梯度下降。
- en: The next type is recursive neural networks. First, you should know that recurrent
    neural networks are linear architecturally; the recursion promotes branching in
    hierarchical feature spaces and the resulting network architecture mimics this
    as training proceeds. Training is achieved with gradient descent by subgradient
    methods.
  id: totrans-837
  prefs: []
  type: TYPE_NORMAL
  zh: 下一种类型是递归神经网络。首先，你应该知道递归神经网络在架构上是线性的；递归促进了层次特征空间中的分支，并且随着训练的进行，网络架构模仿了这一点。训练是通过梯度下降和子梯度方法实现的。
- en: The last type is the neural history compressor. Jüergen *Schmidhuber* reported
    a very deep learner, first in 1991, that was able to perform credit assignment
    over hundreds of neural layers by unsupervised pretraining for a hierarchy of
    RNNs. Each RNN is trained unsupervised to predict the next input. Then, only inputs
    generating an error are feedforward, conveying new information to the next RNN
    in the hierarchy, which then processes at a slower, self-organizing time scale.
  id: totrans-838
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一种类型是神经网络历史压缩器。Jüergen *Schmidhuber* 报告了一个非常深的学习者，首次在1991年，它能够通过无监督预训练RNN的层次结构来进行数百个神经层的信用分配。每个RNN都是无监督训练以预测下一个输入。然后，只有产生错误的输入才会前馈，将新信息传递给层次结构中的下一个RNN，然后以较慢、自组织的时标进行处理。
- en: It was shown that no information is lost, just compressed. The RNN stack is
    a “deep generative model” of the data. The data can be reconstructed from the
    compressed form.
  id: totrans-839
  prefs: []
  type: TYPE_NORMAL
  zh: 已经证明没有信息丢失，只是被压缩了。RNN堆栈是数据的“深度生成模型”。数据可以从压缩形式重建。
- en: 'Before we finish this section, we need to talk about the five types of RNN
    architecture (Figure [12-4](#Fig4)). Each type is best for certain uses, like
    many to many as an encoder or decoder and many to one for LSTM. So let’s talk
    about each type and what it consists of. One to one is recursive, but it takes
    only one input and produces only one output. The next type is one to many: it
    takes one input and produces many outputs. Many to one has many inputs and generates
    only one output. Many to many actually has two types, or two architectures: one
    is called many to many. One of them is fully connected, which is used in video
    recognition; the second type is partially connected, which is used in machine
    translation.'
  id: totrans-840
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们完成本节之前，我们需要讨论五种类型的RNN架构（图[12-4](#Fig4)）。每种类型最适合某些用途，例如，作为编码器或解码器的多对多，以及用于LSTM的多对一。所以让我们讨论每种类型及其组成。一对一递归，但它只接受一个输入并产生一个输出。下一类型是一对多：它接受一个输入并产生多个输出。多对一有多个输入并生成一个输出。多对多实际上有两种类型，或两种架构：一种是称为多对多。其中一种是全连接，用于视频识别；第二种类型是部分连接，用于机器翻译。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig4_HTML.jpg](Images/484548_1_En_12_Fig4_HTML.jpg)'
  id: totrans-841
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig4_HTML.jpg](Images/484548_1_En_12_Fig4_HTML.jpg)'
- en: Figure 12-4
  id: totrans-842
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-4
- en: The different types of sequences architectures
  id: totrans-843
  prefs: []
  type: TYPE_NORMAL
  zh: 序列架构的不同类型
- en: Unfortunately, we know that RNN is supposed to carry the information up to time.
    However, it is quite challenging to propagate all this information when the time
    step is too long. When a network has too many deep layers, it becomes untrainable.
    This problem is called the vanishing gradient problem. If you remember, the neural
    network updates the weight using the gradient descent algorithm. The gradients
    grow smaller when the network progresses down to lower layers. This all is useful
    information to know about RNNs and their architectures. But simply put, an RNN
    is just a sequential model that we use in language models because we need sequential,
    or series, in a language model. So let’s talk about language modeling and how
    RNNs are important in it.
  id: totrans-844
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们知道RNN应该携带信息到时间点。然而，当时间步长太长时，传播所有这些信息是非常具有挑战性的。当一个网络有太多的深层时，它就变得无法训练。这个问题被称为梯度消失问题。如果你记得，神经网络使用梯度下降算法更新权重。当网络向下进展到较低的层时，梯度会变得越来越小。这些都是关于RNN及其架构的有用信息。但简单来说，RNN只是一个我们用于语言模型的序列模型，因为我们需要在语言模型中有序列，或者说系列。那么，让我们来谈谈语言模型以及RNN在其中的重要性。
- en: Language Modeling
  id: totrans-845
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 语言模型
- en: 'For simplification, language modeling is the task of predicting the next word
    or character in a document. A language model is a conditional distribution on
    the identifier of the *i*^(*th*) word in a sequence, given the identities of all
    previous words. In language modeling, the probability of a sequence of words is
    computed through the product rule of the intersection of events. The probability
    of a sequence of words {*w*[1], *w*[2], *w*[3], …, *w*[*n*]} of length n is given
    as follows:'
  id: totrans-846
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化，语言模型是预测文档中下一个单词或字符的任务。语言模型是在给定序列中所有先前单词的身份的情况下，对第*i*个单词的标识符的条件分布。在语言模型中，通过事件的交集乘积规则计算单词序列的概率。长度为n的单词序列{*w*[1],
    *w*[2], *w*[3], …, *w*[*n*]}的概率如下所示：
- en: '![$$ P\left({w}_1,\kern0.5em {w}_2,\kern0.5em {w}_3,..,{w}_n\right)=P\left({w}_1\right)P\left({w}_2|{w}_1\right)P\left({w}_3|{w}_1^2\right)\dots
    P\left({w}_n|{w}_1^{n-1}\right) $$](Images/484548_1_En_12_Chapter_TeX_IEq2.png)'
  id: totrans-847
  prefs: []
  type: TYPE_IMG
  zh: '![P(w1, w2, w3,..,wn)=P(w1)P(w2|w1)P(w3|w1^2)…P(wn|w1^(n-1))] (Images/484548_1_En_12_Chapter_TeX_IEq2.png)'
- en: 'So, language models assign probabilities to the sequences of words. But let’s
    see the types of language models and how the sequence works with each type. We
    have three types. The simplest model that assigns these probabilities to sentences
    or sequence of words is an **N-Gram**. An N-gram is a sequence of *N* words; a
    *bi-gram* (or **bigram**) is a two-word sequence of words like “please turn,”
    “turn your,” or “your homework”; and a tri-gram (or trigram) is a three-word sequence
    of words like “please turn your,” or “turn your homework.” But what’s the key
    connection between them and the RNN, or sequence model? Let’s start with the easiest
    one: an N-gram’s task is to compute *P*(*w*| *h*), the probability of a word *w*^∗
    given some history *h*^∗. Suppose the history *h*^∗ is ^“*its water is so transperant
    that*^” and we want to know the probability that the next word is the, it can
    be represented as:'
  id: totrans-848
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，语言模型为单词序列分配概率。但让我们看看语言模型的类型以及序列如何与每种类型一起工作。我们有三种类型。将这些概率分配给句子或单词序列的最简单模型是**N-Gram**。N-gram是*N*个单词的序列；一个*bigram*（或**bigram**）是两个单词的序列，如“请转动”，“转动你的”，或“你的作业”；而一个tri-gram（或trigram）是三个单词的序列，如“请转动你的”，或“转动你的作业”。但它们与RNN或序列模型之间的关键联系是什么？让我们从最简单的一个开始：N-gram的任务是计算*P*(*w*|
    *h*), 给定一些历史*h*^∗的单词*w*^∗的概率。假设历史*h*^∗是“它的水是如此透明以至于”，我们想知道下一个单词是“the”的概率，它可以表示为：
- en: '![$$ P\left( the| its\  water\ is\  so\  transperant\ that\right) $$](Images/484548_1_En_12_Chapter_TeX_Equa.png)'
  id: totrans-849
  prefs: []
  type: TYPE_IMG
  zh: '![P(the| its water is so transperant that)](Images/484548_1_En_12_Chapter_TeX_Equa.png)'
- en: 'One way to estimate the preceding function is through the relative frequency
    counts, where we would take a substantial corpus, count the number of times we
    see “its water is so transperant that,” and then count the number of times it
    is followed by “the”:'
  id: totrans-850
  prefs: []
  type: TYPE_NORMAL
  zh: 估计前述函数的一种方法是通过相对频率计数，我们会选取一个大量的语料库，计算“它的水是如此透明以至于”出现的次数，然后计算它后面跟着“the”的次数：
- en: '![$$ P\left( its\  water\ is\  so\  transperant\ that\right)=\frac{C\left(
    its\  water\ is\  so\  transperant\ that\ the\right)}{C\left( its\  water\ is\  so\  transperant\
    that\right)} $$](Images/484548_1_En_12_Chapter_TeX_Equb.png)'
  id: totrans-851
  prefs: []
  type: TYPE_IMG
  zh: '![其水如此透明，以至于](Images/484548_1_En_12_Chapter_TeX_Equb.png)'
- en: 'But it isn’t feasible to do this task; we have many groups and we need to perform
    this task every single group! So, you do it by using the chain rule of probability:'
  id: totrans-852
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，执行这项任务并不实际；我们有很多组，我们需要为每个组单独执行这项任务！所以，你可以通过使用概率的链式法则来实现：
- en: '![$$ P\left({w}_1,\dots, {w}_n\right)=P\left({w}_1\right)P\left({w}_2|{w}_1\right)P\left({w}_3|{w}_1^2\right)P\left({w}_n|{w}_1^{n-1}\right)
    $$](Images/484548_1_En_12_Chapter_TeX_Equc.png)'
  id: totrans-853
  prefs: []
  type: TYPE_IMG
  zh: '![P(w1,...,wn)=P(w1)P(w2|w1)P(w3|w1^2)P(wn|w1^(n-1))](Images/484548_1_En_12_Chapter_TeX_Equc.png)'
- en: 'This serves as the base procedure of the N-Gram model, where instead of computing
    the probability of a word given its entire history, we will approximate the history
    by just the last few words. The bigram model approximates the probability of a
    word given all the previous words, by using only the conditional probability of
    the preceding word. We approximate it with the probability *P*(*w*[1] | *w*[*n* − 1]);
    like the example of “the” and “that,” you can do in a bi-gram *P*(*the* | *that*).
    You can do it by using the conditional probability:'
  id: totrans-854
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是 N-Gram 模型的基本过程，其中我们不是计算一个词在给定其整个历史背景下的概率，而是通过仅使用最后几个词来近似历史。二元模型通过仅使用前一个词的条件概率来近似一个词在所有前一个词条件下的概率。我们用概率
    *P*(*w*[1] | *w*[*n* − 1]) 来近似它；就像“the”和“that”的例子，你可以在二元组 *P*(*the* | *that*)
    中这样做。你可以通过使用条件概率来实现：
- en: '![$$ P\left({w}_n|{w}_1^{n-1}\right)\approx P\left({w}_n\ |{w}_{n-1}\right)
    $$](Images/484548_1_En_12_Chapter_TeX_Equd.png)'
  id: totrans-855
  prefs: []
  type: TYPE_IMG
  zh: '![P(wn|w1^(n-1))≈P(wn|wn-1)](Images/484548_1_En_12_Chapter_TeX_Equd.png)'
- en: 'A *trigram model* models language as a second-order Markov process, making
    the computationally convenient approximation that a word depends only on the previous
    two words. And you can use it with this equation:'
  id: totrans-856
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 *trigram 模型* 将语言建模为二阶马尔可夫过程，通过计算上方便的近似，即一个词只依赖于前两个词。你可以用这个方程来使用它：
- en: '![$$ P\left({w}_1^{n-1}\right)=P\left({w}_n\ |{w}_{n-1},{w}_n\right) $$](Images/484548_1_En_12_Chapter_TeX_Eque.png)'
  id: totrans-857
  prefs: []
  type: TYPE_IMG
  zh: '![P(w1^(n-1))=P(wn|wn-1,wn)](Images/484548_1_En_12_Chapter_TeX_Eque.png)'
- en: So these are the language models in natural language processing (NLP). But we
    didn’t talk about *uni-gram*, as we don’t need it for the sequence models, so
    at the end, we will see how RNN works with the language model and the importance
    of RNN in the language model, the aim of the language model is to predict the
    next word, so in N-gram we condition the word we need to predict based on the
    previous words. Therefore, the main reason for using an RNN is it’s sequential.
    This is analogous to the fact that the human brain does not start thinking from
    scratch for every word we say. Our thoughts have persistence. We’ll give this
    property of persistence to the neural network with the use of an RNN.
  id: totrans-858
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这些是自然语言处理（NLP）中的语言模型。但我们没有讨论 *unigram*，因为我们不需要它来进行序列模型，所以最后，我们将看到 RNN 如何与语言模型一起工作以及
    RNN 在语言模型中的重要性，语言模型的目标是预测下一个词，所以在 N-gram 中，我们根据前一个词来条件化我们需要预测的词。因此，使用 RNN 的主要原因就是它的顺序性。这与人类大脑不会为每个我们说的词从头开始思考的事实类似。我们的思维具有持续性。我们将通过使用
    RNN 将这种持续性属性赋予神经网络。
- en: A good example is “I had a good time in France. I also learned to speak some
    _____”. If we want to predict what word will go in the blank, we have to go all
    the way to the word France and then conclude that the most likely word will be
    French. In other words, we have to have some memory of our previous outputs and
    calculate new outputs based on our past outputs. Another advantage of using RNNs
    for language modeling is that, due to memory constraints, they are limited to
    remembering only a few steps back. This is ideal because the context of the word
    can be captured in the 8–10 words before it. We don’t have to remember 50 words
    of context, although RNNs can be used for arbitrarily long sequences if you have
    enough memory at your disposal. And don’t forget the design of the RNN (Figure
    [12-5](#Fig5)).
  id: totrans-859
  prefs: []
  type: TYPE_NORMAL
  zh: 一个很好的例子是“我在法国玩得很开心。我还学会了说一些_____”。如果我们想预测空白处将填入什么单词，我们必须追溯到单词France，然后得出最可能的单词将是French的结论。换句话说，我们必须记住我们之前的输出，并根据我们的过去输出计算新的输出。使用RNN进行语言建模的另一个优点是，由于内存限制，它们只能记住很少的步骤。这是理想的，因为单词的上下文可以在它之前的8-10个单词中捕捉到。我们不需要记住50个单词的上下文，尽管如果你有足够的内存，RNN可以用于任意长度的序列。而且别忘了RNN的设计（图[12-5](#Fig5)）。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig5_HTML.jpg](Images/484548_1_En_12_Fig5_HTML.jpg)'
  id: totrans-860
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig5_HTML.jpg](Images/484548_1_En_12_Fig5_HTML.jpg)'
- en: Figure 12-5
  id: totrans-861
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-5
- en: The unroll of the RNN sequence
  id: totrans-862
  prefs: []
  type: TYPE_NORMAL
  zh: RNN序列的展开
- en: In RNNs, the output at each step is conditioned on all previous words; hence,
    RNNs do a better job than the n-gram models at language model tasks. To understand
    this, let’s look at the working principals of a generative recurrent neural network
    while considering a sequence (*X* = {*x*[1], *x*[2], …, *x*[*n*]}) of length *n*.
    The RNN updates its hidden state ht recursively as ht=f(ht−1,xt). The hidden state
    *h*[*t* − 1] has information accumulated for the sequence of words {*x*[1], *x*[2],
    …, *x*[*t* − 1]}, and when the new word in the sequence *x*[*t*] arrives the updated
    sequence information {*x*[1], *x*[2], …, *x*[*t*]} is encoded in *h*[*t*] through
    the recursive update.
  id: totrans-863
  prefs: []
  type: TYPE_NORMAL
  zh: 在RNN中，每一步的输出都是基于所有之前的单词；因此，RNN在语言模型任务上做得比n-gram模型更好。为了理解这一点，让我们在考虑一个长度为n的序列（*X*
    = {*x*[1], *x*[2], …, *x*[*n*]）时，看看生成循环神经网络的工作原理。RNN递归地更新其隐藏状态ht，作为ht=f(ht−1,xt)。隐藏状态*h*[*t* − 1]包含了单词序列{*x*[1],
    *x*[2], …, *x*[*t* − 1]}的信息积累，当序列中的新单词*x*[*t*]到达时，通过递归更新，更新的序列信息{*x*[1], *x*[2],
    …, *x*[*t*]}被编码在*h*[*t*]中。
- en: Now we must predict the next word based on the word sequence seen so far.
  id: totrans-864
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们必须根据到目前为止看到的单词序列预测下一个单词。
- en: So now that we know the RNN is important for the language model task and have
    a good explanation for this type of RNN, we will talk about LSTM, GRU this the
    updates of the RNN in this chapter But for now let’s see how a new task works
    with an RNN—backpropagation through time (BPTT).
  id: totrans-865
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，既然我们知道循环神经网络对于语言模型任务很重要，并且对这种类型的RNN有很好的解释，我们将在本章中讨论LSTM、GRU，这是RNN的更新。但到目前为止，让我们看看一个新的任务如何与RNN一起工作——时间反向传播（BPTT）。
- en: Backpropagation Through Time
  id: totrans-866
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间反向传播
- en: Backpropagation through time, or BPTT, is the application of the backpropagation
    training algorithm to a recurrent neural network applied to sequence data like
    a time series. A recurrent neural network is shown one input each time step and
    predicts one output. Backpropagation for recurrent neural networks is the same
    as that for feedforward neural networks; the only difference is that the gradient
    is the sum of the gradient with respect to the log loss at each step. So, after
    having input and output every time step, errors are then calculated and accumulated
    for each time step. The network is rolled back up and the weights are updated.
  id: totrans-867
  prefs: []
  type: TYPE_NORMAL
  zh: 时间反向传播，或称BPTT，是将反向传播训练算法应用于循环神经网络，该神经网络用于处理序列数据，如时间序列。循环神经网络每次只展示一个输入，并预测一个输出。循环神经网络的反向传播与前馈神经网络相同；唯一的区别是梯度是每一步相对于对数损失的梯度的总和。因此，在每一步输入和输出之后，错误就会被计算并累积。然后网络回滚，权重被更新。
- en: 'Each time step of the unrolled recurrent neural network may be seen as an additional
    layer given the order dependence of the problem, and the internal state from the
    previous time step is taken as an input on the subsequent time step. Based on
    the predicted output and the actual output labels, the loss and the corresponding
    error at each time step is computed. The error at each time step is backpropagated
    to update the weights. So, any weight update is proportional to the sum of the
    gradients’ contribution from errors at all the T time steps. So, let’s go through
    some calculations about the loss function of RNNs. We mentioned before the tanh
    function and *softmax* function, so now let’s go through the loss function. We
    also defined our loss, or error, to be the cross-entropy loss, given by:'
  id: totrans-868
  prefs: []
  type: TYPE_NORMAL
  zh: 由于问题的顺序依赖性，展开的循环神经网络中的每个时间步可以看作是一个额外的层，并且前一时间步的内部状态被用作后续时间步的输入。基于预测输出和实际输出标签，计算每个时间步的损失和相应的误差。每个时间步的误差被反向传播以更新权重。因此，任何权重更新都与所有
    T 个时间步的误差贡献的梯度之和成比例。因此，让我们来计算一下 RNN 的损失函数。我们之前提到了 tanh 函数和 *softmax* 函数，现在让我们来讨论损失函数。我们还定义了我们的损失，或误差，为交叉熵损失，其表达式为：
- en: '![$$ {\displaystyle \begin{array}{l}{E}_t\left({y}_t,{\hat{y}}_t\right)=-{y}_t\;\log\;{\hat{y}}_t\\
    {}E\left(y,\hat{y}\right)=\sum \limits_t{E}_t\left({y}_t,{\hat{y}}_t\right)\\
    {}\kern2.28em =-\sum \limits_t{y}_t\;\log\;{\hat{y}}_t\end{array}} $$](Images/484548_1_En_12_Chapter_TeX_IEq3.png)'
  id: totrans-869
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}{E}_t\left({y}_t,{\hat{y}}_t\right)=-{y}_t\;\log\;{\hat{y}}_t\\
    {}E\left(y,\hat{y}\right)=\sum \limits_t{E}_t\left({y}_t,{\hat{y}}_t\right)\\
    {}\kern2.28em =-\sum \limits_t{y}_t\;\log\;{\hat{y}}_t\end{array}} $$](Images/484548_1_En_12_Chapter_TeX_IEq3.png)'
- en: Here, *y*[*t*] is the correct word at time step *t*, and *y*[*t*] is our prediction.
    We typically treat the full sequence (sentence) as one training example, so the
    total error is just the sum of the errors at each time step (word). Let’s see
    an illustration of an RNN (Figure [12-6](#Fig6)) to learn how to calculate the
    BPTT—the backpropagation.
  id: totrans-870
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，*y*[*t*] 是时间步 *t* 的正确单词，而 *y*[*t*] 是我们的预测。我们通常将整个序列（句子）视为一个训练示例，因此总误差只是每个时间步（单词）误差的总和。让我们通过一个
    RNN 的插图（图 [12-6](#Fig6)）来了解如何计算 BPTT——反向传播。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig6_HTML.jpg](Images/484548_1_En_12_Fig6_HTML.jpg)'
  id: totrans-871
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig6_HTML.jpg](Images/484548_1_En_12_Fig6_HTML.jpg)'
- en: Figure 12-6
  id: totrans-872
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-6
- en: Simple architecture of a model to describe back-propagation in it
  id: totrans-873
  prefs: []
  type: TYPE_NORMAL
  zh: 描述模型中反向传播的简单架构
- en: 'This is not a new idea, since we actually learned about it in the previous
    chapters. But let’s remember that we need to calculate the gradients of the error
    with respect to our parameters *U*, *V*, and *W* and then learn good parameters
    using stochastic gradient descent. Just as we sum up the errors, we also sum up
    the gradients at each time step for one training example:'
  id: totrans-874
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个新想法，因为我们实际上在之前的章节中就学到了它。但让我们记住，我们需要计算误差相对于我们的参数 *U*、*V* 和 *W* 的梯度，然后使用随机梯度下降学习良好的参数。就像我们累加误差一样，我们也累加每个时间步的梯度，以一个训练示例为例：
- en: '![$$ \frac{\partial E}{\partial W}=\sum \limits_t\frac{\partial {E}_t}{\partial
    W} $$](Images/484548_1_En_12_Chapter_TeX_IEq4.png)'
  id: totrans-875
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial E}{\partial W}=\sum \limits_t\frac{\partial {E}_t}{\partial
    W} $$](Images/484548_1_En_12_Chapter_TeX_IEq4.png)'
- en: To calculate these gradients, we use the chain rule of differentiation. That’s
    the backpropagation algorithm when applied backward, starting from the error.
    We’ll use E[3] as a figure, just to have concrete numbers to work with.
  id: totrans-876
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算这些梯度，我们使用微分链式法则。这就是反向传播算法，从误差开始反向应用。我们将使用 E[3] 作为示例，以便有具体的数字来工作。
- en: '![$$ {\displaystyle \begin{array}{l}\frac{\partial {E}_3}{\partial V}=\frac{\partial
    {E}_3}{\partial {\hat{y}}_3}\;\frac{\partial {\hat{y}}_3}{\partial V}\\ {}\kern1.2em
    =\frac{\partial {E}_3}{\partial {\hat{y}}_3}\;\frac{\partial {\hat{y}}_3}{\partial
    {z}_3}\frac{\partial {z}_3}{\partial V}\\ {}\kern1.32em =\left({\hat{y}}_3-{y}_3\right)\otimes
    {s}_3\end{array}} $$](Images/484548_1_En_12_Chapter_TeX_IEq5.png)'
  id: totrans-877
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\displaystyle \begin{array}{l}\frac{\partial {E}_3}{\partial V}=\frac{\partial
    {E}_3}{\partial {\hat{y}}_3}\;\frac{\partial {\hat{y}}_3}{\partial V}\\ {}\kern1.2em
    =\frac{\partial {E}_3}{\partial {\hat{y}}_3}\;\frac{\partial {\hat{y}}_3}{\partial
    {z}_3}\frac{\partial {z}_3}{\partial V}\\ {}\kern1.32em =\left({\hat{y}}_3-{y}_3\right)\otimes
    {s}_3\end{array}} $$](Images/484548_1_En_12_Chapter_TeX_IEq5.png)'
- en: 'In the preceding, *z*[3] = *Vs*[3], and *circled multiplication* is the outer
    product of two vectors. That’s intuitive, but the point is that *E*[3]*V* only
    depends on the values at the current time step: ![$$ {\hat{y}}_3 $$](Images/484548_1_En_12_Chapter_TeX_IEq6.png),
    *y*[3], *s*[3]. If you have these, calculating the gradient for *V* is a simple
    matrix multiplication. But the key point is to have this at first, as in the above
    calculation where ![$$ \frac{\partial {z}_3}{\partial V} $$](Images/484548_1_En_12_Chapter_TeX_IEq7.png)
    really depends on those three variables, so now let’s get more in-depth with calculations.
    *s*[3] =  *tanh* (*Ux*[*t*] + *Ws*[2]) depends on *s*[2], which depends on *W*
    and *s*[1], and so on. So, if we take the derivative with respect to *W*, we can’t
    simply treat *s*[3] as a constant! We need to apply the chain rule again and what
    we really have is this:'
  id: totrans-878
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面，*z*[3] = *Vs*[3]，而*圆圈乘法*是两个向量的外积。这是直观的，但关键点是 *E*[3]*V* 只取决于当前时间步的值：![$$
    {\hat{y}}_3 $$](Images/484548_1_En_12_Chapter_TeX_IEq6.png), *y*[3], *s*[3]。如果你有这些值，计算
    *V* 的梯度就是一个简单的矩阵乘法。但关键点是要首先有这个，就像上面的计算中 ![$$ \frac{\partial {z}_3}{\partial V}
    $$](Images/484548_1_En_12_Chapter_TeX_IEq7.png) 确实依赖于这三个变量，所以现在让我们通过计算来更深入地了解。*s*[3] =  *tanh* (*Ux*[*t*] + *Ws*[2])
    依赖于 *s*[2]，而 *s*[2] 依赖于 *W* 和 *s*[1]，依此类推。因此，如果我们对 *W* 求导，我们不能简单地将 *s*[3] 视为一个常数！我们需要再次应用链式法则，我们真正得到的是这个：
- en: '![$$ \frac{\partial {E}_3}{\partial W}=\sum \limits_{k=0}^3\frac{\partial {E}_3}{\partial
    {\hat{y}}_3}\;\frac{\partial {\hat{y}}_3}{\partial {s}_3}\;\frac{\partial {s}_3}{\partial
    {s}_k}\;\frac{\partial {s}_k}{\partial W} $$](Images/484548_1_En_12_Chapter_TeX_IEq8.png)'
  id: totrans-879
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial {E}_3}{\partial W}=\sum \limits_{k=0}^3\frac{\partial {E}_3}{\partial
    {\hat{y}}_3}\;\frac{\partial {\hat{y}}_3}{\partial {s}_3}\;\frac{\partial {s}_3}{\partial
    {s}_k}\;\frac{\partial {s}_k}{\partial W} $$](Images/484548_1_En_12_Chapter_TeX_IEq8.png)'
- en: We sum up the contributions of each time step to the gradient. In other words,
    because *W* is used in every step up to the output we care about, we need to backpropagate
    gradients from *t* = 3 through the network all the way to *t* = 0\. Let’s see
    a visualization (Figure [12-7](#Fig7)) to get a better understanding about it.
    You already know about backpropagation; the only key difference is the time between
    backpropagation and BPTT.
  id: totrans-880
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将每个时间步对梯度的贡献进行求和。换句话说，因为 *W* 在到达我们关心的输出之前的每个步骤都被使用，所以我们需要从 *t* = 3 通过网络反向传播梯度到
    *t* = 0。让我们通过一个可视化（图 [12-7](#Fig7)）来更好地理解这一点。你已经知道了反向传播；唯一的关键区别是反向传播和BPTT之间的时间。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig7_HTML.jpg](Images/484548_1_En_12_Fig7_HTML.jpg)'
  id: totrans-881
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig7_HTML.jpg](Images/484548_1_En_12_Fig7_HTML.jpg)'
- en: Figure 12-7
  id: totrans-882
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-7
- en: Feed backward backpropagation
  id: totrans-883
  prefs: []
  type: TYPE_NORMAL
  zh: 反向传播的反馈
- en: Note
  id: totrans-884
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意
- en: This is exactly the same as the standard backpropagation algorithm that we use
    in deep feedforward neural networks. The key difference is that we sum up the
    gradients for W at each time step.
  id: totrans-885
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我们在深度前馈神经网络中使用的标准反向传播算法完全相同。关键的区别是我们对每个时间步的 W 的梯度进行求和。
- en: 'In a traditional neural network, we don’t share parameters across layers, so
    we don’t need to sum anything. But in my opinion, BPTT is just a fancy name for
    standard backpropagation on an unrolled RNN. But we have a problem with this:
    BPTT can be computationally expensive as the number of time steps increases. If
    input sequences are comprised of thousands of time steps, then this will be the
    number of derivatives required for a single update weight update. This can cause
    weights to vanish or explode (go to zero or overflow) and make slow learning and
    model skill noisy. This gets us to a new version of BPTT that tries to eliminate
    or minimize the challenges that BPPT has. So, TBPTT (truncated backpropagation
    through time) is developed. TBPTT is a modified version of the BPTT training algorithm
    for recurrent neural networks, wherein the sequence is processed one time step
    at a time, and periodically (k1 time steps) the BPTT update is performed back
    for a fixed number of time steps (k2 time steps). So, we see it depends on the
    two variables: k1 and k2.'
  id: totrans-886
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的神经网络中，我们不会在层之间共享参数，因此我们不需要求和。但在我看来，BPTT只是对未展开RNN上的标准反向传播的一个花哨名称。但我们有一个问题：随着时间步数的增加，BPTT可能计算成本很高。如果输入序列由数千个时间步组成，那么这将是一个单次更新权重更新所需的导数数量。这可能导致权重消失或爆炸（变为零或溢出），并使学习缓慢和模型技能噪声。这使我们到达了BPTT的新版本，试图消除或最小化BPPT所面临的挑战。因此，TBPTT（时间截断反向传播）被开发出来。TBPTT是循环神经网络BPTT训练算法的修改版本，其中序列一次处理一个时间步，并在固定的时间步数（k2时间步）后，定期（k1时间步）执行BPTT更新。因此，我们看到它取决于两个变量：k1和k2。
- en: '**k1:** The number of forward-pass time steps between updates. Generally, this
    influences how slow or fast training will be, given how often weight updates are
    performed.'
  id: totrans-887
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**k1:** 更新之间的前向传递时间步数。通常，这会影响训练的快慢，取决于权重更新的频率。'
- en: '**k2:** The number of time steps to which to apply BPTT. Generally, it should
    be large enough to capture the temporal structure in the problem for the network
    to learn. Too large a value results in vanishing gradients.'
  id: totrans-888
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**k2:** 应用BPTT的时间步数。通常，它应该足够大，以便网络能够学习问题中的时间结构。过大的值会导致梯度消失。'
- en: 'Let’s go through how TBPTT works, with parameters k1 and k2\. We have four
    standard approaches; the last approach is divided into two approaches, as we see
    in the following:'
  id: totrans-889
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看TBPTT是如何工作的，其中参数为k1和k2。我们有四种标准方法；最后一种方法分为两种方法，如下所示：
- en: '**TBPTT(n,n):** Updates are performed at the end of the sequence across all
    time steps in the sequence (e.g., classical BPTT).'
  id: totrans-890
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TBPTT(n,n):** 在序列的末尾对序列中的所有时间步进行更新（例如，古典BPTT）。'
- en: '**TBPTT(1,n):** Time steps are processed one at a time, followed by an update
    that covers all time steps seen so far (e.g., classical TBPTT by Williams and
    Peng).'
  id: totrans-891
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TBPTT(1,n):** 逐个处理时间步，然后进行一次更新，覆盖到目前为止看到的所有时间步（例如，威廉姆斯和彭的古典TBPTT）。'
- en: '**TBPTT(k1,1):** The network likely does not have enough temporal context to
    learn, relying heavily on internal state and inputs.'
  id: totrans-892
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TBPTT(k1,1):** 网络可能没有足够的时间上下文来学习，严重依赖内部状态和输入。'
- en: '**TBPTT(k1,k2),** where k1<k2<n: Multiple updates are performed per sequence,
    which can accelerate training.'
  id: totrans-893
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TBPTT(k1,k2),** 其中 k1<k2<n：每个序列执行多次更新，这可以加速训练。'
- en: '**TBPTT(k1,k2),** where k1=k2: A common configuration where a fixed number
    of time steps are used for both forward and backward-pass time steps (e.g., 10s
    to 100s) .'
  id: totrans-894
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TBPTT(k1,k2),** 其中 k1=k2：一个常见的配置，即前向和反向传递时间步都使用固定数量的时间步（例如，10s到100s）。'
- en: In libraries like TensorFlow and Keras, things look similar and h defines the
    vectorized fixed length of the time steps of the prepared data. In real life,
    with coding, you will not do this calculation yourself, but we need you to understand
    what happens in the background of this equation. Now we will have a case study
    that makes the sequence model more obvious. Try it yourself.
  id: totrans-895
  prefs: []
  type: TYPE_NORMAL
  zh: 在TensorFlow和Keras等库中，事情看起来很相似，h定义了准备数据的时间步的向量化固定长度。在现实生活中，通过编码，你不会自己进行这个计算，但我们需要你理解这个方程背后的发生的事情。现在我们将有一个案例研究，使序列模型更加明显。自己试试看。
- en: Vanishing and Exploding Gradient Problems in RNN
  id: totrans-896
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RNN中的梯度消失和爆炸问题
- en: We saw in the previous section that BPTT has many problems with time. If you
    have a large time series, you can have many problems that fall under the term
    vanishing and exploding. The key difference between RNNs and neural networks is
    time. The error propagates backward from output to input layer, propagating the
    input error gradient. With deeper neural networks, issues can arise from backpropagation,
    such as vanishing and exploding gradients. So, let’s review with a quick definition
    of **vanishing gradients** . As we go back to the lower layers, the gradient often
    gets smaller, eventually causing weights to never change at lower layers. **Exploding
    gradients** are the opposite of vanishing gradients; gradient explode on the way
    back.
  id: totrans-897
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，我们了解到BPTT（反向传播时间步长）在处理时间序列时存在许多问题。如果你有一个大的时间序列，你可能会遇到许多属于“消失”和“爆炸”这一术语的问题。RNN（循环神经网络）与神经网络的关键区别在于时间。错误从输出层反向传播到输入层，传播输入误差梯度。随着神经网络深度的增加，反向传播可能会出现一些问题，如梯度消失和梯度爆炸。因此，让我们快速回顾一下**梯度消失**的定义。当我们回溯到较低的层时，梯度通常会变小，最终导致在较低层权重永远不会改变。**梯度爆炸**与梯度消失相反；梯度在回溯过程中爆炸。
- en: 'Let’s see if the RNN gradient will suffer more from vanishing or exploding.
    In my opinion it will be vanishing, because of RNNs’ large and complex structures.
    So, let’s lay out the problem and get a solution for it. The aim of RNNs is to
    learn long dependencies so that the interrelations between words that are far
    apart are captured. For example, the actual meaning that a sentence is trying
    to convey may be captured well by words that are not in close proximity to each
    other. Let’s assume the input sequence to the network is a nine-word sentence:
    “I grew up in France; I speak French fluently.” We can see from the example that
    for the RNN to predict the word “French,” which comes at the end of the sequence,
    it would need information from the word “France,” which occurs further back near
    the beginning of the sentence. This kind of dependence between sequence data is
    called long-term dependencies, because the distance between the relevant information
    “France” and the point where it is needed to make a prediction “French” is very
    wide. Unfortunately, in practice, as this distance becomes wider, RNNs have a
    hard time learning these dependencies because they encounter either a vanishing
    or exploding gradient problem.'
  id: totrans-898
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看RNN的梯度是否会更多地受到消失或爆炸的影响。在我看来，它将是消失的，因为RNN具有大而复杂的结构。因此，让我们梳理一下这个问题，并为其找到解决方案。RNN的目标是学习长依赖关系，以便捕捉到相隔较远的单词之间的关系。例如，一个句子试图传达的实际意义可能通过不在彼此附近出现的单词很好地捕捉到。假设网络的输入序列是一个九个单词的句子：“我在法国长大；我法语讲得很流利。”从例子中我们可以看出，为了预测序列末尾的单词“French”，RNN需要从句子开头附近出现的单词“France”那里获取信息。这种序列数据之间的依赖性被称为长期依赖，因为相关信息“France”与需要做出预测的点“French”之间的距离非常远。不幸的是，在实践中，随着这个距离的增大，RNN很难学习这些依赖关系，因为它们会遇到梯度消失或梯度爆炸的问题。
- en: 'So, RNNs should be able to learn those dependencies, but they suffer from this
    inherent problem: failing to capture long-distance dependencies between words.
    This is because the gradients in instances of long sequences have a high chance
    of either going to zero or going to infinity very quickly. When the gradients
    drop to zero very quickly, the model is unable to learn the associations or correlations
    between events that are temporally far apart. The equations derived for the gradient
    of the cost function with respect to the weights of the hidden memory layers will
    help us understand why this vanishing gradient problem might take place. These
    problems arise during the training of a deep network when the gradients are being
    propagated back in time all the way to the initial layer. The gradients coming
    from the deeper layers have to go through continuous matrix multiplications because
    of the chain rule. As they approach the earlier layers, if they have small values
    (<1), they shrink exponentially until they vanish and make it impossible for the
    model to learn; this is the vanishing gradient problem. On the other hand, if
    they have large values (>1), they get larger and eventually blow up and crash
    the model; this is the exploding gradient problem. So, the definitions of vanishing
    and exploding gradient are as follows:'
  id: totrans-899
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，RNN 应该能够学习这些依赖关系，但它们存在一个固有的问题：无法捕捉单词之间的长距离依赖关系。这是因为长序列实例中的梯度有很大可能性要么迅速变为零，要么迅速变为无穷大。当梯度迅速下降到零时，模型无法学习时间上相隔较远的事件之间的关联或相关性。关于成本函数梯度相对于隐藏记忆层权重的导数推导出的方程将帮助我们理解为什么梯度消失问题可能发生。这些问题出现在深度网络的训练过程中，当梯度被反向传播到初始层时。由于链式法则，来自深层层的梯度必须经过连续的矩阵乘法。当它们接近早期层时，如果它们的值很小（<1），它们将指数级缩小直至消失，使得模型无法学习；这就是梯度消失问题。另一方面，如果它们的值很大（>1），它们将变得更大，最终爆炸并崩溃模型；这就是梯度爆炸问题。因此，梯度消失和梯度爆炸的定义如下：
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig8_HTML.jpg](Images/484548_1_En_12_Fig8_HTML.jpg)'
  id: totrans-900
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig8_HTML.jpg](Images/484548_1_En_12_Fig8_HTML.jpg)'
- en: Figure 12-8
  id: totrans-901
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-8
- en: All previous inputs participate to generate the current output
  id: totrans-902
  prefs: []
  type: TYPE_NORMAL
  zh: 所有先前输入都参与生成当前输出
- en: '**Exploding gradients** **:** When gradients explode, the gradients could become
    NaN because of the numerical overflow, or we might see irregular oscillations
    in training cost when we plot the learning curve.'
  id: totrans-903
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**梯度爆炸** **:** 当梯度爆炸时，由于数值溢出，梯度可能变为 NaN，或者在我们绘制学习曲线时，我们可能会看到训练成本的异常振荡。'
- en: '**Vanishing gradients** **:** The basic RNN model has many local influences
    because of recurrent neural networks as the earlier information. As the RNN weights
    vanishes thought time and information is lost.'
  id: totrans-904
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**梯度消失** **:** 由于循环神经网络作为早期信息，基本 RNN 模型有许多局部影响。随着 RNN 权重随时间消失，信息丢失。'
- en: In Figure [12-8](#Fig8), the output ![$$ {\hat{y}}^{&lt;3&gt;} $$](Images/484548_1_En_12_Chapter_TeX_IEq9.png)is
    mainly influenced by a value close to ![$$ {\hat{y}}^{&lt;3&gt;} $$](Images/484548_1_En_12_Chapter_TeX_IEq10.png).
    This local influence makes an output which is later in the sequence to be affected
    by earlier input in the sequence.
  id: totrans-905
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [12-8](#Fig8) 中，输出 ![${\hat{y}}^{<3>}$$](Images/484548_1_En_12_Chapter_TeX_IEq9.png)
    主要受 ![${\hat{y}}^{<3>}$$](Images/484548_1_En_12_Chapter_TeX_IEq10.png) 附近的一个值的影响。这种局部影响使得序列中较晚的输出受到早期输入的影响。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig9_HTML.jpg](Images/484548_1_En_12_Fig9_HTML.jpg)'
  id: totrans-906
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig9_HTML.jpg](Images/484548_1_En_12_Fig9_HTML.jpg)'
- en: Figure 12-9
  id: totrans-907
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-9
- en: All previous inputs participate to generate the current output
  id: totrans-908
  prefs: []
  type: TYPE_NORMAL
  zh: 所有先前输入都参与生成当前输出
- en: In Figure [12-9](#Fig9), the output y<Ty> cannot be influenced by the early
    inputs in the sequences (*x*^(<1>), *x*^(<2>), *x*^(<3>)). It was hard for the
    error to backpropagate to the beginning of the sequence. This is the weakness
    of the basic RNN. So, now that we know about the problems of vanishing and exploding
    gradients, we need to solve them.
  id: totrans-909
  prefs: []
  type: TYPE_NORMAL
  zh: 在图 [12-9](#Fig9) 中，输出 y<Ty> 不能受到序列中早期输入 (*x*^(<1>), *x*^(<2>), *x*^(<3>)) 的影响。错误难以反向传播到序列的开始。这是基本
    RNN 的弱点。因此，现在我们知道了梯度消失和梯度爆炸的问题，我们需要解决它们。
- en: The Solution to Vanishing and Exploding Gradients Problems in RNNs
  id: totrans-910
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决 RNN 中梯度消失和梯度爆炸问题的方法
- en: Let’s start with exploding gradients. A solution to fix this is to apply gradient
    clipping, which places a predefined threshold on the gradients to prevent them
    from getting too large. By doing this, it doesn’t change the direction of the
    gradients; it only changes its length. We can see this in Figure [12-10](#Fig10).
  id: totrans-911
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从爆炸梯度开始。解决这个问题的一种方法是对梯度应用梯度裁剪，这为梯度设置一个预定义的阈值，以防止它们变得过大。通过这样做，它不会改变梯度的方向；它只改变其长度。我们可以在图
    [12-10](#Fig10) 中看到这一点。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig10_HTML.jpg](Images/484548_1_En_12_Fig10_HTML.jpg)'
  id: totrans-912
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig10_HTML.jpg](Images/484548_1_En_12_Fig10_HTML.jpg)'
- en: Figure 12-10
  id: totrans-913
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-10
- en: Gradient steps with and without clipping
  id: totrans-914
  prefs: []
  type: TYPE_NORMAL
  zh: 带和不带裁剪的梯度步骤
- en: So, we should get to the point that we try to enhance the gradient to reach
    the local minima as fast as it can without getting any errors, meaning overfitting,
    underfitting, vanishing, or exploding. So the solution looks easy for exploding,
    but not so easy for vanishing. We have two solutions for vanishing. First, we
    will talk about identity RNN architecture, where the network weights are initialized
    to the identity matrix and the activation functions are all set to ReLU. This
    ends up encouraging the network computations to stay close to the identity function.
    This works well because, when the error derivatives are being propagated backward
    through time, they remain constants of either 0 or 1; hence, they aren’t likely
    to suffer from vanishing gradients. The second, widely used, solution is LSTM.
    Long short-term memory architecture is a variant of the regular recurrent network,
    which was designed to make it easy to capture long-term dependencies in sequence
    data. The standard RNN operates in such a way that the hidden state activation
    is influenced by the other local activations closest to them, which corresponds
    to “short-term memory.” But the network weights are influenced by the computations
    that take place over entire long sequences, which corresponds to “long-term memory.”
    Hence, the RNN was redesigned so that it has an activation state that can also
    act as weights and preserve information over long distances, hence the name “long
    short-term memory.”
  id: totrans-915
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们应该达到一个点，我们试图增强梯度，使其尽可能快地达到局部最小值，而不产生任何错误，这意味着过度拟合、欠拟合、消失或爆炸。所以对于爆炸，解决方案看起来很简单，但对于消失则不那么简单。我们有两种解决消失的方法。首先，我们将讨论身份
    RNN 架构，其中网络权重初始化为身份矩阵，激活函数全部设置为 ReLU。这最终鼓励网络计算保持接近身份函数。这很有效，因为当错误导数在时间上向后传播时，它们保持为
    0 或 1 的常数；因此，它们不太可能遭受消失梯度。第二种，广泛使用的方法是 LSTM。长短期记忆架构是常规循环网络的一种变体，它被设计成易于在序列数据中捕获长期依赖关系。标准的
    RNN 以一种方式运行，即隐藏状态激活受到它们附近的其他局部激活的影响，这对应于“短期记忆”。但网络权重受到在整个长序列中进行的计算的影响，这对应于“长期记忆”。因此，RNN
    被重新设计，使其具有可以充当权重并跨长距离保留信息的激活状态，因此得名“长短期记忆”。
- en: 'We may need to learn more about LSTM, so in the next section we will talk about
    it. But before we end this section, let’s recap. Vanishing means that your model
    tries to learn, but it can’t because it goes so slowly; but if you let it complete
    training, it may get to optimal minima, or may not. Exploding is the way that
    the model goes away from the optimal minima: it will go away more and more and
    it won’t get to its optimal minima, and we can’t reduce the cost function—the
    core of what we’re trying to do. So, let’s go to the next section and talk about
    LSTM.'
  id: totrans-916
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能需要更多地了解 LSTM，因此在下节中我们将讨论它。但在结束本节之前，让我们回顾一下。消失意味着你的模型试图学习，但由于速度过慢而无法学习；但如果让它完成训练，它可能达到最优最小值，也可能不会。爆炸是模型远离最优最小值的方式：它会越来越远，并且无法达到其最优最小值，我们无法降低成本函数——这是我们试图做的核心。因此，让我们进入下一节，讨论
    LSTM。
- en: Long Short-Term Memory
  id: totrans-917
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 长短期记忆
- en: LSTM networks are just an advanced version of plain RNNs. These networks are
    capable of remembering long-term dependencies. They are designed to remember information
    for long periods of time without having to deal with the vanishing gradient problem.
    They were invented by Sepp Hochreiter and Jürgen Schmidhuber in 1997 and were
    refined and popularized by many people in their following work. They work tremendously
    well on a large variety of problems and are now widely used. We know that an RNN
    is very simple compared with LSTM, and LSTM is used to solve vanishing problems,
    so let’s talk about the architecture (Figure [12-11](#Fig11)). All RNNs have the
    form of a chain of repeating modules of the neural network. In standard RNNs,
    this repeating module will have a very simple structure, such as a single tanh
    layer.
  id: totrans-918
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 网络只是普通 RNN 的一个高级版本。这些网络能够记住长期依赖关系。它们被设计成能够在不处理梯度消失问题的前提下长时间记住信息。它们是由 Sepp
    Hochreiter 和 Jürgen Schmidhuber 在 1997 年发明的，并在他们后续的工作中被许多人改进和普及。它们在解决各种问题上表现出色，现在被广泛使用。我们知道与
    LSTM 相比，RNN 非常简单，LSTM 用于解决梯度消失问题，所以让我们来谈谈其架构（图 [12-11](#Fig11)）。所有 RNN 都具有神经网络重复模块链的形式。在标准
    RNN 中，这个重复模块将具有一个非常简单的结构，例如单个 tanh 层。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig11_HTML.jpg](Images/484548_1_En_12_Fig11_HTML.jpg)'
  id: totrans-919
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig11_HTML.jpg](Images/484548_1_En_12_Fig11_HTML.jpg)'
- en: Figure 12-11
  id: totrans-920
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-11
- en: The architecture of LSTM
  id: totrans-921
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 的架构
- en: LSTMs also have this chain-like structure, but the repeating module has a different
    structure. Instead of having a single neural network layer, there are four, interacting
    in a very special way.
  id: totrans-922
  prefs: []
  type: TYPE_NORMAL
  zh: LSTMs 也具有这种链式结构，但重复模块的结构不同。它不是只有一个神经网络层，而是有四个，以一种非常特殊的方式相互作用。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig12_HTML.jpg](Images/484548_1_En_12_Fig12_HTML.jpg)'
  id: totrans-923
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig12_HTML.jpg](Images/484548_1_En_12_Fig12_HTML.jpg)'
- en: Figure 12-12
  id: totrans-924
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-12
- en: How an LSTM cell works
  id: totrans-925
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 单元的工作原理
- en: Let’s talk about the core behind LSTM and what happens to input from the first
    state to the last one. We won’t go to the equations at first; we’ll just talk
    about the diagram (Figure [12-13](#Fig13)). Let’s start with the line above. It
    runs straight down the entire chain, with only some minor linear interactions.
    It’s very easy for information to just flow along it, unchanged from the previous
    state, to generate new *C*[*t*] to the next state, as in Figure [12-13](#Fig13).
  id: totrans-926
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们谈谈 LSTM 核心的内容以及从第一个状态到最后一个状态输入发生了什么。我们一开始不会去方程，我们只会谈论图（图 [12-13](#Fig13)）。让我们从上面的线开始。它沿着整个链直接向下运行，只有一些小的线性交互。信息很容易沿着它流动，保持不变，从上一个状态生成新的
    *C*[*t*] 到下一个状态，如图 [12-13](#Fig13) 所示。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig13_HTML.jpg](Images/484548_1_En_12_Fig13_HTML.jpg)'
  id: totrans-927
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig13_HTML.jpg](Images/484548_1_En_12_Fig13_HTML.jpg)'
- en: Figure 12-13
  id: totrans-928
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-13
- en: How memory step works in LSTM
  id: totrans-929
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 中记忆步骤的工作原理
- en: LSTM can add or forget or update by using gates. These gates can change in this
    straight line. Let’s build the LSTM architecture together step-by-step with data
    going through the input.
  id: totrans-930
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM 可以通过使用门来添加、遗忘或更新。这些门可以在这个直线上改变。让我们一步一步地构建 LSTM 架构，并随着数据通过输入来进行分析。
- en: The first step in our LSTM is to decide what information we’re going to throw
    away from the cell state. This decision is made by a sigmoid layer called the
    “forget gate layer.” It looks at *h*[*t* − 1] and *x*[*t*], and outputs a number
    between 0 and 1 for each number in the cell state *C*[*t* − 1].
  id: totrans-931
  prefs: []
  type: TYPE_NORMAL
  zh: 我们 LSTM 的第一步是决定我们要从细胞状态中丢弃哪些信息。这个决定是由一个称为“遗忘门层”的 sigmoid 层做出的。它查看 *h*[*t* − 1]
    和 *x*[*t*]，并为细胞状态 *C*[*t* − 1] 中的每个数字输出一个介于 0 和 1 之间的数字。
- en: '*A*[1] when it is 1 represents “completely keep this” while a 0 represents
    “completely get rid of this.” We know that the sigmoid function, which is 0 or
    1, is an activation function, so the input is multiplied by it. If it is zero,
    this means that this input is neglected; but if it’s one, this means we should
    care about this input. You can see an example in Figure [12-14](#Fig14).'
  id: totrans-932
  prefs: []
  type: TYPE_NORMAL
  zh: '*A*[1] 当它为 1 时表示“完全保留这个”，而 0 表示“完全去除这个”。我们知道 sigmoid 函数，它为 0 或 1，是一个激活函数，所以输入会乘以它。如果它是零，这意味着这个输入被忽略；但如果它是
    1，这意味着我们应该关注这个输入。你可以在图 [12-14](#Fig14) 中看到一个例子。'
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig14_HTML.jpg](Images/484548_1_En_12_Fig14_HTML.jpg)'
  id: totrans-933
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig14_HTML.jpg](Images/484548_1_En_12_Fig14_HTML.jpg)'
- en: Figure 12-14
  id: totrans-934
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-14
- en: The forget cell and how it works
  id: totrans-935
  prefs: []
  type: TYPE_NORMAL
  zh: 遗忘单元及其工作原理
- en: The next step is to decide what new information we’re going to store in the
    cell state. This has two parts. First, a sigmoid layer called the “input gate
    layer” decides which values we’ll update. Next, a *tanh* layer creates a vector
    of new candidate values, *C*[*t*], that could be added to the state. In the next
    step, we’ll combine these two to create an update to the state (Figure [12-15](#Fig15)).
  id: totrans-936
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是决定我们将要存储在细胞状态中的新信息。这有两个部分。首先，一个名为“输入门层”的sigmoid层决定哪些值我们将要更新。接下来，一个*tanh*层创建了一个新的候选值向量，*C*[*t*]，它可以添加到状态中。在下一步中，我们将这两个结合起来创建状态更新（见图
    [12-15](#Fig15)）。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig15_HTML.jpg](Images/484548_1_En_12_Fig15_HTML.jpg)'
  id: totrans-937
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig15_HTML.jpg](Images/484548_1_En_12_Fig15_HTML.jpg)'
- en: Figure 12-15
  id: totrans-938
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-15
- en: How LSTM updates its memory
  id: totrans-939
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM如何更新其记忆
- en: It’s now time to update the old cell state, *C*[*t* − 1], into the new cell
    state, *C*[*t*]. We multiply the old state by *f*[*t*], forgetting the things
    we decided to forget earlier. Then we add *i*[*t*]∗*C*[*t*]. This represents the
    new candidate values, scaled by how much we decided to update each state value
    (Figure [12-16](#Fig16)).
  id: totrans-940
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候将旧的细胞状态，*C*[*t* − 1]，更新为新的细胞状态，*C*[*t*]。我们通过乘以 *f*[*t*] 来更新旧状态，忘记之前决定忘记的事情。然后我们加上
    *i*[*t*]∗*C*[*t*]。这代表了新的候选值，根据我们决定更新每个状态值的大小进行缩放（见图 [12-16](#Fig16)）。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig16_HTML.jpg](Images/484548_1_En_12_Fig16_HTML.jpg)'
  id: totrans-941
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig16_HTML.jpg](Images/484548_1_En_12_Fig16_HTML.jpg)'
- en: Figure 12-16
  id: totrans-942
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-16
- en: The combination of forget and updating LSTM memory
  id: totrans-943
  prefs: []
  type: TYPE_NORMAL
  zh: 遗忘和更新LSTM记忆的组合
- en: Finally, we need to decide what we’re going to output. This output will be based
    on our cell state, but will be a filtered version. First, we run a sigmoid layer,
    which decides what parts of the cell state we’re going to output. Then, we put
    the cell state through tanh (to push the values to between −1 and 1) and multiply
    it by the output of the sigmoid gate, so that we only output the parts we decided
    to (Figure [12-17](#Fig17)).
  id: totrans-944
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要决定我们将要输出的内容。这个输出将基于我们的细胞状态，但将是一个过滤版本。首先，我们运行一个sigmoid层，它决定我们将输出细胞状态的哪些部分。然后，我们将细胞状态通过tanh（将值推到-1和1之间）并乘以sigmoid门的输出，这样我们只输出我们决定的部分（见图
    [12-17](#Fig17)）。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig17_HTML.jpg](Images/484548_1_En_12_Fig17_HTML.jpg)'
  id: totrans-945
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig17_HTML.jpg](Images/484548_1_En_12_Fig17_HTML.jpg)'
- en: Figure 12-17
  id: totrans-946
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-17
- en: How LSTM calculates the output
  id: totrans-947
  prefs: []
  type: TYPE_NORMAL
  zh: LSTM如何计算输出
- en: 'Besides this general use LSTM layer, many papers have been written updating
    this version:'
  id: totrans-948
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这个通用的LSTM层之外，许多论文都更新了这个版本：
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig19_HTML.jpg](Images/484548_1_En_12_Fig19_HTML.jpg)'
  id: totrans-949
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig19_HTML.jpg](Images/484548_1_En_12_Fig19_HTML.jpg)'
- en: Figure 12-19
  id: totrans-950
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-19
- en: The output of forget/update memory activation function
  id: totrans-951
  prefs: []
  type: TYPE_NORMAL
  zh: 遗忘/更新记忆激活函数的输出
- en: One popular LSTM variant, introduced by F. A. Gers and Jürgen Schmidhuber (2000),
    is adding “peephole connections.” This means that we let the gate layers look
    at the cell state (Figure [12-18](#Fig18)).
  id: totrans-952
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一个流行的LSTM变体，由F. A. Gers和Jürgen Schmidhuber（2000）提出，是添加“窥视孔连接”。这意味着我们让门控层查看细胞状态（见图
    [12-18](#Fig18)）。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig18_HTML.jpg](Images/484548_1_En_12_Fig18_HTML.jpg)'
  id: totrans-953
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig18_HTML.jpg](Images/484548_1_En_12_Fig18_HTML.jpg)'
- en: Figure 12-18
  id: totrans-954
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 12-18
- en: How LSTM tooks at memory and how it uses it
  id: totrans-955
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LSTM如何处理记忆以及如何使用它
- en: Use coupled forget and input gates. Instead of separately deciding what to forget
    and what we should add new information to, we make those decisions together. We
    only forget when we’re going to input something in its place. We only input new
    values to the state when we forget something older (Figure [12-19](#Fig19)).
  id: totrans-956
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用耦合的遗忘和输入门。我们不是分别决定要忘记什么以及我们应该添加什么新信息，而是一起做出这些决定。只有当我们打算输入某个东西来代替它时，我们才会忘记。只有当我们忘记一些旧信息时，我们才会将新的值输入到状态中（见图
    [12-19](#Fig19)）。
- en: So, you can see that anyone can update this and adapt LSTM to handle their cases.
    We’ve learned about LSTM and its four functions; the main point is that LSTM can
    solve exploding and vanishing gradient problems.
  id: totrans-957
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你可以看到任何人都可以更新这个版本，并将LSTM适应于处理他们的案例。我们已经了解了LSTM及其四个功能；重点是LSTM可以解决梯度爆炸和消失的问题。
- en: Case Study—Digit Identification on the MNIST Dataset
  id: totrans-958
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究——MNIST数据集上的数字识别
- en: Gated Recurrent Unit
  id: totrans-959
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 门控循环单元
- en: In the section on LSTM, we said that it solves vanishing gradient problems.
    We now have a great new architecture called Gated Recurrent Unit (GRU), introduced
    by Cho, et al. in 2014\. GRU aims to solve the vanishing gradient problem that
    comes with a standard RNN. GRU can also be considered as a variation on LSTM because
    both are designed similarly and, in some cases, produce equally excellent results.
    GRU uses so-called update gate and reset gate. Basically, these are two vectors
    that decide what information should be passed to the output. The special thing
    about them is that they can be trained to keep information from long ago, without
    washing it through time or removing information that is irrelevant to the prediction.
    So, let’s see the unit of GRU in a visualization model (Figure [12-20](#Fig20))
  id: totrans-960
  prefs: []
  type: TYPE_NORMAL
  zh: 在关于 LSTM 的章节中，我们提到它解决了梯度消失问题。现在有一个名为门控循环单元（GRU）的全新架构，由 Cho 等人在 2014 年提出。GRU
    的目标是解决标准 RNN 带来的梯度消失问题。GRU 也可以被视为 LSTM 的一个变体，因为它们的设计相似，在某些情况下，可以产生同样出色的结果。GRU
    使用所谓的更新门和重置门。基本上，这些是两个向量，决定应该传递给输出的信息。它们特别之处在于，它们可以被训练来保留很久以前的信息，而不会随着时间的推移而冲淡，也不会删除与预测无关的信息。所以，让我们通过可视化模型（图
    [12-20](#Fig20)）来看 GRU 的单元。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig20_HTML.jpg](Images/484548_1_En_12_Fig20_HTML.jpg)'
  id: totrans-961
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig20_HTML.jpg](Images/484548_1_En_12_Fig20_HTML.jpg)'
- en: Figure 12-20
  id: totrans-962
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-20
- en: The GRU unit architect
  id: totrans-963
  prefs: []
  type: TYPE_NORMAL
  zh: GRU 单元架构
- en: Let’s look at each gate individually,
  id: totrans-964
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐个查看每个门，
- en: '**Update gate:** We start with calculating the update gate *z*[*t*] for time
    step t (Figure [12-21](#Fig21)).'
  id: totrans-965
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**更新门**：我们从计算时间步 t 的更新门 *z*[*t*] 开始（图 [12-21](#Fig21)）。'
- en: '*z*[*t*] = *σ*(*W*^((*z*))*x*[*t*] + *U*^((*z*))*h*[*t* − 1])'
  id: totrans-966
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*z*[*t*] = *σ*(*W*^((*z*))*x*[*t*] + *U*^((*z*))*h*[*t* − 1])'
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig21_HTML.jpg](Images/484548_1_En_12_Fig21_HTML.jpg)'
  id: totrans-967
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig21_HTML.jpg](Images/484548_1_En_12_Fig21_HTML.jpg)'
- en: Figure 12-21
  id: totrans-968
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 12-21
- en: The first step of the GRU unit, the update gate
  id: totrans-969
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GRU 单元的第一个步骤，更新门
- en: When *x*[*t*] is plugged into the network unit, it is multiplied by its own
    weight, *W*(*z*). The same goes for ht-1, which holds the information for the
    previous *t* − 1 units and is multiplied by its own weight, *U*(*z*). Both results
    are added together and a sigmoid activation function is applied to squash the
    result between 0 and 1\. The update gate helps the model to determine how much
    of the past information (from previous time steps) needs to be passed along to
    the future. That is really powerful, because the model can decide to copy all
    the information from the past and eliminate the risk of vanishing gradient problem.
    We will see the usage of the update gate later on. For now, remember the formula
    for *z*[*t*].
  id: totrans-970
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当 *x*[*t*] 被插入到网络单元中时，它乘以自己的权重，*W*(*z*)。同样，ht-1 也乘以自己的权重，*U*(*z*)，它持有前 *t* − 1
    个单元的信息。这两个结果相加，并应用 sigmoid 激活函数将结果压缩在 0 和 1 之间。更新门帮助模型确定需要传递多少过去的信息（来自先前的时间步）。这真的很强大，因为模型可以选择复制过去所有的信息，从而消除梯度消失问题的风险。我们将在稍后看到更新门的使用。现在，记住
    *z*[*t*] 的公式。
- en: '**Reset gate:** Essentially , this gate is used by the model to decide how
    much of the past information to forget.'
  id: totrans-971
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重置门**：本质上，这个门被模型用来决定要忘记多少过去的信息。'
- en: '*r*[*t*] = *σ*(*W*^((*r*))*x*[*t*] + *U*^((*r*))*h*[*t* − 1])'
  id: totrans-972
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*r*[*t*] = *σ*(*W*^((*r*))*x*[*t*] + *U*^((*r*))*h*[*t* − 1])'
- en: You see that this formula is almost like the update gate, but there is a difference
    in the values of variables and the gate position in the architecture. Let’s see
    the gate in Figure [12-22](#Fig22) .
  id: totrans-973
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 你可以看到这个公式几乎与更新门相同，但在变量值和架构中门的位置上有所不同。让我们看看图 [12-22](#Fig22) 中的门。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig22_HTML.jpg](Images/484548_1_En_12_Fig22_HTML.jpg)'
  id: totrans-974
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig22_HTML.jpg](Images/484548_1_En_12_Fig22_HTML.jpg)'
- en: Figure 12-22
  id: totrans-975
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图 12-22
- en: The reset gate in GRU unit
  id: totrans-976
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: GRU 单元中的重置门
- en: As before, we plug in *h*[*t* − 1] and *x*[*t*], multiply them with their corresponding
    weights, sum the results, and apply the sigmoid function.
  id: totrans-977
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如前所述，我们插入 *h*[*t* − 1] 和 *x*[*t*]，将它们与相应的权重相乘，求和结果，并应用 sigmoid 函数。
- en: '**Current memory content:** This is a new memory; we introduce a new memory
    content that will use the reset gate to store the relevant information from the
    past.'
  id: totrans-978
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**当前内存内容**：这是一个新的内存；我们引入一个新的内存内容，将使用重置门来存储过去的相关信息。'
- en: '![$$ {h}_t^{\hbox{''}}=\tanh \left({Wx}_t+{r}_t\odot {Uh}_{t-1}\right) $$](Images/484548_1_En_12_Chapter_TeX_IEq11.png)'
  id: totrans-979
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ {h}_t^{\hbox{''}}=\tanh \left({Wx}_t+{r}_t\odot {Uh}_{t-1}\right) $$](Images/484548_1_En_12_Chapter_TeX_IEq11.png)'
- en: This works in four steps (Figure [12-23](#Fig23)).
  id: totrans-980
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这分为四个步骤（图[12-23](#Fig23)）。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig23_HTML.jpg](Images/484548_1_En_12_Fig23_HTML.jpg)'
  id: totrans-981
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig23_HTML.jpg](Images/484548_1_En_12_Fig23_HTML.jpg)'
- en: Figure 12-23
  id: totrans-982
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图12-23
- en: How LSTM uses the memeory
  id: totrans-983
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LSTM如何使用记忆
- en: We do an element-wise multiplication of *h*[*t* − 1] and *r*[*t*] and then sum
    the result with the input, *x*[*t*]. Finally, *tanh* is used to produce *h*[*t*].
    So, after describing what happens in in the image, we need to go in details. The
    first step is to multiply the input *x*[*t*] with a weight *W* and *h*[*t* − 1]
    with a weight *U*. Then the second step calculates the Hadamard (element-wise)
    product between the reset gate *r*[*t*] and *Uh*[*t* − 1]. That will determine
    what to remove from the previous time steps. Then we sum them up in the third
    step and apply the tanh activation function in the last step.
  id: totrans-984
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们对*h*[*t* − 1]和*r*[*t*]进行逐元素乘法，然后将结果与输入*x*[*t*]相加。最后，使用*tanh*函数产生*h*[*t*]。因此，在描述了图像中的发生情况之后，我们需要详细说明。第一步是将输入*x*[*t*]与权重*W*相乘，将*h*[*t* − 1]与权重*U*相乘。第二步计算重置门*r*[*t*]和*Uh*[*t* − 1]之间的Hadamard（逐元素）乘积。这将确定从先前的时间步中要移除什么。然后在第三步将它们相加，并在最后一步应用tanh激活函数。
- en: '**Final memory at current time step:** This is the last step in the GRU; the
    network needs to calculate the *h*[*t*] vector, which holds information for the
    current unit and passes it down to the network. In order to do that, the update
    gate is needed. It determines what to collect from the current memory content,
    *h*[*t*], and what from the previous steps, *h*[*t* − 1].'
  id: totrans-985
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**当前时间步的最终记忆：** 这是GRU的最后一个步骤；网络需要计算*h*[*t*]向量，它包含当前单元的信息并将其传递到网络。为了做到这一点，需要更新门。它决定了从当前记忆内容*h*[*t*]和之前步骤*h*[*t* − 1]中收集什么。'
- en: '![$$ {h}_t={z}_t\odot {h}_{t-1}+\left(1-{z}_t\right)\odot {h}_t^{\hbox{''}}
    $$](Images/484548_1_En_12_Chapter_TeX_IEq12.png)'
  id: totrans-986
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![$$ {h}_t={z}_t\odot {h}_{t-1}+\left(1-{z}_t\right)\odot {h}_t^{\hbox{''}}
    $$](Images/484548_1_En_12_Chapter_TeX_IEq12.png)'
- en: Now let’s see how this memory works. Apply element-wise multiplication to the
    update gate *z*[*t*] and *h*[*t* − 1], then apply element-wise multiplication
    to (1 − *z*[*t*]) and *h*[*t*] (Figure [12-24](#Fig24)). So far, we can sum the
    results from the previous two steps .
  id: totrans-987
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 现在让我们看看这个记忆是如何工作的。对更新门*z*[*t*]和*h*[*t* − 1]进行逐元素乘法，然后对(1 − *z*[*t*])和*h*[*t*]进行逐元素乘法（图[12-24](#Fig24)）。到目前为止，我们可以将前两个步骤的结果相加。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig24_HTML.jpg](Images/484548_1_En_12_Fig24_HTML.jpg)'
  id: totrans-988
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig24_HTML.jpg](Images/484548_1_En_12_Fig24_HTML.jpg)'
- en: Figure 12-24
  id: totrans-989
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 图12-24
- en: What happens to memory state at the final step
  id: totrans-990
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 最终步骤中记忆状态会发生什么
- en: You can see how *z*[*t*] is used to calculate (1 − *z*[*t*]), which, combined
    with *h*[*t*] produces a result in the dark red line. *z*[*t*] is also used with
    *h*[*t*-1] in an element-wise multiplication. Finally, *h* is a result of the
    summation of the outputs corresponding to the bright and dark red lines. So after
    we’ve seen how the procedure works in GRU and that it’s almost like LSTM, we now
    need to get some comparison between them—not an actual comparison, but we’ll try
    to get some key points that allow us to choose. It is very hard to choose between
    them, but let’s note some points to consider.
  id: totrans-991
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 您可以看到*z*[*t*]是如何用来计算(1 − *z*[*t*])的，它与*h*[*t*]结合产生一条深红色线的结果。*z*[*t*]还与*h*[*t*-1]进行逐元素乘法。最后，*h*是亮红色线和暗红色线对应输出的总和。因此，在了解了GRU的工作过程以及它与LSTM几乎相同之后，我们现在需要做一些比较——不是实际的比较，但我们将尝试获取一些关键点，以便我们能够选择。在它们之间进行选择非常困难，但让我们记录一些需要考虑的点。
- en: GRU and LSTM have comparable performance, and there is no simple way to recommend
    one or the other for a specific task.
  id: totrans-992
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: GRU和LSTM的性能相当，没有简单的方法可以推荐其中一个用于特定的任务。
- en: GRUs are faster to train and need fewer data to generalize.
  id: totrans-993
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: GRU的训练速度更快，并且需要更少的数据来泛化。
- en: When there is enough data, LSTM’s greater expressive power may lead to better
    results.
  id: totrans-994
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当有足够的数据时，LSTM的更强的表达能力可能会导致更好的结果。
- en: Like LSTMs, GRUs are drop-in replacements for the simple RNN cell.
  id: totrans-995
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 与LSTMs类似，GRUs可以作为简单的RNN单元的直接替换。
- en: 'Those were just some key points; you can research more about them. So we now
    know the upgrades of the basic RNN neural network: LSTM and GRU. They are widely
    used those days, so make sure you use them. In the next section we will see a
    new application of RNN, Bidirectional RNN (Bi-RNN).'
  id: totrans-996
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是一些关键点；你可以进一步研究它们。因此，我们现在知道了基本 RNN 神经网络的升级版本：LSTM 和 GRU。它们在当今被广泛使用，所以请确保你使用它们。在下一节中，我们将看到
    RNN 的新应用，双向 RNN（Bi-RNN）。
- en: Bidirectional RNN (Bi-RNN)
  id: totrans-997
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 双向 RNN (Bi-RNN)
- en: Bidirectional RNNs are a special type of RNN that makes use of both the past
    and future states to predict the output label at the current state. A bidirectional
    RNN combines two RNNs, one of which runs forward from left to right and the other
    of which runs backward from right to left. A high-level architecture diagram of
    a bidirectional RNN is depicted in Figure [12-25](#Fig25).
  id: totrans-998
  prefs: []
  type: TYPE_NORMAL
  zh: 双向 RNN 是一种特殊的 RNN，它利用过去和未来的状态来预测当前状态下的输出标签。双向 RNN 结合了两个 RNN，其中一个从左到右向前运行，另一个从右到左向后运行。双向
    RNN 的高级架构图如图 [12-25](#Fig25) 所示。
- en: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig25_HTML.jpg](Images/484548_1_En_12_Fig25_HTML.jpg)'
  id: totrans-999
  prefs: []
  type: TYPE_IMG
  zh: '![../images/484548_1_En_12_Chapter/484548_1_En_12_Fig25_HTML.jpg](Images/484548_1_En_12_Fig25_HTML.jpg)'
- en: Figure 12-25
  id: totrans-1000
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-25
- en: Bi-directional RNN architecture
  id: totrans-1001
  prefs: []
  type: TYPE_NORMAL
  zh: 双向 RNN 架构
- en: Bidirectional RNNs are really just two independent RNNs put together. The input
    sequence is fed in normal time order for one network, and in reverse time order
    for another. The outputs of the two networks are usually concatenated at each
    time step, though there are other options (e.g., summation).
  id: totrans-1002
  prefs: []
  type: TYPE_NORMAL
  zh: 双向 RNN 实际上只是两个独立的 RNN 组合在一起。一个网络的输入序列以正常的时间顺序输入，另一个网络的输入序列以相反的时间顺序输入。两个网络的输出通常在每个时间步进行连接，尽管还有其他选项（例如，求和）。
- en: This structure allows the networks to have both backward and forward information
    about the sequence at every time step. The concept seems easy enough. But when
    it comes to actually implementing a neural network that utilizes a bidirectional
    structure, confusion arises.
  id: totrans-1003
  prefs: []
  type: TYPE_NORMAL
  zh: 这种结构允许网络在每一个时间步都拥有关于序列的向前和向后信息。这个概念看起来很简单。但当涉及到实际实现一个利用双向结构的神经网络时，就会出现困惑。
- en: 'It has some issues: not actually issues, but some confusion. The first confusion
    is about the way to forward the outputs of a bidirectional RNN to a dense neural
    network. For normal RNNs we could just forward the outputs at the last time step.
    The second confusion is about the returned hidden states. In seq2seq models, we’ll
    want hidden states from the encoder to initialize the hidden states of the decoder.'
  id: totrans-1004
  prefs: []
  type: TYPE_NORMAL
  zh: 它存在一些问题：不是真正的问题，但有一些困惑。第一个困惑是关于如何将双向 RNN 的输出前向传递到密集神经网络。对于正常的 RNN，我们可以在最后一个时间步直接前向传递输出。第二个困惑是关于返回的隐藏状态。在
    seq2seq 模型中，我们希望从编码器获取隐藏状态来初始化解码器的隐藏状态。
- en: Summary
  id: totrans-1005
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: In this chapter, we talked about sequence models, and how they became so good
    with language models. We also talked about the problems that face the RNN, like
    vanishing and exploding. Then we looked into LSTM and GRU, which solve vanishing
    and exploding gradient problems with sequence models because they can handle the
    long dependences in language models. We then talked about the common application
    in a sequence model called bidirectional RNN, and saw its advantages.
  id: totrans-1006
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们讨论了序列模型，以及它们如何成为如此优秀的语言模型。我们还讨论了 RNN 面临的问题，如梯度消失和梯度爆炸。然后我们探讨了 LSTM 和
    GRU，它们通过处理语言模型中的长依赖关系来解决序列模型的梯度消失和梯度爆炸问题。然后我们讨论了序列模型中常见的应用，即双向 RNN，并看到了它的优势。
