- en: Part IIITensorFlow
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 9. Deep Learning Fundamentals
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In this chapter, we will describe a very important topic in deep learning fundamentals,
    the basic functions that deep learning is built on. Then we will try to build
    layers from these functions and combine these layers together to get a more complex
    model that will help us solve more complex problems, and all that will be described
    by TensorFlow examples.
  prefs: []
  type: TYPE_NORMAL
- en: First we will describe the smallest component of almost any deep neural network,
    which is the neuron and sometimes called *perceptron* . We will discuss it in
    some detail, and we will deep dive because there’s much to cover in this chapter.
    Then we will illustrate the types of possible layers in a neural network, such
    as *input*, *hidden*, and *output* layers. As we are showing you the layers, we’ll
    describe the difference between shallow and deep neural networks. After describing
    the neuron, we will show you some of the activation functions you can use to build
    a better neural network. Then we’ll get into the learning procedure called gradient
    descent, an algorithm that helps learning happen. We will describe different types,
    such as full-batch, stochastic, and mini-batch gradient descent. And as learning
    happens, we need to check how good it is. We can do this with loss functions,
    so we will show you the different loss functions you can use to validate the learning
    of your model. Then we need to propagate the errors that your model makes to get
    better weights and good performance; and to do that, we need to show you the backpropagation
    algorithm and how it works. After describing this learning framework of neural
    networks, we think it is fair to show you some traps to avoid falling into in
    this area, called vanishing and exploding gradients. And last, we will go from
    theoretical to practical by refreshing your mind with some TensorFlow basics.
  prefs: []
  type: TYPE_NORMAL
- en: Perceptron
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The most fundamental unit of a deep neural network is called *an* *artificial
    neuron* , which takes an input, processes it, passes it through an activation
    function like the *sigmoid*, and returns the activated output. In this section,
    we are only going to talk about the *perceptron* model proposed before the “*activation*”
    part came into the picture.
  prefs: []
  type: TYPE_NORMAL
- en: A **Perceptron** is the smallest layer in the neural network. It is a linear
    classifier (binary), and it is used in supervised learning. It helps to classify
    the given input data; the output value is f(x) calculated as *f*(*x*) = ⟨*w*,
    *x*⟩ + *b*
  prefs: []
  type: TYPE_NORMAL
- en: where *w* is a vector of weights and ⟨·, ·⟩ denotes the dot product. We use
    the dot product as we are computing a weighted sum. The sign of *f*(*x*) is used
    to classify *x* as either a positive or a negative instance.
  prefs: []
  type: TYPE_NORMAL
- en: Since the inputs are fed directly to the output via the weights, the perceptron
    can be considered the simplest kind of feedforward network.
  prefs: []
  type: TYPE_NORMAL
- en: Before diving into the mathematics that powers this algorithm, let’s see a little
    history on how they got the concept of the perceptron, which is neuron as we talked
    about in Chapter [1](484548_1_En_1_Chapter.xhtml).
  prefs: []
  type: TYPE_NORMAL
- en: The very first step toward the perceptron we use today was taken in 1943 by
    Warren MuCulloch (a neuroscientist) and Walter Pitts (a logician), by mimicking
    the functionality of a biological neuron. Figure [9-1](#Fig1) describes the neuron
    notation.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig1_HTML.jpg](Images/484548_1_En_9_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-1
  prefs: []
  type: TYPE_NORMAL
- en: The notation of a biological neuron
  prefs: []
  type: TYPE_NORMAL
- en: As we see in Figure [9-1](#Fig1), there are two sides in this node, *g* and
    *f*; one of them takes the input. As we can see in the figure, *g* take a fixed
    size vector of data *x*[1], …, *x*[*n*], and performs an aggregation operation.
    On the other hand, the *f* function makes a decision; this decision is made based
    on the aggregated value in *f*. Let’s elaborate more on this idea.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s suppose that we want to predict a decision: whether to watch a random
    soccer game or not on TV. The inputs are all Boolean (i.e., {0, 1}) and my output
    variable is also Boolean {0 : *Will watch it*, 1 : *Won*^’*t watch it*}.'
  prefs: []
  type: TYPE_NORMAL
- en: So, now we need to construct our data variables. Let’s assume that *x*[1] could
    be *isPremierLeagueOn* (I like Premier League more), *x*[2] could be *isItAFriendlyGame*
    (I tend to care less about the friendliness), *x*[3] could be *isNotHome* (I can’t
    watch it when I’m running errands, can I?), and *x*[4] could be *isManUnitedPlaying*
    (I am a big Man United fan. GGMU!)
  prefs: []
  type: TYPE_NORMAL
- en: We only have four observations about the data we have, like *x*[3]. If *x*[3]
    is 1 (not home), then my output will always be 0 (I can’t watch it when I’m running
    errands.), so the neuron will never fire, but we need to have a good output note
    at this point. As we see in the example, these inputs can either be excitatory
    or inhibitory. So what is the difference between them (Table [9-1](#Tab1))?
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-1
  prefs: []
  type: TYPE_NORMAL
- en: The Difference Between Excitatory and Inhibitory
  prefs: []
  type: TYPE_NORMAL
- en: '| Excitatory | Inhibitory |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Inhibitory inputs are those that have maximum effect on the decision making,
    irrespective of other inputs. | Inputs are NOT the ones that will make the neuron
    fire on its own, but they might fire it when combined together. |'
  prefs: []
  type: TYPE_TB
- en: We need to make an equation to deduce how we can fire this perceptron and when
    we can’t fire it. The formula is just a summation equation of all the inputs and
    the gave the output a domain about how we can act with the output we have (Figure
    [9-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig2_HTML.jpg](Images/484548_1_En_9_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-2
  prefs: []
  type: TYPE_NORMAL
- en: The equations that power the perceptron
  prefs: []
  type: TYPE_NORMAL
- en: We can see that *g*(*x*) is just doing a sum of the inputs—a simple aggregation—and
    theta here is called the thresholding parameter . For example, if I always watch
    the game when the sum turns out to be 2 or more, the theta is 2 here. This is
    called the thresholding logic.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see an example of how it works with the *AND* Boolean gate (Figure [9-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig3_HTML.jpg](Images/484548_1_En_9_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-3
  prefs: []
  type: TYPE_NORMAL
- en: The AND Boolean gate operation — neuron style
  prefs: []
  type: TYPE_NORMAL
- en: 'An *AND* function neuron would only fire when **ALL** the inputs are ON, like
    when *g*(*x*) ≥ 3\. Researchers should know that the original M-P (*MuCulloch,
    Pitts*) neuron is not so good at everything we work with. It has some limitations,
    so let’s see those limitations. We’ll explain the M-P neuron but we may see some
    questions that the M-P neuron can’t handle:'
  prefs: []
  type: TYPE_NORMAL
- en: What about non-Boolean (say, real) inputs? We haven’t any Boolean inputs; we
    have ranges and variety of numbers, like {1, 2, 4, 5}.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Do we always need to hand code the threshold? We should have some dynamic work
    with the threshold values.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are all inputs equal? What if we want to assign more importance to some inputs?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What about functions that are not linearly separable, say, the XOR function?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We see the limitations in this model. I hope it is now clear why we are not
    using the M-P neuron today. Overcoming the limitations of the M-P neuron, Frank
    Rosenblatt, an American psychologist, proposed the classical perception model,
    the mighty artificial neuron, in 1958\. It is a more generalized computational
    model than the McCulloch-Pitts neuron, where weights and thresholds can be learned
    over time. But what’s the difference between McCulloch-Pitts and Minsky-Papert.
  prefs: []
  type: TYPE_NORMAL
- en: The perceptron model, proposed by Minsky-Papert (Figure [9-4](#Fig4)), is a
    more general computational model than the McCulloch-Pitts neuron. It overcomes
    some of the limitations of the M-P neuron by introducing the concept of numerical
    weights (a measure of importance) for inputs, and a mechanism for learning those
    weights. Inputs are no longer limited to Boolean values, as is the case of an
    M-P neuron; it supports real inputs as well, which makes it more useful and generalized.
    This is the perceptron, the most fundamental unit of a deep neural network, called
    an artificial neuron.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig4_HTML.jpg](Images/484548_1_En_9_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-4
  prefs: []
  type: TYPE_NORMAL
- en: The Minsky perceptron model
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s talk about the perceptron model and how it works in a dynamic way. As
    we look at the new version of the perceptron, we see one difference: we have a
    new variable called *weights*. We take a weighted sum of the inputs and set the
    output as one only when the sum is more than an arbitrary threshold (theta). However,
    according to the convention, instead of hand coding the thresholding parameter
    theta, we add it as one of the inputs, with the weight -theta as shown in the
    following, which makes it learnable. This is called the PLA (Perceptron Learning
    Algorithm); the equation will change in this way:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ y=1\kern1em if\ {\sum}_{i=0}^n{w}_i{x}_i\ge 0 $$](Images/484548_1_En_9_Chapter_TeX_Equa.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ y=0\kern1em if\ {\sum}_{i=0}^n{w}_i{x}_i&lt;0 $$](Images/484548_1_En_9_Chapter_TeX_Equb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ where,{x}_0=1\  and\ {w}_0=-\theta $$](Images/484548_1_En_9_Chapter_TeX_Equc.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s go back to our friend predicting whether I would watch a random game of
    soccer on TV or not using the behavioral data available. And let’s assume my decision
    is solely dependent on three binary inputs (binary used for simplicity).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig5_HTML.jpg](Images/484548_1_En_9_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-5
  prefs: []
  type: TYPE_NORMAL
- en: The soccer example implementation using a perceptron
  prefs: []
  type: TYPE_NORMAL
- en: One point about the preceding photo is that *w*[0] is the *bias* value. Now,
    let’s continue the example. A soccer freak may have a very low threshold and may
    watch any soccer game irrespective of the league, club, or importance of the game
    **[theta = 0].** On the other hand, a selective viewer may only watch a soccer
    game that is a Premier League game, featuring a Man United game, that is not friendly
    **[theta = 2]**. The key points are the **weights** and the **bias**, and they
    will depend on the data (my viewing history, in this case).
  prefs: []
  type: TYPE_NORMAL
- en: '*Bias* *occurs when an algorithm has limited flexibility to learn the true
    signal from the dataset*.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take an example of Boolean functions using a perceptron. We will use the
    OR function, which is the easiest one of all Boolean functions (Figure [9-6](#Fig6)).
    We will make you try to solve this equation by using the AND Boolean function,
    but for now, let’s use OR.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig6_HTML.jpg](Images/484548_1_En_9_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-6
  prefs: []
  type: TYPE_NORMAL
- en: The equation of an OR Gate
  prefs: []
  type: TYPE_NORMAL
- en: But by the way, is XOR (exclusive OR) reliable to use with the perceptron model?
    The answer is **no**, because we can’t separate nonlinear functions to positive
    and negative tuples. The table of XOR is shown in Figure [9-7](#Fig7).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig7_HTML.jpg](Images/484548_1_En_9_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-7
  prefs: []
  type: TYPE_NORMAL
- en: The XOR Gate implementation using a perceptron
  prefs: []
  type: TYPE_NORMAL
- en: As we see, it isn’t separable output values, where in the OR function it is
    separable; let’s see this in graphs (Figure [9-8](#Fig8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig8_HTML.jpg](Images/484548_1_En_9_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-8
  prefs: []
  type: TYPE_NORMAL
- en: The OR gate (left); the XOR gate (right)
  prefs: []
  type: TYPE_NORMAL
- en: But what about a multilayer perceptron? We will talk about it later, but we
    should first conclude about these two approaches of perceptron (Figure [9-9](#Fig9))
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig9_HTML.jpg](Images/484548_1_En_9_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-9
  prefs: []
  type: TYPE_NORMAL
- en: The McCulloch neuron vs. perceptron
  prefs: []
  type: TYPE_NORMAL
- en: 'We don’t need to make a further comparison; just the preceding equations and
    the explanations will lead you to understand the concept. From this section, we
    aim to allow you get to know the perceptron learning algorithm , which is based
    on two types of perceptron: single perceptron and multiple perceptrons. Before
    we talk about the types of perceptron, we need to list the major components of
    a perceptron:'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig10_HTML.jpg](Images/484548_1_En_9_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-10
  prefs: []
  type: TYPE_NORMAL
- en: The perceptron in detail steps
  prefs: []
  type: TYPE_NORMAL
- en: '*Input* : All the features become the input for a perceptron. We denote the
    input of a perceptron by [*x*[1], …,  *x*[*n*]], where *x* represents the feature
    value and n represents the total number of features. We also have a special kind
    of input called the bias. In the image (Figure [9-10](#Fig10)), we have described
    the value of the bias as *w*[0].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Weights* : The values that are computed over the time of training the model.
    Initially, we start the value of weights with some initial value and these values
    get updated for each training error. We represent the weights for a perceptron
    by [*w*[1], …,  *w*[*n*]].'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Bias*: A bias neuron allows a classifier to shift the decision boundary left
    or right. In algebraic terms, the bias neuron allows a classifier to translate
    its decision boundary. It aims to “*move every point a constant distance in a
    specified direction.*”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Bias helps to train the model faster and with better quality.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Weighted summation*: Weighted summation is the sum of the values that we get
    after the multiplication of each weight *w*[*n*] associated with each feature
    value *x*[*n*]. We represent the weighted summation by ![$$ {\sum}_{i=0}^n{w}_i{x}_i
    $$](Images/484548_1_En_9_Chapter_TeX_IEq1.png).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Step/activation function*: The role of activation functions is to make neural
    networks nonlinear. For linear classification, for example, it becomes necessary
    to make the perceptron as linear as possible. We will talk about this in the next
    sections, but it’s good to know about it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Output*: The weighted summation is passed to the step/activation function,
    and whatever value we get after computation is our predicted output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Single Perceptron
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A single perceptron is a basic fundamental function in the neural network, and
    it only works with a binary classifier. We’ve already talked a lot about it. But
    if we have more than two classes, we will want to get into the multilayer perceptron.
  prefs: []
  type: TYPE_NORMAL
- en: Multilayer Perceptron
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A multilayer perceptron (MLP) contains one or more hidden layers (apart from
    one input and one output layer). While a single layer perceptron can only learn
    linear functions, a multilayer perceptron can also learn nonlinear functions (Figure
    [9-11](#Fig11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig11_HTML.jpg](Images/484548_1_En_9_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-11
  prefs: []
  type: TYPE_NORMAL
- en: Multilayered perceptron architecture
  prefs: []
  type: TYPE_NORMAL
- en: '*Input layer*: The input layer has three nodes. The bias node has a value of
    1\. The other two nodes take *X*[1] and *X*[2] as external inputs (which are numerical
    values depending upon the input dataset). As discussed, no computation is performed
    in the input layer, so the outputs from nodes in the input layer are 1, *X*[1],
    and *X*[2], respectively, which are fed into the hidden layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Hidden layer*: The hidden layer also has three nodes, with the bias node having
    an output of 1\. The output of the other two nodes in the hidden layer depends
    on the outputs from the input layer (1, *X*[1], *X*[2]) as well as the weights
    associated with the connections (**edges**). Then these edges are connected to
    the output layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*f* refers to the activation function. These outputs are then fed to the nodes
    in the output layer.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Output layer*: The output layer has two nodes that take inputs from the hidden
    layer and perform similar computations as shown for the highlighted hidden node.
    The values calculated (*Y*[1] and *Y*[2]) as a result of these computations act
    as outputs of the multilayer perceptron .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To recap , we learned in this section that the perceptron is the fundamental
    function of the neural network. When you have only one perceptron, you have a
    single perceptron that will solve binary classification problems; but if you have
    a nonlinear classification problem, you will need to use more than one perceptron
    to solve this problem, like OR and XOR.
  prefs: []
  type: TYPE_NORMAL
- en: Different Neural Network Layers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we start working with layers in the neural network, we should understand
    exactly what layers are. *Layer* is a general term that applies to a collection
    of nodes (perceptron), which contain an *activation function* (e.g., sigmoid).
    Patterns are presented to the network via the **input layer** , which communicates
    to one or more **hidden layers** where the actual processing is done via a system
    of weighted connections (edges). The hidden layers then link to an **output layer**
    .
  prefs: []
  type: TYPE_NORMAL
- en: Figure [9-12](#Fig12) illustrates each layer.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig12_HTML.jpg](Images/484548_1_En_9_Fig12_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-12
  prefs: []
  type: TYPE_NORMAL
- en: Multilayered neural network architecture
  prefs: []
  type: TYPE_NORMAL
- en: A neural network is made up of an input layer, one or more hidden layers, and
    an output layer. Every layer has one or more perceptrons, which combine together
    to make a layer. Every layer has a name, which describes its position.
  prefs: []
  type: TYPE_NORMAL
- en: Input Layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The first layer in Figure [9-12](#Fig12) is called the *input layer* , which
    has nodes; the nodes of the input layer are **passive**. Passive means that they
    do not modify the data; they receive a single value on their input and duplicate
    the value to their multiple outputs. All of the input variables are represented
    as input nodes; each value from the input layer is duplicated and sent to all
    of the hidden nodes, which are contained in the **hidden layer**. This takes us
    to a new question: *what is the hidden layer?*'
  prefs: []
  type: TYPE_NORMAL
- en: Hidden Layer(s)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All of the input variables that came from the input layer are combined across
    one or more nodes (summation node or activation node) in the hidden layer. This
    essentially creates new features, derived from the input data provided, and then
    through these features to a new hidden layer and so on to get into the **output
    layer**. All input nodes are connected to all nodes in the hidden layer. We should
    note that the key point of difference between shallow and deep neural networks
    is the number of hidden layers. If you have more than one connected hidden layer,
    it’s a deep neural network, but if we have only one hidden layer, it’s a shallow
    neural network. As we see, the input data is going to the hidden layer with bias
    and weights parameters. But is there only one way that data is weighted? The answer
    is **no**.
  prefs: []
  type: TYPE_NORMAL
- en: Hidden neural network layers are set up in many different ways. In some cases,
    weighted inputs are randomly assigned. In other cases, they are fine-tuned and
    calibrated through a process called backpropagation. But we have many types of
    neural networks (*sequence, convolution, feedforward*, etc.), so there are different
    ways to set up these hidden layers to generate various results. Convolutional
    neural networks focus on image processing; recurrent neural networks contain an
    element of memory; and simple feedforward neural networks work in a straightforward
    way on training data sets.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, a full description of the hidden layer is: artificial neurons take in a
    set of weighted inputs and produce an output through an activation function. It
    is a typical part of nearly any neural network, in which engineers simulate the
    types of activities that go on in the human brain.'
  prefs: []
  type: TYPE_NORMAL
- en: Output Layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The output layer in an artificial neural network is the last layer of neurons,
    which produces given outputs for the program. Though they are made much like other
    artificial neurons in the neural network, output layer neurons may be built or
    observed in a different way, given that they are the last “actor” nodes on the
    network.
  prefs: []
  type: TYPE_NORMAL
- en: Shallow vs. Deep Neural Networks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here we don’t want to get too far into comparison. We will just consider what
    makes a shallow network “shallow,” and the same with deep neural networks. Neural
    networks can be recurrent or feedforward; feedforward ones do not have any loops
    in their graph and can be organized in layers. If there are many layers, then
    we say that the network is deep.
  prefs: []
  type: TYPE_NORMAL
- en: But we have a question about what makes a neural network deep. Practically speaking,
    *how many layers does a network have to have in order to qualify as deep?*
  prefs: []
  type: TYPE_NORMAL
- en: Usually, if we have two or more hidden layers, we call it a *deep* neural network.
    In contrast, a network with only a single hidden layer is conventionally called
    *shallow* (Figure [9-13](#Fig13)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig13_HTML.jpg](Images/484548_1_En_9_Fig13_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-13
  prefs: []
  type: TYPE_NORMAL
- en: The difference between a shallow vs. deep neural network
  prefs: []
  type: TYPE_NORMAL
- en: 'We think that a shallow network *could* perform as well as the deeper ones.
    But there are still questions about this subject. We don’t have an accurate answer,
    but we can produce some points for consideration about deep and shallow, and which
    performs the best:'
  prefs: []
  type: TYPE_NORMAL
- en: Maybe a shallow network is more difficult to train with our current algorithms.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Maybe a shallow architecture does not fit the kind of problems we are usually
    trying to solve.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It can be argued that the number of units in a shallow network grows exponentially
    with task complexity. It may be that if you have a more complex task you want
    your model to fit, you need to have more neurons. So in order to be useful, a
    shallow network might need to have more neurons, possibly much bigger than a deep
    network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These answers may be good to ponder the differences, but with a neural network
    you never know if using it deep or shallow may fit or not. But we will see that
    in a trial and error sequence. The amount of progress achieved in deep learning
    over the last ten years is truly amazing, but most of this progress was achieved
    by trial and error. We still lack very basic understanding about what exactly
    makes deep nets work so well. Even the list of things that people consider to
    be crucial for setting up an effective deep network seems to change every couple
    of years.
  prefs: []
  type: TYPE_NORMAL
- en: 'The conclusion is that we have two designs of the neural network: one if you
    have only one hidden layer we now talk about a shallow neural network if the hidden
    layers exceeded we now talk about the deep neural network, There is nothing that
    says you *must* use a deep neural network, but we assume it may be good for many
    types of complex data.'
  prefs: []
  type: TYPE_NORMAL
- en: Activation Functions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Neural network activation functions are a mathematical “gate.” The main concept
    of the activation function is the perceptron, and neural network activation functions
    are a crucial component of deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: Activation functions determine the output of a deep learning model; its accuracy;
    and also the computational efficiency of training a model, which can make or break
    a large-scale neural network. The activation function is a very important part
    in neural network architecture, because activation functions have a major effect
    on the neural network’s ability to converge and the convergence speed. In some
    cases, activation functions might prevent neural networks from converging in the
    first place. Their main purpose is to convert an input signal of a node in an
    ANN to an output signal.
  prefs: []
  type: TYPE_NORMAL
- en: Activation functions are mathematical equations that determine the output of
    a neural network. After describing the activation function, we may still want
    to know more about what it does. The function is attached to each neuron in the
    network and determines whether it should be fired or not; it does this based on
    whether each neuron’s input is relevant for the model’s prediction. Activation
    functions also help normalize the output of each neuron to a range between 1 and
    0 or between -1 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: The question is asked *what is the* *role of* *the activation function in a
    model?* As we saw in the previous section talking about layers, data points are
    transferred from the input layer to the output layer, passed by hidden layers.
    Each neuron has a weight, and multiplying the input number with the weight gives
    the output of the neuron, which is transferred to the next layer.
  prefs: []
  type: TYPE_NORMAL
- en: The activation function is located in between the input feeding the current
    neuron and its output going to the next layer (Figure [9-14](#Fig14)). It can
    be as simple as a step function that turns the neuron output on and off, depending
    on a rule or threshold. Or it can be a transformation that maps the input signals
    into output signals that are needed for the neural network to function.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig14_HTML.jpg](Images/484548_1_En_9_Fig14_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-14
  prefs: []
  type: TYPE_NORMAL
- en: The placement of the activation function
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s visualize the process, which starts from input: multiply input data with
    weights, add bias to them, go through the activation function, and then feed to
    the next layer (Figure [9-15](#Fig15)).'
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig15_HTML.jpg](Images/484548_1_En_9_Fig15_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-15
  prefs: []
  type: TYPE_NORMAL
- en: The steps of how activation works in a neuron
  prefs: []
  type: TYPE_NORMAL
- en: So, after talking about the process, we need to know the types, how to use them,
    how they work, and which one is the reliable one for our neural network model.
  prefs: []
  type: TYPE_NORMAL
- en: Types of Activation Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are three types of activation functions: binary step function, linear
    activation function, and nonlinear activation function.'
  prefs: []
  type: TYPE_NORMAL
- en: First, the binary step function is a threshold-based activation function (Figure
    [9-16](#Fig16)). What does this mean? It means that it depends on whether it is
    above or below a certain threshold value. If the neuron output is above the threshold,
    the activation neuron will send exactly the same signal to the next layer—and
    vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig16_HTML.jpg](Images/484548_1_En_9_Fig16_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-16
  prefs: []
  type: TYPE_NORMAL
- en: A binary activation function
  prefs: []
  type: TYPE_NORMAL
- en: But it is still binary, so we can’t use it in multiclassification problems .
    It’s only a trigger function and can’t change any of the data that comes from
    the previous layer, so we need a more complex activation function. So let’s talk
    about the next type of activation function, which is the **linear activation function**
    (Figure [9-17](#Fig17)). It uses the function *A* = *w* ∗ *x*. It takes the inputs,
    multiplied by the weights for each neuron, and creates an output signal proportional
    to the input. In one sense, a linear function is better than a step function because
    it allows multiple outputs, not just yes and no.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig17_HTML.jpg](Images/484548_1_En_9_Fig17_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-17
  prefs: []
  type: TYPE_NORMAL
- en: How linear activation works
  prefs: []
  type: TYPE_NORMAL
- en: 'But does the linear activation function have no problems? Of course it has.
    The problems lie in that it’s a constant function, so we can’t use the backpropagation
    technique (which we will talk about in the next sections) because it depends on
    derivatives. This is a constant function, so it has no derivative. The second
    thing is that it depends on its linearity. However many layers we have, it’s still
    a linear function; we could almost say that a neural network with a linear activation
    function is simply a linear regression model. It has limited power and ability
    to handle the complexity of varying parameters of input data, which makes us need
    to look to a new activation function: the nonlinear activation function. Nowadays
    many neural network models use nonlinear activation functions. They allow the
    model to create complex mappings between the network’s inputs and outputs, which
    are essential for learning and modeling complex data such as images, video, audio,
    and data sets that are nonlinear or have high dimensionality. They solve problems
    that faced the linear activation function. The types of nonlinear activation functions
    that are used today in neural network models are *sigmoid/logistic*, *tanh/hyperbolic
    tangent*, *ReLU (rectified linear unit)*, *leaky ReLU*, *softmax*, and *swish*.
    Let’s take a tour of those functions .'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sigmoid or logistic activation function** : when we talk about sigmoid, we
    mean probability between 0 and 1 function. The main reason we use sigmoid function
    is that it exists between 0 and 1.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, it is especially useful for models where we have to predict the
    probability of an output. Since the probability of anything exists only between
    *the range of 0 and 1*, sigmoid is the right choice. From only 0 and 1, let’s
    make the range wider; we can make the range from *-1 to 1*. This takes us to a
    new function: tanh or hyperbolic tangent activation function. This function is
    almost like sigmoid but the range is between -1 and 1 (Figure [9-18](#Fig18)).
    The advantage is that the negative inputs will be mapped strongly negative and
    the zero inputs will be mapped near zero in the tanh graph. And it works very
    well when we work in classification between two classes. But there is a function
    that may be the same as sigmoid; it’s called **Softmax** . This function will
    calculate the probabilities of each target class over all possible target classes.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Later, the calculated probabilities will be helpful for determining the target
    class for the given inputs. It’s almost like the sigmoid function but it is divided
    by all the possible target classes. If the Softmax function is used for a multiclassification
    model, it returns the probabilities of each class and the target class will have
    a high probability . Its equation is:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Sigmoid(x)=\frac{1}{1+\mathit{\exp}\left(-x\right)} $$](Images/484548_1_En_9_Chapter_TeX_Equd.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ softmax(x)=\frac{\mathit{\exp}(x)}{\sum_{j=0}^k\mathit{\exp}\left({x}_j\right)}
    $$](Images/484548_1_En_9_Chapter_TeX_Eque.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ softmax(x)=\frac{\mathit{\exp}(x)}{\sum_{j=0}^k\mathit{\exp}\left({x}_j\right)}
    $$](Images/484548_1_En_9_Chapter_TeX_Equf.png)'
  prefs: []
  type: TYPE_IMG
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig18_HTML.jpg](Images/484548_1_En_9_Fig18_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-18
  prefs: []
  type: TYPE_NORMAL
- en: The difference between sigmoid and tanh
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Both tanh and logistic sigmoid activation functions are used in feedforward
    nets.
  prefs: []
  type: TYPE_NORMAL
- en: Although we have good function in the range between -1 and 1, we need to have
    x continuous, so now we need to work with the ReLU function. It works from zero
    to infinity. Let’s see how it works, and why it’s called *rectified*. It is called
    rectified because it’s rectified under zero; if the value is below zero it will
    be zero, but if it equals 0 or above zero it will be the value itself.
  prefs: []
  type: TYPE_NORMAL
- en: '*The conclusion is f(z) is zero when z is less than zero and f(z) is equal
    to z when z is above or equal to zero.*'
  prefs: []
  type: TYPE_NORMAL
- en: After working with infinity, we now have to work with zero. We mainly waste
    all data under zero, so we create a new activation that gets some of the data
    under zero. It’s called **leaky ReLU** .
  prefs: []
  type: TYPE_NORMAL
- en: 'This function works in the same direction as the ReLU function but it has some
    variations; it mainly tries to improve ReLU range. It works with range - infinity,
    infinity. That is the main variation (Figure [9-19](#Fig19)); the equation is:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Relu(x)=\mathit{\max}\left(0,x\right) $$](Images/484548_1_En_9_Chapter_TeX_Equg.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ LeakyRelu(x)=\mathit{\max}\left(0.01\ast x,x\right) $$](Images/484548_1_En_9_Chapter_TeX_Equh.png)'
  prefs: []
  type: TYPE_IMG
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig19_HTML.jpg](Images/484548_1_En_9_Fig19_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-19
  prefs: []
  type: TYPE_NORMAL
- en: ReLU function (left); leaky ReLU function (right)
  prefs: []
  type: TYPE_NORMAL
- en: 'As we see in the preceding equations, the variation in function is that the
    first parameter in ReLU is equal to x multiplied by 0, as every parameter below
    0 will equal zero. In leaky ReLU, x is multiplied by 0.01, so for every parameter
    below zero you will have a negative target for this input. Google created a new
    activation function called **swish**; it performs better than *ReLU* with a similar
    level of computational efficiency (Figure [9-20](#Fig20)). Its equation is:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ Swish(x)=\frac{x}{1-\mathit{\exp}\left(-x\right)} $$](Images/484548_1_En_9_Chapter_TeX_Equi.png)'
  prefs: []
  type: TYPE_IMG
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig20_HTML.jpg](Images/484548_1_En_9_Fig20_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-20
  prefs: []
  type: TYPE_NORMAL
- en: The swish activation function
  prefs: []
  type: TYPE_NORMAL
- en: Recap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After all, an activation function is just a perceptron. It works to allow neural
    networks to learn: it should be in the output layer, it may be in hidden layers,
    but it has never been in the input layer.'
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Descent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is the main core of machine learning—the way we work to decrease the loss
    function. Let’s get an in-depth description of gradient descent; you can have
    more than one description with different meanings, but let’s see the abstract
    definition of gradient descent. Gradient descent is an optimization algorithm
    used to minimize some function by iteratively moving in the direction of steepest
    descent, as defined by the negative of the gradient. In machine learning, gradient
    descent is an optimization algorithm used to find the values of parameters (coefficients)
    of a function (f) that minimizes a cost function (loss). We talk about the cost
    function in the next sections. Gradient descent is best to use when the parameters
    cannot be calculated analytically (e.g., using linear algebra) and must be searched
    for by an optimization algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: We will not write the gradient descent algorithm manually, as it is already
    implemented in packages like Keras. But we need to understand the concept of how
    we optimize the cost function. Cost function is simply equal to *Loss* = (*actual
    output* − *predicted output*). Let’s see how gradient descent minimizes the cost
    function. Gradient descent is an efficient optimization algorithm that attempts
    to find a local or global minimum of a function. Gradient descent enables a model
    to learn the gradient or direction that the model should take in order to reduce
    errors (differences between actual y and predicted y). The direction in the simple
    linear regression example refers to how the model parameters **B** *(bias or intercept)*
    and **W** *(slope or coefficient)* should be tweaked or corrected to further reduce
    the cost function. As the model iterates, it gradually converges toward a minimum
    where further tweaks to the parameters produce little or zero changes in the loss,
    also referred to as convergence, where *y* = *WX* + *B*. Let’s see Figure [9-20](#Fig20)
    to illustrate this linear function.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig21_HTML.jpg](Images/484548_1_En_9_Fig21_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-21
  prefs: []
  type: TYPE_NORMAL
- en: A gradient descent step to the minimum point
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explain what happened in this graph. A random position on the surface
    of the graph is the cost of the current values of the coefficients (cost). The
    bottom of the graph is the cost of the best set of coefficients, the minimum of
    the function. Now you will iterate in the cost to get to the goal, which is to
    continue to try different values for the coefficients, evaluate their cost, and
    select new coefficients that have a slightly better (lower) cost. Repeating this
    process enough times will lead to the bottom of the graph, and you will know the
    values of the coefficients that result in the minimum cost.
  prefs: []
  type: TYPE_NORMAL
- en: Recap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Gradient descent is a way to optimize the cost by trying to get the minimum
    optimal values in the cost function. This concept has many applications like mini-batch,
    full batch, and stochastic gradient descent, and we will see them in the next
    sections. Gradient descent is a very popular optimization technique in machine
    learning and deep learning and it can be used with most, if not all, of the learning
    algorithms. A gradient is basically the slope of a function: the degree of change
    of a parameter with the amount of change in another parameter. Mathematically,
    it can be described as the partial derivatives of a set of parameters with respect
    to its inputs. The more the gradient, the steeper the slope. Gradient descent
    is a convex function.'
  prefs: []
  type: TYPE_NORMAL
- en: Batch vs. Stochastic vs. Mini-Batch Gradient Descent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, let’s look further into those three types. But before we start, we have
    to remind you that the goal of all supervised machine learning algorithms is to
    best estimate a *target function (f)* that maps *input data (X)* onto *output
    variables (Y)*. This describes all classification and regression problems.
  prefs: []
  type: TYPE_NORMAL
- en: Batch Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The concept behind batch gradient descent is to update the parameters of neural
    networks once. This process happens after the training example is finished, that
    is, after all the training examples have been passed through the **network**.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, if the training dataset contains 100 training examples, then the
    parameters of the neural network are updated once the training of all 100 examples
    is finished. Table [9-2](#Tab2) lists advantages and disadvantages of batch gradient
    descent.
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-2
  prefs: []
  type: TYPE_NORMAL
- en: Pros/Cons of Batch Gradient Descent
  prefs: []
  type: TYPE_NORMAL
- en: '| Advantages | Disadvantages |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| It produces a more stable gradient descent convergence and stable error gradient
    than stochastic gradient descent. | The entire training set can be too large to
    process in the memory, therefore, additional memory might be needed. |'
  prefs: []
  type: TYPE_TB
- en: '| It is computationally efficient, as all computer resources are not being
    used to process a single sample but rather are being used for all training samples.
    | Depending on computer resources, it can take too long for processing all the
    training samples as a batch. |'
  prefs: []
  type: TYPE_TB
- en: '| It enhances the steps toward the minimum of loss function, due to updating
    the parameters by computing the average of all the training samples rather than
    the value of a single sample. |   |'
  prefs: []
  type: TYPE_TB
- en: We can see that with batch gradient, it is all about the resources you have.
  prefs: []
  type: TYPE_NORMAL
- en: Stochastic Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this method, one training sample (example) is passed through the neural
    network at a time and the parameters (weights) of each layer are updated with
    the computed gradient. The parameters of all the layers of the network are updated
    after every training sample. Let’s take an example: you have 1,000 training samples,
    so you now have 1,000 updated parameters and every parameter is updated after
    every individual sample. Table [9-3](#Tab3) lists advantages and disadvantages
    of stochastic gradient descent. Following is the equation for stochastic gradient
    descent; it is iterated over “n” times for “n” training samples in the training
    set.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\theta}_j:= {\theta}_j-\alpha \frac{\partial }{\partial {\theta}_j}J\left(\theta
    \right). $$](Images/484548_1_En_9_Chapter_TeX_IEq2.png)'
  prefs: []
  type: TYPE_IMG
- en: Table 9-3
  prefs: []
  type: TYPE_NORMAL
- en: Pros/cons of Stochastic Gradient Descent
  prefs: []
  type: TYPE_NORMAL
- en: '| Advantages | Disadvantages |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| It is computationally fast, as only one sample is processed at a time. |
    It can take the gradient descent into other directions, because its frequent updating
    to local minimum is very noisy. |'
  prefs: []
  type: TYPE_TB
- en: '| In this type, we have many updates. That means the frequent updates of the
    steps taken toward the minima of the loss function have oscillations, which can
    help to get out of local minimums of the loss function. | It loses the advantage
    of vectorized operations, as it deals with only a single example at a time. |'
  prefs: []
  type: TYPE_TB
- en: '| It is easier to fit into memory, due to a single training sample being processed
    by the network. | Frequent updates are computationally expensive, due to using
    all resources for processing one training sample at a time. |'
  prefs: []
  type: TYPE_TB
- en: As we see, every optimization has its advantages and disadvantages, which must
    be considered when choosing which type of gradient descent to use. Now let’s talk
    about the final type we’ve mentioned in this section, the mini-batch gradient
    descent.
  prefs: []
  type: TYPE_NORMAL
- en: Mini-batch Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Mini-batch gradient is a hybrid system between stochastic and batch gradient
    descent. It is a variation of the gradient descent algorithm that splits the training
    dataset into small batches that are used to calculate model error and update model
    coefficients. What mini-batch seeks to do is to find the balance between what
    stochastic does and the efficiency of batch gradient. Table [9-4](#Tab4) lists
    advantages and disadvantages of this type.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, we only need to know that all this will work to optimize model learning
    and change the equation of cost function to allow the model to get the best accuracy
    while reducing the error rate.
  prefs: []
  type: TYPE_NORMAL
- en: Table 9-4
  prefs: []
  type: TYPE_NORMAL
- en: The Pros/Cons of Mini-batch Gradient Descent
  prefs: []
  type: TYPE_NORMAL
- en: '| Advantages | Disadvantages |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| The model update frequency is higher than batch gradient descent, which allows
    for a more robust convergence, avoiding local minima.The batched updates provide
    a computationally more efficient process than stochastic gradient descent. | You
    need to configure the “mini-batch size” hyperparameter for the learning algorithm.Error
    information must be accumulated across mini-batches of training examples, as with
    batch gradient descent. |'
  prefs: []
  type: TYPE_TB
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most used gradient is the mini-batch gradient descent, especially in deep
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: Recap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this section, we learned the types of gradient descent. As we see, every
    type has its advantages and disadvantages, so we need to choose between them and
    see what will enhance our model more. We said before that mini-batch is the state
    of the art in deep learning nowadays; that may change in the future, but for now
    we will use it in deep learning. We hope you had fun with this section on gradient
    optimizers.
  prefs: []
  type: TYPE_NORMAL
- en: Loss function and Backpropagation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To simplify the neural network algorithm, we can say that any neural network
    can be presented as a black box with two methods, learning and predicting, as
    described in Figure [9-22](#Fig22).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig22_HTML.jpg](Images/484548_1_En_9_Fig22_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-22
  prefs: []
  type: TYPE_NORMAL
- en: The difference between training and predicting methods
  prefs: []
  type: TYPE_NORMAL
- en: Our main concern in this part of the book is the learning process, which takes
    the inputs and the desired outputs and updates its internal state accordingly,
    so the calculated output gets as close as possible to the desired output.
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to achieve this, we will decompose the learning process into its several
    building blocks or steps, which can be stated in the following order:'
  prefs: []
  type: TYPE_NORMAL
- en: Model initialization
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Forward propagation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compute loss
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compute differentiation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Back propagation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Update the weights.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Iterate from step 2 to 6 until convergence.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first step is **model initialization** before any learning procedure happens.
    This step is the initial hypothesis, or we can say the random guess. In this step,
    the model you will build will guess a random output for a given input. Thus, a
    *random initialization* of the model is a common practice. In order to understand
    this analogy, take for instance a person who has never played soccer in his life.
    The very first time he tries to shoot the ball, he just shoots it randomly.
  prefs: []
  type: TYPE_NORMAL
- en: The natural step to do after *initializing* the model with random weights is
    to check its performance. And to check the model performance we need first to
    make it work on the inputs we pass them through the network layer and we compare
    the model output with the actual output straightforwardly. This step is called
    **forward-propagation** , because the calculation flow is going in the natural
    forward direction from the input through the neural network to the output.
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, on the one hand we have the model output of the randomly initialized
    neural network. On the other hand, we have the actual output we would like the
    network to learn, the real output of input data we feed to the neural network.
    Returning to the example of our soccer player shooting for the first time, the
    model output will be the final position of the ball (most of the time it will
    be out/missed), and the actual output would be that the ball goes inside the goal.
    In the beginning, our player is just shooting randomly. Let’s say the ball went
    out—or to the right side of the goal—most of the time. What he can learn from
    this is that he needs to shoot a bit more to the left and focus his aim to the
    goal area next time he trains. In order to be able to generalize to any problem,
    we define what we call **loss function** .
  prefs: []
  type: TYPE_NORMAL
- en: Basically, it is a performance metric on how well the neural network manages
    to reach its goal of generating outputs as close as possible to the desired values.
    The most intuitive loss function is simply *loss* = (*actual output* − *model
    output*).
  prefs: []
  type: TYPE_NORMAL
- en: Obviously, we can use any optimization technique that modifies the internal
    weights of neural networks in order to minimize the total loss function that we
    previously defined. These techniques can include greedy search or even a simple
    brute-force search, but the most used technique is to go to the optimal weights
    that minimize the loss to its minimum value step by step using **differentiation**.
  prefs: []
  type: TYPE_NORMAL
- en: Using searching techniques or even brute-force might work if the model has only
    very few parameters and we don’t care much about precision. However, if we are
    training a neural network over an array of 600x600 inputs (like in image processing),
    we can very easily reach models with millions of weights to optimize and brute-force
    can’t even be imaginable, since it’s a pure waste of computational resources!
  prefs: []
  type: TYPE_NORMAL
- en: Basically, differentiation deals with the derivative of the loss function. In
    mathematics, the derivative of a function at a certain point gives the rate or
    the speed at which this function is changing its values at this point. In order
    to see the effect of the derivative, we can ask ourselves how much the total error
    will change if we change the internal weight of the neural network with a certain
    small value *δW*.
  prefs: []
  type: TYPE_NORMAL
- en: You model might be composed of only one layer inside the neural network between
    the inputs and the outputs. But in many cases, more layers are needed, in order
    to reach more variations in the functionality of the neural network. For sure,
    we can always create one complicated function that represents the composition
    of all the layers of the network. Although in most cases composing the functions
    is very hard; plus, for every composition one has to calculate the dedicated derivative
    of the composition (which is not at all scalable and very error prone). In order
    to solve the problem, luckily for us, the derivative is decomposable, thus it
    can be **backpropagated**. We have the starting point of errors, which is the
    loss function, and we know how to derive it. So if we know how to derive each
    function from the composition, we can propagate back the error from the end to
    the start.
  prefs: []
  type: TYPE_NORMAL
- en: As we presented earlier, the derivative is just the rate at which the error
    changes, relative to the weight changes.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In real-life problems we shouldn’t **update the weights** with such big steps.
    Since there are a lot of nonlinearities, any big change in weights will lead to
    chaotic behavior. We should not forget that the derivative is only local at the
    point where we are calculating the derivative.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, a general rule of weight updates is the delta rule: *NewWeight* = *OldWeight* − *CalculatedDerivative* ∗ *LearningRate*
    The learning rate is introduced as a constant (usually very small), in order to
    force the weight to get updated very smoothly and slowly (to avoid big steps and
    chaotic behavior).'
  prefs: []
  type: TYPE_NORMAL
- en: Since we update the weights with a small delta step at a time, it will take
    several iterations in order to learn. This is very similar to genetic algorithms,
    where after each generation we apply a small mutation rate and the fittest survives.
    In a neural network, after each iteration the gradient descent force updates the
    weights toward less and less global loss function. The similarity is that the
    delta rule acts as a mutation operator, and the loss function acts as a fitness
    function to minimize. The difference is that in genetic algorithms, the mutation
    is blind. Some mutations are bad, some are good, but the good ones have a higher
    chance to survive. However, the weight updates in neural networks are smarter,
    since they are guided by the decreasing gradient force over the error.
  prefs: []
  type: TYPE_NORMAL
- en: Loss Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The loss function is the metric that helps a network understand whether it
    is learning in the right direction. To frame the loss function in simple words,
    consider it as the test score you achieve in an examination. Say you appeared
    for tests with several questions on a certain subject: what metrics would you
    use to understand your performance on this test? Obviously, the test score. Assume
    you answered all the questions, comparing your answers for each question with
    the right answer will give you a score metric that assesses your performance on
    the subject itself. Assuming you scored 56, 60, 78, 90, and 96 out of 100 in five
    consecutive language tests, you would clearly see that improving test scores are
    an indication of how well you are performing. Had the test scores been decreasing,
    then the verdict would be that your performance is decreasing and you would need
    to change your studying methods or materials to improve.'
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, *how does a network understand whether it is improving its learning
    process in each iteration?* It uses the loss function, which is analogous to the
    test score. The loss function essentially measures the loss from the target. Say
    you are developing a model to predict whether a student will pass or fail, and
    the chance of passing or failing is defined by the probability. So, 1 would indicate
    that he will pass with 100% certainty and 0 would indicate that he will definitely
    fail.
  prefs: []
  type: TYPE_NORMAL
- en: The model learns from the data and predicts a score of 0.87 for the student
    to pass. So, the actual loss here would be 1.00 – 0.87 = 0.13\. If it repeats
    the exercise with some parameter updates in order to improve and now achieves
    a loss of 0.40, it would understand that the changes it has made are not helping
    the network to appropriately learn. Alternatively, a new loss of 0.05 would indicate
    that the updates or changes from the learning are in the right direction.
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on the type of data outcome, we have several standard loss functions
    defined in both machine and deep learning. For regression use cases (e.g., where
    the end prediction would be a continuous number like the marks scored by a student,
    the number of product units sold by a shop, the number of calls received from
    customers in a contact center), here are some popular loss functions available:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mean Squared Error** - Average squared difference between the actual and
    predicted value.'
  prefs: []
  type: TYPE_NORMAL
- en: The squared difference makes it easy to penalize the model more for a higher
    difference. So, a difference of 3 would result in a loss of 9, but difference
    of 9 would return a loss of 81.
  prefs: []
  type: TYPE_NORMAL
- en: The mathematical equivalent would be
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\sum}_{i=0}^n\frac{{\left( Actual- Predicted\right)}^2}{k} $$](Images/484548_1_En_9_Chapter_TeX_Equj.png)'
  prefs: []
  type: TYPE_IMG
- en: TensorFlow equivalent
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Mean Absolute Error** is the average absolute error between actual and predicted.'
  prefs: []
  type: TYPE_NORMAL
- en: The mathematical equivalent would be
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\sum}_{i=0}^n\mid Actual- Predicted\mid $$](Images/484548_1_En_9_Chapter_TeX_Equk.png)'
  prefs: []
  type: TYPE_IMG
- en: TensorFlow equivalent is
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Similarly, a few other variants are
  prefs: []
  type: TYPE_NORMAL
- en: MAPE – Mean absolute percentage error
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MSLE – Mean square logarithmic error
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: For categorical outcomes, your prediction would be for a class, like whether
    a student will pass (1) or fail (0), whether the customer will make a purchase
    or not, whether the customer will default on payment or not, and so on. Some use
    cases may have multiple classes as an outcome, like classifying types of disease
    (Type A, B, or C); classifying images as cats, dogs, cars, horses, landscapes;
    and so on.
  prefs: []
  type: TYPE_NORMAL
- en: In such cases, the losses defined in the preceding cannot be used due to obvious
    reasons. We would need to quantify the outcome of the class as probability and
    define losses based on the probability estimates as predictions.
  prefs: []
  type: TYPE_NORMAL
- en: 'A few popular choices for losses for categorical outcomes in Keras are as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Binary cross-entropy** defines the loss when the categorical outcome is a
    binary variable, that is, with two possible outcomes: (Pass/Fail) or (Yes/No).'
  prefs: []
  type: TYPE_NORMAL
- en: The mathematical form would be ![$$ Loss=-\left[\ y\ast \mathit{\log}\left(\hat{y}\right)+\left(1-y\right)\ast
    \mathit{\log}\left(1-\hat{y}\right)\ \right] $$](Images/484548_1_En_9_Chapter_TeX_IEq3.png)
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow equivalent is
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**Categorical cross-entropy** defines the loss when the categorical outcomes
    is nonbinary, that is, more than two possible outcomes: (Yes/No/Maybe) or (Type
    1/ Type 2/… Type n).'
  prefs: []
  type: TYPE_NORMAL
- en: The mathematical form would be ![$$ Loss={\sum}_{j=0}^m{\sum}_{i=0}^n{y}_{ij}\ast
    \log \left(\ {\hat{y}}_{ji}\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq4.png)
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow equivalent is
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Backpropagation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Understanding the backpropagation algorithm can take some time. If you are looking
    for a fast implementation of a neural network, you can skip this section, as modern
    libraries have the capability to autodifferentiate and perform the entire training
    procedure. However, understanding this algorithm would definitely give you insights
    into problems related to deep learning (learning problems, slow learning, exploding
    gradients, and diminishing gradients).
  prefs: []
  type: TYPE_NORMAL
- en: Gradient descent is a powerful algorithm, yet it is a slow method when the number
    of weights increases. In the case of neural networks having parameters in the
    range of thousands, training each weight with respect to the loss function—or,
    rather, formulating the loss as a function of all the weights—becomes painstakingly
    slow and extremely complex to use for practical purposes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Thanks to the path-breaking paper by Geoffrey Hinton and his colleagues in
    1986, we have an extremely fast and beautiful algorithm that helps us to find
    the partial derivative of the loss with respect to each weight. This algorithm
    is the workhorse of the training procedure for every deep learning algorithm.
    More detailed information can be found here: [`www.cs.toronto.edu/~hinton/backprop.html`](http://www.cs.toronto.edu/%257Ehinton/backprop.html).'
  prefs: []
  type: TYPE_NORMAL
- en: It is the most efficient possible procedure to compute the exact gradient, and
    its computational cost is always of the same *O*() complexity as computing the
    loss itself. The proof of backpropagation is beyond the scope of this book; however,
    the intuitive explanation of the algorithm can give you an excellent insight into
    its complex working.
  prefs: []
  type: TYPE_NORMAL
- en: 'For backpropagation to work, two basic assumptions are made regarding the error
    function:'
  prefs: []
  type: TYPE_NORMAL
- en: Total error can be written as a summation of individual errors of training samples/minibatch,
    *E* = ∑[*k*]*E*[*k*].
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Error can be written as a function of outputs of the network.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Backpropagation consists of two parts:'
  prefs: []
  type: TYPE_NORMAL
- en: Forward pass, wherein we initialize the weights and make a feedforward network
    to store all the values
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Backward pass, which is performed to have the stored values update the weights.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Partial derivatives, chain rules, and linear algebra are the main tools required
    to deal with backpropagation (Figure [9-23](#Fig23)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig23_HTML.jpg](Images/484548_1_En_9_Fig23_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-23
  prefs: []
  type: TYPE_NORMAL
- en: How backpropagation works
  prefs: []
  type: TYPE_NORMAL
- en: Initially, all the edge weights are randomly assigned. For every input in the
    training dataset, the ANN is activated and its output is observed. This output
    is compared with the desired output that we already know, and the error is “propagated”
    back to the previous layer. This error is noted, and the weights are “adjusted”
    accordingly. This process is repeated until the output error is below a predetermined
    threshold.
  prefs: []
  type: TYPE_NORMAL
- en: Once the preceding algorithm terminates, we have a “learned” ANN, which we consider
    to be ready to work with “new” inputs. This neural network is said to have learned
    from several examples (labeled data) and from its mistakes (error propagation).
  prefs: []
  type: TYPE_NORMAL
- en: Curious readers should investigate the original paper on backpropagation. We
    have provided a list of resources and blogs to understand the algorithm in greater
    depth. However, when it comes to implementation, you will hardly write your own
    code on backpropagation, as most of the libraries support automatic differentiation,
    and you won’t really want to tweak the backpropagation algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: In layman’s language, in backpropagation, we try to sequentially update the
    weights, first by making a forward pass on the network, after which we first update
    the weights of the last layer, using the label and last layer outputs, then subsequently
    use this information recursively on the layer just before and proceed.
  prefs: []
  type: TYPE_NORMAL
- en: The Four Fundamental Equations Behind Backpropagation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Backpropagation is about understanding how changing the weights and biases in
    a network changes the cost function. Ultimately, this meanscomputing the partial
    derivatives ![$$ \frac{\partial C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq5.png)
    and ![$$ \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq6.png).
    But to compute those,we first introduce an intermediate quantity, ![$$ {\delta}_j^l
    $$](Images/484548_1_En_9_Chapter_TeX_IEq7.png), which we call the *error* in the
    *j*^(*th*) neuron in the *l*^(*th*) layer. Backpropagation will give us a procedure
    tocompute the error ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq8.png),
    and then will relate ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq9.png)
    to ![$$ \frac{\partial C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq10.png)
    and ![$$ \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq11.png).
  prefs: []
  type: TYPE_NORMAL
- en: To understand how the error is defined, imagine there is a red square in our
    neural network (red square in Figure [9-24](#Fig24)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig24_HTML.jpg](Images/484548_1_En_9_Fig24_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-24
  prefs: []
  type: TYPE_NORMAL
- en: The neuron J in Layer L through the backpropagation process
  prefs: []
  type: TYPE_NORMAL
- en: The red square sits at the *j*^(*th*) neuron in layer l. As the input to the
    neuron comes in, the red square messes with the neuron’s operation. It adds a
    little change ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq12.png)
    to the neuron’s weighted input, so that insteadof outputting ![$$ \sigma \left({z}_j^l\right)
    $$](Images/484548_1_En_9_Chapter_TeX_IEq13.png), the neuron outputs ![$$ \sigma
    \left({z}_j^l+\varDelta {z}_j^l\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq14.png).
    This change propagates through later layers in the network, finally causing the
    overall cost to change by an amount ![$$ \frac{\partial C}{\partial {z}_j^l}\varDelta
    {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq15.png).
  prefs: []
  type: TYPE_NORMAL
- en: Now, this square is a good red square, and is trying to help you improve the
    cost, that is, trying to find a ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq16.png)
    that makes the cost smaller. Suppose![$$ \frac{\partial C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq17.png)
    has a large value (either positive or negative). Then the red square canlower
    the cost quite a bit by choosing ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq18.png)
    to have the opposite sign to ![$$ \frac{\partial C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq19.png).By
    contrast, if ![$$ \frac{\partial C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq20.png)
    is close to zero, then the red square can’t improve thecost much at all by perturbing
    the weighted input ![$$ {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq21.png).
    So, as far as the red square can tell, the neuron is already pretty near optimal.
  prefs: []
  type: TYPE_NORMAL
- en: This is only the case for small changes ![$$ \varDelta {z}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq22.png),
    of course. We’ll assume that the red square is constrained to make such small
    changes. And so, there’s a heuristic sense in which ![$$ \frac{\partial C}{\partial
    {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq23.png) is a measure of the error
    in the neuron.
  prefs: []
  type: TYPE_NORMAL
- en: Motivated by this story, we define the error ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq24.png)
    of neuron *j* in layer *l*by ![$$ {\delta}_j^l=\frac{\partial C}{\partial {z}_j^l}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq25.png).
  prefs: []
  type: TYPE_NORMAL
- en: To continue, we use *δ*^(*l*) to denote the vector of errors associated with
    layer l. Backpropagation will give us a way of computing *δ*^(*l*) for every layer,
    and thenrelating those errors to the quantities of real interest, ![$$ \frac{\partial
    C}{\partial {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq26.png) and ![$$
    \frac{\partial C}{\partial {b}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq27.png).
  prefs: []
  type: TYPE_NORMAL
- en: You might wonder why the red square is changing the weighted input ![$$ {z}_j^l
    $$](Images/484548_1_En_9_Chapter_TeX_IEq28.png). Surely, it’d be more natural
    to imagine the red square changing theoutput activation ![$$ {a}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq29.png),
    with the result that we’d be using ![$$ \frac{\partial C}{\partial {a}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq30.png)
    as ourmeasure of error. In fact, if you do, these things work out quite similarly
    to the discussion following. But it turns out to make the presentation of backpropagation
    a little more algebraically complicated. So, we’ll stickwith ![$$ {\delta}_j^l=\frac{\partial
    C}{\partial {z}_j^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq31.png) as our measure
    of error.
  prefs: []
  type: TYPE_NORMAL
- en: In classification problems like *MNIST,* the term “**error**” is sometimes used
    to mean the classification failure rate. For example, if the neural net correctly
    classifies 96.0 percent of the digits, then the error is 4.0 percent. Obviously,
    this has quite a different meaning from our *δ* vectors. In practice, you shouldn’t
    have trouble telling which meaning is intended in any given usage.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our target: Backpropagation is based around four fundamental equations. Together,
    those equations give us a way of computing both the error *δ*^(*l*) and the gradient
    of the cost function. I state the four equations later. Be warned, though: you
    shouldn’t expect to instantaneously assimilate the equations. Such an expectation
    will lead to disappointment. In fact, the backpropagation equations are so rich,
    that understanding them well requires considerable time and patience as you gradually
    delve deeper into the equations. The good news is that such patience is repaid
    many times over. And so, the discussion in this section is merely a beginning,
    helping you on the way to a thorough understanding of the equations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a preview of the ways we’ll delve more deeply into the equations later
    in the chapter: I’ll give a short proof of the equations, which helps explain
    why they are true; we’ll restate the equations in algorithm-like form as pseudocode,
    and see how the pseudocode can be implemented as real, running Python code; and,
    in the final section of the chapter, we’ll develop an intuitive picture of what
    the backpropagation equations mean, and how someone might discover them from scratch.
    Along the way we’ll return repeatedly to the four fundamental equations, and as
    you deepen your understanding, those equations will come to seem comfortable and,
    perhaps, even beautiful and natural.'
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an equation for the error in the output layer, *δ*^(*L*). The components
    of *δ*^(*L*) are given by
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\delta}_j^L=\frac{\partial C}{\partial {a}_j^L}{\sigma}^{`}\left({z}_j^L\right)
    $$](Images/484548_1_En_9_Chapter_TeX_Equ1.png)'
  prefs: []
  type: TYPE_IMG
- en: (Equation 1)
  prefs: []
  type: TYPE_NORMAL
- en: This is a very natural expression. The first term on the right, ![$$ \frac{\partial
    C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq32.png),just measures
    how fast the cost is changing as a function of the *j*^(*th*) output activation.
    If, for example, *C* doesn’t depend much on a particular output neuron, *j*, then
    ![$$ {\delta}_j^L $$](Images/484548_1_En_9_Chapter_TeX_IEq33.png) will be small,
    which is what we’d expect. The second term on the right, ![$$ {\sigma}^{`}\left({z}_j^L\right)
    $$](Images/484548_1_En_9_Chapter_TeX_IEq34.png), measures how fast the activation
    function *σ* is changing at ![$$ {z}_j^L $$](Images/484548_1_En_9_Chapter_TeX_IEq35.png).
  prefs: []
  type: TYPE_NORMAL
- en: Notice that everything in Equation 1 is easily computed. In particular, we compute
    ![$$ {z}_j^L $$](Images/484548_1_En_9_Chapter_TeX_IEq36.png) while computing the
    behavior of the network, and it’s only a small additional overhead to compute
    ![$$ {\sigma}^{`}\left({z}_j^L\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq37.png).
    The exact form of ![$$ \frac{\partial C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq38.png)
    will, of course, depend on the form of the cost function. However,provided the
    cost function is known, there should be little trouble computing ![$$ \frac{\partial
    C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq39.png). For example,
    if we’re using the quadratic cost function,then ![$$ C=\frac{1}{2}{\sum}_j{\left({a}_j^L-{y}_j\right)}^2
    $$](Images/484548_1_En_9_Chapter_TeX_IEq40.png), and so ![$$ \frac{\partial C}{\partial
    {a}_j^L}=\left({a}_j^L-{y}_j\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq41.png),
    which obviously is easilycomputable.
  prefs: []
  type: TYPE_NORMAL
- en: Equation 1 is a component-wise expression for *δ*^(*L*). It’s a perfectly good
    expression, but not the matrix-based form we want for backpropagation. However,
    it’s easy to rewrite the equation in a matrix-based form, as *δ*^(*L*) = ∇[*a*]*C* ⊙ *σ*^′(*z*^(*L*))
    (Equation 1 a).
  prefs: []
  type: TYPE_NORMAL
- en: Here, ∇[*a*]*C* is defined to be a vector whose components are the partialderivatives
    ![$$ \frac{\partial C}{\partial {a}_j^L} $$](Images/484548_1_En_9_Chapter_TeX_IEq42.png).
    You can think of ∇[*a*]*C* as expressing the rate of changeof *C* with respect
    to the output activations. It’s easy to see that Equation 1 a and Equation 1 are
    equivalent, and for that reason from now on we’ll use Equation 1 interchangeably
    to refer to both equations. As an example, in the case of the quadratic cost we
    have ∇[*a*]*C* = *a*^(*L*) − *y*, and so the fully matrix-based form of Equation
    1 becomes *δ*^(*L*) = (*a*^(*L*) − *y*) ⊙ *σ*^′(*z*^(*L*)). As you can see, everything
    in this expression has a nice vector form, and is easily computed using a library
    such as *NumPy*.
  prefs: []
  type: TYPE_NORMAL
- en: Here is an equation for the error *δ*^(*l*) in terms of the error in the next
    layer, *δ*^(*l* + 1). In particular,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\delta}^l=\left({\left({w}^{l+1}\right)}^T{\delta}^{l+1}\right)\Big)\odot
    {\sigma}^{`}\left({z}^l\right) $$](Images/484548_1_En_9_Chapter_TeX_Equ2.png)'
  prefs: []
  type: TYPE_IMG
- en: (Equation 2)
  prefs: []
  type: TYPE_NORMAL
- en: where (*w*^(*l* + 1))^(*T*) is the transpose of the weight matrix *w*^(*l* + 1)
    for the (*l* + 1)^(*th*) layer. This equation appears complicated, but each element
    has a nice interpretation. Suppose we know the error *δ*^(*l* + 1) at the (*l* + 1)^(*th*)
    layer. When we apply the transpose weight matrix, (*w*^(*l* + 1))^(*T*), we can
    think intuitively of this as moving the error backward through the network, giving
    us some sort of measure of the error at the output of the *l*^(*th*) layer. We
    then take the Hadamard product ⊙*σ*^`(*z*^(*l*)). This moves the error backward
    through the activation function in layer *l*, giving us the error *δ*^(*l*) in
    the weighted input to layer *l*.
  prefs: []
  type: TYPE_NORMAL
- en: By combining Equation 2 with Equation 1, we can compute the error *δ*^(*l*)
    for any layer in the network. We start by using Equation 1 to compute *δ*^(*L*),
    then apply Equation 2 to compute *δ*^(*L* − 1), then Equation 2 again to compute
    *δ*^(*L* − 2), and so on, all the way back through the network.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an equation for the rate of change of the cost with respect to any bias
    in the network. In particular,
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial C}{\partial {b}_j^l}={\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_Equ3.png)'
  prefs: []
  type: TYPE_IMG
- en: (Equation 3)
  prefs: []
  type: TYPE_NORMAL
- en: That is, the error ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq43.png)
    is exactly equal to the rate of change ![$$ \frac{\partial C}{\partial {b}_j^l}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq44.png). This isgreat news, since Equation
    1 and Equation 2 have already told us how tocompute ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq45.png).
    We can rewrite Equation 3 in shorthand as ![$$ \frac{\partial C}{\partial b}=\delta
    $$](Images/484548_1_En_9_Chapter_TeX_IEq46.png), where it is understood that *δ*
    is being evaluated at the same neuron as the bias *b*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an equation for the rate of change of the cost with respect to any
    weight in the network: In in particular,'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ \frac{\partial C}{\partial {w}_{jk}^l}={a}_k^{l-1}{\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_Equ4.png)'
  prefs: []
  type: TYPE_IMG
- en: (Equation 4)
  prefs: []
  type: TYPE_NORMAL
- en: This tells us how to compute the partial derivatives ![$$ \frac{\partial C}{\partial
    {w}_{jk}^l} $$](Images/484548_1_En_9_Chapter_TeX_IEq47.png) in terms ofthe quantities
    *δ*^(*l*) and *a*^(*l* − 1), which we already know how to compute. Theequation
    can be rewritten in a less index-heavy notation as ![$$ \frac{\partial C}{\partial
    w}={a}_{in}{\delta}_{out} $$](Images/484548_1_En_9_Chapter_TeX_IEq48.png), where
    it’s understood that *a*[*in*] is the activation of the neuron input to the weight
    *w*, and *δ*[*out*] is the error of the neuron output from the weight *w*. Zooming
    in to look at just the weight, *w*, and the two neurons connected by that weight,
    we can depict this as shown in Figure [9-25](#Fig25).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig25_HTML.jpg](Images/484548_1_En_9_Fig25_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-25
  prefs: []
  type: TYPE_NORMAL
- en: The backpropagation connection between two neurons
  prefs: []
  type: TYPE_NORMAL
- en: A nice consequence of the equation ![$$ \frac{\partial C}{\partial w}={a}_{in}{\delta}_{out}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq49.png) is that when the activation a[in]
    is small, *a*[*in*] ≈ 0, the gradient term ![$$ \frac{\partial C}{\partial w}
    $$](Images/484548_1_En_9_Chapter_TeX_IEq50.png) will also tend to be small. In
    this case, we’ll say the weight learns slowly, meaning that it’s not changing
    much during gradient descent. In other words, one consequence of Equation 4 is
    that weights output from low-activation neurons learn slowly.
  prefs: []
  type: TYPE_NORMAL
- en: There are other insights along these lines, which can be obtained from Equation
    1 to Equation 4\. Let’s start by looking at the output layer. Consider the term
    ![$$ {\sigma}^{`}\left({z}_j^L\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq51.png)
    in Equation 1\. Recall from the graph of the sigmoid function in the last chapter
    that the σ function becomes very flat when ![$$ \sigma \left({z}_j^L\right) $$](Images/484548_1_En_9_Chapter_TeX_IEq52.png)
    is approximately 0 or 1\. When this occurs, we will have ![$$ {\sigma}^{`}\left({z}_j^L\right)\approx
    0 $$](Images/484548_1_En_9_Chapter_TeX_IEq53.png). And so, the lesson is that
    a weight in the final layer will learn slowly if the output neuron is either low
    activation (≈0) or high activation (≈1). In this case, it’s common to say the
    output neuron has saturated and, as a result, the weight has stopped learning
    (or is learning slowly). Similar remarks also hold for the biases of output neuron.
  prefs: []
  type: TYPE_NORMAL
- en: We can obtain similar insights for earlier layers. In particular, note the *σ*^'(*z*^(*l*))
    term in Equation 2\. This means that ![$$ {\delta}_j^l $$](Images/484548_1_En_9_Chapter_TeX_IEq54.png)
    is likely to get small if the neuron is near saturation. And this, in turn, means
    that any weights input to a saturated neuron will learn slowly.
  prefs: []
  type: TYPE_NORMAL
- en: This reasoning won’t hold if (*w*^(*l* + 1))^(*T*)*δ*^(*l* + 1)) has large enough
    entries to compensate for the smallness of ![$$ {\sigma}^{`}\left({z}_j^L\right)
    $$](Images/484548_1_En_9_Chapter_TeX_IEq55.png). But I’m speaking of the general
    tendency.
  prefs: []
  type: TYPE_NORMAL
- en: Summing up, we’ve learned that a weight will learn slowly if either the input
    neuron is low-activation or if the output neuron has saturated (i.e., is either
    high- or low-activation).
  prefs: []
  type: TYPE_NORMAL
- en: None of these observations is too greatly surprising. Still, they help improve
    our mental model of what’s going on as a neural network learns. Furthermore, we
    can turn this type of reasoning around. The four fundamental equations turn out
    to hold for any activation function, not just the standard sigmoid function (that’s
    because, as we’ll see in a moment, the proofs don’t use any special properties
    of *σ*). So, we can use these equations to design activation functions that have
    particular desired learning properties. As an example, suppose we were to choose
    a (nonsigmoid) activation function σ so that σ′ is always positive and never gets
    close to zero. That would prevent the slowdown of learning that occurs when ordinary
    sigmoid neurons saturate. Later in the book we’ll see examples where this kind
    of modification is made to the activation function. Keeping the four equations
    (Equations 1 to 4) in mind can help explain why such modifications are tried,
    and what impact they can have (Figure [9-26](#Fig26)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig26_HTML.jpg](Images/484548_1_En_9_Fig26_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-26
  prefs: []
  type: TYPE_NORMAL
- en: Summing up all of the four equations
  prefs: []
  type: TYPE_NORMAL
- en: Exploding Gradients
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What are exploding gradients?
  prefs: []
  type: TYPE_NORMAL
- en: An error gradient is the direction and magnitude calculated during the training
    of a neural network that is used to update the network weights in the right direction
    and by the right amount.
  prefs: []
  type: TYPE_NORMAL
- en: In deep networks or recurrent neural networks, error gradients can accumulate
    during an update and result in very large gradients. These in turn result in large
    updates to the network weights, and in turn, an unstable network. At an extreme,
    the values of weights can become so large as to overflow and result in NaN values.
  prefs: []
  type: TYPE_NORMAL
- en: The explosion occurs through exponential growth by repeatedly multiplying gradients
    through the network layers that have values larger than 1.0.
  prefs: []
  type: TYPE_NORMAL
- en: What is the problem with exploding gradients?
  prefs: []
  type: TYPE_NORMAL
- en: In deep multilayer perceptron networks, exploding gradients can result in an
    unstable network that at best cannot learn from the training data and at worst
    results in NaN weight values that can no longer be updated. Exploding gradients
    can make learning unstable. In recurrent neural networks, exploding gradients
    can result in an unstable network that is unable to learn from training data and
    at best a network that cannot learn over long input sequences of data.
  prefs: []
  type: TYPE_NORMAL
- en: The exploding gradients problem refers to the large increase in the norm of
    the gradient during training. Such events are due to the explosion of the long-term
    components
  prefs: []
  type: TYPE_NORMAL
- en: 'How do you know if you have exploding gradients? There are some subtle signs
    that you may be suffering from exploding gradients during the training of your
    network, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: The model is unable to get traction on your training data (e.g., poor loss).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model is unstable, resulting in large changes in loss from update to update.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model loss goes to NaN during training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you have these types of problems, you can dig deeper to see if you have a
    problem with exploding gradients. There are some less subtle signs that you can
    use to confirm that you have exploding gradients.
  prefs: []
  type: TYPE_NORMAL
- en: The model weights quickly become very large during training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model weights go to NaN values during training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The error gradient values are consistently above 1.0 for each node and layer
    during training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How can we fix exploding gradients? There are many approaches to addressing
    exploding gradients; this section lists some best practice approaches that you
    can use.
  prefs: []
  type: TYPE_NORMAL
- en: Re-Design the Network Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In deep neural networks, exploding gradients may be addressed by redesigning
    the network to have fewer layers.
  prefs: []
  type: TYPE_NORMAL
- en: There may also be some benefit in using a smaller batch size while training
    the network.
  prefs: []
  type: TYPE_NORMAL
- en: In recurrent neural networks, updating across fewer prior time steps during
    training, called truncated backpropagation through time, may reduce the exploding
    gradient problem.
  prefs: []
  type: TYPE_NORMAL
- en: Use Long Short-Term Memory Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In recurrent neural networks, gradient exploding can occur given the inherent
    instability in the training of this type of network, for example, via backpropagation
    through time that essentially transforms the recurrent network into a deep multilayer
    perceptron neural network.
  prefs: []
  type: TYPE_NORMAL
- en: Exploding gradients can be reduced by using the LSTM memory units and, perhaps,
    related gated-type neuron structures.
  prefs: []
  type: TYPE_NORMAL
- en: Adopting LSTM memory units is a new best practice for recurrent neural networks
    for sequence prediction.
  prefs: []
  type: TYPE_NORMAL
- en: Use Gradient Clipping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Exploding gradients can still occur in very deep multilayer perceptron networks
    with a large batch size and LSTMs with very long input sequence lengths.
  prefs: []
  type: TYPE_NORMAL
- en: If exploding gradients are still occurring, you can check for and limit the
    size of gradients during the training of your network.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is called gradient clipping. Dealing with the exploding gradients has
    a simple but very effective solution: clipping gradients if their norm exceeds
    a given threshold.'
  prefs: []
  type: TYPE_NORMAL
- en: Specifically, the values of the error gradient are checked against a threshold
    value and clipped or set to that threshold value if the error gradient exceeds
    the threshold.
  prefs: []
  type: TYPE_NORMAL
- en: To some extent, the exploding gradient problem can be mitigated by gradient
    clipping (thresholding the values of the gradients before performing a gradient
    descent step).
  prefs: []
  type: TYPE_NORMAL
- en: Use Weight Regularization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another approach, if exploding gradients are still occurring, is to check the
    size of network weights and apply a penalty to the network’s loss function for
    large weight values.
  prefs: []
  type: TYPE_NORMAL
- en: This is called weight regularization and often an L1 (absolute weights) or an
    L2 (squared weights) penalty can be used.
  prefs: []
  type: TYPE_NORMAL
- en: Using an L1 or L2 penalty on the recurrent weights can help with exploding gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Vanishing Gradients
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The vanishing gradients problem is one example of unstable behavior that you
    may encounter when training a deep neural network.
  prefs: []
  type: TYPE_NORMAL
- en: It describes the situation where a deep multilayer feedforward network or a
    recurrent neural network is unable to propagate useful gradient information from
    the output end of the model back to the layers near the input end of the model.
  prefs: []
  type: TYPE_NORMAL
- en: The result is the general inability of models with many layers to learn on a
    given dataset, or they might prematurely converge to a poor solution.
  prefs: []
  type: TYPE_NORMAL
- en: Many fixes and workarounds have been proposed and investigated, such as alternate
    weight initialization schemes, unsupervised pretraining, layer-wise training,
    and variations on gradient descent. Perhaps the most common change is the use
    of the rectified linear activation function that has become the new default, instead
    of the hyperbolic tangent activation function that was the default through the
    late 1990s and 2000s.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, you will discover how to diagnose a vanishing gradient problem
    when training a neural network model, and how to fix it using an alternate activation
    function and weight initialization scheme.
  prefs: []
  type: TYPE_NORMAL
- en: Vanishing Gradients Problem
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For instance, a neural network is trained using stochastic gradient descent.
    This involves first calculating the prediction error made by the model and using
    the error to estimate a gradient used to update each weight in the network so
    that less error is made next time. This error gradient is propagated backward
    through the network from the output layer to the input layer.
  prefs: []
  type: TYPE_NORMAL
- en: It is desirable to train neural networks with many layers, as the addition of
    more layers increases the capacity of the network, making it capable of learning
    a large training dataset and efficiently representing more complex mapping functions
    from inputs to outputs.
  prefs: []
  type: TYPE_NORMAL
- en: A problem with training networks with many layers (e.g., deep neural networks)
    is that the gradient diminishes dramatically as it is propagated backward through
    the network. The error may be so small by the time it reaches layers close to
    the input of the model, that it may have very little effect. As such, this problem
    is referred to as the “vanishing gradients” problem.
  prefs: []
  type: TYPE_NORMAL
- en: Vanishing gradients make it difficult to know in which direction the parameters
    should move to improve the cost function.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, the error gradient can be unstable in deep neural networks and not
    only vanish, but also explode, where the gradient exponentially increases as it
    is propagated backward through the network. This is referred to as the “exploding
    gradient” problem.
  prefs: []
  type: TYPE_NORMAL
- en: The term vanishing gradient refers to the fact that in a feedforward network
    (FFN) the backpropagated error signal typically decreases (or increases) exponentially
    as a function of the distance from the final layer.
  prefs: []
  type: TYPE_NORMAL
- en: Vanishing gradients is a particular problem with recurrent neural networks because
    the update of the network involves unrolling the network for each input time step,
    in effect creating a very deep network that requires weight updates. A modest
    recurrent neural network may have 200-to-400 input time steps, resulting conceptually
    in a very deep network.
  prefs: []
  type: TYPE_NORMAL
- en: The vanishing gradients problem may be manifest in a multilayer perceptron by
    a slow rate of improvement of a model during training and perhaps premature convergence
    (e.g., continued training does not result in any further improvement). Inspecting
    the changes to the weights during training, we would see more change (i.e., more
    learning) occurring in the layers closer to the output layer and less change occurring
    in the layers close to the input layer.
  prefs: []
  type: TYPE_NORMAL
- en: There are many techniques that can be used to reduce the impact of the vanishing
    gradients problem for feedforward neural networks, most notably alternate weight
    initialization schemes and use of alternate activation functions.
  prefs: []
  type: TYPE_NORMAL
- en: Different approaches to training deep networks (both feedforward and recurrent)
    have been studied and applied (in an effort to address vanishing gradients), such
    as pretraining, better random initial scaling, better optimization methods, specific
    architectures, orthogonal initialization, etc.
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we will take a closer look at the use of an alternate weight
    initialization scheme and activation function to permit the training of deeper
    neural network models.
  prefs: []
  type: TYPE_NORMAL
- en: 'Weight initialization: Update the deep MLP with tanh activation to use Xavier
    uniform weight initialization and report the results.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Learning algorithm: Update the deep MLP with tanh activation to use an adaptive
    learning algorithm such as Adam and report the results.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Weight changes: Update the tanh and ReLU examples to record and plot the L1
    vector norm of model weights each epoch as a proxy for how much each layer is
    changed during training and compare results.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Study model depth: Create an experiment using the MLP with tanh activation
    and report the performance of models as the number of hidden layers is increased
    from 1 to 10.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Increase breadth: Increase the number of nodes in the hidden layers of the
    MLP with tanh activation from 5 to 25, and report performance as the number of
    layers are increased from 1 to 10.'
  prefs: []
  type: TYPE_NORMAL
- en: TensorFlow Basics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Part I, we discussed TensorFlow from installation to its basics; we also
    showed how to build a fully functional model using a toy dataset. We did all this
    in the introduction part to make you feel that it’s easier than you think to learn
    deep learning and start using TensorFlow. But now we need to show you the needed
    fundamentals of TensorFlow, going through the same headers but with some depth;
    for instance, we will reillustrate the use of different types of tensor (i.e.,
    placeholder, variable, and constant, giving you the concrete tools that you will
    use to build any TensorFlow deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: So, in this section, we are going to discuss the difference between placeholder,
    variable, and constant tensor types, and also show you the properties of tensors.
    After that we are going to show you the optimization framework and approaches
    that TensorFlow uses in almost any deep learning models, going throw the learning
    rate and understanding the mini-batch approach. Last, we will show you the most
    important optimizers in TensorFlow.
  prefs: []
  type: TYPE_NORMAL
- en: Placeholder vs. Variable vs. Constant
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we described in Part I, placeholders, variables, and constants are key tools
    for using computational graphs in TensorFlow. So, we have to understand the differences
    and when to best use them to our advantage.
  prefs: []
  type: TYPE_NORMAL
- en: 'One of the most important distinctions to make with the data is whether it
    is a placeholder or a variable. Variables are the parameters of the algorithm
    and TensorFlow keeps track of how to change these to optimize the algorithm. Placeholders
    are objects that allow you to feed in data of a specific type and shape and depend
    on the results of the computational graph, such as the expected outcome of a computation.
    On the other hand, constants have a simple use: while you build a huge model,
    you are going to use some functions that do something for you: matrices multiplication
    or any computational operation. Here you can use the constant for these operations
    to help you do it inside the computational graph.'
  prefs: []
  type: TYPE_NORMAL
- en: Another important distinction is that in TensorFlow the differences between
    constants and variables are that when you declare some constant, its value can’t
    be changed in the future (also the initialization should be with a value, not
    with an operation). Nevertheless, when you declare a variable, you can change
    its value in the future with `tf.assign()` method (and the initialization can
    be achieved with a value or operation).
  prefs: []
  type: TYPE_NORMAL
- en: 'The main way to create a variable is by using the `Variable()` function , which
    takes a tensor as an input and outputs a variable. This is the declaration, and
    we still need to initialize the variable. Initializing is what puts the variable
    with the corresponding methods on the computational graph. Here is an example
    of creating and initializing a variable:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Placeholders are just holding the position for data to be fed into the graph.
    Placeholders get data from a `feed_dict` argument in the session. To put a placeholder
    in the graph, we must perform at least one operation on the placeholder. We initialize
    the graph, declare x to be a placeholder, and define y as the identity operation
    on x, which just returns x. We then create data to feed into the x placeholder
    and run the identity operation. It is worth noting that TensorFlow will not return
    a self-referenced placeholder in the feed dictionary. The code is shown here and
    the resulting graph is shown in the next section:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'We can see what the code looks like in detail with just one variable, initialized
    to all zeros. The gray shaded region is a very detailed view of the operations
    and constants involved. The main computational graph with less detail is the smaller
    graph outside of the gray region in the upper right corner. For more details on
    creating and visualizing graphs. Note that TensorFlow will not return a self-refernced
    placeholder in the feed dictionary. In technical speech, running `sess.run(x,
    feed_dict={x: x_vals})` in the following graph will return an error .'
  prefs: []
  type: TYPE_NORMAL
- en: Gradient-Descent Optimization Methods from a Deep-Learning Perspective
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We think that before diving into the TensorFlow optimizers, which is a very
    important topic, it’s also important to understand a few key points regarding
    full-batch gradient descent and stochastic gradient descent, including their drawbacks.
    That is so that one can know and understand the need to compare and choose from
    variants of these optimizers.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig27_HTML.jpg](Images/484548_1_En_9_Fig27_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-27
  prefs: []
  type: TYPE_NORMAL
- en: The difference between many cost functions
  prefs: []
  type: TYPE_NORMAL
- en: The cost function for a linear neuron with a least square error is quadratic
    (Figure [9-27](#Fig27)). When the cost function is quadratic, the direction of
    the gradient resulting from the full-batch gradient-descent method gives the best
    direction for cost reduction in a linear sense, but it doesn’t point to the minimum
    unless the different elliptical contours of the cost function are circles. In
    cases of long elliptical contours, the gradient components might be large in directions
    where less change is required and small in directions where more change is required
    to move to the minimum point.
  prefs: []
  type: TYPE_NORMAL
- en: The problem with this condition is that if we take small steps by making the
    learning rate small, the gradient descent would take a while to converge, whereas
    if we were to use a big learning rate, the gradients would change direction rapidly
    in directions where the cost function had curvature, leading to oscillations.
    The cost function for a multilayer neural network is not quadratic but rather
    is mostly a smooth function. Locally, such nonquadratic cost functions can be
    approximated by quadratic functions, and so the problems of gradient descent inherent
    to elliptical contours still prevail for nonquadratic cost functions.
  prefs: []
  type: TYPE_NORMAL
- en: The best way to get around this problem is to take larger steps in those directions
    in which the gradients are small but consistent, and take smaller steps in those
    directions that have big but inconsistent gradients. This can be achieved if,
    instead of having a fixed learning rate for all dimensions, we have a separate
    learning rate for each dimension.
  prefs: []
  type: TYPE_NORMAL
- en: Another big problem with neural networks is that the cost functions are mostly
    nonconvex, so the gradient-descent method might get stuck at local minimum points,
    leading to a suboptimal solution.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The nonconvex nature of the neural network is the result of the hidden layer
    units that have nonlinear activation functions, such as sigmoid.
  prefs: []
  type: TYPE_NORMAL
- en: Full-batch gradient descent uses the full dataset for the gradient computation.
    While this is good for convex cost surfaces, it has its own problems in cases
    of nonconvex cost functions. For nonconvex cost surfaces with full-batch gradients,
    the model is going to end up with the minima in its basin of attraction. If the
    initialized parameters are in the basin of attraction of a local minimum that
    doesn’t provide good generalization, a full-batch gradient would give a suboptimal
    solution.
  prefs: []
  type: TYPE_NORMAL
- en: With stochastic gradient descent, the noisy gradients computed may force the
    model out of the basin of attraction of the bad local minima—one that doesn’t
    provide good generalization—and place it in a more optimal region. Stochastic
    gradient descent with single data points produces very random and noisy gradients.
    Gradients with mini-batches tend to produce much more stable estimates of gradients
    when compared with gradients of single data points, but they are still noisier
    than those produced by the full batches.
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, the mini-batch size should be carefully chosen such that the gradients
    are noisy enough to avoid or escape bad local minima points but stable enough
    to converge at global minima or a local minimum that provides good generalization.
  prefs: []
  type: TYPE_NORMAL
- en: In Figure [9-28](#Fig28), the dotted arrows correspond to the path taken by
    stochastic gradient descent (SGD) , while the continuous arrows correspond to
    the path taken by full-batch gradient descent. Full-batch gradient descent computes
    the actual gradient at a point, and if it is in the basin of attraction of a poor
    local minimum, gradient descent almost certainly ensures that the local minima
    L is reached. However, in the case of stochastic gradient descent, because the
    gradient is based on only a portion of the data and not on the full batch, the
    gradient direction is only a rough estimate. Since the noisy rough estimate doesn’t
    always point to the actual gradient at point C, stochastic gradient descent may
    escape the basin of attraction of the local minima and fortunately land in the
    basin of a global minima. Stochastic gradient descent may escape the global minima
    basin of attraction too, but generally if the basin of attraction is large and
    the mini-batch size is carefully chosen so that the gradients it produces are
    moderately noisy, stochastic gradient descent is most likely to reach the global
    minima G (as in this case) or some other optimal minima that has a large basin
    of attraction. For nonconvex optimization, there are other heuristics as well,
    such as momentum, which when adopted along with stochastic gradient descent increases
    the chances of the SGD’s avoiding shallow local minima. Momentum generally keeps
    track of the previous gradients through the velocity component. So, if the gradients
    are steadily pointing toward a good local minimum that has a large basin of attraction,
    the velocity component would be high in the direction of the good local minimum.
    If the new gradient is noisy and points toward a bad local minimum, the velocity
    component would provide momentum to continue in the same direction and not get
    influenced by the new gradient too much.
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_9_Chapter/484548_1_En_9_Fig28_HTML.jpg](Images/484548_1_En_9_Fig28_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9-28
  prefs: []
  type: TYPE_NORMAL
- en: The steps of SGD algorithms
  prefs: []
  type: TYPE_NORMAL
- en: Another impediment to optimizing nonconvex cost functions is the presence of
    saddle points. The number of saddle points increases exponentially with the dimensionality
    increase of the parameter space of a cost function. Saddle points are stationary
    points (i.e., points where the gradient is zero) but are neither a local minimum
    nor a local maximum point. Since the saddle points are associated with a long
    plateau of points with the same cost as that of the saddle point, the gradient
    in the plateau region is either zero or very close to zero. Because of this near-zero
    gradient in all directions, gradient-based optimizers have a hard time coming
    out of these saddle points. Mathematically, to determine whether a point is a
    saddle point, the Eigenvalues of the Hessian matrix of the cost function must
    be computed at the given point. If there are both positive and negative Eigenvalues,
    then it is a saddle point.
  prefs: []
  type: TYPE_NORMAL
- en: Learning Rate in the Mini-batch Approach to Stochastic Gradient Descent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When there is high redundancy in the dataset, the gradient computed on a mini-batch
    of data points is almost the same as the gradient computed on the whole dataset,
    provided the mini-batch is a good representation of the entire dataset. In such
    cases, computing the gradient on the whole dataset can be avoided, and instead
    the gradient on the mini-batch of data points can be used as the approximate gradient
    for the whole dataset. This is the mini-batch approach to gradient descent, which
    is also called mini-batch stochastic gradient descent. When, instead of using
    a mini-batch, the gradients are approximated by one data point, it is called online
    learning or stochastic gradient descent. However, it is always better to use the
    mini-batch version of stochastic gradient descent over online learning, since
    the gradients for the mini-batch method are less noisy compared with the online
    mode of learning. Learning rate plays a vital role in the convergence of mini-batch
    stochastic gradient descent. The following approach tends to provide good convergence:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with an initial learning rate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Increase the learning rate if the error reduces.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decrease the learning rate if the error increases.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stop the learning process if the error ceases to reduce.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we will see in the next section, the different optimizers adopt an adaptive
    learning-rate approach in their implementations.
  prefs: []
  type: TYPE_NORMAL
- en: 10. Improving Deep Neural Networks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Optimizers in TensorFlow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’re still on the subject of gradient descent. But let’s now talk about gradient
    optimization, because of its importance to gradient descent. It is an optimization
    method for finding the minimum of a function, and it’s important in deep learning.
    It works to update the weights of the neural network through backpropagation.
  prefs: []
  type: TYPE_NORMAL
- en: 'So what are the optimizations of the types of gradient descent we talked about
    previously (batch, mini-batch, and stochastic)? Let’s start by talking about the
    benefits of these optimization methods:'
  prefs: []
  type: TYPE_NORMAL
- en: Modifying the learning rate component, α
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Modifying the gradient component, ∂L/∂w
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Modifying both (α, and ∂L/∂w)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We mention ∂L/∂w as a function of the gradient (wnew=w- α ∂L/∂w). This is the
    equation that optimizers try to optimize. To start, I think every optimizer is
    an optimizer of the optimizer. That’s a very weird phrase but it's true, for example,
    Adadelta and RMSprop are optimizers of Adagrad. Let’s see an image that may help
    show the connections between all optimizers (Figure [10-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/484548_1_En_10_Chapter/484548_1_En_10_Fig1_HTML.jpg](Images/484548_1_En_10_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: The optimizers tree
  prefs: []
  type: TYPE_NORMAL
- en: The most used type of optimizer in deep learning is mini-batch. We talked before
    about why it’s the most used, so let’s now get into the adaptive learning rate
    algorithms, Nesterov accelerated gradient (NAG) and momentum, and adaptive learning
    methods.
  prefs: []
  type: TYPE_NORMAL
- en: 'Usage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The Notation to Use
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*t -> is for time step*'
  prefs: []
  type: TYPE_NORMAL
- en: '*w -> weight/parameter which we want to update*'
  prefs: []
  type: TYPE_NORMAL
- en: '*α -> learning rate*'
  prefs: []
  type: TYPE_NORMAL
- en: ∂L/∂w -> gradient of L, the loss function to minimize
  prefs: []
  type: TYPE_NORMAL
- en: Momentum
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This gradient optimizer has a variable that makes the gradient converge very
    fast, as it does not depend only on the current gradient to update the weight.
    Gradient descent with momentum replaces the current gradient with *V* (which stands
    for velocity), the exponential moving average of current and past gradients. Momentum-based
    methods introduce a component called velocity *V* that dampens the parameter update
    when the gradient computed changes sign, whereas it accelerates the parameter
    update when the gradient is in the same direction of velocity. This introduces
    faster convergence as well as fewer oscillations around the global minima, or
    around a local minimum that provides good generalization. The update rule for
    momentum-based optimizers is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}{w}_{t+1}={w}_t-\alpha {V}_t\\ {}{V}_t=\beta
    {V}_{t-1}+\left(1-\beta \right)\frac{\partial L}{\partial {w}_t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq1.png)'
  prefs: []
  type: TYPE_IMG
- en: Default value β = 0.9, where α is the momentum parameter and η is the learning
    rate. The terms ![$$ {v}_i^t $$](Images/484548_1_En_10_Chapter_TeX_IEq2.png) and
    ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq3.png) represent the
    velocity at iterations *t* and (*t* + 1), respectively, for the *i*^(*th*) parameter.
    Similarly, ![$$ {v}_i^t $$](Images/484548_1_En_10_Chapter_TeX_IEq4.png) and ![$$
    {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq5.png) represent the weight
    of the ith parameter at iterations *t* and (*t* + 1), respectively, when the cost
    function reaches the local minimum. When we use gradient descent, the parameters
    are stopped updating and in this local minimum, but when we use the momentum we
    will see that the parameters don’t stop updating. For example, the velocity is
    still updating because it can’t be a zero value. The prior velocity would drive
    the algorithm out of the local minima, considering the local minima has a small
    basin of attraction. The velocity or the momentum of gradient descent would be
    in that direction, as ![$$ {v}_i^{t+1} $$](Images/484548_1_En_10_Chapter_TeX_IEq6.png)
    would be nonzero because of the nonzero velocity from prior gradients. Also, if
    the prior gradients consistently pointed toward a global minimum or a local minimum
    with good generalization and a reasonably large basin of attraction, the velocity
    or the momentum of gradient descent would be in that direction. So, even if there
    were a bad local minimum with a small basin of attraction, the momentum component
    would not only drive the algorithm out of the bad local minima but also would
    continue the gradient descent toward the global minima or the good local minima.
  prefs: []
  type: TYPE_NORMAL
- en: 'Usage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Nesterov Accelerated Gradient
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After momentum had gained in popularity, a similar update was implemented using
    Nesterov accelerated gradient (NAG; Sutskever et al., 2013). This update utilizes
    *V*, the exponential moving average of what I would call projected gradients.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}{w}_{t+1}={w}_t-\alpha {V}_t\\ {}{V}_t=\beta
    {V}_{t-1}+\left(1-\beta \right)\frac{\partial L}{\partial {w}^{\ast }}\end{array}}
    $$](Images/484548_1_En_10_Chapter_TeX_IEq7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The last term in the second equation is a projected gradient. This value can
    be obtained by going **one step ahead** using the previous velocity. This means
    that for this time step *t*, we have to carry out another forward propagation
    before we can finally execute the backpropagation. Here’s how it goes:'
  prefs: []
  type: TYPE_NORMAL
- en: Update the current weight w to a projected weight w^∗ using the previous velocity.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*w*^∗ = *w*[*t*] − *αV*[*t* − 1]'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Carry out forward propagation, but using this projected weight.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Obtain the projected gradient ∂L/∂w^∗.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compute V and w accordingly.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The original Nesterov accelerated gradient paper (Nesterov, 1983) was not about
    stochastic gradient descent and did not explicitly use the gradient descent equation.
    Hence, a more appropriate reference is the aforementioned publication by Sutskever
    et al. in 2013, which described NAG’s application in stochastic gradient descent.
  prefs: []
  type: TYPE_NORMAL
- en: Adagrad
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Adaptive gradient (Adagrad) is mostly like gradient descent but with some modifications.
    Instead of having a global learning rate, the learning rate is normalized for
    each dimension on which the cost function is dependent. The learning rate in each
    iteration is the global learning rate divided by the l2 norm of the prior gradients
    up to the current iteration for each dimension. It works on the learning rate
    component by dividing the learning rate by the square root of S, which is the
    cumulative sum of current and past squared gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes sparse features that don’t show up much in the data can be very useful
    to an optimization problem. However, with basic gradient descent or stochastic
    gradient descent, the learning rate gives equal importance to all the features
    in each iteration. Since the learning rate is the same, the overall contribution
    of nonsparse features would be much more than that of sparse features. Hence,
    we end up losing critical information from the sparse features. With Adagrad,
    each parameter is updated with a different learning rate.
  prefs: []
  type: TYPE_NORMAL
- en: 'The sparser the feature is, the higher its parameter update would be in an
    iteration . This is because for sparse features the quantity would be less and
    the overall learning rate would be high. It may be a very good use in NLP or image
    processing because of data sparsity. Let’s see the equation that makes what we’re
    saying sensible: S is initialized by 0.'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {S}_t={S}_{t-1}+{\left[\frac{\partial L}{\partial wt}\right]}^2 $$](Images/484548_1_En_10_Chapter_TeX_IEq8.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{S_t+\in }}\cdot \frac{\partial L}{\partial
    {w}_t} $$](Images/484548_1_En_10_Chapter_TeX_IEq9.png)'
  prefs: []
  type: TYPE_IMG
- en: So, we note in this section that we try to adapt the learning rate to get the
    minima of cost function, one of the main reasons for creating these optimizations.
    Instead of a common learning rate for all parameters, we want to have separate
    learning rate for each. So Adagrad keeps the sum of squares of parameter-wise
    gradients and modifies individual learning rates using this. As a result, parameters
    occurring more often have smaller gradients.
  prefs: []
  type: TYPE_NORMAL
- en: Adadelta
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Adadelta is an extension of Adagrad and it also tries to lessen Adagrad’s aggressive,
    monotonically reducing of the learning rate, it also focuses on the learning rate
    component. Adadelta is probably short for **“adaptive delta,”** where delta here
    refers to the difference between the current weight and the newly updated weight.
    In Adadelta we do not need to set the default learning rate, as we take the ratio
    of the running average of the previous time steps to the current gradient.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}{D}_t=\beta {D}_{t-1}+\left(1-\beta \right){\left[\varDelta
    {w}_t\right]}^2\\ {}{S}_t=\beta {S}_{t-1}+\left(1-\beta \right){\left[\frac{\partial
    L}{\partial wt}\right]}^2\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq10.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {w}_{t+1}={w}_t-\frac{\sqrt{D_{t-1}+\in }}{\sqrt{S_t+\in }}\cdot \frac{\partial
    L}{\partial {w}_t} $$](Images/484548_1_En_10_Chapter_TeX_IEq11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Usage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: where decay represents α, epsilon represents ε, and η represents the learning
    rate.
  prefs: []
  type: TYPE_NORMAL
- en: RMSprop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Root mean square prop or RMSprop (Hinton et al., 2012) is another adaptive learning
    rate that is an improvement of Adagrad. Instead of taking the cumulative sum of
    squared gradients like in Adagrad, we take the exponential moving average of these
    gradients.
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {S}_t=\beta {S}_{t-1}+\left(1-\beta \right){\left[\frac{\partial L}{\partial
    wt}\right]}^2 $$](Images/484548_1_En_10_Chapter_TeX_IEq12.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{S_t+\in }}\cdot \frac{\partial L}{\partial
    {w}_t} $$](Images/484548_1_En_10_Chapter_TeX_IEq13.png)'
  prefs: []
  type: TYPE_IMG
- en: Taking an overall view, we will see that RMSprop is mostly like Adadelta but
    it has one difference. The difference between Adadelta and RMSprop is that Adadelta
    removes the use of the learning rate parameter completely by replacing it with
    D, the exponential moving average of squared deltas.
  prefs: []
  type: TYPE_NORMAL
- en: 'Usage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Adam
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Adaptive moment estimation , or Adam (Kingma & Ba, 2014), is a combination of
    momentum and RMSprop. It acts upon the gradient component by using V, the exponential
    moving average of gradients (like in momentum) and the learning rate component
    by dividing the learning rate α by the square root of S, the exponential moving
    average of squared gradients (like in RMSprop).
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}{\hat{V}}_t=\frac{V_t}{1-{\beta}_1^t}\\
    {}{\hat{S}}_t=\frac{S_t}{1-{\beta}_2^t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq14.png)'
  prefs: []
  type: TYPE_IMG
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{{\hat{S}}_t+\in }}\cdot {\hat{V}}_t
    $$](Images/484548_1_En_10_Chapter_TeX_IEq15.png)'
  prefs: []
  type: TYPE_IMG
- en: Note
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The ^ terms are actually bias-corrected averages to ensure that the values are
    not biased toward 0.
  prefs: []
  type: TYPE_NORMAL
- en: 'Proposed default values by the authors :'
  prefs: []
  type: TYPE_NORMAL
- en: 𝛼 = 0.001
  prefs: []
  type: TYPE_NORMAL
- en: 𝛽[1] = 0.9
  prefs: []
  type: TYPE_NORMAL
- en: 𝛽[2] = 0.999
  prefs: []
  type: TYPE_NORMAL
- en: 𝜀 = 10^(-8)
  prefs: []
  type: TYPE_NORMAL
- en: Adam is computationally efficient and has very little memory requirements. The
    Adam optimizer is one of the most popular gradient descent optimization algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: 'Usage:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Nadam (Adam + NAG)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Nadam is employed for noisy gradients or gradients with high curvatures. The
    learning process is accelerated by summing up the exponential decay of the moving
    averages for the previous and current gradient, Nadam makes use of Nesterov to
    update the gradient one step ahead by replacing the previous ![$$ \hat{V} $$](Images/484548_1_En_10_Chapter_TeX_IEq16.png)
    in the earlier equation with the current ![$$ \hat{V} $$](Images/484548_1_En_10_Chapter_TeX_IEq17.png):'
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {w}_{t+1}={w}_t-\frac{\alpha }{\sqrt{{\hat{S}}_t+\in }}\left({\beta}_1{\hat{V}}_t+\frac{1-{\beta}_1}{1-{\beta}_1^t}\cdot
    \frac{\partial L}{\partial {w}_t}\right) $$](Images/484548_1_En_10_Chapter_TeX_IEq18.png)'
  prefs: []
  type: TYPE_IMG
- en: Where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}{\hat{V}}_t=\frac{V_t}{1-{\beta}_1^t}\\
    {}{\hat{S}}_t=\frac{S_t}{1-{\beta}_2^t}\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq19.png)'
  prefs: []
  type: TYPE_IMG
- en: Where
  prefs: []
  type: TYPE_NORMAL
- en: '![$$ {\displaystyle \begin{array}{l}{V}_t={\beta}_1{V}_{t-1}+\left(1-{\beta}_1\right)\frac{\partial
    L}{\partial {w}_t}\\ {}{S}_t={\beta}_2{V}_{t-1}+\left(1-{\beta}_2\right){\left[\frac{\partial
    L}{\partial {w}_t}\right]}^2\end{array}} $$](Images/484548_1_En_10_Chapter_TeX_IEq20.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Default values (taken from Keras):'
  prefs: []
  type: TYPE_NORMAL
- en: α = 0.002
  prefs: []
  type: TYPE_NORMAL
- en: β[1] = 0.9
  prefs: []
  type: TYPE_NORMAL
- en: β[2] = 0.999
  prefs: []
  type: TYPE_NORMAL
