- en: 11. Proximal Policy Optimization (PPO) and RLHF
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 近端策略优化（PPO）和RLHF
- en: This is an exciting chapter. It starts from the foundations and builds toward
    one of the most exciting uses of RL. Have you have used ChatGPT or another Large
    Language Model (LLM) and found it amazing how these models seem to follow your
    prompts and complete a task that you describe in English? Apart from the machinery
    of generative AI and transformers-driven architecture, RL also plays a very important
    role. Proximal Policy Optimization (PPO) using human annotated (or machine annotated)
    preferences over pairs of sentences is used as a reward model to fine-tune LLMs
    to follow the human preferences. This makes LLMs safer and better. This chapter
    starts with the basics, building toward a deeper understanding of PPO, which even
    after so many years is still the state-of-the-art policy-based optimization technique
    in RL. This is followed by a quick overview of LLMs—the architecture, the training
    process, and the overall LLM ecosystem. The chapter walks through a complete demo
    of RLHF tuning on a LLM using the state-of-the-art approaches.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个令人兴奋的章节。它从基础开始，逐步构建起强化学习（RL）中最激动人心的应用之一。你是否使用过ChatGPT或另一个大型语言模型（LLM），并发现这些模型似乎能跟随你的提示并完成你用英语描述的任务而感到惊奇？除了生成式AI和由变换器驱动的架构之外，RL也扮演着非常重要的角色。使用人类标注（或机器标注）的偏好对句子对进行近端策略优化（PPO）被用作奖励模型，以微调LLM以遵循人类偏好。这使得LLM更安全、更好。本章从基础知识开始，逐步深入理解PPO，即使经过这么多年，它仍然是RL中基于策略优化的最先进技术。接下来是对LLM的快速概述——其架构、训练过程以及整体LLM生态系统。本章通过一个使用最先进方法的LLM上RLHF调优的完整演示。
- en: Along the way, the chapter also touches upon concepts like prompt engineering,
    fine-tuning, parameter efficient fine-tuning, and various approaches of using
    LLMs for increasing complex and human-like tasks. These tasks have resulted in
    the Large Language Models being called foundational models or even new-age CPUs.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在此过程中，本章还涉及了诸如提示工程、微调、参数高效微调以及使用LLM进行更复杂和类似人类任务的多种方法等概念。这些任务使得大型语言模型被称为基础模型，甚至被称为新时代的CPU。
- en: Chapter [8](502835_2_En_8_Chapter.xhtml) briefly touched upon the issue of policy,
    deviating a lot during the gradient update thereby showing instability. It briefly
    talked about the intuition that controlling the size of update in the policy space
    gives you better control versus controlling the update in network parameter space.
    Chapter [8](502835_2_En_8_Chapter.xhtml) introduced two approaches following this
    concept of control in policy/probability space. First, it talked about Trust Region
    Policy Optimization (TRPO) and then there was a brief discussion of Proximal Policy
    Optimization (PPO). These both control the update size by making sure that each
    update does not lead to a revised policy that is significantly different from
    the current policy.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 第[8](502835_2_En_8_Chapter.xhtml)章简要提到了策略问题，在梯度更新过程中出现大量偏差，从而显示出不稳定性。它简要讨论了控制策略空间中更新大小的直觉，这比控制网络参数空间中的更新要好。第[8](502835_2_En_8_Chapter.xhtml)章介绍了两种遵循策略/概率空间控制概念的方法。首先，它讨论了信任区域策略优化（TRPO），然后简要讨论了近端策略优化（PPO）。这两种方法都通过确保每次更新都不会导致与当前策略显著不同的新策略来控制更新大小。
- en: I first discuss why this is important. Refer to Figure [11-1](#Fig1) and imagine
    that the agent is trying to learn a policy to climb the hill with a very uneven
    surface. There are steep valleys on the right side of the path to the top. The
    agent needs to be cautious and take careful steps while exploring the neighborhood.
    A step in the wrong direction could cause the agent to fall off the cliff and
    it would be hard to recover and climb back to the top or to the previous point
    in the path. The red circle in Figure [11-1](#Fig1) shows the *trust region* around
    the current policy, point which is safe and does not lead to any disastrous consequences.
    If the change in policy is within this circle, the agent will continue to see
    improvement in the policy while being safe from the cliff.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先讨论为什么这很重要。参考图[11-1](#Fig1)并想象代理正在尝试学习一个策略，以爬上表面非常不平的山。通往山顶的路上有陡峭的山谷。代理在探索邻域时需要谨慎并采取小心的步骤。错误方向的一步可能导致代理从悬崖上掉下来，这将很难恢复并爬回山顶或路径上的前一点。图[11-1](#Fig1)中的红色圆圈显示了当前策略周围的*信任区域*，这是一个安全的地方，不会导致任何灾难性的后果。如果策略的变化在这个圆圈之内，代理将继续在策略上看到改进，同时安全地避免掉入悬崖。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig1_HTML.jpg)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig1_HTML.jpg)'
- en: A three-dimensional illustration of the side view of a mountain peak with a
    wavy pathway that has several U-pin bends. A shaded point within a circle is labeled
    as the current point and the U-pin bend is labeled as the trust region.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 一座山峰侧视图的三维示意图，其上有波浪形的路径，有几个 U 形弯道。圆圈内的阴影点标记为当前点，U 形弯道标记为信任区域。
- en: Figure 11-1
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-1
- en: Trust region around a point in policy space
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 策略空间中某点的信任区域
- en: This is the concept on which TRPO and PPO are based. In TRPO, you put this as
    a hard constraint as expressed in Equation [11-1](#Equ1). You first form a policy
    objective that has dependence on the current and the new policy parameters, θ[*k*]
    and θ, respectively. To do this, you must resort to using importance sampling,
    which was covered in a previous chapter.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 TRPO 和 PPO 所基于的概念。在 TRPO 中，你将其作为一个硬约束，如方程 [11-1](#Equ1) 所表达。首先，你形成一个依赖于当前策略和新策略参数
    θ[*k*] 和 θ 的策略目标。为此，你必须求助于使用重要性抽样，这在前面章节中已有介绍。
- en: '![$$ J\left(\uptheta, {\uptheta}_k\right)={E}_{a\sim {\uppi}_{\uptheta_k}\left(a|s\right)}\left[\frac{\uppi_{\uptheta}\left(a|s\right)}{\uppi_{\uptheta_k}\left(a|s\right)}{A}^{\uppi_{\uptheta_k}}\left(s,a\right)\right]
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ1.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![J(θ, θ_{k})={E}_{a\sim {\uppi}_{\uptheta_k}\left(a|s\right)}\left[\frac{\uppi_{\uptheta}\left(a|s\right)}{\uppi_{\uptheta_k}\left(a|s\right)}{A}^{\uppi_{\uptheta_k}}\left(s,a\right)\right]}(../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ1.png)'
- en: (11-1)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: (11-1)
- en: In order to make sure that new policy π[θ] stays with the trust region centered
    on the current policy ![$$ {\uppi}_{\uptheta_k} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq1.png)shown
    in Figure [11-1](#Fig1), you use a hard constraint of Kullback-Liebler distance
    between two policies being within some small value δ.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保新的策略 π[θ] 与当前策略 ![$$ {\uppi}_{\uptheta_k} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq1.png)（如图
    [11-1](#Fig1) 所示）的中心信任区域保持一致，你使用了一个硬约束，即两个策略之间的 Kullback-Liebler 距离在某个小的值 δ 内。
- en: '![$$ {\uptheta}_{k+1}=\underset{\uptheta}{\arg\ \max }\ J\left(\uptheta, {\uptheta}_k\right)\kern0.5em
    s.t.{D}_{KL}\left(\uptheta \Big\Vert {\theta}_k\right)\le \updelta $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equa.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![θ_{k+1}=\underset{θ}{\arg\ \max }\ J(θ, θ_{k})\kern0.5em s.t.{D}_{KL}(θ \Big\Vert
    θ_{k})\le \updelta ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equa.png)'
- en: and *J*(θ, θ[*k*]) is defined in 11-1(11-2)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 并且 *J*(θ, θ[*k*]) 在 11-1(11-2) 中定义
- en: 'The theoretical update in TRPO as per Equations [11-1](#Equ1) and [11-2](#Equ2)
    is not easy to carry out. Calculating KL involves expectations set across all
    possible states and actions. With the help of the second order Taylor approximation
    and by replacing the KL divergence with a sample-based estimation, the final TRPO
    updates require estimating the policy gradient as shown in Equation [11-3](#Equ2):'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 根据方程 [11-1](#Equ1) 和 [11-2](#Equ2)，TRPO 的理论更新并不容易实现。计算 KL 涉及到所有可能状态和动作的期望。通过使用二阶泰勒近似，并用基于样本的估计替换
    KL 散度，最终的 TRPO 更新需要估计策略梯度，如方程 [11-3](#Equ2) 所示：
- en: '![$$ {\hat{g}}_k=\frac{1}{D_k}{\sum}_{r\in {D}_k}{\sum}_{t=0}^T{\nabla}_{\uptheta}\log
    {\uppi}_{\uptheta}\left({a}_t|{s}_t\right){\left.\kern0em \right|}_{\uptheta_k}\cdotp
    {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ2.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![g_{k}=\frac{1}{D_k}{\sum}_{r\in {D}_k}{\sum}_{t=0}^T{\nabla}_{\uptheta}\log
    {\uppi}_{\uptheta}\left({a}_t|{s}_t\right){\left.\kern0em \right|}_{\uptheta_k}\cdotp
    {\hat{A}}_t ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ2.png)'
- en: (11-3)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: (11-3)
- en: Next, you calculate ![$$ {\hat{x}}_k={\hat{H}}_k^{-1}{\hat{g}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq2.png)
    where ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq3.png)
    is the Hessian of the sample average KL divergence. The key point to note is that
    Hessian is the second-order derivative of the policy maximization objective. If
    the policy network has *n* parameters, ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq4.png)
    will be a *n* × *n* matrix. You need to calculate the inverse of ![$$ {\hat{H}}_k
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq5.png) to get
    ![$$ {\hat{x}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq6.png)
    and this inverse is a very slow process, of the order of *n*³ computations. The
    last part of TRPO is the update of parameter, as per Equation [11-4](#Equ4).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你计算 ![$$ {\hat{x}}_k={\hat{H}}_k^{-1}{\hat{g}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq2.png)，其中
    ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq3.png)
    是样本平均 KL 散度的 Hessian。需要注意的是，Hessian 是策略最大化目标函数的二阶导数。如果策略网络有 *n* 个参数，![$$ {\hat{H}}_k
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq4.png) 将是一个
    *n* × *n* 矩阵。你需要计算 ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq5.png)
    的逆来得到 ![$$ {\hat{x}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq6.png)，而这个逆是一个非常慢的过程，其计算量约为
    *n*³。TRPO 的最后一部分是参数的更新，如方程 [11-4](#Equ4) 所示。
- en: '![$$ {\uptheta}_{k+1}={\uptheta}_k+{\upalpha}^j\sqrt{\frac{2\updelta}{{\hat{x}}_k^T{\hat{H}}_k{\hat{x}}_k}}\cdotp
    {\hat{x}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ3.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\uptheta}_{k+1}={\uptheta}_k+{\upalpha}^j\sqrt{\frac{2\updelta}{{\hat{x}}_k^T{\hat{H}}_k{\hat{x}}_k}}\cdotp
    {\hat{x}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ3.png)'
- en: (11-4)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: (11-4)
- en: Where *j* ∈ {0, 1, 2, …*K*} is the smallest value that improves the sample loss
    and satisfies the KL divergence constraint.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *j* ∈ {0, 1, 2, …*K*} 是改善样本损失的最小值，并且满足 KL 散度约束。
- en: The derivation of the TRPO equation is fairly involved. If you are interested,
    you can refer to the TRPO paper^([1](#Fn1)) for more details. However, there are
    two key take aways. First, constraining a policy update within a trust region
    using KL divergence ensures that each update to the policy avoids a disastrous
    drop into bad regions and using KL divergence as a hard constraint like TRPO requires
    calculating and inverting a very large *n* × *n* matrix ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq7.png).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: TRPO 方程的推导相当复杂。如果您感兴趣，可以参考 TRPO 论文^([1](#Fn1)) 获取更多细节。然而，有两个关键要点。首先，使用 KL 散度在信任区域内约束策略更新，确保每次策略更新都不会导致灾难性的跌入不良区域；而像
    TRPO 那样将 KL 散度作为硬约束，则需要计算和求逆一个非常大的 *n* × *n* 矩阵 ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq7.png)。
- en: 'Soon after the TRPO paper, the lead author of that paper came up with PPO approach.
    The paper’s introduction reads:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在 TRPO 论文之后不久，该论文的首席作者提出了 PPO 方法。论文的引言部分如下：
- en: '*“We propose a new family of policy gradient methods for reinforcement learning,
    which alternate between sampling data through interaction with the environment
    and optimizing a “surrogate” objective function using stochastic gradient ascent.
    Whereas standard policy gradient methods perform one gradient update per data
    sample, we propose a novel objective function that enables multiple epochs of
    minibatch updates. The new methods, which we call proximal policy optimization
    (PPO), have some of the benefits of trust region policy optimization (TRPO), but
    they are much simpler to implement, more general, and have better sample complexity
    (empirically). Our experiments test PPO on a collection of benchmark tasks, including
    simulated robotic locomotion and Atari game playing, and we show that PPO outperforms
    other online policy gradient methods, and overall strikes a favorable balance
    between sample complexity, simplicity, and wall-time.”*'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“我们提出了一组新的强化学习策略梯度方法，这些方法在通过与环境交互采样数据和通过随机梯度上升优化“代理”目标函数之间交替。与标准策略梯度方法每对数据样本执行一次梯度更新不同，我们提出了一种新的目标函数，它能够实现多个批次的更新。我们称之为近端策略优化（PPO），它具有信任区域策略优化（TRPO）的一些优点，但实现起来更简单，更通用，并且具有更好的样本复杂度（经验上）。我们的实验在一系列基准任务上测试了
    PPO，包括模拟机器人运动和 Atari 游戏玩法，我们表明 PPO 比其他在线策略梯度方法表现更好，并且在样本复杂度、简单性和运行时间之间取得了良好的平衡。”*'
- en: As you can see, PPO follows policy updates in kind of a trust region on the
    policy space, just like TRPO. Yet PPO is much simpler and has better sample efficiency.
    Therefore, it seems to have the best of both the worlds, making it the state-of-the-art
    direct policy optimization approach since its introduction in 2017.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，PPO在策略空间上遵循一种类似于TRPO的信任区域策略更新。然而，PPO更加简单，并且具有更好的样本效率。因此，它似乎结合了两者之长，自2017年引入以来，成为最先进的直接策略优化方法。
- en: Having introduced PPO, the next section gets into a step-by-step derivation
    of PPO and its theoretical basis. If you want to skip ahead, you can skip the
    sections on PPO and move to the topic of RLHF and fine-tuning LLMs.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在介绍了PPO之后，下一节将逐步推导PPO及其理论基础。如果您想跳过这部分内容，可以跳过PPO部分，直接进入RLHF和LLMs微调的主题。
- en: Theoretical Foundations of PPO**
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: PPO的理论基础**
- en: The next set of action sections will walk the you through the core foundations
    of Score function, Hessian Matrix, Fisher Information Matrix, and natural gradients,
    leading to the PPO in its current form. A section is devoted to discussing the
    practical implementation details of PPO. This deep dive is optional. You can skip
    ahead to the sections on LLM- and RLHF-based instruction fine-tuning without any
    loss of continuity. However, if you go through the PPO deep dive, it is time well
    spent, as PPO is a popular and very efficient algorithm in the domain of direct
    policy optimization.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来的动作部分将向您介绍分数函数、Hessian矩阵、Fisher信息矩阵和自然梯度的核心基础，最终导致当前形式的PPO。有一节专门讨论PPO的实际实现细节。这个深入探讨是可选的。您可以跳过这部分内容，直接进入基于LLM和RLHF的指令微调和LLMs的微调部分，而不会失去连贯性。然而，如果您进行PPO的深入探讨，这将是一段值得的时间，因为PPO是直接策略优化领域中的一个流行且非常高效的算法。
- en: I have to introduce a few key concepts from statistics and optimization theory
    to set the foundations for natural policy optimization family of algorithms (to
    which TRPO and PPO belong).
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我必须介绍一些来自统计学和优化理论的关键概念，为自然策略优化算法家族（TRPO和PPO属于此类）奠定基础。
- en: Score Function and MLE Estimator
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分数函数和MLE估计器
- en: Most of the machine learning models revolve around finding the parameters of
    a probability distribution that maximize the joint probability of all the data
    seen—the training data. This section derives how this comes about and, in the
    process, introduces the Score function.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数机器学习模型都围绕着寻找概率分布的参数，这些参数最大化了所有已见数据的联合概率——训练数据。本节推导了这一过程，并在此过程中介绍了分数函数。
- en: Assume that you have a probability model of the unknown parameter θ signified
    as *x* ∼ *p*[*X*](*x*; θ) where x, a random variable, follows this distribution.
    Now say you know the type of distribution and the only thing unknown is θ, which
    is the parameter of the probability distribution. You also have some samples drawn
    using this distribution as *x*[1], *x*[2], *x*[3], …*x*[*n*]. Calculate the joint
    probability of this data conditioned on the unknown parameter θ, as shown in Equation
    [11-5](#Equ4).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您有一个表示未知参数θ的概率模型，用 *x* ∼ *p*[*X*](*x*; θ) 表示，其中x是一个随机变量，遵循这个分布。现在假设您知道分布的类型，唯一未知的是θ，它是概率分布的参数。您还有使用此分布抽取的一些样本，如
    *x*[1]，*x*[2]，*x*[3]，…*x*[*n*]。计算在未知参数θ条件下此数据的联合概率，如方程[11-5](#Equ4)所示。
- en: '![$$ P\left({x}_1,{x}_2,\dots, {x}_n|\uptheta \right)={\prod}_{i=1}^n{p}_X\left({x}_i|\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ4.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![$$ P\left({x}_1,{x}_2,\dots, {x}_n|\uptheta \right)={\prod}_{i=1}^n{p}_X\left({x}_i|\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ4.png)'
- en: (11-5)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: (11-5)
- en: 'Take the log on both sides of the Equation [11-5](#Equ4) to get:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对方程[11-5](#Equ4)的两边取对数，得到：
- en: '![$$ \log P\left({x}_1,{x}_2|\dots |{x}_n|\uptheta \right)={\sum}_{i=1}^n\log
    {p}_X\left({x}_i|\uptheta \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ5.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \log P\left({x}_1,{x}_2|\dots |{x}_n|\uptheta \right)={\sum}_{i=1}^n\log
    {p}_X\left({x}_i|\uptheta \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ5.png)'
- en: (11-6)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: (11-6)
- en: The log is the probability of observing a specific value of *x* = *x*[*i*].
    In machine learning, you usually form something called Negative Log Loss (NLL),
    which is nothing but -ve of the expression in Equation [11-6](#Equ5) with an average
    taken over a number of samples. This is shown in Equation [11-7](#Equ6).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对数是观察到特定值 *x* = *x*[*i*]的概率。在机器学习中，你通常会形成一种称为负对数损失（NLL）的东西，这不过是方程[11-6](#Equ5)中表达式的负值，并且是在多个样本上取平均值。这显示在方程[11-7](#Equ6)中。
- en: '![$$ NLL=-\frac{1}{\mathrm{n}}\cdotp \log P\left({x}_1,{x}_2|\dots |{x}_n|\uptheta
    \right)=-\frac{1}{n}\cdotp {\sum}_{i=1}^n\log {p}_X\left({x}_i|\uptheta \right)
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ6.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![NLL = -1/n ⋅ log P(x1, x2|... |xn|θ) = -1/n ⋅ ∑(i=1 to n) log p_X(x_i|θ)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ6.png)'
- en: (11-7)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: (11-7)
- en: In most of the machine learning models, including even Large Language Models
    and other generative AI models, you should try to maximize the evidence, that
    is, the θ that will maximize the probability of observing the data seen so far,
    the training data. You convert the maximization to minimization using NLL. In
    other words, you minimize NLL with respect to θ using stochastic gradient descent.
    This requires you to take the gradient of NLL with respect to θ, as shown in Equation
    [11-8](#Equ7).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数机器学习模型中，包括甚至大型语言模型和其他生成式AI模型，你应该尝试最大化证据，即最大化观察到的数据的概率，即训练数据中的θ。你使用NLL将最大化转换为最小化。换句话说，你使用随机梯度下降法最小化相对于θ的NLL。这要求你取NLL相对于θ的梯度，如方程[11-8](#Equ7)所示。
- en: '![$$ {\nabla}_{\uptheta} NLL=-\frac{1}{\mathrm{n}}\cdotp {\sum}_{\mathrm{i}=1}^{\mathrm{n}}{\nabla}_{\uptheta}\log
    {\mathrm{p}}_{\mathrm{X}}\left({\mathrm{x}}_{\mathrm{i}}|\uptheta \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ7.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![∇[θ] NLL = -1/n ⋅ ∑(i=1 to n) ∇[θ] log p_X(x_i|θ)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ7.png)'
- en: (11-8)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: (11-8)
- en: In Stochastic gradient, you adjust θ with α · ∇[θ]NLL, where α is known as the
    learning rate. The update expression is shown in Equation [11-9](#Equ8).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在随机梯度下降中，你用α ⋅ ∇[θ]NLL调整θ，其中α被称为学习率。更新表达式如方程[11-9](#Equ8)所示。
- en: '![$$ \uptheta =\uptheta +\upalpha \cdotp {\nabla}_{\uptheta} NLL $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ8.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![θ = θ + α ⋅ ∇[θ] NLL](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ8.png)'
- en: (11-9)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: (11-9)
- en: This is how most machine learning models are trained. Now turn your attention
    to something called the score function. Look again at the expression in Equation
    [11-8](#Equ7)—the term inside the summation, ∇[θ] log p[X](x[i]| θ), is known
    as the *score function*. The score function is the derivative of the log likelihood
    function. In Equation [11-8](#Equ7) you have a specific sample in the form of
    *x*[*i*]. However, while defining the score function, you use the unsampled random
    variable x. The definition of the score function is shown in Equation [11-10](#Equ9).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数机器学习模型是如何训练的。现在将你的注意力转向一个叫做得分函数的东西。再次看看方程[11-8](#Equ7)中的表达式——求和符号内的项，∇[θ]
    log p[X](x[i]| θ)，被称为*得分函数*。得分函数是对数似然函数的导数。在方程[11-8](#Equ7)中，你有一个特定样本的形式为*x[i]*。然而，在定义得分函数时，你使用未采样的随机变量x。得分函数的定义如方程[11-10](#Equ9)所示。
- en: '![$$ \mathrm{score}\left(\uptheta \right)={\nabla}_{\uptheta}\log \mathrm{p}\left(\mathrm{x}|\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ9.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![score(θ) = ∇[θ] log p(x|θ)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ9.png)'
- en: (11-10)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: (11-10)
- en: In traditional statistics, you also use the score function to form the Most
    Likelihood Estimator (MLE). Under MLE, you take the form in Equation [11-8](#Equ7)
    and find the θ (analytically), which will make derivative ∇[θ]NLL = 0\. The θ,
    so found, will minimize the NLL and therefore maximize the probability of the
    training data.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统统计学中，你也使用得分函数来形成最大似然估计（MLE）。在MLE下，你取方程[11-8](#Equ7)的形式，并找到θ（解析地），这将使导数∇[θ]NLL
    = 0。这样找到的θ将最小化NLL，从而最大化训练数据的概率。
- en: The score function holds significant importance across various domains, including
    statistics, probability, and machine learning, primarily due to its fundamental
    role in estimating and optimizing parameters. In statistics, the score function—often
    represented as the derivative of the log-likelihood function with respect to a
    parameter—is crucial for assessing the sensitivity of the likelihood function
    to the parameter. This sensitivity analysis is vital in maximum likelihood estimation,
    where the goal is to find parameter values that maximize the likelihood function,
    thereby providing the best fit for the data. In probability theory, the score
    function aids in understanding the behavior of probability distributions, especially
    in the context of small changes in parameters, thus enhancing the understanding
    of stochastic models.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 得分函数在各个领域都具有重要意义，包括统计学、概率论和机器学习，这主要归因于它在估计和优化参数中的基本作用。在统计学中，得分函数——通常表示为对数似然函数关于参数的导数——对于评估似然函数对参数的敏感性至关重要。这种敏感性分析在最大似然估计中至关重要，其目标是找到最大化似然函数的参数值，从而为数据提供最佳拟合。在概率论中，得分函数有助于理解概率分布的行为，特别是在参数发生微小变化的情况下，从而增强对随机模型的理解。
- en: In the realm of machine learning, the score function is particularly useful
    in gradient-based optimization algorithms, as shown in Equations [11-6](#Equ5)
    to [11-10](#Equ9). It serves as a guide to navigate the parameter space in order
    to find optimal parameters that minimize or maximize a chosen objective function,
    such as a loss function in supervised learning. This is crucial for training models
    where the objective is to learn from data by adjusting parameters and improve
    predictive accuracy. Furthermore, in reinforcement learning, the score function
    plays a key role in policy gradient methods, where it helps estimate the gradient
    of expected rewards with respect to policy parameters, enabling the development
    of strategies that maximize cumulative rewards. Overall, the score function is
    a versatile tool that enhances your ability to make statistical inferences, understand
    probabilistic models, and develop efficient machine learning algorithms.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习的领域，得分函数在基于梯度的优化算法中特别有用，如方程 [11-6](#Equ5) 到 [11-10](#Equ9) 所示。它作为导航参数空间以找到最小化或最大化所选目标函数（如监督学习中的损失函数）的优化参数的指南。这对于训练目标是通过调整参数从数据中学习的模型至关重要，以提高预测准确性。此外，在强化学习中，得分函数在策略梯度方法中起着关键作用，它有助于估计与策略参数相关的预期奖励的梯度，从而开发出最大化累积奖励的策略。总的来说，得分函数是一个多功能的工具，它增强了你进行统计推断、理解概率模型和开发高效机器学习算法的能力。
- en: 'Look at one of the important properties of the score function. What is its
    expected value *E*[*score*(θ)]? Go through the derivation:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 看一下得分函数的一个重要性质。它的期望值 *E*[*score*(θ)] 是什么？通过以下推导过程来了解：
- en: '![$$ E\left[ score\left(\uptheta \right)\right]=E\left[{\nabla}_{\uptheta}\log
    p\left(x|\uptheta \right)\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equb.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![ E[score(θ)]=E[∇θlogp(x|θ)] ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equb.png)'
- en: '![$$ =\int {\nabla}_{\uptheta}\log p\left(x|\uptheta \right)p\left(x|\uptheta
    \right) dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equc.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![ =∫(∇θlogp(x|θ))p(x|θ) dx ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equc.png)'
- en: '![$$ =\int \frac{\nabla_{\uptheta}p\left(x|\uptheta \right)}{p\left(x|\uptheta
    \right)}p\left(x|\uptheta \right) dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equd.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![ =∫(∇θp(x|θ)/p(x|θ))p(x|θ) dx ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equd.png)'
- en: '![$$ =\int {\nabla}_{\uptheta}p\left(x|\uptheta \right) dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Eque.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![ =∫(∇θp(x|θ)) dx ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Eque.png)'
- en: 'Using the linearity property, you get:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用线性性质，你得到：
- en: '![$$ ={\nabla}_{\uptheta}\int p\left(x|\uptheta \right) dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equf.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![ =∇θ∫p(x|θ) dx ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equf.png)'
- en: '![$$ ={\nabla}_{\uptheta}(1)=0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equg.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![ =∇θ(1)=0 ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equg.png)'
- en: '![$$ \mathrm{i}.\mathrm{e}.,E\left[{\nabla}_{\uptheta}\log p\left(x|\uptheta
    \right)\right]=0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ10.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![即，E[∇θlogp(x|θ)]=0 ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ10.png)'
- en: (11-11)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: (11-11)
- en: The expected value of the score function is zero. From MLE point of view, you
    can view this result as saying that MLE estimator in limit will give you an unbiased
    estimate of the unknown parameter θ of the underlying distribution that’s generating
    the data.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 分数函数的期望值为零。从最大似然估计（MLE）的角度来看，你可以将这个结果理解为，在极限情况下，MLE估计量将给出对生成数据的底层分布中未知参数θ的无偏估计。
- en: The actual estimate of θ will depend on the evidence, that is, the data you
    see, and you use MLE estimator to get an estimate. In statistics, whenever you
    use data to form some estimate, you are always interested in understanding the
    variance of this estimate. How much will it change as you see new data or repeat
    the estimation exercise with another batch of data? Therefore, the next section
    looks at the covariance of the score function ∇[θ] log *p*(*x*| θ).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: θ的实际估计将取决于证据，即你看到的数据，而你使用MLE估计量来获取估计。在统计学中，无论何时你使用数据来形成某种估计，你总是对理解这个估计的方差感兴趣。当你看到新的数据或用另一批数据重复估计练习时，它会改变多少？因此，下一节将探讨分数函数∇[θ]
    log *p*(*x*| θ)的协方差。
- en: Fisher Information Matrix (FIM) and Hessian
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 费舍尔信息矩阵（FIM）和海森矩阵
- en: 'This section is interested in the covariance of the score function. Whenever
    you use the MLE estimator, you are also interested in the sensitivity of this
    estimate based on the data samples used. This can be inferred from the covariance
    of the score function. Remember that score function is a vector—it is a derivate
    of log likelihood which is scalar with respect to the unknown parameters of the
    distribution, a vector *θ*. The dimensions of the score function and *θ* will
    match. The covariance, accordingly, will be a matrix. Derive the expression for
    this covariance, that is, the Fisher Information Matrix, F:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 本节关注分数函数的协方差。无论何时你使用MLE估计量，你也会对基于所使用的数据样本的估计敏感性感兴趣。这可以从分数函数的协方差中推断出来。记住，分数函数是一个向量——它是相对于分布的未知参数θ的对数似然函数的导数，一个向量
    *θ*。分数函数和 *θ* 的维度将匹配。因此，协方差将是一个矩阵。推导出这个协方差的表达式，即费舍尔信息矩阵，F：
- en: '![$$ covariance=F={E}_{p\left(x|\uptheta \right)}\left[\left(s\left(\uptheta
    \right)-0\right){\left(s\left(\uptheta \right)-0\right)}^T\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equh.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![协方差=F={E}_{p\left(x|\uptheta \right)}\left[\left(s\left(\uptheta \right)-0\right){\left(s\left(\uptheta
    \right)-0\right)}^T\right] ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equh.png)'
- en: '![$$ F={E}_{p\left(x|\uptheta \right)}\left[{\nabla}_{\uptheta}\log p\left(x|\uptheta
    \right){\nabla}_{\uptheta}\log p{\left(x|\uptheta \right)}^T\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ11.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![ F=E[p(x|θ)][∇θlogp(x|θ){∇θlogp(x|θ)}^T] ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ11.png)'
- en: (11-12)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: (11-12)
- en: 'In machine learning where you replace expectations with sample estimates, you
    can get the estimate ![$$ \hat{F} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq8.png)
    as shown:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，当你用样本估计代替期望时，你可以得到如下的估计![ F^{\hat{}} ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq8.png)：
- en: '![$$ \hat{F}=\frac{1}{N}{\sum}_{i=1}^N{\nabla}_{\uptheta}\log p\left({x}_i|\uptheta
    \right){\nabla}_{\uptheta}\log p{\left({x}_i|\uptheta \right)}^T $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ12.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![ F^{\hat{}}=\frac{1}{N}\sum_{i=1}^N{\nabla}_{\uptheta}\log p\left({x}_i|\uptheta
    \right){\nabla}_{\uptheta}\log p{\left({x}_i|\uptheta \right)}^T ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ12.png)'
- en: (11-13)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: (11-13)
- en: 'The Fisher Matrix has an interesting property. The negative expected Hessian
    of log likelihood is equal to the Fisher Information Matrix, *F*. If you have
    not heard of Hessian *H*, it is a square matrix and is the second-order partial
    derivative of a scalar function—in this case, the likelihood function. The relationship
    between F and H is as shown here:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 费舍尔矩阵有一个有趣的性质。对数似然函数的负期望海森矩阵等于费舍尔信息矩阵，*F*。如果你没有听说过海森矩阵 *H*，它是一个方阵，并且是标量函数的二阶偏导数——在这种情况下，似然函数。F和H之间的关系如下所示：
- en: '![$$ {E}_{p\left(x|\uptheta \right)}\left[{H}_{\log p\left(x|\uptheta \right)}\right]=-F
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equi.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![ E[p(x|θ)][H_{logp(x|θ)}]=-F ](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equi.png)'
- en: 'Or written the other way:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 或者用另一种方式写：
- en: '![$$ F=-{E}_{p\left(x|\uptheta \right)}\left[{H}_{\log p\left(x|\uptheta \right)}\right]
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ13.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![$$ F=-{E}_{p\left(x|\uptheta \right)}\left[{H}_{\log p\left(x|\uptheta \right)}\right]
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ13.png)'
- en: (11-14)
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: (11-14)
- en: The derivation of this property involves a bit of math and interested readers
    can refer to any standard text on statistics for a step-by-step derivation. There
    are two insights that you can draw from the expression in Equation [11-13](#Equ12)
    or [11-14](#Equ13). The first one is that the Fisher Information Matrix can be
    used to make an estimate about the second derivative of the MLE estimator or the
    Negative Loss function (NLL). The second derivate, the Hessian H, tells you about
    the sensitivity of θ found using the NLL minimization over samples and you can
    calculate this sensitivity using F as a replacement in place of hessian. The second
    insight is about doing gradient descent in machine learning using second-order
    approximation instead of the first-order approximation as shown in Equation [11-9](#Equ8).
    The use of the property in Equation [11-14](#Equ13) will help you develop practical
    algorithms that do gradient descent using second order and using the Fisher Matrix
    instead of Hessian. The Fisher Information Matrix is also linked to KL divergence.
    I explore these in the next section, when I talk about the Natural Gradient method,
    which forms the basis for TRPO and PPO.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这个属性的推导涉及到一些数学知识，感兴趣的读者可以参考任何关于统计学的标准文本以获取逐步推导。从方程 [11-13](#Equ12) 或 [11-14](#Equ13)
    中的表达式，你可以得出两个见解。第一个见解是，Fisher 信息矩阵可以用来对 MLE 估计器的二阶导数或负损失函数（NLL）进行估计。二阶导数，即 Hessian
    H，告诉你使用 NLL 最小化在样本上找到的 θ 的敏感性，你可以使用 F 作为 hessian 的替代来计算这个敏感性。第二个见解是关于在机器学习中使用二阶近似而不是一阶近似进行梯度下降，如方程
    [11-9](#Equ8) 所示。在方程 [11-14](#Equ13) 中使用这个属性将帮助你开发使用二阶近似和用 Fisher 矩阵代替 Hessian
    进行梯度下降的实用算法。Fisher 信息矩阵也与 KL 散度有关。我将在下一节中探讨这些内容，当谈到自然梯度法时，它是 TRPO 和 PPO 的基础。
- en: Natural Gradient Method
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自然梯度法
- en: To recap the motivation of TRPO and PPO, you saw earlier in the chapter that
    to make sure that updates to the policy stay within a defined difference, you
    need to put constraints on the delta change in the probability distribution space
    (i.e., policy) instead of the parameters of the probability distribution. TRPO
    does that by way of a hard constraint on KL divergence between the old and new
    policy, as described in Equations [11-1](#Equ1) to [11-4](#Equ3). PPO does this
    without using a hard constraint and you are working your way toward that. To further
    motivate this point, look at two Gaussian distributions with mean -2 and +2 and
    variance of 0.49 (standard deviation of 0.7). You plot the two distributions as
    shown in the left side of Figure [11-2](#Fig2). You can see that the two distributions
    are far apart with negligible overlap. Keeping the means fixed at -2 and +2, change
    the variance from 0.49 to 4.0\. You can see the second version of the graph on
    the right side of Figure [11-2](#Fig2) and confirm that the two distributions
    have a significant overlap, even when the mean distance between the two distributions
    has remained constant.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回顾 TRPO 和 PPO 的动机，你之前在章节中看到，为了确保策略的更新保持在定义的差异范围内，你需要对概率分布空间（即策略）中的 delta 变化施加约束，而不是概率分布的参数。TRPO
    通过对旧策略和新策略之间的 KL 散度施加硬约束来实现这一点，如方程 [11-1](#Equ1) 到 [11-4](#Equ3) 所描述。PPO 不使用硬约束来完成这项工作，而你正在朝着这个方向努力。为了进一步说明这一点，看看两个均值为
    -2 和 +2，方差为 0.49（标准差为 0.7）的高斯分布。你将这两个分布绘制如图 [11-2](#Fig2) 左侧所示。你可以看到这两个分布相距甚远，重叠可以忽略不计。保持均值固定在
    -2 和 +2，将方差从 0.49 改变为 4.0。你可以在图 [11-2](#Fig2) 右侧看到第二个版本的图形，并确认即使两个分布之间的均值距离保持不变，这两个分布仍然有显著的重叠。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig2_HTML.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig2_HTML.jpg)'
- en: 2 graphs with 2 bell curves each. Left. The vertices of the curves are (negative
    2, 0.6) and (2, 0.6). They intersect at (negative 4, 0), (0, 0), and (4, 0). Right.
    The vertices are (negative 2, 0.2) and (2, 2). They intersect at (negative 8,
    0), (0, 0.125), and (8, 0). The values are approximate.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 两个图形，每个图形有两个钟形曲线。左图。曲线的顶点是（-2，0.6）和（2，0.6）。它们在（-4，0），（0，0）和（4，0）相交。右图。顶点是（-2，0.2）和（2，2）。它们在（-8，0），（0，0.125）和（8，0）相交。数值是近似的。
- en: Figure 11-2
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-2
- en: KL divergence changes even when the mean distance remains constant
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: KL 散度即使在均值距离保持不变的情况下也会改变
- en: The KL divergence due to significant overlap will be lower in the right-side
    distributions in Figure [11-2](#Fig2). Therefore, operating in parameter space
    will not give you the ability to control the similarity or dissimilarity of two
    distributions. Putting a bound on the KL divergence gives you a better way to
    control the change in distribution as you update its parameters.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 由于显著的重叠，图[11-2](#Fig2)右侧的分布中的KL散度将更低。因此，在参数空间中操作不会给你控制两个分布相似性或差异性的能力。对KL散度设置界限为你提供了一个更好的方法来控制更新参数时分布的变化。
- en: Now you’ll work your way through establishing the relationship between KL divergence
    and the Fisher Information Matrix. Look at the expression of KL divergence between
    two policies, the current one with parameter θ and the revised one with parameter
    θ^′.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你将逐步建立KL散度与Fisher信息矩阵之间的关系。看看两个策略之间的KL散度表达式，当前的一个参数为θ，修订的一个参数为θ^′。
- en: '![$$ KL\left[\mathrm{p}\left(\mathrm{x}|\uptheta \right)\right\Vert\;\left[\mathrm{p}\left(\mathrm{x}|{\uptheta}^{\prime}\right)\right]={E}_{p\left(x|\uptheta
    \right)}\left[\log p\left(x|\uptheta \right)\right]-{E}_{p\left(x|\uptheta \right)}\left[\log
    p\left(x|{\theta}^{\prime}\right)\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equj.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![KL[ p(x|θ) || [ p(x|θ^′) ] = E[p(x|θ)][log p(x|θ)] - E[p(x|θ)][log p(x|θ^′)]
    ]](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equj.png)'
- en: 'Taking the first derivate of this expression with respect to θ^′, the parameter
    of the updated distribution, you get:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 对该表达式关于θ^′，即更新分布的参数，求一阶导数，得到：
- en: '![$$ {\nabla}_{\uptheta \prime }\  KL\left[p\left(x|\uptheta \right)\right\Vert\
    \left[p\left(x|{\uptheta}^{\prime}\right)\right]={\nabla}_{\uptheta \prime }{E}_{p\left(x|\uptheta
    \right)}\left[\log p\left(x|\uptheta \right)\right]-{\nabla}_{\uptheta \prime
    }\ {E}_{p\left(x|\uptheta \right)}\left[\log p\left(x|{\uptheta}^{\prime}\right)\right]
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equk.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![∇_θ′ KL[p(x|θ) || [ p(x|θ^′) ] = ∇_θ′ E[p(x|θ)][log p(x|θ)] - ∇_θ′ E[p(x|θ)][log
    p(x|θ^′)] ]](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equk.png)'
- en: The first term on the right side of the expression will be 0, as the derivative
    is with respect to θ^′ but the expression *E*[*p*(*x*| θ)][log*p*(*x*| θ)] has
    no dependence on θ^′.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式右侧的第一项将为0，因为导数是相对于θ^′的，但表达式 *E*[*p*(*x*| θ)][log*p*(*x*| θ)] 对θ^′没有依赖性。
- en: 'Now expand the second term on right side from the expectation operation to
    an explicit integral:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在将右侧第二个项从期望操作展开为显式积分：
- en: '![$$ {\nabla}_{\uptheta \prime }\  KL\left[p\left(x|\uptheta \right)\right\Vert\
    \left[p\left(x|{\uptheta}^{\prime}\right)\right]=-\int p\left(x|\uptheta \right){\nabla}_{\uptheta
    \prime}\log p\left(x|{\uptheta}^{\prime}\right)\  dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equl.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![∇_θ′ KL[p(x|θ) || [ p(x|θ^′) ] = -∫ p(x|θ) ∇_θ′ log p(x|θ^′) dx ]](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equl.png)'
- en: 'Take the second derivate of the expression to get:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 对该表达式求二阶导数，得到：
- en: '![$$ {\nabla}_{\uptheta \prime}^2\  KL\left[p\left(x|\uptheta \right)\right\Vert\
    \left[p\left(x|{\uptheta}^{\prime}\right)\right]=-\int p\left(x|\uptheta \right)\
    {\nabla}_{\uptheta \prime}^2\log p\left(x|{\uptheta}^{\prime}\right)\  dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equm.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![∇_θ′^2 KL[p(x|θ) || [ p(x|θ^′) ] = -∫ p(x|θ) ∇_θ′ log p(x|θ^′) dx ]](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equm.png)'
- en: 'The left expression—the second derivate of the scalar value against the parameter
    vector—is nothing but a Hessian, the Hessian of KL divergence between old and
    updated distribution with respect to the parameters of the updated distribution.
    Now evaluate the Hessian at θ^′ = θ to get:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 左边的表达式——标量值对参数向量的二阶导数——不过就是一个Hessian，它是关于更新分布参数的老旧分布与KL散度的Hessian。现在将Hessian在θ^′ = θ处求值，得到：
- en: '![$$ {H}_{KL\left[\right(p\left(x|\theta \right)\left\Vert p\left(x|{\theta}^{\prime}\right)\right]}=-\int
    p\left(x|\uptheta \right){\nabla}_{\uptheta^{\prime}}^2\log p\left(x|{\uptheta}^{\prime}\right){\left.\kern0em
    \right|}_{\uptheta \prime =\uptheta} dx $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equn.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equn.png)'
- en: '![$$ =-\int p\left(x|\uptheta \right){H}_{\log p\left(x|\uptheta \right)} dx
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equo.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equo.png)'
- en: '![$$ =-{\mathrm{E}}_{\mathrm{p}\left(\mathrm{x}|\uptheta \right)}\left[{\mathrm{H}}_{\log
    \left(\mathrm{x}|\uptheta \right)}\;\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equp.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equp.png)'
- en: 'Substituting Equation [11-14](#Equ13), you get:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程 [11-14](#Equ13) 代入，你得到：
- en: '![$$ {H}_{KL\left[\right(p\left(x|\theta \right)\left\Vert p\left(x|{\theta}^{\prime}\right)\right]}=F
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ14.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ14.png)'
- en: (11-15)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: (11-15)
- en: Equation [11-15](#Equ14) is an important result. It tells you that the Fisher
    Information Matrix *F* is the Hessian of KL divergence between two distributions
    *p*(*x*| *θ*) and *p*(*x*| *θ*^′), with respect to *θ*^′, evaluated at *θ*^′ = *θ*.
    How will you use this? Can you think of it?
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [11-15](#Equ14) 是一个重要的结果。它告诉你，Fisher 信息矩阵 *F* 是在 *θ*^′ = *θ* 处，关于 *θ*^′ 的
    KL 散度（两个分布 *p*(*x*| *θ*) 和 *p*(*x*| *θ*^′) 之间的 KL 散度）的海森矩阵。你将如何使用它？你能想到吗？
- en: 'Look at *KL*[*p*(*x*| θ)‖ [*p*(*x*| θ^′)] and switch the variables, as θ^′ = θ + *d*
    to explicitly define the change in parameters from old value θ to new value θ^′
    with a change vector *d*. Now derive a second order, Taylor series expansion of
    KL divergence around the original parameter vector θ. I shorten the probability
    function notation to keep the focus on the core manipulations:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 查看 *KL*[*p*(*x*| θ)‖ [*p*(*x*| θ^′)] 并交换变量，因为 θ^′ = θ + *d* 以显式定义从旧值 θ 到新值 θ^′
    的参数变化，其中 *d* 是变化向量。现在推导 KL 散度在原始参数向量 θ 附近的二阶泰勒展开。我将概率函数的符号简化，以保持对核心操作的聚焦：
- en: '![$$ KL\left[{p}_{\uptheta}\Big\Vert {p}_{\uptheta \prime}\right]\approx KL\left[{p}_{\uptheta}\Big\Vert
    {p}_{\uptheta}\right]+{\left({\nabla}_{\uptheta \prime } KL\left[{p}_{\uptheta}\Big\Vert
    {p}_{\uptheta \prime}\right]{\left.\kern0em \right|}_{\uptheta \prime =\uptheta}\right)}^Td+\frac{1}{2}{d}^T{\nabla}_{\uptheta
    \prime}^2 KL\left[{p}_{\uptheta}\Big\Vert {p}_{\uptheta \prime}\right]{\left.\kern0em
    \right|}_{\uptheta \prime =\uptheta}d $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equq.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equq.png)'
- en: 'The first term, *KL*[*p*[θ]‖*p*[θ]], will be 0, as the KL distance between
    the same distributions is 0\. The second term has ∇[θ′]*KL*[*p*[θ]‖*p*[θ′]]|[θ ′  = θ],
    which is equal to *E*[*p*(*x*| θ)][∇[θ] log *p*(*x*| θ)], which according to Equation
    [11-11](#Equ10), is also 0\. Expression ![$$ {\nabla}_{\uptheta \prime}^2 KL\left[{p}_{\uptheta}\Big\Vert
    {p}_{\uptheta \prime}\right]{\left.\kern0em \right|}_{\uptheta \prime =\uptheta},
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq9.png) by Equation
    [11-15](#Equ14) is the Fisher Information Matrix F. Making these substitutions,
    you get:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个项，*KL*[*p*[θ]‖*p*[θ]] 将会是 0，因为相同分布之间的 KL 距离是 0。第二个项有 ∇[θ′]*KL*[*p*[θ]‖*p*[θ′]]|[θ ′  = θ]，这等于
    *E*[*p*(*x*| θ)][∇[θ] log *p*(*x*| θ)]，根据方程 [11-11](#Equ10)，这也是 0。根据方程 [11-15](#Equ14)，表达式
    ![$$ {\nabla}_{\uptheta \prime}^2 KL\left[{p}_{\uptheta}\Big\Vert {p}_{\uptheta
    \prime}\right]{\left.\kern0em \right|}_{\uptheta \prime =\uptheta}, $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq9.png)
    是 Fisher 信息矩阵 F。进行这些替换，你得到：
- en: '![$$ KL\left[{p}_{\uptheta}\Big\Vert {p}_{\uptheta \prime}\right]\approx \frac{1}{2}{d}^T
    Fd $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ15.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ15.png)'
- en: (11-16)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: (11-16)
- en: 'With this result, you now know that if you need to constrain the KL divergence
    during a parameter update, you can do so with the help of Equation [11-16](#Equ15).
    Say your loss function is L(θ) and you want to find the optimal θ that minimizes
    this loss function subject to KL divergence being within a constant *c*. You can
    express this mathematically as follows:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个结果，你现在知道，如果你需要在参数更新期间约束KL散度，你可以借助方程 [11-16](#Equ15) 来实现。假设你的损失函数是 L(θ)，并且你想要找到一个最优的
    θ，使得这个损失函数在KL散度保持在常数 *c* 的条件下最小化。你可以用以下方式数学地表达：
- en: '![$$ {d}^{\ast }=\arg \underset{d\kern0.5em \mathrm{s}.\mathrm{t}. KL\left[{p}_{\uptheta}\Big\Vert
    {p}_{\uptheta +\mathrm{d}}\right]=c}{\min }L\left(\uptheta +d\right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equr.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![**d**^* = arg min_{d s.t. KL[p_θ || p_θ + d] = c} L(θ + d)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equr.png)'
- en: 'You can express this minimization problem with constraint in Lagrangian form
    as follows:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用拉格朗日形式将这个带有约束的最小化问题表达如下：
- en: '![$$ {d}^{\ast }=\arg \underset{d}{\min }L\left(\uptheta +d\right)+\uplambda
    \left( KL\left[{p}_{\uptheta}\Big\Vert {p}_{\uptheta +d}\right]-c\right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equs.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {d}^{\ast} = \arg \min_{d} L\left(\uptheta + d\right) + \uplambda \left(
    KL\left[{p}_{\uptheta} \Big\Vert {p}_{\uptheta + d}\right] - c\right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equs.png)'
- en: 'Using Equation [11-15](#Equ14) to replace *KL*[*p*[θ]‖*p*[θ + *d*]], you get:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方程 [11-15](#Equ14) 替换 KL[*p*[θ]‖*p*[θ + *d*]]，你得到：
- en: '![$$ {d}^{\ast}\approx \arg \underset{d}{\min }L\left(\uptheta +d\right)+\frac{1}{2}\uplambda
    {d}^T Fd-\uplambda c $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equt.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {d}^{\ast}\approx \arg \min_{d} L\left(\uptheta + d\right) + \frac{1}{2}\uplambda
    {d}^T Fd - \uplambda c $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equt.png)'
- en: 'Next, approximate *L*(θ + *d*) by its first-order Taylor expansion *L*(θ + *d*) = *L*(θ) + ∇[θ]*L*(θ)^(*T*)*d*
    to get:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，通过其一级泰勒展开来近似 *L*(θ + d) = *L*(θ) + ∇[θ]*L*(θ)^(*T*)*d，以得到：
- en: '![$$ {d}^{\ast}\approx \arg \underset{d}{\min}\left[L\left(\uptheta \right)+{\nabla}_{\uptheta}L{\left(\uptheta
    \right)}^Td+\frac{1}{2}\uplambda {d}^T Fd-\uplambda c\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equu.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {d}^{\ast}\approx \arg \min_{d} \left[L\left(\uptheta \right) + \nabla_{\uptheta}L{\left(\uptheta
    \right)}^Td + \frac{1}{2}\uplambda {d}^T Fd - \uplambda c\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equu.png)'
- en: 'To find the *d*^∗, you set the derivate of right side with respect to *d* equal
    to 0, to get:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找到 *d*^∗，你将右侧关于 *d* 的导数设为 0，以得到：
- en: '![$$ \frac{\partial }{\partial d}\left[L\left(\uptheta \right)+{\nabla}_{\uptheta}L{\left(\uptheta
    \right)}^Td+\frac{1}{2}\uplambda {d}^T Fd-\uplambda c\right]=0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equv.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \frac{\partial }{\partial d}\left[L\left(\uptheta \right) + \nabla_{\uptheta}L{\left(\uptheta
    \right)}^Td + \frac{1}{2}\uplambda {d}^T Fd - \uplambda c\right] = 0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equv.png)'
- en: '![$$ \Rightarrow {\nabla}_{\uptheta}L\left(\uptheta \right)+\uplambda dF=0
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equw.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \Rightarrow \nabla_{\uptheta}L\left(\uptheta \right) + \uplambda dF =
    0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equw.png)'
- en: 'Solving for *d*, you get:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 解 *d*，你得到：
- en: '![$$ d=-\frac{1}{\uplambda}{F}^{-1}{\nabla}_{\uptheta}L\left(\uptheta \right)
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ16.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![d = -1/λ F^(-1) ∇_θ L(θ)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ16.png)'
- en: (11-17)
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: (11-17)
- en: 'Where the Natural Gradient ![$$ {\overset{\sim }{\nabla}}_{\uptheta} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq10.png)
    is defined as:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，自然梯度 ![$$ {\overset{\sim }{\nabla}}_{\uptheta} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq10.png)
    定义为：
- en: '![$$ {\overset{\sim }{\nabla}}_{\uptheta}L\left(\uptheta \right)={F}^{-1}{\nabla}_{\uptheta}L\left(\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ17.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\overset{\sim }{\nabla}}_{\uptheta}L\left(\uptheta \right) = F^(-1)∇_{\uptheta}L\left(\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ17.png)'
- en: (11-18)
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: (11-18)
- en: Equation [11-18](#Equ17) is an important result that forms the basis for TRPO
    and PPO as well as many other policy algorithms based on natural gradients. Natural
    gradients convert the gradient in the parameter space to a gradient in distribution
    space by using *F*^(−1), which captures the curvature of the probability graph
    around the parameter θ.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [11-18](#Equ17) 是一个重要的结果，它是 TRPO 和 PPO 以及许多基于自然梯度的策略算法的基础。自然梯度通过使用 *F*^(−1)
    将参数空间中的梯度转换为分布空间中的梯度，该 *F*^(−1) 捕获了参数 θ 附近概率图的曲率。
- en: 'Using the result from Equation [11-18](#Equ17), you can define the natural
    gradient descent by using the following steps:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 使用方程[11-18](#Equ17)的结果，你可以通过以下步骤定义自然梯度下降：
- en: Do a forward pass and calculate the loss *L*(θ).
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 进行正向传播并计算损失 *L*(θ)。
- en: Compute the Fisher Information Matrix F estimate using Equation [11-13](#Equ12).
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用方程[11-13](#Equ12)计算Fisher信息矩阵F的估计值。
- en: Compute the gradient ∇[θ]*L*(θ).
  id: totrans-129
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算梯度 ∇[θ]*L*(θ)。
- en: Calculate the natural gradient ![$$ {\overset{\sim }{\nabla}}_{\uptheta}L\left(\uptheta
    \right)={F}^{-1}{\nabla}_{\uptheta}L\left(\uptheta \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq11.png)
    using Equation [11-18](#Equ17).
  id: totrans-130
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用方程[11-18](#Equ17)计算自然梯度 ![$$ {\overset{\sim }{\nabla}}_{\uptheta}L\left(\uptheta
    \right)={F}^{-1}{\nabla}_{\uptheta}L\left(\uptheta \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq11.png)。
- en: Update the parameter ![$$ \uptheta =\uptheta -\upalpha {\overset{\sim }{\nabla}}_{\uptheta}L\left(\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq12.png).
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更新参数 ![$$ \uptheta =\uptheta -\upalpha {\overset{\sim }{\nabla}}_{\uptheta}L\left(\uptheta
    \right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq12.png)。
- en: With natural gradients, the size of the update is controlled in the distribution
    space instead of in the parameter space and it is achieved by using natural gradients.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 使用自然梯度，更新的大小在分布空间中而不是在参数空间中受到控制，这是通过使用自然梯度实现的。
- en: This has been a long section, full of math and derivations. You do not need
    to understand everything in the first reading. You can also skip the whole section—just
    remember the concept of a natural gradient and how it is related to a regular
    gradient, as per Equation [11-18](#Equ17).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这已经是一个内容丰富的部分，充满了数学和推导。你不需要在第一次阅读时理解所有内容。你也可以跳过整个部分——只需记住自然梯度的概念以及它如何与常规梯度相关，如方程[11-18](#Equ17)所示。
- en: The next section visits TRPO briefly in the context of this understanding and
    then goes into the details of how PPO implements that KL constraint, what are
    the implementation level details, and so on.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分将在这种理解的基础上简要介绍TRPO，然后深入探讨PPO如何实现KL约束，以及实现层面的细节等等。
- en: Trust Region Policy Optimization (TRPO)
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信任区域策略优化（TRPO）
- en: Having derived the natural gradient, you can now better appreciate the TRPO
    Equations [11-1](#Equ1) to [11-3](#Equ2). They implement the KL divergence constraint
    and ensure improvement of policy on each update using something called a *line
    search,* as explained in Equation [11-4](#Equ3). TRPO also calculates the Hessian
    ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq13.png)of
    the KL divergence by calculating the Hessian on the sample average KL divergence.
    Next, it calculates ![$$ {\hat{x}}_k={\hat{H}}_k^{-1}{\hat{g}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq14.png)
    using the conjugate gradient approach and then ![$$ {\hat{x}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq15.png)
    is used to update the policy parameters, as shown in Equation [11-4](#Equ3). Note
    that TRPO calculates the Hessian of the sample average KL divergence instead of
    using the Fisher Information Matrix as a drop-in replacement.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在推导出自然梯度之后，你现在可以更好地理解TRPO方程[11-1](#Equ1)到[11-3](#Equ2)。它们实现了KL散度约束，并通过所谓的*线搜索*确保在每次更新时政策得到改进，如方程[11-4](#Equ3)中所述。TRPO还通过计算样本平均KL散度的Hessian来计算KL散度的Hessian
    ![$$ {\hat{H}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq13.png)。接下来，它使用共轭梯度法计算
    ![$$ {\hat{x}}_k={\hat{H}}_k^{-1}{\hat{g}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq14.png)，然后使用
    ![$$ {\hat{x}}_k $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq15.png)
    来更新策略参数，如方程[11-4](#Equ3)所示。请注意，TRPO计算样本平均KL散度的Hessian，而不是使用Fisher信息矩阵作为替代。
- en: Even with all the optimization in implementation, TRPO is a complex and exacting
    algorithm. It may not have been very popular, but it laid the foundation for authors
    to come up with PPO, which is covered next.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 即使在实现上进行了所有优化，TRPO也是一个复杂且要求严格的算法。它可能并不非常受欢迎，但它为作者们提出了PPO奠定了基础，这将在下一部分介绍。
- en: PPO Deep Dive**
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: PPO深度解析**
- en: 'PPO is inspired by the same challenge as TRPO: how can developers update a
    policy as much as possible with the data they have now, without going too far
    and risking a drop in performance? While TRPO tries to solve this problem with
    a complicated method based on second-order derivatives, PPO is a group of methods
    that use first-order derivatives and some other techniques to keep new policies
    similar to the old ones. PPO methods are much easier to implement, and they seem
    to work as well as or better than TRPO in practice. There are two primary variants
    of PPO—PPO-Penalty and PPO-Clip.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: PPO受到与TRPO相同的挑战的启发：开发者如何尽可能多地使用他们现在拥有的数据来更新策略，而不至于走得太远，从而降低性能？虽然TRPO试图通过基于二阶导数的复杂方法来解决这个问题，但PPO是一组使用一阶导数和一些其他技术来保持新策略与旧策略相似的方法。PPO方法更容易实现，并且在实践中似乎与TRPO一样好，甚至更好。PPO主要有两种变体——PPO-Penalty和PPO-Clip。
- en: Like TRPO, PPO-Penalty updates the policy network with an approximate solution
    to a KL-constrained problem, but instead of enforcing the constraint strictly,
    it adds a penalty term for the KL divergence in the objective function, and it
    automatically adapts the penalty coefficient during training so that it has the
    right magnitude.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 与TRPO类似，PPO-Penalty通过一个KL约束问题的近似解来更新策略网络，但它不是严格强制约束，而是在目标函数中添加一个KL散度的惩罚项，并在训练过程中自动调整惩罚系数，以便它具有正确的幅度。
- en: Instead of a KL divergence term in the objective or a constraint, PPO-Clip uses
    a special clipping technique in the objective function to prevent the new policy
    from deviating too much from the old policy. This chapter focuses only on PPO-Clip.
    Readers may want to quickly review the section on PPO from Chapter [8](502835_2_En_8_Chapter.xhtml)
    before proceeding further.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 与目标函数或约束中的KL散度项不同，PPO-Clip在目标函数中使用一种特殊的剪辑技术来防止新策略与旧策略偏差过大。本章仅关注PPO-Clip。读者在继续之前可能需要快速回顾第[8](502835_2_En_8_Chapter.xhtml)章中关于PPO的部分。
- en: PPO CLIP Objective
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PPO CLIP 目标函数
- en: This section first talks about the clipped objective as defined in Equation
    8 of the PPO paper.^([2](#Fn2)) This objective is reproduced in Equation [11-19](#Equ18).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 本节首先讨论了PPO论文中定义的第8个方程的剪辑目标。^([2](#Fn2))此目标在方程[11-19](#Equ18)中重现。
- en: '![$$ {L}^{\mathrm{CLIP}}\left(\uptheta \right)={\hat{E}}_t\left[\mathit{\min}\left({r}_t\left(\uptheta
    \right){\hat{A}}_t, clip\left({r}_t\left(\uptheta \right),1-\upvarepsilon, 1+\upvarepsilon
    \right){\hat{A}}_t\right)\right] $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ18.png)'
  id: totrans-144
  prefs: []
  type: TYPE_IMG
  zh: '![${L}^{\mathrm{CLIP}}\left(\uptheta \right)={\hat{E}}_t\left[\mathit{\min}\left({r}_t\left(\uptheta
    \right){\hat{A}}_t, clip\left({r}_t\left(\uptheta \right),1-\upvarepsilon, 1+\upvarepsilon
    \right){\hat{A}}_t\right)\right]$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ18.png)'
- en: (11-19)
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: (11-19)
- en: In Equation [11-19](#Equ18), *r*[*t*](θ) is the importance sampling ratio and
    ![$$ {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq16.png)
    is the usual Advantage function, which you studied about in Chapter [8](502835_2_En_8_Chapter.xhtml).
    Advantage ![$$ {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq17.png)
    helps reduce the variance when used as a drop-in replacement for rewards-to-go
    value in the policy optimization algorithms. *r*[*t*](θ) is the ratio of the probability
    of a given action in a given state under the new policy and under the old policy,
    as shown in Equation [11-20](#Equ19). Epsilon (ϵ) is the hyperparameter and is
    usually kept at a value of 0.2.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在方程[11-19](#Equ18)中，*r*[*t*](θ)是重要性采样比率，![${\hat{A}}_t$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq16.png)是通常的优势函数，这是你在第[8](502835_2_En_8_Chapter.xhtml)章中学到的。优势![${\hat{A}}_t$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq17.png)有助于在策略优化算法中将奖励到去的值作为替代品时减少方差。*r*[*t*](θ)是在新策略和旧策略下给定状态下给定动作的概率比率，如方程[11-20](#Equ19)所示。Epsilon
    (ϵ)是超参数，通常保持0.2的值。
- en: '![$$ {r}_t\left(\uptheta \right)=\frac{\uppi_{\uptheta}\left({a}_t|{s}_t\right)}{\uppi_{\uptheta_{old}}\left({a}_t|{s}_t\right)}
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ19.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![${r}_t\left(\uptheta \right)=\frac{\uppi_{\uptheta}\left({a}_t|{s}_t\right)}{\uppi_{\uptheta_{old}}\left({a}_t|{s}_t\right)}$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ19.png)'
- en: (11-20)
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: (11-20)
- en: Note that *r*[*t*](θ) is 1 when θ = θ[*old*], that is, when old and new policies
    are the same. Let’s unpack the expression ![$$ clip\left({r}_t\left(\uptheta \right),1-\upvarepsilon,
    1+\upvarepsilon \right){\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq18.png).
    Note the range of values. *r*[*t*](θ), being the ratio of two probabilities, would
    lie between 0 and 1\. *CLIP*, as the name suggests, clips the ratio *r*[*t*](θ)
    in the range [1 − ϵ, 1 + ϵ], thereby removing any incentive for *r*[*t*] to move
    outside of this range. This limits policy updates to be within a range controlled
    by the parameter ϵ.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到当 θ = θ[old]，即旧策略和新策略相同时，*r*[*t*](θ) 为 1。让我们来分解表达式 ![clip({r}_t(θ),1-ε,1+ε){\hat{A}}_t](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq18.png)。注意值的范围。*r*[*t*](θ)，作为两个概率的比率，将介于
    0 和 1 之间。正如其名所示，*CLIP* 会将 *r*[*t*](θ) 的比率限制在 [1 - ϵ, 1 + ϵ] 的范围内，从而消除 *r*[*t*]
    移出此范围的任何激励。这限制了策略更新在由参数 ϵ 控制的范围内。
- en: In Equation [11-19](#Equ18), you use the minimum of clipped and unclipped as
    the objective. Depending on whether the value of ![$$ {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq19.png)
    is positive or negative, the behavior of the `min` function is different.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在方程 [11-19](#Equ18) 中，你使用剪辑和非剪辑的最小值作为目标。根据 ![A_t](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq19.png)
    的值是正还是负，`min` 函数的行为会有所不同。
- en: Now consider the case of positive ![$$ {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq20.png).
    Consider three different values of *r*[*t*]; below 1 − ϵ, in the range [1 − ϵ,
    1 + ϵ], and above 1 + ϵ. To keep the notation uncluttered, you can drop the sub-index
    *t*. When *r* is below 1 − ϵ, the clipped value will be ![$$ \left(1-\upvarepsilon
    \right)\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq21.png)
    and the unclipped value will be ![$$ r\hat{A,} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq22.png)
    which is lower than the clipped value. Therefore, the surrogate objective function
    *L*^(*CLIP*) will be ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq23.png).
    When *r* lies in [1 − ϵ, 1 + ϵ], clipped and unclipped portions will be the same,
    thus making ![$$ {L}^{CLIP}=r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq24.png).
    For *r* > 1 + ϵ, clipped value will be ![$$ \left(1+\upvarepsilon \right)\hat{A}
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq25.png) and
    it will be less than ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq26.png),
    making *L*^(*CLIP*) equal to ![$$ \left(1+\upvarepsilon \right)\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq27.png).
    You can see these in the following table as well as in Figure [11-3](#Fig3).
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 现在考虑 ![A_t](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq20.png)
    为正的情况。考虑 *r*[*t*] 的三个不同值；低于 1 - ϵ，位于 [1 - ϵ, 1 + ϵ] 范围内，以及高于 1 + ϵ。为了保持符号的简洁，你可以省略下标
    *t*。当 *r* 低于 1 - ϵ 时，剪辑值将是 ![1-ε\hat{A}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq21.png)，而未剪辑的值将是
    ![r\hat{A,}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq22.png)，它低于剪辑值。因此，代理目标函数
    *L*^(*CLIP*) 将是 ![r\hat{A}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq23.png)。当
    *r* 位于 [1 - ϵ, 1 + ϵ] 范围内时，剪辑和非剪辑部分将相同，因此 ![L^{CLIP}=r\hat{A}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq24.png)。对于
    *r* > 1 + ϵ，剪辑值将是 ![1+ε\hat{A}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq25.png)，它将小于
    ![r\hat{A}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq26.png)，使得
    *L*^(*CLIP*) 等于 ![1+ε\hat{A}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq27.png)。你可以在下面的表格以及图
    [11-3](#Fig3) 中看到这些情况。
- en: You can carry out similar analysis for negative ![$$ {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq28.png).
    Once more consider three different values of *r*[*t*]; below 1 − ϵ, in the range
    [1 − ϵ, 1 + ϵ], and above 1 + ϵ. When *r* is below 1 − ϵ, the clipped value will
    be ![$$ \left(1-\upvarepsilon \right)\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq29.png)
    and the unclipped value will be ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq30.png).
    As ![$$ {\hat{A}}_t $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq31.png)
    is negative, ![$$ \left(1-\upvarepsilon \right)\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq32.png)
    will be smaller and will be the *L*^(*CLIP*). When *r* lies in [1 − ϵ, 1 + ϵ],
    clipped and unclipped portions will be the same, making ![$$ {L}^{CLIP}=r\hat{A}
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq33.png). For
    *r* > 1 + ϵ, the clipped value will be ![$$ \left(1+\upvarepsilon \right)\hat{A}
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq34.png) and
    it will be more than ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq35.png),
    since ![$$ \hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq36.png)
    is negative. Therefore, in this case *L*^(*CLIP*) will be equal to ![$$ r\hat{A}
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq37.png). Again,
    refer to the following table, as well as Figure [11-3](#Fig3) for a summary and
    plot of how *L*^(*CLIP*) changes for different values of ration *r*.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以对负 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq28.png)
    进行类似的分析。再次考虑三个不同的 *r*[*t*] 值；低于 1 − ϵ，在 [1 − ϵ, 1 + ϵ] 范围内，以及高于 1 + ϵ。当 *r* 低于
    1 − ϵ 时，裁剪值将是 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq29.png)
    而未裁剪值将是 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq30.png)。由于
    ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq31.png) 是负的，![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq32.png)
    将会更小，将是 *L*^(*CLIP*)。当 *r* 位于 [1 − ϵ, 1 + ϵ] 范围内时，裁剪和未裁剪的部分将是相同的，使得 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq33.png)。对于
    *r* > 1 + ϵ，裁剪值将是 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq34.png)，并且它将大于
    ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq35.png)，因为
    ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq36.png) 是负的。因此，在这种情况下，*L*^(*CLIP*)
    将等于 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq37.png)。再次，请参考以下表格以及图
    [11-3](#Fig3) 以总结和展示 *L*^(*CLIP*) 随比率 *r* 的不同值如何变化。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig3_HTML.jpg)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig3_HTML.jpg)'
- en: 2 graphs of L clip versus r. Left. The condition reads A greater than 0\. The
    line increases to the dashed vertical line at 1 + epsilon and becomes constant.
    A dot is marked at 1\. Right. The condition reads A less than 0\. The line remains
    constant initially and decreases from the dashed line at 1 minus epsilon.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 2 张 L clip 与 r 的图。左图。条件是 A 大于 0。线增加到 1 + epsilon 的虚线，然后变为常数。在 1 处标记了一个点。右图。条件是
    A 小于 0。线最初保持不变，然后从 1 - epsilon 的虚线下降。
- en: Figure 11-3
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-3
- en: '*L*^(*CLIP*) plot for different values of ratio *r* and Advantage ![$$ \hat{A}
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq46.png)'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '*L*^(*CLIP*) 图对于不同的比率 *r* 和优势 ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq46.png)'
- en: '|   | *r* < 1 − ϵ | *r* ∈ [1 − ϵ, 1 + ϵ] | *r* > 1 + ϵ |'
  id: totrans-157
  prefs: []
  type: TYPE_TB
  zh: '|   | *r* < 1 − ϵ | *r* ∈ [1 − ϵ, 1 + ϵ] | *r* > 1 + ϵ |'
- en: '| ![$$ \hat{A}\ge 0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq38.png)
    | ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq39.png)
    | ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq40.png)
    | ![$$ \left(1+\upvarepsilon \right)\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq41.png)
    |'
  id: totrans-158
  prefs: []
  type: TYPE_TB
  zh: '| ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq38.png)
    | ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq39.png)
    | ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq40.png)
    | ![公式](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq41.png)
    |'
- en: '| ![$$ \hat{A}&lt;0 $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq42.png)
    | ![$$ \left(1-\upvarepsilon \right)\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq43.png)
    | ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq44.png)
    | ![$$ r\hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq45.png)
    |'
  id: totrans-159
  prefs: []
  type: TYPE_TB
  zh: '| ![>0](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq42.png)
    | ![>1-ε](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq43.png)
    | ![r>0](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq44.png)
    | ![r>0](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq45.png)
    |'
- en: You can see that, in Figure [11-3](#Fig3), whenever the change in probability
    ratio will make *L*^(*CLIP*) improve, you ignore the change beyond a threshold,
    1 + *ϵ* for positive ![$$ \hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq47.png)
    and 1 − *ϵ* for negative ![$$ \hat{A} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq48.png).
    You include the ratio without any clipping whenever the change is making the objective
    worse.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，在图 [11-3](#Fig3) 中，每当概率比的变化会使 *L*^(*CLIP*) 改善时，你会忽略超过阈值的任何变化，对于正的 ![>A](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq47.png)
    是1 + *ϵ*，对于负的 ![>A](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_IEq48.png)
    是1 - *ϵ*。当变化使目标变得更差时，你将包括没有剪裁的比率。
- en: Advantage Calculation
  id: totrans-161
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优势计算
- en: Like the other policy gradient approaches in Chapter [8](502835_2_En_8_Chapter.xhtml),
    calculating Advantage remains the same. There are various ways to calculate the
    Advantage. The original PPO paper suggested using two types of Advantage functions,
    as shown in Equations [11-21](#Equ20) and [11-22](#Equ21).
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 与第 [8](502835_2_En_8_Chapter.xhtml) 章中提到的其他策略梯度方法一样，计算优势的方法保持不变。有各种方法可以计算优势。原始PPO论文建议使用两种类型的优势函数，如方程
    [11-21](#Equ20) 和 [11-22](#Equ21) 所示。
- en: '![$$ {\hat{A}}_t=-V\left({s}_t\right)+{r}_t+\upgamma {r}_{t+1}+\cdots +{\upgamma}^{T-t+1}{r}_{T-1}+{\upgamma}^{T-t}V\left({s}_T\right)
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ20.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![>A_t=-V(s_t)+r_t+γr_{t+1}+…+γ^(T-t+1)r_{T-1}+γ^(T-t)V(s_T)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ20.png)'
- en: (11-21)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: (11-21)
- en: '![$$ {\hat{A}}_t={\updelta}_t+\left(\gamma \lambda \right){\updelta}_{t+1}+\cdots
    +\cdots +{\left(\gamma \lambda \right)}^{T-t+1}{\updelta}_{T-1} $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equx.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![>A_t=δ_t+(γλ)δ_{t+1}+…+…+(γλ)^(T-t+1)δ_{T-1}](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equx.png)'
- en: '![$$ \mathrm{Where}\ {\updelta}_t={r}_t+\upgamma V\left({s}_{t+1}\right)\hbox{--}
    V\left({s}_t\right) $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ21.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![δ_t=r_t+γV(s_{t+1})-V(s_t)](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ21.png)'
- en: (11-22)
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: (11-22)
- en: Equation [11-21](#Equ20) is the n-step return with *n* = *T* in this case. Equation
    [11-22](#Equ21) is the Generalized Advantage Estimate, which reduces to Equation
    [11-21](#Equ20) for λ = 1 and to TD(0) for λ = 0.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [11-21](#Equ20) 是n步回报，其中在这种情况下n = T。方程 [11-22](#Equ21) 是广义优势估计，当λ = 1时，它简化为方程
    [11-21](#Equ20)，而当λ = 0时，它简化为TD(0)。
- en: Value and Entropy Loss Objectives
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 价值和熵损失目标
- en: 'As with many other Actor-Critic algorithms that involve Advantage calculations,
    you need a network that can take state to produce state-value. PPO also has a
    value network that is fitted as part of the loss objective:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多涉及优势计算的Actor-Critic算法一样，你需要一个可以接受状态并产生状态价值的网络。PPO也有一个价值网络，它是作为损失目标的一部分进行调整的：
- en: '![$$ {L}^{VF}={\hat{E}}_t\left[{\left({V}_{\upphi}\left({s}_t\right)-{V}_t^{target}\right)}^2\right]
    $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ22.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![L^{VF}=E_t[(V_φ(s_t)-V_t^{target})^2]](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ22.png)'
- en: (11-23)
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: (11-23)
- en: As you have seen a few times before, you add entropy term *S*[π[θ]](*s*[*t*])
    to encourage exploration. With all these, the objective function that you want
    to maximize is given in Equation [11-24](#Equ23). Remember that the objective
    in Equation [11-24](#Equ23) is for maximization, which can be converted into a
    minimization by multiplying by -1.0.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你之前看到几次的那样，你添加熵项 *S*[π[θ]](*s*[*t*]) 来鼓励探索。有了所有这些，你想要最大化的目标函数在方程 [11-24](#Equ23)
    中给出。记住，方程 [11-24](#Equ23) 中的目标是最大化，可以通过乘以-1.0转换为最小化。
- en: '![$$ {L}^{CLIP+ VF+S}={L}^{CLIP}-{L}^{VF}+S $$](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ23.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![L^{CLIP+ VF+S}=L^{CLIP}-L^{VF}+S](../images/502835_2_En_11_Chapter/502835_2_En_11_Chapter_TeX_Equ23.png)'
- en: (11-24)
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: (11-24)
- en: Implementation Details of PPO
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: PPO的实现细节
- en: Having explained the theoretical foundations of the PPO algorithm, this section
    will now go through its implementation, as seen in CleanRL. CleanRL library documentation^([3](#Fn3))
    and actual code file^([4](#Fn4)) will be the primary source.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在解释了 PPO 算法的理论基础之后，本节将介绍其在 CleanRL 中的实现，如所见。CleanRL 库文档^([3](#Fn3)) 和实际代码文件^([4](#Fn4))
    将是主要来源。
- en: CleanRL library authors documented all the implementation details in a blog,
    which you can read on the ICLR website.^([5](#Fn5)) There are 37 details that
    the blog talks about, 13 of which are core details, with the remaining 24 relevant
    to specific variants such as the Atari environment, robotics tasks, LSTM version,
    and so on. This section goes over the 13 core details.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: CleanRL 库的作者在博客中记录了所有实现细节，您可以在 ICLR 网站上阅读这些内容.^([5](#Fn5)) 博客中讨论了 37 个细节，其中
    13 个是核心细节，其余 24 个与特定变体相关，例如 Atari 环境、机器人任务、LSTM 版本等。本节将概述这 13 个核心细节。
- en: 1\. Vectorized Environment
  id: totrans-179
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 向量化环境
- en: PPO leverages an efficient paradigm known as the *vectorized architecture**,*
    which features a single learner that collects samples and learns from multiple
    environments. You can see this in Lines 162 to 164 of the implementation file
    `ppo.py`,^([6](#Fn6)) as shown in Listing [11-1](#PC1).
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: PPO 利用一种称为 *向量化架构* 的有效范例，该架构具有一个收集样本并从多个环境中学习的单个学习者。您可以在实现文件 `ppo.py` 的第 162
    到 164 行中看到这一点，如列表 [11-1](#PC1) 所示。
- en: Based on the command-line argument `args.num_envs`, many environments are created
    in parallel and wrapped with `gym.vector.SyncVectorEnv`. The `SyncVectorEnv` in
    Gymnasium is a subclass of `gymnasium.vector.VectorEnv`. `VectorEnv` enables running
    of multiple independent copies of the same environment in parallel. Vector environments
    can provide a linear speed-up in the steps taken per second through sampling multiple
    subenvironments at the same time. To prevent terminated environments waiting until
    all subenvironments have terminated or truncated, the vector environments auto-reset
    subenvironments after they are terminated or truncated. The vector environments
    batch observations, rewards, terminations, truncations, and info for each parallel
    environment. In addition, the `step()` function expects to receive a batch of
    actions for each parallel environment.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 `args.num_envs` 命令行参数，并行创建了多个环境，并用 `gym.vector.SyncVectorEnv` 包装。Gymnasium
    中的 `SyncVectorEnv` 是 `gymnasium.vector.VectorEnv` 的子类。`VectorEnv` 允许并行运行多个相同环境的独立副本。向量环境可以通过同时采样多个子环境来提供每秒步骤数的线性加速。为了防止已终止的环境等待所有子环境都终止或截断，向量环境在子环境终止或截断后会自动重置子环境。向量环境为每个并行环境批量收集观察结果、奖励、终止、截断和信息。此外，`step()`
    函数期望为每个并行环境接收一个动作批处理。
- en: '[PRE0]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The command-line arguments `num_envs` and `num_steps` determine the number of
    steps to run in each environment per policy rollout, and together they control
    the batch size. The batch size is defined as `args.batch_size = int(args.num_envs
    * args.num_steps)`. The `total_timesteps` argument controls the total number of
    environment steps that will be taken during the training. This is broken down
    into several iterations, with each iteration having `batch_size steps`. Each batch
    is used multiple times to train the model with the number of repetitions controlled
    by a command-line argument `args.update_epochs`. A high-level breakdown of this
    training loop is shown in Listing [11-2](#PC2).
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 命令行参数 `num_envs` 和 `num_steps` 决定了每个策略运行中每个环境中要运行的步骤数，并且它们共同控制批处理大小。批处理大小定义为
    `args.batch_size = int(args.num_envs * args.num_steps)`。`total_timesteps` 参数控制训练过程中将采取的总环境步骤数。这被分解为几个迭代，每个迭代有
    `batch_size` 步。每个批处理被多次用于训练模型，重复次数由命令行参数 `args.update_epochs` 控制。这个训练循环的高级概述可以在列表
    [11-2](#PC2) 中看到。
- en: '[PRE1]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 2\. Parameter Initialization
  id: totrans-185
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 参数初始化
- en: In general, the weights of hidden layers use orthogonal initialization of weights
    with `scaling np.sqrt(2)`, and the biases are set to 0, as shown in Listing [11-3](#PC3).
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，隐藏层的权重使用 `scaling np.sqrt(2)` 的权重正交初始化，偏差设置为 0，如列表 [11-3](#PC3) 所示。
- en: '[PRE2]'
  id: totrans-187
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 3\. Adam Optimizer’s Epsilon Parameter
  id: totrans-188
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. Adam 优化器的 Epsilon 参数
- en: PPO sets the epsilon parameter to 1e-5, which is different from the default
    epsilon of 1e-8 in PyTorch and 1e-7 in TensorFlow. Note that PPO uses the same
    optimizer for both policy and value network, as shown in Listing [11-4](#PC4).
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: PPO 将 epsilon 参数设置为 1e-5，这与 PyTorch 中的默认 epsilon 1e-8 和 TensorFlow 中的 1e-7 不同。请注意，PPO
    使用相同的优化器来优化策略和价值网络，如列表 [11-4](#PC4) 所示。
- en: '[PRE3]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 4\. Adam Learning Rate Annealing
  id: totrans-191
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. Adam学习率退火
- en: The Adam optimizer’s learning rate can be constant or set to decay. By default,
    the hyperparameters for training agents playing Atari games set the learning rate
    to linearly decay from 2.5e-4 to 0 as the number of timesteps increases. In MuJoCo,
    the learning rate linearly decays from 3e-4 to 0\. Listing [11-5](#PC5) shows
    the code details.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: Adam优化器的学习率可以是常数或设置为衰减。默认情况下，训练玩Atari游戏的代理的超参数将学习率设置为随着时间步数的增加线性衰减从2.5e-4到0。在MuJoCo中，学习率线性衰减从3e-4到0。列表[11-5](#PC5)显示了代码细节。
- en: '[PRE4]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 5\. Generalized Advantage Estimation
  id: totrans-194
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. 广义优势估计
- en: Although the PPO paper uses the abstraction of Advantage estimate in the PPO’s
    objective, as shown in Listing [11-6](#PC6), the PPO implementation uses a Generalized
    Advantage Estimation, as shown in Equation [11-22](#Equ21). The gamma (γ) is set
    to 0.99 and lambda (λ) is set to 0.95\. Both of these can be controlled as command-line
    parameters.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然PPO论文在PPO的目标函数中使用了优势估计的抽象，如列表[11-6](#PC6)所示，但PPO实现使用广义优势估计，如方程[11-22](#Equ21)所示。伽马(γ)设置为0.99，lambda(λ)设置为0.95。这两个都可以作为命令行参数进行控制。
- en: '[PRE5]'
  id: totrans-196
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 6\. Mini-Batch Updates
  id: totrans-197
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6. 小批量更新
- en: While learning, the PPO implementation randomly arranges the training data of
    size N∗M and splits it into smaller batches to calculate the gradient and improve
    the policy. This is presented in Listing [11-3](#PC3).
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习过程中，PPO实现随机排列大小为N∗M的训练数据，并将其分成更小的批次以计算梯度并改进策略。这体现在列表[11-3](#PC3)中。
- en: 7\. Normalization of Advantages
  id: totrans-199
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 7. 优势归一化
- en: Using GAE to compute the advantages, PPO then normalizes them by taking away
    their mean and dividing them by their standard deviation. This normalization is
    done at the minibatch level, not the whole batch level, as shown in Listing [11-7](#PC7).
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 使用GAE计算优势后，PPO通过减去它们的平均值并除以它们的标准差来对这些优势进行归一化。这种归一化是在小批量级别上进行的，而不是在整个批量级别上，如列表[11-7](#PC7)所示。
- en: '[PRE6]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 8\. Clipped Surrogate Objective
  id: totrans-202
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 8. 剪裁代理目标
- en: PPO clips the objective, which is controlled via the command-line argument `clip_coef`,
    and it is set by default to 0.2\. Listing [11-8](#PC8) shows the code.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: PPO通过命令行参数`clip_coef`控制目标函数的剪裁，默认设置为0.2。列表[11-8](#PC8)显示了代码。
- en: '[PRE7]'
  id: totrans-204
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 9\. Value Function Loss Clipping
  id: totrans-205
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 9. 值函数损失剪裁
- en: PPO clips the value function like the PPO’s clipped surrogate objective, and
    it is controlled via the same command-line argument, `clip_coef`. Listing [11-8](#PC8)
    shows how this clipping is done.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: PPO像剪裁代理目标一样剪裁值函数，并且通过相同的命令行参数`clip_coef`进行控制。列表[11-8](#PC8)显示了这种剪裁是如何进行的。
- en: 10\. Overall Loss and Entropy Bonus
  id: totrans-207
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 10. 整体损失和熵奖励
- en: As shown in Listing [11-8](#PC8), the overall loss is calculated as `loss =
    policy_loss - entropy * entropy_coefficient + value_loss * value_coefficient`,
    which maximizes an entropy bonus term. Note that the policy parameters and value
    parameters share the same optimizer.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表[11-8](#PC8)所示，整体损失计算为`loss = policy_loss - entropy * entropy_coefficient
    + value_loss * value_coefficient`，这最大化了一个熵奖励项。请注意，策略参数和值参数使用相同的优化器。
- en: 11\. Global Gradient Clipping
  id: totrans-209
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 11. 全局梯度剪裁
- en: For each update iteration in an epoch, PPO rescales the gradients of the policy
    and value network so that the “global l2 norm” (i.e., the norm of the concatenated
    gradients of all parameters) does not exceed 0.5, as contained in Listing [11-8](#PC8).
    The value of 0.5 can be controlled via the command-line argument `max_grad_norm`.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个epoch中的更新迭代，PPO重新缩放策略和价值网络的梯度，使得“全局l2范数”（即所有参数连接梯度的大小）不超过0.5，如列表[11-8](#PC8)所示。0.5的值可以通过命令行参数`max_grad_norm`进行控制。
- en: 12\. Debug Variables
  id: totrans-211
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 12. 调试变量
- en: 'The PPO implementation comes with several debug variables, which are:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: PPO实现包含几个调试变量，包括：
- en: '`policy_loss`: The mean policy loss across all data points'
  id: totrans-213
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`policy_loss`：所有数据点的平均策略损失'
- en: '`value_loss`: The mean value loss across all data points'
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`value_loss`：所有数据点的平均值损失'
- en: '`entropy_loss`: The mean entropy value across all data points'
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`entropy_loss`：所有数据点的平均熵值'
- en: '`clipfrac`: The fraction of the training data that triggered the clipped objective'
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`clipfrac`：触发剪裁目标函数的训练数据比例'
- en: '`approxkl`: The approximate Kullback–Leibler divergence, measured by `(-logratio).mean()`'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`approxkl`：通过`(-logratio).mean()`测量的近似Kullback–Leibler散度'
- en: In the CleanRL implementation, these are logged to the weights and biases if
    that option is enabled from the command line. The logging code is from lines 300
    to 309 in the `ppo.py` file.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 在CleanRL实现中，如果从命令行启用了该选项，这些将记录到权重和偏差中。日志代码位于`ppo.py`文件的300到309行。
- en: 13\. Shared and Separate MLP Networks for Policy and Value Functions
  id: totrans-219
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 13. 用于策略和价值函数的共享和分离的MLP网络
- en: You can either use a shared network with separate heads or separate networks.
    CleanRL implementations separate the network approach in the `ppo.py` file, as
    shown in Listing [11-9](#PC9).
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以选择使用具有独立头部的共享网络或独立网络。CleanRL在`ppo.py`文件中实现了网络方法的分离，如列表[11-9](#PC9)所示。
- en: '[PRE8]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Running CleanRL PPO
  id: totrans-222
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 运行CleanRL PPO
- en: You saw PPO running in Chapter [8](502835_2_En_8_Chapter.xhtml). Refer to the
    `8.c-ppo_sb3.ipynb` notebook for running PPO on `CartPole`, to record videos,
    log training details to weights and biases, as well as ways to share trained agents
    using HuggingFace.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 您在第八章中看到了PPO的运行。请参考`8.c-ppo_sb3.ipynb`笔记本，以在`CartPole`上运行PPO，记录视频，将训练细节记录到权重和偏差中，以及使用HuggingFace共享训练代理的方法。
- en: Asynchronous PPO
  id: totrans-224
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 异步PPO
- en: 'A group of authors of a paper titled “Sample Factory: Egocentric 3D Control
    from Pixels at 100000 FPS with Asynchronous Reinforcement Learning”^([7](#Fn7))
    introduced a high-throughput training system with a focus on very efficient synchronous
    and asynchronous implementations of policy gradients (PPO). Figure [11-4](#Fig4)
    shows the schematic and the main components of the library.'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: '一篇题为“Sample Factory: Egocentric 3D Control from Pixels at 100000 FPS with Asynchronous
    Reinforcement Learning”的论文的作者群体介绍了一个高吞吐量训练系统，该系统专注于非常高效的策略梯度（PPO）的同步和异步实现。图[11-4](#Fig4)显示了库的示意图和主要组件。'
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig4_HTML.jpg)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig4_HTML.jpg)'
- en: An architecture for a sample factory has a sampler entity with rollout workers
    from 0 to N and inference workers, from 0 and 1\. They have a shared memory to
    send observations and receive action. The rollouts are sent to shared memory,
    batcher, learner, and shared G P U memory as parameters.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 样本工厂的架构包含一个采样实体，从0到N的 rollout 工作者和从0到1的推理工作者。他们有一个共享内存来发送观察结果和接收动作。rollouts被发送到共享内存、批处理器、学习者和共享
    GPU 内存作为参数。
- en: Figure 11-4
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-4
- en: Simple Factory library^([8](#Fn8))
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: Simple Factory库^([8](#Fn8))
- en: Sample Factory is based on the concept that RL training can be divided into
    several mostly separate components, each one dedicated to a specific task. This
    allows for a modular design, where these components can be sped up/parallelized
    separately, enabling you to reach the highest performance on any RL task. Components
    interact asynchronously by sending and receiving messages with components typically
    living on different event loops in different processes. Instead of explicitly
    sending the data between components (i.e., by serializing observations and sending
    them across processes), the library chooses to send the data through shared memory
    buffers. Each time a component needs to send data to another component, it writes
    the data to a shared memory buffer and sends a signal containing the buffer ID
    (essentially a pointer to data). This massively reduces the overhead of message
    passing.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: Sample Factory基于这样一个概念，即RL训练可以分成几个主要独立的组件，每个组件都专门用于一项特定任务。这允许进行模块化设计，其中这些组件可以分别加速/并行化，使您能够在任何RL任务上达到最高性能。组件通过发送和接收消息异步交互，这些消息通常在不同的进程中的不同事件循环上的组件之间传递。而不是在组件之间显式发送数据（即通过序列化观察结果并在进程间发送它们），库选择通过共享内存缓冲区发送数据。每次一个组件需要向另一个组件发送数据时，它将数据写入共享内存缓冲区，并发送一个包含缓冲区ID（本质上是指向数据的指针）的信号。这大大减少了消息传递的开销。
- en: 'Each component focuses on a particular task and can be viewed as a data processing
    engine (i.e., each component takes some input by getting signals, performs a computation,
    and sends out the results by producing its own signals). These are the main components
    of Sample Factory:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 每个组件专注于特定任务，可以被视为一个数据处理引擎（即每个组件通过获取信号获取一些输入，执行计算，并通过产生自己的信号发送结果）。这些是Sample Factory的主要组件：
- en: '**Rollout workers** simulate the environment. They take actions from the policy,
    perform the environment steps, generate observations after each step, and complete
    trajectories after `--rollout` steps.'
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Rollout workers** 模拟环境。他们从策略中获取动作，执行环境步骤，在每个步骤后生成观察结果，并在`--rollout`步骤后完成轨迹。'
- en: '**Inference workers** take in observations and hidden states and generate actions.
    The learner performs SGD steps and then updates the policy on each inference worker.'
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理工作者**接收观察结果和隐藏状态并生成动作。学习者执行 SGD 步骤，然后在每个推理工作者上更新策略。'
- en: '**Batcher** receives trajectories from the rollout workers, puts them together,
    and produces datasets of data for the learner.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Batcher**从rollout工作员接收轨迹，将它们组合起来，并为学习者生成数据集。'
- en: '**Learner** receives batches of data from the batcher, divides them into smaller
    batches, and performs Stochastic gradient descent for `--num_epochs` times. After
    each SGD step, it writes the new weights to shared memory buffers and sends the
    related signal to others.'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Learner**从batcher接收数据批次，将它们分成更小的批次，并执行`--num_epochs`次随机梯度下降。每次SGD步骤后，它将新的权重写入共享内存缓冲区，并发送相关信号给其他人。'
- en: '**Runner** bootstraps the whole system, receives all sorts of statistics from
    other components, and takes care of logging and summary writing.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Runner**负责启动整个系统，从其他组件接收各种统计数据，并负责日志记录和总结撰写。'
- en: '**Sampler**, despite being a separate component that can communicate with other
    signals, usually acts as a simple layer around rollout/inference workers and connects
    them to the rest of the system.'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Sampler**虽然是一个可以与其他信号通信的独立组件，但通常作为rollout/inference工作员周围的一个简单层，并将它们连接到系统的其余部分。'
- en: Interested readers can refer to the Sample Factory Documentation^([9](#Fn9))
    details for using this library. Listing [11-10](#PC10) shows a sample run.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 感兴趣的读者可以参考Sample Factory文档^([9](#Fn9))的详细信息，了解如何使用这个库。列表[11-10](#PC10)展示了示例运行。
- en: '[PRE9]'
  id: totrans-239
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: This completes the deep dive of PPO. In upcoming sections, you will look at
    the application of PPO in Large Language Models.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了PPO的深入研究。在接下来的章节中，您将看到PPO在大型语言模型中的应用。
- en: Large Language Models(**)
  id: totrans-241
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型语言模型(**)
- en: Having look ed PPO in detail, now you’ll see its latest use in making Large
    Language Models by following human prompts to carry out specific tasks. OpenAI
    demonstrated the use of RL with human feedback using PPO in a seminal paper in
    March 2022, titled “Training Language Models to Follow Instructions With Human
    Feedback”.^([10](#Fn10)) The current models deployed by OpenAI, ChatGPT-3.5, and
    ChatGPT-4 use this approach. Even all other models that follow a prompt—an instruction
    from a user to complete some tasks like summarizing a text, generate new content,
    identify themes, or extract information from text—use some form of fine-tuning
    to make these models follow these instructions. RLHF was the first technique that
    was successfully demonstrated by OpenAI and still continues to be a very popular
    approach for fine-tuning models to make these models follow instructions.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 详细了解了PPO之后，现在您将看到它通过遵循人类提示执行特定任务来制作大型语言模型的最新应用。OpenAI在2022年3月发表了一篇开创性的论文，题为“通过人类反馈训练语言模型以遵循指令”，展示了使用PPO结合人类反馈进行RL的应用。目前OpenAI部署的模型，ChatGPT-3.5和ChatGPT-4都采用了这种方法。甚至所有遵循提示——用户的指令以完成某些任务，如总结文本、生成新内容、识别主题或从文本中提取信息——的模型都使用某种形式的微调来使这些模型遵循这些指令。RLHF是OpenAI首次成功演示的技术，并且仍然是微调模型以使这些模型遵循指令的非常流行的方法。
- en: Before diving into the details of this paper and the approach of RLHF, I quickly
    recap Large Language Models. I also discuss various emerging trends in the world
    of LLMs. Most of the information in this section is orthogonal to understanding
    RLHF. Therefore, this section is optional and readers with prior knowledge of
    LLMs or wanting to jump right into RLHF may skip this section on LLMs.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨这篇论文的细节和RLHF方法之前，我简要回顾了大型语言模型。我还讨论了LLM领域的各种新兴趋势。本节的大部分信息与理解RLHF无关。因此，本节是可选的，对LLMs有先知或想直接进入RLHF的读者可以跳过LLMs这一节。
- en: A language model is a system that can learn the statistical patterns of natural
    language and generate text that resembles the input data. Language models have
    many applications, such as speech recognition, machine translation, text summarization,
    question answering, and conversational agents. However, most traditional language
    models are limited by the size of their vocabulary and the length of their input
    and output sequences. They also rely on supervised learning, which requires large
    amounts of labeled data for each specific task.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型是一个可以学习自然语言统计模式并生成与输入数据相似文本的系统。语言模型有许多应用，如语音识别、机器翻译、文本摘要、问答和对话代理。然而，大多数传统语言模型受限于其词汇表的大小和输入输出序列的长度。它们还依赖于监督学习，这需要为每个特定任务提供大量标记数据。
- en: Large Language Models are a new paradigm in natural language processing, where
    a single model is trained on a massive amount of unlabeled text data from diverse
    domains and sources, such as books, websites, news articles, social media posts,
    and more. These models can achieve impressive performance on various natural language
    tasks, even without any fine-tuning on task-specific data, by simply using the
    text itself as supervision. Large Language Models can also generate coherent and
    fluent text across different genres and styles, demonstrating a high level of
    generalization and creativity.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型是自然语言处理领域的一种新范式，其中单个模型在来自不同领域和来源的大量未标记文本数据上训练，例如书籍、网站、新闻文章、社交媒体帖子等。这些模型可以通过简单地使用文本本身作为监督，在无需对特定任务数据进行微调的情况下，在各种自然语言任务上实现令人印象深刻的性能。大型语言模型还可以生成不同体裁和风格的连贯流畅文本，展示了高水平的一般化和创造力。
- en: One of the key innovations that enabled the development of Large Language Models
    is the Transformer architecture, which was introduced in a paper “Attention Is
    All You Need” by Vaswani et al. (2017).^([11](#Fn11)) The Transformer architecture
    introduced a novel approach to handling sequential data, moving away from the
    limitations of previous models like recurrent neural networks (RNNs) and long
    short-term memory (LSTM) networks. It achieved this with self-attention mechanisms,
    which allow the model to weigh the importance of different parts of the input
    data differently. This innovation enabled the Transformer to process all parts
    of the input data in parallel, significantly improving efficiency and effectiveness
    in handling long-range dependencies in text.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 使得大型语言模型的发展成为可能的关键创新之一是Transformer架构，该架构由Vaswani等人（2017）在论文“Attention Is All
    You Need”中引入。[11](#Fn11) Transformer架构引入了一种处理序列数据的新方法，摆脱了先前模型（如循环神经网络（RNNs）和长短期记忆（LSTM）网络）的限制。它通过自注意力机制实现了这一点，允许模型根据输入数据的不同部分的重要性进行不同的加权。这一创新使得Transformer能够并行处理输入数据的所有部分，显著提高了处理文本中长距离依赖关系的效率和效果。
- en: The Transformer is based on the concept of attention, which allows the model
    to focus on the most relevant parts of the input and output sequences, regardless
    of their length or position. The Transformer also uses a self-attention mechanism,
    which enables the model to learn the dependencies and relations among the words
    in a sequence. The Transformer consists of two main components—an encoder, which
    encodes the input sequence into a latent representation, and a decoder, which
    generates the output sequence from the latent representation. Figure [11-5](#Fig5)
    shows the schematic of the Transformer model proposed in the paper.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer基于注意力的概念，允许模型关注输入和输出序列中最相关的部分，无论它们的长度或位置如何。Transformer还使用自注意力机制，这使得模型能够学习序列中单词之间的依赖关系和关系。Transformer由两个主要组件组成——一个编码器，它将输入序列编码为潜在表示，一个解码器，它从潜在表示生成输出序列。图[11-5](#Fig5)显示了论文中提出的Transformer模型的示意图。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig5_HTML.jpg)'
  id: totrans-248
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig5_HTML.jpg)'
- en: A model diagram has 2 N x blocks. The left block has inputs with input embedding,
    multi-head attention, and feed-forward with add and norm. The right block has
    outputs with output embedding, masked and multi-head attention, and feed-forward
    with add and norm, linear, softmax, and output.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 模型图包含2N个块。左侧块包含具有输入嵌入、多头注意力和带有加法和归一化的前馈的输入。右侧块包含具有输出嵌入、掩码和多头注意力以及带有加法和归一化、线性、softmax和输出的输出。
- en: Figure 11-5
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-5
- en: Transformer model^([12](#Fn12))
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer模型^([12](#Fn12))
- en: The Transformer architecture was further extended in a paper titled “Improving
    Language Understanding by Generative Pre-Training” by Radford et al. (2018),^([13](#Fn13))
    who proposed the Generative Pretrained Transformer (GPT) model. GPT is a variant
    of the Transformer that only uses the decoder component and is trained as an autoregressive
    language model, which means that it predicts the next word in a sequence given
    the previous words. GPT is pretrained on a large corpus of text using the objective
    of masked language modeling, where some of the words in the input sequence are
    randomly replaced with a special token and the model has to recover the original
    words. This way, the model can learn the general patterns and structures of natural
    language from the data.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 在Radford等人（2018年）的论文《Improving Language Understanding by Generative Pre-Training》中，Transformer架构进一步得到了扩展，该论文标题为“通过生成预训练改进语言理解”，^([13](#Fn13))
    他们提出了生成预训练Transformer (GPT) 模型。GPT是Transformer的一个变体，它只使用解码器组件，并作为自回归语言模型进行训练，这意味着它根据前面的单词预测序列中的下一个单词。GPT使用掩码语言模型的目标在大规模文本语料库上进行预训练，其中输入序列中的某些单词被随机替换为特殊标记，模型必须恢复原始单词。这样，模型可以从数据中学习自然语言的通用模式和结构。
- en: However, GPT still faced some limitations, such as the fixed size of its vocabulary
    and the difficulty of scaling up to larger models and datasets. These challenges
    were addressed in a paper titled “Language Models Are Unsupervised Multitask Learners”
    by Radford et al. (2019),^([14](#Fn14)) who introduced the GPT-2 model, which
    was an order of magnitude larger than GPT in terms of parameters and data. GPT-2
    used a sub-word tokenization method, which allowed it to handle a larger and more
    diverse vocabulary, as well as a more efficient training algorithm, which reduced
    the computational cost and memory usage. GPT-2 was able to generate high-quality
    text on various topics and domains, without any task-specific fine-tuning or data,
    showing remarkable generalization and versatility.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，GPT仍然面临一些限制，例如其词汇表的固定大小以及扩展到更大模型和数据集的困难。这些问题在Radford等人（2019年）的论文《Language
    Models Are Unsupervised Multitask Learners》中得到了解决，该论文标题为“语言模型是无监督多任务学习者”，^([14](#Fn14))
    他们介绍了GPT-2模型，其参数和数据比GPT大一个数量级。GPT-2使用子词标记化方法，这使得它能够处理更大、更多样化的词汇表，以及更有效的训练算法，这降低了计算成本和内存使用。GPT-2能够在各种主题和领域生成高质量的文本，而无需任何特定任务的微调或数据，展示了显著的一般化和多功能性。
- en: The GPT-2 model was further scaled up as discussed in a paper titled “Language
    Models Are Few-Shot Learners” by Brown et al. (2020),^([15](#Fn15)) who presented
    the GPT-3 model, which was the largest language model at the time of its publication,
    with 175 billion parameters and 45 terabytes of text data. GPT-3 achieved state-of-the-art
    results on several natural language benchmarks, such as natural language understanding,
    natural language generation, and commonsense reasoning, surpassing the performance
    of many specialized models that were fine-tuned on task-specific data. GPT-3 also
    demonstrated the ability to perform few-shot learning, where the model could adapt
    to a new task by simply providing a few examples of the desired input and output
    in the query, without any explicit fine-tuning or data. This is known as *prompting*
    or *prompt engineering*.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 如布朗等人（2020年）在论文《Language Models Are Few-Shot Learners》中所述，GPT-2模型进一步进行了扩展，该论文标题为“语言模型是少样本学习者”，^([15](#Fn15))
    他们介绍了GPT-3模型，这是当时发表时最大的语言模型，拥有1750亿个参数和45太字节文本数据。GPT-3在多个自然语言基准测试中取得了最先进的成果，如自然语言理解、自然语言生成和常识推理，超过了在特定数据上微调的许多专业模型的表现。GPT-3还展示了执行少样本学习的能力，即模型可以通过简单地提供查询中几个期望输入和输出的示例来适应新任务，而不需要进行任何显式的微调或数据。这被称为
    *提示* 或 *提示工程*。
- en: This scale-up to very large sizes eventually led to these models being referred
    to as *Large Language Models* (LLMs) or also as *Foundation Models*. The term
    reflects not just their physical size in terms of parameters but also their extensive
    understanding of language and the capability to perform a wide range of NLP tasks
    with little to no task-specific training.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 这种规模扩展到非常大的模型最终导致这些模型被称为 *大型语言模型* (LLMs) 或也称为 *基础模型*。这个术语不仅反映了它们在参数方面的物理大小，还反映了它们对语言的广泛理解以及执行各种自然语言处理任务的能力，这些任务几乎不需要特定任务的训练。
- en: The GPT series of models belong to a broader class of AI models, known as generative
    models, which aim to learn the underlying distribution of the data and generate
    new samples from it, mimicking the training data. Generative models have many
    applications beyond natural language processing, such as computer vision, audio
    synthesis, and even code. Generative models can also be used for data augmentation,
    anomaly detection, domain adaptation, and more. Some of the common types of generative
    models are variational autoencoders, generative adversarial networks, and autoregressive
    models, such as GPT. A schematic of autoregressive training for Large Language
    Models is shown in Figure [11-6](#Fig6). In autoregressive training, the input
    text itself acts as the model output and there is no manual step of human-generated
    labels. The input sequence of words shifted by one place is used as the label/output
    sequence. This way, the LLM is trained to predict the next word in the sequence
    given the sequence of words so far in the sentence. Using this approach, a very
    large model is trained on a very large corpus of text, almost close to 2-6 trillion
    word tokens. In a nutshell, this is what LLMs are all about.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: GPT系列模型属于一个更广泛的AI模型类别，称为生成模型，其目标是学习数据的潜在分布并从中生成新的样本，模仿训练数据。生成模型在自然语言处理之外有许多应用，例如计算机视觉、音频合成，甚至代码。生成模型还可以用于数据增强、异常检测、领域适应等。一些常见的生成模型类型包括变分自编码器、生成对抗网络和自回归模型，如GPT。大型语言模型的自回归训练示意图如图[11-6](#Fig6)所示。在自回归训练中，输入文本本身充当模型输出，没有手动步骤生成人类标签。将单词序列向右移动一个位置用作标签/输出序列。这样，LLM就被训练去预测句子中迄今为止的单词序列之后的下一个单词。使用这种方法，一个非常大的模型在几乎接近2-6万亿个单词标记的大语料库上进行了训练。简而言之，这就是LLMs的全部内容。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig6_HTML.jpg)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig6_HTML.jpg)'
- en: An auto-regressive model diagram has a set of words in rectangles over and under
    it that are mapped. It points at is. It, is points at a. It, is, a point at bright.
    It, is, a, bright point at day. It, is, a, bright, day point at e o s within angle
    brackets.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 自回归模型图在其上方和下方有映射的一组单词，这些单词位于矩形中。它指向is。它是，指向a。它是，是一个指向bright。它是，是一个，一个指向day。它是，是一个，一个，一个指向e
    o s在括号内。
- en: Figure 11-6
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-6
- en: Autoregressive style of training
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 自回归训练风格
- en: However, in its raw form when trained in an autoregressive way only, LLMs can
    complete a sentence or text but they cannot efficiently follow additional instructions
    given to the model. RLHF is the process by which a raw trained (pretrained) LLM
    is further trained to produce output preferred by humans that can follow human
    instructions much more effectively.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在仅以自回归方式训练的原始形式中，LLMs可以完成句子或文本，但它们不能有效地遵循模型给出的额外指令。RLHF是通过进一步训练原始训练（预训练）的LLM来产生人类更喜欢的输出，使其能够更有效地遵循人类指令的过程。
- en: Currently, the pace of release of newer fine-tuned LLMs for different tasks
    and domains is exponentially increasing. Hardly a week goes by when there is a
    new announcement of a new model or technique that makes LLMs even more powerful.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，针对不同任务和领域的更新微调LLMs的发布速度呈指数级增长。几乎每周都有新的模型或技术宣布，使LLMs变得更加强大。
- en: This ability of models to follow human instructions (also called “prompts”)
    has made these models powerful and given rise to a new area of expertise, called
    *prompt engineering*. Researchers are spending countless hours refining the way
    prompts are generated. You will learn about a few popular approaches but I will
    not go into the detail, as the focus in this chapter is at an introductory level.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 模型能够遵循人类指令（也称为“提示”）的能力（也称为“prompts”）使这些模型变得强大，并催生了一个新的专业领域，称为*提示工程*。研究人员正在花费无数小时来完善提示生成的方式。你将了解一些流行的方法，但在此章节中，我将不会深入细节，因为重点在于介绍性水平。
- en: Prompt Engineering
  id: totrans-264
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示工程
- en: Due to the effectiveness of LLMs’s ability to follow instructions/prompts and
    carry out various NLP tasks, prompt engineering has become a new discipline when
    it comes to LLMs. Some experts in the AI field have gone to the extent to say
    that the English language is the new programming language. The same LLM can produce
    outputs from very poor quality to extremely high and relevant quality based purely
    on prompts. Prompts are natural language instructions or questions that specify
    the task, the input, the output format, and sometimes additional information or
    hints for the LLM. Prompt engineering aims to leverage the general knowledge and
    capabilities of LLMs without requiring any or minimal fine-tuning on task-specific
    data.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if you want to use an LLM to perform sentiment analysis on a given
    sentence, you can use different types of prompts, such as the following:'
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: Classify the sentiment of the sentence "I love this movie" as positive, negative,
    or neutral.
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How does the speaker feel about the movie? Happy, sad, or indifferent?
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sentence: I love this movie'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sentiment: [MASK]'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The quality and effectiveness of the prompts may vary depending on the LLM,
    the task, the input, and the output. Prompt engineering involves experimenting
    with different prompt styles, formats, and structures to find the optimal one
    that maximizes the performance and accuracy of the LLM. A prompt contains any
    of the following elements:'
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: 'Instruction: The description of the task that the model is being asked to do.'
  id: totrans-272
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Context: The external information or additional context to help the model produce
    more accurate/relevant responses.'
  id: totrans-273
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Input data: The actual question or task that you are asking the model to complete.'
  id: totrans-274
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output format: The type or format of the output.'
  id: totrans-275
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Prompting Techniques
  id: totrans-276
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using this structure, there are various ways to guide the LLMs to provide the
    desired type of output for a given task. It is a rapidly changing area with newer
    techniques emerging on a daily basis. This section visits some of the more popular
    approaches being practiced at the time of writing this book.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: '*Zero-shot prompting* is the simplest type, where you produce instructions
    and input data only. There is no additional context or guidance. An example of
    zero-shot prompting would be:'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
- en: '““”Instruction: Classify the sentiment of the sentence as positive or negative:'
  id: totrans-279
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sentence: I love this movie'
  id: totrans-280
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sentiment:'
  id: totrans-281
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ”””
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model will get these three lines of input and it will complete it with either
    “positive” or “negative” based on the sentence. In this specific case, you expect
    the LLM response to be “positive” as “I love this movie” is a sentence that signifies
    a positive sentiment.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: '*Few-shot prompting* is also called *in-context learning*. With this approach,
    additional context in the form of examples is provided to the model. In the case
    of the sentiment classifier, you could provide the following examples that show
    the mapping of sample sentences to the sentiment these signify. An example prompt
    using this approach would look like this:'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: '*少样本提示*也称为*上下文学习*。使用这种方法，向模型提供额外的上下文，形式为示例。在情感分类器的例子中，你可以提供以下示例，展示样本句子到这些句子所表示的情感的映射。使用这种方法的一个示例提示如下：'
- en: '““”Instruction: Classify the sentiment of the sentence as positive or negative:'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ““”指令：将句子的情感分类为正面或负面：
- en: 'Context: Move was worth the money // positive'
  id: totrans-286
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文：这笔钱花得值 // positive
- en: What a waste of the time // negative
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: What a waste of the time // negative
- en: Though slow at times, it is still worth a watch // positive
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 虽然有时很慢，但仍然值得一看 // positive
- en: 'Sentence: I love this movie'
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 句子：我喜欢这部电影
- en: 'Sentiment:'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 情感：
- en: ”””
  id: totrans-291
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ”””
- en: We have expanded the prompt by providing three examples of “sentence -> sentiment”.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过提供“句子 -> 情感”的三个示例来扩展提示。
- en: 'The next one is *chain of thought prompting*. It came from the Google team
    early in 2022, in a paper titled “Chain-of-Thought Prompting Elicits Reasoning
    in Large Language Models.”^([16](#Fn16)) It is a very simple idea but one with
    a lot of power packed in it. The idea adds intermediate steps of reasoning, leading
    to a final solution for each of the few-shot examples and then asks the model
    to solve another user-defined problem. The LLM uses the patterns of examples to
    complete the prompt by giving the intermediate reasoning steps and a final answer
    for the unsolved problem. The paper shows that such an approach increases the
    correctness of the answer significantly over the naïve few-shot approach. An example
    is as follows:'
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个例子是**思维链提示**。它来自2022年初的谷歌团队，在一篇题为“Chain-of-Thought Prompting Elicits Reasoning
    in Large Language Models.”的论文中。这是一个非常简单但蕴含着强大力量的想法。该想法增加了推理的中间步骤，为每个少样本示例得出最终解决方案，然后要求模型解决另一个用户定义的问题。LLM使用示例的模式，通过提供中间推理步骤和未解决的问题的最终答案来完成提示。论文显示，这种方法与简单的少样本方法相比，显著提高了答案的正确性。以下是一个例子：
- en: “““
  id: totrans-294
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “““
- en: 'The odd numbers in this group add up to an even number: 4, 8, 9, 15, 12, 2,
    1.'
  id: totrans-295
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这组中的奇数相加得到一个偶数：4, 8, 9, 15, 12, 2, 1。
- en: 'A: Adding all the odd numbers (9, 15, 1) gives 25\. The answer is False.'
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A: 将所有奇数（9, 15, 1）相加得到25。答案是错误的。'
- en: 'The odd numbers in this group add up to an even number: 15, 32, 5, 13, 82,
    7, 1.'
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这组中的奇数相加得到一个偶数：15, 32, 5, 13, 82, 7, 1。
- en: 'A:'
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'A:'
- en: ”””
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ”””
- en: Another example from the paper is shown in Figure [11-7](#Fig7).
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 论文中另一个例子如图 [11-7](#Fig7) 所示。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig7_HTML.jpg)'
  id: totrans-301
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig7_HTML.jpg)'
- en: 2 types of prompting. Standard prompting. It has a model input with two questions
    and an answer. A model output has the answer indicated by a wrong sign. Chain-of-thought
    prompting. It has a model input with 2 questions and an answer. A model output
    has the answer indicated by a tick sign.
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 2种提示类型。标准提示。它有一个包含两个问题和答案的模型输入。模型输出有一个错误符号指示的答案。思维链提示。它有一个包含两个问题和答案的模型输入。模型输出有一个正确符号指示的答案。
- en: Figure 11-7
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-7
- en: 'Chain of thought (CoT) promptingSource: CoT paper^([17](#Fn17))'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 思维链（CoT）提示来源：CoT论文^([17](#Fn17))
- en: 'After this paper came out, there was an explosive growth in the number of papers
    extending the original CoT idea with different variants/enhancements. Some examples
    are as follows:'
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇论文发表之后，扩展原始CoT想法的论文数量急剧增长，这些论文采用了不同的变体/增强。以下是一些例子：
- en: '**Self-consistency improvement to CoT**: Use of multiple CoT passes with majority
    voting.'
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对CoT的自我一致性改进**：使用多个CoT遍历并采用多数投票。'
- en: '**Zero-shot chain-of-thought**: Involves adding "Let’s think step by step"
    to the original prompt. An example prompt is:'
  id: totrans-307
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零样本思维链**：涉及在原始提示中添加“让我们一步步思考”。一个示例提示如下：'
- en: “””
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: “””
- en: 'Q: A juggler can juggle 16 balls. Half of the balls are golf balls,'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 'Q: 一个杂技演员可以抛16个球。其中一半是高尔夫球，'
- en: and half of the golf balls are blue. How many blue golf balls are
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 和一半的高尔夫球是蓝色的。有多少个蓝色的高尔夫球
- en: there?
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: there?
- en: 'A: Let’s think step by step.'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 'A: 让我们一步步思考。'
- en: “””
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: “””
- en: '**Automatic chain-of-thought**: The original CoT requires hand-crafted examples
    which the zero-shot CoT tried to eliminate by replacing the examples with the
    instructions “Let’s us think step by step”. However, it can still produce errors.
    Auto-CoT^([18](#Fn18)) uses an automated way to select diverse examples that help
    increase the guidance to the LLM in the form of additional context.'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动思维链**：原始的CoT需要手工制作的示例，而零样本CoT试图通过用指令“让我们一步步思考”来替换示例来消除这些示例。然而，它仍然可能产生错误。Auto-CoT^([18](#Fn18))使用自动方式选择多样化的示例，这有助于增加LLM的指导，形式为额外的上下文。'
- en: '**Many more**: There are many more approaches. At the time of writing this
    book, I counted an additional 20+ variations and improvements to the CoT approach.'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更多方法**：还有更多方法。在撰写本书时，我统计了CoT方法的20+种额外变化和改进。'
- en: Having discussed CoT, the next section looks at yet another very popular approach,
    known as *Retrieval Augmented Generation* (RAG).
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论了CoT之后，下一节将探讨另一种非常流行的方法，称为*检索增强生成*（RAG）。
- en: RAG and Chat Bots
  id: totrans-317
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG和聊天机器人
- en: 'Retrieval Augmented Generation (RAG) was introduced by Meta in 2020^([19](#Fn19))
    before the emergence of LLMs. This approach can be applied to LLMs for tasks involving
    specific external knowledge such as Wikipedia or other large corpora, to enhance
    the generation of text by LLMs. For example, to generate a biography of a person,
    you can use a RAG prompt like this:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 2020年，Meta在LLM出现之前引入了检索增强生成（RAG）。这种方法可以应用于涉及特定外部知识（如维基百科或其他大型语料库）的LLM任务，以增强LLM的文本生成。例如，要生成一个人的传记，可以使用如下RAG提示：
- en: Retrieve relevant information about the person from Wikipedia or other sources.
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从维基百科或其他来源检索有关该人的相关信息。
- en: Use the retrieved information to write a coherent and informative biography
    that covers the person’s life, achievements, and legacy.
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用检索到的信息撰写一篇连贯且信息丰富的传记，涵盖该人的生平、成就和遗产。
- en: The RAG approach consists of two main components—a retriever and a generator.
    The retriever is responsible for finding the most relevant documents or passages
    from the external knowledge sources given a query or a partial generation. The
    generator is a LLM that takes the retrieved information as context and produces
    the final text output.
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: RAG方法由两个主要组件组成——检索器和生成器。检索器负责根据查询或部分生成找到最相关的文档或段落。生成器是一个LLM，它将检索到的信息作为上下文并生成最终的文本输出。
- en: The RAG approach can improve the quality, diversity, and specificity of the
    generated text, especially for tasks that require factual or domain-specific knowledge.
    However, it also introduces some challenges, such as how to select the best sources
    of knowledge, how to deal with noisy or incomplete information, and how to ensure
    the consistency and coherence of the generated text.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: RAG方法可以提高生成文本的质量、多样性和特异性，尤其是在需要事实或领域特定知识的任务中。然而，它也引入了一些挑战，例如如何选择最佳的知识来源，如何处理噪声或不完整的信息，以及如何确保生成文本的一致性和连贯性。
- en: An example RAG schematic from LangChain—a library that helps manage complex
    multi-step complex and dynamic prompt driven LLM interactions—is shown in Figure
    [11-8](#Fig8).
  id: totrans-323
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-8](#Fig8)展示了LangChain库中的一个RAG示例图，LangChain是一个帮助管理复杂多步骤、动态提示驱动的LLM交互的库。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig8_HTML.jpg)'
  id: totrans-324
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig8_HTML.jpg)'
- en: A flow diagram has a question that undergoes query transformation, routing construction,
    and documents in a multi-modal or semi-structured index. The documents are sent
    to the vector store and relational and graph databases and are sent for post-processing.
  id: totrans-325
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图有一个问题，它经过查询转换、路由构建，并在多模态或半结构化索引中的文档。文档被发送到向量存储和关系型数据库以及图数据库，并用于后续处理。
- en: Figure 11-8
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-8
- en: 'RAG pipelineSource: LangChain library blog^([20](#Fn20))'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: RAG管道来源：LangChain库博客^([20](#Fn20))
- en: 'RAG and LLMs are increasingly being used to power chatbots that provide customer
    service or answer specific queries. If you use Bing or Google search today, apart
    from the links, you also see a well-crafted responses at the top of the page.
    This is an example of RAG-driven search and response. It can also be used to provide
    customer service, answer internal employee queries about HR policies, and so on.
    Let’s walk through an example of customer query asking about some product details.
    The complete interaction between the customer and chatbot can be broken into the
    following steps:'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: RAG和LLMs（Large Language Models）越来越多地被用于驱动聊天机器人，提供客户服务或回答特定查询。如果你今天使用Bing或Google搜索，除了链接外，你还会在页面顶部看到精心制作的响应。这是一个RAG驱动的搜索和响应的例子。它也可以用于提供客户服务，回答关于人力资源政策的内部员工查询等。让我们通过一个询问产品详细信息的客户查询的例子来了解一下。客户与聊天机器人的完整交互可以分为以下步骤：
- en: Receive the customer query and analyze its intent and domain. For example, if
    the customer asks about the features of a product, the intent is information seeking
    and the domain is the product category.
  id: totrans-329
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接收客户查询并分析其意图和领域。例如，如果客户询问产品的功能，意图是信息搜索，领域是产品类别。
- en: Retrieve relevant documents or passages from a large-scale knowledge source,
    such as Wikipedia or a product database, using RAG. RAG uses a neural retriever
    to find the most similar documents to the query, and a neural generator to reran
    them based on their usefulness for answering the query. A very popular approach
    right now is to use cosine similarity between the LLM-based embeddings of knowledgebase
    items and the LLM base embedding of the query.
  id: totrans-330
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用RAG（Retrieval-Augmented Generation）从大规模知识源，如维基百科或产品数据库中检索相关文档或段落。RAG使用一个神经检索器来找到与查询最相似的文档，并使用一个神经生成器根据它们对回答查询的有用性重新生成它们。目前一个非常流行的做法是使用基于LLM（Large
    Language Model）的知识库项嵌入和查询的LLM基嵌入之间的余弦相似度。
- en: Generate a natural language response to the customer query using the retrieved
    documents as additional context for the LLM. The LLM can use the documents to
    provide factual or domain-specific information, as well as to personalize the
    response based on the customer profile or preferences.
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用检索到的文档作为LLM的额外上下文，生成针对客户查询的自然语言响应。LLM可以使用文档提供事实或领域特定的信息，并根据客户档案或偏好个性化响应。
- en: Evaluate the quality and relevance of the generated response using metrics such
    as ROUGE, BLEU, or human feedback. If the response is satisfactory, send it to
    the customer. If not, repeat the previous steps with a different set of documents
    or a different LLM model.
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用ROUGE、BLEU或人工反馈等指标评估生成的响应的质量和相关性。如果响应令人满意，将其发送给客户。如果不满意，则使用不同的一组文档或不同的LLM模型重复之前的步骤。
- en: The chatbots also have a way to handle multi-turn chats between the system and
    user, wherein the previous query from the user and the response from the system
    are maintained as a list of past interactions and added to the context at each
    turn of interaction with the system.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天机器人也有处理系统与用户之间多轮对话的方法，其中用户之前的查询和系统的响应被维护为一个过去交互的列表，并在与系统的每次交互回合中添加到上下文中。
- en: LLMs as Operating Systems
  id: totrans-334
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM作为操作系统
- en: All these approaches have taken the LLM use to a level across such diverse sets
    of tasks that LLMs are now being called *new age CPUs*. Check out the very informative
    talk by Andrej Karpathy, one of the top voices and experts when it comes to AI.^([21](#Fn21))
    Figure [11-9](#Fig9) shows a slide from Andrej’s talk that propositions that LLMs
    are going to be the new operating systems.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些方法都将LLM的使用提升到了如此多样化的任务集合中，以至于LLMs现在被称为“新时代的CPU”。查看Andrej Karpathy的非常信息丰富的演讲，他是AI领域顶级声音和专家之一。[^([21](#Fn21))]
    图[11-9](#Fig9)展示了Andrej演讲中的一个幻灯片，提出了LLMs将成为新的操作系统的观点。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig9_HTML.jpg)'
  id: totrans-336
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig9_HTML.jpg)'
- en: An L L M operating system has an L L M context window in the R A M in the C
    P U, that is accessed by the calculator, python interpreter terminal, file system
    in the disk, ethernet browser, video and audio peripheral devices, and other L
    L Ms. 10 uses of the future L L Ms are listed below.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 一个LLM操作系统在CPU的RAM中有一个LLM上下文窗口，该窗口被计算器、Python解释器终端、磁盘中的文件系统、以太网浏览器、视频和音频外围设备以及其他LLMs访问。以下是未来LLMs的10种用途。
- en: Figure 11-9
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-9
- en: 'LLMs as operating systems Source: Andrej Karpathy talk'
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: LLM作为操作系统 来源：Andrej Karpathy演讲
- en: Fine-Tuning
  id: totrans-340
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 微调
- en: LLM fine-tuning involves modifying the parameters of a pretrained LLM to make
    it more suitable for a specific downstream task. Unlike prompt engineering, which
    relies on using natural language or special tokens as inputs and outputs, fine-tuning
    modifies the internal weights of the LLM to optimize its performance on the task.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: LLM微调涉及修改预训练LLM的参数，使其更适合特定下游任务。与依赖于使用自然语言或特殊标记作为输入和输出的提示工程不同，微调修改LLM的内部权重以优化其在任务上的性能。
- en: 'Fine-tuning is required when the task-specific data is very different from
    the general domain data that the LLM was trained on, or when the task requires
    a high level of accuracy and robustness that cannot be achieved by prompt engineering
    alone. For example, if the task is to classify legal documents or generate biomedical
    summaries, the LLM may not have enough knowledge or linguistic skills to handle
    these domains and tasks without fine-tuning. Furthermore, some tasks may have
    complex output formats or evaluation metrics that are difficult to implement with
    prompt engineering, such as machine translation or question answering. The process
    of fine-tuning LLMs can be broken into the following high-level steps:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 当特定任务数据与LLM训练的通用领域数据非常不同时，或者当任务需要通过提示工程无法实现的高水平准确性和鲁棒性时，需要进行微调。例如，如果任务是分类法律文件或生成生物医学摘要，LLM可能没有足够的知识或语言技能来处理这些领域和任务，除非进行微调。此外，某些任务可能具有复杂的输出格式或难以用提示工程实现的评估指标，例如机器翻译或问答。微调LLM的过程可以分解为以下高级步骤：
- en: Select a pretrained LLM that is suitable for the task and the data. For example,
    if the task is related to natural language understanding, a masked language model
    like BERT may be a good choice. If the task is related to natural language generation,
    an autoregressive model like GPT may be a better option.
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个适合任务和数据的预训练LLM。例如，如果任务是关于自然语言理解，那么像BERT这样的掩码语言模型可能是一个不错的选择。如果任务是关于自然语言生成，那么像GPT这样的自回归模型可能是一个更好的选择。
- en: Define a task-specific architecture that includes an input layer, an output
    layer, and optionally some intermediate layers that connect the LLM with the input
    and output. The input layer should match the format and vocabulary of the LLM,
    and the output layer should match the format and vocabulary of the task. The intermediate
    layers can be used to transform or enhance the representations from the LLM, such
    as adding attention, pooling, or classification layers.
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义一个特定任务的架构，该架构包括一个输入层、一个输出层，以及可选的中间层，这些中间层将LLM与输入和输出连接起来。输入层应与LLM的格式和词汇匹配，输出层应与任务的格式和词汇匹配。中间层可以用来转换或增强LLM中的表示，例如添加注意力、池化或分类层。
- en: Prepare a task-specific dataset that consists of input-output pairs that represent
    the examples and labels of the task. The dataset should be split into training,
    validation, and test sets, and should be balanced and representative of the task
    domain and difficulty.
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备一个特定任务的dataset，该dataset包含表示任务示例和标签的输入-输出对。该dataset应分为训练集、验证集和测试集，并且应平衡且能代表任务领域和难度。
- en: Fine-tune the LLM and the task-specific layers on the training set using a suitable
    optimization algorithm, such as stochastic gradient descent or Adam. The objective
    function should be defined according to the task, such as cross-entropy loss for
    classification or generation or mean squared error for regression. The learning
    rate, batch size, number of epochs, and other hyperparameters should be tuned
    to optimize the performance on the validation set and avoid overfitting or underfitting.
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用合适的优化算法，如随机梯度下降或Adam，在训练集上微调LLM和特定任务的层。目标函数应根据任务定义，例如，对于分类或生成任务使用交叉熵损失，对于回归任务使用均方误差。学习率、批量大小、训练轮数和其他超参数应调整以优化验证集上的性能并避免过拟合或欠拟合。
- en: Evaluate the fine-tuned model on the test set using appropriate metrics, such
    as accuracy, precision, recall, F1-score, BLEU, ROUGE, or METEOR. The results
    should be compared with the baseline models or the state-of-the-art methods to
    assess the effectiveness of the fine-tuning technique.
  id: totrans-347
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用适当的指标，如准确率、精确率、召回率、F1分数、BLEU、ROUGE或METEOR，在测试集上评估微调模型。结果应与基线模型或最先进的方法进行比较，以评估微调技术的有效性。
- en: Fine-tuning LLMs has its own challenges. The first one is *data scarcity*. There
    may not be enough task-specific data to fine-tune the LLM effectively, especially
    for low-resource languages or domains. This may lead to poor generalization or
    catastrophic forgetting of the LLM’s general knowledge. Some techniques to address
    this challenge are data augmentation, transfer learning, multi-task learning,
    or meta-learning, which can increase the diversity and quantity of the data, leverage
    the knowledge from related tasks or domains, or adapt the model to new tasks quickly
    and efficiently.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 微调LLMs有其自身的挑战。第一个挑战是**数据稀缺**。可能没有足够特定任务的数据来有效地微调LLM，尤其是在低资源语言或领域。这可能会导致泛化能力差或LLM的通用知识发生灾难性遗忘。解决这一挑战的一些技术包括数据增强、迁移学习、多任务学习或元学习，这些技术可以增加数据的多样性和数量，利用相关任务或领域的知识，或快速有效地将模型适应新任务。
- en: The second challenge is that of *data noise*. The task-specific data may contain
    errors, inconsistencies, or ambiguities that may affect the quality and reliability
    of the fine-tuning process. This may lead to incorrect or misleading outputs or
    reduced robustness of the model. Some techniques to address this challenge are
    data cleaning, data filtering, data validation, or data quality assessment, which
    can remove or correct the noisy data, select or prioritize the high-quality data,
    or monitor and evaluate the data quality throughout the fine-tuning process.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 第二大挑战是**数据噪声**。特定任务的数据可能包含错误、不一致性或歧义，这可能会影响微调过程的质量和可靠性。这可能会导致输出错误或误导，或者降低模型的鲁棒性。解决这一挑战的一些技术包括数据清洗、数据过滤、数据验证或数据质量评估，这些技术可以移除或纠正噪声数据，选择或优先处理高质量数据，或在微调过程中监控和评估数据质量。
- en: The third challenge is that of *model complexity*. The LLMs have a large number
    of parameters that are difficult to fine-tune on limited computational resources
    or within a reasonable time. This may limit the scalability or feasibility of
    the fine-tuning technique. Some techniques to address this challenge are model
    compression, model pruning, model distillation, and model quantization, which
    can reduce the size or complexity of the model, remove or simplify the redundant
    or irrelevant parameters, or approximate the model with a smaller or faster one.
    You will investigate one of the approaches in the next section, called Parameter
    Efficient Fine Tuning (PEFT).
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 第三大挑战是**模型复杂性**。大型语言模型（LLMs）拥有大量参数，在有限的计算资源或合理的时间内难以进行微调。这可能会限制微调技术的可扩展性或可行性。解决这一挑战的一些技术包括模型压缩、模型剪枝、模型蒸馏和模型量化，这些技术可以减少模型的大小或复杂性，移除或简化冗余或不相关的参数，或者用更小或更快的模型来近似原模型。你将在下一节中研究其中一种方法，称为参数高效微调（PEFT）。
- en: The capability of fine-tuning models is increasingly being offered by all the
    cloud platforms that provide LLM services, such as Azure, AWS, Databricks, Google
    Vertex AI, and so on. It is a fast-growing list of vendors that provide these
    capabilities of low-code-no-code approach to RAG, fine-tuning, RLHF, and so on.
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 所有提供LLM服务的云平台，如Azure、AWS、Databricks、Google Vertex AI等，都在提供微调模型的能力。这是一个快速增长的供应商列表，它们提供低代码/无代码方法来提供RAG、微调、RLHF等能力。
- en: Parameter Efficient Fine-Tuning (PEFT)
  id: totrans-352
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 参数高效微调（PEFT）
- en: You studied the challenges of fine-tuning LLMs in the previous section. Full
    fine-tuning is not feasible to train on common hardware when models get bigger
    and bigger. Moreover, it is very costly to store and deploy fine-tuned models
    separately for each downstream task, because fine-tuned models have the same size
    as the original pretrained model. Parameter-Efficient Fine-tuning (PEFT) approaches
    aim to solve both issues.
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 在上一节中，你学习了微调LLMs的挑战。当模型越来越大时，在常见硬件上进行完全微调是不可行的。此外，为每个下游任务分别存储和部署微调模型成本非常高，因为微调模型的大小与原始预训练模型相同。参数高效微调（PEFT）方法旨在解决这两个问题。
- en: PEFT approaches only adjust a small number of (additional) model parameters
    while keeping most parameters of the pretrained LLMs fixed, thereby greatly reducing
    the computational and storage costs. This also avoids the problems of catastrophic
    forgetting, a behavior seen during the full finetuning of LLMs. PEFT approaches
    have also proven to be better than fine-tuning in the low-data regimes and generalize
    better to out-of-domain scenarios.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT方法只调整少量（额外的）模型参数，同时保持大多数预训练LLM的参数固定，从而大大降低了计算和存储成本。这也避免了在LLM完全微调过程中出现的灾难性遗忘问题。PEFT方法在低数据环境下也已被证明比微调更好，并且更好地泛化到领域外场景。
- en: Another benefit of PEFT methods is that they make the models more portable,
    as users can modify the models with small checkpoints that only take up a few
    MBs of storage, instead of the large checkpoints of full fine-tuning. The small
    number of trained weights from PEFT methods are added on top of the pretrained
    LLM, so the same LLM can be used for multiple tasks by adding small weights, without
    having to change the whole model.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT方法的另一个好处是它们使模型更具可移植性，因为用户可以使用仅占用几个MB存储空间的小检查点来修改模型，而不是使用完整微调的大检查点。PEFT方法中训练的少量权重被添加到预训练LLM之上，因此可以通过添加小权重来使用相同的LLM执行多个任务，而无需更改整个模型。
- en: There are two common approaches of PEFT. The first one is prompt-based fine-tuning.
    A prompt can either explain a task or give an example of a task that you want
    the model to learn. Soft-prompting methods do not require manually creating these
    prompts, but instead add learnable parameters to the input embeddings that can
    be adjusted for a specific task while keeping the pretrained model’s parameters
    fixed. This makes it quicker and simpler to fine-tune Large Language Models (LLMs)
    for new downstream tasks. A good place to refer to the various techniques of this
    approach is the documentation of the PEFT library from HuggingFace.^([22](#Fn22))
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT有两种常见的方法。第一种是基于提示的微调。提示可以解释一个任务，或者给出一个你希望模型学习的任务示例。软提示方法不需要手动创建这些提示，而是向输入嵌入中添加可学习的参数，这些参数可以针对特定任务进行调整，同时保持预训练模型的参数固定。这使得微调大型语言模型（LLMs）用于新的下游任务更快、更简单。参考这种方法的多种技术的好地方是HuggingFace的PEFT库文档。^([22](#Fn22))
- en: 'The other very popular approach is LoRA (Low Rank Adaptation), which was introduced
    in 2021 in a paper titled “LoRA: Low-Rank Adaptation of Large Language Models.”^([23](#Fn23))
    This approach has an even more efficient version called QLoRA (Quantized LoRA).
    QLoRA was introduced in 2023 in a paper titled “QLoRA: Efficient Finetuning of
    Quantized LLMs.”^([24](#Fn24)). Let’s briefly look into both of these approaches.'
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: '另一个非常受欢迎的方法是LoRA（低秩自适应），该方法于2021年在一篇题为“LoRA: Low-Rank Adaptation of Large Language
    Models.”的论文中提出。^([23](#Fn23)) 这种方法有一个更高效的版本，称为QLoRA（量化LoRA）。QLoRA于2023年在一篇题为“QLoRA:
    Efficient Finetuning of Quantized LLMs.”的论文中提出。^([24](#Fn24)) 让我们简要地了解一下这两种方法。'
- en: Low Rank Adaptation (LoRA) freezes the pretrained model weights and injects
    trainable rank decomposition matrices into each layer of the Transformer architecture,
    greatly reducing the number of trainable parameters for downstream tasks. Figure
    [11-10](#Fig10) shows the schematic of the LoRA approach from the paper.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 低秩自适应（LoRA）冻结了预训练模型的权重，并将可训练的秩分解矩阵注入到Transformer架构的每一层，从而大大减少了下游任务的可训练参数数量。图[11-10](#Fig10)展示了论文中LoRA方法的示意图。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig10_HTML.jpg)'
  id: totrans-359
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig10_HTML.jpg)'
- en: An illustration of the LoRA approach has a rectangle x of length d that points
    to pre-trained weights, W belongs to R superscript d by d, and B=0, B belongs
    to R superscript r by d, and A = N of 0, sigma squared, A belongs to R superscript
    d by r. They combine to form a rectangle h of width d.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: LoRA方法的示意图有一个长度为d的矩形x指向预训练权重，W属于R的d次方d，B=0，B属于R的r次方d，A = N的0，sigma squared，A属于R的d次方r。它们组合形成一个宽度为d的矩形h。
- en: Figure 11-10
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-10
- en: LoRA approach
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: LoRA方法
- en: Suppose one of the linear layers somewhere in the Transformer has a weight matrix
    *W* of size *d* × *d*. As part of fine-tuning, you freeze this original pretrained
    weight matrix *W* and build another path from the input vector *x* ∈ *R*^(*d*)
    to output vector *h* ∈ *R*^(*d*). You do this by passing x additionally through
    two weight matrices *A* ∈ *R*^(*d* × *r*) and then through *B* ∈ *R*^(*r* × *d*).
    Here *d* is the dimension of the input and output vectors and *r* is a number
    lot lower than the value of *d*. The weight matrix *W* and the product *A*. *B*
    have the same dimensions, that of *d* × *d*.
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 假设Transformer中的某个线性层有一个大小为*d* × *d*的权重矩阵*W*。作为微调的一部分，你冻结这个原始预训练权重矩阵*W*，并从输入向量*x* ∈ *R*^(*d*)到输出向量*h* ∈ *R*^(*d*)构建另一条路径。你通过将x额外通过两个权重矩阵*A* ∈ *R*^(*d* × *r*)，然后通过*B* ∈ *R*^(*r* × *d*)来实现这一点。这里*d*是输入和输出向量的维度，*r*是一个远小于*d*的数值。权重矩阵*W*和乘积*A*.
    *B*具有相同的维度，即*d* × *d*。
- en: Originally, vector *x* can be represented as *h* = *W*. *x*. With the addition
    of a new path as per Figure [11-10](#Fig10), the new expression for *h* is h = (W + A.
    B). x = W. x + (A. B). x, that is, the original flow from *x* to *h* and an additional
    flow. During fine-tuning, *W* is kept constant and only weights of *A* and *B*
    are allowed to change during backpropagation. Weights of *A* are initialized with
    a zero mean Gaussian, and *B* is initialized with zeros. With *B* = 0 at the start
    of fine-tuning, you get *h* = *W*. *x* . As fine-tuning progresses, *A* and *B*
    matrix weights change, allowing for LLM to learn new tasks in an efficient way.
    As an example, consider the case that *d* = 512 and *r* = 10\. The number of parameters
    in *W* will be *d* × *d* = 512 × 512 = 2,62,144\. The combined number of parameters
    in *A* and *B* is 2 × *d* × *r* = 2 × 512 × 10 = 10,240, which is about 3.9 percent
    of the number of parameters in *W*.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 原始地，向量*x*可以表示为*h* = *W*. *x*. 通过添加如图[11-10](#Fig10)所示的新路径，*h*的新表达式为h = (W + A.
    B). x = W. x + (A. B). x，即从*x*到*h*的原始流动和额外的流动。在微调期间，*W*保持不变，并且只允许*A*和*B*的权重在反向传播期间改变。*A*的权重以零均值高斯分布初始化，而*B*以零初始化。在微调开始时*B* = 0，你得到*h* = *W*.
    *x*。随着微调的进行，*A*和*B*矩阵的权重发生变化，允许LLM以高效的方式学习新任务。例如，假设*d* = 512和*r* = 10。*W*中的参数数量将是*d* × *d* = 512 × 512 = 2,621,44。*A*和*B*的总参数数量是2 × *d* × *r* = 2 × 512 × 10 = 10,240，这大约是*W*中参数数量的3.9%。
- en: 'Note that the memory footprint of a model’s parameters is very heavy during
    training compared to the memory footprint of the model during inference. The reason
    for a heavy memory footprint during training is because during training you need
    to maintain additional information to allow for backpropagation and optimizer
    gradient history tracking, information such as hidden layer activations, backprop
    gradients, and the running average of first moment and second moment gradient
    values. Though LoRA marginally increases the memory footprint of model parameters
    during inference, it offers significant memory advantage and data volume requirements
    during fine-tuning. This is because, under LoRA, the number of parameters being
    tuned are in the range of 3-5 percent of the actual model parameters. In a nutshell,
    LoRA offers these key advantages:'
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，与推理期间模型的内存占用相比，训练期间模型参数的内存占用非常庞大。训练期间内存占用大的原因是，在训练过程中，你需要维护额外的信息以允许反向传播和优化器梯度历史跟踪，这些信息包括隐藏层激活、反向传播梯度以及一阶和二阶梯度值的运行平均值。尽管LoRA在推理期间略微增加了模型参数的内存占用，但在微调期间它提供了显著的内存优势和数据量需求。这是因为，在LoRA下，正在调整的参数数量是实际模型参数的3-5%。简而言之，LoRA提供了以下关键优势：
- en: A pretrained model can be shared and used to build many small LoRA modules for
    different tasks. You can freeze the shared model and efficiently switch tasks
    by replacing the matrices *A* and *B* in Figure [11-10](#Fig10), thus reducing
    the storage requirement and task-switching overhead significantly.
  id: totrans-366
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预训练模型可以共享并用于构建针对不同任务的许多小型LoRA模块。你可以冻结共享模型，并通过替换图[11-10](#Fig10)中的矩阵*A*和*B*来高效地切换任务，从而显著降低存储需求和任务切换开销。
- en: LoRA makes training more efficient and lowers the hardware barrier to entry
    by up to three times when using adaptive optimizers, since you do not need to
    calculate the gradients or maintain the optimizer states for most parameters.
    Instead, you only optimize the injected, much smaller low-rank matrices.
  id: totrans-367
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LoRA 通过使用自适应优化器使训练更高效，并将硬件入门门槛降低多达三倍，因为您不需要计算大多数参数的梯度或维护优化器状态。相反，您只需优化注入的、远小的低秩矩阵。
- en: Simple linear design allows for merging the trainable matrices with the frozen
    weights when deployed, introducing no inference latency compared to a fully fine-tuned
    model.
  id: totrans-368
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简单的线性设计允许在部署时将可训练矩阵与冻结权重合并，与完全微调的模型相比，引入了零推理延迟。
- en: LoRA is orthogonal to many prior methods and can be combined with many of them.
  id: totrans-369
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LoRA 与许多先前的方法正交，并且可以与其中许多方法结合使用。
- en: You can refer to the paper and other detailed technical blogs for more details.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以参考该论文和其他详细的技术博客以获取更多信息。
- en: 'QLoRA is a further refinement of LoRA in which model parameters are quantized
    with different precision and numerical representation to offer even more memory
    efficiency. To quote from the paper:'
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: QLoRA 是 LoRA 的一种进一步改进，其中模型参数以不同的精度和数值表示进行量化，以提供更高的内存效率。以下是论文中的引用：
- en: '*QLoRA reduces the average memory requirements of finetuning a 65B parameter
    model from >780GB of GPU memory to <48GB without degrading the runtime or predictive
    performance compared to a 16- bit fully fine-tuned baseline. This marks a significant
    shift in accessibility of LLM finetuning: now the largest publicly available models
    to date fine-tunable on a single GPU.*'
  id: totrans-372
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*QLoRA 将微调一个65B参数模型的平均内存需求从>780GB的GPU内存降低到<48GB，与16位完全微调基线相比，没有降低运行时间或预测性能。这标志着
    LLM 微调可访问性的重大转变：现在，迄今为止最大的公开模型可以在单个 GPU 上进行微调。*'
- en: ''
  id: totrans-373
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Source: QLoRA paper'
  id: totrans-374
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 来源：QLoRA 论文
- en: 'Another approach, named Weight-Decomposed LowRank Adaptation (DoRA), was introduced
    in a 2024 paper titled “DoRA: Weight-Decomposed Low-Rank Adaptation.”^([25](#Fn25))
    It decomposes the pretrained weights into magnitude and direction components for
    fine-tuning, especially with LoRA to efficiently update the direction component.
    Interested readers may refer to the paper for further details.'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: '另一种名为“Weight-Decomposed LowRank Adaptation (DoRA)”的方法在2024年的一篇论文中提出，论文标题为“DoRA:
    Weight-Decomposed Low-Rank Adaptation。”^([25](#Fn25)) 该方法将预训练权重分解为幅度和方向分量以进行微调，尤其是在使用
    LoRA 时，可以有效地更新方向分量。感兴趣的读者可以参考论文以获取更多细节。'
- en: PEFT is seeing many additional approaches. I hope the discussion here has given
    the you an exposure to explore further.
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: PEFT 正在看到许多额外的方法。希望这里的讨论能给您提供进一步探索的机会。
- en: Chaining LLMs Together
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 连接 LLMs
- en: Another way to leverage the power of LLMs for various downstream tasks is to
    chain them together in a multistep pipeline. This means that instead of using
    a single LLM for a given task, you can use multiple LLMs, each performing a different
    subtask, and pass the output of one LLM as the input of another LLM. For example,
    suppose you want to generate a summary of a long document. You can first use an
    LLM to extract the most relevant sentences from the document, then use another
    LLM to paraphrase those sentences into a concise form, and finally use another
    LLM to merge those sentences into a coherent summary. This way, you can use the
    different strengths and specialties of different LLMs, and reduce the complexity
    of each subtask.
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 利用 LLMs 的力量进行各种下游任务的另一种方法是使用多步骤管道将它们连接起来。这意味着对于给定的任务，您可以使用多个 LLMs，每个 LLM 执行不同的子任务，并将一个
    LLM 的输出作为另一个 LLM 的输入。例如，假设您想生成一篇长文档的摘要。您可以使用一个 LLM 从文档中提取最相关的句子，然后使用另一个 LLM 将这些句子改写成简洁的形式，最后使用另一个
    LLM 将这些句子合并成一个连贯的摘要。这样，您就可以利用不同 LLMs 的不同优势和特长，并降低每个子任务的复杂性。
- en: One of the key benefits of chaining LLMs together is that it allows you to customize
    the pipeline according to the specific needs and characteristics of the task.
    For instance, you can choose the best LLM for each subtask based on its performance,
    domain, language, or architecture. You can also fine-tune or adapt each LLM with
    task-specific data or parameters, such as adapter layers or prompt embeddings,
    to improve its accuracy and generalization. Moreover, you can control the length
    and quality of the intermediate outputs by setting appropriate hyperparameters,
    such as beam size, temperature, or length penalty, for each LLM.
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 将LLM串联起来的一个关键好处是，它允许你根据任务的具体需求和特征定制管道。例如，你可以根据性能、领域、语言或架构选择每个子任务的最佳LLM。你还可以使用特定于任务的资料或参数，如适配器层或提示嵌入，对每个LLM进行微调或调整，以提高其准确性和泛化能力。此外，你可以通过为每个LLM设置适当的超参数，如束大小、温度或长度惩罚，来控制中间输出的长度和质量。
- en: However, chaining LLMs together also poses some challenges and limitations.
    One of the main challenges is how to ensure the compatibility and coherence of
    the intermediate outputs and inputs across different LLMs. For example, if the
    output of one LLM contains tokens or symbols that are not recognized by the input
    of another LLM, it may cause errors or degradation in the final output. Similarly,
    if the output of one LLM does not match the expected format or style of the input
    of another LLM, it may lead to inconsistency or confusion in the final output.
    Therefore, it is important to carefully select and preprocess the LLMs that are
    part of the pipeline, and to monitor and evaluate the intermediate outputs and
    inputs for any potential issues.
  id: totrans-380
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，将大型语言模型（LLM）串联起来也带来了一些挑战和限制。其中主要挑战之一是如何确保不同LLM之间中间输出和输入的兼容性和连贯性。例如，如果一个LLM的输出包含另一个LLM的输入无法识别的标记或符号，可能会导致最终输出出现错误或退化。同样，如果一个LLM的输出不符合另一个LLM输入预期的格式或风格，可能会导致最终输出不一致或产生混淆。因此，重要的是要仔细选择和预处理构成管道的LLM，并监控和评估中间输出和输入中可能出现的任何潜在问题。
- en: Another challenge is how to optimize the overall performance and efficiency
    of the pipeline, considering the tradeoffs between speed, memory, and quality.
    For example, using more LLMs in the pipeline may increase the quality of the final
    output, but it may also increase the latency and the computational cost of the
    task. Similarly, using larger or more complex LLMs may improve the accuracy of
    each subtask, but it may also require more resources and time to process the data.
    Therefore, it is important to balance the number and size of the LLMs in the pipeline,
    and to leverage techniques such as caching, pruning, or quantization to speed
    up the inference and reduce the memory footprint of the LLMs.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个挑战是如何在速度、内存和质量之间权衡，以优化管道的整体性能和效率。例如，在管道中使用更多的LLM可能会提高最终输出的质量，但也可能增加延迟和任务的计算成本。同样，使用更大或更复杂的LLM可能会提高每个子任务的准确性，但也可能需要更多资源和时间来处理数据。因此，平衡管道中LLM的数量和大小，并利用缓存、剪枝或量化等技术来加速推理并减少LLM的内存占用，是非常重要的。
- en: A third challenge is how to explain and monitor the behavior and outcomes of
    the pipeline, considering the complexity and opacity of the LLMs involved. For
    example, it may be difficult to trace back the source of errors or biases in the
    final output, as they may arise from any of the LLMs or their interactions. Similarly,
    it may be hard to understand the rationale or logic behind the decisions or predictions
    made by the LLMs, as they may rely on hidden or latent features that are not interpretable
    by humans. Therefore, it is important to apply methods and tools for explainability
    and MLOps, such as attribution, visualization, debugging, or logging, to the pipeline,
    and to evaluate the performance and robustness of the LLMs on various metrics
    and benchmarks.
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个挑战是如何解释和监控管道的行为和结果，考虑到涉及到的LLM的复杂性和不透明性。例如，追踪最终输出中错误或偏差的来源可能很困难，因为它们可能来自任何一个LLM或它们之间的交互。同样，理解LLM做出的决策或预测背后的理由或逻辑可能也很困难，因为它们可能依赖于人类无法解释的隐藏或潜在特征。因此，将可解释性和MLOps的方法和工具，如归因、可视化、调试或日志记录，应用于管道，并评估LLM在各种指标和基准上的性能和鲁棒性，是非常重要的。
- en: LangChain^([26](#Fn26)) and LlamaIndex^([27](#Fn27)) are currently two popular
    libraries that help you manage the complex multi-step solutions built using LLMs,
    including production monitoring, logging, deployments, and so on.
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: LangChain^([26](#Fn26)) 和 LlamaIndex^([27](#Fn27)) 是目前两个流行的库，可以帮助您管理使用LLM构建的复杂多步解决方案，包括生产监控、日志记录、部署等。
- en: Auto Agents
  id: totrans-384
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动智能体
- en: An Auto Agent or an LLM Agent is a term that refers to LLM applications that
    can perform complex tasks by using an architecture that integrates LLMs with essential
    modules like planning and memory. In LLM agents, an LLM acts as the main controller
    or "brain" that directs a series of operations needed to finish a task or user
    request. The LLM agent needs key modules such as planning, memory, and tool usage.
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 自动智能体或LLM智能体是指能够通过集成LLM与规划、记忆等关键模块的架构来执行复杂任务的LLM应用。在LLM智能体中，LLM充当主要控制器或“大脑”，指导完成任务或用户请求所需的一系列操作。LLM智能体需要规划、记忆和工具使用等关键模块。
- en: 'As an example, take a look at a 2023 paper titled “ChemCrow: Augmenting Large-Language
    Models with Chemistry Tools.”^([28](#Fn28)) To quote from the paper:'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: '例如，看看2023年发表的一篇论文，标题为“ChemCrow: 使用化学工具增强大型语言模型。”^([28](#Fn28)) 从论文中引用如下：'
- en: '*ChemCrow, an LLM chemistry agent designed to accomplish tasks across organic
    synthesis, drug discovery, and materials design. By integrating 18 expert-designed
    tools, ChemCrow augments the LLM performance in chemistry, and new capabilities
    emerge. Our agent autonomously planned and executed the syntheses of an insect
    repellent, three organo-catalysts, and guided the discovery of a novel chromophore….Using
    a variety of chemistry related packages and software, a set of tools is created.
    These tools and a user input are then given to an LLM. The LLM then proceeds through
    an automatic, iterative chain-of-thought process, deciding on its path, choice
    of tools, and inputs before coming to a final answer.*'
  id: totrans-387
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*ChemCrow，一个旨在完成有机合成、药物发现和材料设计等任务的LLM化学智能体。通过整合18个专家设计的工具，ChemCrow增强了LLM在化学领域的性能，并产生了新的功能。我们的智能体自主规划并执行了驱虫剂、三种有机催化剂的合成，并指导了新型发色团的发现……使用各种与化学相关的包和软件，创建了一套工具。然后，这些工具和用户输入被提供给LLM。LLM随后通过自动、迭代的思维链过程，决定其路径、工具选择和输入，最终得出答案。*'
- en: ''
  id: totrans-388
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Source: ChemCrow paper'
  id: totrans-389
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 来源：ChemCrow论文
- en: A schematic of the process is shown in Figure [11-11](#Fig11). The purpose of
    the figure is to illustrate the complex ways LLMs are being integrated into various
    processes. In scenarios like these, LLMs almost act like the CPU or operating
    system, as shown in Figure [11-9](#Fig9).
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 该过程的示意图如图 [11-11](#Fig11) 所示。该图的目的在于说明LLM被整合到各种过程中的复杂方式。在这些场景中，LLM几乎像CPU或操作系统一样，如图
    [11-9](#Fig9) 所示。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig11_HTML.jpg)'
  id: totrans-391
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig11_HTML.jpg)'
- en: A Chem Crow overview. a. Expert-designed chemistry tools and user-defined scientific
    tasks that point to a chain of thought reasoning loop. They point to the chemistry-informed
    sequence of actions and autonomous experimentation. b. The types of tools are
    molecule, general, safety, and reaction tools.
  id: totrans-392
  prefs: []
  type: TYPE_NORMAL
  zh: Chem Crow概述。a. 专家设计的化学工具和用户定义的科学任务，指向思维链推理循环。它们指向基于化学信息的动作序列和自主实验。b. 工具类型包括分子、通用、安全和反应工具。
- en: Figure 11-11
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-11
- en: ChemCrow overview
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: ChemCrow概述
- en: Note that the key difference between chaining LLMs vs LLM agents together is
    that in simple chaining, the flow of information is in one direction only, from
    the first LLM to the last. However, in LLM agents, there is an iterative flow
    of information back and forth between various LLMs and the decision of this flow
    is also orchestrated by LLMs.
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，将LLM链与LLM智能体结合的关键区别在于，在简单链中，信息流只有一个方向，即从第一个LLM到最后的LLM。然而，在LLM智能体中，信息在各个LLM之间以及LLM与决策之间进行迭代流动。
- en: 'Another interesting paper in this category is the one from Microsoft titled
    “AutoGen: Enabling Next-Gen LLM Applications via Multi-Agent Conversation.”^([29](#Fn29))
    It is accompanied by a great open-source library to try things out. Interested
    readers can refer to the `autogen` library on GitHub.^([30](#Fn30))'
  id: totrans-396
  prefs: []
  type: TYPE_NORMAL
  zh: '本类别中另一篇有趣的论文是微软发表的“AutoGen: 通过多智能体对话实现下一代LLM应用。”^([29](#Fn29)) 它附带了一个优秀的开源库，可以尝试各种功能。感兴趣的读者可以参考GitHub上的`autogen`库.^([30](#Fn30))'
- en: Multimodal Generative AI
  id: totrans-397
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多模态生成式AI
- en: Multimodal Generative AI is a branch of artificial intelligence that aims to
    create systems that can generate diverse and complex outputs across multiple modalities,
    such as text, images, video, and audio. Such systems can leverage the power of
    Large Language Models (LLMs) to understand natural language instructions and queries
    as well as combine them with other generative models that can produce high-quality
    content in different domains and formats.
  id: totrans-398
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态生成人工智能是人工智能的一个分支，旨在创建能够在多个模态（如文本、图像、视频和音频）上生成多样化和复杂输出的系统。这样的系统可以利用大型语言模型（LLMs）理解自然语言指令和查询，并将它们与其他生成模型结合起来，这些模型可以在不同的领域和格式中产生高质量的内容。
- en: One of the main components of multimodal generative AI is the ability to fuse
    and transform information from different sources and modalities, and to maintain
    coherence and consistency across them. For example, a multimodal generative system
    can take a textual description of a scene and generate a corresponding image,
    or vice versa. Alternatively, it can take an image and a caption and generate
    a relevant audio narration or take a piece of music and generate lyrics that match
    its mood and style.
  id: totrans-399
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态生成人工智能的主要组成部分是融合和转换来自不同来源和模态的信息，并保持它们之间的连贯性和一致性。例如，一个多模态生成系统可以接受场景的文本描述并生成相应的图像，或者反之亦然。或者，它可以接受一张图片和标题，并生成相关的音频叙述；或者接受一段音乐并生成与之情绪和风格相匹配的歌词。
- en: Another component of multimodal generative AI is the ability to reason and plan
    overly complex scenarios and tasks that involve multiple steps and subgoals. For
    example, a multimodal generative system can take a high-level instruction, such
    as "create a short video tutorial on how to make a paper airplane," and decompose
    it into a sequence of actions, such as "find a suitable paper sheet," "fold it
    in half," "make a crease," and so on. Then, it could execute each action by generating
    the appropriate visual and verbal outputs, such as showing the paper sheet on
    the screen, narrating the folding steps, or highlighting the creases.
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态生成人工智能的另一个组成部分是推理和规划过于复杂场景和任务的能力，这些场景和任务涉及多个步骤和子目标。例如，一个多模态生成系统可以接受一个高级指令，如“制作一个关于如何制作纸飞机的简短视频教程”，并将其分解为一系列动作，如“找到合适的纸张”、“对折纸张”、“制作折痕”等。然后，它可以通过生成适当的视觉和口头输出来执行每个动作，例如在屏幕上显示纸张、叙述折叠步骤或突出折痕。
- en: 'Some of the interesting applications and examples of multimodal generative
    AI include:'
  id: totrans-401
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态生成人工智能的一些有趣的应用和例子包括：
- en: '**Content creation and editing:** Multimodal generative systems can help users
    create and edit various types of content, such as images, videos, podcasts, blogs,
    or books, by providing suggestions, feedback, or corrections based on natural
    language commands or queries. For example, a user could ask a system to "add a
    sunset filter to the image," "change the voice of the narrator to a female one,"
    or "rewrite the sentence to make it more concise".'
  id: totrans-402
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内容创作与编辑：** 多模态生成系统可以通过基于自然语言命令或查询提供建议、反馈或修正，帮助用户创建和编辑各种类型的内容，例如图像、视频、播客、博客或书籍。例如，用户可以要求系统“给图片添加日落滤镜”、“将叙述者的声音改为女性声音”，或者“重写句子使其更简洁”。'
- en: '**Education and entertainment:** Multimodal generative systems can provide
    engaging and personalized learning and entertainment experiences, such as interactive
    games, simulations, stories, or quizzes, by generating content that adapts to
    the user’s preferences, goals, and feedback. For example, a system could create
    a customized adventure game for a user, where the user can explore a virtual world,
    interact with characters, and influence the plot by using natural language commands
    or queries.'
  id: totrans-403
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育与娱乐：** 多模态生成系统可以通过生成适应用户偏好、目标和反馈的内容，提供引人入胜且个性化的学习和娱乐体验，例如交互式游戏、模拟、故事或测验。例如，系统可以为用户创建一个定制的冒险游戏，用户可以在其中探索虚拟世界、与角色互动，并通过使用自然语言命令或查询来影响剧情。'
- en: '**Communication and collaboration:** Multimodal generative systems can facilitate
    communication and collaboration among users or between users and machines, by
    providing translation, summarization, transcription, or annotation services across
    different languages and modalities. For example, a system could translate a speech
    from one language to another, summarize a long video into a short text, transcribe
    an audio conversation into a text chat, or annotate an image with relevant labels
    and captions.'
  id: totrans-404
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沟通与协作**：多模态生成系统可以通过提供跨不同语言和模态的翻译、摘要、转录或注释服务，促进用户之间或用户与机器之间的沟通和协作。例如，一个系统可以将一种语言的语音翻译成另一种语言，将长视频总结成简短文本，将音频对话转录成文本聊天，或用相关标签和标题注释图像。'
- en: This completes the optional section on LLM and emerging trends in LLM world.
    The chapter now returns to application of RL for fine-tuning LLM to follow human
    instructions. As discussed, the fine-tuning of LLM for RLHF could be a full parameter
    fine-tuning or a LoRA based approach.
  id: totrans-405
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了关于LLM和LLM世界新兴趋势的可选部分。现在章节回到应用强化学习对LLM进行微调以遵循人类指令的应用。如前所述，LLM的RLHF微调可以是全参数微调或基于LoRA的方法。
- en: RL with Human Feedback
  id: totrans-406
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于人类反馈的强化学习
- en: One of the challenges of training Large Language Models (LLMs) is to ensure
    that they can follow natural language instructions and generate outputs that are
    aligned with human preferences and expectations. However, obtaining high-quality
    labeled data for every possible instruction and output combination is impractical
    and costly. Moreover, LLMs may encounter novel or ambiguous instructions at inference
    time, which require generalization and adaptation skills that are not easily learned
    from supervised data alone.
  id: totrans-407
  prefs: []
  type: TYPE_NORMAL
  zh: 训练大型语言模型（LLMs）的一个挑战是确保它们能够遵循自然语言指令并生成符合人类偏好和期望的输出。然而，为每个可能的指令和输出组合获取高质量标记数据是不切实际且昂贵的。此外，LLMs在推理时可能会遇到新颖或模糊的指令，这需要从监督数据中难以单独学习的泛化和适应技能。
- en: A promising solution to this challenge is to leverage human feedback as a form
    of a reinforcement learning (RL) signal, which can guide LLMs to improve their
    performance on a given instruction by rewarding or penalizing their outputs based
    on human judgments. This technique, known as reinforcement learning from human
    feedback (RLHF), can enable LLMs to learn from their own interactions with humans,
    rather than relying on predefined labels or rules.
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这一挑战的一个有希望的方案是利用人类反馈作为强化学习（RL）信号的一种形式，这可以指导大型语言模型（LLMs）通过根据人类判断对输出进行奖励或惩罚，来提高其在特定指令上的性能。这种被称为基于人类反馈的强化学习（RLHF）的技术，可以使LLMs从与人类的互动中学习，而不是依赖于预定义的标签或规则。
- en: The OpenAI team, in a paper titled “Training Language Models to Follow Instructions
    with Human Feedback” by Ouyanf et al.( 2022),^([31](#Fn31)) introduced a successful
    application of this concept and the resulting family of LLMs, which was called
    InstructGPT. The approach used was to fine-tune GPT-3 to follow a broad class
    of written instructions. This technique uses human preferences as a reward signal
    to fine-tune LLM models. The overall approach can be broken into three steps as
    shown in Figure [11-12](#Fig12).
  id: totrans-409
  prefs: []
  type: TYPE_NORMAL
  zh: OpenAI团队在Ouyanf等人（2022）的论文《通过人类反馈训练语言模型以遵循指令》中，介绍了这一概念及其结果LLM家族的成功应用，被称为InstructGPT。所采用的方法是将GPT-3微调以遵循广泛的书面指令。这种技术使用人类偏好作为奖励信号来微调LLM模型。整体方法可以分解为三个步骤，如图[11-12](#Fig12)所示。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig12_HTML.jpg)'
  id: totrans-410
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig12_HTML.jpg)'
- en: An illustration of 3 steps involved in reinforcement learning. Step 1\. Collect
    demonstration data and train a supervised policy. Step 2\. Collect comparison
    data and train a reward model. Step 3\. Optimize a policy against the reward model
    using reinforcement learning.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中涉及的三步的示意图。步骤1：收集演示数据并训练监督策略。步骤2：收集比较数据并训练奖励模型。步骤3：使用强化学习优化策略以对抗奖励模型。
- en: Figure 11-12
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-12
- en: Three steps of RLHF^([32](#Fn32))
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: RLHF的三个步骤^([32](#Fn32))
- en: Step 1 is *supervised fine-tuning (SFT)**,* which involves starting from a pretrained
    model such as GPT-3 that has been trained on a very large corpus of data from
    the Internet. The pretraining data is usually 1-2 trillion tokens of text data
    scraped from the Internet and other open-source datasets. The pretrained model
    is fine-tuned on a dataset of human-written summaries. These examples serve as
    direct demonstrations of the task you want the model to perform. The model learns
    from this dataset, by adjusting its parameters to minimize the difference between
    its outputs and the correct summaries in the dataset using supervised learning
    approach.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是**监督微调（SFT）**，这涉及到从一个在互联网上非常庞大的数据集上训练过的预训练模型，如GPT-3开始。预训练数据通常是1-2万亿个文本标记，这些标记是从互联网和其他开源数据集中抓取的。预训练模型在人类编写的摘要数据集上进行微调。这些例子作为直接演示，展示了你希望模型执行的任务。模型通过调整其参数，使用监督学习方法来最小化其输出与数据集中正确摘要之间的差异，从而从这个数据集中学习。
- en: Step 2 involves *reward modelling (RM)*. Reward modeling involves creating a
    model that can predict the quality of the model’s outputs based on human preferences.
    This is achieved by collecting a new dataset where humans compare pairs of model-generated
    outputs and indicate which one they prefer. The reward model is then trained to
    predict these human preferences, effectively learning what constitutes a "better"
    summary as a binary classification task. The most successful approach to reward
    modelling is to start with the SFT model from Step 1 and incorporate an additional
    linear layer on the final transformer layer to generate a scalar prediction representing
    the reward value.
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: 第二步涉及**奖励建模（RM）**。奖励建模包括创建一个模型，该模型可以根据人类偏好预测模型输出的质量。这是通过收集一个新的数据集来实现的，其中人类比较模型生成的输出对，并指出他们更喜欢哪一个。然后，奖励模型被训练来预测这些人类偏好，有效地将“更好的”摘要作为二元分类任务来学习。最成功的奖励建模方法是从第一步中的SFT模型开始，并在最终的transformer层上添加一个额外的线性层，以生成表示奖励值的标量预测。
- en: Step 3 is *RL fine-tuning using PPO* or any other RL optimization algorithm.
    The reward model learned in Step 2 provides reward feedback for the model output
    generated from the model in Step 1\. The reward is then used to fine-tune the
    model from Step 1 using the PPO algorithm from RL. To ensure that the model, during
    RL fine-tuning, does not deviate too much from the original SFT fine-tuned model,
    a KL penalty is introduced between the reference SFT model from step one and the
    model being fine-tuned in this step.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 第三步是使用PPO或其他任何RL优化算法进行**强化学习微调（RL fine-tuning）**。第二步中学习的奖励模型为第一步中模型生成的输出提供奖励反馈。然后，使用RL中的PPO算法来使用这个奖励对第一步中的模型进行微调。为了确保在RL微调过程中，模型不会偏离原始的SFT微调模型太远，引入了来自第一步的参考SFT模型和在此步骤中正在微调的模型之间的KL惩罚。
- en: To grasp the concept better, let’s walk through the steps with the help of an
    example. Imagine you want your LLM to generate concise summaries of articles.
    The goal is for the model to understand the core ideas of the text and present
    them in a few sentences accurately and coherently.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地掌握这个概念，让我们通过一个例子来逐步分析。想象一下，你希望你的大型语言模型（LLM）能够生成文章的简洁摘要。目标是让模型理解文本的核心思想，并以几句话准确、连贯地呈现出来。
- en: In Step 1, you collect a dataset of articles paired with their concise summaries
    written by human experts. A pretrained LLM is then fine-tuned on this dataset,
    learning how to condense articles into a few informative sentences. For instance,
    if one article is about a new scientific discovery in space exploration, its summary
    might highlight the discovery, its significance, and potential implications, all
    in a few sentences.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一步中，你收集了一个包含文章及其由人类专家编写的简洁摘要的数据集。然后，在这个数据集上对预训练的LLM进行微调，学习如何将文章压缩成几句话的信息。例如，如果一篇文章是关于太空探索中的新科学发现，其摘要可能会突出发现、其重要性以及潜在的影响，所有这些都在几句话中。
- en: After the SFT step, you present the model with new articles and generate summaries.
    Human reviewers are then asked to compare pairs of summaries for the same article,
    selecting which summary they find more concise and informative. These preferences
    are used to train a reward model that learns to score summaries based on their
    conciseness, accuracy, and coherence.
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: 在SFT步骤之后，你向模型提供新的文章并生成摘要。然后，要求人类审稿人比较同一篇文章的摘要对，选择他们认为更简洁、更有信息量的摘要。这些偏好被用来训练一个奖励模型，该模型学习根据摘要的简洁性、准确性和连贯性来评分。
- en: With the reward model in place, the SFT-tuned LLM generates summaries for a
    new set of articles. These summaries are then scored by the reward model. The
    LLM uses these scores to adjust its summarization strategy, focusing on generating
    summaries that are more likely to be concise, accurate, and informative according
    to the reward model’s criteria. And it does so with the PPO policy optimization
    approach. Over time, this iterative process results in a model that generates
    high-quality summaries that align closely with human preferences.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 在奖励模型到位后，经过SFT微调的LLM为一系列新的文章生成摘要。然后，这些摘要由奖励模型进行评分。LLM使用这些评分来调整其摘要策略，专注于生成根据奖励模型的标准更有可能简洁、准确和富有信息性的摘要。它使用PPO策略优化方法来完成这一任务。随着时间的推移，这个迭代过程导致了一个生成高质量摘要且与人类偏好高度一致的模型。
- en: Latest Advances in LLM Alignment
  id: totrans-421
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LLM对齐的最新进展
- en: Since its inception in 2022, RLHF has significantly impacted the way artificial
    intelligence models are trained and improved. As discussed in previous section,
    RLHF initially involved steps like supervised fine-tuning (SFT), reward modeling,
    and policy optimization. Over time, this process has seen substantial advancements,
    particularly in automating and enhancing efficiency, leading to the advent of
    Direct Preference Optimization (DPO).
  id: totrans-422
  prefs: []
  type: TYPE_NORMAL
  zh: 自2022年问世以来，RLHF对人工智能模型的训练和改进方式产生了重大影响。如前文所述，RLHF最初涉及监督微调（SFT）、奖励建模和政策优化等步骤。随着时间的推移，这个过程已经取得了实质性的进步，尤其是在自动化和提升效率方面，导致了直接偏好优化（DPO）的出现。
- en: Originally, RLHF relied heavily on SFT, where a model was fine-tuned on a dataset
    of human-labeled examples to learn a desired behavior. However, as the field evolved,
    researchers sought ways to automate and refine this process, reducing the reliance
    on extensive human-labeled datasets, which are resource-intensive and potentially
    biased.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，RLHF在很大程度上依赖于SFT，即模型在人类标注示例的数据集上进行微调，以学习期望的行为。然而，随着该领域的发展，研究人员寻求自动化和改进这一过程的方法，减少对大量人类标注数据集的依赖，这些数据集资源密集且可能存在偏见。
- en: One significant development was the replacement of SFT with outputs from other,
    more advanced models. This approach leverages the knowledge encapsulated in these
    pretrained models, transferring it to the model being trained. For instance, using
    the outputs of a larger or more specialized language model as a target for fine-tuning
    can provide a richer, more nuanced understanding of complex tasks without direct
    human annotation.
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 一个显著的发展是将SFT（自洽场论）替换为其他更先进模型的输出。这种方法利用了这些预训练模型中封装的知识，将其转移到正在训练的模型中。例如，使用更大或更专业的语言模型的输出作为微调的目标，可以提供对复杂任务的更丰富、更细腻的理解，而无需直接的人类标注。
- en: The reward model step in RLHF, where a model is trained to predict the reward
    (or quality) of an output based on human judgments, has also seen remarkable automation
    advancements. Instead of manually labeling data to train these reward models,
    researchers have started using other Large Language Models (LLMs) to automate
    the generation of reward signals. These LLMs can assess the quality of outputs
    based on criteria learned from vast datasets, effectively acting as proxies for
    human judgment. This automation not only streamlines the training process but
    also scales it, enabling more frequent updates and refinements to the reward models.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 在RLHF（基于人类反馈的强化学习）中，奖励模型步骤，其中模型被训练来根据人类判断预测输出的奖励（或质量），也看到了显著的自动化进步。研究人员不再手动标注数据来训练这些奖励模型，而是开始使用其他大型语言模型（LLM）来自动生成奖励信号。这些LLM可以根据从大量数据集中学习到的标准评估输出的质量，有效地作为人类判断的代理。这种自动化不仅简化了训练过程，还扩大了规模，使得奖励模型能够进行更频繁的更新和改进。
- en: 'Recently, in a paper titled “Direct Preference Optimization: Your Language
    Model is Secretly a Reward Model” by Rafailov et al. (2023),^([33](#Fn33)) a team
    of Stanford Researchers came up with a pivotal advancement. Direct Preference
    Optimization (DPO) directly optimizes the model’s parameters to align with human
    preferences, bypassing the need for a separate reward model. This approach integrates
    preference modeling directly into the training process, making the optimization
    more efficient and potentially more aligned with human values.'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，在一篇题为“直接偏好优化：你的语言模型其实是一个奖励模型”的论文中，Rafailov等人（2023）^([33](#Fn33))提出了一项关键性的进步。直接偏好优化（DPO）直接优化模型的参数以与人类偏好一致，绕过了需要单独奖励模型的需求。这种方法将偏好建模直接集成到训练过程中，使优化更加高效，并可能更符合人类价值观。
- en: DPO fundamentally relies on comparing pairs of model-generated outputs and adjusting
    the model parameters to increase the probability of generating outputs that align
    with human preferences. A key technical derivation in DPO is the use of preference-based
    gradients, where the gradient of the preference score with respect to the model
    parameters is computed. This allows for direct optimization of the model in a
    direction that is more likely to produce preferred outcomes.
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: DPO从根本上依赖于比较模型生成的输出对，并调整模型参数以增加生成符合人类偏好的输出的概率。DPO中的一个关键技术推导是使用基于偏好的梯度，其中计算了偏好分数相对于模型参数的梯度。这允许模型在更有可能产生期望结果的方向上进行直接优化。
- en: The benefits of DPO over traditional RLHF and its components like SFT and separate
    reward models are manifold. First, DPO streamlines the training process by integrating
    preference learning directly into model optimization, eliminating the need for
    separate reward model training. This integration can lead to more efficient use
    of computational resources and faster iteration cycles.
  id: totrans-428
  prefs: []
  type: TYPE_NORMAL
  zh: DPO相较于传统的RLHF及其组件（如SFT和独立的奖励模型）具有多方面的优势。首先，DPO通过将偏好学习直接集成到模型优化中，简化了训练过程，消除了单独训练奖励模型的需求。这种集成可以导致计算资源的更有效利用和更快的迭代周期。
- en: Secondly, by optimizing directly for human preferences, DPO can more closely
    align model outputs with what is considered beneficial or desirable by humans,
    potentially reducing the risk of misaligned incentives. Moreover, DPO allows for
    continuous improvement and adaptation of models as new preference data becomes
    available, maintaining the model’s relevance and effectiveness over time.
  id: totrans-429
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，通过直接优化人类偏好，DPO可以使模型输出更接近人类认为有益或期望的结果，从而降低利益不一致的风险。此外，DPO允许随着新偏好数据的可用而持续改进和调整模型，保持模型随时间推移的相关性和有效性。
- en: Fine-tuning LLMs is a very active area of research. Readers are well advised
    to search on the Internet and blogs on this topic to stay in touch with the latest
    advances.
  id: totrans-430
  prefs: []
  type: TYPE_NORMAL
  zh: 微调LLM是一个非常活跃的研究领域。读者们最好在互联网和博客上搜索这个主题，以保持对最新进展的了解。
- en: Libraries and Frameworks for RLHF
  id: totrans-431
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RLHF的库和框架
- en: Some popular frameworks, libraries, and cloud services providing RLHF fine-tuning
    are listed in this section. This is also a rapidly evolving ecosystem with almost
    something new every week. Therefore, use the following list as a starting reference
    only.
  id: totrans-432
  prefs: []
  type: TYPE_NORMAL
  zh: 本节列出了提供RLHF微调的一些流行框架、库和云服务。这也是一个快速发展的生态系统，几乎每周都有新事物出现。因此，请将以下列表仅作为起始参考。
- en: VertexAI from Google
  id: totrans-433
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Google的VertexAI
- en: VertexAI simplifies and streamlines the process of fine-tuning Large Language
    Models (LLMs) using Reinforcement Learning from Human Feedback (RLHF). With a
    user-friendly interface and pre-built containers, VertexAI eliminates the need
    for complex local setups, allowing you to focus on your data and task. It leverages
    Google Cloud’s powerful compute resources to train LLM on large datasets efficiently.
    It manages the entire RLHF fine-tuning process. You can upload your data, define
    your fine-tuning objective, and track progress through a central dashboard. VertexAI,
    with the help of training pipelines, automates training, allowing you to focus
    on data quality and human feedback loops.
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: VertexAI简化并优化了使用人类反馈的强化学习（RLHF）微调大型语言模型（LLM）的过程。它具有用户友好的界面和预构建的容器，消除了复杂本地设置的需求，让你可以专注于数据和任务。VertexAI利用Google
    Cloud强大的计算资源，在大型数据集上高效地训练LLM。它管理整个RLHF微调过程。你可以上传你的数据，定义你的微调目标，并通过中央仪表板跟踪进度。借助训练管道，VertexAI自动化了训练，让你可以专注于数据质量和人类反馈循环。
- en: You pay only for the resources you use, and you can share your project and collaborate
    with team members in a secure environment, facilitating smoother development and
    iteration.
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需为使用的资源付费，你可以在一个安全的环境中共享你的项目并与团队成员协作，这有助于更顺畅的开发和迭代。
- en: SageMaker from AWS Using Trlx
  id: totrans-436
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AWS使用Trlx的SageMaker
- en: AWS provides RLHF capabilities in SageMaker using an open-source library named
    `trlX`. The `trlX` library stands out as a tool for fine-tuning Large Language
    Models (LLMs) with Reinforcement Learning from Human Feedback (RLHF). Unlike generic
    frameworks, `trlX` focuses specifically on the unique needs of RLHF, simplifying
    and automating critical tasks like reward model training, policy optimization,
    and distributed training. It also easily integrates with popular LLM libraries
    like HuggingFace Transformers, eliminating the need for extensive coding from
    scratch. Further leveraging the power of distributed training across multiple
    GPUs or TPUs allows for efficient handling of large datasets and models. `trlX`
    has an API capable of production-ready RLHF with PPO and Implicit Language Q-Learning
    ILQL at the scales required for LLM deployment (e.g., 33 billion parameters).
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: AWS 通过名为 `trlX` 的开源库在 SageMaker 中提供 RLHF 功能。`trlX` 库作为一个用于使用来自人类反馈的强化学习（RLHF）微调大型语言模型（LLMs）的工具而脱颖而出。与通用框架不同，`trlX`
    专注于 RLHF 的独特需求，简化并自动化了奖励模型训练、策略优化和分布式训练等关键任务。它还易于与流行的 LLM 库（如 HuggingFace Transformers）集成，消除了从头开始进行大量编码的需求。进一步利用跨多个
    GPU 或 TPUs 的分布式训练能力，可以有效地处理大型数据集和模型。`trlX` 具有能够以 PPO 和隐式语言 Q-Learning ILQL 在 LLM
    部署所需的规模进行生产就绪 RLHF 的 API（例如，33 亿参数）。
- en: TRL Library from HuggingFace
  id: totrans-438
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: HuggingFace 的 TRL 库
- en: TRL from HuggingFace is a full stack library that provides a set of tools to
    train Transformer language models with reinforcement learning, from the Supervised
    Fine-tuning step (SFT), the Reward Modeling step (RM), to the Proximal Policy
    Optimization (PPO) step. The library is integrated with HuggingFace Transformers
    library. `trlX` is a fork of the TRL library.
  id: totrans-439
  prefs: []
  type: TYPE_NORMAL
  zh: HuggingFace 的 TRL 是一个全栈库，提供了一套工具来使用强化学习训练 Transformer 语言模型，从监督微调步骤（SFT）、奖励建模步骤（RM）到近端策略优化（PPO）步骤。该库与
    HuggingFace Transformers 库集成。`trlX` 是 TRL 库的一个分支。
- en: Walkthrough of RLHF Tuning
  id: totrans-440
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RLHF 调优流程
- en: This section explains a code example that tunes an LLM using RLHF. As LLM fine-tuning
    requires a GPU with large configuration and may take hours to train, you can just
    walk through the code without executing it. If you have access to a GPU either
    using Google Colab or any other cloud GPU provider, you can try to run the code.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 本节解释了一个使用 RLHF 调优 LLM 的代码示例。由于 LLM 微调需要具有大配置的 GPU，并且可能需要数小时才能训练，您可以直接浏览代码而不执行它。如果您可以通过
    Google Colab 或任何其他云 GPU 提供商访问 GPU，您可以尝试运行代码。
- en: An example notebook that comes with the TRL library from HuggingFace is used
    here. You can find more about it in the `examples` section of the TRL library
    documentation.^([34](#Fn34)) This section uses the example contained in the `gpt2-sentiment.ipynb`
    notebook.^([35](#Fn35)) I also copied the notebook over to the code accompanying
    this book as `11.b-gpt2-sentiment.ipynb`.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 这里使用的是 HuggingFace TRL 库附带的一个示例笔记本。您可以在 TRL 库文档的 `examples` 部分了解更多信息.^([34](#Fn34))
    本节使用 `gpt2-sentiment.ipynb` 笔记本中的示例.^([35](#Fn35)) 我还把这个笔记本复制到了这本书的配套代码中，作为 `11.b-gpt2-sentiment.ipynb`。
- en: In this notebook, you fine-tune GPT-2 (small) to generate positive movie reviews
    based on the IMDB dataset. The model gets the start of a real review and is tasked
    to produce positive continuations. To reward positive continuations, you use a
    BERT classifier to analyze the sentiment of the produced sentences and use the
    classifier’s outputs as reward signals for PPO training.
  id: totrans-443
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个笔记本中，您将 GPT-2 (小型) 进行微调以根据 IMDB 数据集生成正面的电影评论。模型获取一个真实评论的开头，并负责生成正面的后续内容。为了奖励正面的后续内容，您使用
    BERT 分类器分析生成的句子的情感，并将分类器的输出用作 PPO 训练的奖励信号。
- en: As you may have noticed from the description of the notebook, you do not train
    your own reward model. Rather, you use a pretrained classifier that classifies
    a review and outputs the logits for the negative and positive class. You will
    use the logits for a positive class as a reward signal for the language model.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从笔记本的描述中注意到的，您不需要训练自己的奖励模型。相反，您使用一个预训练的分类器来对评论进行分类，并输出负类和正类的 logits。您将使用正类的
    logits 作为语言模型的奖励信号。
- en: In the notebook, you install the required libraries, import the modules you
    will be using, and log in to Weights and Biases to record the run statistics of
    the experiment. This is shown in Listing [11-11](#PC11).
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 在笔记本中，您将安装所需的库，导入您将要使用的模块，并登录到 Weights and Biases 以记录实验的运行统计数据。这在上面的列表 [11-11](#PC11)
    中展示。
- en: '[PRE10]'
  id: totrans-446
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: You can also create a configuration for the PPO trainer, as shown in Listing
    [11-12](#PC12).
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以为 PPO 训练器创建一个配置，如列表 [11-12](#PC12) 所示。
- en: '[PRE11]'
  id: totrans-448
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: In this notebook, you do not carry out the SFT step of RLHF. Using the HuggingFace
    (hf) Transformers library and the HF model-hub, you load a GPT-2 model that was
    additionally trained on IMDB dataset for one epoch. The IMDB dataset contains
    50,000 movie reviews annotated with "positive/negative" feedback indicating the
    sentiment. The IMBD dataset is a dataset containing movie reviews. As can be seen
    in Listing [11-12](#PC12), PPOConfig initialization takes in `model_name="lvwerra/gpt2-imdb”`
    hosted on the HF model hub.^([36](#Fn36)) The details of fine-tuning the dataset
    and script can be found at [`https://huggingface.co/lvwerra/gpt2-imdb`](https://huggingface.co/lvwerra/gpt2-imdb).
  id: totrans-449
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个笔记本中，你不会执行 RLHF 的 SFT 步骤。使用 HuggingFace (hf) Transformers 库和 HF model-hub，你加载了一个在
    IMBD 数据集上额外训练了一个 epoch 的 GPT-2 模型。IMBD 数据集包含 50,000 条带有“正面/负面”反馈的标注电影评论，表示情感。IMBD
    数据集是一个包含电影评论的数据集。如列表 [11-12](#PC12) 所示，PPOConfig 初始化接受托管在 HF model hub 上的 `model_name="lvwerra/gpt2-imdb”`。关于微调数据集和脚本的详细信息，请参阅[`https://huggingface.co/lvwerra/gpt2-imdb`](https://huggingface.co/lvwerra/gpt2-imdb)。
- en: To do RLHF fine-tuning, you again use the IMBD dataset. During RLHF training,
    data is passed through a pretrained BERT-based reward model. These rewards are
    used to fine-tune `gpt2-imdb` using PPO. Listing [11-13](#PC13) shows the code
    for preparing the IMBD dataset for training. You first load the tokenizer for
    GPT-2 to tokenize the text before passing it through the GPT-2 LLM. You download
    the `train` split of the IMBD dataset, rename the `text` column to `review`, and
    filter out the reviews that are smaller than 200 characters. Next, for each review
    in the dataset, you sample a random number of tokens ranging from 2 to 8 from
    the beginning of the review, and then store the tokenized version in a column
    named `input_ids` and the decoded text version in a column named `query`. You
    also retain all the previous columns in the dataset, namely `review` and `label`.
    You can explore the HuggingFace dataset at [`https://huggingface.co/datasets/imdb`](https://huggingface.co/datasets/imdb).
    Define a `collator` function to collate the data in a format appropriate for batch
    training in PPO. If some of these concepts are not clear, refer to the HuggingFace
    documentation.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 要进行 RLHF 微调，你再次使用 IMBD 数据集。在 RLHF 训练期间，数据通过一个预训练的基于 BERT 的奖励模型传递。这些奖励用于使用 PPO
    微调 `gpt2-imdb`。列表 [11-13](#PC13) 展示了为训练准备 IMBD 数据集的代码。你首先加载 GPT-2 的分词器以对文本进行分词，然后再通过
    GPT-2 LLM 传递。你下载 IMBD 数据集的 `train` 分割，将 `text` 列重命名为 `review`，并过滤掉小于 200 个字符的评论。接下来，对于数据集中的每个评论，你从评论的开头随机采样
    2 到 8 个标记，然后将分词版本存储在名为 `input_ids` 的列中，将解码文本版本存储在名为 `query` 的列中。你还将保留数据集中的所有其他列，即
    `review` 和 `label`。你可以探索 HuggingFace 数据集，网址为[`https://huggingface.co/datasets/imdb`](https://huggingface.co/datasets/imdb)。定义一个
    `collator` 函数以将数据整理成适合 PPO 批量训练的格式。如果其中一些概念不清楚，请参阅 HuggingFace 文档。
- en: '[PRE12]'
  id: totrans-451
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now you are ready to carry out the third step in RLHF, that of PPO training.
    You load the `gpt2-imbd` model and make two copies—a reference model that will
    not change during PPO training and another one that will be fine-tuned under PPO.
    Next, you initialize the PPO trainer using the `PPOConfiguration`, the two `GPT2-imdb`
    models, and the dataset with the `collator` function, as shown in Listing [11-14](#PC14).
    You also load the pretrained reward model, `distilbert-imdb` classifier from HF
    model hub, and prepare the sentiment pipeline. As discussed earlier, the `distilbert-imdb`
    model outputs the logits for the negative and positive class and you use the logits
    for a positive class as a reward signal for the language model.
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经准备好执行 RLHF 的第三步，即 PPO 训练。你加载 `gpt2-imbd` 模型并制作两个副本——一个在 PPO 训练期间不会改变的参考模型，另一个将在
    PPO 下进行微调。接下来，你使用 `PPOConfiguration`、两个 `GPT2-imdb` 模型和带有 `collator` 函数的数据集初始化
    PPO 训练器，如列表 [11-14](#PC14) 所示。你还加载了预训练的奖励模型，来自 HF model hub 的 `distilbert-imdb`
    分类器，并准备情感管道。如前所述，`distilbert-imdb` 模型输出负类和正类的 logits，你使用正类的 logits 作为语言模型的奖励信号。
- en: '[PRE13]'
  id: totrans-453
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'You are now ready to train the model. Training consists of a loop with the
    following main steps:'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以开始训练模型了。训练包括一个循环，以下为主要步骤：
- en: Get the query responses from the policy network (GPT-2).
  id: totrans-455
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从策略网络（GPT-2）获取查询响应。
- en: Get sentiments for query/responses from BERT.
  id: totrans-456
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 BERT 获取查询/响应的情感。
- en: Optimize policy with PPO using the (`query, response, reward`) triplet.
  id: totrans-457
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用（`查询，响应，奖励`）三元组优化 PPO 策略。
- en: Listing [11-15](#PC15) shows the complete code of training loop.
  id: totrans-458
  prefs: []
  type: TYPE_NORMAL
  zh: 列表[11-15](#PC15)显示了训练循环的完整代码。
- en: '[PRE14]'
  id: totrans-459
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Since we have initialized Weights and Biases (wandb). We will be able to track
    the training progress and various other metrics on wandb.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经初始化了Weights and Biases（wandb），我们将在wandb上能够跟踪训练进度和各种其他指标。
- en: Once the training is over, you can inspect the PPO trained model output and
    compare it to the output of the `reference gpt2-imdb` model. The notebook contains
    the code to carry out the inspection. You can see that response (after) is generally
    better and tilts toward a positive tone, as compared to the reference model. A
    sample comparison is shown in Figure [11-13](#Fig13). For a detailed walkthrough,
    refer to the `gpt2-sentiment.ipynb` notebook.
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦训练完成，你可以检查PPO训练模型的输出，并将其与`reference gpt2-imdb`模型的输出进行比较。笔记本包含了执行检查的代码。你可以看到，与参考模型相比，响应（之后）通常更好，并且倾向于积极语气。一个示例比较显示在图[11-13](#Fig13)中。对于详细说明，请参阅`gpt2-sentiment.ipynb`笔记本。
- en: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig13_HTML.jpg)'
  id: totrans-462
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_11_Chapter/502835_2_En_11_Fig13_HTML.jpg)'
- en: A table has 5 columns and 16 rows. The column headers are query, response before,
    response after, rewards before, and rewards after. The 16 fields have text and
    numerical data.
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 表格有5列和16行。列标题是查询、之前响应、之后响应、之前奖励和之后奖励。这16个字段包含文本和数值数据。
- en: Figure 11-13
  id: totrans-464
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-13
- en: Three steps of RLHF^([37](#Fn37))
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: RLHF的三步法^([37](#Fn37))
- en: You can see that rewards on the PPO trained models are higher than the rewards
    for the same sentences using the reference `gpt2-imdb` model.
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，使用PPO训练的模型上的奖励高于使用参考`gpt2-imdb`模型对相同句子进行奖励。
- en: This was a toy example of how RLHF works and even on this toy dataset, it can
    take close to two to three hours. It should make you appreciate that even a fine-tuning
    of LLM is an expensive process when done on state-of-the-art LLM with large datasets.
    Almost all models today go through something similar to make the LLMs follow instructions,
    even for code analysis and code completion like the GitHub AutoPilot.
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个RLHF如何工作的玩具示例，即使在玩具数据集上，也需要接近两到三小时。这应该让你意识到，即使在具有大量数据集的最先进LLM上进行微调，LLM的微调也是一个昂贵的过程。几乎所有模型今天都要经历类似的过程，使LLMs遵循指令，即使是像GitHub
    AutoPilot这样的代码分析和代码补全。
- en: This completes this chapter, which was a PPO deep dive and its application in
    RLHF fine-tuning for LLMs.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 这完成了本章，本章深入探讨了PPO及其在RLHF微调LLMs中的应用。
- en: Summary
  id: totrans-469
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter provided a comprehensive overview of the Proximal Policy Optimization
    (PPO) algorithm, a state-of-the-art policy gradient method for reinforcement learning.
    The chapter started by reviewing the foundations of policy gradient methods, such
    as the policy objective function, the importance sampling ratio, the trust region,
    and the natural gradient.
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 本章提供了对近端策略优化（PPO）算法的全面概述，这是一种用于强化学习的最先进的策略梯度方法。章节首先回顾了策略梯度方法的基础，如策略目标函数、重要性采样比率、信任区域和自然梯度。
- en: The chapter then derived the PPO algorithm step by step, explaining how it uses
    a clipped surrogate objective function to control the policy update size and avoid
    large deviations from the current policy. The chapter also discussed the practical
    implementation details of PPO, such as the vectorized environment, the parameter
    initialization, the Adam optimizer, the generalized advantage estimation, the
    mini-batch updates, the normalization of advantages, the value function loss clipping,
    the global gradient clipping, and the debug variables.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 章节随后逐步推导了PPO算法，解释了它如何使用剪裁的代理目标函数来控制策略更新大小并避免与当前策略的大偏差。章节还讨论了PPO的实际实现细节，例如向量化环境、参数初始化、Adam优化器、广义优势估计、小批量更新、优势归一化、值函数损失剪裁、全局梯度剪裁和调试变量。
- en: Next, the concept of Reinforcement Learning from Human Feedback (RLHF) was introduced.
    RLHF is a technique to fine-tune Large Language Models (LLMs) using human preferences
    as a reward signal. There was a brief overview of the Transformer architecture
    and the GPT series of LLMs, which are generative models that can learn from massive
    amounts of unlabeled text data and generate high-quality text across different
    domains and tasks. The chapter also discussed topics like prompt engineering,
    fine-tuning and PEFT, chaining LLMs together, or even making multiple LLMs work
    together in an autonomous way, almost like an operating system.
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 接着，介绍了人类反馈强化学习（RLHF）的概念。RLHF是一种使用人类偏好作为奖励信号来微调大型语言模型（LLMs）的技术。本章简要概述了Transformer架构和GPT系列LLMs，它们是能够从大量未标记文本数据中学习并生成不同领域和任务的高质量文本的生成模型。本章还讨论了诸如提示工程、微调和PEFT、将LLMs链接在一起，甚至以类似操作系统的自主方式使多个LLMs协同工作等主题。
- en: 'That was followed by a discussion of RLHF and how it can be applied to train
    LLMs to follow natural language instructions and generate outputs that align with
    human expectations. The chapter discussed the three main steps of RLHF: supervised
    fine-tuning, reward modeling, and policy optimization. The chapter also described
    the latest advances in LLM alignment, such as Direct Preference Optimization (DPO),
    which bypasses the need for a separate reward model and directly optimizes the
    model parameters to match human preferences.'
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 随后，讨论了RLHF及其如何应用于训练LLMs以遵循自然语言指令并生成符合人类期望的输出。本章讨论了RLHF的三个主要步骤：监督微调、奖励建模和政策优化。本章还描述了LLM对齐的最新进展，例如直接偏好优化（DPO），它绕过了需要单独奖励模型的需求，并直接优化模型参数以匹配人类偏好。
- en: The chapter concluded with a walkthrough of RLHF tuning using the TRL library
    from HuggingFace, which provides a set of tools to train transformer language
    models with RLHF. The chapter showed you how to use the TRL library to fine-tune
    a GPT-2 model to generate positive movie reviews based on the IMDB dataset. The
    discussion also covers the use of a pretrained BERT classifier as a reward model
    to score the model's outputs based on their sentiment, and how to use PPO to optimize
    the model's parameters using the reward signals. It concluded with an inspection
    of the model's outputs and a comparison of the reference model outputs.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 本章以使用HuggingFace的TRL库进行RLHF调优的演练结束，该库提供了一套用于使用RLHF训练transformer语言模型的工具。本章向您展示了如何使用TRL库微调GPT-2模型，根据IMDB数据集生成积极的电影评论。讨论还涵盖了使用预训练的BERT分类器作为奖励模型，根据其情感评分模型输出，以及如何使用PPO利用奖励信号优化模型参数。最后，本章对模型输出进行了检查，并比较了参考模型输出。
