- en: 12. Data Fabric and Data Mesh in a Hybrid Cloud Landscape
  id: totrans-224
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 12. 混合云景观中的数据布和数据网格
- en: In this chapter, we investigate additional facets of both concepts that arise
    specifically from hybrid cloud deployments. We briefly review the term *hybrid
    cloud* and how it relates to on-premises. Although cloud services are rated very
    highly in importance, they nevertheless create new challenges regarding access,
    integration, and consumption of data and AI assets across the organization. What
    does *Data Fabric architecture and Data Mesh solution* mean in the context of
    a hybrid cloud landscape, and what are the key challenges, for instance, related
    to addressing data and AI governance and trustworthy AI?
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们调查了这两个概念从混合云部署中产生的额外方面。我们简要回顾了术语“混合云”及其与本地环境的关联。尽管云服务在重要性上被高度评价，但它们仍然在组织内部创造了新的挑战，包括访问、集成和消费数据以及AI资产。在混合云景观的背景下，“数据布架构和数据网格解决方案”意味着什么，以及关键挑战是什么，例如与数据AI治理和可信AI相关的问题？
- en: Even more important though, what are the benefits of having a Data Fabric and
    Data Mesh for a hybrid cloud environment, and how does this differ from an approach
    that is targeted for a traditional on-premises IT and application landscape?
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，更重要的是，拥有数据布和数据网格对于混合云环境有什么好处，这与针对传统本地IT和应用程序景观的方法有何不同？
- en: This chapter gives adequate attention to the specifics of building a Data Mesh
    solution in a hybrid cloud, highlighting the building and consumption of data-as-a-product
    in a data marketplace that is delivered via a hybrid cloud.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 本章对在混合云中构建数据网格解决方案的细节给予了足够的关注，突出了在通过混合云提供的数据市场中构建和消费数据作为产品。
- en: Introduction
  id: totrans-228
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: In this chapter, we look at the intersection of two initiatives of the digital
    business transformation, (a) implementing a Data Fabric architecture and Data
    Mesh solution to address today’s inability to extract business insight from the
    huge amount of data that is available in each organization and (b) adopting hybrid
    cloud computing. Chapter [3](537582_1_En_3_Chapter.xhtml) introduced the unified
    view of data across a hybrid cloud as one of four entry use cases.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了数字业务转型两个倡议的交汇点：(a) 实施数据布架构和数据网格解决方案，以解决从每个组织可用的海量数据中提取业务洞察力的问题；(b)
    采用混合云计算。第[3](537582_1_En_3_Chapter.xhtml)章介绍了混合云中数据统一视图作为四个入门用例之一。
- en: The requirement to view, analyze, and process data across a hybrid cloud architecture
    is becoming a high priority as organizations have projects ongoing to adopt and
    use cloud-native applications and to modernize existing applications exploiting
    public or private cloud environments next to running applications in their traditional
    processing environments.
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 在混合云架构中查看、分析和处理数据的需求正在成为高优先级，因为组织正在进行采用和使用云原生应用程序的项目，并利用公有云或私有云环境现代化现有应用程序，同时在其传统处理环境中运行应用程序。
- en: In this chapter we revisit what is a hybrid cloud and what are the key challenges
    for data and AI capabilities in an organization. We intend to demonstrate how
    both concepts can address data and AI needs in a distributed, hybrid cloud environment
    across transactional and analytical data operations.
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们回顾了什么是混合云以及组织在数据和AI能力方面面临的关键挑战。我们旨在展示这两个概念如何解决分布式、混合云环境中跨事务性和分析数据操作的数据和AI需求。
- en: What Is Hybrid Cloud?
  id: totrans-232
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是混合云？
- en: 'Hybrid cloud integrates public cloud services, private cloud services, and
    on-premises infrastructure and provides orchestration, management, and application
    portability across all three.^([1](#Fn1)) The vision is an agile, distributed
    compute environment where an organization can optimize its existing workload and
    adopt new workloads quickly:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 混合云集成了公有云服务、私有云服务和本地基础设施，并提供了跨所有三个方面的编排、管理和应用程序可移植性。[^([1](#Fn1))]愿景是一个敏捷的分布式计算环境，组织可以优化其现有工作负载并快速采用新工作负载：
- en: '**Public cloud services**: Provide on-demand IT resources over the Internet
    with a consumption-based pricing model. Instead of buying and installing hardware
    and software for a specific solution, which may take many months in bigger organizations,
    services such as compute power, storage, databases, analytics tools, etc. can
    be used on an as-needed basis without the up-front cost and installation time.
    A major benefit of a cloud deployment option is agility in adopting new technologies.
    Public cloud providers offer a wide range of services such as AI and ML, data
    lakes, and analytics. It promises the freedom to test new ideas and verify business
    value quickly. Another benefit is elasticity. Especially in x86 processing environments,
    overprovisioning of compute power is very common, which leads to increased cost
    of hardware and software licenses as well as sustainability concerns in respect
    to floor space and power consumption. Public cloud service providers are responsible
    for owning and administering the data centers where user workloads run and implementing
    orchestration and virtualization software to scale service resources up and down
    based on demand. The IT consumption model can be compared to a *utility model*
    for consuming electricity.'
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**公有云服务**：通过互联网提供按需IT资源，采用基于消费的定价模式。与购买和安装特定解决方案的硬件和软件相比，这可能在大组织中需要数月时间，服务如计算能力、存储、数据库、分析工具等可以根据需要使用，无需前期成本和安装时间。云部署选项的主要优势在于采用新技术的灵活性。公有云提供商提供广泛的AI和ML、数据湖和分析等服务。它承诺能够快速测试新想法并验证业务价值。另一个好处是弹性。特别是在x86处理环境中，过度配置计算能力非常普遍，这导致硬件和软件许可成本增加以及关于地板空间和电力消耗的可持续性问题。公有云服务提供商负责拥有和管理用户工作负载运行的数据中心，并实施编排和虚拟化软件，根据需求上下调整服务资源。IT消费模式可以与消费电力的*公用事业模式*进行比较。'
- en: '**Private cloud services**: Use similar cloud infrastructure exclusively for
    one company. Typically, it is operated behind an organization’s firewall but can
    also be hosted on dedicated third-party infrastructure. In a private cloud, the
    organization’s IT team is responsible for installation and maintenance of the
    IT infrastructure and can control resources, data security, and regulatory compliance
    as well as look into potential performance optimization. The application development
    teams and business units are the consumers of the private cloud services and expect
    similar agility and elasticity as advertised by public cloud service providers.
    A big advantage of a private cloud compared with the public cloud deployment model
    is the ability to customize applications and infrastructure leading to substantial
    cost savings beyond initial test and adoption phases.^([2](#Fn2))'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**私有云服务**：仅使用与一家公司相似的云基础设施。通常，它位于组织的防火墙后面，但也可以托管在专用的第三方基础设施上。在私有云中，组织的IT团队负责IT基础设施的安装和维护，可以控制资源、数据安全、法规遵从性以及检查潜在的性能优化。应用程序开发团队和业务部门是私有云服务的消费者，并期望获得与公共云服务提供商宣传的类似灵活性和弹性。与公共云部署模型相比，私有云的一个大优势是能够定制应用程序和基础设施，从而在初始测试和采用阶段之后实现实质性的成本节约。[2](#Fn2)'
- en: '**Traditional on-premises IT infrastructure**: Consists of hardware and software
    products and is developed over a longer period of time to fit the organization’s
    needs and goals. The organization’s IT team operates the data centers, networking,
    and applications and develops custom tools and procedures for system and application
    deployment and operation as well as charge-back models. A well-managed IT infrastructure
    and application portfolio implements the enterprise architecture; is highly optimized,
    reliable, and secure; and therefore can be used as a competitive advantage. In
    some organizations, the rigorous processes created to ensure the scalable, efficient,
    reliable, and secure IT infrastructure slowed down the adoption of new IT and
    led to the perception that on-premises IT infrastructure is less agile and scalable
    compared with the cloud deployment model.'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**传统的本地IT基础设施**：由硬件和软件产品组成，经过较长时间的开发以适应组织的需要和目标。组织的IT团队运营数据中心、网络和应用，并为系统和应用部署及操作开发定制工具和程序，以及计费模型。一个管理良好的IT基础设施和应用组合实现了企业架构；高度优化、可靠和安全；因此可以作为竞争优势。在一些组织中，为确保可扩展性、效率、可靠性和安全性而创建的严格流程减缓了新IT的采用，并导致人们认为与云部署模型相比，本地IT基础设施在灵活性和可扩展性方面较差。'
- en: Today’s hybrid clouds are architected by focusing on building applications through
    loosely coupled services across one or many of public cloud, private cloud, and
    on-promises IT infrastructure.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的混合云是通过关注通过跨一个或多个公共云、私有云和本地IT基础设施的松散耦合服务构建应用程序来架构的。
- en: Key Challenges for Data Architecture
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据架构的关键挑战
- en: Review data challenges as discussed in Chapter [1](537582_1_En_1_Chapter.xhtml),
    now with added complexity of data stored and accessed using a different format
    and flexibility for data sources to be portable across IT environments. The agility
    of a hybrid cloud architecture allows for new locations where data can proliferate.
    Data silos make moves between cloud service providers unattractive. The public
    cloud service provider fee structure makes it very attractive to move data into
    the cloud and assume data stays in there. However, taking data out of a public
    cloud can be prohibitively expensive. Therefore, traditional data architectures
    such as directly connecting multiple data sources as done with traditional ETL
    pipelines to maintain EDW or consolidate data onto a single platform as done in
    most data lake environments create technical and cost challenges in a hybrid cloud
    environment. The concept of loosely coupled services of a hybrid cloud application
    architecture is critical throughout a Data Fabric architecture and Data Mesh solution
    as well. Data or analytics is also exposed as a service or data product with an
    access URL.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾第[1章](537582_1_En_1_Chapter.xhtml)中讨论的数据挑战，现在增加了使用不同格式存储和访问数据的复杂性，以及数据源在IT环境之间可移植性的灵活性。混合云架构的敏捷性允许数据在新的位置扩散。数据孤岛在云服务提供商之间的迁移变得不具吸引力。公共云服务提供商的收费结构使得将数据迁移到云中并假设数据将保留在那里变得非常有吸引力。然而，从公共云中移除数据可能非常昂贵。因此，传统的数据架构，如通过传统的ETL管道直接连接多个数据源以维护数据仓库或像大多数数据湖环境中所做的那样将数据汇总到单一平台，在混合云环境中会带来技术和成本挑战。混合云应用程序架构中松散耦合服务的概念在数据编织架构和数据网格解决方案中同样至关重要。数据或分析也作为服务或数据产品暴露，并带有访问URL。
- en: The heterogeneity of data access and data formats increase the pain point of
    finding relevant and consumable data and AI assets faster with consistent data
    and AI governance. It becomes even harder to understand data characteristics such
    as data currency, data quality, and trustworthiness of AI and manage data and
    AI governance rules and processes as required by the SLA of a data consumer use
    case.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 数据访问和数据格式的异质性增加了在一致的数据和AI治理下更快地找到相关和可消费的数据和AI资产的压力点。理解数据特征，如数据货币、数据质量以及AI的可信度，以及根据数据消费者用例的SLA要求管理数据和AI治理规则和流程变得更加困难。
- en: Let us now explore what it means to deploy a Data Fabric architecture and Data
    Mesh solution in a hybrid cloud landscape.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来探讨在混合云环境中部署数据编织架构和数据网格解决方案意味着什么。
- en: Data Fabric and Data Mesh in Hybrid Cloud
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混合云中的数据编织和数据网格
- en: Applying a Data Fabric architecture and implementing a Data Mesh solution in
    a hybrid cloud environment requires similar capabilities as we have discussed
    throughout this book, namely, intelligent cataloging, active metadata, semantic
    knowledge graphs, self-service capabilities, etc. While costs may be reduced by
    leveraging cloud services, the complexity, however, can increase significantly
    introducing imperatives for both concepts to bridge additional boundaries and
    ensuring integration across disparate systems and public cloud providers.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 在混合云环境中应用数据编织架构并实施数据网格解决方案需要与我们在这本书中讨论的类似能力，即智能编目、活动元数据、语义知识图谱、自助服务能力等。虽然通过利用云服务可以降低成本，但复杂性却可能显著增加，这要求这两个概念都要跨越额外的边界，并确保跨不同系统和公共云提供商的集成。
- en: In this section we examine these imperatives, both for a Data Fabric architecture
    and a Data Mesh solution deployed in hybrid cloud landscapes.
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们检查这些必要性，包括在混合云环境中部署的数据编织架构和数据网格解决方案。
- en: Data Fabric Architecture in Hybrid Cloud
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 混合云中的数据编织架构
- en: We introduced the Data Fabric architecture in Chapter [11](537582_1_En_11_Chapter.xhtml)
    as a data architecture that defines data standards in an organization. Let us
    look how it provides the mechanism to manage the added data complexity in a heterogeneous
    hybrid cloud environment.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在[第11章](537582_1_En_11_Chapter.xhtml)中介绍了数据编织架构，将其作为一种在组织中定义数据标准的架构。让我们看看它是如何提供机制来管理异构混合云环境中的附加数据复杂性的。
- en: Please, review the right side of Figure [3-7](537582_1_En_3_Chapter.xhtml#Fig7) in
    Chapter [3](537582_1_En_3_Chapter.xhtml), which illustrates a sample configuration
    for data stores in a hybrid cloud environment. It is key to establish a horizontal
    data management layer across all data stores that need to be *woven* together.
    This horizontal layer can be materialized based on an enterprise-wide knowledge
    catalog that includes active metadata from data and AI assets collectively from
    all systems (including on-premises and private cloud systems) and public cloud
    providers.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 请查看第[3](537582_1_En_3_Chapter.xhtml#Fig7)章中图[3-7](537582_1_En_3_Chapter.xhtml#Fig7)的右侧，该图展示了混合云环境中数据存储的示例配置。在所有需要*编织*在一起的数据存储之间建立横向数据管理层是关键。这个横向层可以基于一个企业级知识编目来实现，该编目包括来自所有系统（包括本地和私有云系统）以及公共云提供商的数据和AI资产的活动元数据。
- en: Alternatively, it may also follow a distributed paradigm of services-based knowledge
    cataloging considering individual knowledge catalogs for data and AI assets stored,
    managed, and governed per individual system or cloud service provider, as depicted
    in Figure [12-1](#Fig1).
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，它也可能遵循基于服务的知识编目的分布式范式，考虑为存储、管理和治理的每个系统或云服务提供商的个体知识编目，如图[12-1](#Fig1)所示。
- en: Both Data Fabric architecture deployment options (distributed and centralized)
    require integration capabilities to bridge boundaries between systems and public
    cloud service providers. The distributed deployment option (left side of Figure
    [12-1](#Fig1)) requires orchestration and metadata exchange capabilities across
    all catalogs (*Catalog_A*, *Catalog_B*, and *Catalog_C*) as illustrated by the
    dashed arrows between the catalogs, to enable consumption of data and AI assets
    and services across systems and public cloud providers.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 两种数据编织架构部署选项（分布式和集中式）都需要集成能力，以弥合系统和公共云服务提供商之间的界限。分布式部署选项（图[12-1](#Fig1)的左侧）需要跨所有编目（*Catalog_A*、*Catalog_B*和*Catalog_C*）进行编排和元数据交换能力，如图中编目之间的虚线箭头所示，以实现跨系统和公共云提供商的数据和AI资产及服务的消费。
- en: '![](../images/537582_1_En_12_Chapter/537582_1_En_12_Fig1_HTML.png)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_12_Chapter/537582_1_En_12_Fig1_HTML.png)'
- en: 2 cloud architectures. 1\. The cloud app 1 and 2 are the I B M cloud and A W
    S share data with catalogs a and b, respectively. The hybrid cloud of on-premises
    app 3 shares data with the database and catalog c. All catalogs share data. 2\.
    The same architecture shares data only with a central knowledge catalog.
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: 2种云架构。1. 云应用1和2分别是IBM云和AWS，分别与编目a和b共享数据。本地应用3的混合云与数据库和编目c共享数据。所有编目都共享数据。2. 相同的架构仅与中心知识编目共享数据。
- en: Figure 12-1
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 图12-1
- en: Central and Distributed Cataloging in Hybrid Cloud
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 混合云中的中心化和分布式编目
- en: This can, for instance, be achieved via an Egeria cohort^([3](#Fn3)) implementation,
    as described in the “Data Product” section of Chapter [2](537582_1_En_2_Chapter.xhtml).
    The centralized deployment option (right side of Figure [12-1](#Fig1)) may appear
    as a more straightforward and simple solution; however, maintaining and leveraging
    a central knowledge catalog requires connections across all systems and public
    cloud service providers. Especially performing the rich set of knowledge catalog
    functions, such as discovery and data profiling, quality assessments, and metadata
    enrichments, as well as using a central knowledge catalog for DataOps and ModelOps
    purposes addressing the entire lifecycle of data and AI assets, makes a centralized
    deployment option challenging as well.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这可以通过Egeria群体^([3](#Fn3))实现，如第[2](537582_1_En_2_Chapter.xhtml)章“数据产品”部分所述。集中部署选项（图[12-1](#Fig1)的右侧）可能看起来是一个更直接和简单的解决方案；然而，维护和利用中心知识编目需要跨所有系统和公共云服务提供商的连接。特别是执行丰富的知识编目功能，如发现和数据概要分析、质量评估和元数据丰富，以及使用中心知识编目进行DataOps和ModelOps，以解决数据和AI资产的全生命周期，这使得集中部署选项也具有挑战性。
- en: Figure [12-1](#Fig1) is focusing on the cataloging aspects only. However, additional
    aspects have to be taken into consideration when discussing a Data Fabric architecture
    in a hybrid cloud environment, such as data access and consumption by data engineers,
    data scientists, business users, etc., data and AI governance including trustworthy
    AI, DataOps and ModelOps, and so forth.^([4](#Fn4))
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [12-1](#Fig1) 仅关注目录化方面。然而，在讨论混合云环境中的数据网格架构时，还需要考虑其他方面，例如数据工程师、数据科学家、商业用户等的数据访问和消费，数据与人工智能治理（包括可信人工智能）、DataOps
    和 ModelOps 等。
- en: Let us continue the discussion focusing on the deployment of Data Mesh solutions
    in hybrid cloud environments.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论，重点关注在混合云环境中部署数据网格解决方案。
- en: Data Mesh Solution in Hybrid Cloud
  id: totrans-257
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 混合云环境中的数据网格解决方案
- en: Examining the implementation of a Data Mesh within a hybrid cloud environment,
    and understanding how these two concepts are interrelated, requires us to describe
    how data products are produced and consumed. Furthermore, we need to detail out
    the role of the distributed knowledge catalogs in the context of various data
    sources, their corresponding metadata, and the specifications for the various
    data products. In addition, the data marketplace – we may rather use the term
    *data and data product marketplace* – needs to be depicted in this hybrid cloud
    environment. This discussion assumes familiarity with the concepts as we have
    described them in Chapter [2](537582_1_En_2_Chapter.xhtml) and the section “Data
    Fabric for a Data Mesh Solution” in Chapter [10](537582_1_En_10_Chapter.xhtml).
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 检查混合云环境中数据网格的实施情况，并理解这两个概念是如何相互关联的，需要我们描述数据产品的生产和使用方式。此外，我们还需要详细说明分布式知识目录在各个数据源、相应的元数据和各种数据产品规范方面的作用。此外，数据市场——我们可能更愿意使用术语
    *数据和数据产品市场*——需要在这个混合云环境中进行描绘。这次讨论假设您熟悉我们在第 [2](537582_1_En_2_Chapter.xhtml) 章和第
    [10](537582_1_En_10_Chapter.xhtml) 章中“数据网格解决方案的数据网格”部分所描述的概念。
- en: We are assuming a distributed, organizational, and federated approach, where
    each LoB or organization is pursuing their Data Mesh initiative, building data
    products based on their corresponding business imperatives and use case scenarios.
    As you can imagine, a knowledge catalog enables each LoB to build data products,
    as well as making the data products discoverable for consumption by business users.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 我们假设采用分布式、组织和联邦的方法，其中每个业务部门或组织都在追求其数据网格倡议，基于其相应的业务需求和用例场景构建数据产品。正如您所想象的那样，知识目录使每个业务部门能够构建数据产品，同时也使数据产品对商业用户可发现和消费。
- en: As you can see in Figure [12-2](#Fig2), we are assuming dedicated knowledge
    catalogs (*Catalog_A*, *Catalog_B*, *Catalog_C*, and *Catalog_D*), which are dedicated
    to the four LoB organizations using on-premises infrastructure and services from
    three public cloud providers (IBM Cloud, AWS, and MS Azure). For simplification
    purposes, we are furthermore assuming a relationship between data domain owners
    and LoBs who are tasked with building their corresponding data products. Each
    catalog is capturing the metadata, which is related to various data sources, owned
    by corresponding data domain owners.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如您在图 [12-2](#Fig2) 中所见，我们假设有专门的知识目录（*Catalog_A*、*Catalog_B*、*Catalog_C* 和 *Catalog_D*），这些目录专门服务于使用本地基础设施和服务的四个业务部门组织（IBM
    Cloud、AWS 和 MS Azure）。为了简化起见，我们还假设数据域所有者与负责构建其相应数据产品的业务部门之间存在关系。每个目录都在捕获与相应数据域所有者拥有的各种数据源相关的元数据。
- en: For instance, *Data_domain_owner_1* owns *Data_Source_1*, which serves as a
    base to automatically generate the *Data_source_1 metadata*. In addition to this
    metadata, the data product developers (including data engineers) in conjunction
    with data product owners are generating data product specifications that are equally
    stored in the catalog.
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，*Data_domain_owner_1* 拥有 *Data_Source_1*，该数据源作为自动生成 *Data_source_1 元数据*的基础。除了这些元数据之外，数据产品开发者（包括数据工程师）与数据产品所有者一起生成数据产品规范，这些规范同样存储在目录中。
- en: These data product specifications are generated during the product build process
    and stored in the catalog using, for instance, XML, JSON, or any other data exchange
    standard.
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 这些数据产品规范是在产品构建过程中生成的，并使用例如 XML、JSON 或任何其他数据交换标准存储在目录中。
- en: Once data products are registered in the data product marketplace, they can
    be discovered through access methods, locations (i.e., URI endpoints), SLAs, etc.
    Generating the data product specification requires access to the metadata of the
    corresponding data sources, as well as to the data sources themselves. The data
    products themselves are not stored in the data product marketplace; they are rather
    registered there using XML, JSON, etc. and can therefore be searched for, discovered,
    and consumed.^([5](#Fn5))
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦数据产品在数据产品市场中注册，它们可以通过访问方法、位置（即 URI 端点）、SLA 等进行发现。生成数据产品规范需要访问对应数据源的元数据以及数据源本身。数据产品本身并不存储在数据产品市场中；它们使用
    XML、JSON 等进行注册，因此可以搜索、发现和消费。[5](#Fn5)
- en: 'There are two particular aspects regarding Data Mesh solutions in hybrid cloud
    environments that are related to *cross-LoB scenarios*. The first scenario relates
    to data products that are derived from data sources that belong to different data
    domain owners, whereas the second scenario relates to data products that are derived
    from data sources from their corresponding data domain as well as other data products
    that are produced by a different LoB. Let us examine these two scenarios in detail,
    as they have been depicted in Figure [12-2](#Fig2) as well:'
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 在混合云环境中，关于数据网格解决方案的两个特定方面与 *跨部门场景* 有关。第一个场景与从属于不同数据域所有者的数据源中派生出的数据产品相关，而第二个场景与从对应数据域的数据源以及其他由不同部门产生的数据产品中派生出的数据产品相关。让我们详细考察这两个场景，如图
    [12-2](#Fig2) 所示：
- en: '![](../images/537582_1_En_12_Chapter/537582_1_En_12_Fig2_HTML.png)'
  id: totrans-265
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_12_Chapter/537582_1_En_12_Fig2_HTML.png)'
- en: A database cloud architecture. Data sources 1 to 4, data source 1 to 4 metadata,
    and data product A to D specification available arranged in 4 sets in the data
    marketplace. The data are shared from the data marketplace to data products A
    to D called on-premises, i b m cloud, a w s, and m s azure.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
  zh: 数据云架构。数据源 1 到 4，数据源 1 到 4 的元数据，以及数据产品 A 到 D 的规范，在数据市场中以 4 组的形式排列。数据从数据市场共享到本地、IBM
    云、AWS 和 MS Azure 的数据产品 A 到 D。
- en: Figure 12-2
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 图 12-2
- en: Data Mesh in a Hybrid Cloud Environment
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 混合云环境中的数据网格
- en: '**Scenario 1** – data products that are derived from data sources that belong
    to different data domain owners: As depicted in Figure [12-2](#Fig2), Data_product_B
    is based on Data_Source_2 belonging to Data_domain_owner_2, as well as Data_Source_1
    belonging to Data_domain_owner_1\. Thus, in order to build Data_product_B, complementary
    access to the metadata generated from Data_Source_1 (dashed arrow 1) as well as
    to Data_source_1 itself (dashed arrow 2) is required. The Data_product_B specification
    stored in Catalog B is thus derived from artefacts that are owned by Data_domain_owner_1
    and Data_domain_owner_2.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**场景 1** – 从属于不同数据域所有者的数据源中派生出的数据产品：如图 [12-2](#Fig2) 所示，数据产品 B 基于 Data_domain_owner_2
    所属的数据源 Data_Source_2，以及 Data_domain_owner_1 所属的数据源 Data_Source_1。因此，为了构建数据产品 B，需要补充访问从数据源
    1 生成的元数据（虚线箭头 1）以及数据源 1 本身（虚线箭头 2）。因此，存储在目录 B 中的数据产品 B 规范是从 Data_domain_owner_1
    和 Data_domain_owner_2 拥有的工件中派生出来的。'
- en: '**Scenario 2** – data products that are derived from data sources from their
    corresponding data domain as well as other data products: As illustrated by Figure
    [12-2](#Fig2), Data_product_D is based on Data_Source_4 belonging to Data_domain_owner_4,
    as well as Data_product_C. Thus, in order to build Data_product_D, complimentary
    access to Data_product_C (dashed arrow 3), as well as to the Data_product_C specification
    (dashed arrow 4) and Data_Source_3 (dashed arrow 5), is required. The Data_product_D
    specification stored in Catalog D is thus derived from artefacts that are owned
    by Data_domain_owner_3, Data_domain_owner_4, and the owner of Data_product_C.'
  id: totrans-270
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**场景 2** – 从对应数据域的数据源以及其他数据产品中派生出的数据产品：如图 [12-2](#Fig2) 所示，数据产品 D 基于 Data_domain_owner_4
    所属的数据源 Data_Source_4，以及数据产品 C。因此，为了构建数据产品 D，需要补充访问数据产品 C（虚线箭头 3），以及数据产品 C 的规范（虚线箭头
    4）和数据源 3（虚线箭头 5）。因此，存储在目录 D 中的数据产品 D 规范是从 Data_domain_owner_3、Data_domain_owner_4
    和数据产品 C 的所有者拥有的工件中派生出来的。'
- en: The challenges of these cross-Lob Data Mesh scenarios are presumably derived
    from the need to integrate cataloging including metadata exchange and consumption
    and even data product build and consumption across different on-premises infrastructure
    and public cloud service providers.^([6](#Fn6)) This requires data authorization
    and security measures and data exchange standards to be in place, implemented
    via hybrid cloud`–`wide data and AI governance, risk, and control. Furthermore,
    to adhere to Data Mesh self-service capabilities, DataOps, ModelOps, AIOps, trustworthy
    AI, etc. need to be implemented across on-premises and public cloud service providers
    addressing the end-to-end lifecycle requirements of data products, imposing additional
    challenges for an already difficult endeavor.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: 这些跨Lob数据网格场景的挑战可能源于需要整合包括元数据交换和消费以及甚至在不同本地基础设施和公共云服务提供商之间进行数据产品构建和消费的目录。这需要数据授权和安全措施以及数据交换标准，通过混合云-广泛的数据和AI治理、风险和控制来实现。此外，为了遵守数据网格自助服务功能，DataOps、ModelOps、AIOps、可信AI等需要在本地和公共云服务提供商中实施，以满足数据产品端到端的生命周期需求，这为已经困难的任务增加了额外的挑战。
- en: In the following section, we describe just a few benefits of Data Fabric and
    Data Mesh for a hybrid cloud environment.
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下部分，我们描述了数据编织和数据网格在混合云环境中的一些优势。
- en: Benefits of Data Fabric and Data Mesh for Hybrid Cloud
  id: totrans-273
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据编织和数据网格在混合云中的优势
- en: Although it may be challenging to implement a Data Fabric architecture and Data
    Mesh solution for a hybrid cloud environment, key benefits can doubtless be materialized.
    With the inevitable trend moving data and AI to the cloud and leveraging public
    cloud services, a Data Fabric architecture and Data Mesh solution augments the
    cloud value by enabling cross-organizational and cross-domain data and AI governance
    and enables data consumers and business users to build data products for a data
    product marketplace with data and AI assets regardless of where they reside and
    whom they are owned by.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在混合云环境中实施数据编织架构和数据网格解决方案可能具有挑战性，但无疑可以带来关键的好处。随着将数据和AI迁移到云以及利用公共云服务的不可避免趋势，数据编织架构和数据网格解决方案通过实现跨组织和跨领域的数据和AI治理，增强了云的价值，并允许数据消费者和业务用户无论数据资产位于何处以及归谁所有，都可以构建数据产品市场。
- en: Entangling a Data Mesh with hybrid cloud provides agility and flexibility regarding
    deployments and consumption of data products across public cloud service providers;
    data products may be deployed in one public cloud (i.e., IBM Cloud) and used as
    input to produce another data product that is deployed in a different public cloud
    (i.e., MS Azure). For instance, data may be stored in one public cloud, leveraged
    for training, validation, and testing of an AI model on a second public cloud,
    and eventually deployed and operationalized as a data product on-premises, where
    it is used for inferencing within a transactional application.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据网格与混合云结合使用，提供了在公共云服务提供商之间部署和消费数据产品的灵活性和敏捷性；数据产品可以部署在一个公共云（例如，IBM Cloud）中，并作为输入用于生产另一个部署在不同公共云（例如，MS
    Azure）中的数据产品。例如，数据可以存储在一个公共云中，用于在第二个公共云上对AI模型进行训练、验证和测试，最终作为数据产品在本地部署和运营，并在交易应用中进行推理。
- en: Building a Data Mesh solution for hybrid cloud provides flexibility in using
    technology and products from different public cloud service providers, mapping
    their services and capabilities to the development- and deployment-related requirements
    of a particular data product. For instance, data products may be associated with
    different business domains and purposes, for example, AI models, BI reports, ETL
    processes, 360-degree customer data, etc. These different domains require different
    services and data product development and operationalization environments. A hybrid
    cloud landscape is particularly well suited to address these specific needs.
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 为混合云构建数据网格解决方案提供了使用来自不同公共云服务提供商的技术和产品的灵活性，将它们的服务和能力映射到特定数据产品的开发和部署相关需求。例如，数据产品可能与不同的业务领域和目的相关联，例如，AI模型、BI报告、ETL过程、360度客户数据等。这些不同的领域需要不同的服务和数据产品开发和运营环境。混合云环境特别适合解决这些具体需求。
- en: A Data Fabric architecture enables such a distributed Data Mesh solution for
    a hybrid cloud environment. Implementing intelligent information integration,
    generating and leveraging active metadata, deploying federated cataloging with
    metadata exchange, and establishing self-service capabilities for data and AI
    asset consumption are essential capabilities to underpin such a Data Mesh solution
    in a hybrid cloud landscape.
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织架构使混合云环境中的分布式数据网格解决方案成为可能。实现智能信息集成、生成和利用活动元数据、部署带有元数据交换的联邦编目以及建立数据和分析资产的自助消费能力是支撑混合云环境中此类数据网格解决方案的基本能力。
- en: Key Takeaways
  id: totrans-278
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [12-1](#Tab1).
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以以下要点总结本章内容，详见表 [12-1](#Tab1)。
- en: Table 12-1
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 表 12-1
- en: Key Takeaways
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-level Description |'
  id: totrans-282
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-283
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Hybrid cloud is an agile, distributed compute environment. | Hybrid cloud
    integrates public cloud services, private cloud services, and on-premises infrastructure
    to provide an agile and flexible distributed compute environment. |'
  id: totrans-284
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 混合云是一种敏捷的分布式计算环境。 | 混合云将公共云服务、私有云服务和本地基础设施集成，以提供一个敏捷和灵活的分布式计算环境。 |'
- en: '| 2 | Hybrid cloud increases data access complexity. | Heterogeneity of data
    access and data formats in a hybrid cloud increase the pain point of finding relevant
    and consumable data faster with consistent data governance. |'
  id: totrans-285
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 混合云增加了数据访问复杂性。 | 混合云中数据访问和数据格式的异质性增加了在一致的数据治理下更快地找到相关和可消费数据的痛点。 |'
- en: '| 3 | Data Fabric adds a data management layer. | Data Fabric architecture
    provides the mechanism to manage the added data and AI complexity in a hybrid
    cloud landscape. |'
  id: totrans-286
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 数据编织添加了一个数据管理层。 | 数据编织架构为混合云环境中管理添加的数据和AI复杂性提供了机制。 |'
- en: '| 4 | There are two Data Fabric deployment options. | Two Data Fabric architecture
    deployment options (distributed and centralized) can be chosen, depending on preferences
    and use case requirements. |'
  id: totrans-287
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 有两种数据编织部署选项。 | 根据偏好和用例需求，可以选择两种数据编织架构部署选项（分布式和集中式）。 |'
- en: '| 5 | There are two Data Mesh scenarios in hybrid cloud. | The two Data Mesh
    scenarios enable cross-LoB and cross-organizational data source and data product
    deployments. |'
  id: totrans-288
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 混合云中有两种数据网格场景。 | 这两种数据网格场景使跨部门和组织的数据源和数据产品部署成为可能。 |'
- en: '| 6 | Hybrid cloud and Data Mesh combined represent additional value. | Data
    Mesh with hybrid cloud provides agility and flexibility regarding deployments
    and consumption of data products across public cloud service providers. |'
  id: totrans-289
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 混合云与数据网格的结合代表额外的价值。 | 数据网格与混合云的结合，在公共云服务提供商的数据产品部署和消费方面提供了敏捷性和灵活性。 |'
- en: '| 7 | A Data Fabric is required to enable a Data Mesh. | A Data Fabric architecture
    enables and underpins a distributed Data Mesh solution for a hybrid cloud environment.
    |'
  id: totrans-290
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 数据编织是启用数据网格所必需的。 | 数据编织架构使混合云环境中的分布式数据网格解决方案成为可能，并为其提供支撑。 |'
