    (accessed August 13, 2022).
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Dehghani, Z., *第*[*4*](537582_1_En_4_Chapter.xhtml)*章. 自助数据平台原理，[《数据网格》](https://www.oreilly.com/library/view/data-mesh/9781492092384/ch04.html)
    (访问日期：2022年8月13日).
- en: 'Giordano, A., *Data Integration Blueprint and Modeling, Techniques for a Scalable
    and Sustainable Architecture*, IBM Press, 2013, ISBN-13: 978-0137084937.'
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Giordano, A., *数据集成蓝图和建模：可扩展和可持续架构的技术*，IBM出版社，2013年，ISBN-13：978-0137084937.
- en: Gartner, *Magic Quadrant for Data Integration Tools*, 2021, [`https://www.gartner.com/doc/reprints?id=1-27E7HBB5&ct=210909&st=sb`](https://www.gartner.com/doc/reprints%253Fid%253D1-27E7HBB5%2526ct%253D210909%2526st%253Dsb)
    (accessed August 14, 2022).
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: Gartner，*数据集成工具魔力象限*，2021年，[《数据集成工具魔力象限》](https://www.gartner.com/doc/reprints?id=1-27E7HBB5&ct=210909&st=sb)
    (访问日期：2022年8月14日).
- en: 11. Data Fabric Within an Enterprise Architecture
  id: totrans-134
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 11. 企业架构中的数据编织
- en: Any data architecture, and therefore also our Data Fabric architecture, needs
    to be looked at in conjunction with the implemented application architecture in
    an existing enterprise landscape. Many organizations are in the process to modernize
    and digitalize their application and data landscape. Applications have different
    requirements with respect to data characteristics, which may recommend a particular
    data architecture implementation over another, for example, characterized by data
    access based on data virtualization or data replication and transformation.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 任何数据架构，因此也包括我们的数据编织架构，都需要与现有企业景观中实施的应用架构相结合来考虑。许多组织正在其应用和数据景观的现代化和数字化转型过程中。应用对数据特性的要求不同，这可能会推荐一种特定的数据架构实现而不是另一种，例如，基于数据虚拟化或数据复制和转换的数据访问。
- en: In this chapter, we briefly revisit the key imperatives of an enterprise and
    application architecture before we elaborate on key aspects of a Data Fabric within
    an enterprise architecture, which includes challenges and benefits. Using a conceptual
    architecture model as a representation of a Data Fabric, we illustrate how the
    most essential components of a Data Fabric play in concert with imperatives that
    are derived from the application and business domains.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们在详细阐述企业架构中数据编织的关键方面之前，简要回顾了企业架构和应用架构的关键必要性，这包括挑战和益处。使用概念架构模型作为数据编织的表示，我们说明了数据编织的最基本组件如何与从应用和业务领域推导出的必要性协同作用。
- en: The integration of a Data Fabric architecture within a given enterprise and
    application architecture provides a basis to build a Data Mesh solution.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 在给定的企业架构和应用架构中集成数据编织架构为构建数据网格解决方案提供了基础。
- en: Introduction
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: In Chapter [1](537582_1_En_1_Chapter.xhtml) we saw that a Data Fabric architecture
    is an evolution from previous data architectures influenced by new business-driven
    data requirements exploiting new technologies. From a pure IT perspective, almost
    everything seems to be possible today. Especially in larger organizations, well-defined
    architectures with IT implementation recommendations based on functional and non-functional
    requirements are necessary to avoid an unreliable, unmanageable, and overly expensive
    IT landscape. An architecture is a clear representation of a conceptual framework
    of components and their relationship at a specific point in time.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[1](537582_1_En_1_Chapter.xhtml)章中，我们了解到数据编织架构是从受新业务驱动数据需求影响的新技术影响下的先前数据架构演变而来的。从纯IT角度来看，几乎一切似乎都是可能的。特别是在大型组织中，基于功能和非功能性要求的IT实施建议的明确架构是必要的，以避免不可靠、难以管理和过于昂贵的IT景观。架构是特定时间点组件及其关系的概念框架的清晰表示。
- en: It is an acknowledgment that organizations make better IT implementation decisions
    when they take a broader view and describe the need for data architecture capabilities
    as part of an enterprise architecture with emphasis on business needs. Looking
    at data architectures in organizations over time, you can observe a shift from
    data architecture determining application architecture to the other way around,
    application architecture determining or at least strongly influencing the underlying
    data architecture, driving significantly different software and hardware delivery
    systems.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个认可，即当组织从更广泛的视角出发，并将数据架构能力描述为企业架构的一部分，强调业务需求时，它们会做出更好的IT实施决策。随着时间的推移，观察组织中的数据架构，你可以观察到从数据架构决定应用架构到相反方向的转变，即应用架构决定或至少强烈影响底层数据架构，推动显著不同的软件和硬件交付系统。
- en: In this chapter we briefly review the levels of an enterprise architecture,
    followed by a discussion of the current three major approaches for an application
    architecture and its implications on the underlying data architecture. We revisit
    the main data architecture decision criteria and share a methodology on how to
    evaluate them based on specific business requirements. This methodology helps
    choose the most applicable implementation based on technical characteristics and
    not individual opinions and preferences.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们简要回顾了企业架构的级别，随后讨论了当前应用架构的三个主要方法及其对底层数据架构的影响。我们回顾了主要数据架构决策标准，并分享了一种基于特定业务需求评估它们的方法。这种方法有助于根据技术特性选择最适用的实现，而不是基于个人意见和偏好。
- en: Furthermore, we introduce the conceptual model and resulting components of a
    Data Fabric architecture, including its relevance for implementing a Data Mesh
    solution.^([1](#Fn1))
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们介绍了数据布料架构的概念模型和结果组件，包括其在实施数据网格解决方案中的相关性.^([1](#Fn1))
- en: What Is Enterprise Architecture?
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是企业架构？
- en: The enterprise architecture framework was first developed as a reference model
    by the National Institute of Standards and Technology (NIST) in the late 1980s.^([2](#Fn2))
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 企业架构框架最初于20世纪80年代末由国家标准与技术研究院（NIST）作为参考模型开发.^([2](#Fn2))
- en: It took until the late 1990s before its relevance was widely recognized and
    enterprises used it as directions for their operations. Today, no organization
    can implement an efficient IT ecosystem without a well-defined enterprise architecture
    that is specific to its needs. The enterprise architecture consists of five layers
    as shown in Figure [11-1](#Fig1).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 直到20世纪90年代末，其相关性才被广泛认可，企业开始将其作为其运营的指导。如今，没有一家组织能够在没有针对其特定需求明确定义的企业架构的情况下实施高效的IT生态系统。企业架构由五个层级组成，如图
    [11-1](#Fig1) 所示。
- en: '![](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig1_HTML.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig1_HTML.png)'
- en: A pyramid structure divides into 5 parts such as business, information, application,
    data architecture and delivery systems architecture, hardware, software, and communication.
    Feedback is got from data to business, and enterprise standards if got from business-to-data
    architecture.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 金字塔结构分为5个部分，如业务、信息、应用程序、数据架构和交付系统架构、硬件、软件和通信。从数据到业务以及从业务到数据架构获取反馈。
- en: Figure 11-1
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-1
- en: Enterprise Architecture Framework
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 企业架构框架
- en: 'Each level includes components that define enterprise standards and requirements.
    The feedback loop back to the business architecture is critical for the adoption
    of new industry trends and technologies, making the enterprise architecture^([3](#Fn3))
    a living document:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 每个层级都包含定义企业标准和要求的组件。将反馈循环回业务架构对于采用新的行业趋势和技术至关重要，这使得企业架构^([3](#Fn3))成为一份活文档：
- en: '**Business architecture level**: Describes the entire business landscape of
    the enterprise or a specific line of business, which is in contact with external
    organizations, including business partners, and end customers. It includes the
    business practices of functional areas and resulting external and internal corporate
    reporting requirements. It unambiguously drives the information architecture level.'
  id: totrans-151
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**业务架构层级**：描述了企业的整个业务景观或特定业务线，它与外部组织（包括业务伙伴和最终客户）接触。它包括功能领域的业务实践以及由此产生的内外部企业报告要求。它明确地驱动信息架构层级。'
- en: '**Information architecture level**: Specifies the contents, presentation forms,
    and formats of information required for the entire enterprise or a line of business,
    for example, industry standards for business-to-business (B2B) data exchange such
    as SEPA^([4](#Fn4)) or HIPAA.^([5](#Fn5)) Compliance and security regulations
    as well as the business glossary are also defined on this level. It prescribes
    the information systems and application architecture level.'
  id: totrans-152
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**信息架构层级**：指定整个企业或业务线所需信息的内 容、呈现形式和格式，例如，行业标准的企业间（B2B）数据交换，如SEPA^([4](#Fn4))或HIPAA.^([5](#Fn5))合规性和安全法规，以及业务术语表也在这一层级定义。它规定了信息系统和应用程序架构层级。'
- en: '**Application architecture level**: Specifies the applications with their main
    components and functions, application integration, and software development standards,
    including application interfaces and programming languages. Later in this chapter,
    we will discuss three major approaches that are currently popular for the core
    system transformation. The application architecture strongly determines the main
    characteristics of the data architecture.'
  id: totrans-153
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**应用程序架构层级**：指定应用程序及其主要组件和功能、应用程序集成和软件开发标准，包括应用程序接口和编程语言。在本章的后面部分，我们将讨论目前流行的三种主要的核心系统转型方法。应用程序架构强烈决定了数据架构的主要特征。'
- en: '**Data architecture level**: Specifies the framework for access and use of
    data, its maintenance, as well as the communication between data. It includes
    data models and their elements and structures and defines standards for naming
    conventions and representations, typically including the data dictionary. Both
    application and data architectures are implemented and supported by the delivery
    system architecture.'
  id: totrans-154
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据架构级别**：指定了访问和使用数据、其维护以及数据之间通信的框架。它包括数据模型及其元素和结构，并定义了命名约定和表示的标准，通常包括数据字典。应用和数据架构都由交付系统架构实现和支持。'
- en: '**Delivery system architecture level**: Represents the technical implementation
    details regarding software, hardware, and network and communication in support
    of the application and data architectures. It includes hardware platforms, operating
    systems, utilities and tools, and storage media. Cloud deployment standards (public
    or private cloud) belong in this level.^([6](#Fn6))'
  id: totrans-155
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**交付系统架构级别**：代表支持应用和数据架构的软件、硬件、网络和通信的技术实现细节。它包括硬件平台、操作系统、实用工具和工具以及存储媒体。云部署标准（公共或私有云）属于此级别。[6](#Fn6)'
- en: An absolute most common mistake that architects make is to neglect the separation
    of application and data architectures from the delivery system architecture. Guided
    by the architecture decision criteria, multiple options for the technical implementation
    of a data or application architecture should be defined in the delivery system
    architecture and not in the preceding architectural layers. In addition, implementation
    options should be complemented with pros and cons to derive well-balanced decisions.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 建筑师犯的一个绝对最普遍的错误是忽视将应用和数据架构与交付系统架构分离。在架构决策标准的指导下，应在交付系统架构中而不是在先前的架构层中定义数据或应用架构的技术实现选项。此外，应补充实施选项的优缺点，以得出平衡的决策。
- en: These guidelines are most relevant for implementing a Data Fabric architecture,
    especially since there is no single architectural approach that is applicable
    and advantageous for all use cases.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指南对于实施数据布线架构最为相关，尤其是在没有单一适用于所有用例且具有优势的架构方法的情况下。
- en: What Is Application Architecture?
  id: totrans-158
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是应用架构？
- en: An application architecture describes the behavior of applications, how they
    interact with each other and with users, and how data is produced and consumed.
    For a long time, the application development focus was on providing new functionality
    for a specific line of business. The internal application structure was monolithic,
    very interconnected, making any change to the user interface complex and expensive,
    as well as causing the level of code reusability to significantly decrease.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 应用架构描述了应用程序的行为，它们如何相互交互以及如何与用户交互，以及数据的产生和消费。长期以来，应用开发的重点是提供特定业务线的全新功能。内部应用结构是单体化的，非常互联，这使得对用户界面的任何更改都变得复杂且昂贵，同时也显著降低了代码的可重用性。
- en: To support many more user communication channels such as B2B, online, and mobile
    and to react to changed industry trends quickly, current application architectures
    include three major approaches. Each organization’s environment, end state requirements,
    risk tolerance, financial justification, etc. define the business impact of each
    of those approaches – clearly suggesting hybrid approaches and variants as desirable
    approaches.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持更多用户通信渠道，如B2B、在线和移动，并快速应对行业趋势的变化，当前的应用架构包括三种主要方法。每个组织的环境、最终状态要求、风险承受能力、财务合理性等定义了这些方法中的每一个的业务影响——明确地表明混合方法和变体是理想的方法。
- en: 'The following are the three major application architecture approaches:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 以下三种主要的应用架构方法：
- en: '**API enablement**: Seems to be the simplest approach to transform existing
    applications, where application functionalities are wrapped in REST-based application
    programming interfaces (APIs) to make them easily consumable for other applications
    and user channels, hiding all platform and implementation details. A single API
    can have multiple implementations for different sets of users, for example, low-value
    consumer implementations may prefer commodity platforms vs. high-value consumer
    implementations may choose highly reliable and scalable configurations.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**API启用**：似乎是转换现有应用的最简单方法，其中应用程序功能被封装在基于REST的应用程序编程接口（API）中，以便其他应用程序和用户渠道可以轻松消费，同时隐藏所有平台和实现细节。单个API可以为不同的用户集提供多个实现，例如，低价值消费者实现可能更喜欢商品平台，而高价值消费者实现可能选择高度可靠和可扩展的配置。'
- en: '**Containerization**: Is the systematic movement of application logic into
    a container, which is a pre-built stack of operating system, middleware, and application
    code. Containers have several advantages, that is, through open source and standardization
    efforts, containers are portable across platforms and can be deployed anywhere,
    including on-premises and in a cloud environment. Containers, once built, are
    unchangeable and signed, making them more secure from unintended or malicious
    changes. It typically preserves data and operational processes while quickly scaling
    its consumption.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**容器化**：是将应用程序逻辑系统地移动到容器中的过程，容器是一个预构建的操作系统、中间件和应用代码的堆栈。容器具有多个优点，即通过开源和标准化努力，容器可以在各个平台上进行移植，并且可以部署在任何地方，包括本地和云环境。一旦构建，容器是不可更改且经过签名的，这使得它们更安全，不易受到意外或恶意更改的影响。它通常在快速扩展其消费的同时保留数据和操作流程。'
- en: '**Microservices segmentation**: Is the total restructuring of existing applications
    into cloud-native applications. While this approach is attractive for new applications,
    it can be extremely risky for transforming existing applications. Microservices^([7](#Fn7))
    segmentation has profound consequences on the underlying data architecture, which
    typically results in a highly partitioned data model.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微服务分割**：是将现有应用程序完全重构为云原生应用程序的过程。虽然这种方法对新应用程序具有吸引力，但对于转换现有应用程序来说可能极具风险。微服务分割对底层数据架构有深远的影响，通常导致高度分区化的数据模型。'
- en: Figure [11-2](#Fig2) illustrates the business impact vs. feasibility of the
    three application architecture approaches when transforming existing applications.
    API enablement of existing functionality delivers good business value for relatively
    low investment and is a widely adopted approach. It is followed by application
    containerization and incremental rearchitecture of applications adopting microservices.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [11-2](#Fig2) 展示了在转换现有应用程序时三种应用程序架构方法在业务影响与可行性方面的对比。现有功能的API启用为相对较低的投资带来了良好的商业价值，并且是一种广泛采用的方法。它随后是应用程序容器化和采用微服务的应用程序的增量重构。
- en: '![](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig2_HTML.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig2_HTML.png)'
- en: A graphical illustration of business impact from low to high versus feasibility
    from hard to easy. The graph is represented in 3 segments from the top right corner.
    1\. No brainers. 2\. big bets. 3\. Unwise for now or revisit. 3 ovals occupy big
    bets and few parts of other sectors such as microservices segmentation, containerization,
    and A P I enablement.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 从低到高展示商业影响与从难到易展示可行性的图形说明。图表从右上角开始表示为3个部分。1. 毫无疑问。2. 大赌注。3. 现在不明智或重新审视。3个椭圆形占据了大赌注，以及微服务分割、容器化和API启用等少数其他领域的部分。
- en: Figure 11-2
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图 11-2
- en: Application Transformation Approaches
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序转换方法
- en: Microservices have a potential of a big business impact but also come with new
    data architecture considerations.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 微服务具有巨大的商业影响潜力，但也带来了新的数据架构考虑因素。
- en: 'The application modularity and data partitioning will drive data architecture
    decisions and has key implications on application logic:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序模块化和数据分区将驱动数据架构决策，并对应用程序逻辑有重要影响：
- en: '**Data access vs. data replication**: The first fundamental decision concerns
    data access of the original data vs. replicating the data for consumption, creating
    one or multiple copies. There are several advantages that favor data access, especially
    with availability of advanced data virtualization technologies. While it is straightforward
    to replicate data once, maintaining data replication pipelines over an extended
    period is expensive and time-consuming. It also typically creates data quality
    and data latency challenges for consuming applications. Accessing data in place
    accelerates the application transformation while preserving existing data management
    and recovery processes, therefore delivering value to the business faster.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据访问与数据复制**：第一个基本决策涉及原始数据的数据访问与为消费而复制数据，创建一个或多个副本。有几个优点有利于数据访问，尤其是在高级数据虚拟化技术可用的情况下。虽然复制数据一次是直接的，但维护数据复制管道在较长时间内是昂贵且耗时的。它通常还会为消费应用程序带来数据质量和数据延迟的挑战。在原地访问数据可以加速应用程序的转型，同时保留现有的数据管理和恢复流程，因此更快地为业务带来价值。'
- en: '**Data consistency vs. eventual consistency**: Data consistency considerations
    are introduced with data segmentation. Microservices by architecture are stateless.
    There is no transactional boundary across multiple microservices implementing
    a consistent change across multiple data sources. Subsequently, microservices
    are eventually consistent,^([8](#Fn8)) meaning that data consistency is reached
    when all microservices relevant for a particular use case execution succeed. If
    a microservice fails, previously executed logic may need to be undone, which may
    increase the amount of compensation logic and/or business processes needed for
    systems that are out of sync. The main benefit is that eventual consistency enables
    applications to be developed independently of each other. However, it can result
    in data quality issues. Therefore, the majority of microservices implementations
    so far focus on use cases that consume data but do not update data.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据一致性与最终一致性**：数据一致性考虑因素随着数据分段而引入。从架构上讲，微服务是无状态的。在实现跨多个数据源的一致性更改的多个微服务之间没有事务边界。因此，微服务最终是一致的，^([8](#Fn8))这意味着当所有与特定用例执行相关的微服务都成功时，数据一致性才达到。如果一个微服务失败，之前执行的逻辑可能需要撤销，这可能会增加需要为不同步的系统提供的补偿逻辑和/或业务流程的数量。主要好处是最终一致性使应用程序能够独立开发。然而，它可能导致数据质量问题。因此，迄今为止的大多数微服务实现都集中在消费数据但不更新数据的用例上。'
- en: In a Data Fabric, based on intelligent metadata, data consumers should get recommendations
    on intelligent information integration technology that is most appropriate for
    a specific use case.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据织锦中，基于智能元数据，数据消费者应该获得关于针对特定用例最合适的智能信息集成技术的推荐。
- en: Data Fabric as a Data Architecture
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据织锦作为数据架构
- en: A data architecture defines data standards in an organization, including how
    data is accessed and consumed. It furthermore describes the data structures used
    by the business units. Data integration also depends on the defined data architecture
    standards since data integration requires interaction between data.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 数据架构定义了一个组织中的数据标准，包括数据如何被访问和消费。它还描述了业务单元使用的数据结构。数据集成也依赖于定义的数据架构标准，因为数据集成需要数据之间的交互。
- en: 'Besides new technologies, there are various other constraints and influences
    that will impact the data architecture design, also called data architecture decision
    criteria. Those can be grouped in three categories:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 除了新技术之外，还有各种其他限制和影响因素将影响数据架构设计，也称为数据架构决策标准。这些可以分为三个类别：
- en: '**Capabilities or functional requirements**: This includes a description and
    prioritization of functional characteristics such as data consistency, data latency,
    quality and granularity of data, and data access and consumption requirements.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**能力或功能性需求**：这包括对数据一致性、数据延迟、数据质量与粒度以及数据访问和消费需求等功能性特性的描述和优先级排序。'
- en: '**Resilience or non-functional requirements**: It includes a description and
    prioritization of characteristics such as availability, maintenance, performance,
    simplicity, scalability, and security and data governance.'
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**弹性或非功能性需求**：它包括对可用性、维护、性能、简单性、可扩展性和安全性以及数据治理等特性的描述和优先级排序。'
- en: '**Financial or business requirements**: It includes description and prioritization
    of characteristics such as cost of infrastructure (cost of acquisition), service-level
    agreements, operational cost, time to value, and risk to the business.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**财务或业务需求**：它包括基础设施成本（获取成本）、服务级别协议、运营成本、价值实现时间和对业务的风险的描述和优先级排序。'
- en: The whole organization or a specific business unit defines requirements for
    particular use cases that lead to the relative prioritization of the data architecture
    decision criteria. Different implementations of the delivery system architecture,
    of course, satisfy those criteria to a varying degree.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 整个组织或特定的业务单元定义了特定用例的需求，从而导致数据架构决策标准的相对优先级。当然，不同的交付系统架构实现满足这些标准的程度各不相同。
- en: For example, accessing the original data via data virtualization provides more
    current and accurate data for targeted marketing campaigns in comparison with
    accessing ETL-transformed data in an EDW that may be a couple of days old. In
    addition, data virtualization guarantees data currency to any consumer. In turn,
    ETL-transformed data may better deliver on the data granularity needs for specific
    reporting needs, such as sales trending or reporting applications. However, ETL-transformed
    data may lag behind in data currency.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，通过数据虚拟化访问原始数据，与在可能已过时几天的EDW中访问ETL转换数据相比，为针对营销活动提供了更及时、更准确的数据。此外，数据虚拟化确保了数据对任何消费者都是最新的。反过来，ETL转换数据可能在满足特定报告需求的数据粒度方面表现更好，例如销售趋势或报告应用。然而，ETL转换数据可能在数据时效性方面落后。
- en: '![](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig3_HTML.png)'
  id: totrans-183
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig3_HTML.png)'
- en: A table architecture of data fabric. The table divides into 4 groups such as
    orchestration and life cycle, self-service, integration and transformation, and
    governance, knowledge, and semantics.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织的表架构。表分为4组，例如编排和生命周期、自助服务、集成和转换，以及治理、知识和语义。
- en: Figure 11-3
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-3
- en: Data Fabric Architecture Layers
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织架构层
- en: The strength of the Data Fabric architecture lies in utilizing AI for reasoning
    and optimization,^([9](#Fn9)) active metadata, knowledge graphs, and semantic
    enrichment, combining intelligent information integration and transformation technologies
    to support data consumers.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织架构的强大之处在于利用AI进行推理和优化、^([9](#Fn9))、主动元数据、知识图谱和语义丰富，结合智能信息集成和转换技术以支持数据消费者。
- en: 'Figure [11-3](#Fig3) shows key capabilities grouped into distinct Data Fabric
    architectural layers:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-3](#Fig3)显示了分组到不同的数据编织架构层的关键能力：
- en: '**Governance, knowledge, and semantics layer**: The foundational layer includes
    the knowledge catalog as an inventory of data structures. Data discovery and classification
    provides functionality to discover, classify, and label data in the data sources.
    Additionally, active metadata and data profiling increase the value of metadata
    by analyzing and reviewing the data, augmented with human knowledge and processed
    with ML. For example, it can assess accuracy, completeness, consistency, timeliness,
    and accessibility of metadata also in relation to other data sources. Semantic
    enrichment further extends metadata by tagging, indexing, and cataloging the data.
    Besides rich active metadata, data lineage functionality and impact analysis is
    critical; it visualizes data pipelines from the original data source to the data
    consumer over time. Model management applies similar intelligent metadata management
    to ML models as they go through their lifecycle of data preparation, model development,
    model training, and model deployment. Governance policies and rules definitions,
    enforcement, and workflows ensure that available data is only consumed by authorized
    consumers in an authorized way. The overall goal of the layer is to get a unified
    view of data and metadata with actionable insights and unified enforcement of
    data governance policies.'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**治理、知识和语义层**：基础层包括知识目录作为数据结构的清单。数据发现和分类提供了在数据源中查找、分类和标记数据的功能。此外，活跃元数据和数据分析通过分析和审查数据，结合人类知识和使用机器学习处理，增加了元数据的价值。例如，它可以评估元数据的准确性、完整性、一致性、及时性和可访问性，也与其他数据源相关。语义丰富通过标记、索引和编目数据进一步扩展元数据。除了丰富的活跃元数据外，数据血缘功能和影响分析至关重要；它可视化数据管道从原始数据源到数据消费者随时间的变化。模型管理将类似的智能元数据管理应用于机器学习模型，这些模型在其数据准备、模型开发、模型训练和模型部署的生命周期中。治理政策和规则的定义、执行和工作流程确保只有授权消费者以授权方式消费可用的数据。该层的总体目标是获得数据及其元数据的统一视图，并具有可操作的见解和统一的数据治理政策执行。'
- en: '**Integration and transformation layer**: Provides all capabilities needed
    for data pipeline implementations. Data replication, streaming, and synchronization
    as well as event handling move changed data from the original data source through
    defined data pipelines to keep consuming applications aware of those changes for
    further processing and consumption. Alternatively, bulk ingestion creates copies
    of entire data sources. Data validation, data enrichment, data cleansing, and
    complex transformation implement complex ETL pipelines. Besides copying data from
    the original data sources with the preceding functionalities, data virtualization
    as technology to access original data becomes more important as part of a data
    pipeline implementation, especially if data virtualization includes computational
    mesh and intelligent pushdown capabilities.^([10](#Fn10)) For example, data virtualization
    techniques can be used to read data from multiple data sources as input to data
    preparation, where complex transformation can be applied through SQL logic and
    executed while accessing the data sources, eliminating data movement. This integration
    and transformation layer provides a range of policy-driven integration styles
    with intelligent automation.'
  id: totrans-190
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**集成和转换层**：提供数据管道实现所需的所有功能。数据复制、流式传输、同步以及事件处理将更改后的数据从原始数据源通过定义的数据管道移动，以使消费应用程序了解这些更改，以便进行进一步的处理和消费。或者，批量摄取创建整个数据源的副本。数据验证、数据丰富、数据清洗和复杂转换实现了复杂的ETL管道。除了使用前述功能从原始数据源复制数据外，作为数据管道实现的一部分，数据虚拟化作为访问原始数据的技术变得更加重要，尤其是如果数据虚拟化包括计算网格和智能下推功能。[10](#Fn10)
    例如，数据虚拟化技术可以用于从多个数据源读取数据作为数据准备输入，其中可以通过SQL逻辑应用复杂转换并在访问数据源时执行，从而消除数据移动。此集成和转换层提供了一系列基于策略的集成样式和智能自动化。'
- en: '**Self-service layer**: Provides functionality to the data consumer for virtualized
    access to data sources or for data preparation as well as social collaboration
    and search and find functionality besides custom data service APIs. The self-service
    layer makes the trusted and governed marketplace available for the data consumers
    to easily search, find, understand, collaborate, and gain access to data assets
    and data products. For example, a global search for customer data could simply
    type the word *customer* and find related data assets that they have access to.
    Self-service shopping-for-data represents huge time savings for business users
    and data consumers in general. This is the overarching goal of a Data Fabric architecture
    and Data Mesh solution.'
  id: totrans-191
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自助服务层**：为数据消费者提供虚拟化访问数据源或进行数据准备的功能，以及除了自定义数据服务API之外的社会协作、搜索和查找功能。自助服务层使受信任和管理的市场对数据消费者开放，使他们能够轻松搜索、查找、理解、协作并访问数据资产和数据产品。例如，对客户数据的全球搜索只需简单地输入单词*customer*，即可找到他们可以访问的相关数据资产。自助数据购物为商业用户和数据消费者节省了大量时间。这是数据布线架构和数据网格解决方案的总体目标。'
- en: '**Orchestration and lifecycle layer**: Provides change management capabilities
    such as APIs for CI/CD integration and workflow orchestration as well as connectors
    to the different supported data sources and DataOps and MLOps capabilities. The
    orchestration and lifecycle layer provides the end-to-end lifecycle to build,
    test, deploy, and manage all data and AI assets in a Data Fabric, equally for
    data structures and data pipelines as well as AI model assets.'
  id: totrans-192
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编排和生命周期层**：提供变更管理功能，例如CI/CD集成的API和工作流编排，以及连接到不同支持的数据源和DataOps和MLOps功能。编排和生命周期层提供端到端的生命周期，用于构建、测试、部署和管理数据布线中的所有数据和AI资产，无论是数据结构、数据管道还是AI模型资产。'
- en: Sample of a Data Fabric Within an Enterprise Architecture
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 企业架构内数据布线的示例
- en: Many vendors develop and offer products in support of a Data Fabric architecture
    in an organization. As an example, Figure [11-4](#Fig4) shows IBM Cloud Pak for
    Data^([11](#Fn11)) as an architectural foundation for a Data Fabric in an enterprise
    architecture.^([12](#Fn12))
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 许多供应商开发和提供支持组织内数据布线架构的产品。例如，图[11-4](#Fig4)显示了IBM Cloud Pak for Data^([11](#Fn11))作为企业架构中数据布线架构的基础.^([12](#Fn12))
- en: '![](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig4_HTML.png)'
  id: totrans-195
  prefs: []
  type: TYPE_IMG
  zh: '![图11-4](../images/537582_1_En_11_Chapter/537582_1_En_11_Fig4_HTML.png)'
- en: A table architecture of the application, A P Is, and data consumers. It has
    3 layers between which data are shared. They are orchestration and lifecycle,
    data fabric in I B M cloud park, and security and compliance. There are 2 rows
    of icon lists, 1, a system of records, unstructured, cloud, and others. 2, public
    cloud, on-premises, edge, and private cloud.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 应用程序、API和最终用户的数据表架构。它们之间有3层，数据在这些层之间共享。它们是编排和生命周期、IBM云公园中的数据布线以及安全和合规性。有两行图标列表，1，记录系统、非结构化、云和其他。2，公共云、本地、边缘和私有云。
- en: Figure 11-4
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 图11-4
- en: Sample of a Data Fabric with IBM Cloud Pak for Data (CP4D) Within an Enterprise
    Architecture
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 企业架构内IBM Cloud Pak for Data（CP4D）的数据布线示例
- en: At the bottom all variations of the delivery system architecture, public cloud,
    private cloud, edge computing, and on-premises computing environments are supported.
    Having data stored in multiple computing environments is called hybrid cloud,
    which we will discuss in more detail in Chapter [12](537582_1_En_12_Chapter.xhtml).
    As part of the data architecture, supported data structure types need to be listed
    such as structured data (e.g., systems of records), semi- and unstructured data,
    and cloud data stores. IBM Cloud Pak for Data Foundation and Watson Studio pipelines
    provide the orchestration and lifecycle functions as well as integrated security
    and compliance capabilities. At the core is the augmented knowledge with IBM Watson
    Knowledge Catalog (WKC), MDM, and IBM Match 360 with Watson services for comprehensive
    view of customers and other parties.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 在底层，所有交付系统架构的变体，包括公共云、私有云、边缘计算和本地计算环境都得到了支持。将数据存储在多个计算环境中称为混合云，我们将在第[12](537582_1_En_12_Chapter.xhtml)章中更详细地讨论。作为数据架构的一部分，需要列出支持的数据结构类型，例如结构化数据（例如，记录系统）、半结构化和非结构化数据，以及云数据存储。IBM
    Cloud Pak for Data Foundation和Watson Studio管道提供编排和生命周期功能，以及集成安全和合规性功能。核心是IBM Watson知识目录（WKC）、MDM和IBM
    Match 360与Watson服务相结合的增强知识，以实现客户和其他相关方的全面视图。
- en: The smart integration is provided through Kafka/Event Store, data replication,
    IBM DataStage for ETL pipelines, and data virtualization. IBM Watson Query is
    the virtualization service, which makes queries across data sources faster and
    easier without moving the data. IBM Watson Studio is the collaboration tool for
    users to build and train AI and ML models and prepare and analyze data. Applications,
    APIs, and data consumer interfaces become part of the application architecture
    of the organization.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 智能集成通过Kafka/事件存储、数据复制、IBM DataStage ETL管道和数据处理提供。IBM Watson Query是虚拟化服务，它使得跨数据源的查询更快、更简单，而无需移动数据。IBM
    Watson Studio是用户构建和训练AI和ML模型、准备和分析数据的协作工具。应用程序、API和数据消费者接口成为组织应用架构的一部分。
- en: Figure [11-4](#Fig4) is an illustration of the Data Fabric architecture within
    a larger enterprise architecture.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 图[11-4](#Fig4)展示了在更大企业架构中的数据织物架构。
- en: Key Takeaways
  id: totrans-202
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [11-1](#Tab1).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以表[11-1](#Tab1)中总结的几个关键要点来结束本章。
- en: Table 11-1
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 表11-1
- en: Key Takeaways
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-206
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-207
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Data Fabric is part of an enterprise architecture. | Data Fabric architecture
    needs to be looked at in conjunction with the implemented application architecture
    in an enterprise. |'
  id: totrans-208
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 数据织物是企业架构的一部分。| 数据织物架构需要与企业中实施的应用架构相结合来考虑。|'
- en: '| 2 | Application architecture determines the data architecture. | The current
    application architecture pattern such as microservices, containerization, and
    API enablement determines underlying data architecture characteristics. |'
  id: totrans-209
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 应用架构决定了数据架构。| 当前的应用架构模式，如微服务、容器化和API启用，决定了底层数据架构的特征。|'
- en: '| 3 | Data Fabric as a data architecture needs to be defined in the enterprise
    architecture. | A Data Fabric architecture as a data architecture needs to be
    defined in the enterprise architecture for an organization. |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 数据织物作为数据架构需要在企业架构中定义。| 作为数据架构的数据织物架构需要在组织的企业架构中定义。|'
- en: '| 4 | Data Fabric combines data integration technologies. | Data Fabric architecture
    utilizes active metadata, knowledge graphs, and semantic enrichment, combining
    intelligent information integration and transformation technologies to intelligently
    support data consumers, for example, business users. |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 数据织物结合了数据集成技术。| 数据织物架构利用了活动元数据、知识图谱和语义丰富，结合智能信息集成和转换技术，以智能地支持数据消费者，例如商业用户。|'
- en: '| 5 | Microservices are eventually consistent. | Text microservices are eventually
    consistent, meaning that data consistency is reached when all microservices relevant
    for a particular use case execution succeed. |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 微服务最终是一致的。| 文本微服务最终是一致的，这意味着当所有与特定用例执行相关的微服务都成功时，数据一致性就达到了。|'
- en: '| 6 | Data product build, delivery, and management are key. | To build, deliver,
    and manage data products is one of the key capabilities that the Data Fabric architecture
    and Data Mesh solution has to implement in self-service fashion. |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
