- en: Part IIIDeploying Data Fabric and Data Mesh in Context
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 10. Data Fabric Architecture Patterns
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A specific Data Fabric architecture is determined by its business and IT context
    and intent, meaning that not every implementation is identical. A Data Fabric
    could for instance serve different data consumption patterns, such as real-time
    transactional inference of AI-based insights, trustworthy AI scenarios, or AI
    governance purposes. A specific implementation of a Data Fabric also depends on
    concrete solution requirements, such as the ones associated with a Data Mesh solution
    (e.g., data-as-a-product) and whether the Data Fabric should serve certain technologies,
    such as IoT, edge computing, or 5G. Finally, intelligent information integration
    can be underpinned with different and complementary methods, such as data virtualization,
    replication, streaming, etc., which has an impact on the underlying Data Fabric
    architecture. Integration challenges within a hybrid cloud landscape^([1](#Fn1))
    leveraging public cloud services may differ from integration needs within a private
    cloud and on-premises landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Even AI itself can be characterized by a broad spectrum of application areas
    prevalent in different industries,^([2](#Fn2)) with the result that a Data Fabric
    architecture implementation may differ significantly case by case, depending on
    industry imperatives.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this chapter we provide a high-level overview of the Data Fabric and Data
    Mesh evolution and elaborate on Data Fabric architecture patterns in terms of
    three related but distinct areas, which we have touched on previously.
  prefs: []
  type: TYPE_NORMAL
- en: First, we present data consumption patterns, where we examine how a Data Fabric
    that is usually associated with AI and analytics is entangled with transactional
    processing. We then introduce a Data Fabric architecture that serves as an underpinning
    for a Data Mesh solution, extending our treatment of this topic from Chapter [2](537582_1_En_2_Chapter.xhtml).
    Finally, we examine some intelligent information integration styles, which are
    not necessarily mutually exclusive but could complement each other, depending
    on business and IT requirements and preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric and Data Mesh Evolution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we have seen in Chapters [1](537582_1_En_1_Chapter.xhtml) and [2](537582_1_En_2_Chapter.xhtml),
    the Data Fabric and Data Mesh concepts are still relatively nascent occurrences.
    Nevertheless, there are already evolutionary phases that are worthwhile to give
    adequate attention to, which is what we aim for in this section.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_10_Chapter/537582_1_En_10_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An evolutionary path of data fabric and data mesh with 4 influencing factors.
    1\. Data and artefacts. 2\. A I infused and automation. 3\. Technologies or industries.
    3\. Data mesh.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric and Data Mesh Evolution
  prefs: []
  type: TYPE_NORMAL
- en: The original scope of a Data Fabric^([3](#Fn3)) seems to have presumably centered
    around hybrid multicloud data integration challenges, including corresponding
    security issues, data consistency needs, data governance, etc. But beyond this,
    nothing else has rated very highly in importance. For instance, an AI-infused
    Data Fabric generating active metadata, enabling intelligent cataloging, activating
    the digital exhaust, semantically enriching data, performing automated Data Fabric
    tasks, managing artefacts other than data itself, and addressing specific Data
    Fabric`–`based solutions, such as a Data Mesh solution, has not been within the
    original Data Fabric sphere.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-1](#Fig1) illustrates these various influencing factors concerning
    the Data Fabric and Data Mesh evolution, where the starting point is lacking AI,
    both in terms of AI artefacts to be managed by both concepts and AI capabilities
    augmenting the Data Fabric and Data Mesh functionality.
  prefs: []
  type: TYPE_NORMAL
- en: The Data Fabric evolution is equally influenced by different technologies, such
    as IoT, edge computing, and 5G. Deploying AI/ML in specific industries requires
    unique functional capabilities and integration points.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following list briefly examines the various aspects, which have influenced
    and still continue to influence the evolution of both concepts. We have consciously
    avoided quantifying this evolutionary path as depicted in Figure [10-1](#Fig1)
    with concrete years or timing in scale, since most of these evolutionary aspects
    are overlapping and occurring mainly in parallel:'
  prefs: []
  type: TYPE_NORMAL
- en: '**From data to AI artefacts**: As we have pointed out throughout this book,
    a Data Fabric and Data Mesh is not only about data in a traditional sense, specifically
    structured or relational data – it is about AI artefacts. Instead of using the
    term *Data Fabric* or *Data Mesh*, it would certainly be more appropriate to use
    the term *Data and AI Fabric* or *Data and AI Mesh*, to consider the variety of
    artefacts to be managed. This is illustrated by the left upper branches in Figure
    [10-1](#Fig1).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**AI-infused augmentation**: Infusing AI into both concepts, which we may call
    an *AI-infused Data Fabric or Data Mesh*, constitutes the most essential innovation;
    it is inevitably the core of what this book is all about. Augmenting capabilities
    for both concepts by infusing AI enables us to do intelligent cataloging, generate
    active metadata, build semantic knowledge graphs, etc. and gain necessary and
    holistic insight to improve and optimize corresponding tasks, for example, building
    data products.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**From insight to automated action**: Gaining insight via AI/ML is a vital
    first step to provide automation. Moving toward a modern *autonomous Data and
    AI Fabric or Mesh*, the challenge is to turn insight into automated actions, meaning
    to, for instance, implement recommendations and proposed optimizations autonomously,
    limiting intervention by business users or operational staff to review and approval
    steps. Data Fabric and Data Mesh tasks should be adjusted and corrected in an
    automated fashion, based on the insight derived from active metadata or by activating
    the digital exhaust. Furthermore, resource allocations (e.g., compute power, I/O,
    memory, etc.) regarding data consumption tasks need to be learned as far as possible
    and autonomously adjustable by the Data Fabric and Data Mesh.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Technology scope and industry needs**: Hybrid multicloud adoption by the
    Data Fabric is only a first step. The concept of a Data Fabric becomes increasingly
    interrelated with other deployment options, technologies, and specific industry
    needs. For instance, a Data Fabric must power industrial IoT, mobile devices,
    edge computing, and 5G^([4](#Fn4)) as well, which means for the Data Fabric to
    become more dispersed and move geographically closer not only to business users
    but also to end customers. In this context, data needs to be continuously streamed
    between the core system or applications and their edge devices, a pattern that
    needs to be embraced by a Data Fabric architecture. Furthermore, AI/ML is increasingly
    deployed at the intersection between the analytical and transactional domains,^([5](#Fn5))
    enabling inference of AI model outcomes within transactions at mobile and edge
    devices. To stress these specific aspects, we may even refer to an *Edge Data
    and AI Fabric* architecture pattern that can be viewed as an extension to a conventional
    Data Fabric architecture.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Mesh solution**: As we have seen in Chapter [2](537582_1_En_2_Chapter.xhtml),
    the Data Fabric concept is closely interrelated to a Data Mesh solution with its
    key characteristics, such as enabling departmental ownership and building of data
    products in self-service fashion, which creates specific imperatives for a Data
    Fabric architecture.^([6](#Fn6))'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now we move on to explore some data consumption patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Data Consumption Patterns
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thinking about today’s data consumption patterns leads us unavoidably to move
    above and beyond just considering *analytical data* as relevant for Data Fabric
    or Data Mesh scenarios. Instead, we need to embrace the intersection of transactional
    and analytical data domains as well. For instance, AI models – once they are developed
    and trained – must be deployed and operationalized, which involves near-real-time
    inference and scoring of those AI models within the transactional landscape,^([7](#Fn7))
    for instance, via REST API calls. In addition, trustworthy AI requirements require
    us to implement MLOps, bridging the development and operationalization domains,^([8](#Fn8))
    meaning that the Data Fabric needs to orchestrate data access and data integration
    within the transactional landscape as well. IoT and edge computing require inferencing
    and analytics at edge and mobile devices, integrated into the application and
    transactional landscape. This imposes fundamentally different requirements for
    a Data Fabric architecture compared with traditional DWH or data lakehouse implementations,
    which are primarily geared toward analytical purposes, for example, developing
    AI models, dashboards, or traditional BI reports.
  prefs: []
  type: TYPE_NORMAL
- en: 'We therefore differentiate between the following two related but nevertheless
    distinct data consumption patterns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pattern A, analytical patterns**, which are primarily concerned about analytical
    data and developing AI models, dashboards, BI reports, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pattern B, transaction patterns**, which are primarily concerned about integration
    of data and AI artefacts within the transactional landscape'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To further explore data consumption patterns, we need to understand the user
    landscape of a Data Fabric and Data Mesh. Data and AI artefacts can obviously
    be consumed by different users, addressing different objectives. For simplicity
    purposes, we differentiate between the following five groups of users:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Business users**: These are primarily executives, managers, and LoB users,
    who are either responsible for or preparing input for business decisions. These
    users consume data and artefacts for business purposes, including data-as-a-product
    as part of a Data Mesh solution.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Developers**: These are primarily application developers, data scientists,
    and data engineers, who are developing applications, AI models, pipelines, ETL
    stages, etc., which includes required data exploration and preparation tasks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**End customers**: These are the end customers of an enterprise, who are accessing
    applications and consuming, for instance, AI artefacts transparently at their
    edge, mobile and online devices or via other channels, for example, branch offices,
    ATMs, telephone, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Governance staff**: These are data curators, data stewards, data quality
    engineers, etc., who are concerned about data and AI governance aspects.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**IT staff**: In the context of a Data Fabric or Data Mesh, these are IT operational
    staff, who are, for instance, concerned about the AI deployment and operationalization
    aspects, enabling inferencing, scoring, etc.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Both concepts need to address the variety of data consumption needs that are
    imposed by these users. There exists obviously a much more fine-grained list of
    users and their corresponding roles and responsibilities. However, we would like
    to keep it relatively simple and targeted toward our Data Fabric and Data Mesh`–`related
    purposes.
  prefs: []
  type: TYPE_NORMAL
- en: Table [10-1](#Tab1) is a list of some key data consumption patterns, which are
    categorized as either transactional, analytical, or hybrid and furthermore linked
    to the various user groups.^([9](#Fn9))
  prefs: []
  type: TYPE_NORMAL
- en: Table 10-1
  prefs: []
  type: TYPE_NORMAL
- en: Data Consumption Patterns
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Category | Pattern | User | Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Analytical | BI | Business | Traditional BI business reporting, planning
    scenarios, and real-time dashboarding based on DWH systems |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Analytical | AI | BusinessDeveloper | AI model development, including
    training, validation, and testing |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Analytical | Exploration | Developer | Data exploration and preparation
    for AI and BI use cases |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Analytical | Transformation | Developer | Data transformation and ETL
    for AI and BI use cases |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Transactional | Trustworthy AI | BusinessIT staffGovernance | Ensuring
    trustworthy AI after deployment and during operationalization of AI models into
    the transactional landscape |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Transactional | MDM^([10](#Fn10)) | Business | Enabling a single version
    of the truth for core information (master data, reference data) and 360-degree
    customer insight |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Transactional | Inferencing | IT staff | Inferencing and scoring of AI
    models within the transactional landscape, often in real time |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | Transactional | IoT, edge, 3G | End customers | Inferencing and analytics
    at edge and mobile devices, integrated into the application and transactional
    landscape |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | Hybrid | Data Mesh | Business | Establishing a self-service data marketplace,
    enabling access to data-as-a-product |'
  prefs: []
  type: TYPE_TB
- en: '| 10 | Hybrid | Governance | Governance | Access to data and AI artefacts for
    governance purposes, for example, data curation, data quality, etc. |'
  prefs: []
  type: TYPE_TB
- en: Categorizing these patterns strictly as either transactional or analytical is
    not always possible, especially for the Data Mesh and governance patterns. For
    instance, the Data Mesh solution pattern (#9 in Table [10-1](#Tab1)) should enable
    business users to deal with data-as-a-product, which includes search, discovery,
    and exploration of data. However, it may also include the usage of data and AI
    artefacts within an application and transactional context. You therefore see the
    term *Hybrid* as a category for some patterns listed in Table [10-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: 'The AI pattern (#2 in Table [10-1](#Tab1)) is primarily concerned about developers.
    However, business users create the business framework and communicate the business
    requirements. You therefore see both users listed. The trustworthy AI pattern
    (#5 in Table [10-1](#Tab1)) may engage a variety of different users: Business
    users obviously have an interest in trustworthy AI. However, IT staff and AI governance
    personnel need to be engaged as well to enable trustworthy AI. The Data Fabric
    needs to support these various users with their corresponding roles and responsibilities.'
  prefs: []
  type: TYPE_NORMAL
- en: The MDM pattern (#6 in Table [10-1](#Tab1)) is concerned about delivering a
    single version of the truth for core information (master data) within a transactional
    and application landscape in real time, which includes providing 360-degree customer
    insight. In today’s enterprises, data emanates at various points of customer interaction.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_10_Chapter/537582_1_En_10_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A classification of data consumption. Transactional, analytical, and hybrid
    patterns with objectives of Inferencing, I o T, edge, 3 G, trustworthy A I, M
    D M, governance, data mesh, B I, A I, exploration, and transformation is consumed
    by I T staffs, end customers, governance staff, business users, and developers.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-2
  prefs: []
  type: TYPE_NORMAL
- en: Data Consumption Patterns
  prefs: []
  type: TYPE_NORMAL
- en: The Data Fabric architecture needs to guarantee this single version of the truth
    within the application and transactional landscape, which – depending on the deployment
    option of an MDM solution – could also mean to assemble this single version of
    the truth based on core information that is dispersed and maintained in various
    data stores.^([11](#Fn11))
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-2](#Fig2) summarizes our discussion as a conceptual illustration.
    The key message of this subsection is to understand the broader application scope
    of a Data Fabric architecture, reaching far beyond the pure analytical data and
    application domains.
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric for a Data Mesh Solution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The interrelationship between both concepts has already been discussed in Chapter
    [2](537582_1_En_2_Chapter.xhtml). This subsection examines further Data Mesh solution
    functions and how they are intertwined with the Data Fabric capabilities. Since
    a Data Mesh enables line of business and product owners to build and deliver data-as-a-product
    in a self-service fashion, we intend to focus on this self-service layer as one
    of the key integration points between a Data Fabric architecture (or framework)
    and a Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, we introduce a high-level architecture overview diagram, depicting
    a Data Mesh intertwined with the Data Fabric framework.
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh Self-Service Capabilities
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Both Data Fabric and Data Mesh concepts include self-service capabilities; however,
    the Data Mesh solution requires additional self-service capabilities that are
    imposed by the Data Mesh solution imperatives.
  prefs: []
  type: TYPE_NORMAL
- en: Data Fabric self-service capabilities are technology-centric; they are enabled
    by semantic search and discovery and information in the knowledge catalog, such
    as active metadata, information regarding access methods, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh self-service capabilities are business- and domain-centric; they are
    primarily geared toward building, delivering, and managing data products in a
    concrete business, domain, or industry context, enabling the shopping-for-data
    experience.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [10-3](#Fig3) illustrates this interconnectedness of Data Mesh and Data
    Fabric self-service capabilities. The boundaries we have drawn in Figure [10-3](#Fig3)
    may be perceived as arbitrary and, in some way, even artificial. Some readers
    may even ask themselves what makes the Data Mesh self-service capabilities^([12](#Fn12))
    unique and different in comparison with the ones that are already present in a
    Data Fabric architecture.
  prefs: []
  type: TYPE_NORMAL
- en: To clarify this, let us examine the specific Data Mesh self-service capabilities
    in detail.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_10_Chapter/537582_1_En_10_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An architecture block diagram. Self service capabilities of data mesh such as
    semantic enrichment, taxonomy integration, business glossary integration, and
    data product management, and of data fabric such as semantic search and active
    metadata, interconnect with unified lifecycle, a i governance, a block of trustworthy,
    rules and policies, smart integration, metadata insight, knowledge graph, and
    knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-3
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh Self-Service Capabilities
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a list of self-service capabilities that are specifically
    related to building a Data Mesh solution:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Semantic business enrichment**: Semantic enrichment, which is undoubtedly
    strongly linked to the Data Mesh characteristics, has been prominently discussed
    in Chapter [7](537582_1_En_7_Chapter.xhtml). In the context of a Data Fabric,
    semantic enrichment simplifies data discovery, access, and consumption. In the
    context of a Data Mesh, however, semantic enrichment needs to embrace a specific
    business, domain, or industry context. Data and AI artefacts must be interpretable
    and enriched above and beyond the pure technical aspects; they need to be understood
    and consumable in a specific business context, which is what we refer to as *semantic
    business enrichment*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ontology/taxonomy integration**: Again, in Chapter [7](537582_1_En_7_Chapter.xhtml)
    we have seen domain-specific ontologies to serve as input to the semantic enrichment
    engine of a Data Fabric. The ontology/taxonomy integration for a Data Mesh solution
    needs to serve the data product build and delivery service and needs to support
    the domain-specific specifications and business definition and scoping needs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business glossary integration**: The business glossary is part of the Data
    Fabric knowledge catalog; however, it needs to be integrated into the data product
    build and delivery processes. Thus, the Data Mesh solution leverages an existing
    business glossary, may add new terms, and will link relevant business terms to
    the data products or services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business knowledge graph**: In Chapter [5](537582_1_En_5_Chapter.xhtml),
    we have introduced the semantic knowledge graph as an AI/ML-enriched knowledge
    graph. If you revisit our discussion from Chapter [5](537582_1_En_5_Chapter.xhtml),
    the semantic knowledge graph within the Data Fabric framework is indeed focusing
    primarily on technical and organizational relationships. Further enriching this
    graph with business-, domain-, or industry-specific knowledge and relationships
    with corresponding data products is called a business knowledge graph, which represents
    and enriches data products for Data Mesh solutions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data product build and delivery**: One of the key objectives of a Data Mesh
    solution is to build and deliver data products in self-service fashion. This requires
    a GUI-based Data Mesh application module that supports data owners, business users,
    etc. to perform these tasks, where existing Data Fabric self-service and other
    capabilities are utilized. Data product delivery needs to include the provisioning
    to other data owners or business domains as well to enable interoperability across
    business domains.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Domain-specific specifications**: Data products may have to be defined and
    delivered within a domain-specific context or event, which requires data and AI
    artefacts to be understood holistically and in relationship to domain-specific
    events or processes. A Data Mesh solution needs to facilitate this specification
    of domain-specific events or processes to the underlying data and AI artefacts,
    which serves as input to the data product build process.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business definition/scoping**: Like domain-specific specifications, a Data
    Mesh solution requires self-service capabilities regarding the definition of business
    events and scoping of the business context, which must be configurable and mappable
    to relevant data and AI artefacts or objects. The business glossary, the integration
    of the ontology and taxonomy, and the business knowledge graph may be leveraged
    by the business definition and scoping services.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data product management**: Once data products have been built and made available
    to the data consumers, business users, or AI governance staff, they need to be
    managed (for instance, addressing updates, product versions, ownership, access
    rights, etc.) as additional artefacts in the Data Fabric knowledge catalog.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Like any data and AI artefact, data products are likewise stored in the Data
    Fabric knowledge catalog, which we may then consider as a *Data Mesh knowledge
    catalog*. The preceding list of Data Mesh self-service capabilities makes it inevitably
    clear that specific Data Mesh tools and services are required that leverage the
    Data Fabric capabilities to build a Data Mesh solution. These tools and services
    need to include REST APIs and data exchange protocols or standards (e.g., JSON,^([13](#Fn13))
    Apache Avro^([14](#Fn14))) and must be easy to use by data owners, data consumers,
    or business users.
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh Architecture Overview Diagram
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In addition to the self-service interconnectedness, we introduce a high-level
    architecture overview diagram of a Data Mesh solution, implemented via key Data
    Fabric capabilities – as depicted in Figure [10-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: As you can see in the lower part of Figure [10-4](#Fig4), there are several
    data domain owners, who are responsible for their corresponding data products.
    As an example, *data domain owner A* manages the corresponding data in a Google
    cloud, whereas *data domain owner B* has the corresponding data stored on-premises,
    which could be an x86 Intel cluster or an IBM mainframe system. Building and delivering
    these data products is based on Data Fabric capabilities, such as data preparation
    and data integration tasks, exploiting active metadata stored in the knowledge
    catalog, and defining new or using existing data policies and rules – to just
    mention a few. Data Fabric and Data Mesh self-service capabilities – as discussed
    in the previous subsection – are used to build, manage, and deliver data products.
  prefs: []
  type: TYPE_NORMAL
- en: It is essential to realize that the Data Fabric architecture enables the Data
    Mesh solution via its rich knowledge catalog, semantic search and discovery, smart
    integration capabilities, and semantic knowledge graphs. Trustworthy AI, for instance,
    is enabled via the Data Fabric as well.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, the Data Mesh solution establishes a data marketplace with shopping-for-data
    characteristics (data-as-a-product). This is depicted in the upper half of Figure
    [10-4](#Fig4), where you see several data consumers, who could be business users
    as well as end customers, depending on the data consumption pattern. As an example,
    *data_consumer_1* is using BI services of MS Azure, *data_consumer_2* is using
    an on-prem data science platform, *data_consumer_3* is using BI services of a
    private cloud, and *data_consumer_4* is using data science services of IBM Cloud.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_10_Chapter/537582_1_En_10_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A data mesh architecture. Data products with self service capabilities, owned
    by 2 domain owners, A with google cloud data and B with on premises data, is accessed
    via data marketplace by 4 data consumers of M S Azure, on premises, and I B M
    cloud, for B I reporting E T L, feature engineering, and data exploration.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 10-4
  prefs: []
  type: TYPE_NORMAL
- en: Data Mesh Architecture Overview Diagram
  prefs: []
  type: TYPE_NORMAL
- en: All data consumers may access and use data products from the various data domain
    owners and consume those data products for their particular purpose, for example,
    traditional BI reporting, data exploration and feature engineering, AI model development,
    etc. This is depicted via the arrows between the various data consumers and the
    data products. Thus, data products that are owned by one data domain owner may
    be accessible and consumable by several data consumers. Access rights, rules,
    and policies regarding the consumption of these data products are captured and
    managed via the Data Mesh knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent Information Integration Styles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A discussion about Data Fabric architecture patterns remains incomplete without
    touching on intelligent information integration styles. Since much has been published
    about information integration,^([15](#Fn15)) we limit our examination to a well-known
    list of information integration styles, providing recommendations on when to use
    a certain pattern or style and when not.
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [5](537582_1_En_5_Chapter.xhtml), we have introduced the term *intelligent
    information integration* as an AI-infused information integration layer, which
    constitutes a vital capability of a modern Data Fabric architecture and Data Mesh
    solution.
  prefs: []
  type: TYPE_NORMAL
- en: Table [10-2](#Tab2) inherently prerequisites this AI-infused Data Fabric view
    of intelligent information integration styles.
  prefs: []
  type: TYPE_NORMAL
- en: Table 10-2
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent Information Integration Styles
  prefs: []
  type: TYPE_NORMAL
- en: '| Style | Description | When to Use and When Not |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| ETL, ELT, etc. | Traditional DWH-style ETL, ELT, etc. | Required for complex
    data aggregation and transformation jobs to prepare data for specific consumption
    purposes, like traditional BI/DWH scenarios. ETL vs. ELT depends primarily on
    data size and complexity of transformation requirements. |'
  prefs: []
  type: TYPE_TB
- en: '| CDC^([16](#Fn16)) | CDC-based enterprise replication | Allows near-real-time
    movement of mainly relational data via log-based CDC, has limited impact on source
    systems, enables additional SQL statements to be executed on an identical DB schema
    without impact on the source systems. |'
  prefs: []
  type: TYPE_TB
- en: '| Federation/Virtualization | Data federation and virtualization with pushdown
    function | Simplifies access to heterogeneous and distributed data sources by
    generating one virtual data view, leverages pushdown functions, leaves data in
    place, only access to data that is needed. |'
  prefs: []
  type: TYPE_TB
- en: '| REST API | API conforming to the REST architecture style | Compared with
    SQL, REST APIs provide more flexibility in accessing data, which can be stored
    in DBMS or in resources addressable by URLs, use JSON, and can be used to easily
    connect applications or microservices. |'
  prefs: []
  type: TYPE_TB
- en: '| Microservices | Distributed, loosely coupled architecture framework for building
    apps | Microservices are smaller, usually container-based services that can be
    “stitched” together via REST APIs to function as an integrated application. |'
  prefs: []
  type: TYPE_TB
- en: '| Streaming | Transmitting a continuous flow of data | Mainly for real-time
    data consumption and real-time analytics on continuously streamed data, for example,
    video, social media feeds, traffic monitoring, real-time stock trades, real-time
    cybersecurity, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| Messaging | Messaging describing events, requests, replies, etc. | Especially
    useful for feeds of business-related events, requests, replies, etc., advantage
    above raw data streaming due to business-relevant messaging. |'
  prefs: []
  type: TYPE_TB
- en: '| JDBC/ODBC | SQL-based API to access DBMS | Used for native SQL-based access
    to a wide variety of RDBMS, consumes resources of the source systems. BI/analytics
    workload may interfere with transactional workload. |'
  prefs: []
  type: TYPE_TB
- en: As we have outlined in Chapter [5](537582_1_En_5_Chapter.xhtml), intelligent
    information integration is an AI-infused information integration layer that comprises
    AI-based capabilities, which should shield the various users from the complexity
    of these information integration styles; AI capabilities should automate and *learn*
    information integration – meaning to automatically choose, adjust, optimize, and
    improve the information integration pattern over time, further reducing human
    intervention.
  prefs: []
  type: TYPE_NORMAL
- en: Providing AI-infused intelligence and automation to the information integration
    layer is one of the most demanding areas to implement a Data Fabric architecture
    and Data Mesh solution.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [10-3](#Tab3).
  prefs: []
  type: TYPE_NORMAL
- en: Table 10-3
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | AI should be infused into the Data Fabric. | An AI-infused Data Fabric
    constitutes the most essential recent innovation. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | A Data Fabric needs to turn insight into automated action. | Moving toward
    a modern autonomous Data and AI Fabric requires turning insight into automated
    actions, for example, to implement recommendations and proposed optimizations
    autonomously. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | There are analytical and transactional data consumption patterns. | A
    Data Fabric needs to serve analytical and transactional data consumption patterns
    to, for instance, address MLOps, trustworthy AI, MDM, inferencing, IoT, edge,
    and 5G. |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | New technologies, for example, IoT, edge, etc., have a profound impact
    on a Data Fabric. | Data Fabric must power industrial IoT, mobile devices, edge
    computing, and 5G, which means for the Data Fabric to become more dispersed and
    move geographically closer to end customers. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Data Mesh–specific self-service capabilities are needed. | Data Mesh
    self-service capabilities are business- and domain-centric; they are geared toward
    building, delivering, and managing data products in a concrete business, domain,
    or industry context. |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Data product build, delivery, and management are key. | To build, deliver,
    and manage data products is one of the key capabilities that the Data Mesh has
    to implement in self-service fashion. |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Data product specifications are also stored in the knowledge catalog.
    | We call a Data Fabric knowledge catalog that also captures information about
    data products a *Data Mesh knowledge catalog*. |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | A Data Fabric architecture enables a Data Mesh solution. | A Data Fabric
    architecture enables the Data Mesh solution via its rich knowledge catalog, semantic
    search and discovery, smart integration capabilities, semantic knowledge graphs,
    etc. |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | Several intelligent information integration styles are needed. | A Data
    Fabric needs to support multiple intelligent information integration styles, such
    as federation and virtualization, microservices with REST APIs, streaming, messaging,
    etc. |'
  prefs: []
  type: TYPE_TB
