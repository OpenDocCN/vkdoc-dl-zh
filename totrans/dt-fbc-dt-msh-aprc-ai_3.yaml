- en: 13. Intelligent Cataloging and Metadata Management
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Suppose you are a business analyst and you need to find the customer purchase
    records of a certain market in the last quarter from 1.3 million tables and billions
    of records to make a predictive analysis of the consumption trend in this region
    for the next quarter. How are you going to do it? This task is like looking for
    a needle in a haystack. What is even more frustrating is that when you finally
    find the relevant data after spending weeks on source data exploration, it is
    out of date, and new essential data is available. This example illustrates that
    it is not sufficient for companies to make data accessible; they also need to
    make it discoverable, understandable, and consumable in near real time to gain
    timely and relevant insights from the data.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction to Metadata Management
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the digital era, enterprises need to know all aspects of data:'
  prefs: []
  type: TYPE_NORMAL
- en: What data they have, where it is, how much is there, and what data needs to
    be protected
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are the business values of data, what is the quality of data, and when
    does the data need to be archived
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where does the data come from, who owns the data, who uses the data, for what
    business purposes, and so on
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To address the preceding questions effectively, enterprises need to put metadata
    management into place. As we have described before, metadata^([1](#Fn1)) is the
    data used to describe the data. Let’s look at a real-life example. On many occasions,
    we need to do self-introductions. When we introduce ourselves, we usually introduce
    name, position, the company we’re working for, the school we graduated from, etc.
    We may also introduce family, hobbies, etc. Name, occupation, working experience,
    education, family background – all this can be seen as metadata used to define
    our identity, which enables others to know who we are and how they connect with
    us in social life, as depicted in Figure [13-1](#Fig1). In short, metadata helps
    users comprehend and communicate meaning associated with data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A cycle of personal profiles with 5 metadata: profession, family, skills, education,
    and demographic info.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-1
  prefs: []
  type: TYPE_NORMAL
- en: Metadata for Personal Profile
  prefs: []
  type: TYPE_NORMAL
- en: 'Metadata can be broadly classified into three categories: business metadata,
    technical metadata, and operational metadata.^([2](#Fn2)) Business metadata describes
    the meaning of the business that the data represents in the real world. For example,
    this nine-digit string *111-22-3344* can represent a person’s Social Security
    number (SSN), an account number, or an application confirmation number. The validation
    rules and protection rules vary depending on the business context. For example,
    an SSN belongs to Personal Confidential Information (PCI), which is classified
    as personal sensitive data and requires the application of high-level security
    and privacy protection. In summary, business metadata facilitates the understanding
    of data; it furthermore links data with corresponding business rules.'
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, technical metadata describes the access information of data in
    an IT environment, for example, where data is stored, in which format, and how
    to access it. For example, an SSN is stored in a column named *ID* of a table
    in a Db2 database. The column name, table name, database name, and database connections
    are all technical metadata, which can serve data engineers to get access to data.
    In addition, data types, constraints, and dependencies are technical metadata
    too.
  prefs: []
  type: TYPE_NORMAL
- en: Operational metadata is concerned about the creation and transformation of data
    and AI assets. Table [13-1](#Tab1) lists some examples of metadata.
  prefs: []
  type: TYPE_NORMAL
- en: Table 13-1
  prefs: []
  type: TYPE_NORMAL
- en: Business Metadata, Technical Metadata, and Operational Metadata
  prefs: []
  type: TYPE_NORMAL
- en: '| Metadata | Purpose | Examples |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Business metadata | Business meaning in the real-world for understanding
    data | Business definitions, the explanations of business terms; KPIs, calculated
    KPIs, and derived KPIs; business identification rules, quality rules, protection
    rules, security and privacy level, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| Technicalmetadata | Technical information of IT platforms for retrieving
    data | Physical database table names, column names, field lengths, field types,
    constraint information, data dependencies, SQL script information, ETL conversion,
    data update frequency, etc. |'
  prefs: []
  type: TYPE_TB
- en: '| Operational metadata | Data concerning transformation of data and AI assets
    | ETL stages, I/U/D logs, pipelines, job execution logs including runtime parameters,
    SQL query execution logs (for instance, access path information), AI asset usage
    logs, etc. |'
  prefs: []
  type: TYPE_TB
- en: 'Let us go back to metadata management.^([3](#Fn3)) An effective metadata management
    platform should have the following capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hierarchy**: Establish a complete hierarchy and system of business metadata,
    technical metadata, operational metadata, policies and rules, and ultimately active
    metadata.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Quality**: Create a continuous quality inspection framework to understand
    and improve data integrity and accuracy through metadata information.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Insight**: Enable users to clearly understand and visualize details of the
    entire data flow across enterprises to improve data traceability, addressing the
    entire lifecycle of data and AI assets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Metadata management is not a one-time job; metadata needs to be administered
    and maintained reiteratively. Therefore, from a technical point of view, the metadata
    management platforms usually include components such as metamodel management,
    metadata audit, metadata maintenance, metadata change management, and metadata
    version management. There are many mature commercial products available in the
    market, such as IBM Watson Knowledge Catalog, Informatica, Alation, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Key Aspects of Intelligent Cataloging
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The enterprise knowledge catalog is a system for organizing and storing data
    according to well-established metadata systems. Usually, the library catalog is
    used to explain the concept. Suppose you go to the library and want to find a
    book. You can find the shelf number by genre: fiction, nonfiction, textbooks,
    and so on. Or you can find it by author and the year of publication. The title,
    the author, and the year of publication are all considered metadata. The place
    that stores this information and the location of the book is the library catalog.
    The process of cataloging is a nontrivial endeavor. When a new batch of books
    comes in, the first task librarians need to tackle is to enter the information
    of the books into the knowledge or library catalog, according to the metadata
    framework.'
  prefs: []
  type: TYPE_NORMAL
- en: Now imagine if the incoming data is stored in tens of thousands of tables with
    billions of records. It would be a time-consuming and labor-intensive task to
    catalog these data records with accurate metadata. That’s where AI comes into
    play. Intelligent cataloging^([4](#Fn4)) is to use ML models that automate the
    cataloging process to the maximum extent.
  prefs: []
  type: TYPE_NORMAL
- en: 'It generally has the following capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automated data discovery and enrichment**: Responding to the complex and
    diverse data environment of enterprises, the intelligent knowledge catalog automatically
    discovers data and enriches data assets with business definitions based on AI-infused
    technologies, including profiling data, assigning business terms, classifying
    data, analyzing the data quality, correlating data assets, and enforcing the privacy
    and security rules for data. The data discovery process is the foundation of intelligent
    cataloging; it quickly creates a knowledge catalog and then makes data ready for
    use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Semantic search and recommendation**: To help business users quickly identify
    and locate data, intelligent cataloging provides powerful semantic search capabilities.
    The difference between semantic search and full-text search is that instead of
    just matching for textual similarity, semantic search aims to understand the intent
    and contextual meaning of your search and thereby to provide for more relevant
    content. In addition, the intelligent knowledge catalog will also make recommendations
    of similar data assets based on the user’s search results, which can also greatly
    improve the efficiency of finding data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data lineage and provenance**: Data lineage is the end-to-end flow of data
    across the enterprise, and as part of the data asset catalog, it provides tracking
    and tracing throughout the data lifecycle to understand where the data came from,
    how it was transformed, and who is using it for which purpose. Typically, data
    lineage diagrams visualize the relationships between tables, views, fields, etc.
    using a directed acyclic graph model. It shows whether data comes from a trusted
    source and if there are any malicious attempts on the data. Data provenance sheds
    light on the origin of data or any AI asset, for example, who owns the data or
    AI asset, who has created it, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build an Intelligent Catalog by Automating Data Discovery and Enrichment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The intelligent data catalog first connects to various data sources in the enterprise
    and extracts metadata from them. The process is known as data discovery. Typically,
    users specify the connection to the data source, and data discovery scans the
    catalog tables of data sources with connection information to retrieve various
    technical metadata, for example, field name, data format, etc. On the other hand,
    data enrichment refers to the process where intelligent cataloging assigns business
    terms, analyzes the quality, and adds relationships between data assets based
    on metadata.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, the format of a column may indicate the data is an SSN. In this
    case, the column will be assigned the business term *ID*, which elevates the privacy
    level to PII information. The name of the field may also indicate that it is related
    to an address. In this case, the field will be linked to other fields, and it
    is tagged as contact information.
  prefs: []
  type: TYPE_NORMAL
- en: The volume of data in the enterprise has proliferated, and performing data discovery
    and enrichment tasks manually seems to be impossible. Automated discovery and
    enrichment tasks do not require human invention; they are – to a maximum extent
    – performed by ML algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: To better illustrate this process, let’s go back to the library example, as
    illustrated in Figure [13-2](#Fig2). Suppose there are several books that need
    to serve as input to the library catalog. The location of these books can then
    be seen as the connection information of data sources, while the book is regarded
    as the data record. With automated data discovery, the scattered books are then
    automatically identified and organized in the catalog.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A photograph of a set of books arranged in order converted to 4 books with a
    context through automated data discovery.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-2
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of the Data Discovery Process
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the basic information as author, ISBN, and publisher, the topics
    of the books are also recognized by analyzing book review abstracts and comments
    in websites by NLP technology.^([5](#Fn5)) Judging from the title of the book,
    it is easy to categorize *Rising Strong* to the area of emotional intelligence.
    But it’s not straightforward just by reading the name *Start with Why* that this
    is the title of a computer book.
  prefs: []
  type: TYPE_NORMAL
- en: That is where sophisticated ML algorithms can help. The higher the level of
    AI applied to the knowledge catalog is, the more comprehensive the derived knowledge
    graph behind the catalog will be. AI can support a lot of the heavy lifting work,
    but nonetheless it cannot ultimately replace subject matter experts to deal with
    complex situations. After all, the accuracy of AI models depends on historical
    training of models and corresponding AI algorithms. Indeed, it may not always
    yield the correct results.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, AI models can provide a suggestion, which subject matter experts
    need to confirm for acceptance or rejection, as illustrated in Figure [13-3](#Fig3),
    where *Transaction* is a table in a Db2 for z/OS database. After discovering and
    enriching the *Transaction* table via a Db2 for z/OS connection by intelligent
    cataloging, the column *Transaction*_*TS* is suggested as the business term *Transaction_ID*
    with an 82% confidence level.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of a transaction table with column headers columns, business terms,
    data class, data quality, and review status. A transaction t s page is on the
    right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-3
  prefs: []
  type: TYPE_NORMAL
- en: Enrichment of Data with Business Terms
  prefs: []
  type: TYPE_NORMAL
- en: The data curator could review the suggested business term and decide whether
    it should be assigned to this column or not. Once the *Transaction_ID* is assigned,
    the policies and rules that are defined with *Transaction_ID* will be enforced
    on the data of the column *Transaction_TS*. For example, the data protection rule
    or data locality rule will mask the data in *Transaction_TS*.
  prefs: []
  type: TYPE_NORMAL
- en: Find Data Assets with Semantic Search and Recommendation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In real-world situations, very likely business analysts and data scientists
    are struggling to discover and access relevant data sources and to fully understand
    the structure and content of a particular data source. Subsequently, they need
    an effective way to search for it and to perform data exploration tasks. However,
    using keyword searches requires a solid understanding regarding the most relevant
    keywords. If the keywords are not chosen correctly, users often cannot find the
    relevant data.
  prefs: []
  type: TYPE_NORMAL
- en: This is where semantic search comes into play. Semantic query^([6](#Fn6)) attempts
    to capture the users’ thoughts and relevant context, also referring to the relationship
    between search entities and providing more accurate and more comprehensive query
    results. For example, if you are browsing the menu of a restaurant website, you
    may search for *soap*. The semantic search will guess that you are looking for
    *soup* and may then return today’s options. Assuming that you are using a supermarket
    app searching for *soap*, the semantic search will likely return products related
    to detergents and stain removers. Semantic search queries return the most suitable
    results based on a specific context, for example, what are you currently doing
    and why are you doing it, trying to understand your most likely intent, as illustrated
    in Figure [13-4](#Fig4).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: An illustration represents the flow of 5 icons on semantic search. Each icon
    with a text as follows. 1\. Search pizza. 2\. What is the intent colon order a
    pizza or make a pizza? 3\. What is the context, location, and preference? 4\.
    Search knowledge base. 5\. Results.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-4
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of Semantic Search
  prefs: []
  type: TYPE_NORMAL
- en: Figure [13-5](#Fig5) shows another example of a semantic search, where users
    intend to find data assets that have contact information.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the semantic search page. Filters of type, modified by, and
    modified on with radio buttons and checkboxes are on the left. The results of
    the search are displayed on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-5
  prefs: []
  type: TYPE_NORMAL
- en: Example of Semantic Search Results for Contact Information
  prefs: []
  type: TYPE_NORMAL
- en: Users input *Contact* in the global search field, and multiple records are returned
    as search results including *Telephone Number, Customer Phone Call, Customer Communication*,
    etc. The search result does not contain a column that is labeled exactly as *Contact*.
    If using keyword search, these data records are least likely to be returned, but
    they are actual contact information that users are looking for. When zooming into
    *Telephone Number*, it is marked as having a relationship with *Communication
    Content*, as illustrated in Figure [13-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of semantic search. The overview is open and it consists of a general
    description and related terms with type relationships on the left. The headers
    such as primary category, secondary categories, and part relationships are displayed
    on the right.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-6
  prefs: []
  type: TYPE_NORMAL
- en: Semantic Search and Business Terms
  prefs: []
  type: TYPE_NORMAL
- en: Recommendation is another powerful feature for intelligent cataloging in conjunction
    with semantic search. Recommendation may depend on usage metrics, historical searches,
    and peer insights. Metrics-based means that asset recommendations are based on
    usage data, such as popularity, top rated and quality scores, etc. Historical
    search leverages previous searches to infer what assets would be of interest.
    Peer insights are based on the usage history of others.
  prefs: []
  type: TYPE_NORMAL
- en: This is like our online shopping experience. In ecommerce, there are often targeted
    recommendations that are specifically customized for you that are based on other
    customers’ purchase behavior, often linking one product to a set of others. This
    concept can be easily applied to searching for data, thus improving the overall
    shopping-for-data experience. This greatly improves the efficiency of business
    analysts and data scientists to find relevant and useful data, for instance, influencing
    targeted marketing campaigns that are geared toward efficient cross-selling and
    upselling initiatives.
  prefs: []
  type: TYPE_NORMAL
- en: Let us move on to data insight and provenance
  prefs: []
  type: TYPE_NORMAL
- en: Provide Data Insight and Provenance as Data Flows Across the Enterprise
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the top data challenges customers are facing today is gaining trust in
    data and AI (trustworthy AI). How can I *prove* to data consumers that the data
    is trustworthy? How can I provide transparency in terms of data provenance and
    whether the data was changed inadvertently?
  prefs: []
  type: TYPE_NORMAL
- en: This is not surprising; with the explosion of information, there is a reason
    to question the credibility of data, as incomplete and outdated information does
    not benefit decision-making. Instead, it may lead to wrong decisions with significant
    business ramifications. Data lineage addresses this concern by documenting, tracking,
    and visualizing the data processing and transformation across disparate tools
    and sources, as illustrated in Figure [13-7](#Fig7) for the workflow of data lineage.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 'An illustration of a row of workflow icons with 3 metadata connected. The row
    of icons: database, operation, cloud, operation, documents, and reports. The metadata
    is connected to the database, cloud, and document.'
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-7
  prefs: []
  type: TYPE_NORMAL
- en: Illustration of Data Lineage
  prefs: []
  type: TYPE_NORMAL
- en: 'Data lineage and provenance^([7](#Fn7)) are often used interchangeably. Both
    terms refer to the entire lifecycle of the data, including the five Ws: (a) where
    the data originates, (b) where the data has been and where is the destination,
    (c) who made changes to the data, (d) when the data was created or updated, and
    (e) where the data is stored and used. Knowing answers to these questions is critical
    to data consumers to trust analytics outcomes derived from data.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure [13-8](#Fig8) shows an example of data lineage. There are three types
    of nodes: a data node, operation node, and report node. The data asset *borrow*
    comes from multiple data sources, *books, audiobooks*, and *person*, via the operations
    *borrow_book* and *borrow_audiobook*.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig8_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the lineage page. The headers are overview, asset, access, review,
    lineage, and profile. The page has 4 files clubbed into 2 files which are further
    clubbed as another file. The file is released as a public borrow.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-8
  prefs: []
  type: TYPE_NORMAL
- en: Example of Data Lineage
  prefs: []
  type: TYPE_NORMAL
- en: The lineage diagram can easily become very complex. Therefore, it is important
    to have zoom-in and zoom-out and expand and collapse capabilities to navigate
    through the diagram allowing users to focus on the specific part of the diagram
    and to advance step by step.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s drill down to the next level of detail, referring to Figure [13-9](#Fig9).
    The table *students* is constructed by an insert statement with data fields: *student_name,
    student_surname, student_birthdate,* and *student_gender*.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig9_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: 3 tables are named university library. Table 1 has rows of data such as create
    student, student gender, birthdate, surname, and name. Table 2 has rows such as
    create student, student body, and insert. Table 3 has a row named students.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 13-9
  prefs: []
  type: TYPE_NORMAL
- en: Lineage Details
  prefs: []
  type: TYPE_NORMAL
- en: Thus, users not just know where the data came from and what transformation processes
    were applied to it. With data lineage, enterprises can track the data as it flows
    through the organization and trace data quality issues back to specific processes
    or systems.
  prefs: []
  type: TYPE_NORMAL
- en: What is even more important, with impact analysis, organizations can assess
    the impact of data changes in one system on the entire enterprise.
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [13-2](#Tab2).
  prefs: []
  type: TYPE_NORMAL
- en: Table 13-2
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Metadata is the data used to describe data. | Metadata can be broadly
    classified into three categories: business metadata, which describes the meaning
    of the business that the data represents in the real world, and technical metadata,
    which describes the access information of data in the IT platforms, and operational
    metadata which describe the creation and transformation of data. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | Intelligent cataloging contains three key capabilities. | Intelligent
    cataloging uses AI to automate the data discovery and enrichment process to improve
    efficiency, and provide semantic search and recommendation for easy consumption,
    and provide data lineage to improve trust in data. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Data discovery and enrichment are critical to building the catalog. |
    The intelligent data catalog connects to all enterprise data sources, extracts
    metadata from the data source, uses ML algorithms to assigns business terms, analyzes
    the quality, and adds relationships between data assets. |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | Semantic search yields better results that fit your purpose. | Semantic
    search aims to understand the intent and contextual meaning of your search and
    thereby provide for more relevant content. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Data lineage is the process of tracking how data is moved, transformed,
    and consumed across disparate sources. | Data lineage addresses five Ws: where
    the data originates, where the data has been and where is the destination, who
    made changes to the data, when the data was created/updated, and where the data
    is stored and used. Knowing answers to these questions is critical for people
    to trust analytics outcomes from data. |'
  prefs: []
  type: TYPE_TB
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: TechTarget, [Kranz](https://www.techtarget.com/contributor/Garry-Kranz), G.,
    *Definition metadata,* [`www.techtarget.com/whatis/definition/metadata`](http://www.techtarget.com/whatis/definition/metadata)
    (accessed September 2, 2022).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: TIBCO, *What is Metadata Management?*, [`www.tibco.com/reference-center/what-is-metadata-management`](http://www.tibco.com/reference-center/what-is-metadata-management)
    (accessed September 2, 2022).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AI Outlook, Staff, A., *Intelligent Data Catalog Tools Summarized*, 2022, [`www.aixoutlook.com/intelligent-data-catalog-summarized/`](http://www.aixoutlook.com/intelligent-data-catalog-summarized/)
    (accessed September 2, 2022).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Bloomreach, Roberts, T., *Semantic Search Explained in 5 Minutes*, 2019, [`www.bloomreach.com/en/blog/2019/semantic-search-explained-in-5-minutes`](http://www.bloomreach.com/en/blog/2019/semantic-search-explained-in-5-minutes)
    (accessed September 2, 2022).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Electrosoft, Proud-Madruga, D., *Provenance, Lineage, Pedigree: Are they the
    Same?*, 2020, [`www.electrosoft-inc.com/electroblog/provenance-lineage-pedigree-are-they-same`](http://www.electrosoft-inc.com/electroblog/provenance-lineage-pedigree-are-they-same)
    (accessed September 2, 2022).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 14. Automated Data Fabric and Data Mesh Aspects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The vigilant reader of this book has certainly noticed the distinguished focus
    that we have put on applying AI with automation and intelligent augmentation and
    optimization to nearly all aspects of a Data Fabric architecture and Data Mesh
    solution. There are indeed numerous areas of both concepts, which are increasingly
    optimized with AI-infused automation, such as automated workload performance prediction
    and runtime adjustment, automated capacity planning and resource demand estimation
    (e.g., CPU capacity, network bandwidth, memory sizes, etc.), automated query generation,
    intelligent information integration, automated data curation, and automated creation
    of data products.
  prefs: []
  type: TYPE_NORMAL
- en: Especially automated capacity planning and forecasting has been a well-established
    topic for vendors^([1](#Fn1)) and in academia^([2](#Fn2)) as well. Applying AI
    and automation clearly amounts to a paradigm shift. In fact, we would not use
    the terms *Data Fabric* and *Data Mesh* in the context we do without the inherent
    assumption of applying AI, intelligent knowledge, and automation.
  prefs: []
  type: TYPE_NORMAL
- en: The desire to create an organization- or enterprise-wide description of data
    and AI artefacts is not at all a new concept. It was already painfully considered
    a failure about two decades ago. This chapter describes the usage of intelligent
    automation to collect metadata information from different data sources and catalog
    them, automatically checking data quality and augmenting the metadata as well
    as automating data governance services as a foundation for both essential Data
    Fabric and Data Mesh concepts.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this chapter, we thus concentrate on two distinct but nevertheless related
    areas: (a) intelligent automation of metadata and (b) automated data quality assessment.'
  prefs: []
  type: TYPE_NORMAL
- en: Automated data and AI governance services will be addressed in the next chapter.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Applying AI to metadata management and intelligent cataloging, data quality
    assessments, and especially data and AI governance seems to have lagged far behind
    the rest of data-related areas. In Chapters [5](537582_1_En_5_Chapter.xhtml) and
    [7](537582_1_En_7_Chapter.xhtml), we have already elaborated on the vital role
    of AI/ML to reimagine a modern approach, that is, to generate active metadata,
    to activate the digital exhaust, to build semantic knowledge graphs, and likewise
    for semantic enrichment and semantic search, entity matching, self-service capabilities,
    and automated data quality assessments and adjustments – well underpinned and
    empowered by must-have knowledge catalog capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [13](537582_1_En_13_Chapter.xhtml), you have seen how indispensable
    the knowledge catalog is for intelligent cataloging and enriching metadata and
    to enable, for instance, data lineage and provenance. As we have mentioned previously,
    the core content of this chapter is clearly on intelligent automation of metadata
    and automated data quality assessments.
  prefs: []
  type: TYPE_NORMAL
- en: Let us begin with intelligent automation of metadata.
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent Automation of Metadata
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We use the term *intelligent automated metadata* to portray the inclusion of
    AI/ML into the entire lifecycle of metadata management, including generation,
    enrichment, and consumption of metadata.
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned, the knowledge catalog is the core component to enable intelligent
    automation of metadata. Figure [14-1](#Fig1) is a sample knowledge catalog,^([3](#Fn3))
    where four recently added data assets are visualized, including the owner, the
    date when the asset was added, and the type of asset. As you can see, three of
    these assets are relational database tables, and the fourth asset is a database
    connection based on data virtualization (right side of Figure [14-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig1_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of a sample knowledge catalog. It displays 4 recently added data
    assets, user 11 credit cards, user 11 credit users, user 11 credit trans, and
    data visualization. A table at the bottom list 4 items name, owner, tags, business
    terms, asset type, and data added.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-1
  prefs: []
  type: TYPE_NORMAL
- en: Sample Knowledge Catalog
  prefs: []
  type: TYPE_NORMAL
- en: Additional information can be displayed by clicking the various assets. The
    power of the knowledge catalog with its corresponding function – above and beyond
    visualization – is based on a set of intelligent automation capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'These intelligent automation capabilities are described in the following list:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automated metadata generation**: Data and AI assets, which may span across
    a multitude of sources or formats, need to be automatically discovered; corresponding
    metadata must be auto-generated and moved into the knowledge catalog, which applies
    to changes of the source data and AI assets as well. This comprises the first
    step of the end-to-end lifecycle of intelligent metadata management, which we
    may call automated cataloging of data and AI assets or automated metadata generation.
    This phase may be complemented with automated quality assessments of all data
    and AI assets. Quality assessments and improvements must be performed repetitively;
    we are dealing with this topic in a separate section further in the following.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Automated metadata enrichment**: Once metadata has been auto-generated, it
    needs to be enriched, meaning that the metadata needs to be analyzed and profiled
    using AI/ML methods to gain additional insight to be added to the metadata. Furthermore,
    the metadata needs to be tagged and annotated and further optimized and prepared
    for consumption by data product owners or business users, for instance, by building
    and adding semantic knowledge graphs, leveraging industry- or domain-specific
    ontologies, etc. This phase of metadata enrichment represents by far the most
    complex stage in the end-to-end metadata lifecycle and may also include transformation
    and adherence to metadata standards.^([4](#Fn4)) This metadata enrichment process
    may have to be performed repetitively.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Automated metadata** **extraction and exploitation**: Once metadata has been
    generated, captured in the knowledge catalog, and further enriched, it is ready
    to be extracted for consumption and exploitation by business users. This may sound
    like a simple undertaking; nevertheless, it requires a rich and easy-to-use GUI-based
    knowledge catalog, which lists the available data and AI assets in context, meaning
    type and format of the assets (i.e., relational database tables, JSON or XML documents,
    Parquet and Avro files, CSV files, connection methods, AI models, pipelines, ETL
    stages, etc.), ownership, correlation with other assets (i.e., via semantic knowledge
    graphs), and access rights and access methods (i.e., SQL, NoSQL, REST API).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [14-2](#Fig2) is an illustration of intelligent automated metadata management^([5](#Fn5))
    with the three phases discussed previously.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig2_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A process diagram of the intelligent automation of metadata. The process includes
    3 phases from right to left, generation, enrichment, and extraction.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-2
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent Automation of Metadata
  prefs: []
  type: TYPE_NORMAL
- en: Intelligent automation of metadata must also address the needs of data engineers
    and data product developers.
  prefs: []
  type: TYPE_NORMAL
- en: The following two subsections provide a glance on automated analysis and profiling
    of data and automated tagging and annotation of data. By addressing these issues,
    we provide some basic examples.
  prefs: []
  type: TYPE_NORMAL
- en: Let us begin with automated analysis and profiling of data.
  prefs: []
  type: TYPE_NORMAL
- en: Automated Analysis and Profiling of Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Data analysis and profiling has been around for decades. What made this notably
    different in a modern Data Fabric architecture and Data Mesh solution, however,
    is the infusion of AI/ML and the introduction of automated processes. Let us explore
    further what this AI/ML infusion really means.
  prefs: []
  type: TYPE_NORMAL
- en: As we have pointed out in Chapter [7](537582_1_En_7_Chapter.xhtml), data profiling
    is the process of examining, analyzing, and checking the content of all data attributes
    of relevant data sources to get a first path of statistical insight and an initial
    understanding regarding data quality.^([6](#Fn6)) This data analysis and profiling
    process can broadly be categorized into the following three areas `–` (a) structure
    discovery, (b) content discovery, and (c) relationship discovery `–` where each
    area generates metadata and statistics about its content, which is automatically
    captured in the knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Figure [14-3](#Fig3) is an example visualizing statistics of some columns in
    a database table, called *CREDITUSERS*. We have included four columns `–` *USER_ID*,
    *PERSON*, *CURRENT_AGE*, and *RETIREMENT_AGE* `–` including the corresponding
    quality score and value frequency distribution for each column. Figure [14-3](#Fig3)
    also contains some basic statistics for each column, such as number of unique
    values, minimum and maximum values, mean value, standard deviation, etc. It is
    essential to realize that these values are calculated directly from real database
    table data, not statistical data that may be included in the database catalog.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig3_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the database table with preview, profile, and visualization.
    The profile option has 4 columns of the user I D, person, current age, and retirement
    age, and their frequency at the bottom highlights with a rectangular box. Statistics
    below the frequency list the mean length, maximum and minimum values, and unique
    values number for each data.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-3
  prefs: []
  type: TYPE_NORMAL
- en: Statistics of Each Column in a Database Table
  prefs: []
  type: TYPE_NORMAL
- en: In Chapter [7](537582_1_En_7_Chapter.xhtml), we have also mentioned that ML
    can be used to accelerate and automate data profiling tasks; even DL techniques
    can be deployed to calculate quality measures, for instance, of text data. Yet
    we still need to detail out the crucial factors of how and for what specific purpose
    to use ML and DL.
  prefs: []
  type: TYPE_NORMAL
- en: Before moving on to discuss the usage of ML and DL, we include another example
    of user counts of each US state in the *CREDITUSERS* table, as depicted in Figure
    [14-4](#Fig4), with the US states of New York (*NY*), California (*CA*), Florida
    (*FL*), and Texas (*TX*) among the highest counts and the US states of Wyoming
    (*WY*), Arkansas (*AK*), and the Federal District of Columbia (*DC*) among the
    lowest counts. Of course, this is a rather traditional depiction; a more sophisticated
    depiction would, for instance, be based on ML-based clustering, meaning to identify
    and visualize various clusters of US states to, for instance, discover and depict
    demographic similarities of US states.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig4_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the database. On the top is the list of charts such as bar charts,
    pie charts, heat maps, and other charts. On the left is the chart customization
    option, which includes categories, order, category order, summary, split type,
    and bar type. In the center, a bar graph of count versus United state cities.
    California has the highest count of 245\. District of Columbia has the lowest
    count of 3.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-4
  prefs: []
  type: TYPE_NORMAL
- en: User Counts of Each US State on the CREDITUSERS Table
  prefs: []
  type: TYPE_NORMAL
- en: This leads us to the endeavor of detailing out the role of AI in performing
    data analysis and profiling tasks.^([7](#Fn7))
  prefs: []
  type: TYPE_NORMAL
- en: 'The following list includes key capabilities of data analysis and profiling,
    which are applied via ML and DL:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Determining** **representative sample datasets**: ML algorithms and techniques
    should be used to determine a representative subset of records in a database table
    that consists, for instance, of only 10`–`15% of the original data records. Statistical
    measures should be determined on these representative subsets, which have the
    potential to reduce time and compute resources by factors. Depending on the values
    of the underlying dataset, a larger representative dataset may yield more accurate
    predictive results for the entire dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Extrapolating statistics**: Once key statistical measures have been determined
    based on those representative subsets, ML methods should be applied to extrapolate
    (predict) corresponding statistical values for the entire dataset. This applies
    to all statistical values that are depicted in Figure [14-3](#Fig3), for example,
    frequency distribution, quality score, mean value, standard deviation, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Understanding structure of data and AI assets**: ML and DL methods are particularly
    well suited to discover the structure of data and AI assets, including non-structured
    data, pipelines, text, images, etc. Discovering structure includes determination
    of data types (e.g., XML, JSON, etc.), ML/DL model types (e.g., ONNX, Scikit-learn,
    PMML, XGBoost, TensorFlow, etc.), number of levels in random forest ML models,
    number of hidden layers in ANN models, identification of queues or ETL stages,
    etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clustering of data**: A much deeper and more relevant profiling is done with
    clustering of data (as we have suggested previously when discussing Figure [14-4](#Fig4)),
    particularly values of key columns in database tables, for example, salary income,
    credit card spending, purchasing volume, types or categories of goods purchased,
    etc. This enables data engineers and data consumers to gain additional insight
    that is not so obvious and easily visible by just looking at statistical distribution
    values. It specifically supports the transformation from pure customer data to
    gaining more insight regarding customer behavior.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Relationship discovery**: Data and AI assets need to be visualized in context
    and in relationship to each other, which requires ML-based discovery methods and
    visualization and access methods for ease of consumption. For instance, AI models
    need to be presented in regard to associated data pipelines and applications for
    scoring and inferencing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The preceding analysis and profiling tasks must be performed autonomously and
    repetitively, depending on availability of new assets or updates to existing data
    and AI assets. Results of these analysis and profiling tasks should be pushed
    to the knowledge catalog autonomously as well.
  prefs: []
  type: TYPE_NORMAL
- en: Before we move on to automated tagging, annotation, and labeling of data and
    metadata, we would like to point out the difference between data profiling and
    data mining. With data profiling, we essentially limit our analysis to structure
    discovery, content discovery, and relationship discovery, whereas data mining
    is geared toward finding *golden nuggets* in data primarily via exploration, pattern
    discovery, etc. Although there may be an overlap between data mining and profiling,
    data mining is done for a particular business purpose, that is, targeted marketing
    campaign or customer care, whereas data profiling has a more general purpose.^([8](#Fn8))
  prefs: []
  type: TYPE_NORMAL
- en: Automated Tagging, Annotation, and Labeling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before diving into automated tagging, annotation, and labeling of metadata,
    let us look at another example^([9](#Fn9)) depicted in Figure [14-5](#Fig5), where
    several columns of the *CREDITUSERS* table are listed on the left side. For the
    column ADDRESS, three business terms are automatically suggested, including a
    probability measure for a match: *Work Address* (79%), *Email Address* (77%),
    and *Postal Address* (76%).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig5_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the credit users information. On the left, a table lists the
    column, business terms, data class, data quality, and review status. On the right,
    an address column information of the governance business term suggests 3 terms.
    Work address, 79%. Email address, 77%. Postal address, 76%.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-5
  prefs: []
  type: TYPE_NORMAL
- en: Business Term Assignment
  prefs: []
  type: TYPE_NORMAL
- en: These business terms are automatically taken from the business glossary and
    assigned to the column *ADDRESS*, giving the data steward a choice to select one
    of these terms as the most suitable one. In this example, the data steward has
    the option to either choose one of the proposed terms or even reject all three,
    depending on their own judgment.
  prefs: []
  type: TYPE_NORMAL
- en: Let us now clarify the terms *tagging*, *annotation*, and *labeling*, which
    are often wrongly used interchangeably. Comparing these terms, we limit the discussion
    to the Data Fabric and AI scope. Quite a few terms exist to further enrich data,
    such as labels, annotations, tags, comments, attributes, explanations, etc.
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, *tagging* means to add additional keywords, phrases, or terms to
    an asset to further explain what the asset is all about and to support searches,
    for example, a column of a database table may be tagged as *PII*, meaning it contains
    sensitive information. Some readers may refer to this as *comments* or *explanations*.
    An *attribute* is a characteristic of an asset, for example, an AI model may have
    the following characteristics assigned to it: *trained*, *validated*, or *deployed*.
    Like tags, *annotations* refer to additional information about assets that may
    comprise figures and text, for example, explanatory text as comments added to
    a Java program.'
  prefs: []
  type: TYPE_NORMAL
- en: In the context of AI with ML and DL though, *annotation* refers primarily to
    text, image, or video annotation, meaning to capture an object of interest, for
    instance, vehicles, bicycles, and pedestrians, in videos to support learning and
    training of an ANN model for autonomous driving.
  prefs: []
  type: TYPE_NORMAL
- en: 'Likewise, *labeling* refers to adding additional information to all records
    of a dataset to support training of AI models, for example, adding *TRUE* or *FALSE*
    to each passed banking transaction to train an ML model to predict whether a future
    transaction is fraudulent or not. Thus, annotation and labeling in AI^([10](#Fn10))
    are similar concepts to create datasets for AI model training. They differ by
    style and method: annotations are capturing or marking objects of interest (primarily
    in a text, image, or video), whereas labeling adds data to individual records.'
  prefs: []
  type: TYPE_NORMAL
- en: The crucial factor here is to apply AI/ML methods to add meaningful and relevant
    tags or annotations to data and metadata autonomously or to provide actionable
    recommendations for the data steward or data consumers. This facilitates a closer
    interlock and linkage of data and AI assets to business domains and thus supports
    self-service Data Mesh initiatives. Autonomous annotations and labeling in an
    AI context are essential tasks to address trustworthy AI as well in which, for
    instance, retraining and revalidation of AI models need to be performed autonomously,
    in case bias, drift, or worsening quality metrics have been detected for some
    AI models.
  prefs: []
  type: TYPE_NORMAL
- en: We would like to point out that autonomous tagging, annotation, and labeling
    needs to be done on data and AI assets as well as on metadata itself. Tags, annotations,
    and labels added to data and AI assets represent metadata, whereas tags, labels,
    and annotations to metadata yield active metadata, further enriching the existing
    set of metadata.
  prefs: []
  type: TYPE_NORMAL
- en: Some examples of the latter are the autonomous assignment of a business term
    to a database column; the relationship of a pipeline to an AI model; determining
    the impact on the business by, for instance, removing a supposedly unused dataset;
    or simply adding a descriptive label or a quality score to a database column that
    is already captured in the knowledge catalog.
  prefs: []
  type: TYPE_NORMAL
- en: Let us now move on to automated data quality assessments.
  prefs: []
  type: TYPE_NORMAL
- en: Automated Data Quality Assessment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Understanding and solving data quality issues is still the most common challenge
    for any data owner and data consumer; it goes far beyond just profiling data where
    some basic statistics for each column, such as frequency distribution, number
    of unique values, minimum and maximum values, mean value, standard deviation,
    etc., are calculated as depicted in Figure [14-3](#Fig3). A comprehensive data
    quality assessment requires a deeper look at data to understand, for instance,
    the number of data class violations, data type violations, missing values, format
    violations, values out of range, etc.
  prefs: []
  type: TYPE_NORMAL
- en: The outcome of a comprehensive data quality assessment is a detailed summary
    of findings that is represented as a *data quality score* for each data asset
    as illustrated in Figure [14-6](#Fig6).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig6_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the table under the column 59 tab. The table lists the assets,
    sources, business terms, data quality, and review status and highlights 3 data
    assets and the data quality score. Data assets are credit card, credit trans,
    and credit users with a 99, 98, and 99 percent quality score.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-6
  prefs: []
  type: TYPE_NORMAL
- en: Data Quality Assessment
  prefs: []
  type: TYPE_NORMAL
- en: Figure [14-6](#Fig6) lists three tables `–` *CREDITCARDS*, *CREDITTRANS*, and
    *CREDITUSERS* `–` with their corresponding quality scores, which are 99%, 98%,
    and 99%, respectively. These quality scores are derived by calculating data quality
    dimensions for each individual column of a database table.
  prefs: []
  type: TYPE_NORMAL
- en: The overall quality score for a data asset is then derived from the quality
    scores of each column from each of the tables. Thus, a set of well-defined data
    quality dimensions are used to calculate a quality score for each chosen column,
    where the set of quality scores for each chosen column are used to calculate the
    overall quality score of the whole data asset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us briefly discuss the data quality dimensions^([11](#Fn11)):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data class violations**: Is counting the violations of data classes defined
    in the knowledge catalog (e.g., Passport Number, New York State Driver’s License,
    Organization Name, VISA Card, etc.) for each column.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data type violations**: Is counting violations of data types (e.g., SMALLINT,
    REAL, DATE, TIMESTAMP, etc.) of each chosen column as it has been determined during
    the prior data profiling phase.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Inconsistent capitalization**: Is looking for patterns regarding usage of
    upper- and lowercase in strings and is counting the number of violations taking
    the identified usage pattern as a base – assuming a pattern has been identified
    for the majority of values in a column.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Values out of range**: Is looking for violations of a minimum and/or maximum
    constraint, which has been defined for values of a column.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Rule violations**: Is looking for violations of any data or quality rule
    for a row in a database table that has been defined by the data steward.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Suspect values**: Is looking for mismatches of values and format and properties
    of values, compared with the identified most likely pattern of a column.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Suspect values in correlated columns**: Similar to the *suspect values* dimension,
    this data quality dimension detects mismatches of likely patterns or correlations
    of values across columns within a table.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Missing values**: Is looking for non-expected NULL or empty values in columns.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Inconsistent representation of missing values**: Is looking for NULL, empty,
    or values containing only spaces in a column.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Format violations**: The data steward may have declared certain values of
    a column as invalid; the number of these invalid values for each column is counted
    by this dimension.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Duplicated values**: This dimension may already be captured via the data
    profiling phase, where the number of duplicate values is calculated for columns
    that should contain unique values, that is, primary or unique keys.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Figure [14-7](#Fig7) shows a subset of the data quality dimensions for the table
    *BANK_CUSTOMERS* and the overall data quality score for this table, which is 96%.
    It also depicts the quality score for some of its columns, like *CUSTOMER_ID*,
    *NAME*, *ADDRESS*, *ZIP*, *CREDIT_RATING*, and *AGE*. As you can see, the quality
    score for most of the columns is either 100% or very close to 100%, whereas the
    *ZIP* column is only 66%, which is a key reason for the overall data quality score
    of the table *BANK_CUSTOMERS* to be 96%.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig7_HTML.png)'
  prefs: []
  type: TYPE_IMG
- en: A screenshot of the data asset of the bank customer. On the left, the data quality
    score is 96%, and a table at the left bottom highlight with a dark shade. On the
    right, the data quality option list the quality dimension results of the name,
    hash of findings, percentage of finding, delta, and ignore.
  prefs: []
  type: TYPE_NORMAL
- en: Figure 14-7
  prefs: []
  type: TYPE_NORMAL
- en: Data Quality Dimensions
  prefs: []
  type: TYPE_NORMAL
- en: This example is presumably derived from rather traditional data quality assessment
    methods of database tables. With the exception of *suspect values* and *suspect
    values in correlated columns*, which require AI techniques (i.e., pattern discovery),
    all other data quality dimensions are primarily calculated via conventional methods.
    Future methods are inevitably affected by broadening the scope to include AI assets,
    meaning to assess quality of AI models, ETL stages, pipelines, etc. For instance,
    measuring the quality of an AI model is related to what we have discussed in Chapter
    [5](537582_1_En_5_Chapter.xhtml) in the section on trustworthy AI, namely, to
    measure quality metrics, for example, the areas under the ROC or PR curves while
    models are in production.
  prefs: []
  type: TYPE_NORMAL
- en: Even today’s data with its unprecedented diversity in terms of text, images,
    and videos is calling for innovative methods to measure the quality of these data
    in the context of a certain usage purpose. For instance, what are the quality
    imperatives and measurement methods for medical texts to be declared as suitable
    to serve as reliable input for DL model development to predict medical treatment,
    promising recovery with high confidence? What are the methods to measure the quality
    and completeness of annotated video sequences to serve as input for training DL
    models used for autonomous driving?
  prefs: []
  type: TYPE_NORMAL
- en: 'The treatment of this topic cannot end without discussing the need for automated
    actions to correct quality issues. Similar to what we have seen with metadata
    enrichment where business terms are suggested to be assigned to a column, data
    quality assessments can only be seen as the beginning of a journey where corrections
    need to autonomously performed, using AI/ML: quality assessments in the context
    of a modern Data Fabric and Data Mesh need to be developed into *intelligent automated
    quality management*, where corrections must be implemented autonomously or suggested
    to the data steward.'
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We conclude this chapter with a few key takeaways as summarized in Table [14-1](#Tab1).
  prefs: []
  type: TYPE_NORMAL
- en: Table 14-1
  prefs: []
  type: TYPE_NORMAL
- en: Key Takeaways
  prefs: []
  type: TYPE_NORMAL
- en: '| # | Key Takeaway | High-Level Description |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 1 | Intelligent automated metadata is key to a Data Fabric and Data Mesh.
    | The term *intelligent automated metadata* does portray the inclusion of AI/ML
    into the entire lifecycle of metadata management, including generation, enrichment,
    and consumption of data. |'
  prefs: []
  type: TYPE_TB
- en: '| 2 | A knowledge catalog is based on intelligent auto-capabilities. | A knowledge
    catalog for a Data Fabric architecture and Data Mesh solution needs to manage
    automated metadata generation, automated metadata enrichment, and automated metadata
    extraction and exploitation of the underlying data and AI assets. |'
  prefs: []
  type: TYPE_TB
- en: '| 3 | Data profiling is the first step to gain insight into data assets. |
    Data profiling is the first process of examining, analyzing, and checking the
    content of data attributes of data assets to get a first path of statistical insight
    and an initial understanding regarding data quality. |'
  prefs: []
  type: TYPE_TB
- en: '| 4 | AI/ML can augment data profiling. | AI/ML can determine representative
    sample datasets, extrapolate statistics for the entire dataset, understand structure
    of data and AI assets, and perform clustering and relationship discovery. |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Tagging, annotation, and labeling. | AI/ML should be applied to tagging,
    annotation, and labeling, which can be seen as vital methods for metadata enrichment.
    |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Automated data quality assessments are based on data quality dimensions.
    | A number of data quality dimensions are used, such as data class violations,
    data type violations, inconsistent capitalization, values out of range, rule violations,
    suspect values, etc., to perform automated data quality assessments. |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | AI/ML needs to be leveraged for improving quality assessments. | Comprehensive
    quality assessments of data and AI assets in the context of a modern Data Fabric
    and Data Mesh need to be infused with AI/ML and developed into intelligent automated
    quality management processes. |'
  prefs: []
  type: TYPE_TB
