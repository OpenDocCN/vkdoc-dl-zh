- en: 13. Intelligent Cataloging and Metadata Management
  id: totrans-300
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 13. 智能编目和元数据管理
- en: Suppose you are a business analyst and you need to find the customer purchase
    records of a certain market in the last quarter from 1.3 million tables and billions
    of records to make a predictive analysis of the consumption trend in this region
    for the next quarter. How are you going to do it? This task is like looking for
    a needle in a haystack. What is even more frustrating is that when you finally
    find the relevant data after spending weeks on source data exploration, it is
    out of date, and new essential data is available. This example illustrates that
    it is not sufficient for companies to make data accessible; they also need to
    make it discoverable, understandable, and consumable in near real time to gain
    timely and relevant insights from the data.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你是一名业务分析师，你需要从1300万张表和数十亿条记录中找到某个市场上一季度客户购买记录，以便对该地区下一季度的消费趋势进行预测分析。你将如何做？这项任务就像在
    haystack 中找针。更令人沮丧的是，当你花费数周时间在数据源探索中找到相关数据后，它已经过时了，新的重要数据已经可用。这个例子说明了，仅仅使数据可访问是不够的；企业还需要使数据在近实时状态下可发现、可理解、可消费，以便从数据中获得及时和相关的洞察。
- en: Introduction to Metadata Management
  id: totrans-302
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元数据管理简介
- en: 'In the digital era, enterprises need to know all aspects of data:'
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: 在数字时代，企业需要了解数据的各个方面：
- en: What data they have, where it is, how much is there, and what data needs to
    be protected
  id: totrans-304
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们拥有哪些数据，数据在哪里，有多少数据，以及哪些数据需要被保护
- en: What are the business values of data, what is the quality of data, and when
    does the data need to be archived
  id: totrans-305
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据的商业价值是什么，数据的质量如何，数据何时需要归档
- en: Where does the data come from, who owns the data, who uses the data, for what
    business purposes, and so on
  id: totrans-306
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据从哪里来，谁拥有数据，谁使用数据，用于什么商业目的，等等
- en: To address the preceding questions effectively, enterprises need to put metadata
    management into place. As we have described before, metadata^([1](#Fn1)) is the
    data used to describe the data. Let’s look at a real-life example. On many occasions,
    we need to do self-introductions. When we introduce ourselves, we usually introduce
    name, position, the company we’re working for, the school we graduated from, etc.
    We may also introduce family, hobbies, etc. Name, occupation, working experience,
    education, family background – all this can be seen as metadata used to define
    our identity, which enables others to know who we are and how they connect with
    us in social life, as depicted in Figure [13-1](#Fig1). In short, metadata helps
    users comprehend and communicate meaning associated with data.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地解决上述问题，企业需要实施元数据管理。正如我们之前所描述的，元数据^([1](#Fn1))是用来描述数据的那些数据。让我们来看一个现实生活中的例子。在许多场合，我们需要进行自我介绍。当我们介绍自己时，我们通常会介绍姓名、职位、我们工作的公司、我们毕业的学校等。我们也可能介绍家庭、爱好等。姓名、职业、工作经验、教育、家庭背景——所有这些都可被视为用来定义我们身份的元数据，这使他人能够了解我们是谁，以及他们在社会生活中如何与我们联系，如图
    [13-1](#Fig1) 所示。简而言之，元数据帮助用户理解并传达与数据相关的意义。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig1_HTML.png)'
  id: totrans-308
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig1_HTML.png)'
- en: 'A cycle of personal profiles with 5 metadata: profession, family, skills, education,
    and demographic info.'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 包含5个元数据的个人资料周期：职业、家庭、技能、教育和人口统计信息。
- en: Figure 13-1
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-1
- en: Metadata for Personal Profile
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 个人资料元数据
- en: 'Metadata can be broadly classified into three categories: business metadata,
    technical metadata, and operational metadata.^([2](#Fn2)) Business metadata describes
    the meaning of the business that the data represents in the real world. For example,
    this nine-digit string *111-22-3344* can represent a person’s Social Security
    number (SSN), an account number, or an application confirmation number. The validation
    rules and protection rules vary depending on the business context. For example,
    an SSN belongs to Personal Confidential Information (PCI), which is classified
    as personal sensitive data and requires the application of high-level security
    and privacy protection. In summary, business metadata facilitates the understanding
    of data; it furthermore links data with corresponding business rules.'
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 元数据可以广泛分为三类：业务元数据、技术元数据和操作元数据。[^([2](#Fn2))]业务元数据描述了数据在现实世界中代表的数据的业务含义。例如，这个九位字符串
    *111-22-3344* 可以代表一个人的社会保障号码（SSN）、账户号码或应用确认号码。验证规则和保护规则根据业务环境的不同而有所不同。例如，SSN属于个人机密信息（PCI），被归类为个人敏感数据，需要应用高级安全和隐私保护。总之，业务元数据有助于理解数据；它还把数据与相应的业务规则联系起来。
- en: In contrast, technical metadata describes the access information of data in
    an IT environment, for example, where data is stored, in which format, and how
    to access it. For example, an SSN is stored in a column named *ID* of a table
    in a Db2 database. The column name, table name, database name, and database connections
    are all technical metadata, which can serve data engineers to get access to data.
    In addition, data types, constraints, and dependencies are technical metadata
    too.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，技术元数据描述了IT环境中数据的访问信息，例如数据存储的位置、格式以及如何访问它。例如，SSN存储在Db2数据库表中名为 *ID* 的列中。列名、表名、数据库名和数据库连接都是技术元数据，可以为数据工程师提供访问数据的方式。此外，数据类型、约束和依赖性也是技术元数据。
- en: Operational metadata is concerned about the creation and transformation of data
    and AI assets. Table [13-1](#Tab1) lists some examples of metadata.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 操作元数据关注数据的创建和转换。表 [13-1](#Tab1) 列出了一些元数据的示例。
- en: Table 13-1
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 表 13-1
- en: Business Metadata, Technical Metadata, and Operational Metadata
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: 业务元数据、技术元数据和操作元数据
- en: '| Metadata | Purpose | Examples |'
  id: totrans-317
  prefs: []
  type: TYPE_TB
  zh: '| 元数据 | 目的 | 示例 |'
- en: '| --- | --- | --- |'
  id: totrans-318
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Business metadata | Business meaning in the real-world for understanding
    data | Business definitions, the explanations of business terms; KPIs, calculated
    KPIs, and derived KPIs; business identification rules, quality rules, protection
    rules, security and privacy level, etc. |'
  id: totrans-319
  prefs: []
  type: TYPE_TB
  zh: '| 业务元数据 | 理解数据在现实世界中的业务含义 | 业务定义、业务术语的解释；KPI、计算KPI和派生KPI；业务识别规则、质量规则、保护规则、安全和隐私级别等。
    |'
- en: '| Technicalmetadata | Technical information of IT platforms for retrieving
    data | Physical database table names, column names, field lengths, field types,
    constraint information, data dependencies, SQL script information, ETL conversion,
    data update frequency, etc. |'
  id: totrans-320
  prefs: []
  type: TYPE_TB
  zh: '| 技术元数据 | 用于检索数据的IT平台的技术信息 | 物理数据库表名、列名、字段长度、字段类型、约束信息、数据依赖性、SQL脚本信息、ETL转换、数据更新频率等。
    |'
- en: '| Operational metadata | Data concerning transformation of data and AI assets
    | ETL stages, I/U/D logs, pipelines, job execution logs including runtime parameters,
    SQL query execution logs (for instance, access path information), AI asset usage
    logs, etc. |'
  id: totrans-321
  prefs: []
  type: TYPE_TB
  zh: '| 操作元数据 | 与数据及AI资产转换相关的数据 | ETL阶段、I/U/D日志、管道、作业执行日志（包括运行时参数）、SQL查询执行日志（例如，访问路径信息）、AI资产使用日志等。
    |'
- en: 'Let us go back to metadata management.^([3](#Fn3)) An effective metadata management
    platform should have the following capabilities:'
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下元数据管理。[^([3](#Fn3))]一个有效的元数据管理平台应该具备以下功能：
- en: '**Hierarchy**: Establish a complete hierarchy and system of business metadata,
    technical metadata, operational metadata, policies and rules, and ultimately active
    metadata.'
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**层级结构**：建立一个完整的业务元数据、技术元数据、操作元数据、政策和规则，以及最终活动元数据的层级结构和系统。'
- en: '**Quality**: Create a continuous quality inspection framework to understand
    and improve data integrity and accuracy through metadata information.'
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量**：创建一个持续的质量检查框架，通过元数据信息来理解和改进数据完整性和准确性。'
- en: '**Insight**: Enable users to clearly understand and visualize details of the
    entire data flow across enterprises to improve data traceability, addressing the
    entire lifecycle of data and AI assets.'
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**洞察力**：使用户能够清楚地理解和可视化企业整个数据流的细节，以改善数据可追溯性，解决数据及AI资产的全生命周期问题。'
- en: Metadata management is not a one-time job; metadata needs to be administered
    and maintained reiteratively. Therefore, from a technical point of view, the metadata
    management platforms usually include components such as metamodel management,
    metadata audit, metadata maintenance, metadata change management, and metadata
    version management. There are many mature commercial products available in the
    market, such as IBM Watson Knowledge Catalog, Informatica, Alation, etc.
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 元数据管理不是一次性的工作；元数据需要反复管理和维护。因此，从技术角度来看，元数据管理平台通常包括元模型管理、元数据审计、元数据维护、元数据变更管理和元数据版本管理等功能。市场上有许多成熟的商业产品，例如IBM
    Watson知识编目、Informatica、Alation等。
- en: Key Aspects of Intelligent Cataloging
  id: totrans-327
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能编目关键要点
- en: 'The enterprise knowledge catalog is a system for organizing and storing data
    according to well-established metadata systems. Usually, the library catalog is
    used to explain the concept. Suppose you go to the library and want to find a
    book. You can find the shelf number by genre: fiction, nonfiction, textbooks,
    and so on. Or you can find it by author and the year of publication. The title,
    the author, and the year of publication are all considered metadata. The place
    that stores this information and the location of the book is the library catalog.
    The process of cataloging is a nontrivial endeavor. When a new batch of books
    comes in, the first task librarians need to tackle is to enter the information
    of the books into the knowledge or library catalog, according to the metadata
    framework.'
  id: totrans-328
  prefs: []
  type: TYPE_NORMAL
  zh: 企业知识编目系统是根据既定的元数据系统组织和存储数据的系统。通常，图书馆编目用来解释这一概念。假设你去了图书馆并想找一本书。你可以通过类型：小说、非小说、教科书等来找到书架号。或者你也可以通过作者和出版年份来找到它。书名、作者和出版年份都被认为是元数据。存储这些信息以及书籍位置的是图书馆编目。编目过程是一项非同寻常的努力。当一批新书到来时，图书管理员需要首先解决的问题是将书籍信息根据元数据框架输入到知识或图书馆编目中。
- en: Now imagine if the incoming data is stored in tens of thousands of tables with
    billions of records. It would be a time-consuming and labor-intensive task to
    catalog these data records with accurate metadata. That’s where AI comes into
    play. Intelligent cataloging^([4](#Fn4)) is to use ML models that automate the
    cataloging process to the maximum extent.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下，如果传入的数据存储在成千上万的表中，包含数十亿条记录。用准确的元数据对这些数据记录进行编目将是一项耗时且劳动密集型的任务。这就是人工智能发挥作用的地方。智能编目[4](#Fn4)就是使用机器学习模型最大限度地自动化编目过程。
- en: 'It generally has the following capabilities:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 它通常具有以下功能：
- en: '**Automated data discovery and enrichment**: Responding to the complex and
    diverse data environment of enterprises, the intelligent knowledge catalog automatically
    discovers data and enriches data assets with business definitions based on AI-infused
    technologies, including profiling data, assigning business terms, classifying
    data, analyzing the data quality, correlating data assets, and enforcing the privacy
    and security rules for data. The data discovery process is the foundation of intelligent
    cataloging; it quickly creates a knowledge catalog and then makes data ready for
    use.'
  id: totrans-331
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化数据发现和丰富**：应对企业复杂多样的数据环境，智能知识编目基于人工智能技术自动发现数据，并利用业务定义丰富数据资产，包括数据概要、分配业务术语、分类数据、分析数据质量、关联数据资产以及执行数据隐私和安全规则。数据发现过程是智能编目的基础；它快速创建知识编目，然后使数据准备就绪供使用。'
- en: '**Semantic search and recommendation**: To help business users quickly identify
    and locate data, intelligent cataloging provides powerful semantic search capabilities.
    The difference between semantic search and full-text search is that instead of
    just matching for textual similarity, semantic search aims to understand the intent
    and contextual meaning of your search and thereby to provide for more relevant
    content. In addition, the intelligent knowledge catalog will also make recommendations
    of similar data assets based on the user’s search results, which can also greatly
    improve the efficiency of finding data.'
  id: totrans-332
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语义搜索和推荐**：为了帮助业务用户快速识别和定位数据，智能目录提供了强大的语义搜索功能。语义搜索与全文搜索的区别在于，它不仅仅匹配文本相似度，而是旨在理解搜索的意图和上下文意义，从而提供更相关的内容。此外，智能知识目录还会根据用户的搜索结果推荐类似的数据资产，这也可以大大提高查找数据的效率。'
- en: '**Data lineage and provenance**: Data lineage is the end-to-end flow of data
    across the enterprise, and as part of the data asset catalog, it provides tracking
    and tracing throughout the data lifecycle to understand where the data came from,
    how it was transformed, and who is using it for which purpose. Typically, data
    lineage diagrams visualize the relationships between tables, views, fields, etc.
    using a directed acyclic graph model. It shows whether data comes from a trusted
    source and if there are any malicious attempts on the data. Data provenance sheds
    light on the origin of data or any AI asset, for example, who owns the data or
    AI asset, who has created it, etc.'
  id: totrans-333
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据血缘和来源**：数据血缘是企业中数据端到端流动的整个过程，作为数据资产目录的一部分，它在整个数据生命周期中提供跟踪和追踪，以了解数据来自何处，如何转换，以及谁出于何种目的使用它。通常，数据血缘图使用有向无环图模型来可视化表、视图、字段等之间的关系。它显示数据是否来自可信来源，以及是否有针对数据的恶意尝试。数据来源揭示了数据或任何AI资产的起源，例如，数据或AI资产的所有者是谁，谁创建了它等。'
- en: Build an Intelligent Catalog by Automating Data Discovery and Enrichment
  id: totrans-334
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过自动化数据发现和丰富化构建智能目录
- en: The intelligent data catalog first connects to various data sources in the enterprise
    and extracts metadata from them. The process is known as data discovery. Typically,
    users specify the connection to the data source, and data discovery scans the
    catalog tables of data sources with connection information to retrieve various
    technical metadata, for example, field name, data format, etc. On the other hand,
    data enrichment refers to the process where intelligent cataloging assigns business
    terms, analyzes the quality, and adds relationships between data assets based
    on metadata.
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 智能数据目录首先连接企业中的各种数据源，并从中提取元数据。这个过程被称为数据发现。通常，用户指定数据源的连接，数据发现会扫描具有连接信息的目录表，以检索各种技术元数据，例如字段名、数据格式等。另一方面，数据丰富化指的是智能目录根据元数据分配业务术语、分析质量，并基于数据资产之间的关系添加数据资产。
- en: For instance, the format of a column may indicate the data is an SSN. In this
    case, the column will be assigned the business term *ID*, which elevates the privacy
    level to PII information. The name of the field may also indicate that it is related
    to an address. In this case, the field will be linked to other fields, and it
    is tagged as contact information.
  id: totrans-336
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，列的格式可能表明数据是SSN。在这种情况下，该列将被分配业务术语*ID*，这提高了隐私级别至PII信息。字段的名称也可能表明它与地址相关。在这种情况下，该字段将与其他字段相关联，并标记为联系信息。
- en: The volume of data in the enterprise has proliferated, and performing data discovery
    and enrichment tasks manually seems to be impossible. Automated discovery and
    enrichment tasks do not require human invention; they are – to a maximum extent
    – performed by ML algorithms.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 企业中的数据量激增，手动执行数据发现和丰富化任务似乎是不可能的。自动发现和丰富化任务不需要人类创新；它们在最大程度上由机器学习算法执行。
- en: To better illustrate this process, let’s go back to the library example, as
    illustrated in Figure [13-2](#Fig2). Suppose there are several books that need
    to serve as input to the library catalog. The location of these books can then
    be seen as the connection information of data sources, while the book is regarded
    as the data record. With automated data discovery, the scattered books are then
    automatically identified and organized in the catalog.
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地说明这个过程，让我们回到图书馆的例子，如图[13-2](#Fig2)所示。假设有几本书需要作为图书馆目录的输入。这些书的地点可以看作是数据源的联系信息，而书籍被视为数据记录。通过自动化数据发现，散乱的书籍随后被自动识别和组织到目录中。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig2_HTML.png)'
  id: totrans-339
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig2_HTML.png)'
- en: A photograph of a set of books arranged in order converted to 4 books with a
    context through automated data discovery.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 一组按顺序排列的书籍的照片，通过自动化数据发现转换为带有上下文的4本书。
- en: Figure 13-2
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 图13-2
- en: Illustration of the Data Discovery Process
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 数据发现过程示意图
- en: In addition to the basic information as author, ISBN, and publisher, the topics
    of the books are also recognized by analyzing book review abstracts and comments
    in websites by NLP technology.^([5](#Fn5)) Judging from the title of the book,
    it is easy to categorize *Rising Strong* to the area of emotional intelligence.
    But it’s not straightforward just by reading the name *Start with Why* that this
    is the title of a computer book.
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 除了作者、ISBN和出版社等基本信息外，通过分析书籍评论摘要和网站评论，使用NLP技术识别书籍的主题。从书籍标题来看，很容易将*Rising Strong*归类到情绪智力领域。但仅通过阅读*Start
    with Why*这个名称，并不能直接判断这是一本计算机书籍。
- en: That is where sophisticated ML algorithms can help. The higher the level of
    AI applied to the knowledge catalog is, the more comprehensive the derived knowledge
    graph behind the catalog will be. AI can support a lot of the heavy lifting work,
    but nonetheless it cannot ultimately replace subject matter experts to deal with
    complex situations. After all, the accuracy of AI models depends on historical
    training of models and corresponding AI algorithms. Indeed, it may not always
    yield the correct results.
  id: totrans-344
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是复杂ML算法可以提供帮助的地方。应用于知识目录的AI级别越高，目录背后的知识图谱就越全面。AI可以支持大量的繁重工作，但最终还是不能完全取代主题专家来处理复杂情况。毕竟，AI模型的准确性取决于模型的和历史训练以及相应的AI算法。实际上，它可能并不总是产生正确的结果。
- en: In this case, AI models can provide a suggestion, which subject matter experts
    need to confirm for acceptance or rejection, as illustrated in Figure [13-3](#Fig3),
    where *Transaction* is a table in a Db2 for z/OS database. After discovering and
    enriching the *Transaction* table via a Db2 for z/OS connection by intelligent
    cataloging, the column *Transaction*_*TS* is suggested as the business term *Transaction_ID*
    with an 82% confidence level.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，AI模型可以提供一些建议，主题专家需要确认以接受或拒绝，如图[13-3](#Fig3)所示，其中*Transaction*是Db2 for
    z/OS数据库中的一个表。通过智能编目通过Db2 for z/OS连接发现和丰富*Transaction*表后，建议将*Transaction*_*TS*列作为业务术语*Transaction_ID*，置信度为82%。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig3_HTML.jpg)'
  id: totrans-346
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig3_HTML.jpg)'
- en: A screenshot of a transaction table with column headers columns, business terms,
    data class, data quality, and review status. A transaction t s page is on the
    right.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 一张交易表截图，包含列标题、业务术语、数据类别、数据质量和审查状态。交易表页面在右侧。
- en: Figure 13-3
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: 图13-3
- en: Enrichment of Data with Business Terms
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 使用业务术语丰富数据
- en: The data curator could review the suggested business term and decide whether
    it should be assigned to this column or not. Once the *Transaction_ID* is assigned,
    the policies and rules that are defined with *Transaction_ID* will be enforced
    on the data of the column *Transaction_TS*. For example, the data protection rule
    or data locality rule will mask the data in *Transaction_TS*.
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: 数据管理员可以审查建议的业务术语，并决定是否将其分配给此列。一旦分配了*Transaction_ID*，与*Transaction_ID*定义的政策和规则将强制执行在*Transaction_TS*列的数据上。例如，数据保护规则或数据本地性规则将屏蔽*Transaction_TS*中的数据。
- en: Find Data Assets with Semantic Search and Recommendation
  id: totrans-351
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用语义搜索和推荐查找数据资产
- en: In real-world situations, very likely business analysts and data scientists
    are struggling to discover and access relevant data sources and to fully understand
    the structure and content of a particular data source. Subsequently, they need
    an effective way to search for it and to perform data exploration tasks. However,
    using keyword searches requires a solid understanding regarding the most relevant
    keywords. If the keywords are not chosen correctly, users often cannot find the
    relevant data.
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界中，业务分析师和数据科学家很可能在努力发现和访问相关数据源，以及完全理解特定数据源的结构和内容。随后，他们需要一种有效的方式来搜索它并执行数据探索任务。然而，使用关键词搜索需要对于最相关的关键词有坚实的理解。如果关键词选择不当，用户往往无法找到相关数据。
- en: This is where semantic search comes into play. Semantic query^([6](#Fn6)) attempts
    to capture the users’ thoughts and relevant context, also referring to the relationship
    between search entities and providing more accurate and more comprehensive query
    results. For example, if you are browsing the menu of a restaurant website, you
    may search for *soap*. The semantic search will guess that you are looking for
    *soup* and may then return today’s options. Assuming that you are using a supermarket
    app searching for *soap*, the semantic search will likely return products related
    to detergents and stain removers. Semantic search queries return the most suitable
    results based on a specific context, for example, what are you currently doing
    and why are you doing it, trying to understand your most likely intent, as illustrated
    in Figure [13-4](#Fig4).
  id: totrans-353
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是语义搜索发挥作用的地方。语义查询^([6](#Fn6))试图捕捉用户的思考和相关信息，同时也参考了搜索实体之间的关系，提供更准确和更全面的查询结果。例如，如果你正在浏览一个餐厅网站的菜单，你可能搜索“肥皂”。语义搜索会猜测你是在寻找“汤”，然后可能会返回今天的选项。假设你正在使用一个超市应用搜索“肥皂”，语义搜索可能会返回与洗涤剂和去污剂相关的产品。语义搜索查询根据特定的上下文返回最合适的结果，例如，你目前正在做什么以及你为什么这么做，试图理解你最可能的意图，如图
    [13-4](#Fig4) 所示。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig4_HTML.png)'
  id: totrans-354
  prefs: []
  type: TYPE_IMG
  zh: '![图 13-4](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig4_HTML.png)'
- en: An illustration represents the flow of 5 icons on semantic search. Each icon
    with a text as follows. 1\. Search pizza. 2\. What is the intent colon order a
    pizza or make a pizza? 3\. What is the context, location, and preference? 4\.
    Search knowledge base. 5\. Results.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 一幅插图展示了语义搜索中5个图标的流程。每个图标上的文本如下。1. 搜索披萨。2. 意图是什么：订购披萨还是制作披萨？3. 上下文、位置和偏好是什么？4.
    搜索知识库。5. 结果。
- en: Figure 13-4
  id: totrans-356
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-4
- en: Illustration of Semantic Search
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 语义搜索示意图
- en: Figure [13-5](#Fig5) shows another example of a semantic search, where users
    intend to find data assets that have contact information.
  id: totrans-358
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [13-5](#Fig5) 展示了语义搜索的另一个示例，其中用户意图找到包含联系信息的数据资产。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig5_HTML.png)'
  id: totrans-359
  prefs: []
  type: TYPE_IMG
  zh: '![图 13-5](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig5_HTML.png)'
- en: A screenshot of the semantic search page. Filters of type, modified by, and
    modified on with radio buttons and checkboxes are on the left. The results of
    the search are displayed on the right.
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 语义搜索页面的截图。左侧有类型、修改者、修改日期的筛选器，使用单选按钮和复选框。搜索结果在右侧显示。
- en: Figure 13-5
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-5
- en: Example of Semantic Search Results for Contact Information
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 联系信息语义搜索结果示例
- en: Users input *Contact* in the global search field, and multiple records are returned
    as search results including *Telephone Number, Customer Phone Call, Customer Communication*,
    etc. The search result does not contain a column that is labeled exactly as *Contact*.
    If using keyword search, these data records are least likely to be returned, but
    they are actual contact information that users are looking for. When zooming into
    *Telephone Number*, it is marked as having a relationship with *Communication
    Content*, as illustrated in Figure [13-6](#Fig6).
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 用户在全局搜索字段中输入“联系”，并返回多个记录作为搜索结果，包括“电话号码、客户电话、客户沟通”等。搜索结果不包含一个精确标记为“联系”的列。如果使用关键词搜索，这些数据记录最不可能被返回，但它们是用户实际寻找的联系信息。当放大查看“电话号码”时，它被标记为与“沟通内容”有关，如图
    [13-6](#Fig6) 所示。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig6_HTML.png)'
  id: totrans-364
  prefs: []
  type: TYPE_IMG
  zh: '![图 13-6](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig6_HTML.png)'
- en: A screenshot of semantic search. The overview is open and it consists of a general
    description and related terms with type relationships on the left. The headers
    such as primary category, secondary categories, and part relationships are displayed
    on the right.
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 语义搜索的截图。概述是开放的，它包括左侧的一般描述和相关术语以及类型关系。主要类别、次要类别和部分关系等标题显示在右侧。
- en: Figure 13-6
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-6
- en: Semantic Search and Business Terms
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 语义搜索和业务术语
- en: Recommendation is another powerful feature for intelligent cataloging in conjunction
    with semantic search. Recommendation may depend on usage metrics, historical searches,
    and peer insights. Metrics-based means that asset recommendations are based on
    usage data, such as popularity, top rated and quality scores, etc. Historical
    search leverages previous searches to infer what assets would be of interest.
    Peer insights are based on the usage history of others.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐是与语义搜索相结合的智能目录的另一个强大功能。推荐可能取决于使用指标、历史搜索和同行见解。基于指标意味着资产推荐基于使用数据，例如流行度、最高评分和质量评分等。历史搜索利用以前的搜索来推断哪些资产可能感兴趣。同行见解基于他人的使用历史。
- en: This is like our online shopping experience. In ecommerce, there are often targeted
    recommendations that are specifically customized for you that are based on other
    customers’ purchase behavior, often linking one product to a set of others. This
    concept can be easily applied to searching for data, thus improving the overall
    shopping-for-data experience. This greatly improves the efficiency of business
    analysts and data scientists to find relevant and useful data, for instance, influencing
    targeted marketing campaigns that are geared toward efficient cross-selling and
    upselling initiatives.
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像我们的在线购物体验。在电子商务中，通常会有针对你的特定推荐，这些推荐基于其他客户的购买行为，通常将一个产品与其他一系列产品联系起来。这个概念可以很容易地应用于数据搜索，从而改善整体的数据购物体验。这大大提高了业务分析师和数据科学家找到相关和有用数据的高效性，例如，影响针对有效交叉销售和升级活动的定向营销活动。
- en: Let us move on to data insight and provenance
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论数据洞察和来源
- en: Provide Data Insight and Provenance as Data Flows Across the Enterprise
  id: totrans-371
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在数据在企业内部流动时提供数据洞察和来源
- en: One of the top data challenges customers are facing today is gaining trust in
    data and AI (trustworthy AI). How can I *prove* to data consumers that the data
    is trustworthy? How can I provide transparency in terms of data provenance and
    whether the data was changed inadvertently?
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 客户今天面临的最主要的数据挑战之一是建立对数据和人工智能（可信人工智能）的信任。我如何 *证明* 数据消费者数据是可信的？我如何提供关于数据来源和是否数据被意外更改的透明度？
- en: This is not surprising; with the explosion of information, there is a reason
    to question the credibility of data, as incomplete and outdated information does
    not benefit decision-making. Instead, it may lead to wrong decisions with significant
    business ramifications. Data lineage addresses this concern by documenting, tracking,
    and visualizing the data processing and transformation across disparate tools
    and sources, as illustrated in Figure [13-7](#Fig7) for the workflow of data lineage.
  id: totrans-373
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不令人惊讶；随着信息的爆炸式增长，质疑数据的可信度是有理由的，因为不完整和过时的信息不利于决策。相反，它可能导致错误的决策，产生重大的商业影响。数据血缘通过记录、跟踪和可视化跨不同工具和来源的数据处理和转换来解决这一担忧，如图
    [13-7](#Fig7) 所示，展示了数据血缘的工作流程。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig7_HTML.png)'
  id: totrans-374
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig7_HTML.png)'
- en: 'An illustration of a row of workflow icons with 3 metadata connected. The row
    of icons: database, operation, cloud, operation, documents, and reports. The metadata
    is connected to the database, cloud, and document.'
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 一行带有3个元数据连接的工作流图标示例。图标行：数据库、操作、云、操作、文档和报告。元数据连接到数据库、云和文档。
- en: Figure 13-7
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-7
- en: Illustration of Data Lineage
  id: totrans-377
  prefs: []
  type: TYPE_NORMAL
  zh: 数据血缘的说明
- en: 'Data lineage and provenance^([7](#Fn7)) are often used interchangeably. Both
    terms refer to the entire lifecycle of the data, including the five Ws: (a) where
    the data originates, (b) where the data has been and where is the destination,
    (c) who made changes to the data, (d) when the data was created or updated, and
    (e) where the data is stored and used. Knowing answers to these questions is critical
    to data consumers to trust analytics outcomes derived from data.'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 数据线索和来源^([7](#Fn7)) 经常被互换使用。这两个术语都指数据的整个生命周期，包括五个 W： (a) 数据的来源，(b) 数据曾经在哪里以及目的地在哪里，(c)
    谁对数据进行了更改，(d) 数据的创建或更新时间，以及 (e) 数据存储和使用的位置。了解这些问题的答案对于数据消费者来说至关重要，以便信任从数据中得出的分析结果。
- en: 'Figure [13-8](#Fig8) shows an example of data lineage. There are three types
    of nodes: a data node, operation node, and report node. The data asset *borrow*
    comes from multiple data sources, *books, audiobooks*, and *person*, via the operations
    *borrow_book* and *borrow_audiobook*.'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [13-8](#Fig8) 展示了数据线索的一个示例。有三个类型的节点：数据节点、操作节点和报告节点。数据资产 *borrow* 来自多个数据源，包括
    *books, audiobooks* 和 *person*，通过操作 *borrow_book* 和 *borrow_audiobook*。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig8_HTML.png)'
  id: totrans-380
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig8_HTML.png)'
- en: A screenshot of the lineage page. The headers are overview, asset, access, review,
    lineage, and profile. The page has 4 files clubbed into 2 files which are further
    clubbed as another file. The file is released as a public borrow.
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: 线索页面的截图。标题包括概述、资产、访问、审查、线索和配置文件。页面有 4 个文件合并成 2 个文件，这 2 个文件又进一步合并成另一个文件。该文件作为公共借用发布。
- en: Figure 13-8
  id: totrans-382
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-8
- en: Example of Data Lineage
  id: totrans-383
  prefs: []
  type: TYPE_NORMAL
  zh: 数据线索示例
- en: The lineage diagram can easily become very complex. Therefore, it is important
    to have zoom-in and zoom-out and expand and collapse capabilities to navigate
    through the diagram allowing users to focus on the specific part of the diagram
    and to advance step by step.
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: 线索图可能会变得非常复杂。因此，拥有缩放和展开以及展开和折叠的能力来导航图表非常重要，这使用户能够专注于图表的特定部分，并逐步前进。
- en: 'Let’s drill down to the next level of detail, referring to Figure [13-9](#Fig9).
    The table *students* is constructed by an insert statement with data fields: *student_name,
    student_surname, student_birthdate,* and *student_gender*.'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入到更细致的层次，参考图 [13-9](#Fig9)。表 *students* 是通过一个插入语句构建的，包含数据字段：*student_name,
    student_surname, student_birthdate,* 和 *student_gender*。
- en: '![](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig9_HTML.png)'
  id: totrans-386
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_13_Chapter/537582_1_En_13_Fig9_HTML.png)'
- en: 3 tables are named university library. Table 1 has rows of data such as create
    student, student gender, birthdate, surname, and name. Table 2 has rows such as
    create student, student body, and insert. Table 3 has a row named students.
  id: totrans-387
  prefs: []
  type: TYPE_NORMAL
  zh: 有 3 个表被命名为 university library。表 1 有如创建学生、学生性别、出生日期、姓氏和名字等数据行。表 2 有如创建学生、学生团体和插入等数据行。表
    3 有一个名为 students 的行。
- en: Figure 13-9
  id: totrans-388
  prefs: []
  type: TYPE_NORMAL
  zh: 图 13-9
- en: Lineage Details
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 线索细节
- en: Thus, users not just know where the data came from and what transformation processes
    were applied to it. With data lineage, enterprises can track the data as it flows
    through the organization and trace data quality issues back to specific processes
    or systems.
  id: totrans-390
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，用户不仅知道数据来自哪里以及对其应用了哪些转换过程。有了数据线索，企业可以跟踪数据在组织中的流动，并将数据质量问题追溯到特定的流程或系统。
- en: What is even more important, with impact analysis, organizations can assess
    the impact of data changes in one system on the entire enterprise.
  id: totrans-391
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，通过影响分析，组织可以评估一个系统中数据变化对整个企业的影响。
- en: Key Takeaways
  id: totrans-392
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [13-2](#Tab2).
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过表 [13-2](#Tab2) 总结的几个关键要点来结束本章。
- en: Table 13-2
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 表 13-2
- en: Key Takeaways
  id: totrans-395
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-396
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-397
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Metadata is the data used to describe data. | Metadata can be broadly
    classified into three categories: business metadata, which describes the meaning
    of the business that the data represents in the real world, and technical metadata,
    which describes the access information of data in the IT platforms, and operational
    metadata which describe the creation and transformation of data. |'
  id: totrans-398
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 元数据是用来描述数据的。 | 元数据可以广泛地分为三类：业务元数据，它描述了数据在现实世界中代表的数据所表示的业务的意义；技术元数据，它描述了数据在
    IT 平台中的访问信息；以及操作元数据，它描述了数据的创建和转换。|'
- en: '| 2 | Intelligent cataloging contains three key capabilities. | Intelligent
    cataloging uses AI to automate the data discovery and enrichment process to improve
    efficiency, and provide semantic search and recommendation for easy consumption,
    and provide data lineage to improve trust in data. |'
  id: totrans-399
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 智能编目包含三个关键能力。 | 智能编目利用AI自动化数据发现和丰富过程以提高效率，并提供语义搜索和推荐以方便消费，同时提供数据血缘以提高对数据的信任。
    |'
- en: '| 3 | Data discovery and enrichment are critical to building the catalog. |
    The intelligent data catalog connects to all enterprise data sources, extracts
    metadata from the data source, uses ML algorithms to assigns business terms, analyzes
    the quality, and adds relationships between data assets. |'
  id: totrans-400
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 数据发现和丰富对于构建编目至关重要。 | 智能数据编目连接到所有企业数据源，从数据源中提取元数据，使用机器学习算法分配业务术语，分析质量，并在数据资产之间添加关系。
    |'
- en: '| 4 | Semantic search yields better results that fit your purpose. | Semantic
    search aims to understand the intent and contextual meaning of your search and
    thereby provide for more relevant content. |'
  id: totrans-401
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 语义搜索能提供更符合你目的的结果。 | 语义搜索旨在理解你搜索的意图和上下文意义，从而提供更相关的内容。 |'
- en: '| 5 | Data lineage is the process of tracking how data is moved, transformed,
    and consumed across disparate sources. | Data lineage addresses five Ws: where
    the data originates, where the data has been and where is the destination, who
    made changes to the data, when the data was created/updated, and where the data
    is stored and used. Knowing answers to these questions is critical for people
    to trust analytics outcomes from data. |'
  id: totrans-402
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 数据血缘是跟踪数据如何在不同的来源之间移动、转换和消费的过程。 | 数据血缘解决五个W问题：数据从哪里起源，数据在哪里被处理过，目的地在哪里，谁对数据进行了修改，数据是在何时创建/更新的，以及数据存储和使用的位置。了解这些问题的答案对于人们信任数据分析结果至关重要。
    |'
