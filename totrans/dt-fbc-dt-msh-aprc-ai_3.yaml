- en: 15. Data Governance in the Context of Data Fabric and Data Mesh
  id: totrans-531
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 15. 数据编织与数据网格背景下的数据治理
- en: Companies generate and manage large amounts of sensitive information about their
    employees, customers, and business during their operational and analytical activities.
    This information gives companies a competitive advantage and at the same time
    brings great risks. The exposure of sensitive information can lead to serious
    consequences, such as lawsuits. Therefore, companies need to implement a purposeful
    and well-planned data governance platform.
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 公司在其运营和分析活动中生成和管理大量关于其员工、客户和业务敏感信息。这些信息为公司提供了竞争优势，同时带来了巨大的风险。敏感信息的泄露可能导致严重后果，例如诉讼。因此，公司需要实施一个有目的且周密计划的数据治理平台。
- en: As we have seen throughout this book, a Data Fabric architecture and Data Mesh
    solution are emerging data and AI concepts enabling flexible, reusable, proactive,
    and enhanced platforms to operationalize data and AI. As you recall from Chapter
    [2](537582_1_En_2_Chapter.xhtml), data governance and privacy is one of the four
    entry points for a Data Fabric and Data Mesh journey. While accelerating the enterprise’s
    data management efforts, a Data Fabric architecture also provides a Data Mesh
    solution to optimize enterprise data and AI governance implemented in an organizational
    federated fashion.
  id: totrans-533
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在整本书中看到的那样，数据编织架构和数据网格解决方案是新兴的数据和人工智能概念，它们使灵活、可重用、主动和增强的平台能够实现数据和人工智能的运营化。如您在第二章[2](537582_1_En_2_Chapter.xhtml)中回忆的那样，数据治理和隐私是数据编织和数据网格旅程的四个切入点之一。在加速企业数据管理工作的同时，数据编织架构还提供了一个数据网格解决方案，以优化以组织联邦方式实施的企业数据与人工智能治理。
- en: This chapter will first discuss why data management and data and AI governance
    are critical to a data-driven strategy and then further explore how capabilities
    of both concepts can help build a solid data and AI governance foundation for
    organizations and ultimately the entire enterprise. Using the term *data governance*
    is inherently referring to data and AI assets.
  id: totrans-534
  prefs: []
  type: TYPE_NORMAL
  zh: 本章将首先讨论为什么数据管理和数据与人工智能治理对数据驱动战略至关重要，然后进一步探讨这两个概念的能力如何帮助为组织乃至整个企业建立一个坚实的数据与人工智能治理基础。使用术语*数据治理*本质上是指数据与人工智能资产。
- en: Introduction
  id: totrans-535
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Data is constantly generated while we live and work. This data can have incredible
    value, which makes it a target for theft and misuse. Companies have obligations
    to respect both the privacy of personal information and the confidentiality of
    business information. The protection needs to be throughout the entire data management
    and AI lifecycle. Data management and data and AI governance are like two strands
    of DNA that are inextricably interdependent. First and foremost, let us distinguish
    two important concepts, namely, data management and data and AI governance.
  id: totrans-536
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们生活和工作的过程中，数据不断被生成。这些数据可能具有难以置信的价值，这使得它们成为盗窃和滥用的目标。公司有义务尊重个人信息的隐私和商业信息的机密性。保护措施需要贯穿整个数据管理和人工智能生命周期。数据管理和数据与人工智能治理就像DNA的两条不可分割的互补链。首先，让我们区分两个重要的概念，即数据管理和数据与人工智能治理。
- en: According to DAMA-DMBOK2,^([1](#Fn1)) data management is the process of developing,
    implementing, and monitoring plans, systems, procedures, and practices to deliver,
    control, protect, and enhance the value of data and assets throughout their lifecycle,
    while data and AI governance is defined as the exercise of authority and control
    during the management of data and AI assets. Subsequently, data management focuses
    more on execution issues; data and AI governance, on the other hand, has its focus
    more on the oversight perspective, ensuring that specific data and AI`–`related
    management tasks are under control and are carried out in an orderly, effective,
    and sustainable manner.
  id: totrans-537
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 DAMA-DMBOK2，^([1](#Fn1)) 数据管理是开发、实施和监控计划、系统、程序和实践的过程，以在整个生命周期中交付、控制、保护和增强数据及其资产的价值，而数据与人工智能治理则定义为在管理数据与人工智能资产时的权力和控制的行使。随后，数据管理更多地关注执行问题；另一方面，数据与人工智能治理则更多地关注监督视角，确保特定的数据与人工智能相关管理任务处于控制之下，并以有序、有效和可持续的方式进行执行。
- en: Often, when considering data management and data and AI governance, we tend
    to overemphasize the importance of technology and tools. For example, we may ask
    which DBMS should be chosen, whether to use ETL or ELT to integrate data, and
    what tools to use for data quality profiling and monitoring. Of course, these
    are vital topics to discuss; however, we should also recognize the importance
    of people and processes in addition to technology and tools.
  id: totrans-538
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，在考虑数据管理和数据及AI治理时，我们往往过分强调技术和工具的重要性。例如，我们可能会问应该选择哪种数据库管理系统，是否使用ETL或ELT来集成数据，以及使用哪些工具进行数据质量分析和监控。当然，这些都是需要讨论的重要话题；然而，我们也应该认识到除了技术和工具之外，人和流程的重要性。
- en: Companies also need to answer whether they have established a culture that recognizes
    the value of data-as-a-product. Furthermore, have processes and business rules
    for established data and AI governance goals been defined? Are standards and policies
    established to ensure effective compliance with regulations and laws?
  id: totrans-539
  prefs: []
  type: TYPE_NORMAL
  zh: 公司还需要回答是否已经建立了一种认可数据作为产品的价值的文化。此外，是否已经定义了实现数据和AI治理目标的过程和业务规则？是否建立了标准和政策，以确保有效遵守法规和法律？
- en: As you can see in Figure [15-1](#Fig1), there are a number of questions to consider
    in the context of data and AI governance.
  id: totrans-540
  prefs: []
  type: TYPE_NORMAL
  zh: 如图[15-1](#Fig1)所示，在数据和AI治理的背景下有许多问题需要考虑。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig1_HTML.png)'
  id: totrans-541
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig1_HTML.png)'
- en: A block diagram represents the tasks associated with the data and A I governance
    as follows. Establish a culture recognizing the value of data as an enterprise
    asset, build governance infrastructure and technology, define processes and business
    rules for governance, develop common and standard domain definitions, develop
    architecture practices and standards, establish processes for measuring and managing
    data, connect operational activities with corporate business performance, and
    ensure effective compliance.
  id: totrans-542
  prefs: []
  type: TYPE_NORMAL
  zh: 块图表示与数据和AI治理相关的任务如下。建立一个认可数据作为企业资产价值的文化，建立治理基础设施和技术，定义治理的过程和业务规则，开发通用和标准的领域定义，开发架构实践和标准，建立测量和管理数据的过程，将运营活动与公司业务绩效连接起来，并确保有效遵守。
- en: Figure 15-1
  id: totrans-543
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-1
- en: Data Governance Aspects
  id: totrans-544
  prefs: []
  type: TYPE_NORMAL
  zh: 数据治理方面
- en: Importance of Data and AI Governance
  id: totrans-545
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据和AI治理的重要性
- en: Why should enterprises take data and AI governance seriously? Let’s see some
    survey results and predictions from Forrester and Gartner. Nearly one-third of
    analysts spend more than 40% of their time vetting and validating their analytical
    data before it can be used for strategic decision-making.^([2](#Fn2)) By 2024,
    30% of organizations will invest in data and analytics governance platforms, thus
    increasing the business impact of trusted insights and new efficiencies. By 2025,
    80% of organizations seeking to scale their digital business will fail because
    they do not pursue a modern approach to data and analytics governance. By 2024,
    organizations that utilize active metadata to enrich and deliver a dynamic Data
    Fabric and Data Mesh will reduce time to integrate data delivery by 50% and improve
    the productivity of data teams by 20%.^([3](#Fn3))
  id: totrans-546
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么企业应该认真对待数据和AI治理？让我们看看来自Forrester和Gartner的一些调查结果和预测。几乎三分之一的分析师在他们的分析数据可用于战略决策之前，会花费超过40%的时间进行审查和验证。[2](#Fn2)
    到2024年，将有30%的组织投资于数据和分析治理平台，从而提高可信见解和新效率的业务影响。到2025年，80%寻求扩展其数字业务的企业将失败，因为他们没有追求现代的数据和AI治理方法。到2024年，利用主动元数据丰富和提供动态数据编织和数据网格的组织将减少数据交付时间50%，并提高数据团队的生产力20%。[3](#Fn3)
- en: Therefore, the most intuitive reason to establish data and AI governance policies
    is to accelerate decision-making while ensuring that the insights derived from
    data are credible and of high quality. Another reason to establish data and AI
    governance is that it helps break down data silos, which are not only caused by
    data being stored on different physical storage devices or databases but may also
    be caused by inconsistent data standards and definitions across different organizations
    or different requirements for data sharing.
  id: totrans-547
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，建立数据和AI治理政策的直观原因是为了加速决策，同时确保从数据中得出的见解是可信的且高质量的。建立数据和AI治理的另一个原因是它有助于打破数据孤岛，这不仅是由数据存储在不同的物理存储设备或数据库上引起的，也可能是由不同组织或不同数据共享要求下的不一致数据标准和定义引起的。
- en: A unified knowledge catalog may help solve this problem technically; however,
    breaking down business silos between various user roles and responsibilities and
    organizations still requires trust and a high-level governance based on guidelines
    and policies.
  id: totrans-548
  prefs: []
  type: TYPE_NORMAL
  zh: 一个统一的知识目录可能有助于从技术上解决这个问题；然而，打破不同用户角色和责任以及组织之间的业务壁垒，仍然需要信任以及基于指导和政策的较高层次治理。
- en: Regulatory compliance is another key driver for conducting data and AI governance.
    Although 70% of organizations plan to spend at least $1 million per year on compliance,
    this may not completely prevent data security and compliance issues from occurring.
    Good data and AI governance best practices and systems need to be put in place
    to reduce the likelihood of risks and mitigate those risks in accordance with
    laws and regulations.
  id: totrans-549
  prefs: []
  type: TYPE_NORMAL
  zh: 法规遵从性是进行数据和AI治理的另一个关键驱动因素。尽管70%的组织计划每年至少花费100万美元用于合规性，但这可能并不能完全防止数据安全和合规性问题发生。需要建立良好的数据和AI治理最佳实践和系统，以降低风险发生的可能性，并按照法律和法规减轻这些风险。
- en: Key Aspects of Data and AI Governance
  id: totrans-550
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据和AI治理的关键方面
- en: As data governance must ensure that data management and AI-related tasks are
    well under control, you may want to know what specific management tasks are involved.
    Based on the DAMA-DMBOK2 knowledge area wheel, as depicted in Figure [15-2](#Fig2),
    there are 11 key knowledge areas. Although the scope of the DAMA-DMBOK2 knowledge
    area wheel is on data, we suggest to broaden the scope to data and AI by taking
    well into account emerging regulations and laws that are specifically geared toward
    AI.^([4](#Fn4)) Addressing these data and AI governance knowledge areas requires
    the implementation of a modern Data Fabric architecture.
  id: totrans-551
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据治理必须确保数据管理和与AI相关的任务得到有效控制，你可能想知道具体涉及哪些管理任务。根据DAMA-DMBOK2知识领域轮，如图[15-2](#Fig2)所示，有11个关键知识领域。尽管DAMA-DMBOK2知识领域轮的范畴是关于数据的，但我们建议考虑到针对AI的特定法规和法律，将范围扩展到数据和AI。^([4](#Fn4))
    解决这些数据和AI治理知识领域需要实施现代数据架构架构。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig2_HTML.jpg)'
  id: totrans-552
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig2_HTML.jpg)'
- en: A circle diagram represents the elements of data governance as follows. Data
    architecture, data modeling and design, data storage and operation, data security,
    data integration, documents and content, reference and master data, data warehousing,
    meta-data, and data quality.
  id: totrans-553
  prefs: []
  type: TYPE_NORMAL
  zh: 圆形图如下表示数据治理的要素。数据架构、数据建模和设计、数据存储和操作、数据安全、数据集成、文档和内容、参考和主数据、数据仓库、元数据和数据质量。
- en: Figure 15-2
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-2
- en: DAMA-DMBOK2 Knowledge Area Wheel
  id: totrans-555
  prefs: []
  type: TYPE_NORMAL
  zh: DAMA-DMBOK2知识领域轮
- en: 'The following list explores a few areas that are most relevant to both concepts:'
  id: totrans-556
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表探讨了与这两个概念都最相关的几个领域：
- en: '**Data and AI governance**: First and foremost, data and AI governance sits
    at the center of data management, responsible for planning, oversight, and control
    over the management of data and AI and the use of data and data-related resources.'
  id: totrans-557
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和AI治理**：首先，数据和AI治理位于数据管理的中心，负责规划、监督和控制数据及AI的管理以及数据和相关资源的使用。'
- en: '**Data architecture**: As the name implies, data architecture^([5](#Fn5)) defines
    the blueprint to meet the data needs of the enterprise; it is an integral part
    of the enterprise architecture. It guides the integration between data sources
    and aligns data investments with the overall IT and business strategy. The design
    of the data architecture needs to adhere to regulations as well as corporate policies.'
  id: totrans-558
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据架构**：正如其名所示，数据架构^([5](#Fn5)) 定义了满足企业数据需求的蓝图；它是企业架构的组成部分。它指导数据源之间的集成，并使数据投资与整体IT和业务战略保持一致。数据架构的设计需要遵守法规以及公司政策。'
- en: '**Data** **storage and operations**: Storage is the foundation for data residency.
    The storage infrastructure must support the data architecture and data model.
    If an enterprise chooses a hybrid cloud as their architecture, they will use cloud
    storage to supplement their on-premises storage. Enterprises can also house their
    data or move their data to the storage of different data access speed, based on
    requirements regarding the frequency of data usage. Typical operations include
    replication, archiving, and disaster recovery to prevent data loss.'
  id: totrans-559
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据** **存储和操作**：存储是数据驻留的基础。存储基础设施必须支持数据架构和数据模型。如果企业选择混合云作为其架构，他们将使用云存储来补充其本地存储。企业可以根据对数据使用频率的要求，将数据存储在或移动到不同数据访问速度的存储中。典型操作包括复制、归档和灾难恢复，以防止数据丢失。'
- en: '**Data and AI** **security and privacy**: Data privacy is concerned about whether
    an organization protects sensitive data and provides appropriate authentication,
    authorization, access, and auditing to ensure compliance. The main consideration
    is to reduce the risk of data leakage and unauthorized use. Data and AI governance
    establishes a hierarchy of sensitive data and AI asset classification, as well
    as a set of data and AI protection and access rules (Create, Read, Update, and
    Delete), resulting in a permission matrix for enterprises to protect data and
    AI assets and meet audit requirements. Differing from data privacy, data security
    protects data from compromise by external hackers and malicious insiders. It’s
    a vital aspect of enterprise security. Due to the specialized nature of this field,
    it will not be elaborated in this book. Please refer to books on data security
    if you are interested.'
  id: totrans-560
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和人工智能** **安全与隐私**：数据隐私关注的是组织是否保护敏感数据并提供适当的身份验证、授权、访问和审计以确保合规性。主要考虑因素是降低数据泄露和未授权使用的风险。数据和人工智能治理建立敏感数据和人工智能资产分类的层次结构，以及一系列数据和人工智能保护和访问规则（创建、读取、更新和删除），从而为企业保护数据和人工智能资产并满足审计要求提供一个权限矩阵。与数据隐私不同，数据安全保护数据免受外部黑客和恶意内部人员的损害。这是企业安全的一个关键方面。由于该领域的专业性，本书将不会对此进行详细阐述。如果您对此感兴趣，请参阅数据安全方面的书籍。'
- en: '**Data and AI** **integration and interoperability**: Defines how data is acquired,
    extracted, transformed, moved, replicated, and virtualized for access. The integration
    needs to follow the business rules, government regulations, and industry standards
    defined by the governance platform. For example, PII protection laws do not allow
    personal information to leave the country. Therefore, integration will not be
    allowed for this type of information.'
  id: totrans-561
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据和人工智能** **集成与互操作性**：定义了数据如何获取、提取、转换、移动、复制和虚拟化以供访问。集成需要遵循由治理平台定义的业务规则、政府法规和行业标准。例如，PII保护法律不允许个人信息离开国家。因此，此类信息的集成将不被允许。'
- en: '**Data quality**: Considers whether an organization can consistently define
    and measure data quality and mitigate quality issues. Each enterprise may define
    different dimensions to measure data quality. Some may focus more on the timeliness
    of the data, and others might emphasize the completeness and consistency of the
    data. No matter what dimensions are considered, an end-to-end workflow to periodically
    detect data quality issues and provide mitigation solutions is always required.'
  id: totrans-562
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据质量**：考虑组织是否能够持续定义和衡量数据质量并缓解质量问题。每个企业可能定义不同的维度来衡量数据质量。有些可能更关注数据的时效性，而其他可能更强调数据的完整性和一致性。无论考虑哪些维度，都需要一个端到端的工作流程，定期检测数据质量问题并提供缓解解决方案。'
- en: Metadata^([6](#Fn6)) and master data^([7](#Fn7)) are part of data governance.^([8](#Fn8))
    Reference data should also be mentioned in this context, which is a set of data
    for complex hierarchies or classifications. For example, the country code *US*
    represents the United States, and *CN* represents China. Databases store country
    codes to ensure better quality through standardized definition.
  id: totrans-563
  prefs: []
  type: TYPE_NORMAL
  zh: 元数据^([6](#Fn6))和主数据^([7](#Fn7))是数据治理的一部分.^([8](#Fn8))在此背景下还应提及参考数据，这是一组用于复杂层次结构或分类的数据集。例如，国家代码*US*代表美国，而*CN*代表中国。数据库存储国家代码以确保通过标准化定义提高数据质量。
- en: To use an analogy, let us assume that the data is the community’s public facilities,
    such as parking lots, mailboxes, swimming pools, gyms, and other facilities. Each
    tenant has their own parking space and mailbox and needs the appropriate keys
    to unlock them. At the same time, all tenants have access to the pool, the gym,
    as well as the gate into the community parks. The property management is defining
    these rules and documenting these rules for all tenants. In this example, the
    data architecture, model, and storage refer to how many of these facilities need
    to be added to the community and where they should be located for the convenience
    of tenants. Metadata, reference data, and documents refer to the maps of these
    facilities and the instructions of using the facilities, that is, referencing
    *opening hours for the pool* and *reservation required* or *first come first serve*
    for tennis courts. Data security means that the tenants’ assets are well protected
    and cannot be accessed by others. The property management team is the governance
    team that ensures all the tenants are familiar with and follow the rules. They
    should take action for any violations of the rules, that is, if a car stays overnight
    in a community premise without a permit, it will be towed away, and violators
    will have to pay a fine.
  id: totrans-564
  prefs: []
  type: TYPE_NORMAL
  zh: 用一个类比来说，让我们假设数据是社区的公共设施，例如停车场、邮箱、游泳池、健身房等设施。每个租户都有自己的停车位和邮箱，并需要适当的钥匙来解锁它们。同时，所有租户都可以使用游泳池、健身房以及进入社区公园的大门。物业管理正在为所有租户制定这些规则并记录这些规则。在这个例子中，数据架构、模型和存储指的是需要添加到社区中的这些设施以及它们应该位于何处以方便租户。元数据、参考数据和文档指的是这些设施的地图和使用设施的说明，即游泳池的开放时间和网球场的预约要求或先到先得。数据安全意味着租户的资产得到良好保护，其他人无法访问。物业管理团队是确保所有租户熟悉并遵守规则的治理团队。他们应该对任何违规行为采取行动，也就是说，如果一辆车在没有许可证的情况下在社区内过夜，它将被拖走，违规者将不得不支付罚款。
- en: Establishing a Data Governance Foundation with a Data Fabric Architecture
  id: totrans-565
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用数据编织架构建立数据治理基础
- en: Enterprises are increasingly recognizing the importance of data and AI governance,
    and many of them start to build a data and AI governance platform. However, at
    present, data governance activities in enterprises are still at department level,
    and the lack of top-level design of enterprise data and AI governance and the
    coordination of data and AI resources can lead to the delay or even failure of
    data and AI governance projects.
  id: totrans-566
  prefs: []
  type: TYPE_NORMAL
  zh: 企业越来越认识到数据与人工智能治理的重要性，并且许多企业开始构建数据与人工智能治理平台。然而，目前企业中的数据治理活动仍然处于部门层面，缺乏企业数据与人工智能治理的顶层设计和数据与人工智能资源的协调，这可能导致数据与人工智能治理项目的延迟甚至失败。
- en: The Data Fabric architecture can help enterprises address the challenges of
    data and AI governance effectively, including the orchestration and exchange of
    metadata across organizational implementations. First, Data Fabric pulls data
    from disparate data sources and orchestrates metadata exchange across organizational
    systems, thus providing a holistic view of data and AI at the enterprise level,
    which lays a solid technology foundation for a consistent and unified enterprise-level
    data and AI governance. Likewise, a Data Fabric architecture serves as a foundation
    for a Data Mesh solution, which is supporting organizational or departmental data
    and AI governance initiatives.
  id: totrans-567
  prefs: []
  type: TYPE_NORMAL
  zh: 数据编织架构可以帮助企业有效地解决数据与人工智能治理的挑战，包括在组织实施中协调和交换元数据。首先，数据编织从不同的数据源中提取数据，并在组织系统中协调元数据交换，从而在企业层面提供数据与人工智能的整体视图，这为企业级一致和统一的数据与人工智能治理奠定了坚实的技术基础。同样，数据编织架构作为数据网格解决方案的基础，支持组织或部门的数据与人工智能治理倡议。
- en: Second, the advanced automation and AI technologies employed by a Data Fabric
    architecture can greatly simplify the implementation of data and AI governance
    at the enterprise or organizational level, enabling organizational federated Data
    Mesh initiatives, where orchestration and exchange of metadata across organizations
    need to be implemented as well.
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，数据编织架构采用的先进自动化和人工智能技术可以极大地简化企业或组织层面的数据与人工智能治理的实施，使组织联邦数据网格倡议成为可能，其中需要在组织间实施元数据的协调和交换。
- en: 'The following are some key aspects derived from advanced automation capabilities
    of a Data Fabric architecture:'
  id: totrans-569
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是从数据编织架构的高级自动化能力中得出的关键方面：
- en: Automating the import of industry regulations and company policies, converting
    them into global or local data protection rules by business rule type, thus creating
    a system of governance regulations
  id: totrans-570
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动导入行业法规和公司政策，通过业务规则类型将它们转换为全球或本地数据保护规则，从而创建一套治理法规
- en: Automating rules and policy enforcement to data assets, such as data masking
    or obfuscation, which ensures that data assets are accessible by certain users
  id: totrans-571
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 自动执行规则和政策执行到数据资产，如数据掩码或混淆，确保数据资产只能由特定用户访问
- en: Periodically scanning and analyzing data quality, reporting the data assets
    that do not meet quality requirements, and triggering a quality improvement process
  id: totrans-572
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定期扫描和分析数据质量，报告不符合质量要求的数据资产，并触发质量改进流程
- en: Establishing Automated Regulation with a Data Fabric Architecture
  id: totrans-573
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用数据编织架构建立自动化法规
- en: Since the introduction of the GDPR^([9](#Fn9)) in the EU in 2018, other countries
    around the world have enacted or proposed post-modern privacy and data protection
    legislation. Brazil, for instance, introduced the Lei Geral de Proteção de Dados
    (or LGPD), while the US state of California introduced the California Consumer
    Privacy Act (CCPA). More than ten countries in Asia-Pacific including China, Korea,
    and New Zealand have proposed, adopted, or enforced new privacy laws. By 2023,
    more than 80% of companies worldwide will face at least one privacy-focused data
    protection regulation.
  id: totrans-574
  prefs: []
  type: TYPE_NORMAL
  zh: 自 2018 年欧盟引入 GDPR^([9](#Fn9)) 以来，世界各地的其他国家已经实施了或提出了后现代隐私和数据保护立法。例如，巴西引入了《通用数据保护法》（或
    LGPD），而美国加利福尼亚州引入了《加利福尼亚消费者隐私法案》（CCPA）。亚太地区包括中国、韩国和新西兰在内的十多个国家已经提出了、采用了或实施了新的隐私法。到
    2023 年，全球超过 80% 的公司至少将面临一项以隐私为重点的数据保护法规。
- en: This resurgence of data privacy regulations puts companies in a challenging
    position to interpret and implement data privacy strategies to comply with these
    complex regulatory requirements in order to protect organizational and individual
    claims to their data privacy.
  id: totrans-575
  prefs: []
  type: TYPE_NORMAL
  zh: 数据隐私法规的这种复苏使公司面临挑战，需要解释和实施数据隐私策略，以符合这些复杂的监管要求，以保护组织和个人的数据隐私权。
- en: Companies are recognizing that the implementation of regulations is a complex
    endeavor that requires not just strong subject matter expert support but also
    a corresponding technical infrastructure. How to digitize regulations and get
    business units to comply with these regulations is the top concern for companies.
    The good news is that advancement of AI technology, especially NLP technology,
    can largely solve this problem. A Data Fabric architecture should employ NLP^([10](#Fn10))
    to automate regulatory compliance.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 公司认识到，法规的实施是一项复杂的任务，不仅需要强大的主题专家支持，还需要相应的技术基础设施。如何数字化法规并使业务单元遵守这些法规是公司的首要关注点。好消息是，人工智能技术的进步，尤其是自然语言处理（NLP）技术的进步，可以很大程度上解决这个问题。数据编织架构应采用
    NLP^([10](#Fn10)) 来自动化法规遵守。
- en: Please see Figure [15-3](#Fig3) for an example, which is based on IBM’s Data
    Fabric approach, where the regulation accelerator makes GDPR policies and regulations
    ready for use in minutes.
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅图 [15-3](#Fig3) 以获取示例，该示例基于 IBM 的数据编织方法，其中法规加速器使 GDPR 政策和法规在几分钟内即可投入使用。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig3_HTML.png)'
  id: totrans-578
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig3_HTML.png)'
- en: A screenshot exhibits the content under G D P R. It indicates a table containing
    the details of name, description, primary category, and type. It highlights the
    name column comprising the following names. Article and rule, cross-border data,
    the data controller and processor, G D P R policy, and use of third parties to
    process data.
  id: totrans-579
  prefs: []
  type: TYPE_NORMAL
  zh: 一张截图展示了 GDPR 下的内容。它显示了一个包含名称、描述、主要类别和类型的详细信息的表格。它突出了包含以下名称的名称列。文章和规则、跨境数据、数据控制者和处理器、GDPR
    政策以及使用第三方处理数据。
- en: Figure 15-3
  id: totrans-580
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15-3
- en: GDPR
  id: totrans-581
  prefs: []
  type: TYPE_NORMAL
  zh: GDPR
- en: Figure [15-4](#Fig4) is another illustration of GDPR-related governance artifacts,
    such as *consent*, *personal data inventory*, *data protection by design*, etc.,
    which can be displayed and selected (left side of Figure [15-4](#Fig4)). One of
    the governance artifacts depicted in Figure [15-4](#Fig4) is *processing children’s
    data* (dashed line in Figure [15-4](#Fig4)).
  id: totrans-582
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [15-4](#Fig4) 是 GDPR 相关治理工具的另一个示例，例如 *同意*、*个人数据清单*、*设计时的数据保护* 等，这些可以在图 [15-4](#Fig4)
    的左侧显示和选择。图 [15-4](#Fig4) 中描述的治理工具之一是 *处理儿童数据*（图 [15-4](#Fig4) 中的虚线）。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig4_HTML.png)'
  id: totrans-583
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig4_HTML.png)'
- en: A screenshot exhibits the content under the article and rule. It indicates a
    table containing the details of the name, description, primary category, and type.
    It highlights the name column along with the name processing children's data in
    the column.
  id: totrans-584
  prefs: []
  type: TYPE_NORMAL
  zh: 一张截图展示了文章和规则下的内容。它显示了一个包含名称、描述、主要类别和类型的详细信息的表格。它突出显示了名称列以及列中处理儿童数据的名称。
- en: Figure 15-4
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-4
- en: Governance Artifacts
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 治理工件
- en: This *children’s data* can further be displayed (e.g., with its effective dates)
    and adjusted (e.g., defining an end date), as seen in Figure [15-5](#Fig5).
  id: totrans-587
  prefs: []
  type: TYPE_NORMAL
  zh: 这*儿童数据*可以进一步显示（例如，显示其有效日期）并调整（例如，定义一个结束日期），如图[15-5](#Fig5)所示。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig5_HTML.png)'
  id: totrans-588
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig5_HTML.png)'
- en: A screenshot exhibits the overview of processing children's data. It highlights
    the description of article 12 under the general tab. It also denotes the details
    of primary and secondary categories.
  id: totrans-589
  prefs: []
  type: TYPE_NORMAL
  zh: 一张截图展示了处理儿童数据的概述。它突出显示了一般选项卡下第12条描述。它还指出了主要和次要类别的详细信息。
- en: Figure 15-5
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-5
- en: Governance Rules
  id: totrans-591
  prefs: []
  type: TYPE_NORMAL
  zh: 治理规则
- en: Automatic Enforcement of Data Regulations in Data Fabric
  id: totrans-592
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据编织中的数据法规自动执行
- en: The privacy laws and regulations create obligations for organizations processing
    their personal and confidential data, which impose severe penalties for noncompliance.
    Sometimes personal data and confidential data are seen as identical. However,
    personal data is referred to as PII including name, date of birth, mobile number,
    etc. Confidential data is the information regarding the organization, for example,
    trading price, intellectual property, and customer information.
  id: totrans-593
  prefs: []
  type: TYPE_NORMAL
  zh: 隐私法律和法规为处理其个人和机密数据的组织创造了义务，违反这些义务将面临严厉的处罚。有时个人数据和机密数据被视为相同。然而，个人数据是指包括姓名、出生日期、手机号码等的PII。机密数据是关于组织的，例如，交易价格、知识产权和客户信息。
- en: Establishing and enforcing regulations to corresponding data assets are equally
    important. To fulfill these responsibilities, the data governance platform needs
    to classify and assign data to corresponding categories. Whether data belong to
    personal information or even sensitive personal information or confidential information
    determines the level of protection. For example, processing PII is explicitly
    prohibited under the GDPR unless it has been consented to or is otherwise lawful.
  id: totrans-594
  prefs: []
  type: TYPE_NORMAL
  zh: 建立和执行与相应数据资产相对应的法规同样重要。为了履行这些责任，数据治理平台需要将数据分类并分配到相应的类别。数据属于个人信息，甚至敏感个人信息或机密信息，决定了保护级别。例如，根据GDPR，除非已获得同意或法律允许，否则明确禁止处理PII。
- en: How does technology enable the enforcement of data protection rules? In a Data
    Fabric platform, the data protections rules can be defined by the characteristics
    of corresponding data and AI assets. As depicted in Figure [15-6](#Fig6), *address*
    is PII information and needs to be protected via the *protect address rule*.
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: 技术如何使数据保护规则得到执行？在数据编织平台上，可以通过对应数据和分析资产的特征定义数据保护规则。如图[15-6](#Fig6)所示，*地址*是PII信息，需要通过*保护地址规则*进行保护。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig6_HTML.jpg)'
  id: totrans-596
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig6_HTML.jpg)'
- en: A screenshot exhibits a set of conditions under the criteria and a set of processes
    under the action. The condition reads if the business team contains any postal
    address, home address, and work address. The action explains, then redact data
    in columns containing business term postal address, home address, and work address.
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 一张截图展示了在标准下的条件和在操作下的流程。条件是如果业务团队包含任何邮政地址、家庭地址和工作地址。操作解释说，然后在包含商业术语邮政地址、家庭地址和工作地址的列中删除数据。
- en: Figure 15-6
  id: totrans-598
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-6
- en: Data Protection Rules – Protect Address Rule
  id: totrans-599
  prefs: []
  type: TYPE_NORMAL
  zh: 数据保护规则 – 保护地址规则
- en: If a business term containing any *address* tags is recognized at the discovery
    stage, the data will be masked, and the data protection rule will be applied.
    When business users access these data assets, the data on the address column are
    redacted, as depicted in Figure [15-7](#Fig7).
  id: totrans-600
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在发现阶段识别到包含任何*地址*标签的商业术语，数据将被屏蔽，并应用数据保护规则。当业务用户访问这些数据资产时，地址列中的数据将被删除，如图[15-7](#Fig7)所示。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig7_HTML.png)'
  id: totrans-601
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig7_HTML.png)'
- en: A table exhibits the details of the strings of user I D, person, current, retirement,
    birth year, gender, address, apartment, city, state, zip code, latitude, and longitude.
    It highlights the columns for person, address, and apartment.
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: 一个表格展示了用户ID、人员、当前、退休、出生年份、性别、地址、公寓、城市、州、邮编、纬度和经度的详细信息。它突出了人员、地址和公寓的列。
- en: Figure 15-7
  id: totrans-603
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-7
- en: Enforce Data Masking Rules `–` CREDITUSERS
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 强制数据掩码规则 `–` CREDITUSERS
- en: Automate Quality Analysis with Data Fabric
  id: totrans-605
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用数据编织自动化质量分析
- en: The establishment of regulations and the enforcement of regulatory rules ensure
    that only authorized users have access to the data. There is another aspect that
    should also be taken into consideration, and that is ensuring access to *trusted*
    data, which relates to complete, high-quality, and consistent data. If the quality
    of data does not meet defined standards, the use of this data may even generate
    potentially wrong results with negative business impact, loss of customers, degrading
    reputation, etc.
  id: totrans-606
  prefs: []
  type: TYPE_NORMAL
  zh: 制定法规和执行监管规则确保只有授权用户才能访问数据。还有另一个方面也应该考虑，那就是确保访问*可信*的数据，这与完整、高质量和一致的数据相关。如果数据质量不符合定义的标准，使用这些数据甚至可能产生潜在的错误结果，对业务产生负面影响，损失客户，声誉下降等。
- en: Therefore, analyzing and evaluating data quality, as depicted in Figure [15-8](#Fig8),
    is a prerequisite for subsequent usage. How does a company define the metrics
    of data quality?
  id: totrans-607
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如图[15-8](#Fig8)所示，分析和评估数据质量是后续使用的前提。公司如何定义数据质量的指标？
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig8_HTML.png)'
  id: totrans-608
  prefs: []
  type: TYPE_IMG
  zh: '![图15-8](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig8_HTML.png)'
- en: A table represents the details of the columns, business name, data class, data
    quality, and review status under the title of credit trans. It highlights the
    data equality column providing the values in percentage.
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 一个表格在“信用交易”标题下表示列的详细信息，包括业务名称、数据类别、数据质量和审查状态。它突出了提供百分比值的“数据相等性”列。
- en: Figure 15-8
  id: totrans-610
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-8
- en: Quality Analysis – CREDITTRANS
  id: totrans-611
  prefs: []
  type: TYPE_NORMAL
  zh: 质量分析 – CREDITTRANS
- en: 'Usually there are six dimensions^([11](#Fn11)) of data quality:'
  id: totrans-612
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，数据质量有六个维度^([11](#Fn11))：
- en: '**Accuracy**: Data must reflect the true business content. Accuracy could be
    a problem due to mistakes in entry or errors in data conversion. For example,
    let’s say the cost should be $1000\. Due to a staff error, it is $100 in the system,
    an error that, if not caught, would result in wrong decisions.'
  id: totrans-613
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**准确性**：数据必须反映真实业务内容。准确性可能因输入错误或数据转换错误而成为问题。例如，假设成本应该是1000美元。由于员工错误，系统中显示的是100美元，如果未被发现，将导致错误决策。'
- en: '**Consistency**: The type and meaning of the data elements must be consistent.
    For example, the organization code in a system may be completely different from
    the organization code in another system, which creates significant difficulties
    in performing analytical tasks.'
  id: totrans-614
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性**：数据元素的类型和含义必须一致。例如，一个系统中的组织代码可能与另一个系统中的组织代码完全不同，这给执行分析任务带来了重大困难。'
- en: '**Timeliness**: The data should be updated in a timely manner based on the
    user’s currency requirements, especially if replicated multiple times. Some data
    transformation processes may take several days, which is unacceptable for some
    real-time applications.'
  id: totrans-615
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**及时性**：数据应根据用户的货币需求及时更新，尤其是如果多次复制。某些数据转换过程可能需要几天时间，这对于某些实时应用是不可接受的。'
- en: '**Uniqueness**: There should be no duplicate data values for the same entity.
    Duplicate data^([12](#Fn12)) needs to be removed or merged, which is typically
    addressed by MDM systems.'
  id: totrans-616
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**唯一性**：对于同一实体，不应有重复的数据值。重复数据^([12](#Fn12))需要被删除或合并，这通常由MDM系统处理。'
- en: '**Completeness**: Completeness of data should be measured. For epidemiological
    surveys, for instance, the disease origin is required; if missing, the degree
    of data completeness is relatively low, which may prevent data scientists from
    including this data in their project.'
  id: totrans-617
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完整性**：应测量数据的完整性。例如，在流行病学调查中，需要疾病起源；如果缺失，数据完整性的程度相对较低，这可能会阻止数据科学家将其包含在他们的项目中。'
- en: '**Validity**: The value of data must meet requirements of the data or business
    definition, such as the format of certain telephone or mailbox numbers. Otherwise,
    it will give a low validity score.'
  id: totrans-618
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**有效性**：数据值必须满足数据或业务定义的要求，例如某些电话号码或邮箱号码的格式。否则，它将给出低有效性分数。'
- en: Figure [15-9](#Fig9) is an example of quality dimensions and quality score,
    where the column *MERCHANT_CITY* is recognized as data class *City*. Any data
    in this data class needs to be in the reference dataset *Cities.cls*, as illustrated
    in Figure [15-10](#Fig10). However, 6% of the data is not there.^([13](#Fn13))
    Either users accept this and make an informed decision to use it, or users need
    to go to the reference dataset and compare the disparity of this dataset with
    the reference dataset.
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 图[15-9](#Fig9)是质量维度和质量分数的示例，其中列*MERCHANT_CITY*被识别为数据类别*City*。这个数据类别中的任何数据都需要在参考数据集*Cities.cls*中，如图[15-10](#Fig10)所示。然而，6%的数据不在那里.^([13](#Fn13))
    用户可以接受这一点并做出明智的决定使用它，或者用户需要去参考数据集，比较这个数据集与参考数据集的差异。
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig10_HTML.jpg)'
  id: totrans-620
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig10_HTML.jpg)'
- en: A screenshot represents the overview of the city under the data classes. It
    provides the details of the description, example, and primary and secondary categories
    under the general tab. It exhibits the details of the matching method, matching
    criteria, details of the matching method, and matching priority under the data
    matching tab.
  id: totrans-621
  prefs: []
  type: TYPE_NORMAL
  zh: 屏幕截图表示数据类别下的城市概览。它提供了在“常规”选项卡下的描述、示例以及主要和次要类别详情。它展示了在“数据匹配”选项卡下的匹配方法、匹配标准、匹配方法详情和匹配优先级。
- en: Figure 15-10
  id: totrans-622
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-10
- en: Data Class
  id: totrans-623
  prefs: []
  type: TYPE_NORMAL
  zh: 数据类别
- en: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig9_HTML.png)'
  id: totrans-624
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_15_Chapter/537582_1_En_15_Fig9_HTML.png)'
- en: A table represents the details of dimensions, findings, and percentage of records.
    At the top, it reads the findings as 79 and the value of quality score as 94%.
    It highlights the findings column in the table.
  id: totrans-625
  prefs: []
  type: TYPE_NORMAL
  zh: 表格表示维度、发现和记录百分比的详情。顶部显示发现为79，质量分数值为94%。它突出显示表格中的发现列。
- en: Figure 15-9
  id: totrans-626
  prefs: []
  type: TYPE_NORMAL
  zh: 图15-9
- en: Data Quality Dimensions for MERCHANT_CITY
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: MERCHANT_CITY的数据质量维度
- en: In addition to these standard dimensions, companies can customize the dimensions
    or adjust the weights of these standard dimensions. The goal is to set data quality
    scores that accurately reflect the extent to which that data can be used for business
    analytics. Also, companies need to set up a data quality monitoring framework
    that must trigger processes to fix quality issues should they occur.
  id: totrans-628
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些标准维度之外，公司可以自定义维度或调整这些标准维度的权重。目标是设置数据质量分数，以准确反映数据可用于商业分析的程度。此外，公司需要建立一个数据质量监控框架，以便在出现质量问题时触发修复过程。
- en: Key Takeaways
  id: totrans-629
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [15-1](#Tab1).
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过表[15-1](#Tab1)总结的几个关键要点来结束这一章。
- en: Table 15-1
  id: totrans-631
  prefs: []
  type: TYPE_NORMAL
  zh: 表15-1
- en: Key Takeaways
  id: totrans-632
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-633
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-634
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Data management and data and AI governance are like two strands of DNA.
    | Data management is the process of developing, implementing, and monitoring systems,
    procedures, and practices to deliver and enhance the value of data and assets
    throughout their lifecycle, while data and AI governance is defined as the exercise
    of authority and control during the management of data and assets. |'
  id: totrans-635
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 数据管理和数据与AI治理就像DNA的两条链。 | 数据管理是开发、实施和监控系统、程序和实践的过程，以在整个生命周期中交付和增强数据及资产的价值，而数据与AI治理是指在数据及资产管理过程中行使权力和控制。
    |'
- en: '| 2 | Companies often lack a top-level design of enterprise data governance
    that leads to the delay or failure of data and AI governance projects. | The Data
    Fabric architecture can help enterprises address data and AI governance challenges
    effectively by two key levers, (a) pulling data from disparate data sources to
    create a holistic view and (b) using AI technology to simplify the implementation
    of data and AI governance. |'
  id: totrans-636
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 公司往往缺乏企业数据治理的顶层设计，这导致数据与AI治理项目延迟或失败。 | 数据编织架构可以通过两个关键杠杆有效地帮助企业解决数据与AI治理挑战：(a)
    从不同的数据源中拉取数据以创建整体视图；(b) 使用AI技术简化数据与AI治理的实施。 |'
- en: '| 3 | By 2023, more than 80% of companies worldwide will be faced by at least
    one privacy-focused data protection regulation. | Digitizing the regulation and
    getting the business units to comply with regulations and laws is a matter of
    urgency. Use NLP technology with a Data Fabric architecture to accelerate the
    establishment of regulations. |'
  id: totrans-637
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 到2023年，全球80%以上的公司将面临至少一项以隐私为重点的数据保护法规。将法规数字化并确保业务单元遵守法规和法律是一项紧迫的任务。使用具有数据架构的数据技术来加速法规的建立。|'
- en: '| 4 | Policy and rule enforcement contains two key elements. | First, the platform
    needs to recognize or classify data to the correct categories, that is, PII or
    confidential data; second, the corresponding protection rules need to be applied
    to the data according to the outcome of the first step when data gets accessed.
    |'
  id: totrans-638
  prefs: []
  type: TYPE_TB
  zh: '| 4 | 政策和规则执行包含两个关键要素。首先，平台需要识别或分类数据到正确的类别，即PII或机密数据；其次，当数据被访问时，需要根据第一步的结果应用相应的保护规则。|'
- en: '| 5 | Data quality ensures that only authorized users have access to the data.
    | Data quality is measured by six dimensions: completeness, accuracy, timeliness,
    validity, uniqueness, and consistency. Businesses need to constantly monitor the
    data quality. Once the quality is below a defined bar, corrective actions need
    to be taken. |'
  id: totrans-639
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 数据质量确保只有授权用户才能访问数据。数据质量通过六个维度来衡量：完整性、准确性、及时性、有效性、唯一性和一致性。企业需要持续监控数据质量。一旦质量低于定义的标准，就需要采取纠正措施。|'
