  zh: Electrosoft, Proud-Madruga, D., *来源、血缘、谱系：它们是否相同？*，2020，[`www.electrosoft-inc.com/electroblog/provenance-lineage-pedigree-are-they-same`](http://www.electrosoft-inc.com/electroblog/provenance-lineage-pedigree-are-they-same)
    (访问日期：2022年9月2日)。
- en: 14. Automated Data Fabric and Data Mesh Aspects
  id: totrans-409
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 14. 自动化数据编织和数据网格方面
- en: The vigilant reader of this book has certainly noticed the distinguished focus
    that we have put on applying AI with automation and intelligent augmentation and
    optimization to nearly all aspects of a Data Fabric architecture and Data Mesh
    solution. There are indeed numerous areas of both concepts, which are increasingly
    optimized with AI-infused automation, such as automated workload performance prediction
    and runtime adjustment, automated capacity planning and resource demand estimation
    (e.g., CPU capacity, network bandwidth, memory sizes, etc.), automated query generation,
    intelligent information integration, automated data curation, and automated creation
    of data products.
  id: totrans-410
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细阅读本书的读者肯定已经注意到，我们特别关注将人工智能与自动化以及智能增强和优化应用于数据编织架构和数据网格解决方案的几乎所有方面。这两个概念确实有众多领域，它们正越来越多地通过人工智能驱动的自动化得到优化，例如自动化的工作负载性能预测和运行时调整、自动化的容量规划和资源需求估计（例如，CPU容量、网络带宽、内存大小等）、自动化的查询生成、智能信息集成、自动化数据整理以及自动化数据产品的创建。
- en: Especially automated capacity planning and forecasting has been a well-established
    topic for vendors^([1](#Fn1)) and in academia^([2](#Fn2)) as well. Applying AI
    and automation clearly amounts to a paradigm shift. In fact, we would not use
    the terms *Data Fabric* and *Data Mesh* in the context we do without the inherent
    assumption of applying AI, intelligent knowledge, and automation.
  id: totrans-411
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是自动化的容量规划和预测已经成为供应商^([1](#Fn1))和学术界^([2](#Fn2))的一个成熟话题。应用人工智能和自动化显然是一个范式转变。实际上，如果我们不在应用人工智能、智能知识和自动化的内在假设下，我们不会在当前语境中使用“数据编织”和“数据网格”这两个术语。
- en: The desire to create an organization- or enterprise-wide description of data
    and AI artefacts is not at all a new concept. It was already painfully considered
    a failure about two decades ago. This chapter describes the usage of intelligent
    automation to collect metadata information from different data sources and catalog
    them, automatically checking data quality and augmenting the metadata as well
    as automating data governance services as a foundation for both essential Data
    Fabric and Data Mesh concepts.
  id: totrans-412
  prefs: []
  type: TYPE_NORMAL
  zh: 希望创建一个组织或企业范围内的数据和人工智能工件描述的愿望绝对不是一个新概念。它已经在二十年前被痛苦地视为失败。本章描述了使用智能自动化从不同的数据源收集元数据信息并将它们编目，自动检查数据质量、增强元数据以及作为数据编织和数据网格两个基本概念的基础自动化数据治理服务。
- en: 'In this chapter, we thus concentrate on two distinct but nevertheless related
    areas: (a) intelligent automation of metadata and (b) automated data quality assessment.'
  id: totrans-413
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们因此专注于两个既相互独立又相关的领域：(a) 元数据的智能自动化和(b) 自动化数据质量评估。
- en: Automated data and AI governance services will be addressed in the next chapter.
  id: totrans-414
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化的数据和人工智能治理服务将在下一章中讨论。
- en: Introduction
  id: totrans-415
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Applying AI to metadata management and intelligent cataloging, data quality
    assessments, and especially data and AI governance seems to have lagged far behind
    the rest of data-related areas. In Chapters [5](537582_1_En_5_Chapter.xhtml) and
    [7](537582_1_En_7_Chapter.xhtml), we have already elaborated on the vital role
    of AI/ML to reimagine a modern approach, that is, to generate active metadata,
    to activate the digital exhaust, to build semantic knowledge graphs, and likewise
    for semantic enrichment and semantic search, entity matching, self-service capabilities,
    and automated data quality assessments and adjustments – well underpinned and
    empowered by must-have knowledge catalog capabilities.
  id: totrans-416
  prefs: []
  type: TYPE_NORMAL
  zh: 将人工智能应用于元数据管理、智能编目、数据质量评估以及特别是数据和人工智能治理似乎落后于其他数据相关领域。在第[5](537582_1_En_5_Chapter.xhtml)章和第[7](537582_1_En_7_Chapter.xhtml)章中，我们已经详细阐述了人工智能/机器学习在重新构想现代方法中的关键作用，即生成主动元数据，激活数字痕迹，构建语义知识图谱，以及类似地用于语义丰富和语义搜索、实体匹配、自助能力、自动化数据质量评估和调整——这些都得到了必备的知识目录能力的充分支撑和赋能。
- en: In Chapter [13](537582_1_En_13_Chapter.xhtml), you have seen how indispensable
    the knowledge catalog is for intelligent cataloging and enriching metadata and
    to enable, for instance, data lineage and provenance. As we have mentioned previously,
    the core content of this chapter is clearly on intelligent automation of metadata
    and automated data quality assessments.
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 在第[13](537582_1_En_13_Chapter.xhtml)章中，您已经看到知识目录对于智能编目和丰富元数据以及实现数据血缘和来源是多么的不可或缺。正如我们之前提到的，本章的核心内容显然是元数据的智能自动化和自动化数据质量评估。
- en: Let us begin with intelligent automation of metadata.
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从元数据的智能自动化开始。
- en: Intelligent Automation of Metadata
  id: totrans-419
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 元数据的智能自动化
- en: We use the term *intelligent automated metadata* to portray the inclusion of
    AI/ML into the entire lifecycle of metadata management, including generation,
    enrichment, and consumption of metadata.
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用“智能自动化元数据”这个术语来描述将AI/ML纳入元数据管理的整个生命周期，包括元数据的生成、丰富化和消费。
- en: As mentioned, the knowledge catalog is the core component to enable intelligent
    automation of metadata. Figure [14-1](#Fig1) is a sample knowledge catalog,^([3](#Fn3))
    where four recently added data assets are visualized, including the owner, the
    date when the asset was added, and the type of asset. As you can see, three of
    these assets are relational database tables, and the fourth asset is a database
    connection based on data virtualization (right side of Figure [14-1](#Fig1)).
  id: totrans-421
  prefs: []
  type: TYPE_NORMAL
  zh: 正如提到的，知识目录是启用元数据智能自动化的核心组件。图[14-1](#Fig1)是一个样本知识目录，[3](#Fn3) 其中可视化了四个最近添加的数据资产，包括所有者、资产添加的日期和资产类型。如图所示，这三个资产是关系数据库表，第四个资产是基于数据虚拟化的数据库连接（图[14-1](#Fig1)的右侧）。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig1_HTML.png)'
  id: totrans-422
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig1_HTML.png)'
- en: A screenshot of a sample knowledge catalog. It displays 4 recently added data
    assets, user 11 credit cards, user 11 credit users, user 11 credit trans, and
    data visualization. A table at the bottom list 4 items name, owner, tags, business
    terms, asset type, and data added.
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: 一个样本知识目录的截图。它显示了4个最近添加的数据资产，用户11的信用卡，用户11的信用用户，用户11的信用交易和数据可视化。底部表格列出了4项内容：名称，所有者，标签，业务术语，资产类型和数据添加。
- en: Figure 14-1
  id: totrans-424
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-1
- en: Sample Knowledge Catalog
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 样本知识目录
- en: Additional information can be displayed by clicking the various assets. The
    power of the knowledge catalog with its corresponding function – above and beyond
    visualization – is based on a set of intelligent automation capabilities.
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 通过点击各种资产可以显示更多相关信息。知识目录的强大功能及其对应的功能——不仅仅是可视化——基于一系列智能自动化能力。
- en: 'These intelligent automation capabilities are described in the following list:'
  id: totrans-427
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的列表描述了这些智能自动化能力：
- en: '**Automated metadata generation**: Data and AI assets, which may span across
    a multitude of sources or formats, need to be automatically discovered; corresponding
    metadata must be auto-generated and moved into the knowledge catalog, which applies
    to changes of the source data and AI assets as well. This comprises the first
    step of the end-to-end lifecycle of intelligent metadata management, which we
    may call automated cataloging of data and AI assets or automated metadata generation.
    This phase may be complemented with automated quality assessments of all data
    and AI assets. Quality assessments and improvements must be performed repetitively;
    we are dealing with this topic in a separate section further in the following.'
  id: totrans-428
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自动化元数据生成**：可能跨越众多来源或格式的数据和AI资产需要被自动发现；相应的元数据必须自动生成并移动到知识目录中，这也适用于源数据和AI资产的变化。这构成了智能元数据管理端到端生命周期的第一步，我们可能称之为数据和AI资产的自动化编目或自动化元数据生成。这一阶段可能包括对所有数据和AI资产的自动化质量评估。质量评估和改进必须重复执行；我们将在以下部分单独讨论这个话题。'
- en: '**Automated metadata enrichment**: Once metadata has been auto-generated, it
    needs to be enriched, meaning that the metadata needs to be analyzed and profiled
    using AI/ML methods to gain additional insight to be added to the metadata. Furthermore,
    the metadata needs to be tagged and annotated and further optimized and prepared
    for consumption by data product owners or business users, for instance, by building
    and adding semantic knowledge graphs, leveraging industry- or domain-specific
    ontologies, etc. This phase of metadata enrichment represents by far the most
    complex stage in the end-to-end metadata lifecycle and may also include transformation
    and adherence to metadata standards.^([4](#Fn4)) This metadata enrichment process
    may have to be performed repetitively.'
  id: totrans-429
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自动化元数据丰富化**：一旦元数据被自动生成，就需要对其进行丰富化，这意味着需要使用AI/ML方法对元数据进行分析和配置，以获得额外的见解并添加到元数据中。此外，元数据需要被标记和注释，并进一步优化，以便数据产品所有者或业务用户使用，例如，通过构建和添加语义知识图谱，利用行业或领域特定的本体等。这一阶段的元数据丰富化是整个端到端元数据生命周期中最复杂的阶段，也可能包括转换和遵守元数据标准。[4](#Fn4)
    这个元数据丰富化过程可能需要重复执行。'
- en: '**Automated metadata** **extraction and exploitation**: Once metadata has been
    generated, captured in the knowledge catalog, and further enriched, it is ready
    to be extracted for consumption and exploitation by business users. This may sound
    like a simple undertaking; nevertheless, it requires a rich and easy-to-use GUI-based
    knowledge catalog, which lists the available data and AI assets in context, meaning
    type and format of the assets (i.e., relational database tables, JSON or XML documents,
    Parquet and Avro files, CSV files, connection methods, AI models, pipelines, ETL
    stages, etc.), ownership, correlation with other assets (i.e., via semantic knowledge
    graphs), and access rights and access methods (i.e., SQL, NoSQL, REST API).'
  id: totrans-430
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自动元数据** **提取和利用**：一旦元数据生成，被捕获在知识目录中，并进一步丰富，它就准备好被提取供商业用户消费和利用。这听起来可能像是一项简单的任务；然而，它需要一个丰富且易于使用的基于GUI的知识目录，该目录列出上下文中的可用数据和AI资产，包括资产类型和格式（即关系数据库表、JSON或XML文档、Parquet和Avro文件、CSV文件、连接方法、AI模型、管道、ETL阶段等），所有权，与其他资产的相关性（即通过语义知识图谱），以及访问权限和访问方法（即SQL、NoSQL、REST
    API）。'
- en: Figure [14-2](#Fig2) is an illustration of intelligent automated metadata management^([5](#Fn5))
    with the three phases discussed previously.
  id: totrans-431
  prefs: []
  type: TYPE_NORMAL
  zh: 图[14-2](#Fig2)展示了之前讨论的三个阶段的智能自动化元数据管理^([5](#Fn5))。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig2_HTML.png)'
  id: totrans-432
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig2_HTML.png)'
- en: A process diagram of the intelligent automation of metadata. The process includes
    3 phases from right to left, generation, enrichment, and extraction.
  id: totrans-433
  prefs: []
  type: TYPE_NORMAL
  zh: 智能自动化元数据的流程图。该流程从右到左分为三个阶段：生成、丰富和提取。
- en: Figure 14-2
  id: totrans-434
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-2
- en: Intelligent Automation of Metadata
  id: totrans-435
  prefs: []
  type: TYPE_NORMAL
  zh: 元数据的智能自动化
- en: Intelligent automation of metadata must also address the needs of data engineers
    and data product developers.
  id: totrans-436
  prefs: []
  type: TYPE_NORMAL
  zh: 智能自动化元数据还必须满足数据工程师和数据产品开发者的需求。
- en: The following two subsections provide a glance on automated analysis and profiling
    of data and automated tagging and annotation of data. By addressing these issues,
    we provide some basic examples.
  id: totrans-437
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的两个小节提供了对数据自动分析和配置文件以及数据自动标记和注释的概述。通过解决这些问题，我们提供了一些基本示例。
- en: Let us begin with automated analysis and profiling of data.
  id: totrans-438
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从数据的自动分析和配置文件开始。
- en: Automated Analysis and Profiling of Data
  id: totrans-439
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据的自动分析和配置文件
- en: Data analysis and profiling has been around for decades. What made this notably
    different in a modern Data Fabric architecture and Data Mesh solution, however,
    is the infusion of AI/ML and the introduction of automated processes. Let us explore
    further what this AI/ML infusion really means.
  id: totrans-440
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析和配置文件已经存在了几十年。然而，在现代数据编织架构和数据网格解决方案中，这一显著的不同之处在于AI/ML的融合和自动化流程的引入。让我们进一步探讨这种AI/ML融合真正意味着什么。
- en: As we have pointed out in Chapter [7](537582_1_En_7_Chapter.xhtml), data profiling
    is the process of examining, analyzing, and checking the content of all data attributes
    of relevant data sources to get a first path of statistical insight and an initial
    understanding regarding data quality.^([6](#Fn6)) This data analysis and profiling
    process can broadly be categorized into the following three areas `–` (a) structure
    discovery, (b) content discovery, and (c) relationship discovery `–` where each
    area generates metadata and statistics about its content, which is automatically
    captured in the knowledge catalog.
  id: totrans-441
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在第[7](537582_1_En_7_Chapter.xhtml)章中指出的，数据配置文件是检查、分析和验证相关数据源所有数据属性内容的过程，以获得统计洞察的第一步和关于数据质量的初步理解.^([6](#Fn6))
    这种数据分析配置文件过程可以大致分为以下三个领域 `–` (a) 结构发现，(b) 内容发现，和 (c) 关系发现 `–` 其中每个领域都会生成关于其内容元数据和统计信息，这些信息会自动捕获在知识目录中。
- en: Figure [14-3](#Fig3) is an example visualizing statistics of some columns in
    a database table, called *CREDITUSERS*. We have included four columns `–` *USER_ID*,
    *PERSON*, *CURRENT_AGE*, and *RETIREMENT_AGE* `–` including the corresponding
    quality score and value frequency distribution for each column. Figure [14-3](#Fig3)
    also contains some basic statistics for each column, such as number of unique
    values, minimum and maximum values, mean value, standard deviation, etc. It is
    essential to realize that these values are calculated directly from real database
    table data, not statistical data that may be included in the database catalog.
  id: totrans-442
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [14-3](#Fig3) 是一个可视化数据库表中某些列的统计信息的示例，称为 *CREDITUSERS*。我们包括了四个列 `–` *USER_ID*，*PERSON*，*CURRENT_AGE*
    和 *RETIREMENT_AGE* `–` 以及每个列对应的品质分数和价值频率分布。图 [14-3](#Fig3) 还包含了每个列的一些基本统计信息，例如唯一值的数量、最小值和最大值、平均值、标准差等。重要的是要认识到，这些值是直接从真实数据库表数据中计算得出的，而不是可能包含在数据库目录中的统计数据。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig3_HTML.png)'
  id: totrans-443
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig3_HTML.png)'
- en: A screenshot of the database table with preview, profile, and visualization.
    The profile option has 4 columns of the user I D, person, current age, and retirement
    age, and their frequency at the bottom highlights with a rectangular box. Statistics
    below the frequency list the mean length, maximum and minimum values, and unique
    values number for each data.
  id: totrans-444
  prefs: []
  type: TYPE_NORMAL
  zh: 包含预览、概要和可视化的数据库表截图。概要选项有用户 ID、人员、当前年龄和退休年龄四列，以及它们在底部以矩形框突出显示的频率。频率列表下面的统计信息列出了每个数据的平均长度、最大值和最小值以及唯一值数量。
- en: Figure 14-3
  id: totrans-445
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14-3
- en: Statistics of Each Column in a Database Table
  id: totrans-446
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库表中每一列的统计信息
- en: In Chapter [7](537582_1_En_7_Chapter.xhtml), we have also mentioned that ML
    can be used to accelerate and automate data profiling tasks; even DL techniques
    can be deployed to calculate quality measures, for instance, of text data. Yet
    we still need to detail out the crucial factors of how and for what specific purpose
    to use ML and DL.
  id: totrans-447
  prefs: []
  type: TYPE_NORMAL
  zh: 在第 [7](537582_1_En_7_Chapter.xhtml) 章中，我们也提到机器学习（ML）可以用来加速和自动化数据概要分析任务；甚至深度学习（DL）技术也可以部署来计算质量度量，例如文本数据的质量。然而，我们仍然需要详细说明如何以及为何特定目的使用机器学习和深度学习。
- en: Before moving on to discuss the usage of ML and DL, we include another example
    of user counts of each US state in the *CREDITUSERS* table, as depicted in Figure
    [14-4](#Fig4), with the US states of New York (*NY*), California (*CA*), Florida
    (*FL*), and Texas (*TX*) among the highest counts and the US states of Wyoming
    (*WY*), Arkansas (*AK*), and the Federal District of Columbia (*DC*) among the
    lowest counts. Of course, this is a rather traditional depiction; a more sophisticated
    depiction would, for instance, be based on ML-based clustering, meaning to identify
    and visualize various clusters of US states to, for instance, discover and depict
    demographic similarities of US states.
  id: totrans-448
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论机器学习和深度学习的使用之前，我们提供了一个 *CREDITUSERS* 表中每个美国州用户数的另一个示例，如图 [14-4](#Fig4) 所示，其中纽约
    (*NY*)、加利福尼亚 (*CA*)、佛罗里达 (*FL*) 和德克萨斯 (*TX*) 的用户数最高，而怀俄明 (*WY*)、阿肯色 (*AK*) 和哥伦比亚特区
    (*DC*) 的用户数最低。当然，这是一个相当传统的描述；一个更复杂的描述可能会基于基于机器学习的聚类，即识别和可视化美国州的各个集群，例如发现和描述美国州的人口相似性。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig4_HTML.png)'
  id: totrans-449
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig4_HTML.png)'
- en: A screenshot of the database. On the top is the list of charts such as bar charts,
    pie charts, heat maps, and other charts. On the left is the chart customization
    option, which includes categories, order, category order, summary, split type,
    and bar type. In the center, a bar graph of count versus United state cities.
    California has the highest count of 245\. District of Columbia has the lowest
    count of 3.
  id: totrans-450
  prefs: []
  type: TYPE_NORMAL
  zh: 数据库的截图。顶部是图表列表，如柱状图、饼图、热图和其他图表。左侧是图表定制选项，包括类别、顺序、类别顺序、摘要、分割类型和柱状类型。中间是一个计数与美利坚合众国城市对比的柱状图。加利福尼亚的计数最高，为
    245。哥伦比亚特区的计数最低，为 3。
- en: Figure 14-4
  id: totrans-451
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14-4
- en: User Counts of Each US State on the CREDITUSERS Table
  id: totrans-452
  prefs: []
  type: TYPE_NORMAL
  zh: CREDITUSERS 表上每个美国州的用户数
- en: This leads us to the endeavor of detailing out the role of AI in performing
    data analysis and profiling tasks.^([7](#Fn7))
  id: totrans-453
  prefs: []
  type: TYPE_NORMAL
  zh: 这引导我们努力详细说明人工智能在执行数据分析与概要分析任务中的作用.^([7](#Fn7))
- en: 'The following list includes key capabilities of data analysis and profiling,
    which are applied via ML and DL:'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的列表包括了数据分析和概要分析的关键能力，这些能力是通过机器学习和深度学习实现的：
- en: '**Determining** **representative sample datasets**: ML algorithms and techniques
    should be used to determine a representative subset of records in a database table
    that consists, for instance, of only 10`–`15% of the original data records. Statistical
    measures should be determined on these representative subsets, which have the
    potential to reduce time and compute resources by factors. Depending on the values
    of the underlying dataset, a larger representative dataset may yield more accurate
    predictive results for the entire dataset.'
  id: totrans-455
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确定代表性样本数据集**：应该使用机器学习算法和技术来确定数据库表中记录的代表性子集，例如，只包含原始数据记录的10%–15%。在这些代表性子集上确定统计指标，这些子集有可能通过因子减少时间和计算资源。根据底层数据集的值，更大的代表性数据集可能为整个数据集提供更准确的预测结果。'
- en: '**Extrapolating statistics**: Once key statistical measures have been determined
    based on those representative subsets, ML methods should be applied to extrapolate
    (predict) corresponding statistical values for the entire dataset. This applies
    to all statistical values that are depicted in Figure [14-3](#Fig3), for example,
    frequency distribution, quality score, mean value, standard deviation, etc.'
  id: totrans-456
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**外推统计学**：一旦基于那些代表性子集确定了关键统计指标，机器学习（ML）方法就应该被应用于外推（预测）整个数据集对应的统计值。这适用于图[14-3](#Fig3)中展示的所有统计值，例如，频率分布、质量分数、平均值、标准差等。'
- en: '**Understanding structure of data and AI assets**: ML and DL methods are particularly
    well suited to discover the structure of data and AI assets, including non-structured
    data, pipelines, text, images, etc. Discovering structure includes determination
    of data types (e.g., XML, JSON, etc.), ML/DL model types (e.g., ONNX, Scikit-learn,
    PMML, XGBoost, TensorFlow, etc.), number of levels in random forest ML models,
    number of hidden layers in ANN models, identification of queues or ETL stages,
    etc.'
  id: totrans-457
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**理解数据和AI资产的结构**：机器学习（ML）和深度学习（DL）方法特别适合发现数据和AI资产的结构，包括非结构化数据、管道、文本、图像等。发现结构包括确定数据类型（例如，XML、JSON等）、ML/DL模型类型（例如，ONNX、Scikit-learn、PMML、XGBoost、TensorFlow等）、随机森林ML模型中的层数、ANN模型中的隐藏层数、识别队列或ETL阶段等。'
- en: '**Clustering of data**: A much deeper and more relevant profiling is done with
    clustering of data (as we have suggested previously when discussing Figure [14-4](#Fig4)),
    particularly values of key columns in database tables, for example, salary income,
    credit card spending, purchasing volume, types or categories of goods purchased,
    etc. This enables data engineers and data consumers to gain additional insight
    that is not so obvious and easily visible by just looking at statistical distribution
    values. It specifically supports the transformation from pure customer data to
    gaining more insight regarding customer behavior.'
  id: totrans-458
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据聚类**：与之前讨论图[14-4](#Fig4)时建议的聚类数据相比，进行更深入和更相关的配置，特别是数据库表中的关键列值，例如，薪水收入、信用卡消费、购买量、购买的商品类型或类别等。这使数据工程师和数据消费者能够获得通过仅查看统计分布值不太明显和容易看到的额外见解。它特别支持从纯客户数据到获得更多关于客户行为的见解的转变。'
- en: '**Relationship discovery**: Data and AI assets need to be visualized in context
    and in relationship to each other, which requires ML-based discovery methods and
    visualization and access methods for ease of consumption. For instance, AI models
    need to be presented in regard to associated data pipelines and applications for
    scoring and inferencing.'
  id: totrans-459
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关系发现**：数据和AI资产需要在上下文中相互关联地可视化，这需要基于ML的发现方法和可视化和访问方法以方便消费。例如，AI模型需要根据相关的数据管道和应用进行评分和推理。'
- en: The preceding analysis and profiling tasks must be performed autonomously and
    repetitively, depending on availability of new assets or updates to existing data
    and AI assets. Results of these analysis and profiling tasks should be pushed
    to the knowledge catalog autonomously as well.
  id: totrans-460
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的分析和配置任务必须根据新资产的可获得性或现有数据集和AI资产的更新自动和重复执行。这些分析和配置任务的结果也应该自动推送到知识目录中。
- en: Before we move on to automated tagging, annotation, and labeling of data and
    metadata, we would like to point out the difference between data profiling and
    data mining. With data profiling, we essentially limit our analysis to structure
    discovery, content discovery, and relationship discovery, whereas data mining
    is geared toward finding *golden nuggets* in data primarily via exploration, pattern
    discovery, etc. Although there may be an overlap between data mining and profiling,
    data mining is done for a particular business purpose, that is, targeted marketing
    campaign or customer care, whereas data profiling has a more general purpose.^([8](#Fn8))
  id: totrans-461
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们继续讨论数据的自动标记、注释和标签化以及元数据的自动标记、注释和标签化之前，我们想指出数据概要分析和数据挖掘之间的区别。通过数据概要分析，我们本质上将我们的分析限制在结构发现、内容发现和关系发现上，而数据挖掘则侧重于通过探索、模式发现等找到数据中的
    *金块*。尽管数据挖掘和概要分析之间可能存在重叠，但数据挖掘是为了特定的商业目的而进行的，即有针对性的营销活动或客户关怀，而数据概要分析则具有更广泛的目的.^([8](#Fn8))
- en: Automated Tagging, Annotation, and Labeling
  id: totrans-462
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动标记、注释和标签化
- en: 'Before diving into automated tagging, annotation, and labeling of metadata,
    let us look at another example^([9](#Fn9)) depicted in Figure [14-5](#Fig5), where
    several columns of the *CREDITUSERS* table are listed on the left side. For the
    column ADDRESS, three business terms are automatically suggested, including a
    probability measure for a match: *Work Address* (79%), *Email Address* (77%),
    and *Postal Address* (76%).'
  id: totrans-463
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨元数据的自动标记、注释和标签化之前，让我们看看图 [14-5](#Fig5) 中描述的另一个例子^([9](#Fn9))，其中左侧列出了 *CREDITUSERS*
    表的几个列。对于地址列，自动建议了三个业务术语，包括匹配的概率度量：*工作地址*（79%）、*电子邮件地址*（77%）和*邮政地址*（76%）。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig5_HTML.png)'
  id: totrans-464
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig5_HTML.png)'
- en: A screenshot of the credit users information. On the left, a table lists the
    column, business terms, data class, data quality, and review status. On the right,
    an address column information of the governance business term suggests 3 terms.
    Work address, 79%. Email address, 77%. Postal address, 76%.
  id: totrans-465
  prefs: []
  type: TYPE_NORMAL
  zh: 这是信用用户信息的截图。在左侧，一个表格列出了列、业务术语、数据类别、数据质量和审查状态。在右侧，治理业务术语的地址列信息建议了3个术语。工作地址，79%。电子邮件地址，77%。邮政地址，76%。
- en: Figure 14-5
  id: totrans-466
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-5
- en: Business Term Assignment
  id: totrans-467
  prefs: []
  type: TYPE_NORMAL
  zh: 业务术语分配
- en: These business terms are automatically taken from the business glossary and
    assigned to the column *ADDRESS*, giving the data steward a choice to select one
    of these terms as the most suitable one. In this example, the data steward has
    the option to either choose one of the proposed terms or even reject all three,
    depending on their own judgment.
  id: totrans-468
  prefs: []
  type: TYPE_NORMAL
  zh: 这些业务术语自动从业务术语表中提取并分配给列 *地址*，从而让数据管理员可以选择其中最合适的一个。在这个例子中，数据管理员可以选择其中一个建议的术语，甚至可以拒绝所有三个，这取决于他们自己的判断。
- en: Let us now clarify the terms *tagging*, *annotation*, and *labeling*, which
    are often wrongly used interchangeably. Comparing these terms, we limit the discussion
    to the Data Fabric and AI scope. Quite a few terms exist to further enrich data,
    such as labels, annotations, tags, comments, attributes, explanations, etc.
  id: totrans-469
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们澄清一下 *标记*、*注释* 和 *标签化* 这些术语，这些术语经常被错误地互换使用。比较这些术语，我们将讨论限制在数据编织和AI范围内。存在许多术语来进一步丰富数据，例如标签、注释、标签、注释、属性、解释等。
- en: 'In general, *tagging* means to add additional keywords, phrases, or terms to
    an asset to further explain what the asset is all about and to support searches,
    for example, a column of a database table may be tagged as *PII*, meaning it contains
    sensitive information. Some readers may refer to this as *comments* or *explanations*.
    An *attribute* is a characteristic of an asset, for example, an AI model may have
    the following characteristics assigned to it: *trained*, *validated*, or *deployed*.
    Like tags, *annotations* refer to additional information about assets that may
    comprise figures and text, for example, explanatory text as comments added to
    a Java program.'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，*标记*意味着为资产添加额外的关键词、短语或术语，以进一步说明资产的内容，并支持搜索，例如，数据库表的一列可能被标记为 *PII*，这意味着它包含敏感信息。一些读者可能将其称为
    *注释* 或 *解释*。*属性*是资产的特征，例如，一个AI模型可能被分配以下特征：*训练过*、*验证过*或*部署过*。与标签类似，*注释*指的是关于资产的其他信息，可能包括图表和文本，例如，添加到Java程序中的注释性解释文本。
- en: In the context of AI with ML and DL though, *annotation* refers primarily to
    text, image, or video annotation, meaning to capture an object of interest, for
    instance, vehicles, bicycles, and pedestrians, in videos to support learning and
    training of an ANN model for autonomous driving.
  id: totrans-471
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在具有ML和DL的AI背景下，*注释*主要是指文本、图像或视频注释，意味着捕获感兴趣的对象，例如，在视频中捕获车辆、自行车和行人，以支持自动驾驶ANN模型的学习和训练。
- en: 'Likewise, *labeling* refers to adding additional information to all records
    of a dataset to support training of AI models, for example, adding *TRUE* or *FALSE*
    to each passed banking transaction to train an ML model to predict whether a future
    transaction is fraudulent or not. Thus, annotation and labeling in AI^([10](#Fn10))
    are similar concepts to create datasets for AI model training. They differ by
    style and method: annotations are capturing or marking objects of interest (primarily
    in a text, image, or video), whereas labeling adds data to individual records.'
  id: totrans-472
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，*标签化*指的是向数据集的所有记录添加附加信息以支持AI模型的训练，例如，为每个通过的银行交易添加*TRUE*或*FALSE*，以训练一个ML模型来预测未来的交易是否欺诈。因此，在AI中（^([10](#Fn10)）的注释和标签是创建AI模型训练数据集的类似概念。它们在风格和方法上有所不同：注释是捕获或标记感兴趣的对象（主要在文本、图像或视频中），而标签则为单个记录添加数据。
- en: The crucial factor here is to apply AI/ML methods to add meaningful and relevant
    tags or annotations to data and metadata autonomously or to provide actionable
    recommendations for the data steward or data consumers. This facilitates a closer
    interlock and linkage of data and AI assets to business domains and thus supports
    self-service Data Mesh initiatives. Autonomous annotations and labeling in an
    AI context are essential tasks to address trustworthy AI as well in which, for
    instance, retraining and revalidation of AI models need to be performed autonomously,
    in case bias, drift, or worsening quality metrics have been detected for some
    AI models.
  id: totrans-473
  prefs: []
  type: TYPE_NORMAL
  zh: 此处的关键因素是应用AI/ML方法，自主地为数据及其元数据添加有意义的和相关的标签或注释，或者为数据管理员或数据消费者提供可操作的推荐。这促进了数据与AI资产与业务领域之间的更紧密的互锁和链接，从而支持自助服务数据网格倡议。在AI环境中进行自主注释和标签是解决可信赖AI的关键任务，其中，例如，如果检测到某些AI模型的偏差、漂移或质量指标恶化，则需要自主地重新训练和重新验证AI模型。
- en: We would like to point out that autonomous tagging, annotation, and labeling
    needs to be done on data and AI assets as well as on metadata itself. Tags, annotations,
    and labels added to data and AI assets represent metadata, whereas tags, labels,
    and annotations to metadata yield active metadata, further enriching the existing
    set of metadata.
  id: totrans-474
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想指出，自主标记、注释和标签不仅需要在数据和AI资产上执行，还需要在元数据本身上执行。添加到数据和AI资产中的标签、注释和标签代表元数据，而添加到元数据的标签、标签和注释则产生活动元数据，进一步丰富现有的元数据集。
- en: Some examples of the latter are the autonomous assignment of a business term
    to a database column; the relationship of a pipeline to an AI model; determining
    the impact on the business by, for instance, removing a supposedly unused dataset;
    or simply adding a descriptive label or a quality score to a database column that
    is already captured in the knowledge catalog.
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: 后者的例子包括将业务术语自主分配给数据库列；管道与AI模型之间的关系；例如，通过移除一个被认为未使用的数据集来确定对业务的影响；或者简单地为知识目录中已捕获的数据库列添加描述性标签或质量评分。
- en: Let us now move on to automated data quality assessments.
  id: totrans-476
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续讨论自动化数据质量评估。
- en: Automated Data Quality Assessment
  id: totrans-477
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化数据质量评估
- en: Understanding and solving data quality issues is still the most common challenge
    for any data owner and data consumer; it goes far beyond just profiling data where
    some basic statistics for each column, such as frequency distribution, number
    of unique values, minimum and maximum values, mean value, standard deviation,
    etc., are calculated as depicted in Figure [14-3](#Fig3). A comprehensive data
    quality assessment requires a deeper look at data to understand, for instance,
    the number of data class violations, data type violations, missing values, format
    violations, values out of range, etc.
  id: totrans-478
  prefs: []
  type: TYPE_NORMAL
  zh: 理解和解决数据质量问题仍然是任何数据所有者和数据消费者面临的最常见挑战；这远远超出了仅仅对数据进行概要分析的范围，例如，为每一列计算一些基本统计数据，如频率分布、唯一值的数量、最小值和最大值、平均值、标准差等，如图[14-3](#Fig3)所示。全面的数据质量评估需要更深入地查看数据，以了解例如数据类别违规、数据类型违规、缺失值、格式违规、超出范围的值等问题。
- en: The outcome of a comprehensive data quality assessment is a detailed summary
    of findings that is represented as a *data quality score* for each data asset
    as illustrated in Figure [14-6](#Fig6).
  id: totrans-479
  prefs: []
  type: TYPE_NORMAL
  zh: 综合数据质量评估的结果是一份详细的发现总结，如图 [14-6](#Fig6) 所示，以每个数据资产的数据质量分数表示。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig6_HTML.png)'
  id: totrans-480
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig6_HTML.png)'
- en: A screenshot of the table under the column 59 tab. The table lists the assets,
    sources, business terms, data quality, and review status and highlights 3 data
    assets and the data quality score. Data assets are credit card, credit trans,
    and credit users with a 99, 98, and 99 percent quality score.
  id: totrans-481
  prefs: []
  type: TYPE_NORMAL
  zh: 在 59 标签下的表格截图。该表格列出了资产、来源、业务术语、数据质量和审查状态，并突出显示了 3 个数据资产和数据质量分数。数据资产是信用卡、信用交易和信用用户，质量分数分别为
    99%、98% 和 99%。
- en: Figure 14-6
  id: totrans-482
  prefs: []
  type: TYPE_NORMAL
  zh: 图 14-6
- en: Data Quality Assessment
  id: totrans-483
  prefs: []
  type: TYPE_NORMAL
  zh: 数据质量评估
- en: Figure [14-6](#Fig6) lists three tables `–` *CREDITCARDS*, *CREDITTRANS*, and
    *CREDITUSERS* `–` with their corresponding quality scores, which are 99%, 98%,
    and 99%, respectively. These quality scores are derived by calculating data quality
    dimensions for each individual column of a database table.
  id: totrans-484
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [14-6](#Fig6) 列出了三个表 `–` *CREDITCARDS*、*CREDITTRANS* 和 *CREDITUSERS* `–` 以及它们对应的质量分数，分别是
    99%、98% 和 99%。这些质量分数是通过计算数据库表中每个单独列的数据质量维度得到的。
- en: The overall quality score for a data asset is then derived from the quality
    scores of each column from each of the tables. Thus, a set of well-defined data
    quality dimensions are used to calculate a quality score for each chosen column,
    where the set of quality scores for each chosen column are used to calculate the
    overall quality score of the whole data asset.
  id: totrans-485
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，从每个表中每个列的质量分数中得出数据资产的整体质量分数。因此，使用一组定义良好的数据质量维度来计算每个所选列的质量分数，其中每个所选列的质量分数集合用于计算整个数据资产的整体质量分数。
- en: 'Let us briefly discuss the data quality dimensions^([11](#Fn11)):'
  id: totrans-486
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们简要讨论数据质量维度^([11](#Fn11))：
- en: '**Data class violations**: Is counting the violations of data classes defined
    in the knowledge catalog (e.g., Passport Number, New York State Driver’s License,
    Organization Name, VISA Card, etc.) for each column.'
  id: totrans-487
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据类别违规**：计算每个列中知识目录中定义的数据类别（例如，护照号码、纽约州驾驶执照、组织名称、维萨卡等）违规情况。'
- en: '**Data type violations**: Is counting violations of data types (e.g., SMALLINT,
    REAL, DATE, TIMESTAMP, etc.) of each chosen column as it has been determined during
    the prior data profiling phase.'
  id: totrans-488
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据类型违规**：在先前数据概要分析阶段确定的基础上，计算每个所选列的数据类型（例如，SMALLINT、REAL、DATE、TIMESTAMP 等）违规情况。'
- en: '**Inconsistent capitalization**: Is looking for patterns regarding usage of
    upper- and lowercase in strings and is counting the number of violations taking
    the identified usage pattern as a base – assuming a pattern has been identified
    for the majority of values in a column.'
  id: totrans-489
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**不一致的大小写**：寻找字符串中大小写使用的模式，并计算以已识别的使用模式为基础的违规数量 – 假设列中大多数值的模式已被识别。'
- en: '**Values out of range**: Is looking for violations of a minimum and/or maximum
    constraint, which has been defined for values of a column.'
  id: totrans-490
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**超出范围的值**：寻找违反最小值和/或最大值约束的情况，这些约束是为列中的值定义的。'
- en: '**Rule violations**: Is looking for violations of any data or quality rule
    for a row in a database table that has been defined by the data steward.'
  id: totrans-491
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**规则违规**：寻找数据库表中数据或质量规则违规，这些规则是由数据管理员定义的。'
- en: '**Suspect values**: Is looking for mismatches of values and format and properties
    of values, compared with the identified most likely pattern of a column.'
  id: totrans-492
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可疑值**：寻找值和格式以及与列中已识别的最可能模式不匹配的情况。'
- en: '**Suspect values in correlated columns**: Similar to the *suspect values* dimension,
    this data quality dimension detects mismatches of likely patterns or correlations
    of values across columns within a table.'
  id: totrans-493
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**相关列中的可疑值**：类似于 *可疑值* 维度，这个数据质量维度检测表中列之间值可能模式或相关性的不匹配。'
- en: '**Missing values**: Is looking for non-expected NULL or empty values in columns.'
  id: totrans-494
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**缺失值**：寻找列中非预期的 NULL 或空值。'
- en: '**Inconsistent representation of missing values**: Is looking for NULL, empty,
    or values containing only spaces in a column.'
  id: totrans-495
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**缺失值表示不一致**：寻找列中的 NULL、空或仅包含空格的值。'
- en: '**Format violations**: The data steward may have declared certain values of
    a column as invalid; the number of these invalid values for each column is counted
    by this dimension.'
  id: totrans-496
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**格式违规**：数据管理员可能已宣布某些列的某些值无效；通过此维度统计每个列中这些无效值的数量。'
- en: '**Duplicated values**: This dimension may already be captured via the data
    profiling phase, where the number of duplicate values is calculated for columns
    that should contain unique values, that is, primary or unique keys.'
  id: totrans-497
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重复值**：此维度可能已在数据概要分析阶段被捕获，其中计算了应包含唯一值（即主键或唯一键）的列中的重复值数量。'
- en: Figure [14-7](#Fig7) shows a subset of the data quality dimensions for the table
    *BANK_CUSTOMERS* and the overall data quality score for this table, which is 96%.
    It also depicts the quality score for some of its columns, like *CUSTOMER_ID*,
    *NAME*, *ADDRESS*, *ZIP*, *CREDIT_RATING*, and *AGE*. As you can see, the quality
    score for most of the columns is either 100% or very close to 100%, whereas the
    *ZIP* column is only 66%, which is a key reason for the overall data quality score
    of the table *BANK_CUSTOMERS* to be 96%.
  id: totrans-498
  prefs: []
  type: TYPE_NORMAL
  zh: 图[14-7](#Fig7)显示了表格*BANK_CUSTOMERS*的数据质量维度子集以及该表格的整体数据质量得分，为96%。它还描绘了其中一些列（如*CUSTOMER_ID*、*NAME*、*ADDRESS*、*ZIP*、*CREDIT_RATING*和*AGE*）的质量得分。正如你所看到的，大多数列的质量得分要么是100%，要么非常接近100%，而*ZIP*列仅为66%，这是表格*BANK_CUSTOMERS*的整体数据质量得分为96%的关键原因。
- en: '![](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig7_HTML.png)'
  id: totrans-499
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/537582_1_En_14_Chapter/537582_1_En_14_Fig7_HTML.png)'
- en: A screenshot of the data asset of the bank customer. On the left, the data quality
    score is 96%, and a table at the left bottom highlight with a dark shade. On the
    right, the data quality option list the quality dimension results of the name,
    hash of findings, percentage of finding, delta, and ignore.
  id: totrans-500
  prefs: []
  type: TYPE_NORMAL
  zh: 银行客户的资产截图。在左侧，数据质量得分为96%，左下角有一个用深色阴影突出的表格。在右侧，数据质量选项列出了名称、发现哈希、发现百分比、delta和忽略的质量维度结果。
- en: Figure 14-7
  id: totrans-501
  prefs: []
  type: TYPE_NORMAL
  zh: 图14-7
- en: Data Quality Dimensions
  id: totrans-502
  prefs: []
  type: TYPE_NORMAL
  zh: 数据质量维度
- en: This example is presumably derived from rather traditional data quality assessment
    methods of database tables. With the exception of *suspect values* and *suspect
    values in correlated columns*, which require AI techniques (i.e., pattern discovery),
    all other data quality dimensions are primarily calculated via conventional methods.
    Future methods are inevitably affected by broadening the scope to include AI assets,
    meaning to assess quality of AI models, ETL stages, pipelines, etc. For instance,
    measuring the quality of an AI model is related to what we have discussed in Chapter
    [5](537582_1_En_5_Chapter.xhtml) in the section on trustworthy AI, namely, to
    measure quality metrics, for example, the areas under the ROC or PR curves while
    models are in production.
  id: totrans-503
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子可能是从数据库表的传统数据质量评估方法中衍生出来的。除了*可疑值*和*相关列中的可疑值*，它们需要AI技术（即模式发现）之外，所有其他数据质量维度主要都是通过传统方法计算的。未来的方法不可避免地会受到将范围扩大到包括AI资产的影响，即评估AI模型、ETL阶段、管道等的质量。例如，测量AI模型的质量与我们讨论的第[5](537582_1_En_5_Chapter.xhtml)章中关于可信AI的部分相关，即测量质量指标，例如模型在生产过程中ROC或PR曲线下的面积。
- en: Even today’s data with its unprecedented diversity in terms of text, images,
    and videos is calling for innovative methods to measure the quality of these data
    in the context of a certain usage purpose. For instance, what are the quality
    imperatives and measurement methods for medical texts to be declared as suitable
    to serve as reliable input for DL model development to predict medical treatment,
    promising recovery with high confidence? What are the methods to measure the quality
    and completeness of annotated video sequences to serve as input for training DL
    models used for autonomous driving?
  id: totrans-504
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是今天的数据，在文本、图像和视频方面的多样性也前所未有，这要求在特定使用目的的背景下，采用创新的方法来衡量这些数据的质量。例如，医疗文本被宣布为可靠输入用于预测医疗治疗、具有高度信心地承诺恢复的质量要求和测量方法是什么？用于自动驾驶训练的深度学习模型输入的标注视频序列的质量和完整性如何测量？
- en: 'The treatment of this topic cannot end without discussing the need for automated
    actions to correct quality issues. Similar to what we have seen with metadata
    enrichment where business terms are suggested to be assigned to a column, data
    quality assessments can only be seen as the beginning of a journey where corrections
    need to autonomously performed, using AI/ML: quality assessments in the context
    of a modern Data Fabric and Data Mesh need to be developed into *intelligent automated
    quality management*, where corrections must be implemented autonomously or suggested
    to the data steward.'
  id: totrans-505
  prefs: []
  type: TYPE_NORMAL
  zh: 在不讨论自动执行纠正质量问题的必要性之前，对这一主题的处理不能结束。类似于我们在元数据丰富中看到的，建议将业务术语分配给列，数据质量评估只能被视为一个旅程的开始，其中需要自主执行纠正，使用
    AI/ML：在现代数据编织和数据网格的背景下，质量评估需要发展成为 *智能自动化质量管理*，其中纠正必须自主实施或建议给数据管理员。|
- en: Key Takeaways
  id: totrans-506
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: We conclude this chapter with a few key takeaways as summarized in Table [14-1](#Tab1).
  id: totrans-507
  prefs: []
  type: TYPE_NORMAL
  zh: 我们以表 [14-1](#Tab1) 中总结的几个关键要点来结束本章。|
- en: Table 14-1
  id: totrans-508
  prefs: []
  type: TYPE_NORMAL
  zh: 表 14-1
- en: Key Takeaways
  id: totrans-509
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要点
- en: '| # | Key Takeaway | High-Level Description |'
  id: totrans-510
  prefs: []
  type: TYPE_TB
  zh: '| # | 关键要点 | 高级描述 |'
- en: '| --- | --- | --- |'
  id: totrans-511
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| 1 | Intelligent automated metadata is key to a Data Fabric and Data Mesh.
    | The term *intelligent automated metadata* does portray the inclusion of AI/ML
    into the entire lifecycle of metadata management, including generation, enrichment,
    and consumption of data. |'
  id: totrans-512
  prefs: []
  type: TYPE_TB
  zh: '| 1 | 智能自动化元数据是数据编织和数据网格的关键。 | 智能自动化元数据这一术语确实描绘了将 AI/ML 引入元数据管理的整个生命周期，包括生成、丰富和消费数据。|'
- en: '| 2 | A knowledge catalog is based on intelligent auto-capabilities. | A knowledge
    catalog for a Data Fabric architecture and Data Mesh solution needs to manage
    automated metadata generation, automated metadata enrichment, and automated metadata
    extraction and exploitation of the underlying data and AI assets. |'
  id: totrans-513
  prefs: []
  type: TYPE_TB
  zh: '| 2 | 知识目录基于智能自动能力。 | 数据编织架构和数据网格解决方案的知识目录需要管理自动化元数据生成、自动化元数据丰富以及自动化元数据提取和利用底层数据和
    AI 资产。|'
- en: '| 3 | Data profiling is the first step to gain insight into data assets. |
    Data profiling is the first process of examining, analyzing, and checking the
    content of data attributes of data assets to get a first path of statistical insight
    and an initial understanding regarding data quality. |'
  id: totrans-514
  prefs: []
  type: TYPE_TB
  zh: '| 3 | 数据概要分析是深入了解数据资产的第一步。 | 数据概要分析是检查、分析和检查数据资产数据属性内容的第一步，以获得初步的统计洞察和关于数据质量的初步理解。|'
- en: '| 4 | AI/ML can augment data profiling. | AI/ML can determine representative
    sample datasets, extrapolate statistics for the entire dataset, understand structure
    of data and AI assets, and perform clustering and relationship discovery. |'
  id: totrans-515
  prefs: []
  type: TYPE_TB
  zh: '| 4 | AI/ML 可以增强数据概要分析。 | AI/ML 可以确定代表性的样本数据集，推断整个数据集的统计数据，理解数据和分析资产的结构，并执行聚类和关系发现。|'
- en: '| 5 | Tagging, annotation, and labeling. | AI/ML should be applied to tagging,
    annotation, and labeling, which can be seen as vital methods for metadata enrichment.
    |'
  id: totrans-516
  prefs: []
  type: TYPE_TB
  zh: '| 5 | 标记、注释和标签。 | AI/ML 应应用于标记、注释和标签，这些可以被视为元数据丰富的重要方法。|'
- en: '| 6 | Automated data quality assessments are based on data quality dimensions.
    | A number of data quality dimensions are used, such as data class violations,
    data type violations, inconsistent capitalization, values out of range, rule violations,
    suspect values, etc., to perform automated data quality assessments. |'
  id: totrans-517
  prefs: []
  type: TYPE_TB
  zh: '| 6 | 自动数据质量评估基于数据质量维度。 | 使用多个数据质量维度，例如数据类别违规、数据类型违规、不一致的大小写、超出范围的值、规则违规、可疑值等，以执行自动数据质量评估。|'
- en: '| 7 | AI/ML needs to be leveraged for improving quality assessments. | Comprehensive
    quality assessments of data and AI assets in the context of a modern Data Fabric
    and Data Mesh need to be infused with AI/ML and developed into intelligent automated
    quality management processes. |'
  id: totrans-518
  prefs: []
  type: TYPE_TB
  zh: '| 7 | 需要利用 AI/ML 来提高质量评估。 | 在现代数据编织和数据网格的背景下，对数据和 AI 资产的综合质量评估需要融入 AI/ML，并发展成为智能自动化的质量管理流程。|'
