- en: 1. An Introduction to Synthetic Data
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 1. 合成数据简介
- en: In this chapter, we will explore the concept of data and its importance in today’s
    world. We will discuss the lifecycle of data from collection to storage and how
    synthetic data can be used to improve accuracy in data science and artificial
    intelligence (AI) applications. Next, we will explore of synthetic data applications
    in financial services, manufacturing, healthcare, automotive, robotics, security,
    social media, and marketing. Finally, we will examine natural language processing,
    computer vision, understanding of visual scenes, and segmentation problems in
    terms of synthetic data.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: '在本章中，我们将探讨数据的概念及其在当今世界的重要性。我们将讨论数据的生命周期，从收集到存储，以及合成数据如何用于提高数据科学和人工智能（AI）应用中的准确性。接下来，我们将探讨合成数据在金融服务、制造、医疗保健、汽车、机器人、安全、社交媒体和营销中的应用。最后，我们将从合成数据的角度来考察自然语言处理、计算机视觉、对视觉场景的理解以及分割问题。 '
- en: What Synthetic Data is?
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据是什么？
- en: Despite 21st-century advances in data collection and analysis, there is still
    a lack of understanding of how to properly utilize data to minimize the perceived
    ambiguity or subjectivity of the information it represents. This is because the
    same meaning can be expressed in a variety of ways, and a single expression can
    have multiple meanings. As a result, it is difficult to create a comprehensive
    framework for data interpretation that considers all of the potential nuances
    and implications of the information. One way to overcome this challenge is to
    develop standardized methods for data collection and analysis. This will ensure
    that data is collected consistently and that the results can be compared across
    different studies and synthetic data can help us do just that.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在21世纪数据收集和分析方面取得了进步，但人们仍然缺乏如何正确利用数据以最小化其代表信息的感知模糊性或主观性的理解。这是因为同样的意义可以用多种方式表达，而单一的表达方式可以有多个含义。因此，创建一个全面的数据解释框架，考虑所有潜在细微差别和信息的含义，是很困难的。克服这一挑战的一种方法是为数据收集和分析开发标准化的方法。这将确保数据收集的一致性，并且结果可以在不同的研究中进行比较，合成数据可以帮助我们做到这一点。
- en: People generally view synthetic data as being less reliable than data that is
    obtained by direct measurement. Put simply, Synthetic data is data that is generated
    by a computer program rather than being collected from real-world sources. While
    synthetic data is often less reliable than data that is collected directly from
    the real world, it is still an essential tool for data scientists. This is because
    synthetic data can be used to test hypotheses and models before they are applied
    to real-world data. This can help data scientists avoid making errors that could
    have negative consequences in the real world.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 人们通常认为合成数据不如直接测量获得的数据可靠。简单来说，合成数据是指由计算机程序生成而非从现实世界来源收集的数据。虽然合成数据通常不如直接从现实世界收集的数据可靠，但它仍然是数据科学家的重要工具。这是因为合成数据可以在将其应用于现实世界数据之前用于测试假设和模型。这有助于数据科学家避免在现实世界中产生可能产生负面后果的错误。
- en: 'Synthetic data that is artificially generated by a computer program or simulation,
    rather than being collected from real-world sources [[11](#Par0011)]. When we
    examine this definition, we see that the following concepts are included in the
    definition: “Annotated information, computer simulations, algorithm, and “not
    measured in a real-world”.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 通过计算机程序或模拟人工生成的合成数据，而不是从现实世界来源收集 [[11](#Par0011)]。当我们审视这个定义时，我们会看到以下概念包含在定义中：“标注信息、计算机模拟、算法，以及“未在现实世界中测量”。
- en: 'The key features of synthetic data are as follows:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据的关键特征如下：
- en: Not obtained by direct measurement
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不是通过直接测量获得
- en: Generated via an algorithm
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过算法生成
- en: Associated with a mathematical or statistical model
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与数学或统计模型相关联
- en: Mimics real data
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模仿真实数据
- en: Now let’s explain why synthetic data is important.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们解释一下为什么合成数据很重要。
- en: Why is Synthetic Data Important?
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么合成数据很重要？
- en: Humans have a habit of creating synthetic versions of expensive products. Silk
    is an expensive product that began to be used thousands of years ago, and rayon
    was created in the 1880s. So, it’s little surprise that people would do the same
    with data, choosing to produce synthetic data because it is cost-effective. As
    mentioned earlier, synthetic data allows scientists to test hypotheses and models
    in a controlled environment it can also be used to create “what if” scenarios,
    helping data scientists to better understand the outcomes of their models.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 人类有一种创建昂贵产品合成版本的习惯。丝绸是一种昂贵的商品，它开始被使用已有数千年历史，而人造丝是在1880年代被创造的。因此，人们对数据也做同样的事情，选择生产合成数据，因为它既经济又实惠。如前所述，合成数据允许科学家在受控环境中测试假设和模型，它还可以用于创建“如果”场景，帮助数据科学家更好地理解他们模型的结果。
- en: Likewise, synthetic data can be used in a variety of ways to improve machine
    learning models and protect the privacy of real data. First, synthetic data can
    be used to train machine learning models when real data is not available. This
    is especially important for developing countries, where data is often scarce.
    Second, synthetic data can be used to test machine learning models before deploying
    them on real data. This is important for ensuring that models work as intended
    and won’t compromise the real data. Finally, synthetic data can be used to protect
    the privacy of real data by generating data that is similar to real data but does
    not contain any personal information.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，合成数据可以以多种方式用于改进机器学习模型并保护真实数据的隐私。首先，当没有真实数据可用时，可以使用合成数据来训练机器学习模型。这对于数据稀缺的发展中国家尤为重要。其次，可以在将机器学习模型部署到真实数据之前使用合成数据对其进行测试。这对于确保模型按预期工作且不会损害真实数据至关重要。最后，通过生成与真实数据相似但不包含任何个人信息的数据，合成数据可以用于保护真实数据的隐私。
- en: Synthetic data also provides more control than real data. Actual data comes
    from many different sources, which can result in datasets so large and diverse
    that they become unwieldy. Because synthetic data is created using a model whose
    data is generated for a specific purpose, it will not be randomly scattered. In
    some cases, synthetic data may even be of a higher quality than real data. Actual
    data may need to be over-processed when necessary, and too much data may be processed
    when necessary*.* These actions can reduce the quality of the data. Synthetic
    data, on the other hand, can be of higher quality, thanks to the model used to
    generate the data.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据也比真实数据提供了更多的控制。实际数据来自许多不同的来源，这可能导致数据集变得庞大且多样化，以至于难以处理。由于合成数据是使用为特定目的生成数据的模型创建的，因此它不会随机散布。在某些情况下，合成数据甚至可能比真实数据的质量更高。实际数据在必要时可能需要过度处理，而过多数据在必要时可能需要处理。这些操作可能会降低数据质量。另一方面，由于用于生成数据的模型，合成数据可以具有更高的质量。
- en: Overall, synthetic data has many advantages over real data. Synthetic data is
    more controlled, of higher quality, and can be generated in the desired quantities.
    These factors make synthetic data a valuable tool for many applications. A final
    reason why synthetic data is important is that it can be used to generate data
    for research purposes, allowing researchers to study data that is not biased or
    otherwise not representative of the real data.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，合成数据在真实数据之上具有许多优势。合成数据更易于控制，质量更高，并且可以生成所需数量的数据。这些因素使合成数据成为许多应用的宝贵工具。合成数据之所以重要还有一个原因，那就是它可以用于生成用于研究目的的数据，使研究人员能够研究那些没有偏见或不能代表真实数据的数据。
- en: Now let’s explain the importance of synthetic data for data science and artificial
    intelligence.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们解释合成数据对于数据科学和人工智能的重要性。
- en: Synthetic Data for Data Science and Artificial Intelligence
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 合成数据为数据科学和人工智能提供比真实数据更多的控制。实际数据来自许多不同的来源，这可能导致数据集变得庞大且多样化，以至于难以处理。由于合成数据是使用为特定目的生成数据的模型创建的，因此它不会随机散布。在某些情况下，合成数据甚至可能比真实数据的质量更高。实际数据在必要时可能需要过度处理，而过多数据在必要时可能需要处理。这些操作可能会降低数据质量。另一方面，由于用于生成数据的模型，合成数据可以具有更高的质量。
- en: The use of synthetic data is not a new concept. In the early days of data science
    and AI, synthetic data was used to train machine learning models. However, synthetic
    data of the past was often low-quality and not realistic enough to be useful for
    training today’s more sophisticated AI models.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 使用合成数据并不是一个新概念。在数据科学和人工智能的早期阶段，合成数据被用于训练机器学习模型。然而，过去的合成数据通常质量较低，不够真实，以至于无法用于训练今天的更复杂的AI模型。
- en: Recent advances in data generation techniques, such as *Generative Adversarial
    Networks* (GANs), have made it possible to generate synthetic data that is virtually
    indistinguishable from real-world data. This high-quality synthetic data is often
    referred to as “*realistic synthetic data*”.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 数据生成技术（如*生成对抗网络*（GANs））的最近进展使得生成与真实世界数据几乎无法区分的合成数据成为可能。这种高质量的合成数据通常被称为“*现实合成数据*”。
- en: The use of realistic synthetic data has the potential to transform the data
    science and AI fields. Realistic synthetic data can be used to train machine learning
    models without the need for real-world data. This is especially beneficial in
    cases where real-world data is scarce, expensive, or difficult to obtain.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现实合成数据的使用有可能改变数据科学和人工智能领域。可以使用现实合成数据来训练机器学习模型，而无需真实世界数据。这在真实世界数据稀缺、昂贵或难以获取的情况下特别有益。
- en: In addition, realistic synthetic data can be used to create “virtual environments”
    for testing and experimentation. These virtual environments can be used to test
    machine learning models in a safe and controlled manner, without the need for
    real-world data.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，可以使用现实合成数据来创建“虚拟环境”进行测试和实验。这些虚拟环境可以用于以安全和可控的方式测试机器学习模型，无需真实世界数据。
- en: For example, a computer algorithm might be used to generate realistic-looking
    images of people or objects. This could be used to train a machine learning system
    to better recognize these objects in real-world images. Alternatively, synthetic
    data could be used instead of real-world data if the latter is not available or
    is too expensive to obtain.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，可以使用计算机算法生成看起来逼真的图像或物体。这可以用来训练机器学习系统，使其在真实世界图像中更好地识别这些物体。如果后者不可用或获取成本过高，可以使用合成数据代替真实世界数据。
- en: Overall, the use of synthetic data is a promising new trend in data science
    and AI. The ability to generate high-quality synthetic data is opening new possibilities
    for training and experimentation. For example, a synthetic data set could be created
    that contains 6000 words, instead of the usual 2000\. This would allow the AI
    system to learn from a larger and more diverse data set, which would in turn improve
    its performance on real-world data. In the future, synthetic data is likely to
    play an increasingly important role in the data science and AI fields.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，合成数据在数据科学和人工智能领域的应用是一个有希望的新趋势。生成高质量合成数据的能力为训练和实验开辟了新的可能性。例如，可以创建包含6000个单词的合成数据集，而不是通常的2000个单词。这将使人工智能系统能够从更大、更多样化的数据集中学习，从而提高其在真实世界数据上的性能。在未来，合成数据可能在数据科学和人工智能领域发挥越来越重要的作用。
- en: Let us now consider accuracy problems in terms of synthetic data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们从合成数据的角度来考虑准确性问题。
- en: Accuracy Problems
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准确性问题
- en: 'Supervised learning algorithms are trained with labeled data. In this method,
    the data is commonly named “*ground truth*”, and the test data is called “*holdout
    data*”. We have three types to compare accuracies across algorithms [[2](#Par002)]:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 监督学习算法使用标记数据进行训练。在此方法中，数据通常被称为“*地面真实数据*”，而测试数据被称为“*保留数据*”。我们有三种类型来比较算法之间的准确性
    [[2](#Par002)]：
- en: 'Estimator score method: An estimator is a number that is used to estimate,
    or guess, the value of something. The score method is a way to decide how good
    an estimator is by analyzing how close the estimator’s guesses are to the actual
    value.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 估计量评分方法：估计量是一个用于估计或猜测某物价值的数字。评分方法是一种通过分析估计量的猜测与实际值之间的接近程度来决定估计量好坏的方法。
- en: Scoring parameter: Cross-validation is a model-evaluation technique that relies
    on an internal scoring strategy.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评分参数：交叉验证是一种依赖于内部评分策略的模型评估技术。
- en: 'Metric functions: The sklearn.metrics module provides functions for assessing
    prediction error for specific purposes.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 度量函数：sklearn.metrics模块提供了用于评估特定目的预测错误的函数。
- en: It’s important to acknowledge that the accuracy of synthetic data can be problematic
    for several reasons. First, the data may be generated by a process that is not
    representative of the real-world process that the data is meant to represent.
    This can lead to inaccuracies in the synthetic data that may not be present in
    real-world data. Second, the data may be generated with a specific goal in mind,
    such as training a machine learning algorithm, that does not match the goal of
    the data’s user of the synthetic data. This can also lead to inaccuracies in the
    synthetic data. Finally, synthetic data may be generated using a stochastic process,
    which can introduce randomness into the data that may not be present in real-world
    data. This randomness can also lead to inaccuracies in the synthetic data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要承认，合成数据的准确性可能因几个原因而存在问题。首先，数据可能是由一个不代表数据旨在表示的真实世界过程的过程生成的。这可能导致合成数据中的不准确，而在真实世界数据中可能不存在。其次，数据可能是为了特定的目标而生成的，例如训练机器学习算法，这与合成数据用户的实际目标不匹配。这也会导致合成数据中的不准确。最后，合成数据可能是由一个随机过程生成的，这可能会在数据中引入随机性，而在真实世界数据中可能不存在。这种随机性也可能导致合成数据的准确性问题。
- en: One way to overcome potential issues with accuracy in machine learning is to
    use synthetic data. This can be done by automatically tagging and preparing data
    for machine learning algorithms, which cuts down on the time and resources needed
    to create a training dataset. This also creates a more consistent dataset that
    is less likely to contain errors. Another way to improve accuracy in machine learning
    is to use a larger training dataset. This will typically result in better performance
    from the machine learning algorithm.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 克服机器学习中潜在精度问题的方法之一是使用合成数据。这可以通过自动标记和准备数据以供机器学习算法使用来实现，从而减少了创建训练数据集所需的时间和资源。这还创建了一个更一致的、不太可能包含错误的数据集。提高机器学习精度的另一种方法是使用更大的训练数据集。这通常会导致机器学习算法的性能更好。
- en: Working on the recognition and classification of aircraft from satellite photos,
    the Airbus and OneView companies, in their studies on data for machine learning,
    achieved accuracy of 88% versus 82% with the simulated dataset of OneView company, compared
    to data consisting of only of real data. When real data and synthetic data are
    used in a mixed way, an accuracy of ~ 90% is obtained, and this number represents
    an 8% improvement over real-only real data [[3](#Par003)]. This improved accuracy
    is due to the increased variety of data that is available when both real and simulated
    data are used. The increased variety of data allows the machine learning algorithm to
    better learn the underlying patterns of the data. This improved accuracy is significant
    and can lead to better decision-making in a variety of applications.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在卫星照片中从事飞机识别和分类工作的空中客车公司和OneView公司，在他们的机器学习数据研究中，与仅由真实数据组成的数据相比，使用OneView公司的模拟数据集实现了88%的准确率，而真实数据集的准确率为82%。当以混合方式使用真实数据和合成数据时，准确率达到了约90%，这个数字比仅使用真实数据的准确率提高了8%
    [[3](#Par003)]。这种提高的准确率归因于当使用真实和模拟数据时，可用的数据种类增加。数据的多样性增加使得机器学习算法能够更好地学习数据的潜在模式。这种提高的准确率具有重要意义，并可能导致各种应用中的决策更加明智。
- en: Now let’s examine the life cycle of data in terms of synthetic data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们从合成数据的角度来考察数据生命周期。
- en: The Lifecycle of Data
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据的生命周期
- en: Before leveraging the power of synthetic data, it’s important to understand
    the lifecycle of data. First, it can help organizations to better manage their
    data; by understanding the stages that data goes through, organizations can more
    effectively control how data is used and prevent unauthorized access. Additionally,
    the data lifecycle can help organizations ensure that their data is of high quality.
    Finally, the data lifecycle can help organizations plan for the eventual destruction
    of data; by understanding when data is no longer needed, organizations can ensure
    that they do not keep data longer than necessary, which can both save space and
    reduce costs.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在利用合成数据的力量之前，了解数据生命周期非常重要。首先，它可以帮助组织更好地管理他们的数据；通过了解数据经历的各个阶段，组织可以更有效地控制数据的使用方式，并防止未经授权的访问。此外，数据生命周期可以帮助组织确保他们的数据质量高。最后，数据生命周期可以帮助组织规划数据的最终销毁；通过了解何时数据不再需要，组织可以确保他们不会保留数据超过必要的时间，这既可以节省空间，也可以降低成本。
- en: The data lifecycle is the process of managing data from its creation to its
    eventual disposal. Figure [1-1](#Fig1) shows the five main phases of the data
    lifecycle.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 数据生命周期是指从创建到最终销毁管理数据的过程。图 [1-1](#Fig1) 展示了数据生命周期的五个主要阶段。
- en: '![](../images/534235_1_En_1_Chapter/534235_1_En_1_Fig1_HTML.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图 1-1](../images/534235_1_En_1_Chapter/534235_1_En_1_Fig1_HTML.png)'
- en: A diagrammatic illustration of the lifecycle of data includes data creation,
    data entry and storage, data processing, data output, and data disposal.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 数据生命周期的图示包括数据创建、数据录入和存储、数据处理、数据输出和数据销毁。
- en: Figure 1-1
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-1
- en: Data lifecycle
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 数据生命周期
- en: In the context of synthetic data, the data life cycle refers to the process
    of generating, storing, manipulating, and outputting synthetic data. This process
    is typically carried out by computers and involves the use of algorithms and rules
    to generate data that resembles real-world data.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在合成数据的情况下，数据生命周期指的是生成、存储、操作和输出合成数据的过程。这个过程通常由计算机执行，并涉及使用算法和规则生成类似于现实世界数据的资料。
- en: 'Following are the five stages of the data lifecycle:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是数据生命周期的五个阶段：
- en: '**Data creation: **The first stage of the data lifecycle is data creation.
    This is the stage at which synthetic data is first generated, either through direct
    input or through the capture of information from an external source.'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据创建：** 数据生命周期的第一阶段是数据创建。这是合成数据首次生成阶段，无论是通过直接输入还是通过从外部来源捕获信息。'
- en: '**Data entry and storage:** This stage involves the entry of synthetic data
    into a computer system and its storage in a database. Data entry and storage typically
    involve the use of algorithms or rules to generate data that resembles real-world
    data.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据录入和存储：** 此阶段涉及将合成数据录入计算机系统并在数据库中存储。数据录入和存储通常涉及使用算法或规则生成类似于现实世界数据的资料。'
- en: '**Data processing:** This stage covers the manipulation of synthetic data within
    the computer system, to convert it into a format that is more useful format for
    users. This may involve the use of algorithms and the application of rules and
    filters. Data processing typically involves the use of algorithms or rules to
    generate data that resembles real-world data.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据处理：** 此阶段涉及在计算机系统中对合成数据进行操作，将其转换为对用户更有用的格式。这可能包括使用算法以及应用规则和过滤器。数据处理通常涉及使用算法或规则生成类似于现实世界数据的资料。'
- en: '**Data output and dissemination:** This stage is the process of generating
    synthetic data from a computer system and making it available to users. This may
    involve the generation of reports, the creation of graphs and charts, or the output
    of data in a format that can be imported into another system.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据输出和传播：** 此阶段是生成计算机系统中的合成数据并将其提供给用户的过程。这可能包括生成报告、创建图表或以可导入到另一个系统的格式输出数据。'
- en: '**Data disposal:** The final stage of the data lifecycle is data disposal.
    This stage covers the disposal of synthetic data that is no longer needed. This
    may involve the deletion of data from a database or the physical destruction of
    storage media. Data disposal typically involves the use of algorithms or rules
    to generate.'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据销毁：** 数据生命周期的最终阶段是数据销毁。此阶段涉及不再需要的合成数据的销毁。这可能包括从数据库中删除数据或物理销毁存储介质。数据销毁通常涉及使用算法或规则生成。'
- en: Reinforcement learning algorithms are used to learn how to do things by interacting
    with an environment. However, these algorithms can be inefficient, meaning they
    need a lot of interactions to learn well. To address this issue, some people are
    using external sources of knowledge, such as data from demonstrations or observations.
    This data can come from experts, real-world demonstrations, simulations, or synthetic
    demonstrations.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习算法通过与环境交互来学习如何做事。然而，这些算法可能效率低下，这意味着它们需要大量的交互才能学好。为了解决这个问题，一些人正在使用外部知识来源，例如来自演示或观察的数据。这些数据可以来自专家、现实世界的演示、模拟或合成演示。
- en: 'Researchers at Google and DeepMind think that datasets also have a lifecycle and
    they summarize the lifecycle of datasets in three stages: Producing the data,
    consuming the data, and sharing the data [[4](#Par004)].'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌和DeepMind的研究人员认为数据集也有生命周期，他们将数据集的生命周期总结为三个阶段：产生数据、消耗数据和共享数据 [[4](#Par004)]。
- en: In the production data phase, users record their interactions with the environment
    and provide datasets. At this stage, users add additional information to the data
    automatically or manually labeling or filtering the data.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在生产数据阶段，用户记录他们与环境之间的交互并提供数据集。在这个阶段，用户会自动或手动地对数据进行标记或过滤，以添加额外的信息。
- en: In the consuming the data phase, researchers analyze and visualize datasets
    or use them to train algorithms for machine learning purposes.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据消费阶段，研究人员分析并可视化数据集，或使用它们来训练机器学习的算法。
- en: In the sharing the data stage, researchers often share their data with other
    researchers to help with their reserach. When researchers share data, it makes
    it easier for other researchers to run and validate new algorithms. However, the
    researchers who produced the data still own it and should be given credit for
    their work.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据共享阶段，研究人员经常与其他研究人员分享他们的数据，以帮助他们进行研究。当研究人员分享数据时，它使得其他研究人员运行和验证新算法变得更加容易。然而，生成数据的研究人员仍然拥有所有权，并且应该得到他们工作的认可。
- en: Let’s now consider data collection and privacy issues in terms of synthetic
    data.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们从合成数据的角度考虑数据收集和隐私问题。
- en: Data Collection versus Privacy
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据收集与隐私
- en: Data can be collected in many ways. For example, data from radar, LIDAR, and
    the camera systems of driverless cars can be taken and fused into a format usable
    for decision making. Considering that fusion data is also virtual data, it is
    necessary to think in detail about the importance of real and virtual data. So,
    since real data can be converted into virtual data, and used or augmented data
    can be used together with real data in machine learning, these two data types
    are important for us. This is sometimes referred to as the **Ensemble Metho****d**.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可以通过多种方式收集。例如，可以从雷达、激光雷达和自动驾驶汽车的摄像头系统中收集数据，并将其融合成可用于决策的格式。考虑到融合数据也是虚拟数据，有必要详细考虑真实数据和虚拟数据的重要性。因此，由于真实数据可以转换为虚拟数据，并且可用于或增强的数据可以与真实数据一起用于机器学习，这两种数据类型对我们来说都很重要。这有时被称为**集成方法**。
- en: In the Ensemble Method, a few basic models can be combined to create an optimal
    predictive model; Why can’t the data be fused, and more qualified data can be
    obtained?
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在集成方法中，可以将几个基本模型结合起来创建一个最佳的预测模型；为什么不能融合数据，从而获得更多合格的数据呢？
- en: Labeling the data is tedious and costly, as machine learning models require
    large and diverse data to produce good results. Therefore creating synthetic data
    by transforming real data using with data augmentation techniques or directly
    generating synthetic data and using it as an alternative to real data can reduce
    transaction costs. According to Gartner, by 2030, there will be more synthetic
    data than real data in AI models.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 标记数据既繁琐又昂贵，因为机器学习模型需要大量且多样化的数据才能产生良好的结果。因此，通过使用数据增强技术将真实数据转换为合成数据，或者直接生成合成数据并将其作为真实数据的替代品，可以降低交易成本。根据Gartner的预测，到2030年，在AI模型中，合成数据将比真实数据更多。
- en: Another issue that synthetic data can help overcome is that of data privacy.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个问题，合成数据可以帮助克服的是数据隐私问题。
- en: Data Privacy and Synthetic Data
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据隐私与合成数据
- en: Today, many institutions and organizations use large amounts of data to forecast,
    create policies, plan, and achieve higher profit margins. By using this data,
    they can better understand the world around them and make more informed decisions.
    However, due to privacy restrictions and guarantees given to personal data, only the
    personnel of the institutions have full access to such data. Anonymization techniques
    are used to prevent the identities of data subjects from being revealed. Sure,
    data collectors can maintain data privacy by using aggregation, recoding, record
    exchange, suppression of sensitive values, and random error insertion, data collectors
    can maintain data privacy. However, advances in computer and cloud technologies
    are likely to make such measures insufficient to maintain data privacy. We’ll explore
    some examples in the next section.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，许多机构和组织使用大量数据来预测、制定政策、规划和实现更高的利润率。通过使用这些数据，他们可以更好地理解他们周围的世界，并做出更明智的决策。然而，由于隐私限制和对个人数据的保证，只有机构的员工才能完全访问这些数据。匿名化技术被用来防止数据主体的身份被揭露。当然，数据收集者可以通过使用汇总、重新编码、记录交换、敏感值抑制和随机错误插入来维护数据隐私。然而，计算机和云计算技术的进步可能会使这些措施不足以维护数据隐私。我们将在下一节中探讨一些例子。
- en: In today’s world, with the advances in information technology, patient data,
    and driver the data, of those using vehicles the data obtained by research companies
    from public opinion surveys have reached enormous amounts. However, most of the
    time, when this data is used to find new solutions, the concept of “individual
    privacy” comes up. This problem is overcome by anonymizing the data, which is
    the process of modifying the data to eliminate any information that could lead
    to privacy intrusion. Anonymizing data is important to protect people’s privacy,
    as even without personal identifiers, the remaining attributes in the data may
    still be used to re-identify an individual. In the simplest form of data anonymization,
    all personal identifiers are removed. However, it has been shown that this is
    not enough to protect people’s privacy. Therefore, it is important to fully anonymize
    data possible to protect people’s privacy rights.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天这个信息技术不断进步的世界里，患者数据、驾驶员数据以及那些使用车辆的人的数据，以及研究公司从民意调查中获得的数据已经达到了巨大的数量。然而，大多数时候，当这些数据被用来寻找新的解决方案时，就会涉及到“个人隐私”的概念。通过匿名化数据来解决这个问题，这是一个修改数据以消除可能导致隐私侵犯的任何信息的过程。匿名化数据对于保护人们的隐私至关重要，因为即使没有个人标识符，数据中剩余的属性仍然可能被用来重新识别个人。在数据匿名化的最简单形式中，所有个人标识符都被移除。然而，已经证明这并不足以保护人们的隐私。因此，为了保护人们的隐私权，重要的是尽可能全面地匿名化数据。
- en: Most people think that privacy is protected by anonymization. This is when there
    is no name, surname, or any sign to indicate identity in the database. However,
    this is not always accurate. This means that if you have an account on both Twitter
    and Flickr, there’s a good chance that someone could identify you from the anonymous
    Twitter graph. However, the error rate is only 12%, so the chances are still pretty
    good that you won’t be identified [[14](#Par0014)]. Even though the chances of
    being identified are relatively low, it is still important to be aware of the
    potential risks of sharing personal information online. Anonymity is not a guarantee
    of privacy, and even seemingly innocuous information can identify individuals
    in certain cases. Therefore, exercising caution is required when sharing personal
    information online, even if it is ostensibly anonymous.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数人认为隐私是通过匿名化来保护的。这意味着在数据库中没有姓名、姓氏或任何标识身份的标志。然而，这并不总是准确的。这意味着如果你同时在Twitter和Flickr上都有账户，有人有可能从匿名的Twitter图中识别出你。然而，错误率仅为12%，所以你被识别的可能性仍然相当低
    [[14](#Par0014)]。尽管被识别的可能性相对较低，但仍然重要的是要意识到在线分享个人信息可能存在的潜在风险。匿名性并不能保证隐私，而且在某些情况下，看似无害的信息也可能识别出个人。因此，在在线分享个人信息时，即使表面上看似匿名，也需要谨慎行事。
- en: Anonymization and labeling are two primary techniques in AI applications. However,
    both techniques have their own set of problems. Anonymization can lead to the
    loss of vital information, while labeling can introduce bias and be costly to
    implement. In addition, hand-labeled data might not be high quality because it
    is often mislabeled. To overcome these problems, researchers have proposed various
    methods, such as semi-supervised learning and active learning. However, these
    methods are still not perfect, and further research is needed to improve them.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 匿名化和标签化是人工智能应用中的两种主要技术。然而，这两种技术各自都存在一些问题。匿名化可能会导致关键信息的丢失，而标签化可能会引入偏差，并且实施成本高昂。此外，手工标注的数据可能质量不高，因为它们经常被错误标注。为了克服这些问题，研究人员提出了各种方法，例如半监督学习和主动学习。然而，这些方法仍然不完美，需要进一步的研究来改进它们。
- en: The Bottom Line
  id: totrans-65
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 核心观点
- en: The collection of more data with increasing data sources makes it necessary
    for businesses to take security measures against information attacks. In some
    cases, businesses need more data than is available to innovate in certain areas.
    In some cases, more data may be necessary due to a lack of practical research
    or high costs of data collection. Many businesses generate data programmatically
    in the real world to obtain otherwise unattainable information. The use of synthetic
    data is becoming increasingly popular as businesses attempt to collect more data
    and test different scenarios. Synthetic data is created by computer programs and
    is designed to mimic real-world data. This allows businesses to gather data more
    efficiently and to test various scenarios to see what may happen in the real world.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数据来源的增加，收集更多数据使得企业有必要采取措施防范信息攻击。在某些情况下，企业需要比可用的数据更多的数据来在某些领域进行创新。在某些情况下，可能需要更多数据，这可能是由于缺乏实际研究或数据收集的高成本。许多企业在现实世界中通过编程生成数据，以获得其他方式无法获得的信息。随着企业试图收集更多数据并测试不同场景，合成数据的使用变得越来越流行。合成数据是由计算机程序创建的，旨在模仿真实世界数据。这使得企业能够更有效地收集数据，并测试各种场景，以了解在现实世界中可能发生什么。
- en: The world is becoming more data-centric, so businesses are starting to use computer
    programs to create data similar to data gathered from the real world. This is
    useful because it facilitates data collection and helps businesses test different
    scenarios to see what will happen in the real world.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 世界正变得越来越以数据为中心，因此企业开始使用计算机程序创建类似于从真实世界收集的数据。这很有用，因为它促进了数据收集，并帮助企业测试不同的场景，以了解在真实世界中会发生什么。
- en: Now let’s examine synthetic data and data quality.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来探讨合成数据与数据质量。
- en: Synthetic Data and Data Quality
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据与数据质量
- en: When working on AI projects, it is important to focus on data quality. It all
    starts there; if data quality is poor, the AI system will be fatally compromised.
    Data cascades can occur when AI practitioners apply conventional AI practices
    that don’t value data quality. Most AI practitioners (92%) have reported experiencing
    one or more data cascades. This often happens because they applied conventional
    AI practices that didn’t value data quality. For this reason, it is important
    to use high-quality data when training deep learning networks [[5](#Par005)].
    Andrew Ng has said that “Data is food for AI” and that the issue of data quality
    should be focused on data more than the model/algorithm [[6](#Par006)]. The use
    of synthetic data can help to address the issue of data quality in AI projects.
    This is because synthetic data can be generated to be of high quality, and it
    can be generated to be representative of the real-world data that the AI system
    will be used on. This means that the AI system trained on synthetic data will
    be more likely to generalize well to the real world.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行人工智能项目时，关注数据质量至关重要。一切从这里开始；如果数据质量差，人工智能系统将受到致命的影响。当人工智能从业者应用不重视数据质量的常规人工智能实践时，可能会发生数据级联。92%的大多数人工智能从业者报告称经历过一个或多个数据级联。这通常是因为他们应用了不重视数据质量的常规人工智能实践。因此，在训练深度学习网络时使用高质量数据非常重要
    [[5](#Par005)]。安德鲁·吴（Andrew Ng）曾说过，“数据是人工智能的食物”，并且数据质量问题应该比模型/算法更关注数据 [[6](#Par006)]。在人工智能项目中使用合成数据可以帮助解决数据质量问题。这是因为可以生成高质量的合成数据，并且可以生成代表人工智能系统将要使用的真实世界数据的合成数据。这意味着在合成数据上训练的人工智能系统更有可能很好地推广到真实世界。
- en: AI technologies in particular use synthetic data intensively. Just a few examples
    include medicine, where synthetic data is used extensively to test specific conditions
    and cases for which real data is not available; self-driving cars, such as the
    ones used by Uber and Google, are trained using synthetic data; fraud detection
    and protection in the financial industry is facilitated using synthetic data.
    Synthetic data gives data professionals access to centrally stored data while
    maintaining the privacy of the data. In addition, synthetic data reproduce important
    features of real data without revealing its true meaning and protects confidentiality.
    In research departments, on the other hand, synthetic data is used to develop
    and deliver innovative products for which the necessary data may not be available
    [[7](#Par007)]. Overall, the use of synthetic data is extremely beneficial as
    it allows for the testing of new products and services while maintaining the privacy
    of the original data. Synthetic data is also incredibly versatile and can be used
    in a variety of different industries and applications. In the future, the use
    of synthetic data is likely to become even more widespread as the benefits of
    using it become more widely known.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是人工智能技术，对合成数据的依赖性很强。仅举几个例子，包括在医学领域，合成数据被广泛用于测试那些没有真实数据可用的特定条件和案例；自动驾驶汽车，如Uber和Google使用的汽车，就是用合成数据进行训练的；在金融行业，合成数据有助于促进欺诈检测和保护。合成数据使数据专业人员能够访问集中存储的数据，同时保持数据的隐私。此外，合成数据复制了真实数据的重要特征，而不透露其真实含义，并保护了机密性。另一方面，在研究部门，合成数据用于开发和交付可能无法获得必要数据的创新产品[[7](#Par007)]。总的来说，合成数据的使用极为有益，因为它允许在保持原始数据隐私的同时测试新产品和服务。合成数据也非常灵活，可以用于各种不同的行业和应用。在未来，随着合成数据的好处被更多人了解，其使用可能会变得更加普遍。
- en: Let us now examine some of synthetic data applications.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来探讨一些合成数据的应用。
- en: Aplications of Synthetic Data
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合成数据的应用
- en: Synthetic data is often used in financial services, manufacturing, healthcare,
    automotive, robotics, security, social media, and marketing.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据常用于金融服务、制造业、医疗保健、汽车、机器人、安全、社交媒体和营销等领域。
- en: Let’s first quickly explore how synthetic data cen be used in finance.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先快速了解一下合成数据在金融领域的应用。
- en: Financial Services
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 金融服务业
- en: The use of synthetic data is becoming increasingly important in financial services
    as the industry moves towards more data-driven decision-making. Synthetic data
    can be used to supplement or replace traditional data sources, providing a more
    complete picture of the underlying risk.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 随着行业向更多数据驱动的决策转变，合成数据在金融服务中的使用变得越来越重要。合成数据可以用来补充或替代传统数据源，从而提供一个更全面的风险视图。
- en: Financial services is an industry that is highly regulated and subject to constant
    change. New rules and regulations are constantly being introduced, and the industry
    is constantly evolving. As a result, it can be difficult for financial institutions
    to keep up with the changes and ensure that their data is compliant.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 金融服务业是一个高度监管且不断变化的行业。新的规则和法规不断被引入，行业也在不断演变。因此，金融机构跟上变化并确保其数据合规可能会很困难。
- en: Synthetic data can be used to generate data that is compliant with the latest
    rules and regulations. This can help financial institutions avoid the costly fines
    and penalties that can be associated with non-compliance. In addition, synthetic
    data can be used to test new products and services before they are launched. This
    can help financial institutions avoid the costly mistakes that can be made when
    launching new products and services.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据可以生成符合最新规则和法规的数据。这有助于金融机构避免因不合规而产生的昂贵罚款和处罚。此外，合成数据可以在新产品和服务推出前进行测试。这有助于金融机构避免在推出新产品和服务时可能犯下的昂贵错误。
- en: Synthetic data can also help to improve the accuracy of risk models by providing
    a more complete picture of underlying risks. For example, consider a portfolio
    of loans. Traditional data sources may only provide information on the loan amount,
    interest rate, and term. However, synthetic data can provide additional information
    on the borrower’s credit score, employment history, and other factors that can
    impact the risk of default. This additional information can help to improve the
    accuracy of the risk model.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据还可以通过提供对潜在风险的更全面了解来帮助提高风险模型的准确性。例如，考虑一个贷款组合。传统数据源可能只提供关于贷款金额、利率和期限的信息。然而，合成数据可以提供关于借款人信用评分、就业历史以及其他可能影响违约风险的额外信息。这些额外信息可以帮助提高风险模型的准确性。
- en: Another key benefit of synthetic data is that it can provide a way to test and
    validate models before they are deployed in live environments. This is because
    synthetic data can be generated with known values for the inputs and outputs.
    This allows for the testing of models under a variety of different scenarios,
    which can help to identify any potential issues before the model is deployed in
    a live environment.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个合成数据的关键好处是，它提供了一种在模型部署到实际环境中之前测试和验证模型的方法。这是因为合成数据可以生成具有已知输入和输出值的值。这允许在多种不同场景下测试模型，有助于在模型部署到实际环境中之前识别任何潜在问题。
- en: 'Synthetic data can be used in financial services in a variety of other ways.
    For example, it can be used to:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据在金融服务中的应用方式有很多。例如，它可以用来：
- en: '**Generate realistic scenarios for stress testing and risk management:** Generating
    synthetic data can help financial institutions to identify potential risks and
    to develop plans for dealing with them. This can be used to generate realistic
    scenarios for stress testing and risk management purposes. Doing so can help to
    improve the resilience of the financial system.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成用于压力测试和风险管理的真实场景：** 生成合成数据可以帮助金融机构识别潜在风险，并制定应对这些风险的计划。这可以用于生成用于压力测试和风险管理的真实场景。这样做可以帮助提高金融系统的弹性。'
- en: '**Train machine learning models:** Synthetic data can help train machine learning
    models for tasks such as fraud detection and credit scoring. This can automate
    processes for financial institutions and make them more efficient.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练机器学习模型：** 合成数据可以帮助训练机器学习模型，用于诸如欺诈检测和信用评分等任务。这可以自动化金融机构的流程，并使它们更加高效。'
- en: '**Generate synthetic transactions:** Synthetic data can be used to generate
    synthetic transactions, which can help financial institutions test new products
    and services, or simulate market conditions.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成合成交易：** 合成数据可以用来生成合成交易，这有助于金融机构测试新产品和服务，或模拟市场条件。'
- en: '**Generate synthetic customer data:** Financial institutions can use synthetic
    data to generate synthetic customer data. This can help them to test new customer
    acquisition strategies or to evaluate customer service levels.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成合成客户数据：** 金融机构可以使用合成数据来生成合成客户数据。这可以帮助他们测试新的客户获取策略或评估客户服务水平。'
- en: '**Generate synthetic financial data:** Synthetic data can be used to generate
    synthetic financial data. This can help financial institutions to test new financial
    products or to evaluate the impact of new regulations.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成合成金融数据：** 合成数据可以用来生成合成金融数据。这有助于金融机构测试新的金融产品或评估新法规的影响。'
- en: Finally, synthetic data can help to reduce the cost of data acquisition and
    storage. This is because synthetic data can be generated on-demand, as needed.
    This eliminates the need to store large amounts of data, which can save on both
    the cost of data acquisition and storage.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，合成数据可以帮助降低数据获取和存储的成本。这是因为合成数据可以根据需要按需生成。这消除了存储大量数据的需要，从而可以节省数据获取和存储的成本。
- en: Now, let’s look at how synthetic data can be used in the manufacturing field.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看合成数据在制造业中的应用。
- en: Manufacturing
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 制造业
- en: In the world of manufacturing, data is used to help inform decision-makers about
    various aspects of the manufacturing process, from production line efficiency
    to quality control. In some cases, this data is easy to come by- for example,
    data on production line outputs can be gathered through sensors and other monitoring
    devices. However, in other cases, data can be much more difficult to obtain. For
    example, data on the performance of individual components within a production
    line may be hard to come by or may be prohibitively expensive to gather. In these
    cases, synthetic data can be used to fill in the gaps.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在制造领域，数据用于帮助决策者了解制造过程的各个方面，从生产线效率到质量控制。在某些情况下，这些数据很容易获得——例如，通过传感器和其他监控设备可以收集到生产线输出的数据。然而，在其他情况下，数据可能更难获得，或者收集数据可能过于昂贵。在这些情况下，合成数据可以用来填补这些空白。
- en: In many manufacturing settings, it is difficult or impossible to obtain real-world
    data that can be used to train models. This is often due to the proprietary nature
    of manufacturing processes, which can make it difficult to obtain data from inside
    a factory. Additionally, the data collected in a manufacturing setting may be
    too noisy or unrepresentative to be useful for training models.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多制造环境中，很难或无法获得可用于训练模型的真实世界数据。这通常是由于制造过程的专有性质，这使得从工厂内部获取数据变得困难。此外，在制造环境中收集的数据可能太嘈杂或缺乏代表性，无法用于训练模型。
- en: To address these issues, synthetic data can be used to train models for manufacturing
    applications. However, it is important to consider both the advantages and disadvantages
    of using synthetic data before deciding whether it is the right choice for a particular
    application.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些问题，合成数据可以用来为制造应用训练模型。然而，在决定是否为特定应用选择合成数据之前，考虑使用合成数据的优缺点是很重要的。
- en: Synthetic data can be employed in manufacturing in several ways. First, synthetic
    data can be used to train machine learning models that can be used to automate
    various tasks in the manufacturing process. This can improve the efficiency of
    the manufacturing process and help to reduce costs. Second, synthetic data can
    be used to test and validate manufacturing processes and equipment. This can help
    to ensure that the manufacturing process is running smoothly, and that the equipment
    is operating correctly. Third, synthetic data can be used to monitor the manufacturing
    process and to identify potential problems. This can help to improve the quality
    of the products being produced and to avoid costly manufacturing defects.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据可以在制造中用于多种方式。首先，合成数据可以用来训练机器学习模型，这些模型可以用于自动化制造过程中的各种任务。这可以提高制造过程的效率并有助于降低成本。其次，合成数据可以用来测试和验证制造过程和设备。这有助于确保制造过程运行顺畅，设备操作正确。第三，合成数据可以用来监控制造过程并识别潜在问题。这有助于提高正在生产的产品质量并避免昂贵的制造缺陷。
- en: Synthetic data can be used to improve the efficiency of data-driven models.
    This is because synthetic data can be generated much faster than real-world data.
    This is important because it is allowing manufacturers to train data-driven models
    faster and get them to market quicker.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据可以用来提高数据驱动模型的效率。这是因为合成数据可以比真实世界数据生成得更快。这对于制造商来说很重要，因为它允许他们更快地训练数据驱动模型并将它们推向市场。
- en: 'The use of synthetic data is widespread in the manufacturing industry. It helps
    companies to improve product quality, reduce manufacturing costs, and improve
    process efficiency. Some examples of the use of synthetic data in manufacturing
    are as follows:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据在制造业中的应用非常广泛。它帮助公司提高产品质量、降低制造成本并提高工艺效率。以下是一些在制造业中合成数据应用的例子：
- en: '**Quality Control**: Synthetic data can be used to create models that predict
    the likelihood of defects in products. This information can be used to improve
    quality control procedures.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量控制**：合成数据可以用来创建模型，预测产品缺陷的可能性。这些信息可用于改进质量控制程序。'
- en: '**Cost Reduction**: The use of synthetic data can help identify patterns in
    manufacturing processes that lead to increased costs. This information can be
    used to develop strategies for reducing costs, thereby reducing the overall cost
    of production.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本降低**：使用合成数据可以帮助识别导致成本增加的制造过程中的模式。这些信息可用于制定降低成本的战略，从而降低生产总成本。'
- en: '**Efficiency Improvement**: Synthetic data can be used to create models that
    predict the efficiency of manufacturing processes. This information can be used
    to improve process efficiency.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率提升**：可以使用合成数据创建模型，预测制造过程的效率。这些信息可以用来提高流程效率。'
- en: '**Product Development**: Synthetic data can help improve product development
    processes by predicting the performance of new products. In this way, it can be
    decided which products to monitor and how to develop them.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品开发**：合成数据可以通过预测新产品的性能来帮助改进产品开发流程。这样，可以决定哪些产品需要监控以及如何开发它们。'
- en: '**Production Planning**: Production planning can be done by using synthetic
    data to create models that predict the demand for products. In this way, businesses
    can improve their production planning by making better predictions about future
    demand.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产计划**：可以通过使用合成数据创建预测产品需求的模型来进行生产计划。这样，企业可以通过对未来需求的更好预测来改善其生产计划。'
- en: '**Maintenance**: Synthetic data can be used to create models that predict the
    probability of equipment failures. In this way, preventive measures can be taken,
    and maintenance processes can be improved by predicting when equipment will fail.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**维护**：可以使用合成数据创建模型，预测设备故障的概率。通过这种方式，可以采取预防措施，并通过预测设备何时会失效来改进维护流程。'
- en: Now, let’s quickly explore how synthetic data can be employed in the healthcare realm.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们快速探讨合成数据在医疗保健领域中的应用。
- en: Healthcare
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 医疗保健
- en: The most obvious benefit of utilizing synthetic data in healthcare is to protect
    the privacy of patients. By using synthetic data, healthcare organizations can
    create models and simulations that are based on real data but do not contain any
    actual patient information. This can be extremely helpful in situations where
    patient privacy is of paramount concern, such as when developing new treatments
    or testing new medical devices.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在医疗保健中利用合成数据的最明显好处是保护患者的隐私。通过使用合成数据，医疗保健机构可以创建基于真实数据但不含任何实际患者信息的模型和模拟。这在患者隐私至关重要的情况下非常有帮助，例如在开发新治疗方法或测试新医疗设备时。
- en: 'The use of synthetic data will evolve in line with the needs and requirements
    of health institutions. However, the following are some of the most common reasons why
    healthcare organizations might use synthetic data include:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据的使用将随着医疗机构的需求和要求而发展。然而，以下是一些医疗机构可能使用合成数据的最常见原因：
- en: 'Machine learning models: One of the most common reasons why healthcare organizations
    use synthetic data is to train machine learning models. This is because synthetic
    data can be generated in a controlled environment, which allows for more reliable
    results.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习模型：医疗保健机构使用合成数据最常见的原因之一是训练机器学习模型。这是因为合成数据可以在受控环境中生成，这允许获得更可靠的结果。
- en: 'Artificial intelligence: synthetic data can be used to identify patterns in
    patient data that may be indicative of a particular condition or disease. This
    can then be used to help diagnose patients more accurately and to also help predict
    how they are likely to respond to treatment. This is extremely important in terms
    of ensuring that patients receive the most effective care possible.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能：合成数据可以用来识别患者数据中的模式，这些模式可能表明特定的状况或疾病。这可以用来帮助更准确地诊断患者，并预测他们可能对治疗的反应。这对确保患者获得最有效的护理至关重要。
- en: 'Protect privacy: One of the biggest challenges in the healthcare industry is
    the reliable sharing of data. Health data is very important for doctors to diagnose
    and treat patients quickly. For this reason, many hospitals and health institutions
    attach great importance to patient data. Synthetic data help provide the best
    possible treatment. In addition, synthetic data is a technology that will help
    healthcare organizations share information while protecting personal privacy.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保护隐私：医疗保健行业最大的挑战之一是数据的可靠共享。健康数据对医生快速诊断和治疗患者至关重要。因此，许多医院和医疗机构非常重视患者数据。合成数据有助于提供最佳的治疗。此外，合成数据是一种可以帮助医疗保健机构在保护个人隐私的同时共享信息的技术。
- en: 'Treatments: Another common reason why healthcare organizations use synthetic
    data is to test new treatments. This is because synthetic data can be used to
    create realistic simulations of real-world conditions, which can help to identify
    potential side effects or issues with a new treatment before it is used on real
    patients.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 治疗：医疗保健机构使用合成数据的另一个常见原因是测试新的治疗方法。这是因为合成数据可以用来创建真实世界的条件模拟，这有助于在将新治疗方法用于真实患者之前识别潜在的副作用或问题。
- en: To help design new drugs and to test their efficacy.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帮助设计新药并测试其有效性。
- en: 'Improve patient care: Healthcare organizations can also use synthetic data
    to improve patient care. This is because synthetic data can be used to create
    realistic simulations of real-world conditions, which can help healthcare professionals
    to identify potential issues and make better-informed decisions about patient
    care.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高患者护理：医疗保健机构还可以使用合成数据来提高患者护理。这是因为合成数据可以用来创建真实世界的条件模拟，这有助于医疗保健专业人员识别潜在问题，并就患者护理做出更明智的决定。
- en: Reduce costs: Healthcare organizations can also use synthetic data to reduce
    cost. This is because synthetic data can be generated relatively cheaply, which
    can help to reduce the overall costs associated with real-world data collection
    and analysis.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低成本：医疗保健机构还可以使用合成数据来降低成本。这是因为合成数据可以相对便宜地生成，这有助于降低与真实世界数据收集和分析相关的整体成本。
- en: Several hospitals are now using synthetic data in the health sector to improve
    the quality of care that they can provide. This is being one in several different ways,
    but one of the most common is to use computer simulations. This allows for a more
    realistic representation of patients and their conditions, which can then be used
    to test out new treatments or procedures. This can be extremely beneficial in
    reducing the risk of complications and ensuring that patients receive the best
    possible care.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几家医院现在正在使用合成数据在医疗领域提高护理质量。这以多种不同的方式实现，但最常见的一种是使用计算机模拟。这允许更真实地表示患者及其状况，然后可以用来测试新的治疗方法或程序。这可以在降低并发症风险和确保患者获得最佳护理方面极为有益。
- en: Overall, the use of synthetic data in the health sector is extremely beneficial.
    It is helping to improve the quality of care that is being provided and is also
    helping to reduce the risk of complications. In addition, it is also helping to
    speed up the process of diagnosis and treatment.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，在医疗领域使用合成数据极为有益。它有助于提高所提供护理的质量，同时也有助于降低并发症的风险。此外，它还有助于加快诊断和治疗的过程。
- en: Now let’s look at how synthetic data can be used in the automotive industry field.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们看看合成数据在汽车行业中的应用。
- en: Automotive
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 汽车
- en: Another application of synthetic data in the automotive industry is autonomous
    driving. A large amount of data is needed to train an autonomous driving system.
    This data can be used to train a machine learning model that can then be used
    to make predictions about how the autonomous driving system should behave in different
    situations. However, real-world data is often scarce, expensive, and difficult
    to obtain.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个合成数据在汽车行业中的应用是自动驾驶。训练自动驾驶系统需要大量的数据。这些数据可以用来训练一个机器学习模型，然后可以用来预测自动驾驶系统在不同情况下应该如何表现。然而，真实世界的数据通常稀缺、昂贵且难以获得。
- en: Another important application of synthetic data in automotive is in safety-critical
    systems. To ensure the safety of a vehicle, it is important essential to be able
    to test the systems in a variety of scenarios. Synthetic data can be used to generated
    data for all the different scenarios that need to be tested. This is important
    because it allows for to provide more thorough testing of system and helps ensure
    the safety of the vehicle.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个合成数据在汽车行业中的重要作用应用是在安全关键系统中。为了确保车辆的安全，能够在各种场景下测试系统是非常重要的。合成数据可以用来生成所有需要测试的不同场景的数据。这很重要，因为它允许进行更彻底的系统测试，并有助于确保车辆的安全。
- en: Overall, synthetic data has to potential to be a valuable tool for the automotive
    industry. It can be used to speed up the development process and to generate large
    quantities of data. However, it is important to be aware of the challenges associated
    with synthetic data and to ensure that it is used in a way that maximizes its
    benefits.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，合成数据在汽车行业中具有成为宝贵工具的潜力。它可以用来加速开发过程并生成大量数据。然而，重要的是要意识到与合成数据相关的挑战，并确保以最大化其效益的方式使用它。
- en: There are a few reasons why automotive companies need synthetic data. The first
    has to do with the development of new technologies a large amount of data. In
    order to create and test new features or technologies, companies need a large
    amount of data. This data is used to train algorithms that will eventually be
    used in the product. However, collecting this data can be difficult, time-consuming,
    and expensive.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 汽车公司需要合成数据有几个原因。第一个与新技术的发展有关，需要大量数据。为了创建和测试新的功能或技术，公司需要大量数据。这些数据用于训练最终将在产品中使用的算法。然而，收集这些数据可能很困难、耗时且昂贵。
- en: Another reason automotive companies need synthetic data is for testing purposes. Before
    a new product is released, it needs to go through rigorous testing. This testing
    often includes putting the product through a range of different scenarios. However,
    it can be difficult to test every single scenario in the real world. This is where
    synthetic data comes in. It can be used to create realistic test scenarios that
    would be difficult or impossible to re-create in the real world.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个汽车公司需要合成数据的原因是用于测试目的。在推出新产品之前，它需要经过严格的测试。这种测试通常包括让产品经历一系列不同的场景。然而，在现实世界中测试每一个单独的场景可能很困难。这就是合成数据发挥作用的地方。它可以用来创建在现实世界中难以或无法重新创建的逼真的测试场景。
- en: Synthetic data can be used for marketing purposes. Automotive companies also
    often use data to create marketing materials such as ads or website content. However,
    this data can be difficult to obtain. Synthetic data can be used to create realistic marketing
    scenarios that can be used to test different marketing strategies.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据可以用于营销目的。汽车公司也经常使用数据来创建营销材料，如广告或网站内容。然而，这些数据可能难以获得。合成数据可以用来创建逼真的营销场景，这些场景可以用来测试不同的营销策略。
- en: In conclusion, synthetic data is needed in automotive industry for a variety
    of reasons. It can be used to create realistic test scenarios, train algorithms,
    and create marketing materials.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，合成数据在汽车行业中出于多种原因都是必需的。它可以用来创建逼真的测试场景、训练算法以及创建营销材料。
- en: Now let’s look at how synthetic data is used in the robotics field.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看合成数据在机器人领域的应用。
- en: Robotics
  id: totrans-126
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 机器人
- en: Robots are machines that can be programmed to do specific tasks. Sometimes these
    tasks are very simple, like moving a piece of paper from one place to another.
    Other times, the tasks are more complex, like moving around in the world and doing
    things that humans can do, like solving a Rubik’s Cube. Creating robots that can
    do complex tasks is a challenge because the robots need a lot of training data
    to behave like humans. This data can be generated by simulations, which is a way
    of creating a model of how the robot will behave.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人是可以编程以执行特定任务的机器。有时这些任务非常简单，比如将一张纸从一处移动到另一处。有时，任务更复杂，比如在世界中移动并做人类能做的事情，比如解决魔方。创建能够执行复杂任务的机器人是一个挑战，因为机器人需要大量训练数据来像人类一样行为。这些数据可以通过模拟生成，这是一种创建机器人行为模型的方法。
- en: There are several reasons why synthetic data is needed in robotics. The first
    is that real-world data is often scarce. This is especially true for data needed
    to train machine learning models, a key component of robotics. Synthetic data
    can be used to supplement real-world data and, in some cases, to replace them
    entirely. Second, real-world data is often noisy. This noise can come from a variety
    of sources, such as sensors, actuators, and the environment. Synthetic data can be
    used to generate noise-free data that can be helpful for training machine learning
    models. The third reason is that collecting real-world data is often expensive.
    This is especially true for data needed to train machine learning models. Synthetic
    data can be used to generate data that is much cheaper to collect. A fourth reason
    is that real-world data is often biased. This bias can come from a variety of
    sources, such as sensors, actuators, and the environment. Synthetic data can be
    used to generate bias-free data that can be helpful for training machine learning
    models. The fifth reason synthetic data is needed in robotics is that real-world
    data is often unrepresentative. This is especially true for data needed to train
    machine learning models. Synthetic data can be used to create data that better
    represents the real world, which can be helpful for training machine learning
    models.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器人领域需要合成数据有几个原因。首先，真实世界数据通常很稀缺。这尤其适用于训练机器学习模型所需的数据，而机器学习是机器人技术的一个关键组成部分。合成数据可以用来补充真实世界数据，在某些情况下甚至可以完全替代它们。其次，真实世界数据通常很嘈杂。这种噪声可能来自各种来源，如传感器、执行器和环境。合成数据可以用来生成无噪声数据，这有助于训练机器学习模型。第三个原因是收集真实世界数据通常成本高昂。这尤其适用于训练机器学习模型所需的数据。合成数据可以用来生成收集成本远低于真实世界数据的合成数据。第四个原因是真实世界数据通常存在偏差。这种偏差可能来自各种来源，如传感器、执行器和环境。合成数据可以用来生成无偏差数据，这有助于训练机器学习模型。第五个原因是在机器人领域需要合成数据是因为真实世界数据通常不具有代表性。这尤其适用于训练机器学习模型所需的数据。合成数据可以用来创建更好地代表真实世界的数据，这对于训练机器学习模型是有帮助的。
- en: Robots can learn to identify and respond to different types of objects by using
    synthetic data. By learning from this data, the robot can learn how to better
    identify and respond to different types of human behavior. For example, a robot
    might be given a set of synthetic data that includes variousa variety of different
    types of human behavior and how to respond to them.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 机器人可以通过使用合成数据来学习识别和响应不同类型的对象。通过从这些数据中学习，机器人可以学会如何更好地识别和响应不同类型的人类行为。例如，一个机器人可能会被给予一组包含各种不同类型的人类行为及其响应方法的合成数据集。
- en: Now let’s look at how synthetic data can be used in security field.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来看看合成数据在安全领域是如何被应用的。
- en: Security
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全
- en: Synthetic data can play a vital role in enhancing security, both through its
    ability to train machine learning models to better detect security threats and
    by providing it also provides a means way of testing security systems and measuring
    their effectiveness.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据在增强安全方面可以发挥至关重要的作用，这不仅通过其训练机器学习模型以更好地检测安全威胁的能力，而且还通过提供测试安全系统及其有效性的手段。
- en: Machine learning models that are trained on synthetic data are more effective
    at detecting security threats because they are not limited by available the real-world
    data that is available synthetic data can be generated to match any desired distribution,
    including distributions that are not present in the real world. This allows machine
    learning models to learn more about the underlying distribution of data, and to
    better identify outliers that may represent security threats.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在合成数据上训练的机器学习模型在检测安全威胁方面更为有效，因为它们不受可用真实世界数据的限制。合成数据可以生成以匹配任何所需分布，包括在真实世界中不存在的分布。这使得机器学习模型能够更好地了解数据的潜在分布，并更好地识别可能代表安全威胁的异常值。
- en: Testing security systems with synthetic data is important because it allows
    a controlled environmentets for measure the system’s performance. Synthetic data
    can be generated to match any desired distribution of security threats, making
    it possible to test how well a security system can detect and respond to a wide
    variety of threats. This is importnat because real-world data is often limited
    in scope and may not be representative of the full range of security threats that a
    system may encounter.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 使用合成数据测试安全系统很重要，因为它允许在受控环境中测量系统的性能。可以生成与任何期望的安全威胁分布相匹配的合成数据，这使得测试安全系统检测和响应各种威胁的能力成为可能。这很重要，因为现实世界的数据通常范围有限，可能无法代表系统可能遇到的所有安全威胁的全范围。
- en: Overall, the use of synthetic data is importnat essential for both training
    machine learning models to detect security threats and for testing the performance
    of security systems. Synthetic data provides a more complete picture of the underlying
    distribution of data which leads to better improves the detection of security
    threats. Additionally, synthetic data can be used to create controlled environments
    for testing security system performance, making it possible to measure the effectiveness
    of a security system more accurately.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，使用合成数据对于训练机器学习模型以检测安全威胁以及测试安全系统的性能都是非常重要的。合成数据提供了对数据潜在分布的更完整了解，从而提高了对安全威胁的检测。此外，合成数据可以用来创建用于测试安全系统性能的受控环境，这使得更准确地衡量安全系统的有效性成为可能。
- en: Now, let’s quickly explore how synthetic data can be employed in the social
    media realm.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们快速探讨一下合成数据如何在社交媒体领域得到应用。
- en: Social Media
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 社交媒体
- en: Social media has become an integral part of our lives. It is a platform where
    we share our thoughts, ideas, and feelings with our friends and family. However,
    social media has also become a breeding ground for fake news and misinformation.
    This is because anyone can create a fake account and spread false information.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 社交媒体已经成为我们生活的一个不可或缺的部分。这是一个我们可以与我们的朋友和家人分享我们的想法、观点和感受的平台。然而，社交媒体也已经成为虚假新闻和错误信息的滋生地。这是因为任何人都可以创建一个虚假账户并传播错误信息。
- en: To combat this problem, many social media platforms are now using AI to detect
    fake accounts and flag them. However, AI can only be as effective as the data
    it is trained on. If the data is biased or inaccurate, the AI ​​will also be biased
    or inaccurate. This is where synthetic data comes in. Synthetic data can be used
    to train AI algorithms to be more accurate in detecting fake accounts. Synthetic
    data can help reduce the spread of fake news and misinformation on social media.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，许多社交媒体平台现在正在使用AI来检测虚假账户并将它们标记出来。然而，AI的有效性取决于其训练的数据。如果数据有偏见或不准确，AI也会有偏见或不准确。这就是合成数据发挥作用的地方。合成数据可以用来训练AI算法，使其在检测虚假账户时更加准确。合成数据可以帮助减少社交媒体上虚假新闻和错误信息的传播。
- en: One way to generate synthetic data is to use generative models. For example,
    a generative model could be trained on a dataset of real images of people. Once
    trained, the model could then generate new images of people that look real but
    are fake. This is important because it allows us to creates data that is representative
    of the real world.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 生成合成数据的一种方法是通过使用生成模型。例如，一个生成模型可以在真实人物图像的数据集上进行训练。一旦训练完成，该模型就可以生成看起来真实但却是虚假的人物图像。这很重要，因为它允许我们创建代表现实世界的数据。
- en: Simulation is another way of generating synthetic data. For example, we could
    create a simulation of a social media platform. This simulation would include
    all the same features as the real social media platform. However, it would also
    allows us to control what data is generated. This is important because it allows
    us to test different scenarios. For example, we could test what would happen if
    a certain percentage of accounts were fake. This would allow us to see how our AI
    algorithms would react in the real world.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟是生成合成数据的另一种方法。例如，我们可以创建一个社交媒体平台的模拟。这个模拟将包括与真实社交媒体平台相同的所有功能。然而，它还允许我们控制生成哪些数据。这很重要，因为它使我们能够测试不同的场景。例如，我们可以测试如果一定比例的账户是假的会发生什么。这将使我们能够看到我们的AI算法在现实世界中的反应。
- en: Some social media platforms that have been known to use synthetic data include
    Facebook, Google, and Twitter; Each of this platforms has used synthetic data
    in different ways and for different purposes.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 一些已知使用合成数据的社会媒体平台包括脸书、谷歌和推特；每个平台都以不同的方式和使用不同的目的使用合成数据。
- en: Facebook has been known to uses synthetic data to train its algorithms. For
    example, Facebook has used synthetic data to train its facial recognition algorithms.
    Because it is difficult to obtain a large enough dataset of real-world faces to
    train these algorithms effectively. In addition, Facebook has also used synthetic
    data to generate fake user profiles. This is done to test how effective plartfom algorithms
    are at detecting fake profiles.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 脸书也一直被知道使用合成数据来训练其算法。例如，脸书使用合成数据来训练其面部识别算法。因为很难获得足够大的真实世界面部数据集来有效地训练这些算法。此外，脸书还使用合成数据来生成虚假用户资料。这是为了测试平台算法在检测虚假资料方面的有效性。
- en: In addition to using real data, Google has been known to use synthetic data.
    Synthetic data is generated data that is designed to mimic real data. For example, Google
    has to used synthetic data to train its machine learning algorithms to better
    understand natural language. Google has also used synthetic data to generate fake
    reviews. This is done to test how effective the platform’s algorithms at detectare detecting
    fake reviews.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 除了使用真实数据外，谷歌也一直被知道使用合成数据。合成数据是设计用来模仿真实数据的数据。例如，谷歌必须使用合成数据来训练其机器学习算法以更好地理解自然语言。谷歌还使用合成数据来生成虚假评论。这是为了测试平台算法在检测虚假评论方面的有效性。
- en: Twitter is also known to use synthetic data. The platform has used synthetic
    data to generate fake tweets and fake user profiles to test how effective its
    algorithms are at detecting detect them.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 推特也一直被知道使用合成数据。该平台使用合成数据来生成虚假推文和虚假用户资料，以测试其算法在检测这些虚假内容方面的有效性。
- en: Now, let’s quickly explore how synthetic data can be employed in the marketing realm.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们快速探讨合成数据如何在市场营销领域被应用。
- en: Marketing
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 市场营销
- en: There are many benefits to using synthetic data in marketing. Perhaps the most
    obvious benefit is that it can be used to generate data that would be otherwise
    unavailable. This is especially useful for marketing research, as because it can
    be used to generate data about consumer behavior that would be difficult or impossible
    to obtain through traditional means.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 在市场营销中使用合成数据有许多好处。可能最明显的益处是它可以用来生成其他情况下无法获得的数据。这对于市场研究特别有用，因为它可以用来生成关于消费者行为的难以或无法通过传统手段获得的数据。
- en: The use of synthetic data in marketing is important for several reasons. First,
    it allows marketing researchers to study behavior in a controlled environment. This
    is important because it allows for the isolation of variables and the testing
    of hypotheses in a way that would not be possible with real-world data. Second,
    synthetic data can be used to generate new insights into consumer behavior. By
    analyzing how consumers behave in a simulated environment, marketing researchers
    can develop new theories and models that can be applied to real-world data. Finally,
    synthetic data can be used to evaluate marketing campaigns and strategies. By
    testing campaigns and strategies in a simulated environment, marketers can identify
    which ones are most likely to be successful in the real world.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 在市场营销中使用合成数据的重要性有多个原因。首先，它允许营销研究人员在受控环境中研究行为。这很重要，因为它允许隔离变量和以在真实世界数据中不可能的方式进行假设测试。其次，合成数据可以用来对消费者行为产生新的见解。通过分析消费者在模拟环境中的行为，营销研究人员可以开发出可以应用于真实世界数据的新理论和模型。最后，合成数据可以用来评估市场营销活动和策略。通过在模拟环境中测试活动和策略，营销人员可以确定哪些最有可能在真实世界中取得成功。
- en: Synthetic data is also needed in marketing because it can be used to protect
    the privacy of real customers. By using synthetic data instead of real customer
    data, marketers can avoid having to collect and store sensitive information about
    their customers. This is especially important for businesses that are subject
    to strict privacy laws, such as those in the European Union.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在市场营销中也需要合成数据，因为它可以用来保护真实客户的隐私。通过使用合成数据而不是真实客户数据，营销人员可以避免收集和存储有关客户敏感信息的需要。这对于受到严格隐私法约束的企业尤为重要，例如欧盟的企业。
- en: Several marketing organizations use synthetic data to get a better understanding
    of customer behavior and to improve marketing strategies. Each of these organizations
    uses synthetic data in different ways, but all of them utilize it to gain insights
    into the behavior of consumers.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 几个营销组织使用合成数据来更好地理解客户行为并改进营销策略。这些组织中的每一个都以不同的方式使用合成数据，但它们都利用它来深入了解消费者的行为。
- en: Natural Language Processing
  id: totrans-152
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自然语言处理
- en: Language models are trained on a large corpus of text and can be used to generate
    new text that is similar to the training data. Language models can be used to
    generate synthetic data that is representative of different groups of people [[8](#Par008)]
    or to generate data with specific properties.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 语言模型是在大量文本语料库上训练的，可以用来生成与训练数据相似的新文本。语言模型可以用来生成代表不同人群的合成数据 [[8](#Par008)] 或生成具有特定属性的数据。
- en: Natural language processing (NLP) is a subfield of AI that deals with the interpretation
    and manipulation of human language. NLP is used in a variety of applications,
    including text classification, chatbots, and machine translation. NLP helps computers
    to understand, interpret, and manipulate human language [[9](#Par009)].
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 自然语言处理（NLP）是人工智能的一个子领域，它涉及对人类语言的解释和操作。NLP被应用于多种应用中，包括文本分类、聊天机器人和机器翻译。NLP帮助计算机理解、解释和操作人类语言
    [[9](#Par009)]。
- en: One area where NLP will likely have a significant impact is in the generation
    of synthetic data. Synethetic data that is generated by artificial means, as opposed
    to being collected from real-world sources. Synthetic data can be used to train
    machine learning models [[10](#Par0010)], and NLP can be used to generate synthetic
    data that is realistic and diverse. This is important because it allows machine
    learning models to be trained on data that is representative of the real world,
    which can improve the accuracy of the models. For example, synthetic data can
    be used to generate realistic images of people or objects that don’t exist in
    the real world or to create simulated environments for training autonomous vehicles.
    Machine learning models trained on data that is representative of the real world
    have improved accuracy.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: NLP可能会产生重大影响的领域之一是在合成数据的生成。与从现实世界来源收集的数据相比，通过人工手段生成的合成数据。合成数据可以用来训练机器学习模型 [[10](#Par0010)]，NLP可以用来生成真实且多样化的合成数据。这很重要，因为它允许机器学习模型在代表现实世界的数据上进行训练，从而可以提高模型的准确性。例如，合成数据可以用来生成现实中不存在的人或物体的逼真图像，或为训练自动驾驶车辆创建模拟环境。在代表现实世界的数据上训练的机器学习模型的准确性得到了提高。
- en: In addition, NLP can be used to automatically label synthetic data, which is
    important for training supervised machine learning models. For example, NLP can
    be used to also automatically generate descriptions of images or videos, which
    can then be used as labels for training image recognition or object detection
    models. This is important for training supervised machine learining models, as
    it can help reduce the amount of manual labeling that is required.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，NLP可以用来自动标记合成数据，这对于训练监督机器学习模型非常重要。例如，NLP可以用来自动生成图像或视频的描述，这些描述随后可以用作训练图像识别或物体检测模型的标签。这对于训练监督机器学习模型非常重要，因为它可以帮助减少所需的手动标记量。
- en: Overall, NLP is a powerful tool for generating and manipulating synthetic data.
    It can be used to automatically generate large amounts of realistic data, which
    is important for training machine learning models. In addition, NLP can automatically
    label synthetic data, which is important for training supervised machine learning
    models.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，NLP是生成和操作合成数据的有力工具。它可以用来自动生成大量真实数据，这对于训练机器学习模型非常重要。此外，NLP可以自动标记合成数据，这对于训练监督机器学习模型非常重要。
- en: Consequently, in the feature, NLP will continue to play an importnat role in
    the generation of synthetic data. The use of NLP to generate synthetic data will
    allow for the creation of data that is more representative of different groups
    of people and will allow for the creation of data with specific properties.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在特征生成方面，NLP将继续在合成数据的生成中扮演重要角色。使用NLP生成合成数据将允许创建更能够代表不同人群的数据，并允许创建具有特定属性的数据。
- en: Computer Vision
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算机视觉
- en: Computer vision is the process of using computers to interpret and understand
    digital images. This can be done using algorithms that can identify patterns and
    features in images, and then make decisions about what those images represent.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉是使用计算机解释和理解数字图像的过程。这可以通过使用能够识别图像中的模式和特征的算法来完成，然后根据这些图像代表的内容做出决策。
- en: The computer can detect a human by identifying their silhouette or by drawing
    bounding boxes around the person. In the photos in Figure [1-2](#Fig2), the computer
    would count the person by identifying their silhouette, as seen in Figure [1-2 ](#Fig2)(a)
    (instance segmentation) or by drawing bounding boxes around the person (object
    detection), as in Figure [1-2 ](#Fig2)(b).
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机可以通过识别人的轮廓或围绕人绘制边界框来检测人。在图 [1-2](#Fig2) 的照片中，计算机可以通过识别轮廓来计数，如图 [1-2 ](#Fig2)(a)
    (实例分割) 或通过围绕人绘制边界框（目标检测），如图 [1-2 ](#Fig2)(b)。
- en: '![](../images/534235_1_En_1_Chapter/534235_1_En_1_Fig2_HTML.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![图 1-2](../images/534235_1_En_1_Chapter/534235_1_En_1_Fig2_HTML.png)'
- en: A photograph represents the two computer visions. The first one is segmentation
    computer vision and the second one is object detection computer vision.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 一张照片代表了两种计算机视觉。第一种是分割计算机视觉，第二种是目标检测计算机视觉。
- en: Figure 1-2
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1-2
- en: 'Computer vision: (a) instance segmentation (b) object detection'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉： (a) 实例分割 (b) 目标检测
- en: An autonomous vehicle needs to be able to detect objects and understand what
    they are to make decisions in real-time. This is done through object detection,
    which is the process of finding bounding boxes around each item in the image.
    After that, semantic segmentation assigns a label to every pixel in the image,
    indicating what the object is. Finally, instance segmentation shows you how many
    individual objects there are [[11](#Par0011)]. Functions such as seeing, reading,
    and hearing on a computer are performed with artificial neural networks that imitate
    the human brain. Recognition of human faces, navigation of autonomous cars, and
    diagnosing patients with the help of medical images obtained by scanning on the
    computer are all related to the computer’s vision, and these works are done with
    algorithms called *artificial neural networks*.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 一辆自动驾驶汽车需要能够检测物体并理解它们是什么，以便在实时做出决策。这是通过目标检测来完成的，即在每个图像中的每个项目周围找到边界框。之后，语义分割会给图像中的每个像素分配一个标签，指示物体是什么。最后，实例分割显示了有多少个单独的物体
    [[11](#Par0011)]。在计算机上执行视觉、阅读和听觉等功能的计算机，使用模仿人脑的人工神经网络。人脸识别、自动驾驶汽车的导航以及通过计算机扫描获得的医学图像来诊断患者都与计算机视觉有关，这些工作都是通过称为
    *人工神经网络* 的算法完成的。
- en: The neural network is an area type of machine learning algorithm that is used
    to simulate the workings of the human brain. It is made up of a series of interconnected
    nodes, each with its weight and three should value. If the output of a node is
    above the specified threshold, that node is activated and sends data to the next
    layer of the network. If the output of a node is below the specified threshold,
    that node is not activated, and no data is sent along [[12](#Par0012)]. The output
    of the node is compared to the threshold. If the output is above the threshold,
    the node is activated and sends data to the next layer.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络是一种用于模拟人脑工作原理的机器学习算法区域。它由一系列相互连接的节点组成，每个节点都有自己的权重和三个应该值。如果一个节点的输出高于指定的阈值，那么该节点就会被激活并向网络的下一层发送数据。如果一个节点的输出低于指定的阈值，那么该节点就不会被激活，并且不会发送任何数据
    [[12](#Par0012)]。节点的输出与阈值进行比较。如果输出高于阈值，节点被激活并向下一层发送数据。
- en: When a model learns too much detail and noise from the training data, it is
    said to be overfitting. This can negatively impact the model’s performance on
    new data [[13](#Par0013)]. This means that if we use synthetic data when training
    a deep learning model, it will be less likely to overfit the data and as a result,
    the model will be more accurate and able to generalize to new data better.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个模型从训练数据中学习过多细节和噪声时，我们称其为过拟合。这可能会对模型在新数据上的性能产生负面影响 [[13](#Par0013)]。这意味着如果我们使用合成数据来训练深度学习模型，它不太可能过拟合数据，因此，模型将更加准确，并能更好地泛化到新数据。
- en: Convolutional Neural Networks (CNN) are specifically designed to be good at
    image recognition tasks. They work by taking in an image as input and then assigning
    importance to various aspects or objects in the image. This allows the CNN to
    differentiate between different objects in the image. Such a deep neural network
    has a much more complex structure than a simple neural network. The following
    resources can be reviewed for CNN applications in R and Python.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积神经网络（CNN）是专门设计来擅长图像识别任务的。它们通过接收图像作为输入，然后为图像中的各种方面或对象分配重要性来实现工作。这使得CNN能够区分图像中的不同对象。这种深度神经网络的结构比简单的神经网络要复杂得多。以下资源可以用于查看CNN在R和Python中的应用。
- en: However, no matter how complex the algorithms are in computer vision; as we
    mention before the quality of the data, which is only called “*input*” in such
    forms, is very important for the accuracy of the results. Whether the data is
    text, audio or photographic, the size of the data and its good labeling are essential
    to the accuracy of the results. The raw material of artificial intelligence is
    big data. Privacy and data privacy can prevent companies from accessing big data
    with appropriate laws and enforcement. In addition, labeling data for training
    purposes also creates a significant cost in machine learning.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，无论计算机视觉中的算法多么复杂；正如我们之前提到的，数据的品质，在这种形式下仅被称为“*输入*”，对于结果的准确性非常重要。数据是文本、音频还是照片，数据的大小及其良好的标签对于结果的准确性至关重要。人工智能的原材料是大数据。隐私和数据隐私可以通过适当的法律和执法来防止公司访问大数据。此外，为了训练目的对数据进行标注也会在机器学习中产生显著的成本。
- en: Understanding of Visual Scenes
  id: totrans-171
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 对视觉场景的理解
- en: The Visual scenes are the images that are seen on the computer screen. These
    images are made up of pixels, which are tiny dots of color. The pixels are arranged
    in a grid, and each pixel has a specific address. The computer visual scenes are
    created by the computer graphics software, which is responsible for creating the
    images that are seen on the screen. The computer graphics software can create the
    images by using the addresses of the pixels.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉场景是在计算机屏幕上看到的图像。这些图像由像素组成，像素是微小的彩色点。像素排列成网格，每个像素都有一个特定的地址。计算机视觉场景是由计算机图形软件创建的，该软件负责创建屏幕上看到的图像。计算机图形软件可以通过使用像素的地址来创建图像。
- en: One of the most important purposes of computer vision is to examine visual scenes
    and understand them in detail. This includes determining the objects in the image,
    their places in 2D and 3D, their attributes, and making a semantic description
    of the scene.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉最重要的目的之一是检查视觉场景并对其进行详细理解。这包括确定图像中的对象、它们在2D和3D中的位置、它们的属性，并对场景进行语义描述。
- en: 'Different types of tasks that can be performed with object recognition datasets:
    (a) Image classification involves assigning a label to an entire image, (b) object
    bounding box localization involves identifying the location of an object within
    an image, and (c) semantic pixel-level segmentation involves classifying each
    pixel in an image, and (d) segmenting individual object instances. This involves
    identifying each object in an image and then segmenting it from the rest of the
    image, as demonstrated in Figure [1-3](#Fig3).'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用对象识别数据集执行的不同类型任务：（a）图像分类涉及为整个图像分配标签，（b）对象边界框定位涉及识别图像中对象的位置，（c）语义像素级分割涉及对图像中的每个像素进行分类，以及（d）分割单个对象实例。这涉及识别图像中的每个对象，然后将其从图像的其余部分分割出来，如图[1-3](#Fig3)所示。
- en: '![](../images/534235_1_En_1_Chapter/534235_1_En_1_Fig3_HTML.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图1-3](../images/534235_1_En_1_Chapter/534235_1_En_1_Fig3_HTML.png)'
- en: A steps of object recognition include image classification, object bounding
    box, semantic pixel level segmentation, and segmenting individual object instances.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 对象识别的步骤包括图像分类、对象边界框、语义像素级分割以及分割单个对象实例。
- en: Figure 1-3
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 图1-3
- en: Object recognition
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 对象识别
- en: 'We can explain what us done in the four panels shown in of Figure [1-3](#Fig3)
    as fallows:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将图[1-3](#Fig3)中所示的四个面板所展示的内容解释如下：
- en: '**Image Classification:** This task is done by giving binary labels to objects
    so that they can be recognized as they exist in the image, as shown in Figure
    [1-3 ](#Fig3)(a). It is widely used in classification, image processing, and machine
    learning.'
  id: totrans-180
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**图像分类：** 该任务通过给对象分配二进制标签来实现，以便它们可以在图像中识别出来，如图[1-3](#Fig3)(a)所示。它在分类、图像处理和机器学习中得到了广泛应用。'
- en: '**Object bounding box localization:** It is a method used to determine the
    boundaries of an object, as shown in Figure [1-3](#Fig3) (b). This method is used
    to detect where an object in an image begins and ends.'
  id: totrans-181
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**对象边界框定位**：这是一种用于确定对象边界的方法，如图[1-3](#Fig3)（b）所示。这种方法用于检测图像中对象的起始和结束位置。'
- en: '**Semantic pixel-level segmentation:** It is a method used to distinguish objects
    in an image from each other, as shown in Figure [1-3](#Fig3) (c). This method
    is used to detect whether each pixel belongs to an object or not.'
  id: totrans-182
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**语义像素级分割**：这是一种用于区分图像中对象的方法，如图[1-3](#Fig3)（c）所示。这种方法用于检测每个像素是否属于对象。'
- en: '**Segmenting individual object instances:** It is a method used to distinguish an
    object one by one, as shown in Figure [1-3](#Fig3) (d). This method is used to
    distinguish between objects in an image.'
  id: totrans-183
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分割单个对象实例**：这是一种逐个区分对象的方法，如图[1-3](#Fig3)（d）所示。这种方法用于区分图像中的对象。'
- en: Visual Scenes is used to create and manage online photo albums. It can be used
    to store photos on a personal website or blog or to share photos with friends
    and family. Visual Scenes provides an easy way to organize photos into albums,
    add captions and tags, and share photos with others.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉场景用于创建和管理在线照片专辑。它可以用来在个人网站或博客上存储照片，或者与朋友和家人分享照片。视觉场景提供了一个简单的方法来将照片组织成专辑，添加标题和标签，并与他人分享照片。
- en: Visual scenes is used to help people with autism spectrum disorder improve their
    communication and social skills. It is a software program that uses videos to
    help people understand facial expressions, body language, and social situations.
    The program is designed to help people with an autism spectrum disorder understand
    what is happening in a scene and learn how to respond to social situations.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉场景用于帮助自闭症谱系障碍的人改善他们的沟通和社会技能。这是一个使用视频帮助人们理解面部表情、肢体语言和社会情境的软件程序。该程序旨在帮助自闭症谱系障碍的人理解场景中发生的事情，并学习如何应对社交情境。
- en: Segmentation Problem
  id: totrans-186
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分割问题
- en: Synthetic data is important for machine learning, and especially for computer
    “vision.” Synthetic data provides us with an almost unlimited amount of perfectly
    labeled data at a small cost. Computer scientists can create 3-D models of objects
    and their environments to create synthetic data with randomized conditions. This
    can help solve computer vision problems.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据对机器学习非常重要，尤其是对计算机“视觉”。合成数据以小成本为我们提供了几乎无限量的完美标记数据。计算机科学家可以创建对象及其环境的3-D模型，以创建具有随机条件的合成数据。这有助于解决计算机视觉问题。
- en: Semantic segmentation is the task of partitioning an image into semantically
    meaningful regions. Each pixel in the image is assigned a semantic label that
    reflects what the pixel represents. Semantic segmentation can be performed using
    a deep neural network with an encoder-decoder structure.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 语义分割是将图像分割成具有语义意义的区域的任务。图像中的每个像素都被分配一个语义标签，以反映像素所代表的含义。语义分割可以使用具有编码器-解码器结构的深度神经网络来实现。
- en: The segmentation problem in synthetic data is the problem of accurately dividing
    a dataset into homogeneous groups or segments. This is a difficult problem because
    it is often hard to determine what constitutes a homogeneous group and because
    there may be many ways to segment a dataset.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据中的分割问题是将数据集准确分割成同质组或段的问题。这是一个困难的问题，因为通常很难确定什么构成同质组，并且可能有许多分割数据集的方法。
- en: There are a few different approaches that can be used to segment a dataset.
    One approach is to use a clustering algorithm, which will group data points that
    are similar to each other. Another approach is to use a classification algorithm,
    which will assign each data point to a class. Finally, one can also use a rule-based
    approach, which will define a set of rules that determine how to segment the data.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种不同的方法可以用来分割数据集。一种方法是用聚类算法，它将相似的数据点分组。另一种方法是使用分类算法，它将每个数据点分配到一个类别。最后，还可以使用基于规则的方法，它将定义一组规则来决定如何分割数据。
- en: The segmentation problem is particularly difficult in synthetic data because
    the data is often generated by a process that is not well understood. As a result,
    it is often hard to determine what features of the data are important for grouping
    the data points. In addition, synthetic data often contains a lot of noise, which
    can make it difficult to accurately segment the data.
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 在合成数据中，分割问题尤其困难，因为数据通常是由一个不太为人所理解的流程生成的。因此，通常很难确定哪些数据特征对于分组数据点很重要。此外，合成数据通常包含大量的噪声，这可能会使其难以准确分割数据。
- en: Summary
  id: totrans-192
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, you learned about synthetic data and why it is beneficial for
    data science and artificial intelligence. You also learned about the lifecycle
    of data and how synthetic data can be used to improve data quality at various
    stages. Finally, you learned how synthetic data is applied across various industries,
    including financial services, manufacturing, healthcare, automotive, robotics,
    security, social media, marketing, natural language processing, and computer vision.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，你学习了合成数据及其在数据科学和人工智能中的益处。你还了解了数据生命周期以及合成数据如何在不同阶段提高数据质量。最后，你学习了合成数据在金融服务业、制造业、医疗保健、汽车、机器人、安全、社交媒体、营销、自然语言处理和计算机视觉等各个行业的应用。
- en: Next, we’ll begin delving into the different types of Synthetic Data.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将开始深入探讨不同类型的合成数据。
