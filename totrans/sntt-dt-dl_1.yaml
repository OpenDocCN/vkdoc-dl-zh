    (accessed Apr. 13, 2022).'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '[1]. G. Andrews，“什么是合成数据？” Carrushome.com，2022年。[`https://www.carrushome.com/en/what-is-synthetic-data/`](https://www.carrushome.com/en/what-is-synthetic-data/)（访问日期：2022年4月13日）。'
- en: '[2]. Scikit, “3.3\. Metrics and scoring: quantifying the quality of predictions
    — scikit-learn 1.0.2 documentation.” Sicikit Learn, 2022\. [`https://scikit-learn.org/stable/modules/model_evaluation.xhtml`](https://scikit-learn.org/stable/modules/model_evaluation.xhtml)
    (accessed Apr. 13, 2022).'
  id: totrans-197
