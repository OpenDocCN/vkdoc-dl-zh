- en: The Python sample() method returns a particular-length list of items chosen
    from a sequence. It is used for random sampling without replacement. The Python
    mode() method applies to nominal (nonnumeric) data. Remember that we converted
    pixel image data to Boolean True or False values. It is used to locate the central
    tendency of numeric or nominal data. The Python mean() method calculates the arithmetic
    average of a given list of numbers. To get clearer reconstruction images, run
    the model for many more epochs (to reduce loss).
  prefs: []
