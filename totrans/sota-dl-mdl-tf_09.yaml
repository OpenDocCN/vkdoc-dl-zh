- en: Variational Autoencoder Experiment
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A **variational autoencoder** (VAE) is an unsupervised ML technique that probabilistically
    learns efficient data codings. VAE training is regularized to mitigate overfitting
    and ensure that the latent space effectively generates similar outputs when compared
    to training inputs. A VAE is very different from other autoencoders because it
    encodes input as a distribution over the latent space rather as a single point.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: Initially, input is encoded as a distribution over the latent space. A point
    from the latent space is then sampled from the distribution. The sampled point
    is decoded and reconstruction error is computed. Reconstruction error is then
    back-propagated through the network.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: In practice, encoded distributions are *normal,* so the encoder can be trained
    to return the mean and covariance matrix that describe the Gaussian distributions.
    The reason an input is encoded as a distribution instead of a single point is
    because latent space regularization can be expressed very naturally as Gaussian.
    Distributions returned by the encoder are enforced to be close to a standard normal
    distribution by the VAE model.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: For an excellent discussion of VAE modeling, peruse
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://towardsdatascience.com/understanding-variational-autoencoders-vaes-f70510919f73`](https://towardsdatascience.com/understanding-variational-autoencoders-vaes-f70510919f73)'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Load Data
  id: totrans-103
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Load Fashion-MNIST train and test images as a single batch of NumPy arrays:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Inspect Data
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
