  type: TYPE_NORMAL
- en: '[PRE65]'
  prefs: []
  type: TYPE_PRE
- en: Our model is just a Keras model where outputs are defined as the composition
    of the encoder and the decoder. Since the encoder already added the Kullback-Leibler
    (KL) divergence term to the loss, we only need to specify the reconstruction loss
    (the first term of the ELBO). KL divergence is a measure of how one probability
    distribution is different from a second one. It is also called relative entropy.
  prefs: []
  type: TYPE_NORMAL
- en: ELBO (Evidence Lower BOund) is a lower bound on log p(x) (or the log probability
    of an observed data point). The first integral in the ELBO equation is the reconstruction
    term. It asks how likely we are to start at an image x, encode it to z, decode
    it, and get back the original x. The second term is the KL divergence term. It
    measures how close our encoder is to the value we assigned to the prior variable.
    We can think of this term as just trying to keep our encoder honest. If our encoder
    generates z samples that are too unlikely given our prior value, the objective
    is worse than if it generates z samples more typical of the prior value. Thus,
    the encoder should differ from the prior value only if the cost of doing so is
    outweighed by the benefit from the reconstruction term.
  prefs: []
  type: TYPE_NORMAL
