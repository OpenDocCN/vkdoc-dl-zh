- en: Convolutional Encoder Experiment
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积编码器实验
- en: A *convolutional autoencoder* is a variant of a convolutional neural network
    used for unsupervised learning of convolutional filters. Convolutional autoencoders
    minimize reconstruction errors by learning the optimal filters during image reconstruction.
    In the experiment, the convolutional autoencoder learns how to generate new images
    as facsimiles of the input features from a dataset.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*卷积自编码器*是用于无监督学习卷积滤波器的卷积神经网络的一个变体。卷积自编码器通过在图像重建过程中学习最优滤波器来最小化重建误差。在实验中，卷积自编码器学习如何生成新的图像，这些图像是数据集中输入特征的真实副本。'
