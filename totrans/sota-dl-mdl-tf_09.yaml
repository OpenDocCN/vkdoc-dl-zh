  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Create a Custom Layer to Sample Codings
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The sampling layer for the encoder takes two inputs, namely, mean μ and log
    variance γ. It uses the tf.random.normal API to sample a random vector of the
    same shape as γ from the normal distribution with mean of zero (μ=0) and standard
    deviation of 1 (σ=1), multiplies the random vector by exp(γ/2), adds μ, and returns
    the result.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Create the sampling class as shown in Listing [9-6](#PC34).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Create the VAE Model
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Clear and seed:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Create the encoder as shown in Listing [9-7](#PC36).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: We use the Functional API because the model isn’t entirely sequential. The Dense
    layers output codings_mean μ and codings_log_var γ that both have the same inputs
    (i.e., the outputs of the second Dense layer). Both codings_mean and codings_log_var
    are then passed to the sampling layer. The variational_encoder has three outputs,
    namely, codings_mean, codings_log_var, and codings. But we only use the codings
    output.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: Create the decoder as shown in Listing [9-8](#PC37).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: We could have used the Sequential API instead of the Functional API since it
    is really just a simple stack of layers. But we created the VAE decoder in this
    way to match the structure of the VAE encoder.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: 'Build the VAE model:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Ignore the first two outputs because we only need the codings.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: Compile and Train
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Add Latent Loss and Reconstruction Loss to the Model
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Compute latent loss as 1 plus codings_log_var minus the exponential of codings_log_var
    minus the square of codings_mean (1 + codings_log_var − e^(codings_log_var) −
    codings_mean²). Multiply this result by –0.5\. Compute reconstruction loss as
    mean loss over all instances in the batch divided by 784 to ensure appropriate
    scale. We divide by 784 because images are 28 × 28 pixels.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: As review, an autoencoder is a neural network that receives an image and reconstructs
    it by learning the input features from the image. The encoder creates a latent
    vector from the image. A *latent vector* is a compressed representation of the
    image. The latent vector is fed into a decoder, which reconstructs a facsimile
    of the input image from the latent vector.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: A VAE also reconstructs a new image from the learned input features of an image.
    But the encoder creates a sample of latent vectors based on a Gaussian distribution.
    The decoder randomly draws latent vectors from the distribution created by the
    encoder to create new facsimile images. New images are better quality because
    they are based on random latent representations drawn from a Gaussian distribution.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: We restrict the VAE with latent loss. *Latent loss* measures the loss of the
    latent vector against the Gaussian distribution created by the encoder. So latent
    loss penalizes the network based on how close or how far a latent vector is to
    or from the unit Gaussian distribution. The actual image loss is also measured
    to see how well the facsimile image matches the input image. When combining these
    two loss metrics, the network has to find the best trade-off between low latent
    loss (unit Gaussian distribution of latent vectors) and low image loss (high similarity
    between input and facsimile output images). The latent loss only evaluates to
    zero (perfect) when the mean is 0 and the standard deviation is 1, which is unit
    Gaussian.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
