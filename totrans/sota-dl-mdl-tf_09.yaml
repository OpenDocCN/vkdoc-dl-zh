- en: TFP VAE Encoder
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Create an encoder with a full-covariance Gaussian distribution with mean and
    covariance matrices parameterized by the output of a neural network. TFP Layers
    enable construction of this complex encoder in an easy format.
  prefs: []
  type: TYPE_NORMAL
- en: Create the encoder as shown in Listing [9-14](#PC61).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE60]'
  prefs: []
  type: TYPE_PRE
- en: The encoder is a normal Keras sequential model with convolutions and dense layers.
    But the output is passed to a TFP Layer (MultivariateNormalTril()), which transparently
    splits the activations from the final Dense layer into the parts needed to specify
    both the mean and the lower triangular covariance matrix. We use the tfpl helper
    MultivariateNormalTriL.params_size(encoded_size) to make the Dense layer output
    the correct number of activations. We also contribute a regularization term to
    the final loss to mitigate overfitting. Specifically, we add Kullback-Leibler
    (KL) divergence regularization between the encoder and the prior to the loss.
  prefs: []
  type: TYPE_NORMAL
