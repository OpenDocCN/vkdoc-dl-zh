  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE62]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Check that inputs are as expected:'
  id: totrans-207
