- en: TFP Experiment
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this experiment, we fit a VAE using TensorFlow Probability Layers. *TensorFlow
    Probability (TFP)* is a library for probabilistic reasoning and statistical analysis
    in TensorFlow. As part of the TensorFlow ecosystem, TFP provides integration of
    probabilistic methods with deep networks, gradient-based inference using automatic
    differentiation, and scalability to large datasets and models with hardware acceleration
    (e.g., GPUs) and distributed computation.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: TFP makes it easy to combine probabilistic models and deep learning on modern
    hardware (e.g., TPU, GPU). TFP is designed for data scientists, statisticians,
    ML researchers, and practitioners who want to encode domain knowledge to understand
    data and make predictions.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: TFP includes a wide selection of probability distributions and bijectors. The
    *Bijector API* provides modular building blocks for constructing a broad class
    of probability distributions. Bijectors encapsulate the change of variables for
    a probability density. So they can be used to transform a distribution of tensors
    into another type of distribution. Simply, they turn one random outcome into another
    random outcome from a different distribution.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: Since TFP inherits the benefits of TensorFlow, we can build, fit, and deploy
    a model using a single language throughout the lifecycle of model exploration
    and production. TFP is open source and available on GitHub.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: 'Load Fashion-MNIST data:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE50]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Create a function to preprocess the data:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE51]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Cast an image to float and scale. Continue by randomly casting image pixels
    to binary form as either *True* or *False* values. The tf.random.uniform API outputs
    random values from a uniform distribution. Notice that the function returns *image,
    image* rather than just image because Keras is intended for use with discriminative
    models with an *(example, label)* input format. Since the goal of a VAE is to
    recover the input x from x itself, the data pair is *(example, example)*.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: 'Establish parameters for the input pipeline:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE52]'
