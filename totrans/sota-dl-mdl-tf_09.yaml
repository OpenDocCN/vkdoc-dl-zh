- en: 9. Convolutional and Variational Autoencoders
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Autoencoders don’t typically work well with images unless they are very small.
    But convolutional and variational autoencoders works much better than a feedforward
    dense ones with large color images.
  prefs: []
  type: TYPE_NORMAL
- en: '**A** **variational autoencoder (VAE)** is a deep learning technique for learning
    latent representations. They apply learned latent space representations to draw
    images and interpolate between sentences. A VAE works by compressing the input
    into a latent space representation and then reconstructing the output from this
    representation. **Latent space** is a mathematical representation of compressed
    data.'
  prefs: []
  type: TYPE_NORMAL
- en: A VAE tackles the problem of latent space irregularity by making the encoder
    return a Gaussian distribution over the latent space instead of a single point
    and adding regularization in the loss function over that returned distribution.
    In deep learning, data can be compressed to better manage computational resources.
    But the latent space must be spread over a Gaussian distribution to normalize
    it for model consumption.
  prefs: []
  type: TYPE_NORMAL
- en: A major advantage of a VAE is that it describes an observation (in latent space)
    in a Gaussian probabilistic manner to better simulate a natural phenomenon. So
    rather than building an encoder that outputs a single value to describe each latent
    state attribute, a VAE builds one to describe a probability distribution for each
    latent attribute. The result is a generated image of much higher quality.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notebooks for chapters are located at the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`https://github.com/paperd/deep-learning-models`](https://github.com/paperd/deep-learning-models)'
  prefs: []
  type: TYPE_NORMAL
- en: We demonstrate convolutional and variational autoencoders with code examples.
    We begin with a convolutional autoencoder experiment. We continue with a VAE experiment.
    We end with a VAE with Tensorflow Probability (TFP) Layers experiment. The three
    experiments show their superiority over basic stacked autoencoders by producing
    much clearer renditions of the original images.
  prefs: []
  type: TYPE_NORMAL
