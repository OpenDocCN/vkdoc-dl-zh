- en: '[PRE30]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: 'Get input shape for the encoder:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 获取编码器的输入形状：
- en: '[PRE31]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: Scale
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缩放
- en: 'Scale feature images by dividing by the number of pixels in each image:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将每个图像中的像素数除以特征图像的规模：
- en: '[PRE32]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Create a Custom Layer to Sample Codings
  id: totrans-114
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个用于采样编码的自定义层
- en: The sampling layer for the encoder takes two inputs, namely, mean μ and log
    variance γ. It uses the tf.random.normal API to sample a random vector of the
    same shape as γ from the normal distribution with mean of zero (μ=0) and standard
    deviation of 1 (σ=1), multiplies the random vector by exp(γ/2), adds μ, and returns
    the result.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器的采样层接受两个输入，即均值 μ 和对数方差 γ。它使用 tf.random.normal API 从均值为零（μ=0）和标准差为 1（σ=1）的正态分布中采样与
    γ 形状相同的随机向量，将随机向量乘以 exp(γ/2)，加上 μ，并返回结果。
- en: Create the sampling class as shown in Listing [9-6](#PC34).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表 [9-6](#PC34) 所示的采样类。
- en: '[PRE33]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: Create the VAE Model
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建 VAE 模型
- en: 'Clear and seed:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 清除和设置随机种子：
- en: '[PRE34]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Create the encoder as shown in Listing [9-7](#PC36).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表 [9-7](#PC36) 所示的编码器。
- en: '[PRE35]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: We use the Functional API because the model isn’t entirely sequential. The Dense
    layers output codings_mean μ and codings_log_var γ that both have the same inputs
    (i.e., the outputs of the second Dense layer). Both codings_mean and codings_log_var
    are then passed to the sampling layer. The variational_encoder has three outputs,
    namely, codings_mean, codings_log_var, and codings. But we only use the codings
    output.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用功能 API，因为模型并不完全是序列的。密集层输出编码_mean μ 和编码_log_var γ，它们都有相同的输入（即第二个密集层的输出）。编码_mean
    和编码_log_var 然后传递到采样层。variational_encoder 有三个输出，即编码_mean、编码_log_var 和编码。但我们只使用编码输出。
- en: Create the decoder as shown in Listing [9-8](#PC37).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表 [9-8](#PC37) 所示的解码器。
- en: '[PRE36]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: We could have used the Sequential API instead of the Functional API since it
    is really just a simple stack of layers. But we created the VAE decoder in this
    way to match the structure of the VAE encoder.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们本可以使用序列 API 而不是功能 API，因为实际上它只是一个简单的层堆叠。但我们以这种方式创建 VAE 解码器是为了与 VAE 编码器的结构相匹配。
- en: 'Build the VAE model:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 构建VAE模型：
- en: '[PRE37]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: Ignore the first two outputs because we only need the codings.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 忽略前两个输出，因为我们只需要编码。
- en: Compile and Train
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练
- en: Add Latent Loss and Reconstruction Loss to the Model
  id: totrans-131
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 将潜在损失和重建损失添加到模型
- en: Compute latent loss as 1 plus codings_log_var minus the exponential of codings_log_var
    minus the square of codings_mean (1 + codings_log_var − e^(codings_log_var) −
    codings_mean²). Multiply this result by –0.5\. Compute reconstruction loss as
    mean loss over all instances in the batch divided by 784 to ensure appropriate
    scale. We divide by 784 because images are 28 × 28 pixels.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 计算潜在损失为 1 加上编码_log_var 减去编码_log_var 的指数减去编码_mean 的平方（1 + codings_log_var − e^(codings_log_var)
    − codings_mean²）。将此结果乘以 –0.5。计算重建损失为批中所有实例的平均损失除以 784，以确保适当的规模。我们之所以除以 784，是因为图像是
    28 × 28 像素。
- en: As review, an autoencoder is a neural network that receives an image and reconstructs
    it by learning the input features from the image. The encoder creates a latent
    vector from the image. A *latent vector* is a compressed representation of the
    image. The latent vector is fed into a decoder, which reconstructs a facsimile
    of the input image from the latent vector.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 作为复习，自动编码器是一种神经网络，它接收一个图像并通过学习图像的输入特征来重建它。编码器从图像中创建一个潜在向量。*潜在向量*是图像的压缩表示。潜在向量被送入解码器，解码器从潜在向量中重建输入图像的复制品。
- en: A VAE also reconstructs a new image from the learned input features of an image.
    But the encoder creates a sample of latent vectors based on a Gaussian distribution.
    The decoder randomly draws latent vectors from the distribution created by the
    encoder to create new facsimile images. New images are better quality because
    they are based on random latent representations drawn from a Gaussian distribution.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: VAE 还可以从图像的学习输入特征中重建一个新的图像。但编码器基于高斯分布创建潜在向量的样本。解码器从编码器创建的分布中随机抽取潜在向量以创建新的复制品图像。新图像质量更好，因为它们基于从高斯分布中抽取的随机潜在表示。
- en: We restrict the VAE with latent loss. *Latent loss* measures the loss of the
    latent vector against the Gaussian distribution created by the encoder. So latent
    loss penalizes the network based on how close or how far a latent vector is to
    or from the unit Gaussian distribution. The actual image loss is also measured
    to see how well the facsimile image matches the input image. When combining these
    two loss metrics, the network has to find the best trade-off between low latent
    loss (unit Gaussian distribution of latent vectors) and low image loss (high similarity
    between input and facsimile output images). The latent loss only evaluates to
    zero (perfect) when the mean is 0 and the standard deviation is 1, which is unit
    Gaussian.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对 VAE 使用潜在损失进行限制。*潜在损失*衡量潜在向量与编码器创建的高斯分布之间的损失。因此，潜在损失根据潜在向量与单位高斯分布的接近程度或距离来惩罚网络。实际图像损失也进行衡量，以查看复制品图像与输入图像的匹配程度。当结合这两个损失指标时，网络必须在低潜在损失（潜在向量的单位高斯分布）和低图像损失（输入与复制品输出图像之间的高相似度）之间找到最佳权衡。只有当均值是
    0 且标准差是 1 时，潜在损失才评估为零（完美），这对应于单位高斯分布。
- en: Create the restricted VAE as shown in Listing [9-9](#PC39).
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如列表 [9-9](#PC39) 所示的限制 VAE。
- en: '[PRE38]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: 'Compile:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE39]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE39]'
- en: 'Train:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE40]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: 'Visualize training performance:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化训练性能：
- en: '[PRE41]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: Visualize Reconstructions
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化重建结果
- en: 'Inspect the shape of the test set:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 检查测试集的形状：
- en: '[PRE42]'
  id: totrans-146
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Remove the *1* dimension for plotting purposes:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 为了绘图目的，移除 *1* 维度：
- en: '[PRE43]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'Visualize:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化：
- en: '[PRE44]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE44]'
- en: Generate New Images
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成新图像
- en: Create a plotting function as shown in Listing [9-10](#PC46).
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个如列表 [9-10](#PC46) 所示的绘图函数。
- en: '[PRE45]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: Instead of generating reconstructions from image predictions, we create a random
    Gaussian set of codings and reconstruct images directly from the decoder.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是从图像预测中生成重建，而是创建一个随机的高斯编码集，并直接从解码器中重建图像。
- en: 'Generate a few random codings, decode them, and plot the resulting images:'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 生成一些随机编码，解码它们，并绘制结果图像：
- en: '[PRE46]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: Create 12 random codings, decode them with the decoder, and plot them with the
    plotting function.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 创建 12 个随机编码，用解码器解码它们，并用绘图函数绘制它们。
- en: Perform semantic interpolation between the images as shown in Listing [9-11](#PC48).
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [9-11](#PC48) 所示，在图像之间执行语义插值。
- en: '[PRE47]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE47]'
- en: With implicit models like a VAE, we interpolate between sampled points in latent
    space. We do so to match the distributional assumptions on the code vectors with
    the geometry of the interpolating paths. Otherwise, typical assumptions about
    the quality and semantics between coding points may not be justified.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 使用隐式模型如 VAE，我们在潜在空间中的采样点之间进行插值。我们这样做是为了使代码向量的分布假设与插值路径的几何形状相匹配。否则，关于编码点之间质量和语义的典型假设可能是不合理的。
- en: 'Remove the *1* dimension for plotting purposes:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 为了绘图目的，移除 *1* 维度：
- en: '[PRE48]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE48]'
- en: Visualize as shown in Listing [9-12](#PC50).
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如列表 [9-12](#PC50) 所示进行可视化。
- en: '[PRE49]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE49]'
- en: TFP Experiment
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TFP 实验
- en: In this experiment, we fit a VAE using TensorFlow Probability Layers. *TensorFlow
    Probability (TFP)* is a library for probabilistic reasoning and statistical analysis
    in TensorFlow. As part of the TensorFlow ecosystem, TFP provides integration of
    probabilistic methods with deep networks, gradient-based inference using automatic
    differentiation, and scalability to large datasets and models with hardware acceleration
    (e.g., GPUs) and distributed computation.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个实验中，我们使用TensorFlow Probability Layers拟合一个VAE。*TensorFlow Probability (TFP)*
    是TensorFlow中进行概率推理和统计分析的库。作为TensorFlow生态系统的一部分，TFP提供了概率方法与深度网络的集成、基于梯度的推理使用自动微分，以及通过硬件加速（例如GPU）和分布式计算扩展到大型数据集和模型的可伸缩性。
- en: TFP makes it easy to combine probabilistic models and deep learning on modern
    hardware (e.g., TPU, GPU). TFP is designed for data scientists, statisticians,
    ML researchers, and practitioners who want to encode domain knowledge to understand
    data and make predictions.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: TFP使得在现代硬件（例如TPU、GPU）上结合概率模型和深度学习变得容易。TFP是为数据科学家、统计学家、机器学习研究人员和希望将领域知识编码以理解数据和做出预测的从业者设计的。
- en: TFP includes a wide selection of probability distributions and bijectors. The
    *Bijector API* provides modular building blocks for constructing a broad class
    of probability distributions. Bijectors encapsulate the change of variables for
    a probability density. So they can be used to transform a distribution of tensors
    into another type of distribution. Simply, they turn one random outcome into another
    random outcome from a different distribution.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: TFP包括广泛的概率分布和双射。*Bijector API*提供了构建广泛类概率分布的模块化构建块。双射封装了概率密度的变量变化。因此，它们可以用来将张量分布转换为另一种类型的分布。简单来说，它们将一个随机结果转换为来自不同分布的另一个随机结果。
- en: Since TFP inherits the benefits of TensorFlow, we can build, fit, and deploy
    a model using a single language throughout the lifecycle of model exploration
    and production. TFP is open source and available on GitHub.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 由于TFP继承了TensorFlow的优点，我们可以在模型探索和生产整个生命周期中使用单一语言来构建、拟合和部署模型。TFP是开源的，可在GitHub上获取。
- en: 'Load Fashion-MNIST data:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 加载Fashion-MNIST数据：
- en: '[PRE50]'
  id: totrans-171
  prefs: []
  type: TYPE_PRE
  zh: '[PRE50]'
- en: 'Create a function to preprocess the data:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个预处理数据的函数：
- en: '[PRE51]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE51]'
- en: Cast an image to float and scale. Continue by randomly casting image pixels
    to binary form as either *True* or *False* values. The tf.random.uniform API outputs
    random values from a uniform distribution. Notice that the function returns *image,
    image* rather than just image because Keras is intended for use with discriminative
    models with an *(example, label)* input format. Since the goal of a VAE is to
    recover the input x from x itself, the data pair is *(example, example)*.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 将图像转换为浮点数并缩放。接着随机将图像像素转换为二进制形式，作为*True*或*False*值。tf.random.uniform API输出均匀分布的随机值。注意，该函数返回*image,
    image*而不是仅仅image，因为Keras旨在与具有*(example, label)*输入格式的判别性模型一起使用。由于VAE的目标是从x本身恢复输入x，因此数据对是*(example,
    example)*。
- en: 'Establish parameters for the input pipeline:'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 建立输入管道的参数：
- en: '[PRE52]'
  id: totrans-176
  prefs: []
  type: TYPE_PRE
  zh: '[PRE52]'
- en: 'Create the train set:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 创建训练集：
- en: '[PRE53]'
  id: totrans-178
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: 'Create the test set:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 创建测试集：
- en: '[PRE54]'
  id: totrans-180
  prefs: []
  type: TYPE_PRE
  zh: '[PRE54]'
- en: 'Inspect a slice from an image from a batch:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 检查来自批次的图像切片：
- en: '[PRE55]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Notice that pixels are now either Boolean True or False!
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，像素现在要么是布尔值True，要么是False！
- en: 'Inspect the shape of a training batch:'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 检查训练批次的形状：
- en: '[PRE56]'
  id: totrans-185
  prefs: []
  type: TYPE_PRE
  zh: '[PRE56]'
- en: Create a TFP VAE Model
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建TFP VAE模型
- en: Create a TFP independent Gaussian distribution with no learned parameters. Latent
    variable z (encoded_size) is assigned 16 dimensions. Assign the distribution to
    prior as shown in Listing [9-13](#PC58).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个没有学习参数的TFP独立高斯分布。潜在变量z（encoded_size）分配了16个维度。将分布分配到先验，如列表[9-13](#PC58)所示。
- en: '[PRE57]'
  id: totrans-188
  prefs: []
  type: TYPE_PRE
  zh: '[PRE57]'
- en: Notice that prior is independently normalized. A **prior** is an underlying
    assumption we have about the world. A common prior is that we assume a coin to
    be fair (50% heads and 50% tails). Common wisdom is that a prior is not always
    true, but most of the time it is true.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，先验是独立归一化的。**先验**是我们对世界的潜在假设。一个常见的先验是我们假设一枚硬币是公平的（50%正面和50%反面）。常识是先验不一定总是正确的，但大多数情况下它是正确的。
- en: 'Get input shape and assign depth:'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 获取输入形状并分配深度：
- en: '[PRE58]'
  id: totrans-191
  prefs: []
  type: TYPE_PRE
  zh: '[PRE58]'
- en: Base depth is the base number of neurons.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 基础深度是神经元的基本数量。
- en: 'Assign aliases for convenience:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 为方便起见，分配别名：
- en: '[PRE59]'
  id: totrans-194
  prefs: []
  type: TYPE_PRE
  zh: '[PRE59]'
- en: TFP VAE Encoder
  id: totrans-195
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: TFP VAE编码器
- en: Create an encoder with a full-covariance Gaussian distribution with mean and
    covariance matrices parameterized by the output of a neural network. TFP Layers
    enable construction of this complex encoder in an easy format.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个具有全协方差高斯分布的编码器，其均值和协方差矩阵由神经网络的输出参数化。TFP层允许以简单格式构建这个复杂的编码器。
- en: Create the encoder as shown in Listing [9-14](#PC61).
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 创建如图[9-14](#PC61)所示的编码器。
- en: '[PRE60]'
  id: totrans-198
  prefs: []
  type: TYPE_PRE
  zh: '[PRE60]'
- en: The encoder is a normal Keras sequential model with convolutions and dense layers.
    But the output is passed to a TFP Layer (MultivariateNormalTril()), which transparently
    splits the activations from the final Dense layer into the parts needed to specify
    both the mean and the lower triangular covariance matrix. We use the tfpl helper
    MultivariateNormalTriL.params_size(encoded_size) to make the Dense layer output
    the correct number of activations. We also contribute a regularization term to
    the final loss to mitigate overfitting. Specifically, we add Kullback-Leibler
    (KL) divergence regularization between the encoder and the prior to the loss.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 编码器是一个普通的Keras顺序模型，包含卷积和密集层。但输出被传递到一个TFP层（MultivariateNormalTril()），它透明地将最终密集层的激活分解为指定均值和下三角协方差矩阵所需的各个部分。我们使用tfpl辅助函数MultivariateNormalTriL.params_size(encoded_size)来确保密集层输出正确的激活数量。我们还向最终损失中添加了一个正则化项以减轻过拟合。具体来说，我们在编码器和先验之间添加了Kullback-Leibler
    (KL)散度正则化到损失中。
- en: TFP VAE Decoder
  id: totrans-200
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: TFP VAE解码器
- en: Create the decoder as a pixel-independent Bernoulli distribution as shown in
    Listing [9-15](#PC62).
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 创建解码器，如图[9-15](#PC62)所示，作为一个像素独立的伯努利分布。
- en: '[PRE61]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE61]'
- en: The form here is essentially the same as the encoder, but we use transposed
    convolutions to convert our latent representation of a 16-dimensional vector back
    into a 28 × 28 × 1 tensor. That final layer parameterizes the pixel-independent
    Bernoulli distribution.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 此处的形式基本上与编码器相同，但我们使用转置卷积将我们的16维向量的潜在表示转换回28 × 28 × 1张量。最后一层参数化了像素独立的伯努利分布。
- en: Build the TFP VAE Model
  id: totrans-204
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 构建 TFP VAE 模型
- en: 'Build the model:'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 构建模型：
- en: '[PRE62]'
  id: totrans-206
  prefs: []
  type: TYPE_PRE
  zh: '[PRE62]'
- en: 'Check that inputs are as expected:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 检查输入是否符合预期：
- en: '[PRE63]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: Compile and Train
  id: totrans-209
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 编译和训练
- en: 'Set a learning rate:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 设置学习率：
- en: '[PRE64]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: We set this learning rate based on trial and error experimentation. Feel free
    to try different learning rates.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 我们根据试错实验设置这个学习率。请随意尝试不同的学习率。
- en: 'Compile :'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 编译：
- en: '[PRE65]'
  id: totrans-214
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: Our model is just a Keras model where outputs are defined as the composition
    of the encoder and the decoder. Since the encoder already added the Kullback-Leibler
    (KL) divergence term to the loss, we only need to specify the reconstruction loss
    (the first term of the ELBO). KL divergence is a measure of how one probability
    distribution is different from a second one. It is also called relative entropy.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的模型只是一个Keras模型，其中输出被定义为编码器和解码器的组合。由于编码器已经将Kullback-Leibler (KL)散度项添加到损失中，我们只需要指定重建损失（ELBO的第一个项）。KL散度是衡量一个概率分布与第二个分布差异的度量。它也被称为相对熵。
- en: ELBO (Evidence Lower BOund) is a lower bound on log p(x) (or the log probability
    of an observed data point). The first integral in the ELBO equation is the reconstruction
    term. It asks how likely we are to start at an image x, encode it to z, decode
    it, and get back the original x. The second term is the KL divergence term. It
    measures how close our encoder is to the value we assigned to the prior variable.
    We can think of this term as just trying to keep our encoder honest. If our encoder
    generates z samples that are too unlikely given our prior value, the objective
    is worse than if it generates z samples more typical of the prior value. Thus,
    the encoder should differ from the prior value only if the cost of doing so is
    outweighed by the benefit from the reconstruction term.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: ELBO（证据下界）是log p(x)（或观察数据点的对数概率）的下界。ELBO方程中的第一个积分是重建项。它询问我们从一个图像x开始，将其编码为z，解码，并返回原始x的可能性有多大。第二项是KL散度项。它衡量我们的编码器与分配给先验变量的值有多接近。我们可以将这个项视为只是试图让我们的编码器诚实。如果我们的编码器生成的z样本在先验值下太不可能，那么目标函数比它生成更符合先验值的z样本时的目标函数更差。因此，编码器应该只在这样做所带来的成本超过重建项带来的好处时才与先验值不同。
- en: 'Train:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 训练：
- en: '[PRE66]'
  id: totrans-218
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
