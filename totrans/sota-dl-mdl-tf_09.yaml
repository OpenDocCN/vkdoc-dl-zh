  type: TYPE_NORMAL
- en: '[PRE69]'
  id: totrans-225
  prefs: []
  type: TYPE_PRE
  zh: '[PRE69]'
- en: The Python sample() method returns a particular-length list of items chosen
    from a sequence. It is used for random sampling without replacement. The Python
    mode() method applies to nominal (nonnumeric) data. Remember that we converted
    pixel image data to Boolean True or False values. It is used to locate the central
    tendency of numeric or nominal data. The Python mean() method calculates the arithmetic
    average of a given list of numbers. To get clearer reconstruction images, run
    the model for many more epochs (to reduce loss).
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: Python 的 sample() 方法返回一个从序列中选择的特定长度的项目列表。它用于随机抽样而不进行替换。Python 的 mode() 方法适用于名义（非数值）数据。记住，我们将像素图像数据转换为布尔值
    True 或 False。它用于定位数值或名义数据的中心趋势。Python 的 mean() 方法计算给定数字列表的算术平均值。为了获得更清晰的重建图像，运行模型更多轮次（以减少损失）。
- en: Summary
  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this chapter, we demonstrated three state-of-the-art autoencoder experiments.
    Each of these autoencoders produced more realistic renderings of input images
    than basic stacked autoencoders.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们展示了三个最先进的自编码器实验。这些自编码器中的每一个都比基本的堆叠自编码器产生了更逼真的输入图像渲染。
