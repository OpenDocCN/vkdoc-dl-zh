  type: TYPE_NORMAL
- en: First, I would like to thank the team at Apress, especially Smriti Srivastava,
    the acquisitions editor; Shrikant Vishwakarma, the coordinating editor; Matthew
    Moodie, the developmental editor; and everyone else involved in the publishing
    of this book.
  prefs: []
  type: TYPE_NORMAL
- en: I would also like to thank Sarani Mendis, the technical reviewer, for the excellent
    feedback and suggestions that added immense value to this book.
  prefs: []
  type: TYPE_NORMAL
- en: 'To my loving wife, Pramitha: Thank you for the encouragement and the motivation
    you provided from the inception of the idea to the completion. Without your support
    throughout the long hours and days spent writing and perfecting this book, completing
    it might not have been possible.'
  prefs: []
  type: TYPE_NORMAL
- en: To my managers at Pearson PLC, who have guided me throughout the years, I would
    like to express my gratitude for the guidance and encouragement. And to my team
    and colleagues, thank you for all your support that allowed me to achieve this.
  prefs: []
  type: TYPE_NORMAL
- en: And last but not least, to my parents and sister, thank you for the endless
    support throughout the years.
