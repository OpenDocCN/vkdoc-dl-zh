- en: Introduction
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 引言
- en: Do you wish to learn to build practical deep learning and computer vision Systems,
    but are reluctant to switch to Linux for the development? Do you feel like you
    are more familiar with Windows, and wish that you could build everything on Windows?
    Well, you do not need to worry anymore. The latest deep learning and computer
    vision libraries have matured to the point that almost everything now can be made
    to work seamlessly on Windows as well. This book will show you how.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否希望学习如何构建实用的深度学习和计算机视觉系统，但又不愿意切换到Linux进行开发？你是否觉得你对Windows更熟悉，并希望能够在Windows上构建一切？好吧，你再也不用担心了。最新的深度学习和计算机视觉库已经成熟到几乎可以在Windows上无缝运行的程度。本书将向你展示如何做到这一点。
- en: Windows OS accounts for over 70% of desktop PC usage. Windows provides many
    conveniences, with a wide variety of available productivity tools, causing it
    to gather a large user base. Furthermore, due to the better hardware compatibility
    and driver support, most decently to high-powered personal PCs tend to run Windows.
    This means that there is a large percentage of AI enthusiasts and developers out
    there who would like to jump into learning the remarkable capabilities of deep
    learning / AI. But they are reluctant or afraid to take the first steps because
    of the fear of the complexity of the tools and a widely held belief that AI systems
    can only be built on developer-friendly operating systems such as Linux. This
    book aims to help them move past those mental blocks and start building practical
    deep learning systems.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: Windows操作系统占桌面PC使用量的70%以上。Windows提供了许多便利，拥有丰富的生产力工具，因此吸引了大量用户。此外，由于更好的硬件兼容性和驱动程序支持，大多数性能良好的个人电脑倾向于运行Windows。这意味着有大量的人工智能爱好者和发展者希望学习深度学习/人工智能的非凡能力。但他们由于担心工具的复杂性，以及普遍认为AI系统只能在开发者友好的操作系统（如Linux）上构建的信念，而不愿或害怕迈出第一步。本书旨在帮助他们克服这些心理障碍，开始构建实用的深度学习系统。
- en: Deep learning on Windows will help you learn to build deep learning and computer
    vision systems using Python, TensorFlow, Keras, OpenCV, and more, right within
    the familiar elements of Microsoft Windows. The goal of this book is to get as
    many of you interested in the field of deep learning and have the OS you build
    upon a nonbarrier to begin learning.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在Windows上进行深度学习将帮助您学习使用Python、TensorFlow、Keras、OpenCV等工具构建深度学习和计算机视觉系统，这一切都发生在熟悉的Microsoft
    Windows元素中。本书的目标是让尽可能多的您对深度学习领域产生兴趣，并确保您构建的操作系统不会成为学习的障碍。
- en: Along the way, we will learn what deep learning is and how it came to be. We
    will clarify some misconceptions and confusion surrounding deep learning and look
    at some of the major milestones it has achieved throughout the years. We will
    dive into coding, while learning how to apply the concepts as you build. You will
    learn how to set up all the tools and technologies you will need to start coding
    deep learning systems on a Windows system.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个过程中，我们将学习深度学习是什么以及它是如何产生的。我们将澄清围绕深度学习的一些误解和困惑，并回顾它多年来取得的重大里程碑。我们将深入编码，同时学习如何在构建过程中应用这些概念。您将学习如何在Windows系统上设置所有您需要的工具和技术，以开始编写深度学习系统代码。
- en: 'In this book, you will:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书中，您将：
- en: Learn the concepts, history, and milestones behind deep learning and how it
    relates to machine learning and AI while resolving some misconceptions surrounding
    those AI concepts.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习深度学习背后的概念、历史和里程碑，以及它与机器学习和人工智能的关系，同时解决围绕这些人工智能概念的某些误解。
- en: Learn the tools you would require (TensorFlow, Keras, OpenCV, CUDA, etc.) to
    successfully learn building deep learning systems, and learn how to set up, configure,
    and troubleshoot them step by step. Learn to get the tools working on Microsoft
    Windows and learn why the OS or the hardware you are developing in does not hold
    you back in building state-of-the-art AI systems. This should allow you to break
    any mental barriers and apply what you have learned in any OS or other system.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习您需要（TensorFlow、Keras、OpenCV、CUDA等）的工具来成功构建深度学习系统，并学习如何逐步设置、配置和解决它们的问题。学习如何在Microsoft
    Windows上使这些工具工作，并了解为什么操作系统或您正在开发的硬件不会阻碍您构建最先进的AI系统。这应该允许您打破任何心理障碍，并将您所学应用到任何操作系统或其他系统中。
- en: Learn to build your first deep learning model and understand how the concepts
    of each step of it work through code examples. Learn how to visualize the internal
    workings and the structure of a model to gain a deeper understanding of how they
    work, and apply that experience to develop more complex models in the future.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习构建您的第一个深度学习模型，并通过代码示例了解其每个步骤的概念是如何工作的。学习如何可视化模型内部的工作原理和结构，以获得对它们如何工作的更深入理解，并将这些经验应用到未来开发更复杂模型中。
- en: Learn to build real-world, practical deep learning computer vision systems with
    limited amounts of data with the concepts of transfer learning and fine-tuning.
    Learn how to configure training of larger models with large datasets, and ways
    you can deploy your application once trained.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习使用迁移学习和微调的概念，在有限的数据量下构建现实世界、实用的深度学习计算机视觉系统。学习如何配置大型数据集上更大模型的训练，以及训练完成后如何部署您的应用程序。
- en: Once you have mastered the basics, learn more exciting and advanced concepts
    such as generative adversarial networks, and reinforcement learning (for basics
    in game programming).
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一旦你掌握了基础知识，就可以学习更多令人兴奋和高级的概念，例如生成对抗网络和强化学习（游戏编程的基础）。
- en: The book is meant for you if you are an enthusiast of machine learning and AI—from
    the beginner to intermediate level—and would like to get a taste of what deep
    learning can do. It is meant for you if you prefer to jump in and learn through
    a hands-on, practical way by trying out coding and are not afraid to get your
    hands dirty with code. And finally, this book is meant for you if you desire to
    build practical, real-world AI systems.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是机器学习和AI的爱好者，从入门到中级水平，并想尝试一下深度学习能做什么，这本书就是为你准备的。如果你喜欢通过动手实践、通过尝试编码来学习，并且不害怕与代码打交道，这本书也是为你准备的。最后，如果你渴望构建实用、真实的AI系统，这本书也是为你准备的。
- en: Acknowledgments
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 致谢
- en: Like many others, this book also started as a single thought. Even with experience
    in publishing two earlier books, it was a challenging journey. From the beginning
    and along the way, I have received support and encouragement from many, and I
    would like to express my sincere gratitude here.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 就像许多人一样，这本书也是从一个单独的想法开始的。即使我有出版两本早期书籍的经验，这仍然是一次充满挑战的旅程。从一开始到过程中，我都得到了许多人的支持和鼓励，在此我想表达我真诚的感激。
- en: First, I would like to thank the team at Apress, especially Smriti Srivastava,
    the acquisitions editor; Shrikant Vishwakarma, the coordinating editor; Matthew
    Moodie, the developmental editor; and everyone else involved in the publishing
    of this book.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我要感谢Apress团队，特别是收购编辑Smriti Srivastava，协调编辑Shrikant Vishwakarma，发展编辑Matthew
    Moodie，以及参与本书出版的每一个人。
- en: I would also like to thank Sarani Mendis, the technical reviewer, for the excellent
    feedback and suggestions that added immense value to this book.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想感谢技术审稿人Sarani Mendis，感谢你提供的优秀反馈和建议，这些反馈和建议为本书增添了巨大的价值。
- en: 'To my loving wife, Pramitha: Thank you for the encouragement and the motivation
    you provided from the inception of the idea to the completion. Without your support
    throughout the long hours and days spent writing and perfecting this book, completing
    it might not have been possible.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 致我亲爱的妻子，Pramitha：感谢你从想法的诞生到完成的整个过程所给予的鼓励和动力。如果没有你在写作和润色这本书的漫长时日里的支持，完成它可能是不可能的。
- en: To my managers at Pearson PLC, who have guided me throughout the years, I would
    like to express my gratitude for the guidance and encouragement. And to my team
    and colleagues, thank you for all your support that allowed me to achieve this.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢Pearson PLC的经理们多年来对我的指导，我要表达我的感激之情。还要感谢我的团队和同事们，感谢你们所有的支持，这使我能够实现这一目标。
- en: And last but not least, to my parents and sister, thank you for the endless
    support throughout the years.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，我要感谢我的父母和姐姐，感谢你们多年来无休止的支持。
