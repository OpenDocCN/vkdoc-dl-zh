- en: '2. The Foundation: Markov Decision Processes'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2. 基础：马尔可夫决策过程
- en: As discussed in Chapter [1](502835_2_En_1_Chapter.xhtml), reinforcement learning
    involves sequential decision-making. This chapter formalizes the notion of using
    stochastic processes under the branch of probability that models sequential decision-making
    behavior. Although most of the problems you’ll study in reinforcement learning
    are modeled as *Markov decision processes* (MDP), this chapter starts by introducing
    Markov chains (MC) followed by Markov reward processes (MRP). Next, the chapter
    discusses MDP in-depth while covering model setup and the assumptions behind MDP.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
  zh: 如第 [1](502835_2_En_1_Chapter.xhtml) 章所述，强化学习涉及序列决策。本章在概率论中关于模型序列决策行为的分支下，形式化了使用随机过程的概念。尽管你将在强化学习中研究的许多问题都被建模为
    *马尔可夫决策过程* (MDP)，但本章首先介绍了马尔可夫链 (MC)，然后是马尔可夫奖励过程 (MRP)。接下来，本章深入讨论了 MDP，同时涵盖了模型设置和
    MDP 背后的假设。
- en: The chapter then discusses related concepts, such as value functions of state
    and action value functions of state-action pairs. It follows with an in-depth
    discussion of the various forms of Bellman equations, like Bellman expectation
    equations and Bellman optimality equations. It also includes a quick introduction
    to various types of learning algorithms. With the framework of MDP in place, the
    chapter switches gears to train a couple of agents, along the way covering a high-level
    overview of the software libraries you will using in this book. While the chapter’s
    focus is the theoretical foundations of reinforcement learning, it includes examples
    and exercises to help cement these concepts. There is no better way to learn than
    to code yourself, which is a recurring theme of this book.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 本章随后讨论了相关概念，例如状态值函数和状态-动作对的动作值函数。接着深入讨论了各种形式的贝尔曼方程，如贝尔曼期望方程和贝尔曼最优方程。还包括对各种学习算法的简要介绍。在
    MDP 框架建立之后，本章转向训练几个智能体，同时概述了本书中将使用的软件库。虽然本章的重点是强化学习的理论基础，但它包括示例和练习来帮助巩固这些概念。没有比亲自编码更好的学习方法了，这是本书的一个反复出现的主题。
- en: This chapter finishes with a brief discussion of the different approaches to
    RL training.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本章最后简要讨论了 RL 训练的不同方法。
- en: Definition of Reinforcement Learning
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习的定义
- en: The previous chapter explained the cycle of an agent interacting with the environment
    by taking an action based on its current state, getting a numerical reward, and
    finding itself in a new state. Figure [2-1](#Fig1) illustrates this concept.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 上一章解释了智能体通过根据其当前状态采取动作、获得数值奖励并发现自己处于新状态来与环境交互的循环。图 [2-1](#Fig1) 阐述了这一概念。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig1_HTML.jpg)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig1_HTML.jpg)'
- en: A block diagram of the agent and environment interaction cycle has two blocks
    labeled agent and environment. Environment leads to the agent via S t, R t + 1,
    and S t + 1\. Agent leads to the environment via A t.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体和环境交互循环的方框图有两个标记为智能体和环境的方框。环境通过 S t, R t + 1, 和 S t + 1 引导智能体。智能体通过 A t 引导环境。
- en: Figure 2-1
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-1
- en: The cycle of agent-environment interaction
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体-环境交互循环
- en: The agent at time *t* is in a state *S*[*t*]. From the set of actions, the agent
    can take in this state it takes a specific action, *A*[*t*]. At this point, the
    system transitions to the next time tick (*t* + 1). The environment responds to
    the agent with a numerical reward, *R*[*t* + 1] as well as puts the agent in a
    new state, *S*[*t* + 1]. The cycle of “state to action to reward and next state”
    goes on until the time agent reaches some end-goal state, like the end of a game,
    the completion of a task, or the end of a specified number of time steps.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在时间 *t* 的智能体处于状态 *S*[*t*]。从该状态可采取的动作集中，智能体选择一个特定的动作，*A*[*t*]。在此时刻，系统过渡到下一个时间刻度
    (*t* + 1)。环境对智能体响应以数值奖励，*R*[*t* + 1]，并将智能体置于新的状态，*S*[*t* + 1]。这种“状态到动作到奖励和下一个状态”的循环会一直持续到智能体达到某个终止状态，例如游戏的结束、任务的完成或指定的时间步数的结束。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Figa_HTML.jpg)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Figa_HTML.jpg)'
- en: A horizontal flow diagram. The current state S t leads to action taken A t when
    the agent acts. A t leads to the reward and new state, R t + 1, S t + 1, when
    the environment reacts. A sequence of S 0, A 0, R 1, S 1, A 1, R 2, S 2, A 2,
    R 3, S 3, A 3, R 4, S 4, and ellipsis is at the bottom.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 一个水平流程图。当前状态 S t 在智能体采取动作时导致动作 A t。当环境对智能体的动作做出反应时，A t 导致奖励和新的状态，R t + 1, S
    t + 1。一系列的 S 0, A 0, R 1, S 1, A 1, R 2, S 2, A 2, R 3, S 3, A 3, R 4, S 4，以及底部的省略号。
- en: There is a cycle of state, action, reward, and next state (*S*[*t*], *A*[*t*],
    *R*[*t* + 1], *S*[*t* + 1]).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 状态、动作、奖励和下一个状态（*S*[*t*], *A*[*t*], *R*[*t* + 1], *S*[*t* + 1]）之间存在一个循环。
- en: The agent takes an action based on the state it finds itself in, that is, the
    agent “acts” by taking an action. The environment “reacts” to the agent’s action
    by rewarding the agent with some numeric reward and transitioning the agent to
    a new state. The agent’s objective is to take a sequence of actions that maximizes
    the sum total of rewards it gets from the environment.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体根据其所在的状态采取动作，也就是说，智能体通过采取动作来“行动”。环境通过给予智能体一些数值奖励并将智能体转移到新状态来对智能体的动作做出反应。智能体的目标是采取一系列动作，以最大化从环境中获得的奖励总和。
- en: The purpose of reinforcement learning is to have the agent learn the best possible
    action for each of the states it could find itself in, keeping in mind the cumulative
    reward maximization objective.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习的目的是让智能体学习在它可能遇到的所有状态下可能采取的最佳动作，同时考虑到累积奖励最大化的目标。
- en: As an example, consider the game of chess. The position of a piece on the board
    could form the current state (*S*[*t*]). The agent (player) takes action (*A*[*t*])
    by moving a chess piece. The agent gets a reward (*R*[*t* + 1])—let’s say 0 for
    a safe move and -1 for a move leading to checkmate. The game also moves to a new
    state, (*S*[*t* + 1]).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 以国际象棋为例。棋盘上棋子的位置可以形成当前状态（*S*[*t*]）。智能体（玩家）通过移动棋子来采取动作（*A*[*t*]）。智能体获得奖励（*R*[*t* + 1]）——比如说，安全移动得0分，导致将死的移动得-1分。游戏也转移到新状态（*S*[*t* + 1]）。
- en: In the literature, states are sometimes referred to as *observations* to distinguish
    between the fact that in some situations the agent may get to see only partial
    details of the actual state. This partially observable state is known as *observation*.
    The agent uses the full or partial state information, as may be available, to
    make decisions with respect to the action it should take. It is an important aspect
    in real-life implementations to understand what will be observed by the agent
    and how detailed it will be. The choice and theoretical guarantee of the learning
    algorithm can be significantly influenced by the level of partial observability.
    This chapter initially focuses on situations where state and observations are
    the same; in other words, the agent knows every possible detail of the current
    state. But starting in Chapter [5](502835_2_En_5_Chapter.xhtml), you will start
    looking at situations where the state is either not fully known or, even if fully
    known, needs to be summarized using some kind of approximation.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在文献中，状态有时被称为 *观察*，以区分在某些情况下智能体可能只能看到实际状态的局部细节。这种部分可观察的状态被称为 *观察*。智能体使用可用的全部或部分状态信息，根据它应该采取的动作做出决策。在现实生活中的实现中，理解智能体将观察到什么以及观察的详细程度是一个重要的方面。学习算法的选择和理论保证可以受到部分可观察程度的影响。本章最初关注状态和观察结果相同的情况；换句话说，智能体知道当前状态的每一个可能的细节。但从第
    [5](502835_2_En_5_Chapter.xhtml) 章开始，你将开始研究状态可能不完全已知或即使完全已知，也需要使用某种近似方法进行总结的情况。
- en: Let’s now go through a couple of examples to understand in depth the cycle of
    state/observation to action to reward to the next state. The book uses a Python
    library by *Gymnasium,* which is a maintained fork of the *Gym* library by OpenAI.
    Gym by OpenAI has stopped new development and all the additions now happen in
    the Gymnasium library. Gymnasium implements some common simple environments. Let’s
    look at the first environment, called `MountainCar-v0,` from the Gymnasium library.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们通过几个例子来深入理解状态/观察结果到动作再到奖励再到下一个状态的循环。这本书使用了一个名为 *Gymnasium* 的 Python 库，它是
    OpenAI 的 *Gym* 库的维护分支。OpenAI 的 Gym 已经停止了新开发，所有新增内容现在都在 Gymnasium 库中。Gymnasium
    实现了一些常见的简单环境。让我们看看 Gymnasium 库中的第一个环境，称为 `MountainCar-v0`。
- en: The first step is to start your Jupyter Notebook and navigate to `2.a-RL-environment.ipynb`
    or you can open the notebook in Google Colab. Refer to Chapter [1](502835_2_En_1_Chapter.xhtml)
    for how to set up a local environment or the steps to follow to run the notebook
    directly on Google Colab.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是启动你的 Jupyter Notebook 并导航到 `2.a-RL-environment.ipynb`，或者你也可以在 Google Colab
    中打开笔记本。参考第 [1](502835_2_En_1_Chapter.xhtml) 章，了解如何设置本地环境或直接在 Google Colab 上运行笔记本的步骤。
- en: Once you have opened the notebook, read further to explore the environment and
    related code. In the `MountainCar` environment, there is a hill that the car is
    trying to climb with the end goal of reaching the flag on the top-right side of
    the hill. The car is not powerful enough, so the car needs to swing to the left
    and then accelerate to the right to reach the goal. This back-and-forth swing
    needs to happen multiple times so that the car can gain enough momentum and reach
    the flag at the right-top side of the valley. See Figure [2-2](#Fig2).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你打开了笔记本，继续阅读以探索环境和相关代码。在 `MountainCar` 环境中，有一座山，汽车试图爬上这座山，最终目标是到达山右上方的旗帜。汽车不够强大，因此汽车需要向左摆动，然后向右加速以达到目标。这种来回摆动需要发生多次，以便汽车获得足够的动量，达到山谷右上方的旗帜。见图
    [2-2](#Fig2)。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig2_HTML.jpg)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig2_HTML.jpg)'
- en: A line graph of the mountain car v 0 environment has a U-shaped curve with its
    vertex at (220, 340). The car and flag points are indicated at (210, 340) and
    (560, 70), respectively. The values are approximated.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '`MountainCar` 环境的线形图呈现一个顶点在 (220, 340) 的 U 形曲线。汽车和旗帜的位置分别标记在 (210, 340) 和 (560,
    70)。这些值是近似值。'
- en: Figure 2-2
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-2
- en: MountainCar-v0 environment. This environment has a two-dimensional state and
    a set of three discrete actions
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '`MountainCar-v0` 环境。这个环境具有二维状态和一组三个离散动作。'
- en: Listing [2-1](#PC1) shows the code needed to test the `MountainCar` environment.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 列表 [2-1](#PC1) 展示了测试 `MountainCar` 环境所需的代码。
- en: '[PRE0]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s walk through the code line by line. You first import the Gymnasium library
    by using `import gymnasium as gym`. Gymnasium has multiple environments implemented
    for reinforcement learning. You will be using some of these environments as you
    go through the chapters of this book.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们逐行分析代码。首先，使用 `import gymnasium as gym` 导入 Gymnasium 库。Gymnasium 实现了多个用于强化学习的环境。你将在阅读本书的章节时使用其中的一些环境。
- en: 'Moving on, you instantiate the `MountainCar` environment with `env = gym.make(''MountainCar-v0'',...).`
    This is followed by initializing the environment through `obs = env.reset()`,
    which returns the initial observation. In the case of `MountainCar`, the observation
    is a tuple of two values: `(x-position, x-velocity)`. The agent uses observation
    to find the best action: `action = policy(obs)`.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，你使用 `env = gym.make('MountainCar-v0',...).` 实例化 `MountainCar` 环境。随后通过 `obs
    = env.reset()` 初始化环境，这会返回初始观察值。在 `MountainCar` 的例子中，观察值是一个包含两个值的元组：`(x-position,
    x-velocity)`。智能体使用观察值来找到最佳动作：`action = policy(obs)`。
- en: 'In Listing [2-1](#PC1), the agent is taking random actions. However, as you
    progress through the book, you will learn different algorithms that can be used
    to find reward-maximizing policies. For the `MountainCar` environment, there are
    three possible actions: accelerate left, do nothing, and accelerate right. The
    agent passes the action to the environment. At this point, the system conceptually
    takes a time step, moving from time *t* to time *t* + 1.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在列表 [2-1](#PC1) 中，智能体正在采取随机动作。然而，随着你阅读本书的进展，你将学习到不同的算法，这些算法可以用来找到奖励最大化的策略。对于
    `MountainCar` 环境，有三种可能的行为：向左加速、不采取行动和向右加速。智能体将动作传递给环境。在这个时候，系统在概念上采取一个时间步，从时间
    *t* 移动到时间 *t* + 1。
- en: 'The environment executes the action and returns a tuple of five values: *new
    observation* at time (*t* + 1), *reward* (*r*[*t* + 1]), *terminated* flag, *truncated*
    flag, and some debug info. Note that the Gym environment from OpenAI had a *done*
    flag, which has now been split into two flags in the Gymnasium library*—truncated*
    and *terminated*. The reason for this split is to provide better control. For
    now, just think of the old done flag as a combination of truncated and terminated
    flags with the expression (`done = terminated or truncated`).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 环境执行动作并返回五个值的元组：时间 (*t* + 1) 的 *新观察值*，*奖励值* (*r*[*t* + 1])，*终止* 标志，*截断* 标志，以及一些调试信息。请注意，OpenAI
    的 Gym 环境有一个 *done* 标志，现在在 Gymnasium 库中已被拆分为两个标志——*截断* 和 *终止*。这种拆分的原因是为了提供更好的控制。目前，只需将旧的
    done 标志视为截断和终止标志的组合，表达式为 (`done = terminated or truncated`)。
- en: Next, the agent uses the new observation to get back a new tuple of five values—*next
    state, reward, terminated, truncated, and debug* info. This cycle of “state to
    action to reward to new state” goes on until the game ends (i.e., terminated)
    or until it times out (i.e., truncated). In this setup, the agent gets a reward
    of -1 at each time step, with a reward of 0 when the game ends. Accordingly, the
    agent’s objective is to reach the flag in the shortest possible number of steps.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，代理使用新的观察值来获取一个新的五个值的元组——*下一个状态，奖励，终止，截断，和调试* 信息。这个“状态到动作到奖励到新状态”的循环会一直进行，直到游戏结束（即终止）或超时（即截断）。在这个设置中，代理在每个时间步获得
    -1 的奖励，游戏结束时获得 0 的奖励。因此，代理的目标是以尽可能少的步骤到达旗帜。
- en: Let’s look at yet another environment. Replace the `line env = gym.make('MountainCar-v0',
    ...)` with `env = gym.make('CartPole-v1', render_mode="rgb_array")` and again
    run the code in Listing [2-1](#PC1). See Figure [2-3](#Fig3).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再看看另一个环境。将 `line env = gym.make('MountainCar-v0', ...)` 替换为 `env = gym.make('CartPole-v1',
    render_mode="rgb_array")`，然后再次运行列表 [2-1](#PC1) 中的代码。见图 [2-3](#Fig3)。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig3_HTML.jpg)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图 2-3](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig3_HTML.jpg)'
- en: A line graph of the cartpole v 1 environment has a horizontal line between (0,
    300) and (600, 300). The location of the cartpole is indicated symbolically at
    (300, 300). The values are approximated.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 车杆 v 1 环境的线图在 (0, 300) 和 (600, 300) 之间有一条水平线。车杆的位置以符号形式表示在 (300, 300)。这些值是近似的。
- en: Figure 2-3
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-3
- en: The CartPole-v1 environment. The objective is to keep the pole upright as long
    as possible
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: CartPole-v1 环境的目标是尽可能长时间地保持杆竖直。
- en: The `CartPole` environment has an observation space consisting of four values.
    The cart’s position on the x-axis and velocity along the x-axis are the first
    two values. The tilt angle of the pole is the third value in the observation tuple
    and it has to be between −24° to 24°. The fourth value in the observation tuple
    is the angular velocity of the pole.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`CartPole` 环境的观察空间由四个值组成。车在 x 轴上的位置和沿 x 轴的速度是前两个值。杆的倾斜角度是观察元组中的第三个值，它必须在 -24°
    到 24° 之间。观察元组中的第四个值是杆的角速度。'
- en: Possible actions are 0 and 1, which push the cart to the left or right, respectively.
    The agent keeps getting the reward of 1 at each time step, thereby incentivizing
    the agent to balance the pole for the longest possible duration and earn as many
    points as possible. The game ends if the pole tilts more than 12^o on either side
    or if the cart moves more than 2.4 on either side, that is, the cart reaches either
    ends or if 200 steps have been taken.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 可能的动作是 0 和 1，分别将车推到左边或右边。代理在每个时间步都获得 1 的奖励，从而激励代理尽可能长时间地保持杆的平衡，并尽可能多地获得分数。如果杆倾斜超过
    12^o 或车移动超过 2.4，游戏就结束了，即车到达两端或走了 200 步。
- en: You may have noticed that the code setup is the same in both cases. I just changed
    one code line to instantiate different environments. The rest of the code to step
    through the environment and receive feedback remains the same. The abstraction
    provided by the Gymnasium library makes it easier to test a particular algorithm
    across many environments. Further, you can also create your own custom environment
    based on the problem at hand.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经注意到，在这两种情况下代码设置都是相同的。我只是改变了一行代码来实例化不同的环境。遍历环境和接收反馈的其余代码保持不变。Gymnasium 库提供的抽象使得在不同的环境中测试特定的算法变得更加容易。此外，你还可以根据手头的问题创建自己的自定义环境。
- en: This section covered a brief definition of reinforcement learning and the basics
    of the Gymnasium environment that you will be using. In the upcoming sections,
    you will learn about the different components of a problem set up as reinforcement
    learning (RL) in detail.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 本节简要介绍了强化学习的定义以及你将使用的Gymnasium环境的基本知识。在接下来的章节中，你将详细了解作为强化学习（RL）问题设置的不同组件。
- en: Agent and Environment
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理和环境
- en: The setup of the agent and environment is a flexible one. The agent is a closed
    system and it gets the state/observation details from outside the system. It uses
    policy that could be handcrafted or learned, to take an action with a goal to
    maximize the rewards the agent is seeking. The agent gets a reward from the environment
    based on the current observation/state and the action the agent takes. The agent
    has no direct control over what those rewards will be—rather, the agent can influence
    it by taking good actions given the state it finds itself in. The agent also does
    not control the transition from state to state. The transition depends on the
    environment, and the agent can only influence the outcome indirectly by deciding
    which action to take in each state it finds itself in.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 代理和环境设置是灵活的。代理是一个封闭系统，它从系统外部获取状态/观察细节。它使用可能是手工制作或学习到的策略，以实现最大化代理寻求的奖励为目标采取行动。代理根据当前的观察/状态和采取的行动从环境中获得奖励。代理无法直接控制这些奖励将是什么——相反，代理可以通过在当前状态下采取良好行动来间接影响它。代理也无法控制状态之间的转换。转换取决于环境，代理只能通过在每个状态下决定采取哪个行动来间接影响结果。
- en: 'On the other hand, the environment is everything that is outside the agent.
    In other words, it could be the rest of whole world. However, the environment
    is usually defined in a more narrow way: to comprise information that could influence
    the reward. The environment receives the action the agent wants to take. It provides
    feedback to the agent in the form of reward and transitions to a new state based
    on the action the agent took. Next, the environment provides part/all of the revised
    state information to the agent, which becomes the agent’s new observation/state.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，环境是指代理之外的一切。换句话说，它可能是整个世界。然而，环境通常以更狭窄的方式定义：包括可能影响奖励的信息。环境接收代理想要采取的行动。它以奖励和基于代理采取的行动的新状态转换的形式向代理提供反馈。接下来，环境向代理提供部分/全部修订后的状态信息，这成为代理的新观察/状态。
- en: The boundary between the agent and the environment is an abstract one. It is
    defined based on the task at hand and the goal you are trying to achieve in a
    particular case. Let’s look at some examples.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 代理和环境之间的边界是抽象的。它根据手头的任务和特定情况下你试图实现的目标来定义。让我们看看一些例子。
- en: Consider the case of an autonomous car. The agent state could be the visuals
    from multiple cameras, light detection and ranging (LiDAR), and the other sensor
    readings as well as geocoordinates. While the “environment” is everything outside
    the agent, that is, the whole world, the agent’s relevant state/observation is
    only those parts of the world that are relevant for the agent to take an action.
    The position and actions of a pedestrian two blocks away may not be relevant for
    an autonomous car to make decisions and hence do not need to be part of the observation/state
    of the agent. The action space of an autonomous car could be defined in terms
    of gas-pedal values, breaks, and steering controls. The actions taken by the vehicle
    result in transitioning the car into a new observation state. This cycle goes
    on. The agent (i.e., the autonomous car) is expected to take actions that maximize
    the reward based on a specific goal, for example, going from Point A to Point
    B.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑自动驾驶汽车的情况。代理的状态可能是来自多个摄像头的视觉信息、光探测与测距（LiDAR）以及其他传感器的读数，以及地理坐标。虽然“环境”是代理之外的一切，即整个世界，但代理的相关状态/观察仅限于对代理采取行动相关的世界部分。两个街区外行人的位置和行动可能对自动驾驶汽车做出决策不相关，因此不需要成为代理的观察/状态的一部分。自动驾驶汽车的动作空间可以用油门值、刹车和转向控制来定义。车辆采取的行动导致汽车进入新的观察状态。这个过程不断循环。预期代理（即自动驾驶汽车）将根据特定目标采取最大化奖励的行动，例如，从点A到点B。
- en: Let’s consider another example of a robot trying to solve a Rubik’s Cube. The
    observation/state in this case would the configuration of the Rubik Cube’s six
    faces, and the actions would be the manipulations that can be performed on the
    Rubik’s Cube. The reward could be -1 for each time step and 0 at the end of a
    successful solution, that is, on termination. Such a reward setup will incentivize
    the agent to find the least number of manipulations to solve the puzzle.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑另一个例子，一个机器人试图解决魔方。在这种情况下，观察/状态将是魔方六个面的配置，动作将是可以在魔方上执行的操作。奖励可以是每个时间步 -1，在成功解决后，即终止时为
    0。这样的奖励设置将激励智能体找到解决谜题所需的最少操作数。
- en: In this setup where you will be using the Gymnasium environment, observations
    will always be a tuple of various values with the exact composition dependent
    on the specific Gymnasium environment. Actions will be dependent on the specific
    environment. Rewards will be provided by the environment with the exact real number
    dependent on the specific Gymnasium environment. The agent in this case will be
    the software program that you write. The agent’s (software program) main job will
    be to receive observation from the Gymnasium environment, take an action, and
    wait for the environment to provide feedback in terms of the reward and the next
    state.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在你将使用 Gymnasium 环境的设置中，观察结果将始终是一系列值的元组，其确切组成取决于具体的 Gymnasium 环境。动作将取决于具体环境。奖励将由环境提供，具体数值取决于具体的
    Gymnasium 环境。在这种情况下，智能体将是您编写的软件程序。智能体（软件程序）的主要任务是从 Gymnasium 环境接收观察结果，采取一个动作，并等待环境提供关于奖励和下一个状态的反馈。
- en: Although this describes discrete steps—that is, the agent in state (*S*[*t*])
    taking an action (*A*[*t*]) and, in the next time step, receiving a reward (*R*[*t* + 1])
    and the next state (*S*[*t* + 1])—many times the nature of the real-life problem
    would be a continuous one. In such cases, you could conceptually divide the time
    into small discrete time steps, thereby modeling the problem back into the discrete
    time-step environment and solving it using the familiar setup shown earlier.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这描述了离散的步骤——即，处于状态 (*S*[*t*]) 的智能体采取一个动作 (*A*[*t*])，并在下一个时间步中接收一个奖励 (*R*[*t* + 1])
    和下一个状态 (*S*[*t* + 1])——但现实生活中许多问题往往是连续的。在这种情况下，你可以从概念上将时间划分为小的离散时间步，从而将问题建模回离散时间步环境，并使用前面展示的熟悉设置来解决它。
- en: 'At the most general level, when the agent finds itself in state *S*, it can
    take one of the many possible actions with some probability distribution over
    the space of actions. Such policies are known as *stochastic policies*. Further,
    in some cases the agent may take only one specific action for a given state every
    time the agent finds itself in that state. Such policies are known as *deterministic
    policies*. A policy is defined as follows:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在最一般的情况下，当智能体发现自己处于状态 *S* 时，它可以以某种概率分布采取许多可能动作中的一个。这类策略被称为**随机策略**。此外，在某些情况下，智能体在每次发现自己处于该状态时可能只采取一个特定动作。这类策略被称为**确定性策略**。策略的定义如下：
- en: '![$$ \uppi =p\left(a|s\right) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ1.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![策略函数](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ1.png)'
- en: (2-1)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: (2-1)
- en: That is, the probability of taking an action *a* when the agent is in state
    *s*.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 即，当智能体处于状态 *s* 时采取动作 *a* 的概率。
- en: Similarly, at a most general level, the reward received and the next state of
    the agent would be a probability distribution over the possible values of rewards
    and next states. This is known as *transition dynamics*.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，在最一般的情况下，智能体收到的奖励和下一个状态将是对可能奖励值和下一个状态的概率分布。这被称为**转移动力学**。
- en: '![$$ \mathrm{p}\left({\mathrm{s}}^{\prime },\mathrm{r}\right)=\left\{\mathit{\Pr}\;{S}_t={s}^{\prime
    },{R}_t=r\;|\;{S}_{t-1}=s,{A}_{t-1}=a\right\} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ2.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![概率转移函数](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ2.png)'
- en: (2-2)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: (2-2)
- en: where *S*[*t*] and *S*[*t* − 1] belong to all possible states, also called state/observation
    space. *A*[*t*] belongs to all possible actions, also called action space, and
    reward *r* is a numerical value. The previous equation defines the probability
    of the next state being *s′* and the reward being *r* when the last state was
    *s* and the agent took an action, *a*. Figure [2-4](#Fig4) shows the relationship
    between the state, the action, and feedback from the environment in the form of
    the next state and reward.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *S*[*t*] 和 *S*[*t* − 1] 属于所有可能的状态，也称为状态/观察空间。*A*[*t*] 属于所有可能的行为，也称为行为空间，奖励
    *r* 是一个数值。前面的方程定义了在最后状态为 *s* 且代理采取动作 *a* 时，下一个状态为 *s′* 和奖励为 *r* 的概率。图 [2-4](#Fig4)
    展示了状态、动作和环境以下一个状态和奖励形式反馈之间的关系。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig4_HTML.jpg)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图2-4](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig4_HTML.jpg)'
- en: A process flow between agent and environment. The brain represents the agent.
    The agent sends the action as per policy pi to the environment, while receiving
    the state observation and reward and the next state as per transition. The environment
    graph has a horizontal line at 300 with a cartpole at the center.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 代理与环境之间的流程。大脑代表代理。代理根据策略π向环境发送动作，同时接收状态观察、奖励和下一个状态作为转换。环境图中在300处有一条水平线，中心有一个小车杆。
- en: Figure 2-4
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-4
- en: Agent and environment interaction
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 代理与环境交互
- en: Rewards
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励
- en: In reinforcement learning, a reward is a signal from the environment to the
    agent to let the agent know how good or bad the action was. The agent uses this
    feedback to fine-tune its knowledge and learn to take good actions that maximize
    the rewards. It gives rise to some important questions, such as what do you maximize,
    the immediate reward for the last action or the reward over the complete life
    history? What happens when the agent does not know enough about the environment?
    How much should it explore the environment by taking some random steps before
    it starts? This dilemma is known as the *exploration versus exploitation dilemma*.
    I will keep coming back to this point as I go through various algorithms. The
    objective of the agent to maximize the cumulative total rewards is known as the
    *reward hypothesis*.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习中，奖励是环境向代理发送的信号，让代理知道动作的好坏。代理使用这种反馈来微调其知识，并学习采取能够最大化奖励的良好动作。这引发了一些重要问题，例如，你最大化的是什么，是最后动作的即时奖励还是整个生命历程中的奖励？当代理对环境了解不足时会发生什么？在开始之前，它应该通过采取一些随机步骤探索环境多少？这种困境被称为*探索与利用的困境*。随着我通过各种算法，我会不断回到这个点上。代理最大化累积总奖励的目标被称为*奖励假设*。
- en: To reiterate, a reward is a signal, or a scalar numerical value, that the environment
    sends back to the agent to inform the agent of the quality of the agent’s action
    and the quality of the resulting state/observation due to that action. Note that
    the observations could be multidimensional—such as two-dimensional for `MountainCar`
    and four-dimensional for `CartPole`. Similarly, actions can be multidimensional,
    for example, acceleration value and steering angle for the autonomous car scenario.
    However, in each such case, the reward is always a scalar real number. It may
    seem limiting to have only a single value, but it is not. At the end, the agent
    is trained for the purpose of reaching a goal, and rewards codify that progress.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，奖励是一个信号，或者是一个环境发送回代理的标量数值，用来通知代理其动作的质量以及由于该动作而产生的状态/观察的质量。请注意，观察可能是多维的——例如，对于`MountainCar`是二维的，对于`CartPole`是四维的。同样，动作也可以是多维的，例如，对于自动驾驶汽车场景，是加速度值和转向角度。然而，在每种情况下，奖励始终是一个标量实数。只有单一值可能看起来有限制，但实际上并非如此。最终，代理被训练以达到目标，奖励编码了这种进步。
- en: Now you’ll look at a maze example where the agent is trying to find its way
    out. You could formulate the reward as the agent getting a reward of -1 at each
    time step and a reward of 0 at the end of episode. Such a reward configuration
    incentivizes the agent to come out of the maze with the least possible number
    of steps and minimize the sum of the negative ones (-1). An alternate reward configuration
    could be an agent getting a reward of 0 in all the time steps and a reward of
    1 at the end of episode when the agent is out of the maze. What do you think will
    happen to the agent’s behavior in the latter setup? The agent has a reason to
    get out of the maze to collect a reward of +1, but it is in no hurry. It will
    get the same +1 whether it comes out after 5 steps or 500 steps. How do you modify
    the situation to push the agent to not focus just on reward collection but to
    do so in the fastest possible time?
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来看一个迷宫示例，其中智能体试图找到出路。你可以将奖励设定为智能体在每个时间步获得-1的奖励，并在剧集结束时获得0的奖励。这样的奖励配置激励智能体以尽可能少的步数走出迷宫并最小化负奖励的总和（-1）。另一种奖励配置可以是智能体在所有时间步获得0的奖励，当智能体走出迷宫时在剧集结束时获得1的奖励。你认为在后者配置中智能体的行为会发生什么？智能体有走出迷宫以收集+1奖励的理由，但它并不着急。无论它是在5步后还是500步后出来，它都会得到相同的+1。你如何修改这种情况，以推动智能体不仅关注奖励收集，而且尽可能快地完成？
- en: 'This question leads naturally to the concept of *discounting*. What carries
    more utility—a reward *x* after 5 time steps or the same reward *x* after 500
    time steps? Of course, the earlier the better, and hence a reward of +1 after
    5 steps is more valuable as compared to +1 reward after 500 steps. You can induce
    this behavior by discounting the rewards from the future to present. A reward
    of *R* from the next time step is discounted to the current time by a discount
    factor, γ (gamma). The discount factor is a value between 0 and 1\. In the maze
    example, the reward with maze completion in five steps would mean a reward of
    ![$$ {\upgamma}^5\cdotp \dot{\left(+1\right)} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq1.png)
    versus a reward of ![$$ {\upgamma}^{500}\cdotp \dot{\left(+1\right)} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq2.png)
    for 500 steps to complete. The “return” at time *t* is defined as follows:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题自然引出了**折现**的概念。哪个更有效用——5个时间步后的奖励*x*还是500个时间步后的相同奖励*x*？当然，越早越好，因此5步后的+1奖励比500步后的+1奖励更有价值。你可以通过将未来的奖励折现到当前来诱导这种行为。下一个时间步的奖励*R*通过折现因子γ（伽马）折现到当前时间。折现因子是一个介于0和1之间的值。在迷宫示例中，五步完成迷宫的奖励意味着一个折现因子为γ^5的奖励，与500步完成迷宫的折现因子为γ^500的奖励相对比。时间*t*的“回报”定义为以下内容：
- en: '![$$ {G}_t={R}_{t+1}+\upgamma \cdotp {R}_{t+2}+{\upgamma}^2\cdotp {R}_{t+3}+\cdots
    +{\upgamma}^{T-t+1}\cdotp {R}_T $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ3.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {G}_t={R}_{t+1}+\upgamma \cdotp {R}_{t+2}+{\upgamma}^2\cdotp {R}_{t+3}+\cdots
    +{\upgamma}^{T-t+1}\cdotp {R}_T $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ3.png)'
- en: (2-3)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: (2-3)
- en: The discount factor is similar to what you see in the financial world. It is
    the same concept as money now being more valuable than money later.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 折现因子与你在金融世界中看到的是相似的。它与现在比未来更有价值的钱的概念相同。
- en: The discount factor also serves an important mathematical purpose of making
    sure that total return, *G*[*t*], is bounded for continuing tasks. Consider a
    scenario of a continuing task where each state gives some positive reward. As
    it is a continuing task that has no logical end, the total reward will keep adding
    and exploding to infinity. However, with a discounting factor, the total cumulative
    reward will be capped. Therefore, discounting is always introduced in continuing
    tasks and is optional in episodic tasks.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 折现因子还具有重要的数学作用，确保持续任务的总回报*G*[t*]是有界的。考虑一个持续任务的场景，其中每个状态都会给出一些正奖励。由于这是一个没有逻辑终点的持续任务，总奖励会持续增加并爆炸到无穷大。然而，有了折现因子，总累积奖励将被限制。因此，折现总是被引入到持续任务中，而在周期性任务中是可选的。
- en: It is interesting to note the effect of the discounting factor on the horizon
    over which the agent tries to maximize the cumulative reward. Consider a discount
    factor of 0\. If you use this discount value in Equation [2-3](#Equ3), you will
    see that cumulative reward is equal to just the reward at the next instant reward.
    It would lead the agent to become short-sighted and greedy with respect to the
    next time step reward, without any focus on future rewards beyond the next time
    step. Next, consider the other extreme with a discount factor approaching a value
    of 1\. In this case, the agent will become more and more far-sighted because,
    using a discount factor of 1, you can see that the cumulative reward as defined
    in Equation [2-3](#Equ3) will give equal importance to all the future rewards.
    The whole sequence of actions, from the current time step until the end, becomes
    important and not just the immediate next time step reward.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是要注意折现因子对代理试图最大化累积奖励的视野的影响。考虑一个折现因子为0的情况。如果你在方程[2-3](#Equ3)中使用这个折现值，你会看到累积奖励等于下一个即时奖励。这会导致代理变得短视和贪婪，只关注下一个时间步的奖励，而没有任何对未来奖励的关注。接下来，考虑折现因子接近1的另一个极端情况。在这种情况下，代理会变得越来越有远见，因为使用折现因子1，你可以看到方程[2-3](#Equ3)中定义的累积奖励将给予所有未来奖励同等的重要性。从当前时间步到结束的整个动作序列变得重要，而不仅仅是下一个即时时间步的奖励。
- en: The previous discussion should emphasize the importance of designing an appropriate
    reward based on the behavior the agent needs to optimize. The reward is the signal
    that the agent uses to decide between a good or bad state and/or action. For example,
    in a game of chess, if you design the reward as the number of opponent pieces
    captured, the agent may learn to play dangerous moves just to maximize rewards
    from immediate actions instead of sacrificing one of its own pieces to get into
    a position of strength and a possible win in a future move. The field of reward
    design is an open area of research. Having said that, the examples in this book
    use fairly simple and intuitive reward definitions.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的讨论应该强调根据代理需要优化的行为来设计适当奖励的重要性。奖励是代理用来决定是好是坏的状态和/或行动的信号。例如，在棋类游戏中，如果你将奖励设计为捕获对手棋子的数量，代理可能会学会只为了最大化即时行动的奖励而采取危险的动作，而不是牺牲自己的一个棋子来进入一个强势的位置，并在未来的走法中获得可能的胜利。奖励设计领域是一个开放的研究领域。话虽如此，本书中的例子使用了相当简单且直观的奖励定义。
- en: The reward design is not an easy task, especially in the field of continuous
    control and robotics. Consider the task of a humanoid where the objective of training
    is, say, to make the agent learn to run for as long as possible. How will the
    agent know the way the arms and legs need to be moved to learn the task of running?
    Specific measures, such as the distance of the center of gravity of the agent
    from the ground, the energy spent in making action, and the torso angle to the
    ground are combined with trial and error to make the agent learn a good policy.
    In the absence of a good reward signal shaping the behavior you want the agent
    to learn, it will take a long time for agent to learn. Even worse, the agent sometimes
    may learn counterintuitive behavior. A good example is OpenAI’s agent to play
    the video game Coast-Runners that had the objective of finishing the boat race
    quickly and ahead of other players. The game provided a score for hitting the
    targets in the way, and there was no explicit score for finishing the game. Under
    such reward configuration, the agent learned a hilarious and destructive behavior
    of repeatedly hitting a set of targets and not progressing through the race but
    scoring 20 percent higher than human players. You can read more about it in the
    OpenAI blog^([1](#Fn1)) and see a video of the behavior in action. Rewards need
    to be designed with care to ensure that autonomous RL agents do not learn potentially
    dangerous behaviors.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励设计并非易事，尤其是在连续控制和机器人领域。考虑一个类人机器人的任务，其训练目标是让代理尽可能长时间地跑步。代理将如何知道手臂和腿部需要如何移动才能学习跑步的任务？将特定的措施，如代理重心与地面的距离、执行动作所消耗的能量以及躯干与地面的角度，结合试错来让代理学习一个好的策略。在没有良好的奖励信号塑造你希望代理学习的特定行为的情况下，代理的学习将需要很长时间。更糟糕的是，代理有时可能会学习到反直觉的行为。一个很好的例子是OpenAI的代理玩视频游戏Coast-Runners，其目标是快速完成船赛并领先其他玩家。游戏提供了击中目标的分数，但没有明确完成游戏的分数。在这种奖励配置下，代理学习了一种滑稽且具有破坏性的行为，即反复击中一组目标，不通过比赛但得分比人类玩家高出20%。你可以在OpenAI的博客^([1](#Fn1))上了解更多信息，并观看该行为实际操作的录像。需要仔细设计奖励，以确保自主强化学习代理不会学习到可能危险的行为。
- en: In other cases, it is not at all clear how to model the reward function. Consider
    a robot trying to learn human-like behavior, such as pouring water in a glass
    from a jug without spilling water or breaking the glass tumbler due to excessive
    grip force. In such cases, an extension of reinforcement learning, known as *inverse
    reinforcement learning,* is used to learn the implicit reward function based on
    observations from watching a human expert perform the task. Chapter [13](502835_2_En_13_Chapter.xhtml)
    briefly talks about this. However, a detailed study of reward shaping and discovery
    could take a book of its own.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 在其他情况下，如何建模奖励函数并不总是很清楚。考虑一个试图学习类似人类行为的机器人，比如从一个水壶中往杯子里倒水，既不洒水也不因为握力过大而打碎玻璃杯。在这种情况下，一种称为**逆强化学习**的强化学习扩展被用来根据观察人类专家完成任务来学习隐含的奖励函数。第[13](502835_2_En_13_Chapter.xhtml)章简要介绍了这一点。然而，对奖励塑造和发现的详细研究可能需要一本书来阐述。
- en: So, in a nutshell, just as the quality of data is important for supervised learning,
    an appropriate reward function is important to make algorithms train the agent
    for a desired behavior.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，简而言之，正如数据质量对于监督学习很重要一样，一个合适的奖励函数对于使算法训练代理以实现期望的行为也很重要。
- en: 'RL has recently found interesting use in the field of Large Language Models.
    This approach is known as RLHF—Reinforcement Learning from Human Feedback. It
    was introduced by OpenAI in 2017 and was first used by OpenAI in 2022 to make
    Large Language Models safer in their InstructGPT model. To learn more, you can
    read the paper “Training Language Models to Follow Instructions with Human Feedback,”
    by OpenAI Jan 2022.^([2](#Fn2)) The reward is the human preference of one sentence
    over another for safety. Recently, Meta has used two reward functions to steer
    the Llama2 model introduced in July 2023\. One reward function models the human
    preference for safety and another reward function models the human preference
    for helpfulness. You can read more about it in Meta’s bog titled “Llama 2: Open
    Foundation and Fine-Tuned Chat Models”.^([3](#Fn3)) Specific details of RLHF are
    mentioned in Section 3.2 of that paper.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '强化学习（RL）最近在大型语言模型领域找到了有趣的应用。这种方法被称为RLHF——基于人类反馈的强化学习。它由OpenAI于2017年引入，并于2022年由OpenAI首次用于使其InstructGPT模型中的大型语言模型更安全。要了解更多信息，您可以阅读OpenAI于2022年1月发表的论文“Training
    Language Models to Follow Instructions with Human Feedback”。^([2](#Fn2)) 奖励是人对一句话比另一句话更安全的偏好。最近，Meta使用两种奖励函数来引导2023年7月引入的Llama2模型。一个奖励函数模拟了人对安全的偏好，另一个奖励函数模拟了人对有用性的偏好。您可以在Meta的博客“Llama
    2: Open Foundation and Fine-Tuned Chat Models”中了解更多信息.^([3](#Fn3)) 该论文的第3.2节提到了RLHF的详细信息。'
- en: Markov Processes
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 马尔可夫过程
- en: The field of reinforcement learning is based on the formalism of Markov processes.
    Before diving deep into learning (behavior optimization) algorithms, you need
    to have a good grasp of the Markov Processes construct. This section goes over
    Markov Chains followed by Markov Reward Processes and lastly Markov Decision Processes.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习领域基于马尔可夫过程的公理化。在深入研究学习（行为优化）算法之前，您需要很好地掌握马尔可夫过程的结构。本节将介绍马尔可夫链，然后是马尔可夫奖励过程，最后是马尔可夫决策过程。
- en: Markov Chains
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 马尔可夫链
- en: Let’s first talk about what a Markov Property is. Consider the diagram in Figure
    [2-5](#Fig5). It is trying to model the daily rain status of a city. It has two
    states—on any given day, whether it rains or not. The arrows from one state to
    another indicate the probability of being in one of the two states the next day
    based on the current day’s state. For example, if it rains today, the chance of
    rain the next day is 0.3, and the chance it will not rain the next day is 0.7\.
    Similarly, if there is no rain today, the chance it will continue to be dry tomorrow
    is 0.8, while there is a 0.2 chance that it will rain tomorrow.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先谈谈什么是马尔可夫属性。考虑图[2-5](#Fig5)。它试图模拟一个城市的日常降雨状况。它有两个状态——在任何给定的一天，是否下雨。从一个状态到另一个状态的有向箭头表示基于当天状态，下一天处于两个状态之一的概率。例如，如果今天下雨，明天下雨的概率是0.3，而明天不下雨的概率是0.7。同样，如果今天没有下雨，明天继续干燥的概率是0.8，而明天下雨的概率是0.2。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig5_HTML.jpg)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig5_HTML.jpg)'
- en: A state diagram of the Markov Chain contains two states labeled S 0 = rain and
    S 1 = no rain. It also indicates the values, p = 0.7 from S 0 to S 1, p = 0.2
    from S 1 to S 0, p = 0.3 at S 0, and p = 0.8 at S 1.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫链的状态图包含两个状态，标记为S0 = 下雨和S1 = 不下雨。它还表明了值，从S0到S1的p = 0.7，从S1到S0的p = 0.2，S0处的p
    = 0.3，S1处的p = 0.8。
- en: Figure 2-5
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-5
- en: A simple two-state Markov Chain. One state is “rain,” and second state is “no
    rain”
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的双状态马尔可夫链。一个状态是“下雨”，第二个状态是“不下雨”
- en: 'This model assumes that rain on a given day depends on the state of the previous
    day, that is, the chance of rain tomorrow is 0.3 if it also rained today, and
    the chance of rain tomorrow is 0.2 if it did not rain today. Whether it rained
    yesterday or before that has no impact on the probability of rain tomorrow. This
    is an important concept. It is known as *independence*, that is, knowing the present
    (present state at time *t*) makes the future (future state at time *t* + 1) independent
    of the past (all past states at time 0, 1, ⋯, *t* − 1). Mathematically, you can
    express this as follows:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型假设某一天的下雨情况取决于前一天的状态，即如果今天下雨，明天下雨的概率是0.3，如果今天没下雨，明天下雨的概率是0.2。昨天或之前是否下雨对明天下雨的概率没有影响。这是一个重要的概念。它被称为*独立性*，即知道现在（时间*t*的当前状态）使得未来（时间*t*+1的未来状态）与过去（时间0，1，⋯，*t*−1的所有过去状态）独立。数学上，你可以这样表达：
- en: '![$$ P\left({S}_{t+1}={s}^{\prime}\right|\ {S}_0,{S}_1,\dots \dots {S}_{t-1},{S}_t=\mathrm{s}\left)=P\left({S}_{t+}={s}^{\prime
    }\ \right|\ {S}_t=\mathrm{s}\right) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ4.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![状态转移概率公式](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ4.png)'
- en: (2-4)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: (2-4)
- en: It simply means that the probability of being in a state at time *t* + 1 depends
    only on the state at time *t*. The state at time (*t* + 1) has no dependence on
    the states before time (*t*), that is, no dependence on the states *S*[0] to *S*[*t* − 1].
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这仅仅意味着在时间 *t* + 1 处处于某个状态的概率只取决于时间 *t* 处的状态。时间 (*t* + 1) 的状态不依赖于时间 (*t*) 之前的状态，即不依赖于状态
    *S*[0] 到 *S*[*t* − 1]。
- en: If the environment provides observations to the agent that is detailed enough,
    the agent will know what is to be known from its current state and will not need
    to remember the chain of states/events it had to go through in the past to reach
    the present. This *Markov independence* is an important assumption that is required
    to prove the theoretical soundness of reinforcing learning algorithms. In practice,
    many times you’ll still get fairly good results for non-Markov systems. However,
    it is important to remember that in the absence of the Markov Property, the results
    cannot be evaluated for theoretical worst-case bounds.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果环境提供给智能体的观察足够详细，智能体将知道从其当前状态需要知道什么，而无需记住过去为了达到现在所必须经历的状态/事件链。这种**马尔可夫独立性**是证明强化学习算法理论正确性的重要假设。在实践中，很多时候对于非马尔可夫系统，你仍然可以得到相当好的结果。然而，重要的是要记住，在没有马尔可夫属性的情况下，结果不能用于评估理论上的最坏情况界限。
- en: 'Going back to the Markov Chain diagram in Figure [2-5](#Fig5), you can define
    transition probability as the probability of moving to state *S*[*t* + 1]from
    state *S*[*t*] in the prior time step. If a system has *m* states, the transition
    probabilities will be a square matrix with *m* rows and *m* columns. The transition
    probability matrix for Figure [2-5](#Fig5) will look like this:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 回到图 [2-5](#Fig5) 中的马尔可夫链图，你可以定义转移概率为从先前的步骤状态 *S*[*t*] 转移到状态 *S*[*t* + 1] 的概率。如果一个系统有
    *m* 个状态，转移概率将是一个具有 *m* 行和 *m* 列的方阵。图 [2-5](#Fig5) 的转移概率矩阵将看起来像这样：
- en: '![$$ P=\left[\begin{array}{cc}0.3&amp; 0.7\\ {}0.2&amp; 0.8\end{array}\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equa.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![转移概率矩阵](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equa.png)'
- en: The sum of values in every row will be 1\. The row values indicate the probability
    of going from one given state to all the states in the system. For example, row
    1 indicates that the probability from *S*[1] to *S*[1] is 0.3 and from *S*[1]
    to *S*[2] is 0.7.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 每一行的值之和将是 1。行值表示从一个给定的状态转移到系统中的所有状态的概率。例如，第 1 行表示从 *S*[1] 到 *S*[1] 的概率是 0.3，从
    *S*[1] 到 *S*[2] 的概率是 0.7。
- en: The previous Markov Chain will have a steady state in which there is a defined
    probability of being in one of the two states on a given day. Let’s say that the
    probability of being in state *S*[1] and *S*[2] is given by a vector *S* = [*S*[1] *S*[2]]^(*T*).
    From Figure [2-5](#Fig5), you can see that
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的马尔可夫链将有一个稳态，其中在给定的一天内处于两个状态之一的概率是确定的。比如说，处于状态 *S*[1] 和 *S*[2] 的概率由向量 *S* = [*S*[1]
    *S*[2]]^(*T*) 给出。从图 [2-5](#Fig5) 中，你可以看到
- en: '![$$ {S}_1=0.3\cdotp {S}_1+0.2\cdotp {S}_2\cdots (a) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equb.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![状态转移方程](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equb.png)'
- en: '![$$ {S}_2=0.7\cdotp {S}_1+0.8\cdotp {S}_2\cdots (b) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equc.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![状态转移方程](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equc.png)'
- en: 'As the system must be in one of the two states at any point in time, you also
    have:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 由于系统在任何时刻都必须处于两个状态之一，因此你还有：
- en: '![$$ {S}_1+{S}_2=1\cdots (c) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equd.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![状态和方程](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equd.png)'
- en: The equations in (*a*), (*b*), and (*c*) form a consistent and solvable system
    of equations. From (*a*),
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: (*a*), (*b*), 和 (*c*) 中的方程构成一个一致且可解的方程组。从 (*a*)，
- en: 0.7 · *S*[1] = 0.2 · *S*[2] or, ![$$ {S}_1=\frac{0.2}{0.7}\cdotp {S}_2 $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq3.png)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 0.7 · *S*[1] = 0.2 · *S*[2] 或，![状态转移公式](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq3.png)
- en: 'Substituting the value of s[1] in (*c*), you get:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 将 (*c*) 中的 s[1] 的值代入，你得到：
- en: '![$$ \frac{0.2}{0.7}\cdotp {S}_2+{S}_2=1 $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Eque.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![0.2/0.7* S2+S2=1](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Eque.png)'
- en: 'Which gives:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了：
- en: '![$$ {S}_2=\frac{0.7}{0.9}=0.78 $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equf.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![S2=0.7/0.9=0.78](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equf.png)'
- en: Substituting this in (*c*), gives
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 将其代入(*c*)中，得到
- en: '![$$ {S}_1=\frac{0.2}{0.9}=0.22 $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equg.png)'
  id: totrans-104
  prefs: []
