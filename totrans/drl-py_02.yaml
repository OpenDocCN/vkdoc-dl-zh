- en: '![$$ {S}^T={S}^T\cdotp P $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equh.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![S^T=S^T*P](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equh.png)'
- en: This relationship can be used to solve steady-state probability iteratively.
    Listing [2-2](#PC2) shows a code snippet of this.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这种关系可以用来迭代求解稳态概率。列表[2-2](#PC2)展示了相应的代码片段。
- en: '[PRE1]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'When you run the Python notebook `2.b-RL-components.ipynb`, the output produced
    is given here, which matches with the values you got from solving equations (*a*),
    (*b*), and (*c*) together:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行Python笔记本`2.b-RL-components.ipynb`时，产生的输出如下，这与你通过解方程(*a*)、(*b*)和(*c*)得到的值相匹配：
- en: '[PRE2]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The formulation in Figure [2-5](#Fig5) has no start or end state. This is an
    example of a continuing task. There is another class of formulation that has one
    or more end states. Look at Figure [2-6](#Fig6). This is known as an *episodic
    task,* in which the agent starts in some state and goes through many transitions
    to eventually reach an end state. There could be one or more end states with different
    outcomes. In Figure [2-6](#Fig6), the end state is the successful completion of
    an exam resulting in a certificate. In a game of chess, there could be three end
    states: win, loss, or draw.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图[2-5](#Fig5)中的公式没有起始或结束状态。这是一个持续任务的例子。还有一种公式，它有一个或多个结束状态。看看图[2-6](#Fig6)。这被称为*情景任务*，其中智能体从一个状态开始，经过许多转换最终达到一个结束状态。可能会有一个或多个结束状态，具有不同的结果。在图[2-6](#Fig6)中，结束状态是成功完成考试并获得证书。在棋类游戏中，可能有三种结束状态：胜利、失败或平局。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig6_HTML.jpg)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig6_HTML.jpg)'
- en: A state diagram of the Markov processes. The states are to study, take exams,
    be distracted, and obtain certificates. The values indicated are p = 2 from studying
    to taking the exam, 0.3 at studying, 0.9 at distracted, 0.4 from taking the exam
    to studying, 0.5 from studying to distracted, and 0.6 from taking the exam to
    obtain the certificate.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫过程的州图。状态包括学习、参加考试、分心和获得证书。指示的值是：从学习到参加考试的概率为p = 2，学习时的概率为0.3，分心时的概率为0.9，从参加考试到学习的概率为0.4，从学习到分心的概率为0.5，从参加考试到获得证书的概率为0.6。
- en: Figure 2-6
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-6
- en: An example of an episodic Markov Chain with one end state depicted by way of
    a square box
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有一个结束状态的情景马尔可夫链的例子，该结束状态通过一个方形框表示
- en: 'Like the continuing formulation, there is a concept of a transition probability
    matrix. First you define the states with a variable name:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 与持续公式类似，存在一个转移概率矩阵的概念。首先，你用变量名定义状态：
- en: '*S*[1] = “Study”; *S*[2] = “Distracted”, *S*[3] = “Take Exam” ; *S*[4] = “Obtain
    Certificate”'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '*S*[1] = “学习”；*S*[2] = “分心”，*S*[3] = “参加考试”；*S*[4] = “获得证书”'
- en: 'The Transition matrix will look like this:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 转移矩阵看起来是这样的：
- en: '![$$ P=\left[\begin{array}{cccc}0.3&amp; 0.5&amp; 0.2&amp; 0\\ {}0.1&amp; 0.9&amp;
    0&amp; 0\\ {}0.4&amp; 0&amp; 0&amp; 0.6\\ {}0&amp; 0&amp; 0&amp; 1\end{array}\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equi.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![P=[0.3 0.5 0.2 0; 0.1 0.9 0 0; 0.4 0 0 0.6; 0 0 0 1]](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equi.png)'
- en: 'In the case of the episodic task as shown earlier, you can look at multiple
    runs, with each run called an *episode*. Let the start state always be *S*[1].
    As you have only one end state—“Obtain Certificate”—the episodes will always end
    in *S*[4], as shown here:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在前面展示的情景任务中，你可以查看多个运行，每个运行称为一个*情景*。让起始状态始终是*S*[1]。由于你只有一个结束状态——“获得证书”，因此情景将始终以*S*[4]结束，如下所示：
- en: '![$$ {S}_1,{S}_2,{S}_2,{S}_1,{S}_3,{S}_4 $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equj.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![S1,S2,S2,S1,S3,S4](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equj.png)'
- en: '![$$ {S}_1,{S}_2,{S}_2,{S}_1,{S}_3,{S}_1,{S}_2,{S}_3,{S}_4 $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equk.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![S1,S2,S2,S1,S3,S1,S2,S3,S4](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equk.png)'
- en: '![$$ {S}_1,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_1,{S}_3,{S}_4
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equl.png)'
  id: totrans-123
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {S}_1,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_2,{S}_1,{S}_3,{S}_4
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equl.png)'
- en: Episodic tasks do not have a steady state. Eventually the system will transition
    to one of the end states. The path/trajectory from state to end state could go
    through multiple hoops and other states, but eventually the agent will find an
    end state and the episode will end.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 事件任务没有稳定状态。最终系统将过渡到其中一个终止状态。从状态到终止状态的路径/轨迹可能经过多个环和其他状态，但最终代理将找到一个终止状态，事件将结束。
- en: Markov Reward Processes
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 马尔可夫奖励过程
- en: Moving on to the Markov Reward Process, I now introduce the concept of rewards.
    Look at the modified state diagrams in Figures [2-7](#Fig7) and [2-8](#Fig8).
    They are the same problems from the previous section (Figures [2-5](#Fig5) and
    [2-6](#Fig6), respectively) with the addition of rewards at each transition.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是马尔可夫奖励过程，我现在介绍奖励的概念。看看图 [2-7](#Fig7) 和 [2-8](#Fig8) 中修改后的状态图。它们是上一节（图 [2-5](#Fig5)
    和 [2-6](#Fig6)）中的相同问题，增加了每个转换的奖励。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig8_HTML.jpg)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig8_HTML.jpg)'
- en: A state diagram of the episodic Markov reward process has 4 states, study, take
    an exam, be distracted, and obtain a certificate. The values of P and R include
    0.2 and negative 2 from study to exam, 0.4 and negative 2 from exam to study,
    0.3 and negative 3 at study, and 0.5 and 0 from study to distracted.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 事件马尔可夫奖励过程的状态图有4个状态，学习、参加考试、分心、获得证书。P和R的值包括从学习到考试为0.2和负2，从考试到学习为0.4和负2，学习时的0.3和负3，以及从学习到分心的0.5和0。
- en: Figure 2-8
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-8
- en: The episodic Markov reward process similar to Figure [2-6](#Fig6), with additional
    rewards R for each transition
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 与图 [2-6](#Fig6) 类似的事件马尔可夫奖励过程，每个转换增加了奖励R
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig7_HTML.jpg)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig7_HTML.jpg)'
- en: A state diagram of the Markov reward process has two states S 0 = rain and S
    1 = no rain. The values of p and R are 0.7 and 3 from S 0 to S 1, 0.2 and 0 from
    S 1 to S 0, 0.3 and negative 2 at S 0, and 0.8 and 2 at S 1.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫奖励过程的状态图有两个状态 S 0 = rain 和 S 1 = no rain。p和R的值从S 0到S 1为0.7和3，从S 1到S 0为0.2和0，S
    0处的0.3和负2，以及S 1处的0.8和2。
- en: Figure 2-7
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-7
- en: Continuing Markov Reward Process. This is similar to the Markov Chain in Figure
    [2-5](#Fig5), with an addition of reward R for each transition arrow
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 继续马尔可夫奖励过程。这与图 [2-5](#Fig5) 中的马尔可夫链类似，每个转换箭头增加了奖励R
- en: In these two MRP setups, you can compute transition probabilities similar to
    that in MC, as in the preceding section. In addition, you can calculate the value
    of a state *V*(*S*), which is the cumulative reward that the agent gets when it
    is in state *S* = *s* at time *t* and then it follows the dynamics of the system.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两个马尔可夫奖励过程设置中，你可以计算与MC中类似的转换概率，如前节所述。此外，你可以计算状态 *V*(*S*) 的值，这是代理在时间 *t* 处于状态
    *S* = *s* 时获得的累积奖励，然后它遵循系统的动力学。
- en: '![$$ V(s)=E\left[{G}_t\ \right|\ {S}_t=s\Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ5.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![$$ V(s)=E\left[{G}_t\ \right|\ {S}_t=s\Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ5.png)'
- en: (2-5)
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: (2-5)
- en: 'Where *G*[*t*] is defined in Equation [2-3](#Equ3):'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 *G*[*t*] 在方程 [2-3](#Equ3) 中定义：
- en: '![$$ {G}_t={R}_{t+1}+\gamma {R}_{t+2}+\kern0.5em {\gamma}^2{R}_{t+3}+\dots
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equm.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {G}_t={R}_{t+1}+\gamma {R}_{t+2}+\kern0.5em {\gamma}^2{R}_{t+3}+\dots
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equm.png)'
- en: The notation *E*[*G*[*t*]| *S*[*t*] = *s*] is read as an expectation of returning
    *G*[*t*] when the starting state at time *t* is *S*[*t*] = *s*. The word *expectation*
    implies the average value of *G*[*t*] when the simulation is performed a large
    number of times. The expectation operator (*E*[∙]) is used to derive formulae
    and to prove theoretical results. However, in practice, it is replaced by averages
    over many sample simulations and is also known as the *Monte Carlo simulation*.
    In the Monte Carlo simulation, you have the agent start at state *S*[*t*] = *s*
    and follow the trajectory collecting the rewards, calculating *G*[*t*] each time,
    and finally taking the average of *G*[*t*] across such multiple repeats. The average
    ![$$ {\overline{G}}_t $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq4.png)
    so calculated works as an approximation of the theoretical expectation *V*(*s*) = *E*[*G*[*t*] | *S*[*t*] = *s*].
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 符号 *E*[*G*[*t*]| *S*[*t*] = *s*] 读作当时间 *t* 的起始状态为 *S*[*t*] = *s* 时，返回 *G*[*t*]
    的期望。单词 *expectation* 暗示当模拟多次执行时，*G*[*t*] 的平均值。期望算子 (*E*[∙]) 用于推导公式和证明理论结果。然而，在实践中，它被许多样本模拟的平均值所取代，也被称为
    *蒙特卡洛模拟*。在蒙特卡洛模拟中，代理从状态 *S*[*t*] = *s* 开始，遵循轨迹收集奖励，每次计算 *G*[*t*]，最后对这样的多次重复中的
    *G*[*t*] 取平均值。这样计算出的平均值 ![$$ {\overline{G}}_t $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq4.png)
    作为理论期望 *V*(*s*) = *E*[*G*[*t*] | *S*[*t*] = *s*] 的近似。
- en: Note the use of γ as the discount factor. As explained earlier, γ captures the
    notion that the reward today is better than the reward tomorrow. It is also important
    mathematically to avoid unbounded returns for continuing tasks. I do not go into
    the mathematical details here beyond mentioning this fact.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 注意 γ 作为折扣因子的使用。如前所述，γ 捕捉了今天的奖励比明天的奖励更好的概念。在数学上，避免持续任务的无界回报也很重要。我这里不深入数学细节，只是提到这个事实。
- en: A value of γ = 1 implies there is no discount, and that the agent is far-sighted.
    It cares as much about future rewards as it does for immediate rewards. A value
    of γ = 0 implies that an agent is short-sighted. It now cares only about immediate
    reward in the next time step. You can check this concept by putting different
    values of γ in the *G*[*t*] = *R*[*t* + 1] + *γR*[*t* + 2] + *γ*²*R*[*t* + 3] + ...
    equation.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: γ = 1 的值表示没有折扣，并且代理是远见的。它对未来的奖励和立即的奖励同样关心。γ = 0 的值表示代理是短视的。它现在只关心下一个时间步的即时奖励。你可以通过将不同的
    γ 值放入 *G*[*t*] = *R*[*t* + 1] + *γR*[*t* + 2] + *γ²R*[*t* + 3] + ... 方程来检查这个概念。
- en: To summarize, up to now I have introduced the concept of transition probability
    *P*, return *G*[*t*], and value of a state *V*(*s*) = *E*[*G*[*t*] | *S*[*t*] = *s*].
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 总结到目前为止，我已经介绍了过渡概率 *P*、回报 *G*[*t*] 和状态值 *V*(*s*) = *E*[*G*[*t*] | *S*[*t*] =
    *s*] 的概念。
- en: Markov Decision Processes
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 马尔可夫决策过程
- en: Markov Decision Processes (MDP) extend reward processes by bringing the additional
    concept of “action”. In MRP, the agent had no control over the outcome. Everything
    was governed by the environment. However, under MDP regime, agents can choose
    actions based on the current state/observation. The agent can learn to take actions
    that maximize the cumulative reward, that is, total return *G*[*t*].
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 马尔可夫决策过程 (MDP) 通过引入“动作”这一附加概念来扩展奖励过程。在 MRP 中，代理对结果没有控制权。一切都是由环境控制的。然而，在 MDP
    制度下，代理可以根据当前状态/观察选择动作。代理可以学习采取最大化累积奖励的动作，即总回报 *G*[*t*]。
- en: For example, look at an extension of episodic MRP from Figure [2-8](#Fig8).
    Looking at Figure [2-9](#Fig9), you can see that in the “Learning” state, the
    agent can take one of two actions—study more or take the exam. The agent chooses
    the two actions with equal probability of 0.5\. Choosing actions with certain
    probabilities based on the current state is called a *policy* that the agent learns
    in order to optimize the long-term rewards. The action influences the probabilities
    of the next state and the reward values that the agent will see. If an agent decides
    to “study” more, there is a 0.7 chance that agent will get “distracted” and turn
    to social media, while there is 0.3 chance that they will continue to stay focused
    on “learning”. If the agent, while in state of “learning,” decides to “take exam”
    instead of “study”, the outcome of the “take exam” action would lead to two outcomes—the
    agent fails with probability of 0.4, going back to “Learning” with a reward of
    -2 or (with a probability of 0.6) the agent successfully completes the exam, thus
    obtaining a certificate and getting a reward of 10.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，查看图 [2-8](#Fig8) 中周期性马尔可夫奖励过程的扩展。查看图 [2-9](#Fig9)，您可以看到在“学习”状态下，代理可以采取两种行动之一——学习更多或参加考试。代理以相等的概率0.5选择这两种行动。根据当前状态以一定概率选择行动被称为代理为了优化长期奖励而学习的*策略*。行动影响代理将看到的下一个状态的概率和奖励值。如果代理决定“学习”更多，有0.7的概率代理会变得“分心”并转向社交媒体，而有0.3的概率他们会继续专注于“学习”。如果代理在“学习”状态下决定“参加考试”而不是“学习”，那么“参加考试”行动的结果将导致两种结果——代理以0.4的概率失败，回到“学习”状态并获得-2的奖励，或者（以0.6的概率）代理成功完成考试，从而获得证书并获得10的奖励。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig9_HTML.jpg)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig9_HTML.jpg)'
- en: A state diagram of the episodic Markov decision process has 5 states, study,
    take exams, be distracted, learn, and obtain a certificate. The study and take
    exam states are highlighted. The values of P are labeled 0.1, 0.3, 0.4, 0.5, 0.6,
    0.7, and 0.9\. The values of p and R are provided along the links.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 一个周期性马尔可夫决策过程的状态图有5个状态：学习、参加考试、分心、学习和获得证书。学习和参加考试状态被突出显示。P的值标记为0.1、0.3、0.4、0.5、0.6、0.7和0.9。p和R的值沿着链接提供。
- en: Figure 2-9
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-9
- en: The Episodic Markov Decision Process as an extension of the Markov Reward Process
    shown in Figure [2-8](#Fig8). The black filled circles are the decisions that
    the agent can take
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 周期性马尔可夫决策过程作为图 [2-8](#Fig8) 中所示的马尔可夫奖励过程的扩展。黑色填充的圆圈是代理可以采取的决策。
- en: The transition function is now a mapping from the current state and action to
    the next state and reward. It defines the probability of getting a reward *r*
    with a transition to the next state *s*^′ whenever the agent takes action *a*
    in state *s*.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 转移函数现在是从当前状态和行动到下一个状态和奖励的映射。它定义了代理在状态 *s* 下采取行动 *a* 时，通过转移到下一个状态 *s*^′ 获得奖励
    *r* 的概率。
- en: '![$$ p\left({s}^{\prime },r\ \right|\ s,a\left)=\Pr \left\{\ {S}_t={s}^{\prime
    },{R}_t=r\ \right|\ {S}_{t-1}=s,{A}_{t-1}=a\right\} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ6.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![$$ p\left({s}^{\prime },r\ \right|\ s,a\left)=\Pr \left\{\ {S}_t={s}^{\prime
    },{R}_t=r\ \right|\ {S}_{t-1}=s,{A}_{t-1}=a\right\} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ6.png)'
- en: (2-6)
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: (2-6)
- en: 'You can use Equation [2-6](#Equ6) to derive many useful relations. Transition
    probability can be derived from the previous transition function. Transition probability
    defines the probability of the agent finding itself in state *s*^′ when it takes
    action *a* while in state *s*. It is defined as follows:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用方程式 [2-6](#Equ6) 推导出许多有用的关系。转移概率可以从先前的转移函数中推导出来。转移概率定义了代理在状态 *s* 下采取行动
    *a* 时发现自己处于状态 *s*^′ 的概率。它被定义为如下：
- en: '![$$ \mathrm{p}\left({s}^{\prime }|s,a\right)=\Pr\ \left\{{S}_t={s}^{\prime
    }|{S}_{t-1}=s,{A}_{t-1}=a\right\}={\sum}_{r\in R}\mathrm{p}\left({s}^{\prime },\mathrm{r}|s,a\right)
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ7.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![$$ \mathrm{p}\left({s}^{\prime }|s,a\right)=\Pr\ \left\{{S}_t={s}^{\prime
    }|{S}_{t-1}=s,{A}_{t-1}=a\right\}={\sum}_{r\in R}\mathrm{p}\left({s}^{\prime },\mathrm{r}|s,a\right)
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ7.png)'
- en: (2-7)
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: (2-7)
- en: Equation [2-7](#Equ7) is derived by averaging all the possible rewards that
    the agent could get while transitioning from (*s*, *a*) to *s*^′.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 方程式 [2-7](#Equ7) 是通过对代理从 (*s*, *a*) 转移到 *s*^′ 所能获得的所有可能奖励的平均值推导出来的。
- en: Let’s look at a different example of MDP, one that is a continuing task. Think
    of an electric cart at the airport that ferries passengers from one terminal to
    another. The cart has two states, “High Charge” and “Low Charge.” In each state,
    the cart can stay idle, recharge by connecting to the charging station, or ferry
    passengers. If the cart ferries passengers, it gets a reward of b, but there is
    a chance that in the “Low Charge” state, ferrying passengers may drain the battery
    completely and the cart would need to be rescued, resulting in a reward of -10\.
    Figure [2-10](#Fig10) shows the MDP.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个不同的MDP例子，这是一个持续的任务。想象一下机场里的一辆电动手推车，它负责将乘客从一个航站楼运送到另一个航站楼。手推车有两个状态，“高电量”和“低电量”。在每个状态下，手推车可以保持空闲，通过连接充电站充电，或者运送乘客。如果手推车运送乘客，它会获得奖励b，但存在一种可能性，在“低电量”状态下，运送乘客可能会耗尽电池电量，手推车需要被救援，从而产生奖励-10。图[2-10](#Fig10)展示了MDP。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig10_HTML.jpg)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig10_HTML.jpg)'
- en: A state diagram of the episodic Markov decision process has 2 states, low charge
    and high charge. The low charge state is connected to 3 dark circles labeled ferry,
    idle, and recharge. The high charge is connected to 2 circles for the ferry and
    idle. The values of p and r are provided on the links.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 一个基于事件的马尔可夫决策过程的状态图有2个状态，低电量和高电量。低电量状态连接到3个标记为运送、空闲和充电的深色圆圈。高电量状态连接到2个圆圈，用于运送和空闲。p和r的值在链接上提供。
- en: Figure 2-10
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-10
- en: 'Electric cart: A continuing Markov Decision Process with two states. Each state
    has three actions: idle, ferry, or recharge'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 电动手推车：一个具有两个状态的持续马尔可夫决策过程。每个状态有三种行动：空闲、运送或充电
- en: In the “Low Charge” state, the cart can take an action from the set of possible
    actions, {recharge, idle, ferry}. In the “High Charge” state, the cart can take
    an action from {idle, ferry}. All other transitions are 0\. With *p*(*s*^′, *r* | *s*,
    *a*) given as shown earlier, *p*(*s*^′ | *s*, *a*) can be calculated. In this
    case, it is the same as *p*(*s*^′, *r* | *s*, *a*). This is because for each transition
    from (*s*, *a*) to (*s*^′) there is only one fixed reward. In other words, there
    is no uncertainty or a probability distribution for rewards after an action is
    taken in a given state. The reward is the same fixed value every time the agent
    in state *s* takes an action *a* and finds itself in the next state *s′*. This
    is one of the most common setups encountered in practical problems. However, theoretically
    in the most general case, the reward could be a probability distribution like
    a “ferry” action reward being linked to the number of passengers being ferried
    by the cart.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在“低电量”状态下，手推车可以从可能的行动集合{充电、空闲、运送}中选择一个行动。在“高电量”状态下，手推车可以从{空闲、运送}中选择一个行动。所有其他转移都是0。给定
    *p*(*s*^′, *r* | *s*, *a*) 如前所述，*p*(*s*^′ | *s*, *a*) 可以被计算。在这种情况下，它与 *p*(*s*^′,
    *r* | *s*, *a*) 相同。这是因为对于从 (*s*, *a*) 到 (*s*^′) 的每个转移，只有一个固定的奖励。换句话说，在给定状态下采取行动后，奖励没有不确定性或概率分布。奖励是每次智能体在状态
    *s* 采取行动 *a* 并发现自己处于下一个状态 *s′* 时相同的固定值。这是在实践问题中最常见的设置之一。然而，从理论上讲，在最一般的情况下，奖励可能是一个概率分布，例如“运送”行动奖励与手推车运送的乘客数量相关联。
- en: The following sections of this chapter continue to use this example.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 本章的以下部分将继续使用这个例子。
- en: Policies and Value Functions
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 策略和值函数
- en: As shown earlier, MDP has states, and the agent can take actions that transition
    the agent from the current state to the next state. In addition, the agent gets
    feedback from the environment in the form of a reward. The dynamics of MDP are
    defined as *p*(*S*[*t*] = *s*^′, *R*[*t*] = *r*| *S*[*t* − 1] = *s*, *A*[*t* − 1] = *a*).
    You have also seen “cumulative return,” *G*[*t*], which is defined as the sum
    of all rewards received from time *t*. The agent has no control over transition
    dynamics. It is outside the agent’s control. However, the agent can control the
    decision, that is, what action to take in which state.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，MDP有状态，智能体可以采取行动，将智能体从当前状态转移到下一个状态。此外，智能体从环境中获得反馈，形式为奖励。MDP的动态定义为 *p*(*S*[*t*] = *s*^′,
    *R*[*t*] = *r*| *S*[*t* − 1] = *s*, *A*[*t* − 1] = *a*)。您也已经看到了“累积回报”，*G*[*t*]，它定义为从时间
    *t* 收到的所有奖励的总和。智能体无法控制转移动态。这超出了智能体的控制范围。然而，智能体可以控制决策，即在不同状态下采取什么行动。
- en: 'This is exactly what the agent learns based on the transition dynamics of the
    system. The agent does so with an objective to maximize the *G*[*t*] for each
    state *S*[*t*] that can be expected on average across multiple runs (the expected
    value). The mapping of states to actions is known as *policy*. It is formally
    defined as follows:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是代理根据系统的转换动态所学习的内容。代理的目标是最大化每个状态*S*[*t*]的*G*[*t*]（即回报），在多次运行的平均期望值（期望值）。状态到行为的映射称为*策略*。它正式定义为以下内容：
- en: '![$$ \uppi \left({A}_t=a|{S}_t=s\right) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ8.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![π(A_t=a|S_t=s)](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ8.png)'
- en: (2-8)
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: (2-8)
- en: Policy is defined as the probability of taking action *a* at time *t* when the
    agent is in state *s* at time *t*. The agent learns the mapping function from
    the state to actions with a goal to maximize the total return.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 策略定义为在时间*t*代理处于状态*s*时采取行动*a*的概率。代理通过学习从状态到行为的映射函数，目标是最大化总回报。
- en: Policies can be of two types. See Figure [2-11](#Fig11). The first type is a
    *stochastic policy* in which *π*(*a*| *s*) is a probability function. For a given
    state, there are multiple actions that the agent can take, and the probability
    of taking each such action is defined by *π*(*a*| *s*). The second type is a *deterministic
    policy* where there is only one unique action for a given state. In other words,
    the probability function *π*(*A*[*t*] = *a*| *S*[*t*] = *s*) becomes a simple
    mapping function with the value of a function being 1 for some action *A*[*t*] = *a*
    and 0 for all other actions *A*[*t*].
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 策略可以分为两种类型。见图[2-11](#Fig11)。第一种类型是*随机策略*，其中*π*(a|*s*)是一个概率函数。对于给定的状态，代理可以采取多种行动，每种行动的概率由*π*(a|*s*)定义。第二种类型是*确定性策略*，对于给定的状态只有一个唯一的行为。换句话说，概率函数*π*(A[*t*]=*a*|
    *S*[*t*]=*s*)变成一个简单的映射函数，对于某些行为*A*[*t*]=*a*，函数值为1，对于所有其他行为*A*[*t*]为0。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig12_HTML.jpg)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig12_HTML.jpg)'
- en: A tree diagram. The node v asterisk of s is connected to 3 dark circles. The
    center and right circles are labeled p of s prime, r vertical bar s, a and a,
    respectively. Each circle is further connected to 2 circles. The circle on the
    right end is the v asterisk of s prime, linked via r.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 一个树状图。节点v asterisk of s连接到3个深色圆圈。中心和右侧圆圈分别标记为p of s prime，r vertical bar s，a和a。每个圆圈进一步连接到2个圆圈。右侧的圆圈是v
    asterisk of s prime，通过r连接。
- en: Figure 2-12
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-12
- en: Backup diagram starting from state, taking an action. Empty circles signify
    states, and dark circles signify actions
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 从状态开始，采取行动的回溯图。空圆圈表示状态，深色圆圈表示行动
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig11_HTML.jpg)'
  id: totrans-176
  prefs: []
  type: TYPE_IMG
  zh: '![图](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig11_HTML.jpg)'
- en: 2 tree diagrams of Stochastic and deterministic policies. S is divided into
    a 1, a 2, and up to a n. The deterministic policy mentions only one of pi of a
    i vertical bar S is equal to one and others are all 0\. The expression of the
    Stochastic policy reads summation i = 1 to n of pi of a i vertical bar s = 1.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 2个随机策略和确定性策略的树状图。S被分为1、2，直到n。确定性策略只提到当S等于1时a的pi，其他都是0。随机策略的表达式是求和i=1到n的pi(a|s=1)。
- en: Figure 2-11
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-11
- en: Types of policies. (a) Stochastic policy in which the agent can take one of
    the many actions based on a probability distribution. (b) Deterministic policy
    in which the agent learns to take only one specific action that is optimal
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 策略类型。（a）随机策略，代理可以根据概率分布采取多种行动之一。（b）确定性策略，代理学习只采取一个最优的具体行动
- en: 'The cumulative reward *G*[*t*] (i.e., return) that the agent can get at time
    *t* while in state *S*[*t*] is dependent on the state *S*[*t*], and the policy
    agent is the following. It is known as a *state* *value function*. The value of
    *G*[*t*] is dependent on the trajectory of states that the agent will see after
    time *t*, and trajectories in turn depend on the policy the agent is going to
    follow. Hence, the value function is always defined in the context of the policy
    the agent is following. It is also referred to as the agent’s *behavior*. It is
    formally defined as follows:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 代理在时间*t*处于状态*S*[*t*]时可以获得的累积奖励*G*[*t*]（即回报）取决于状态*S*[*t*]，策略代理如下。它被称为*状态值函数*。*G*[*t*]的值取决于代理在时间*t*之后将看到的州轨迹，而轨迹反过来又取决于代理将要遵循的策略。因此，值函数总是在代理遵循的策略的上下文中定义的。它也被称为代理的*行为*。它正式定义为以下内容：
- en: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{G}_t|{S}_t=s\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ9.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{G}_t|{S}_t=s\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ9.png)'
- en: (2-9)
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: (2-9)
- en: Let’s try to break this down a little bit. *v*[*π*](*s*) specifies the “state
    value” of state *s* when the agent is following a policy *π*. *E*[*π*][·] signifies
    that whatever comes inside the square bracket is an average taken over many samples.
    While it is mathematically known as the *expectation* of the expression inside
    the square brackets under policy *π*, in reality you’ll usually calculate these
    values using simulation. You carry out the calculation over multiple iterations
    and then average the value. As per one of the fundamental laws of statistics,
    averages converge to expectations under general conditions. This concept is regularly
    used in computers while estimating an expectation and is called *Monte Carlo simulations*.
    Coming to the final part, the expression inside the square brackets is (*G*[*t*] | *S*[*t*] = *s*).
    That’s the average return *G*[*t*] over many runs that the agent can see in repeated
    trials at time *t* when the agent is in state *s* at time *t* and the agent’s
    behavior is that of following policy *π*.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试将其分解一下。*v*[*π*](*s*) 指定了当代理遵循策略 *π* 时状态 *s* 的“状态值”。*E*[*π*][·] 表示方括号内的内容是许多样本的平均值。虽然从数学上讲，这是在策略
    *π* 下方括号内表达式的*期望*，但在现实中，你通常会使用模拟来计算这些值。你进行多次迭代计算，然后取平均值。根据统计学的一条基本定律，在一般条件下，平均值收敛到期望。这个概念在计算机中估计期望时经常被使用，被称为*蒙特卡洛模拟*。至于最后一部分，方括号内的表达式是
    (*G*[*t*] | *S*[*t*] = *s*). 那是代理在时间 *t* 时处于状态 *s* 并遵循策略 *π* 的行为下，在重复试验中可以看到的多次运行的平均回报
    *G*[*t*]。
- en: '*Backup diagrams* show the path from time *t* when the agent is in state *S*[*t*]
    to its successor states that the agent can find itself in at time *t* + 1\. It
    depends on the action the agent takes at time *t*, that is, *π*(*A*[*t*] = *a*|
    *S*[*t*] = *s*). Further, it depends on the environment/model transition function
    *Pr*{*S*[*t* + 1] = *s*^′, *R*[*t* + 1] = *r*| *S*[*t*] = *s*, *A*[*t*] = *a*},
    which transitions the agent to state *S*[*t* + 1] with a reward of *R*[*t* + 1]
    based on the action *A*[*t*] it took while in state *S*[*t*]. Pictorially, a one-step
    transition from the current state to the possible successor states is called a
    *backup diagram* and looks like Figure [2-12](#Fig12).'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '*备份图*展示了从时间 *t* 时代理处于状态 *S*[*t*] 到其在时间 *t* + 1 时可能处于的后继状态的路径。这取决于代理在时间 *t*
    所采取的行动，即 *π*(*A*[*t*] = *a*| *S*[*t*] = *s*). 此外，它还取决于环境/模型转换函数 *Pr*{*S*[*t* + 1] = *s*^′,
    *R*[*t* + 1] = *r*| *S*[*t*] = *s*, *A*[*t*] = *a*}，该函数将代理从状态 *S*[*t*] 转换到状态 *S*[*t* + 1]，并基于代理在状态
    *S*[*t*] 时采取的行动 *A*[*t*] 获得奖励 *R*[*t* + 1]。直观上，从当前状态到可能的后继状态的单步转换称为*备份图*，其外观如图
    [2-12](#Fig12) 所示。'
- en: You will make extensive use of backup diagrams, especially in the next section
    about Bellman equations. Backup diagrams are helpful in conceptualizing and reasoning
    about the equations as well as working out the proofs for various RL algorithms.
    They are also helpful in reasoning about data collection required to train agents.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 你将广泛使用备份图，特别是在下一节关于贝尔曼方程的部分。备份图有助于概念化和推理方程，以及解决各种强化学习算法的证明。它们还有助于推理训练代理所需的数据收集。
- en: 'Another related concept to *state value functions* *(*also called *value functions*
    in short*)* is the concept of *action value functions*. A value function is the
    expected cumulative reward the agent gets when it is in a specific state and takes
    actions based on the policy *π*. However, suppose that the agent is free to take
    any action at this first-time step *t* with the condition that it must follow
    policy *π* on all the following time steps from *t* + 1 onward. The expected return
    that the agent gets at time *t* is now known as *action-value-function q*[*π*](*s*,
    *a*). Formally, it is defined as follows:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 与*状态值函数*(*简称*值函数*)相关的另一个概念是*动作值函数*的概念。值函数是代理在特定状态下根据策略 *π* 采取行动时获得的期望累积奖励。然而，假设代理在第一次步骤
    *t* 时可以自由采取任何行动，条件是它必须从 *t* + 1 开始的所有后续时间步骤上遵循策略 *π*。代理在时间 *t* 获得的期望回报现在被称为*动作值函数
    q*[*π*](*s*, *a*)。形式上，它被定义为以下内容：
- en: '![$$ {q}_{\pi}\left(s,a\right)={E}_{\pi }\ \left[\ {G}_t\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ10.png)'
  id: totrans-187
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}_{\pi}\left(s,a\right)={E}_{\pi }\ \left[\ {G}_t\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ10.png)'
- en: (2-10)
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: (2-10)
- en: There is a simple and subtle relationship between *v*-value (state value) and
    *q*-values (state action value), which is explored in detail in the next section.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 价值 *v*-值（状态值）和 *q*-值（状态动作值）之间存在简单而微妙的关系，这在下一节中会详细探讨。
- en: This pretty much completes the definition of various components of an MDP. The
    next section explores the recursive relationship between *v*-value of the states
    and *q*-values of state action at time *t* to that of the successor values at
    time *t* + 1\. Almost all the RL algorithms exploit this recursive relationship.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 这基本上完成了马尔可夫决策过程（MDP）各个组成部分的定义。下一节将探讨状态 *v*-值和状态动作在时间 *t* 的 *q*-值与时间 *t* + 1
    的后续值之间的递归关系。几乎所有的强化学习算法都利用这种递归关系。
- en: Bellman Equations
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Bellman 方程
- en: Bellman equations are a fundamental concept in the field of reinforcement learning
    (RL). They formalize the recursive relationship between the current and successor
    values in a sequential decision-making setup like RL. Almost all the algorithms
    in RL are based on variations of these equations with the purpose of maximizing
    the value functions under different assumptions and approximations. Bellman equations
    provide a powerful tool for understanding and solving Markov Decision Processes
    (MDP) in RL.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: Bellman 方程是强化学习（RL）领域的一个基本概念。它们形式化了在强化学习等顺序决策设置中，当前值和后续值之间的递归关系。几乎所有的强化学习算法都是基于这些方程的变体，目的是在不同的假设和近似下最大化价值函数。Bellman
    方程为理解和解决强化学习中的马尔可夫决策过程（MDP）提供了一个强大的工具。
- en: 'Let’s look again at Equation [2-9](#Equ9), which defines the value function.
    Also let’s look at the definition of *G*[*t*] defined in Equation [2-3](#Equ3);
    both are reproduced here:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次看看定义价值函数的方程 [2-9](#Equ9)，以及方程 [2-3](#Equ3) 中定义的 *G*[*t*] 的定义；两者在此处重述：
- en: '![$$ {G}_t={R}_{t+1}+\upgamma \cdotp {R}_{t+2}+{\upgamma}^2\cdotp {R}_{t+3}+\cdots
    +{\upgamma}^{T-t+1}\cdotp {R}_T $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ11.png)'
  id: totrans-194
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {G}_t={R}_{t+1}+\upgamma \cdotp {R}_{t+2}+{\upgamma}^2\cdotp {R}_{t+3}+\cdots
    +{\upgamma}^{T-t+1}\cdotp {R}_T $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ11.png)'
- en: (2-11)
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: (2-11)
- en: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{G}_t|{S}_t=s\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ12.png)'
  id: totrans-196
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{G}_t|{S}_t=s\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ12.png)'
- en: (2-12)
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: (2-12)
- en: Comparing the two equations, you can see that the value of a state is the expectation/average
    of the cumulative reward if an agent in that state *S* follows a policy *π*. The
    state that the agent finds itself in and the reward it gets from the environment
    are dependent on the policy it is following, that is, the action it takes in a
    given state. There is a recursive relationship in which the expression for *G*[*t*]
    can be written in terms of *G*[*t* + 1].
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 比较这两个方程，你可以看到，如果一个智能体在状态 *S* 中遵循策略 *π*，那么状态的价值是该智能体从环境中获得的累积奖励的期望/平均值。智能体发现自己所处的状态以及它从环境中获得的奖励取决于它遵循的策略，即它在给定状态中采取的动作。存在一个递归关系，其中
    *G*[*t*] 的表达式可以用 *G*[*t* + 1] 来表示。
- en: '![$$ {G}_t={R}_{t+1}+\upgamma \left[{R}_{t+2}+\upgamma {R}_{t+3}+{\upgamma}^2{R}_{t+4}+\cdots
    +{\upgamma}^{T-t+1-1}{R}_T\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ13.png)'
  id: totrans-199
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {G}_t={R}_{t+1}+\upgamma \left[{R}_{t+2}+\upgamma {R}_{t+3}+{\upgamma}^2{R}_{t+4}+\cdots
    +{\upgamma}^{T-t+1-1}{R}_T\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ13.png)'
- en: (2-13)
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: (2-13)
- en: 'Now extract the expression inside the square brackets:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 现在提取方括号内的表达式：
- en: '![$$ {R}_{t+2}+\upgamma {R}_{t+3}+{\upgamma}^2{R}_{t+4}+\cdots +{\upgamma}^{T-t+1-1}{R}_T
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equn.png)'
  id: totrans-202
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {R}_{t+2}+\upgamma {R}_{t+3}+{\upgamma}^2{R}_{t+4}+\cdots +{\upgamma}^{T-t+1-1}{R}_T
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equn.png)'
- en: 'In this expression, you do a change of variables *t*^′ = *t* + 1 changing the
    above expression to:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个表达式中，你进行变量替换 *t*^′ = *t* + 1，将上述表达式变为：
- en: '![$$ {R}_{t\prime +1}+\upgamma {R}_{t\prime +2}+{\upgamma}^2{R}_{t\prime +3}+\cdots
    +{\upgamma}^{T-t\prime +1}{R}_T $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ14.png)'
  id: totrans-204
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {R}_{t\prime +1}+\upgamma {R}_{t\prime +2}+{\upgamma}^2{R}_{t\prime +3}+\cdots
    +{\upgamma}^{T-t\prime +1}{R}_T $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ14.png)'
- en: (2-14)
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: (2-14)
- en: 'Comparing Equation [2-14](#Equ14) to the expression of *G*[*t*] as given in
    Equation [2-11](#Equ11), you can see that:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程 [2-14](#Equ14) 与方程 [2-11](#Equ11) 中给出的 *G*[*t*] 的表达式进行比较，你可以看到：
- en: '![$$ {R}_{t\prime +1}+\upgamma {R}_{t\prime +2}+{\upgamma}^2{R}_{t\prime +3}+\cdots
    +{\upgamma}^{T-t\prime +1}{R}_T={G}_{t\prime }={G}_{t+1} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ15.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {R}_{t\prime +1}+\upgamma {R}_{t\prime +2}+{\upgamma}^2{R}_{t\prime +3}+\cdots
    +{\upgamma}^{T-t\prime +1}{R}_T={G}_{t\prime }={G}_{t+1} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ15.png)'
- en: (2-15)
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: (2-15)
- en: 'Next, substitute Equation [2-15](#Equ15) in 2-13 to get:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，将方程 [2-15](#Equ15) 代入 2-13 中，得到：
- en: '![$$ {G}_t={R}_{t+1}+\upgamma {G}_{t+1} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ16.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {G}_t={R}_{t+1}+\upgamma {G}_{t+1} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ16.png)'
- en: (2-16)
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: (2-16)
- en: 'You can now substitute this recursive definition of *G*[*t*] in the expression
    for *v*[*π*](*s*) in Equation [2-12](#Equ12) to get:'
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，您可以将 *G*[*t*] 的这个递归定义代入方程 [2-12](#Equ12) 中 *v*[*π*](*s*) 的表达式中，得到：
- en: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{R}_{t+1}+\upgamma {G}_{t+1}|{S}_t=s\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ17.png)'
  id: totrans-213
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\uppi}(s)={E}_{\uppi}\left[{R}_{t+1}+\upgamma {G}_{t+1}|{S}_t=s\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ17.png)'
- en: (2-17)
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: (2-17)
- en: 'The expectation *E*[*π*] is over all possible actions *a* that the agent can
    take in state *S*[*t*] = *s* as well as all over the new states the environment
    transitions the agent to defined by the transition function *p*(*s*^′, *r* | *s*,
    *a*). The expanded form of expectation leads to the revised expression of *v*[*π*](*s*)
    as follows:'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 期望 *E*[*π*] 是对所有可能的行为 *a*，该智能体在状态 *S*[*t*] = *s* 下可以采取的所有行为，以及所有由转移函数 *p*(*s*^′,
    *r* | *s*, *a*) 定义的智能体转移到的新状态进行求和。期望的展开形式导致 *v*[*π*](*s*) 的修正表达式如下：
- en: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ18.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a|s\right)\ \sum \limits_{s^{\prime
    },r}p\left({s}^{\prime },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ18.png)'
- en: (2-18)
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: (2-18)
- en: The way to interpret this equation is that the state value for *s* is the average
    over all the rewards and state values for successor states *s*^′. The averaging
    is done based on the policy *π*(*a*| *s*) of taking an action *a* in state *s*
    followed by the environment transition probability *p*(*s*^′, *r* | *s*, *a*)
    of the agent which moves the agents to *s*^′ with reward *r* based on the initial
    state-action pair (*s*, *a*). Equation [2-18](#Equ18) shows the recursive nature
    of linking the state value of the current state (*s*) with the state values of
    the successor states (*s*^′).
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 解释这个方程的方法是，状态 *s* 的状态值是对所有后续状态 *s*^′ 的奖励和状态值的平均值。这种平均是基于在状态 *s* 中采取行为 *a* 的策略
    *π*(*a*| *s*)，然后是智能体根据初始状态-动作对 (*s*, *a*) 将智能体移动到 *s*^′ 并获得奖励 *r* 的环境转移概率 *p*(*s*^′,
    *r* | *s*, *a*)。方程 [2-18](#Equ18) 展示了将当前状态 (*s*) 的状态值与后续状态 (*s*^′) 的状态值链接的递归性质。
- en: A similar relationship exists for action value functions. Let’s start from Equation
    [2-10](#Equ10) and walk through the derivation of the recursive relationship between
    *q*-values.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 对于动作值函数也存在类似的关系。让我们从方程 [2-10](#Equ10) 开始，并逐步推导 *q*-值之间的递归关系。
- en: '![$$ {q}_{\pi}\left(s,a\right)={E}_{\pi }\ \left[\ {G}_t\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equo.png)'
  id: totrans-220
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}_{\pi}\left(s,a\right)={E}_{\pi }\ \left[\ {G}_t\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equo.png)'
- en: '![$$ =\kern0.5em {E}_{\pi }\ \left[\ {R}_t+\gamma\ {G}_{t+1}\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equp.png)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
  zh: '![$$ =\kern0.5em {E}_{\pi }\ \left[\ {R}_t+\gamma\ {G}_{t+1}\ \right|\ {S}_t=s,{A}_t=a\
    \Big] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equp.png)'
- en: 'Expanding the expectation with summing over all possibilities, you get this:'
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 通过对所有可能性进行求和来展开期望，得到以下结果：
- en: '![$$ {q}_{\pi}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ19.png)'
  id: totrans-223
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}_{\pi}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ {v}_{\pi}\left({s}^{\prime}\right)\right]
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ19.png)'
- en: (2-19)
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: (2-19)
- en: 'Comparing Equations [2-18](#Equ18) and [2-19](#Equ19), you will notice that
    the expression for *q*[π](*s*, *a*) has the outer summation over action *a* missing
    with the inner summation of (Equation [2-18](#Equ18)) matching the summation in
    Equation [2-19](#Equ19). This shows the relationship of *v*[*π*](*s*) and *q*[*π*](*s*,
    *a*). They are related through the policy *π*(*s*| *a*) the agent is following.
    The *q*-value is the value of the tuple (*s*, *a*), and the state value is the
    value for a state (*s*). The policy links the state to the possible set of actions
    through a probability distribution. The agent in state *s* takes an action *a*
    using the policy π(*s*| *a*) and the value of that state action pair is defined
    by the action-value function *q*[π](*s*, *a*) :'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 比较方程[2-18](#Equ18)和[2-19](#Equ19)，你会注意到对于*q*[π](*s*, *a*)的表达式，外层求和关于动作*a*缺失，而内层求和与方程[2-19](#Equ19)中的求和相匹配。这显示了*v*[π](*s*)和*q*[π](*s*,
    *a*)之间的关系。它们通过代理遵循的策略*π*(*s*| *a*)相关联。*q*-值是(*s*, *a*)元组的值，状态值是状态(*s*)的值。策略通过概率分布将状态与可能的动作集联系起来。处于状态*s*的代理使用策略π(*s*|
    *a*)采取动作*a*，该状态动作对的值由动作值函数*q*[π](*s*, *a*)定义：
- en: '![$$ {v}_{\pi }(s)=\sum \limits_a\pi \left(a\ \right|s\Big).{q}_{\pi}\left(s,a\right)
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ20.png)'
  id: totrans-226
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ20.png)'
- en: (2-20)
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: (2-20)
- en: You can also infer this relationship from visual inspection of Equations [2-18](#Equ18)
    and [2-19](#Equ19). You can write the relationship between *v*[*π*](*s*) in terms
    of *q*[*π*](*s*, *a*), wherein you replace the inner summation on the right side
    in Equation [2-18](#Equ18) with *q*[*π*](*s*, *a*) as per Equation [2-19](#Equ19).
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以从方程[2-18](#Equ18)和[2-19](#Equ19)的视觉检查中推断出这种关系。你可以用*q*[π](*s*, *a*)来表示*v*[π](*s*)之间的关系，其中按照方程[2-19](#Equ19)将方程[2-18](#Equ18)右侧的内层求和替换为*q*[π](*s*,
    *a*)。
- en: Just like Equation [2-18](#Equ18) gives a recursive relationship of *v*[*π*](*s*)
    in terms of the state values of the next state *v*[*π*](*s*^′), you could also
    express *q*[*π*](*s*, *a*) in Equation [2-19](#Equ19) in terms of the pairs *q*[*π*](*s*^′,
    *a*^′). This is achieved by replacing *v*[*π*](*s*^′) in Equation [2-19](#Equ19)
    with the expression in Equation [2-20](#Equ20). This manipulation gives a recursive
    relationship between *q*-values.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 正如方程[2-18](#Equ18)给出了*v*[π](*s*)关于下一个状态*v*[π](*s*^′)的状态值的递归关系一样，你还可以用方程[2-19](#Equ19)中的对*q*[π](*s*^′,
    *a*^′)来表示*q*[π](*s*, *a*)。这是通过将方程[2-19](#Equ19)中的*v*[π](*s*^′)替换为方程[2-20](#Equ20)中的表达式来实现的。这种操作给出了*q*值的递归关系。
- en: '![$$ {q}_{\pi}\left(s,a\right)=\sum \limits_{s^{\prime },r}p\left({s}^{\prime
    },r\ \right|s,a\Big)\ \left[r+\gamma\ \sum \limits_{a^{\prime }}\pi \left({a}^{\prime
    }|{s}^{\prime}\right)\ q\left({s}^{\prime },{a}^{\prime}\right)\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ21.png)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ21.png)'
- en: (2-21)
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: (2-21)
- en: 'Equations [2-18](#Equ18) and [2-21](#Equ21) link the current state-values/*q*-values
    with successive state-value/*q*-values and can be represented by way of backup
    diagrams. To show this relationship clearly, let’s expand the backup diagram to
    cover the q-value transitions also, as shown in Figure [2-13](#Fig13). The diagram
    follows the standard convention: states *s* are shown as outlined circles, and
    action nodes representing *a* are shown as filled black circles.'
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 方程[2-18](#Equ18)和[2-21](#Equ21)将当前状态值/ *q*值与后续状态值/ *q*值联系起来，可以通过后备图来表示。为了清楚地显示这种关系，让我们将后备图扩展以覆盖q值转换，如图[2-13](#Fig13)所示。该图遵循标准惯例：状态*s*以轮廓圆圈表示，代表动作*a*的动作节点以填充黑色圆圈表示。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig13_HTML.jpg)'
  id: totrans-233
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig13_HTML.jpg)'
- en: 2 tree diagrams. Left. Node s is divided into 3 dark circles that are further
    divided into 2 circles each. The circle at the bottom right is s prime. Right.
    The dark node a is divided into 2 circles with s prime on the right. They are
    further divided into 3 dark circles each, with a prime on the right.
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 2个树形图。左图：节点s分为3个深色圆圈，每个圆圈进一步分为2个圆圈。右下角的圆圈是s'。右图：深色节点a分为2个圆圈，右侧是s'。它们进一步分为每个3个深色圆圈，右侧有a'。
- en: Figure 2-13
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-13
- en: Backup diagram for state values and action values. Outline circles represent
    states, and filled circles represent actions
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 状态价值和动作价值的备份图。轮廓圆圈代表状态，实心圆圈代表动作
- en: Equation [2-18](#Equ18) is the Bellman equation for *v*[*π*](*s*), which is
    reflected in the left side of Figure [2-13](#Fig13). Equation [2-21](#Equ21) is
    the Bellman equation for *q*[*π*](*s*, *a*), which is reflected in right side
    of Figure [2-13](#Fig13). These equations formalize the recursive relationship
    in a sequential decision-making setup like reinforcement learning. All the algorithms
    in reinforcement learning are based on variations of these two equations with
    the purpose of maximizing the value functions under different assumptions and
    approximations. As I go through these algorithms, I will keep highlighting the
    parts of the equation being approximated under certain assumptions along with
    the pros and cons of individual approaches.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 方程式 [2-18](#Equ18) 是 *v*[*π*](*s*) 的贝尔曼方程，它在图 [2-13](#Fig13) 的左侧得到反映。方程式 [2-21](#Equ21)
    是 *q*[*π*](*s*, *a*) 的贝尔曼方程，它在图 [2-13](#Fig13) 的右侧得到反映。这些方程式形式化了强化学习等顺序决策设置中的递归关系。强化学习中的所有算法都是基于这两个方程式的变体，目的是在不同的假设和近似下最大化价值函数。在我介绍这些算法的过程中，我会持续强调在特定假设下被近似的方程式的部分，以及个别方法的优缺点。
- en: A large part of expertise as a practitioner of reinforcement learning will revolve
    first on formulating a real-life problem into an RL setup, choosing what the state
    is, how actions are defined, and what will constitute reward. Secondly, expertise
    will involve choosing the right set of algorithms based on constraints and assumptions.
    Accordingly, the emphasis of this book is on the assumptions required to make
    a technique work best. When to choose which technique based on the problem statement,
    data availability, and other factors along with pros and cons of different approaches
    is also discussed as I introduce different algorithms under RL learning. I will
    present mathematical equations to formalize the relationship, but the core focus
    is to help you gain an intuitive sense of what is going on and when a given approach/algorithm
    makes sense.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 作为强化学习实践者的专业知识，大部分将首先围绕将现实生活中的问题转化为强化学习设置展开，包括选择状态是什么，如何定义动作，以及什么将构成奖励。其次，专业知识将涉及根据约束和假设选择正确的算法集。因此，本书的重点在于使技术发挥最佳效果所需的假设。在介绍不同算法时，我还会讨论根据问题陈述、数据可用性以及其他因素以及不同方法的优缺点来选择哪种技术的时间。我将展示数学方程式来形式化这种关系，但核心重点是帮助您获得对正在发生的事情以及给定方法/算法何时合理的直观感觉。
- en: Optimality Bellman Equations
  id: totrans-239
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最优贝尔曼方程
- en: 'Solving a reinforcement learning problem means finding (learning) a policy
    that maximizes the state value functions. Suppose you have a set of policies.
    The objective then would be to choose the policy that maximizes the state value
    *v*[*π*](*s*). The optimal value function for a state is defined as *v*^∗(*s*).
    The relation for optimal state value can be stated as follows:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 解决强化学习问题意味着找到（学习）一个最大化状态价值函数的策略。假设你有一组策略。那么目标就是选择最大化状态价值 *v*[*π*](*s*) 的策略。一个状态的最优价值函数定义为
    *v*^∗(*s*)。最优状态价值的关系可以表述如下：
- en: '![$$ {v}^{\ast }(s)=\underset{\uppi}{\max }{v}_{\uppi}(s) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ22.png)'
  id: totrans-241
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}^{\ast }(s)=\underset{\uppi}{\max }{v}_{\uppi}(s) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ22.png)'
- en: (2-22)
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: (2-22)
- en: 'The previous equation shows that the optimal state value is the maximum state
    value that can be obtained across all possible policies π. Suppose this optimal
    policy is denoted by a superscript (*) to the policy, that is, π^∗. If an agent
    is following the optimal policy, then the agent in state (*s*) will take that
    action (*a*), which maximizes the *q*(*s*, *a*) obtained under the optimal policy.
    In other words, Equation [2-20](#Equ20) is modified from being an expectation
    to a maximization as follows:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 之前的方程式表明，最优状态价值是在所有可能的策略 π 中可以获得的最大状态价值。假设这个最优策略用策略的上方带星号(*)表示，即 π^∗。如果一个智能体遵循最优策略，那么该智能体在状态
    (*s*) 将采取那个动作 (*a*)，该动作在最优策略下最大化 *q*(*s*, *a*)。换句话说，方程式 [2-20](#Equ20) 从期望值修改为最大化如下：
- en: '![$$ {v}^{\ast }(s)=\underset{a}{\max }{q}_{\uppi^{\ast }}\left(s,a\right)
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ23.png)'
  id: totrans-244
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {v}^{\ast }(s)=\underset{a}{\max }{q}_{\uppi^{\ast }}\left(s,a\right)
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ23.png)'
- en: (2-23)
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: (2-23)
- en: 'Replacing the expression of ![$$ {q}_{\pi^{\ast }}\left(s,a\right) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq5.png)
    from Equation [2-19](#Equ19), the revised expression of *v*^∗(*s*) as given here,
    in which *v*^∗(*s*) is recursively linked to the optimal value of the next states:'
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 用方程 [2-19](#Equ19) 中的表达式 ![$$ {q}_{\pi^{\ast }}\left(s,a\right) $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_IEq5.png)
    替换后，这里给出的 *v*^∗(*s*) 的修正表达式，其中 *v*^∗(*s*) 递归地与下一个状态的最优值相联系：
- en: '![$$ {\mathrm{v}}^{\ast}\left(\mathrm{s}\right)=\underset{\mathrm{a}}{\max
    }{\sum}_{\mathrm{s}\prime, r}\left[\mathrm{p}\left({\mathrm{s}}^{\prime },\mathrm{r}|\mathrm{s},\mathrm{a}\right)\left[\mathrm{r}+\upgamma
    \cdotp {\mathrm{v}}^{\ast}\left({\mathrm{s}}^{\prime}\right)\right]\right\} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ24.png)'
  id: totrans-247
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {\mathrm{v}}^{\ast}\left(\mathrm{s}\right)=\underset{\mathrm{a}}{\max
    }{\sum}_{\mathrm{s}\prime, r}\left[\mathrm{p}\left({\mathrm{s}}^{\prime },\mathrm{r}|\mathrm{s},\mathrm{a}\right)\left[\mathrm{r}+\upgamma
    \cdotp {\mathrm{v}}^{\ast}\left({\mathrm{s}}^{\prime}\right)\right]\right\} $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ24.png)'
- en: (2-24)
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: (2-24)
- en: 'Equation [2-24](#Equ24) links the optimal state value in state *s* with the
    optimal state values *s*^′ in the next time step. Next, let’s derive a recursive
    relationship between the *q*-values. Start with Equation [2-19](#Equ19) and substitute
    the *v*(*s*^′) with the expression in 2-23, which links *v*^∗ with *q*^∗. This
    substitution leads to the revised recursive relation between *q*-values:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: 方程 [2-24](#Equ24) 将状态 *s* 中的最优状态值与下一个时间步的最优状态值 *s*^′ 相联系。接下来，让我们推导出 *q*-值的递归关系。从方程
    [2-19](#Equ19) 开始，用 2-23 中的表达式替换 *v*(*s*^′)，该表达式将 *v*^∗ 与 *q*^∗ 相联系。这种替换导致 *q*-值之间的修正递归关系：
- en: '![$$ {q}^{\ast}\left(s,a\right)={\sum}_{s\prime, r}p\left({s}^{\prime },r|s,a\right)\cdotp
    \left[r+\upgamma \cdotp \underset{a^{\prime }}{\max }{q}^{\ast}\left({s}^{\prime
    },{a}^{\prime}\right)\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ25.png)'
  id: totrans-250
  prefs: []
  type: TYPE_IMG
  zh: '![$$ {q}^{\ast}\left(s,a\right)={\sum}_{s\prime, r}p\left({s}^{\prime },r|s,a\right)\cdotp
    \left[r+\upgamma \cdotp \underset{a^{\prime }}{\max }{q}^{\ast}\left({s}^{\prime
    },{a}^{\prime}\right)\right] $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equ25.png)'
- en: (2-25)
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: (2-25)
- en: You will notice the optimal equation for state value in Equation [2-24](#Equ24)
    is a tough one to solve, as the max operator comes outside the summation side.
    At the same time, the optimal value of the *q* state action values in Equation
    [2-25](#Equ25) is far easier to solve due to the max operation being restricted
    to the individual following states *s*^′ instead of the max over summation. These
    optimal equations can be represented using backup diagrams, as shown in Figure
    [2-14](#Fig14), which highlights the recursive relationship between the current
    and successor values.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 你会注意到方程 [2-24](#Equ24) 中的状态值最优方程很难解决，因为最大值操作在求和符号的外面。同时，由于最大操作仅限于单个后续状态 *s*^′
    而不是求和的最大值，方程 [2-25](#Equ25) 中的 *q* 状态动作值的最优值要容易解决得多。这些最优方程可以用后备图表示，如图 [2-14](#Fig14)
    所示，该图突出了当前值和后续值之间的递归关系。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig14_HTML.jpg)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
  zh: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig14_HTML.jpg)'
- en: 2 tree diagrams. Left. Node v asterisk of s is divided into 3 dark circles that
    are further divided into 2 circles each. Right. The dark node q asterisk of s,
    a is divided into 2 circles with v asterisk of s prime on the right. They are
    further divided into 3 dark circles each, with q asterisk of s prime, a prime
    on the right.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 2 个树状图。左侧。节点 v asterisk of s 被分为 3 个深色圆圈，每个圆圈进一步分为 2 个圆圈。右侧。深色节点 q asterisk
    of s, a 被分为 2 个圆圈，v asterisk of s prime 在右侧。它们进一步分为 3 个深色圆圈，每个圆圈都有 q asterisk
    of s prime, a prime 在右侧。
- en: Figure 2-14
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-14
- en: Backup diagram for optimal state values and action values. Policy π is replaced
    by the “max” operation
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 最优状态值和动作值的后备图。策略 π 被替换为“最大”操作
- en: Once you have *v*^∗(*s*) using Equation [2-24](#Equ24), it is straightforward
    to derive the optimal policy. You use a one-step backup diagram, as shown in Figure
    [2-14](#Fig14), to find the *a*^∗ that resulted in the optimal value *v*^∗. It
    can be seen as a one-step search. Once you have optimal *q*^∗(*s*, *a*) using
    Equation [2-25](#Equ25), finding the optimal policy is even easier. In a state
    *s*, you just choose the action *a*, which has the highest value of *q*. This
    is evident from right-side backup diagram in Figure [2-14](#Fig14). Let’s apply
    these concepts to the problem of the electric van introduced in Figure [2-10](#Fig10),
    which is reproduced in Figure [2-15](#Fig15).
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你使用方程 [2-24](#Equ24) 得到 *v*^∗(*s*)，推导最优策略就很简单了。你使用一步回溯图，如图 [2-14](#Fig14)
    所示，来找到导致最优值 *v*^∗ 的 *a*^∗。这可以看作是一步搜索。一旦你使用方程 [2-25](#Equ25) 得到最优 *q*^∗(*s*, *a*)，找到最优策略就更加容易了。在状态
    *s* 中，你只需选择具有最高 *q* 值的动作 *a*。这可以从图 [2-14](#Fig14) 中的右侧回溯图中看出。让我们将这些概念应用到图 [2-10](#Fig10)
    中介绍的电动货车问题，该问题在图 [2-15](#Fig15) 中重现。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig15_HTML.jpg)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig15_HTML.jpg)'
- en: A state diagram with 2 states, low and high charges. The low charge state is
    connected to 3 dark circles labeled ferry, idle, and recharge. The high charge
    state is connected to 2 circles of ferry and idle. The values of p and r are provided
    on the links.
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 具有两个状态（低电量和高电量）的状态图。低电量状态连接到标记为渡轮、空转和充电的 3 个暗色圆圈。高电量状态连接到 2 个渡轮和空转的圆圈。p 和 r
    的值在链接上提供。
- en: Figure 2-15
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2-15
- en: 'Electric van: continuing Markov Decision Process with two states. Each state
    has three actions: idle, ferry, or recharge. Reproduction of Figure [2-10](#Fig10)'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
  zh: 电动货车：继续使用两个状态的马氏决策过程。每个状态有三个动作：空转、渡轮或充电。图 [2-10](#Fig10) 的重现
- en: Let’s draw the table depicting various values, as shown in Table [2-1](#Tab1).
    This table lists all the *possible combinations of* (*s*, *a*, *s*^′, *r*) as
    well as probability *p*(*s*^′, *r* | *s*, *a*).
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们绘制一个表格，展示各种值，如表 [2-1](#Tab1) 所示。此表列出了所有 (*s*, *a*, *s*′, *r*) 的可能组合以及概率 *p*(*s*′,
    *r* | *s*, *a*).
- en: Table 2-1
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 表 2-1
- en: System Dynamics for MDP in Figure [2-5](#Fig5)
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 图 [2-5](#Fig5) 中的 MDP 系统动力学
- en: '| State (***s***) | Action (***a***) | New State (***s***^′) | Reward (***r***)
    | ***p***(***s***^′, ***r*** &#124;  ***s***, ***a***) |'
  id: totrans-265
  prefs: []
  type: TYPE_TB
  zh: '| 状态 (***s***) | 动作 (***a***) | 新状态 (***s***^′) | 奖励 (***r***) | ***p***(***s***^′,
    ***r*** &#124;  ***s***, ***a***) |'
- en: '| --- | --- | --- | --- | --- |'
  id: totrans-266
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- |'
- en: '| Low battery | Idle | Low battery | a | 1.0 |'
  id: totrans-267
  prefs: []
  type: TYPE_TB
  zh: '| 低电量 | 空转 | 低电量 | a | 1.0 |'
- en: '| Low battery | Charge | High battery | 0 | 1.0 |'
  id: totrans-268
  prefs: []
  type: TYPE_TB
  zh: '| 低电量 | 充电 | 高电量 | 0 | 1.0 |'
- en: '| Low battery | Ferry | Low battery | b | α |'
  id: totrans-269
  prefs: []
  type: TYPE_TB
  zh: '| 低电量 | 渡轮 | 低电量 | b | α |'
- en: '| Low battery | Ferry | High battery | -10 | 1- α |'
  id: totrans-270
  prefs: []
  type: TYPE_TB
  zh: '| 低电量 | 渡轮 | 高电量 | -10 | 1- α |'
- en: '| High battery | Idle | High battery | a | 1.0 |'
  id: totrans-271
  prefs: []
  type: TYPE_TB
  zh: '| 高电量 | 空转 | 高电量 | a | 1.0 |'
- en: '| High battery | Ferry | High battery | b | β |'
  id: totrans-272
  prefs: []
  type: TYPE_TB
  zh: '| 高电量 | 渡轮 | 高电量 | b | β |'
- en: '| High battery | Ferry | Low battery | b | 1-β |'
  id: totrans-273
  prefs: []
  type: TYPE_TB
  zh: '| 高电量 | 渡轮 | 低电量 | b | 1-β |'
- en: You can use Table [2-1](#Tab1) to calculate the optimal state values using Equation
    [2-24](#Equ24).
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用表 [2-1](#Tab1) 和方程 [2-24](#Equ24) 来计算最优状态值。
- en: '![$$ {v}^{\ast}\left(\mathrm{low}\right)=\mathit{\max}\ \left\{\begin{array}{c}a+\gamma\
    {v}^{\ast }(low)\\ {}\gamma\ {v}^{\ast }(high)\\ {}\alpha \left[b+\gamma {v}^{\ast
    }(low)\right]+\left(1-\alpha \right).\left[-10+\gamma\ {v}^{\ast }(high)\right]\end{array}\right.
    $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equq.png)'
  id: totrans-275
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equq.png)'
- en: '![$$ {v}^{\ast }(high)=\max \left\{\begin{array}{c}a+\gamma\ {v}^{\ast }(high)\\
    {}\beta\ \left[b+\gamma\ {v}^{\ast }(high)\right]+\left(1-\beta \right).\left[b+\gamma\
    {v}^{\ast }(low)\right]\end{array}\right. $$](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equr.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
  zh: '![公式](../images/502835_2_En_2_Chapter/502835_2_En_2_Chapter_TeX_Equr.png)'
- en: 'For given set of values of *a*, *b*, *α*, *β*, *γ*, there will be a unique
    solution for *v*^∗(*high*) and *v*^∗(*low*) that will satisfy the previous equations.
    However, explicitly solving equations is feasible only for simple toy problems.
    Real-life bigger problems require the use of other methods that are scalable.
    This is exactly what you are going to study in the rest of the book: various approaches
    and related algorithms to solve Bellman equations for an optimal policy.'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的*a*，*b*，*α*，*β*，*γ*的值，将有一个独特的解*v*^∗(*high*)和*v*^∗(*low*)，它将满足前面的方程。然而，显式求解方程仅适用于简单的玩具问题。现实生活中的更大问题需要使用其他可扩展的方法。这正是你将在本书的其余部分学习的内容：解决最优策略的Bellman方程的各种方法和相关算法。
- en: Train Your First Agent
  id: totrans-278
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练你的第一个智能体
- en: This section looks at two Gymnasium environments and two algorithms to train
    agents for these two environments. Along the way, you will learn about different
    RL libraries in Python that you will be using throughout the book. As this is
    the first introduction to RL training, you will be looking at the training algorithms
    as black boxes with a focus to get familiar with the libraries and different components
    required for carrying out RL training. However, as you progress with the book,
    you will be opening up the black boxes and writing your own versions of these
    algorithms to gain deeper understanding.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了两个Gymnasium环境和两个算法，用于训练这两个环境的智能体。在这个过程中，你将了解Python中你将在整本书中使用的不同RL库。由于这是对RL训练的第一次介绍，你将把训练算法视为黑盒，重点是熟悉库和进行RL训练所需的不同组件。然而，随着你对本书的深入，你将打开黑盒，编写自己版本的这些算法，以获得更深入的理解。
- en: First Agent
  id: totrans-280
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一个智能体
- en: 'This section uses an environment called LunarLander, which is a classic rocket
    trajectory optimization problem (see Figure [2-16](#Fig16)). The aim is to land
    the craft on the landing pad as marked by two flags. There are four possible actions
    (*a*) to control the craft:'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 本节使用一个名为LunarLander的环境，这是一个经典的火箭轨迹优化问题（见图[2-16](#Fig16)）。目标是让船体在两个标志标记的着陆台上着陆。有四种可能的行为（*a*）来控制船体：
- en: '0: Do nothing'
  id: totrans-282
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '0: 不做任何事情'
- en: '1: Fire left orientation engine'
  id: totrans-283
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '1: 点火左侧方向引擎'
- en: '2: Fire main engine'
  id: totrans-284
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '2: 点火主引擎'
- en: '3: Fire right orientation engine'
  id: totrans-285
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '3: 点火右侧方向引擎'
- en: 'The observation (*o*), that is, the part of the state environment exposed to
    the agent consists of eight-dimensional vector:'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: 观察结果（*o*），即暴露给智能体的状态环境的一部分，由一个八维向量组成：
- en: x, y coordinates of the lander
  id: totrans-287
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 着陆器的x，y坐标
- en: Linear velocities in the x and y directions
  id: totrans-288
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: x和y方向上的线性速度
- en: The craft’s angle and its angular velocity
  id: totrans-289
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 船体的角度及其角速度
- en: Two flags indicating respectively if the left and right leg are in contact with
    the ground
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个标志分别表示左腿和右腿是否与地面接触
- en: The rewards are awarded at each time step based on how far the craft is to the
    landing pad, whether it is tilted or straight, whether the engines are firing,
    and whether either leg is in contact with the ground. Landing safely or crashing
    earns extra +ve / -ve rewards. You can read more about it in the Gymnasium documentation.^([4](#Fn4))
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励在每个时间步根据船体与着陆台的距离、是否倾斜或直立、引擎是否点火以及是否有任何一条腿与地面接触来发放。安全着陆或坠毁会获得额外的正/负奖励。你可以在Gymnasium文档中了解更多信息.^([4](#Fn4))
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig16_HTML.jpg)'
  id: totrans-292
  prefs: []
  type: TYPE_IMG
  zh: '![图2-16](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig16_HTML.jpg)'
- en: An illustration of Lunar Lander depicts the landing of the lunar between two
    flags in the bright environment from the dark space.
  id: totrans-293
  prefs: []
  type: TYPE_NORMAL
  zh: Lunar Lander的插图显示了在明亮环境中，在两个标志之间着陆的月球。
- en: Figure 2-16
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-16
- en: LunarLander environment from the Gymnasium library - [`https://gymnasium.farama.org/environments/box2d/lunar_lander/`](https://gymnasium.farama.org/environments/box2d/lunar_lander/)
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Gymnasium库的LunarLander环境 - [LunarLander环境](https://gymnasium.farama.org/environments/box2d/lunar_lander/)
- en: This example uses DQN, or Deep Q-Network, which is a reinforcement learning
    algorithm that combines the traditional Q-learning algorithm with the power of
    deep neural networks. It is used to approximate the optimal action-value function,
    which represents the maximum expected future rewards for taking a particular action
    in a given state. DQN has been successfully applied to a wide range of problems,
    including game playing and control tasks, and has been shown to achieve human-level
    performance in many cases.
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例使用DQN，或深度Q网络，这是一种结合了传统Q学习算法和深度神经网络能力的强化学习算法。它用于逼近最优动作值函数，该函数表示在给定状态下采取特定动作的最大期望未来奖励。DQN已被成功应用于广泛的问题，包括游戏和控制任务，并且在许多情况下已显示出达到人类水平的表现。
- en: Chapter [6](502835_2_En_6_Chapter.xhtml) and [7](502835_2_En_7_Chapter.xhtml)
    are devoted to a deep dive of DQN and its variants. Therefore, this chapter simply
    shows an example without getting into the specifics of how DQN works.
  id: totrans-297
  prefs: []
  type: TYPE_NORMAL
  zh: 第[6](502835_2_En_6_Chapter.xhtml)章和第[7](502835_2_En_7_Chapter.xhtml)章专注于对DQN及其变体的深入探讨。因此，本章仅展示一个示例，而不深入探讨DQN的工作原理的具体细节。
- en: This example uses another library called `stable_baseline3` to create a small
    neural network that learns the agent policy π(*a*| *s*), that is, the mapping
    of state to action. Input to the network is the eight-dimensional observation
    vector and action is a value from the discrete set of four actions {0, 1, 2, 3}.
    DQN agents need to explore the environment in a random way to have good coverage
    of possible *(state, action) ➤ next_action* transitions. This is specified by
    setting `exploration_final_eps=0.1` The verbosity is defined as 1 in order to
    get appropriate level of logs. Refer to the notebook `2.c-First-Agent.ipynb` for
    details. Note that you can either run the notebook locally in an environment you
    created following the instructions in Chapter [1](502835_2_En_1_Chapter.xhtml),
    or you can run the notebooks directly on Google Colab, which is a web-hosted Python
    environment with a free tier and paid tiers. For the book, the free tier of Colab
    will mostly suffice. The excerpt where DQN is instantiated is shown in Listing
    [2-3](#PC4).
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
  zh: 此示例使用另一个名为`stable_baseline3`的库来创建一个小型神经网络，该神经网络学习智能体的策略π(*a*| *s*)，即状态到动作的映射。网络的输入是八维观察向量，动作是从离散动作集{0,
    1, 2, 3}中的一个值。DQN智能体需要以随机方式探索环境，以获得可能的*(状态, 动作) ➤ 下一个动作*转换的良好覆盖。这通过设置`exploration_final_eps=0.1`来实现。日志详细程度定义为1，以便获得适当的日志级别。有关详细信息，请参阅笔记本`2.c-First-Agent.ipynb`。请注意，您可以在遵循第[1](502835_2_En_1_Chapter.xhtml)章中的说明创建的环境中本地运行笔记本，或者您可以直接在Google
    Colab上运行笔记本，Google Colab是一个提供免费层和付费层的网络托管Python环境。对于本书，Colab的免费层通常就足够了。DQN实例化的摘录在列表[2-3](#PC4)中显示。
- en: '[PRE3]'
  id: totrans-299
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Next, train the agent and save it using the built-in DQN algorithm from the
    `stable_baselines3` library. Training is done by calling the `model.learn` function
    with `total_timesteps=int(1e5)` to run training for 100,000 steps, `log_interval=400`
    to log the progress of training every 400 episodes (and not 400 steps), and finally
    setting `progress_bar=True` to observe the progress of training with the help
    of a progress bar.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用`stable_baselines3`库内置的DQN算法训练智能体并将其保存。通过调用`model.learn`函数，设置`total_timesteps=int(1e5)`以运行10万步的训练，`log_interval=400`以每400个回合（而不是400步）记录训练进度，并最终设置`progress_bar=True`以通过进度条观察训练进度。
- en: '[PRE4]'
  id: totrans-301
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: You then evaluate the trained agent to check the performance using the following
    code. The agent, before training, produced a mean reward of -600, which improves
    to about +100 after 100,000 steps of training. See Listing [2-5](#PC6).
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: 然后您可以使用以下代码评估训练好的智能体以检查其性能。在训练之前，智能体产生的平均奖励为-600，经过10万步的训练后，平均奖励提升到约+100。请参阅列表[2-5](#PC6)。
- en: '[PRE5]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The notebook `2.c-First-Agent.ipynb` also shows the way you can record the
    video of the trained agent. After you are satisfied with the result of training,
    you can use `huggingface` to upload the model, which then can be shared with others.
    In order to upload the model to `huggingface`, you will need to generate a token
    to enable notebook access to your `huggingface` account. First create an account
    at `huggingface.co` if you do not have one already. You can create/find a `huggingface`
    token at [`https://huggingface.co/settings/tokens`](https://huggingface.co/settings/tokens).
    Once your model has been pushed to `huggingface`, you can navigate to the link
    where it is hosted. The URL is printed at the end by the code used for pushing
    the model to the `huggingface` hub. In my case, it looks like this: [`https://huggingface.co/nsanghi/dqn-LunarLander-v2`](https://huggingface.co/nsanghi/dqn-LunarLander-v2).
    The `nsanghi` corresponds to my `huggingface` login and `dnq-LunarLander-v2` refers
    to the space/repository on `huggingface` under my account where the model was
    pushed, based on the name I defined in the `package_to_hub()` function call in
    the notebook. The call to this function is shown in Listing [2-6](#PC7). Change
    the `repo_id` to refer to your `huggingface` account login before you run this
    code.'
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: 笔记本`2.c-First-Agent.ipynb`还展示了如何记录训练代理的视频。在你对训练结果满意后，你可以使用`huggingface`上传模型，然后可以与他人分享。为了将模型上传到`huggingface`，你需要生成一个令牌以启用笔记本访问你的`huggingface`账户。首先，如果你还没有账户，请在`huggingface.co`上创建一个账户。你可以在[`https://huggingface.co/settings/tokens`](https://huggingface.co/settings/tokens)创建/找到`huggingface`令牌。一旦你的模型被推送到`huggingface`，你可以导航到它托管的位置。URL由用于将模型推送到`huggingface`枢纽的代码打印在最后。在我的情况下，它看起来像这样：[`https://huggingface.co/nsanghi/dqn-LunarLander-v2`](https://huggingface.co/nsanghi/dqn-LunarLander-v2)。`nsanghi`对应于我的`huggingface`登录，`dqn-LunarLander-v2`指的是我在账户下的`huggingface`空间/存储库，该模型基于我在笔记本中`package_to_hub()`函数调用中定义的名称被推送到。此函数的调用在列表[2-6](#PC7)中显示。在运行此代码之前，将`repo_id`更改为指向你的`huggingface`账户登录。
- en: '[PRE6]'
  id: totrans-305
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: You can share this link with your friends and family to show the performance
    of the agent you have trained using just a few lines of code.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将此链接与你的朋友和家人分享，以展示你仅用几行代码训练的代理的性能。
- en: Walkthrough of Common Libraries Used
  id: totrans-307
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 常用库的概述
- en: This section takes a quick tour of the libraries used in training an agent on
    the LunarLander environment, as well as a few other common libraries you will
    be using in other chapters.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 本节简要介绍了在LunarLander环境中训练代理所使用的库，以及在其他章节中你将使用的一些其他常用库。
- en: 'Environments: Gymnasium and OpenAI Gym'
  id: totrans-309
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 环境：Gymnasium和OpenAI Gym
- en: 'As described in the first section in this chapter on RL definitions, every
    RL problem must have a concept of environment, which is about states, actions,
    and rewards, that is, what a state is, what actions are possible by the agent,
    and what kinds of rewards the agent can get. The agent receives a state, uses
    a policy that it learns outside of environment to take an action, and passes this
    action to the environment. The environment takes the action as input and steps
    the agent to the next time instance, returning a bunch of things: the next state,
    the reward, the terminated flag, the truncated flag, and some debug info. The
    Gymnasium^([5](#Fn5)) library, which is a port of the OpenAI Gym library, provides
    a standard interface to all the RL environments. This makes it modular, whereby
    the learning algorithm code is abstracted away from the code of the environment
    dynamics/model. Gymnasium, in addition to providing a standard interface, also
    provides a wide range of environments:'
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: 如本章第一部分关于强化学习定义的描述，每个强化学习问题都必须有一个环境的概念，这涉及到状态、动作和奖励，即状态是什么，代理可以执行哪些动作，以及代理可以获得哪些类型的奖励。代理接收一个状态，使用它在环境外学习的策略采取一个动作，并将这个动作传递给环境。环境将动作作为输入，将代理推进到下一个时间实例，并返回一系列东西：下一个状态、奖励、终止标志、截断标志和一些调试信息。Gymnasium^([5](#Fn5))库，是OpenAI
    Gym库的移植，提供了一个标准接口来访问所有强化学习环境。这使得它模块化，学习算法代码被抽象化，与环境的动力学/模型代码分离。Gymnasium除了提供标准接口外，还提供了一系列广泛的环境：
- en: '**Classic Control****:** This is classic reinforcement learning based on real-world
    problems and physics.'
  id: totrans-311
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**经典控制**：这是基于现实世界问题和物理的经典强化学习。'
- en: '**Box2D****:** These environments all involve toy games based around physics
    control, using Box2D-based physics and PyGame-based rendering.'
  id: totrans-312
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Box2D**：这些环境都涉及基于物理控制的玩具游戏，使用基于Box2D的物理和基于PyGame的渲染。'
- en: '**Toy Text****:** These environments are designed to be extremely simple, with
    small discrete state and action spaces, and hence are easy to learn. They are
    suitable for debugging implementations of reinforcement learning algorithms.'
  id: totrans-313
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**玩具文本**：这些环境被设计得非常简单，具有小的离散状态和动作空间，因此易于学习。它们适合调试强化学习算法的实现。'
- en: '**MuJoCo****:** Physics engine based environments with multi-joint controls,
    which are more complex than the Box2D environments.'
  id: totrans-314
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MuJoCo**：基于多关节控制的物理引擎环境，比Box2D环境更复杂。'
- en: '**Atari:** A set of 57 Atari 2600 environments simulated through Stella and
    the Arcade Learning Environment that have a high range of complexity for agents
    to learn.'
  id: totrans-315
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Atari**：通过Stella和Arcade Learning Environment模拟的57个Atari 2600环境，这些环境具有高复杂度，使智能体能够学习。'
- en: '**Third-party options****:** A number of environments have been created that
    are compatible with the Gymnasium API.'
  id: totrans-316
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三方选项**：已创建了一些与Gymnasium API兼容的环境。'
- en: Gymnasium is a new port of the original OpenAI Gym. While it has mostly retained
    the function signatures of the OpenAI Gym, there are some subtle differences.
    The popular RL libraries are still in the process of adding support to Gymnasium.
    While installing these other libraries, be sure to install the version appropriate
    for the Gymnasium port.
  id: totrans-317
  prefs: []
  type: TYPE_NORMAL
  zh: Gymnasium是原始OpenAI Gym的新端口。虽然它主要保留了OpenAI Gym的功能签名，但也有一些细微的差异。流行的RL库仍在添加对Gymnasium的支持。在安装这些其他库时，请确保安装适用于Gymnasium端口的版本。
- en: Stable Baselines3 (SB3)
  id: totrans-318
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 稳定基线3 (SB3)
- en: 'Stable Baselines3^([6](#Fn6)) (SB3) is a set of reliable implementations of
    reinforcement learning algorithms in PyTorch. It is the next major version of
    Stable Baselines version 2\. You can read a detailed presentation of Stable Baselines3
    in the JMLR paper^([7](#Fn7)). It implements seven common algorithms:'
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定基线3^([6](#Fn6)) (SB3) 是PyTorch中强化学习算法的可靠实现集合。它是稳定基线版本2的下一个主要版本。您可以在JMLR论文^([7](#Fn7))中阅读关于稳定基线3的详细介绍。它实现了七个常见算法：
- en: Advantage Actor Critic(A2C)
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优势演员评论家(A2C)
- en: Deep Deterministic Policy Gradient (DDPG)
  id: totrans-321
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度确定性策略梯度 (DDPG)
- en: Deep Q Network (DQN)
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度Q网络 (DQN)
- en: Hindsight Experience Replay (HER), which works with DQN, SAC, TD3, and DDPG
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 后见之明经验回放 (HER)，与DQN、SAC、TD3和DDPG一起工作
- en: Proximal Policy Optimization (PPO)
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 近端策略优化 (PPO)
- en: Soft Actor Critic (SAC)
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 软演员评论家 (SAC)
- en: Twin Delayed DDPG (TD3)
  id: totrans-326
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 双延迟DDPG (TD3)
- en: The implementations have been benchmarked against reference codebases, and automated
    unit tests cover 95% of the code. The algorithms follow a consistent interface.
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 这些实现已经与参考代码库进行了基准测试，并且自动单元测试覆盖了95%的代码。算法遵循一致的接口。
- en: RL Baselines3 Zoo
  id: totrans-328
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RL Baselines3 池
- en: RL Baselines3 Zoo^([8](#Fn8)) is a training framework for reinforcement learning,
    using Stable Baselines3\. It provides scripts for training, evaluating agents,
    tuning hyperparameters, plotting results, and recording videos.
  id: totrans-329
  prefs: []
  type: TYPE_NORMAL
  zh: RL Baselines3 池^([8](#Fn8)) 是使用Stable Baselines3的强化学习训练框架。它提供了用于训练、评估智能体、调整超参数、绘制结果和录制视频的脚本。
- en: In addition, it includes a collection of tuned hyperparameters for common environments
    and RL algorithms, and agents trained with those settings.
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它还包括一组针对常见环境和RL算法的调优超参数，以及使用这些设置训练的智能体。
- en: Hugging Face
  id: totrans-331
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Hugging Face
- en: Hugging Face^([9](#Fn9)) has an extensive set of Python libraries around Transformers,
    which was introduced in a seminar paper titled “Attention is all you need”^([10](#Fn10))
    in 2017\. This resulted in an explosion of various derivatives of this idea for
    solving natural language processing (NLP) related learning methods. All the recent
    language models are increasing based on the variations of this architecture—including
    the OpenAI GPT family, Google’s BERT and BARD, Meta’s Llama and Llama2, and many
    more. Hugging Face came into the scene to provide standard, easy-to-use implementations
    of these language models—the model code, the infrastructure including data management,
    training runs, and space to host trained models. It enabled collaboration in the
    open-source community and now covers all other kinds of deep learning models,
    including ones related to vision, voice, and reinforcement learning. I use this
    library extensively when I touch upon the topic of RLHF (Reinforcement Learning
    from Human Feedback), which is an approach introduced by OpenAI in developing
    InstructGPT and ChatGPT. Since then, it has been adopted by almost all LLM-based
    chat and instruction following models. A section in one of the later chapters
    is devoted to RLHF.
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: Hugging Face^([9](#Fn9))围绕Transformers提供了一套广泛的Python库，该库是在2017年一篇题为“Attention
    is all you need”^([10](#Fn10))的研讨会论文中引入的。这导致了各种基于这一想法的衍生方法爆炸式增长，用于解决自然语言处理（NLP）相关的学习方法。所有最新的语言模型都是基于这种架构的变体而增加的——包括OpenAI的GPT系列，Google的BERT和BARD，Meta的Llama和Llama2，以及许多其他模型。Hugging
    Face的出现是为了提供这些语言模型的标准化、易于使用的实现——包括模型代码、基础设施（包括数据管理、训练运行和托管训练模型的空间）。它促进了开源社区的协作，现在它涵盖了所有其他类型的深度学习模型，包括与视觉、语音和强化学习相关的模型。当我涉及到RLHF（基于人类反馈的强化学习）这一主题时，我会广泛使用这个库，这是OpenAI在开发InstructGPT和ChatGPT时引入的一种方法。从那时起，它几乎被所有基于LLM的聊天和指令遵循模型所采用。在后续章节中的一个部分专门介绍了RLHF。
- en: However, even before I go to RLHF, I will be using the Hugging Face hub to host
    the trained models so that the same can be shared with others, including a video
    of the agent in action post training. This is what I did in the section titled
    “Train First Agent”.
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，即使在开始RLHF之前，我将会使用Hugging Face hub来托管训练好的模型，以便其他人也可以共享，包括训练后智能体动作的视频。这就是我在“首先训练智能体”这一节中所做的。
- en: Second Agent
  id: totrans-334
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二个智能体
- en: Now you’ll see how to train an agent to play the Atari Game of Pong. This example
    uses an environment from the Atari Simulator. Atari environments are simulated
    via the Arcade Learning Environment ALE^([11](#Fn11)) through Stella.^([12](#Fn12))
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你将看到如何训练一个智能体来玩Atari乒乓球游戏。这个例子使用的是Atari模拟器中的环境。Atari环境通过Arcade Learning Environment（ALE）^([11](#Fn11))通过Stella模拟.^([12](#Fn12))
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig17_HTML.jpg)'
  id: totrans-336
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig17_HTML.jpg)'
- en: A schematic of 2 rectangular shaded regions of the same length. The height of
    the upper rectangle is smaller than the lower. The upper rectangle has a vertical
    shaded rectangle and a hollow rectangle with a thick border. The lower rectangle
    has 2 vertical rectangles at random positions.
  id: totrans-337
  prefs: []
  type: TYPE_NORMAL
  zh: 两个相同长度的矩形阴影区域的示意图。上方的矩形高度小于下方的矩形。上方矩形有一个垂直的阴影矩形和一个带有粗边的空心矩形。下方的矩形有两个随机位置的垂直矩形。
- en: Figure 2-17
  id: totrans-338
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-17
- en: Atari Pong from the Gymnasium library - [`https://gymnasium.farama.org/environments/atari/pong/`](https://gymnasium.farama.org/environments/atari/pong/)
  id: totrans-339
  prefs: []
  type: TYPE_NORMAL
  zh: 来自Gymnasium库的Atari乒乓球 - [`https://gymnasium.farama.org/environments/atari/pong/`](https://gymnasium.farama.org/environments/atari/pong/)
- en: This example uses a specific variant of Pong from the Atari game simulator,
    `PongNoFrameskip-v4`. Atari simulator 1600 has 18 actions, of which Pong uses
    6\. The observation space is an RGB image of the game state in the form of 210x160x3
    three-color channel pixel values, each ranging from 0-255, that is, uint8 values.
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子使用Atari游戏模拟器中的一个特定变体的Pong，即`PongNoFrameskip-v4`。Atari模拟器1600有18个动作，其中Pong使用了6个。观察空间是以210x160x3三个颜色通道像素值形式的游戏状态的RGB图像，每个值范围从0到255，即uint8值。
- en: As a single image of the paddles and ball does not tell you anything about the
    direction in which the ball is travelling, you have to take four consecutive images
    of the game and stack them together to form a single observation and capture the
    movements in the game. The observation is hence a stacked image consisting of
    four images. The policy that agent learns is to take these stacked four-image
    observation vectors as input and produce the probability of making one of the
    six actions possible. This is mathematically depicted as learning a policy *p*[π(θ)](*a*|
    *o*) where the policy is a neural network π(θ) with stacked image vector (*o*)
    as input and six actions (*a*) as output.
  id: totrans-341
  prefs: []
  type: TYPE_NORMAL
  zh: 由于单个桨和球的图像无法告诉你球运动的方向，你必须取四个连续的游戏图像并将它们堆叠在一起形成一个单一观察，以捕捉游戏中的动作。因此，观察是一个由四个图像组成的堆叠图像。智能体学习的策略是将这些堆叠的四图像观察向量作为输入，并产生执行六种可能动作之一的概率。这在数学上表示为学习策略
    *p*[π(θ)](*a*| *o*)，其中策略是一个以堆叠图像向量 (*o*) 作为输入、六种动作 (*a*) 作为输出的神经网络 π(θ)。
- en: This example uses a `CnnPolicy` class of a neural network for the policy. The
    inputs are stacked images and a CNN class of networks are best suited for image
    processing in neural networks.
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 本例使用神经网络策略的`CnnPolicy`类。输入是堆叠的图像，CNN类网络最适合在神经网络中进行图像处理。
- en: In the previous case of LunarLander, the agent’s policy was based on DQN. However,
    for the game of Pong, I use the A2C algorithm. A2C is a synchronous, deterministic
    variant of Asynchronous Advantage Actor Critic (A3C).^([13](#Fn13))
  id: totrans-343
  prefs: []
  type: TYPE_NORMAL
  zh: 在之前的LunarLander案例中，智能体的策略基于DQN。然而，对于Pong游戏，我使用了A2C算法。A2C是异步优势演员评论家（A3C）的同步、确定性变体.^([13](#Fn13))
- en: '[PRE7]'
  id: totrans-344
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The rest of the steps of creating a video to check the performance and pushing
    a trained model to Hugging Face are all very similar to what you did in the previous
    example of LunarLander. You can refer to the accompanying Python notebook `2.d-Second-Agent.ipynb`
    for details.
  id: totrans-345
  prefs: []
  type: TYPE_NORMAL
  zh: 创建视频以检查性能并将训练好的模型推送到Hugging Face的其余步骤都与之前LunarLander示例中的步骤非常相似。你可以参考配套的Python笔记本`2.d-Second-Agent.ipynb`以获取详细信息。
- en: RL Zoo Baselines3
  id: totrans-346
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RL Zoo Baselines3
- en: RL Baselines3 Zoo^([14](#Fn14)) is a training framework for reinforcement learning.
    Using Stable Baselines3 (SB3), reliable implementations of reinforcement learning
    algorithms in PyTorch are provided in this library. It provides scripts for training,
    evaluating agents, tuning hyperparameters, plotting results, and recording videos.
    In addition, it includes a collection of tuned hyperparameters for common environments
    and RL algorithms, and agents trained with those settings.
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: RL Baselines3 Zoo^([14](#Fn14)) 是强化学习的一个训练框架。使用Stable Baselines3 (SB3)，在这个库中提供了PyTorch中强化学习算法的可靠实现。它提供了用于训练、评估智能体、调整超参数、绘制结果和记录视频的脚本。此外，它还包括了针对常见环境和RL算法的调整好的超参数集合，以及使用这些设置训练的智能体。
- en: RL Zoo is supposed to be run from the command line. However, you can use Python
    notebooks to run commands using the `!` bang character before the commands. For
    example, to run the `pwd` UNIX command to list the current working directory,
    you can execute the `!pwd` command in a code cell.
  id: totrans-348
  prefs: []
  type: TYPE_NORMAL
  zh: RL Zoo应该从命令行运行。然而，你可以使用Python笔记本通过在命令前使用`!`感叹号字符来运行命令。例如，要运行`pwd` UNIX命令以列出当前工作目录，你可以在代码单元中执行`!pwd`命令。
- en: In this section, you learn how to train agents, record videos of the trained
    agents, as well as push the trained agents to Hugging Face—all using RL Zoo SB3\.
    You will first train the same `LunarLander` agent using the DQN algorithm. Notebook
    `2.e-RL-Zoo.ipynb` contains the code for running the RL Zoo commands.
  id: totrans-349
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，你将学习如何训练智能体，记录训练智能体的视频，以及将训练好的智能体推送到Hugging Face——所有这些都可以使用RL Zoo SB3完成。你将首先使用DQN算法训练相同的`LunarLander`智能体。笔记本`2.e-RL-Zoo.ipynb`包含了运行RL
    Zoo命令的代码。
- en: '[PRE8]'
  id: totrans-350
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: At the start of script run, it prints the various hyperparameters that control
    the training. You can refer to the RL Zoo documentation for more details. As an
    example, the default values for the DQN agent for LunarLander are given in the
    location; see the footnote.^([15](#Fn15)) You can modify these values at the time
    of calling the training script using an extended list of command-line arguments
    given in the RL Zoo SB3 documentation, under the section “Train an Agent”.^([16](#Fn16))
  id: totrans-351
  prefs: []
  type: TYPE_NORMAL
  zh: 在脚本运行开始时，它会打印出控制训练的各种超参数。你可以参考RL Zoo文档以获取更多详细信息。例如，LunarLander的DQN智能体的默认值位于该位置；参见脚注.^([15](#Fn15))
    你可以在调用训练脚本时使用RL Zoo SB3文档中提供的扩展命令行参数列表来修改这些值，在“训练智能体”部分下.^([16](#Fn16))
- en: Once the agent is trained, you can run additional command-line scripts to a)
    evaluate the performance of the trained agent; b) record a video on the local
    machine; and c) push the trained agent model, performance, and video to the Hugging
    Face hub. These additional commands are shown in Listing [2-9](#PC10).
  id: totrans-352
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦智能体被训练，你可以运行额外的命令行脚本来：a) 评估训练智能体的性能；b) 在本地机器上录制视频；c) 将训练的智能体模型、性能和视频推送到Hugging
    Face平台。这些额外的命令在列表[2-9](#PC10)中展示。
- en: '[PRE9]'
  id: totrans-353
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now it is your turn to see if you can replicate these steps for the second agent—the
    Atari Pong game playing an agent trained using A2C.
  id: totrans-354
  prefs: []
  type: TYPE_NORMAL
  zh: 现在轮到你了，看看你是否能复制这些步骤来处理第二个智能体——使用A2C训练的Atari Pong游戏智能体。
- en: This ends the exploration of various libraries and sample code to load environments,
    train agents, record performance, and push things to Hugging Face for sharing.
    While the approach taken here is a high-level overview of libraries involved and
    many introductory books on Practical RL stop at this, the endeavor in this book
    is to master both—a theoretical code-level understanding of various training algorithms
    used in RL as well as common production-level libraries involved in RL. Accordingly,
    the rest of the chapters have an equally strong emphasis on coding your own working
    algorithms.
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分内容结束了对各种库和示例代码的探索，包括加载环境、训练智能体、记录性能以及将内容推送到Hugging Face进行分享。虽然这里采取的方法是对涉及库的高级概述，而许多关于实用强化学习的入门书籍都止步于此，但本书的目的是掌握两者——对强化学习中使用的各种训练算法的理论代码级理解，以及涉及强化学习的常见生产级库。因此，接下来的章节同样强调编写自己的工作算法。
- en: Solution Approaches with a Mind Map
  id: totrans-356
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有思维导图的解决方案方法
- en: Now that you have a background in reinforcement learning configuration, related
    blocks, Bellman equations, and a sample of algorithms, it is time to look at the
    complete landscape of algorithms in the reinforcement learning world. Figure [2-18](#Fig18)
    from OpenAI shows a high-level landscape of the various types of learning algorithms
    in the RL space.
  id: totrans-357
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经具备了强化学习配置、相关块、Bellman方程和算法样本的背景知识，是时候看看强化学习世界中算法的完整图景了。OpenAI的图[2-18](#Fig18)展示了RL空间中各种学习算法的高级图景。
- en: '![](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig18_HTML.jpg)'
  id: totrans-358
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../images/502835_2_En_2_Chapter/502835_2_En_2_Fig18_HTML.jpg)'
- en: A tree diagram. R L algorithms are divided into model-free R L and model-based
    R L. Model-free R L is classified into policy optimization and Q-learning. Model-based
    R L is classified into learn the model and given the model. They are further classified.
    Given the model leads to alpha zero.
  id: totrans-359
  prefs: []
  type: TYPE_NORMAL
  zh: 树形图。R L算法分为无模型R L和基于模型的R L。无模型R L分为策略优化和Q学习。基于模型的R L分为学习模型和给定模型。它们进一步被分类。给定模型导致AlphaZero。
- en: Figure 2-18
  id: totrans-360
  prefs: []
  type: TYPE_NORMAL
  zh: 图2-18
- en: Mind map of algorithms in reinforcement learning. This is a high-level map showing
    only broad categorizations (refer to [`https://spinningup.openai.com/en/latest/spinningup/rl_intro2.html`](https://spinningup.openai.com/en/latest/spinningup/rl_intro2.html))
  id: totrans-361
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习中算法的思维导图。这是一个高级地图，仅显示广泛的分类（参考[`https://spinningup.openai.com/en/latest/spinningup/rl_intro2.html`](https://spinningup.openai.com/en/latest/spinningup/rl_intro2.html)）。
- en: As seen in Bellman equations, the system transition dynamics *p*(*s*^′, *r* | *s*,
    *a*) forms a central part. Transition dynamics describe the model of the environment,
    that is, based on the current state and action taken by the agent, what is the
    response of the environment in terms of the reward given back to the agent and
    the new state the agent is transitioned into? However, transition dynamics are
    not always known. Accordingly, the first broad categorization of learning algorithms
    can be done based on the knowledge (or lack thereof) of this transition model.
    The algorithms where the transition dynamics are known or learned explicitly are
    categorized as *model-based algorithms* and the ones where transition dynamics
    are not known or not used directly are categorized as *model-free algorithms*.
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 如Bellman方程所示，系统状态转移动态 *p*(*s*^′, *r* | *s*, *a*) 是一个核心部分。状态转移动态描述了环境模型，即基于当前状态和智能体采取的动作，环境在奖励和智能体过渡到的新状态方面有何反应？然而，状态转移动态并不总是已知的。因此，学习算法的第一个广泛分类可以根据对这种转移模型的知识（或缺乏知识）来进行。其中状态转移动态已知或明确学习的算法被归类为*基于模型的算法*，而那些状态转移动态未知或未直接使用的算法被归类为*无模型算法*。
- en: 'Model-based algorithms can be further classified into two categories: one where
    you are given the model, for example, the game of Go or chess, and the second
    category being the one where the agent needs to explore and learn the model. Some
    popular approaches under “learn the model” are World Models, Imagination Augmented
    Agents (I2A), Model-Based RL with Model-Free fine tuning (MBMF), and Model-Based
    Value Exploration (MBVE).'
  id: totrans-363
  prefs: []
  type: TYPE_NORMAL
  zh: 基于模型的算法可以进一步分为两类：一类是你被给予模型，例如围棋或象棋游戏，第二类是智能体需要探索和学习模型。在“学习模型”下的一些流行方法包括世界模型、想象增强智能体（I2A）、基于模型的强化学习带模型无关微调（MBMF）和基于模型的值探索（MBVE）。
- en: Moving back to the model-free setup, note that Bellman equations provide you
    with a way to find the state/action values and use them to find the optimal policies.
    Most of these algorithms take an approach of iterative improvement. Eventually
    you want the agent to have an optimal policy, and algorithms use Bellman equations
    to evaluate the goodness of a policy and to guide the improvement in the right
    direction. However, there is another way. Why not improve the policy directly
    instead of the indirect way of values to policies? Such an approach of direct
    policy improvement is known as *policy optimization*.
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: 回到模型无关设置，请注意，Bellman方程为你提供了一种找到状态/动作值并使用它们来找到最优策略的方法。大多数这些算法采用迭代改进的方法。最终，你希望智能体拥有最优策略，而算法使用Bellman方程来评估策略的好坏，并指导改进的正确方向。然而，还有另一种方法。为什么不直接改进策略而不是通过值到策略的间接方式呢？这种直接策略改进的方法被称为*策略优化*。
- en: Moving to the left side of Figure [2-18](#Fig18), the model-free category, *Q-learning*
    forms a major part of model-free Bellman-driven state/action value optimization.
    The popular variants under this approach are Deep Q-Networks (DQN) along with
    various variants of DQN, such as Categorical 51-Atom DQN (C51), Quantile Regression
    DQN (QR-DQN), and Hindsight Experience Replay (HER).
  id: totrans-365
  prefs: []
  type: TYPE_NORMAL
  zh: 将目光移至图[2-18](#Fig18)的左侧，模型无关类别中，*Q-learning*构成了模型无关Bellman驱动状态/动作值优化的主要部分。在此方法下流行的变体包括深度Q网络（DQN）以及DQN的各种变体，例如分类51原子DQN（C51）、分位数回归DQN（QR-DQN）和事后经验重放（HER）。
- en: The algorithms that follow the path of policy optimization directly are Policy
    Gradient, Actor Critic and its variations (A2C/A3C), Proximal Policy Optimization
    (PPO), and Trust Region Policy Optimization (TRPO). PPO is the state of the art
    when it comes to policy-based algorithms. Recently, PPO has been used with Large
    Language Models such as the GPT family, Llama, and other variants to make the
    model generate safe and helpful human outputs, under an approach called Reinforcement
    Learning from Human Feedback (RLHF).
  id: totrans-366
  prefs: []
  type: TYPE_NORMAL
  zh: 直接遵循策略优化路径的算法包括策略梯度、演员-评论家及其变体（A2C/A3C）、近端策略优化（PPO）和信任区域策略优化（TRPO）。在基于策略的算法中，PPO是当前最先进的。最近，PPO已经与大型语言模型如GPT系列、Llama和其他变体结合使用，通过称为从人类反馈中强化学习（RLHF）的方法，使模型生成安全且有帮助的人类输出。
- en: Finally, there is a set of algorithms that lie midway between Q-learning and
    Policy Optimization. The popular ones in this category are deep deterministic
    policy gradient (DDPG), twin delayed DDPG (TD3), and soft actor-critic (SAC).
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，有一组算法位于Q-learning和策略优化之间。这个类别中流行的算法包括深度确定性策略梯度（DDPG）、双延迟DDPG（TD3）和软演员-评论家（SAC）。
- en: These categorizations are just to help you appreciate the different approaches
    and popular algorithms. However, the list and categorizations are not exhaustive.
    The field of reinforcement learning is evolving rapidly, with new approaches being
    added on a regular basis. Use the previous mind map only as high-level guidance.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 这些分类只是为了帮助您欣赏不同的方法和流行算法。然而，这个列表和分类并不是详尽的。强化学习领域正在快速发展，新的方法正在不断加入。仅将之前的思维导图作为高级指导。
- en: Summary
  id: totrans-369
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This chapter sets the context for what reinforcement learning is, the setup,
    and the various definitions. The chapter first talked about the high-level setup
    and the mathematical foundations of various Markov formulations. This was followed
    by a discussion of Bellman equations, the derivation of their recursive nature,
    and the optimality equations. State/action value functions and backup diagrams
    formalized this notion.
  id: totrans-370
  prefs: []
  type: TYPE_NORMAL
  zh: 本章为强化学习是什么、设置和不同定义设定了背景。本章首先讨论了高级设置和各种马尔可夫公式的数学基础。随后是对Bellman方程的讨论，它们的递归性质的推导和最优性方程。状态/动作值函数和后备图形式化了这一概念。
- en: The chapter then looked at a couple of agent training workflows using Stable
    Baselines3\. It dove deep into the related libraries and software frameworks in
    RL and the ones you will be using significantly during the course of this book.
    The chapter then concluded with a view of the algorithm landscape.
  id: totrans-371
  prefs: []
  type: TYPE_NORMAL
  zh: 本章随后探讨了使用 Stable Baselines3 的几个代理训练工作流程。它深入研究了强化学习（RL）中相关的库和软件框架，以及你在本书的学习过程中将显著使用的那些。本章最后总结了算法的概览。
- en: In the upcoming portions of the book, I delve deeper into many of these algorithms,
    starting with dynamic programming in the next chapter.
  id: totrans-372
  prefs: []
  type: TYPE_NORMAL
  zh: 在本书接下来的部分，我将更深入地探讨这些算法中的许多，从下一章的动态规划开始。
