- en: 10. Having Fun with Computer Vision
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'We have talked about the ways in which deep learning and computer vision go
    together. In the past few chapters, we have built some computer vision models:
    deep learning image classification models, from handwritten digit classification
    to bird identification. In Chapter [3](502073_1_En_3_Chapter.xhtml), when we set
    up our deep learning development environment, we installed several utility libraries
    that aids in computer vision and image processing tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: But other than using OpenCV to load and display the results of our deep learning
    models, we have not explored many of the functions available in these libraries.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, in this chapter, let us look at some of those functions and concepts
    to get you started. While this chapter is not a full computer vision tutorial,
    this hopes to guide you to start experimenting on your own, and to learn how to
    couple it with what we have already learned about deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: What We Need
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Chapter [3](502073_1_En_3_Chapter.xhtml), “Setting Up Your Tools,” we already
    installed everything we need for computer vision and image processing tasks, which
    are OpenCV, Dlib, Pillow, and Scikit-Image.
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV is arguably the best computer vision library out there. It can do simple
    functions, such as loading and manipulating images, to building complex models,
    such as deep learning-based image recognition, all on its own.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dlib is a machine learning library, which has some optimized and easy-to-use
    computer vision functions built in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pillow and Scikit-Image allow you to load and handle different formats of images
    and allow basic manipulations such as color channel handling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Other than the software libraries, it is best to have a webcam attached to your
    machine, as we will be looking into some real-time video processing as well.
  prefs: []
  type: TYPE_NORMAL
- en: If you are working on a laptop, then you might already have a built-in webcam,
    which is sufficient. If not, you can use a USB webcam. For most USB webcams, the
    default drivers that is installed by Windows will be sufficient.
  prefs: []
  type: TYPE_NORMAL
- en: Note
  prefs: []
  type: TYPE_NORMAL
- en: You can use the Camera app on Windows 10 to check whether the webcam is working
    and have the working drivers loaded. You also do not need a high-end HD webcam,
    as we will be working with lower resolutions (640x480).
  prefs: []
  type: TYPE_NORMAL
- en: Basics of Working with Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The most basic functionality of any image processing task is to load and display
    images. We have already used this functionality to display the results from our
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 'When working with image files, OpenCV has convenient functions to load images
    and display them. The following code will use the `imread` function of OpenCV
    to load the image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The image will be displayed in a new window by OpenCV (Figure [10-1](#Fig1)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig1_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig1_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-1
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV loading and displaying an image
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV can load most image file formats, but the exact format it supports will
    depend on the version and the build that you have installed.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you do run into an image file that OpenCV is unable to open, you can always
    use Pillow to open it. Pillow supports many more formats than OpenCV:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Here, we have loaded the image with Pillow, converted the color format to be
    compatible with OpenCV, and displayed the image using OpenCV (Figure [10-2](#Fig2)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig2_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig2_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-2
  prefs: []
  type: TYPE_NORMAL
- en: Loading an image with Pillow and displaying with OpenCV
  prefs: []
  type: TYPE_NORMAL
- en: When using Pillow with OpenCV we must convert the color formats, because OpenCV
    uses the BGR format while Pillow uses the more common RGB format. If you forget
    to convert these color channels, the images will display incorrect colors (Figure
    [10-3](#Fig3)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig3_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig3_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-3
  prefs: []
  type: TYPE_NORMAL
- en: Incorrect colors if RGB to BGR color conversion is not performed
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you have loaded the image, OpenCV and Pillow allows you to do many transformations
    to the image, such as resizing, rotating, color conversions, and thresholding.
    The following code shows how to perform a rotation around the center point of
    an image using OpenCV:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This will result is a 45-degree rotation of the image (Figure [10-4](#Fig4)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig4_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig4_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-4
  prefs: []
  type: TYPE_NORMAL
- en: Image rotation with OpenCV
  prefs: []
  type: TYPE_NORMAL
- en: You can read about the full set of available image transformation functions
    from the OpenCV docs^([1](#Fn1)) and Pillow docs.^([2](#Fn2))
  prefs: []
  type: TYPE_NORMAL
- en: 'The next most important function you need to learn is extracting out a region
    of interest from an image. The following code demonstrates how a region from the
    image can be extracted:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This will extract and display a region from the image (Figure [10-5](#Fig5)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig5_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig5_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-5
  prefs: []
  type: TYPE_NORMAL
- en: Extracting a region-of-interest from an image
  prefs: []
  type: TYPE_NORMAL
- en: You can also save the extracted image region using the `imwrite` function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The ability to extract a region-of-interest is incredibly useful when you are
    working with object detection and recognition.
  prefs: []
  type: TYPE_NORMAL
- en: 'Working with Video: Using Webcams'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Usually, when working with hardware devices, such as when you are trying to
    read from a connected camera from code, you would have to fiddle around some camera
    driver stuff.
  prefs: []
  type: TYPE_NORMAL
- en: But OpenCV has us covered in this instance.
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenCV can read from any built-in or USB connected camera in the system. A
    video stream from a camera is just a sequence of images in an order, and OpenCV
    reads frame-by-frame. Therefore, each frame acts like loading an individual image:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: With this code, OpenCV will open a window—named Video Feed here—and load each
    frame as it reads them from the camera (Figure [10-6](#Fig6)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig6_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig6_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-6
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV loading the video from a webcam
  prefs: []
  type: TYPE_NORMAL
- en: The code will loop indefinitely, or until you press the q key on the keyboard.
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenCV uses its HighGUI module (high-level graphical user interface) to access
    the cameras as well as to display the frames. HighGUI module has three sets of
    functionalities: hardware, filesystem, and GUI. The hardware part is what handles
    accessing hardware devices such as cameras. The filesystem part handles the loading
    and saving of images as well as video files. The GUI part is what generates the
    windows that display the images or frames, as well as giving you the ability to
    handle keyboard and mouse events in those windows. The toolbar and the status
    bar of the window we opened earlier are also components from HighGUI.^([3](#Fn3))
    The HighGUI modlule is installed by default when you are installing OpenCV with
    conda.'
  prefs: []
  type: TYPE_NORMAL
- en: Camera id 0 is your default camera. Typically, this is the built-in camera if
    you are on a laptop, or whichever camera you have set as default if you have multiple
    cameras. If you have more than one camera, they would have ids that would be listed
    as 0, 1, 2, and so on. Just check and set the id to the camera you want. You can
    use multiple video capture objects to read from multiple cameras (Figure [10-7](#Fig7)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig7_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig7_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-7
  prefs: []
  type: TYPE_NORMAL
- en: Reading from multiple cameras in OpenCV
  prefs: []
  type: TYPE_NORMAL
- en: Once you read the frame from the camera, it acts as an image. Now you can perform
    any of the image transformations on that frame.
  prefs: []
  type: TYPE_NORMAL
- en: 'Working with Video: Using Video Files'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This is almost identical to reading from a webcam. You just need to pass the
    path to the video file, instead of the camera id, in the video capture object:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Just like the webcam code, OpenCV will open a window and load each frame as
    it reads them from the video file (Figure [10-8](#Fig8)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig8_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig8_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-8
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV loading a video file
  prefs: []
  type: TYPE_NORMAL
- en: As with images, the supported video file formats may differ with the exact version/build
    of the OpenCV you have installed. OpenCV relies on FFmpeg and GStreamer libraries
    to be able to work with video files, while the DirectShow library is used on Windows
    to handle video from webcams. These libraries are installed when you install OpenCV
    with conda. Therefore, opening standard AVI and MP4 files should not be a problem.
  prefs: []
  type: TYPE_NORMAL
- en: You may notice that the playback of the video is either faster or slower than
    expected. This is because the functions we used are not meant for playing back
    videos at their natural speed. What we are doing is grabbing each frame of the
    video—like we did with the webcam—and displaying it in the window with a delay
    added in between fetching the next frame. That delay is added by the `cv2.waitkey()`
    function. Here we have set it to 1 millisecond of delay between frames. You can
    increase or decrease the speed of the video by adjusting this delay.
  prefs: []
  type: TYPE_NORMAL
- en: Detecting Faces in Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here we are getting into some of the fun parts of computer vision.
  prefs: []
  type: TYPE_NORMAL
- en: Writing code from scratch to detect faces is a bit of a complex task as the
    process involved in identifying a face from within an image reliably involves
    many steps. But libraries such as OpenCV and Dlib already have the complex parts
    of those algorithms built into them.
  prefs: []
  type: TYPE_NORMAL
- en: To detect any objects (such as faces) in an image, you need to have a trained
    object detector. Luckily, Dlib already has a pretrained face detector built right
    into the library. You can load it using `dlib.get_frontal_face_detector()` function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Here, we are using OpenCV to load the image, and then make a grayscale copy
    of it. We pass this grayscale copy of the image to the Dlib face detector object.
  prefs: []
  type: TYPE_NORMAL
- en: The grayscale image is used as it can increase the detection speed of faces.
    The Dlib face detector can work with color images as well, but would be slower.
  prefs: []
  type: TYPE_NORMAL
- en: The detector would return an array of Dlib rectangle objects to denote the bounding
    boxes of all the faces detected. We loop over each of these bounding boxes, extract
    their coordinates, and use OpenCV to draw a rectangle around the detected face
    using those coordinates. Finally, we display the resulting image, with the detected
    faces (Figure [10-9](#Fig9)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig9_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig9_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-9
  prefs: []
  type: TYPE_NORMAL
- en: Dlib face detection in action
  prefs: []
  type: TYPE_NORMAL
- en: Detecting Faces in Video
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once we get face detection working with images, getting it to work on a video
    or a webcam feed is quite simple. All we need to do is to capture the video frame-by-frame
    and pass each frame to the face detector:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Here we are running the face detection step (as we did with an image) on each
    frame of the video. On a typical machine, the Dlib’s face detector is fast enough
    to detect faces in real time, allowing us to run it for each frame. You will see
    the detection box update in real time for each frame (Figure [10-10](#Fig10)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig10_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig10_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-10
  prefs: []
  type: TYPE_NORMAL
- en: Face detection running on video
  prefs: []
  type: TYPE_NORMAL
- en: Simple Real-Time Deep Learning Object Identification
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next, we will combine what we learned about deep learning models with the computer
    vision capabilities of OpenCV and build a rudimentary object identification system.
  prefs: []
  type: TYPE_NORMAL
- en: We will use OpenCV to capture the video stream from a webcam and use the ResNet50
    deep learning model from TensorFlow/Keras applications to identify objects in
    each frame of the video. You can learn more about the ResNet50 model in Appendix
    1.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will start by importing the necessary packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Apart from OpenCV, numpy, and the ResNet50 model, we also import some image
    preprocessing functions from Keras.
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we load the ResNet50 model with the ImageNet weights and create the video
    capture object:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'In the main loop of the code, we convert the captured frame to RGB (since OpenCV
    works in BGR) and resize it to 224x224 pixels, which is the input size required
    by the ResNet50 model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we run the image through a set of preprocessing steps, to prepare it to
    be ingested by the model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Next we pass the processed image to the model and make the prediction. We also
    need to decode the prediction—using convenient functions from TensorFlow/Keras—to
    get the class label for the prediction:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'Finally, we overlay the predicted label and the confidence score of the prediction
    on the image itself, and print it on the console, and display the image using
    OpenCV:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: When you run the code, it will pass each frame of the video to the ResNet50
    model, which will try to identify the most prominent object in the frame. The
    code will then display and print out the prediction along with the confidence
    of the prediction from the ResNet50 model (Figure [10-11](#Fig11)).
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/502073_1_En_10_Chapter/502073_1_En_10_Fig11_HTML.jpg](../images/502073_1_En_10_Chapter/502073_1_En_10_Fig11_HTML.jpg)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10-11
  prefs: []
  type: TYPE_NORMAL
- en: Real-time object detection running
  prefs: []
  type: TYPE_NORMAL
- en: What we built here is a very rudimentary object identification system that has
    several limitations. It can only identify one object at a time, as it takes the
    entire frame as the input. It also cannot identify bounding boxes for the objects
    it identifies. A true object detection system would be able to identify multiple
    objects within a frame and identify their boundaries as well.
  prefs: []
  type: TYPE_NORMAL
- en: But with the concepts we learned so far, you can investigate expanding the capabilities
    of the system.
  prefs: []
  type: TYPE_NORMAL
- en: The same goes for our face detection system.
  prefs: []
  type: TYPE_NORMAL
- en: How would you expand it to perform face recognition on the detected faces as
    well?
  prefs: []
  type: TYPE_NORMAL
- en: Think of what we learned about extracting a region-of-interest from an image.
    Can you think of a way to apply that concept to extract out the detected face
    image and run it through a deep learning model? Can you use the same concept to
    build the training dataset for the model as well?
  prefs: []
  type: TYPE_NORMAL
