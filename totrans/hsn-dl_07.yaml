    model, which takes a tensor as input and produces a tensor (TITO: Tensor Input
    Tensor Output). However, if the model has multiple inputs, then the sequential
    model is not used. Also, in the case of a model having multiple outputs or in
    the case of nonlinear models, they are not used. The following imports are required
    for building the model.'
