- en: '7. Convolutional Neural Network: II'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'The last chapter discussed the units of a Convolutional Neural Network and
    introduced LeNet. This chapter takes the discussion forward and presents an overview
    and implementation of some of the famous CNN architectures like LeNet, AlexNet,
    and Google LeNet (Inception Net). The simplicity of LeNet gives a good idea of
    how things work in CNN. However, to classify complex images and to accomplish
    advanced image analysis tasks, we need deep, more complex structures. The advancements
    in the 2010s were aimed at handing the problems in the then-popular CNNs and gave
    us the architectures that have since become immensely important for all image-related
    tasks: both supervised and unsupervised.'
  prefs: []
  type: TYPE_NORMAL
- en: In the last chapter, the CNN layers were implemented from scratch, which is
    practically not required. In this chapter, the sequential model of Keras is explained,
    and requisite examples are presented to help the reader implement basic CNN. This
    chapter also presents a brief overview of some of the most important layers in
    Keras.
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter has been organized as follows. Section “Sequential Model” discusses
    the sequential model; section “Keras Layers” presents an overview of ***keras.layers***.
    Section “MNIST Dataset Classification Using LeNet: Prerequisite” implements an
    MNIST classifier. The next three sections discuss LeNet, AlexNet, and other important
    CNN models, and the last section concludes. This chapter forms the basis of the
    following chapters and will help you accomplish tasks like object detection and
    segmentation.'
  prefs: []
  type: TYPE_NORMAL
- en: Sequential Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
