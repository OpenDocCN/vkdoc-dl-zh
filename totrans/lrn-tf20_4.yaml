- en: Conclusion
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this chapter, we have explored various well-known architectures for image
    processing and generation. Also, we have considered the concept of transfer learning
    and how it has helped to speed up machine learning development and bring more
    accuracy to models for which training data is not abundant. Finally, you have
    seen how we can leverage the TensorFlow and Keras APIs, to build these architectures.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 在本章中，我们探讨了图像处理和生成中各种著名的架构。此外，我们还考虑了迁移学习概念，以及它是如何帮助加速机器学习发展并提高训练数据不足的模型的准确性的。最后，你看到了我们如何利用TensorFlow和Keras
    API来构建这些架构。
