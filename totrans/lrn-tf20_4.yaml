- en: 4. Images with TensorFlow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This chapter focuses on how we can leverage TensorFlow 2.0 for computer vision.
    There has been much breakthrough research and development in the field of computer
    vision, thanks to deep learning. In this chapter, we will start with a brief overview
    of image processing and move on to one of the most successful algorithms in computer
    vision, the convolutional neural networks (CNNs), or ConvNets. We will approach
    CNNs with an introduction and explain their basic architecture with a simple example.
    Later in this chapter, we will implement a CNN, using TensorFlow 2.0\. We will
    move on to discuss generative networks, which are networks developed for generating
    images with machines. We will cover autoencoders and variational autoencoders
    (VAEs), which are a form of generative network. Next, we will implement VAEs,
    using TensorFlow 2.0, and generate some new images. In the final section, we will
    discuss the concept of transfer learning—how it has been leveraged in computer
    vision and the difference between a typical machine learning process and transfer
    learning. Finally, we discuss applications and the advantages of transfer learning.
  id: totrans-1
  prefs: []
  type: TYPE_NORMAL
- en: Image Processing
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There has been much groundbreaking research conducted in the field of computer
    vision, primarily in the areas of object detection, recognition, and segmentation,
    from the 1960s to 2000s. This work was partly divided into two categories: one
    focused on techniques to perform image recognition, which started in the 1960s,
    and the other, which started after 2000, focused on collecting images data as
    a benchmark to evaluate the techniques.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Some notable research related to image recognition techniques included “Blocks
    World,” by Larry Roberts, in 1963, which is considered to be the first Ph.D. dissertation
    in computer vision. In it, the visual world was simplified into simple geometric
    shapes, the goal being to recognize and reconstruct them.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Work in the area of collecting images data for benchmarking began in the year
    2006, starting with the PASCAL Visual Object Classes challenge, which had a data
    set of 20 object categories and was composed of several thousand to about 10,000
    labeled objects per category. Many groups started using this data set to test
    their techniques, and, thus, a new paradigm shift occurred. About the same time,
    a group of scholars at Princeton and Stanford Universities began to consider whether
    we were ready to recognize most objects or all objects, which led to a project
    called ImageNet. This is a collection of 14M+ images spread over 22K categories.
    It was the biggest artificial intelligence (AI)-related data set at the time.
    The ImageNet Large Scale Visual Recognition Challenge resulted in many groundbreaking
    algorithms, one of which was AlexNet (CNN), which beat all other algorithms, to
    win the ImageNet challenge in 2012.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional Neural Networks
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Convolutional neural networks, abbreviated as CNNs or ConvNets, are a special
    class of neural networks that specializes in processing grid-like topology data,
    such as images. They consist of three distinct layers:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pooling
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fully connected
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Convolutional Layer
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a CNN, a convolutional layer is essentially responsible for applying one
    or more filters to an input. This is the layer that distinguishes convolutional
    neural networks from other neural networks. Each convolutional layer contains
    one or more filters, known as convolutional kernels. A filter is basically a matrix
    of integers that is used on a subset of the input image, which is of the same
    size as the filter. Each pixel from the subset is multiplied by the corresponding
    value in the kernel, and then the result is summed up for a single value. This
    is repeated until the filter “slides” across the whole image, thus creating an
    output feature map. The magnitude of movement between applications of the filter
    to the input image is referred to as the stride, and it is almost always symmetrical
    in height and width.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: For example, suppose we have a grayscale image of 9 × 9 pixels that has one
    channel (a 2D matrix) and a 3 × 3 convolutional kernel. If we choose a stride
    of (1,1), i.e., sliding the kernel by 1 pixel horizontally and 1 pixel vertically
    over the whole of the image, we get an output feature map of 7 × 7.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figa_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figa_HTML.jpg)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: '*Input* *grayscale image* *of letter X (9 × 9 pixels)*'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figb_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figb_HTML.jpg)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
- en: '*Convolutional kernel (3 × 3 pixels)*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figc_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figc_HTML.jpg)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
- en: '*First* *dot product* *of subset of input image with kernel*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figd_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figd_HTML.jpg)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: '*Second* *dot product* *of subset of input image with kernel (stride (1,1))*'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fige_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fige_HTML.jpg)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: '*Final* *feature map* *of 7 × 7 after kernel strides through whole input image*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Usually, for the final feature output, an activation function (e.g., ReLU [rectified
    linear unit]) is applied. ReLU basically ensures that there is no negative value
    in the feature output matrix, by forcing these (negative values) to zero (Figure
    [4-1](#Fig1)).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figf_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figf_HTML.jpg)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig1_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig1_HTML.jpg)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: Figure 4-1
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: ReLU function
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '*Output of* *ReLU function*'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Pooling Layer
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Pooling layers help to reduce the dimensionality of the input features, thus
    reducing the total number of parameters and complexity of the model. One of the
    most widely used pooling techniques is max pooling. As the name implies, this
    technique takes only the maximum from a pool. As an example, let us perform pooling
    with a window size 2 and a stride 2 on the output of the ReLU that we derived
    previously.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figg_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figg_HTML.jpg)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
- en: In this case, we take the maximum of (0.77, 0, 0, 1.0), i.e., 1.0 from the first
    pool.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figh_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figh_HTML.jpg)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
- en: We take the maximum of (0.11, 0.33, 0, 0.33), i.e., 0.33 from the second pool.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, when we have made all the strides, we get the following output:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figi_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figi_HTML.jpg)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: Fully Connected Layer
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This layer is the same as any artificial neural network (ANN) system in which
    the neurons have complete connection to all the activations from the previous
    layers (Figure [4-2](#Fig2)).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig2_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig2_HTML.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: Figure 4-2
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: Input to fully connected layer (flattened output of pooling layer)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: ConvNets Using TensorFlow 2.0
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let us implement a simple convolutional neural network using TensorFlow 2.0\.
    For this, we will make use of the Fashion-MNIST data set by Zalando (The MIT License
    [MIT] Copyright © [2017] Zalando SE, [`https://tech.zalando.com`](https://tech.zalando.com)),
    which contains 70,000 images (in grayscale) in 10 different categories. The images
    are 28 × 28 pixels of individual articles of clothing, with values ranging from
    0 to 255, as shown in Figure [4-3](#Fig3).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig3_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig3_HTML.jpg)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
- en: Figure 4-3
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'Images from the Fashion-MNIST data set by Zalando (Source: [`https://bit.ly/2xqIwCH`](https://bit.ly/2xqIwCH))'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: 'Of the total 70,000 images, 60,000 are used for training and the remaining
    10,000 for testing. The labels are integer arrays ranging from 0 to 9\. The class
    names are not a part of the data set. Therefore, we must include the following
    mapping for training/prediction:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figj_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figj_HTML.jpg)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
- en: '*(Source*`:` [`https://bit.ly/2xqIwCH`](https://bit.ly/2xqIwCH)*)*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by loading the necessary modules.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, load the Fashion-MNIST data set.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s undertake a little bit of data exploration.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: As the pixel values range from 0 to 255, we will scale those values in the range
    of 0 to 1 before pushing them to the model. We can scale these values (both for
    training and test data sets) by dividing the values by 255.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'We can reshape the training and test data set by reshaping the matrices into
    a 28 × 28 × 1 array, as follows:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now, let’s build the different layers of the model. We will be using the Keras
    implementation to build the different layers of a CNN. We will keep it simple,
    by having only three layers.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '*First layer—convolutional layer with* *ReLU activation function* : This layer
    takes the 2D array (28 × 28 pixels) as input. We will take 50 convolutional kernels
    (filters) of shape 3 × 3 pixels. The output of which will be passed to a ReLU
    activation function before being passed to the next layer.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Second layer—pooling layer*: This layer takes the 50 26 × 26 2D arrays as
    input and transforms them into the same number (50) of arrays, with dimensions
    half that of the original (i.e., from 26 × 26 to 13 × 13 pixels).'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '*Third layer—fully connected layer*: This layer takes the 50 13 × 13 2D arrays
    as input and transforms them into a 1D array of 8450 elements (50 × 13 × 13).
    These 8450 input elements are passed through a fully connected neural network
    that gives the probability scores for each of the 10 output labels (at the output
    layer).'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We can check the details of different layers built in the CNN model by using
    the summary method shown below:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figk_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figk_HTML.jpg)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Now we will use an optimization function with the help of the `compile` method.
    An Adam optimizer with objective function `sparse_categorical_crossentropy`, which
    optimizes for the accuracy metric, can be built as follows:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Model training:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figl_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figl_HTML.jpg)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: '[PRE10]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '**Model evaluation:**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Training evaluation
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Figm_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Figm_HTML.jpg)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: '[PRE11]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Test evaluation
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fign_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fign_HTML.jpg)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
- en: '[PRE12]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: From the preceding evaluation, we see that we were able to achieve about 97%
    accuracy in the training data set and about 91% accuracy in the test data set,
    with only a simple CNN architecture. This goes to prove that CNNs are powerful
    algorithms for image recognition.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: The code for the CNN implementation using TensorFlow 2.0 can be found at [`http://bit.ly/CNNTF2`](http://bit.ly/CNNTF2).
    You can save a copy of the code and run it in the Google Colab environment. Try
    experimenting with different parameters and note the results.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Advanced Convolutional Neural Network Architectures
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: CNNs have come a long way since they were first introduced in the 1990s. Let’s
    look at some of the recent CNN-based architectures that have entered the limelight.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: VGG-16\. This convolutional neural network was introduced by K. Simonyan and
    A. Zisserman, from the University of Oxford, in the paper “Very Deep Convolutional
    Networks for Large-Scale Image Recognition.” The main difference between AlexNet
    and VGG-16 is that VGG-16 uses multiple 3 × 3 kernels as filters, instead of the
    large filters used in AlexNet (11 filters in the first convolutional layer, and
    5 filters in the second). This led to an accuracy of 92.7%—among the top five
    in the ImageNet challenge—and this model was also submitted to ILSVRC-2014, at
    which it was the runner-up. Figure [4-4](#Fig4) shows a typical VGG-16 architecture.
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig4_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig4_HTML.jpg)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Figure 4-4
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: VGG-16 architecture
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Inception(GoogleNet). This was developed by Google and was the winner of the
    ILSVRC-2014 competition wherein it achieved a top-5 error rate of 6.67%. An inception
    module was used with smaller convolutions that made possible to reduce the number
    of parameters to 4 million only. Figure [4-5](#Fig5) shows the GoogleNet architecture.
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig5_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig5_HTML.jpg)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
- en: Figure 4-5
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: GoogleNet architecture
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: ResNet. This architecture was developed by Kaiming He, Xiangyu Zhang, Shaoqing
    Ren, and Jian Sun in 2015\. It won the ILSVRC-2015 competition, with a top-five
    error rate of 3.57%, which was lower than the human error top-five rate. Figure
    [4-6](#Fig6) shows the ResNet architecture.
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig6_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig6_HTML.jpg)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
- en: Figure 4-6
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: ResNet architecture
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig7_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig7_HTML.jpg)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
- en: Figure 4-7
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: DenseNet architecture
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: DenseNet. This architecture was developed by Gao Huang, Zhuang Liu, Laurens
    van der Maaten, and Kilian Q. Weinberger in 2016\. DenseNet was reported to achieve
    better performance with less complexity, compared to ResNet. A typical DenseNet
    architecture is depicted in Figure [4-7](#Fig7).
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Transfer Learning
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Imagine that there are two friends, A and B, who recently planned to learn to
    drive a car, so that once they finished learning, they could buy a car for their
    commute. Suppose A used to take public transportation to commute, and B used a
    geared bike. Now, when both start to learn to drive a car, assuming that both
    A and B have the same intelligence level, who will be in a better position to
    learn more quickly? Yes, you’re right; it will be B. Because B has been using
    a bike, he will be applying his knowledge of controlling the bike, through the
    combination of clutch, gear, accelerator, and brakes, to control a car. The only
    new skill he must learn is to adjust his driving for a car, which is much bigger
    than a bike. For A, driving a car requires an entirely new skill set, as he has
    never ridden a bike/car. Hence, he will require more time and effort to learn
    to drive a car. This example illustrates how a typical human behavior acquired
    through past experiences of performing a certain task can be applied to a new
    but similar or related task. This has helped humans evolve faster and spend less
    time and effort on learning new tasks.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: The same thing, applied to machine learning, is called transfer learning. According
    to the book *Deep Learning* by Ian Goodfellow, Aaron Courville, and Yoshua Bengio
    (MIT Press, 2016), the definition of transfer learning is a “ situation where
    what has been learned in one setting is exploited to improve generalization in
    another setting.”
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Let’s derive a mathematical formula in support of the preceding definition,
    using the example of learning to drive a car that was mentioned previously. Let’s
    first understand what a *domain* and *task* are, with respect to transfer learning.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: A domain **D** comprises a feature space **S** and a marginal probability distribution
    (mpd) **P(X)**, where **S = s**[**1**]**,…,s**[**n**] **∈ S**. Given a specific
    domain, **D = {S , P(S)}**, a task consists of a label space **Y** and an objective
    predictive function **f(·)** (denoted by **T = {P, f(·)})**, which is not observed
    but can be learned from the training data, which consist of pairs **{s**[**i**]**,
    p**[**i**]**}**, where **s**[**i**] **∈ S** and **p**[**i**] **∈ P**. The function
    **f(·)** can be used to predict the corresponding label, **f(s)**, of a new instance
    **s**. Probabilistically, **f(s)** can be written as **P(p|s)**. Let’s suppose
    we denote the activity of riding a bike as **D**[**S**] and call it as a source
    domain. Now let’s call the activity of driving a car **D**[**T**] and call it
    as target domain. Suppose riding a bike on a busy street is one task **T**[**S**]
    of the domain **D**[**S**], whereas driving a car on a busy street is a task **T**[**T**]
    of domain **D**[**T**].
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Mathematically, given a source domain **D**[**S**] and a learning task **T**[**S**],
    a target domain **D**[**T**] and learning task **T**[**T**], the aim of transfer
    learning is to help improve the learning of the (target) predictive function **f**[**T**]**(·)**
    in **D**[**T,**] leveraging the knowledge in **D**[**S**] and **T**[**S**], where
    **D**[**S**] **≠ D**[**T**] or **T**[**S**] **≠ T**[**T**]. In simple terms, transfer
    learning is the use of knowledge gained by B in riding his bike on a busy street,
    applied to driving a car on another busy street.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: Transfer Learning and Machine Learning
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the preceding example, if the target and source domains are the same, i.e.,
    if driving a car is both the source as well as the target domain (**D**[**S**]
    **= D**[**T**]), and the learning tasks are the same or similar, i.e., driving
    a car in two different busy streets (**T**[**S**] **= T**[**T**]), the learning
    problem becomes a traditional machine learning problem. However, one should note
    that transfer learning is an application of a research problem to a machine learning
    problem and not an algorithm or technique. Transfer learning is different from
    traditional machine learning, as it uses pre-trained models that have been built
    with some task **T**[**S**] as an input to be used for another task **T**[**T**]
    in a way that will help to jump-start the development process for task **T**[**T**].
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-8](#Fig8) depicts a typical machine learning system. We can see that
    for a particular task for a given domain, the machine learning model is able to
    learn and generalize well. However, if there is a new task from a different domain,
    it must build an altogether new model, to be able to generalize for that task/domain.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig8_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig8_HTML.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
- en: Figure 4-8
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning methodology
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Figure [4-9](#Fig9) depicts a typical transfer learning methodology. We can
    see that for Task/Domain A, the machine learning model is able to learn and generalize
    well. Now, here, we extract the “general” knowledge gained from Task/Domain A
    and apply it to a similar Task/Domain B.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig9_HTML.png](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig9_HTML.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
- en: Figure 4-9
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: Transfer learning methodology
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: 'Following are applications of transfer learning:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: 'Deep learning/image recognition: Use of Word2vec and fastText models for sentiment
    analysis of Twitter data on a particular topic'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Natural language processing: Use of AlexNet and Inceptions models for object
    detection'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Following are advantages of transfer learning:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Reduced training time, by using some of the modules of an already developed
    model to a new one
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Usefulness in scenarios in which there is not sufficient data to train a model
    for desired results
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Variational Autoencoders Using TensorFlow 2.0
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To understand what variational autoencoders are, you must first understand what
    autoencoders are, where they are used, and what the difference is between VAEs
    and the other forms of autoencoders.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: Autoencoders
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Autoencoders are a type of ANN that is used to generate output data in the
    same unsupervised manner as for input data. An autoencoder essentially comprises
    two main parts: an encoder and a decoder. The encoder compresses the input data
    into a lower dimensional representation of it, and the decoder decompresses the
    representation into the original input data. Figure [4-10](#Fig10) shows a simple
    autoencoder applied on images.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig10_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig10_HTML.jpg)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
- en: Figure 4-10
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Basic autoencoder
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Applications of Autoencoders
  id: totrans-132
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One limitation of autoencoders is that they can only be used to reconstruct
    data that the encoder part of the autoencoders has seen during the training. They
    cannot be used to generate new data. This is where variational autoencoders enter
    the picture.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: 'Following are two applications of autoencoders:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: As a dimensionality reduction technique to observe/visualize high-dimensional
    data into lower dimensions
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As a compression technique to save memory and network cost
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Variational Autoencoders
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A VAE is a type of generative model plus general autoencoders that let us sample
    from the model, to generate data. Most VAE architecture is the same as that of
    a generic autoencoder, except that VAEs force the compressed representation of
    the input data to follow a zero mean and a unit variance Gaussian distribution.
    A simple VAE architecture is shown in Figure [4-11](#Fig11).
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: '![../images/489297_1_En_4_Chapter/489297_1_En_4_Fig11_HTML.jpg](../images/489297_1_En_4_Chapter/489297_1_En_4_Fig11_HTML.jpg)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
- en: Figure 4-11
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: Basic VAE architecture
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: Implementation of Variational Autoencoders Using TensorFlow 2.0
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s build a VAE model that will help us to generate new handwritten digits,
    using the Fashion-MNIST data set. This data set comprises 70,000 images (black-and-white)
    of handwritten digits, ranging from 0 to 9, out of which 60,000 are for training,
    and the remaining 10,000 are for testing. Each grayscale image is normalized to
    fit a 28 × 28 pixel bounding box.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
